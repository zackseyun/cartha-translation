translation:
  text: And the hearts of the holy ones shall be filled with joy, because the number of the righteous has drawn near, and the prayer of the righteous has been heard, and the blood of the righteous has been required before the Lord of Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the reckoning of the righteous has drawn near,' if the noun is taken in a more judicial sense rather than as a numerical total.
    reason: lexical_alternative
  - marker: b
    text: '''Has been accepted'' may also carry the sense that the blood of the righteous has come into favorable notice before God, with vindication implied by the context.'
    reason: lexical_alternative
  - marker: c
    text: Or 'has been accepted'.
    reason: previous_rendering
lexical_decisions:
- source_word: ልቦሙ
  chosen: their hearts
  alternatives:
  - their minds
  - their inner being
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural noun refers to the inner seat of emotion and thought; 'hearts' preserves the concrete biblical idiom and suits the verse's emotional register.
- source_word: ቅዱሳን
  chosen: the holy ones
  alternatives:
  - the saints
  - the consecrated ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context this term often denotes the holy community. 'Holy ones' preserves the lexical sense without importing later ecclesiastical overtones of 'saints'.
- source_word: ትመልእ ፍሥሐ
  chosen: shall be filled with joy
  alternatives:
  - will be filled with gladness
  - shall be full of rejoicing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal phrase is naturally rendered as a future/passive-like filling with joy. 'Joy' is concise and elevated without sounding archaic.
- source_word: ቀርበ
  chosen: has drawn near
  alternatives:
  - has come near
  - is near
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The perfective sense points to an event now at hand. 'Has drawn near' preserves the apocalyptic imminence.
- source_word: ኍልቈ ለጻድቅ
  chosen: the number of the righteous
  alternatives:
  - the reckoning of the righteous
  - the count of the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote number or count. 'Number' best fits the context of the righteous reaching their appointed total, while remaining transparent to the Ge'ez.
- source_word: ጻድቅ / ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  - the upright
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Righteous'' is the standard apocalyptic and biblical equivalent and should be kept consistent for this key term.'
- source_word: ጸሎቶሙ ተሰምዐ
  chosen: the prayer of the righteous has been heard
  alternatives:
  - their prayer has been heard
  - the prayers of the righteous have been heard
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular collective 'prayer' is retained because the Ge'ez form is singular with plural possessive; this preserves the textual form while reading naturally in English.
- source_word: ደሙ ለጻድቅ
  chosen: the blood of the righteous
  alternatives:
  - the blood of the righteous one
  - their blood
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the form may be singular in construction, the surrounding context uses the righteous collectively. Rendering it collectively avoids an unwarranted shift to one individual martyr while preserving the motif of shed righteous blood.
- source_word: ተፈቅደ
  chosen: has been accepted
  alternatives:
  - has been approved
  - has been regarded favorably
  - has been avenged
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb fundamentally conveys being pleasing, accepted, or favored. 'Accepted' best fits the immediate syntax 'before the Lord of Spirits' and avoids importing the stronger interpretive idea of vengeance directly into the verb.
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed Enochic divine title. 'Lord of Spirits' preserves the established title form and the text's apocalyptic distinctiveness.
