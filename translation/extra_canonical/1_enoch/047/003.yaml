translation:
  text: In those days I saw the Head of Days, while the throne of his glory was set,
    and the books of the living were opened before him; and all his host, which is
    in the heights of heaven, and his council stood before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the books of life.' The Ge'ez reads a plural expression, more literally
      'the books of the living.'
    reason: lexical_alternative
  - marker: b
    text: '''Head of Days'' is rendered closely from the Ge''ez title here rather
      than harmonized to the more familiar ''Ancient of Days.'''
    reason: lexical_alternative
  - marker: c
    text: The phrase rendered 'his council' may also mean 'the circle around him'
      or 'his assembly,' referring to the heavenly court surrounding the enthroned
      figure.
    reason: lexical_alternative
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  chosen: In those days
  alternatives:
  - In those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula; 'days' preserves the repeated
    visionary cadence better than smoothing to 'times'.
- source_word: ርኢክዎ
  chosen: I saw
  alternatives:
  - I looked and saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple first-person visionary report; concise English preserves the directness
    of the Ge'ez.
- source_word: ለርእሰ መዋዕል
  chosen: the Head of Days
  alternatives:
  - the Antecedent of Days
  - the Chief of Days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established apocalyptic title in this context. 'Head of Days'
    is a transparent rendering of the Ge'ez components and avoids importing the more
    Daniel-shaped 'Ancient of Days' where the Ethiopic here is not simply copied from
    later English tradition.
- source_word: ሶበ ነበረ መንበረ ስብሐቲሁ
  chosen: while the throne of his glory was set
  alternatives:
  - when the throne of his glory was established
  - while his glorious throne was placed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause describes the enthronement scene. 'Was set' is idiomatic and
    vivid, preserving the concrete apocalyptic image without over-paraphrase.
- source_word: መጻሕፍተ ሕያዋን
  chosen: the books of the living
  alternatives:
  - the books of life
  - the books of the living ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez is plural 'books' and literally 'of the living.' I retain both
    features rather than harmonizing to the later familiar singular phrase 'book of
    life'.
- source_word: በቅድሜሁ ተከሥቱ
  chosen: were opened before him
  alternatives:
  - were disclosed before him
  - were revealed before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of heavenly books, 'opened' best fits the scene and is natural
    English for records being made manifest in judgment.
- source_word: ኵሉ ኃይሉ
  chosen: all his host
  alternatives:
  - all his power
  - all his forces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In heavenly-court context, 'host' best conveys a collective heavenly
    retinue rather than abstract power.
- source_word: ዘመልዕልተ ሰማያት
  chosen: which is in the heights of heaven
  alternatives:
  - which is above the heavens
  - which is in the highest heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase locates the host in the exalted heavenly realm. 'Heights of
    heaven' preserves the elevated spatial imagery.
- source_word: አውደ ዚአሁ
  chosen: his council
  alternatives:
  - the circle around him
  - his assembly
  - his entourage
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term likely denotes the gathered circle or court around the enthroned
    figure. 'Council' best fits the judicial-heavenly setting while preserving the
    corporate sense.
- source_word: ይቀውሙ በቅድሜሁ
  chosen: stood before him
  alternatives:
  - were standing before him
  - took their stand before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: English past tense fits the surrounding visionary narration. 'Stood before
    him' preserves the courtly posture.
