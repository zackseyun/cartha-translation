theological_decisions:
- issue: Rendering the divine title ርእሰ መዋዕል
  chosen_reading: the Head of Days
  alternative_readings:
  - the Ancient of Days
  - the Antecedent of Days
  rationale: Because this section is effectively Ge'ez-only for this workflow, the
    translation should stay close to the Ethiopic wording rather than defaulting to
    the traditional Danielic English title. This preserves the text's own diction
    and avoids over-harmonization with later biblical phrasing.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition; book context note on not over-harmonizing with later Christian usage.
- issue: Rendering መጻሕፍተ ሕያዋን
  chosen_reading: the books of the living
  alternative_readings:
  - the books of life
  - the books of the living ones
  rationale: The plural 'books' and the genitival phrase 'of the living' should be
    preserved. Using the familiar phrase 'book of life' would import later canonical
    resonance not demanded by this witness.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition; book context note on preserving Enoch's own wording.
