translation:
  text: In those days the holy ones who dwell in the heights of heaven shall unite with one voice, and they shall plead and pray and praise and give thanks and bless the name of the Lord of Spirits, on account of the blood of the righteous that has been poured out, and that the prayer of the righteous may not be in vain before the Lord of Spirits, that judgment may be executed for them, and that patience may not be theirs forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the saints'; the term can denote holy beings generally. Because they are described as dwelling in the heights of heaven, the wording leaves open whether the reference is to angels, the heavenly righteous, or both.
    reason: lexical_alternative
  - marker: b
    text: The verb behind 'should not be in vain' is uncertain in this Ethiopic witness. The sense in context is likely that the prayer of the righteous is not to go unanswered or ineffective before the Lord of Spirits.
    reason: textual_variant
  - marker: c
    text: Or 'justice may be done for them.' The noun can be heard either as judicial sentence or as the execution of justice on behalf of the righteous.
    reason: lexical_alternative
  - marker: d
    text: Or 'and because the prayer of the righteous should not be in vain before the Lord of Spirits, so that judgment may be executed for them and patience may not be theirs forever.'.
    reason: previous_rendering
lexical_decisions:
- source_word: የኃብሩ
  chosen: shall unite
  alternatives:
  - shall join together
  - shall assemble
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys coming together or joining. With በ፩ቃል ('with one voice'), 'shall unite' captures both collective action and vocal unanimity.
- source_word: ቅዱሳን
  chosen: the holy ones
  alternatives:
  - the saints
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Holy ones'' preserves the apocalyptic register and avoids importing later ecclesiastical associations of ''saints.'''
- source_word: የኃድሩ
  chosen: who dwell
  alternatives:
  - who live
  - who abide
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard residence verb; 'dwell' fits elevated style and heavenly setting.
- source_word: በመልዕልተ ሰማያት
  chosen: in the heights of heaven
  alternatives:
  - in the high heaven
  - in the upper heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the exalted heavenly realm. 'Heights of heaven' preserves the spatial imagery without over-specifying cosmology.
- source_word: በ፩ቃል
  chosen: with one voice
  alternatives:
  - with one word
  - as one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'with one word/voice'; in context of collective heavenly petition, 'with one voice' is the most natural and vivid English equivalent.
- source_word: ያስተበቍዑ
  chosen: shall plead
  alternatives:
  - shall entreat
  - shall make petition
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This verb denotes earnest petition. 'Plead' preserves urgency appropriate to the cry over shed righteous blood.
- source_word: ይጼልዩ
  chosen: pray
  alternatives:
  - make prayer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward prayer verb; retained distinctly because the verse intentionally stacks near-synonyms.
- source_word: ይሴብሑ
  chosen: praise
  alternatives:
  - sing praise
  - glorify
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common doxological verb; 'praise' is concise and preserves the liturgical sequence.
- source_word: የአኵቱ
  chosen: give thanks
  alternatives:
  - thank
  - confess praise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb often carries thanksgiving or laudatory acknowledgment. 'Give thanks' distinguishes it from the adjacent 'praise.'
- source_word: ይባርኩ
  chosen: bless
  alternatives:
  - speak blessing over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard blessing verb; retained formally because blessing the divine name is a marked biblical/apocalyptic idiom.
- source_word: በስሙ
  chosen: the name
  alternatives:
  - his name
  - the name of him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered with the following divine title as 'the name of the Lord of Spirits,' preserving the reverential object of blessing.
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established title within the Parables. 'Lord of Spirits' is concise and preserves the title's solemn force.
- source_word: በእንተ ደመ ጻድቃን
  chosen: on account of the blood of the righteous
  alternatives:
  - because of the blood of the righteous
  - concerning the blood of the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks cause or occasion. 'On account of' fits the heavenly intercession prompted by unjust bloodshed.
- source_word: ዘተክዕወ
  chosen: that has been poured out
  alternatives:
  - that has been shed
  - that has been spilled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive sense refers to blood violently shed. 'Poured out' keeps the sacrificial/judicial resonance while remaining natural English.
- source_word: ጸሎቶሙ ለጻድቃን
  chosen: the prayer of the righteous
  alternatives:
  - their prayer, that of the righteous
  - the prayers of the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The transmitted form is singular with a plural genitival sense. English singular can function collectively here.
- source_word: ከመ ኢትጸራዕ በቅድመ እግዚአ መናፍስት
  chosen: should not be in vain before the Lord of Spirits
  alternatives:
  - should not cease before the Lord of Spirits
  - should not be rejected before the Lord of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact force of the verb is difficult in this witness. In context it likely means the righteous prayer is not to go unanswered or fail before God. 'Be in vain' expresses that sense transparently while acknowledging uncertainty.
- source_word: ከመ ይትገበር ሎሙ ኵነኔ
  chosen: so that judgment may be executed for them
  alternatives:
  - so that justice may be done for them
  - so that sentence may be carried out for them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes judgment/sentence. 'Judgment' preserves apocalyptic judicial diction; 'for them' reflects vindicatory context on behalf of the righteous.
- source_word: ትዕግሥት ኢይኩን ሎሙ ለዓለም
  chosen: patience may not be theirs forever
  alternatives:
  - forbearance may not continue for them forever
  - there may not be delay for them forever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The line likely means that enduring delay should not continue indefinitely for the righteous. 'Patience may not be theirs forever' preserves the literal noun while signaling the end of prolonged waiting.
