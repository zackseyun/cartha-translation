theological_decisions:
- issue: Identity of ቅዱሳን in this heavenly scene
  chosen_reading: Rendered as heavenly 'holy ones' rather than specifically human 'saints.'
  alternative_readings:
  - saints
  - angels
  rationale: In the immediate context they dwell 'in the heights of heaven' and speak in a heavenly liturgical/intercessory register. 'Holy ones' preserves the ambiguity of exalted beings without over-defining them.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the petition concerning the righteous prayer
  chosen_reading: The prayer of the righteous is rendered as not being 'in vain' before the Lord of Spirits.
  alternative_readings:
  - not be silenced
  - not cease
  - not be rejected
  rationale: The Ge'ez form is difficult, and the context is vindication for shed righteous blood. The chosen rendering communicates that the prayer is not futile or ignored, while a footnote preserves lexical uncertainty.
  doctrine_reference: When the sense is uncertain, prefer transparent English plus a footnote over false confidence.
- issue: Meaning of ኵነኔ in vindication context
  chosen_reading: Rendered 'judgment' rather than 'justice.'
  alternative_readings:
  - justice
  - sentence
  rationale: The apocalyptic scene emphasizes divine judicial action. 'Judgment' keeps the courtroom and eschatological force, while readers can infer vindication from 'for them.'
  doctrine_reference: Preserve apocalyptic imagery and judgment formulas.
