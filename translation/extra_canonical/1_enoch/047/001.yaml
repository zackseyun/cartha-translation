theological_decisions:
- issue: Whether ጻድቅ after 'blood' should be rendered as singular ('the righteous
    one') or as a collective singular/plural sense.
  chosen_reading: 'collective sense: ''the blood of the righteous'''
  alternative_readings:
  - the blood of the righteous one
  - their blood
  rationale: The immediate parallel with 'the prayer of the righteous' strongly favors
    a collective reading in English. Because the Parables are effectively Ge'ez-only
    here, the translation avoids over-precision while preserving the likely collective
    lament of the persecuted righteous.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity rather than flatten it.
