translation:
  text: And in those days, the prayer of the righteous and the blood of the righteous
    ascended from the earth before the Lord of Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'the blood of the righteous' may also be understood more literally
      as 'the blood of the righteous one,' since the Ge'ez form after 'blood' is singular.
      The line likely uses a representative singular or collective sense in parallel
      with 'the prayer of the righteous.'
    reason: lexical_alternative
  - marker: b
    text: The verb is explicit for 'the prayer' ('will ascend') but not repeated for
      'the blood.' The English leaves the second phrase elliptical, matching the compressed
      parallelism of the Ge'ez.
    reason: lexical_alternative
  - marker: c
    text: Or 'the prayer of the righteous will ascend, and the blood of the righteous
      from the earth, before the Lord of Spirits.'.
    reason: previous_rendering
lexical_decisions:
- source_word: መዋዕል
  chosen: days
  alternatives:
  - time
  - those times
  lexicon: Dillmann
  rationale: In the apocalyptic formula በውእቱ መዋዕል, 'in those days' is the most natural
    and idiomatic rendering, preserving the repeated visionary time-marker.
- source_word: ዐርገት
  chosen: will ascend
  alternatives:
  - ascended
  - goes up
  - rose up
  lexicon: Dillmann
  rationale: The verb denotes upward movement. 'Will ascend' preserves the elevated
    apocalyptic register and fits the prophetic/visionary narration better than a
    flatter 'goes up.'
- source_word: ጸሎተ
  chosen: prayer
  alternatives:
  - petition
  - supplication
  lexicon: Dillmann
  rationale: '''Prayer'' is the broad, natural gloss and suits the solemn register.
    ''Supplication'' is possible but narrower than the Ge''ez term requires here.'
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  - the righteous ones
  lexicon: Dillmann
  rationale: This is a key apocalyptic group term in Enochic literature. 'The righteous'
    preserves both its collective force and its theological resonance without over-expansion.
- source_word: ደሙ
  chosen: the blood
  alternatives:
  - their blood
  - blood
  lexicon: Dillmann
  rationale: The suffixed form points to 'his/their blood,' but the following singular
    ጻድቅ complicates the number. Rendering simply 'the blood' keeps the line readable
    while avoiding overconfidence about whether the text intends a collective or representative
    singular.
- source_word: ጻድቅ
  chosen: the righteous
  alternatives:
  - the righteous one
  - the just
  lexicon: Dillmann
  rationale: Although formally singular, the phrase likely functions collectively
    in parallel with the preceding plural 'the righteous.' Rendering it as collective
    English preserves the parallelism and avoids forcing an individual referent not
    explicit in context.
- source_word: እምነ ምድር
  chosen: from the earth
  alternatives:
  - from the land
  - out of the earth
  lexicon: Dillmann
  rationale: '''Earth'' best preserves the cosmic-apocalyptic scope. ''Land'' would
    sound too local or territorial in this visionary setting.'
- source_word: ቅድመ
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: Dillmann
  rationale: '''Before'' is concise and faithful. A fuller expression like ''in the
    presence of'' is possible but not necessary in the main text.'
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann
  rationale: This is a fixed Enochic divine title. 'Lord of Spirits' is the established
    transparent rendering and preserves the title's elevated, cosmic force.
