theological_decisions:
- issue: Identification of the beings as both angels and sons of heaven
  chosen_reading: 'Preserve both designations appositionally: ''the angels, the sons
    of heaven'''
  alternative_readings:
  - Translate only 'the angels'
  - Translate only 'the sons of heaven'
  - Merge into 'the heavenly angels'
  rationale: The Ge'ez explicitly includes both terms. Preserving both avoids flattening
    the text's supernatural anthropology and keeps the verse's own way of identifying
    the Watchers.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
- issue: Whether to render the desire verb with explicit sexual force
  chosen_reading: Use 'desired them' in the main text
  alternative_readings:
  - '''lusted after them'''
  - '''fell in love with them'''
  rationale: The context clearly concerns illicit union, but the Ge'ez wording itself
    states desire without requiring the more interpretive 'lusted' or the softer 'fell
    in love.' The chosen rendering preserves the moral gravity without paraphrastic
    expansion.
  doctrine_reference: Original-language primacy over translation tradition.
