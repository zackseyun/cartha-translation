translation:
  text: And the angels, the sons of heaven, saw them and desired them. And they said
    among themselves, “Come, let us choose for ourselves wives from the children of
    men, and let us beget children for ourselves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The pronoun 'them' refers back to the women mentioned in the previous verse;
      the Ge'ez here does not restate 'women' explicitly.
    reason: cross_reference
  - marker: b
    text: '''Children of men'' is a literal, elevated expression contrasting human
      offspring with the heavenly beings in this scene; it may also be rendered ''children
      of humankind.'''
    reason: lexical_alternative
  - marker: c
    text: The final clause literally has the sense of begetting offspring; 'father
      children' is used for natural modern English.
    reason: lexical_alternative
  - marker: d
    text: Or 'And they saw them, the angels, the sons of heaven, and they desired
      them.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወርእዩ
  chosen: and they saw
  alternatives:
  - and they looked upon
  - and they observed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic narrative verb of seeing; 'saw' preserves the directness of the
    Ge'ez without adding interpretive nuance.
- source_word: ኪያሆን
  chosen: them
  alternatives:
  - those women
  - those ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Pronominal object referring back to the daughters/women of the previous
    verse. English requires an explicit object, but the pronoun should remain as such
    in the main text rather than being over-specified.
- source_word: መላእክት ውሉደ ሰማያት
  chosen: the angels, the sons of heaven
  alternatives:
  - the angels, sons of heaven
  - the heavenly sons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The appositional structure is preserved rather than collapsed. This keeps
    the verse's identification of these beings as both angels and sons of heaven,
    important in the Watchers context.
- source_word: ወፈተውዎን
  chosen: and they desired them
  alternatives:
  - and they lusted after them
  - and they took pleasure in them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys strong desire. 'Desired' is faithful and readable without
    importing a more explicit sexual term than the Ge'ez itself states.
- source_word: በበይናቲሆሙ
  chosen: among themselves
  alternatives:
  - to one another
  - between themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Idiomatic rendering of reciprocal speech within the group.
- source_word: ንዑ
  chosen: Come
  alternatives:
  - Come now
  - Let us come
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct hortatory summons introducing the conspiratorial speech.
- source_word: ንሕረይ ለነ አንስተ
  chosen: let us choose for ourselves wives
  alternatives:
  - let us take for ourselves wives
  - let us select women for ourselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez verb points to choosing/selecting; 'wives' is warranted by
    አንስተ in this marital-taking context and fits the ensuing union language better
    than the more generic 'women'.
- source_word: እምውሉደ ሰብእ
  chosen: from the children of men
  alternatives:
  - from the children of humankind
  - from among human beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the elevated, apocalyptic contrast between heavenly beings and
    human offspring. 'Children of men' is traditional but still intelligible here.
- source_word: ወንለድ ለነ ውሉደ
  chosen: and let us father children for ourselves
  alternatives:
  - and let us beget children for ourselves
  - and let us bear offspring for ourselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Because the speakers are male angelic beings, 'father children' communicates
    the begetting sense more naturally in modern English than 'bear,' while avoiding
    archaic 'beget' in the main text.
