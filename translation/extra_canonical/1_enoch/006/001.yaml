translation:
  text: And it came to pass, when the children of men had multiplied in those days,
    daughters were born to them, beautiful and comely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sons of men.' The Ge'ez expression is a conventional human designation
      and prepares for the contrast with the Watchers in the following verses.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወኮነ
  chosen: And it came to pass
  alternatives:
  - And it happened
  - Now it came about
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A narrative formula introducing a new episode. 'And it came to pass'
    preserves the elevated apocalyptic register better than a flatter modern equivalent,
    while remaining intelligible.
- source_word: እምዘ በዝኁ
  chosen: when ... had multiplied
  alternatives:
  - after ... increased
  - as ... became many
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction marks the circumstance in which the following event
    occurred. 'Had multiplied' captures both increase in number and the temporal sense
    of the clause.
- source_word: ውሉደ ሰብእ
  chosen: the children of men
  alternatives:
  - the sons of men
  - human beings
  - the children of humankind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering preserves the traditional anthropological expression
    and sets up the contrast with heavenly beings in the following context. 'Children
    of men' is less gender-restrictive in English than 'sons of men' while staying
    close to the Ge'ez.
- source_word: በእማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - during those days
  - at that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a standard temporal phrase in apocalyptic narration. 'In those
    days' preserves the register and recurring formulaic feel.
- source_word: ተወልዳ ሎሙ አዋልድ
  chosen: daughters were born to them
  alternatives:
  - girls were born to them
  - they had daughters born to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive-like verbal form is best represented directly. 'Daughters'
    fits the literary register and anticipates the Watchers' desire in the next verse.
- source_word: ሠናያት
  chosen: beautiful
  alternatives:
  - fair
  - goodly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective denotes attractiveness or goodness of appearance. 'Beautiful'
    is natural modern English without becoming colloquial.
- source_word: ወላሕያት
  chosen: comely
  alternatives:
  - lovely
  - handsome
  - graceful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired adjective intensifies physical attractiveness. 'Comely' preserves
    the elevated tone and avoids collapsing the double description into a single modern
    adjective.
