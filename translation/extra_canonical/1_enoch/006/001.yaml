theological_decisions:
- issue: Anthropological phrase contrasted with heavenly beings in context
  chosen_reading: the children of men
  alternative_readings:
  - the sons of men
  - human beings
  rationale: The immediate literary context contrasts human offspring with the Watchers.
    Retaining the idiomatic phrase preserves that contrast without overcommitting
    to a male-only sense.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
