  from: they bound themselves to one another
  to: Then they all swore together, and bound one another with a curse concerning it.
  rationale: 'Adjudicator-modified: The reviewer is entirely correct that `አውገዙ` (ʾawgaza) carries the specific meaning of binding with a curse or anathematizing (matching the Greek ἀνεθεμάτισαν), and this should be rendered consistently with 6:4. Furthermore, the current English mistranslates the preceding verb `መሐሉ` (maḥalu) as ''spoke''; it actually means ''swore'' (matching the Greek ὤμοσαν). The suggested rewrite has been modified to correct both verbs, restoring the full force of the mutual imprecatory oath.'
