- issue: Whether to make the oath explicit in the main text
  chosen_reading: bound themselves to one another concerning it
  alternative_readings:
  - swore together about it
  - bound one another by oath concerning it
  rationale: The immediate context is an oath among the Watchers, but the provided Ge'ez wording itself is more literally about mutual binding. To preserve transparency and avoid paraphrasing beyond the witness, the main text keeps 'bound themselves,' while the oath nuance is documented here and in a footnote.
