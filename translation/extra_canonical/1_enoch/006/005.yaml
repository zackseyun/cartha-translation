lexical_decisions:
- source_word: አሜሃ
  chosen: Then
  alternatives:
  - And then
  - At that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Functions as a narrative/sequential particle introducing the next action in the scene; 'Then' preserves the flow without overloading the line.
- source_word: መሐሉ
  chosen: they all spoke together
  alternatives:
  - they answered together
  - they said among themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form indicates collective speech. 'Spoke together' preserves the unanimity and oral force of the oath scene better than a flatter 'said.'
- source_word: ኵሎሙ
  chosen: all
  alternatives:
  - all of them
  - the whole company
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Explicitly marks total participation; retained in English because the verse stresses unanimous complicity.
- source_word: ኅቡረ
  chosen: together
  alternatives:
  - as one
  - in company
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adverbial sense reinforcing collective action. Rendered separately to preserve the repeated emphasis on solidarity.
- source_word: ወአውገዙ
  chosen: and they bound themselves
  alternatives:
  - and they swore
  - and they pledged themselves
  - and they bound one another by oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context this verb refers to mutual self-obligation in an oath-setting. 'Bound themselves' keeps the concrete covenantal force and prepares for the curse/oath language in the surrounding verses, without importing a smoother but less vivid paraphrase.
- source_word: በበይናቲሆሙ
  chosen: to one another
  alternatives:
  - among themselves
  - between themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reciprocal phrase indicating mutual commitment. 'To one another' is idiomatic English and preserves the reciprocal nature of the act.
- source_word: ቦቱ
  chosen: concerning it
  alternatives:
  - about this
  - over it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers back to the plan under discussion in the immediate context. 'Concerning it' is slightly formal but clear, and avoids over-specifying the object beyond what the pronoun itself states.
