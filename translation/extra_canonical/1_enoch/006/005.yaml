  rationale: 'The Ge''ez verb መሐለ (maḥala) means "to swear" or "to take an oath," not "to speak." The draft''s lexical note incorrectly identifies it as a verb of speech. In the preceding verse (6:4), the cognate phrase መሐላ ንምሐል is correctly translated "let us swear an oath." Here, መሐሉ simply means "they swore." | Adjudicator: The reviewer is entirely correct. The Ge''ez verb መሐለ (maḥala) means ''to swear'' or ''to take an oath'' (Leslau, Comparative Dictionary of Ge''ez, p. 333), not ''to speak''. The context of the Watchers'' pact'
