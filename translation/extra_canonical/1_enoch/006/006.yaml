translation:
  text: And all of them were two hundred, and they came down onto Ardis, which is
    the summit of Mount Hermon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The place-name 'Ardis' is uncertain in English transliteration. The Ge'ez
      presents it as the location identified with the summit of Mount Hermon.
    reason: lexical_alternative
  - marker: b
    text: Some translators render the verb more formally as 'descended.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ኵሎሙ
  chosen: all of them
  alternatives:
  - all
  - all of them together
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronominal suffix marks the totality of the previously mentioned
    group; 'all of them' preserves the explicit collective force.
- source_word: ክልኤ ምእት
  chosen: two hundred
  alternatives:
  - two hundred in number
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straight numerical expression; concise English is sufficient.
- source_word: ወወረዱ
  chosen: they came down
  alternatives:
  - they descended
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes downward movement. 'Came down' is natural modern English
    while preserving the vertical, heavenly-to-earth movement important in the Watchers
    narrative.
- source_word: ውስተ
  chosen: onto
  alternatives:
  - into
  - upon
  - to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although often 'into,' with a mountain location the sense is arrival
    upon a place or height. 'Onto' fits the topographical context better than 'into.'
- source_word: አርዲስ
  chosen: Ardis
  alternatives:
  - Ardis/Ardish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a place-name in apposition to Mount Hermon's height. It is transliterated
    rather than translated, following project policy for names. The exact vocalization
    is uncertain in English representation, so the more direct transliteration from
    the Ge'ez form is retained.
- source_word: ዝውእቱ ድማኁ ለደብረ አርሞን
  chosen: which is the summit of Mount Hermon
  alternatives:
  - which is the top of Mount Hermon
  - which is its peak, Mount Hermon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause identifies Ardis with the mountain's upper point.
    'Summit' is elevated but readable English and preserves the geographical specificity.
