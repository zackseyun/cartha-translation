theological_decisions:
- issue: Rendering the descent of the Watchers
  chosen_reading: they came down
  alternative_readings:
  - they descended
  rationale: The verse marks the transgressive movement from heaven to earth. 'Came
    down' keeps the narrative vivid without importing later theological phrasing.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic movement
    into generic prose.
