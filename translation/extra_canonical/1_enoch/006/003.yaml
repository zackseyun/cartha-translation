translation:
  text: And Semyaza, who was their leader, said to them, “I fear that you may not
    be willing to carry out this deed, and I alone will become liable for a great
    sin.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez expression behind “their leader” is literally closer to “their
      angel” or “their chief messenger,” but in context it identifies Semyaza as the
      head of the group.
    reason: lexical_alternative
  - marker: b
    text: “Become liable” may also be rendered “pay the penalty” or “be held responsible,”
      reflecting the legal-moral force of the term.
    reason: lexical_alternative
lexical_decisions:
- source_word: ስምያዛ
  chosen: Semyaza
  alternatives:
  - Semyaza
  - Shemyaza
  lexicon: Knibb
  rationale: Personal name is transliterated rather than translated, following project
    policy for names. The form 'Semyaza' reflects a straightforward transliteration
    of the Ge'ez witness.
- source_word: መልአኮሙ
  chosen: their leader
  alternatives:
  - their angel
  - their chief
  lexicon: Dillmann
  rationale: Although the Ge'ez form is literally related to 'angel/messenger,' in
    this context it functions for the one heading the group of Watchers. Rendering
    it as 'leader' best fits the immediate sense without woodenly producing 'their
    angel,' which would confuse the role.
- source_word: እፈርህ
  chosen: I fear
  alternatives:
  - I am afraid
  lexicon: Dillmann
  rationale: A direct and natural rendering of the first-person verb of fearing; it
    preserves the force of Semyaza's hesitation.
- source_word: ኢትፍቅዱ
  chosen: you may not be willing
  alternatives:
  - you will not consent
  - you may not agree
  lexicon: Dillmann
  rationale: The verb concerns willingness/consent rather than mere ability. 'May
    not be willing' fits the clause's apprehensive tone after 'I fear.'
- source_word: ይትገበር
  chosen: to carry out
  alternatives:
  - to do
  - to perform
  lexicon: Dillmann
  rationale: This passive/reflexive-related verbal form in context points to the deed
    being effected or done. 'Carry out' gives idiomatic English while preserving the
    concrete sense of undertaking the act.
- source_word: ግብር
  chosen: deed
  alternatives:
  - act
  - matter
  lexicon: Dillmann
  rationale: A broad term for an act or work. 'Deed' suits the solemn and morally
    weighty context.
- source_word: ባሕቲትየ
  chosen: I alone
  alternatives:
  - I by myself
  - I only
  lexicon: Dillmann
  rationale: The term emphasizes Semyaza's solitary liability if the others draw back.
    'I alone' is concise and forceful.
- source_word: ፈዳዪ
  chosen: become liable
  alternatives:
  - be responsible
  - pay the penalty
  lexicon: Dillmann
  rationale: The term carries the sense of bearing penalty or being answerable. 'Become
    liable' preserves the juridical nuance without over-specifying the exact punishment.
- source_word: ለኃጢአት ዐባይ
  chosen: for a great sin
  alternatives:
  - for great guilt
  - for a grave sin
  lexicon: Dillmann
  rationale: The phrase denotes serious transgression. 'A great sin' is transparent
    and retains the moral gravity of the Ge'ez.
