theological_decisions:
- issue: How to render Semyaza's role in relation to the other Watchers
  chosen_reading: their leader
  alternative_readings:
  - their angel
  - their chief
  rationale: In context, Semyaza is speaking as the head of the group planning the
    transgressive act. Rendering the term functionally as 'leader' preserves the narrative
    sense and avoids misleading readers into hearing a separate ontological claim
    beyond the Watchers' already angelic identity.
  doctrine_reference: Translate titles/roles by meaning where context makes the function
    plain; preserve local passage sense rather than harmonizing.
