translation:
  text: And they all answered him and said, "Let us all swear an oath, and let us
    all bind one another with a curse, so that we do not turn back from this plan,
    but carry out this deed."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez uses both 'swear an oath' and 'bind with a curse,' a doubled formula
      emphasizing a solemn mutual pact.
    reason: lexical_alternative
  - marker: b
    text: The final phrase is textually repetitive in the witness ('this plan ...
      this deed/action'); the translation preserves the sense of moving from counsel
      to execution.
    reason: textual_variant
lexical_decisions:
- source_word: አውሥኡ
  chosen: answered
  alternatives:
  - responded
  - replied
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Narrative verb introducing collective speech; 'answered' preserves the
    formal dialogic tone of apocalyptic narrative.
- source_word: መሐላ
  chosen: oath
  alternatives:
  - sworn oath
  - curse-oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes an oath; 'oath' is the plain and natural English equivalent.
    The following verb 'let us swear' makes 'swear an oath' an intentional emphatic
    pairing rather than redundancy to be removed.
- source_word: ንምሐል
  chosen: let us swear
  alternatives:
  - let us take an oath
  - let us bind ourselves by oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Cohortative/jussive force in direct speech is best represented by 'let
    us swear.' This keeps the solemnity and urgency of the conspiratorial proposal.
- source_word: ናውግዝ
  chosen: let us bind one another with a curse
  alternatives:
  - let us curse one another
  - let us bind ourselves by mutual curses
  - let us place one another under a curse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is stronger than a simple emotional 'curse'; in context it marks
    a self-imprecatory pact. 'Bind one another with a curse' preserves the covenantal
    and juridical force without over-paraphrasing.
- source_word: በበይናቲነ
  chosen: one another
  alternatives:
  - among ourselves
  - mutually
  - between ourselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The reciprocal sense is important: the group is mutually obligating
    itself, not merely uttering a curse in general.'
- source_word: ከመ፡ ኢንምጠ
  chosen: so that we do not turn back
  alternatives:
  - so that we do not fail
  - so that we do not withdraw
  - so that we do not abandon it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context the sense is not simple failure but backing away from the
    agreed scheme. 'Turn back' preserves the volitional force of refusing to retreat
    from the plan.
- source_word: ለዛቲ፡ ምክር
  chosen: from this plan
  alternatives:
  - from this counsel
  - from this scheme
  - from this resolve
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can mean counsel or plan. Here it refers to the collective proposal
    just voiced; 'plan' is clear modern English while retaining deliberative force.
    'Scheme' is possible but slightly over-interprets the moral valence.
- source_word: ንግብራ፡ ለዛቲ፡ ግብር
  chosen: carry out this deed
  alternatives:
  - do this thing
  - perform this act
  - carry out this action
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated object after the verb intensifies execution of the proposal.
    'Carry out this deed' preserves the movement from counsel to action and keeps
    the ominous weight of the act.
