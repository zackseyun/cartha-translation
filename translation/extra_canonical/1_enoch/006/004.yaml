theological_decisions:
- issue: Nature of the Watchers' mutual oath
  chosen_reading: A self-binding pact reinforced by mutual curse
  alternative_readings:
  - A simple promise
  - A general curse without covenantal force
  rationale: The paired oath-and-curse language presents more than casual agreement;
    it is a solemn, self-obligating conspiracy. This should remain explicit because
    it shapes the moral and judicial gravity of the Watchers' rebellion in the narrative.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten apocalyptic or juridical formulas into generic prose.
