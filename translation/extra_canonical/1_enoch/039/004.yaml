translation:
  text: 'And there I saw another vision: the dwelling places of the holy ones, and
    the resting places of the righteous.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The term rendered 'resting places' could more literally suggest beds, couches,
      or sleeping places. The broader sense is kept in English because the verse describes
      the abodes prepared for the righteous in visionary imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: በህየ
  chosen: there
  alternatives:
  - in that place
  - therein
  lexicon: Dillmann
  rationale: Locative adverb marking the visionary setting. 'There' is natural English
    and preserves the scene-setting force without over-formalizing.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I looked upon
  - I beheld
  lexicon: Dillmann
  rationale: Standard first-person visionary report. 'I saw' keeps the repeated apocalyptic
    narration plain and direct.
- source_word: ራእየ ካልአ
  chosen: another vision
  alternatives:
  - a second vision
  - another sight
  lexicon: Dillmann
  rationale: The phrase indicates a further visionary disclosure. 'Another vision'
    preserves the apocalyptic register better than the flatter 'another sight'; 'second
    vision' is possible but more numerically specific than the English needs to be.
- source_word: ማኅደሪሆሙ
  chosen: the dwelling places
  alternatives:
  - their dwellings
  - habitations
  lexicon: Dillmann
  rationale: Derived from a noun for dwelling or habitation, here with pronominal
    suffix 'their.' 'Dwelling places' is elevated but readable and suits the visionary
    description of the abode of the holy ones.
- source_word: ለቅዱሳን
  chosen: of the holy ones
  alternatives:
  - for the holy ones
  - of the saints
  lexicon: Dillmann
  rationale: The lamed phrase here is best taken in relation to possession/reference
    with the preceding noun. 'Holy ones' is preferred over 'saints' to avoid importing
    later ecclesiastical associations and to preserve Enochic angelic/apocalyptic
    ambiguity where applicable.
- source_word: ወምስካባቲሆሙ
  chosen: and the resting places
  alternatives:
  - and their beds
  - and their sleeping places
  - and their couches
  lexicon: Dillmann
  rationale: The noun is related to lying down or bed/resting place. In this context
    of blessed abodes, 'resting places' preserves the imagery without becoming overly
    concrete in English, while still reflecting the underlying sleep/rest semantic
    field.
- source_word: ለጻድቃን
  chosen: of the righteous
  alternatives:
  - for the righteous
  - of the just
  lexicon: Dillmann
  rationale: Standard rendering for the righteous/just. 'Righteous' maintains consistency
    with key ethical-apocalyptic terminology across the corpus.
