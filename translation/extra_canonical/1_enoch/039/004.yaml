theological_decisions:
- issue: Whether ቅዱሳን here should be rendered 'holy ones' or 'saints' and whether
    it implies angels, the faithful dead, or the vindicated people of God.
  chosen_reading: holy ones
  alternative_readings:
  - saints
  rationale: In the Parables, the term can carry apocalyptic breadth and should not
    be narrowed prematurely. 'Holy ones' preserves the text's theological openness
    and avoids importing later Christian terminology.
  doctrine_reference: Preserve theological tension rather than resolve it; keep major
    terms locally grounded in the passage.
