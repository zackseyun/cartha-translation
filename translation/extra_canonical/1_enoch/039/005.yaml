translation:
  text: There my eyes saw their dwelling places with the angels of righteousness, and their resting places with the holy ones; and they were asking and pleading and praying on behalf of the children of men, and righteousness was flowing before them like water, and mercy like dew upon the earth. So it is among them forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their beds/couches'; the Ge'ez term suggests places of repose, but 'resting places' better fits the heavenly vision without over-specifying furniture.
    reason: lexical_alternative
  - marker: b
    text: '''Holy ones'' may refer to heavenly holy beings, the righteous in the heavenly assembly, or both; the Ge''ez wording does not force a narrower identification.'
    reason: alternative_reading
  - marker: c
    text: The final clause may also be understood as 'thus it shall be in their midst forever and ever.' The main text keeps a present-state summary, but a future nuance is possible from context.
    reason: alternative_reading
  - marker: d
    text: Or 'There I saw with my eyes their dwelling places'.
    reason: previous_rendering
lexical_decisions:
- source_word: በህየ
  chosen: There
  alternatives:
  - In that place
  - Therein
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locative deictic introducing the visionary scene; 'There' is natural and preserves the report style.
- source_word: ርእያ አዕይንትየ
  chosen: I saw with my eyes
  alternatives:
  - my eyes saw
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled seeing expression is emphatic in visionary narrative; retaining 'with my eyes' preserves that force rather than reducing it to simple 'I saw'.
- source_word: ማኅደሮሙ
  chosen: their dwelling places
  alternatives:
  - their habitations
  - their abodes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to places of residence or abiding. 'Dwelling places' is elevated but readable and fits the heavenly setting.
- source_word: መላእክተ ጽድቅ
  chosen: angels of righteousness
  alternatives:
  - righteous angels
  - angels of justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The genitival construction is best preserved. 'Righteousness' is preferred over 'justice' here because the surrounding imagery also uses ጽድቅ in a moral-cosmic sense.
- source_word: ምስካቢሆሙ
  chosen: their resting places
  alternatives:
  - their beds
  - their couches
  - their places of repose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can suggest lying down or resting. In this visionary context, 'resting places' avoids overly concrete furniture imagery while preserving the idea of repose.
- source_word: ቅዱሳን
  chosen: the holy ones
  alternatives:
  - the saints
  - the consecrated ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context this likely denotes heavenly holy beings or sanctified company. 'Holy ones' preserves ambiguity better than the more tradition-laden 'saints'.
- source_word: ይስእሉ ወያስተበቍዑ ወይጼልዩ
  chosen: they were asking and pleading and praying
  alternatives:
  - they asked and besought and prayed
  - they petitioned and implored and prayed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The three verbs form a rhetorical accumulation of intercession. Rendering all three distinctly preserves the intensification.
- source_word: በእንተ ውሉደ ሰብእ
  chosen: on behalf of the children of men
  alternatives:
  - for the sons of men
  - for humankind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal rendering suits the elevated register and preserves the anthropological phrase without flattening it to generic modern prose.
- source_word: ጽድቅ ከመ ማይ ይውሕዝ ቅድሜሆሙ
  chosen: righteousness was flowing before them like water
  alternatives:
  - justice flowed before them like water
  - righteousness streamed in their presence like water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The image is vivid and should remain concrete. 'Righteousness' matches the project's default for this semantic field unless context strongly demands 'justice'.
- source_word: ምሕረት ከመ ጠል ውስተ ምድር
  chosen: mercy like dew upon the earth
  alternatives:
  - compassion like dew on the earth
  - mercy like dew in the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The simile evokes gentle, life-giving abundance. 'Upon the earth' is the most idiomatic English for the locative phrase while preserving the image.
- source_word: ከመዝ ውእቱ ማእከሎሙ ለዓለመ ዓለም
  chosen: So it is among them forever and ever
  alternatives:
  - Thus it is in their midst for ever
  - So it shall be among them for the age of ages
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause summarizes the enduring state of the heavenly company. 'Forever and ever' is idiomatic and preserves the emphatic perpetuity of the Ge'ez expression.
