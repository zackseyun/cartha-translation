theological_decisions:
- issue: Identity of the intercessors and heavenly company
  chosen_reading: The verse depicts heavenly beings/the holy company interceding for humanity, without specifying a later doctrinal category.
  alternative_readings:
  - departed righteous humans interceding
  - angels alone interceding
  rationale: The syntax links dwelling places with angels of righteousness and resting places with holy ones, but the exact referent of 'they were asking and pleading and praying' is not fully explicit. The translation preserves the ambiguity rather than resolving it into a later angelology or sainthood doctrine.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of ጽድቅ
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: In this verse the term appears both in the angelic designation and in the flowing-water image. 'Righteousness' better preserves the moral and cosmic quality of the scene, though 'justice' remains a plausible nuance.
  doctrine_reference: Consistency of key terms, or documented exception.
