translation:
  text: And in that place my eyes saw the Chosen One of righteousness and of faith, and righteousness shall be in his days; and the righteous and the chosen will be without number before him forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of faithfulness.' The Ge'ez term may denote faith, fidelity, or steadfastness in this compressed title-like phrase.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'there is no number for them before him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'shall prevail'.
    reason: previous_rendering
lexical_decisions:
- source_word: መካን
  chosen: place
  alternatives:
  - region
  - dwelling-place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common Ge'ez term for a place/location. 'Place' preserves the visionary spatial setting without over-specifying.
- source_word: ኀሩየ
  chosen: Chosen One
  alternatives:
  - elect one
  - chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A substantive title here, not merely an adjective. 'Chosen One' preserves the titular force used in the Parables and avoids flattening it into a generic descriptor.
- source_word: ለጽድቅ
  chosen: of righteousness
  alternatives:
  - for righteousness
  - belonging to righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The genitival sense best fits the title construction in context: the figure is characterized by righteousness.'
- source_word: ወዘሃይማኖት
  chosen: and of faith
  alternatives:
  - and of faithfulness
  - and who is faithful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote faith or faithfulness. 'Faith' is retained in the main text for lexical transparency, while the possible nuance 'faithfulness' is noted in a footnote because the phrase is somewhat compressed and theologically weighty.
- source_word: ይከውን
  chosen: shall prevail
  alternatives:
  - shall be
  - shall come to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although literally 'shall be/become,' the clause with repeated 'righteousness' points to the effective presence or dominance of righteousness in his days. 'Shall prevail' brings out the apocalyptic force without excessive paraphrase.
- source_word: በመዋዕሊሁ
  chosen: in his days
  alternatives:
  - during his days
  - in the days belonging to him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal expression; 'in his days' is concise and idiomatic while preserving the source structure.
- source_word: ኄራያን
  chosen: the chosen
  alternatives:
  - the elect ones
  - the select
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural counterpart to the title 'Chosen One.' 'The chosen' keeps lexical continuity with the singular title while remaining readable English.
- source_word: ኈልቈ አልቦሙ
  chosen: will be without number
  alternatives:
  - there will be no number for them
  - they will be innumerable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom expresses innumerability. 'Without number' preserves the elevated register and apocalyptic style better than a flatter paraphrase.
- source_word: ቅድሜሁ
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward relational phrase. 'Before him' preserves the formal, courtly-apocalyptic sense of standing in the presence of the exalted figure.
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for the age of ages
  - for ever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard eternal-duration formula. 'Forever and ever' is idiomatic English that still preserves the solemnity of the expression.
