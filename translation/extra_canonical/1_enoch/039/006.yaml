theological_decisions:
- issue: Whether ኀሩየ should be rendered as a title or a descriptive adjective
  chosen_reading: Rendered as the title 'Chosen One'
  alternative_readings:
  - chosen one (non-titular)
  - the elect one
  rationale: In the Parables this figure functions as a distinct exalted personage. Capitalizing the title reflects literary function without importing later doctrinal identifications into the verse itself.
  doctrine_reference: Preserve local passage meaning and do not over-harmonize with later Christian usage.
- issue: Sense of ሃይማኖት in the phrase 'of righteousness and of faith'
  chosen_reading: Main text 'faith' with footnote noting 'faithfulness'
  alternative_readings:
  - faithfulness
  - trustworthiness
  rationale: The Ge'ez noun can carry either a more subjective 'faith' sense or a character sense closer to 'faithfulness.' Because the phrase is compressed and the section is Ge'ez-only for this workflow, the ambiguity should be preserved transparently rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: How to express the second occurrence of ጽድቅ in the clause about his days
  chosen_reading: Rendered dynamically as 'righteousness shall prevail in his days'
  alternative_readings:
  - righteousness shall be in his days
  - righteousness shall come to be in his days
  rationale: A more literal rendering is possible, but in English it risks sounding wooden and obscure. 'Shall prevail' communicates the likely force of the clause while keeping righteousness central and avoiding interpretive overreach.
  doctrine_reference: 'Optimal equivalence: balanced formal/dynamic rendering with auditable rationale.'
