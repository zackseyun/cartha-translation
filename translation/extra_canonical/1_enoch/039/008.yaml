lexical_decisions:
- source_word: ህየ
  chosen: there
  alternatives:
  - in that place
  - here
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locative adverb introducing the visionary location. 'There' preserves the deictic force without over-specifying.
- source_word: ፈቀድኩ
  chosen: I desired
  alternatives:
  - I wished
  - I willed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys volition or desire. 'Desired' fits the contemplative, visionary tone better than the more wooden 'willed'.
- source_word: አኅድር
  chosen: to dwell
  alternatives:
  - to abide
  - to stay
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The infinitive expresses settled residence rather than a brief stay; 'dwell' preserves the elevated register and links naturally with the following 'dwelling-place'.
- source_word: ወፈተወት መንፈስየ
  chosen: and my spirit longed
  alternatives:
  - and my spirit desired
  - and my spirit delighted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates inclination or pleasure toward something. 'Longed' brings out the inward yearning of the visionary speaker and avoids flattening the emotional force.
- source_word: ለውእቱ ማኅደር
  chosen: for that dwelling-place
  alternatives:
  - for that habitation
  - for that abode
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ማኅደር denotes a place of dwelling or habitation. 'Dwelling-place' is clear modern English while retaining the concrete spatial imagery.
- source_word: ኮነ ክፍለየ
  chosen: my portion had been assigned
  alternatives:
  - my portion was
  - it became my lot
  - my share came to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ክፍል commonly means portion/share/lot. Rendering with 'had been assigned' makes explicit the implied apportioning sense in context, where Enoch speaks of a divinely fixed place.
- source_word: ቅድመ
  chosen: before
  alternatives:
  - formerly
  - in advance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used temporally here with the following clause, indicating prior determination rather than merely spatial presence.
- source_word: እስመ ከመዝ
  chosen: for thus
  alternatives:
  - because thus
  - for in this way
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the explanation for why that place is his portion. 'For thus' keeps the connective logic concise and elevated.
- source_word: ጸንዐ
  chosen: it was established
  alternatives:
  - it was fixed
  - it was made firm
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries the sense of firmness or establishment. 'Established' suits the theological idea of a divinely settled allotment.
- source_word: በእንቲአየ
  chosen: for me
  alternatives:
  - concerning me
  - on my behalf
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best taken here in a personal-reference sense tied to the establishment of Enoch's portion.
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Master of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a recurring divine title in the Parables. 'Lord of Spirits' preserves the established internal terminology of this section without importing later doctrinal phrasing.
