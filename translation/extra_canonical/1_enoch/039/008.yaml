theological_decisions:
- issue: Nature of Enoch's 'portion' in the heavenly scene
  chosen_reading: The verse speaks of a divinely assigned place or share for the seer in the heavenly dwelling.
  alternative_readings:
  - A more general statement that this place simply 'became' his portion without explicit assignment
  - A metaphorical statement about spiritual desire rather than an actual allotted dwelling
  rationale: The combination of 'dwelling-place,' 'my portion,' and 'it was established for me before the Lord of Spirits' points to an allotted heavenly place, while still preserving the visionary idiom rather than over-systematizing it.
  doctrine_reference: Preserve theological tension rather than resolve it; document ambiguity rather than flatten it.
