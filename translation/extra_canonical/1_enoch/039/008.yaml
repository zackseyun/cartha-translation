  from: there my portion had been assigned before
  to: there my portion was before
  rationale: 'The Ge''ez verb is simply ኮነ (konä, "was" or "became"). Translating it as "had been assigned" introduces a passive verbal action not present in the source, over-explaining the author''s simple statement that his portion "was" there beforehand. | Adjudicator: The reviewer is correct that the Ge''ez verb is simply ኮነ (konä, ''to be'' or ''to become''). The current rendering ''had been assigned'' introduces an interpretive passive verb that is not present in the so'
