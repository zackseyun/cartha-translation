translation:
  text: And my eyes saw in that place[a][him], and they blessed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: 'him'
    text: The object of 'blessed' is implied by the Ge'ez form, but the subject is not explicitly stated in this short line; the sense may be that heavenly beings there blessed him.
    reason: lexical_alternative
  - marker: a
    text: Or 'And my eyes saw there, in that place'.
    reason: previous_rendering
lexical_decisions:
- source_word: ትንዳየ
  chosen: my eyes
  alternatives:
  - the eyes of me
  - my sight
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is best taken as a first-person possessive expression referring to Enoch's eyes. Rendering it idiomatically as 'my eyes' preserves the visionary report without awkwardness.
- source_word: ርእዩ
  chosen: saw
  alternatives:
  - looked
  - beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the common verb 'to see.' 'Saw' is the plainest English equivalent and fits the report style of apocalyptic vision. 'Beheld' would sound more archaic than the project style prefers.
- source_word: በውእቱ መካን
  chosen: there, in that place
  alternatives:
  - in that place
  - at that location
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The phrase combines the preposition with a demonstrative and ''place.'' Keeping both adverbial force and the noun phrase reflects the emphatic localization of the vision: Enoch saw there, specifically in that place.'
- source_word: ባረክዎ
  chosen: they blessed [him]
  alternatives:
  - blessed him
  - praised [him]
  - gave blessing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is 'to bless,' but the subject is not explicit in this clipped line, and the object marker suggests a third-person masculine object. Because the immediate clause as transmitted does not state who 'they' are, the English keeps the plural verb and supplies the object in brackets for transparency.
