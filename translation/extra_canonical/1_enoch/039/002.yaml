translation:
  text: And in those days Enoch received books of zeal and wrath, and books of tumult
    and confusion; and mercy shall not be upon them, says the Lord of Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording in the middle of the verse is difficult in this witness.
      The pair rendered 'tumult and confusion' may also be understood more generally
      as disturbance, outcry, or disorder.
    reason: textual_variant
lexical_decisions:
- source_word: መዋዕል
  chosen: days
  alternatives:
  - times
  lexicon: Dillmann
  rationale: Standard temporal term; 'in those days' preserves the apocalyptic time
    formula without over-specifying.
- source_word: ነሥአ
  chosen: received
  alternatives:
  - took
  - lifted up
  lexicon: Dillmann
  rationale: In context with Enoch as object-recipient of books, 'received' fits better
    than the more literal 'took' and avoids implying theft or self-initiation.
- source_word: መጻሕፍተ
  chosen: books
  alternatives:
  - writings
  - scrolls
  lexicon: Dillmann
  rationale: Plural of 'book/writing'; 'books' is the most direct and readable rendering,
    while 'scrolls' would add material specificity not explicit in the Ge'ez.
- source_word: ቅንአት
  chosen: zeal
  alternatives:
  - jealousy
  - ardor
  lexicon: Dillmann
  rationale: The term can denote jealousy or zeal; here, paired with wrath in a judgment
    context, 'zeal' preserves divine fervor without narrowing to human envy.
- source_word: መዐት
  chosen: wrath
  alternatives:
  - anger
  - fury
  lexicon: Dillmann
  rationale: A strong judgment term; 'wrath' best matches apocalyptic judicial force.
- source_word: ጐጕአ
  chosen: tumult
  alternatives:
  - outcry
  - commotion
  lexicon: Dillmann
  rationale: The OCR form is difficult, but the semantic field appears to involve
    disturbance or uproar; 'tumult' preserves the apocalyptic atmosphere and pairs
    well with the following term.
- source_word: ሀውክ
  chosen: confusion
  alternatives:
  - disorder
  - panic
  lexicon: Dillmann
  rationale: Conveys disturbance and disarray; 'confusion' is broad enough to reflect
    the uncertain Ge'ez reading while retaining the sense of destabilizing judgment.
- source_word: ምሕረት
  chosen: mercy
  alternatives:
  - compassion
  - pity
  lexicon: Dillmann
  rationale: Standard rendering for divine mercy; important to preserve the judicial
    contrast with zeal and wrath.
- source_word: ኢይከውን ላዕሌሆሙ
  chosen: shall not be upon them
  alternatives:
  - will not be over them
  - shall not come upon them
  lexicon: Dillmann
  rationale: The prepositional phrase is retained fairly literally to preserve the
    solemn judgment formula.
- source_word: እግዚአ መናፈስት
  chosen: Lord of Spirits
  alternatives:
  - Lord of the spirits
  lexicon: Dillmann
  rationale: This is a recurring divine title in the Parables; 'Lord of Spirits' preserves
    the established title form and its elevated register.
