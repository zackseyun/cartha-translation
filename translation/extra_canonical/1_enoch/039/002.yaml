theological_decisions:
- issue: Nature of the listed 'books'
  chosen_reading: Enoch is said to receive revelatory books characterized by zeal,
    wrath, tumult, and confusion.
  alternative_readings:
  - The phrase could be taken as a single compounded description of one set of writings.
  - The difficult middle terms may point to lament or outcry rather than tumult/confusion.
  rationale: The repeated plural መጻሕፍተ supports multiple books/writings. Because the
    Parables are effectively Ge'ez-only here and the OCR is uncertain in the middle
    pair, the translation keeps the imagery broad and judicial rather than over-defining
    the contents.
  doctrine_reference: Preserve theological tension rather than resolve it; prefer
    transparent English plus footnote where uncertain.
- issue: Referent of 'them'
  chosen_reading: The pronoun refers to the judged opponents in the surrounding context,
    not to the books.
  alternative_readings:
  - A grammatically looser reading could attach the pronoun to the immediately preceding
    items, but this makes poor sense in context.
  rationale: The closing clause 'mercy shall not be upon them' functions as a judgment
    oracle and naturally points to persons under sentence, consistent with the surrounding
    apocalyptic discourse.
  doctrine_reference: Original-language primacy with context-sensitive interpretation.
