translation:
  text: In those days I praised and exalted the name of the Lord of Spirits with blessing
    and with praise, because he has strengthened me with blessing and with praise,
    according to the will of the Lord of Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made me firm' / 'established me.' The Ge'ez verb can carry the sense
      of strengthening or making steadfast.
    reason: lexical_alternative
  - marker: b
    text: Or 'he has strengthened me with blessing and with praise'.
    reason: previous_rendering
lexical_decisions:
- source_word: በውእቱን መዋዕል
  chosen: In those days
  alternatives:
  - At that time
  - In those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula. 'In those days' preserves the
    elevated visionary register and recurring Enochic phrasing better than the more
    generic 'at that time.'
- source_word: ሰባሕኩ
  chosen: I praised
  alternatives:
  - I glorified
  - I gave praise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward first-person perfect/past sense. 'Praised' is natural
    English and pairs well with the following verb without over-intensifying.
- source_word: ወአልዐልኩ ስሞ
  chosen: and exalted the name
  alternatives:
  - and magnified the name
  - and lifted up his name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom concerns honoring the divine name. 'Exalted the name' preserves
    the concrete biblical idiom without flattening it into a generic statement of
    worship.
- source_word: ለእግዚአ መናፍስት
  chosen: of the Lord of Spirits
  alternatives:
  - of the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed Enochic divine title. 'Lord of Spirits' preserves the
    established title-form and avoids making it sound like a mere descriptive phrase.
- source_word: በረከተ ወስብሐተ
  chosen: with blessing and with praise
  alternatives:
  - with blessing and praise
  - by blessing and praise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated prepositional rhythm is retained for solemnity. 'Blessing'
    here is the act of blessing/speaking blessing, not a bestowed benefit.
- source_word: እስመ
  chosen: because
  alternatives:
  - for
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the reason for Enoch's praise. 'Because' is clear modern English
    while preserving the causal force.
- source_word: አጽንዐኒ
  chosen: he has strengthened me
  alternatives:
  - he made me firm
  - he established me
  - he confirmed me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys making firm or strengthening. 'He has strengthened me'
    fits the devotional context and avoids the more technical 'established me,' while
    preserving divine enablement rather than mere emotional encouragement.
- source_word: በበረከት ወስብሐት
  chosen: with blessing and with praise
  alternatives:
  - in blessing and in praise
  - by blessing and praise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The second occurrence is rendered consistently with the first to preserve
    the verse's deliberate repetition.
- source_word: በከመ ፈቃዱ
  chosen: according to the will
  alternatives:
  - as was his will
  - according to his good pleasure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This expresses conformity to divine volition. 'According to the will'
    is transparent and avoids importing later doctrinal phrasing such as 'good pleasure'
    unless the context requires it.
