theological_decisions:
- issue: Meaning of the repeated 'blessing and praise' phrases
  chosen_reading: They describe the mode or sphere of Enoch's worship and divine strengthening,
    not necessarily material blessings bestowed on him.
  alternative_readings:
  - The phrase could be taken as 'with blessedness and glory' in a more stative sense.
  - It could be read more dynamically as God empowering Enoch to bless and praise.
  rationale: The Ge'ez repetition most naturally preserves liturgical/worship language.
    Retaining 'blessing and praise' keeps the theological focus on doxology rather
    than prosperity or reward.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity rather than paraphrase.
- issue: Rendering the divine title እግዚአ መናፍስት
  chosen_reading: Lord of Spirits
  alternative_readings:
  - Lord of the spirits
  rationale: The title is characteristic of 1 Enoch and should be preserved as a title
    rather than normalized into a generic phrase. This maintains the text's own theological
    diction without harmonizing to later formulas.
  doctrine_reference: Original-language primacy over translation tradition; consistency
    of key terms, or documented exception.
