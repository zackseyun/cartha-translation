translation:
  text: And in those days a whirlwind of winds carried me away from the face of the
    earth and set me down at the end of the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the extremity of the heavens.' The Ge'ez expression refers to the outer
      boundary or farthest limit in the visionary cosmos.
    reason: lexical_alternative
lexical_decisions:
- source_word: መዋዕል
  chosen: days
  alternatives:
  - time
  - period
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The common temporal expression በውእቱ መዋዕል is best rendered 'in those days,'
    preserving the apocalyptic narrative formula rather than reducing it to a vague
    'at that time.'
- source_word: መሠጠኒ
  chosen: carried me away
  alternatives:
  - lifted me up
  - snatched me away
  - took me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates forceful movement of the speaker by an external power.
    'Carried me away' fits the visionary transport context without overcommitting
    to vertical motion alone.
- source_word: ዐውሎ ነፋሳት
  chosen: a whirlwind of winds
  alternatives:
  - a storm-wind
  - a whirlwind
  - winds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled imagery intensifies the phenomenon. 'A whirlwind of winds'
    preserves the apocalyptic force and avoids flattening the phrase into a generic
    'wind.'
- source_word: እምገጸ ሰምድር
  chosen: from the face of the earth
  alternatives:
  - from the earth
  - from the surface of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom literally includes 'face,' a common Semitic-style expression
    for the earth's surface. Retaining 'face of the earth' preserves the elevated
    register and imagery.
- source_word: አንበረኒ
  chosen: set me down
  alternatives:
  - placed me
  - made me dwell
  - caused me to sit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this transport scene the sense is placement at a destination. 'Set
    me down' is vivid and natural in English while reflecting the completed relocation.
- source_word: ጽንፈ ሰማያት
  chosen: the end of the heavens
  alternatives:
  - the extremity of the heavens
  - the edge of heaven
  - the ends of the heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes an extremity or boundary. 'The end of the heavens' preserves
    the cosmic geography of apocalyptic vision without overinterpreting whether singular
    or plural nuance should dominate in English.
