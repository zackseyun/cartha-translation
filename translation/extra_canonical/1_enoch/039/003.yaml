theological_decisions:
- issue: Cosmic geography in visionary transport
  chosen_reading: the end of the heavens
  alternative_readings:
  - the edge of heaven
  - the extremity of the heavens
  rationale: The verse depicts apocalyptic ascent/translation into the cosmic boundary
    region. The translation preserves the text's spatial imagery rather than domesticating
    it into a generic heavenly experience.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic language
    into generic religious prose.
