translation:
  text: And it will happen in those days that the chosen and holy ones will descend
    from the high heaven, and their offspring will become one with the children of
    men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sons of the chosen and holy ones.' The Ge'ez filial term can be rendered
      either way; 'children' is chosen here to avoid unnecessarily restricting the
      group to males.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'from the high heaven' indicates heavenly origin, but this verse
      alone does not fully identify who the 'chosen and holy ones' are.
    reason: cultural_note
  - marker: c
    text: Or 'their seed will be one with the children of men.' The line likely describes
      some form of union or mingling, but the exact nuance is left unstated in the
      Ge'ez wording here.
    reason: lexical_alternative
  - marker: d
    text: Or 'And in those days the children of the chosen and holy ones will descend'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይከውን
  chosen: will be / will happen
  alternatives:
  - shall be
  - will come to pass
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common Ge'ez existential/future verb introducing the scene; rendered
    idiomatically as 'in those days ... will' rather than woodenly repeating 'it will
    be.'
- source_word: በዝኩ መዋዕል
  chosen: in those days
  alternatives:
  - at that time
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard apocalyptic temporal formula; 'in those days' preserves the
    elevated visionary register and recurring eschatological cadence.
- source_word: ይወርዱ
  chosen: will descend
  alternatives:
  - will come down
  - will go down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the vertical heavenly imagery central to apocalyptic narrative;
    'descend' is more fitting than the flatter 'come down.'
- source_word: ደቂቅ
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A filial/plural term. 'Children' avoids over-specifying male referents
    while preserving descent language.
- source_word: ኅሩያን
  chosen: chosen
  alternatives:
  - elect
  - selected
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Chosen'' is the most transparent English equivalent and fits the project''s
    default handling of this theological term without importing later doctrinal freight.'
- source_word: ቅዱሳን
  chosen: holy ones
  alternatives:
  - saints
  - holy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural substantive is best preserved as 'holy ones'; 'saints' would import
    later Christian ecclesial associations not demanded by the passage.
- source_word: እምልዑል ሰማይ
  chosen: from the high heaven
  alternatives:
  - from the highest heaven
  - from heaven above
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks exalted heavenly origin. 'High heaven' preserves the
    singular Ge'ez wording and apocalyptic tone without over-interpreting cosmology.
- source_word: አሐደ ይከውን
  chosen: will become one
  alternatives:
  - will be one
  - will unite
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresses union or becoming one. 'Will become one' preserves the verbal
    force better than the more interpretive 'will unite.'
- source_word: ዘርኦሙ
  chosen: their offspring
  alternatives:
  - their seed
  - their descendants
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Seed'' is formally possible, but ''offspring'' communicates lineage
    clearly in modern English while retaining the generational sense.'
- source_word: ምስለ ውሉደ ሰብእ
  chosen: with the children of men
  alternatives:
  - with the sons of men
  - with human beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the traditional apocalyptic anthropological phrase. 'Children
    of men' is elevated yet understandable, and avoids flattening the contrast between
    heavenly and human lines.
