theological_decisions:
- issue: Identity of 'the chosen and holy ones'
  chosen_reading: Rendered as a heavenly group whose 'children' descend from heaven,
    without specifying whether they are angels, the righteous, or another exalted
    class.
  alternative_readings:
  - angels/elect angels
  - the righteous and holy human community
  - a mixed or symbolic heavenly company
  rationale: The immediate wording speaks of descent 'from the high heaven,' which
    favors a heavenly referent, but the Ge'ez-only state of the Parables counsels
    restraint. The translation preserves the title language rather than resolving
    the identity in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of 'their offspring will become one with the children of men'
  chosen_reading: Rendered as intermingling or union ('will become one with') rather
    than explicitly sexual marriage language.
  alternative_readings:
  - their seed will mingle with humanity
  - their descendants will be joined to humankind
  - their offspring will mate with the children of men
  rationale: The Ge'ez wording states becoming one with human beings but does not
    itself specify the mechanism. Given the Watchers background, sexual union may
    be implied, but the verse alone does not require that stronger wording.
  doctrine_reference: Original-language primacy over translation tradition; do not
    paraphrase beyond the witness.
