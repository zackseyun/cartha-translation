theological_decisions:
- issue: Rendering of ኄሩያን in a theologically loaded apocalyptic context
  chosen_reading: the chosen
  alternative_readings:
  - the elect
  rationale: Because the Parables use chosen/elect language heavily, 'the chosen'
    preserves the category without importing later systematic-theology associations
    more strongly than the Ge'ez itself requires.
  doctrine_reference: 'Translation philosophy: preserve local passage meaning and
    avoid over-harmonizing with later Christian usage.'
- issue: Meaning of the final double clause about righteousness and uprightness before
    God
  chosen_reading: And righteousness does not fail before him, and uprightness does
    not fail before him
  alternative_readings:
  - And righteousness does not pass away before him, and truth/uprightness does not
    pass away before him
  rationale: The repeated negative verb likely expresses enduring permanence in God's
    presence. 'Does not fail' is readable modern English while preserving the claim
    that these qualities remain unextinguished before him.
  doctrine_reference: 'Translation philosophy: optimal equivalence with preserved
    theological tension where wording is ambiguous.'
