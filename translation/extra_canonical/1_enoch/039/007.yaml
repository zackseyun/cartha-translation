translation:
  text: And I saw the dwelling-place beneath the wings of the Lord of Spirits; and
    all the righteous and the chosen shone before him like the light of fire, and
    their mouths were filled with blessing, and their lips praised the name of the
    Lord of Spirits. And righteousness does not fail before him, and uprightness does
    not fail before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the elect' for 'the chosen.'
    reason: lexical_alternative
  - marker: b
    text: The final repeated verb can also be rendered 'does not perish,' 'does not
      pass away,' or 'does not come to an end.'
    reason: lexical_alternative
  - marker: c
    text: The image 'beneath the wings' is kept literal to preserve the visionary
      symbolism of shelter and nearness to the Lord of Spirits.
    reason: cultural_note
lexical_decisions:
- source_word: ማኅደረ
  chosen: dwelling-place
  alternatives:
  - dwelling
  - habitation
  - abode
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes a place of dwelling or habitation. 'Dwelling-place'
    preserves the concrete visionary locale without sounding overly archaic.
- source_word: መትሕተ
  chosen: beneath
  alternatives:
  - under
  - below
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward spatial preposition. 'Beneath' fits the elevated register
    and preserves the image of shelter under wings.
- source_word: አክናፈ
  chosen: wings
  alternatives:
  - pinions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The apocalyptic image of protective wings should be kept literal, not
    reduced to a metaphor like 'protection.'
- source_word: እግዚአ መናፍስት
  chosen: Lord of Spirits
  alternatives:
  - Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a recurring title in 1 Enoch. 'Lord of Spirits' is the established
    literal sense and preserves the text's own theological diction.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term regularly denotes the righteous as a class. 'The righteous'
    is both natural English and consistent with key-term handling.
- source_word: ኄሩያን
  chosen: the chosen
  alternatives:
  - the elect
  - the select ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term refers to those chosen or elect. 'The chosen' avoids later doctrinal
    freight attached to 'elect' while preserving the local apocalyptic category.
- source_word: ይትሰሐዩ
  chosen: shone
  alternatives:
  - were radiant
  - gleamed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys shining or radiance. 'Shone' is concise and keeps the
    visionary brightness without interpretive expansion.
- source_word: ከመ ብርሃነ እሳት
  chosen: like the light of fire
  alternatives:
  - like fiery light
  - like the brightness of fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A fairly literal rendering preserves the unusual comparison. 'Like the
    light of fire' keeps the image distinct rather than smoothing it into a generic
    'brightly.'
- source_word: አፉሆሙ ይመልእ በረከተ
  chosen: their mouths were filled with blessing
  alternatives:
  - their mouths were full of blessing
  - their mouths were filled with praise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text speaks specifically of blessing, not merely praise. Singular
    'blessing' works as a collective abstract in English.
- source_word: ከናፍሪሆሙ ይሴብሑ
  chosen: their lips praised
  alternatives:
  - their lips glorified
  - their lips blessed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is one of praise. Retaining 'lips' rather than substituting
    'they' preserves the poetic parallelism with 'mouths.'
- source_word: ጽድቅ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the abstract quality standing before God is best rendered
    'righteousness.' 'Justice' is possible but less fitting in this paired moral description.
- source_word: ወርትዕ
  chosen: uprightness
  alternatives:
  - rectitude
  - what is right
  - truth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired abstract with 'righteousness' likely denotes straightness
    or moral rightness. 'Uprightness' preserves the ethical nuance and parallelism.
- source_word: ኢየኃልቅ
  chosen: does not fail
  alternatives:
  - does not perish
  - does not come to an end
  - does not vanish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can denote perishing or coming to an end. In this moral-theological
    context, 'does not fail' communicates enduring validity before God while remaining
    close to the sense of not passing away.
