translation:
  text: And after this law I saw another law for the lesser light, whose name is the
    moon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ordinance' or 'order' for both occurrences of 'command'; the Ge'ez term
      can denote a prescribed arrangement or directive.
