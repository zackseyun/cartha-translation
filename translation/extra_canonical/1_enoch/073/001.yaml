lexical_decisions:
- source_word: ወድኅሬሁ
  chosen: And after this
  alternatives:
  - And afterward
  - And after it
  lexicon: Dillmann
  rationale: Temporal transition formula linking this unit to the preceding solar
    ordinance; 'after this' is natural English while preserving sequence.
- source_word: ትእዛዝ
  chosen: command
  alternatives:
  - ordinance
  - order
  - regulation
  lexicon: Dillmann
  rationale: The noun appears twice in the verse and likely denotes a prescribed cosmic
    arrangement. 'Command' preserves the sense of an imposed directive without over-specifying
    legal or cultic nuance. Because repetition is present in the Ge'ez, it is retained
    in English.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann
  rationale: Straightforward visionary report; 'I saw' is clear modern English and
    preserves the apocalyptic first-person observation.
- source_word: ካልአ
  chosen: another
  alternatives:
  - a second
  lexicon: Dillmann
  rationale: Marks a further corresponding ordinance after the previous one; 'another'
    is the most idiomatic rendering here.
- source_word: ለብርሃን ንኡስ
  chosen: for the lesser light
  alternatives:
  - concerning the lesser luminary
  - for the smaller light
  lexicon: Dillmann
  rationale: The phrase identifies the moon by its status relative to the sun. 'Lesser
    light' preserves the cosmic imagery and echoes ordinary luminary language without
    importing later doctrinal phrasing.
- source_word: ዘስሙ
  chosen: whose name is
  alternatives:
  - which is named
  - its name being
  lexicon: Dillmann
  rationale: Relative construction introducing the identification of the luminary.
- source_word: ወርኅ
  chosen: the moon
  alternatives:
  - moon
  lexicon: Dillmann
  rationale: Standard Ge'ez term for the moon. The article is supplied in English
    for naturalness in apposition to 'the lesser light'.
