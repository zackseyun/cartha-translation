  category: mistranslation
  tier: 2
  from: when it becomes dark, its light amounts to
  to: when its light is full, it amounts to
  rationale: 'The verb ይፄሪ (from ጸረየ, ṣaraya) means ''to be clear, bright, pure,'' not ''to become dark.'' In Enochic astronomy, this describes the moon when its light is full (Dillmann explicitly cites 1 En 73:3 for this sense: ''de lunae lumine aequabili et pleno''). The draft reverses the astronomical meaning: the moon''s light is 1/7th of the sun''s when it is full, not when it is dark. The phrase ከዊነ፡ ብርሃኑ (''the being of its light'') functions as the subject of ይፄሪ.'
