translation:
  text: And in every month its going out and its returning vary, and its days are like the days of the sun; and when its light is full, it amounts to a seventh part of the light of the sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verse speaks of a luminary's cyclical 'going out' and 'returning,' likely technical or semi-technical astronomical language for its course. More interpretive renderings such as 'rising' and 'setting' are possible but not certain from the Ge'ez alone.
    reason: lexical_alternative
  - marker: b
    text: The darkening language likely refers to the moon's waning light in comparison with the sun, here quantified as one-seventh.
    reason: cultural_note
  - marker: c
    text: Or 'when it becomes dark, its light amounts to'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሙፃኢሁ
  chosen: its going out
  alternatives:
  - its خروج/exit
  - its rising
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes an exit or going forth. In the Astronomical Book this fits the luminary's point or manner of emergence rather than specifically 'rising,' which would over-specify the image.
- source_word: ምብዋኢሁ
  chosen: its returning
  alternatives:
  - its entrance
  - its setting
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with 'going out,' the term likely denotes return/entry. 'Setting' is possible in astronomical context, but 'returning' better preserves the formal parallelism of the Ge'ez.
- source_word: ይትዌለጥ
  chosen: vary
  alternatives:
  - change
  - are distinguished
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates alteration or differentiation. 'Vary' gives clear English while preserving the observational, calendrical sense.
- source_word: መዋዕሊሁ
  chosen: its days
  alternatives:
  - its appointed days
  - the length of its days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The straightforward sense is 'days.' In context this likely concerns the counted days of the luminary's cycle, but the simple rendering is preferable in the main text.
- source_word: ከመ መዋዕለ ፀሐይ
  chosen: like the days of the sun
  alternatives:
  - equal to the days of the sun
  - according to the days of the sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison marker ከመ naturally yields 'like/as.' This preserves the comparison without forcing a more interpretive calendrical statement.
- source_word: ይፄሪ
  chosen: it becomes dark
  alternatives:
  - it wanes
  - it is diminished
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of lunar luminosity, the verb points to darkening or waning. 'Becomes dark' preserves the visual imagery and avoids importing a technical astronomical term not explicit in the Ge'ez.
- source_word: ከዊነ ብርሃኑ ይከውን
  chosen: its light amounts to
  alternatives:
  - its light becomes
  - its light is
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated form of 'to be/become' marks resultant state. 'Amounts to' expresses the quantitative comparison that follows.
- source_word: ሳብዓደ እደ
  chosen: a seventh part
  alternatives:
  - one-seventh
  - the seventh measure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally includes 'seventh' with a measure/part expression. 'A seventh part' is idiomatic and preserves the fractional sense.
- source_word: እምብርሃነ ፀሐይ
  chosen: of the light of the sun
  alternatives:
  - from the sun's light
  - than the light of the sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks source or comparison. 'Of the light of the sun' works naturally with 'a seventh part' and keeps the genitival relation transparent.
