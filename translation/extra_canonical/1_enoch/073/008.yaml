lexical_decisions:
- source_word: ይሠርቅ
  chosen: turns back
  alternatives:
  - returns
  - recedes
  - goes back
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book's schematic movement language, the verb appears to denote reversal/return in the luminary's course rather than 'steal' or another unrelated sense. 'Turns back' preserves the sense of directional change in elevated but readable English.
- source_word: በይእቲ
  chosen: by that
  alternatives:
  - through that
  - in that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition with the demonstrative points to a specific previously described gate/opening. 'By that' is concise in English, while the footnote preserves the possible spatial nuance 'through that'.
- source_word: ዕለት ሳብዐተ
  chosen: seventh day
  alternatives:
  - day seven
  - the seventh day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the temporal marker in the recurring calendrical sequence. 'Seventh day' is natural English and keeps the schematic counting pattern.
- source_word: እደ ጥንቁቀ
  chosen: eastern opening
  alternatives:
  - eastern gate
  - that eastern portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase likely points to one of the numbered openings/gates of the horizon in the Astronomical Book. Because the OCR is somewhat uncertain and the exact noun is difficult, 'opening' is a cautious rendering that preserves the cosmological imagery without overcommitting to 'gate' in the main text.
- source_word: ይወፅእ
  chosen: he goes out
  alternatives:
  - he comes out
  - he emerges
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard motion verb for exiting/emerging. 'Goes out' fits the repeated astronomical description of the luminary's movement through the horizon openings.
