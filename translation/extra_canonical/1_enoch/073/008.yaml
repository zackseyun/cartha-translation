theological_decisions:
- issue: Referent of the masculine verbs
  chosen_reading: Render with singular masculine 'he,' referring to the luminary described in context (the moon in this section's sequence).
  alternative_readings:
  - Use 'it' for an impersonal celestial body
  - Leave the subject implicit
  rationale: The Ge'ez verbal forms are masculine singular, and the Astronomical Book often personifies celestial bodies in patterned motion reports. Retaining 'he' preserves the text's idiom and apocalyptic-cosmological style rather than flattening it into modern impersonal description.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic imagery into generic modern prose.
