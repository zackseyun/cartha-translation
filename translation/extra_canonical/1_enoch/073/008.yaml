  to: And on that day it rises with exactly seven parts, and it comes out.
  rationale: 'The draft completely misidentifies the vocabulary. ይሠርቅ (śaraqa) means ''it rises'' (of celestial bodies), not ''turns back''. በይእቲ ዕለት means ''on that day''. ሳብዐተ እደ means ''seven parts'' (እደ is the plural of እዴ ''hand/portion''), not ''seventh day'' or ''eastern''. ጥንቁቀ means ''exactly'' or ''precisely'', not ''opening''. The text describes the moon rising with exactly seven parts of light. | Adjudicator: The reviewer is entirely correct about the Ge''ez vocabulary. The verb `śaraqa` (ይሠርቅ) means ''to rise'' (specifically of celestial bodies), not ''to turn back.'' The phrase `ba-ye''eti ''elat` means ''on tha'
