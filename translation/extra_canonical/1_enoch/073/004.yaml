translation:
  text: 'And in this way it rises, and its head, which is toward the east, comes out on the thirtieth morning, and on that day it becomes visible, and it shall be for you the head of the month: on the thirtieth day with the sun, in the gate from which the sun comes out.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the beginning of the month.' The Ge'ez reads literally 'the head of the month,' a concrete idiom for the month's commencement.
    reason: lexical_alternative
  - marker: b
    text: The 'gate' is part of the Astronomical Book's recurring picture of heavenly bodies emerging through ordered portals of the sky.
    reason: cultural_note
  - marker: c
    text: Or 'And in this way it is hidden'.
    reason: previous_rendering
  - marker: d
    text: Or 'and its head is toward the east; it comes out'.
    reason: previous_rendering
  - marker: e
    text: Or 'thirty days'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይሠርቅ
  chosen: it is hidden
  alternatives:
  - it is concealed
  - it withdraws
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb here most naturally conveys being hidden or concealed rather than theft in this context. In the Astronomical Book, luminary movements are described in terms of appearing and disappearing, so 'it is hidden' preserves the observational/cosmic sense.
- source_word: ርእሱ
  chosen: its head
  alternatives:
  - its beginning
  - its front
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'its head.' In astronomical description this can denote the leading part or starting point. I retain the concrete image 'head' rather than abstracting it away, since the book often uses bodily/spatial imagery for celestial motions.
- source_word: ዘመንገለ ጽባሕ
  chosen: toward the east
  alternatives:
  - in the direction of the east
  - toward the sunrise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the direction of morning/east. 'Toward the east' is idiomatic English while preserving the spatial orientation tied to sunrise.
- source_word: በሠላሳ ጽባሕ
  chosen: on the thirtieth morning
  alternatives:
  - after thirty mornings
  - at the thirtieth dawn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is best taken temporally, marking the thirtieth morning/dawn in the cycle. 'On the thirtieth morning' is clear and close to the Ge'ez.
- source_word: ያስተርኢ
  chosen: it becomes visible
  alternatives:
  - it appears
  - it shows itself
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The causative form can mean 'make visible' or 'show.' In context of the moon's phase/appearance, English idiom favors 'it becomes visible,' which captures the observational result without over-paraphrasing.
- source_word: ርእሰ ወርኅ
  chosen: the head of the month
  alternatives:
  - the beginning of the month
  - the first of the month
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'head of the month.' Because this phrase is calendrical, 'beginning of the month' is possible, but I preserve 'head' in the main text to reflect the source imagery and the technical feel of the luminary discourse.
- source_word: ሠላሳ ዕለት
  chosen: thirty days
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward numeral plus noun; no reason to depart from the literal sense.
- source_word: ምስለ ፀሐይ
  chosen: with the sun
  alternatives:
  - along with the sun
  - together with the sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition indicates association. 'With the sun' is concise and preserves the calendrical coordination between moon and sun.
- source_word: በኆኅት
  chosen: in the gate
  alternatives:
  - through the gate
  - at the gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Astronomical Book repeatedly describes heavenly bodies using gate imagery. 'In the gate' keeps that cosmological picture intact rather than reducing it to a generic horizon reference.
- source_word: እንተ ይወፅእ ፀሐይ
  chosen: from which the sun comes out
  alternatives:
  - where the sun goes forth
  - through which the sun emerges
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative clause identifies the specific gate by the sun's emergence. 'Comes out' is plain English and preserves the concrete movement imagery.
