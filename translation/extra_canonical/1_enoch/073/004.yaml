theological_decisions:
- issue: Whether to normalize the calendrical phrase into modern astronomical language
  chosen_reading: Retain concrete cosmological imagery such as 'head,' 'gate,' and the sun's 'coming out.'
  alternative_readings:
  - Render as 'new moon,' 'eastern horizon,' and 'sunrise point'
  rationale: The Astronomical Book presents a revealed cosmological system in its own idiom. Recasting it into modern astronomical terminology would flatten the text's apocalyptic-scientific imagery and obscure its literary world.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten cosmic language into generic modern prose.'
