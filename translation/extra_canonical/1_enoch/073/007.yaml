translation:
  text: And it sets with the sun; and when the sun rises, the moon rises with it and takes half a portion of light. And on that night, at the beginning of its morning, before the day of the moon, the moon sets with the sun and is dark through that night—seven parts and a half.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording is difficult in the middle of the verse, especially around 'at the beginning of its morning, before the day.' The translation keeps the temporal sequence fairly literal rather than smoothing it into a modern astronomical explanation.
    reason: textual_variant
  - marker: b
    text: The chapter repeatedly measures lunar light in numbered 'parts.' The phrase rendered 'half a portion of light' likely refers to that same system of fractional illumination.
    reason: cultural_note
  - marker: c
    text: Or 'before the day, the moon sets'.
    reason: previous_rendering
lexical_decisions:
- source_word: የዓርብ
  chosen: sets
  alternatives:
  - goes down
  - descends
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this astronomical context the verb refers to the setting of a luminary. 'Sets' is idiomatic English for celestial motion and preserves the technical sense.
- source_word: ይሠርቅ
  chosen: rises
  alternatives:
  - appears
  - comes forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repeated of sun and moon in contrast with setting language; 'rises' best matches astronomical usage in English.
- source_word: ምስሌሁ
  chosen: with it
  alternatives:
  - with him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The referent is the sun as a luminary, not a personal male figure in context, so neutral English is preferable.
- source_word: ይነሥእ
  chosen: takes
  alternatives:
  - receives
  - lifts up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The moon is described as acquiring a measured amount of light. 'Takes' keeps the concrete verbal force without overinterpreting mechanism.
- source_word: መንፈቀ እደ ብርሃን
  chosen: half a portion of light
  alternatives:
  - half a measure of light
  - half of a part of light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase combines 'half' with a part/measure term and 'light.' Because the chapter uses numbered parts for lunar illumination, 'half a portion of light' preserves the measured imagery.
- source_word: በርእሰ ጽባሐ ዚአሁ
  chosen: at the beginning of its morning
  alternatives:
  - at the head of its dawn
  - at the start of that dawn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'at the head of its morning/dawn.' The idiom marks the onset of dawn; 'beginning' is readable while retaining the temporal image.
- source_word: በቅድመ ዕለቱ
  chosen: before the day
  alternatives:
  - before its day
  - before daytime
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A temporal phrase indicating the period before full daybreak. 'Before the day' is slightly literal and suits the astronomical sequence.
- source_word: ይጸልም
  chosen: is dark
  alternatives:
  - grows dark
  - is obscured
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes darkness/obscuration. 'Is dark' preserves the state described without adding explanatory astronomy.
- source_word: ፯ሳብዓተ እደ ወንፍቃ
  chosen: seven parts and a half
  alternatives:
  - seven and a half parts
  - seven portions and a half
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse closes with the standard luminary-measure language of this chapter. 'Seven parts and a half' keeps the counted-unit imagery explicit.
