theological_decisions:
- issue: Whether to render the luminary's motion in mechanistic modern terms
  chosen_reading: Retain cosmic imagery with 'circuit' and 'chariots' rather than
    modernizing to 'orbit' or 'pathways.'
  alternative_readings:
  - its orbit ... its vehicles
  - its course ... its motions
  rationale: The Astronomical Book presents ordered celestial movement in visionary-cosmic
    language. Preserving that imagery respects genre and avoids importing modern scientific
    categories not explicit in the Ge'ez.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    flatten into generic modern prose.'
