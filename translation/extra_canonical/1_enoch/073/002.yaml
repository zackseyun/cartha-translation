translation:
  text: And its circuit is like the circuit of heaven, and its chariots, by which
    it goes out, are driven by the wind; and light is given to it by measure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause about the winds is difficult in the Ethiopic witness. The sense
      may be that its chariots proceed where the wind blows, or that they are driven
      along by winds.
    reason: textual_variant
  - marker: b
    text: Or 'according to measure' or 'by fixed measure.' The phrase emphasizes regulated,
      ordered distribution of light.
    reason: lexical_alternative
  - marker: c
    text: Or 'and its chariots are borne along by the winds'.
    reason: previous_rendering
lexical_decisions:
- source_word: ክበቡ
  chosen: its circuit
  alternatives:
  - its circumference
  - its course
  - its orbit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun from the root for encircling/circuiting most naturally denotes
    a round extent or course. In the Astronomical Book, a cosmic-motion sense is likely,
    but 'circuit' preserves both spatial and motion-related nuance without over-specifying
    modern astronomy.
- source_word: ከመ ክበበ ሰማይ
  chosen: like the circuit of heaven
  alternatives:
  - like the circumference of the sky
  - like heaven's circuit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal comparison is explicit. 'Heaven' is preferred over 'sky' because
    the Astronomical Book regularly speaks in cosmic-register language rather than
    ordinary weather description.
- source_word: ሰረገላተ ዚአሁ
  chosen: its chariots
  alternatives:
  - its wagons
  - its chariot-structures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural clearly evokes chariots/vehicles. Retaining 'chariots' preserves
    the apocalyptic-cosmic imagery and avoids flattening the image into generic conveyance
    language.
- source_word: በኀበ ይጼዓን ነፋስ ትነፍስ
  chosen: are borne along by the winds
  alternatives:
  - go forth toward the blowing wind
  - proceed where the wind blows
  - are driven by the wind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is textually difficult, but the repeated wind language strongly
    suggests motion effected by winds. 'Are borne along by the winds' gives a coherent
    English sense while preserving the imagery and avoiding overconfidence about the
    exact syntax.
- source_word: በመስፈርት
  chosen: by measure
  alternatives:
  - according to measure
  - in due proportion
  - by fixed measure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes measure, rule, or proportion. 'By measure' is concise
    and preserves the ordered, regulated character of the luminary's light in this
    section.
- source_word: ይትወሀብ ሎቱ ብርሃን
  chosen: light is given to it
  alternatives:
  - it receives light
  - light is granted to it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive verbal form is best preserved. 'Is given to it' keeps the
    sense of bestowed light rather than inherent self-generation, which fits the ordered
    cosmology of the passage.
