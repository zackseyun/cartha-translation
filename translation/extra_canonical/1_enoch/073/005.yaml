translation:
  text: And its distant half is one seventh part, and all its disk is empty, without
    light, except for a seventh part of it—a fourteenth part of its light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The numerical phrasing is difficult in the Ethiopic witness. The repeated
      term rendered 'parts' is literally 'hand,' but in this context it functions
      as a unit or portion in the luminary's measured cycle.
    reason: lexical_alternative
  - marker: b
    text: The verse appears to describe the moon's illuminated and darkened portions
      in the schematic style of the Astronomical Book rather than in modern scientific
      terms.
    reason: cultural_note
  - marker: c
    text: Or 'seven parts of one, and all its disk is empty of light except for seven
      parts of it—fourteen parts of its light.'.
    reason: previous_rendering
lexical_decisions:
- source_word: መንፈቀ
  chosen: half
  alternatives:
  - middle
  - midpoint
  - one side
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes a half or divided portion. In the lunar context of the
    Luminaries, 'half' best preserves the quantitative description without over-interpreting
    the astronomy.
- source_word: ርኁቅ
  chosen: distant
  alternatives:
  - far
  - remote
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered 'distant' to preserve the spatial/cosmic register of the astronomical
    description. 'Far' is possible but less elevated.
- source_word: ሳብዐተ እደ አሐደ
  chosen: seven parts of one
  alternatives:
  - one-seventh
  - seven portions of one measure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The expression is numerically difficult. Literally it speaks of 'seven'
    with 'hand/part' and 'one.' In this chapter እድ/እደ functions as a measure or part
    in describing lunar phases. 'Seven parts of one' keeps the wording transparent
    without forcing a more interpretive mathematical paraphrase.
- source_word: ኵሉ ክበበ ዚአሁ
  chosen: all its disk
  alternatives:
  - its whole circle
  - all its round form
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ክበብ is literally a circle or round form. In an astronomical context,
    'disk' is natural English and preserves the visible circular body of the luminary.
- source_word: ባክ
  chosen: empty of
  alternatives:
  - lacking
  - devoid of
  - without
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term marks privation or absence. 'Empty of' fits the image of the
    moon's disk lacking illumination.
- source_word: ዘአልቦ ብርሃነ
  chosen: empty of light
  alternatives:
  - without light
  - having no light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase describes the unilluminated portion. 'Empty of light' keeps
    the visual imagery stronger than the flatter 'without light.'
- source_word: ዘእንበለ
  chosen: except for
  alternatives:
  - apart from
  - save for
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward exceptive particle; 'except for' is clear modern English.
- source_word: ሳብዐተ እዴሁ
  chosen: seven parts of it
  alternatives:
  - its seven parts
  - seven portions of it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Again the measurement term likely refers to portions of the luminary.
    'Seven parts of it' keeps the syntax transparent and matches the repeated numerical
    style of the passage.
- source_word: ዐሠርተ ራብዐተ እደ ብርሃኑ
  chosen: fourteen parts of its light
  alternatives:
  - fourteen portions of its brightness
  - fourteen measures of its light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to total the illuminated measure. 'Light' is preferred
    over 'brightness' for consistency with ብርሃን elsewhere in the verse. The numerical
    expression is retained rather than normalized.
