  category: mistranslation
  tier: 3
  from: seven parts of one, and all its disk is empty of light except for seven parts
    of it—fourteen parts of its light.
  to: one seventh part, and all its disk is empty, without light, except for a seventh
    part of it—a fourteenth part of its light.
  rationale: 'The Astronomical Book''s lunar math divides the moon''s light into 14
    parts. On the first day, it is illuminated by 1/14th of its total light (which
    is 1/7th of its half). The Ge''ez phrases ''ሳብዐተ እደ'' and ''ዐሠርተ ራብዐተ እደ'' function
    as fractions here (''a seventh part'', ''a fourteenth part''). Translating them
    as ''seven parts'' and ''fourteen parts'' destroys the mathematical sense of the
    passage, implying the moon is fully illuminated (''fourteen parts'') when the
    text explicitly says it is empty except for t | Adjudicator: The reviewer is entirely
    correct regarding Ge''ez fractional syntax. In Ge''ez, fractions are formed using
    the ordinal number followed by ''እድ'' (''ed, literally ''hand'' but here ''part'').
    Thus, ''ሳብዐተ እደ'' me'
