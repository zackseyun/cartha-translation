theological_decisions:
- issue: Nature of the luminary description
  chosen_reading: Retain the verse as a technical-apocalyptic astronomical measurement
    rather than smoothing it into a generalized statement about waxing or waning.
  alternative_readings:
  - Paraphrase as a simple phase description of the moon
  - Normalize the numbers into modern fractional language
  rationale: The Astronomical Book uses repetitive measured language to describe celestial
    cycles. Preserving the counted 'parts' respects the text's own cosmological rhetoric
    and avoids importing modern explanatory astronomy.
  doctrine_reference: Translation philosophy §Original-language primacy; §Preserve
    theological tension rather than resolve it
