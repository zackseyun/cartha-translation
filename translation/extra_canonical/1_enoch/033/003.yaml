translation:
  text: And I saw how the stars of heaven come out, and I counted the portals from which they proceed; and I wrote down all their outlets, each one by itself, according to their number and their names, by their order and their activity and their times and their months, as Uriel, the holy angel who was with me, showed me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'openings' or 'portals' for 'mouths'; the Ge'ez keeps a vivid bodily image for the heavenly outlets.
    reason: lexical_alternative
  - marker: b
    text: The wording after 'and' is textually difficult in this OCR witness; the sense is that Enoch saw the places/openings from which the stars emerge and recorded them in ordered detail.
    reason: textual_variant
  - marker: c
    text: Or 'the mouths from which the stars of heaven come out, and the places from which they proceed'.
    reason: previous_rendering
lexical_decisions:
- source_word: አፎ
  chosen: mouths
  alternatives:
  - openings
  - portals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The literal sense 'mouths' fits apocalyptic cosmological imagery and should be preserved rather than flattened to a purely architectural term. A footnote can note 'openings/portals' as an interpretive alternative.
- source_word: ይወጽኡ / ይወፅኡ
  chosen: come out / proceed
  alternatives:
  - go forth
  - emerge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs describe stellar emergence from cosmic openings. Using two close English verbs preserves the repetitive structure without unnecessary stiffness.
- source_word: ከዋክብተ ሰማይ
  chosen: the stars of heaven
  alternatives:
  - the heavenly stars
  - the stars of the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the straightforward apocalyptic phrase; 'of heaven' preserves the elevated register and cosmic setting.
- source_word: ኍለቁ / ኀዋኅወ
  chosen: the places from which they proceed
  alternatives:
  - their gates
  - their windows
  - their exits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR is difficult here, but the sense is of locations/openings associated with the stars' emergence. 'Places from which they proceed' is transparent and avoids overcommitting to a more specific architectural image not fully secure from the witness alone.
- source_word: ጸሐፍኩ ኵሎ ሙፃኣቲሆሙ
  chosen: I wrote down all their outlets
  alternatives:
  - I recorded all their goings out
  - I wrote all their departures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun built on 'going out' likely refers to points or acts of emergence. 'Outlets' captures the cosmological sense while remaining readable; the more literal 'goings out' is preserved as an alternative.
- source_word: ለለ፩፩
  chosen: each one by itself
  alternatives:
  - one by one
  - individually
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This distributive expression emphasizes individual accounting of the stars' courses. 'Each one by itself' preserves that force clearly.
- source_word: በኍልቆሙ
  chosen: according to their number
  alternatives:
  - by their number
  - in their number
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase marks ordered enumeration, fitting the astronomical cataloging theme.
- source_word: እስማቲሆሙ
  chosen: their names
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct rendering is best; the text stresses named cosmic order.
- source_word: በደርጎሙ
  chosen: by their order
  alternatives:
  - according to their rank
  - by their arrangement
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term likely denotes sequence, arrangement, or rank within the heavenly system. 'Order' is broad enough to preserve the ambiguity.
- source_word: ወምገባሮሙ
  chosen: their activity
  alternatives:
  - their workings
  - their functions
  - their deeds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this astronomical context the word points to what the stars do or how they operate. 'Activity' is natural English without reducing the technical-cosmic nuance.
- source_word: ወጊዜሆሙ
  chosen: their times
  alternatives:
  - their seasons
  - their appointed times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The stars are being cataloged by temporal regularity. 'Times' is the most neutral rendering; 'appointed times' is possible but slightly more interpretive.
- source_word: ወአውራኂሆሙ
  chosen: their months
  alternatives:
  - their lunar months
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary sense 'months' fits the astronomical context and should be retained.
- source_word: አርአየኒ
  chosen: showed me
  alternatives:
  - made me see
  - revealed to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is visual and visionary. 'Showed me' preserves the immediate revelatory scene.
- source_word: ኡርኤል መልአክ ዘምስሌየ ቅዱስ
  chosen: Uriel, the holy angel who was with me
  alternatives:
  - Uriel, the angel who was with me, the holy one
  - Uriel, the holy messenger who was with me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies Uriel as the accompanying holy angel. 'Angel' is the expected rendering for መልአክ in this apocalyptic setting; 'holy' is retained as an adjective rather than turned into a title.
