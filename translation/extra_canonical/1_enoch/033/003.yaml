  from: the mouths from which the stars of heaven come out, and the places from which they proceed
  to: how the stars of heaven come out, and I counted the portals from which they proceed
  rationale: 'Two major lexical errors here. First, ''አፎ'' (afo) is the adverb ''how'', not the plural of ''mouth'' (which would be አፈው). The text says ''I saw how the stars come out''. Second, ''ኀዋኅወ'' (ḫawāḫwə) is the accusative plural of ኆኅት, meaning ''gates'' or ''portals'', a specific architectural term in Enochic cosmology, not generic ''places''. ''ኍለቁ'' (ḫʷəlaqu) here functions as the verb ''I counted'' (ኈለቍኩ), governing the accusative ''portals''. | Adjudicator: The reviewer is entirely correct on the Ge''ez lexicon. The word አፎ (afo) is the adverb ''how,'' not the plural of ''mouth'' (which would be አፈው, afaw). The current translation completely misreads this. Fu'
