translation:
  text: And to the east of these beasts I saw the ends of the earth, whereon the heaven rests, and the open gateways of heaven. I saw the ends of the earth, whereon the heaven rests, and the open gateways of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the extremities of the earth.' The Ge'ez expression denotes the far limits or borders of the world.
    reason: lexical_alternative
  - marker: b
    text: The image assumes an ancient cosmology in which heaven has a resting place or support at the world's edge.
    reason: cultural_note
  - marker: c
    text: '''Gateways of heaven'' may also be rendered ''windows'' or ''openings'' of heaven, depending on how one construes the heavenly architecture.'
    reason: lexical_alternative
  - marker: d
    text: Or 'And beyond these'.
    reason: previous_rendering
lexical_decisions:
- source_word: ጽባሖሙ
  chosen: beyond these
  alternatives:
  - beside them
  - after them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of visionary travel, the term marks movement past previously described cosmic features rather than simple temporal sequence. 'Beyond these' preserves the spatial progression.
- source_word: እሉ
  chosen: these
  alternatives:
  - those
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward demonstrative referring back to the previously mentioned heavenly phenomena.
- source_word: አርዌ
  chosen: ends
  alternatives:
  - extremities
  - borders
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse describes cosmic limits in apocalyptic geography. 'Ends' is idiomatic in English and preserves the ancient-world image better than the more technical 'extremities.'
- source_word: አጽናፈ ምድር
  chosen: the ends of the earth
  alternatives:
  - the extremities of the earth
  - the borders of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This collocation is a standard cosmic-boundary expression. 'Ends of the earth' preserves the apocalyptic and cosmological imagery without flattening it.
- source_word: በኀበ
  chosen: whereon
  alternatives:
  - upon which
  - at which
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used here to connect the earth's extremity with the place of heaven's resting. 'Whereon' is slightly elevated but still readable and fits the visionary register.
- source_word: ሰማይ የዐርፍ
  chosen: the heaven rests
  alternatives:
  - heaven comes to rest
  - the sky rests
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys resting or settling. 'The heaven rests' preserves the concrete cosmological picture of heaven supported at the earth's edge.
- source_word: ኀዋኅወ ሰማይ
  chosen: gateways of heaven
  alternatives:
  - windows of heaven
  - doors of heaven
  - portals of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun likely denotes openings or apertures in the heavenly structure. 'Gateways' best fits apocalyptic architecture and avoids overcommitting to the meteorological 'windows' unless context requires it.
- source_word: ርኁዋተ
  chosen: open
  alternatives:
  - opened
  - wide
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective describes the heavenly gateways as standing open. 'Open' is the most natural attributive rendering in English.
