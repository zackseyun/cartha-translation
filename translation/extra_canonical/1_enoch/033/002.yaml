theological_decisions:
- issue: Ancient cosmological imagery of heaven resting on the earth's extremity
  chosen_reading: 'Retain the concrete image: ''whereon the heaven rests'''
  alternative_readings:
  - where heaven meets the earth
  - at the horizon of heaven
  rationale: The passage presents visionary cosmography, not a modernized metaphor. The translation preserves the text's ancient apocalyptic world-picture rather than recasting it into abstract language.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten cosmic imagery into generic modern prose.'
