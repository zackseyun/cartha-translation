theological_decisions:
- issue: Whether the verse refers to angelic/cosmic entities in ordered ranks rather than ordinary human groups
  chosen_reading: Render the final term as 'companies' to preserve the sense of ordered celestial groupings without over-interpreting.
  alternative_readings:
  - assemblies
  - hosts
  - groups
  rationale: In the immediate visionary context of cosmic phenomena and their regulation, the suffixes likely refer to heavenly bodies or their governing orders. 'Hosts' would import stronger military/celestial connotations than the Ge'ez explicitly requires; 'groups' is too flat.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic language into generic prose.
