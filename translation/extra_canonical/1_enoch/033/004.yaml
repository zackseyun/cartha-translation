lexical_decisions:
- source_word: ኵሎ
  chosen: everything
  alternatives:
  - all things
  - the whole of it
  lexicon: Dillmann
  rationale: The term is comprehensive and functions as the object of what was shown. 'Everything' is natural modern English while preserving the totalizing force.
- source_word: አርአየኒ
  chosen: he showed me
  alternatives:
  - he caused me to see
  - he revealed to me
  lexicon: Dillmann
  rationale: A straightforward visual/reportive verb fits the visionary context. 'Revealed' would be interpretive; 'showed me' preserves the concrete apocalyptic scene.
- source_word: ጸሐፈ ሊተ
  chosen: wrote it down for me
  alternatives:
  - wrote for me
  - recorded for me
  lexicon: Dillmann
  rationale: The repeated phrase indicates inscription or recording on Enoch's behalf. 'Wrote it down for me' brings out the documentary sense without over-specifying a medium.
- source_word: ወዓዲ
  chosen: and again
  alternatives:
  - and further
  - moreover
  lexicon: Dillmann
  rationale: This marks an additional act following the first. 'And again' preserves the sequential repetition in simple English.
- source_word: አስማቲሆሙ
  chosen: their names
  alternatives:
  - the names of them
  lexicon: Dillmann
  rationale: A direct rendering of the plural noun with pronominal suffix; no need to expand beyond the source.
- source_word: ትእዛዞሙ
  chosen: their commands
  alternatives:
  - their ordinances
  - their instructions
  - their appointed orders
  lexicon: Dillmann
  rationale: The noun can denote command or order. In this cosmic/angelic context it may refer to prescribed functions or directives; 'commands' keeps the authoritative sense while remaining broad enough for the context.
- source_word: ማኅበራቲሆሙ
  chosen: their companies
  alternatives:
  - their assemblies
  - their groups
  - their associations
  lexicon: Dillmann
  rationale: The term suggests organized groupings or divisions. 'Companies' suits elevated apocalyptic register and can describe ordered celestial groupings without flattening the imagery.
