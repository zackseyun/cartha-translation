translation:
  text: And from there I went to the ends of the earth, and there I saw great beasts,
    and they differed from one another; and the birds also differed in their appearance
    and in the form of their bodies and in their voices, each from the other.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'their faces.' The broader rendering 'appearance' is used here
      because the verse describes how the birds differed visibly as well as in bodily
      form and voice.
    reason: lexical_alternative
  - marker: b
    text: The term rendered 'the form of their bodies' is somewhat uncertain in this
      OCR witness; it likely refers to bodily shape or build.
    reason: textual_variant
lexical_decisions:
- source_word: እምህየ
  chosen: from there
  alternatives:
  - thence
  - from that place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward ablative/deictic expression marking movement onward
    in the vision. 'From there' is clear modern English without losing the sequential
    visionary feel.
- source_word: ሖርኩ
  chosen: I went
  alternatives:
  - I traveled
  - I journeyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple motion verb in first person. 'I went' preserves the plain report
    style of the vision and avoids over-coloring the movement.
- source_word: አጽናፈ ምድር
  chosen: the ends of the earth
  alternatives:
  - the extremities of the earth
  - the borders of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Apocalyptic/cosmic idiom. 'Ends of the earth' is the most natural English
    equivalent and preserves the cosmic geography rather than reducing it to mere
    'distant lands.'
- source_word: ወርኢኩ በህየ
  chosen: and there I saw
  alternatives:
  - and I saw there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adverbial 'there' is retained to preserve the visionary scene-setting
    and the repetitive narrative cadence.
- source_word: አራዊተ ዐበይተ
  chosen: great beasts
  alternatives:
  - large beasts
  - great living creatures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes large wild animals/beasts. 'Great beasts' keeps the
    elevated apocalyptic tone better than the flatter 'large animals.'
- source_word: ይትዌለጥ
  chosen: differed
  alternatives:
  - were distinct
  - were separated
  - were unlike
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated verb marks distinction between kinds. 'Differed' works idiomatically
    in English and allows the repetition to be preserved across beasts and birds.
- source_word: ፩እምካልኡ
  chosen: from one another
  alternatives:
  - one from another
  - each from the other
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reciprocal expression of mutual distinction. In the main text, 'from
    one another' is idiomatic; the final clause is rendered 'each from the other'
    to reflect the repeated Ge'ez while sounding natural.
- source_word: አዕዋፍሂ
  chosen: the birds also
  alternatives:
  - and the birds too
  - the birds as well
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The enclitic/additive sense is preserved with 'also,' showing that the
    same observation now applies to birds.
- source_word: ገጾሙ
  chosen: their appearance
  alternatives:
  - their faces
  - their outward form
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'their faces,' but in context of zoological differentiation
    among birds, a broader rendering like 'appearance' better captures visible distinction
    without implying human-like facial focus.
- source_word: ስኖሙ
  chosen: the form of their bodies
  alternatives:
  - their kind
  - their shape
  - their stature
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is somewhat uncertain in OCR and sense, but it appears to denote
    bodily form/build. 'The form of their bodies' makes explicit the likely physical
    distinction and complements 'appearance' and 'voices'.
- source_word: ቃሎሙሂ
  chosen: their voices
  alternatives:
  - their sounds
  - their cries
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'their voices.' This should be preserved, since the text emphasizes
    audible as well as visible differentiation among the birds.
