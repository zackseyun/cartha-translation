theological_decisions:
- issue: Whether to render the cosmic destination idiomatically or more literally
  chosen_reading: the ends of the earth
  alternative_readings:
  - the extremities of the earth
  - the borders of the earth
  rationale: The verse participates in apocalyptic world-mapping. 'Ends of the earth'
    preserves the cosmological scope and imagery without over-literal awkwardness.
  doctrine_reference: Translation philosophy § optimal equivalence; preserve apocalyptic
    imagery
- issue: Whether ገጾሙ should be rendered literally as 'faces'
  chosen_reading: their appearance
  alternative_readings:
  - their faces
  rationale: Because the subject is birds and the verse lists multiple distinguishing
    features, 'appearance' better communicates the observational category in natural
    English while remaining anchored in the Ge'ez.
  doctrine_reference: Translation philosophy § readable modern English, not flattening
    source sense
