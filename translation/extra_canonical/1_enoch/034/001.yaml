lexical_decisions:
- source_word: እምህየ
  chosen: from there
  alternatives:
  - thence
  - from that place
  lexicon: Dillmann
  rationale: A straightforward deictic expression marking movement from the previous visionary location. 'From there' is clear modern English without losing the narrative linkage.
- source_word: ሖርኩ
  chosen: I went
  alternatives:
  - I traveled
  - I journeyed
  lexicon: Dillmann
  rationale: Simple past movement verb. 'I went' preserves the plain report style of the vision; 'journeyed' would add literary color beyond what is necessary.
- source_word: መንገለ መስዕ
  chosen: toward the south
  alternatives:
  - by way of the south
  - on the road to the south
  lexicon: Dillmann
  rationale: The phrase combines a directional/path term with 'south.' In context it indicates direction of travel rather than a literal road, so 'toward the south' best fits optimal equivalence.
- source_word: በአጽናፈ ምድር
  chosen: to the ends of the earth
  alternatives:
  - at the extremities of the earth
  - at the borders of the earth
  lexicon: Dillmann
  rationale: This is standard cosmic-geographic language in apocalyptic description. 'Ends of the earth' preserves the imagery and elevated register better than the flatter 'borders of the earth.'
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann
  rationale: The common visionary reporting verb. 'I saw' is transparent and readable; 'beheld' would sound archaic.
- source_word: ምሕረ ዐቢየ
  chosen: a great place of rest
  alternatives:
  - a great resting-place
  - a great resting place
  lexicon: Dillmann
  rationale: The noun appears to denote a resting place or place of repose. Because the exact nuance may be spatial rather than abstract, 'place of rest' makes the locative sense explicit while preserving the solemn apocalyptic tone.
