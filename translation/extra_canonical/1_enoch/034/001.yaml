translation:
  text: And from there I went toward the north, to the ends of the earth, and there I saw a great wonder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great resting-place.' The Ge'ez expression may denote either rest as a condition or a place characterized by rest; the context favors a location within Enoch's visionary journey.
    reason: lexical_alternative
  - marker: b
