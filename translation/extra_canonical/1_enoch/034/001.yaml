  alternative_readings:
  - a great rest
  - a great resting-place
  rationale: The immediate context is Enoch's tour of cosmic regions, so a locative rendering best matches the visionary geography. This preserves ambiguity about whether the place is associated with the dead, cosmic storehouses, or another eschatological region without over-interpreting the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
