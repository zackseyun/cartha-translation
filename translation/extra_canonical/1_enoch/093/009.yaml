theological_decisions:
- issue: Whether to render the generation's character in generic moral terms or in
    covenantal/religious terms
  chosen_reading: apostate generation ... all its deeds will be apostasy
  alternative_readings:
  - wicked generation ... all its deeds will be wickedness
  - perverse generation ... all its deeds will be perversity
  rationale: The paired terms ዕሉት / ዕልወት suggest more than general immorality; they
    point to deviation or falling away. In the Apocalypse of Weeks, where history
    is morally and cultically evaluated, 'apostate' and 'apostasy' preserve that sharper
    force.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
