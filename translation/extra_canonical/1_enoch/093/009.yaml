translation:
  text: And after this, in the seventh week, an apostate generation will arise, and
    many will be its deeds, and all its deeds will be apostasy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally 'seventh sabbath/week.' In this section the term refers to the
      symbolic week-period of the historical vision, not a single day.
    reason: cultural_note
  - marker: b
    text: The final noun may also be rendered 'error,' 'perversion,' or 'rebellion.'
      'Apostasy' is chosen to preserve the religious force of the description.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሳብዕት ሰንበት
  chosen: the seventh week
  alternatives:
  - the seventh sabbath
  - the seventh heptad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Apocalypse of Weeks, ሰንበት functions in the schematic sequence
    of world-history as a 'week' or heptadic period, not a literal Sabbath day. 'Week'
    preserves the literary structure and is the established sense in context without
    importing later idiom.
- source_word: ትትነሣእ
  chosen: will arise
  alternatives:
  - will be raised up
  - will appear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes coming forth or arising. 'Will arise' fits apocalyptic-historical
    sequence and reads naturally in English.
- source_word: ትውልድ
  chosen: generation
  alternatives:
  - offspring
  - race
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term commonly denotes a generation or lineage. Here it describes
    the character of a historical cohort within the week schema, so 'generation' is
    the most transparent choice.
- source_word: ዕሉት
  chosen: apostate
  alternatives:
  - perverse
  - wicked
  - rebellious
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word carries the sense of deviation, error, or straying from what
    is right. 'Apostate' best captures the religious-moral force in this epistolary
    apocalyptic context, where the generation is marked by defection rather than mere
    generic evil.
- source_word: ብዙኅ
  chosen: many will be
  alternatives:
  - abundant will be
  - numerous will be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used predicatively with the following noun phrase, it indicates multiplicity.
    Rendering it verbally in English avoids stiffness while preserving the emphasis
    on abundance.
- source_word: ምግባራቲሃ
  chosen: its deeds
  alternatives:
  - its works
  - its practices
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun refers to actions or works. 'Deeds' is idiomatic and retains
    moral weight in a judgment-oriented context.
- source_word: ዕልወት
  chosen: apostasy
  alternatives:
  - error
  - perversion
  - rebellion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'This abstract noun matches the characterization of the generation as
    ዕሉት. ''Apostasy'' preserves the thematic linkage: the generation is apostate,
    and its deeds are apostasy.'
