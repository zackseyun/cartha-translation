theological_decisions:
- issue: Whether the verse refers specifically to the temple as an eschatological
    sanctuary or more broadly to a political kingdom
  chosen_reading: A sanctuary-like 'house' characterized by glory and kingship
  alternative_readings:
  - the glorious and royal house
  - the house of glory, and the kingdom shall be built
  rationale: The Ge'ez syntax most naturally joins 'house' with both following nouns.
    Rendering it as one house preserves the concrete apocalyptic image while allowing
    the royal dimension to remain part of the description rather than splitting into
    two separate constructions.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten apocalyptic imagery.
