translation:
  text: And after this, in the fifth week, at its completion, the house of glory and
    kingship shall be built forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the glorious house and the kingdom shall be built forever,' if መንግሥት
      is taken as a second coordinated element rather than part of the house's description.
    reason: alternative_reading
  - marker: b
    text: In the Apocalypse of Weeks, 'week' refers to a symbolic period in Enoch's
      historical vision, not necessarily a literal seven-day span.
    reason: cultural_note
lexical_decisions:
- source_word: እምድኅረዝ
  chosen: after this
  alternatives:
  - afterward
  - after these things
  lexicon: Dillmann
  rationale: Temporal transition formula introducing the next stage in the apocalypse;
    'after this' is clear and preserves sequence without over-expansion.
- source_word: ኃምስ ሰንበት
  chosen: the fifth week
  alternatives:
  - the fifth sabbath
  - the fifth heptad
  lexicon: Dillmann
  rationale: In the Apocalypse of Weeks, ሰንበት functions as a week/heptadic period,
    not a literal Sabbath day. 'Week' preserves the scheme in readable English.
- source_word: በተፍጻሜታ
  chosen: at its completion
  alternatives:
  - at its end
  - when it is completed
  lexicon: Dillmann
  rationale: The suffix points back to the week. 'At its completion' keeps the formal
    sense of reaching fulfillment/end and fits the apocalyptic timetable.
- source_word: ቤተ ስብሐት
  chosen: the house of glory
  alternatives:
  - the glorious house
  - the house of praise
  lexicon: Dillmann
  rationale: ቤተ is 'house,' and ስብሐት can denote glory/praise. In this temple context,
    'glory' better conveys the exalted, sacred character than the more subjective
    'praise.'
- source_word: መንግሥት
  chosen: kingship
  alternatives:
  - kingdom
  - royal dominion
  lexicon: Dillmann
  rationale: The noun can mean kingdom or kingship. 'Kingship' fits the paired abstract
    nouns with 'glory' and avoids implying a geographic realm; it suggests royal rule
    or sovereignty associated with the house.
- source_word: ይትሐነጽ
  chosen: shall be built
  alternatives:
  - shall be established
  - shall be constructed
  lexicon: Dillmann
  rationale: Passive/building sense is most natural with 'house.' 'Shall be built'
    preserves the concrete temple imagery rather than abstracting it.
- source_word: እስከ ለዓለም
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: Dillmann
  rationale: Standard idiom for enduring perpetually. 'Forever' is idiomatic modern
    English and preserves the eschatological permanence.
