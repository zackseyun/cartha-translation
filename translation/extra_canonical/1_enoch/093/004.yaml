theological_decisions:
- issue: Identity of the singular saved figure
  chosen_reading: Retain the singular as 'a man shall be saved' without specifying
    Noah in the main text.
  alternative_readings:
  - '''one man shall be preserved,'' understood as Noah'
  - generic 'humanity shall be saved'
  rationale: The singular noun should not be flattened into a collective. The broader
    context of the Apocalypse of Weeks may suggest Noah, but the verse itself does
    not name him, so the translation preserves the textual restraint.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of 'law shall be made for the sinners'
  chosen_reading: Translate straightforwardly as a law/ordinance being made for sinners,
    with ambiguity preserved.
  alternative_readings:
  - a law shall be enacted against sinners
  - judgment shall be appointed for sinners
  rationale: The Ge'ez wording allows several nuances. Rather than resolve it into
    punitive judgment language, the main text keeps the more literal 'law,' and the
    ambiguity is noted in a footnote.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    ambiguity with documentation.
