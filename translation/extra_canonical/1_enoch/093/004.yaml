translation:
  text: And after me there shall arise, in the second week, great evil; and deceit
    shall have sprung up in it. And in it there shall be the first end, and in it
    a man shall be saved; and after it has been completed, unrighteousness shall grow,
    and a law shall be made for the sinners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The 'second week' belongs to the symbolic week-structure of Enoch's historical
      apocalypse, not necessarily a literal seven-day period.
    reason: cultural_note
  - marker: b
    text: '''A man shall be saved'' preserves the singular. Many readers understand
      this as an allusion to Noah, but the verse does not name him.'
    reason: cross_reference
  - marker: c
    text: Or 'an ordinance/rule shall be enacted for the sinners'; the Ge'ez may imply
      a law concerning or even against sinners.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይቀውም
  chosen: there shall arise
  alternatives:
  - shall stand
  - shall appear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means 'stand' or 'arise.' In this temporal-historical
    schema, 'arise' better conveys the emergence of a new epochal condition after
    Enoch.
- source_word: እምድኅሬየ
  chosen: after me
  alternatives:
  - behind me
  - following me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal sense fits the sequence of the Apocalypse of Weeks.
- source_word: በካልእት ሰንበት
  chosen: in the second week
  alternatives:
  - during the second week
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context 'week' is the symbolic period of the Apocalypse of Weeks,
    not a literal seven-day week.
- source_word: ዐቢይ እኩይ
  chosen: great evil
  alternatives:
  - great wickedness
  - a great evil
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the stark apocalyptic moral language without softening it.
- source_word: ትሕሱት
  chosen: deceit
  alternatives:
  - falsehood
  - lying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A broad moral term; 'deceit' fits the rise of corruption in the age better
    than the narrower 'lying.'
- source_word: በቀለት
  chosen: shall have sprung up
  alternatives:
  - shall blossom
  - shall arise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests sprouting or flourishing. 'Sprung up' preserves the
    organic metaphor of evil/deceit emerging within the week.
- source_word: ቀዳሚት ፍጻሜ
  chosen: the first end
  alternatives:
  - an initial completion
  - the first consummation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Formal enough to preserve the schematic apocalyptic milestone. 'End'
    is clearer than 'consummation' for modern readers while keeping the eschatological
    force.
- source_word: ይድኅን ብእሲ
  chosen: a man shall be saved
  alternatives:
  - a man shall escape
  - one man shall be delivered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular 'man' should be preserved, likely alluding to an individual
    survivor within the period. 'Saved' reflects deliverance without importing later
    Christian formulae.
- source_word: ተፈጸመ
  chosen: has been completed
  alternatives:
  - is finished
  - is fulfilled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the temporal sequence tied to the completion of the week.
- source_word: ትእህቱ ዓመፃ
  chosen: unrighteousness shall grow
  alternatives:
  - violence shall increase
  - rebellion shall multiply
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR here is difficult, but the sense points to the increase of wrongdoing
    after the period's completion. 'Unrighteousness' is broad enough to cover the
    moral disorder indicated.
- source_word: ሥርዐት
  chosen: a law
  alternatives:
  - an ordinance
  - a rule
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes order, rule, or law. 'Law' best preserves the striking
    statement that a normative order is established in relation to sinners.
- source_word: ይትገበር ለኃጥኣን
  chosen: shall be made for the sinners
  alternatives:
  - shall be enacted for sinners
  - shall be imposed on sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/impersonal sense fits the Ge'ez. 'For the sinners' is retained
    literally, though context may imply 'against' or 'concerning' them.
