translation:
  text: And after this, in the sixth week, all who are in it will be blinded, and
    the hearts of all of them will forget wisdom. And in it a man will ascend; and
    at its completion the house of the kingdom will be burned with fire, and in it
    the whole stock of the chosen root will be scattered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all within it will be blind/darkened.' The Ge'ez wording likely describes
      the people of the sixth week as spiritually blinded.
    reason: lexical_alternative
  - marker: b
    text: Or 'a man will arise.' The verb can suggest rising or ascending; the more
      literal 'ascend' is kept to preserve the text's ambiguity.
    reason: lexical_alternative
  - marker: c
    text: '''House of the kingdom'' may refer broadly to the royal order or dynasty,
      not necessarily only a physical building.'
    reason: lexical_alternative
  - marker: d
    text: '''Chosen root'' combines lineage imagery with plant imagery; it may denote
      an elect line or remnant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ሳድስት ሰንበት
  chosen: the sixth week
  alternatives:
  - the sixth heptad
  - the sixth sabbath-period
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Apocalypse of Weeks context, ሰንበት denotes a symbolic week/heptad
    rather than a literal Sabbath day. 'Week' is the clearest English rendering while
    preserving the apocalyptic periodization.
- source_word: ውስቴታ ጽሉላነ ኵሎሙ
  chosen: all who are in it will be blinded
  alternatives:
  - all of them in it will be blind
  - all within it will be darkened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the inhabitants/participants of the sixth week becoming
    blind. 'Will be blinded' captures the passive/resultative force and preserves
    the moral-spiritual imagery rather than reducing it to mere ignorance.
- source_word: ይትረሣዕ ልቦሙ ለኵሎሙ እምጥበብ
  chosen: the hearts of all of them will forget wisdom
  alternatives:
  - their hearts will depart from wisdom
  - the hearts of all will be estranged from wisdom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys forgetting or being made to forget. 'Forget wisdom'
    is direct and preserves the wisdom-tradition resonance without interpretive expansion.
- source_word: ባቲ የዓርግ ብእሲ
  chosen: in it a man will ascend
  alternatives:
  - during it a man will arise
  - in it one man will go up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally suggests ascending/going up. 'Ascend' keeps the elevated,
    possibly exaltational nuance and avoids prematurely specifying whether the sense
    is political rise, prophetic appearance, or physical ascent.
- source_word: ቤተ መንግሥት
  chosen: the house of the kingdom
  alternatives:
  - the royal house
  - the house of kingship
  - the kingdom-house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is somewhat ambiguous. 'House of the kingdom' stays close
    to the Ge'ez and preserves possible reference either to the royal dynasty or to
    the temple/palatial order associated with the kingdom. A smoother rendering like
    'royal house' would narrow the sense too quickly.
- source_word: ይውዒ ... በእሳት
  chosen: will be burned with fire
  alternatives:
  - will be consumed by fire
  - will burn in fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a judgment image. 'Burned with fire' is idiomatic, forceful,
    and close to the source wording.
- source_word: ኵሉ ዘመደ ሥርወ ኀሩይ
  chosen: the whole stock of the chosen root
  alternatives:
  - all the lineage of the chosen root
  - the entire seed of the chosen root
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The expression combines kinship/lineage language with root imagery. 'Stock'
    preserves genealogical and arboreal overtones better than 'seed' alone, while
    'chosen root' retains the text's election language without importing later messianic
    formulas.
