theological_decisions:
- issue: Identity of 'a man will ascend'
  chosen_reading: Rendered generically as 'a man will ascend' without identifying
    him
  alternative_readings:
  - a specific historical leader arises
  - a priestly figure rises
  - a messianic/exalted figure ascends
  rationale: The Ge'ez gives only 'a man' and the immediate verse does not name him.
    The translation preserves the ambiguity rather than resolving it toward a later
    theological identification.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'house of the kingdom'
  chosen_reading: Kept as 'house of the kingdom'
  alternative_readings:
  - royal dynasty
  - palace
  - temple associated with the kingdom
  rationale: The phrase may point to the Davidic/royal establishment broadly, and
    the context of burning suggests judgment on an institution. A more specific rendering
    would over-interpret the image.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    ambiguity with transparent documentation.
- issue: Force of 'chosen root'
  chosen_reading: Retained as election language without specifying a later canonical
    referent
  alternative_readings:
  - elect remnant
  - chosen plant/branch
  - messianic root
  rationale: The phrase evokes remnant and lineage imagery, but the verse itself does
    not explicitly identify it with a single individual. The translation keeps the
    metaphor and theological weight while avoiding harmonization.
  doctrine_reference: Do not over-harmonize with later Christian usage.
