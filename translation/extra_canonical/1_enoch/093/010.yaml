translation:
  text: And at its completion the chosen righteous ones will be selected from the
    eternal plant of righteousness, and to them will be given the sevenfold instruction
    concerning all his creation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the seven instructions,' or 'the seven kinds of instruction.' The Ge'ez
      phrase after 'will be given to them' is difficult, and the numeral may modify
      the teaching as a complete sevenfold body.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'plant of righteousness' preserves the text's agricultural image
      rather than reducing it to an abstract idea such as 'community' or 'foundation.'
    reason: cultural_note
  - marker: c
    text: Or 'and to them will be given'.
    reason: previous_rendering
lexical_decisions:
- source_word: በተፍጻሜታ
  chosen: at its completion
  alternatives:
  - at its end
  - when it is completed
  lexicon: Dillmann
  rationale: The prepositional phrase marks the concluding point of the preceding
    period or 'week' in the Apocalypse of Weeks. 'At its completion' preserves the
    temporal force without over-specifying the antecedent.
- source_word: ይትኃረዩ
  chosen: will be selected
  alternatives:
  - will be chosen
  - will be separated out
  lexicon: Dillmann
  rationale: The passive/reflexive form conveys being chosen or singled out. Because
    ኅሩያን already means 'chosen ones,' rendering the verb as 'selected' avoids awkward
    repetition while preserving the election motif.
- source_word: ኅሩያን ጻድቃን
  chosen: the chosen righteous ones
  alternatives:
  - the elect righteous
  - the chosen just
  lexicon: Dillmann
  rationale: Both adjectives are significant and should be retained. 'Righteous ones'
    is preferred over 'just' for consistency with key theological vocabulary and Enochic
    usage.
- source_word: እምተክለ ጽድቅ ዘለዓለም
  chosen: from the eternal plant of righteousness
  alternatives:
  - from the eternal planting of righteousness
  - from the plant of eternal righteousness
  lexicon: Dillmann
  rationale: The imagery is agricultural and apocalyptic; it should not be flattened
    into an abstract phrase like 'foundation.' 'Plant' keeps the concrete metaphor,
    while 'of righteousness' reflects the genitival relation.
- source_word: ይትወሀብ ሎሙ
  chosen: to them will be given
  alternatives:
  - they will receive
  - there will be given to them
  lexicon: Dillmann
  rationale: A straightforward passive future best reflects the Ge'ez syntax and keeps
    the solemn register.
- source_word: ሰብዓቱ
  chosen: sevenfold
  alternatives:
  - seven
  - the seven
  lexicon: Dillmann
  rationale: The form likely qualifies what follows as a sevenfold body or fullness
    of instruction rather than merely inserting the numeral awkwardly before an abstract
    noun. Because the construction is difficult, the alternative is preserved in a
    footnote.
- source_word: መክዕቢተ ትምህርት
  chosen: instruction
  alternatives:
  - wisdom of instruction
  - teaching
  - branches of instruction
  lexicon: Dillmann
  rationale: The phrase is textually and lexically difficult. 'Instruction' gives
    the clear semantic center in context, while 'sevenfold' carries the numerical
    element. A footnote preserves the possibility that the text means 'the seven kinds/parts
    of instruction.'
- source_word: በኵሉ ፍጥረት ዚአሁ
  chosen: concerning all his creation
  alternatives:
  - in all his creation
  - about every creature of his
  lexicon: Dillmann
  rationale: The phrase most naturally indicates the scope or subject matter of the
    instruction. 'Creation' fits the collective sense better than 'creature' in this
    apocalyptic summary context.
