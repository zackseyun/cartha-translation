theological_decisions:
- issue: Election language in a judgment/restoration context
  chosen_reading: the chosen righteous ones
  alternative_readings:
  - the elect righteous
  - the righteous chosen ones
  rationale: The verse combines election and righteousness as distinct but related
    descriptors. Retaining both avoids reducing the line either to moral status alone
    or to predestinarian terminology imported from later debates.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
- issue: Agricultural image for the community's source
  chosen_reading: the eternal plant of righteousness
  alternative_readings:
  - the eternal planting of righteousness
  - the plant of eternal righteousness
  rationale: The text uses vivid growth imagery. Preserving the metaphor aligns with
    the project's instruction not to flatten apocalyptic imagery into generic prose.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    apocalyptic imagery.
