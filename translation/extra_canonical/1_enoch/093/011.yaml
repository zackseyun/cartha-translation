theological_decisions:
- issue: Rendering ለቅዱስ as a divine title
  chosen_reading: the Holy One
  alternative_readings:
  - the holy one
  - the Saint
  rationale: The context speaks of an overwhelming transcendent speaker whose voice no human can hear without being shaken. Capitalizing 'Holy One' marks a divine title while avoiding later christological import.
  doctrine_reference: Preserve local passage meaning and avoid harmonizing with later Christian usage.
