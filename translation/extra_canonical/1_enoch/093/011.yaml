translation:
  text: For who among all the children of men is able to hear the voice of the Holy One and not be shaken? And who is able to think His thoughts? And who is able to look upon all the works of heaven?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear the word/speech of the Holy One'; the Ge'ez noun can cover voice, word, or utterance. 'Voice' is chosen because it follows 'hear' most naturally in English.
    reason: lexical_alternative
  - marker: b
    text: '''The works of heaven'' may refer broadly to the operations, structures, or ordered phenomena of the heavens, not merely visible objects.'
    reason: cultural_note
  - marker: c
    text: Or 'for his mind to comprehend'.
    reason: previous_rendering
lexical_decisions:
- source_word: እስመ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces an explanatory or grounding statement; 'For' preserves the rhetorical force in elevated English.
- source_word: ውሉደ ሰብእ
  chosen: the children of men
  alternatives:
  - human beings
  - the sons of men
  - humankind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal idiom fitting the elevated apocalyptic register. 'Children of men' preserves the Semitic-humanity expression without importing later title language.
- source_word: ዘይክል
  chosen: is able
  alternatives:
  - can
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the repeated rhetorical pattern of capability in the verse and sounds more formal than 'can.'
- source_word: ሰሚዐ ቃሉ ለቅዱስ
  chosen: to hear the voice of the Holy One
  alternatives:
  - to hear his word, that of the Holy One
  - to hear the speech of the Holy One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቃል can mean word, speech, or voice; with the verb 'hear,' 'voice' is the most natural English rendering and preserves the immediacy of divine utterance. ለቅዱስ is rendered as a title, 'the Holy One.'
- source_word: ወኢይትሀወክ
  chosen: and not be shaken
  alternatives:
  - and not be troubled
  - and not be disturbed
  - and not be confounded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys inward destabilization before divine speech without over-specifying emotional panic. 'Shaken' fits apocalyptic awe.
- source_word: ከመ የሐሊ፡ ኅሊናሁ
  chosen: for his mind to comprehend
  alternatives:
  - for his mind to think
  - for his understanding to grasp
  - to conceive in his mind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase concerns the capacity of human thought or understanding. 'Comprehend' expresses mental grasp in idiomatic English while preserving the anthropological limitation emphasized by the verse.
- source_word: ነጽሮተ
  chosen: to look upon
  alternatives:
  - to behold
  - to observe
  - to see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A slightly elevated rendering appropriate to visionary discourse; stronger than simple 'see' but not overly archaic.
- source_word: ምግባረ ሰማይ
  chosen: the works of heaven
  alternatives:
  - the deeds of heaven
  - the workings of heaven
  - the order of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ምግባር often denotes deed, work, or conduct. In this cosmological context, 'works of heaven' best preserves the broad sense of heavenly operations without narrowing it to moral 'deeds' or technical 'order.'
