translation:
  text: And after this, in the third week, at its completion, a man shall be chosen
    as the plant of righteous judgment, and after him there shall come forth the plant
    of righteousness forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The 'third week' belongs to the symbolic sequence of the Apocalypse of Weeks;
      it is not a literal seven-day week.
    reason: cultural_note
  - marker: b
    text: The chosen 'man' is left unidentified in the text. Interpreters have connected
      him with a notable righteous ancestor or leader, but the verse itself does not
      name him.
    reason: alternative_reading
  - marker: c
    text: The repeated image 'plant of righteousness' may point to a righteous line,
      growth, or enduring community, but the agricultural metaphor is kept in translation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሣልስት ሰንበት
  chosen: the third week
  alternatives:
  - the third sabbath
  - the third period of seven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Apocalypse of Weeks context, ሰንበት denotes a heptadic period rather
    than a literal Sabbath day. 'Week' preserves the scheme of successive symbolic
    periods.
- source_word: በተፍጻሜታ
  chosen: at its completion
  alternatives:
  - at its end
  - when it is completed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix points back to the week; the phrase marks the close of that
    symbolic period. 'At its completion' is slightly more formal and fits the apocalyptic
    sequencing.
- source_word: ይትኃረይ
  chosen: shall be chosen
  alternatives:
  - shall be selected
  - shall be appointed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense 'be chosen' best fits the emergence of a
    singled-out figure. 'Appointed' is possible, but 'chosen' stays closer to the
    lexical core without importing office-language.
- source_word: ብእሲ
  chosen: a man
  alternatives:
  - one man
  - a person
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun ordinarily means 'man' or 'human being.' 'A man' preserves the
    singular personal figure indicated in the text without over-specifying identity.
- source_word: ለተክለ
  chosen: as the plant of
  alternatives:
  - for a plant of
  - as a planting of
  - as the shoot of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is difficult, but the imagery is clearly vegetal. 'Plant'
    preserves the metaphor broadly without narrowing it to 'shoot' or making it too
    abstract with 'planting.'
- source_word: ኵነኔ ጽድቅ
  chosen: righteous judgment
  alternatives:
  - judgment of righteousness
  - just judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pair combines judicial and moral language. 'Righteous judgment' preserves
    both elements and the elevated register of the apocalyptic vision.
- source_word: ይወፅእ
  chosen: there shall come forth
  alternatives:
  - shall arise
  - shall go out
  - shall spring forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means 'come out/forth.' Because the line continues the plant
    imagery, 'come forth' keeps the emergence motif without over-poetic expansion.
- source_word: ለተክለ ጽድቅ
  chosen: the plant of righteousness
  alternatives:
  - the planting of righteousness
  - the righteous plant
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase is a key image in the verse. 'Plant of righteousness' keeps
    the metaphor concrete and preserves the genitival relation better than the adjectival
    'righteous plant.'
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for eternal ages
  - unto the age of ages
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled age-expression is an idiom for perpetuity. 'Forever and ever'
    is natural English while still conveying the emphatic duration.
