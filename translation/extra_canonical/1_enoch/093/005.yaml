theological_decisions:
- issue: Identity of the singular 'man' chosen at the end of the third week
  chosen_reading: Render generically as 'a man' without identifying him in the main
    text.
  alternative_readings:
  - Enoch
  - Noah
  - Abraham
  - a representative righteous leader
  rationale: The verse itself names no individual. Since the project philosophy requires
    preserving ambiguity rather than resolving it, the translation leaves the figure
    unspecified and allows interpretation in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of the plant imagery
  chosen_reading: Retain the agricultural metaphor 'plant' in both clauses.
  alternative_readings:
  - lineage
  - root
  - offspring
  - community
  rationale: The Ge'ez explicitly uses vegetal imagery. Rendering it more abstractly
    would flatten apocalyptic symbolism and prematurely interpret whether the reference
    is to a person, lineage, or righteous community.
  doctrine_reference: 'Book context: do not flatten apocalyptic imagery into generic
    prose.'
