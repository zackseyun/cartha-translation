translation:
  text: And after this, in the fourth week, at its completion, visions of the holy and the righteous shall be seen, and a law for generation after generation and an enclosure shall be made for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy ones and the righteous.' The Ge'ez expression can be read substantivally, and the exact referent may remain somewhat open in apocalyptic context.
    reason: lexical_alternative
