lexical_decisions:
- source_word: እምድኅረዝ
  chosen: after this
  alternatives:
  - after that
  - thereafter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal transition formula introducing the next stage in the apocalypse; 'after this' is clear and preserves sequence.
- source_word: ራብዕት ሰንበት
  chosen: the fourth week
  alternatives:
  - the fourth heptad
  - the fourth sabbath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Apocalypse of Weeks, ሰንበት functions as the numbered week/heptad schema, not a literal Sabbath day. 'Week' preserves the established symbolic period without overtechnical wording.
- source_word: በተፍጻሜታ
  chosen: at its completion
  alternatives:
  - at its end
  - when it is completed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix points back to the week; 'at its completion' keeps the formal apocalyptic milestone language.
- source_word: ራእያተ
  chosen: visions
  alternatives:
  - revelations
  - appearances
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun naturally denotes visionary disclosures in apocalyptic context; 'visions' best preserves genre and imagery.
- source_word: ቅዱሳን ወጻድቃን
  chosen: the holy and the righteous
  alternatives:
  - the holy ones and the righteous
  - the saints and the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Both adjectives are substantival plurals. 'The holy and the righteous' is transparent and avoids importing later ecclesiastical overtones of 'saints,' while preserving the pair distinctly.
- source_word: ይትረአይ
  chosen: shall be seen
  alternatives:
  - shall appear
  - shall be revealed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/reflexive sense fits the Ge'ez form. 'Shall be seen' stays close to the wording while allowing the ambiguity of whether the visions are granted or become manifest.
- source_word: ሥርዐት
  chosen: an order
  alternatives:
  - a rule
  - an ordinance
  - a law
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can denote ordered arrangement, rule, or ordinance. 'Order' best fits the broad apocalyptic sense here without prematurely narrowing it to legal code.
- source_word: ለትውልደ ትውልድ
  chosen: for generation after generation
  alternatives:
  - for all generations
  - for successive generations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated noun expresses continuity across generations. 'Generation after generation' preserves the iterative force.
- source_word: ዐጸድ
  chosen: an enclosure
  alternatives:
  - a plant
  - a garden
  - a plantation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is difficult. In context it likely denotes something planted or enclosed/prepared for the righteous. 'Enclosure' preserves the concrete image while avoiding overconfident specification.
- source_word: ይትገበር ሎሙ
  chosen: shall be made for them
  alternatives:
  - shall be prepared for them
  - shall be established for them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive sense is natural. 'Shall be made for them' is broad enough to fit both 'order' and 'enclosure' language without interpretive overreach.
