theological_decisions:
- issue: Identity of 'the holy and the righteous'
  chosen_reading: A class of faithful people disclosed in the apocalyptic vision, not specifically angels in the main text.
  alternative_readings:
  - heavenly holy ones
  - a mixed group of angels and righteous humans
  rationale: Within the Apocalypse of Weeks, the sequence concerns historical epochs and the vindication/instruction of the faithful. The paired human-ethical term 'righteous' makes a human referent most likely, though the phrase retains apocalyptic breadth.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ሥርዐት
  chosen_reading: '''order'' in a broad sense of ordered rule or arrangement'
  alternative_readings:
  - law
  - ordinance
  - right ordering
  rationale: The verse may point to revealed instruction or an enduring normative order for later generations. 'Order' keeps the ambiguity visible rather than forcing a specifically legal or institutional reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
