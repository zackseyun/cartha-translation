translation:
  text: And who is there that can behold heaven? And who is there that can understand the works of heaven? Or see a soul—or, if not, a spirit—and tell of it? Or else ascend and see all their ends?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Storehouses of heaven'' may also be rendered ''treasuries of heaven'' or ''chambers of heaven.'' The image is cosmic and should not be reduced to a generic reference to heaven.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'see a soul—or, if not, a spirit' is textually and semantically difficult. The translation keeps the Ge'ez wording transparent rather than smoothing it into an interpretation.
    reason: textual_variant
  - marker: c
    text: The final expression is uncertain. It may mean 'all their ends/extremities,' with some possibility of a more literal sense related to 'wings.'
    reason: lexical_alternative
  - marker: d
    text: Or 'behold the storehouses of heaven'.
    reason: previous_rendering
  - marker: e
    text: Or 'Or, if he has not gone up, can he see'.
    reason: previous_rendering
lexical_decisions:
- source_word: ምነት
  chosen: who is there
  alternatives:
  - who
  - what person
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used idiomatically to introduce a rhetorical question about any human person capable of the acts that follow.
- source_word: ዘይክል
  chosen: that can
  alternatives:
  - who is able to
  - who has power to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresses capability/ability in a rhetorical challenge; 'can' is clear modern English without losing force.
- source_word: ነጽሮተ ሰማይ
  chosen: the storehouses of heaven
  alternatives:
  - the treasuries of heaven
  - the chambers of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes treasuries/storehouses; in apocalyptic context this preserves cosmic imagery better than a flattened 'things of heaven.'
- source_word: አእምሮ ግብረ ሰማይ
  chosen: understand the works of heaven
  alternatives:
  - know the deeds of heaven
  - perceive the workings of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Balances formal sense with readable English; 'works of heaven' preserves the objective genitive and cosmic register.
- source_word: ከመ ይርአይ ነፍሰ
  chosen: see a soul
  alternatives:
  - behold a soul
  - look upon a soul
  - see the life-breath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the stark, difficult wording of the Ge'ez rather than paraphrasing into an abstract statement.
- source_word: መንፈሰ
  chosen: a spirit
  alternatives:
  - the spirit
  - wind
  - breath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this anthropological/cosmic context 'spirit' is the most natural rendering; 'breath' remains possible but weaker in this rhetorical sequence.
- source_word: ይክል ነጊረ
  chosen: can ... tell of it
  alternatives:
  - can declare it
  - can report it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Pairs ability with verbal reporting; 'tell of it' is readable while preserving the sense of declaring what has been perceived.
- source_word: ዐሪገ
  chosen: has gone up
  alternatives:
  - has ascended
  - has gone aloft
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ascent motif is important in apocalyptic literature; 'gone up' is plain English that still preserves vertical imagery.
- source_word: ኵሎ አክናፊሆሙ
  chosen: all their ends
  alternatives:
  - all their extremities
  - all their borders
  - all their wings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The underlying form is difficult. A sense like 'extremities/ends' best fits the rhetorical question about surveying heavenly realities after ascent. A more literal 'wings' is possible but obscure in context.
