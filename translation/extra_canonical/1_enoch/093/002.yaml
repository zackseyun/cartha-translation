translation:
  text: And Enoch said, “Concerning the children of righteousness, and concerning the chosen of the world, and concerning the plant of uprightness, I will speak these things to you and make them known to you, my children—I, Enoch—according to that which was shown to me from a vision of heaven, and which I learned from the word of the holy angels, and understood from the tablets of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chosen of the age,' if ዓለም is heard in the sense of an age or world-order rather than the created world as such.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'tablets of heaven' reflects a common Enochic image of heavenly records; the Ge'ez expression may also be understood more generally as the writing or books of heaven.
    reason: lexical_alternative
  - marker: c
    text: 'Or ''And Enoch said concerning the children of righteousness, and concerning the chosen of the world, and concerning the plant of uprightness: of these I will speak to you''.'
    reason: previous_rendering
  - marker: d
    text: Or 'in a vision of heaven'.
    reason: previous_rendering
  - marker: e
    text: Or 'from the words of the holy angels'.
    reason: previous_rendering
lexical_decisions:
- source_word: ውሉደ፡ ጽድቅ
  chosen: children of righteousness
  alternatives:
  - sons of righteousness
  - offspring of righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Kept the filial metaphor with 'children' rather than abstracting to 'the righteous.' 'Righteousness' preserves the genitival quality and apocalyptic group identity.
- source_word: ኅሩያነ፡ ዓለም
  chosen: chosen of the world
  alternatives:
  - elect of the world
  - chosen ones of the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered transparently from the Ge'ez without importing later doctrinal phrasing. 'Chosen' is clearer than 'elect' for modern readers; 'of the world' is retained literally, though it may carry the sense of 'of the age/order.'
- source_word: ተክለ፡ ርትዕ
  chosen: plant of uprightness
  alternatives:
  - planting of uprightness
  - shoot of righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the vegetal/apocalyptic image. 'Uprightness' fits ርትዕ well here and avoids collapsing the phrase into a generic label for people.
- source_word: እሎንተ፡ እብለክሙ፡ ወአየድዐክሙ
  chosen: of these I will speak to you and make them known to you
  alternatives:
  - these things I will declare to you and teach you
  - concerning these I will tell you and inform you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Represents the paired verbs as both speech and disclosure. 'Make them known' preserves the revelatory force.
- source_word: ደቂቅየ፡
  chosen: my children
  alternatives:
  - my sons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Natural English for direct address while preserving familial language.
- source_word: በዘ፡ አስተርአየኒ፡ እምራእየ፡ ሰማይ
  chosen: according to that which was shown to me in a vision of heaven
  alternatives:
  - from what was shown to me in the vision of heaven
  - by what was revealed to me from a heavenly vision
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Takes በዘ as introducing the basis/source of Enoch's speech. 'Vision of heaven' stays close to the Ge'ez and preserves apocalyptic register.
- source_word: እምቃለ፡ ቅዱሳን፡ መላእክት፡ አእመርኩ
  chosen: which I learned from the words of the holy angels
  alternatives:
  - which I came to know from the voice of the holy angels
  - which I understood from the speech of the holy angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural 'words' fits the construct naturally and preserves angelic mediation of revelation.
- source_word: እምነ፡ ጸፍጸፈ፡ ሰማይ፡ ለበውኩ
  chosen: understood from the tablets of heaven
  alternatives:
  - perceived from the writing of heaven
  - understood from the heavenly books
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase commonly refers to heavenly tablets/books in Enochic literature. 'Tablets of heaven' preserves the concrete image and apocalyptic motif better than a generalized 'books.'
