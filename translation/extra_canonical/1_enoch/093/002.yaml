theological_decisions:
- issue: Identity of the addressees/groups named
  chosen_reading: The verse names eschatological righteous groups in Enochic idiom without specifying later sectarian or Christian categories.
  alternative_readings:
  - The terms are simply poetic synonyms for the righteous
  - The phrases refer to distinct groups within the faithful community
  rationale: The Ge'ez stacks several designations—children of righteousness, chosen of the world, plant of uprightness—without explaining whether they are fully identical or rhetorically overlapping. The translation preserves that tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ኅሩያነ፡ ዓለም
  chosen_reading: chosen of the world
  alternative_readings:
  - chosen of the age
  - elect ones of eternity
  rationale: The base witness reads naturally as 'world/age.' Because the exact nuance may be broader than physical world, the main text stays literal and a footnote notes the alternative.
  doctrine_reference: Original-language primacy over translation tradition; preserve ambiguity with footnotes where needed.
