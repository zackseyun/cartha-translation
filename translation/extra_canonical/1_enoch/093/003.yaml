theological_decisions:
- issue: Meaning of 'first week' in the Apocalypse of Weeks
  chosen_reading: Symbolic heptadic period of history, rendered 'first week' rather
    than literal Sabbath language
  alternative_readings:
  - first sabbath
  - first seven
  rationale: Within this section Enoch recounts history in symbolic 'weeks.' Rendering
    ሰንበት as 'week' preserves the literary structure and avoids misleading readers
    toward a single day observance.
  doctrine_reference: Translation philosophy §Consistency of key terms, or documented
    exception
- issue: Ethical pair at the end of the verse
  chosen_reading: '''righteousness and uprightness shall endure'''
  alternative_readings:
  - '''righteousness and truth shall endure'''
  - '''justice and integrity shall endure'''
  rationale: The OCR form before ወጽድቅ is uncertain, but the verse clearly closes with
    a pair of positive ethical qualities marking the era. 'Uprightness' keeps the
    moral parallelism while acknowledging lexical uncertainty.
  doctrine_reference: Translation philosophy §Preserve theological tension rather
    than resolve it
