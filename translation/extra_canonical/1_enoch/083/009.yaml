  to: My son, from heaven all this will come upon the earth, and upon the earth there will be a great destruction.
  rationale: 'The verb ይሄሉ (yehellu) is the imperfect of ሀለወ (halawa, ''to be, exist''), not a verb of speaking. The draft mistranslates it as ''will say'' and invents a quotation. Additionally, there is no conjunction ''And'' (ወ) before ወልድየ (''my son''), which is a vocative address (as in verses 6, 8, and 10), not the subject of the sentence. The clause means ''My son, from heaven all this will be [come] upon the earth.'' | Adjudicator: The reviewer is entirely correct. The Ge''ez verb ይሄሉ (yehellu) is the imperfect of ሀለወ (halawa, ''to be, exist''), not a verb of speaking. The current translation invents a quotation and misconstrues ''m'
