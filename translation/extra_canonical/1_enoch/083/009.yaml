lexical_decisions:
- source_word: ወልድየ
  chosen: my son
  alternatives:
  - my child
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix marks first-person possession. 'Son' is the more direct and contextually natural rendering in an elevated visionary register; 'child' is possible but less specific.
- source_word: እምሰማይ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward ablative sense. 'From heaven' preserves the vertical apocalyptic imagery without over-embellishment.
- source_word: ይሄሉ
  chosen: will say
  alternatives:
  - shall say
  - will speak
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as future/reportive speech in context. 'Will say' is idiomatic modern English while preserving the speech act.
- source_word: ኵሉዝ
  chosen: all this
  alternatives:
  - all
  - all these things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to point to totality with a deictic nuance. 'All this' best fits the immediate visionary context, though the exact referent may be slightly uncertain.
- source_word: ዲበ
  chosen: upon
  alternatives:
  - 'on'
  - over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used twice with 'earth'; 'upon' preserves the elevated register and the sense of something coming down onto the earth.
- source_word: ምድር
  chosen: the earth
  alternatives:
  - the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context the broader cosmic sense 'earth' is preferable to the more localized 'land'.
- source_word: ይከውን
  chosen: there shall be
  alternatives:
  - it shall happen
  - it will come to pass
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This existential rendering fits the following noun phrase and reads naturally in English.
- source_word: ሐጕል
  chosen: destruction
  alternatives:
  - ruin
  - devastation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes destructive collapse or devastation. 'Destruction' is broad enough to preserve the judgment imagery without narrowing it to military ruin alone.
- source_word: ዐቢይ
  chosen: great
  alternatives:
  - mighty
  - vast
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common intensifier. 'Great' is the most transparent modifier for the scale of the coming devastation.
