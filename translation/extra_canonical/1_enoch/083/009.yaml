theological_decisions:
- issue: Identity of 'my son'
  chosen_reading: Retain the familial expression literally as 'my son' without interpreting it as a messianic title in the translation.
  alternative_readings:
  - my child
  - a symbolic figure within the dream
  rationale: The verse itself does not supply enough data to resolve the figure's identity. Following project philosophy, the translation preserves the wording and leaves interpretation open rather than importing later theological categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
