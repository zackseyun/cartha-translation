translation:
  text: And when I went out below, I saw him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'below' translates a spatial term that could also be rendered
      'down' or 'beneath'; the exact reference depends on the larger dream setting.
    reason: lexical_alternative
  - marker: b
    text: The object is simply 'him' in the Ge'ez; the verse itself does not restate
      the figure's identity.
    reason: alternative_reading
lexical_decisions:
- source_word: ሶበ
  chosen: when
  alternatives:
  - and when
  - at the time when
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal conjunction introducing the action sequence; in English the
    temporal sense is best carried by 'when,' while the preceding waw supplies the
    connective 'and'.
- source_word: ወፃእኩ
  chosen: I went out
  alternatives:
  - I came out
  - I departed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: First-person singular perfect of 'to go/come out.' 'Went out' preserves
    the motion away from an interior or prior location without overinterpreting the
    scene.
- source_word: ታሕተ
  chosen: below
  alternatives:
  - downward
  - beneath
  - down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locative/adverbial term meaning 'below' or 'beneath.' 'Below' keeps the
    spatial imagery concise and apocalyptic without forcing a more specific destination.
- source_word: ወርኢክዎ
  chosen: I saw him
  alternatives:
  - and I saw him
  - I looked at him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the common verb 'to see,' with object suffix likely masculine
    singular. 'I saw him' is the most direct rendering; the masculine object is retained
    rather than neutralized.
