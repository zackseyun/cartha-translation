translation:
  text: And when it fell upon the earth, I saw the earth being swallowed into a great
    abyss, and mountains were suspended upon mountains, and hills sank down upon hills,
    and tall trees were torn up from their trunks and were thrown down and sank into
    the abyss.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great deep' or 'a great chasm.' The Ge'ez term denotes a vast depth;
      'abyss' best preserves the apocalyptic force.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'mountains were suspended upon mountains' is intentionally retained
      as a strange visionary image rather than smoothed into a more ordinary description.
    reason: cultural_note
  - marker: c
    text: The wording about the trees may also be understood more generally as being
      severed from their base or stock.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይወድቅ
  chosen: it fell
  alternatives:
  - it was falling
  - it came down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The imperfect with narrative waw in this visionary sequence is best rendered
    as a simple past event within the dream report.
- source_word: ትትወሐጥ
  chosen: being swallowed
  alternatives:
  - was engulfed
  - was swallowed up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense conveys the earth being consumed or engulfed;
    'being swallowed' preserves the vivid apocalyptic image without over-paraphrase.
- source_word: ቀላይ ዐቢይ
  chosen: a great abyss
  alternatives:
  - a great chasm
  - a great deep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context this denotes a vast depth or pit. 'Abyss' preserves
    cosmic and judgment imagery better than the more ordinary 'chasm.'
- source_word: አድባር ዲበ አድባር ይስቀሉ
  chosen: mountains were suspended upon mountains
  alternatives:
  - mountains were hung upon mountains
  - mountains were heaped upon mountains
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests hanging or being suspended rather than simply piling
    up. The strange image should be preserved as visionary disruption of creation.
- source_word: አውግር ዲበ አውግር ይሰጠሙ
  chosen: hills sank down upon hills
  alternatives:
  - hills were submerged upon hills
  - hills collapsed upon hills
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries the sense of sinking or submerging. 'Sank down' is natural
    English while retaining the catastrophic imagery.
- source_word: ዕፀወ ነዋኃት
  chosen: tall trees
  alternatives:
  - great trees
  - lofty trees
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective indicates height/loftiness. 'Tall trees' is clear modern
    English and fits the visual scene.
- source_word: ይትገዘሙ እምጕንዶቲሆሙ
  chosen: were torn up from their trunks
  alternatives:
  - were cut off from their stumps
  - were uprooted from their roots
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to violent separation from the tree's base or stock.
    Because the Ge'ez specifies their lower part/trunk rather than roots explicitly,
    'from their trunks' is the more restrained rendering.
- source_word: ይትገደፉ
  chosen: were thrown down
  alternatives:
  - were cast down
  - were hurled away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive of casting or throwing fits the sequence of destruction and
    avoids softening the force.
- source_word: ይሰጠሙ ውስተ ቀላይ
  chosen: sank into the abyss
  alternatives:
  - were submerged in the abyss
  - went down into the deep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repeating 'abyss' maintains the lexical and imagistic coherence of the
    verse.
