theological_decisions:
- issue: Nature of the cosmic catastrophe imagery
  chosen_reading: Render the scene as literal visionary imagery of creation collapsing,
    without reducing it to a mere metaphor for political upheaval in the main text.
  alternative_readings:
  - Treat mountains and trees symbolically in translation
  - Generalize the imagery as an earthquake or flood
  rationale: The Dream Visions regularly use concrete, destabilizing cosmic images.
    The translation should preserve the vision's raw imagery and leave symbolic interpretation
    to readers or notes.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten apocalyptic imagery.
