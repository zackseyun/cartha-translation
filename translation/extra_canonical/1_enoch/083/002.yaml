translation:
  text: 'I saw two visions before I took a wife, and one of them was not like the
    other: the first when I was learning the book, and the second before I took your
    mother—I saw a mighty vision; and concerning them I made supplication to the Lord.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when I was being taught the book.' The Ge'ez verb may imply either learning
      or being instructed.
    reason: lexical_alternative
  - marker: b
    text: '''A mighty vision'' may also be rendered ''a severe'' or ''powerful vision,''
      emphasizing the intensity of the revelation.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'concerning them' could also mean 'because of them,' indicating
      that the visions prompted Enoch's prayer.
    reason: lexical_alternative
  - marker: d
    text: Or 'and the second, before I took your mother, I saw a mighty vision'.
    reason: previous_rendering
lexical_decisions:
- source_word: ክልኤተ ራእየ
  chosen: two visions
  alternatives:
  - two dream-visions
  - two revelations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase straightforwardly denotes a pair of visionary experiences.
    'Visions' is the most natural English rendering, while preserving the apocalyptic
    register.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A simple first-person visionary report. 'I saw' is clear modern English
    and fits the repeated dream-report style.
- source_word: እንበለ እንሣእ ብእሲተ
  chosen: before I took a wife
  alternatives:
  - before I married
  - before I took a woman as wife
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction marks time prior to marriage. 'Took a wife' preserves
    the source's marital idiom better than the flatter 'married.'
- source_word: ወአሐዱሂ እምኔሆሙ ኢይትማሰል ምስለ ካልኡ
  chosen: and one of them was not like the other
  alternatives:
  - and one of them did not resemble the other
  - and they were unlike one another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez emphasizes dissimilarity between the two visions. The chosen
    rendering is idiomatic while retaining the contrast.
- source_word: ቀዳማየ
  chosen: the first
  alternatives:
  - the former
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks the first of the two visions in sequence.
- source_word: አመ እትሜሀር መጽሐፈ
  chosen: when I was learning the book
  alternatives:
  - when I was studying the book
  - when I was being taught from the book
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests being taught or learning; 'the book' is retained literally
    rather than generalized, since the text itself uses that concrete term.
- source_word: ወካልአ
  chosen: and the second
  alternatives:
  - and another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context, this clearly refers to the second vision in the pair.
- source_word: እንበለ እንሥእ ለእምከ
  chosen: before I took your mother
  alternatives:
  - before I married your mother
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The direct address 'your mother' shows Enoch is speaking to his son(s).
    'Took your mother' preserves the marital idiom and the familial address.
- source_word: ራእየ ጽኑዐ
  chosen: a mighty vision
  alternatives:
  - a strong vision
  - a severe vision
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጽኑዐ can denote strength, firmness, or intensity. In visionary context,
    'mighty' best conveys the overwhelming force of the experience without overinterpreting
    it as necessarily terrifying.
- source_word: ወበእንቲአሆሙ አስተብቋዕክዎ ለእግዚእ
  chosen: and concerning them I made supplication to the Lord
  alternatives:
  - and because of them I entreated the Lord
  - and on account of them I prayed to the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase can mean 'concerning' or 'because of' them;
    the verb denotes earnest petition. 'Made supplication' preserves the elevated
    tone and the gravity of Enoch's response.
