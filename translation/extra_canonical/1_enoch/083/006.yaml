translation:
  text: And Malyal lifted me up from where I was, while I was lying beside him, and
    he said to me, “Why do you cry out like this, my son, and why do you lament like
    this?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The name rendered 'Malyal' likely reflects the patriarch Mahalalel in Ethiopic
      form; some translators normalize the name.
    reason: lexical_alternative
  - marker: b
    text: 'The wording distinguishes two related actions: first a loud crying out,
      then lamenting or grieving.'
    reason: lexical_alternative
lexical_decisions:
- source_word: መላእያል
  chosen: Malyal
  alternatives:
  - Mahalalel
  - Mahalal'el
  lexicon: Ge'ez proper name tradition / Charles Ethiopic Enoch
  rationale: The form is a personal name in the Ethiopic witness. It likely corresponds
    to the patriarch Mahalalel, but the immediate task is to translate the given Ge'ez
    witness rather than normalize silently to a more familiar biblical spelling. A
    more normalized identification is noted as an alternative.
- source_word: እምሔውየ
  chosen: from where I was
  alternatives:
  - from my place
  - from there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks source or location from which Enoch is raised. 'From
    where I was' preserves the locative sense without over-specifying a physical setting.
- source_word: አንሥአኒ
  chosen: lifted me up
  alternatives:
  - raised me
  - took me up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes raising or lifting. 'Lifted me up' fits the physical
    and visionary context and preserves the vividness of the action.
- source_word: እንዘ እነ እስክብ
  chosen: while I was lying
  alternatives:
  - as I lay
  - while I lay sleeping
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction indicates a contemporaneous state of lying down. Because
    the explicit idea of sleep is not required by the wording here, 'while I was lying'
    is the more restrained rendering.
- source_word: ኀቤሁ
  chosen: beside him
  alternatives:
  - with him
  - near him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition expresses proximity. 'Beside him' gives a concrete spatial
    sense suitable to the scene.
- source_word: ትጸርኅ
  chosen: you cry out
  alternatives:
  - you shout
  - you wail
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys a loud cry. 'Cry out' preserves intensity without forcing
    the nuance toward either pain or public proclamation.
- source_word: ወልድየ
  chosen: my son
  alternatives:
  - child of mine
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct address of familial tenderness or seniority. 'My son' is the
    natural elevated English equivalent and suits the patriarchal setting.
- source_word: ትአወዩ
  chosen: you lament
  alternatives:
  - you grieve
  - you mourn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The second verb is distinct from the first and should not be flattened
    into a duplicate. 'Lament' preserves the emotional and vocal dimension while differentiating
    it from 'cry out'.
