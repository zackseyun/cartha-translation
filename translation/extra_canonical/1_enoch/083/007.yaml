theological_decisions:
- issue: Referent of the pronouns in the final clauses
  chosen_reading: The pronouns are rendered impersonally ('it') and left somewhat
    open, referring to the ominous dream-vision and its disclosed judgment on earthly
    sin.
  alternative_readings:
  - The clauses refer specifically to the earth
  - The clauses refer specifically to sin
  - The clauses refer to the vision itself as concealing/revealing judgment
  rationale: The Ethiopic sequence is syntactically compressed and does not clearly
    identify each pronoun's referent. Preserving some ambiguity is preferable to resolving
    it dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
