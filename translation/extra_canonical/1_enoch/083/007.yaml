translation:
  text: 'And I told him all the vision that I had seen, and he said to me, “Severe
    is the sight you have seen, my son, and mighty is the vision of your dream: it
    has hidden all the sin of the earth, and it will sink while it is in the abyss,
    and it will be wrapped in great darkness.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'it has hidden all the sin of the earth' is difficult. The Ethiopic
      appears to use a verb meaning 'hide' or 'conceal'; some interpreters understand
      the line more broadly as the dream exposing or encompassing the earth's sin
      and its judgment.
    reason: lexical_alternative
  - marker: b
    text: '''Abyss'' renders a term that can also denote the deep or sea; the apocalyptic
      context favors the more cosmic sense.'
    reason: lexical_alternative
  - marker: c
    text: The final expression is textually and lexically difficult; the sense is
      that of being enclosed or covered over in overwhelming darkness or gloom.
    reason: textual_variant
lexical_decisions:
- source_word: ነገርክዎ
  chosen: I told him
  alternatives:
  - I recounted to him
  - I declared to him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb introduces Enoch's report of the dream to his grandfather; 'told
    him' is natural English while preserving direct narration.
- source_word: ራእየ
  chosen: vision
  alternatives:
  - appearance
  - sight
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context this term regularly denotes a visionary experience,
    not merely ordinary seeing.
- source_word: ጽኑዐ
  chosen: severe
  alternatives:
  - hard
  - terrible
  - firm
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective can denote hardness or severity. Here, in response to a
    catastrophic dream, 'severe' preserves the ominous force without overcommitting
    to 'terrible' if the base sense is 'hard/grievous'.
- source_word: ርኢከ
  chosen: the sight you have seen
  alternatives:
  - your seeing
  - what you saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez repeats the seeing-root for emphasis. English smooths this
    slightly but retains the concrete visionary focus.
- source_word: ኃያለ
  chosen: mighty
  alternatives:
  - powerful
  - strong
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used predicatively of the dream-vision, it conveys overwhelming force
    rather than moral quality.
- source_word: ኅቡኣተ
  chosen: it has hidden
  alternatives:
  - it conceals
  - it covers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form likely derives from 'hide/conceal.' The clause is difficult,
    but this rendering stays close to the Ethiopic wording rather than importing a
    smoother interpretive paraphrase.
- source_word: ኃጢአተ ምድር
  chosen: the sin of the earth
  alternatives:
  - the earth's sin
  - the sins of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular collective 'sin' fits apocalyptic discourse about the world's
    corruption; plural is possible but less directly reflected in the wording given.
- source_word: ትሰጠም
  chosen: it will sink
  alternatives:
  - it will be submerged
  - it will go down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb evokes plunging or sinking, preserving the judgment imagery.
- source_word: ቀላይት
  chosen: the abyss
  alternatives:
  - the deep
  - the sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic setting, 'abyss' better preserves the cosmic/judgmental
    resonance than the more ordinary 'sea,' though the underlying image is of deep
    waters.
- source_word: ተሐጕል ኅጕለ ዐቢየ
  chosen: it will be wrapped in great darkness
  alternatives:
  - it will be covered with a great covering
  - it will be enveloped in great gloom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated cognate expression suggests being enclosed or covered over.
    'Wrapped in great darkness' captures the enclosing judgment image in readable
    English.
