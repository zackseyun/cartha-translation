lexical_decisions:
- source_word: እምኔሁ
  chosen: because of it
  alternatives:
  - from it
  - thereupon/from this
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The preposition with pronominal suffix can denote source or cause. In this dream-report context, the sense is best taken causally/resultatively: what Enoch saw prompted the utterance that follows.'
- source_word: ወድቀ ነገር ውስተ አፉየ
  chosen: a word fell into my mouth
  alternatives:
  - speech came into my mouth
  - a matter fell into my mouth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom is preserved rather than flattened to a generic 'I spoke,' since the visionary setting suggests an involuntary or inspired utterance. 'Word' is more transparent than 'matter' here.
- source_word: አንሣእኩ
  chosen: I lifted up
  alternatives:
  - I raised
  - I uttered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of the verb of raising/lifting, retained because it governs the following cry and preserves the vividness of the report.
- source_word: እጽራሕ
  chosen: a cry
  alternatives:
  - my voice
  - an outcry
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun/verb complex relates to crying out loudly. 'A cry' keeps the emotional force without overinterpreting whether it is lament, alarm, or proclamation.
- source_word: ተሐጕለት
  chosen: is swallowed up
  alternatives:
  - has been covered over
  - has perished
  - has sunk down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to convey being engulfed or swallowed. In the flood-vision context, 'is swallowed up' preserves the catastrophic imagery better than a flatter 'perished.'
- source_word: ምድር
  chosen: the earth
  alternatives:
  - the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this cosmic-dream setting, 'earth' better matches the scale of the vision, though 'land' remains a possible narrower alternative.
