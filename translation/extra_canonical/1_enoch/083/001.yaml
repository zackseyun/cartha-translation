translation:
  text: And now, my son Methuselah, I will show you all my visions that I have seen;
    I will recount them before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The wording uses two verbs of disclosure: first ''show,'' then ''recount/tell.''
      The pairing emphasizes both visionary display and spoken narration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይእዜኒ
  chosen: And now
  alternatives:
  - And at this time
  - And now then
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Discourse marker introducing a new speech act. 'And now' preserves the
    transition naturally without over-formalizing it.
- source_word: አርእየከ፡
  chosen: I will show you
  alternatives:
  - I have shown you
  - let me show you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the causative/showing verb with 2ms object suffix. In context it
    introduces what Enoch is about to disclose to Methuselah, so future-like 'I will
    show you' fits the speech better than a completed past.
- source_word: ወልድየ፡
  chosen: my son
  alternatives:
  - O my son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct filial address. 'My son' is clear and preserves the intimate instructional
    tone.
- source_word: ማቱሳላ፡
  chosen: Methuselah
  alternatives:
  - Mathusala
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard English transliteration of the proper name, following project
    policy to transliterate names rather than translate them.
- source_word: ኵሎ፡ ራእያትየ፡
  chosen: all my visions
  alternatives:
  - all my revelations
  - all the visions of mine
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes visionary sights/visions. 'Visions' preserves the apocalyptic
    register better than the broader 'revelations.'
- source_word: እለ፡ ርኢኩ፡
  chosen: that I have seen
  alternatives:
  - which I saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative clause qualifying the visions. English present perfect sounds
    natural for prior experiences now being reported, while still reflecting completed
    seeing.
- source_word: በቅድሜከ፡
  chosen: before you
  alternatives:
  - in your presence
  - to your face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally spatial/presential language. 'Before you' keeps the formal,
    elevated tone and avoids flattening the scene into merely conversational 'to you.'
- source_word: እነግር።
  chosen: I will recount them
  alternatives:
  - I will tell them
  - I will declare them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is one of telling/narrating. 'Recount' suits the introduction
    to a sequence of dream visions and preserves the narrative force.
