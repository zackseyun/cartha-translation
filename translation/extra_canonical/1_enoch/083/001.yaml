theological_decisions:
- issue: Relation between 'show' and 'recount' in the same verse
  chosen_reading: 'Retain both verbs distinctly: ''I will show you ... I will recount
    them before you.'''
  alternative_readings:
  - Collapse into a single English verb such as 'tell' or 'make known'
  rationale: 'The Ge''ez uses two disclosure verbs, one for showing and one for narrating.
    Keeping both preserves the visionary texture: the visions are both displayed and
    verbally recounted.'
  doctrine_reference: Translation philosophy §Consistency of key terms, or documented
    exception.
