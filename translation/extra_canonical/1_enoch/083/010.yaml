translation:
  text: And after this I arose and prayed and entreated and asked, and I wrote down
    my prayer for the generations of the world; and I showed you everything, my son
    Methuselah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for all future generations' or 'for the generations forever'; the Ge'ez
      phrase can carry the sense of enduring generations beyond the present age.
    reason: lexical_alternative
  - marker: b
    text: Or 'and I showed everything to you'.
    reason: previous_rendering
lexical_decisions:
- source_word: እምኔሁ
  chosen: after this
  alternatives:
  - from this
  - thereupon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'In narrative sequence this prepositional form commonly marks transition
    from the preceding vision experience: ''after this'' or ''thereupon.'' ''After
    this'' is clear modern English and preserves the temporal progression.'
- source_word: ተንሣእኩ
  chosen: I arose
  alternatives:
  - I got up
  - I stood up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal but readable rendering that preserves the bodily response after
    the dream/vision. 'Arose' fits the elevated register better than 'got up.'
- source_word: ጸለይኩ
  chosen: I prayed
  alternatives:
  - I made prayer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward rendering of the prayer verb; no need to expand beyond
    the source.
- source_word: አስተብቋዕኩ
  chosen: entreated
  alternatives:
  - made supplication
  - besought
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This verb intensifies the prayer language toward supplication/pleading.
    'Entreated' preserves the heightened tone without archaic excess.
- source_word: ሰአልኩ
  chosen: asked
  alternatives:
  - petitioned
  - inquired
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Kept distinct from the previous supplication verb to preserve the piling
    up of prayer actions. 'Asked' is simple and transparent.
- source_word: ጸሎትየ
  chosen: my prayer
  alternatives:
  - my petition
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun directly resumes the preceding prayer language. 'Prayer' is
    the most natural and consistent gloss.
- source_word: ጸሐፍኩ
  chosen: I wrote down
  alternatives:
  - I wrote
  - I recorded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The act is not merely composing but committing the prayer to writing.
    'Wrote down' makes that explicit without overinterpreting.
- source_word: ለትውልደ ዓለም
  chosen: for the generations of the world
  alternatives:
  - for the generations forever
  - for the generations of eternity
  - for the generations of the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is somewhat idiomatic and may point to enduring future generations.
    I retain the more literal 'of the world' in the main text for auditability, since
    the Ge'ez witness given supports that wording, while noting more idiomatic alternatives
    in a footnote.
- source_word: ኵሎ
  chosen: everything
  alternatives:
  - all things
  - it all
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Comprehensive object of disclosure; 'everything' is idiomatic and complete.
- source_word: አርአየከ
  chosen: I showed ... to you
  alternatives:
  - I made ... seen to you
  - I revealed ... to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Causative of seeing. 'Showed' is the most direct rendering; 'revealed'
    would add interpretive weight not required by the verb itself.
- source_word: ወልድየ ማቱሳላ
  chosen: my son Methuselah
  alternatives:
  - Methuselah my son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Natural English order while preserving the filial address and the transliterated
    personal name.
