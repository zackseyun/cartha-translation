theological_decisions:
- issue: Scope of ለትውልደ ዓለም
  chosen_reading: for the generations of the world
  alternative_readings:
  - for the generations forever
  - for all future generations
  - for the generations of eternity
  rationale: The phrase likely points beyond Enoch's immediate moment to later generations,
    but the exact nuance of ዓለም can range from world/age/eternity. The main text keeps
    the Ge'ez wording close rather than resolving the ambiguity into a more interpretive
    'forever.'
  doctrine_reference: Preserve theological tension rather than resolve it; when uncertain,
    prefer transparent English plus footnote.
