  category: mistranslation
  tier: 3
  from: and I showed everything to you
  to: and I will show everything to you
  rationale: 'The draft translates the verb as a 1st-person perfect (''I showed''),
    which in Ge''ez would be አርአይኩከ (ʾarʾaykukä). The OCR text has አርአየከ (ʾarʾayäkä,
    ''he showed you''), which is almost certainly an OCR error for the 1st-person
    subjunctive/imperfect አርእየከ (ʾarʾəyakkä, ''I will show you'' / ''let me show you'').
    Contextually, Enoch is introducing the vision he is about to relate to Methuselah,
    requiring the prospective ''I will show you''. | Adjudicator: The reviewer correctly
    identifies an OCR error in the provided source text (አርአየከ for አርእየከ). The form
    in the critical editions is አርእየከ (ʾarʾəyakkä), which is the first-person singular
    imperfect/subj'
