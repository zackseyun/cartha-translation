theological_decisions:
- issue: Whether መሃይምን should be rendered in a way that emphasizes inward belief or
    covenantal reliability
  chosen_reading: faithful
  alternative_readings:
  - believing
  - trustworthy
  rationale: In this context the term explains why the son is suited to intercede
    before God during impending cosmic judgment. 'Faithful' preserves that moral-religious
    quality without narrowing it to mere intellectual belief.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
