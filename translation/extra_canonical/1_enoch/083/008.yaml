translation:
  text: And now, my son, rise and make your petition to the Lord of glory, since you
    are faithful, that a remnant may remain upon the earth and that he may not wipe
    out the whole earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez uses a doubled expression for what is left over ('remain a remnant'
      / 'be left as residue'), which is rendered here as 'a remnant may remain' to
      preserve the emphasis.
    reason: lexical_alternative
  - marker: b
    text: The title 'Lord of glory' is kept as a formal divine epithet rather than
      simplified to 'glorious Lord.'
    reason: cultural_note
lexical_decisions:
- source_word: ተንሥእ
  chosen: rise
  alternatives:
  - stand up
  - arise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative of getting up; 'rise' is elevated but natural English and
    fits the urgent exhortation in visionary speech.
- source_word: አስተብቍዖ
  chosen: make your petition
  alternatives:
  - beseech
  - entreat
  - pray
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries the sense of earnest supplication or request. 'Make
    your petition' preserves the formal, intercessory tone better than the flatter
    'pray' while remaining readable.
- source_word: ለእግዚአ ስብሐት
  chosen: to the Lord of glory
  alternatives:
  - to the glorious Lord
  - to the Lord, the Glorious One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'to the Lord of glory.' This genitival title is preserved because
    apocalyptic diction often uses exalted divine titles, and the phrase should not
    be flattened into generic devotional language.
- source_word: መሃይምን
  chosen: faithful
  alternatives:
  - believing
  - trustworthy
  - one who has faith
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word describes Enoch as reliable or believing in a way that grounds
    his fitness for intercession. 'Faithful' is concise and preserves both trust and
    steadfastness better than the more modern-sounding 'believing'.
- source_word: ይትረፍ ትራፍ
  chosen: a remnant may remain
  alternatives:
  - survivors may be left
  - something may be spared
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled cognate expression intensifies the idea of what is left over
    or spared. 'A remnant may remain' preserves the repetition's force and the judgment-survival
    motif common in apocalyptic contexts.
- source_word: ወኢይደምስሳ ለኵላ ምድር
  chosen: and that he may not wipe out the whole earth
  alternatives:
  - and that he may not destroy all the earth
  - and that he may not blot out the entire earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes destruction or obliteration. 'Wipe out' conveys catastrophic
    totality in idiomatic English without becoming colloquial in context; 'the whole
    earth' preserves the universal scope.
