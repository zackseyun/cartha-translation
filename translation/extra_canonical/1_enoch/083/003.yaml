theological_decisions:
- issue: Cosmic referent of ሰማይ
  chosen_reading: the heaven refers to the cosmic heaven, not merely weather-sky
  alternative_readings:
  - the sky
  rationale: The verse belongs to a dream vision of cosmic upheaval. Rendering it
    as 'sky' would flatten the apocalyptic imagery into meteorological language.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic language.
