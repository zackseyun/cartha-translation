translation:
  text: I was lying down in the house of my grandfather Mahalalel, and I saw in a
    vision that the heaven was being cleansed and swept away, and it fell upon the
    earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sky was being cleansed and swept away.' The Ge'ez wording is vivid
      but somewhat uncertain in the middle verb, which likely conveys violent removal
      before the fall to earth.
    reason: lexical_alternative
  - marker: b
    text: Or 'was being cleansed and swept away'.
    reason: previous_rendering
  - marker: c
    text: Or 'I lay down'.
    reason: previous_rendering
lexical_decisions:
- source_word: ስኩበ
  chosen: I lay down
  alternatives:
  - I reclined
  - I slept
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes lying down/reclining. In this visionary setting it introduces
    the posture preceding the dream without requiring the stronger sense 'slept' in
    the English main text.
- source_word: ኮንኩ
  chosen: I was
  alternatives:
  - I became
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used idiomatically with the preceding verb to form the narrative expression
    'I lay down'/'I was lying.' It is absorbed into smooth English rather than translated
    woodenly.
- source_word: በቤት
  chosen: in the house
  alternatives:
  - at the house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward locative phrase; 'in the house' preserves the concrete
    domestic setting of the vision report.
- source_word: መላሕእል
  chosen: Mahalalel
  alternatives:
  - Mahalaleel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A personal name, transliterated rather than translated, following project
    policy for names. The form 'Mahalalel' reflects common English transliteration
    from the Ge'ez form.
- source_word: እምሑውየ
  chosen: of my grandfather
  alternatives:
  - of my ancestor
  - of my forefather
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The kinship term points to an ascendant relative; in Enoch's genealogy
    Mahalalel is specifically his grandfather, so the more precise rendering fits
    the narrative context.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I looked and saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard visionary reporting verb; simple 'I saw' preserves the apocalyptic
    narration.
- source_word: በራእይ
  chosen: in a vision
  alternatives:
  - in the vision
  - by a vision
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase marks the mode of perception. 'In a vision'
    is idiomatic and preserves the revelatory register.
- source_word: ሰማይ
  chosen: the heaven
  alternatives:
  - heaven
  - the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context this refers to the cosmic heaven rather than merely
    the visible sky. The singular with article-like force is retained as 'the heaven'
    for elevated register.
- source_word: ይትነጻጻ፡
  chosen: was being cleansed
  alternatives:
  - was being purified
  - was being wiped clean
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive form suggests cleansing or purification. 'Cleansed'
    preserves the vivid and possibly cultic-cosmic force without overinterpreting.
- source_word: ወይትሀየድ
  chosen: and swept away
  alternatives:
  - and was shaken loose
  - and was carried off
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact nuance is difficult in OCR form, but the sequence with the
    following fall suggests violent removal or sweeping away. This keeps the catastrophic
    imagery while acknowledging some lexical uncertainty.
- source_word: ወይወድቅ
  chosen: and it fell
  alternatives:
  - and was falling
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward falling verb, central to the dream's cosmic collapse
    imagery.
- source_word: ዲበ፡ ምድር
  chosen: upon the earth
  alternatives:
  - onto the earth
  - on the ground
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks downward movement onto the earth as a whole, not merely
    local ground; 'upon the earth' suits the apocalyptic scale.
