- source_word: ጼወኒ
  chosen: myrrh
  alternatives:
  - incense
  - spice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is commonly understood as a fragrant resin/spice, and 'myrrh'
    best preserves the specific aromatic comparison without flattening it to a generic
    perfume term.
