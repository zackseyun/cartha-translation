translation:
  text: And I went along my way and saw seven glorious mountains, each one differing
    from the other; and their stones were glorious and beautiful, and all of them
    were glorious and splendid in appearance, and fair in face. Three were toward
    the east, one set upon another, and three toward the north, one set upon another,
    with deep ravines and one valley, and they did not come near one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez description of the final landscape features is difficult. The
      clause rendered 'with deep ravines and one valley' may describe the spaces between
      the mountain groupings rather than an additional feature beside them.
    reason: textual_variant
  - marker: b
    text: The phrase 'fair in face' is intentionally retained from the Ge'ez imagery,
      which describes the mountains in almost personified visual terms.
    reason: cultural_note
lexical_decisions:
- source_word: ሖርኩ
  chosen: I went along
  alternatives:
  - I traveled
  - I proceeded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A simple motion verb in first person narrative. 'Went along' preserves
    the visionary travel sequence without overformal stiffness.
- source_word: መንገሌሁ
  chosen: my way
  alternatives:
  - my path
  - the road before me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'my way/path.' 'My way' fits idiomatic English while retaining
    the travel imagery of the vision.
- source_word: ነጸርኩ
  chosen: saw
  alternatives:
  - looked upon
  - beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is visual perception. 'Saw' is clear modern English; 'beheld'
    would sound archaic.
- source_word: ሰብዐተ አድባረ ክቡራነ
  chosen: seven glorious mountains
  alternatives:
  - seven honored mountains
  - seven majestic mountains
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: አድባር is 'mountains'; ክቡራነ carries honor/splendor/majesty. 'Glorious'
    preserves the elevated apocalyptic register.
- source_word: ወኵሉ ፩እምነ ፩እንዘ ይትዌለጥ
  chosen: each one differing from the other
  alternatives:
  - each distinct from the other
  - each separated from the other
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks distinction among the seven mountains. 'Differing' best
    captures qualitative difference rather than mere spatial separation.
- source_word: እእባኒ
  chosen: their stones
  alternatives:
  - their rocky masses
  - their rocks
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural noun from 'stone.' 'Their stones' is slightly literal but preserves
    the text's focus on the mountains' material composition.
- source_word: ሠናያነ
  chosen: beautiful
  alternatives:
  - goodly
  - fair
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A positive aesthetic descriptor. 'Beautiful' is natural English and suits
    the visionary description.
- source_word: ወኵሉ ክቡር ወስቡሕ ራእዮሙ
  chosen: all of them were glorious and splendid in appearance
  alternatives:
  - their whole appearance was glorious and praiseworthy
  - all were honorable and splendid to look at
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause intensifies the visual grandeur. 'In appearance' renders ራእዮሙ
    transparently.
- source_word: ወሠናይ ገጾሙ
  chosen: fair in face
  alternatives:
  - beautiful in aspect
  - pleasant in appearance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'their face was beautiful/good.' Because mountains are personified
    in visionary description, 'fair in face' preserves the striking imagery better
    than flattening it.
- source_word: ፫መንገለ ጽባሕ
  chosen: three were toward the east
  alternatives:
  - three on the eastern side
  - three toward the sunrise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጽባሕ here denotes east/morning. 'Toward the east' is straightforward and
    spatially clear.
- source_word: ጽኑዓን ፩ዲበ ፩
  chosen: one set upon another
  alternatives:
  - firmly placed one above another
  - stacked one upon another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The wording suggests a vertical or tiered arrangement. 'Set upon another'
    preserves the image without implying artificial construction.
- source_word: ፫መንገለ ሰሜን
  chosen: three toward the north
  alternatives:
  - three on the northern side
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple directional phrase parallel to the eastern grouping.
- source_word: ቈላት ዕሙቅ
  chosen: deep ravines
  alternatives:
  - deep valleys
  - deep hollows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes depressions/valleys; with 'deep' the sense is more rugged
    than a gentle valley, so 'ravines' fits the mountainous setting.
- source_word: ጠዋያት አሐቲ ለአሐቲ
  chosen: one valley
  alternatives:
  - a valley between them
  - a single gorge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text is difficult, but appears to mention a valley in relation to
    the mountain groupings. 'One valley' stays close to the wording while leaving
    room for the following separation clause.
- source_word: ኢይትቃረባ
  chosen: they did not come near one another
  alternatives:
  - they were not near each other
  - they did not approach one another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A reciprocal negative expressing separation. This likely refers to the
    valleys/ravines or the mountain groupings remaining distinct.
