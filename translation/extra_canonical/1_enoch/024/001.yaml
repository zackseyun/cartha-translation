translation:
  text: And from there I went to another place of the earth, and he showed me a mountain
    of fire that blazed day and night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The subject of 'he showed me' is implicit in the Ge'ez; context suggests
      Enoch's angelic guide.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምህየ
  chosen: from there
  alternatives:
  - thence
  - from that place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks movement onward within the visionary journey. 'From there' is clear
    modern English while preserving the spatial sequence.
- source_word: ሖርኩ
  chosen: I went
  alternatives:
  - I traveled
  - I journeyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple first-person motion verb in a vision report. 'I went' preserves
    the direct narrative style without adding nuance not required by the Ge'ez.
- source_word: ካልአ መካነ ምድር
  chosen: another place of the earth
  alternatives:
  - another region of the earth
  - another place on the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'another place of earth/land.' 'Place of the earth' keeps the
    cosmic-geographical feel of apocalyptic travel better than a smoother but less
    literal 'region.'
- source_word: አርአየኒ
  chosen: he showed me
  alternatives:
  - he caused me to see
  - he revealed to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard vision-report verb. The subject is implicit; in context it is
    the angelic guide, but the verse itself only states 'he showed me.'
- source_word: ደብረ እሳት
  chosen: a mountain of fire
  alternatives:
  - a fiery mountain
  - the mountain of fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Construct phrase best rendered straightforwardly. 'Mountain of fire'
    preserves the stark apocalyptic image rather than converting it into an adjectival
    phrase.
- source_word: ዘያንበለብል
  chosen: that blazed
  alternatives:
  - that was flaming
  - that burned fiercely
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative clause describing ongoing fiery action. 'Blazed' is vivid and
    natural while retaining the intensity of the image.
- source_word: መዐልተ ወሌሊተ
  chosen: day and night
  alternatives:
  - by day and by night
  - continually, day and night
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A fixed temporal pair indicating unceasing duration. 'Day and night'
    is concise and preserves the repetitive apocalyptic force.
