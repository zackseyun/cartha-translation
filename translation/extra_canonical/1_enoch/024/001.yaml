theological_decisions:
- issue: Implicit subject of 'he showed me'
  chosen_reading: Retain the implicit masculine singular as 'he' rather than specifying
    'the angel' in the main text.
  alternative_readings:
  - the angel showed me
  - my guide showed me
  rationale: The immediate literary context likely identifies the guide, but the verse
    itself leaves the subject implicit. Preserving 'he' avoids importing explanatory
    material into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
