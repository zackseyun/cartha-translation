theological_decisions:
- issue: Identity of “the Holy and Great One”
  chosen_reading: A divine title for the God of Israel (the Most High) who manifests
    in theophany.
  alternative_readings:
  - A reference to an exalted angel (“a holy and great one”)
  rationale: The prologue describes a theophanic coming (cf. the Lord coming from
    his dwelling), and Enoch elsewhere uses divine epithets like “Lord of Spirits.”
    The pairing “Holy and Great” functions as a fixed epithet. Though Geʿez lacks
    articles, the title-like use warrants “the.”
  doctrine_reference: Translation Philosophy §1, §3 (original-language primacy; preserve
    theological tension without importing later phrasing).
