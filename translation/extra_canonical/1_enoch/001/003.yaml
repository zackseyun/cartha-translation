translation:
  text: 'Concerning the Chosen Ones I spoke, and I uttered a parable concerning them:
    The Holy and Great One will go forth from his dwelling.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Lifted up my parable” reflects a Semitic idiom for uttering a stylized
      saying (cf. Hebrew “to lift up a proverb”). “I uttered a parable” would be a
      smooth equivalent.
    reason: cultural_note
  - marker: b
    text: “Chosen Ones” can also be rendered “Elect,” a traditional option.
    reason: lexical_alternative
  - marker: c
    text: “Parable” (Geʿez məsəl) here means a prophetic or poetic saying, not necessarily
      a narrative story.
    reason: cultural_note
  - marker: d
    text: “Will go forth” could also be rendered “will come forth.”
    reason: lexical_alternative
  - marker: e
    text: Or 'I lifted up my parable'.
    reason: previous_rendering
lexical_decisions:
- source_word: በእንተ
  chosen: concerning
  alternatives:
  - on account of
  - about
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; Leslau, Comparative Dictionary of
    Geʿez (Classical Ethiopic)
  rationale: 'Preposition marking topic/reference; here introduces the topic of the
    utterance: the Chosen Ones.'
- source_word: ኅሩያን
  chosen: Chosen Ones
  alternatives:
  - Elect
  - chosen people
  lexicon: Leslau, Comparative Dictionary of Geʿez; Dillmann, LLA
  rationale: Plural of a term meaning “chosen, elect.” Rendering as “Chosen Ones”
    preserves plurality and avoids importing NT-specific connotations while remaining
    faithful to Enochic usage.
- source_word: እቤ
  chosen: I said
  alternatives:
  - I spoke
  - I declared
  lexicon: Dillmann, LLA
  rationale: 1cs perfect of the common verb “to say”; simple and direct in this context.
- source_word: አውሣእኩ
  chosen: I lifted up
  alternatives:
  - I raised
  - I uttered
  lexicon: Dillmann, LLA; Leslau, CDG
  rationale: Verb meaning “to lift/raise.” With ምስለ (məsəl), it forms a Semitic idiom
    “to lift up a parable/utterance,” echoing Hebrew nasaʾ mashal. Retaining “lifted
    up” keeps the prophetic-utterance formula.
- source_word: ምስለ
  chosen: parable
  alternatives:
  - proverb
  - saying
  - oracle
  lexicon: Leslau, CDG; Dillmann, LLA
  rationale: Geʿez məsəl covers proverb/parable/figurative saying; in prophetic contexts
    it denotes a stylized utterance. “Parable” preserves the idiom; note that it need
    not imply a narrative story here.
- source_word: በእንቲአሆሙ
  chosen: concerning them
  alternatives:
  - about them
  lexicon: Dillmann, LLA
  rationale: Repetition of the topic marker with pronominal suffix -humu (3pl). Keeping
    the repetition mirrors the source’s cadence.
- source_word: ይወፅእ
  chosen: will go forth
  alternatives:
  - will come forth
  - will proceed
  lexicon: Leslau, CDG; Dillmann, LLA
  rationale: Imperfect 3ms of “to go/come out.” Given the following prepositional
    phrase “from his dwelling,” “go forth” best captures emergence from a place with
    elevated tone.
- source_word: ቅዱስ ወዐቢይ
  chosen: the Holy and Great One
  alternatives:
  - the Holy Great One
  - the holy and great one
  lexicon: Leslau, CDG; Dillmann, LLA
  rationale: Two adjectives functioning as a fixed divine epithet in Enoch. Capitalization
    as a title signals its use for God without importing later Christian formulas.
- source_word: እማኅደሩ
  chosen: from his dwelling
  alternatives:
  - from his dwelling place
  - from his habitation
  lexicon: Leslau, CDG; Dillmann, LLA
  rationale: Preposition ʾə- “from” + maḥdär “dwelling” + 3ms suffix. “Dwelling” is
    clear and concise; “habitation” is more archaic.
