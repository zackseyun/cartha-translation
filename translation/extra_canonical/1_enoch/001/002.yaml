translation:
  text: 'And Enoch answered and said: "A righteous man whose eyes were opened by God saw a holy vision in the heavens, which the angels showed me; and from them I heard everything, and I understood what I saw—but not for this generation, rather for one far off that is to come."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause about Enoch's eyes being opened by God is textually awkward in the Ethiopic OCR, but the sense is that his visionary sight was divinely opened or uncovered.
    reason: textual_variant
  - marker: b
    text: '''Heavens'' reflects the plural cosmological idiom common in Semitic and apocalyptic texts.'
    reason: cultural_note
  - marker: c
    text: Or 'but for a generation far away that will come.' The final phrase may be taken collectively or as a singular future generation.
    reason: lexical_alternative
  - marker: d
    text: Or 'And Enoch, a righteous man, answered and said—his eyes having been opened by God—"I saw'.
    reason: previous_rendering
lexical_decisions:
- source_word: አውሥአ
  chosen: answered
  alternatives:
  - responded
  - spoke up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common narrative verb meaning 'answer/respond.' Even without an explicit prior question in the immediate verse, 'answered and said' is a standard Semitic-style speech introduction and should be preserved rather than flattened.
- source_word: ብእሲ ጻድቅ
  chosen: a righteous man
  alternatives:
  - the righteous man
  - a just man
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies Enoch's character. 'Righteous' preserves the moral-theological force better than 'just,' and the anarthrous sense fits 'a righteous man.'
- source_word: ዘእምኀበ እግዚአብሔር [እንዘ] አዕይን ቲሁ ክሡታት
  chosen: his eyes having been opened by God
  alternatives:
  - whose eyes were opened by God
  - with his eyes opened by the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction links Enoch's righteous status with divine disclosure. ክሡታት conveys 'opened/uncovered.' A participial English phrase preserves the subordinate force and visionary setup.
- source_word: እግዚአብሔር
  chosen: God
  alternatives:
  - the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Ethiopic Enoch this term commonly denotes God. 'God' is chosen here because the phrase is not a covenant-name formula but a statement of divine agency in opening Enoch's eyes.
- source_word: ራእየ ቅዱሰ
  chosen: a holy vision
  alternatives:
  - a sacred vision
  - the vision of the Holy One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective most naturally qualifies the vision itself in this syntax. 'Holy vision' preserves the apocalyptic register without overinterpreting it as a title for God.
- source_word: ዘበሰማያት
  chosen: in the heavens
  alternatives:
  - in heaven
  - heavenly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural 'heavens' reflects the Semitic/apocalyptic cosmological idiom and should be retained where natural in English.
- source_word: ዘአርአዩኒ መላእክት
  chosen: which the angels showed me
  alternatives:
  - that angels revealed to me
  - which angels made me see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause straightforwardly attributes the mediated revelation to angels. 'Showed me' is vivid and faithful to the visual emphasis.
- source_word: ወሰማዕኩ እምኀቤሆሙ ኵሎ
  chosen: and from them I heard everything
  alternatives:
  - and I heard all things from them
  - and I heard it all from them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the totalizing force of ኵሎ ('everything/all') and the mediating role of the angels.
- source_word: ወአእመርኩ አነ ዘእሬኢ
  chosen: and I understood what I saw
  alternatives:
  - and I came to know what I saw
  - and I perceived what I had seen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys understanding/knowledge, not mere sight. This is important in apocalyptic literature, where revelation includes interpretation.
- source_word: ወአኮ ለዛ ትውልድ አላ ለዘ ይመጽእ ርኁቃት
  chosen: but not for this generation, rather for one far off that is to come
  alternatives:
  - and not for this generation, but for a distant one that will come
  - yet not for this generation, but for those far away who are coming
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The contrast marks the revelation's future orientation. 'Generation' preserves apocalyptic temporality. ርኁቃት is rendered 'far off' rather than simply 'future' to retain the sense of distance.
