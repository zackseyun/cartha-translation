theological_decisions:
- issue: Whether ራእየ ቅዱሰ refers to a 'holy vision' or 'vision of the Holy One'
  chosen_reading: a holy vision
  alternative_readings:
  - the vision of the Holy One
  rationale: The Ge'ez syntax more naturally reads the adjective as qualifying 'vision.' Rendering it as 'vision of the Holy One' would introduce a more specific theological claim not required by the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: How explicitly to mark the revelation as future-oriented
  chosen_reading: not for this generation, rather for one far off that is to come
  alternative_readings:
  - not for this generation but for a future generation
  - not for this generation but for generations far away
  rationale: This wording preserves both the singular generational contrast and the adjective of distance, keeping the apocalyptic horizon without smoothing it into generic futurity.
  doctrine_reference: Original-language primacy over translation tradition.
