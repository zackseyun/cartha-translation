  rationale: 'In English, the idiom ''make peace with'' strongly implies ending hostilities or reconciling after a conflict, which misrepresents God''s relationship with the righteous here. The Ge''ez preposition ''ለ'' (to/for) indicates that God is establishing, making, or granting peace *for* or *to* them, not reconciling *with* them. ''Grant peace to'' or ''make peace for'' avoids this unintended theological implication. | Adjudicator: The reviewer is correct that the English idiom ''make peace with'' strongly implies ending hostilities, which misrepresents the relationship between God and the righteous in this context. The Ge''ez text'
