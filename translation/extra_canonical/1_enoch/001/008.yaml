translation:
  text: And he will grant peace to the righteous, and he will guard the chosen ones; and favor will be upon them, and they will all belong to God, and they will prosper and be blessed, and the light of God will shine upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening words appear textually awkward in the OCR witness, but the sense clearly turns to God's favor toward the righteous.
    reason: textual_variant
  - marker: b
    text: The verb rendered 'prosper' may also be understood more generally as 'do well' or 'flourish.'
    reason: lexical_alternative
  - marker: c
    text: Or 'make peace with the righteous'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሰላመ
  chosen: make peace
  alternatives:
  - grant peace
  - establish peace
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal phrase ሰላመ ይገብር is more active than simply 'give peace'; 'make peace' preserves the idiomatic force without sounding wooden.
- source_word: የዓቅቦሙ
  chosen: guard them
  alternatives:
  - keep them
  - protect them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A protective sense fits the judgment-and-preservation context. 'Guard' keeps the elevated register and avoids overinterpreting as merely inward or covenantal 'keep'.
- source_word: ሕሩያን
  chosen: the chosen ones
  alternatives:
  - the elect
  - the chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term is theologically weighty in Enochic literature. 'Chosen ones' is transparent and avoids importing later doctrinal freight that 'elect' may carry in English.
- source_word: ሣህል
  chosen: favor
  alternatives:
  - mercy
  - grace
  - compassion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense here is benevolent regard resting upon the righteous. 'Favor' fits the collocation 'will be upon them' and avoids prematurely narrowing the term to specifically salvific 'grace' or pity-focused 'mercy'.
- source_word: ዘአምላክ
  chosen: belong to God
  alternatives:
  - be God's
  - be of God
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The genitival expression indicates possession or belonging. 'Belong to God' is idiomatic modern English while preserving the covenantal identity claim.
- source_word: ይሴርሑ
  chosen: prosper
  alternatives:
  - do well
  - succeed
  - flourish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb likely conveys well-being or thriving. 'Prosper' preserves the positive outcome without reducing it to material wealth alone; a footnote notes the lexical uncertainty.
- source_word: ይትባረኩ
  chosen: be blessed
  alternatives:
  - receive blessing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward passive rendering best reflects the form and preserves the blessing formulaic tone.
- source_word: ይበርህ ሎሙ ብርሃነ አምላክ
  chosen: the light of God will shine upon them
  alternatives:
  - God's light will illumine them
  - the divine light will shine for them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the apocalyptic imagery of divine illumination. 'Shine upon them' matches the prepositional sense and keeps the elevated poetic register.
