theological_decisions:
- issue: Rendering the identity terms for the faithful group
  chosen_reading: Distinguish 'the righteous' and 'the chosen ones' as parallel but not collapsed designations
  alternative_readings:
  - Treat both as simple synonyms and smooth into one phrase
  - Render ሕሩያን as 'elect'
  rationale: The verse uses both labels in sequence, and Enochic rhetoric often layers such titles. Preserving both maintains the text's own categorization and avoids flattening its theological texture.
  doctrine_reference: Translation philosophy §§3-4; Book context note on keeping major terms locally grounded.
- issue: Force of ዘአምላክ
  chosen_reading: They will all belong to God
  alternative_readings:
  - They will all be godly
  - They will all be God's people
  rationale: The phrase most naturally expresses belonging or possession, not merely moral quality. 'Godly' would moralize the line; 'God's people' adds a noun not explicit in the text.
  doctrine_reference: Translation philosophy §1 original-language primacy.
