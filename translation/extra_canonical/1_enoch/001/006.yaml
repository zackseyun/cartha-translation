translation:
  text: And the lofty mountains will quake, and the high hills will be brought low;
    they will melt like wax before the blaze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: will be shaken; will tremble.'
    reason: lexical_alternative
  - marker: b
    text: 'Or: will be made low; will be humbled.'
    reason: lexical_alternative
  - marker: c
    text: 'Or: like wax in the presence of the flame/fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይደነግፁ (yǝdänägǝṣu)
  chosen: will quake
  alternatives:
  - will be shaken
  - will tremble
  lexicon: Leslau, Comparative Dictionary of Ge‘ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verb appears intransitive here with plural subject; “quake” preserves
    apocalyptic force and intransitivity better than passive “be shaken.”
- source_word: አድባር (ʾadbar)
  chosen: mountains
  alternatives:
  - mounts
  - mountainland
  lexicon: Leslau; Dillmann
  rationale: Common Geʿez noun for mountainous heights; plural sense is contextually
    prompted by parallelism with “hills.”
- source_word: ነዋኀን / ነዋኃት (newaḥn / newaḥat)
  chosen: lofty / high
  alternatives:
  - elevated
  - proud
  lexicon: Leslau; Dillmann
  rationale: Adjectival forms modifying mountains (m.) and hills (f.); semantic field
    of height/loftiness suits cosmic-theophanic imagery; “proud” is a metaphorical
    human quality and is less apt for inanimate terrain here.
- source_word: ይቴሐቱ (yǝtēḥatu)
  chosen: will be brought low
  alternatives:
  - will be made low
  - will be humbled
  - will be flattened
  lexicon: Leslau; Dillmann
  rationale: Passive sense of being lowered fits the parallel with lofty hills; “brought
    low” is idiomatic English for humbling/elevation reversal in theophanic contexts.
- source_word: አውግር (ʾawgr)
  chosen: hills
  alternatives:
  - hill-country
  - ridges
  lexicon: Leslau; Dillmann
  rationale: Standard gloss “hills” balances with “mountains” and matches topographical
    parallelism.
- source_word: ይትመሰዉ (yǝtmäsäw)
  chosen: will melt
  alternatives:
  - will dissolve
  - will liquefy
  lexicon: Leslau; Dillmann
  rationale: Basic meaning is to melt; “melt” is vivid and idiomatic in English, keeping
    the physical imagery.
- source_word: መዓረ (mäʿärä)
  chosen: wax
  alternatives:
  - beeswax
  lexicon: Leslau; Dillmann
  rationale: Lexically denotes wax; “wax” is sufficient in English; specifying “beeswax”
    is unnecessary and over-specific.
- source_word: ግራ (gǝra)
  chosen: before
  alternatives:
  - in the presence of
  - in front of
  lexicon: Leslau; Dillmann
  rationale: Prepositional sense “before/in the presence of” suits the simile construction;
    “before” is concise.
- source_word: እም ላህብ (ʾǝm lāhb)
  chosen: the blaze
  alternatives:
  - the flame
  - the fire
  lexicon: Leslau; Dillmann
  rationale: lāhb denotes flame/blaze; “blaze” captures the intensity better than
    the generic “fire,” while keeping the metaphor’s concreteness.
