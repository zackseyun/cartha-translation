translation:
  text: And behold, he comes with myriads of holy ones, to execute judgment upon them,
    and to destroy the wicked, and to rebuke all flesh for everything that the sinful
    and wicked have done and committed against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with ten thousands of holy ones.' The Ge'ez phrase denotes an immense
      host and may reflect a traditional numerical expression.
    reason: lexical_alternative
  - marker: b
    text: '''All flesh'' is a traditional idiom for all humanity; the translation
      keeps the concrete wording of the source.'
    reason: cultural_note
  - marker: c
    text: This verse is echoed in Jude 14–15, but the wording here is translated from
      the Ge'ez witness itself rather than conformed to later New Testament phrasing.
    reason: cross_reference
lexical_decisions:
- source_word: ወናሁ
  chosen: And behold
  alternatives:
  - And see
  - Look
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the apocalyptic deictic force and visionary register rather than
    reducing it to a simple conjunction.
- source_word: መጽአ
  chosen: he comes
  alternatives:
  - he has come
  - he will come
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez form can function in prophetic/apocalyptic discourse with vivid
    present force. 'He comes' preserves the immediacy of the vision without over-specifying
    tense.
- source_word: በትእልፊተ ቅዱሳን
  chosen: with myriads of holy ones
  alternatives:
  - with ten thousands of holy ones
  - with countless holy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes an immense heavenly retinue. 'Myriads' preserves the
    numerical-apocalyptic flavor better than the more idiomatic 'countless,' while
    avoiding unnecessary archaism.
- source_word: ይግበር ፍትሐ
  chosen: to execute judgment
  alternatives:
  - to do justice
  - to carry out judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this judicial-apocalyptic context, the idiom points to active judgment
    rather than abstract justice.
- source_word: ላዕሌሆሙ
  chosen: upon them
  alternatives:
  - against them
  - over them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition naturally yields 'upon/against.' 'Upon them' keeps the
    wording broad enough to fit the following universal judgment language.
- source_word: ይሕጕሎሙ ለረሲዓን
  chosen: to destroy the wicked
  alternatives:
  - to convict the wicked
  - to punish the wicked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb here is stronger than mere censure and fits the judgment scene's
    punitive force.
- source_word: ይዘልፍ ኵሎ ዘሥጋ
  chosen: to rebuke all flesh
  alternatives:
  - to contend with all flesh
  - to convict all humanity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The expression preserves the concrete biblical idiom 'all flesh' and
    the forensic sense of public reproof.
- source_word: ኵሉ ዘገብሩ ወረሰዩ
  chosen: everything that ... have done and committed
  alternatives:
  - all that ... have done and wrought
  - everything that ... have done and spoken
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs intensify culpable action. Rendering both avoids flattening
    the parallelism.
- source_word: ኃጥኣን ወረሲዓን
  chosen: the sinful and wicked
  alternatives:
  - sinners and the wicked
  - sinful ones and lawless ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Both terms are retained distinctly to preserve the emphatic doubling
    of moral indictment.
- source_word: ላዕሌሁ
  chosen: against him
  alternatives:
  - against it
  - before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular pronominal object most naturally refers to the coming divine
    judge; 'against him' preserves the personal affront implied by the text.
