theological_decisions:
- issue: Identity of the coming figure
  chosen_reading: Render the subject simply as 'he' without specifying 'the Lord'
    in the main text.
  alternative_readings:
  - the Lord comes
  - God comes
  rationale: The Ge'ez text as given has an implicit third-person subject. Because
    the verse stands in a context of divine theophany, readers may infer the referent,
    but the translation should not insert a title absent from the provided wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Meaning of 'holy ones'
  chosen_reading: Translate as 'holy ones' rather than 'saints' or 'angels.'
  alternative_readings:
  - saints
  - angels
  rationale: In apocalyptic context the phrase likely denotes the heavenly retinue,
    but 'holy ones' best preserves the source expression without prematurely narrowing
    it to either human saints or angels.
  doctrine_reference: Consistency of key terms, or documented exception; preserve
    ambiguity where the source is not fully explicit.
