translation:
  text: The word of blessing of Henok, with which he blessed the chosen and the righteous
    who will be present on the day of affliction, for the removal of all the wicked
    and the godless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Henok'' follows the Ge''ez form of the name; the more familiar English
      form is ''Enoch.'''
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'day of affliction' may also be understood as 'day of
      distress' or 'day of tribulation.'
    reason: lexical_alternative
  - marker: c
    text: 'The final pair distinguishes two classes of the condemned: the wicked and
      the godless/impious.'
    reason: cultural_note
lexical_decisions:
- source_word: ቃለ
  chosen: word
  alternatives:
  - words
  - utterance
  - message
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Singular construct opening formula; 'word' preserves the heading-like
    force without over-expanding to 'message.'
- source_word: በረከት
  chosen: blessing
  alternatives:
  - blessedness
  - benediction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes blessing/benediction. 'Blessing' is the most natural
    English equivalent in a superscription.
- source_word: ዘሄኖክ
  chosen: of Henok
  alternatives:
  - of Enoch
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal names are transliterated by project policy. 'Henok' reflects
    the Ge'ez form rather than importing the familiar Anglicized biblical spelling.
- source_word: በከመ ባረከ
  chosen: with which he blessed
  alternatives:
  - how he blessed
  - wherewith he blessed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative/instrumental construction points to the blessing just named
    as the means/content by which Henok blessed others. 'With which he blessed' is
    both clear and close to the syntax.
- source_word: ኅሩያነ
  chosen: the chosen
  alternatives:
  - the elect
  - the select ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes those chosen out. 'The chosen' is transparent modern
    English and avoids importing later doctrinal freight attached to 'elect' while
    preserving the category.
- source_word: ወጻድቃነ
  chosen: and the righteous
  alternatives:
  - and the just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard moral-religious designation in apocalyptic literature. 'Righteous'
    preserves the ethical and covenantal sense better than 'just' here.
- source_word: እለ ሀለዉ ይኩኑ
  chosen: who will be present
  alternatives:
  - who will exist
  - who will remain
  - who will be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction points to those who are to be there at the future time
    in view. 'Will be present' captures the temporal and situational sense more idiomatically
    than the bare 'will be.'
- source_word: በዕለተ ምንዳቤ
  chosen: on the day of affliction
  alternatives:
  - on the day of tribulation
  - on the day of distress
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a time of severe trouble. 'Affliction' preserves apocalyptic
    gravity without importing later technical eschatological language such as 'tribulation.'
- source_word: ለአሰስሎ
  chosen: for the removal of
  alternatives:
  - for taking away
  - for driving out
  - to remove
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The infinitival/purposive sense here points to the elimination of the
    wicked. 'For the removal of' fits the nominal style of the heading and preserves
    the judgment motif.
- source_word: ኵሎ እኩያነ
  chosen: all the wicked
  alternatives:
  - every evil one
  - all evildoers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Collective plural with totalizing force. 'All the wicked' is concise
    and preserves the class designation.
- source_word: ወረሲዓነ
  chosen: and the godless
  alternatives:
  - and the impious
  - and the sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term carries the sense of impious or godless persons. 'Godless' is
    strong, readable English and keeps the religious dimension sharper than 'sinners,'
    which would blur the distinction from the preceding term.
