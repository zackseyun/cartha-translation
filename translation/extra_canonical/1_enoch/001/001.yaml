theological_decisions:
- issue: Rendering of the righteous group addressed by Henok
  chosen_reading: the chosen and the righteous
  alternative_readings:
  - the elect and the righteous
  - the chosen righteous
  rationale: The Ge'ez presents two coordinated groups/descriptors. Keeping both terms
    distinct preserves the text's own categories without collapsing them into one
    title or importing later theological terminology.
  doctrine_reference: Translation philosophy §4 consistency of key terms; book-context
    guidance on chosen/righteous terminology
- issue: Eschatological phrase በዕለተ ምንዳቤ
  chosen_reading: on the day of affliction
  alternative_readings:
  - on the day of tribulation
  - on the day of judgment
  rationale: The source points to a day marked by distress; 'judgment' is implied
    by the context but not the lexical value of the noun itself. The chosen rendering
    preserves the tension between suffering and judgment without over-specifying.
  doctrine_reference: Translation philosophy §3 preserve theological tension rather
    than resolve it
