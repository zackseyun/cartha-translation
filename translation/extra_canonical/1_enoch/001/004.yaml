theological_decisions:
- issue: Divine epithet አምላክ ዓለም
  chosen_reading: Eternal God / God of eternity
  alternative_readings:
  - God of the world
  - God of the age
  rationale: The phrase functions as a theophanic title emphasizing God’s everlasting
    nature rather than spatial domain. Rendering as “Eternal God/God of eternity”
    preserves that attribute without importing covenantal names not in the text.
  doctrine_reference: Translation philosophy §Original-language primacy; §Consistency
    of key terms
