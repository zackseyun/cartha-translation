translation:
  text: And the God of eternity, from there, will tread upon Mount Sinai; he will
    appear with his host, and he will appear in the strength of his might from heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase translated “in his manifestation” is በትዕይንቱ, literally “in his
      appearance.” Some Greek witnesses have “from his camp,” a different image; the
      Ge’ez here points to a theophany (appearance) rather than an encampment.
    reason: textual_variant
  - marker: b
    text: “God of eternity” translates አምላክ ዓለም; it can also be read “God of the world/age.”
      The present rendering emphasizes duration rather than realm.
    reason: lexical_alternative
  - marker: c
    text: The verb ይከይድ is rendered “will tread” to retain the weighty theophanic
      imagery; alternatives include “will go/come forth.”
    reason: lexical_alternative
  - marker: d
    text: Or 'in his manifestation'.
    reason: previous_rendering
lexical_decisions:
- source_word: እምላከ (reading as ወ+አምላክ)
  chosen: God
  alternatives:
  - deity
  lexicon: Leslau, Comparative Dictionary of Ge‘ez (Classical Ethiopic)
  rationale: The form is understood as the conjunction ወ (“and”) plus አምላክ (“God”).
    In this context it functions as the subject of the clauses that follow.
- source_word: ዓለም
  chosen: eternity
  alternatives:
  - world
  - age
  lexicon: Leslau, Comparative Dictionary of Ge‘ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: In construct with አምላክ, the phrase denotes a divine epithet meaning “God
    of eternity,” hence “the Eternal God.” While ዓለም can mean “world/age,” here the
    attributive sense emphasizing God’s everlasting nature is most fitting.
- source_word: እምህየ
  chosen: from there
  alternatives:
  - from here
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Deictic adverb with preposition እም (“from”), referring back to the previous
    verse (his dwelling). Context favors “from there.”
- source_word: ይከይድ
  chosen: will tread
  alternatives:
  - will go
  - will come forth
  - will march
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A dynamic verb conveying purposeful movement upon a place. “Tread” preserves
    the theophanic, weighty imagery of the deity’s stepping upon holy ground, stronger
    than a neutral “go/come.”
- source_word: ዲበ
  chosen: upon
  alternatives:
  - 'on'
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preposition indicating contact/surface. “Upon” retains elevated register
    and suits the theophanic context.
- source_word: ሲና ደብር
  chosen: Mount Sinai
  alternatives:
  - Sinai, the mountain
  lexicon: Leslau, Comparative Dictionary of Ge‘ez
  rationale: Proper name plus common noun ደብር (“mountain”). Standard English toponym
    is “Mount Sinai.”
- source_word: ያስተርኢ
  chosen: will appear
  alternatives:
  - will show himself
  - will be seen
  lexicon: Leslau, Comparative Dictionary of Ge‘ez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: Causative stem of ተርእየ (to see) can mean “cause to be seen/appear.” In
    divine-theophany contexts, “appear” best captures the sense without over-specifying
    reflexivity.
- source_word: በትዕይንቱ
  chosen: in his manifestation
  alternatives:
  - in his appearance
  - in his sight
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ትእይነት denotes sight/appearance/vision. “Manifestation” is elevated and
    conveys the outward appearing of the deity; “appearance” is a close alternative.
- source_word: በኃይለ
  chosen: in the strength
  alternatives:
  - with the power
  lexicon: Leslau, Comparative Dictionary of Ge‘ez
  rationale: ኃይል is ‘strength, power.’ “Strength” pairs naturally with the following
    ጽንዕ to render an emphatic phrase.
- source_word: ጽንዑ
  chosen: of his might
  alternatives:
  - of his firmness
  - of his power
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጽንዕ carries the sense of might/firmness. The construct “strength of his
    might” preserves the intensifying collocation.
- source_word: እምሰማይ
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: Leslau, Comparative Dictionary of Ge‘ez
  rationale: Standard rendering of ሰማይ as “heaven/sky.” Singular in English adequately
    conveys the celestial source in this context.
