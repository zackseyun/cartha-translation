translation:
  text: And the earth shall be shaken, and everything that is in the earth shall be
    destroyed, and judgment shall come upon all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everything that is on the earth.' The Ge'ez reads literally 'everything
      that is in the earth.'
    reason: lexical_alternative
  - marker: b
    text: The noun rendered 'judgment' can also be understood as 'justice' or 'righteousness,'
      but here it functions as a coming act against all.
    reason: lexical_alternative
lexical_decisions:
- source_word: ትሠጠጥ
  chosen: shall be shaken
  alternatives:
  - shall tremble
  - shall quake
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes violent agitation or trembling. 'Be shaken' preserves
    the passive/resultative force and fits the cosmic-apocalyptic setting without
    over-specifying seismic imagery.
- source_word: ምድር
  chosen: the earth
  alternatives:
  - the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this cosmic judgment context, 'earth' is preferable to 'land,' since
    the scope is universal rather than local.
- source_word: ኵሉ ዘውስተ ምድር
  chosen: everything that is in the earth
  alternatives:
  - all that is on the earth
  - everything in it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is literally 'all that is in the earth.' I retain the unusual
    'in the earth' rather than smoothing to 'on the earth' because the Ge'ez witness
    points to what is contained within the earth/world as a totality, and the apocalyptic
    rhetoric benefits from that starkness.
- source_word: ይትሐጐል
  chosen: shall be destroyed
  alternatives:
  - shall perish
  - shall be consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys ruin or destruction. 'Shall be destroyed' is the clearest
    broad rendering and matches the judgment sequence of the verse.
- source_word: ፍትሕ
  chosen: judgment
  alternatives:
  - justice
  - righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the noun can overlap with 'justice' or 'righteousness,' here
    the clause 'shall come upon all' indicates an act of judicial reckoning rather
    than an abstract quality. 'Judgment' best fits the immediate syntax and apocalyptic
    context.
- source_word: ላዕለ ኵሉ
  chosen: upon all
  alternatives:
  - over all
  - against all
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition naturally means 'upon/over.' 'Upon all' preserves the
    idiom of judgment descending on the whole created order.
