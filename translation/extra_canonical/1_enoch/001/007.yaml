theological_decisions:
- issue: Whether ፍትሕ should be rendered as a moral quality ('justice/righteousness')
    or as an eschatological act ('judgment').
  chosen_reading: judgment
  alternative_readings:
  - justice
  - righteousness
  rationale: The verbal frame 'shall come upon all' favors an event of divine reckoning.
    This preserves the apocalyptic force of the verse and avoids reducing it to an
    abstract ethical statement.
  doctrine_reference: Translation philosophy §Preserve theological tension rather
    than resolve it; Contested terms table notes righteousness/justice overlap
