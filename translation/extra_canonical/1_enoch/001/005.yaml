translation:
  text: And all will fear, and the vigilant ones will tremble; and fear and great
    trembling will seize them to the ends of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase “the mighty ones” translates a generic term for strong/powerful
      beings. Some interpreters take it to refer to the Watchers (angelic beings)
      in this section, but the Ethiopic here does not use the usual technical term
      for Watchers.
    reason: lexical_alternative
  - marker: b
    text: “As far as the ends of the earth” is a Semitic idiom describing universal
      scope—the whole world to its furthest limits.
    reason: cultural_note
  - marker: c
    text: Or 'the mighty ones'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይፈርሁ
  chosen: will be afraid
  alternatives:
  - will fear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 3rd plural imperfect of a verb for fear; future/resultative sense fits
    the prophetic theophany context.
- source_word: ኵሉ
  chosen: all
  lexicon: Leslau, Comparative Dictionary of Geʿez (Classical Ethiopic)
  rationale: Common universal quantifier; no article needed in English.
- source_word: ይደለቀለቁ
  chosen: will tremble
  alternatives:
  - will be shaken
  - will quake
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: Reduplicated verb form with an intensive sense; in context of response
    to theophany, “tremble” captures the experiential nuance.
- source_word: ትጉሃን
  chosen: the mighty ones
  alternatives:
  - the strong ones
  - the heroes
  - the Watchers
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: Adjective/noun meaning strong/mighty used substantively in the plural.
    The technical term for “Watchers” elsewhere in Enoch is different; here the generic
    sense is retained.
- source_word: ይነሥኦሙ
  chosen: will seize them
  alternatives:
  - will take hold of them
  - will overtake them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperfect 3ms with object suffix -omu ‘them’; idiomatically of emotions
    taking hold of people.
- source_word: ፍርሃት
  chosen: fear
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: Standard noun for fear, often paired with trembling in theophanic contexts.
- source_word: ወረዓድ
  chosen: trembling
  alternatives:
  - quaking
  - dread
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: From Semitic root rʿd ‘to tremble’; “trembling” pairs naturally with
    “fear” in English.
- source_word: ዓቢይ
  chosen: great
  alternatives:
  - mighty
  - immense
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: Common adjective intensifying the following noun.
- source_word: እስከ
  chosen: as far as
  alternatives:
  - unto
  - up to
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: Preposition marking extent; “as far as” is clear contemporary English
    while preserving scope.
- source_word: አጽናፈ ምድር
  chosen: the ends of the earth
  alternatives:
  - the extremities of the earth
  - the farthest parts of the earth
  lexicon: Leslau, Comparative Dictionary of Geʿez
  rationale: Idiomatic expression for the earth’s farthest limits; widely used Semitic
    apocalyptic formula.
