theological_decisions:
- issue: Referent of “the mighty ones” (ትጉሃን)
  chosen_reading: Render the term generically as “the mighty ones,” leaving the referent
    open.
  alternative_readings:
  - Identify explicitly as the Watchers (angelic beings)
  - Identify as earthly rulers/heroes
  rationale: The Geʿez lexeme means “strong/mighty” and is not the usual Ethiopic
    term for the Watchers. Context allows either angelic or human ‘mighty’ figures;
    retaining the generic term preserves the ambiguity rather than importing a specific
    identification.
