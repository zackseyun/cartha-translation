theological_decisions:
- issue: Whether the verse speaks of revealed cosmic 'secrets' in a technical apocalyptic
    sense
  chosen_reading: all their hidden things
  alternative_readings:
  - all their secrets
  rationale: Although apocalyptic literature often uses 'secrets' as a technical category,
    the Ge'ez wording here is more literally 'hidden things.' The main text preserves
    that broader sense, with the alternative noted in a footnote.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
