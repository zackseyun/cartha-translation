lexical_decisions:
- source_word: ወእምድኅረዝ
  chosen: And after this
  alternatives:
  - And afterward
  - And after that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal transition formula in visionary narrative; 'after this' preserves
    apocalyptic sequencing without sounding archaic.
- source_word: ትርእየ ሊተ
  chosen: you will show me
  alternatives:
  - you will make me see
  - you will let me see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The causative sense with indirect object favors 'show me' in idiomatic
    English, while still reflecting the visionary disclosure.
- source_word: ኵሉ ኅቡኣቲሆሙ
  chosen: all their hidden things
  alternatives:
  - all their secrets
  - all the things hidden in them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural noun from 'hidden' suggests concealed matters or hidden things.
    'Secrets' is possible, but 'hidden things' stays closer to the imagery and avoids
    over-psychologizing.
- source_word: ለብርሃናት
  chosen: of the lights
  alternatives:
  - concerning the luminaries
  - of the bright ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'lights'; in apocalyptic-cosmic context it may refer to heavenly
    luminaries, but the Ge'ez itself is broader, so 'lights' is retained in the main
    text.
- source_word: ወለመባርቅት
  chosen: and of the lightnings
  alternatives:
  - and of the flashes
  - and of the lightning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural form is best represented by 'lightnings.' This preserves the
    vivid cosmic imagery rather than reducing it to a generic abstract noun.
- source_word: ወለበረከት
  chosen: and of blessing
  alternatives:
  - and of blessing-power
  - and of blessedness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun naturally renders as 'blessing.' No need to expand beyond the
    witness.
- source_word: ወለጽጋብ
  chosen: and of abundance
  alternatives:
  - and of plenty
  - and of prosperity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes plenty or abundance. 'Abundance' fits the elevated register
    and avoids importing modern economic connotations from 'prosperity.'
- source_word: ይበርቁ
  chosen: they flash forth
  alternatives:
  - they shine
  - they gleam
  - they flash
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A verb of shining/flashing, likely tied especially to the preceding cosmic
    imagery. 'Flash forth' preserves the sudden, vivid apocalyptic force and allows
    the plural subjects to remain collective.
