translation:
  text: In those days my eyes saw the secrets of the lightnings and the lights, and
    their courses, and they flash forth for blessing and for curse, as the Lord of
    Spirits has willed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hidden things' or 'secret treasuries'; the Ge'ez likely refers to concealed
      heavenly repositories from which these phenomena emerge.
    reason: lexical_alternative
  - marker: b
    text: Or 'their order' or 'their course.' The exact nuance of the Ge'ez term is
      uncertain, but it points to the regulated arrangement of these heavenly phenomena.
    reason: lexical_alternative
  - marker: c
    text: Or 'hidden storehouses'.
    reason: previous_rendering
  - marker: d
    text: Or 'their ordinance'.
    reason: previous_rendering
lexical_decisions:
- source_word: በአማንቱ መዋዕል
  chosen: In those days
  alternatives:
  - At that time
  - In those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula. 'In those days' preserves the
    elevated visionary register and recurring Enochic phrasing better than the more
    generic 'at that time.'
- source_word: ርእያ አዕይንትየ
  chosen: my eyes saw
  alternatives:
  - I saw
  - the vision of my eyes saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez explicitly mentions 'my eyes,' a vivid visionary formula. Retaining
    it preserves the sensory immediacy without over-literal awkwardness.
- source_word: ኅቡኣተ
  chosen: hidden storehouses
  alternatives:
  - hidden things
  - secret places
  - treasuries
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic and cosmological contexts this term often points to concealed
    repositories or treasuries of cosmic phenomena. 'Storehouses' preserves the concrete
    imagery better than the abstract 'hidden things.'
- source_word: መባርቅት
  chosen: lightnings
  alternatives:
  - flashes of lightning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward rendering of the meteorological/cosmic phenomenon; plural
    retained.
- source_word: ብርሃናት
  chosen: lights
  alternatives:
  - luminaries
  - bright lights
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural likely refers broadly to luminous heavenly phenomena. 'Lights'
    is transparent and avoids over-specifying as stars or luminaries where the Ge'ez
    remains broader.
- source_word: አክኒሆሙ
  chosen: their ordinance
  alternatives:
  - their order
  - their arrangement
  - their course
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term appears to denote the ordered disposition or regulated pattern
    of these heavenly phenomena. 'Ordinance' fits the elevated register and conveys
    divinely governed order; 'course' is possible but narrower.
- source_word: ወይበርቁ
  chosen: and they flash forth
  alternatives:
  - and they shine
  - and they flash
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Because the immediate antecedent includes lightning, 'flash forth' better
    captures the vivid action than the flatter 'shine.'
- source_word: ለበረከት ወለመረገም
  chosen: for blessing and for curse
  alternatives:
  - for blessing and for cursing
  - for blessing and for a curse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the stark dual function of cosmic phenomena as instruments
    of divine favor and judgment. Singular 'curse' reads naturally while keeping the
    judicial polarity.
- source_word: በከመ ፈቀደ
  chosen: as ... has willed
  alternatives:
  - according as ... willed
  - just as ... desired
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresses conformity to divine volition. 'Has willed' gives idiomatic
    English while preserving the sense of sovereign determination.
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed Enochic divine title and should be rendered consistently.
    'Lord of Spirits' preserves the title-like force better than the more analytic
    'Lord of the spirits.'
