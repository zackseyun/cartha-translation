theological_decisions:
- issue: Whether the cosmic phenomena are morally neutral or instruments of divine
    governance
  chosen_reading: The lightnings and lights act for both blessing and curse under
    the will of the Lord of Spirits.
  alternative_readings:
  - The phrase could be read more descriptively, with blessing/curse referring only
    to their effects rather than divine commission.
  rationale: The verse explicitly links their activity to blessing and curse and grounds
    that activity in the will of the Lord of Spirits, fitting the Parables' theology
    of cosmic order under divine sovereignty.
  doctrine_reference: Preserve apocalyptic imagery and judgment formulas; do not flatten
    divine agency into generic natural description.
