theological_decisions:
- issue: Function of thunder as beneficent or punitive
  chosen_reading: Thunder is portrayed as an instrument whose effect may be peace, blessing, or curse under divine decree.
  alternative_readings:
  - Thunder is merely accompanied by announcements of peace/blessing/curse.
  - The phrase refers to distinct thunder-sounds signifying different outcomes.
  rationale: The syntax links the 'sound of the thunder' with outcomes determined by the Lord of Spirits. The translation preserves this cosmic-judicial ambiguity without reducing it to meteorology alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of እግዚአ መናፍስት
  chosen_reading: Lord of Spirits
  alternative_readings:
  - Lord of the Spirits
  rationale: This is the established title within 1 Enoch and should be translated consistently. The anarthrous English form reads naturally while preserving the title's force.
  doctrine_reference: Consistency of key terms, or documented exception.
