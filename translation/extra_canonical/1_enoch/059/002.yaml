translation:
  text: And there I saw the hidden chambers of the thunder, and how, when it crashes in the height of heaven, its sound is heard; and he showed me the dwellings of the dry land, and the sound of the thunder for peace and for blessing, or for a curse, according to the word of the Lord of Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'the dwellings of the dry land' is textually and lexically difficult; it may refer more generally to the inhabited places of the earth.
    reason: lexical_alternative
  - marker: b
    text: A bracketed phrase in the witness repeats 'and the sound of the thunder'; the repetition may be original or may reflect scribal expansion, but it is represented in the translation's final clause.
    reason: textual_variant
  - marker: c
    text: Or 'from above in heaven'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኅቡኣተ
  chosen: hidden chambers
  alternatives:
  - hidden things
  - secret places
  - treasuries
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The plural adjective/substantive denotes things or places that are concealed. In this apocalyptic context, paired with thunder, a locative sense fits best: concealed repositories or chambers rather than abstract ''secrets''.'
- source_word: ነጐድጓድ
  chosen: thunder
  alternatives:
  - thunderstorm
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term ordinarily denotes thunder. The verse focuses on sound and its effects, so 'thunder' is preferable to the broader 'thunderstorm'.
- source_word: ይደቅቅ
  chosen: it crashes
  alternatives:
  - it breaks
  - it thunders
  - it resounds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb has the sense of striking, crushing, or breaking. With thunder as subject, an English auditory rendering such as 'crashes' preserves the violent apocalyptic force without over-literal awkwardness.
- source_word: መልዕልተ ሰማይ
  chosen: from above in heaven
  alternatives:
  - in the height of heaven
  - from the upper part of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the upper heavenly region. 'From above in heaven' is natural English while retaining the vertical cosmological imagery.
- source_word: ተመመንደርት የብስ
  chosen: the dwellings of the dry land
  alternatives:
  - the inhabited places of the earth
  - the settlements on dry ground
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult, but appears to refer to habitations or settled places associated with dry land/earth. 'Dwellings of the dry land' keeps the imagery and avoids overconfident normalization to simply 'earth'.
- source_word: አስተአርአየኒ
  chosen: he showed me
  alternatives:
  - it was shown to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The causative verb straightforwardly means 'showed me.' Retaining the personal agent fits the visionary report style.
- source_word: ለሰላም
  chosen: for peace
  alternatives:
  - for well-being
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase marks purpose or result. 'Peace' preserves the theological and cosmic resonance better than a flatter 'well-being'.
- source_word: ለበረከት
  chosen: for blessing
  alternatives:
  - for a blessing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard rendering that preserves the formal pairing with 'peace' and the contrast with 'curse'.
- source_word: ለረገም
  chosen: for a curse
  alternatives:
  - for cursing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes curse or malediction. The singular indefinite works well in English and preserves the judicial tone.
- source_word: በቃለ እግዚአ መናፍስት
  chosen: according to the word of the Lord of Spirits
  alternatives:
  - by the word of the Lord of Spirits
  - at the command of the Lord of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates that thunder's effect is governed by divine utterance or decree. 'According to the word' preserves both agency and the text's emphasis on divine speech.
