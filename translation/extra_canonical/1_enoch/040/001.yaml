translation:
  text: And after that I saw thousands of thousands and ten thousands of ten thousands;
    there was no count of them—those who stand before the Lord of the Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The underlying Ethiopic here includes an uncertain segment (“*ኍልቈ” in the
      OCR). The sense continues immediately as “and there was no count of them,” indicating
      innumerability; we translate the secure wording.
    reason: textual_variant
  - marker: b
    text: Compare Daniel 7:10 for a similar vision of countless attendants standing
      before the divine throne.
    reason: cross_reference
  - marker: c
    text: Alternatively, “without number” for “there was no count of them.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - And I looked
  - I saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae; Leslau, Comparative Dictionary of
    Geʻez
  rationale: Perfect 1cs of rʾy ‘to see’ with waw-conjunction. Retaining “And” preserves
    the paratactic, visionary style.
- source_word: እምድኅረዝ
  chosen: after that
  alternatives:
  - afterward
  - from after this/that
  lexicon: Dillmann; Leslau
  rationale: Preposition ʾǝm ‘from’ + dǝḥr ‘after/behind’ with deictic -z yields the
    idiom ‘from after that,’ i.e., ‘after that.’
- source_word: አእላፍ / አእላፈ
  chosen: thousand; thousands of thousands
  alternatives:
  - thousands upon thousands
  lexicon: Leslau (ʾäʿläf ‘thousand’); Dillmann
  rationale: Repetition of the numeral forms the Semitic superlative ‘thousands of
    thousands.’ Retaining the literal pattern matches apocalyptic courtroom formulae
    without importing Greek ‘myriads.’
- source_word: ትእልፊት / ትእልፊተ
  chosen: ten thousand; ten thousands of ten thousands
  alternatives:
  - myriads of myriads
  lexicon: Leslau (tʾəlf/təʾlf ‘ten thousand’); Dillmann
  rationale: The Ethiopic term denotes ‘ten thousand’; the doubled construction conveys
    an immense multitude. We avoid the Greek loan ‘myriad’ to stay anchored in the
    Geʿez lexeme.
- source_word: ኃሳበ
  chosen: count
  alternatives:
  - number
  - reckoning
  lexicon: Leslau (ḥasab ‘to count; account’; ḥasab(n) ‘calculation, reckoning’);
    Dillmann
  rationale: 'Here a noun meaning ‘count/reckoning’ fits best: “there was no count
    of them.” ‘Number’ is possible, but ‘count’ keeps the verbal nuance of reckoning
    present in the Semitic root.'
- source_word: አልቦሙ
  chosen: there was no … of them/for them
  alternatives:
  - they had no …
  - was not theirs
  lexicon: Dillmann; Leslau (ʾalbo ‘there is not’ + -mu 3mpl pronominal suffix)
  rationale: Negative existential with pronominal suffix. Rendered idiomatically as
    “there was no count of them.”
- source_word: እለ
  chosen: those who
  alternatives:
  - who
  - the ones who
  lexicon: Dillmann; Leslau (ʾälla as relative pronoun)
  rationale: 'Introduces a relative clause specifying the referents: those who stand
    before the Lord of the Spirits.'
- source_word: ይቀውሙ
  chosen: stand
  alternatives:
  - take their stand
  - are standing
  lexicon: Leslau (qwm ‘to stand’), Dillmann
  rationale: Imperfect/plural of qwm. ‘Stand’ preserves the formal courtroom/temple
    posture; ‘take their stand’ is an acceptable alternative but more idiomatic.
- source_word: ቅድመ
  chosen: before
  alternatives:
  - in the presence of
  - in front of
  lexicon: Leslau; Dillmann
  rationale: Preposition indicating spatial/relational proximity in a courtly/temple
    setting. ‘Before’ keeps the solemn register.
- source_word: እግዚአ መናፍስት
  chosen: the Lord of the Spirits
  alternatives:
  - the Lord of spirits
  lexicon: Dillmann (ʾəgziʾa ‘lord, master’); Leslau (mänfäs ‘spirit’ pl. mänäfsät)
  rationale: Fixed titular phrase throughout the Parables. We capitalize as a divine
    title and retain the definite ‘the Spirits’ reflected by the idiomatic construction
    in this section.
- source_word: '*ኍልቈ (uncertain OCR)'
  chosen: '[not separately rendered]'
  alternatives:
  - all together
  - beyond number
  lexicon: (uncertain; consult critical editions)
  rationale: The OCR shows an unclear segment here. The immediately following phrase
    “and there was no count of them” conveys the innumerability; we do not introduce
    an additional conjectural word in the main text.
