theological_decisions:
- issue: Referent of the title “Lord of the Spirits”
  chosen_reading: A divine title for God in the Parables, retained as “the Lord of
    the Spirits.”
  alternative_readings:
  - a generic ‘lord of spirits’ (non-titular)
  - an exalted angel over spirits
  rationale: Within chs. 37–71 the repeated formula clearly functions as a reverential
    title for the Most High to whom the heavenly host stands ‘before.’ Retaining the
    title preserves the passage’s theophanic court scene without importing later terminology.
  doctrine_reference: Translation philosophy §2 (Translate titles; transliterate names).
