translation:
  text: And I heard the voices of those four beings as they gave praise before the
    Lord of glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'those four faces.' The phrase likely refers to the four heavenly
      figures seen in the vision rather than to faces in isolation.
    reason: lexical_alternative
  - marker: b
    text: The title can also be rendered 'Lord of splendor.'
    reason: lexical_alternative
  - marker: c
    text: Or 'those four presences'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወሰማዕኩ
  chosen: And I heard
  alternatives:
  - And I listened to
  - And I heard the sound of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward first-person preterite of hearing; 'heard' preserves
    the visionary report style without expansion.
- source_word: ቃሎሙ
  chosen: the voices of them
  alternatives:
  - their voices
  - their words
  - their sound
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote voice/sound/word. In this context of heavenly praise,
    'voices' best fits the audible scene better than 'words,' while avoiding over-interpretation.
- source_word: እልኩ ገጽ አርባዕቱ
  chosen: those four presences
  alternatives:
  - those four faces
  - those four figures
  - those four beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ge'ez ገጽ literally means 'face,' but in this context the verse refers
    back to the four heavenly beings seen around the Lord of Spirits/Glory. Rendering
    it woodenly as 'faces' is possible but awkward and potentially misleading in English.
    'Presences' preserves the sense of distinct heavenly personages appearing before
    God while remaining transparent to the underlying imagery.
- source_word: እንዘ ይሴብሑ
  chosen: as they gave praise
  alternatives:
  - while they were praising
  - as they praised
  - while blessing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction marks contemporaneous action. 'As they gave praise'
    is elevated but readable and suits liturgical heavenly speech.
- source_word: ቅድመ
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard preposition meaning 'before/in the presence of.' 'Before' is
    concise and preserves the courtly heavenly setting.
- source_word: እግዚአ ስብሐት
  chosen: the Lord of glory
  alternatives:
  - the Lord of splendor
  - the Master of glory
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A divine title. 'Lord of glory' is the most natural rendering of the
    Ge'ez components and preserves the elevated apocalyptic register. 'Master' is
    possible for እግዚአ but 'Lord' better matches the project's title policy and biblical-theological
    diction.
