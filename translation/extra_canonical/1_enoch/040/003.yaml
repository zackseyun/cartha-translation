theological_decisions:
- issue: Whether to render ገጽ literally as 'faces' or contextually as a term for the
    four heavenly beings
  chosen_reading: those four presences
  alternative_readings:
  - those four faces
  - those four beings
  rationale: The immediate context in 1 Enoch 40 concerns four heavenly figures standing
    before God. A strictly literal 'faces' would preserve the lexical form but sound
    opaque or misleading in English, as though only disembodied faces were in view.
    'Presences' keeps the visionary and courtly sense without flattening them into
    generic 'angels.'
  doctrine_reference: Preserve apocalyptic imagery while using readable modern English;
    document exceptions to strict consistency.
