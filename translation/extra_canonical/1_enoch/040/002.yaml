theological_decisions:
- issue: Rendering the divine title እግዚአ መናፍስት
  chosen_reading: Lord of Spirits
  alternative_readings:
  - Lord of the Spirits
  - Lord of spirits
  rationale: The title is conventional within 1 Enoch and should be rendered consistently.
    'Lord of Spirits' preserves the established Enochic title without deciding more
    than the Ge'ez requires about whether all spirits or specific heavenly spirits
    are in view.
  doctrine_reference: Translate titles; transliterate names.
