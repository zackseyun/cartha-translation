translation:
  text: And beside the four wings of the Lord of Spirits I saw another four faces,
    different from those, which do not sleep. And I learned their names, for the angel
    who came with me made their names known to me and showed me all the hidden things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'four other faces.' The Ge'ez keeps the imagery at the level of visible
      'faces,' not a more abstract term.
    reason: lexical_alternative
  - marker: b
    text: '''The hidden things'' can also be rendered ''the secret things,'' a common
      apocalyptic expression for heavenly mysteries disclosed in a vision.'
    reason: lexical_alternative
lexical_decisions:
- source_word: በአርባዕቱ ክነፊሁ
  chosen: beside the four wings of him
  alternatives:
  - by the four wings of him
  - at his four sides/wings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition በ can mark location near or at, and ክነፍ can mean wing.
    In this visionary throne context, 'beside the four wings' preserves the concrete
    apocalyptic imagery better than abstracting to 'sides.' The pronominal suffix
    refers back to the Lord of Spirits.
- source_word: ለእግዚአ መናፍስት
  chosen: of the Lord of Spirits
  alternatives:
  - belonging to the Lord of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard divine title in 1 Enoch. It is translated, not transliterated,
    in keeping with project philosophy for titles.
- source_word: አርባዕተ ገጸ ካልአ
  chosen: another four faces
  alternatives:
  - four other faces
  - another four presences
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ገጽ ordinarily means 'face.' Since the verse later speaks of learning
    their names, these are personal heavenly beings seen by their faces. 'Another
    four faces' keeps the visual force of the vision and the distinction from the
    prior four beings.
- source_word: እምነ እለ
  chosen: different from those
  alternatives:
  - other than those
  - distinct from them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks distinction from the previously mentioned four presences/living
    beings. 'Different from those' is clear and preserves the contrast.
- source_word: ኢይነውሙ
  chosen: do not sleep
  alternatives:
  - do not slumber
  - are sleepless
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward negated imperfect of sleeping. 'Do not sleep' is idiomatic
    and preserves the ongoing heavenly vigilance without importing later formulaic
    wording.
- source_word: አእመርኩ
  chosen: I learned
  alternatives:
  - I came to know
  - I recognized
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes coming to know or understand. 'I learned' fits the narrative
    sequence in which the angel explains the vision.
- source_word: ዘአይድዐኒ አስማቲሆሙ
  chosen: made their names known to me
  alternatives:
  - told me their names
  - instructed me in their names
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative clause explains how Enoch learned the names. 'Made their
    names known to me' stays close to the causative sense and elevated register.
- source_word: ኅቡኣተ
  chosen: the hidden things
  alternatives:
  - the secret things
  - the concealed things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context this refers to revealed heavenly mysteries. 'Hidden
    things' is transparent and avoids overloading with later technical language, while
    a footnote can preserve 'secret things' as an alternative.
