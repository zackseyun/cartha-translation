  - the Master of Spirits
  rationale: The title is central to the theology and rhetoric of the Parables. 'Lord' aligns with project policy for κύριος-like divine titles and preserves the elevated register. Adding 'the' before 'spirits' would be possible, but the shorter form better reflects the title-like usage in Enochic tradition.
