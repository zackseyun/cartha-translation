translation:
  text: The voice of the first blesses the Lord of Spirits forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The first utterance blesses the Lord of Spirits forever and ever.' The Ge'ez noun can denote speech or voice; 'voice' is preferred here because the surrounding scene presents a sequence of heavenly voices.
    reason: lexical_alternative
  - marker: b
    text: Or 'The first voice'.
    reason: previous_rendering
lexical_decisions:
- source_word: ቃለ
  chosen: voice
  alternatives:
  - word
  - utterance
  - sound
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this visionary liturgical setting, the noun most naturally refers to a spoken voice or utterance heard by the seer. 'Voice' preserves the auditory, apocalyptic scene better than the flatter 'word'.
- source_word: ቀዳማዊ
  chosen: first
  alternatives:
  - former
  - foremost
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term marks sequence among multiple voices in the surrounding context. 'First' is the clearest idiomatic English rendering.
- source_word: ይባርኮ
  chosen: blesses
  alternatives:
  - bless
  - is blessing
  - gives blessing to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A finite verbal form with the sense 'to bless.' Present tense in English fits the visionary report style and avoids over-specifying aspect.
- source_word: ለእግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  - the Master of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed divine title in 1 Enoch. 'Lord of Spirits' preserves the established title and its cosmic scope without reducing it to a generic phrase.
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for the age of ages
  - unto the ages of ages
  - for ever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez idiom is an emphatic expression of unending duration. 'Forever and ever' is natural English while still reflecting the repetitive intensification of the source.
