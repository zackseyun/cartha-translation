translation:
  text: 'And Azazel taught men to make swords, and knives, and shields, and breastplates;
    and he showed them what was behind them and their works: bracelets, and ornaments,
    and the painting of the eyes, and the beautifying of the eyelids, and every kind
    of costly stone, and all coloring tinctures.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'what was behind them' reflects a difficult Ethiopic
      reading in the OCR witness (†ዘእምድኅሬሆሙ†). The sense may be corrupt or may point
      to things that followed from these arts; some translators smooth the line more
      heavily than the surviving wording warrants.
    reason: textual_variant
  - marker: b
    text: The cosmetic terms likely refer to eye-paint and related beautification
      practices, not merely abstract 'beauty.'
    reason: cultural_note
lexical_decisions:
- source_word: መሀሮሙ
  chosen: taught them
  alternatives:
  - instructed them
  - made them learn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common Ge'ez verb of teaching/instruction; straightforwardly introduces
    Azazel as the revealer of illicit arts.
- source_word: ለሰብእ
  chosen: men
  alternatives:
  - humankind
  - people
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The object is generic humanity, but in this vice-list context the immediate
    referent is commonly male humans learning weapon-making; 'men' preserves the likely
    social sense without over-expanding.
- source_word: ገቢረ አሰይፍት
  chosen: to make swords
  alternatives:
  - the craft of swords
  - the working of swords
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ገቢረ conveys making/workmanship; the phrase points to manufacture rather
    than mere possession.
- source_word: መጣብኅት
  chosen: knives
  alternatives:
  - daggers
  - blades
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A cutting weapon or implement; 'knives' is broad and avoids over-specifying
    a military dagger where the Ge'ez may be more general.
- source_word: ወወልታ
  chosen: shields
  alternatives:
  - bucklers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Defensive military equipment; 'shields' is the clear modern equivalent.
- source_word: ወድርዐ አንግድዓ
  chosen: and breastplates
  alternatives:
  - and coats of mail
  - and cuirasses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Armor for the chest/body; 'breastplates' is readable and suitably elevated.
- source_word: ወአርአዮሙ
  chosen: and he showed them
  alternatives:
  - revealed to them
  - made known to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Keeps the revelatory force central to Watchers traditions: forbidden
    knowledge is disclosed.'
- source_word: ዘእምድኅሬሆሙ
  chosen: what was behind them
  alternatives:
  - the things after them
  - that which followed them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR text is difficult here. A literal rendering preserves the obscurity
    rather than replacing it with a smoother traditional conjecture. A footnote explains
    the uncertainty.
- source_word: ወምግባሮሙ
  chosen: and their works
  alternatives:
  - and their workmanship
  - and the working of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely refers to the making/use of the items just listed or the arts
    that follow. Retained transparently because the syntax around the difficult clause
    is uncertain.
- source_word: እውቃፋተ
  chosen: bracelets
  alternatives:
  - armlets
  - bands
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An item of adornment worn on the arm/wrist; 'bracelets' is the most accessible
    gloss.
- source_word: ስርጐ
  chosen: ornaments
  alternatives:
  - jewelry
  - adornments
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: General term for decorative items; 'ornaments' preserves breadth.
- source_word: ተጽሕሎተ
  chosen: the painting of the eyes
  alternatives:
  - eye-painting
  - cosmetic painting
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to cosmetic application, likely antimony/kohl around the eyes.
    The more explicit phrase helps modern readers without losing the concrete image.
- source_word: አስንዮተ ቀርንብ
  chosen: the beautifying of the eyelids
  alternatives:
  - the adorning of the eyelashes
  - the embellishment of the face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A cosmetic beautification phrase linked with eye adornment. 'Eyelids'
    is the most cautious specific rendering given the context of eye-paint.
- source_word: እብነ እምኵሉ እብን
  chosen: every kind of costly stone
  alternatives:
  - all precious stones
  - stones from every sort
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes stones of various kinds used for adornment; 'costly
    stone' captures ornamental value without overcommitting to a technical gem term.
