theological_decisions:
- issue: Whether Azazel's instruction should be framed as neutral craftsmanship or
    corrupting forbidden knowledge
  chosen_reading: Retain the plain instructional wording ('taught,' 'showed') while
    allowing the vice-list and context of the Watchers narrative to carry the negative
    force.
  alternative_readings:
  - Explicitly add 'for war' or 'for seduction'
  - Soften into neutral cultural development
  rationale: The verse itself lists weaponry and adornment arts without an explicit
    moral adjective, but in context these are illicit revelations. The translation
    preserves the text's rhetoric without interpretive overloading.
  doctrine_reference: Preserve theological tension rather than resolve it.
