translation:
  text: And the wisdom of the Lord of Spirits has revealed him to the holy and to the righteous; for they have kept the portion of the righteous, because they hated and despised this world of unrighteousness, and they hated all its works and its ways in the name of the Lord of Spirits. For by his name they are saved, and by his good pleasure their life came to be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy ones.' The Ge'ez group term can denote consecrated people collectively.
    reason: lexical_alternative
  - marker: b
    text: '''The portion of the righteous'' may mean their allotted share, lot, or inheritance as righteous ones.'
    reason: lexical_alternative
  - marker: c
    text: Or 'by his will their life was established.' The final clause emphasizes that the life of the righteous depends on the Lord of Spirits' willing purpose.
    reason: lexical_alternative
  - marker: d
    text: Or 'And wisdom was poured out for the holy and for the righteous;'.
    reason: previous_rendering
lexical_decisions:
- source_word: ከሠተ
  chosen: was poured out
  alternatives:
  - was revealed
  - was bestowed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests an outflowing or effusive giving rather than mere disclosure. 'Was poured out' preserves the vivid apocalyptic sense of wisdom being lavishly granted.
- source_word: ቅዱሳን
  chosen: the holy
  alternatives:
  - the holy ones
  - the saints
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes consecrated people. 'The holy' is concise and avoids importing later ecclesiastical overtones of 'saints,' while still preserving the group designation.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key apocalyptic category in Enochic literature and should remain consistent as 'the righteous.'
- source_word: ጥበቡ
  chosen: wisdom
  alternatives:
  - understanding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun naturally means 'wisdom'; no contextual pressure requires a narrower gloss.
- source_word: ዐቀቡ
  chosen: have kept
  alternatives:
  - have guarded
  - have preserved
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The perfect sense fits a completed but abiding fidelity. 'Have kept' is idiomatic and preserves covenantal/apocalyptic moral force.
- source_word: ክፍሎሙ
  chosen: the portion
  alternatives:
  - their portion
  - the lot
  - the share
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez form can point to a share or allotted part. 'The portion' keeps the inheritance/lot nuance without over-specifying whether the suffix is emphatic or strictly possessive in English.
- source_word: ዘዓመፃ
  chosen: of unrighteousness
  alternatives:
  - of injustice
  - of lawlessness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The world is characterized by moral wrong. 'Unrighteousness' best matches the ethical register already established by 'the righteous' in the verse.
- source_word: ምግባሮ
  chosen: works
  alternatives:
  - deeds
  - practices
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard rendering for actions or conduct; paired with 'ways' it preserves the verse's rhetorical fullness.
- source_word: ፍናዊሁ
  chosen: its ways
  alternatives:
  - its paths
  - its manner of life
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes course, road, or manner. 'Ways' is idiomatic and preserves moral-path imagery common in Jewish literature.
- source_word: በስሙ
  chosen: in the name of
  alternatives:
  - for the sake of the name of
  - because of the name of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase likely marks allegiance or basis. 'In the name of' preserves the solemn formula without narrowing it to motive alone.
- source_word: ይድኅኑ
  chosen: they are saved
  alternatives:
  - they will be saved
  - they find deliverance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form can be rendered with a present/passive sense in English. 'They are saved' fits the immediate explanatory clause and avoids overcommitting to futurity where the Ge'ez can express a more general truth.
- source_word: በፈቃዱ
  chosen: by his good pleasure
  alternatives:
  - by his will
  - by his desire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to divine willing with benevolent intentionality. 'Good pleasure' preserves the theological weight better than the flatter 'will' here.
- source_word: ኮነ ሕይወቶሙ
  chosen: their life came to be
  alternatives:
  - their life exists
  - their life was established
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is more vivid than a simple copula. 'Came to be' preserves dependence on divine will without forcing a narrower sense such as creation or mere continuance.
