theological_decisions:
- issue: Whether the verse speaks of present salvation, future salvation, or general deliverance in the divine name
  chosen_reading: For by his name they are saved
  alternative_readings:
  - For by his name they will be saved
  - For by his name they find deliverance
  rationale: 'The Ge''ez form allows a gnomic or present sense. In this context the clause explains why the righteous reject the wicked world: their saving identity and hope are grounded in the Lord of Spirits'' name. A present English rendering preserves that theological force while leaving eschatological implications intact.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'portion' in relation to the righteous
  chosen_reading: they have kept the portion of the righteous
  alternative_readings:
  - they have preserved their allotted share among the righteous
  - they have kept what belongs to the righteous
  rationale: The phrase is somewhat idiomatic and may refer to the lot, inheritance, or proper standing of the righteous. Rather than over-interpret it as inheritance alone, the main text keeps the more literal 'portion' and leaves the nuance open.
  doctrine_reference: When the sense is uncertain, prefer transparent English plus a footnote over false confidence.
