translation:
  text: And all who dwell upon the dry land shall fall down and bow before him; and
    they shall praise him and bless him and sing to the Lord of Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who dwell on the earth.' The Ge'ez wording is more literally 'upon the
      dry land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይወድቁ
  chosen: shall fall down
  alternatives:
  - shall fall
  - shall prostrate themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes falling down in an act of submission or reverence. 'Fall
    down' preserves the physical, apocalyptic gesture without over-specifying ritual
    prostration.
- source_word: ይሰግዱ
  chosen: bow
  alternatives:
  - worship
  - do obeisance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means to bow or prostrate oneself. 'Bow' keeps the
    bodily image explicit and avoids importing a more interpretive 'worship' as the
    primary gloss.
- source_word: ቅድሜሁ
  chosen: before him
  alternatives:
  - in his presence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward spatial rendering fits the visionary scene and preserves
    the direct object of reverence.
- source_word: ኵሎሙ
  chosen: all
  alternatives:
  - all of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The universal scope is important in this enthronement context; simple
    'all' is idiomatic and sufficient.
- source_word: እለ የኃድሩ ዲበ የብስ
  chosen: who dwell upon the dry land
  alternatives:
  - who live on the earth
  - who inhabit the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez more literally refers to those dwelling on the dry ground/land.
    'Dry land' preserves the concrete wording better than the broader and more traditional
    'earth,' while still reading naturally.
- source_word: ይሴብሕዎ
  chosen: shall praise him
  alternatives:
  - shall glorify him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard doxological verb; 'praise' is clear and fits the sequence
    of acclamations.
- source_word: ይባርክዎ
  chosen: shall bless him
  alternatives:
  - shall speak blessing over him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The blessing language should be retained rather than flattened into generic
    honor language.
- source_word: ይዜምሩ
  chosen: shall sing
  alternatives:
  - shall chant
  - shall make melody
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates sung praise. 'Sing' is the most natural elevated English
    equivalent.
- source_word: ለእግዚአ መናፈስት
  chosen: to the Lord of Spirits
  alternatives:
  - to the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a recurring divine title in 1 Enoch. 'Lord of Spirits' preserves
    the established title-form and the text's apocalyptic register.
