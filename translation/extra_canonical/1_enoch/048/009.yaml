translation:
  text: And in the hands of the chosen ones I saw them, and they burned before the
    face of the holy ones like straw in the fire; and like lead in water they sank
    before the face of the righteous, and no trace was found for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening phrase is literally 'in the hands of the chosen ones,' which
      may imply being given over to their power in judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'like stubble in the fire.'
    reason: lexical_alternative
  - marker: c
    text: The final clause means that nothing remained of them—no trace or remnant
      could be found.
    reason: lexical_alternative
lexical_decisions:
- source_word: ውስተ እዴሆሙ
  chosen: in the hands of them
  alternatives:
  - into their hands
  - within their power
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is literally spatial, 'in their hands.' In this judgment context
    it likely conveys being delivered into the power of the chosen ones, but the more
    literal wording is retained in English to preserve the image and avoid over-interpreting.
- source_word: ኅሩያን
  chosen: chosen ones
  alternatives:
  - elect ones
  - the chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key apocalyptic group designation. 'Chosen ones' preserves
    the adjectival force and matches the local Enochic usage without importing later
    doctrinal phrasing.
- source_word: ዚአየ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward visionary reporting verb. 'I saw' is clear modern English
    and preserves the first-person apocalyptic witness formula.
- source_word: እወድዮሙ
  chosen: them
  alternatives:
  - those ones
  - they
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form points to the object 'them.' The exact antecedent is supplied
    from context rather than repeated in the English, since the Ge'ez likewise uses
    a pronoun.
- source_word: ከመ ሣዕር ውስተ እሳት
  chosen: like straw in the fire
  alternatives:
  - like stubble in the fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The simile evokes rapid destruction by burning. 'Straw' is natural and
    vivid in modern English; 'stubble' is possible but less immediately clear.
- source_word: ከመዝ ይውዕዩ
  chosen: they burned
  alternatives:
  - they were consumed
  - they blazed away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb describes burning/being set ablaze. 'They burned' keeps the
    image direct and avoids adding the interpretive nuance of total consumption, though
    that is implied by the simile.
- source_word: እምቅድመ ገጸ ቅዱሳን
  chosen: before the face of the holy ones
  alternatives:
  - before the presence of the holy ones
  - from before the face of the holy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom is literally 'from before the face,' but in English 'before
    the face of' best preserves the solemn, judicial presence language. 'Holy ones'
    is retained as the standard apocalyptic designation.
- source_word: ዐረር ውስተ ማይ
  chosen: lead in water
  alternatives:
  - metal in water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is best taken as 'lead,' yielding a vivid image of heavy sinking.
    Retaining the specific metal preserves the force of the simile.
- source_word: ይሠጠሙ
  chosen: they sank
  alternatives:
  - they were submerged
  - they went down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes sinking/submerging. 'They sank' is concise and preserves
    the parallel with the previous burning image.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - righteous ones
  - the just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard Enochic designation for the vindicated community. 'The righteous'
    is the most natural English equivalent and aligns with project defaults for this
    semantic field.
- source_word: አሰር
  chosen: trace
  alternatives:
  - remnant
  - mark
  - place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The closing clause indicates complete disappearance: ''no trace was
    found for them.'' ''Trace'' best captures the sense of no remaining sign or vestige.'
