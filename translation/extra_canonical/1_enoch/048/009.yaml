theological_decisions:
- issue: Whether the opening phrase should be interpreted instrumentally as judicial
    power or kept spatially literal
  chosen_reading: Kept as 'in the hands of the chosen ones' with the implication of
    power left implicit
  alternative_readings:
  - '''into the power of the chosen ones'''
  - '''at the hands of the chosen ones'''
  rationale: The Ge'ez wording is literally hand-language. Because the Parables are
    effectively Ge'ez-only here, the translation preserves the concrete image rather
    than resolving it into a more abstract judicial paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Identity of 'holy ones' and 'righteous'
  chosen_reading: Retained as distinct group labels in the verse
  alternative_readings:
  - Treat both as interchangeable references to the same community
  - Interpret 'holy ones' as angels and 'righteous' as human faithful
  rationale: The verse uses both terms in parallel, and the translation preserves
    that distinction without forcing a precise ontological identification not explicit
    in the wording.
  doctrine_reference: Keep major terms locally grounded in the passage before harmonizing
    them across the corpus.
