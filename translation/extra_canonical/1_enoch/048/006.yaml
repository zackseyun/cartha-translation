lexical_decisions:
- source_word: በእንተዝ
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the ground or reason for the statement. 'For this reason'
    preserves the explanatory force without sounding overly stiff.
- source_word: ኮነ
  chosen: he was
  alternatives:
  - he became
  - it happened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With the following predicates 'chosen and hidden,' the verb functions
    as a copular or resultative expression. 'He was' is the most natural English rendering
    here.
- source_word: ኅሩየ
  chosen: chosen
  alternatives:
  - elect
  - selected
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard apocalyptic designation for one set apart by divine
    decision. 'Chosen' is clear modern English and avoids importing later doctrinal
    freight from 'elect' unnecessarily.
- source_word: ወኅቡአ
  chosen: and hidden
  alternatives:
  - and concealed
  - and kept hidden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the paired predication with 'chosen.' 'Hidden' fits the revelatory-apocalyptic
    motif of a figure reserved in God's presence until the appointed time.
- source_word: በቅድሜሁ
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally spatial-relational language. 'Before him' preserves the ambiguity
    and elevated tone; the referent is most naturally God, but the phrase should not
    be overinterpreted.
- source_word: ዘእንበለ ይትፈጠር ዓለም
  chosen: before the world was created
  alternatives:
  - before the world came to be
  - before the age was created
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause marks pre-creation priority. 'World' is the most straightforward
    rendering of ዓለም here, though the term can also overlap with 'age' in some contexts.
- source_word: ወእስከ ለዓለም
  chosen: and forever
  alternatives:
  - and unto eternity
  - and until the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This closing phrase expresses enduring continuance. 'And forever' is
    idiomatic English that preserves the temporal sweep from before creation into
    unending duration.
