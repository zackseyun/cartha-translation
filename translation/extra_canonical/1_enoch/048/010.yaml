translation:
  text: And on the day of their distress, rest shall come upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'affliction' or 'trouble' for 'distress.' The Ge'ez term denotes hardship
      or pressure; the exact nuance is not fully fixed by this short clause alone.
    reason: lexical_alternative
  - marker: b
    text: Or 'rest shall be upon the earth.' The verb can be rendered more literally
      as 'shall be' or 'shall come to be.'
    reason: lexical_alternative
lexical_decisions:
- source_word: በዕለተ
  chosen: on the day of
  alternatives:
  - in the day of
  - at the time of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal prepositional phrase; 'on the day of' preserves the apocalyptic
    time-marker without over-idiomatizing.
- source_word: ጻሕበ
  chosen: distress
  alternatives:
  - tribulation
  - affliction
  - trouble
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes pressure or hardship. 'Distress' fits elevated but readable
    English and avoids importing later technical eschatological language such as 'tribulation'.
- source_word: ዚአሆሙ
  chosen: their
  alternatives:
  - of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Genitival pronominal form referring back to the previously mentioned
    group in context. English requires a possessive rendering.
- source_word: ዕረፍት
  chosen: rest
  alternatives:
  - repose
  - relief
  - peace
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The core sense is cessation/rest. 'Rest' preserves the stark apocalyptic
    contrast and leaves open whether the rest is relief for the righteous or a broader
    cosmic quieting.
- source_word: ትከውን
  chosen: shall come
  alternatives:
  - shall be
  - will happen
  - will come to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is existential/becoming language. 'Shall come' gives natural
    English with eventive force, while still reflecting the future emergence of rest.
- source_word: ዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - over the earth
  - in the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition plus noun naturally yields a broad cosmic scope in this
    apocalyptic setting. 'Upon the earth' preserves that elevated register better
    than 'in the land'.
