theological_decisions:
- issue: Scope and valence of 'rest'
  chosen_reading: A general apocalyptic rest coming upon the earth
  alternative_readings:
  - relief specifically for the righteous
  - cessation after judgment
  - peace over the land
  rationale: The verse itself is terse and does not specify the beneficiaries of the
    rest. The translation preserves the ambiguity rather than resolving it from surrounding
    theology.
  doctrine_reference: Preserve theological tension rather than resolve it.
