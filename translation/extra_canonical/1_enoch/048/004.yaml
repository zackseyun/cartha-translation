theological_decisions:
- issue: Referent of repeated 'he' (ውእቱ) in the verse
  chosen_reading: Render with personal 'he' throughout, referring back to the Elect One / Son of Man figure in the immediate context.
  alternative_readings:
  - Use a more neutral 'this one' repeatedly
  - Leave the referent implicit in English
  rationale: The Ge'ez repeatedly uses the demonstrative/pronominal form, but English requires a smoother referential choice. Because the surrounding context identifies a singular exalted figure, 'he' is the clearest rendering while preserving the personal, messianic-apocalyptic focus of the passage.
  doctrine_reference: Preserve local passage meaning without importing later doctrinal phrasing; translate titles and references according to immediate context.
