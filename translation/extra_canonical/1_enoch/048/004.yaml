  rationale: 'Adjudicator-modified: The reviewer is correct that the initial word ውእቱ (wəʾətu) lacks the conjunction ወ (wa-), so ''And'' should be removed. Furthermore, translating the imperfect ይከውን (yəkawwən) as ''will be'' rather than ''will become'' is more natural for these eschatological titles and smoothly supplies the implied verb for the verbless middle clause (ወውእቱ፡ ብርሃነ፡ አሕዛብ፡). The verdict is ''modify'' only to restore the final phrase (''for those who are troubled in their heart'') which the reviewer accidentally truncated from'
