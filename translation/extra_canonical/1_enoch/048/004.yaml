translation:
  text: He will be a staff for the righteous, so that they may lean on him and not fall; and he will be the light of the nations, and he will be hope for those who are troubled in their heart. for those who are troubled in their heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a light for the nations.' The Ge'ez phrase can be rendered either way; the main text keeps the compact construct sense.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'those who suffer/are sick in their heart.' The expression points to inward distress rather than physical illness alone.
    reason: lexical_alternative
  - marker: c
    text: Or 'And he will become a staff for the righteous, so that they may lean on him and not fall; and he will become the light of the nations, and he will become hope'.
    reason: previous_rendering
lexical_decisions:
- source_word: በትረ
  chosen: staff
  alternatives:
  - rod
  - scepter
  - support
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes a staff/rod. In this context of the righteous leaning and not falling, 'staff' best preserves the concrete support-image without importing royal overtones that 'scepter' would suggest.
- source_word: ለጻድቃን
  chosen: for the righteous
  alternatives:
  - for the just
  - for righteous ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''The righteous'' is the most natural and consistent rendering for this class term in apocalyptic contexts.'
- source_word: ይትመረጐዙ
  chosen: may lean on him
  alternatives:
  - may support themselves on him
  - may rest upon him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The following phrase 'and not fall' indicates physical-metaphorical support. 'Lean on him' keeps the vivid image and reads naturally in English.
- source_word: ወኢይደቁ
  chosen: and not fall
  alternatives:
  - and not stumble
  - and not collapse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the staff imagery, 'fall' is the clearest continuation of the metaphor. 'Stumble' is possible but slightly weakens the support/failure contrast.
- source_word: ብርሃነ አሕዛብ
  chosen: the light of the nations
  alternatives:
  - a light for the nations
  - the light of the Gentiles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construct phrase is most directly rendered 'light of the nations.' 'Nations' is preferred over 'Gentiles' because the passage is cosmic and collective, not primarily contrasting Jews and non-Jews in later theological idiom.
- source_word: ተስፋ
  chosen: hope
  alternatives:
  - expectation
  - confidence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hope'' best captures the eschatological and pastoral force of the term in this context.'
- source_word: ለእለ የሐምሙ በልቦሙ
  chosen: for those who are troubled in their heart
  alternatives:
  - for those who are sick in their heart
  - for those who suffer in their heart
  - for the fainthearted afflicted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can denote suffering or being ill; with 'in their heart' the sense is inward distress. 'Troubled in their heart' preserves the anthropological language without over-medicalizing it.
