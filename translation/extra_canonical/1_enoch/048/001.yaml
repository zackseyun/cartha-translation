theological_decisions:
- issue: Whether to render the final triad with traditional ecclesial language
  chosen_reading: the righteous and the holy and the chosen
  alternative_readings:
  - the righteous and the holy ones and the elect
  - the just and the saints and the elect
  rationale: The verse presents three eschatological groups/titles in parallel. The
    chosen rendering preserves the triadic force while avoiding later church-coded
    language such as 'saints' and overly systematized 'elect.'
  doctrine_reference: Contested terms / consistency of key terms
- issue: Whether the water imagery should be interpreted metaphorically in the main
    text
  chosen_reading: 'Retain literal visionary imagery: spring(s), thirsty, drank, were
    filled'
  alternative_readings:
  - Interpret as figurative access to righteousness and wisdom in the main text
  rationale: The translation philosophy requires preserving apocalyptic imagery rather
    than flattening it into abstract religious prose. The metaphorical force is evident,
    but the vision should remain imagistic in the main text.
