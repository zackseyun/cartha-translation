translation:
  text: In that place I saw the spring of righteousness, which does not fail, and
    around it were many springs of wisdom. And all the thirsty drank from them and
    were filled with wisdom, and their dwelling was with the righteous and the holy
    and the chosen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic text has a difficult expression around 'around it,' with a
      repeated form in the OCR witness. The sense is likely that many springs of wisdom
      were situated around the spring of righteousness.
    reason: textual_variant
  - marker: b
    text: Or 'fountain of righteousness' ... 'fountains of wisdom.'
    reason: lexical_alternative
  - marker: c
    text: '''The holy'' may also be rendered ''the holy ones.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: መካን
  chosen: place
  alternatives:
  - region
  - spot
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common Ge'ez locative term. 'Place' is the most natural elevated English
    and preserves the visionary setting without over-specifying geography.
- source_word: ነቅዐ
  chosen: spring
  alternatives:
  - fountain
  - source
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The image is of a water-source from which one drinks. 'Spring' preserves
    the apocalyptic life-giving imagery and fits the later mention of the thirsty
    drinking from related springs.
- source_word: ጽድቅ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given project defaults and the moral-eschatological sense in the Parables,
    'righteousness' is preferred. 'Justice' is possible but less fitting with the
    imagery of a sustaining spring from which the thirsty are satisfied.
- source_word: ዘኢይትኄለቍ
  chosen: which does not fail
  alternatives:
  - which is not exhausted
  - which does not diminish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase describes the spring as unfailing or inexhaustible. 'Does
    not fail' is idiomatic and preserves the sense of an ever-flowing source.
- source_word: አውዳ
  chosen: around it
  alternatives:
  - its circuit
  - its surroundings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The duplicated/uncertain OCR form likely reflects a surrounding or encircling
    expression. 'Around it' gives the spatial sense cleanly without overcommitting
    to a difficult form.
- source_word: አንቅዕተ
  chosen: springs
  alternatives:
  - fountains
  - sources
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural water-sources parallel the singular 'spring of righteousness.'
    'Springs' keeps the imagery coherent and avoids unnecessary variation.
- source_word: ጥበብ
  chosen: wisdom
  alternatives:
  - understanding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering. The verse links wisdom with drinkable, filling abundance;
    'wisdom' best preserves the sapiential-apocalyptic fusion.
- source_word: ጽሙኣን
  chosen: the thirsty
  alternatives:
  - those who thirst
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A concrete participial/nominal image. 'The thirsty' is concise and preserves
    the metaphor of desire for righteousness and wisdom without allegorizing it away.
- source_word: ይሰትዩ
  chosen: drank
  alternatives:
  - drink
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Past narrative sequence fits the visionary report: Enoch saw what they
    did. ''Drank'' matches the surrounding past-tense narration.'
- source_word: ይትመልኡ
  chosen: were filled
  alternatives:
  - were satisfied
  - became full
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The passive/resultative sense is important: wisdom fills them. ''Were
    filled'' keeps the metaphor vivid and avoids reducing it to mere intellectual
    acquisition.'
- source_word: ማኅደሪሆሙ
  chosen: their dwelling
  alternatives:
  - their habitation
  - their abode
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to settled residence or abiding place. 'Dwelling' is readable
    and retains the communal, eschatological sense.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for this key group term in Enochic literature; consistent
    with project preference for righteousness language.
- source_word: ቅዱሳን
  chosen: the holy
  alternatives:
  - the holy ones
  - the saints
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bare adjective works well in English in a triad. 'Saints' would import
    later ecclesial associations; 'holy ones' is possible but slightly heavier here.
- source_word: ኅሩያን
  chosen: the chosen
  alternatives:
  - the elect
  - the selected ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Parables this is a major identity term. 'The chosen' is transparent,
    avoids overly traditionalized 'elect' language, and remains locally grounded in
    the passage.
