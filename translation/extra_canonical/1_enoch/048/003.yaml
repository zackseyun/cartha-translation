translation:
  text: And before the sun and the signs were created, before the stars of heaven
    were made, his name was called before the Lord of Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the presence of the Lord of Spirits.' The Ge'ez preposition can carry
      a courtly-presence sense as well as simple 'before.'
    reason: lexical_alternative
  - marker: b
    text: The verse stresses that this figure's naming precedes the creation of the
      sun and the heavenly stars' signs, underscoring pretemporal status.
    reason: cross_reference
  - marker: c
    text: Or "And before the sun was created, and before the signs of the heaven's
      stars were made, his name was called before the Lord of Spirits.".
    reason: previous_rendering
lexical_decisions:
- source_word: ዘእንበለ
  chosen: before
  alternatives:
  - without
  - prior to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this temporal construction with following verbs, the sense is clearly
    'before' or 'prior to,' not privative 'without.' The verse stacks two pre-creation
    temporal clauses.
- source_word: ትትፈጠር
  chosen: was created
  alternatives:
  - came to be formed
  - was fashioned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive creation language fits the apocalyptic cosmological setting and
    preserves the formal force of the Ge'ez verb.
- source_word: ፀሐይ
  chosen: sun
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward cosmological term.
- source_word: ታእምር
  chosen: signs
  alternatives:
  - tokens
  - portents
  - markers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote signs or distinguishing marks. In a heavenly-astral
    context, 'signs' preserves both celestial order and apocalyptic resonance without
    over-specifying astronomical function.
- source_word: ይትገበሩ
  chosen: were made
  alternatives:
  - were established
  - were fashioned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive rendering matches the parallel with 'was created' and keeps
    the focus on the stars as created realities.
- source_word: ከዋክብተ ሰማይ
  chosen: the heaven's stars
  alternatives:
  - the stars of heaven
  - the heavenly stars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This genitival rendering preserves the elevated register and avoids flattening
    the phrase into merely scientific description. 'Stars of heaven' remains a viable
    alternative.
- source_word: ስሙ
  chosen: his name
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix is singular masculine. The antecedent is the figure introduced
    in the surrounding context; the verse emphasizes the pretemporal naming of that
    figure rather than naming in the abstract.
- source_word: ተጸውዐ
  chosen: was called
  alternatives:
  - was named
  - was invoked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Was called'' best preserves the verbal action while leaving open whether
    the nuance is designation or proclamation. ''Invoked'' would overread cultic force.'
- source_word: በቅድመ
  chosen: before
  alternatives:
  - in the presence of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase can mean spatially 'before/in the presence of.' Here 'before'
    keeps the solemn courtly sense and echoes the repeated temporal 'before' without
    confusion in English syntax.
- source_word: እግዚአ መናፈስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established title within the Parables. 'Lord of Spirits'
    is concise, elevated, and locally grounded in Enochic usage.
