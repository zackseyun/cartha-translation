theological_decisions:
- issue: Identity of the unnamed referent in 'his name was called'
  chosen_reading: Retain the pronoun 'his' without inserting an interpretive title
    in the main text.
  alternative_readings:
  - Explicitly identify him as the Chosen One
  - Explicitly identify him as the Son of Man
  - Render more abstractly as 'the name thereof'
  rationale: The immediate literary context points to the exalted figure described
    in the surrounding verses, but the verse itself uses only the pronoun plus 'his
    name.' To preserve theological tension and avoid over-harmonization, the main
    text leaves the referent implicit.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    over-harmonize contested titles.
