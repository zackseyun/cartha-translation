translation:
  text: And at that hour that Son of Man was named in the presence of the Lord of
    Spirits, and his name was before the Head of Days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was called.' The passive verb can denote designation or naming; 'was
      named' is chosen because the next clause repeats 'his name.'
    reason: lexical_alternative
  - marker: b
    text: '''Head of Days'' is a literal rendering of a divine title in the Parables.
      It is kept rather than replaced with a smoother traditional equivalent so the
      imagery remains visible.'
    reason: cultural_note
lexical_decisions:
- source_word: በይእቲ ሰዓት
  chosen: at that hour
  alternatives:
  - in that hour
  - at that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the apocalyptic time-marker with elevated but natural English.
    'Hour' preserves the text's solemn temporal specificity better than the broader
    'time'.
- source_word: ተጸውዐ
  chosen: was named
  alternatives:
  - was called
  - was invoked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive form most naturally indicates designation or naming here. 'Was
    named' fits the following mention of 'his name' and avoids implying merely a summons.
- source_word: ወልደ ሰብእ ዝኩ
  chosen: that Son of Man
  alternatives:
  - that son of man
  - this Son of Man
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative points to a specific visionary figure already in view.
    Capitalization reflects title-like usage within the Parables, not later doctrinal
    harmonization. 'That' matches the distal demonstrative better than 'this'.
- source_word: በኀበ እግዚአ መናፈስት
  chosen: in the presence of the Lord of Spirits
  alternatives:
  - before the Lord of Spirits
  - with the Lord of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes proximity before a heavenly sovereign. 'In the presence
    of' is slightly more idiomatic in English while preserving the courtly-apocalyptic
    setting.
- source_word: ስሙ
  chosen: his name
  alternatives:
  - the name of him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward pronominal rendering; repetition of 'name' should be
    preserved because it is thematically significant in this verse.
- source_word: መቅድመ
  chosen: was before
  alternatives:
  - was in the presence of
  - was set before
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal spatial expression is preserved. 'Was before' keeps the compact,
    solemn wording and allows the ambiguity of presence, precedence, or preexistence
    to remain.
- source_word: ርእሰ መዋዕል
  chosen: the Head of Days
  alternatives:
  - the Chief of Days
  - the Antecedent of Time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a distinctive divine title in the Parables. 'Head of Days' preserves
    the imagery and avoids flattening it into a generic term like 'Ancient One.'
