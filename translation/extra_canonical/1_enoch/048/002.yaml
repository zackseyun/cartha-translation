theological_decisions:
- issue: Whether to render ወልደ ሰብእ as a generic human expression or as a title
  chosen_reading: that Son of Man
  alternative_readings:
  - that son of man
  - that human one
  rationale: In the Parables this figure functions as a specific exalted eschatological
    personage. The translation preserves the title-like force locally from the passage
    itself without importing later New Testament phrasing beyond what the Ge'ez warrants.
  doctrine_reference: Preserve local passage meaning; do not over-harmonize with later
    Christian usage.
- issue: Implication of preexistence in 'his name was before the Head of Days'
  chosen_reading: was before the Head of Days
  alternative_readings:
  - was named before the Head of Days
  - was present before the Head of Days from before
  rationale: The wording may suggest heavenly precedence or preexistence, but the
    Ge'ez expression itself is compact and somewhat open-ended. The main text keeps
    that tension rather than resolving it into a stronger doctrinal statement.
  doctrine_reference: Preserve theological tension rather than resolve it.
