theological_decisions:
- issue: Identity of 'the humble of face' in relation to the kings and mighty
  chosen_reading: The phrase is rendered as a description of the same judged group,
    not as a separate righteous group.
  alternative_readings:
  - A separate class of lowly people contrasted with kings and mighty
  - An ironic description meaning 'downcast-faced' after judgment
  rationale: The syntax as transmitted can be read appositionally or as a compressed
    description leading into 'the kings of the earth and the mighty.' Given the immediate
    context of condemnation and inability to save themselves, the line is best taken
    as describing the shamed condition of the rulers rather than introducing the righteous.
  doctrine_reference: Preserve theological tension rather than resolve it; where uncertain,
    document the alternative.
- issue: Possible idolatrous nuance of 'works of their hands'
  chosen_reading: Main text keeps the broader phrase 'works of their hands' without
    specifying idolatry.
  alternative_readings:
  - their idols
  - their handiwork in a moral-political sense
  rationale: The idiom can carry idolatrous overtones in biblical usage, but the Ge'ez
    here does not require that narrower sense. A broader rendering avoids over-interpretation
    while preserving possible resonance.
  doctrine_reference: Original-language primacy over translation tradition; do not
    paraphrase beyond what the witness warrants.
