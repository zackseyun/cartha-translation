translation:
  text: In those days the faces of the kings of the earth and the mighty who possess
    the dry land shall be humbled, because of the works of their hands; for on the
    day of their distress and affliction, they will not save themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'their faces shall be cast down—the kings of the earth and
      the mighty.' The Ge'ez wording is somewhat compressed, and the relation of 'humble/lowly
      of face' to the following nouns is not fully certain.
    reason: alternative_reading
  - marker: b
    text: '''The dry land'' is literal. It may simply mean the inhabited earth/land
      under human rule.'
    reason: lexical_alternative
  - marker: c
    text: '''Works of their hands'' may carry an echo of self-made power or even idols,
      but the wording is left broad in the main text.'
    reason: cultural_note
  - marker: d
    text: Or 'the humble of face shall be put to shame, the kings of the earth and
      the mighty who possess the dry land'.
    reason: previous_rendering
lexical_decisions:
- source_word: በዝንቱ መዋዕል
  chosen: In those days
  alternatives:
  - at that time
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula. Although singular-looking in form,
    the phrase idiomatically introduces an eschatological period, best rendered 'In
    those days.'
- source_word: ክኑ
  chosen: shall be put to shame
  alternatives:
  - shall be ashamed
  - shall be humbled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb here most naturally conveys becoming ashamed or disgraced. Passive-like
    English fits the judgment context and the following social reversal.
- source_word: ትሑታነ ገጽ
  chosen: the humble of face
  alternatives:
  - the downcast of countenance
  - the ashamed in face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering preserves the vivid anthropological idiom. 'Face'
    is significant in shame/honor contexts, and should not be flattened away.
- source_word: ነገሥተ ምድር
  chosen: the kings of the earth
  alternatives:
  - the kings of the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common apocalyptic expression for earthly rulers. 'Earth' preserves
    the cosmic scope better than 'land.'
- source_word: ጽኑዓን
  chosen: the mighty
  alternatives:
  - the strong
  - the powerful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to powerful persons paired with kings. 'The mighty' is elevated
    and idiomatic in judgment scenes.
- source_word: እለ ይእኅዝዋ ለየብስ
  chosen: who possess the dry land
  alternatives:
  - who hold the earth
  - who seize the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes holding or possessing; የብስ is literally 'dry land.'
    Retaining 'dry land' preserves the concrete world-order imagery rather than generalizing
    to abstract dominion.
- source_word: በእንተ ምግባረ እደዊሆሙ
  chosen: because of the works of their hands
  alternatives:
  - on account of the deeds of their hands
  - because of what their hands have done
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard biblical idiom for human deeds, often with moral weight. 'Works
    of their hands' preserves the idiom and may also hint at idolatrous or self-made
    power without over-specifying.
- source_word: በዕለተ ጻዕቆሙ ወጻሕቦሙ
  chosen: on the day of their distress and their affliction
  alternatives:
  - in the day of their tribulation and oppression
  - on the day of their anguish and trouble
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired nouns intensify eschatological suffering. 'Distress and affliction'
    is readable while preserving the doubled judgment formula.
- source_word: ኢይድኅኑ ርእሶሙ
  chosen: they will not save themselves
  alternatives:
  - they will not deliver themselves
  - they will not rescue their own lives
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The reflexive object is explicit. 'Save themselves' is the clearest English
    equivalent and suits the judgment context without importing later doctrinal phrasing.
