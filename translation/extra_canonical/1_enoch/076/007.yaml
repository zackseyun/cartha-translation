theological_decisions:
- issue: Whether ነፋስ ሞት should be softened into an idiomatic adjective
  chosen_reading: a wind of death
  alternative_readings:
  - a deadly wind
  rationale: The Astronomical Book personifies and classifies winds by cosmic function. Retaining the genitival expression preserves the text's stark apocalyptic imagery rather than flattening it into ordinary weather language.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic imagery into generic modern prose.
