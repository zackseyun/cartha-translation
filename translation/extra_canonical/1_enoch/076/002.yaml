translation:
  text: Three of them are open in the face of heaven, and three in the west, and three
    at the right of heaven, and three at the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'on the right side of heaven ... on the left side,' which some
      readers may understand as south and north depending on the text's cosmic orientation.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in the face of heaven' keeps the text's literal cosmic imagery;
      it may denote the front or visible expanse of the sky.
    reason: cultural_note
lexical_decisions:
- source_word: ፫እም
  chosen: three of them
  alternatives:
  - three
  - three from them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral with the attached prepositional element naturally yields
    a partitive sense, referring back to the previously mentioned portals/gates. 'Three
    of them' preserves that backward reference better than a bare 'three'.
- source_word: ኔሆሙ
  chosen: of them
  alternatives:
  - them
  - among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This pronominal form points back to the set already under discussion.
    It is represented in English through the partitive phrase 'three of them' rather
    than as a separate word.
- source_word: ርኅዋት
  chosen: are open
  alternatives:
  - opened
  - openings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context the term describes the portals as standing open rather than
    naming them as abstract 'openings.' The predicative rendering fits the astronomical
    description of heavenly apertures.
- source_word: በገጸ ሰማይ
  chosen: in the face of heaven
  alternatives:
  - before heaven
  - on the front of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ge'ez 'face' is retained literally because this book regularly uses embodied
    spatial imagery for the cosmos. 'In the face of heaven' preserves the apocalyptic
    register better than a flattened directional paraphrase.
- source_word: በምዕራብ
  chosen: in the west
  alternatives:
  - toward the west
  - at the west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward directional term. 'In the west' is idiomatic and keeps
    the coordinate listing concise.
- source_word: በየማነ ሰማይ
  chosen: at the right of heaven
  alternatives:
  - on the right side of heaven
  - to the south of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The literal spatial expression 'right of heaven' should be preserved.
    Although 'right' can imply a cardinal direction depending on orientation, the
    text itself uses bodily cosmic imagery, so the literal rendering is preferable
    in the main text.
- source_word: በፀጋም
  chosen: at the left
  alternatives:
  - on the left side
  - to the north
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This balances 'right' in the preceding phrase. A literal rendering preserves
    the paired cosmological imagery; a cardinal-direction interpretation is possible
    but should remain in a note rather than the main text.
