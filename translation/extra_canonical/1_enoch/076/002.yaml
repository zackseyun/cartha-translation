theological_decisions:
- issue: Whether to normalize the cosmic body-language into cardinal directions
  chosen_reading: Retain 'right' and 'left' of heaven in the main text
  alternative_readings:
  - Render as 'south' and 'north' of heaven
  rationale: The Astronomical Book often describes the heavens in vivid spatial and
    bodily terms. Preserving that imagery fits the project's policy not to flatten
    apocalyptic cosmology into generic modern prose. Cardinal-direction interpretation
    remains possible, but the Ge'ez wording itself is more concrete.
  doctrine_reference: 'Translation philosophy: preserve original-language primacy
    and preserve theological tension rather than resolve it'
