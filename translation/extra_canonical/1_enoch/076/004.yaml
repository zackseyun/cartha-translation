theological_decisions:
- issue: Whether ነፋሳት should be rendered 'winds' or 'spirits'
  chosen_reading: winds
  alternative_readings:
  - spirits
  rationale: In this chapter the context is the ordered cosmic outlets and directions of meteorological forces. Rendering as 'spirits' would over-personalize the imagery and obscure the astronomical-meteorological framework.
  doctrine_reference: Translation philosophy §Original-language primacy over translation tradition; preserve local passage sense.
- issue: Whether መቅሠፍት should be softened to a general calamity term
  chosen_reading: scourging
  alternative_readings:
  - punishment
  - calamity
  - plague
  rationale: The verse depicts destructive winds as instruments of judgment. 'Scourging' preserves the punitive and violent force without importing later doctrinal formulas.
  doctrine_reference: 'Book context: preserve apocalyptic imagery and judgment formulas rather than flattening them.'
