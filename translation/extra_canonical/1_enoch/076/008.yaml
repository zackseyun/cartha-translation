theological_decisions:
- issue: Whether ሰላም should be narrowed to material prosperity in a meteorological blessing list
  chosen_reading: peace
  alternative_readings:
  - well-being
  - prosperity
  rationale: Even in a sequence of beneficial outputs from a cosmic opening, the term carries broader wholeness than mere agricultural prosperity. 'Peace' preserves that theological breadth without over-interpreting.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
