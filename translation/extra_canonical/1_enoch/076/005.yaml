  rationale: The Astronomical Book presents winds as structured cosmic agents with
    harmful consequences. The verse should preserve that ominous register rather than
    flattening it into mere weather description.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment formulas
    into generic modern prose.
