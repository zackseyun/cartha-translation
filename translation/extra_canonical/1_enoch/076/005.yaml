lexical_decisions:
- source_word: ወይወፅእ
  chosen: and ... goes out
  alternatives:
  - and comes out
  - and issues forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb of motion from a gate is best rendered 'goes out' in straightforward
    English while preserving the repeated astronomical-book formula of winds proceeding
    from gates.
- source_word: ቀዳማይ ነፋስ
  chosen: the first wind
  alternatives:
  - the former wind
  - the first blast
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Formal sequence language matters in this catalog of winds; 'first wind'
    preserves the ordered description.
- source_word: እምእልክቱ ኃዋሳው
  chosen: from those gates
  alternatives:
  - from its gates
  - from those portals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural gate/portal imagery is central to the cosmological vision.
    'Those gates' reflects the demonstrative sense without over-specifying.
- source_word: ዘስሙ ጽባሓይ
  chosen: whose name is the east wind
  alternatives:
  - which is called the east wind
  - whose name is east
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text names the wind by direction. Rendering the directional term
    explicitly as 'east wind' makes the sense clear in English and preserves the naming
    formula.
- source_word: በቀዳሚት ኆኅት
  chosen: through the first gate
  alternatives:
  - by the first opening
  - through the first portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes an opening/gate. 'Gate' matches the surrounding imagery
    and keeps consistency with the larger passage.
- source_word: እንተ መንገለ ጽባሕ
  chosen: that is on the way of the east
  alternatives:
  - that faces east
  - that is toward the east
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'on the way/path of the east.' This slightly formal wording
    preserves the cosmographic orientation better than a flattened 'eastern gate.'
- source_word: ታጸንኑ ለአዜብ
  chosen: inclining toward the south
  alternatives:
  - turning to the south
  - leaning southward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is somewhat difficult, but the sense appears to be directional
    deviation toward the south. 'Inclining toward' preserves that nuance without overcommitting
    to a stronger motion verb.
- source_word: ድምሳሴ
  chosen: desolation
  alternatives:
  - ruin
  - devastation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An apocalyptic consequence term; 'desolation' preserves the severe, land-affecting
    sense and fits the sequence of calamities.
- source_word: ናብስት
  chosen: drought
  alternatives:
  - dryness
  - parching
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of harmful winds and climatic effects, 'drought' is the most
    natural and concrete English rendering.
- source_word: ሞት
  chosen: heat
  alternatives:
  - burning heat
  - scorching
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the OCR form resembles the common word for 'death,' the immediate
    list of meteorological harms strongly suggests a climatic calamity here; 'heat'
    best fits the sequence and likely underlying sense.
- source_word: ሐጕል
  chosen: destruction
  alternatives:
  - blight
  - wasting
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The final item summarizes the damaging effect of the wind. 'Destruction'
    is broad enough to preserve the ominous force where the exact nuance is uncertain.
