lexical_decisions:
- source_word: ሣልስት
  chosen: third
  alternatives:
  - threefold
  - the third
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal numeral modifying 'opening'; straightforwardly rendered 'third'.
- source_word: ኆኅት
  chosen: opening
  alternatives:
  - window
  - portal
  - gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term refers to one of the heavenly apertures
    through which cosmic phenomena emerge. 'Opening' preserves the image without over-specifying
    architecture.
- source_word: መንገለ ምዕራብ
  chosen: toward the west
  alternatives:
  - on the side of the west
  - westward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Directional phrase indicating the western side/orientation of the opening.
    'Toward the west' is natural English while preserving spatial orientation.
- source_word: ይወፅእ እምኔሃ
  chosen: there come out from it
  alternatives:
  - comes out from it
  - goes forth from it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is singular in form but governs a following list of phenomena;
    English idiom allows plural agreement with the compound subject. 'Come out' keeps
    the concrete apocalyptic imagery of emergence from a heavenly aperture.
- source_word: ጤለ
  chosen: mist
  alternatives:
  - dew
  - drizzle
  - fog
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes a light moisture phenomenon. 'Mist' best fits the sequence
    of weather phenomena here without collapsing it into full rain or dew.
- source_word: ዝናም
  chosen: rain
  alternatives:
  - rainfall
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard term for rain; no need to expand.
- source_word: አናጽዕ
  chosen: frost
  alternatives:
  - cold
  - ice
  - hoarfrost
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In a list of meteorological outputs from heavenly openings, 'frost' is
    the most fitting concrete weather term.
- source_word: ደምሳሴ
  chosen: snow
  alternatives:
  - hail
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered 'snow' as the most likely weather phenomenon in this sequence;
    however the exact nuance may overlap with frozen precipitation more generally,
    so an alternative is noted in a footnote.
