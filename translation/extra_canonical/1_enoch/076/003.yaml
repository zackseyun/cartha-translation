theological_decisions:
- issue: Whether to preserve relative-orientation language or replace it entirely with compass terms
  chosen_reading: Retain 'on the left' alongside 'north'
  alternative_readings:
  - 'Render only compass points: ''three on the north side'''
  - 'Render only bodily orientation: ''three on the left side'''
  rationale: The verse reflects an ancient east-facing cosmological orientation. Keeping 'on the left' preserves that worldview without sacrificing clarity, while 'north' identifies the actual direction for modern readers.
  doctrine_reference: Translation philosophy §3, preserve tension/ambiguity where present
