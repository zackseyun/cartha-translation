translation:
  text: And the first three are toward the east, and three toward the north, and three—after these, on the left—toward the south, and three toward the west.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'on the left' reflects the ancient convention of facing east; in that scheme, the left side corresponds to the north, just as the right side corresponds to the south.
    reason: cultural_note
  - marker: b
    text: The bracketed portion in the supplied Ethiopic witness suggests some textual uncertainty around 'after these, on the left'; the translation keeps the phrase but signals the uncertainty here.
    reason: textual_variant
  - marker: c
    text: Or 'And three of them are on the east side, and three on the south side, and after these, on the left, three on the north side and three on the west.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ቀዳማያት
  chosen: on the east side
  alternatives:
  - first ones
  - eastern
  - toward the east
  lexicon: Dillmann
  rationale: In this directional catalog, the term functions as a directional designation rather than a temporal 'first.' Rendering it 'on the east side' makes the spatial sense clear in English while preserving the ordered listing.
- source_word: መንገለ
  chosen: side
  alternatives:
  - direction
  - way
  - region
  lexicon: Dillmann
  rationale: Repeated with each compass point, the word marks orientation or quarter. 'Side' is concise and natural in English in a list of world-directions.
- source_word: ጽባሕ
  chosen: east
  alternatives:
  - sunrise
  - morning
  lexicon: Dillmann
  rationale: Though literally associated with morning/sunrise, in this astronomical context it denotes the eastern direction.
- source_word: መስዕ
  chosen: south
  alternatives:
  - right side
  lexicon: Dillmann
  rationale: In ancient orientation language, south can be described by the right side when facing east. Here the directional sense is primary, so 'south' is preferred in the main text.
- source_word: በድኅረ እሉ
  chosen: after these
  alternatives:
  - after them
  - beyond these
  lexicon: Dillmann
  rationale: This transitional phrase marks continuation in the ordered enumeration of the gates/winds.
- source_word: በፀጋም
  chosen: on the left
  alternatives:
  - to the left side
  lexicon: Dillmann
  rationale: The Ge'ez explicitly uses the left-side orientation. It is retained because it reflects the ancient east-facing directional scheme and helps explain the following 'north.'
- source_word: አዜብ
  chosen: north
  alternatives:
  - left side
  lexicon: Dillmann
  rationale: As with 'south,' the contextual sense is the compass direction. 'North' is the clearest main-text rendering.
- source_word: ዓረብ
  chosen: west
  alternatives:
  - evening
  - sunset
  lexicon: Dillmann
  rationale: The term is linked with evening/sunset, but in this context clearly denotes the western direction.
