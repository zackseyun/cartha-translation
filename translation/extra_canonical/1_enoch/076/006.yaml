translation:
  text: And from the second middle gate famine comes out, and from it come rain and
    fruit and peace and dew; and from the third gate, which is toward the south, frost
    comes out and dryness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The sequence 'famine ... rain and fruit and peace and dew' is textually
      and conceptually abrupt. The Ge'ez is translated as given rather than smoothed;
      some readers may expect a contrast or a different ordering of effects.
    reason: textual_variant
  - marker: b
    text: Or 'aridity' for 'dryness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ኆኅት
  chosen: gate
  alternatives:
  - opening
  - portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term regularly denotes one of the heavenly
    openings through which winds or luminaries emerge. 'Gate' preserves the cosmological
    imagery better than the more generic 'opening'.
- source_word: ማእከላዊት
  chosen: middle
  alternatives:
  - central
  - in the midst
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective marks this as the central one among a set of gates. 'Middle'
    is concise and natural in English while preserving the spatial sense.
- source_word: ርኅብ
  chosen: famine
  alternatives:
  - hunger
  - dearth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes famine rather than mere appetite. 'Famine'
    best fits the sequence of meteorological effects issuing from the gates.
- source_word: ዝናም
  chosen: rain
  alternatives:
  - rainfall
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward weather term; 'rain' is the natural English equivalent.
- source_word: ፍሬ
  chosen: fruit
  alternatives:
  - produce
  - harvest
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'fruit' or produce. 'Fruit' keeps the concrete wording of the
    source, while readers can infer agricultural yield from context.
- source_word: ሠላም
  chosen: peace
  alternatives:
  - well-being
  - prosperity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can include welfare or well-being, but 'peace' is its standard
    and broadest rendering. In this weather-and-fertility list it likely implies settled
    well-being, but the more literal 'peace' preserves the source term.
- source_word: ጤለ
  chosen: dew
  alternatives:
  - moisture
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word denotes dew; this fits the agricultural blessing sequence alongside
    rain and fruit.
- source_word: መንገለ መስዕ
  chosen: toward the south
  alternatives:
  - on the side of the south
  - southward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is directional. 'Toward the south' is idiomatic English and
    preserves the spatial orientation of the gate.
- source_word: ቍር
  chosen: frost
  alternatives:
  - cold
  - ice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this climatic context the noun is best rendered 'frost,' a specific
    weather effect paired with dryness.
- source_word: የብስ
  chosen: dryness
  alternatives:
  - drought
  - aridity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes dryness or aridity. 'Dryness' stays close to the source;
    'drought' would be a possible interpretive sharpening but is slightly stronger.
