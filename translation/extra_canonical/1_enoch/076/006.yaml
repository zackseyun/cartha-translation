theological_decisions:
- issue: Retention of cosmological gate imagery
  chosen_reading: Render ኆኅት as 'gate' and keep repeated 'comes out' language
  alternative_readings:
  - Use 'opening' and smoother English such as 'brings' or 'produces'
  rationale: The Astronomical Book presents a structured cosmos with winds and weather
    issuing from heavenly gates. Preserving this imagery is important to the text's
    apocalyptic worldview and avoids flattening it into generic meteorological prose.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; original-language
    primacy over translation tradition.'
