translation:
  text: And at the ends of the earth I saw twelve portals, and those portals were open for all the winds, from which the winds go out and blow upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez term rendered 'portals' could also be translated 'gates' or 'openings.' 'Portals' is chosen to preserve the structured cosmic imagery of the vision.
    reason: lexical_alternative
  - marker: b
    text: Or 'twelve portals, open all around, for all the winds'.
    reason: previous_rendering
lexical_decisions:
- source_word: አጽናፈ ምድር
  chosen: the ends of the earth
  alternatives:
  - the extremities of the earth
  - the borders of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes the outer limits or extremities of the world. 'Ends of the earth' is idiomatic English that preserves the cosmic geography of the apocalyptic vision without flattening it.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward visionary report verb. 'I saw' is clear modern English and preserves the repeated first-person vision formula.
- source_word: ፲፪ ኆኃተ
  chosen: twelve portals
  alternatives:
  - twelve gates
  - twelve openings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book, cosmic outlets for winds and luminaries are often conceived as structured openings in heaven or at the world's edges. 'Portals' preserves the architectural and apocalyptic imagery better than the flatter 'openings,' while avoiding over-specific city-gate imagery unless context requires it.
- source_word: ኃዋላው
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This adverbial element describes the portals as situated around the perimeter. 'All around' is natural English and keeps the spatial sense.
- source_word: ርኅዋተ
  chosen: open
  alternatives:
  - opened
  - wide open
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term indicates that the portals stand open. The simple predicate 'open' fits the syntax and avoids adding emphasis not required by the Ge'ez.
- source_word: ለኵሎሙ ነፋሳት
  chosen: for all the winds
  alternatives:
  - for all the spirits
  - for every wind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this immediate context of cosmic meteorology, ነፋሳት refers to winds rather than spirits. 'For all the winds' best matches the plural and the function of the portals as outlets.
- source_word: እለ እምኔሆሙ ይወፅኡ ነፋሳት
  chosen: from which the winds go out
  alternatives:
  - from them the winds come forth
  - out of which winds proceed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause identifies the portals as the source points from which the winds emerge. 'Go out' is a transparent rendering of the motion verb and keeps the repeated noun 'winds' explicit.
- source_word: ወይነፍሱ ዲበ ምድር
  chosen: and blow upon the earth
  alternatives:
  - and breathe over the earth
  - and blow on the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is cognate with 'wind' and here describes the action of the winds over the world. 'Blow upon the earth' is idiomatic and preserves the physical, meteorological sense.
