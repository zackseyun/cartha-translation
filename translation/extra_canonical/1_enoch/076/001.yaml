theological_decisions:
- issue: Whether ነፋሳት should be rendered 'winds' or 'spirits'
  chosen_reading: winds
  alternative_readings:
  - spirits
  rationale: Although the Ge'ez term can overlap semantically with breath/spirit/wind, the verse belongs to the Book of the Luminaries' cosmological description of wind-portals at the earth's extremities. The immediate context strongly favors literal winds rather than personal or angelic spirits.
  doctrine_reference: Preserve local passage sense rather than importing later theological usage; consistency of key terms with documented contextual exception.
