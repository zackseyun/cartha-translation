translation:
  text: Observe and see all the trees, how they appear withered, and all their leaves stripped off—except fourteen trees, which do not lose their foliage, but remain from the old until the new comes, through two and three winters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'from the old until the new comes' is elliptical; it likely refers to the passing old season or year and the arrival of the new one.
    reason: cultural_note
  - marker: b
    text: '''Through two and three winters'' is a difficult expression. It may mean ''for two or three winters'' or indicate repeated winter seasons before renewal.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Ask and see whether all the trees appear withered'.
    reason: previous_rendering
lexical_decisions:
- source_word: ጠይቁ
  chosen: Ask
  alternatives:
  - Inquire
  - Consider
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plural from 'to ask/inquire.' 'Ask' preserves the direct summons while remaining natural in English; paired with the following imperative it functions as an exhortation to observe.
- source_word: ወርእዩ
  chosen: and see
  alternatives:
  - and look
  - and observe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common verb of seeing in imperative plural. 'See' keeps the concise visionary-observational force of the Ge'ez.
- source_word: ኵሎ ዕፀወ
  chosen: all the trees
  alternatives:
  - every tree
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Collective plural is best rendered naturally as 'all the trees' in this descriptive context.
- source_word: እፎ ያስተርእዩ ከመ ይቡስ
  chosen: appear withered
  alternatives:
  - show themselves dried up
  - seem dry
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction conveys visible appearance plus dryness/withered condition. 'Appear withered' preserves both the observational frame and the botanical image.
- source_word: አቍጽሊሆሙ
  chosen: their leaves
  alternatives:
  - their foliage
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to leaves/leafage. 'Leaves' is the more concrete default; 'foliage' is used later for stylistic variation where the idiom concerns not losing leaves.
- source_word: ንጉፍ
  chosen: stripped off
  alternatives:
  - fallen off
  - shed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form indicates being removed/stripped/bare rather than merely seasonal falling. 'Stripped off' preserves the stark visual effect.
- source_word: ዘእንበለ ፲ወ፬ ዕፀወ
  chosen: except fourteen trees
  alternatives:
  - save fourteen trees
  - apart from fourteen trees
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exceptive phrase marks a clear contrast with the general condition of the trees.
- source_word: ዘኢይትነገፉ
  chosen: which do not lose their foliage
  alternatives:
  - which are not stripped
  - which do not shed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negated verbal form parallel to the earlier description of leaves being stripped. 'Do not lose their foliage' gives idiomatic English while preserving the contrast.
- source_word: እላ ይጸንሑ
  chosen: but remain
  alternatives:
  - these endure
  - these continue
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks the continuing state of the exceptional trees. 'Remain' is simple and fits the temporal phrase that follows.
- source_word: እምብሉይ እስከ ይመጽእ ኃዲስ
  chosen: from the old until the new comes
  alternatives:
  - from the old season until the new comes
  - from the old state until the new arrives
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjectives 'old' and 'new' are somewhat elliptical in context, likely referring to the passing and coming season/year. I preserve the compact wording in the main text and clarify in a footnote rather than over-specifying.
- source_word: እምክልኤ ወእም ፫ ክረምት
  chosen: through two and three winters
  alternatives:
  - for two or three winters
  - after two and three winters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is awkward and likely idiomatic for an extended period spanning two or three winter seasons. 'Through two and three winters' stays close to the wording without forcing a precise interpretation.
