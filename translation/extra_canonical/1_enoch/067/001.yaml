translation:
  text: And in those days the word of the Lord came to me, and he said to me, “Noah,
    your portion has come up before me—a portion without blame, a portion of love
    and uprightness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your lot has ascended before me.' The Ge'ez keeps the imagery of upward
      movement into the divine presence.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'without blame' may also be translated 'blameless' or
      'without reproach.' Because the Parables are effectively preserved only in Ge'ez
      here, the nuance should be held with some caution.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወበእማንቱ መዋዕል
  chosen: And in those days
  alternatives:
  - And during those days
  - And at that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula; 'those days' preserves the elevated
    visionary register and recurring Enochic idiom.
- source_word: ቃለ እግዚአብሔር
  chosen: the word of the Lord
  alternatives:
  - a word of the Lord
  - the speech of the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A prophetic revelation formula. 'the word of the Lord' best preserves
    the formal revelatory sense without over-paraphrase.
- source_word: ኀቤየ
  chosen: to me
  alternatives:
  - unto me
  - before me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With 'came' and 'said,' the dative sense 'to me' is the most natural
    English rendering.
- source_word: ኖኅ
  chosen: Noah
  alternatives:
  - Noe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard English transliteration of the biblical name.
- source_word: ክፍልከ
  chosen: your portion
  alternatives:
  - your share
  - your lot
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Portion'' preserves the broad semantic range of allotted share or
    assigned standing, fitting the judicial and covenantal tone better than the more
    colloquial ''share.'''
- source_word: ዐርገ ኀቤየ
  chosen: has come up before me
  alternatives:
  - has ascended to me
  - has risen before me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys upward movement; 'come up before me' preserves the vertical
    imagery while remaining idiomatic in English and suitable for a heavenly audience
    scene.
- source_word: ዘአልቦቱ ሒስ
  chosen: without blame
  alternatives:
  - without reproach
  - blameless
  - without deficiency
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to negate fault or accusation. 'Without blame' keeps
    the judicial nuance and avoids overstating the term into absolute moral perfection.
- source_word: ፍቅር
  chosen: love
  alternatives:
  - charity
  - belovedness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary sense is 'love.' Retaining the noun keeps the triadic description
    of Noah's portion rather than converting it into an adjective.
- source_word: ወርትዕ
  chosen: uprightness
  alternatives:
  - righteousness
  - rectitude
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term overlaps with righteousness/rightness. 'Uprightness' fits the
    immediate characterization of Noah's portion and avoids importing later doctrinal
    freight where the local sense is ethical straightness.
