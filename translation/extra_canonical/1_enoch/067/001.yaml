theological_decisions:
- issue: How to render Noah's 'portion' in a revelatory judgment context
  chosen_reading: your portion has come up before me
  alternative_readings:
  - your lot has ascended before me
  - your share has risen to me
  rationale: The verse appears to describe Noah's standing or allotted status being
    presented before God. 'Portion' preserves ambiguity between inheritance, assigned
    place, and moral standing without narrowing the image.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether ዘአልቦቱ ሒስ should be rendered as absolute moral perfection
  chosen_reading: without blame
  alternative_readings:
  - blameless
  - without reproach
  rationale: The phrase commends Noah strongly, but 'without blame' better preserves
    a judicial or reputational nuance and avoids overstating the claim into sinless
    perfection.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    local sense.
