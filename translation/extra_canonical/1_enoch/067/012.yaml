theological_decisions:
- issue: Scope of the witness/testimony clause
  chosen_reading: The angels' judgment serves as testimony against earthly rulers
  alternative_readings:
  - The angels are themselves witnesses to the kings and mighty
  - 'The phrase is merely appositional: ''the testimony for the kings and mighty'''
  rationale: The syntax most naturally links 'testimony' to the judgment just mentioned,
    with the following lamed phrases indicating those against whom the testimony stands.
    This fits the surrounding theme of cosmic judgment exposing earthly powers.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity where present.
