translation:
  text: And I heard Michael answering and saying, “This judgment by which the angels
    are judged is a testimony against the kings and the mighty, those who possess
    the dry land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a witness against the kings and the mighty.' The Ge'ez noun can mean
      either 'testimony' or 'witness' in a forensic sense.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the dry land.' The phrase may denote the inhabited land under
      human rule rather than the earth in a fully cosmic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሰማዕክዎ
  chosen: And I heard
  alternatives:
  - And I listened to him
  - And I heard him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Narrative first-person perfect with object suffix; the following lamed
    phrase identifies Michael as the one heard, so idiomatic English is 'And I heard
    Michael...'.
- source_word: ለሚካኤል
  chosen: Michael
  alternatives:
  - Mikael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal name is transliterated rather than translated, per project philosophy.
- source_word: ያውሥእ
  chosen: answering
  alternatives:
  - replying
  - responding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common speech-verb in paired formula with 'saying'; 'answering and saying'
    preserves the elevated apocalyptic register better than collapsing the pair.
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - sentence
  - condemnation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is judicial and eschatological. 'Judgment' is broad enough
    to include both the act and its penal outcome without over-specifying.
- source_word: ዛቲ
  chosen: this
  alternatives:
  - this very
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative pointing to the specific judgment just described.
- source_word: እንተ ይትኴነኑ መላእክት
  chosen: by which the angels are judged
  alternatives:
  - wherein the angels are judged
  - with which the angels are condemned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative construction tied to the judicial noun. 'Are judged' keeps the
    passive and avoids forcing a harsher 'condemned,' though condemnation is implied
    by context.
- source_word: ሰማዕተ
  chosen: a testimony against
  alternatives:
  - a witness against
  - testimony
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes witness/testimony. Because the dative phrase that follows
    marks those implicated, 'a testimony against' makes the forensic sense explicit
    in natural English.
- source_word: ለነገሥት
  chosen: the kings
  alternatives:
  - kings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Definite reference to the class of earthly rulers under judgment in this
    context.
- source_word: ወለዐዚዛን
  chosen: the mighty
  alternatives:
  - the powerful
  - the strong ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard apocalyptic designation for powerful elites. 'The mighty'
    preserves the elevated tone and social-political force.
- source_word: እለ ይእኅዝዋ ለየብስ
  chosen: those who possess the dry land
  alternatives:
  - those who hold the earth
  - those who seize the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys holding or possessing; የብስ is literally dry land/land
    as opposed to waters. 'Possess the dry land' preserves the concrete image and
    avoids importing the broader 'world' unless context requires it.
