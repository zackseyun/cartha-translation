translation:
  text: And now the angels are making a wooden structure; and when the angels have
    finished that, I will place my hand upon it and guard it, and from it there will
    come the seed of life, and a transformation will occur, so that the dry ground
    may not remain barren.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez of this verse is difficult in several places, especially the clause
      involving 'my hands upon it' and the expression rendered 'wooden vessels.' The
      translation keeps the imagery visible rather than smoothing it into a more certain
      paraphrase.
    reason: textual_variant
  - marker: b
    text: Or 'woodwork,' 'wooden structures,' possibly even 'trees,' depending on
      how the underlying noun is taken.
    reason: lexical_alternative
  - marker: c
    text: '''Seed of life'' is rendered literally. It may refer to life-giving offspring,
      generative power, or renewed fertility.'
    reason: lexical_alternative
  - marker: d
    text: Or 'and when they have finished all this, the angels will place my hands
      upon it and keep watch over it'.
    reason: previous_rendering
  - marker: e
    text: Or 'wooden vessels'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይገብሩ
  chosen: are making
  alternatives:
  - make
  - will make
  - prepare
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The imperfect form naturally carries ongoing or imminent action in visionary
    narration. 'Are making' preserves the scene's immediacy better than a flat future.
- source_word: መላእክት
  chosen: angels
  alternatives:
  - messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In 1 Enoch's apocalyptic setting, heavenly beings are in view, not merely
    human messengers.
- source_word: ዕፀወ
  chosen: wooden vessels
  alternatives:
  - trees
  - woodwork
  - wooden structures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun derives from 'wood/tree' language, but in this context of preparation
    for the fiery/judgment scene a crafted object is more likely than literal trees.
    'Wooden vessels' keeps the material sense while acknowledging uncertainty.
- source_word: ወድኡ
  chosen: have finished
  alternatives:
  - complete
  - bring to an end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'A completion verb fits the sequence: the angels make something, then
    after finishing it further action follows.'
- source_word: እወዲ እዴየ ዲቤሃ
  chosen: will place my hands upon it
  alternatives:
  - I will put my hands upon it
  - they will set my hands upon it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is textually difficult. The wording clearly includes 'my hands'
    and 'upon it.' Because the surrounding syntax keeps the angels as subject, this
    rendering preserves that flow while signaling the oddity in a footnote.
- source_word: እዐቅባ
  chosen: keep watch over it
  alternatives:
  - guard it
  - preserve it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests guarding or watching. 'Keep watch over it' preserves
    the active protective nuance in apocalyptic register.
- source_word: ዘርአ ሕይወት
  chosen: the seed of life
  alternatives:
  - a seed of life
  - living seed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering best preserves the imagery. It may imply life-giving
    progeny or generative vitality, but the metaphor should remain open.
- source_word: ተወላጥ ይባእ
  chosen: a change will appear
  alternatives:
  - a transformation will come
  - new growth will emerge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult, but it points to some resulting alteration or
    emergence. 'A change will appear' is restrained and avoids over-specifying agricultural
    imagery.
- source_word: የብስ ዕራቆ
  chosen: the dry ground ... barren
  alternatives:
  - the dry earth ... empty
  - the parched land ... desolate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired terms evoke dryness and lack of productivity. 'Dry ground'
    and 'barren' preserve the concrete image and the fertility theme.
