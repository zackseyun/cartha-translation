theological_decisions:
- issue: Identity of the judged angels
  chosen_reading: The verse refers to angels who misled human inhabitants of the earth/dry land and are now subject to divine judgment.
  alternative_readings:
  - The angels are specifically the watchers of Genesis 6 tradition
  - The phrase could be read more generically as supernatural beings associated with prior deception
  rationale: The immediate wording only says 'those angels who led astray those who dwell upon the dry land.' Because this is the Parables and the Ge'ez is our primary witness, the translation keeps the wording local and does not import a more specific identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; keep major terms locally grounded in the passage.
