translation:
  text: And through its valleys come rivers of fire, where those angels shall be judged who led astray those who dwell upon the dry land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'streams of fire.' The Ge'ez image is of flowing channels of fire issuing from the fiery heat.
    reason: lexical_alternative
  - marker: b
    text: Literally 'those who dwell upon the dry land.' This may simply mean human inhabitants of the earth, but the more concrete wording has been retained.
    reason: lexical_alternative
  - marker: c
    text: Or 'And in proportion to the heat of that fire, rivers of fire came forth,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ቈላት
  chosen: heat
  alternatives:
  - burning
  - flame
  - glow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with fire and ensuing rivers of fire, the noun is best taken as the burning heat or intensity of the fire rather than a separate flame-object. 'Heat' preserves the causal/apocalyptic sense.
- source_word: ዚአሃ
  chosen: that
  alternatives:
  - this
  - its
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative most naturally points back to the previously mentioned fiery phenomenon in the vision. 'That' keeps the anaphoric force.
- source_word: አፍላገ እሳት
  chosen: rivers of fire
  alternatives:
  - streams of fire
  - channels of fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural construct plainly denotes flowing bodies of fire. 'Rivers of fire' preserves the vivid apocalyptic imagery better than the weaker 'streams,' while remaining natural English.
- source_word: ይመጽኡ
  chosen: came forth
  alternatives:
  - came
  - issued forth
  - will come forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The imperfect in visionary narrative can function as a descriptive past/present. 'Came forth' fits the report style and the image of fiery rivers issuing out from the heat.
- source_word: ኀበ
  chosen: where
  alternatives:
  - to where
  - unto the place where
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here the preposition introduces the place associated with judgment. 'Where' gives idiomatic English without losing the locative sense.
- source_word: ይትኴነኑ
  chosen: shall be judged
  alternatives:
  - are judged
  - will be condemned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/judicial sense is clear. 'Shall be judged' preserves the formal judgment motif without prematurely narrowing it to condemnation, though condemnation is likely implied by context.
- source_word: እልኩቱ መላእክት
  chosen: those angels
  alternatives:
  - those messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In 1 Enoch's apocalyptic setting, 'angels' is the correct rendering, not the more generic 'messengers.' The demonstrative is retained with 'those.'
- source_word: አስሐትዎሙ
  chosen: led astray
  alternatives:
  - deceived
  - caused to err
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The causative sense is important: these angels caused others to go wrong. ''Led astray'' is both readable and morally weighty.'
- source_word: ለእለ የኃድሩ ዲበ የብስ
  chosen: those who dwell upon the dry land
  alternatives:
  - those who live on the earth
  - the inhabitants of the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is more literally 'those dwelling upon the dry land.' Retaining 'dry land' preserves the concrete cosmological wording of the Ge'ez and avoids flattening it into the generic 'earth'.
