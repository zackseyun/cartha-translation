theological_decisions:
- issue: Whether the waters are beneficial, punitive, or paradoxically both
  chosen_reading: 'The verse is rendered with the Ge''ez sequence intact: the waters
    are said to be ''for healing of the body'' and ''for correction of the spirit,''
    yet the outcome remains judgment because the subjects have denied the Lord of
    Spirits.'
  alternative_readings:
  - Render the healing language ironically as destructive
  - Emend toward purely punitive sense throughout
  rationale: The immediate context involves fiery/judgment waters, but this verse
    itself uses healing/correction language. Preserving the tension is more transparent
    than resolving it into either pure blessing or pure torment.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ትውኔተ in a difficult clause
  chosen_reading: Rendered positively as 'pleasure' with a footnote noting uncertainty.
  alternative_readings:
  - delight
  - sweetness
  - luxury/sensual pleasure
  - a corrupt or uncertain reading
  rationale: The Ge'ez wording is difficult and the positive sense sits awkwardly
    in context. Rather than forcing a conjectural negative, the translation keeps
    a plausible lexical value and flags the difficulty.
  doctrine_reference: When the sense is uncertain, prefer transparent English plus
    a footnote over false confidence.
