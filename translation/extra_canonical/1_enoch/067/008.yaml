translation:
  text: And in those days those waters will be for the kings and the mighty and the
    exalted, and for those who dwell on the dry ground, for the healing of the body
    and for the punishment of the spirit; and their spirit will be full of pleasure,
    so that their bodies may be judged, because they have denied the Lord of Spirits,
    and they see their judgment every day, yet they do not believe in his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'their spirit will be full of pleasure' is textually and contextually
      difficult. The Ge'ez appears to give a positive term such as 'pleasure' or 'delight,'
      though the surrounding context is judgment.
    reason: textual_variant
  - marker: b
    text: '''Body'' and ''spirit'' are kept as distinct terms here because the verse
      speaks of bodily healing and spiritual correction without collapsing them into
      a single metaphor.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and their spirit will be full of pleasure'.
    reason: previous_rendering
  - marker: d
    text: Or 'for the correction of the spirit'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይከውኑ
  chosen: and ... will be
  alternatives:
  - and they will become
  - and it will happen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future/existential verb introducing the result in visionary sequence;
    idiomatic English is 'will be' rather than a wooden 'will become'.
- source_word: በአማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - at that time
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard apocalyptic temporal formula; 'in those days' preserves the
    repeated visionary register.
- source_word: ማያት
  chosen: waters
  alternatives:
  - water
  - springs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural form is retained because the scene concerns the hot/judgment waters
    already in context.
- source_word: ለነገሥት ወለዐዚዛን ወለልዑላን
  chosen: for the kings and the mighty and the exalted
  alternatives:
  - for kings and rulers and the high ones
  - for the kings, the powerful, and the lofty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the triadic social grouping and elevated judgment diction without
    collapsing the terms into one class.
- source_word: ወለእለ የኃድሩ ዲበ የብስ
  chosen: and for those who dwell upon the dry ground
  alternatives:
  - and for those who live on the earth
  - and for the inhabitants of the dry land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'dry ground/land'; retained rather than generalized to 'earth'
    to preserve the concrete contrast with the waters.
- source_word: ለፈውሰ ሥጋ
  chosen: for the healing of the body
  alternatives:
  - for the healing of the flesh
  - for bodily healing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ፈውስ is healing/remedy. 'Body' is chosen over 'flesh' here because the
    phrase is physical and not a moralized anthropology.
- source_word: ወለአዝነ መንፈስ
  chosen: for the correction of the spirit
  alternatives:
  - for the discipline of the spirit
  - for the chastening of the spirit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun suggests admonition/discipline rather than comfort. 'Correction'
    preserves the punitive-healing ambiguity of the context.
- source_word: ወትውኔተ ይመልእ መንፈሶሙ
  chosen: and their spirit will be full of pleasure
  alternatives:
  - and their spirit will be filled with delight
  - and their spirit will be full of sweetness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is difficult in context because it follows punitive language.
    A basic positive sense ('pleasure/delight') is retained transparently rather than
    forcing a negative meaning not clearly warranted by the Ge'ez.
- source_word: ከመ ይትኰነኑ ሥጋሆሙ
  chosen: so that their bodies may be judged
  alternatives:
  - so that their flesh may be condemned
  - until their bodies are judged
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/jussive sense from the judgment verb. 'Judged' is preferred to
    'condemned' because the latter overstates the lexical force, though condemnation
    is contextually near.
- source_word: እስመ ክሕድዎ ለእግዚአ መንፈሳት
  chosen: because they have denied the Lord of Spirits
  alternatives:
  - because they rejected the Lord of Spirits
  - because they disowned the Lord of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The denial/rejection verb is strong covenantal opposition. 'Lord of Spirits'
    is the established title in this book and should be translated, not paraphrased.
- source_word: ወይሬእዩ ኵነኔሆሙ
  chosen: and they see their judgment
  alternatives:
  - and they look upon their punishment
  - and they behold their sentence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote judgment or condemnation. 'Judgment' keeps the forensic
    sense and allows the context to supply the severity.
- source_word: እንተ ኵሉ ዕለት
  chosen: every day
  alternatives:
  - day by day
  - all the day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple idiomatic rendering of the temporal phrase.
- source_word: ወኢየአምኑ በስሙ
  chosen: yet they do not believe in his name
  alternatives:
  - and they do not trust in his name
  - and they do not believe his name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the biblical idiom 'believe in his name' without importing later
    Christian formulae; the object is explicitly 'his name.'
