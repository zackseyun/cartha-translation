theological_decisions:
- issue: Referent of 'them' in the final clause
  chosen_reading: Retained as an unspecified plural referent carried over from the
    verse, without identifying them more narrowly.
  alternative_readings:
  - the judged kings and mighty ones
  - the righteous
  - the bodies/spirits just mentioned
  rationale: The Ge'ez plural pronouns do not explicitly restate the antecedent in
    this verse. Because the line is difficult and the Parables are effectively Ge'ez-only
    here, the translation preserves the ambiguity rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
