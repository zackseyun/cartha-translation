translation:
  text: And as the burning of their bodies is very great, so a change comes upon them
    forever and ever in spirit, because before the Lord of Spirits there is none who
    can speak a word against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic line is difficult. The clause rendered 'so a change comes upon
      them forever and ever in spirit' may also be understood more literally as 'thus
      there is for them a change of spirit forever and ever.'
    reason: alternative_reading
  - marker: b
    text: Or 'there is none before the Lord of Spirits who can utter a matter against
      them.' The wording has a judicial or adversarial flavor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ውዕየ
  chosen: burning
  alternatives:
  - heat
  - blazing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun/verb sense points to burning or fiery heat. 'Burning' preserves
    the concrete apocalyptic image of bodily torment better than the more abstract
    'heat'.
- source_word: ሥጋሆሙ
  chosen: their bodies
  alternatives:
  - their flesh
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'their flesh,' but in this judgment scene 'their bodies' communicates
    the physical referent clearly in modern English while retaining corporeal force.
- source_word: ተውላጠ
  chosen: a change comes upon
  alternatives:
  - is changed
  - is transformed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form suggests alteration or change. 'A change comes upon' preserves
    the passive/resultative sense without overstating it as full transformation.
- source_word: ለመንፈስ
  chosen: in spirit
  alternatives:
  - for the spirit
  - as to the spirit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase most naturally marks the sphere or respect in
    which the change occurs. 'In spirit' keeps the contrast with bodily burning.
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for the age of ages
  - for ever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard emphatic idiom for unending duration. 'Forever and
    ever' is idiomatic English and preserves the solemn force.
- source_word: እግዚአ መንፈሳት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed Enochic divine title. 'Lord of Spirits' preserves the
    recognized title-form and avoids flattening it into a generic phrase.
- source_word: ዘይነግር ነገረ በከ
  chosen: who can speak a word against them
  alternatives:
  - who can utter a matter against them
  - who can accuse them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated cognate wording suggests speaking or declaring a matter.
    'Speak a word against them' preserves the forensic flavor without overinterpreting
    it as a formal legal accusation.
