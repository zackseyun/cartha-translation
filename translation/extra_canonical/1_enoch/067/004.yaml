theological_decisions:
- issue: Nature of the angels' offense
  chosen_reading: the angels are described as having shown or manifested lawlessness
  alternative_readings:
  - the angels committed lawlessness
  - the angels taught lawlessness
  rationale: The Ge'ez wording centers on 'showing' lawlessness. Because the Parables are effectively Ge'ez-only here, the translation preserves that verbal nuance rather than importing a more interpretive 'taught' or flattening it to simple commission of evil.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
