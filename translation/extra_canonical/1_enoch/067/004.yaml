translation:
  text: And they will shut up those angels who had shown lawlessness in that burning valley which my grandfather Enoch had first shown me in the west, by the mountains of gold and silver and iron and soft metal and lead. those angels who had shown lawlessness in that burning valley And they bound those angels who had shown lawlessness in that burning valley which my grandfather Enoch had previously shown me in the west, by the mountains of gold and silver and iron and soft metal and lead. in the west, by the mountains of gold and silver and iron and soft metal and lead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the west'; the word can also mean 'at evening,' but the surrounding place-markers favor a western location.
    reason: lexical_alternative
  - marker: b
    text: The metal named after iron is uncertain in this witness; possibilities include 'tin,' 'electrum,' or another refined/soft metal.
    reason: lexical_alternative
  - marker: c
    text: Or 'And they bound'.
    reason: previous_rendering
  - marker: d
    text: Or 'which had first been shown to me, Enoch,'.
    reason: previous_rendering
lexical_decisions:
- source_word: የዐጽዎሙ
  chosen: they bound
  alternatives:
  - they confined
  - they imprisoned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes restraining or fastening. 'Bound' preserves the concrete punitive imagery typical of Enochic judgment scenes better than the more abstract 'confined.'
- source_word: እሙንቱ መላእክት
  chosen: those angels
  alternatives:
  - those messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the referent is clearly angelic beings under judgment, not human messengers.
- source_word: እለ አርአይዋ ለዓመፃ
  chosen: who had shown lawlessness
  alternatives:
  - who had revealed transgression
  - who had displayed rebellion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause most naturally means that these angels made lawlessness known or manifest. 'Lawlessness' keeps the moral and judicial force of ዓመፃ without narrowing it to a single act.
- source_word: ቈላ እንተ ትነድድ
  chosen: burning valley
  alternatives:
  - valley that burns
  - blazing ravine
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is vivid topographical judgment imagery. 'Burning valley' is natural English while preserving the ongoing fiery sense.
- source_word: አርአየኒ ቀዳሚ
  chosen: had first been shown to me
  alternatives:
  - was shown to me before
  - had previously appeared to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This points back to an earlier visionary disclosure. The pluperfect English makes the backward reference clear.
- source_word: በዓረብ
  chosen: in the west
  alternatives:
  - toward the west
  - at evening
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the geographical markers that follow, a directional sense is more likely than the temporal sense 'at evening.'
- source_word: አድባረ ወርቅ ወብሩር ወሐፂን
  chosen: the mountains of gold and silver and iron
  alternatives:
  - the hills of gold and silver and iron
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural construct clearly lists metallic mountains seen in the vision. 'Mountains' fits the grandeur of the scene.
- source_word: ነጠብጣብ
  chosen: soft metal
  alternatives:
  - tin
  - electrum
  - molten metal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact metal is uncertain in this OCR-based witness. A cautious generic rendering in the main text avoids false precision, with a footnote preserving alternatives.
- source_word: ናእስ
  chosen: lead
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term is commonly understood as lead in lists of metals and suits the sequence here.
