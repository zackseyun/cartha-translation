translation:
  text: For these are the waters of judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the water of judgment,' if the Ge'ez is taken more collectively; the
      plural 'waters' is retained to preserve the imagery of the scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces an explanation or grounding statement; 'for' preserves the
    elevated explanatory force without over-expanding.
- source_word: እሉ
  chosen: these
  alternatives:
  - those
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative plural; 'these' best fits the immediate visionary reference
    to waters being identified.
- source_word: ማየ
  chosen: waters
  alternatives:
  - water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form refers to water/waters; plural 'waters' better preserves the
    concrete apocalyptic image rather than reducing it to an abstract mass noun.
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - condemnation
  - punishment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A judicial term; 'judgment' preserves the forensic-apocalyptic sense
    and leaves open whether the emphasis is sentence or punitive outcome. 'Condemnation'
    would narrow the sense too far.
