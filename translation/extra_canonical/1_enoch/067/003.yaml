theological_decisions:
- issue: Whether the promise language should be rendered in overt covenantal terms
  chosen_reading: Kept as 'establish your offspring before me forever and ever' without
    adding covenant terminology
  alternative_readings:
  - I will confirm your seed in my presence forever
  - I will preserve your descendants
  rationale: The verse has strong promise and perpetuity language, but the Ge'ez does
    not explicitly mention covenant. The translation preserves the theological weight
    without importing extra categories.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: How to handle the difficult negative clause with 'they shall not counsel
    upon the face of the dry ground'
  chosen_reading: Retained a close rendering in the main text and flagged uncertainty
    in a footnote
  alternative_readings:
  - they shall not be harmed on the earth
  - they shall not labor on the earth
  - they shall not devise evil on the earth
  rationale: The clause is textually and syntactically difficult in this Ge'ez-only
    section. A restrained rendering is more transparent than replacing it with a smoother
    but less auditable interpretation.
  doctrine_reference: When the sense is uncertain, prefer transparent English plus
    a footnote over false confidence.
