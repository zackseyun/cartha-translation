translation:
  text: And I will establish your offspring before me forever and ever, and I will
    spread out those who dwell with you. They shall not counsel upon the face of the
    dry ground, but they shall be blessed and multiplied on the dry ground in the
    name of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'They shall not counsel upon the face of the dry ground' is uncertain.
      The Ge'ez appears to negate a verb meaning 'to counsel' or 'to deliberate,'
      but the sense in context is difficult; some interpreters may understand a broader
      idea such as planning or acting on the earth.
    reason: textual_variant
  - marker: b
    text: '''Dry ground'' renders a literal expression. It may function here simply
      as ''land'' or ''earth,'' but the more concrete wording has been preserved.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አጸንዖ
  chosen: I will establish
  alternatives:
  - I will strengthen
  - I will make firm
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys making firm or establishing. In context with 'your offspring'
    and the eternal duration formula, 'establish' best fits covenantal or enduring
    placement language without over-paraphrase.
- source_word: ዘርእከ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Offspring'' preserves the collective singular sense of ''seed'' in
    readable modern English while retaining lineage language.'
- source_word: በቅድሜየ
  chosen: before me
  alternatives:
  - in my presence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward spatial-relational rendering; 'before me' preserves
    the elevated register and possible covenantal nuance.
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for the age of ages
  - for ever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard intensifying eternity formula. 'Forever and ever'
    is idiomatic and preserves the emphatic repetition.
- source_word: አዘርኦሙ
  chosen: I will spread out
  alternatives:
  - I will scatter
  - I will sow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The root likely carries the idea of scattering or sowing abroad. Because
    the context is positive, followed by blessing and multiplication, 'spread out'
    avoids an overly negative sense while preserving dispersion imagery.
- source_word: እለ ያኃድሩ ምስሌከ
  chosen: those who dwell with you
  alternatives:
  - those who live with you
  - those who abide with you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes co-dwelling or abiding together. 'Dwell' suits the
    elevated apocalyptic register.
- source_word: ኢይመክር
  chosen: they shall not counsel
  alternatives:
  - they shall not take counsel
  - they shall not plan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to negate a verb of counsel or deliberation. Because
    the syntax is difficult, the rendering stays close to the apparent lexical value
    and leaves fuller interpretation to a footnote.
- source_word: ገጸ የብስ
  chosen: the face of the dry ground
  alternatives:
  - the face of the earth
  - the dry land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'face of the dry land/ground.' Retaining 'dry ground' preserves
    the concrete imagery and avoids silently normalizing it to generic 'earth.'
- source_word: ይትባረክ
  chosen: they shall be blessed
  alternatives:
  - they shall bless themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive nuance can vary, but passive 'be blessed' is the
    most natural reading in sequence with multiplication.
- source_word: ይትባዛሕ
  chosen: multiplied
  alternatives:
  - made many
  - increase
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is standard increase/multiplication language, fitting the offspring
    theme.
- source_word: በስሙ ለእግዚአ
  chosen: in the name of the Lord
  alternatives:
  - by the name of the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase most naturally expresses agency or sphere associated with
    the divine name. 'Lord' is the normal rendering for እግዚአ in this context.
