translation:
  text: For judgment will come upon them, because they trust in the indulgence of
    their flesh and deny the spirit of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The term rendered 'indulgence' is uncertain in this Ge'ez-only section.
      It may also suggest pleasure, wantonness, or possibly deception associated with
      their flesh.
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  chosen: for / because
  alternatives:
  - because
  - for
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse uses እስመ twice in causal sequence. The first is rendered 'For'
    to connect with the preceding context; the second is rendered 'because' to preserve
    the explicit reason clause.
- source_word: ትመጽእ
  chosen: will come
  alternatives:
  - comes
  - shall come
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward future sense fits the judgment announcement formula
    in apocalyptic discourse.
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - condemnation
  - sentence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Judgment'' best preserves the broad judicial and eschatological force
    without narrowing it to the verdict alone.'
- source_word: ዲቤሆሙ
  chosen: upon them
  alternatives:
  - against them
  - over them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional sense is most naturally rendered 'upon them' in an
    oracular judgment formula.
- source_word: የአምኑ
  chosen: they trust
  alternatives:
  - they believe
  - they rely
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can denote believing or trusting. 'Trust' better fits the object
    that follows and highlights misplaced reliance.
- source_word: በተውኔተ
  chosen: in the indulgence of
  alternatives:
  - in the pleasure of
  - in the deception of
  - in the wantonness of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is difficult in this Ge'ez-only Parables context. Given the
    immediate pairing with 'their flesh,' a sense of sensual indulgence or self-gratifying
    excess is most plausible. This is kept transparent in a footnote because other
    nuances are possible.
- source_word: ሥጋሆሙ
  chosen: their flesh
  alternatives:
  - their body
  - their bodily nature
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Flesh'' preserves the concrete anthropological term and its moral
    force in context; it should not be flattened to merely ''body''.'
- source_word: ወመንፈሰ
  chosen: and the spirit
  alternatives:
  - and spirit
  - and the breath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly means spirit/breath. 'The spirit' is retained because
    the following genitive links it specifically to the Lord.
- source_word: እግዚአ
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard divine title and should be translated, not transliterated,
    in keeping with project philosophy.
- source_word: ይክሕዱ
  chosen: deny
  alternatives:
  - reject
  - disown
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Deny'' best preserves the force of repudiation in a theological context.'
