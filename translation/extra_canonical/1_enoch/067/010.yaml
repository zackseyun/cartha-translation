theological_decisions:
- issue: Meaning of 'the spirit of the Lord'
  chosen_reading: a reference to the Lord's Spirit, which they repudiate in contrast
    to reliance on flesh
  alternative_readings:
  - their own God-given spirit
  - the spiritual way belonging to the Lord
  rationale: The genitive construction most naturally points to the Lord's Spirit
    rather than merely human inwardness. The flesh/spirit contrast also supports a
    theological contrast, but the wording is left non-systematized and not harmonized
    with later Christian formulas.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import later doctrinal phrasing.
