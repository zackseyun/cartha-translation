theological_decisions:
- issue: Whether the verse states simple knowledge or revealed apocalyptic knowledge
  chosen_reading: The speaker declares knowledge of a revealed mystery for the righteous.
  alternative_readings:
  - The speaker simply says 'I know for you' without explicit 'mystery' language.
  rationale: Given the Enochic setting and the likely force of the verb, the line
    is best understood as disclosure of revealed knowledge. This preserves apocalyptic
    texture rather than flattening the statement into ordinary cognition.
  doctrine_reference: Preserve apocalyptic imagery and do not flatten visionary discourse.
- issue: Referent of 'the Great One'
  chosen_reading: A divine title, rendered 'the Great One' without expanding it to
    'God' in the main text.
  alternative_readings:
  - A descriptive adjective not functioning as a title
  - An implicit reference to the Lord/God rendered explicitly
  rationale: The context strongly suggests a divine referent, but the Ge'ez wording
    itself uses a majestic epithet. The translation keeps the title rather than resolving
    it into a more explicit doctrinal label.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    titles for meaning.
