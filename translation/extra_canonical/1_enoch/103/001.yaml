translation:
  text: 'And now I know this mystery for you, O righteous ones: by the glory of the
    Great One, and the honorable and mighty kingdom, and in greatness, I know it for
    you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording is compressed and somewhat difficult. The repeated verb
      may mean simply 'I know' or more specifically 'I know this revealed mystery.'
    reason: lexical_alternative
  - marker: b
    text: '''Kingdom'' may also be understood as ''dominion'' or ''reign.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይእዜኒ
  chosen: And now
  alternatives:
  - And at this time
  - But now
  lexicon: Dillmann
  rationale: Temporal discourse marker introducing a new declaration; 'And now' preserves
    the connective and the immediacy.
- source_word: አነ
  chosen: I
  alternatives: []
  lexicon: Dillmann
  rationale: Explicit first-person pronoun retained for emphasis in the speaker's
    solemn declaration.
- source_word: እምሕል
  chosen: know this mystery
  alternatives:
  - know
  - have learned
  - understand the mystery
  lexicon: Dillmann
  rationale: In Enochic context this verb commonly carries the sense of coming to
    know a revealed secret; the form appears twice in the verse and is best rendered
    with explicit apocalyptic force rather than a bare 'know.'
- source_word: ለክሙ
  chosen: for you
  alternatives:
  - to you
  - concerning you
  lexicon: Dillmann
  rationale: The preposition with pronominal suffix can indicate direction or advantage.
    'For you' fits the repeated phrase and the sense that the revelation is disclosed
    on behalf of the righteous.
- source_word: ጻድቃን
  chosen: righteous ones
  alternatives:
  - the righteous
  - just ones
  lexicon: Dillmann
  rationale: A key Enochic group designation. 'Righteous ones' preserves the plural
    substantive force and apocalyptic register.
- source_word: በስብሐቱ
  chosen: by the glory
  alternatives:
  - in glory
  - with glory
  lexicon: Dillmann
  rationale: The instrumental preposition is difficult here. 'By the glory' preserves
    the formal wording and leaves the exact relation transparent rather than over-interpreting.
- source_word: ለዐቢይ
  chosen: of the Great One
  alternatives:
  - of the great one
  - of the Mighty One
  lexicon: Dillmann
  rationale: The adjective is used substantivally for a majestic figure, likely God.
    'Great One' preserves the elevated title without importing later fixed divine
    names.
- source_word: ወለክቡር
  chosen: and the honorable
  alternatives:
  - and the glorious
  - and the majestic
  lexicon: Dillmann
  rationale: The term denotes honor or dignity. 'Honorable' keeps the lexical distinction
    from the preceding 'glory,' though the phrase remains somewhat compressed in Ge'ez.
- source_word: ወዕዙዘ
  chosen: and mighty
  alternatives:
  - and strong
  - and powerful
  lexicon: Dillmann
  rationale: Conveys strength or might; 'mighty' suits the elevated register and likely
    modifies 'kingdom' in the chain of descriptors.
- source_word: መንግሥት
  chosen: kingdom
  alternatives:
  - reign
  - royal dominion
  lexicon: Dillmann
  rationale: The noun can denote kingdom or reign. 'Kingdom' is the more direct rendering,
    while the footnote can preserve 'dominion' as an alternative nuance.
- source_word: ወበዕበዩ
  chosen: and in greatness
  alternatives:
  - and in majesty
  - and in exaltation
  lexicon: Dillmann
  rationale: Another abstract noun of greatness/exaltation. The phrase is difficult,
    so a transparent rendering is preferable to a smoother but more interpretive one.
