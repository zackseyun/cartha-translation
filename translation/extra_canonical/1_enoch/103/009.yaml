theological_decisions:
- issue: Identity and status of the righteous in the phrase 'who are in life'
  chosen_reading: The phrase refers to the righteous and good as those presently in
    life/alive, not yet vindicated in the age to come.
  alternative_readings:
  - those in the life to come
  - those within true life in a spiritual sense
  rationale: In context the verse forbids a certain complaint about present suffering.
    The lament language fits the earthly condition of the righteous rather than a
    post-judgment heavenly state.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    locally from the passage.
