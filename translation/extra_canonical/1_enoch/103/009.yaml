translation:
  text: Do not say, you righteous and good who are in life, “In the days of our trouble
    we labored, and we saw every affliction, and we encountered many evils, and we
    were diminished and made few, and our spirit became small.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The underlying wording around 'our affliction ... we toiled hard' is textually
      difficult in the OCR witness; the sense is a complaint of severe hardship and
      labor.
    reason: textual_variant
  - marker: b
    text: Literally, 'our spirit became small,' an idiom of inward diminishment that
      may imply discouragement, weakness, or loss of courage.
    reason: lexical_alternative
  - marker: c
    text: Or 'Do not say of the righteous and the good who are in life:'.
    reason: previous_rendering
  - marker: d
    text: Or 'and we were brought to ruin'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኢትበልዎሙ
  chosen: Do not say of them
  alternatives:
  - Do not say to them
  - You shall not say concerning them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative imperative/plural form introducing a prohibition. The suffix
    likely refers to the righteous as the topic of speech; English idiom is smoother
    with 'say of them' rather than 'say to them' in this context.
- source_word: ለጻድቃን
  chosen: of the righteous
  alternatives:
  - to the righteous
  - concerning the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Core ethical/religious term meaning righteous ones. Retained consistently
    as 'righteous' rather than 'just' to preserve Enochic moral vocabulary.
- source_word: ወኄራን
  chosen: and the good
  alternatives:
  - and the upright
  - and the kind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Parallel descriptor paired with 'righteous.' 'Good' preserves the broad
    moral sense without over-specifying a narrower ethical nuance.
- source_word: እለ ሀለዉ ውስተ ሕይወት
  chosen: who are in life
  alternatives:
  - who are alive
  - who live
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A relatively literal rendering preserves the idiom and the contrastive/apocalyptic
    tone. 'Who are alive' is possible, but 'in life' better reflects the prepositional
    phrase.
- source_word: በመዋዕለ
  chosen: in the days of
  alternatives:
  - during the days of
  - in the time of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal expression; 'in the days of' keeps the elevated register
    suitable to the Epistle.
- source_word: ሥራሕነ
  chosen: our affliction
  alternatives:
  - our labor
  - our toil
  - our hardship
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR here is difficult and may reflect a noun connected with labor/trouble.
    Given the surrounding complaint language, 'affliction' best captures the experiential
    sense while remaining broad enough to cover hardship.
- source_word: ዳማ ጻመውነ
  chosen: we toiled hard
  alternatives:
  - we labored greatly
  - we wearied ourselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase intensifies the idea of exertion. 'Toiled hard' is idiomatic
    English that preserves the force of strenuous suffering.
- source_word: ወኵሎ ሥራኀ ርኢነ
  chosen: and we saw every trouble
  alternatives:
  - and we saw every labor
  - and we saw every affliction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The object likely denotes hardship/trouble rather than neutral 'work'
    in this lament context. 'Saw' is preserved literally, a common Semitic/Ethiopic
    way of expressing experience.
- source_word: እኩያተ ብዙኃተ ረከብነ
  chosen: and we encountered many evils
  alternatives:
  - and many misfortunes befell us
  - and we found many troubles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase combines 'evil/bad things' with 'many' and a verb of finding/meeting.
    'Encountered many evils' preserves the active experiential sense and the starkness
    of the complaint.
- source_word: ወተወጻዕነ
  chosen: and we were brought to ruin
  alternatives:
  - and we were destroyed
  - and we were crushed
  - and we were driven out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact nuance is uncertain from the OCR, but the context suggests
    severe diminishment or devastation. 'Brought to ruin' is strong without overstating
    final destruction.
- source_word: ወውኅድነ
  chosen: and made few
  alternatives:
  - and reduced
  - and diminished
  - and made small
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This likely conveys reduction in number or status. 'Made few' keeps the
    concrete apocalyptic lament flavor better than the more abstract 'diminished.'
- source_word: ወንእስት መንፈስነ
  chosen: and our spirit became small
  alternatives:
  - and our spirit was diminished
  - and our spirit grew weak
  - and our soul became little
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom is vivid and should not be flattened. 'Became small' preserves
    the metaphor of inward diminishment better than a generic psychological gloss.
