theological_decisions:
- issue: Whether the verse should be smoothed into a general statement of suffering
    or retain its stark judgment-lament rhetoric
  chosen_reading: Retain repeated ruin language ('destroyed' ... 'destroyed') and
    explicit hopelessness
  alternative_readings:
  - Condense the repetition into a single statement of affliction
  - Render more generally as poverty or misery
  rationale: The Epistle's rhetoric often intensifies suffering through repetition.
    Preserving this repetition keeps the apocalyptic lament force rather than reducing
    it to generic hardship.
  doctrine_reference: 'Translation philosophy: preserve significant repetition and
    do not flatten apocalyptic rhetoric.'
