translation:
  text: And we were destroyed, and there was no one to help us with a word; and we
    found nothing. We were tormented and destroyed, and we had no hope of seeing life
    from day to day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we perished' / 'we were brought to ruin' for the repeated verb rendered
      'we were destroyed.'
    reason: lexical_alternative
  - marker: b
    text: '''With a word'' likely means that no one came to their aid even by speech,
      plea, or advocacy.'
    reason: cultural_note
  - marker: c
    text: The clause 'and we found nothing' is textually and syntactically difficult;
      the sense may be 'nor did we obtain anything' or 'in no way did we find relief.'
    reason: textual_variant
lexical_decisions:
- source_word: ተሐጕልነ
  chosen: we were destroyed
  alternatives:
  - we perished
  - we were brought to ruin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears twice and carries a strong sense of ruin or destruction.
    'Destroyed' preserves the severity and repetition without softening it to mere
    hardship.
- source_word: አልቦ
  chosen: there was no one
  alternatives:
  - there was none
  - there was nothing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here it introduces the absence of a helper, so the personal sense 'no
    one' fits the following relative clause better than the impersonal 'nothing'.
- source_word: ዘይረድአነ
  chosen: to help us
  alternatives:
  - to assist us
  - to come to our aid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes giving aid or support. 'Help us' is clear modern English
    and matches the lament context.
- source_word: በነገር
  chosen: with a word
  alternatives:
  - by a word
  - in speech
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is retained fairly literally because the Ge'ez specifies even
    verbal help or advocacy was absent; this should not be flattened away.
- source_word: ወኢበምንትኒ ኢረከብነ
  chosen: and we found nothing
  alternatives:
  - nor did we obtain anything
  - and in no way did we find [relief]
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The wording is difficult, but the sense is that nothing was obtained
    or found. A concise rendering preserves the bleakness while avoiding over-interpretation.
- source_word: ተጸዐርነ
  chosen: we were tormented
  alternatives:
  - we were afflicted
  - we were oppressed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys being burdened, afflicted, or oppressed. 'Tormented'
    best fits the intensified lament alongside destruction, though the broader sense
    of affliction remains possible.
- source_word: ኢተስፈውነ
  chosen: we had no hope
  alternatives:
  - we did not hope
  - we could not hope
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The negative form expresses absence of hope rather than merely a failure
    to hope. This captures the despairing tone.
- source_word: ከመ ንርአይ ሕይወተ ዕለት እምዕለት
  chosen: of seeing life from day to day
  alternatives:
  - that we should see life day after day
  - to look upon life from one day to the next
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom points to continued life or survival into succeeding days.
    'Seeing life from day to day' preserves the imagery while remaining readable.
