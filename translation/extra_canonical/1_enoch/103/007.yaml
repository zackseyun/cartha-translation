translation:
  text: Know that they will bring your souls down to Sheol, and they will be wretched, and their tribulation will be great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your spirits.' The Ge'ez term can denote either souls or spirits.
    reason: lexical_alternative
  - marker: b
    text: Sheol is the realm of the dead in Jewish tradition; the text preserves that term rather than reducing it to 'grave.'
    reason: cultural_note
