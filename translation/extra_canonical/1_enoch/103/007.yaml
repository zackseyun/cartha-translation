lexical_decisions:
- source_word: ታእምርዎሙ
  chosen: Know them
  alternatives:
  - Recognize them
  - Take note of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plural from the verb 'to know/recognize.' 'Know them' preserves the direct force of the warning without over-interpreting whether the sense is cognitive recognition or moral discernment.
- source_word: ለሲኦል
  chosen: to Sheol
  alternatives:
  - to the underworld
  - to the grave
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez form reflects the proper name/concept Sheol. Retaining 'Sheol' preserves the apocalyptic and Second Temple Jewish register better than flattening it to 'grave' or generic 'underworld.'
- source_word: ያወርዶዎሙ
  chosen: he will bring ... down
  alternatives:
  - he will cast ... down
  - he will lead ... down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb clearly carries downward motion. 'Bring down' is a balanced rendering that preserves the descent imagery without overstating violence where the Ge'ez itself does not require 'cast down.'
- source_word: ለመናፍስቲክሙ
  chosen: your souls
  alternatives:
  - your spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መናፍስት can denote spirits/souls. In this judgment context with descent to Sheol, 'souls' better conveys the fate of the persons' inner life after death, while 'spirits' remains a viable alternative.
- source_word: እኩያተ
  chosen: evil
  alternatives:
  - wickedness
  - harm
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An adjective/substantive denoting what is evil or bad. Rendered simply as 'evil' to preserve the terse judgment formula.
- source_word: ምንዳቤሆሙ
  chosen: their recompense
  alternatives:
  - their repayment
  - their punishment
  - their reward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes requital or recompense and can be positive or negative by context. Because the surrounding clause is explicitly negative, 'recompense' preserves the formal sense of repayment without prematurely narrowing it to 'punishment' alone.
- source_word: ዐቢየ
  chosen: great indeed
  alternatives:
  - very great
  - great
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An emphatic adjective meaning great. 'Great indeed' preserves the climactic emphasis at the end of the verse.
