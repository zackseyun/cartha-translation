theological_decisions:
- issue: Anthropological term for postmortem existence
  chosen_reading: spirit
  alternative_readings:
  - soul
  - life-breath
  rationale: The verse speaks of continued existence, joy, and non-perishing after
    death. 'Spirit' best matches መንፈስ and preserves the text's own idiom without importing
    later doctrinal precision about the soul.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Divine title ለዐቢይ
  chosen_reading: the Great One
  alternative_readings:
  - the মহান/Great [God]
  - God
  rationale: The text uses an epithet, not an explicit generic noun for God. Retaining
    'the Great One' preserves Enochic diction and apocalyptic register.
  doctrine_reference: Original-language primacy over translation tradition.
