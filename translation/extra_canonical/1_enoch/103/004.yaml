translation:
  text: And your spirit will live—those of you whose death was in righteousness—and
    they will rejoice and be glad, and their spirits will not perish, and their remembrance
    will be before the face of the Great One for all the generations of the world.
    And now, do not fear their humiliation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you who died in righteousness.' The Ge'ez construction may directly
      address the righteous dead rather than appositionally describe 'your spirit.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'before the face of the Great One,' a standard presence formula
      in exalted or heavenly-court language.
    reason: cultural_note
  - marker: c
    text: Or 'do not fear their reproach/disgrace.' The final noun can denote humiliation
      or public shame.
    reason: lexical_alternative
lexical_decisions:
- source_word: የሐይዉ
  chosen: will live
  alternatives:
  - shall live
  - will have life
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future/livelying sense fits the consolatory promise to the righteous
    dead; 'will live' is direct and idiomatic.
- source_word: መንፈስክሙ
  chosen: your spirit
  alternatives:
  - your soul
  - your breath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መንፈስ commonly denotes spirit/breath; 'spirit' best preserves the anthropological
    and apocalyptic sense without overcommitting to later soul-language.
- source_word: ለእለ ሞትክሙ በጽድቅ
  chosen: those of you whose death was in righteousness
  alternatives:
  - you who died in righteousness
  - for those whose death was righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies the addressed group as people whose death occurred
    in a state or manner of righteousness. 'In righteousness' preserves the key term
    ጽድቅ without reducing it to mere innocence.
- source_word: በጽድቅ
  chosen: in righteousness
  alternatives:
  - righteously
  - in justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the noun-based theological term explicit and consistent with the
    project's preference for 'righteousness' where possible.
- source_word: ይትፌሥሑ
  chosen: they will rejoice
  alternatives:
  - they will exult
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard joy verb; 'rejoice' is elevated but readable.
- source_word: ይትሐሠዩ
  chosen: be glad
  alternatives:
  - be joyful
  - exult
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered distinctly from the previous joy verb to preserve the Hebrew-style/apocalyptic
    doubling rather than collapsing the repetition.
- source_word: ኢይትሐጐሉ መንፈሳቲሆሙ
  chosen: their spirits will not perish
  alternatives:
  - their spirits will not be destroyed
  - their spirits will not be brought to ruin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative future with their spirits as subject; 'perish' is concise and
    preserves eschatological force.
- source_word: ዝካሮሙ
  chosen: their remembrance
  alternatives:
  - their memory
  - their memorial
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Remembrance'' better conveys ongoing memorial presence before God
    than the more psychological ''memory.'''
- source_word: እምቅ ድመ ገጸ ለዐቢይ
  chosen: before the face of the Great One
  alternatives:
  - in the presence of the Great One
  - before the Great One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom 'before the face of' preserves the vivid courtly/apocalyptic
    imagery. 'The Great One' is retained as a divine epithet rather than generalized
    to 'God.'
- source_word: ለኵሉ ትውልደ ዓለም
  chosen: for all the generations of the world
  alternatives:
  - through all generations forever
  - for every generation of eternity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase likely expresses enduring remembrance across all ages. This
    rendering stays close to the Ge'ez while remaining intelligible.
- source_word: ኢትፍርህዎ ለኀሣሮሙ
  chosen: do not fear their humiliation
  alternatives:
  - do not fear their reproach
  - do not fear their disgrace
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኀሣር can denote humiliation, reproach, or disgrace. 'Humiliation' fits
    the context of the righteous suffering shame in the present age while awaiting
    vindication.
