translation:
  text: For every good thing and joy and glory has been prepared and written down
    for the spirits of those who died in righteousness; and much good will be given
    to you as the fruit of your labor, and your portion will abound beyond the portion
    of the living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recorded.' The wording may evoke a heavenly written register of the
      reward kept for the righteous dead.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the fruit of your labor.' The image preserves the idea of toil
      yielding a future harvest.
    reason: lexical_alternative
  - marker: c
    text: Or 'your share will exceed the share of the living.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the ground or explanation for the preceding encouragement;
    'for' preserves the connective force without over-specifying causation.
- source_word: ኵሉ ሠናይ
  chosen: every good thing
  alternatives:
  - all good
  - every blessing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A broad expression for all that is good; 'every good thing' keeps the
    concrete-yet-comprehensive sense better than the more interpretive 'blessing'.
- source_word: ፍሥሓ
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Joy'' is the most natural elevated English equivalent and fits the
    triad with ''good thing'' and ''glory''.'
- source_word: ክብር
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic reward contexts, 'glory' preserves the weight and radiance
    of the term better than the flatter 'honor'.
- source_word: ተደለወ
  chosen: has been prepared
  alternatives:
  - has been made ready
  - has been appointed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive sense points to something made ready beforehand for the righteous
    dead; 'prepared' is idiomatic and preserves eschatological expectancy.
- source_word: ተጽሕፈ
  chosen: written down
  alternatives:
  - written
  - recorded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive likely evokes heavenly inscription or record. 'Written down'
    keeps that concrete image without over-interpreting the exact register.
- source_word: ለመንፈሳቲሆሙ
  chosen: for the spirits of them
  alternatives:
  - for their spirits
  - for their souls
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The referent is the disembodied dead. The main translation smooths to
    'for the spirits of those...' while preserving 'spirits' rather than 'souls,'
    which would import a different anthropological nuance.
- source_word: ለእለ ሞቱ በጽድቅ
  chosen: of those who died in righteousness
  alternatives:
  - of those who died righteously
  - of those who died in justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''In righteousness'' preserves the noun-based moral sphere and aligns
    with the project''s default handling of righteousness language.'
- source_word: ይትወሀብ ለክሙ
  chosen: will be given to you
  alternatives:
  - shall be granted to you
  - will be bestowed on you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward future passive fits the promise context and remains
    readable.
- source_word: ተክለ ጻማክሙ
  chosen: as the fruit of your labor
  alternatives:
  - the produce of your toil
  - the reward of your labor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ተክለ literally suggests growth/produce/fruit, while ጻማ denotes toil or
    labor. 'Fruit of your labor' preserves the agricultural metaphor and avoids collapsing
    it too quickly into abstract 'reward'.
- source_word: ክፍልክሙ
  chosen: your portion
  alternatives:
  - your share
  - your allotment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Portion'' is elevated, biblical, and apt for inheritance/reward language.'
- source_word: ፈድፋደ እምክፍለ ሕያዋን
  chosen: will abound beyond the portion of the living
  alternatives:
  - will exceed the share of the living
  - will be greater than the lot of the living
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparative sense is that the righteous dead receive a portion surpassing
    that of those presently alive. 'Abound beyond' preserves both excess and eschatological
    fullness.
