theological_decisions:
- issue: 'Anthropological term for the dead: ''spirits'' or ''souls'''
  chosen_reading: spirits
  alternative_readings:
  - souls
  rationale: The Ge'ez term points most directly to 'spirits.' Using 'souls' would
    sound more familiar in English but risks importing later theological assumptions
    not required by the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Meaning of the written record
  chosen_reading: written down
  alternative_readings:
  - recorded in heaven
  - inscribed in the heavenly books
  rationale: The verse likely alludes to heavenly record books, but the Ge'ez here
    only states that it has been written. The translation keeps the image explicit
    without expanding it into a fuller interpretive paraphrase.
  doctrine_reference: Do not paraphrase beyond what the witness warrants.
