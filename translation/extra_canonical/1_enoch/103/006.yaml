translation:
  text: And now they have died in prosperity and in wealth and they did not see distress and slaughter in their lifetime; and they died in honor, and judgment was not executed against them in their lifetime.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'good things' for 'prosperity.' The Ge'ez term can denote what is good or favorable more broadly.
    reason: lexical_alternative
  - marker: b
    text: The line emphasizes that no judgment was carried out against them during their earthly life, not that final judgment is denied.
    reason: alternative_reading
  - marker: c
    text: Or 'and in distress, and they have seen slaughter'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሠናይ
  chosen: prosperity
  alternatives:
  - good things
  - well-being
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context with wealth and honor, the term points not merely to moral 'good' but to favorable circumstances or well-being.
- source_word: ብዕል
  chosen: wealth
  alternatives:
  - riches
  - abundance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The collocation with prosperity suggests material plenty; 'wealth' is clear modern English without overstating.
- source_word: ምንዳቤ
  chosen: distress
  alternatives:
  - trouble
  - affliction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word appears to denote hardship or affliction. 'Distress' preserves the tension of dying amid outward success yet under trouble.
- source_word: ቀትለ
  chosen: slaughter
  alternatives:
  - killing
  - violent death
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A stronger term than generic 'death' fits the apocalyptic and judicial tone; 'slaughter' preserves the violence of the noun.
- source_word: ስብሐት
  chosen: honor
  alternatives:
  - glory
  - splendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here the sense is social esteem or an honored condition at death rather than divine glory; 'honor' is the most natural fit.
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - sentence
  - punishment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse stresses that no judicial reckoning befell them during earthly life. 'Judgment' preserves that broader forensic sense.
- source_word: ኢትገብረ ሎሙ
  chosen: was not executed against them
  alternatives:
  - was not done to them
  - did not come upon them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive English idiom brings out the sense that judgment was not carried out upon them, not merely absent as an abstract idea.
