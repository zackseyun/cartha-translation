theological_decisions:
- issue: Whether the verse implies the wicked escaped all judgment or only earthly judgment
  chosen_reading: The text denies judgment in their lifetime, not ultimate judgment.
  alternative_readings:
  - No judgment ever came upon them
  - The line is only a complaint about apparent injustice
  rationale: The explicit repetition of 'in their lifetime' limits the statement to present earthly experience, fitting the chapter's contrast between apparent prosperity now and later reckoning.
  doctrine_reference: Preserve theological tension rather than resolve it
