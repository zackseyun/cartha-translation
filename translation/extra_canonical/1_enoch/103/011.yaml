theological_decisions:
- issue: Whether to preserve the 'head/tail' reversal as a concrete image or interpret
    it socially
  chosen_reading: 'Preserve the concrete idiom: ''the head ... the tail'''
  alternative_readings:
  - chief ... least
  - leaders ... followers
  rationale: The verse laments covenant-like reversal and humiliation through a vivid
    body-image idiom. Preserving the image maintains the apocalyptic-poetic force
    and avoids flattening it into sociological prose.
  doctrine_reference: Translation philosophy §Original-language primacy; preserve
    imagery
- issue: How to render the oppression image at the end
  chosen_reading: '''they laid their yoke heavily upon us'''
  alternative_readings:
  - they oppressed us greatly
  - they burdened us
  rationale: The yoke image is theologically and rhetorically significant in Jewish
    oppression language. It should remain visible in the English rather than being
    reduced to an abstract statement of suffering.
  doctrine_reference: 'Book context: do not flatten apocalyptic or judgment imagery'
