translation:
  text: We hoped to become the head, and we became the tail; we toiled, but we did
    not gain mastery over our labor; and we became food for sinners and for the lawless,
    and they laid their yoke heavily upon us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we labored, but it did not come about,' or 'we labored, but it was not
      accomplished.' The middle clause is textually and syntactically difficult in
      the Ethiopic witness.
    reason: lexical_alternative
  - marker: b
    text: '''Food'' is a concrete metaphor; the sense is that they became prey to
      sinners and the lawless.'
    reason: lexical_alternative
  - marker: c
    text: Or 'we toiled, and it was not done for us, and we did not gain mastery over
      our wealth'.
    reason: previous_rendering
lexical_decisions:
- source_word: ንሴፎ
  chosen: we hoped
  alternatives:
  - we expected
  - we desired
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form introduces the community's expectation or aspiration. 'We hoped'
    fits the lament context better than the flatter 'we expected.'
- source_word: ንኩን ርእሰ
  chosen: to become the head
  alternatives:
  - to be the head
  - to become chief
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ርእሰ literally 'head.' The idiom contrasts with 'tail' and should be preserved
    rather than generalized to 'leaders.'
- source_word: ወኮነ ዘነበ
  chosen: and we became the tail
  alternatives:
  - and we became what is behind
  - and we became the last
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is best taken as the antithetical counterpart to 'head.' Preserving
    the concrete image keeps the proverbial reversal intact.
- source_word: ጻመውነ
  chosen: we toiled
  alternatives:
  - we labored
  - we worked hard
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A strong labor term suits the oppression-lament. 'Toiled' preserves hardship
    more vividly than the neutral 'worked.'
- source_word: እንዘ ንትጌበር
  chosen: and it was not done for us
  alternatives:
  - yet we did not accomplish it
  - and we were not dealt with
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is difficult. This rendering keeps the passive sense suggested
    by the Ge'ez while signaling frustrated effort without over-paraphrasing.
- source_word: ወኢሠለጥነ ዲበ ዳማነ
  chosen: and we did not gain mastery over our wealth
  alternatives:
  - and we did not rule over our possessions
  - and we had no power over our goods
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሠለጠ denotes having power or dominion. ዳማነ is taken as property/wealth.
    The line laments inability to control the fruit of one's labor.
- source_word: መብልዕተ
  chosen: food
  alternatives:
  - prey
  - something to be devoured
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'food.' Although metaphorical, the concrete image should remain
    in the main text; 'prey' is interpretive and therefore left as an alternative.
- source_word: ለኃጥኣን ወለዓማፅያን
  chosen: for sinners and for the lawless
  alternatives:
  - for sinners and for wrongdoers
  - for the sinful and the violent
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pair marks morally corrupt oppressors. 'Lawless' preserves the sharper
    ethical force of the second term better than the generic 'wrongdoers.'
- source_word: አክበዱ ላዕሌነ አርዑተ ዚአሆሙ
  chosen: they laid their yoke heavily upon us
  alternatives:
  - they made their yoke heavy upon us
  - they burdened us with their yoke
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The image is one of oppressive domination. 'Yoke' should be retained
    as a concrete oppression metaphor, and 'heavily' reflects the verbal force of
    making burdens weighty.
