  category: mistranslation
  tier: 3
  from: we toiled, and it was not done for us, and we did not gain mastery over our
    wealth
  to: we toiled as we labored, and we did not gain mastery over the fruit of our labor
  rationale: 'The Ge''ez phrase is እንዘ ንትጌበር (ʾǝnza nǝtgebar). The conjunction እንዘ
    means ''while'' or ''as'', and there is no negative particle here. The verb ንትጌበር
    is the 1st person plural imperfect of ተጌበረ (''to work, labor''), not a 3rd person
    passive. The draft invents a negative and a passive construction that are entirely
    absent from the source text. Additionally, ዳማነ (dāmana) refers to ''our labor''
    or ''the wages/fruit of our labor'', which fits the context of toiling better
    than the generic ''wealth''. | Adjudicator: The reviewer is entirely correct.
    The Ge''ez text reads `ጻመውነ፡ እንዘ፡ ንትጌበር` (ṣamawna ʾǝnza nǝtgebar), which translates
    literally to ''we toiled while we labored''. The current rendering inexplicably
    intro'
