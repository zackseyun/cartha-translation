translation:
  text: Woe to you, sinners, when you die in your sins, and those like you say about
    you, ‘Blessed are these sinners; they have seen all their days.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez clause rendered 'in your sins' is difficult in the OCR witness;
      the sense is that the sinners die in connection with their sinfulness.
    reason: textual_variant
  - marker: b
    text: Or 'they have lived to see all their days,' that is, they are judged fortunate
      because they seemed to enjoy a full span of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  - Ah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a denunciation formula. 'Woe' best preserves the prophetic/judgment
    force in apocalyptic context; 'alas' would sound more like lament than judicial
    pronouncement.
- source_word: ለክሙ
  chosen: to you
  alternatives:
  - for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard dative with interjection; English idiom after 'woe' is 'to you.'
- source_word: ምውታን
  chosen: when you die
  alternatives:
  - the dead
  - dying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though formally related to 'dead/death,' the immediate clause with ሶበ
    and ትመውቱ points to the event of dying rather than a nominal address to 'dead ones.'
    Rendering the temporal sense avoids awkward duplication while staying close to
    the syntax.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - sinful ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common moral designation in this section; 'sinners' is the natural and
    consistent English equivalent.
- source_word: ሶበ ትመውቱ
  chosen: when you die
  alternatives:
  - if you die
  - at the time you die
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal clause; 'when you die' is clear and preserves the warning's
    immediacy.
- source_word: በብዕሲ ኃጢአትክሙ
  chosen: in your sins
  alternatives:
  - in the multitude of your sins
  - in the matter of your sinfulness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is textually difficult in the OCR, but the sense is that death
    occurs in connection with their sin. 'In your sins' is concise, idiomatic, and
    preserves the moral state without over-specifying a doubtful noun reading.
- source_word: ወይብሉ ዲቤክሙ
  chosen: and ... say about you
  alternatives:
  - and say over you
  - and say concerning you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition indicates speech concerning the dead sinners. 'About
    you' is natural English and keeps the referential force.
- source_word: እለ ከማክሙ
  chosen: those like you
  alternatives:
  - those who are as you are
  - your kind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to people of the same class or character. 'Those like you' is
    readable and preserves the comparative force.
- source_word: ብፁዓን እሙንቱ
  chosen: Blessed are these
  alternatives:
  - These are blessed
  - Happy are these
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A beatitude-like exclamation placed in the mouths of the wicked. 'Blessed'
    preserves the elevated register and ironic moral inversion.
- source_word: ኵሎ መዋዕሎሙ ርእዩ
  chosen: they have seen all their days
  alternatives:
  - they have seen out all their days
  - they have lived to see all their days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely means they experienced a full span of life/prosperity. The literal
    'seen all their days' preserves the idiom and the ironic worldly valuation better
    than a paraphrase like 'lived long lives.'
