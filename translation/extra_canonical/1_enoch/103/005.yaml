theological_decisions:
- issue: How to render the wicked speakers' verdict on the dead sinners
  chosen_reading: 'An ironic beatitude: ''Blessed are these sinners; they have seen
    all their days.'''
  alternative_readings:
  - A straightforward commendation of long life/prosperity
  - A funerary saying that they died peacefully
  rationale: The verse contrasts divine woe with human misjudgment. Preserving the
    ironic 'Blessed' keeps the Epistle's theme that sinners wrongly assess prosperity
    as true blessedness.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten judgment rhetoric.
