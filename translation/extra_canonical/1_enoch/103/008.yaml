theological_decisions:
- issue: Meaning of 'your spirits' in a judgment context
  chosen_reading: Retain 'your spirits' rather than interpret as a full anthropological statement about the afterlife.
  alternative_readings:
  - your souls
  - you yourselves
  rationale: The verse specifically names the spirits entering punitive darkness, nets, and fire. The translation preserves the text's wording without resolving broader questions about body, soul, or intermediate state.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of ኵነኔ
  chosen_reading: Render as 'judgment' rather than 'condemnation.'
  alternative_readings:
  - condemnation
  - sentence
  rationale: The context is punitive, but 'judgment' better preserves the judicial breadth of the term and avoids importing a narrower doctrinal conclusion than the Ge'ez requires.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.
