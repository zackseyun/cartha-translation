translation:
  text: And into darkness and into a net and into a blazing fire your spirit shall enter, into the great judgment; and the great judgment shall be for all the generations of eternity. Woe to you, for you have no peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into snares' for 'into nets'; the Ge'ez term evokes trapping imagery and may be metaphorical for inescapable judgment.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'for all the generations of eternity' is difficult but likely emphasizes the enduring scope and memory of this judgment rather than merely a momentary sentence.
    reason: cultural_note
  - marker: c
    text: Some translators take 'to the great judgment' instead of 'for the great judgment.' The Ge'ez preposition can be understood directionally.
    reason: alternative_reading
  - marker: d
    text: Or 'into nets and into a blazing fire your spirits'.
    reason: previous_rendering
  - marker: e
    text: Or 'shall enter, for the great judgment'.
    reason: previous_rendering
lexical_decisions:
- source_word: በጽልመት
  chosen: into darkness
  alternatives:
  - in darkness
  - into the darkness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With በ used in a directional sequence after the verb of entering, English 'into darkness' best conveys movement into a realm or condition rather than mere location.
- source_word: በመርበብት
  chosen: into nets
  alternatives:
  - into snares
  - into meshes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The image is concrete and apocalyptic; 'nets' preserves the plural trapping imagery without over-interpreting it as a metaphorical 'snares.'
- source_word: በላህብ ዘይነድድ
  chosen: into a blazing fire
  alternatives:
  - into burning flame
  - into a fire that burns
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase combines a noun for flame/fire with a relative verb 'that burns.' 'A blazing fire' is idiomatic English that preserves the intensified fiery judgment image.
- source_word: ኀበ ኵነኔ ዐባይ
  chosen: for the great judgment
  alternatives:
  - to the great judgment
  - unto the great judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can indicate direction toward or relation to. Given the sentence flow, the spirits enter these punitive realms in relation to the coming judgment; 'for the great judgment' reads naturally while preserving the judicial sense.
- source_word: ትበውእ መንፈስክሙ
  chosen: your spirits shall enter
  alternatives:
  - your spirit shall enter
  - your souls shall enter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural possessive favors 'your spirits.' 'Enter' is the plain sense of the verb and keeps the vivid movement into punishment.
- source_word: ኵነኔ ዐባይ
  chosen: the great judgment
  alternatives:
  - the great condemnation
  - the great sentence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A judicial term is required. 'Judgment' preserves both verdict and punitive process, fitting Enochic eschatological usage better than the narrower 'condemnation.'
- source_word: ለኵሉ ትውልደ ዓለም
  chosen: for all the generations of eternity
  alternatives:
  - for all the generations forever
  - for all eternal generations
  - for all generations of the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is solemn and expansive. 'Generations of eternity' preserves the apocalyptic register and avoids flattening it into a simple adverb like 'forever.'
- source_word: ኴሌ ለክሙ
  chosen: Woe to you
  alternatives:
  - Alas for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard prophetic/apocalyptic denunciation formula and should remain forceful and recognizable.
- source_word: እስመ አልብክሙ ሰላመ
  chosen: for you have no peace
  alternatives:
  - because there is no peace for you
  - for peace is not yours
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause states deprivation of peace as the reason for the woe. 'You have no peace' is direct, readable, and preserves the finality of the pronouncement.
