theological_decisions:
- issue: Identity of 'the holy ones'
  chosen_reading: render as 'the holy ones' without specifying 'angels'
  alternative_readings:
  - the angels
  - the saints
  - the holy writing
  rationale: In Enochic literature, 'holy ones' often refers to heavenly beings, but
    the immediate phrase is textually difficult. Leaving the expression as 'holy ones'
    preserves the source's ambiguity and avoids importing a narrower interpretation
    than the Ge'ez requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
