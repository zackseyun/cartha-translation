translation:
  text: For I know the mystery, and I have read the tablets of heaven, and I have
    seen the writing of the holy ones, and I found written in them and understood
    concerning them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy writing.' The Ge'ez phrase is difficult, and the exact relation
      between 'writing' and 'holy ones' is uncertain.
    reason: lexical_alternative
  - marker: b
    text: '''Tablets of heaven'' is an apocalyptic image for heavenly records or decrees,
      not necessarily physical tablets in a literalistic sense.'
    reason: cultural_note
lexical_decisions:
- source_word: ምሥጢረ
  chosen: the mystery
  alternatives:
  - the secret
  - the hidden thing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ge'ez ምሥጢር commonly denotes a secret or mystery, often in revelatory/apocalyptic
    contexts. 'Mystery' preserves the elevated apocalyptic register and the sense
    of disclosed hidden knowledge.
- source_word: አንበብኩ
  chosen: I have read
  alternatives:
  - I read
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The perfect-like narrative sequence suits an English present perfect
    here, matching the speaker's claim to acquired revelatory knowledge.
- source_word: ፀፍፀፈ ሰማይ
  chosen: the tablets of heaven
  alternatives:
  - the books of heaven
  - the writings of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This expression in Enochic literature refers to heavenly written records.
    'Tablets' preserves the concrete ancient image better than the more generic 'books'
    or 'writings'.
- source_word: ጽሕፈተ ቅድስተ
  chosen: the writing of the holy ones
  alternatives:
  - the writing of the holy [things]
  - the holy writing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construct is difficult, but the following plural pronominal reference
    ('in them') favors understanding a written record associated with holy beings
    rather than an abstract 'holy writing.' 'Holy ones' fits Enochic usage for heavenly
    beings without over-specifying angels in the main text.
- source_word: ውስቴቶሙ
  chosen: in them
  alternatives:
  - within them
  - among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward locative sense best fits the clause 'I found written
    in them.'
- source_word: አኩዐ
  chosen: understood
  alternatives:
  - perceived
  - knew
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to indicate grasping or comprehending what was found
    in the writings. 'Understood' makes explicit the movement from reading to comprehension
    without adding interpretive content.
- source_word: በእንቲአሆሙ
  chosen: concerning them
  alternatives:
  - about them
  - regarding them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This prepositional phrase most naturally means 'concerning them' or 'about
    them.' 'Concerning' keeps the elevated register.
