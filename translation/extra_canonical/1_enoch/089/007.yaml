    text: The Ethiopic text is difficult in the phrase rendered 'from those shelters.' The underlying word may refer more specifically to coverings, a roofed structure, or possibly nests.
    reason: lexical_alternative
  - marker: b
    text: The wording around 'the lofty roof was removed' is uncertain because the surviving Ethiopic OCR is difficult; the sense is that an elevated covering or structure disappeared or was taken away.
    reason: textual_variant
  - marker: c
