- source_word: እስክ ሰሰሉ
  chosen: until ... flew away
  alternatives:
  - until ... departed
  - until ... were dispersed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction marks what Enoch continued seeing up to a climactic action. 'Flew away' fits the avian imagery better than a generic 'departed.'
- source_word: ኵሉ አዕራብት
  chosen: all the ravens
  alternatives:
  - all the crows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, bird species are symbolically significant. 'Ravens' is the more traditional and likely specific identification, preferable to the broader 'crows.'
- source_word: እምዝኩ ናሕስ
  chosen: from those shelters
  alternatives:
  - from that roof
  - from those coverings
  - from those nests
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR is difficult here. The phrase appears to denote some protective or elevated structure associated with the birds. 'Shelters' is a cautious rendering broad enough to fit the context without overcommitting to a more specific architectural term.
- source_word: ልዑል
  chosen: lofty
  alternatives:
  - high
  - elevated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys height with a slightly elevated register suitable to visionary prose.
- source_word: ወንቅዐተ
  chosen: was removed
  alternatives:
  - was torn away
  - collapsed
  - was cast down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form suggests a forceful change affecting the structure. 'Was removed' is cautious in light of the uncertain OCR while still conveying loss of the covering.
- source_word: ምድር ዐረዩ
  chosen: the fissures of the earth were laid bare
  alternatives:
  - the clefts of the earth appeared
  - the rents of the earth were seen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the earth-opening imagery without flattening it. 'Laid bare' reflects revelation/exposure in a vision.
- source_word: መዓምቃት ካልአት ተፈትሑ
  chosen: other abysses were opened
  alternatives:
  - other depths were opened
  - other deep places were opened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Abyss language is important in apocalyptic contexts and should be preserved rather than generalized to 'holes' or 'pits.'
