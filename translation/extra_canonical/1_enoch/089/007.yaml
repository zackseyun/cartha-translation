  from: until all the ravens flew away from those shelters, and the lofty roof was removed, and the fissures of the earth were laid bare
  to: until all the streams withdrew from that lofty roof, and the fissures of the earth were leveled
  rationale: 'Cascading errors from OCR and misparsing. `አዕራብት` is an OCR error for `አስራብ` (streams/cataracts, cf. 89:2); the context is the Flood receding, not birds. `እምዝኩ ናሕስ ልዑል` simply means ''from that lofty roof'' (no ''shelters''). The draft misidentifies the noun `ንቅዐተ` (fissures/springs) as a verb ''was removed'', and mistranslates `ዐረዩ` (from `ዐረየ`, to be level/equal) as ''were laid bare''. | Adjudicator: The reviewer correctly identifies a cascading series of errors stemming from an OCR mistake and subsequent misparsing. The context is the receding of the Flood in the Animal Apocalypse. The Ge''ez word'
