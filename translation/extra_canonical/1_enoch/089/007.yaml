theological_decisions:
- issue: Apocalyptic topography of judgment
  chosen_reading: Render the earth imagery concretely as exposed fissures and opened abysses
  alternative_readings:
  - Generalize to 'the ground broke open'
  - Interpret as merely architectural ruin
  rationale: The Animal Apocalypse uses vivid symbolic and cosmic imagery. Preserving exposed earth and opened abysses maintains the visionary force and possible judgment resonance without over-interpreting the symbolism.
