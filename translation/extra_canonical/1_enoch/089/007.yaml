lexical_decisions:
- source_word: ወካዕበ
  chosen: And again
  alternatives:
  - And then again
  - Again
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Narrative resumptive formula introducing a further scene in the vision; 'And again' preserves the repetitive visionary cadence.
- source_word: ርኢኩ በራእይ
  chosen: I saw in the vision
  alternatives:
  - I saw in a vision
  - I looked in the vision
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
