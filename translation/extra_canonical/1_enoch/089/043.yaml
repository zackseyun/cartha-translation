- source_word: ሐራዊያ ገዳም
  chosen: the wild boars
  alternatives:
  - the wild swine
  - the boars of the wilderness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes wild swine/boars of the open country. 'Wild boars'
