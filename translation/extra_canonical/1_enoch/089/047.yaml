theological_decisions:
- issue: Retention of animal symbolism in a politically charged apocalyptic scene
  chosen_reading: Keep the figures as 'boar' and 'dogs' rather than interpret them as historical actors in the translation.
  alternative_readings:
  - Interpret the animals directly as rulers or nations in the main text
  rationale: The Dream Visions communicate through sustained symbolic animal imagery. The translation should preserve the vision's own rhetoric and leave historical identification to notes or commentary, not collapse symbol into interpretation.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten into generic prose.'
