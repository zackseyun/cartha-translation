translation:
  text: And the first ram pursued that later ram, and that later ram rose up and fled from before his face; and I saw until those dogs brought down the first ram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'fled from before his face,' a Semitic-style expression for retreating before someone.
    reason: lexical_alternative
  - marker: b
    text: The term rendered 'later boar' could also be translated 'last boar' or 'following boar'; the Ge'ez marks sequence in contrast to the 'first boar.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And the first boar pursued that later boar, and that later boar rose up and fled from before his face; and I saw until those dogs brought down the first boar.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሐርጌ
  chosen: boar
  alternatives:
  - swine
  - pig
  lexicon: Dillmann
  rationale: In the Animal Apocalypse the animal imagery is specific and should be preserved. 'Boar' fits a wild male pig better than the broader 'pig' or 'swine,' and keeps the force of the symbolic animal figure.
- source_word: ቀዳማዊ
  chosen: first
  alternatives:
  - former
  - earlier
  lexicon: Dillmann
  rationale: The term marks sequence between two boars in the vision. 'First' is the most direct and readable rendering.
- source_word: ዳሓራዊ / ዳሕራዊ
  chosen: later
  alternatives:
  - last
  - second
  - following
  lexicon: Dillmann
  rationale: The word contrasts with 'first' and identifies the subsequent boar. 'Later' preserves sequence without overcommitting to 'last' if more than two figures are in view.
- source_word: ሰደዶ
  chosen: pursued
  alternatives:
  - chased
  - drove away
  lexicon: Dillmann
  rationale: The verb conveys active pursuit. 'Pursued' is vivid but not overly colloquial, fitting apocalyptic narrative style.
- source_word: ተንሥአ
  chosen: rose up
  alternatives:
  - arose
  - stood up
  lexicon: Dillmann
  rationale: The verb often means 'arise' or 'stand up.' Here 'rose up' preserves the narrative movement before the flight.
- source_word: ነፍጸ
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: Dillmann
  rationale: The context is retreat before an aggressor. 'Fled' is concise and elevated.
- source_word: እምቅድመ ገጹ
  chosen: from before his face
  alternatives:
  - from before him
  - from his presence
  lexicon: Dillmann
  rationale: Literally the phrase is 'from before his face.' In the main text I slightly smooth it to 'from before his face'/'before him' sense while retaining the vivid Semitic-style expression.
- source_word: አክላብ
  chosen: dogs
  alternatives:
  - hounds
  lexicon: Dillmann
  rationale: The plural noun plainly denotes dogs. 'Dogs' is preferred over 'hounds' unless the text specifically signals hunting dogs.
- source_word: አውደቅዎ
  chosen: brought down
  alternatives:
  - cast down
  - struck down
  - caused to fall
  lexicon: Dillmann
  rationale: The verb indicates causing to fall. 'Brought down' works naturally in English for animals overpowering another animal while preserving the violent imagery.
