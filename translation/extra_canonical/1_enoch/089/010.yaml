  rationale: Straightforward zoological term in the sequence.
- source_word: አጽባዕት
  chosen: hyenas
  alternatives:
  - jackals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact species can be debated in Semitic/Ethiopic animal terminology. 'Hyenas' is retained as a plausible traditional identification, with the alternative noted because scavenger-canid imagery is also possible.
- source_word: ሐራዊ ገዳም
  chosen: wild boars
  alternatives:
  - boars of the wild
  - wild swine
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The compound points to a wild pig/boar rather than a generic wild creature. 'Wild boars' is idiomatic and concrete.
- source_word: ቂናጽል
  chosen: foxes
  alternatives:
  - jackals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact identification is uncertain. 'Foxes' is a cautious main-text choice, but a canid reading remains possible and is preserved in a footnote.
- source_word: ገሐያት
  chosen: squirrels
  alternatives:
