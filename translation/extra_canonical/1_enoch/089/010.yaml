theological_decisions:
- issue: Symbolic force of the animal list as representing peoples/nations
  chosen_reading: 'Render the collective phrase with explicit national language: ''every kindred of the nations'''
  alternative_readings:
  - every species
  - every sort of animals
  rationale: The verse is not merely zoological; within the Animal Apocalypse the creatures symbolize human groups. The Ge'ez includes አሕዛብ ('nations/peoples'), so the translation should preserve that political-ethnic dimension rather than reduce the line to natural history.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
