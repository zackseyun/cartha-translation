lexical_decisions:
- source_word: አሐዙ ይለዱ
  chosen: they began to bring forth
  alternatives:
  - they bore
  - they gave birth to
  - they produced
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The compound verbal idea marks inception plus begetting/bearing. 'Began to bring forth' preserves the narrative onset and the generative sense without over-specifying biological maternity for the mixed symbolic animals.
- source_word: አራዊተ ገዳም
  chosen: the beasts of the field
  alternatives:
  - wild beasts
  - beasts of the wilderness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard biblical-style expression suits the animal-apocalypse register. 'Field' is retained rather than flattened to 'wild animals,' preserving the elevated visionary diction.
- source_word: አዕዋፈ
  chosen: the birds
  alternatives:
  - the birds of heaven
  - flying creatures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The simple term is sufficient here; adding 'of heaven' would go beyond the supplied witness.
- source_word: እምኔሆሙ
  chosen: from among them there came forth
  alternatives:
  - from them came
  - out of them arose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks emergence from the previously mentioned creatures. 'There came forth' preserves the visionary narrative tone.
- source_word: ዘእምኵሉ ኅብር አሕዛብ
  chosen: every kindred of the nations
  alternatives:
  - every species of the nations
  - every class of the Gentiles
  - every sort of peoples
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The wording is difficult, but it appears to classify the ensuing animals as symbolic groupings corresponding to nations/peoples. 'Kindred of the nations' keeps the collective-political nuance without forcing a technical ethnographic term.
- source_word: አናብስት
  chosen: lions
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common animal term; straightforward in the allegorical list.
