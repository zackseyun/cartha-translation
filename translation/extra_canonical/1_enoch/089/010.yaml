  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A bird of prey is intended; 'falcons' keeps the list vivid while acknowledging that 'hawks' is also possible.
- source_word: አንሰርት
  chosen: vultures
  alternatives:
  - eagles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term may overlap with large carrion birds or raptors more broadly. 'Vultures' fits the predatory-scavenging sequence, but the identification is not certain.
- source_word: ሆባይ
  chosen: kites
  alternatives:
