  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This item is textually and lexically uncertain. I retain a tentative concrete animal in the main text while flagging uncertainty, since the list appears to move through recognizable species.
- source_word: ሐንዘር
  chosen: swine
  alternatives:
