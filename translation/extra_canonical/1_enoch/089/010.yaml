  text: 'And they began to bring forth the beasts of the field and the birds; and from among them there came forth every kindred of the nations: lions, leopards, wolves, dogs, hyenas, wild boars, foxes, And they began to bring forth the beasts of the field and the birds; and from among them there came forth every kindred of the nations: lions, leopards, wolves, dogs, hyenas, wild boars, foxes, hares, swine, falcons, vultures, kites, eagles, and ravens; and in their midst a white bull was born., swine, falcons, vultures, kites, eagles, and ravens; and in their midst a white bull was born.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'every kindred of the nations' is difficult. It may also be understood more generally as 'every sort' or 'every class,' but the word for 'nations/peoples' is present in the Ge'ez witness.
    reason: lexical_alternative
  - marker: b
    text: Several animal names in this verse are uncertain in exact species identification; alternatives include jackals for 'hyenas' or 'foxes,' hawks for 'falcons,' and crows for 'ravens.'
