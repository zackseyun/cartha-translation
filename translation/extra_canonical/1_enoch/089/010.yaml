- source_word: ተወልዱ ማእከሎሙ ላህም ጸዓዳ
  chosen: in their midst a white bull was born
  alternatives:
  - among them a white ox was born
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular birth is central to the allegory. 'Bull' is preferred over 'ox' because the animal symbolism in this apocalypse often distinguishes sex and strength, and 'white' should remain explicit.
