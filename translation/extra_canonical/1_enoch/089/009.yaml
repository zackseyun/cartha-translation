lexical_decisions:
- source_word: ላህም
  chosen: bull
  alternatives:
  - ox
  - cattle-beast
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, the recurring animal symbol here is the male bovine figure representing a patriarchal/human agent. 'Bull' preserves the specific imagery better than the broader 'ox' or generic 'cattle-beast'.
- source_word: ጸዐዳ
  chosen: white
  alternatives:
  - bright
  - fair
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes whiteness/color, important in the symbolic scheme of the vision. 'White' is the plain and consistent rendering.
- source_word: ዘኮነ ብእሴ
  chosen: which had become a man
  alternatives:
  - which became a man
  - that turned into a man
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative construction plus verb of becoming indicates transformation. 'Had become' fits the narrative sequence and preserves the visionary metamorphosis without colloquializing it.
- source_word: ወጽአ እምዝኩ መስቀር
  chosen: went out from there
  alternatives:
  - came forth from that enclosure
  - went out from that place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form of the final noun is difficult, but the clause clearly indicates departure from a location. 'From there' is a cautious rendering that avoids overclaiming a specific topographical term where the witness is uncertain.
- source_word: ፪አልህምት
  chosen: three bulls
  alternatives:
  - three cattle-beasts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral plus repeated bovine noun indicates three additional bull figures accompanying him. Retaining 'bulls' preserves the symbolic continuity of the passage.
- source_word: ይመስሎ ለዝኩ ላህም
  chosen: was like that white bull
  alternatives:
  - resembled that white bull
  - looked like that white bull
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb expresses resemblance. 'Was like' is simple, readable, and preserves the comparison without overinterpreting whether likeness is physical, moral, or symbolic.
- source_word: ቀይሕ ከመ ደም
  chosen: red like blood
  alternatives:
  - ruddy as blood
  - blood-red
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The simile is explicit in the Ge'ez. 'Red like blood' preserves the vivid apocalyptic comparison more transparently than the compressed adjective 'blood-red'.
- source_word: ጸሊም
  chosen: black
  alternatives:
  - dark
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic color term should be rendered directly. 'Black' preserves the stark symbolic contrast among the three bulls.
- source_word: ኀለፈ እምኔሆሙ
  chosen: departed from among them
  alternatives:
  - passed away from among them
  - went on from them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can denote passing on or departing. In this narrative setting, 'departed from among them' best captures separation from the three bulls without implying death.
