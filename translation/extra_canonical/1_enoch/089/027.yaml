translation:
  text: And I saw until all the wolves that pursued those sheep perished and were drowned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic wording is difficult at the end of the verse. The sense is that the beasts who had turned away from the sheep were engulfed or swallowed up in judgment.
    reason: textual_variant
  - marker: b
    text: Or 'all the beasts that had turned away from those sheep were swallowed up.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - And I looked
  - And I kept seeing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard visionary narrative opening; simple past fits the sequence while preserving the first-person apocalyptic report.
- source_word: እስከ
  chosen: until
  alternatives:
  - as far as
  - up to the point that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'In Dream Visions this particle commonly marks the continuation of the vision up to a resulting event: ''I saw until ...''.'
- source_word: ተሐጕሉ
  chosen: were swallowed up
  alternatives:
  - were engulfed
  - perished
  - were consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests being swallowed or engulfed rather than merely dying. 'Were swallowed up' preserves the vivid judgment imagery without over-specifying the agent.
- source_word: ኵሎሙ አዝእብት
  chosen: all the beasts
  alternatives:
  - all the wild beasts
  - all those beasts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, animal terms are symbolic but should remain literal in wording. 'Beasts' preserves the imagery and avoids interpretive expansion.
- source_word: እለ ተለውዎሙ
  chosen: that had turned away from
  alternatives:
  - that had departed from
  - that had separated themselves from
  - that had apostatized from
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates movement away or defection from the sheep. 'Turned away from' is readable and preserves the relational breach without importing later doctrinal terminology.
- source_word: ለዝኩ አባግዕ
  chosen: those sheep
  alternatives:
  - these sheep
  - the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative points back to the sheep already in view in the vision. 'Those sheep' reflects the deictic force better than a bare noun.
- source_word: ወተሠጥሙ
  chosen: were swallowed up
  alternatives:
  - sank down
  - were submerged
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This final verb appears to reinforce the image of engulfment/submergence. Because the OCR line is difficult, the English keeps the core image of being swallowed up rather than forcing a more technical nuance.
