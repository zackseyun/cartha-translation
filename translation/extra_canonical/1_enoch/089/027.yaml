  category: mistranslation
  tier: 3
  from: all the beasts that had turned away from those sheep were swallowed up.
  to: all the wolves that pursued those sheep perished and were drowned.
  rationale: 'The draft contains multiple severe mistranslations. ''አዝእብት'' (az''əbt) means ''wolves'', not ''beasts'' (consistent with the preceding verses). ''ተለውዎሙ'' (talawwomu, from ተለወ) means ''pursued them'' or ''followed them'', not ''turned away from''. ''ተሐጕሉ'' (taḥagwlu) means ''perished'' or ''were destroyed'', and ''ተሠጥሙ'' (taśaṭmu) means ''were drowned'' or ''sank''. The draft conflates the two verbs and reverses the meaning of the wolves'' action. | Adjudicator: The reviewer''s rationale is entirely correct and grounded in the Ge''ez lexicon. The word ''አዝእብት'' (az''əbt) specifically means ''wolves'' (representing the Egyptians in the Animal Apocalypse), not generic'
