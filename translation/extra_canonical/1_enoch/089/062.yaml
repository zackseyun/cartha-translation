translation:
  text: 'And all the excess and destruction that was done by the shepherds, the scribe
    wrote down: how many they destroyed by my command, and how many they destroyed
    of their own accord; all the destruction of those seventy shepherds was recorded
    against them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording is difficult. The repeated root rendered 'plucked out
      / destruction' may cover a broader sense of violent removal or ruin.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by/on their heads' in the second clause; the idiom may mean 'on
      their own responsibility' rather than strictly 'by their own will.'
    reason: lexical_alternative
  - marker: c
    text: The affected animals are given here as 'elephants' from the Ge'ez witness.
      Because this chapter's symbolic-animal sequence is textually difficult in places,
      the identification should be held with some caution.
    reason: textual_variant
  - marker: d
    text: Or 'blindness'.
    reason: previous_rendering
  - marker: e
    text: Or 'to those elephants'.
    reason: previous_rendering
lexical_decisions:
- source_word: ጽጋበ
  chosen: blindness
  alternatives:
  - covering over
  - blinding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this judgment context the noun most plausibly refers to the blinding
    inflicted in the vision. 'Blindness' preserves the result-state without over-paraphrasing.
- source_word: ሐጕለ / ያሐጕሉ / ያሐጕሎሙ
  chosen: destruction / plucked out / left to destruction
  alternatives:
  - slaughter
  - cast off
  - destroy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The root appears repeatedly with a sense of violent removal or ruin.
    Because the verse seems to distinguish animals removed by command from others
    abandoned to ruin, I render the first verbal occurrence concretely as 'plucked
    out' and the summary noun as 'destruction,' documenting the semantic tension rather
    than flattening it.
- source_word: በኖሎት
  chosen: to those elephants
  alternatives:
  - among the elephants
  - upon the elephants
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, elephants are part of the symbolic animal cast.
    The prepositional phrase likely marks the objects affected by the action.
- source_word: ጻሐፍ
  chosen: was written down / was recorded
  alternatives:
  - wrote
  - inscribed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive sense fits the heavenly bookkeeping motif in this context
    better than a simple active 'wrote.'
- source_word: ሚመጠነ
  chosen: how many
  alternatives:
  - the number that
  - as many as
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated form introduces numerical accounting, matching the verse's
    emphasis on measured judgment and record-keeping.
- source_word: በትእዛዝየ
  chosen: by my command
  alternatives:
  - at my order
  - according to my decree
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The first-person possessive should be preserved. 'Command' fits the authoritative
    speech of the visionary judge without importing later doctrinal phrasing.
- source_word: በርእሶሙ
  chosen: by their own will
  alternatives:
  - on their own
  - upon their own heads
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'by/on their heads,' but in context it likely marks responsibility
    resting with them. 'By their own will' brings out culpability, though the more
    literal idiom is noted in a footnote.
- source_word: ፯፯ ኖላዊ
  chosen: those seventy shepherds
  alternatives:
  - the seventy shepherds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established symbolic group in the Animal Apocalypse. 'Shepherds'
    should be retained literally to preserve the vision's imagery.
- source_word: ዲቤሆሙ
  chosen: against them
  alternatives:
  - concerning them
  - over them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase suggests an accusatory record lodged against the shepherds,
    not merely a neutral note about them.
