theological_decisions:
- issue: Agency in the judgment record
  chosen_reading: The verse distinguishes actions done 'by my command' from ruin attributable
    to the shepherds themselves.
  alternative_readings:
  - Both clauses describe divinely commanded destruction
  - The second clause means 'on their own heads,' emphasizing punishment rather than
    self-will
  rationale: 'The repeated accounting formula and the contrast between በትእዛዝየ and
    በርእሶሙ suggest differentiated responsibility: some acts were commanded, others
    exceeded or belonged to the shepherds themselves. This preserves the text''s tension
    between divine sovereignty and creaturely culpability.'
  doctrine_reference: Preserve theological tension rather than resolve it.
