theological_decisions:
- issue: Whether the leader's ignorance should be softened into negligence or retained as simple unawareness
  chosen_reading: Retained as 'that sheep did not know it'
  alternative_readings:
  - that sheep did not notice
  - that sheep paid no attention
  rationale: The Ge'ez states lack of knowledge, not necessarily culpable disregard. Preserving the plain sense maintains the narrative tension without importing a stronger moral judgment than the text warrants.
  doctrine_reference: Preserve theological tension rather than resolve it.
