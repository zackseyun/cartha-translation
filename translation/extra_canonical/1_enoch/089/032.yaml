translation:
  text: And that sheep that led them returned, and climbed up onto that rock; and the sheep, while their eyes were blinded, went astray from the path that he had shown them, but that sheep did not know it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'onto that height/crag'; the Ge'ez term may denote a rocky elevation rather than a single stone.
    reason: lexical_alternative
  - marker: b
    text: Or 'while their eyes were being blinded'.
    reason: previous_rendering
lexical_decisions:
- source_word: ገብአ
  chosen: returned
  alternatives:
  - came
  - entered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means 'entered/came,' but in this narrative sequence the leading sheep goes back after guiding the flock; 'returned' best fits the motion in context without over-paraphrasing.
- source_word: በግዕ
  chosen: sheep
  alternatives:
  - ram
  - lamb
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, ovine imagery is sustained and this singular figure is best rendered generically as 'sheep' unless the text marks sex/age more specifically.
- source_word: ዘይመርሖሙ
  chosen: that led them
  alternatives:
  - that was leading them
  - that guided them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause identifies the sheep by its guiding role. 'Led' preserves the concrete movement imagery of the vision.
- source_word: ዐርገ
  chosen: climbed up
  alternatives:
  - ascended
  - went up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes upward movement. 'Climbed up' fits the following reference to a rock and keeps the physical imagery vivid.
- source_word: ድማኅ
  chosen: rock
  alternatives:
  - height
  - hill
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term likely denotes a rocky height or crag. 'Rock' is the most concrete rendering and suits the apocalyptic scene; the broader sense is noted in a footnote.
- source_word: አባግዕ
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural ovine term. 'The sheep' preserves the animal imagery more directly than the collective 'flock.'
- source_word: ይጸልሉ አዕይንቲሆሙ
  chosen: their eyes were being blinded
  alternatives:
  - their eyes were darkened
  - their eyes were covered over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase describes impaired sight rather than mere shade. A passive-progressive English rendering captures the ongoing condition that explains their straying.
- source_word: ይስሕቱ እምፍኖት
  chosen: went astray from the path
  alternatives:
  - wandered from the way
  - strayed off the road
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'This is a key moral-visionary image: deviation from a shown route. ''Went astray from the path'' preserves both literal and symbolic force.'
- source_word: እንተ አርአዮሙ
  chosen: that he had shown them
  alternatives:
  - which he showed them
  - that was shown to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is causative/showing language. The masculine singular subject naturally refers back to the leading sheep.
- source_word: ኢያእመረ
  chosen: did not know it
  alternatives:
  - did not perceive it
  - was unaware
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes knowledge or awareness. 'Did not know it' is simple and faithful, preserving the tragic irony of the leader's ignorance.
