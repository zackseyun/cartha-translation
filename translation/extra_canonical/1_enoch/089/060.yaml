theological_decisions:
- issue: Force of the passive in the final clause
  chosen_reading: that sheep was delivered over to them
  alternative_readings:
  - that sheep was entrusted to them
  rationale: Within the Animal Apocalypse, transfer of a sheep to hostile or judging
    agents often carries ominous force. 'Delivered over' preserves that tension without
    over-specifying who acts behind the passive.
  doctrine_reference: Preserve theological tension rather than resolve it.
