translation:
  text: 'And I will tell you in truth, and I will declare to you what will happen
    among them: they gathered them together, and that sheep was delivered over to
    them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'among them' may also be understood more loosely as
      'from them' or 'with them,' depending on how the preposition is read in this
      witness.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult. 'Was delivered over to them' is chosen because
      it fits the passage's judgment-laden animal imagery, but 'was entrusted to them'
      is also possible.
    reason: alternative_reading
lexical_decisions:
- source_word: አሜጥወክሙ
  chosen: I will tell you
  alternatives:
  - I will make known to you
  - I will inform you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: First-person prefixed verb with second-person plural object; a straightforward
    disclosure formula in visionary narration. 'Tell' is natural English while preserving
    the direct address.
- source_word: በኍልቍ
  chosen: in truth
  alternatives:
  - truly
  - plainly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adverbial expression marking truthful or reliable speech. 'In truth'
    preserves the elevated register and solemnity better than the flatter adverb 'truly'.
- source_word: እነግረክሙ
  chosen: I will declare to you
  alternatives:
  - I will recount to you
  - I will explain to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A second disclosure verb parallel to 'I will tell you.' Rendering it
    as 'declare' preserves the rhetorical doubling rather than collapsing the repetition.
- source_word: ዘይትኃጐል
  chosen: what will happen
  alternatives:
  - what will befall
  - what will come to pass
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future relative clause describing ensuing events. 'What will happen'
    is clear modern English; 'befall' is possible but slightly more interpretive and
    archaic.
- source_word: እምኔሆሙ
  chosen: among them
  alternatives:
  - from them
  - with them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase is somewhat difficult in OCR, but in context
    it most naturally locates the events within the group under discussion. A footnote
    preserves the possible alternative nuance.
- source_word: አኅጕሉ
  chosen: they gathered them together
  alternatives:
  - they assembled them
  - they enclosed them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to denote collecting or gathering. In the Animal Apocalypse
    this fits the imagery of sheep being rounded up. 'Gathered them together' keeps
    the concrete action.
- source_word: መጠወ ሎሙ
  chosen: was delivered over to them
  alternatives:
  - was handed over to them
  - was entrusted to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive sense with dative object. 'Delivered over' preserves the ominous
    judicial/apocalyptic force better than the more neutral 'entrusted.'
- source_word: ዝኩ አባግዐ
  chosen: that sheep
  alternatives:
  - this sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative plus singular 'sheep.' 'That sheep' best reflects the narrative
    reference to a particular symbolic figure already in view.
