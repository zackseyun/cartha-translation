translation:
  text: And the book was read before the Lord of the sheep, and he took the book from
    his hand and read it, and sealed it, and set it down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The passive verb rendered 'was opened' is somewhat uncertain in the OCR
