lexical_decisions:
- source_word: መጽሐፍ
  chosen: book
  alternatives:
  - scroll
  - document
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The common Ge'ez term for a written book/document. 'Book' is the most
    natural default in English and does not over-specify material form; 'scroll' is
    possible in ancient context but not demanded by the word itself.
- source_word: ተነበ
  chosen: was opened
  alternatives:
  - was revealed
  - was read
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'In context the passive sense fits the narrative sequence: the book is
    first opened before the Lord of the sheep, then taken and read. Rendering it as
    ''was read'' would duplicate the later explicit verb ''read.'' ''Was opened''
    best preserves the procedural imagery of a heavenly record.'
- source_word: በቅድመ
  chosen: before
  alternatives:
  - in the presence of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard preposition of presence. 'Before' is concise and preserves
    the courtroom/visionary setting.
- source_word: እግዚአ አባግዕ
  chosen: the Lord of the sheep
  alternatives:
  - the master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Animal Apocalypse consistently uses sheep imagery for Israel and
    their divine overseer. 'Lord' preserves the elevated register and matches the
    title force of እግዚአ without flattening the metaphor.
- source_word: ነሥአ
  chosen: took
  alternatives:
  - received
  - lifted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The straightforward narrative verb indicates taking the book into possession
    from another hand.
- source_word: እምእዱ
  chosen: from his hand
  alternatives:
  - out of his hand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering preserves the concrete courtroom/bookkeeping imagery.
    The antecedent of 'his' is not re-specified in the Ge'ez, so the English keeps
    the same ambiguity.
- source_word: አንበበ
  chosen: read
  alternatives:
  - recited
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary sense in this context is reading the written record. 'Recited'
    is possible but less direct.
- source_word: ኀተማ
  chosen: sealed
  alternatives:
  - closed with a seal
  - authenticated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb naturally evokes sealing a document. This preserves the legal/judicial
    force of the heavenly book imagery.
- source_word: አንበረ
  chosen: set it down
  alternatives:
  - placed it
  - laid it down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates placing or setting. 'Set it down' reads naturally
    while retaining the concrete action after reading and sealing.
