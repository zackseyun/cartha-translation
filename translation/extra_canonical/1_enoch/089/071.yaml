  chosen_reading: the Lord of the sheep
  alternative_readings:
  - the master of the sheep
  rationale: The title refers to God within the sustained animal vision. 'Lord' preserves
    both the authority of the figure and the elevated apocalyptic register, while
    keeping the sheep metaphor explicit.
  doctrine_reference: Translate titles; preserve apocalyptic imagery; do not flatten
    into generic prose.
