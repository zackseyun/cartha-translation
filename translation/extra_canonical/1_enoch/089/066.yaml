lexical_decisions:
- source_word: በልዑ
  chosen: devoured
  alternatives:
  - ate
  - consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A strong verb of eating/consuming in a violent context; 'devoured' preserves the predatory imagery of the Animal Apocalypse better than the flatter 'ate'.
- source_word: ውሕጡ
  chosen: swallowed up
  alternatives:
  - swallowed
  - gulped down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with 'devoured,' this intensifies the destruction. 'Swallowed up' keeps the idiomatic force of total consumption.
- source_word: መብዝሕቶሙ
  chosen: most of them
  alternatives:
  - their multitude
  - the greater number of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun indicates the majority or multitude. In context it refers to the larger part of the sheep, so 'most of them' is the clearest English rendering.
- source_word: አባግዐ
  chosen: sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The standard animal symbol in this vision should remain concrete and singular/plural as the context requires; 'sheep' preserves the allegorical imagery.
- source_word: አናብስት
  chosen: lions
  alternatives:
  - great beasts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the normal term for lions; the specific predator should be retained rather than generalized.
- source_word: አነምርት
  chosen: tigers
  alternatives:
  - leopards
  - panthers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ethiopic animal term can be rendered with a large feline predator. 'Tigers' follows a common Ethiopic glossing tradition, but the exact zoological identification is uncertain enough to note an alternative.
- source_word: ሐራዊያ ገዳም
  chosen: wild boars of the desert
  alternatives:
  - wild pigs of the wilderness
  - boars of the waste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes wild swine associated with uncultivated country. 'Wild boars of the desert' preserves both the animal image and the wilderness setting.
- source_word: ምስሌሆሙ
  chosen: with them
  alternatives:
  - among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase is somewhat compressed. 'With them' is a restrained rendering that leaves the relation broad rather than over-specifying it.
- source_word: አውዐይዎ
  chosen: burned
  alternatives:
  - set on fire
  - consumed with fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates burning by fire. 'Burned' is direct and preserves the violent action against the structure.
- source_word: ማኅፈድ
  chosen: tower
  alternatives:
  - fortress
  - elevated structure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Dream Visions this structure is part of the symbolic sacred complex. 'Tower' best fits the imagery without over-interpreting it as a specific cultic building.
- source_word: ከረይዎ
  chosen: tore down
  alternatives:
  - cast down
  - demolished
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys destructive overthrow. 'Tore down' keeps the concrete violence and reads naturally in English.
- source_word: ቤት
  chosen: house
  alternatives:
  - temple
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The base sense is 'house.' Because the Animal Apocalypse often uses 'house' symbolically for the sanctuary, the main text keeps the literal image and avoids prematurely resolving the symbol into 'temple'.
