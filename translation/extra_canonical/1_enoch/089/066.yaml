  from: And lions and tigers and wild boars of the desert devoured and swallowed up most of those sheep with them
  to: And the lions and the leopards devoured and swallowed up most of those sheep, and the wild boars of the desert ate with them, and they burned that tower and tore down that house.
  rationale: 'Adjudicator-modified: The reviewer is entirely correct on both counts. Lexically, አነምርት (anamert, plural of ነምር) means ''leopards'' or ''panthers'', not ''tigers''. In the zoomorphic code of the Animal Apocalypse, leopards represent the Greeks/Macedonians (cf. Daniel 7:6); ''tigers'' is anachronistic and obscures the apocalyptic symbolism. Grammatically, the Ge''ez contains two distinct clauses with separate verbs: the lions and leopards ''devoured and swallowed'' (ወበልዑ፡ ወውሕጡ), while the wild boars ''ate with them'' (በልዑ፡ ምስሌሆሙ).'
