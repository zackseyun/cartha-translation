  from: all the sheep, great and small, were driven in their place
  to: all the great sheep perished, and the small ones arose in their place
  rationale: 'The draft completely misconstrues the syntax and vocabulary of this sequence. The text contains two distinct clauses: ''all the great sheep perished'' (ተኃጕሉ፡ ኵሎሙ፡ አባግዕ፡ ዐቢያን) and ''the small ones arose in their stead'' (ወንኡሳን፡ ተንሥኡ፡ ህየንቴሆሙ). The verb ተኃጕሉ (from ኀጕለ) means ''perished'' or ''were destroyed,'' not ''were driven.'' The draft conflates the subjects and entirely omits the verb ተንሥኡ (arose). | Adjudicator: The reviewer correctly identifies a major mistranslation in the current draft. The Ge''ez text clearly contains two distinct clauses: `ተኃጕሉ፡ ኵሎሙ፡ አባግዕ፡ ዐቢያን` (''all the great sheep perished'') and `ወንኡሳን'
