translation:
  text: And I watched until that sheep lay down—the one that had met that sheep which led them—and I watched until all the great sheep perished, and the small ones arose in their place, and they entered into the pasture and came near the stream of water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'were driven in their place' is uncertain. The underlying phrase may also be understood along the lines of 'to their place' or, less likely, 'instead of them.'
    reason: textual_variant
  - marker: b
    text: '''Was laid down'' may imply that the sheep was brought low or killed, but the Ge''ez wording does not require the translator to make that explicit here.'
    reason: lexical_alternative
  - marker: c
    text: Or 'was laid down'.
    reason: previous_rendering
  - marker: d
    text: Or 'all the sheep, great and small, were driven in their place'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሰከበ
  chosen: was laid down
  alternatives:
  - lay down
  - fell down
  - was cast down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means to lie down or recline; in this visionary sequence it can imply being brought low or killed, but the Ge'ez form itself does not require an explicit violent gloss. 'Was laid down' preserves the passive/resultative feel and leaves the narrative ambiguity intact.
- source_word: በግዕ
  chosen: sheep
  alternatives:
  - ram
  - lamb
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, the animal symbolism regularly uses sheep language for Israelite figures/groups. 'Sheep' is the broad and contextually stable rendering here.
- source_word: ዘተረክበ
  chosen: had met
  alternatives:
  - had encountered
  - had reached
  - had come upon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause identifies the sheep by its encounter with the leading sheep. 'Had met' is concise and natural while preserving the relational sense.
- source_word: ዘመርሖሙ
  chosen: which led them
  alternatives:
  - which guided them
  - which shepherded them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes leading or guiding. 'Led them' keeps the movement imagery without importing the more interpretive 'shepherded.'
- source_word: ተኃጕሉ
  chosen: were driven
  alternatives:
  - were gathered
  - were hurried along
  - were brought together
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form suggests being impelled or driven onward rather than merely assembling. Because the following verbs describe entering and approaching, 'were driven' preserves the forceful movement of the vision.
- source_word: ህየንቴሆሙ
  chosen: in their place
  alternatives:
  - instead of them
  - to their place
  - in their stead
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult. In context, a locative sense fits the movement sequence better than a substitutional one. I render it 'in their place' but note the uncertainty.
- source_word: መርዔት
  chosen: pasture
  alternatives:
  - grazing-place
  - fold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes a place of grazing. 'Pasture' preserves the animal-vision imagery and is more precise than the more enclosed 'fold.'
- source_word: ፈለገ ማይ
  chosen: stream of water
  alternatives:
  - watercourse
  - river of water
  - brook
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally a channel or stream of water. 'Stream of water' keeps the concrete image and avoids over-specifying the size of the flow.
