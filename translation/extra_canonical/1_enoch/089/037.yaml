theological_decisions:
- issue: Whether to make the first sheep's fate explicitly a death
  chosen_reading: Retain the more literal 'was laid down' without stating 'was slain' in the main text
  alternative_readings:
  - was slain
  - fell down
  rationale: The Animal Apocalypse often uses animal actions symbolically, and this verb can be read more than one way in context. The translation preserves the image without resolving the symbolism beyond the Ge'ez wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
