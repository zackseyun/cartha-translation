translation:
  text: And when those twelve sheep had grown, they handed over one of them to the donkeys, and those donkeys in turn handed over that sheep to the wolves, and that sheep grew up in the midst of the wolves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez text repeats the motion verb ('came to') and then uses an adverb meaning 'again' or 'afterward'; the sequence may imply that the donkeys then came back to the sheep.
    reason: lexical_alternative
  - marker: b
    text: The final clause could also be understood more simply as 'that sheep was among the wolves,' but the same verb used earlier in the verse favors a sense of growth or maturation.
    reason: alternative_reading
  - marker: c
    text: Or 'one of them came to the donkeys, and those donkeys in turn came to that sheep among the wolves'.
    reason: previous_rendering
lexical_decisions:
- source_word: ልህቁ
  chosen: had grown
  alternatives:
  - became strong
  - grew up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates development/maturation rather than mere existence. 'Had grown' fits the narrative sequence and the animal-allegory context.
- source_word: ፲ወ፪አባግዕ
  chosen: twelve sheep
  alternatives:
  - twelve lambs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The compound numeral plus animal term clearly denotes twelve sheep. 'Sheep' is preferable here because the same figure later acts with some maturity; 'lambs' would over-specify youth.
- source_word: አሐዱ እምኔሆሙ
  chosen: one of them
  alternatives:
  - one from among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward partitive expression; concise English preserves the sense.
- source_word: መጦውዎ
  chosen: came to
  alternatives:
  - approached
  - went to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated motion verb structures the vision. 'Came to' preserves the repetition without over-interpreting whether the movement is hostile or neutral.
- source_word: አእዱግ
  chosen: donkeys
  alternatives:
  - asses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The animal term refers to donkeys/asses. 'Donkeys' is clear modern English and preserves the allegorical imagery without archaic diction.
- source_word: ካዕበ
  chosen: in turn
  alternatives:
  - again
  - afterward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adverb marks a subsequent or reciprocal movement. 'In turn' best captures the narrative back-movement from the donkeys to the sheep.
- source_word: በግዕ
  chosen: sheep
  alternatives:
  - lamb
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular animal in this verse is best kept as 'sheep' for consistency with the surrounding allegory and to avoid implying smallness unless the text requires it.
- source_word: አዝእብት
  chosen: wolves
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural predator term is central to the Animal Apocalypse symbolism and should be rendered directly as 'wolves'.
- source_word: ማእከለ
  chosen: in the midst of
  alternatives:
  - among
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase emphasizes location within a hostile group. 'In the midst of' preserves the vividness better than the flatter 'among,' though the latter is possible.
