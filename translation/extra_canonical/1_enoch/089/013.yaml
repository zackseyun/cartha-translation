  from: one of them came to the donkeys, and those donkeys in turn came to that sheep among the wolves
  to: they handed over one of them to the donkeys, and those donkeys in turn handed over that sheep to the wolves
  rationale: 'The verb መጠወ (maṭawa) means ''to hand over, deliver'' (Dillmann col. 195), not ''to come to.'' The form መጦውዎ (maṭawwǝwo) is ''they handed him over'' (3cp verb + 3sm object suffix). The syntax uses the preposition ለ to mark both the direct objects (ለአሐዱ, ''one [acc]''; ለዝኩ፡ በግዕ, ''that sheep [acc]'') and the indirect objects (ለአእዱግ, ''to the donkeys''; ለአዝእብት, ''to the wolves''). The allegory describes the brothers selling Joseph to the Ishmaelites (donkeys), who then sell him to the Egyptians (wolves). | Adjudicator: The reviewer is entirely correct about the Ge''ez verb መጠወ (maṭawa), which means ''to hand over'' or ''deliver,'' not ''to come to.'' The form መጦውዎ (maṭawwǝwo) is a third-person plural perfect verb with a th'
