translation:
  text: And again those wolves pursued the sheep, and they went into the midst of that stream of water; and those wolves pursued the sheep and ran after them into that stream of water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb rendered 'make the sheep see' is difficult. It may mean that the wolves caused the sheep to notice something, or more loosely that they showed them the way.
    reason: lexical_alternative
  - marker: b
    text: The final clause is textually awkward in the Ethiopic witness, with repetition around 'those wolves' and 'that stream of water.' The translation keeps the probable sense without smoothing away the repetition entirely.
    reason: textual_variant
  - marker: c
    text: Or 'And those wolves began to make the sheep see'.
    reason: previous_rendering
  - marker: d
    text: Or 'turned against'.
    reason: previous_rendering
lexical_decisions:
- source_word: ጓዲሆሙ
  chosen: those
  alternatives:
  - them
  - their
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Taken as a demonstrative/pronominal element referring back to the previously mentioned wolves; rendered 'those' to preserve the deictic force in the repeated visionary narration.
- source_word: አዝእብት
  chosen: wolves
  alternatives:
  - wild dogs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse the animal symbolism is important; 'wolves' is the standard and contextually fitting identification and preserves the predatory image.
- source_word: አርእይዎሙ
  chosen: began to make ... see
  alternatives:
  - showed
  - caused ... to see
  - led
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the causative of 'see'; the wording suggests causing the sheep to see or perceive, not merely physically leading them. 'Began to make ... see' preserves the awkward but significant causative force.
- source_word: ለአባግዕ
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular/plural animal imagery should remain concrete. 'Sheep' preserves the symbolic register of the vision better than the more collective 'flock'.
- source_word: ማእከለ
  chosen: into the midst of
  alternatives:
  - into
  - among
  - in the middle of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is more specific than simple motion 'into'; 'into the midst of' keeps the vivid spatial imagery.
- source_word: ዐይገ ማይ
  chosen: stream of water
  alternatives:
  - watercourse
  - torrent
  - river
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a channel or flow of water. 'Stream of water' is transparent and avoids over-specifying the size or force of the body of water.
- source_word: ተለውዎሙ
  chosen: turned against
  alternatives:
  - pursued
  - fell upon
  - attacked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to mark a turning or change of direction toward hostility. Since pursuit follows explicitly in the next clause, 'turned against' preserves the sequence without collapsing two actions into one.
- source_word: ወረጹ ድኅሬሆሙ
  chosen: ran after them
  alternatives:
  - rushed after them
  - pursued them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A vivid motion verb plus 'after them' is best represented directly. 'Ran after them' keeps the immediacy of the dream report.
