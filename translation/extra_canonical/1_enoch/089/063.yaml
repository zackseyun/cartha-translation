theological_decisions:
- issue: Judicial function of the record read before the Lord
  chosen_reading: The verse presents a formal tally/testimony against the shepherds,
    not merely an informational report.
  alternative_readings:
  - A simple narrative report of events
  - A private recollection by the seer
  rationale: Terms for reading, counting, testimony, deeds, and command cluster around
    audit and judgment. This fits the Animal Apocalypse's theme of divinely supervised
    accountability.
  doctrine_reference: Preserve apocalyptic imagery and judgment formulas rather than
    smoothing them into generic prose.
