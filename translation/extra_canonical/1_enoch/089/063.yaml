translation:
  text: And read out before me by number how many they destroy, and how many they
    hand over to destruction, so that this may be a testimony for me against them,
    that I may know all the deeds of the shepherds, and assess them, and see what
    they do—whether they abide by my command that I commanded them, or not.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic is difficult in the opening clause. The repeated counting language
      likely refers to a numerical reckoning of the shepherds and of those they destroyed.
    reason: textual_variant
  - marker: b
    text: Or 'that this record might stand against them.' The phrase rendered 'upon
      them' may carry an accusatory force in context.
    reason: lexical_alternative
  - marker: c
    text: Or 'And I read out before him the tally of those shepherds, and how many
      they had destroyed for the shepherds, so that this testimony might be upon them,
      that I might know all the deeds of the shepherds, and count them, and see what
      they do—whether they abide by my command that I commanded them, or not.'.
    reason: previous_rendering
lexical_decisions:
- source_word: አንበብ
  chosen: I read out
  alternatives:
  - I read
  - I recited
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes reading/reciting aloud. 'Read out' fits the courtroom-like
    reporting scene and the direct object that follows.
- source_word: ቅድሜየ
  chosen: before him
  alternatives:
  - in front of him
  - before me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the form can be visually difficult in OCR, the context of reporting
    to the Lord in the vision favors 'before him' rather than 'before me.'
- source_word: ሚመጠነ
  chosen: the tally of / how many
  alternatives:
  - the number of
  - the measure of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The root concerns counting or measuring. Because the phrase is repeated
    with reference to what the shepherds did, 'tally' and then 'how many' preserves
    the numerical/judicial force without awkward repetition.
- source_word: የኃጕሉ / ለኃጕል
  chosen: they had destroyed / for the shepherds
  alternatives:
  - they had slain
  - they had caused to perish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse this verb commonly refers to destructive killing.
    'Destroyed' preserves the broad violent sense and avoids over-specifying the manner.
- source_word: ስምዐ
  chosen: testimony
  alternatives:
  - report
  - record
  - witness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The context is evidentiary and judicial: the record stands against the
    shepherds. ''Testimony'' best preserves that legal nuance.'
- source_word: ዲቤሆሙ
  chosen: upon them
  alternatives:
  - against them
  - concerning them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'upon them.' In context it implies testimony resting on or
    bearing against them; 'upon them' keeps the imagery while allowing the judicial
    implication to remain.
- source_word: አእምር
  chosen: I might know
  alternatives:
  - I may know
  - I might learn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A purpose clause follows. 'Might know' reflects the intended-result sense
    in English.
- source_word: ግብሮሙ
  chosen: deeds
  alternatives:
  - works
  - actions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Deeds'' suits the moral-judicial review of the shepherds'' conduct.'
- source_word: ኖላዊያን
  chosen: shepherds
  alternatives:
  - pastors
  - keepers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse the shepherds are a fixed symbolic group. 'Shepherds'
    preserves the vision's imagery and inter-verse consistency.
- source_word: እመጥኖሙ
  chosen: count them
  alternatives:
  - number them
  - assess them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb again carries counting/reckoning force. 'Count them' keeps the
    audit motif central to the verse.
- source_word: በትእዛዝየ ዘአዘዝክዎሙ
  chosen: by my command that I commanded them
  alternatives:
  - according to my command that I gave them
  - within the command I ordered them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repetition is deliberate and should not be flattened away. It underscores
    divine authorization and the standard by which the shepherds are judged.
- source_word: እመ አልቦ
  chosen: or not
  alternatives:
  - or if not
  - or whether there is not
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This closes the whether/or clause succinctly in natural English while
    preserving the binary test of obedience.
