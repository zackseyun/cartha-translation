theological_decisions:
- issue: Rendering the divine title in the Animal Apocalypse
  chosen_reading: the Lord of the sheep
  alternative_readings:
  - the master of the sheep
  rationale: The title functions as a reverent circumlocution for God within the vision's animal symbolism. 'Lord' better preserves theological register and aligns with project philosophy on translating titles rather than flattening them into merely managerial language.
  doctrine_reference: Translation philosophy §2, 'Translate titles; transliterate names'
