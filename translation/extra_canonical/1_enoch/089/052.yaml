translation:
  text: And one of them escaped and was not killed; and it sprang up and cried out over the sheep, and they wanted to kill it, but the Lord of the sheep saved it from the sheep, and brought it up to me and set it down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cried out to the sheep' or 'cried out concerning the sheep'; the Ge'ez preposition can be taken more than one way here.
    reason: lexical_alternative
  - marker: b
    text: '''For the sheep'' may also mean ''to the sheep'' or ''on behalf of the sheep.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'saved it from them for the sheep'.
    reason: previous_rendering
lexical_decisions:
- source_word: ድኅነ
  chosen: escaped
  alternatives:
  - was saved
  - was delivered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In sequence with 'was not killed,' the verb naturally describes survival/escape from the attack. 'Escaped' preserves the narrative force, while the later explicit divine rescue is rendered separately with a stronger saving verb.
- source_word: ኢተቀትለ
  chosen: was not killed
  alternatives:
  - was not slain
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward passive negative. 'Killed' is clear modern English; 'slain' would be more elevated but less natural here.
- source_word: ቀነጸ
  chosen: sprang up
  alternatives:
  - leaped up
  - rose up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests sudden upward movement. 'Sprang up' fits the vivid animal-vision imagery better than the flatter 'rose up.'
- source_word: ጸርኀ
  chosen: cried out
  alternatives:
  - shouted
  - wailed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A strong vocal outcry is in view. 'Cried out' preserves urgency without over-specifying whether the sound is lament or alarm.
- source_word: ዲበ አባግዕ
  chosen: over the sheep
  alternatives:
  - to the sheep
  - concerning the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition literally points to position or direction 'upon/over.' In this visionary context, 'cried out over the sheep' keeps the imagery and avoids prematurely interpreting the cry as merely speech addressed to them.
- source_word: ፈቀዱ ይቅትልዎ
  chosen: they wanted to kill it
  alternatives:
  - they desired to kill it
  - they sought to kill it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction expresses intention or desire. 'Wanted to kill it' is idiomatic and direct.
- source_word: እግዚአ አባግዕ
  chosen: the Lord of the sheep
  alternatives:
  - the master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a recurring title in the Animal Apocalypse for God. 'Lord' preserves the elevated theological register and the established imagery of divine ownership and rule.
- source_word: አድኃኖ
  chosen: saved it
  alternatives:
  - delivered it
  - rescued it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here the subject is explicitly the Lord of the sheep, so a stronger divine-rescue verb is appropriate. 'Saved' preserves theological weight while remaining natural.
- source_word: እምኔሆሙ
  chosen: from them
  alternatives:
  - out of their hand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase marks separation from the hostile group. 'From them' is concise and faithful.
- source_word: ለአባግዕት
  chosen: for the sheep
  alternatives:
  - to the sheep
  - on behalf of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The dative sense is somewhat flexible. 'For the sheep' best captures benefit or purpose without overcommitting to a narrower nuance.
- source_word: አዕረጎ ኀቤየ
  chosen: brought it up to me
  alternatives:
  - raised it to me
  - brought it to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb includes upward motion, fitting the visionary perspective of the seer. 'Brought it up to me' preserves that vertical nuance.
- source_word: አንበሮ
  chosen: set it down
  alternatives:
  - placed it
  - made it dwell
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In immediate sequence after bringing it to the seer, the sense is placement before him. 'Set it down' is vivid and concrete.
