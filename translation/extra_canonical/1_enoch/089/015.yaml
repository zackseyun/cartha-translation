theological_decisions:
- issue: Whether እግዚኦሙ should be rendered as 'Lord' or 'master' in the sheep allegory
  chosen_reading: their Lord
  alternative_readings:
  - their master
  rationale: Although the animal allegory could permit 'master,' within the Dream
    Visions the sheep's appeal is directed to the divine overseer of the flock. Rendering
    it 'Lord' preserves the theological force of the appeal while still fitting the
    allegorical frame.
  doctrine_reference: Translate titles; preserve theological tension rather than resolve
    it.
