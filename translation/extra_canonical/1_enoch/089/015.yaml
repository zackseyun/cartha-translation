translation:
  text: And the wolves began to fear them and to oppress them, until they destroyed
    their little ones and threw their little ones into a stream of much water. And
    those sheep began to cry out because of their little ones, and to lament before
    their Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'attacked them' for 'oppressed them'; the Ge'ez verb can denote forceful
      hostile action.
    reason: lexical_alternative
  - marker: b
    text: '''A stream of much water'' may also be rendered ''a river of much water''
      or ''a torrent of abundant water.'''
    reason: lexical_alternative
  - marker: c
    text: '''Before their Lord'' could also be understood as ''to their master,''
      but the context favors a divine referent within the allegory.'
    reason: alternative_reading
lexical_decisions:
- source_word: አዝእብት
  chosen: the wolves
  alternatives:
  - wolves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Animal Apocalypse symbolism uses animal designations literally within
    the vision while implying human referents. The plural noun is best rendered straightforwardly
    as 'the wolves.'
- source_word: ይፈርህዎሙ
  chosen: began to fear them
  alternatives:
  - feared them
  - were afraid of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The verbal sequence with ወወጠኑ (''and they began'') supports an ingressive
    sense: ''began to fear them.'' Retaining ''fear'' rather than weakening it to
    ''be hostile'' preserves the paradoxical imagery.'
- source_word: አጠቅዎሙ
  chosen: to oppress them
  alternatives:
  - to attack them
  - to afflict them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can suggest pressing hard upon or attacking. 'Oppress' fits
    the sustained predatory violence in context without narrowing it to a single assault.
- source_word: እስከ ያኅልቅ
  chosen: until they destroyed
  alternatives:
  - until they consumed
  - until they finished off
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause marks the result of the wolves' violence. 'Destroyed' is idiomatic
    and strong, preserving the totality implied by the verb.
- source_word: ደቂቆሙ
  chosen: their little ones
  alternatives:
  - their children
  - their young
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the animal allegory, the offspring of the sheep are best rendered
    'little ones,' which preserves both familial and animal imagery better than the
    more human-specific 'children' or the zoological 'young' alone.
- source_word: ወገደፉ
  chosen: threw
  alternatives:
  - cast
  - drove
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The following prepositional phrase 'into a stream of much water' favors
    a forceful motion such as 'threw' or 'cast.' 'Threw' is vivid and natural English.
- source_word: በውኂዘ ማይ ብዙኅ
  chosen: into a stream of much water
  alternatives:
  - into a river of much water
  - into a torrent of abundant water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a watercourse with abundant water. 'Stream of much
    water' stays close to the Ge'ez and preserves the apocalyptic scene without over-specifying
    'river' or 'torrent.'
- source_word: እልኩ አባግዕ
  chosen: those sheep
  alternatives:
  - the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative nuance is worth preserving to mark the return to the
    previously mentioned group within the vision narrative.
- source_word: ይጸርኁ
  chosen: to cry out
  alternatives:
  - to scream
  - to call out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a strong lamenting cry. 'Cry out' preserves the emotional and
    prayer-like force without becoming too colloquial.
- source_word: በእንተ ደቂቆሙ
  chosen: because of their little ones
  alternatives:
  - for their little ones
  - concerning their little ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The preposition here most naturally expresses cause: their crying arises
    because of what happened to their offspring.'
- source_word: ይስክዩ
  chosen: to lament
  alternatives:
  - to complain
  - to make supplication
  - to groan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is grief before God after the destruction of their offspring.
    'Lament' best captures sorrowful vocal appeal without reducing it to mere complaint.
- source_word: ኀበ እግዚኦሙ
  chosen: before their Lord
  alternatives:
  - to their Lord
  - before their master
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this visionary context the sheep direct their cry toward God, not
    merely a human owner. 'Before their Lord' preserves reverent posture and avoids
    flattening the theological dimension.
