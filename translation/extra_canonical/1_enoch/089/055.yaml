theological_decisions:
- issue: Agency in judgment imagery
  chosen_reading: he gave them over into the hand of the predators
  alternative_readings:
  - he left them in the hand of the predators
  rationale: The verse depicts divine/judicial abandonment of the sheep to hostile
    nations or powers through animal symbolism. 'Gave them over' preserves active
    judicial agency without over-explaining the allegory.
  doctrine_reference: Preserve apocalyptic imagery and theological tension rather
    than resolving it into paraphrase.
