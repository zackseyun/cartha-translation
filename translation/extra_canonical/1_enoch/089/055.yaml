translation:
  text: And he gave them over into the hand of the lions and the leopards and the
    wolves and the hyenas, and into the hand of the foxes, and to all the wild beasts;
    and those beasts of the field began to tear apart those sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The animal named here is uncertain; the Ge'ez term may refer to a large
      feline such as a leopard or panther rather than a tiger in the modern zoological
      sense.
    reason: lexical_alternative
  - marker: b
    text: The predator rendered 'hyenas' may alternatively be understood as 'jackals.'
    reason: lexical_alternative
  - marker: c
