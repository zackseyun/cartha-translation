translation:
  text: And he gave them over into the hand of the lions and the tigers and the wolves
    and the hyenas, and into the hand of the foxes, and over all the wild beasts;
    and those wild beasts began to tear apart those sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The animal named here is uncertain; the Ge'ez term may refer to a large
      feline such as a leopard or panther rather than a tiger in the modern zoological
      sense.
    reason: lexical_alternative
  - marker: b
    text: The predator rendered 'hyenas' may alternatively be understood as 'jackals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሐደጎሙ
  chosen: and he gave them over
  alternatives:
  - and he left them
  - and he abandoned them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries the sense of leaving/handing over. In this judgment
    context, 'gave them over' best preserves the active sense of delivering them into
    hostile power, stronger than merely 'left them'.
- source_word: ውስተ እደ
  chosen: into the hand of
  alternatives:
  - into the power of
  - to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a standard idiom for being delivered into someone's power. 'Into
    the hand of' preserves the apocalyptic/judicial imagery; the more interpretive
    'into the power of' is possible but less vivid.
- source_word: አናብስት
  chosen: lions
  alternatives:
  - great beasts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse this term is conventionally and contextually
    a specific predatory animal, best rendered 'lions' rather than a generic category.
- source_word: አንምርት
  chosen: tigers
  alternatives:
  - leopards
  - panthers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact zoological equivalent is not certain in English. 'Tigers' reflects
    a traditional Ge'ez gloss, but the underlying sense may be a large spotted predator
    such as leopard or panther; a footnote preserves the uncertainty.
- source_word: አዝእብት
  chosen: wolves
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward animal term in this sequence of predators.
- source_word: አጽዕብት
  chosen: hyenas
  alternatives:
  - jackals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The animal identification is somewhat uncertain, but 'hyenas' fits the
    scavenging/predatory sequence well and is a common identification; 'jackals' remains
    possible.
- source_word: ቈናጽል
  chosen: foxes
  alternatives:
  - jackals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is commonly rendered 'foxes,' though can overlap with similar
    canid imagery. I retain the more literal animal label and note the lexical uncertainty
    indirectly through alternatives.
- source_word: ኵሉ አራዊት
  chosen: all the wild beasts
  alternatives:
  - every beast of the field
  - all the animals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase broadens from named predators to the whole class of wild animals.
    'Wild beasts' preserves the ominous apocalyptic tone better than the flatter 'animals'.
- source_word: አሐዙ
  chosen: began
  alternatives:
  - seized
  - took hold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'With the following infinitive-like verbal form, the sense is inceptive:
    they started to do something. ''Began'' fits the syntax and narrative flow.'
- source_word: ይምሥጥዎሙ
  chosen: to tear apart
  alternatives:
  - to devour
  - to drag away
  - to destroy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests violent rending or tearing. 'Tear apart' preserves
    the brutality of the animal imagery more concretely than the broader 'destroy.'
- source_word: እልኩ አባግዕ
  chosen: those sheep
  alternatives:
  - those flock-animals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, sheep are the established symbolic representation;
    the demonstrative is retained as 'those sheep'.
