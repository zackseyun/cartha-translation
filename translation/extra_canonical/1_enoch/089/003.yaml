theological_decisions:
- issue: Scope of the flood image in the dream vision
  chosen_reading: The verse is rendered as describing the inundation of the symbolic
    enclosed land, not explicitly the whole world in the main text.
  alternative_readings:
  - a universal flood covering the whole earth
  - a local visionary scene within the symbolic enclosure
  rationale: The Ge'ez alternates between 'earth/land' and a likely pronominal reference
    to the enclosure's own ground. Since the imagery belongs to the Animal Apocalypse
    and the syntax allows a local referent, the main text preserves that tension rather
    than resolving it into an explicitly universal statement.
  doctrine_reference: Preserve theological tension rather than resolve it.
