translation:
  text: And again I saw that springs were opened upon the earth in that great enclosure,
    and that water began to well up and rise over the earth; and that enclosure appeared,
    until all its ground was covered with water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fountains' or 'sources' were opened.
    reason: lexical_alternative
  - marker: b
    text: The clause 'that enclosure appeared' is textually and syntactically difficult;
      it may mean that the enclosed land came into view as the waters rose, or more
      broadly that the scene of the enclosure was revealed.
    reason: alternative_reading
  - marker: c
    text: '''All its ground'' may also be understood as ''all the earth,'' depending
      on how the pronominal ending is taken.'
    reason: alternative_reading
lexical_decisions:
- source_word: አንቅዕታት
  chosen: springs
  alternatives:
  - fountains
  - sources
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of water emerging from the ground and covering the land, the
    plural is best rendered as natural water-sources or springs rather than a more
    architectural 'fountains.'
- source_word: ተርሕዉ
  chosen: were opened
  alternatives:
  - were loosened
  - were uncovered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive opening of the springs fits the flood imagery and preserves
    the visionary sequence without paraphrase.
- source_word: ዐጸድ ዐቢይ
  chosen: great enclosure
  alternatives:
  - great field
  - great court
  - great garden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Animal Apocalypse regularly uses spatial imagery for bounded land/terrain.
    'Enclosure' preserves the sense of a defined area without over-specifying it as
    cultivated land or a palace court.
- source_word: ይፈልሕ
  chosen: began to well up
  alternatives:
  - gushed forth
  - boiled up
  - flowed out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests water issuing upward or bubbling forth. 'Well up' is
    vivid but natural English and avoids implying literal boiling.
- source_word: ይትነሣእ
  chosen: rise
  alternatives:
  - be lifted up
  - surge upward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with the previous verb, it depicts the floodwaters increasing
    and mounting over the earth.
- source_word: ተአርአየ ለውእቱ ዐጸድ
  chosen: that enclosure appeared
  alternatives:
  - that enclosure was seen
  - it became visible, that enclosure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is difficult. A literal rendering preserves the visionary
    report that the enclosure came into view in relation to the rising waters, without
    forcing a more interpretive reconstruction.
- source_word: ኵሉ ምድሩ
  chosen: all its ground
  alternatives:
  - all the earth
  - its whole land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronominal form most naturally refers back to the enclosure/land
    just mentioned, not necessarily the entire world. 'All its ground' keeps the local
    reference transparent.
