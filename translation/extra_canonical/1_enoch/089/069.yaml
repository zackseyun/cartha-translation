theological_decisions:
- issue: Whether to interpret the sheep explicitly as Israel/Judah in the main text
  chosen_reading: Retain 'sheep' as the vision's imagery
  alternative_readings:
  - those people
  - Israel
  rationale: The translation philosophy requires preserving apocalyptic imagery rather than flattening symbolic animals into their referents. The symbolic identification belongs in interpretation, not in the main line of translation.
  doctrine_reference: 'Book context: preserve visionary and apocalyptic prose; do not flatten imagery.'
