translation:
  text: And beyond their prescribed measure they kept killing and destroying; and I, was weeping and crying out because of those sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beyond their appointed measure/order.' The Ge'ez term may refer to a fixed arrangement or allotted number.
    reason: lexical_alternative
  - marker: b
    text: The clause 'while I was sleeping' keeps the dream-vision frame explicit.
    reason: cultural_note
  - marker: c
    text: Or 'while I was sleeping, wept and cried out'.
    reason: previous_rendering
  - marker: d
    text: Or 'beyond their number'.
    reason: previous_rendering
lexical_decisions:
- source_word: ፈድፋደ
  chosen: beyond
  alternatives:
  - in excess of
  - more than
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form conveys addition or excess. In context with እም + ሥርዓቶሙ it describes action exceeding a set measure or number, so 'beyond' preserves the comparative force without overinterpreting.
- source_word: እምሥርዓቶሙ
  chosen: their number
  alternatives:
  - their order
  - their measure
  - their appointed amount
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሥርዓት can mean order, arrangement, rule, or fixed measure. In this slaughter context, 'their number' best fits the sense of exceeding an allotted count, while 'order' would be too abstract.
- source_word: ይቀትል
  chosen: they kept killing
  alternatives:
  - they killed
  - they were killing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The imperfect form in a visionary narrative can carry iterative or ongoing force. 'Kept killing' reflects repeated violence in the Animal Apocalypse.
- source_word: ያሐጕል
  chosen: destroying
  alternatives:
  - casting down
  - ravaging
  - laying waste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is difficult in OCR but appears to denote ruin or destructive treatment. 'Destroying' is broad enough to preserve the violence without pretending greater precision than the witness allows.
- source_word: እንዝኩ
  chosen: while I was sleeping
  alternatives:
  - as I slept
  - in my sleep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Dream Visions setting, the participial expression naturally marks the dream state. 'While I was sleeping' makes the narrative frame explicit.
- source_word: እብኪ
  chosen: wept
  alternatives:
  - was weeping
  - lamented
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of the lament verb; 'wept' keeps the emotional force concise.
- source_word: አዐውዩ
  chosen: cried out
  alternatives:
  - wailed
  - called aloud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This intensifies the lament beyond silent tears. 'Cried out' preserves the audible distress without narrowing it to ritual lament.
- source_word: አባግዕ
  chosen: sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Animal Apocalypse consistently uses animal imagery symbolically. 'Sheep' should be retained rather than interpreted as 'people' or 'Israel' in the main text.
