translation:
  text: And one sheep went to the wolves at the word of the Lord, and another sheep
    met him and went with him. And the two of them went together and entered into
    the assembly of those wolves, and they spoke to them and made them hear, that
    from then on they should not ravage the sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the command of the Lord.' The Ge'ez phrase can denote action undertaken
      in response to divine speech or command.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'made them hear' is retained close to the Ge'ez. It likely means
      that the wolves were compelled to listen to what the two sheep said.
    reason: lexical_alternative
  - marker: c
    text: Or 'would no longer ravage them'—the final object is specified as 'the sheep'
      in the verse, clarifying the wolves' predatory action.
    reason: lexical_alternative
  - marker: d
    text: Or 'made them hear, so that from then on they would no longer ravage'.
    reason: previous_rendering
lexical_decisions:
- source_word: በግዕ
  chosen: sheep
  alternatives:
  - ram
  - lamb
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, animal imagery is sustained and symbolic; the
    generic 'sheep' best preserves the collective-symbolic sense without over-specifying
    sex or age.
- source_word: አዝእብት
  chosen: wolves
  alternatives:
  - wild dogs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The standard sense is 'wolves,' fitting the predatory imagery of the
    vision. This should not be softened into a generic hostile group.
- source_word: በቃለ እግዚእ
  chosen: at the word of the Lord
  alternatives:
  - by the command of the Lord
  - according to the word of the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase signals divine authorization rather than mere speech. 'At
    the word of the Lord' preserves the elevated register and the immediacy of obedient
    action.
- source_word: ተረክቦ
  chosen: met him
  alternatives:
  - joined him
  - encountered him
  - received him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The context is movement: a second sheep comes into contact with the
    first and proceeds with him. ''Met him'' is the clearest English that leaves room
    for subsequent accompaniment.'
- source_word: ምስሌሁ
  chosen: with him
  alternatives:
  - alongside him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward accompaniment phrase; no need to heighten beyond the
    Ge'ez.
- source_word: ኅቡረ
  chosen: together
  alternatives:
  - in company
  - as one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This adverbial sense emphasizes the joint action of the two sheep.
- source_word: ማኅበሮሙ
  chosen: assembly
  alternatives:
  - company
  - congregation
  - gathering
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes an organized gathering or group. 'Assembly' preserves
    the formal, collective sense without importing later ecclesial overtones.
- source_word: ወተናገርዎሙ
  chosen: they spoke to them
  alternatives:
  - they addressed them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is ordinary speech, and the directness matters in the narrative
    sequence.
- source_word: ወአስምዑ ዲቤሆሙ
  chosen: made them hear
  alternatives:
  - caused them to listen
  - made themselves heard before them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The causative nuance is important: the sheep do not merely speak, but
    bring the wolves to hear what is said. The phrase is somewhat idiomatic, so a
    slightly literal rendering is retained for auditability.'
- source_word: ከመ እምይእዜ
  chosen: so that from then on
  alternatives:
  - that from now on
  - henceforth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This marks the intended result in time, not merely a momentary pause.
- source_word: ኢይግሥሥዎሙ
  chosen: they would no longer ravage them
  alternatives:
  - they would no longer oppress them
  - they would no longer destroy them
  - they would no longer seize them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the wolf-sheep imagery, 'ravage' preserves predatory violence better
    than a flatter term like 'harm.' In English the object is clarified by the following
    phrase 'the sheep.'
- source_word: አባግዕት
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural keeps the animal-symbolic register explicit. 'Flock' would
    be smoother but less formally tied to the repeated sheep imagery.
