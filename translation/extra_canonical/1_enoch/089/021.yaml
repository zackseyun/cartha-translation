theological_decisions:
- issue: Whether the eye-blinding should be rendered as literal visionary imagery or softened into deception language
  chosen_reading: Retain the concrete image 'blinded their eyes'
  alternative_readings:
  - deceived them
  - misled them
  rationale: The Animal Apocalypse regularly communicates political and spiritual realities through stark animal imagery. Preserving the blinding image maintains the apocalyptic symbolism and avoids interpretive flattening.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten visionary prose into generic modern religious language.
