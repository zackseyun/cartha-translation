translation:
  text: And I saw the sheep until they came out from the wolves; and the eyes of the wolves were blinded, and those wolves went out pursuing the sheep with all their power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The subject of 'they went out pursuing' is contextually best taken as the wolves, though the Ge'ez sequence is compact enough that the line could be read less explicitly as a continued movement scene involving both groups.
    reason: alternative_reading
  - marker: b
    text: Or 'those sheep until they came out from the wolves; and the wolves blinded their eyes, and they went out pursuing those sheep'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢክዎሙ
  chosen: And I saw
  alternatives:
  - And I looked at them
  - And I watched them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb introduces Enoch’s visionary report in first person. 'And I saw' preserves the repetitive apocalyptic narrative formula without unnecessary expansion.
- source_word: ለአባግዕ
  chosen: those sheep
  alternatives:
  - the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, sheep are the sustained symbolic image for Israel/the people under vision. 'Those sheep' reflects the marked object and keeps the visionary deixis.
- source_word: እስከ ወፁኡ እምአዝእብት
  chosen: until they came out from the wolves
  alternatives:
  - until they went out from among the wolves
  - until they emerged from the wolves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sequence marks the sheep as coming out from the sphere or presence of the wolves. 'Came out from the wolves' is literal enough while remaining readable.
- source_word: ተጸለሉ አዕይንቲሆሙ
  chosen: blinded their eyes
  alternatives:
  - darkened their eyes
  - covered their eyes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys obscuring or blinding. 'Blinded their eyes' preserves the concrete image of predatory deception or incapacitation rather than reducing it to a vague metaphor.
- source_word: ወወፁኡ እንዘ ይትልውዎሙ
  chosen: and they went out pursuing
  alternatives:
  - and they went out while following
  - and they came out chasing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The participial construction indicates accompanying action. The nearest sense in context is hostile pursuit by the wolves after the sheep, so 'went out pursuing' keeps the motion and menace.
- source_word: ዝኩ አዝእብት
  chosen: those wolves
  alternatives:
  - the wolves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative force is retained to match the narrative’s visual specificity.
- source_word: በኵሉ ኃይሎሙ
  chosen: with all their power
  alternatives:
  - with all their might
  - with their whole strength
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard expression of total force. 'Power' fits the violent pursuit scene and preserves the intensity of the attack.
