theological_decisions:
- issue: Whether the final clause should echo Genesis formulaically
  chosen_reading: light came to be
  alternative_readings:
  - there was light
  rationale: The imagery naturally recalls creation/restoration, but the translation
    avoids importing the exact familiar Genesis cadence where the Ge'ez itself simply
    uses the common verb 'became/came to be.' This preserves intertextual resonance
    without harmonizing.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
