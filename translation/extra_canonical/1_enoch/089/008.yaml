lexical_decisions:
- source_word: ማይ
  chosen: water
  alternatives:
  - waters
  lexicon: Dillmann
  rationale: The singular is retained as a collective substance term in English. 'Water'
    fits the visionary flood imagery without forcing a plural.
- source_word: ይረድ
  chosen: descended
  alternatives:
  - went down
  - came down
  lexicon: Dillmann
  rationale: A simple motion verb downward. 'Descended' preserves elevated apocalyptic
    register better than the more colloquial 'came down'.
- source_word: ውስቴቶሙ
  chosen: into their midst
  alternatives:
  - among them
  - inside them
  lexicon: Dillmann
  rationale: The form most naturally points to an interior/among-them sense. 'Into
    their midst' preserves the spatial vividness of the vision and avoids the misleadingly
    anatomical 'inside them'.
- source_word: እስክነ
  chosen: until
  alternatives:
  - so that
  - as far as
  lexicon: Dillmann
  rationale: Best taken as a temporal/resultative marker introducing the extent of
    the water's descent.
- source_word: ተከሥተ ምድር
  chosen: the earth was laid bare
  alternatives:
  - the earth was uncovered
  - the ground was exposed
  lexicon: Dillmann
  rationale: The passive sense of uncovering/exposure suits the context after inundation
    and recession. 'Laid bare' is vivid but still readable.
- source_word: መስቀር
  chosen: abyss
  alternatives:
  - chasm
  - pit
  - depth
  lexicon: Dillmann
  rationale: The noun is difficult, but in this flood-vision context it most plausibly
    denotes a deep hollow or abyss in the earth. 'Abyss' preserves apocalyptic force
    better than the flatter 'pit,' while a footnote records alternatives.
- source_word: ተገኅሰት ጽልመት
  chosen: darkness was removed
  alternatives:
  - darkness was driven away
  - darkness vanished
  lexicon: Dillmann
  rationale: The verb suggests removal or sweeping away. 'Was removed' is transparent
    and avoids over-interpreting the mechanism.
- source_word: ኮነ ብርሃን
  chosen: light came to be
  alternatives:
  - there was light
  - light appeared
  lexicon: Dillmann
  rationale: The verb is simply 'became/came to be.' This rendering preserves the
    emergence of light without importing familiar biblical phrasing too strongly.
