theological_decisions:
- issue: Whether to interpret the symbolic 'house' explicitly as the temple or community in the main text
  chosen_reading: Retain the literal visionary image 'house' and 'tower' without decoding the symbolism in translation.
  alternative_readings:
  - Translate interpretively as 'temple' and 'tower/fortress'
  - Translate as 'house' and 'enclosure/fold'
  rationale: The translation philosophy calls for preserving apocalyptic imagery rather than flattening it into explanatory prose. The symbolic referent may be discussed in notes or commentary, but the verse itself presents a vision of a house and tower being abandoned.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; original-language primacy over translation tradition.'
- issue: Whether 'into the hand of the lions' should be modernized to 'into the power of the lions'
  chosen_reading: Keep the idiom 'into the hand of the lions' in substance, rendered as 'gave all of them into the hand of the lions.'
  alternative_readings:
  - '''gave them over to the lions'''
  - '''delivered them into the power of the lions'''
  rationale: The idiom is important biblical-apocalyptic diction and remains intelligible in English. Preserving it maintains the text's register and judicial force.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented exception; preserve theological tension and texture.'
