  to: and gave all of them into the hand of the lions so that they might tear them apart, and into the hands of all the wild beasts so that they might devour them.
  rationale: 'The draft''s linear word order leaves the prepositional phrase ''into the hands of all the wild beasts'' (ውስተ፡ እደዊሆሙ፡ ለኵሎሙ፡ አራዊት) dangling after the purpose clauses, obscuring its connection to the main verb ''gave'' (ወደዮሙ). The Ge''ez employs a chiastic structure here: destination (lions) -> purpose (tear apart) -> purpose (devour) -> destination (wild beasts). Reordering the English to pair each destination with its corresponding purpose clause resolves the awkward syntax and restores the author''s clear meaning.'
