lexical_decisions:
- source_word: ሐደጎ
  chosen: abandoned
  alternatives:
  - left
  - forsook
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes leaving or forsaking. 'Abandoned' preserves the judgmental force in this apocalyptic context better than the more neutral 'left.'
- source_word: ቤተ
  chosen: house
  alternatives:
  - dwelling
  - temple
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is 'house.' In the Animal Apocalypse the image likely refers symbolically to the sheep's house, but the verse itself uses the ordinary term, so 'house' is retained rather than interpreting it as 'temple' in the main text.
- source_word: ማኅፈዶሙ
  chosen: their tower
  alternatives:
  - their enclosure
  - their fold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term in this context refers to a built protective structure associated with the house. 'Tower' fits the architectural imagery and the narrative setting better than 'enclosure,' while preserving the vision's concrete symbolism.
- source_word: ወወደዮሙ
  chosen: gave all of them
  alternatives:
  - delivered all of them
  - handed all of them over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction with 'into the hand of' is a standard idiom of surrendering someone to another's power. 'Gave all of them' is concise and faithful, with the following phrase carrying the idiomatic force.
- source_word: ዲበ እደ
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a common Semitic-style idiom for being delivered into another's control. Retaining 'into the hand of' preserves the biblical-apocalyptic register.
- source_word: አናብስት
  chosen: lions
  alternatives:
  - lion-like beasts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun ordinarily denotes lions. Since the Animal Apocalypse uses animal figures symbolically, the concrete animal term should remain in translation.
- source_word: ይምሥጥዎሙ
  chosen: tear them apart
  alternatives:
  - seize them
  - rend them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In parallel with 'devour them,' the verb likely carries violent predatory force. 'Tear them apart' communicates that force in clear modern English; 'rend' is possible but less accessible.
- source_word: ይብልዕዎሙ
  chosen: devour them
  alternatives:
  - eat them
  - consume them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to eat or consume. 'Devour' best matches the savage judgment imagery.
- source_word: አራዊት
  chosen: wild beasts
  alternatives:
  - beasts
  - animals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term refers to wild animals/beasts. 'Wild beasts' preserves the threatening tone and distinguishes them from the domesticated sheep imagery of the vision.
