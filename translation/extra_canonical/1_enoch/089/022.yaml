theological_decisions:
- issue: Referent of the leading figure in the Animal Apocalypse
  chosen_reading: Render እግዚኦሙ ... ለአባግዕ as 'the Lord of the sheep' and retain the
    sheep imagery literally.
  alternative_readings:
  - their lord, the sheep-owner
  - the master/shepherd of the sheep
  rationale: The verse presents the divine figure within the sustained symbolic framework
    of the vision. Keeping 'Lord of the sheep' preserves both the theological identity
    of the figure and the apocalyptic animal symbolism without collapsing it into
    plain exposition.
  doctrine_reference: Translation philosophy §§1, 5; Book context 'Do not flatten
    apocalyptic imagery'.
