translation:
  text: And the Lord of the sheep went with them as he led them, and all his sheep
    followed him; and his face was glorious and splendid and terrible to behold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'majestic' for 'splendid'; the Ge'ez adjective can denote honor or weightiness
      as well as visible magnificence.
    reason: lexical_alternative
  - marker: b
    text: '''Terrible to behold'' expresses awe-filled dread, not moral evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እግዚኦሙ
  chosen: the Lord of
  alternatives:
  - their lord
  - master of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this animal-apocalypse context the term denotes the sovereign figure
    over the sheep. 'Lord of the sheep' preserves the genitival relationship and the
    elevated theological register better than 'master,' while avoiding unnecessary
    paraphrase.
- source_word: አባግዕ
  chosen: sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The vision consistently uses animal imagery concretely. 'Sheep' preserves
    the symbolic animal image; 'flock' would generalize and weaken the repeated imagery.
- source_word: ሖረ
  chosen: went
  alternatives:
  - came
  - proceeded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A simple motion verb fits the narrative sequence. 'Went with them' is
    idiomatic and preserves the visionary movement without overinterpreting direction.
- source_word: ምስሌሆሙ
  chosen: with them
  alternatives:
  - among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase most naturally indicates accompaniment. 'With
    them' fits the shepherding scene and avoids adding spatial nuance not required
    by the text.
- source_word: እንዘ ይመራሖሙ
  chosen: as he led them
  alternatives:
  - while he was guiding them
  - as he shepherded them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction expresses contemporaneous action. 'Led' is clear modern
    English and suits the sheep imagery; 'shepherded' would be interpretive and slightly
    more expansive.
- source_word: ኵሎሙ አባግዒሁ
  chosen: all his sheep
  alternatives:
  - all the sheep belonging to him
  - all his flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The possessive is explicit and the imagery should remain concrete. 'All
    his sheep' is both natural and faithful.
- source_word: ተለውዎ
  chosen: followed him
  alternatives:
  - went after him
  - accompanied him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of a leader and sheep, 'followed him' best captures the relational
    and directional sense.
- source_word: ገጹ
  chosen: his face
  alternatives:
  - his appearance
  - his countenance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is concrete. 'Face' preserves the vivid visionary detail; 'appearance'
    would dilute the anthropomorphic imagery.
- source_word: ስቡሕ
  chosen: glorious
  alternatives:
  - praised
  - splendid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this descriptive chain for the Lord's face, 'glorious' best conveys
    radiance and honor. It also preserves theological weight without becoming archaic.
- source_word: ክቡር
  chosen: splendid
  alternatives:
  - honored
  - majestic
  - glorious
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Because 'glorious' already renders ስቡሕ, 'splendid' preserves the second
    adjective distinctly while still conveying exalted brilliance. 'Majestic' is possible
    but slightly more interpretive.
- source_word: ግሩም
  chosen: terrible
  alternatives:
  - awesome
  - fearsome
  - wondrous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In biblical-apocalyptic description this adjective often carries the
    sense of awe-inspiring dread. 'Terrible to behold' preserves that numinous fear
    better than the modern-weakened 'awesome.'
- source_word: ለርእይ
  chosen: to behold
  alternatives:
  - to see
  - in appearance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An infinitival sense fits the idiom after the descriptive adjectives.
    'To behold' keeps the elevated register appropriate to a vision report.
