translation:
  text: And I saw until those shepherds pastured in their time, and they began to
    kill and destroy much more than they had been commanded, and they abandoned those
    sheep into the hand of the lions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their time.' The phrase indicates the appointed period of the shepherds'
      activity.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from their command' or 'beyond their command'—that is, beyond
      what had been ordered for them.
    reason: lexical_alternative
  - marker: c
    text: Or 'many beyond what had been commanded them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኖላዊያን
  chosen: shepherds
  alternatives:
  - pastors
  - herdsmen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse this term refers to the appointed angelic overseers
    symbolized as shepherds. 'Shepherds' preserves the vision's imagery and the established
    internal metaphor better than 'pastors' or the more generic 'herdsmen'.
- source_word: ይርዐዩ
  chosen: pastured
  alternatives:
  - grazed
  - shepherded
  - fed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is tied to the shepherding image. 'Pastured' keeps the animal-vision
    register and allows the subject to remain the shepherds acting upon the flock.
    'Shepherded' would also work, but 'pastured' better matches the immediate livestock
    imagery.
- source_word: በጊዜሁ
  chosen: in their season
  alternatives:
  - at its time
  - in its time
  - in their time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks an allotted or appointed period. Because the subject
    is plural shepherds, English idiom is smoother with 'their season,' while still
    conveying that their activity occurs within a divinely bounded time.
- source_word: ወአኃዙ
  chosen: they began
  alternatives:
  - they took to
  - they proceeded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here the verb functions as an inceptive auxiliary before the infinitive-like
    sequence 'to kill and destroy.' 'They began' is the clearest natural English equivalent.
- source_word: ይቅትሉ
  chosen: to kill
  alternatives:
  - to slay
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Kill'' is direct and clear. ''Slay'' is possible but slightly more
    stylized than needed; the following verb already carries the heightened destructive
    force.'
- source_word: ያሕጕሉ
  chosen: destroy
  alternatives:
  - annihilate
  - bring to ruin
  - lay waste
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs intensify the violence. 'Destroy' preserves that force
    without overtranslating into total extermination.
- source_word: ብዙኃ
  chosen: many
  alternatives:
  - much
  - a great number
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The object is plural in sense within the flock imagery; 'many' is the
    most natural concise rendering.
- source_word: እምትእዛዞሙ
  chosen: beyond what had been commanded them
  alternatives:
  - more than their command
  - beyond their orders
  - beyond the command given to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition plus 'command' indicates excess over an assigned limit.
    This wording makes explicit that the shepherds exceeded the commission they had
    received, an important theme in the judgment of the shepherds.
- source_word: ኃደጉ
  chosen: abandoned
  alternatives:
  - left
  - gave over
  - forsook
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys more than simple departure; it suggests culpable relinquishing.
    'Abandoned' fits the accusatory tone of the vision.
- source_word: አባግዐ
  chosen: those sheep
  alternatives:
  - that flock
  - the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative nuance is worth preserving because the verse points
    back to the specific flock under the shepherds' charge.
- source_word: ውስተ እደ
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a standard idiom for delivery into another's power. 'Into the
    hand of' preserves the biblical-apocalyptic texture better than a flattened paraphrase.
- source_word: አናብስት
  chosen: the lions
  alternatives:
  - lions
  - wild beasts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes lions. Since the Animal Apocalypse uses specific
    animal symbols, 'the lions' is preferable to the broader 'wild beasts.'
