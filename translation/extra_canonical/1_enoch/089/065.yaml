theological_decisions:
- issue: Whether the shepherds' violence is portrayed as within or beyond divine authorization
  chosen_reading: The shepherds kill and destroy 'beyond what had been commanded them.'
  alternative_readings:
  - They acted according to their command
  - They exceeded only in quantity, not in kind
  rationale: The Ge'ez phrase with እም plus 'command' most naturally indicates excess
    beyond an assigned order. This preserves the theological tension of delegated
    authority abused rather than erasing the shepherds' culpability.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity rather than smoothing it away.
