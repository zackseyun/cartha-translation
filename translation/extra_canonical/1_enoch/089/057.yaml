lexical_decisions:
- source_word: አኃዝኩ
  chosen: I began
  alternatives:
  - I took up
  - I started
  lexicon: Dillmann
  rationale: With the following infinitive-like verb እጽራሕ, the verb functions idiomatically as an inceptive, marking the onset of the action rather than a literal taking.
- source_word: እጽራሕ
  chosen: to cry out
  alternatives:
  - to lament
  - to shout
  lexicon: Dillmann
  rationale: In this visionary complaint context, 'cry out' preserves both loudness and distress without narrowing the sense to mourning alone.
- source_word: በኵሉ ኃይልየ
  chosen: with all my strength
  alternatives:
  - with all my might
  - with my whole power
  lexicon: Dillmann
  rationale: A natural English rendering that preserves the totality and intensity of the speaker's appeal.
- source_word: አጸውዖ
  chosen: I called
  alternatives:
  - I cried out
  - I appealed
  lexicon: Dillmann
  rationale: 'Keeps the verbal distinction from the previous ''cry out'': first the act of shouting, then the directed appeal to the Lord of the sheep.'
- source_word: ለእግዚአ አባግዕ
  chosen: to the Lord of the sheep
  alternatives:
  - to the master of the sheep
  lexicon: Dillmann
  rationale: '''Lord'' is the standard rendering for እግዚአ and fits the Animal Apocalypse''s allegorical portrayal of God as owner-ruler of the flock.'
- source_word: አርእዮ
  chosen: showed him
  alternatives:
  - made known to him
  - pointed out to him
  lexicon: Dillmann
  rationale: The verb literally conveys showing or causing to see; in context it means presenting the plight of the sheep before him.
- source_word: በእንተ አባግዕት
  chosen: concerning the sheep
  alternatives:
  - about the sheep
  - regarding the sheep
  lexicon: Dillmann
  rationale: A straightforward prepositional rendering that preserves the object of the appeal.
- source_word: ተበልዑ
  chosen: were being devoured
  alternatives:
  - were being eaten
  - were consumed
  lexicon: Dillmann
  rationale: '''Devoured'' preserves the violent predatory imagery of the allegory better than the flatter ''eaten.'''
- source_word: እምኵሎሙ አራዊተ ገዳም
  chosen: by all the beasts of the field
  alternatives:
  - by all the wild beasts
  - by all the beasts of the wilderness
  lexicon: Dillmann
  rationale: አራዊተ denotes wild animals/beasts, and ገዳም can denote open country or wilderness. 'Beasts of the field' is idiomatic English that preserves the stock biblical-apocalyptic animal imagery without over-specifying desert terrain.
