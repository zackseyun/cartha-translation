theological_decisions:
- issue: Rendering the divine title in the allegory
  chosen_reading: the Lord of the sheep
  alternative_readings:
  - the master of the sheep
  rationale: The phrase identifies God within the Animal Apocalypse's shepherding allegory. 'Lord' preserves both authority and elevated register, while avoiding reduction to a merely human owner.
  doctrine_reference: Translate titles; transliterate names. Original-language primacy over translation tradition.
