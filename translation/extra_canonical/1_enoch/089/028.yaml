theological_decisions:
- issue: Identity of 'the Lord of the sheep'
  chosen_reading: Render as 'the Lord of the sheep' without interpretive expansion
  alternative_readings:
  - God, the shepherd of Israel
  - the owner of the sheep
  rationale: The Animal Apocalypse uses animal imagery with stable symbolic roles. The title clearly refers to the divine figure overseeing the flock, but the translation should preserve the vision's own metaphor rather than replacing it with an explanatory gloss.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten into generic religious prose.
- issue: Meaning of the sheep opening their eyes
  chosen_reading: Retain the literal-visionary wording 'began to open their eyes and to see'
  alternative_readings:
  - they became aware
  - they came to understanding
  rationale: The phrase likely carries symbolic awakening, but the text presents it through animal imagery. The translation preserves the theological tension between literal dream image and symbolic perception.
  doctrine_reference: Preserve theological tension rather than resolve it.
