lexical_decisions:
- source_word: አባግዕሰ
  chosen: those sheep
  alternatives:
  - the sheep
  - those flock-animals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative/enclitic force is best preserved by 'those sheep,' maintaining the visionary reference back to the previously mentioned group.
- source_word: ኃለፉ እምዝኩ ማይ
  chosen: passed from that water
  alternatives:
  - crossed over from that water
  - went on from that water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks movement away from a prior watery location. 'Passed from' is natural English while preserving the directional sense without over-specifying a crossing.
- source_word: ውስተ በድው
  chosen: into a wilderness
  alternatives:
  - into the desert
  - into a wasteland
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this animal-vision context, 'wilderness' preserves biblical-apocalyptic resonance better than the more modern 'desert,' while not implying total sandscape.
- source_word: ኀበ አልቦ ማየ ወሣዕረ
  chosen: where there was no water and no grass
  alternatives:
  - where there was neither water nor pasture
  - where there was no water or herbage
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The line stresses deprivation in terms fitting sheep. 'Grass' is straightforward and vivid; 'pasture' is possible but slightly more interpretive.
- source_word: አኃዙ ይክሥቱ አዕይንቲሆሙ
  chosen: they began to open their eyes
  alternatives:
  - they started to uncover their eyes
  - they began to have their eyes opened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom signals the onset of perception or awakening. 'Began to open their eyes' keeps both the literal animal imagery and the symbolic awakening.
- source_word: ይሬእዩ
  chosen: to see
  alternatives:
  - and saw
  - to perceive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Following ''began,'' the infinitival sense in English is smoother: ''began to open ... and to see.'' This preserves the progressive awakening motif.'
- source_word: እግዚኦሙ ለአባግዕ
  chosen: the Lord of the sheep
  alternatives:
  - their lord, the lord of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard title in the Animal Apocalypse for God in relation to the flock. It should be translated, not paraphrased, and kept distinct from later Christian title formulas.
- source_word: ይርዕዮሙ
  chosen: shepherding them
  alternatives:
  - pasturing them
  - feeding them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal imagery is explicitly pastoral. 'Shepherding' preserves the active oversight of the flock better than the narrower 'feeding.'
- source_word: ይሁቦሙ ማየ ወሣዕረ
  chosen: giving them water and grass
  alternatives:
  - providing them water and pasture
  - giving them water and fodder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This directly reverses the deprivation of the wilderness. 'Giving' mirrors the simple verbal action of the Ge'ez.
- source_word: ዝኩ በግዕ
  chosen: that sheep
  alternatives:
  - this sheep
  - the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative points to a specific sheep already active in the vision, likely the leading sheep of the narrative sequence. 'That sheep' preserves the deictic force.
- source_word: እንዘ የሐውር ወይመራሖሙ
  chosen: was going and leading them
  alternatives:
  - went and led them
  - was walking and guiding them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction suggests ongoing action in the vision. 'Was going and leading them' preserves the scene-like movement without collapsing it into a simple past event.
