    reason: previous_rendering
lexical_decisions:
- source_word: ዲቤሁ
  chosen: on it
  alternatives:
  - upon it
  - over it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locative preposition with pronominal suffix; 'on it' is natural English and preserves the image of water coming upon a previously mentioned object/scene.
- source_word: ማይ
  chosen: water
  alternatives:
  - waters
  - floodwater
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular appears repeatedly in the verse. English can keep 'water' as a mass noun without forcing the more interpretive 'floodwater,' though the context clearly suggests inundation.
- source_word: ጽልመት
  chosen: darkness
  alternatives:
  - gloom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering that preserves the ominous apocalyptic atmosphere.
- source_word: ጊሜ
  chosen: mist
  alternatives:
  - fog
  - cloud-mass
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term appears in a weather/obscuration sequence with water and darkness. 'Mist' is vivid and restrained; 'fog' is possible but slightly more prosaic.
- source_word: አሬኢ
  chosen: I looked
  alternatives:
  - I saw
  - I gazed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: First-person visionary narration often uses seeing language; 'I looked' fits the immediate syntax with the following object ('the height of that water') and preserves the dream-report style.
- source_word: መልዕልተ
  chosen: height
  alternatives:
  - upper part
  - surface level
  - top
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes what is above or the upper extent. 'Height' works both in 'I looked at the height of that water' and 'rose above,' preserving the vertical imagery.
- source_word: ተላዐለ
  chosen: rose above
  alternatives:
  - went up above
  - was lifted above
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verb of ascent/elevation. 'Rose above' is idiomatic and keeps the flood imagery active.
- source_word: ዐጸድ
  chosen: enclosure
  alternatives:
  - yard
  - court
  - fold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse this term can denote an enclosed area associated with the sheep imagery. 'Enclosure' is broad enough to preserve the symbolic setting without over-specifying 'sheepfold' where the verse itself does not explicitly say so.
- source_word: ይከዑ
  chosen: it poured over
  alternatives:
  - it flowed over
  - it fell upon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The action describes water moving over the enclosure. 'Poured over' conveys force and inundation better than the flatter 'flowed over.'
- source_word: ቆመ
  chosen: stood
  alternatives:
  - settled
  - remained
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common Semitic/Ethiopic way to describe something taking its place or remaining. 'Stood upon the earth' preserves the stark, visionary diction.
