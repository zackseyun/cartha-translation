theological_decisions:
- issue: Whether to make the flood imagery explicit in the main text
  chosen_reading: Retain the repeated 'water' rather than interpretively rendering 'floodwaters.'
  alternative_readings:
  - floodwaters
  - the flood
  rationale: The context strongly suggests deluge imagery, but the Ge'ez repeatedly says 'water.' Preserving that wording keeps the translation closer to the witness while allowing readers to perceive the flood symbolism from context.
  doctrine_reference: Translation philosophy §1, §3
- issue: How specifically to render ዐጸድ in this symbolic vision
  chosen_reading: enclosure
  alternative_readings:
  - sheepfold
  - court
  - yard
  rationale: Because the Animal Apocalypse uses animal symbolism, 'sheepfold' is tempting, but this verse alone does not require that narrower gloss. 'Enclosure' preserves the image without over-interpreting the symbol.
  doctrine_reference: Translation philosophy §3, §4
