translation:
  text: And water, and darkness, and mist increased upon it; and I looked at the height of that water, and that water rose above that enclosure, and it poured over the enclosure and stood upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fog.' The Ge'ez term denotes a vaporous obscurity accompanying the water and darkness.
    reason: lexical_alternative
  - marker: b
    text: The repeated singular 'water' likely carries flood imagery in context, but the translation keeps the Ge'ez wording rather than making that interpretation explicit.
    reason: cultural_note
  - marker: c
    text: '''Enclosure'' may refer more specifically to a fold or fenced court within the vision''s animal symbolism.'
    reason: lexical_alternative
  - marker: d
