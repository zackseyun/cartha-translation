theological_decisions:
- issue: Divine non-intervention toward the shepherds
  chosen_reading: The speaker declares that the shepherds were neither informed, shown,
    nor rebuked at this stage; instead their deeds are to be recorded for later reckoning.
  alternative_readings:
  - The line could be read as addressed to another figure ('you did not show them'),
    softening direct divine first-person involvement.
  rationale: 'The verse fits the Animal Apocalypse''s theme of deferred judgment:
    wrongdoing is not immediately interrupted but meticulously recorded for eventual
    divine review.'
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    mute judgment imagery.
