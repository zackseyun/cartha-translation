translation:
  text: And let them not know, and do not show them, and do not rebuke them; but write
    down all the destruction of the shepherds, each one in its time, and bring all
    of it up before me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic wording is difficult in the final clause. The verb can suggest
      'bring up' or 'present.' The translation keeps the upward imagery of heavenly
      presentation.
    reason: lexical_alternative
  - marker: b
    text: The distributive phrase after 'in its time' is textually awkward in the
      OCR witness; the sense appears to be sequential or item-by-item accounting.
    reason: textual_variant
  - marker: c
    text: Or 'And they did not know, and I did not show them, and I did not rebuke
      them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወኢያእምሩ
  chosen: and they did not know
  alternatives:
  - and they did not understand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The negative imperfect/plural naturally yields 'they did not know.' 'Understand'
    is possible, but the immediate sequence of withheld disclosure favors straightforward
    knowledge.
- source_word: ወኢታርእዮሙ
  chosen: and I did not show them
  alternatives:
  - and you did not show them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the verb 'to show/let see.' The surrounding first-person speech
    later in the verse ('before me') supports taking this as first-person singular
    in the vision report rather than second-person.
- source_word: ወኢትዝለፎሙ
  chosen: and I did not rebuke them
  alternatives:
  - and I did not censure them
  - and I did not blame them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries the sense of reproach or rebuke. 'Rebuke' preserves
    the judicial tone of the scene better than softer English options.
- source_word: አላ፡ ጸሐፍ
  chosen: but write down
  alternatives:
  - but write
  - rather, write
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adversative plus imperative shifts from non-intervention to commanded
    recordkeeping. 'Write down' is idiomatic and preserves the documentary force.
- source_word: ኵሎ፡ ሐጕለ፡ ኖላዊያን
  chosen: all the destruction of the shepherds
  alternatives:
  - all the ruin of the shepherds
  - all the downfall of the shepherds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes destruction/ruin. In the Animal Apocalypse, the shepherds
    are judged agents, so 'destruction' keeps the severe apocalyptic sense.
- source_word: በጊዜሁ፡ ለለ፡ ፩፩
  chosen: each one in its time
  alternatives:
  - one by one at its appointed time
  - each at its time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase combines temporal specification with distributive force. 'Each
    one in its time' preserves both sequence and appointment without overexplaining
    the numeral notation in the OCR.
- source_word: ወአዐርግ፡ ኵሎ፡ ኀቤየ
  chosen: and bring all of it up before me
  alternatives:
  - and present it all before me
  - and cause it all to ascend to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally suggests causing to ascend/bringing up. In context
    of heavenly accounting, 'bring all of it up before me' preserves the vertical
    imagery better than the flatter 'present.'
