theological_decisions:
- issue: Meaning of restored/opened eyes in the Animal Apocalypse
  chosen_reading: Retain the literal visionary image of opened eyes without specifying whether it means repentance, understanding, or political restoration.
  alternative_readings:
  - their understanding was enlightened
  - their sight was restored in a purely literal sense
  rationale: The Animal Apocalypse regularly uses animal and sensory imagery symbolically. The translation preserves the image and leaves its interpretive range open rather than resolving it into a single theological meaning.
  doctrine_reference: Preserve theological tension rather than resolve it.
