translation:
  text: And sometimes their eyes were opened, and sometimes they were blinded, until another sheep arose and led them and brought them all back, and their eyes were opened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The repeated image of eyes being opened likely carries symbolic force in the vision—awakening, recognition, or restored discernment—but the text itself leaves the image unexpanded.
    reason: cultural_note
  - marker: b
    text: The clause 'brought them all in' may also be understood as 'gathered them all together,' depending on how the Ge'ez verb is taken.
    reason: lexical_alternative
  - marker: c
    text: Or 'And there were some whose eyes were being opened, and there were some who were blind, until another sheep arose and led them and brought them all in'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሰበ
  chosen: some
  alternatives:
  - many
  - a group
  lexicon: Dillmann
  rationale: Indefinite plural sense fits the repeated construction 'there were some ... and there were some ...' without overstating quantity.
- source_word: ይትከሠታ አዕይንቲሆሙ
  chosen: whose eyes were being opened
  alternatives:
  - their eyes were opened
  - their eyes became clear
  lexicon: Dillmann
  rationale: The verbal form suggests an opening/uncovering of the eyes; the progressive English preserves the ongoing contrast with the following group.
- source_word: ይጼልሙ
  chosen: were blind
  alternatives:
  - were darkened
  - could not see
  lexicon: Dillmann
  rationale: In this animal-vision context the idiom concerns lack of sight or perception. 'Were blind' is the clearest and strongest rendering, while 'darkened' is preserved as a possible nuance.
- source_word: ተንሥአ ካልእ በግዕ
  chosen: another sheep arose
  alternatives:
  - another ram arose
  - another sheep stood up
  lexicon: Dillmann
  rationale: The animal symbol should be preserved literally. 'Arose' matches the visionary succession formula better than the flatter 'appeared' or 'stood up.' 'Sheep' is retained as the broad animal term unless context specifically requires a sexed animal.
- source_word: መርሖሙ
  chosen: led them
  alternatives:
  - guided them
  - shepherded them
  lexicon: Dillmann
  rationale: A straightforward leadership verb is best here. 'Shepherded' would add pastoral coloring not explicit in the verb itself, though the animal imagery already implies it.
- source_word: አግብኦሙ ለኵሎሙ
  chosen: brought them all in
  alternatives:
  - gathered them all
  - brought them all together
  lexicon: Dillmann
  rationale: The verb appears to denote causing them to come in or be brought together. 'Brought them all in' preserves the directional force while remaining readable.
- source_word: ተከሥታ አዕይንቲሆሙ
  chosen: their eyes were opened
  alternatives:
  - their eyes were uncovered
  - their sight was restored
  lexicon: Dillmann
  rationale: The repeated eye-opening motif is central to the vision's symbolism. 'Were opened' is both literal and idiomatic, and avoids over-interpreting the result as merely physical or purely spiritual.
