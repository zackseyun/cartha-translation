translation:
  text: 'And thus in the vision I saw that one who wrote: how he wrote down all that was destroyed by those shepherds, day by day; and he brought up, and laid down, and showed that whole book to the Lord of the sheep, all that they had done, and all that each one of them had put away, and all whom they had given over to destruction.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'had put away' is lexically difficult in the Ethiopic witness and may refer more specifically to what each shepherd had removed or caused to disappear from the flock.
    reason: lexical_alternative
  - marker: b
    text: The repeated writing and presentation imagery depicts a heavenly record of the shepherds' actions brought before the divine court.
    reason: cross_reference
  - marker: c
    text: Or 'he wrote down every one of those shepherds, day by day, who was destroyed from among them'.
    reason: previous_rendering
  - marker: d
    text: Or 'and he went up and laid it all before the Lord of the sheep, and showed him all'.
    reason: previous_rendering
lexical_decisions:
- source_word: ርኢክዎ
  chosen: I saw
  alternatives:
  - I looked at him
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard visionary reporting verb; simple past 'I saw' preserves apocalyptic narration without archaizing.
- source_word: ዘይጽሕፍ
  chosen: one who wrote
  alternatives:
  - the one writing
  - the scribe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The participial form identifies the heavenly recorder by function. 'One who wrote' stays close to the Ge'ez without over-specifying an office not explicit in the verse.
- source_word: እፎ ይጽሕፍ
  chosen: he wrote down
  alternatives:
  - he was writing
  - he recorded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repetition of the writing verb is emphatic. 'Wrote down' conveys documentary action and keeps the judicial-record motif.
- source_word: ዘይትሐጐል
  chosen: who was destroyed
  alternatives:
  - who perished
  - who was annihilated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The root concerns destruction/perishing. 'Destroyed' fits the Animal Apocalypse's judgment imagery and the passive sense in context.
- source_word: እምነ ዝኩ ኖላዊያን
  chosen: from among those shepherds
  alternatives:
  - from those shepherds
  - out of those shepherds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks separation from the group of shepherds already in view. 'From among' makes the distributive/judicial sense clearer.
- source_word: በኵሉ ዕለት
  chosen: day by day
  alternatives:
  - every day
  - on each day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This idiom suggests ongoing, itemized record-keeping. 'Day by day' preserves the repetitive force.
- source_word: ያዓርግ
  chosen: he went up
  alternatives:
  - he ascended
  - he brought up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In visionary context the motion is upward toward the divine court. 'Went up' is natural English while retaining the vertical imagery.
- source_word: ያዓርፍ
  chosen: laid it
  alternatives:
  - set it down
  - presented it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely denotes placing or setting the written record before the divine figure. 'Laid it all before' preserves the courtroom/presentation scene.
- source_word: ያርኢ ኵሎ ኪያሁ መጽሐፈ
  chosen: showed him all
  alternatives:
  - made him see everything
  - displayed the whole record to him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is disclosure of the contents of the book. 'Showed him all' is concise and fits the sequence of reporting.
- source_word: ለእግዚአ አባግዕ
  chosen: to the Lord of the sheep
  alternatives:
  - before the Lord of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key Animal Apocalypse title for God. It should be translated, not paraphrased, preserving the allegorical imagery.
- source_word: ዘገብሩ
  chosen: what they had done
  alternatives:
  - what they did
  - their deeds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward deed-report formula; the pluperfect fits the narrative sequence of written review before divine judgment.
- source_word: ዘአእተተ
  chosen: had put away
  alternatives:
  - had removed
  - had cast aside
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult, but likely refers to what each shepherd had removed from the flock. 'Put away' is broad enough to preserve ambiguity without flattening the image.
- source_word: ዘመጠዉ ለሐጕል
  chosen: had given over to destruction
  alternatives:
  - had delivered to be destroyed
  - had handed over to ruin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'This phrase intensifies culpability: not merely loss, but active surrender to destruction. ''Given over to destruction'' preserves the judicial and violent force.'
