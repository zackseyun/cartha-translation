theological_decisions:
- issue: Identity of the writing figure
  chosen_reading: A heavenly recorder/scribe figure who documents the shepherds' conduct before God
  alternative_readings:
  - an angelic messenger generally
  - Enoch himself as recorder
  rationale: The verse presents a distinct figure characterized by writing, ascending, and presenting the record to the Lord of the sheep. The judicial-book imagery is central and should remain explicit without over-identifying the figure beyond the text.
  doctrine_reference: Preserve apocalyptic imagery and do not flatten heavenly court scenes into generic prose.
- issue: Referent of 'Lord of the sheep'
  chosen_reading: God depicted within the animal allegory
  alternative_readings:
  - a generic master figure within the dream only
  rationale: Within the Animal Apocalypse this title functions as the allegorical designation for the divine judge and owner of the flock. Translating the title directly preserves the theological imagery of divine oversight and judgment.
  doctrine_reference: Translate titles for meaning and preserve local passage imagery.
