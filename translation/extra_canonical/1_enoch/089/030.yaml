theological_decisions:
- issue: Whether እግዚአ አባግዕ should be rendered with a generic title or as a divine
    designation
  chosen_reading: the Lord of the sheep
  alternative_readings:
  - the master of the sheep
  - the owner of the sheep
  rationale: Within the Animal Apocalypse this figure is the divine ruler represented
    within the sheep allegory. 'Lord' preserves the theological weight while still
    translating the title rather than paraphrasing it.
  doctrine_reference: Translate titles; preserve apocalyptic imagery; original-language
    primacy over translation tradition.
