translation:
  text: And among them I saw the Lord of the sheep, standing before them; and his
    appearance was great and fearsome and mighty, and all those sheep saw him and
    were afraid before his face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'were afraid before his face,' an idiom for fear in the immediate
      presence of the figure seen in the vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: እግዚአ አባግዕ
  chosen: the Lord of the sheep
  alternatives:
  - the master of the sheep
  - the owner of the sheep
  lexicon: Dillmann
  rationale: እግዚአ commonly denotes lord/master. In the Animal Apocalypse this title
    identifies God in the shepherding/ownership imagery, so 'Lord of the sheep' preserves
    both authority and the vision's animal symbolism better than a flatter 'master'
    or 'owner'.
- source_word: ዘቆመ ቅድሜሆሙ
  chosen: standing before them
  alternatives:
  - who stood before them
  - having taken his stand before them
  lexicon: Dillmann
  rationale: The relative construction with ቆመ is straightforward. 'Standing before
    them' keeps the vivid visionary scene without over-formalizing the syntax.
- source_word: ራእዩ
  chosen: his appearance
  alternatives:
  - his aspect
  - his form
  lexicon: Dillmann
  rationale: Here the noun from the seeing/root refers to what was seen of him, not
    the act of seeing. 'Appearance' is natural English and preserves the visual emphasis
    of the dream report.
- source_word: ዐቢይ
  chosen: great
  alternatives:
  - large
  - majestic
  lexicon: Dillmann
  rationale: The adjective can denote greatness in scale or status. 'Great' preserves
    the ambiguity and pairs well with the following descriptors.
- source_word: ግሩም
  chosen: fearsome
  alternatives:
  - terrible
  - awesome
  - dreadful
  lexicon: Dillmann
  rationale: The term conveys awe and dread. 'Fearsome' preserves the numinous terror
    of the vision without importing later liturgical phrasing; 'terrible' in modern
    English can mislead.
- source_word: ኃያል
  chosen: mighty
  alternatives:
  - powerful
  - strong
  lexicon: Dillmann
  rationale: A standard rendering for strength/power language. 'Mighty' fits the elevated
    apocalyptic register.
- source_word: ኵሎሙ ዝኩ አባግዕ
  chosen: all those sheep
  alternatives:
  - all the sheep
  - all these sheep
  lexicon: Dillmann
  rationale: The demonstrative element is worth preserving. 'Those sheep' reflects
    the narrator's reference to the group already in view.
- source_word: ፈርሁ እምገጹ
  chosen: were afraid before his face
  alternatives:
  - feared at his presence
  - were afraid because of his face
  - were terrified before him
  lexicon: Dillmann
  rationale: The idiom literally involves fear in relation to his face/presence. The
    main text keeps the concrete biblical imagery 'before his face' rather than reducing
    it to a generic 'before him.'
