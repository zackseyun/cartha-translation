theological_decisions:
- issue: Referent of 'their lord' in the allegory
  chosen_reading: their lord refers to the sheep's leader within the vision, not a
    direct divine title in this clause
  alternative_readings:
  - a direct reference to the Lord God
  - an intentionally ambiguous overlap between the animal leader and divine guidance
  rationale: The immediate syntax links 'their lord' with 'while he was leading them,'
    which in the Animal Apocalypse commonly tracks the allegorical leader of the flock.
    Retaining 'lord' rather than capitalizing 'Lord' preserves the narrative level
    and avoids over-resolving the allegory.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
