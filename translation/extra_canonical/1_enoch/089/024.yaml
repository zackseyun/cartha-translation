translation:
  text: And that pool of water was split, and the water stood on this side and on
    that side before their faces; and their Lord, while he was leading them, stood
    between them and the wolves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'watercourse' or 'channel of water.' The Ge'ez expression points to a
      bounded course of water rather than water in general.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'before their faces' is more literally 'before their faces';
      the English could also be simplified to 'before them.'
    reason: lexical_alternative
  - marker: c
    text: The final clause likely means that the standing water formed a barrier separating
      the flock from the wolves.
    reason: cultural_note
  - marker: d
    text: Or 'and before their lord, while he was leading them; and it stood between
      them and between the wolves.'.
    reason: previous_rendering
  - marker: e
    text: Or 'water-channel'.
    reason: previous_rendering
lexical_decisions:
- source_word: ዐይገ ማይ
  chosen: water-channel
  alternatives:
  - watercourse
  - stream-bed
  - channel of water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a defined course or passage of water rather than water
    in the abstract. 'Water-channel' preserves the concrete visionary image and fits
    the following description of waters standing on both sides.
- source_word: ተሠጠ
  chosen: was split
  alternatives:
  - was divided
  - was cleft
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests a rending or dividing. 'Was split' is vivid but still
    natural English, preserving the Exodus-like apocalyptic imagery without importing
    canonical phrasing.
- source_word: ቆመ ማይ
  chosen: the water stood
  alternatives:
  - the water halted
  - the water was stationary
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated verb 'stood' should be retained for the visionary effect.
    It evokes water held in place, not merely slowed or stopped.
- source_word: እምዝየ ወእምዝየ
  chosen: on this side and on that side
  alternatives:
  - here and there
  - from this side and from that side
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This distributive pair marks the waters as standing on both sides. The
    chosen rendering is idiomatic and spatially clear.
- source_word: በቅድመ ገጾሙ
  chosen: before their faces
  alternatives:
  - before them
  - in front of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'before their faces.' I preserve the more concrete wording
    because the dream vision often uses bodily imagery. English still remains readable.
- source_word: እግዚኦሙ
  chosen: their lord
  alternatives:
  - their master
  - their ruler
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse this term refers within the allegory to the
    leader of the sheep, not necessarily directly to God in this clause. 'Lord' preserves
    the authority relation while allowing the allegorical level to stand.
- source_word: እንዘ ይመራሖሙ
  chosen: while he was leading them
  alternatives:
  - as he led them
  - while guiding them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is durative/contemporaneous. 'While he was leading them'
    preserves the ongoing action during the miracle.
- source_word: ማእከሎሙ ወማእከለ አዝእብት
  chosen: between them and between the wolves
  alternatives:
  - in their midst and in the midst of the wolves
  - between them and the wolves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The sense is separation: the standing water forms a barrier between
    the sheep and the wolves. I render the repeated preposition smoothly but keep
    the dual relation explicit.'
