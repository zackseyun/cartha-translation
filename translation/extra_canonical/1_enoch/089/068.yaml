translation:
  text: And the shepherds and their companions handed over those sheep to all the wild beasts of the desert, so that they might devour them; and all of them, each in its time, was delivered over by number—sixty from among them—while the record of the others was written down in the book, how many were destroyed from among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The numeral and surrounding accounting language are difficult in this witness. The Ethiopic OCR appears to read 'sixty,' but the line may preserve a corrupt or uncertain tally. The verse's main point is that the sheep were handed over under a counted and recorded reckoning.
    reason: textual_variant
  - marker: b
    text: Literally 'written in the book,' continuing the vision's theme that the destruction is not only permitted but also recorded.
    reason: cross_reference
  - marker: c
    text: '''By tale'' means by numerical reckoning or count.'
    reason: lexical_alternative
  - marker: d
    text: Or 'by tale'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኖላዊያን
  chosen: the shepherds
  alternatives:
  - the keepers
  - the herdsmen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, the appointed angelic overseers are regularly figured as shepherds. 'Shepherds' preserves the vision's governing metaphor better than a flatter administrative term.
- source_word: ጸማዶሙ
  chosen: their companions
  alternatives:
  - their associates
  - those with them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form indicates those joined with or accompanying the shepherds. 'Companions' is natural English and preserves the sense of associated agents without overdefining their role.
- source_word: መጠውዎሙ
  chosen: handed over
  alternatives:
  - delivered over
  - gave over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys transfer into another's power. 'Handed over' keeps the judicial/apocalyptic force and avoids softening the action.
- source_word: እእኩ አባግዕ
  chosen: those sheep
  alternatives:
  - those flock-animals
  - those sheep of the flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this vision the people symbolized are sheep. 'Those sheep' is the most direct and idiomatic rendering.
- source_word: አራዊተ ገዳም
  chosen: the wild beasts of the desert
  alternatives:
  - the beasts of the wilderness
  - the wild animals of the wasteland
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is a stock image of predatory wilderness creatures. 'Wild beasts of the desert' preserves the apocalyptic menace and the concrete imagery.
- source_word: ከመ ይብልዕዎሙ
  chosen: so that they might devour them
  alternatives:
  - that they might eat them
  - to consume them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The purpose/result clause points to predatory destruction. 'Devour' fits the animal imagery and the violence of the scene.
- source_word: በጊዜሁ
  chosen: each in its time
  alternatives:
  - at its time
  - in its appointed time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase suggests a sequential or allotted timing in the accounting of destruction. 'Each in its time' reflects the distributive sense in context.
- source_word: በኍልቍ
  chosen: by tale
  alternatives:
  - by number
  - by count
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term appears to concern numerical reckoning or tallying. Because the exact nuance is difficult in this OCR-based witness, 'by tale' preserves the counting idea in elevated but intelligible English.
- source_word: ይትሜጠው
  chosen: was delivered over
  alternatives:
  - was handed over
  - was given up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This passive/reflective form likely continues the handing-over motif. Repeating 'delivered over' preserves the judicial rhythm of the verse.
- source_word: ፷፻ እምኔሆሙ
  chosen: sixty from among them
  alternatives:
  - seventy from among them
  - a numbered group from among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral in the OCR is difficult and may reflect a textual or parsing problem. I render the visible numeral conservatively while flagging uncertainty in a footnote.
- source_word: ለካልኡ በመጽሐፍ ይጸሐፍ
  chosen: the record of the others was written down in the book
  alternatives:
  - the others were written in the book
  - for the others it was inscribed in the book
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause shifts to written accounting. Expanding slightly to 'the record of the others' makes the English readable while preserving the bookkeeping/judgment motif.
- source_word: ሚመጠነ ያሐጕል እምኔሆሙ
  chosen: how many were destroyed from among them
  alternatives:
  - what number perished from among them
  - how many were lost from among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is numerical reckoning of losses. 'Destroyed' fits the violent context better than the softer 'lost.'
