theological_decisions:
- issue: Identity of the 'shepherds'
  chosen_reading: The shepherds are left as visionary shepherds rather than interpreted in the translation as human rulers or angels.
  alternative_readings:
  - angelic overseers
  - foreign rulers appointed for judgment
  rationale: The Animal Apocalypse uses sustained symbolic imagery. The translation should preserve the image in the main text and not collapse it into one historical interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve apocalyptic imagery.
