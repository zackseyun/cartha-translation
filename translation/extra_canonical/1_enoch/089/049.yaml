translation:
  text: And those sheep grew and multiplied, and all those dogs and foxes and wild boars of the field feared and fled from them. And that ram And those sheep multiplied and became many, and all those dogs and foxes and wild boars of the field feared and fled from them. And that ram gored and killed all the beasts, and those beasts were no longer able again to be in the midst of the sheep, and they did not seize anything from them. and killed all the beasts, and those beasts were no longer able again to be in the midst of the sheep, and they did not seize anything from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The animal term rendered 'foxes' may denote a fox-like scavenger; 'jackals' is a possible alternative.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'wild boars of the field' could also be understood more broadly as wild swine of the wilderness.
    reason: lexical_alternative
  - marker: c
    text: The final clause stresses that the hostile beasts no longer carried off anything from the sheep.
    reason: cultural_note
  - marker: d
