  rationale: 'Adjudicator-modified: The Ge''ez verb ጐድአ (gʷadʾa) broadly means ''to strike'' or ''beat'', but when applied to horned animals, it specifically means ''to butt'' or ''gore'' (Leslau, CDG 181). Given the strict zoomorphic code of the Animal Apocalypse, translating the action of the ram (ሐርጌ) as ''gored'' rather than the generic ''struck'' is more precise and consistent with the allegory. I am modifying the suggestion only to output the full verse text.'
