    reason: previous_rendering
lexical_decisions:
- source_word: ልህቁ / በዝኁ
  chosen: multiplied and became many
  alternatives:
  - increased and abounded
  - grew and multiplied
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs are near-synonymous and intensify the growth of the sheep. Rendering both preserves the repetitive apocalyptic style rather than collapsing them into a single English verb.
- source_word: አባግዕ
  chosen: sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse the animal imagery should remain concrete. 'Sheep' preserves the vision image better than the more abstract 'flock'.
- source_word: አክላብ
  chosen: dogs
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward animal term; retained literally to preserve the allegorical cast of the vision.
- source_word: ቈናጽል
  chosen: foxes
  alternatives:
  - jackals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is commonly understood as a fox-like scavenger/predator. 'Foxes' is the more natural English rendering, while the zoological precision is uncertain enough to note as an alternative.
- source_word: ሐራዊያ ገዳም
  chosen: wild boars of the field
  alternatives:
  - wild swine of the wilderness
  - boars of the desert
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes wild swine/boars in an uncultivated place. 'Of the field' is idiomatic biblical English and fits the predatory-animal catalog without over-specifying geography.
- source_word: ፈርሁ ወነፍጹ እምኔሁ
  chosen: feared and fled from them
  alternatives:
  - were afraid and escaped from them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The two verbs mark both inner fear and outward retreat. Keeping both preserves the narrative force.
- source_word: ሐርጌ
  chosen: ram
  alternatives:
  - male sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular leader-animal in this context is best rendered 'ram,' preserving the concrete image and likely leadership symbolism.
- source_word: ጐድአ
  chosen: struck
  alternatives:
  - gored
  - smote
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates a forceful attack. 'Struck' is clear modern English; 'gored' may be too specific unless the horn-action is explicit.
- source_word: አራዊተ / አራዊት
  chosen: beasts
  alternatives:
  - wild beasts
  - animals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic animal imagery, 'beasts' carries the hostile and untamed sense better than the generic 'animals.'
- source_word: አክህሉ ዳግመ
  chosen: were no longer able again
  alternatives:
  - could not any longer
  - were unable thereafter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase expresses renewed incapacity after the ram's action. The English is slightly smoothed to 'were no longer able again' in order to preserve both the sense of inability and the iterative marker.
- source_word: ማእከለ አባግዕ
  chosen: to be in the midst of the sheep
  alternatives:
  - to remain among the sheep
  - to enter among the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''In the midst of'' preserves the spatial imagery of hostile beasts no longer occupying the sheep''s space.'
- source_word: ምንትኒ ገሙራ ኢመሠጡ እምኔሆሙ
  chosen: they did not seize anything from them
  alternatives:
  - they took nothing more from them
  - they snatched nothing at all from them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The closing clause emphasizes complete cessation of predation or plunder. 'Seize' fits the violent animal context better than the neutral 'take'.
