theological_decisions:
- issue: Whether the sheep-man figure's lying down should be interpreted explicitly
    as death
  chosen_reading: Retain the literal visionary wording 'lay down' in the main text
  alternative_readings:
  - render explicitly as 'died'
  - render as 'fell asleep'
  rationale: The Animal Apocalypse communicates through symbolic animal imagery. Since
    the Ge'ez verb itself can remain literal, the main text preserves the image while
    allowing readers to infer the death of the leader from context.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten apocalyptic imagery.
