translation:
  text: And when they saw the Lord of the sheep, And when they saw the Lord of the sheep, they turned back so as to flee from before his face; and that watercourse gathered together, and it became swift according to its nature, and it filled with water and rose up until it covered those wolves. so as to flee from before his face; and that watercourse gathered together, and it became swift according to its nature, and it filled with water and rose up until it covered those wolves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that channel of water' or 'that torrent-bed'; the Ge'ez term likely refers to a stream-course that suddenly swells.
    reason: lexical_alternative
  - marker: b
    text: Or 'rose up to cover those wolves.' The final phrase may refer either to the flood reaching the wolves' covering/shelter or to the waters covering the wolves themselves.
    reason: alternative_reading
  - marker: c
    text: Or 'they entered'.
    reason: previous_rendering
  - marker: d
    text: Or 'as far as the covering of those wolves'.
    reason: previous_rendering
lexical_decisions:
- source_word: እግዚኦሙ ለአባግዕት
  chosen: the Lord of the sheep
  alternatives:
  - their Lord, the sheep's Lord
  - the master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construct presents the ruler/owner in relation to the sheep. 'Lord' preserves the elevated theological register and the recurring Animal Apocalypse imagery better than 'master.'
- source_word: ገብኡ
  chosen: they entered
  alternatives:
  - they went in
  - they came in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic motion verb is 'enter.' I retain it rather than smoothing to a more interpretive verb, even though the exact place entered is implicit from context.
- source_word: ከመ ይጕየዩ እምቅድመ ገጹ
  chosen: so as to flee from before his face
  alternatives:
  - that they might run from before him
  - to escape from his presence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom 'from before his face' is preserved because it is a standard Semitic-style expression for presence and judgment, fitting the apocalyptic scene better than the flatter 'from him.'
- source_word: ዝኩ ዐይገ ማይ
  chosen: that watercourse
  alternatives:
  - that channel of water
  - that torrent-bed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a stream, channel, or watercourse. 'Watercourse' is vivid and flexible, allowing the following description of swelling floodwaters without over-specifying the topography.
- source_word: ተጋብአ
  chosen: gathered together
  alternatives:
  - was collected
  - came together
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the image of waters massing or collecting before surging.
- source_word: ከመ ፍጥረቱ ፍጡነ
  chosen: swift according to its nature
  alternatives:
  - rapid as was its nature
  - impetuous by its very kind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The wording is somewhat difficult, but it appears to describe the watercourse becoming rapid in keeping with its natural character. I preserve the slightly unusual phrasing rather than over-interpret.
- source_word: መልአ ማይ
  chosen: filled with water
  alternatives:
  - became full of water
  - was filled by water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of the flood image.
- source_word: ተላዐለ እስከ ከደኖሙ ለእልኩ አዝእብት
  chosen: rose up as far as the covering of those wolves
  alternatives:
  - rose up to cover those wolves
  - rose as high as the shelter of those wolves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun appears to refer to a covering, concealment, or shelter. Because the exact nuance is uncertain, I keep the more literal 'covering' and note the possible alternative in a footnote rather than deciding too strongly in the main text.
