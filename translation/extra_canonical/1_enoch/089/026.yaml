- issue: Presence idiom in a judgment scene
  chosen_reading: from before his face
  alternative_readings:
  - from before him
  - from his presence
  rationale: The more literal idiom preserves the force of divine appearance and terror in apocalyptic narrative. It is understandable in English and should not be flattened where the imagery is significant.
  doctrine_reference: 'Book context: preserve apocalyptic imagery; do not flatten visionary prose'
