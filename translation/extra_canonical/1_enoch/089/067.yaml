translation:
  text: And I grieved greatly because of the tower, for that house of the sheep had been torn down; and from among them I was not able to see those sheep, whether they entered into that house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez imagery moves between an 'enclosure' and a 'house of the sheep.' The translation preserves both rather than reducing them to a single term such as 'sheepfold.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'had been cut away' may also be understood more generally as 'had been destroyed' or 'removed.'
    reason: lexical_alternative
  - marker: c
    text: The final clause is difficult. It may mean either that the seer could not see those sheep at all, or specifically could not see whether they entered into that house.
    reason: alternative_reading
  - marker: d
    text: Or 'that enclosure'.
    reason: previous_rendering
  - marker: e
    text: Or 'had been cut away'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወሐዘንኩ
  chosen: and I grieved
  alternatives:
  - and I mourned
  - and I was distressed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb expresses sorrow or grief in a visionary report. 'Grieved' preserves the personal lament without becoming overly formal or emotive.
- source_word: ብዙኃ ጥቀ
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired intensifiers heighten the lament. 'Greatly' gives natural English while retaining emphatic force.
- source_word: ማኅፈድ
  chosen: enclosure
  alternatives:
  - fold
  - sheepfold
  - pen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes an enclosed place for animals. 'Enclosure' is slightly broader and fits the following apposition 'house of the sheep,' while avoiding premature narrowing where the imagery may overlap fold and house.
- source_word: ተከርየ
  chosen: had been cut away
  alternatives:
  - had been destroyed
  - had been torn down
  - had been removed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive sense suggests something cut off, hewn down, or removed. 'Cut away' preserves the concrete violence of the image better than the more generalized 'destroyed.'
- source_word: ቤት ዘአባግዐ
  chosen: house of the sheep
  alternatives:
  - sheep-house
  - house for the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The animal apocalypse regularly uses architectural imagery for Israel's cultic or communal structures. 'House of the sheep' keeps the metaphor transparent and close to the Ge'ez.
- source_word: ኢክህልኩ ርእዮቶሙ
  chosen: I was not able to see
  alternatives:
  - I could not see them
  - I was unable to behold them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This combines inability with perception. 'I was not able to see' preserves both the incapacity and the visual nature of the dream report.
- source_word: ለእልኩ አባግዕ
  chosen: those sheep
  alternatives:
  - the sheep
  - those particular sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative nuance is worth retaining because the seer refers back to a specific group within the vision.
- source_word: ይበውኡ
  chosen: entered
  alternatives:
  - went in
  - came in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion verb into the house. 'Entered' is concise and suitably elevated.
- source_word: ኀበ ዝኩ ቤት
  chosen: into that house
  alternatives:
  - to that house
  - within that house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition with motion naturally yields 'into.' Retaining 'that house' preserves the demonstrative reference within the vision.
