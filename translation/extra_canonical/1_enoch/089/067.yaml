theological_decisions:
- issue: Whether to render the sheep structure as 'fold' or 'house' imagery
  chosen_reading: 'Retain both images: ''enclosure'' and ''house of the sheep'''
  alternative_readings:
  - collapse both into 'sheepfold'
  - render both as 'house'
  rationale: The verse appears to juxtapose or appose two related images rather than flatten them into one. Preserving both keeps the symbolic architecture of the Animal Apocalypse visible and avoids over-interpreting the referent.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten symbolic language into generic prose.
- issue: Force of the damage to the sheep-house
  chosen_reading: '''had been cut away'''
  alternative_readings:
  - '''had been destroyed'''
  - '''had been torn down'''
  rationale: The Ge'ez suggests a more concrete act of cutting/removal than a generic statement of ruin. This preserves the vividness of the judgment scene without claiming more specificity than the witness warrants.
  doctrine_reference: Original-language primacy over translation tradition; preserve imagery.
