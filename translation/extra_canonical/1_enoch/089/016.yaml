translation:
  text: And a sheep that had been rescued from the wolves fled and passed into the
    wild asses of the wilderness, and I saw the sheep as they lamented and cried out
    and petitioned their Lord with all their strength, until that Lord of the sheep
    came down at the voice of the sheep from his lofty dwelling, and he came to them
    and saw them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'passed into the wild asses of the wilderness' is textually
      and syntactically difficult. It likely refers to the sheep moving into the region
      or company of another animal group within the vision rather than a simple landscape
      detail.
    reason: textual_variant
  - marker: b
    text: Or 'in response to the sheep's voice from their great outcry.' The clause
      after 'came down' is compressed in the Ge'ez.
    reason: lexical_alternative
  - marker: c
    text: Or 'And the sheep that had been rescued from the wolves fled and passed
      into the wild asses of the wilderness'.
    reason: previous_rendering
  - marker: d
    text: Or 'from their loud crying'.
    reason: previous_rendering
lexical_decisions:
- source_word: በግዕ
  chosen: the sheep
  alternatives:
  - a sheep
  - the flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, sheep imagery regularly represents the covenant
    people collectively. Singular/plural usage can be fluid, but here the following
    plural references to 'the sheep' support a collective sense rendered naturally
    in English as 'the sheep'.
- source_word: ዘድኅነ
  chosen: that had been rescued
  alternatives:
  - that was saved
  - that escaped
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative form points to a completed deliverance. 'Rescued' preserves
    the concrete danger of the vision better than the more generalized 'saved'.
- source_word: እምነ አዝእብት
  chosen: from the wolves
  alternatives:
  - out of the wolves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks separation from hostile predators. 'From the wolves'
    is the plain and vivid rendering fitting the animal symbolism.
- source_word: ነፈፀ
  chosen: fled
  alternatives:
  - escaped
  - sprang away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This verb conveys sudden movement away from danger. 'Fled' keeps the
    urgency without overinterpreting the exact manner of motion.
- source_word: ኀለፈ ውስተ አእዱገ ገዳም
  chosen: passed into the wild asses of the wilderness
  alternatives:
  - went among the wild donkeys of the desert
  - crossed into the wild asses in the wasteland
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult but appears to identify another animal group
    in the vision. 'Wild asses of the wilderness' preserves the zoological image and
    avoids collapsing it into a geographic abstraction.
- source_word: የአወይዉ
  chosen: lamented
  alternatives:
  - wailed
  - mourned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests audible distress. 'Lamented' fits the elevated register
    and pairs well with the following cries.
- source_word: ይጸርኁ
  chosen: cried out
  alternatives:
  - shouted
  - wailed aloud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard rendering for urgent appeal. It preserves the repeated prayer-cry
    motif in apocalyptic narrative.
- source_word: ይስእልዎ ለእግዚኦሙ
  chosen: petitioned their Lord
  alternatives:
  - asked their Lord
  - besought their master
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is more than a casual request in this context of distress. 'Petitioned'
    conveys earnest supplication, while 'Lord' fits project policy for እግዚእ/related
    lordship terms in a divine context.
- source_word: በኵሉ ኃይሎሙ
  chosen: with all their strength
  alternatives:
  - with all their might
  - with all their power
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This idiom intensifies the sheep's appeal. 'Strength' is idiomatic and
    preserves the totality of their exertion.
- source_word: እግዚአ አባግዕ
  chosen: that Lord of the sheep
  alternatives:
  - the master of the sheep
  - the lord of the flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key title in the Animal Apocalypse for God as sovereign over
    the flock. 'Lord of the sheep' preserves the repeated visionary designation and
    avoids flattening it into generic prose.
- source_word: ወረደ
  chosen: came down
  alternatives:
  - descended
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The downward motion is theologically significant in a heavenly intervention
    scene. 'Came down' is readable modern English while preserving the vertical imagery.
- source_word: ኀበ ቃሎሙ ለአባግዕ እም ጽርኁ ልዑል
  chosen: at the voice of the sheep from their loud crying
  alternatives:
  - because of the voice of the sheep from their high cry
  - in response to the sheep's voice from their great outcry
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The syntax is somewhat compressed. I render it as divine response to
    the sheep's audible outcry. 'Loud crying' captures ልዑል as intensifying the cry
    rather than introducing a separate title.
- source_word: ወበጽኀ ኀቤሆሙ
  chosen: and he came to them
  alternatives:
  - and he arrived among them
  - and he approached them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb marks arrival/approach after descent. 'Came to them' is simple
    and fits the sequence.
- source_word: ወርእዮሙ
  chosen: and saw them
  alternatives:
  - and looked upon them
  - and took notice of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plain verb 'saw' should be retained; in context it implies divine
    notice without importing interpretive expansion into the main text.
