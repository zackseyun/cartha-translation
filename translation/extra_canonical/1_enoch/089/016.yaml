theological_decisions:
- issue: Rendering the divine title in the Animal Apocalypse
  chosen_reading: Lord of the sheep
  alternative_readings:
  - master of the sheep
  - lord of the flock
  rationale: The title is part of the vision's symbolic system and should remain vivid
    and consistent. 'Lord' preserves divine sovereignty without domesticating the
    imagery.
  doctrine_reference: Translate titles; preserve theological tension rather than resolve
    it.
