theological_decisions:
- issue: Whether to soften the moral charge on the singled-out ram
  chosen_reading: which had sinned
  alternative_readings:
  - which had gone astray
  - which had offended
  rationale: The Animal Apocalypse uses animal imagery for covenantal and moral failure. The Ge'ez verb carries explicit sin-language, so the translation should not reduce it to mere error.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
