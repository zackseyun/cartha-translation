translation:
  text: And he called that ram which had sinned from among the sheep, and spoke with
    him about the wolves, so that he might hear against them, that they might not
    ravage the sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'so that he might hear against them' is textually and syntactically
      difficult. It may mean that the ram was warned about the wolves, or that he
      was made to hear a charge concerning them.
    reason: alternative_reading
lexical_decisions:
- source_word: ጸውዖ
  chosen: called
  alternatives:
  - summoned
  - cried out to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic verbal sense is to call or summon. 'Called' preserves the narrative
    simplicity without over-specifying authority level.
- source_word: በግዕ
  chosen: ram
  alternatives:
  - sheep
  - male sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, sex and species imagery are significant. Here
    the singular male sheep is best rendered 'ram' rather than the generic 'sheep'.
- source_word: ዘተኃጥአ
  chosen: which had sinned
  alternatives:
  - which had transgressed
  - which had done wrong
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the ordinary term for sin or transgression. 'Had sinned'
    keeps the moral force and matches the retrospective narrative frame.
- source_word: እምአዝእብት
  chosen: from among the sheep
  alternatives:
  - from the sheep
  - out from the flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks separation from the group. 'From among the sheep'
    makes the partitive sense clear.
- source_word: ተናገሮ በእንተ አዝእብት
  chosen: spoke with him about the wolves
  alternatives:
  - spoke to him concerning the wolves
  - addressed him regarding the wolves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase naturally means speaking to or with someone concerning a matter.
    'About the wolves' preserves the immediate object of concern in the vision.
- source_word: ከመ ይስምዕ ዲቤሆሙ
  chosen: so that he might hear against them
  alternatives:
  - so that he might listen concerning them
  - so that he might hear about them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is somewhat difficult. The preposition with the pronoun
    most naturally points toward hearing in relation to or against the wolves. I preserve
    the slightly sharp wording 'against them' to reflect the adversative force rather
    than smoothing it away.
- source_word: ኢይግስስዎሙ
  chosen: might not ravage
  alternatives:
  - might not tear apart
  - might not destroy
  - might not plunder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this animal-vision context the verb suggests violent attack or devastation.
    'Ravage' fits the predatory imagery without becoming overly interpretive.
- source_word: አባግዕ
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural noun for sheep. 'The sheep' preserves the recurring symbolic vocabulary
    of the apocalypse more consistently than 'flock'.
