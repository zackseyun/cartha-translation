translation:
  text: And he called And he called that sheep which had escaped from the wolves, and spoke with him about the wolves, so that he might testify against them, that they might not touch the sheep. which had escaped from the wolves, and spoke with him about the wolves, so that he might warn them, that they might not ravage the sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'so that he might hear against them' is textually and syntactically difficult. It may mean that the ram was warned about the wolves, or that he was made to hear a charge concerning them.
    reason: alternative_reading
  - marker: b
    text: Or 'which had sinned from among the sheep'.
    reason: previous_rendering
  - marker: c
    text: Or 'so that he might hear against them'.
    reason: previous_rendering
  - marker: d
