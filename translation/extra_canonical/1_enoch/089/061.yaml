theological_decisions:
- issue: Nature of the shepherds' wrongdoing
  chosen_reading: The shepherds exceed a divinely permitted commission and act destructively
    beyond what was commanded.
  alternative_readings:
  - The shepherds merely neglect their duty
  - The line refers only to numerical excess without moral emphasis
  rationale: The comparative phrase 'more than I commanded them' and the destructive
    verb together indicate culpable excess, not simple negligence. This fits the judgment
    logic of the Animal Apocalypse while preserving the tension that some destructive
    authority had in fact been granted.
  doctrine_reference: Preserve theological tension rather than resolve it.
