translation:
  text: And he called to another and said to him, “Take note and see all that the
    shepherds are doing against these sheep; for they are destroying among them more
    than I commanded them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Pay attention' for the imperative rendered 'Take note'; the Ge'ez likely
      carries the sense of directing one's mind or heart to careful observation.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'more than I commanded them' implies that the shepherds had received
      a limited charge but went beyond it.
    reason: cross_reference
lexical_decisions:
- source_word: ለካልእ
  chosen: to another
  alternatives:
  - to the other
  - to a second one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ge'ez ካልእ commonly means 'another' or 'other.' In this scene the speaker
    addresses an additional heavenly figure, so 'to another' preserves the narrative
    sequence without over-specifying identity.
- source_word: ጸውዐ
  chosen: called
  alternatives:
  - summoned
  - cried out to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward narrative verb of calling. 'Called' is idiomatic and
    preserves the simple visionary report style.
- source_word: ለቡ
  chosen: Take note
  alternatives:
  - Pay attention
  - Set your heart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely an imperative built on the idiom of directing the heart/mind.
    'Take note' captures the sense of attentive observation in natural English while
    retaining the force of command.
- source_word: ወርኢ
  chosen: and see
  alternatives:
  - and look
  - and observe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The verb of seeing is kept concrete. ''See'' preserves the visionary
    and evidentiary tone: the addressee is to witness what is happening.'
- source_word: ኵሎ ዘይገብሩ
  chosen: all that ... are doing
  alternatives:
  - everything that ... do
  - all the things that ... are doing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative construction is best rendered with a natural English clause
    while preserving totality ('all').
- source_word: ኖሎት
  chosen: the shepherds
  alternatives:
  - pastors
  - herdsmen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Within the Animal Apocalypse, the metaphorical overseers of the sheep
    are regularly 'shepherds.' This preserves the established imagery and avoids ecclesiastical
    overtones of 'pastors.'
- source_word: ዲበ እሉ አባግዕ
  chosen: against these sheep
  alternatives:
  - upon these sheep
  - to these sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can be spatially 'upon,' but in context the shepherds'
    actions are harmful. 'Against these sheep' makes the hostile force explicit without
    abandoning the underlying image.
- source_word: ያሐጕሉ
  chosen: they are destroying
  alternatives:
  - they are ruining
  - they are causing to perish
  - they are killing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes destructive action. 'Destroying' is broad enough to
    cover the shepherds' abusive treatment in the allegory without narrowing the sense
    prematurely to direct slaughter alone.
- source_word: እምውስተቶሙ
  chosen: among them
  alternatives:
  - from among them
  - out of their midst
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to destructive action occurring within the flock itself.
    'Among them' reads smoothly while preserving the internal setting.
- source_word: ፈድፋደ እምዘ አዘዝክዎሙ
  chosen: more than I commanded them
  alternatives:
  - beyond what I ordered them
  - in excess of what I instructed them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'This comparative phrase is central to the verse: the shepherds exceed
    their commission. ''Commanded'' preserves the authority structure of the vision
    and the judicial tone.'
