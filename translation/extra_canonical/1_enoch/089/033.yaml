theological_decisions:
- issue: Whether እግዚኦሙ should be rendered as 'Lord' or the less theological 'master'
  chosen_reading: Lord
  alternative_readings:
  - master
  rationale: In the Animal Apocalypse the sheep-owner figure functions as the divine ruler and judge. 'Lord' preserves that theological identity without importing later christological language.
  doctrine_reference: Translation philosophy §Original-language primacy; §Readable modern English
- issue: Identity of the descending figure after 'that sheep'
  chosen_reading: the subject remains the singled-out sheep ('it came down')
  alternative_readings:
  - the Lord descended
  - an implied shepherd/agent descended
  rationale: The nearest grammatical antecedent is 'that sheep,' and the verse appears to spotlight a particular sheep distinguished by the Lord. Because the syntax is difficult, the ambiguity is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
