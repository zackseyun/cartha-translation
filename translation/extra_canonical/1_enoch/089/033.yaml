translation:
  text: And the Lord of the sheep was exceedingly angry with them, and that sheep knew it, and came down from the summit of the rock, and came to the sheep, and found the greater part of them with their eyes blinded, and those who had gone astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'it came down from the lofty rock' is syntactically difficult. The Ethiopic most naturally points back to 'that sheep,' but some may understand the subject differently.
    reason: alternative_reading
  - marker: b
    text: '''Blinded'' could also be rendered ''darkened'' or ''dimmed,'' preserving the image of impaired sight rather than total loss of vision.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and he recognized that sheep; and it came down from the lofty rock'.
    reason: previous_rendering
lexical_decisions:
- source_word: እግዚኦሙ ለአባግዕ
  chosen: the Lord of the sheep
  alternatives:
  - their lord, the sheep's lord
  - the master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Construct phrase with እግዚእ 'lord/master' plus dative/genitive relation to 'sheep.' 'Lord' preserves the elevated theological register of the Animal Apocalypse better than 'master.'
- source_word: ተምዐዐ ዲቤሆሙ መዐተ ዐቢየ
  chosen: was exceedingly angry with them
  alternatives:
  - was enraged against them with great wrath
  - became very angry over them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled wrath expression intensifies the emotion. English compresses the cognate construction naturally while preserving force with 'exceedingly angry.'
- source_word: አእመረ ዝኩ በግዕ
  chosen: he recognized that sheep
  alternatives:
  - he took note of that sheep
  - he knew that sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: አእመረ commonly means 'know, recognize, perceive.' In this narrative setting 'recognized' best conveys specific notice of a particular sheep already in view.
- source_word: ወወረደ እምነ ድማኅ ለኵኵሕ
  chosen: and it came down from the lofty rock
  alternatives:
  - and he descended from the high summit
  - and it went down from the height to the rock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is textually difficult, but the sense is descent from an elevated rocky place. I render the subject as 'it' to match the immediately preceding 'that sheep,' while preserving the vivid topographical imagery.
- source_word: ኀበ አባግዕት
  chosen: to the sheep
  alternatives:
  - unto the flock
  - to the ewes/sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple directional phrase. 'To the sheep' keeps the animal-symbolic diction rather than interpreting as 'people' or 'flock' in a more abstract way.
- source_word: ዘመብዝኅቶሙ
  chosen: the greater part of them
  alternatives:
  - most of them
  - the majority of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term indicates the larger number. 'The greater part' is slightly more formal and suits the visionary register.
- source_word: ዘጽሉለ አዕይንቲሆሙ
  chosen: with their eyes blinded
  alternatives:
  - whose eyes were darkened
  - whose eyes were dimmed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests obscuring or darkening. 'Blinded' captures the moral-visionary force in the Animal Apocalypse, though a less absolute 'darkened' remains possible.
- source_word: እለ ስሕቱ
  chosen: those who had gone astray
  alternatives:
  - those who erred
  - those who wandered off
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard term for straying or erring. 'Gone astray' preserves both literal sheep imagery and moral deviation.
