theological_decisions:
- issue: Identity and force of the promoted animal figure
  chosen_reading: Render the figure concretely as 'lamb' becoming 'a ram' rather than abstracting to 'leader.'
  alternative_readings:
  - Render as 'sheep' becoming 'leader'
  - Render as 'young ram'
  rationale: The Animal Apocalypse communicates through sustained animal symbolism. Preserving the species terms keeps the visionary texture and allows readers to track the symbolic succession without interpretive flattening.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten symbolic language into generic prose.'
- issue: Meaning of 'his glory' in the final clause
  chosen_reading: Translate literally as 'his glory' with a footnote noting 'honor' as an alternative.
  alternative_readings:
  - his honor
  - his splendor
  rationale: The Ge'ez wording supports a status-laden term. A literal rendering preserves the theological and symbolic resonance while acknowledging that the exact nuance may be social honor or visible dignity.
  doctrine_reference: Preserve theological tension rather than resolve it; document alternatives in footnotes.
