translation:
  text: And the Lord of the sheep sent the sheep to another sheep, and raised him up so that he might become a ram and might lead the sheep in place of that ram, the one that had abandoned his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'another sheep.' The singular animal term may be read more generally, but 'lamb' better preserves the contrast with the later 'ram.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his honor' or 'his splendor.' The phrase likely refers to the ram's status or dignity, not necessarily visible brightness alone.
    reason: lexical_alternative
  - marker: c
    text: Or 'the lamb to another lamb'.
    reason: previous_rendering
lexical_decisions:
- source_word: እግዚኦሙ
  chosen: the Lord of them / the Lord
  alternatives:
  - their lord
  - master over them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse this title refers to the divine overseer of the sheep. 'Lord' preserves the elevated theological register better than 'master,' while 'of the sheep' makes explicit the governed group from the following phrase.
- source_word: አባግዕ
  chosen: the sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The animal imagery should be preserved concretely, not generalized to 'flock,' because the vision's symbolism depends on the species imagery.
- source_word: ፈነዎ
  chosen: sent
  alternatives:
  - dispatched
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward verb of commissioning fits the narrative and preserves the sense of divine appointment.
- source_word: በግዕ
  chosen: lamb
  alternatives:
  - sheep
  - young sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular here is best taken as a young sheep, contrasting with the later 'ram.' 'Lamb' preserves the developmental and symbolic movement in the verse.
- source_word: ኀበ ካልእ በግዕ
  chosen: to another lamb
  alternatives:
  - to another sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated singular animal term suggests one individual sent in relation to another individual. 'Another lamb' keeps the parallelism visible.
- source_word: አንሥአ
  chosen: raised him up
  alternatives:
  - lifted him up
  - appointed him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can denote elevation. 'Raised him up' preserves both literal imagery and the sense of divinely effected promotion; 'appointed' is interpretive and too flat for apocalyptic narrative.
- source_word: ከመ ይኩን ሐርጌ
  chosen: so that he might become a ram
  alternatives:
  - so that he might be a ram
  - so that he might become a leader-ram
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The animal transformation/promotion is central to the symbolism. 'Become' captures the change of status more clearly than simple 'be.'
- source_word: ይመርሖሙ
  chosen: might lead them
  alternatives:
  - might shepherd them
  - might guide them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is one of leading/guiding. 'Lead' is the most natural English while still allowing the pastoral-political symbolism to remain active.
- source_word: ህየንተ ዝኩ ሐርጌ
  chosen: in place of that ram
  alternatives:
  - instead of that ram
  - for that ram
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks succession or replacement. 'In place of' is idiomatic and preserves the transfer of leadership.
- source_word: ዘሐደገ ስብሐቲሁ
  chosen: the one that had abandoned his glory
  alternatives:
  - the one that had left his glory
  - the one that had forsaken his honor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause describes the displaced ram. 'Glory' is preferable to 'honor' because the term can carry weightier status and splendor in apocalyptic contexts; 'abandoned' reflects deliberate departure without overinterpreting the cause.
