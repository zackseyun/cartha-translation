theological_decisions:
- issue: Whether to render the succession formula in overtly interpretive political terms
  chosen_reading: A little sheep became a ram in its place
  alternative_readings:
  - A young sheep became a ram as its successor
  - A small lamb became a ram instead of it
  rationale: The allegory likely refers to dynastic or leadership succession, but the text presents this through animal transformation imagery. The translation preserves the vision's symbolic form rather than resolving it into historical interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve apocalyptic imagery.
