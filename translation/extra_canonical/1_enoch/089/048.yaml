lexical_decisions:
- source_word: ዳሓራዊ
  chosen: afterward
  alternatives:
  - after these things
  - later
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal sequel marker in narrative; 'afterward' preserves the visionary progression without overloading the phrase.
- source_word: ሐርጌ
  chosen: ram
  alternatives:
  - male sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, sheep imagery is symbolically differentiated; 'ram' preserves the marked male leader figure better than the flatter 'male sheep'.
- source_word: ተንሥአ
  chosen: arose
  alternatives:
  - stood up
  - rose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard narrative verb of rising; 'arose' fits elevated but readable English.
- source_word: መርሖሙ
  chosen: led
  alternatives:
  - guided
  - conducted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple leadership verb; 'led' is the most natural and preserves the shepherding/political ambiguity of the allegory.
- source_word: አባግዕ
  chosen: sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Concrete animal term should remain concrete in this vision rather than be abstracted to 'flock'.
- source_word: ንኡስ
  chosen: little
  alternatives:
  - small
  - young
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective can indicate smallness or youth; 'little' preserves the ambiguity and matches the diminutive force in the allegory.
- source_word: ወሊደ
  chosen: fathered
  alternatives:
  - begot
  - sired
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is explicitly generative. 'Fathered' is clear modern English and avoids archaic 'begot' while keeping the male subject in view.
- source_word: ብዙኃነ
  chosen: many
  alternatives:
  - numerous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward quantitative term; 'many' is sufficient and idiomatic.
- source_word: ሰከበ
  chosen: lay down
  alternatives:
  - fell asleep
  - died
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The literal image is 'lay down,' but in this recurring dream-vision idiom it likely signals death. The main text keeps the image; the implication can be noted in a footnote.
- source_word: ህየንቴሁ
  chosen: in its place
  alternatives:
  - instead of it
  - as its successor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This marks succession/replacement. 'In its place' is concise and preserves the narrative transfer of role.
- source_word: መኰንነ
  chosen: ruler
  alternatives:
  - prince
  - governor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes authority. 'Ruler' is broad enough to fit the allegorical register without importing later technical titles.
- source_word: መራሔ
  chosen: leader
  alternatives:
  - guide
  - shepherd
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Distinct from the earlier verb 'led,' this noun names the office or status. 'Leader' preserves the political-social nuance without forcing a pastoral metaphor not explicit in the noun here.
