translation:
  text: And that ram went up onto the summit of that lofty rock, and the Lord of the
    sheep sent him to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording distinguishes this animal from the broader group of sheep;
      'ram' reflects that distinction.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'the summit of that lofty rock' may also be understood
      more simply as 'the top of that high rock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ዐርገ
  chosen: went up
  alternatives:
  - ascended
  - climbed up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes upward movement. 'Went up' preserves the narrative simplicity
    and visionary motion without sounding overly elevated.
- source_word: በግዕ
  chosen: ram
  alternatives:
  - sheep
  - male sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, sheep imagery is differentiated by role and
    sex; this form is best taken as a male sheep, hence 'ram,' not the generic 'sheep.'
- source_word: ዲበ
  chosen: onto
  alternatives:
  - upon
  - 'on'
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks movement to a higher place rather than mere static location, fitting
    the preceding verb 'went up.'
- source_word: ድማኃ
  chosen: summit
  alternatives:
  - top
  - height
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is ascent onto a high rocky place; 'summit' captures the
    elevated top of the feature more vividly than the flatter 'top.'
- source_word: ኰኵሕ
  chosen: rock
  alternatives:
  - stone
  - crag
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word denotes a rocky mass or stone formation. 'Rock' is the most
    natural English equivalent here.
- source_word: ነዋሕ
  chosen: lofty
  alternatives:
  - high
  - tall
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This adjective emphasizes height or elevation. 'Lofty' preserves the
    elevated, visionary tone better than the more ordinary 'high.'
- source_word: እግዚኦሙ ለአባግዕ
  chosen: the Lord of the sheep
  alternatives:
  - their lord, the lord of the sheep
  - the master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construct is best read as the divine figure who rules the sheep in
    the allegory. 'Lord' preserves theological weight and the repeated Animal Apocalypse
    designation.
- source_word: ፈነዎ
  chosen: sent
  alternatives:
  - dispatched
  - commissioned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward verb of sending. 'Sent' is clear and preserves the
    narrative force without over-interpreting the ram's mission.
- source_word: ኀቤሆሙ
  chosen: to them
  alternatives:
  - toward them
  - among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition indicates direction toward a group already in view. 'To
    them' is the most direct rendering.
