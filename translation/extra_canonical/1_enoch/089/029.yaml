theological_decisions:
- issue: Identification of the sender as a divine figure within the allegory
  chosen_reading: the Lord of the sheep
  alternative_readings:
  - their lord of the sheep
  - the master over those sheep
  rationale: The Animal Apocalypse regularly uses lordship language for the divine
    overseer of Israel symbolized as sheep. Rendering with 'Lord' preserves the theological
    force of the allegory without collapsing it into later doctrinal formulas.
  doctrine_reference: 'Translation philosophy: translate titles; preserve theological
    tension rather than resolve it.'
