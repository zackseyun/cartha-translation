theological_decisions:
- issue: Whether to make the symbolic referents explicit (leaders, returnees, temple
    rebuilders)
  chosen_reading: Keep the animal imagery and house-building imagery in the main text
    without decoding it.
  alternative_readings:
  - Interpret the three sheep explicitly as post-exilic leaders
  - Interpret the house as the temple in the main text
  rationale: The translation philosophy requires preserving apocalyptic imagery rather
    than flattening it into historical paraphrase. The symbolism may be discussed
    in notes, but the verse itself speaks in dream-vision figures.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    paraphrase beyond the witness.'
