translation:
  text: And again I saw the shepherds pasturing for twelve hours, and behold, three of those sheep returned, and they arrived and entered, and they began to build up all that had fallen down of that house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'twelve hours' is likely symbolic within the vision, marking a set period rather than a literal clock-time.
    reason: cultural_note
  - marker: b
    text: The Ethiopic piles up several motion verbs ('came in,' 'arrived,' 'entered'). The English keeps the repetition because it is part of the vision's style.
    reason: lexical_alternative
  - marker: c
    text: The surviving OCR is difficult at the end of the verse. The sense appears to be that the three sheep began building or rebuilding comprehensively, likely in relation to the 'house' imagery of the surrounding context.
    reason: textual_variant
  - marker: d
    text: Or 'that they pastured'.
    reason: previous_rendering
  - marker: e
    text: Or 'came in'.
    reason: previous_rendering
lexical_decisions:
- source_word: እምኔሁ
  chosen: again
  alternatives:
  - after that
  - thereupon
  - from there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'In visionary narrative this connective commonly advances the sequence: ''after this/again.'' ''Again'' is concise and preserves the repeated dream-report rhythm.'
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I looked
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary report; 'I saw' is the clearest natural English and preserves the apocalyptic reporting formula.
- source_word: ይርዐዩ
  chosen: they pastured
  alternatives:
  - they were grazing
  - they were shepherded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is related to grazing/pasturing. Because the subject is the flock in the Animal Apocalypse, 'they pastured' keeps the pastoral image without over-interpreting whether active or passive is intended.
- source_word: ኖሎት ፲ወ፪ሰዓተ
  chosen: for twelve hours
  alternatives:
  - for twelve periods
  - for twelve times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሰዓት ordinarily means 'hour/time.' In this symbolic apocalypse the phrase likely marks a fixed period of rule or history; 'twelve hours' preserves the literal imagery and lets the symbolism stand.
- source_word: ፫ እምዝኩ አባግዕ
  chosen: three of those sheep
  alternatives:
  - three sheep from among them
  - three of these sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies three sheep from the previously mentioned flock. 'Those sheep' reads naturally in English while preserving the partitive sense.
- source_word: ገብኡ / ወመጽኡ / ወቦኡ
  chosen: came in, and they arrived and entered
  alternatives:
  - came and went in
  - approached and entered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The Ethiopic stacks near-synonymous motion verbs. Rather than collapsing them, the translation preserves the repetitive visionary cadence: approach, arrive, enter.'
- source_word: ወአኀዙ
  chosen: they began
  alternatives:
  - they took hold
  - they set themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'With the following finite/imperfective construction, this verb likely functions inceptively: they started to do something. ''They began'' best fits the sequence.'
- source_word: እንዘ ሐንጹ
  chosen: to build up
  alternatives:
  - while they built
  - to rebuild
  - to construct
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes building. In context of restoration imagery in the Animal Apocalypse, 'build up' leaves open whether the sense is simple building or rebuilding.
- source_word: ኵሎ
  chosen: all
  alternatives:
  - everything
  - the whole
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the comprehensive force of the restoration action.
