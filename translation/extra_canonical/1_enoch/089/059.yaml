translation:
  text: And he summoned seventy shepherds and gave over those sheep to them, that
    they might pasture them. And he said to the shepherds and to their companions,
    “From now on, each of you shall pasture the sheep, and do all that I command you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'their companions' is somewhat uncertain; it likely
      refers to those associated with the shepherds.
    reason: lexical_alternative
  - marker: b
    text: The Ethiopic text repeats the number seventy in the address ('all seventy
      of you'). The translation brings out the distributive sense as 'each of you'
      after already stating 'seventy shepherds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ጸውዐ
  chosen: summoned
  alternatives:
  - called
  - invited
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal summons fits the commissioning scene better than the weaker
    'called' or social 'invited.'
- source_word: ኖላዊያነ
  chosen: shepherds
  alternatives:
  - pastors
  - herdsmen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse this is the established visionary image for
    appointed overseers of the sheep; 'shepherds' preserves the apocalyptic metaphor.
- source_word: ገደፎሙ ሎሙ
  chosen: gave over ... to them
  alternatives:
  - entrusted ... to them
  - handed ... over to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase conveys transfer of charge or custody. 'Gave over' preserves
    the solemnity and possible undertone of delegated responsibility without over-paraphrasing.
- source_word: አባግዕ
  chosen: sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular image is pluralized in context; 'sheep' keeps the animal
    symbolism concrete rather than abstracting to 'flock.'
- source_word: ከመ ይርዐይዎሙ
  chosen: that they might pasture them
  alternatives:
  - that they might shepherd them
  - that they might tend them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the action of a shepherd toward sheep. 'Pasture' keeps the
    livestock imagery vivid; 'shepherd' as a verb is possible but less natural here
    in English.
- source_word: ለጸማዶሙ
  chosen: to their companions
  alternatives:
  - to their associates
  - to those with them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term suggests those joined with or attached to the shepherds. 'Companions'
    is readable while preserving the relational sense.
- source_word: ኵሉ ፯፯ እምኔክሙ
  chosen: each of you
  alternatives:
  - all seventy of you
  - every one of you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text includes both 'all' and the numeral seventy, but in English
    the distributive force is best captured by 'each of you.' The numeral has already
    been stated in the previous clause.
- source_word: እምይእዜ
  chosen: from now on
  alternatives:
  - henceforth
  - from this time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This marks the beginning of their commission. 'From now on' is clear
    modern English without losing force.
- source_word: ኵሎ ዘአአዝዘክሙ አነ ግበሩ
  chosen: do all that I command you
  alternatives:
  - carry out everything I order you
  - do everything I have instructed you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the direct imperative and the authority of the speaker.
    'Command' better matches the solemn commissioning context than the softer 'instruct.'
