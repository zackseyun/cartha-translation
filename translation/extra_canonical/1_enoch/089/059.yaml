theological_decisions:
- issue: Whether to preserve the animal imagery or interpret the shepherds directly
    as human or angelic rulers
  chosen_reading: Preserve the imagery as 'shepherds' and 'sheep' without interpretive
    unpacking in the main text.
  alternative_readings:
  - Render interpretively as rulers/angels and people/Israel
  rationale: The Dream Visions communicate through sustained symbolic imagery. The
    translation should not collapse the vision into its presumed referents in the
    main text.
  doctrine_reference: 'Book context: visionary and apocalyptic prose/poetry; do not
    flatten cosmic imagery.'
