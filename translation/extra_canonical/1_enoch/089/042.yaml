theological_decisions:
- issue: Divine title in the allegory
  chosen_reading: the Lord of the sheep
  alternative_readings:
  - the master of the sheep
  rationale: The repeated title in this vision carries theological weight beyond mere
    ownership. 'Lord' preserves the elevated register and divine authority appropriate
    to the allegorical figure.
  doctrine_reference: Translate titles; preserve theological tension rather than reduce
    imagery.
