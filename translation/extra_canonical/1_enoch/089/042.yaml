translation:
  text: And dogs and foxes and wild boars of the field began to devour those sheep,
    until the Lord of the sheep raised up from among them one ram to lead them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The clause in brackets in the OCR suggests a difficult or variant reading
      around ''one ram.'' The sense of the verse is clear: a single male sheep is
      raised up from among the flock as leader.'
    reason: textual_variant
  - marker: b
    text: The animal term rendered 'foxes' may in some contexts overlap with a broader
      scavenger-predator sense, such as 'jackals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አኃዙ
  chosen: began
  alternatives:
  - seized
  - took hold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'In this construction introducing the infinitive-like verb of eating,
    the sense is ingressive: the animals set about devouring the sheep. Rendering
    ''began'' fits the narrative flow better than a wooden ''seized'' while preserving
    the onset of action.'
- source_word: አክላብ
  chosen: dogs
  alternatives:
  - hounds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary animal term is best rendered 'dogs.' 'Hounds' would add
    specificity not warranted by the Ge'ez.
- source_word: ቈናጽል
  chosen: foxes
  alternatives:
  - jackals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is commonly understood of a fox-like scavenger/predator. 'Foxes'
    is the more standard rendering in this imagery, though the broader canid sense
    may overlap with 'jackals.'
- source_word: ሐራዊያ ሐቅል
  chosen: wild boars of the field
  alternatives:
  - wild pigs of the field
  - boars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes wild swine in a field/open-country setting. 'Wild
    boars of the field' preserves the vivid animal-apocalypse imagery and the full
    phrase.
- source_word: ይብልዕዎሙ
  chosen: devour them
  alternatives:
  - eat them
  - consume them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this violent allegorical context, 'devour' better conveys predatory
    destruction than the flatter 'eat.'
- source_word: ዝኩ አባግዕ
  chosen: those sheep
  alternatives:
  - these sheep
  - the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative points to a specific group already in view in the vision.
    'Those sheep' preserves that deictic force.
- source_word: እስከ አንሥአ
  chosen: until ... raised up
  alternatives:
  - until ... lifted up
  - until ... appointed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb naturally means 'raise up' in contexts of divinely provided
    leadership. This keeps the theological force of the Lord's intervention without
    over-interpreting it as formal appointment.
- source_word: እግዚአ አባግዕ
  chosen: the Lord of the sheep
  alternatives:
  - the master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key repeated title in the Animal Apocalypse. 'Lord of the sheep'
    preserves both the authority claim and the established imagery.
- source_word: ፩እምኔሆሙ
  chosen: one ... from among them
  alternatives:
  - one of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase explicitly marks emergence from within the flock, which matters
    in the allegory. 'From among them' makes that clearer in English.
- source_word: ሐርጌ
  chosen: ram
  alternatives:
  - male sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The animal term refers to a male sheep. 'Ram' is the natural English
    equivalent and preserves the symbolic distinction from the broader flock.
- source_word: ዘይመርሖሙ
  chosen: to lead them
  alternatives:
  - who would guide them
  - that he might shepherd them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to lead or guide. 'To lead them' is concise and fits the
    raised-up-leader motif without importing the fuller shepherd vocabulary not explicit
    here.
