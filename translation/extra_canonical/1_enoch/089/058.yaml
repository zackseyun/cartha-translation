theological_decisions:
- issue: Whether to make the agent's abandonment sound like active judicial delivery
    or simple withdrawal
  chosen_reading: he abandoned them into the hand of all the beasts
  alternative_readings:
  - he left them in the power of all the beasts
  - he gave them over to all the beasts
  rationale: The Ge'ez supports a strong act of leaving them exposed. 'Abandoned'
    preserves the severity of judgment without importing later Pauline formulae.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
