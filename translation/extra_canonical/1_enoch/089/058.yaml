translation:
  text: And he kept still as he watched, and he rejoiced because they were devoured
    and swallowed up and carried off; and he abandoned them into the hand of all the
    beasts for food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Into the hand'' is a literal idiom for being delivered into the power
      or control of another.'
    reason: lexical_alternative
  - marker: b
    text: The three verbs 'devoured,' 'swallowed up,' and 'destroyed' are retained
      as a cumulative sequence rather than reduced to a single English verb, to preserve
      the verse's escalating judgment imagery.
    reason: cultural_note
  - marker: c
    text: Or 'And that one kept still while he watched, and he rejoiced because they
      were devoured and swallowed up and destroyed'.
    reason: previous_rendering
lexical_decisions:
- source_word: አርመመ
  chosen: kept still
  alternatives:
  - was silent
  - remained quiet
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys silence or stillness. 'Kept still' preserves the narrative
    force without sounding overly idiomatic or implying only speechlessness.
- source_word: እንዘ ይሬኢ
  chosen: while he watched
  alternatives:
  - as he saw
  - while seeing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This construction marks contemporaneous action. 'While he watched' fits
    the visionary narrative better than the more wooden 'while seeing.'
- source_word: ተፈሥሐ
  chosen: he rejoiced
  alternatives:
  - he was glad
  - he exulted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of joy or gladness. 'Rejoiced' keeps the
    elevated register appropriate to apocalyptic narration.
- source_word: ተበልዑ
  chosen: were devoured
  alternatives:
  - were eaten
  - were consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, predatory imagery is central. 'Devoured' preserves
    the violent animal imagery better than the flatter 'eaten.'
- source_word: ተውሕጡ
  chosen: swallowed up
  alternatives:
  - gulped down
  - swallowed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb intensifies the predatory destruction. 'Swallowed up' preserves
    the vividness and the cumulative sequence of judgment.
- source_word: ተሀይዱ
  chosen: destroyed
  alternatives:
  - perished
  - were wiped out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term appears to complete the triad of ruin. 'Destroyed' is broad
    enough to fit the context and preserves the escalating judgment imagery.
- source_word: ኃደጎሙ
  chosen: he abandoned them
  alternatives:
  - he left them
  - he gave them over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Abandoned'' best reflects the sense of leaving them exposed to judgment.
    ''Gave them over'' is possible, but could import later theological diction not
    demanded by the Ge''ez.'
- source_word: ውስተ እዴ
  chosen: into the hand
  alternatives:
  - into the power
  - into the grasp
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hand'' is a common Semitic idiom for power or control. It is preserved
    literally here for transparency and biblical register.'
- source_word: ኵሎሙ አራዊት
  chosen: all the beasts
  alternatives:
  - all the wild beasts
  - all the animals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this allegorical section, 'beasts' is the established and contextually
    apt term for predatory nations/powers represented as animals.
- source_word: ለመብልዕ
  chosen: for food
  alternatives:
  - to be eaten
  - for devouring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This infinitival/purpose expression indicates the result or purpose of
    being handed over. 'For food' is concise and preserves the animal-predation image.
