translation:
  text: And that house became great and broad, and it was built for those sheep; and
    a high and great tower was built upon the house for the Lord of the sheep. And
    that house was low, but the tower was raised up and became high; and the Lord
    of the sheep stood upon that tower, and they set a full table before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''House'' likely carries temple symbolism in the vision, but the wording
      is kept literal here.'
    reason: cross_reference
  - marker: b
    text: Or 'a laden table.' The phrase may evoke cultic furnishing or presentation
      before the divine presence.
    reason: lexical_alternative
  - marker: c
    text: Or 'That house was low'.
    reason: previous_rendering
lexical_decisions:
- source_word: ቤት
  chosen: house
  alternatives:
  - temple
  - building
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is 'house.' In the Animal Apocalypse this often carries
    temple imagery, but 'house' preserves the vision-symbolism without over-interpreting
    in the main text.
- source_word: ዐቢየ
  chosen: great
  alternatives:
  - large
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward size/status term; 'great' fits the elevated register
    and pairs naturally with 'broad.'
- source_word: ወርኅበ
  chosen: broad
  alternatives:
  - wide
  - spacious
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the concrete spatial imagery of expansion better than the more
    interpretive 'spacious.'
- source_word: ተኃንጸ
  chosen: was built
  alternatives:
  - was constructed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard architectural verb; 'was built' is idiomatic and sufficiently
    formal.
- source_word: አባግዕ
  chosen: sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Animal Apocalypse consistently uses animal figures; 'sheep' preserves
    the symbolic cast better than the collective 'flock' here.
- source_word: ማኅፈድ
  chosen: tower
  alternatives:
  - upper structure
  - raised platform
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes an elevated built structure. 'Tower' best preserves
    the vertical, monumental imagery in this visionary temple scene.
- source_word: ነዋኅ
  chosen: lofty
  alternatives:
  - high
  - tall
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used twice in the verse for elevation. 'Lofty' suits both physical height
    and the exalted tone of the vision.
- source_word: እግዚአ አባግዕ
  chosen: Lord of the sheep
  alternatives:
  - master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key recurring title in the Animal Apocalypse for God. 'Lord'
    matches the project's default for exalted rulership language and preserves the
    passage's theological weight.
- source_word: ተተሕተ
  chosen: was low
  alternatives:
  - was beneath
  - was lowered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The contrast is between the house and the elevated tower. 'Was low' makes
    the spatial contrast clear without forcing a textual emendation.
- source_word: ተላዐለ
  chosen: was raised up
  alternatives:
  - was lifted up
  - rose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/elevative sense fits the architectural image and prepares for
    the repeated 'became lofty.'
- source_word: ቆመ
  chosen: stood
  alternatives:
  - took his stand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple and vivid; preserves the visionary report that the Lord of the
    sheep is positioned upon the tower.
- source_word: ማእደ
  chosen: table
  alternatives:
  - meal
  - banquet table
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun most naturally denotes a table; this keeps the concrete cultic
    image rather than paraphrasing it as a meal.
- source_word: ምልእተ
  chosen: full
  alternatives:
  - filled
  - laden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Describes the table as fully furnished or laden. 'Full' is literal and
    leaves the exact nuance open.
- source_word: አቅረቡ በቅድሜሁ
  chosen: they set before him
  alternatives:
  - they brought before him
  - they presented before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates presentation in his presence. With 'table' as object,
    'set before him' is the most natural English expression.
