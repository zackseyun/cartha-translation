theological_decisions:
- issue: Whether to render ቤት as 'house' or explicitly as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The symbolic context strongly suggests the restored temple, but the Ge'ez
    says 'house.' Following optimal equivalence and the project's transparency principle,
    the main text keeps 'house' and lets the imagery imply temple significance.
  doctrine_reference: Translation philosophy §1, §3
- issue: How to render እግዚአ አባግዕ
  chosen_reading: Lord of the sheep
  alternative_readings:
  - Master of the sheep
  rationale: This title functions as the divine ruler designation within the allegory.
    'Lord' preserves both authority and continuity with the project's handling of
    exalted divine titles without importing later christological language.
  doctrine_reference: 'Contested terms: κύριος → Lord'
- issue: Whether the final clause should be interpreted cultically as an offering
    or more literally as furnishing a table
  chosen_reading: they set a full table before him
  alternative_readings:
  - they brought a full table before him
  - they presented a laden table before him
  rationale: The Ge'ez imagery is concrete and architectural/cultic. Rendering it
    literally preserves the apocalyptic scene without prematurely specifying sacrificial
    ritual beyond the wording.
