translation:
  text: And when they saw him, they were afraid and trembled before his face, and
    they desired to return to their own folds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'before his face,' a vivid expression for standing in his presence.
    reason: lexical_alternative
  - marker: b
    text: The final phrase likely refers to animal enclosures or sheepfolds; 'folds'
      preserves the vision's animal symbolism.
    reason: cultural_note
lexical_decisions:
- source_word: ርእይዎ
  chosen: they saw him
  alternatives:
  - they looked at him
  - they beheld him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the common Ge'ez verb of seeing. The object suffix indicates
    'him.' 'Saw him' is the plainest English and fits the narrative sequence.
- source_word: ፈርሁ
  chosen: they were afraid
  alternatives:
  - they feared
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward fear verb. 'Were afraid' is readable modern English
    while preserving the emotional force.
- source_word: ወርዕዱ
  chosen: and trembled
  alternatives:
  - and quaked
  - and were terrified
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This intensifies the fear response with bodily shaking. 'Trembled' preserves
    the apocalyptic register without exaggeration.
- source_word: እምቅድመ ገጹ
  chosen: before his face
  alternatives:
  - before him
  - from before his face
  - in his presence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'from/before the front of his face.' I retain 'before his face'
    in the main text to preserve the vivid Semitic-style expression and visionary
    immediacy.
- source_word: ወፈቀዱ
  chosen: and they desired
  alternatives:
  - and they wished
  - and they wanted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes willing or desiring. 'Desired' keeps a slightly elevated
    register suitable to the vision report.
- source_word: ከመ ይግብኡ
  chosen: to return
  alternatives:
  - to go back
  - to enter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form can suggest going/entering back, and in context the sense is
    movement back to a prior place. 'Return' best captures the likely narrative force.
- source_word: ለአዕጻዲ ዚአሆሙ
  chosen: to their own folds
  alternatives:
  - to their own pens
  - to their own enclosures
  - to their own sheepfolds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, animal imagery should be preserved. The noun
    appears to denote enclosed places for animals; 'folds' is idiomatic and keeps
    the sheep-imagery active. 'Their own' reflects the possessive element.
