theological_decisions:
- issue: Whether to generalize the animal image into ordinary human movement
  chosen_reading: retain 'folds' rather than a generic 'homes' or 'places'
  alternative_readings:
  - their homes
  - their places
  - their enclosures
  rationale: The Animal Apocalypse works through sustained symbolic animal imagery.
    Flattening the image would obscure the literary and theological texture of the
    vision.
  doctrine_reference: 'Book context: preserve apocalyptic imagery; do not flatten
    symbolic animal language.'
