lexical_decisions:
- source_word: ኵሎሙ
  chosen: all of them / all
  alternatives:
  - the whole of them
  - every one of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Quantifier marking totality; rendered simply as 'all' in idiomatic English while preserving the comprehensive scope.
- source_word: አላህምት
  chosen: the cattle
  alternatives:
  - the beasts
  - the oxen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse the domesticated herd-animal imagery is significant. 'Cattle' preserves the collective animal symbolism better than the narrower 'oxen' or the broader 'beasts'.
- source_word: ዐጸድ
  chosen: field
  alternatives:
  - pasture
  - enclosure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes cultivated/open land or a field-like area. 'Field' is the most natural English equivalent and fits the visionary animal setting.
- source_word: ተጋብኡ
  chosen: were gathered together
  alternatives:
  - assembled
  - were brought together
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/reflexive gathering is in view. 'Were gathered together' preserves both the collective movement and the slightly formal apocalyptic cadence.
- source_word: እስክነ ርኢክዎሙ
  chosen: until I saw
  alternatives:
  - until the time when I saw them
  - so that I saw them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a narrative transition formula in the dream report. 'Until I saw' keeps the visionary sequence concise and natural.
- source_word: ይሠጠሙ
  chosen: they sank
  alternatives:
  - they were submerged
  - they went down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests sinking/submerging in water. 'Sank' is vivid and fits the flood imagery without over-expansion.
- source_word: ይትወንጡ
  chosen: were swallowed up
  alternatives:
  - were engulfed
  - were swallowed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The middle/passive sense conveys being engulfed or swallowed. 'Were swallowed up' preserves the forceful, catastrophic imagery.
- source_word: ይትኃጐሉ
  chosen: were destroyed
  alternatives:
  - perished
  - were annihilated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A destruction/perishing verb concluding the sequence. 'Were destroyed' keeps the climactic judgment tone and avoids overstating beyond the witness.
- source_word: ማይ
  chosen: water
  alternatives:
  - waters
  - floodwater
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular is explicit in the Ethiopic. 'Water' is retained in the main text, while the broader flood context can be inferred from the surrounding vision.
