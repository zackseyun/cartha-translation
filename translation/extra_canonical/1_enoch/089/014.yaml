theological_decisions:
- issue: Identity of the 'Lord' in the animal vision
  chosen_reading: Render as 'the Lord' without specifying more narrowly in the verse
    itself.
  alternative_readings:
  - the owner of the sheep
  - God
  rationale: The vision presents the divine ruler through pastoral imagery. 'The Lord'
    preserves the theological weight and symbolic indirection of the apocalypse without
    collapsing the metaphor into an explanatory gloss.
  doctrine_reference: Preserve apocalyptic imagery rather than flattening it into
    generic prose.
