translation:
  text: And the Lord brought the twelve sheep so that they might dwell with it and
    graze with it among the wolves; and they multiplied and became many flocks of
    sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic text is difficult in the middle of the verse; the clause rendered
      'pasture with him among the wolves' reflects the animal imagery of the passage
      and may also be understood more literally as 'graze with him in the midst of
      the wolves.'
    reason: textual_variant
  - marker: b
    text: The final phrase is uncertain in the OCR witness. It appears to describe
      the twelve sheep increasing into numerous groups or flocks of sheep.
    reason: alternative_reading
  - marker: c
    text: Or 'dwell with him and pasture with him'.
    reason: previous_rendering
lexical_decisions:
- source_word: እግዚአ
  chosen: the Lord
  alternatives:
  - the master
  - the owner
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the divine/master figure in this vision. In the
    Animal Apocalypse this figure is the sovereign overseer of the sheep, so 'the
    Lord' preserves both authority and elevated register.
- source_word: አምጽኦሙ
  chosen: brought
  alternatives:
  - led
  - caused to come
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates causing them to come into his presence or sphere.
    'Brought' is natural English and preserves the Lord's active agency.
- source_word: ፲ወ፪ አባግዕ
  chosen: the twelve sheep
  alternatives:
  - the twelve ewes/sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse sheep symbolize Israelite figures/tribes. The
    numeral is explicit, and 'sheep' preserves the established symbolic imagery without
    over-specifying sex.
- source_word: ከመ ይኅደሩ ምስሌሁ
  chosen: so that they might dwell with him
  alternatives:
  - that they might live with him
  - that they might remain with him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses purpose/result. 'Dwell with him' keeps the relational
    and somewhat elevated tone better than the flatter 'live with him.'
- source_word: ይትረዐዩ ምስሌሁ
  chosen: pasture with him
  alternatives:
  - graze with him
  - be shepherded with him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The root is tied to feeding/grazing imagery appropriate to sheep. 'Pasture
    with him' preserves the animal-vision idiom better than a more abstract rendering.
- source_word: ማእከለ አዝእብት
  chosen: among the wolves
  alternatives:
  - in the midst of the wolves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is spatial and threatening. 'Among the wolves' is concise
    while preserving the hostile setting of the vision.
- source_word: በዝኁ
  chosen: they multiplied
  alternatives:
  - they increased
  - they became numerous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard growth verb. 'Multiplied' echoes biblical stock
    language without importing later phrasing.
- source_word: ኮኑ መራዕየ ብዙኃተ ዘአባግዕ
  chosen: became many flocks of sheep
  alternatives:
  - became many sheepfolds
  - became a great multitude of sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The surviving OCR is difficult here, but the sense is expansion into
    numerous sheep-groups. 'Many flocks of sheep' best fits the pastoral imagery while
    acknowledging the collective nuance.
