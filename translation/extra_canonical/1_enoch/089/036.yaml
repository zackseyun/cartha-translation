theological_decisions:
- issue: Whether to render ቤተ as 'house' or interpretively as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  - sanctuary
  rationale: The immediate Ge'ez wording is 'house,' and the translation philosophy favors preserving source imagery unless the context plainly demands a more interpretive gloss. Since the house is built for the Lord of the sheep, temple connotations are likely, but these are better noted than imported into the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Identity of the sheep who became a man
  chosen_reading: left implicit in the translation
  alternative_readings:
  - Moses
  - a leader figure representing Moses or Israel's cultic leadership
  rationale: The verse's symbolic identification belongs to interpretation, not translation. The main text should preserve the visionary symbol without resolving it for the reader.
  doctrine_reference: Translation philosophy §3
