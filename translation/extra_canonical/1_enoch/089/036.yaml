translation:
  text: And I saw in the vision until that sheep became a man, and built a house for the Lord of the sheep, and he placed all the sheep in that house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''House'' likely carries sanctuary or temple overtones here, but the Ge''ez wording itself is simply ''house.'''
    reason: lexical_alternative
  - marker: b
    text: The sheep's becoming 'a man' is part of the vision's symbolic transformation; the translation leaves the figure unidentified rather than supplying an interpretation.
    reason: cultural_note
  - marker: c
    text: Or 'he made all the sheep stand'.
    reason: previous_rendering
lexical_decisions:
- source_word: በግዕ
  chosen: sheep
  alternatives:
  - lamb
  - ram
  lexicon: Dillmann
  rationale: In the Animal Apocalypse, animal imagery is sustained symbolically; 'sheep' preserves the generic flock-animal image better than the more specific 'lamb' or 'ram' unless context requires sex/age distinction.
- source_word: ኮነ ብእሴ
  chosen: became a man
  alternatives:
  - became human
  - was made a man
  lexicon: Dillmann
  rationale: The verb-plus-noun construction most naturally indicates transformation in the vision. 'Became a man' preserves the striking apocalyptic shift from animal symbol to human figure.
- source_word: ሐነጸ ቤተ
  chosen: built a house
  alternatives:
  - constructed a house
  - built a temple
  lexicon: Dillmann
  rationale: The Ge'ez says 'built a house.' Because 'house' in this context likely carries sanctuary/temple force, the more literal 'house' is retained in the main text to preserve imagery and avoid over-specifying beyond the wording.
- source_word: ለእግዚአ አባግዕ
  chosen: for the Lord of the sheep
  alternatives:
  - for the master of the sheep
  - for the owner of the sheep
  lexicon: Dillmann
  rationale: እግዚአ commonly denotes lord/master. 'Lord' fits the elevated register and the theological role of the divine shepherd-figure in this apocalypse.
- source_word: አቀሞሙ
  chosen: made all the sheep stand
  alternatives:
  - set all the sheep
  - caused all the sheep to stand
  - established all the sheep
  lexicon: Dillmann
  rationale: The causative sense of 'made ... stand' is preferable to a flatter 'set,' and it preserves the vivid visionary action. It may imply placement or presentation, but 'stand' best reflects the verbal image.
- source_word: በውእቱ ቤት
  chosen: in that house
  alternatives:
  - inside that house
  - within that house
  lexicon: Dillmann
  rationale: The demonstrative is retained as 'that' to preserve the narrative deixis of the vision.
