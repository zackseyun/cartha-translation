translation:
  text: And one of those four went to that white bull and instructed him in a secret, while he did not tremble; and that bull was born and became a man, and built for himself a great vessel and dwelt upon it. And three bulls were with him on that vessel, and they were covered over above them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'while he was trembling' is textually difficult in the OCR; the negative particle may be uncertain. A possible alternative is 'while he did not tremble.'
    reason: textual_variant
  - marker: b
    text: The 'great vessel' likely corresponds to the flood craft in the vision's symbolic retelling of Genesis, but the text itself keeps the image in animal-apocalypse form.
    reason: cross_reference
  - marker: c
    text: Or 'And one of those four went to that white heifer and instructed him in a secret, while he was trembling; and that heifer was born and became a man, and built for himself a great vessel and dwelt upon it. And three cows were with him on that vessel, and they were covered over above them.'.
