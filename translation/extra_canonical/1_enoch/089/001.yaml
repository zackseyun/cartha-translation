lexical_decisions:
- source_word: ፬ሖረ
  chosen: went
  alternatives:
  - came
  - approached
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates movement toward the white heifer. 'Went to' preserves the directional sense without over-specifying manner.
- source_word: ላህም ጸዓዳ
  chosen: white heifer
  alternatives:
  - white cow
  - white calf
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, bovine imagery is symbolic and should be preserved. 'Heifer' fits the recurring animal symbolism better than flattening to 'cow,' though the exact age/sex nuance may be broader.
- source_word: መሀሮ ምሥጢረ
  chosen: instructed him in a secret
  alternatives:
  - taught him a mystery
  - revealed a secret to him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pair conveys both teaching and disclosure of hidden knowledge. 'Instructed him in a secret' preserves the pedagogical force and the apocalyptic sense of concealed revelation.
- source_word: እንዘ ኢይርዕድ
  chosen: while he was trembling
  alternatives:
  - while he did not tremble
  - while he was afraid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR is difficult here, but the context strongly favors a participial clause of fear/trembling during the revelatory encounter. Because the negative particle may be uncertain in the OCR, the main text follows the more coherent contextual sense and the uncertainty is noted in a footnote.
- source_word: ተወልደ ወኮነ ሰብአ
  chosen: was born and became a man
  alternatives:
  - was born and became human
  - came forth and became a man
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The transformation from animal symbol to human figure is central to the vision and should remain explicit. 'Man' reflects the singular individual in the narrative.
- source_word: መስቀረ ዐቢየ
  chosen: a great vessel
  alternatives:
  - a large ship
  - an ark
  - a great structure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term likely denotes a ship/ark-like craft. 'Vessel' preserves the image without importing the biblically loaded term 'ark' more strongly than the Ge'ez itself requires.
- source_word: ነበረ ዲቤሃ
  chosen: dwelt upon it
  alternatives:
  - lived in it
  - stayed on it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition suggests being on/upon the vessel rather than simply inside it. 'Dwelt' keeps the elevated register of the vision.
- source_word: ፫አላህምት
  chosen: three cows
  alternatives:
  - three bovines
  - three heifers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural continues the animal symbolism. 'Cows' is the clearest natural English rendering here.
- source_word: ተከድኑ ላዕሌሆሙ
  chosen: they were covered over above them
  alternatives:
  - a covering was over them
  - they were sheltered overhead
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive with the prepositional phrase suggests an overhead covering. The somewhat literal rendering preserves the strange visionary texture rather than smoothing it away.
