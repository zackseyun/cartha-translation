theological_decisions:
- issue: Whether to render the transformed figure in explicitly typological terms tied to Noah
  chosen_reading: Retain the animal-to-man transformation and vessel imagery without naming Noah in the translation
  alternative_readings:
  - Translate interpretively as Noah building the ark
  - Use 'ark' to foreground the Genesis parallel
  rationale: The vision clearly alludes to the flood narrative, but the passage presents it through symbolic dream imagery. The translation preserves the symbolism rather than collapsing it into direct historical identification.
  doctrine_reference: Preserve theological tension rather than resolve it; do not paraphrase beyond what the witness warrants.
