translation:
  text: And that sheep, whose eyes had been opened, saw that ram in the midst of the sheep—the one that had abandoned its glory—and it began to gore those sheep and trample them, and it went about without dignity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the sheep.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'abandoned its glory' is likely symbolic within the vision; it may refer to lost honor, splendor, or status.
    reason: cultural_note
  - marker: c
    text: The final clause may also be rendered 'and it went on unchecked' or 'with no one hindering it.'
    reason: lexical_alternative
  - marker: d
    text: Or 'went on without anyone restraining it'.
    reason: previous_rendering
lexical_decisions:
- source_word: በግዕ
  chosen: sheep
  alternatives:
  - lamb
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse the animal imagery is sustained and collective; 'sheep' fits the symbolic register better than 'lamb' here for an individual member of the flock.
- source_word: ዘተፈትሐ አዕይንቲሁ
  chosen: whose eyes had been opened
  alternatives:
  - whose eyes were opened
  - that had opened its eyes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/periphrastic sense best reflects a visionary awakening or granted perception, not merely the animal's own act of looking.
- source_word: ሐርጌ
  chosen: ram
  alternatives:
  - male sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes a male sheep; 'ram' is the natural English equivalent and preserves the animal symbolism.
- source_word: ዘማእከለ አባግዕ
  chosen: in the midst of the sheep
  alternatives:
  - among the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A slightly more formal rendering preserves the visual scene of the ram situated within the flock.
- source_word: ዘሐደገ ስብሐተ
  chosen: that had abandoned its glory
  alternatives:
  - that had left its glory
  - that had forsaken its splendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ስብሐት commonly carries the sense of glory, honor, or splendor. 'Abandoned its glory' preserves the moral and symbolic force without over-interpreting what the glory specifically signifies.
- source_word: አሐዘ ይጉድኦሙ
  chosen: it began to gore them
  alternatives:
  - it seized to strike them
  - it started to butt them
  - it began to destroy them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the animal-vision context, a violent horning/butting sense is most fitting. 'Gore' keeps the concrete animal imagery and the onset marked by አሐዘ ('began').
- source_word: ወኬዶሙ
  chosen: and trample them
  alternatives:
  - and beat them down
  - and cast them down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to continue the violent action against the flock; 'trample' is vivid and coherent with the ram imagery, while avoiding a vague generic verb.
- source_word: ዘእንበለ ተደላ
  chosen: without anyone restraining it
  alternatives:
  - with no one hindering it
  - and it went on unchecked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase conveys absence of opposition or restraint. This rendering makes the sense explicit in idiomatic English while preserving the ominous force.
