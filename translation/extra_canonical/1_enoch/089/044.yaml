theological_decisions:
- issue: Meaning of the ram's 'glory'
  chosen_reading: Render literally as 'glory' without specifying whether this refers to royal dignity, horned strength, or former honor.
  alternative_readings:
  - splendor
  - majesty
  - strength
  rationale: The Animal Apocalypse often uses animal features symbolically. The Ge'ez supports a broad term, and the translation should preserve the symbolic openness rather than collapse it into one interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
