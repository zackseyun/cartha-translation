theological_decisions:
- issue: Whether to interpret the 'house' explicitly as the temple in the main text
  chosen_reading: Retain 'house' in the main text
  alternative_readings:
  - Render 'temple' directly
  rationale: The Animal Apocalypse regularly uses symbolic imagery. While the house
    likely refers to the sanctuary/temple, translating it as 'house' preserves the
    vision's own diction and avoids collapsing symbol into interpretation.
  doctrine_reference: Translation philosophy §1 Original-language primacy; §3 Preserve
    theological tension rather than resolve it.
