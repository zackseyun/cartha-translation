translation:
  text: And I saw until those sheep entered into a good place, into a land of delight
    and glory; and I saw until the sheep were satisfied, and that house was in their
    midst in the land of delight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''House'' may refer to the sanctuary or temple within the vision''s symbolic
      imagery.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'land of delight' is repeated at the end of the verse in the
      Ge'ez, reinforcing the restored and blessed setting.
    reason: cross_reference
lexical_decisions:
- source_word: አባግዕ
  chosen: sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse the animal imagery is sustained and should be
    preserved literally. 'Sheep' keeps the visionary symbolism rather than abstracting
    to 'people' or 'Israel'.
- source_word: መካን ሠናይ
  chosen: a good place
  alternatives:
  - a pleasant place
  - a beautiful place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መካን is a place/location term and ሠናይ means good/fair. 'Good place' is
    slightly formal but natural, and avoids over-interpreting the locale beyond the
    Ge'ez wording.
- source_word: ምድር ኃዋዝ
  chosen: a land of delight
  alternatives:
  - a delightful land
  - a pleasant land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ምድር is 'land,' and ኃዋዝ appears to denote pleasantness/delight. 'Land
    of delight' preserves the elevated apocalyptic register and the repeated phrase
    later in the verse.
- source_word: ስብሕት
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term commonly carries the sense of glory/honor. 'Glory' best fits
    the exalted visionary setting and pairs well with 'land of delight' without flattening
    the imagery.
- source_word: ጸግቡ
  chosen: were satisfied
  alternatives:
  - were filled
  - had enough
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys being filled or satisfied. 'Were satisfied' reads naturally
    in English and can include the sense of full provision in the restored setting.
- source_word: ቤት
  chosen: house
  alternatives:
  - dwelling
  - temple
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez says 'house.' Because in this context the referent may be the
    restored sanctuary, the more interpretive 'temple' is left to a footnote while
    the main text preserves the literal image.
- source_word: ማእከሎሙ
  chosen: in their midst
  alternatives:
  - among them
  - at their center
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase indicates central presence among the sheep. 'In their midst'
    preserves both spatial and communal force in elevated but readable English.
