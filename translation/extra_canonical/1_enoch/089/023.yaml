theological_decisions:
- issue: Animal symbolism in the Dream Visions
  chosen_reading: Render the animals literally as animals in the main text, without
    decoding them into historical groups.
  alternative_readings:
  - Translate interpretively as human enemies pursuing Israel
  - Use more generic predator language
  rationale: The vision communicates through sustained animal imagery. The translation
    should preserve that imagery and leave historical identification to notes and
    commentary rather than collapsing the symbol into interpretation.
  doctrine_reference: 'Book context: visionary and apocalyptic prose should retain
    its imagery.'
