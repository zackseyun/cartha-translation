translation:
  text: And the wolves began to pursue those sheep until they drove them into a pool
    of water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until they overtook them at a pool of water.' The Ge'ez verb in this
      clause is difficult, and the exact force may be either simple arrival or forced
      movement into the water.
    reason: lexical_alternative
lexical_decisions:
- source_word: አዝእብት
  chosen: the wolves
  alternatives:
  - the wild beasts
  - the dogs/wolf-like animals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, predator species are symbolic but should still
    be rendered concretely as animals. The form here corresponds to 'wolves,' which
    fits the recurring imagery of hostile attackers against the sheep.
- source_word: አሐዙ
  chosen: began
  alternatives:
  - seized
  - took hold
  - started
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The verb can denote taking hold or beginning, but in this construction
    before an infinitive-like following action it is best taken as an inceptive auxiliary:
    ''began to.'' This yields natural English while staying close to the Ge''ez syntax.'
- source_word: ይትልውዎሙ
  chosen: to pursue them
  alternatives:
  - to follow them
  - to chase them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is active hostile following, not neutral accompaniment. 'Pursue'
    preserves the predatory pressure of the vision better than the weaker 'follow,'
    while remaining less colloquial than 'chase.'
- source_word: ዝኩ አባግዕት
  chosen: those sheep
  alternatives:
  - these sheep
  - the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative is worth preserving because it points back to the specific
    group already in view in the vision narrative.
- source_word: እስክ ተረክብዎሙ
  chosen: until they drove them
  alternatives:
  - until they overtook them
  - until they reached them
  - until they caused them to come
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause marks the outcome of the pursuit. Because the following phrase
    gives a destination ('into a pool of water'), an English causative sense such
    as 'drove them' best captures the movement forced by the wolves. A more literal
    'reached them' would leave the relation to the water phrase obscure.
- source_word: በአሐቲ ዐይገ ማይ
  chosen: into a pool of water
  alternatives:
  - into a water pit
  - into one body of water
  - at a spring of water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a single water-place. 'Pool of water' is clear, concrete,
    and preserves the imagery without over-specifying whether it is a pit, pond, or
    reservoir.
