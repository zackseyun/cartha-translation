lexical_decisions:
- source_word: ካልኣነ
  chosen: other
  alternatives:
  - another
  - the rest of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form marks distinction from a previously mentioned group. 'Other' fits the plural noun that follows better than singular 'another.'
- source_word: አባግዕ
  chosen: sheep
  alternatives:
  - flock
  - ewes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, sheep is the stable image for the covenant people or a subgroup within them. 'Sheep' preserves the visionary symbolism better than the collective 'flock.'
- source_word: ብዙኃነ
  chosen: many
  alternatives:
  - numerous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward quantitative adjective; 'many' is natural English and keeps the emphasis on the size of the group sent.
- source_word: ፈነወ
  chosen: I sent
  alternatives:
  - I dispatched
  - I released
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes sending or dispatching. 'I sent' is the plainest rendering and suits the narrative sequence.
- source_word: ኀቤሆሙ
  chosen: to them
  alternatives:
  - toward them
  - unto them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Directional preposition with pronominal suffix. In context it refers to the previously mentioned sheep, so 'to them' is idiomatic.
- source_word: ለዝኩ አባግዕ
  chosen: to those sheep
  alternatives:
  - unto those sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative specifies the recipient group. Rendering the phrase explicitly avoids ambiguity in English.
- source_word: ያስምዑ
  chosen: that they might hear
  alternatives:
  - that they might listen
  - that they might make hear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is somewhat difficult, but in context the sense is best taken as hearing/listening rather than causative 'make hear.' This yields a coherent sequence with the following verb.
- source_word: የአውይዉ
  chosen: cry out
  alternatives:
  - lament
  - wail
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys a loud cry, often of distress or protest. 'Cry out' preserves the force without over-specifying whether the tone is lament or alarm.
- source_word: ዲቤሆሙ
  chosen: over them
  alternatives:
  - concerning them
  - against them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can indicate relation toward or over someone. 'Over them' keeps the image broad enough for either lament or protest in the vision.
