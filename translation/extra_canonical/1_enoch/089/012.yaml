translation:
  text: And that bull which was born from him begot a black wild boar and a white
    sheep; and that wild boar produced many boars, and that sheep produced twelve
    sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The sequence likely continues the symbolic genealogy of peoples or lineages
      in the dream vision; the translation preserves the animal figures rather than
      substituting their probable historical referents.
    reason: cultural_note
  - marker: b
    text: The Ethiopic wording distinguishes a black wild swine from a white sheep;
      the color contrast is likely meaningful within the vision and is therefore retained
      explicitly.
    reason: lexical_alternative
  - marker: c
    text: Or 'that heifer which was born from him produced'.
    reason: previous_rendering
lexical_decisions:
- source_word: ላህም
  chosen: heifer
  alternatives:
  - cow
  - young cow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, bovine imagery is gendered and genealogical.
    Since the clause says 'which was born from him,' a female bovine offspring is
    intended; 'heifer' preserves the animal-symbolic register better than the generic
    'cow'.
- source_word: ሐራዊያ
  chosen: wild boar
  alternatives:
  - boar
  - wild pig
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes a wild swine rather than a domestic pig. 'Wild boar'
    preserves the vivid animal imagery and fits the contrastive symbolic taxonomy
    of the vision.
- source_word: ገዳም ጸሊመ
  chosen: black
  alternatives:
  - dark-colored
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The color term is explicit and symbolically important in the vision sequence.
    'Black' is the plain rendering; the preceding animal term already carries the
    species sense, so the color need not be expanded.
- source_word: በግዐ ጸዐዳ
  chosen: white sheep
  alternatives:
  - white ram
  - white ewe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The base noun belongs to the sheep imagery used throughout this apocalypse.
    Because the sex is not overtly marked in English by the Ge'ez form here, 'white
    sheep' is the least over-specific rendering while preserving the color symbolism.
- source_word: አሕርወ ብዙኃነ
  chosen: many boars
  alternatives:
  - many swine
  - many pigs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This appears to be the plural corresponding to the earlier wild-boar
    imagery. 'Many boars' keeps the symbolic continuity with the singular parent animal.
- source_word: ዐሠርተ ወክልኤተ አባግዐ
  chosen: twelve sheep
  alternatives:
  - twelve lambs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The numeral is straightforward: ''ten and two.'' The noun is the plural
    of the sheep term. ''Sheep'' is preferable to ''lambs'' here because the verse
    is tracing symbolic descendants rather than emphasizing youth.'
