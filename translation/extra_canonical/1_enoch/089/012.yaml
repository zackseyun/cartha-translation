  category: mistranslation
  tier: 3
  from: that heifer which was born from him produced
  to: that bull which was born from him begot
  rationale: 'The Ge''ez phrase ''wəʾətu lahm'' is masculine (''that bull''), modified
    by the masculine relative verb ''za-tawalda'' (''who was born''). The drafter
    incorrectly assumed a female offspring (''heifer''). In the Animal Apocalypse''s
    allegory, this male bovine represents Isaac (born from Abraham), who begets (''walada'')
    Esau (the black wild boar) and Jacob (the white sheep). | Adjudicator: The reviewer
    is entirely correct on both grammatical and contextual grounds. The Ge''ez demonstrative
    pronoun ''wəʾətu'' (that), the relative verb ''za-tawalda'' (who was born), and
    the main verb ''walada'' '
