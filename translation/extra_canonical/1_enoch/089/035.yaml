translation:
  text: And that ram took another sheep with him, and came upon those sheep that had
    gone astray; and he began to kill them. And the sheep were afraid before him,
    and that ram made all those sheep that had gone astray return, and they went back
    into their folds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'he began to kill them' may also be understood more
      woodenly as 'he seized them to kill them'; the Ge'ez construction emphasizes
      the onset of violent action.
    reason: lexical_alternative
lexical_decisions:
- source_word: በግዕ
  chosen: ram
  alternatives:
  - sheep
  - male sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, ovine imagery is symbolically differentiated;
    this form here refers to the leading male sheep, so 'ram' preserves the narrative
    distinction better than the generic 'sheep'.
- source_word: ነሥአ ምስሌሁ
  chosen: took another sheep with him
  alternatives:
  - brought with him another sheep
  - took with him his companion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means 'took/carried,' with the prepositional phrase indicating
    accompaniment. 'Took ... with him' is the most natural English equivalent while
    preserving the action.
- source_word: ባዕደ አባግዐ
  chosen: another sheep
  alternatives:
  - one of the sheep
  - a different sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ባዕደ carries the sense 'other/another.' The singular sense fits the immediate
    syntax better than a collective rendering.
- source_word: ቦአ ዲበ
  chosen: came upon
  alternatives:
  - went up against
  - came to
  - approached
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The combination conveys movement toward/upon a group. 'Came upon' preserves
    the confrontational force without overinterpreting it as military assault.
- source_word: እለ ስሕቱ
  chosen: that had gone astray
  alternatives:
  - that had erred
  - that had wandered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes straying or going wrong. In this sheep allegory, 'gone
    astray' preserves both literal-animal and moral-covenantal resonance.
- source_word: አኀዘ ይቅትሎሙ
  chosen: he began to kill them
  alternatives:
  - he seized them to kill them
  - he set about killing them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction with 'began/seized' plus imperfect expresses inception
    of action. 'Began to kill them' is idiomatic and preserves the ongoing violent
    action.
- source_word: ፈርሁ እምገጹ
  chosen: were afraid before him
  alternatives:
  - feared at his presence
  - were terrified before his face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the phrase invokes fear from before his face/presence. 'Before
    him' keeps the elevated register and the directness of the Ge'ez.
- source_word: አግብኦሙ
  chosen: made ... return
  alternatives:
  - brought ... back
  - caused ... to come back
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The causative sense is important: the ram does not merely accompany
    them but compels or causes their return.'
- source_word: አዕጻዲሆሙ
  chosen: their folds
  alternatives:
  - their pens
  - their enclosures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Within the sheep allegory, 'folds' is the most natural pastoral term
    and preserves the animal-vision imagery better than the more generic 'enclosures'.
