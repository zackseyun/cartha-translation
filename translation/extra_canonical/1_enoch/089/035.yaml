theological_decisions:
- issue: Violence of the ram toward the straying sheep
  chosen_reading: Retain the explicit killing language in the main text.
  alternative_readings:
  - Soften to 'punish them' or 'strike them'
  rationale: The Ge'ez explicitly uses killing language, and the apocalyptic allegory
    often depicts judgment through animal violence. Softening it would mute the severity
    of the vision.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment formulas
    into generic religious prose.
