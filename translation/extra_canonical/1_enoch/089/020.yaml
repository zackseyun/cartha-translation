theological_decisions:
- issue: Identification of the divine figure in the animal vision
  chosen_reading: the Lord of the sheep refers to God within the vision-symbolism
  alternative_readings:
  - their lord in a less explicit sense
  rationale: The Animal Apocalypse consistently uses animal imagery with a divine overseer. Making the possessive relation explicit in English preserves the theological symbolism without importing later doctrinal language.
  doctrine_reference: Translation philosophy §Original-language primacy; preserve apocalyptic imagery
