translation:
  text: And the Lord of the sheep came to them, and while they were striking those wolves, and the wolves were crying out, but the sheep became silent, and from that time they ceased.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The closing clause is difficult in the Ethiopic sequence: after ''the sheep became silent,'' the text reads literally something like ''and from that time they cried out.'' The subject of the final verb may be resumptive or reflect a textual disturbance.'
    reason: textual_variant
  - marker: b
    text: Or 'while the wolves were trampling those sheep, the wolves cried out'.
    reason: previous_rendering
  - marker: c
    text: Or 'and from that time they cried out.'.
    reason: previous_rendering
lexical_decisions:
- source_word: እግዚኦሙ
  chosen: the Lord of them / the Lord of the sheep
  alternatives:
  - their Lord
  - their master
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, possessive lordship over the sheep is a recurring metaphor for God. 'The Lord of the sheep' makes the imagery explicit in English and preserves the apocalyptic animal-symbolic frame better than the more ambiguous 'their Lord.'
- source_word: መጽአ ኀቤሆሙ
  chosen: came to them
  alternatives:
  - came near them
  - came unto them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion-plus-goal expression; 'came to them' is clear modern English without loss of force.
- source_word: አባግዕ
  chosen: sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular collective 'flock' would smooth the imagery too much. 'Sheep' preserves the repeated symbolic identity of the people in the vision.
- source_word: ይዝብጥዎሙ
  chosen: were trampling
  alternatives:
  - were crushing
  - were beating down
  - were oppressing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests violent physical handling. 'Were trampling' fits the animal-vision imagery and conveys active abuse without overinterpreting.
- source_word: እልኩ አዝእብት / አዝእብት
  chosen: the wolves ... the wolves
  alternatives:
  - those wolves
  - the wild beasts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated noun appears to identify the attackers specifically as wolves. Retaining 'wolves' preserves the symbolic cast of the vision. The repetition may be emphatic or reflect a difficult textual sequence, so it is represented in the lexical record and handled smoothly in the English line.
- source_word: የአውይዉ
  chosen: cried out
  alternatives:
  - howled
  - wailed
  - shouted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes vocal outcry. 'Cried out' is broad enough to fit either lament or loud calling, while 'howled' would over-animalize the line beyond what the Ge'ez explicitly requires.
- source_word: አርመሙ
  chosen: became silent
  alternatives:
  - were silent
  - fell silent
  - were still
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This marks a contrast with the wolves' outcry. 'Became silent' captures the transition implied by the narrative moment.
- source_word: እምሶቤሃ አፀርኁ
  chosen: from that time they cried out
  alternatives:
  - then they cried out
  - from then on they lamented
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is textually awkward after 'the sheep became silent.' I render it transparently as a temporal transition plus renewed outcry, while flagging the difficulty in a footnote rather than forcing a harmonization.
