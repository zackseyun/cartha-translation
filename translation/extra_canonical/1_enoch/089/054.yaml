lexical_decisions:
- source_word: ኃደጉ
  chosen: abandoned
  alternatives:
  - left
  - forsook
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A strong verb of leaving is needed in this judgment context; 'abandoned' preserves culpable departure better than the more neutral 'left'.
- source_word: ቤተ ለእግዚአ
  chosen: that house of their Lord
  alternatives:
  - the house of the Lord
  - the house belonging to their master
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse the house imagery refers to the sanctuary/temple in symbolic form. 'Their Lord' fits the sheep-lord imagery locally without importing later ecclesial language.
- source_word: ማኅፈዶ
  chosen: his tower
  alternatives:
  - his fold
  - his enclosure
  - his stronghold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term in this context is commonly understood as a protective elevated structure associated with the sheep imagery. 'Tower' preserves the apocalyptic animal-vision symbolism better than flattening it to 'fold,' while still matching the sanctuary complex image.
- source_word: ስሕቱ
  chosen: went astray
  alternatives:
  - erred
  - wandered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Went astray'' is the most natural rendering in a sheep allegory and preserves both moral and spatial deviation.'
- source_word: ተጸለሉ አዕይንቲሆሙ
  chosen: their eyes were blinded
  alternatives:
  - their eyes were darkened
  - their eyes were covered over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive sense of loss of sight is central to the vision's indictment. 'Blinded' is concise and forceful.
- source_word: እግዚአ አባግዕ
  chosen: the Lord of the sheep
  alternatives:
  - the master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a recurring title in the Animal Apocalypse. 'Lord' preserves elevated register and consistency with the symbolic narrative.
- source_word: ገብረ ቀትለ ብዙኃ
  chosen: bring about a great slaughter
  alternatives:
  - made a great slaughter
  - worked much killing among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction expresses causation or enactment of mass killing. 'Bring about a great slaughter' is idiomatic English while retaining the severity of judgment.
- source_word: በመራዕይሆሙ
  chosen: in their pastures
  alternatives:
  - in their grazing places
  - in their pastureland
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Within the sheep allegory, the noun points to grazing/pasture places rather than a generic location. 'Pastures' is vivid and natural.
- source_word: ይጼውዕዎ
  chosen: cried out
  alternatives:
  - called out
  - wailed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes vocal appeal or outcry. 'Cried out' preserves ambiguity between lament and appeal.
- source_word: እልኩ አባግዕ ለዝኩ ቀትል
  chosen: those sheep cried out because of that slaughter
  alternatives:
  - those sheep called out concerning that killing
  - those sheep cried out at that slaughter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The syntax is difficult, but this rendering keeps the demonstrative force ('those...that') and links the cry directly to the slaughter.
- source_word: አግብኡ መካኖ
  chosen: left his place
  alternatives:
  - departed from his place
  - entered his place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form is difficult, but in context after abandonment of the house and tower, a further departure from the proper place fits the narrative flow better than 'entered.' Because the reading is uncertain, the alternative is preserved in a footnote.
