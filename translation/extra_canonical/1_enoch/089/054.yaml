translation:
  text: And after that I saw when they abandoned the house of the Lord and his tower, and they went completely astray, and their eyes were blinded. And I saw the Lord of the sheep bring about a great slaughter among them in their pastures, until those sheep invited that slaughter and betrayed his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'his tower' may also be understood as 'his fold' or 'his enclosure'; the imagery likely belongs to the symbolic sanctuary complex in the vision.
    reason: lexical_alternative
  - marker: b
    text: The final clause is textually difficult. The verb before 'his place' may be understood differently in some readings, yielding a sense such as 'and they came to/entered his place' rather than 'left his place.'
    reason: textual_variant
  - marker: c
    text: Or 'And again'.
