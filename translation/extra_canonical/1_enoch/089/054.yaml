theological_decisions:
- issue: Agency of the slaughter
  chosen_reading: the Lord of the sheep bring about a great slaughter among them
  alternative_readings:
  - the Lord of the sheep allowed a great slaughter among them
  - the Lord of the sheep made many of them be slain
  rationale: The Ge'ez presents the Lord of the sheep as active in judgment. To preserve the text's theological tension, the translation keeps direct divine agency rather than softening it into mere permission.
  doctrine_reference: Preserve theological tension rather than resolve it.
