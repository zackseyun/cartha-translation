theological_decisions:
- issue: Whether to preserve the symbolic image of the 'horn' or interpret it directly as political power
  chosen_reading: Retain 'horn' in the main text
  alternative_readings:
  - raised up strength for it
  - gave it authority
  rationale: The Animal Apocalypse communicates through sustained animal symbolism. Preserving 'horn' keeps the apocalyptic imagery intact and lets readers see the symbolic texture rather than replacing it with interpretation.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten symbolic language into generic prose.'
