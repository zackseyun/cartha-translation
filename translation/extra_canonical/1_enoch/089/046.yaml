  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom of raising up a horn fits biblical and apocalyptic imagery of strength or authority. 'Raised up' preserves that imagery better than a flatter political paraphrase.
- source_word: ገብረ መኰንነ ወመራሔ
  chosen: made it ruler and leader
  alternatives:
  - appointed it prince and guide
  - made it governor and leader
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired terms denote authority and guidance. 'Ruler and leader' is readable modern English while preserving the double designation.
- source_word: ለአባግዕ
  chosen: of the sheep
  alternatives:
  - over the sheep
  - for the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the sphere of authority. English idiom prefers 'leader of the sheep,' though the sense 'over the sheep' is also possible.
- source_word: በኵሉዝ አክላብ
  chosen: all the dogs
  alternatives:
  - every dog
  - the whole pack of dogs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is collective. 'All the dogs' preserves the hostile animal imagery in the vision.
- source_word: ያጸህቅዎሙ
  chosen: kept driving ... away
  alternatives:
  - harassed
  - pursued
  - oppressed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests pressing hard upon or forcing away. 'Kept driving away' fits the immediate image of dogs against sheep and preserves the ongoing action.
