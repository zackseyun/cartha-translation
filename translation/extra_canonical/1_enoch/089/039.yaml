translation:
  text: And I saw until they grew quiet from the outcry of those sheep, and they crossed
    that stream of water. And those other sheep stood still, the ones who were leading
    them, and they set down those who had lain down, and they led them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'they set down those who had lain down' is textually
      and lexically difficult. The Ge'ez may mean that the leading sheep placed, stationed,
      or gathered those who had lain down before leading them onward.
    reason: textual_variant
  - marker: b
    text: '''Stream of water'' could also be rendered ''watercourse'' or ''river,''
      depending on how specifically the flowing water is understood in context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አርመሙ
  chosen: grew quiet
  alternatives:
  - were silenced
  - became calm
  - ceased
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes becoming silent or quiet. 'Grew quiet' preserves the
    processive sense after the prior tumult in the vision without over-specifying
    an external silencing.
- source_word: እምጽራኁ
  chosen: from the outcry
  alternatives:
  - from their cry
  - from the shouting
  - from the clamor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is best taken as cry/outcry/clamor. 'Outcry' fits the Animal
    Apocalypse's vivid scene and keeps the collective, distressed force.
- source_word: በግዕ
  chosen: sheep
  alternatives:
  - flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The animal symbolism should remain concrete. 'Sheep' is the standard
    local rendering in this section, not the more abstract 'flock.'
- source_word: ውሒዘ ማይ
  chosen: stream of water
  alternatives:
  - watercourse
  - torrent of water
  - river
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally points to a flowing body of water. 'Stream of water'
    is transparent and avoids overcommitting to 'river' if the Ge'ez is more general.
- source_word: ቆሙ
  chosen: stood still
  alternatives:
  - stood
  - halted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context the sheep pause after the crossing. 'Stood still' brings out
    the narrative force better than the bare 'stood' while remaining close to the
    verb.
- source_word: ካልኤሆሙ
  chosen: those other
  alternatives:
  - the others
  - another group of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This marks a distinct subset within the sheep. 'Those other' preserves
    the demonstrative feel and the contrastive function.
- source_word: ይመርሕዎሙ
  chosen: were leading them
  alternatives:
  - guided them
  - went before them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the ordinary term for leading/guiding. 'Were leading them'
    keeps the participial or relative sense tied to the sheep in front.
- source_word: ተክሎሙ
  chosen: set down
  alternatives:
  - placed
  - stationed
  - caused to stand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult, but in context after the crossing it likely means
    placing or setting the others in position. 'Set down' is cautious and concrete.
- source_word: ለእለ ሰከቡ
  chosen: those who had lain down
  alternatives:
  - those who were lying down
  - those who had fallen down
  - those who had reclined
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means lie down/recline. In this visionary context it
    may imply collapse or prostration, but the more literal 'had lain down' avoids
    interpretive excess.
- source_word: መርሕዎሙ
  chosen: led them
  alternatives:
  - guided them
  - brought them onward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repeating 'led them' preserves the narrative repetition characteristic
    of apocalyptic report and avoids smoothing away the sequence.
