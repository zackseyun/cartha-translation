translation:
  text: And again I saw those sheep, how they went astray and walked in many paths,
    and they abandoned that house of their Lord. And the Lord of the sheep called
    some from among the sheep and sent them to the sheep, but the sheep began to kill
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their master'; the Ge'ez term can denote a lord or master. 'Lord' is
      chosen because the figure in the vision represents God as ruler of the flock.
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be understood more concretely as 'the sheep seized
      them in order to kill them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And again I saw those sheep again'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢክዎሙ ካዕበ
  chosen: And again I saw
  alternatives:
  - And I saw again
  - Then again I saw them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the repetitive visionary formula and apocalyptic sequencing
    without overloading the English with object marking already clear from context.
- source_word: ለዝኩ አባግዕ
  chosen: those sheep
  alternatives:
  - these sheep
  - the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative points back to the symbolic group already in view in
    the vision; 'those sheep' preserves that referential force.
- source_word: ከመ ስሕቱ
  chosen: how they went astray
  alternatives:
  - that they erred
  - how they were led astray
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys straying or erring; 'went astray' fits the sheep imagery
    and moral-religious sense at once.
- source_word: ወሖሩ በብዙሕ ፍናዋት
  chosen: and walked in many paths
  alternatives:
  - and went on many ways
  - and wandered through many रास्ते
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the concrete image of multiple paths rather than reducing it
    to abstract disobedience.
- source_word: ወሐደጉ ዝኩ ቤተ ዚአሆሙ
  chosen: and they abandoned that house
  alternatives:
  - and they left that house
  - and they forsook that house of theirs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is stronger than simple departure; 'abandoned' preserves covenantal
    and cultic force in the Animal Apocalypse setting.
- source_word: ወእግዚኦሙ ለአባግዕ
  chosen: their Lord / the Lord of the sheep
  alternatives:
  - their master
  - the master of the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can mean lord/master; 'Lord' best fits the theological role
    of the divine shepherd figure in this vision while preserving the genitival clarification
    in the second clause.
- source_word: ጸውዐ እምውስተቶሙ ለአባግዕ
  chosen: called some from among the sheep
  alternatives:
  - summoned sheep from among them
  - called out sheep from their midst
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates selection from within the flock; 'some' is supplied
    idiomatically because English requires an object and the context implies a subset.
- source_word: ወለአኮሙ ኀበ አባግዕ
  chosen: and sent them to the sheep
  alternatives:
  - and dispatched them to the sheep
  - and sent them toward the sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A missioning verb is in view; 'sent' is clear and preserves the prophetic
    commissioning motif.
- source_word: ወአባግዕ አኃዙ ይቅትልዎሙ
  chosen: but the sheep began to kill them
  alternatives:
  - and the sheep seized them to kill them
  - and the sheep took hold of them and killed them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction may imply either inception ('began to kill') or seizure
    with lethal intent. The chosen rendering preserves the hostile turn while avoiding
    overprecision where the syntax is slightly compressed.
