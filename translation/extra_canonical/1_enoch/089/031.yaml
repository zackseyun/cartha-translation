theological_decisions:
- issue: Referent of 'our Lord' in the Animal Apocalypse
  chosen_reading: Retain 'our Lord' as the narrator's/the vision's designation for
    the divine figure without specifying beyond the text.
  alternative_readings:
  - God
  - the Lord of the sheep
  - the heavenly sovereign
  rationale: The Ge'ez explicitly has 'our Lord.' To substitute a more interpretive
    title would reduce transparency and over-resolve the symbolic register of the
    vision.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Gender/personal reference of the pronoun in the final clause
  chosen_reading: Render the subject as 'it' in keeping with the immediate animal
    imagery ('ram').
  alternative_readings:
  - he was not able to stand ... and look at him
  rationale: The Animal Apocalypse regularly uses animal figures for human agents.
    Here the immediate lexical antecedent is the ram, so the English keeps the animal-symbol
    level in the main text while noting the possibility of personal reference in the
    lexical rationale.
  doctrine_reference: Original-language primacy over later interpretive smoothing.
