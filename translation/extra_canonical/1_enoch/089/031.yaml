translation:
  text: And all those said ones feared and trembled before him, and they begged after
    him for that ram that was with them [that was in their midst], because it was
    not able to stand before our Lord, and to look at him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'that was in their midst' is bracketed in the source witness
      and may reflect a secondary or uncertain reading.
    reason: textual_variant
  - marker: b
    text: The phrase rendered 'they begged after him' is difficult in the Ge'ez and
      could also suggest crying out after him or seeking him concerning the ram.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኵሎሙ
  chosen: all those
  alternatives:
  - all of them
  - all
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural totalizing term; rendered with explicit plural reference to preserve
    the collective reaction in the vision.
- source_word: እልኩ
  chosen: said ones
  alternatives:
  - those
  - the former ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form is difficult. It likely points back to the previously mentioned
    group. I preserve the anaphoric force with a slightly wooden rendering in the
    draft and explain uncertainty in a footnote-worthy way through lexical transparency.
- source_word: ይፈርሁ
  chosen: feared
  alternatives:
  - were afraid
  - stood in fear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic fear verb; 'feared' keeps the elevated apocalyptic register and
    pairs well with the following verb.
- source_word: ይርዐዱ
  chosen: trembled
  alternatives:
  - shook
  - quaked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A physical reaction accompanying fear; 'trembled' preserves the doubled
    fear formula rather than collapsing it.
- source_word: እምኔሁ
  chosen: before him
  alternatives:
  - from him
  - because of him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context the sense is fear in relation to the figure, best expressed
    idiomatically as 'before him,' while retaining the reverential/judicial force.
- source_word: ደርኁ ድኅሬሁ
  chosen: they begged after him
  alternatives:
  - they cried out after him
  - they pursued him
  - they sought him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is textually difficult. Given the following object 'for that
    ram,' the sense appears to be an appeal or petition directed after/behind him
    rather than simple physical following. I keep the awkwardness visible rather than
    over-smoothing.
- source_word: ለዝኩ በግዕ
  chosen: for that ram
  alternatives:
  - concerning that ram
  - that sheep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, species imagery matters. 'Ram' is preferable
    here over generic 'sheep' if the noun indeed denotes the male animal, preserving
    the symbolic distinction.
- source_word: ምስሌሆሙ
  chosen: that was with them
  alternatives:
  - among them
  - beside them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks the ram's association with the group. 'With them' is clear and
    natural, while a bracketed alternative preserves the possible more specific locative
    phrase.
- source_word: ዘሀሎ ማእከሎሙ
  chosen: that was in their midst
  alternatives:
  - which was among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Bracketed in the witness, so treated as uncertain/additional. It intensifies
    the locative relation and may be secondary; therefore preserved in brackets in
    the main rendering.
- source_word: እስመ ኢንክል ቀዊመ
  chosen: because it was not able to stand
  alternatives:
  - for it could not remain standing
  - because he was unable to stand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause gives the reason for the appeal. I render the subject as the
    ram, though the pronoun could be read personally as 'he' depending on how one
    construes the animal symbol.
- source_word: ቅድመ እግዚእነ
  chosen: before our Lord
  alternatives:
  - before the Lord
  - before our master
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The possessive is present in the Ge'ez and should be retained. 'Lord'
    fits the theological register better than 'master' in this visionary judgment
    context.
- source_word: አነጽሮቶ
  chosen: to look at him
  alternatives:
  - to gaze upon him
  - to behold him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes seeing or looking intently. 'Look at him' is readable
    modern English; the inability to stand and to look underscores overwhelming divine
    presence.
