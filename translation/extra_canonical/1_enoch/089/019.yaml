translation:
  text: And from it I saw the wolves, and how they grew exceedingly strong against the sheep with all their power, and the sheep cried out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from him' or 'from there'; the pronominal suffix in 'from it' is ambiguous in isolation, and the immediate antecedent depends on the wider vision context.
    reason: lexical_alternative
  - marker: b
    text: 'The paired verbs likely express both strengthening and increase/intensification: the hostile creatures became strong and grew in force or number.'
    reason: lexical_alternative
