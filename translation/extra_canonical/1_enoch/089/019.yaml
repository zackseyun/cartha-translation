theological_decisions:
- issue: Symbolic animal imagery in the Animal Apocalypse
  chosen_reading: Retain the concrete animal terms 'wild beasts,' 'birds,' and 'sheep' rather than interpret them as human groups in the main text.
  alternative_readings:
  - Translate interpretively as nations/leaders attacking Israel
  - Use 'flock' for sheep to foreground collective symbolism
  rationale: The passage is apocalyptic allegory, but the vision reports what Enoch sees. The translation should preserve the imagery and let interpretation remain secondary.
  doctrine_reference: 'Book context: preserve apocalyptic imagery; do not flatten symbolic language into generic prose.'
