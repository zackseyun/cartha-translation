lexical_decisions:
- source_word: እምኔሁ
  chosen: from it
  alternatives:
  - from him
  - from there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition እም with pronominal suffix most naturally means 'from it/him.' In this visionary sequence the antecedent is likely a previously mentioned entity or scene rather than a personal male figure, so 'from it' preserves the ambiguity without over-interpreting.
- source_word: ርኢክዎሙ
  chosen: I saw
  alternatives:
  - I looked at them
  - I beheld them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary reporting verb. 'I saw' is simple and preserves the dream-vision narrative style.
- source_word: አዝእብት
  chosen: wild beasts
  alternatives:
  - beasts
  - animals of prey
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, animal imagery is symbolically charged. 'Wild beasts' preserves the contrast with domesticated sheep and keeps the threatening force.
- source_word: አፎ
  chosen: the birds
  alternatives:
  - birds
  - flying creatures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun refers to birds/fowl. The article is supplied in English for naturalness while retaining the class of symbolic creatures.
- source_word: ጸንዑ
  chosen: grow strong
  alternatives:
  - became strong
  - prevailed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys strengthening or becoming firm. 'Grow strong' fits the sequence with the following intensifying term and preserves the image of rising hostile power.
- source_word: ፈድፋደ
  chosen: increase
  alternatives:
  - multiply
  - become more numerous
  - advance further
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term likely adds the sense of increase or intensification after 'grow strong.' Rendering both verbs avoids flattening the paired buildup of menace.
- source_word: ዲበ
  chosen: against
  alternatives:
  - upon
  - over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though literally often 'upon/on,' in hostile context with predatory animals and sheep it is best rendered 'against' to express aggression clearly.
- source_word: አባግዕ
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Animal Apocalypse repeatedly uses 'sheep' as the controlling image for the covenant people. Keeping 'sheep' maintains symbolic consistency.
- source_word: በኵሉ ኃይሎሙ
  chosen: with all their power
  alternatives:
  - in all their strength
  - with their whole might
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase intensifies the assault. 'With all their power' is idiomatic and preserves the totality of hostile force.
- source_word: ጸርኁ
  chosen: cried out
  alternatives:
  - wailed
  - raised a cry
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes crying aloud. 'Cried out' preserves urgency without specifying whether the cry is lament, alarm, or appeal.
