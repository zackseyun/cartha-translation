translation:
  text: And that vessel floated upon the water, and all the bulls and elephants and camels and donkeys were swallowed up into the earth; and all the beasts, and I could not see them, and they were not able to come out, but were destroyed and sank into the abyss.
  philosophy: optimal-equivalence
