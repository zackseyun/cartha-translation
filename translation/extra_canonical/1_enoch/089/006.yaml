lexical_decisions:
- source_word: መሥቀር
  chosen: mast
  alternatives:
  - ship's mast
  - beam
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this dream-vision context the term most naturally denotes a mast or upright timber associated with the preceding flood imagery. 'Mast' preserves the concrete image without overexplaining.
- source_word: ይጼቢ
  chosen: sank
  alternatives:
  - went down
  - was submerged
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb describes downward movement into water; 'sank' is vivid and idiomatic in English and fits the flood scene.
- source_word: አልህምት
  chosen: bulls
  alternatives:
  - oxen
  - cattle
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Within the Animal Apocalypse, bovine imagery is symbolically important. 'Bulls' keeps the specific animal class rather than flattening to generic 'cattle.'
- source_word: ነጊያት
  chosen: camels
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward animal term; retained literally.
- source_word: አገማል
  chosen: donkeys
  alternatives:
  - asses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Donkeys'' is the clear modern English equivalent; ''asses'' would sound archaic or distracting.'
- source_word: ኅሠጥሙ
  chosen: were swallowed up
  alternatives:
  - were engulfed
  - were submerged
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests being engulfed or swallowed down. 'Were swallowed up' preserves the forceful judgment image better than the flatter 'submerged.'
- source_word: እንስሳ
  chosen: cattle
  alternatives:
  - beasts
  - animals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the term appears to refer to domesticated herd animals rather than all living creatures universally. 'Cattle' keeps the animal-apocalypse register.
- source_word: አክህልክ
  chosen: birds
  alternatives:
  - fowl
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired expression with cattle points to another animal class observing the event; 'birds' is the natural modern rendering.
- source_word: ርእዮቶሙ
  chosen: saw them
  alternatives:
  - looked on them
  - beheld them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple visual perception in narrative sequence; 'saw them' is clear and direct.
- source_word: ስእኑ
  chosen: were not able
  alternatives:
  - could not
  - failed to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This expresses inability. 'Were not able' slightly preserves the formal narrative cadence.
- source_word: ወጺአ
  chosen: to come out
  alternatives:
  - to escape
  - to go forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The infinitive sense after inability is best rendered 'to come out,' preserving the concrete image of failed emergence.
- source_word: ተኃጐሉ
  chosen: were destroyed
  alternatives:
  - perished
  - were ruined
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb marks catastrophic loss. 'Were destroyed' fits the judgmental tone and pairs well with the following sinking.
- source_word: ተሠጥሙ ውስተ ቀላይ
  chosen: sank into the abyss
  alternatives:
  - went down into the deep
  - were submerged in the sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to a deep watery depth. 'Abyss' preserves apocalyptic resonance and the ominous finality of the scene better than the more ordinary 'sea' or 'deep.'
