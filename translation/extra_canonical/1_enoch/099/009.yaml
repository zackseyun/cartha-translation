theological_decisions:
- issue: Idolatry phrase with singular 'stone'
  chosen_reading: 'Retain the singular image: ''they worshiped a stone.'''
  alternative_readings:
  - they worshiped stones
  - they worshiped an idol of stone
  rationale: The Ge'ez object is singular. Since the verse condemns false worship
    in vivid, concrete terms, the singular should be preserved rather than generalized
    into a smoother plural.
  doctrine_reference: Translation philosophy §1, §4
- issue: Nature of the final judgment expression
  chosen_reading: 'Render as ruin joined with disgrace: ''they will be consumed in
    shame.'''
  alternative_readings:
  - they will perish in disgrace
  - they will be destroyed with reproach
  rationale: The line appears to combine destruction and public dishonor. The chosen
    rendering preserves both dimensions without over-specifying whether the shame
    is internal, social, or eschatological.
  doctrine_reference: Translation philosophy §3
