translation:
  text: They will forget and be afraid, because they did all their works in falsehood,
    and they worshiped a stone, and they will be consumed in shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will perish in disgrace.' The final verb-noun combination is difficult
      and may denote destruction accompanied by public reproach.
    reason: lexical_alternative
  - marker: b
    text: Literally 'they worshiped a stone,' likely a concrete image of idolatry
      rather than a generic reference to religion.
    reason: cultural_note
lexical_decisions:
- source_word: ይረሰዑ
  chosen: they will forget
  alternatives:
  - they will be forgotten
  - they will neglect
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form most naturally yields an active/plural future sense, 'they will
    forget.' A passive sense ('be forgotten') is possible in isolation but fits the
    sequence less well than an inward collapse of memory or awareness under judgment.
- source_word: ይፈርሁ
  chosen: be afraid
  alternatives:
  - fear
  - be terrified
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward future plural of fearing. 'Be afraid' keeps the simple
    force without overstating the intensity.
- source_word: በሐሰት
  chosen: in falsehood
  alternatives:
  - falsely
  - by deceit
  - in vain
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase modifies the manner of their deeds. 'In falsehood'
    preserves the moral and covenantal sense better than the flatter adverb 'falsely.'
- source_word: ኵሎ ገብሮሙ
  chosen: all their works
  alternatives:
  - all their deeds
  - everything they did
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase refers to the totality of their actions. 'All their works'
    preserves the concrete nouning typical of judgment speech.
- source_word: ለአብን
  chosen: a stone
  alternatives:
  - the stone
  - stone idols
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular object literally means 'to a stone.' In context it likely
    refers to idolatrous worship of an image or stone object, but the text itself
    is singular and should remain so in the main line.
- source_word: ይትሐጐሉ
  chosen: they will be consumed
  alternatives:
  - they will perish
  - they will be destroyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to denote being brought to ruin or consumed. 'Be consumed'
    preserves the apocalyptic force while leaving the exact mode of destruction open.
- source_word: በምዕር
  chosen: in shame
  alternatives:
  - in disgrace
  - in reproach
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun points to disgrace or reproach. 'In shame' is concise and readable,
    while still matching the moral exposure implied by the verse.
