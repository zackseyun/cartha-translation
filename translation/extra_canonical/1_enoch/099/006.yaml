theological_decisions:
- issue: Whether ኃጢአት should be rendered as the act/state of sin or as its judicial
    consequence
  chosen_reading: Retain 'sin' in the main text
  alternative_readings:
  - '''punishment'' has been prepared'
  - '''judgment for sin'' has been prepared'
  rationale: The translation philosophy prefers preserving tension rather than resolving
    ambiguity. The Ge'ez directly reads 'sin,' and the verse's rhetoric may intentionally
    personify or objectify sin as something awaiting the sinners on the day of bloodshed.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
