translation:
  text: 'And again I swear to you, sinners: sin has been prepared for the day of unceasing
    bloodshed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'punishment/judgment has been prepared for the day of bloodshed.' The
      Ge'ez text reads 'sin,' but the line may use the word for sin in a compressed
      sense for its consequence.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወካዕበ
  chosen: And again
  alternatives:
  - And further
  - Moreover
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Connective plus iterative adverb; preserves the repeated woe/oracle cadence
    in the Epistle.
- source_word: እኔ እምሕል ለክሙ
  chosen: I swear to you
  alternatives:
  - I declare to you under oath
  - I affirm to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal form conveys solemn asseveration, stronger than a simple 'say.'
    'Swear' keeps the prophetic-apocalyptic force.
- source_word: ለኃጥኣን
  chosen: sinners
  alternatives:
  - you sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct address to the wicked class. The vocative force is carried in
    English by apposition after 'to you.'
- source_word: ለዕለተ ደም
  chosen: for the day of ... bloodshed
  alternatives:
  - for the day of blood
  - for the day of blood-guilt
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'for the day of blood.' In context, English 'bloodshed' better
    conveys violent shedding of blood rather than the substance blood in abstraction.
- source_word: ዘአየሀድአ
  chosen: unceasing
  alternatives:
  - that does not cease
  - without rest
  - continual
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative form appears to qualify the blood/day as not stopping or
    not being restrained. 'Unceasing' is concise and preserves the ominous apocalyptic
    tone.
- source_word: ተደለወት
  chosen: has been prepared
  alternatives:
  - has been made ready
  - is appointed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Passive perfect sense: something stands readied in advance. ''Prepared''
    preserves the judicial sense without over-specifying divine agency.'
- source_word: ኃጢአት
  chosen: sin
  alternatives:
  - punishment for sin
  - guilt
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ethiopic noun normally means 'sin,' but in this difficult line it
    may stand metonymically for sin's consequence. Main text keeps the direct lexical
    value; the alternative is noted in a footnote because the syntax is compressed
    and ominous.
