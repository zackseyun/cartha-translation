translation:
  text: And in those days those who are pregnant will go out and tear their children, and they will cast them away; and their offspring will slip from them. And while they are nursing, they will cast away their children and will not return to them, and they will have no mercy on their beloved ones.
  philosophy: optimal-equivalence
