theological_decisions:
- issue: Whether the verse describes social cruelty in general or specifically the
    breakdown of natural family affection under judgment
  chosen_reading: The translation foregrounds familial violence and abandonment within
    a judgment setting.
  alternative_readings:
  - A more generalized description of lawless violence
  - A famine/exposure scene focused mainly on infanticide
  rationale: The repeated references to children, infants, return, and beloved ones
    point to the collapse of kinship bonds, a common apocalyptic sign of societal
    corruption and judgment.
  doctrine_reference: Preserve apocalyptic imagery and judgment formulas; do not flatten
    into generic modern prose.
