lexical_decisions:
- source_word: በአማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - at that time
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula; 'in those days' preserves the elevated prophetic register and repeated judgment style.
- source_word: ይጼንሱ
  chosen: they will bring forth
  alternatives:
  - they will conceive
  - they will bear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with children already mentioned, the sense is childbirth rather than mere conception. 'Bring forth' keeps the solemn register without becoming archaic beyond readability.
- source_word: ይወፅኡ
  chosen: and seize
  alternatives:
  - go out
  - bring out
  - take out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR sequence is difficult, but in the verse's violent chain of actions a simple 'go out' is too weak and disconnected. A forceful handling of the children is likely intended; 'seize' best fits the immediate context while remaining transparent about difficulty in a footnote.
- source_word: ይመሥጡ
  chosen: seize
  alternatives:
  - snatch away
  - swallow up
  - take
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to denote violent taking or snatching. 'Seize' communicates abrupt force without over-specifying the manner.
- source_word: ደቂቆሙ
  chosen: their children
  alternatives:
  - their little ones
  - their sons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A broad filial term is most natural here. 'Children' avoids narrowing the reference to males only and fits the repeated family-destruction motif.
- source_word: ይገድፍዎሙ
  chosen: they will cast them away
  alternatives:
  - they will abandon them
  - they will throw them away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys rejection/abandonment. 'Cast away' preserves the harshness and imagery better than the softer 'abandon,' while still sounding natural in English.
- source_word: ይደህፁ ውሉዶሙ
  chosen: they will strike down their infants
  alternatives:
  - they will crush their offspring
  - they will destroy their children
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase intensifies the violence. 'Infants' reflects the smaller, more vulnerable sense of the noun here, and 'strike down' preserves lethal force without overcommitting to a specific mechanism.
- source_word: እንዘ ይጠብዉ
  chosen: while they look on
  alternatives:
  - while they watch
  - as they keep watch
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause heightens the horror by stressing conscious observation. 'While they look on' is idiomatic and vivid.
- source_word: ኢይገብኡ ኀቤሆሙ
  chosen: will not return to them
  alternatives:
  - will not come back to them
  - will not go in to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is relational non-return after abandonment, not spatial entry. 'Return to them' is the clearest idiomatic rendering.
- source_word: ኢይምሕርዎሙ ለፍቁራኒሆሙ
  chosen: they will have no mercy on their beloved ones
  alternatives:
  - they will not spare their loved ones
  - they will show no compassion to those dear to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The line underscores the collapse of natural affection. 'Beloved ones' preserves the emotional force of the Ge'ez noun, while 'have no mercy' keeps the judgment-register diction.
