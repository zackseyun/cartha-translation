translation:
  text: 'Woe to you who do wickedness, and who praise and honor the word of falsehood: you will be destroyed, and no good life will be yours.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez phrase rendered 'words of falsehood' could also be understood more broadly as 'a false matter' or 'false speech.'
    reason: lexical_alternative
  - marker: b
    text: Or 'words of falsehood'.
    reason: previous_rendering
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  - Ah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a prophetic denunciation formula. 'Woe' best preserves the apocalyptic/judgment force better than the softer 'alas'.
- source_word: ለክሙ
  chosen: to you
  alternatives:
  - for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard dative address after an interjection of denunciation; idiomatic in English as 'Woe to you'.
- source_word: እለ ትገብሩ ርሰናናተ
  chosen: who do wickedness
  alternatives:
  - who practice evil
  - who commit lawless deeds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal phrase denotes active practice; 'do wickedness' keeps the concrete Semitic-style expression without overinterpreting the exact nuance of the noun.
- source_word: ወበነገረ ሐሰት
  chosen: words of falsehood
  alternatives:
  - a false matter
  - false speech
  - lying words
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገር can mean word, matter, or speech; in this context of praising and honoring, 'words of falsehood' fits the rhetoric of endorsing deceit.
- source_word: ትሴብሑ ወታከብሩ
  chosen: praise and honor
  alternatives:
  - glorify and esteem
  - commend and exalt
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A paired expression of public approval. 'Praise and honor' is natural English and preserves the intensifying parallelism.
- source_word: ተሐጕልክሙ
  chosen: you will be destroyed
  alternatives:
  - you will perish
  - your destruction will come
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form conveys ruin or destruction as coming upon the addressees. 'You will be destroyed' keeps the judicial force of the woe oracle.
- source_word: ወአልብክሙ ሕይወተ ሠናይተ
  chosen: no good life will be yours
  alternatives:
  - you will not have a good life
  - a good life will not belong to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause denies possession of a good life. This rendering preserves the possessive sense while remaining readable in English.
