theological_decisions:
- issue: Meaning of the threatened loss of 'good life'
  chosen_reading: A denial of blessed well-being/life, likely in the moral-apocalyptic sense rather than merely earthly prosperity
  alternative_readings:
  - Loss of prosperous life in the present age only
  - Loss of life altogether
  rationale: Within the Epistle's woe sayings, 'life' carries ethical and eschatological weight. 'Good life' preserves the wording without collapsing it into either mere wealth or a fully systematized afterlife doctrine.
  doctrine_reference: Preserve theological tension rather than resolve it.
