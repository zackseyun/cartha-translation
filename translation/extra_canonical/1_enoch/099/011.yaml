translation:
  text: Woe to you who spread out evil with your companions, for by companions you
    will be slain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Ge''ez repeats the companion-word in both clauses, likely for rhetorical
      effect: those acting with companions are judged by companions.'
    reason: lexical_alternative
  - marker: b
    text: The first companion-phrase could also be rendered 'through your companions'
      if taken instrumentally rather than associatively.
    reason: lexical_alternative
lexical_decisions:
- source_word: እሌ
  chosen: Woe to
  alternatives:
  - alas for
  - woe upon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse opens with the standard denunciatory interjection used in judgment
    sayings. 'Woe to' preserves the prophetic/apocalyptic force better than a softer
    lament such as 'alas for'.
- source_word: ለክሙ
  chosen: you
  alternatives:
  - to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dative pronoun governed by the woe formula; in English the idiom is naturally
    'Woe to you.'
- source_word: እለ ትሰፍሕዋ ለእኩይ
  chosen: who spread out evil
  alternatives:
  - who make evil abound
  - who enlarge evil
  - who broadcast evil
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys spreading, extending, or making broad. 'Spread out evil'
    keeps the concrete image of expansion rather than reducing it to a generic moral
    statement.
- source_word: በቢጽክሙ
  chosen: with your companions
  alternatives:
  - through your companions
  - among your companions
  - by your associates
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The preposition can mark association or instrument. Here an associative
    sense fits the first clause well: they propagate evil in concert with their peers
    or allies.'
- source_word: እስመ
  chosen: for
  alternatives:
  - because
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the reason for the woe in straightforward causal fashion.
- source_word: በቢጸል
  chosen: by companions
  alternatives:
  - by a companion
  - through companions
  - by your companions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Likely from the same noun as the previous phrase, creating a deliberate
    wordplay or measure-for-measure reversal: those who act with companions will perish
    by companions. I preserved the repetition in English.'
- source_word: ትትቀተሉ
  chosen: you will be slain
  alternatives:
  - you will be killed
  - you will be cut down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/jussive-future sense in a judgment context. 'Be slain' is elevated
    but still readable, and it suits the apocalyptic denunciation better than the
    flatter 'be killed'.
