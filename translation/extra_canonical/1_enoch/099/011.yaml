theological_decisions:
- issue: Nature of the retribution formula
  chosen_reading: 'The verse expresses measure-for-measure judgment: those who spread
    evil with companions will be slain by companions.'
  alternative_readings:
  - A more general statement that evildoers will die because of their associates
  - 'An instrumental reading in both clauses: they spread evil by means of allies
    and are killed by means of allies'
  rationale: The repeated companion-term in both clauses strongly suggests a rhetorical
    reversal. Preserving that repetition keeps the moral logic of the judgment oracle
    visible without over-explaining it in the main text.
  doctrine_reference: Preserve apocalyptic/judgment formulas and theological tension
    rather than flattening them.
