theological_decisions:
- issue: How to render the denunciation of corrupting righteousness and ordinance
  chosen_reading: A judicial-apocalyptic woe against those who distort righteous teaching/order
  alternative_readings:
  - A lament over those who misunderstand righteousness
  - A purely ethical warning without judicial overtones
  rationale: The verse belongs to a sequence of woes in the Epistle of Enoch. The legal and punitive diction supports a judgment oracle, not merely a lament or moral observation.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery and judgment formulas.'
- issue: Interpretation of the clause 'they were not sinners upon the earth'
  chosen_reading: Retain the difficult wording in the main text with minimal smoothing
  alternative_readings:
  - Emend toward 'they make themselves appear not to be sinners on earth'
  - Treat the clause as corrupt and omit its force in translation
  rationale: The transmitted wording is awkward, but transparency requires preserving the tension rather than silently resolving it. A footnote can signal the uncertainty.
  doctrine_reference: Preserve theological tension rather than resolve it; prefer transparent English plus a footnote over false confidence.
