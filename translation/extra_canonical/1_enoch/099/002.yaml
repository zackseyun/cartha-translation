translation:
  text: Woe to them who pervert the word of righteousness and the eternal ordinance, and consider themselves not to be sinners; upon the earth they shall be trampled down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'though they were not sinners upon the earth' is textually difficult. The Ethiopic wording may preserve an awkward or corrupt line; some interpreters understand it differently, such as implying a claim to innocence rather than an actual former innocence.
    reason: textual_variant
  - marker: b
    text: The image 'twist their heads around' is kept close to the Ethiopic. It likely expresses deliberate turning aside from what is right, but the bodily imagery is part of the verse's force.
    reason: lexical_alternative
  - marker: c
    text: Or 'and twist their heads around, though they were not sinners upon the earth; they shall be trampled down.'.
    reason: previous_rendering
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  - Ah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a prophetic denunciation formula; 'Woe' preserves the apocalyptic/judgment force better than the softer 'Alas.'
- source_word: ይዌልጥዎሙ
  chosen: pervert
  alternatives:
  - alter
  - distort
  - change
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys making something crooked or changing it from its proper form. 'Pervert' best fits the moral and judicial context of corrupting righteous speech.
- source_word: ለነገረ ርትዕ
  chosen: the word of righteousness
  alternatives:
  - the matter of righteousness
  - the righteous word
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገር can mean word, matter, or message. In this denunciation context, 'word of righteousness' preserves both speech and content without over-specifying.
- source_word: ሥርዐተ እንተ ለዓለም የኃልዉ
  chosen: the eternal ordinance
  alternatives:
  - the everlasting order
  - the ordinance that endures forever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሥርዐት denotes order, rule, or ordinance. The following phrase marks enduring permanence. 'Eternal ordinance' is concise and preserves the solemn legal-cosmic sense.
- source_word: ወይሬስዩ ርእሶሙ
  chosen: and twist their heads around
  alternatives:
  - and turn their heads aside
  - and make themselves turn away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom is difficult. A literal rendering involving 'heads' is retained to preserve the vivid bodily image rather than flattening it into a generic moral abstraction.
- source_word: ዘአኮኑ [ኃጥኣነ] ዲበ ምድር
  chosen: though they were not sinners upon the earth
  alternatives:
  - who were not sinners on the earth
  - although they had not been sinners on earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bracketed noun is textually uncertain, but the clause appears to contrast a former state with present corruption or judgment. 'Upon the earth' keeps the elevated register of the Ge'ez.
- source_word: ይትከየዱ
  chosen: they shall be trampled down
  alternatives:
  - they shall be trodden underfoot
  - they shall be crushed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive judgment sense suits the woe oracle. 'Trampled down' preserves the concrete apocalyptic punishment image.
