translation:
  text: And they will be terrified because of the madness of their heart, and their
    eyes will grow dark through the fear of their heart and through the visions of
    their dreams.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their eyes will be darkened.' The image may describe dimmed perception,
      terror-struck sight, or a figurative loss of clarity.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'visions of their dreams' keeps both the seeing-language and
      the dream-language of the Ge'ez, rather than reducing it to simply 'dreams.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይትረሰዑ
  chosen: they will be terrified
  alternatives:
  - they will tremble
  - they will be shaken
  - they will fear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form conveys being struck with fear or alarm. 'Be terrified' preserves
    the strong apocalyptic force better than the weaker 'fear,' while remaining readable
    English.
- source_word: እበደ
  chosen: madness
  alternatives:
  - folly
  - delusion
  - derangement
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun points to irrationality or derangement. 'Madness' best preserves
    the severity of inner moral-mental disorder in this woe context; 'folly' is too
    mild, while 'delusion' is possible but narrower.
- source_word: ልቦሙ
  chosen: their heart
  alternatives:
  - their mind
  - their inner being
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Semitic usage 'heart' includes thought and will as well as emotion.
    Retaining 'heart' preserves the anthropological texture of the source rather than
    reducing it to modern psychological categories.
- source_word: ይጼለሉ
  chosen: will grow dark
  alternatives:
  - will be darkened
  - will become dim
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to describe darkening or dimming. 'Will grow dark' is
    vivid and natural English, preserving the ominous imagery without overinterpreting
    it as literal blindness.
- source_word: አዕይንቲሆሙ
  chosen: their eyes
  alternatives:
  - their sight
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The concrete image of the eyes should be retained in apocalyptic discourse
    rather than abstracted to 'sight.'
- source_word: በፍርሃተ ልቦሙ
  chosen: through the fear of their heart
  alternatives:
  - because of the fear of their heart
  - from the terror of their heart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can indicate cause or means. 'Through' keeps the causal-instrumental
    sense and preserves the repeated 'heart' language of the verse.
- source_word: በርእየ ሕልሞሙ
  chosen: through the visions of their dreams
  alternatives:
  - because of the visions of their dreams
  - through the appearance of their dreams
  - through what they see in their dreams
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase combines seeing/vision language with dreams. 'Visions of their
    dreams' preserves the doubled visionary register better than flattening it to
    simply 'dreams.'
