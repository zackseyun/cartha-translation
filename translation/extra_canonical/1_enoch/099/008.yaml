theological_decisions:
- issue: Nature of the affliction described
  chosen_reading: The verse depicts inward terror and darkened perception as judgment-linked
    consequences, without specifying whether the dreams are divinely sent, psychologically
    generated, or both.
  alternative_readings:
  - The dreams are direct divine judgment visions
  - The line refers only to guilty conscience and subjective dread
  rationale: The Ge'ez states the effects—terror, darkened eyes, fear, dream-visions—without
    explicitly resolving the mechanism. Preserving that ambiguity fits the project's
    principle of retaining theological tension where the text itself does not decide.
  doctrine_reference: Preserve theological tension rather than resolve it.
