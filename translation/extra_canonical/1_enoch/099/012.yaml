translation:
  text: Woe to you who make the measure false and deceitful, and who cause bitterness upon the earth, for by it they will be destroyed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'the measure of sin' is difficult. The Ge'ez word can mean 'measure' or 'standard,' so the line may also mean 'the full measure of sin' or 'the standard of sin.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'provoke it' is uncertain in this form. It may mean to stir up, incite, or spread the preceding evil upon the earth.
    reason: lexical_alternative
  - marker: c
    text: Or 'practice the measure of sin and deceit, and to those who provoke it'.
    reason: previous_rendering
lexical_decisions:
- source_word: እሌ ለክሙ
  chosen: Woe to you
  alternatives:
  - Alas for you
  - Woe unto you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom introduces a prophetic denunciation formula. 'Woe to you' preserves the apocalyptic judgment force in readable modern English.
- source_word: ትገብርዋ
  chosen: practice
  alternatives:
  - do
  - work
  - commit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes carrying out or doing. 'Practice' fits an ongoing pattern of conduct in a woe saying better than the flatter 'do'.
- source_word: ለመስፈርት ኃጢአት
  chosen: the measure of sin
  alternatives:
  - the measure for sin
  - the full measure of sin
  - sinful measure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መስፈርት is literally a measure or standard. Retaining 'measure' preserves the concrete apocalyptic image rather than dissolving it into a generic phrase like 'sinfulness.' The construction is difficult, so the rendering stays close to the Ge'ez.
- source_word: ወትሐሱት
  chosen: and deceit
  alternatives:
  - and falsehood
  - and lying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun group points to falsity or deception. 'Deceit' reads naturally alongside 'sin' while preserving moral and social corruption.
- source_word: ተያእምሩ
  chosen: provoke it
  alternatives:
  - stir it up
  - incite it
  - cause it to be known
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult and may carry the sense of causing, stirring up, or making manifest. In context, 'provoke it' best fits the denunciation of those who actively spread or intensify evil on the earth.
- source_word: ዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - in the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is spatial and cosmic in scope in Enochic style. 'Upon the earth' preserves the elevated register.
- source_word: እስመ ቦቱ ይትዌደኡ
  chosen: for by it they will be destroyed
  alternatives:
  - for because of it they will perish
  - for through it they will be consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause gives the reason for the woe. ቦቱ is instrumental or causal ('by it/because of it'), and the verb points to perishing or destruction. 'Destroyed' keeps the judgment tone clear.
