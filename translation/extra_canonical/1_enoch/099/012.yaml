theological_decisions:
- issue: Whether to smooth the difficult phrase about sin into a generic moral statement
  chosen_reading: the measure of sin
  alternative_readings:
  - the full measure of sin
  - sinful deeds
  - the standard of sin
  rationale: The Ge'ez preserves a concrete noun 'measure/standard.' Following project philosophy, the translation keeps the image rather than paraphrasing it away, while noting alternatives in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Whether the final clause refers to destruction by sin/deceit itself or by divine judgment more generally
  chosen_reading: for by it they will be destroyed
  alternative_readings:
  - for because of it they will perish
  - for on account of this they will be judged
  rationale: The immediate grammar supports an instrumental or causal link to the preceding evil. The broader context is still judgment, but the verse itself ties their ruin to the very evil they practice and spread.
  doctrine_reference: Translation philosophy §3
