theological_decisions:
- issue: Scope of አሕዛብ in an apocalyptic judgment oracle
  chosen_reading: Rendered as 'nations' in a collective geopolitical sense
  alternative_readings:
  - peoples
  - Gentiles
  rationale: The verse depicts international upheaval in the day of judgment, not
    a Jew/Gentile theological contrast. 'Nations' best preserves the apocalyptic-political
    horizon.
  doctrine_reference: Translation philosophy §Original-language primacy over translation
    tradition
- issue: Force of the rising of the clans
  chosen_reading: Left ambiguous as 'shall rise up'
  alternative_readings:
  - shall revolt
  - shall be stirred up for battle
  - shall assemble
  rationale: The Ge'ez indicates upward or insurgent movement but does not require
    a fully specified military gloss. Preserving the tension fits project policy not
    to resolve genuine ambiguity beyond the witness.
  doctrine_reference: Translation philosophy §Preserve theological tension rather
    than resolve it
