translation:
  text: In those days nations shall be thrown into confusion, and the clans of the
    nations shall rise up on the day of destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the kindreds/tribes of the nations.' The Ge'ez term can denote kin-groups
      or related peoples.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the day of slaughter' or 'ruin,' depending on how strongly the final
      noun is taken.
    reason: lexical_alternative
lexical_decisions:
- source_word: በአማንቱ መዋዕል
  chosen: In those days
  alternatives:
  - In those times
  - At that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal apocalyptic formula. 'Those days' preserves the elevated
    prophetic register and the plural sense of መዋዕል ('days/times').
- source_word: ይትሀወኩ
  chosen: shall be thrown into confusion
  alternatives:
  - shall be disturbed
  - shall be agitated
  - shall be confounded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys turmoil or being thrown into disorder. 'Thrown into
    confusion' preserves the passive-like force and apocalyptic social upheaval better
    than the flatter 'be disturbed.'
- source_word: አሕዛብ
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this judgment context, 'nations' is the most natural collective rendering.
    'Gentiles' would import later Jewish-Christian contrast not explicit here.
- source_word: ወይትነሥኡ
  chosen: and ... shall rise up
  alternatives:
  - and ... shall arise
  - and ... shall be stirred up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally suggests rising or standing up. 'Rise up' keeps the
    active, ominous movement without over-specifying whether this is revolt, mobilization,
    or mere emergence.
- source_word: አዝማደ አሕዛብ
  chosen: the clans of the nations
  alternatives:
  - the kindreds of the nations
  - the tribes of the nations
  - the allies of the nations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: አዝማድ commonly denotes kin, relatives, or kindred groups. 'Clans' gives
    a natural English equivalent for subgroups within nations and fits the collective-political
    setting.
- source_word: በዕለት እንተ ሐጕል
  chosen: on the day of destruction
  alternatives:
  - on the day of slaughter
  - on the day of ruin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks a climactic judgment day. 'Destruction' is broad enough
    to preserve the catastrophe without narrowing the image to only killing, though
    'slaughter' remains possible depending on how sharply ሐጕል is taken.
