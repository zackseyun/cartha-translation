theological_decisions:
- issue: Function of the righteous persons' prayers in the heavenly court
  chosen_reading: The prayers are presented as a memorial before God in a judicial
    sense, serving as testimony against sinners.
  alternative_readings:
  - The prayers are simply remembered by God without explicit accusatory force.
  - The angels themselves, rather than the prayers, are the memorial.
  rationale: The repeated 'memorial' language and the final phrase about 'the sins
    of the sinners' point to a courtroom-like remembrance leading to judgment, not
    merely devotional recollection.
  doctrine_reference: Preserve apocalyptic judgment imagery; do not flatten into generic
    piety.
