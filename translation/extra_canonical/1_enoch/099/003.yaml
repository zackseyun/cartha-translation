translation:
  text: In those days the righteous will be prepared, so that your prayers may rise
    as a memorial, and the angels may read them before the Most High as a memorial
    against the sins of the sinners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic verb in the clauses about the angels is textually difficult
      in this OCR witness; the sense may be 'read,' 'recite,' or more generally 'present.'
    reason: textual_variant
  - marker: b
    text: The word rendered 'angels' may also be understood more literally as 'hearers'
      or 'witnesses,' but the heavenly-court setting favors 'angels.'
    reason: lexical_alternative
lexical_decisions:
- source_word: በአማንቱ መዋዕል
  chosen: In those days
  alternatives:
  - in those times
  lexicon: Dillmann
  rationale: Standard temporal apocalyptic formula; 'days' preserves the repeated
    idiom without unnecessary smoothing.
- source_word: ተደለዉ
  chosen: will be prepared
  alternatives:
  - will be made ready
  - will be chosen
  lexicon: Dillmann
  rationale: The verb most naturally conveys being made ready or prepared. 'Chosen'
    is less likely in this context, where the following clause points to readiness
    for vindication through prayer.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  lexicon: Dillmann
  rationale: Keeps the key ethical/apocalyptic category consistent with broader Enochic
    usage.
- source_word: ከመ ትንሥኡ ጸሎታቲከሙ
  chosen: so that your prayers may rise
  alternatives:
  - that your prayers may arise
  - for your prayers to ascend
  lexicon: Dillmann
  rationale: The verb suggests rising or ascending; 'rise' preserves the vertical,
    cultic-apocalyptic imagery of prayer going upward.
- source_word: በተዝካር
  chosen: as a memorial
  alternatives:
  - for remembrance
  - as a remembrance
  lexicon: Dillmann
  rationale: Retains the commemorative/judicial nuance of something brought to remembrance
    before the heavenly court.
- source_word: አንብ...ሙ / ያንብ...ሙ
  chosen: may read them
  alternatives:
  - may recite them
  - may present them
  lexicon: Dillmann
  rationale: The OCR is damaged, but the repeated verb before 'before the angels'
    and again before 'before the Most High' most plausibly refers to reading/reciting
    the prayers in the heavenly court. This fits the legal-memorial setting.
- source_word: ሰማዕተ
  chosen: the angels
  alternatives:
  - the hearers
  lexicon: Dillmann
  rationale: Though the form could suggest 'hearers/witnesses,' in context with 'before'
    and the heavenly court, the sense is best taken of angelic beings. A footnote
    preserves the lexical uncertainty.
- source_word: በቅድመ ልዑል
  chosen: before the Most High
  alternatives:
  - in the presence of the Most High
  lexicon: Dillmann
  rationale: A standard divine title in Enochic literature; 'Most High' preserves
    the elevated register and avoids over-interpretation.
- source_word: ለኃጢአተ ኃጥኣን
  chosen: against the sins of the sinners
  alternatives:
  - concerning the sins of the sinners
  - regarding the sins of sinners
  lexicon: Dillmann
  rationale: Given the judicial force of 'memorial' before the Most High, 'against'
    best captures accusatory force rather than mere reference.
