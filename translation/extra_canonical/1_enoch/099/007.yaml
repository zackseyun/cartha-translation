theological_decisions:
- issue: Whether to render the opening object as a specific idol or as the material 'stone'
  chosen_reading: stone
  alternative_readings:
  - a stone idol
  - rock
  rationale: The Ge'ez reads the material noun directly. Rendering it as 'stone' preserves the stark material contrast with gold, silver, wood, and clay later in the verse and avoids adding 'idol' where the text does not explicitly do so at that point.
  doctrine_reference: Original-language primacy over translation tradition
- issue: How to construe the phrase about evil spirits and demons
  chosen_reading: the idolaters bow down to evil spirits and demons
  alternative_readings:
  - they bow to the souls of the wicked and to demons
  rationale: Given the immediate context of idolatrous worship and the pairing with demons and idols, a supernatural reading is more coherent than a reference to deceased human souls, though the underlying noun can bear a broader sense.
  doctrine_reference: Preserve theological tension rather than resolve it
