  to: they will find no help at all from them.
  rationale: 'The Ge''ez verb is ይረክቡ (rakaba, ''to find''), not ''receive''. Furthermore, the draft omits the force of ኵሎ (kʷello, ''all''), which modifies ረድኤተ (rad''eta, ''help''). The phrase literally means ''they will not find all/any help,'' emphasizing the total lack of assistance. | Adjudicator: The reviewer''s rationale is factually correct regarding the Ge''ez source. The verb ይረክቡ (yərakəbu, from rakaba) specifically means ''to find'' or ''to discover'', rather than a passive ''receive''. Furtherm'
