translation:
  text: And those who bow down to stone, and those who make images of gold and silver
    and wood and clay, and those who bow down to evil spirits and demons and to every
    idol without understanding—they will receive no help from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening phrase literally says 'bow down to stone'; the singular likely
      stands for stone cult-objects in general.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'evil spirits' could also be understood more literally
      as 'evil souls' or 'wicked souls.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይሰግዱ
  chosen: bow down
  alternatives:
  - worship
  - prostrate themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the physical and cultic sense of reverence without over-specifying
    liturgical worship in every instance.
- source_word: ለአብን
  chosen: to stone
  alternatives:
  - to a stone
  - to rock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes stone; the singular likely functions generically for
    stone objects/idols. 'Stone' is concise and natural in English in a list of materials.
- source_word: ይገብሩ
  chosen: make images
  alternatives:
  - make
  - fashion
  - manufacture idols
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means make/do; in context with the following materials and later
    'idol,' the sense is crafting cult images. 'Make images' preserves the implied
    object without overloading the line with repeated 'idols'.
- source_word: ምስለ ዘወርቅ ወዘብሩር ወዘዕፅ ወዘልሕኵት
  chosen: of gold and silver and wood and clay
  alternatives:
  - with gold and silver and wood and clay
  - from gold and silver and wood and pottery
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase lists the materials from which the cult objects are made.
    'Of' is idiomatic in English for composition. 'Clay' is chosen for the last material
    as a broad, accessible rendering.
- source_word: ነፍሳት እኩያት
  chosen: evil spirits
  alternatives:
  - wicked spirits
  - evil souls
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this idolatry context, 'spirits' better fits the supernatural referent
    than 'souls' and pairs naturally with 'demons' in the next term.
- source_word: አጋንንት
  chosen: demons
  alternatives:
  - unclean spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for malevolent supernatural beings; preserves the
    apocalyptic register.
- source_word: ጣዖት
  chosen: idol
  alternatives:
  - image
  - graven image
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct and conventional rendering for a cult object, fitting the polemical
    context.
- source_word: ኢበተምሃር
  chosen: without understanding
  alternatives:
  - without knowledge
  - not being instructed
  - without discernment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The negative phrase qualifies the idolaters' action or condition. 'Without
    understanding' captures moral-intellectual blindness without forcing a narrower
    pedagogical sense.
- source_word: ረድኤተ ኢይረክቡ እምኔሆሙ
  chosen: they will receive no help from them
  alternatives:
  - they will find no aid from them
  - no assistance will come to them from them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the future judgment sense and the irony that the worshiped
    beings/images cannot save their devotees.
