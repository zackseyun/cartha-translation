translation:
  text: And in those days, blessed are all those who accept the word of wisdom, and
    understand it, and do it in the way of the Most High, and walk in the way of his
    righteousness, and do not become corrupt with those who become corrupt; for they
    shall be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'receive the message of wisdom.' The Ge'ez expression can mean 'word,'
      'matter,' or 'message' of wisdom.
    reason: lexical_alternative
  - marker: b
    text: The repeated verb rendered 'become corrupt' may also be understood as 'perish'
      or 'go astray,' depending on how the Ge'ez is construed in this line.
    reason: lexical_alternative
lexical_decisions:
- source_word: ብፁዓን
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic and wisdom contexts this term carries covenantal and eschatological
    favor, not mere emotional happiness; 'blessed' preserves that register.
- source_word: ይትሜጠዉ
  chosen: accept
  alternatives:
  - receive
  - take up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb here governs 'the word/matter of wisdom' and likely means to
    receive or embrace it. 'Accept' gives a clear English sense of welcoming and heeding
    wisdom without over-paraphrasing.
- source_word: ነገረ ጥበብ
  chosen: the word of wisdom
  alternatives:
  - the matter of wisdom
  - the message of wisdom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገር can mean word, matter, or message. 'Word of wisdom' preserves the
    singular expression and elevated style, while remaining intelligible.
- source_word: ያእምርዎን
  chosen: understand it
  alternatives:
  - know it
  - perceive it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sequence accept-understand-do suggests practical comprehension rather
    than bare cognition; 'understand it' best fits the wisdom context.
- source_word: ይገብርዎን
  chosen: do it
  alternatives:
  - practice it
  - carry it out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering preserves the ethical force of enacted wisdom
    without adding interpretive expansion.
- source_word: ፍኖተ ልዑል
  chosen: the way of the Most High
  alternatives:
  - the path of the Most High
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ፍኖት is commonly 'way' or 'path'; 'way' better preserves biblical ethical
    imagery. ልዑል is a divine title, so 'the Most High' is preferable to a generic
    adjective.
- source_word: የሐውሩ በፍኖተ ጽድቅ ዚአሁ
  chosen: walk in the way of his righteousness
  alternatives:
  - walk in the path of his righteousness
  - walk in his righteous way
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom of walking in a way is standard ethical imagery. Rendering
    ጽድቅ as 'righteousness' maintains consistency with the project's default for this
    theological term.
- source_word: ኢይረሰዑ ... እለ ይረሰዑ
  chosen: do not become corrupt with those who become corrupt
  alternatives:
  - do not perish with those who perish
  - do not go astray with those who go astray
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated verb likely denotes ruin/corruption/going bad in a moral-judicial
    context. 'Become corrupt' preserves the ethical contrast with walking in righteousness
    and avoids collapsing the phrase into mere physical destruction.
- source_word: ይድኅኑ
  chosen: they shall be saved
  alternatives:
  - they shall be delivered
  - they shall escape
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes rescue or deliverance. 'Shall be saved' fits the eschatological
    contrast with corruption and preserves the text's theological weight without importing
    later doctrinal formulas.
