theological_decisions:
- issue: Meaning of the repeated verb ይረሰዑ in contrast with righteousness and salvation
  chosen_reading: moral corruption leading to judgment
  alternative_readings:
  - perish
  - go astray
  rationale: Within the verse the contrast is between receiving wisdom, walking in
    righteousness, and final salvation. Rendering the verb as corruption best preserves
    the ethical-apocalyptic logic, while acknowledging that ruin/perishing is a possible
    nuance.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    alternatives in footnotes.
