theological_decisions:
- issue: Whether the verse explicitly teaches resurrection from death or a metaphorical awakening
  chosen_reading: The main text preserves the image 'rise from sleep' without specifying resurrection.
  alternative_readings:
  - bodily resurrection imagery
  - moral or spiritual awakening from slumber
  rationale: The Ge'ez wording itself uses sleep imagery and rising language but does not explicitly add 'dead' or a fuller resurrection formula in this verse. Preserving the ambiguity fits the project's principle of maintaining theological tension where the source is not explicit.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
