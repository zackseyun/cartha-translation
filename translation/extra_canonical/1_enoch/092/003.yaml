translation:
  text: And the righteous one shall rise from sleep, and he shall arise and walk in
    the paths of righteousness; and all his path and his course shall be in goodness
    and in everlasting graciousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"From sleep" may function as literal sleep imagery or as a figure for awakening
      into renewed life; the verse itself does not force one interpretation.'
    reason: lexical_alternative
  - marker: b
    text: The final phrase could also be rendered "in everlasting mercy" or "in eternal
      favor," since the Ge'ez term can cover mercy, gentleness, and graciousness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይትነሣእ
  chosen: shall rise
  alternatives:
  - shall be raised
  - shall arise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb from ነሥአ carries the sense of rising or being raised. Here the
    parallel repetition with a following motion verb favors a straightforward 'rise'/'arise'
    sequence rather than an explicitly passive resurrection formula, though the context
    may still evoke awakening from death-like sleep.
- source_word: ጻድቅ
  chosen: the righteous one
  alternatives:
  - the righteous
  - the just one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Singular form is best preserved. 'The righteous one' keeps the individualizing
    force without importing later messianic or collective readings.
- source_word: እምንዋም
  chosen: from sleep
  alternatives:
  - from his sleep
  - from slumber
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition እም marks source, and ንዋም denotes sleep/slumber. 'From
    sleep' is concise and preserves the image, which may be literal or metaphorical.
- source_word: የኃልፍ
  chosen: walk
  alternatives:
  - pass on
  - go forth
  - proceed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the verb can mean pass or go by, with 'in the paths of righteousness'
    idiomatic English 'walk' best preserves the ethical-path imagery common to wisdom
    and apocalyptic discourse.
- source_word: በፍኖተ ጽድቅ
  chosen: in the paths of righteousness
  alternatives:
  - on the path of righteousness
  - in the way of righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez uses the path/way image with righteousness. The plural 'paths'
    reflects the form as transmitted and keeps the metaphor vivid.
- source_word: ኵሉ ፍኖቱ
  chosen: all his path
  alternatives:
  - all his way
  - his whole path
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formally close rendering is retained even though English might prefer
    'all his ways.' The singular may function collectively; the slight strangeness
    preserves the source texture.
- source_word: ምሕዋሩ
  chosen: his course
  alternatives:
  - his conduct
  - his journey
  - his manner of going
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun suggests movement, course, or manner of proceeding. 'Course'
    pairs well with 'path' while avoiding over-moralized paraphrase.
- source_word: በኂሩት
  chosen: in goodness
  alternatives:
  - in goodness of character
  - in blessedness
  - in kindness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes goodness or beneficence. 'Goodness' is broad enough
    to preserve the moral quality without narrowing it to kindness alone.
- source_word: በሣህል ዘለዓለም
  chosen: in everlasting graciousness
  alternatives:
  - in eternal mercy
  - in everlasting gentleness
  - in perpetual favor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሣህል can denote mercy, clemency, gentleness, or gracious favor. 'Graciousness'
    preserves the benevolent quality without forcing a specifically forensic 'mercy'
    reading; 'everlasting' renders ዘለዓለም directly.
