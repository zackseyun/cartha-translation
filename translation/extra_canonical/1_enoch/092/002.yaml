translation:
  text: Do not let your spirit be grieved because of the times, for the Holy and Great
    One has appointed days for all things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for everyone.' The Ge'ez phrase at the end is broad and may refer either
      to all things generally or to all persons.
    reason: lexical_alternative
lexical_decisions:
- source_word: አትሕዝኑ
  chosen: Do not let ... be grieved
  alternatives:
  - do not grieve
  - do not be sorrowful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative imperative from the verb of grieving/sorrowing. Because the
    direct object is 'your spirit,' English idiom is best carried by 'do not let your
    spirit be grieved,' preserving the internal-affective focus without sounding wooden.
- source_word: መንፈስክሙ
  chosen: your spirit
  alternatives:
  - your soul
  - your mind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez term commonly denotes spirit, breath, or inner disposition.
    'Spirit' preserves the anthropological and elevated register better than 'mind,'
    while avoiding over-psychologizing the phrase.
- source_word: በአዝማን
  chosen: because of the times
  alternatives:
  - at the times
  - concerning the times
  - over the times/ages
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition with the plural noun for times/seasons most naturally
    gives the cause of grief here. 'Because of the times' fits the paraenetic context
    and preserves the apocalyptic sense of troubled historical periods.
- source_word: መዋዕለ
  chosen: days
  alternatives:
  - appointed times
  - periods
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun literally denotes days. Although the sense may shade toward
    allotted periods, 'days' keeps the concrete wording of the Ge'ez while still working
    idiomatically in English.
- source_word: ወሀበ
  chosen: has appointed
  alternatives:
  - has given
  - has set
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is 'gave,' but in context with 'days' and divine ordering
    of history, 'has appointed' brings out the temporal-allotment sense likely intended,
    without excessive paraphrase.
- source_word: ቅዱስ ወዐቢይ
  chosen: the Holy and Great One
  alternatives:
  - the Holy One and the Great One
  - the holy and great one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: These paired divine epithets function together as a reverential title.
    Capitalization marks a divine referent, and 'One' avoids awkward repetition while
    preserving the elevated apocalyptic style.
- source_word: ለኵሉ
  chosen: for all things
  alternatives:
  - for all
  - for everyone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase can be read broadly. In context of appointed days/times, 'for
    all things' better matches cosmic-historical ordering than 'for everyone,' though
    the latter remains possible.
