theological_decisions:
- issue: Scope of the divine appointment in 'for all'
  chosen_reading: for all things
  alternative_readings:
  - for all people
  - for everyone
  rationale: The verse comforts hearers about troubled times by grounding history
    in divine appointment. Rendering the phrase as 'for all things' preserves the
    broader apocalyptic claim that all events or periods are under the Holy and Great
    One's ordering, while not excluding human application.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity rather than flatten it.
