translation:
  text: The book written by Hanok—[Hanok indeed wrote this complete sign of wisdom, praised by all people and a judge of all the earth]—for all my children who will dwell on the dry land, and for the future generations who practice righteousness and peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The bracketed clause in the Ethiopic witness appears textually unstable in this OCR line; the translation retains it in a cautious, literal form rather than omitting it.
    reason: textual_variant
  - marker: b
    text: '"Dry land" is a literal rendering of the Ethiopic expression; some translators smooth it to "earth" or "world."'
    reason: lexical_alternative
  - marker: c
    text: The syntax around "the generations to come" and "the chosen ones" is compressed and may also be understood as "for a future generation, the chosen, who practice righteousness and peace."
    reason: alternative_reading
  - marker: d
    text: Or 'Written by Hanok—the book that Hanok wrote, all the signs of wisdom among all humankind, praised and ruling over all the earth—for all my children, and for the generations to come who will dwell on the dry land, the chosen ones who practice righteousness and peace.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ዘተጽሕፈ
  chosen: Written
  alternatives:
  - What was written
  - This is what was written
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive relative form introducing the written work; concise English preserves the heading-like force without over-expanding.
- source_word: መጽሐፍ
  chosen: book
  alternatives:
  - writing
  - scroll
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary sense is 'book' or 'writing.' 'Book' fits the superscriptional style and is natural in English.
- source_word: ትእምርተ ጥበብ
  chosen: the signs of wisdom
  alternatives:
  - the marks of wisdom
  - the tokens of wisdom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to evidences or manifestations of wisdom. 'Signs' preserves the somewhat elevated and apocalyptic register better than a flatter paraphrase.
- source_word: እምኵሉ ሰብእ
  chosen: among all humankind
  alternatives:
  - from all people
  - of all men
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A collective human reference is intended. 'Humankind' avoids unnecessary gendering while preserving the universal scope.
- source_word: ስቡሕ
  chosen: praised
  alternatives:
  - glorious
  - honored
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can denote glory or praise. 'Praised' works well in sequence with the following participial idea and avoids overstating a title-like sense.
- source_word: መኰንነ ኵሉ ምድር
  chosen: ruling over all the earth
  alternatives:
  - governing all the earth
  - prince over all the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase conveys authority or governance. 'Ruling over' is idiomatic and preserves the elevated tone.
- source_word: ለኵሎሙ ውሉድየ
  chosen: for all my children
  alternatives:
  - for all my sons
  - for all my offspring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The possessive is explicit. 'Children' is broad enough to preserve familial address without narrowing to males only.
- source_word: የኃድሩ ዲበ የብስ
  chosen: who will dwell on the dry land
  alternatives:
  - who will live upon the earth
  - who will settle on dry ground
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez literally refers to dwelling upon dry land/earth. Retaining 'dry land' preserves the concrete wording rather than smoothing it into a generic 'world.'
- source_word: ትውልድ ይኃርያን
  chosen: the generations to come ... the chosen ones
  alternatives:
  - a future generation ... the elect
  - the generation of the chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The syntax is compressed and somewhat difficult. I render both elements, taking the line as extending the audience to future generations characterized as chosen. 'Chosen ones' is preferred over 'elect' for readability and local grounding.
- source_word: ርተዐ ወሰላመ
  chosen: righteousness and peace
  alternatives:
  - uprightness and peace
  - justice and peace
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: These are core ethical terms. 'Righteousness and peace' preserves the moral and covenantal weight better than flatter alternatives.
