lexical_decisions:
- source_word: ወርኢኩ
  chosen: and I saw
  alternatives:
  - and I beheld
  lexicon: Dillmann
  rationale: Common first-person visionary report formula in Enochic narrative; 'and
    I saw' preserves the repeated apocalyptic cadence without archaizing.
- source_word: ካልአ
  chosen: another thing
  alternatives:
  - another
  - something else
  lexicon: Dillmann
  rationale: Used substantivally after the visionary verb; 'another thing' makes explicit
    that a new visionary element is being introduced.
- source_word: መባርቅተ
  chosen: the lightning flashes
  alternatives:
  - the lightnings
  - the flashes of lightning
  lexicon: Dillmann
  rationale: Plural form referring to lightning phenomena. 'Lightning flashes' is
    vivid, natural English and preserves the concrete cosmic imagery.
- source_word: ወከዋክብተ ሰማይ
  chosen: and the stars of heaven
  alternatives:
  - and the stars of the sky
  - and heaven's stars
  lexicon: Dillmann
  rationale: A standard celestial expression; 'stars of heaven' keeps the elevated
    register and biblical-apocalyptic feel.
- source_word: ከመ ይጼውዖሙ
  chosen: how he calls them
  alternatives:
  - that he calls them
  - how he summoned them
  lexicon: Dillmann
  rationale: The construction introduces what Enoch observed concerning the stars
    and lightning. 'How he calls them' best reflects the observational sense after
    'I saw.'
- source_word: ለኵሎሙ
  chosen: them all
  alternatives:
  - all of them
  lexicon: Dillmann
  rationale: Direct object marker plus totalizing pronoun; 'them all' is concise and
    preserves the distributive force.
- source_word: በበአስማቲሆሙ
  chosen: by their names
  alternatives:
  - each by their names
  - according to their names
  lexicon: Dillmann
  rationale: Reduplicated preposition gives a distributive sense, likely 'each by
    name.' English idiom 'by their names' communicates naming individually without
    overloading the line.
- source_word: ወይሰምዕዎ
  chosen: and they hear him
  alternatives:
  - and they obey him
  - and they listen to him
  lexicon: Dillmann
  rationale: The verb is fundamentally 'hear.' In this cosmic context obedience may
    be implied, but the base sense should remain in the main text; the stronger interpretive
    gloss is better left as an alternative.
