theological_decisions:
- issue: Whether the stars are merely addressed or are portrayed as responsive heavenly
    beings under divine authority
  chosen_reading: Retain the personal-sounding wording 'he calls them all by their
    names, and they hear him'
  alternative_readings:
  - he summons them all by name, and they obey him
  - they are called by name and respond
  rationale: The verse presents celestial bodies in apocalyptic-personal terms. The
    translation preserves that tension rather than reducing it either to bare metaphor
    or to an overinterpreted angelology.
  doctrine_reference: Preserve theological tension rather than resolve it.
