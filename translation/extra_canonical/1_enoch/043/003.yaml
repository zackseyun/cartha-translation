theological_decisions:
- issue: Rendering of the concealed object of revelation in an apocalyptic setting
  chosen_reading: what was hidden
  alternative_readings:
  - the hidden things
  - the secret things
  rationale: The verse emphasizes the angel as revealer of concealed heavenly realities.
    'What was hidden' preserves that theological motif without overstating technical
    secrecy language.
  doctrine_reference: Preserve apocalyptic imagery and theological tension rather
    than flattening or over-resolving.
