translation:
  text: And I asked the angel who went with me, who showed me what was hidden, “What
    are these?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the hidden things” / “the secret things.” The Ge'ez term points to realities
      concealed until shown in the vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: ተስእልክዎ
  chosen: I asked him
  alternatives:
  - I questioned him
  - I inquired of him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb from ሰአለ carries the sense of asking or inquiring. 'I asked
    him' is the most natural English rendering and fits the direct-question context
    that follows.
- source_word: መልአክ
  chosen: angel
  alternatives:
  - messenger
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the being accompanying Enoch is clearly a
    heavenly interpreter, so 'angel' preserves the genre-specific force better than
    the more generic 'messenger'.
- source_word: ዘየሐውር ምስሌየ
  chosen: who went with me
  alternatives:
  - who was going with me
  - who walked with me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause identifies the accompanying angel. 'Went with me'
    is idiomatic and preserves the movement of the vision journey without over-literal
    stiffness.
- source_word: ዘአርአየኒ
  chosen: who showed me
  alternatives:
  - who had shown me
  - who revealed to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means 'show' or 'cause to see.' 'Who showed me' keeps the visionary
    register and links naturally to the hidden things disclosed in the vision.
- source_word: ኅቡእ
  chosen: what was hidden
  alternatives:
  - the hidden things
  - the secret things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular/plural force can be somewhat fluid in English here. 'What
    was hidden' is transparent and idiomatic, while preserving the apocalyptic motif
    of concealed realities being unveiled.
- source_word: ምንት እሙንቱ እሉ
  chosen: What are these?
  alternatives:
  - Who are these?
  - What are those things?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative phrase most naturally points to objects or phenomena
    just seen in the vision. 'What are these?' is the straightforward interrogative;
    'Who are these?' would require a more personal referent than the verse itself
    supplies.
