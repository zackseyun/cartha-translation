translation:
  text: And I saw the balances of righteousness, how they are weighed according to their lights, the width of their places, and the day of their appearing, of their appearing, and their revolution brings forth lightning; and their revolution is according to the number of the angels, and they keep faith with one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening clause is difficult. The Ge'ez likely describes the heavenly luminaries as being divided or apportioned in an ordered way.
    reason: textual_variant
  - marker: b
    text: The repeated temporal term rendered 'seasons' may also be understood as 'times' or 'courses.'
    reason: lexical_alternative
  - marker: c
    text: The final clause may mean either that the heavenly bodies keep faith with one another or that their order is maintained in accordance with the angels' reckoning.
    reason: alternative_reading
  - marker: d
    text: Or 'how the luminaries of righteousness were apportioned, and how the places of their dwelling rested in their lights; and their days'.
    reason: previous_rendering
  - marker: e
    text: Or 'and their seasons bring forth lightning. And their seasons were counted by'.
    reason: previous_rendering
lexical_decisions:
- source_word: መዳልወ
  chosen: were apportioned
  alternatives:
  - were divided
  - were distributed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to denote division or allotment. 'Were apportioned' preserves the sense of ordered distribution in a cosmic vision better than the flatter 'divided.'
- source_word: ጽድቅ
  chosen: of righteousness
  alternatives:
  - righteous
  - just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The genitival construction is retained rather than converting it to an adjective. This preserves the elevated, somewhat abstract apocalyptic diction: these are ''luminaries of righteousness,'' not merely ''righteous luminaries.'''
- source_word: ብርሃናቲሆሙ
  chosen: their lights
  alternatives:
  - their brightnesses
  - their radiances
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural of 'light' likely refers to the luminaries' own shining spheres or radiances. 'Their lights' is concise and natural while preserving the concrete imagery.
- source_word: ሰረኃበ
  chosen: rested
  alternatives:
  - were established
  - settled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb seems to describe the fixed or settled state of the dwelling places. 'Rested' keeps the visionary tone and avoids over-interpreting as institutional 'established.'
- source_word: መካናቲሆሙ
  chosen: the places of their dwelling
  alternatives:
  - their places
  - their dwelling places
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expanded slightly for clarity because the verse concerns cosmic stations or appointed locations of heavenly bodies.
- source_word: ዕለተ
  chosen: days
  alternatives:
  - day-times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward temporal term; retained in plural to match the cosmic ordering of times.
- source_word: ክነቶሙ
  chosen: their seasons
  alternatives:
  - their appointed times
  - their orderings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this astronomical-apocalyptic context, the term likely refers to ordered times or seasons. 'Seasons' is readable and preserves calendrical force.
- source_word: ሚጠቶሙ
  chosen: their seasons
  alternatives:
  - their times
  - their courses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated form is difficult, but in context it appears to refer again to recurring temporal cycles or courses. Rendering it consistently as 'seasons' keeps the parallelism intelligible, while a footnote notes the uncertainty.
- source_word: መብረቅ ይወልድ
  chosen: bring forth lightning
  alternatives:
  - produce lightning
  - give birth to lightning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The vivid verbal image is preserved. 'Bring forth lightning' keeps the apocalyptic imagery without flattening it into a mere meteorological statement.
- source_word: ኍልቈ
  chosen: number
  alternatives:
  - count
  - sum
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase naturally reads as numerical reckoning. 'By the number of the angels' preserves the ordered, enumerated cosmos.
- source_word: መላእክት
  chosen: angels
  alternatives:
  - messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In 1 Enoch's heavenly-cosmic setting, 'angels' is the appropriate rendering, not the more generic 'messengers.'
- source_word: ሃይማኖቶሙ የዓቅቡ
  chosen: they keep faith
  alternatives:
  - they preserve fidelity
  - they remain faithful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase conveys steadfast reliability or fidelity. 'Keep faith' preserves both relational and covenant-like resonance without importing later doctrinal language.
- source_word: በበይናቲሆሙ
  chosen: with one another
  alternatives:
  - among themselves
  - between them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This idiom indicates mutual relation. 'With one another' is idiomatic English and preserves the reciprocal sense.
