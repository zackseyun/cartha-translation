theological_decisions:
- issue: Identity of the 'luminaries of righteousness'
  chosen_reading: Rendered literally as a cosmic designation rather than interpreted as angels, stars, or the righteous themselves.
  alternative_readings:
  - righteous luminaries
  - luminaries belonging to the righteous
  - heavenly lights symbolizing the righteous
  rationale: The Ge'ez phrase is preserved without collapsing the imagery into a single interpretation. In the Parables, symbolic and cosmic language often overlaps, and the translation should preserve that tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of the final clause about fidelity
  chosen_reading: 'Applied to the heavenly entities/cycles in mutual ordered faithfulness: ''they keep faith with one another.'''
  alternative_readings:
  - the angels keep faith among themselves
  - the luminaries remain in harmony with each other
  rationale: The immediate context is cosmic order, numerical reckoning, and appointed times. The clause likely describes dependable coordination within the heavenly order. 'Keep faith' preserves the moral-cosmic texture without over-specifying the subject.
  doctrine_reference: Consistency of key terms, or documented exception.
