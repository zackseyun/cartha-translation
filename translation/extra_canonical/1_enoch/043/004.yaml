  from: 'those with these: these are their names for the holy ones'
  to: 'their parable: these are the names of the holy ones'
  rationale: 'The word ምስለ (mesla) here is not the preposition ''with'', but the construct state of ምስል (mesl, ''parable, likeness, similitude''). Combined with ዘዚአሆሙ (za-zi''ahomu, ''of them/theirs''), it means ''their parable'', not ''those with these''. The vision is explaining that the stars are a parable of the holy ones. Additionally, አስማቲሆሙ፡ ለቅዱሳን (asmātihomu la-qeddusān) uses a standard Ge''ez anticipatory pronoun suffix (-homu) with the genitive marker (la-), meaning ''the names of the holy ones'', not ''their name | Adjudicator: The reviewer correctly identifies two grammatical features of the Ge''ez text that the current translation misses. First, `ምስለ` (mesla) here is not the preposition ''with'', but the construct state of `ም'
