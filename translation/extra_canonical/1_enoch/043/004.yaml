translation:
  text: 'And he said to me, “The Lord of Spirits has shown you their parable: these are the names of the holy ones who dwell upon the dry ground and believe in the name of the Lord of Spirits forever and ever.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'with these' is textually and syntactically difficult in the Ethiopic witness. It may also be understood more loosely as 'concerning these.'
    reason: alternative_reading
  - marker: b
    text: '''Dry ground'' is a more literal rendering than ''earth'' or ''land'' and may underscore the contrast between earthly dwellers and heavenly beings in the vision.'
    reason: lexical_alternative
  - marker: c
    text: Or 'trust in the name of the Lord of Spirits.' The Ge'ez verb can carry the sense of believing or trusting.
    reason: lexical_alternative
  - marker: d
    text: 'Or ''those with these: these are their names for the holy ones''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ወይቤለኒ
  chosen: And he said to me
  alternatives:
  - And he told me
  - And he spoke to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard narrative speech formula; 'said to me' preserves the direct visionary report style without unnecessary expansion.
- source_word: ምስለ ዘዚአሆሙ
  chosen: with these
  alternatives:
  - concerning these
  - along with those things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult in this Ge'ez witness. A literal sense 'with these' best preserves the text's opacity without over-paraphrasing. Because the referent is unclear, the uncertainty is preserved rather than resolved in the main text.
- source_word: እግዚአ መንፈሳት
  chosen: Lord of Spirits
  alternatives:
  - Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed Enochic divine title. 'Lord of Spirits' preserves the established apocalyptic title and avoids flattening it into a generic phrase.
- source_word: አርአየከ
  chosen: has shown you
  alternatives:
  - showed you
  - caused you to see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Perfect-like sense fits the immediate explanation of the vision. 'Has shown you' reads naturally in English while retaining the revelatory force.
- source_word: እሉ እሙንቱ አስማቲሆሙ
  chosen: these are their names
  alternatives:
  - these, these are their names
  - these are the names of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative plus pronoun is somewhat emphatic; English smooths this to 'these are their names' while preserving the identifying function.
- source_word: ለቅዱሳን
  chosen: for the holy ones
  alternatives:
  - of the holy ones
  - belonging to the holy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction can indicate relation or possession. 'For the holy ones' is retained in the main text because it follows the Ge'ez sequence closely, though the exact syntactic relation is not fully certain.
- source_word: እለ የኃድሩ ዲበ የብስ
  chosen: who dwell upon the dry ground
  alternatives:
  - who live on the earth
  - who dwell on the dry land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'dry land/ground.' In this visionary context it likely contrasts earthly dwellers with heavenly beings. 'Dry ground' preserves the concrete image rather than generalizing to 'earth.'
- source_word: ወየአምኑ በስሙ
  chosen: and believe in the name
  alternatives:
  - and are faithful to the name
  - and trust in his name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes believing/trusting. 'Believe in the name' keeps the idiom and theological weight without importing later formulaic Christian diction.
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for the age of ages
  - unto eternity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard eternal-duration formula. 'Forever and ever' is idiomatic, elevated, and preserves the emphatic perpetuity.
