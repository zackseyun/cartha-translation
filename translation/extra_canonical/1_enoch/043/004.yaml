theological_decisions:
- issue: Identity of 'the holy ones' who dwell upon the dry ground
  chosen_reading: human holy ones on earth, not heavenly angels
  alternative_readings:
  - angelic holy ones
  - a mixed reference intentionally linking earthly faithful and heavenly holy ones
  rationale: The qualifying clause 'who dwell upon the dry ground and believe in the name of the Lord of Spirits' points most naturally to earthly faithful people rather than celestial beings. The translation therefore keeps the earthly language explicit while not over-explaining the category.
  doctrine_reference: Preserve local passage meaning and apocalyptic imagery without harmonizing key terms across contexts.
