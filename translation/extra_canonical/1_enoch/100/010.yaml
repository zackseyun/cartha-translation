lexical_decisions:
- source_word: ወይእዜኒ
  chosen: And now
  alternatives:
  - and now indeed
  - but now
  - and at this time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The conjunction ወ plus the temporal adverbial element yields a transitional formula. 'And now' preserves the discourse shift and exhortatory force without overloading the small particle with emphatic English.
- source_word: አእምሩ
  chosen: know
  alternatives:
  - understand
  - recognize
  - be aware
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plural from the verb of knowing/understanding. 'Know' is the most direct and idiomatic rendering for an apocalyptic admonition formula; 'understand' is possible but slightly more interpretive.
