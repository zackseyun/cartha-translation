translation:
  text: And the wise among men will see, and all the children of the earth will understand
    every matter of this book, and they will know that they cannot save themselves
    by denying their sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final phrase is difficult. It may also be rendered 'by casting off their
      sins' or 'by diminishing their sins.' The main text chooses 'by denying their
      sins' because the verse emphasizes failed self-deliverance through evasion of
      guilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: እሙነ
  chosen: the wise among
  alternatives:
  - faithful
  - truly
  - indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult in OCR context, but with ሰብአ ጠቢባን immediately following,
    the sense is best taken as introducing or qualifying the wise persons rather than
    as a standalone adverb. The clause points to perceptive people among humanity
    who recognize the book's message.
- source_word: ሰብአ ጠቢባን
  chosen: men ... wise
  alternatives:
  - wise people
  - the wise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'wise men/people.' Rendered 'the wise among men' to preserve
    both the human reference and the adjectival force without sounding overly wooden.
- source_word: ይሬእዩ
  chosen: will see
  alternatives:
  - shall perceive
  - will behold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard verb of seeing. 'Will see' preserves the directness of the
    apocalyptic idiom; the broader sense of perception is carried by context.
- source_word: ውሉደ ምድር
  chosen: the children of the earth
  alternatives:
  - the sons of the earth
  - the inhabitants of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering preserves the book's characteristic anthropological
    expression and apocalyptic register better than the flatter 'inhabitants of the
    earth.'
- source_word: ኵሎ ነገረ ዛቲ መጽሐፍ
  chosen: every matter of this book
  alternatives:
  - everything in this book
  - all the words of this book
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገር can mean matter, thing, word, or affair. 'Every matter of this book'
    keeps the breadth of reference without reducing it only to verbal content.
- source_word: ያእምሩ
  chosen: they will understand / know
  alternatives:
  - they will recognize
  - they will learn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The verb denotes knowing or understanding. The English uses both ''understand''
    and ''know'' across the sentence to reflect the two-stage movement in the Ge''ez:
    grasping the book''s contents and then recognizing the moral implication.'
- source_word: ኢይክል
  chosen: they cannot
  alternatives:
  - they are not able to
  - it is not possible for them to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward expression of inability. 'Cannot' is concise and forceful.
- source_word: ብዕሎሙ አድኅኖቶሙ
  chosen: save themselves
  alternatives:
  - deliver themselves
  - preserve themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The reflexive sense is clear: they are unable to secure their own deliverance.
    ''Save themselves'' best fits the judgment context.'
- source_word: በመዳቀ ኃጢአቶሙ
  chosen: by denying their sins
  alternatives:
  - by rejecting their sins
  - by casting off their sins
  - by diminishing their sins
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is the main crux. In context, the point is not repentance
    but evasive refusal to acknowledge guilt; therefore 'by denying their sins' best
    fits the warning that self-justifying concealment cannot save. A more literal
    but less certain rendering is preserved in a footnote.
