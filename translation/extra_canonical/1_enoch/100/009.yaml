theological_decisions:
- issue: Whether to render the cause of judgment in primarily moral or explicitly religious terms
  chosen_reading: your godlessness
  alternative_readings:
  - your wickedness
  - your impiety
  rationale: The verse grounds fiery judgment not only in harmful speech and deeds but in a deeper impious condition. 'Godlessness' preserves the theological dimension of rebellion without importing later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
