translation:
  text: 'Woe to you, sinners, because of the words of your mouth and because of the deeds of your hands, which your godlessness has done: in the heat of a flame worse than fire you shall burn.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'which your godlessness has done' is syntactically difficult in English. It likely gathers both the speech and the deeds into one charge and attributes them to the sinners' impious wickedness.
    reason: lexical_alternative
  - marker: b
    text: Or 'in blazing flames of fire you shall burn.'.
    reason: previous_rendering
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  - Ah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a judgment oracle; 'Woe' best preserves the apocalyptic denunciation formula without softening it to mere lament.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - sinful ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward designation for those under judgment; 'sinners' is idiomatic and preserves the moral charge.
- source_word: ዲበ
  chosen: because of
  alternatives:
  - for
  - on account of
  - concerning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here it introduces the grounds for the woe, first with speech and then with deeds; 'because of' makes the causal force clear.
- source_word: ነገረ አፉክሙ
  chosen: the words of your mouth
  alternatives:
  - what your mouth says
  - the speech of your mouth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A relatively formal rendering preserves the parallelism with 'the deeds of your hands' and keeps the concrete bodily imagery.
- source_word: ተግባረ እዴክሙ
  chosen: the deeds of your hands
  alternatives:
  - the works of your hands
  - what your hands have done
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the Hebrew-like/apocalyptic idiom of bodily agency and matches the parallel structure of mouth/hands.
- source_word: ርስዓኒክሙ
  chosen: your godlessness
  alternatives:
  - your wickedness
  - your impiety
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term points beyond isolated bad acts to a state of impious wickedness. 'Godlessness' preserves that religious-moral dimension better than the broader 'wickedness.'
- source_word: በዋዕየ ላህብ እምእሳት
  chosen: in blazing flames of fire
  alternatives:
  - in the heat of fiery flame
  - in burning flame of fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is intentionally intense and somewhat redundant; 'blazing flames of fire' preserves the piled-up fiery imagery rather than reducing it to a single abstract noun.
- source_word: ይውዒ
  chosen: you shall burn
  alternatives:
  - you will be burned
  - you shall be consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An active-future English form is concise and forceful. 'Be consumed' would overinterpret, while 'be burned' is possible but less direct.
