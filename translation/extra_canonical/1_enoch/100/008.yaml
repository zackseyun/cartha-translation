theological_decisions:
- issue: Nature of the denunciation
  chosen_reading: A prophetic woe against morally obstinate evildoers facing inescapable
    judgment
  alternative_readings:
  - A general lament over sinners
  - A merely psychological warning about anxiety
  rationale: The opening interjection, the characterization of the audience, and the
    final no-help clause together form a judicial oracle, not a neutral proverb or
    inward reflection.
  doctrine_reference: Preserve apocalyptic imagery, angelic speech, and judgment formulas
    rather than smoothing them into generic modern religious prose.
