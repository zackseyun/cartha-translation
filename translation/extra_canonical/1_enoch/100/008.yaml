translation:
  text: 'Woe to you, hard of heart, who stay awake to devise evil: fear will come
    upon you, and there will be no one to help you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb rendered 'keep watch' may also suggest lying in wait or being intent
      on something; the sense here is deliberate vigilance directed toward evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'fear will overtake you.' The underlying verb can mean 'find,' 'reach,'
      or 'overtake.'
    reason: lexical_alternative
  - marker: c
    text: Or 'keep watch so as to devise evil'.
    reason: previous_rendering
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  - Ah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a judgment oracle; 'Woe' best preserves the apocalyptic denunciation
    formula rather than the softer lament 'Alas'.
- source_word: ግዙፋነ ልብ
  chosen: hard of heart
  alternatives:
  - stout-hearted
  - proud in heart
  - obstinate of heart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes inner stubbornness or moral insensibility. 'Hard of
    heart' is idiomatic English that preserves the ethical force without flattening
    it to mere emotion.
- source_word: ትተግሁ
  chosen: keep watch
  alternatives:
  - are vigilant
  - lie in wait
  - strive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with the following infinitive-like clause, the sense is active
    watchfulness directed toward wrongdoing. 'Keep watch' preserves the vivid, intentional
    posture and apocalyptic tone.
- source_word: ከመ ትሰብውዎ ለእኩይ
  chosen: so as to devise evil
  alternatives:
  - in order to think evil
  - to plan wickedness
  - to imagine evil
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction expresses purpose. 'Devise evil' captures deliberate
    plotting better than the more cognitive-only 'think evil'.
- source_word: ፍርሀት
  chosen: fear
  alternatives:
  - terror
  - dread
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote fear or terror. 'Fear' is broad and faithful; the
    threatening future context lets the severity stand without overtranslation.
- source_word: ይረክብክሙ
  chosen: will come upon you
  alternatives:
  - will overtake you
  - will find you
  - will seize you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the verb is 'find/reach/overtake.' 'Will come upon you' is
    natural English for impending judgment while preserving the sense of fear arriving
    upon them.
- source_word: ወአልቦ ዘይረድአክሙ
  chosen: and there will be no one to help you
  alternatives:
  - and none will aid you
  - and there is no rescuer for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause states the absence of deliverance. 'No one to help you' is
    clear modern English and retains the judgment motif of abandoned wickedness.
