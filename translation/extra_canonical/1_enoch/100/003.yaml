translation:
  text: And horses will be up to their bridles in the blood of sinners, and chariots
    will be sunk up to their tops.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The term እንግድዓሁ may denote “its bridle” (equestrian gear) or an anatomical
      “chest.” The imagery permits either; we render “bridle” for vividness and coherence.
    reason: lexical_alternative
  - marker: b
    text: The form የሐውር is uncertain. It can be read adjectivally (“of whiteness,”
      i.e., a white horse) or verbally, supplying the motion implied by the line.
      The parallel with chariots sinking favors an implied motion (“will wade/go”).
    reason: lexical_alternative
  - marker: c
    text: Compare the apocalyptic image of blood reaching horse-bridles in Rev 14:20;
      the Enochic verse stands on its own terms but employs similar hyperbolic judgment
      imagery.
    reason: cross_reference
lexical_decisions:
- source_word: ፈረስ
  chosen: horses
  alternatives:
  - horse
  lexicon: Leslau (Ge'ez)
  rationale: Ge'ez uses a generic singular here; rendering as an English plural conveys
    the collective force more naturally in this apocalyptic scene while preserving
    the underlying referent.
- source_word: የሐውር
  chosen: '[implied motion: will wade/go]'
  alternatives:
  - 'of whiteness (yielding: a white [horse])'
  lexicon: Dillmann (Ge'ez)
  rationale: The form is difficult. Many construe it as a finite verb supplying the
    predication of the first clause (movement through liquid), which we render idiomatically
    as “will be up to …”; some take it adjectivally as “of whiteness.” Context favors
    an implied motion parallel to the sinking of chariots.
- source_word: እስከ
  chosen: up to
  lexicon: Leslau (Ge'ez)
  rationale: Standard preposition of limit/extent.
- source_word: እንግድዓሁ
  chosen: its bridle
  alternatives:
  - its chest
  lexicon: Dillmann (Ge'ez)
  rationale: The noun likely refers to equestrian gear (bridle/rein) with a 3ms pronominal
    suffix (“its”). Some take it as an anatomical term (“chest”). In context, “bridle”
    yields a vivid and coherent image.
- source_word: ውስተ
  chosen: in
  alternatives:
  - within
  lexicon: Leslau (Ge'ez)
  rationale: Locative preposition indicating position inside a medium.
- source_word: ደመ
  chosen: blood
  lexicon: Leslau (Ge'ez)
  rationale: Common Semitic root (cf. Heb. dām) for “blood.”
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - offenders
  - the guilty
  lexicon: Leslau (Ge'ez)
  rationale: Regular plural of the noun for one who sins; “sinners” preserves the
    moral-theological force.
- source_word: ሰረገላት
  chosen: chariots
  lexicon: Leslau (Ge'ez)
  rationale: Plural of “chariot.”
- source_word: መልዕልታ
  chosen: tops
  alternatives:
  - height
  - upper parts
  lexicon: Dillmann (Ge'ez)
  rationale: Literally “height/upper part”; in context of chariots being submerged,
    “tops” communicates extent clearly.
- source_word: ትሰጠም
  chosen: will be sunk
  alternatives:
  - will be clogged/blocked up
  - will be choked
  lexicon: Dillmann (Ge'ez)
  rationale: Root conveys being stopped up/pressed down; in a liquid context, “be
    sunk” best captures the image of submergence.
