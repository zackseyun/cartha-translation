theological_decisions:
- issue: Nature of the violence imagery
  chosen_reading: literal-social collapse expressed in apocalyptic hyperbole
  alternative_readings:
  - purely metaphorical civil strife
  - strictly literal battlefield description
  rationale: The verse depicts kin and companions turning on one another and blood
    flowing in abundance. The translation preserves the concrete violence and does
    not reduce it to abstract discord, while also leaving intact the heightened apocalyptic
    rhetoric.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment scenes
    into generic prose.
