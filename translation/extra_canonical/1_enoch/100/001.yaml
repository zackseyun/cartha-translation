  from: fathers together with their sons will strike one another, and brothers together
    with their companions; and they will fall in death
  to: fathers together with their sons will be struck down, and brothers together
    with their companions will fall in death
  rationale: 'The OCR `ይትኃድኡ` is a visual misread of `ይትጐድኡ` (the passive of `ጐድአ`,
    "to strike/smite"). The verb is passive ("will be struck down"), not reciprocal
    ("will strike one another"). Additionally, the draft''s phrasing creates a syntactic
    fragment out of the brothers and companions. The Ge''ez presents two parallel
    clauses: fathers and sons will be struck down, and brothers and companions will
    fall in death (`ወይወድቁ`). | Adjudicator: The reviewer correctly identifies an OCR
    error (`ይትኃድኡ` for `ይትጐድኡ`) and accurately notes that the verb is passive (''will
    be struck down''), not reciprocal. This is confirmed by the Greek fragment of
    1'
