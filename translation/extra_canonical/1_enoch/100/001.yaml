translation:
  text: And in those days, in one place, fathers together with their sons will be
    struck down, and brothers together with their companions will fall in death until
    a stream flows from their blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic wording after 'in those days' is textually difficult in this
      OCR witness; 'in one place' is a cautious locative rendering.
    reason: textual_variant
  - marker: b
    text: Or 'will fight one another.' The verb likely denotes reciprocal violence.
    reason: lexical_alternative
  - marker: c
    text: 'The final clause is intentionally vivid: the image is of bloodshed so great
      that it becomes a flowing stream.'
    reason: cultural_note
  - marker: d
    text: Or 'fathers together with their sons will strike one another, and brothers
      together with their companions; and they will fall in death'.
    reason: previous_rendering
lexical_decisions:
- source_word: በአማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal apocalyptic formula. 'Those days' preserves the elevated
    prophetic register better than the flatter 'those times.'
- source_word: በ፻መካን
  chosen: in one place
  alternatives:
  - in a place
  - in one location
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form is difficult, but the sense is locative and singular. 'In
    one place' is a restrained rendering that preserves the scene without overinterpreting
    the exact idiom.
- source_word: አበው
  chosen: fathers
  alternatives:
  - parents
  - elders
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The direct familial pairing with 'their sons' favors the literal kinship
    term 'fathers,' not the broader 'elders' or mixed 'parents.'
- source_word: ምስለ ውሉዶሙ
  chosen: together with their sons
  alternatives:
  - with their children
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is reciprocal family violence; 'sons' keeps the masculine
    plural force of the Ge'ez and the stark father-son pairing.
- source_word: ይትኃድኡ
  chosen: will strike one another
  alternatives:
  - will fight one another
  - will attack one another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A reciprocal violent verb is required by context. 'Strike one another'
    preserves the concrete physicality and leaves room for the ensuing bloodshed,
    while 'fight' is slightly more generalized.
- source_word: አኀው
  chosen: brothers
  alternatives:
  - kinsmen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plain familial term fits the verse's escalation of social collapse
    from father-son to brother-companion.
- source_word: ምስለ ቢጾሙ
  chosen: together with their companions
  alternatives:
  - with their friends
  - with their neighbors
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes an associate, companion, or fellow. 'Companions'
    preserves the relational breadth without sounding casual like 'friends.'
- source_word: ይወድቁ በሞት
  chosen: they will fall in death
  alternatives:
  - they will fall dead
  - they will perish in death
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The apocalyptic idiom is vivid and solemn. 'Fall in death' keeps the
    formal imagery; 'fall dead' is more idiomatic English but slightly less elevated.
- source_word: እስከ ይውኅዝ ትክዚ እምደመ ዚአሆሙ
  chosen: until a stream flows from their blood
  alternatives:
  - until a torrent runs from their blood
  - until blood flows like a stream
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The image is hyperbolic and apocalyptic. 'A stream flows from their blood'
    preserves the Ge'ez sequence and the shocking imagery without overexpanding it
    into a simile not explicit in the wording.
