translation:
  text: For a man will not withhold his hand from his sons, nor from the sons of his
    sons, to kill them; and the sinner will not withhold his hand from his honored
    brother. From dawn until the sun sets they will slaughter one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his children' for 'his sons'; the Ge'ez term can be broader than male
      offspring in some contexts.
    reason: lexical_alternative
  - marker: b
    text: '''His honored brother'' may also mean ''his noble brother,'' depending
      on whether the emphasis is personal honor or social standing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ኢይከልእ እዴሁ
  chosen: will not withhold his hand
  alternatives:
  - will not restrain his hand
  - will not hold back his hand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom literally speaks of not holding back the hand. 'Withhold his
    hand' preserves the concrete violent idiom better than a more interpretive 'refrain.'
- source_word: እምውሉዱ
  chosen: from his sons
  alternatives:
  - against his children
  - from his offspring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is most naturally read as 'from his children/sons.' In context
    of reciprocal family violence, 'from his sons' keeps the familial concreteness,
    though English readers may understand hostile action by context.
- source_word: ውሉደ ውሉዱ
  chosen: the sons of his sons
  alternatives:
  - his grandchildren
  - his descendants
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formally transparent rendering preserves the repetitive family structure
    of the Ge'ez. 'Grandchildren' is possible, but 'sons of his sons' better reflects
    the source's cadence.
- source_word: ከመ ይቅትሎ
  chosen: to kill them
  alternatives:
  - so as to kill them
  - in order to kill them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses purpose or result attached to the unrestrained hand.
    'To kill them' is concise and natural while preserving the violent intent.
- source_word: ኃጥእ
  chosen: the sinner
  alternatives:
  - the sinful one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a standard moral category in Enochic judgment language. 'The
    sinner' preserves the singular representative figure without softening the ethical
    force.
- source_word: እኍሁ ክቡር
  chosen: his honored brother
  alternatives:
  - his noble brother
  - his own honored brother
  - his glorious brother
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ክቡር can denote honor, dignity, or nobility. 'Honored' is broad and avoids
    over-specifying social rank while preserving the pathos of violence against one
    worthy of honor.
- source_word: እምጎሕ እስከ ትዐርብ ፀሐይ
  chosen: From dawn until the sun's setting
  alternatives:
  - From morning until sunset
  - From daybreak until sundown
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the full span of the day. 'The sun's setting' keeps
    the vivid cosmic phrasing suitable to apocalyptic style.
- source_word: ይትቃተሉ
  chosen: they will slaughter one another
  alternatives:
  - they will fight one another
  - they will kill one another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The reciprocal verb denotes mutual violent killing. 'Slaughter one another'
    preserves the intensity of the scene better than the weaker 'fight,' while remaining
    idiomatic English.
