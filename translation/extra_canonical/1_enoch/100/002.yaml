theological_decisions:
- issue: Scope of the violence described
  chosen_reading: The verse depicts social collapse so severe that family bonds and
    honored kinship no longer restrain murder.
  alternative_readings:
  - A narrower description of battlefield violence only
  - A hyperbolic proverb without literal family reference
  rationale: The repeated family terms ('sons,' 'sons of sons,' 'brother') are too
    specific to flatten into generic conflict. The verse's theology of judgment is
    expressed through the breakdown of natural and honorable human bonds.
  doctrine_reference: Preserve apocalyptic imagery and judgment formulas; do not flatten
    into generic prose.
