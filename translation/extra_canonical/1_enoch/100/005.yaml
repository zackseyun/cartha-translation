theological_decisions:
- issue: Whether the verse refers to literal angelic protection of the righteous or a generalized metaphor of divine care
  chosen_reading: Literal angelic guardianship is kept in the main text
  alternative_readings:
  - General divine protection expressed through angelic imagery
  rationale: The verse explicitly says guardians are appointed 'from among the holy angels,' so the translation preserves the apocalyptic worldview rather than demythologizing it.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten angelic speech or judgment formulas.
- issue: Whether 'sleep' should be translated directly as 'die'
  chosen_reading: Retain 'sleep' in the main text
  alternative_readings:
  - die
  - sleep in death
  rationale: The Ge'ez uses sleep language, and the project's philosophy prefers preserving theological tension and imagery rather than resolving euphemism into interpretation. The likely death-reference can be noted in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
