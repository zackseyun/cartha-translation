translation:
  text: And he will appoint guardians from among the holy angels over all the righteous and holy ones, and they will guard them like the pupil of an eye, until he brings every evil and every sin to an end. And even if the righteous sleep a long sleep, they have nothing to fear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Like the pupil of an eye'' is an idiom for something guarded with extreme care; compare the more familiar biblical expression ''apple of the eye.'''
    reason: lexical_alternative
  - marker: b
    text: '''Sleep a long sleep'' likely refers to death or the state of the dead, but the text itself keeps the euphemism of sleep.'
    reason: lexical_alternative
  - marker: c
    text: Or 'guardians over all the righteous and holy from among the holy angels'.
    reason: previous_rendering
lexical_decisions:
- source_word: ዐቀብተ
  chosen: guardians
  alternatives:
  - watchers
  - keepers
  lexicon: Dillmann Lexicon
  rationale: Derived from the Ge'ez root for guarding/keeping. 'Guardians' fits the nominal sense in context and avoids confusion with the technical Enochic term 'Watchers,' which is not required by this verse.
- source_word: ይሁብ
  chosen: will appoint
  alternatives:
  - will give
  - will set
  lexicon: Dillmann Lexicon
  rationale: Literally 'will give,' but in the construction with guardians over persons it idiomatically means to assign or appoint.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  lexicon: Dillmann Lexicon
  rationale: Standard rendering for the ethical-religious group designated by this term across Enoch; preserves continuity with apocalyptic judgment language.
- source_word: ቅዱሳን
  chosen: holy
  alternatives:
  - saints
  - consecrated ones
  lexicon: Dillmann Lexicon
  rationale: Rendered adjectivally with 'the righteous' as a paired description of the protected community. 'Saints' would import later ecclesial associations not demanded by the Ge'ez.
- source_word: እመላእክት ቅዱሳን
  chosen: from among the holy angels
  alternatives:
  - of the holy angels
  - from the holy messengers
  lexicon: Dillmann Lexicon
  rationale: 'The preposition indicates source/origin: the guardians are assigned from the class of holy angels. ''Angels'' is the natural rendering here in apocalyptic context.'
- source_word: የዐቅብዎሙ
  chosen: they will guard them
  alternatives:
  - they will keep them
  - they will watch over them
  lexicon: Dillmann Lexicon
  rationale: Maintains the repeated guarding motif from the same verbal root and keeps the protective force explicit.
- source_word: ከመ ብንተ ዐይን
  chosen: like the pupil of an eye
  alternatives:
  - like the apple of an eye
  - as the eyeball
  lexicon: Dillmann Lexicon
  rationale: The idiom refers to the most protected part of the eye. 'Pupil' is vivid and understandable while avoiding automatic borrowing of familiar biblical idiom where the source wording is more concrete.
- source_word: እስከ ይዌድእ ኵሉ እኩየ ወኵሉ ኃጢአተ
  chosen: until he brings every evil and every sin to an end
  alternatives:
  - until every evil and every sin is finished
  - until he destroys every evil and every sin
  lexicon: Dillmann Lexicon
  rationale: The verb conveys ending, finishing, or bringing to completion. In this judgment context, 'brings ... to an end' preserves the result without overstating the mechanism.
- source_word: እመኒ
  chosen: even if
  alternatives:
  - and if indeed
  - even though
  lexicon: Dillmann Lexicon
  rationale: 'Marks a concessive turn: the promise of protection stands even in the case of death-like sleep.'
- source_word: ይነውሙ
  chosen: sleep
  alternatives:
  - fall asleep
  - lie down
  lexicon: Dillmann Lexicon
  rationale: Retains the common ancient euphemism for death without forcing an interpretive gloss into the main text.
- source_word: ንዋመ ነዋኅ
  chosen: a long sleep
  alternatives:
  - sleep of rest
  - prolonged sleep
  lexicon: Dillmann Lexicon
  rationale: A cognate construction intensifying the duration or extent of the sleep. 'Long sleep' preserves the euphemistic ambiguity while signaling death or extended repose.
- source_word: አልቦ ዘይፈረሁ
  chosen: they have nothing to fear
  alternatives:
  - there is none whom they should fear
  - there is nothing that will frighten them
  lexicon: Dillmann Lexicon
  rationale: Idiomatic English that preserves the sense of absence of any object of fear.
