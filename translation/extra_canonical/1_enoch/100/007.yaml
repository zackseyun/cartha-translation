translation:
  text: Woe to you, sinners, when you oppress the righteous on the day of fierce distress,
    and burn them with fire; then you will be repaid according to your deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'day of fierce distress' is literally a 'day' marked
      by severe affliction/intensity; 'tribulation' is possible but was avoided in
      the main text to keep the wording locally grounded rather than tied to later
      technical usage.
    reason: lexical_alternative
  - marker: b
    text: The verb translated 'oppress' may also be understood as 'afflict' or 'persecute,'
      depending on how specifically the violence against the righteous is construed.
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  - Woe to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard exclamatory judgment formula in apocalyptic discourse; 'Woe'
    preserves the prophetic force better than the softer 'Alas.'
- source_word: ለክሙ
  chosen: to you
  alternatives:
  - for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks the addressee of the woe formula; 'Woe to you' is idiomatic and
    preserves the direct denunciation.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - the sinful
  - wrongdoers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The straightforward moral-religious designation fits the judgment context
    and should not be weakened into merely social wrongdoing.
- source_word: ሶበ
  chosen: when
  alternatives:
  - because
  - at the time when
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the circumstance that triggers the woe; 'when' is the most
    natural temporal connector here.
- source_word: ታመኒድብዎሙ
  chosen: you oppress them
  alternatives:
  - you afflict them
  - you persecute them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes harsh treatment or affliction. 'Oppress' captures sustained
    violent mistreatment without over-specifying a legal or purely religious persecution.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A key ethical-apocalyptic category in Enochic literature; 'the righteous'
    preserves continuity with the book's moral vocabulary.
- source_word: በዕለተ ጻዕብ ኃያል
  chosen: on the day of fierce distress
  alternatives:
  - in the day of mighty tribulation
  - on the day of severe affliction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase combines 'day' with terms of hardship and strength/intensity.
    'Fierce distress' preserves the apocalyptic severity without importing later technical
    eschatological jargon.
- source_word: ታነድድዎሙ በእሳት
  chosen: burn them with fire
  alternatives:
  - set them ablaze
  - consume them in fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The imagery is concrete and violent; 'burn them with fire' keeps the
    stark judgment-era brutality rather than smoothing it.
- source_word: ወትትፈደዩ
  chosen: you will be repaid
  alternatives:
  - you will receive recompense
  - you will be requited
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive or reflexive recompense idea fits the context of divine retribution.
    'You will be repaid' is clear modern English while retaining judicial force.
- source_word: ከመ ምግባራቲክሙ
  chosen: according to your deeds
  alternatives:
  - according to your works
  - as your actions deserve
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a standard recompense formula. 'Deeds' is natural English and
    preserves the moral correspondence between action and judgment.
