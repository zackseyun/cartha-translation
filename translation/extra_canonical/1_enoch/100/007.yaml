theological_decisions:
- issue: Nature of the final recompense clause
  chosen_reading: The sinners themselves are the ones repaid according to their deeds.
  alternative_readings:
  - The clause could be taken more generally as an impersonal statement of recompense.
  - The repayment could be heard as occurring through the very calamity of the day
    rather than explicitly by divine agency.
  rationale: The second-person verbal sequence addresses the sinners directly throughout
    the verse, so continuing that address in the recompense clause best preserves
    the rhetoric. The text states the certainty of retribution without needing to
    over-specify the mechanism.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    over-interpret agency beyond the source wording.
