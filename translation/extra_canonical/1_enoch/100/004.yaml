theological_decisions:
- issue: Identity of those gathered by the angels
  chosen_reading: They are rendered as people associated with the descent or spread
    of sin, not merely generic sinners.
  alternative_readings:
  - all sinners
  - those who committed sin
  - those by whom transgression spread
  rationale: The Ge'ez clause appears more specific than a simple reference to sinners.
    Because the wording retains descent imagery tied to sin, the translation preserves
    that conceptual link rather than collapsing it into a generic moral category.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Divine title ልዑል
  chosen_reading: the Most High
  alternative_readings:
  - the Exalted One
  rationale: '''Most High'' is the clearest idiomatic rendering of the divine title
    in English and preserves its theological weight without importing later christological
    language.'
  doctrine_reference: Translate titles; preserve local passage meaning.
