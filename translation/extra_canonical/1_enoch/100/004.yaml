translation:
  text: In those days the angels will descend into the hidden places and gather together
    into one place all those who led others into sin; and the Most High will arise
    on that day of judgment to execute great judgment in the midst of the sinners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'all those who helped sin descend' is difficult. It
      may also mean 'those through whom sin came down' or 'those who caused sin to
      descend.'
    reason: lexical_alternative
  - marker: b
    text: '''Hidden places'' may also be rendered ''secret places,'' suggesting concealed
      locations where the wicked are rounded up for judgment.'
    reason: lexical_alternative
  - marker: c
    text: Or 'In those days the angels will descend into the hidden places, and they
      will gather together into one place all those who helped sin descend; and the
      Most High will arise on that day of judgment to execute great judgment in the
      midst of the sinners.'.
    reason: previous_rendering
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  chosen: In those days
  alternatives:
  - In those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula; 'days' preserves the repeated
    Enochic idiom better than smoothing to 'times'.
- source_word: መላእክት
  chosen: the angels
  alternatives:
  - angels
  - messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic judgment context the supernatural sense is primary;
    the article is carried naturally in English.
- source_word: ይወርዱ
  chosen: will descend
  alternatives:
  - will come down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the vertical apocalyptic imagery of heavenly beings coming down.
- source_word: ውስተ ምኅባእት
  chosen: into the hidden places
  alternatives:
  - into the secret places
  - into the concealed places
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural abstract/local sense is best represented by 'hidden places'; it
    preserves the ominous, concealed setting without over-specifying.
- source_word: ወይገብእዎሙ በአሐዱ መካን
  chosen: and they will gather together into one place
  alternatives:
  - and they will bring them into one place
  - and they will assemble them in one place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can suggest bringing or collecting; 'gather together into one
    place' fits the judgment scene and keeps the movement toward confinement.
- source_word: ለእሉ እለ ይወርደዋ ለኃጢአት
  chosen: all those who helped sin descend
  alternatives:
  - those through whom sin came down
  - those who caused sin to descend
  - those who brought down sin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is textually difficult. The Ge'ez appears to connect these
    people with the descent of sin. I preserve the descent imagery rather than flattening
    it to 'those who sinned,' while choosing an English wording that signals agency
    without overclaiming the exact syntax.
- source_word: ወይትነሣእ ልዑል
  chosen: and the Most High will arise
  alternatives:
  - and the Most High will be exalted
  - and the Exalted One will arise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal form naturally reads as 'arise' in context, introducing divine
    action in judgment. 'Most High' is a well-established title and avoids unnecessary
    paraphrase.
- source_word: በይእቲ ዕለት ኵነኔ
  chosen: on that day of judgment
  alternatives:
  - on that judgment day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the solemn formula and preserves the noun 'judgment' explicitly.
- source_word: ከመ ይግበር ኵነኔ ዐቢየ
  chosen: to execute great judgment
  alternatives:
  - to perform great judgment
  - to make great judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Idiomatic English for carrying out judicial action, while preserving
    the repeated judgment terminology.
- source_word: እማእከሎሙ ለኃጥኣን
  chosen: in the midst of the sinners
  alternatives:
  - among the sinners
  - in the middle of the sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''In the midst of'' preserves the vivid scene and the public, inescapable
    character of the judgment.'
