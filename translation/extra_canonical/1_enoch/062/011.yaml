theological_decisions:
- issue: Identity and role of the angels
  chosen_reading: the angels are rendered without qualification as agents of punitive
    custody
  alternative_readings:
  - the angels as generic heavenly beings
  - the angels as specifically punishing angels
  rationale: The Ge'ez text gives only 'the angels' and does not specify a class.
    The translation preserves the text's restraint while allowing the punitive function
    to be expressed through the phrase 'for punishment.'
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    over-harmonize apocalyptic terminology.
