translation:
  text: And he will deliver them over to the angels for punishment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hand them over to the angels with punishment.' The Ge'ez construction
      with 'punishment' may be taken either as purpose/result ('for punishment') or
      more instrumentally ('with punishment').
    reason: lexical_alternative
  - marker: b
    text: Or 'And he will deliver them over to the angels for punishment.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይሜጥዎሙ
  chosen: and he will deliver them over
  alternatives:
  - and he will hand them over
  - and he will commit them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to denote causing persons to pass into another's power
    or custody. 'Deliver them over' preserves the judicial/apocalyptic force better
    than a flatter 'send them,' and the prefixed conjunction is carried by 'and'.
- source_word: ለመላእክት
  chosen: to the angels
  alternatives:
  - for the angels
  - into the hands of the angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks the indirect object/recipient. 'To the angels'
    is the most direct rendering; in this judgment context the sense is that they
    are handed into angelic custody.
- source_word: በመቅሠፍት
  chosen: for punishment
  alternatives:
  - with punishment
  - for torment
  - for chastisement
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes punishment, scourging, or chastisement. 'For punishment'
    best fits the construction after 'deliver over' and preserves the judicial sense
    without over-specifying physical torment.
