theological_decisions:
- issue: Referent of 'him' in 'the spirit of righteousness was poured out upon him'
  chosen_reading: Retain the direct pronoun 'upon him' without interpretive substitution.
  alternative_readings:
  - upon it (the throne)
  - upon the Elect One/Son of Man by contextual inference
  rationale: The immediate Ge'ez wording reads straightforwardly with a masculine
    singular pronoun. Because the Parables are effectively Ge'ez-only here, the translation
    preserves the ambiguity rather than resolving the referent beyond the witness.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the mouth-word in judgment
  chosen_reading: 'Render as an effective judicial utterance: ''the word of his mouth
    put all the sinners to death.'''
  alternative_readings:
  - his mouth spoke and all sinners died
  - the breath/utterance of his mouth destroyed sinners
  rationale: The text emphasizes judgment enacted by speech from the enthroned Lord
    of Spirits. The chosen rendering preserves that apocalyptic motif without importing
    later canonical phrasing from echoed traditions.
  doctrine_reference: Do not over-harmonize with later Christian usage.
