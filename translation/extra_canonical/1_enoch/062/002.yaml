translation:
  text: And the Lord of Spirits seated him on the throne of his glory, and the spirit
    of righteousness was poured out upon him, and the word of his mouth slays all
    the sinners, and all the lawless are destroyed from before his face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rested upon him' if the verb is taken less vividly; the Ethiopic wording
      naturally supports the stronger image 'was poured out upon him.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from before his face,' a judgment idiom for removal or destruction
      in the presence of the enthroned figure.
    reason: cultural_note
  - marker: c
    text: Or 'And the Lord of Spirits sat upon the throne of his glory'.
    reason: previous_rendering
  - marker: d
    text: Or 'put all the sinners to death, and all the lawless were destroyed'.
    reason: previous_rendering
lexical_decisions:
- source_word: አንበረ
  chosen: sat
  alternatives:
  - was seated
  - took his seat
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes sitting/being seated. 'Sat' is simple and vivid, preserving
    the enthronement scene without over-expansion.
- source_word: እግዚእ መናፍስት
  chosen: Lord of Spirits
  alternatives:
  - Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established title within 1 Enoch's Parables. 'Lord of Spirits'
    preserves the titular force and apocalyptic register better than the more generic
    'Lord of the spirits.'
- source_word: መንበረ ስብሐቲሁ
  chosen: the throne of his glory
  alternatives:
  - his glorious throne
  - the throne of his majesty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A more formal rendering keeps the genitival imagery explicit and matches
    the visionary enthronement language.
- source_word: መንፈሰ ጽድቅ
  chosen: the spirit of righteousness
  alternatives:
  - the spirit of justice
  - a spirit of righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is best kept literal. 'Righteousness' fits the book's moral-judicial
    idiom better than 'justice,' though the latter remains a possible nuance.
- source_word: ተክዕወ ዲቤሁ
  chosen: was poured out upon him
  alternatives:
  - rested upon him
  - was bestowed upon him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests being poured or shed out. 'Poured out upon him' preserves
    the striking apocalyptic image and avoids flattening it into a generic statement
    of possession.
- source_word: ነገረ አፉሁ
  chosen: the word of his mouth
  alternatives:
  - the speech of his mouth
  - what came from his mouth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the singular collective force and the solemn judicial idiom.
    It also preserves the image of effective speech proceeding from the enthroned
    figure.
- source_word: ይቀትል ኵሎሙ ኃጥኣነ
  chosen: put all the sinners to death
  alternatives:
  - slew all the sinners
  - killed all the sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is explicitly lethal. 'Put ... to death' conveys judicial execution
    in context better than the blunter 'killed' while remaining natural English.
- source_word: ዐማፂያን
  chosen: the lawless
  alternatives:
  - the rebels
  - the transgressors
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can denote those in revolt or transgression. In this judgment
    context, 'the lawless' best captures persistent opposition to divine order without
    narrowing it to political rebellion.
- source_word: እምገጹ ይትሐጐሉ
  chosen: were destroyed from before his face
  alternatives:
  - perished before him
  - were driven away from before his face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is spatial and judicial. 'From before his face' preserves
    the concrete Semitic-style idiom of presence, while 'were destroyed' matches the
    verse's lethal parallelism.
