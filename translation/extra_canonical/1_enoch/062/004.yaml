lexical_decisions:
- source_word: ሕማም
  chosen: pain
  alternatives:
  - anguish
  - suffering
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes bodily pain or distress. In this childbirth simile, 'pain' preserves the concrete force while still allowing the apocalyptic sense of overwhelming anguish.
- source_word: ማሕምም
  chosen: in labor
  alternatives:
  - in travail
  - in birth-pains
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase with ብእሲት marks a woman in the state of childbirth pains. 'In labor' is idiomatic modern English and preserves the image without archaizing.
- source_word: የዓፅብ / ተዐፅብ
  chosen: is constrained
  alternatives:
  - is distressed
  - is hard-pressed
  - suffers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated verb conveys being pressed, constrained, or seized by difficulty. 'Is constrained' keeps the physical pressure of childbirth and avoids flattening the image into generic emotional distress.
- source_word: ወሊድ
  chosen: giving birth
  alternatives:
  - childbirth
  - delivery
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here the noun belongs to the childbirth scene. Rendering it verbally in English produces a natural line while preserving the concrete birthing action.
- source_word: በአፈ ማሕፀን
  chosen: to the mouth of the womb
  alternatives:
  - to the opening of the womb
  - to the womb's mouth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'at the mouth of the womb.' The expression is vivid and anatomical. Retaining 'mouth of the womb' preserves the source imagery; the preposition is smoothed to 'comes to' in English.
