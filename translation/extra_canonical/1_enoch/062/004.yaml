theological_decisions:
- issue: Whether to generalize the childbirth image into abstract terror
  chosen_reading: Retain the concrete simile of labor pain and constriction
  alternative_readings:
  - Render broadly as 'anguish will seize them like a woman in travail' without the anatomical detail
  rationale: The verse uses a sustained childbirth comparison, including the child's arrival at the womb's opening. Preserving the concrete image fits the apocalyptic rhetoric and avoids paraphrastic smoothing.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten into generic modern religious prose.'
