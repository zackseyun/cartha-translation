translation:
  text: And pain shall come upon them as upon a woman in labor, when her child comes to the mouth of the womb, and she is constrained in giving birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to the mouth of the womb,' an anatomical expression intensifying the childbirth image.
    reason: lexical_alternative
  - marker: b
