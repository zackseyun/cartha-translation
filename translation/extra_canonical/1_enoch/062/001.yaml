translation:
  text: And thus the Lord commanded the kings and the mighty and the exalted, and
    those who dwell on the earth, and said, “Open your eyes and lift up your horns,
    if you are able to recognize the Chosen One.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Lift up your horns'' likely uses ''horns'' as an image of strength, status,
      or proud power; the translation keeps the image rather than replacing it with
      an abstract term.'
    reason: cultural_note
  - marker: b
    text: Or 'the Elect One.' The Ge'ez title is a formal designation in the Parables,
      not merely a descriptive adjective.
    reason: lexical_alternative
lexical_decisions:
- source_word: አዘዘ
  chosen: commanded
  alternatives:
  - ordered
  - gave command to
  lexicon: Dillmann Lexicon
  rationale: A strong directive verb fits the judicial-apocalyptic setting better
    than a softer 'said to' or merely narrative 'spoke to.'
- source_word: እግዚእ
  chosen: the Lord
  alternatives:
  - Lord
  - the Master
  lexicon: Dillmann Lexicon
  rationale: With the article-like force in context and in keeping with project style
    for divine title language, 'the Lord' best conveys the sovereign figure addressing
    earthly rulers.
- source_word: ነገሥት
  chosen: kings
  alternatives:
  - rulers
  lexicon: Dillmann Lexicon
  rationale: The term specifically denotes kings; retaining it preserves the concrete
    political scope of the judgment scene.
- source_word: ዐዚዛን
  chosen: the mighty
  alternatives:
  - the powerful
  - the strong
  lexicon: Dillmann Lexicon
  rationale: '''The mighty'' is elevated but readable English and matches apocalyptic
    lists of social elites under judgment.'
- source_word: ልዑላን
  chosen: the exalted
  alternatives:
  - the high ones
  - the nobles
  lexicon: Dillmann Lexicon
  rationale: The word points to those of high rank or elevated status. 'The exalted'
    preserves the vertical/status imagery without over-specifying a social class.
- source_word: እለ የሐድርዋ ለምድር
  chosen: those who dwell on the earth
  alternatives:
  - those inhabiting the earth
  - the inhabitants of the earth
  lexicon: Dillmann Lexicon
  rationale: A standard apocalyptic expression for earth-dwellers. The relative construction
    is represented naturally in English while preserving the cosmic scope.
- source_word: ክሥቱ አዕይንቲክሙ
  chosen: Open your eyes
  alternatives:
  - Uncover your eyes
  - See with your eyes
  lexicon: Dillmann Lexicon
  rationale: 'An imperative of opening/uncovering the eyes suits the revelatory context:
    they are being summoned to perceive what they have not perceived.'
- source_word: አንሥኡ አቅርንቲክሙ
  chosen: lift up your horns
  alternatives:
  - raise your horns
  - lift up your strength
  lexicon: Dillmann Lexicon
  rationale: The literal image 'horns' should be preserved in apocalyptic literature
    rather than reduced to an abstract metaphor. It likely evokes power, pride, or
    kingly strength.
- source_word: ትክሉ
  chosen: if you are able
  alternatives:
  - if you can
  - if you have power to
  lexicon: Dillmann Lexicon
  rationale: This conditional clause tests capacity or ability; 'if you are able'
    keeps the solemn rhetorical force.
- source_word: አእምሮቶ
  chosen: to recognize
  alternatives:
  - to know
  - to perceive
  - to understand
  lexicon: Dillmann Lexicon
  rationale: In context the issue is not abstract cognition alone but identifying
    the figure being revealed. 'Recognize' captures that revelatory recognition.
- source_word: ሐሩይ
  chosen: the Chosen One
  alternatives:
  - the Elect One
  - the chosen one
  lexicon: Dillmann Lexicon
  rationale: This title is central in the Parables. 'Chosen One' is clear modern English
    and preserves the titular force without importing later christological phrasing.
