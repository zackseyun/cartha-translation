theological_decisions:
- issue: Rendering the titular figure ሐሩይ in the Parables
  chosen_reading: the Chosen One
  alternative_readings:
  - the Elect One
  rationale: Both are possible, but 'Chosen One' is more transparent contemporary
    English while preserving the distinct title used in this section. It avoids unnecessary
    traditionalism while not weakening the messianic-apocalyptic force.
  doctrine_reference: 'Translation philosophy: readable modern English; consistency
    of key terms, or documented exception.'
- issue: Whether to interpret 'lift up your horns' metaphorically in the main text
  chosen_reading: retain the literal image 'lift up your horns'
  alternative_readings:
  - display your power
  - raise your pride
  rationale: Apocalyptic imagery should not be flattened into generic prose. The literal
    image is intelligible in English and preserves the symbolic register of power
    and arrogance under divine summons.
  doctrine_reference: 'Book context: preserve cosmic imagery; do not flatten apocalyptic
    imagery.'
