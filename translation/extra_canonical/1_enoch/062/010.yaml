translation:
  text: And the Lord of Spirits will drive them so that they hasten and go out from
    before his face, and their faces will be filled with shame, and darkness will
    cover their faces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his presence.' The Ge'ez reads more literally, 'from before his
      face.'
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be rendered 'darkness will be added to their faces.'
      The image is of shame intensified by judicial gloom.
    reason: lexical_alternative
  - marker: c
    text: Or 'darkness will be piled upon their faces.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይጐጕኦሙ
  chosen: will drive them on
  alternatives:
  - will urge them on
  - will terrify them
  - will chase them away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys forceful impelling or driving. In this judgment scene,
    'drive them on' preserves the coercive motion without over-specifying emotional
    terror.
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established title in 1 Enoch, and the construct is best rendered
    as the fixed apocalyptic title 'Lord of Spirits.'
- source_word: ከመ ይፍጥኑ
  chosen: so that they hurry
  alternatives:
  - that they hasten
  - so that they flee quickly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Hurry'' gives the sense of compelled haste in readable English while
    preserving the purposive clause.'
- source_word: ወይፃኡ እምቅድመ ገጹ
  chosen: and go out from before his face
  alternatives:
  - and depart from before him
  - and go forth from his presence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez literally speaks of going out from before his face. 'From before
    his face' preserves the vivid anthropomorphic and courtly idiom better than flattening
    it to 'from his presence,' though the latter is a viable alternative.
- source_word: ገጾሙ ይመልእ ኃፍረተ
  chosen: their faces will be filled with shame
  alternatives:
  - shame will fill their faces
  - their countenances will be filled with disgrace
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the face imagery explicit and preserves the public-honor dimension
    of judgment.
- source_word: ጽልመት ይትዌሰክ ገጾሙ
  chosen: darkness will be piled upon their faces
  alternatives:
  - darkness will cover their faces
  - darkness will be added to their faces
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests addition or increase. 'Be piled upon' preserves the
    cumulative, oppressive imagery more vividly than the smoother 'cover.'
