theological_decisions:
- issue: Identity of the enthroned figure
  chosen_reading: Render with the pronoun 'he' rather than specifying 'the Son of
    Man' or 'the Lord of Spirits.'
  alternative_readings:
  - explicitly identify the figure as the Son of Man from the wider context
  - explicitly identify the figure as the Lord of Spirits
  rationale: This verse itself uses a pronoun and describes enthronement. Since the
    immediate Ge'ez wording does not restate the title, the translation preserves
    the local ambiguity rather than resolving it from surrounding verses.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'those who hold the earth'
  chosen_reading: Leave the phrase broad and political-cosmic rather than narrowing
    it to landowners or world-rulers.
  alternative_readings:
  - those who possess the land
  - those who govern the world
  rationale: The Ge'ez expression can cover possession, control, or dominion. In apocalyptic
    context the breadth is likely intentional, so the English should not prematurely
    narrow it.
