translation:
  text: And in that day all the kings and the mighty and the exalted, and those who
    hold the earth, shall stand up, and they shall see and recognize that he sits
    on the throne of his glory; and righteousness shall be judged before him, and
    no lying word shall be spoken before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who possess the earth' or 'those who rule the land/world.' The
      Ge'ez verb can denote holding, possessing, or exercising control.
    reason: lexical_alternative
  - marker: b
    text: The clause 'and righteousness shall be judged before him' is textually and
      syntactically difficult in the Ethiopic. The translation keeps the judicial
      sense of the wording rather than smoothing it into a more familiar expression.
    reason: textual_variant
lexical_decisions:
- source_word: ወይቀውሙ
  chosen: shall stand up
  alternatives:
  - shall arise
  - shall be raised up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb naturally conveys rising or standing up. In this judgment-theophany
    context, 'shall stand up' preserves the bodily, courtlike image without overinterpreting
    it as resurrection.
- source_word: በይእቲ ዕለት
  chosen: in that day
  alternatives:
  - on that day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard apocalyptic temporal formula; 'in that day' preserves the elevated
    register and prophetic resonance.
- source_word: ኵሎሙ ነገሥት ወዐዚዛን ወልዑላን
  chosen: all the kings and the mighty and the exalted
  alternatives:
  - all the kings, the powerful, and the high ones
  - all the kings and rulers and the lofty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sequence names social-political elites in escalating terms. 'Mighty'
    and 'exalted' preserve the apocalyptic rhetoric without collapsing the categories
    into one generic term.
- source_word: ወእለ ይእኅዝዋ ለምድር
  chosen: and those who hold the earth
  alternatives:
  - and those who possess the earth
  - and those who rule the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to seize, hold, or possess. 'Hold the earth' keeps the
    concrete force and leaves open whether the sense is political control, possession,
    or domination.
- source_word: ወይሬእይዎ ወያአምርዎ
  chosen: they shall see and recognize
  alternatives:
  - they shall see and know
  - they shall behold and understand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The pair marks both perception and acknowledgment. ''Recognize'' captures
    more than bare cognition: they perceive who he is and acknowledge it.'
- source_word: ከመ ይነብር ዲበ መንበረ ስብሐቲሁ
  chosen: that he sits on the throne of his glory
  alternatives:
  - that he dwells upon the throne of his glory
  - that he is seated on the throne of his glory
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause presents enthronement imagery. 'Sits on the throne of his
    glory' is idiomatic English while preserving the apocalyptic courtroom scene.
- source_word: ወጽድቅ ቅድሜሁ ይትኴነን
  chosen: and righteousness shall be judged before him
  alternatives:
  - and the righteous judgment shall be before him
  - and righteousness is established before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The line is difficult. The noun is plainly 'righteousness,' and the verb
    appears judicial. Rather than smoothing to a more familiar formula, this rendering
    keeps the judicial sense while signaling the text's awkwardness.
- source_word: ወነገረ በከ አልቦ ዘይትበሀል በቅድሜሁ
  chosen: and no lying word shall be spoken before him
  alternatives:
  - and no false word shall be uttered before him
  - and no deceitful thing shall be said before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denies the possibility of false or deceptive speech in his
    presence. 'Lying word' preserves the singular collective feel and the solemn courtroom
    setting.
