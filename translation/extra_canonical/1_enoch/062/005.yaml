translation:
  text: And one half of them shall look at the other half, and they shall be terrified,
    and their faces shall fall, and pain shall seize them when they see that Son of
    Man sitting on the throne of his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their faces shall be cast down.' The Ge'ez idiom likely expresses visible
      shame or dread.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'that Son of Man' is retained as an apocalyptic title in the
      Parables, without importing later doctrinal wording beyond what this passage
      itself supports.
    reason: cross_reference
lexical_decisions:
- source_word: መንፈቆሙ ... ለመንፈቆሙ
  chosen: one half of them ... the other half
  alternatives:
  - their halves
  - each to the other
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated noun with pronominal suffix most naturally denotes division
    into two groups or halves. Rendering it as reciprocal 'each to the other' would
    smooth away the concrete image of a split company looking across at itself.
- source_word: ይሬእዩ
  chosen: shall look at / see
  alternatives:
  - behold
  - gaze upon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the common verb of seeing. 'Look at' fits the first clause
    with an object of the other half; 'see' fits the later clause introducing the
    Son of Man.
- source_word: ይደነግጹ
  chosen: shall be terrified
  alternatives:
  - be alarmed
  - be disturbed
  - tremble
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is eschatological dread before judgment. 'Terrified' preserves
    the intensity better than the milder 'disturbed' or 'alarmed'.
- source_word: ይቴሕቱ ገጾሙ
  chosen: their faces shall fall
  alternatives:
  - their faces shall be cast down
  - their countenances shall be lowered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom likely denotes downcast or fallen faces in shame and fear.
    'Their faces shall fall' keeps the vivid apocalyptic image while remaining intelligible.
- source_word: ይእኅዞሙ ሕማም
  chosen: pain shall seize them
  alternatives:
  - anguish shall seize them
  - torment shall take hold of them
  - suffering shall grasp them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is literally something like 'pain/sickness will seize
    them.' 'Pain' is broad enough to preserve bodily and emotional distress without
    over-specifying.
- source_word: ወልደ ብእሲ
  chosen: Son of Man
  alternatives:
  - son of man
  - the human one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Parables this expression functions as a weighty apocalyptic title.
    Capitalized 'Son of Man' preserves that local force without importing later NT
    phrasing beyond the title itself.
- source_word: ይነብር
  chosen: sitting
  alternatives:
  - dwelling
  - remaining
  - enthroned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can broadly mean dwell/remain/sit, but with 'upon the throne'
    the sense is clearly seated enthronement. 'Sitting' stays close to the wording;
    the throne already conveys enthronement.
- source_word: መንበረ ስብሐቲሁ
  chosen: the throne of his glory
  alternatives:
  - his glorious throne
  - the throne of his majesty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A more formal rendering preserves the genitival structure and the apocalyptic
    enthronement formula. 'Majesty' is possible but 'glory' better matches the underlying
    noun.
