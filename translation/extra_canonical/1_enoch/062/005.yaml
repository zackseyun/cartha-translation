theological_decisions:
- issue: Whether ወልደ ብእሲ should be rendered as a title or generic human expression
  chosen_reading: Rendered as the title 'that Son of Man'
  alternative_readings:
  - that son of man
  - that human one
  rationale: Within the Parables, the figure is a distinct eschatological agent repeatedly
    identified by this expression. The demonstrative 'that' also reflects the deictic
    force of ለዝኩ and preserves the visionary presentation.
  doctrine_reference: Preserve local passage meaning and do not over-harmonize with
    later Christian usage; translate titles for meaning.
