theological_decisions:
- issue: Rendering the titular phrase ወልደ እጓለ እመሕያው
  chosen_reading: the Son of Man
  alternative_readings:
  - the son of man
  - the son of the offspring of the living
  rationale: In the Parables this phrase functions as a recognizable apocalyptic designation,
    not merely a generic human reference. The title is therefore translated as 'the
    Son of Man' while avoiding any added christological interpretation beyond the
    local passage.
  doctrine_reference: Preserve local passage meaning and do not over-harmonize with
    later Christian usage.
- issue: How explicit to make the preexistence/concealment motif
  chosen_reading: was hidden ... the Most High kept him ... revealed him
  alternative_readings:
  - was concealed from eternity
  - was reserved by the Most High
  rationale: The verse clearly presents concealment followed by revelation, but the
    Ge'ez wording should not be expanded into stronger metaphysical claims than the
    text itself states. The chosen rendering preserves the theological tension without
    interpretive inflation.
  doctrine_reference: Preserve theological tension rather than resolve it.
