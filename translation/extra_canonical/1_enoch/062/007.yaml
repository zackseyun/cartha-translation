translation:
  text: For from the beginning the Son of Man was hidden, and the Most High kept him
    in the presence of his power, and revealed him to the chosen ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before his power' or 'before his might.' The Ge'ez phrase is difficult,
      and this rendering keeps the imagery rather than smoothing it away.
    reason: lexical_alternative
  - marker: b
    text: Or 'before him'.
    reason: previous_rendering
lexical_decisions:
- source_word: እስመ
  chosen: For
  alternatives:
  - because
  - for indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the ground or explanation for the preceding statement; 'For'
    preserves the connective force in elevated but natural English.
- source_word: እምቅድሙ
  chosen: before him
  alternatives:
  - in his presence
  - from before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally built on 'before/front/presence' with pronominal suffix. In
    context it most naturally means 'before him' or 'in his presence.' 'Before him'
    preserves the ambiguity and apocalyptic register.
- source_word: ኅቡእ ኮነ
  chosen: was hidden
  alternatives:
  - became hidden
  - was concealed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction expresses a state of hiddenness. 'Was hidden' is idiomatic
    English and preserves the motif of pre-revelatory concealment without over-paraphrase.
- source_word: ወልደ እጓለ እመሕያው
  chosen: the Son of Man
  alternatives:
  - the son of the offspring of the living
  - the son of man
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established Ge'ez expression used in the Parables for the
    apocalyptic figure. A more wooden rendering would be obscure in English and would
    fail to reflect the title-like usage in this context. Capitalization marks titular
    use in this passage, not later doctrinal harmonization.
- source_word: ዐቀቦ
  chosen: kept him
  alternatives:
  - preserved him
  - guarded him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys keeping/preserving/guarding. 'Kept him' is broad enough
    to preserve the sense of divine reservation prior to revelation.
- source_word: ልዑል
  chosen: the Most High
  alternatives:
  - the Exalted One
  - the Most Exalted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A divine title. 'The Most High' is the most natural and recognizable
    English equivalent and fits Jewish apocalyptic diction without importing specifically
    later Christian phrasing.
- source_word: በቅድመ ኃይሉ
  chosen: in the presence of his power
  alternatives:
  - before his power
  - with his power
  - before his might
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult. A formally closer rendering is preferable in
    this Ge'ez-only section. 'In the presence of his power' preserves both the spatial
    idiom and the concrete noun 'power' rather than dissolving it into an adverbial
    paraphrase.
- source_word: ከሠቶ
  chosen: revealed him
  alternatives:
  - made him known
  - showed him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb contrasts with prior hiddenness. 'Revealed him' best preserves
    the apocalyptic disclosure motif.
- source_word: ለኅሩያን
  chosen: to the chosen ones
  alternatives:
  - to the elect
  - to the chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural substantive referring to the elect community. 'Chosen ones' is
    clear modern English and aligns with project guidance to keep such terms locally
    grounded rather than relying on inherited ecclesiastical wording.
