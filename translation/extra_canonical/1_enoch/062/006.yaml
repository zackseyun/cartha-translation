theological_decisions:
- issue: Identity of the singular figure 'him who rules over all that is hidden'
  chosen_reading: Render descriptively without specifying the referent in the main
    text.
  alternative_readings:
  - the Lord of Spirits
  - the Son of Man / Chosen One
  - God as knower and ruler of hidden things
  rationale: The Ge'ez of this verse names the figure by a relative clause rather
    than an explicit title. In the Parables, several exalted figures are in view across
    the context, and the section is effectively Ge'ez-only here. To preserve theological
    tension and avoid harmonizing beyond the wording, the translation keeps the descriptive
    phrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
