translation:
  text: And the kings and the mighty and all who possess the earth shall bless and
    praise and exalt him who rules over all that is hidden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all who hold the earth.' The Ge'ez verb can denote holding or possessing;
      in context it likely refers to those who exercise earthly power.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'him who rules over all that is hidden' is left descriptive because
      the verse does not supply an explicit title for the figure.
    reason: alternative_reading
lexical_decisions:
- source_word: ይባርክዎ
  chosen: shall bless
  alternatives:
  - will bless
  - shall speak blessing to him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The imperfect with prefixed conjunction continues the future/visionary
    sequence. 'Bless' preserves the elevated liturgical force better than a looser
    paraphrase.
- source_word: ይሴብሕዎ
  chosen: praise
  alternatives:
  - glorify
  - laud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This verb denotes praise or doxological acclaim. 'Praise' is the most
    transparent English equivalent in a worship context.
- source_word: የልዕልዎ
  chosen: exalt him
  alternatives:
  - magnify him
  - lift him high
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys raising high or exalting. 'Exalt' keeps the apocalyptic
    and royal register without becoming archaic.
- source_word: ነገሥት
  chosen: kings
  alternatives:
  - rulers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary sense is 'kings'; retaining it preserves the political concreteness
    of the scene.
- source_word: መዛዝእት
  chosen: the mighty
  alternatives:
  - the powerful
  - the strong ones
  - the rulers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this judgment context the term likely refers to powerful persons alongside
    kings. 'The mighty' is concise and preserves the social rank implied.
- source_word: ኵሎሙ እለ ይእሕዝዋ ለምድር
  chosen: all who possess the earth
  alternatives:
  - all who hold the earth
  - all who seize the earth
  - all who have dominion over the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally means hold or possess. 'Possess the earth' fits the
    royal-political context and avoids overinterpreting it as violent seizure, though
    that nuance may be present.
- source_word: ለዘይመልክ
  chosen: him who rules
  alternatives:
  - the one who reigns
  - him who is king
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative construction points to a singular figure characterized by
    reigning. 'Rules' is clear modern English while preserving royal authority.
- source_word: ኵሎ ዘኅቡእ
  chosen: all that is hidden
  alternatives:
  - every hidden thing
  - all secrets
  - all that is concealed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is broad and should not be narrowed to 'secrets' alone. 'All
    that is hidden' preserves the cosmic and revelatory scope of the expression.
