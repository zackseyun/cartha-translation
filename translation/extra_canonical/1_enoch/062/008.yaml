theological_decisions:
- issue: Whether ቅዱሳን refers to human faithful ones or angelic holy beings
  chosen_reading: Rendered generically as 'holy ones' without narrowing the referent.
  alternative_readings:
  - '''saints'' as human righteous'
  - '''holy ones'' as angelic beings'
  rationale: In the Parables, categories can overlap or remain deliberately broad.
    The immediate pairing with 'chosen' suggests the righteous community, but the
    apocalyptic register benefits from preserving the text's openness rather than
    resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
