translation:
  text: And the congregation of the chosen and the holy ones shall be sown, and all
    the chosen shall stand before him on that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembly' for 'congregation.'
    reason: lexical_alternative
  - marker: b
    text: '''Holy ones'' may denote the sanctified community, though in apocalyptic
      literature the term can also overlap with heavenly holy beings.'
    reason: lexical_alternative
