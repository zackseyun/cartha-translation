    reason: previous_rendering
lexical_decisions:
- source_word: ወይዘራእ
  chosen: shall be seen
  alternatives:
  - shall appear
  - shall be revealed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The passive/reflexive sense fits the form and context: the gathered
    community comes into view in the judgment scene. ''Shall be seen'' preserves the
    visual-apocalyptic force without overinterpreting as active self-appearance.'
- source_word: ማኅበረ
  chosen: congregation
  alternatives:
  - assembly
  - company
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Denotes an assembled group. 'Congregation' preserves the collective and
    somewhat elevated register suitable to apocalyptic prose; 'assembly' would also
    work but is slightly flatter.
- source_word: ኅሩያን
  chosen: chosen
  alternatives:
  - elect
  - selected ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A key Enochic term. 'Chosen' is transparent modern English and avoids
    importing later doctrinal freight that 'elect' can carry, while remaining faithful
    to the lexical sense.
- source_word: ቅዱሳን
  chosen: holy ones
  alternatives:
  - saints
  - holy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context this plural substantive should remain 'holy ones.'
    'Saints' would sound more ecclesiastical and potentially anachronistic.
- source_word: ወይቀውሙ
  chosen: shall stand
  alternatives:
  - shall arise
  - shall take their stand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is standing/uprising into a position. 'Shall stand' is
    the most direct and fits the courtroom/judgment imagery before the exalted figure.
- source_word: በቅድሜሁ
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard prepositional phrase of presence. 'Before him' is concise
    and preserves the relational/judicial setting.
- source_word: ኵሎሙ
  chosen: all
  alternatives:
  - every one of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward universal term; retained explicitly because the verse
    first names the congregation and then emphasizes all the chosen individually/corporately.
- source_word: በይእቲ ዕለት
  chosen: on that day
  alternatives:
  - in that day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula. 'On that day' is idiomatic modern
    English while preserving the eschatological marker.
