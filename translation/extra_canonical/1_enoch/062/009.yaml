theological_decisions:
- issue: Whether the homage to the Son of Man should be rendered as explicit worship
  chosen_reading: bow down
  alternative_readings:
  - worship
  - do obeisance
  rationale: The scene clearly depicts submission and reverence, but the Ge'ez verb can cover a range from obeisance to worship. 'Bow down' preserves the theological tension rather than resolving it in either a maximal or minimal direction.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: How to render the title ወልደ እጓለ እመሕያው
  chosen_reading: that Son of Man
  alternative_readings:
  - that son of man
  - that son of the offspring of the living
  rationale: In the Parables this functions as a recognized apocalyptic title. Capitalizing it as a title reflects local usage in this section while avoiding later imported formulas not present in the verse itself.
  doctrine_reference: Keep major terms like 'Son of Man' locally grounded in the passage before harmonizing them across the corpus.
