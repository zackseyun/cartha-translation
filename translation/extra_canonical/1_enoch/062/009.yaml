translation:
  text: And all the kings and the mighty and the exalted, and those who rule the dry land, shall fall down before him on their faces, and they shall bow down and set their hope on that Son of Man, and they shall petition him and petition for mercy from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who govern the land.' The Ge'ez literally refers to ruling 'the dry land,' a concrete expression for terrestrial dominion.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'bow down' may also be understood as 'do obeisance' or, in a stronger reading, 'worship.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and they shall petition him and seek mercy from him.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይወድቁ
  chosen: shall fall down
  alternatives:
  - shall fall
  - shall prostrate themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes falling/prostration in a reverential or compelled posture. 'Fall down' preserves the physical action and apocalyptic force without over-paraphrasing.
- source_word: ነገሥት
  chosen: kings
  alternatives:
  - rulers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary sense is 'kings'; retaining it preserves the political concreteness of the judgment scene.
- source_word: መዛዝእት
  chosen: the mighty
  alternatives:
  - the powerful
  - princes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term refers broadly to powerful persons or authorities. 'The mighty' fits the elevated register and pairs well with the surrounding social ranks.
- source_word: ልዑላን
  chosen: the exalted
  alternatives:
  - the high ones
  - the nobles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word denotes those of high status. 'The exalted' preserves the elevated diction and the irony of their humbling before the Son of Man.
- source_word: እለ ይመልከዋ ለየብስ
  chosen: those who rule the dry land
  alternatives:
  - those who possess the earth
  - those who govern the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is literally tied to ruling over the dry land/earth. 'Dry land' keeps the concrete Ge'ez image and avoids prematurely smoothing it to a generic 'earth'.
- source_word: በቅድሜሁ በገጾሙ
  chosen: before him on their faces
  alternatives:
  - before him with their faces to the ground
  - before him face-down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired expressions intensify bodily prostration. 'Before him on their faces' is idiomatic enough in English while preserving the vivid posture.
- source_word: ይሰግዱ
  chosen: they shall bow down
  alternatives:
  - they shall worship
  - they shall do obeisance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can denote prostration or reverential homage. 'Bow down' preserves ambiguity between homage and worship without forcing a later doctrinal conclusion.
- source_word: ይሴፈዉ
  chosen: set their hope on
  alternatives:
  - hope in
  - trust in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is best taken as hoping or placing confidence in. 'Set their hope on' makes the directional force explicit and fits the sequence of submission and petition.
- source_word: ለዝኩ ወልደ እጓለ እመሕያው
  chosen: that Son of Man
  alternatives:
  - that son of man
  - that son of the offspring of the living
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez expression is the standard Enochic title here. 'That Son of Man' preserves the demonstrative force and title-like usage in the Parables without importing later christological phrasing beyond the text.
- source_word: ይስእልዎ ወይስእሉ ኀቤሁ ምሕረተ
  chosen: they shall petition him and seek mercy from him
  alternatives:
  - they shall ask him and beg mercy from him
  - they shall entreat him and request compassion from him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated asking verbs heighten supplication. Rendering them as 'petition' and 'seek mercy' preserves the rhetorical doubling without awkward redundancy.
