theological_decisions:
- issue: Meaning of the difficult clause ኢንረክብ ዕረፍተ ንእመን
  chosen_reading: we shall find no rest to believe
  alternative_readings:
  - we shall find no rest in which to trust
  - we shall find no respite for faith/hope
  - we shall not find rest, nor shall we believe
  rationale: The Ge'ez wording is awkward and the Parables lack external textual control here. The main text keeps the most literal viable sense, while a footnote records smoother interpretive alternatives. This preserves transparency rather than forcing a polished but uncertain reading.
  doctrine_reference: Preserve theological tension rather than resolve it; when uncertain, prefer transparent English plus footnote.
- issue: Force of the final judgment formula
  chosen_reading: his judgment shows no partiality
  alternative_readings:
  - his judgment is righteous and does not lift up a face
  - his judgment is just and accepts no person's face
  rationale: The likely underlying idiom concerns impartial judgment. Rendering the idiom in natural English best communicates the theological point without flattening the judicial imagery.
  doctrine_reference: Optimal equivalence with documented exception; preserve local apocalyptic judgment language.
