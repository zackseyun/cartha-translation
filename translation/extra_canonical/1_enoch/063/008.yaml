translation:
  text: And on the day of our distress and our affliction, he will not save us, and we shall find no rest to believe, for our Lord is faithful in all his works, his judgments, and his righteousness; and his judgments show no partiality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'we shall find no rest to believe' is textually and syntactically difficult in the Ge'ez. It may mean 'we shall find no rest in which to trust' or 'we shall find no respite for hope.'
    reason: alternative_reading
  - marker: b
    text: Literally, the final clause refers to judgment not 'lifting up the face'—an idiom for showing no favoritism or partiality.
    reason: lexical_alternative
  - marker: c
    text: Or 'in all his works and in his judgments; and his judgment shows no partiality.'.
    reason: previous_rendering
lexical_decisions:
- source_word: በዕለተ
  chosen: on the day of
  alternatives:
  - in the day of
  - at the time of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal prepositional phrase introducing the crisis moment; 'on the day of' preserves the apocalyptic/judgment-time feel better than a looser paraphrase.
- source_word: ስራሕነ
  chosen: our distress
  alternatives:
  - our toil
  - our trouble
  - our labor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can suggest work/toil, but in this penitential judgment context it most naturally denotes the hard condition or misery experienced by the speakers. 'Distress' fits the paired lament with the following term.
- source_word: ምንዳቤነ
  chosen: our affliction
  alternatives:
  - our punishment
  - our suffering
  - our torment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Chosen as a suffering-term paired with 'distress.' 'Punishment' is possible in context, but the line emphasizes the speakers' plight rather than explicitly naming the cause in this clause.
- source_word: ኢያድኅነነ
  chosen: he will not save us
  alternatives:
  - he does not deliver us
  - he will not deliver us
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard salvific verb; 'save' is concise and preserves the gravity of failed rescue in a judgment setting.
- source_word: ኢንረክብ ዕረፍተ
  chosen: we shall find no rest
  alternatives:
  - we shall not obtain relief
  - we shall find no repose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A natural English rendering of the verbal phrase. 'Rest' preserves the existential and judicial force without over-expanding.
- source_word: ንእመን
  chosen: to believe
  alternatives:
  - for trust
  - for confidence
  - to trust
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is difficult, but the Ge'ez points toward believing/trusting. I preserve the awkwardness rather than paraphrasing away the uncertainty. It may imply 'no rest in which to trust/hope.'
- source_word: መሃይምን
  chosen: faithful
  alternatives:
  - trustworthy
  - 'true'
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Describes the Lord's reliability in contrast to the condemned speakers' lack of refuge. 'Faithful' is elevated yet readable.
- source_word: ምግባሩ
  chosen: his works
  alternatives:
  - his deeds
  - his actions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard rendering that preserves the broad scope of divine activity.
- source_word: ኵነኔሁ
  chosen: his judgments
  alternatives:
  - his judgment
  - his justice
  - his sentence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term appears twice in the verse. First occurrence is rendered plural to match the distributive sense 'in all his works and judgments'; the second is singular in English for the summarizing statement. This is a documented stylistic variance.
- source_word: ጽድቁ
  chosen: shows no partiality
  alternatives:
  - is righteous
  - is just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The surrounding phrase with 'face' suggests impartiality rather than merely abstract righteousness. This rendering captures the judicial idea that his judgment does not favor persons.
- source_word: ገጹ
  chosen: partiality
  alternatives:
  - face
  - regard for persons
  - favoritism
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'face,' but in judgment contexts the idiom points to showing regard/partiality. Rendering the idiom rather than the body-part avoids obscurity while preserving the legal sense.
- source_word: ኢይነሥኡ
  chosen: shows no partiality
  alternatives:
  - does not lift up [the face]
  - does not accept [the face]
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb likely participates in the idiom of not lifting/accepting the face, i.e., not showing favoritism. Englishing the idiom communicates the point clearly.
