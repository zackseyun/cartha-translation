translation:
  text: And blessed be your hidden power for all generations, and your glory forever
    and ever. Deep are all your hidden things, and they are without number; and your
    righteousness is beyond reckoning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your secrets' / 'your mysteries' for 'your hidden things.' The Ge'ez
      is more literally 'your hidden [things].'
    reason: lexical_alternative
  - marker: b
    text: Or 'your justice' for 'your righteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይበርህ
  chosen: blessed be
  alternatives:
  - be blessed
  - may [it/he] be blessed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Jussive/blessing formula. 'Blessed be' preserves the elevated doxological
    force without over-paraphrasing.
- source_word: ኅቡእ ኃይልክ
  chosen: your hidden power
  alternatives:
  - your secret power
  - your concealed might
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኅቡእ denotes what is hidden or concealed. 'Hidden power' keeps the apocalyptic
    sense of divine potency not fully disclosed, better than flattening to merely
    'great power'.
- source_word: ለትውልደ ትውልድ
  chosen: for all generations
  alternatives:
  - from generation to generation
  - to generation of generation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard durative formula. 'For all generations' reads naturally in
    English while preserving the continuing scope.
- source_word: ስብሐቲከ
  chosen: your glory
  alternatives:
  - your praise
  - your splendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In doxological context this most naturally denotes divine glory/splendor
    rather than the act of praise offered to God.
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for the age of ages
  - for evermore
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Traditional English idiom accurately conveys the emphatic perpetuity
    of the Ge'ez phrase.
- source_word: ዕሙቅ ውእቱ
  chosen: Deep are
  alternatives:
  - it is deep
  - profound are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fronting 'Deep are' preserves the poetic, elevated word order and the
    sense of unfathomable depth.
- source_word: ኵሉ ኅቡኣት ዚአከ
  chosen: all your hidden things
  alternatives:
  - all your hidden works
  - all your secrets
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural 'hidden things' is the most transparent rendering of the Ge'ez.
    'Secrets' is possible but slightly more interpretive; 'works' is not explicit
    in the wording.
- source_word: ኍልቈ አልቦሙ
  chosen: they are without number
  alternatives:
  - they have no number
  - they are innumerable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This idiom expresses incalculability. 'Without number' keeps the formal
    texture while remaining clear.
- source_word: ጽድቅ ዚአከ
  chosen: your righteousness
  alternatives:
  - your justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given project defaults and the doxological setting, 'righteousness' is
    preferred, while 'justice' remains a viable contextual alternative.
- source_word: ኃሳበ አልቦ
  chosen: beyond reckoning
  alternatives:
  - has no measure
  - is unsearchable
  - is without calculation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally indicates absence of calculation/accounting. 'Beyond
    reckoning' preserves both the poetic register and the sense that it cannot be
    computed or fully grasped.
