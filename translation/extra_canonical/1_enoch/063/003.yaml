theological_decisions:
- issue: Whether to render divine hiddenness language as 'hidden things' or interpretively
    as 'mysteries/secrets'
  chosen_reading: all your hidden things
  alternative_readings:
  - all your secrets
  - all your mysteries
  rationale: The Ge'ez wording is concrete and plural. In a Ge'ez-only Parables context,
    restraint is preferable; 'hidden things' preserves ambiguity without importing
    later mystical terminology.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Whether ጽድቅ here should be 'righteousness' or 'justice'
  chosen_reading: your righteousness
  alternative_readings:
  - your justice
  rationale: Both are possible, but the verse is a doxological acclamation of God's
    character rather than a specific judicial act. 'Righteousness' best fits the immediate
    context while leaving 'justice' noted as an alternative.
  doctrine_reference: Consistency of key terms, or documented exception.
