theological_decisions:
- issue: Whether the rulers' request implies genuine repentance or only desperate
    submission under judgment
  chosen_reading: The verse depicts a plea for brief relief in order to perform acts
    of submission and confession, without asserting that this repentance is accepted.
  alternative_readings:
  - The confession is sincere repentance
  - The confession is merely coerced acknowledgment
  rationale: The immediate wording reports their request and intended actions, but
    does not state divine acceptance or inner transformation. Preserving that tension
    fits the project's policy of not resolving ambiguities the text itself leaves
    open.
  doctrine_reference: Preserve theological tension rather than resolve it.
