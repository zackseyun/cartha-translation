translation:
  text: In those days the mighty ones and the kings who possess the dry land shall
    beg the angels of punishment, to whom they have been handed over, that they might
    give them a little respite, so that they may fall down and worship before the
    Lord of Spirits, and confess their sins before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who hold the earth/land.' The Ge'ez phrase is concrete ('the dry land')
      and likely refers to earthly dominion.
    reason: lexical_alternative
  - marker: b
    text: The clause rendered 'to whom they have been handed over' is textually difficult
      in the Ethiopic witness; the sense appears to be that these angels have custody
      over the condemned rulers.
    reason: textual_variant
  - marker: c
    text: '''A little respite'' indicates a brief, limited relief, not release from
      judgment.'
    reason: cultural_note
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  chosen: In those days
  alternatives:
  - At that time
  - In those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula; plural 'days' preserves the recurring
    visionary register better than a flattened singular.
- source_word: ዓዚዛን
  chosen: the mighty ones
  alternatives:
  - the powerful
  - the strong ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the social-political force of the term without over-specifying
    rank; paired with 'kings' it likely denotes other powerful rulers or magnates.
- source_word: ነገሥት
  chosen: the kings
  alternatives:
  - rulers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct and formal rendering of the royal title; no need to generalize.
- source_word: እለ ይእኅዝዋ ለየብስ
  chosen: who possess the dry land
  alternatives:
  - who hold the earth
  - who rule the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally points to holding/possessing the dry land or earth.
    'Dry land' preserves the concrete wording and apocalyptic texture better than
    the more abstract 'world,' though the sense is territorial dominion.
- source_word: እመላእክት መቅሠፍት
  chosen: the angels of punishment
  alternatives:
  - the angels of torment
  - the punitive angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A transparent genitive construction. 'Punishment' fits the judicial context
    of final judgment better than the more experiential 'torment'.
- source_word: በኀበ ሀለዉ ምጥዋነ
  chosen: to whom they have been handed over
  alternatives:
  - in whose charge they are
  - with whom they remain for torment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is difficult in the OCR witness. The sense appears to identify
    the angels as those in whose custody the kings now are. This rendering makes that
    relation explicit while staying close to the likely judicial setting.
- source_word: ከመ የሀቦሙ ዕረፍተ ንስቲተ
  chosen: that they might give them a little respite
  alternatives:
  - that they might grant them a brief rest
  - that they might give them a small relief
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዕረፍት denotes rest or relief; ንስቲተ adds the sense of smallness or brevity.
    'A little respite' captures both the temporary and limited nature of the request.
- source_word: ከመ ይደቁ ወይስግዱ
  chosen: so that they may fall down and worship
  alternatives:
  - so that they may prostrate themselves and bow down
  - so that they may kneel and worship
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs intensify bodily submission. 'Fall down and worship'
    is vivid, natural English that preserves the physicality of the scene.
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed Enochic divine title. 'Lord of Spirits' preserves the
    established internal terminology of the book without importing later doctrinal
    phrasing.
- source_word: ወይትአመኑ ኃጢአቶሙ
  chosen: and confess their sins
  alternatives:
  - and acknowledge their sins
  - and admit their offenses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this penitential-judicial context, 'confess' best conveys open acknowledgment
    before the divine judge.
