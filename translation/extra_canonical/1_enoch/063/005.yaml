theological_decisions:
- issue: Force of the speakers' question under judgment
  chosen_reading: 'A rhetorical lament: they have not been given any rest or respite
    from judgment, and therefore cannot stand in thankful praise before the divine
    glory.'
  alternative_readings:
  - A simple informational question about who granted them leisure to worship
  rationale: Within the chapter's context of condemned rulers and the mighty, the
    question is not neutral but despairing. The English keeps the interrogative form
    without softening the judicial setting.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten judgment formulas into generic prose.
