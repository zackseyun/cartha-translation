translation:
  text: And they said, “Who has given us rest, that we should praise and thank and
    believe before your glory?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “relief” for “rest.” The noun can denote respite or repose; the context
      is the lack of any respite under judgment.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered “confess” is difficult in this Ge'ez-only section of the
      Parables; “acknowledge” is also possible, and some might understand it more
      weakly as “believe.”
    reason: lexical_alternative
  - marker: c
    text: Or 'praise and thank and confess'.
    reason: previous_rendering
lexical_decisions:
- source_word: መኑ
  chosen: who
  alternatives:
  - what person
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Interrogative pronoun introducing the lamenting question; simple 'who'
    is the natural English equivalent.
- source_word: ወሀበነ
  chosen: has given us
  alternatives:
  - gave us
  - granted us
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the verb 'to give'; perfect-like English 'has given us' fits the
    rhetorical question about whether any such gift of relief was ever granted.
- source_word: ዕረፍተ
  chosen: rest
  alternatives:
  - relief
  - repose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The noun denotes rest or respite. ''Rest'' preserves the stark apocalyptic
    contrast: the speakers have received no respite under judgment. ''Relief'' is
    possible and noted in a footnote.'
- source_word: ከመ
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks purpose/result. 'That we should...' gives idiomatic English while
    preserving the purposive sense.
- source_word: ንሰብሖ
  chosen: we should praise
  alternatives:
  - we may glorify
  - we might bless
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A verb of praising/glorifying. 'Praise' is direct and readable without
    importing later liturgical phrasing.
- source_word: ወናአኵቶ
  chosen: and thank
  alternatives:
  - and give thanks
  - and extol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries the sense of thanking or giving thanks. The shorter
    'and thank' keeps the triadic sequence compact in English.
- source_word: ወንእመን
  chosen: and confess
  alternatives:
  - and acknowledge
  - and believe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This form is difficult, but in context it most plausibly means confess/acknowledge
    rather than 'believe.' The sequence 'praise, thank, and confess/acknowledge' suits
    speech before divine glory. Because the Ge'ez-only Parables are textually delicate,
    the alternative is preserved in a footnote.
- source_word: ቅድመ
  chosen: before
  alternatives:
  - in the presence of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard preposition meaning 'before' or 'in front of'; 'before' preserves
    the solemn courtroom-like setting.
- source_word: ስብሐቲከ
  chosen: your glory
  alternatives:
  - your majesty
  - your splendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Derived from the semantic field of glory/splendor/praise. 'Your glory'
    best fits the divine-presence context and preserves apocalyptic radiance imagery.
