theological_decisions:
- issue: Rendering of the underworld term
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the underworld
  - hell
  rationale: The passage belongs to Jewish apocalyptic discourse and should retain
    its own underworld terminology. 'Sheol' preserves theological and cosmological
    texture without importing later Christian hell-language.
  doctrine_reference: Translate from the local passage first; do not over-harmonize
    with later Christian usage.
