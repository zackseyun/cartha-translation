translation:
  text: Now they will say, ‘Our soul has had its fill of unjust gain, but it does
    not keep us from going down from the midst of it into the burden of Sheol.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'of unjust gain' is textually and lexically difficult
      in the Ge'ez and may refer more broadly to wealth acquired by wrongdoing.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the weight/heaviness of Sheol.' The image is of oppressive descent
      into the realm of the dead, not merely burial.
    reason: lexical_alternative
  - marker: c
    text: '''Sheol'' is retained rather than ''hell'' to preserve the ancient Jewish
      apocalyptic sense of the underworld.'
    reason: cultural_note
lexical_decisions:
- source_word: ይእዜ
  chosen: Now
  alternatives:
  - At this time
  - Then
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal discourse marker introducing the speakers’ present realization;
    'Now' is concise and preserves the dramatic turn.
- source_word: ይብልዎሙ
  chosen: they will say
  alternatives:
  - they say
  - they shall say
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future/imperfect narrative speech formula fits the judgment scene; 'they
    will say' preserves the prophetic-apocalyptic outlook without archaic 'shall'.
- source_word: ትጸግብ ነፍስነ
  chosen: Our soul has had its fill
  alternatives:
  - our soul is satisfied
  - our soul is sated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys being filled or satiated. The idiom is best rendered
    as a completed state of overfull satisfaction, fitting the retrospective confession.
- source_word: እምጥየየ ዐመፃ
  chosen: of unjust gain
  alternatives:
  - from lawless wealth
  - from the deceit of unrighteousness
  - from possessions of injustice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to denote wealth or gain acquired through wrongdoing.
    'Unjust gain' preserves both the material and moral sense without over-specifying
    the exact mechanism.
- source_word: ወኢትከልእ
  chosen: but it does not keep us
  alternatives:
  - and it does not prevent us
  - yet it cannot restrain us
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative verb of hindering/preventing. 'Keep us' is idiomatic modern
    English while retaining the force of inability to avert judgment.
- source_word: ወረደተነ
  chosen: from going down
  alternatives:
  - our descent
  - from descending
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Derived from 'to descend/go down'; in context it refers to their downward
    movement toward the underworld. Rendering verbally keeps the line vivid.
- source_word: እምልባ
  chosen: from the midst of it
  alternatives:
  - from within
  - out of the middle
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase is difficult, but likely indicates movement
    out from within their present condition or possessions. A transparent rendering
    is preferable to interpretive paraphrase.
- source_word: ለክበደ ሲኦል
  chosen: into the burden of Sheol
  alternatives:
  - to the weight of Sheol
  - to the heaviness of Sheol
  - into grievous Sheol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun built on 'heavy/weight' is unusual here. 'Burden of Sheol' preserves
    the concrete oppressive imagery rather than flattening it into simply 'Sheol'
    or 'the grave'.
- source_word: ሲኦል
  chosen: Sheol
  alternatives:
  - the underworld
  - the grave
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A transliterated rendering best preserves the ancient Jewish underworld
    concept and avoids reducing it either to mere burial or to later doctrinal notions
    of hell.
