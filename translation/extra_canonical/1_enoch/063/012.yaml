translation:
  text: 'Thus said the Lord of Spirits: "This is the ordinance and the judgment for the mighty.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The transmitted verb ይቤ commonly means ''he said.'' In this line, however, the text appears compressed, and the sense is best represented in English as a declarative clause: ''this is the ordinance and the judgment.'''
    reason: textual_variant
  - marker: b
    text: The final phrase may also be understood as 'against the mighty,' depending on how the preposition is taken in context.
    reason: lexical_alternative
  - marker: c
    text: Or 'For this is the ordinance and the judgment of the Lord of Spirits'.
    reason: previous_rendering
lexical_decisions:
- source_word: ከመዝ
  chosen: for this
  alternatives:
  - thus
  - therefore
  - because of this
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Taken as a connective introducing the reason or explanation of the preceding lament: ''for this/for thus.'' ''For this'' preserves the explanatory force without overcommitting to a more idiomatic paraphrase.'
- source_word: ይቤ
  chosen: is
  alternatives:
  - he said
  - it is said
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the form commonly means 'he said,' in this compressed context it likely functions as a copular or formulaic linker in the transmitted text. Rendering it woodenly as 'he said' would produce awkward English and obscure the apparent sense of a judicial declaration. The uncertainty is noted in a footnote.
- source_word: እግዚአ መናፈስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed Enochic divine title and should be preserved consistently. 'Lord of Spirits' is the established transparent rendering and keeps the apocalyptic register.
- source_word: ዝውእቱ
  chosen: this is
  alternatives:
  - this
  - this one is
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative-plus-copular sense pointing to the judgment just described. In English it is absorbed into the clause as 'this is.'
- source_word: ሥርዓቱ
  chosen: the ordinance
  alternatives:
  - the order
  - the decree
  - the appointed rule
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can denote order, arrangement, ordinance, or prescribed rule. 'Ordinance' best fits the judicial-apocalyptic context and pairs naturally with 'judgment' without flattening the formal force.
- source_word: ወኵነኔሁ
  chosen: and the judgment
  alternatives:
  - and his judgment
  - and his sentence
  - and condemnation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The conjunction plus noun indicates a second juridical term. 'Judgment' is broad enough to preserve the legal sense; 'sentence' would be narrower, and 'condemnation' would overinterpret. The pronominal ending is not separately expressed in English because possession is naturally understood from the following divine title.
- source_word: ለዐዚዛን
  chosen: for the mighty
  alternatives:
  - against the mighty
  - for the strong ones
  - for the powerful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun refers to powerful ones, here the earthly rulers under judgment in context. 'The mighty' preserves the elevated tone. The preposition may imply relation or direction; 'for' is retained in the main text, with 'against' noted as a contextual alternative.
