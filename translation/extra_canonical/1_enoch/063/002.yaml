translation:
  text: And they will bless and praise the Lord of spirits, and they will say, “Blessed is the Lord of spirits, and the Lord of the kings, and the Lord of the mighty, and the Lord of the rich, and the Lord of glory, and the Lord of wisdom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez repeats 'Lord of ...' across each social class and abstract quality; the English keeps that repetition rather than compressing it.
    reason: cultural_note
  - marker: b
    text: The phrase rendered 'the rich' may also be understood more broadly as those who possess wealth or property.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Lord of the kings, the Lord of the mighty, the Lord of the rich, the Lord of glory, and the Lord of wisdom.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይባርክዎ
  chosen: they will bless
  alternatives:
  - they shall bless
  - they bless him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The imperfect/consecutive form in this visionary sequence is naturally rendered as future in English narrative: ''they will bless.'' The object suffix is retained implicitly by the following direct object phrase.'
- source_word: ይሴብሕዎ
  chosen: praise
  alternatives:
  - glorify
  - extol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard praise verb; 'praise' is the clearest modern English equivalent and preserves the parallelism with 'bless' without over-elevating the diction.
- source_word: እግዚአ መንፈሳት / እግዚአ መናፍስት
  chosen: Lord of spirits
  alternatives:
  - Lord of the spirits
  - Master of spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established title in 1 Enoch, and 'Lord' fits project policy for title-translation. The anarthrous English 'spirits' reads naturally while preserving the cosmic scope of the title.
- source_word: ቡሩክ ውእቱ
  chosen: Blessed is
  alternatives:
  - He is blessed
  - Blessed be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The predicative expression is best rendered as a declaration, 'Blessed is,' rather than a wish-prayer ('Blessed be'). This fits the scene of acclamation.
- source_word: እግዚኦሙ ለነገሥት
  chosen: the Lord of the kings
  alternatives:
  - their lord, of the kings
  - lord over the kings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix plus lamed phrase marks lordship with respect to this class. 'Lord of the kings' preserves the repeated formula and the rhetorical cadence of the verse.
- source_word: ዐዚዛን
  chosen: the mighty
  alternatives:
  - the strong
  - the powerful ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this judgment context the term denotes powerful persons. 'The mighty' is concise, elevated, and keeps the social-political force.
- source_word: ብዑላን
  chosen: the rich
  alternatives:
  - the wealthy
  - the possessors
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context, the term points to those of wealth or possession among the condemned elite. 'The rich' is the most transparent English rendering.
- source_word: እግዚአ ስብሐት
  chosen: the Lord of glory
  alternatives:
  - the Lord of splendor
  - the Lord of praise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the noun can overlap with praise/splendor, 'glory' best preserves the weighty apocalyptic register and the abstract genitival title pattern.
- source_word: እግዚአ ጥበብ
  chosen: the Lord of wisdom
  alternatives:
  - the Lord of understanding
  - the Lord of insight
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes wisdom in a broad sense. 'Wisdom' keeps the title compact and resonant without narrowing it to mere intellect.
