theological_decisions:
- issue: Rendering the recurring divine title እግዚአ መንፈሳት in the Parables
  chosen_reading: Lord of spirits
  alternative_readings:
  - Lord of the spirits
  - Master of spirits
  rationale: The title is a fixed Enochic divine designation and should remain stable across the corpus. 'Lord' aligns with project policy for titles and avoids flattening the apocalyptic distinctiveness of the phrase.
  doctrine_reference: Translation philosophy §2, §4
- issue: Whether ቡሩክ ውእቱ should be rendered as benediction or declaration
  chosen_reading: Blessed is
  alternative_readings:
  - Blessed be
  - He is blessed
  rationale: The scene presents spoken acclamation by the judged rulers; a declarative blessing better matches the syntax and avoids turning the line into a liturgical wish.
  doctrine_reference: Translation philosophy §3
