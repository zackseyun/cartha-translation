theological_decisions:
- issue: Whether to smooth the anthropomorphic expression for divine presence
  chosen_reading: from before his face
  alternative_readings:
  - from his presence
  - from before him
  rationale: The project philosophy favors preserving source imagery where understandable. In apocalyptic judgment speech, the concrete expression intensifies the terror of exclusion before the divine judge.
  doctrine_reference: 'Translation philosophy: preserve original-language primacy and avoid flattening apocalyptic imagery.'
- issue: How to render the judicial phrase involving sins and righteousness
  chosen_reading: all our sins are reckoned up in righteousness
  alternative_readings:
  - all our sins are counted in righteousness
  - all our sins are judged justly
  rationale: The Ge'ez wording appears judicial but not fully explicit. The chosen rendering preserves both the accounting metaphor and the standard of righteousness without collapsing the line into a paraphrase about punishment.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; prefer transparent English plus documentation where the sense is uncertain.'
