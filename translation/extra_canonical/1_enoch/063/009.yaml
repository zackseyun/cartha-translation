translation:
  text: And we pass from before his face because of our deeds, and all our sins are reckoned up in righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his presence.' The Ge'ez reads literally 'from before his face,' a vivid expression for standing before the divine judge.
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be understood as 'all our sins are counted justly' or 'are taken into account in righteousness.' The Ge'ez is judicial in tone but not fully explicit about the exact nuance.
    reason: alternative_reading
  - marker: c
    text: Or 'we pass away from before his face'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወነኀልፍ
  chosen: and we pass away
  alternatives:
  - and we vanish
  - and we perish
  - and we pass on
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys passing away or disappearing. In this judgment context, 'pass away' preserves the solemn, apocalyptic force without over-specifying physical death.
- source_word: እምገጹ
  chosen: from before his face
  alternatives:
  - from his presence
  - from before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'from his face.' Retaining 'before his face' preserves the concrete Semitic-style presence language common in visionary and judgment scenes; 'his presence' is smoother but less vivid.
- source_word: በእንተ ምግባሪነ
  chosen: because of our deeds
  alternatives:
  - on account of our works
  - because of our conduct
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks cause. 'Deeds' is a natural rendering of the noun for actions/works and fits the confessional tone of the speakers.
- source_word: ወኵሉ ኃጢአትነ
  chosen: and all our sins
  alternatives:
  - and every one of our sins
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering preserving the totalizing force of 'all.'
- source_word: በጽድቅ
  chosen: in righteousness
  alternatives:
  - with righteousness
  - justly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is the standard term for righteousness. 'In righteousness' keeps the formal texture and leaves open whether the sense is manner ('righteously') or standard ('according to righteousness').
- source_word: ትኈለቍ
  chosen: are reckoned up
  alternatives:
  - are counted
  - are weighed
  - are examined
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to express counting, reckoning, or taking account. 'Are reckoned up' fits the judicial setting and avoids narrowing the image to either mere arithmetic or metaphorical weighing alone.
