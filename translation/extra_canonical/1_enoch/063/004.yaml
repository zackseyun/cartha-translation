theological_decisions:
- issue: Whether to render the royal title in a way that echoes later Christian formulas
  chosen_reading: the Lord of the kings and the one who reigns over all the kings
  alternative_readings:
  - the King of kings
  - their Lord
  rationale: The Ge'ez text explicitly speaks of 'Lord of the kings' and then adds
    a relative clause about reigning over all kings. Rendering it as the familiar
    compressed title 'King of kings' would import traditional phrasing not directly
    present in this witness and would reduce the verse's deliberate two-part royal
    acclamation.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Force of the first person plural verbal forms
  chosen_reading: we ought to praise and bless
  alternative_readings:
  - let us praise and bless
  - we will praise and bless
  rationale: In this judgment context the speakers are confessing what they now recognize
    as fitting toward the Most High ruler. 'We ought to' preserves moral obligation
    without overstating liturgical exhortation or simple futurity.
  doctrine_reference: Translation philosophy §§3, 5
