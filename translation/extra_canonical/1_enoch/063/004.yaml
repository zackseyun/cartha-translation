translation:
  text: Now we know that we ought to praise and bless the Lord of the kings and the
    one who reigns over all the kings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let us praise and bless.' The Ge'ez verbal forms can carry a hortatory
      or subjunctive sense.
    reason: lexical_alternative
  - marker: b
    text: The title is rendered directly from the Ge'ez as 'Lord of the kings' rather
      than compressed into the traditional phrase 'King of kings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይእዜ
  chosen: Now
  alternatives:
  - At this time
  - So now
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal adverb marking a present realization in the speakers' confession;
    'Now' is concise and preserves the rhetorical turn.
- source_word: አእመርነ
  chosen: we know
  alternatives:
  - we have understood
  - we have recognized
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: First person plural perfect-like form expressing realized understanding.
    'We know' reads naturally in English while preserving the sense of newly recognized
    truth.
- source_word: ከመ
  chosen: that
  alternatives:
  - how
  - that indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the content of what has been recognized; simple declarative
    'that' best fits the syntax.
- source_word: ንሰብሖ ወንባርኮ
  chosen: we ought to praise and bless
  alternatives:
  - let us praise and bless
  - we should praise and bless
  - we will praise and bless
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prefixed first person plural forms after ከመ can be read as volitive/subjunctive
    in sense. In context of repentant recognition, 'we ought to' captures obligation
    rather than mere future action.
- source_word: ለእግዚኦሙ ለነገሥት
  chosen: the Lord of the kings
  alternatives:
  - their Lord, the Lord of the kings
  - the master of the kings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Construct-like sequence with እግዚኦሙ linked to kings is best rendered as
    a title of sovereignty. 'Lord' preserves elevated register and avoids flattening
    the royal-theological claim.
- source_word: ወለዘ ይነግሥ ዲበ ኵሎሙ ነገሥት
  chosen: and the one who reigns over all the kings
  alternatives:
  - and him who rules over all the kings
  - and the one reigning above all the kings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative construction with present verb emphasizes ongoing universal
    kingship. 'Reigns over' is idiomatic and preserves the hierarchical imagery of
    dominion over earthly rulers.
