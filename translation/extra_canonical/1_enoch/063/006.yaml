theological_decisions:
- issue: Nature of the lost 'light' and ensuing 'darkness'
  chosen_reading: Retained as apocalyptic-cosmic imagery of judgment rather than reduced
    to inward emotion alone.
  alternative_readings:
  - purely metaphorical despair
  - literal physical darkness only
  rationale: The verse belongs to a judgment lament in the Parables. The imagery likely
    carries both moral and eschatological force; preserving the image without narrowing
    it best fits project philosophy.
  doctrine_reference: Preserve theological tension rather than resolve it.
