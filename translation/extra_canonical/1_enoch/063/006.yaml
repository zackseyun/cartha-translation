translation:
  text: Now we seek rest for ourselves, but we do not find it; we are driven away,
    and we cannot seize it, and the light has passed away from before us, and darkness
    will be our dwelling forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'we cannot seize it' is terse and may mean 'we cannot
      grasp/lay hold of it,' probably continuing the thought of unattainable rest
      or security.
    reason: lexical_alternative
  - marker: b
    text: The word rendered 'dwelling' is difficult in this Ge'ez line; 'habitation'
      is another possible rendering. The sense is that darkness becomes their enduring
      lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይእዜኒ
  chosen: Now
  alternatives:
  - And now
  - At this time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal discourse marker introducing the speakers' present realization
    in contrast to prior confidence.
- source_word: ንስቲተ
  chosen: we seek
  alternatives:
  - we desire
  - we ask for
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best fits the following object 'rest' and the clause of failed attainment;
    it conveys active pursuit rather than mere wish.
- source_word: ዕረፍተ
  chosen: rest
  alternatives:
  - repose
  - relief
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the judgment-scene contrast between hoped-for relief and actual
    exclusion. 'Rest' is simple and weighty without over-paraphrase.
- source_word: ንትሜነይ
  chosen: for ourselves
  alternatives:
  - for our souls
  - for us
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reflexive/dative sense points to the speakers' own hoped-for benefit.
    'For ourselves' preserves the self-regarding force.
- source_word: ወኢንረክብ
  chosen: but we do not find it
  alternatives:
  - and we do not obtain it
  - and we do not attain it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common verb of finding/obtaining; 'find it' works naturally with 'rest'
    while preserving the failed search motif.
- source_word: ንሰደድ
  chosen: we are driven away
  alternatives:
  - we are chased away
  - we are banished
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Passive sense suits the judgment context: the speakers are not merely
    wandering but being expelled.'
- source_word: ወኢንእኅዝ
  chosen: we cannot seize it
  alternatives:
  - we cannot grasp it
  - we cannot lay hold of it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means seize/grasp/hold. 'Seize it' keeps the vividness
    of attempted possession, likely still referring to the sought rest or security.
- source_word: ወብርሃን
  chosen: and the light
  alternatives:
  - and light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Definite rendering suits the cosmic moral imagery of the passage: not
    generic illumination but the light once available to them.'
- source_word: እምቅድሜነ
  chosen: from before us
  alternatives:
  - from our presence
  - from before our face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal apocalyptic idiom preserving spatial imagery rather than reducing
    it to 'from us'.
- source_word: ኀለፈ
  chosen: has passed away
  alternatives:
  - has departed
  - has gone by
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys irreversible loss of light in a solemn register.
- source_word: ወጽልመት
  chosen: and darkness
  alternatives:
  - and the darkness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Pairs antithetically with 'the light' and preserves the stark apocalyptic
    contrast.
- source_word: ምኅባሪነ
  chosen: will be our dwelling
  alternatives:
  - will be our habitation
  - will cover us
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is difficult, but in context it most plausibly denotes an abiding
    place or enclosing lot. 'Will be our dwelling' preserves the punitive permanence
    of darkness without over-specifying.
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for the age of ages
  - for ever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard idiom for unending duration; elevated but readable English fits
    the apocalyptic register.
