theological_decisions:
- issue: Whether 'Son of Man' should be rendered as a title or generic human expression
  chosen_reading: Rendered as 'that Son of Man'
  alternative_readings:
  - that son of man
  - that human one
  rationale: Within the Parables, the phrase refers to a distinct eschatological figure
    already established in context. Retaining the title-like form preserves the book's
    own theological presentation without harmonizing it to later Christian usage.
  doctrine_reference: Preserve theological tension rather than resolve it; keep major
    terms locally grounded in the passage.
