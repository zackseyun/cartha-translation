translation:
  text: And after this, their faces will be filled with darkness and shame before
    that Son of Man, and they will be driven away from before his face, and a sword
    will abide before his face in their midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is syntactically difficult in Ge'ez. 'A sword will abide
      before his face in their midst' preserves the imagery closely; it may imply
      a standing instrument of judgment present among them before him.
    reason: textual_variant
  - marker: b
    text: '''Son of Man'' is retained here as the established designation of the apocalyptic
      figure in the Parables, not back-formed from later New Testament usage.'
    reason: cross_reference
  - marker: c
    text: Or 'before his face in their midst'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይመልእ
  chosen: will be filled
  alternatives:
  - will fill
  - shall be full of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/resultative sense fits the construction with 'their faces' as
    subject and 'darkness and shame' as what fills them.
- source_word: ገጾሙ
  chosen: their faces
  alternatives:
  - their countenances
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Concrete 'faces' preserves the vivid apocalyptic image; 'countenances'
    is possible but less natural in modern English.
- source_word: ጽልመተ
  chosen: darkness
  alternatives:
  - gloom
  - blackness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the stark judgment imagery without overinterpreting whether the
    darkness is literal, emotional, or symbolic.
- source_word: ኃፍረተ
  chosen: shame
  alternatives:
  - disgrace
  - humiliation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Shame is the most direct rendering and pairs naturally with darkness
    in a judgment scene.
- source_word: በቅድመ
  chosen: before
  alternatives:
  - in the presence of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated preposition is important to the rhetoric of exposure before
    the judge; 'before' keeps the repetition visible.
- source_word: ዝኩ ወልደ እጓለ እመሕያው
  chosen: that Son of Man
  alternatives:
  - that son of man
  - that son of humankind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Parables this expression functions as a recognized apocalyptic
    title. 'Son of Man' preserves the local Enochic usage without importing later
    doctrinal expansions.
- source_word: ይሰደዱ
  chosen: they will be driven away
  alternatives:
  - they will be expelled
  - they will be chased away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive/judicial sense suits the context of condemnation before the
    Son of Man.
- source_word: ሰይፍ
  chosen: a sword
  alternatives:
  - the sword
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The anarthrous form is best represented as indefinite in English unless
    context clearly specifies a known sword.
- source_word: የኃድር
  chosen: will abide
  alternatives:
  - will remain
  - will dwell
  - will rest
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests continuing presence rather than a momentary strike;
    'abide' preserves the ominous, sustained judicial image.
- source_word: ማእከሎሙ
  chosen: in their midst
  alternatives:
  - among them
  - between them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the spatial vividness of the image while allowing the syntax to
    remain somewhat open, since the exact relation of the sword to the condemned group
    is difficult.
