translation:
  text: For before him we did not believe[a], and we did not praise the name of the Lord of Spirits[a][b], [and we did not praise our Lord,] and our hope was in the scepter of our kingdom and in our glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: 'a'
    text: The bracketed clause 'and we praised our Lord' is uncertain in the supplied witness and may reflect a variant or secondary expansion.
    reason: textual_variant
  - marker: 'b'
    text: '''Scepter'' renders a word that can also mean ''staff'' or ''rod''; here the royal sense fits the surrounding confession of misplaced confidence.'
    reason: lexical_alternative
  - marker: a
    text: Or 'we believed, and we gave praise to the name of the Lord of Spirits, [and we praised our Lord,]'.
    reason: previous_rendering
lexical_decisions:
- source_word: እስመ
  chosen: For
  alternatives:
  - because
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the reason for the speakers' lament/confession in context; 'For' preserves the explanatory force without over-specifying causal nuance.
- source_word: በቅድሜሁ
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A spatial-relational phrase. 'Before him' is concise and preserves the courtroom/judgment setting typical of the Parables.
- source_word: አአመነ
  chosen: we believed
  alternatives:
  - we trusted
  - we had faith
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes believing/trusting. 'We believed' keeps the direct verbal force and preserves the irony of the kings' claim in context.
- source_word: አሰባሕነ ለስሙ
  chosen: we gave praise to the name
  alternatives:
  - we blessed the name
  - we glorified the name
  - we praised his name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The object is explicitly 'the name.' 'Gave praise to the name' preserves the Semitic reverential idiom without flattening it to a generic 'worshiped.'
- source_word: እግዚአ መናፈስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard title in 1 Enoch. 'Lord of Spirits' preserves the established apocalyptic title and avoids unnecessary expansion.
- source_word: ወአሰባሕናሁ ለእግዚእነ
  chosen: and we praised our Lord
  alternatives:
  - and we blessed our Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause is bracketed in the witness and likely secondary or variant, but if represented it naturally means 'and we praised our Lord.' Included in brackets in the main text to reflect witness uncertainty.
- source_word: ወተስፋነ ኮነ ዲበ
  chosen: and our hope was in
  alternatives:
  - and our hope came to rest on
  - and we placed our hope on
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction expresses the location/object of hope. 'Was in' is idiomatic English and preserves the stative sense.
- source_word: በትረ መንግሥትነ
  chosen: the scepter of our kingdom
  alternatives:
  - the staff of our kingdom
  - the rod of our rule
  - the scepter of our dominion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: በትር is literally rod/staff/scepter; with 'our kingdom' the royal symbol is in view. 'Scepter' best preserves the political and regal imagery.
- source_word: ስብሐቲነ
  chosen: our glory
  alternatives:
  - our splendor
  - our honor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote glory, splendor, or honor. 'Glory' best matches the self-exalting royal confidence being confessed and judged in context.
