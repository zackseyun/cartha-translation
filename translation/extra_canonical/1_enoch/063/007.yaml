theological_decisions:
- issue: Whether the speakers' statement 'we believed' should be rendered in a way
    that implies genuine faith
  chosen_reading: we believed
  alternative_readings:
  - we trusted
  - we put our confidence
  rationale: The verb itself is straightforward; the context of condemned rulers supplies
    the irony. The translation preserves their claim without resolving whether it
    was sincere, misplaced, or self-deceived.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: How to render the object of hope in a judgment context
  chosen_reading: our hope was in the scepter of our kingdom and in our glory
  alternative_readings:
  - our hope was in the staff of our dominion and in our splendor
  rationale: The verse contrasts trust in royal power and status with the divine judgment
    scene. Retaining the concrete royal image ('scepter') preserves the apocalyptic
    critique of earthly rule rather than abstracting it into 'power.'
  doctrine_reference: Original-language primacy over translation tradition; preserve
    apocalyptic imagery.
