translation:
  text: For before him we believed, and we gave praise to the name of the Lord of
    Spirits, [and we praised our Lord,] and our hope was in the scepter of our kingdom
    and in our glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[a]'
    text: The bracketed clause 'and we praised our Lord' is uncertain in the supplied
      witness and may reflect a variant or secondary expansion.
