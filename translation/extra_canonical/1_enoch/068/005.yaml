lexical_decisions:
- source_word: በእንተ'ዝ
  chosen: Because of this
  alternatives:
  - For this reason
  - On account of this
  - Therefore
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Causal-prepositional phrase introducing the consequence of the preceding context. 'Because of this' preserves the explicit causal force without over-smoothing into a mere connective.
- source_word: ይመጽእ
  chosen: shall come
  alternatives:
  - will come
  - comes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future-like verbal force fits the judgment context. 'Shall come' keeps the elevated apocalyptic register and the sense of impending consequence.
- source_word: ላዕሌሆሙ
  chosen: upon them
  alternatives:
  - over them
  - against them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional form naturally indicates movement or imposition onto the subjects. 'Upon them' suits a judgment formula better than the more interpretive 'against them.'
- source_word: ኵሉ
  chosen: everything
  alternatives:
  - all things
  - the whole
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Indefinite totality is best conveyed by 'everything' in natural English while preserving the comprehensive scope.
- source_word: ዘኅቡእ
  chosen: hidden
  alternatives:
  - concealed
  - secret
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative form points to that which is concealed. 'Hidden' is direct and preserves the apocalyptic motif of what has been kept out of sight now being disclosed or brought to bear.
- source_word: ለዓለመ
  chosen: forever
  alternatives:
  - for eternity
  - for the age
  - from of old
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote eternity or an age. In this compressed clause, 'forever' best captures the sense of enduring hiddenness, though the exact nuance may also be 'for the age' or 'from ancient time.'
