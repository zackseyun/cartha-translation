translation:
  text: Because of this, everything hidden shall come upon them forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that has been concealed for the age' or 'everything hidden from of old.' The final term can carry the sense of eternity, an age, or ancient duration.
