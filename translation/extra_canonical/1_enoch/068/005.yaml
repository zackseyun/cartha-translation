theological_decisions:
- issue: Whether the hidden thing is being revealed or whether concealed judgment is coming upon the wicked
  chosen_reading: 'The clause is rendered as concealed realities or judgments now coming upon them: ''everything hidden forever shall come upon them.'''
  alternative_readings:
  - '''all that was hidden for eternity will be revealed against them'''
  - '''everything hidden from of old will come upon them'''
  rationale: The Ge'ez explicitly says 'shall come upon them,' not simply 'shall be revealed.' The translation therefore preserves the ominous, judicial force of the verb and preposition, while leaving the object broad enough to include hidden deeds, secrets, or reserved judgments from the context.
  doctrine_reference: Preserve theological tension rather than resolve it; do not flatten apocalyptic judgment formulas.
