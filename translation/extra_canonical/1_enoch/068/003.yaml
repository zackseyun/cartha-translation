translation:
  text: And Mikael answered again and said to Rufael, "Who is he whose heart is not softened concerning it, and whose kidneys are not troubled by this word of severity and the sentence that has gone out against them because of those who brought them out thus?"
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose inward parts are not troubled.' The Ge'ez literally says 'kidneys,' a traditional bodily image for the inner self.
    reason: lexical_alternative
  - marker: b
    text: The closing clause is textually difficult in the Ethiopic witness, especially around the bracketed word. The translation keeps the wording cautious rather than adopting a more confident reconstruction.
    reason: textual_variant
  - marker: c
    text: Or 'And he answered again and said to Rufael,'.
    reason: previous_rendering
  - marker: d
    text: Or 'from before them?'.
    reason: previous_rendering
lexical_decisions:
- source_word: አውሥአ ካዕበ
  chosen: answered again
  alternatives:
  - answered a second time
  - responded again
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ካዕበ commonly marks repetition ('again, a second time'). 'Answered again' preserves the narrative formula without sounding wooden.
- source_word: ሚካኤል ለሩፋኤል
  chosen: to Rufael
  alternatives:
  - to Raphael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Project policy transliterates personal names rather than translating titles. The Ethiopic form here is closer to Rufael, so it is retained rather than normalized to the more familiar Raphael.
- source_word: ዘኢይረክሕ ልቡ
  chosen: whose heart is not softened
  alternatives:
  - whose heart is not moved
  - whose heart is not merciful
  - whose heart does not grow gentle
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests becoming soft, tender, or moved. 'Softened' preserves the concrete anthropological image of the heart rather than reducing it to a generic emotional reaction.
- source_word: ዲቤሃ
  chosen: concerning it
  alternatives:
  - because of it
  - over her/it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronominal reference is difficult in context. 'Concerning it' is intentionally restrained and leaves the antecedent somewhat open, matching the Ge'ez ambiguity.
- source_word: ኢይትሀወክ ኵልያቲሁ
  chosen: whose kidneys are not troubled
  alternatives:
  - whose inward parts are not shaken
  - whose reins are not disturbed
  - whose innermost being is not agitated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኵልያት literally means 'kidneys' and in Semitic anthropology refers to the inner seat of emotion or conscience. Retaining 'kidneys' preserves the ancient bodily imagery; 'troubled' renders the disturbance implied by the verb.
- source_word: ቃለ ጽነኒ
  chosen: word of severity
  alternatives:
  - harsh word
  - stern decree
  - word of affliction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to denote a severe or hard pronouncement. 'Word of severity' keeps the formal, judicial-apocalyptic tone and avoids over-paraphrasing.
- source_word: ፅእት ዲቤሆሙ
  chosen: the sentence that has gone out against them
  alternatives:
  - the judgment issued against them
  - the decree that has come forth upon them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun and verb together suggest an issued pronouncement or outgoing sentence. 'Sentence' fits the judicial context of the surrounding chapter.
- source_word: '[እምኔሆሙ] ዘአውፅእዎሙ ከመ''ዝ'
  chosen: from before them
  alternatives:
  - from among them
  - against those who brought them out thus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause is textually difficult, and the bracketed word signals uncertainty in the OCR/witness. 'From before them' is a cautious rendering of the extant wording without forcing a speculative reconstruction.
