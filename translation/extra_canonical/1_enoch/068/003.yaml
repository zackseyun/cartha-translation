- issue: Anthropological imagery of heart and kidneys
  chosen_reading: Retain bodily terms rather than replacing them with abstract psychology
  alternative_readings:
  - whose mind is unmoved and whose spirit is untroubled
  - whose heart and inner being are not shaken
  rationale: The verse uses ancient embodied language for moral and emotional response. Preserving that imagery fits the project's commitment not to flatten apocalyptic or Semitic diction into generic modern prose.
