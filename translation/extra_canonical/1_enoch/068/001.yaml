translation:
  text: And after this my grandfather Hēnok gave me the sign of all the hidden things in a book, and the parables that had been given to him; and they shall recount them to me in the account of the book of the Parable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The line is textually difficult in the Ge'ez witness, especially in the clauses 'from the words of Hēnok' and 'they shall recount them to me.' The translation stays close to the surviving wording rather than smoothing the syntax.
    reason: textual_variant
  - marker: b
    text: The term rendered 'parables' may also be translated 'similitudes.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he gave me the sign of all the hidden things in the book from the words of Hēnok'.
    reason: previous_rendering
lexical_decisions:
- source_word: ትእምርተ
  chosen: the sign
  alternatives:
  - the mark
  - the token
  - the indication
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote a sign, mark, or token. 'Sign' best preserves the apocalyptic register and allows for revelatory significance without over-specifying a physical mark.
- source_word: ኵሎሙ ኅቡኣት
  chosen: all the hidden things
  alternatives:
  - all the secrets
  - all the concealed things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to concealed matters disclosed in revelation. 'Hidden things' is transparent and avoids importing a more technical sense like 'mysteries' where the Ge'ez here does not require it.
- source_word: በመጽሐፍ
  chosen: in the book
  alternatives:
  - by the book
  - through the book
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition most naturally locates the hidden things within the written book rather than making the book merely instrumental.
- source_word: እምሔውየ ሄኖክ
  chosen: from the words of Hēnok
  alternatives:
  - from the utterance of Hēnok
  - from the mouth of Hēnok
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is difficult in this witness, but the sense appears to derive the book's contents from Enoch's own words or speech. 'Words' is the least interpretive rendering.
- source_word: ምሳሌያተ
  chosen: the parables
  alternatives:
  - the similitudes
  - the figures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Because this section is traditionally known as the Parables/Similitudes, 'parables' is a natural English rendering of the Ge'ez term while remaining intelligible to modern readers. 'Similitudes' is possible but less accessible.
- source_word: ተውህበ ሎቱ
  chosen: had been given to him
  alternatives:
  - were given to him
  - had been granted to him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive verbal form indicates reception by Enoch. The pluperfect-like English 'had been given' fits the narrative retrospectively.
- source_word: ይመርሙ ሊተ
  chosen: they shall recount them to me
  alternatives:
  - they will explain to me
  - they will interpret for me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is textually and semantically difficult. 'Recount' preserves the idea of setting forth the contents without overcommitting to technical interpretation. The plural subject is retained as in the witness.
- source_word: ነገረ መጽሐፍ ዘምሳሌ
  chosen: the account of the book of the Parable
  alternatives:
  - the matter of the book of the Parables
  - the narrative of the book of the Parable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገር can mean matter, word, or account. 'Account' fits a literary context. The singular 'Parable' follows the immediate form in the witness, though the broader section title is often plural.
