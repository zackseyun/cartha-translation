theological_decisions:
- issue: Referent of the singular pronoun in Michael's statement
  chosen_reading: Render the singular as 'He will not be for them' without identifying the referent in the main text.
  alternative_readings:
  - '''I will not be for them'' if the text is corrupt or differently vocalized/interpreted'
  - '''He will not intercede for them'' as an interpretive expansion'
  rationale: The Ge'ez as given supports a third-person singular, but the antecedent is not explicit in this verse alone. To preserve ambiguity rather than resolve it, the main text keeps the singular pronoun and avoids specifying an intercessor by name.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the accusation against the condemned figures
  chosen_reading: Translate as a claim that they act as if they were the Lord.
  alternative_readings:
  - They act like lords
  - They act in the presence of the Lord
  - They do things contrary to the Lord
  rationale: The immediate context is judgment on rebellious heavenly beings and illicit power. The chosen rendering best preserves the gravity of usurping divine prerogative, while remaining transparent about the idiomatic difficulty.
