translation:
  text: 'And it came to pass, when he stood before the Lord of Spirits, that Michael said this to Raphael: “He will not take their part before the eye of the Lord, for the Lord of Spirits is angry with them, because they act as if they were the Lord.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'He will not be for them before the eye of the Lord' is difficult. It likely means that no support or advocacy will stand for them in God's presence.
    reason: lexical_alternative
  - marker: b
    text: Or, 'because they act like lords.' The Ge'ez wording is terse and may accuse them of assuming divine or ruling authority that is not theirs.
    reason: lexical_alternative
  - marker: c
    text: Or 'He will not be for them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወኮነ፡ ሶበ፡
  chosen: And it came to pass, when
  alternatives:
  - And when
  - Now when it happened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the narrative transition and temporal setup without over-archaizing; the formulaic apocalyptic narration is retained.
- source_word: ቆመ፡
  chosen: he stood
  alternatives:
  - he arose
  - he took his stand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is standing; 'stood' is the most direct rendering in this visionary courtroom setting.
- source_word: በቅድመ፡ እግዚአ፡ መናፍስት፡
  chosen: before the Lord of Spirits
  alternatives:
  - in the presence of the Lord of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a standard Enochic divine title. 'Before' preserves the spatial/judicial force of the scene.
- source_word: ወከመ'ዝ፡ ይቤሎ፡
  chosen: that ... said this to
  alternatives:
  - and thus ... said to
  - and he said this to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Captures the quotative transition naturally in English while preserving the demonstrative force of 'thus/this'.
- source_word: ወኢይከውን፡ ሎሙ፡ በውስተ፡ ዓይነ፡ እግዚአ፡
  chosen: He will not be for them before the eye of the Lord
  alternatives:
  - He will not be on their side in the sight of the Lord
  - He will not stand for them before the Lord's eye
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is difficult. I preserve the somewhat literal wording 'be for them' to reflect an advocacy/support sense without over-interpreting. 'Before the eye of the Lord' keeps the vivid idiom rather than flattening it to merely 'in the Lord's sight'.
- source_word: ተምዕዖሙ፡
  chosen: is angry with them
  alternatives:
  - has been enraged against them
  - is wrathful toward them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys divine anger clearly in readable English while retaining the judicial tone.
- source_word: እምሳለ፡ እግዚአ፡ ይገብሩ።
  chosen: they act as if they were the Lord
  alternatives:
  - they behave like the Lord
  - they do as though they were lords
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to accuse them of acting in God's place or in a God-like manner. 'As if they were the Lord' preserves the theological offense without softening it.
