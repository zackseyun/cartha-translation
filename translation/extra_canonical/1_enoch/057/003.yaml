translation:
  text: And all of them shall fall down and worship the Lord of Spirits. And this
    is the end of the second parable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the end of another parable' / 'the end of the other parable,' if ካልእ
      is taken non-sequentially rather than as 'second.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይወድቁ
  chosen: shall fall down
  alternatives:
  - shall fall
  - shall prostrate themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes falling down in a context of reverence. 'Fall down'
    preserves the physical, apocalyptic gesture without over-specifying ritual prostration.
- source_word: ኵሎሙ
  chosen: all of them
  alternatives:
  - all
  - they all
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronominal suffix is explicit; 'all of them' keeps the totalizing
    force and the referential continuity from the preceding context.
- source_word: ይሰግዱ
  chosen: worship
  alternatives:
  - bow down
  - do obeisance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In combination with 'fall down' before the Lord of Spirits, the verb
    carries cultic/reverential force. 'Worship' communicates that force in clear English,
    while the bodily action is already preserved by the preceding verb.
- source_word: ለእግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed Enochic divine title. 'Lord of Spirits' preserves the
    established title-form and avoids unnecessarily particularizing the genitive.
- source_word: ዝንቱ ውእቱ
  chosen: this is
  alternatives:
  - this—it is
  - this indeed is
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward identificational formula; concise English best reflects
    the Ge'ez without stiffness.
- source_word: ተፍጻሜተ
  chosen: the end
  alternatives:
  - the completion
  - the conclusion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun marks the finishing or conclusion of a section. 'The end' is
    idiomatic and suits the literary seam closing a parable.
- source_word: ካልእ ምሳሌ
  chosen: the second parable
  alternatives:
  - another parable
  - the other parable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although ካልእ can mean 'other/another,' in this structural context it
    most naturally marks sequence, i.e., the second of the parables. This fits the
    book's internal division better than the vaguer 'another parable.'
