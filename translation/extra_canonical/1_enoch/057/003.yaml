theological_decisions:
- issue: Rendering the divine title ለእግዚአ መናፍስት
  chosen_reading: the Lord of Spirits
  alternative_readings:
  - the Lord of the spirits
  rationale: The title is characteristic of 1 Enoch and should be preserved as a title
    rather than diluted into a generic phrase. This maintains the text's own theological
    diction without harmonizing it to later formulas.
  doctrine_reference: Translate titles; preserve local passage wording rather than
    later doctrinal expectations.
- issue: Meaning of ካልእ in the closing colophon-like formula
  chosen_reading: the second parable
  alternative_readings:
  - another parable
  - the other parable
  rationale: Because the verse functions as a section ending within the Book of Parables,
    a sequential sense is preferable. The choice is interpretive, so the alternative
    is preserved in a footnote.
  doctrine_reference: Preserve theological and textual tension rather than resolve
    it silently; document contested readings.
