translation:
  text: And after that I saw another host of chariots, and men riding in them; and they were coming upon the winds from the east and from the west, as far as the south.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they came on the winds.' The Ge'ez wording preserves the visionary image without specifying whether the winds are the means of motion or the surface upon which they move.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'until the middle of the day.' The expression is difficult in context and may denote the noonday region or extent rather than a time reference alone.
    reason: alternative_reading
  - marker: c
    text: Or 'as far as the middle of the day'.
    reason: previous_rendering
  - marker: d
    text: 'Or ''vision: chariots''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ወኮነ እምድኅረዝ
  chosen: And after that
  alternatives:
  - And it happened after this
  - And afterward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common narrative transition. 'And after that' preserves the sequential apocalyptic reporting without sounding overly wooden.
- source_word: ወርኢኩ ካልእተ ትዕይንተ
  chosen: I saw another vision
  alternatives:
  - I saw another sight
  - I saw another spectacle
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ትዕይንተ denotes something seen, especially a visionary sight. 'Vision' best fits the apocalyptic context and preserves genre.
- source_word: ሠረገላት
  chosen: chariots
  alternatives:
  - wagons
  - war-chariots
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary and apocalyptically charged image is 'chariots.' 'War-chariots' would over-specify, while 'wagons' weakens the imagery.
- source_word: ወእገዚ ይጼዐኑ ሰብእ ውስቴቶሙ
  chosen: and men riding in them
  alternatives:
  - and men were seated in them
  - and men mounted in them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates human figures within the chariots in a riding/seated posture. 'Riding in them' is idiomatic English and keeps the motion implied by the scene.
- source_word: ይመጽኡ ዲበ ነፋሳት
  chosen: they were coming upon the winds
  alternatives:
  - they came on the winds
  - they were borne on the winds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition plus 'winds' suggests movement borne or conveyed by winds. 'Upon the winds' preserves the vivid apocalyptic image more literally than a flattened paraphrase.
- source_word: እምስራቅ ወእምዕራብ
  chosen: from the east and from the west
  alternatives:
  - out of the east and out of the west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward directional pair. Repeating 'from' reflects the Ge'ez structure and keeps the balanced imagery.
- source_word: እስከ መንፈቀ ዕለት
  chosen: as far as the middle of the day
  alternatives:
  - until midday
  - to the noonday point
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'until the middle of the day.' The phrase is somewhat unusual in context; a relatively literal rendering is preferable so as not to hide the difficulty.
