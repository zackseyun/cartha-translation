theological_decisions:
- issue: Nature of the visionary transport imagery
  chosen_reading: Retain the concrete image of chariots and men coming 'upon the winds' rather than interpreting it as a mere metaphor for armies or clouds.
  alternative_readings:
  - Render more dynamically as 'swiftly driven by the winds'
  - Interpret as symbolic hosts without mentioning literal chariots
  rationale: The Parables regularly employ visionary-cosmic imagery. The translation should preserve the image rather than resolve its symbolism for the reader.
  doctrine_reference: Preserve theological tension rather than resolve it; do not flatten apocalyptic imagery.
