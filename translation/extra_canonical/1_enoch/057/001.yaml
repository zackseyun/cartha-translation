  rationale: 'Adjudicator-modified: The reviewer is entirely correct that መንፈቀ ዕለት (literally ''half of the day'' or ''midday'') is the standard Ge''ez idiom for the geographical direction ''south'' (cf. Greek mesēmbria or Latin meridies). In a list of directions (''from the east and from the west''), translating it literally as ''middle of the day'' obscures the author''s clear geographical meaning. I am modifying the proposal slightly to ''as far as the south'' to preserve the full force of the preposition እስከ (eska).'
