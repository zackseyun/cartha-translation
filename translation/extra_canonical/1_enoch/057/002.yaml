translation:
  text: And the sound of the noise of their chariots was heard; and when this turmoil came to be, the holy ones took notice from heaven, and the pillar of the earth was shaken from its foundation, and it was heard from the ends of heaven to its ends in one day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this disturbance,' 'this uproar.' The Ge'ez term denotes agitation or commotion, and the exact nuance is uncertain in this Ge'ez-only section.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the ends of heaven to its ends,' an idiom for the full span of heaven.
    reason: lexical_alternative
  - marker: c
    text: '''The holy ones'' likely refers to heavenly beings here, since they are said to take notice ''from heaven.'''
    reason: cultural_note
  - marker: d
    text: Or 'the pillars of the earth were shaken from their foundations'.
    reason: previous_rendering
  - marker: e
    text: Or 'the sound of the voice of their chariots'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተሰምዐ / ተሰምዓ
  chosen: was heard / it was heard
  alternatives:
  - was made heard
  - was audible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive hearing formula preserved to retain the visionary report style rather than recasting as an active modern expression.
- source_word: ቃለ ድምፀ
  chosen: the sound of the voice
  alternatives:
  - the voice-sound
  - the sound
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled auditory expression is somewhat redundant in English, but keeping both elements reflects the emphatic Ge'ez phrasing and apocalyptic acoustics.
- source_word: ሰረገላቲሆሙ
  chosen: their chariots
  alternatives:
  - their wagons
  - their war-chariots
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Chariots'' is the natural rendering and preserves the martial/apocalyptic imagery without over-specifying military function.'
- source_word: ዝሀውክ
  chosen: this turmoil
  alternatives:
  - this disturbance
  - this confusion
  - this uproar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term suggests agitation or commotion. 'Turmoil' best fits the cosmic disturbance context while remaining readable.
- source_word: ቅዱሳን
  chosen: the holy ones
  alternatives:
  - the saints
  - the consecrated ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Enochic apocalyptic context this commonly refers to heavenly holy beings. 'Holy ones' preserves ambiguity and avoids importing later ecclesial overtones of 'saints'.
- source_word: አእመሩ
  chosen: took notice
  alternatives:
  - knew
  - perceived
  - understood
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes becoming aware or perceiving. 'Took notice' fits the immediate response to the cosmic event better than the flatter 'knew'.
- source_word: ዐምደ ምድር
  chosen: the pillars of the earth
  alternatives:
  - the columns of the earth
  - the supports of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is standard cosmic architecture imagery and should be preserved rather than demythologized.
- source_word: ተሐውሰ
  chosen: were shaken
  alternatives:
  - were moved
  - quaked
  - were disturbed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Were shaken'' naturally conveys seismic disturbance and matches the cosmic setting.'
- source_word: እመንበሩ
  chosen: from their foundations
  alternatives:
  - from their place
  - from their seat
  - from where they stood
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote seat/place/base. With 'pillars of the earth,' 'foundations' gives the most coherent English sense while preserving the structural image.
- source_word: እምአጽናፈ ሰማይ እስከ አጽናፍ
  chosen: from the ends of heaven to its ends
  alternatives:
  - from one end of heaven to the other
  - from the extremities of heaven to the extremity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez repeats the 'end/extremity' language. I preserved that repetition as much as readable English allows, though a smoother idiom is possible.
- source_word: በአሐቲ ዕለት
  chosen: in one day
  alternatives:
  - on a single day
  - within one day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward temporal phrase; 'in one day' is concise and natural.
