  from: the pillars of the earth were shaken from their foundations
  to: the pillar of the earth was shaken from its foundation
  rationale: 'The Ge''ez uses the singular noun ዐምደ (ʿamda, ''pillar''), paired with the 3rd masculine singular verb ተሐውሰ (taḥawwasa, ''was shaken'') and the singular pronominal suffix in እመንበሩ (ʾəm-manbaru, ''from its foundation/base''). The draft incorrectly pluralizes this to ''pillars... were shaken from their foundations.'' | Adjudicator: The reviewer correctly identifies that the Ge''ez noun ዐምደ (ʿamda, ''pillar'') is singular, as opposed to the plural አዕማደ (ʾaʿmāda). This is grammatically confirmed by the 3rd masculine singular verb ተሐው'
- timestamp: '2026-04-22T22:43:29Z'
