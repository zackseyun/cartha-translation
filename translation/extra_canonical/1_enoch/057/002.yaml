theological_decisions:
- issue: Identity of 'the holy ones'
  chosen_reading: heavenly holy beings/angels are left implicit in the phrase 'the holy ones'
  alternative_readings:
  - human saints
  - a mixed heavenly court
  rationale: Within the Parables, 'holy ones' often denotes heavenly beings, especially when explicitly located 'from heaven.' The translation preserves the title without over-interpreting it in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; keep major terms locally grounded in the passage.
