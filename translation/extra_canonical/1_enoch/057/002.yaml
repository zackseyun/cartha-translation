  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/057/002.job-72434.json
  category: lexical
  tier: 3
  from: the sound of the voice of their chariots
  to: the sound of the noise of their chariots
  rationale: 'The Ge''ez phrase ቃለ ድምፀ (qāla dəmṣa) combines two words for sound/noise. While ቃል (qāl) often means ''voice'' for living beings, when applied to inanimate objects like chariots, it means ''sound.'' Translating it as ''voice'' here is awkward; ''the sound of the noise'' better captures the emphatic double auditory terms without attributing vocal cords to chariots. | Adjudicator: The reviewer is correct that the Ge''ez word ቃል (qāl) means ''sound'' rather than ''voice'' when applied to inanimate objects like chariots (cf. Hebrew qol). The construct chain ቃለ ድምፀ (qāla dəmṣa) literal'
