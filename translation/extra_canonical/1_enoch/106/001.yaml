translation:
  text: And after some days my son Methuselah took a wife for his son Lamech, and
    she conceived by him and bore a son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening may also be understood more loosely as 'after a time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እምድኅረ መዋዕል
  chosen: after some days
  alternatives:
  - after days
  - after a time
  - later
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is a common temporal expression meaning after a period of
    time. 'After some days' preserves the idiom without sounding wooden.
- source_word: ነሥአ
  chosen: took
  alternatives:
  - obtained
  - received
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In marital contexts this verb commonly means 'took' in the sense of arranging
    or taking a wife. It fits the syntax with Methuselah as subject and the wife as
    object for Lamech.
- source_word: ብእሲተ
  chosen: a wife
  alternatives:
  - woman
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the noun can mean 'woman,' in this construction with 'took ...
    for his son' the marital sense 'wife' is the natural reading.
- source_word: ወፀንሰት
  chosen: she conceived
  alternatives:
  - became pregnant
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Conceived'' is concise, natural, and suitably elevated for narrative
    register.'
- source_word: እምኔሁ
  chosen: by him
  alternatives:
  - from him
  - through him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks Lamech as the father. 'By him' is idiomatic in English
    for conception and avoids overexplaining.
- source_word: ወወለደት ወልደ
  chosen: and bore a son
  alternatives:
  - and gave birth to a son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the straightforward narrative sense. 'Bore a son' keeps the elevated
    style and mirrors the compactness of the Ge'ez.
