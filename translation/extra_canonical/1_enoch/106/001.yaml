theological_decisions:
- issue: Genealogical/marital agency in the opening clause
  chosen_reading: Methuselah took a wife for his son Lamech
  alternative_readings:
  - Methuselah's son Lamech took a wife
  - Methuselah received a woman for Lamech
  rationale: The Ge'ez syntax most naturally makes Methuselah the subject and Lamech
    the indirect object ('for his son Lamech'). This preserves the family-arrangement
    setting of the narrative without importing later interpretive tradition.
  doctrine_reference: Preserve the source text's plain sense over inherited translation
    tradition; document ambiguity rather than smoothing it away.
