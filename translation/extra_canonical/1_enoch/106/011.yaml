translation:
  text: And he rose up in the hands of the midwife, and he opened his mouth and blessed
    the Lord of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'midwife' is literally something like 'the woman who
      delivers/bears'; in this birth scene it most naturally refers to the attendant
      receiving the child.
    reason: lexical_alternative
lexical_decisions:
- source_word: ተንሥአ
  chosen: rose up
  alternatives:
  - arose
  - stood up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes rising or standing up. In context of the newborn Noah,
    the startling action is that he immediately rose up; 'rose up' preserves the vivid,
    miraculous force without overexplaining.
- source_word: ውስተ እዴሃ
  chosen: in the hands of
  alternatives:
  - within her hands
  - into her hands
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally involves 'in/within' plus 'her hands.' Idiomatic
    English is 'in the hands of,' which preserves the physical setting while reading
    naturally.
- source_word: መውላዲት
  chosen: midwife
  alternatives:
  - birth-attendant
  - the woman giving birth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the noun refers to the woman handling the newborn at
    delivery, best rendered 'midwife.' Rendering it as 'the woman giving birth' would
    confuse the referent with the mother.
- source_word: ፈትሐ አፉሁ
  chosen: opened his mouth
  alternatives:
  - spoke
  - opened up his mouth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The expression is formulaic and should be preserved rather than reduced
    to 'spoke,' especially because the marvel is not only that he spoke but that he
    did so immediately at birth.
- source_word: ባረኮ
  chosen: blessed
  alternatives:
  - praised
  - spoke blessing to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means 'blessed.' Here it introduces reverent speech
    directed toward God; 'blessed' preserves the biblical register better than the
    flatter 'praised.'
- source_word: እግዚአ ሰማይ
  chosen: the Lord of heaven
  alternatives:
  - the Lord of the heavens
  - the Master of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: እግዚአ is regularly 'Lord' or 'master'; given project defaults and the
    divine referent, 'Lord' is preferred. 'Of heaven' is the straightforward genitival
    sense and fits Enochic heavenly language.
