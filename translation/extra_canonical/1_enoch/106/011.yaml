  alternative_readings:
  - the Master of heaven
  - the Lord of the heavens
  rationale: Following project philosophy, titles are translated rather than transliterated,
    and 'Lord' is the standard rendering for a divine sovereign title. The singular
    'heaven' is retained as idiomatic English for the Ge'ez expression.
