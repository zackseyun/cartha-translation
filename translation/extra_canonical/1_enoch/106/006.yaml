theological_decisions:
- issue: Nature of the child's origin in Lamech's fear
  chosen_reading: Lamech suspects angelic rather than human origin, expressed as his fearful perception rather than as narrator-confirmed fact.
  alternative_readings:
  - The line is only a hyperbolic reaction to the child's unusual appearance
  - The phrase implies demonic or illicit angelic begetting as an asserted reality
  rationale: The verse is framed by 'it seemed to me,' so the translation preserves Lamech's subjective inference. This keeps the theological tension of the narrative without turning his fear into an endorsed doctrinal statement.
  doctrine_reference: Preserve theological tension rather than resolve it.
