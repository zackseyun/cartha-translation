theological_decisions:
- issue: Nature of the Lord's promised act
  chosen_reading: The phrase is rendered as 'The Lord will make a new thing upon the earth,' implying a decisive divine act in history rather than a generalized renewal.
  alternative_readings:
  - The Lord will renew the earth
  - The Lord will create new things on the earth
  rationale: The Ge'ez wording supports newness/renewal but does not require a full cosmological renovation in this verse alone. The chosen rendering preserves the tension without over-interpreting.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of the ancestral offense in Jared's generation
  chosen_reading: Rendered as 'they transgressed the word of the Lord,' leaving the referent broad enough to include the Watchers' rebellion context without naming it explicitly.
  alternative_readings:
  - they transgressed the command of the Lord
  - they departed from the word of the Lord
  rationale: The immediate Enochic context points toward primordial rebellion, but the verse itself uses broader wording. The translation avoids importing a more specific interpretation than the Ge'ez states.
  doctrine_reference: Original-language primacy over translation tradition.
