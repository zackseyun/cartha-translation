translation:
  text: And I, Enoch, answered and said to him, “The Lord will make new things upon the earth; and this I have already seen in a vision, and I have made it known to you, because in the generation of Jared my father they transgressed the word of my Lord from the height of heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will renew' or 'will make anew'; the Ge'ez verb and noun both draw on the idea of newness.
    reason: lexical_alternative
  - marker: b
    text: The final phrase may also be understood as 'the word of my Lord from heaven above.' The Ge'ez syntax is difficult, and the spatial phrase could modify either 'word' or 'Lord.'
    reason: alternative_reading
  - marker: c
    text: Or 'the word of the Lord'.
    reason: previous_rendering
  - marker: d
    text: Or 'make a new thing'.
    reason: previous_rendering
  - marker: e
    text: Or 'from above heaven'.
    reason: previous_rendering
lexical_decisions:
- source_word: አውሣእኩ
  chosen: answered
  alternatives:
  - responded
  - gave answer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common narrative verb for replying; 'answered' preserves the formal dialogue cadence of apocalyptic speech.
- source_word: እቤሎ
  chosen: said to him
  alternatives:
  - told him
  - spoke to him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward speech introducer; paired with 'answered' in a standard Semitic-style double formula.
- source_word: ይኄድስ
  chosen: will make a new thing
  alternatives:
  - will renew
  - will make anew
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Derived from the root for newness/renewal. 'Will make a new thing' best fits the object ኀዳሳተ and preserves the sense of divine innovation rather than merely refurbishing.
- source_word: ኀዳሳተ
  chosen: a new thing
  alternatives:
  - new things
  - renewal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Though formally it can suggest ''new things,'' the idiom with the preceding verb is naturally rendered as a singular collective act: ''make a new thing.'''
- source_word: ዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - in the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard prepositional phrase; 'upon the earth' keeps the elevated register.
- source_word: ወዳእኩ
  chosen: have already
  alternatives:
  - already
  - beforehand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Taken adverbially with the following verb to indicate prior completion: Enoch has seen this beforehand.'
- source_word: ርኢኩ በራእይ
  chosen: have already seen in a vision
  alternatives:
  - saw in a vision
  - have seen by vision
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the visionary mode central to Enochic discourse; present perfect in English reflects the relevance of the prior revelation to the present speech.
- source_word: አይዳዕኩከ
  chosen: I have made it known to you
  alternatives:
  - I informed you
  - I showed you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Causative sense of 'know' is best represented by 'make known'; this keeps the revelatory tone.
- source_word: በትውልዱ ለአያሬድ አቡየ
  chosen: in the generation of Jared my father
  alternatives:
  - in the days of Jared my father
  - during the generation of my father Jared
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the genealogical framing important in Enochic chronology. 'Jared' is transliterated as a personal name.
- source_word: አኅለፉ
  chosen: they transgressed
  alternatives:
  - they passed beyond
  - they overstepped
  - they sinned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally suggests passing over/beyond; in context of 'the word' it carries the sense of violating or transgressing.
- source_word: ነገረ ለእግዚእየ
  chosen: the word of the Lord
  alternatives:
  - the command of the Lord
  - the matter of the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Word'' preserves the lexical breadth and avoids over-specifying as a single command, while still fitting a transgression context.'
- source_word: እመልዕልተ ሰማይ
  chosen: from above heaven
  alternatives:
  - from the height of heaven
  - from heaven above
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A deliberately elevated spatial expression. 'From above heaven' preserves the apocalyptic vertical imagery, though the exact syntactic attachment is difficult.
