    a rose''s bloom, eyes that light up the house like the sun.'
  alternative_readings:
  - Generalized description of unusual beauty or glory
  rationale: The verse is apocalyptic and portentous; the imagery signals an extraordinary
    child and should remain concrete and startling rather than abstracted.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    flatten visionary prose.'
