translation:
  text: And his body was white like snow, and red like the blooming of a rose; and
    the hair of his head was white like wool, and his eyes were beautiful. And when
    he opened his eyes, he lit up the whole house like the sun, and the whole house
    became exceedingly bright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez phrase rendered 'the blooming of a rose' is a floral comparison
      for redness; 'rose blossom' is also possible.
    reason: lexical_alternative
  - marker: b
    text: The clause about the eyes is textually difficult in Ethiopic. The sense
      'his eyes were beautiful' fits the immediate wording, but a slightly different
      nuance such as 'his eyes were splendid' is possible.
    reason: textual_variant
lexical_decisions:
- source_word: ሥጋሁ
  chosen: his body
  alternatives:
  - his flesh
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered 'body' rather than 'flesh' because the verse describes visible
    physical appearance as a whole, not flesh in a theological or contrastive sense.
- source_word: ጻዕዳ
  chosen: white
  alternatives:
  - bright
  - shining
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic color term fits the simile 'like snow' and should not be intensified
    beyond the source.
- source_word: አስሐትያ
  chosen: snow
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison clearly points to snow as the standard image of whiteness.
- source_word: ቀይሕ
  chosen: red
  alternatives:
  - ruddy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Kept the straightforward color term 'red'; 'ruddy' is possible but more
    interpretive and idiomatic than the Ge'ez requires.
- source_word: ጽጌ ረዳ
  chosen: the blooming of a rose
  alternatives:
  - a rose blossom
  - the flower of a rose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase evokes floral redness in bloom. 'The blooming of a rose' preserves
    the image without over-specifying botanical detail.
- source_word: ጸጕረ ርእሱ
  chosen: the hair of his head
  alternatives:
  - his head hair
  - his hair
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the full expression for vividness and formal correspondence,
    though English could shorten it to 'his hair.'
- source_word: ፀምር
  chosen: wool
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering of the comparison term; important to preserve the
    apocalyptic visual image.
- source_word: ተወድምድማሁ ሠናይ አዕይንቲሁ
  chosen: his eyes were beautiful
  alternatives:
  - his eyes were lovely
  - his eyes were splendid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to qualify the eyes positively in appearance. 'Beautiful'
    is natural English and preserves the evaluative force without importing later
    idiom.
- source_word: ከሠተ አዕይንቲሁ
  chosen: he opened his eyes
  alternatives:
  - he uncovered his eyes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Idiomatic sense in context is opening the eyes; 'uncovered' would be
    too wooden in English.
- source_word: አብርሀ
  chosen: he lit up
  alternatives:
  - he illumined
  - he made shine
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dynamic but faithful rendering of causative shining language; preserves
    the vivid effect on the house.
- source_word: ኵሎ ቤተ
  chosen: the whole house
  alternatives:
  - all the house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Natural English equivalent of the totalizing phrase.
- source_word: ፀሐይ
  chosen: the sun
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward cosmic comparison; should be preserved exactly.
- source_word: ፈድፋደ በርሀ
  chosen: became exceedingly bright
  alternatives:
  - shone all the more
  - was flooded with light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction intensifies the brightness already described. 'Became
    exceedingly bright' preserves the climactic repetition without awkward literalism.
