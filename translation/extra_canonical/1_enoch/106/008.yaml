translation:
  text: And when Methuselah heard the words of his son, he came to me at the ends
    of the earth, because he had heard that I was there. And he cried out, and I heard
    his voice, and I came to him and said to him, “Behold, I am here, my son. Why
    have you come to me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The final clause is textually awkward in Ethiopic if translated literally
      (''for/because you came to me''). In context it is best understood as a question
      of purpose: ''Why have you come to me?'''
    reason: textual_variant
lexical_decisions:
- source_word: ሰምዐ
  chosen: heard
  alternatives:
  - listened to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic auditory verb; 'heard' fits both occurrences naturally and preserves
    the narrative sequence.
- source_word: ነገረ ወልዱ
  chosen: the words of his son
  alternatives:
  - the message of his son
  - what his son said
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገር can denote word, matter, or message. 'Words' keeps the wording concrete
    while still idiomatic in English.
- source_word: ኀቤየ
  chosen: to me
  alternatives:
  - unto me
  - near me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard directional/prepositional sense in narrative movement.
- source_word: ውስተ አጽናፈ ምድር
  chosen: at the ends of the earth
  alternatives:
  - to the extremities of the earth
  - to the farthest parts of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the apocalyptic-geographical force of the phrase without
    flattening it into merely 'far away.'
- source_word: እስመ ሰምዐ ከመ ህየ ሀለውኩ
  chosen: because he had heard that I was there
  alternatives:
  - for he heard that I was there
  - because he heard that I was in that place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ህየ points to place ('there'); ሀለውኩ is existential ('I was / I was present').
    The clause explains Methuselah's journey.
- source_word: ጸርኀ
  chosen: cried out
  alternatives:
  - called out
  - shouted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the vividness of a loud summons without becoming colloquial.
- source_word: ቃሎ
  chosen: his voice
  alternatives:
  - his sound
  - his call
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although often 'word,' here with the hearing context after 'cried out'
    it is best rendered 'voice.'
- source_word: ናሁ ሀለውኩ
  chosen: Behold, I am here
  alternatives:
  - See, I am here
  - Behold, I am present
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the elevated direct-speech register. 'Behold' suits the solemn
    narrative tone.
- source_word: ወልድየ
  chosen: my son
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct filial address; important to preserve the family relationship
    in the speech.
- source_word: እስመ መጻእከ ኀቤየ
  chosen: Why have you come to me?
  alternatives:
  - For what reason have you come to me?
  - Because you have come to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ethiopic as transmitted is awkward if rendered woodenly with እስመ
    'because/for.' In context, the clause functions as a question of purpose after
    the summons. 'Why have you come to me?' gives the probable sense while remaining
    close to the narrative exchange.
