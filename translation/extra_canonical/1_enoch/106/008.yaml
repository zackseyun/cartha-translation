theological_decisions:
- issue: Cosmic location formula
  chosen_reading: at the ends of the earth
  alternative_readings:
  - in a remote region
  - at the extremities of the land
  rationale: The phrase should retain apocalyptic scope rather than be reduced to
    generic distance. No doctrinal harmonization is needed; the text presents Enoch
    as located in a far cosmic boundary region.
  doctrine_reference: Preserve apocalyptic imagery rather than smoothing into generic
    prose.
