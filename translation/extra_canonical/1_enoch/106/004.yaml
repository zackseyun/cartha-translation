lexical_decisions:
- source_word: ፈረሀ
  chosen: was afraid
  alternatives:
  - feared
  - became afraid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes fear. 'Was afraid' is natural English and preserves the immediate reaction without adding interpretive nuance.
- source_word: እምኔሁ
  chosen: of him
  alternatives:
  - because of him
  - from before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional form most straightforwardly marks the object/source of fear. 'Of him' fits the narrative context of Lamech reacting to the child.
- source_word: ጐየ
  chosen: fled
  alternatives:
  - ran away
  - hurried off
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys rapid departure. 'Fled' preserves both speed and fear-driven motion better than the more neutral 'went' or colloquial 'ran away.'
- source_word: መጽአ ኀበ
  chosen: came to
  alternatives:
  - went to
  - approached
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The common motion-plus-preposition sequence is well rendered as 'came to' in this narrative chain. It keeps the focus on arrival at Methuselah.
- source_word: አቡሁ
  chosen: his father
  alternatives:
  - the father of him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward possessive construction. English idiom prefers 'his father.'
- source_word: ማቱሳላ
  chosen: Methuselah
  alternatives:
  - Mathusala
  lexicon: standard transliteration convention
  rationale: Use the familiar English form of the proper name while preserving the referent of the Ge'ez transliteration.
