theological_decisions:
- issue: Whether the verse asserts angelic paternity or only angelic resemblance
  chosen_reading: The main text renders Lamech as believing the child was 'not from him but in the likeness of the angels of heaven,' preserving resemblance language rather than stating direct angelic descent.
  alternative_readings:
  - not his child, but one of the angels of heaven
  - not from him, but from the angels of heaven
  rationale: The Ge'ez wording centers on likeness (አምሳሉ) rather than explicit origin from angels. Given the broader Watchers context, readers may infer more, but the translation should not say more than the witness does here.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
