translation:
  text: And his father Lamech was afraid, and he fled to me, and he did not believe that he was from him, but that his likeness was from the angels of heaven. And behold, I have come to you so that you may make the truth known to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'righteousness' or 'what is right.' The Ge'ez noun can carry moral or juridical force, but here likely means the true explanation Lamech seeks.
    reason: lexical_alternative
  - marker: b
    text: Or 'and he believed that he was not from him but in the likeness of the angels of heaven.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ፈርሀ
  chosen: was afraid
  alternatives:
  - feared
  - became afraid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward fear verb; 'was afraid' is natural English and preserves the narrative force without overinterpreting intensity.
- source_word: ጐየ
  chosen: fled
  alternatives:
  - went hastily
  - ran
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is alarm at the child's extraordinary appearance; 'fled' best preserves the urgency implied by the verb in this setting.
- source_word: ኀቤየ
  chosen: to me
  alternatives:
  - unto me
  - before me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks motion toward the speaker; simple 'to me' fits readable modern English.
- source_word: አአምነ
  chosen: he believed
  alternatives:
  - he thought
  - he was convinced
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is fundamentally 'believe/trust.' Here it introduces Lamech's conviction about the child's origin; 'believed' keeps the lexical force while allowing the content clause to explain the belief.
- source_word: እምኔሁ
  chosen: from him
  alternatives:
  - of him
  - by him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition indicates source or origin. In context Lamech thinks the child is not his own offspring; 'from him' preserves that source sense.
- source_word: አላ
  chosen: but
  alternatives:
  - rather
  - except
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adversative contrast between human paternity and angelic likeness is best carried by 'but.'
- source_word: አምሳሉ
  chosen: in the likeness of
  alternatives:
  - like
  - in the form of
  - resembling
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This wording preserves the comparative imagery without overstating identity; the child is described as resembling heavenly beings, not explicitly said to be one.
- source_word: እመላእክተ ሰማይ
  chosen: the angels of heaven
  alternatives:
  - the heavenly angels
  - angels of the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard apocalyptic expression. 'Angels of heaven' preserves the elevated register and avoids flattening the celestial setting.
- source_word: ናሁ መጻእኩ ኀቤከ
  chosen: behold, I have come to you
  alternatives:
  - see, I came to you
  - look, I have come before you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the discourse marker 'behold' and the completed motion toward the addressee.
- source_word: ታይድዐኒ
  chosen: you may make known to me
  alternatives:
  - you may tell me
  - you may inform me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The causative sense of 'make know' is worth preserving rather than reducing to a bare 'tell.'
- source_word: ጽድቀ
  chosen: the truth
  alternatives:
  - righteousness
  - what is right
  - the right matter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the noun can denote righteousness or justice, in this immediate context Lamech seeks a true explanation of the child's origin. 'The truth' best fits the request for clarification while a footnote preserves the lexical alternative.
