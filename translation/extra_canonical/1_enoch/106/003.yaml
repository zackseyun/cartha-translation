theological_decisions:
- issue: Rendering of ጽድቅ in divine title
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Both are possible, but 'righteousness' better fits the Enochic moral
    and revelatory register and preserves the title's theological weight without narrowing
    it to judicial action alone.
  doctrine_reference: 'Translation philosophy: contested terms default toward ''righteousness''
    where the moral-theological sense is primary.'
