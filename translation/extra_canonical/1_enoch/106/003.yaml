translation:
  text: And at that time, he rose from the hands of the midwife, and he opened his
    mouth and spoke to the Lord of righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from her hands'; the Ge'ez identifies the woman as the birth-attendant,
      hence 'the midwife.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to the Lord of justice.' The Ge'ez noun can carry both moral and judicial
      force.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሶቤሃ
  chosen: And at that time
  alternatives:
  - And then
  - And in that moment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal-narrative connector introducing the next startling event. 'At
    that time' preserves the elevated narrative flow better than a bare 'then.'
- source_word: ተንሥአ
  chosen: he rose
  alternatives:
  - he stood up
  - he arose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes rising up. 'He rose' is concise and preserves the extraordinary
    image of the newborn's action without overinterpreting posture.
- source_word: እምእዴሃ
  chosen: from the hands of the midwife
  alternatives:
  - from her hands
  - out of her hands
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'from her hands.' Because the immediately preceding word ለመውለዲት
    identifies the woman as the one assisting birth, 'the midwife' makes the referent
    explicit in natural English while remaining anchored in the Ge'ez syntax.
- source_word: ለመውለዲት
  chosen: the midwife
  alternatives:
  - the woman giving birth assistance
  - the birth-attendant
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term refers to the woman attending the birth, not the mother herself
    in this context. 'Midwife' is the clearest idiomatic rendering.
- source_word: ወከሠተ አፉሁ
  chosen: and he opened his mouth
  alternatives:
  - and his mouth was opened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard speech-introduction formula, but here still vivid because
    it follows the newborn's rising. Active rendering matches the Ge'ez verbal sequence.
- source_word: ተወተናገረ
  chosen: and spoke
  alternatives:
  - and he spoke
  - and uttered speech
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple speech verb. 'Spoke' keeps the narrative direct and avoids inflated
    diction.
- source_word: ለእግዚአ ጽድቅ
  chosen: to the Lord of righteousness
  alternatives:
  - to the Lord of justice
  - to the master of righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: እግዚአ is regularly 'Lord' in elevated religious address; ጽድቅ can mean
    righteousness/justice. 'Righteousness' best preserves the moral-theological sense
    and resonates with Enochic usage without importing later formulaic Christian phrasing.
