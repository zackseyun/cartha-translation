translation:
  text: And now, my father, I am here asking you and petitioning you, that you should go to Henok our father and hear from him the truth, for his dwelling is with the angels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hanok is the Ge'ez form of the name more commonly rendered 'Enoch.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Hanok our father'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይእዜኒ
  chosen: And now
  alternatives:
  - And at this time
  - And now then
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal discourse marker introducing the son's urgent appeal; 'And now' is natural English while preserving the transition.
- source_word: ሀለውኩ
  chosen: I am here
  alternatives:
  - I am present
  - I am
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form conveys present presence/existence in the immediate scene. 'I am here' captures the directness of the plea better than the flatter 'I am.'
- source_word: አስተበቍዐከ
  chosen: asking you
  alternatives:
  - beseeching you
  - entreating you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A verb of earnest request. 'Asking you' keeps the syntax smooth in modern English, while the following paired verb preserves the heightened urgency.
- source_word: ወእስእል
  chosen: and petitioning
  alternatives:
  - and requesting
  - and imploring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used alongside the previous request verb for rhetorical intensification. 'Petitioning' preserves the formal, urgent tone without sounding archaic.
- source_word: ከመ ትሖር ኀበ
  chosen: that you should go to
  alternatives:
  - that you may go to
  - to go to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses the content of the request. Given the context of sending the father to Enoch, 'go to' best fits the narrative sense.
- source_word: ሄኖክ አቡነ
  chosen: Hanok our father
  alternatives:
  - Enoch our father
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Names are transliterated by project policy. The Ge'ez form points to Hanok/Henok; 'our father' is retained as a familial-honorific designation, not reduced to merely 'the ancestor.'
- source_word: ትስማዕ እምኀቤሁ አማነ
  chosen: hear from him the truth
  alternatives:
  - learn from him the truth
  - hear truth from him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom is auditory but implies receiving reliable explanation. 'Hear from him the truth' preserves the concrete verb and the emphasis on trustworthy revelation.
- source_word: እስመ
  chosen: for
  alternatives:
  - because
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the reason for consulting Enoch.
- source_word: ውእቱ ምስለ መላእክት ምኅዳሩ
  chosen: his dwelling is with the angels
  alternatives:
  - his habitation is with the angels
  - he dwells with the angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun-based construction emphasizes Enoch's settled abode among angels. 'His dwelling is with the angels' preserves the apocalyptic image more closely than the simpler verbal paraphrase.
