theological_decisions:
- issue: How to render Enoch's relation to the angels
  chosen_reading: his dwelling is with the angels
  alternative_readings:
  - he dwells with the angels
  rationale: The Ge'ez uses a nominal expression about dwelling/abode. Retaining 'dwelling' preserves the text's portrayal of Enoch's extraordinary heavenly residence without over-interpreting its mechanics.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten visionary language.
