translation:
  text: And he said to him, “I have begotten a strange son, and he is not like a human
    being; rather he is like the children of the angels of heaven. And his nature
    is different, and he is not like us; and his eyes are like the rays of the sun,
    and his face is glorious.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an unusual son.' The Ge'ez term emphasizes that the child is markedly
      other than normal.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the children of the angels of heaven,' preserving Lamech's startling
      comparison rather than reducing it to simply 'angelic.'
    reason: lexical_alternative
  - marker: c
    text: The phrase about the eyes compares them to the sun's emitted light; 'sunbeams'
      is a possible rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወለድኩ
  chosen: I have begotten
  alternatives:
  - I have fathered
  - I have borne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: First-person perfect-like form from the verb 'to beget/bear.' In the
    speech of Lamech, 'I have begotten' preserves the paternal claim and the elevated
    register better than the flatter 'I have fathered.'
- source_word: ውሉጠ
  chosen: strange
  alternatives:
  - different
  - peculiar
  - extraordinary
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term marks otherness or unusual character. 'Strange' best preserves
    Lamech's alarm without prematurely deciding whether the difference is admirable
    or monstrous.
- source_word: አኮኑ ከመ ሰብእ
  chosen: he is not like a human being
  alternatives:
  - he is not like a man
  - he is not as humans are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase contrasts the child with ordinary humanity. 'Human being'
    avoids unnecessary male-specific narrowing while keeping the singular comparison.
- source_word: ወይመ ስል
  chosen: rather
  alternatives:
  - but
  - instead
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This introduces the stronger contrastive comparison that follows. 'Rather'
    captures the rhetorical correction in Lamech's speech.
- source_word: ደቂቀ መላእክተ ሰማይ
  chosen: the children of the angels of heaven
  alternatives:
  - the sons of the angels of heaven
  - the offspring of the angels of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'children of the angels of heaven.' I retain the familial imagery
    rather than smoothing it to a generic class. 'Children' is less interpretively
    loaded than 'sons' in English here.
- source_word: ፍጥረቱ
  chosen: his nature
  alternatives:
  - his form
  - his creaturely makeup
  - his constitution
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote creation, form, or nature. In context it refers to
    the child's constitution or kind. 'Nature' reads clearly while preserving ontological
    force.
- source_word: ካልእት
  chosen: different
  alternatives:
  - other
  - altered
  - another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used predicatively of the child's nature. 'Different' is the most natural
    English equivalent and keeps the emphasis on otherness.
- source_word: አዕይንቲሁ ከመ አገሪሁ ለፀሐይ
  chosen: his eyes are like the rays of the sun
  alternatives:
  - his eyes are like its beams, the sun's
  - his eyes are like sunbeams
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison is to the sun's emitted light. 'Rays of the sun' preserves
    the vivid apocalyptic imagery better than the more idiomatic but slightly freer
    'sunbeams.'
- source_word: ገጹ ስቡሕ
  chosen: his face is glorious
  alternatives:
  - his face is splendid
  - his face is glorious to behold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective denotes glory, honor, or splendor. 'Glorious' preserves
    the exalted tone and leaves open whether the glory is visual, status-laden, or
    both.
