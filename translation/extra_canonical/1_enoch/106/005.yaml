theological_decisions:
- issue: Whether the comparison to 'the children of the angels of heaven' should be
    softened into merely angel-like appearance
  chosen_reading: Retain the familial expression 'the children of the angels of heaven'
    in the main text
  alternative_readings:
  - like angels of heaven
  - like heavenly angels
  rationale: The Ge'ez explicitly uses a filial expression, and the narrative context
    includes anxiety about anomalous parentage. Softening it to a simple adjectival
    comparison would reduce the force of Lamech's suspicion.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten apocalyptic imagery.
- issue: Whether ሰብእ should be rendered 'man' or more generically
  chosen_reading: human being
  alternative_readings:
  - man
  rationale: The contrast is between ordinary humanity and the extraordinary child,
    not specifically between male persons. 'Human being' communicates the sense without
    importing unnecessary gender restriction.
  doctrine_reference: Readable modern English, not archaic or academic.
