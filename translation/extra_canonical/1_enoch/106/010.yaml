translation:
  text: 'And now, my father, hear me: a son has been born to Lamech my son, and he
    is not like a human being in his appearance and in the form of his making. His
    color is whiter than snow and redder than a rose blossom, and the hair of his
    head is whiter than white wool. And his eyes are like the rays of the sun; when
    he opened his eyes, he lit up the whole house.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The flower term in 'redder than a rose blossom' may refer more generally
      to a red blossom; the exact species identification is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'like the rays of the sun' is difficult in Ge'ez; the
      sense is clearly one of solar brightness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ስምዐኒ
  chosen: hear me
  alternatives:
  - listen to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative with first-person object suffix; 'hear me' preserves the urgent
    filial appeal without over-expansion.
- source_word: ተወልደ
  chosen: has been born
  alternatives:
  - was born
  - is born
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/perfective sense announcing a completed birth with present relevance;
    English present perfect fits the report.
- source_word: ዘአምሳሉ
  chosen: in his appearance
  alternatives:
  - whose likeness
  - in his likeness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the root of likeness/image; here paired with 'form of his making,'
    so 'appearance' gives a natural English rendering while preserving the comparison
    of visible form.
- source_word: ፍጥረቱ
  chosen: the form of his making
  alternatives:
  - his creation
  - his nature
  - his formed body
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Related to creation/formation. I avoided the abstract 'nature' and the
    overly theological 'creation' in the main text, since the context describes bodily
    form.
- source_word: ኢኮነ ከመ ፍጥረተ ሰብእ
  chosen: he is not like a human being
  alternatives:
  - he is not like the offspring of man
  - he is not like human creatures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase contrasts the newborn's form with ordinary humanity. 'Human
    being' is clear modern English and preserves the startling claim without importing
    later idiom.
- source_word: ኅብሩ
  chosen: his color
  alternatives:
  - his complexion
  - his appearance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context it refers to visible coloring, followed by comparisons to
    snow and blossom. 'Color' is the most direct rendering.
- source_word: ይጸዐዳ እምአስኃትያ
  chosen: is whiter than snow
  alternatives:
  - shines whiter than snow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Comparative construction with whiteness; 'whiter than snow' preserves
    the vivid visual comparison.
- source_word: ይቀይሕ እምጽጌ ረዳ
  chosen: redder than a rose blossom
  alternatives:
  - redder than a flower bloom
  - ruddy like a rose blossom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes redness/ruddiness; the noun phrase points to a flower
    blossom, traditionally understood as rose-like. I kept 'rose blossom' as a concrete
    image but note the floral identification is not fully certain.
- source_word: ጸጕረ ርእሱ
  chosen: the hair of his head
  alternatives:
  - his head-hair
  - the hair on his head
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal phrase; rendered idiomatically while preserving the bodily
    detail.
- source_word: እምፀምር ጸዐዳ
  chosen: whiter than white wool
  alternatives:
  - like white wool
  - whiter than wool
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparative plus repeated whiteness intensifies the image. I retained
    the repetition rather than smoothing it away.
- source_word: ከመ እግረን ለፀሐይ
  chosen: like the rays of the sun
  alternatives:
  - like sunbeams
  - like the disk of the sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult, but in context it describes radiant eyes. 'Rays
    of the sun' best preserves the luminous imagery without overcommitting to a more
    technical sense.
- source_word: ከሠተ አዕይንቲሁ
  chosen: he opened his eyes
  alternatives:
  - his eyes were opened
  - he uncovered his eyes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Narrative action following the eye description; 'opened his eyes' is
    the clearest idiomatic rendering.
- source_word: አበርሀ ኵሎ ቤተ
  chosen: he lit up the whole house
  alternatives:
  - he illumined the entire house
  - he made the whole house shine
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes shining/illumining. 'Lit up' is vivid, readable, and
    preserves the miraculous radiance.
