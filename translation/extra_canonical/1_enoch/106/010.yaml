theological_decisions:
- issue: How strongly to render the child's difference from ordinary humanity
  chosen_reading: he is not like a human being in his appearance and in the form of
    his making
  alternative_readings:
  - he is not like the children of men
  - he is unlike human creatures in appearance and form
  rationale: The verse presents the newborn Noah as astonishingly other in visible
    form, but the wording is descriptive rather than a metaphysical claim about non-human
    ontology. The translation preserves the shock without forcing a doctrinal conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
