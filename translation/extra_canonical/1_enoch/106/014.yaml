  from: and they will be separated from them and from them.
  to: And they will commit sin, and they will transgress the ordinance; and they will join themselves with women and commit sin with them, and they will take wives from among them, and they will beget children.
  rationale: 'Adjudicator-modified: The reviewer is entirely correct that አውሰበ (awsaba) means ''to marry'' or ''to take a wife'' (Leslau, CDG 619; Dillmann 907), making the current rendering ''separated'' a severe mistranslation. Furthermore, as the reviewer notes, the OCR reading ወእምኔሆን፡ ወእምኔሆን፡ at the end of the verse is a visual misrecognition of the actual Ge''ez text ወይወልዱ፡ ውሉደ፡ (wa-yewaldu weluda, ''and they will beget children'') found in the Charles 1906 edition. I am modifying the rewrite to correct both the lexical error for አውሰቡ'
