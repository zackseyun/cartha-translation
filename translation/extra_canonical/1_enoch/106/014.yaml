  - they will couple themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reflects voluntary association or joining with women; avoids overly explicit paraphrase while preserving the transgressive union implied by context.
- source_word: አንስት
  chosen: women
  alternatives:
  - wives
  - females
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plain collective term is best rendered 'women'; 'wives' would add marital specificity not demanded by the Ge'ez.
- source_word: አውሰቡ
  chosen: they will be separated
  alternatives:
  - they will be removed
  - they will depart
  - they will be taken away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to indicate removal or separation. Because the clause is textually difficult, a cautious rendering is used and explained in a footnote.
- source_word: እምኔሆን
  chosen: from them
  alternatives:
