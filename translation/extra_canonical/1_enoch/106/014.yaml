  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Chosen to preserve the sense of an established norm or decree without over-specifying Mosaic law; 'ordinance' fits apocalyptic/judicial register.
- source_word: ተደመሩ
  chosen: they will join themselves
  alternatives:
