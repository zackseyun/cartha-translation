theological_decisions:
- issue: Nature of the transgression involving women
  chosen_reading: Render the line as illicit joining with women without making the sexual act more explicit than the Ge'ez wording itself.
  alternative_readings:
  - Interpret as marriage
  - Interpret as sexual intercourse stated explicitly
  rationale: The verse clearly depicts sinful union with women, but the Ethiopic wording uses a broader verb of joining/associating. The translation preserves the moral charge without importing a more explicit formulation than the witness requires.
  doctrine_reference: Preserve theological tension rather than resolve it; do not paraphrase beyond what the Ge'ez witness warrants.
- issue: Final clause with repeated 'from them'
  chosen_reading: Keep a literal, somewhat awkward rendering indicating separation/removal, and note the uncertainty.
  alternative_readings:
  - They took wives for themselves from among them
  - They chose for themselves from among them
  - They were led away by them
  rationale: The closing words are difficult in the OCR witness and may reflect textual corruption or a variant reading. A transparent literal rendering is preferable to a smooth but speculative reconstruction.
  doctrine_reference: When the sense is uncertain, prefer transparent English plus a footnote over false confidence.
