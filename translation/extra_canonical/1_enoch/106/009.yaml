theological_decisions:
- issue: Meaning of ጻህቅ in this clause
  chosen_reading: an abstract 'matter of righteousness' rather than 'the Righteous
    One' or simply 'justice'
  alternative_readings:
  - a great righteous one
  - a great matter of justice
  rationale: The immediate syntax with 'because of' and 'great' favors an abstract
    cause or subject matter for the visit. Capitalizing or personalizing the term
    would import a messianic reading not demanded by this Ge'ez line.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
