translation:
  text: And he answered me and said, “Because of a great trouble I have come to you,
    and because of a marvelous vision I have drawn near.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'a great matter of righteousness' is somewhat uncertain.
      The Ge'ez may also be understood more generally as 'a great matter of justice'
      or, less likely, as referring to a 'great righteous one.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because of an extraordinary vision I approached.' The final clause uses
      a verb of coming near, which may overlap in sense with 'I have come to you'
      earlier in the verse.
    reason: lexical_alternative
  - marker: c
    text: Or 'matter of righteousness'.
    reason: previous_rendering
lexical_decisions:
- source_word: አውሥአኒ
  chosen: he answered me
  alternatives:
  - he responded to me
  - he spoke to me in reply
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the standard reply/answer verb. The object suffix marks 'me,'
    so 'he answered me' preserves the dialogic setting.
- source_word: በእንተ
  chosen: because of
  alternatives:
  - concerning
  - on account of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can mark reference ('concerning') or cause/motive. In
    this context, introducing the reason for the speaker's coming, 'because of' best
    fits the clause flow.
- source_word: ጻህቅ
  chosen: righteousness
  alternatives:
  - justice
  - righteous one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun/adjectival form is difficult in isolation, but here with 'great'
    it most naturally denotes a weighty matter characterized by righteousness/justice
    rather than a specific person. 'Righteousness' preserves the moral-theological
    force without over-specifying.
- source_word: ዐቢይ
  chosen: great
  alternatives:
  - weighty
  - mighty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common adjective meaning 'great.' Here it intensifies the following
    matter, so 'great' is the most transparent rendering.
- source_word: መጻእኩ ኀቤከ
  chosen: I have come to you
  alternatives:
  - I came to you
  - I have arrived to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The verb of coming with the preposition ''to/toward you'' is straightforward.
    Present perfect English suits the explanatory speech: the speaker states the purpose
    of his arrival.'
- source_word: ራእይ
  chosen: vision
  alternatives:
  - appearance
  - revelation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context this term should remain 'vision,' preserving the
    genre's revelatory imagery rather than flattening it into a generic 'message.'
- source_word: ዐፁብ
  chosen: astonishing
  alternatives:
  - marvelous
  - wondrous
  - extraordinary
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective conveys wonder or extraordinariness. 'Astonishing' keeps
    the force while sounding natural in modern English.
- source_word: ቀረብኩ
  chosen: I have drawn near
  alternatives:
  - I approached
  - I came near
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to come near/approach. 'Drawn near' preserves the elevated
    register appropriate to angelic-apocalyptic speech.
