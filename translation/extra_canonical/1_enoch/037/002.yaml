theological_decisions:
- issue: Referent of 'the Holy One'
  chosen_reading: A divine title referring to God
  alternative_readings:
  - a holy one, i.e., an angelic or sanctified being
  rationale: In this context the singular title followed by 'before the Lord of Spirits'
    most plausibly denotes God's own holy utterance rather than the speech of an angelic
    holy one.
  doctrine_reference: Preserve local passage sense without harmonizing beyond context;
    translate titles for meaning.
- issue: Scope of 'those who dwell on the dry land'
  chosen_reading: Human inhabitants of the earth in general, rendered concretely as
    'dry land'
  alternative_readings:
  - all earth-dwellers
  - the inhabitants of the world
  rationale: The Ge'ez image is concrete and should remain so in the main text, while
    the broader human scope is noted by context rather than substituted into the translation.
  doctrine_reference: Do not flatten imagery into generic prose; prefer transparent
    English anchored in the source.
