translation:
  text: 'And this is the beginning of the word of wisdom that I lifted up to speak
    and say to those who dwell on the dry land: Hear, you former ones, and see, you
    latter ones, the word of the Holy One that I will speak before the Lord of Spirits.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to those who live on the earth.' The Ge'ez reads more literally 'on
      the dry land.'
    reason: lexical_alternative
  - marker: b
    text: '''Former ones'' and ''latter ones'' likely address earlier and later generations,
      preserving a broad summons across time.'
    reason: cultural_note
  - marker: c
    text: Or 'in the presence of the Lord of Spirits.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወዝ
  chosen: And this is
  alternatives:
  - And this
  - And these are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the statement demonstratively; in context it functions as
    a heading-like opening to the utterance.
- source_word: ርእሱ
  chosen: the beginning
  alternatives:
  - the head
  - the chief part
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'head,' but idiomatically marks the start or principal opening
    of the discourse; 'beginning' is natural English and preserves the structural
    sense.
- source_word: ነገረ ጥበብ
  chosen: the word of wisdom
  alternatives:
  - the matter of wisdom
  - the discourse of wisdom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገር can mean word, matter, or discourse. 'Word of wisdom' keeps the elevated
    register and singular formulation of the Ge'ez without over-expanding it.
- source_word: ዘአንሣእኩ
  chosen: that I lifted up
  alternatives:
  - that I raised
  - that I uttered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests raising or lifting. Retaining 'lifted up' preserves
    the solemn, proclamatory force of apocalyptic speech better than flattening it
    to 'said.'
- source_word: እትናገር [እብል]
  chosen: to speak and say
  alternatives:
  - to speak
  - to declare
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs likely intensify the act of proclamation. Keeping both
    in English reflects the repetitive style of the source; the bracketed form indicates
    some uncertainty, but the sense of verbal proclamation is clear.
- source_word: ለእለ ይነድሩ ውስተ የብስ
  chosen: to those who dwell on the dry land
  alternatives:
  - to those who live on the earth
  - to the inhabitants of the dry ground
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: የብስ is literally dry land. In apocalyptic context it can function broadly
    for the inhabited world, but the more concrete image should be preserved in the
    main text.
- source_word: ስምዑ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct imperative introducing solemn address; 'Hear' fits prophetic-apocalyptic
    register.
- source_word: ቀደምት
  chosen: you former ones
  alternatives:
  - those of old
  - the first ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective/noun points to those earlier or former. 'Former ones' preserves
    the parallel with 'latter ones' in the next clause.
- source_word: ወርእዩ ደኃርያን
  chosen: and see, you latter ones
  alternatives:
  - and behold, you who come after
  - and see, later ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Maintains the imperative plus vocative parallelism. 'Latter ones' is
    slightly unusual English but preserves the apocalyptic contrast between earlier
    and later generations.
- source_word: ነገረ ቅዱሰ
  chosen: the word of the Holy One
  alternatives:
  - the discourse of the Holy One
  - the word of the holy one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular with article-like force most naturally refers to God as
    'the Holy One,' not merely a holy being. This suits the following phrase 'before
    the Lord of Spirits.'
- source_word: ቅድመ እግዚአ መንፈሳት
  chosen: before the Lord of Spirits
  alternatives:
  - in the presence of the Lord of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A major Enochic divine title. It should be translated, not paraphrased,
    and kept consistent with the book's theological vocabulary.
