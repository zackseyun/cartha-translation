theological_decisions:
- issue: How to render the section label in the Parables
  chosen_reading: parable
  alternative_readings:
  - similitude
  - parable saying
  rationale: The Ge'ez term in this section names the literary unit. 'Parable' is
    intelligible and avoids archaic 'similitude,' while still preserving the distinct
    genre marker of the Book of Parables.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic.'
- issue: Interpretation of the difficult final clause
  chosen_reading: there will not be another beginning of wisdom
  alternative_readings:
  - there will be no second chief matter of wisdom
  - after this there is no other source of wisdom
  rationale: The Ge'ez as transmitted is textually and syntactically difficult. A
    restrained rendering that stays close to the lexical values of 'another/second,'
    'head/beginning,' and 'wisdom' is preferable to a smoother but more interpretive
    paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; when uncertain,
    prefer transparent English plus a footnote.
