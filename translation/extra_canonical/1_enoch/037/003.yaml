translation:
  text: This is the beginning of the first parable; and afterward there will not be
    another beginning of wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic wording of this verse is difficult, especially in the phrases
      rendered 'beginning' and 'another beginning of wisdom.' The translation stays
      close to the transmitted Ge'ez; the sense may be that this opens the first parable
      and that no second opening of wisdom follows.
    reason: textual_variant
