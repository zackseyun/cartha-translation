lexical_decisions:
- source_word: እስከ ይእዜ
  chosen: Until now
  alternatives:
  - Up to now
  - Until this time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal expression marking that the permission or revelation had not
    previously been granted before the present moment.
- source_word: ኢተውህበኒ
  chosen: it has not been given to me
  alternatives:
  - it was not granted to me
  - I had not been given
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive verbal form with first-person object suffix; 'given to me' preserves
    the sense of something granted or bestowed, likely permission or revelation.
- source_word: እምቅድመ
  chosen: from before
  alternatives:
  - from the presence of
  - before
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard Ge'ez prepositional expression for origin from the presence
    of someone. 'From before' keeps the elevated apocalyptic register and the spatial-courtly
    nuance.
- source_word: እግዚአ መንፈሳት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a recurring divine title in 1 Enoch. 'Lord of Spirits' is the
    established literal sense and preserves the text's distinctive theological diction
    without flattening it.
- source_word: ዘነሣእኩ
  chosen: what I have taken up
  alternatives:
  - what I have lifted up
  - what I have uttered
  - what I have borne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally suggests lifting or taking up. In context it may refer
    to taking up a parable, discourse, or utterance, but the object is not explicit
    in the surviving wording, so the more literal rendering is retained in the main
    text.
