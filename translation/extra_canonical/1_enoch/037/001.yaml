theological_decisions:
- issue: Genealogical naming form in the heading
  chosen_reading: Retain the full genealogy down to Adam in the main text.
  alternative_readings:
  - Compress the genealogy for smoother English
  - Normalize names to a different biblical tradition
  rationale: The genealogy is part of the verse's literary self-positioning, grounding Enoch within primeval history. It should remain explicit and uncompressed.
  doctrine_reference: Translation philosophy §Original-language primacy; §Translate titles; transliterate names
- issue: Meaning of ካልእ in this superscription
  chosen_reading: Render as 'second' rather than merely 'another.'
  alternative_readings:
  - another
  - other
  rationale: In a section heading introducing a new visionary unit, the term likely has sequential force. Because the Parables are structurally arranged, 'second' better reflects that probable function while remaining within the semantic range.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
