lexical_decisions:
- source_word: ራእይ
  chosen: vision
  alternatives:
  - appearance
  - revelation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes something seen in revelatory context; 'vision' preserves the apocalyptic register better than a flatter 'appearance.'
- source_word: ካልእ
  chosen: second
  alternatives:
  - another
  - other
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the adjective can mean 'other/another,' in this heading context it most naturally marks sequence within the book's visionary materials; 'second' makes that discourse function clear in English.
- source_word: ራእየ
  chosen: saw
  alternatives:
  - beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of the verb 'to see.' 'Saw' is clear modern English; 'beheld' would sound archaic.
- source_word: ጥበብ
  chosen: wisdom
  alternatives:
  - understanding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez term regularly means 'wisdom.' Retaining it here preserves the heading's distinctive characterization of the revelation rather than reducing it to a generic vision.
- source_word: ዘርእየ
  chosen: that ... saw
  alternatives:
  - which ... saw
  - seen by
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative construction links the vision to Enoch as its seer. English idiom is best served by 'that ... saw.'
- source_word: ወልደ
  chosen: son of
  alternatives:
  - descendant of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated genealogical formula is explicit and should be preserved rather than generalized to 'descendant of.'
- source_word: ሄኖክ
  chosen: Enoch
  lexicon: standard transliteration
  rationale: Personal name transliterated according to project policy.
- source_word: ያሬድ
  chosen: Jared
  alternatives:
  - Yared
  lexicon: standard transliteration
  rationale: A familiar English biblical-form transliteration that remains transparent to the Ge'ez name.
- source_word: መላልኤል
  chosen: Mahalalel
  alternatives:
  - Melel'el
  - Mahalaleel
  lexicon: standard transliteration
  rationale: Rendered in the conventional biblical form for recognizability while preserving the genealogical identification.
- source_word: ቃይናን
  chosen: Cainan
  alternatives:
  - Kenan
  - Qainan
  lexicon: standard transliteration
  rationale: The Ge'ez form aligns closely with 'Cainan'; this keeps close to the witness rather than normalizing to the MT-style 'Kenan.'
- source_word: ሄኖስ
  chosen: Enos
  alternatives:
  - Enosh
  lexicon: standard transliteration
  rationale: The Ge'ez form supports the conventional English 'Enos'; 'Enosh' is possible but less directly aligned to this witness.
