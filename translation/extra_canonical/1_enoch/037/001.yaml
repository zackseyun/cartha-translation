translation:
  text: The second vision that he saw, the vision of wisdom that Enoch son of Jared, son of Mahalalel, son of Cainan, son of Enos, son of Seth, son of Adam, saw.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'another vision of wisdom.' The Ge'ez adjective can mean 'other' or 'another'; 'second' is chosen here because the heading appears to mark sequence.
    reason: lexical_alternative
  - marker: b
    text: The repeated 'son of' formula is kept to preserve the genealogy exactly as the heading presents it.
    reason: cultural_note
  - marker: c
