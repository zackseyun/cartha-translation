theological_decisions:
- issue: Anthropological force of 'flesh' in a visionary collapse
  chosen_reading: Retain 'all my flesh melted away'
  alternative_readings:
  - my whole body gave way
  - all my body dissolved
  rationale: The Ge'ez uses 'flesh,' and the project philosophy prefers preserving source-language theological texture where possible. In apocalyptic context this bodily term heightens the overwhelming holiness of the encounter.
  doctrine_reference: Translation philosophy §1, §4; contested terms table on 'flesh' analogously supports retaining literal 'flesh' where context is literal.
- issue: Meaning of the difficult verb describing the spirit
  chosen_reading: '''my spirit was transformed'''
  alternative_readings:
  - my spirit changed
  - my spirit departed
  rationale: The line likely describes an inner alteration under visionary power rather than death or simple emotional disturbance. Because the Parables are effectively Ge'ez-only here, the rendering remains restrained and a footnote notes uncertainty.
  doctrine_reference: Translation philosophy §3 preserve ambiguity; book-context guidance for Parables to be especially transparent about uncertainty.
