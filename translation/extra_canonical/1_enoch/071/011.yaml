lexical_decisions:
- source_word: ወወደቁ
  chosen: and I fell
  alternatives:
  - and I collapsed
  - and I prostrated myself
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb introduces Enoch’s bodily reaction to the vision. 'Fell' preserves the sudden visionary collapse without over-specifying whether the action was voluntary prostration or involuntary collapse.
- source_word: በገጽየ
  chosen: on my face
  alternatives:
  - before my face
  - face-down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An idiomatic expression for falling prostrate. 'On my face' preserves the concrete bodily posture and apocalyptic register.
- source_word: ኵሉ ሥጋየ
  chosen: all my flesh
  alternatives:
  - my whole body
  - all my body
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retaining 'flesh' preserves the anthropological and visionary force of the phrase rather than reducing it to a neutral 'body.'
- source_word: ተመስወ
  chosen: melted away
  alternatives:
  - dissolved
  - wasted away
  - was undone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is overwhelming visionary encounter. 'Melted away' keeps the vivid apocalyptic imagery of bodily dissolution better than a flatter idiom.
- source_word: መንፈስየ
  chosen: my spirit
  alternatives:
  - my breath
  - my inner spirit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this visionary context the term points to Enoch’s inner animating/spiritual self, not merely breath.
- source_word: ተወለጠ
  chosen: was transformed
  alternatives:
  - was changed
  - was altered
  - departed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is difficult, but in context it marks an inner change accompanying the vision. 'Was transformed' best captures a significant alteration without claiming more precision than the Ge'ez securely gives.
- source_word: ጸራኅኩ በቃል ዓቢይ
  chosen: I cried out with a great voice
  alternatives:
  - I shouted with a loud voice
  - I cried with a mighty voice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the elevated apocalyptic diction and the concrete image of a loud utterance. 'Great voice' is slightly more literal than 'loud voice.'
- source_word: በመንፈሰ ኃይል
  chosen: in the spirit of power
  alternatives:
  - by a spirit of power
  - in a powerful spirit
  - through the spirit of strength
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is somewhat opaque. 'In the spirit of power' preserves the wording and ambiguity rather than resolving it into either manner or agency.
- source_word: ባረኩ
  chosen: I blessed
  alternatives:
  - I gave blessing
  - I spoke blessing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard rendering that keeps the liturgical/jubilant force of Enoch’s response.
- source_word: ሰብሕኩ
  chosen: praised
  alternatives:
  - glorified
  - gave praise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Praised'' is the clearest natural English equivalent and fits the sequence of worship verbs.'
- source_word: አልዓልኩ
  chosen: exalted
  alternatives:
  - magnified
  - lifted up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb likely expresses extolling or lifting high in praise. 'Exalted' preserves the elevated register and parallelism with the preceding verbs.
