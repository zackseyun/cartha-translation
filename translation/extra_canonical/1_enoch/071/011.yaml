  from: great voice
  to: loud voice
  rationale: The Ge'ez idiom ቃል ዓቢይ (qāl ʿābiy), much like its Hebrew and Greek equivalents, refers to vocal volume. 'Loud voice' is the natural English equivalent; 'great voice' is an overly literal translationism.
