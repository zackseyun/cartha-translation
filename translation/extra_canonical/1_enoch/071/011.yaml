  category: awkward_english
  tier: 1
  from: and I blessed and praised and exalted.
  to: and I blessed and praised and exalted him.
  rationale: In English, the verb 'exalt' is strongly transitive and sounds incomplete without an object. While the Ge'ez verbs (ወባረኩ ወሰብሕኩ ወአልዓልኩ) lack explicit object suffixes here, supplying 'him' (or '[him]') is necessary for natural English syntax.
