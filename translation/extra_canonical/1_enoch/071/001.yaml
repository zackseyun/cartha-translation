theological_decisions:
- issue: Identity of 'the sons of the holy angels'
  chosen_reading: Retain the literal familial expression rather than harmonizing it
    to 'the holy angels.'
  alternative_readings:
  - the holy angels
  - the offspring of heaven
  rationale: In the Parables, where the Ge'ez is effectively the sole witness for
    this workflow, unusual expressions should be preserved transparently unless the
    sense is impossible. The phrase may denote angelic beings in filial relation,
    but the text as given should stand.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
