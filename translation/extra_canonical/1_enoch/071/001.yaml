translation:
  text: 'And after this it happened: my spirit was taken up, and it ascended into
    the heavens; and I saw the sons of the holy angels walking upon a flame of fire,
    and their garments were white, and their faces shone like snow.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'the sons of the holy angels' is unusual and may be understood
      more broadly as angelic beings associated with the holy angels. The Ge'ez wording
      is retained rather than simplified.
    reason: lexical_alternative
  - marker: b
    text: The bracketed word in the source line is textually uncertain. The translation
      reflects the clear sense of radiance in the clause as a whole without pressing
      that uncertain form too far.
    reason: textual_variant
  - marker: c
    text: '''Like snow'' renders the comparison naturally in context as an image of
      dazzling whiteness and brightness.'
    reason: cultural_note
lexical_decisions:
- source_word: እምድኅረዝ
  chosen: after this
  alternatives:
  - afterward
  - after these things
  lexicon: Dillmann
  rationale: A standard narrative transition in apocalyptic report. 'After this' preserves
    the visionary sequence without over-formalizing.
- source_word: ትትከበት መንፈስየ
  chosen: my spirit was taken up
  alternatives:
  - my spirit was lifted up
  - my spirit was carried away
  lexicon: Dillmann
  rationale: The passive-like sense with 'my spirit' fits the visionary transport
    context better than a merely internal emotional sense. 'Taken up' keeps the ascent
    vivid and concise.
- source_word: ተዐርገ ውስተ ሰማያት
  chosen: it ascended into the heavens
  alternatives:
  - it went up into heaven
  - it ascended to the heavens
  lexicon: Dillmann
  rationale: The plural 'heavens' should be preserved in apocalyptic cosmology. 'Ascended'
    matches the elevated register of visionary ascent.
- source_word: ወርኢክዎሙ
  chosen: and I saw
  alternatives:
  - and I beheld
  lexicon: Dillmann
  rationale: Simple visionary reporting formula; 'I saw' is readable modern English
    while retaining directness.
- source_word: ለውሉዶሙ ለመላእክት ቅዱሳን
  chosen: the sons of the holy angels
  alternatives:
  - the offspring of the holy angels
  - their sons, the holy angels
  - the children of the holy angels
  lexicon: Dillmann
  rationale: The Ge'ez most naturally reads 'the sons of the holy angels,' not simply
    'the holy angels' themselves. Because the phrase is unusual and potentially ambiguous,
    it is preserved rather than normalized away.
- source_word: ይከይዱ
  chosen: walking
  alternatives:
  - going
  - moving about
  lexicon: Dillmann
  rationale: A participial or durative sense suits the scene description. 'Walking'
    preserves the concrete imagery.
- source_word: ዲበ ላህበ እሳት
  chosen: upon a flame of fire
  alternatives:
  - on a fiery flame
  - upon flames of fire
  lexicon: Dillmann
  rationale: The singular construction is retained as much as possible. The phrase
    is intentionally vivid and should not be flattened into 'in fire' or 'through
    fire.'
- source_word: አልባሶሙ ጻዓዳ
  chosen: their garments were white
  alternatives:
  - their clothing was white
  - their robes were white
  lexicon: Dillmann
  rationale: '''Garments'' is broad and faithful; ''robes'' would add specificity
    not demanded by the text.'
- source_word: '[ወዐጸፎሙ]'
  chosen: and their faces shone
  alternatives:
  - and their appearance was radiant
  - and they were wrapped
  lexicon: Dillmann
  rationale: The bracketed reading is textually uncertain in the OCR line. The translation
    does not force this term directly into the main line; instead the sentence is
    carried by the clearer adjacent descriptor of brightness. A footnote records the
    uncertainty.
- source_word: ብሩሃን ገጾሙ ከመ በረድ
  chosen: their faces shone like snow
  alternatives:
  - their faces were bright like snow
  - their countenances were radiant like snow
  - their faces were bright as ice
  lexicon: Dillmann
  rationale: ብሩሃን conveys brightness/radiance, and በረድ in this context is best taken
    as 'snow,' a common whiteness image, rather than 'hail' or 'ice.' 'Shone like
    snow' keeps both luminosity and whiteness in idiomatic English.
