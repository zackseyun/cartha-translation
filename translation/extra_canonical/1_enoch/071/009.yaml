translation:
  text: And there came out from that house Mikael and Rufael and Gabr'el and Fanuel,
    and many holy angels without number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The names are transliterated from the Ge'ez forms rather than replaced with
      more familiar English spellings such as Michael, Raphael, Gabriel, and Phanuel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወወፅኡ
  chosen: and there came out
  alternatives:
  - and they went out
  - and they came forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes exiting or coming out. 'There came out' preserves the
    narrative movement from the house while sounding natural in English; the plural
    subject is supplied by the following names.
- source_word: እምኔ ውእቱ ቤት
  chosen: from that house
  alternatives:
  - out of that house
  - from this house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: እምኔ marks separation/source, ቤት is 'house,' and ውእቱ points to a definite
    previously mentioned location. 'That house' best reflects the deictic sense in
    context.
- source_word: ሚካኤል
  chosen: Mikael
  alternatives:
  - Michael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Project policy prefers transliterating personal names from the source
    form rather than defaulting to familiar anglicized biblical spellings.
- source_word: ሩፋኤል
  chosen: Rufael
  alternatives:
  - Raphael
  - Rufa'el
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez form is closer to 'Rufael' than the traditional English 'Raphael.'
    A source-oriented transliteration is preferred.
- source_word: ገብርኤል
  chosen: Gabr'el
  alternatives:
  - Gabriel
  - Gabreel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez spelling reflects the consonantal shape gabr- rather than the
    fully anglicized 'Gabriel.' The apostrophe lightly marks the syllabic break without
    overcomplicating the name.
- source_word: ፋኑኤል
  chosen: Fanuel
  alternatives:
  - Phanuel
  - Fanuel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward transliteration from Ge'ez is preferable to the Greek-influenced
    'Phanuel.'
- source_word: ብዙኃን ቅዱሳን መላእክት
  chosen: many holy angels
  alternatives:
  - many angels, holy ones
  - many sacred angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase naturally reads as adjective + adjective/noun cluster describing
    the angels. 'Holy angels' preserves the apocalyptic register and avoids flattening
    ቅዱሳን.
- source_word: እለ አልቦሙ ኍልቈ
  chosen: without number
  alternatives:
  - whose number was not
  - numberless
  - beyond counting
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause literally indicates that there was no number for
    them. 'Without number' is concise, elevated, and faithful to the idiom.
