theological_decisions:
- issue: Rendering of ቅዱሳን in an angelic context
  chosen_reading: holy angels
  alternative_readings:
  - saintly angels
  - angels who are holy
  rationale: In Enochic literature, 'holy ones' can refer to heavenly beings. Here
    ቅዱሳን directly qualifies መላእክት, so 'holy angels' is the clearest rendering without
    importing later ecclesial senses of 'saints.'
  doctrine_reference: Preserve local passage meaning and avoid later doctrinal harmonization.
