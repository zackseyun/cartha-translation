translation:
  text: And I saw angels beyond number, thousands of thousands and ten thousand times
    ten thousand, surrounding that house; and Mikael and Rufael and Gabrʾel and Fanʾuel,
    and the holy angels who are above the heavens, were going in and coming out of
    that house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The immense-number formula is a conventional apocalyptic way of depicting
      an uncountable heavenly multitude; the translation keeps the wording close to
      the Ge'ez rather than replacing it with a more familiar biblical formula.
    reason: cultural_note
  - marker: b
    text: 'The names are transliterated from the Ge''ez forms here: Mikael, Rufael,
      Gabrʾel, Fanʾuel. More familiar English spellings are Michael, Raphael, Gabriel,
      and Phanuel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - And I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common visionary narrative verb; 'And I saw' preserves the apocalyptic
    report style in readable modern English without archaizing.
- source_word: መላእክተ
  chosen: angels
  alternatives:
  - messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this heavenly throne-room context the referent is clearly celestial
    beings, so 'angels' is the natural and contextually precise rendering.
- source_word: እለ ኢይትኌለቍ
  chosen: beyond number
  alternatives:
  - who could not be counted
  - innumerable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes incapacity to count. 'Beyond number' is concise, elevated,
    and fits the following numerical hyperbole without redundancy.
- source_word: አእላፈ አእላፍ
  chosen: thousands of thousands
  alternatives:
  - thousand thousands
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the repeated apocalyptic number formula in idiomatic English
    while retaining its cumulative force.
- source_word: ወትእልፊተ ትእልፊት
  chosen: ten thousand times ten thousand
  alternatives:
  - myriads of myriads
  - ten thousands of ten thousands
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez reflects the standard immense-number formula. 'Ten thousand
    times ten thousand' is transparent and avoids importing later traditional phrasing
    not required by this text.
- source_word: የአውድዎ ለውእቱ ቤት
  chosen: surrounding that house
  alternatives:
  - encircling that house
  - around that house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys being around or encircling. 'Surrounding' preserves
    the visual scene of the heavenly court gathered about the house.
- source_word: ቤት
  chosen: house
  alternatives:
  - dwelling
  - palace
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text says 'house.' In this visionary context it likely refers to
    the heavenly dwelling seen earlier, but 'house' should be retained rather than
    interpretively elevated to 'palace' or generalized to 'dwelling.'
- source_word: ሚካኤል ወሩፋኤል ወገብርኤል ወፋኑኤል
  chosen: Mikael and Rufael and Gabrʾel and Fanʾuel
  alternatives:
  - Michael and Raphael and Gabriel and Phanuel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Project philosophy prefers transliterating names from the source form
    rather than silently normalizing them to more familiar later spellings. The Ge'ez
    forms are therefore reflected directly in English transliteration.
- source_word: መላእክተ ቅዱሳን
  chosen: the holy angels
  alternatives:
  - the angels of holiness
  - the sacred angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward attributive construction; 'holy angels' is the most natural
    English equivalent and preserves the text's distinction of this heavenly group.
- source_word: እለ መልዕልተ ሰማያት
  chosen: who are above the heavens
  alternatives:
  - who were over the heavens
  - who are in the highest heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is spatial and exalted. 'Above the heavens' preserves the
    cosmological imagery without over-interpreting it as a technical heaven-level
    scheme.
- source_word: ይበውኡ ወይወፅኡ
  chosen: were going in and coming out
  alternatives:
  - entered and went out
  - go in and go out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs depict repeated movement into and out of the house.
    The progressive English form best conveys the ongoing visionary action.
