theological_decisions:
- issue: Whether to normalize the immense-number formula to a traditional liturgical
    or biblical-sounding expression
  chosen_reading: thousands of thousands and ten thousand times ten thousand
  alternative_readings:
  - thousand thousands and myriad myriads
  - myriads upon myriads and thousands upon thousands
  rationale: The verse uses a stock apocalyptic enumeration, but the translation should
    remain anchored in the Ge'ez wording rather than importing familiar phrasing from
    Daniel, Revelation, or later English tradition.
  doctrine_reference: Translation philosophy §1 original-language primacy; book context
    note 5 not to back-port canonical phrasing.
- issue: Whether 'house' should be interpreted as 'palace' or 'temple'
  chosen_reading: house
  alternative_readings:
  - palace
  - temple
  - dwelling
  rationale: Although the setting is a heavenly court and the referent may function
    as a divine dwelling, the Ge'ez simply says 'house.' Preserving that term avoids
    over-resolving the imagery.
  doctrine_reference: Translation philosophy §3 preserve theological tension rather
    than resolve it.
