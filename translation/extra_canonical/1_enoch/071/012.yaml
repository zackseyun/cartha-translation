theological_decisions:
- issue: Rendering the divine title ርእሰ መዋዕል
  chosen_reading: Head of Days
  alternative_readings:
  - Ancient of Days
  - Head of the Days
  rationale: The Enochic title should be translated from the Ge'ez wording itself,
    not harmonized to Danielic or later traditional English. 'Head of Days' preserves
    the distinctive diction of the Parables and avoids importing canonical phrasing
    not present in this witness.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; do not over-harmonize with later Christian usage.'
