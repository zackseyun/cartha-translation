theological_decisions:
- issue: Whether to render ርእሰ መዋዕል with the traditional title 'Ancient of Days'
  chosen_reading: the Head of Days
  alternative_readings:
  - the Ancient of Days
  rationale: The Ge'ez wording is translated directly to preserve transparency and
    avoid automatic harmonization with Daniel 7 or later tradition. The allusion may
    still be recognized by readers, but the main text remains anchored in the witness
    at hand.
  doctrine_reference: Translation philosophy §Original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.
