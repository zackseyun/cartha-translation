translation:
  text: And with them was the Head of Days, and his head was like white and pure wool,
    and his garment cannot be described.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ancient of Days.' The traditional rendering reflects the likely
      Danielic resonance of the title, but the Ge'ez here reads more literally 'Head
      of Days.'
    reason: lexical_alternative
  - marker: b
    text: The final phrase may also be understood as 'cannot be explained/interpreted.'
      The sense is that the garment surpasses ordinary description.
    reason: lexical_alternative
  - marker: c
    text: Or 'And among them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ርእሰ መዋዕል
  chosen: the Head of Days
  alternatives:
  - the Head of the Days
  - the Ancient of Days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering of the Ge'ez expression preserves the title as it
    stands in this Enochic context. 'Ancient of Days' is a familiar interpretive equivalent
    influenced by Danielic tradition, but the project prefers translating from the
    local wording rather than importing a more traditional title.
- source_word: ፀምር
  chosen: wool
  alternatives:
  - hair
  - fleece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The comparison introduced by ከመ (''like/as'') points to wool as the
    object of comparison, not to hair itself. This keeps the image concrete: the head
    was like white, pure wool.'
- source_word: ጻዕዳ
  chosen: white
  alternatives:
  - bright
  - shining
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective most naturally denotes whiteness here, fitting the visual
    purity imagery of the vision.
- source_word: ንጹሕ
  chosen: pure
  alternatives:
  - clean
  - spotless
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Pure'' preserves both the visual and symbolic force of the adjective
    without over-interpreting it as ritual or moral purity alone.'
- source_word: ልብሱ
  chosen: his garment
  alternatives:
  - his clothing
  - his robe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of the noun for clothing. 'Garment' suits
    the elevated register and avoids specifying a robe where the Ge'ez is broader.
- source_word: ዘኢይትረጐም
  chosen: is beyond description
  alternatives:
  - cannot be described
  - cannot be interpreted
  - cannot be translated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can carry senses related to explaining or interpreting. In this
    visionary context, the phrase most naturally means that the garment defies adequate
    description. This avoids the misleadingly technical sense 'cannot be translated'
    in English while preserving the idea of inexpressibility.
