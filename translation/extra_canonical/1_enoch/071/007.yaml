translation:
  text: And around were the seraphim and the cherubim and the ophannim, and these
    are they who do not sleep and who keep watch over the throne of his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Ophannim'' is a transliterated name for a heavenly order; the underlying
      sense is related to ''wheels.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: አውዶ
  chosen: around were
  alternatives:
  - surrounded
  - were around
  lexicon: Dillmann
  rationale: The term introduces the beings as positioned around the visionary center.
    'Around were' preserves the scene-setting order of the Ge'ez better than a more
    interpretive 'surrounded.'
- source_word: ሱራፌን
  chosen: seraphim
  alternatives:
  - burning ones
  lexicon: Dillmann
  rationale: A transliterated angelic class is preferable here, preserving the apocalyptic
    register and traditional celestial taxonomy rather than paraphrasing the title.
- source_word: ኪሩቤን
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: Dillmann
  rationale: The formal plural 'cherubim' matches the elevated register and keeps
    consistency with established rendering of this angelic order.
- source_word: አፋኒን
  chosen: ophannim
  alternatives:
  - wheels
  lexicon: Dillmann
  rationale: The Ge'ez reflects the traditional angelic designation derived from 'wheels.'
    Because the verse lists celestial orders in parallel, transliteration better preserves
    the class-name force than the literal 'wheels.'
- source_word: እሙንቱ
  chosen: these are they
  alternatives:
  - these
  - these were they
  lexicon: Dillmann
  rationale: This demonstrative-pronominal expression identifies the listed beings
    with the following description. 'These are they' preserves the emphatic identification.
- source_word: እለ ኢይነውሙ
  chosen: who do not sleep
  alternatives:
  - who never sleep
  - who do not slumber
  lexicon: Dillmann
  rationale: The plain negated verb of sleeping is best rendered directly. 'Do not
    sleep' is transparent and avoids importing biblical idiom not explicit in the
    Ge'ez.
- source_word: የዐቅቡ
  chosen: keep watch over
  alternatives:
  - guard
  - watch
  lexicon: Dillmann
  rationale: The verb carries a sense of guarding or watching attentively. 'Keep watch
    over' preserves both vigilance and protective oversight in this throne-room setting.
- source_word: መንበረ ስብሐተ ዚአሁ
  chosen: the throne of his glory
  alternatives:
  - his glorious throne
  - the throne of his majesty
  lexicon: Dillmann
  rationale: 'A more literal construction is preferable: noun plus genitive-like complement.
    ''The throne of his glory'' preserves the apocalyptic weight and avoids smoothing
    into a conventional English epithet.'
