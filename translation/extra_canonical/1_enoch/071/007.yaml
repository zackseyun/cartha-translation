theological_decisions:
- issue: Rendering named heavenly beings in an apocalyptic throne vision
  chosen_reading: Use transliterated class names 'seraphim,' 'cherubim,' and 'ophannim'
  alternative_readings:
  - Translate አፋኒን literally as 'wheels'
  - Render all three more generically as angelic beings
  rationale: The verse catalogs distinct heavenly orders around the divine throne.
    Transliteration preserves the text's cosmological specificity and avoids flattening
    visionary imagery into generic angel-language.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; translate
    titles but transliterate names/classes where meaning would otherwise be flattened.'
