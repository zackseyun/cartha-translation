lexical_decisions:
- source_word: ርእሰ መዋዕል
  chosen: Head of Days
  alternatives:
  - Head of the Days
  - Ancient of Days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering preserves the distinctive Enochic title in the Ge'ez. 'Ancient of Days' would import the familiar Danielic English tradition and potentially over-harmonize; 'Head of Days' keeps the imagery and title-like force while remaining readable.
- source_word: መጽአ
  chosen: came
  alternatives:
  - arrived
  - approached
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The common motion verb is best rendered simply as 'came.' This preserves the visionary narrative sequence without unnecessary elevation.
- source_word: ምስለ
  chosen: with
  alternatives:
  - together with
  - accompanied by
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition straightforwardly marks accompaniment. 'With' is concise and fits the list structure.
- source_word: ሚካኤል ወሩፋኤል ወገብርኤል ወፋኑኤል
  chosen: Mikael and Rufael and Gabrieel and Fanuel
  alternatives:
  - Michael and Raphael and Gabriel and Phanuel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Names are transliterated rather than translated, following project philosophy. The spellings are kept close to the Ge'ez forms in the supplied witness rather than normalized to more familiar later English biblical forms.
- source_word: አእላፍ ወትእልፊተ
  chosen: thousands and ten thousands
  alternatives:
  - thousands and myriads
  - thousands upon thousands
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired numerical terms are retained concretely. 'Ten thousands' reflects the second term more transparently than the interpretive 'myriads,' and avoids smoothing the repetitive apocalyptic counting formula.
- source_word: መላእክት
  chosen: angels
  alternatives:
  - messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this heavenly throne-room context, 'angels' is the natural and contextually specific rendering.
- source_word: እለ አልቦሙ ኍልቈ
  chosen: who have no number
  alternatives:
  - whose number does not exist
  - who are without count
  - who cannot be counted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the idiom of innumerability while staying close to the Ge'ez wording. 'Who cannot be counted' is possible, but 'who have no number' better reflects the expression's stark apocalyptic style.
