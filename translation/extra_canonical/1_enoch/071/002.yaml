theological_decisions:
- issue: Rendering the divine title እግዚአ መንፈሳት
  chosen_reading: the Lord of Spirits
  alternative_readings:
  - the Lord of the spirits
  rationale: The title is formulaic in the Parables and should be preserved as a title
    rather than flattened into a generic descriptive phrase. This also maintains consistency
    across the section while remaining faithful to the Ge'ez wording.
  doctrine_reference: Translation philosophy §Consistency of key terms, or documented
    exception
- issue: Meaning of the gemstone comparison
  chosen_reading: shone like hyacinth
  alternative_readings:
  - shone like jacinth
  - shone like a precious stone
  rationale: The verse compares the fire's light to a gem-like brilliance. Because
    exact ancient gemstone identification is uncertain, the main text keeps the traditional
    mineral term while a footnote records the lexical uncertainty.
  doctrine_reference: Translation philosophy §Preserve theological tension rather
    than resolve it
