translation:
  text: And I saw two rivers of fire, and the light of that fire shone like hyacinth,
    and I fell on my face before the Lord of Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez term rendered 'hyacinth' likely refers to a gemstone; 'jacinth'
      is another possible English equivalent.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the light of that fire' is somewhat compressed in the Ge'ez
      and could also be understood more loosely as 'its fiery radiance.'
    reason: alternative_reading
lexical_decisions:
- source_word: ክልኤተ
  chosen: two
  alternatives:
  - a pair of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward numeral; 'two' is the natural English equivalent.
- source_word: አፍላገ
  chosen: rivers
  alternatives:
  - streams
  - channels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes flowing watercourses; in this visionary context 'rivers
    of fire' preserves the striking apocalyptic image better than the weaker 'streams'.
- source_word: እሳት
  chosen: fire
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic noun; repeated in the verse and retained both times to preserve
    the imagery.
- source_word: ብርሃነ
  chosen: the light
  alternatives:
  - brightness
  - radiance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered 'the light' because the phrase appears to speak of the visible
    shining of the fire itself. 'Radiance' is possible but less direct.
- source_word: ዝኩ
  chosen: that
  alternatives:
  - this
  - its
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Taken as a demonstrative linking the light specifically to the previously
    mentioned fire: ''the light of that fire.'' Because the text is Ge''ez-only here
    and somewhat compressed, ''its fire/light'' is possible, but ''that'' best reflects
    the demonstrative force.'
- source_word: ከመ
  chosen: like
  alternatives:
  - as
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard comparative particle; 'like' is idiomatic in English.
- source_word: ያክንት
  chosen: hyacinth
  alternatives:
  - jacinth
  - precious stone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely refers to the gemstone traditionally identified as hyacinth/jacinth.
    'Hyacinth' keeps the gem-like comparison without over-explaining the mineral identification.
- source_word: ያበርህ
  chosen: shone
  alternatives:
  - gleamed
  - gave light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A verb of shining/illumining; 'shone' is concise and natural while preserving
    the visual force.
- source_word: ወወደቁ፡ በገጽየ
  chosen: and I fell on my face
  alternatives:
  - and I fell upon my face
  - and I prostrated myself
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom expresses bodily prostration in reverence or overwhelm. 'I
    fell on my face' preserves the vivid physical posture without paraphrase.
- source_word: ቅድመ
  chosen: before
  alternatives:
  - in the presence of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard preposition; 'before' is concise and fitting in elevated English.
- source_word: እግዚአ፡ መንፈሳት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a recurring divine title in 1 Enoch. 'Lord of Spirits' preserves
    the established title form and the text's elevated register.
