theological_decisions:
- issue: Nature of Enoch's ascent
  chosen_reading: my spirit was taken up
  alternative_readings:
  - I myself was taken up bodily
  - my mind was elevated in vision
  rationale: The Ge'ez explicitly names Enoch's spirit. The translation preserves visionary ascent language without resolving whether the experience is bodily or purely inward.
  doctrine_reference: Preserve theological tension rather than resolve it.
