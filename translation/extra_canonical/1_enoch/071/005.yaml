translation:
  text: And my spirit was hidden in the heaven of heavens, and I saw there, in the midst of that light, something built of stones of hail, and in the midst of those stones were tongues of living fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The line about what Enoch saw in the light is difficult in the Ethiopic. The translation renders it cautiously as a constructed thing or edifice within the radiance.
    reason: textual_variant
  - marker: b
    text: '''Stones of hail'' may also be understood as hailstones or possibly icy stones; the image is intentionally left concrete and strange.'
    reason: lexical_alternative
  - marker: c
    text: Or 'was taken up into'.
    reason: previous_rendering
lexical_decisions:
- source_word: ከበቶ
  chosen: was taken up
  alternatives:
  - was lifted up
  - was borne away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb describes Enoch's spirit being carried upward in visionary transport. 'Was taken up' preserves the passive, visionary force without over-specifying the mechanism.
- source_word: መንፈስየ
  chosen: my spirit
  alternatives:
  - my רוח-like inner being
  - my breath/spirit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the personal spirit in visionary ascent contexts; it should not be reduced to merely 'mind' or 'soul' here.
- source_word: ውስተ ሰማየ ሰማያት
  chosen: into the heaven of heavens
  alternatives:
  - into the highest heaven
  - into the heavens of heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled expression is a superlative heavenly designation. 'Heaven of heavens' preserves the elevated Semitic-style idiom better than flattening it to 'highest heaven'.
- source_word: ርኢኩ በህየ
  chosen: I saw there
  alternatives:
  - I looked there
  - I beheld there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple visionary report formula; 'I saw there' is clear modern English while retaining the directness of the vision narrative.
- source_word: ማእከለ ዝኩ ብርሃን
  chosen: in the midst of that light
  alternatives:
  - at the center of that light
  - within that radiance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase locates the object within a field of heavenly radiance. 'That light' keeps the demonstrative force and avoids interpretive expansion.
- source_word: ከመ ቦቱ ዘይትነደቅ
  chosen: something built
  alternatives:
  - a structure that was built
  - what had been constructed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The syntax is somewhat difficult, but it points to an edifice or constructed thing. 'Something built' keeps the wording cautious in a textually uncertain line.
- source_word: እምእብነ አስሐትያ
  chosen: of stones of hail
  alternatives:
  - from hailstones
  - of stones of ice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun likely refers to hail, yielding the striking apocalyptic image of a structure made from hail-stones. This preserves the concrete imagery rather than normalizing it into generic precious material.
- source_word: እበን ልሳናተ እሳት ሕያው
  chosen: tongues of living fire
  alternatives:
  - flames of living fire
  - fiery tongues alive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Tongues'' reflects the literal image of flame-shapes and should be preserved. ''Living fire'' keeps the vivid, animate quality of the heavenly scene.'
