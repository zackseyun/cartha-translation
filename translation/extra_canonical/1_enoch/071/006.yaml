theological_decisions:
- issue: Nature of the visionary perception
  chosen_reading: And my spirit saw
  alternative_readings:
  - And I saw in my spirit
  - And my soul saw
  rationale: The Ge'ez explicitly names the spirit as the perceiving subject. Retaining
    this wording preserves the visionary register and avoids reducing the experience
    to ordinary sight.
  doctrine_reference: Preserve apocalyptic imagery; original-language primacy over
    translation tradition.
