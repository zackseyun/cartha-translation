translation:
  text: And my spirit saw the encircling wall that encircled that house of fire, and
    from its four sides were rivers full of living fire, and they surrounded that
    house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The repeated Ge'ez wording for 'encircle/surround' is retained in English
      as much as possible to preserve the verse's emphasis on enclosure.
    reason: lexical_alternative
  - marker: b
    text: '''Living fire'' is a literal rendering of an unusual phrase; it may denote
      fire that is animate, active, or intensely vital rather than ordinary flame.'
    reason: lexical_alternative
  - marker: c
    text: The term rendered 'sides' can also mean extremities or quarters; 'corners'
      is possible but less certain.
    reason: alternative_reading
lexical_decisions:
- source_word: መንፈስየ
  chosen: my spirit
  alternatives:
  - my breath
  - my soul
  lexicon: Dillmann Lexicon
  rationale: In visionary contexts መንፈስ commonly denotes the seer's spirit rather
    than mere breath. 'My spirit' preserves the apocalyptic mode of perception without
    psychologizing it.
- source_word: አውዶ / ዘየአውዶ
  chosen: the encircling wall that encircled
  alternatives:
  - enclosure that enclosed
  - circuit that surrounded
  - wall surrounding
  lexicon: Dillmann Lexicon
  rationale: The repeated form appears to emphasize surrounding or enclosing. Rendering
    one occurrence substantivally ('encircling wall') and the second verbally ('encircled')
    preserves the repetition and the image of a bounded structure without awkward
    redundancy.
- source_word: ቤተ እሳት
  chosen: house of fire
  alternatives:
  - fiery house
  - house of flame
  lexicon: Dillmann Lexicon
  rationale: A more formal rendering keeps the genitival force visible and preserves
    the stark apocalyptic image. 'Fiery house' is smoother but less transparent.
- source_word: እምአርባዕቱ አጽናፊሁ
  chosen: from its four sides
  alternatives:
  - from its four corners
  - from its four extremities
  lexicon: Dillmann Lexicon
  rationale: አጽናፍ can denote extremity, border, or quarter. 'Sides' is clear English
    and fits architectural imagery; 'corners' is possible but too specific where the
    Ge'ez may mean the four bounds generally.
- source_word: አፍላገ
  chosen: rivers
  alternatives:
  - streams
  - watercourses
  lexicon: Dillmann Lexicon
  rationale: The plural denotes substantial flowing channels. 'Rivers' best matches
    the grandeur of the vision.
- source_word: ምሉኣነ እሳተ ሕያው
  chosen: full of living fire
  alternatives:
  - filled with living fire
  - full of live fire
  - full of fire alive
  lexicon: Dillmann Lexicon
  rationale: The phrase is unusual and vivid. 'Living fire' preserves the personified
    or active quality of the fire better than flattening it to 'blazing fire' or 'burning
    fire'.
- source_word: የአውድዎ
  chosen: they surrounded
  alternatives:
  - they encircled
  - they enclosed
  lexicon: Dillmann Lexicon
  rationale: This resumes the enclosing motif from the earlier repeated root. 'Surrounded'
    is natural English while preserving the repeated imagery of encirclement.
