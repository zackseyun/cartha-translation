theological_decisions:
- issue: Identity of 'the holy ones'
  chosen_reading: the holy ones
  alternative_readings:
  - the saints
  - the angels
  - the consecrated ones
  rationale: In Enochic literature this term can denote heavenly holy beings and sometimes the righteous. Here, in a cosmic-vision setting about heavenly storehouses and celestial emergence, a heavenly referent is likely, but the text itself does not specify more narrowly. Therefore the broader 'holy ones' is retained.
  doctrine_reference: Preserve theological tension rather than resolve it; keep contested terms locally grounded.
