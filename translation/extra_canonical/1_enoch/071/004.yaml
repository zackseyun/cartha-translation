lexical_decisions:
- source_word: አርአየኒ
  chosen: he showed me
  alternatives:
  - he caused me to see
  - he revealed to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the standard causative/showing form, fitting visionary narration. 'He showed me' is natural English while preserving the report structure.
- source_word: ኵሎ ኅቡኣተ
  chosen: all the hidden things
  alternatives:
  - all the secrets
  - all the concealed things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural with the adjective/noun for what is hidden points to concealed realities disclosed in vision. 'Hidden things' preserves apocalyptic mystery language without over-interpreting as esoteric 'secrets' alone.
- source_word: አጽናፈ ሰማይ
  chosen: the ends of heaven
  alternatives:
  - the extremities of heaven
  - the borders of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a cosmic-spatial expression common to apocalyptic style. 'Ends of heaven' is idiomatic and preserves the imagery better than a flattened paraphrase.
- source_word: መዛግብተ
  chosen: storehouses
  alternatives:
  - treasuries
  - repositories
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes treasuries or storehouses. In cosmic contexts 'storehouses' better evokes apocalyptic imagery of heavenly chambers from which created phenomena emerge.
- source_word: ከዋክብት ወብርሃናት
  chosen: the stars and the lights
  alternatives:
  - the stars and the luminaries
  - the stars and the shining ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired terms likely distinguish stars from other heavenly lights/luminaries. 'Lights' is slightly more readable; the alternative 'luminaries' is possible and noted in a footnote.
- source_word: እምኀበ ወፅኡ
  chosen: from where they come forth
  alternatives:
  - whence they go out
  - from where they emerge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction indicates source/origin of movement. 'Come forth' preserves elevated register and cosmic procession imagery.
- source_word: ለገጸ ቅዱሳን
  chosen: before the face of the holy ones
  alternatives:
  - before the holy ones
  - in the presence of the holy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'to/before the face of the holy ones.' Retaining 'face' keeps the Semitic-apocalyptic texture, though English readers can understand it as presence.
