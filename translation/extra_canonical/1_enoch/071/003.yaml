theological_decisions:
- issue: Whether to render the angelic rank with the traditional term 'archangel'
  chosen_reading: one of the chief angels
  alternative_readings:
  - one of the archangels
  - one of the heads of the angels
  rationale: Because the Parables are effectively Ge'ez-only here, the translation
    avoids overconfident use of a later technical term where the Ge'ez more literally
    indicates chief/head status among angels.
  doctrine_reference: 'Translation philosophy: preserve ambiguity where the source
    is not fully determinate; translate titles/roles by meaning rather than tradition
    when possible.'
- issue: Whether ጽድቅ should be rendered 'righteousness' or 'justice'
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Both are possible in Semitic moral vocabulary, but the immediate pairing
    with mercy and the broader Enochic idiom favor 'righteousness' here. The alternative
    is preserved because the semantic range remains relevant.
  doctrine_reference: 'Contested terms table: default rendering of δικαιοσύνη-field
    terms as ''righteousness,'' with ''justice'' preserved where context may support
    it.'
