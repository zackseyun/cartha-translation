translation:
  text: And the angel Mika'el, one of the chief angels, took hold of my right hand
    and raised me up, and brought me out to all the hidden things; and he showed me
    all the hidden things of mercy, and he showed me all the hidden things of righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to all the secrets.' The Ge'ez repeatedly uses a term for things hidden
      or concealed; the repetition is preserved in the main text.
    reason: lexical_alternative
  - marker: b
    text: '''Chief angels'' more literally reflects ''heads/chiefs of the angels'';
      ''archangels'' is a possible but more technical rendering.'
    reason: lexical_alternative
  - marker: c
    text: '''Righteousness'' could also be rendered ''justice'' here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: መልአከ ሚካኤል
  chosen: the angel Mika'el
  alternatives:
  - the angel Michael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መልአከ means 'angel/messenger'; here the celestial being sense is clear.
    The name is transliterated rather than translated, following project policy for
    personal names.
- source_word: ፩እምአርእስተ መላእክት
  chosen: one of the chief angels
  alternatives:
  - one of the archangels
  - one of the heads of the angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally points to 'one from the heads/chiefs of the angels.'
    'Chief angels' preserves the rank idea without importing the later technical term
    'archangels' too confidently into this Ge'ez-only Parables context.
- source_word: አኃዘኒ እዴየ ዘየማን
  chosen: took hold of my right hand
  alternatives:
  - grasped my right hand
  - seized my right hand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys taking/holding. 'Took hold of' is natural English and
    preserves the concrete visionary action. ዘየማን specifies the right side/right hand.
- source_word: አንሥአኒ
  chosen: raised me up
  alternatives:
  - lifted me up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes lifting or raising. 'Raised me up' fits the sequence
    of angelic guidance and elevation.
- source_word: አውፅአኒ
  chosen: brought me out
  alternatives:
  - led me out
  - brought me forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'A causative of going out: the angel causes Enoch to go out. ''Brought
    me out'' is straightforward and preserves the movement.'
- source_word: ኀበ ኵሉ ኅቡአት
  chosen: to all the hidden things
  alternatives:
  - unto all the secrets
  - to all the concealed things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኅቡአት refers to hidden or concealed matters. 'Hidden things' preserves
    the apocalyptic sense while remaining readable. 'Secrets' is possible, but 'hidden
    things' better matches the repeated Ge'ez wording in this verse.
- source_word: ኅቡአተ ምሕረት
  chosen: the hidden things of mercy
  alternatives:
  - the secrets of mercy
  - the hidden treasures of mercy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construct links the concealed matters specifically with mercy. 'Mercy'
    is the most direct rendering of ምሕረት and should not be weakened to generic kindness.
- source_word: ኅቡአተ ጽድቅ
  chosen: the hidden things of righteousness
  alternatives:
  - the secrets of righteousness
  - the hidden things of justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጽድቅ can overlap with justice, but 'righteousness' is the project's default
    for this semantic field and fits the moral-apocalyptic register here. Repeating
    'hidden things' preserves the verse's deliberate parallelism.
