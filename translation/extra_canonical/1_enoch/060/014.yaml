  - by breath
  - by wind
  rationale: The verse describes thunder and lightning as coordinated by an unseen animating agency. Capitalized 'Spirit' preserves the possibility of divine ordering without denying the broader semantic range; the ambiguity is important and therefore footnoted rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it.
