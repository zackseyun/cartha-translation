theological_decisions:
- issue: Whether to render the repeated formula in a highly literal way ('the angel of it, he is...') or as an English naming construction
  chosen_reading: Rendered as 'its angel is named ...'
  alternative_readings:
  - '''its angel is ...'''
  - '''the angel thereof is ...'''
  rationale: The verse is a catalog of cosmic spirits and their appointed angels. The chosen wording preserves the apocalyptic worldview of delegated angelic governance while remaining readable modern English.
  doctrine_reference: Translation philosophy §§1, 5; preserve apocalyptic imagery per book-context guidance.
