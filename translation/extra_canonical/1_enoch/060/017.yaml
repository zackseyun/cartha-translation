translation:
  text: And the spirit of the hoarfrost is its own angel, and the spirit of the hail is a good angel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The first weather term is uncertain in nuance from the Ethiopic alone. It likely denotes a vaporous or mist-like phenomenon; 'mist' is a cautious rendering.
    reason: lexical_alternative
  - marker: b
    text: 'Literally, the Ethiopic repeats a possession-and-copula formula: ''the angel of it ... he/it is.'' The English expands this to ''its angel is named ...'' for clarity.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And the spirit of the mist—its angel is named Asahatiya—and the spirit of hail—its angel is named Her.'.
    reason: previous_rendering
lexical_decisions:
- source_word: መንፈሰ
  chosen: the spirit of
  alternatives:
  - spirit
  - wind of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construct-like repetition መንፈሰ X introduces personified cosmic forces in this context. 'The spirit of' preserves the apocalyptic personification better than reducing it to a mere weather term.
- source_word: አስሐትያ
  chosen: Asahatiya
  alternatives:
  - Asḥatiya
  - Asahatya
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This appears to be a proper angelic name. Per project philosophy, names are transliterated rather than translated. The exact vocalization is uncertain from Ethiopic alone, so a conservative transliteration is used.
- source_word: መልአክ
  chosen: angel
  alternatives:
  - messenger
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic catalog of cosmic agencies, 'angel' is the natural rendering and preserves the supernatural administrative role assigned to these forces.
- source_word: ዚአሁ
  chosen: is named
  alternatives:
  - of it
  - belongs to it
  - its
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bare literal sense points to possession ('its'), but in this naming formula the sense is that the angel belonging to that spirit bears the following name. English requires expansion for clarity.
- source_word: ውእቱ
  chosen: is named
  alternatives:
  - he is
  - it is
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This copular element completes the naming formula. Rendering the phrase as 'its angel is named ...' gives idiomatic English while preserving the structure.
- source_word: በረድ
  chosen: hail
  alternatives:
  - hailstorm
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary meteorological sense 'hail' fits the sequence of cosmic/weather spirits.
- source_word: ኄር
  chosen: Her
  alternatives:
  - Ḫer
  - Kher
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is another proper angelic name and is therefore transliterated. The initial consonant has no exact English equivalent; 'Her' is a simple conservative representation from the Ethiopic spelling.
