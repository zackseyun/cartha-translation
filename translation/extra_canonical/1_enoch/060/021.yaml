theological_decisions:
- issue: Whether to depersonalize the rain's agency into ordinary weather language
  chosen_reading: Retain 'the spirit of the rain' and angelic administration of the
    storehouse
  alternative_readings:
  - When the rainstorm is released from its reservoir
  - When rain comes from its storehouse
  rationale: The verse belongs to an apocalyptic cosmology in which natural phenomena
    are governed by heavenly agencies. The translation preserves that worldview rather
    than flattening it into modern impersonal meteorology.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; original-language
    primacy over translation tradition.'
