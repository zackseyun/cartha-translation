translation:
  text: And when the spirit of the rain is stirred from its storehouse, the angels
    come and open the storehouse and bring it out. And when it is scattered upon all
    the dry ground, it is joined with the water that is upon the dry ground; and whenever
    it is joined with the water upon the dry ground . . .
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez repeats the clause about being joined with the water upon the
      dry ground. The final phrase is difficult; it may indicate continued mingling
      or continued presence once the rain has joined the surface waters.
    reason: textual_variant
  - marker: b
    text: The verb rendered 'is poured out' can also carry the sense 'is scattered'
      or, more literally, 'is sown,' an image that suits rain spread over the land.
    reason: lexical_alternative
  - marker: c
    text: Or 'and whenever it is joined with the water upon the dry ground, it remains
      there at all times.'.
    reason: previous_rendering
  - marker: d
    text: Or 'is poured out'.
    reason: previous_rendering
lexical_decisions:
- source_word: መንፈሱ
  chosen: the spirit of
  alternatives:
  - its wind
  - its breath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መንፈስ commonly denotes spirit, wind, or breath. In this cosmological context
    tied to rain's operation, 'spirit of the rain' preserves the apocalyptic-personified
    force without reducing it to mere meteorology.
- source_word: ለዝናም
  chosen: the rain
  alternatives:
  - rainfall
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct object/genitival relation with መንፈሱ; 'rain' is the plain rendering.
- source_word: ይትኃወስ
  chosen: is stirred
  alternatives:
  - is moved
  - is set in motion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests movement or agitation. 'Is stirred' fits the image
    of a force being activated from a heavenly repository.
- source_word: መዝገበ
  chosen: storehouse
  alternatives:
  - treasury
  - repository
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard apocalyptic image for heavenly reserves of natural forces.
    'Storehouse' is clear and preserves the concrete imagery.
- source_word: ይመጽኡ መላእክት
  chosen: the angels come
  alternatives:
  - angels arrive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text explicitly attributes administration of the storehouse to angels;
    this should remain personal and active.
- source_word: ያርኅዉ
  chosen: open
  alternatives:
  - unlock
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb naturally fits opening a storehouse; 'unlock' would add specificity
    not explicit in the Ge'ez.
- source_word: ያወጽእዎ
  chosen: bring it out
  alternatives:
  - lead it out
  - cause it to come out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Causative sense is present, but 'bring it out' is idiomatic and keeps
    the object as the rain/spirit released from storage.
- source_word: ይዘራእ
  chosen: is poured out
  alternatives:
  - is scattered
  - is sown
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though the root can evoke sowing/scattering, in context of rain over
    dry land 'is poured out' best conveys the meteorological action while preserving
    distributive force.
- source_word: የብስ
  chosen: dry ground
  alternatives:
  - the earth
  - dry land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes dry land as opposed to waters. 'Dry ground' keeps the
    contrast explicit in this verse.
- source_word: ይትኃበር ምስለ ማይ
  chosen: joins itself with the water
  alternatives:
  - mingles with the water
  - is united with the water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The reflexive/passive sense suggests joining or combining. 'Joins itself
    with' preserves the vivid process without overinterpreting the mechanism.
- source_word: በኵሉ ጊዜ
  chosen: at all times
  alternatives:
  - always
  - continually
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A temporal formula indicating ongoing or regular persistence. 'At all
    times' is slightly more formal and suits the elevated register.
