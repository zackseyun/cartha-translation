theological_decisions:
- issue: Whether to preserve the literal anthropological term 'kidneys' or replace
    it with a modern idiom such as 'heart' or 'inward parts'
  chosen_reading: Retain 'kidneys' in the main text
  alternative_readings:
  - my inward parts were dissolved
  - my heart melted
  rationale: The project philosophy favors transparency to the source over smoothing
    inherited bodily imagery. In apocalyptic literature, bodily disintegration imagery
    should remain vivid and strange where the source warrants it.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
