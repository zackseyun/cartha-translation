translation:
  text: And a great trembling seized me, and fear took hold of me; and my loins were
    loosened, and my kidneys were dissolved, and I fell on my face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally 'my kidneys were dissolved.' In ancient Semitic-style bodily language,
      the kidneys can represent the inner self or deep emotions.
    reason: cultural_note
  - marker: b
    text: The clause about the loins may also be rendered 'my hips gave way' or 'my
      loins collapsed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ረዓድ ዐቢይ
  chosen: a great trembling
  alternatives:
  - a great shaking
  - great terror
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes intense bodily trembling or shaking. 'Trembling' preserves
    the physical, visionary reaction better than the more interpretive 'terror,' while
    'great' keeps the emphatic modifier.
- source_word: ነሥአኒ
  chosen: seized me
  alternatives:
  - lifted me
  - carried me
  - came upon me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with trembling as subject, the sense is that the trembling
    overtook or seized Enoch. 'Lifted me' would be a possible bare lexical sense elsewhere,
    but does not fit the fear reaction sequence here.
- source_word: ፍርሃት አሐዘኒ
  chosen: fear took hold of me
  alternatives:
  - fear seized me
  - I was afraid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the concrete idiom of fear grasping the speaker, preserving
    the apocalyptic bodily force rather than reducing it to a simple emotional statement.
- source_word: ሐቌየ ተቀጽዐ
  chosen: my loins were loosened
  alternatives:
  - my hips gave way
  - my strength in the loins collapsed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun refers to the loins/hip region, a common seat of bodily strength.
    'Were loosened' reflects collapse or giving way without over-paraphrasing.
- source_word: ኵልያትየ ተፈትሑ
  chosen: my kidneys were dissolved
  alternatives:
  - my inward parts melted
  - my reins were loosed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez term literally denotes kidneys. Because ancient anthropological
    language often uses kidneys as the seat of inner emotion, the literal rendering
    is kept for transparency, while 'were dissolved' conveys the image of inner collapse.
- source_word: ወወደቁ በገጽየ
  chosen: and I fell on my face
  alternatives:
  - and they fell before me
  - and I fell upon my face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is a standard bodily posture of collapse/prostration. Given
    the first-person sequence throughout the verse, the sense is best rendered as
    Enoch himself falling face-down.
