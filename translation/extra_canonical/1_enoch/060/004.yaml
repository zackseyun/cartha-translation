translation:
  text: And Michael sent another angel from among the holy ones, and he lifted me
    up. And when he lifted me up, my spirit entered in, for I was not able to endure
    the sight of that power and its shaking and the quaking of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'my spirit entered' is difficult in Ge'ez and may mean that Enoch's
      spirit returned to him or came into a new visionary state.
    reason: lexical_alternative
  - marker: b
    text: Or 'the sight of that mighty power and its tumult, and the quaking of heaven.'
      The exact relation of 'power,' 'shaking/tumult,' and 'heaven' is syntactically
      compressed.
    reason: alternative_reading
  - marker: c
    text: Or 'my spirit entered'.
    reason: previous_rendering
lexical_decisions:
- source_word: ፈነወ
  chosen: sent
  alternatives:
  - dispatched
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb naturally denotes sending or dispatching. 'Sent' is the plain
    English equivalent and keeps the narrative movement concise.
- source_word: ካልአ መልአከ
  chosen: another angel
  alternatives:
  - a second angel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks an additional angel distinct from Michael. 'Another
    angel' is idiomatic and sufficiently precise.
- source_word: እምቅዱሳን
  chosen: from among the holy ones
  alternatives:
  - from the holy ones
  - from among the saints
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition indicates origin from a group. 'Holy ones' preserves
    the apocalyptic celestial register better than 'saints,' which could over-associate
    the phrase with later Christian usage.
- source_word: አንሥአኒ
  chosen: lifted me up
  alternatives:
  - raised me
  - carried me up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates being raised upward. 'Lifted me up' preserves the
    visionary, bodily-spatial imagery.
- source_word: መንፈስየ ገብአት
  chosen: my spirit entered
  alternatives:
  - my spirit came in
  - my spirit returned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ethiopic wording is difficult, but the most direct rendering is that
    Enoch's spirit entered. Because the line is obscure in context, the translation
    stays close to the wording rather than paraphrasing a more interpretive sense.
- source_word: ኢክህልኩ ተዓግሦ
  chosen: I was not able to endure
  alternatives:
  - I could not bear
  - I was unable to withstand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The combination expresses incapacity to bear or endure what was seen.
    'Endure' fits the overwhelming visionary context.
- source_word: ራእየ ዝኩ ኃይል
  chosen: the sight of that power
  alternatives:
  - the vision of that power
  - the appearance of that mighty force
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ራእየ refers to what is seen, and ኃይል can denote power or might. 'The sight
    of that power' preserves the starkness of the phrase without over-interpreting
    the referent.
- source_word: ሀውከ
  chosen: shaking
  alternatives:
  - tumult
  - commotion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term suggests disturbance or agitation. 'Shaking' fits the immediate
    cosmic context and pairs naturally with the following clause about heaven.
- source_word: አንቀልቅለ ሰማይ
  chosen: the quaking of heaven
  alternatives:
  - the convulsion of heaven
  - heaven's trembling
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase evokes cosmic upheaval. 'Quaking of heaven' preserves apocalyptic
    imagery and avoids flattening it into generic disturbance.
