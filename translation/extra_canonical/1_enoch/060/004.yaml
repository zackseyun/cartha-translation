theological_decisions:
- issue: Identity of 'the holy ones'
  chosen_reading: celestial holy beings, likely angelic attendants
  alternative_readings:
  - human saints
  - a mixed heavenly assembly
  rationale: In this immediate apocalyptic setting, Michael sends another angel 'from
    among the holy ones,' which most naturally refers to the heavenly host rather
    than human righteous people.
  doctrine_reference: 'Book context: preserve local apocalyptic usage; do not harmonize
    with later Christian terminology.'
- issue: Sense of 'my spirit entered'
  chosen_reading: retain the difficult literal wording in the main text
  alternative_readings:
  - my spirit returned to me
  - I came to myself in spirit
  - the Spirit entered into me
  rationale: The Ge'ez line is obscure and the Parables lack external textual control
    here. Following project philosophy, the main text preserves the tension rather
    than resolving it by conjectural paraphrase.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it.'
