- issue: Whether ቀዳሜ ወድኃሬ should be rendered as a title-like expression ('the First and the Last')
  chosen_reading: what is first and what is last
  alternative_readings:
  - the first and the last
  rationale: In this context the phrase belongs to a list of cosmic extremities being shown by the angel, not clearly to a divine self-designation or title. The descriptive rendering preserves local sense and avoids later theological harmonization.
