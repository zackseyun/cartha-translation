translation:
  text: And another angel, who went with me and showed me what is hidden, told me what is first and what is last in heaven in the height, and beneath the earth in the depth, and at the ends of heaven, and at the foundations of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The line is a catalog of cosmic extremities revealed to Enoch. 'What is first and what is last' may also be rendered 'the first and the last,' but here it is taken descriptively rather than as a title.
    reason: lexical_alternative
  - marker: b
    text: The Ethiopic wording around 'in the depth' is somewhat difficult in this witness; the translation keeps the spatial sense without pressing to a more specific term such as 'abyss.'
    reason: textual_variant
  - marker: c
    text: Or 'And another angel, who went with me and showed me what is first and what is last in heaven, in the height and beneath, in the depth and at the ends of heaven, and at the foundations of heaven, said to me,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይቤለኒ
  chosen: said to me
  alternatives:
  - spoke to me
  - told me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard narrative speech formula; 'said to me' preserves the simple visionary report style without overinterpreting the speech act.
- source_word: መልአክ ካልእ
  chosen: another angel
  alternatives:
  - a second angel
  - an other angel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ካልእ marks another/additional figure rather than necessarily ordinal 'second'; 'another angel' is the most natural English equivalent.
- source_word: ዘምስሌየ የሐውር
  chosen: who went with me
  alternatives:
  - who was going with me
  - who walked with me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause identifies the angel accompanying the seer. 'Went with me' is idiomatic and keeps the movement sense without unnecessary aspectual weight.
- source_word: ወዘበኀቤኡ ያርእየኒ
  chosen: and showed me
  alternatives:
  - and was showing me
  - and caused me to see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause describes the angel's revelatory function. 'Showed me' is clear and preserves the visionary mediation.
- source_word: ቀዳሜ ወድኃሬ
  chosen: what is first and what is last
  alternatives:
  - the first and the last
  - what comes before and after
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pair likely denotes extremities or totality of what is revealed. Rendering with 'what is' avoids importing later title-language and keeps the descriptive force.
- source_word: በሰማየ
  chosen: in heaven
  alternatives:
  - of heaven
  - in the heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition is locative here. Singular 'heaven' fits the Ge'ez form and the immediate cosmic catalog.
- source_word: በውስተ ላዕሉ ወበታሕተ
  chosen: in the height and beneath
  alternatives:
  - above and below
  - in the upper region and in the lower
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase contrasts upper and lower cosmic regions. 'In the height and beneath' preserves the elevated apocalyptic register better than a flattened 'above and below.'
- source_word: ደብለ በመዓምቅ
  chosen: in the depth
  alternatives:
  - in the deep
  - in the abyss
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR is somewhat uncertain here, but the sense points to depth/deep place. 'In the depth' keeps the spatial parallelism and avoids overcommitting to 'abyss' where the wording is not explicit.
- source_word: በአጽናፈ ሰማይ
  chosen: at the ends of heaven
  alternatives:
  - at the extremities of heaven
  - at the edges of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: አጽናፍ commonly denotes extremity/edge. 'Ends of heaven' is vivid, natural, and preserves cosmic imagery.
- source_word: በመሠረተ ሰማይ
  chosen: at the foundations of heaven
  alternatives:
  - at heaven's foundations
  - at the bases of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase evokes cosmological architecture typical of apocalyptic literature. 'Foundations of heaven' preserves that imagery directly.
