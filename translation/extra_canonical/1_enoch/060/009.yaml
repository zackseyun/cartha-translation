translation:
  text: And I asked another angel that he should show me the power of those monsters—how they were separated on one day and cast, one into the depths of the sea, and one onto the dry land of the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The surrounding context identifies these two cosmic creatures more specifically, but this verse itself refers to them only as 'these monsters.'
    reason: cross_reference
  - marker: b
    text: Or 'their might' or possibly 'their nature'; the Ge'ez term centers on power, but in context it may imply the character or force of these beings.
    reason: lexical_alternative
  - marker: c
    text: 'The final phrase is difficult. The Ge''ez appears to contrast the sea with a dry wilderness region: literally something like ''on the dry land, in the desert.'''
    reason: textual_variant
  - marker: d
    text: Or 'these monsters—how they were separated on one day, and one was cast'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተስእእክዎ
  chosen: I asked
  alternatives:
  - I inquired of him
  - I requested of him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb introduces Enoch's question to the angel. 'I asked' is natural English and preserves the directness of the visionary dialogue.
- source_word: ካልእ መልአክ
  chosen: another angel
  alternatives:
  - a second angel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of the phrase, preserving the narrative shift from one angelic guide to another.
- source_word: ያርእየኒ
  chosen: should show me
  alternatives:
  - might show me
  - show me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form expresses the content of Enoch's request. 'Should show me' keeps the dependent sense after 'I asked' without sounding overly wooden.
- source_word: ኃይሎሙ
  chosen: the power
  alternatives:
  - their power
  - their might
  - their nature
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes power or might. 'The power of these monsters' best fits the immediate wording, though in context it may shade toward their force or nature.
- source_word: ዐናብርት
  chosen: monsters
  alternatives:
  - beasts
  - great creatures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context of primordial cosmic beings associated with sea and wilderness, 'monsters' preserves the apocalyptic and uncanny force better than the flatter 'beasts.'
- source_word: ተሌለዩ
  chosen: were separated
  alternatives:
  - were divided
  - were set apart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The passive sense is important: the creatures do not separate themselves but are separated. This fits the cosmological ordering implied in the verse.'
- source_word: በአሐቲ ዕለት
  chosen: on one day
  alternatives:
  - in one day
  - on a single day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A close rendering that preserves the temporal marker without over-interpreting whether it means a single moment or a particular day in primordial time.
- source_word: ተወድዩ
  chosen: was cast
  alternatives:
  - was thrown
  - was sent
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive verb suggests forcible placement. 'Was cast' suits the elevated register and the mythic scene.
- source_word: በልጕተ ባሕር
  chosen: into the depths of the sea
  alternatives:
  - into the abyss of the sea
  - into the deep of the sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the deep part of the sea, not merely the sea in general. 'Depths of the sea' is vivid and readable without importing later technical cosmological language.
- source_word: በየብስ በድው
  chosen: onto the dry land of the wilderness
  alternatives:
  - onto the dry wilderness
  - upon the dry land in the desert
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The wording combines dryness/land with wilderness. Rendering both elements preserves the contrast with the sea and the stark cosmic geography.
