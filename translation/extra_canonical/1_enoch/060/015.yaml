translation:
  text: For when the lightning flashes, the thunder gives its voice, and the spirit rests at its appointed time, and it divides equally among them; for the treasury of their times is of sand, and each of the two of them is held by a rein and turned back by the power of the spirit, and driven forward likewise according to the many regions of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wind' in both occurrences of 'spirit'; the verse moves within storm imagery, and the Ge'ez term can denote wind, breath, or spirit.
    reason: lexical_alternative
  - marker: b
    text: The final comparison is textually difficult in the Ethiopic witness; 'dwelling-places' could also be understood more broadly as habitations or regions of the earth.
    reason: textual_variant
  - marker: c
    text: The clause rendered 'he divides equally among them' is uncertain; a more cautious alternative is 'he apportions among them.'
    reason: alternative_reading
  - marker: d
    text: Or 'and he divides equally among them; for the treasury of their times is fixed, and they are stirred and moved by the power of the spirit, and purified from among them, like the many dwelling-places of the earth.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይበርቅ መብረቅ
  chosen: the lightning flashes
  alternatives:
  - lightning shines
  - the lightning gleams
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward verbal-nominal pairing for lightning activity. 'Flashes' preserves vivid apocalyptic force better than the flatter 'shines'.
- source_word: ነጐድጓድ ቃሎ ይሁብ
  chosen: the thunder gives its voice
  alternatives:
  - the thunder utters its voice
  - the thunder gives forth its sound
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom is more concrete than simply 'thunders.' 'Gives its voice' preserves the personified cosmic imagery characteristic of the passage.
- source_word: መንፈስ
  chosen: spirit
  alternatives:
  - wind
  - breath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can denote wind/breath/spirit. Here the surrounding meteorological imagery could support 'wind,' but the repeated use with agency and power in the verse favors 'spirit' in the main text, while preserving the meteorological alternative in a footnote.
- source_word: በጊዜሃ ያዐርፍ
  chosen: rests at its appointed time
  alternatives:
  - settles in its season
  - abides at its time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks ordered timing within cosmic processes. 'Appointed time' brings out the sense of divinely fixed season without over-paraphrasing.
- source_word: ዐሩየ ይከፍል ማእከሎሙ
  chosen: he divides equally among them
  alternatives:
  - he apportions in their midst
  - he distributes among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb clearly indicates division/apportionment. The exact force of ዐሩየ is difficult in this OCR context; 'equally' is a cautious attempt to preserve distributive force, but the simpler 'apportions among them' remains possible.
- source_word: መዝገበ ጊዜያቲሆሙ
  chosen: the treasury of their times
  alternatives:
  - the storehouse of their seasons
  - the repository of their appointed times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Apocalyptic cosmology often imagines heavenly storehouses or treasuries. 'Treasury' preserves that concrete image better than an abstract paraphrase.
- source_word: ዘኆጻ ውእቱ
  chosen: is fixed
  alternatives:
  - is determined
  - is prescribed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause indicates that these times are set or decreed. 'Is fixed' is concise and fits the cosmic-order theme.
- source_word: በአጓም ይትነኃዙ ወይትመየጡ
  chosen: they are stirred and moved
  alternatives:
  - they are shaken and agitated
  - they are driven and tossed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired reflexive/passive verbs suggest motion or agitation. 'Stirred and moved' is readable while retaining the doubled action.
- source_word: በኃይለ መንፈስ
  chosen: by the power of the spirit
  alternatives:
  - by the power of the wind
  - by the might of the spirit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase gives causal agency to መንፈስ. Because the verse is meteorological, 'wind' is possible, but 'spirit' better preserves the text's layered cosmological diction.
- source_word: ይትነጸኡ
  chosen: and purified
  alternatives:
  - and cleansed
  - and made pure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes cleansing/purification. 'Purified' keeps the elevated register and may reflect separation/refinement within cosmic processes.
- source_word: ከመዝ በከመ ብዙኃ አድዋስ ምድር
  chosen: like the many dwelling-places of the earth
  alternatives:
  - as with the many habitations of the earth
  - like the many regions of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The closing comparison is obscure in the OCR witness. 'Dwelling-places' is a cautious rendering of አድዋስ that preserves the concrete image without forcing a more specific geographical sense.
