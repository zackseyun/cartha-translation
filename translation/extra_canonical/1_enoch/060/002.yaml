translation:
  text: And the Head of Days was sitting upon the throne of his glory, and the angels
    and the righteous were standing around him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ancient of Days.' The Ge'ez title is rendered more literally here
      as 'the Head of Days' to preserve the wording of this passage without importing
      the familiar phrasing from Daniel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ርእሰ መዋዕል
  chosen: the Head of Days
  alternatives:
  - the Head of the Days
  - the Ancient of Days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering of the Ge'ez expression preserves the distinctive
    Enochic title without importing the more familiar Danielic phrase 'Ancient of
    Days' too quickly. 'Head of Days' keeps the imagery and avoids over-harmonization
    with later tradition.
- source_word: መንበረ ስብሐቲሁ
  chosen: the throne of his glory
  alternatives:
  - his glorious throne
  - the seat of his glory
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construct-like sequence is best represented straightforwardly as
    'the throne of his glory,' preserving the elevated apocalyptic register and the
    concrete enthronement imagery.
- source_word: ይነብር
  chosen: was sitting
  alternatives:
  - sat
  - dwelt
  - was seated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this visionary narrative context, the verb naturally describes enthroned
    posture. 'Was sitting' preserves the ongoing scene-setting force better than the
    simple past 'sat.'
- source_word: መላእክት
  chosen: the angels
  alternatives:
  - angels
  - messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic heavenly court setting, 'angels' is the most natural
    and contextually specific rendering.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  - righteous ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term regularly denotes righteous persons in Enochic literature.
    'The righteous' is clear, natural English and preserves the group's moral-theological
    identity.
- source_word: አውዶ
  chosen: around him
  alternatives:
  - round about
  - encircling him
  - around
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adverb conveys surrounding presence. 'Around him' makes explicit
    the relation to the enthroned figure and fits the heavenly court image.
- source_word: ይቆውሙ
  chosen: were standing
  alternatives:
  - stood
  - were stationed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb depicts attendants in a standing posture before the enthroned
    figure. 'Were standing' matches the scene-setting imperfective sense alongside
    'was sitting.'
