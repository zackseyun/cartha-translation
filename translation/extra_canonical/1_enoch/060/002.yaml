theological_decisions:
- issue: Rendering the divine title ርእሰ መዋዕል in relation to Danielic tradition
  chosen_reading: the Head of Days
  alternative_readings:
  - the Ancient of Days
  - the Head of the Days
  rationale: Because the Parables are effectively Ge'ez-only in this workflow and
    the project warns against over-harmonizing with later or more familiar biblical
    phrasing, the more literal 'Head of Days' is preferred in the main text. The Daniel-related
    alternative is preserved as a footnote possibility.
  doctrine_reference: Translation philosophy §1, §3; Book context notes on avoiding
    over-harmonization in the Parables
