theological_decisions:
- issue: Whether ኀይሉ ልዑል refers to an abstract divine power or the heavenly host belonging
    to the Most High
  chosen_reading: the host of the Most High
  alternative_readings:
  - the power of the Most High
  rationale: In context the phrase is followed by a vast enumeration of angels and
    cosmic disturbance. Reading it as the heavenly host best fits the apocalyptic
    scene and avoids an abrupt shift to abstraction.
  doctrine_reference: Preserve local passage sense and apocalyptic imagery rather
    than harmonizing or flattening.
- issue: How literally to render ሰማየ ሰማያት
  chosen_reading: the heaven of heavens
  alternative_readings:
  - the highest heaven
  rationale: The literal rendering preserves the text's cosmic idiom and theological
    elevation. A smoother superlative is possible, but the main text should retain
    the distinctive apocalyptic expression.
  doctrine_reference: Original-language primacy; preserve theological tension and
    imagery rather than smoothing.
