translation:
  text: In the five-hundredth year, in the seventh month, on the fourteenth day of
    the month, in the life of Henok, in that parable I saw that the heaven of heavens
    was shaken with a great shaking, and the host of the Most High, and the angels,
    thousands of thousands and ten thousand times ten thousand, were stirred up with
    a great commotion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the highest heaven.' The Ge'ez literally reads 'the heaven of heavens,'
      a superlative expression for the loftiest heavenly realm.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'the host of the Most High' could also be understood
      more abstractly as 'the power of the Most High,' but the immediate reference
      to angels in immense numbers favors a collective heavenly-host sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'was shaken violently'.
    reason: previous_rendering
lexical_decisions:
- source_word: በዓመት ፭ምእት
  chosen: in the five-hundredth year
  alternatives:
  - in year five hundred
  - in the five hundredth year
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase gives a dated visionary setting. English ordinal style ('five-hundredth
    year') reads naturally while preserving the chronological notice.
- source_word: በወርኅ ሳብዕ
  chosen: in the seventh month
  alternatives:
  - in month seven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward temporal phrase; 'seventh month' preserves the elevated
    narrative register.
- source_word: አመ ዐሡሩ ወረቡዑ ለወርኅ
  chosen: on the fourteenth day of the month
  alternatives:
  - on the fourteenth of the month
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral expression literally combines ten and four. 'On the fourteenth
    day of the month' is idiomatic and precise.
- source_word: በሕይወተ ሄኖክ
  chosen: in the life of Henok
  alternatives:
  - during the lifetime of Henok
  - in Henok's lifetime
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez explicitly uses 'life.' Retaining it keeps the solemn autobiographical
    framing of the vision.
- source_word: በውእቱ አምሳል
  chosen: in that parable
  alternatives:
  - in that similitude
  - in that vision
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is the standard term behind the section title 'Parables/Similitudes.'
    'Parable' is chosen for consistency with the local book division, while 'similitude'
    remains a viable alternative.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple visionary reporting formula. 'I saw' is clear modern English without
    diminishing apocalyptic force.
- source_word: ታድለቀልቅ ... ይልቅልቅ
  chosen: was shaken violently
  alternatives:
  - was convulsed
  - was violently agitated
  - quaked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The reduplicated forms intensify the motion. 'Was shaken violently' preserves
    the cosmic disturbance without over-paraphrasing.
- source_word: ሰማየ ሰማያት
  chosen: the heaven of heavens
  alternatives:
  - the highest heaven
  - heaven's heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A superlative/cosmic expression. The more literal 'heaven of heavens'
    preserves the apocalyptic idiom and avoids flattening it to a generic 'highest
    heaven' in the main text.
- source_word: ኀይሉ ልዑል
  chosen: the host of the Most High
  alternatives:
  - the army of the Most High
  - his power, the Most High
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the immediate mention of angels in vast numbers, ኀይል here is best
    taken collectively as heavenly host rather than abstract 'power.' 'Most High'
    is the natural rendering of ልዑል as a divine title.
- source_word: መላእክት አእላፈ አእላፍ ወትእልፊተ ትእልፊት
  chosen: the angels, thousands of thousands and ten thousand times ten thousand
  alternatives:
  - the angels, myriads of myriads and thousands of thousands
  - the angels, thousands upon thousands and ten thousands upon ten thousands
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired number formula expresses innumerable heavenly beings. The
    chosen rendering stays close to the Ge'ez numerical rhetoric and preserves the
    repetition.
- source_word: ትሀውኩ ሁከተ ዐቢየ
  chosen: were stirred in a great turmoil
  alternatives:
  - were thrown into great confusion
  - were in great commotion
  - were agitated with a great shaking
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb and cognate noun together intensify the sense of tumult. 'Were
    stirred in a great turmoil' keeps the alliterative force without becoming awkward
    English.
