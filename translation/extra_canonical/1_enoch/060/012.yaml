theological_decisions:
- issue: Whether መንፈሳት should be rendered as meteorological 'winds' or more numinous 'spirits'
  chosen_reading: spirits
  alternative_readings:
  - winds
  - breaths
  rationale: In the Parables, cosmic forces are often presented in a heightened, personified way. Rendering the term as 'spirits' preserves the apocalyptic ambiguity between animate heavenly powers and natural phenomena, rather than collapsing it into ordinary weather language.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Whether ጽድቅ here should be rendered 'righteousness' or 'justice'
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The phrase appears in a cosmic-ordering context rather than a specifically juridical one. Following project defaults, 'righteousness' better preserves the theological resonance without excluding the idea of just order.
