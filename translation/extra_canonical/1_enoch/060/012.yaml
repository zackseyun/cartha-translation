translation:
  text: And the treasuries of the spirits and how the spirits are divided, and how they are weighed out, and the portals of the spirits are reckoned, each according to the power of the spirit, and their powers for the light of the moon, and according to the power of righteousness, and the divisions of the stars by their names—every division shall be apportioned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Several clauses in this verse are textually and syntactically difficult in the Ge'ez-only witness of the Parables. Terms rendered 'weighed out,' 'reckoned,' and 'chambers' may also be understood more generally as measured, counted, or compartments/storehouses.
    reason: textual_variant
  - marker: b
    text: '''Spirits'' may also be read as ''winds''; the Ge''ez term can carry both senses, and the verse may intentionally blur cosmic powers and atmospheric forces.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and of the clouds shall be divided, and the spirits and the clouds shall be weighed out and reckoned; and the chambers of the spirits, by the power of the spirit'.
    reason: previous_rendering
lexical_decisions:
- source_word: መዛግብተ
  chosen: treasuries
  alternatives:
  - storehouses
  - repositories
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes stored reserves or storehouses. 'Treasuries' preserves the elevated apocalyptic register and the cosmic sense of reserved heavenly resources better than the more prosaic 'storehouses.'
- source_word: መንፈሳት
  chosen: spirits
  alternatives:
  - winds
  - breaths
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ge'ez መንፈስ can denote spirit, wind, or breath. In this cosmological context the term may overlap with atmospheric forces, but 'spirits' best preserves the text's personified/cosmic ambiguity rather than reducing it to mere weather.
- source_word: አፎ
  chosen: clouds
  alternatives:
  - vapors
  - mists
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The immediate context is cosmic and meteorological. 'Clouds' is the most natural rendering and pairs well with 'spirits' without overinterpreting the term.
- source_word: ይትካፈሉ
  chosen: shall be divided
  alternatives:
  - shall be apportioned
  - shall be distributed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense suggests ordered distribution into portions. 'Shall be divided' keeps the formal structure, while the final clause uses 'apportioned' to avoid awkward repetition in English.
- source_word: ይደሉ
  chosen: shall be weighed out
  alternatives:
  - shall be measured
  - shall be arranged
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is difficult in this OCR context, but the sense appears to involve ordering or measuring. 'Weighed out' preserves the image of exact cosmic allocation and fits the sequence of division and reckoning.
- source_word: ይኄለቁ
  chosen: reckoned
  alternatives:
  - counted
  - numbered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This likely carries the sense of calculation or accounting. 'Reckoned' matches the elevated style and the administrative imagery of heavenly ordering.
- source_word: አናቅፅ
  chosen: chambers
  alternatives:
  - compartments
  - store-rooms
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term seems to denote enclosed sections or compartments. 'Chambers' suits the visionary register and coheres with cosmic treasuries.
- source_word: በበኀይለ መንፈስ
  chosen: by the power of the spirit
  alternatives:
  - by the force of wind
  - by the might of the spirit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Because መንፈስ may mean spirit or wind, the phrase is ambiguous. 'By the power of the spirit' preserves that ambiguity better than a purely meteorological rendering.
- source_word: ለብርሃነ ወርኅ
  chosen: for the light of the moon
  alternatives:
  - for the moon's brightness
  - for moonlight
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward genitival construction. 'For the light of the moon' keeps the formal cadence and cosmic imagery.
- source_word: ኀይለ ጽድቅ
  chosen: the power of righteousness
  alternatives:
  - the force of righteousness
  - the strength of justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given project defaults, 'righteousness' is preferred over 'justice' unless context clearly demands otherwise. The phrase likely expresses an ordering principle in the cosmos, and 'power of righteousness' preserves that theological weight.
- source_word: ክፍላተ ከዋክብት
  chosen: the divisions of the stars
  alternatives:
  - the portions of the stars
  - the allotments of the stars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun group points to ordered celestial allotments. 'Divisions' matches the repeated theme of partitioning and cosmic arrangement.
- source_word: በበ ስሞሙ
  chosen: by their names
  alternatives:
  - according to their names
  - each by name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates classification or ordering in relation to names. 'By their names' is concise and preserves the formal structure.
- source_word: ኵሉ ክፍለ ይትከፈል
  chosen: every division shall be apportioned
  alternatives:
  - each portion shall be divided
  - every allotment shall be distributed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This concluding clause sums up the verse's theme of ordered cosmic distribution. 'Apportioned' avoids monotony while preserving the same semantic field as the earlier passive verb.
