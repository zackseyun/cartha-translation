theological_decisions:
- issue: Meaning of 'Lord of righteousness'
  chosen_reading: Treat as a title in the text as transmitted, distinct from but referring
    to the divine authority before whom people bow or whom they deny.
  alternative_readings:
  - Emend toward a more familiar divine title
  - Render more abstractly as 'the righteous Lord'
  rationale: The Ge'ez witness repeats the phrase and the translation should preserve
    its unusual form rather than normalizing it to a more familiar expression. This
    keeps the local rhetoric and avoids harmonization.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Force of መሐላ for the chosen
  chosen_reading: Render as 'covenant' in the main text with 'oath' noted as an alternative.
  alternative_readings:
  - oath
  - sworn pledge
  rationale: 'In context the day functions differently for two groups: for the chosen
    it is favorable and binding, for sinners investigative/judicial. ''Covenant''
    best conveys that positive solemn relation, but the lexical ambiguity should remain
    visible.'
  doctrine_reference: Preserve ambiguity with footnotes where contested.
