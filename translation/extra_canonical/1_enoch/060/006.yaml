translation:
  text: And when the day and the power and the punishment and the judgment come, which
    the Lord of Spirits has prepared for those who do not bow down to the Lord of
    righteousness, and for those who deny the Lord of righteousness, and for those
    who take his name in vain—that day has been prepared for the chosen as a covenant,
    and for sinners as an inquisition.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Punishment'' could also be rendered ''scourge'' or ''plague''; the Ge''ez
      term can denote a punitive blow or affliction.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'take up his name emptily/falsely'; the exact idiom is difficult,
      and 'take his name in vain' is an idiomatic rendering of the likely sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the chosen, an oath' rather than 'a covenant.'
    reason: lexical_alternative
  - marker: d
    text: '''Inquiry'' may also be understood as ''investigation'' or ''examination,''
      emphasizing judicial scrutiny of sinners.'
    reason: lexical_alternative
  - marker: e
    text: Or 'to the Lord of righteousness, and for those who deny the Lord of righteousness'.
    reason: previous_rendering
lexical_decisions:
- source_word: ትመጽእ
  chosen: come
  alternatives:
  - arrives
  - comes to pass
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple future/ingressive verb introducing the eschatological moment;
    'come' preserves the apocalyptic cadence without overinterpreting aspect.
- source_word: ዕለት
  chosen: day
  alternatives:
  - time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic contexts this commonly marks the appointed eschatological
    day; 'day' preserves the formulaic force.
- source_word: ኃይል
  chosen: power
  alternatives:
  - might
  - strength
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retained as 'power' to preserve the sequence of judicial terms; likely
    denotes the force accompanying divine visitation.
- source_word: መቅሠፍት
  chosen: punishment
  alternatives:
  - plague
  - scourge
  - affliction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can denote a blow, scourge, or punitive affliction. 'Punishment'
    best fits the legal-judicial cluster with 'judgment' in this verse, while a footnote
    preserves the more concrete alternatives.
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - sentence
  - condemnation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A judicial term; 'judgment' is the broadest and most natural English
    equivalent in apocalyptic legal contexts.
- source_word: አስተዳለወ
  chosen: has prepared
  alternatives:
  - appointed
  - made ready
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates prior divine preparation or appointment. Present perfect
    English conveys a state of readiness for the coming day.
- source_word: እግዚአ መንፈሳት
  chosen: Lord of Spirits
  alternatives:
  - Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed Enochic title. 'Lord of Spirits' preserves established
    sense while avoiding unnecessary expansion.
- source_word: ኢይሰግዱ
  chosen: do not bow down
  alternatives:
  - do not worship
  - do not prostrate themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally denotes bowing/prostration. 'Bow down' preserves embodied
    reverence language rather than flattening it to the more abstract 'worship.'
- source_word: እግዚ ጽድቅ
  chosen: Lord of righteousness
  alternatives:
  - Lord of justice
  - master of righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is unusual, but the Ge'ez points to a lord/master characterized
    by righteousness. 'Righteousness' is preferred over 'justice' for consistency
    with the project's handling of cognate terms and because the immediate contrast
    is moral rebellion.
- source_word: ይክሕዱ
  chosen: deny
  alternatives:
  - reject
  - renounce
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A strong verb of repudiation; 'deny' is concise and preserves the force
    of refusal toward the Lord of righteousness.
- source_word: ይነሥኡ ስሞ በከ
  chosen: take his name in vain
  alternatives:
  - utter his name falsely
  - take up his name emptily
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase likely means to invoke the divine name falsely or emptily.
    'Take his name in vain' is idiomatic English and matches the likely sense, but
    a footnote notes the more literal alternative because the Ge'ez wording is difficult.
- source_word: ተደለወት
  chosen: has been prepared
  alternatives:
  - has been appointed
  - has been made ready
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive counterpart to the earlier preparation verb; keeping 'has been
    prepared' preserves the repetition and rhetorical structure.
- source_word: ሕሩያን
  chosen: the chosen
  alternatives:
  - the elect
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard Enochic group designation. 'The chosen' is transparent modern
    English and avoids importing later doctrinal freight beyond the local passage.
- source_word: መሐላ
  chosen: covenant
  alternatives:
  - oath
  - sworn pledge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote oath or sworn bond. 'Covenant' best captures a solemn,
    beneficial divine arrangement for the chosen, while a footnote preserves 'oath'
    as a live alternative.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - the sinful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward moral designation in contrast to the chosen.
- source_word: ሐተታ
  chosen: inquiry
  alternatives:
  - investigation
  - examination
  - interrogation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term suggests searching examination or investigation. 'Inquiry' preserves
    the judicial sense without overstating the exact procedure.
