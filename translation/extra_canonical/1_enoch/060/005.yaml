theological_decisions:
- issue: Referent of the pronoun in 'his mercy'
  chosen_reading: The pronoun refers to God, implied rather than newly named in the
    verse.
  alternative_readings:
  - an impersonal 'the day of mercy' without explicit possessive force
  rationale: The surrounding discourse concerns divine governance and judgment; retaining
    'his' preserves the Ge'ez possessive and the theological focus on God's present
    restraint before judgment.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten judgment formulas.
