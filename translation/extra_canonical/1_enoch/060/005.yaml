translation:
  text: And Michael said to me, “Why are you troubled by such a vision? Until today
    the day of his mercy has lasted, and he has been merciful and slow to wrath toward
    those who dwell upon the dry land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'What is this that you have seen and been troubled?'
      The opening question is syntactically difficult in the Ge'ez.
    reason: lexical_alternative
  - marker: b
    text: '''Dry land'' may be significant in context, contrasting land-dwelling beings
      with the sea imagery in the surrounding passage.'
    reason: cultural_note
  - marker: c
    text: Or 'Why have you seen this and been troubled?'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይቤለኒ
  chosen: And ... said to me
  alternatives:
  - and he said to me
  - then he said to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard narrative introduction; simple past fits the visionary report.
- source_word: ሚካኤል
  chosen: Michael
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal name is transliterated per project philosophy.
- source_word: ምንተ ርእየ ዘከመዝ
  chosen: Why have you seen this
  alternatives:
  - What have you seen like this?
  - Why did you see this?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is somewhat idiomatic and difficult. Given the following verb
    'been troubled,' an interrogative of reason ('why') yields the most coherent sense
    in context, while preserving the directness of Michael's question.
- source_word: ተሀውከ
  chosen: been troubled
  alternatives:
  - been disturbed
  - been agitated
  - been terrified
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys inward disturbance caused by the vision without overstating it
    as sheer terror.
- source_word: እስከ ዮም
  chosen: Until today
  alternatives:
  - up to this day
  - until now
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains temporal force and apocalyptic register.
- source_word: ሀለወት
  chosen: has lasted
  alternatives:
  - has been
  - has remained
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used to express continuing duration of the merciful period.
- source_word: ዕለተ ምሕረቱ
  chosen: the day of his mercy
  alternatives:
  - the time of his mercy
  - the day of mercy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Formal enough to preserve the eschatological flavor of a divinely appointed
    period, while keeping the possessive explicit.
- source_word: ወሀሎ መሓሪ
  chosen: and he has been merciful
  alternatives:
  - and he is merciful
  - and he showed mercy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Pairs naturally with the preceding temporal clause and keeps the focus
    on God's merciful disposition during the present period.
- source_word: ወርኁቀ መዓት
  chosen: and slow to wrath
  alternatives:
  - and far from wrath
  - and delaying wrath
  - and patient in anger
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the phrase suggests remoteness from wrath; 'slow to wrath'
    is idiomatic English that preserves the theological sense without importing specifically
    biblical formula beyond what the Ge'ez supports.
- source_word: ላዕለ እለ የኃድሩ ዲበ የብስ
  chosen: toward those who dwell upon the dry land
  alternatives:
  - over those who live on the earth
  - toward those who inhabit the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: የብስ is more specifically 'dry land' than the broader 'earth.' In this
    chapter's contrast between cosmic creatures associated with sea and land, the
    more concrete wording should be preserved.
