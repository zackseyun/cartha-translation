  category: mistranslation
  tier: 3
  from: Why have you seen this and been troubled?
  to: Why are you troubled by such a vision?
  rationale: 'The Ge''ez ርእየ (re''ya) here is the accusative of the noun ርእይ (re''y,
    ''vision''), not a second-person verb (''you have seen'' would be ርኢከ). The phrase
    ምንተ ርእየ ዘከመዝ ተሀውከ literally means ''Why, as to a vision like this, are you troubled?''
    Translating it as ''Why have you seen this'' misparses the noun as a verb and
    creates an illogical question in context. The accompanying footnote ''a'' should
    also be removed or updated accordingly. | Adjudicator: The reviewer correctly
    identifies that ርእየ (re''ya) is the accusative form of the noun ርእይ (re''y, ''vision''),
    not a second-person verb (which would be ርኢከ, re''ika). The phrase ምንተ ርእየ ዘከመዝ
    ተሀውከ translat'
