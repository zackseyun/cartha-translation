theological_decisions:
- issue: Whether to depersonalize meteorological 'spirits' into mere natural processes
  chosen_reading: Retain 'spirit' language and personified naming
  alternative_readings:
  - Translate as 'wind/current of hail' and 'dew' as ordinary weather only
  rationale: The Parables regularly portray cosmic and meteorological realities as
    ordered agencies. Preserving personification maintains the apocalyptic worldview
    rather than flattening it into modern meteorology.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic imagery
    into generic modern prose.
