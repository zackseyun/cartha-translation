translation:
  text: And he said to me, “You, son of man, here you desire to understand what is
    hidden.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human one' or 'mortal.' Here 'son of man' is an address to the seer,
      not necessarily the exalted figure called 'the Son of Man' elsewhere in the
      Parables.
    reason: lexical_alternative
  - marker: b
    text: The final phrase could also be rendered 'to know the hidden thing' or 'to
      learn what is concealed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'You, son of man, here desire to understand what is hidden.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይቤለኒ
  chosen: And he said to me
  alternatives:
  - And he spoke to me
  - And he said unto me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard Ge'ez narrative speech formula. 'Said' is the most natural elevated
    English equivalent and preserves the direct-address setting.
- source_word: አንተ
  chosen: You
  alternatives:
  - As for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Explicit second-person pronoun adds emphasis before the vocative. English
    can preserve this naturally with 'You, son of man'.
- source_word: ወልደ ሰብእ
  chosen: son of man
  alternatives:
  - human one
  - son of humankind
  - mortal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a conventional Semitic-style address meaning a human addressee.
    'Son of man' preserves the apocalyptic register and local wording without importing
    later christological usage.
- source_word: በዝየ
  chosen: here
  alternatives:
  - in this place
  - at this point
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adverb likely marks location or immediate visionary setting. 'Here'
    is concise and preserves the deictic force.
- source_word: ትፈቅድ
  chosen: desire
  alternatives:
  - wish
  - want
  - are willing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys volition or desire. 'Desire' fits the elevated tone
    better than 'want' and avoids over-reading it as mere permission.
- source_word: ታእምር
  chosen: to understand
  alternatives:
  - to know
  - to learn
  - to perceive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is cognitive grasp rather than simple acquaintance. 'Understand'
    best fits the context of revelation of mysteries.
- source_word: ዘኅቡእ
  chosen: what is hidden
  alternatives:
  - the hidden thing
  - the mystery
  - that which is concealed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative construction points to something concealed. 'What is hidden'
    is transparent and avoids importing the more technical term 'mystery' unless the
    context requires it.
