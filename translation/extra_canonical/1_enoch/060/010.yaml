theological_decisions:
- issue: Rendering of ወልደ ሰብእ in the Parables
  chosen_reading: son of man
  alternative_readings:
  - human one
  - mortal
  rationale: In this verse the phrase functions as an address to Enoch, not as the
    titular figure elsewhere in the Parables. The traditional literal rendering is
    retained because it preserves the Semitic idiom and apocalyptic tone, while the
    distinction from the exalted title must be made by context rather than by replacing
    the phrase with a flatter paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; keep major
    terms locally grounded in the passage.
