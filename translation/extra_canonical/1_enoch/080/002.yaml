translation:
  text: And in the days of the sinners the years shall be shortened, and their seed
    shall be delayed on their land and in their fields; and all the works on the earth
    shall change and shall not appear in their times, and the rain shall be withheld,
    and heaven shall withhold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their offspring shall be delayed'; the Ge'ez term for 'seed' may refer
      either to descendants or to agricultural seed/produce in this context.
    reason: lexical_alternative
  - marker: b
    text: 'The line depicts cosmic and agricultural disorder: what should appear in
      its proper season fails to do so.'
    reason: cultural_note
  - marker: c
    text: Or 'every work that is on the earth shall change and shall not appear in
      its time'.
    reason: previous_rendering
lexical_decisions:
- source_word: መዋዕለ
  chosen: days
  alternatives:
  - times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal term; 'days' preserves the apocalyptic formula 'in
    the days of...' without smoothing it into a vaguer expression.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - the sinful
  - wrongdoers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes morally guilty people. 'Sinners' preserves the judgment-oriented
    register of the passage.
- source_word: ክረማት
  chosen: years
  alternatives:
  - seasons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the sense is the yearly cycle rather than merely rainy
    seasons; 'years shall be shortened' fits the cosmic-disruption theme of the Astronomical
    Book.
- source_word: የኀጽሩ
  chosen: shall be shortened
  alternatives:
  - shall diminish
  - shall become few
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive-like future sense best matches the Ge'ez and preserves the
    image of curtailed time rather than merely reduced quantity.
- source_word: ዘርአ ዚአሆሙ
  chosen: their seed
  alternatives:
  - their offspring
  - their produce
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase can denote descendants or seed/produce. Because the next phrases
    speak of land and fields, an agricultural nuance is possible, but 'seed' preserves
    the ambiguity and the concrete imagery.
- source_word: ዳኃራዊ
  chosen: late
  alternatives:
  - delayed
  - backward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective conveys lateness or delay. 'Late' keeps the terse force
    of the line and fits the theme of disrupted seasons.
- source_word: ምድረሙ
  chosen: their land
  alternatives:
  - their ground
  - their earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Land'' is the most natural rendering in parallel with fields and avoids
    over-literal repetition of ''earth'' later in the verse.'
- source_word: ወፍሮሙ
  chosen: their fields
  alternatives:
  - their cultivated land
  - their furrows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The agricultural setting favors 'fields' as a readable rendering, while
    still reflecting cultivated ground.
- source_word: ኵሉ ግብር ዘዲበ ምድር
  chosen: every work that is on the earth
  alternatives:
  - everything done on the earth
  - every deed upon the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is broad and likely includes the operations/products of earthly
    life. 'Work' preserves the lexical link without over-specifying human action alone.
- source_word: ይትመየጥ
  chosen: shall change
  alternatives:
  - shall be altered
  - shall be disturbed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A general verb of change best suits the cosmic and agricultural disorder
    described in the verse.
- source_word: ኢያስተርኢ ለአዝማኖሙ
  chosen: shall not appear in its time
  alternatives:
  - shall not be seen at its season
  - shall not show itself at the proper time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular English 'its time' treats the collective 'every work' idiomatically
    while preserving the seasonal timing motif.
- source_word: ዝናም ይትከላእ
  chosen: the rain shall be withheld
  alternatives:
  - the rain shall be restrained
  - the rain shall be kept back
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Withheld'' clearly conveys divinely imposed cessation without adding
    interpretive detail.'
- source_word: ሰማይ ታቀውም
  chosen: heaven shall hold back
  alternatives:
  - heaven shall be restrained
  - the sky shall be shut up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests stopping or holding back. 'Heaven shall hold back'
    preserves the personified cosmic imagery rather than reducing it to a meteorological
    statement.
