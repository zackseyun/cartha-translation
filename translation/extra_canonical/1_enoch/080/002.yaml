theological_decisions:
- issue: Meaning of 'their seed' in an agricultural-disruption context
  chosen_reading: Rendered as 'their seed' to preserve ambiguity between offspring
    and sown produce.
  alternative_readings:
  - their offspring
  - their produce
  rationale: The immediate context of land, fields, timing, and rain points toward
    agriculture, but the term itself can also evoke descendants. Preserving 'seed'
    keeps both possibilities available without overcommitting.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms or documented exception.
