theological_decisions:
- issue: Nature of the judgment sign
  chosen_reading: 'The verse describes cosmic-agricultural disorder as a sign of judgment: normal fertility and timing fail.'
  alternative_readings:
  - A merely natural description of poor harvests
  - A generalized moral metaphor detached from agriculture
  rationale: Within the Astronomical Book, disrupted seasons and celestial order are concrete apocalyptic signs. The translation therefore keeps agricultural language literal rather than turning it into abstract moral decline.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic imagery into generic prose.
