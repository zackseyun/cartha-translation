translation:
  text: And in those times the fruit of the earth will be late, and it will not sprout in its season; and the fruit of the trees will be withheld in its own season.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the produce of the land will come late.' The Ge'ez wording emphasizes delay relative to the proper season.
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be understood as 'the fruit of the trees will be hindered at its proper time,' stressing that the expected harvest is held back when it should appear.
    reason: lexical_alternative
  - marker: c
    text: Or 'in their season'.
    reason: previous_rendering
  - marker: d
    text: Or 'will be delayed'.
    reason: previous_rendering
lexical_decisions:
- source_word: አዝማን
  chosen: times
  alternatives:
  - days
  - seasons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural temporal term; 'times' preserves the broad apocalyptic timeframe introduced by 'in those times' without narrowing it to calendar 'days' or agricultural 'seasons'.
- source_word: ፍሬ፡ ምድር
  chosen: the fruit of the earth
  alternatives:
  - the produce of the الأرض
  - the yield of the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward construct phrase. 'Fruit of the earth' keeps the concrete agricultural image and echoes the cosmic-agricultural register of the Astronomical Book better than the more economic 'produce' or 'yield'.
- source_word: ደሓራዊ
  chosen: will be delayed
  alternatives:
  - will be late
  - will come afterward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective/adverbial idea is 'later, delayed, behind time.' 'Will be delayed' communicates disrupted timing, which is the point of the judgment sign in context.
- source_word: ይከውን
  chosen: will be
  alternatives:
  - will become
  - will come to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common existential/copular verb. In English it is absorbed into the predicate 'will be delayed' rather than rendered woodenly.
- source_word: ወኢይበቍል
  chosen: and it will not sprout
  alternatives:
  - and it will not bud
  - and it will not grow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes sprouting/shooting forth. 'Sprout' is the most natural agricultural equivalent and preserves the image of expected growth failing to appear.
- source_word: በዘመኑ
  chosen: in its season
  alternatives:
  - at its time
  - in due time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular suffix matches the immediately preceding singular collective 'fruit of the earth.' 'In its season' preserves the calendrical-agricultural emphasis central to this section.
- source_word: ፍሬ፡ ዕፅ
  chosen: the fruit of the trees
  alternatives:
  - the fruit of the wood
  - tree-fruit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዕፅ can denote tree/wood/plant. In this agricultural context, 'trees' is the clearest idiomatic rendering.
- source_word: ይትከላእ
  chosen: will be withheld
  alternatives:
  - will be restrained
  - will be hindered
  - will be prevented
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/reflexive sense of being held back or prevented. 'Will be withheld' fits the context of expected fruit failing to appear at the proper time.
- source_word: በዘመኑ፡ ዚአሁ
  chosen: in their season
  alternatives:
  - at that very time
  - in its own season
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The closing phrase intensifies the notion of proper appointed time. English 'in their season' reads naturally with plural 'trees' while preserving the sense of due season.
