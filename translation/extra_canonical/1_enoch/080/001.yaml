theological_decisions:
- issue: Identity of the agents associated with the heavenly bodies
  chosen_reading: Render the clauses personally ('those who lead... all those who turn them') rather than impersonal astronomical forces.
  alternative_readings:
  - the laws that govern the stars
  - their movements without personal agents
  rationale: The Ge'ez uses personal relative constructions ('those who...'), and the wider Astronomical Book often presents cosmic order through appointed heavenly beings or agents. Preserving that personal language maintains the apocalyptic worldview without over-defining the beings.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic imagery into generic modern prose.
