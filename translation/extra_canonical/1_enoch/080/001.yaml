translation:
  text: And in those days Uriel the angel answered me and said to me, “See, I have shown you everything, Enoch, and I have revealed everything to you, that you may look upon this sun and this moon and those who lead the stars of heaven, and all those who turn them—their works and their times and their settings.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guide' the stars of heaven. The wording presents the stars as directed by personal agents, not merely by impersonal laws.
    reason: lexical_alternative
  - marker: b
    text: The final term may refer more specifically to the heavenly bodies' goings out, transitions, or courses; 'departures' is a transparent rendering of the motion imagery.
    reason: lexical_alternative
  - marker: c
    text: Or 'and their departures'.
    reason: previous_rendering
lexical_decisions:
- source_word: አውሥአኒ
  chosen: answered me
  alternatives:
  - responded to me
  - spoke to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly carries the sense 'answer/respond.' Although no prior question is explicit in the verse itself, 'answered me' preserves the discourse texture of angelic instruction better than the flatter 'spoke to me.'
- source_word: ነዋ
  chosen: See
  alternatives:
  - Behold
  - Look
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An attention-getting particle. 'See' keeps the immediacy of angelic speech in readable modern English without archaic 'Behold.'
- source_word: አርአይኩከ
  chosen: I have shown you
  alternatives:
  - I showed you
  - I caused you to see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A causative/visual verb. 'I have shown you' fits the completed disclosure with present relevance in the angel's summary speech.
- source_word: ከሠትኩ ለከ
  chosen: I have revealed ... to you
  alternatives:
  - I have explained ... to you
  - I have made known ... to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is disclosure/uncovering. 'Revealed' suits apocalyptic register and preserves the force of heavenly disclosure better than the more prosaic 'explained.'
- source_word: ትርአዮ
  chosen: that you may look upon
  alternatives:
  - so that you may see
  - that you may observe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form expresses purpose/result. 'Look upon' preserves the visionary tone and avoids reducing the clause to mere physical sight.
- source_word: ይመርኅዎሙ
  chosen: lead
  alternatives:
  - guide
  - direct
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes leading/guiding. 'Lead' is concise and preserves the personified cosmic order in which heavenly bodies are directed by appointed agents.
- source_word: ከዋክብተ ሰማይ
  chosen: the stars of heaven
  alternatives:
  - the heavenly stars
  - the stars of the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward genitival expression. 'Stars of heaven' keeps the elevated biblical-apocalyptic register.
- source_word: ይመይጥዎሙ
  chosen: turn them
  alternatives:
  - set them in motion
  - cause them to revolve
  - move them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact nuance is motion/turning. 'Turn them' is intentionally transparent and slightly literal, preserving the cosmological imagery without over-specifying orbital mechanics.
- source_word: ግብሮሙ
  chosen: their works
  alternatives:
  - their deeds
  - their operations
  - their activity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this astronomical context the term likely refers to functions or operations, but 'works' preserves the broader lexical range and the text's patterned style.
- source_word: አዝማኖሙ
  chosen: their times
  alternatives:
  - their seasons
  - their appointed times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word denotes times/seasons. 'Their times' is the most direct rendering; 'appointed times' is possible but slightly more interpretive.
- source_word: ሙባኢሆሙ
  chosen: their departures
  alternatives:
  - their goings out
  - their entrances
  - their courses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun appears to denote points of going forth/coming out or transitions in movement. 'Departures' keeps the motion imagery and avoids collapsing it into the more interpretive 'courses.'
