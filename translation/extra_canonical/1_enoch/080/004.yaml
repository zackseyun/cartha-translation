theological_decisions:
- issue: Whether the verse should be rendered as a neutral astronomical irregularity
    or as a disruption of divinely established cosmic order
  chosen_reading: 'The wording preserves both: the moon alters ''its order'' and fails
    to appear ''at its appointed time.'''
  alternative_readings:
  - The moon changes its phase only
  - The month changes its reckoning
  rationale: The Astronomical Book frames celestial motions as ordered and prescribed.
    Rendering ሥርዓቶ as 'order' and በዘመኑ as 'at its appointed time' keeps the cosmic-order
    dimension without adding explicit theological explanation not stated in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
