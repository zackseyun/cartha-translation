translation:
  text: And the moon will alter its order, and it will not appear at its appointed
    time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ge'ez ወርኅ can mean either 'moon' or 'month'; here the luminary context favors
      'moon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'it will not be seen in its time.' The phrase may emphasize visibility
      at the proper season rather than a technical calendrical appointment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወርኅ
  chosen: the moon
  alternatives:
  - moon
  - month
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book the luminary context strongly favors 'moon'
    rather than the calendrical sense 'month,' and the following verbs describe visible
    celestial behavior.
- source_word: ይዌልጥ
  chosen: will alter
  alternatives:
  - will change
  - will become different
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes change or alteration. 'Will alter' preserves the sense
    of deviation from an established pattern without over-interpreting the cause.
- source_word: ሥርዓቶ
  chosen: its order
  alternatives:
  - its ordinance
  - its course
  - its regulation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term often refers to ordered arrangement or prescribed pattern.
    In this astronomical context, 'order' best captures the moon's fixed celestial
    arrangement while remaining readable.
- source_word: ወኢይትረአይ
  chosen: and it will not appear
  alternatives:
  - and it will not be seen
  - and it will not be visible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense concerns visibility. 'Appear' is natural
    English for a heavenly body while preserving the concrete visual sense.
- source_word: በዘመኑ
  chosen: at its appointed time
  alternatives:
  - in its time
  - at its time
  - in its season
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although literally 'in its time,' the astronomical and calendrical setting
    implies a fixed proper time. 'Appointed time' conveys that prescribed regularity
    without importing later theological language.
- source_word: ዚአሁ
  chosen: its
  alternatives:
  - that same
  - thereof
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This element points back to the moon/time reference and is best represented
    idiomatically in English by the possessive 'its' rather than a wooden demonstrative.
