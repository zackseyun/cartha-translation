theological_decisions:
- issue: Nature of the corrupting agents in 'their spirits'
  chosen_reading: The text is rendered literally as 'their spirits,' without resolving
    whether this refers to the spirits of the fallen angels themselves, their offspring,
    or their manifested operations.
  alternative_readings:
  - their evil spirits
  - the spirits that came from them
  - their offspring's spirits
  rationale: The Ge'ez wording should be preserved where the apocalyptic ontology
    is difficult. The verse itself does not explicitly define the referent, so the
    translation keeps the tension rather than interpreting it away.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of the final clause 'until they are finished'
  chosen_reading: The clause is left broad, indicating the completion/consummation
    of judgment rather than specifying annihilation or endless duration.
  alternative_readings:
  - until their condemnation is complete
  - until they come to their end
  rationale: The source wording signals completion but does not force a precise dogmatic
    conclusion about the mode of final punishment. A restrained rendering is therefore
    preferable.
  doctrine_reference: Preserve theological tension rather than resolve it.
