translation:
  text: And Uriel said to me, “Here shall stand the angels who joined themselves with
    women; and their spirits, having taken on many forms, defile humankind and lead
    them astray so that they sacrifice to demons as to gods, until the day of the
    great judgment, on which they will be judged until they are finished.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having become many appearances'; the Ge'ez phrase is difficult and may
      refer to varied manifestations by which these spirits corrupt humanity.
    reason: lexical_alternative
  - marker: b
    text: The expression 'their spirits' is left literal. In the wider Enochic context,
      interpreters differ on whether this points to the spirits of the fallen beings
      themselves or to demonic spirits associated with their offspring.
    reason: alternative_reading
  - marker: c
    text: Or 'until their end is completed.' The final clause emphasizes the full
      completion of judgment, but the exact nuance is uncertain.
    reason: lexical_alternative
  - marker: d
    text: Or 'defiled humankind and led them astray so that they sacrificed'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተደሚሮሙ
  chosen: joined themselves
  alternatives:
  - mingled themselves
  - were joined
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys association or joining together. 'Joined themselves'
    preserves the reflexive force and the illicit union context with women without
    over-paraphrasing into explicitly sexual language beyond what the verse itself
    states.
- source_word: ይቀውሙ
  chosen: shall stand
  alternatives:
  - stand
  - remain standing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this visionary setting the verb marks the location/state of the punished
    angels. 'Shall stand' keeps the solemn, scene-setting force better than a flatter
    'are' or 'remain'.
- source_word: መናፍስቲሆሙ
  chosen: their spirits
  alternatives:
  - the spirits from them
  - their spiritual beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural noun straightforwardly means 'spirits.' Retaining the possessive
    reflects the Ge'ez and preserves the difficult apocalyptic notion that what proceeds
    from or belongs to these angels acts corruptingly.
- source_word: ብዙኃ ራእየ ከዊኖሙ
  chosen: having assumed many forms
  alternatives:
  - having become many appearances
  - appearing in many visions
  - taking on many aspects
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult. ራእየ relates to appearance/vision, and ከዊኖሙ to
    becoming. 'Having assumed many forms' best captures the sense of varied manifestations
    without forcing a narrower interpretation.
- source_word: አርኰስዎሙ
  chosen: defiled
  alternatives:
  - corrupted
  - made unclean
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries impurity/pollution language. 'Defiled' preserves both
    moral and cultic overtones, fitting the verse's movement toward demon-directed
    worship.
- source_word: ለሰብእ
  chosen: humankind
  alternatives:
  - men
  - people
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can mean human beings generally. 'Humankind' avoids misleadingly
    male-only English while keeping the collective sense.
- source_word: ያስሕትዎሙ
  chosen: led them astray
  alternatives:
  - deceived them
  - caused them to err
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This rendering preserves the active causative sense and fits the ensuing
    idolatrous action.
- source_word: ይሡዑ
  chosen: they sacrificed
  alternatives:
  - they offered sacrifice
  - they worshiped
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The immediate object is demons, with a comparison 'as to gods'; a sacrificial
    act is more precise than the broader 'worshiped.'
- source_word: አጋንንት
  chosen: demons
  alternatives:
  - evil spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes demonic beings. 'Demons' is the most direct and established
    English equivalent and preserves the apocalyptic worldview.
- source_word: ከመ አማልክት
  chosen: as to gods
  alternatives:
  - like gods
  - as gods
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison marks the manner in which demons receive sacrificial honor.
    'As to gods' preserves the cultic direction of the act more clearly than the bare
    predicate 'as gods.'
- source_word: ዕለተ ዐባይ ኵነኔ
  chosen: the day of the great judgment
  alternatives:
  - the great day of judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the Ge'ez word order and the solemn apocalyptic formula without
    importing later familiar phrasing unnecessarily.
- source_word: ይትኴነኑ
  chosen: they will be judged
  alternatives:
  - they will be condemned
  - judgment will be executed on them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/judicial sense is clear. 'Will be judged' leaves the outcome
    implicit in the verb itself and matches the repeated judgment formula.
- source_word: እስከ ይትፈጸሙ
  chosen: until they are finished
  alternatives:
  - until their end is completed
  - until they are brought to completion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is terse and somewhat ambiguous. 'Until they are finished'
    preserves the finality of consummated judgment without over-specifying annihilation
    or duration.
