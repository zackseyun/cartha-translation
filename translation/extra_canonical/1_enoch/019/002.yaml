translation:
  text: And their wives, the angels who went astray, will become like peaceful ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their wives'; the Ge'ez term can denote women generally or wives specifically.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'like the angels, peaceful ones' is difficult. The comparison
      is clear, but 'peaceful ones' may either describe the angels or indicate a state
      of peace into which the women enter.
    reason: alternative_reading
  - marker: c
    text: Or 'And the women of those who went astray will become like the angels,
      peaceful ones.'.
    reason: previous_rendering
lexical_decisions:
- source_word: አንስትያሆሙኒ
  chosen: the women of those
  alternatives:
  - their women
  - their wives
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is built on the Ge'ez word for 'women/wives' with a pronominal
    suffix. Because the suffix refers back to the preceding group in context, 'the
    women of those' keeps the relation explicit without overcommitting to 'wives'
    if the text means women associated with them more broadly.
- source_word: ስሑታን
  chosen: who went astray
  alternatives:
  - the erring ones
  - the sinners
  - the fallen ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes those who have strayed or erred. 'Who went astray' preserves
    the moral and directional force of the root better than the more generalized 'sinners.'
    In context it refers to the offending angelic beings already under discussion.
- source_word: መላእክት
  chosen: angels
  alternatives:
  - messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the referent is clearly heavenly beings,
    so 'angels' is the natural English rendering rather than the more generic 'messengers.'
- source_word: ተከመ
  chosen: like
  alternatives:
  - as
  - in the manner of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This comparative particle introduces likeness, not identity. 'Like' avoids
    implying that the women literally become angels in essence.
- source_word: ሰላማዊያት
  chosen: peaceful ones
  alternatives:
  - at peace
  - in peace
  - peaceable ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective is derived from 'peace.' Rendering it substantivally as
    'peaceful ones' matches the plural form and preserves the elevated, descriptive
    tone of the vision. It may characterize the angels as beings in a state of peace.
- source_word: ይከውና
  chosen: will become
  alternatives:
  - will be
  - shall come to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb expresses becoming or coming to be. 'Will become' fits the future
    transformation implied by the vision better than the flatter 'will be.'
