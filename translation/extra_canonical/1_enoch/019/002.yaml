theological_decisions:
- issue: Nature of the women's transformation
  chosen_reading: 'comparative transformation: they will become like angels, not literally
    be identified as angels'
  alternative_readings:
  - they will be angels
  - they will dwell in peace with the angels
  rationale: The comparative marker supports likeness rather than ontological identity.
    The verse presents an apocalyptic reversal of the women associated with the erring
    beings, but the Ge'ez as given does not require a full statement that they themselves
    are angels.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    over-harmonize beyond the local passage.
