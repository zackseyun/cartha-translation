translation:
  text: And I, Enoch, alone saw the vision—the ends of all things—and no human being will see as I have seen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the extremities of everything.' The Ge'ez expression can denote furthest bounds or ends, and may carry both spatial and cosmic force.
    reason: lexical_alternative
  - marker: b
    text: Or 'Henok'.
    reason: previous_rendering
lexical_decisions:
- source_word: አርአያ
  chosen: vision
  alternatives:
  - appearance
  - spectacle
  - sight
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the term refers not merely to something seen but to a revelatory sight. 'Vision' preserves the prophetic/apocalyptic force better than the more neutral 'appearance' or 'sight'.
- source_word: ባሕቲትየ
  chosen: alone
  alternatives:
  - by myself
  - I alone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word marks Enoch's singularity as recipient of the revelation. 'Alone' is concise and keeps the emphasis on his exclusive seeing.
- source_word: አጽናፈ ኵሉ
  chosen: the ends of all things
  alternatives:
  - the extremities of everything
  - the whole extent of all things
  - all the ends
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: አጽናፍ commonly denotes extremity, border, or end. In an apocalyptic setting, 'the ends of all things' best conveys a cosmic scope without over-specifying geography. It preserves the imagery of totality reaching to the furthest bounds.
- source_word: አልቦ ዘይሬኢ እምሰብእ
  chosen: no human being will see
  alternatives:
  - there is no one from among men who sees
  - no man sees
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denies comparable human sight. Rendering ሰብእ as 'human being' avoids unnecessary male-specific language while keeping the contrast with Enoch's unique experience.
- source_word: ከመ አነ ርኢኩ
  chosen: as I have seen
  alternatives:
  - as I saw
  - like I saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This comparative clause underscores that no other human shares Enoch's visionary experience. 'As I have seen' reads naturally in English while preserving the completed, personal testimony.
