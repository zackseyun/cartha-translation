theological_decisions:
- issue: Scope of Enoch's unique revelation
  chosen_reading: Enoch claims uniquely to have seen a cosmic vision extending to 'the ends of all things,' not merely a private experience.
  alternative_readings:
  - Enoch saw the physical ends of the earth
  - Enoch saw the completion or outcome of everything
  rationale: The Ge'ez wording is broad and cosmic. The translation preserves that breadth without collapsing it into either strictly geographical or purely temporal language.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic language into generic prose.
