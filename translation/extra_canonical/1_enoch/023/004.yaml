translation:
  text: And at that time Raguel, one of the holy angels who was with me, answered me and said to me, “This course of fire which you saw toward the west, it is the fire which drives all the lights of heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording around 'this spirit that leads astray' is difficult. The referent may also be understood as a wind or rushing force rather than a personal spirit.
    reason: lexical_alternative
  - marker: b
    text: Or 'by the western path of fire.' The phrase likely describes a fiery region or route in the west within the vision's cosmic geography.
    reason: lexical_alternative
  - marker: c
    text: Or '“This spirit that leads astray goes out by the path of the fire of the west; it is that which drives all the lights of heaven.”'.
    reason: previous_rendering
lexical_decisions:
- source_word: አውሥአኒ
  chosen: answered me
  alternatives:
  - responded to me
  - spoke to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb naturally carries the sense of answering or responding, fitting the dialogic visionary setting better than the more generic 'spoke.'
- source_word: ቅዱሳን መላእክት
  chosen: holy angels
  alternatives:
  - sacred angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the standard apocalyptic designation without flattening it into a vague adjective.
- source_word: ዘርኢከ
  chosen: this spirit
  alternatives:
  - this wind
  - this apparition
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context the referent is a visible cosmic force previously shown to Enoch; 'spirit' best preserves the supernatural/cosmic ambiguity common in apocalyptic description, while 'wind' is possible but too meteorological for the immediate wording.
- source_word: ሩጸተ
  chosen: that leads astray
  alternatives:
  - that wanders
  - that runs
  - that rushes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult, but in context of a destructive cosmic force and with the following motion language, a causative or active sense is preferable. 'Leads astray' preserves the possibility of errant motion without overcommitting to mere speed.
- source_word: ተወዝኒ
  chosen: goes out
  alternatives:
  - departs
  - proceeds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A motion verb is required by the clause; 'goes out' is simple and fits the directional phrase that follows.
- source_word: መንገለ ዐረብ እሳት
  chosen: by the path of the fire of the west
  alternatives:
  - toward the western path of fire
  - by the way of the sunset fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መንገለ is 'path/way,' ዐረብ likely denotes west/evening, and እሳት is 'fire.' The phrase is kept vivid and somewhat strange, as suits apocalyptic geography.
- source_word: ይሰድድ
  chosen: drives
  alternatives:
  - chases
  - propels
  - scatters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests forceful movement. 'Drives' works well for a cosmic power acting upon heavenly luminaries.
- source_word: ብርሃናተ ሰማይ
  chosen: the lights of heaven
  alternatives:
  - the luminaries of heaven
  - the heavenly lights
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the natural apocalyptic expression for celestial lights; 'lights of heaven' is readable while preserving the cosmic register.
