theological_decisions:
- issue: Whether to render ዕረፍተ as 'rest' or a more interpretive term such as 'peace'
    or 'cessation'
  chosen_reading: rest
  alternative_readings:
  - repose
  - cessation
  rationale: The immediate sense is lack of rest or repose, likely describing the
    observed cosmic/judgment phenomenon. 'Rest' preserves the image without importing
    broader theological connotations not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
