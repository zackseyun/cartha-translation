translation:
  text: And I asked, saying, “What is this thing that has no rest?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this' or 'this one'; the Ge'ez demonstrative points to the phenomenon
      Enoch has just seen.
    reason: lexical_alternative
  - marker: b
    text: '''Has no rest'' may also be rendered ''is without repose.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ተስእልኩ
  chosen: I asked
  alternatives:
  - I inquired
  - I questioned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: First-person singular perfect of the verb 'to ask/inquire.' 'I asked'
    is the most natural elevated English and preserves the directness of the visionary
    report.
- source_word: እንዘ እብል
  chosen: saying
  alternatives:
  - as I said
  - while saying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common Ge'ez quotative construction introducing direct speech. English
    'saying' is concise and idiomatic without over-paraphrasing.
- source_word: ዝንቱ
  chosen: this thing
  alternatives:
  - this
  - this one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative referring to the phenomenon just seen. 'This thing' makes
    the referent explicit in English while retaining the deictic force.
- source_word: ምንት ውእቱ
  chosen: what is
  alternatives:
  - what is it
  - what may it be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard interrogative plus copula. 'What is' keeps the line simple and
    direct; 'what is it' would be slightly fuller but less elegant with 'this thing'
    already present.
- source_word: ዘአልቦ ዕረፍተ
  chosen: that has no rest
  alternatives:
  - which is without rest
  - that has no repose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative construction with negated possession/existence plus noun meaning
    'rest, repose.' 'Has no rest' is clear modern English and preserves the unsettling
    apocalyptic image of ceaseless activity.
