theological_decisions:
- issue: Cosmic geography in visionary travel
  chosen_reading: Retain 'ends of the earth' as apocalyptic world-language rather
    than reducing it to a merely local horizon.
  alternative_readings:
  - to the far border of the land
  - to the distant region of the earth
  rationale: The Book of the Watchers regularly uses expansive cosmic geography. Preserving
    this phrase maintains the visionary register and avoids flattening the scene into
    ordinary travel prose.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery rather
    than smoothing it.'
