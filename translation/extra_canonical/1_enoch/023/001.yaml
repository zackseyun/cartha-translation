translation:
  text: And from there I went to another place, toward the east, to the ends of the
    earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The directional phrase literally indicates movement 'toward the east.' Some
      textual discussions note uncertainty in directional terms in this section, but
      the Ge'ez here is most naturally read this way.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምህየ
  chosen: from there
  alternatives:
  - thence
  - from that place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward ablative/deictic expression marking movement away from
    the previously described location. 'From there' is clear modern English without
    losing the narrative linkage.
- source_word: ሖርኩ
  chosen: I went
  alternatives:
  - I traveled
  - I journeyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple past of motion. 'I went' preserves the plain visionary travel
    report; 'journeyed' would add a slightly more literary nuance than the verb itself
    requires.
- source_word: ካልአ መካነ
  chosen: another place
  alternatives:
  - a second place
  - another region
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates a different location from the prior scene. 'Another
    place' is the most natural and sufficiently formal rendering.
- source_word: መንገለ ዓረብ
  chosen: toward the east
  alternatives:
  - in the direction of the east
  - eastward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መንገለ marks direction ('toward/in the way of'), and ዓረብ here is best taken
    in the directional sense 'east' in this textual tradition. 'Toward the east' preserves
    the directional force without over-literal awkwardness.
- source_word: እስከ አጽናፈ ምድር
  chosen: to the ends of the earth
  alternatives:
  - as far as the extremities of the earth
  - to the edge of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An apocalyptic-geographical expression for the farthest reaches of the
    world. 'Ends of the earth' is idiomatic English and preserves the cosmic scope
    better than the singular 'edge.'
