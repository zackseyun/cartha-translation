translation:
  text: And I saw a fire that burned and ran, and it did not rest or cease from its course by day or by night, but kept on in the same way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The closing phrase is difficult. The Ge''ez appears to indicate continued action ''thus'' or ''in the same way''; alternatively, it may simply reinforce the description: ''but so it was.'''
    reason: lexical_alternative
  - marker: b
    text: The expression rendered 'from its course' may also be understood as 'from its rushing,' 'from its path,' or 'from its flow,' emphasizing the fire's unbroken movement.
    reason: lexical_alternative
  - marker: c
    text: Or 'And I saw a fire that burned and blazed, and it did not rest or cease from its course by day or by night, but kept on in the same way.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - And I looked
  - And I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary report; 'saw' is clear modern English while preserving the apocalyptic witness formula.
- source_word: እሳተ
  chosen: a fire
  alternatives:
  - fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Indefinite in sense here, introducing a visionary object rather than a previously identified fire.
- source_word: ዘይነድድ
  chosen: that burned
  alternatives:
  - burning
  - that was aflame
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative construction describing the fire's active state; 'that burned' keeps the verbal force.
- source_word: ዘይረውፅ
  chosen: and blazed
  alternatives:
  - and flared up
  - and poured forth
  - and shone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to intensify the fire's activity beyond simple burning. 'Blazed' preserves vivid apocalyptic imagery without overcommitting to a more specific nuance like 'poured out'.
- source_word: እንዘ ኢያዓርፍ
  chosen: and it did not rest
  alternatives:
  - while it did not rest
  - without resting
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys ongoing, unrelieved action. 'Did not rest' is more literal and imagistic than smoothing to 'kept burning'.
- source_word: ወኢይነትግ
  chosen: or cease
  alternatives:
  - or stop
  - or be extinguished
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with 'did not rest,' this likely expresses non-cessation rather than extinction specifically. 'Cease' fits the parallelism and the following phrase about its course.
- source_word: እምሩፀቱ
  chosen: from its course
  alternatives:
  - from its rushing
  - from its path
  - from its flow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun likely denotes movement or onward course. 'Course' works idiomatically in English for a fire or stream of fire moving continuously.
- source_word: መዐልተ ወሌሊተ
  chosen: by day or by night
  alternatives:
  - day and night
  - in the day and in the night
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresses uninterrupted duration. 'By day or by night' preserves the distributive sense.
- source_word: አላ ከማሁሙ
  chosen: but kept on in the same way
  alternatives:
  - but thus it was
  - but likewise
  - but just so
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The closing phrase is somewhat idiomatic and difficult. This rendering captures continuance in the same condition without forcing a more precise syntactic analysis than the witness warrants.
