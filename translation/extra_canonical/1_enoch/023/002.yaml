  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/023/002.job-72294.json
  category: mistranslation
  tier: 2
  from: And I saw a fire that burned and blazed, and it did not rest or cease from its course by day or by night, but kept on in the same way.
  to: And I saw a fire that burned and ran, and it did not rest or cease from its course by day or by night, but kept on in the same way.
  rationale: The Ge'ez verb ሮጸ (roṣa) means "to run", not "to blaze" (supported by the Greek κατατρέχον, "running down"). Translating it as "blazed" is a mistranslation that obscures the author's imagery of a moving, flowing fire and breaks the deliberate lexical connection with the cognate noun ሩጸት (ruṣat, "course" or "running") used later in the same verse.
