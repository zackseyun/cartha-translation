translation:
  text: Look at the summer and the winter, how the whole earth is filled with water,
    and clouds and dew and rain rest upon it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The seasonal pair 'summer and winter' reflects the Ge'ez wording directly.
      In the Ethiopian setting, 'winter' may evoke the wet season more than a cold
      season in the modern English sense.
    reason: cultural_note
  - marker: b
    text: The term rendered 'dew' can be difficult in isolation, but in this list
      of weather phenomena it most likely refers to moisture such as dew rather than
      a non-meteorological sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ርእይዎ
  chosen: Look at
  alternatives:
  - See
  - Observe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plural/collective force introducing observation of creation;
    'Look at' is direct and natural while preserving the summons to attend.
- source_word: ለሐጋይ
  chosen: the summer
  alternatives:
  - summertime
  - the dry season
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Seasonal term paired with winter; 'summer' is the most straightforward
    English equivalent.
- source_word: ወለክረምት
  chosen: and the winter
  alternatives:
  - and wintertime
  - and the rainy season
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired seasonal contrast; 'winter' preserves the conventional seasonal
    polarity in the Ge'ez wording, though in Ethiopian climate usage it may overlap
    with the rainy season.
- source_word: ከመ
  chosen: how
  alternatives:
  - that
  - in what way
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the content of what is to be observed; 'how' fits the demonstrative,
    observational tone better than a flat 'that'.
- source_word: ኵሉ ምድር
  chosen: the whole earth
  alternatives:
  - all the earth
  - the entire land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Cosmic scope suits the creation-observation context; 'earth' is preferable
    to 'land' here.
- source_word: መልአት
  chosen: is filled
  alternatives:
  - becomes full
  - is full
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Predicate of abundance/completion; 'is filled' naturally governs the
    following 'with water'.
- source_word: ማየ
  chosen: with water
  alternatives:
  - by water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Concrete physical imagery is retained; instrumental/filled construction
    is best rendered 'with water'.
- source_word: ወደመና
  chosen: and clouds
  alternatives:
  - and the clouds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Part of the sequence of moisture-bearing phenomena; anarthrous English
    plural reads naturally.
- source_word: ወጠለ
  chosen: and dew
  alternatives:
  - and mist
  - and shade
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this meteorological list with water, clouds, and rain, 'dew' best
    fits the context; other possible senses would disrupt the sequence.
- source_word: ወዝናም
  chosen: and rain
  alternatives:
  - and rainfall
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward weather term; 'rain' preserves the concrete imagery.
- source_word: ያዓርፍ ላዕሌሃ
  chosen: rest upon it
  alternatives:
  - settle upon it
  - lie upon it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys settling or coming to rest on the earth; 'rest upon
    it' preserves the elevated observational style.
