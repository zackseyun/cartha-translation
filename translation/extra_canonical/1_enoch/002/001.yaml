translation:
  text: 'Consider all the works in heaven: how they do not alter their paths, and
    the lights in heaven, how all of them rise and set in order, each in its season,
    and do not transgress against their appointed order.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not change their courses.' The Ge'ez wording points to fixed heavenly
      paths.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'appointed order' may also be rendered 'ordinance' or 'rule,'
      emphasizing that the heavenly lights keep the order set for them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ጠይቁ
  chosen: Consider
  alternatives:
  - Look at
  - Observe
  - Ask about
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plural introducing reflection on visible creation. 'Consider'
    preserves the exhortational force without implying a request for information as
    strongly as 'ask about' would in English.
- source_word: ግብረ
  chosen: works
  alternatives:
  - deeds
  - things made
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of heavenly phenomena, 'works' naturally refers to the created
    operations or manifestations in heaven.
- source_word: እፎ
  chosen: how
  alternatives:
  - that
  - in what manner
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Introduces the content of observation: ''how they do not alter...''.'
- source_word: ኢይመይጡ ፍናዊሆሙ
  chosen: they do not alter their paths
  alternatives:
  - they do not change their courses
  - they do not swerve from their ways
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase concerns fixed heavenly movement. 'Paths' keeps the concrete
    cosmic imagery; 'alter' reflects the negated verbal idea of changing or deviating.
- source_word: ብርሃናት
  chosen: the lights
  alternatives:
  - luminaries
  - bright lights
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to heavenly lights, likely sun, moon, and stars. 'Lights' is readable
    modern English while preserving the celestial image; 'luminaries' is possible
    but less natural.
- source_word: ይሠርቅ ወየዐርብ
  chosen: rise and set
  alternatives:
  - appear and disappear
  - come forth and go down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs describe the regular movement of heavenly lights across
    the sky. 'Rise and set' is the clearest idiomatic English equivalent.
- source_word: ሥሩዕ
  chosen: in order
  alternatives:
  - according to rule
  - in proper arrangement
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys ordered regularity rather than mere sequence; 'in order' is concise
    and fits the cosmic-order theme.
- source_word: በበዘመኑ
  chosen: each in its season
  alternatives:
  - each at its time
  - each in due time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The distributive sense suggests each heavenly body acts at its proper
    appointed time. 'Season' preserves the calendrical/cosmic nuance.
- source_word: ኢይትኀደዉ እምሥርዓቶሙ
  chosen: do not transgress against their appointed order
  alternatives:
  - do not depart from their ordinance
  - do not violate their order
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The wording is stronger than simple variation; it evokes crossing a fixed
    boundary or rule. 'Transgress against their appointed order' preserves the apocalyptic
    sense of creation obeying divinely set ordinances.
