theological_decisions:
- issue: Whether to render the heavenly regularity in neutral scientific language
    or in covenantal/judicial language
  chosen_reading: do not transgress against their appointed order
  alternative_readings:
  - do not change their order
  - do not depart from their laws
  rationale: The verse presents creation as obedient to fixed divine ordering, a theme
    important in apocalyptic argumentation. The stronger wording preserves the moral-juridical
    resonance without over-interpreting it as explicit Torah language.
  doctrine_reference: Preserve apocalyptic imagery and theological tension rather
    than flattening into generic prose.
