translation:
  text: Look at the earth and understand concerning the works that are done upon it from the beginning to their completion, that none of the works of God changes, as they appear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the works of God do not change.' The Ge'ez wording can be taken collectively or distributively.
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be understood as 'while he shows [this]' or 'as it is shown,' depending on how the verbal form is construed.
    reason: alternative_reading
  - marker: c
    text: Or 'as he shows them'.
    reason: previous_rendering
  - marker: d
    text: Or 'the works that are done upon it from the beginning to its completion'.
    reason: previous_rendering
lexical_decisions:
- source_word: ርእይዋ
  chosen: Look at it / look
  alternatives:
  - see it
  - behold it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative from the verb 'to see/look.' 'Look at' preserves the direct summons better than the flatter 'see,' while avoiding overly archaic 'behold.' The object is the earth in the following phrase.
- source_word: ለምድር
  chosen: the earth
  alternatives:
  - the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this cosmic-observational context, 'earth' fits better than the narrower 'land.' The passage surveys creation broadly, not a local territory.
- source_word: ወለብዉ
  chosen: understand
  alternatives:
  - consider
  - give heed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb calls for reflective perception in response to observation. 'Understand' captures the movement from seeing to discerning.
- source_word: በእንተ ምግባር
  chosen: concerning the works
  alternatives:
  - about the deeds
  - regarding what is done
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ምግባር commonly denotes deed, work, or action. 'Works' suits the created-order context and prepares for the later phrase 'works of God.'
- source_word: ዘይትገበር ላዕሌሃ
  chosen: that are done upon it
  alternatives:
  - that are done on it
  - that take place upon it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive or impersonal sense is most natural here. 'Upon it' keeps the relation to the earth explicit and slightly elevated in register.
- source_word: እምቀዳሚ እስከ ተፍጻሜቱ
  chosen: from the beginning to its completion
  alternatives:
  - from first to last
  - from the beginning until its end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase marks temporal totality. 'Completion' is preferred over 'end' because it better reflects consummation/fulfillment language rather than mere cessation.
- source_word: ከመ ኢይትመየጥ
  chosen: that none ... changes
  alternatives:
  - that none ... is altered
  - that not one ... shifts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses the stable regularity of God's works. 'Changes' is clear modern English and preserves the claim without interpretive expansion.
- source_word: ኵሉ ምግባረ ለአምላክ
  chosen: the works of God
  alternatives:
  - every work of God
  - all God's works
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase can be rendered distributively or collectively. 'The works of God' reads naturally in English while still conveying the totality implied by ኵሉ.
- source_word: እንዘ ያስተርኢ
  chosen: as he shows them
  alternatives:
  - while he makes them visible
  - as he reveals them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The participial/converbial ending links the stability of God's works with their being displayed. 'Shows' is concrete and fits the observational rhetoric of the verse.
