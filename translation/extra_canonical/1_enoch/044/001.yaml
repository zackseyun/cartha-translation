theological_decisions:
- issue: Nature of the stars/lightning imagery
  chosen_reading: Retain the imagery as visionary-cosmic transformation without identifying
    the stars as angels or spirits in the main text.
  alternative_readings:
  - Interpret the stars as angelic beings becoming lightning
  - Interpret the line as a description of natural phenomena only
  rationale: In the Parables, cosmic imagery often carries personal or angelic significance,
    but this verse alone does not explicitly identify the referents. The translation
    therefore preserves the image and leaves interpretation open.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten apocalyptic imagery.
