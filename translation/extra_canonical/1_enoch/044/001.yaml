translation:
  text: 'And another thing I saw concerning the lightning: how some of the stars arise
    and become lightning, and they are not able to leave it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is uncertain. The Ge'ez likely means 'they are not able
      to leave off / cease,' though 'depart' is also possible.
    reason: lexical_alternative
  - marker: b
    text: Or 'how some stand out from the stars and become lightning, and they are
      not able to leave off.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ካልእተ
  chosen: another thing
  alternatives:
  - another
  - a second thing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a new visionary item. Rendering it as 'another thing' preserves
    the resumptive apocalyptic style better than a bare 'another.'
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary report; 'I saw' is clear modern English
    while preserving the report formula.
- source_word: በእንተ
  chosen: concerning
  alternatives:
  - about
  - regarding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the explanatory relation without overinterpreting the syntax.
- source_word: መብረቅ
  chosen: lightning
  alternatives:
  - flash
  - brightness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary apocalyptic image here is lightning, and the same noun recurs
    later in the verse; consistency is preferable.
- source_word: እፎ
  chosen: how
  alternatives:
  - in what manner
  - that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the content of what was seen in a vivid descriptive way.
- source_word: ይቀውሙ
  chosen: stand out
  alternatives:
  - stand
  - take their stand
  - arise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A simple 'stand' is possible, but with 'from the stars' the sense seems
    to be emergence or standing forth from among them.
- source_word: እምከዋክብተ
  chosen: from the stars
  alternatives:
  - out of the stars
  - among the stars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition most naturally marks source or separation. 'From the
    stars' preserves the imagery without forcing a cosmological explanation.
- source_word: ወይከውኑ
  chosen: and become
  alternatives:
  - and are
  - and come to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb of becoming fits the transformation imagery better than a static
    copula.
- source_word: ወኢይክሉ
  chosen: and they are not able
  alternatives:
  - and they cannot
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the explicit incapacity expressed in the Ge'ez.
- source_word: ኃዲገ
  chosen: to leave off
  alternatives:
  - to cease
  - to desist
  - to depart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult in context. 'Leave off' best preserves the likely
    sense of not being able to stop or withdraw, while avoiding overconfidence.
