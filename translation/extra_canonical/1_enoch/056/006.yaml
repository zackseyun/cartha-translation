theological_decisions:
- issue: Referent of 'his' in 'his chosen ones'
  chosen_reading: Retain the pronoun as 'his' without explicit identification.
  alternative_readings:
  - God's chosen ones
  - the Lord's chosen ones
  rationale: The Ge'ez gives only the pronoun. Since the immediate verse does not
    name the antecedent, supplying 'God' or 'the Lord' in the main text would exceed
    the witness. The possessive still clearly marks the chosen ones as belonging to
    a higher figure in context.
  doctrine_reference: Preserve theological tension rather than resolve it.
