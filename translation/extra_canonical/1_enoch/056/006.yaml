translation:
  text: And they shall go up and tread upon the land of his chosen ones, and the land
    of his chosen ones shall become before them a trampled place and a beaten path.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The wording is difficult in Ge''ez. The final pair of expressions likely
      intensifies the image: the land becomes something trodden down, like a track
      or beaten path.'
    reason: textual_variant
  - marker: b
    text: Or 'they shall ascend and march over the land of his chosen ones.' The verbs
      may describe military advance as well as literal treading.
    reason: lexical_alternative
lexical_decisions:
- source_word: የዓርግዋ
  chosen: they shall go up
  alternatives:
  - they shall ascend
  - they shall come up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes upward movement or ascent. In this apocalyptic military
    context, 'go up' preserves the concrete motion and can also carry the sense of
    advancing against a land without over-interpreting.
- source_word: ይከይድዋ
  chosen: tread upon
  alternatives:
  - march over
  - trample
  - pass through
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The root is associated with going, walking, or treading. Because the
    following clause speaks of the land becoming a trampled place and path, 'tread
    upon' best preserves the verbal link and the hostile physical imagery.
- source_word: ምድረ
  chosen: land
  alternatives:
  - earth
  - ground
  - country
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here the term refers to the territory belonging to the chosen ones rather
    than the whole earth in a cosmic sense, so 'land' is the most natural and contextually
    precise rendering.
- source_word: ኅሩያነ
  chosen: chosen ones
  alternatives:
  - elect ones
  - the chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key Enochic designation and should be preserved consistently.
    'Chosen ones' is transparent and avoids importing later doctrinal phrasing while
    retaining the group's marked status.
- source_word: ዚአሁ
  chosen: his
  alternatives:
  - of him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The pronominal suffix marks possession: the land belongs to ''his chosen
    ones.'' ''His'' is idiomatic English and preserves the relational sense without
    specifying the antecedent beyond the text.'
- source_word: በቅድሜሆሙ
  chosen: before them
  alternatives:
  - in front of them
  - in their presence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is spatial and situational. 'Before them' keeps the vivid
    scene of the land lying exposed to the invaders.
- source_word: ምካይደ
  chosen: a trampled place
  alternatives:
  - a trampling
  - a trodden place
  - a place for marching
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This noun appears cognate with the preceding verb of treading/walking.
    Rendering it as 'a trampled place' preserves the wordplay and the image of desecration
    by hostile movement.
- source_word: አሰረ
  chosen: a beaten path
  alternatives:
  - a road
  - a track
  - a highway
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun likely denotes a path or track. 'Beaten path' fits the context
    of repeated trampling and keeps the imagery concrete rather than formalized.
