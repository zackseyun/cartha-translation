translation:
  text: And he said to me, 'To their chosen ones and to their beloved ones, so that they may be cast into the chasm of the abyss of the valley.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording is difficult. 'For the chosen and for their beloved ones' may refer to persons designated in the preceding vision, but the exact referent is not explicit in this verse alone.
    reason: alternative_reading
  - marker: b
    text: Or 'into the cleft/fissure of the abyss of the valley.' The Ge'ez imagery is topographical and ominous; the exact nuance of the opening is uncertain.
    reason: lexical_alternative
  - marker: c
