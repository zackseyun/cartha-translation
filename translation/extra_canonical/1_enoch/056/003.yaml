theological_decisions:
- issue: Referent of 'the chosen' and 'their beloved ones'
  chosen_reading: Retain the Ge'ez wording without resolving whether this refers ironically to the judged kings/mighty ones and their associates, or to another group identified in the immediate context.
  alternative_readings:
  - the chosen as a privileged ruling group now marked for judgment
  - the chosen as those selected by the speaker for punishment
  rationale: In the Parables, group labels can shift sharply by context, and this Ge'ez-only section is textually difficult. The translation preserves the wording rather than forcing an interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
