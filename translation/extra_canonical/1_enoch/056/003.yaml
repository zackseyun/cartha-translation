    reason: previous_rendering
lexical_decisions:
- source_word: ወይቤለኒ
  chosen: And he said to me
  alternatives:
  - And he told me
  - And he spoke to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard narrative formula introducing angelic explanation; 'said to me' preserves the directness of visionary speech.
- source_word: ለሕሩያነ
  chosen: for the chosen
  alternatives:
  - to the chosen ones
  - for the elect
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form reflects the familiar Enochic group designation 'chosen'; 'elect' is possible but more tradition-laden in English. 'For the chosen' best fits the dative/prepositional force in context.
- source_word: ዚአሆሙ
  chosen: these are
  alternatives:
  - these
  - these things are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Taken as a demonstrative-plus-copular expression pointing to the objects or agents just shown in the vision. Supplying 'are' makes idiomatic English while preserving the deictic force.
- source_word: ወለፍቁራኒሆሙ
  chosen: and for their beloved ones
  alternatives:
  - and for their loved ones
  - and for those dear to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is related to love/affection. 'Beloved ones' preserves the elevated register and leaves open whether the reference is companions, allies, or those attached to them.
- source_word: ከመ፡ ይትወደዩ
  chosen: so that they may be cast
  alternatives:
  - that they may be thrown
  - that they may be hurled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/jussive sense in context is punitive movement into a place of judgment. 'Cast' is vivid but not over-paraphrastic, fitting apocalyptic judgment imagery.
- source_word: ውስተ፡ ንቅዐተ
  chosen: into the chasm
  alternatives:
  - into the cleft
  - into the fissure
  - into the pit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term suggests a split, cleft, or opening. 'Chasm' best conveys a large, ominous opening appropriate to the visionary landscape.
- source_word: ማዕምቅ
  chosen: of the abyss
  alternatives:
  - of the deep
  - of the depth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard apocalyptic term for the deep underworld or immeasurable depth. 'Abyss' preserves the cosmic and judgmental resonance.
- source_word: ዘቈላ
  chosen: of the valley
  alternatives:
  - of that valley
  - of the ravine
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered 'valley' as the most natural topographical term. The genitival chain is preserved in English as 'the chasm of the abyss of the valley,' though slightly smoothed for readability.
