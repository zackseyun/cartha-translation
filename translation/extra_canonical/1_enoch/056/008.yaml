translation:
  text: And in those days Sheol will open its mouth, and they will sink down into it; and destruction will follow them; Sheol will swallow up the sinners from before the face of the chosen ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'and their destruction' is difficult in the Ethiopic and may also be understood more verbally, such as 'and it will destroy them' or 'and their ruin [will come].'
    reason: textual_variant
  - marker: b
    text: '''Before the face of the chosen ones'' is a literal idiom for being removed from their presence.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and their destruction—Sheol'.
    reason: previous_rendering
lexical_decisions:
- source_word: በአማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard apocalyptic temporal formula; 'those days' preserves the elevated, visionary register and recurring Enochic phrasing.
- source_word: ትፈትሕ
  chosen: will open
  alternatives:
  - shall be opened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Active rendering fits the feminine subject 'Sheol' and keeps the vivid personification.
- source_word: ሲኦል አፉሃ
  chosen: Sheol ... its mouth
  alternatives:
  - the underworld ... its mouth
  - Sheol ... her mouth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sheol'' is retained rather than generalized as ''hell'' or ''grave,'' since the apocalyptic image is of the underworld as a devouring realm. ''Its mouth'' is idiomatic English for the personified image.'
- source_word: ወይስጠሙ ውስቴታ
  chosen: and they will sink down into it
  alternatives:
  - and they will descend into it
  - and they will be swallowed into it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests sinking or going down into the opened underworld. 'Sink down' preserves the physical, catastrophic imagery without overinterpreting.
- source_word: ወትትሎሙ ኀጕሎን
  chosen: and their destruction
  alternatives:
  - and it will destroy them
  - and their ruin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is textually difficult. The form appears to point to their destruction/ruin as the result or appositional consequence before the next explicit clause about Sheol swallowing them. A more verbal rendering is possible, so this is footnoted.
- source_word: ሲኦል ይውሕጦሙ
  chosen: Sheol will swallow up
  alternatives:
  - Sheol will devour
  - the underworld will swallow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A strong devouring verb suits the personified underworld imagery. 'Swallow up' is vivid and natural English.
- source_word: ለኃጥኣን
  chosen: the sinners
  alternatives:
  - the sinful
  - the wicked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun directly denotes sinners; 'wicked' would be interpretive rather than lexical here.
- source_word: እምቅድመ ገጸ ኅሩያን
  chosen: from before the face of the chosen ones
  alternatives:
  - from before the chosen ones
  - away from the presence of the chosen ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the concrete Semitic-style expression 'before the face of' while remaining intelligible. 'Chosen ones' is the established local term and should not be flattened into 'elect' or harmonized with later usage.
