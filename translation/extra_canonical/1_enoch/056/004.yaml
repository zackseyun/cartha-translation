  - marker: b
    text: The phrase rendered 'their beloved ones' is difficult. It likely refers
      to persons dear to or associated with the chosen, but the exact nuance is uncertain.
    reason: lexical_alternative
  - marker: c
    text: The verb rendered 'will be counted' could also be understood as 'will be
      known' or 'will be reckoned.' The line is obscure in Ethiopic and should be
      read with caution.
