lexical_decisions:
- source_word: እሜሃ
  chosen: in those days
  alternatives:
  - then
  - at that time
  lexicon: Dillmann
  rationale: Common temporal apocalyptic formula; plural 'days' preserves the visionary
    register better than a flattened 'then'.
- source_word: ይመልእ
  chosen: will be filled
  alternatives:
  - will fill
  - become full
  lexicon: Dillmann
  rationale: Passive/resultative sense fits the syntax with the following subject-complement
    construction.
- source_word: ውእቱ ቈላ
  chosen: that region
  alternatives:
  - that valley
  - that place
  lexicon: Dillmann
  rationale: The noun likely denotes a tract/place/region; 'region' is cautious because
    the exact topographical force is uncertain in this OCR witness. A lexical alternative
    is preserved in a footnote.
- source_word: ሕሩያን
  chosen: the chosen
  alternatives:
  - the elect
  - chosen ones
  lexicon: Dillmann
  rationale: This is a key Parables term. 'The chosen' is concise, readable, and preserves
    the titular/apocalyptic force without importing later doctrinal phrasing.
- source_word: ፍቁራነ ዚአሆሙ
  chosen: their beloved ones
  alternatives:
  - their loved ones
  - those dear to them
  lexicon: Dillmann
  rationale: The possessive construction appears to refer to persons associated with
    the chosen. 'Beloved ones' preserves the relational and elevated tone better than
    the flatter 'loved ones'.
- source_word: ይትዌዳእ
  chosen: will be counted
  alternatives:
  - will be known
  - will be reckoned
  - will be made known
  lexicon: Dillmann
  rationale: In context with 'days of their lives' and 'days of their wandering/error,'
    a reckoning or numbering sense best fits the clause. Because the verb can also
    bear a 'be known' sense, the uncertainty is footnoted.
- source_word: ዕለተ ሕይወቶሙ
  chosen: the days of their lives
  alternatives:
  - their lifetime
  - the days of their life
  lexicon: Dillmann
  rationale: A formally close rendering preserves the repeated apocalyptic cadence
    with the next phrase.
- source_word: ዕለተ ስሕተቶሙ
  chosen: the days of their wandering
  alternatives:
  - the days of their error
  - the days of their sin
  - the days of their straying
  lexicon: Dillmann
  rationale: The noun can denote error, wandering, or straying. 'Wandering' keeps
    the moral-spiritual nuance without over-specifying as explicit sin; alternatives
    are important enough to footnote.
- source_word: እምይእዜ ኢትትኌለቍ
  chosen: will no longer be counted from then on
  alternatives:
  - from now on they will not be found
  - henceforth they will not be reckoned
  lexicon: Dillmann
  rationale: The closing clause is difficult in this witness. This rendering takes
    it as a cessation formula tied to the prior reckoning of days. Because the exact
    verbal force is uncertain, the difficulty is documented in footnotes.
