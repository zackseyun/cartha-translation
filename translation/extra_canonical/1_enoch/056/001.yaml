theological_decisions:
- issue: Nature of the angelic figures
  chosen_reading: angels assigned to punitive judgment
  alternative_readings:
  - destructive angels
  - angels of affliction
  rationale: The verse presents heavenly agents bearing instruments of judgment. 'Angels of punishment' preserves the judicial and apocalyptic setting without importing later demonological categories.
  doctrine_reference: Preserve apocalyptic imagery and local passage meaning; do not flatten judgment formulas.
