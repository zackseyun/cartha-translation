  from: And there I saw the angels of punishment going about, and they were holding chains of iron and bronze scourges.
  to: And there I saw the hosts of the angels of punishment going about, and they were holding scourges and chains of iron and bronze.
  rationale: 'The draft omits ትዕይንታተ (tə''yəntāta, "hosts/armies"), mistakenly treating it in the notes as a word for "vision." Additionally, it reverses the order of the implements and misapplies the materials. The Ge''ez reads መቅሠፍተ (maqśafta, "scourges") ወመማግረ (wa-mamāgəra, "and chains") ሐጺን (ḥaṣin, "of iron") ውብርት (wə-bərt, "and bronze"). | Adjudicator: The reviewer correctly identifies that the current translation omits `ትዕይንታተ` (tə''yəntāta, "hosts" or "armies"). Furthermore, the Ge''ez groups the objects (`መቅሠፍተ፡ ወመማግረ`, "scourges and chains") follo'
