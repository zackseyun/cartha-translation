translation:
  text: And there I saw the hosts of the angels of punishment going about, and they were holding scourges and chains of iron and bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording for the implements is difficult. The first item may denote chains or fetters; the second may denote scourges, whips, or another punitive instrument of metal.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in vision' is explicit in the Ge'ez, though English style can absorb it into 'I saw there.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And there I saw the angels of punishment going about, and they were holding chains of iron and bronze scourges.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - And I looked
  - And I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary reporting formula; 'saw' is clear modern English while preserving apocalyptic witness language.
- source_word: በህየ
  chosen: there
  alternatives:
  - in that place
  - therein
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locative adverb referring to the visionary scene; 'there' is concise and natural.
- source_word: ትዕይንታተ
  chosen: vision
  alternatives:
  - visions
  - appearance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used adverbially with the seeing formula to mark visionary perception. It is not necessary to force an extra English noun into the line, but the sense is reflected in the elevated report structure.
- source_word: መላእክት መቅሠፍት
  chosen: the angels of punishment
  alternatives:
  - the angels of chastisement
  - the punishing angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Genitival construction most naturally denotes angels associated with punitive judgment. 'Punishment' preserves the judicial-apocalyptic force better than the softer 'chastisement'.
- source_word: እንዘ የሐውሩ
  chosen: going about
  alternatives:
  - walking
  - moving about
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The participial/imperfect sense suggests active movement within the scene. 'Going about' preserves the vividness without over-specifying manner.
- source_word: ወይአሕዙ
  chosen: and they were holding
  alternatives:
  - and they held
  - and carrying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A continuing action fits the visionary description; 'holding' is more direct than 'carrying' and suits instruments in hand.
- source_word: መቅሠፍተ
  chosen: chains
  alternatives:
  - fetters
  - instruments of punishment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote punitive implements; in this context, with iron specified and paired with another instrument, 'chains' best fits the imagery of angels preparing judgment, though the term is somewhat uncertain.
- source_word: ወመማግረ፡ ሐጺን፡ ውብርት
  chosen: and bronze scourges
  alternatives:
  - and whips of bronze
  - and metal goads
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The second item appears to be another punitive implement, qualified by metal terms. 'Scourges' preserves the punitive force and avoids flattening the imagery into generic 'tools.' Because the exact object is uncertain, the alternative is noted in a footnote.
- source_word: ሐጺን
  chosen: iron
  alternatives:
  - metal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common Ge'ez term for iron; retained literally to preserve the harsh material imagery.
- source_word: ውብርት
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A copper-alloy sense is likely; 'bronze' is the most idiomatic biblical English equivalent.
