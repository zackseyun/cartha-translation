theological_decisions:
- issue: Possessive force in 'city of my righteous ones'
  chosen_reading: 'Retain first-person possessive: ''my righteous ones'''
  alternative_readings:
  - the righteous ones
  - his righteous ones
  rationale: The Ge'ez witness as given points to a possessive element. Retaining it preserves the divine ownership/protection motif common in apocalyptic judgment scenes without importing later doctrinal language.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Nature of the conflict described
  chosen_reading: Mutual self-destruction among the wicked powers
  alternative_readings:
  - external slaughter by invading forces
  - general chaos without explicit reciprocity
  rationale: The reciprocal phrase 'among themselves' and the following kinship-collapse clauses favor a scene of divinely induced internecine violence. This should remain vivid rather than generalized into mere disorder.
  doctrine_reference: Do not flatten apocalyptic imagery or judgment formulas into generic prose.
