translation:
  text: And the city of my righteous ones shall be a hindrance to their horses; and they will stir up slaughter among themselves, and their right hand will be strong against them. And a man will not know his brother, nor a son his father or his mother, until the number of the corpses from their death is complete, and their punishment will not be in vain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obstacle' or 'trap' for their horses; the Ge'ez term suggests something that blocks or ensnares.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a man will not know his brother'; the sense may include 'recognize.'
    reason: lexical_alternative
  - marker: c
    text: The clause about 'the number of the corpses' is textually difficult in the Ethiopic and is rendered transparently rather than smoothed.
    reason: textual_variant
  - marker: d
    text: Or 'they will stir themselves up to slaughter among themselves'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሀገረ
  chosen: city
  alternatives:
  - land
  - region
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes a city or settled place. In this judgment scene, 'city' preserves the concrete apocalyptic image better than the broader 'land.'
- source_word: ጻድቃነ
  chosen: my righteous ones
  alternatives:
  - the righteous
  - my just ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form refers to righteous persons; the attached first-person element in the clause is best represented by 'my.' This preserves the possessive force of the Ge'ez witness rather than flattening it to a generic class.
- source_word: ማዕቀፈ
  chosen: hindrance
  alternatives:
  - obstacle
  - trap
  - check
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is something that restrains, blocks, or ensnares. 'Hindrance' keeps the image broad enough to fit military movement without overcommitting to a specific mechanism such as a literal trap.
- source_word: አፍራሲሆሙ
  chosen: their horses
  alternatives:
  - their cavalry
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes horses. 'Their horses' is more literal and preserves the martial imagery; 'cavalry' would be interpretive.
- source_word: ያነሥኡ
  chosen: they will stir themselves up
  alternatives:
  - they will rise up
  - they will rouse themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests rising or rousing. Because the following phrase points to mutual violence, 'stir themselves up' captures self-initiated agitation leading into battle.
- source_word: በበ ቢይናቲሆሙ
  chosen: among themselves
  alternatives:
  - each against the other
  - between themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The distributive/reciprocal phrase indicates internal conflict. 'Among themselves' is idiomatic English that still preserves the mutuality of the violence.
- source_word: ቀትለ
  chosen: to slaughter
  alternatives:
  - to killing
  - to slay
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun/infinitival sense is killing. 'Slaughter' fits the heightened apocalyptic register and the scale of the carnage described later in the verse.
- source_word: ትጸንዕ የማኖሙ ዲቤሆሙ
  chosen: their right hand will be strong against them
  alternatives:
  - their right hand will prevail against them
  - their right hand will be mighty over them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom combines the right hand as an image of power with a verb of strength. 'Will be strong against them' preserves the Hebrew-like martial idiom without overpolishing it.
- source_word: ኢያእምር ብእሲ ለአኁሁ
  chosen: a man will not know his brother
  alternatives:
  - no man will recognize his brother
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is 'know/recognize.' 'Know' is retained in the main text because it is the more direct rendering and suits the breakdown of ordinary kinship bonds in judgment.
- source_word: ኢወልድ ለአቡሁ ወለእሙ
  chosen: nor a son his father or his mother
  alternatives:
  - nor will a son know his father and his mother
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The syntax is compressed, but the sense is that filial recognition also collapses. The supplied verb is carried over naturally from the previous clause.
- source_word: ኍልቈ አብድነት እሞቶሙ
  chosen: the number of the corpses from their death is complete
  alternatives:
  - the tally of the bodies of their dead is complete
  - the count of the slain in their death is fulfilled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to combine counting/number with corpses or dead bodies and their death. 'Number of the corpses from their death' is slightly wooden but transparent, preserving the grim quantitative imagery of judgment.
- source_word: መቅሰፍቶሙ ኢትኩን በከ
  chosen: their punishment will not be in vain
  alternatives:
  - their scourging will not be empty
  - their chastisement will not be without effect
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote punishment, scourging, or chastisement. 'Will not be in vain' best captures the closing assertion that the judgment is effectual, while remaining readable.
