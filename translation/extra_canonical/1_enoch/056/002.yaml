translation:
  text: And I asked the angel of peace who went with me, saying, “To whom are they going, these who hold the scourges?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scourges' or 'implements of chastisement'; the Ge'ez term may denote either punishment itself or the means by which it is inflicted.
    reason: lexical_alternative
  - marker: b
    text: Or '“These who hold the instruments of punishment—who are they?”'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተስእልክዎ
  chosen: I asked
  alternatives:
  - I inquired of him
  - I questioned him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb straightforwardly introduces Enoch’s question to the accompanying angel. 'Asked' is natural modern English and preserves the directness of the narrative.
- source_word: መልአክ ሰላም
  chosen: angel of peace
  alternatives:
  - peaceful angel
  - angel of well-being
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A genitival construction is best preserved here. 'Angel of peace' is a known Enochic expression and should not be flattened into a generic descriptive adjective.
- source_word: ዘየሐውር ምስሌየ
  chosen: who went with me
  alternatives:
  - who was going with me
  - who accompanied me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause identifies the interpreting angel accompanying the seer. 'Went with me' keeps the visionary movement and is slightly more formal than 'accompanied me'.
- source_word: እንዘ እብል
  chosen: saying
  alternatives:
  - as I said
  - while saying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a common speech-introducing formula. 'Saying' is concise and preserves the source structure.
- source_word: ለመኑ
  chosen: who are they
  alternatives:
  - for whom are they
  - who are these
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context this introduces Enoch’s question about identity. English idiom requires an explicit predicate, hence 'who are they?'.
- source_word: እሉ እለ
  chosen: these who
  alternatives:
  - these, who
  - those who
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative plus relative construction points to figures visible in the vision. 'These who' preserves the deictic force better than the more distant 'those who'.
- source_word: ይአኅዙ
  chosen: hold
  alternatives:
  - grasp
  - carry
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes having in hand or seizing. 'Hold' is the most neutral rendering and leaves open whether the objects are being carried or readied.
- source_word: መቅሠፍተ
  chosen: instruments of punishment
  alternatives:
  - scourges
  - punishments
  - implements of chastisement
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote punishment or the means by which it is inflicted. Because the figures are said to 'hold' it, an instrumental sense is likely in context. 'Instruments of punishment' preserves the apocalyptic concreteness without over-specifying a particular weapon.
