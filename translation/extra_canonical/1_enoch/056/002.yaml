theological_decisions:
- issue: Whether to render መቅሠፍተ abstractly or concretely
  chosen_reading: 'concrete/instrumental: ''instruments of punishment'''
  alternative_readings:
  - 'abstract: ''punishment'''
  - 'more specific: ''scourges'''
  rationale: The immediate syntax describes beings who 'hold' the object, which favors a concrete implement rather than punishment in the abstract. A more specific term like 'scourges' may be too narrow for the Ge'ez alone.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment formulas into generic prose.
