lexical_decisions:
- source_word: በአማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - at that time
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard apocalyptic temporal formula; plural 'days' is preserved rather than reduced to a singular idiom.
- source_word: ይገብኡ መላእክት
  chosen: the angels will gather themselves
  alternatives:
  - the angels will assemble
  - the angels will come together
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests gathering/assembling; 'gather themselves' preserves the reflexive force and the solemn apocalyptic movement.
- source_word: ይወድዩ አርእስቲሆሙ
  chosen: turn their heads
  alternatives:
  - direct their faces
  - set their heads
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally involves their heads; 'turn their heads' is natural English while retaining the bodily imagery of deliberate orientation.
- source_word: ለምሥራቅ
  chosen: toward the east
  alternatives:
  - eastward
  - to the east
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Directional phrase kept concrete and geographic.
- source_word: ለኀበ ሰብአ ጳርቴ ወሙዴ
  chosen: toward the people of Parthia and Media
  alternatives:
  - toward the Parthians and Medes
  - toward the people, Parthians and Medes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase explicitly includes 'people of'; retained to reflect the ethnogeographic reference rather than smoothing to bare ethnonyms.
- source_word: የሐውክዎሙ
  chosen: they will stir up
  alternatives:
  - they will disturb
  - they will throw into confusion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The root conveys troubling/confusing/agitating. Here 'stir up' fits the causative sense in relation to rulers and impending conflict.
- source_word: ለዝንቱ
  chosen: the kings
  alternatives:
  - them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR likely obscures the expected object 'kings' in this context; the following plural pronouns and throne imagery strongly support rulers as the referent. This is made explicit in the main text and noted in a footnote because the line is textually difficult.
- source_word: መንፈሰ ሀውክ
  chosen: a spirit of turmoil
  alternatives:
  - a spirit of confusion
  - a spirit of agitation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is not necessarily a personal spirit-being but an animating force of disorder. 'Turmoil' preserves apocalyptic intensity without over-specifying ontology.
- source_word: እመንበረሆሙ
  chosen: from their thrones
  alternatives:
  - from their seats
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the royal context, 'thrones' is preferable to the more generic 'seats' and preserves the political-juridical imagery.
- source_word: ከመ አናብስት እምስካባቲሆሙ
  chosen: like lions from their lairs
  alternatives:
  - like lions from their dens
  - like beasts from their couches
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison is vivid and predatory. 'Lairs' fits the animal imagery better than the more literal but misleading 'couches/beds'.
- source_word: ከመ አዝእብት ርኁባን
  chosen: like hungry wolves
  alternatives:
  - like ravenous wolves
  - like famished wolves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes wolves; the adjective conveys hunger. 'Hungry' is simple and forceful, while preserving the menace.
- source_word: ማእከለ መርዔት ዚአሆሙ
  chosen: in the midst of their pasture
  alternatives:
  - among their flocks
  - in the middle of their grazing place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez points to a pasture/grazing-place. 'Pasture' keeps the image broad and avoids importing 'flocks' unless explicit.
