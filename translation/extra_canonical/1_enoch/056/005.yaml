translation:
  text: And in those days the angels will And in those days the angels will return and turn their heads toward the east, toward the people of Parthia and Media. They will stir up the kings, and a spirit of turmoil will come upon them; it will unsettle them from their thrones, and they will go out like lions from their lairs, and like hungry wolves in the midst of their pasture. and turn their heads toward the east, toward the people of Parthia and Media. They will stir up the kings, and a spirit of turmoil will come upon them; it will unsettle them from their thrones, and they will go out like lions from their lairs, and like hungry wolves in the midst of their pasture.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The object after 'They will stir up' is textually difficult in the OCR. The sense of rulers or kings is likely, since the next clause speaks of being driven from 'their thrones.'
    reason: textual_variant
  - marker: b
    text: Or 'a spirit of confusion.' The Ge'ez expression can denote a force or condition of disorder without specifying whether a personal spirit-being is meant.
