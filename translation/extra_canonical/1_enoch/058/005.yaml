lexical_decisions:
- source_word: ወእምድኅረዝ
  chosen: And after this
  alternatives:
  - And afterward
  - And after that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The compound temporal expression introduces the next stage in the vision sequence. 'After this' preserves the apocalyptic narrative linkage without unnecessary archaism.
- source_word: ይትበሀል
  chosen: it will be spoken
  alternatives:
  - it will be said
  - one will say
  - it shall be declared
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/imperfect sense is best represented by 'it will be spoken.' This keeps the impersonal formulation of the Ge'ez rather than supplying an explicit speaker not present in the text.
- source_word: ለቅዱሳን
  chosen: to the holy ones
  alternatives:
  - to the saints
  - for the holy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Holy ones'' is the most transparent rendering of the Ge''ez term and fits Enochic usage without importing later ecclesiastical overtones carried by ''saints.'' The preposition here is naturally rendered ''to'' with the passive verb.'
- source_word: በሰማይ
  chosen: in heaven
  alternatives:
  - in the heaven
  - in the heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular form in the provided witness supports 'in heaven.' Because the verse is brief and Ge'ez-only in this section, the translation stays close to the attested wording rather than expanding to the more idiomatic apocalyptic plural 'in the heavens.'
