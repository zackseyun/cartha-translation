theological_decisions:
- issue: Identity of 'the holy ones'
  chosen_reading: the phrase is left untranslated beyond its lexical sense, without deciding whether it refers to angels, the righteous dead, or the elect community
  alternative_readings:
  - angels in heaven
  - the righteous in heaven
  - the elect/saints
  rationale: In Enochic literature 'holy ones' can denote heavenly beings or sanctified people, and this short clause alone does not force a narrower identification. Preserving the broader term maintains the text's theological openness.
  doctrine_reference: Preserve theological tension rather than resolve it.
