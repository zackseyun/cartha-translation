  category: awkward_english
  tier: 1
  from: and the holy ones shall have no number of days.
  to: and the holy ones shall have days without number.
  rationale: The overly literal rendering 'shall have no number of days' is awkward in English and risks implying that they will have zero days. The Ge'ez idiom ኍልቈ መዋዕለ አልቦሙ (literally 'they have no number of days') means that their days cannot be numbered or are infinite. 'Shall have days without number' accurately conveys the author's meaning of unbounded duration while remaining faithful to the source syntax.
