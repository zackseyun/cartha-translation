theological_decisions:
- issue: Whether to render ኅሩያን as 'the chosen' or 'the elect'
  chosen_reading: the chosen
  alternative_readings:
  - the elect
  rationale: The passage belongs to the Parables, where this group designation is important, but the project philosophy prefers accessible modern English unless theological precision requires a traditional term. 'The chosen' preserves the category without importing later doctrinal freight attached to 'elect.'
  doctrine_reference: Translation philosophy §Readable modern English; §Consistency of key terms, or documented exception
- issue: How to express the final clause about the holy ones' days
  chosen_reading: the holy ones shall have no number of days
  alternative_readings:
  - the holy ones' days shall be without number
  - the number of their days shall be endless
  rationale: The Ge'ez is somewhat idiomatic. The chosen rendering keeps the literal components visible for auditability while still reading as intelligible English. A footnote preserves the smoother alternative.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it; book-context guidance on transparency in the Parables
