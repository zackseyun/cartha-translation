translation:
  text: And the righteous shall be in the light of the sun, and the chosen in the light of eternal life; and there shall be no end to the days of their life, and the holy ones shall have days without number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the holy ones' days shall be without number.' The Ge'ez wording is literal and idiomatic, emphasizing unbounded duration rather than a mere large quantity.
    reason: lexical_alternative
  - marker: b
    text: Or 'and the holy ones shall have no number of days.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the plural adjective/noun denoting those characterized by righteousness. 'The righteous' preserves the ethical and covenantal force better than the less common 'the just'.
- source_word: በብርሃነ ፀሐይ
  chosen: in the light of the sun
  alternatives:
  - by the light of the sun
  - in sunlight
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition with 'light' is best kept literally here to preserve the visionary cosmic imagery. 'In the light of the sun' is elevated but clear, and avoids flattening the image into mere brightness.
- source_word: ኅሩያን
  chosen: the chosen
  alternatives:
  - the elect
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term in Enochic literature often denotes those selected or chosen by God. 'The chosen' is more accessible modern English, while still preserving the theological category; 'the elect' remains a viable alternative but is more tradition-laden.
- source_word: በብርሃነ ሕይወት ዘለዓለም
  chosen: in the light of eternal life
  alternatives:
  - in the light of everlasting life
  - in the light of life forever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'A fairly literal rendering preserves the appositional/apocalyptic image: not merely life that is eternal, but a sphere or radiance associated with eternal life. ''Eternal life'' is idiomatic without importing later doctrinal phrasing beyond the text.'
- source_word: ማኅለቆተ አልቦቱ
  chosen: there shall be no end
  alternatives:
  - its end does not exist
  - there is no completion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase expresses the absence of an ending or limit. Rendering it verbally in English gives natural sense while preserving the absolute force of the Ge'ez negation.
- source_word: መዋዕለ ሕይወቶሙ
  chosen: the days of their life
  alternatives:
  - the days of their lives
  - their lifetime
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A relatively formal rendering keeps the repeated 'days' imagery that structures the verse. 'Their lifetime' would be smoother but would erase the explicit temporal idiom.
- source_word: ቅዱሳን
  chosen: the holy ones
  alternatives:
  - the saints
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''The holy ones'' preserves the broader Enochic category without importing later ecclesiastical associations that ''saints'' can carry.'
- source_word: ኍልቈ መዋዕለ አልቦሙ
  chosen: shall have no number of days
  alternatives:
  - their days shall be without number
  - they shall have innumerable days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez speaks literally of number/count and days. This rendering keeps the striking idiom and parallels the previous clause about there being no end to their days.
