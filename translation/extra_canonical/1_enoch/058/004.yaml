theological_decisions:
- issue: Rendering of the closing divine title እግዚአ ዓለም
  chosen_reading: the Lord of the Age
  alternative_readings:
  - the Lord of Eternity
  - the Eternal Lord
  - the Lord of the world
  rationale: In apocalyptic context, temporal/cosmic language is significant. 'The
    Lord of the Age' preserves that resonance while remaining readable. Because the
    Ge'ez-only Parables can be textually uncertain, the more interpretively open rendering
    is preferred in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
