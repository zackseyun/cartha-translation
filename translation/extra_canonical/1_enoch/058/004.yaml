translation:
  text: And they will seek the light and find righteousness with the Lord of Spirits.
    Peace be to the righteous in the name of the Lord of Eternity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obtain righteousness' instead of 'find righteousness'; the Ge'ez verb
      can carry either nuance.
    reason: lexical_alternative
  - marker: b
    text: The closing title could also be rendered 'the Lord of Eternity' or 'the
      Eternal Lord.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the Lord of the Age'.
    reason: previous_rendering
lexical_decisions:
- source_word: የኃሥሡ
  chosen: they will seek
  alternatives:
  - they shall seek
  - they sought
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is best taken as a plural verbal form meaning 'seek' or 'search
    for.' Future-like English fits the visionary/judgment sequence better than a simple
    past.
- source_word: ለብርሃን
  chosen: the light
  alternatives:
  - light
  - for light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The object marker with ብርሃን supports 'the light' as the thing sought.
    Retaining 'light' preserves the apocalyptic image rather than reducing it to guidance
    or salvation.
- source_word: ይረክቡ
  chosen: find
  alternatives:
  - obtain
  - receive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can carry the sense of obtaining or finding. 'Find' pairs naturally
    with 'seek' and preserves the parallelism of the line.
- source_word: ጽድቀ
  chosen: righteousness
  alternatives:
  - justice
  - vindication
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Default rendering is 'righteousness.' Although 'justice' is possible
    in some contexts, here the moral-covenantal sense fits the immediate pairing with
    'the righteous' later in the verse.
- source_word: በኀበ
  chosen: with
  alternatives:
  - before
  - from the presence of
  - in the presence of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preposition can indicate proximity or relation to a person. 'With
    the Lord of Spirits' is concise and leaves open whether righteousness is found
    in his presence or from him.
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed Enochic divine title. 'Lord of Spirits' preserves the
    established title-form and its cosmic scope.
- source_word: ሰላም ለጻድቃን
  chosen: Peace be to the righteous
  alternatives:
  - peace to the righteous
  - peace upon the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase functions as a blessing or proclamation. 'Peace be to' preserves
    the elevated register and benedictory force.
- source_word: በስመ
  chosen: in the name of
  alternatives:
  - by the name of
  - through the name of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is formulaic and should be preserved transparently rather
    than paraphrased.
- source_word: እግዚአ ዓለም
  chosen: the Lord of the Age
  alternatives:
  - the Lord of Eternity
  - the Eternal Lord
  - the Lord of the world
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዓለም can denote age, eternity, or world. 'Of the Age' keeps the apocalyptic-temporal
    nuance and avoids prematurely collapsing the phrase into a generalized divine
    epithet.
