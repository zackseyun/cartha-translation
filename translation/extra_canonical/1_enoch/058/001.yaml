translation:
  text: And I began to speak the third parable concerning the righteous and concerning
    the chosen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the third similitude.' The Ge'ez term can denote a parable-like or similitude-like
      discourse heading.
    reason: lexical_alternative
lexical_decisions:
- source_word: አኀዝኩ
  chosen: I began
  alternatives:
  - I took up
  - I commenced
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The verb commonly carries the sense ''seize/take/begin.'' In this narrative
    introduction, an inceptive sense fits best: Enoch starts a new discourse section
    rather than physically ''taking'' something.'
- source_word: እበል
  chosen: to speak
  alternatives:
  - to say
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The infinitive-like complement after 'began' is best rendered idiomatically
    in English as 'to speak.' 'To say' is possible but less natural in introducing
    an extended discourse.
- source_word: ሣልሰ ምሳሌ
  chosen: the third parable
  alternatives:
  - the third similitude
  - the third discourse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ምሳሌ can denote parable, proverb, or similitude. Since this section is
    traditionally known as the Parables/Similitudes and the verse marks the third
    unit, 'parable' is clear English while preserving the literary designation. 'Similitude'
    is possible but less natural for modern readers.
- source_word: በእንተ ጻድቃን
  chosen: concerning the righteous
  alternatives:
  - about the righteous ones
  - for the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: በእንተ regularly means 'concerning/about' in headings or topic markers.
    ጻድቃን is the plural 'righteous,' a key apocalyptic group term that should be preserved
    rather than generalized.
- source_word: ወበእንተ ኅሩያን
  chosen: and concerning the chosen
  alternatives:
  - and about the elect
  - and concerning the chosen ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኅሩያን denotes those who are chosen/elect. 'Chosen' preserves the local
    terminology without importing later doctrinal freight; 'elect' is viable but more
    tradition-laden in English. The article-like force is conveyed by 'the chosen.'
