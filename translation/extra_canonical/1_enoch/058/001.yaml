theological_decisions:
- issue: Rendering of the group designation ኅሩያን
  chosen_reading: the chosen
  alternative_readings:
  - the elect
  - the chosen ones
  rationale: In the Parables, this is a recurring identity term. 'The chosen' keeps
    the apocalyptic category intact while avoiding unnecessary later theological systematization
    attached to 'elect.'
  doctrine_reference: Contested terms / preserve local passage meaning before harmonizing
    across the corpus
- issue: Literary label for ምሳሌ
  chosen_reading: parable
  alternative_readings:
  - similitude
  rationale: The verse introduces the third major discourse unit in the Book of Parables/Similitudes.
    'Parable' is more readable modern English, while a footnote can preserve 'similitude'
    as a lexical alternative.
  doctrine_reference: Readable modern English, not archaic or academic
