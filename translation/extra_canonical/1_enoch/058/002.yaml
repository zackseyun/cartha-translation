theological_decisions:
- issue: Rendering of the group designation ወኅሩያን in the Parables
  chosen_reading: chosen ones
  alternative_readings:
  - elect ones
  - chosen
  rationale: The term carries covenantal and eschatological weight in this literature,
    but 'chosen ones' keeps the local sense without overloading the line with later
    systematic-theological associations.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
