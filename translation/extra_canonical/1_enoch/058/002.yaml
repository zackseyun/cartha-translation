translation:
  text: Blessed are you, O righteous and chosen ones, for your portion is glorious.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your share' or 'your lot.' The Ge'ez term denotes an allotted portion
      or inheritance-like share.
    reason: lexical_alternative
lexical_decisions:
- source_word: ብፁዓን
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the beatitude-like force and elevated register appropriate to
    apocalyptic blessing speech; 'happy' is too weak and modern.
- source_word: አንትሙ
  chosen: are you
  alternatives:
  - you are
  - O you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresses the direct second-person plural address embedded in the blessing
    formula. Rendered idiomatically in English as part of 'Blessed are you'.
- source_word: ጻድቃን
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Righteous'' is the standard apocalyptic and theological term and preserves
    continuity with the book''s recurring contrast between the righteous and the wicked.'
- source_word: ወኅሩያን
  chosen: chosen ones
  alternatives:
  - elect ones
  - the chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is plural and denotes those selected or chosen. 'Chosen ones'
    preserves the substantive force better than a bare adjective and avoids importing
    later doctrinal freight from 'elect' into the main text.
- source_word: እስመ
  chosen: for
  alternatives:
  - because
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the ground of the blessing in a concise, natural way.
- source_word: ስቡሕ
  chosen: glorious
  alternatives:
  - honored
  - splendid
  - praised
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best fits the predicative description of the recipients' portion as marked
    by glory or splendor. 'Praised' is less suitable for describing a portion, while
    'splendid' is possible but less theologically resonant.
- source_word: ክፍልክሙ
  chosen: your portion
  alternatives:
  - your share
  - your lot
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the inheritance/share imagery common in biblical and apocalyptic
    diction. 'Lot' is possible but can sound overly technical or suggest chance in
    English.
