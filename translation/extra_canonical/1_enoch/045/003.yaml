translation:
  text: On that day my Chosen One will sit on the throne of glory, and he will choose
    their works and their resting-places without number; and their souls will grow
    strong within them when they see my Chosen Ones and those who have called upon
    my glorious name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'he will choose their works and their resting-places' is difficult.
      The verb may imply selecting, sorting, or determining, and 'resting-places'
      could also be rendered 'dwellings' or 'stations.'
    reason: lexical_alternative
  - marker: b
    text: The text shifts from the singular 'my Chosen One' to the plural 'my Chosen
      Ones.' This may reflect a deliberate distinction between the enthroned figure
      and the community associated with him, though the wording is textually difficult.
    reason: textual_variant
