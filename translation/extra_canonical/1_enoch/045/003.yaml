theological_decisions:
- issue: Identity of the singular title 'my Chosen One'
  chosen_reading: Retain the titular expression 'my Chosen One' without replacing
    it with 'Messiah,' 'Son of Man,' or another harmonized title.
  alternative_readings:
  - my Elect One
  - the Messiah
  - the Son of Man
  rationale: In the Parables, exalted figures and titles overlap, but this verse itself
    uses the 'Chosen One' title. The translation preserves the local wording rather
    than resolving broader identification questions in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; keep major
    terms locally grounded in the passage.
- issue: Shift from singular 'my Chosen One' to plural 'my Chosen Ones' later in the
    verse
  chosen_reading: Preserve the singular/plural distinction in the main text and note
    the difficulty.
  alternative_readings:
  - Harmonize both to singular
  - Harmonize both to plural
  - Emend the plural to 'the chosen ones' without possessive
  rationale: The Ge'ez as given appears to shift from the enthroned singular figure
    to a plural group. Because the Parables are effectively Ge'ez-only here, transparency
    is preferable to silent harmonization.
  doctrine_reference: When the sense is uncertain, prefer transparent English plus
    a footnote over false confidence.
