  from: And heaven will not receive them, nor will the earth reach them; thus it shall be the portion of the sinners who denied the name of the Lord of Spirits, who are thus kept for the day of affliction and tribulation.
  to: And they will not ascend to heaven, nor will they arrive on earth; thus it shall be the portion of the sinners who denied the name of the Lord of Spirits, who are thus kept for the day of affliction and tribulation.
  rationale: 'The draft severely mistranslates the opening clause by making ''heaven'' and ''earth'' the subjects. In the Ge''ez, `ሰማየ` (samāya, ''to heaven'') and `ምድረ` (mǝdra, ''to earth'') are in the accusative case of direction. The verbs `የዐርጉ` (yaʿargu, from ዐርገ, ''to ascend'') and `ይበጽሑ` (yǝbaṣṣǝḥu, from በጽሐ, ''to arrive, reach'') are third-person plural, referring to the sinners. The text simply says ''they will not ascend to heaven, nor will they arrive on earth.'' The draft''s lexical notes hallucinate ''receive'' an | Adjudicator: The reviewer is entirely correct about the Ge''ez grammar. The nouns `ሰማየ` (samāya) and `ምድረ` (mǝdra) are in the accusative case indicating direction (''to heaven'', ''to earth''), not the nominative case.'
