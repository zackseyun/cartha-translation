theological_decisions:
- issue: Interpretation of the heaven/earth clause
  chosen_reading: 'The line depicts cosmic refusal or exclusion of the sinners: heaven does not receive them and earth does not reach them.'
  alternative_readings:
  - heaven does not hear and earth does not save them
  - they neither ascend to heaven nor arrive on earth
  rationale: The Ge'ez is difficult and the Parables lack Greek/Qumran control here. The chosen rendering stays close to the lexical values of the verbs while preserving the stark apocalyptic image rather than resolving it into a smoother doctrinal paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; Parables are Ge'ez-only and require extra transparency.
