translation:
  text: And they will not ascend to heaven, nor will they arrive on earth; thus it shall be the portion of the sinners who denied the name of the Lord of Spirits, who are thus kept for the day of affliction and tribulation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening clause is textually and syntactically difficult in the Ge'ez. The sense may be that the wicked are excluded from both heaven and earth, or more generally that no cosmic refuge remains for them.
    reason: textual_variant
  - marker: b
    text: Or 'the day of oppression and distress.' The paired expression intensifies the coming judgment.
    reason: lexical_alternative
  - marker: c
    text: Or 'And heaven will not receive them, nor will the earth reach them; thus it shall be the portion of the sinners who denied the name of the Lord of Spirits, who are thus kept for the day of affliction and tribulation.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኢሰማየ
  chosen: will not receive
  alternatives:
  - will not take up
  - will not accept
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With ሰማይ 'heaven' as subject, the verb is best taken as 'receive/accept' rather than a literal auditory sense. This preserves the apocalyptic image that heaven refuses the wicked.
- source_word: የዐርጉ
  chosen: reach
  alternatives:
  - ascend
  - go up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form likely carries the sense of upward movement or attaining. In this paired line with heaven and earth, 'reach' gives coherent English without over-specifying the mechanics.
- source_word: ይበጽሑ
  chosen: reach them
  alternatives:
  - attain them
  - come upon them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means 'arrive at, reach.' Because the line contrasts heaven and earth in relation to the sinners, 'reach them' preserves the difficult imagery transparently.
- source_word: ክፍለ
  chosen: portion
  alternatives:
  - lot
  - share
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard apocalyptic/judgment term for what is allotted to a group. 'Portion' is elevated but readable.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - sinful ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct and consistent rendering of the moral category in judgment context.
- source_word: ክሕዱ
  chosen: denied
  alternatives:
  - rejected
  - disowned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Denied'' best matches the force of repudiating the divine name without importing later confessional language.'
- source_word: ስሞ
  chosen: the name
  alternatives:
  - his name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construct with the following divine title points to 'the name of the Lord of Spirits.' Retaining 'the name' preserves biblical-theological weight attached to the divine name.
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established title within 1 Enoch. 'Lord of Spirits' is concise and preserves the book's own diction.
- source_word: ይትዐቀቡ
  chosen: are kept
  alternatives:
  - are reserved
  - are guarded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive sense fits an eschatological reservation for judgment. 'Are kept' is natural English and leaves the agent implicit as in the source.
- source_word: ዕለተ ስራሕ ወምንዳቤ
  chosen: the day of affliction and tribulation
  alternatives:
  - the day of oppression and distress
  - the day of punishment and anguish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired nouns denote severe eschatological hardship. 'Affliction and tribulation' preserves the doubled judgment formula without flattening it into generic 'punishment.'
