lexical_decisions:
- source_word: በይእቲ ዕለት
  chosen: On that day
  alternatives:
  - In that day
  - At that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula; 'On that day' preserves the prophetic/judgment register without sounding archaic.
- source_word: አነብር
  chosen: I will cause ... to dwell
  alternatives:
  - I will set
  - I will make ... live
  - I will establish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys causing to dwell or placing/settling. 'Cause ... to dwell' best fits the direct object plus location and preserves the enthronement/indwelling nuance.
- source_word: ማእከሎሙ
  chosen: among them
  alternatives:
  - in their midst
  - in the middle of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Means 'in the midst/middle of them.' 'Among them' is clear modern English; the more literal sense is preserved in a footnote alternative.
- source_word: ለኅሩየ ዚአየ
  chosen: my Chosen One
  alternatives:
  - my Elect One
  - the one chosen by me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies the exalted figure of the Parables. 'Chosen One' is the project's preferred transparent rendering; 'Elect One' is traditional but less natural in current English.
- source_word: ወእዌልጦ
  chosen: and I will transform
  alternatives:
  - and I will change
  - and I will alter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates changing or transforming. 'Transform' preserves the cosmic-renewal force better than the flatter 'change.'
- source_word: ለሰማይ
  chosen: heaven
  alternatives:
  - the heaven
  - the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the cosmic realm is intended, not merely the visible sky. Singular 'heaven' follows the Ge'ez form naturally in English.
- source_word: ወእገብራ
  chosen: and make it
  alternatives:
  - and I will make it
  - and I will render it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix refers back to heaven. English requires an object pronoun for clarity.
- source_word: በረከተ ወብርሃነ
  chosen: a blessing and light
  alternatives:
  - blessing and brightness
  - blessedness and light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired nouns express beneficent, radiant renewal. 'Blessing and light' keeps the concrete imagery and avoids abstract over-interpretation.
- source_word: ለዓለም
  chosen: eternal
  alternatives:
  - forever
  - for the age
  - for ever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks enduring duration. 'Eternal' reads smoothly in English while preserving the apocalyptic permanence of the renewed heaven.
