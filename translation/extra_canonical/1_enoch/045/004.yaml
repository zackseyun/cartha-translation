translation:
  text: On that day I will cause my Chosen One to dwell among them, and I will transform heaven and make it a blessing and a light forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in their midst.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my Elect One.'
