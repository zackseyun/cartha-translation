theological_decisions:
- issue: Identity and rendering of ኅሩየ ዚአየ in the Parables
  chosen_reading: my Chosen One
  alternative_readings:
  - my Elect One
  rationale: The title should be translated, not transliterated or harmonized with later messianic formulas. 'Chosen One' preserves the local diction of the Parables and avoids importing later Christian title-language beyond what the Ge'ez warrants.
  doctrine_reference: Translate titles; preserve local passage meaning; do not over-harmonize with later Christian usage.
- issue: Scope of cosmic renewal in the transformed heaven
  chosen_reading: I will transform heaven and make it an eternal blessing and light
  alternative_readings:
  - I will change the heaven into eternal blessing and light
  - I will make heaven blessed and luminous forever
  rationale: The verse depicts cosmic renewal, not merely moral improvement or metaphorical comfort. The wording keeps the apocalyptic image of heaven itself being altered into a state characterized by blessing and light.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic language into generic religious prose.
