translation:
  text: And I will transform the dry land and make it a blessing; and I will cause my chosen ones to dwell upon it, but those who commit sin and transgression shall not tread upon it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dry land.' The Ge'ez term denotes parched or dry ground; the exact nuance may be broader than a single plot of soil.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause literally uses a verb of going or walking: ''shall not go/walk upon it.'' ''Tread upon it'' is chosen to make the exclusion from the renewed land explicit in English.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the dry ground'.
    reason: previous_rendering
lexical_decisions:
- source_word: እዌልጦ
  chosen: I will transform
  alternatives:
  - I will change
  - I will alter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb signals a change of state. 'Transform' preserves the strong sense of reversal in an eschatological setting better than the flatter 'change.'
- source_word: ለየብስ
  chosen: the dry ground
  alternatives:
  - the dry land
  - the wilderness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun points to dryness or parched land. 'Dry ground' keeps the concrete image without over-interpreting it as specifically 'wilderness.'
- source_word: እገብራ በበረከት
  chosen: make it a blessing
  alternatives:
  - make it blessed
  - make it into blessing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction expresses making the land become characterized by blessing. 'Make it a blessing' preserves the resultative force and the apocalyptic reversal of curse to blessing.
- source_word: ሕሩያነ
  chosen: my chosen ones
  alternatives:
  - my elect ones
  - the chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key Parables term. 'Chosen ones' is clear modern English and preserves the local apocalyptic category without importing later doctrinal freight.
- source_word: አነብሮሙ ውስቴታ
  chosen: I will cause them to dwell upon it
  alternatives:
  - I will settle them in it
  - I will make them live there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The causative sense is important: the speaker actively establishes the chosen on the renewed land. ''Upon it'' fits the land imagery better than a more abstract ''there.'''
- source_word: ኃጢአተ ወጌጋየ
  chosen: sin and transgression
  alternatives:
  - sin and wrongdoing
  - sins and offenses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired terms intensify moral rebellion. 'Sin and transgression' preserves the double expression rather than collapsing it into one generic term.
- source_word: ኢይከይዱ ውስቴታ
  chosen: shall not tread upon it
  alternatives:
  - shall not walk upon it
  - shall not pass through it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A verb of going/walking is used, but in context of access to the renewed land, 'tread upon it' conveys exclusion vividly and suits the judgment contrast with the chosen dwelling there.
