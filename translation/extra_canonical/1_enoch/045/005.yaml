theological_decisions:
- issue: Identity and force of 'chosen ones' in the Parables
  chosen_reading: Render as 'my chosen ones' without harmonizing to later Christian terminology.
  alternative_readings:
  - my elect
  - my saints
  rationale: The Ge'ez term denotes those selected/favored by God in this apocalyptic context. 'Chosen ones' preserves the category while avoiding imported ecclesial associations.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it; Book context note on keeping major terms locally grounded.
- issue: Nature of the land promise
  chosen_reading: Translate concretely as renewed 'dry ground' becoming blessed land.
  alternative_readings:
  - understand metaphorically as the earth in general
  - render as 'desert'
  rationale: The verse presents an eschatological reversal of a barren place into a blessed habitation for the chosen. A concrete rendering best preserves the imagery while leaving broader symbolic implications open.
  doctrine_reference: 'Book context note: preserve cosmic/apocalyptic imagery rather than flattening it.'
