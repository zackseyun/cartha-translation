theological_decisions:
- issue: Referent of 'the holy ones'
  chosen_reading: left ambiguous as 'the holy ones'
  alternative_readings:
  - angelic holy beings
  - the righteous community
  rationale: The immediate phrase does not specify whether the holy ones are heavenly
    beings, the elect, or both. The translation preserves the Enochic ambiguity rather
    than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of denying 'the name of the dwelling of the holy ones and of the Lord
    of Spirits'
  chosen_reading: rendered literally with minimal smoothing
  alternative_readings:
  - deny the name by which the holy ones dwell
  - deny the dwelling-place of the holy ones and the Lord of Spirits
  - deny the name of the Lord of Spirits in the dwelling of the holy ones
  rationale: The Ge'ez construction is syntactically difficult and the Parables lack
    Greek/Qumran control here. A relatively literal rendering is more transparent
    and auditable than a confident paraphrase.
  doctrine_reference: Original-language primacy over translation tradition; when the
    sense is uncertain, prefer transparent English plus footnote over false confidence.
