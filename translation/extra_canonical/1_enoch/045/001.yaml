translation:
  text: And this is another parable concerning those who deny the name of the dwelling
    of the holy ones and of the Lord of Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording after 'deny the name' is difficult. The phrase may mean
      'the name of the dwelling of the holy ones and of the Lord of Spirits,' but
      other construals are possible.
    reason: textual_variant
  - marker: b
    text: '''Holy ones'' may refer to heavenly holy beings, the righteous, or a deliberately
      overlapping idea in this apocalyptic context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወዝ
  chosen: And this is
  alternatives:
  - And this
  - And these are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the next unit with a connective plus demonstrative/copular
    sense; in context it marks transition to a new saying.
- source_word: ካልእ ምሳሌ
  chosen: another parable
  alternatives:
  - another similitude
  - a second parable
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Parables section repeatedly uses this formula. 'Parable' is clearer
    modern English, while preserving the formal designation of a visionary discourse.
- source_word: ዲበ
  chosen: concerning
  alternatives:
  - about
  - upon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here the preposition introduces the topic of the parable rather than
    a spatial sense.
- source_word: እለ ይክሕዱ
  chosen: those who deny
  alternatives:
  - those who reject
  - those who disown
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative marker plus imperfect verb yields a substantive participial
    sense. 'Deny' preserves the force of repudiation without over-interpreting whether
    the denial is verbal, covenantal, or practical.
- source_word: ስሞ
  chosen: the name
  alternatives:
  - his name
  - the renown
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form most naturally means 'name.' Because the following construction
    is difficult, the translation keeps the concrete term rather than paraphrasing
    it into 'authority' or 'majesty.'
- source_word: ለማኅደረ ቅዱሳን
  chosen: of the dwelling of the holy ones
  alternatives:
  - of the habitation of the holy ones
  - of the assembly of the holy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ማኅደር commonly denotes dwelling-place or habitation. The genitival relation
    after 'name' is awkward in English and likely reflects a compressed Ge'ez construction;
    retaining 'dwelling' preserves the apocalyptic spatial imagery rather than flattening
    it.
- source_word: ቅዱሳን
  chosen: the holy ones
  alternatives:
  - the saints
  - the consecrated ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Enochic literature this term often refers to heavenly holy beings
    or the sanctified community depending on context. 'Holy ones' preserves the ambiguity
    better than the more tradition-laden 'saints.'
- source_word: ወእግዚአ መናፍስት
  chosen: and of the Lord of Spirits
  alternatives:
  - and the Lord of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard divine title in the Parables. It is translated, not transliterated,
    in keeping with project philosophy on titles.
