theological_decisions:
- issue: Whether to preserve Wisdom as a personified figure or reduce it to an abstract
    quality
  chosen_reading: 'Preserve personification: ''Wisdom found no place where she might
    dwell'''
  alternative_readings:
  - Wisdom found no dwelling-place
  - There was no place for wisdom to dwell
  rationale: The verse presents Wisdom as an active subject with a dwelling. Personification
    is central to Jewish wisdom tradition and should not be flattened into abstraction.
  doctrine_reference: Translation philosophy §Preserve theological tension rather
    than resolve it; book-context note on preserving visionary imagery.
