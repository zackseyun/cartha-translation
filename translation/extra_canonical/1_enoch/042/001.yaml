translation:
  text: Wisdom found no place where she might dwell, but her dwelling was in the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic uses the plural 'heavens,' a common apocalyptic way of speaking
      of the heavenly realm.
    reason: lexical_alternative
lexical_decisions:
- source_word: ጥበብ
  chosen: Wisdom
  alternatives:
  - wisdom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as the personified noun 'Wisdom' with capitalization because
    the verse treats wisdom as an acting figure who seeks a dwelling; preserving the
    personification fits the wisdom-apocalyptic imagery.
- source_word: መካነ
  chosen: place
  alternatives:
  - dwelling-place
  - location
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward spatial term; 'place' is natural English and leaves
    the following dwelling language to carry the fuller image.
- source_word: ኢረከበት
  chosen: found no place
  alternatives:
  - did not find it
  - did not obtain a place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative perfect/preterite sense indicating failure to find. The object
    is the place introduced immediately before, so English idiomatically compresses
    this as 'found no place'.
- source_word: ኀበ ተኃድር
  chosen: where she might dwell
  alternatives:
  - where she could dwell
  - in which she might abide
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses the sought location for settling or lodging. 'Dwell'
    preserves elevated register and the habitation imagery better than a flatter 'stay'.
- source_word: ወሀለወ
  chosen: but ... was
  alternatives:
  - and ... was
  - and there was
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Though waw often means ''and,'' the sense here is adversative in context:
    Wisdom did not find a place on earth, but her dwelling existed elsewhere. ''But''
    makes the contrast explicit without over-paraphrasing.'
- source_word: ማኅደራ
  chosen: her dwelling
  alternatives:
  - her abode
  - a dwelling-place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A habitation term cognate in sense with abode/dwelling-place. 'Her dwelling'
    keeps the personification and links tightly with the previous verb 'dwell'.
- source_word: ውስተ ሰማያት
  chosen: in the heavens
  alternatives:
  - in heaven
  - within the heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural 'heavens' reflects the Ge'ez form and preserves the apocalyptic-cosmic
    register better than singular 'heaven'.
