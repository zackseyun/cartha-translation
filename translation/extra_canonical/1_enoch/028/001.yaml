lexical_decisions:
- source_word: እምህየ
  chosen: from there
  alternatives:
  - thence
  - from that place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional form marks movement away from a previously mentioned location. 'From there' is clear modern English; 'thence' is more archaic than the project style prefers.
- source_word: ሖርኩ
  chosen: I went
  alternatives:
  - I traveled
  - I journeyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: First-person singular perfect of the common verb of going/traveling. 'I went' preserves the simple narrative motion without adding more color than the Ge'ez requires.
- source_word: መንገለ
  chosen: along the way
  alternatives:
  - on the road
  - by the path
  - toward the way
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes way, road, or path. Because the verse is fragmentary in the supplied witness and lacks an explicit destination in the excerpt, 'along the way' best preserves the sense of movement without over-specifying a route or endpoint.
