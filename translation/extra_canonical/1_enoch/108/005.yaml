theological_decisions:
- issue: Whether to soften the scene into a generic description of suffering
  chosen_reading: Retain concrete apocalyptic imagery of fire, weeping, crying out, lamentation, and pain
  alternative_readings:
  - Render more generally as torment or punishment
  rationale: The verse's force lies in its sensory accumulation. The translation preserves the visionary and judicial atmosphere rather than summarizing it.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten judgment formulas.'
