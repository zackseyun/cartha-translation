translation:
  text: And I asked the two holy angels who were with me, and I said to him, “What is this glorious thing? For it is not heaven, but only a flame of fire that burns, and the sound of weeping and crying out and lamentation and grievous pain.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez reads 'I said to him' although the previous phrase mentions 'the two holy angels.' This may mean Enoch addressed one angel as spokesman, or it may reflect a textual irregularity.
    reason: textual_variant
  - marker: b
    text: '''Glorious thing'' could also be rendered ''glorious place'' or ''splendor.'' The wording is kept broad because the referent is not yet explicitly named in the verse itself.'
    reason: lexical_alternative
  - marker: c
    text: Or 'only a blazing fire'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተስእልክዎ
  chosen: I asked
  alternatives:
  - I inquired of
  - I questioned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb introduces Enoch's inquiry to angelic guides. 'Asked' is clear modern English and preserves the directness of the narrative.
- source_word: ፪አመላእክት ቅዱሳን
  chosen: the two holy angels
  alternatives:
  - the two sacred angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral is explicit, and ቅዱሳን is best rendered 'holy' as the standard apocalyptic descriptor, not weakened to a generic adjective.
- source_word: እለ ምስሌየ
  chosen: who were with me
  alternatives:
  - who accompanied me
  - who were beside me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative phrase identifies the angels as Enoch's accompanying guides. 'Were with me' is natural and sufficiently close.
- source_word: እቤሎ
  chosen: I said to him
  alternatives:
  - I said to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The extant Ge'ez form is singular, so the main text preserves that reading even though the prior referent is plural ('two angels'). This may reflect Enoch addressing one spokesman among the two.
- source_word: ምንት ውእቱ ዝስቡሕ
  chosen: What is this glorious thing?
  alternatives:
  - What is this glorious place?
  - What is this splendor?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዝስቡሕ derives from the idea of glory/splendor/praise. Because the referent is not yet fully identified, 'thing' keeps the wording broad while preserving the sense of something awe-inspiring.
- source_word: አኮኑ ሰማየ
  chosen: it is not heaven
  alternatives:
  - they are not heavens
  - it is not the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The contrast is between what Enoch sees and heaven proper. Singular 'heaven' fits idiomatic English and the visionary context.
- source_word: ላህበ እሳት
  chosen: a blazing fire
  alternatives:
  - a flame of fire
  - fiery blaze
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is vivid apocalyptic imagery. 'Blazing fire' is readable while retaining the intensity of the image.
- source_word: ባሕቲቱ ዘይነድድ
  chosen: only
  alternatives:
  - alone, burning
  - merely, aflame
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The construction appears to emphasize exclusion: not heaven, but rather/only a burning fiery reality. Because the burning sense is already conveyed by ''blazing fire,'' ''only'' captures the contrast without awkward redundancy.'
- source_word: ቃለ ብካይ
  chosen: the sound of weeping
  alternatives:
  - the voice of weeping
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቃለ can mean voice/sound. In a list of auditory phenomena, 'sound' is the more natural English choice.
- source_word: ጽራሕ
  chosen: crying out
  alternatives:
  - screaming
  - outcry
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term intensifies the lament. 'Crying out' preserves the verbal force without over-specifying tone.
- source_word: አውያት
  chosen: lamentation
  alternatives:
  - wailing
  - groaning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal term suits the elevated register and keeps distinction from the preceding 'weeping' and 'crying out.'
- source_word: ሕማም ኀያል
  chosen: grievous pain
  alternatives:
  - mighty pain
  - severe suffering
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes intense suffering. 'Grievous pain' preserves both severity and solemn register.
