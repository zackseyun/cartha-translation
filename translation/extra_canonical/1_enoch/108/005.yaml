  rationale: 'The draft collapses ''ላህበ እሳት'' (flame of fire) and ''ዘይነድድ'' (which burns) into ''blazing fire'' to avoid redundancy. However, ''flame of fire'' is a standard apocalyptic idiom, and preserving ''that burns'' maintains consistency with the exact same imagery in the preceding verse (108:4, ''a flame of fire, as it burned''). Apocalyptic literature frequently relies on this kind of repetitive, cumulative phrasing. | Adjudicator: The Ge''ez text explicitly reads `ላህበ፡ እሳት` (flame of fire) followed by the relative clause `ዘይነድድ` (which burns). The current rendering ''blazing fire'' is a dynamic equivalence that obscures both the s'
