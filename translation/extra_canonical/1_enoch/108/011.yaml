theological_decisions:
- issue: Meaning of ሃይማኖት in an ethical-apocalyptic context
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: Per project defaults, 'faith' is preferred in the main text unless context requires otherwise. Here the verse speaks of people not being honored in bodily life in proportion to their steadfast trust/commitment; 'faithfulness' is possible, so it is preserved in a footnote rather than erased.
  doctrine_reference: 'Translation philosophy §Contested terms: πίστις → faith; footnote alternatives where contested'
- issue: Identity of those 'born in darkness' who are then transformed
  chosen_reading: the same group is viewed under reversal imagery rather than as a separate condemned class
  alternative_readings:
  - a second group distinct from 'the good ones'
  - those formerly in ignorance who are later enlightened
  rationale: 'The verse''s syntax joins the clauses closely enough to read a redemptive reversal: the speaker summons the spirits of the good and speaks of transforming those born in darkness who were not honored in the flesh. This preserves the tension of apocalyptic vindication without over-systematizing the anthropology.'
