translation:
  text: And now I will summon the spirits of the good ones from the generation of light, and I will transform those who were born in darkness, who in their flesh were not repaid with honor as their faith deserved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their faithfulness deserved.' The Ge'ez term can denote faith in the sense of steadfast fidelity as well as belief.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'I will transform' is difficult. A more image-specific sense such as 'I will make shine' or 'I will illumine' may underlie the line.
    reason: textual_variant
  - marker: c
    text: Or 'And now I summon their spirits—the good ones from the generation of light—and I will transform'.
    reason: previous_rendering
lexical_decisions:
- source_word: እጼውዕ
  chosen: I summon
  alternatives:
  - I call
  - I invoke
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes calling out or summoning. 'Summon' preserves the solemn, apocalyptic force better than the flatter 'call,' while avoiding the ritual overtones of 'invoke'.
- source_word: መናፍስቲሆሙ
  chosen: their spirits
  alternatives:
  - their souls
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural of 'spirit' is the more transparent rendering and preserves the text's anthropological ambiguity without forcing a later soul/spirit distinction.
- source_word: ለኄራን
  chosen: the good ones
  alternatives:
  - the righteous
  - the blessed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez term points to goodness or beneficence. 'The good ones' is more lexically direct here than 'the righteous,' which would import a more technical covenantal category not explicit in this word.
- source_word: እምትውልድ እንተ ብርሃን
  chosen: from the generation of light
  alternatives:
  - from the offspring of light
  - from the lineage of light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the apocalyptic imagery of belonging to a luminous lineage or age. 'Generation' is idiomatic and keeps the metaphor intact.
- source_word: እዊልጥ
  chosen: I will transform
  alternatives:
  - I will make shine
  - I will cause to be bright
  - I will change
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult, but in context it appears to indicate a change effected upon those born in darkness. 'Transform' captures the reversal motif without overcommitting to a narrower physical image.
- source_word: ተወልዱ በጽልመት
  chosen: were born in darkness
  alternatives:
  - were begotten in darkness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering that preserves the contrast with 'generation of light' and the apocalyptic symbolism of darkness.
- source_word: በሥጋሆሙ
  chosen: in their flesh
  alternatives:
  - in their bodies
  - during their bodily life
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Flesh'' is the more literal rendering and preserves the embodied, mortal setting of their earthly experience.'
- source_word: ኢተፈደዩ ክብር
  chosen: were not repaid with honor
  alternatives:
  - did not receive glory
  - were not rewarded with honor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase suggests recompense or repayment in the form of honor. 'Repaid with honor' preserves the judicial/reward nuance better than a simple 'receive glory.'
- source_word: ከመ ይደሉ ለሃይማኖቶሙ
  chosen: as their faith deserved
  alternatives:
  - as was fitting for their faith
  - as was due to their faithfulness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses fittingness or due measure in relation to their ሃይማኖት. 'Faith' is the default project rendering, while the footnote preserves 'faithfulness' as a viable alternative in this ethical context.
