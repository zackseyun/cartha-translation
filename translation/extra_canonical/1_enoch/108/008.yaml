theological_decisions:
- issue: Whether the verse contrasts love for God with renunciation of material wealth
    in a moral-ascetic sense or merely states poverty
  chosen_reading: A deliberate renunciation of worldly goods out of devotion to God
  alternative_readings:
  - A description of people who simply lacked wealth
  - A generalized statement against greed only
  rationale: The repeated verb 'love' links devotion to God with refusal to love gold,
    silver, and worldly goods. The final clause about giving their bodies to affliction
    suggests chosen endurance or faithful suffering, not mere economic status.
  doctrine_reference: Preserve theological tension rather than resolve it; keep the
    local passage's rhetoric of devotion and suffering.
