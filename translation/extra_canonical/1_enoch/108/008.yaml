translation:
  text: those who love God, and did not love gold or silver or any of the good things
    that are in the world, but gave their bodies over to affliction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ge'ez ሥጋ can be rendered 'flesh' or 'body'; 'bodies' is chosen here for
      clearer English, but the wording still emphasizes embodied suffering.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'any of the good things that are in the world' is textually
      awkward in the OCR witness; it likely refers broadly to the world's desirable
