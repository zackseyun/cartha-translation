    reason: textual_variant
lexical_decisions:
- source_word: እለ
  chosen: those who
  alternatives:
  - the ones who
  - they who
  lexicon: Dillmann
  rationale: Relative plural marker introducing the group being described; 'those
    who' is natural English while preserving the relative construction.
- source_word: ያፈቅርዎ ለአምላክ
  chosen: love God
  alternatives:
  - have loved God
  - are loving God
  lexicon: Dillmann
  rationale: The verb from the root 'to love' with object marker plus 'God' plainly
    denotes devotion to God. Simple present in English fits the gnomic characterization
    of the righteous.
- source_word: ወኢወርቀ ወኢብሩረ አፍቀሩ
  chosen: did not love gold or silver
  alternatives:
  - have not loved gold or silver
  - did not desire gold or silver
  lexicon: Dillmann
  rationale: The repeated negative with 'gold' and 'silver' is best carried directly.
    'Love' keeps the lexical tie with the earlier verb for loving God, preserving
    the contrast between proper and misplaced affection.
- source_word: ወኢኵሎ ሠናየ ዘውስተ ዓለም
  chosen: or any of the good things that are in the world
  alternatives:
  - nor anything good in the world
  - nor all the good things in the world
  lexicon: Dillmann
  rationale: The phrase appears to negate attachment to worldly goods generally. Because
    the OCR form is somewhat uncertain, 'any of the good things that are in the world'
    preserves the likely distributive sense without overcommitting to a reconstructed
    reading.
- source_word: አላ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: Dillmann
  rationale: Strong adversative contrasting worldly attachment with voluntary suffering.
- source_word: ወሀቡ ሥጋሆሙ
  chosen: gave their bodies over
  alternatives:
  - gave their flesh
  - handed over their bodies
  lexicon: Dillmann
  rationale: ሥጋ can mean 'flesh' or 'body.' Here 'bodies' is clearer in English for
    physical self-surrender to suffering, while still reflecting embodied endurance
    rather than a merely inward attitude.
- source_word: ለጻዕር
  chosen: to affliction
  alternatives:
  - to hardship
  - to toil
  - to suffering
  lexicon: Dillmann
  rationale: The noun denotes distress, hardship, or affliction. 'Affliction' best
    fits the ascetic and persecuted tone of the verse without narrowing it to labor
    alone.
