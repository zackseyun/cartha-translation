lexical_decisions:
- source_word: ወይጸርኁ
  chosen: and they will cry out
  alternatives:
  - and they will lament
  - and they will wail
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries the sense of crying out loudly or lamenting. 'Cry out' preserves the vivid apocalyptic force without over-specifying grief as mourning.
- source_word: ወይሬእይዎሙ
  chosen: and see them
  alternatives:
  - and look upon them
  - and behold them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of the verb 'to see' with object suffix. 'See them' is clear modern English and preserves the directness of the scene.
- source_word: ኃጥኣን
  chosen: the sinners
  alternatives:
  - sinners
  - the sinful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard apocalyptic designation for the wicked. The article is supplied in English for naturalness and because the class is definite in context.
- source_word: እንዘ ይትወሐውሑ
  chosen: while they wander about
  alternatives:
  - while they are agitated
  - while they are in turmoil
  - while they are scattered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult, but the context suggests restless movement or disturbance. 'Wander about' fits the paired motion with the following verb and preserves the image of unsettled roaming.
- source_word: ወየሐውሩ
  chosen: and they will go
  alternatives:
  - and they will walk
  - and they will depart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The common motion verb is best rendered 'go' here, since the destination clause that follows is more important than the manner of movement.
- source_word: እሙንቱሂ
  chosen: and they themselves
  alternatives:
  - and they too
  - they indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronoun with emphatic particle marks these same sinners as the ones who proceed to the appointed place. 'They themselves' preserves the emphasis.
- source_word: በኀበ
  chosen: to where
  alternatives:
  - toward
  - unto the place where
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preposition marks direction toward a destination. 'To where' keeps the clause compact and natural in English.
- source_word: ተጽሕፉ ሎሙ መዋዕለ ወእዝማን
  chosen: the days and the times have been written down for them
  alternatives:
  - their days and times are recorded
  - the appointed days and seasons are written for them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive verb plus dative indicates what has been inscribed for them beforehand. 'Written down' preserves the heavenly-book motif common in apocalyptic literature.
- source_word: ራእየ ኅቡኣት
  chosen: the vision of the hidden things
  alternatives:
  - the vision of the secrets
  - the revelation of hidden things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to revealed mysteries shown in visionary form. 'Hidden things' is preferred over 'secrets' because it sounds less colloquial and better suits the register.
- source_word: ዘሄኖክ
  chosen: that Enoch saw
  alternatives:
  - of Enoch
  - which belonged to Enoch
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the surrounding syntax and the likely sense of the colophon-like phrase, the clause is best understood as referring to the vision Enoch saw, not merely a possessive label.
