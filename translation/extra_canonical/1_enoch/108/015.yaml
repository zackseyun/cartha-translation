translation:
  text: And the sinners will cry out and see them while they shine, and they themselves will go to where the days and the times have been written down for them. The vision of the hidden things of Enoch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The closing words may function as a subscription or title: ''The vision of the hidden things that Enoch saw,'' rather than as part of the sinners'' movement clause.'
    reason: textual_variant
  - marker: b
    text: '''Written down for them'' reflects the apocalyptic motif of fixed, recorded times of judgment.'
    reason: cultural_note
  - marker: c
    text: The verb rendered 'wander about' is difficult and may also suggest agitation or turmoil rather than aimless movement.
    reason: lexical_alternative
  - marker: d
    text: Or 'while they wander about'.
    reason: previous_rendering
  - marker: e
    text: Or ', in the vision of the hidden things that Enoch saw.'.
