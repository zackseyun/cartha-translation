theological_decisions:
- issue: Whether the closing phrase functions as a simple title/colophon or as part of the sentence's semantic content
  chosen_reading: Integrated into the verse as 'in the vision of the hidden things that Enoch saw'
  alternative_readings:
  - 'A separate subscription: ''The vision of the hidden things which Enoch saw'''
  - A book title appended after the verse
  rationale: The Ethiopic line as given runs continuously and can be read as concluding the sentence with a reference to the visionary source. Because the phrase may also preserve a colophon, the alternative is noted in a footnote rather than omitted.
  doctrine_reference: Preserve ambiguity rather than resolve it where the source is genuinely uncertain.
