lexical_decisions:
- source_word: እወፅኦሙ
  chosen: I will bring them out
  alternatives:
  - I will lead them forth
  - I will cause them to come out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes causing a group to go out or come forth. 'Bring them
    out' is natural English and preserves the movement from a prior hidden or afflicted
    state into a new condition.
- source_word: በብሩህ ብርሃን
  chosen: into the bright light
  alternatives:
  - in bright light
  - with shining light
  - into radiant light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled light imagery intensifies luminosity. 'Bright light' keeps
    the apocalyptic imagery without over-poetic expansion; 'into' fits the motion
    of the preceding verb better than a merely instrumental 'with'.
- source_word: ለእለ አፍቀርዎ ለስምየ ቅዱስ
  chosen: for those who loved my holy name
  alternatives:
  - to those who loved my holy name
  - those who have loved my holy name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies the beneficiaries as the people characterized by
    love for the speaker's holy name. 'For those who loved my holy name' reads smoothly
    while preserving the covenantal-reverential force of loving the divine name.
- source_word: አነብር
  chosen: I will seat them
  alternatives:
  - I will make them dwell
  - I will set them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this enthronement context, the verb is best taken as causing them
    to sit or be placed, not merely to dwell. 'Seat them' preserves the royal/judicial
    image.
- source_word: አሐደ አሐደ
  chosen: one by one
  alternatives:
  - each one individually
  - one and one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repetition marks distributive individuality. 'One by one' is concise
    and preserves the emphatic sense that each person is individually installed.
- source_word: መንበረ ክብር
  chosen: the throne of his glory
  alternatives:
  - the seat of his glory
  - the glorious throne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መንበር commonly denotes a seat or throne; in apocalyptic/judgment settings
    'throne' is the stronger and more fitting choice. The genitive construction is
    preserved rather than flattened into an adjective.
- source_word: ዚአሁ
  chosen: his
  alternatives:
  - its
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix most naturally refers to a personal antecedent, likely God/the
    Lord in context. 'His' preserves the personal and theological force of the enthronement
    scene.
