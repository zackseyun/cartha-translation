translation:
  text: And I will bring out into bright light those who loved my holy name, and I
    will seat each one on the throne of his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for those who have loved my holy name.' The Ge'ez construction may be
      read as identifying the people for whose sake or to whom this bringing-out is
      directed.
    reason: lexical_alternative
  - marker: b
    text: 'The final pronoun is most naturally read as personal: ''his glory.'' Some
