theological_decisions:
- issue: Referent of 'his glory' in the final phrase
  chosen_reading: The pronoun refers to God/the Lord, so the righteous are seated
    on the throne associated with his glory.
  alternative_readings:
  - The pronoun could refer back to another exalted figure in the immediate literary
    context.
  - The phrase could be rendered more vaguely as 'the glorious throne.'
  rationale: Given the first-person divine speech and the broader apocalyptic pattern
    of vindication before God's glory, the most coherent reading is that the speaker
    seats the faithful on the throne belonging to his glory. The English keeps the
    pronoun explicit rather than resolving it into a title.
  doctrine_reference: Preserve theological tension rather than resolve it; render
    one reading in the main text and preserve alternatives transparently.
