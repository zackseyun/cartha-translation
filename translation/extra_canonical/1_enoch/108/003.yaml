translation:
  text: But you, hold firm until sin passes away; for their names will be blotted
    out from the book of life and from the books of the holy ones, and their offspring
    will be destroyed forever. And their spirits will be slain, and they will cry
    out and lament in a desolate place that cannot be shown, and in burning fire;
    for there is no earth there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that cannot be seen.' The Ge'ez expression is difficult, and a more
      literal rendering is retained in the main text to avoid false precision.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'there is no earth there' is likely part of the visionary description
      of the place of punishment; it is rendered literally because the image is unusual
      and uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: ጽንሑ
  chosen: hold firm
  alternatives:
  - stand fast
  - endure
  - remain steadfast
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plural calling for steadfast endurance. 'Hold firm' preserves
    the exhortational force in readable English without sounding archaic.
- source_word: ተሐልፍ ኃጢአት
  chosen: sin passes away
  alternatives:
  - sin is removed
  - sin comes to an end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys passing over or passing away. The phrase is kept somewhat
    literal to preserve the apocalyptic expectation of sin's termination, not merely
    individual forgiveness.
- source_word: ይደመስስ
  chosen: will be blotted out
  alternatives:
  - will be erased
  - will be wiped away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Because the object is 'their names' and the context is written heavenly
    records, 'blotted out' best preserves the register of inscription and judgment.
- source_word: እመጽሐፈ ሕይወት
  chosen: from the book of life
  alternatives:
  - from the scroll of life
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard apocalyptic image of heavenly record. 'Book of life' is the
    most transparent rendering of the Ge'ez phrase and fits the inscription context.
- source_word: እመጻሕፍተ ቅዱሳን
  chosen: from the books of the holy ones
  alternatives:
  - from the books of the saints
  - from the writings of the holy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural 'books' should be preserved. 'Holy ones' is preferred over 'saints'
    to avoid later ecclesiastical overtones and to keep the apocalyptic sense open.
- source_word: ዘርኦሙ ይትሐጐል ለዓለም
  chosen: their offspring will be destroyed forever
  alternatives:
  - their seed will perish forever
  - their descendants will be cut off forever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Offspring'' communicates lineage clearly in modern English. ''Destroyed
    forever'' preserves the severity of the judgment formula.'
- source_word: መንፈሳቲሆሙ ይትቀተሉ
  chosen: their spirits will be slain
  alternatives:
  - their spirits will be killed
  - their souls will be slain
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text uses the plural of 'spirit'; 'spirits' should be retained rather
    than normalized to 'souls.' 'Slain' fits the violent judicial imagery better than
    the flatter 'killed.'
- source_word: ይጸርኁ ወየአውይዉ
  chosen: they will cry out and lament
  alternatives:
  - they will scream and wail
  - they will cry aloud and howl
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A paired expression of anguished outcry. 'Cry out and lament' preserves
    the emotional force without becoming melodramatic.
- source_word: በመካነ ባድው
  chosen: in a desolate place
  alternatives:
  - in a waste place
  - in an empty place
  - in a wilderness place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a barren, empty location of punishment. 'Desolate
    place' is vivid and natural English.
- source_word: ዘኢያስተርኢ
  chosen: that cannot be shown
  alternatives:
  - that cannot be seen
  - that is not visible
  - that cannot be displayed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult. A cautious literal rendering, 'cannot be shown,'
    preserves the uncertainty better than overconfidently choosing 'invisible.'
- source_word: በእሳተ ነዱ
  chosen: in burning fire
  alternatives:
  - in blazing fire
  - in the fire of burning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase intensifies the fire imagery. 'Burning fire' keeps the Hebraic/apocalyptic
    redundancy rather than smoothing it away.
- source_word: ኢሀሎ ህየ ምድር
  chosen: there is no earth there
  alternatives:
  - there is no land there
  - there is no ground there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The line is strange and should remain strange. 'Earth' preserves the
    cosmic feel and avoids prematurely narrowing the image to ordinary terrain.
