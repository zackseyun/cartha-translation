theological_decisions:
- issue: Meaning of the heavenly records from which names are removed
  chosen_reading: The verse refers to apocalyptic books of judgment and belonging,
    including a 'book of life' and additional 'books of the holy ones.'
  alternative_readings:
  - The plural books may mean records belonging to the holy ones
  - The phrase may refer more generally to sacred writings
  rationale: The immediate context is judicial inscription and erasure of names. Retaining
    both 'book of life' and 'books of the holy ones' preserves the layered heavenly-record
    imagery without collapsing the plural into a single concept.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
- issue: Nature of the punishment described for 'their spirits'
  chosen_reading: The text depicts post-judgment destruction and torment in apocalyptic
    imagery without systematizing a later doctrine of the afterlife.
  alternative_readings:
  - Metaphorical language for total ruin
  - A more developed picture of conscious postmortem punishment
  rationale: The verse combines slaying, crying out, lamenting, desolation, and fire.
    The translation preserves the imagery as given rather than harmonizing it into
    a later doctrinal scheme.
  doctrine_reference: Preserve theological tension rather than resolve it.
