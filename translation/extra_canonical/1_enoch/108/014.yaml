theological_decisions:
- issue: Moral valuation of those 'born in darkness' and the force of the passive
    verb
  chosen_reading: The verse is rendered with the difficult wording 'being loved in
    darkness' rather than a more interpretive condemnation.
  alternative_readings:
  - being kept in darkness
  - being abandoned to darkness
  - being gathered in darkness
  rationale: The Ge'ez witness as given points most directly to a verb of love/affection,
    even though the sense is unexpected in context. Following project philosophy,
    the translation preserves the tension rather than resolving it by paraphrase into
    a more familiar judgment image.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
