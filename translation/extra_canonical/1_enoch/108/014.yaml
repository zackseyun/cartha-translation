translation:
  text: And I saw those who were born in darkness being loved in darkness, while the
    righteous were shining.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'being loved in darkness' is textually and semantically difficult.
      Because the Ge'ez wording appears to derive from a verb of love or affection,
      the translation keeps that sense in the main text rather than replacing it with
      a smoother interpretive alternative.
    reason: textual_variant
  - marker: b
    text: Or 'while the righteous were made bright.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይሬ
  chosen: And I saw
  alternatives:
  - And I looked
  - And I observed
  lexicon: Dillmann
  rationale: The verb introduces Enoch's visionary report. 'I saw' is the most direct
    and natural rendering for the apocalyptic first-person scene.
- source_word: እይዎሙ ለእለ ተወልዱ በጽልመት
  chosen: those who were born in darkness
  alternatives:
  - those born in darkness
  - those begotten in darkness
  lexicon: Dillmann
  rationale: The relative construction points to a class of people characterized by
    origin 'in darkness.' 'Were born' is idiomatic English and preserves the passive
    sense of the Ge'ez.
- source_word: ይትወደዩ በጽልመት
  chosen: being loved in darkness
  alternatives:
  - being cherished in darkness
  - being favored in darkness
  lexicon: Dillmann
  rationale: The passive/reflexive form is difficult, but the root is associated with
    love or affection. I retain the surprising wording rather than smoothing it into
    a more interpretive judgment formula, since the Ge'ez does not plainly say 'cast
    away' or 'judged.'
- source_word: በጽልመት
  chosen: in darkness
  alternatives:
  - by darkness
  - into darkness
  lexicon: Dillmann
  rationale: The preposition most naturally marks sphere or condition here. Repeating
    'in darkness' preserves the rhetorical repetition of the verse.
- source_word: እንዘ ይትወሐውሑ
  chosen: while ... were shining
  alternatives:
  - while ... were made bright
  - while ... were illuminated
  lexicon: Dillmann
  rationale: The verb appears to denote becoming bright or shining. 'Were shining'
    gives clear English while preserving the vivid apocalyptic contrast with darkness.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  lexicon: Dillmann
  rationale: This is a key Enochic term and should be rendered consistently as 'the
    righteous' unless context strongly demands otherwise.
