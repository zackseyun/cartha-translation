theological_decisions:
- issue: Whether to render the final clause with fulfillment language
  chosen_reading: everything will be done
  alternative_readings:
  - all will come to pass
  - everything will be fulfilled
  rationale: The Ge'ez passive verb naturally allows a more literal 'be done.' This preserves the text's own diction and avoids over-harmonizing with familiar biblical fulfillment formulas.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether ጽኁፋን should be taken as a general insult term or specifically impious speech
  chosen_reading: blasphemers
  alternative_readings:
  - revilers
  - scoffers
  rationale: In immediate context the offenders distort what the Lord spoke through prophets, so a stronger impiety-oriented rendering best fits the verse's theological charge, though some lexical uncertainty remains.
  doctrine_reference: Translation philosophy §3, §4
