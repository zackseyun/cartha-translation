translation:
  text: 'And he said to me, “This is the place that you see: here the spirits of sinners and blasphemers and those who do evil will be cast, and those who twist everything that the Lord has spoken by the mouth of the prophets—all the things that are to be done.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The term rendered 'blasphemers' may also carry the broader sense of revilers or abusive speakers; the exact nuance of the Ge'ez word is uncertain in this OCR witness.
    reason: lexical_alternative
  - marker: b
    text: The final clause could also be rendered 'all will come to pass' or 'everything will be fulfilled.' The more literal 'will be done' is kept to avoid smoothing the wording into a familiar formula.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'the prophets' is followed by an awkward qualifier in the Ge'ez ('who were/are'), which may simply identify the prophets rather than add new meaning.
    reason: textual_variant
  - marker: d
    text: Or 'that you have seen'.
    reason: previous_rendering
  - marker: e
    text: Or 'will be gathered together'.
    reason: previous_rendering
  - marker: f
    text: Or 'the prophets—everything will be done.'.
    reason: previous_rendering
lexical_decisions:
- source_word: መካን
  chosen: place
  alternatives:
  - region
  - spot
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward locative noun fits the visionary setting. 'Place' preserves the simplicity and apocalyptic scene-setting without over-specifying.
- source_word: ዘትሬኢ
  chosen: that you have seen
  alternatives:
  - which you saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative plus verb points back to Enoch's visionary sight. Present perfect English gives natural readability while preserving prior vision reference.
- source_word: ይትወደዩ
  chosen: will be gathered together
  alternatives:
  - will be assembled
  - will be brought together
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense suggests being collected into one place. 'Gathered together' preserves the judgment-scene force better than a flatter 'are' or 'stay'.
- source_word: መናፍስተ
  chosen: spirits
  alternatives:
  - souls
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Enochic judgment contexts, 'spirits' better preserves the text's supernatural anthropology and avoids importing later English soul-language not demanded by the Ge'ez.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - sinful ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering with clear moral force; consistent with apocalyptic judgment diction.
- source_word: ጽኁፋን
  chosen: blasphemers
  alternatives:
  - revilers
  - those who speak abusively
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the following clause about corrupting what the Lord spoke, a speech-sin term is likely. 'Blasphemers' preserves the gravity of impious speech, though the exact nuance may be broader.
- source_word: እኩየ
  chosen: evil
  alternatives:
  - wickedness
  - what is evil
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The object of 'do' is broad moral evil. 'Do evil' is idiomatic and suitably weighty.
- source_word: ይመይጡ
  chosen: twist
  alternatives:
  - pervert
  - alter
  - falsify
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context concerns hostile handling of prophetic speech. 'Twist' is readable modern English that preserves the sense of distortion without overcommitting to a narrower technical term.
- source_word: ኵሎ ዘነገረ እግዚእ በኣፈ ነቢያት
  chosen: everything that the Lord has spoken by the mouth of the prophets
  alternatives:
  - all that the Lord spoke through the prophets
  - everything the Lord declared by the prophets' mouth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the prophetic mediation explicit and preserves the Semitic-style phrase 'by the mouth of' rather than flattening it to a generic 'through'.
- source_word: እለ ሀለዉ
  chosen: the prophets
  alternatives:
  - the prophets who were
  - the prophets who exist
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative phrase is awkward in English and likely functions as a qualifier on 'prophets.' It is left implicit in the main line for readability, with uncertainty noted in a footnote.
- source_word: ኵሉ ይትገበር
  chosen: everything will be done
  alternatives:
  - all will come to pass
  - everything will be fulfilled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal rendering of the passive verb is retained. 'Will be done' avoids importing later canonical fulfillment formulas too strongly, while still conveying inevitability.
