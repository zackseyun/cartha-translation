theological_decisions:
- issue: Meaning of ascetic renunciation in the clause about earthly food and the soul
  chosen_reading: The verse commends radical renunciation of earthly sustenance or pleasure as part of faithful endurance, without importing later monastic technical language.
  alternative_readings:
  - A metaphor for rejecting worldly pleasures generally
  - A statement about martyrdom or fasting unto death
  rationale: The Ge'ez explicitly mentions earthly food and self-renunciation, but does not specify a formal ascetic institution. The translation keeps the concrete imagery and leaves the broader interpretation open.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of መንፈስ in the simile
  chosen_reading: Rendered as 'breath' to emphasize transience rather than a disembodied personal spirit.
  alternative_readings:
  - spirit
  - wind
  rationale: In this immediate simile, the passing quality is central. 'Breath' communicates fragility and brevity without denying the wider semantic range of the term.
  doctrine_reference: Consistency of key terms, or documented exception.
