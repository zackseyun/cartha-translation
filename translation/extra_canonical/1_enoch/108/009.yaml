translation:
  text: those who, from the time they came to be, did not desire the food that is on the earth, but regarded their lives as a passing breath, and they kept this; and the Lord tested them greatly, and their spirits were found pure, so that they might bless his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a spirit that passes away'; the Ge'ez word can denote spirit, wind, or breath.
    reason: lexical_alternative
  - marker: b
    text: The clause 'gave up their souls' is difficult and may express severe self-denial, even to the point of risking life.
    reason: alternative_reading
  - marker: c
    text: Or 'gave up their souls'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኢፈተዉ
  chosen: did not desire
  alternatives:
  - did not love
  - did not take pleasure in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys desire or delight rather than mere refusal. 'Did not desire' preserves the inward orientation of ascetic renunciation in the verse.
- source_word: መብልዕተ
  chosen: food
  alternatives:
  - nourishment
  - eating
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun refers concretely to what is eaten. 'Food' is plain and natural English while retaining the earthly contrast.
- source_word: ዘውስተ ምድር
  chosen: that is on the earth
  alternatives:
  - of the earth
  - in the world
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A relatively formal rendering preserves the spatial imagery and avoids broadening the phrase into a generalized 'worldly' idea not explicit in the Ge'ez.
- source_word: ረሰዩ ነፍሳቶሙ
  chosen: gave up their souls
  alternatives:
  - denied themselves
  - forsook their lives
  - made their souls lean
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult, but it appears to describe radical self-renunciation. 'Gave up their souls' keeps the stark apocalyptic-ascetic force without overexplaining.
- source_word: ከመ መንፈስ እንተ ተሐልፍ
  chosen: as a passing breath
  alternatives:
  - like a spirit that passes away
  - like wind that passes by
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መንፈስ can mean spirit, wind, or breath. Here the simile stresses transience; 'passing breath' communicates that image in idiomatic English while preserving the metaphor.
- source_word: ዐቀቡ
  chosen: kept this
  alternatives:
  - observed this
  - guarded this
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb often means keep, guard, or observe. 'Kept this' is concise and leaves open whether the reference is to a command, discipline, or way of life.
- source_word: ብዙኃ አመከሮሙ
  chosen: tested them greatly
  alternatives:
  - tried them much
  - disciplined them severely
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context favors proving or testing rather than moral instruction alone. 'Greatly' reflects the adverbial force of 'much/many' without awkwardness.
- source_word: ተረክቡ መንፈሳቲሆሙ ንጹሕተ
  chosen: their spirits were found pure
  alternatives:
  - their spirits proved pure
  - their spirits were received as pure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive sense after testing suggests the result of examination. 'Were found pure' fits the judicial-probative flow of the sentence.
- source_word: ከመ ይባርክዎ ለስሙ
  chosen: so that they might bless his name
  alternatives:
  - that they might bless his name
  - to bless his name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the purpose/result nuance of ከመ with the imperfect, while keeping the biblical idiom 'bless his name' intact.
