theological_decisions:
- issue: Sense of the heavenly written items
  chosen_reading: The verse refers to heavenly written records that angels read in
    order to know the destinies of various human groups.
  alternative_readings:
  - The second noun may mean 'evil things' rather than 'records,' yielding a more
    awkward sense about writings of evil deeds.
  - The line may refer more specifically to books of judgment or memorial books.
  rationale: The immediate syntax links the items to angelic reading and knowledge
    of what will befall people, which strongly favors documentary/heavenly-record
    imagery common in apocalyptic literature.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten heavenly-book motifs
    into generic prose.
- issue: Value of God's recompense to those who afflicted their bodies
  chosen_reading: The recompense is presented positively, referring to vindication
    or reward from God for suffering/endurance.
  alternative_readings:
  - A more neutral 'requital' without explicit positive force
  - A reference to ascetic self-mortification specifically
  rationale: The surrounding groups after 'sinners' appear to be oppressed or humble
    righteous persons, so the divine response is best understood as vindicating recompense
    rather than punishment.
  doctrine_reference: Preserve theological tension where needed, but read local context
    first rather than importing later ascetic theology.
