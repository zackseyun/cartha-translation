translation:
  text: For there are writings and records concerning them in heaven above, so that
    the angels may read them and know what will come upon the sinners, and upon the
    humble in spirit, and upon those who afflicted their bodies and received recompense
    from God, and those who were put to shame by evil men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The paired expression rendered 'writings and records' is difficult. The
      second term can be understood in more than one way; the translation follows
      the sense of heavenly written records because the next clause says the angels
      read them.
    reason: lexical_alternative
  - marker: b
    text: Or 'the humble souls.' The Ge'ez literally speaks of 'humble spirits/souls.'
    reason: lexical_alternative
  - marker: c
    text: The final clause may also be rendered 'those who were reproached/despised
      by evil men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  chosen: For
  alternatives:
  - because
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the ground or explanation for the preceding statement; 'For'
    preserves the connective force in elevated but readable English.
- source_word: ሀለዉ
  chosen: there are
  alternatives:
  - there exist
  - they are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Existential verb; 'there are' is the most natural English rendering in
    context.
- source_word: ጽሑፋን
  chosen: writings
  alternatives:
  - books
  - documents
  - written records
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes written items; 'writings' keeps the sense broad without
    over-specifying codex-like 'books'.
- source_word: እኩያን
  chosen: records
  alternatives:
  - memorials
  - registers
  - accounts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired expression appears to refer to written heavenly documentation.
    Because the same root elsewhere means 'evil,' the sense here is difficult; 'records'
    best fits the immediate context of things read by angels in heaven.
- source_word: ላዕለ በሰማይ
  chosen: in heaven above
  alternatives:
  - above in heaven
  - in the heavens above
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the locative and elevated apocalyptic register without sounding
    wooden.
- source_word: ከመ ይንብብዎሙ መላእክት
  chosen: so that the angels may read them
  alternatives:
  - that the angels might read them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Purpose clause with plural object suffix; this keeps the heavenly-book
    imagery explicit.
- source_word: ወይእምሩ
  chosen: and know
  alternatives:
  - and understand
  - and learn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple cognitive verb; 'know' is direct and fits the judicial-record
    context.
- source_word: ዘሀሎ ይብጽሖሙ
  chosen: what will come upon
  alternatives:
  - what awaits
  - what will reach
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom points to what is destined to befall the groups named; 'come
    upon' preserves the apocalyptic sense of impending outcome.
- source_word: ለኃጥኣን
  chosen: the sinners
  alternatives:
  - sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard moral category in Enochic judgment language; the article suits
    English style.
- source_word: ለመናፍስት ትኁታን
  chosen: the humble in spirit
  alternatives:
  - the lowly of spirit
  - the humble souls
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'humble spirits/souls.' 'Humble in spirit' is idiomatic English
    and preserves the inward, dispositional sense without importing later beatitude
    language as a quotation.
- source_word: እለ አሕመሙ ሥጋሆሙ
  chosen: those who afflicted their bodies
  alternatives:
  - those who wore out their flesh
  - those who disciplined their bodies
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase suggests bodily suffering or self-denial. 'Afflicted their
    bodies' preserves the severity and avoids softening it into generic 'discipline.'
- source_word: ወተፈድዩ በኀበ አምላክ
  chosen: and received recompense from God
  alternatives:
  - and were repaid by God
  - and found their reward with God
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys repayment or recompense. 'Received recompense from God'
    keeps the judicial-reward nuance and avoids over-interpreting whether the recompense
    is strictly positive reward or broader requital.
- source_word: እለ ኀሥሡ እምእኩያን ሰብእ
  chosen: those who were put to shame by evil men
  alternatives:
  - those who were reproached by wicked people
  - those who were despised by evil men
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is textually and lexically difficult, but the most coherent
    sense is that these righteous sufferers experienced disgrace at the hands of wicked
    humans. 'Evil men' preserves the moral force of እኩያን.
