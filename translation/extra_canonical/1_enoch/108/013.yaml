translation:
  text: And they will shine in times without number, for the righteousness belongs
    to God; for he will give faith to the faithful in the dwelling of the paths of
    uprightness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for unnumbered ages.' The Ge'ez phrase speaks of times that cannot be
      counted.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will give steadfastness/faithfulness to the wise.' The noun rendered
      'faith' may also carry the sense of fidelity.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'dwelling of the paths of uprightness' preserves the text's concrete
      imagery of a place characterized by righteous ways, rather than reducing it
      to a simple abstract expression.
    reason: cultural_note
  - marker: d
    text: Or 'And they will rejoice'.
    reason: previous_rendering
  - marker: e
    text: Or 'righteousness belongs to God'.
    reason: previous_rendering
  - marker: f
    text: Or 'to the wise'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይትወሐውሑ
  chosen: they will rejoice
  alternatives:
  - they will exult
  - they will be gladdened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future/passive-reflexive sense in context points to joyful exultation.
    'Rejoice' is elevated but readable and fits the beatific/apocalyptic tone.
- source_word: በእዝማን ዘአልቦ ኍልቈ
  chosen: in times without number
  alternatives:
  - for unnumbered ages
  - in times without count
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase combines 'times/ages' with a negated term for counting/number.
    'Times without number' preserves the temporal sense without overcommitting to
    the more technical 'ages'.
- source_word: ጽድቅ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Default project rendering favors 'righteousness' for this semantic field.
    In this verse the emphasis is on God's moral rectitude as the ground of the blessed
    state, not specifically juridical justice, though the overlap is real.
- source_word: አነኒሁ ለአምላክ
  chosen: belongs to God
  alternatives:
  - is with God
  - is before God
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is somewhat difficult, but the sense is that righteousness
    is God's own possession or attribute. 'Belongs to God' is idiomatic English that
    preserves this relation.
- source_word: ለመሃይምናን
  chosen: to the wise
  alternatives:
  - to the learned
  - to the understanding ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes those characterized by understanding, instruction, or
    wisdom. 'The wise' is concise and fits wisdom/apocalyptic diction better than
    the more academic 'learned'.
- source_word: ሃይማኖተ
  chosen: faith
  alternatives:
  - faithfulness
  - steadfastness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can cover belief, fidelity, or religious faith. 'Faith' is the
    most direct rendering, while the context of divine gift to the wise leaves open
    a nuance of steadfast fidelity; that alternative is preserved in a footnote.
- source_word: በማኅደረ ፍናዋተ ርትዕ
  chosen: in the dwelling of the paths of uprightness
  alternatives:
  - in the abode of the ways of righteousness
  - in the habitation of righteous paths
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is dense, image-rich language. 'Dwelling' keeps the concrete locative
    image; 'paths of uprightness' preserves the plural metaphor of moral course rather
    than flattening it into an abstract phrase.
