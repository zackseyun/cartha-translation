theological_decisions:
- issue: Meaning of the gift given by God to the wise
  chosen_reading: God gives 'faith' to the wise
  alternative_readings:
  - God gives 'faithfulness/steadfastness' to the wise
  rationale: The Ge'ez noun can denote faith or fidelity. Main text keeps the more
    straightforward 'faith,' but because the context is ethical perseverance in righteous
    ways, a nuance of steadfastness remains plausible and is noted.
  doctrine_reference: Translation philosophy § Preserve theological tension rather
    than resolve it.
