theological_decisions:
- issue: Referent of the first-person pronoun in 'while blessing me'
  chosen_reading: The speaker remains Enoch, and the righteous are depicted as blessing him in connection with his written testimony.
  alternative_readings:
  - '''me'' refers indirectly to God through Enoch''s speech'
  - the text is corrupt and originally referred to God or the Lord
  rationale: The immediate first-person discourse throughout the verse supports retaining the plain grammatical referent rather than silently substituting 'God.' Because the wording is unusual, the translation keeps it and explains the difficulty in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
