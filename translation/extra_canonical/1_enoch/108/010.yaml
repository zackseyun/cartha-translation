translation:
  text: And I have spoken of all their blessings in the books, and he has rewarded them themselves, because these are found to love heaven more than their life in the world; and while they are trodden down by evil men, they hear from them abuse and reviling and are put to shame while blessing me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'their heads.' The phrase may mean their leaders or chiefs; the Ge'ez wording is difficult.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'their breath in the world.' Here 'breath' is rendered as 'life' to convey the idiom.
    reason: lexical_alternative
  - marker: c
    text: The final clause reads 'while blessing me.' The first-person object is retained as written, though some interpreters suspect a difficult or corrupt reading here.
    reason: textual_variant
  - marker: d
    text: Or 'and I have set them down for their leaders'.
    reason: previous_rendering
  - marker: e
    text: Or 'and hear from them abuse and reviling, they endure it while blessing me.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኵሎ በረከቶሙ
  chosen: all their blessings
  alternatives:
  - all their blessedness
  - every blessing belonging to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: በረከት commonly denotes blessing/blessedness. The plural with possessive naturally refers to the blessings pertaining to the righteous described in context. 'Blessings' preserves the concrete apocalyptic register better than abstract 'blessedness.'
- source_word: ነገርኩ በመጻሕፍት
  chosen: I have spoken ... in the books
  alternatives:
  - I recounted ... in the books
  - I declared ... in writings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is a speech/reporting verb; 'spoken' keeps the first-person testimonial tone. 'In the books' reflects the plural and preserves the literary self-reference of the Epistle.
- source_word: ዐሰዮሙ ለአርእስቲሆሙ
  chosen: I have set them down for their leaders
  alternatives:
  - I have arranged them for their heads
  - I have prepared them for their chiefs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult. አርእስት literally means 'heads,' often extended to chiefs/leaders. The verb likely carries the sense of arranging or setting forth. 'Set them down for their leaders' is a restrained rendering that preserves the idiom without overinterpreting.
- source_word: ተረክቡ
  chosen: are found
  alternatives:
  - are discovered
  - are shown
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The passive sense fits the clause: these people are shown/found to be such as love heaven. ''Are found'' is idiomatic and modestly interpretive.'
- source_word: ያፈቅርዎ ለሰማይ
  chosen: to love heaven
  alternatives:
  - to love the heaven
  - to love the heavenly realm
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The object is literally 'heaven.' Retaining 'heaven' preserves the vertical apocalyptic orientation and avoids flattening it into a generalized spirituality.
- source_word: እምእስትንፋሶሙ ዘበዓለም
  chosen: more than their life in the world
  alternatives:
  - more than their breath in the world
  - more than their worldly life
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: እስትንፋስ is literally breath, but in context it metonymically denotes life. 'Life in the world' communicates the sense clearly while preserving the contrast with heaven.
- source_word: ይትከየዱ
  chosen: they are trodden down
  alternatives:
  - they are oppressed
  - they are afflicted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A more vivid rendering suits the apocalyptic rhetoric and likely reflects a verb of trampling/oppression. 'Trodden down' preserves the imagery better than the flatter 'oppressed.'
- source_word: እምእኩያን ሰብእ
  chosen: by evil men
  alternatives:
  - by wicked people
  - by evil humans
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is straightforward. 'Evil men' keeps the moral polarity and elevated register; 'people' would be possible but less forceful.
- source_word: ትዕይርተ ወጽርፈተ
  chosen: abuse and reviling
  alternatives:
  - insult and reproach
  - mockery and blasphemy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired nouns denote hostile speech. 'Abuse and reviling' preserves the doublet and the severity without importing specifically cultic 'blasphemy' where the target is likely the righteous.
- source_word: ኀሥሡ
  chosen: they endure it
  alternatives:
  - they bear it
  - they are patient
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to denote bearing/enduring. 'Endure it' fits the persecution context and reads naturally in English.
- source_word: እንዘ ይባርኩኒ
  chosen: while blessing me
  alternatives:
  - as they bless me
  - while they speak blessing of me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The first-person object should be retained. In context the speaker is Enoch, so the line is left as 'me' rather than paraphrased away. This preserves the textual oddity transparently.
