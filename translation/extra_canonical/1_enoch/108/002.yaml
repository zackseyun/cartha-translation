theological_decisions:
- issue: Whether to render መአብሳን as 'sinners' or 'wicked'
  chosen_reading: sinners
  alternative_readings:
  - wicked ones
  - evildoers
  rationale: The noun points to those marked by sin/guilt, not merely generic badness.
    'Sinners' preserves the moral-religious register common in Enochic judgment language,
    while 'those who do evil' already renders the verbal clause earlier in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
