translation:
  text: You who have done good, wait for those days until those who do evil are finished,
    and the power of the sinners comes to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The exhortation verb may also be understood as 'remain steadfast' or 'endure';
      the sense is patient perseverance until the downfall of the wicked.
    reason: lexical_alternative
  - marker: b
    text: 'The closing clause repeats the idea of completion/end: both the evildoers
      themselves and their power are brought to their finish.'
    reason: cross_reference
lexical_decisions:
- source_word: እለ ገበርክሙ ሠናየ
  chosen: You who have done good
  alternatives:
  - You who have practiced goodness
  - You who have done what is good
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative particle plus perfect verb addresses a group characterized
    by past or ongoing righteous action. 'Done good' is concise and preserves the
    moral polarity with 'do evil' later in the verse.
- source_word: ትጸንሑ
  chosen: wait
  alternatives:
  - remain steadfast
  - endure
  - be patient
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can carry the sense of remaining or enduring, but in this exhortational
    context with a temporal phrase ('for those days / until...') 'wait' best captures
    the forward-looking apocalyptic patience without over-paraphrasing.
- source_word: ለእሉ መዋዕል
  chosen: for those days
  alternatives:
  - until those days
  - through those days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መዋዕል refers to days/times. The preposition is somewhat flexible here;
    'for those days' keeps the Ge'ez structure while allowing the following 'until'
    clause to define the waiting period.
- source_word: እስከ ይትፌጸሙ
  chosen: until ... are finished
  alternatives:
  - until ... are completed
  - until ... come to their end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive form conveys reaching completion or termination.
    Because the object is evildoers, 'are finished' idiomatically communicates their
    end without softening the judgment tone.
- source_word: እለ ይገብሩ እኩየ
  chosen: those who do evil
  alternatives:
  - those who practice evil
  - the evildoers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This mirrors the earlier 'those who have done good' and preserves the
    ethical contrast central to the verse.
- source_word: ወይትፌጸም ኃይሎሙ ለመአብሳን
  chosen: and the power of the sinners comes to an end
  alternatives:
  - and the strength of the wicked is finished
  - and the might of the sinners is completed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኃይል is 'power/strength/might.' መአብሳን denotes sinners or wicked persons.
    'Comes to an end' renders the same completion verb in a natural English way and
    preserves the apocalyptic promise that their oppressive force will cease.
