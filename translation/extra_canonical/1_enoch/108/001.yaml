theological_decisions:
- issue: Whether በደኃሪ መዋዕል should be rendered in a strongly eschatological way
  chosen_reading: in the latter days
  alternative_readings:
  - in later times
  - at the end of the days
  rationale: Within 1 Enoch's apocalyptic setting, the phrase naturally carries end-time
    resonance. The chosen rendering preserves that theological tension without forcing
    a later doctrinal scheme onto the text.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve
    apocalyptic imagery and formulas.
