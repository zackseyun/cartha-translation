translation:
  text: Another book that Enoch wrote for his son Methuselah, and for those who will
    come after him and keep the rule in the latter days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the order,' 'the ordinance,' or 'the prescribed way.' The Ge'ez term
      can denote an established norm or pattern to be observed.
    reason: lexical_alternative
lexical_decisions:
- source_word: ካልእ
  chosen: Another
  alternatives:
  - A second
  - An additional
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term introduces a further writing distinct from what precedes. 'Another'
    is idiomatic English and preserves the sense of an additional book without over-specifying
    sequence.
- source_word: መጽሐፍ
  chosen: book
  alternatives:
  - writing
  - scroll
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary sense is 'book' or 'writing.' 'Book' fits the superscriptional
    style and is the most natural equivalent here.
- source_word: ዘጸሐፈ
  chosen: that ... wrote
  alternatives:
  - which ... wrote
  - that ... composed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A relative construction modifying 'book.' 'Wrote' stays close to the
    Ge'ez verbal sense and avoids the more interpretive 'composed.'
- source_word: ለወልዱ ማቱሳላ
  chosen: for his son Methuselah
  alternatives:
  - to his son Methuselah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The dative marker can be rendered 'for' or 'to.' 'For' works well in
    English for a work written with an intended recipient in view.
- source_word: ለእለ ይመጽኡ እምድኅሬሁ
  chosen: for those who will come after him
  alternatives:
  - for those who come after him
  - for later generations after him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points beyond Methuselah to subsequent people or generations.
    'Will come after him' preserves the future orientation and the personal reference
    of the text.
- source_word: የዓቅቡ
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly carries the sense of keeping, guarding, or observing.
    'Keep' is concise and idiomatic in connection with a prescribed rule or order.
- source_word: ሥርዐተ
  chosen: the rule
  alternatives:
  - the order
  - the ordinance
  - the prescribed way
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote order, rule, ordinance, or prescribed practice. 'Rule'
    best captures a normative pattern of conduct here without narrowing it to a single
    legal enactment.
- source_word: በደኃሪ መዋዕል
  chosen: in the latter days
  alternatives:
  - at the end of the days
  - in later times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is an eschatologically charged temporal phrase. 'In the latter days'
    preserves the apocalyptic register better than the flatter 'in later times.'
