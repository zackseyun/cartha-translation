translation:
  text: And there I saw something like an invisible cloud, for because of its depth I could not look over it; and I saw a flame of fire, as it burned gloriously and things like glorious mountains were circling, and they were moving this way and that way.
  philosophy: optimal-equivalence
  footnotes:
