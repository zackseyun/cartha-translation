translation:
  text: And there I saw something like an invisible cloud, because from its depth
    I was able to look above its measure; and I saw a flame of fire, as it burned
    gloriously and was encircled like glorious mountains, and it kept moving this
    way and that way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'above its measure' is textually difficult in this OCR
      witness. The Ge'ez appears to indicate looking upward beyond the cloud's extent
      or visible form.
    reason: textual_variant
  - marker: b
    text: Or 'was shaken to and fro' for 'kept moving this way and that way.' The
      underlying Ge'ez suggests repeated motion in alternating directions.
    reason: lexical_alternative
lexical_decisions:
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann
  rationale: Common visionary verb; 'I saw' is clear modern English while preserving
    the first-person apocalyptic report.
- source_word: በህየ
  chosen: there
  alternatives:
  - in that place
  lexicon: Dillmann
  rationale: Locative adverb pointing to the visionary scene; 'there' is concise and
    natural.
- source_word: ከመ ደመና
  chosen: something like a cloud
  alternatives:
  - as a cloud
  - like a cloud
  lexicon: Dillmann
  rationale: ከመ marks comparison; 'something like' preserves visionary approximation
    rather than asserting identity.
- source_word: ዘኢይትረአይ
  chosen: invisible
  alternatives:
  - that could not be seen
  - unseen
  lexicon: Dillmann
  rationale: Relative clause literally means 'which is not seen'; 'invisible' is the
    most compact equivalent, though the paradox of a seen-yet-unseen cloud is retained
    by the larger sentence.
- source_word: እስመ
  chosen: because
  alternatives:
  - for
  - since
  lexicon: Dillmann
  rationale: Best taken as causal, introducing the explanation that follows.
- source_word: እምዕሙቁ
  chosen: from its depth
  alternatives:
  - from the deep within it
  - out of its depth
  lexicon: Dillmann
  rationale: The noun denotes depth/deep place; the pronominal sense is supplied from
    context.
- source_word: አክሀልኩ
  chosen: I was able
  alternatives:
  - I could
  - I prevailed to
  lexicon: Dillmann
  rationale: Verb of ability; 'I was able' preserves the sense without sounding archaic.
- source_word: ላዕለ ነጽሮ
  chosen: above its measure
  alternatives:
  - above its extent
  - beyond its appearance
  lexicon: Dillmann
  rationale: The OCR is difficult here, but ላዕለ clearly means 'above/upon,' and ነጽሮ
    likely refers to extent, measure, or visible form. 'Above its measure' is a cautious
    rendering that keeps the spatial sense and the uncertainty visible.
- source_word: ላህበ እሳት
  chosen: a flame of fire
  alternatives:
  - a fiery flame
  - a blaze of fire
  lexicon: Dillmann
  rationale: A standard emphatic expression in Semitic style; retained rather than
    reduced to simply 'fire'.
- source_word: እንዘ ይነድድ
  chosen: as it burned
  alternatives:
  - while it was burning
  - burning
  lexicon: Dillmann
  rationale: Progressive participial sense; 'as it burned' fits the flowing visionary
    description.
- source_word: ስቡሕ
  chosen: gloriously
  alternatives:
  - splendidly
  - brightly
  lexicon: Dillmann
  rationale: The adjective/noun of glory/splendor is rendered adverbially here to
    modify the burning flame.
- source_word: ይትከበቡ
  chosen: was encircled
  alternatives:
  - was surrounded
  - was enclosed
  lexicon: Dillmann
  rationale: Passive/reflexive sense of being surrounded; preserves the image without
    overinterpreting the agent.
- source_word: ከመ አድባር ስቡሓን
  chosen: like glorious mountains
  alternatives:
  - like splendid mountains
  - like mountains of glory
  lexicon: Dillmann
  rationale: Keeps the simile and elevated imagery intact.
- source_word: ይትሀወኩ ለፌ ወለፌ
  chosen: it kept moving this way and that way
  alternatives:
  - it was shaken to and fro
  - it swayed here and there
  lexicon: Dillmann
  rationale: The phrase suggests motion or agitation in alternating directions; 'this
    way and that way' preserves the repetitive directional force.
