theological_decisions:
- issue: How to render the paradoxical image of a seen 'cloud' described as not seen
  chosen_reading: something like an invisible cloud
  alternative_readings:
  - something like a cloud that could not be seen
  - something like an unseen mist
  rationale: The verse intentionally presents visionary paradox rather than ordinary meteorological description. The chosen wording preserves the tension instead of resolving it into a smoother but less apocalyptic image.
  doctrine_reference: Preserve theological tension rather than resolve it.
