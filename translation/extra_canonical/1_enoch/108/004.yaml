  lexicon: Dillmann
  rationale: Passive/reflexive sense of being surrounded; preserves the image without overinterpreting the agent.
- source_word: ከመ አድባር ስቡሓን
  chosen: like glorious mountains
  alternatives:
  - like splendid mountains
