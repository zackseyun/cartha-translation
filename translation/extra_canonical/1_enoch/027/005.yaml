translation:
  text: At that time I blessed the Lord of glory, and I spoke of him and sang praise,
    as is fitting for his majesty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'I spoke of him' is textually/lexically difficult in
      this witness; it may also be understood as 'I spoke to him' or 'I declared [his
      praise].'
    reason: lexical_alternative
lexical_decisions:
- source_word: ውእቱ ጊዜ
  chosen: At that time
  alternatives:
  - Then
  - In that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal expression. 'At that time' preserves the narrative-apocalyptic
    transition formula without sounding overly wooden.
- source_word: ባረክዎ
  chosen: I blessed
  alternatives:
  - I gave blessing to
  - I praised
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the ordinary term for blessing. 'I blessed' keeps the direct
    verbal force; 'praised' would overlap too much with the later singing/praise language.
- source_word: ለእግዚአ ስብሐት
  chosen: the Lord of glory
  alternatives:
  - the Lord of majesty
  - the Lord of splendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: እግዚአ is 'Lord/master' and ስብሐት denotes glory, splendor, or praise. 'Lord
    of glory' is the most natural compact rendering and preserves the elevated divine
    title.
- source_word: ተሎቱ
  chosen: of him
  alternatives:
  - to him
  - concerning him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is somewhat uncertain in this OCR context. Given the following
    'I spoke' and parallel praise language, 'of him' best fits the sense of speaking
    concerning the Lord, while preserving transparency about uncertainty.
- source_word: ነገርኩ
  chosen: I spoke
  alternatives:
  - I declared
  - I recounted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A broad speech verb. 'I spoke' is suitably plain and lets the following
    object/prepositional phrase carry the nuance.
- source_word: ዘመርኩ
  chosen: sang praise
  alternatives:
  - sang
  - made melody
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to sing or chant. 'Sang praise' makes explicit the worship
    context without over-paraphrasing.
- source_word: በከመ ይደሉ
  chosen: as is fitting
  alternatives:
  - as was proper
  - as was right
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This idiom expresses propriety or worthiness. 'As is fitting' is idiomatic
    English and preserves the formal tone.
- source_word: ለዕበዩ
  chosen: for his majesty
  alternatives:
  - for his greatness
  - for his grandeur
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes greatness or majesty. 'Majesty' fits the doxological
    setting and avoids repetition with 'glory' while keeping the exalted register.
