theological_decisions:
- issue: Rendering the divine title እግዚአ
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: In a doxological address to God, 'Lord' is the established and most theologically
    appropriate English title. 'Master' is lexically possible but too socially marked
    here and less natural in worship language.
  doctrine_reference: 'Contested terms: κύριος → Lord; translate titles to preserve
    meaning.'
