theological_decisions:
- issue: Whether the verse speaks of punitive judgment or a judicial moment that includes mercy toward the righteous
  chosen_reading: Retain the broader 'judgment' while allowing the following blessing and mercy to define its positive outcome for this group.
  alternative_readings:
  - their condemnation
  - their punishment
  rationale: Because the verse immediately speaks of blessing and mercy, a narrower punitive term would create unnecessary tension unless the text explicitly required it. The broader judicial term preserves apocalyptic courtroom imagery without resolving more than the Ge'ez does.
  doctrine_reference: Preserve theological tension rather than resolve it.
