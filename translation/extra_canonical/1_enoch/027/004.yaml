  rationale: 'Adjudicator-modified: The reviewer is entirely correct regarding the Ge''ez morphology. The verb ይባርክዎ (yebārekwō) is the third-person plural imperfect with a third-person masculine singular object suffix (''they will bless him''). A translation of ''he will bless them'' would require a third-person singular subject with a third-person plural object suffix, such as ይባርኮሙ (yebārekomu). The context of the preceding verse also establishes that the righteous are blessing the Lord. I am modifying the suggestion only to provide'
