translation:
  text: In the days of their judgment In the days of their judgment they will bless him for the mercy, according as he has apportioned to them., according as he has apportioned to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause leaves the object of 'has apportioned' implicit; it may refer to a measured share, lot, or portion of mercy/blessing.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will bless them with mercy'.
    reason: previous_rendering
lexical_decisions:
- source_word: መዋዕለ
  chosen: days
  alternatives:
  - time
  - season
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural temporal noun most naturally means 'days' here, preserving the apocalyptic time-marker rather than generalizing to 'time.'
- source_word: ኵነኔሆሙ
  chosen: their judgment
  alternatives:
  - their condemnation
  - their punishment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes judicial decision or judgment. 'Judgment' preserves the formal ambiguity of a judicial event that may include either condemnation or vindication, which fits the immediate context better than the narrower 'punishment.'
- source_word: ይባርክዎ
  chosen: he will bless them
  alternatives:
  - he blesses them
  - he shall show favor to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal form is best represented as a future/jussive-like narrative future in context. 'Bless' is the direct lexical equivalent and should not be weakened to generic favor.
- source_word: በምሕረት
  chosen: with mercy
  alternatives:
  - in mercy
  - mercifully
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition plus noun is rendered instrumentally or adverbially. 'With mercy' keeps the noun explicit and preserves the theological weight of mercy.
- source_word: በከመ
  chosen: according as
  alternatives:
  - as
  - according to how
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This comparative conjunction introduces measure or manner. 'According as' preserves the formal relation between mercy shown and prior apportionment.
- source_word: ከፈሎሙ
  chosen: he has apportioned to them
  alternatives:
  - he divided for them
  - he assigned to them
  - he granted them their portion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly carries the sense of dividing or allotting. 'Apportioned' fits the judicial-distributive context and avoids over-interpreting the object, which is left implicit in the Ge'ez.
