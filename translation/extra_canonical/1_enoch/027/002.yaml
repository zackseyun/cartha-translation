translation:
  text: At that time Uriel, one of the holy angels who was with me, answered me and
    said to me, “This accursed valley is for those who are accursed forever. Here
    all those will be gathered who speak with their mouths improper words against
    the Lord, and who utter hard things concerning his glory. Here they will gather
    them, and here will be their place of judgment.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unfitting words' or 'words that are not right.' The Ge'ez phrase denotes
      speech that is improper or not fitting before the Lord.
    reason: lexical_alternative
  - marker: b
    text: The expression rendered 'hard things' likely refers to harsh, shocking,
      or insolent speech concerning the Lord's glory.
    reason: lexical_alternative
lexical_decisions:
- source_word: አውሥአኒ
  chosen: answered me
  alternatives:
  - responded to me
  - spoke to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly carries the sense of answering or replying. Since the
    verse continues a guided visionary dialogue, 'answered me' preserves that conversational
    setting better than the more generic 'spoke to me.'
- source_word: ቅዱሳን መላእክት
  chosen: holy angels
  alternatives:
  - sacred angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard apocalyptic designation for the heavenly beings.
    'Holy angels' preserves the established Enochic register without archaic excess.
- source_word: ዛቈላ
  chosen: valley
  alternatives:
  - ravine
  - gorge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The topographical term in this judgment scene is best rendered 'valley,'
    which is natural English and fits the visionary geography. 'Ravine' or 'gorge'
    are possible but too narrow without stronger contextual necessity.
- source_word: ርጉምት
  chosen: accursed
  alternatives:
  - cursed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective marks the valley as under divine curse. 'Accursed' keeps
    the solemn judicial tone and distinguishes the place as devoted to curse, not
    merely unpleasant.
- source_word: ለርጉማን እስከ ለዓለም
  chosen: for those who are accursed forever
  alternatives:
  - for the cursed unto eternity
  - for the accursed for ever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies the valley's destined occupants and the enduring
    scope of their curse. 'Forever' is clear modern English while preserving the eschatological
    finality.
- source_word: ይትጋብኡ
  chosen: will be gathered
  alternatives:
  - will assemble
  - will be collected
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive or reflexive gathering sense fits the judgment context. 'Will
    be gathered' preserves the apocalyptic motif of sinners being assembled for judgment.
- source_word: በአፉሆሙ
  chosen: with their mouths
  alternatives:
  - from their mouths
  - by their mouths
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez explicitly mentions the mouth as the instrument of speech.
    Retaining it preserves the concrete bodily imagery of blasphemous utterance.
- source_word: ላዕለ እግዚአብሔር
  chosen: against the Lord
  alternatives:
  - concerning the Lord
  - over the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of hostile speech, the preposition is adversative in force.
    'Against the Lord' best conveys opposition rather than mere topic.
- source_word: ቃለ ዘኢይደሉ
  chosen: improper words
  alternatives:
  - unfitting words
  - words that are not right
  - unseemly words
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes speech that is not fitting or proper. 'Improper words'
    is readable and preserves the moral impropriety without over-specifying the exact
    offense.
- source_word: ስብሐቲ ዚአሁ
  chosen: his glory
  alternatives:
  - his majesty
  - his splendor
  - his praise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the noun most naturally refers to the Lord's glory or
    majesty as the object of irreverent speech. 'His glory' is the most transparent
    biblical English equivalent.
- source_word: ይትናገሩ ዕፁብተ
  chosen: utter hard things
  alternatives:
  - speak harsh things
  - say insolent things
  - speak monstrous things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The expression points to shocking, grievous, or insolent speech. 'Hard
    things' preserves the severity and leaves room for the idiomatic force of abusive
    or blasphemous utterance without importing later canonical phrasing.
- source_word: ያስተጋብእዎሙ
  chosen: they will gather them
  alternatives:
  - they will bring them together
  - they will collect them there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The causative form suggests that these offenders are actively brought
    together at this place. The English keeps the repeated gathering motif visible.
- source_word: ምኵናኒሆሙ
  chosen: their place of judgment
  alternatives:
  - their judgment
  - their condemnation
  - their tribunal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Because the demonstrative 'here' precedes it, an English expression that
    makes the locale explicit fits well. 'Their place of judgment' preserves both
    the judicial sense and the spatial emphasis of the vision.
