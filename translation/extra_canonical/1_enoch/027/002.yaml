theological_decisions:
- issue: Nature of the offense described by the condemned speech
  chosen_reading: The verse refers to hostile, improper, and grievous speech directed
    against the Lord and concerning his glory, without narrowing it to a later technical
    category such as formal blasphemy alone.
  alternative_readings:
  - explicit blasphemy
  - general wicked speech
  rationale: The Ge'ez emphasizes unfitting words against the Lord and shocking speech
    concerning his glory. Rendering this broadly preserves the text's own wording
    and avoids importing later doctrinal or legal categories more precise than the
    verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the final clause about judgment
  chosen_reading: The valley is the locale where the accursed are gathered and where
    their judgment takes place.
  alternative_readings:
  - the valley itself is their condemnation
  - the phrase refers only abstractly to judgment, not place
  rationale: The repeated 'here' strongly marks location. Translating 'here will be
    their place of judgment' preserves the visionary geography and the judicial outcome
    together.
  doctrine_reference: Original-language primacy over translation tradition.
