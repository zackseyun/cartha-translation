translation:
  text: At that time I said, “For what reason is this blessed land, and all of it filled with trees, and this accursed valley in their midst?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The vegetation phrase is textually difficult in this OCR witness; the sense is that the land is abundantly covered with trees or growth.
    reason: textual_variant
  - marker: b
    text: Or 'this blessed land, wholly filled with trees,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ውእቱ ጊዜ
  chosen: At that time
  alternatives:
  - Then
  - In that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal formula in narrative/vision reporting; 'At that time' preserves the elevated apocalyptic register without sounding archaic.
- source_word: እቤ
  chosen: I said
  alternatives:
  - I spoke
  - I asked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form introduces Enoch's speech. Because the following clause is an inquiry, English could use 'asked,' but 'said' stays closer to the Ge'ez speech formula and preserves the direct-question structure.
- source_word: በእንተ ምንት
  chosen: For what reason
  alternatives:
  - Why
  - Concerning what
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase marks inquiry about cause or purpose. 'For what reason' is slightly more formal than 'why' and fits the solemn visionary dialogue.
- source_word: ዛቲ ምድር ቡርክት
  chosen: this blessed land
  alternatives:
  - this blessed الأرض/ground
  - this blessed region
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ምድር commonly means 'land/earth/ground.' Here 'land' best suits a localized visionary landscape. ቡርክት is rendered 'blessed,' preserving the evaluative contrast with 'accursed' later in the verse.
- source_word: ወኵለንታሃ ምልእት
  chosen: wholly filled
  alternatives:
  - entirely full
  - all of it filled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase intensifies the completeness of the land's being full. 'Wholly filled' is concise and keeps the descriptive force.
- source_word: ዕፀወ ወዛ፡ ቈላ
  chosen: with trees
  alternatives:
  - with trees and plants
  - with wood and vegetation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sequence appears to denote arboreal/vegetative growth. Because the OCR is somewhat uncertain and the broader sense is a luxuriant landscape, 'with trees' captures the main image without over-specifying uncertain subcategories; the fuller alternative is noted in a footnote.
- source_word: ርጉምት
  chosen: accursed
  alternatives:
  - cursed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective stands in deliberate contrast to 'blessed.' 'Accursed' preserves the heightened, judicial-apocalyptic tone better than the flatter 'cursed.'
- source_word: ማእከሎሙ
  chosen: in their midst
  alternatives:
  - among them
  - in the middle of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This locates the valley centrally within the blessed landscape. 'In their midst' preserves both spatial vividness and elevated style.
