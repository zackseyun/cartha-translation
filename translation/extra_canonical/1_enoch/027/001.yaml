theological_decisions:
- issue: Value-laden contrast between the surrounding land and the valley
  chosen_reading: Render ቡርክት / ርጉምት as 'blessed' / 'accursed'
  alternative_readings:
  - fertile / barren
  - favored / cursed
  rationale: The verse sets up a moral-sacral contrast, not merely an agricultural one. 'Blessed' and 'accursed' preserve the theological polarity of sacred space and judgment imagery in the Watchers context.
  doctrine_reference: Preserve apocalyptic imagery and theological tension rather than reducing to generic landscape description.
