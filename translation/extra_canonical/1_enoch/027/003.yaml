translation:
  text: In the latter days this will become for them a spectacle of righteous judgment in the presence of the righteous forever; all the days here the merciful will bless the Lord of glory, the eternal King.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The word rendered 'forever' is textually uncertain in this witness (shown bracketed in the source). It may belong with the phrase 'in the presence of the righteous' or reflect a variant reading.
    reason: textual_variant
  - marker: b
    text: '''Spectacle'' renders a term that can also mean ''sign,'' ''appearance,'' or ''example.'' The sense here is of a visible display of judgment.'
    reason: lexical_alternative
  - marker: c
    text: '''This age'' could also be rendered ''this world,'' but the apocalyptic contrast between present age and coming judgment favors ''age.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'all the days of this age the wise will bless'.
    reason: previous_rendering
lexical_decisions:
- source_word: በዳኃሪ መዋዕል
  chosen: In the latter days
  alternatives:
  - Afterward in the days
  - At the end of the days
  - In later times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks an eschatological or future time frame. 'In the latter days' preserves the apocalyptic register better than a flatter temporal phrase like 'later on.'
- source_word: ይከውን
  chosen: this will become
  alternatives:
  - it will be
  - it will come to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A future existential/becoming verb. 'Will become' fits the predicative construction with what follows and preserves the sense of a resulting state.
- source_word: ላዕሌሆሙ
  chosen: for them
  alternatives:
  - upon them
  - over them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can be spatial ('upon') or relational. Here the sense is that the place or event becomes something for those previously mentioned; 'for them' is the most natural English while retaining the relation.
- source_word: አርአያ
  chosen: a spectacle
  alternatives:
  - a sign
  - an example
  - a visible display
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote appearance, sight, pattern, or example. In this judgment scene, the emphasis is on something seen publicly. 'Spectacle' preserves the visual and exemplary force without over-paraphrasing.
- source_word: ኵነኔ ዘበ ጽድቅ
  chosen: of righteous judgment
  alternatives:
  - of judgment in righteousness
  - of just judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase joins judgment with righteousness/justice. 'Righteous judgment' is concise, elevated, and keeps the moral quality attached to the judgment itself.
- source_word: በቅድመ ጻድቃን
  chosen: in the presence of the righteous
  alternatives:
  - before the righteous
  - before righteous ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase is spatial and public. 'In the presence of' is idiomatic English and preserves the courtroom-like visibility of the scene.
- source_word: ለዓለም
  chosen: forever
  alternatives:
  - for eternity
  - for the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bracketed reading likely modifies the enduring status of the judgment spectacle before the righteous. 'Forever' is the clearest idiomatic rendering, while the textual uncertainty is noted in a footnote.
- source_word: ኵሎ መዋዕለ ዝየ
  chosen: all the days of this age
  alternatives:
  - all the days of this world
  - all these days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to refer to the present age/world-order. 'This age' preserves apocalyptic contrast better than the more generic 'this world.'
- source_word: ይባርክዎ ምሑራን
  chosen: the wise will bless
  alternatives:
  - the instructed will bless
  - the learned will praise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ምሑራን denotes those who are taught, discerning, or wise. In apocalyptic-wisdom context, 'the wise' is the best concise rendering.
- source_word: ለእግዚአ ስብሐት
  chosen: the Lord of glory
  alternatives:
  - the Lord of majesty
  - the Master of glory
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The title combines lordship with glory/honor. 'Lord of glory' is a direct rendering of the Ge'ez title and suits the elevated register.
- source_word: ንጉሥ ዘለዓለም
  chosen: the eternal King
  alternatives:
  - the King forever
  - the everlasting King
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies God as king characterized by eternity. 'The eternal King' is natural English and preserves the theological weight of divine kingship.
