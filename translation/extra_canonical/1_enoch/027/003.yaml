  rationale: 'Adjudicator-modified: The reviewer is entirely correct on both lexical points. The Ge''ez word ዝየ (zəya) means ''here,'' not ''of this age,'' maintaining the spatial focus of the passage. Furthermore, ምሑራን (məḥurān, spelled with ሐ) is the passive participle of መሐረ (to have mercy), meaning ''the merciful'' or ''those who have received mercy,'' whereas ''the wise'' would require the root መሀረ (with ሀ). I have modified the proposed rewrite slightly to remove the awkward period and keep ''all the days'' connected to the action of bles'
