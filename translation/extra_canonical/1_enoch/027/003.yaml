theological_decisions:
- issue: Rendering the divine title without over-harmonizing to later biblical phraseology
  chosen_reading: the Lord of glory, the eternal King
  alternative_readings:
  - the glorious Lord, the everlasting King
  - the Lord of majesty, King forever
  rationale: The Ge'ez presents exalted divine titles in apposition. The chosen rendering keeps both titles explicit and elevated without importing later canonical formulas beyond what the text itself supports.
  doctrine_reference: Translate titles; preserve local passage wording rather than harmonizing with later usage.
