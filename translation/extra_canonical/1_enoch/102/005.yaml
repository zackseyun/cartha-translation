theological_decisions:
- issue: Rendering of ሲኦል
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the underworld
  - hell
  rationale: The Ge'ez term reflects the traditional Jewish underworld concept. 'Sheol'
    preserves the text's Second Temple cosmology and avoids importing later Christian
    notions attached to 'hell.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve apocalyptic imagery.'
- issue: Meaning of the clause about the flesh not receiving
  chosen_reading: the righteous did not receive in embodied life what corresponded
    to their goodness
  alternative_readings:
  - the body did not recover life
  - the flesh did not receive reward in this life
  rationale: The immediate context contrasts present suffering with future judgment
    of sinners. The clause most naturally means that the righteous were not recompensed
    during earthly life. Because the exact object of 'receive' is implicit, the English
    stays somewhat open rather than specifying 'reward' in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
