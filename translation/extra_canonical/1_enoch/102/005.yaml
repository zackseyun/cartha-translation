translation:
  text: And do not grieve if your soul has gone down into Sheol in sorrow, and your
    flesh did not receive according to your goodness during your life; but wait for
    the day of the judgment of sinners, and for the day of curse and punishment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your flesh did not receive as your goodness deserved during your life.'
      The Ge'ez leaves the object of 'receive' unstated, so the line likely refers
      to lacking due recompense in earthly life.
    reason: lexical_alternative
  - marker: b
    text: '''Sheol'' is the realm of the dead in Jewish apocalyptic thought, not necessarily
      the later Christian concept of hell.'
    reason: cultural_note
lexical_decisions:
- source_word: አት ኅዘኑ
  chosen: do not grieve
  alternatives:
  - do not sorrow
  - do not be distressed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative imperative addressed to the hearers. 'Grieve' preserves the
    emotional force without sounding archaic.
- source_word: ወረደት ነፍስክሙ ውስተ ሲኦል
  chosen: your soul has gone down into Sheol
  alternatives:
  - your soul descended into Sheol
  - your soul went down to Sheol
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb explicitly denotes descent, and ሲኦል is best left as 'Sheol'
    rather than generalized as 'the grave' or 'hell,' preserving Second Temple underworld
    imagery.
- source_word: በሐዘን
  chosen: in sorrow
  alternatives:
  - with grief
  - in grief
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the emotional coloring attached to the soul's descent and echoes
    the preceding prohibition against grieving.
- source_word: ኢረከበ ሥጋክሙ በሕይወትክሙ
  chosen: your flesh did not receive during your life
  alternatives:
  - your body did not obtain in your lifetime
  - your flesh did not attain while you lived
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause states that the person's embodied life did not receive something
    due or expected. 'Flesh' is retained as the more literal and theologically weighty
    term, fitting the project's preference to preserve such language where literal.
- source_word: በከመ ኂሩትክሙ
  chosen: according to your goodness
  alternatives:
  - according to your kindness
  - as your goodness deserved
  - in proportion to your good conduct
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to refer to the righteous quality or goodness of the
    addressees. 'According to your goodness' is transparent and avoids over-interpreting
    the exact nuance as merit, kindness, or deeds alone.
- source_word: አላ ጽንሑ
  chosen: but wait
  alternatives:
  - but endure
  - but remain steadfast
  - but be patient
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adversative marks a turn from present deprivation to future vindication.
    'Wait' best fits the following temporal phrases ('for the day...') while still
    carrying the sense of steadfast endurance.
- source_word: ለዕለተ እንተ ኵነኔ ኃጥኣን
  chosen: for the day of the judgment of sinners
  alternatives:
  - for the day when sinners are judged
  - for the day of sinners' judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the formal apocalyptic judgment formula and keeps 'sinners'
    explicit as the object/target of judgment.
- source_word: መርገም ወመቅሠፍት
  chosen: curse and punishment
  alternatives:
  - cursing and affliction
  - curse and scourging
  - curse and chastisement
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A compact pair naming the fate awaiting the wicked. 'Punishment' is broad
    enough to preserve the judicial sense without narrowing to a specific mode of
    suffering.
