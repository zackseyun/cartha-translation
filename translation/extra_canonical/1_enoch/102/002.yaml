translation:
  text: And all the luminaries shall be shaken with great fear, and the whole earth
    shall be shaken and tremble and quake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the lights.' The Ge'ez term can denote luminous things generally,
      but here likely refers to the heavenly luminaries in a cosmic judgment scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኵሎሙ ብርሃናት
  chosen: all the luminaries
  alternatives:
  - all the lights
  - all the shining ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ብርሃናት literally denotes lights or luminous bodies. In this apocalyptic
    context, 'luminaries' best preserves the cosmic sense without reducing the referent
    to ordinary light sources.
- source_word: ይትመሀከዉ / ትትመሀከው
  chosen: shall be shaken
  alternatives:
  - shall be disturbed
  - shall be moved
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated verb appears to denote being agitated or shaken. 'Shaken'
    fits both the heavenly bodies and the earth and preserves the parallelism of cosmic
    upheaval.
- source_word: በፍርሀት ዐቢይ
  chosen: with great fear
  alternatives:
  - in great fear
  - by great fear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase marks the manner or accompanying condition of
    the shaking. 'With great fear' is natural English and keeps the affective force
    of the Ge'ez.
- source_word: ኵላ ምድር
  chosen: the whole earth
  alternatives:
  - all the earth
  - the entire land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this cosmic-judgment setting, ምድር is best taken as 'earth' rather
    than a local 'land.' 'The whole earth' reflects the universal scope.
- source_word: ትርዕድ
  chosen: tremble
  alternatives:
  - shake
  - shudder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A distinct verb following 'be shaken' should be represented distinctly
    in English. 'Tremble' preserves the intensification and bodily/cosmic vibration
    imagery.
- source_word: ትኜጕድ
  chosen: quake
  alternatives:
  - be convulsed
  - totter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The final verb heightens the sequence of upheaval. 'Quake' is concise,
    vivid, and appropriate for apocalyptic earth imagery.
