theological_decisions:
- issue: Whether ብርሃናት refers to angelic beings or heavenly bodies
  chosen_reading: heavenly luminaries
  alternative_readings:
  - shining ones as angelic beings
  - lights in a more general sense
  rationale: The immediate pairing with 'the whole earth' and the cosmic disturbance
    motif favors celestial bodies rather than angels. 'Luminaries' preserves some
    breadth while keeping the likely astronomical reference.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic language
    or over-harmonize with later traditions.
