translation:
  text: Do not fear, you souls of the righteous, and hope, you who have died in righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spirits of the righteous.' The Ge'ez term can denote soul, life, self,
      or spirit depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: አትፍርሁ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  - Fear not
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative imperative plural from the verb 'to fear.' 'Do not fear' preserves
    the direct exhortatory force without archaic phrasing.
- source_word: አንትሙ
  chosen: you
  alternatives:
  - you all
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Explicit second-person plural pronoun retained in sense, though not separately
    represented in English beyond the plural address.
- source_word: ነፍሰ ጻድቃን
  chosen: souls of the righteous
  alternatives:
  - spirits of the righteous
  - lives of the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነፍስ commonly denotes soul/life/self. In this postmortem exhortation context,
    'souls' best preserves the anthropological and apocalyptic sense of the departed
    righteous as conscious addressees.
- source_word: ወተስፈዉ
  chosen: and hope
  alternatives:
  - and be hopeful
  - and have hope
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative/cohortative sense calling the righteous dead to hope. 'And
    hope' is concise and keeps the parallelism with the preceding imperative.
- source_word: እለ ሞትክሙ
  chosen: you who have died
  alternatives:
  - those of you who died
  - you whose death has come
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative particle plus verb of dying with second plural suffix. Rendered
    as a direct vocative-relative phrase matching the address to the righteous dead.
- source_word: በጽድቅ
  chosen: in righteousness
  alternatives:
  - righteously
  - in justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Instrumental/prepositional phrase from the noun 'righteousness.' 'In
    righteousness' preserves the nominal form and aligns with the project's preference
    to keep this key term visible rather than reducing it to an adverb.
