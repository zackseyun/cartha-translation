theological_decisions:
- issue: Anthropological term for the departed righteous
  chosen_reading: souls of the righteous
  alternative_readings:
  - spirits of the righteous
  rationale: The verse addresses the righteous after death. Rendering ነፍሰ as 'souls'
    preserves the text's portrayal of continued postmortem identity without over-specifying
    a technical distinction between soul and spirit not explicit in the Ge'ez.
  doctrine_reference: Preserve theological tension rather than resolve it.
