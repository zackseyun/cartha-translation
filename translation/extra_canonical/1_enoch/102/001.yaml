translation:
  text: In those days, if a fierce fire descends upon you, where will you flee, and
    where will you be delivered? And when the word comes against you, will you not
    be shaken and fear?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The adjective with 'fire' can mean extraordinary, astonishing, or terrible;
      the sense here is likely destructive and awe-inspiring.
    reason: lexical_alternative
  - marker: b
    text: '''The word'' may carry the force of a judicial word, decree, or sentence
      in this context.'
    reason: lexical_alternative
  - marker: c
    text: 'The final question is rhetorical: the sense is that they certainly will
      be shaken and afraid.'
    reason: cultural_note
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  chosen: In those days
  alternatives:
  - At that time
  - In those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula. 'In those days' preserves the
    elevated register and recurring judgment-setting language.
- source_word: ወረደ
  chosen: descends
  alternatives:
  - comes down
  - falls
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A simple motion verb meaning 'to descend/come down.' 'Descends' keeps
    the vividness of judgment coming from above.
- source_word: ዴቤክሙ
  chosen: upon you / against you
  alternatives:
  - to you
  - on you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to carry a 2nd person plural object sense. With 'fire'
    the idiomatic force is 'upon you'; with 'word' the adversative sense 'against
    you' fits the warning context.
- source_word: ዕፁብ እሳት
  chosen: a fierce fire
  alternatives:
  - a terrible fire
  - a wondrous fire
  - a dreadful fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective can denote something extraordinary, astonishing, or terrible.
    In this judgment context, 'fierce' conveys destructive awe without over-paraphrasing.
- source_word: በአይቴ ትነፍፁ
  chosen: where will you flee
  alternatives:
  - whither will you run
  - where will you escape
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An interrogative of place with a verb of fleeing/escaping. 'Where will
    you flee' is direct, readable, and preserves the rhetorical force.
- source_word: በአይቴ ትድኅኑ
  chosen: where will you be delivered
  alternatives:
  - where will you be saved
  - where will you find rescue
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb belongs to the semantic field of deliverance/salvation. 'Be
    delivered' fits the judgment setting and avoids importing later doctrinal overtones
    of 'saved'.
- source_word: ይወዲ ቃሎ
  chosen: the word comes
  alternatives:
  - his word comes
  - the sentence comes
  - the decree comes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is plainly 'word.' Because the pronominal force is uncertain
    in the OCR line, the main text keeps the more neutral 'the word comes'; the judicial
    force is retained by context.
- source_word: አኮ ትትመሀከዉ
  chosen: will you not be shaken
  alternatives:
  - will you not be confounded
  - will you not be dismayed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The negative rhetorical question expects an affirmative answer. The verb
    likely conveys agitation, disturbance, or discomfiture; 'be shaken' preserves
    apocalyptic intensity in natural English.
- source_word: ወትፈርሁ
  chosen: and fear
  alternatives:
  - and be afraid
  - and tremble
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward fear verb. 'And fear' keeps the concise parallelism
    of the warning.
