theological_decisions:
- issue: Whether the coming 'word' should be rendered as a generic utterance or as
    a judicial pronouncement
  chosen_reading: Rendered as 'the word comes against you' with judicial force implied
    by context
  alternative_readings:
  - '''his word comes upon you'''
  - '''the sentence/decree comes against you'''
  rationale: The immediate context is eschatological warning to sinners under judgment.
    'Word' should remain in the text for transparency to the Ge'ez, but the prepositional
    phrase 'against you' signals that this is not a neutral message.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
