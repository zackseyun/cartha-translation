theological_decisions:
- issue: Referent of 'the great glory'
  chosen_reading: A reverential circumlocution for the divine presence or majesty
  alternative_readings:
  - an abstract heavenly splendor
  - the glory of the heavenly court generally
  rationale: In apocalyptic literature, 'glory' can stand metonymically for God's overwhelming presence. The text does not explicitly name God here, so the translation keeps the circumlocution rather than resolving it to 'God.'
  doctrine_reference: Preserve theological tension rather than resolve it.
