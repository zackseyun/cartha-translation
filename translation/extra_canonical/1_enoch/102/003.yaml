translation:
  text: And all the angels will carry out their command, and they will seek to hide themselves from before the Great Glory; and the children of the earth will tremble and be thrown into confusion. But you sinners are accursed forever, and there will be no peace for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the presence of the great glory.' The Ge'ez uses a Semitic-style expression literally meaning 'from before.'
    reason: lexical_alternative
  - marker: b
    text: '''The children of the earth'' is a literal expression; it can function broadly for earth''s inhabitants, especially humankind under judgment.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their commands'.
    reason: previous_rendering
  - marker: d
    text: Or 'the great glory'.
    reason: previous_rendering
lexical_decisions:
- source_word: መላእክት
  chosen: angels
  alternatives:
  - messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the beings are heavenly, not human envoys, so 'angels' preserves the cosmic setting.
- source_word: ይፌጽሙ
  chosen: will carry out
  alternatives:
  - will complete
  - will perform
  - will fulfill
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes executing or bringing to completion. 'Carry out' is natural English for obeying and executing commands.
- source_word: ትእዛዞሙ
  chosen: their commands
  alternatives:
  - their orders
  - their instructions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun refers to commands/orders. 'Commands' keeps the authoritative force without over-specifying the speaker.
- source_word: ይፈቅዱ
  chosen: will seek
  alternatives:
  - will desire
  - will wish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Literally the verb can mean ''wish/desire,'' but with the following infinitive of hiding it functions idiomatically as an attemptive expression: they will seek or want to hide themselves.'
- source_word: ይትኀብኡ
  chosen: to hide themselves
  alternatives:
  - to conceal themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Reflexive sense is important: the angels themselves attempt concealment before overwhelming divine majesty.'
- source_word: እምቅድመ
  chosen: from before
  alternatives:
  - from the presence of
  - before
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is a standard Semitic-style expression for withdrawal from a presence. 'From before' preserves the idiom's apocalyptic flavor, though slightly smoothed in English syntax.
- source_word: ዐቢይ ስብሐት
  chosen: the great glory
  alternatives:
  - the great majesty
  - the great splendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase likely refers to overwhelming divine glory rather than abstract honor. 'Great glory' preserves the biblical-apocalyptic resonance without importing a divine name absent from the line.
- source_word: ይርዕዱ
  chosen: will tremble
  alternatives:
  - will quake
  - will be afraid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A bodily reaction of fear is in view. 'Tremble' fits judgment imagery and pairs well with the following verb.
- source_word: ደቂቀ ምድር
  chosen: the children of the earth
  alternatives:
  - the sons of the earth
  - the inhabitants of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The literal filial expression should be preserved because it is characteristic apocalyptic diction and more vivid than the flatter 'inhabitants.'
- source_word: ይትሀወኩ
  chosen: be thrown into confusion
  alternatives:
  - be disturbed
  - be confounded
  - be agitated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests turmoil or disorientation. 'Be thrown into confusion' captures the force of panic under judgment.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - wrongdoers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a standard moral-religious designation in Enochic judgment discourse; 'sinners' is the most direct equivalent.
- source_word: ርጉማን ለዓለም
  chosen: accursed forever
  alternatives:
  - cursed for eternity
  - under a curse forever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is a fixed judgment formula. 'Accursed forever' is concise and preserves the solemnity of the pronouncement.
- source_word: አልብክሙ ሰላመ
  chosen: there will be no peace for you
  alternatives:
  - you have no peace
  - peace is not yours
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction denies peace to the addressed sinners. Future wording fits the surrounding prophetic/judgment sequence and reads naturally in English.
