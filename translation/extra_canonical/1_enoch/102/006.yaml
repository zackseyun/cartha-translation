theological_decisions:
- issue: Force of hostile speech by the wicked
  chosen_reading: the sinners will speak against you
  alternative_readings:
  - the sinners will say concerning you
  - the sinners will speak over you
  rationale: The Ge'ez preposition is broad, but in the Epistle's judgment rhetoric
    the point is not neutral mention but hostile speech directed at the righteous
    dead. 'Against you' preserves that moral opposition without importing later doctrinal
    language.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key moral terms.
