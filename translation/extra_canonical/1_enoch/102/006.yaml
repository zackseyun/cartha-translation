  from: will speak against you.
  to: will say concerning you,
  rationale: 'The verb ይብሉ (yəblu) means ''they will say'' and functions here as a
    quotative frame introducing the direct speech of the sinners (which continues
    the thought). Translating it as ''speak against'' closes the clause and obscures
    this function. The preposition ላዕሌክሙ (laʿlekəmmu) here means ''concerning you''
    or ''about you'' as the topic of their speech. | Adjudicator: The verb ይብሉ (yəblu)
    is a standard quotative (''they will say'') introducing the direct speech of the
    sinners that follows. Translating it as ''speak against'' misconstrues the phrase
    as a completed actio'
