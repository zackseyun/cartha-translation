translation:
  text: And when you die, the sinners will say concerning you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'speak against you' is more literally 'say upon/over
      you.' The English brings out the likely hostile sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'will speak against you.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወሶበ
  chosen: And when
  alternatives:
  - and whenever
  - but when
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal conjunction with prefixed waw; here it introduces the circumstance
    that follows rather than a strong contrast.
- source_word: ትመውቱ
  chosen: you die
  alternatives:
  - you will die
  - you perish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Second person plural verb from the common Ge'ez root for dying. English
    present in a temporal clause ('when you die') is idiomatic and preserves the direct
    address.
- source_word: ይብሉ
  chosen: will speak
  alternatives:
  - will say
  - say
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic verb 'to say/speak.' 'Speak' fits better with the following prepositional
    phrase 'against you' in English, while still reflecting the verbal idea of utterance.
- source_word: ላዕሌክሙ
  chosen: against you
  alternatives:
  - concerning you
  - over you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition literally has the sense 'upon/over,' but in this hostile
    context with sinners as subject and speech as action, 'against you' best conveys
    adversative speech without over-literal awkwardness.
- source_word: ኃጥኣን
  chosen: the sinners
  alternatives:
  - sinners
  - the sinful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common apocalyptic moral category. The article is supplied in English
    for naturalness and to mark the class of wicked persons addressed in contrast
    to the righteous in context.
