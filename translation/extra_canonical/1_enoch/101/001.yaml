translation:
  text: Observe heaven, you sons of heaven, and every work of the Most High; and fear
    him, and do not do evil before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Inquire of heaven, O sons of heaven, concerning every deed of the Most
      High.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Ask heaven, you sons of heaven, about every work'.
    reason: previous_rendering
lexical_decisions:
- source_word: ጠይቅዋ
  chosen: Ask
  alternatives:
  - Inquire of
  - Question
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plural from the verb 'to ask/inquire.' 'Ask' is direct and
    preserves the exhortational force without overformalizing.
- source_word: ለሰማይ
  chosen: heaven
  alternatives:
  - the heaven
  - the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'In this apocalyptic context, ''heaven'' better preserves the cosmic
    register than ''sky.'' The preposition marks the object addressed: ''ask heaven.'''
- source_word: ውሉደ ሰማይ
  chosen: you sons of heaven
  alternatives:
  - children of heaven
  - heavenly sons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering best preserves the elevated and somewhat enigmatic
    address. 'Children of heaven' is possible, but 'sons of heaven' keeps the idiom
    and apocalyptic tone.
- source_word: ወኵሎ ግብር
  chosen: about every work
  alternatives:
  - concerning every deed
  - about all activity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase naturally expresses the subject matter of inquiry. 'Work'
    keeps the broad scope of deeds/acts without narrowing it to moral acts alone.
- source_word: ለልዑል
  chosen: of the Most High
  alternatives:
  - belonging to the Most High
  - of the Exalted One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''The Most High'' is the standard and contextually appropriate rendering
    for the divine title, preserving its theological weight.'
- source_word: ወፍርሁ እምኔሁ
  chosen: and fear him
  alternatives:
  - and stand in awe of him
  - and be afraid before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes fear/reverence toward God. 'Fear him' preserves the
    biblical-apocalyptic register and leaves the reverential nuance intact.
- source_word: ወኢትግበሩ እኩየ በቅድሜሁ
  chosen: and do not do evil before him
  alternatives:
  - and do not act wickedly in his presence
  - and do not commit evil before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the moral prohibition and the spatial-relational phrase 'before
    him,' which underscores divine presence and scrutiny.
