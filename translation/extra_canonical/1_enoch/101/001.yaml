theological_decisions:
- issue: Identity of 'sons of heaven'
  chosen_reading: Retained as a literal address, 'you sons of heaven,' without resolving
    whether this refers metaphorically to humans or more exalted beings.
  alternative_readings:
  - children of heaven
  - heavenly ones
  rationale: The phrase is rhetorically marked and should remain transparent rather
    than being interpreted away. The immediate context can guide readers, but the
    translation should preserve the text's own ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
