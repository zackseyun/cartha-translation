translation:
  text: Do not those kings of the sea fear the sea, while sinners do not fear the
    Most High?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'those mariners' is textually difficult in the OCR'd
      Ge'ez. It likely refers to people who go down to the sea in ships; 'sailors'
      or 'seafarers' are possible alternatives.
    reason: textual_variant
  - marker: b
    text: Or 'Are not those mariners afraid of the sea, while sinners do not fear'.
    reason: previous_rendering
lexical_decisions:
- source_word: አኮኑ
  chosen: Are not
  alternatives:
  - Are they not
  - Is it not
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a rhetorical question expecting agreement; preserving the
    interrogative force fits the verse's contrastive admonition.
- source_word: ውእቶሙ
  chosen: those
  alternatives:
  - they
  - these
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used demonstratively with the following noun; 'those' preserves the deictic
    sense better than a bare pronoun.
- source_word: ተነገሥተ አሕማር
  chosen: mariners
  alternatives:
  - sailors
  - seafarers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to denote people associated with ships/sea travel.
    'Mariners' keeps the elevated register and suits the sea imagery. Because the
    OCR is somewhat uncertain, a more generic alternative is noted in a footnote.
- source_word: ይፈርህዋ ለባሕር
  chosen: are afraid of the sea
  alternatives:
  - fear the sea
  - dread the sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the common term for fear. 'Are afraid of the sea' is idiomatic
    English while preserving the concrete object of fear.
- source_word: ወኃጥኣን
  chosen: while sinners
  alternatives:
  - and sinners
  - but sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The conjunction here functions contrastively in context. 'While sinners'
    brings out the rhetorical contrast between ordinary human fear and impious fearlessness.
- source_word: ለልዑል
  chosen: the Most High
  alternatives:
  - the Exalted One
  - the Highest
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A divine title meaning 'Most High' is well established in biblical and
    Second Temple usage. It preserves the elevated theological register without importing
    later doctrinal phrasing.
- source_word: ኢይፈርህዎ
  chosen: do not fear
  alternatives:
  - are not afraid of
  - do not revere
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The same fear verb is repeated negatively; keeping 'fear' in both halves
    preserves the deliberate contrast of the verse.
