theological_decisions:
- issue: Rendering ልዑል as a divine title
  chosen_reading: the Most High
  alternative_readings:
  - the Exalted One
  - the Highest
  rationale: In this context the term functions as a title for God, and 'the Most
    High' is the clearest idiomatic English equivalent that preserves Second Temple
    Jewish diction.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    titles for meaning rather than transliterating.
