lexical_decisions:
- source_word: ይፈርሁ
  chosen: they will be afraid
  alternatives:
  - they will fear
  - they shall be terrified
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future/imperfect plural of 'fear.' 'Be afraid' is readable modern English
    while preserving the warning tone.
- source_word: ኵሉ ንዋዮሙ ሠናይ
  chosen: all their good possessions
  alternatives:
  - all their fine goods
  - all their wealth
  - all their desirable property
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ንዋይ commonly denotes goods, property, or wealth; with ሠናይ it refers to
    valuable or good possessions rather than abstract 'goodness.'
- source_word: ይወፅእ ውስተ ባሕር ምስሌሆሙ
  chosen: will go out with them into the sea
  alternatives:
  - will be cast with them into the sea
  - will go into the sea along with them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez verb is literally 'go out/come forth'; in context of goods
    accompanying their owners into the sea, 'go out with them into the sea' preserves
    the wording without over-interpreting as passive 'be cast.'
- source_word: ወሠናየ ኢይሐልዩ በልቦሙ
  chosen: yet they will not take thought for the good in their hearts
  alternatives:
  - and they will not think on what is good in their hearts
  - but they will not consider the good in their heart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ይሐልዩ conveys thinking, considering, or taking thought. The phrase likely
    contrasts material goods with inward moral reflection. 'Take thought for the good'
    keeps the ethical force while remaining somewhat literal.
- source_word: ባሕር ይውኅጦሙ
  chosen: the sea will swallow them
  alternatives:
  - the sea will engulf them
  - the sea will devour them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A vivid judgment image; 'swallow' preserves the concrete apocalyptic
    force better than a flatter term.
- source_word: ወይትኀጐሉ ውስቴታ
  chosen: and they will be destroyed within it
  alternatives:
  - and they will perish in it
  - and they will be sunk inside it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause indicates their ruin inside the sea. 'Destroyed within it'
    keeps the finality and the locative sense of ውስቴታ.
