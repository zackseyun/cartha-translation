theological_decisions:
- issue: Meaning of the second clause contrasting external wealth and internal disposition
  chosen_reading: The verse contrasts their valuable possessions with their failure
    to consider what is good inwardly.
  alternative_readings:
  - The phrase could mean they do not think about their goods in their hearts
  - The text may simply say they do not reflect at all before destruction
  rationale: Because ሠናየ can point either back to 'good possessions' or more broadly
    to 'the good,' the main text preserves a morally charged reading that fits the
    Epistle's wisdom-judgment context, while avoiding over-expansion beyond the Ge'ez.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity.
