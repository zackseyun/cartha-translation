theological_decisions:
- issue: Whether to render the creator language with the more doctrinally loaded 'created'
  chosen_reading: made
  alternative_readings:
  - created
  rationale: The Ge'ez verb itself is broader than a technical creation term. 'Made' preserves the rhetorical appeal to God as maker of the whole cosmos without importing later doctrinal precision beyond the wording.
  doctrine_reference: Translation philosophy §1 original-language primacy over translation tradition
- issue: Scope of recipients of 'instruction and wisdom'
  chosen_reading: all who move upon the earth and those at sea
  alternative_readings:
  - all people on earth and in the sea
  - all creatures on land and sea
  rationale: The verse's wording is broad and may intentionally evoke the whole inhabited world. The translation preserves that breadth rather than narrowing it to humans alone or expanding it explicitly to all animals.
  doctrine_reference: Translation philosophy §3 preserve theological tension rather than resolve it
