translation:
  text: Was it not he who made heaven and earth and everything that is in them? Who gave instruction and wisdom to all who move upon the earth and to those at sea?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that is within them.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'those at sea' may refer to seafarers or, more broadly, those associated with the sea; the Ge'ez is concise.
    reason: lexical_alternative
  - marker: c
    text: Or 'And who gave'.
    reason: previous_rendering
lexical_decisions:
- source_word: አኮኑ
  chosen: Was it not
  alternatives:
  - Is it not
  - Did not
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a rhetorical question expecting agreement. The past-oriented English fits the following perfective sense of creation and giving.
- source_word: ገብረ
  chosen: made
  alternatives:
  - created
  - did
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common verb for making/doing. 'Made' is broad and faithful; 'created' would be interpretive though contextually possible.
- source_word: ሰማየ ወምድረ
  chosen: heaven and earth
  alternatives:
  - the heavens and the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard merism for the whole created order. Singular 'heaven' follows the Ge'ez form and keeps the line concise.
- source_word: ወኵሎ ዘሀሎ ውስቴቶሙ
  chosen: and everything that is in them
  alternatives:
  - and all that is within them
  - and everything existing in them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Captures the totalizing phrase without over-literal awkwardness. 'Them' naturally refers back to heaven and earth.
- source_word: ወሀበ
  chosen: gave
  alternatives:
  - has given
  - granted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple past coordinates well with 'made' in the rhetorical question.
- source_word: ትምህርተ
  chosen: instruction
  alternatives:
  - teaching
  - understanding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes teaching or instruction. 'Instruction' preserves the sense of imparted guidance better than the more abstract 'understanding'.
- source_word: ጥበበ
  chosen: wisdom
  alternatives:
  - skill
  - understanding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Wisdom'' is the most natural and theologically resonant rendering in this wisdom-apocalyptic context.'
- source_word: ለኵሉ እለ ይትኀወሱ ዲበ ምድር
  chosen: to all who move upon the earth
  alternatives:
  - to all who walk on the earth
  - to all who dwell on the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests movement or roaming rather than mere residence. 'Move upon the earth' preserves the broad reference to living creatures or people on land.
- source_word: ወለእለ ባሕር
  chosen: and to those at sea
  alternatives:
  - and to those in the sea
  - and to those of the sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase likely contrasts land-dwellers with seafarers or those associated with the sea. 'At sea' is idiomatic English and preserves the contrast.
