translation:
  text: Have you not seen the captains of the ships, how they are tossed by the waves,
    and their ships are shaken by the winds, and they are distressed?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'from the movement of their souls' is difficult. The
      underlying words may also suggest 'from the winds' or 'from their spirits/minds.'
    reason: lexical_alternative
  - marker: b
    text: The image likely points to wealthy or powerful seafarers whose apparent
      security collapses under judgment; the verse may also imply the inner panic
      of the powerful when their stability fails.
    reason: cultural_note
  - marker: c
    text: Or 'the kings of the ships, how they are tossed from side to side and are
      shaken from the movement of their souls'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኢትሬእይዎሙኑ
  chosen: Have you not seen
  alternatives:
  - Did you not see
  - Do you not see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is best taken as an interrogative negative introducing a rhetorical
    question. English perfect 'have you not seen' fits the admonitory tone of the
    Epistle and preserves the force of direct address.
- source_word: ለተነገሥተ
  chosen: the kings
  alternatives:
  - the rulers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun derives from the royal/governing domain and is most naturally
    rendered 'kings.' 'Rulers' is possible but weakens the concrete social image.
- source_word: አሕማር
  chosen: of the ships
  alternatives:
  - of the sea-vessels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context this term is best understood as 'ships' or seagoing vessels.
    The following imagery of tossing and shaking strongly supports a maritime reference
    rather than an ethnic or geographic sense.
- source_word: እፎ
  chosen: how
  alternatives:
  - in what way
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the manner of what follows; 'how' is idiomatic and preserves
    the vivid observational style.
- source_word: ይትሀወኩ
  chosen: they are tossed from side to side
  alternatives:
  - they are disturbed
  - they are thrown into confusion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys agitation or being thrown into disorder. Because the
    immediate context is maritime, 'tossed from side to side' captures both literal
    and metaphorical instability without over-paraphrasing.
- source_word: እምገደ
  chosen: from side to side
  alternatives:
  - from the side
  - by force
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase is difficult in OCR form, but in context it
    likely marks the source or manner of the tossing. 'From side to side' fits the
    ship image and preserves the sense of violent motion.
- source_word: ወያንቀለቅሉ
  chosen: and are shaken
  alternatives:
  - and reel
  - and are rocked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A verb of shaking or rocking. 'Are shaken' is broad enough to preserve
    the image while allowing the inner disturbance named in the next phrase.
- source_word: እምነፋሳት
  chosen: from the movement
  alternatives:
  - from the winds
  - from the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote winds, breaths, or spirits/souls. Because the next
    word is possessive ('their'), the phrase is obscure. I render it in a way that
    preserves motion while noting alternatives in a footnote.
- source_word: አሕማሮሙ
  chosen: their souls
  alternatives:
  - their spirits
  - their minds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term commonly denotes soul/spirit/mind. 'Souls' preserves the anthropological
    weight and the apocalyptic register, though 'minds' is possible if the phrase
    refers to inward anxiety.
- source_word: ወይትመነደቡ
  chosen: and they are distressed
  alternatives:
  - and they are terrified
  - and they are troubled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The closing verb expresses inward agitation or affliction. 'Distressed'
    preserves the emotional force without overstating it as sheer panic.
