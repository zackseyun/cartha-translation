theological_decisions:
- issue: Whether the verse depicts literal maritime danger or a metaphor for political
    instability and inner terror
  chosen_reading: Retain the literal ship imagery in the main text while allowing
    metaphorical force to remain implicit
  alternative_readings:
  - Translate more abstractly as rulers thrown into confusion
  - Interpret the whole verse as inward psychological turmoil without maritime reference
  rationale: The Ge'ez wording strongly suggests ships and violent motion. In apocalyptic
    admonition, concrete imagery often carries moral force without needing to be flattened
    into explanation. Preserving the image best fits project philosophy.
