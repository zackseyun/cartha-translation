theological_decisions:
- issue: Whether ጽድቅ should be rendered 'righteousness' or 'justice' in a condemnation
    context
  chosen_reading: his righteousness
  alternative_readings:
  - his justice
  rationale: The immediate context is judicial, so 'justice' is possible; however,
    the accusation is against God's moral rightness more broadly, not only his courtroom
    verdict. 'Righteousness' preserves that wider theological scope while remaining
    intelligible.
  doctrine_reference: 'Translation philosophy: contested/default rendering of righteousness
    terms'
- issue: Subject reference of the wrath-sender
  chosen_reading: he sends his wrath
  alternative_readings:
  - God sends his wrath
  - the Lord sends his wrath
  rationale: The Ge'ez text gives a pronominal subject rather than an explicit divine
    name. Retaining 'he' avoids adding specificity not present in the witness while
    the context makes the referent clear.
  doctrine_reference: Original-language primacy over translation tradition
