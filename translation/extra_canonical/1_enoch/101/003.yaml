translation:
  text: And if he sends his wrath upon you for all your deeds, will you not entreat
    him? For you speak great and harsh words against his righteousness, and you have
    no peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you are not those who can seek his favor.' The Ge'ez verb can denote
      imploring or making supplication.
    reason: lexical_alternative
  - marker: b
    text: '''His righteousness'' may also be understood as ''his justice'' in this
      context of judgment.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you are not those who can entreat him'.
    reason: previous_rendering
  - marker: d
    text: Or 'proud and insolent words'.
    reason: previous_rendering
lexical_decisions:
- source_word: ፈነወ
  chosen: sends
  alternatives:
  - dispatches
  - lets loose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries the sense of sending forth. 'Sends' is natural English
    and preserves the image of wrath being directed upon the hearers without over-paraphrasing.
- source_word: መዐቶ
  chosen: wrath
  alternatives:
  - anger
  - fury
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this judgment context, 'wrath' best preserves the apocalyptic and
    judicial force of divine anger.
- source_word: በኵሉ ምግባሪክሙ
  chosen: for all your deeds
  alternatives:
  - because of all your works
  - on account of all your actions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase links the coming wrath to the totality of the audience's conduct.
    'Deeds' is concise and morally weighty.
- source_word: ታስተበቍዕዎ
  chosen: can entreat him
  alternatives:
  - can seek his favor
  - can make supplication to him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form suggests beseeching or imploring. 'Entreat him' preserves the
    personal and judicial sense better than the more generalized 'seek his favor.'
- source_word: ጽድቅ ዚአሁ
  chosen: his righteousness
  alternatives:
  - his justice
  - his righteous order
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The default project rendering for cognate righteousness terms is 'righteousness.'
    In this context the sense may overlap with justice, but 'righteousness' preserves
    the broader moral quality without narrowing it.
- source_word: ዐቢይተ ወጽኑዓተ
  chosen: proud and insolent
  alternatives:
  - great and harsh
  - arrogant and defiant
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired adjectives describe the character of the hearers' speech.
    'Proud and insolent' captures both self-exaltation and offensive boldness in a
    judgment setting.
- source_word: አልብክሙ ሰላመ
  chosen: you have no peace
  alternatives:
  - there is no peace for you
  - peace is absent from you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the terse judgment formula and echoes the prophetic register
    without importing later formulaic wording.
