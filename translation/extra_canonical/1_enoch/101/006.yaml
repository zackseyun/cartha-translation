translation:
  text: Is not the whole sea, and all its waters, and all its movements, the work of the Most High? And he has measured all its workings and bound it entirely with sand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The word rendered 'movements' may more specifically refer to the sea's surging or waves.
    reason: lexical_alternative
  - marker: b
    text: The final clause is textually difficult. The Ge'ez appears to say that he 'bound their foundations with sand'; this may refer to God fixing the sea's boundary.
    reason: textual_variant
  - marker: c
    text: Or 'Is not every sea, and all its waters, and all its movements, the work of the Most High? And he has measured all his works and bound their foundations with sand.'.
    reason: previous_rendering
lexical_decisions:
- source_word: አኮ
  chosen: Is not
  alternatives:
  - Is it not
  - Surely
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a rhetorical question expecting agreement. 'Is not' preserves the interrogative force without over-expansion.
- source_word: ኵሉ ባሕር
  chosen: every sea
  alternatives:
  - the whole sea
  - all the sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኵሉ with a singular collective noun can be rendered distributively. 'Every sea' fits the sequence of cosmic elements better than a singular collective in English.
- source_word: ማያቲሃ
  chosen: its waters
  alternatives:
  - its water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural better matches English idiom for a sea's constituent waters and reflects the Ge'ez plural form.
- source_word: ሑሳታ
  chosen: movements
  alternatives:
  - waves
  - stirrings
  - surges
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term appears to denote motions or agitations of the sea. 'Movements' is broad and transparent, avoiding overconfidence in the more specific 'waves' while still fitting the context.
- source_word: ግብረ ልዑል
  chosen: the work of the Most High
  alternatives:
  - the deed of the Most High
  - the workmanship of the Most High
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This construction identifies the sea and its phenomena as products of divine making. 'Most High' preserves the elevated divine title without importing later formulaic phrasing.
- source_word: ዐቀመ
  chosen: has measured
  alternatives:
  - has set in order
  - has established
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly carries the sense of measuring or determining extent. 'Has measured' preserves the cosmological image of ordered creation.
- source_word: አሰረ
  chosen: bound
  alternatives:
  - fastened
  - tied
  - confined
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests binding or fastening. 'Bound' keeps the vivid image of the sea's limits being restrained by divine action.
- source_word: እብንታሃ
  chosen: their foundations
  alternatives:
  - its foundations
  - their boundaries
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix is difficult in context, but the noun likely refers to bases or foundations. A plural English rendering suits the plural 'works' in the preceding clause.
- source_word: ቡኖባ
  chosen: with sand
  alternatives:
  - in sand
  - by sand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The term is best taken as ''sand.'' This yields a striking cosmological image: the sea''s foundations or limits are bound with sand, echoing ancient descriptions of divinely fixed boundaries.'
