translation:
  text: If he shuts the windows of heaven, and withholds the rain and the dew so that it does not come down upon the earth because of you—what will you do then?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The imagery of 'the windows of heaven' reflects ancient cosmological language for the source of rain; the translation preserves the image rather than reducing it to a modern meteorological expression.
    reason: cultural_note
  - marker: b
    text: The final clause is a rhetorical question. It may also be rendered more literally, 'what is it that you will do?'
    reason: lexical_alternative
  - marker: c
    text: Or 'And if he shuts'.
    reason: previous_rendering
lexical_decisions:
- source_word: ዐፀወ
  chosen: shuts
  alternatives:
  - closes
  - bars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward verbal sense of closing/shutting. 'Shuts' is idiomatic with 'windows of heaven' and preserves the concrete apocalyptic image.
- source_word: መስኮተ ሰማይ
  chosen: the windows of heaven
  alternatives:
  - the openings of heaven
  - the windows of the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a stock ancient cosmological image for heavenly apertures through which rain is given. 'Windows of heaven' preserves the imagery and biblical resonance without flattening it.
- source_word: ከለአ ዝናመ
  chosen: withholds the rain
  alternatives:
  - restrains the rain
  - keeps back the rain
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys preventing or holding back. 'Withholds' fits divine control of rainfall and reads naturally in English.
- source_word: ወጠለ
  chosen: and the dew
  alternatives:
  - and dew
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Taken as the additional moisture source paired with rain. The sequence 'rain and the dew' reflects the agricultural judgment motif and should be preserved.
- source_word: ከመ ኢይረድ ዲበ ምድር
  chosen: so that it does not come down upon the earth
  alternatives:
  - so that they do not descend on the earth
  - so that it may not fall on the ground
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular English 'it' treats the withheld precipitation collectively, which is smoother while still faithful to the sense of rain/dew not descending.
- source_word: በእንቲአክሙ
  chosen: because of you
  alternatives:
  - on account of you
  - for your sake
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'In this judgment context the causal sense is primary: the drought comes as a consequence of the audience''s conduct.'
- source_word: ሚሀለወክሙ ትግበሩ
  chosen: what will you do then?
  alternatives:
  - what will you do?
  - what are you to do?
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause functions as a rhetorical challenge about human helplessness under divine judgment. 'Then' brings out the implied consequence without over-paraphrasing.
