theological_decisions:
- issue: Agency of the one who shuts heaven
  chosen_reading: Render the subject as singular 'he' rather than explicitly 'God' or 'the Lord.'
  alternative_readings:
  - God shuts the windows of heaven
  - the Lord closes heaven
  rationale: The Ge'ez presents a singular subject without naming him in this verse. Retaining 'he' preserves the immediate syntax and avoids importing an explicit divine title not present in the witness, while the context still implies divine agency.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
