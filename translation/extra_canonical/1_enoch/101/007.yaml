theological_decisions:
- issue: Referent of the repeated feminine singular pronouns and verbs
  chosen_reading: The verse continues speaking of the sea or body of water from the
    preceding context, personified as fearing and drying up under rebuke.
  alternative_readings:
  - A more generic reference to 'the water' or 'river'
  - A less personal rendering that removes personification
  rationale: The mention of fish and of what is 'in it' strongly indicates a body
    of water. Retaining personified fear fits apocalyptic style and should not be
    flattened.
  doctrine_reference: Preserve apocalyptic imagery rather than smoothing it into generic
    prose.
- issue: Force of the final clause addressed to sinners
  chosen_reading: 'A moral contrast: even when creation itself recoils under rebuke,
    the sinners on earth do not fear.'
  alternative_readings:
  - A narrower statement that sinners do not fear the sea itself
  - A generalized exhortation about lacking fear of judgment
  rationale: The immediate grammar points to 'it,' yet within the rhetoric the line
    functions as an indictment of sinners' hardness in the face of cosmic judgment.
    The translation keeps the literal object while allowing the rhetorical force to
    stand.
  doctrine_reference: Preserve theological tension rather than resolve it.
