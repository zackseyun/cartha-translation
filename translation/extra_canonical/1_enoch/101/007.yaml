translation:
  text: And at its rebuke it will be afraid and dry up, and all its fish will die,
    and everything that is in it. But you sinners who are upon the earth do not fear
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The repeated 'it' likely refers to the sea or waters in the preceding verse.
      The Ge'ez keeps the reference implicit.
    reason: cross_reference
  - marker: b
    text: The final line is literally 'you sinners who are upon the earth do not fear
      it,' probably contrasting the fear of creation under rebuke with the fearlessness
      of the wicked.
    reason: lexical_alternative
lexical_decisions:
- source_word: በተግሣጹ
  chosen: at its rebuke
  alternatives:
  - by its rebuke
  - at its reproof
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition በ with the verbal noun ተግሣጽ naturally yields an instrumental
    or circumstantial sense. 'Rebuke' preserves the force of a judicial or admonitory
    act in apocalyptic discourse better than the softer 'reproof.' The pronominal
    suffix is rendered 'its,' referring back to the sea/waters in the immediate context.
- source_word: ትፈርህ
  chosen: it will be afraid
  alternatives:
  - it fears
  - it will tremble
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The feminine singular verb matches the antecedent treated as feminine.
    'Will be afraid' keeps the simple fear sense; 'tremble' is possible as an interpretive
    extension but is not required by the Ge'ez.
- source_word: ትየብስ
  chosen: dry up
  alternatives:
  - be dried up
  - wither
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes becoming dry. 'Dry up' is idiomatic English for waters
    and preserves the judgment imagery without over-paraphrase.
- source_word: ዓሣቲሃ
  chosen: its fish
  alternatives:
  - the fish in it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun means 'fish,' with suffix 'its.' The possessive is retained
    because the Ge'ez marks it explicitly.
- source_word: ይመውት
  chosen: will die
  alternatives:
  - dies
  - shall perish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward future-like rendering fits the sequence of judgment
    consequences. 'Perish' is possible but 'die' is more direct and concrete.
- source_word: ኵሉ ዘሀሎ ውስቴታ
  chosen: everything that is in it
  alternatives:
  - all that is within it
  - everything in its midst
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase broadens the devastation beyond fish alone. 'Everything that
    is in it' is clear and sufficiently formal.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - sinful ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The standard apocalyptic designation is best preserved as 'sinners,'
    a key term in the Epistle's moral contrast.
- source_word: እለ ዲበ ምድር
  chosen: who are upon the earth
  alternatives:
  - who are on the earth
  - who dwell on the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A relatively formal rendering preserves the elevated register. 'Dwell
    on the earth' would add an idea not explicit in the text.
- source_word: ኢትፈርህዎ
  chosen: do not fear it
  alternatives:
  - are not afraid of it
  - do not fear him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The negative imperfect is naturally rendered as a present general statement.
    The object suffix is best taken as 'it,' referring to the judged sea/waters just
    described. A masculine 'him' is grammatically less likely in this immediate context.
