translation:
  text: And the middle one reached to heaven, like the throne of the Lord, which was
    of crystal stone, and the top of the throne was of sapphire stone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The stone term rendered 'crystal' is lexically uncertain; it denotes a bright
      or precious material in this throne vision.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'the top of the throne' is difficult; it may refer more
      generally to the upper part or summit of the structure associated with the throne.
    reason: alternative_reading
  - marker: c
    text: Or 'And in the middle it reached up'.
    reason: previous_rendering
  - marker: d
    text: Or 'and the top of the throne was of crystal stone, and its foundation was
      of sapphire stone.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ማእከላይሰ
  chosen: in the middle
  alternatives:
  - its middle
  - the middle part
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form points to the central or middle part of the visionary structure.
    'In the middle' preserves the spatial imagery without over-specifying the referent
    beyond what the verse itself states.
- source_word: ይጐድእ
  chosen: reached up
  alternatives:
  - rose
  - extended
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys upward extension or ascent. 'Reached up' keeps the vivid
    visionary motion and fits the following phrase 'to heaven'.
- source_word: እስከ ሰማይ
  chosen: up to heaven
  alternatives:
  - to heaven
  - as far as heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition plus noun marks extent. 'Up to heaven' best reflects
    vertical reach in this apocalyptic description.
- source_word: ከመ መንበረ ለእግዚአብሔር
  chosen: like the throne of the Lord
  alternatives:
  - like the Lord's throne
  - like a throne for the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ከመ introduces comparison, not identity. 'Like the throne of the Lord'
    preserves the simile and avoids collapsing the visionary object into the divine
    throne itself.
- source_word: እምእብነ ፑክ
  chosen: of crystal stone
  alternatives:
  - of crystal
  - of alabaster stone
  - of shining stone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The stone term is difficult and traditionally understood as a bright,
    crystalline material. 'Crystal stone' preserves the gemstone imagery while acknowledging
    lexical uncertainty.
- source_word: ይማሑ ለመንበሩ
  chosen: the top of the throne
  alternatives:
  - its upper part was the throne
  - its summit, namely the throne
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to refer to the upper portion or top associated with
    the throne. 'The top of the throne' gives a coherent architectural image in context,
    though the exact nuance of the Ge'ez is somewhat uncertain.
- source_word: እምእብነ ሰንፔር
  chosen: of sapphire stone
  alternatives:
  - of sapphire
  - of lapis-like stone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The gemstone name is conventionally rendered 'sapphire.' Retaining 'stone'
    reflects the Ge'ez construction and keeps the material emphasis.
