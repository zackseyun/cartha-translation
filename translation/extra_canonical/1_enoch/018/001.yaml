theological_decisions:
- issue: Whether ነፋሳት should be rendered 'winds' or 'spirits'
  chosen_reading: winds
  alternative_readings:
  - spirits
  - breaths
  rationale: The verse belongs to a sequence of cosmological revelations involving
    the structure of the world. Rendering the term as 'winds' best fits the imagery
    of heavenly storehouses and avoids importing angelological meaning not required
    by the context.
  doctrine_reference: Preserve local passage sense before harmonizing key terms across
    the corpus.
- issue: Whether አሰርገወ describes beautifying or establishing creation
  chosen_reading: adorned
  alternative_readings:
  - established
  - ordered
  - made beautiful
  rationale: The base Ge'ez witness supports a vivid verb of adorning/beautifying.
    Because the object includes cosmic foundations, the line may imply ordered arrangement
    as well; this is preserved in a footnote rather than replacing the main image
    with a flatter construction term.
  doctrine_reference: Preserve apocalyptic imagery rather than smoothing into generic
    prose; preserve ambiguity with footnotes where needed.
