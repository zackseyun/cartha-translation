translation:
  text: And I saw how the winds stretch out the pillars of heaven, and they stand
    between heaven and earth; these are the pillars of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez verb rendered 'stretch out' is difficult and could be understood
      more broadly as 'extend,' 'support,' or a similar action affecting the pillars.
    reason: lexical_alternative
lexical_decisions:
- source_word: ነፋሳት
  chosen: the winds
  alternatives:
  - the spirits
  - the winds/spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this cosmological vision context, the plural most naturally refers
    to winds as cosmic forces rather than personal spirits. Rendering it as 'winds'
    preserves the apocalyptic image of atmospheric powers acting upon the structure
    of heaven.
- source_word: ይረብብዋ
  chosen: stretch out
  alternatives:
  - support
  - shake
  - extend
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is difficult, but the immediate object and explanatory clause
    favor a sense of extending or spreading out rather than merely supporting. 'Stretch
    out' preserves the vivid visionary action without overcommitting to a more interpretive
    gloss.
- source_word: አዕልና ሰማይ
  chosen: the pillars of heaven
  alternatives:
  - the supports of heaven
  - the columns of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes the cosmic structural elements imagined as holding
    up or marking the heavens. 'Pillars' is the most natural elevated English equivalent
    and fits the explanatory final clause.
- source_word: ይቀውሙ
  chosen: they stand
  alternatives:
  - they are stationed
  - they remain standing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering preserves the visual force of the vision.
    The subject is the pillars, now described in their location.
- source_word: ማእከለ ሰማይ ወምድር
  chosen: between heaven and earth
  alternatives:
  - in the midst of heaven and earth
  - between the sky and the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although literally 'in the midst of heaven and earth,' idiomatic English
    is 'between heaven and earth.' This keeps the cosmological spatial imagery clear
    and readable.
- source_word: እሙንቱ ውእቶሙ
  chosen: these are
  alternatives:
  - they are
  - those are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is emphatic and identificatory, pointing back to what
    Enoch has just seen. 'These are' captures the explanatory force.
