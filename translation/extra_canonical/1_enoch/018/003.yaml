theological_decisions:
- issue: Whether to render ነፋሳት as 'winds' or 'spirits'
  chosen_reading: winds
  alternative_readings:
  - spirits
  - winds/spirits
  rationale: The verse belongs to a cosmic tour describing the architecture and forces
    of creation. Reading the term as 'winds' better fits the physical imagery of heaven's
    pillars being acted upon and avoids importing angelological specificity not demanded
    by the Ge'ez.
  doctrine_reference: Preserve local passage sense before harmonizing broader theological
    usage; original-language primacy over translation tradition.
