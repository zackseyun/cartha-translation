- issue: Whether ነፋሳተ should be rendered as impersonal cosmic winds or personal spirits/angelic beings
  chosen_reading: impersonal cosmic winds
  alternative_readings:
  - spirits
  - wind-spirits
  rationale: Within the immediate context of Enoch's tour of cosmic structures, the verse describes forces governing heaven, sun, and stars. Rendering the term as 'winds' preserves the apocalyptic cosmology without introducing personal agency not explicit in the line.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten or over-harmonize.
