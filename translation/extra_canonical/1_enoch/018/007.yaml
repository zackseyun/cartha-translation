translation:
  text: and the eastern tract was of colored stone, and one was of pearl stone, and
    one of healing stone; and the western tract was of red stone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez list of stones is difficult. 'Pearl stone' may also be understood
      as mother-of-pearl or a lustrous gem.
    reason: lexical_alternative
  - marker: b
    text: '''Healing stone'' renders a term that literally suggests remedy or healing;
      it may refer to a specific mineral rather than describing the stone''s effect.'
    reason: lexical_alternative
  - marker: c
    text: The repeated directional phrase likely describes the material composition
      of different sides or regions in Enoch's vision.
    reason: cultural_note
lexical_decisions:
- source_word: ዘመንገለ
  chosen: tract
  alternatives:
  - region
  - side
  - quarter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term appears to denote a directional expanse or side of the visionary
    structure/worldscape rather than a road in the ordinary sense. 'Tract' preserves
    spatial breadth without over-specifying.
- source_word: ጽባሕሰ
  chosen: eastern
  alternatives:
  - east
  - toward the east
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used here as a directional designation paired with አዜብ ('west'). 'Eastern'
    fits the adjectival construction with the following spatial term.
- source_word: እምእብነ
  chosen: of stone
  alternatives:
  - from stone
  - made of stone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition plus 'stone' marks material composition. In English,
    'of stone' is concise and natural in a descriptive list.
- source_word: ሕብር
  chosen: colored
  alternatives:
  - variegated
  - many-colored
  - mixed-color
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun/adjective relates to color or variegation. 'Colored' is restrained
    and transparent; more vivid options like 'variegated' are possible but slightly
    more interpretive.
- source_word: ባሕርይ
  chosen: pearl
  alternatives:
  - mother-of-pearl
  - shining gem
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this gemstone list, the term is commonly understood as pearl or nacreous
    material. 'Pearl' is the clearest English rendering, while 'mother-of-pearl' remains
    a plausible alternative.
- source_word: ፈውስ
  chosen: healing
  alternatives:
  - antimony
  - stibium
  - medicinal stone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez term commonly means healing/remedy, but in a mineral list it
    may denote a specific stone known for medicinal use. I retain the transparent
    literal sense 'healing stone' and note the lexical uncertainty.
- source_word: አዜብ
  chosen: western
  alternatives:
  - west
  - toward the west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Directional counterpart to the eastern designation earlier in the verse.
- source_word: ቀይሕ
  chosen: red
  alternatives:
  - crimson
  - ruddy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic color term; 'red' is the most direct rendering and suits the gemstone/building-material
    catalogue.
