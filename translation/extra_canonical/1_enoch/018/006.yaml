theological_decisions:
- issue: Cosmic-geographical imagery of the burning place and gemstone mountains
  chosen_reading: Preserve the visionary topography literally rather than interpret
    it symbolically in translation.
  alternative_readings:
  - Render as a generalized fiery region
  - Interpret the mountains as heavenly structures in the main text
  rationale: The verse presents apocalyptic scenery, not an explicit interpretation.
    The translation should keep the imagery concrete and leave symbolism to notes
    or later interpretation.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not flatten apocalyptic imagery.'
