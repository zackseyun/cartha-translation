translation:
  text: And I went on toward the south, and I saw a place burning day and night, where
    there were seven mountains of precious stone—three toward the east and three toward
    the south.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The transmitted Ge'ez text says 'three toward the east and three toward
      the south' after mentioning seven mountains. The seventh mountain is not specified
      within this verse as preserved here.
    reason: textual_variant
  - marker: b
    text: '''Precious stone'' could also be rendered ''costly stone'' or ''glorious
      stone''; the Ge''ez emphasizes the exceptional value or splendor of the stone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ሐለፍኩ
  chosen: I went on
  alternatives:
  - I passed on
  - I proceeded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys continued movement within the vision narrative, more naturally
    than the wooden 'I passed' while preserving sequential travel.
- source_word: መንገለ አዜብ
  chosen: toward the south
  alternatives:
  - to the south
  - southward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መንገለ marks direction 'toward/in the direction of'; አዜብ here denotes the
    south. 'Toward the south' preserves directional force.
- source_word: ወርኢኩ መካነ
  chosen: and I saw a place
  alternatives:
  - and I saw the place
  - and I saw a region
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase introduces a visionary locale. 'A place' is idiomatic and
    does not over-specify definiteness not clearly required by the Ge'ez.
- source_word: ዘይነድድ
  chosen: burning
  alternatives:
  - that burned
  - blazing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A participial/relative sense fits the ongoing visionary description.
    'Burning' keeps the vivid apocalyptic image without embellishment.
- source_word: መዐልተ ወሌሊተ
  chosen: day and night
  alternatives:
  - by day and by night
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal pair indicating continual action; concise English preserves
    the repetitive force.
- source_word: ኀበ ሰብዓቱ አድባር
  chosen: where there were seven mountains
  alternatives:
  - near seven mountains
  - at the seven mountains
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኀበ can mark location 'at/where.' In context the place is associated with
    the mountains; 'where there were' gives clear English while preserving the scene-setting
    function.
- source_word: ዘእምእብን ክቡር
  chosen: of precious stone
  alternatives:
  - of glorious stone
  - of costly stone
  - of noble stone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: እብን is 'stone'; ክቡር carries the sense precious, honored, costly. 'Precious
    stone' fits apocalyptic mineral imagery better than the vaguer 'glorious stone'.
- source_word: ፫መንገለ ጽባሕ
  chosen: three toward the east
  alternatives:
  - three on the east side
  - three toward the sunrise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጽባሕ can denote east/morning. In a directional list, 'east' is the clearest
    contextual rendering.
- source_word: ወ፫መንገለ አዜብ
  chosen: and three toward the south
  alternatives:
  - and three on the south side
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the directional parallelism of the Ge'ez. The verse as transmitted
    lists east and south, even though the total of seven leaves one mountain unaccounted
    for in this line.
