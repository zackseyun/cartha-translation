translation:
  text: I saw the winds upon the earth, which bear the clouds; I saw the paths of the angels; I saw at the end of the earth the firm support of the heaven above.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening clause is textually and syntactically difficult. It may also be understood more literally as 'the winds above the earth, bearing the clouds' or 'the winds that support what is above the earth among the clouds.'
    reason: textual_variant
  - marker: b
    text: Or 'the foundation of the heaven above.' The Ge'ez term can denote firmness or supporting strength.
    reason: lexical_alternative
  - marker: c
    text: Or 'And I saw the winds that bear the earth above the clouds'.
    reason: previous_rendering
  - marker: d
    text: Or '; and I saw the paths of the angels; and I saw at the end of the earth'.
    reason: previous_rendering
lexical_decisions:
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common first-person visionary report; 'I saw' preserves the repeated apocalyptic formula without archaizing.
- source_word: ነፋሳተ
  chosen: the winds
  alternatives:
  - the spirits
  - the winds/spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this cosmological context, with bearing/carrying language and nearby references to earth and clouds, the physical sense 'winds' fits better than 'spirits'.
- source_word: ዘይጸውር
  chosen: that bear
  alternatives:
  - that carry
  - that support
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys carrying or supporting. 'Bear' preserves the cosmic, weight-bearing imagery while remaining readable.
- source_word: ዘዲበ ምድር
  chosen: the earth above
  alternatives:
  - that are above the earth
  - the upper part of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is syntactically difficult. Taken with the following clause, it most naturally yields winds associated with bearing the earth in an elevated cosmic setting. 'The earth above' is avoided in English main text as too opaque; the sense is represented as winds that bear the earth, with 'above the clouds' specifying the elevated location.
- source_word: በደመናት
  chosen: above the clouds
  alternatives:
  - in the clouds
  - by the clouds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can be rendered several ways. 'Above the clouds' best matches the visionary ascent and cosmic architecture of the passage.
- source_word: ፍናወ
  chosen: the paths
  alternatives:
  - the ways
  - the courses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A concrete term for routes or ways. 'Paths' preserves spatial imagery and suits angelic movement through the cosmos.
- source_word: መላእክት
  chosen: the angels
  alternatives:
  - the messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In 1 Enoch's apocalyptic setting, celestial beings are in view, so 'angels' is the clearest rendering.
- source_word: ውስተ ጽንፈ ምድር
  chosen: at the end of the earth
  alternatives:
  - at the extremity of the earth
  - at the edge of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase denotes the far boundary or extremity of the world. 'End of the earth' is idiomatic and preserves the cosmic horizon imagery.
- source_word: ጽንዐ
  chosen: the firm support
  alternatives:
  - the foundation
  - the fixed support
  - the strength
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun suggests firmness or supporting strength. 'Firm support' preserves the image of heaven upheld at the world's extremity without overcommitting to architectural 'foundation' if the term is broader.
- source_word: ዘሰማይ መልዕልተ
  chosen: of the heaven above
  alternatives:
  - of the upper heaven
  - of heaven on high
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the heaven in its elevated aspect. 'The heaven above' is natural English and keeps the vertical cosmology explicit.
