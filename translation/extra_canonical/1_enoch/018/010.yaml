lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - and I looked
  - and I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common narrative visionary verb; 'saw' is clear modern English while
    preserving the report formula.
- source_word: ህየ
  chosen: there
  alternatives:
  - in that place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Deictic adverb repeated in the verse; retaining 'there' preserves the
    spatial, visionary style.
- source_word: መካነ
  chosen: the place
  alternatives:
  - a place
  - the region
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic noun for place/location. The definite sense fits the visionary
    sequence of identified cosmic locales.
- source_word: ማዕዶተ
  chosen: at the ends of
  alternatives:
  - at the extremities of
  - at the borders of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though the OCR reading is uncertain, the form most naturally points to
    extremities/borders. 'Ends' preserves apocalyptic cosmic geography without overexplaining.
- source_word: ዐቢይ ምድር
  chosen: the great earth
  alternatives:
  - the great land
  - the vast earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literal rendering suits the cosmic register. 'Earth' is preferable to
    'land' in this visionary context.
- source_word: ይትጋብኡ
  chosen: they are gathered together
  alternatives:
  - they gather together
  - they are assembled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/reflexive sense is likely. 'Are gathered together' preserves
    the collective, locative force and echoes apocalyptic assembly language.
