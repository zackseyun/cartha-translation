translation:
  text: And I saw the cornerstones of the earth, and I saw the four winds that bear
    up the earth and the firmament of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the stones of the corners of the earth.' The Ge'ez phrase is architectural
      and may refer to the earth’s foundational extremities in visionary imagery.
    reason: lexical_alternative
  - marker: b
    text: The noun rendered 'winds' can in some contexts overlap with 'spirits' or
      'breaths,' but here the cosmological setting favors 'winds.'
    reason: lexical_alternative
  - marker: c
    text: '''Firmament of heaven'' preserves ancient cosmic imagery of a structured
      heavenly expanse or vault.'
    reason: cultural_note
lexical_decisions:
- source_word: እብነ
  chosen: stones
  alternatives:
  - rocks
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic noun for stones; in construct with the following term it yields
    'stones of the corners,' idiomatically 'cornerstones.'
- source_word: ማእዘንተ
  chosen: cornerstones
  alternatives:
  - corners
  - stones of the corners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the noun for corner/angle. Because it follows 'stones' in construct,
    the phrase is best rendered 'cornerstones' rather than the flatter 'corners,'
    preserving the architectural-cosmic imagery.
- source_word: ምድር
  chosen: earth
  alternatives:
  - land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this cosmic-vision context the global sense 'earth' fits better than
    local 'land.'
- source_word: አርባዕተ ነፋሳተ
  chosen: the four winds
  alternatives:
  - the four spirits
  - the four winds of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though the noun can overlap with breath/spirit/wind, the cosmological
    setting and the number four strongly favor 'winds.' 'Of heaven' is not explicit
    here and so is not added.
- source_word: ይጸውርዋ
  chosen: bear up
  alternatives:
  - support
  - carry
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys bearing or supporting. 'Bear up' preserves the vivid
    image of cosmic support better than the more abstract 'support.'
- source_word: ወጽንዐ ሰማይ
  chosen: the firmament of heaven
  alternatives:
  - the heaven
  - the vault of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the solid heavenly structure or expanse in ancient
    cosmological imagery. 'Firmament of heaven' preserves that apocalyptic-cosmic
    sense more clearly than simply 'heaven.'
