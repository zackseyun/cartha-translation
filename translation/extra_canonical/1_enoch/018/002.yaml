theological_decisions:
- issue: Ancient cosmological imagery of the world’s structure
  chosen_reading: 'Retain concrete imagery: the earth has ''cornerstones'' and is
    ''borne up'' along with the heavenly firmament.'
  alternative_readings:
  - Demythologize to 'extremities of the earth' and 'forces that govern the world'
  - Render more abstractly as 'corners' and 'support'
  rationale: Project philosophy requires preserving apocalyptic imagery rather than
    flattening it into generic modern prose. The verse presents a visionary picture
    of cosmic architecture, and the translation should let that imagery stand.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; optimal
    equivalence without paraphrastic smoothing.'
