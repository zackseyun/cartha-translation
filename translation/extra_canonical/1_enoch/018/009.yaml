translation:
  text: And I saw a burning fire that was within all the mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'and what was within' is difficult in this Ethiopic
      witness and may reflect a compressed or corrupt reading. The sense appears to
      point to something present inside the mountains, in connection with the fire.
    reason: textual_variant
  - marker: b
    text: Or 'And I saw a fire burning, and what was within all the mountains.'.
    reason: previous_rendering
lexical_decisions:
- source_word: እሳተ
  chosen: a fire
  alternatives:
  - fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Indefinite singular noun; rendered simply as 'a fire' to preserve the
    visionary image without specifying source or function beyond the text.
- source_word: ዘይነድድ
  chosen: burning
  alternatives:
  - that burns
  - blazing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative verbal form describing the fire in progress. 'Burning' gives
    natural English while retaining the ongoing aspect.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: First-person visionary report formula. 'I saw' is plain and readable,
    and preserves the repeated apocalyptic witness style.
- source_word: ወዘሀሎ
  chosen: and what was within
  alternatives:
  - and that which was in
  - and what was there in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is textually awkward in the OCR witness, but the construction
    most naturally points to 'that/what was in it/within.' A slightly transparent
    rendering avoids over-resolving the syntax.
- source_word: ውስተ ኵሉ አድባር
  chosen: within all the mountains
  alternatives:
  - in all the mountains
  - inside all the mountains
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ውስተ marks interior location; ኵሉ with plural noun gives a collective sense.
    'Within all the mountains' preserves the cosmic, interior imagery rather than
    flattening it to a surface location.
