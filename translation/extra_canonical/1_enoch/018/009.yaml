theological_decisions:
- issue: Nature of the mountain-fire imagery
  chosen_reading: Retain the vision as literal-apocalyptic imagery of fire within
    the mountains, without allegorizing it into abstract judgment language.
  alternative_readings:
  - A generalized image of divine judgment
  - Volcanic or subterranean fire explained naturalistically
  rationale: The immediate context is visionary topography. The translation preserves
    the image as seen rather than interpreting it for the reader.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic vision into
    generic religious prose.
