theological_decisions:
- issue: Nature of the 'four' in the verse
  chosen_reading: The main text leaves 'those four' somewhat open, while the final
    clause identifies them functionally with four days not counted in the yearly reckoning.
  alternative_readings:
  - The four are heavenly leaders associated with the luminaries
  - The four are the intercalary days themselves
  - The four are both days and their angelic overseers in apocalyptic idiom
  rationale: The Ge'ez first refers to 'those four' without repeating 'days,' then
    concludes with 'four days that are not counted.' Because the Astronomical Book
    often links calendrical structures with heavenly officials, the translation preserves
    the ambiguity rather than collapsing it.
  doctrine_reference: Preserve theological tension rather than resolve it.
