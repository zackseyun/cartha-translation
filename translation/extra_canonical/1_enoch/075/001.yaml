translation:
  text: And the leaders of the heads of thousands, who are over all creation and over
    all the stars, together with those four that are added and do not separate from
    their service, according to the reckoning of the year—and these render service
    on the four days that are not counted in the reckoning of the year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are joined' instead of 'are added'; the Ge'ez can suggest attachment
      to the ordered system of the year.
    reason: lexical_alternative
  - marker: b
    text: The 'four days that are not counted' are the extra calendrical days associated
      with the turning points of the year in the Astronomical Book's 364-day scheme.
    reason: cultural_note
  - marker: c
    text: The verb rendered 'render service' is difficult and may also carry the sense
      of taking turns or alternating in function.
    reason: lexical_alternative
  - marker: d
    text: Or 'And their leaders, the chiefs of thousands'.
    reason: previous_rendering
  - marker: e
    text: Or 'together with those four, are added and do not separate'.
    reason: previous_rendering
lexical_decisions:
- source_word: መራሕያኒሆሙ
  chosen: their leaders
  alternatives:
  - their guides
  - those who lead them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Derived from the Ge'ez root for leading/guiding. 'Leaders' fits the administrative-cosmic
    context of luminary officials better than the more spatial 'guides'.
- source_word: አርእስተ አእላፍ
  chosen: the chiefs of thousands
  alternatives:
  - heads of thousands
  - captains of thousands
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'heads of thousands.' 'Chiefs of thousands' preserves the hierarchical
    sense without sounding overly military; the phrase likely denotes ranked heavenly
    officials.
- source_word: ዲበ ኵሉ ፍጥረት
  chosen: over all creation
  alternatives:
  - over every creature
  - over the whole creation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ፍጥረት commonly denotes creation or created order. In this astronomical
    context, 'all creation' best preserves the cosmic scope.
- source_word: ዲበ ኵሉ ከዋክብት
  chosen: over all the stars
  alternatives:
  - over every star
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of the plural noun for stars; the article
    in English helps natural readability while preserving the universal scope.
- source_word: ምስለ እሉ ፬
  chosen: together with those four
  alternatives:
  - with those four
  - along with those four
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase links the leaders/chiefs to a previously mentioned set of
    four intercalary entities or days. 'Together with' makes the association explicit.
- source_word: ይትዌሰኩ
  chosen: are added
  alternatives:
  - are joined
  - are inserted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense suggests addition or attachment. 'Are added'
    suits the calendrical context, where extra days are appended to the year.
- source_word: ኢይትሌለዩ እምነ ምግባሮሙ
  chosen: do not separate from their service
  alternatives:
  - do not depart from their work
  - are not removed from their function
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ምግባር can mean deed, work, conduct, or function. In the Astronomical Book,
    ordered heavenly operation is in view, so 'service' conveys assigned cosmic duty.
- source_word: በከመ ሐሳበ ዓመት
  chosen: according to the reckoning of the year
  alternatives:
  - according to the calculation of the year
  - by the account of the year
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is technical and calendrical. 'Reckoning' preserves that formal
    sense better than the more colloquial 'count'.
- source_word: ይትቀየዩ
  chosen: render service
  alternatives:
  - serve
  - take their turn
  - change
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult, since the root can suggest change/alternation.
    In context with the four extra days and heavenly duties, the sense appears to
    be functional participation or taking one's appointed role. 'Render service' preserves
    the duty aspect while avoiding overconfidence about a stricter sense of alternation.
- source_word: ፬ መዋዐለ እለ ኢይትኃሰቡ
  chosen: the four days that are not counted
  alternatives:
  - the four days that are not reckoned
  - the four days not included
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the key calendrical statement of the verse. 'Not counted' is
    clear English and preserves the technical exclusion of these four intercalary
    days from the ordinary yearly reckoning.
