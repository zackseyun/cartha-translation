lexical_decisions:
- source_word: ነፋሳት
  chosen: winds
  alternatives:
  - spirits
  - winds/breezes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term commonly refers to cosmic winds as
    created phenomena with portals or storehouses, so 'winds' preserves the meteorological-cosmic
    sense better than the more abstract 'spirits'.
- source_word: መንፈሰ
  chosen: spirit
  alternatives:
  - breath
  - wind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construct-like phrase with 'dew' is difficult. 'Spirit of dew' preserves
    the Ge'ez imagery without collapsing it into a purely physical paraphrase such
    as 'dew-wind.'
- source_word: ጠል
  chosen: dew
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward meteorological term; retained literally to preserve the
    cosmological cataloging of heavenly phenomena.
- source_word: ሶበ
  chosen: when
  alternatives:
  - at the time when
  - whenever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best taken as a temporal conjunction introducing the circumstance of
    the openings.
- source_word: ይትረኃዉ
  chosen: are opened
  alternatives:
  - open
  - are loosened
  - are released
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive/reflexive sense fits the image of heavenly apertures being
    opened. English passive keeps the focus on the openings rather than an implied
    opener.
- source_word: ርኅወተ
  chosen: openings
  alternatives:
  - windows
  - vents
  - gates
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term appears to denote apertures or openings in the sky. 'Openings'
    is broad and transparent, avoiding over-specification where the witness is uncertain.
- source_word: በሰማይ
  chosen: in the heavens
  alternatives:
  - in heaven
  - in the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Astronomical Book regularly depicts the cosmos in elevated, structured
    terms. 'In the heavens' preserves that register better than the flatter 'in the
    sky.'
- source_word: አጽናፈ
  chosen: the ends
  alternatives:
  - the extremities
  - the edges
  - the horizons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This likely refers to the extremities or boundaries of heaven. 'Ends'
    is concise and keeps the apocalyptic-cosmic geography intact.
