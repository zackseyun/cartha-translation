theological_decisions:
- issue: Nature of the celestial mechanism
  chosen_reading: Retain concrete cosmological imagery of solar chariots and openings
    rather than reducing the verse to a general statement about sunlight and weather.
  alternative_readings:
  - Interpret the language metaphorically as simple astronomical observation
  - Render the imagery as abstract 'movements' and 'influence'
  rationale: The Astronomical Book presents an ordered heavenly system through vivid
    apocalyptic cosmology. The translation should preserve that worldview and imagery
    rather than modernize it away.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    flatten cosmic imagery into generic modern prose.'
