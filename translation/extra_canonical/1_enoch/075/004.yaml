translation:
  text: 'And Uriel showed me another law: the courses of the chariots of the sun in
    the sky, from which its light goes out, and from which warmth comes forth upon
    the earth when they are opened in the seasons appointed for them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez word rendered 'light' is difficult and may more literally suggest
      'feet' or, by extension in context, something like the sun's outgoing rays or
      beams.
    reason: lexical_alternative
lexical_decisions:
- source_word: ከመዝ ፲ሥሩ ወካልእ
  chosen: another law
  alternatives:
  - a second ordinance
  - another regulation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase introduces an additional ordered rule within the astronomical
    system. 'Law' preserves the sense of fixed ordinance, while 'another' reflects
    the additive force of ወካልእ.
- source_word: ኃዋላወ
  chosen: courses
  alternatives:
  - circuits
  - revolutions
  - paths
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this luminary context the term refers to the ordered movements or
    circuits. 'Courses' is natural English for celestial movement and preserves the
    technical-apocalyptic tone.
- source_word: አርአየኒ
  chosen: showed me
  alternatives:
  - revealed to me
  - caused me to see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard visionary reporting verb. 'Showed me' is direct and fits the
    repeated Enochic disclosure formula.
- source_word: ርኅዋተ
  chosen: opened
  alternatives:
  - unsealed
  - made open
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb describes the opening of heavenly channels or apertures. 'Opened'
    keeps the concrete cosmological imagery rather than abstracting it.
- source_word: በአበበ ሰረገላት ፀሐይ
  chosen: the chariots of the sun
  alternatives:
  - the wagons of the sun
  - the carriages of the sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The imagery is explicitly vehicular and cosmic. 'Chariots' preserves
    the elevated apocalyptic register and avoids flattening the image into mere motion.
- source_word: እለ እምኔሆሙ ይወፅኡ እገሪሃ ለፀሐይ
  chosen: from which its light goes out
  alternatives:
  - from which the rays of the sun come forth
  - from which the feet/beams of the sun go out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The transmitted form እገሪሃ is difficult; literally it may suggest 'its
    feet,' but in context of solar emission a sense like rays or light is likely.
    'Its light' gives a readable rendering while acknowledging the lexical difficulty
    in a footnote.
- source_word: ሞቅ
  chosen: warmth
  alternatives:
  - heat
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Both are possible, but 'warmth' better suits the effect upon the earth
    in seasonal opening without overstating intensity.
- source_word: ዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward locative phrase; 'upon' fits the elevated style.
- source_word: ሶበ ይትረኃዉ
  chosen: when they are opened
  alternatives:
  - when they open
  - when these are opened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive-like sense fits the cosmological channels or portals being
    opened at set times.
- source_word: በአዝማን እለ እሙራን ሎሙ
  chosen: in the seasons appointed for them
  alternatives:
  - at the times fixed for them
  - in their designated seasons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase emphasizes divinely fixed temporal order. 'Appointed' preserves
    the sense of determination without over-interpreting agency.
