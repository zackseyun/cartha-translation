translation:
  text: 'For Uriel, the angel whom the Lord of glory appointed forever over all the luminaries of heaven in heaven and in the world, showed me concerning the signs and the seasons and the years and the days: how they rule over the face of heaven and are seen upon the earth, and become guides for day and for night—the sun and the moon and the stars and all the ministering powers that make their circuit in all the chariots of heaven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appointed times' for 'seasons.' The term can denote fixed divisions of time in a calendrical sense.
    reason: lexical_alternative
  - marker: b
    text: '''The face of heaven'' is a literal idiom for the visible expanse of the sky.'
    reason: cultural_note
  - marker: c
    text: '''Ministering powers'' is uncertain; it may refer to attendant heavenly orders or functions associated with the celestial bodies.'
    reason: lexical_alternative
  - marker: d
    text: '''Chariots of heaven'' may denote the ordered courses by which the heavenly bodies move, but the translation keeps the text''s imagery.'
    reason: lexical_alternative
  - marker: e
    text: Or 'whom the Lord of glory appointed over all the luminaries'.
    reason: previous_rendering
lexical_decisions:
- source_word: ትእምርት
  chosen: signs
  alternatives:
  - tokens
  - portents
  - markers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book the term refers to observable heavenly indicators used for reckoning, not necessarily ominous portents. 'Signs' preserves the calendrical/cosmic sense without overinterpreting.
- source_word: አዝማን
  chosen: seasons
  alternatives:
  - appointed times
  - times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural denotes divisions or set times in the cosmic order. 'Seasons' is natural English and fits the luminary context, while 'appointed times' remains a possible nuance.
- source_word: መዋዕል
  chosen: days
  alternatives:
  - periods
  - times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the sequence 'signs ... seasons ... years ... days,' the most straightforward rendering is 'days,' preserving the ordered temporal units.
- source_word: አርአየኒ
  chosen: showed me
  alternatives:
  - revealed to me
  - caused me to see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard visionary verb. 'Showed me' is clear, elevated, and faithful without adding interpretive weight.
- source_word: እግዚአ ስብሐት
  chosen: the Lord of glory
  alternatives:
  - the Lord of majesty
  - the Master of glory
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a divine title. 'Lord of glory' preserves the elevated apocalyptic register and the genitival force of the Ge'ez.
- source_word: ብርሃናት ሰማይ
  chosen: the luminaries of heaven
  alternatives:
  - the lights of heaven
  - the heavenly lights
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the referent is the heavenly bodies as ordered lights. 'Luminaries' best preserves the technical-cosmic sense.
- source_word: በሰማይ ወበዓለም
  chosen: in heaven and in the world
  alternatives:
  - in the sky and on earth
  - in heaven and in the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to distinguish the heavenly sphere from the inhabited/worldly sphere. 'In heaven and in the world' follows the Ge'ez closely while leaving the cosmological breadth intact.
- source_word: ይምልኩ
  chosen: they rule
  alternatives:
  - they exercise dominion
  - they reign
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys governing authority. 'Rule' is concise and preserves the cosmological governance motif of the luminaries.
- source_word: ገጸ ሰማይ
  chosen: the face of heaven
  alternatives:
  - the surface of heaven
  - the expanse of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A vivid idiom for the visible heavenly expanse. 'Face of heaven' preserves the imagery rather than flattening it.
- source_word: መራሕያነ
  chosen: guides
  alternatives:
  - leaders
  - governors
  - directors
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The luminaries function as directional or governing markers for time. 'Guides' captures their ordering role without overstating political dominion.
- source_word: ቅንየታት
  chosen: ministering powers
  alternatives:
  - attendants
  - orders
  - services
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is difficult in this context and likely refers to attendant heavenly entities or ordered functions associated with the celestial bodies. 'Ministering powers' preserves the apocalyptic-cosmic sense and avoids reducing the phrase to mere mechanics.
- source_word: የአውዱ
  chosen: make their circuit
  alternatives:
  - go around
  - travel in a circuit
  - encircle
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests circular movement or procession, fitting the astronomical context of heavenly courses.
- source_word: ሰረገላት ሰማይ
  chosen: the chariots of heaven
  alternatives:
  - the heavenly chariots
  - the celestial courses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The literal image of heavenly chariots is important apocalyptic imagery and should not be flattened into abstract 'orbits' in the main text.
