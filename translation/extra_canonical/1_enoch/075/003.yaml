theological_decisions:
- issue: Whether to render the luminaries' function in strongly personal/governing terms
  chosen_reading: 'Retain personal and ruling language: ''they rule ... and become guides'''
  alternative_readings:
  - Use impersonal astronomical language such as 'they move across the sky and mark day and night'
  rationale: The Ge'ez uses governance language and the Astronomical Book presents cosmic order in animated, divinely appointed terms. Preserving this avoids modern reductionism and keeps the apocalyptic worldview intact.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic imagery into generic modern prose.
- issue: How literally to render 'chariots of heaven'
  chosen_reading: Keep the literal image in the main text
  alternative_readings:
  - Interpret as 'courses of heaven' or 'orbits of heaven'
  rationale: Although the phrase likely relates to celestial courses, the text's own imagery is chariot-like and should remain visible. A clarifying footnote can preserve the possible functional sense without erasing the metaphor.
  doctrine_reference: Preserve theological tension and apocalyptic imagery rather than resolving it in the main text.
