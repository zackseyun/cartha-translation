theological_decisions:
- issue: Meaning of በጽድቅ in an astronomical context
  chosen_reading: Rendered as 'in righteousness' while allowing the sense of proper
    cosmic order.
  alternative_readings:
  - rightly
  - in proper order
  rationale: The Astronomical Book often presents cosmic regularity in moral-theological
    terms. Preserving 'righteousness' keeps that theological texture rather than reducing
    it to mere mechanics.
  doctrine_reference: Translation philosophy §Preserve theological tension rather
    than resolve it
- issue: Interpretation of the final clause about 364
  chosen_reading: Understood as the completion of the world's precise ordering in
    364 stations.
  alternative_readings:
  - completion of the year's reckoning in 364 days
  - completion of the world's calculation in 364 parts
  rationale: The Ge'ez wording is somewhat opaque, but the immediate context of luminary
    movements and the known 364-day Enochic schema support a rendering in terms of
    ordered stations. A footnote preserves the more explicit calendrical alternative.
  doctrine_reference: Translation philosophy §Original-language primacy over translation
    tradition
