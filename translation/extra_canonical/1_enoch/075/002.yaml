translation:
  text: 'And because of them people go astray among them, for these lights change
    their stations in righteousness: one in the first portal, and two in the third
    portal of heaven, and two in the fourth portal, and two in the sixth portal; and
    the careful ordering of the world is completed in three hundred and sixty-four
    stations of the world.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'people err because these lights shift their places rightly.' The line
      contrasts human misunderstanding with the ordered regularity of the luminaries.
    reason: lexical_alternative
  - marker: b
    text: The closing clause is difficult. It likely refers to the Enochic schematic
      year of 364 ordered positions or days; the Ge'ez wording speaks more literally
      of the world's precise ordering being completed in 364 'stations.'
    reason: alternative_reading
lexical_decisions:
- source_word: ወበእንቲአሆሙ
  chosen: And because of them
  alternatives:
  - and concerning them
  - and on account of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase most naturally gives causal force here. In context
    the verse explains why people err with respect to the luminaries.
- source_word: ይጌግዩ
  chosen: go astray
  alternatives:
  - err
  - wander
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'A verb of error or wandering fits the astronomical context: humans miscalculate
    or misunderstand because of the luminaries'' changing positions.'
- source_word: ሰብእ ቦሙ
  chosen: people ... among them
  alternatives:
  - men in them
  - human beings with them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሰብእ is rendered inclusively as 'people.' The phrase ቦሙ is difficult;
    'among them' preserves the locative relation without overinterpreting.
- source_word: እሙንቱ ብርሃናት
  chosen: these lights
  alternatives:
  - these luminaries
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The referent is the heavenly lights discussed throughout the Astronomical
    Book. 'Lights' is straightforward and readable; 'luminaries' is possible but slightly
    more technical.
- source_word: በጽድቅ
  chosen: in righteousness
  alternatives:
  - rightly
  - according to justice
  - in proper order
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text uses the standard righteousness/rightness term. In this cosmological
    setting it carries the sense of proper, ordered regularity, but the main text
    preserves the theological-cosmic term 'righteousness.'
- source_word: ይትቀየዩ
  chosen: change
  alternatives:
  - alter
  - shift
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates change or alternation of position. 'Change' is broad
    enough to cover the astronomical movement without forcing a technical reading.
- source_word: መንበረ ዓለም
  chosen: their stations
  alternatives:
  - their seats
  - their places
  - stations of the world
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the phrase involves 'seat/place' plus 'world/age.' In this
    context of luminaries moving through portals, 'stations' best conveys fixed appointed
    positions. The final occurrence is left more literally in order to reflect the
    repeated phrase.
- source_word: ቀዳሚ ኆኅት
  chosen: the first portal
  alternatives:
  - the first gate
  - the first opening
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Astronomical Book repeatedly uses portal/gate imagery for openings
    in heaven. 'Portal' preserves the apocalyptic register better than the more ordinary
    'gate'.
- source_word: ሣልስ ኆኅት
  chosen: the third portal
  alternatives:
  - the third gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Same portal terminology as elsewhere in the section; consistency matters.
- source_word: ራብዕ ኆኅት
  chosen: the fourth portal
  alternatives:
  - the fourth gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Same as above.
- source_word: ሳድስ ኆኅት
  chosen: the sixth portal
  alternatives:
  - the sixth gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Same as above.
- source_word: ይትፌጸም ጥንቃቄ ዓለም
  chosen: the careful ordering of the world is completed
  alternatives:
  - the reckoning of the world is completed
  - the exact arrangement of the world is fulfilled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult. ጥንቃቄ suggests carefulness, exactness, or precision.
    In the astronomical context this likely refers to the precise ordered reckoning
    of the cosmic year. 'Careful ordering' preserves both precision and cosmic order.
- source_word: ፻፷ወ፬ ወ፬
  chosen: three hundred and sixty-four
  alternatives:
  - '364'
  lexicon: Ge'ez numeral system
  rationale: The numeral is rendered in words for readability in running English.
    This matches the Enochic schematic year of 364 days/stations.
- source_word: መንበረ ዓለም
  chosen: stations of the world
  alternatives:
  - stations
  - places of the world
  - cosmic stations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: At the close of the verse the repeated phrase is retained more literally
    to show the textual repetition and its cosmological force.
