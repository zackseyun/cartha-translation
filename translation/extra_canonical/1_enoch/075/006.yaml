  from: Then there are twelve other openings
  to: When the twelve portals are opened
  rationale: 'The draft mistranslates three elements to force an independent existential
    clause: 1) ሶበ (soba) means ''when'', not ''then''. 2) ይትረኃዉ (yetraḫawu) is the
    passive/reflexive imperfect of ርኅወ (''to open'') and means ''are opened'', not
    ''there are''. 3) ፲ሥሩ ወካልእ (10 and 2) is the number ''twelve'' (referring to the
    6 eastern and 6 western portals of the Astronomical Book), not ''twelve other''.
    Additionally, rendering ኃዋላወ as ''portals'' avoids the awkwardness of ''when the
    openings are opened''. | Adjudicator: The reviewer''s rationale is entirely correct
    based on the Ge''ez text. The word ሶበ (soba) is a temporal conjunction meaning
    ''when'', not the adverb ''then''. The verb ይትረኃዉ (yetraḫawu) is the third-person'
