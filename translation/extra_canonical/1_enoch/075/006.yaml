lexical_decisions:
- source_word: ሶበ
  chosen: Then
  alternatives:
  - And then
  - At that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Functions here as a discourse-sequencing particle introducing the next
    item in the astronomical description rather than a strongly temporal 'when' clause
    in English.
- source_word: ይትረኃዉ
  chosen: there are
  alternatives:
  - are found
  - appear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form indicates existence/presence. English existential 'there are'
    best fits the catalog-like description of heavenly openings.
- source_word: ፲ሥሩ ወካልእ
  chosen: twelve other
  alternatives:
  - another twelve
  - twelve נוספים/extra
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase naturally means 'twelve and another/other,' i.e., an additional
    set of twelve beyond those already described in context.
- source_word: ኃዋላወ
  chosen: openings
  alternatives:
  - portals
  - windows
  - gates
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term refers to apertures or outlets in
    the structure of heaven. 'Openings' preserves the image without over-specifying
    architectural form.
- source_word: በሰማይ
  chosen: in heaven
  alternatives:
  - in the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the cosmological-apocalyptic setting, 'heaven' better preserves
    the text's cosmic register than the flatter 'sky.'
- source_word: ዲበ አጽናፈ ምድር
  chosen: at the ends of the earth
  alternatives:
  - upon the extremities of the earth
  - at the edges of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase denotes the extremities/borders of the earth in ancient cosmological
    imagery. 'Ends of the earth' is idiomatic and preserves the worldview.
- source_word: እለ እምኔሆሙ ይወፅእ
  chosen: from which ... come out
  alternatives:
  - from them ... go forth
  - out of which ... emerge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative construction links the openings with the heavenly bodies'
    emergence. 'Come out' is natural English and keeps the concrete motion.
- source_word: ፀሐይ ወወርኅ ወከዋክብት
  chosen: the sun and the moon and the stars
  alternatives:
  - sun, moon, and stars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated conjunctions are retained in substance to preserve the enumerative
    style of the source; articles are supplied for natural English.
