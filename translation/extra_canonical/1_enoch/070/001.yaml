translation:
  text: And it came to pass after this that his name was lifted up during his lifetime
    to that Son of Man and to the Lord of Spirits, away from those who dwell upon
    the dry ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'his name was lifted up.' The expression may refer to Enoch himself
      being taken up into the presence of the Son of Man and the Lord of Spirits while
      still alive.
    reason: lexical_alternative
  - marker: b
    text: Or 'from those who dwell on the earth.' The Ge'ez more specifically says
      'upon the dry ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ተለዓለ፡
  chosen: was lifted up
  alternatives:
  - was raised
  - was taken up
  - was exalted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes upward movement/elevation. 'Was lifted up' preserves
    the apocalyptic spatial imagery and leaves open whether the sense is assumption,
    exaltation, or both. 'Exalted' would over-interpret spiritually; 'taken up' is
    possible but more specific than the Ge'ez wording alone requires.
- source_word: ስሙ፡
  chosen: his name
  alternatives:
  - his renown
  - his person
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text says 'his name,' which in Semitic/Ethiopic idiom can stand closely
    for the person or identity. The main text keeps the literal expression for transparency,
    since the verse's strangeness may be intentional and should not be flattened into
    a mere paraphrase.
- source_word: ሕያው፡
  chosen: during his lifetime
  alternatives:
  - alive
  - living
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term marks that the event occurred while Enoch was still alive,
    not merely after death. 'During his lifetime' communicates the temporal force
    more idiomatically than the bare adjective 'alive' in English.
- source_word: በኀቤሁ፡ ለውእቱ፡ ወልደ፡ እጓለ፡ እመሕያው፡
  chosen: to that Son of Man
  alternatives:
  - into the presence of that Son of Man
  - beside that Son of Man
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase indicates movement toward or into the presence
    of the figure called 'that Son of Man.' 'To' is concise and natural, while still
    allowing the relational/presential nuance. The title is translated rather than
    paraphrased, in keeping with project philosophy and the local diction of the Parables.
- source_word: እግዚአ፡ መናፍስት፡
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established title within 1 Enoch. 'Lord of Spirits' preserves
    the solemn formula and avoids unnecessary smoothing.
- source_word: እምእለ፡ የኃድሩ፡ ዲበ፡ የብስ።
  chosen: away from those who dwell upon the dry ground
  alternatives:
  - from those who live on the earth
  - from the inhabitants of the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase contrasts Enoch's elevation with ordinary earth-dwellers.
    'Dry ground' reflects የብስ more literally than the generic 'earth,' preserving
    the concrete cosmological imagery of land-bound humanity.
