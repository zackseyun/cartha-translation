theological_decisions:
- issue: Whether 'his name was lifted up' should be rendered as a literal idiom or
    interpreted directly as Enoch himself being taken up
  chosen_reading: Retain the literal 'his name was lifted up' in the main text, with
    the implication of Enoch's own translation left implicit
  alternative_readings:
  - he was taken up alive
  - his renown was exalted
  rationale: The Ge'ez wording foregrounds 'his name,' and the verse belongs to a
    visionary-apocalyptic context where name and person can overlap. Rendering simply
    'he was taken up' would erase a significant textual feature; rendering 'his renown
    was exalted' would weaken the narrative movement toward the Son of Man and the
    Lord of Spirits.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: How to render the title ወልደ እጓለ እመሕያው
  chosen_reading: that Son of Man
  alternative_readings:
  - that son of man
  - that human one
  rationale: In the Parables this expression functions as a weighty apocalyptic title.
    Capitalizing 'Son of Man' signals titular force without importing later New Testament
    theology beyond the local context. The demonstrative 'that' reflects the Ge'ez
    and preserves the visionary specificity.
  doctrine_reference: Book context note 3; Translation philosophy §2
