translation:
  text: And he was taken up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic clause is extremely brief, consisting only of a conjunction
      and a passive verb meaning 'to be raised' or 'to go up.' 'Was taken up' is chosen
      to preserve the upward-motion imagery without overstating whether the action
      is bodily, visionary, or honorific.
    reason: lexical_alternative
lexical_decisions:
- source_word: ተለዓለ፡
  chosen: was taken up
  alternatives:
  - was lifted up
  - ascended
  - was exalted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive verbal form from the Ge'ez root meaning 'to go
    up, ascend, be raised' is best rendered here as 'was taken up,' which preserves
    both the upward movement and the implied passive force in this visionary context.
    'Ascended' could suggest a more active subject than the Ethiopic form warrants,
    while 'was exalted' would overread the verb into a status change rather than a
    spatial/visionary translation.
- source_word: ወ
  chosen: And
  alternatives:
  - Then
  lexicon: Ge'ez grammatical conjunction usage
  rationale: The conjunction is retained as 'And' to preserve the narrative sequence
    and apocalyptic style. 'Then' is possible, but 'And' is more formally transparent
    to the witness.
