theological_decisions:
- issue: Whether calendrical language should be rendered in a purely secular way
  chosen_reading: Retain 'festivals' alongside 'times' and 'months'
  alternative_readings:
  - Render all terms generically as 'seasons' or 'periods'
  rationale: The verse belongs to the Astronomical Book's concern with cosmic order
    as it relates to sacred timekeeping. Preserving 'festivals' keeps the priestly-calendrical
    dimension visible rather than flattening it into generic chronology.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not flatten apocalyptic imagery or cultic terminology.'
