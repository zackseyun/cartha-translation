translation:
  text: And this is the order of the stars, those that set in their places, and in
    their times, and in their festivals, and in their months.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stations' for 'places'; the Ge'ez can denote assigned locations within
      the ordered course of the stars.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in their festivals' reflects calendrical feast-times, not that
      the stars themselves celebrate; the verse links stellar order with the reckoning
      of sacred times.
    reason: cultural_note
lexical_decisions:
- source_word: ሥርዓተ
  chosen: order
  alternatives:
  - ordinance
  - arrangement
  - regulation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term denotes an ordered pattern or prescribed
    arrangement of celestial movements. 'Order' preserves both structure and regularity
    without sounding overly legalistic.
- source_word: ከዋክብት
  chosen: stars
  alternatives:
  - heavenly bodies
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plain referent is the stars. 'Heavenly bodies' would be broader than
    the Ge'ez term and would weaken the concrete astronomical imagery.
- source_word: የዐርቡ
  chosen: that set
  alternatives:
  - that enter
  - that go in
  - that descend
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this luminary context the verb most naturally refers to setting, i.e.,
    the stars' going down or entering at the horizon/gates. 'Set' is idiomatic English
    and fits the astronomical sequence.
- source_word: በመካናቲሆሙ
  chosen: in their places
  alternatives:
  - in their stations
  - in their locations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural with pronominal suffix points to assigned places or stations.
    'Places' is straightforward; 'stations' is possible but slightly more interpretive.
- source_word: በአዝማኒሆሙ
  chosen: in their times
  alternatives:
  - at their appointed times
  - in their seasons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes times or appointed periods. 'In their times' stays close
    to the wording while allowing the calendrical sense to remain implicit.
- source_word: በበዓላቲሆሙ
  chosen: in their festivals
  alternatives:
  - at their feast-times
  - in their appointed feasts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly refers to feasts or festivals. Because the Astronomical
    Book links celestial order to sacred calendrical observance, 'festivals' preserves
    that cultic-calendrical nuance.
- source_word: በአውራኂሆሙ
  chosen: in their months
  alternatives:
  - according to their months
  - in their lunar months
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word denotes months. The simple rendering is best; adding 'lunar'
    would go beyond the explicit wording of the verse.
