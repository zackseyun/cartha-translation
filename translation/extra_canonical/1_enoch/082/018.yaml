  - the sun
  rationale: In this context the luminaries and their leaders are being catalogued in a structured cosmic order. Capitalizing 'Sun' signals a named luminary without importing later theological personification.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic terminology into generic prose.
