  from: Hēlʾəmməlēk, whose name is called
  to: Helemmelek, whose name they call
  rationale: 'The Ge''ez is ሄልእምሜሌክ (Hēlʾəmmēlēk, with ሜ = mē, not mə). The draft''s transliteration contains a vowel error and is inconsistent with ''Helemmelek'' in verse 13. Additionally, the verb ይጼውዕዎ (yəṣēwwəʿəwo) is a third-person plural active verb with a 3ms object suffix (''they call him''); ''whose name they call'' preserves the active syntax of the source better than the passive ''is called''. | Adjudicator: The reviewer is correct on both counts. The Ge''ez verb ይጼውዕዎ (yəṣēwwəʿəwo) is a third-person plural imperfect active verb with a third-person masculine singular object suffix (''whom they call''), not a'
