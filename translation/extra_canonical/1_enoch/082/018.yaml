translation:
  text: The second leader after him is Helemmelek, whose name they call the Sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The naming formula is literal: ''whose name is called the Sun.'' English could also be smoothed to ''who is called the Sun.'''
    reason: lexical_alternative
  - marker: b
    text: The personal name Hēlʾəmməlēk is transliterated from the Ge'ez and its precise vocalization is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Or 'Hēlʾəmməlēk, whose name is called'.
    reason: previous_rendering
lexical_decisions:
- source_word: ካልእ
  chosen: the second
  alternatives:
  - another
  - a second one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal/adjectival use here introduces the next item in a sequence of luminary leaders; 'the second' fits the enumerative context better than the more indefinite 'another'.
- source_word: መራሒ
  chosen: leader
  alternatives:
  - guide
  - chief
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term functions for one who leads or governs a celestial course. 'Leader' preserves that governing sense without over-specifying rank.
- source_word: ዘድኅሬሁ
  chosen: after him
  alternatives:
  - behind him
  - following him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative phrase marks succession in the ordered list. 'After him' is idiomatic English and preserves the sequential sense.
- source_word: ሄልእምሜሌክ
  chosen: Hēlʾəmməlēk
  alternatives:
  - Hel'emmelek
  - Helimmelik
  lexicon: —
  rationale: Personal names are transliterated rather than translated per project philosophy. The exact vocalization is uncertain from Ge'ez alone, so a conservative transliteration is retained.
- source_word: ዘይጼውዕዎ ስሞ
  chosen: whose name is called
  alternatives:
  - who is called
  - the name of whom is called
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez explicitly includes 'his name'; retaining it keeps the formal naming formula visible rather than collapsing it into a smoother but less transparent English idiom.
- source_word: ፀሐየ
  chosen: the Sun
  alternatives:
  - Sun
  - sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the celestial body as a named luminary in an astronomical-apocalyptic register, so 'the Sun' preserves its quasi-titular force better than a bare lowercase noun.
