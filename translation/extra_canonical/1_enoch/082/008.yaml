translation:
  text: And he has authority by night and by day in heaven, so that they may give light upon humankind—the sun and the moon and the stars and all the powers of heaven, which return in their circuits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their courses.' The Ge'ez expression can denote recurring paths or ordered cycles of heavenly movement.
    reason: lexical_alternative
  - marker: b
    text: Or 'And authority over them is by night and by day in heaven'.
    reason: previous_rendering
lexical_decisions:
- source_word: ስልጣነ
  chosen: authority
  alternatives:
  - dominion
  - rule
  - power
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes governing power or jurisdiction. 'Authority' preserves the administrative/cosmic ordering sense in the Astronomical Book better than the broader 'power.'
- source_word: ቦቱ
  chosen: over them
  alternatives:
  - in them
  - with them
  - belongs to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context this pronominal phrase most naturally indicates authority exercised with reference to the heavenly luminaries previously under discussion. 'Over them' best fits the syntax and cosmic-governance theme.
- source_word: በሌሊት ወበመዓልት
  chosen: by night and by day
  alternatives:
  - at night and in the daytime
  - during night and day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward temporal pair; preserving the repeated preposition keeps the formal cadence of the source.
- source_word: ውስተ ሰማይ
  chosen: in heaven
  alternatives:
  - in the sky
  - within heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Astronomical Book speaks in cosmic-heavenly terms, not merely meteorological ones, so 'in heaven' is preferable to 'in the sky.'
- source_word: ከመ ያርኡ ብርሃነ
  chosen: so that they may give light
  alternatives:
  - that they may shine
  - so that they may show light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction expresses purpose. Although the verb can suggest appearing/showing, in context of luminaries illuminating the earth 'give light' communicates the function without flattening the imagery.
- source_word: ዲበ ሰብእ
  chosen: upon humankind
  alternatives:
  - upon mankind
  - over men
  - upon the children of men
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates those beneath the heavenly lights. 'Humankind' is clear modern English and preserves the collective human reference.
- source_word: ፀሐየ ወወርኀ ወከዋክብተ
  chosen: the sun and the moon and the stars
  alternatives:
  - sun and moon and stars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: These are the named heavenly luminaries. Including the articles in English gives a natural but still formal listing.
- source_word: ኵሎሙ ስልጣናት ሰማይ
  chosen: all the powers of heaven
  alternatives:
  - all the authorities of heaven
  - all the dominions of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural likely extends beyond the named luminaries to the ordered heavenly forces. 'Powers' is idiomatic and preserves the cosmic register; 'authorities' remains possible but is stiffer here.
- source_word: እለ ይትመየጡ
  chosen: which return
  alternatives:
  - which turn back
  - which revolve
  - which move back and forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests turning or returning. In the Astronomical Book, cyclical motion is central, so 'return' captures recurring movement while allowing the following phrase to specify the manner.
- source_word: በዓስቢሆሙ
  chosen: in their circuits
  alternatives:
  - in their courses
  - in their paths
  - according to their appointed order
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term points to a course, track, or cycle. 'Circuits' preserves the astronomical sense of recurring heavenly routes without overinterpreting as merely legal 'order.'
