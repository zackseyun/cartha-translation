theological_decisions:
- issue: Whether ስልጣናት ሰማይ refers to personal heavenly beings or impersonal cosmic forces
  chosen_reading: Rendered as 'the powers of heaven' in continuity with the luminaries and heavenly order described in this context.
  alternative_readings:
  - '''the authorities of heaven'' implying angelic or quasi-personal rulers'
  - '''the hosts of heaven'' as a broader celestial collective'
  rationale: In the Astronomical Book the emphasis is on ordered celestial operations. 'Powers of heaven' preserves the elevated cosmic sense without forcing a personal-angelic interpretation not explicit in this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
