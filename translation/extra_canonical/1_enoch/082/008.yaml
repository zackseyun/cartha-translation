  category: mistranslation
  tier: 3
  from: And authority over them is by night and by day in heaven
  to: And he has authority by night and by day in heaven
  rationale: 'The Ge''ez word ቦቱ (botu) consists of the preposition በ (ba) with a 3rd person masculine singular suffix, meaning ''in him'' or ''to him'' (idiomatically ''he has''). It refers back to the angel Uriel, who was given command in 82:7. The draft mistranslates this as a 3rd person plural (''over them''), which grammatically fails and obscures the explicit statement of Uriel''s authority over the heavenly cycles. | Adjudicator: The reviewer is entirely correct regarding the Ge''ez grammar. The word ቦቱ (botu) is formed from the preposition በ (ba) plus the third-person masculine singular suffix, literally meaning ''in him'' or ''t'
