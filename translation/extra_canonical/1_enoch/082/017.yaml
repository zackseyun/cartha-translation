theological_decisions:
- issue: Nature of the hierarchical titles in the luminary order
  chosen_reading: Render the terms as administrative-hierarchical language ('leaders,'
    'head of a thousand') rather than angelic interpretation in the main text.
  alternative_readings:
  - Treat them explicitly as angelic chiefs
  - Treat them as astronomical functionaries only
  rationale: The immediate verse lists ranked names within the Astronomical Book's
    ordered cosmic system, but the verse itself does not explicitly define them as
    angels here. The translation preserves the hierarchy without resolving the broader
    interpretive question.
  doctrine_reference: Preserve theological tension rather than resolve it.
