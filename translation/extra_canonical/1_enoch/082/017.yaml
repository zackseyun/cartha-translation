translation:
  text: 'And these are the names of the leaders who are under them: Berkael, Zelbesael,
    and another who is added as the head of a thousand, Helyaseph. And for this one
    the days of his dominion were completed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'another who is added as the head of a thousand' is
      textually awkward in the Ge'ez and may indicate an additional ranked official
      appended to the list.
    reason: textual_variant
  - marker: b
    text: Or 'the days of his authority were fulfilled.' The Ge'ez term can denote
      authority, dominion, or delegated power.
    reason: lexical_alternative
lexical_decisions:
- source_word: አስማቲሆሙ
  chosen: their names
  alternatives:
  - the names of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward plural possessive; retained in natural English as an
    introductory naming formula.
- source_word: መራሕያነ
  chosen: leaders
  alternatives:
  - guides
  - chiefs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes those who lead or direct. 'Leaders' is broad enough
    to fit the hierarchical astronomical context without over-specifying military
    or priestly rank.
- source_word: እለ መትሕቴሆሙ
  chosen: who are under them
  alternatives:
  - who are beneath them
  - who are subordinate to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks subordination within the ordered ranks of luminary officials.
    'Under them' preserves the hierarchical sense with readable English.
- source_word: ብርክኤል
  chosen: Berkael
  alternatives:
  - Barkael
  lexicon: —
  rationale: Personal name transliterated rather than translated, following project
    policy for names. 'Berkael' stays close to the Ge'ez consonantal shape.
- source_word: ዜልብስኤል
  chosen: Zelbesael
  alternatives:
  - Zelbesael
  - Zelbesa'el
  lexicon: —
  rationale: Personal name transliterated from the Ge'ez form. Exact vocalization
    is uncertain, so a conservative transliteration is preferred.
- source_word: ዘይትዌሰክ
  chosen: who is added
  alternatives:
  - who is appended
  - who is joined
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense suggests an additional figure inserted into
    the list or rank. 'Added' is the clearest idiomatic rendering.
- source_word: ርእሰ ፲፻
  chosen: the head of a thousand
  alternatives:
  - chief of a thousand
  - captain of a thousand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'head of a thousand.' The phrase likely denotes rank within
    a structured order. The more literal 'head of a thousand' preserves the formal
    register and avoids importing later military terminology.
- source_word: ሂሉያሴፍ
  chosen: Helyaseph
  alternatives:
  - Hilu yaseph
  - Helyasēph
  lexicon: —
  rationale: Personal name transliterated conservatively from the Ge'ez witness; uncertainty
    in vocalization is best handled by a close transliteration.
- source_word: ተፈጸመ መዋዕለ ስልጣኑ
  chosen: the days of his dominion were completed
  alternatives:
  - the days of his authority were fulfilled
  - his appointed period of rule came to an end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys completion/fulfillment, and ስልጣን denotes authority or
    dominion. 'Were completed' preserves the formal, calendrical tone of the Astronomical
    Book.
- source_word: ለዝ
  chosen: for this one
  alternatives:
  - for him
  - of this one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative/pronominal ending is somewhat awkward in English. 'For
    this one' keeps the deictic force, though the referent may be the last named figure.
