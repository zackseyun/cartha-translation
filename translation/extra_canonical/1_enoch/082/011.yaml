theological_decisions:
- issue: Nature of the celestial figures described
  chosen_reading: Render them as 'leaders,' 'heads,' and ordered functionaries without identifying them more specifically as angels in the main text.
  alternative_readings:
  - Interpret them explicitly as angelic beings
  - Interpret them as purely calendrical markers or abstract divisions
  rationale: The immediate verse presents a structured hierarchy tied to year, months, and days, but does not itself explicitly label each group as angels. To preserve the text's own level of specificity and apocalyptic texture, the translation keeps the administrative-cosmic terminology without resolving the ontology.
  doctrine_reference: Preserve theological tension rather than resolve it.
