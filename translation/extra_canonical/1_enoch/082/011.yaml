translation:
  text: And their four leaders enter first, those who divide the four parts of the year; and after them the twelve leaders of the orders, those who divide the months; and the three hundred and sixty-four heads of thousands, the ones who distinguish the days; and the four that are added with them, the leaders who distinguish the four divisions of the years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'quarters of the year.' The Ge'ez literally says 'four parts/divisions of the year.'
    reason: lexical_alternative
  - marker: b
    text: The number 'three hundred and sixty-four' reflects the schematic 364-day calendar used in the Astronomical Book.
    reason: cultural_note
  - marker: c
    text: The phrase 'distinguish the days' may also be understood as 'mark out' or 'determine' the days.
    reason: lexical_alternative
  - marker: d
    text: Or 'And the four leaders enter first'.
    reason: previous_rendering
  - marker: e
    text: Or 'and the three hundred and sixty-four heads, the ones who distinguish the days'.
    reason: previous_rendering
  - marker: f
    text: Or 'those that distinguish the four divisions of the years'.
    reason: previous_rendering
lexical_decisions:
- source_word: መራሕያኒሆሙ
  chosen: their leaders
  alternatives:
  - their guides
  - their chiefs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the Ge'ez root for leading/guiding. In this astronomical-administrative context, 'leaders' fits the hierarchical ordering better than the more physical 'guides'.
- source_word: ይበውኡ
  chosen: enter
  alternatives:
  - go in
  - come in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion verb. 'Enter' preserves the formal sequence of celestial functionaries coming in according to order.
- source_word: ቀዳሚ
  chosen: first
  alternatives:
  - at first
  - beforehand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks sequence in the procession/order being described.
- source_word: ይሌልዩ
  chosen: divide
  alternatives:
  - separate
  - apportion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is calendrical partitioning. 'Divide' is the clearest English equivalent and matches the repeated structural language of the verse.
- source_word: ክፍለ ዓመት
  chosen: parts of the year
  alternatives:
  - divisions of the year
  - quarters of the year
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'parts/divisions of the year.' I avoid 'quarters' in the main text because the verse itself already says 'four parts,' making the number explicit without requiring the idiom.
- source_word: ፲ወ፪ መራሕያን
  chosen: the twelve leaders
  alternatives:
  - twelve guides
  - twelve chiefs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Parallel to the first phrase; keeping 'leaders' preserves consistency across repeated terminology.
- source_word: ዘሥርዓታት
  chosen: of the orders
  alternatives:
  - of the arrangements
  - of the courses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes ordered arrangement or prescribed sequence. 'Orders' preserves the structured, almost liturgical-cosmic sense without overinterpreting.
- source_word: ለአውራኅ
  chosen: the months
  alternatives:
  - for the months
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Object marker plus 'months'; English idiom prefers direct object wording here.
- source_word: ፲፻ወ፷፬ አርእስት
  chosen: the three hundred and sixty-four heads
  alternatives:
  - the 364 chiefs
  - the 364 overseers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'heads.' Because the verse is highly schematic and administrative, 'heads' preserves the metaphor and avoids prematurely interpreting the role.
- source_word: ይፈልጥዎሙ ለመዋዕል
  chosen: distinguish the days
  alternatives:
  - mark out the days
  - determine the days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can carry the sense of distinguishing, discerning, or making known. In calendrical context, 'distinguish' best matches the repeated classification function.
- source_word: ይትዌሰኩ ምስሌሆሙ
  chosen: are added with them
  alternatives:
  - are joined with them
  - are associated with them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates an additional group attached to the previously named officials. 'Are added with them' preserves that supplementary sense.
- source_word: ፬ መክፈልተ ዓመታት
  chosen: the four divisions of the years
  alternatives:
  - the four parts of the years
  - the four seasonal divisions of the year
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural 'years' is retained from the Ge'ez, though English may expect singular. 'Divisions' matches the repeated partitioning language and keeps the calendrical framework visible.
