translation:
  text: 'And these are the signs of the days that appear on the earth in the days
    of his dominion: heat and warmth and calm; and all the trees bear fruit, and leaves
    come forth on all the trees, and the harvest of wheat, and the blossoming of the
    rose, and every flower that comes forth in the field; but the trees of winter
    dry up.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are shown on the earth'; the Ge'ez verb has a showing/appearing sense.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in the days of his dominion' likely refers to the ruling period
      of the luminary under discussion in the surrounding context, but the verse itself
      leaves the pronoun implicit.
    reason: cross_reference
  - marker: c
    text: The term rendered 'calm' is uncertain; it may denote a pleasant or gentle
      climatic condition.
    reason: lexical_alternative
  - marker: d
    text: The word rendered 'field' can elsewhere mean wilderness or open country;
      here the vegetation imagery favors 'field.'
    reason: lexical_alternative
  - marker: e
    text: The plant name rendered 'rose' is a traditional identification and may refer
      more broadly to a flowering plant.
    reason: lexical_alternative
lexical_decisions:
- source_word: ትእምርተ
  chosen: signs
  alternatives:
  - tokens
  - indications
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes observable markers or indications. 'Signs' fits the
    astronomical-calendrical context, where visible phenomena mark times and seasons.
- source_word: መዋዕለ
  chosen: days
  alternatives:
  - times
  - seasons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'days,' though in context it can shade toward periods or seasons.
    Retained as 'days' to preserve the text's temporal concreteness while the surrounding
    phrases clarify seasonal reference.
- source_word: ያስተርእዩ
  chosen: appear
  alternatives:
  - are shown
  - become visible
  - manifest themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is causative/showing language, but idiomatic English here is
    best expressed as phenomena that 'appear' on the earth. This keeps the observational
    tone without awkward passives.
- source_word: ስልጣኑ
  chosen: his dominion
  alternatives:
  - his authority
  - his rule
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes rule or authority. 'Dominion' preserves the elevated
    register and the sense of an ordered sphere of power, suitable in this cosmological
    context.
- source_word: ሀፍ
  chosen: heat
  alternatives:
  - hot season
  - burning heat
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as 'heat' as a straightforward climatic sign. The exact nuance
    may be seasonal rather than merely momentary temperature, but 'heat' is the least
    interpretive choice.
- source_word: ሞቅ
  chosen: warmth
  alternatives:
  - mildness
  - temperate warmth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with 'heat,' this likely marks a related but distinct climatic
    condition. 'Warmth' preserves the distinction rather than collapsing both terms
    into one English gloss.
- source_word: ዛሕን
  chosen: calm
  alternatives:
  - gentleness
  - serenity
  - pleasant weather
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is somewhat uncertain in this context; 'calm' best fits a sequence
    of favorable seasonal conditions without over-specifying wind or mood.
- source_word: ዕፀው
  chosen: trees
  alternatives:
  - wooded plants
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common term for trees/wood-plants. 'Trees' is the natural English equivalent
    in this agricultural description.
- source_word: ይፈርዩ
  chosen: bear fruit
  alternatives:
  - be fruitful
  - produce fruit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb refers to fruit production. 'Bear fruit' is idiomatic and concrete
    in an agricultural setting.
- source_word: ቈጽል
  chosen: leaves
  alternatives:
  - foliage
  - leafage
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is botanical growth on trees. 'Leaves' is the plain and accurate
    rendering.
- source_word: ይወጽእ
  chosen: come forth
  alternatives:
  - sprout
  - emerge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A repeated verb of emergence. 'Come forth' preserves the elevated style
    and the text's repetitive cadence.
- source_word: ማእረረ ስርናይ
  chosen: the harvest of wheat
  alternatives:
  - the ripening of wheat
  - the wheat crop
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the produce or yield of wheat. 'Harvest of wheat'
    best conveys an agricultural stage or result in context.
- source_word: ጽጌ ረዳ
  chosen: the blossoming of the rose
  alternatives:
  - the flower of the rose
  - the blooming of a rosebush
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plant term is traditionally understood as 'rose,' though exact species
    identification is uncertain. 'Blossoming of the rose' preserves the poetic-botanical
    imagery.
- source_word: ጽጌያት
  chosen: flower
  alternatives:
  - blossom
  - bloom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered collectively as 'every flower' to match the singular distributive
    sense with the following relative clause.
- source_word: ገዳም
  chosen: field
  alternatives:
  - open country
  - wilderness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although often 'desert' or 'wilderness,' here the agricultural and floral
    context favors 'field' or open land where plants spring up. 'Field' best suits
    the immediate imagery.
- source_word: ዕፀወ ክረምት
  chosen: the trees of winter
  alternatives:
  - winter trees
  - trees in winter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A genitival phrase contrasting with the flourishing vegetation just described.
    'The trees of winter' preserves the literal form and the seasonal contrast.
- source_word: ይየብሱ
  chosen: dry up
  alternatives:
  - wither
  - become dry
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes drying or withering. 'Dry up' is vivid and natural,
    and it preserves the contrast with fruiting and blossoming.
