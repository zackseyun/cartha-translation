translation:
  text: 'For they belong to the reckoning of the year, and they are truly appointed
    forever: one in the first gate, one in the third gate, one in the fourth, and
    one in the sixth; and the year is completed in three hundred and sixty-four days.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The repeated 'one ... one ... one ... one' refers to the four additional
      days distributed among the solar quarters in the Enochic 364-day calendar.
    reason: cultural_note
  - marker: b
    text: The OCR line appears to omit 'gate' after 'fourth' and 'sixth,' but the
      sequence strongly implies the same noun throughout.
    reason: textual_variant
lexical_decisions:
- source_word: እስመ
  chosen: For
  alternatives:
  - because
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the explanatory ground for the preceding statement; 'For'
    preserves the connective force in elevated but readable English.
- source_word: ሀለዉ
  chosen: they belong
  alternatives:
  - they exist
  - they are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with በሐሳበ፡ ዓመት, the sense is not mere existence but inclusion
    within or belonging to the annual calculation.
- source_word: በሐሳበ፡ ዓመት
  chosen: to the reckoning of the year
  alternatives:
  - in the calculation of the year
  - in the account of the year
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሐሳብ here denotes calculation/reckoning rather than abstract thought;
    'reckoning' fits the Astronomical Book's calendrical register.
- source_word: ወአማን
  chosen: and they are truly
  alternatives:
  - and truly
  - and indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the emphatic affirmation without overloading the sentence; the
    adverb underscores the reliability of the calendrical arrangement.
- source_word: ልኩዓን
  chosen: appointed
  alternatives:
  - fixed
  - ordained
  - set in order
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term points to something set or ordered in proper measure. 'Appointed'
    preserves both fixity and ordered assignment in the luminary schema.
- source_word: እሙንቱ፡ ለዓለም
  chosen: forever
  alternatives:
  - for eternity
  - for all time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks enduring permanence of the arrangement. 'Forever' is
    concise and natural while preserving the text's claim of lasting order.
- source_word: አሐቲ
  chosen: one
  alternatives:
  - a single one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repeated distributively before each gate; preserving the repetition reflects
    the measured structure of the verse.
- source_word: በቀዳሚት፡ ኆኅት
  chosen: in the first gate
  alternatives:
  - through the first gate
  - at the first gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can be rendered several ways, but 'in' best matches the
    list structure here and avoids over-specifying motion where the verse stresses
    placement within the calendrical system.
- source_word: በሣልስት፡ ኆኅት
  chosen: in the third gate
  alternatives:
  - through the third gate
  - at the third gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Same distributive gate formula as above; consistency is important in
    this technical astronomical context.
- source_word: በራብዕት
  chosen: in the fourth
  alternatives:
  - in the fourth gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although ኆኅት is not repeated in this clause in the OCR line, the sense
    clearly continues the gate sequence. English supplies 'gate' only once earlier
    and then ellipses it naturally in the list.
- source_word: በሳድስት
  chosen: in the sixth
  alternatives:
  - in the sixth gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Continues the same distributive sequence of gate assignments; the omitted
    noun is understood from the prior clauses.
- source_word: ወይትፌጸም፡ ዓመተ፡ መዋዕል
  chosen: and the year is completed
  alternatives:
  - and the year comes to completion
  - and the annual cycle is finished
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive-like verbal sense indicates completion of the yearly cycle.
    'The year is completed' is direct and preserves the calendrical emphasis.
- source_word: ፫፻ወ፷ወረቡዕ
  chosen: three hundred and sixty-four days
  alternatives:
  - 364 days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral explicitly states the ideal Enochic year. Spelling it out
    suits the formal register and highlights the theological-astronomical precision
    of the system.
