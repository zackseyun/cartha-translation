translation:
  text: 'And these are the names of those who lead them: those who keep watch and
    go in at their appointed times, those who lead them in their stations and in their
    orders and in their times and in their months and in their authorities and in
    their positions.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guide them.' The Ge'ez verb can denote leading or directing.
    reason: lexical_alternative
  - marker: b
    text: The repeated temporal and positional terms are kept distinct in English
      ('appointed times,' 'times,' 'months') to preserve the verse's catalog of ordered
      celestial regulation.
    reason: lexical_alternative
lexical_decisions:
- source_word: አስማቲሆሙ
  chosen: the names of them / the names of those
  alternatives:
  - their names
  - the names
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural noun with pronominal suffix; introduces a list or identification
    formula. English supplies 'those' for clarity.
- source_word: ይመርኅዎሙ
  chosen: lead them
  alternatives:
  - guide them
  - direct them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes leading or guiding. 'Lead' preserves the administrative/cosmic
    sense without over-interpreting as merely physical guidance.
- source_word: የዐቅቡ
  chosen: keep watch
  alternatives:
  - guard
  - observe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book the sense is not simple guarding but watchful
    oversight of celestial order. 'Keep watch' preserves the vigilant, ordered nuance.
- source_word: ይበውኡ
  chosen: go in
  alternatives:
  - enter
  - come in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion verb. 'Go in' fits the luminary context of entering
    appointed gates or phases without importing details not explicit in this verse.
- source_word: በአዝማነ ዚአሆሙ
  chosen: at their appointed times
  alternatives:
  - in their seasons
  - in their set times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase refers to fixed temporal appointments in the ordered calendar.
    'Appointed times' best conveys regulated, prescribed timing.
- source_word: በመካናቲሆሙ
  chosen: in their stations
  alternatives:
  - in their places
  - in their locations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: More than generic place, this likely denotes assigned positions within
    the cosmic order. 'Stations' preserves that ordered, functional sense.
- source_word: በሥርዓታቲሆሙ
  chosen: in their orders
  alternatives:
  - according to their ordinances
  - in their arrangements
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote order, arrangement, rule, or ordinance. Here 'orders'
    fits the repeated catalog of structured celestial regulation.
- source_word: በጊዜያቲሆሙ
  chosen: in their times
  alternatives:
  - in their seasons
  - at their periods
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Distinct from the earlier phrase for appointed times, this likely continues
    the list of temporal divisions. 'Times' keeps the repetition visible rather than
    collapsing terms.
- source_word: በአውራኂሆሙ
  chosen: in their months
  alternatives:
  - by their months
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term refers to months; in this calendrical context it should be rendered
    plainly and concretely.
- source_word: በስልጣናቲሆሙ
  chosen: in their authorities
  alternatives:
  - in their dominions
  - in their powers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote authority, dominion, or power. 'Authorities' preserves
    the delegated-rule nuance appropriate to angelic/cosmic administration.
- source_word: በምቅዋማቲሆሙ
  chosen: in their positions
  alternatives:
  - in their standings
  - in their fixed places
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely denotes standing-place or fixed position. 'Positions' is clear
    English and suits the cumulative list of ordered placements.
