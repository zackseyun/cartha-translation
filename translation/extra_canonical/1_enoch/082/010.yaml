theological_decisions:
- issue: Whether the verse describes named angelic leaders of celestial bodies or
    the luminaries themselves
  chosen_reading: The verse is rendered to describe named beings who lead and supervise
    the luminaries or calendrical motions.
  alternative_readings:
  - The names could refer directly to the luminaries' own designations rather than
    supervising beings.
  rationale: The repeated 'those who lead them' and the catalog of stations, orders,
    times, months, authorities, and positions strongly suggest supervisory agents
    within the Astronomical Book's cosmic administration.
  doctrine_reference: Preserve apocalyptic imagery and local passage logic rather
    than flattening into generic astronomical description.
