lexical_decisions:
- source_word: ጥበበ
  chosen: wisdom
  alternatives:
  - understanding
  - skill
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun plainly denotes wisdom/understanding. 'Wisdom' best fits the
    instructional and transmissional context of the Astronomical Book and preserves
    the elevated register.
- source_word: ወሀብኩ
  chosen: I have given
  alternatives:
  - I gave
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The perfective sense can be rendered as simple past, but 'I have given'
    preserves the present relevance of the gift in the discourse.
- source_word: ወለውሉድከ
  chosen: and to your children
  alternatives:
  - and to your offspring
  - and to your sons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural of 'child/offspring' is best rendered broadly as 'children'
    here, since the next clause extends the line to later descendants.
- source_word: '[ወለእለ፡ ይከውኑ፡ ለከ፡ ውሉደ፡]'
  chosen: and to those who shall be your children
  alternatives:
  - and to those who will be born to you
  - and to your future descendants
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bracketed phrase appears to refer to future descendants. I kept the
    wording relatively close to the Ge'ez while making the sense intelligible. Because
    the phrase is textually uncertain/bracketed, a footnote is warranted.
- source_word: ከመ፡ የሀቡ፡
  chosen: so that they may give
  alternatives:
  - that they might hand on
  - in order that they may give
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'This expresses purpose: the wisdom is given to one generation so it
    may be passed to the next.'
- source_word: ለትውልዳት
  chosen: through the generations
  alternatives:
  - to generations
  - for generations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural denotes successive generations. 'Through the generations'
    captures the ongoing transmission more naturally in English.
- source_word: ዲበ፡ ሕሊናሆሙ
  chosen: upon their thought
  alternatives:
  - in their minds
  - upon their understanding
  - in their hearts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሕሊና commonly refers to thought, mind, or understanding. I retained the
    somewhat literal 'upon their thought' to reflect the Ge'ez preposition and preserve
    the text's elevated, slightly unusual diction, while acknowledging 'in their minds'
    as a smoother alternative.
