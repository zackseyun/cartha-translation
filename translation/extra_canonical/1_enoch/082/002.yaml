theological_decisions:
- issue: Nature of the gift being transmitted
  chosen_reading: The verse speaks of wisdom as a divinely given body of understanding
    to be handed down across descendants, not merely generic intelligence.
  alternative_readings:
  - general practical knowledge
  - astronomical instruction specifically
  rationale: Within the Book of the Luminaries, 'wisdom' likely includes the revealed
    calendrical/astronomical instruction, but the verse itself uses the broader term
    'wisdom.' The translation keeps the broader wording and lets context specify its
    content.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
