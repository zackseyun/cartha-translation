theological_decisions:
- issue: Referent of the repeated plural pronouns
  chosen_reading: The pronouns refer to the heavenly lights or their appointed times/seasons discussed in the surrounding context.
  alternative_readings:
  - the heavenly laws/ordinances
  - the calendar divisions more abstractly
  rationale: The Astronomical Book is concerned with the luminaries and their ordered courses. The verse warns that people err by failing to reckon these properly. The English leaves the pronouns as 'them' rather than specifying a referent not explicit in the Ge'ez.
  doctrine_reference: Preserve ambiguity where the source is genuinely open; do not resolve beyond the text.
