lexical_decisions:
- source_word: በእንቲአሆሙ
  chosen: because of them
  alternatives:
  - concerning them
  - on account of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase most naturally gives cause or occasion here. In context of calendrical error, 'because of them' fits the explanatory force better than the more neutral 'concerning them'.
- source_word: ይጌግዩ
  chosen: go astray
  alternatives:
  - err
  - wander
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys error or straying. 'Go astray' preserves both cognitive and path imagery appropriate to the Astronomical Book.
- source_word: ኢየኀስብዎሙ
  chosen: do not reckon them
  alternatives:
  - do not count them
  - do not consider them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this calendrical context, a verb of reckoning/counting is likely primary, though mental consideration is also possible. 'Reckon' preserves both numerical and reflective nuance.
- source_word: ተበሐሳቤ
  chosen: in the thought
  alternatives:
  - in the reckoning
  - in the calculation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult, but appears related to thought/accounting. 'In the thought' is a cautious rendering that keeps the mental-calculative overlap without overcommitting to a technical astronomical term.
- source_word: ኵሉ ዓለም
  chosen: of all the world
  alternatives:
  - of the whole world
  - among all the world
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is broad and collective. 'Of all the world' preserves the universal scope while remaining readable.
- source_word: ይጌግይዎሙ
  chosen: they lead them astray
  alternatives:
  - they cause them to err
  - they mislead them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The causative nuance is stronger here than in the earlier intransitive form. 'Lead them astray' preserves the repeated root while marking the shift in agency.
- source_word: ኢያእምርዎሙ
  chosen: do not know them
  alternatives:
  - do not recognize them
  - do not understand them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the common term for knowing. In context it may imply recognition or proper understanding of the luminaries/times; 'know' keeps the wording broad.
- source_word: ጥንቁቀ
  chosen: exactly
  alternatives:
  - carefully
  - precisely
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This adverb/adjectival form suggests carefulness or precision. Since the clause concerns proper knowledge of calendrical matters, 'exactly' brings out the precision implied.
