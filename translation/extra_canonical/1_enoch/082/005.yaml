translation:
  text: Because of them, people go astray and do not reckon them in the reckoning of all the world; for people err concerning them and do not know them exactly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording in the middle of the verse is difficult. The phrase rendered 'in the thought of all the world' may also mean 'in the reckoning/calculation of the whole world.'
    reason: lexical_alternative
  - marker: b
    text: The final word may carry the sense 'carefully' or 'precisely'; thus, 'people do not know them carefully/precisely.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for they lead them astray, and people do not know them exactly.'.
    reason: previous_rendering
