theological_decisions:
- issue: Nature of the named figures
  chosen_reading: heavenly leaders overseeing calendrical divisions
  alternative_readings:
  - astronomical markers personified
  - angelic chiefs of the seasons
  rationale: Within the Book of the Luminaries, named figures commonly function as
    cosmic officials. 'Leaders' preserves this without forcing a more developed angelology
    into the main text.
  doctrine_reference: Preserve apocalyptic imagery and local passage sense; do not
    over-harmonize with later tradition.
