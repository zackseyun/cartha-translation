translation:
  text: 'And these are the names of the leaders who divide the four parts of the year,
    who are appointed: Milkiel, Helemmelek, Meleyal, and Narel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the four divisions of the year'; the Ge'ez expression is literally 'the
      four parts of the year.'
    reason: lexical_alternative
  - marker: b
    text: The second and third names are difficult in this OCR witness; the English
      transliterations follow the Ge'ez forms conservatively rather than reconstructing
      a more familiar spelling.
    reason: textual_variant
lexical_decisions:
- source_word: አስማቲሆሙ
  chosen: their names
  alternatives:
  - the names of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward plural possessive; rendered idiomatically in English
    within the presentational formula 'these are the names.'
- source_word: መራሕያያን
  chosen: leaders
  alternatives:
  - guides
  - chiefs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Derived from the verb 'to lead/guide.' In the Astronomical Book this
    refers to named heavenly officials governing calendrical divisions, so 'leaders'
    preserves authority without over-specifying rank.
- source_word: ይፈልጡ
  chosen: divide
  alternatives:
  - separate
  - apportion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes separating or dividing. Because the object is 'the four
    parts of the year,' 'divide' best fits the calendrical context.
- source_word: ፬መክፈልተ ዓመት
  chosen: the four parts of the year
  alternatives:
  - the four divisions of the year
  - the four quarters of the year
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'four divisions/parts of the year.' 'Parts' stays close to
    the Ge'ez; 'quarters' is possible but slightly more interpretive and modernized.
- source_word: ሥሩዓን
  chosen: appointed
  alternatives:
  - ordained
  - set in order
  - established
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This adjective/passive participial form conveys being arranged, assigned,
    or appointed. 'Appointed' fits the administrative-cosmic setting of heavenly officials.
- source_word: ሚልኪኤል
  chosen: Milkiel
  alternatives:
  - Malkiel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal names are transliterated rather than translated. 'Milkiel' follows
    the consonantal shape of the Ge'ez witness more closely than a normalized Semitic
    reconstruction.
- source_word: ህልእምሜሌክ
  chosen: Helemmelek
  alternatives:
  - Hel'emmelek
  - Hellemmelek
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The name is textually awkward in OCR and likely difficult in the Ethiopic
    tradition. A conservative transliteration is preferred, with uncertainty noted
    in a footnote rather than silently normalizing.
- source_word: ሜሌአየል
  chosen: Meleyal
  alternatives:
  - Mele'eyal
  - Meleael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered by conservative transliteration from the Ge'ez form. The medial
    vowel sequence is not fully certain from the OCR witness, so a close but readable
    form is chosen.
- source_word: ናሬል
  chosen: Narel
  alternatives:
  - Nar'el
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple transliteration of the final proper name from the Ethiopic witness.
