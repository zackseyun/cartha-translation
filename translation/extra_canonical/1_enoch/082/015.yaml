translation:
  text: At the beginning of the year, Melkiyal rises first and rules, whose name is called Tam'ade'eni and the sun; and all the days of his dominion, while he rules, are ninety-one days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause after 'Melkiyal' is textually difficult. The Ge'ez appears to give an additional name or designation, here transliterated as Tam'ade'eni rather than translated speculatively.
    reason: textual_variant
  - marker: b
    text: The verse treats the opening segment of the year as a personified period under Melkiyal's rule, totaling ninety-one days.
    reason: cultural_note
  - marker: c
    text: Or "the first, Melkiyal rises and rules—the one whose name is Tam'ade'eni—and the sun and all the days of his dominion, while he rules, are ninety-one days.".
    reason: previous_rendering
