theological_decisions:
- issue: Personification of calendrical order
  chosen_reading: Retain 'rules' and 'dominion' language for Melkiyal rather than reducing it to a neutral calendrical marker.
  alternative_readings:
  - presides over
  - marks
  - governs the season
  rationale: The Astronomical Book presents cosmic order through named heavenly figures exercising allotted authority. Preserving this diction maintains the apocalyptic worldview without importing later angelology.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic imagery into generic modern prose.
