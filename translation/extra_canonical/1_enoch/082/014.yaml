translation:
  text: And the names of those who lead them are Adnarel, Iyasusael, and Elomeel. These three follow after the leaders of the orders, and there is one that follows after the three leaders of the orders, which follow after those leaders of the fixed stations, who divide the four parts of the year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the four divisions of the year'; the phrase refers to the calendrical partition of the year in the Astronomical Book.
    reason: lexical_alternative
  - marker: b
    text: The syntax of the middle clauses is difficult, with repeated 'follow after' and multiple groups of leaders. The translation preserves the sequence of the Ge'ez rather than smoothing it into a fully resolved hierarchy.
    reason: textual_variant
  - marker: c
    text: Or 'and there are two that follow after the leaders of the orders'.
    reason: previous_rendering
lexical_decisions:
- source_word: አስማቲሆሙ
  chosen: the names of them
  alternatives:
  - their names
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural noun with pronominal suffix; rendered idiomatically as 'the names of those...' to introduce the list of angelic names.
- source_word: ይመርሃዎሙ
  chosen: lead them
  alternatives:
  - guide them
  - direct them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verb of leading/guiding. 'Lead' preserves the hierarchical and ordered movement of the luminaries without over-interpreting as merely instructional guidance.
- source_word: ይተልዉ
  chosen: follow after
  alternatives:
  - come after
  - are behind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repeated verb indicating sequence or following in ordered procession. 'Follow after' preserves the repetitive structure and astronomical ordering.
- source_word: መራሕያነ
  chosen: leaders
  alternatives:
  - guides
  - chiefs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Derived from a root of leading. 'Leaders' fits the celestial-administrative context better than the softer 'guides'.
- source_word: ሥርዓታት
  chosen: orders
  alternatives:
  - arrangements
  - ordinances
  - courses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term denotes structured arrangements or ordered systems. 'Orders' preserves the formal, cosmic sense without sounding overly technical.
- source_word: ምቅዋማት
  chosen: fixed stations
  alternatives:
  - positions
  - standings
  - appointed places
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun suggests standing places or established positions. 'Fixed stations' suits the astronomical context and preserves the image of stable celestial placements.
- source_word: ይፈልጡ
  chosen: divide
  alternatives:
  - separate
  - apportion
  - distinguish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is partitioning or distinguishing. 'Divide' best matches the object 'the four parts of the year' in calendrical context.
- source_word: ክፍለ ለዓመት
  chosen: the four parts of the year
  alternatives:
  - the four divisions of the year
  - the four quarters of the year
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the divisions/parts of the year. 'Parts' is transparent and avoids importing a more modern technical term unless footnoted.
