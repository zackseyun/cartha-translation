theological_decisions:
- issue: Scope of transmission in ለትውልደ፡ ዓለም
  chosen_reading: to the generations of the world
  alternative_readings:
  - to all generations forever
  - to the generations of eternity
  rationale: The Ge'ez phrase can point either to the world's generations or to enduring
    generations through time. The chosen reading preserves the literal world/age language
    and leaves the universal-diachronic scope intact without theological expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
