translation:
  text: And now, my son Methuselah, I tell you all these things, and I write them
    down for you, and I have revealed them all to you, and I have given you their
    books concerning all these things. Keep, my son, the book from the hand of your
    father, so that you may give it to the generations of the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the book of your father's hand,' an idiom for a book handed down directly
      from the father.
    reason: lexical_alternative
  - marker: b
    text: The final phrase may also be understood as 'to all generations forever'
      or 'to the generations of eternity.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and give it'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይእዜኒ
  chosen: And now
  alternatives:
  - And at this time
  - And now then
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A discourse-transition formula. 'And now' preserves the direct, exhortatory
    shift without sounding overly wooden.
- source_word: ወልድየ
  chosen: my son
  alternatives:
  - O my son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Vocative with first-person suffix. 'My son' is natural English and preserves
    the paternal address.
- source_word: ማቱሳላ
  chosen: Methuselah
  alternatives:
  - Mathusala
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard English transliteration of the proper name; project philosophy
    prefers transliterating names by standard convention.
- source_word: ኵሎሙ፡ እሉንተ
  chosen: all these things
  alternatives:
  - all these
  - all of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The combination points to the totality of the matters just disclosed.
    'All these things' makes the object explicit in idiomatic English.
- source_word: ለከ፡ እነግር
  chosen: I tell you
  alternatives:
  - I declare to you
  - I recount to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward speech verb in first person. 'I tell you' is clear
    and fits the father-to-son instruction context.
- source_word: ወእጽሕፍ፡ ለከ
  chosen: and I write them down for you
  alternatives:
  - and I write for you
  - and I record for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means 'write'; 'them down' clarifies that the spoken revelations
    are also being committed to writing without adding new content.
- source_word: ወኵሎሙ፡ ከሠትኩ፡ ለከ
  chosen: and I have revealed them all to you
  alternatives:
  - and I have shown them all to you
  - and I have disclosed them all to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries the sense of uncovering or making known. 'Revealed'
    suits the apocalyptic setting and preserves the disclosure motif.
- source_word: ወወሀብኩከ፡ መጻሕፍቲሆሙ፡ ለእሉ፡ ኵሎሙ
  chosen: and I have given you the books concerning all these things
  alternatives:
  - and I have given you their books for all these things
  - and I have given you the writings of all these matters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is somewhat compressed in Ge'ez. The sense is that written
    books/writings corresponding to these revealed matters are handed over. 'Concerning
    all these things' is the least intrusive idiomatic expansion.
- source_word: ዕቀብ
  chosen: Keep
  alternatives:
  - Guard
  - Preserve
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative of keeping/guarding. 'Keep' is concise and natural, while
    still allowing the sense of preserving a sacred text.
- source_word: መጽሐፈ፡ እዴሁ፡ ለአቡከ
  chosen: the book from the hand of your father
  alternatives:
  - the book of the hand of your father
  - the book from your father's hand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'the book of the hand of your father.' In English, 'from the
    hand of your father' best preserves the idiom of transmission without obscuring
    the sense.
- source_word: ወከመ፡ ትሀብ፡ ለትውልደ፡ ዓለም
  chosen: and give it to the generations of the world
  alternatives:
  - and hand it on to the generations forever
  - and give it to the generations of eternity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase can denote enduring/worldwide generations. 'Generations of
    the world' preserves the broad scope and avoids over-interpreting it as merely
    'forever' or 'all future ages'.
