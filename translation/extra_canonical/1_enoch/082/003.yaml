lexical_decisions:
- source_word: ኢይነውሙ
  chosen: shall not sleep
  alternatives:
  - will not slumber
  - shall not be asleep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is best taken in its ordinary sense 'sleep/slumber.' In context
    it functions metaphorically for inattentiveness, but the image should be preserved
    rather than paraphrased away.
- source_word: እለ ይሌብዉ
  chosen: those who understand
  alternatives:
  - those who are intelligent
  - the discerning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies the wise or discerning hearers. 'Those who understand'
    is clear modern English and preserves the cognitive emphasis.
- source_word: ይጸምኡ በእዝናሆሙ
  chosen: be sluggish in their ears
  alternatives:
  - be deaf in their ears
  - grow dull in their hearing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The wording is idiomatic and difficult. A literal ear-expression is retained
    to preserve the embodied image of hearing. 'Sluggish' captures dulled receptivity
    without overstating total deafness.
- source_word: ከመ ይትመሀርዋ
  chosen: so as to learn
  alternatives:
  - in order to be instructed in it
  - that they may learn it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form expresses purpose or result tied to attentive hearing. 'So as
    to learn' is concise and natural.
- source_word: ለዛ ጥበብ
  chosen: this wisdom
  alternatives:
  - that wisdom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative points to the instruction just delivered in the Astronomical
    Book. 'This wisdom' preserves the deictic force.
- source_word: ትደልዎሙ
  chosen: it will be sweeter
  alternatives:
  - it will delight them
  - it will be pleasant to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause compares wisdom favorably to food. Rendering with 'sweeter'
    brings out the likely gustatory comparison and fits the following food imagery.
- source_word: እመበልዕት ሠናያት
  chosen: than good food
  alternatives:
  - than good things to eat
  - than fine foods
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase refers to desirable edible things. 'Good food' is idiomatic
    and keeps the comparison concrete.
- source_word: ለእለ ይበልዑ
  chosen: for those who eat it
  alternatives:
  - for those who partake
  - for those who consume
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The eating metaphor should remain explicit. The object is supplied in
    English from the context of wisdom as nourishment.
