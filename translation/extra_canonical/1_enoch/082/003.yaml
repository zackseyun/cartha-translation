translation:
  text: And those who understand shall not sleep, but shall listen with their ears
    so as to learn this wisdom; and it will be sweeter to them than good food is to
    those who eat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording about the ears is difficult; it likely means becoming
      dull or unresponsive in hearing rather than literal deafness.
    reason: lexical_alternative
