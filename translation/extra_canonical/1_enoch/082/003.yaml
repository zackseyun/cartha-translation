theological_decisions:
- issue: Metaphorical force of sleep/hearing language
  chosen_reading: Retain the imagery of not sleeping and not being dull in the ears
    as a call to attentive reception of revealed wisdom.
  alternative_readings:
  - Paraphrase as 'the wise will stay alert and listen carefully'
  rationale: The Astronomical Book presents revealed cosmic instruction. Preserving
    the bodily metaphors keeps the apocalyptic-wisdom texture rather than flattening
    it into generic exhortation.
  doctrine_reference: 'Translation philosophy: preserve imagery; do not flatten apocalyptic
    prose.'
