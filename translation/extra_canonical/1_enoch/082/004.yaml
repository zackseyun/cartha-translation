translation:
  text: Blessed are all the righteous who walk in the path of righteousness and have
    no sin like sinners, in the whole number of all their days, while the sun traverses
    heaven, entering and going out through the gates for thirty days, together with
    the heads of the thousands of the order of the stars, and with the four that are
    added, which divide the four parts of the year, which lead them and enter with
    them on four days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic OCR at this point is difficult and appears to show a numeral
      that may not fit the context. The sense is likely the four additional days that
      mark the year's four divisions.
    reason: textual_variant
  - marker: b
    text: Or 'the chiefs of the starry orders.' The Ge'ez phrase is numerically and
      syntactically difficult, so the translation keeps its hierarchical imagery visible
      rather than smoothing it away.
    reason: lexical_alternative
  - marker: c
    text: Or 'heads of the thousand-order of the stars'.
    reason: previous_rendering
lexical_decisions:
- source_word: ብፁዓን
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the beatitude-like force and elevated register appropriate to
    apocalyptic exhortation; 'happy' is too weak and modern.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  - righteous ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the key ethical/theological term consistent with broader biblical
    usage and the project's default handling of righteousness language.
- source_word: የሐውሩ / የኀውር
  chosen: walk / goes on its course
  alternatives:
  - go
  - proceed
  - travel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: For humans, 'walk' preserves the moral idiom 'walk in the path'; for
    the sun, a contextual shift to 'goes on its course' avoids awkward repetition
    while preserving motion imagery.
- source_word: በፍኖተ ጽድቅ
  chosen: in the path of righteousness
  alternatives:
  - on the way of righteousness
  - in the road of righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A natural English rendering of the moral-path metaphor without flattening
    it.
- source_word: አልቦሙ ኃጢአት
  chosen: have no sin
  alternatives:
  - are without sin
  - have no transgression
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Close to the Ge'ez syntax and preserves the strong moral claim of the
    verse.
- source_word: ከመ ኃጥኣን
  chosen: like sinners
  alternatives:
  - as sinners do
  - like the sinful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparative particle is best kept explicit; the contrast is between
    the righteous and sinners.
- source_word: በኍልቈ ኵሉ መዋዕሊሆሙ
  chosen: in the whole count of all their days
  alternatives:
  - throughout the number of all their days
  - for the full tally of all their days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the numerical/chronological diction that fits the Astronomical
    Book's concern with counted times.
- source_word: ለዘ የኀውር ፀሐይ በሰማይ
  chosen: while the sun goes on its course in heaven
  alternatives:
  - during the sun's going in heaven
  - as long as the sun travels in heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Connects the ethical statement to the cosmic calendar framework without
    over-literal awkwardness.
- source_word: በአናቅጽ ይበውእ ወይወጽእ
  chosen: entering and going out through the gates
  alternatives:
  - coming in and going out by the portals
  - enters and exits through the gates
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the luminary-gate imagery central to this section; 'gates'
    is simpler and vivid.
- source_word: ሠላሳ ዕለተ
  chosen: for thirty days
  alternatives:
  - thirty days
  - during thirty days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward temporal rendering in context of the sun's movement through
    a gate/segment.
- source_word: አርእስተ ፲፻ዘሥርዓቶሙ ለከዋክብት
  chosen: the heads of the thousand-order of the stars
  alternatives:
  - the chiefs of the thousand classes of the stars
  - the leaders of the starry orders
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult; this rendering keeps the hierarchical and numerical
    language visible rather than smoothing it into a vague paraphrase.
- source_word: ምስለ ፲ እለ ይትዌሰኩ
  chosen: with the four that are added
  alternatives:
  - with the four intercalated ones
  - with the four additional days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the OCR shows a numeral that may be corrupt, the following clause
    about dividing the four parts of the year strongly supports the traditional sense
    of four added days; this is kept transparent in a footnote.
- source_word: እለ ይጼልዩ ማእከለ ፬ ክፍለ ዓመት
  chosen: which divide the four parts of the year
  alternatives:
  - which separate the midst of the four quarters of the year
  - which mark off the four divisions of the year
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best fits the calendrical function of the intercalary days in the Astronomical
    Book.
- source_word: እለ ይመርዓዎሙ
  chosen: which lead them
  alternatives:
  - which guide them
  - which regulate them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Preserves personified cosmic order: these days ''lead'' or govern the
    reckoning.'
- source_word: ወምስሌሆሙ ይበውኡ አርባዕተ መዋዕለ
  chosen: and enter with them on four days
  alternatives:
  - and with them they enter on four days
  - and come in with them for four days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the concrete motion imagery of entering, tied to the four additional
    days.
