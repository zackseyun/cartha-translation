theological_decisions:
- issue: Whether the verse teaches absolute sinlessness of the righteous
  chosen_reading: 'The text is rendered as a strong ethical description: the righteous
    ''have no sin like sinners'' within the calendrical frame of their days.'
  alternative_readings:
  - A hyperbolic contrast meaning they do not live in sin as sinners do
  - A stricter claim of complete blamelessness
  rationale: The Ge'ez wording is strong and should not be weakened, but the comparative
    phrase 'like sinners' is preserved to avoid importing later doctrinal debates
    about sinlessness.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Identity of the added calendrical units
  chosen_reading: The verse refers to four additional days associated with dividing
    the year into four parts.
  alternative_readings:
  - A literal reading of the OCR numeral as ten added entities
  - A more generalized reference to extra star-leaders
  rationale: The immediate context of the Astronomical Book and the clause about the
    four parts of the year favor four intercalary days; because the OCR is unstable,
    the decision is documented and footnoted rather than hidden.
