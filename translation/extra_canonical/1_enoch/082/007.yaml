translation:
  text: And the matter is true, and the appointed reckoning is exact; for Uriel showed me the luminaries, and the months, and the appointed times, and the years, and the days, and breathed upon me—Uriel, to whom the Lord of all creation of the world gave command concerning the host of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the careful calculation' or 'the precise account.' The Ge'ez phrase suggests deliberate exactness, fitting the calendrical material of this section.
    reason: lexical_alternative
  - marker: b
    text: '''Paths'' may also be rendered ''courses,'' referring to the routes of the heavenly lights.'
    reason: lexical_alternative
  - marker: c
    text: The term rendered 'appointed times' can also mean 'feasts' or 'festivals'; here the broader calendrical sense is likely.
    reason: lexical_alternative
  - marker: d
    text: The word rendered 'years' is textually difficult in this OCR witness; some understand a seasonal or annual division here.
    reason: textual_variant
  - marker: e
    text: '''Host of heaven'' may refer to the ordered heavenly array, including the celestial bodies governed in this book.'
    reason: cultural_note
  - marker: f
    text: Or 'And this is the matter, and the exact reckoning of the luminaries, and of the paths, and of the appointed times, and of the years, and of the days, as Uriel showed me'.
    reason: previous_rendering
lexical_decisions:
- source_word: አማን
  chosen: this is
  alternatives:
  - truly
  - indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though often an asseverative ('truly/indeed'), in this introductory formula it works idiomatically to mark solemn presentation of what follows; 'this is' gives natural English while preserving the demonstrative force.
- source_word: ነገሩ
  chosen: the matter
  alternatives:
  - the account
  - the word
  - the thing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A broad term for 'matter/account'; here it introduces the subject matter of the calendrical exposition, so 'the matter' keeps the formal tone without over-specifying.
- source_word: ጥንቁቅ ሐሳቡ
  chosen: the exact reckoning
  alternatives:
  - the careful calculation
  - the precise account
  - the exact thought
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pair conveys careful, precise consideration or calculation. In the Astronomical Book the sense is technical rather than merely mental, so 'exact reckoning' fits the calendrical context.
- source_word: ብርሃናት
  chosen: luminaries
  alternatives:
  - lights
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this section the heavenly bodies are treated as ordered celestial lights; 'luminaries' preserves the elevated astronomical register better than the flatter 'lights'.
- source_word: አውራኅ
  chosen: paths
  alternatives:
  - courses
  - ways
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to the routes/courses of the heavenly bodies. 'Paths' is vivid and readable; the alternative 'courses' is possible and noted in a footnote.
- source_word: በዓላት
  chosen: appointed times
  alternatives:
  - feasts
  - festivals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the term can denote feasts/festivals, in calendrical context it points more broadly to fixed sacred times. 'Appointed times' preserves that wider scope and avoids narrowing to celebratory festivals only.
- source_word: ክረማት
  chosen: years
  alternatives:
  - seasons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form is difficult, but in this sequence the sense aligns with larger calendrical divisions. 'Years' best fits the list of temporal units, while uncertainty is acknowledged in a footnote.
- source_word: መዋዕል
  chosen: days
  alternatives:
  - times
  - days/periods
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common term for days or periods. Here, after larger calendrical units, 'days' is the most straightforward rendering.
- source_word: አርአየኒ
  chosen: showed me
  alternatives:
  - revealed to me
  - made me see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard visionary verb. 'Showed me' preserves the directness of apocalyptic disclosure.
- source_word: ነፍሐ ዲቤየ
  chosen: breathed upon me
  alternatives:
  - blew upon me
  - instructed me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The literal image is of breathing/blowing upon someone. Because the text preserves striking apocalyptic imagery, the concrete expression should remain rather than being reduced to a generic 'instructed me'.
- source_word: ዘአዘዘ ሎቱ
  chosen: to whom ... gave command
  alternatives:
  - whom ... appointed
  - whom ... commanded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative clause identifies Uriel as one entrusted by divine command. 'To whom ... gave command' preserves both the relational and authoritative sense.
- source_word: እግዚእ ኵሉ ፍጥረት ዓለም
  chosen: the Lord of all creation of the world
  alternatives:
  - the Lord of all the creation of the world
  - the Lord of every creature in the world
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is somewhat heavy in Ge'ez; the chosen rendering stays close to the wording and preserves the cosmic scope of divine sovereignty.
- source_word: ለሐይለ ሰማይ
  chosen: concerning the host of heaven
  alternatives:
  - over the power of heaven
  - for the army of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Power/host of heaven'' can denote the heavenly array. In this astronomical context, ''host of heaven'' best captures the ordered celestial bodies and heavenly forces without flattening the phrase.'
