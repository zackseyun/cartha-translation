  rationale: The project default is 'Lord' for titles of divine sovereignty. Here it preserves the elevated register and cosmic authority without introducing a more secular 'Master'.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
- issue: Whether to preserve the concrete image in ነፍሐ ዲቤየ
