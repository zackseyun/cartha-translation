  - inspired me
  rationale: The text presents revelation through vivid angelic action. Preserving the concrete image maintains apocalyptic texture and avoids interpretive reduction to a purely mental act.
  doctrine_reference: 'Book context: preserve visionary and apocalyptic imagery; do not flatten.'
