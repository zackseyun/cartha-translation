translation:
  text: 'And these are the heads of the thousand: in the midst of the leaders, and
    leader after leader, six are added after the station; and their leaders make the
    distinction.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording of this verse is textually and syntactically difficult in the
      Ethiopic witness. It appears to describe technical divisions within the luminary
      scheme, possibly involving supplementary units added after a fixed station.
    reason: textual_variant
  - marker: b
    text: Or 'chiefs of the thousand' / 'leaders of the thousand.' The relation of
      'heads' to 'the thousand' is not fully clear.
    reason: lexical_alternative
  - marker: c
    text: Or 'their guides separate them' / 'their leaders discern them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እሙንቱ
  chosen: these
  alternatives:
  - those
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative plural introducing the items under discussion; 'these'
    fits the immediate explanatory context.
- source_word: አርእስት
  chosen: heads
  alternatives:
  - chiefs
  - leaders
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'heads'; retained to preserve the structured, technical register
    of the astronomical scheme, though it may function as 'chiefs'.
- source_word: ፲፻
  chosen: the thousand
  alternatives:
  - a thousand
  - thousands
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Taken as a substantive numeral in a technical calendrical/astronomical
    description. The exact syntactic relation is difficult, so the rendering stays
    close to the Ge'ez.
- source_word: ማእከለ
  chosen: in the midst of
  alternatives:
  - among
  - between
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A spatial/relational term; 'in the midst of' preserves the formal feel
    without overinterpreting the construction.
- source_word: መራኂ
  chosen: leaders
  alternatives:
  - guides
  - conductors
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From a root of leading/guiding. 'Leaders' works in this technical context
    and avoids over-specifying astronomical referents not explicit in the verse.
- source_word: ይትዌሰኩ፡ ፮
  chosen: six are added
  alternatives:
  - six are inserted
  - six are appended
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive verbal sense suggests addition. In the Astronomical
    Book this likely refers to supplementary units, so 'are added' is the clearest
    close rendering.
- source_word: በድኅረ ምቅዋም
  chosen: after the station
  alternatives:
  - after the standing place
  - after the fixed position
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun suggests standing, station, or fixed placement. 'Station' fits
    astronomical ordering while preserving the concrete image of a set position.
- source_word: መራሕያኒሆሙ
  chosen: their leaders
  alternatives:
  - their guides
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Related to the same leadership/guidance vocabulary as earlier in the
    verse; rendered consistently.
- source_word: ይፈልጡ
  chosen: make the distinction
  alternatives:
  - separate
  - discern
  - distinguish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can denote separating or distinguishing. 'Make the distinction'
    best suits a technical calendrical context in which divisions are being marked
    out.
