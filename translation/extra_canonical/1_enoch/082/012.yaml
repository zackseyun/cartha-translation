theological_decisions:
- issue: Whether the verse should be smoothed into an explicit calendrical explanation
  chosen_reading: Retain the technical and somewhat opaque wording about heads, leaders,
    addition, and distinction.
  alternative_readings:
  - Paraphrase as an explanation of intercalary days or divisions of the year
  rationale: The Astronomical Book often uses schematic language. Because the Ge'ez
    syntax here is difficult, the translation preserves the text's technical opacity
    rather than importing a fuller explanatory paraphrase from commentary tradition.
  doctrine_reference: Translation philosophy §1, §3, and book-context guidance on
    preserving apocalyptic/technical imagery
