theological_decisions:
- issue: Identity of the moving subject
  chosen_reading: Render the verbs with the neutral pronoun 'it' rather than specifying 'the moon' in the main text.
  alternative_readings:
  - explicitly supply 'the moon' throughout
  - explicitly supply another luminary
  rationale: The immediate literary context likely concerns the moon's course relative to the sun, but the verse as quoted is a chain of third-person verbs without an explicit repeated noun. Using 'it' preserves the source's syntax and avoids over-supplying where the antecedent is contextually inferred rather than restated.
  doctrine_reference: Preserve ambiguity where the source is genuinely implicit; do not resolve beyond the witness.
