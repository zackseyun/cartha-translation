translation:
  text: For seven days it goes out and turns about, and it returns again through the gate from which the sun goes out; and it completes all its light, and it withdraws from the sun, and it enters for eight days through the sixth gate from which the sun goes out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez term for the heavenly opening can also be rendered 'gate.' 'Window' is kept here because it fits the imagery of the luminaries' openings, but 'gate' remains a viable lexical alternative in this section.
    reason: lexical_alternative
  - marker: b
    text: The subject is implicit in this verse. In context it is likely the moon, but the main text keeps the pronoun 'it' rather than supplying the noun.
    reason: alternative_reading
  - marker: c
    text: The clause 'it completes all its light' is somewhat technical and may refer to the luminary reaching the full measure of its brightness before changing its course.
    reason: cultural_note
  - marker: d
    text: Or 'And for seven days it goes out and turns about, and it returns again through the window from which the sun comes out; and it completes all its light, and it withdraws from the sun, and it enters for eight days through the sixth window from which the sun comes out.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይወፅእ
  chosen: it goes out
  alternatives:
  - it comes out
  - it emerges
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic motion verb of going/coming out. 'Goes out' preserves the repeated astronomical movement formula without over-interpreting the subject.
- source_word: ሰብዓተ መዋዕለ
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal accusative/adverbial phrase indicating duration. 'For seven days' makes the duration explicit in natural English.
- source_word: የአውድ
  chosen: turns about
  alternatives:
  - circles
  - goes around
  - makes a circuit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes circling or turning. 'Turns about' keeps the motion vivid and concise in this astronomical context.
- source_word: ይገብእ ካዕበ
  chosen: it returns again
  alternatives:
  - it enters again
  - it comes back
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With ካዕበ ('again'), the sense is repeated movement back. 'Returns again' best fits the sequence of exit, circuit, and re-entry.
- source_word: በኆኅት
  chosen: through the window
  alternatives:
  - through the gate
  - through the opening
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book, the heavenly portals for luminaries are commonly rendered 'windows' or 'gates.' 'Window' is retained here because the Ge'ez ኆኅት naturally denotes an opening/window, while a footnote notes the possible alternative 'gate' in this technical cosmological setting.
- source_word: ወይፌጽም ኵሎ ብርሃኖ
  chosen: and it completes all its light
  alternatives:
  - and all its light is completed
  - and it finishes all its brightness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase likely describes the luminary reaching the full measure of its light. 'Completes all its light' preserves the somewhat technical, process-oriented wording rather than smoothing it into an interpretive paraphrase.
- source_word: ወይፀንን እምፀሐይ
  chosen: and it withdraws from the sun
  alternatives:
  - and it is removed from the sun
  - and it departs from the sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests separation/removal. 'Withdraws from' preserves the relational movement without forcing a stronger cosmological explanation.
- source_word: ስሙነ መዋዕለ
  chosen: for eight days
  alternatives:
  - eight days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: As with the earlier phrase, this is best taken as a duration expression.
- source_word: በሳድስት ኆኅት
  chosen: through the sixth window
  alternatives:
  - through the sixth gate
  - by the sixth opening
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal plus portal term in the luminary schema. 'Sixth window' keeps consistency with the earlier occurrence in the verse.
