lexical_decisions:
- source_word: በክልኤ ወርኅ
  chosen: In the second month
  alternatives:
  - During the second month
  - In month two
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: በ marks a temporal setting, and ክልኤ ወርኅ straightforwardly denotes 'second
    month.' A simple temporal phrase preserves the calendrical style of the Astronomical
    Book.
- source_word: የዓርብ
  chosen: on the fourth day
  alternatives:
  - on the fourth
  - the fourth day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is best taken as an ordinal/day reference in this calendrical
    context. Rendering it explicitly as 'day' makes the time notation intelligible
    in English without adding interpretive content beyond the context.
- source_word: ምስለ ፀሐይ
  chosen: with the sun
  alternatives:
  - along with the sun
  - together with the sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ምስለ commonly means 'with.' In this astronomical context it likely indicates
    concurrence or association with the sun's movement rather than companionship in
    a personal sense, but 'with the sun' preserves the compact source phrasing.
- source_word: በእሉ ክልኤ ኆዋኅው
  chosen: through these two ... windows
  alternatives:
  - by these two ... windows
  - in these two ... windows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to two openings/windows associated with the luminary's
    course. The exact noun form is textually difficult in OCR, but the broader chapter
    repeatedly uses window/opening imagery for celestial portals; 'through' best fits
    motion through apertures.
- source_word: እለ ማእከል
  chosen: middle
  alternatives:
  - central
  - in the midst
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ማእከል denotes the middle or center. 'Middle' is the most natural modifier
    for the pair of windows in English and preserves the spatial scheme of the luminary
    gates.
- source_word: በሣልስት ወበራብዕት ኆኅት
  chosen: in the third and in the fourth window
  alternatives:
  - at the third and the fourth opening
  - through the third and the fourth gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated ordinal forms indicate numbered apertures/openings. Because
    this chapter regularly describes heavenly portals, 'window' is retained as the
    main rendering, while 'opening' remains a viable alternative.
