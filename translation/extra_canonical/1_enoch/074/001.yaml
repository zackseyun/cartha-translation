theological_decisions:
- issue: Nature of cosmic order language
  chosen_reading: The verse describes a divinely fixed regulation governing cosmic
    or meteorological movement, not a moral command.
  alternative_readings:
  - A direct 'command' issued to a luminary
  - A more abstract 'order' without personal agency
  rationale: In the Astronomical Book, created phenomena move according to established
    ordinances. Rendering ትእዛዝ as 'regulation' preserves this cosmological framework
    without importing later theological idiom.
  doctrine_reference: Translation philosophy §Preserve theological tension rather
    than resolve it
