lexical_decisions:
- source_word: ካልአ
  chosen: another
  alternatives:
  - a second
  - other
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward adjectival/numerical sense introducing an additional
    item in the sequence of revealed cosmic ordinances.
- source_word: ምሕዋረ
  chosen: course
  alternatives:
  - circuit
  - path
  - revolution
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term commonly denotes an ordered movement
    or circuit. 'Course' preserves the technical-cosmic sense without overcommitting
    to astronomical modernity.
- source_word: ትእዛዘ
  chosen: regulation
  alternatives:
  - ordinance
  - command
  - order
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is cosmic ordering rather than a spoken imperative. 'Regulation'
    conveys a fixed governing rule for celestial or meteorological motion.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard visionary report formula; simple past keeps the apocalyptic
    observational tone.
- source_word: ሎቱ
  chosen: for it
  alternatives:
  - to it
  - concerning it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronoun likely refers back to the luminary/cosmic entity under discussion.
    'For it' fits the idiom of seeing a course and rule pertaining to that entity.
- source_word: በውእቱ ትእዛዝ
  chosen: by that regulation
  alternatives:
  - according to that ordinance
  - through that order
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Instrumental/prepositional phrase indicating the governing norm by which
    the movement occurs.
- source_word: ይገብር
  chosen: it makes
  alternatives:
  - it performs
  - it carries out
  - it does
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the active verbal force of carrying out or effecting its movement,
    rather than flattening to a stative 'goes'.
- source_word: ምሕዋሮ ዘአውራኅ
  chosen: its course, the course of the winds
  alternatives:
  - its circuit of the winds
  - its path of the winds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated noun plus genitival phrase is awkward but significant. I
    preserve the repetition to reflect the technical style of the passage. አውራኅ is
    best taken as 'winds,' fitting the meteorological material surrounding these chapters.
