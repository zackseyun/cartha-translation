  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/074/003.job-72612.json
  category: mistranslation
  tier: 3
  from: In fifty-seven days all its light is completed in the east, and in fifty-seven
    days all its darkness is completed in the west.
  to: In fifteen parts it completes all its light in the east, and in fifteen parts
    it completes all its darkness in the west.
  rationale: 'The draft mistranslates the OCR error `፷፯` (67) as ''fifty-seven''.
    The OCR is a visual error for `፲፭` (15), as ፲ (10) resembles ፷ (60) and ፭ (5)
    resembles ፯ (7). The lunar cycle in 1 Enoch is reckoned in 14 or 15 parts. Additionally,
    `እደ` means ''parts'' or ''portions'' (literally ''hands''), not ''days'' (`መዋዕል`).
    Finally, `ይፌጽም` is active (''it completes''), not passive. | Adjudicator: The
    reviewer correctly identifies a severe OCR error and multiple translation mistakes.
    The Ge''ez numeral ፲፭ (15) was misread by the OCR as ፷፯ (67), which the draft
    then inexplicably translated as ''fi'
