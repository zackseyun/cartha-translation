lexical_decisions:
- source_word: በ፭*፷፯ እደ
  chosen: in fifty-seven days
  alternatives:
  - after fifty-seven days
  - within fifty-seven days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral phrase with እደ is best taken temporally here in the Astronomical
    Book's schematic reckoning. 'In fifty-seven days' preserves the calendrical formula
    without over-interpreting the preposition.
- source_word: ይፌጽም
  chosen: is completed
  alternatives:
  - comes to completion
  - is fulfilled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive/completive sense fits the repeated astronomical formula. 'Is
    completed' is clear English and preserves the technical, measured character of
    the luminary description better than the more theological 'is fulfilled.'
- source_word: ኵሎ ብርሃኖ
  chosen: all its light
  alternatives:
  - its whole light
  - the entirety of its light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኵሎ marks totality and ብርሃኖ carries the possessive 'its light.' The rendering
    keeps the concrete luminary imagery.
- source_word: በሠርቅ
  chosen: in the east
  alternatives:
  - at the east
  - toward the east
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The locative sense is most natural in this astronomical context, referring
    to the eastern side or region of rising.
- source_word: ኵሎ ጽልመተ
  chosen: all its darkness
  alternatives:
  - its whole darkness
  - the entirety of its darkening
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes darkness rather than merely absence of light. Retaining
    'darkness' preserves the text's balanced polarity between light and darkness.
- source_word: በምዕራብ
  chosen: in the west
  alternatives:
  - at the west
  - toward the west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Parallel to 'in the east,' this is best rendered locatively, preserving
    the east/west symmetry of the verse.
