theological_decisions:
- issue: Whether to render the repeated completion formula in more interpretive astronomical
    language
  chosen_reading: Kept the literal-completive wording 'is completed' for both light
    and darkness
  alternative_readings:
  - reaches its full brightness ... reaches full darkness
  - finishes its course of light ... finishes its course of darkness
  rationale: The Astronomical Book uses schematic, formulaic language. A more interpretive
    rendering might clarify the phenomenon but would go beyond the Ge'ez witness and
    flatten the text's measured apocalyptic style.
  doctrine_reference: Translation philosophy §optimal equivalence; preserve imagery
    and avoid paraphrase beyond the witness.
