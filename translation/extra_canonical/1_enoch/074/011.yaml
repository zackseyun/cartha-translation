theological_decisions:
- issue: Astronomical-calendrical wording is compressed and somewhat opaque
  chosen_reading: Retain the literal sequence of completion/reaching/subtraction rather than paraphrasing into a fully explicit modern calendar formula
  alternative_readings:
  - Expand as an interpretive statement about the moon falling thirty days short over five years
  - Render more dynamically as a discrepancy between solar and lunar years
  rationale: The verse belongs to the Astronomical Book and uses technical, repetitive reckoning language. A restrained rendering preserves auditable contact with the Ge'ez while still making the basic calculation visible.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it; readable modern English without flattening source texture
