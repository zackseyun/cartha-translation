translation:
  text: And their completion for the sun and the stars comes to six days; for five years, at six each, it amounts for them to thirty days, and the moon falls short of the sun and the stars by thirty days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verse's arithmetic is compressed. The sense appears to be that over five years the sun and stars accumulate six extra days, while the moon's reckoning is thirty days shorter than theirs.
    reason: cultural_note
  - marker: b
    text: '''The moon'' could also be understood as ''the month,'' since the Ge''ez term can bear either sense in calendrical contexts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'comes to six days in five years; by six they reach them, to thirty days, and they are taken away from the sun and from the stars—thirty days for the moon.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ምብጻሒሆሙ
  chosen: their completion
  alternatives:
  - their arrival
  - their reckoning
  - their full amount
  lexicon: Dillmann
  rationale: From the Ge'ez root for reaching/arriving/completing. In this astronomical context the sense is not simple motion but the completion or accumulated total of the discrepancy being described.
- source_word: ስሱ
  chosen: six
  alternatives: []
  lexicon: Dillmann
  rationale: Cardinal numeral; repeated for emphasis in the verse's calculation.
- source_word: መዋዕለ
  chosen: days
  alternatives: []
  lexicon: Dillmann
  rationale: Standard plural for 'days'; the verse is computing calendrical excess in days.
- source_word: በበስሱ
  chosen: by six
  alternatives:
  - in six
  - with six
  lexicon: Dillmann
  rationale: The prefixed preposition plus repeated numeral is awkward in English. 'By six' best preserves the instrumental/calculative force in the sequence.
- source_word: ይበጽሖሙ
  chosen: they reach them
  alternatives:
  - it reaches them
  - they amount to them
  lexicon: Dillmann
  rationale: Again from the root 'reach/arrive.' The plural rendering reflects the immediately preceding plural reckoning units; the sense is attaining the stated total.
- source_word: የሐፀፁ
  chosen: they are taken away
  alternatives:
  - they are subtracted
  - they are removed
  lexicon: Dillmann
  rationale: In context this appears to describe a subtraction or deduction from the solar/star total in order to state the moon's shorter reckoning. 'Taken away' preserves the imagery while allowing the calendrical sense.
- source_word: ወርኅ
  chosen: the moon
  alternatives:
  - month
  lexicon: Dillmann
  rationale: Though Ge'ez can use the same term for 'month' and 'moon,' the surrounding contrast with sun and stars favors the luminary itself here; the calendrical implication remains present.
