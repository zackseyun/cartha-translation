translation:
  text: And all that Uriel, the holy angel who is their leader, showed me—I wrote
    down their positions as he showed them to me, and I wrote down their paths as
    they are, and I saw their lights until fifteen days were completed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their courses' for 'their paths'; the Ge'ez term can denote routes or
      ordered movements of the heavenly bodies.
    reason: lexical_alternative
  - marker: b
    text: The final clause may indicate observation of their lights through a completed
      fifteen-day period; the exact relation between 'I saw' and the time phrase is
      somewhat compressed in the Ge'ez.
    reason: alternative_reading
  - marker: c
    text: Or 'their leader'.
    reason: previous_rendering
  - marker: d
    text: Or 'their paths'.
    reason: previous_rendering
  - marker: e
    text: Or 'I saw their lights'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኵሎዘ
  chosen: all that
  alternatives:
  - everything that
  - all which
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the totality of what follows in a relative construction; 'all
    that' is natural English while preserving comprehensiveness.
- source_word: አርአየኒ
  chosen: showed me
  alternatives:
  - caused me to see
  - revealed to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is visual/demonstrative in context; 'showed me' preserves the
    visionary register without over-theologizing as 'revealed.'
- source_word: መልአክ ቅዱስ
  chosen: the holy angel
  alternatives:
  - the sacred angel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward title; 'holy' is the standard rendering and preserves
    the text's celestial distinction.
- source_word: መራሒሆሙ
  chosen: their leader
  alternatives:
  - their guide
  - the one leading them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys governing or guiding oversight over the luminaries; 'leader'
    is concise and fits the cosmological administration context.
- source_word: ምንባሪሆሙ
  chosen: their stations
  alternatives:
  - their places
  - their settings
  - their dwellings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book the term concerns ordered placements or positions
    of heavenly bodies. 'Stations' preserves technical-cosmic nuance better than the
    more domestic 'dwellings.'
- source_word: አውራኂሆሙ
  chosen: their paths
  alternatives:
  - their courses
  - their ways
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to the routes of the luminaries. 'Paths' is transparent and vivid;
    'courses' is possible but slightly more interpretive/technical.
- source_word: በከመ ሀለዉ
  chosen: as they are
  alternatives:
  - according as they exist
  - just as they were
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresses correspondence to their actual state or arrangement. 'As they
    are' is idiomatic and preserves the observational force.
- source_word: ብርሃኖሙ
  chosen: their lights
  alternatives:
  - their brightness
  - their shining
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural likely refers to the luminaries' lights or luminous manifestations.
    'Their lights' keeps the concrete apocalyptic-cosmic imagery.
- source_word: እስከ ተፈጸመ ዐሡር ወኀሙስ መዋዕለ
  chosen: until fifteen days were completed
  alternatives:
  - until fifteen days were fulfilled
  - for a full fifteen days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks a completed period of fifteen days. 'Were completed'
    preserves the formal sense of fulfillment/completion without sounding overly wooden.
