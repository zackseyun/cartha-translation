translation:
  text: And when the sun goes out from the fourth gate, it goes out for seven days, until it goes out from the fifth; and again it returns for seven days through the fourth gate, and completes all its light, and it withdraws and enters through the first gate for eight days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic text at 'until it goes out from the fifth' does not explicitly repeat 'gate'; the sense is almost certainly 'the fifth gate' from the surrounding pattern.
    reason: lexical_alternative
  - marker: b
    text: '''Completes all its light'' is a close rendering of the Ge''ez idiom. It likely refers to the sun reaching the full measure of its brightness in this phase of the cycle.'
    reason: cultural_note
  - marker: c
    text: Or 'to the fourth gate'.
    reason: previous_rendering
lexical_decisions:
- source_word: ፀሐይ
  chosen: the sun
  alternatives:
  - sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward astronomical referent in the Luminaries context; the article is natural in English.
- source_word: ይወፅእ
  chosen: goes out
  alternatives:
  - comes out
  - emerges
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the repeated motion formula of the Ge'ez and the astronomical imagery of the luminary exiting by a gate.
- source_word: እምራብዕት ኆኅት
  chosen: from the fourth gate
  alternatives:
  - from the fourth portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኆኅት denotes a gate/opening/portal; 'gate' preserves the concrete cosmic architecture common in this section.
- source_word: ሰቡዐ መዋዕለ
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal duration is the plain sense here in the sequence of solar movements.
- source_word: እስከ ይወፅእ እምነ ኃምስት
  chosen: until it goes out from the fifth
  alternatives:
  - until it emerges from the fifth gate
  - until it goes out from the fifth gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ethiopic as transmitted omits a repeated explicit noun for 'gate'; English can preserve the ellipsis as 'the fifth,' though the referent is clearly the fifth gate.
- source_word: ካዕበ
  chosen: again
  alternatives:
  - then again
  - once more
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks the reversal in the solar course without over-expanding the syntax.
- source_word: ይገብእ
  chosen: returns
  alternatives:
  - comes back
  - goes back
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context the verb indicates reversal back to a prior gate; 'returns' is idiomatic and preserves the cyclical pattern.
- source_word: በኆኅት ራብዕ
  chosen: to the fourth gate
  alternatives:
  - into the fourth gate
  - by the fourth gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can be rendered variously, but the movement sense in context is best captured as return to the fourth gate.
- source_word: ይፌጽም ኵሎ ብርሃኖ
  chosen: completes all its light
  alternatives:
  - finishes all its light
  - fulfills all its brightness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the somewhat technical, schematic language of the astronomical cycle rather than paraphrasing as 'reaches full brightness.'
- source_word: ይደንን
  chosen: withdraws
  alternatives:
  - recedes
  - is hidden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fits the sequence after completing its light and before entering another gate; keeps the cosmic-motion imagery.
- source_word: ይበውእ በቀዳሚት ኆኅት
  chosen: enters through the first gate
  alternatives:
  - goes in through the first gate
  - enters by the first gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Balances the earlier 'goes out' with corresponding ingress language and preserves the gate imagery.
- source_word: ስሙነ መዋዕለ
  chosen: for eight days
  alternatives:
  - eight days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal duration in the final stage of the cycle.
