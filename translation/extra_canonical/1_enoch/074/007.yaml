theological_decisions:
- issue: Astronomical-cosmic gate imagery
  chosen_reading: Retain literal 'gate' language for the sun's movement.
  alternative_readings:
  - Use 'portal' for a more cosmological nuance
  - Paraphrase as horizon points or stations
  rationale: The Astronomical Book presents a structured cosmos with luminaries moving through gates/openings. Preserving this imagery respects the source text's apocalyptic cosmology rather than reducing it to modern astronomical description.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten cosmic imagery into generic modern prose.'
