translation:
  text: And in certain months it changes its settings, and in certain months it travels
    its course, one by one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Ethiopic wording is difficult: the phrase rendered ''by the paths of
      the east'' appears twice, and the final repetition ''one, one'' likely has a
      distributive sense (''one by one'' / ''each separately'').'
    reason: textual_variant
  - marker: b
    text: '''Goes down westward'' could also be rendered ''descends to the west''
      or, more interpretively, ''sets in the west.'''
    reason: lexical_alternative
  - marker: c
    text: The line belongs to the Astronomical Book's description of the ordered tracks
      of the luminaries; 'course' here refers to a fixed celestial route, not merely
      general movement.
    reason: cultural_note
  - marker: d
    text: Or 'And by the paths of the east it goes down westward, and by the paths
      of the east it travels, each one by one, in its course.'.
    reason: previous_rendering
lexical_decisions:
- source_word: አውራኅ
  chosen: paths
  alternatives:
  - ways
  - courses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes routes or tracks. 'Paths' preserves the concrete astronomical
    imagery of fixed celestial tracks better than the more abstract 'ways.'
- source_word: እመራት
  chosen: of the east
  alternatives:
  - eastern
  - from the east
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as a genitival phrase to reflect the Ge'ez construction and
    preserve the directional/cosmic framing of the luminary's route.
- source_word: ይዌልጥ
  chosen: it goes down westward
  alternatives:
  - it descends to the west
  - it sets westward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests descending or going down. 'Goes down westward' keeps
    the motion vivid without overcommitting to the technical term 'sets,' which may
    be interpretive.
- source_word: ምዕራባተ
  chosen: westward
  alternatives:
  - to the west
  - west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An adverbial English rendering reads naturally while preserving the directional
    sense.
- source_word: የሐውር
  chosen: it travels
  alternatives:
  - it goes
  - it proceeds
  - it moves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A general motion verb is preferable here; 'travels' preserves the sense
    of ordered movement along a route.
- source_word: ምሕዋሪሁ
  chosen: in its course
  alternatives:
  - its circuit
  - its path
  - its going
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this astronomical context the noun likely refers to the luminary's
    regular movement or circuit. 'Course' is idiomatic and suitably celestial.
- source_word: አሐዱ፡ አሐዱ
  chosen: each one by one
  alternatives:
  - one by one
  - each separately
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repetition is significant and should be preserved. 'Each one by one'
    reflects the distributive force, likely indicating successive paths or stages
    rather than a single undifferentiated motion.
