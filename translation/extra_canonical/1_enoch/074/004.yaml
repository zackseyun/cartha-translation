revisions:
- timestamp: '2026-04-22T19:26:32Z'
  adjudicator: auto_apply_tier2_source_grounded
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/074/004.job-72613.json
  category: mistranslation
  tier: 2
  from: And by the paths of the east it goes down westward, and by the paths of the
    east it travels, each one by one, in its course.
  to: And in certain months it changes its settings, and in certain months it travels
    its course, each one by one.
  rationale: The draft contains severe lexical hallucinations. አውራኅ ('awrāḫ) is the
    plural of ወርኅ ('month' or 'moon'), not 'paths'. እመራት ('emārāt) means 'certain'
    or 'designated' (Dillmann col. 728 explicitly cites በአውራኅ እመራት as 'in certain
    months'), not 'of the east'. ይዌልጥ (yewēleṭ) is from ወለጠ ('to change' or 'alter'),
    not 'to go down'. ምዕራባተ (me'rābāta) is the plural noun 'settings' (the direct
    object of 'changes'), not the adverb 'westward'.
