theological_decisions:
- issue: Nature of the five added days
  chosen_reading: The verse refers to five supplementary calendar days completing a 364-day solar year.
  alternative_readings:
  - The phrase could be read more woodenly with 'five years,' following the OCR form of ዓመት.
  - The line may preserve a corrupt or awkward transmission in Ethiopic.
  rationale: The surrounding calendrical context and the final sum of 364 days require 'days,' not literal 'years,' at this point. This is a textual/lexical decision rather than a doctrinal one, but it affects how the cosmological order is understood.
  doctrine_reference: Preserve ambiguity where real, but favor the source's plain sense in context.
