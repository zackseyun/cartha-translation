translation:
  text: And five years are added, and for the sun it reaches thirty days; and all the days that accrue to it for one of those five years, being completed, amount to three hundred and sixty-four days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic line is textually awkward in places. The sense is that five supplementary days are added to complete the solar year at 364 days.
    reason: textual_variant
  - marker: b
    text: Compare the broader calendar scheme in the Astronomical Book, where the year is structured as 364 days rather than by a lunar reckoning.
    reason: cross_reference
  - marker: c
    text: Or 'And the five days are added, and for the sun there come to thirty days; and all the days appointed to the year amount to three hundred and sixty-four days, from these five days being completed.'.
