translation:
  text: For three years there are one thousand ninety-two days, and for five years,
    one thousand eight hundred twenty days and eight; thus for eight years there are
    two thousand nine hundred twelve days, and ten and two days.
  philosophy: optimal-equivalence
  footnotes:
