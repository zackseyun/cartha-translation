  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/074/009.job-72618.json
  category: mistranslation
  tier: 2
  from: how the paths steal away
  to: how the moons rise
  rationale: The draft commits two major lexical errors here. First, it confuses ሠረቀ (śaraqa, 'to rise', standard for luminaries) with ሰረቀ (saraqa, 'to steal'). Second, አውራኅ (ʾawraḫ) is the plural of ወርኅ (warḫ, 'moon' or 'month'), not 'paths'. The phrase ይሠርቅ አውራኅ means 'the moons rise', which perfectly parallels the following clause ወየዓርብ ፀሐይ ('and the sun sets').
