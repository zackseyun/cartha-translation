translation:
  text: 'Thus I saw their workings: how the moons rise, and the sun sets in those days.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'the paths steal away' is difficult. The Ge'ez verb commonly carries the sense 'steal' or 'slip away,' and the noun may refer to heavenly paths or courses. A more interpretive rendering would be 'the courses shift away.'
    reason: lexical_alternative
  - marker: b
    text: Or 'how the paths steal away'.
    reason: previous_rendering
lexical_decisions:
- source_word: ከመዝ
  chosen: Thus
  alternatives:
  - And so
  - In this way
  lexicon: Dillmann
  rationale: Introduces the visionary observation with a resumptive or inferential force; 'Thus' preserves the elevated narrative register.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I observed
  - I beheld
  lexicon: Dillmann
  rationale: Straightforward first-person visionary verb; 'I saw' is simple and faithful without over-elevating the diction.
- source_word: ምግባሮሙ
  chosen: their workings
  alternatives:
  - their deeds
  - their operations
  - their courses
  lexicon: Dillmann
  rationale: In the Astronomical Book the referent is celestial processes rather than moral deeds; 'workings' preserves the sense of observable operations.
- source_word: በከመ
  chosen: how
  alternatives:
  - according as
  - in what manner
  lexicon: Dillmann
  rationale: Introduces the content of what Enoch saw; 'how' gives natural English while retaining the explanatory force.
- source_word: ይሠርቅ
  chosen: steal away
  alternatives:
  - slip away
  - move secretly
  - withdraw
  lexicon: Dillmann
  rationale: The verb literally suggests stealing or moving furtively. 'Steal away' preserves the vivid imagery instead of flattening it into a neutral astronomical term.
- source_word: አውራኅ
  chosen: the paths
  alternatives:
  - the ways
  - the tracks
  - the courses
  lexicon: Dillmann
  rationale: Likely refers to the heavenly tracks or courses of the luminaries. 'Paths' keeps the concrete image and fits apocalyptic cosmological language.
- source_word: የዓርብ
  chosen: sets
  alternatives:
  - goes down
  - descends
  lexicon: Dillmann
  rationale: Used of the sun's evening movement. 'Sets' is idiomatic English for the astronomical action without losing concreteness.
- source_word: ፀሐይ
  chosen: the sun
  alternatives: []
  lexicon: Dillmann
  rationale: Direct rendering of the luminary named in the verse.
- source_word: በእማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - during those days
  - at that time
  lexicon: Dillmann
  rationale: A temporal phrase referring to the period under discussion in the luminary schema; 'in those days' preserves the repeated apocalyptic temporal formula.
