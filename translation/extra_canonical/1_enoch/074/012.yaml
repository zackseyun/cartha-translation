translation:
  text: And the sun and the stars bring in all the years exactly, according to their station forever, they do not advance or fall behind by a single day, but they change the year in righteousness, exactly, in three hundred and sixty-four days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'precisely' for 'exactly'; the Ge'ez term emphasizes careful accuracy in the reckoning of the luminaries.
    reason: lexical_alternative
  - marker: b
    text: '''In righteousness'' may also be understood as ''rightly'' or ''properly,'' but the main text keeps the stronger theological wording of the Ge''ez.'
    reason: lexical_alternative
  - marker: c
    text: Or 'so that for eternity they do not advance'.
    reason: previous_rendering
  - marker: d
    text: Or 'they complete the year'.
    reason: previous_rendering
lexical_decisions:
- source_word: ያመጽእሙ
  chosen: bring in
  alternatives:
  - bring
  - cause to come
  - mark out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is causative/ingressive in sense here, with the sun and stars functioning as agents for the arrival or reckoning of the years. 'Bring in' preserves the concrete calendrical imagery better than the flatter 'mark out.'
- source_word: ለዓመታት
  chosen: the years
  alternatives:
  - years
  - for the years
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional object points to the calendrical years as the thing being brought in or completed. English idiom prefers 'the years' rather than a more wooden 'for the years.'
- source_word: ጥንቁቃት
  chosen: exactly
  alternatives:
  - carefully
  - precisely
  - accurately
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term conveys careful precision. Because the verse concerns astronomical/calendar regularity, 'exactly' best captures the adverbial force in natural English.
- source_word: ምንባሪሆሙ
  chosen: for eternity
  alternatives:
  - in their dwelling
  - in their course
  - forever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with ለዓለም and the luminaries' fixed order, the phrase points to their enduring appointed order rather than a literal habitation. 'For eternity' expresses the perpetual force of the clause in readable English.
- source_word: ኢይበድሩ
  chosen: advance
  alternatives:
  - go ahead
  - precede
  - run ahead
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The negative pair describes deviation from the fixed calendar. 'Advance' fits the temporal/calendrical sense without over-paraphrasing.
- source_word: ወኢይጐንዱ
  chosen: fall behind
  alternatives:
  - lag behind
  - be delayed
  - come short
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This balances 'advance' in a natural English pair and preserves the idea of not deviating late from the appointed order.
- source_word: አሐተ ዕለተ
  chosen: by a single day
  alternatives:
  - one day
  - even one day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The accusative phrase marks the smallest unit of deviation. 'By a single day' makes the measure of error explicit in English.
- source_word: ይዌልጡ ዓመተ
  chosen: they complete the year
  alternatives:
  - they finish the year
  - they fulfill the year
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb here concerns bringing the annual cycle to its proper completion. 'Complete' is both precise and idiomatic.
- source_word: በጽድቅ
  chosen: in righteousness
  alternatives:
  - rightly
  - justly
  - correctly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the context is calendrical accuracy, the text uses the morally and theologically weighty term 'righteousness.' Following project philosophy, the translation preserves that theological texture rather than reducing it to mere correctness.
- source_word: ፫፻ወ፷ወረቡዕ መዋዕለ
  chosen: three hundred and sixty-four days
  alternatives:
  - 364 days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral phrase is central to the Astronomical Book's schematic calendar and should be rendered fully and clearly.
