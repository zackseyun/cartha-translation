lexical_decisions:
- source_word: ለወርኅ
  chosen: for the month
  alternatives:
  - for a month
  - to the month
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prefixed ለ commonly marks relation or measure here; in this astronomical
    context it introduces the time unit under calculation, best rendered 'for the
    month.'
- source_word: ለባሕቲቱ
  chosen: single
  alternatives:
  - alone
  - one only
  - solitary
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ባሕቲት commonly carries the sense of 'single' or 'alone.' With 'month'
    it likely distinguishes one individual month as a unit, not a class of months
    in general.
- source_word: ይበጽሕ
  chosen: come to
  alternatives:
  - reach
  - amount to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In numerical statements this verb naturally means 'reach' or 'amount
    to.' 'Come to' is idiomatic English while preserving the quantitative force.
- source_word: መዋዕሊሁ
  chosen: its days
  alternatives:
  - its day-count
  - the days of it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural noun means 'days' with a pronominal suffix referring back
    to the month. 'Its days' is the most direct rendering.
- source_word: ለ፫ዓም
  chosen: for three years
  alternatives:
  - in three years
  - over three years
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral phrase is straightforward. 'For three years' keeps the same
    relational force as the Ge'ez construction.
- source_word: ፲፻ ወ፷ወ፪ መዋዕለ
  chosen: one thousand and sixty-two
  alternatives:
  - 1062 days
  lexicon: Ge'ez numeral system
  rationale: The numeral sequence is read literally as 1000 + 60 + 2. Because መዋዕለ
    follows, the sense is 'one thousand and sixty-two days.'
- source_word: ወለ፭ ዓም
  chosen: and for five years
  alternatives:
  - and in five years
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The conjunction plus preposition introduces a second time span. The surviving
    OCR does not preserve an accompanying numeral total after this phrase, so the
    English reflects the extant wording without supplying missing content.
