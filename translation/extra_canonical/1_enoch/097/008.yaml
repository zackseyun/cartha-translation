translation:
  text: Woe to you who heap up silver and gold not by righteousness, and say, ‘We
    have become rich with wealth, and we have acquired everything we desired.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not in righteousness'; the phrase may describe either the manner of
      acquiring the wealth or the moral character of the gain more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  lexicon: Dillmann
  rationale: Introduces a prophetic denunciation formula; 'Woe' best preserves the
    judgment-oracle force in apocalyptic context.
- source_word: ታጠርዩ
  chosen: heap up
  alternatives:
  - gather
  - store up
  - amass
  lexicon: Dillmann
  rationale: The verb denotes accumulating or collecting; 'heap up' keeps the vivid
    sense of piling up wealth without sounding overly formal.
- source_word: ብሩረ ወወርቀ
  chosen: silver and gold
  alternatives:
  - money and gold
  lexicon: Dillmann
  rationale: A straightforward material pair for precious wealth; retained literally
    rather than generalized.
- source_word: ዘአኮ በጽድቅ
  chosen: not by righteousness
  alternatives:
  - not in righteousness
  - unjustly
  lexicon: Dillmann
  rationale: The phrase contrasts their acquisition with righteous means. 'Not by
    righteousness' stays close to the Ge'ez while preserving the ethical category
    rather than reducing it to a generic adverb.
- source_word: ትብሉ
  chosen: say
  alternatives:
  - declare
  lexicon: Dillmann
  rationale: Simple speech verb introducing the self-satisfied boast.
- source_word: ብዕልነ
  chosen: we have become rich
  alternatives:
  - we are rich
  - we have prospered
  lexicon: Dillmann
  rationale: Best captures a resultant state reached through accumulation; fits the
    boastful tone.
- source_word: ንዋይ
  chosen: wealth
  alternatives:
  - property
  - possessions
  - riches
  lexicon: Dillmann
  rationale: Refers broadly to material goods or substance. 'Wealth' fits the context
    of silver and gold and avoids redundancy with 'rich' while preserving material
    emphasis.
- source_word: አጥረይነ
  chosen: we have acquired
  alternatives:
  - we have amassed
  - we have gathered
  lexicon: Dillmann
  rationale: A completed-action verb of obtaining or accumulating possessions; 'acquired'
    is clear and suitably broad.
- source_word: ኵሎ ዘፈቀድነ
  chosen: everything we desired
  alternatives:
  - all that we wanted
  - everything we wished for
  lexicon: Dillmann
  rationale: Preserves the totalizing boast and the language of desire/will without
    embellishment.
