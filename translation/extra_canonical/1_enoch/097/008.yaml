translation:
  text: Woe to you who acquire silver and gold not by righteousness, and say, ‘We
    have become rich with wealth, and we have acquired possessions, and we have acquired
    everything we desired.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not in righteousness'; the phrase may describe either the manner of
      acquiring the wealth or the moral character of the gain more generally.
    reason: lexical_alternative
  - marker: b
    text: Or 'We have become rich with wealth, and we have acquired everything we
      desired.'.
    reason: previous_rendering
  - marker: c
