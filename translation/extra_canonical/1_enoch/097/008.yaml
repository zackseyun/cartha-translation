theological_decisions:
- issue: Rendering of በጽድቅ in a denunciation of unjust wealth
  chosen_reading: righteousness
  alternative_readings:
  - justice
  - rightly
  rationale: Following project defaults, the ethical term is rendered 'righteousness'
    unless context strongly demands 'justice.' Here the contrast is with the manner
    of acquiring wealth; 'righteousness' preserves the moral-theological category
    while still making sense idiomatically.
  doctrine_reference: 'Translation philosophy: contested terms table, δικαιοσύνη →
    righteousness / justice'
