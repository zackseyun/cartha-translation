theological_decisions:
- issue: Sense of the closing clause about remembrance
  chosen_reading: whose remembrance is evil against you
  alternative_readings:
  - whose memory is evil
  - whose memorial is evil concerning you
  - evil remembrance clings to you
  rationale: The Ge'ez closing words are textually and lexically difficult, but the
    line appears to condemn the sinners' remembered reputation rather than describe
    a passing emotion. The chosen rendering preserves the judicial/apocalyptic force
    without over-resolving the syntax.
  doctrine_reference: Preserve theological tension rather than resolve it; when uncertain,
    prefer transparent English plus documentation.
