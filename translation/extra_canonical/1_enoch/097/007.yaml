translation:
  text: Woe to you, sinners, who are in the midst of the sea and upon the dry land,
    whose remembrance is evil against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is difficult. It may mean 'your memory is evil,' 'your
      memorial is evil,' or 'evil remembrance clings to you.'
    reason: lexical_alternative
  - marker: b
    text: The pairing 'in the midst of the sea and upon the dry land' likely functions
      as a totalizing image, extending the denunciation everywhere people dwell or
      travel.
    reason: cultural_note
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a prophetic judgment cry. 'Woe' preserves the apocalyptic
    denunciation formula better than the softer 'alas.'
- source_word: ለክሙ
  chosen: to you
  alternatives:
  - for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard dative after an interjection of denunciation; 'to you' fits
    the English woe-formula naturally.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - sinful ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct and conventional rendering for the class under judgment; preserves
    the moral category without paraphrase.
- source_word: እለ
  chosen: who
  alternatives:
  - those who
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative marker introducing the description of the addressed group.
- source_word: ማእከለ ባሕር
  chosen: in the midst of the sea
  alternatives:
  - in the middle of the sea
  - amid the sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A fairly literal rendering of the spatial phrase. Kept vivid rather than
    reduced to a generalized 'at sea.'
- source_word: ወዲበ የብስ
  chosen: and upon the dry land
  alternatives:
  - and on the land
  - and upon dry ground
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Pairs sea and land as a totalizing image. 'Dry land' preserves the marked
    contrast with the sea better than simply 'land.'
- source_word: ዝክርሙ
  chosen: your remembrance
  alternatives:
  - your memory
  - your memorial
  - the remembrance of you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun likely refers to remembered reputation or memorial mention.
    'Remembrance' keeps the ambiguity between memory and memorial record.
- source_word: እኩይ
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple moral predicate; 'evil' best matches the gravity of the denunciation.
- source_word: ዴቤክሙ
  chosen: against you
  alternatives:
  - concerning you
  - clings to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The form is difficult in OCR and may reflect a prepositional or verbal
    nuance. ''Against you'' yields a coherent sense in context: their remembered name/testimony
    stands adversely over them at judgment.'
