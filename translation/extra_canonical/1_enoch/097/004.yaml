theological_decisions:
- issue: Nature of the warning
  chosen_reading: A moral warning that the audience will come to resemble the condemned by associating with sinners
  alternative_readings:
  - A simple statement that they already are sinners
  - A judicial declaration without emphasis on association
  rationale: The verse's force lies in becoming 'like them' and in the quoted accusation of companionship/association. This preserves the ethical and apocalyptic warning without expanding it into a fuller doctrine than the line itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; keep wording locally grounded in the passage.
