lexical_decisions:
- source_word: ትከውኑ
  chosen: you will become
  alternatives:
  - you will be
  - you will come to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future/plural form of the verb 'to be/become.' 'Become' best preserves the sense of coming into a state, which fits the warning context.
- source_word: ከማሆሙ
  chosen: like them
  alternatives:
  - as they are
  - similar to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Comparative expression; 'like them' is the most natural concise English rendering.
- source_word: እለ ሰማዕተ ይከውን
  chosen: those of whom it is heard
  alternatives:
  - those about whom one hears
  - those whose report is heard
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is somewhat awkward in the OCR witness, but it appears to introduce people about whom a saying/report circulates. This rendering preserves the passive/reportive force without over-resolving the syntax.
- source_word: ዴቤሆሙ
  chosen: about them
  alternatives:
  - concerning them
  - against them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as a prepositional sense tied to the reported saying. 'About them' is broad enough to preserve the likely referential force.
- source_word: ዝንቱ ነገር
  chosen: this word
  alternatives:
  - this matter
  - this saying
  - this thing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገር can mean matter/word/saying. In a reportive formula, 'word' or 'saying' fits best; 'word' keeps the phrasing compact while allowing a footnoted alternative.
- source_word: ሱቱፋነ
  chosen: companions
  alternatives:
  - partners
  - associates
  - sharers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes participation or association. 'Companions' communicates moral/social alignment without importing a technical theological sense.
- source_word: ኮንክሙ
  chosen: you have become
  alternatives:
  - you are
  - you became
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Perfect-like form within the quoted accusation; 'have become' captures resultant state and echoes the warning's transformation motif.
- source_word: ለኃጥኣን
  chosen: of sinners
  alternatives:
  - with sinners
  - to sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition with the noun likely marks association. In idiomatic English after 'companions,' 'of sinners' is acceptable, though 'with sinners' remains a viable alternative noted in a footnote.
