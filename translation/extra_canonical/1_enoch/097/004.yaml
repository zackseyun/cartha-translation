  from: those of whom it is heard that this word is said about them
  to: against whom this word will be a witness
  rationale: 'The Ge''ez word ሰማዕተ (samāʿta) means ''witness'' or ''testimony,'' not ''heard.'' The phrase ሰማዕተ ይከውን ዴቤሆሙ ዝንቱ ነገር (samāʿta yəkawwən debehomu zəntu nagar) literally means ''this word will be a witness against them.'' The draft mistranslates the noun as a passive verb of hearing, completely losing the judicial force of the text. | Adjudicator: The reviewer is entirely correct. The Ge''ez word ሰማዕተ (samāʿta) is the predicative form of the noun ሰማዕት (witness/testimony), not a passive verb of hearing. The phrase ሰማዕተ ይከውን ዴቤሆሙ ዝንቱ ነገር literally'
