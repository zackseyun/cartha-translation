translation:
  text: What will you do, you sinners, and where will you flee on that day of judgment,
    when you hear the sound of the prayer of the righteous?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the voice of the prayer of the righteous.' The Ge'ez term can denote
      'voice,' 'sound,' or 'word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ምንተ፡ ትገብሩ
  chosen: What will you do
  alternatives:
  - What are you doing
  - What shall you do
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An interrogative plus imperfect/plural verb naturally yields a future-oriented
    challenge in this woe context. 'Will' preserves the impending judgment sense better
    than a present tense.
- source_word: ኃጥኣን
  chosen: you sinners
  alternatives:
  - sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct address is explicit in context; retaining 'you' preserves the
    prophetic confrontation.
- source_word: አይቴ፡ ትጐይዩ
  chosen: where will you flee
  alternatives:
  - where will you run
  - where will you hasten
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes movement in haste; 'flee' best fits an eschatological
    judgment setting, making explicit the desperate attempt to escape.
- source_word: በይእቲ፡ ዕለት
  chosen: on that day
  alternatives:
  - in that day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal idiom; 'on that day' is idiomatic English and preserves
    apocalyptic register.
- source_word: እንተ፡ ጽነፄ
  chosen: of judgment
  alternatives:
  - of distress
  - of punishment
  - of condemnation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the noun points to punitive reckoning rather than generic
    trouble. 'Judgment' best matches the judicial-apocalyptic force without over-specifying.
- source_word: ሶበ፡ ትሰምዑ
  chosen: when you hear
  alternatives:
  - when you shall hear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal clause with future force; simple modern English fits the project's
    style while preserving sequence.
- source_word: ቃለ፡ ጸሎቶሙ፡ ለጻድቃን
  chosen: the sound of the prayer of the righteous
  alternatives:
  - the voice of the prayer of the righteous
  - the word of the prayer of the righteous
  - the voice of their prayer, of the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ge'ez ቃለ can mean voice/sound/word. With 'prayer' as complement, 'sound'
    or 'voice' is more natural than 'word.' 'The righteous' preserves the substantive
    plural and the moral-judicial category central to the Epistle.
