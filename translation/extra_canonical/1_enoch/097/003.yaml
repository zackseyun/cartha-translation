theological_decisions:
- issue: Meaning of the righteous persons' prayer in the judgment scene
  chosen_reading: The verse depicts the sinners hearing the righteous persons' prayer
    as part of the judicial reversal on the day of judgment.
  alternative_readings:
  - The sinners hear the righteous themselves crying out
  - The phrase refers more broadly to the accusation or testimony of the righteous
  rationale: The Ge'ez explicitly includes 'prayer' rather than only 'voice.' Rendering
    it straightforwardly preserves the text's theology of the righteous appealing
    to heaven for justice without importing later intertextual formulas.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
