lexical_decisions:
- source_word: ተአመኑ
  chosen: Trust
  alternatives:
  - Believe
  - Take courage
  - Be confident
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plural from the verb of believing/trusting. 'Trust' preserves both confidence and faith without over-specifying the object, which the verse leaves implicit.
- source_word: ጻድቃን
  chosen: you righteous
  alternatives:
  - righteous ones
  - the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct address in the plural. 'You righteous' keeps the vocative force better than a bare nominal phrase.
- source_word: ለጽእለት
  chosen: a disgrace
  alternatives:
  - for contempt
  - for reproach
  - for shame
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates a state or destiny of shame/reproach. 'A disgrace' reads naturally in English while preserving the judgment tone.
- source_word: ይከውኑ
  chosen: will become
  alternatives:
  - will be
  - shall come to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future sense of becoming/coming to be. 'Will become' fits the predicative phrase 'a disgrace' more idiomatically than 'will be' while preserving the transformation/result nuance.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - the sinful
  - wrongdoers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard moral-religious designation in judgment context. 'Sinners' preserves the apocalyptic ethical contrast with 'righteous.'
- source_word: ወይትሐጕሉ
  chosen: they will be handed over
  alternatives:
  - they will be delivered up
  - they will be cast down
  - they will be brought low
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is difficult in OCR form, but in context it likely denotes being given over or consigned to judgment. 'Handed over' preserves judicial force without importing later idiom too strongly.
- source_word: በዕለተ ዓመፃ
  chosen: on the day of violence
  alternatives:
  - on the day of oppression
  - on the day of wrongdoing
  - on the day of injustice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase names a climactic day characterized by violent injustice. 'Violence' best preserves the stark apocalyptic register of ዓመፃ.
