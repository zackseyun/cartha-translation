theological_decisions:
- issue: Whether the opening imperative is inward reassurance or specifically religious faith
  chosen_reading: Trust
  alternative_readings:
  - Believe
  - Take courage
  rationale: The context is an exhortation to the righteous before judgment on sinners. 'Trust' preserves both confidence and faith without forcing an explicit object not present in the Ge'ez.
  doctrine_reference: Preserve theological tension rather than resolve it.
