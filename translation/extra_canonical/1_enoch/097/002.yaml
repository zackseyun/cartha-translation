translation:
  text: Know that it shall come upon you, because the Most High remembers your destruction,
    and the angels of heaven rejoice over your destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ruin' or 'your downfall' for both occurrences of the noun rendered
      'destruction.'
    reason: lexical_alternative
  - marker: b
    text: The opening clause is terse in Ge'ez; 'it shall come upon you' brings out
      the threatening sense of the warning.
    reason: lexical_alternative
lexical_decisions:
- source_word: እሙረ
  chosen: Know
  alternatives:
  - Understand
  - Be assured
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperatival force introducing a woe/judgment announcement; 'Know' is
    concise and preserves the direct warning tone.
- source_word: ይከውን ለክሙ
  chosen: it shall come upon you
  alternatives:
  - it will happen to you
  - it will be for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom points to an impending event affecting the addressees; 'come
    upon you' brings out the threatening force in context better than the flatter
    'happen to you.'
- source_word: ልዑል
  chosen: the Most High
  alternatives:
  - the Exalted One
  - the High One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard apocalyptic divine title; 'the Most High' is natural English
    and preserves the elevated register.
- source_word: ይዜከር
  chosen: remembers
  alternatives:
  - will remember
  - calls to mind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez form is naturally rendered as present/future in context. Present
    'remembers' fits the gnomic certainty of divine judgment and keeps the line vivid.
- source_word: ሐጕልክሙ / ሐጕለ ዚአክሙ
  chosen: your destruction
  alternatives:
  - your ruin
  - your downfall
  - your slaughter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes calamity or ruin. 'Destruction' best matches the severity
    of the woe context and works in both repeated occurrences without over-specifying
    the mode of judgment.
- source_word: ይትፌሥሑ
  chosen: rejoice
  alternatives:
  - will rejoice
  - exult
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A strong joy verb. 'Rejoice' is idiomatic and elevated; 'exult' is possible
    but slightly more marked than needed.
- source_word: መላእክተ ሰማይ
  chosen: the angels of heaven
  alternatives:
  - the heavenly angels
  - the angels in heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the genitival construction and apocalyptic imagery intact without
    flattening it to a generic phrase.
