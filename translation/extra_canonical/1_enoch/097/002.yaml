theological_decisions:
- issue: Whether the verse depicts heavenly beings rejoicing at the wicked's judgment
  chosen_reading: Retain the plain sense that the angels of heaven rejoice over the
    addressees' destruction.
  alternative_readings:
  - Soften to 'witness' or 'approve of' your destruction
  - Read the joy as over divine justice rather than directly over the destruction
  rationale: The Ge'ez joy verb is explicit, and the verse's woe rhetoric is intentionally
    severe. Preserving the stark apocalyptic picture is preferable to softening it
    for modern sensibilities.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten apocalyptic imagery.
