translation:
  text: And all the words of your lawlessness shall be read out before the Great Holy One, and And all the words of your lawlessness shall be read out before the Great Holy One, and your faces shall be put to shame, and every deed that is founded in lawlessness shall be rejected., and every deed that is founded in lawlessness shall be rejected.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the matters of your lawlessness,' if ነገረ is taken more broadly than 'words.'
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be rendered 'every deed done in lawlessness shall be cast away'; the underlying verb appears to suggest something established or grounded, but the exact nuance is difficult.
    reason: lexical_alternative
  - marker: c
    text: Or 'your faces shall be covered with shame'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይትነበብ
  chosen: shall be read out
  alternatives:
  - shall be read
  - shall be recited
  - shall be proclaimed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/jussive-future sense in context of judgment disclosure. 'Read out' preserves the public, forensic feel better than the flatter 'read'.
- source_word: ኵሉ ነገረ
  chosen: all the words
  alternatives:
  - everything
  - all the matters
  - every account
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገር can mean word, matter, or thing. Here, with 'shall be read out,' 'words' best fits the imagery of charges or records being publicly read.
- source_word: ዓመፃክሙ
  chosen: your lawlessness
  alternatives:
  - your violence
  - your wrongdoing
  - your injustice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term often carries the sense of rebellious wickedness or violent injustice. 'Lawlessness' preserves the moral-judicial force without narrowing it only to physical violence.
- source_word: ቅድመ ዐቢይ ቅዱስ
  chosen: before the Great Holy One
  alternatives:
  - before the great holy one
  - before the Great and Holy One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a divine title in an apocalyptic judgment setting. Capitalization marks titular use. 'Great Holy One' follows the Ge'ez sequence directly; 'Great and Holy One' is possible but adds a conjunction not present in the cited text.
- source_word: ይትኀፈር ገጽክሙ
  chosen: your faces shall be covered with shame
  alternatives:
  - your faces shall be ashamed
  - your faces shall blush with shame
  - your countenances shall be put to shame
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom centers on the face as the visible bearer of disgrace. 'Covered with shame' brings out the embodied shame imagery more naturally in English than the wooden 'your faces shall be ashamed.'
- source_word: ይገደፍ
  chosen: shall be rejected
  alternatives:
  - shall be cast away
  - shall be abandoned
  - shall be condemned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this judicial context, the sense is that wicked deeds are repudiated or cast off. 'Rejected' is clear and preserves the verdict-like force without overinterpreting as annihilation.
- source_word: ተግባረ
  chosen: deed
  alternatives:
  - work
  - practice
  - action
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A concrete moral act is in view. 'Deed' fits the ethical and judgment context well.
- source_word: ዘጸንዐ በዓመፃ
  chosen: that is founded in lawlessness
  alternatives:
  - that is established in lawlessness
  - that is hardened in lawlessness
  - that is done in lawlessness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests being fixed, established, or grounded. 'Founded in lawlessness' preserves that stronger sense better than the more generic 'done in lawlessness.'
