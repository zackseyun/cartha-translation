translation:
  text: And in those days the prayers of the holy ones will reach the Lord, and the
    days of your judgment will come upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the prayers of the saints.' The Ge'ez term literally means 'holy ones.'
    reason: lexical_alternative
  - marker: b
    text: The final phrase is textually difficult in this witness. It likely refers
      to the coming days of reckoning or punishment for the addressed wicked.
    reason: textual_variant
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal apocalyptic formula. 'Days' preserves the repeated
    idiom and rhetorical cadence better than smoothing to 'times'.
- source_word: ትበጽኅ ጸሎቶሙ
  chosen: the prayers ... will reach
  alternatives:
  - will come
  - will arrive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys arrival or reaching a destination. 'Will reach' fits
    the following prepositional phrase 'to the Lord' and preserves the image of petitions
    ascending.
- source_word: ለቅዱሳን
  chosen: of the holy ones
  alternatives:
  - of the saints
  - of the consecrated ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Holy ones'' is the most transparent and locally grounded rendering
    for this recurring apocalyptic term. ''Saints'' would import later ecclesial associations
    not required by the passage.'
- source_word: ኀበ እግዚእ
  chosen: to the Lord
  alternatives:
  - before the Lord
  - unto the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks direction toward a person. 'To the Lord' is the
    most natural English equivalent while preserving the vertical prayer imagery.
- source_word: ይበጽሕ መዋዕለ ኵነክሙ
  chosen: the days of your judgment will come upon you
  alternatives:
  - the days of your destruction will reach you
  - the days of your punishment will come to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun in this OCR line is difficult, but in context within the woes
    of the Epistle it points to a coming adverse reckoning. 'Judgment' best captures
    the judicial-apocalyptic force without over-specifying physical destruction. 'Come
    upon you' brings out the hostile arrival implied by the verb.
