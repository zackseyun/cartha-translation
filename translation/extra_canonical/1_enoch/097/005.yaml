theological_decisions:
- issue: Identity of ቅዱሳን in this context
  chosen_reading: the holy ones refers to the righteous/faithful whose petitions rise
    to God
  alternative_readings:
  - angels
  - a deliberately broad category including heavenly and earthly holy ones
  rationale: In the Epistle's woe context, the contrast is between oppressive sinners
    and the pious whose cries are heard. 'Holy ones' is retained in translation to
    preserve ambiguity, but the immediate sense likely points to the righteous sufferers
    rather than specifically angels.
  doctrine_reference: Preserve theological tension rather than resolve it; keep major
    terms locally grounded.
