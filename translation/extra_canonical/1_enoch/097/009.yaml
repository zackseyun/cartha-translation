theological_decisions:
- issue: Tone of the rich speakers in the woe context
  chosen_reading: Render the line as a boastful self-exhortation rather than neutral
    narration.
  alternative_readings:
  - A simple statement of intention without moral coloring
  rationale: Within the Epistle's denunciation of the wealthy wicked, the first-person
    plural speech is part of their arrogant confidence. The English should preserve
    that rhetorical force without adding extra words.
  doctrine_reference: Preserve apocalyptic/judgment rhetoric; do not flatten into
    generic prose.
