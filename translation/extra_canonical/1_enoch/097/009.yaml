translation:
  text: And now let us do what we planned, for we have gathered silver, and we have
    filled our storehouses like water, and many are the farmers of our houses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what we thought' or 'what we devised.' The Ge'ez verb can cover both
      thinking and planning.
    reason: lexical_alternative
  - marker: b
    text: '''Like water'' is a literal simile. It likely expresses abundance or overflowing
      fullness.'
    reason: cultural_note
  - marker: c
    text: The word rendered 'farmers' may also mean agricultural workers more generally;
      some uncertainty remains in this clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: ንግበር
  chosen: let us do
  alternatives:
  - we will do
  - let us make
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'First person plural jussive/cohortative sense fits the direct-speech
    boast: a self-exhortation to act on their scheme.'
- source_word: ዘኀለይነ
  chosen: what we planned
  alternatives:
  - what we thought
  - what we devised
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys thinking/planning; in this context of the rich plotting,
    'planned' captures intentional design better than a merely mental 'thought'.
- source_word: ብሩረ
  chosen: silver
  alternatives:
  - money
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The concrete term is 'silver'; retaining it preserves the material imagery
    and avoids flattening into generic 'money'.
- source_word: አስተጋባእነ
  chosen: we have gathered
  alternatives:
  - we have amassed
  - we have collected
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A verb of collecting/bringing together; 'gathered' is straightforward,
    while 'amassed' is possible but slightly more interpretive.
- source_word: መዛግብቲነ
  chosen: our storehouses
  alternatives:
  - our treasuries
  - our خز? treasures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural noun denotes places of storage/treasure. 'Storehouses' fits
    the image of accumulated wealth being physically filled.
- source_word: ከመ ማይ
  chosen: like water
  alternatives:
  - as water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The simile should remain vivid and somewhat strange; it likely conveys
    abundance or overflowing quantity.
- source_word: ሐራስተ
  chosen: farmers
  alternatives:
  - plowmen
  - cultivators
  - laborers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun appears to refer to agricultural workers. 'Farmers' is the clearest
    modern equivalent, though the exact nuance may be broader field-workers.
- source_word: አብያቲነ
  chosen: our houses
  alternatives:
  - our households
  - our estates
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'houses'; in context it may imply households or estates, but
    the more literal rendering preserves the source wording.
