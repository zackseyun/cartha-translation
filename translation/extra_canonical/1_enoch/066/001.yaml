theological_decisions:
- issue: Nature of the punitive agents
  chosen_reading: supernatural 'angels of punishment' charged with unleashing watery
    forces
  alternative_readings:
  - human messengers of judgment
  - angels associated with chastening in a softer disciplinary sense
  rationale: In the Parables, angelic beings regularly administer cosmic judgment.
    The immediate context and the phrase about opening the power of the waters favor
    punitive heavenly agents rather than human figures or merely corrective discipline.
  doctrine_reference: Preserve apocalyptic imagery and judgment formulas; do not flatten
    angelic speech or action into generic prose.
