lexical_decisions:
- source_word: እምድኅረ ዝ
  chosen: after this
  alternatives:
  - after these things
  - afterward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal transition formula in visionary narrative; 'after this'
    is natural English while preserving sequence.
- source_word: አርአየኒ
  chosen: he showed me
  alternatives:
  - he caused me to see
  - he revealed to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct visionary-report verb; 'showed me' preserves the visual force
    without overexpanding.
- source_word: መላእክተ መቅሠፍት
  chosen: the angels of punishment
  alternatives:
  - the angels of chastisement
  - the angels of scourging
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the genitival construction and judicial-apocalyptic tone. 'Punishment'
    is clearer in modern English than 'chastisement' and less physically narrow than
    'scourging'.
- source_word: እለ ይልዋን
  chosen: who are prepared
  alternatives:
  - who are ready
  - who are being readied
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to denote readiness/preparation. 'Are prepared' fits
    the context of commissioned punitive angels poised for action.
- source_word: ከመ ይምጽኡ
  chosen: to come
  alternatives:
  - that they might come
  - in order to come
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Infinitival purpose/result sense after the readiness expression is best
    rendered simply in English as 'to come'.
- source_word: ወይፍትሑ
  chosen: and to open
  alternatives:
  - and to release
  - and to loosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is 'open'; in this apocalyptic context it likely implies
    opening up or releasing destructive waters, but the more literal 'open' preserves
    the imagery and avoids interpretive overreach.
- source_word: ኵሎ ኀይለ ማይ
  chosen: all the power of the waters
  alternatives:
  - all the force of the waters
  - all the might of the water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the concrete cosmic imagery. 'Power' best conveys ኀይለ in an apocalyptic
    setting where elemental forces are unleashed.
