theological_decisions:
- issue: Cosmological/apocalyptic imagery of earth and waters
  chosen_reading: Retain the concrete image of the earth being torn apart upon the
    waters rather than interpret it metaphorically.
  alternative_readings:
  - The earth was shaken over the waters
  - The land was divided by waters
  rationale: The verse belongs to visionary apocalyptic description and should preserve
    its cosmic imagery. A more interpretive rendering would flatten the scene and
    exceed the Ge'ez witness.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; original-language
    primacy over translation tradition.'
