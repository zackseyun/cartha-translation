translation:
  text: And the earth was torn apart upon the waters, and from the hidden places of
    the mountains living waters came forth, from the creation of the world and forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was split' or 'was rent apart'; the Ge'ez verb suggests violent rending.
    reason: lexical_alternative
  - marker: b
    text: '''Living waters'' is kept literally; it may denote fresh, flowing, or life-giving
      waters, but the imagery is left open in the main text.'
    reason: lexical_alternative
  - marker: c
    text: 'The closing phrase is temporal: ''from the creation of the world and forever,''
      expressing a span from the world''s beginning onward without resolving whether
      the sense is strictly retrospective, prospective, or both.'
    reason: alternative_reading
lexical_decisions:
- source_word: ተሳረረት
  chosen: was torn apart
  alternatives:
  - was split
  - was rent apart
  - was shattered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys rending or splitting rather than a mild disturbance.
    'Was torn apart' preserves the apocalyptic violence of the image without over-specifying
    the mechanism.
- source_word: ዲበ ማይ
  chosen: upon the waters
  alternatives:
  - over the waters
  - on the waters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition most naturally means 'upon/on/over.' 'Upon the waters'
    keeps the elevated register and preserves the cosmological imagery.
- source_word: ኅቡኣተ አድባር
  chosen: the hidden places of the mountains
  alternatives:
  - the secret places of the mountains
  - the hidden things of the mountains
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to concealed recesses or hidden regions associated
    with the mountains. 'Hidden places' is idiomatic and preserves the mysterious,
    subterranean sense.
- source_word: ኅሑያን ማያት
  chosen: living waters
  alternatives:
  - living water
  - fresh waters
  - flowing waters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a marked expression and should be preserved literally rather
    than reduced to 'fresh' or 'flowing.' The singular would sound less natural in
    English with the plural context.
- source_word: ይመፅኡ
  chosen: came forth
  alternatives:
  - came out
  - issued forth
  - emerged
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Came forth'' fits the visionary register and the image of waters issuing
    from hidden mountain sources.'
- source_word: እምፍጥረተ ዓለም
  chosen: from the creation of the world
  alternatives:
  - since the creation of the world
  - from the world's creation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is temporal. 'From the creation of the world' is a close rendering,
    though in English it may imply duration; the following phrase clarifies the continuing
    span.
- source_word: ወእስከ ለዓለም
  chosen: and forever
  alternatives:
  - and unto eternity
  - and until eternity
  - even forever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This closing temporal formula extends the scope indefinitely. 'And forever'
    is readable modern English while retaining the solemn force.
