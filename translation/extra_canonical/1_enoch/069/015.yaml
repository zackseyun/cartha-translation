theological_decisions:
- issue: Whether to render the hand-idiom concretely or interpretively
  chosen_reading: into the hand of Mika'el
  alternative_readings:
  - under Mika'el's authority
  - to Mika'el
  rationale: The Ge'ez wording is concrete and image-rich. In apocalyptic literature, preserving such imagery is preferable unless the literal wording becomes misleading. The idiom likely implies entrustment of authority, but the main text retains the hand-language and leaves the implication transparent.
  doctrine_reference: Translation philosophy §§1, 3, 5
