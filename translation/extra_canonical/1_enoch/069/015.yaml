translation:
  text: And this is the power of this oath, for it is mighty and firm; and he placed this oath, Aka'e, into the hand of Mika'el.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'into the hand of Mika'el,' an idiom of entrusting or placing under authority.
    reason: lexical_alternative
  - marker: b
    text: Or "And this is the power of that oath, for it is mighty and firm; and he placed that oath into the hand of Mika'el.".
    reason: previous_rendering
lexical_decisions:
- source_word: ኃይሉ
  chosen: the power
  alternatives:
  - the strength
  - the force
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes strength or power. 'Power' best preserves the solemn efficacy of the oath in this apocalyptic context, rather than mere physical strength.
- source_word: ማሐላ
  chosen: oath
  alternatives:
  - swearing
  - curse-oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated term refers to the oath under discussion in the surrounding context. 'Oath' is the most direct and contextually stable rendering; stronger options like 'curse-oath' would over-specify what this verse itself does not explicitly mark.
- source_word: ኃያል
  chosen: mighty
  alternatives:
  - powerful
  - strong
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used predicatively of the oath, this adjective emphasizes potency. 'Mighty' fits the elevated register of the Parables and avoids flattening the apocalyptic tone.
- source_word: ፅኑዕ
  chosen: firm
  alternatives:
  - steadfast
  - secure
  - strong
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective conveys stability or fixedness. 'Firm' pairs naturally with 'mighty' and preserves the sense that the oath is established and unshakable.
- source_word: አንበሮ
  chosen: he placed
  alternatives:
  - he set
  - he appointed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means to place or set. 'Placed' is concrete and preserves the imagery of entrusting the oath, whereas 'appointed' would interpret more abstractly.
- source_word: በእዴሁ
  chosen: into the hand
  alternatives:
  - in his hand
  - under his authority
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom literally refers to the hand and commonly signals entrustment or authority. The main text keeps the concrete image; the implied sense of entrusting authority is left for readers and footnote.
- source_word: ለሚካኤል
  chosen: of Mika'el
  alternatives:
  - of Michael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Per project philosophy, names are transliterated rather than translated into traditional Anglicized forms. 'Mika'el' reflects the Ge'ez form while remaining recognizable.
