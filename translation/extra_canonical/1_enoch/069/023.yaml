translation:
  text: And there the voice of the thunder and the light of the lightning are kept, and there are kept the storehouses of the hail and the storehouses of the hoarfrost, and the storehouses of the mist, and the storehouses of the rain and the dew.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The term rendered 'mist' is uncertain in this Ethiopic-only context; possible alternatives include 'frost,' 'hoarfrost,' or 'ice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the storehouses of the mist, and the storehouses of the cloud and of the rain and the dew.'.
    reason: previous_rendering
lexical_decisions:
- source_word: በህየ
  chosen: there
  alternatives:
  - in that place
  - therein
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locative adverb marking the visionary location; 'there' is clear and preserves the repeated spatial emphasis.
- source_word: ይትዓቀቡ / ይትዓቀብ
  chosen: are kept
  alternatives:
  - are guarded
  - are stored
  - are preserved
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/reflexive sense fits the repeated description of heavenly repositories. 'Are kept' is broad enough to cover both guarding and storing without over-specifying.
- source_word: ቃሉ ለነጐድጓድ
  chosen: the voice of the thunder
  alternatives:
  - the sound of the thunder
  - the word of the thunder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቃል can mean 'word,' 'voice,' or 'sound.' In this meteorological context, 'voice' preserves the vivid personified/apocalyptic register better than the flatter 'sound.'
- source_word: ብርሃኑ ለመብረቅ
  chosen: the light of the lightning
  alternatives:
  - the brightness of the lightning
  - its flash of lightning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ብርሃን is 'light/brightness.' 'The light of the lightning' keeps the parallelism with 'voice of the thunder' and preserves the concrete imagery.
- source_word: መዛግብተ
  chosen: storehouses
  alternatives:
  - treasuries
  - repositories
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard apocalyptic/cosmic term for heavenly reserves of natural forces. 'Storehouses' is idiomatic English and preserves the concrete image better than the more abstract 'repositories.'
- source_word: በረድ
  chosen: hail
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward meteorological term.
- source_word: አስሐትያ
  chosen: mist
  alternatives:
  - hoarfrost
  - frost
  - ice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is textually difficult in this Ge'ez-only context. 'Mist' best fits the sequence of atmospheric phenomena in this verse while avoiding false precision; alternatives are preserved in a footnote.
- source_word: ጊሜ
  chosen: cloud
  alternatives:
  - fog
  - dense cloud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as 'cloud' to maintain the progression of weather-storehouses and because it best suits the pairing with rain and dew.
- source_word: ዝናም
  chosen: rain
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard term for rain.
- source_word: ጠል
  chosen: dew
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard term for dew; retained to preserve the full list of cosmic storehouses.
