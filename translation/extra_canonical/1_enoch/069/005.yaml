lexical_decisions:
- source_word: ካልእ
  chosen: another
  alternatives:
  - the other
  - a second
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces another named figure in the list; 'another' is the most natural sequential rendering in English.
- source_word: ስሙ
  chosen: whose name was
  alternatives:
  - his name was
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Combined idiomatically with the preceding noun phrase in English to avoid stiffness while preserving the naming formula.
- source_word: አስብኤል
  chosen: Asbe'el
  alternatives:
  - Asbel
  - Asb'el
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal names are transliterated rather than translated; the apostrophe helps preserve the Semitic-style theophoric shape reflected in the Ge'ez form.
- source_word: ዝንቱ
  chosen: this one
  alternatives:
  - this
  - he
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the demonstrative emphasis that marks the named figure out for explanation.
- source_word: አመርሙ
  chosen: taught
  alternatives:
  - made known
  - instructed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Best fits the causative/instructional sense in context: the figure imparts corrupt teaching.'
- source_word: ምክረ እኩየ
  chosen: the evil counsel
  alternatives:
  - evil counsel
  - wicked counsel
  - evil plan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the concrete apocalyptic sense of corrupt advice or plotting; 'counsel' is preferable to the flatter 'plan'.
- source_word: ለደቂቀ መላእክት ቅዱሳን
  chosen: to the holy sons of the angels
  alternatives:
  - to the sons of the holy angels
  - to the holy angelic sons
  - to the children of the holy angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is syntactically difficult in Ge'ez. A literal rendering preserving both 'sons' and 'angels' is preferable to over-resolving it. The wording likely refers to angelic beings, but the exact relation of 'holy' and 'angels' is uncertain, so the translation stays close to the surface form.
- source_word: አስሐቶሙ
  chosen: led them astray
  alternatives:
  - deceived them
  - caused them to err
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Captures both deception and moral deviation in a way suitable to the rebellion context.
- source_word: ከመ ያማስኑ
  chosen: so that they defiled
  alternatives:
  - that they might defile
  - to make them defile
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresses result/purpose naturally in English while preserving the impurity language.
- source_word: ሥጋሆሙ
  chosen: their bodies
  alternatives:
  - their flesh
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although literally 'their flesh,' 'bodies' communicates the concrete sexual defilement more clearly in modern English. The lexical alternative is preserved in a footnote because 'flesh' may be important for readers tracking the imagery.
- source_word: በአዋልደ ሰብእ
  chosen: with the daughters of men
  alternatives:
  - with the daughters of humankind
  - by the daughters of men
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard and transparent rendering for the human women in the Watchers tradition; 'with' best conveys the sexual union implied by the defilement formula.
