theological_decisions:
- issue: How to render the difficult phrase ለደቂቀ መላእክት ቅዱሳን
  chosen_reading: the holy sons of the angels
  alternative_readings:
  - the sons of the holy angels
  - the holy sons of God/angels
  rationale: Because the Parables are effectively Ge'ez-only here and the syntax is uncertain, the translation preserves the lexical components rather than normalizing the phrase into a more familiar Watchers formula. This keeps the line auditable and avoids importing a smoother traditional reading without warrant.
  doctrine_reference: Preserve theological tension rather than resolve it; when uncertain, prefer transparent English over false confidence.
- issue: Whether to render ሥጋ as 'flesh' or 'bodies'
  chosen_reading: bodies
  alternative_readings:
  - flesh
  rationale: The immediate context is sexual corruption and bodily defilement. 'Bodies' is clearer for modern readers, but the more literal 'flesh' remains viable and is noted in a footnote.
  doctrine_reference: Optimal equivalence with documented exception for context-sensitive rendering of terms equivalent to 'flesh'.
