theological_decisions:
- issue: Identity of the 'holy ones'
  chosen_reading: heavenly holy ones/angelic beings
  alternative_readings:
  - human saints
  - an intentionally ambiguous holy assembly
  rationale: Within the Parables' heavenly revelation setting, 'holy ones' most naturally refers to celestial beings rather than later Christian 'saints.' The translation keeps the phrase literal and does not force a doctrinally loaded interpretation in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; keep major terms locally grounded in the passage.
- issue: Force of 'oath' in the revealed-name context
  chosen_reading: retain 'oath' literally
  alternative_readings:
  - secret adjuration
  - mystic name bound to an oath
  rationale: The Ge'ez directly supports 'oath,' and the translation should not expand into speculative occult terminology. A footnote can signal the broader semantic possibility without moving beyond the witness.
  doctrine_reference: Original-language primacy over translation tradition; do not paraphrase beyond the witness.
