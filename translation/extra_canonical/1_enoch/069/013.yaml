translation:
  text: This is the number of Kasbeel, the chief of the oath which he showed to the holy ones when he dwelt in glory on high, and its name is Biqa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief of the adjuration'; the Ge'ez term commonly means 'oath,' but in this context it may denote a solemn revealed formula bound up with a name.
    reason: lexical_alternative
  - marker: b
    text: '''Holy ones'' likely refers to heavenly beings in this visionary setting, though the phrase is left literal in the translation.'
    reason: cultural_note
  - marker: c
    text: The final pronoun could be understood as referring either to the revealed name/formula or, less likely, to Kasbeel himself.
    reason: alternative_reading
  - marker: d
    text: Or 'third name'.
    reason: previous_rendering
lexical_decisions:
- source_word: ጐልቁ
  chosen: third name
  alternatives:
  - third
  - the third
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context this term introduces a numbered item in a sequence of names or designations. Rendering it as 'third name' makes explicit the implied nominal sense required by the surrounding syntax ('This is the ... of Kasbeel').
- source_word: ካስብኤል
  chosen: Kasbeel
  alternatives:
  - Kasbiel
  - Qasbeel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal names are transliterated rather than translated, following project philosophy. 'Kasbeel' stays close to the Ge'ez form supplied here.
- source_word: ርእሰ
  chosen: chief
  alternatives:
  - head
  - leader
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun literally means 'head,' but in English 'chief' best conveys rank or primacy in this angelic/apocalyptic context without sounding wooden.
- source_word: ማሐላ
  chosen: oath
  alternatives:
  - swearing
  - curse-oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The standard sense is 'oath.' Because the broader Enochic context treats revealed heavenly names as bound up with adjuration, 'oath' is retained in the main text; more expansive possibilities are noted in a footnote.
- source_word: ዘአርአዩ
  chosen: which he showed
  alternatives:
  - which he revealed
  - which he made known
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is a causative/showing verb. 'Showed' preserves the visionary register and keeps close to the Ge'ez wording, while still allowing revelatory force in context.
- source_word: ለቅዱሳን
  chosen: to the holy ones
  alternatives:
  - to the saints
  - to the holy beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural 'holy ones' preserves the apocalyptic idiom and avoids importing later ecclesiastical overtones of 'saints.'
- source_word: ሶበ ኆደሩ
  chosen: when he dwelt
  alternatives:
  - when he sat
  - when he remained
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause marks the time or circumstance of the revelation. 'Dwelt' fits the elevated register and coheres with the following locative phrase.
- source_word: በልዑል በስብሐት
  chosen: in glory on high
  alternatives:
  - in the height of glory
  - in the exalted glory
  - in high glory
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired expressions combine exalted location and glory. 'In glory on high' preserves both ideas in idiomatic English without over-paraphrasing.
- source_word: ወስሙ ቢቃ
  chosen: and its name is Biqa
  alternatives:
  - and his name is Biqa
  - and the name is Biqa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix most naturally refers back to the revealed 'name' or oath-name just mentioned, not necessarily to Kasbeel himself. 'Its name' preserves that likely referent while leaving some ambiguity visible.
