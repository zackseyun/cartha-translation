translation:
  text: And he taught humankind writing with ink and paper, and because of this many
    have gone astray from eternity to eternity, even to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The object phrase is textually difficult in the Ethiopic and may refer more
      generally to harmful writings or written arts rather than literal tablets.
    reason: textual_variant
  - marker: b
    text: Or 'from age to age'; the repeated term for 'age/eternity' is kept in elevated
      form to preserve the apocalyptic cadence.
    reason: lexical_alternative
  - marker: c
    text: Or 'he gave to humankind the writing tablets of bitterness and deceit'.
    reason: previous_rendering
lexical_decisions:
- source_word: አበወዎሙ
  chosen: he gave to them
  alternatives:
  - he delivered to them
  - he handed over to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the common Ge'ez verb of giving/delivering. In context the
    subject is the named angel from the preceding verse, and the indirect object is
    humankind.
- source_word: ለሰብእ
  chosen: to humankind
  alternatives:
  - to men
  - to people
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes human beings collectively. 'Humankind' preserves the
    collective sense without sounding male-exclusive.
- source_word: መጽሐፈ
  chosen: writing tablets
  alternatives:
  - book
  - scroll
  - writing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun often means book or writing, but here it governs paired abstract
    genitives and likely refers to written arts or written records imparted to humans.
    'Writing tablets' keeps the concrete ancient sense while allowing the instructional
    nuance.
- source_word: በጣየ
  chosen: of bitterness
  alternatives:
  - of gall
  - of poison
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word is difficult, but 'bitterness' best preserves the moral and
    harmful quality without over-specifying a physical substance.
- source_word: ኀመት
  chosen: and deceit
  alternatives:
  - and fraud
  - and treachery
  - and falsehood
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this vice-list context the sense is moral deception. 'Deceit' is concise
    and idiomatic.
- source_word: ወአርታስ
  chosen: writing tablets
  alternatives:
  - records
  - documents
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Taken with መጽሐፈ as part of the object phrase describing written media
    or instruction. Because the OCR is uncertain, the English keeps a cautious rendering
    rather than forcing a narrower technical term.
- source_word: ብዙኃን
  chosen: many
  alternatives:
  - multitudes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward quantitative term; 'many' fits the warning tone.
- source_word: እለ ይስሕቱ
  chosen: go astray
  alternatives:
  - err
  - are led astray
  - sin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys wandering into error. 'Go astray' preserves both moral
    and cognitive deviation.
- source_word: እምዓለም ወእስከ ለዓለም
  chosen: from eternity to eternity
  alternatives:
  - forever and ever
  - from age to age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated ዓለም language is formulaic. 'From eternity to eternity' preserves
    the elevated apocalyptic register and repetition better than a flattened idiom.
- source_word: ወእስከ ዛቲ ዕለት
  chosen: even to this day
  alternatives:
  - until this day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal expression; 'even to this day' fits the denunciatory
    tone.
