theological_decisions:
- issue: Nature of the object given to humanity
  chosen_reading: A written medium associated with harmful knowledge ('writing tablets
    of bitterness and deceit')
  alternative_readings:
  - a book of bitterness and wrath
  - writings of bitterness and injustice
  rationale: The Ge'ez wording is difficult and the Parables lack Greek or Aramaic
    control here. The translation preserves the idea of transmitted written knowledge
    without overcommitting to a specific reconstructed phrase.
  doctrine_reference: Preserve theological tension rather than resolve it; in Ge'ez-only
    Parables, be especially transparent about uncertainty.
