  rationale: 'The phrase እምድኅረ ዝ ኵነኔ (ʾəm-dəḫra zə kʷənnane) means ''after this judgment.'' The draft incorrectly splits this phrase, making ''judgment'' the subject of the following verbs. However, the verbs ያደነገፅዎሙ (yādannagəṣəwwomu) and ያምዕፅዎሙ (yāmʿəṣəwwomu) both carry the 3rd-person plural subject suffix (-wwomu), meaning ''they will [verb] them.'' The singular ''judgment'' cannot be the subject. Furthermore, the root of ያምዕፅዎሙ is መዐፀ (maʿaṣa), which means ''to oppress, do violence, act unjustly'' (Dillmann), not '' | Adjudicator: The reviewer is correct on both grammatical and lexical grounds. The phrase `እምድኅረ ዝ ኵነኔ` (ʾəm-dəḫra zə kʷənnane) translates as ''after this judgment,'' not ''after this, the judgment.'' Furthermore, the '
