translation:
  text: And after this judgment, they will terrify them and oppress them, because they showed this to those who dwell upon the dry land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after these things.' The Ge'ez transition marks sequence in the vision.
    reason: lexical_alternative
  - marker: b
    text: '''Dry land'' is more literal than ''earth'' here and may preserve a cosmological contrast rather than simply meaning humanity in general.'
    reason: lexical_alternative
  - marker: c
    text: The referent of 'this' is left implicit in the verse and likely points back to the preceding revealed matter; the Ge'ez does not specify it here.
    reason: alternative_reading
  - marker: d
    text: Or 'And after this, the judgment will terrify them and drive them away'.
    reason: previous_rendering
lexical_decisions:
- source_word: እምድኅረ ዝ
  chosen: after this
  alternatives:
  - after these things
  - afterward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal transition in narrative/apocalyptic sequence; 'after this' preserves the visionary progression without sounding overly wooden.
- source_word: ኵነኔ
  chosen: the judgment
  alternatives:
  - judgment
  - condemnation
  - sentence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes judicial action or sentence. With the article-like force in context, 'the judgment' fits apocalyptic courtroom imagery better than the more abstract 'judgment' alone.
- source_word: ያደነገፅዎሙ
  chosen: will terrify them
  alternatives:
  - will alarm them
  - will make them tremble
  - will confound them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys causing fear or shock. 'Will terrify them' preserves the force of eschatological dread more clearly than the milder 'alarm'.
- source_word: ያምዕፅዎሙ
  chosen: drive them away
  alternatives:
  - expel them
  - cast them out
  - scatter them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests thrusting away or forcing off. 'Drive them away' is vivid and readable, while leaving open whether the action is judicial expulsion or panicked flight.
- source_word: እስመ
  chosen: because
  alternatives:
  - for
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the reason for the coming judgment; 'because' is the clearest modern English causal connector.
- source_word: ዘንተ አርአዩ
  chosen: they showed this
  alternatives:
  - they revealed this
  - they made this seen
  - they disclosed this
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally involves showing or making visible. 'Showed this' is simple and close to the Ge'ez, while allowing the referent 'this' to remain as undefined in English as in the source.
- source_word: ለእለ የኀድሩ
  chosen: to those who dwell
  alternatives:
  - to those who live
  - to the inhabitants who remain
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A participial expression for inhabitants or dwellers. 'Those who dwell' preserves the elevated register suitable to apocalyptic prose.
- source_word: ዲበ የብስ
  chosen: upon the dry land
  alternatives:
  - on the earth
  - upon the land
  - on dry ground
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: የብስ commonly denotes dry land as opposed to sea/waters. 'Upon the dry land' keeps the concrete cosmological image rather than flattening it to the generic 'earth'.
