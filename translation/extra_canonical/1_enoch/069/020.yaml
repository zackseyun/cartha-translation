translation:
  text: And by that oath the sun and the moon complete their courses, and they do
    not transgress their command forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their circuits.' The Ge'ez term refers to the regular movement of the
      heavenly bodies.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not overstep their command/ordinance.' The wording presents the sun
      and moon as remaining within the limit imposed on them.
    reason: lexical_alternative
  - marker: c
    text: The final phrase may also be understood as 'forever' or 'from of old'; the
      Ge'ez expression carries a broad sense of enduring time.
    reason: alternative_reading
  - marker: d
    text: Or 'and they do not transgress their command from eternity.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ማሐላ
  chosen: oath
  alternatives:
  - swearing
  - solemn oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes an oath or sworn adjuration. In this context, the preceding
    discussion concerns cosmic order established by a binding oath, so 'oath' preserves
    the juridical-apocalyptic force better than a verbal paraphrase.
- source_word: በውእቱ
  chosen: by that
  alternatives:
  - in that
  - through that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The preposition with the demonstrative most naturally marks instrument
    or means here: the sun and moon act ''by'' or ''through'' that oath. ''By that''
    is concise and idiomatic.'
- source_word: ፀሐይ ወወርኅ
  chosen: the sun and the moon
  alternatives:
  - sun and moon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired heavenly bodies are personified cosmic actors in apocalyptic
    style. Including the articles in English gives the line a slightly elevated, definite
    sense without overtranslation.
- source_word: ይፌጽሙ
  chosen: complete
  alternatives:
  - finish
  - fulfill
  - carry out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb here describes bringing their appointed motion to completion.
    'Complete' fits the celestial context and avoids overreading the term as moral
    obedience alone.
- source_word: ምሕዋሮሙ
  chosen: their courses
  alternatives:
  - their circuits
  - their journeys
  - their paths
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of sun and moon, the noun refers to their cyclical movement
    or orbit-like course. 'Courses' is natural English for regular heavenly motion
    and preserves the cosmic imagery.
- source_word: ወኢየሐልፉ
  chosen: and they do not transgress
  alternatives:
  - and they do not pass beyond
  - and they do not overstep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally suggests passing beyond or overstepping. 'Transgress'
    preserves both the boundary sense and the moralized apocalyptic register of obedient
    creation under divine order.
- source_word: እምትእዛዞሙ
  chosen: their command
  alternatives:
  - their ordinance
  - their appointed order
  - their instruction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote command or order. Singular 'command' is retained
    because the Ge'ez form appears singular with pronominal suffix, likely referring
    to the command laid upon them rather than commands they issue.
- source_word: እምዓለም
  chosen: from eternity
  alternatives:
  - forever
  - from of old
  - for eternity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is somewhat flexible, but here it most plausibly marks enduring
    temporal scope. 'From eternity' preserves the elevated register and the sense
    of primordial, ongoing cosmic stability.
