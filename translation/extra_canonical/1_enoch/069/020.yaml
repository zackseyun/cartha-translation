theological_decisions:
- issue: Whether the verse should be rendered in purely astronomical language or retain
    covenantal/juridical overtones
  chosen_reading: Retain oath and transgress language in the main text
  alternative_readings:
  - Use neutral astronomical wording such as 'follow their cycles' and 'do not deviate
    from their order'
  rationale: The immediate Ge'ez wording includes an oath and a verb of overstepping/transgressing.
    In apocalyptic literature, creation's regularity is often framed as obedience
    to divine decree. Preserving that register fits the text without importing later
    theology.
  doctrine_reference: Translation philosophy §§1, 3, 5
