translation:
  text: And likewise heaven, the spirits of the winds, and all the spirits, and their
    paths from all the gatherings of spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic text of this line is difficult, especially in the middle and
      final phrases. 'Received' is supplied in English to make the syntax intelligible;
      the underlying wording may also be understood more literally but less clearly.
    reason: textual_variant
  - marker: b
    text: The term rendered 'paths' may also mean 'ways,' 'courses,' or 'movements.'
    reason: lexical_alternative
  - marker: c
    text: The final phrase could also be understood as referring to every 'company'
      or 'assembly' of spirits.
    reason: lexical_alternative
  - marker: d
    text: Or 'heaven received their spirits, and all the spirits and their paths from
      every gathering of spirits.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሰማይ
  chosen: heaven
  alternatives:
  - the heavens
  - sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular form here works naturally as a collective/cosmic realm in
    apocalyptic context. 'Heaven' preserves the visionary register better than 'sky,'
    while avoiding an unnecessary plural unless the context clearly demands it.
- source_word: ነፋሳቲሆሙ
  chosen: their spirits
  alternatives:
  - their souls
  - their breaths
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun built from the Semitic root for breath/spirit can denote spirit
    or soul. In this judgment-vision setting, 'spirits' best fits the cosmological
    and postmortem sense without importing later technical distinctions.
- source_word: ለነፋሳት
  chosen: received ... spirits
  alternatives:
  - for spirits
  - the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The syntax is difficult in the OCR witness. The lamed-marked phrase appears
    to function with the preceding clause in a way that yields the sense of heaven
    taking or receiving spirits. Because the verse is elliptical, the English supplies
    'received' to make the clause intelligible while staying close to the apparent
    sense.
- source_word: መንፈሳት
  chosen: spirits
  alternatives:
  - winds
  - spiritual beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the term can overlap with wind/breath language, the repeated
    use in this verse and the surrounding context favor 'spirits' as the governing
    sense.
- source_word: ወፍናዋቲሆሙ
  chosen: their paths
  alternatives:
  - their ways
  - their goings out
  - their courses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is obscure, but likely refers to movements, ways, or courses.
    'Paths' preserves the apocalyptic sense of ordered movement without overcommitting
    to a more technical cosmological term.
- source_word: እምኵሉ ኅብራት
  chosen: from every gathering
  alternatives:
  - from every company
  - from every assembly
  - from all associations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to denote collective groupings or assemblages. 'Gathering'
    is broad enough to preserve ambiguity about whether these are classes of spirits,
    hosts, or assembled companies.
