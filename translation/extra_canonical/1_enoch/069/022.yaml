theological_decisions:
- issue: Whether to distinguish 'spirits' from 'souls' in an afterlife/judgment context
  chosen_reading: Render both relevant spirit-terms as 'spirits'
  alternative_readings:
  - render one or both as 'souls'
  rationale: The verse's imagery is cosmological and apocalyptic rather than anthropological
    in a later doctrinal sense. 'Spirits' preserves the text's own register and avoids
    imposing a sharper body-soul schema than the Ge'ez requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
