  rationale: 'Adjudicator-modified: The reviewer is entirely correct regarding the Ge''ez grammar. The text uses the plural construct ''ዝብጠታተ'' (zəbṭatä, ''blows of'') for the spirits/demons and the womb, but switches to the singular construct ''ዝብጠተ'' (zəbṭata, ''blow of'') for the soul and the noon-day demon. The current English incorrectly harmonizes the third instance to a plural. I am using ''modify'' simply to provide the full verse text for a clean replacement.'
