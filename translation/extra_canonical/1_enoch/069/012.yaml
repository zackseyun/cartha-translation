  rationale: 'Adjudicator-modified: The reviewer is correct that the Ge''ez forms a direct construct chain (zəbṭatä ba''ba''a māḥḍan, ''blows of the embryo of the womb''), which the current translation breaks up by moving ''embryo'' to the next clause. However, rendering this literally as ''blows of the embryo'' in English creates an awkward subjective genitive, implying the embryo is doing the striking. Modifying the proposal to ''blows to the embryo'' accurately reflects the objective genitive of the Ge''ez construct chain while maintaining'
