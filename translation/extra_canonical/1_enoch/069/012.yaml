  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This apocalyptic expression is kept in elevated traditional form rather than flattened to generic modern prose.
- source_word: ኵሎ ዝብጠታተ እኩየ
  chosen: all the evil blows
  alternatives:
  - all the evil smitings
  - all the harmful afflictions
  - all the wicked strikes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated noun appears to denote striking, smiting, or afflicting forces. 'Blows' preserves the vivid physical imagery and allows the repetition in the verse to remain audible.
- source_word: ዘነፍሳት ወዘአጋንንት
  chosen: of spirits and of demons
  alternatives:
  - of souls and of demons
  - of spirits and evil spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pairing likely distinguishes classes of harmful spiritual beings or agencies. 'Spirits and demons' preserves the distinction without collapsing the terms.
- source_word: ባእባአ ማሕፀን
  chosen: in the womb
  alternatives:
  - of the womb
  - against the womb
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase refers to affliction associated with pregnancy or the womb; 'in the womb' is the clearest restrained rendering.
- source_word: ከመ ይደቅ
  chosen: so that the embryo miscarries
  alternatives:
  - so that it falls out
  - so that the child is aborted
  - so that it drops
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause describes the harmful result of the womb-affliction. 'Miscarries' communicates the sense in readable English while retaining the tragic force.
- source_word: '[ዝብጠተ ነፍስ]'
  chosen: the blows upon the soul
  alternatives:
  - the affliction of the soul
  - the smiting of life
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR marks this phrase as uncertain, but the likely sense is another item in the list of harmful strikes. 'Soul' is retained rather than reduced to 'life' because the surrounding list includes spiritual agencies.
- source_word: ንስክተ አርዌ
  chosen: the bite of the serpent
  alternatives:
  - the serpent's bite
  - the sting of the serpent
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A concrete harmful act is intended. 'Bite' is the most straightforward image for serpent attack.
- source_word: ዘይከውን በቀትር
  chosen: that comes at noon
  alternatives:
  - that happens at midday
  - that occurs at noonday
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The temporal phrase is preserved literally; noon may carry ominous force, so it should not be generalized away.
- source_word: ወልዳ ለአርዌ
  chosen: the son of the serpent
  alternatives:
  - the offspring of the serpent
  - the child of the serpent
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A filial expression is explicit in the Ge'ez. 'Son' preserves the mythic-apocalyptic register better than the more biological 'offspring'.
- source_word: ዘስሙ ተባዕት
  chosen: whose name is Taba'et
  alternatives:
  - whose name is Tabāʿet
  - named Tabaet
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Proper name transliterated conservatively from the Ge'ez; exact vocalization is uncertain.
