theological_decisions:
- issue: Nature of the harms taught by Kasdeya
  chosen_reading: A list of occult or demonic afflictions, including miscarriage, spiritual harm, serpent-bite, and a noonday strike
  alternative_readings:
  - General knowledge of weapons or physical injuries
  - A list of magical formulas rather than afflictions themselves
  rationale: The repeated 'blows/smitings' language, together with spirits, demons, womb, soul, and serpent imagery, points to harmful agencies or afflictions rather than neutral technical knowledge.
  doctrine_reference: Preserve apocalyptic imagery and do not flatten cosmic or demonic language into generic prose.
- issue: Reference of the final phrase 'the son of the serpent whose name is Taba'et'
  chosen_reading: It apposes or further specifies the noonday blow/serpentine harm rather than introducing a wholly separate narrative figure
  alternative_readings:
  - A separate demon taught by Kasdeya
  - A gloss identifying the serpent itself
  rationale: The syntax is compressed and difficult, but the final phrase most naturally continues the list of harmful powers. A footnote preserves the uncertainty.
  doctrine_reference: Preserve theological tension rather than resolve genuine ambiguity.
