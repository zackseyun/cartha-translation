translation:
  text: 'And the fifth was named Kasdeya. This is the one who showed the children of men all the evil blows of spirits and of demons, and the blows to the embryo of the womb, so that it miscarries, and And the fifth was named Kasdeya. This is the one who showed the children of men all the evil blows of spirits and of demons, and the blows in the womb, so that the embryo miscarries, and the blow upon the soul: the bite of the serpent, and the blow that comes at noon—the son of the serpent whose name is Taba''et.: the bite of the serpent, and the blow that comes at noon—the son of the serpent whose name is Taba''et.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The repeated Ge'ez term rendered 'blows' can also be understood more broadly as 'smitings,' 'afflictions,' or harmful strikes.
    reason: lexical_alternative
  - marker: b
    text: The clause about the womb is difficult. The sense appears to be harm done in pregnancy resulting in miscarriage.
    reason: textual_variant
  - marker: c
    text: The phrase 'the blows upon the soul' is textually uncertain in this witness; the translation follows the probable reading indicated by the OCR.
    reason: textual_variant
  - marker: d
    text: Or 'the blow that happens at midday.' The final words may identify this noonday harm with a serpentine being named Taba'et.
    reason: alternative_reading
  - marker: e
    text: Or 'the blows in the womb, so that the embryo miscarries'.
    reason: previous_rendering
  - marker: f
    text: Or 'the blows upon the soul'.
