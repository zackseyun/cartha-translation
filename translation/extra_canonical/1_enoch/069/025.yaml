theological_decisions:
- issue: Whether the verse describes moral obedience, legal binding, or cosmic order
    under the oath
  chosen_reading: 'The verse is rendered to preserve ambiguity: the oath firmly orders
    and keeps those under it, and their paths/courses remain intact.'
  alternative_readings:
  - The oath binds angelic beings to obedience
  - The oath preserves the ordered courses of cosmic elements
  - The oath both constrains beings and stabilizes cosmic order
  rationale: In the Parables, oath language can carry both juridical and cosmic force.
    The paired references to 'paths' and 'courses' suggest ordered movement, but the
    passive 'they were kept by it' also implies binding force. The translation avoids
    collapsing these into a single modern category.
  doctrine_reference: Preserve theological tension rather than resolve it.
