translation:
  text: And over them this oath became strong, and they are kept by it; and their
    paths are kept, and their courses do not perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ways were guarded, and their circuits do not fail.' The Ge'ez
      wording allows either a more general sense ('ways') or a more ordered/cosmic
      sense ('courses, circuits').
    reason: lexical_alternative
  - marker: b
    text: The line is textually difficult in the Ethiopic witness, and the repeated
      passive verb may indicate both that they are kept by the oath and that their
      paths are kept under it.
    reason: textual_variant
  - marker: c
    text: Or 'And among them the oath became strong, and they were kept by it; and
      their paths were kept'.
    reason: previous_rendering
lexical_decisions:
- source_word: ዲቤሆሙ
  chosen: among them
  alternatives:
  - in them
  - over them
  lexicon: Dillmann
  rationale: The prepositional phrase marks the sphere or community within which the
    action takes effect. 'Among them' reads naturally in English and fits the communal
    setting of the oath.
- source_word: ጸንዐ
  chosen: became strong
  alternatives:
  - was strong
  - grew firm
  - prevailed
  lexicon: Dillmann
  rationale: The verb conveys firmness/strengthening. 'Became strong' preserves the
    sense of the oath being established or made firm without over-interpreting it
    as legal enforcement alone.
- source_word: ዝማሐላ
  chosen: the oath
  alternatives:
  - that which was sworn
  - the sworn bond
  lexicon: Dillmann
  rationale: The noun derives from swearing/oath language. 'The oath' is the most
    direct and transparent rendering in this apocalyptic context.
- source_word: ይትዓቀቡ
  chosen: they were kept
  alternatives:
  - they were guarded
  - they were preserved
  - they were bound
  lexicon: Dillmann
  rationale: The passive/reflexive form suggests being kept, guarded, or held fast.
    'They were kept' preserves the ambiguity between protection and constraint, both
    of which may be present in the context of an oath.
- source_word: ቦቱ
  chosen: by it
  alternatives:
  - in it
  - through it
  lexicon: Dillmann
  rationale: This refers back to the oath as the means or instrument. 'By it' best
    captures instrumental force in concise English.
- source_word: ፍናዊሆሙ
  chosen: their paths
  alternatives:
  - their ways
  - their roads
  lexicon: Dillmann
  rationale: The term denotes ways or paths. 'Paths' preserves the apocalyptic imagery
    of ordered movement better than the more abstract 'ways'.
- source_word: ምሕዋራቲሆሙ
  chosen: their courses
  alternatives:
  - their circuits
  - their rounds
  - their movements
  lexicon: Dillmann
  rationale: The plural suggests circuits, revolutions, or ordered courses. In a cosmic-apocalyptic
    setting, 'courses' best preserves the sense of fixed ordered motions without forcing
    a specifically astronomical gloss.
- source_word: ኢይማስን
  chosen: do not perish
  alternatives:
  - do not fail
  - are not destroyed
  - do not vanish
  lexicon: Dillmann
  rationale: The negative verb indicates not passing away, failing, or being lost.
    'Do not perish' keeps the elevated register and preserves the durability implied
    by the oath's firmness.
