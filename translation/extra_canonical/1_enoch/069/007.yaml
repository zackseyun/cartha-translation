theological_decisions:
- issue: Whether የብስ should be generalized to 'earth' or kept as the more concrete 'dry ground/land'
  chosen_reading: dry ground
  alternative_readings:
  - earth
  - land
  rationale: Because the verse is in the Parables and survives effectively only in Ge'ez for this workflow, restraint is warranted. The concrete image may carry cosmological force, so the translation keeps it rather than smoothing it into generic 'earth.'
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; when uncertain, prefer transparent English over smoothing.'
