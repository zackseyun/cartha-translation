translation:
  text: And from his hand they went out against those who dwell upon the dry ground, from that day and unto the age of ages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who live on the earth.' The Ge'ez says more literally 'those who dwell upon the dry ground.'
    reason: lexical_alternative
  - marker: b
    text: Or 'it went out'.
    reason: previous_rendering
lexical_decisions:
- source_word: እምነ እዴሁ
  chosen: from his hand
  alternatives:
  - out of his hand
  - from his power
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is spatially concrete in Ge'ez, with እምነ marking source and እዴሁ meaning 'his hand.' In apocalyptic context 'hand' can imply agency or power, but the image should be preserved rather than abstracted.
- source_word: ወፅአ
  chosen: it went out
  alternatives:
  - came forth
  - went forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion verb. 'Went out' keeps the vivid emergence imagery without archaic diction.
- source_word: ዲቤሆሙ
  chosen: against them
  alternatives:
  - upon them
  - over them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With hostile or judicial force in context, the prepositional form is best rendered 'against them,' indicating directed action rather than mere location.
- source_word: ለእለ የኃድሩ ዲበ የብስ
  chosen: those who dwell upon the dry ground
  alternatives:
  - those who live on the earth
  - those who inhabit the dry land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: የኃድሩ denotes dwelling or inhabiting. የብስ is literally 'dry land/ground,' which may function as a poetic term for the inhabited earth. I retain the more concrete image in the main text because apocalyptic diction often contrasts realms spatially.
- source_word: እምይእቲ ዕለት
  chosen: from that day
  alternatives:
  - since that day
  - from that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A temporal phrase marking the beginning of an enduring state or action. 'From that day' is idiomatic and close to the Ge'ez.
- source_word: እስከ ለዓለመ ዓለም
  chosen: unto the age of ages
  alternatives:
  - forever and ever
  - unto eternity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled 'age' formula is a standard emphatic expression for unending duration. 'Age of ages' preserves the apocalyptic register better than the more familiar but more traditionalized 'forever and ever.'
