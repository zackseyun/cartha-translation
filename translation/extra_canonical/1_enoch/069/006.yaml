translation:
  text: 'And the third was named Gadreel: this is the one who showed all the blows of death to the children of men, and he led Eve astray; and he showed the weapons of death to the sons of men—the shield and the coat of mail and the sword for slaughter—and all the weapons of death to the children of men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause about 'the weapons of death' is textually difficult in this Ge'ez witness and appears with a repeated summary after the list. The translation keeps both the specific list and the repeated closing phrase rather than collapsing them.
    reason: textual_variant
  - marker: b
    text: Or 'all the blows of death.' The underlying expression may refer more broadly to death-dealing assaults or wounds, not only manufactured weapons.
    reason: lexical_alternative
  - marker: c
    text: Or 'all the deadly blows'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሣልስ
  chosen: the third
  alternatives:
  - third
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal introducing the third named figure in a sequence; English article added for natural syntax.
- source_word: ስሙ
  chosen: was named
  alternatives:
  - his name was
  - its name was
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Idiomatic English rendering of the naming formula while preserving the personal reference.
- source_word: ጋድርኤል
  chosen: Gadreel
  alternatives:
  - Gadriel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal names are transliterated, not translated; Gadreel reflects the Ge'ez form given here.
- source_word: ዘአርአየ
  chosen: who showed
  alternatives:
  - who revealed
  - who taught
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic sense is 'show/reveal'; 'showed' preserves the repeated verb in the verse without over-interpreting as formal instruction.
- source_word: ኵሎ ዝብጠተ ሞት
  chosen: all the deadly blows
  alternatives:
  - all the blows of death
  - every stroke of death
  - all the death-dealing smitings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to denote death-bringing assaults or wounds. 'Deadly blows' is vivid and readable while keeping the violent imagery.
- source_word: ለውሉደ ሰብእ
  chosen: to the children of men
  alternatives:
  - to the sons of men
  - to humankind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the elevated apocalyptic register and the anthropological collective sense. Later in the verse 'sons of men' is retained for stylistic variation matching the Ge'ez shift.
- source_word: አስሐታ ለሔዋን
  chosen: he led Eve astray
  alternatives:
  - he deceived Eve
  - he caused Eve to err
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys active seduction into error without importing later doctrinal phrasing beyond the Ge'ez sense.
- source_word: ንዋየ ሞት
  chosen: the weapons of death
  alternatives:
  - the instruments of death
  - the implements of death
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Because the following list names martial gear, 'weapons' best fits the local context while preserving the repeated death-formula.
- source_word: ለደቂቀ ሰብእ
  chosen: to the sons of men
  alternatives:
  - to the children of men
  - to human beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A near-synonymous human collective expression; rendered with a slight English variation to reflect the lexical shift without changing meaning.
- source_word: ወለታ
  chosen: the shield
  alternatives:
  - shield
  - buckler
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the list of martial equipment, this term is best taken as a defensive weapon, likely shield/buckler; 'shield' is the broader and more accessible choice.
- source_word: ወድርዐ
  chosen: the coat of mail
  alternatives:
  - breastplate
  - armor
  - corslet
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes body armor. 'Coat of mail' preserves an elevated martial register and distinguishes it from the shield and sword.
- source_word: ወሰይፈ ለቀተል
  chosen: the sword for slaughter
  alternatives:
  - the sword for killing
  - the sword to slay
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the grim purposive force of the phrase and avoids softening the violence.
