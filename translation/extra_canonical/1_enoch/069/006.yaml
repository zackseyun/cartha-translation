theological_decisions:
- issue: How explicitly to connect Gadreel with Eve's deception
  chosen_reading: and he led Eve astray
  alternative_readings:
  - and he deceived Eve
  - and he misled Hewa/Eve
  rationale: The Ge'ez directly attributes Eve's deception to Gadreel in this verse. The translation preserves that attribution without harmonizing it away or importing later canonical formulations.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
