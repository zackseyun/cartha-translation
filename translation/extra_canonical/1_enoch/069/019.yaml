theological_decisions:
- issue: Whether the verse describes cosmic entities established by the oath or gives a more abstract statement about the oath's power
  chosen_reading: The verse describes beings or cosmic realities being strengthened and fixed in place by the oath.
  alternative_readings:
  - The oath itself is strong and stands firm
  - 'An impersonal statement: stability came through the oath'
  rationale: The plural verbal sequence ('they stood,' 'were not moved,' 'their place') points to referents established by the oath, likely the cosmic orders mentioned in the immediate context.
  doctrine_reference: Preserve apocalyptic imagery and local context rather than flattening into abstraction.
