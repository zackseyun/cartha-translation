translation:
  text: And by that oath the depths were made firm, and they stand and do not move from their place forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were strengthened.' The Ge'ez verb can express becoming firm or being established.
    reason: lexical_alternative
  - marker: b
    text: '''From their place'' could also be rendered ''from their stations,'' which may emphasize fixed cosmic positions.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they were made strong, and they stood firm and were not moved'.
    reason: previous_rendering
lexical_decisions:
- source_word: ማሐላ
  chosen: oath
  alternatives:
  - swearing
  - curse
  lexicon: Dillmann
  rationale: In context this noun refers to the binding oath just named in the surrounding passage, not a generic act of speaking. 'Oath' preserves the juridical-apocalyptic force.
- source_word: ቀላይ
  chosen: by that
  alternatives:
  - through it
  - thereby
  lexicon: Dillmann
  rationale: 'Taken adverbially/instrumentally with the preceding phrase: the action happens by means of that oath. ''By that'' is concise and fits the clause linkage.'
- source_word: ፀንዐት
  chosen: were made strong
  alternatives:
  - became firm
  - were strengthened
  lexicon: Dillmann
  rationale: The verb carries the sense of being strengthened or established. 'Were made strong' keeps the passive/resultative nuance and suits the cosmic stability described.
- source_word: ወቆሙ
  chosen: they stood firm
  alternatives:
  - they stood
  - they were established
  lexicon: Dillmann
  rationale: The simple verb 'stood' in this context expresses fixed stability; 'stood firm' makes the apocalyptic-cosmic sense clear without over-paraphrasing.
- source_word: ወኢይትሐወሱ
  chosen: and were not moved
  alternatives:
  - and do not move
  - and were not shaken
  lexicon: Dillmann
  rationale: The negative verb denotes being moved, disturbed, or displaced. Past/resultative English fits the sequence of completed establishment.
- source_word: እመካኖሙ
  chosen: from their place
  alternatives:
  - from their stations
  - from their dwelling-place
  lexicon: Dillmann
  rationale: The plural pronominal form indicates the place proper to them. 'Place' is broad enough to preserve cosmic imagery; 'stations' is possible but slightly more interpretive.
- source_word: እምዓለም ወእስከ ለዓለም
  chosen: forever and ever
  alternatives:
  - from eternity to eternity
  - for all ages
  lexicon: Dillmann
  rationale: This is a standard age-enduring formula. 'Forever and ever' is idiomatic, elevated, and preserves the emphatic perpetuity.
