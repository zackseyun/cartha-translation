- issue: Whether ያአምኑ should be rendered with explicitly doctrinal Christian language
  chosen_reading: will believe
  alternative_readings:
  - will trust
  - will have faith
  rationale: The verse describes the eschatological response of the gathered worshipers before the Lord of Spirits. 'Will believe' preserves the plain sense without importing later Christian formulae about saving faith.
  doctrine_reference: Translation philosophy §Original-language primacy over translation tradition; preserve local passage sense before later doctrinal expectations.
- issue: How to render the divine title እግዚአ መንፈሳት
  chosen_reading: Lord of Spirits
  alternative_readings:
  - Lord of the spirits
  rationale: In the Parables this functions as a recurring divine title. Rendering it as 'Lord of Spirits' preserves its titular and apocalyptic force rather than reducing it to a generic possessive phrase.
  doctrine_reference: Translate titles to preserve meaning; preserve apocalyptic imagery and register.
