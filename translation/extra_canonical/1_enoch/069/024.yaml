translation:
  text: All these will believe and give thanks before the Lord of Spirits, and they will bless with all their power , and their food is in all thanksgiving; and they will give thanks and bless and exalt the name of the Lord of Spirits forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their possessions' or 'their substance' for 'their wealth'; the Ge'ez term likely refers broadly to what they have at their disposal, not only money.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'in thanksgiving' is compressed in the Ge'ez and may also be understood as 'with all thanksgiving.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and with all their wealth in thanksgiving;'.
    reason: previous_rendering
lexical_decisions:
- source_word: ያአምኑ
  chosen: will believe
  alternatives:
  - will trust
  - will have faith
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes believing/trusting. 'Will believe' is the most direct and readable rendering here, preserving the future-oriented response of the worshipers without importing later doctrinal phrasing.
- source_word: የአኵቱ
  chosen: give thanks
  alternatives:
  - praise
  - confess
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though the semantic field can overlap with praise, the nearby noun አኰቴት strongly supports a thanksgiving sense. Rendering it as 'give thanks' also preserves the verse's repeated gratitude language.
- source_word: በቅድመ
  chosen: before
  alternatives:
  - in the presence of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard spatial/cultic expression. 'Before' is concise and preserves the formal worship setting.
- source_word: እግዚአ መንፈሳት / እግዚአ መናፍስት
  chosen: Lord of Spirits
  alternatives:
  - Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established title within 1 Enoch's Parables. 'Lord of Spirits' preserves the title-like force and avoids flattening it into a generic descriptive phrase.
- source_word: ይሴብሑ
  chosen: will bless
  alternatives:
  - will praise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means bless/praise. 'Bless' is chosen to preserve the distinction from thanksgiving and exaltation in the same verse, allowing the sequence of worship verbs to remain visible.
- source_word: በኵሉ ኃይሎሙ
  chosen: with all their power
  alternatives:
  - with all their strength
  - with all their might
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase expresses totality of capacity or strength. 'With all their power' is a natural rendering that keeps the comprehensive force.
- source_word: ሲሳዮሙ
  chosen: their wealth
  alternatives:
  - their possessions
  - their substance
  - their abundance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun likely refers to goods, resources, or possessions. 'Wealth' fits the context of offering thanksgiving with all one has, while remaining compact. Because the exact nuance may be broader than money, an alternative is noted in a footnote.
- source_word: በኵሉ አኰቴት
  chosen: in thanksgiving
  alternatives:
  - with all thanksgiving
  - with every kind of thanksgiving
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is somewhat compressed in Ge'ez. 'In thanksgiving' gives good English sense while preserving the cultic tone and linking back to the repeated thanksgiving verb.
- source_word: ያሌዕሉ
  chosen: exalt
  alternatives:
  - magnify
  - lift high
  - glorify
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys lifting up or exalting. 'Exalt' best preserves the elevated register and the vertical imagery of apocalyptic praise.
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for the age of ages
  - to all eternity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the idiomatic English equivalent of the Ge'ez eternal-duration formula. 'Forever and ever' is readable and preserves the solemn liturgical cadence.
