    modern equivalent.
- source_word: መሪረ
  chosen: bitterness
  alternatives:
  - the bitter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Abstract noun paired with the following term; rendered as a quality or
