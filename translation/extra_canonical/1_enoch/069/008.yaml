- source_word: ወመዓርፂረ
  chosen: sweetness
  alternatives:
  - the sweet
  - pleasantness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Taken as the counterpart to 'bitterness.' The pairing is preserved literally
    rather than paraphrased into a broader idiom.
- source_word: ወአርአዮሙ
  chosen: and he showed them
  alternatives:
  - and he revealed to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Same verbal root as earlier in the verse; repeated in English to preserve
    the text's cadence.
- source_word: ኵሎ
  chosen: all
  alternatives:
  - every
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Comprehensive scope; 'all' is the most natural rendering before a plural
    object.
- source_word: ኅቡኣተ
  chosen: the secrets
  alternatives:
  - hidden things
  - mysteries
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'hidden things.' 'Secrets' is concise and idiomatic while retaining
    the apocalyptic sense of concealed knowledge.
- source_word: ጥበቦሙ
  chosen: their wisdom
  alternatives:
  - their skill
  - their knowledge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes wisdom or skill. 'Wisdom' best fits the Enochic
    concern with illicit or esoteric knowledge imparted to humanity.
