theological_decisions:
- issue: Meaning of the paired terms መሪረ and መዓርፂረ
  chosen_reading: bitterness and sweetness
  alternative_readings:
  - bitter and sweet things
  - evil and good
  rationale: The Ge'ez pair most naturally reads as a literal contrast of bitter/sweet.
    Some interpreters may take the pair metaphorically for morally mixed or experiential
    knowledge, but the verse itself does not explicitly moralize the pair, so the
    more transparent lexical rendering is preferred.
  doctrine_reference: Preserve theological tension rather than resolve it; when uncertain,
    prefer transparent English over interpretive paraphrase.
- issue: Force of ኅቡኣተ ጥበቦሙ
  chosen_reading: the secrets of their wisdom
  alternative_readings:
  - the hidden things of wisdom
  - all the secrets of wisdom
  rationale: The pronominal suffix is retained as 'their,' linking the revealed secrets
    to humankind. This keeps the syntax visible rather than smoothing to a generic
    abstraction.
