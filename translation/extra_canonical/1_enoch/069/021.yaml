theological_decisions:
- issue: Whether the verse describes impersonal astronomy or personal heavenly obedience
  chosen_reading: 'The stars are portrayed in ordered, quasi-personal responsiveness:
    their courses are completed, their names are called, and they answer.'
  alternative_readings:
  - A purely mechanical description of stellar motion
  - Angelic beings associated with stars are the ones answering
  rationale: Apocalyptic literature often personifies heavenly bodies and links them
    with named heavenly orders. The Ge'ez wording itself supports responsive action,
    so the translation preserves that tension rather than reducing it to modern astronomical
    description.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten apocalyptic imagery.
