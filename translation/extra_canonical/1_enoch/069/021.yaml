translation:
  text: And by that oath the stars complete their courses, and their names are called,
    and they answer from age to age and forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The line is textually and syntactically compressed in the Ge'ez-only Parables
      tradition. 'They call their names, and they answer them' may describe the stars
      themselves, heavenly attendants, or both in an intentionally personified cosmic
      order.
    reason: textual_variant
  - marker: b
    text: Literally, the closing idiom is 'from age/world ... unto age/world,' a formula
      of enduring continuance.
    reason: lexical_alternative
  - marker: c
    text: Or 'And in it the courses of the stars complete their circuits, and they
      call their names, and they answer them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ማሐላ፡
  chosen: courses
  alternatives:
  - passage
  - going round
  - revolution
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with stars and completing movement, the noun most naturally
    refers to their ordered course or circuit rather than a generic 'passage.' 'Courses'
    preserves the apocalyptic-cosmic sense without over-paraphrase.
- source_word: ከዋክብት፡
  chosen: stars
  alternatives:
  - heavenly bodies
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary sense is 'stars'; the broader 'heavenly bodies' is unnecessary
    and weakens the imagery.
- source_word: ይፌጽሙ፡
  chosen: complete
  alternatives:
  - finish
  - fulfill
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys bringing something to completion. 'Complete' fits the
    ordered celestial motion and avoids importing a more theological 'fulfill' where
    the immediate sense is astronomical.
- source_word: ምሕዋሪሆሙ፡
  chosen: their circuits
  alternatives:
  - their courses
  - their journeys
  - their revolutions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term denotes movement or going around. 'Circuits' best matches stellar
    motion in elevated but readable English. Because ማሐላ፡ already carries the sense
    of course/order, varying the English here avoids awkward repetition while preserving
    the related imagery.
- source_word: አስማቲሆሙ፡
  chosen: their names
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward rendering; in apocalyptic context named stars imply ordered
    heavenly administration, so the concrete wording should be preserved.
- source_word: ይጼውዑ፡
  chosen: they call
  alternatives:
  - they are called out
  - they invoke
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Active 'they call' best reflects the Ge'ez form as transmitted. The subject
    is likely implicit heavenly agents or the stars within the ordered scene; the
    text leaves this compressed, so the English preserves that terseness.
- source_word: ያወሥእዎ፡
  chosen: they answer them
  alternatives:
  - they respond to them
  - they make answer to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to denote answering or responding. 'They answer them'
    keeps the reciprocal, liturgical-cosmic feel of named celestial beings responding
    when called.
- source_word: እምዓለም፡ ወእስከ፡ ለዓለም።
  chosen: from age to age and forever
  alternatives:
  - from eternity to eternity
  - from world to world
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom marks enduring continuance across ages. 'From age to age and
    forever' preserves the repetitive solemnity without forcing a metaphysical claim
    about absolute eternity beyond what the idiom requires.
