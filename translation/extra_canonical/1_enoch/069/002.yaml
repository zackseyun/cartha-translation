theological_decisions:
- issue: Whether to normalize the angelic names to more familiar forms from other Enochic or later traditions
  chosen_reading: Retain transliterations close to the Ge'ez witness, even where they resemble familiar names in other traditions
  alternative_readings:
  - Harmonize names such as Daniyal to Daniel, Rumyal to Ramiel, or Kokabel to Kokabiel
  rationale: The project philosophy prioritizes original-language primacy over translation tradition. In a Ge'ez-only section, especially the Parables, transparent adherence to the witness is preferable to harmonization that may conceal textual uncertainty.
  doctrine_reference: Translation philosophy §1, §2; Book context note on Parables being effectively Ge'ez-only
- issue: Whether to smooth away repeated or duplicate names in the list
  chosen_reading: Preserve the repetitions as they stand in the Ethiopic witness
  alternative_readings:
  - Emend duplicate names as scribal corruption and remove or alter them in translation
  rationale: The verse is a formal list of names. Repetition may reflect the transmitted text, and without stronger textual control in this section it should not be silently corrected in the main text.
  doctrine_reference: Translation philosophy §3; Book context note 4 on extra restraint in the Parables
