  - the names belonging to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural noun with pronominal suffix; rendered naturally in English as 'the names of them' > 'the names of those angels.'
- source_word: ለእሉክ፡ መላእክት
  chosen: of those angels
  alternatives:
  - for those angels
  - of these angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction identifies whose names are being listed. 'Those angels' fits the demonstrative force and the retrospective/list-introducing sense.
- source_word: ወዝንቱ፡ ውእቱ፡ አስማቲሆሙ
  chosen: And these are their names
  alternatives:
  - And this is their list of names
  - And this is the names of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Formulaic list introduction. English idiom prefers plural agreement: ''these are their names.'''
- source_word: ቀዳማዊ
  chosen: the first
  alternatives:
  - first
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal introducing the first name in the sequence.
- source_word: ዚአሆሙ
  chosen: of them
  alternatives:
  - among them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Genitival/partitive sense in context: ''the first of them.'''
- source_word: ወካልእ / ሠሣልስ / ወራብዕ ...
  chosen: the second / the third / the fourth ...
  alternatives:
  - second / third / fourth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Series of ordinals marking the ordered list of angelic names; preserved explicitly rather than compressed.
- source_word: ስምያዛ
  chosen: Semyaza
  alternatives:
  - Semyaza
  - Shemyaza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Proper name transliterated from the Ge'ez form. 'Semyaza' keeps the Ethiopic vocalization without forcing a later standardized form.
- source_word: አርጣቂፋ
  chosen: Artaqifa
  alternatives:
  - Artaqifa
  - Artaqifaʾ
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Proper name transliterated conservatively from the Ethiopic consonant-vowel sequence.
- source_word: አርሜን
  chosen: Armen
  alternatives:
  - Armen
  - Armeni
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Proper name; simple transliteration preferred.
- source_word: ኮከብኤል
