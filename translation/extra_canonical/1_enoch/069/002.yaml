  to: 'And behold the names of those angels, and these are their names:'
  rationale: 'The draft flattens two distinct clauses into one and omits the interjection ወነዋ (wa-nawā, "and behold"). The Ge''ez explicitly reads ወነዋ፡ አስማቲሆሙ፡ ለእሉክ፡ መላእክት፡ ወዝንቱ፡ ውእቱ፡ አስማቲሆሙ፡ ("And behold the names of those angels, and these are their names"). Apocalyptic texts frequently use this kind of double-introduction and it should not be collapsed for English style. | Adjudicator: The reviewer is correct that the current translation omits the interjection ወነዋ (wa-nawā, "and behold") and collapses two distinct clauses into one. The Ge''ez explicitly reads ወነዋ፡ አስማቲሆሙ፡ ለእሉክ፡ መላእክት'
