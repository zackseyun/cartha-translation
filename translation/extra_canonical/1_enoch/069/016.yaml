theological_decisions:
- issue: Nature of the 'hidden things' tied to the oath
  chosen_reading: The phrase refers to concealed cosmic realities or powers associated with the oath, not merely abstract doctrines.
  alternative_readings:
  - the secret words of the oath
  - the mysteries contained in the oath
  rationale: The immediate context in 1 Enoch 69 concerns named powers, cosmic structures, and the efficacy of the oath. 'Hidden things' preserves apocalyptic concreteness without narrowing the sense too much.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic language into generic religious prose.
- issue: Cosmological image of heaven
  chosen_reading: Heaven 'was suspended' as a vivid cosmological statement.
  alternative_readings:
  - heaven was established
  - heaven was fixed
  rationale: The Ge'ez verb naturally evokes hanging/suspension. Retaining the image fits the visionary register and avoids domesticating the text into ordinary creation language.
  doctrine_reference: Preserve visionary and apocalyptic imagery.
