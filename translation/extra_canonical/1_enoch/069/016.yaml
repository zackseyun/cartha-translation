lexical_decisions:
- source_word: እሉንቱ
  chosen: these
  alternatives:
  - these things
  - these ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative plural introducing the contents or elements being described; 'these' is concise and natural.
- source_word: እሙንቱ
  chosen: are
  alternatives:
  - they are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Copular sense linking the demonstrative to what follows.
- source_word: ኅቡኣቲሁ
  chosen: the hidden things
  alternatives:
  - its hidden things
  - its secrets
  - the secret things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the root for hiding/concealing. 'Hidden things' preserves the apocalyptic sense of concealed realities without overinterpreting as merely intellectual 'secrets.' The suffix likely refers back to the oath.
- source_word: ለዝ ማሐላ
  chosen: of this oath
  alternatives:
  - belonging to this oath
  - concerning this oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Genitival relation is the most natural sense here: the hidden things pertain to ''this oath'' just mentioned in context.'
- source_word: ፅኑዕ
  chosen: made firm
  alternatives:
  - established
  - firm
  - strengthened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys stability and fixedness. 'Made firm' fits the passive/resultative sense in context and preserves the solemn force of oath language.
- source_word: በመሐላሁ
  chosen: by his oath
  alternatives:
  - through his oath
  - in his oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Instrumental preposition with the noun 'oath'; 'by his oath' best expresses the means by which the firmness is effected.
- source_word: ሰማይ
  chosen: heaven
  alternatives:
  - the heaven
  - the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic cosmological setting, 'heaven' is preferable to the more mundane 'sky.'
- source_word: ተሰቅለ
  chosen: was suspended
  alternatives:
  - was hung
  - was set hanging
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the vivid cosmological image of heaven hanging/suspended, rather than flattening it into a generic statement of creation.
- source_word: ዘእንበለ ይትፈጠር ዓለም
  chosen: before the world was created
  alternatives:
  - before the age was created
  - without the world being created yet
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause marks temporal priority. 'World' is the most natural rendering of ዓለም here, though 'age' remains possible.
- source_word: ወእስከ ለዓለም
  chosen: and forever
  alternatives:
  - and unto eternity
  - and until the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Idiomatic expression for enduring perpetuity; 'forever' is readable modern English while retaining the temporal force.
- source_word: ቦቱ
  chosen: it is upon it
  alternatives:
  - it is in it
  - it rests on it
  - it abides by it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronominal/prepositional form is difficult in this OCR witness. A literal rendering is retained to preserve the underlying image and uncertainty rather than forcing a smoother but less transparent interpretation.
