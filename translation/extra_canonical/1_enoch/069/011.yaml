  from: For no human being was created except to be like the angels, so that they
  to: For human beings were not created except to be like the angels, so that they
  rationale: The Ge'ez ሰብእ (sab'e) is a collective noun. Translating it as the singular distributive 'no human being' creates an awkward number clash with the subsequent plural pronouns ('they might remain', 'touched them'). Rendering it as 'human beings' or 'humanity' resolves the English grammar while accurately reflecting the collective source.
