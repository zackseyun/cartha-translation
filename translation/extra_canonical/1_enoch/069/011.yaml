theological_decisions:
- issue: Anthropological claim about humanity's intended state
  chosen_reading: The verse states that humanity was created to be like the angels in purity and righteousness, not that humans were literally created as angels.
  alternative_readings:
  - Humans were created as angelic beings
  - The line refers only to a special class of righteous humans
  rationale: The comparative construction favors likeness rather than identity. This preserves the text's exalted anthropology without collapsing the human-angel distinction.
  doctrine_reference: Preserve theological tension rather than resolve it; translate local passage first.
- issue: Meaning of the causal phrase about knowledge
  chosen_reading: '''Through this knowledge they are being destroyed'' is retained in the main text as the most transparent rendering of the Ge''ez, despite uncertainty about what knowledge is in view.'
  alternative_readings:
  - Through this understanding they perish
  - By this thought they are led astray
  rationale: The Parables are effectively Ge'ez-only here, so restraint is required. The wording should stay close to the witness and let the ambiguity stand.
