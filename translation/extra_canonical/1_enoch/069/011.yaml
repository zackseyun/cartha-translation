translation:
  text: For human beings were not created except to be like the angels, so that they might remain pure and righteous; and death, which destroys everything, would not have touched them. But through this knowledge they are being destroyed, and through this power it is consuming me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'through this knowledge they are being destroyed' is difficult. The Ge'ez may also be understood as 'through this understanding they perish.'
    reason: lexical_alternative
  - marker: b
    text: 'The final line is vivid and personal: literally, the power ''consumes'' or ''devours'' me.'
    reason: lexical_alternative
  - marker: c
    text: This section of the Parables lacks effective Greek or Qumran control in this workflow, so uncertain phrases are translated with deliberate restraint.
    reason: textual_variant
  - marker: d
    text: Or 'For no human being was created except to be like the angels, so that they'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኢተፈጥረ
  chosen: was created
  alternatives:
  - came into being
  - was formed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive creation language is explicit and should be preserved rather than generalized.
- source_word: ሰብእ
  chosen: human being
  alternatives:
  - man
  - humankind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Singular collective sense fits the statement about humanity in general; 'human being' avoids misleadingly male-specific wording while preserving the singular.
- source_word: ዘእንበለ
  chosen: except
  alternatives:
  - unless
  - other than
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best captures the restrictive force of the clause.
- source_word: ከመ መላእክት
  chosen: like the angels
  alternatives:
  - as angels
  - in the manner of angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison is central to the anthropology of the verse; 'like the angels' is clear and direct.
- source_word: ይንበሩ
  chosen: might remain
  alternatives:
  - might dwell
  - might live
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context the verb points to continuing state rather than location; 'remain' fits the following adjectives.
- source_word: ንጹሓነ ወጻድቃነ
  chosen: pure and righteous
  alternatives:
  - clean and righteous
  - innocent and just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: These are weighty moral-religious descriptors in Enochic diction and should be kept in their familiar theological register.
- source_word: ሞት ዘኵሉ ያማሥን
  chosen: death, which destroys everything
  alternatives:
  - death, which corrupts all things
  - death, which consumes all
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause personifies death as universally ruinous; 'destroys everything' preserves the sweeping apocalyptic force.
- source_word: እመ ኢገሰሶሙ
  chosen: would not have touched them
  alternatives:
  - would not have approached them
  - would not have reached them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'A counterfactual sense fits the argument: death would have had no contact with humanity in the intended state.'
- source_word: አእምሮቶሙ
  chosen: knowledge
  alternatives:
  - understanding
  - thought
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote understanding or knowledge; 'knowledge' best fits the causal statement in this context, though the exact nuance is uncertain.
- source_word: ይትሐጐሉ
  chosen: they are being destroyed
  alternatives:
  - they perish
  - they are ruined
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive/reflexive ruin sense suits the contrast with the prior ideal state and keeps the line's solemn tone.
- source_word: ኃይል
  chosen: power
  alternatives:
  - strength
  - force
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is broad; 'power' preserves ambiguity and apocalyptic weight.
- source_word: ይበልዓኒ
  chosen: it is consuming me
  alternatives:
  - it devours me
  - it is swallowing me up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is vivid and should remain vivid; 'consuming me' is natural English without flattening the imagery.
