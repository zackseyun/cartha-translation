theological_decisions:
- issue: Whether to render the sea's limit as a mere natural shoreline or as a divinely
    imposed cosmic boundary under judgment imagery
  chosen_reading: Retained the concrete image 'he set for it sand' together with 'for
    the time of wrath,' preserving both creation order and apocalyptic judgment resonance.
  alternative_readings:
  - Rendered more dynamically as 'he fixed its boundary'
  - Omitted the wrath phrase as secondary or obscure
  rationale: The Ge'ez presents both a physical image and a temporal/judgment phrase.
    The translation keeps the tension rather than reducing it to ordinary natural
    description.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten apocalyptic imagery.
