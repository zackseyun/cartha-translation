translation:
  text: And by that oath the sea was created, and as its foundation for the time of
    wrath he set sand for it, and it does not pass beyond it from the creation of
    the world and forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'for the time of wrath' is difficult in the Ge'ez and
      may also be understood more generally as 'for a time of judgment.'
    reason: lexical_alternative
  - marker: b
    text: '''Its foundation'' likely refers to the sea''s fixed boundary or base;
      the image is that sand has been set as the limit it may not cross.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he set for it sand'.
    reason: previous_rendering
lexical_decisions:
- source_word: ማሐላ
  chosen: oath
  alternatives:
  - sworn oath
  - curse
  lexicon: Dillmann Lexicon
  rationale: In this context within a sequence about cosmic elements established by
    named oaths, the noun is best rendered 'oath.' 'Curse' is possible in some contexts
    but does not fit the constructive cosmological function here.
- source_word: ተፈጥረት
  chosen: was created
  alternatives:
  - came into being
  - was formed
  lexicon: Dillmann Lexicon
  rationale: Passive creation language preserves the cosmological force of the Ge'ez
    without paraphrase.
- source_word: ባሕር
  chosen: the sea
  alternatives:
  - sea
  lexicon: Dillmann Lexicon
  rationale: Definite English fits the cosmic element in view.
- source_word: መሠረታ
  chosen: its foundation
  alternatives:
  - its base
  - its boundary-foundation
  lexicon: Dillmann Lexicon
  rationale: The noun normally means foundation or base. In context it refers to what
    stabilizes or bounds the sea; 'foundation' keeps the concrete imagery, though
    boundary is conceptually nearby.
- source_word: ለጊዜ መዓት
  chosen: for the time of wrath
  alternatives:
  - for a time of wrath
  - for the season of judgment
  lexicon: Dillmann Lexicon
  rationale: The phrase is difficult, but the plain sense is temporal plus wrath/judgment.
    'Time of wrath' preserves the apocalyptic register without over-interpreting.
- source_word: አንበረ ላቲ ኆፃ
  chosen: he set for it sand
  alternatives:
  - he placed sand for it
  - he appointed sand for it
  lexicon: Dillmann Lexicon
  rationale: The verb means to set/place/appoint. ኆፃ is understood as sand, fitting
    the image of the sea bounded by sand.
- source_word: ወኢትኅልፍ
  chosen: and it does not pass beyond it
  alternatives:
  - and it does not transgress it
  - and it does not go beyond
  lexicon: Dillmann Lexicon
  rationale: The verb conveys passing beyond or overstepping a limit. 'Pass beyond
    it' is clear English and preserves the boundary imagery.
- source_word: እምፍጥረተ ዓለም ወእስከ ለዓለም
  chosen: from the creation of the world and forever
  alternatives:
  - since the creation of the world and unto eternity
  - from the world's creation until eternity
  lexicon: Dillmann Lexicon
  rationale: This expresses duration from creation onward into perpetuity. 'Forever'
    is idiomatic while retaining the cosmic timespan.
