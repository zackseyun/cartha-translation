theological_decisions:
- issue: Rendering the titular phrase ወልደ እጓለ እመሕያው
  chosen_reading: that Son of Man
  alternative_readings:
  - that son of humankind
  - that son of the living
  rationale: Although the underlying Ge'ez expression is formally unusual, in the
    Parables it clearly functions as the known apocalyptic title for the exalted figure.
    Rendering it 'Son of Man' preserves local Enochic usage while avoiding harmonization
    with later New Testament diction beyond what the title itself warrants.
  doctrine_reference: Preserve theological tension rather than resolve it; keep major
    terms locally grounded in the passage before harmonizing them across the corpus.
