translation:
  text: And there was great joy among them, and they blessed and praised and exalted
    because the name of that Son of Man had been revealed to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez title rendered 'Son of Man' is formally difficult. A more literal
      rendering could be 'son of humankind' or, less likely, 'son of the living,'
      but in the Parables it functions as a recognized exalted title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወኮኖሙ
  chosen: and there was among them
  alternatives:
  - and it came to be for them
  - and they became
  lexicon: Dillmann
  rationale: The form introduces a resulting state or circumstance. In context it
    is best rendered idiomatically as the arising of a condition among them rather
    than a change of identity.
- source_word: ፍሥሐ ዓቢይ
  chosen: great joy
  alternatives:
  - great rejoicing
  - great gladness
  lexicon: Dillmann
  rationale: The pair denotes strong celebratory joy. 'Great joy' is concise and natural
    while preserving the elevated tone.
- source_word: ባረኩ ወሰብሑ ወአልዐሉ
  chosen: blessed and praised and exalted
  alternatives:
  - blessed and glorified and extolled
  - gave blessing and praise and exaltation
  lexicon: Dillmann
  rationale: The three verbs are kept distinctly and in sequence, preserving the repetitive
    liturgical force of the apocalyptic scene rather than compressing them into one
    smoother English expression.
- source_word: በእንተ ዘተከሥተ ሎሙ
  chosen: because ... had been revealed to them
  alternatives:
  - on account of what was revealed to them
  - because ... was disclosed to them
  lexicon: Dillmann
  rationale: The clause gives the reason for their joy and praise. The passive sense
    'had been revealed to them' fits the context of heavenly disclosure.
- source_word: ስሙ
  chosen: the name
  alternatives:
  - his name
  lexicon: Dillmann
  rationale: The noun is definite by context and followed by a genitival specification.
    'The name' preserves the emphasis on revealed identity/authority, not merely a
    label.
- source_word: ለውእቱ ወልደ እጓለ እመሕያው
  chosen: of that Son of Man
  alternatives:
  - of that son of humankind
  - of that son of the living
  lexicon: Dillmann
  rationale: In the Parables this expression functions as a title. 'Son of Man' preserves
    the established apocalyptic idiom without importing later doctrinal content. The
    demonstrative 'that' reflects ውእቱ and keeps the referent marked and exalted.
