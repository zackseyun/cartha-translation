translation:
  text: 'For men were not born for this: to confirm their good faith with pen and ink.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'by ink and by the water of gall.' The imagery is difficult; it may point to written means joined with bitterness or poison, but the Ge'ez wording is kept transparent here.
    reason: cultural_note
  - marker: b
    text: '''Men'' here means humankind collectively, not males only.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to strengthen their faith by ink and by the water of gall'.
    reason: previous_rendering
lexical_decisions:
- source_word: እስመ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the reason or explanation for the preceding statement; 'For' preserves the connective force in elevated but readable English.
- source_word: ኢተወልዱ
  chosen: were not born
  alternatives:
  - were not begotten
  - did not come into being
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive negative form from 'to beget/be born.' 'Were not born' is the most natural English equivalent and preserves the anthropological force of origin/purpose.
- source_word: ሰብእ
  chosen: men
  alternatives:
  - human beings
  - people
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes human beings. 'Men' keeps the concise, elevated register common in apocalyptic discourse, though the sense is collective humanity rather than males only.
- source_word: በዘ ከመዝ
  chosen: for this
  alternatives:
  - for such a thing
  - for this purpose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This construction points to purpose or intended end. 'For this' is concise and leaves the implied purpose relation intact; the fuller sense 'for this purpose' is possible but slightly more interpretive.
- source_word: በቀለም
  chosen: by ink
  alternatives:
  - with ink
  - through writing ink
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun refers to ink or writing fluid. 'By ink' preserves the instrumental sense and the concrete imagery of written means rather than abstract doctrine.
- source_word: ወበማየ ሐመት
  chosen: and by the water of gall
  alternatives:
  - and by bitter water
  - and by gall-water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'and by water of gall/bitterness.' Retaining 'gall' preserves the sharp apocalyptic image and avoids flattening it into a generic 'bitterness,' while still being intelligible in English.
- source_word: ያጽንዑ
  chosen: to strengthen
  alternatives:
  - to make firm
  - to establish
  - to confirm
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys making firm or strong. 'To strengthen' fits the infinitive-like purposive sense in context and reads naturally with 'faith.'
- source_word: ሃይማኖቶሙ
  chosen: their faith
  alternatives:
  - their trust
  - their religion
  - their fidelity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote faith, religion, or belief. 'Faith' best fits the immediate collocation with 'strengthen' and preserves the moral-religious sense without over-specifying institutional religion.
