translation:
  text: And these are the chiefs of their angels, and their names, and the commander
    of their hundreds, and the commander of their fifties, and the commander of their
    tens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Ge''ez lists a hierarchy by numerical units: hundreds, fifties, and
      tens. This likely reflects ranked divisions or ordered companies rather than
      simple arithmetic totals.'
    reason: cultural_note
  - marker: b
    text: The possessive 'their' is repeated throughout the verse in Ge'ez. Its exact
      referent is supplied by the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: እሉ
  chosen: these
  alternatives:
  - those
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Deictic plural introducing an identification list; 'these' fits the immediate
    cataloging function.
- source_word: አርእስተ
  chosen: chiefs
  alternatives:
  - heads
  - leaders
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'heads,' but in English 'chiefs' better conveys persons holding
    leading rank without becoming too idiomatic.
- source_word: መላእክቲሆሙ
  chosen: their angels
  alternatives:
  - their messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In 1 Enoch this term normally refers to angelic beings, not human envoys;
    the possessive is retained even though its referent depends on the broader context.
- source_word: አስማቲሆሙ
  chosen: their names
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward plural with possessive suffix; preserved formally because
    the verse signals a roster.
- source_word: መኰንነ
  chosen: commander
  alternatives:
  - ruler
  - captain
  - chief
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated office term appears in a military/administrative ranking
    sequence. 'Commander' preserves that structured hierarchy better than the broader
    'ruler' or the less transparent 'chief'.
- source_word: ምእት
  chosen: hundreds
  alternatives:
  - hundred
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best taken distributively in the rank formula, comparable to commanders
    over units of a hundred.
- source_word: ኀምሳ
  chosen: fifties
  alternatives:
  - fifty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retained as a unit designation parallel to 'hundreds' and 'tens.'
- source_word: ዐሠርተ
  chosen: tens
  alternatives:
  - ten
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as a unit designation to preserve the stepped hierarchy in the
    source.
- source_word: ዚአሆሙ
  chosen: their
  alternatives:
  - of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Possessive/genitival suffix repeated after each numerical unit; smoothed
    to 'their' in English while preserving the repeated hierarchical ownership relation.
