theological_decisions:
- issue: Whether to render the rank sequence in explicitly military language
  chosen_reading: commander of their hundreds ... fifties ... tens
  alternative_readings:
  - chief over their hundreds ... fifties ... tens
  - ruler of their hundreds ... fifties ... tens
  rationale: The verse presents a formal chain of authority. Using 'commander' preserves
    the apocalyptic sense of ordered angelic ranks without importing later ecclesiastical
    terminology.
  doctrine_reference: Preserve apocalyptic imagery and repeated formulas; optimal
    equivalence with transparent hierarchy.
