theological_decisions:
- issue: Whether to render the clause as simple existence ('he was on the throne')
    or enthronement ('he sat upon the throne')
  chosen_reading: And he sat upon the throne of his glory.
  alternative_readings:
  - And he was upon the throne of his glory.
  - And he remained on the throne of his glory.
  rationale: The immediate syntax naturally supports a seated posture on a throne
    rather than mere location. Because the scene is apocalyptic and judicial, the
    enthronement nuance should be preserved.
  doctrine_reference: Preserve apocalyptic imagery; original-language primacy over
    translation tradition.
