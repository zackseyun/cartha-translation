translation:
  text: And he sat upon the throne of his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb can more broadly mean 'was' or 'remained'; here it is rendered
      'sat' because the object is a throne and the scene is one of enthronement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ነበረ
  chosen: sat
  alternatives:
  - was
  - dwelt
  - remained
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this clause with ዲበ ('upon/on') and መንበረ ('throne/seat'), the verb
    is best taken in the sense of being seated rather than a bare existential 'was.'
    This preserves the enthronement imagery of the vision.
- source_word: ዲበ
  chosen: upon
  alternatives:
  - 'on'
  - over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A spatial preposition meaning 'on/upon.' 'Upon' fits the elevated apocalyptic
    register and the image of enthronement.
- source_word: መንበረ
  chosen: throne
  alternatives:
  - seat
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the noun can denote a seat, in this visionary context 'throne'
    better conveys royal/judicial enthronement and matches the gravity of the Parables.
- source_word: ስብሐቲሁ
  chosen: his glory
  alternatives:
  - his splendor
  - his majesty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the Ge'ez term for glory/splendor/praise with pronominal suffix.
    'His glory' is the most direct rendering and preserves the idiom 'throne of his
    glory' without importing later formulaic phrasing.
