theological_decisions:
- issue: Natural imagery as moral-theological witness
  chosen_reading: Retain the verse as observational description of creation's ordered
    seasons rather than moralizing it in the translation.
  alternative_readings:
  - Render more interpretively as a lesson about divine judgment in nature
  rationale: In context the passage points to the regularity of creation as evidence,
    but this verse itself is descriptive. The translation preserves the created-order
    imagery and lets the broader argument supply the theological force.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten apocalyptic imagery.
