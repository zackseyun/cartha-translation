translation:
  text: And again, ask about the days of summer—how the sun comes upon it at its beginning,
    and you seek shelter and shade because of the heat of the sun, and the earth is
    scorched with burning heat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'how the sun comes upon it at its beginning' is difficult in
      the Ethiopic and may refer more specifically to the sun's strength at the onset
      of summer.
    reason: textual_variant
  - marker: b
    text: The paired expression rendered 'shelter and shade' preserves a doublet in
      the Ethiopic rather than reducing it to a single English term.
    reason: lexical_alternative
lexical_decisions:
- source_word: ዳግመ
  chosen: again
  alternatives:
  - further
  - once more
  lexicon: Dillmann
  rationale: Discourse marker introducing a second example parallel to the prior verse;
    'again' preserves the repetitive observational style.
- source_word: ጠይቁ
  chosen: ask about
  alternatives:
  - inquire concerning
  - consider
  lexicon: Dillmann
  rationale: Imperative plural. In context Enoch urges inquiry into natural signs;
    'ask about' keeps the imperative force without over-formal English.
- source_word: መዋዕለ ሐጋይ
  chosen: the days of summer
  alternatives:
  - the summer season
  - the days of heat
  lexicon: Dillmann
  rationale: A temporal phrase referring to the season of summer/heat. 'Days of summer'
    is slightly formal but natural and preserves the concrete seasonal wording.
- source_word: ከመ ኮነ ፀሐይ ላዕሌሃ በቅዳሜሃ
  chosen: how the sun comes upon it at its beginning
  alternatives:
  - how the sun is over it at its outset
  - how the sun rises above it in the first part of it
  lexicon: Dillmann
  rationale: The clause is textually difficult, but the sense appears to describe
    the onset of summer and the sun's action at the beginning of the season. 'Comes
    upon it at its beginning' preserves the imagery while avoiding overprecision.
- source_word: ትኃሡ
  chosen: you seek shelter
  alternatives:
  - you flee
  - you look for refuge
  lexicon: Dillmann
  rationale: The verb conveys seeking or resorting to protection. 'Seek shelter' fits
    the context of escaping oppressive heat.
- source_word: ምጽላሰ ወጽላሎተ
  chosen: shelter and shade
  alternatives:
  - cover and shade
  - protection and shadow
  lexicon: Dillmann
  rationale: A paired expression for relief from the sun. 'Shelter and shade' is idiomatic
    English and preserves the doublet rather than collapsing it.
- source_word: በእንተ ዖዐየ ፀሐይ
  chosen: because of the heat of the sun
  alternatives:
  - on account of the sun's burning
  - because of the sun's fierceness
  lexicon: Dillmann
  rationale: The phrase points to the sun's oppressive heat. 'Heat of the sun' is
    clear and faithful without importing later idiom.
- source_word: ወምድርሰ ትውዒ እምቀ፡
  chosen: and the earth is scorched with burning heat
  alternatives:
  - and the earth burns with heat
  - and the land is heated from its burning
  lexicon: Dillmann
  rationale: The final clause describes the earth under intense summer heat. 'Is scorched'
    captures the passive/resultative sense and keeps the vivid physical imagery.
