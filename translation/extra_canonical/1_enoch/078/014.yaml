theological_decisions:
- issue: Nature of the description of lunar light
  chosen_reading: Render the verse as an observational/astronomical description of
    the moon receiving and losing light, without importing later cosmological explanation.
  alternative_readings:
  - Interpret the light as a symbolic or angelic force
  - Paraphrase in modern scientific terms about reflected sunlight
  rationale: The Astronomical Book presents ordered cosmic processes in visionary-apocalyptic
    style. The translation should preserve that register without allegorizing or modernizing
    the mechanism.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    paraphrase beyond the witness.'
