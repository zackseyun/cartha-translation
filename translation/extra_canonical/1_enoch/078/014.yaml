translation:
  text: From where the light comes to the moon, from there again it wanes until all
    the light is ended, and the days of the month pass, and its disk remains empty,
    without light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from that place ... from there in turn'; the repeated source-language
      phrasing emphasizes the moon's cyclical reception and loss of light.
    reason: lexical_alternative
  - marker: b
    text: '''Its disk'' could also be rendered ''its circle'' or ''its orb.'' The
      image is the moon''s round visible form left dark.'
    reason: lexical_alternative
  - marker: c
    text: Or 'From there the light comes to the moon, and from there again it wanes'.
    reason: previous_rendering
lexical_decisions:
- source_word: እምኀበ
  chosen: from there
  alternatives:
  - from that place
  - thence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locative source marker; repeated in the verse, so 'from there' preserves
    the schematic astronomical description.
- source_word: ይመጽእ
  chosen: comes
  alternatives:
  - arrives
  - proceeds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple motion verb; 'comes' is natural English and preserves the present-like
    descriptive force.
- source_word: ብርሃን
  chosen: light
  alternatives:
  - brightness
  - illumination
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering in this luminary context; concrete astronomical light
    is in view, not metaphorical enlightenment.
- source_word: ለወርኅ
  chosen: to the moon
  alternatives:
  - for the moon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks direction or relation; in context the moon receives
    light, so 'to the moon' best fits the astronomical sequence.
- source_word: ካዕበ
  chosen: again
  alternatives:
  - in turn
  - afterward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Signals the next stage in the cycle; 'again' is concise and preserves
    repetition.
- source_word: የሐፅፅ
  chosen: it wanes
  alternatives:
  - it diminishes
  - it decreases
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of lunar phases, 'wanes' is the most idiomatic English equivalent
    and preserves the astronomical imagery.
- source_word: እስከ ይትዌዳእ ኵሉ ብርሃን
  chosen: until all the light is finished
  alternatives:
  - until all the light is used up
  - until all the light disappears
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause marks the completion of the waning process. 'Is finished'
    keeps the formal sense without over-paraphrasing.
- source_word: ወየኀልፍ መዋዕለ ወርኅ
  chosen: and the days of the month pass
  alternatives:
  - and the days of the moon pass
  - and the monthly days pass
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መዋዕለ is 'days'; ወርኅ can mean 'month' or 'moon.' Here the temporal sense
    suits the cycle being described.
- source_word: ወይነብር ክበቡ ባክ ዘእንበለ ብርሃን
  chosen: and its disk remains empty, without light
  alternatives:
  - and its circle remains blank, without light
  - and its orb stays void of light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ክበቡ refers to the moon's round form or disk. ባክ conveys emptiness/lack;
    'empty, without light' preserves the stark visual image of the darkened moon.
