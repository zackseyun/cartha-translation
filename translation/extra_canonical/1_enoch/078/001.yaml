theological_decisions:
- issue: Whether to normalize the solar names into familiar or interpretive English
    forms
  chosen_reading: Retain both as transliterated proper names
  alternative_readings:
  - Attempt etymological translation
  - Normalize Tomas to Thomas
  rationale: The verse presents esoteric astronomical names within apocalyptic cosmology.
    Transliteration preserves the text's otherness and avoids importing later associations
    or speculative meanings.
  doctrine_reference: Translate titles; transliterate names.
