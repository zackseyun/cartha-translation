translation:
  text: 'And the names of the sun are these: one is Aryares, and the second, Tomas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The two solar names are preserved as transliterations from the Ge'ez witness.
      Their exact underlying form in earlier stages of the text is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: አስማቲሁ
  chosen: the names of it / the names
  alternatives:
  - its names
  - the names thereof
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural noun from the Ge'ez root for 'name.' The suffix likely refers
    back to the sun, but English expresses this naturally as 'the names of the sun'
    given the following explicit object phrase.
- source_word: ለፀሐይ
  chosen: of the sun
  alternatives:
  - for the sun
  - to the sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The object marker with ''sun'' is best rendered possessively in English
    in this naming formula: the verse is listing names belonging to the sun.'
- source_word: ከመዝ
  chosen: are these
  alternatives:
  - are as follows
  - are thus
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Formula introducing a list. 'Are these' preserves the slightly formal
    enumerative style without sounding archaic.
- source_word: ፩
  chosen: one
  alternatives:
  - the first
  lexicon: Charles 1906 Ethiopic Enoch edition
  rationale: The numeral introduces the first of two names. 'One' follows the manuscript
    notation directly; English readers still understand the sequence because the second
    item follows.
- source_word: አርያሬስ
  chosen: Aryares
  alternatives:
  - Ariyares
  - Aryaris
  lexicon: Charles 1906 Ethiopic Enoch edition
  rationale: This appears to be a proper name for the sun in transliterated form.
    Per project philosophy, names are transliterated rather than translated. 'Aryares'
    reflects the consonantal shape of the Ge'ez witness as given.
- source_word: ካልእ
  chosen: the second
  alternatives:
  - another
  - the other
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this enumerative context the word marks the second item in the pair,
    not merely 'another' in an indefinite sense.
- source_word: ቶማስ
  chosen: Tomas
  alternatives:
  - Thomas
  - Tomas
  lexicon: Charles 1906 Ethiopic Enoch edition
  rationale: A proper name preserved by transliteration. 'Tomas' is preferred over
    'Thomas' because the Ge'ez form does not require importing the familiar later
    English spelling of the apostolic name.
