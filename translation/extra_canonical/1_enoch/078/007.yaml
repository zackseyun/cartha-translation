translation:
  text: And fifteen parts of light are added within it until the fifteenth day; and its light is completed as a sign of the year, and it becomes fifteen parts, and the moon comes into being by half of a seventh part.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is difficult in the Ethiopic. The wording likely refers to the month reaching its midpoint by counted portions of light, but the exact force of 'in the seventh portion' is uncertain.
    reason: textual_variant
  - marker: b
    text: The repeated 'fifteen' likely refers to fifteen parts of lunar light, a technical reckoning used in this chapter, rather than merely the calendar date.
    reason: cultural_note
  - marker: c
    text: Or 'and the month comes to its half in the seventh portion.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ፲ትኅምስት
  chosen: fifteen
  alternatives:
  - the fifteenth
  - fifteen parts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral is plainly 'fifteen'; in context of lunar reckoning it functions quantitatively, and the repeated use in the verse supports 'fifteen parts' as the implied measure.
- source_word: ብርሃን
  chosen: light
  alternatives:
  - brightness
  - luminary
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term commonly refers to the moon's visible light/brightness rather than the heavenly body itself, so 'light' preserves the technical observational sense.
- source_word: ይትወደደ
  chosen: are added
  alternatives:
  - is increased
  - is augmented
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/intransitive sense here describes incremental increase in lunar light. 'Are added' preserves the stepwise reckoning imagery better than a smoother but less concrete 'increases'.
- source_word: ውስቴታ
  chosen: within it
  alternatives:
  - in it
  - inside it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix points back to the moon/monthly cycle under discussion. 'Within it' is slightly more literal and preserves the internal accumulation imagery.
- source_word: እስከ ዐሡር ወኃሙስ
  chosen: until the fifteenth day
  alternatives:
  - up to fifteen
  - until fifteen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The compound numeral literally means 'ten and five.' Because the verse is describing the waxing phase reaching its midpoint/full measure, supplying 'day' in English clarifies the temporal sense without over-paraphrasing.
- source_word: ይትፈጸም
  chosen: is completed
  alternatives:
  - is finished
  - is fulfilled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes reaching full completion. 'Is completed' fits the astronomical context of the moon's light reaching its full counted measure.
- source_word: ብርሃነ ዚአሁ
  chosen: its light
  alternatives:
  - this light of it
  - its brightness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronominal phrase naturally refers to the moon's light already under discussion.
- source_word: ለትእምርተ ዓመት
  chosen: as a sign of the year
  alternatives:
  - for a sign of the year
  - as the year's marker
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The phrase carries calendrical significance: the completed lunar light functions as a marker within the yearly order. ''Sign of the year'' preserves the apocalyptic-astronomical register.'
- source_word: ወይከውን ለ፲፲ትኅምስት
  chosen: and it becomes fifteen parts
  alternatives:
  - and it amounts to fifteen
  - and it is fifteen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The syntax is difficult, but the sense appears to restate the full counted measure of lunar light. 'Parts' is supplied from context because the chapter repeatedly counts portions of light.
- source_word: ወርኅ
  chosen: the month
  alternatives:
  - the moon
  - the lunar month
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ge'ez can denote both 'month' and by extension the lunar cycle. Here 'month' best fits the calendrical statement, while still implying the moon's monthly course.
- source_word: በመንፈቀ ሳብዕ እደ
  chosen: comes to its half in the seventh portion
  alternatives:
  - is at half in the seventh part
  - reaches the middle at the seventh division
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause is textually and syntactically difficult. 'Half' is clear from መንፈቀ, while 'seventh portion' reflects the counted divisions used in the surrounding astronomical material. A more interpretive rendering would overstate certainty.
