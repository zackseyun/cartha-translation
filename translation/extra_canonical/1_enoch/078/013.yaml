theological_decisions:
- issue: Whether to smooth the verse into standard astronomical English
  chosen_reading: Retain the unusual sequence, including 'rises by night' and the
    moon being seen 'before the sun,' with minimal smoothing.
  alternative_readings:
  - Paraphrase as a generalized description of sunset, moonlight, and sunrise
  - Emend the sequence more aggressively from presumed underlying astronomical logic
  rationale: The Astronomical Book often uses repetitive and somewhat technical celestial
    descriptions. The Ge'ez wording is awkward, but the translation philosophy favors
    preserving source-level tension and oddity rather than silently normalizing it.
  doctrine_reference: Translation philosophy §§1, 3, 5
