translation:
  text: 'It is completed with exactness: on that day the sun goes down in the west,
    and from the east it rises by night; and the moon gives light through the whole
    night, until the sun rises before it, and the moon is seen before the sun.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'from the east it rises by night' is difficult in context. The
      Ge'ez wording has been translated transparently rather than harmonized to expected
      astronomical phrasing.
    reason: textual_variant
  - marker: b
    text: The verb rendered 'rises' in 'until the sun rises before it' is textually
      uncertain in form and may reflect a difficult transmission. The contextual sense
      is the sun's appearing or rising.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይትፌጸም
  chosen: it is completed
  alternatives:
  - it is fulfilled
  - it is accomplished
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/reflexive verbal form indicating completion or fulfillment. 'It
    is completed' fits the astronomical procedural context without importing prophetic
    overtones too strongly.
- source_word: ጥንቀቀ
  chosen: with exactness
  alternatives:
  - carefully
  - precisely
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adverbial sense of carefulness/precision. In the Luminaries context this
    describes ordered regularity, so 'with exactness' preserves the technical, calendrical
    feel better than the more subjective 'carefully'.
- source_word: ይወርድ
  chosen: goes down
  alternatives:
  - descends
  - sets
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'descends.' 'Goes down' is natural English and preserves the
    image; 'sets' is possible but slightly more interpretive as an astronomical idiom.
- source_word: ዐረብ
  chosen: the west
  alternatives:
  - the evening
  - the westward region
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context of solar movement paired with 'east,' the directional
    sense is primary.
- source_word: ምሥራቅ
  chosen: the east
  alternatives:
  - sunrise
  - the eastern region
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Directional term corresponding to the sun's rising place.
- source_word: የዐርግ
  chosen: it rises
  alternatives:
  - it ascends
  - it goes up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means ascend/rise. 'Rises' is idiomatic for celestial motion
    while retaining the vertical imagery.
- source_word: በሌሊት
  chosen: by night
  alternatives:
  - in the night
  - at night
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retained literally, though the clause is difficult. 'By night' leaves
    the unusual wording visible rather than smoothing it away.
- source_word: ያበርህ
  chosen: gives light
  alternatives:
  - shines
  - illumines
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The causative nuance suggests emitting light or making bright. 'Gives
    light' is clear and slightly more concrete than 'shines.'
- source_word: በኵሉ ሌሊት
  chosen: through the whole night
  alternatives:
  - all night
  - during the entire night
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the distributive force of 'the whole night' in readable English.
- source_word: ይሠርቅ
  chosen: rises
  alternatives:
  - dawns
  - breaks forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is textually difficult, but in context with 'sun' and the following
    phrase 'before it,' the sense is the sun's appearing/rising rather than theft
    despite the root's possible other associations. A footnote records the difficulty.
- source_word: በቅድሜሁ
  chosen: before it
  alternatives:
  - in front of it
  - ahead of it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal/spatial 'before' works in the astronomical sequence and preserves
    ambiguity between precedence and position.
- source_word: ይትረአይ
  chosen: is seen
  alternatives:
  - appears
  - becomes visible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/reflexive visibility verb. 'Is seen' is slightly more formal
    and transparent to the source than the smoother 'appears.'
