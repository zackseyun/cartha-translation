translation:
  text: And they set, and they enter the western portals, and make their circuit by
    the north, and by the eastern portals they come out upon the face of the sky.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The repeated portal imagery reflects the Astronomical Book's picture of
      the sky as structured with fixed openings through which the luminaries move.
    reason: cultural_note
  - marker: b
    text: The clause rendered 'make their circuit by the north' is somewhat terse
      in the Ge'ez and could also be understood as movement around or along the northern
      side.
    reason: lexical_alternative
lexical_decisions:
- source_word: የዐርቡ
  chosen: they set
  alternatives:
  - they go down
  - they descend
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book, the luminaries are regularly described as setting;
    'they set' preserves the technical celestial sense without over-paraphrase.
- source_word: ይበውኡ
  chosen: they enter
  alternatives:
  - they go in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion verb; 'enter' fits the repeated imagery of luminaries
    passing through heavenly gates or portals.
- source_word: ኆዋኅወ
  chosen: portals
  alternatives:
  - gates
  - windows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Astronomical Book depicts fixed openings in heaven for celestial
    movement. 'Portals' preserves the cosmic-architectural imagery and avoids flattening
    it into ordinary 'doors' or overly concrete 'windows'.
- source_word: ምዕራብ
  chosen: western
  alternatives:
  - west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used adjectivally with 'portals'; 'western portals' is idiomatic and
    keeps the directional force.
- source_word: የአውዱ
  chosen: make their circuit
  alternatives:
  - go around
  - turn about
  - complete their course
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests circling or going around. 'Make their circuit' suits
    astronomical movement and preserves the patterned, ordered motion of the luminaries.
- source_word: እንተ መስዕ
  chosen: by the north
  alternatives:
  - toward the north
  - on the north side
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks the route or side along which the circuit is made.
    'By the north' is concise and preserves the directional framework.
- source_word: እንተ ኆዋኅወ ምሥራቅ
  chosen: by the eastern portals
  alternatives:
  - through the eastern portals
  - at the eastern gates
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Parallel to the western portals earlier in the verse; 'by' keeps the
    route imagery while allowing for emergence from those openings.
- source_word: ይወፅኡ
  chosen: they come out
  alternatives:
  - they go out
  - they emerge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is the natural counterpart to 'enter.' 'Come out' reads smoothly
    in English while preserving the portal imagery.
- source_word: ዲበ ገጸ ሰማይ
  chosen: upon the face of the sky
  alternatives:
  - on the surface of heaven
  - across the face of the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a vivid apocalyptic-cosmic expression. 'Upon the face of the
    sky' preserves the concrete imagery better than a flattened 'in the sky.'
