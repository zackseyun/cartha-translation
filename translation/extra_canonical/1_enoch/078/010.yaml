translation:
  text: 'And Uriel showed me another law: when light is transferred into the moon, and from which direction it is transferred from the sun.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'another order' or 'another ordinance.' The Ge'ez term can denote an ordered rule or fixed arrangement in the cosmos.
    reason: lexical_alternative
  - marker: b
    text: 'The wording is somewhat compressed: the sense is that Uriel showed Enoch the rule governing how the moon receives its light from the sun.'
    reason: alternative_reading
  - marker: c
