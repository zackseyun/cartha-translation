theological_decisions:
- issue: Nature of the moon's light
  chosen_reading: The verse describes the moon's light as derived from the sun by transfer.
  alternative_readings:
  - The verse merely notes a relation between moonlight and sunlight without asserting derivation
  - The underlying text may have a more technical astronomical nuance now obscured in Ge'ez
  rationale: The repeated passive verb with 'light,' 'into the moon,' and 'from the sun' strongly suggests derived luminosity. This is a cosmological statement within the Astronomical Book, not later theological symbolism.
  doctrine_reference: Preserve local passage meaning and apocalyptic cosmology without harmonizing to later tradition.
