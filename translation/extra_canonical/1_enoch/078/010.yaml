lexical_decisions:
- source_word: ካልእት
  chosen: another
  alternatives:
  - a second
  - an additional
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective marks a further item in a sequence of astronomical regulations. 'Another' is natural English and preserves the sequential force.
- source_word: ሥርዓተ
  chosen: law
  alternatives:
  - order
  - rule
  - ordinance
  - regulation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term often denotes an ordered cosmic rule or fixed arrangement. 'Law' preserves the solemn, quasi-creational sense better than the more bureaucratic 'regulation,' though 'order' remains possible.
- source_word: አርአየኒ
  chosen: showed me
  alternatives:
  - revealed to me
  - made me see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward visionary-report verb. 'Showed me' fits the apocalyptic register without overinterpreting as special revelation language.
- source_word: ይትወደይ
  chosen: is transferred
  alternatives:
  - is conveyed
  - is brought over
  - passes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive verbal form describes movement of light from one luminary to another. 'Is transferred' best captures the technical astronomical sense in context.
- source_word: ብርሃን
  chosen: light
  alternatives:
  - brightness
  - radiance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is literal luminary light. 'Light' is the clearest and least interpretive rendering.
- source_word: ውስተ ወርኅ
  chosen: into the moon
  alternatives:
  - in the moon
  - within the moon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition commonly marks motion into. Because the verb already implies transfer, 'into the moon' best reflects the directional sense.
- source_word: እምኀበ
  chosen: from where
  alternatives:
  - from where/from whom
  - whence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the source of the moon's light. 'From where' is slightly awkward in English but preserves the interrogative-relative force of the Ge'ez.
- source_word: እምፀሐይ
  chosen: from the sun
  alternatives:
  - out of the sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This identifies the sun as the source from which the moon's light is transferred.
