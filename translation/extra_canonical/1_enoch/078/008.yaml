translation:
  text: And in its waning, on the first day it diminishes to fourteen parts of its light, and on the second it diminishes to thirteen parts of light, and on the third it diminishes to twelve, and on the fourth to eleven parts, and on the fifth it diminishes to ten parts, and on the sixth it diminishes to nine parts, and on the seventh it diminishes to eight parts, and on the eighth it diminishes to seven, and on the ninth it diminishes to six, and on the tenth it diminishes to five, and on the eleventh it diminishes to four, and on the twelfth it diminishes to three, and on the thirteenth it diminishes to two, and on the fourteenth it diminishes to half of a seventh part of all its light; and on the fifteenth day that which remains from the whole is consumed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final fraction, 'half of a seventh part,' is a literal rendering of a mathematically awkward Ge'ez expression. The text appears to preserve a precise fractional remainder rather than a smoother idiom.
    reason: lexical_alternative
  - marker: b
    text: The verse describes the measured waning of the moon's light across successive days; 'becomes visible' may also be understood as 'is seen' or 'appears' with reference to the remaining portion.
    reason: lexical_alternative
  - marker: c
    text: Or 'diminishes by fourteen parts of its light, and on the second it diminishes by thirteen parts of light, and on the third by twelve, and on the fourth by eleven parts, and on the fifth it diminishes by ten parts, and on the sixth it diminishes by nine parts, and on the seventh by eight parts, and on the eighth it diminishes by seven, and on the ninth it diminishes by six, and on the tenth by five, and on the eleventh by four, and on the twelfth by three, and on the thirteenth by two, and on the fourteenth by half of a seventh part of all its light'.
    reason: previous_rendering
  - marker: d
    text: Or 'becomes visible'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሕጸጸ
  chosen: waning
  alternatives:
  - decrease
  - diminishing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun/verb cluster refers to decrease or diminution of the moon's light. 'Waning' is idiomatic in astronomical context and preserves the luminary-cycle setting better than a generic 'decrease'.
- source_word: የኀጽጽ
  chosen: diminishes
  alternatives:
  - decreases
  - wanes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repeated verbal form marking the progressive reduction of light. 'Diminishes' keeps the repetitive numerical sequence clear; 'wanes' would also fit but is slightly less transparent when repeated with counted parts.
- source_word: እደ / ክፍለ
  chosen: parts
  alternatives:
  - portions
  - fractions
  - shares
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse counts the moon's light in measured divisions. 'Parts' is natural English and flexible enough to cover both terms in this enumerative context without over-technicalizing.
- source_word: ብርሃኑ / ብርሃን
  chosen: its light / light
  alternatives:
  - brightness
  - radiance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The concern is the measurable visible light of the luminary. 'Light' is the most direct rendering and avoids adding poetic color not demanded by the text.
- source_word: መንፈቀ፡ ሳብዐቱ
  chosen: half of a seventh part
  alternatives:
  - a half-seventh part
  - half of the seventh
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase is mathematically awkward in English but should remain transparent rather than smoothed away. 'Half of a seventh part' best reflects the fractional expression in the Ge'ez.
- source_word: ይትዌዳእ
  chosen: becomes visible
  alternatives:
  - is seen
  - appears
  - is made known
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this astronomical context the verb most naturally refers to what can be seen of the moon after the sequence of diminutions. 'Becomes visible' fits the observational register.
- source_word: ዘተረፈ፡ እምኵሉ
  chosen: that which remains from the whole
  alternatives:
  - what is left of the whole
  - the remainder of all of it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the residual amount after the counted losses. 'That which remains from the whole' preserves the slightly formal, measured tone of the source.
