lexical_decisions:
- source_word: አውራኅ
  chosen: days
  alternatives:
  - paths
  - courses
  - seasons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form commonly denotes 'days' or a temporal span. In this astronomical context it could overlap with 'courses,' but the immediate syntax with the luminaries favors a temporal expression rather than a spatial path.
- source_word: እሙራን
  chosen: the luminaries
  alternatives:
  - the lights
  - the heavenly lights
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term refers to the heavenly light-bearers, especially sun and moon. 'Luminaries' preserves the technical-apocalyptic register better than the flatter 'lights'.
- source_word: ይከውን
  chosen: it shall be
  alternatives:
  - it becomes
  - there shall be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward future/copular rendering fits the calendrical statement.
- source_word: ፳ወ፱መዋዕል
  chosen: twenty-nine days
  alternatives:
  - twenty and nine days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral plus 'days' is explicit and should be rendered directly in idiomatic English.
- source_word: ለወርኅ
  chosen: for the month
  alternatives:
  - of the month
  - as the month
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can be rendered several ways. 'For the month' preserves the Ge'ez construction while still making sense in English as a calendrical measure.
- source_word: ወቦ
  chosen: and at one time
  alternatives:
  - and there is
  - and sometimes
  - and it happens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR is somewhat uncertain here, but the phrase appears to introduce an additional temporal note. 'At one time' keeps the statement tentative and transparent without overcommitting.
- source_word: አመ
  chosen: time
  alternatives:
  - year
  - season
  - occasion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although often 'year,' the immediate phrase here works better as a more general temporal marker, especially given the compressed OCR witness.
- source_word: ፭ወሳሙን
  chosen: five weeks
  alternatives:
  - five sevens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes a week or heptad. 'Five weeks' is the most natural English rendering, though the phrase is difficult in context and may reflect a textual problem.
