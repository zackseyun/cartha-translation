  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/078/009.job-72655.json
  category: mistranslation
  tier: 2
  from: And in the days of the luminaries, it shall be twenty-nine days for the month, and at one time five weeks.
  to: And in certain months, the month has twenty-nine days, and once twenty-eight.
  rationale: 'The draft contains multiple severe lexical errors. First, አውራኅ is the plural of ወርኅ (''month''), not ''days''. Second, እሙራን means ''certain'' or ''fixed'' (from አመረ), not ''luminaries'' (which would be ብርሃናት). Third, the OCR reading ፭ወሳሙን is a misrecognition of ፳ወ፰ (28), as ፳ (20) is visually similar to ፭ (5). The verse describes the length of lunar months: ''And in certain months the month has twenty-nine days, and once twenty-eight.'''
