theological_decisions:
- issue: Whether to render the moon's final state with ordinary astronomical language
    or preserve the text's vivid luminary imagery
  chosen_reading: when it is extinguished
  alternative_readings:
  - when it sets
  - when it grows dark
  rationale: The Astronomical Book often describes celestial processes in concrete,
    almost mechanical imagery. 'Extinguished' preserves that apocalyptic-cosmic register
    without paraphrasing it into modern scientific prose.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic language
    into generic modern prose.
