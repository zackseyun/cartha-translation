lexical_decisions:
- source_word: ኵሎ፡ ዘመነ፡
  chosen: throughout the time
  alternatives:
  - all the time
  - the whole period
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the entirety of a period rather than a punctual moment.
    'Throughout the time' preserves the distributive force of ኵሎ with the temporal
    noun.
- source_word: ዘተነሡር፡ ወርኅ፡
  chosen: when the moon is waning
  alternatives:
  - of the moon's decrease
  - when the moon declines
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The participial form with ወርኅ refers to the moon in its diminishing phase.
    'Waning' is idiomatic English for the lunar context and preserves the astronomical
    sense.
- source_word: ብርሃነ፡ ዚአሃ፡
  chosen: its light
  alternatives:
  - her light
  - the light of it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construct phrase denotes the moon's own light. 'Its' fits modern
    English style for a celestial body without importing personification into the
    main text.
- source_word: ትወዲ፡
  chosen: diminishes
  alternatives:
  - decreases
  - is reduced
  - wanes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb describes the lessening of the moon's light. 'Diminishes' avoids
    redundancy with the earlier 'waning' while keeping the progressive loss of brightness.
- source_word: በቅድመ፡ ፀሐይ፡
  chosen: before the sun
  alternatives:
  - in front of the sun
  - in the presence of the sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'before the sun.' In this astronomical context it likely means
    in relation to or in the presence of the sun; the more literal 'before the sun'
    preserves the imagery and leaves the exact cosmological nuance open.
- source_word: እስከ፡ ፲ወ፬መዋዕል፡
  chosen: until fourteen days are completed
  alternatives:
  - until fourteen days
  - as far as fourteen days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase gives the duration of the waning process. Supplying 'are completed'
    in English reflects the following completion language and yields a natural temporal
    clause.
- source_word: '[ይትፌጸም፡ ብርሃና፡]'
  chosen: are completed
  alternatives:
  - its light is finished
  - its light comes to an end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bracketed text appears uncertain in the OCR but likely contains the
    completion formula. I have reflected its sense in the temporal clause rather than
    repeating 'light' awkwardly twice in English.
- source_word: ወሶበ፡ ይውዒ፡
  chosen: and when it is extinguished
  alternatives:
  - and when it sets
  - and when it becomes dark
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to denote going out or being quenched, fitting the moon's
    light reaching darkness at the end of waning. 'Extinguished' preserves the vivid
    luminary imagery.
- source_word: ኵሉ፡ ይትፌጸም፡ ብርሃኑ፡
  chosen: all its light is completed
  alternatives:
  - its whole light is finished
  - all its light comes to an end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez uses completion language rather than a simple verb of disappearance.
    'Is completed' keeps the formal, schematic style of the Astronomical Book, even
    if slightly unusual in English.
- source_word: ውስተ፡ ሰማይ።
  chosen: in the sky
  alternatives:
  - in heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this astronomical context, 'sky' better communicates the visible celestial
    sphere, while 'heaven' could sound overly theological in English.
