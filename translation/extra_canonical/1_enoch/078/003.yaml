translation:
  text: These are the two great luminaries; their circuits are like the circuit of
    heaven, and the size of the circuit of the two of them is equal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is difficult. The Ge'ez appears to say that the measured
      extent of the circuit belonging to both luminaries is 'equal' or 'the same.'
      A more literal alternative would be, 'and the measure of their circuit, for
      the two of them, is the same.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ብርሃናት
  chosen: luminaries
  alternatives:
  - lights
  - bright ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term refers to the heavenly light-bearers,
    not merely abstract light. 'Luminaries' preserves the cosmological register better
    than the flatter 'lights'.
- source_word: ዐበይት
  chosen: great
  alternatives:
  - large
  - mighty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With the two heavenly bodies, 'great' is the most natural elevated English
    equivalent and matches the descriptive force without overinterpreting as power
    ('mighty').
- source_word: ክበቦሙ
  chosen: their circuits
  alternatives:
  - their circles
  - their orbits
  - their spheres
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes a round course or circuit. 'Circuits' preserves the
    geometric/cosmic imagery while avoiding the overly modern scientific term 'orbits'
    and the potentially static 'circles'.
- source_word: ከመ ክበበ ሰማይ
  chosen: like the circuit of heaven
  alternatives:
  - like the circle of heaven
  - according to the circuit of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison marker ከመ is best taken as 'like.' 'Circuit of heaven'
    keeps the cosmological image and echoes the repeated use of the same root.
- source_word: ወእምጣነ
  chosen: and the size
  alternatives:
  - and the measure
  - and the extent
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term points to measure or extent. 'Size' is readable modern English,
    though the underlying sense of measured extent remains important.
- source_word: ለክልኤሆሙ ዕሩይ
  chosen: of the two of them is equal
  alternatives:
  - for the two of them is the same
  - for both of them is fitting/proper
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The closing adjective/adverbial expression appears to indicate equivalence
    or sameness in measure. Rendering it as 'is equal' gives a coherent sense in context
    while acknowledging some lexical uncertainty.
