  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes upward movement/appearance of a luminary. 'Rises' is the natural English rendering in astronomical context and preserves the observational register.
- source_word: ወርኅ
  chosen: the moon
  alternatives:
  - moon
  - month
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this luminary context the noun clearly refers to the moon, not 'month,' since the verse describes visible appearance and light.
- source_word: ያስተርኢ በሰማይ
  chosen: appears in the sky
  alternatives:
  - shows itself in the sky
  - is seen in the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the visual, observational force of the Ge'ez without over-literal awkwardness.
- source_word: መንፈቀ ሳብዕተ
  chosen: half of a seventh part
  alternatives:
  - a half of one-seventh
  - half of the seventh
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is numerical and technical within the Astronomical Book's schematic reckoning of lunar light. 'Half of a seventh part' preserves the fractional idiom more transparently than smoothing it into a decimalized expression.
- source_word: እደ
  chosen: part
  alternatives:
  - portion
  - measure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the term functions as a unit or portion in the moon's measured illumination. 'Part' best matches the repeated numerical scheme of the chapter.
- source_word: ብርሃን
  chosen: light
  alternatives:
  - brightness
  - radiance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The chapter tracks the moon's visible illumination quantitatively. 'Light' is simple and sufficiently concrete.
- source_word: ኵሉ
  chosen: all
  alternatives:
  - the whole of
  - its full
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retained to reflect the totality of the moon's light as reckoned in the verse, though the syntax is compressed.
- source_word: ከመ ዐሡር ወረቡዕ
  chosen: to the measure of fourteen parts
  alternatives:
  - as fourteen
  - into fourteen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally gives the number fourteen. Because the surrounding language is about measured portions of light, 'to the measure of fourteen parts' makes explicit the implied unit without changing the sense.
- source_word: ይፈጽም ብርሃኖ
  chosen: its light is completed
  alternatives:
  - its light is made full
  - its light reaches completion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys completion or fulfillment. 'Is completed' preserves the technical, process-oriented tone of the astronomical description better than the more idiomatic 'becomes full.'
