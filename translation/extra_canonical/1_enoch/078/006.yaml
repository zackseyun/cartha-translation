theological_decisions:
- issue: Whether to render the verse in ordinary lunar-language ('half-full,' 'full brightness') or preserve the schematic numerical idiom of the Astronomical Book
  chosen_reading: 'Preserve the numerical reckoning: ''half of a seventh part'' and ''fourteen parts'''
  alternative_readings:
  - Render dynamically as a description of the moon's visible phase
  - Interpret fourteen as an implicit full moon and translate more idiomatically
  rationale: This section is not generic poetic description but a technical-apocalyptic account of luminary courses and measured light. Preserving the numbered portions respects the source's cosmological scheme and avoids paraphrase beyond the Ge'ez witness.
  doctrine_reference: Translation philosophy §§1, 3, 5; book-context guidance on preserving cosmic imagery
