translation:
  text: On the first day she is called the waxing one, because on that day the light
    rises over her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the moon is in its increasing phase at the beginning of the month.
    reason: cultural_note
  - marker: b
    text: Or 'light appears upon her.' The Ge'ez expression pictures brightness coming
      up over the moon.
    reason: lexical_alternative
lexical_decisions:
- source_word: በቀዳሚት ዕለት
  chosen: On the first day
  alternatives:
  - In the first day
  - At the first day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal prepositional phrase marking the specific day within the lunar
    sequence; idiomatic English uses 'on the first day.'
- source_word: ሠርቀ
  chosen: the waxing one
  alternatives:
  - waxing
  - increase
  - rising
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book's lunar context, the term denotes the moon in
    its increasing phase. Rendering it substantivally as 'the waxing one' preserves
    the naming formula ('she is called ...') and the luminary imagery better than
    a bare abstract noun.
- source_word: ትሠመይ
  chosen: she is called
  alternatives:
  - it is called
  - she is named
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The feminine verbal form points to the moon, regularly treated as feminine
    in this context. 'She is called' preserves that grammatical gender and the personified
    luminary style.
- source_word: እስመ
  chosen: because
  alternatives:
  - for
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the explanation for the designation given in the first clause.
- source_word: ይትነሣእ ላዕሌሃ ብርሃን
  chosen: the light rises over her
  alternatives:
  - light appears upon her
  - brightness comes up over her
  - light is lifted over her
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase describes light coming up upon the moon at the start of its
    waxing. 'Rises over her' is natural English while preserving the vertical/apparent-motion
    imagery of the Ge'ez.
