theological_decisions:
- issue: Gendered reference to the luminary
  chosen_reading: Use feminine pronouns for the moon ('she,' 'her')
  alternative_readings:
  - Use neuter English ('it') for smoother modern style
  rationale: The Ge'ez verbal/pronominal forms are feminine, and the Astronomical
    Book often presents the luminaries with vivid, quasi-personified force. Preserving
    the feminine reference maintains the source texture without importing later theology.
  doctrine_reference: Translation philosophy §Original-language primacy; preserve
    apocalyptic imagery
