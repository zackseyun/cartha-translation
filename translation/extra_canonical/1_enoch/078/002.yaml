theological_decisions:
- issue: Whether ወርኅ should be rendered 'moon' or 'month'
  chosen_reading: moon
  alternative_readings:
  - month
  rationale: The verse lists four proper names belonging to the celestial body within
    the Book of the Luminaries. Rendering it as 'month' would obscure that the named
    referent is the luminary itself, even though the same Ge'ez word can overlap semantically
    with the calendrical month.
  doctrine_reference: Translation philosophy §Original-language primacy over translation
    tradition; §Consistency of key terms, or documented exception.
