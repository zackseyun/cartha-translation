translation:
  text: 'And the moon has four names: the first is Asonya, the second Abla, the third
    Benase, and the fourth Erae.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ge'ez ወርኅ can mean either 'moon' or 'month.' Here 'moon' is preferred because
      the verse assigns four names to the luminary.
    reason: lexical_alternative
  - marker: b
    text: The four names are transliterations of the Ethiopic forms. Their underlying
      older forms, if any, are uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: ወርኅ
  chosen: moon
  alternatives:
  - month
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term can denote either 'month' or 'moon,'
    but here the following clause assigns four proper names to the luminary itself,
    so 'moon' best fits the immediate context.
- source_word: አርባዕተ
  chosen: four
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward cardinal number modifying 'names'.
- source_word: አስማተ
  chosen: names
  alternatives:
  - appellations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural of 'name'; 'names' is the natural English rendering and preserves
    the catalog style of the verse.
- source_word: ቦቱ
  chosen: has
  alternatives:
  - for it
  - belong to it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This prepositional/pronominal form literally indicates possession ('to
    it, for it'). In English, 'has' expresses the possessive sense idiomatically without
    losing meaning.
- source_word: ፩ ስሙ
  chosen: the first is
  alternatives:
  - one name is
  - its first name is
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction introduces the first item in a sequence of names. 'The
    first is' is concise and natural in English while preserving the enumerative force.
- source_word: አሶንያ
  chosen: Asonya
  alternatives:
  - Asonia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Proper name transliterated rather than translated, following project
    policy for names. 'Asonya' reflects the Ge'ez form with y-sound preserved.
- source_word: ካልእ
  chosen: the second
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal marker for the second item in the list.
- source_word: አብላ
  chosen: Abla
  alternatives:
  - Abela
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Proper name transliterated directly from the Ge'ez witness.
- source_word: ሣልስ
  chosen: the third
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal marker for the third item in the list.
- source_word: ብናሴ
  chosen: Benase
  alternatives:
  - Bənase
  - Banase
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Proper name transliterated from the Ethiopic form; exact vocalization
    is uncertain, so a conservative transliteration is preferred.
- source_word: ራብዕ
  chosen: the fourth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal marker for the fourth item in the list.
- source_word: ኤራእ
  chosen: Erae
  alternatives:
  - Eraʾ
  - Erai
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Proper name transliterated from the Ge'ez witness. Final consonant/vowel
    representation is not fully certain in English, so 'Erae' gives a readable conservative
    form.
