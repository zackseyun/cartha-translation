- issue: Nature of the verse's cosmological claim
  chosen_reading: Render the statement as an ancient schematic description of luminary
    brightness and measure, without modernizing or allegorizing it.
  alternative_readings:
  - Treat the language as purely symbolic
  - Recast it into modern astronomical terminology
  rationale: The Astronomical Book presents ordered heavenly phenomena in measured
    apocalyptic terms. The translation should preserve that ancient cosmological register
    rather than resolve it into either metaphor or modern science.
