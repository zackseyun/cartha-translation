translation:
  text: In the disk of the sun there are seven portions of light which are added to
    it beyond the moon, and in measure they are added until the seventh portion of
    the sun is completed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic syntax is difficult. The line appears to describe the sun as
      exceeding the moon by seven measured portions of light, but the final clause
      can also be understood as 'until the seventh portion of the sun is completed'
      or 'surpassed.'
    reason: textual_variant
  - marker: b
    text: '''Circuit'' translates a term for circle or course, preserving the Astronomical
      Book''s schematic description of heavenly movement.'
    reason: cultural_note
  - marker: c
    text: Or 'beyond the moon'.
    reason: previous_rendering
  - marker: d
    text: Or 'until a seventh portion'.
    reason: previous_rendering
  - marker: e
    text: Or 'In the circuit of the sun'.
    reason: previous_rendering
lexical_decisions:
- source_word: በክበበ
  chosen: in the circuit of
  alternatives:
  - in the orbit of
  - in the circle of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ክበብ denotes a circle, circuit, or encircling course. In the Astronomical
    Book, a cosmic-motion sense is likely. 'Circuit' preserves the astronomical imagery
    without over-specifying a modern orbital model.
- source_word: ፀሐይ
  chosen: the sun
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the luminary in this context.
- source_word: ሰብዓቱ ክፍለ ብርሃን
  chosen: seven portions of light
  alternatives:
  - seven parts of light
  - seven divisions of light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ክፍል is a part, portion, or division; ብርሃን is light. 'Portions of light'
    keeps the quantitative, schematic style of the Astronomical Book.
- source_word: ዘይትዌሰክ ቦቱ
  chosen: which are added to it
  alternatives:
  - which are increased in it
  - which accrue to it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/additive sense fits the verse's description of increasing
    luminosity. 'To it' takes ቦቱ as referring back to the sun.
- source_word: እምወርኅ
  chosen: beyond the moon
  alternatives:
  - from the moon
  - than the moon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: እም can mark source or comparison. In this astronomical comparison, the
    sense is that the sun's light exceeds the moon's by seven portions. 'Beyond the
    moon' preserves comparative force while remaining cautious.
- source_word: መስፈርት
  chosen: in measure
  alternatives:
  - by measure
  - according to measure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes measure or standard. The phrase signals a regulated,
    quantified increase, important in the ordered cosmology of this section.
- source_word: ትትወደይ
  chosen: they are added
  alternatives:
  - they increase
  - they are augmented
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the surrounding additive language, this verb is best taken as a
    further statement of increase rather than motion or separation. Repeating 'added'
    reflects the text's schematic style.
- source_word: እስከ የሐልፍ
  chosen: until ... is passed
  alternatives:
  - until ... is exceeded
  - until ... is completed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys passing beyond or surpassing. Because the syntax is
    difficult, 'is passed' stays close to the underlying image without forcing a more
    interpretive paraphrase.
- source_word: ሳብዕ ክፍለ ፀሐይ
  chosen: a seventh portion of the sun
  alternatives:
  - the seventh part of the sun
  - the sun's seventh portion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This likely refers to the quantified solar measure reached or surpassed
    in the comparison. The phrase is retained quite literally because the exact mathematical
    relation is not fully transparent in the Ethiopic wording.
