translation:
  text: And I saw in those days that long cords were given to those angels, and they
    took for themselves wings and flew, and they went toward the north.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez phrase rendered 'long cords' could also be understood more specifically
      as 'long ropes' or possibly 'measuring cords.'
    reason: lexical_alternative
  - marker: b
    text: The wording 'those angels' may also be read 'the other angels,' depending
      on how the demonstrative is taken.
    reason: alternative_reading
lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - And I looked
  - And I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary report; 'saw' is clear modern English
    while preserving apocalyptic witness formula.
- source_word: በእማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - at that time
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common apocalyptic temporal formula; 'in those days' preserves the elevated
    repeated idiom.
- source_word: ተውህበ
  chosen: were given
  alternatives:
  - was given
  - was granted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive sense is clear in context; plural English agrees with the plural
    object 'cords'.
- source_word: ለአልእቱ መላእክት
  chosen: to those angels
  alternatives:
  - to the other angels
  - to those messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መላእክት normally means 'angels' in this apocalyptic context. አልእቱ can mean
    'those' or 'other'; 'those angels' is the less intrusive reading without over-specifying
    contrast.
- source_word: አሕባል ነዋኃን
  chosen: long cords
  alternatives:
  - ropes of great length
  - measuring cords
  - long ropes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase most naturally denotes cords/ropes characterized by length.
    'Long cords' is concise and preserves the concrete image without importing 'measuring'
    unless context requires it.
- source_word: ወነሡአ ሎሙ ክንፈ
  chosen: and they took for themselves wings
  alternatives:
  - and they took wings for themselves
  - and they acquired wings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reflexive nuance in ሎሙ is worth preserving. Singular ክንፈ functions collectively
    in English as 'wings.'
- source_word: ወሰረሩ
  chosen: and flew
  alternatives:
  - and soared
  - and sped away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best fits the immediate collocation with taking wings; 'flew' preserves
    the vivid apocalyptic motion plainly.
- source_word: ወሖሩ ሰመንገለ መስዕ
  chosen: and they went toward the north
  alternatives:
  - and they went to the north
  - and they traveled northward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Directional phrase is best rendered straightforwardly. 'Toward the north'
    preserves movement without forcing a final destination nuance.
