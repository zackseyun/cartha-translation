theological_decisions:
- issue: Identity of the angels
  chosen_reading: Render simply as 'those angels' without identifying them further.
  alternative_readings:
  - the other angels
  - a specific class of angels such as judgment-angels
  rationale: This verse itself does not define the group beyond 'those angels.' The
    translation should not import a fuller identification from surrounding interpretation
    into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
