translation:
  text: And I asked the angel, saying, “Why did they take these cords and go?” And he said to me, “They have gone so that they may measure.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “companies,” “groups,” or “assemblies” for “bands.” The Ge'ez refers to gathered collectives, but their precise characterization is not explicit in this verse alone.
    reason: lexical_alternative
  - marker: b
    text: The final clause may also mean “so that they may be apportioned” or “so that their measure may be determined.” Because this section is effectively preserved only in Ge'ez for this workflow, the more concrete wording “be measured” is retained.
    reason: alternative_reading
  - marker: c
    text: Or '“Why have those bands risen and gone?” And he said to me, “They have gone so that they may be measured.”'.
    reason: previous_rendering
lexical_decisions:
