theological_decisions:
- issue: Meaning of the final purpose clause in a Ge'ez-only Parables context
  chosen_reading: so that they may be measured
  alternative_readings:
  - so that they may be apportioned
  - so that their measure may be determined
  rationale: Because the Parables lack effective Greek/Qumran control here, the translation keeps the concrete image of measuring rather than resolving it into a more interpretive idea such as assignment or judgment-allotment. This preserves ambiguity and apocalyptic texture.
  doctrine_reference: Preserve theological tension rather than resolve it; Parables deserve extra restraint and transparency.
