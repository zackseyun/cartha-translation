  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward first-person perfect/narrative form introducing Enoch's question. 'Asked' is natural English and preserves the directness of the visionary dialogue.
- source_word: መላእክ
  chosen: the angel
  alternatives:
  - an angel
  - the messenger
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular object fits the immediate dialogue partner in the vision. 'Angel' is preferable to 'messenger' in this apocalyptic context, where a heavenly interpreter is in view.
- source_word: እንዘ እብሎ
  chosen: saying
  alternatives:
  - as I said
  - when I said
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common speech-introducing construction. 'Saying' keeps the Semitic-style narrative flow without becoming awkward.
- source_word: ለምንት
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct interrogative; concise English best matches the question form.
- source_word: ነሡ
  chosen: have ... risen
  alternatives:
  - arisen
  - stood up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes rising or standing up. 'Have risen' preserves the movement imagery and fits the paired action with 'gone.'
- source_word: እሎንቱ አኅበለ
  chosen: those bands
  alternatives:
  - those companies
  - those groups
  - those assemblies
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun appears to denote gathered groups or companies. 'Bands' preserves the collective, somewhat vivid apocalyptic sense without over-specifying their identity.
- source_word: ሖሩ
  chosen: gone
  alternatives:
  - departed
  - proceeded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic motion verb. 'Gone' is simple and idiomatic, and the repetition is preserved in the angel's reply.
- source_word: ከመ ይመጥኑ
  chosen: so that they may be measured
  alternatives:
  - in order that they may be measured
  - so that they may be apportioned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb likely carries the sense of measuring, meting out, or assigning by measure. 'Be measured' best preserves the concrete apocalyptic imagery and avoids prematurely interpreting the action as merely figurative distribution.
