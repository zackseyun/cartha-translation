theological_decisions:
- issue: Sense of the clause on wrath
  chosen_reading: The verse contrasts abundant mercy with wrath being distant or delayed.
  alternative_readings:
  - Wrath is removed altogether
  - Wrath belongs to another subject in the sentence
  rationale: 'The Ge''ez naturally reads as a contrastive pair: mercy is abundant, wrath is far off. In apocalyptic context this suggests delayed judgment rather than denial of judgment.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'all the measure of what he has made'
  chosen_reading: Retain the somewhat literal phrase as a reference to the extent, ordering, or measured structure of God's works.
  alternative_readings:
  - all that he has appointed
  - the whole number of his creatures
  rationale: Because the Parables are effectively Ge'ez-only here and the phrase is difficult, a transparent rendering is preferable to a confident paraphrase.
  doctrine_reference: When the sense is uncertain, prefer transparent English plus a footnote over false confidence.
