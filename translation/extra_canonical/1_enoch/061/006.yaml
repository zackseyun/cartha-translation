theological_decisions:
- issue: Identity of those in the highest heaven
  chosen_reading: A general reference to heavenly beings in the upper heaven
  alternative_readings:
  - specific angelic orders
  - the hosts of heaven collectively
  rationale: The verse does not name a specific class such as Watchers or holy ones. To avoid importing later systematization, the translation leaves the referent broad.
  doctrine_reference: Preserve theological tension rather than resolve it; keep terms locally grounded in the passage.
