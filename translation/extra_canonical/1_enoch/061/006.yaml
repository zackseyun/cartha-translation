translation:
  text: And all those in the height of heaven received a command, and power, and a voice, and a light like fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic text in the latter half of the verse is difficult in this witness. The phrase rendered 'the strength and the voice of the light' may also be understood with 'brightness/radiance' instead of 'light.'
    reason: textual_variant
  - marker: b
    text: Or 'all who were in the height of heaven.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And they received the command—all those in the highest heaven—and the strength and the voice of the light were like fire.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወነሥኡ
  chosen: and they received
  alternatives:
  - and they took
  - and they accepted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means 'take/receive.' In this context, with ትእዛዘ ('command'), 'received' fits the sense of beings taking up or accepting a command.
- source_word: ትእዛዘ
  chosen: the command
  alternatives:
  - instruction
  - order
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A singular authoritative directive is in view. 'Command' preserves the apocalyptic register better than the softer 'instruction.'
- source_word: እለ በ‘መልዕልተ ሰማይ ኵሎሙ
  chosen: all those in the highest heaven
  alternatives:
  - all who were in the height of heaven
  - all those above in heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to identify the heavenly beings located in the upper heaven. 'Highest heaven' is elevated but readable and preserves the superlative spatial imagery.
- source_word: ኃይለ
  chosen: the strength
  alternatives:
  - power
  - might
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes force or power. 'Strength' keeps the wording concrete and avoids over-interpreting whether this is personal might or empowering force.
- source_word: ቃለ
  chosen: the voice
  alternatives:
  - sound
  - utterance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In visionary contexts ቃል can mean voice/speech/word. 'Voice' best matches the paired sensory imagery with light and fire.
- source_word: ብርሃነ
  chosen: the light
  alternatives:
  - brightness
  - radiance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR around this segment is difficult, but the underlying noun is most plausibly 'light/brightness.' 'Light' is the simplest rendering, with the more interpretive 'radiance' noted as an alternative.
- source_word: ከመ እሳት
  chosen: were like fire
  alternatives:
  - was like fire
  - like a fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The simile should be preserved directly. Because the preceding nouns are coordinated, the plural verb in English ('were') gives the smoothest equivalent while retaining the image.
