translation:
  text: And to him belongs the first word; they shall bless and exalt and praise with
    wisdom, and they shall be wise in word and in the spirit of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a voice'; the Ge'ez ቃለ can denote 'voice,' 'word,' or 'speech.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they shall act wisely in word and in the breath of life.' The final
      phrase is difficult in this Ge'ez-only section of the Parables.
    reason: alternative_reading
  - marker: c
    text: Or 'And before him they shall bless with the voice, and they shall exalt'.
    reason: previous_rendering
lexical_decisions:
- source_word: መቅድመ
  chosen: before him
  alternatives:
  - before
  - in the presence of him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks presence before a figure mentioned in the prior
    context. English supplies 'him' for coherence, reflecting the relational sense
    rather than leaving an abrupt absolute 'before'.
- source_word: ቃለ
  chosen: with the voice
  alternatives:
  - with a voice
  - by speech
  - with utterance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun from 'word/voice/speech' here follows 'they shall bless' and
    most naturally expresses the manner of blessing. 'With the voice' preserves the
    concrete liturgical sound of the scene better than the flatter 'by speech'.
- source_word: ይባርኩ
  chosen: they shall bless
  alternatives:
  - they will bless
  - they shall speak blessing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward future/jussive-like narrative form. 'Bless' preserves
    the cultic and doxological force.
- source_word: ያሌዕሉ
  chosen: they shall exalt
  alternatives:
  - they shall lift up
  - they shall magnify
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys raising high or exalting. 'Exalt' fits the elevated
    register and keeps the parallel with blessing and praise.
- source_word: ይሴብሑ
  chosen: praise
  alternatives:
  - glorify
  - celebrate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common doxological verb. 'Praise' is the most direct and idiomatic
    rendering in this triad.
- source_word: በጥበብ
  chosen: in wisdom
  alternatives:
  - with wisdom
  - wisely
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase likely modifies the exalting and praising. 'In
    wisdom' preserves the formal texture and avoids reducing the noun to a mere adverb.
- source_word: ይጠብቡ
  chosen: they shall be wise
  alternatives:
  - they shall act wisely
  - they shall understand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears cognate with wisdom language and is paired with 'in
    speech and in the spirit of life.' Rendering it 'be wise' keeps the lexical tie
    to ጥበብ in the previous phrase.
- source_word: በነገር
  chosen: in speech
  alternatives:
  - in word
  - in matter
  - in discourse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the noun can mean 'word, matter, affair,' here in parallel with
    'spirit of life' it most naturally refers to utterance or discourse.
- source_word: መንፈሰ ሕይወት
  chosen: the spirit of life
  alternatives:
  - the breath of life
  - life-giving spirit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase can denote spirit or breath associated with life. 'Spirit
    of life' preserves the apocalyptic-religious register and avoids overcommitting
    to a physiological sense.
