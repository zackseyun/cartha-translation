theological_decisions:
- issue: Whether መንፈሰ ሕይወት should be rendered more concretely as 'breath of life'
    or more spiritually as 'spirit of life'
  chosen_reading: the spirit of life
  alternative_readings:
  - the breath of life
  rationale: In this heavenly praise context, the phrase likely carries more than
    mere respiration; 'spirit of life' preserves the elevated theological resonance
    while leaving the underlying ambiguity visible.
  doctrine_reference: Preserve theological tension rather than resolve it.
