translation:
  text: And these measures shall reveal all the hidden things in the depth of the earth, and those who were destroyed in the wilderness, and those who were devoured by wild beasts, and those who were devoured by the fish of the sea, so that they may return and be supported on the day of the Chosen One; for none shall perish before the Lord of Spirits, and none can perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb rendered 'be supported' is difficult; it may also be understood as 'be upheld' or possibly 'be gathered together.'
    reason: lexical_alternative
  - marker: b
    text: '''The Chosen One'' is a title used in the Parables for the eschatological figure associated with judgment and vindication.'
    reason: cross_reference
  - marker: c
    text: The final clause is compressed in Ge'ez. The sense is that no one can finally perish in the presence of the Lord of Spirits.
    reason: textual_variant
  - marker: d
    text: Or 'And these shall reveal'.
    reason: previous_rendering
lexical_decisions:
- source_word: እሉ
  chosen: these
  alternatives:
  - they
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative is retained as 'these' to preserve the verse's deictic force and connection to the previously mentioned cosmic agents, rather than smoothing to a generic pronoun.
- source_word: ይከሥቱ
  chosen: shall reveal
  alternatives:
  - will uncover
  - will disclose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A future-like rendering fits the visionary sequence. 'Reveal' preserves the apocalyptic sense of hidden realities being made manifest.
- source_word: ኅቡኣተ
  chosen: the hidden things
  alternatives:
  - the hidden ones
  - what is hidden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural object is best rendered concretely as 'the hidden things,' matching the following specification of those concealed in death.
- source_word: ለዕመቀ ምድር
  chosen: in the depth of the earth
  alternatives:
  - of the deep earth
  - in the depths of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the under-earth imagery of concealed dead or buried remains. Singular 'depth' follows the Ge'ez construction closely while remaining idiomatic.
- source_word: ተኃጕሉ
  chosen: were destroyed
  alternatives:
  - perished
  - were consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears again later in the verse in the sense 'perish.' Here 'were destroyed' avoids awkward repetition while still conveying violent death.
- source_word: እምበድው
  chosen: in the wilderness
  alternatives:
  - in the desert
  - from the wasteland
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Wilderness'' better preserves biblical-apocalyptic register than the more geographical ''desert,'' while remaining readable.'
- source_word: እምአራዊት
  chosen: by wild beasts
  alternatives:
  - by beasts
  - by savage animals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes wild animals; 'wild beasts' preserves the elevated register and danger imagery.
- source_word: እምዓሣ ባሕር
  chosen: by the fish of the sea
  alternatives:
  - by sea-fish
  - by the fish in the sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A fairly literal rendering preserves the cumulative catalog of those lost in inaccessible places.
- source_word: ከመ ይግብኡ
  chosen: so that they may return
  alternatives:
  - that they may come back
  - so that they may be brought back
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses purpose or result. 'Return' fits the resurrection-restoration context better than a bare 'come.'
- source_word: ይትመረጐዙ
  chosen: be supported
  alternatives:
  - be upheld
  - be strengthened
  - be gathered together
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is difficult in this context. 'Be supported' preserves a sense of being sustained or upheld in the eschatological assembly without overcommitting to a more interpretive gloss.
- source_word: በዕለተ ኅሩይ
  chosen: on the day of the Chosen One
  alternatives:
  - on the day of the Elect One
  - on the day of the Chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular title is important in the Parables. 'Chosen One' is clear modern English and preserves the local titular usage without importing later christological phrasing.
- source_word: አልቦቱ ዘይትኃጐል
  chosen: none shall perish
  alternatives:
  - there is none who will be destroyed
  - no one will be lost
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This concise rendering preserves the emphatic negation and echoes the resurrection assurance of the verse.
- source_word: በቅድመ እግዚአ መናፍስት
  chosen: before the Lord of Spirits
  alternatives:
  - in the presence of the Lord of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard title in 1 Enoch and should be rendered consistently. 'Before' keeps the judicial-presence nuance.
- source_word: ወአልቦ ዘይክል ተኃጕሎተ
  chosen: and none can perish
  alternatives:
  - and none is able to perish
  - and no one can be destroyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The closing line is terse and somewhat difficult. Rendering it as a general impossibility preserves the force of the assurance, though the exact object/complement is compressed in Ge'ez.
