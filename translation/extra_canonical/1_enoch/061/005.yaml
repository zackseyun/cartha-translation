theological_decisions:
- issue: Meaning of the resurrection-restoration clause
  chosen_reading: The verse speaks of those lost in earth, wilderness, beasts, and sea being restored on the eschatological day associated with the Chosen One.
  alternative_readings:
  - The verse merely states that hidden remains will be exposed for judgment
  - The clause refers to gathering survivors rather than raising the dead
  rationale: The cumulative list of those irretrievably dead, followed by 'so that they may return' and the denial that any perish before the Lord of Spirits, strongly favors resurrection/restoration imagery rather than simple disclosure of corpses.
  doctrine_reference: Preserve apocalyptic imagery and theological tension rather than flattening to generic prose.
- issue: Rendering of ኅሩይ
  chosen_reading: Chosen One
  alternative_readings:
  - Elect One
  - Chosen
  rationale: The title in the Parables carries local theological weight. 'Chosen One' is transparent English and avoids unnecessary archaism while preserving the titular force.
  doctrine_reference: Keep major terms locally grounded in the passage before harmonizing them across the corpus.
