theological_decisions:
- issue: Subject of the singular verbs ('he lifts up,' 'he sets')
  chosen_reading: Retain the singular 'he' without identifying the referent in the
    main text.
  alternative_readings:
  - the Lord of Spirits himself
  - the Chosen One / Son of Man figure
  - an impersonal or collective heavenly agent
  rationale: The immediate Ge'ez gives singular verbal action but does not explicitly
    restate the subject in this verse. Because the Parables are textually delicate
    and the referent may depend on broader context, the translation preserves the
    ambiguity rather than resolving it dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the phrase involving 'the word of the name of the Lord of Spirits'
  chosen_reading: Render it transparently as an instrumental phrase tied to divine
    authority.
  alternative_readings:
  - a command issued in the divine name
  - a revelatory declaration concerning the divine name
  rationale: The phrase is syntactically difficult in Ge'ez and likely carries solemn
    authority associated with the divine name. A transparent rendering is preferable
    to an interpretively narrowed paraphrase.
  doctrine_reference: When the sense is uncertain, prefer transparent English plus
    a footnote over false confidence.
