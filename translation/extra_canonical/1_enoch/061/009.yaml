translation:
  text: And when he lifts up his face to judge their hidden paths by the word of the
    name of the Lord of Spirits, and he sets them on the path of righteousness of
    the Lord of Spirits, then all of them will speak with one voice, and they will
    bless and praise and exalt and sanctify the name of the Lord of Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''their secret ways.'' The image is moral and judicial: their courses
      of life, though hidden, are exposed to judgment.'
    reason: lexical_alternative
  - marker: b
    text: The Ge'ez phrase rendered 'by the word of the name of the Lord of Spirits'
      is difficult. It may mean by the utterance, authority, or command associated
      with the divine name.
    reason: alternative_reading
  - marker: c
    text: The verb rendered 'he sets them' is uncertain in this line as transmitted
      by the Ethiopic witness; the sense appears to be that they are established or
      directed onto the path of righteousness.
    reason: textual_variant
lexical_decisions:
- source_word: ያሌዕል ገጾ
  chosen: he lifts up his face
  alternatives:
  - he raises his countenance
  - he turns his face upward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal image is preserved rather than reduced to a generic 'appears'
    or 'looks,' since the apocalyptic scene uses bodily imagery for authoritative
    action.
- source_word: ይኰንን
  chosen: to judge
  alternatives:
  - to govern
  - to condemn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of hidden paths and ensuing righteous alignment, judicial
    evaluation is primary. 'Judge' preserves the forensic-apocalyptic force without
    over-specifying condemnation.
- source_word: ፍኖቶሙ እንተ ኅቡእ
  chosen: their hidden paths
  alternatives:
  - their secret ways
  - their concealed courses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ፍኖት commonly denotes way/path/course. 'Paths' keeps the moral-journey
    metaphor active; 'hidden' reflects what is concealed rather than merely private.
- source_word: በነገረ ስሙ
  chosen: by the word of the name
  alternatives:
  - by the utterance of his name
  - by the command of the name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is somewhat difficult, but 'word of the name' most closely
    follows the Ge'ez while preserving the solemn power associated with the divine
    name. A smoother paraphrase would hide the textual texture.
- source_word: አሰረ ዚአሆሙ
  chosen: he sets them
  alternatives:
  - he establishes them
  - he binds them
  - he directs them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is difficult in this OCR context. Given the following phrase
    'on the path of righteousness,' the sense appears to be placing or establishing
    them on that path, not literal binding. This is rendered cautiously and footnoted.
- source_word: በፍኖተ ጽድቅ
  chosen: on the path of righteousness
  alternatives:
  - in the way of righteousness
  - on the road of justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Path of righteousness'' preserves the recurring apocalyptic-ethical
    metaphor and aligns with the project''s default preference for ''righteousness''
    over ''justice'' where moral rectitude is foregrounded.'
- source_word: በ፩ቃል
  chosen: with one voice
  alternatives:
  - with one word
  - in one utterance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'with one word/voice'; idiomatic English 'with one voice' best
    conveys unified acclamation while remaining close to the source.
- source_word: ይባርኩ ወይሴብሑ ወያሌዕሉ ወይቄድሱ
  chosen: they will bless and praise and exalt and sanctify
  alternatives:
  - they will bless and glorify and extol and make holy
  - they will bless and praise and lift up and hallow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The fourfold sequence is retained without compression, since repetitive
    praise formulas are characteristic of the style. 'Sanctify' is kept rather than
    softened to 'honor as holy' to preserve cultic force.
- source_word: እግዚአ መናፍስት
  chosen: Lord of Spirits
  alternatives:
  - Lord of the Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established title within 1 Enoch and should remain consistent.
    The anarthrous English form reads naturally while preserving the distinctive Enochic
    divine title.
