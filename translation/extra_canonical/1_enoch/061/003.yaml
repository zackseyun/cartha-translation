lexical_decisions:
- source_word: ዘምስሌየ የሐውር
  chosen: who went with me
  alternatives:
  - who was with me
  - who walked with me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative plus verb of going/walking naturally yields 'who went with me.' This preserves the recurring Enochic guide-angel formula without over-literal awkwardness.
- source_word: እሙንቱ
  chosen: these are
  alternatives:
  - these
  - those are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative points to realities just seen in the vision. 'These are' makes the angel's identification explicit in English.
- source_word: እምጣነ ጻድቃን
  chosen: from the abundance of the righteous
  alternatives:
  - from the measure of the righteous
  - from the fullness of the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጣነ can denote quantity or measure; in this context of heavenly provision, 'abundance' best fits the imagery while retaining the sense of sourced plenitude.
- source_word: ማእሰረ ጻድቃን
  chosen: the storehouses of the righteous
  alternatives:
  - the treasuries of the righteous
  - the reserves of the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun suggests a place of storing or treasury. 'Storehouses' preserves the concrete apocalyptic image better than a more abstract rendering.
- source_word: ይመጽኡ ለጻድቃን
  chosen: have come for the righteous
  alternatives:
  - come to the righteous
  - are brought for the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb of coming with the dative/benefactive sense is best rendered 'have come for the righteous,' indicating provision directed toward them.
- source_word: ከመ ይትመረጐዙ
  chosen: so that they may rely on
  alternatives:
  - so that they may lean on
  - so that they may be strengthened upon
  - so that they may trust in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The reflexive/passive form suggests support, leaning, or finding firmness. 'Rely on' communicates dependence on the divine name while avoiding importing later formulaic wording too strongly.
- source_word: ስሙ ለእግዚአ መናፍስት
  chosen: the name of the Lord of Spirits
  alternatives:
  - the name of the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lord of Spirits'' is the established Enochic title and should be preserved consistently as a title rather than flattened into a generic phrase.'
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for the age of ages
  - for ever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This idiom expresses enduring perpetuity. 'Forever and ever' is readable modern English while preserving the solemn force of the formula.
