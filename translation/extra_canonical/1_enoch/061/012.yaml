theological_decisions:
- issue: Identity of the 'holy ones' and 'chosen ones'
  chosen_reading: Render both terms straightforwardly without specifying whether they
    are angels, glorified righteous humans, or a mixed heavenly company.
  alternative_readings:
  - holy ones = angels only
  - chosen ones = redeemed humans only
  rationale: The verse lists multiple heavenly groups in a visionary doxology. The
    text itself does not force a rigid ontological distinction, so the translation
    preserves the categories without resolving them.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of ገነት ሕይወት
  chosen_reading: the garden of life
  alternative_readings:
  - paradise of life
  rationale: The Ge'ez imagery is garden-centered and should remain so unless context
    compels the more traditional 'paradise.' This avoids importing later Christianized
    diction.
  doctrine_reference: Original-language primacy over translation tradition.
