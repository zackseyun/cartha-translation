translation:
  text: All who do not sleep in the heights of heaven shall bless him; all the holy
    ones who are in heaven shall bless him, and all the chosen ones who dwell in the
    garden of life; and every spirit of light that is able to bless and glorify and
    exalt and sanctify your blessed name; and all flesh shall exceedingly and with
    power praise and bless your name forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'beyond measure from power' is textually and syntactically
      difficult in the Ethiopic witness. It may convey the idea of flesh endowed with
      surpassing strength or abundance of power.
    reason: textual_variant
  - marker: b
    text: '''Who do not sleep'' likely refers to wakeful heavenly beings in perpetual
      attendance, not merely to human vigilance.'
    reason: cultural_note
  - marker: c
    text: Or 'May all who do not sleep in the heights of heaven bless you; may all
      the holy ones who are in heaven bless you'.
    reason: previous_rendering
  - marker: d
    text: Or 'and all flesh beyond measure from power shall glorify and bless'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይባርክዎ / ትባርክ
  chosen: bless you / bless your name
  alternatives:
  - praise
  - speak blessing over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated root for blessing structures the verse liturgically. 'Bless'
    preserves the cultic and doxological force better than flattening all occurrences
    into 'praise.'
- source_word: እለ ኢይነውሙ
  chosen: who do not sleep
  alternatives:
  - who are sleepless
  - who never sleep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A relatively formal rendering preserves the vivid apocalyptic image of
    wakeful heavenly beings. 'Never sleep' is slightly stronger than the wording warrants.
- source_word: በመልዕልተ ሰማይ
  chosen: in the heights of heaven
  alternatives:
  - in the highest heaven
  - in the upper heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the elevated heavenly realm. 'Heights of heaven'
    keeps the spatial imagery without overcommitting to a technical cosmological level
    such as 'highest heaven.'
- source_word: ቅዱሳን
  chosen: holy ones
  alternatives:
  - saints
  - holy beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context this likely refers to heavenly holy beings; 'holy
    ones' is transparent and avoids importing later ecclesiastical overtones of 'saints.'
- source_word: ኅሩያን
  chosen: chosen ones
  alternatives:
  - elect ones
  - the chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key Enochic term and should be rendered consistently and locally,
    not harmonized to later doctrinal formulas.
- source_word: ገነት ሕይወት
  chosen: the garden of life
  alternatives:
  - the paradise of life
  - the garden of living
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Garden of life'' preserves the Edenic-apocalyptic image directly from
    the Ge''ez. ''Paradise'' is possible but carries later traditional associations
    not required by the verse.'
- source_word: መንፈሰ ብርሃን
  chosen: spirit of light
  alternatives:
  - spirit of brightness
  - luminous spirit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering best preserves the cosmic imagery and avoids interpretive
    narrowing.
- source_word: ዘትክል
  chosen: that is able
  alternatives:
  - that can
  - that is fit to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to express capacity or fitness. 'Is able' is clear and
    restrained.
- source_word: ባርኮተ ወሰብሖተ ወአልዕሎተ ወቀድሶተ
  chosen: to bless and glorify and exalt and sanctify
  alternatives:
  - to bless and praise and magnify and hallow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The fourfold sequence should remain fourfold. 'Glorify' and 'exalt' preserve
    the elevated doxological cadence; 'sanctify' reflects the holiness language tied
    to the divine name.
- source_word: ለስምከ ቡሩክ
  chosen: your blessed name
  alternatives:
  - your name, the Blessed One
  - your name which is blessed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction most naturally qualifies 'name.' This keeps the doxological
    idiom compact in English.
- source_word: ኵሉ ሥጋ
  chosen: all flesh
  alternatives:
  - every creature
  - all living flesh
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''All flesh'' is a weighty biblical-apocalyptic expression and should
    be preserved rather than generalized.'
- source_word: '[ዘ]ፈድፋደ እምኃይል'
  chosen: beyond measure from power
  alternatives:
  - abounding in strength
  - with surpassing power
  - in excess of strength
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause is difficult in the OCR witness. The chosen rendering stays
    close to the apparent sense of excess/surpassing linked with power, while signaling
    the unusual wording.
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for the age of ages
  - to everlasting ages
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard idiomatic English equivalent preserves the emphatic perpetuity
    of the Ge'ez formula.
