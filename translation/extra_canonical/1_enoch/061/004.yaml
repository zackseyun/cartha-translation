lexical_decisions:
- source_word: ይዌጥኑ
  chosen: shall rest
  alternatives:
  - shall recline
  - shall dwell
  - shall repose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with የሐድሩ ('they will dwell/abide'), this verb likely denotes
    settling down or resting rather than a more active motion. 'Rest' preserves the
    eschatological tone without over-paraphrasing.
- source_word: የሐድሩ
  chosen: with
  alternatives:
  - and dwell
  - and abide
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sequence ይዌጥኑ፡ ወየሐድሩ may be hendiadic, expressing settled co-dwelling.
    To avoid awkward duplication in English, the main text compresses the sense into
    communal resting, while the co-residence idea is reflected by 'with the chosen
    ones' and noted here.
- source_word: ኅሩያን
  chosen: chosen ones
  alternatives:
  - elect ones
  - the chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key apocalyptic designation in the Parables. 'Chosen ones'
    is transparent and locally grounded, avoiding later doctrinal loading while preserving
    the titular force.
- source_word: እምጣናት
  chosen: measures
  alternatives:
  - portions
  - standards
  - apportioned shares
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun appears to denote measured portions or standards. 'Measures'
    keeps the concrete apocalyptic imagery and leaves open whether the sense is quantitative
    or normative.
- source_word: ይትወሀቡ
  chosen: shall be given
  alternatives:
  - shall be granted
  - shall be bestowed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward passive rendering best matches the Ge'ez and preserves
    the formal, revelatory style.
- source_word: ለሃይማኖት
  chosen: for faith
  alternatives:
  - for faithfulness
  - for steadfastness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can denote faith, religion, or fidelity. 'Faith' is the most
    direct rendering, but because the context may imply steadfast fidelity, that alternative
    is preserved in a footnote.
- source_word: ያፀንዕዋ
  chosen: they shall strengthen
  alternatives:
  - they shall make firm
  - they shall establish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys making strong or firm. 'Strengthen' is idiomatic and
    preserves the active force.
- source_word: ለጽድቅ
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic setting, 'righteousness' best preserves the moral
    and covenantal weight. 'Justice' is possible but narrower.
