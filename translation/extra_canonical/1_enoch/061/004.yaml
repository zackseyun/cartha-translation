theological_decisions:
- issue: Meaning of ሃይማኖት in an apocalyptic reward/judgment context
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - steadfastness
  rationale: The Ge'ez term is semantically broad. The main text keeps the more literal
    'faith,' but the context of endurance among the chosen may point toward fidelity
    or steadfastness; this is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Translation philosophy § Preserve theological tension rather
    than resolve it.
- issue: Force of the opening double verb
  chosen_reading: The chosen ones shall rest with the chosen ones
  alternative_readings:
  - The chosen ones shall rest and dwell with the chosen ones
  - The chosen ones shall settle and abide with the chosen ones
  rationale: The paired verbs likely intensify the image of secure eschatological
    habitation. The main text avoids clumsy repetition while preserving the communal-rest
    motif; the fuller verbal pair is noted in a footnote due to the Ge'ez-only status
    of the Parables.
  doctrine_reference: Book context § The Parables are Ge'ez-only in practice; difficult
    lines deserve extra restraint and transparency.
