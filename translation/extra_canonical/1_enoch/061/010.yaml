theological_decisions:
- issue: Whether ኅሩይ should be rendered as a title for the singular eschatological
    figure or as a generic adjective within the list
  chosen_reading: the Chosen One
  alternative_readings:
  - the chosen one
  - the elect one as a non-titular descriptor
  rationale: Within the Parables, this term functions repeatedly as a title for the
    exalted figure associated with judgment and vindication. Rendering it as a title
    preserves local usage while avoiding later doctrinal harmonization.
  doctrine_reference: Preserve theological tension rather than resolve it; keep major
    terms locally grounded in the passage.
- issue: How to render the celestial classes without collapsing them into familiar
    later angelological terminology
  chosen_reading: retain transliterated order-names (Keruben, Seraphen, Ophannin)
  alternative_readings:
  - Cherubim, Seraphim, and Ophanim
  - cherubs, seraphs, and wheels
  rationale: The verse presents a formal catalog of heavenly beings. Transliteration
    preserves the strangeness and apocalyptic texture of the Ge'ez witness better
    than domesticated or interpretive equivalents.
  doctrine_reference: Translate titles; transliterate names.
