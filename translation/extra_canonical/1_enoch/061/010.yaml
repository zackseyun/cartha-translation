translation:
  text: And all the hosts of the heavens shall cry out, and all the holy ones above,
    and the host of the Lord—the Cherubim, the Seraphim, and the Ophannim—and all
    the angels of power, and all the angels of principalities, and the Chosen One,
    and the other powers that are on the dry land and over the water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall cry out' or 'shall call aloud'; the Ge'ez verb denotes a vocal
      outcry.
    reason: lexical_alternative
  - marker: b
    text: '''Ophannin'' is a transliterated name for a heavenly order; some would
      gloss it as ''wheels'' from throne-vision imagery.'
    reason: lexical_alternative
  - marker: c
    text: '''Angels of principalities'' reflects a term for ruling orders or ranks;
      ''dominions'' is another possible rendering.'
    reason: lexical_alternative
  - marker: d
    text: Or 'And all the hosts of the heavens, and all the holy ones above, and the
      host of the Lord—the Keruben, the Seraphen, and the Ophannin—and all the angels
      of power, and all the angels of principalities, and the Chosen One, and the
      other powers that are on the earth and over the water, shall raise their voice.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይጼውዑ
  chosen: shall raise their voice
  alternatives:
  - shall cry out
  - shall call aloud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes vocal outcry or calling. 'Raise their voice' preserves
    the collective liturgical/apocalyptic sense better than the flatter 'call,' while
    avoiding over-interpretive expansion.
- source_word: ኵሉ ኃይለ ሰማያት
  chosen: all the hosts of the heavens
  alternatives:
  - all the armies of heaven
  - all the powers of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኃይል can mean power, force, or host. In this angelic-cosmic catalog, 'hosts'
    best captures a heavenly multitude without reducing it merely to abstract power.
- source_word: ቅዱሳን በመልዕልተ
  chosen: the holy ones above
  alternatives:
  - the holy ones on high
  - the saints above
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to exalted heavenly beings. 'Holy ones above' is clear
    and avoids importing later ecclesial associations through 'saints.'
- source_word: ኃይለ እግዚአብሔር
  chosen: the host of the Lord
  alternatives:
  - the power of the Lord
  - the army of the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the surrounding list of celestial orders, this is best taken corporately
    as the Lord's heavenly host rather than as an abstract divine attribute.
- source_word: ኪሩቤን
  chosen: Keruben
  alternatives:
  - Cherubim
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Project philosophy prefers transliterating names. The Ge'ez form is preserved
    in a lightly Anglicized transliteration rather than replacing it with the more
    tradition-laden Hebrew-derived 'Cherubim.'
- source_word: ሱራፌን
  chosen: Seraphen
  alternatives:
  - Seraphim
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: As with Keruben, a transliterated form reflects the Ge'ez witness while
    remaining recognizable to English readers.
- source_word: እፋኒን
  chosen: Ophannin
  alternatives:
  - Ophanim
  - wheels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term names a celestial order known from Jewish throne imagery. Transliteration
    preserves the apocalyptic texture better than the interpretive gloss 'wheels'
    in the main text.
- source_word: መላእክተ ኃይል
  chosen: angels of power
  alternatives:
  - powerful angels
  - angels of might
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal rendering preserves the ordered, titular feel of the angelic
    classes in this list.
- source_word: መላእክተ አጋእዝት
  chosen: angels of principalities
  alternatives:
  - angels of dominions
  - angels of rulers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun suggests ruling orders or governing ranks. 'Principalities'
    keeps the sense of ordered authority and matches the elevated register of the
    passage.
- source_word: ኅሩይ
  chosen: the Chosen One
  alternatives:
  - the Elect One
  - the chosen one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Parables this title is the established designation for the central
    eschatological figure. Capitalization marks titular usage without importing later
    christological wording not present in the Ge'ez.
- source_word: ካእአ ኃይል
  chosen: the other powers
  alternatives:
  - the rest of the powers
  - the other hosts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ካእአ marks an additional group, and ኃይል again likely denotes cosmic powers/hosts.
    'Other powers' preserves the broad, somewhat enigmatic scope of the phrase.
- source_word: እለ ውስተ የብስ ወዲበ ማይ
  chosen: that are on the earth and over the water
  alternatives:
  - that are on dry land and over the waters
  - that are in the land and upon the water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: የብስ refers to dry land/earth in contrast with water. 'On the earth and
    over the water' preserves the cosmic breadth of the domains named.
