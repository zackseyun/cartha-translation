  from: And all the hosts of the heavens, and all the holy ones above, and the host
    of the Lord—the Keruben, the Seraphen, and the Ophannin—and all the angels of
    power, and all the angels of principalities, and the Chosen One, and the other
    powers that are on the earth and over the water, shall raise their voice.
  to: And there shall cry out all the hosts of the heavens, and all the holy ones
    above, and the host of the Lord—the Keruben, the Seraphen, and the Ophannin—and
    all the angels of power, and all the angels of principalities, and the Chosen
    One, and the other powers that are on the dry land and over the water.
  rationale: '1) Placing the verb at the end of a 40-word subject creates severe syntactic
    strain; the Ge''ez places the verb first (ወይጼውዑ), which can be mirrored in English
    ("And there shall cry out...") to make the long catalog readable. 2) Translating
    ጸውዐ as "raise their voice" preempts the actual idiom for raising a voice (ነሥአ
    ቃለ) used by the author in the very next verse (61:11). 3) የብስ (yabs) specifically
    denotes "dry land" in contrast to water, rather than the broader "earth" (ምድር).
    | Adjudicator: The reviewer''s rationale is factually correct on all three counts.
    First, the Ge''ez verb ጸውዐ (ṣawwəʿa) means ''to call'' or ''to cry out'', whereas
    ''raise the voice'' is a distinct idiom (ነሥአ ቃለ) used else'
