theological_decisions:
- issue: Meaning of the repeated 'spirit of ...' phrases
  chosen_reading: The phrases describe the manner or sphere in which the assembled beings offer praise, not necessarily distinct hypostatic spirits.
  alternative_readings:
  - A list of quasi-personified heavenly spirits
  - Specific angelic endowments bestowed on the worshipers
  rationale: The repeated በመንፈሰ construction functions naturally as a virtue list shaping the worship act. Because the Parables are effectively Ge'ez-only here, the translation preserves the wording 'spirit of ...' without over-interpreting the metaphysics.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of the first blessing formula
  chosen_reading: The first blessing is rendered 'Blessed be he' and refers to the Lord of Spirits, followed by an explicit blessing on his name.
  alternative_readings:
  - '''Blessed is it'' referring to the name alone'
  - A verbless exclamation 'Blessed!' before the second clause
  rationale: The immediate continuation 'his name of the Lord of Spirits' strongly suggests the first acclamation refers to the deity himself, with the second to his name. English requires a supplied pronoun for clarity.
