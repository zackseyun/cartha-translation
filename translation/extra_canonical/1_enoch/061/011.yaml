translation:
  text: On that day they shall raise one voice, and they shall bless and praise and exalt in the spirit of faith, and in the spirit of wisdom, and in the spirit of patience, and in the spirit of mercy, and in the spirit of righteousness and peace, and in the spirit of goodness; and all of them shall say with one voice, ‘Blessed is he, and blessed be the name of the Lord of Spirits forever and ever.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a spirit of faithfulness'; the Ge'ez term can denote faith or fidelity.
    reason: lexical_alternative
  - marker: b
    text: The final virtue may also be rendered 'goodness,' 'kindness,' or 'nobility'; the Ge'ez term is broad.
    reason: lexical_alternative
  - marker: c
    text: The repeated expression 'spirit of ...' is left transparent. It may denote the disposition of praise, divinely given qualities, or more personified heavenly endowments.
    reason: alternative_reading
  - marker: d
    text: Or 'generosity'.
    reason: previous_rendering
  - marker: e
    text: Or 'Blessed be he, and blessed be'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይነሥኡ
  chosen: they shall raise
  alternatives:
  - they shall lift up
  - they shall utter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With ቃለ/ቃል ('voice/word') as object, the idiom naturally means to raise or lift up a voice, preserving the liturgical and collective force of the scene.
- source_word: አሐደ ቃለ / በአሐዱ ቃል
  chosen: one voice
  alternatives:
  - one word
  - a single utterance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though literally 'one word/voice,' in context of collective acclamation it is best rendered 'one voice,' and the repetition is preserved to reflect the unified heavenly praise.
- source_word: ወይባርኩ ወይሴብሑ ወያሌዕሉ
  chosen: they shall bless and praise and exalt
  alternatives:
  - magnify
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The three verbs are kept distinct and cumulative rather than compressed, preserving the elevated, repetitive style of apocalyptic worship.
- source_word: በመንፈሰ ሃይማኖት
  chosen: in the spirit of faith
  alternatives:
  - by the spirit of faith
  - in a spirit of faithfulness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated prepositional pattern favors 'in the spirit of ...' as a mode or sphere of praise. 'Faith' is chosen as the default gloss for ሃይማኖት, while 'faithfulness' remains possible.
- source_word: በመንፈሰ ጥበብ
  chosen: in the spirit of wisdom
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering that preserves the repeated cadence of the list.
- source_word: በመንፈሰ ትዕግሥት
  chosen: in the spirit of patience
  alternatives:
  - endurance
  - forbearance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can denote steadfast endurance, but 'patience' is clear modern English and fits the virtue list without flattening its moral force.
- source_word: በመንፈሰ ምሕረት
  chosen: in the spirit of mercy
  alternatives:
  - compassion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Mercy'' best preserves the theological register of the virtue named here.'
- source_word: በመንፈሰ ጽድቅ ወሰላም
  chosen: in the spirit of righteousness and peace
  alternatives:
  - justice and peace
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጽድቅ is rendered 'righteousness' in line with project defaults and the moral-liturgical context; the conjunction with 'peace' is retained as part of the same repeated formula.
- source_word: መንፈሰ ኂሩት
  chosen: in the spirit of generosity
  alternatives:
  - goodness
  - kindness
  - nobility
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez term carries the sense of goodness or beneficence. 'Generosity' fits the virtue sequence and avoids a vague repetition of 'goodness' after mercy and righteousness.
- source_word: ቡሩክ ወይትባረክ
  chosen: Blessed be he, and blessed be
  alternatives:
  - Blessed is he, and blessed be
  - May he be blessed, and may ... be blessed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired blessing formula is preserved as a liturgical acclamation. An explicit pronoun is supplied in English because the first predicate stands without a repeated noun before 'his name.'
- source_word: ስሙ ለእግዚአ መናፍስት
  chosen: the name of the Lord of Spirits
  alternatives:
  - the name of the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lord of Spirits'' is the established local title in 1 Enoch and should be preserved consistently rather than expanded into a more generic phrase.'
- source_word: ለዓለም ወእስከ ለዓለም
  chosen: forever and ever
  alternatives:
  - for eternity and unto eternity
  - to eternity and beyond
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This idiomatic doxological expression is best rendered in natural English as 'forever and ever' while retaining the solemnity of the repeated temporal phrase.
