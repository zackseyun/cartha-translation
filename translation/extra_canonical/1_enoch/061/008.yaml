theological_decisions:
- issue: Identity of ለቅዱሳን ('the holy ones')
  chosen_reading: retain 'the holy ones' without specifying whether these are righteous
    humans, heavenly beings, or both
  alternative_readings:
  - the saints
  - the righteous
  - the angels/holy angels
  rationale: In the Parables, such terms can overlap or shift by context. The verse
    itself does not force a narrower identification, so the translation preserves
    the ambiguity rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Title ለኅሩይ
  chosen_reading: translate as the title 'the Chosen One'
  alternative_readings:
  - the Elect One
  - a chosen one
  rationale: The context is the enthronement and judicial role of a specific exalted
    figure in the Parables. The article and context support a recognized title rather
    than an indefinite description.
  doctrine_reference: Translate titles; preserve local passage meaning before harmonizing
    across the corpus.
