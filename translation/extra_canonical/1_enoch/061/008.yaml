translation:
  text: And the Lord of Spirits seated the Chosen One upon the throne of glory, and
    he will judge all the works of the holy ones in the height of heaven, and their
    deeds will be weighed in the balance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Elect One.' The Ge'ez title ኅሩይ can be rendered either way; 'Chosen
      One' is preferred here for readable modern English.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the holy ones' may refer to the holy community, heavenly holy
      beings, or intentionally encompass both; the Ge'ez wording does not require
      a narrower choice.
    reason: alternative_reading
  - marker: c
    text: Literally evokes weighing in a balance or on scales, a standard image of
      judicial evaluation.
    reason: cultural_note
lexical_decisions:
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  - the Master of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established title in 1 Enoch, and the construct sense naturally
    yields 'Lord of Spirits.' 'Master' is possible lexically but 'Lord' better matches
    the title's elevated apocalyptic register and project defaults for κύριος-like
    divine titles.
- source_word: መንበረ ስብሐት
  chosen: the throne of glory
  alternatives:
  - the glorious throne
  - the throne of splendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A formal rendering preserves the concrete enthronement image central
    to the Parables. 'Glory' is preferred over 'splendor' for consistency with biblical
    throne imagery without importing later formulae.
- source_word: አንበረ
  chosen: seated
  alternatives:
  - caused to sit
  - set
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes causing someone to sit or setting them in place. 'Seated'
    is idiomatic English for enthronement while still reflecting the causative sense.
- source_word: ለኅሩይ
  chosen: the Chosen One
  alternatives:
  - the Elect One
  - the chosen one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This title is prominent in the Parables. 'Chosen One' is clear modern
    English and preserves the titular force; 'Elect One' is more traditional but less
    natural for contemporary readers.
- source_word: ይኴንን
  chosen: he will judge
  alternatives:
  - he judges
  - he shall pass judgment on
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future sense fits the visionary-juridical scene. 'Judge' preserves the
    judicial force without overexpansion.
- source_word: ኵሎ ግብሮሙ
  chosen: all the works of them
  alternatives:
  - all their works
  - all their deeds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered idiomatically in the main text as 'all the works of the holy
    ones.' The noun can mean works/deeds; retaining 'works' here helps preserve the
    distinction from the later term for deeds/conduct in the same verse.
- source_word: ለቅዱሳን
  chosen: the holy ones
  alternatives:
  - the saints
  - the consecrated ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Enochic literature this term often denotes the holy community or heavenly
    holy ones depending on context. 'Holy ones' preserves the ambiguity better than
    'saints,' which is more ecclesiastically loaded.
- source_word: በመልዕልተ ሰማይ
  chosen: in the height of heaven
  alternatives:
  - in the heaven above
  - in the highest heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the exalted heavenly realm. 'In the height of heaven'
    is slightly more literal and preserves the elevated spatial imagery.
- source_word: በመዳልው
  chosen: in the balance
  alternatives:
  - on the scales
  - by weighing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun evokes weighing scales or a balance. 'In the balance' is idiomatic
    and preserves the judgment metaphor without flattening it.
- source_word: ይደሉ ምግባሮሙ
  chosen: their deeds will be weighed
  alternatives:
  - their conduct will be weighed
  - their works will be weighed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal phrase appears to describe evaluation by weighing. 'Deeds'
    differentiates this clause from the earlier 'works' and reads naturally in English
    while preserving the forensic image.
