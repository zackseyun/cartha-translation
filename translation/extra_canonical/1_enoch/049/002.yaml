translation:
  text: For he is mighty in all the hidden things of righteousness, and lawlessness will pass away like a shadow and have no standing; for the Chosen One stands before the Lord of Spirits, and his glory is forever and ever, and his power from generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hidden matters of righteousness.' The Ge'ez phrase may refer to concealed dimensions or secrets belonging to righteousness.
    reason: lexical_alternative
  - marker: b
    text: Or 'will have no continuance.' The expression literally denies standing or abiding to lawlessness.
    reason: lexical_alternative
  - marker: c
    text: '''Chosen One'' is a recurring title in the Parables for the exalted figure associated with judgment and vindication.'
    reason: cross_reference
  - marker: d
    text: Or 'has stood'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኃያል
  chosen: mighty
  alternatives:
  - strong
  - powerful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An adjective of strength/power. 'Mighty' fits elevated apocalyptic register better than the flatter 'strong' and avoids overstatement beyond the Ge'ez.
- source_word: ኅቡአተ
  chosen: hidden things
  alternatives:
  - secrets
  - hidden matters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural form from 'hidden/concealed.' 'Hidden things' preserves the concrete plural and avoids importing a more technical apocalyptic term like 'mysteries' where the Ge'ez here does not require it.
- source_word: ጽድቅ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Default rendering is 'righteousness.' 'Justice' is possible, but in this verse the contrast with lawlessness and the broader Parables usage favors the moral-covenantal sense.
- source_word: ዓመፃ
  chosen: lawlessness
  alternatives:
  - violence
  - wickedness
  - injustice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can overlap with wrongdoing and violent injustice, but 'lawlessness' best matches the antithesis to righteousness in this line without narrowing it only to physical violence.
- source_word: ጽላሎት
  chosen: shadow
  alternatives:
  - shade
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The simile is vivid and should remain simple and concrete: evil passes like a shadow.'
- source_word: የኃልፍ
  chosen: will pass away
  alternatives:
  - passes
  - will vanish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future-like sense suits the judgment context. 'Pass away' preserves the image without overinterpreting it as annihilation.
- source_word: ምቅዋመ አልቦ
  chosen: have no standing
  alternatives:
  - have no place
  - have no continuance
  - have no existence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the phrase denies standing/abiding. 'Have no standing' preserves both the metaphor of endurance and possible judicial resonance in an apocalyptic judgment scene.
- source_word: ኅሩይ
  chosen: Chosen One
  alternatives:
  - Elect One
  - Chosen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A key Parables title. 'Chosen One' is clear modern English and preserves the titular force without relying on older ecclesiastical diction like 'Elect One.'
- source_word: ቆመ
  chosen: has stood
  alternatives:
  - stands
  - was standing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The perfect-like form can be rendered as a present state resulting from prior action. 'Has stood' preserves that nuance and avoids flattening the enthronement/presence motif into a simple present.
- source_word: በቅድመ
  chosen: before
  alternatives:
  - in the presence of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Before'' is concise and idiomatic while retaining the courtly spatial imagery of standing in the divine presence.'
- source_word: እግዚአ መናፍስት
  chosen: Lord of Spirits
  alternatives:
  - Lord of the Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established local title in 1 Enoch. 'Lord of Spirits' is idiomatic and preserves the distinctive Enochic divine epithet.
- source_word: ስብሐቲሁ
  chosen: his glory
  alternatives:
  - his honor
  - his splendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Glory'' best fits biblical-apocalyptic register and the following eternal formula.'
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for the age of ages
  - for ever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the most natural English equivalent for the emphatic eternal formula while preserving its elevated tone.
- source_word: ኃይሉ
  chosen: his power
  alternatives:
  - his might
  - his strength
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Parallel to 'glory'; 'power' is the broadest and most natural rendering here.
- source_word: ለትውልደ ትውልድ
  chosen: from generation to generation
  alternatives:
  - for all generations
  - unto generations of generations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the repeated-generations formula in readable English without archaic excess.
