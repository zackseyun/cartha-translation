theological_decisions:
- issue: Whether ኅሩይ should be rendered as a title or a descriptive adjective
  chosen_reading: Rendered as the title 'the Chosen One'
  alternative_readings:
  - the chosen one (descriptive)
  - the Elect One
  rationale: In the Parables this term functions as a recurring exalted figure-title. Capitalization signals titular use without importing later christological formulas not present in the verse itself.
  doctrine_reference: Preserve local passage meaning and do not over-harmonize with later Christian usage.
- issue: Aspect of ቆመ before the Lord of Spirits
  chosen_reading: Rendered 'has stood before the Lord of Spirits'
  alternative_readings:
  - stands before the Lord of Spirits
  - stood before the Lord of Spirits
  rationale: The form plausibly conveys an established status in the divine presence. 'Has stood' keeps both prior action and present significance, fitting the enthronement/judgment context.
- issue: Sense of ዓመፃ in contrast with ጽድቅ
  chosen_reading: Rendered 'lawlessness'
  alternative_readings:
  - violence
  - wickedness
  - injustice
  rationale: The verse contrasts moral order and its opposite in broad terms. 'Lawlessness' preserves that polarity without reducing the term to only social violence or only inward wickedness.
