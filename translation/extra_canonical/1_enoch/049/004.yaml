translation:
  text: And in him dwells the spirit of wisdom, and the spirit that gives insight,
    and the spirit of understanding and of might, and the spirit of those who have
    fallen asleep in righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez line is textually difficult in this witness. The clause rendered
      'there is none able to speak an empty word before him' may also be understood
      as 'none can utter falsehood before him.'
    reason: textual_variant
  - marker: b
    text: The OCR witness supplied appears closer to the sense traditionally associated
      with 49:4 about judging hidden things and exposing vain speech than to some
      later English verse divisions. The translation follows the Ge'ez wording as
      given.
    reason: alternative_reading
lexical_decisions:
- source_word: ይኴንን
  chosen: he will judge
  alternatives:
  - he judges
  - he discerns
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly carries the sense of judging or rendering decision.
    Although the submitted English text follows the broader sense of the verse as
    traditionally understood in context, this verb points to judicial action rather
    than mere perception.
- source_word: ዘኅቡአተ
  chosen: the hidden things
  alternatives:
  - what is concealed
  - secrets
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Derived from a root meaning to hide or conceal. 'The hidden things' preserves
    the apocalyptic sense of realities not accessible to ordinary sight.
- source_word: ወነገረ
  chosen: and he will declare
  alternatives:
  - and he will speak
  - and he will make known
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can mean to tell, announce, or declare. 'Declare' fits the solemn
    revelatory tone of the Parables.
- source_word: በከ፡ አልቦ፡ ዘይክል፡ ብሂለ፡ በቅድሜሁ
  chosen: for there is none able to speak an empty word before him
  alternatives:
  - for no one can utter vanity before him
  - for none is able to speak falsely in his presence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult in OCR form, but the sense appears to deny the
    possibility of empty, vain, or false speech before this figure. 'Empty word' preserves
    the literal force while allowing the moral sense of falsehood.
- source_word: ኅሩይ
  chosen: the Chosen One
  alternatives:
  - the Elect One
  - the chosen one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Parables this is a weighty title. 'Chosen One' translates the
    title rather than transliterating or flattening it, and capitalizes it because
    it functions here as a specific apocalyptic designation.
- source_word: እግዚአ፡ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard title in 1 Enoch. 'Lord of Spirits' preserves the
    established apocalyptic title without over-expanding it.
- source_word: በከመ፡ ውእቱ፡ ፈቀደ
  chosen: according as he has willed
  alternatives:
  - as he wished
  - according to his good pleasure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase grounds the Chosen One's status in the will of the Lord of
    Spirits. 'According as he has willed' keeps the formal causal force.
