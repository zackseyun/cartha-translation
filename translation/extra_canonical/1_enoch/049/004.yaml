theological_decisions:
- issue: Identity and capitalization of ኅሩይ
  chosen_reading: the Chosen One
  alternative_readings:
  - the Elect One
  - the chosen one
  rationale: Within the Parables, this term functions as a recurring titular designation
    for the eschatological figure rather than a generic adjective. Capitalization
    signals title-status without importing later christological formulas.
  doctrine_reference: Translate titles; preserve local apocalyptic usage without harmonizing
    to later Christian tradition.
