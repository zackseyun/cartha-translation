theological_decisions:
- issue: Referent of 'him' in 'before him'
  chosen_reading: Retain the pronoun as 'him' without specifying the antecedent in
    the main text.
  alternative_readings:
  - before the Lord of Spirits
  - before the Chosen One / Son of Man
  rationale: The immediate Ge'ez verse gives only the pronoun. In the Parables, antecedents
    can shift across nearby verses, and this section lacks external textual controls.
    Preserving the pronoun maintains the source's ambiguity rather than resolving
    it by theological expectation.
  doctrine_reference: Preserve theological tension rather than resolve it.
