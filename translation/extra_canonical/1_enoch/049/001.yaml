translation:
  text: For wisdom has been poured out like water, and glory will not fail before
    him forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The pronoun 'him' is left unspecified in the Ge'ez here; the wider context
      may point to a previously mentioned exalted figure, but the verse itself does
      not name the referent.
    reason: alternative_reading
  - marker: b
    text: Or 'glory will not come to an end before him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will be poured out'.
    reason: previous_rendering
lexical_decisions:
- source_word: እስመ
  chosen: For
  alternatives:
  - because
  - for indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the ground or explanation for the preceding context; 'For'
    preserves the connective force in elevated but natural English.
- source_word: ጥበብ
  chosen: wisdom
  alternatives:
  - understanding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The standard sense is 'wisdom'; this fits the revelatory and sapiential
    tone of the Parables without overinterpreting.
- source_word: ክዕወ
  chosen: will be poured out
  alternatives:
  - will flow
  - will gush forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with 'like water,' the verb suggests effusive outpouring rather
    than mere existence or motion. 'Poured out' preserves the vivid apocalyptic image.
- source_word: ከመ ማይ
  chosen: like water
  alternatives:
  - as water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward simile; retained literally to preserve the imagery.
- source_word: ወስብሐት
  chosen: and glory
  alternatives:
  - and splendor
  - and praise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can overlap with splendor/praise, but 'glory' best fits the
    exalted, heavenly register and the parallel with wisdom in this enthronement context.
- source_word: ኢትኃልቅ
  chosen: will not fail
  alternatives:
  - will not come to an end
  - will not perish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The negated verb denotes not ceasing or being exhausted. 'Will not fail'
    is concise, idiomatic, and preserves the durative sense.
- source_word: ቅድሜሁ
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'before him.' This keeps the spatial-relational sense and leaves
    the referent transparent rather than interpretively expanding it.
- source_word: ለዓለመ ዓለም
  chosen: forever and ever
  alternatives:
  - for the age of ages
  - for ever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An idiomatic rendering of the emphatic eternal formula; elevated and
    readable while preserving the superlative duration.
