translation:
  text: And upon him rested the spirit of wisdom, and the spirit that gives understanding,
    and the spirit of instruction and might, and the spirit of those who sleep in
    righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwelt upon him.' The Ge'ez verb can denote abiding or lodging.
    reason: lexical_alternative
  - marker: b
    text: Or 'the spirit of understanding.' The Ge'ez expression may describe either
      a spirit characterized by understanding or one that imparts it.
    reason: lexical_alternative
  - marker: c
    text: Literally 'those who sleep in righteousness'; likely an apocalyptic reference
      to the righteous dead, though 'those who rest in righteousness' is also possible.
    reason: alternative_reading
lexical_decisions:
- source_word: የኃድር
  chosen: rested
  alternatives:
  - dwelt
  - abode
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys abiding or lodging upon someone. 'Rested' fits prophetic/apocalyptic
    spirit-language in readable English without becoming archaic; 'dwelt' is possible
    but sounds more static here.
- source_word: መንፈሰ
  chosen: spirit
  alternatives:
  - breath
  - wind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context of endowed qualities, 'spirit' is the natural rendering
    and preserves the elevated, charismatic sense.
- source_word: ጥበብ
  chosen: wisdom
  alternatives:
  - skill
  - understanding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes wisdom in a moral/intellectual sense; 'wisdom' is the
    standard and best contextual fit.
- source_word: ዘያሌቡ
  chosen: that gives understanding
  alternatives:
  - of understanding
  - that makes one understand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to describe the spirit by its effect, not merely name
    a second abstract quality. 'That gives understanding' preserves that verbal force
    better than the flatter 'of understanding.'
- source_word: ትምህርት
  chosen: instruction
  alternatives:
  - teaching
  - discipline
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word can cover teaching or instruction. 'Instruction' suits a bestowed
    spirit-quality and keeps the line compact.
- source_word: ኃይል
  chosen: might
  alternatives:
  - power
  - strength
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In a list of exalted endowments, 'might' preserves the elevated register
    better than the more generic 'power' or 'strength.'
- source_word: እለ ኖሙ በጽድቅ
  chosen: those who sleep in righteousness
  alternatives:
  - those who rest in righteousness
  - those who have fallen asleep in righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase most naturally refers to the righteous dead. 'Sleep' preserves
    the apocalyptic idiom and avoids over-interpreting it into a fully expanded paraphrase.
