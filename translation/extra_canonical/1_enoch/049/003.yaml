theological_decisions:
- issue: Meaning of the final spirit-phrase
  chosen_reading: The line refers to a spirit associated with the righteous who have
    fallen asleep, likely the righteous dead rather than merely the living righteous
    at rest.
  alternative_readings:
  - the spirit of those who rest in righteousness
  - the spirit belonging to the righteous
  rationale: The verb for sleeping/resting naturally suggests the dead in apocalyptic
    usage, and preserving 'sleep' keeps the text's imagery and theological tension
    rather than resolving it into a generic label.
  doctrine_reference: Preserve theological tension rather than resolve it; keep major
    terms locally grounded in the passage.
