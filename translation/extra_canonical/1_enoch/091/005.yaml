translation:
  text: For I know that violence will endure upon the earth, and a great scourge will
    be carried out upon the earth; and all lawlessness will be brought to completion
    and be cut off from its roots, and every structure will pass away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great plague' or 'a great punishment'; the Ge'ez term can denote a
      punitive affliction or scourge more broadly.
    reason: lexical_alternative
  - marker: b
    text: The clause 'all lawlessness will be brought to completion' may mean that
      wickedness reaches its full measure before judgment falls, not that it is approved
      or established.
    reason: alternative_reading
  - marker: c
    text: '''Every structure'' could also be read more concretely as ''every building,''
      but the broader wording may intentionally include all human constructions or
      establishments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  chosen: For
  alternatives:
  - because
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the ground or explanation for the preceding exhortation; 'For'
    preserves the connective force in elevated but natural English.
- source_word: አእምር
  chosen: I know
  alternatives:
  - I have known
  - I perceive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple first-person statement of knowledge; present 'I know' fits English
    idiom and the prophetic-certainty tone.
- source_word: ይጸንዕ
  chosen: will endure
  alternatives:
  - will be established
  - will persist
  - will grow strong
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys firmness or continuance. In context of evil on earth,
    'will endure' best captures ongoing persistence without implying approval.
- source_word: ሀላዌ ግፍዕ
  chosen: violence
  alternatives:
  - oppression
  - wrongdoing
  - violent injustice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes the presence/existence of violent wrongdoing. 'Violence'
    is concise and apocalyptically forceful, while the broader nuance of injustice
    is retained in the context.
- source_word: በዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - over the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard locative phrase in elevated register; 'upon the earth' preserves
    the solemn cadence of judgment language.
- source_word: ትትፈጸም
  chosen: will be carried out
  alternatives:
  - will be accomplished
  - will be completed
  - will come to pass
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: For the scourge, the passive sense 'will be carried out' fits an enacted
    judgment better than the more neutral 'come to pass.' The same verb later is rendered
    differently because the object changes.
- source_word: መቅሠፍት ዐቢይ
  chosen: a great scourge
  alternatives:
  - a great plague
  - a great punishment
  - a great affliction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote striking, plague, or punitive affliction. 'Scourge'
    preserves both punitive and catastrophic overtones without narrowing it to disease
    alone.
- source_word: ኵላ ዓመፃ
  chosen: all lawlessness
  alternatives:
  - all rebellion
  - all transgression
  - all injustice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes rebellious wrongdoing. 'Lawlessness' fits apocalyptic
    moral disorder and keeps the comprehensive force of 'all.'
- source_word: ትትፈጸም
  chosen: will be brought to completion
  alternatives:
  - will be completed
  - will be fulfilled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With 'all lawlessness' as subject/object of the passive, the sense is
    that wickedness reaches its full measure before judgment. This preserves theological
    tension rather than smoothing to immediate destruction.
- source_word: ትትገዘም እምሥረዊሃ
  chosen: be cut off from its roots
  alternatives:
  - be uprooted from its roots
  - be cut down from its foundations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The imagery is arboreal or foundational removal to the root. 'Cut off
    from its roots' preserves the metaphor and the finality of judgment.
- source_word: ኵሉ ሕንጻ
  chosen: every structure
  alternatives:
  - every building
  - every construction
  - every work built
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can refer to a building or constructed thing more generally.
    'Every structure' keeps the broad scope and avoids over-specifying literal architecture
    if the phrase is metaphorical.
- source_word: የኃልፍ
  chosen: will pass away
  alternatives:
  - will perish
  - will vanish
  - will pass on
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common judgment idiom for disappearance or cessation. 'Will pass away'
    is natural, solemn, and leaves open whether the reference is literal or figurative.
