theological_decisions:
- issue: Whether the verse says evil simply continues or reaches a divinely permitted
    full measure before removal
  chosen_reading: The translation preserves both ideas by rendering violence as enduring,
    lawlessness as brought to completion, and then cut off from its roots.
  alternative_readings:
  - Immediate destruction of evil without a period of persistence
  - A purely descriptive statement with no implied divine judgment
  rationale: The sequence of verbs in the Ge'ez suggests persistence, then completion,
    then eradication. This preserves apocalyptic tension rather than collapsing the
    process into a single event.
  doctrine_reference: Preserve theological tension rather than resolve it.
