translation:
  text: And the righteous one shall arise from his sleep, and wisdom shall arise and be given to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The singular 'the righteous one' may refer either to an individual figure arising from the community or to a representative righteous person; the wording is left intentionally open.
    reason: lexical_alternative
  - marker: b
    text: Or 'And the righteous one shall arise from among them, and wisdom shall arise and be given to them.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይትነሣእ
  chosen: shall arise
  alternatives:
  - will arise
  - shall be raised up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb from ነሥአ carries the sense of rising or being raised. 'Shall arise' preserves the elevated apocalyptic register and keeps the ambiguity between emergence and exaltation without over-interpreting.
- source_word: ጻድቅ
  chosen: the righteous one
  alternatives:
  - a righteous one
  - the righteous
  - the just one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular noun is best represented explicitly. 'The righteous one' preserves the individualizing force of the Ge'ez while leaving open whether the figure is representative or specific.
- source_word: እምነዋሙ
  chosen: from among them
  alternatives:
  - from them
  - out of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition plus pronominal suffix indicates emergence from the group. 'From among them' is idiomatic English and preserves the communal setting better than the flatter 'from them.'
- source_word: ጥበብ
  chosen: wisdom
  alternatives:
  - understanding
  - skill
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this epistolary-apocalyptic context, the term most naturally denotes wisdom in the moral and revelatory sense, not mere practical skill.
- source_word: ይትወሀብ ሎሙ
  chosen: be given to them
  alternatives:
  - be granted to them
  - be bestowed on them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive verb with indirect object straightforwardly indicates gift. 'Be given to them' is clear, direct, and avoids adding theological nuance beyond the text.
