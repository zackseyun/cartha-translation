  from: And the righteous one shall arise from among them, and wisdom shall arise and be given to them.
  to: And the righteous one shall arise from his sleep, and wisdom shall arise and be given to them.
  rationale: 'The Ge''ez word is እምነዋሙ (''em-nawāmu), which means ''from his sleep'' (from the noun ነዋም, ''sleep'', with the 3ms suffix -u). The draft incorrectly translated it as ''from among them'' (which would be something like እምኔሆሙ or እማእከሎሙ), hallucinating the root. The corresponding lexical decision note should also be corrected. | Adjudicator: The reviewer is entirely correct. The Ge''ez word እምነዋሙ (''em-nawāmu) is composed of the preposition እም (''em, ''from''), the noun ነዋም (nawām, ''sleep''), and the 3rd masculine singular pronominal suffix -u '
