theological_decisions:
- issue: Whether ጻድቅ should be rendered collectively or as an individual figure
  chosen_reading: 'Rendered as singular: ''the righteous one'''
  alternative_readings:
  - the righteous
  - a righteous one
  rationale: The Ge'ez form is singular, and the verse's parallelism with 'wisdom shall arise' does not require collectivizing it. Keeping the singular preserves possible messianic or representative overtones without forcing them.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
