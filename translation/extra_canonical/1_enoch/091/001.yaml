translation:
  text: And now, my son Methuselah, call all your brothers to me, and gather to me all the And now, my son Methuselah, call all your brothers to me, and gather to me all the children of your mother; for a word calls me, and a spirit is poured out upon me, so that I may show you everything that will come upon you forever.; for a word calls me, and a spirit is poured out upon me, so that I may show you everything that will come upon you forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Spirit of righteousness is upon me.' The phrase may denote divine inspiration in a more personified sense.
    reason: lexical_alternative
  - marker: b
    text: The closing phrase may also be understood as 'unto eternity,' 'for all ages,' or 'for the generations to come,' depending on how broadly the temporal expression is taken.
    reason: lexical_alternative
  - marker: c
    text: Or 'a spirit of uprightness is upon me'.
    reason: previous_rendering
  - marker: d
    text: Or 'sons of your mother'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይእዜኒ
  chosen: And now
  alternatives:
  - And at this time
  - And now then
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward discourse transition introducing Enoch's speech. 'And now' preserves the immediacy without unnecessary stiffness.
- source_word: ወልድየ
  chosen: my son
  alternatives:
  - my child
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The possessive filial address is direct and formal enough for patriarchal speech; 'my son' fits the register and the named addressee Methuselah.
- source_word: ማቱሳላ
  chosen: Methuselah
  alternatives:
  - Mathusala
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard English transliteration of the personal name, following project policy to transliterate names rather than translate them.
- source_word: ጸውዕ ሊተ
  chosen: call ... to me
  alternatives:
  - summon ... to me
  - cry out to ... for me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The imperative plus indirect object naturally means summoning persons into Enoch's presence. 'Call ... to me' is idiomatic and close to the Ge'ez.
- source_word: ኵሎ አኃዊከ
  chosen: all your brothers
  alternatives:
  - all your kin-brothers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is familial and concrete. 'Brothers' should be retained rather than generalized to 'relatives.'
- source_word: አስተጋብእ ሊተ
  chosen: gather to me
  alternatives:
  - assemble to me
  - bring together for me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'This is stronger than merely ''call'': Methuselah is to assemble them in Enoch''s presence. ''Gather to me'' preserves that force.'
- source_word: ኵሎ ደቂቀ እምከ
  chosen: all the sons of your mother
  alternatives:
  - all your mother's children
  - all the children of your mother
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez is literally maternal-filial language. 'Sons of your mother' preserves the idiom and avoids over-interpreting whether daughters are included.
- source_word: እስመ ቃል ይጼውዐኒ
  chosen: for a word calls me
  alternatives:
  - for the word summons me
  - for a message calls to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The anarthrous 'word' is best left indefinite in English. It likely denotes a revelatory utterance or commission, but the text itself does not specify whose word; retaining 'a word' preserves the apocalyptic ambiguity.
- source_word: መንፈስ ትክዕወት
  chosen: a spirit of uprightness
  alternatives:
  - a spirit of righteousness
  - a spirit of truth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes rectitude/uprightness. 'Uprightness' avoids importing later doctrinal freight while still conveying moral straightness. 'Righteousness' is possible but heavier and more conventional than the immediate phrase requires.
- source_word: ላዕሌየ
  chosen: is upon me
  alternatives:
  - rests upon me
  - is over me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional expression is a common inspiration formula. 'Is upon me' preserves the elevated, prophetic register.
- source_word: ከመ አርእክሙ
  chosen: so that I may show you
  alternatives:
  - that I may make you see
  - in order that I may reveal to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses purpose. 'Show you' is natural English while still allowing revelatory force in context.
- source_word: ኵሎ ዘይበጽሐክሙ
  chosen: everything that will come upon you
  alternatives:
  - all that will reach you
  - everything that will happen to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb has the sense of arriving/reaching/befalling. 'Come upon you' preserves the solemn prophetic tone better than the flatter 'happen to you.'
- source_word: እስከ ለዓለም
  chosen: forever
  alternatives:
  - unto eternity
  - for all ages
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase can denote enduring futurity. In this context, where Enoch is about to disclose what lies ahead for his descendants, 'forever' is concise and suitably weighty, though the sense may also be 'unto the age' or 'for all generations.'
