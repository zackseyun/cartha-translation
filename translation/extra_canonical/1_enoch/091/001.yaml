- issue: Whether መንፈስ ትክዕወት should be rendered with the more loaded 'Spirit of righteousness' or the less capitalized/common-noun sense
  chosen_reading: a spirit of uprightness
  alternative_readings:
  - the Spirit of righteousness
  - a spirit of righteousness
  rationale: The Ge'ez lacks explicit markers requiring capitalization or a fully personified divine title here. To preserve theological tension rather than resolve it, the main text keeps the phrase qualitative and lower-case, while acknowledging the more personified alternative in a footnote.
