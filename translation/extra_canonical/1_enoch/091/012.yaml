theological_decisions:
- issue: Whether ጽድቅ / ኵነኔ ጽድቅ should be rendered with 'righteousness' language or
    flattened to 'justice'
  chosen_reading: Retain 'righteousness' in 'week of righteousness' and 'righteous
    judgment'
  alternative_readings:
  - week of justice
  - just judgment
  rationale: The verse uses the same root to characterize both the era and the judgment
    enacted within it. Preserving 'righteousness' maintains the thematic continuity
    and avoids reducing the apocalyptic moral order to merely civic justice.
  doctrine_reference: Translation philosophy §Consistency of key terms; contested
    terms table for δικαιοσύνη analogously favoring 'righteousness' with 'justice'
    as an alternative where needed.
- issue: Nature of the sword imagery
  chosen_reading: Keep 'a sword shall be given to it' as apocalyptic judgment imagery
  alternative_readings:
  - authority to judge shall be given to it
  - victory shall be granted to it
  rationale: The Ge'ez explicitly says 'sword.' The translation preserves the image
    rather than interpreting it away, in keeping with the project's instruction not
    to flatten apocalyptic imagery.
  doctrine_reference: 'Book context: preserve cosmic/judgment imagery; do not smooth
    into generic religious prose.'
