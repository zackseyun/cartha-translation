translation:
  text: And after this there shall be another week, the eighth, of righteousness;
    and a sword shall be given to it, so that righteous judgment may be carried out
    against the oppressors, and sinners shall be delivered into the hands of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an eighth week.' The Ge'ez sequence marks symbolic periods of history
      rather than ordinary calendar weeks.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'into the hands of the righteous' is an idiom of being given
      over to another's power or control.
    reason: cultural_note
lexical_decisions:
- source_word: ካልእት
  chosen: another
  alternatives:
  - a second
  - an additional
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term marks succession in the sequence of symbolic weeks. 'Another'
    is the most natural English in context and avoids implying a literal second week.
- source_word: ሳምንት ሰንበት
  chosen: week, the eighth
  alternatives:
  - eighth week
  - an eighth heptad
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes the numbered symbolic week in the apocalypse of weeks.
    The Ge'ez preserves both 'week' and 'eighth'; English reverses slightly for readability
    while keeping the numbered apocalyptic structure.
- source_word: እንተ ጽድቅ
  chosen: of righteousness
  alternatives:
  - characterized by righteousness
  - belonging to righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A genitival construction describing the quality of the week. 'Of righteousness'
    preserves the compact apocalyptic style and keeps the key term consistent.
- source_word: ይትወሀብ ላቲ ሰይፍ
  chosen: a sword shall be given to it
  alternatives:
  - the sword shall be given to it
  - a sword will be granted to her
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The feminine pronominal object refers back to 'week.' 'A sword' preserves
    the image of divinely sanctioned violent judgment without over-specifying whether
    the sword is literal or symbolic.
- source_word: ከመ ይትገበር ኵነኔ ጽድቅ
  chosen: so that righteous judgment may be carried out
  alternatives:
  - that a judgment of righteousness may be done
  - so that justice may be executed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses purpose. 'Righteous judgment' keeps both the judicial
    and moral force of the phrase; 'carried out' reflects the passive/impersonal sense
    of enacted judgment.
- source_word: እምእለ ይገፍዑ
  chosen: against the oppressors
  alternatives:
  - upon those who act violently
  - from those who wrong others
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys violent wrongdoing or oppression. Rendering the phrase
    as 'against the oppressors' fits the judicial context and gives a clear English
    equivalent for the class of offenders.
- source_word: ይትሜጠዉ ኃጥኣን በእደዊሆሙ ለጻድቃን
  chosen: sinners shall be delivered into the hands of the righteous
  alternatives:
  - sinners shall be handed over to the righteous
  - sinners shall be gathered into the hands of the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction points to transfer into the power or control of the
    righteous. 'Delivered into the hands of' is a standard biblical-judicial idiom
    in English and preserves the concrete imagery of power.
