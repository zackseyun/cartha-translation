translation:
  text: 'And he spoke to them all, to all the children of righteousness, and said,
    “Hear, children of Enoch, every word of your father, and listen to the upright
    words of my mouth; for I speak to you and tell you, beloved ones: love righteousness
    and walk in it.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'listen rightly' is difficult in the Ge'ez and may also
      be understood as 'listen to the upright word(s) of my mouth' or similar.
    reason: lexical_alternative
  - marker: b
    text: Or 'listen rightly to the speech of my mouth'.
    reason: previous_rendering
  - marker: c
    text: Or 'for I speak to you and tell you'.
    reason: previous_rendering
lexical_decisions:
- source_word: ውሉደ ጽድቅ
  chosen: children of righteousness
  alternatives:
  - sons of righteousness
  - righteous children
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construct is literal and programmatic in Enochic style. 'Children
    of righteousness' preserves the familial/apocalyptic identity marker better than
    the flatter 'righteous children.'
- source_word: ደቂቀ ሄኖክ
  chosen: children of Henok
  alternatives:
  - sons of Enoch
  - descendants of Enoch
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ደቂቀ commonly means 'children/sons of.' 'Children' fits readable modern
    English while preserving direct address to Enoch's offspring or disciples. Name
    transliterated as Henok from the Ge'ez form per project policy on names.
- source_word: ኵሎ ነገረ አቡክሙ
  chosen: every word of your father
  alternatives:
  - all the speech of your father
  - everything your father says
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ነገር can denote word, matter, or speech. In this exhortational context,
    'every word' best matches the call to attentive hearing and keeps the elevated
    register.
- source_word: አጽምኡ
  chosen: listen
  alternatives:
  - give ear
  - hearken
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A second imperative parallel to 'hear.' 'Listen' is modern and clear;
    'hearken' would sound archaic.
- source_word: ርርትዐ / ርትዕ
  chosen: rightly / righteousness
  alternatives:
  - uprightly / uprightness
  - justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The root concerns rectitude/righteousness. The adverbial force in 'listen
    rightly' is somewhat difficult, but it likely urges proper attentiveness; later
    in the verse the noun is best rendered 'righteousness,' the standard Enochic ethical
    term.
- source_word: ቃለ አፉየ
  chosen: the speech of my mouth
  alternatives:
  - the words of my mouth
  - my mouth's speech
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A semitic-style expression. 'The speech of my mouth' preserves the elevated
    idiom without becoming too wooden; 'words of my mouth' is possible and idiomatic.
- source_word: አሰምዕ ይቤክሙ ወእነግረክሙ
  chosen: I speak to you and tell you
  alternatives:
  - I make known to you and declare to you
  - I cause you to hear and recount to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs are somewhat redundant and emphatic. A concise doublet
    in English preserves the rhetorical force without over-literal awkwardness.
- source_word: ፍቁራን
  chosen: beloved ones
  alternatives:
  - loved ones
  - dear ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Vocative of affection. 'Beloved ones' preserves solemn warmth and avoids
    sounding casual.
- source_word: ባቲ ሑሩ
  chosen: walk in it
  alternatives:
  - go in it
  - walk therein
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely refers back to righteousness as the path or sphere of conduct.
    'Walk in it' preserves the ethical metaphor common in biblical and Second Temple
    literature.
