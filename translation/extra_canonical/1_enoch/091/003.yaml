theological_decisions:
- issue: Whether ጽድቅ/ርትዕ should be rendered as 'righteousness' or 'justice'
  chosen_reading: righteousness
  alternative_readings:
  - justice
  - uprightness
  rationale: In this filial exhortation, the term functions as a covenantal-ethical
    quality and way of life rather than primarily juridical justice. 'Righteousness'
    also preserves continuity with Enochic moral vocabulary without importing later
    doctrinal formulas.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented
    exception.'
