theological_decisions:
- issue: How to render the repeated idiom of divided loyalty
  chosen_reading: double heart / of a double heart
  alternative_readings:
  - double-minded
  - with two hearts
  rationale: The verse warns against inner duplicity and against fellowship with the
    duplicitous. Retaining 'heart' preserves the anthropological and moral texture
    of the source rather than reducing it to a modern psychological term.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English without flattening source imagery.
- issue: Whether to treat the bracketed clause as part of the verse
  chosen_reading: Included in the main text
  alternative_readings:
  - Omit as secondary gloss or variant
  rationale: The supplied witness includes the clause in brackets, and it fits the
    parallel exhortation structure of the verse. Because the witness confidence is
    only medium, the bracketed status is noted in a footnote rather than silently
    excluded.
  doctrine_reference: When the sense or text is uncertain, prefer transparent English
    plus a footnote over false confidence.
