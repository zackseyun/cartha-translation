translation:
  text: And do not draw near to uprightness with a double heart, nor join yourselves
    with those who are of a double heart; but walk in righteousness, my children,
    and it will lead you on good and righteous paths, and righteousness will be your
    companion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'nor join yourselves with those who are of a double heart' is
      bracketed in the supplied Ethiopic witness and may reflect a textual variant
      or secondary expansion, but it suits the verse's parallel warning and is retained
      here.
    reason: textual_variant
  - marker: b
    text: '''Double heart'' is a literal idiom for divided loyalty or inner duplicity.'
    reason: cultural_note
  - marker: c
    text: Or 'righteousness will be joined to you' / 'will be your associate'; the
      Ethiopic term suggests companionship or partnership.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኢትቅረቡ
  chosen: do not draw near
  alternatives:
  - do not approach
  - do not come near
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The negative imperative forbids approaching or coming near. 'Draw near'
    preserves the moral-spatial imagery better than a flatter 'approach.'
- source_word: ርትዕ
  chosen: uprightness
  alternatives:
  - rectitude
  - what is right
  - righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here the noun is paired with 'with a double heart,' so the sense is moral
    straightness or integrity. 'Uprightness' distinguishes it from the later repeated
    ጽድቅ/ጽድቅ while keeping the ethical force.
- source_word: በክልኤ ልብ
  chosen: with a double heart
  alternatives:
  - double-mindedly
  - with two hearts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering preserves the Semitic idiom of divided inner loyalty.
    'Double-mindedly' is possible but less concrete and risks later canonical associations.
- source_word: ኢትኅበሩ ምስለ እለ በክልኤ ልብ
  chosen: nor join yourselves with those who are of a double heart
  alternatives:
  - do not associate with the double-hearted
  - do not unite with those of divided heart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bracketed clause is naturally rendered as a prohibition against fellowship
    or association. 'Join yourselves with' preserves the reflexive/social force.
- source_word: ሑሩ
  chosen: walk
  alternatives:
  - go
  - proceed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In ethical exhortation, 'walk' is the most natural English equivalent
    and preserves the path metaphor that follows.
- source_word: በጽድቅ
  chosen: in righteousness
  alternatives:
  - in justice
  - righteously
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key moral term in the passage. 'In righteousness' keeps the
    nounal ethical sphere and aligns with project consistency for righteousness language.
- source_word: ደቂቅየ
  chosen: my children
  alternatives:
  - my sons
  - my little ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The address is familial and instructional. 'My children' is inclusive
    and natural in English while preserving the paternal exhortation.
- source_word: ትመርሐክሙ
  chosen: it will lead you
  alternatives:
  - she will guide you
  - it will guide you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The feminine subject likely refers back to the preceding abstract noun
    or implied way of righteousness. English can use 'it' for the abstract guide without
    forcing personification.
- source_word: በፍኖት ኄርት ወጽድቅ
  chosen: on good and righteous paths
  alternatives:
  - in the path of goodness and righteousness
  - on paths of goodness and righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase combines path imagery with moral qualities. Plural 'paths'
    fits the Ge'ez form and keeps the ethical-road metaphor vivid.
- source_word: ይከውን ለክሙ ሱታፌ
  chosen: will be your companion
  alternatives:
  - will be your associate
  - will be joined to you
  - will be your fellowship
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሱታፌ carries the sense of association, partnership, or companionship.
    'Companion' reads naturally in English and preserves the idea that righteousness
    accompanies the faithful.
