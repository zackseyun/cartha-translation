translation:
  text: And the first heaven shall depart and pass away, and a new heaven shall appear,
    and all the powers of the heavens shall shine forever, sevenfold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the host of the heavens.' The Ge'ez term can denote powers, forces,
      or heavenly hosts, and may include celestial bodies as well as heavenly beings.
    reason: lexical_alternative
  - marker: b
    text: The closing phrase is difficult. It likely means 'sevenfold' or 'seven times
      more brightly.' Some uncertainty remains because the transmitted Ethiopic wording
      is not fully clear in this OCR witness.
    reason: textual_variant
lexical_decisions:
- source_word: ሰማይ፡ ቀዳማይ፡
  chosen: the first heaven
  alternatives:
  - the former heaven
  - the earlier heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቀዳማይ marks what is first/former in sequence. 'The first heaven' preserves
    the apocalyptic contrast with the 'new heaven' that follows and keeps the cosmic
    imagery concrete.
- source_word: ይወፅእ፡
  chosen: shall depart
  alternatives:
  - shall go out
  - shall vanish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally suggests going out/forth. In this context of cosmic
    transition, 'shall depart' is idiomatic English that preserves movement rather
    than annihilation.
- source_word: የኃልፍ፡
  chosen: pass away
  alternatives:
  - pass on
  - be gone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This verb commonly conveys passing by or away. Paired with 'depart,'
    it intensifies the removal of the old heaven without over-paraphrasing.
- source_word: ሰማይ፡ ሐዲስ፡
  chosen: a new heaven
  alternatives:
  - the new heaven
  - a renewed heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሐዲስ means new/fresh. 'A new heaven' is the most direct rendering; 'renewed'
    would import an interpretive claim not required by the Ge'ez.
- source_word: ይትረአይ፡
  chosen: shall appear
  alternatives:
  - shall be seen
  - shall become visible
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense is 'be seen/appear.' 'Shall appear' is natural
    English and preserves the revelatory tone.
- source_word: ኵሉ፡ ኃይለ፡ ሰማያት፡
  chosen: all the powers of the heavens
  alternatives:
  - all the host of the heavens
  - all the heavenly powers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኃይለ can denote power, force, or host. In apocalyptic context it may refer
    to the heavenly luminaries or celestial forces. 'Powers of the heavens' keeps
    the ambiguity and avoids flattening the phrase into merely astronomical or merely
    angelic language.
- source_word: ያበርህ፡
  chosen: shall shine
  alternatives:
  - shall give light
  - shall be bright
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes shining or giving light. 'Shall shine' is concise and
    preserves the vivid cosmic imagery.
- source_word: ሰብዓተ፡ ምእዕቢተ።
  chosen: forever, sevenfold
  alternatives:
  - seven times more
  - sevenfold more
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult. ሰብዓተ clearly signals 'seven/sevenfold.' The
    accompanying form is commonly understood adverbially as intensification or increase.
    Given the wider context of transformed cosmic brightness, 'sevenfold' is the safest
    main-text rendering. 'Forever' is retained because the OCR form may reflect an
    adverbial expression of enduring continuance in some editions; the phrase is textually
    difficult enough to warrant a footnote.
