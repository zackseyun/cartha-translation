theological_decisions:
- issue: Whether the verse teaches replacement or renewal of the cosmos
  chosen_reading: The main text preserves the imagery of the first heaven departing
    and a new heaven appearing without specifying whether this is absolute replacement
    or transformed renewal.
  alternative_readings:
  - absolute replacement of the old cosmos
  - renewal/transformation of the existing cosmos
  rationale: The Ge'ez presents visionary sequence and contrast, not a systematic
    cosmology. The translation keeps the tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
