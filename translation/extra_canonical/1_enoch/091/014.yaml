translation:
  text: And after this, in the ninth week, the righteous judgment will be revealed
    to the whole world, and all the deeds of the wicked will depart from all the earth;
    and the world will be written down for destruction, and all people will look to
    the path of uprightness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'it will be written for the destruction of the age' is difficult
      in the Ge'ez. It may mean that a decree or record is written concerning the
      world's ruin, or possibly 'for eternal destruction.'
    reason: textual_variant
  - marker: b
    text: In this chapter's symbolic scheme, 'week' refers to an epoch in sacred history,
      not a literal seven-day week.
    reason: cultural_note
  - marker: c
    text: Or 'it will be written for the destruction of the age'.
    reason: previous_rendering
  - marker: d
    text: Or 'the paths of uprightness'.
    reason: previous_rendering
lexical_decisions:
- source_word: በሰንበት ታስዕ
  chosen: in the ninth week
  alternatives:
  - in the ninth sabbath
  - during the ninth period
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Apocalypse of Weeks context, ሰንበት functions as 'week' or heptad,
    not a literal Sabbath day. The ordinal ታስዕ marks the ninth in the sequence.
- source_word: ኵነኔ ጽድቅ
  chosen: the righteous judgment
  alternatives:
  - the judgment of righteousness
  - righteous justice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase joins judgment with righteousness; 'the righteous judgment'
    is idiomatic English while preserving the judicial-apocalyptic force.
- source_word: ትትከሠት
  chosen: will be revealed
  alternatives:
  - will be manifested
  - will appear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense is best captured by 'be revealed,' fitting
    an apocalyptic disclosure of judgment.
- source_word: ለኵሉ ዓለም
  chosen: to the whole world
  alternatives:
  - for all the world
  - to all the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here ዓለም most naturally means the inhabited world or world-order as the
    sphere to which the revelation is made.
- source_word: ተግባረ ረሲዓን
  chosen: the deeds of the wicked
  alternatives:
  - the works of the sinners
  - the acts of the impious
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the moral concreteness of actions rather than abstract
    wickedness.
- source_word: ይወፅእ እምዲበ ኵሉ ምድር
  chosen: will depart from all the earth
  alternatives:
  - will be removed from upon all the earth
  - will go out from all the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means 'go out/come forth'; in context of evil deeds no longer
    remaining on earth, 'depart' communicates removal without over-paraphrasing.
- source_word: ይጽሐፍ ለሐጕለ ዓለም
  chosen: it will be written for the destruction of the age
  alternatives:
  - it will be written down for eternal destruction
  - it will be recorded for the ruin of the world
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is difficult. ይጽሐፍ is plainly 'will be written.' ሐጕለ suggests
    destruction/ruin, and ዓለም can mean age/world. 'of the age' preserves the ambiguity
    and apocalyptic register better than forcing 'eternal.'
- source_word: ይኔጽሩ ለፍኖተ ርትዕ
  chosen: will look to the paths of uprightness
  alternatives:
  - will watch the paths of righteousness
  - will keep to the ways of rectitude
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can carry the sense of looking, observing, or keeping watch.
    'Look to' fits the directional force with ለ and avoids overstating obedience while
    still implying moral orientation. ርትዕ is rendered 'uprightness' to distinguish
    it slightly from the earlier ጽድቅ while retaining ethical force.
