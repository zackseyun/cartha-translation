theological_decisions:
- issue: Meaning of the difficult clause ይጽሐፍ ለሐጕለ ዓለም
  chosen_reading: it will be written for the destruction of the age
  alternative_readings:
  - it will be written down for eternal destruction
  - it will be recorded for the ruin of the world
  rationale: The Ge'ez wording is textually and semantically difficult. Rather than
    importing a smoother traditional rendering, the translation keeps the writing
    motif explicit and preserves ዓለም as 'age' to maintain apocalyptic ambiguity between
    world-order and era.
  doctrine_reference: Preserve theological tension rather than resolve it; when uncertain,
    prefer transparent English plus footnote.
