translation:
  text: And when sin and transgression and blasphemy and violence increase in every
    deed, and lawlessness and wrongdoing and uncleanness increase, a great punishment
    will come from heaven upon them all, and the Holy Lord will come forth in wrath
    and punishment, to execute judgment upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great plague' or 'a great scourge'; the Ge'ez term can denote punitive
      affliction as well as punishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'And sin and transgression and blasphemy and violence will increase in
      every deed, and lawlessness and wrongdoing and uncleanness will increase; and
      a great punishment will come'.
    reason: previous_rendering
lexical_decisions:
- source_word: ትልህቅ / ትለህቅ
  chosen: will increase
  alternatives:
  - will become great
  - will multiply
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated verb marks escalation of evil. 'Will increase' is idiomatic
    English and preserves the apocalyptic sense of mounting corruption better than
    the more wooden 'will become great.'
- source_word: ኃጢአት
  chosen: sin
  alternatives:
  - offense
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for moral fault; keeping 'sin' preserves the ethical-religious
    force of the list.
- source_word: ዓመፃ
  chosen: transgression
  alternatives:
  - rebellion
  - wrongdoing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Chosen to distinguish it from the later አበሳ ('wrongdoing') and to retain
    the sense of violation or revolt against right order.
- source_word: ጽርፈት
  chosen: blasphemy
  alternatives:
  - reviling
  - insult
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this vice catalogue, the term likely carries impious abusive speech,
    not merely social insult; 'blasphemy' preserves the vertical, Godward dimension.
- source_word: ግፍዕ
  chosen: violence
  alternatives:
  - oppression
  - wrong
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common apocalyptic and prophetic term for brutal injustice; 'violence'
    is concise and forceful.
- source_word: በኵሉ ተግባር
  chosen: in every deed
  alternatives:
  - in every work
  - in all conduct
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A fairly formal rendering that keeps the distributive sense of corruption
    pervading all human action.
- source_word: ዕልወት
  chosen: lawlessness
  alternatives:
  - apostasy
  - impiety
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best fits the sequence of social and cultic corruption while preserving
    apocalyptic-judicial force.
- source_word: አበሳ
  chosen: wrongdoing
  alternatives:
  - guilt
  - evil
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used here as a broad moral term distinct from 'sin' and 'transgression';
    'wrongdoing' avoids collapsing the list into synonyms.
- source_word: ርኵስ
  chosen: uncleanness
  alternatives:
  - impurity
  - defilement
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains possible ritual and moral overtones. 'Uncleanness' is slightly
    more concrete and biblical in register than 'impurity.'
- source_word: መቅሠፍት ዐቢይ
  chosen: a great punishment
  alternatives:
  - a great plague
  - a great scourge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote punitive affliction; 'punishment' fits the immediate
    context of divine wrath and judgment, though the mode may include plague-like
    chastisement.
- source_word: ይከውን እምሰማይ
  chosen: will come from heaven
  alternatives:
  - will be from heaven
  - will happen from heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This smooths the existential verb into natural English while preserving
    the heavenly origin of the judgment.
- source_word: እግዚእ ቅዱስ
  chosen: the Holy Lord
  alternatives:
  - the Lord, the Holy One
  - the holy Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase functions as a divine title. 'The Holy Lord' is elevated but
    readable and preserves the adjective as part of the title rather than a separate
    apposition.
- source_word: ይወፅእ
  chosen: will come forth
  alternatives:
  - will go forth
  - will appear
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Come forth'' preserves the dramatic theophanic movement better than
    the flatter ''appear.'''
- source_word: በመዓት
  chosen: in wrath
  alternatives:
  - with wrath
  - in anger
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the solemn register and parallels the following phrase 'in punishment.'
- source_word: በመቅሠፍት
  chosen: in punishment
  alternatives:
  - with punishment
  - for punishment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated noun links the heavenly punitive event with the Lord's judicial
    action; preserving the repetition is important in apocalyptic rhetoric.
- source_word: ከመ ይግበር ኵነኔ
  chosen: to execute judgment
  alternatives:
  - to make judgment
  - to perform judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Idiomatic English for a judicial formula, while keeping the active sense
    of divine intervention.
- source_word: ዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - against the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Upon the earth'' preserves the elevated register and the cosmic scope
    of the judgment scene.'
