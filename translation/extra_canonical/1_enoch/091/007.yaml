theological_decisions:
- issue: Rendering of the divine title እግዚእ ቅዱስ
  chosen_reading: the Holy Lord
  alternative_readings:
  - the Lord, the Holy One
  - the holy Lord
  rationale: The Ge'ez phrase is treated as a compact divine title in this judgment
    context. 'The Holy Lord' preserves both holiness and lordship without importing
    later fixed canonical formulas.
  doctrine_reference: Preserve apocalyptic imagery and do not over-harmonize with
    later Christian usage.
- issue: Sense of መቅሠፍት in this verse
  chosen_reading: punishment
  alternative_readings:
  - plague
  - scourge
  - chastisement
  rationale: Because the verse culminates in explicit judgment language, the punitive
    sense is primary. A footnote preserves the possibility that the punishment is
    experienced as a plague or scourge.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    alternatives in footnotes.
