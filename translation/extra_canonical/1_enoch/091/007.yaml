  rationale: 'The Ge''ez begins with the subordinator ወእመኒ (wa-ʾəmmani, ''and when''
    or ''and if''), setting up a protasis (''When sin... increases'') and an apodosis
    (''a great punishment will come''). The draft ignores the subordinator, flattening
    the syntax into independent clauses and losing the author''s cause-and-effect
    temporal structure. The ''and'' before ''a great punishment'' in the draft reflects
    the Ge''ez waw of apodosis, which should be dropped in English when the ''when''
    clause is properly restored. | Adjudicator: The reviewer correctly identifies
    the Ge''ez particle ወእመኒ (wa-ʾəmmani, ''and when/if'') at the head of the clause.
