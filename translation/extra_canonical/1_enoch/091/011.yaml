theological_decisions:
- issue: Whether ዓመፃ should be rendered in a morally broad sense ('injustice') or
    in a more forceful apocalyptic-social sense ('oppression'/'violence').
  chosen_reading: oppression
  alternative_readings:
  - injustice
  - violence
  rationale: The verse is a judgment oracle against sinners, plotters of violence,
    and blasphemers. 'Oppression' captures both moral wrong and social violence without
    narrowing the term too much.
  doctrine_reference: Preserve apocalyptic imagery and moral force; do not flatten
    into generic prose.
- issue: How to render the repeated judgment verb ይትሐጐሉ.
  chosen_reading: shall be delivered up
  alternative_readings:
  - shall be slain
  - shall be handed over
  rationale: The passive judicial sense fits the sequence of divine judgment. This
    preserves theological tension between being handed over to judgment and the resulting
    destruction, rather than collapsing both into a single English verb.
  doctrine_reference: Preserve theological tension rather than resolve it.
