translation:
  text: And from it there shall be cut off ten weeks of oppression, and sinners shall
    be delivered up by the sword. Then from the blasphemers there shall be cut off,
    in every place, those who devise violence and those who commit blasphemy; they
    shall be delivered up to destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause after 'by the sword' is textually difficult in the Ethiopic witness.
      The translation follows the received Ge'ez sequence while preserving its repeated
      judgment formulas.
    reason: textual_variant
  - marker: b
    text: '''Blasphemers'' and ''commit blasphemy'' render related Ge''ez terms, preserving
      the lexical link in the source.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይትገዘሙ
  chosen: there shall be cut off
  alternatives:
  - they shall be removed
  - they shall be destroyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive form suggests being cut off or removed. 'Cut off'
    preserves the judgmental, apocalyptic force and echoes exclusion/destruction without
    over-specifying the mechanism.
- source_word: አሥራወ ዓመፃ
  chosen: ten weeks of oppression
  alternatives:
  - ten weeks of injustice
  - ten weeks of violence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: አሥራወ is 'ten'; ዓመፃ carries the sense of violence, wrong, or oppression.
    'Oppression' fits the ethical-social force in this judgment context better than
    the broader 'injustice.'
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - wrongdoers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard moral-religious term in Enochic judgment contexts; 'sinners'
    preserves the text's covenantal and apocalyptic register.
- source_word: ይትሐጐሉ
  chosen: shall be delivered up
  alternatives:
  - shall be slain
  - shall be handed over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form can indicate being handed over or consigned. 'Delivered up'
    preserves the judicial nuance and allows the following instrument or outcome phrase
    to carry the specific mode of judgment.
- source_word: በሰይፍ
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard judgment image; 'by the sword' is idiomatic and preserves
    the apocalyptic violence of the source.
- source_word: ጽሩፋን
  chosen: the blasphemers
  alternatives:
  - the revilers
  - the insolent ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The surrounding clause includes those who commit ጽርፈት, a term of reproach/blasphemy.
    Rendering the related noun here as 'blasphemers' preserves the lexical connection
    and the religious offense implied.
- source_word: በኵሉ መካን
  chosen: in every place
  alternatives:
  - everywhere
  - in every region
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward locative phrase; 'in every place' keeps the formal
    breadth of the judgment.
- source_word: ይሔልይዋ ለግፍዕ
  chosen: devise violence
  alternatives:
  - plot oppression
  - think upon wrongdoing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes thinking, devising, or planning; ግፍዕ conveys violence/oppression.
    'Devise violence' preserves intentionality rather than merely inward thought.
- source_word: ይገብርዋ ለጽርፈት
  chosen: commit blasphemy
  alternatives:
  - practice reviling
  - do reproach
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is 'do/make'; the object is reproach or blasphemous speech.
    'Commit blasphemy' gives natural English while preserving the gravity of the offense.
- source_word: በመጥባሕት
  chosen: to destruction
  alternatives:
  - for slaughter
  - to ruin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun likely denotes slaughter or destruction. Because the verse already
    used 'by the sword,' 'to destruction' avoids awkward repetition while retaining
    the sense of terminal judgment.
