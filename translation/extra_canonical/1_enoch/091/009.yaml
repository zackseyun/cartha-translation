theological_decisions:
- issue: Scope of the condemned group and duration of punishment
  chosen_reading: The verse describes final, enduring judgment on the wicked, expressed
    with expulsion from the earth, fiery judgment, wrath, and the phrase 'forever.'
  alternative_readings:
  - The language could be read as hyperbolic destruction imagery without specifying
    a later doctrinal model of eternal conscious torment.
  - '''Forever'' could be taken as age-long eschatological finality rather than a
    philosophically defined endless duration.'
  rationale: The Ge'ez stacks multiple judgment formulas and ends with an explicit
    forever-expression. The translation preserves that force without importing later
    systematic categories beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
