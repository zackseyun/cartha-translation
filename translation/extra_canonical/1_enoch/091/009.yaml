translation:
  text: And all will be given over with the nations, and the towers will be burned
    with fire; and they will be removed from all the earth, and they will be cast
    into the judgment of fire, and they will perish in wrath and in mighty judgment
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The noun rendered 'assembly-place' is uncertain; it may denote a gathering-place,
      camp, or collective enclosure. The translation keeps a spatial sense without
      overdefining it.
    reason: lexical_alternative
  - marker: b
    text: '''With the nations'' could also be understood as ''among the nations''
      depending on how the preposition is taken in context.'
    reason: lexical_alternative
  - marker: c
    text: The closing 'forever' marks enduring eschatological finality in the verse;
      readers should avoid importing a later doctrinal system more specific than the
      text itself states.
    reason: cultural_note
  - marker: d
    text: Or 'And all of them will be handed over with the nations, and the assembly-place'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይትወሀብ
  chosen: will be handed over
  alternatives:
  - will be given
  - will be delivered up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/jussive-style form from 'give, hand over.' 'Handed over' preserves
    the judicial sense better than the flatter 'given.'
- source_word: ምስለ አሕዛብ
  chosen: with the nations
  alternatives:
  - among the nations
  - together with the Gentiles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition most naturally means 'with.' 'Nations' is preferred over
    'Gentiles' here because the verse is a judgment scene, not an ethnic contrast
    within later Christian usage.
- source_word: ማኅፈሪ
  chosen: assembly-place
  alternatives:
  - gathering-place
  - camp
  - encampment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is difficult; it appears to denote a gathered place or collective
    setting. 'Assembly-place' keeps the spatial sense without overcommitting to 'camp'
    or a more technical institutional meaning.
- source_word: ትነድድ በእሳት
  chosen: will burn with fire
  alternatives:
  - will be set ablaze with fire
  - will blaze in fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward fiery judgment image should be preserved. 'Burn with
    fire' keeps the repetitive apocalyptic force.
- source_word: ይወፅእዎሙ
  chosen: they will be driven out
  alternatives:
  - they will be brought out
  - they will be expelled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of judgment from the earth, an expulsive sense fits better
    than the neutral 'brought out.'
- source_word: እምኵሉ ምድር
  chosen: from the whole earth
  alternatives:
  - from all the earth
  - out of the entire land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Earth'' better suits the cosmic-apocalyptic scope of the Epistle than
    the narrower ''land.'''
- source_word: ይትገደፉ
  chosen: they will be cast
  alternatives:
  - they will be thrown
  - they will be hurled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive of forcible casting suits the punitive sequence and pairs naturally
    with 'into the judgment of fire.'
- source_word: በኵነኔ እሳት
  chosen: into the judgment of fire
  alternatives:
  - in the judgment of fire
  - into fiery judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the genitival/judicial structure rather than smoothing to a purely
    adjectival phrase. This preserves the formal apocalyptic cadence.
- source_word: ይትሐጐሉ
  chosen: they will perish
  alternatives:
  - they will be destroyed
  - they will be consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A broad destruction term is likely intended. 'Perish' is strong without
    forcing a specific mechanism beyond the surrounding fire and wrath imagery.
- source_word: በመዓት
  chosen: in wrath
  alternatives:
  - in anger
  - in fury
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Wrath'' best matches the elevated register and judicial tone.'
- source_word: በኵነኔ ኃያል
  chosen: in mighty judgment
  alternatives:
  - in strong judgment
  - by severe judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective conveys force/power. 'Mighty judgment' preserves the weight
    of divine punitive action.
- source_word: እንተ ለዓለም
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks enduring duration. 'Forever' is idiomatic and preserves
    the eschatological finality.
