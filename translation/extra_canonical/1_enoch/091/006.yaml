theological_decisions:
- issue: Whether to render the three evil terms with overlapping English synonyms
    or preserve their distinction
  chosen_reading: 'Distinct triad: ''lawlessness and violence and sin'''
  alternative_readings:
  - '''wickedness and oppression and transgression'''
  - '''rebellion and injustice and guilt'''
  rationale: The Ge'ez presents three coordinated terms, and the rhetoric gains force
    from accumulation rather than redundancy. Preserving distinct English glosses
    keeps the apocalyptic indictment sharp and auditable.
  doctrine_reference: Translation philosophy §Consistency of key terms, or documented
    exception.
