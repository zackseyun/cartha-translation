translation:
  text: And lawlessness will again be repeated, and it will be brought to completion
    upon the earth; and every work of lawlessness and violence and sin will again
    take hold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause literally speaks of every work of lawlessness, violence,
      and sin 'taking hold' again; the image is of evil regaining its grip on the
      earth.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'will be brought to completion' may also be understood
      as 'will be completed' or 'will be fulfilled,' here in the dark sense that wickedness
      reaches its full measure.
    reason: lexical_alternative
lexical_decisions:
- source_word: ትደገም
  chosen: will again be repeated
  alternatives:
  - will recur
  - will be repeated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is passive/reflexive in sense from the root 'repeat/return again.'
    'Will again be repeated' preserves both futurity and the iterative force signaled
    by the context and by ካዕበ ('again').
- source_word: ካዕበ
  chosen: again
  alternatives:
  - once more
  - anew
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This adverb marks recurrence. 'Again' is the most natural concise English
    equivalent and preserves the cyclical/apocalyptic pattern of renewed wickedness.
- source_word: ዓመፃ
  chosen: lawlessness
  alternatives:
  - violence
  - wickedness
  - rebellion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Because the verse later separately lists ግፍዕ ('violence/oppression')
    and አበሳ ('sin/guilt'), rendering ዓመፃ as 'lawlessness' best preserves distinction
    among the three terms rather than collapsing them into one broad idea of evil.
- source_word: ትትፈጸም
  chosen: will be brought to completion
  alternatives:
  - will be completed
  - will be fulfilled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive sense of 'be completed/finished' fits the Ge'ez form. 'Brought
    to completion' keeps the ominous sense that wickedness reaches its full measure
    on the earth, without importing later theological formulae.
- source_word: ዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - in the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Upon the earth'' suits the elevated apocalyptic register and reflects
    the broad cosmic scope better than the more localized ''in the land.'''
- source_word: ትትአኀዝ
  chosen: will again take hold
  alternatives:
  - will seize
  - will prevail
  - will gain control
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally conveys grasping or taking hold. In context, the subject
    is the collective evil works, so 'will again take hold' idiomatically expresses
    their renewed grip without over-paraphrasing.
- source_word: ኵሉ ግብረ
  chosen: every work of
  alternatives:
  - all the deeds of
  - every deed of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This construction introduces the concrete manifestations of evil. 'Every
    work of' is slightly more formal and preserves the distributive force of ኵሉ.
- source_word: ግፍዕ
  chosen: violence
  alternatives:
  - oppression
  - wrong
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can include oppression or injustice, but 'violence' fits the
    escalating triad and preserves the harsh social dimension of the evil described.
- source_word: አበሳ
  chosen: sin
  alternatives:
  - guilt
  - offense
  - transgression
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A broad moral-religious term is needed here. 'Sin' is the clearest English
    equivalent, while the alternatives are possible nuances that need not be foregrounded
    in the main text.
