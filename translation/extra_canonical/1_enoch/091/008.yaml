  from: And in it days shall be cut off, and lawlessness shall be removed from its roots, together with deceit, from beneath heaven.
  to: In those days, violence shall be cut off from its roots, and iniquity together with deceit from under heaven.
  rationale: 'The draft severely mistranslates the syntax and vocabulary. ''በአማንቱ መዋዕል'' is the standard idiom ''in those days,'' not ''in it days.'' The verb ''ትትገዘም'' (shall be cut off) governs ''ግፍዕ'' (violence), not ''days.'' Furthermore, the draft conflates ''ግፍዕ'' (violence) and ''ዓመፃ'' (iniquity), omitting one of the nouns and supplying an extra verb (''shall be removed'') not present in the Ge''ez. | Adjudicator: The reviewer''s rationale is entirely correct. The current rendering severely misparses the Ge''ez syntax. ''በአማንቱ፡ መዋዕል'' (ba-''amāntu mawā''el) is the standard demonstrative phrase ''in those days,'' not ''i'
