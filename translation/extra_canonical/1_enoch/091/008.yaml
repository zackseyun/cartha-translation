theological_decisions:
- issue: Scope of the purgation
  chosen_reading: The verse describes a cosmic removal of evil from the world order, not merely a local social reform.
  alternative_readings:
  - a shortening of human lifespan because of wickedness
  - a regional cleansing of the land
  rationale: The phrase 'from beneath heaven' broadens the scope beyond a single community, and the root-eradication imagery suggests eschatological judgment.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment formulas into generic prose.
