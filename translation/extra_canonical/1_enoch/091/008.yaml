lexical_decisions:
- source_word: በአማንቱ
  chosen: And in it
  alternatives:
  - and then
  - and therein
  lexicon: Dillmann
  rationale: The preposition plus pronominal element points back to the epoch or week in the surrounding context. 'In it' preserves the temporal-reference linkage without over-specifying 'week' in the English line itself.
- source_word: መዋዕል
  chosen: days
  alternatives:
  - times
  - periods
  lexicon: Dillmann
  rationale: A common temporal noun meaning 'days' or 'times.' 'Days' keeps the concrete apocalyptic idiom and fits the passive verbal phrase that follows.
- source_word: ትትገዘም
  chosen: shall be cut off
  alternatives:
  - shall be shortened
  - shall be ended
  lexicon: Dillmann
  rationale: The verb carries the sense of cutting, cutting short, or terminating. 'Shall be cut off' preserves the judgment-like force and the vivid imagery better than the smoother 'ended.'
- source_word: ግፍዕ
  chosen: lawlessness
  alternatives:
  - violence
  - wickedness
  - oppression
  lexicon: Dillmann
  rationale: The term can overlap with violence or injustice, but in this context of moral purgation from the earth, 'lawlessness' best captures broad rebellious evil without narrowing it to physical brutality alone.
- source_word: እምነ ሥረዊሃ
  chosen: from its roots
  alternatives:
  - from its root
  - from its foundation
  lexicon: Dillmann
  rationale: 'The phrase is spatial-metaphorical: evil is removed at the root. The plural ''roots'' sounds natural in English and preserves the image of eradication at the source.'
- source_word: ወዓመፃ
  chosen: together with deceit
  alternatives:
  - and transgression
  - and rebellion
  - and fraud
  lexicon: Dillmann
  rationale: The conjunction joins a second evil to the first. Given the uncertain OCR and semantic range, 'deceit' is a cautious rendering that fits the paired vice-list context; the alternatives are preserved because the exact nuance may be disputed.
- source_word: ምስለ ጕሕሉት
  chosen: together with deceit
  alternatives:
  - with guile
  - with corruption
  lexicon: Dillmann
  rationale: This phrase likely expresses accompaniment ('with/together with') plus a noun of guile or corruption. Because the OCR segmentation is difficult, the English compresses the phrase into a natural vice-pair while preserving the sense of associated evil.
- source_word: እምታሕተ ሰማይ
  chosen: from beneath heaven
  alternatives:
  - from under heaven
  - from beneath the sky
  lexicon: Dillmann
  rationale: A standard cosmic expression for the inhabited world. 'From beneath heaven' keeps the elevated apocalyptic register and avoids flattening the imagery.
