theological_decisions:
- issue: Scope of kinship language
  chosen_reading: The verse refers to Methuselah's literal familial relations ('brothers'
    and 'kindred'), not a spiritualized community.
  alternative_readings:
  - brothers as clan-members only
  - brothers as broader companions
  rationale: Nothing in the immediate wording requires metaphorical or sectarian language.
    The narrative setting is familial and testamentary.
  doctrine_reference: Preserve local passage sense before harmonizing key communal
    terms across the corpus.
