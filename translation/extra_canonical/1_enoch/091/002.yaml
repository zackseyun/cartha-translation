lexical_decisions:
- source_word: እምኔሁ
  chosen: after this
  alternatives:
  - from this
  - thereupon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional form literally has a sense like 'from it/therefrom,'
    but in narrative sequence it functions idiomatically as a temporal transition.
    'After this' preserves the flow without over-literal awkwardness.
- source_word: ሖረ
  chosen: went
  alternatives:
  - departed
  - proceeded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion verb. 'Went' is the most natural English equivalent
    and keeps the narrative plainness.
- source_word: ማቱሳላ
  chosen: Methuselah
  alternatives:
  - Matusala
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard English biblical transliteration is preferred for readability
    and consistency.
- source_word: ጸውዖሙ
  chosen: called
  alternatives:
  - summoned
  - invited
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to call or summon. 'Called' is broad enough to preserve
    the source without implying either a formal legal summons or a merely social invitation.
- source_word: ለኵሎሙ አኃዊሁ
  chosen: all his brothers
  alternatives:
  - all his brethren
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is explicit and familial. 'Brothers' is preferred over the
    archaic 'brethren' under project style guidelines.
- source_word: ኀቤሁ
  chosen: to him
  alternatives:
  - to his presence
  - before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition indicates movement toward or presence with him. 'To him'
    is the cleanest idiomatic rendering in this context.
- source_word: አስተጋብኦሙ
  chosen: gathered
  alternatives:
  - assembled
  - brought together
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The causative/intensive sense suggests bringing people together. 'Gathered'
    is concise and fits the narrative action well.
- source_word: አዝማዲ ዚአሁ
  chosen: his kindred
  alternatives:
  - his relatives
  - his family
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term refers to those related by kinship. 'Kindred' preserves the
    elevated register of the passage better than 'family' while remaining readable.
