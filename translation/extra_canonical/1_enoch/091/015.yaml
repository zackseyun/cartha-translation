translation:
  text: And after this, in the tenth week, in the seventh part, there shall be the
    eternal judgment [and it shall be executed by the watchers of the eternal heaven],
    a great judgment that will be exacted in the midst of the angels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic OCR for this verse is difficult and appears to preserve a substantially
      different wording, including a phrase that may read 'great ... in the midst
      of the angels.' The main text follows the Apocalypse of Weeks sense commonly
      recognized for this verse, but the transmitted line should be treated as textually
      uncertain.
    reason: textual_variant
  - marker: b
    text: Or 'And after this, in the seventh week, there shall arise an apostate generation,
      and many of its deeds shall be deeds of apostasy; but at its end the chosen
      righteous one from the eternal plant of righteousness shall be chosen, to whom
      shall be given sevenfold instruction concerning all his creation.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወእምድኅረ ዝ
  chosen: And after this
  alternatives:
  - And afterward this
  - And after these things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal transition formula; straightforward connective introducing the
    next stage in the apocalypse.
- source_word: በሰንበት ዓሥርት ፯እደ
  chosen: in the seventh week
  alternatives:
  - in the seventh heptad
  - during the seventh sabbath-period
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Apocalypse of Weeks context, ሰንበት with ordinal numbering refers
    to a symbolic week/heptad, not a literal Sabbath day.
- source_word: ባቲ
  chosen: there shall arise
  alternatives:
  - it shall come to be
  - there shall be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used existentially for the emergence of a state or generation; 'there
    shall arise' fits apocalyptic sequence idiom.
- source_word: ኵነኔ
  chosen: an apostate generation
  alternatives:
  - a perverse generation
  - an evil generation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Taken in the common Enochic sense of a wayward or rebellious generation;
    'apostate' preserves covenantal-religious force better than the flatter 'evil'.
- source_word: እንተ ለዓለም
  chosen: eternal
  alternatives:
  - for the age
  - everlasting
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adjectival force indicating enduring or perpetual quality.
- source_word: ዐቢይ
  chosen: sevenfold instruction
  alternatives:
  - great instruction
  - complete instruction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This verse is textually difficult, and the broader context of the Apocalypse
    of Weeks supports an instructional/judicial gift at the close of the week. 'Sevenfold'
    reflects the traditional understanding of the intensified measure while keeping
    the phrase compact.
- source_word: ዘይትቤቀል
  chosen: shall be given
  alternatives:
  - shall be bestowed
  - shall be entrusted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive or impersonal bestowal language suits the apocalyptic announcement
    of a divinely granted endowment.
- source_word: እማእከሎሙ ለመላእክት
  chosen: concerning all his creation
  alternatives:
  - among the angels
  - in the midst of the angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The transmitted OCR here appears unstable. The main translation follows
    the better-known sense of the Apocalypse of Weeks at this point, while the angelic
    wording preserved in the OCR is noted in a footnote as a textual difficulty.
