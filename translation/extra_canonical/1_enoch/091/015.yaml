theological_decisions:
- issue: Identity of the figure chosen at the end of the seventh week
  chosen_reading: the chosen righteous one is rendered generically, not as a messianic
    title
  alternative_readings:
  - a specific messianic individual
  - a collective righteous remnant
  rationale: The immediate passage does not require importing later messianic terminology.
    The wording is kept locally grounded and non-harmonized, in line with project
    guidance not to overread later theology into Enochic titles.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    over-harmonize with later Christian usage.
