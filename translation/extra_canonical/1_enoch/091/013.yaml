lexical_decisions:
- source_word: በተፍጻሜታ
  chosen: at its completion
  alternatives:
  - in its end
  - at its consummation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prefixed preposition በ- with a noun from the root of completion/end marks a temporal phrase. 'At its completion' preserves the sequence of the apocalyptic week while remaining readable; 'consummation' is possible but sounds more interpretive.
- source_word: ይመረዩ
  chosen: shall be chosen
  alternatives:
  - shall be selected
  - shall be separated
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/jussive-looking form here most naturally conveys selection or choosing. 'Chosen' preserves the formal sense and fits the context of righteous ordering without importing later technical language beyond the verse itself.
- source_word: አብያተ
  chosen: houses
  alternatives:
  - households
  - dwellings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural of 'house.' In this context it may denote actual houses or established households/structures. 'Houses' keeps the imagery concrete and allows the apocalyptic architectural motif to stand.
- source_word: እምጽድቅ
  chosen: in righteousness
  alternatives:
  - from righteousness
  - out of righteousness
  - by righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although እም often has a separative sense ('from'), in context the phrase functions adverbially/qualitatively. 'In righteousness' best conveys that the choosing is characterized by righteousness rather than spatially derived from it.
- source_word: ዚአሆሙ
  chosen: for them
  alternatives:
  - which are theirs
  - belonging to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative/pronominal form points to the beneficiaries or possessors. 'For them' reads naturally in English and fits the passive construction with 'houses shall be chosen.'
- source_word: ወይትሐነጽ
  chosen: and ... shall be built
  alternatives:
  - and ... shall be established
  - and ... shall be constructed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes building/constructing. 'Built' preserves the temple/palatial imagery central to the verse.
- source_word: ቤት ንጉሥ ዐቢይ
  chosen: the house of the great King
  alternatives:
  - the palace of the great King
  - the house of the mighty King
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'house of [the] great king.' 'House' should be retained because in biblical/apocalyptic diction it can carry temple and royal-house resonance at once. Capitalizing 'King' reflects the likely divine referent in context without over-specifying beyond the text.
- source_word: በስብሐት
  chosen: in glory
  alternatives:
  - with glory
  - in splendor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes glory, honor, splendor. 'In glory' preserves the prepositional force and the elevated register of the vision.
- source_word: እስከ ለዓለም
  chosen: forever
  alternatives:
  - unto eternity
  - for all ages
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard idiom for enduring perpetually. 'Forever' is idiomatic modern English and preserves the eschatological permanence.
