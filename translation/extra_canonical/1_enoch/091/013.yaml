theological_decisions:
- issue: Identity of 'the great King'
  chosen_reading: a divine royal title, rendered 'the great King' with capitalization of 'King'
  alternative_readings:
  - an earthly king in an idealized age
  - a generic royal metaphor without capitalization
  rationale: Within the Epistle's eschatological architecture and judgment setting, the phrase most naturally points to God as the ultimate royal figure whose house is built in enduring glory. Capitalization signals probable referent while leaving the title itself translated rather than interpreted further.
  doctrine_reference: Preserve theological tension rather than resolve it; translate titles rather than importing later doctrinal formulas.
- issue: Sense of 'houses shall be chosen in righteousness'
  chosen_reading: retain the concrete image of 'houses' rather than abstracting to 'the righteous shall be chosen'
  alternative_readings:
  - the righteous houses/households will be established
  - dwellings will be allotted to the righteous
  rationale: The Ge'ez explicitly has 'houses,' and the verse pairs this with the building of the great King's house. Keeping the architectural imagery preserves the apocalyptic symbolism and avoids paraphrastic flattening.
