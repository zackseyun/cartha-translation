theological_decisions:
- issue: Divine agency mediated through angels
  chosen_reading: God gives the judged over into the hand of angels, and God's own
    punishment and wrath then rest upon them.
  alternative_readings:
  - The angels themselves are the punishment
  - The day of tribulation and pain refers only to the victims' experience apart from
    divine wrath
  rationale: The syntax distinguishes angelic mediation ('into the hand of the angels')
    from the subsequent direct divine action ('my punishment and my wrath'). Preserving
    both avoids collapsing secondary and primary agency.
  doctrine_reference: Preserve theological tension rather than resolve it.
