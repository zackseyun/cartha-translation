translation:
  text: When I desired to deliver them into the hand of the angels on the day of tribulation
    and pain, I will cause my punishment and my wrath to abide upon them, says God,
    the Lord of spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording is difficult at the transition before 'my punishment and
      my wrath.' The sense appears to move from being handed over to angels to the
      settling of divine judgment upon them.
    reason: textual_variant
  - marker: b
    text: Literally, 'into the hand of the angels,' a judicial idiom for being given
      into another's power.
    reason: cultural_note
  - marker: c
    text: Or 'to give them over into the hand of the angels on the day of tribulation
      and pain, then'.
    reason: previous_rendering
  - marker: d
    text: Or 'says the Lord, the Lord of spirits'.
    reason: previous_rendering
lexical_decisions:
- source_word: ፈቀድኩ
  chosen: I wished
  alternatives:
  - I desired
  - I decided
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb expresses volition/intention. 'I wished' preserves the first-person
    divine resolve without overstating it as a formal decree.
- source_word: አጽንዖሙ
  chosen: to give them over
  alternatives:
  - to deliver them
  - to hand them over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with 'into the hand of the angels,' the sense is transfer
    into another's power. 'Give them over' is idiomatic and preserves the judicial
    force.
- source_word: በእደ መላእክት
  chosen: into the hand of the angels
  alternatives:
  - into the power of the angels
  - to the angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom 'into the hand' is preserved because it is a significant biblical/judicial
    image and should not be flattened.
- source_word: በዕለተ ምንዳቤ ወሕማም
  chosen: on the day of tribulation and pain
  alternatives:
  - on the day of affliction and suffering
  - on the day of distress and torment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Both nouns denote severe suffering. 'Tribulation and pain' keeps the
    apocalyptic register and the pairing of external distress with experienced suffering.
- source_word: መቅሠፍተየ
  chosen: my punishment
  alternatives:
  - my scourge
  - my chastisement
  - my plague
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can carry the sense of a blow, scourge, or punitive affliction.
    'Punishment' best fits the judicial context while avoiding over-specification.
- source_word: መዐትየ
  chosen: my wrath
  alternatives:
  - my anger
  - my fury
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard rendering for divine anger in judgment contexts; 'wrath' preserves
    elevated register and apocalyptic force.
- source_word: አኃድር ዲቤሆሙ
  chosen: I will cause ... to rest upon them
  alternatives:
  - I will make ... dwell upon them
  - I will bring ... upon them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The causative plus preposition suggests causing something to settle/dwell
    upon them. 'Cause to rest upon' preserves the image of abiding judgment better
    than the flatter 'bring upon'.
- source_word: እግዚአብሔር እግዚአ መናፈስት
  chosen: the Lord, the Lord of spirits
  alternatives:
  - the Lord of spirits
  - the Lord, master of spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated title is retained rather than compressed. 'Lord of spirits'
    is the established literal sense in 1 Enoch and should remain transparent.
