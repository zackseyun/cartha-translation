  from: the kings and the mighty who dwell [there].
  to: O kings and mighty ones who dwell
  rationale: 'Adjudicator-modified: The reviewer is correct about the Ge''ez grammar. The verb ትኃድሩ (teḫādderū) is unambiguously a second-person plural imperfect (''you dwell''), not a third-person form (which would be ይኃድሩ, yeḫādderū). The lack of definite articles on ነገሥት (nagaśt, ''kings'') and ኃያላን (ḫāyālān, ''mighty ones'') further supports reading this as a direct vocative address. The current English incorrectly flattens this into a third-person description. The proposed change restores the direct address intended by the author. I'
