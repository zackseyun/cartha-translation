theological_decisions:
- issue: Whether to soften the divine verb ነሥሐ when predicated of the Head of Days
  chosen_reading: repented
  alternative_readings:
  - relented
  - changed his mind
  rationale: The source text presents a striking anthropopathic expression. In keeping
    with the project's philosophy, the translation preserves the tension in the main
    text rather than resolving it into a safer doctrinal paraphrase. A footnote supplies
    the alternatives that many readers may judge contextually preferable.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it; contested-terms note on μετανοέω as context-sensitive 'change
    of mind'/'repent' by analogy of semantic domain.
