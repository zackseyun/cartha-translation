translation:
  text: And after this the Head of Days repented and said, “In vain have I destroyed
    all those who dwell on the dry land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'relented' or 'changed his mind.' The Ge'ez verb can express a reversal
      or regret, and with a divine subject the nuance may be less moral than English
      'repented' can suggest.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምድኅረዝ
  chosen: after this
  alternatives:
  - afterward
  - after these things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal transition formula; 'after this' preserves apocalyptic narrative
    sequence in natural English.
- source_word: ነሥሐ
  chosen: repented
  alternatives:
  - relented
  - changed his mind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez verb commonly carries the sense of repentance/relenting. Because
    the subject is the Head of Days, the wording is theologically sensitive. 'Repented'
    is the more literal rendering, while the footnote preserves the less morally loaded
    alternative 'relented/changed his mind.' This follows the project's preference
    to preserve tension rather than resolve it.
- source_word: ርእሰ መዋዕል
  chosen: the Head of Days
  alternatives:
  - the Antecedent of Time
  - the Chief of Days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a title in the Parables. 'Head of Days' is a transparent, literal
    rendering of the Ge'ez components and preserves the distinctive apocalyptic title
    without harmonizing it to later biblical titles.
- source_word: ሕኵፖልክዎሙ
  chosen: I destroyed them
  alternatives:
  - I wiped them out
  - I caused their destruction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to express destructive action toward the plural object.
    'Destroyed them' is forceful but not overly interpretive, fitting judgment language.
- source_word: ለኵሎሙ ለእለ ይነብሩ
  chosen: all those who dwell
  alternatives:
  - all who live
  - everyone dwelling
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the explicit totality and the participial sense of ongoing
    habitation.
- source_word: ውስተ የብስ
  chosen: on the dry land
  alternatives:
  - upon the earth
  - on the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: የብስ is more specifically 'dry land' than the generic 'earth.' This may
    evoke flood/judgment imagery, so the more concrete rendering is preferable.
