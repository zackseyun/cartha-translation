theological_decisions:
- issue: Whether to render the heavenly sign in explicitly covenantal language
  chosen_reading: Rendered the sign as 'a pledge of faithfulness between me and them'
    rather than 'covenant' in the main text.
  alternative_readings:
  - a covenant between me and them
  - a sign of peace between me and them
  rationale: The Ge'ez witness here uses ሃይማኖተ rather than a more explicit covenant
    term. To preserve theological tension and avoid over-harmonizing with Genesis
    flood language, the main text keeps the fidelity/pledge sense while allowing covenantal
    resonance.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Whether to identify the sign as the rainbow in the main text
  chosen_reading: Left the sign unnamed in the main text.
  alternative_readings:
  - the rainbow in the heavens
  - the bow in the clouds
  rationale: Although the context strongly echoes the flood sign tradition, the provided
    Ge'ez text says only 'a sign in the heavens.' Naming the rainbow would go beyond
    the wording of this verse.
  doctrine_reference: Do not paraphrase beyond what the Ge'ez witness warrants; do
    not over-harmonize with familiar biblical phrasing.
