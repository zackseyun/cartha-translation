translation:
  text: And he swore by his great name that from this time onward he would not do
    thus to all who dwell upon the dry land; and I will set a sign in the heavens,
    and it will be a pledge of faithfulness between me and them forever, for as long
    as the days of heaven are upon the earth; and this is by my command.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The 'sign in the heavens' likely echoes the flood-sign tradition, but the
      verse itself does not explicitly name the sign.
    reason: cross_reference
  - marker: b
    text: The noun rendered 'pledge of faithfulness' can also be understood more broadly
      as 'faithfulness' or, by contextual extension, a covenantal pledge.
    reason: lexical_alternative
  - marker: c
    text: The closing phrase may also be rendered 'this is according to my ordinance'
      or 'this is my decree.'
    reason: lexical_alternative
lexical_decisions:
- source_word: መሐለ
  chosen: he swore
  alternatives:
  - he took an oath
  - he vowed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes oath-taking. 'He swore' is the most direct and idiomatic
    English rendering and preserves the solemn covenantal force.
- source_word: በስሙ ዐቢይ
  chosen: by his great name
  alternatives:
  - by his mighty name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward formal rendering that preserves the reverential oath
    formula without embellishment.
- source_word: እምይእዜ
  chosen: from this time onward
  alternatives:
  - from now on
  - henceforth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the temporal force clear in modern English while retaining
    the formal tone of a divine declaration.
- source_word: ኢይገብር ከመዝ
  chosen: he would not do thus
  alternatives:
  - he would not act in this way
  - he would not do so
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez is concise and somewhat formulaic. 'Do thus' preserves the
    elevated register and leaves the antecedent action to context rather than over-specifying
    it.
- source_word: ለኵሎሙ እለ ይነብሩ ዲበ የብስ
  chosen: to all who dwell upon the dry land
  alternatives:
  - against all who live on the earth
  - to all the inhabitants of the dry ground
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: የብስ is more specifically 'dry land' than the broader 'earth.' This likely
    evokes the flood context and should not be flattened.
- source_word: ትእምርተ
  chosen: a sign
  alternatives:
  - a token
  - a mark
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sign'' is the most natural rendering for a visible covenantal indicator
    set in the heavens.'
- source_word: እወዲ በሰማያት
  chosen: I will set in the heavens
  alternatives:
  - I have placed in the heavens
  - I will place in heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates placement in the sky/heavens. 'Set' works well with
    'sign' in English and preserves the elevated register.
- source_word: ማእከሌየ ወማእከሌሆሙ
  chosen: between me and them
  alternatives:
  - as between me and them
  - in the midst of me and them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the idiomatic covenantal relational phrase. 'Between me and them'
    is clear and faithful.
- source_word: ሃይማኖተ
  chosen: a pledge of faithfulness
  alternatives:
  - faithfulness
  - covenant
  - trust
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun often relates to faith, fidelity, or trust. In this context
    of oath and sign, 'pledge of faithfulness' best captures the relational and covenant-like
    sense without importing a more explicit term not present in the witness.
- source_word: እስከ ለዓለም መጠነ መዋዕለ ሰማይ ዲበ ምድር
  chosen: forever, for as long as the days of heaven are upon the earth
  alternatives:
  - for eternity, while the days of heaven last over the earth
  - forever, as long as heaven's days are on the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the poetic apocalyptic duration formula rather than reducing
    it to a simple 'forever.'
- source_word: ዝ በትእዛዝየ ውእቱ
  chosen: and this is by my command
  alternatives:
  - and this is according to my ordinance
  - and this is my decree
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase closes with divine authorization. 'By my command' is concise
    and strong, though 'ordinance' is possible.
