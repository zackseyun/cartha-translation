translation:
  text: And all the others with them took wives for themselves, and each chose for
    himself one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'took women for themselves.' The Ge'ez noun can denote women generally,
      but in this construction it commonly carries the sense 'wives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ባዕዳን
  chosen: the others
  alternatives:
  - the rest
  - the remainder
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context this refers to the remaining members of the group previously
    introduced, not 'strangers' in a generic sense. 'The others' is the most natural
    English rendering while preserving the collective reference.
- source_word: ኵሉ
  chosen: all
  alternatives:
  - every
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is distributive and comprehensive here, emphasizing that the
    whole remainder of the group acted likewise.
- source_word: ምስሌሆሙ
  chosen: with them
  alternatives:
  - along with them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered straightforwardly as accompaniment/association, linking the
    others to the leaders already mentioned.
- source_word: ነሥኡ ሎሙ አንስተ
  chosen: took wives for themselves
  alternatives:
  - took women for themselves
  - took wives
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom means taking women as wives. 'Wives' fits the marital/union
    context better than the more ambiguous 'women,' while 'for themselves' preserves
    the reflexive force of ሎሙ.
- source_word: ኃረዩ
  chosen: chose
  alternatives:
  - selected
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A simple verb of choosing; 'chose' preserves the deliberate individual
    action.
- source_word: ለለ ርእሱ አሐተ
  chosen: each chose for himself one
  alternatives:
  - each one chose one for himself
  - each selected one apiece
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The phrase is distributive and reflexive: each member individually chose
    a single woman. The English keeps both the individual emphasis and the numeral
    ''one''.'
