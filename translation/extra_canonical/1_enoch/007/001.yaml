theological_decisions:
- issue: Whether to render አንስተ as 'women' or 'wives'
  chosen_reading: wives
  alternative_readings:
  - women
  rationale: Although the broader narrative concerns illicit unions, the wording here
    describes the act as taking them in a wife-like sense rather than merely seizing
    females. 'Wives' preserves the social form claimed by the actors without legitimizing
    the act.
  doctrine_reference: Preserve local passage meaning without harmonizing or flattening
    apocalyptic narrative.
