lexical_decisions:
- source_word: ወይወፅእ
  chosen: and ... goes out / comes out
  alternatives:
  - and ... goes forth
  - and ... emerges
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes exiting or coming forth. I preserve the repeated motion language with 'goes out' first and 'comes out' later for readable English while keeping the astronomical movement concrete.
- source_word: ፀሐይ
  chosen: the sun
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward astronomical referent; no reason to generalize or personify beyond the text.
- source_word: እምይእቲ ኆኅት
  chosen: from that window
  alternatives:
  - from this window
  - from that gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative points to a previously identified opening. 'Window' is chosen because the Ge'ez term here commonly denotes an opening; 'gate' is possible in the Astronomical Book's cosmological architecture, so it is noted as an alternative.
- source_word: ያዓርብ በምዕራብ
  chosen: sets in the west
  alternatives:
  - enters in the west
  - goes down in the west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of the sun's course, 'sets' is the natural English equivalent and preserves the astronomical sense without over-literal awkwardness.
- source_word: ወይገብእ በጽባሕ
  chosen: and returns in the morning
  alternatives:
  - and enters in the morning
  - and comes back at dawn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can mean enter or return. Because the sequence describes the sun's cyclical course after setting, 'returns' best conveys the repeated circuit; 'in the morning' keeps the temporal phrase simple and natural.
- source_word: በሣልስት ኆኅት
  chosen: from the third window / at the third window
  alternatives:
  - from the third gate
  - at the third gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The phrase occurs twice, first with emergence and then with setting. I render the preposition according to the immediate verb: ''from'' with coming out, ''at'' with setting. ''Window'' is retained for consistency with the earlier occurrence, though ''gate'' remains a viable cosmological alternative.'
- source_word: ሠላሳ ጸባሐ
  chosen: for thirty mornings
  alternatives:
  - for thirty days
  - for thirty dawns
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text literally speaks of 'thirty mornings.' I preserve that wording rather than smoothing to 'days,' since the Astronomical Book often counts by dawns/mornings in relation to solar movement.
