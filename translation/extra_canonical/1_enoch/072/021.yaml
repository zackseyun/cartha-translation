  from: And the sun goes out from that window, and sets in the west, and returns in the morning, and comes out from the third window for thirty mornings, and sets in the west at the third window.
  to: And the sun goes out from that gate, and sets in the west, and returns to the east, and comes out from the third gate for thirty mornings, and sets in the west at the third gate.
  rationale: 'Two lexical corrections: 1) ኆኅት (ḫoḫət) means ''door'' or ''gate'', not ''window'' (which is መስኮት, maskot). The Astronomical Book explicitly distinguishes between the sun''s massive gates and the smaller windows beside them (e.g., 1 En 72:3, 7). Translating it as ''window'' breaks the author''s specific cosmological architecture and creates an inconsistency with the surrounding verses. 2) ጽባሕ (ṣəbaḥ) means ''morning'' but is also the standard Ge''ez term for ''east'' (the place of morning). Paired spatially wi | Adjudicator: The reviewer''s rationale is entirely correct. In Ge''ez, ኆኅት (ḫoḫət) means ''gate'' or ''door'', whereas ''window'' is a distinct architectural feature (መስኮት, maskot) in the Astronomical Book''s cosmology. Fu'
