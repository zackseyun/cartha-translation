theological_decisions:
- issue: Cosmological term for ኆኅት in the Astronomical Book
  chosen_reading: window
  alternative_readings:
  - gate
  rationale: The passage imagines fixed openings through which the sun emerges and sets. 'Window' follows the plain Ge'ez sense of an opening, while a footnote preserves 'gate' because the broader cosmological imagery can support that rendering.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic architecture into generic prose.
