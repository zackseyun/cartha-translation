translation:
  text: And chariots drive on the winds, and the sun goes down from the sky and returns
    through the north, in order to reach the east; and it is led so that it may enter
    the openings and shine across the face of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'the winds' is difficult and may more literally suggest
      'the wind of ascent' or 'the rising wind.'
    reason: lexical_alternative
  - marker: b
    text: '''From the sky'' could also be rendered ''from heaven''; the Ge''ez term
      can cover both senses.'
    reason: lexical_alternative
  - marker: c
    text: The word translated 'openings' may also be rendered 'gates' or 'portals,'
      a common image in this book for celestial entryways.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሰረገላት
  chosen: chariots
  alternatives:
  - wagons
  - carriages
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural noun denotes chariots/vehicles. In this astronomical-apocalyptic
    context, 'chariots' preserves the cosmic imagery and avoids flattening the image
    into generic motion.
- source_word: በኀበ
  chosen: 'on'
  alternatives:
  - by
  - toward
  - with
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can mark relation or movement with respect to something.
    Here 'on the winds' best fits the image of chariots borne or driven by winds.
- source_word: የዓርግ ነፋስ
  chosen: the winds
  alternatives:
  - the wind of ascent
  - the rising wind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult. Because the immediate context concerns celestial
    movement, a broader rendering 'the winds' is preferable in the main text, while
    preserving the more literal possibility in a footnote.
- source_word: ይነፍኅ
  chosen: drive on
  alternatives:
  - blow
  - are driven
  - move
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the root 'to blow.' With chariots as subject, a simple 'blow' is
    awkward in English; 'drive on' captures wind-propelled motion without losing the
    underlying imagery.
- source_word: የዓርብ ፀሐይ
  chosen: the sun goes down
  alternatives:
  - the sun sets
  - the sun descends
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal idea is descent/westering. 'Goes down' is idiomatic modern
    English and still concrete enough for the astronomical description.
- source_word: እምሰማይ
  chosen: from the sky
  alternatives:
  - from heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this astronomical section, 'sky' better communicates the visible celestial
    expanse, while a footnote can note 'heaven' as a lexical alternative.
- source_word: ወይገብእ
  chosen: returns
  alternatives:
  - enters
  - comes in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb often means 'enter,' but in sequence with the sun's course it
    likely carries the sense of coming back into its route. 'Returns' makes the motion
    intelligible in English while the more literal 'enters' is noted as an alternative.
- source_word: እንተ መስዕ
  chosen: through the north
  alternatives:
  - to the north
  - at the north
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to indicate the northern region/side in the sun's
    circuit. 'Through the north' best fits the described path of travel.
- source_word: ከመ ይሑር ምሥራቀ
  chosen: in order to reach the east
  alternatives:
  - so that it may go to the east
  - to proceed to the east
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause expresses purpose. 'Reach the east' is concise and natural
    while preserving directional movement.
- source_word: ወይትመራኅ
  chosen: it is led
  alternatives:
  - it is guided
  - it is directed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/causative sense suggests the sun's course is ordered rather
    than autonomous. 'Is led' preserves that theological-cosmic nuance.
- source_word: ኆኅተ
  chosen: the openings
  alternatives:
  - the gates
  - the portals
  - the windows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes apertures/openings. In the Astronomical Book, celestial
    portals are a recurring image; 'openings' is transparent and avoids over-specifying
    if the exact architectural nuance is uncertain.
- source_word: ያበርህ በገጸ ሰማይ
  chosen: shine across the face of heaven
  alternatives:
  - shine upon the face of the sky
  - give light over the face of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom 'face of heaven/sky' is preserved because it is a significant
    biblical-apocalyptic image. 'Across' gives natural English sense for the sun's
    illumination.
