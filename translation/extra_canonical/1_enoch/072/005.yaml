theological_decisions:
- issue: Whether to render ሰማይ as 'sky' or 'heaven' in an astronomical context
  chosen_reading: Use 'sky' in the descent clause, but retain 'heaven' in the final
    idiom 'face of heaven.'
  alternative_readings:
  - Use 'heaven' throughout
  - Use 'sky' throughout
  rationale: The verse is observational and cosmological, so 'sky' is often clearer
    in English; however, the fixed idiom 'face of heaven' carries apocalyptic resonance
    and should be preserved.
  doctrine_reference: 'Translation philosophy: readable modern English without flattening
    theological weight; preserve imagery where significant.'
