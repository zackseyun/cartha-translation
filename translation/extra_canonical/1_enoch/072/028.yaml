  from: And on that day the night decreases from nine parts by one part, and the night becomes eleven parts, and the day seven parts.
  to: And on that day the night decreases from its length by a ninth part—which is one part—and the night becomes eleven parts, and the day seven parts.
  rationale: 'The draft mistranslates `እምኑኃ` as ''from nine'' instead of ''from its length'' (`ኑኅ` = length + 3fs suffix). It also scrambles the phrase `†ታስዕተ† እደ፡ [ዝውእቱ፡ ክፍለ፡ አሐደ፡]`, which literally means ''by a ninth part [which is one part]''. The author is stating that the night decreases from its length by a ninth part (glossed in the text as one part). | Adjudicator: The reviewer is correct. The Ge''ez word `እምኑኃ` (em-nuha) means ''from its length'' (`እም` = from, `ኑኅ` = length, `አ` = its [3fs referring to night]), not ''from nine''. The phrase `ታስዕተ እደ` means ''a ninth '
