translation:
  text: And on that day the night decreases from its length by a ninth part—which is one part—and the night becomes eleven parts, and the day seven parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic text is textually difficult here, with OCR uncertainty around the numeral phrase after 'from nine.' The sense is that the night is reduced by one part, yielding a night of eleven parts and a day of seven parts.
    reason: textual_variant
  - marker: b
    text: Or 'And on that day the night decreases from nine parts by one part, and the night becomes eleven parts, and the day seven parts.'.
    reason: previous_rendering
