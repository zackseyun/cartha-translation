lexical_decisions:
- source_word: ይገብእ
  chosen: enters
  alternatives:
  - comes in
  - goes in
  lexicon: Dillmann
  rationale: The verb denotes entering. In the luminary schema, retaining the concrete
    motion language fits the astronomical-gate imagery better than a looser paraphrase.
- source_word: ጽባሐ
  chosen: at dawn
  alternatives:
  - in the morning
  - by morning
  lexicon: Dillmann
  rationale: The term refers to morning/dawn. 'At dawn' preserves the temporal force
    concisely and suits the repeated astronomical notices.
- source_word: ይወፅእ
  chosen: goes out
  alternatives:
  - comes out
  - emerges
  lexicon: Dillmann
  rationale: A straightforward rendering of the motion verb. 'Goes out' keeps the
    repetitive technical style of the passage.
- source_word: ውስተ ሳድስት
  chosen: through the sixth
  alternatives:
  - into the sixth
  - in the sixth
  lexicon: Dillmann
  rationale: The preposition plus ordinal likely refers elliptically to the sixth
    gate/window in the sequence. 'Through the sixth' preserves the construction without
    overfilling the ellipsis in the main text.
- source_word: የዓርብ
  chosen: it sets
  alternatives:
  - it descends
  - it enters in the evening
  lexicon: Dillmann
  rationale: In this astronomical context the verb most naturally refers to the sun's
    evening setting rather than a generic descent.
- source_word: ኆኅት
  chosen: gate
  alternatives:
  - window
  - portal
  lexicon: Dillmann
  rationale: The Astronomical Book regularly depicts heavenly openings as gates. Although
    'window' is possible in some contexts, 'gate' better preserves the established
    cosmic architecture.
- source_word: ሠላሳ ወ፪ ጽባሕ
  chosen: thirty-two mornings
  alternatives:
  - thirty-two days
  - for thirty-two mornings
  lexicon: Dillmann
  rationale: The text explicitly says 'mornings.' Because the Astronomical Book often
    counts by days via repeated mornings, the literal term is retained rather than
    normalized to 'days.'
- source_word: በእንተ ትእምርተ ዚአሃ
  chosen: according to the sign of it
  alternatives:
  - according to its sign
  - in accordance with its fixed sign
  lexicon: Dillmann
  rationale: The phrase points to the ordered marker or sign attached to this course.
    The somewhat literal rendering preserves the technical, schematic tone of the
    passage.
