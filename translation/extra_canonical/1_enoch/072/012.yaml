translation:
  text: And at that time the day grows longer by two parts, and the day becomes eleven
    parts, and the night grows shorter and becomes seven parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic text marks the word for 'two' as uncertain in this witness.
      The sense required by the verse is that the day is reduced by two parts, yielding
      eleven parts for the day and seven for the night.
    reason: textual_variant
  - marker: b
    text: Or 'the day diminishes by two parts, and becomes eleven parts'.
    reason: previous_rendering
