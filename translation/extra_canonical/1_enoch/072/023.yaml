translation:
  text: And the sun goes out from that third gate, and sets in the third gate in the
    west, and returns to the east, and comes out from the second gate in the east
    for thirty mornings; and in this way it sets in the second gate in the west of
    heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'thirty mornings.' This likely marks a thirty-day interval in
      the sun's course, but the main text keeps the source wording.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይወፅእ
  chosen: goes out / comes out
  alternatives:
  - goes forth
  - emerges
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes exiting or coming forth. In this astronomical context,
    'goes out' preserves the repeated technical movement of the sun through heavenly
    gates; 'comes out' is retained later in the verse for natural English while reflecting
    the same motion.
- source_word: ፀሐይ
  chosen: the sun
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward astronomical referent; no reason to generalize or personify
    beyond the text.
- source_word: ሣልስት ኆኅት
  chosen: third gate
  alternatives:
  - third portal
  - third opening
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Astronomical Book repeatedly describes heavenly openings as gates.
    'Gate' preserves the concrete cosmological imagery better than the more abstract
    'opening'.
- source_word: ያዓርብ
  chosen: sets
  alternatives:
  - enters at evening
  - goes down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though related to evening/west, in context of the sun's daily course
    'sets' is the most natural and precise English equivalent.
- source_word: በዐረብ
  chosen: in the west
  alternatives:
  - at evening
  - in the evening
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here the phrase follows the gate of setting and functions spatially,
    matching the paired east/west cosmology of the verse. 'In the west' best fits
    the astronomical description.
- source_word: ይገብእ
  chosen: returns
  alternatives:
  - enters
  - goes back
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can mean enter, but the sequence describes the sun's cyclical
    movement back to the east after setting. 'Returns' makes the motion intelligible
    without losing the cyclical sense.
- source_word: ውስተ ምሥራቅ
  chosen: to the east
  alternatives:
  - into the east
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Idiomatic English for directional movement while preserving the cosmological
    orientation.
- source_word: ካልእ ኆኅት
  chosen: second gate
  alternatives:
  - another gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this numbered sequence of solar gates, 'second gate' is required by
    context; 'another gate' would obscure the ordered astronomical scheme.
- source_word: ሠላሳ ጸባሐ
  chosen: for thirty mornings
  alternatives:
  - for thirty days
  - thirty mornings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text literally says 'thirty mornings.' Because the Astronomical Book
    tracks solar movement by counted days/mornings, the more literal phrase is preserved
    rather than smoothing to 'days'.
- source_word: በምዕራበ ሰማይ
  chosen: in the west of heaven
  alternatives:
  - in the western part of heaven
  - in the west of the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the elevated cosmological register. 'Heaven' better matches
    the apocalyptic celestial framework than the flatter 'sky'.
