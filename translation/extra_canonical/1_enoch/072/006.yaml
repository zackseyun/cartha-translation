lexical_decisions:
- source_word: ከመዝ
  chosen: Thus
  alternatives:
  - In this way
  - So
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the manner or sequence of the sun's movement; 'Thus' preserves
    the formal connective without sounding overly stiff.
- source_word: ይወፅእ
  chosen: it comes out
  alternatives:
  - it goes out
  - it emerges
  - it rises
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means 'goes/comes out.' In the astronomical context it refers
    to the sun's emergence through a gate. 'Comes out' preserves the concrete imagery
    better than the more interpretive 'rises.'
- source_word: በወርኅ ቀዳማዊ
  chosen: in the first month
  alternatives:
  - during the first month
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward temporal phrase; 'in the first month' is idiomatic
    and sufficiently formal.
- source_word: በኆኅት ዓቢይ
  chosen: through the great gate
  alternatives:
  - in the great gate
  - by the great portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes a gate/opening/portal. Because the verb is 'comes out,'
    English naturally supplies 'through' to express passage via the opening. 'Gate'
    keeps the repeated luminary imagery consistent.
- source_word: እንተ ይእቲ ራብዕት
  chosen: which is the fourth
  alternatives:
  - that is the fourth one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative clause identifies the specific gate among a numbered series.
    'Which is the fourth' is concise and preserves the classificatory tone.
- source_word: ኃዋኅወ ፮
  chosen: those six gates
  alternatives:
  - the six gates
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bracketed phrase appears explanatory, identifying the larger set
    of eastern gates. 'Those six gates' reflects the demonstrative force implied by
    the construction and keeps the referent visible.
- source_word: እለ መንገለ ምሥራቀ ፀሐይ
  chosen: that are toward the east of the sun
  alternatives:
  - that are in the east
  - that face the sunrise
  - that are on the eastern side of the sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase locates the gates in relation to the sun's eastern course.
    A more literal rendering is preferable here because the cosmological geography
    is part of the passage's imagery.
