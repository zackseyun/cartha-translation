translation:
  text: On that day the night decreases and becomes nine parts, and the day becomes
    nine parts, and the night equals the day, and the year becomes exact.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The repeated 'nine parts' reflects the book's schematic division of day
      and night into numbered portions in its astronomical system.
    reason: cultural_note
  - marker: b
    text: The final clause may also be rendered 'the year is made precise' or 'the
      year becomes complete,' depending on how one construes the Ge'ez term for exactness/completion.
    reason: lexical_alternative
lexical_decisions:
- source_word: በይእቲ ዕለት
  chosen: On that day
  alternatives:
  - In that day
  - At that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal demonstrative phrase introducing a specific point in the solar
    cycle; 'On that day' is idiomatic and preserves the deictic force.
- source_word: ትኃፅፅ ሌሊት
  chosen: the night decreases
  alternatives:
  - the night is diminished
  - the night grows short
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys reduction or diminution. 'Decreases' keeps the astronomical,
    measured sense without paraphrasing.
- source_word: ትስዓተ ክፍለ
  chosen: nine parts
  alternatives:
  - nine portions
  - nine divisions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book, day and night are regularly measured in numbered
    parts. 'Parts' is the clearest concise rendering.
- source_word: ይትዓረይ ሌሊት ምስለ ማዓልት
  chosen: the night equals the day
  alternatives:
  - the night is made equal with the day
  - the night becomes equal to the day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction expresses equivalence between night and day at this
    point in the cycle. 'Equals' is concise and preserves the balancing imagery.
- source_word: ዓመት ጥንቅቀ
  chosen: the year becomes exact
  alternatives:
  - the year is completed exactly
  - the year is precise
  - the year is made complete
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective/noun conveys exactness, correctness, or precision. In this
    calendrical context, 'becomes exact' best preserves the idea that the year is
    brought into proper measure.
