translation:
  text: And on that day the sun goes out from that gate and sets in the west, and
    returns to the east and rises through the third gate for thirty-one mornings,
    and sets in the west of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording after 'sets in the west' includes a verb that can mean
      'enters' or 'returns.' Here it is rendered 'returns' because the sequence describes
      the sun's cyclical movement back to the east for its next rising.
    reason: lexical_alternative
  - marker: b
    text: Literally 'thirty-one mornings.' The text counts the period by successive
      dawns.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይወፅእ
  chosen: goes out
  alternatives:
  - comes forth
  - goes forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion verb for emergence from the gate; 'goes out'
    preserves the concrete astronomical imagery without sounding archaic.
- source_word: ኆኅት
  chosen: gate
  alternatives:
  - portal
  - window
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book these are the fixed openings of the heavens
    through which luminaries move. 'Gate' preserves the architectural-cosmic imagery
    better than the flatter 'window'.
- source_word: የዓርብ
  chosen: sets
  alternatives:
  - enters
  - goes down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of the sun's daily movement, the idiomatic astronomical sense
    is sunset. This keeps the repeated luminary pattern clear in English.
- source_word: ይገብእ
  chosen: returns
  alternatives:
  - enters
  - comes back
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the verb can mean 'enter,' the sequence after setting implies
    a cyclical return to the east for the next rising. 'Returns' makes the movement
    intelligible while staying close to the sense.
- source_word: በምስራቅ
  chosen: to the east
  alternatives:
  - in the east
  - eastward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition with the directional noun is best taken as motion toward
    the eastern point after sunset.
- source_word: ይሠርቅ
  chosen: rises
  alternatives:
  - dawns
  - shines forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In luminary contexts this verb denotes the sun's rising. 'Rises' is the
    natural English equivalent and preserves the astronomical register.
- source_word: በሣልስት ኆኅት
  chosen: through the third gate
  alternatives:
  - in the third gate
  - by the third gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the gate used for sunrise in this segment of the solar
    circuit. 'Through' expresses passage via that heavenly opening.
- source_word: ሠላሳ ወአሐደ ጸባሐ
  chosen: for thirty-one mornings
  alternatives:
  - thirty-one days
  - for thirty-one dawns
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text literally counts 'mornings,' a recurring way of marking days
    by successive dawns in this section. Retaining 'mornings' preserves the source
    texture and the observational framework.
- source_word: ምዕራብ ሰማይ
  chosen: the west of heaven
  alternatives:
  - the western part of heaven
  - the west sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the cosmological phrasing concrete and elevated, matching
    the book's depiction of the heavens as structured space.
