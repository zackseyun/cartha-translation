translation:
  text: On that day the day becomes equal with the night, [and it becomes even], and the night becomes nine parts, and the day also nine parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'and it becomes even' is bracketed in the source witness and may reflect a textual addition or uncertain reading; it is retained transparently rather than omitted.
    reason: textual_variant
  - marker: b
    text: The 'parts' are schematic divisions used in the Astronomical Book's calendrical descriptions, not modern clock-hours.
    reason: cultural_note
  - marker: c
    text: Or 'amounts to nine parts, and the day also to nine parts'.
    reason: previous_rendering
lexical_decisions:
- source_word: በይእቲ ዕለት
  chosen: On that day
  alternatives:
  - In that day
  - At that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal demonstrative phrase; 'On that day' is idiomatic English and preserves the observational, calendrical setting.
- source_word: ይትዓረይ
  chosen: becomes equal
  alternatives:
  - is made equal
  - is balanced
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates becoming equal or being brought into equivalence. 'Becomes equal' preserves the astronomical sense without over-paraphrasing.
- source_word: መዓልት ምስለ ሌሊት
  chosen: the day with the night
  alternatives:
  - day with night
  - the daytime with the night
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct comparative construction. In English it is smoothed to 'the day becomes equal with the night' while retaining the paired cosmic terms.
- source_word: '[ወይከውን ዕሩየ]'
  chosen: '[and it becomes even]'
  alternatives:
  - '[and it becomes equal]'
  - '[and it is level]'
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Bracketed in the source witness, so treated as textually uncertain. The adjective/participle conveys evenness or equality; rendered in brackets and footnoted rather than silently omitted.
- source_word: ተስዓተ ክፍለ
  chosen: nine parts
  alternatives:
  - nine portions
  - nine divisions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Technical calendrical division language in the Astronomical Book. 'Parts' is concise and preserves the schematic measurement system.
- source_word: ወትከውን ሌሊት ... ወመዓልትኒ
  chosen: and the night amounts to ... and the day also to
  alternatives:
  - and the night becomes ... and the day likewise
  - and the night is ... and the day too
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated verb plus enclitic -ni marks corresponding measured states. 'Amounts to' fits numerical partition language in English better than a bare 'becomes'.
