  rationale: 'The verb ትከውን (tekawwen) is the standard formulaic verb used throughout this chapter (e.g., vv. 16, 18, 22, 24) to describe the shifting proportions of the luminaries. Translating it as ''amounts to'' here breaks the technical consistency of the Astronomical Book. ''Becomes'' restores the author''s deliberate pattern. | Adjudicator: The reviewer is correct that the Ge''ez verb ትከውን (tekawwen, from ኮነ, ''to be/become'') is used formulaically throughout the Astronomical Book to describe the changing proportions of day and night. Trans'
