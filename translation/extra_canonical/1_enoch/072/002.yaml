translation:
  text: 'And this is the first law of the luminaries: the sun, a light, has its rising in the portals of heaven on the east, and its setting in the western portals of heaven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ordinance' or 'rule' of the luminaries. The term denotes the fixed ordering that governs the heavenly bodies.
    reason: lexical_alternative
  - marker: b
    text: Literally 'through the portals of heaven of the way of dawn ... through the portals of heaven of the west.' The English makes the directional sense explicit.
    reason: lexical_alternative
  - marker: c
    text: Or 'enters through the portals of heaven on the east, and it goes out through the western portals of heaven.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ትእዛዝ
  chosen: law
  alternatives:
  - ordinance
  - command
  - rule
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term introduces ordered cosmic regulation rather than a one-time command. 'Law' preserves the sense of fixed ordinance governing the luminaries.
- source_word: ቀዳማዊ
  chosen: first
  alternatives:
  - former
  - primary
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks the initial item in a sequence of astronomical ordinances; 'first' is the most natural enumerative rendering.
- source_word: ብርሃናት
  chosen: luminaries
  alternatives:
  - lights
  - heavenly lights
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is celestial bodies governed by cosmic order. 'Luminaries' keeps the elevated astronomical register better than the flatter 'lights'.
- source_word: ፀሐይ
  chosen: the sun
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward identification of the heavenly body under discussion.
- source_word: ብርሃን
  chosen: a light
  alternatives:
  - light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Appositional to 'the sun.' Rendering it explicitly as 'a light' preserves the nominal force without overexplaining.
- source_word: መባእ
  chosen: enters
  alternatives:
  - comes in
  - goes in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best fits the image of the sun passing through heavenly gates or portals.
- source_word: ኃዋኅወ
  chosen: portals
  alternatives:
  - gates
  - windows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this chapter the heavenly openings are structured passageways for celestial bodies. 'Portals' preserves the apocalyptic-cosmic imagery and avoids the overly mundane 'windows'.
- source_word: መንገለ ጽባሕ
  chosen: on the east
  alternatives:
  - by way of the east
  - toward the dawn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally related to the direction of morning/dawn. 'On the east' gives clear directional sense in idiomatic English while retaining the cosmological orientation.
- source_word: ወምዕራቢሁ
  chosen: and it goes out
  alternatives:
  - and its setting
  - and its westward exit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause points to the sun's departure at the western side. Because the Ethiopic wording is compressed, 'it goes out' makes the implied verbal sense explicit in English.
- source_word: ዘምዕራብ
  chosen: western
  alternatives:
  - of the west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adjectival rendering is smoother in English while preserving the directional contrast with the eastern portals.
