- issue: Nature of cosmic order language
  chosen_reading: Rendered ትእዛዝ as 'law' rather than 'command'
  alternative_readings:
  - ordinance
  - command
  rationale: The verse describes the fixed structure of creation in the Astronomical Book, not a moral imperative addressed to humans. 'Law' best preserves the text's portrayal of the heavens as governed by established order.
  doctrine_reference: Preserve local passage sense and apocalyptic imagery; do not flatten into generic prose.
