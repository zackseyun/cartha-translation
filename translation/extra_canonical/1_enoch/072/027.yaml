- source_word: የዓርብ
  chosen: it goes down
  alternatives:
  - it sets
  - it descends
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb refers to the sun's descent/setting. 'Goes down' is vivid and natural, while avoiding over-interpretation if the exact technical nuance is uncertain.
