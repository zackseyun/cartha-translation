translation:
  text: And the sun completed its chief course, and again it goes along that chief
    course; and it enters through that gate for thirty mornings, and in the west it
    goes down by its own guidance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its principal path.' The Ge'ez term literally relates to 'head' or 'chief'
      and here likely denotes the sun's appointed main course.
    reason: lexical_alternative
  - marker: b
    text: Literally 'thirty mornings'; this likely marks a thirty-day span of appearances
      through the same gate.
    reason: lexical_alternative
  - marker: c
    text: The phrase rendered 'by its own guidance' is difficult and may also mean
      'according to its order' or 'by its appointed reckoning.'
    reason: textual_variant
lexical_decisions:
- source_word: ፈጸመ
  chosen: completed
  alternatives:
  - finished
  - fulfilled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb marks the bringing of a course or period to its end. 'Completed'
    fits the astronomical sequence without implying theological fulfillment.
- source_word: ጸሐይ
  chosen: sun
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward astronomical referent in the Luminaries context.
- source_word: አርእስቲሁ
  chosen: its chief course
  alternatives:
  - its head
  - its beginning
  - its principal path
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally related to 'head' or 'chief,' but in this context of repeated
    solar movements it most naturally denotes the principal or designated course/path.
    'Chief course' preserves the concrete imagery while remaining readable.
- source_word: ዳግመ
  chosen: again
  alternatives:
  - a second time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Signals repetition in the cyclical astronomical description.
- source_word: የሐውር
  chosen: it goes along
  alternatives:
  - it travels
  - it proceeds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A motion verb suited to the sun's ongoing movement through its appointed
    route.
- source_word: ዲበ ዝኩ አርእስቲሁ
  chosen: that chief course
  alternatives:
  - that same principal path
  - its chief path there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative plus repeated noun points back to the previously mentioned
    route; 'that chief course' keeps the repetition visible.
- source_word: ይበውእ
  chosen: it enters
  alternatives:
  - it comes in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for entry into one of the heavenly gates.
- source_word: ኆኅት
  chosen: gate
  alternatives:
  - portal
  - window
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Astronomical Book regularly imagines heavenly openings as gates;
    'gate' preserves the cosmological imagery better than 'window'.
- source_word: ሠላሳ ጸባሐ
  chosen: for thirty mornings
  alternatives:
  - for thirty days
  - for thirty dawns
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጸባሐ is literally 'morning' or 'dawn.' In this astronomical context it
    likely counts daily appearances, but 'mornings' preserves the source image more
    closely than smoothing to 'days'.
- source_word: በምዕራብኒ
  chosen: in the west
  alternatives:
  - toward the west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locative phrase marking the setting direction.
- source_word: በምንዳቤሁ
  chosen: by its own guidance
  alternatives:
  - according to its reckoning
  - by its own order
  - by its own measure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is difficult and may denote arrangement, regulation, or appointed
    order. 'By its own guidance' conveys ordered movement without overclaiming a technical
    sense.
- source_word: የዓርብ
  chosen: it goes down
  alternatives:
  - it sets
  - it descends
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb refers to the sun's descent/setting. 'Goes down' is vivid and
    natural, while avoiding over-interpretation if the exact technical nuance is uncertain.
