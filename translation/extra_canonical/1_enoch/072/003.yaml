translation:
  text: And I saw six portals from which the sun rises, and six portals in which the sun sets, and the moon rises and sets in those portals. And the leaders of the stars, together with those whom they lead, are six in the east and six in the west; and all of them, one after another, in exact order, with many windows to the right and to the left of those portals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez uses one term for the six main cosmic openings ('portals') and later a different difficult phrase that may refer to subsidiary openings or windows beside them.
    reason: lexical_alternative
  - marker: b
    text: The final clause is textually difficult. The sense appears to be that the portals are arranged in proper sequence, with many side-openings on both the right and the left.
    reason: textual_variant
  - marker: c
    text: Or 'and six portals in which the sun and the moon set; and in those portals they rise and set.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - And I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the visionary first-person report explicit while using readable modern English rather than archaic diction.
- source_word: ስሱ
  chosen: six
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward numeral; repeated to preserve the structured astronomical scheme.
- source_word: ኃዋኅወ
  chosen: portals
  alternatives:
  - gates
  - windows
  - openings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book this term denotes cosmic openings in the horizon through which luminaries move. 'Portals' preserves apocalyptic-cosmic imagery better than the more architectural 'gates' or the potentially confusing 'windows' here.
- source_word: እለ ኀበ ይወፅእ ፀሐይ
  chosen: from which the sun rises
  alternatives:
  - where the sun comes out
  - through which the sun goes forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Uses natural English while preserving the directional sense of emergence from the portals.
- source_word: እለ ኀበ የዓርብ ፀሐይ ወወርኅ
  chosen: in which the sun and the moon set
  alternatives:
  - where the sun and moon go down
  - through which the sun and moon enter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb refers to setting/going down. 'Set' is the clearest idiomatic rendering for luminaries.
- source_word: በውእቶን ኃዋኅወ ይሠርቅ ወየዓርብ
  chosen: in those portals they rise and set
  alternatives:
  - through those portals they come forth and go down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired motion is repeated in summary form; preserving both verbs keeps the cyclical movement vivid.
- source_word: መራኄሆሙ ለከዋክብት
  chosen: the leaders of the stars
  alternatives:
  - their guides of the stars
  - the star-guides
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun conveys guiding or leading figures associated with the stars. 'Leaders' is clear and preserves the ordered cosmology without over-interpreting them as angels in the main text.
- source_word: ምስለ እለ ይመርኅዎሙ
  chosen: together with those whom they lead
  alternatives:
  - with those they guide
  - along with the ones led by them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the relational structure between leaders and the bodies or beings under their direction.
- source_word: ፮በጽባሕ ወ፮በምዕራብ
  chosen: six in the east and six in the west
  alternatives:
  - six at the sunrise and six at the west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Uses standard directional English for the cosmic geography.
- source_word: ኵሎሙ ፩፩እምድኅረ ካልኡ
  chosen: all of them, one after another
  alternatives:
  - all of them one following another
  - all of them each after the other
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys ordered succession in smooth English while preserving the repetitive sequence.
- source_word: ርቱዕ
  chosen: in exact order
  alternatives:
  - correctly
  - regularly
  - according to rule
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term suggests straightness, correctness, or proper order. In this astronomical context 'in exact order' best captures regulated cosmic arrangement.
- source_word: መላክወ ብዙኃት
  chosen: many windows
  alternatives:
  - many openings
  - many apertures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is textually difficult, but in context it appears to describe numerous side-openings associated with the portals. 'Windows' is retained here with a footnote because the same verse already uses a different term for the main portals.
- source_word: እምየማኑ ወእምፀጋሙ ለዝኩ ኃዋኅወ
  chosen: to the right and to the left of those portals
  alternatives:
  - on the right hand and on the left of these portals
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the spatial detail and the demonstrative reference to the previously mentioned portals.
