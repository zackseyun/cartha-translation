theological_decisions:
- issue: Whether to identify the 'leaders of the stars' explicitly as angels
  chosen_reading: Render neutrally as 'the leaders of the stars' without adding 'angels'
    in the main text.
  alternative_readings:
  - the angelic leaders of the stars
  - the star-guiding angels
  rationale: The verse presents an ordered cosmology and may imply angelic governance,
    but the Ge'ez wording here does not require the explicit noun 'angels' for these
    leaders. Per project philosophy, theological implications should not be resolved
    beyond the source wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
