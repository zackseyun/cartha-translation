translation:
  text: And the sun comes out from that fifth gate, and sets in the fifth gate in the west, and rises in the fourth gate because of its signs for thirty-one mornings, and sets in the west.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'for its signs' is difficult. It likely refers to the sun's observable markers or appointed indications during this thirty-one-morning span.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is terse in Ge''ez: ''and sets in the west.'' Some translators supply ''in that gate,'' but the provided witness does not explicitly repeat ''gate'' here.'
    reason: alternative_reading
  - marker: c
    text: Or 'by the fourth gate'.
    reason: previous_rendering
  - marker: d
    text: Or 'for its signs'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይወፅእ
  chosen: comes out
  alternatives:
  - goes out
  - emerges
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes going forth/emerging. 'Comes out' preserves the concrete astronomical movement without sounding overly wooden.
- source_word: ኆኅት
  chosen: gate
  alternatives:
  - portal
  - window
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book the heavenly openings through which luminaries move are consistently imagined as gates. 'Gate' preserves the apocalyptic-cosmic imagery.
- source_word: የዓርብ / ያዓርብ
  chosen: sets
  alternatives:
  - enters
  - goes down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of the sun's daily course, the sense is sunset rather than a generic entering. 'Sets' is idiomatic and contextually precise.
- source_word: ምዕራብ
  chosen: the west
  alternatives:
  - west
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes the western region/direction. 'The west' reads naturally in English while preserving the directional reference.
- source_word: ይሠርቅ
  chosen: rises
  alternatives:
  - appears at dawn
  - shines forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In astronomical context this verb refers to the sun's rising. 'Rises' is the clearest equivalent.
- source_word: በራብዕት ኆኅት
  chosen: by the fourth gate
  alternatives:
  - through the fourth gate
  - at the fourth gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can be rendered several ways. 'By' keeps the wording slightly formal and avoids over-specifying whether the gate is source or route, since the verse already used a different construction for 'from that fifth gate.'
- source_word: ትእምርታቲሃ
  chosen: its signs
  alternatives:
  - its appointed signs
  - its markers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural refers to the sun's observable indicators/markers in its course. 'Signs' preserves the technical-apocalyptic register without interpretive expansion.
- source_word: ሠላሳ ወአሐዱ ጽባሕ
  chosen: thirty-one mornings
  alternatives:
  - thirty-one days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text explicitly says 'mornings,' not the more generalized 'days.' Retaining 'mornings' preserves the observational framework of the luminary cycle.
