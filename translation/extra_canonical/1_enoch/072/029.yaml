translation:
  text: And the sun returns and enters the second gate, which is in the east; and
    it returns to that principal course for thirty mornings, rising and setting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'upon this one it goes in for thirty mornings' is textually
      awkward in the OCR witness. The sense appears to be that the sun uses this eastern
      gate for a period of thirty mornings before the sequence advances.
    reason: textual_variant
  - marker: b
    text: Literally the opening verb can mean 'enters' or 'comes in'; because the
      subject is the sun and the verse ends with 'rising and setting,' the main text
      uses the idiomatic English 'rises' at the start of the verse.
    reason: lexical_alternative
  - marker: c
    text: Or 'And the sun rises and enters the other gate, the one in the east; and
      upon this one it goes in for thirty mornings'.
    reason: previous_rendering
lexical_decisions:
- source_word: ገብአ
  chosen: rises
  alternatives:
  - enters
  - comes in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this astronomical context with ፀሐይ ('sun') as subject and paired with
    setting language later in the verse, the verb is best rendered idiomatically as
    'rises' at the start of the daily cycle, even though the underlying sense is 'enters/comes
    in'.
- source_word: ቦአ ውስተ
  chosen: enters
  alternatives:
  - goes into
  - comes into
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Here the motion is explicitly into a gate/opening, so the more concrete
    'enters' preserves the luminary-gate imagery.
- source_word: ካልእ ኆኅት
  chosen: the other gate
  alternatives:
  - another gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks transition to a different portal in the sequence of
    eastern gates. 'The other gate' fits the immediate contrastive sense.
- source_word: እንተ በምሥራቅ
  chosen: the one in the east
  alternatives:
  - which is in the east
  - that is toward the east
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative phrase identifies the gate's location. 'The one in the
    east' is natural English while preserving specificity.
- source_word: ይገብእ ዲበ ዝኩ
  chosen: upon this one it goes in
  alternatives:
  - through this one it enters
  - into this one it goes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is somewhat awkward in the OCR witness. I preserve the
    demonstrative reference to the gate and the motion verb without over-smoothing;
    in the main English I render the sense idiomatically as continued passage through
    that gate.
- source_word: አርእስቲሁ ሠላሳ ጸባሐ
  chosen: for thirty mornings
  alternatives:
  - at its head for thirty mornings
  - for thirty dawns
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጸባሐ denotes morning/dawn. The phrase likely marks the duration of the
    sun's course in relation to this gate. 'For thirty mornings' is concise and fits
    the calendrical sequence.
- source_word: ይሠርቅ
  chosen: rising
  alternatives:
  - it rises
  - shining forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This verb is the standard term for the sun's rising in context; the participial
    English keeps the paired rhythm with the following verb.
- source_word: የዓርብ
  chosen: setting
  alternatives:
  - it sets
  - going down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes evening or sunset. 'Setting' preserves the astronomical
    pair 'rising and setting' without importing later idiom beyond the plain sense.
