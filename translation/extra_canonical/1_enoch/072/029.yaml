revisions:
- timestamp: '2026-04-22T19:26:32Z'
  adjudicator: auto_apply_tier2_source_grounded
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/072/029.job-72598.json
  category: mistranslation
  tier: 2
  from: And the sun rises and enters the other gate, the one in the east; and upon
    this one it goes in for thirty mornings
  to: And the sun returns and enters the second gate, which is in the east; and it
    returns upon that chief course for thirty mornings
  rationale: 'Multiple lexical errors: 1) The verb ገብአ (gab''a) means ''to return'',
    not ''to rise'' (which is ሠረቀ). The sun is returning to the east during the night.
    2) ካልእ (kāl''e) in this sequential context means ''second'' (cf. 72:31 ''third
    gate''). 3) The draft completely drops አርእስቲሁ (''ar''estihu, ''its chief course'',
    as correctly rendered in 72:27) and mistranslates ይገብእ (yegabbe'') as ''goes in''
    instead of ''returns''.'
