translation:
  text: On that day the day becomes longer than the night by a ninth part, and the day becomes exactly ten parts, and the night becomes exactly eight parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Ethiopic text includes a difficult bracketed word after ''becomes longer''; the sense of the verse remains clear: the day exceeds the night, and their lengths are then given as ten parts and eight parts.'
    reason: textual_variant
  - marker: b
    text: The 'parts' are the chapter's conventional divisions used to measure the relative lengths of day and night through the year.
    reason: cultural_note
  - marker: c
    text: Or 'by nine parts, and the day amounts to ten parts and the night to eight parts.'.
    reason: previous_rendering
