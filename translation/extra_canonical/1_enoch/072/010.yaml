  from: by nine parts, and the day amounts to ten parts and the night to eight parts.
  to: by a ninth part, and the day becomes exactly ten parts, and the night becomes exactly eight parts.
  rationale: 'The phrase "ታስዕተ፡ እደ፡" (tas''eta ''eda) means "a ninth part" (1/9), not "nine parts". In the 18-part astronomical system, a day of 10 parts and a night of 8 parts means the day is longer by 2 parts, which is exactly 1/9 of the 18-part whole. Translating it as "nine parts" creates a mathematical absurdity. Furthermore, the Ge''ez uses the adverb "ጥንቁቀ" (tenquqa, "exactly/precisely") twice—once for the day and once for the night. The draft weakens the first to "amounts to" and omits the second entire | Adjudicator: The reviewer''s rationale is entirely correct regarding both the Ge''ez lexicon and the mathematical system of the Astronomical Book. The phrase ''ታስዕተ፡ እደ፡'' (tas''eta ''eda) translates to ''a ninth part'' ('
