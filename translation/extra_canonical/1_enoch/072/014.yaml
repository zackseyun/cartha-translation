translation:
  text: On that day the day grows longer than the night, and the day becomes double the night, and the day becomes twelve parts, and the night grows shorter and becomes six parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verse uses the chapter's schematic system of dividing day and night into numbered 'parts.' The clause 'the day becomes nine parts of the night' is rendered closely from the Ge'ez, though the proportional wording is somewhat compressed in English.
    reason: cultural_note
  - marker: b
    text: Or 'and the day becomes nine parts of the night'.
    reason: previous_rendering
