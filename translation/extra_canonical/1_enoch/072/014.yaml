  - nine portions relative to the night
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral-plus-measure expression is awkward in English; 'nine parts of the night' transparently reflects a proportional reckoning in the luminary schema.
- source_word: ክፍለ ፲ወ፪
  chosen: twelve parts
