  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ክፍል/ክፍለ refers to a division or part. In this chapter the day and night are measured in parts, so 'twelve parts' is the clearest rendering.
- source_word: ትኃጽር
  chosen: grows shorter
  alternatives:
  - is shortened
  - becomes short
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Balances 'grows longer' and preserves the observational style of the astronomical discourse.
- source_word: ስድስተ ክፍል
  chosen: six parts
  alternatives:
