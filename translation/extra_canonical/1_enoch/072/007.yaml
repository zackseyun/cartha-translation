lexical_decisions:
- source_word: ኆኅት ራብዕት
  chosen: fourth gate
  alternatives:
  - fourth portal
  - fourth opening
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book, the recurring cosmological image is of heavenly 'gates' through which luminaries emerge. 'Gate' preserves the architectural/apocalyptic imagery better than the more generic 'opening.'
- source_word: ይወፅእ ፀሐይ
  chosen: the sun comes out
  alternatives:
  - the sun goes forth
  - the sun emerges
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to go out/come forth. 'Comes out' is natural English while still preserving the concrete motion of the luminary through the gate.
- source_word: በወርኅ ቀዳማዊ
  chosen: in the first month
  alternatives:
  - during the first month
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward temporal phrase; 'in the first month' is concise and idiomatic.
- source_word: ባቲ ፲፪ መስኮተ
  chosen: there are twelve window-openings
  alternatives:
  - twelve windows
  - twelve apertures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መስኮት denotes a window/opening. Because the verse is describing cosmic vents associated with winds and flame, 'window-openings' keeps the literal image without domesticating it into ordinary house windows.
- source_word: መላክወ ርኅዋተ
  chosen: of the dominion of the wind
  alternatives:
  - of the angels of the winds
  - of the wind's agency
  - of the winds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form is difficult. Given the immediate context of wind-openings in the Astronomical Book, the phrase likely qualifies the openings as belonging to the wind's sphere or administration. I avoid the more specific 'angels of the winds' in the main text because the provided Ge'ez is not fully secure here, but preserve that possibility in a footnote.
- source_word: ላህብ
  chosen: a flame
  alternatives:
  - flame
  - blaze
  - burning heat
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes flame/blaze. 'A flame comes out' preserves the vivid physical imagery of fiery heat issuing from the openings.
- source_word: ሶበ ይትረሐዉ
  chosen: when they are opened
  alternatives:
  - when they are widened
  - when they are let open
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense fits the context of apertures being opened. This keeps the mechanical-cosmic imagery intact.
- source_word: እምዘመነ ዚአሆሙ
  chosen: at their appointed times
  alternatives:
  - in their season
  - from the time belonging to them
  - at their proper time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to fixed, assigned times within the ordered heavenly system. 'Appointed times' reflects that calendrical precision and suits the Astronomical Book's emphasis on cosmic order.
