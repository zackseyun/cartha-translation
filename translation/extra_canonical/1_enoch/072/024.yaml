translation:
  text: And on that day the night becomes eleven parts, and the day seven parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verse measures night and day by numbered 'parts,' a technical feature of the Astronomical Book's schematic calendar rather than ordinary clock-hours.
    reason: cultural_note
  - marker: b
    text: Or 'will be'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወበይእቲ፡ ዕለት
  chosen: And on that day
  alternatives:
  - And in that day
  - And on that same day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal formula introducing a specific point in the luminary cycle. 'On that day' is idiomatic English and preserves the demonstrative force without unnecessary stiffness.
- source_word: ትከውን
  chosen: will be
  alternatives:
  - becomes
  - comes to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future/copular sense fits the astronomical description of what the proportions of night and day amount to at this stage.
- source_word: ሌሊት
  chosen: the night
  alternatives:
  - night
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered with the article in English because the verse contrasts the two measured periods, night and day, as defined components of the calendrical scheme.
- source_word: ዓሠርተ፡ ወአሐደ፡ ክፍለ፡
  chosen: eleven parts
  alternatives:
  - eleven portions
  - eleven divisions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral phrase literally gives 'ten and one' with 'part.' 'Parts' best preserves the technical, schematic division used throughout the Astronomical Book.
- source_word: ወዕለት፡ ሰብዓተ፡ ክፍለ
  chosen: and the day seven parts
  alternatives:
  - and the day seven portions
  - while the day is seven parts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Maintains the parallel structure of the Ge'ez. 'Parts' is kept consistent with the preceding measurement and with the chapter's recurring reckoning of day and night by numbered divisions.
