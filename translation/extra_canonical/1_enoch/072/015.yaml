translation:
  text: And the sun rises so that the day grows shorter and the night lengthens, and the sun returns to the east and enters into the sixth gate, and rises from it and sets for thirty mornings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is textually difficult in the OCR witness. 'For thirty mornings' likely refers to a thirty-day segment of the sun's course while it uses this gate.
    reason: textual_variant
  - marker: b
    text: The repeated language of gates is part of the Astronomical Book's cosmic schema and should be read literally within the vision's world, not reduced to a mere metaphor for seasons.
    reason: cultural_note
