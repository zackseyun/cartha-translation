revisions:
- timestamp: '2026-04-22T19:23:52Z'
  adjudicator: auto_apply_tier2_source_grounded
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/072/015.job-72584.json
  category: mistranslation
  tier: 2
  from: enters in the morning and goes into
  to: returns to the east and enters into
  rationale: The verb ይገብእ (yegabbe', from gab'a) means 'returns', not 'enters' (which is ይበውእ, yebawwe', used immediately after). Furthermore, in the spatial cosmology of the Astronomical Book, በጽባሕ (ba-ṣebaḥ) here means 'to the east' (the place of morning/sunrise), not just 'in the morning'. The sun sets in the west and must return to the east to enter the eastern gates. The draft obscures this spatial movement by rendering it as a temporal entry rather than a spatial return.
