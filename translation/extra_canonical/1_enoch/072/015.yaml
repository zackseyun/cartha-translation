  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes the sun's rising/ascending. 'Rises' is natural English and preserves the astronomical register without paraphrase.
- source_word: ትሕጽር ዕለት
  chosen: the day grows shorter
  alternatives:
  - the day is shortened
  - the day becomes short
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause describes the seasonal shortening of daylight. 'Grows shorter' expresses the inceptive/resultative sense clearly in English.
- source_word: ትኑኅ ሌሊት
  chosen: the night lengthens
  alternatives:
  - the night increases
  - the night becomes longer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired contrast with the shortening day calls for an English expression of increasing duration. 'Lengthens' keeps the balance and avoids over-explanation.
- source_word: ይገብእ
  chosen: enters
  alternatives:
  - comes in
  - goes in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book the luminaries regularly 'enter' and 'go out' through heavenly gates. 'Enters' preserves the technical cosmic imagery.
- source_word: ጽባሕ
  chosen: morning
  alternatives:
  - dawn
  - daybreak
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term commonly denotes morning. Here it fits both the sun's entry time and the repeated count of 'thirty mornings.'
- source_word: ሳድስት ኆኅት
  chosen: the sixth gate
  alternatives:
  - the sixth portal
  - the sixth opening
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Astronomical Book uses a fixed system of heavenly gates for the sun's course. 'Gate' is the standard concrete image and should be preserved.
- source_word: ይሠርቅ እምኔሃ
  chosen: rises from it
  alternatives:
  - comes forth from it
  - appears from it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb here refers to the sun's emerging/rising from the gate. 'Rises from it' keeps the repeated solar-motion language coherent.
- source_word: የዓርብ ሠላሳ ጽባሐ
  chosen: sets for thirty mornings
  alternatives:
  - sets for thirty days
  - goes down for thirty mornings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form is difficult, but the phrase most naturally marks a thirty-morning period in this gate-cycle. 'Sets' matches the solar context, while a footnote preserves the possibility that the counted unit corresponds functionally to days.
