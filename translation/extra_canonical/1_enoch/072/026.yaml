translation:
  text: And on that day the night decreases and becomes nine parts of the day, and
    the night becomes twelve parts and two parts of a division, and the day six parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The numerical wording in this verse is difficult in the Ethiopic witness.
      The text appears to preserve a schematic measurement of day and night in parts,
      but the arithmetic and syntax are awkward; some interpreters would normalize
      the numbers from the surrounding context.
    reason: textual_variant
  - marker: b
    text: The phrase rendered 'of a division' may also mean 'of the measure' or 'of
      the reckoning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: በይእቲ ዕለት
  chosen: on that day
  alternatives:
  - in that day
  - at that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal phrase; 'on that day' preserves the demonstrative force
    and the repetitive astronomical-report style.
- source_word: ትነሡኅ ሌሊት
  chosen: the night decreases
  alternatives:
  - the night diminishes
  - the night is shortened
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates reduction or lessening. 'Decreases' is clear modern
    English and fits the measured calendrical context without paraphrase.
- source_word: ፵ዕበታ ለማዓልት
  chosen: nine parts of the day
  alternatives:
  - nine portions of the day
  - nine parts relative to the day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book, day and night are regularly measured in numbered
    parts. 'Parts' preserves the technical schematic language.
- source_word: ፲ወ፪ተ ወ፪እቲ
  chosen: twelve parts and two parts
  alternatives:
  - twelve and two parts
  - fourteen parts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ethiopic wording is awkward and appears to preserve an additive numerical
    expression. I retain the explicit numbers rather than collapsing them into 'fourteen,'
    because the source presents them separately and the line is textually difficult.
- source_word: ክፍለ ጥንቅቀ
  chosen: of a division
  alternatives:
  - of the reckoning
  - of the measure
  - of the exact measure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ክፍል is 'part/division'; the following term is difficult and may intensify
    the idea of measured precision. 'Of a division' keeps the syntax visible while
    avoiding overconfident interpretation.
- source_word: ማዓልት ስድስተ ክፍለ
  chosen: the day six parts
  alternatives:
  - the day is six parts
  - the day becomes six parts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is terse and likely elliptical in this numerical schema. I
    preserve the compact style, though English requires slight smoothing in the full
    sentence.
