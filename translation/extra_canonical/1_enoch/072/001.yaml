  from: all their writings
  to: their whole book
  rationale: 'Adjudicator-modified: The reviewer is correct that the Ge''ez word መጽሐፎሙ (maṣḥafomu) is singular (''their book'' or ''their writing''), not plural (which would be መጻሕፍቲሆሙ). The phrase ኵሎ መጽሐፎሙ (kʷəlo maṣḥafomu) literally means ''all their book'' or ''their whole book.'' While ''all their writing'' corrects the grammatical number, ''their whole book'' or ''their whole account'' is more natural in English and accurately reflects the singular noun modified by ኵሎ (kʷəlo, ''all/whole'').'
