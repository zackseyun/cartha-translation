  rationale: 'Adjudicator-modified: The reviewer is correct that አውራኂሆሙ (ʾawrəḫihomu) means ''their months'' (plural of ወርኅ, month), not ''their paths.'' The reviewer is also correct to restore the distributive preposition በበ (baba), which the current English dropped. However, translating `baba` as ''in'' creates the awkward English phrase ''in their names'' (which implies authority rather than categorization). The standard and more accurate rendering of `baba` in this cataloging context is ''according to.'''
