translation:
  text: The Book of the courses of the luminaries of heaven—how they are in their companies, in their dominion and in their seasons, according to their names and their origins, and according to their months—which Uriel, the holy angel who was with me (he is their leader), showed me; and their whole book as he showed me, and how the whole year of the world is [ordered] forever—until a new work is accomplished that will abide forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The phrase translated “in their companies” is literally “in their peoples/assemblies,” here applied metaphorically to groupings of celestial bodies (cf. alternatives: hosts, classes).'
    reason: lexical_alternative
  - marker: b
    text: “Origins” renders a word that literally means “births/origins”; in astronomical context it can suggest points of origin or “risings.”
    reason: lexical_alternative
  - marker: c
    text: “[Ordered]” is supplied for English clarity; the Geʿez reads “as the whole year of the world …,” picking up the sense from “he showed me.”
    reason: cultural_note
  - marker: d
    text: “A new work” can also be understood as “a new creation,” i.e., a decisive divine act that endures forever.
    reason: lexical_alternative
  - marker: e
    text: “The year of the world” refers to the complete annual cycle (the cosmic year) as envisioned in Enoch’s astronomical section.
    reason: cultural_note
  - marker: f
    text: Or 'and their names and their origins, and their paths'.
    reason: previous_rendering
  - marker: g
    text: Or 'how they move'.
    reason: previous_rendering
  - marker: h
    text: Or 'all their writings'.
    reason: previous_rendering
lexical_decisions:
- source_word: መጽሐፈ
  chosen: book
  alternatives:
  - writing
  - record
  lexicon: Leslau, Comparative Dictionary of Geʿez; Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard Geʿez term for “book/writing.” Here it titles the section as a discrete composition.
- source_word: ሚጠተ
  chosen: courses
  alternatives:
  - arrangements
  - orders
  lexicon: Dillmann; Leslau
  rationale: Context is astronomical regularities; “courses” captures patterned movement better than abstract “arrangements.”
- source_word: ብርሃናት
  chosen: luminaries
  alternatives:
  - lights
  - heavenly lights
  lexicon: Leslau; Dillmann
  rationale: Plural of “light,” often used for celestial bodies; “luminaries” preserves elevated, cosmic register.
- source_word: ሰማይ
  chosen: heaven
  alternatives:
  - sky
  lexicon: Leslau
  rationale: Enoch consistently uses a cosmological ‘heaven’; “sky” would flatten apocalyptic tone.
- source_word: ሀለዉ (from ሄለ)
  chosen: they move
  alternatives:
  - they go
  - they proceed
  lexicon: Dillmann; Leslau
  rationale: Verb of motion; in context of luminaries, “move” is most natural English equivalent.
- source_word: በሕዝብ (in በበሕዝቢሆሙ)
  chosen: companies
  alternatives:
  - hosts
  - groups
  - classes
  lexicon: Leslau; Dillmann
  rationale: Base sense is “people/assembly.” Applied metaphorically to celestial bodies, it denotes groupings; “companies” avoids importing the technical ‘host’ while retaining collective sense.
- source_word: ሥልጣን
  chosen: dominion
  alternatives:
  - authority
  - rule
  lexicon: Leslau; Dillmann
  rationale: Term for power/authority; for luminaries’ appointed power, “dominion” fits elevated register.
- source_word: ዘመን (pl. ዘመኖሙ)
  chosen: seasons
  alternatives:
  - times
  - appointed times
  lexicon: Leslau
  rationale: Temporal divisions; in astronomical context, “seasons” communicates calendrical cycles.
- source_word: ስም (pl. ስሞሙ)
  chosen: names
  alternatives: []
  lexicon: Leslau
  rationale: Straightforward lexical value; names of the luminaries.
- source_word: ሙላዳት
  chosen: origins
  alternatives:
  - births
  - generations
  - risings
  lexicon: Leslau; Dillmann
  rationale: Basic sense is “births/origins.” In astronomical context it likely points to points of origin/rising; “origins” communicates without anthropomorphism.
- source_word: አውራኅ (pl. አውራኂ)
  chosen: paths
  alternatives:
  - ways
  - tracks
  - courses
  lexicon: Leslau; Dillmann
  rationale: Common Geʿez term for a way/path; “paths” suits celestial trajectories (avoids anachronistic ‘orbits’).
- source_word: ኡርኤል
  chosen: Uriel
  alternatives: []
  lexicon: —
  rationale: Proper name transliterated by standard convention.
- source_word: መልአክ
  chosen: angel
  alternatives:
  - messenger
  lexicon: Leslau; Dillmann
  rationale: In Enochic literature, መልአክ denotes heavenly beings; “angel” is the established sense.
- source_word: ቅዱስ
  chosen: holy
  alternatives: []
  lexicon: Leslau
  rationale: Standard adjective modifying angelic identity.
- source_word: መራኂ
  chosen: leader
  alternatives:
  - guide
  lexicon: Leslau; Dillmann
  rationale: Noun from root ‘to guide/lead’; either is possible; “leader” matches role over the luminaries.
- source_word: አርአየ
  chosen: showed
  alternatives:
  - made me see
  - revealed
  lexicon: Leslau; Dillmann
  rationale: Verb of causing to see; “showed” is idiomatic and concrete.
- source_word: መጽሐፎሙ
  chosen: their writings
  alternatives:
  - their books
  - their records
  lexicon: Leslau
  rationale: Plural of “book”; “writings/records” captures registries of astronomical matters.
- source_word: ዓመተ ዓለም
  chosen: the year of the world
  alternatives:
  - the world-year
  - the year in the world
  lexicon: Leslau; Dillmann
  rationale: Idiomatic genitive; denotes the cosmic year (the complete annual cycle) as conceived in Enoch.
- source_word: ለዓለም (with እስከ)
  chosen: forever
  alternatives:
  - unto eternity
  lexicon: Leslau
  rationale: Set phrase እስከ ለዓለም means “forever/for eternity.”
- source_word: ገበረ (in ይትገበር)
  chosen: is accomplished
  alternatives:
  - is made
  - is done
  lexicon: Leslau; Dillmann
  rationale: Root “to do/make”; in prophetic/eschatological statements, “accomplished” conveys completion.
- source_word: ግብር ኃዲስ
  chosen: a new work
  alternatives:
  - a new act
  - a new creation
  lexicon: Leslau; Dillmann
  rationale: Literal is “new work/deed.” Given context, it can imply creative act; “new work” keeps lexical transparency; “new creation” noted as interpretive alternative.
- source_word: ነበረ (in ይነብር)
  chosen: will abide
  alternatives:
  - will remain
  - will endure
  lexicon: Leslau; Dillmann
  rationale: Common verb for dwelling/remaining; “abide” fits solemn, enduring sense.
- source_word: በከመ
  chosen: as/how
  alternatives:
  - according to how
  lexicon: Leslau
  rationale: Comparative particle introducing manner/content of what was shown.
