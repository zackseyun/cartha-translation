theological_decisions:
- issue: Meaning of ግብር ኃዲስ (“new work”)
  chosen_reading: Render literally as “new work,” signaling an eschatological act of God that will abide forever.
  alternative_readings:
  - “new creation” as an explicit creative act
  - “new order” as a reorganization of times/seasons
  rationale: The phrase likely gestures toward a future divine act that permanently alters/renews creation’s order. Retaining “work” preserves the Geʿez lexeme (ግብር) and leaves the scope (creation vs. reordering) open, with “creation” listed as a viable interpretive alternative.
  doctrine_reference: Translation Philosophy §Preserve theological tension; avoid importing later NT phrasing.
