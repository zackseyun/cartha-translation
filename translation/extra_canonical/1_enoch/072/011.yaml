translation:
  text: And the sun goes out from that fourth gate, and sets in the fourth, and returns to the fifth gate of the east for thirty mornings; then it comes out from it and sets in the fifth gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez counts the period as 'thirty mornings,' a characteristic expression in this section; some English renderings smooth this to 'thirty days.'
    reason: lexical_alternative
  - marker: b
    text: The final clause repeats the fifth gate. The sequence is terse in Ge'ez and may summarize the sun's continued course after the thirty mornings rather than narrate a separate additional movement in detail.
    reason: textual_variant
  - marker: c
    text: Or 'enters the fifth gate for thirty mornings'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይወፅእ
  chosen: and ... goes out
  alternatives:
  - and ... comes out
  - and ... rises
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally denotes going/coming out. In the astronomical context it refers to the sun's emergence from a gate at sunrise. 'Goes out' preserves the repeated motion language of the passage without over-interpreting, while English readers can still hear the sunrise sense from context.
- source_word: ፀሐይ
  chosen: the sun
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the luminary named throughout this section.
- source_word: እምዘክቱ ራብዕ ኆኅት
  chosen: from that fourth gate
  alternatives:
  - from this fourth gate
  - from the fourth portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative points back to the previously mentioned gate. 'Gate' fits the Astronomical Book's cosmological imagery better than a more architectural 'portal' while remaining readable.
- source_word: ወየዓርብ
  chosen: and sets
  alternatives:
  - and goes down
  - and enters at evening
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of the sun's daily course, the verb refers to evening setting. 'Sets' is idiomatic English and preserves the astronomical register.
- source_word: በራብዕት
  chosen: in the fourth
  alternatives:
  - through the fourth
  - at the fourth gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition is concise in Ge'ez; English supplies the implied noun from context. Because the verse has just named the gate, 'in the fourth' is naturally understood as 'in the fourth gate.'
- source_word: ወይገብእ ውስተ ኃምስ ኆኅት
  chosen: and enters the fifth gate
  alternatives:
  - and goes into the fifth gate
  - and reaches the fifth gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means enter/go in. This marks the transition to the next gate in the sequence of solar movement.
- source_word: እንተ ጽባሕ ሠላሳ ጽባሐ
  chosen: for thirty mornings
  alternatives:
  - for thirty days
  - during thirty dawns
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated noun from the root for morning/dawn is best kept as 'mornings,' since the Astronomical Book often counts solar phases by mornings rather than using a flatter 'days.'
- source_word: እምኔሃ
  chosen: from it
  alternatives:
  - from there
  - from that one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Feminine pronominal form refers back to the gate. English 'it' is the most natural anaphoric rendering.
- source_word: ኃምስት ኆኅት
  chosen: the fifth gate
  alternatives:
  - the fifth portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repeated technical term in the cosmological description; consistency favors 'gate'.
