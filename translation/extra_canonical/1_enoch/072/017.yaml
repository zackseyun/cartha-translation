translation:
  text: And the sun goes out from the west, from that sixth gate, and travels eastward, and rises in the fifth gate for thirty mornings, and sets again in the west in the fifth western gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'thirty mornings.' This may function as a day-count, but the Ethiopic wording is preserved.
    reason: lexical_alternative
  - marker: b
    text: Or 'from there, from the west'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይወፅእ
  chosen: and ... goes out
  alternatives:
  - and ... comes out
  - and ... proceeds forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes emergence/proceeding out. 'Goes out' fits the astronomical sequence of exiting by a gate without over-formal archaism.
- source_word: ፀሐይ
  chosen: the sun
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the luminary in this chapter's schematic description.
- source_word: እምነ ምዕራብ
  chosen: from the west
  alternatives:
  - from the western side
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the western region/gate system from which the sun emerges in this verse's cycle description.
- source_word: እምይእቲ ሳድስት ኆኅት
  chosen: from that sixth gate
  alternatives:
  - from that sixth portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኆኅት in the Astronomical Book refers to one of the heavenly openings or gates. 'Gate' preserves the repeated technical imagery of the chapter.
- source_word: ወየሐውር ምሥራቀ
  chosen: and travels eastward
  alternatives:
  - and goes to the east
  - and moves eastward
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is ordinary motion; 'travels eastward' is readable while preserving directional movement in the cosmological scheme.
- source_word: ወይሠርቅ
  chosen: and rises
  alternatives:
  - and dawns
  - and shines forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of the sun and gates, this is the sunrise action. 'Rises' is the natural English equivalent.
- source_word: በኃምስት ኆኅት
  chosen: in the fifth gate
  alternatives:
  - through the fifth gate
  - at the fifth gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can be rendered flexibly, but 'in' reflects the repeated locative pattern of this chapter's gate notices.
- source_word: ሠላሳ ጽባሐ
  chosen: for thirty mornings
  alternatives:
  - for thirty days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text literally says 'thirty mornings.' Because the Astronomical Book often counts by days in relation to dawn appearances, the more literal 'mornings' is retained rather than smoothing to 'days'.
- source_word: ወየዓርብ
  chosen: and sets
  alternatives:
  - and enters
  - and goes down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In parallel with sunrise language and the western gate reference, the sense is sunset. 'Sets' is idiomatic and precise.
- source_word: ካዕበ
  chosen: again
  alternatives:
  - in turn
  - then again
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks the repeated corresponding action of sunset after sunrise.
- source_word: ኃምስተ ኆኅተ እንተ ምዕራብ
  chosen: in the fifth western gate
  alternatives:
  - in the fifth gate of the west
  - through the fifth western portal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase specifies the matching western gate. 'Western gate' keeps the cosmological symmetry explicit in English.
