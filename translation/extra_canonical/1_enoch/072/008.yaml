translation:
  text: And when the sun rises from the sky, it goes out through that fourth gate
    for thirty mornings, and through the fourth gate in the west of the sky it goes
    down straightway.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for thirty days'; the Ge'ez reads literally 'for thirty mornings,' a
      time-unit used in this astronomical sequence.
    reason: lexical_alternative
  - marker: b
    text: The adverb rendered 'straightway' may also mean 'directly' or 'in a straight
      course.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይሠርቅ
  chosen: rises
  alternatives:
  - shines forth
  - appears
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this astronomical context with the sun as subject, the verb denotes
    the sun's rising or dawning rather than a more general 'shine'.
- source_word: ይወፅእ
  chosen: goes out
  alternatives:
  - comes forth
  - emerges
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the concrete motion language of exiting through a gate, important
    to the luminary schema.
- source_word: ኆኅት
  chosen: gate
  alternatives:
  - portal
  - window
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Astronomical Book repeatedly describes heavenly openings as gates;
    'gate' preserves the structured cosmic imagery better than 'window'.
- source_word: ራብዕት
  chosen: fourth
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ordinal designation of the gate; kept literal for consistency in the
    sequence of solar gates.
- source_word: ሠላሳ ጽባሐ
  chosen: for thirty mornings
  alternatives:
  - for thirty days
  - for thirty dawns
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez explicitly says 'mornings.' In context this marks a thirty-day/morning
    period of solar movement, but the more literal 'mornings' is preserved.
- source_word: ምዕራበ ሰማይ
  chosen: the west of the sky
  alternatives:
  - the western part of heaven
  - the west of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct rendering of the cosmological phrase; 'sky' is readable modern
    English while preserving spatial imagery.
- source_word: ርቱዐ
  chosen: straightway
  alternatives:
  - directly
  - in a straight course
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adverb likely indicates direct or regular course. 'Straightway' preserves
    both the sense of directness and the elevated register, though the exact nuance
    is somewhat uncertain.
- source_word: ይወርድ
  chosen: it goes down
  alternatives:
  - sets
  - descends
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is literally 'descend/go down.' This keeps the cosmological
    motion explicit rather than replacing it with the idiomatic but less vivid 'sets'.
