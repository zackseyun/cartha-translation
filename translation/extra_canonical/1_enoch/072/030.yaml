translation:
  text: And on that day the night is shortened from its length, and the night becomes
    twelve parts, and the day eight parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verse uses the Astronomical Book's schematic division of day and night
      into numbered 'parts,' a technical way of describing seasonal change rather
      than clock-hours.
    reason: cultural_note
lexical_decisions:
- source_word: በይእቲ ዕለት
  chosen: on that day
  alternatives:
  - in that day
  - at that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal demonstrative phrase; 'on that day' is the most natural English
    equivalent while preserving the deictic force of the Ge'ez.
- source_word: ተኃጽጸ ሌሊት
  chosen: the night is shortened
  alternatives:
  - the night decreases
  - the night is diminished
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys reduction or cutting short. 'Is shortened' fits the
    astronomical context of changing seasonal proportions better than the more generic
    'decreases.'
- source_word: እምኑኃ
  chosen: from its length
  alternatives:
  - from its measure
  - from its extent
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the point from which the night is reduced. 'Length'
    is idiomatic in English for duration and suits the context of night/day proportions.
- source_word: ትከውን ሌሊት ፲ወ፪ተ ክፍለ
  chosen: the night becomes twelve parts
  alternatives:
  - the night amounts to twelve parts
  - the night is twelve parts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb 'becomes/is' introduces the resulting measured state. 'Becomes
    twelve parts' preserves the process/result sense in this calendrical description.
- source_word: ማዓልት ፰ ክፍለ
  chosen: the day eight parts
  alternatives:
  - the day becomes eight parts
  - the day is eight parts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse contrasts the measured portions of night and day. English supplies
    'the day' with an implied copular sense; this keeps the compact enumerative style
    of the source.
