translation:
  text: On that day the day diminishes by two parts, and the day becomes ten parts, and the night eight parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Astronomical Book regularly measures daylight and darkness in numbered ''parts.'' The verse describes the seasonal decrease of daylight: day has ten parts, night eight.'
    reason: cultural_note
  - marker: b
    text: Or 'is shortened by two parts, and it becomes ten parts for the day and eight parts for the night.'.
    reason: previous_rendering
lexical_decisions:
- source_word: በይእቲ ዕለት
  chosen: On that day
  alternatives:
  - In that day
  - At that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal formula introducing a specific point in the luminary cycle; 'On that day' is idiomatic and preserves the demonstrative force.
- source_word: ተሐፅፅ
  chosen: is shortened
  alternatives:
  - diminishes
  - is reduced
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes reduction or curtailment. 'Is shortened' fits the astronomical context of decreasing daylight better than the more abstract 'is reduced.'
- source_word: ተክልኤተ ክፍል
  chosen: by two parts
  alternatives:
  - into two parts
  - two portions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context the phrase quantifies the amount by which the day decreases. 'By two parts' best expresses subtraction rather than division.
- source_word: ወትከውን
  chosen: and it becomes
  alternatives:
  - and it is
  - and there are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks the resulting state after the shortening. 'It becomes' preserves the process/result sense.
- source_word: ዕለት ዓሠርተ ክፍለ
  chosen: ten parts for the day
  alternatives:
  - the day is ten parts
  - 'day: ten parts'
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse uses the recurring schematic division of day and night into numbered parts. 'Ten parts for the day' is clear in English while keeping the technical partition language.
- source_word: ወሌሊት ስመንተ ክፍለ
  chosen: and eight parts for the night
  alternatives:
  - and the night is eight parts
  - 'night: eight parts'
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Balances the previous clause and preserves the astronomical reckoning of night by parts.
