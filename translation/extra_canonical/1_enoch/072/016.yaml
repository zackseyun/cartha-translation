  category: mistranslation
  tier: 2
  from: the day diminishes by one part, and it becomes eleven parts for the day and seven for the night.
  to: the day diminishes by exactly one part, and the day becomes eleven parts, and the night seven.
  rationale: The draft completely omits the adverb ጥንቁቀ (ṭenquqa, "exactly/precisely"), which is crucial to the Astronomical Book's polemical emphasis on exact calendrical measurement. Additionally, the draft's "it becomes eleven parts for the day" misconstrues the syntax; ዕለት (the day) is the subject of ትከውን (becomes), so it should read "the day becomes eleven parts, and the night seven."
