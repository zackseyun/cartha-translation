translation:
  text: And when thirty mornings are completed, the day diminishes by exactly one part, and the day becomes eleven parts, and the night seven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally 'thirty mornings.' In this section the expression functions as a counted interval in the solar calendar.
    reason: lexical_alternative
  - marker: b
    text: The chapter repeatedly measures day and night in numbered 'parts'; the verse states that daylight has decreased to eleven parts, while night stands at seven.
    reason: cultural_note
  - marker: c
    text: Or 'the day diminishes by one part, and it becomes eleven parts for the day and seven for the night.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተፈጸመ
  chosen: are completed
  alternatives:
  - is fulfilled
  - comes to an end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb marks completion of a counted period. 'Are completed' is natural English while preserving the formal sense of fulfillment/completion.
- source_word: ሠላሳ ጽባሕ
  chosen: thirty mornings
  alternatives:
  - thirty dawns
  - thirty days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez explicitly says 'mornings.' In this astronomical context it functions as a day-count, but the more concrete 'mornings' should be preserved rather than generalized to 'days' in the main text.
- source_word: ተሐፅፅ ማዓልት
  chosen: the day diminishes
  alternatives:
  - the day is reduced
  - the day grows shorter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase describes the shortening of daylight in the luminary schema. 'Diminishes' keeps the quantitative, schematic feel better than the more idiomatic 'grows shorter.'
- source_word: ክፍለ አሐደ
  chosen: by one part
  alternatives:
  - one part
  - a single portion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction indicates reduction by a unit or part within the chapter's recurring division-of-day formula. 'By one part' makes the comparative force explicit in English.
- source_word: ወትከውን
  chosen: and it becomes
  alternatives:
  - and it is
  - and there are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This verb signals the resulting state after the diminution. 'It becomes' preserves the transition in the astronomical sequence.
- source_word: ዕለት ዓሠርተ ወአሐደ ክፍለ
  chosen: eleven parts for the day
  alternatives:
  - the day, eleven parts
  - eleven portions of day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse gives the new measured proportion of daylight. 'Eleven parts for the day' is clear and keeps the technical counting language.
- source_word: ወሌሊት ስብዓተ
  chosen: seven for the night
  alternatives:
  - seven parts for the night
  - and the night seven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The night is the balancing counterpart in the same schematic system. The shorter English phrase avoids overloading the line while preserving the implied 'parts.'
