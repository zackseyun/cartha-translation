theological_decisions:
- issue: Nature of the sun's description
  chosen_reading: The verse describes the sun as a created cosmic luminary characterized
    by fiery brightness, without mythologizing it as a deity.
  alternative_readings:
  - The naming formula could be read as personifying the sun more strongly.
  rationale: The text uses vivid apocalyptic-astronomical imagery and naming conventions,
    but nothing requires divine status. The translation preserves the imagery without
    demythologizing it into mere scientific prose.
  doctrine_reference: Preserve apocalyptic imagery rather than flattening it; do not
    import later theological categories.
