translation:
  text: And the first comes forth as a great light, whose name is the sun, and its
    disk is like the disk of heaven, and it is wholly full of shining and burning
    fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its orb' or 'its circle'; the Ge'ez term can denote a round form or
      circuit. 'Disk' is chosen here because the comparison appears to concern visible
      shape.
    reason: lexical_alternative
  - marker: b
    text: The final pair can also be understood as 'giving light and burning' or 'shining
      and heating.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ቀዳማዊ
  chosen: the first
  alternatives:
  - first one
  - former
  lexicon: Dillmann
  rationale: Ordinal adjective used substantivally; in context of luminaries, 'the
    first' preserves the sequence without over-specifying 'body' or 'gate'.
- source_word: ይወፅእ
  chosen: comes forth
  alternatives:
  - goes out
  - emerges
  lexicon: Dillmann
  rationale: Retains the vivid motion of emergence in astronomical description; 'comes
    forth' is elevated but readable.
- source_word: ብርሃን ዓቢይ
  chosen: a great light
  alternatives:
  - great luminary
  - a mighty light
  lexicon: Dillmann
  rationale: Formal enough to preserve cosmic imagery. 'Luminary' is possible, but
    'great light' more directly reflects the Ge'ez wording.
- source_word: ዘስሙ ፀሐይ
  chosen: whose name is the sun
  alternatives:
  - which is called the sun
  - named the sun
  lexicon: Dillmann
  rationale: Relative construction naturally rendered 'whose name is'; preserves the
    naming formula common in visionary description.
- source_word: ክበቡ
  chosen: its disk
  alternatives:
  - its دائرة/circuit
  - its orb
  - its circumference
  lexicon: Dillmann
  rationale: In this astronomical context, the noun refers most plausibly to the visible
    round body/orb of the sun. 'Disk' is concrete and fits the simile that follows.
- source_word: ከመ ክበበ ሰማይ
  chosen: like the disk of heaven
  alternatives:
  - like the circle of heaven
  - like the vault of heaven
  lexicon: Dillmann
  rationale: Keeps the repeated root and the cosmic comparison. 'Disk of heaven' is
    somewhat strange in English, but preserves the text's imagery better than flattening
    to 'sky'.
- source_word: ኵሉ ምሉእ
  chosen: wholly full of
  alternatives:
  - entirely full of
  - completely filled with
  lexicon: Dillmann
  rationale: The doubling intensifies totality; 'wholly full of' preserves that emphasis
    without becoming cumbersome.
- source_word: እሳት
  chosen: fire
  alternatives:
  - flame
  lexicon: Dillmann
  rationale: Basic lexical sense; no need to weaken the elemental imagery.
- source_word: ዘያበርህ ወያውዒ
  chosen: shining and burning
  alternatives:
  - giving light and heat
  - blazing and scorching
  lexicon: Dillmann
  rationale: The paired participial/relative verbs describe the fire's effects. 'Shining
    and burning' keeps the parallelism and avoids interpretive expansion to 'heat,'
    though that idea may be implied.
