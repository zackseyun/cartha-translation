translation:
  text: And on that day the sun goes out from that second gate, and sets in the west
    at the second gate, and returns to the east, entering by one gate for thirty-one
    mornings, and sets by one gate in the west of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally 'thirty-one mornings'; this functions as a day-count in the luminary
      scheme.
    reason: cultural_note
  - marker: b
    text: 'The Ge''ez wording is somewhat repetitive: the sun sets at the second gate,
      then returns eastward and enters by one gate for thirty-one mornings, and afterward
      sets by one gate in the west of heaven. The sequence likely reflects the stepwise
      movement of the sun through the heavenly gates rather than a stylistic redundancy.'
    reason: textual_variant
  - marker: c
    text: '''By one gate'' could also be rendered ''through one gate.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ይወፅእ
  chosen: goes out
  alternatives:
  - comes forth
  - emerges
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion verb for the sun's emergence from a gate; 'goes
    out' preserves the concrete astronomical imagery without over-literary elevation.
- source_word: ኆኅት
  chosen: gate
  alternatives:
  - portal
  - window
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book these are the fixed openings of heaven through
    which luminaries move. 'Gate' preserves the cosmological image better than the
    more modern 'window'.
- source_word: ያዓርብ
  chosen: sets
  alternatives:
  - enters evening
  - goes down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of the sun and west, the idiomatic astronomical sense is sunset.
    'Sets' is natural English and still precise.
- source_word: ይገብእ
  chosen: returns
  alternatives:
  - enters
  - comes in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can denote entering, but in this sequence the sense is the sun's
    cyclical return to the east in order to enter again. I preserve that cyclical
    force in the main clause, while reflecting the more literal 'entering' in the
    following participial phrase.
- source_word: በአሐቲ ኆኅት
  chosen: by one gate
  alternatives:
  - through one gate
  - at one gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition is flexible; 'by' keeps the wording compact while still
    indicating the gate used for passage. A footnote preserves 'through' as a possible
    more explicit alternative.
- source_word: ሠላሳ ወ፩ ጸባሐ
  chosen: for thirty-one mornings
  alternatives:
  - for thirty-one days
  - for thirty-one dawns
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጸባሐ is literally 'morning/dawn.' In this calendrical context it marks
    a count of days by mornings. 'Mornings' keeps the source image and avoids silently
    normalizing to 'days'.
- source_word: ምዕራበ ሰማይ
  chosen: the west of heaven
  alternatives:
  - the western part of heaven
  - the west of the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is cosmological, not merely meteorological. 'Heaven' better
    fits the apocalyptic architecture of celestial gates.
