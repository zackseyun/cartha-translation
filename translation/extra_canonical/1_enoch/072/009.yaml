translation:
  text: And in those days the day grows longer than the day, and the night grows shorter than the night, until thirty mornings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez literally repeats 'day' and 'night' in a comparative pattern ('day from day,' 'night from night'). The sense is that each successive day becomes longer and each successive night shorter.
    reason: lexical_alternative
  - marker: b
    text: Or 'until thirty dawns.' The term is literally 'morning' and likely marks a counted stage in the luminary scheme.
    reason: lexical_alternative
  - marker: c
    text: Or 'the day grows longer than day, and the night grows shorter than night'.
    reason: previous_rendering
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - during those days
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal phrase. 'In those days' preserves the elevated narrative register and recurring apocalyptic style.
- source_word: ትነኍኅ
  chosen: grows longer
  alternatives:
  - lengthens
  - is prolonged
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes increase/extension in duration. 'Grows longer' is natural modern English while preserving the observational, astronomical sense.
- source_word: ዕለት እምዕለት
  chosen: the day grows longer than day
  alternatives:
  - day than day
  - day by day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The literal construction is unusual. In this astronomical context it compares one day's length with another rather than indicating simple repetition. I preserved the comparative force transparently, though somewhat formally, rather than smoothing it into an idiom without note.
- source_word: ተኃጽር ሌሊት እምሌሊት
  chosen: the night grows shorter than night
  alternatives:
  - the night is shortened more and more
  - night than night
  - night by night
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired phrase mirrors the previous clause and should remain parallel. The sense is comparative diminution of night length.
- source_word: እስከ ሠላሳ ጽባሕ
  chosen: until thirty mornings
  alternatives:
  - until thirty dawns
  - up to thirty mornings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጽባሕ is literally 'morning' or 'dawn.' 'Mornings' preserves the concrete calendrical/astronomical idiom better than an abstract paraphrase.
