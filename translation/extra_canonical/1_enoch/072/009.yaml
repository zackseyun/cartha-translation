theological_decisions:
- issue: Whether to smooth the comparative idiom into a modern expression like 'day by day' and 'night by night'
  chosen_reading: 'Retain the comparative structure: ''longer than day'' / ''shorter than night'''
  alternative_readings:
  - day by day the day grows longer and the night grows shorter
  rationale: The verse belongs to the Astronomical Book and describes measured changes in the lengths of day and night. Preserving the comparative pattern better reflects the source wording and the text's schematic observational style, even if the English is slightly formal.
  doctrine_reference: Translation philosophy §1, §3, §4
