theological_decisions:
- issue: Whether to treat the fiery river as symbolic or literalized visionary geography
  chosen_reading: 'Preserve it as a literal visionary description: ''a river of fire
    whose fire flowed like water.'''
  alternative_readings:
  - Interpret as metaphorical judgment imagery
  rationale: The Watchers section regularly presents impossible cosmic landscapes
    as seen realities within the vision. The translation should not resolve or demythologize
    the image.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve
    apocalyptic imagery.
