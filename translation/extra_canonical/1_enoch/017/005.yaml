translation:
  text: And I came to a river of fire whose fire flowed like water, and it emptied
    into the great sea toward the west.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final phrase literally reads something like 'in the direction of ʿarab.'
      It is rendered 'toward the west' because the expression can denote the western
      quarter, though some may understand a geographic reference such as Arabia.
    reason: lexical_alternative
lexical_decisions:
- source_word: መጻእኩ
  chosen: I came
  alternatives:
  - I arrived
  - I went
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple first-person narrative motion verb in a visionary travel sequence;
    'I came' preserves the report style without over-interpreting directionality.
- source_word: ፈለገ
  chosen: river
  alternatives:
  - stream
  - torrent
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes a river or streambed/channel. 'River' best
    fits the scale of the image and the following destination in the great sea.
- source_word: እሳት
  chosen: fire
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literal apocalyptic imagery should be preserved, not softened into metaphorical
    language.
- source_word: ዘይውሕዝ
  chosen: whose fire flowed
  alternatives:
  - which flowed
  - that was pouring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative construction with a flowing verb. Supplying 'whose fire' reflects
    the attached pronominal form in እሳቱ and keeps the syntax intelligible in English.
- source_word: እሳቱ
  chosen: whose fire
  alternatives:
  - its fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffixed form points back to the fiery river; 'whose fire' reads
    more naturally in English while preserving possession.
- source_word: ከመ ማይ
  chosen: like water
  alternatives:
  - as water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct simile; retained plainly to preserve the strange visionary image
    of fire behaving as water.
- source_word: ይትከዐው
  chosen: it emptied into
  alternatives:
  - it poured into
  - it was discharged into
  - it flowed into
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests being poured out or discharged. 'Emptied into' conveys
    the sense of outflow into a larger body without flattening the image.
- source_word: ባሕር ዐቢይ
  chosen: the great sea
  alternatives:
  - the great ocean
  - the large sea
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard geographic expression; 'the great sea' preserves the elevated
    register and possible conventional designation.
- source_word: መንገለ ዐረብ
  chosen: toward the west
  alternatives:
  - in the direction of the west
  - toward Arabia
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Ethiopic and related usage, this expression can denote the western
    quarter/sunset direction. Given the river emptying into the great sea, 'toward
    the west' best fits the geographic sense, though the form can invite an Arabia
    reading.
