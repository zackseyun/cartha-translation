translation:
  text: And they took me as far as the waters of life, and as far as the fire of the
    west, which receives every setting of the sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The bracketed Ethiopic word after 'waters of life' is uncertain in this
      witness and may mean 'that speak' or reflect a corrupt reading; it is not represented
      in the main text.
    reason: textual_variant
  - marker: b
    text: Or 'living waters.' The Ethiopic expression can be understood either as
      waters characterized by life or as life-giving waters.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወነሥኡኒ
  chosen: and they took me
  alternatives:
  - and they carried me
  - and they led me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb from ነሥአ commonly means 'take, carry, bring up.' In this visionary
    travel context, 'took me' is natural English and preserves the passive-guided
    movement without over-specifying whether the motion was by carrying or leading.
- source_word: እስከ
  chosen: as far as
  alternatives:
  - to
  - up to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repeated እስከ marks extent or destination. 'As far as' preserves the sense
    of being brought to successive visionary locations more clearly than the flatter
    'to'.
- source_word: ማያት ሕያዋን
  chosen: the waters of life
  alternatives:
  - living waters
  - the living waters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'waters living/alive.' 'Waters of life' keeps the elevated
    apocalyptic register and avoids importing later idiomatic resonance from 'living
    water' traditions. The phrase still conveys life-giving or living waters.
- source_word: '[ዘይትናገር፡]'
  chosen: omitted from main text
  alternatives:
  - that speak
  - that are spoken of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The bracketed form signals uncertainty in the OCR/witness. A literal
    sense like 'that speaks' is difficult in context after 'waters of life' and may
    reflect corruption or intrusion. Because the verse reads coherently without it,
    it is better handled as a textual note than forced into the main translation.
- source_word: እሳት ዐረብ
  chosen: the fire of the west
  alternatives:
  - the western fire
  - the fire of sunset
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዐረብ here is best taken in the sense of west/evening region rather than
    the abstract time 'evening' alone. 'Fire of the west' preserves the cosmic-geographical
    imagery of the visionary scene.
- source_word: ዘውእቱ ይነሥእ ኵሎ ዕርበተ ፀሐይ
  chosen: which receives every setting of the sun
  alternatives:
  - which takes up every sunset of the sun
  - which gathers in every westering of the sun
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause describes the western fire as receiving or taking
    in the sun at its setting. 'Receives every setting of the sun' is idiomatic while
    preserving the vivid cosmological image. 'Setting' is preferred over 'sunset'
    because the Ge'ez phrase is more literally the act/event of the sun's going down.
