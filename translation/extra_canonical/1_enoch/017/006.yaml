translation:
  text: And I saw great rivers, and I reached as far as the great darkness, and I went to where no flesh walks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final verb is textually uncertain in the OCR witness. It likely denotes movement or roaming; 'wanders' is a cautious rendering.
    reason: textual_variant
  - marker: b
    text: '''All flesh'' is a traditional Semitic expression that may refer to humankind broadly or to living creatures more generally.'
    reason: lexical_alternative
  - marker: c
