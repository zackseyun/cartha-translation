    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢኩ
  chosen: and I saw
  alternatives:
  - and I looked
  - and I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The common Ge'ez verb of seeing in narrative vision reports. 'Saw' is clear modern English and preserves the visionary sequence.
- source_word: ዐበይተ
  chosen: great
  alternatives:
  - large
  - mighty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An adjective of magnitude/intensity. 'Great' fits apocalyptic register better than the flatter 'large'.
- source_word: አፍላገ
  chosen: rivers
  alternatives:
  - streams
  - watercourses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best taken as 'rivers' or major flowing waters. 'Rivers' preserves the cosmic-geographical imagery.
- source_word: እስከ
  chosen: as far as
  alternatives:
  - until
  - up to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks extent of travel rather than merely time. 'As far as' suits the journey motif.
- source_word: ዐቢይ ጽልመት
  chosen: the great darkness
  alternatives:
  - deep darkness
  - vast darkness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A weighty apocalyptic expression. Retaining 'darkness' rather than interpreting it metaphorically preserves the visionary topography.
- source_word: በጻሕኩ
  chosen: I reached
  alternatives:
  - I arrived
  - I came
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys arrival at a destination in the travel report. 'Reached' works well with 'as far as'.
- source_word: ወሖርኩ
  chosen: and I went
  alternatives:
  - and I traveled
  - and I proceeded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion verb; keeping it simple preserves the repetitive cadence of the vision narrative.
- source_word: ኀበ
  chosen: to where
  alternatives:
  - to
  - toward the place where
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces destination. 'To where' is idiomatic in English and reflects the following clause.
- source_word: ኵሉ ሥጋ
  chosen: all flesh
  alternatives:
  - every living being
  - all mortal creatures
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A semitic expression for living creatures or embodied beings. 'All flesh' should be retained because of its biblical resonance and breadth.
- source_word: (አ)ያንሶሱ
  chosen: wanders
  alternatives:
  - moves about
  - goes to and fro
  - trembles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR is uncertain, but the sense appears to be movement/restless going about. 'Wanders' best fits the travel/cosmic setting without overcommitting to a more specific nuance.
