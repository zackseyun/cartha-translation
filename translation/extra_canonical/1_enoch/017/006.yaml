theological_decisions:
- issue: Whether 'all flesh' should be interpreted narrowly as humanity or broadly as all living creatures
  chosen_reading: all flesh
  alternative_readings:
  - all people
  - all living creatures
  rationale: The Ge'ez phrase is broad and traditional. Preserving 'all flesh' avoids prematurely narrowing the scope and keeps the apocalyptic universality of the expression.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
