translation:
  text: And they took me to a place of whirlwind, and to a mountain whose summit reached
    to heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a place of storm' or 'a place of tempest.' The Ge'ez term conveys violent
      atmospheric turmoil.
    reason: lexical_alternative
  - marker: b
    text: Or 'into a place of whirlwind, and into a mountain'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወወሰዱኒ
  chosen: and they took me
  alternatives:
  - and they led me
  - and they carried me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb naturally denotes taking/leading. 'Took me' preserves the visionary
    transport without over-specifying whether the motion was by guidance or carrying.
- source_word: መካን
  chosen: place
  alternatives:
  - region
  - location
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A broad locative term; 'place' is the most transparent and least interpretively
    loaded in apocalyptic scene-setting.
- source_word: ዘዐውሎ
  chosen: of whirlwind
  alternatives:
  - of storm
  - of tempest
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term evokes violent atmospheric motion. 'Whirlwind' preserves the
    vivid apocalyptic imagery better than the more generic 'storm' or 'tempest'.
- source_word: ደብር
  chosen: mountain
  alternatives:
  - hill
  - mount
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In visionary and biblical-style topography, 'mountain' is the clearest
    natural rendering.
- source_word: ዘክተማ ርእሱ
  chosen: whose summit
  alternatives:
  - whose top
  - whose head
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the mountain's 'head/top.' 'Summit' gives idiomatic English
    while preserving the elevated cosmic image.
- source_word: ይበጽሕ እስከ ሰማይ
  chosen: reached to heaven
  alternatives:
  - came up to heaven
  - extended as far as heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase expresses extension up to heaven. 'Reached to heaven' is concise,
    elevated, and faithful to the vertical cosmic imagery.
