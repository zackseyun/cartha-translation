theological_decisions:
- issue: Rendering ሰማይ in an apocalyptic ascent context
  chosen_reading: heaven
  alternative_readings:
  - sky
  rationale: Although the term can denote the sky, this visionary context emphasizes
    cosmic ascent and the boundary of the heavenly realm. 'Heaven' better preserves
    the apocalyptic register without forcing later doctrinal content.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic language
    into generic modern prose.
