translation:
  text: And I saw the storehouses of the lights and of the thunder, in the farthest
    depths, where there was a fiery bow and arrows and their quiver, and a sword of
    fire and all the lightnings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez phrase rendered 'in the farthest depths' is difficult, literally
      involving 'extremity' and 'depth.' It refers to remote cosmic recesses rather
      than an ordinary earthly location.
    reason: lexical_alternative
  - marker: b
    text: The sequence 'bow ... arrows ... their quiver ... sword of fire' is preserved
      as weapon imagery in the vision, not paraphrased into a general storm description.
    reason: cultural_note
lexical_decisions:
- source_word: መካናተ
  chosen: storehouses
  alternatives:
  - places
  - dwelling places
  - repositories
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this visionary context the term denotes cosmic locations where phenomena
    are kept or from which they issue. 'Storehouses' preserves the apocalyptic-cosmic
    imagery better than the flatter 'places'.
- source_word: ብርሃናት
  chosen: lights
  alternatives:
  - luminaries
  - lightnings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural most naturally means 'lights' or luminous bodies/phenomena.
    Since lightning appears explicitly later in the verse, rendering this as 'lights'
    avoids conflation and preserves the broader cosmic sense.
- source_word: ነጐድጓድ
  chosen: thunder
  alternatives:
  - thunders
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes thunder. Singular English reads naturally while still
    representing the phenomenon as a cosmic entity.
- source_word: አጽናፍ
  chosen: the farthest depths
  alternatives:
  - the extremities
  - the ends
  - the farthest reaches
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word points to extremities or outer limits. Combined with ዕመቃ ('depth'),
    the phrase evokes remote cosmic recesses; 'the farthest depths' preserves that
    apocalyptic spatial force.
- source_word: ዕመቃ
  chosen: depths
  alternatives:
  - deep place
  - abyss
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes depth or deep place. 'Depths' is vivid and natural in
    English without overcommitting to 'abyss,' which may be too specific.
- source_word: ቀሥተ እሳት
  chosen: a fiery bow
  alternatives:
  - a bow of fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'bow of fire.' 'Fiery bow' is idiomatic while preserving the
    weapon imagery.
- source_word: ሐጾ
  chosen: arrows
  alternatives:
  - shafts
  - darts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is best taken as arrows in parallel with bow and quiver. This
    keeps the martial inventory coherent.
- source_word: ምጕንጻቲሆሙ
  chosen: their quiver
  alternatives:
  - their case
  - their arrow-case
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix indicates possession by the arrows or associated weapons.
    'Quiver' is the clearest English equivalent in the sequence bow-arrows-quiver.
- source_word: ሰይፈ እሳት
  chosen: a sword of fire
  alternatives:
  - a fiery sword
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is transparent and should retain its stark apocalyptic imagery.
- source_word: መበርቅት ኵሉ
  chosen: all the lightnings
  alternatives:
  - every lightning flash
  - all lightning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural with 'all' suggests the totality of lightning phenomena gathered
    in these cosmic storehouses. 'All the lightnings' preserves the enumerative style
    of the vision.
