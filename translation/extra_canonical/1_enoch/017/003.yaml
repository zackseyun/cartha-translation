theological_decisions:
- issue: Nature of the cosmic locations
  chosen_reading: storehouses of cosmic phenomena
  alternative_readings:
  - mere places where lights and thunder appear
  - dwelling places of heavenly beings associated with these phenomena
  rationale: The verse lists thunder, bow, arrows, quiver, sword of fire, and lightnings
    as if kept in reserve in remote cosmic regions. Rendering መካናተ as 'storehouses'
    preserves the Second Temple apocalyptic conception of heavenly repositories without
    overinterpreting them as angelic dwellings.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic imagery
    into generic prose.
