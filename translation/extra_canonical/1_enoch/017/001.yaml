translation:
  text: And they took me into one place where those who were there were like burning
    fire, and whenever they wished, they appeared like men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they showed themselves like men.' The verb can carry the sense of making
      themselves visible in human form.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወነሥኡኒ
  chosen: and they took me
  alternatives:
  - and they carried me
  - and they led me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb naturally denotes taking or carrying. 'Took me' preserves the
    visionary transport without over-specifying the manner.
- source_word: ውስተ አሐዱ መካን
  chosen: into one place
  alternatives:
  - to a place
  - into a certain place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is literally 'into one place.' Retaining 'one place' preserves
    the slightly marked, visionary style better than smoothing to simply 'a place,'
    though the sense is indefinite.
- source_word: ኀበ እለ ሀለዉ ህየ
  chosen: where those who were there
  alternatives:
  - where the ones there
  - to where those were who were there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause identifies the inhabitants of the place. 'Those who were
    there' is clear English while preserving the demonstrative-local force.
- source_word: ከመ እሳት ዘይነድድ
  chosen: were like burning fire
  alternatives:
  - were like a blazing fire
  - were like fire that burns
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison is explicit and should remain vivid. 'Burning fire' keeps
    the repetitive intensity of the Ge'ez rather than reducing it to a generic adjective.
- source_word: ወሶበ ይፈቅዱ
  chosen: and whenever they wished
  alternatives:
  - and when they desired
  - and whenever they wanted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This expresses volition and repeated possibility. 'Whenever they wished'
    fits the conditional-temporal sense and elevated register.
- source_word: ያስተርእዩ
  chosen: they appeared
  alternatives:
  - they showed themselves
  - they made themselves seen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The causative/reflexive nuance suggests manifesting themselves visibly.
    'Appeared' is idiomatic English; the fuller nuance is noted in the alternative.
- source_word: ከመ ሰብእ
  chosen: like men
  alternatives:
  - as men
  - like human beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison concerns human form. 'Like men' is the most direct rendering
    of the Ge'ez and preserves the contrast with their fiery appearance.
