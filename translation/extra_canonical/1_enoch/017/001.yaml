theological_decisions:
- issue: Identity of the fiery beings
  chosen_reading: Render descriptively as 'those who were there' without identifying
    them as angels in the main text.
  alternative_readings:
  - angels
  - spirits
  - watchers
  rationale: The verse itself describes their appearance but does not explicitly name
    their class. To preserve theological tension and avoid importing identifications
    from the broader context, the main text remains non-interpretive.
  doctrine_reference: Preserve theological tension rather than resolve it.
