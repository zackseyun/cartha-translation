theological_decisions:
- issue: Nature of the Watchers' requested document
  chosen_reading: a memorial petition
  alternative_readings:
  - a prayer of remembrance
  - a written record of supplication
  rationale: The wording suggests not merely any prayer, but a petition composed so as to be presented before the heavenly court. 'Memorial petition' preserves the cultic/judicial nuance without importing later liturgical formulas.
  doctrine_reference: Preserve apocalyptic imagery and do not flatten judgment or heavenly-court language.
