theological_decisions:
- issue: Nature of the Watchers' reaction
  chosen_reading: 'Rendered as an intensified fear response: ''fear and trembling
    seized them'''
  alternative_readings:
  - '''terror and quaking came upon them'''
  - '''they feared greatly'''
  rationale: The Ge'ez uses both a fear verb and the paired nouns 'fear' and 'trembling,'
    so the translation preserves the escalating apocalyptic dread rather than compressing
    it into a single generic expression.
  doctrine_reference: Preserve apocalyptic imagery and repeated judgment formulas
    rather than smoothing them away.
