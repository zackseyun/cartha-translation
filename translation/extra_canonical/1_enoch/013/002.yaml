theological_decisions:
- issue: Nature of the Watchers' offense in the final clause
  chosen_reading: The verse indicts them for showing or teaching corrupt practices
    to humankind, not merely for committing those acts themselves.
  alternative_readings:
  - The clause could be read more weakly as acts they displayed before humans rather
    than instruction they imparted.
  - Some translators emphasize 'revealed' secret knowledge rather than 'shown' conduct.
  rationale: The immediate context in the Book of the Watchers centers on forbidden
    instruction given to humanity. The paired verbs 'taught' and 'shown' support an
    indictment focused on corrupt transmission as well as corrupt action.
  doctrine_reference: Preserve theological tension rather than resolve it; render
    one reading in the main text and preserve alternatives transparently.
