translation:
  text: And no petition or supplication will be granted for you, because of the violence
    that you have taught, and because of all the works of blasphemy and violence and
    sin that you have shown to humankind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revealed to humankind.' The Ge'ez verb can denote making something seen
      or known; in context this may refer to illicit knowledge disclosed by the Watchers.
    reason: lexical_alternative
  - marker: b
    text: The doubled expression 'petition or supplication' preserves the verse's
      formal, emphatic denial of intercession.
    reason: cultural_note
lexical_decisions:
- source_word: ሣሕት
  chosen: petition
  alternatives:
  - prayer
  - request
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with ስእለት as a near-synonym; 'petition' preserves the formal,
    judicial tone of an appeal being made on behalf of the Watchers.
- source_word: ስእለት
  chosen: supplication
  alternatives:
  - entreaty
  - prayer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered distinctly from ሣሕት to preserve the rhetorical doubling. 'Supplication'
    conveys earnest pleading without collapsing the pair into one English term.
- source_word: ኢይከውከ
  chosen: will be granted for you
  alternatives:
  - will be yours
  - will happen for you
  - will avail for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The negative imperfect of 'to be/become' with the dative sense points
    not merely to existence but to efficacy or obtaining. 'Will be granted for you'
    fits the context of a denied intercessory appeal.
- source_word: ዘመሀርከ
  chosen: you have taught
  alternatives:
  - you instructed
  - you caused to learn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of the causative/teaching verb; this is central
    in the Watchers context, where illicit knowledge is transmitted to humans.
- source_word: ግፍዐ
  chosen: violence
  alternatives:
  - oppression
  - wrongdoing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this judgment context, 'violence' best preserves the moral and social
    force of the term and aligns with the corrupting instruction attributed to the
    Watchers.
- source_word: ምግባረ
  chosen: works
  alternatives:
  - deeds
  - practices
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Works'' keeps the concrete plural sense and the elevated register
    of the indictment formula.'
- source_word: ጽርፈት
  chosen: blasphemy
  alternatives:
  - reviling
  - insolence
  - defilement
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes abusive or impious speech/behavior. 'Blasphemy' best
    fits the religious-judicial register of the accusation, though the semantic range
    may include reviling more broadly.
- source_word: ወግፍዕ
  chosen: and violence
  alternatives:
  - and oppression
  - and wrongdoing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Kept consistent with the earlier cognate term rather than varying the
    English without contextual necessity.
- source_word: ወሓጢአት
  chosen: and sin
  alternatives:
  - and transgression
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Sin'' is the broadest and most natural rendering, preserving the climactic
    accumulation of charges.'
- source_word: ዘአርአይከ
  chosen: you have shown
  alternatives:
  - you revealed
  - you made known
  - you displayed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can mean to show or reveal. 'Shown' is chosen because it fits
    the Ge'ez wording while still allowing the context of illicit disclosure; the
    stronger 'revealed' is preserved in a footnote.
- source_word: ለሰብእ
  chosen: to humankind
  alternatives:
  - to men
  - to human beings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Inclusive modern English is appropriate here because the referent is
    humanity generally, not males specifically.
