translation:
  text: And Enoch went and said to Azazel, “You shall have no peace; a great sentence
    has gone out against you, to bind you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judgment' or 'decree' for 'sentence'; the Ge'ez term is juridical and
      introduces the punishment that follows.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኃሊፎ
  chosen: went
  alternatives:
  - passed on
  - departed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb marks Enoch's movement before speaking. 'Went' is natural English
    and preserves the narrative sequence without overinterpreting the direction.
- source_word: ይቤሎ
  chosen: said to
  alternatives:
  - spoke to
  - declared to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard speech verb. 'Said to' keeps the directness of the address
    and avoids adding rhetorical force not explicit in the Ge'ez.
- source_word: አዛዝኤል
  chosen: Azazel
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal/supernatural name is transliterated rather than translated,
    following project policy for names.
- source_word: ኢይከውከ ሰላም
  chosen: you shall have no peace
  alternatives:
  - peace shall not be yours
  - there will be no peace for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a denial of well-being or favorable outcome. 'You shall have
    no peace' preserves the solemn judgment formula and its apocalyptic force.
- source_word: ዓቢይ
  chosen: great
  alternatives:
  - mighty
  - severe
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective intensifies the following judgment term. 'Great' is the
    most direct rendering and leaves the nature of the greatness to the context.
- source_word: ኵነኔ
  chosen: sentence
  alternatives:
  - judgment
  - decree
  - condemnation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is a formal pronouncement against Azazel. 'Sentence' captures
    the juridical sense and fits the following clause about binding, while 'judgment'
    remains a viable alternative.
- source_word: ወጽአ ላዕሌከ
  chosen: has gone out against you
  alternatives:
  - has come forth against you
  - has gone out upon you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom conveys an issued decree now directed at Azazel. 'Has gone
    out against you' preserves the image of a pronouncement proceeding forth.
- source_word: ይእስርከ
  chosen: to bind you
  alternatives:
  - that one may bind you
  - for your binding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes binding or imprisonment. 'To bind you' gives clear English
    while retaining the punitive imagery central to the verse.
