theological_decisions:
- issue: Force of the peace formula in a judgment oracle
  chosen_reading: Rendered as 'You shall have no peace'
  alternative_readings:
  - '''Peace shall not be yours'''
  - '''There will be no peace for you'''
  rationale: The line is not a casual farewell but a judicial denial of well-being
    to a condemned watcher. The chosen wording preserves the prophetic-apocalyptic
    tone without importing later canonical phrasing.
  doctrine_reference: Preserve apocalyptic imagery and judgment formulas; do not flatten
    into generic prose.
- issue: Legal nuance of ኵነኔ
  chosen_reading: Rendered as 'sentence'
  alternative_readings:
  - '''judgment'''
  - '''decree'''
  - '''condemnation'''
  rationale: Because the pronouncement specifically results in Azazel's binding, 'sentence'
    best conveys a judicial decision with penal consequence. The broader term 'judgment'
    is possible and noted as an alternative.
  doctrine_reference: Optimal equivalence with documented exception handling for key
    terms.
