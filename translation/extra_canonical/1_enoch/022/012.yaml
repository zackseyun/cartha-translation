translation:
  text: And thus a division has been made for the souls of those who make their complaint,
    who reveal concerning their destruction when they were slain in the days of the
    sinners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who cry out' or 'those who bring accusation.' The Ge'ez verb can
      suggest lament, complaint, or protest.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'concerning their destruction' may refer specifically to the
      violent manner of their death rather than destruction in a broader sense.
    reason: lexical_alternative
  - marker: c
    text: This verse continues the description of separated places for the dead in
      Sheol, where the slain await judgment and vindication.
    reason: cross_reference
lexical_decisions:
- source_word: ተፈልጠ
  chosen: a division has been made
  alternatives:
  - it was separated
  - it was set apart
  - a distinction was made
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive verbal form indicates separation or division. In the context
    of the hollow places for the dead in 1 Enoch 22, 'a division has been made' best
    preserves the spatial/judicial sense without over-specifying.
- source_word: ለነፍሰ
  chosen: for the souls
  alternatives:
  - to the souls
  - for the soul
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The dative/prepositional force fits the context: a compartment or division
    is assigned for the souls. The plural sense is required by the following relative
    clauses.'
- source_word: እለ ይስክዩ
  chosen: those who make their complaint
  alternatives:
  - those who lament
  - those who cry out
  - those who accuse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb likely carries the sense of crying out, complaining, or making
    accusation. Given the immediate context of Abel's blood crying out in this chapter,
    'make their complaint' preserves both lament and forensic protest.
- source_word: እለ ያርእዩ
  chosen: who reveal
  alternatives:
  - who make known
  - who show forth
  - who testify
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to show or reveal. 'Reveal' keeps the vividness of disclosure
    from the dead without narrowing it to formal courtroom testimony, though that
    nuance may be present.
- source_word: በእንተ ሕጉለት
  chosen: concerning their destruction
  alternatives:
  - about their ruin
  - concerning their violent end
  - about their perishing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun appears to denote destruction, ruin, or violent undoing. 'Concerning
    their destruction' is broad enough to fit the context of wrongful death while
    remaining close to the Ge'ez.
- source_word: አመ ተቀትሉ
  chosen: when they were slain
  alternatives:
  - when they were killed
  - at the time they were murdered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive verb clearly refers to being killed. 'Slain' preserves the
    elevated register and the violent sense without importing a legal conclusion beyond
    the text.
- source_word: በመዋዕለ ኃጥኣን
  chosen: in the days of the sinners
  alternatives:
  - in the days of sinners
  - during the time of the sinful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase is temporal and characterizes the age by those marked as
    sinners. Retaining 'the sinners' preserves the apocalyptic moral contrast typical
    of Enochic diction.
