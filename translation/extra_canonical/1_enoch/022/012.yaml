theological_decisions:
- issue: Whether the crying-out souls are presented as lamenting generally or bringing
    an accusation for unjust bloodshed
  chosen_reading: The main text uses 'make their complaint' to preserve both lament
    and forensic protest.
  alternative_readings:
  - those who cry out
  - those who accuse
  rationale: The chapter's context includes the blood of the slain crying out, especially
    Abel. A rendering that preserves both grief and accusation best maintains the
    theological tension of innocent blood demanding divine justice.
  doctrine_reference: Preserve theological tension rather than resolve it.
