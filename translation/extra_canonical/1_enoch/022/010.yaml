translation:
  text: 'And thus it was created for sinners: when they die and are buried in the earth, and judgment did not come upon them during their lifetime.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening 'And thus' likely refers back to the preceding description of separated places for the dead, indicating that this case corresponds to that arrangement.
    reason: cross_reference
  - marker: b
    text: The passive verb 'has been made' could also be rendered 'has been appointed' or 'was created'; the text does not explicitly restate the noun supplied from the context.
    reason: lexical_alternative
  - marker: c
    text: 'Or ''it has been made for sinners: when they die and are buried in the earth, and judgment has not come upon them''.'
    reason: previous_rendering
lexical_decisions:
- source_word: በከመ / ከማሁ
  chosen: And thus
  alternatives:
  - And in this way
  - So also
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired comparative particles introduce a concluding comparison or correspondence with the preceding case. 'And thus' preserves the connective and the inferential force without overloading the English.
- source_word: ተፈጥረ
  chosen: it has been made
  alternatives:
  - it was created
  - it was appointed
  - it came to be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive perfect points to an established arrangement or condition. 'Has been made' is broad enough to preserve the Ge'ez without forcing a stronger metaphysical sense like 'created' or a more interpretive sense like 'appointed'.
- source_word: ለኃጥኣን
  chosen: for sinners
  alternatives:
  - for the sinful
  - for wrongdoers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The dative phrase marks those for whom this arrangement applies. 'Sinners' is the most direct and contextually fitting rendering in this judgment scene.
- source_word: ሶበ ይመውቱ ወይትቀበሩ
  chosen: when they die and are buried
  alternatives:
  - when they die and are entombed
  - whenever they die and are buried
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The temporal clause is straightforward. 'Are buried' keeps the passive sense and the concrete imagery of interment.
- source_word: ውስተ ምድር
  chosen: in the earth
  alternatives:
  - in the ground
  - in the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In a burial context, 'in the earth' preserves the elemental, grave-related imagery better than the more idiomatic 'in the ground,' while 'land' would be too geographic.
- source_word: ወኵነኔ ኢኮነ በላዕሌሆሙ
  chosen: and judgment has not come upon them
  alternatives:
  - and judgment has not been upon them
  - and condemnation has not fallen on them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause states that judicial reckoning did not overtake them before death. 'Has not come upon them' expresses the force of judgment arriving against someone and reads naturally in English.
- source_word: በሕይወቶሙ
  chosen: during their lifetime
  alternatives:
  - in their life
  - while they were alive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This temporal phrase contrasts earthly life with the postmortem state under discussion. 'During their lifetime' is idiomatic and precise.
