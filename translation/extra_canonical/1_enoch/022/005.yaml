theological_decisions:
- issue: Nature of the dead persons' upward speech
  chosen_reading: The text depicts the dead as conscious spirits whose voice rises heavenward in complaint/accusation.
  alternative_readings:
  - A more neutral report that their sound simply reached heaven
  - An implicit prayer rather than accusation
  rationale: The combination of 'spirits,' 'their voice reached to heaven,' and the likely force of the final verb suggests an appeal for justice rather than a mere noise report. This preserves the apocalyptic-juridical setting without resolving broader doctrinal questions about the intermediate state.
  doctrine_reference: Preserve theological tension rather than resolve it.
