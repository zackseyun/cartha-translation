translation:
  text: And I saw the spirits of the children of men who were dead, and their voice reached to heaven and made petition.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their cry reached to heaven and complained.' The final verb is difficult and may denote complaint or accusation rather than a neutral utterance.
    reason: lexical_alternative
  - marker: b
    text: Or 'made accusation'.
    reason: previous_rendering
lexical_decisions:
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann
  rationale: Simple first-person visionary verb; 'I saw' is clear modern English and preserves the report style.
- source_word: መናፍስተ
  chosen: the spirits
  alternatives:
  - souls
  lexicon: Dillmann
  rationale: The term denotes spirits; 'spirits' preserves the apocalyptic anthropology better than the more interpretive 'souls'.
- source_word: ውሉደ ሰብእ
  chosen: the children of men
  alternatives:
  - human beings
  - the sons of men
  lexicon: Dillmann
  rationale: A literal Semitic-style expression fits the elevated register and keeps the collective human reference without importing later title language.
- source_word: እንዘ ሙታን ውእቶሙ
  chosen: who were dead
  alternatives:
  - while they were dead
  - being dead
  lexicon: Dillmann
  rationale: This clause identifies the human beings whose spirits are seen. 'Who were dead' is idiomatic and preserves the state of death.
- source_word: ቃሎሙ
  chosen: their voice
  alternatives:
  - their sound
  - their cry
  lexicon: Dillmann
  rationale: The base sense is 'voice.' Although the context suggests a cry of complaint, the more literal 'voice' is retained in the main text.
- source_word: ይበጽሕ እስከ ሰማይ
  chosen: reached to heaven
  alternatives:
  - came up to heaven
  - reached as far as heaven
  lexicon: Dillmann
  rationale: This preserves the vertical apocalyptic imagery of the cry ascending heavenward.
- source_word: ወይስኪ
  chosen: made accusation
  alternatives:
  - complained
  - petitioned
  - cried out
  lexicon: Dillmann
  rationale: The final verb appears to carry the sense of complaint or accusation. In this context of the dead crying upward for redress, 'made accusation' best preserves juridical force without over-paraphrase.
