theological_decisions:
- issue: Whether the verse describes the souls of the dead merely being housed separately or already undergoing punitive suffering before the final judgment
  chosen_reading: 'The main text preserves both separation and suffering: ''set apart in this great affliction ... until the great day of judgment.'''
  alternative_readings:
  - '''set apart in this great pain/torment'' implying active pre-judgment punishment'
  - '''separated for this great judgment'' minimizing present suffering'
  rationale: The Ge'ez combines separation language with ጻዕር ('affliction/pain'). The translation keeps the tension rather than resolving it into either neutral storage or fully consummated punishment.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Who is the subject of 'he will exact vengeance' and 'he will bind them'
  chosen_reading: An unspecified singular subject is retained as 'he,' referring contextually to the judging agent without over-identifying him.
  alternative_readings:
  - 'impersonal passive: ''vengeance will be exacted ... they will be bound'''
  - 'explicit divine subject: ''God will exact vengeance'''
  rationale: The Ge'ez verbal forms support a singular agent, but the verse as given does not name the subject explicitly. Retaining 'he' preserves the text's grammar and apocalyptic reserve.
  doctrine_reference: Original-language primacy over translation tradition.
