lexical_decisions:
- source_word: ይትፈለጠ
  chosen: are set apart
  alternatives:
  - are separated
  - are divided off
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense indicates being separated off or assigned to a distinct place/state. 'Set apart' preserves the spatial/judicial nuance without over-specifying the mechanism.
- source_word: ነፍሳቲሆሙ
  chosen: their souls
  alternatives:
  - their spirits
  - their lives
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context of the dead awaiting judgment in hollow places, 'souls' best matches the disembodied persons in view.
- source_word: ዐቢይ ጻዕር
  chosen: great affliction
  alternatives:
  - great torment
  - great pain
  - great distress
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote pain, hardship, or torment. 'Affliction' keeps the suffering real while fitting the broader judicial waiting-state described in the passage.
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - sentence
  - condemnation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard judicial term here paired with punishment; 'judgment' is the broadest and most transparent rendering.
- source_word: መቅሠፍት
  chosen: punishment
  alternatives:
  - plague
  - blow
  - penalty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though the term can denote a blow or scourge, in this legal-apocalyptic sequence 'punishment' best conveys penal consequence.
- source_word: ይረግሙ
  chosen: are cursed
  alternatives:
  - are accursed
  - curse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive sense fits the phrase 'those who are cursed forever' better than an active 'those who curse.' This also coheres with the judgment context.
- source_word: በቀል
  chosen: exact vengeance
  alternatives:
  - avenge
  - requite
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun/verb complex carries the sense of retributive vengeance. 'Exact vengeance' preserves the active judicial force.
- source_word: ይእስሮሙ
  chosen: he will bind them
  alternatives:
  - he will imprison them
  - they will be bound
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is concrete and forceful. 'Bind' preserves the apocalyptic imagery and avoids flattening it into merely administrative detention.
- source_word: እስከ ለዓለም
  chosen: forever
  alternatives:
  - unto eternity
  - for all ages
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This recurring formula denotes enduring duration. 'Forever' is idiomatic modern English and retains the solemn finality.
