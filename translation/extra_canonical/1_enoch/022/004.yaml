translation:
  text: And these places were made for them to dwell in until the day of their judgment,
    and until their appointed time, and that appointed time is long, until the time
    of the great judgment upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The marked word in the Ethiopic witness (†ገብሩ†) is textually uncertain.
      The sense of the clause is that these are the places designated for them to
      dwell until judgment.
    reason: textual_variant
  - marker: b
    text: '''Appointed time'' renders a term that can also mean ''age,'' ''lifetime,''
      or ''term.'' Here it likely refers to the fixed period allotted before final
      judgment.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And these are the places where they will dwell until the day of their
      judgment, and until their appointed time, and that appointed time is great,
      until the great judgment comes upon them.'.
    reason: previous_rendering
lexical_decisions:
- source_word: መካናት
  chosen: places
  alternatives:
  - abodes
  - regions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes locations or dwelling-places. 'Places' is the broadest
    and least interpretively loaded choice, while still fitting the visionary topography
    of the verse.
- source_word: ይነብርዎሙ
  chosen: they will dwell
  alternatives:
  - they will remain
  - they will abide
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is from the common root for dwelling or remaining. 'Dwell' preserves
    the sense of continued habitation in these chambers of the dead, rather than a
    merely temporary stay.
- source_word: እስከ ዕለተ ኵነኔሆሙ
  chosen: until the day of their judgment
  alternatives:
  - until the day of their condemnation
  - until the day of their sentencing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኵነኔ commonly carries the sense of judgment or judicial decision. 'Judgment'
    best preserves the apocalyptic-judicial register without prematurely specifying
    whether the outcome is condemnation alone.
- source_word: አመ ዕድሜሆሙ
  chosen: their appointed time
  alternatives:
  - their season
  - their age
  - their term
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although ዕድሜ can mean age or lifetime, in this eschatological context
    it likely refers to the fixed period allotted to them. 'Appointed time' communicates
    that temporal allotment more naturally in English.
- source_word: ዘየዓቢ
  chosen: is great
  alternatives:
  - is long
  - is weighty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective straightforwardly means great. In context it may imply
    magnitude or length, but 'great' preserves the ambiguity and the elevated apocalyptic
    tone.
- source_word: ኵነኔ ዐቢይ በላዕሌሆሙ
  chosen: the great judgment comes upon them
  alternatives:
  - the great judgment is over them
  - the great sentence falls upon them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the climactic eschatological judgment directed against
    them. 'Comes upon them' is idiomatic English that preserves the force of impending
    judicial visitation.
- source_word: †ገብሩ†
  chosen: are
  alternatives:
  - were made
  - have been prepared
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The marked form in the OCR is textually difficult. In context the clause
    most naturally identifies these as the places prepared or designated for the dead
    spirits. Because the exact form is uncertain, the main translation smooths the
    syntax minimally with 'are,' and the uncertainty is noted in a footnote.
