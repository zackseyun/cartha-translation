theological_decisions:
- issue: Whether ኵነኔ should be rendered as 'judgment' or more negatively as 'condemnation'
  chosen_reading: judgment
  alternative_readings:
  - condemnation
  - sentence
  rationale: The immediate context is judicial and eschatological, but the term itself
    need not be narrowed in English beyond 'judgment.' This preserves the source wording
    and avoids importing a more specific doctrinal outcome than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
