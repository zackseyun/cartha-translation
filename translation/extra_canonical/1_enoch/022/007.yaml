translation:
  text: 'And he answered me and said to me, saying: “This is the spirit that came out from Abel, whom Qayin his brother killed; and it makes accusation against him until his seed is destroyed from before the face of the earth, and his seed is blotted out from the seed of men.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The speech formula includes both 'he answered me' and, in this witness, a bracketed 'and said to me.' The English keeps both to reflect the received wording.
    reason: textual_variant
  - marker: b
    text: '''Makes accusation against him'' reflects a judicial sense: Abel''s spirit functions as an accuser crying for judgment, not merely as a narrator of grievance.'
    reason: lexical_alternative
  - marker: c
    text: '''Seed'' is retained twice to preserve the lineage-focused judgment language; ''offspring'' or ''descendants'' would be smoother but less transparent to the repeated wording.'
    reason: lexical_alternative
  - marker: d
    text: Or 'And he answered me and said, while speaking:'.
    reason: previous_rendering
lexical_decisions:
- source_word: አውሥአኒ / ወይቤለኒ
  chosen: he answered me and said
  alternatives:
  - he answered me
  - he said to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse contains both verbs, with one bracketed in the witness. Rendering both preserves the narrative formula without over-smoothing; 'answered me and said' is idiomatic enough in English and reflects the doubled speech introduction.
- source_word: መንፈስ
  chosen: spirit
  alternatives:
  - breath
  - wind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this underworld vision context, the referent is Abel's disembodied spirit/soul-voice rather than literal breath or wind. 'Spirit' best preserves the supernatural and personal sense.
- source_word: ዘወጽአ እምአቤል
  chosen: that came out from Abel
  alternatives:
  - that went forth from Abel
  - that came forth from Abel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A relatively formal rendering preserves the vivid imagery of the spirit proceeding from Abel. 'Came out from' is clear modern English while staying close to the Ge'ez.
- source_word: ዘቀተሎ ቃየን እኁሁ
  chosen: whom Qayin his brother killed
  alternatives:
  - whom Cain, his brother, slew
  - whom his brother Qayin killed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause identifies Abel by the primal murder. 'Qayin' transliterates the name rather than defaulting to inherited English tradition, in keeping with the project's preference for transliterating names from the source tradition.
- source_word: ይሰኪ ኪያሁ
  chosen: it makes accusation against him
  alternatives:
  - it accuses him
  - it brings a complaint against him
  - it petitions against him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The context is judicial and apocalyptic: Abel''s spirit cries out as an accuser. ''Makes accusation against him'' preserves the ongoing legal force better than the flatter ''accuses him.'''
- source_word: እስከ ሶበ
  chosen: until
  alternatives:
  - until the time when
  - up to the point when
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This pair marks temporal continuation. Simple 'until' is sufficient and natural.
- source_word: ይትኀጐል ዘርኡ
  chosen: his seed is destroyed
  alternatives:
  - his offspring is annihilated
  - his descendants perish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes being wiped out or brought to an end. 'Seed' is retained because the verse immediately repeats the term and because the lineage/judgment motif is central.
- source_word: እምቅድመ ገጸ ለምድር
  chosen: from before the face of the earth
  alternatives:
  - from the face of the earth
  - from before the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a stock Semitic-style expression. Keeping 'before the face of the earth' preserves the elevated register and apocalyptic cadence better than reducing it to a purely idiomatic phrase.
- source_word: ይማስን ዘርኡ
  chosen: his seed is blotted out
  alternatives:
  - his seed vanishes
  - his seed is erased
  - his seed comes to an end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The second clause intensifies the first with a near-parallel judgment formula. 'Blotted out' preserves the force of erasure and avoids flattening the repetition.
- source_word: እምዘርአ ሰብእ
  chosen: from the seed of men
  alternatives:
  - from the offspring of men
  - from among humankind
  - from the race of men
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase likely means removal from human posterity. 'Seed of men' keeps the repeated lineage language and the solemn register, though it is slightly formal in English.
