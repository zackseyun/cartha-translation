  from: 'And he answered me and said, while speaking:'
  to: 'And he answered me and said to me, saying:'
  rationale: 'The Ge''ez `ወይቤለኒ` includes the 1cs object suffix (''to me''), which the draft omits. Furthermore, `እንዘ ይብል` is the standard Ge''ez grammaticalized speech introducer (equivalent to Greek λέγων or Hebrew לאמר); rendering it literally as ''while speaking'' is an unnatural over-translation of a standard idiom. ''Saying'' accurately reflects its function and register. | Adjudicator: The reviewer is correct on both points of Ge''ez grammar. The verb `ወይቤለኒ` (wa-yəbela-ni) explicitly includes the first-person singular object suffix (''to me''), which the current translation missed. Ad'
