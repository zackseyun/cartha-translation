theological_decisions:
- issue: Whether Abel's postmortem presence is rendered as 'spirit' or softened to a more generic expression
  chosen_reading: spirit
  alternative_readings:
  - soul
  - voice
  - shade
  rationale: The Ge'ez explicitly uses መንፈስ. In this visionary setting, preserving 'spirit' maintains the text's anthropology and apocalyptic realism rather than domesticating it.
  doctrine_reference: Preserve theological tension rather than resolve it; do not flatten apocalyptic imagery.
- issue: How to render the judgment on Cain's line
  chosen_reading: his seed is destroyed ... his seed is blotted out
  alternative_readings:
  - his descendants perish
  - his posterity is cut off
  rationale: The verse uses repeated seed-language and escalating judgment formulas. Retaining 'seed' preserves the corporate and genealogical dimension of the curse rather than reducing it to generic death.
  doctrine_reference: Consistency of key terms, or documented exception; preserve repeated apocalyptic formulas repeated.
