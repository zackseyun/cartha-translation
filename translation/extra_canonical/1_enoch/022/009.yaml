translation:
  text: And he answered me and said to me, “These three were made so that the spirits of the dead might be separated. And thus it was separated for the spirits of the righteous, where there is a spring of water, and above it light.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Ge''ez repeats the separation language twice: first for ''the spirits of the dead'' generally, then specifically for ''the spirits of the righteous.'' The English preserves this repetition with ''separated'' and ''division.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'a fountain/source of water.' The image is a water-source within the place assigned to the righteous.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'above it light' is terse in the Ge'ez and may describe light resting over the spring or over the righteous division as a whole.
    reason: alternative_reading
  - marker: d
    text: Or 'These three divisions were made'.
    reason: previous_rendering
  - marker: e
    text: Or 'a division has been made'.
    reason: previous_rendering
lexical_decisions:
- source_word: ፫ትገብሩ
  chosen: three divisions were made
  alternatives:
  - three have been made
  - they made three divisions
  - three places were made
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form clearly contains the numeral 'three' and a passive/resultative sense from 'make/do.' In context of the hollow places in Sheol from the preceding verses, 'divisions' best captures distinct compartments rather than merely the number three by itself.
- source_word: ይትፈለጠ / ተፈልጠ
  chosen: might be separated / has been made a division
  alternatives:
  - be divided
  - be set apart
  - be distinguished
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The repeated root governs the verse''s logic: the compartments exist for separation. I preserve the repetition with ''separated'' and ''division'' rather than varying too freely, while allowing idiomatic English syntax.'
- source_word: መንፈሶሙ
  chosen: their spirits / the spirits
  alternatives:
  - souls
  - breaths
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Spirits'' is the most direct rendering and fits the apocalyptic anthropology of the passage. ''Souls'' is possible, but ''spirits'' better matches the repeated Ge''ez term and avoids importing later English theological habits.'
- source_word: ምዉታን
  chosen: the dead
  alternatives:
  - dead ones
  - the deceased
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering that preserves the collective sense without sounding unnatural.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard and contextually appropriate rendering for the morally vindicated group in apocalyptic judgment scenes.
- source_word: ነቅዐ ማይ
  chosen: a spring of water
  alternatives:
  - a fountain of water
  - a source of water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a water-source. 'Spring' is vivid and natural in English while preserving the concrete imagery of a life-giving source in the righteous compartment.
- source_word: በላዕሌሁ ብርሃን
  chosen: above it light
  alternatives:
  - and light above it
  - with light over it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez is terse and image-heavy. I keep the compressed apocalyptic style rather than expanding it into an explanatory clause.
