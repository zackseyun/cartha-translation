theological_decisions:
- issue: Anthropological term for the dead in the underworld compartments
  chosen_reading: spirits of the dead
  alternative_readings:
  - souls of the dead
  rationale: The Ge'ez term is best represented by 'spirits' in this visionary context. This preserves the text's own idiom and avoids smoothing it into more familiar but less precise English religious language.
  doctrine_reference: Translation philosophy §1, §3, §4
- issue: Nature of the righteous compartment
  chosen_reading: a distinct division for the righteous marked by a spring of water and light above it
  alternative_readings:
  - the righteous are themselves the third division
  - the spring/light phrase is purely descriptive rather than locative
  rationale: The syntax most naturally presents a separated place assigned to the righteous, then describes it with two concrete features. The imagery should remain apocalyptic and spatial, not reduced to abstraction.
  doctrine_reference: 'Book context: preserve cosmic imagery; Translation philosophy §3'
