  from: a division has been made
  to: it was separated
  rationale: 'The Ge''ez uses the impersonal passive verb ተፈልጠ (tafalṭa, ''it was separated''), directly repeating the root from ይትፈለጠ (''might be separated'') in the preceding clause. Translating it as a noun phrase (''a division has been made'') obscures the author''s deliberate verbal repetition. | Adjudicator: The reviewer is correct. The Ge''ez text uses the perfect passive verb ተፈልጠ (tafalṭa, ''it was separated''), which directly echoes the preceding imperfect passive ይትፈለጠ (yətfaḷaṭa, ''might be separated'').'
