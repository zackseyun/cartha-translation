translation:
  text: At that time I asked Raphael, the angel who was with me, and I said to him, “This spirit whose voice reaches thus and makes accusation—whose is it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose voice reaches like this and entreats.' The final verb is difficult and may denote supplication or urgent appeal.
    reason: lexical_alternative
  - marker: b
    text: The question asks for the identity of the spirit whose cry is being heard; the next verse identifies it as the spirit of Abel.
    reason: cross_reference
  - marker: c
    text: Or 'At that time I asked Raphael, the angel who was with me, and I said to him, “This spirit whose voice reaches thus and makes petition—whose is it?”'.
    reason: previous_rendering
lexical_decisions:
- source_word: ውእቱ ጊዜ
  chosen: At that time
  alternatives:
  - Then
  - At that moment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal formula in narrative. 'At that time' preserves the elevated apocalyptic register without sounding archaic.
- source_word: ተስእልክዎ
  chosen: I asked
  alternatives:
  - I questioned
  - I inquired of him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb straightforwardly introduces Enoch's question to the interpreting angel. 'Asked' is clear and natural.
- source_word: ለሩፋኤል መልአክ
  chosen: Raphael, the angel
  alternatives:
  - the angel Raphael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The proper name is transliterated, while the title is translated per project philosophy. The appositional order follows the Ge'ez closely.
- source_word: እንዘ ሀሎ ምስሌየ
  chosen: who was with me
  alternatives:
  - while he was with me
  - being with me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative-like construction identifies Raphael as Enoch's present guide. 'Who was with me' is idiomatic and faithful.
- source_word: ዝመንፈስ
  chosen: This spirit
  alternatives:
  - This soul
  - This רוח-like being
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መንፈስ commonly denotes 'spirit.' In this context of the hollow places of the dead, 'spirit' best preserves the anthropological and apocalyptic sense without over-specifying.
- source_word: ዘመኑ
  chosen: whose
  alternatives:
  - of whom
  - that belongs to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Taken as a genitival/relative linkage introducing the identity question about the spirit.
- source_word: ዘከመዝ ቃሉ ይበጽሕ
  chosen: whose voice reaches thus
  alternatives:
  - whose voice goes forth like this
  - whose voice comes this way
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ቃል can mean 'voice' or 'word'; here the audible cry of the spirit is in view, so 'voice' fits better. ይበጽሕ conveys reaching/arriving.
- source_word: ወይሰኪ
  chosen: and makes petition
  alternatives:
  - and entreats
  - and supplicates
  - and accuses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The immediate context is Abel's spirit crying out concerning Cain. A verb of pleading or petitioning fits the Ge'ez form and the narrative setting better than a more interpretive 'accuses,' though the petition has accusatory force.
