  from: At that time I asked Raphael, the angel who was with me, and I said to him, “This spirit whose voice reaches thus and makes petition—whose is it?”
  to: At that time I asked Raphael, the angel who was with me, and I said to him, “This spirit whose voice reaches thus and makes accusation—whose is it?”
  rationale: 'The Ge''ez verb ሰከየ (sakaya) carries a forensic sense of complaining or making an accusation (Dillmann, Lexicon col. 320). The author deliberately repeats this verb in verses 5, 6, and 7 to describe the cry of the dead (specifically Abel against Cain). Translating it as ''makes petition'' in verse 6 breaks the author''s repetition (rendered ''made/makes accusation'' in the draft for vv. 5 and 7) and softens the explicitly forensic nature of the spirit''s cry. | Adjudicator: The reviewer correctly identifies the Ge''ez verb ሰከየ (sakaya), which carries the specific forensic sense of bringing a complaint or accusation, not merely making a petition (Dillmann, Lexicon col. 320'
