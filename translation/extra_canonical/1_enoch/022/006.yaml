theological_decisions:
- issue: Whether መንፈስ should be rendered 'spirit' or 'soul' in the underworld scene
  chosen_reading: spirit
  alternative_readings:
  - soul
  rationale: The Ge'ez term naturally renders 'spirit,' and the verse depicts the disembodied dead in an apocalyptic visionary setting. 'Soul' is possible, but 'spirit' better matches the lexical form and avoids importing later anthropological precision not explicit in the text.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
- issue: How to represent the final verb describing the spirit's cry
  chosen_reading: makes petition
  alternative_readings:
  - entreats
  - supplicates
  - accuses
  rationale: The context suggests an appeal for judgment rather than a neutral cry. 'Makes petition' preserves that judicial-prayer nuance without collapsing it into the more interpretive 'accuses.'
  doctrine_reference: Original-language primacy over translation tradition; preserve apocalyptic/judicial imagery.
