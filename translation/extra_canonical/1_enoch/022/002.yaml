translation:
  text: And there were four hollow places in it, deep and wide and very smooth; three of them were dark, and one was bright, and water was springing up in its midst. And I said, “How smooth these hollow places are, and deep and dark to look at.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic text in this verse is difficult at several points, especially in the description of the hollows as 'smooth.' The sense is likely that the cavities were sheer or polished in appearance.
    reason: lexical_alternative
  - marker: b
    text: Some interpreters understand the phrase about water as referring to a spring or stream located in the middle of the bright hollow.
    reason: alternative_reading
  - marker: c
    text: Or 'deep and very smooth'.
    reason: previous_rendering
lexical_decisions:
- source_word: አርባዕቱ መካናት
  chosen: four hollow places
  alternatives:
  - four places
  - four chambers
  - four cavities
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መካን/መካናት can mean places or locations, but in this visionary description of the interior of the mountain/rock, 'hollow places' best captures spatial recesses rather than generic locations.
- source_word: ዕሙቀ
  chosen: deep
  alternatives:
  - profound
  - sunken
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective denotes depth in a physical sense here, matching the visual description of the cavities.
- source_word: ወርኂበ
  chosen: very smooth
  alternatives:
  - broad
  - wide
  - polished
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The surrounding clause and the later repetition with ልሙጽ point toward smoothness/slipperiness rather than width. 'Very smooth' preserves the intensifying descriptive force.
- source_word: ልሙጸ / ልሙጽ
  chosen: smooth
  alternatives:
  - slippery
  - polished
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term likely describes the sheer, worn, or polished character of the hollows. 'Smooth' is natural English and preserves the concrete visual image without overinterpreting.
- source_word: ጥቀ
  chosen: in it
  alternatives:
  - there
  - within it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase locates the four hollows within the previously described structure. 'In it' keeps the anaphoric reference without forcing a more specific noun than the verse supplies.
- source_word: ጸልማት
  chosen: dark
  alternatives:
  - darkness-filled
  - gloomy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A simple adjectival rendering fits the repeated visual contrast with the one bright hollow.
- source_word: ብርህት
  chosen: bright
  alternatives:
  - light
  - luminous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word marks the one hollow as characterized by light. 'Bright' works idiomatically in contrast to 'dark.'
- source_word: ነቅዐ ማይ
  chosen: water was springing up
  alternatives:
  - a spring of water
  - water gushed out
  - water was flowing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase suggests water issuing forth or bubbling up, not merely static water present there. 'Was springing up' preserves the active image.
- source_word: በማእከላ
  chosen: in its midst
  alternatives:
  - in the middle of it
  - at the center
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the elevated but readable register suitable for apocalyptic narrative.
- source_word: ለነጽሮ
  chosen: to look at
  alternatives:
  - for seeing
  - to behold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The infinitive expresses visual apprehension. 'To look at' is clear modern English while preserving the observational tone of the vision report.
