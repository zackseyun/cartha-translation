theological_decisions:
- issue: Scope of 'judgment of all'
  chosen_reading: Rendered broadly as 'the judgment of all' rather than 'the punishment of all.'
  alternative_readings:
  - the punishment of all
  - the sentence of all
  rationale: The Ge'ez noun can bear a judicial sense that includes but is not limited to punishment. In this chapter Enoch asks about differentiated postmortem places and their judicial basis, so the broader term better preserves the text's tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
