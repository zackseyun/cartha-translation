lexical_decisions:
- source_word: ውእተ ጊዜ
  chosen: at that time
  alternatives:
  - then
  - at that moment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal formula in narrative/apocalyptic discourse. 'At that time' preserves the elevated register and sequence of the vision.
- source_word: ተስእልኩ
  chosen: I asked
  alternatives:
  - I inquired
  - I questioned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple first-person past verb of asking/inquiring. 'I asked' is clear modern English; the object of inquiry is supplied by the following prepositional phrases.
- source_word: በእንቲአሁ / በእንተ
  chosen: concerning
  alternatives:
  - about
  - regarding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated preposition marks the topics of Enoch's inquiry. 'Concerning' keeps the formal, report-like tone better than the more casual 'about'.
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - sentence
  - condemnation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context of the compartments of the dead and their destinies, 'judgment' best captures the broad judicial sense without prematurely narrowing it to condemnation alone.
- source_word: ኵሉ
  chosen: of all
  alternatives:
  - of everyone
  - of the whole
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Taken with ''judgment'' as a comprehensive statement: the judgment pertaining to all. This fits the universalizing scope of the question.'
- source_word: ምንት
  chosen: for what reason
  alternatives:
  - why
  - for what
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The interrogative asks the reason for the separation. 'For what reason' preserves the explanatory force and slightly elevated style.
- source_word: ተፈልጡ
  chosen: were separated
  alternatives:
  - were divided
  - were set apart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive sense suits the scene of distinct hollows/compartments for the dead. 'Separated' is broad enough to cover spatial and judicial distinction.
- source_word: ፩እምነ ፩
  chosen: one from another
  alternatives:
  - one from the other
  - from one another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An idiomatic reciprocal expression. 'One from another' preserves the formal cadence and clearly expresses mutual separation.
