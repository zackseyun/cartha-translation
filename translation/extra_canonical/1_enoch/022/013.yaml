theological_decisions:
- issue: Whether to render the verse as describing creation or assignment of a postmortem
    lot
  chosen_reading: assignment/appointment of a fate or place for the wicked souls
  alternative_readings:
  - creation of the souls themselves
  - general statement about the existence of wicked souls
  rationale: The immediate context in 1 Enoch 22 concerns hollow places prepared for
    the dead and differentiated judgment destinies. Rendering the verb as 'appointed'
    fits the local discourse better than a statement about ontological creation.
  doctrine_reference: Translation philosophy §1 Original-language primacy; §3 Preserve
    theological tension rather than resolve it
- issue: How strongly to specify the final clause
  chosen_reading: retain ambiguity about whether the souls are 'with' the lawless
    or 'like' them
  alternative_readings:
  - their souls will perish with them
  - their souls will be punished like them
  - they will become like the accursed
  rationale: The Ethiopic wording is compressed and uncertain. The translation keeps
    the relational language without importing a more specific doctrine of annihilation
    or punishment than the witness warrants.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
