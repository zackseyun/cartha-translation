translation:
  text: And thus it has been made for the souls of the people who are not righteous,
    but sinners, who are complete in transgression, and they will be with the lawless
    like them. But as for their souls...
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic verb can be understood as 'has been made/prepared/appointed.'
      In this context of designated places for the dead, 'appointed' is preferred.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult. It may mean 'they will be with the lawless,'
      'they will be like them,' or some combination of both.
    reason: alternative_reading
  - marker: c
    text: Or 'the children of men'.
    reason: previous_rendering
  - marker: d
    text: Or '—and their souls as well.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተፈጥረ
  chosen: has been appointed
  alternatives:
  - has been made
  - has been prepared
  - has been created
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of Sheol compartments and postmortem destinies, the verb likely
    carries the sense of something established or assigned rather than physical creation.
    'Appointed' preserves that functional sense in English.
- source_word: ለነፍሶሙ
  chosen: for the souls of them
  alternatives:
  - for their souls
  - to their souls
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dative-lamed construction indicates what has been appointed/prepared
    for these souls. Smoothed in the main translation as 'for the souls of...'.
- source_word: ለሰብእ
  chosen: the children of men
  alternatives:
  - human beings
  - men
  - humankind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This apocalyptic idiom is elevated and traditional in Enochic style.
    'Children of men' preserves the register better than the flatter 'human beings'.
- source_word: ኢኮኑ ጻድቃነ አላ ኃጥኣነ
  chosen: who are not righteous, but sinners
  alternatives:
  - who were not righteous, but sinful
  - who are not just, but guilty
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The contrast between righteous and sinners is a key Enochic moral category
    and should be preserved directly.
- source_word: ፍጹማነ እበሳ
  chosen: complete in transgression
  alternatives:
  - perfect in sin
  - full of offense
  - consummate in wrongdoing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ፍጹም can mean complete/full/finished; paired with a sin-term it intensifies
    their wickedness. 'Complete in transgression' is idiomatic without softening the
    force.
- source_word: አባሲያን
  chosen: the lawless
  alternatives:
  - transgressors
  - the impious
  - the wicked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term appears to denote those marked by impiety or lawlessness. 'Lawless'
    keeps the judicial-apocalyptic tone and distinguishes it from the earlier general
    term 'sinners'.
- source_word: ይከውኑ ከማሆሙ
  chosen: will be with ... like them
  alternatives:
  - will be as they are
  - will become like them
  - will be joined with them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult, but it seems to express association or correspondence
    with the lawless. 'Will be with the lawless like them' preserves the ambiguity
    rather than over-resolving it.
- source_word: ወነፍሶሙሰ
  chosen: and their souls as well
  alternatives:
  - and also their souls
  - even their souls
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The enclitic ending adds an emphatic/additive sense. The phrase is awkward
    in English because the Ethiopic line itself is compressed; 'as well' preserves
    the additive force.
