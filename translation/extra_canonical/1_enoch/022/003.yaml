translation:
  text: 'And at that time Raphael, one of the holy angels who was with me, answered and said to me, “And at that time Raphael, one of the holy angels who was with me, answered and said to me, “These hollow places were made so that the spirits—the souls of the dead—might be gathered into them. For this purpose they were created here: that they might gather all the souls of the children of men.” were made so that the spirits—the souls of the dead—might be gathered into them. For this purpose they were created here: that they might gather all the souls of the children of men.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'good places' or 'fair places'; the adjective can denote moral goodness or pleasing beauty.
    reason: lexical_alternative
  - marker: b
    text: The verse uses both 'spirits' and 'souls,' likely in apposition rather than as sharply distinct categories.
    reason: lexical_alternative
  - marker: c
    text: Or 'These beautiful places'.
    reason: previous_rendering
lexical_decisions:
- source_word: አውሥአ
  chosen: answered
  alternatives:
  - responded
  - spoke
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly introduces a reply in narrative speech. 'Answered' preserves the dialogic setting before 'said to me.'
- source_word: ቅዱሳን መላእክት
  chosen: holy angels
  alternatives:
  - sacred angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard apocalyptic designation; 'holy angels' preserves the set phrase and its theological weight.
- source_word: ዝመካናት
  chosen: these ... places
  alternatives:
  - these locations
  - these regions
  - these chambers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term points to places/locations. In context of hollow compartments for the dead, 'places' is broad enough to preserve the imagery without over-specifying architecture.
- source_word: ሰናያት
  chosen: beautiful
  alternatives:
  - good
  - fair
  - pleasant
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective can mean good/fair/beautiful. 'Beautiful' fits the visionary description of the prepared places while retaining the positive evaluative sense.
- source_word: ይትጋብኡ
  chosen: might be gathered
  alternatives:
  - might assemble
  - might be collected
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive or reflexive gathering sense best fits the spirits being brought into designated places. It also matches the repeated gathering motif in the verse.
- source_word: ዲቤሆን
  chosen: into them
  alternatives:
  - upon them
  - in them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can be broad, but with places receiving spirits, English idiom favors 'into them' to express movement toward enclosure.
- source_word: መናፍስት
  chosen: spirits
  alternatives:
  - breaths
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this underworld context the term refers to disembodied spirits, not merely breath.
- source_word: ለነፍሶሙ ለምዉታን
  chosen: the souls of the dead
  alternatives:
  - their souls, the dead
  - the persons of the dead
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The appositional construction clarifies what sort of spirits are meant. Rendering both terms preserves the text's dual vocabulary rather than collapsing it to one English word.
- source_word: ሎቱ ዝንቱ
  chosen: For this purpose
  alternatives:
  - for him this
  - to this end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Idiomatic purposive sense fits the explanatory statement that follows.
- source_word: ተፈጥሩ
  chosen: were created
  alternatives:
  - were made
  - were formed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A creation/forming verb is explicit; 'were created' preserves the intentionality of these places in the visionary order.
- source_word: ያስተጋብኡ
  chosen: they might gather
  alternatives:
  - they might bring together
  - they might collect
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Causative/intensive nuance suggests active gathering. The subject is most naturally the places as appointed receptacles, expressed idiomatically in English.
- source_word: ኵሎ ነፍሰ ውሉደ ሰብእ
  chosen: all the souls of the children of men
  alternatives:
  - every soul of the sons of men
  - all human souls
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the collective and the traditional anthropological phrase without flattening it to generic 'humanity.'
