theological_decisions:
- issue: Relationship between 'spirits' and 'souls of the dead'
  chosen_reading: 'Render both terms appositionally: ''the spirits—the souls of the dead'''
  alternative_readings:
  - Render only 'spirits of the dead'
  - Treat 'souls' as redundant and omit one term in English
  rationale: The Ge'ez uses both መናፍስት and ነፍሶሙ/ነፍሰ. Preserving both reflects the text's anthropological language and avoids smoothing away a significant conceptual pairing in this underworld scene.
  doctrine_reference: Preserve theological tension rather than resolve it; document ambiguity rather than flatten it.
- issue: Scope of 'children of men'
  chosen_reading: Retain the idiom 'children of men'
  alternative_readings:
  - '''human beings'''
  - '''mankind'''
  rationale: The phrase is a stock ancient anthropological expression in apocalyptic literature. Keeping it preserves register and avoids over-modernizing the visionary speech.
  doctrine_reference: Readable modern English, not archaic or academic — but preserve gravity and local phrasing where significant.
