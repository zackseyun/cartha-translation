  rationale: 'Adjudicator-modified: The reviewer is entirely correct. The Ge''ez text reads ሰናያት (sanāyāt, ''beautiful''), which is a well-documented translation error from the Greek text of the Book of the Watchers. The extant Greek reads κοῖλοι (''hollow''), which the Ge''ez translator misread or misheard as καλοί (''beautiful''). Given the context of deep, dark pits described in 22:1-2, ''hollow'' is the correct original reading. Emending to ''hollow places'' restores the author''s intent and maintains consistency with the preceding verses.'
