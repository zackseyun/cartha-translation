translation:
  text: And from there I went to another place, and he showed me in the west a great
    and high mountain, and hard rock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The description may be read as a mountain that is both great and lofty;
      the Ge'ez preserves both qualities rather than reducing them to a single adjective.
    reason: lexical_alternative
  - marker: b
    text: The final phrase can also be rendered 'solid rock' or 'firm rock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እምህየ
  chosen: from there
  alternatives:
  - thence
  - from that place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks movement from the previous visionary location; 'from there' is
    natural modern English while preserving the spatial transition.
- source_word: ሖርኩ
  chosen: I went
  alternatives:
  - I traveled
  - I journeyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple past movement verb in first person; 'I went' preserves the direct
    narrative style without adding nuance not required by the Ge'ez.
- source_word: ካልአ መካነ
  chosen: to another place
  alternatives:
  - to a second place
  - to another location
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates a different place from the prior scene. 'Another
    place' is idiomatic and sufficiently formal.
- source_word: አርአየኒ
  chosen: he showed me
  alternatives:
  - he caused me to see
  - he revealed to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common visionary-report verb. 'He showed me' preserves the apocalyptic
    guided-tour formula without overinterpreting the agent's revelatory role.
- source_word: በምዕራብ
  chosen: in the west
  alternatives:
  - toward the west
  - in the western region
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locative directional phrase; 'in the west' is concise and fits the visionary
    geography.
- source_word: ደብረ ዐቢየ ወነዋኅ
  chosen: a great and high mountain
  alternatives:
  - a great lofty mountain
  - a large and elevated mountain
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ደብር is 'mountain'; ዐቢየ gives greatness, and ነዋኅ here is best taken as
    height/loftiness. 'Great and high' preserves the doubled descriptive force rather
    than collapsing it into one adjective.
- source_word: ኵኵሐ ጽኑዐ
  chosen: hard rock
  alternatives:
  - solid rock
  - firm rock
  - a strong cliff
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes rock characterized by strength/solidity. 'Hard rock'
    keeps the tactile, physical quality and the stark apocalyptic landscape imagery.
