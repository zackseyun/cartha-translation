theological_decisions:
- issue: Whether to make the guiding subject explicit as an angel
  chosen_reading: Retain the simple pronoun sense in 'he showed me' without specifying
    'the angel.'
  alternative_readings:
  - the angel showed me
  - my guide showed me
  rationale: The Ge'ez verb includes only the third-person masculine subject; the
    immediate context may imply an angelic guide, but the verse itself does not name
    him. Transparency requires not importing the noun into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
