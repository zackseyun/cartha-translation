translation:
  text: And there my eyes saw the hidden treasuries of the lightning and the thunder, and the hidden treasuries of the winds—how they are divided so that they may blow upon the earth—and the hidden treasuries of the clouds and the dew; and there I saw from where they come forth in that place, and from there the dust of the earth is saturated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'storehouses' for 'hidden treasuries.' The Ge'ez term can denote hidden or reserved places/things; the translation keeps the cosmic-repository imagery.
    reason: lexical_alternative
  - marker: b
    text: Literally 'their mouths are divided,' an anthropomorphic image for the outlets or openings of the winds.
    reason: lexical_alternative
  - marker: c
    text: The final clause may mean either that these phenomena 'saturate' the dust of the earth or that from there the earth's dust/soil 'is filled.' The main text adopts the more active reading.
    reason: alternative_reading
  - marker: d
    text: Or 'how their mouths are divided'.
    reason: previous_rendering
  - marker: e
    text: Or 'they saturate the dust of the earth'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኅቡኣተ
  chosen: hidden treasuries
  alternatives:
  - hidden things
  - storehouses
  - secret places
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this visionary-cosmic context the term points not merely to things concealed but to reserved cosmic repositories. 'Treasuries' preserves the apocalyptic image of stored natural forces better than the flatter 'hidden things.'
- source_word: መብረቅት
  chosen: lightning
  alternatives:
  - lightnings
  - flashes of lightning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural form can be represented collectively in English as 'lightning.' This keeps the natural-force imagery without awkward English pluralization.
- source_word: ነጐድጓድ
  chosen: thunder
  alternatives:
  - thunders
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as the natural phenomenon in collective singular English, paired with 'lightning' in a standard but still vivid way.
- source_word: ነፋሳት
  chosen: winds
  alternatives:
  - spirits
  - blasts of wind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although the word can overlap semantically with 'spirits,' the immediate context is meteorological and cosmological, with blowing upon the earth; 'winds' is therefore the locally grounded sense.
- source_word: አፎ
  chosen: their mouths
  alternatives:
  - their openings
  - their outlets
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The anthropomorphic image should be preserved in apocalyptic prose. 'Mouths' is more concrete and faithful than smoothing to 'openings,' though the latter reflects the functional sense.
- source_word: ይትከፈሉ
  chosen: are divided
  alternatives:
  - are opened
  - are apportioned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This likely describes the distribution or partition of the winds' outlets. 'Are divided' keeps the literal image while allowing the following purpose clause to explain function.
- source_word: ከመ ይንፍሑ ዲበ ምድር
  chosen: so that they may blow upon the earth
  alternatives:
  - that they might breathe over the earth
  - to blow on the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses purpose or result. 'Blow upon the earth' is idiomatic and preserves the active force of the winds.
- source_word: ደመናት
  chosen: clouds
  alternatives:
  - cloud masses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward meteorological term; no need to embellish.
- source_word: ጠል
  chosen: dew
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering, preserving the pairing with clouds as sources of moisture.
- source_word: እምኀበ ይመጽእ
  chosen: from where they come forth
  alternatives:
  - whence they come
  - from where it comes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural is preferred because the antecedents are the clouds and dew, or the meteorological phenomena just listed more broadly. 'Come forth' suits visionary register better than the more prosaic 'come.'
- source_word: ይፀግቡ ጸበለ ምድር
  chosen: they saturate the dust of the earth
  alternatives:
  - they moisten the dust of the earth
  - the dust of the earth is filled from them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests filling or satisfying, and with dust/soil as object the sense is moistening to fullness. 'Saturate' is vivid and natural in English while preserving the concrete earth imagery; 'dust' is retained rather than generalized to 'ground.'
