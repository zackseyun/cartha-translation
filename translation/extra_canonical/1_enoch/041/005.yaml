theological_decisions:
- issue: Whether the luminaries are described in purely astronomical terms or in covenantal/moral
    language
  chosen_reading: 'Retain explicitly theological language: ''blessed'' and ''keep
    faith ... by an oath.'''
  alternative_readings:
  - Render in neutral astronomical language such as 'regular' and 'keep to their agreement'
  rationale: The Ge'ez uses religiously charged terms, and apocalyptic cosmology often
    portrays creation as obedient to divine order. Flattening this into neutral mechanics
    would undersell the theological texture of the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    flatten apocalyptic imagery.
