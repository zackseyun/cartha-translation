translation:
  text: And I saw the storehouses of the sun and of the moon—where they come out and
    where they go in—and their glorious return; and one is more honored than the other.
    And their course is blessed, and they do not overstep their course, and they do
    not add to it, and they do not take away from their course; and they keep faith
    with one another by an oath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'treasuries.' The image is of heavenly chambers from which the sun and
      moon emerge and into which they return.
    reason: lexical_alternative
  - marker: b
    text: The clause 'one is more honored than the other' is difficult; it likely
      compares the relative splendor or rank of the sun and the moon.
    reason: alternative_reading
  - marker: c
    text: '''Keep faith with one another by an oath'' uses covenantal language for
      the ordered behavior of the heavenly bodies, not merely mechanical regularity.'
    reason: cultural_note
lexical_decisions:
- source_word: መዛግብተ
  chosen: storehouses
  alternatives:
  - treasuries
  - repositories
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes treasuries or storehouses. In apocalyptic cosmology
    it evokes heavenly chambers from which luminaries emerge, so 'storehouses' preserves
    the concrete cosmic imagery without sounding overly financial.
- source_word: ይወፅኡ / ይገብኡ
  chosen: come out / go in
  alternatives:
  - go forth / enter
  - rise / set
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbs are basic motion terms. 'Come out' and 'go in' preserve the
    visionary image of luminaries emerging from and returning to cosmic chambers;
    'rise' and 'set' would interpret the imagery too narrowly.
- source_word: ግብኦቶሙ
  chosen: return
  alternatives:
  - entrance
  - going in
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the same semantic field as entering/coming in. In context, after
    'where they come out and where they go in,' this likely summarizes their cyclical
    re-entry or return. 'Return' reads naturally while preserving the cyclical sense.
- source_word: ስቡሕ
  chosen: glorious
  alternatives:
  - splendid
  - honored
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This adjective carries the sense of glory, praise, or splendor. 'Glorious'
    fits the elevated register and links well with the cosmic majesty of the luminaries'
    movement.
- source_word: አፎ ይከብር አሐዱ ለካልኡ
  chosen: one is more honored than the other
  alternatives:
  - one surpasses the other in honor
  - the appearance of one is more glorious than the other
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is somewhat difficult, but the core idea is comparative honor/glory
    between sun and moon. 'One is more honored than the other' preserves the comparative
    force without overcommitting to a more speculative reading of አፎ.
- source_word: ምሕዋሮሙ
  chosen: their course
  alternatives:
  - their circuit
  - their path
  - their orbit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term refers to movement, circuit, or course. 'Course' is idiomatic
    and suitably broad for celestial motion, while 'orbit' would sound too modern
    and technical.
- source_word: ብፁዕ
  chosen: blessed
  alternatives:
  - fortunate
  - favored
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective regularly means blessed. Retaining 'blessed' preserves
    the text's theological register, where cosmic order is not merely mechanical but
    divinely ordered.
- source_word: ኢየኃልፉ ምሕዋረ
  chosen: they do not overstep their course
  alternatives:
  - they do not pass beyond their course
  - they do not transgress their circuit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The negative plus verb of passing beyond suggests not exceeding appointed
    bounds. 'Overstep' communicates both spatial and ordered-boundary nuance.
- source_word: ኢይዌስኩ ወኢያኃጽጹ
  chosen: they do not add to it, and they do not take away from their course
  alternatives:
  - they do not increase or diminish
  - they neither augment nor lessen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs express neither increase nor reduction. The English
    keeps the repetitive structure and ties both actions to the appointed course.
- source_word: ሃይማኖተ የዐቅቡ
  chosen: they keep faith
  alternatives:
  - they keep fidelity
  - they preserve trustworthiness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although later usage can suggest 'faith' in a doctrinal sense, here the
    meaning is fidelity/faithfulness. 'Keep faith' is concise, idiomatic, and preserves
    covenantal overtones appropriate to cosmic obedience.
- source_word: በመሐላ
  chosen: by an oath
  alternatives:
  - with an oath
  - under oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes oath or swearing. 'By an oath' fits the instrumental
    sense and preserves the solemn, ordered character of the luminaries' mutual fidelity.
