theological_decisions:
- issue: Identity of 'the holy ones'
  chosen_reading: Rendered broadly as 'the holy ones' without specifying humans or
    angels.
  alternative_readings:
  - the saints
  - the angels
  - the righteous holy ones
  rationale: In the Parables, the term can overlap with heavenly beings or sanctified
    people depending on context. This verse contrasts locations of sinners and holy
    ones, but the Ge'ez here does not force a narrower identification. Preserving
    the broader term maintains the text's ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of 'deny the name of the Lord of Spirits'
  chosen_reading: Kept as denial of the divine name rather than generalized unbelief.
  alternative_readings:
  - who do not confess the Lord of Spirits
  - who reject the Lord of Spirits
  rationale: The Ge'ez explicitly includes 'the name of,' which carries covenantal
    and authority-laden significance. This should not be flattened into a generic
    statement about disbelief.
