translation:
  text: There I saw the dwelling places of the sinners and the dwelling places of
    the holy ones; and there my eyes saw all the sinners being driven away from there—those
    who deny the name of the Lord of Spirits—and they were being dragged off, and
    they could not stand because of the punishment that goes out from the Lord of
    Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their habitations' / 'their abodes.' The Ge'ez repeats the same noun
      for both groups, emphasizing distinct places assigned within the vision.
    reason: lexical_alternative
  - marker: b
    text: '''The holy ones'' may refer to sanctified people, heavenly beings, or both;
      the Ge''ez does not make the referent explicit here.'
    reason: alternative_reading
  - marker: c
    text: The clause rendered 'they had no standing' is idiomatic and may also mean
      'they could not remain' or 'there was no place for them to stand' under the
      punishment issuing from the Lord of Spirits.
    reason: lexical_alternative
  - marker: d
    text: Or 'they had no standing'.
    reason: previous_rendering
lexical_decisions:
- source_word: መኃድሪሆሙ
  chosen: their dwelling places
  alternatives:
  - their habitations
  - their abodes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes places of dwelling or habitation. 'Dwelling places'
    preserves the concrete spatial imagery of the vision better than the more literary
    'abodes,' while keeping the plural repeated as in the Ge'ez.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - the sinful
  - wrongdoers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is a standard moral designation, and 'sinners' best preserves
    the apocalyptic contrast with 'the holy ones' in this verse.
- source_word: ቅዱሳን
  chosen: the holy ones
  alternatives:
  - the saints
  - the consecrated ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Enochic literature this term often refers to holy beings or sanctified
    persons. 'Holy ones' is the broadest and least overdetermined rendering; 'saints'
    would import later ecclesial associations.
- source_word: ይሰደዱ
  chosen: being driven away
  alternatives:
  - being expelled
  - being chased away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/imperfect sense suggests forcible removal. 'Being driven
    away' preserves both the motion and the judicial force of expulsion.
- source_word: ይክሕድዎ ለስመ
  chosen: deny the name of
  alternatives:
  - reject the name of
  - disown the name of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means deny or repudiate. Retaining 'the name of' preserves the
    biblical-theological weight of repudiating divine authority, rather than reducing
    it to disbelief in God generally.
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed Enochic divine title. 'Lord of Spirits' is the established
    transparent rendering and avoids unnecessary awkwardness while preserving the
    title's distinctiveness.
- source_word: ይስሐቡ
  chosen: they were being dragged off
  alternatives:
  - they were being hauled away
  - they were being pulled away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys being drawn or dragged. 'Dragged off' fits the punitive
    context and keeps the vivid apocalyptic force.
- source_word: ቀዊመ አልቦሙ
  chosen: they had no standing
  alternatives:
  - they could not stand
  - there was no place for them to stand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the phrase indicates absence of standing or continuance. 'They
    had no standing' preserves both the physical and judicial nuance, though the line
    is somewhat idiomatic.
- source_word: መቅሠፍት
  chosen: punishment
  alternatives:
  - plague
  - affliction
  - torment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote a blow, scourge, plague, or punitive affliction.
    In this judgment scene, 'punishment' best captures the judicial sense without
    narrowing the form of the penalty.
- source_word: ትወጽእ እምእግዚአ መናፍስት
  chosen: that goes out from the Lord of Spirits
  alternatives:
  - that proceeds from the Lord of Spirits
  - that comes forth from the Lord of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal image is dynamic and should be preserved. 'Goes out from'
    keeps the sense of punishment issuing forth from the divine source.
