lexical_decisions:
- source_word: መዛግብተ
  chosen: storehouses
  alternatives:
  - treasuries
  - repositories
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural noun denotes stored reserves or chambers. 'Storehouses' preserves the concrete apocalyptic image better than the more abstract 'repositories'; 'treasuries' is possible but can sound monetary in modern English.
- source_word: ፀዳዋነ
  chosen: lightning
  alternatives:
  - flashes
  - lightnings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this meteorological context the term most naturally refers to lightning. Singular collective English reads smoothly while preserving the cosmic-weather imagery.
- source_word: ይትከፈሉ
  chosen: are apportioned
  alternatives:
  - are divided
  - are distributed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense suggests assignment or distribution from the heavenly storehouses. 'Are apportioned' keeps the sense of ordered allocation rather than mere physical splitting.
- source_word: ነፋስ
  chosen: winds
  alternatives:
  - wind
  - spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the surrounding weather terms, the meteorological sense is primary here. 'Spirits' would import ambiguity not demanded by the immediate context.
- source_word: በረድ
  chosen: hail
  alternatives:
  - hailstones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward weather term; 'hail' is idiomatic and sufficiently concrete.
- source_word: ጊሜ
  chosen: mist
  alternatives:
  - frost
  - hoarfrost
  - dew
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The reading is difficult and the exact meteorological referent is uncertain in this witness. 'Mist' fits the immediate pairing with cloud language, but alternatives remain possible and should be footnoted.
- source_word: ዘደመና / ወደመና ዚአሁ
  chosen: its cloud and the cloud thereof
  alternatives:
  - the cloud of it and its cloud
  - its cloud-mass and its cloud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is repetitive and somewhat opaque in the OCR witness. I preserve the duplication rather than smoothing it away, since apocalyptic catalogues often retain such parallelism and the exact referent is uncertain.
- source_word: የኀድር
  chosen: remain
  alternatives:
  - dwells
  - abides
  - rests
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys abiding or staying. 'Remain' is natural in English while preserving the sense of continued presence.
- source_word: እምቅድመ ዓለም
  chosen: from before the world
  alternatives:
  - from before the age
  - since before the world
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the primordial temporal force of the phrase without over-interpreting whether it means creation, the present age, or eternity in a later theological sense.
