theological_decisions:
- issue: Meaning of the clause about the kingdom
  chosen_reading: a cosmic kingdom/order is seen as divided or apportioned
  alternative_readings:
  - the heavenly kingdom is distributed among orders
  - the dominion is distinguished in its parts
  rationale: The Ge'ez is terse and somewhat difficult in this Ge'ez-only section.
    'Is divided' preserves the wording without overexplaining the cosmology.
  doctrine_reference: Preserve theological tension rather than resolve it.
