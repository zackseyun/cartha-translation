translation:
  text: And after this I saw all the hidden things of the heavens, and how the kingdom
    is divided, and how the deeds of human beings are weighed in the balance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the secrets of the heavens.' The Ge'ez term can denote things hidden
      from ordinary sight or knowledge.
    reason: lexical_alternative
  - marker: b
    text: The clause 'how the kingdom is divided' is difficult. It may refer to the
      ordering or apportionment of the heavenly realm.
    reason: alternative_reading
  - marker: c
    text: Literally, the text speaks of human activity being weighed with balance
      imagery, suggesting judgment or assessment.
    reason: cultural_note
lexical_decisions:
- source_word: እምድኅረዝ
  chosen: after this
  alternatives:
  - afterward
  - after these things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal transition formula in visionary narrative; 'after this' preserves
    apocalyptic sequence in readable English.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I looked
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary verb; 'I saw' is direct and preserves
    report style without archaizing.
- source_word: ኵሎ ኅቡኣቲሁ ለሰማያት
  chosen: all the hidden things of the heavens
  alternatives:
  - all the secrets of heaven
  - all its hidden things of the heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኅቡኣት conveys hidden or secret things. 'Hidden things' keeps the concrete
    plural and avoids over-systematizing into abstract 'mysteries,' while 'of the
    heavens' reflects the genitival construction.
- source_word: መንግሥተ
  chosen: the kingdom
  alternatives:
  - the dominion
  - the reign
  - the royal order
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes kingdom or reign. 'Kingdom' best preserves
    the cosmic-political sense in this apocalyptic context.
- source_word: እፎ
  chosen: how
  alternatives:
  - in what way
  - that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the content of what Enoch saw; 'how' naturally governs the
    following verbal clauses.
- source_word: ትትካፈል
  chosen: is divided
  alternatives:
  - is apportioned
  - is distributed
  - is shared out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/reflexive sense of division or apportionment. 'Is divided' is
    the most transparent default, while leaving open whether the sense is distributive
    or partitioning.
- source_word: ትገበረ ሰብእ
  chosen: the deeds of human beings
  alternatives:
  - what is done by men
  - the works of people
  - human conduct
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause points to what humans do rather than humanity in the abstract.
    Rendering the implied object as 'deeds' makes the weighing imagery intelligible
    in English without excessive paraphrase.
- source_word: በመዳልው
  chosen: in the balance
  alternatives:
  - on the scales
  - by the measure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term evokes weighing apparatus or balance imagery. 'In the balance'
    preserves the judgment image in idiomatic but still concrete English.
- source_word: ይደለው
  chosen: are weighed
  alternatives:
  - are measured
  - are assessed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the preceding balance imagery, 'are weighed' best fits the judicial-apocalyptic
    metaphor and avoids flattening to a generic evaluation.
