theological_decisions:
- issue: Whether ቃለ ዕረፍት should be rendered with a more interpretive theological term
  chosen_reading: the voice of rest
  alternative_readings:
  - the voice of peace
  - the word of consolation
  rationale: The Ge'ez points first to 'rest/repose' rather than a generalized peace
    or consolation. Retaining 'rest' preserves the text's own promise of relief without
    harmonizing to later familiar religious phrasing.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
