translation:
  text: But you, do not fear—you who have suffered—for healing will come to you, and
    a bright light will shine for you, and you will hear the voice of rest from heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be afraid, you who are in affliction'; the Ge'ez phrase can denote
      those suffering pain or distress more broadly.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the voice/word of rest.' The expression is kept close to the
      Ge'ez rather than paraphrased as 'peace' or 'comfort.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ኢትፍርሁ
  chosen: do not fear
  alternatives:
  - do not be afraid
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative imperative plural addressed directly to the audience; 'do not
    fear' preserves the elevated apocalyptic register and concise force.
- source_word: እለ ሐመምክሙ
  chosen: you who have suffered
  alternatives:
  - you who are in pain
  - you whose affliction has come
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies the addressees as those marked by suffering/affliction.
    'Have suffered' reads naturally in English while preserving the condition of endured
    distress rather than narrowing it to physical pain alone.
- source_word: ፈውስ
  chosen: healing
  alternatives:
  - remedy
  - recovery
  - cure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes healing or restoration. 'Healing' keeps both bodily
    and broader restorative resonance, fitting the consolation context without over-specifying.
- source_word: ይከውነክሙ
  chosen: will come to you
  alternatives:
  - will be for you
  - will happen for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally has a broad sense of becoming/being/happening. In
    idiomatic English with 'healing' as subject, 'will come to you' best conveys the
    promised arrival of restoration.
- source_word: ብርሃነ ብሩህ
  chosen: a bright light
  alternatives:
  - shining light
  - radiant light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The doubled light imagery is emphatic. 'A bright light' preserves the
    image without awkward redundancy, while still signaling intensified brightness.
- source_word: ያበርህ ለክሙ
  chosen: will shine for you
  alternatives:
  - will shine upon you
  - will give light to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is causative/illuminative. 'Will shine for you' is a natural
    rendering of the dative phrase and keeps the promise personal without importing
    later idioms.
- source_word: ቃለ ዕረፍት
  chosen: the voice of rest
  alternatives:
  - a voice of peace
  - the word of rest
  - the sound of repose
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'voice/word of rest.' 'Voice of rest' preserves the auditory
    imagery and the noun's apocalyptic concreteness. 'Peace' would be interpretive
    and less textually anchored.
- source_word: እምሰማይ
  chosen: from heaven
  alternatives:
  - from the heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular is idiomatic in English and suits the revelatory source
    of the consoling voice.
