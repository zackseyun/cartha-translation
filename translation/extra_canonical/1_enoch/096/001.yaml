theological_decisions:
- issue: Nature of the righteous ones' future relation to sinners
  chosen_reading: The verse promises the righteous real authority over the judged
    sinners, not merely vindication in a general sense.
  alternative_readings:
  - The phrase could be softened to mean moral triumph or public vindication rather
    than actual authority.
  rationale: The explicit noun ሥልጣን ('authority') plus the phrase 'over them' points
    to more than emotional comfort; the apocalyptic reversal of status is part of
    the verse's judgment logic. The translation preserves that tension without specifying
    the exact mode of rule.
  doctrine_reference: Preserve theological tension rather than resolve it.
