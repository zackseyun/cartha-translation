translation:
  text: Hope, you righteous, for the sinners will swiftly be destroyed from before
    you, and authority over them will be yours, according to your desire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be hopeful, righteous ones.' The opening imperative directly addresses
      the righteous.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from before you,' preserving the image of sinners being removed
      from the righteous one's presence.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'authority over them' expresses an apocalyptic reversal in which
      the righteous are granted rule over those now judged.
    reason: cultural_note
lexical_decisions:
- source_word: ተስፈዉ
  chosen: Hope
  alternatives:
  - Be hopeful
  - Take hope
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plural from the root for hoping/trusting. 'Hope' keeps the
    direct exhortatory force without adding interpretive expansion.
- source_word: ጻድቃን
  chosen: you righteous
  alternatives:
  - righteous ones
  - the righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Vocative/addressee sense is required by the imperative and second-person
    plural context. 'You righteous' preserves direct address more clearly than a detached
    nominal phrase.
- source_word: ፍጡነ
  chosen: swiftly
  alternatives:
  - quickly
  - speedily
  - soon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adverbial force modifying the destruction/judgment of sinners. 'Swiftly'
    fits the elevated apocalyptic register better than 'quickly,' while avoiding the
    temporal ambiguity of 'soon.'
- source_word: ይትሀጐሉ
  chosen: will be destroyed
  alternatives:
  - will perish
  - will be cut off
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive verbal sense in this judgment context points to
    ruin or destruction. 'Will be destroyed' preserves the judicial-apocalyptic force
    without over-specifying the mechanism.
- source_word: ኃጥኣን
  chosen: the sinners
  alternatives:
  - sinners
  - the sinful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A substantive plural referring to a defined class under judgment. The
    article in English helps mark the group as those opposed to the righteous in this
    discourse.
- source_word: እምቅድሜክሙ
  chosen: from before you
  alternatives:
  - from your presence
  - before you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally spatial language. 'From before you' preserves the vivid removal
    imagery of judgment better than the smoother but less concrete 'from your presence.'
- source_word: ሥልጣን
  chosen: authority
  alternatives:
  - dominion
  - power
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to granted rule or governing power over the judged. 'Authority'
    best captures delegated or possessed rule without implying merely raw force.
- source_word: ይከውን ለክሙ ዲቤሆሙ
  chosen: will be yours over them
  alternatives:
  - will be given to you over them
  - will belong to you over them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This construction expresses possession/exercise of authority over the
    sinners. 'Will be yours over them' is concise and preserves both possession and
    supremacy.
- source_word: በከመ ፈቀድክሙ
  chosen: according to your desire
  alternatives:
  - as you wish
  - according as you have desired
  - according to your will
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates correspondence to the righteous ones' will/desire.
    'According to your desire' is formal enough for the register and avoids sounding
    colloquial.
