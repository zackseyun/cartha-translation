translation:
  text: And on the day of the judgment of sinners, your children will rise up and
    be lifted up like eagles, and your nest will be higher than the vultures. You
    will go up and enter the clefts of the earth and the fissures of the rock forever,
    like coneys before the lawless; and the sirens will groan over you and weep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The animal terms traditionally rendered 'coney' likely refer to the hyrax
      or rock-badger.
    reason: cultural_note
  - marker: b
    text: The clause rendered 'your nest will be higher' is textually difficult in
      Ethiopic; the underlying noun may denote a sheltering place or shaded dwelling
      rather than a literal nest.
    reason: textual_variant
  - marker: c
    text: The final phrase may also be understood with 'hyraxes' again rather than
      'coneys'; both refer to the same small rock-dwelling animal.
    reason: lexical_alternative
  - marker: d
    text: Or 'the hyraxes of the earth'.
    reason: previous_rendering
  - marker: e
    text: Or 'the righteous women'.
    reason: previous_rendering
  - marker: f
    text: Or 'before the lawless'.
    reason: previous_rendering
lexical_decisions:
- source_word: ምንዳቤሆሙ
  chosen: the distress of them
  alternatives:
  - their punishment
  - their affliction
  - their tribulation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun can denote affliction, distress, or punitive trouble. In this
    woe/judgment context for sinners, 'distress' preserves both experiential suffering
    and judicial overtones without over-specifying a formal sentence.
- source_word: ይትሌዐሉ / ይትነሥኡ
  chosen: will rise up and be lifted up
  alternatives:
  - will be exalted
  - will ascend
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs are retained distinctly to preserve the emphatic parallelism
    of apocalyptic elevation language rather than collapsing them into a single English
    verb.
- source_word: አንስርት
  chosen: eagles
  alternatives:
  - vultures
  - great birds of prey
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The standard sense is eagle. The simile contrasts the righteous offspring's
    elevation with the sinners' coming humiliation, so the majestic bird image should
    be preserved.
- source_word: እጐለ
  chosen: nest
  alternatives:
  - dwelling
  - brood-place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With the eagle simile, 'nest' is the most natural and image-preserving
    rendering.
- source_word: ዚአክሙ
  chosen: your children
  alternatives:
  - your offspring
  - your seed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix points to second person plural possession. 'Children' is readable
    modern English and fits the familial encouragement to the righteous in context.
- source_word: አውስት
  chosen: hyraxes
  alternatives:
  - coneys
  - rock-badgers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The animal traditionally rendered 'coney' is better identified in modern
    English as the hyrax. Because the verse later likely repeats the same animal image,
    a footnote can preserve the traditional alternative.
- source_word: ምጽላልክሙ
  chosen: your nest
  alternatives:
  - your shadowing place
  - your shelter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult, but in context of eagle imagery and elevated habitation
    it likely denotes a shaded sheltering place or dwelling. 'Nest' keeps the metaphor
    coherent, though uncertainty remains and is noted in a footnote.
- source_word: ትበውኡ
  chosen: enter
  alternatives:
  - go in
  - come into
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward motion verb; 'enter' fits the movement into subterranean
    refuges.
- source_word: ንደብታተ ምድር
  chosen: the clefts of the earth
  alternatives:
  - ravines of the earth
  - hollows of the ground
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural construct suggests split places or clefts. This preserves
    the rocky refuge imagery common in judgment scenes.
- source_word: ንቅዓታተ ኰኵሕ
  chosen: the fissures of the rock
  alternatives:
  - holes of the rock
  - cracks of the stone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes openings or split places in rock. 'Fissures' is vivid
    but still readable.
- source_word: ጊሔ
  chosen: coneys
  alternatives:
  - hyraxes
  - rock-badgers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison appears to return to the small rock-dwelling animal. I
    keep 'coneys' here to signal the simile's traditional animal image, while noting
    the modern zoological equivalent in a footnote.
- source_word: ዓማፅያን
  chosen: the lawless
  alternatives:
  - the violent
  - the rebels
  - the transgressors
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can denote violent or rebellious wrongdoers. 'Lawless' best
    fits the moral-judicial register of the Epistle's woes.
- source_word: ይገዕዙ
  chosen: will groan
  alternatives:
  - will lament
  - will sigh bitterly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb expresses audible grief. 'Groan' preserves the visceral tone
    before the following explicit 'weep'.
- source_word: ጼደናት
  chosen: the righteous women
  alternatives:
  - the righteous
  - righteous ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The feminine plural ending is significant and should not be flattened
    away. The verse appears to envision righteous women lamenting over the judged
    sinners.
