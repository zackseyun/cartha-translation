theological_decisions:
- issue: Whether the verse addresses the righteous and promises vindication over against
    sinners
  chosen_reading: Second-person plural references are taken as addressing the righteous
    community, whose children are exalted while sinners face distress.
  alternative_readings:
  - The second-person references could be read more generally or with some ambiguity
    due to textual difficulty in the middle clauses.
  rationale: The immediate literary context in the Epistle contrasts sinners with
    the righteous through direct address. Retaining that contrast preserves the moral
    polarity without importing later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
