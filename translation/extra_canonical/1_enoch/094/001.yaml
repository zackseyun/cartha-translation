theological_decisions:
- issue: Rendering of ጽድቅ in a wisdom-apocalyptic exhortation
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The verse exhorts the hearers to love and walk in a moral quality and then contrasts its paths with those of ዓመፃ. 'Righteousness' better captures the broad covenantal-ethical sense than the narrower social-legal 'justice,' while still allowing the latter nuance in footnote discussion.
  doctrine_reference: 'Translation philosophy: consistency of key terms; contested terms table for δικαιοσύνη → righteousness / justice'
- issue: Force of the evaluative pair for the righteous path
  chosen_reading: worthy and acceptable
  alternative_readings:
  - upright and approved
  - fitting and received
  rationale: The Ge'ez presents a two-part commendation before the contrast with the wicked path. Preserving both predicates keeps the rhetorical balance and avoids collapsing the line into a single generic commendation.
