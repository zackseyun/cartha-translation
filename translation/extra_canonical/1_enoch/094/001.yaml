translation:
  text: 'And now I say to you, my children: love righteousness, and walk in it; for the paths of righteousness are worthy and acceptable, but the paths of iniquity will quickly be destroyed and vanish.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording behind 'worthy and acceptable' is somewhat difficult; the sense is that the paths of righteousness are fitting and approved, in contrast to the doomed paths of violence.
    reason: lexical_alternative
  - marker: b
    text: '''Violence'' may also be understood more broadly as injustice or wrongdoing; the verse contrasts two moral ways rather than merely two private choices.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''And now I say to you, my children: love righteousness, and walk in it; for the paths of righteousness are worthy and acceptable, but the paths of violence will quickly be destroyed and vanish.''.'
    reason: previous_rendering
lexical_decisions:
- source_word: እብለክሙ
  chosen: I say to you
  alternatives:
  - I tell you
  - I speak to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward speech formula; 'say to you' preserves the direct paternal exhortation without unnecessary expansion.
- source_word: ደቂቅየ
  chosen: my children
  alternatives:
  - my sons
  - my little ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is a filial address. 'My children' preserves the familial and instructional tone without restricting the audience to males.
- source_word: አፍቅርዋ ለጽድቅ
  chosen: love righteousness
  alternatives:
  - love justice
  - cherish righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጽድቅ in this wisdom-exhortation context is best rendered 'righteousness,' consistent with project defaults for cognate biblical usage. 'Justice' is possible but narrower here.
- source_word: ወባቲ ሖሩ
  chosen: and walk in it
  alternatives:
  - and go in it
  - and proceed in it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional feminine pronoun refers back to righteousness as a way of life. 'Walk in it' preserves the ethical-path metaphor common to wisdom and apocalyptic exhortation.
- source_word: ፍኖዋተ ጽድቅ
  chosen: the paths of righteousness
  alternatives:
  - the ways of righteousness
  - the roads of righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Paths'' keeps the concrete moral-road imagery and pairs naturally with the contrasting ''paths of violence'' later in the verse.'
- source_word: ይደሉ
  chosen: are worthy
  alternatives:
  - are fitting
  - are proper
  - prosper
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form likely conveys suitability or worthiness. 'Are worthy' fits the paired predicate with 'acceptable' and avoids overreading the term as success or prosperity.
- source_word: ይትወከፍ
  chosen: acceptable
  alternatives:
  - received
  - approved
  - welcomed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense suggests being received or accepted. 'Acceptable' works idiomatically in English while preserving the evaluative force.
- source_word: ፍኖዋተ ዓመፃ
  chosen: the paths of violence
  alternatives:
  - the ways of injustice
  - the paths of wrongdoing
  - the ways of oppression
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዓመፃ often carries the sense of violence, wrong, or oppressive injustice. 'Violence' preserves the sharp moral contrast and the concrete destructive force implied in the warning.
- source_word: ፍጡነ
  chosen: quickly
  alternatives:
  - swiftly
  - at once
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adverb of speed; 'quickly' is clear modern English and preserves the urgency of the judgment statement.
- source_word: ይትሐጐላ ወየሐፅፃ
  chosen: will be destroyed and vanish
  alternatives:
  - will be swept away and disappear
  - will be overthrown and pass away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs intensify the fate of the wicked path. 'Destroyed and vanish' preserves both ruin and disappearance without flattening the double expression.
