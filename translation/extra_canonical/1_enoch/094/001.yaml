  to: 'And now I say to you, my children: love righteousness, and walk in it; for the paths of righteousness are worthy and acceptable, but the paths of iniquity will quickly be destroyed and vanish.'
  rationale: 'The Ge''ez word ዓመፃ (ʿāmaḍā) means ''iniquity'' or ''unrighteousness,'' serving as the direct moral antonym to ጽድቅ (''righteousness'') in the same verse. Translating it as ''violence'' conflates it with ግፍዕ (gefeʿ, ''violence/oppression''), which the author uses distinctly in the very next verse (94:2, ''paths of violence''). | Adjudicator: The Ge''ez word ዐመፃ (ʿāmaḍā) primarily means ''iniquity'' or ''injustice'' and serves as the direct antonym to ጽድቅ (ṣedq, ''righteousness'') in this verse. The project guidelines explicitly instruct tracking'
