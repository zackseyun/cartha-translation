translation:
  text: You have prepared it for reproach and for violence, and you have made yourselves
    ready for the day of the shedding of blood, and for the day of darkness, and for
    the day of the great judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have done it for reproach and for violence'; the opening verb can
      be rendered more literally as 'made/done,' but the context supports the sense
      of preparing something for a destined outcome.
    reason: lexical_alternative
  - marker: b
    text: '''The shedding of blood'' may also be rendered ''bloodshed.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ገበርክምዋ
  chosen: you have prepared it
  alternatives:
  - you have done it
  - you have made it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the common Ge'ez verb 'to do/make'. With the object suffix '-wa'
    feminine singular, the sense is more naturally 'you have made/prepared it' rather
    than a bare intransitive 'you acted'. 'Prepared it' fits the following sequence
    of destinies or outcomes without over-paraphrasing.
- source_word: ለጽርፈት
  chosen: for reproach
  alternatives:
  - for reviling
  - for disgrace
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes insult, reproach, or reviling. 'Reproach' preserves
    the judicial-moral tone and pairs well with the following noun.
- source_word: ወለዓመፃ
  chosen: and for violence
  alternatives:
  - and for wrongdoing
  - and for oppression
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can cover violent wrongdoing or oppression. 'Violence' best
    preserves the stark apocalyptic accusation and anticipates the bloodshed named
    later in the verse.
- source_word: ወድልዋነ ኮንክሙ
  chosen: and you have made yourselves ready
  alternatives:
  - and you have become prepared
  - and you have become fit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The construction appears to express becoming prepared or made ready.
    Rendering it reflexively in English captures the force of the second-person plural
    form in context: the wicked have readied themselves for coming judgment.'
- source_word: ለዕለተ ክዕወት ደም
  chosen: for the day of the shedding of blood
  alternatives:
  - for the day of bloodshed
  - for the day of pouring out blood
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to blood being shed rather than merely 'blood' as a
    static noun. 'Shedding of blood' is vivid and formal enough for the judgment context;
    'bloodshed' is possible but slightly less transparent to the underlying wording.
- source_word: ወለዕለተ ጽልመት
  chosen: and for the day of darkness
  alternatives:
  - and for the dark day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering that preserves the repeated apocalyptic formula
    'for the day of ...'.
- source_word: ወለዕለተ ኵነኔ ዐቢይ
  chosen: and for the day of the great judgment
  alternatives:
  - and for the day of great condemnation
  - and for the day of the great sentence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes judgment, sentence, or condemnation. 'The great judgment'
    best fits Enochic eschatological diction and preserves the solemn finality of
    the phrase without importing later canonical formulas.
