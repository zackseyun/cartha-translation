theological_decisions:
- issue: Whether the verse describes moral consequences generally or eschatological
    judgment specifically
  chosen_reading: The final triad is rendered as explicit eschatological days culminating
    in 'the great judgment.'
  alternative_readings:
  - A more general statement about calamity and punishment in history
  rationale: The repeated 'day of ... day of ... day of ...' formula, especially with
    darkness and great judgment, is characteristic of apocalyptic judgment language
    and should be preserved rather than generalized.
  doctrine_reference: Preserve apocalyptic imagery and judgment formulas; do not flatten
    into generic modern religious prose.
