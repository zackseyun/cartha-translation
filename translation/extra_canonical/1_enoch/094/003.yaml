translation:
  text: 'And now I say to you, the righteous: do not walk in the paths of evil, nor
    in the paths of death, and do not draw near to them, lest you be destroyed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ways' instead of 'paths'; the image is the familiar moral metaphor of
      a course of life.
    reason: lexical_alternative
  - marker: b
    text: The final warning may also be rendered 'lest you perish' or 'lest you be
      swept away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይእዜኒ
  chosen: And now
  alternatives:
  - And at this time
  - And now then
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal discourse marker introducing a fresh admonition; 'And now' is
    natural English while preserving the transition.
- source_word: እብል
  chosen: I say
  alternatives:
  - I speak
  - I tell
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple speech verb; 'I say' keeps the direct hortatory force of the address.
- source_word: ለጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  - righteous ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the morally upright group addressed in Enochic
    exhortation; preserves the book's recurring ethical category.
- source_word: ኢትሖሩ
  chosen: do not walk
  alternatives:
  - do not go
  - do not live
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In combination with 'paths,' the idiom is best rendered 'walk,' preserving
    the moral-metaphorical imagery rather than flattening it to mere movement.
- source_word: በፍኖዋተ
  chosen: in the paths of
  alternatives:
  - on the ways of
  - in the roads of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural 'paths/ways' fits wisdom-style ethical imagery. 'Paths' sounds
    slightly more concrete and literary in English.
- source_word: እኩይ
  chosen: evil
  alternatives:
  - wickedness
  - the evil one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context contrasts moral ways; abstract 'evil' best fits the Ge'ez
    here without personifying the term.
- source_word: ሞት
  chosen: death
  alternatives:
  - destruction
  - deadliness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is straightforwardly 'death'; retaining it preserves the stark
    apocalyptic-wisdom contrast between life and death.
- source_word: ኢትቅረቡ ኀቤሆሙ
  chosen: do not draw near to them
  alternatives:
  - do not approach them
  - do not come near them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural pronoun most naturally refers back to those associated with
    the evil/deathly paths. 'Draw near' preserves the warning against association
    as well as imitation.
- source_word: ከመ ኢትትሐጐሉ
  chosen: lest you be destroyed
  alternatives:
  - so that you may not perish
  - lest you be swept away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses negative purpose/result. 'Be destroyed' conveys
    severe ruin without over-specifying whether the sense is moral, judicial, or physical;
    this suits Enochic judgment language.
