theological_decisions:
- issue: Whether to render the opening ethical object as 'righteousness' or 'justice'
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The verse belongs to paraenetic wisdom material where personal moral
    rectitude is foregrounded. 'Righteousness' better preserves the broader covenantal-ethical
    sense.
  doctrine_reference: 'Translation philosophy: contested terms default δικαιοσύνη-like
    language to ''righteousness'' unless context demands otherwise.'
