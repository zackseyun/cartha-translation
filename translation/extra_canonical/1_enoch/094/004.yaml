lexical_decisions:
- source_word: እላ
  chosen: love
  alternatives:
  - desire
  - be pleased with
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative-like exhortation in context; 'love' best preserves the moral-volitional
    force without weakening it to mere preference.
- source_word: ፍቅዱ
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez phrase points to the standard ethical-religious concept of
    righteousness. 'Righteousness' preserves the wisdom/apocalyptic moral register
    better than the flatter 'what is right,' while 'justice' is possible but too narrow
    here.
- source_word: ወኀረዩ
  chosen: choose
  alternatives:
  - elect
  - prefer
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct exhortation to deliberate moral selection; 'choose' is idiomatic
    and sufficiently formal.
- source_word: ለክሙ
  chosen: for yourselves
  alternatives:
  - for you
  - to yourselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reflexive-benefactive sense is best brought out by 'for yourselves,'
    matching the exhortational tone.
- source_word: ጽድቀ
  chosen: a good life
  alternatives:
  - uprightness
  - righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this collocation with ወሕይወተ and ኄራተ, the phrase appears to point not
    to a second abstract noun parallel to righteousness but to life characterized
    as good. Because the OCR segmentation is uncertain, the rendering is slightly
    contextualized in English.
- source_word: ወሕይወተ ኄራተ
  chosen: a good life
  alternatives:
  - good life
  - good living
  - life of goodness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Taken together as 'good life' or 'life that is good.' This keeps the
    ethical sense while remaining readable.
- source_word: ወሖሩ
  chosen: walk
  alternatives:
  - go
  - proceed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Biblical ethical metaphor of conduct should be preserved; 'walk' is the
    natural equivalent.
- source_word: በፍኖዋተ ሰላም
  chosen: in the paths of peace
  alternatives:
  - in ways of peace
  - on peaceful paths
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural 'paths' is retained to preserve the idiom and wisdom-style imagery.
- source_word: ወተሐደዉ
  chosen: so that you may live
  alternatives:
  - and live
  - that you may be preserved
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The closing pair appears to express the result of the exhortation. 'So
    that you may live' makes the purposive/resultative force clear in English.
- source_word: ወትደለዉ
  chosen: and prosper
  alternatives:
  - and succeed
  - and flourish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common wisdom-style outcome term. 'Prosper' fits the ethical exhortation
    without implying purely material wealth.
