lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a judgment oracle; 'Woe' preserves the prophetic/apocalyptic denunciation better than the softer 'Alas.'
- source_word: የሐንጽዋ
  chosen: build up
  alternatives:
  - build
  - construct
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the architectural metaphor and the active sense of establishing something. 'Build up' fits the plural object and the moral structure imagery in context.
- source_word: ለዓመፃ
  chosen: unrighteousness
  alternatives:
  - injustice
  - wrongdoing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A broad moral term; 'unrighteousness' preserves the ethical and judicial force without narrowing it merely to social injustice.
- source_word: ወለግፍዕ
  chosen: oppression
  alternatives:
  - violence
  - extortion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Captures the abusive, coercive social evil paired with unrighteousness. 'Oppression' fits the wisdom-judgment context well.
- source_word: ወይሣርርዋ ለጕሕሉት
  chosen: and who lay deceitful foundations
  alternatives:
  - and who establish fraud
  - and who found them on deceit
  - and who build with falsehood
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to continue the building metaphor with a term related to founding/laying a base and an object denoting deceit or falsehood. 'Lay deceitful foundations' preserves the imagery and avoids flattening the metaphor into abstract moral language.
- source_word: ፍጡነ
  chosen: swiftly
  alternatives:
  - quickly
  - speedily
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adverb of immediacy; 'swiftly' suits elevated but readable English.
- source_word: ይትነሠቱ
  chosen: they will be overthrown
  alternatives:
  - they will be uprooted
  - they will be torn down
  - they will be destroyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the architectural context, 'overthrown' best preserves the image of a wicked structure collapsing, while also allowing the passive/judgment sense.
- source_word: ወአልቦሙ ሰላመ
  chosen: and they will have no peace
  alternatives:
  - and there will be no peace for them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct and weighty judgment formula. 'Have no peace' is natural English and preserves the finality of the sentence.
