theological_decisions:
- issue: Whether to render the verse in purely abstract moral terms or preserve the construction imagery
  chosen_reading: Preserve the building/foundation metaphor throughout the verse
  alternative_readings:
  - Abstract the sense as 'those who practice unrighteousness and deceit'
  rationale: The Ge'ez repeatedly uses architectural language, and the judgment that follows naturally answers that imagery with collapse. Preserving the metaphor maintains the apocalyptic-wisdom rhetoric of moral structures built for judgment.
  doctrine_reference: 'Translation philosophy: do not flatten apocalyptic imagery; optimal equivalence with documented exceptions.'
