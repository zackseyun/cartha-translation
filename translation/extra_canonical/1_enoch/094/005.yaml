translation:
  text: And command them in the thought of your hearts, and do not let my words be
    blotted out from your hearts; for I know that sinners will instruct men to practice
    evil wisdom, and no place will be found for it, and no trial will diminish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'charge them in the intention of your hearts.' The Ge'ez combines inward
      thought/intention with the heart as the seat of resolve.
    reason: lexical_alternative
  - marker: b
    text: The clause 'no place will be found for it' is difficult. 'Place' may mean
      literal place, room, or opportunity for the evil teaching.
    reason: alternative_reading
  - marker: c
    text: The final clause is uncertain; it may mean that no affliction will remove
      it or cut it short.
    reason: textual_variant
lexical_decisions:
- source_word: ትእዛዙ
  chosen: command them
  alternatives:
  - charge them
  - instruct them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative/plural sense from the verb of commanding or charging. 'Command
    them' preserves the force better than the softer 'instruct them,' fitting the
    paraenetic tone.
- source_word: በሐሊና ልብክሙ
  chosen: in the thought of your hearts
  alternatives:
  - in the intention of your hearts
  - in your heart's understanding
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሐሊና carries the sense of thought, mind, or intention; paired with 'heart'
    it expresses inward reflection or resolve. The somewhat literal rendering preserves
    the Semitic-style inner faculty language.
- source_word: ኢይደምስስ ነገርየ እምልብክሙ
  chosen: do not let my words be blotted out from your hearts
  alternatives:
  - do not erase my words from your hearts
  - do not let my message perish from your hearts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys wiping out, effacing, or destroying. 'Blotted out' preserves
    the vivid image of removal from memory or inner retention.
- source_word: አአምር
  chosen: I know
  alternatives:
  - I have known
  - I understand
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward first-person knowledge statement; 'I know' is the most
    natural and direct English equivalent.
- source_word: ያሜክሮዎሙ ኃጥኣን ለሰብእ
  chosen: sinners will instruct men
  alternatives:
  - sinners will teach people
  - sinners will counsel men
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests advising, teaching, or causing someone to learn. 'Instruct'
    fits the warning context and keeps the active role of sinners in corrupting others.
- source_word: ይግበሩ ጥበበ እኩየ
  chosen: to practice evil wisdom
  alternatives:
  - to do wicked wisdom
  - to carry out evil cunning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጥበብ is normally 'wisdom,' but in a negative context can denote skill,
    craft, or cunning. Retaining 'wisdom' keeps the ironic moral inversion of the
    passage rather than flattening it to mere 'wickedness.'
- source_word: ኵሉ መካን ኢይትረከብ ላቲ
  chosen: no place will be found for it
  alternatives:
  - it will find no place
  - no opportunity will be found for it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መካን commonly means place, location, or occasion. The clause is difficult,
    but this rendering stays close to the Ge'ez while allowing either literal place
    or figurative room/opportunity.
- source_word: ኵሉ መከራ አያሐፅፅ
  chosen: no trial will diminish
  alternatives:
  - no affliction will cut it short
  - no distress will remove it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መከራ can mean trial, affliction, or distress. The final verb is textually
    and semantically difficult; 'diminish' preserves a general sense of reducing or
    cutting down without overcommitting to a more specific nuance.
