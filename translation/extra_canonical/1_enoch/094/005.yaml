theological_decisions:
- issue: Whether the warning concerns generic wicked behavior or a more pointed corruption
    of wisdom
  chosen_reading: Rendered ጥበበ እኩየ as 'evil wisdom'
  alternative_readings:
  - wicked craft
  - evil cunning
  rationale: The verse warns that sinners train others in a counterfeit form of wisdom.
    Preserving 'wisdom' keeps the moral and sapiential tension characteristic of the
    Epistle rather than reducing it to generic wrongdoing.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms unless context demands variance.
