translation:
  text: Woe to those who build their houses by sin, for all their foundations will
    be torn up; [and they will fall by the sword;] and those who acquire gold and
    silver in oppression will quickly be destroyed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause 'and they will fall by the sword' is bracketed in the supplied
      Ethiopic witness, indicating textual uncertainty in this line.
    reason: textual_variant
  - marker: b
    text: '''Houses'' may also imply the broader estate or household built up through
      wrongdoing, but the verse deliberately keeps the image of physical foundations.'
    reason: cultural_note
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  - Ah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a judgment oracle; 'Woe' best preserves the prophetic denunciation
    force in apocalyptic context.
- source_word: የሐንጹ አብያቲሙ
  chosen: build their houses
  alternatives:
  - construct their houses
  - build up their households
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The concrete image of house-building should be preserved. While 'houses'
    may imply household/estate, the immediate imagery of foundations in the next clause
    favors the literal architectural wording.
- source_word: በኃጢአት
  chosen: by sin
  alternatives:
  - in sin
  - with sinfulness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The preposition marks means or manner. ''By sin'' keeps the terse causal-instrumental
    force: their houses are built through sinful gain or conduct.'
- source_word: እምኵሉ መሠረቶሙ ይትነሠቱ
  chosen: all their foundations will be torn up
  alternatives:
  - all their foundations will be uprooted
  - their every foundation will be removed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive sense suggests violent removal from below. 'Torn up' preserves
    the image of destabilization and judgment better than a flatter 'removed.'
- source_word: ወበሰይፍ ይወድቁ
  chosen: and they will fall by the sword
  alternatives:
  - and by the sword they will fall
  - and they will be struck down by the sword
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard judgment formula. 'Fall by the sword' is idiomatic, elevated,
    and preserves the apocalyptic-judicial tone.
- source_word: ያጠርይዎ ለወርቅ ወለብሩር
  chosen: acquire gold and silver
  alternatives:
  - gather gold and silver
  - heap up gold and silver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb points to obtaining or amassing wealth. 'Acquire' is broad enough
    to fit the context, while the following phrase specifies the unjust manner.
- source_word: በጽነኔ
  chosen: in oppression
  alternatives:
  - by violence
  - through injustice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes oppressive force or unjust exaction. 'In oppression'
    keeps the concise Semitic-style moral indictment without over-specifying the mechanism.
- source_word: ፍጡነ ይትሐጐሉ
  chosen: will quickly be destroyed
  alternatives:
  - will swiftly perish
  - will speedily come to ruin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adverb intensifies the certainty and nearness of judgment. 'Destroyed'
    fits the judicial context and parallels the tearing up of foundations.
