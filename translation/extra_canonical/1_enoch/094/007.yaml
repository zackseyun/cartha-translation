theological_decisions:
- issue: Whether the verse speaks only of literal houses or also metaphorically of
    dynastic/household security
  chosen_reading: Retain the literal image 'houses' in the main text while allowing
    broader social implication.
  alternative_readings:
  - Render as 'households'
  - Render as 'estates'
  rationale: The explicit mention of 'foundations' anchors the line in architectural
    imagery, but in wisdom/apocalyptic rhetoric the image naturally extends to the
    security built by wicked wealth. The main text preserves the image rather than
    interpreting it away.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten into generic prose.
- issue: Status of the sword clause in brackets
  chosen_reading: Include the clause in the main text but preserve its bracketed uncertainty
    in a footnote.
  alternative_readings:
  - Omit the clause as secondary
  - Print the clause without note
  rationale: The supplied witness marks the phrase as textually uncertain. Because
    it coheres with the judgment sequence and may reflect an attested reading, it
    is translated, but the uncertainty should remain transparent.
  doctrine_reference: When the sense or text is uncertain, prefer transparent English
    plus a footnote over false confidence.
