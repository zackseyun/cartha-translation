translation:
  text: And to certain men of a generation, the paths of violence and death will be shown; and they will keep far from them and will not follow them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ways of violence and death.' The Ge'ez noun is literally 'paths/ways' and is likely moral-metaphorical.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the wise among men, from generation to generation'.
    reason: previous_rendering
lexical_decisions:
- source_word: እሙራን
  chosen: the wise
  alternatives:
  - the instructed
  - the discerning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes those marked by wisdom or understanding. 'The wise' is the most natural elevated English rendering in wisdom/apocalyptic context.
- source_word: ለሰብእ
  chosen: among men
  alternatives:
  - to men
  - among humankind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With the dative/prepositional force in context, the phrase identifies the sphere in which the wise are found. 'Among men' preserves the idiom without over-expanding.
- source_word: እምትውልድ
  chosen: from generation to generation
  alternatives:
  - from a generation
  - through generations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The expression is distributive and iterative, indicating continuity across successive generations. The idiomatic English formula fits the apocalyptic-wisdom register.
- source_word: ይትከሠት
  chosen: will be shown
  alternatives:
  - will be revealed
  - will become manifest
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive sense points to disclosure or manifestation. 'Will be shown' is clear and restrained; 'revealed' is possible but slightly more interpretive.
- source_word: ፍኖዋተ
  chosen: the paths
  alternatives:
  - the ways
  - the tracks
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A concrete plural noun meaning roads/paths, often metaphorical for moral course. 'Paths' preserves the imagery better than the more abstract 'ways.'
- source_word: ግፍዕ
  chosen: violence
  alternatives:
  - oppression
  - wrongdoing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term carries the sense of violent injustice or oppressive wrong. 'Violence' best matches the stark moral imagery of the verse, while allowing the broader unjust force to remain implicit.
- source_word: ሞት
  chosen: death
  alternatives:
  - destruction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plain sense is 'death.' No contextual pressure requires a metaphorical expansion.
- source_word: ይርኅቁ እምኔሆሙ
  chosen: they will keep far from them
  alternatives:
  - they will be far from them
  - they will distance themselves from them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb expresses becoming or remaining far away. 'Keep far from them' captures both separation and moral avoidance in idiomatic English.
- source_word: ኢይትለውዎሙ
  chosen: will not follow them
  alternatives:
  - will not go after them
  - will not accompany them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb naturally means to follow after. In context of 'paths,' 'follow them' preserves the metaphor of moral course.
