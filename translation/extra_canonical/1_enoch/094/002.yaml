theological_decisions:
- issue: Moral-path imagery versus abstract ethical paraphrase
  chosen_reading: Retain 'paths of violence and death' as concrete imagery
  alternative_readings:
  - ways of wickedness leading to death
  - violent and deadly conduct
  rationale: The Ge'ez uses a concrete plural noun for roads/paths. Preserving the image fits the Epistle's wisdom-apocalyptic style and avoids flattening the warning into generic moral prose.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not paraphrase beyond the witness.'
