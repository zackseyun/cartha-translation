  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/094/008.job-72875.json
  category: awkward_english
  tier: 1
  from: from your riches you will go out
  to: from your riches you will depart
  rationale: The Ge'ez verb ወፅአ (waḍʾa) with the preposition እምነ (ʾəmna) means 'to go out from' or 'depart from'. While 'go out' is a literal rendering of the spatial metaphor, in English one does not 'go out' from abstract possessions like wealth. 'Depart from' preserves the active, spatial separation of the Ge'ez while reading naturally in English.
