theological_decisions:
- issue: Meaning of 'from your riches you will go out'
  chosen_reading: Retain the literal image of departure from riches rather than interpret it explicitly as death, dispossession, or exile.
  alternative_readings:
  - you will depart from your wealth
  - you will die and leave your riches behind
  - you will be cast out from the sphere of prosperity
  rationale: The Ge'ez wording is terse and image-rich. A literal rendering preserves the apocalyptic-wisdom warning without resolving the exact mode of judgment beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
