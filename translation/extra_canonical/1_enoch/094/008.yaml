translation:
  text: Woe to you, rich ones, for you have trusted in your riches, and from your riches you will depart, because you did not remember the Most High in the days of your riches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will depart from your riches.' The wording may imply being stripped of wealth, or more broadly leaving it behind in judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'from your riches you will go out'.
    reason: previous_rendering
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  - Ah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a prophetic denunciation formula. 'Woe' best preserves the judgment-oracle force in apocalyptic/wisdom context.
- source_word: አብዕልት
  chosen: rich ones
  alternatives:
  - the rich
  - wealthy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Derived from the noun for wealth/riches; the vocative plural is best represented as 'rich ones' to preserve direct address without over-smoothing.
- source_word: ብዕልክሙ
  chosen: your riches
  alternatives:
  - your wealth
  - your possessions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes wealth/riches. 'Riches' keeps the repeated rhetorical pattern in the verse and fits the wisdom-judgment tone better than the flatter 'possessions.'
- source_word: ተወከልክሙ
  chosen: you have trusted
  alternatives:
  - you relied
  - you put confidence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys reliance or trust. 'You have trusted' is idiomatic and preserves the moral/theological critique of misplaced confidence.
- source_word: ትወፅኡ
  chosen: you will go out
  alternatives:
  - you will depart
  - you will come forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A fairly literal rendering of the motion verb. 'Go out' preserves the starkness and ambiguity of the judgment saying; it may imply departure from life or loss of wealth, so a more interpretive gloss was avoided.
- source_word: ለልዑል
  chosen: the Most High
  alternatives:
  - the Exalted One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard divine title in Jewish apocalyptic literature. 'The Most High' is the clearest established English equivalent without importing later phrasing.
- source_word: ኢተዘከርክምዎ
  chosen: you did not remember
  alternatives:
  - you did not call to mind
  - you did not keep in mind
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is straightforwardly 'remember.' This preserves the ethical charge that prosperity led to forgetfulness of God.
- source_word: በመዋዕለ ብዕልክሙ
  chosen: in the days of your riches
  alternatives:
  - in the days of your wealth
  - during your prosperity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A temporal phrase marking the period of prosperity. 'In the days of your riches' keeps the repeated noun and the solemn cadence of the verse.
