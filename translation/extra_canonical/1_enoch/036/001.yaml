theological_decisions:
- issue: Cosmic architecture imagery
  chosen_reading: portals of heaven
  alternative_readings:
  - windows of heaven
  - openings of heaven
  rationale: The verse depicts the heavens as having structured outlets for weather. 'Portals' preserves the apocalyptic cosmology without importing later canonical phrasing such as 'windows of heaven.'
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic language.
