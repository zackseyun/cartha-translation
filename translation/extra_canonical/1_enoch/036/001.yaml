translation:
  text: And from there I went toward the south, to the ends of the earth; and there I saw three open portals of heaven, and from there come out the south wind, and And from there I went toward the south, to the ends of the earth; and there I saw three open portals of heaven, and from there come out the south wind, and dew, and rain, and wind., and rain, and wind.
  philosophy: optimal-equivalence
