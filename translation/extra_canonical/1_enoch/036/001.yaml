lexical_decisions:
- source_word: እምህየ
  chosen: from there
  alternatives:
  - thence
  - from that place
  lexicon: Dillmann
  rationale: A common narrative transition in Ge'ez. 'From there' is clear modern English and preserves the visionary movement formula.
- source_word: ሖርኩ
  chosen: I went
  alternatives:
  - I traveled
  - I journeyed
  lexicon: Dillmann
  rationale: Simple motion verb in first person. 'I went' keeps the report style concise without adding nuance not required by the text.
- source_word: መንገለ አዜብ
  chosen: toward the south
  alternatives:
  - by way of the south
  - to the south region
  lexicon: Dillmann
  rationale: The phrase marks direction. 'Toward the south' is the most natural English rendering while preserving geographic orientation.
- source_word: በአጽናፈ ምድር
  chosen: to the ends of the earth
  alternatives:
  - at the extremities of the earth
  - to the edge of the earth
  lexicon: Dillmann
  rationale: Apocalyptic-geographic language should be preserved rather than flattened. 'Ends of the earth' is idiomatic and retains cosmic scope.
- source_word: ሠለስተ ኆዋኅወ ሰማይ
  chosen: three open portals of heaven
  alternatives:
  - three windows of heaven
  - three openings of heaven
  lexicon: Dillmann
  rationale: The noun denotes openings/gates/windows; in this visionary context 'portals' best preserves the cosmic architectural imagery. 'Open' reflects ርኁዋተ.
- source_word: ርኁዋተ
  chosen: open
  alternatives:
  - opened
  - wide
  lexicon: Dillmann
  rationale: Describes the heavenly portals as standing open. 'Open' is the most direct attributive rendering.
- source_word: ወይወፅእ እምህየ
  chosen: and from there come out
  alternatives:
  - and there came out from there
  - and from there issue forth
  lexicon: Dillmann
  rationale: The verb is rendered in a present-like descriptive sense suitable to visionary description of recurring cosmic phenomena. 'Come out' is natural and concrete.
- source_word: አዜብ
  chosen: the south wind
  alternatives:
  - the south
  - the southern wind
  lexicon: Dillmann
  rationale: The word earlier marks the southern direction, but here it appears in a list of meteorological phenomena exiting the portals. Rendering it as 'the south wind' best fits the immediate context.
- source_word: ጠል
  chosen: mist
  alternatives:
  - dew
  lexicon: Dillmann
  rationale: Although the term can often mean 'dew,' in this sequence of weather issuing from heavenly openings, 'mist' better fits the atmospheric imagery and avoids an overly narrow condensation if the sense is broader moisture.
- source_word: ዝናም
  chosen: rain
  alternatives:
  - downpour
  lexicon: Dillmann
  rationale: Standard weather term; 'rain' is straightforward and sufficient.
- source_word: ነፋስ
  chosen: wind
  alternatives:
  - blast
  - spirit
  lexicon: Dillmann
  rationale: In this meteorological list the physical sense 'wind' is clearly intended, not 'spirit'.
