translation:
  text: Who will grant me that my eyes might become a cloud of water, so that I may weep over you and pour out my tears like a cloud of water, and find rest from the sorrow of my heart?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a rain-cloud of water.' The Ge'ez image is repeated twice and may intentionally evoke eyes becoming a storm-cloud of tears.
    reason: lexical_alternative
  - marker: b
    text: The addressee 'you' is plural in context and likely refers to the sinners/wicked addressed in the surrounding woes.
    reason: cross_reference
  - marker: c
    text: Or 'Who will grant to my eyes that they might become a cloud of water, so that I may weep over you and pour out my tears like a cloud of water, and I would find rest'.
    reason: previous_rendering
lexical_decisions:
- source_word: መኑ
  chosen: Who will grant
  alternatives:
  - Who will give
  - Who will allow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Interrogative opening with an optative force: not a request to a named addressee, but a lamenting wish, best carried by ''Who will grant'' rather than the flatter ''who will give''.'
- source_word: ይሁበኒ
  chosen: will grant to me
  alternatives:
  - will give me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the common verb 'to give'; in idiomatic English with a following infinitive-like clause, 'grant to me' better conveys a wished-for enablement.
- source_word: ለአዕይንትየ
  chosen: to my eyes
  alternatives:
  - my eyes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The dative-marked phrase is retained explicitly because the image concerns the speaker's eyes being made into a source of tears.
- source_word: ከመ ይኩና ደመና ማይ
  chosen: that they might become a cloud of water
  alternatives:
  - that they may be a rain-cloud
  - that they might become a mass of water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated image should be preserved rather than reduced to 'full of tears.' 'Cloud of water' is slightly strange in English, but it keeps the apocalyptic-poetic metaphor visible. 'Rain-cloud' is possible but somewhat interpretive.
- source_word: እብኪ
  chosen: I may weep
  alternatives:
  - I might weep
  - I would weep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'A purpose/result nuance follows the wish: the speaker desires this so that he may weep.'
- source_word: ዲቤክሙ
  chosen: over you
  alternatives:
  - for you
  - concerning you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition can cover several relations; in a lament context 'over you' best expresses mourning directed toward the audience without deciding too strongly for either pity or accusation.
- source_word: እክዐው አንብዐየ
  chosen: pour out my tears
  alternatives:
  - send forth my tears
  - let my tears flow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The collocation suggests an active outpouring of tears. 'Pour out' preserves the intensity and fits lament language.
- source_word: ከመ ደመና ማይ
  chosen: like a cloud of water
  alternatives:
  - like a rain-cloud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The second occurrence repeats the same image; the translation keeps the repetition for rhetorical force.
- source_word: አዕርፍ
  chosen: I would find rest
  alternatives:
  - I might rest
  - I would be relieved
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes resting or finding relief. 'Find rest' preserves the concrete metaphor while allowing emotional relief to be heard.
- source_word: እምሐዘነ ልብየ
  chosen: from the sorrow of my heart
  alternatives:
  - from my heart's grief
  - from the grief of my heart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of the genitival phrase; 'sorrow' is readable modern English while retaining lament weight.
