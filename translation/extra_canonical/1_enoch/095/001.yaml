theological_decisions:
- issue: Whether to smooth the poetic image into idiomatic lament language
  chosen_reading: Retain 'cloud of water' in the main text
  alternative_readings:
  - render as 'rain-cloud'
  - paraphrase as 'eyes full of tears'
  rationale: The verse is poetic and emotionally heightened. The project philosophy calls for preserving imagery rather than flattening it into generic prose. 'Cloud of water' is unusual but intelligible and auditable from the Ge'ez.
  doctrine_reference: 'Translation philosophy: preserve source-text plain sense and do not flatten apocalyptic imagery.'
