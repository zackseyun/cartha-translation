translation:
  text: Do not fear the sinners, O righteous ones, for again the Lord will deliver
    them into your hands, so that you may execute judgment upon them according to
    your pleasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not be afraid because of the sinners.' The Ge'ez construction with
      እም can be rendered more literally with 'from/because of,' but idiomatic English
      favors 'fear the sinners.'
    reason: lexical_alternative
  - marker: b
    text: '''Into your hands'' is an idiom for being given into someone''s power or
      control.'
    reason: cultural_note
  - marker: c
    text: Or 'as you wish' / 'according to your will.' The line depicts the reversal
      in which the righteous receive authority over those who oppressed them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ኢትፍርሁ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  - Do not dread
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative imperative plural addressed to the righteous; 'Do not fear'
    is concise and preserves the direct exhortational force.
- source_word: ጻድቃን
  chosen: righteous ones
  alternatives:
  - the righteous
  - just ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural substantive from the righteousness word-group. 'Righteous ones'
    preserves the marked plural address and apocalyptic group identity better than
    the flatter collective 'the righteous'.
- source_word: እምኃጥኣን
  chosen: the sinners
  alternatives:
  - from sinners
  - because of sinners
  - the sinful ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'With the fear verb and preposition እም, the sense is separation/source:
    ''fear ... from/because of.'' Idiomatic English expresses this as ''fear the sinners''
    while retaining the concrete opponents in view.'
- source_word: ካዕበ
  chosen: again
  alternatives:
  - once more
  - in turn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adverb marking renewed or repeated action. 'Again' is the most natural
    compact rendering and preserves the sense of reversal recurring in the woe context.
- source_word: ያገብኦሙ
  chosen: will deliver them
  alternatives:
  - will hand them over
  - will bring them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with 'into your hands,' the verb denotes giving over into
    another's power. 'Will deliver them' fits the judicial-apocalyptic setting without
    over-specifying the mechanism.
- source_word: ውስተ እዴክሙ
  chosen: into your hands
  alternatives:
  - into your hand
  - under your power
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard idiom of transfer into someone's power or control. The plural
    'your hands' matches the plural addressees and keeps the vivid idiom.
- source_word: ከመ ትግበሩ
  chosen: so that you may execute
  alternatives:
  - that you may do
  - so that you may perform
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Purpose clause. Because the object is 'judgment,' English idiom prefers
    'execute judgment' rather than the wooden 'do judgment.'
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - justice
  - sentence
  - punishment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun belongs to the judicial sphere. 'Judgment' best preserves the
    apocalyptic legal register and leaves open both verdict and punitive execution.
- source_word: በከመ ፈቀድክሙ
  chosen: according to your pleasure
  alternatives:
  - as you wish
  - according to your will
  - as you desire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates accordance with the will/desire of the righteous.
    'According to your pleasure' preserves the elevated register and avoids sounding
    casual, while still reflecting the breadth of the Ge'ez expression.
