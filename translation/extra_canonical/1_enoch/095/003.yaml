theological_decisions:
- issue: Whether the verse grants the righteous active participation in judging the
    sinners or merely predicts vindication
  chosen_reading: The righteous are addressed as agents who will 'execute judgment'
    on the sinners once the Lord gives the sinners into their hands.
  alternative_readings:
  - The righteous simply witness God's judgment
  - The phrase means they receive authority over the sinners without directly judging
    them
  rationale: The purpose clause 'so that you may execute judgment upon them' and the
    idiom 'into your hands' together point to active participation in judgment, a
    common apocalyptic reversal motif. The translation preserves this tension rather
    than softening it into passive vindication.
  doctrine_reference: Preserve theological tension rather than resolve it.
