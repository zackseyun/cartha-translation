translation:
  text: Woe to you who repay evil to your neighbor, for you will be repaid according
    to your deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The same Ge''ez verbal root appears in both clauses: those who ''repay''
      evil will themselves ''be repaid.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  - Ah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a judgment oracle or denunciation formula. 'Woe' best preserves
    the prophetic-apocalyptic force; 'alas' would sound more like lament than pronouncement.
- source_word: ለክሙ
  chosen: to you
  alternatives:
  - for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard dative with the interjection, yielding the idiomatic denunciation
    'Woe to you.'
- source_word: እለ
  chosen: who
  alternatives:
  - you who
  - those who
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative marker introducing the class being addressed. In English the
    sense is carried naturally in 'you who repay...'.
- source_word: ትፈድዩ
  chosen: repay
  alternatives:
  - requite
  - pay back
  - do
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The same verbal root appears again later in the verse, creating a deliberate
    reciprocity: they repay evil, and they will be repaid. ''Repay'' preserves that
    rhetorical symmetry better than the broader ''do''.'
- source_word: እኩየ
  chosen: evil
  alternatives:
  - harm
  - wickedness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A broad moral term. 'Evil' keeps both ethical and injurious force without
    narrowing it merely to physical harm.
- source_word: ለቢጽክሙ
  chosen: to your neighbor
  alternatives:
  - to your companion
  - to your fellow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to another person in close social relation. 'Neighbor' is the
    most natural biblical English equivalent and preserves the interpersonal ethical
    dimension.
- source_word: እስመ
  chosen: for
  alternatives:
  - because
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the ground for the woe. 'For' is concise and fits elevated
    but readable English.
- source_word: ትትፈደዩ
  chosen: you will be repaid
  alternatives:
  - you will be requited
  - it will be paid back to you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely passive/reflexive counterpart to the earlier verb. 'You will be
    repaid' preserves the judgment formula and the lexical echo with 'repay' in the
    first clause.
- source_word: በከመ
  chosen: according to
  alternatives:
  - in accordance with
  - as
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresses measure or standard of recompense. 'According to' is idiomatic
    and preserves the proportional justice motif.
- source_word: ምግባሪክሙ
  chosen: your deeds
  alternatives:
  - your works
  - your conduct
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to actions or behavior. 'Deeds' fits judgment language well and
    avoids possible Pauline overtones of 'works' while remaining concrete.
