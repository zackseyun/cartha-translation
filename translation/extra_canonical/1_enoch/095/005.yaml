theological_decisions:
- issue: Nature of the recompense statement
  chosen_reading: 'A divine or judicial passive is implied: the evildoers will themselves
    receive recompense proportionate to their actions.'
  alternative_readings:
  - 'A more impersonal moral consequence: evil rebounds on the doer'
  - A human-social reciprocity without explicit divine agency
  rationale: The passive wording leaves the agent unstated, but in the Epistle's woe
    context this functions as a judgment formula. The translation preserves the passive
    without over-specifying God as the explicit subject.
  doctrine_reference: Preserve theological tension rather than resolve it.
