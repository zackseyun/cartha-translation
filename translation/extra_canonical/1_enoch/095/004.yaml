theological_decisions:
- issue: Whether the economic image should be interpreted explicitly as bribery or corruption
  chosen_reading: Retain the concrete wording 'weigh out silver' in the main text
  alternative_readings:
  - '''who take bribes'''
  - '''who deal out money for judgment'''
  rationale: The Ge'ez wording points concretely to silver/money and weighing or assessing. Since the exact social practice is not fully explicit in the provided witness, the translation preserves the image rather than collapsing it into an interpretive paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Sense of the judicial verb in relation to the silver phrase
  chosen_reading: Translate broadly as 'so that you may be judged'
  alternative_readings:
  - '''so that sentence may be passed on you'''
  - '''so that you may secure judgment'''
  rationale: The syntax is difficult, and the passive judicial sense is the least over-interpreted option. It leaves open whether the line means corrupt legal dealings that result in judgment against them or a more general statement of coming judgment.
  doctrine_reference: When the sense is uncertain, prefer transparent English plus a footnote over false confidence.
