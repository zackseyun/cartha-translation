    reason: previous_rendering
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  - Ah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a prophetic denunciation formula; 'Woe' best preserves the judgment-oracle force in apocalyptic context.
- source_word: ለክሙ
  chosen: to you
  alternatives:
  - for you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard dative address after an interjection of denunciation; idiomatic in English as 'Woe to you'.
- source_word: እለ ታወግዙ ግዘታተ
  chosen: who weigh out silver
  alternatives:
  - who assess silver
  - who measure out money
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal idea appears to be weighing/assessing, and ግዘት here most naturally refers to silver/money. In this woe context it likely points to mercenary or corrupt economic practice; 'weigh out silver' keeps the concrete image rather than paraphrasing it as bribery.
- source_word: ከመ እ ይትፈትሑ
  chosen: so that you may be judged
  alternatives:
  - so that judgment may be executed on you
  - that you may be condemned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive judicial sense of the verb is best represented by 'be judged.' This preserves ambiguity between legal process and adverse sentence without over-specifying condemnation.
- source_word: ወፈውስ
  chosen: and healing
  alternatives:
  - and remedy
  - and cure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ፈውስ commonly denotes healing or remedy. 'Healing' preserves both bodily and moral-restorative resonance in wisdom/apocalyptic admonition.
- source_word: ርኁቅ እምኔክሙ
  chosen: is far from you
  alternatives:
  - has been removed from you
  - stands distant from you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward spatial metaphor for withheld restoration; 'is far from you' is natural English and preserves the image.
- source_word: በእንተ ኃጢአተ ዚአክሙ
  chosen: because of your sins
  alternatives:
  - on account of your sins
  - for your sins
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Causal phrase explaining why healing is distant. The plural 'sins' reflects the collective wrongdoing addressed in the woe.
