translation:
  text: Woe to you who pronounce anathemas that cannot be loosed, and healing is far from you because of your sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'weigh out silver' is difficult. It may refer to measuring out money in a legal or corrupt setting; some interpreters understand an allusion to bribery.
    reason: lexical_alternative
