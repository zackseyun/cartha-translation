lexical_decisions:
- source_word: መኑ
  chosen: Who
  alternatives:
  - What person
  - Who is it that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Interrogative opening introducing a rebuke. Rendered simply as 'Who' to preserve the direct rhetorical force.
- source_word: ወሀበክሙ
  chosen: gave you
  alternatives:
  - has given to you
  - granted you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: From the verb 'to give,' with plural object suffix. 'Gave you' keeps the idiom concise in English while preserving the challenge to presumed authorization.
- source_word: ከመ ትግበሩ
  chosen: that you should do
  alternatives:
  - so that you might do
  - for you to practice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Purpose/result construction. 'That you should do' fits the rebuking question in elevated but readable English.
- source_word: ጽልአ
  chosen: hatred
  alternatives:
  - enmity
  - hostility
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes hatred or hostility. 'Hatred' is the most direct and morally weighty English equivalent.
- source_word: ወእኩየ
  chosen: evil
  alternatives:
  - wickedness
  - harm
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Broad moral term for what is bad or wicked. 'Evil' preserves the apocalyptic moral register without narrowing the sense.
- source_word: ይረከበክሙ
  chosen: will overtake you
  alternatives:
  - will find you
  - will come upon you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can mean 'find, reach, overtake.' In a judgment context, 'will overtake you' conveys impending punitive encounter more forcefully than the flatter 'find you.'
- source_word: ለኃጥኣን
  chosen: for sinners
  alternatives:
  - you sinners
  - upon sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'to/for sinners.' Because the verse already addresses the audience directly with second person plural, this phrase may function appositionally or as a dative of reference. 'For sinners' preserves the Ge'ez form while leaving the syntax transparent.
- source_word: ኵነኔ
  chosen: condemnation
  alternatives:
  - judgment
  - sentence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A judicial term for adverse judgment or sentence. 'Condemnation' best matches the punitive force in this woe context.
