theological_decisions:
- issue: Whether ኵነኔ should be rendered more generally as 'judgment' or more specifically as 'condemnation'
  chosen_reading: condemnation
  alternative_readings:
  - judgment
  - sentence
  rationale: The immediate context is denunciatory and directed against evildoers; the judicial outcome is not neutral evaluation but adverse sentence. 'Condemnation' preserves that force.
  doctrine_reference: Preserve apocalyptic judgment formulas rather than flattening them into generic prose.
- issue: How to construe ለኃጥኣን with the second-person address
  chosen_reading: retain it as 'for sinners' in the main text
  alternative_readings:
  - 'treat as direct address: ''you sinners'''
  - 'recast idiomatically: ''condemnation will overtake you sinners'''
  rationale: The Ge'ez sequence is somewhat awkward in English. Keeping 'for sinners' avoids overconfident syntactic smoothing while still yielding readable sense; the more idiomatic appositional reading is noted in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it where the source is genuinely ambiguous.
