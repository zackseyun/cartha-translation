  to: Who granted you to do hatred and evil? And condemnation will overtake you sinners.
  rationale: 'The prefix ለ (la-) on ኃጥኣን (sinners) is not a dative ''for''; it is the standard Ge''ez accusative marker in apposition to the proleptic object suffix -ክሙ (you) on the verb ይረከበክሙ (will overtake). It means ''overtake you sinners.'' Additionally, ወሀበ (wahaba) with a ከመ (kama) clause is better rendered ''granted you to do'' rather than the overly literal and awkward ''gave you that you should do.'' | Adjudicator: The reviewer is entirely correct about the Ge''ez grammar. The prefix ለ (la-) on ኃጥኣን (sinners) is not the preposition ''for'' but the standard Ge''ez accusative marker used in apposition to the proleptic'
