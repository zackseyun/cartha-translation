theological_decisions:
- issue: Moral term ዓመፃ
  chosen_reading: all unrighteousness
  alternative_readings:
  - all injustice
  - all lawlessness
  rationale: The accusation concerns comprehensive moral corruption introduced by forbidden instruction. 'Unrighteousness' preserves broad theological weight without narrowing to social injustice alone.
  doctrine_reference: Translation philosophy §Consistency of key terms; contested terms table on righteousness-related language
- issue: Scope of heavenly secrets
  chosen_reading: the hidden things of the world that are done in the heavens
  alternative_readings:
  - the eternal secrets which were made in heaven
  - the mysteries of the age carried out in heaven
  rationale: The verse condemns disclosure of concealed heavenly matters, not legitimate revelation granted by God. The wording keeps the apocalyptic contrast between heaven and earth without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §Preserve theological tension rather than resolve it
