translation:
  text: You see what Azazel has done—how he has taught all unrighteousness upon the earth and revealed the hidden things of the world that are done in the heavens, which men learned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is difficult in the Ethiopic witness. It may mean 'which men were striving to learn,' or more simply 'which men learned.'
    reason: textual_variant
  - marker: b
    text: '''The hidden things of the world'' could also be rendered ''the secrets of the age'' or ''the hidden things of eternity,'' since the Ge''ez term can carry several related senses.'
    reason: lexical_alternative
  - marker: c
    text: Or 'which men were striving to learn.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ርኢከ
  chosen: You see
  alternatives:
  - You have seen
  - See
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Second-person form introducing the angels' appeal to the heavenly addressee. Present English 'You see' preserves the immediacy of the petition; perfect 'You have seen' is possible but less vivid in context.
- source_word: ዘገብረ
  chosen: what ... has done
  alternatives:
  - what ... did
  - that ... has made
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative construction with a completed act. 'Has done' fits the complaint's present relevance better than simple past.
- source_word: አዛዝኤል
  chosen: Azazel
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal name is transliterated per project policy.
- source_word: ዘመሀረ
  chosen: how he has taught
  alternatives:
  - that he taught
  - how he instructed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes instruction/teaching. 'Taught' preserves the charge that forbidden knowledge was actively transmitted.
- source_word: ኵሎ ዓመፃ
  chosen: all unrighteousness
  alternatives:
  - all injustice
  - all lawlessness
  - all violence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is broad moral wrongdoing, not merely physical violence. 'Unrighteousness' best preserves the ethical and theological scope in apocalyptic accusation.
- source_word: በዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - over the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A spatial phrase marking the earthly sphere corrupted by Azazel's teaching. 'Upon the earth' keeps the elevated register.
- source_word: ወአግሀደ
  chosen: and revealed
  alternatives:
  - and made known
  - and disclosed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates disclosure of what was concealed. 'Revealed' suits the apocalyptic register while preserving the illicit unveiling in context.
- source_word: ኅቡኣተ ዓለም
  chosen: the hidden things of the world
  alternatives:
  - the hidden things of eternity
  - the secrets of the world
  - the mysteries of the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ge'ez ዓለም can denote world/age/eternity depending on context. Here 'world' fits the contrast with things done in heaven and avoids over-specifying a technical sense.
- source_word: እለ ይትገበሩ በሰማያት
  chosen: that are done in the heavens
  alternatives:
  - which are performed in heaven
  - that take place in the heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive or impersonal sense referring to heavenly operations or secrets. Plural 'the heavens' reflects the Semitic/apocalyptic cosmological register.
- source_word: አመረ ሰብእ
  chosen: which men were striving to learn
  alternatives:
  - which men knew
  - which men sought out
  - which men learned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The closing clause is textually difficult. I take it in the common sense that humanity sought or came to know heavenly secrets through Azazel's disclosure. 'Were striving to learn' preserves the sense of illicit human pursuit without overstating certainty.
