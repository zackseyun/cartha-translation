translation:
  text: And they said among themselves, “The voice of their outcry has ascended; the earth has cried out to the gates of heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording may be read either as the victims’ cry rising from the earth or as the earth itself crying out because of the bloodshed; the Ge'ez allows the line to evoke both.
    reason: alternative_reading
  - marker: b
    text: Or '“The voice of their outcry—the earth’s cry of distress—has reached the gates of heaven.”'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይቤሉ
  chosen: and they said
  alternatives:
  - and they spoke
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard narrative verb introducing the archangels’ speech; 'said' is natural English and preserves the direct discourse setup.
- source_word: በበይናቲሆሙ
  chosen: among themselves
  alternatives:
  - between themselves
  - to one another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Idiomatic reciprocal expression; 'among themselves' fits a group of speakers better than the more limited 'between themselves'.
- source_word: ቃለ
  chosen: voice
  alternatives:
  - sound
  - word
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In collocation with 'outcry' it denotes the audible cry itself, not a spoken message. 'Voice' preserves the vivid apocalyptic sense of a cry rising upward.
- source_word: ጽራኃቲሆሙ
  chosen: their outcry
  alternatives:
  - their cry
  - their lament
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural/collective form points to the cries of the afflicted humans. 'Outcry' better conveys urgent appeal under violence than the softer 'cry' or 'lament'.
- source_word: ዐረቀ
  chosen: has reached
  alternatives:
  - ascended
  - come up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb marks arrival at a destination. 'Has reached' fits the following phrase 'the gates of heaven' while still implying upward movement.
- source_word: ጸርሐት
  chosen: cry of distress
  alternatives:
  - cry
  - lamentation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This second cry-term intensifies the first rather than merely repeating it. Rendering it 'cry of distress' preserves the rhetorical doubling without awkward redundancy.
- source_word: ምድር
  chosen: the earth’s
  alternatives:
  - of the earth
  - from the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The genitival relation is somewhat compressed in the Ge'ez. 'The earth’s cry of distress' keeps the imagery that the whole earth, defiled by bloodshed, is crying out.
- source_word: እስከ አንቀጸ ሰማይ
  chosen: to the gates of heaven
  alternatives:
  - unto the portals of heaven
  - as far as the gate of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A concrete apocalyptic spatial image should be preserved. 'Gates of heaven' is elevated but readable and avoids flattening the cosmological picture.
