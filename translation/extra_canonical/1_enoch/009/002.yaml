theological_decisions:
- issue: 'Whose cry is in view: the cry of human victims or the cry of the earth itself?'
  chosen_reading: 'The line is rendered to include both: ''the voice of their outcry—the earth’s cry of distress.'''
  alternative_readings:
  - Only the humans' cry has reached heaven
  - Only the earth's cry has reached heaven
  rationale: The Ge'ez sequence places 'their outcry' and 'cry of the earth' in close apposition. Given the chapter context of bloodshed polluting the earth, the translation preserves the tension rather than collapsing it into a single referent.
  doctrine_reference: Preserve theological tension rather than resolve it.
