  from: to you I gave authority over those who are joined with him.
  to: to whom you gave authority to rule those who are together with him.
  rationale: 'The draft reverses the subject and object. The angels are addressing God (see 9:4), not Semyaza. The Ge''ez `ዘአንተ፡ ወሀብኮ` (za-''anta wahabko) means "to whom you [God] gave him" (relative `za` + 2ms pronoun `''anta` + 2ms perfect verb `wahabka` with 3ms object suffix `-o`). Furthermore, the draft omits the verb `ይኵንን` (yekʷennen, "to rule/govern"), reducing it to the preposition "over". `ኅቡረ` (ḫəbura) functions adverbially as "together". | Adjudicator: The reviewer is entirely correct on both the grammar and the narrative context. The angels are addressing God (1 En 9:4), so the second-person masculine singular pronoun አንተ (''anta) and the verb ወሀብኮ '
