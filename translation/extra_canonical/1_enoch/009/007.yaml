theological_decisions:
- issue: Nature of Semyaza's role
  chosen_reading: The verse speaks of delegated authority over the associated Watchers, not an intrinsic or sovereign dominion.
  alternative_readings:
  - authority to judge those with him
  - authority among those with him
  rationale: In context, the speaker rebukes Semyaza as leader of the rebellious Watchers. Rendering ስልጣነ as delegated 'authority' preserves the theological distinction between divine sovereignty and entrusted angelic oversight.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
