translation:
  text: And Semyaza—to whom you gave authority to rule those who are together with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez clause after 'authority' is textually difficult in this OCR witness. The sense appears to be that Semyaza had authority over the angels associated with him, likely the gathered Watchers under his leadership.
    reason: textual_variant
  - marker: b
    text: Or 'those who are with him.' The underlying phrase may denote companions, associates, or those assembled together with him.
    reason: lexical_alternative
  - marker: c
    text: Or 'to you I gave authority over those who are joined with him.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ስምያዛ
  chosen: Semyaza
  alternatives:
  - Semjaza
  - Shemyaza
  lexicon: Knibb
  rationale: Personal name is transliterated rather than translated, following project policy for names. The form 'Semyaza' reflects a straightforward English transliteration of the Ge'ez name.
- source_word: ዘአንተ
  chosen: to you
  alternatives:
  - you
  - as for you
  lexicon: Dillmann
  rationale: Taken as a pronominal phrase addressing Semyaza directly within the angelic accusation. 'To you' fits the following verb of giving and preserves the direct address.
- source_word: ወሀብኮ
  chosen: I gave
  alternatives:
  - I have given
  - I granted
  lexicon: Dillmann
  rationale: Rendered as a simple past, matching the narrative accusation that authority had been entrusted previously. 'Gave' is more direct than 'granted' and avoids unnecessary elevation.
- source_word: ስልጣነ
  chosen: authority
  alternatives:
  - power
  - dominion
  lexicon: Dillmann
  rationale: '''Authority'' best captures delegated rule or jurisdiction, which suits the context of Semyaza''s leadership over the other Watchers. ''Power'' is broader; ''dominion'' sounds more absolute than the likely sense.'
- source_word: ይኵንን
  chosen: over
  alternatives:
  - to rule
  - to govern
  - that he might judge
  lexicon: Dillmann
  rationale: The form is difficult in OCR context, but the clause as a whole points to entrusted oversight or governance. In English, 'authority over' naturally absorbs the governing sense without overcommitting to a more specific verbal nuance such as 'judge'.
- source_word: እለ ምስሌሁ ኅቡረ
  chosen: those who are joined with him
  alternatives:
  - those who are with him
  - his companions who were assembled
  - those associated with him
  lexicon: Dillmann
  rationale: The phrase appears to describe the group allied or gathered with Semyaza, i.e., the other Watchers under his leadership. 'Joined with him' preserves the collective nuance of association without narrowing it too far.
