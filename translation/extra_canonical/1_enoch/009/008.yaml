translation:
  text: And they went to the daughters of men upon the earth, and they lay with them, with those women, and they defiled themselves and revealed to them every sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revealed to them'; the verb can denote disclosure, and in context may refer to forbidden knowledge associated with the Watchers' transgression.
    reason: lexical_alternative
