lexical_decisions:
- source_word: ወሖሩ
  chosen: and they went in
  alternatives:
  - and they went
  - and they came
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb of motion here introduces sexual approach in context with the following clause 'they lay with them.' 'Went in' preserves the idiomatic force without over-paraphrasing.
- source_word: አዋልደ ሰብእ
  chosen: the daughters of men
  alternatives:
  - the daughters of humankind
  - human daughters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the traditional and contextually clear expression for human women in contrast to the heavenly beings. 'Men' is retained as an idiomatic collective rather than flattened.
- source_word: በዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - over the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A fairly literal rendering that preserves the spatial note in the Ge'ez and the cosmic contrast between heaven and earth in the Watchers narrative.
- source_word: ወስከቡ ምስሌሆን
  chosen: and they lay with them
  alternatives:
  - and they slept with them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lay with'' is the clearest elevated English equivalent for sexual union and fits the register better than the more colloquial ''slept with.'''
- source_word: ምስለ እልኩ አንስት
  chosen: with those women
  alternatives:
  - with those wives
  - with those females
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative plus 'women' likely restates and emphasizes the human women already mentioned. 'Women' is the most natural and least overdetermined choice; 'wives' would add marital implication not required by the wording.
- source_word: ወረኵሱ
  chosen: and they defiled themselves
  alternatives:
  - and they became unclean
  - and they polluted themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The reflexive sense suits the context of illicit union and ritual-moral corruption. 'Defiled themselves' preserves both moral and cultic resonance.
- source_word: ወአግሀዱ ሎን
  chosen: and made known to them
  alternatives:
  - and revealed to them
  - and taught them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb points to disclosure. 'Made known' is broad enough to cover revealed forbidden knowledge without importing a narrower pedagogical term unless required by another witness.
- source_word: ኵሎ ኃጢአተ
  chosen: every sin
  alternatives:
  - all sins
  - every sinful act
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular collective after 'all/every' is well represented in English as 'every sin.' It preserves the sweeping indictment without sounding awkward.
