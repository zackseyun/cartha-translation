  rationale: 'The Ge''ez verb ሖሩ (ḥoru) simply means ''went'', corresponding to Greek ἐπορεύθησαν. The specific biblical idiom ''went in to'' (implying sexual intercourse) would typically use the verb ቦኡ (boʾu, ''entered''). Since the sexual act is explicitly stated in the following clause (''lay with them''), adding ''in'' over-translates the initial verb of motion. | Adjudicator: The Ge''ez verb ሖሩ (ḥoru) means ''went,'' not ''went in'' (which would be ቦኡ, boʾu). While the Greek manuscript Panopolitanus reads εἰσῆλθον (''went in''), the Ge''ez text follows a reading closer to Syncellu'
