theological_decisions:
- issue: Nature of the corruption introduced by the Watchers
  chosen_reading: The verse describes both illicit sexual union and the disclosure of sinful knowledge.
  alternative_readings:
  - The final clause refers specifically to magical or technical arts rather than sin in general
  - The corruption is only sexual, with the final clause as a secondary gloss
  rationale: The Ge'ez explicitly includes both lying with the women and making known 'every sin.' The translation preserves the broad moral charge of the text rather than narrowing it to one category of forbidden knowledge.
  doctrine_reference: Preserve theological tension rather than resolve it; do not flatten apocalyptic imagery or moral categories.
