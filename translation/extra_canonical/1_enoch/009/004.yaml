theological_decisions:
- issue: How to render the repeated divine titulary without flattening it
  chosen_reading: Preserve the threefold formula 'Lord of lords, God of gods, and
    King of kings'
  alternative_readings:
  - Compress to 'supreme Lord and God'
  - Render more dynamically as 'ruler over every lord, god, and king'
  rationale: The verse is a formal heavenly acclamation. The repetitive titulary is
    part of its rhetoric and theology of absolute divine supremacy, so it should remain
    explicit.
  doctrine_reference: Translation philosophy §§1, 4; Book context 'preserve apocalyptic
    imagery'.
- issue: Whether to include the bracketed final term [ወከቡድ] in the main text
  chosen_reading: Exclude from the main text and note as a textual variant
  alternative_readings:
  - Include as 'and glorious/honored'
  - Translate the whole string as four predicates
  rationale: The source marks this word as bracketed/uncertain. Transparency favors
    keeping the main text to the secure reading and preserving the possible addition
    in a footnote.
  doctrine_reference: Translation philosophy §3; transparency section on documenting
    uncertainty.
