translation:
  text: And they said to their Lord, the King, “For you are Lord of lords, God of
    gods, and King of kings, and the throne of your glory is through all the generations
    of eternity, and your name is holy and glorious through all eternity, and blessed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A bracketed Ethiopic reading adds 'and glorious' or 'and honored' after
      'blessed.'
    reason: textual_variant
  - marker: b
    text: The opening address is textually compressed in Ethiopic; the sense is a
      royal and divine acclamation addressed to God.
    reason: alternative_reading
  - marker: c
    text: Or 'to their Lord, the King, “Lord of lords'.
    reason: previous_rendering
  - marker: d
    text: Or 'through all the generations of the world, and your name is holy and
      blessed and praised through all the world.'.
    reason: previous_rendering
lexical_decisions:
- source_word: እግዚኦሙ
  chosen: their Lord
  alternatives:
  - their master
  - their sovereign
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is a plural-honorific/possessive expression addressing the supreme
    deity. 'Lord' best preserves elevated address without reducing it to merely political
    sovereignty.
- source_word: ለነገሥት
  chosen: the King
  alternatives:
  - of kings
  - for kings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the opening address the syntax is compressed and repetitive. Given
    the following titulary sequence ('Lord of lords ... King of kings'), this first
    occurrence is best taken as an appositional royal title, 'the King,' rather than
    repeated mechanically.
- source_word: እግዚኦሙ ለአጋእዝት
  chosen: Lord of lords
  alternatives:
  - Lord of the mighty ones
  - Master of rulers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a standard superlative/genitival title in the verse's chain of
    divine epithets. 'Lord of lords' preserves the elevated formula and parallelism
    with 'God of gods' and 'King of kings.'
- source_word: አምላኮሙ ለአማልክት
  chosen: God of gods
  alternatives:
  - God over the gods
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated genitive-of-superiority formula should be preserved consistently
    in English.
- source_word: ንጉሦሙ ለነገሥት
  chosen: King of kings
  alternatives:
  - King over kings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This completes the triadic titulary and should remain formulaic rather
    than dynamically paraphrased.
- source_word: መንበረ ስብሐቲከ
  chosen: the throne of your glory
  alternatives:
  - your glorious throne
  - the seat of your glory
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A more formal rendering preserves the concrete apocalyptic image of enthronement
    rather than collapsing it into an adjective.
- source_word: ውስተ ኵሉ ትውልደ ዓለም
  chosen: through all the generations of the world
  alternatives:
  - in every generation forever
  - through all generations of eternity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase combines generational duration with world/age language. 'Through
    all the generations of the world' keeps the temporal sweep without over-specifying
    metaphysics.
- source_word: ስምከ ቅዱስ ወስቡሕ ውስተ ኵሉ ዓለም ወቡሩክ
  chosen: your name is holy and blessed and praised through all the world
  alternatives:
  - your name is holy and glorious forever and blessed
  - your name is holy, praised, and blessed in all ages
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sequence piles up predicates in doxological style. 'Praised' is chosen
    for ስቡሕ to reflect commendation/worship language, while retaining 'holy' and 'blessed'
    as distinct descriptors.
