theological_decisions:
- issue: Rendering of angelic names
  chosen_reading: Mikael, Uriel, Raphael, and Gabriel
  alternative_readings:
  - Michael, Uriel, Raphael, and Gabriel
  rationale: Project philosophy prefers transliterating personal names from the source
    tradition rather than defaulting to familiar later English biblical spellings.
    'Mikael' reflects the Ge'ez form more directly, while the others are already close
    to standard English forms.
  doctrine_reference: 'PHILOSOPHY.md: Translate titles; transliterate names.'
- issue: Concrete versus interpretive rendering of blood imagery
  chosen_reading: much blood being poured out
  alternative_readings:
  - much bloodshed
  - blood crying out
  rationale: The verse presents a visionary report of heavenly beings observing earthly
    corruption. Preserving the concrete image of blood on the earth maintains the
    apocalyptic rhetoric and avoids flattening it into an abstract summary.
