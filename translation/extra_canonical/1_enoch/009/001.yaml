translation:
  text: And then Mikael, Uriel, Raphael, and Gabriel looked down from heaven and saw
    much blood being poured out upon the earth, and all the lawlessness being done
    upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being shed.' The Ge'ez verb is difficult, and some interpreters connect
      it with the idea of blood crying out; the main text keeps the more immediate
      image of blood poured out upon the earth.
    reason: lexical_alternative
  - marker: b
    text: The repeated phrase 'upon the earth' is retained to preserve the verse's
      emphasis on the earthly sphere as the scene of violence and transgression.
    reason: cultural_note
lexical_decisions:
- source_word: እሜሃ
  chosen: then
  alternatives:
  - at that time
  - thereupon
  lexicon: Dillmann
  rationale: Temporal discourse marker introducing the next scene; 'then' is natural
    English while preserving sequence.
- source_word: ሐወጹ
  chosen: looked down
  alternatives:
  - peered forth
  - looked out
  lexicon: Dillmann
  rationale: In context with 'from heaven,' the verb conveys directed sight from above
    rather than mere movement; 'looked down' preserves the vertical apocalyptic perspective.
- source_word: እምሰማይ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: Dillmann
  rationale: Straightforward source-oriented rendering; keeps the heavenly vantage
    explicit.
- source_word: ወርእዩ
  chosen: saw
  alternatives:
  - beheld
  lexicon: Dillmann
  rationale: Simple narrative verb; 'saw' is readable modern English without losing
    force.
- source_word: ብዙሐ ደመ
  chosen: much blood
  alternatives:
  - a great quantity of blood
  - much bloodshed
  lexicon: Dillmann
  rationale: The text speaks literally of 'much blood'; 'bloodshed' would interpret
    the image, while 'much blood' preserves the stark apocalyptic concreteness.
- source_word: ዘይትከዓው
  chosen: being poured out
  alternatives:
  - being shed
  - crying out
  lexicon: Dillmann
  rationale: Given the object 'blood' and the following phrase 'upon the earth,' the
    passive sense 'being poured out' fits the scene of violence. 'Being shed' is possible,
    but 'poured out' better preserves the vivid physical imagery. A minority interpretive
    possibility connects the verb with crying out, likely influenced by blood-cry
    motifs elsewhere; that is not adopted in the main text.
- source_word: በዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - over the earth
  lexicon: Dillmann
  rationale: Retains the repeated locative phrase and the elevated register appropriate
    to apocalyptic narrative.
- source_word: ኵሎ ዓመፃ
  chosen: all the lawlessness
  alternatives:
  - all the violence
  - all the wrongdoing
  - all the injustice
  lexicon: Dillmann
  rationale: The noun denotes wicked transgression broadly, not only physical violence.
    'Lawlessness' preserves the moral-juridical force without narrowing the sense.
- source_word: ዘይትገበር
  chosen: being done
  alternatives:
  - being committed
  - taking place
  lexicon: Dillmann
  rationale: A transparent passive rendering that matches the ongoing sense of the
    Ge'ez relative verbal form.
