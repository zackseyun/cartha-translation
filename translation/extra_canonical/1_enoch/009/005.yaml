theological_decisions:
- issue: Whether to render the verse in strongly doctrinal terms of omnipotence/omniscience
  chosen_reading: Retain the concrete language of making, authority, exposure, and
    seeing rather than abstract theological labels.
  alternative_readings:
  - You are omnipotent and omniscient
  - All things are known to you
  rationale: The verse certainly implies divine sovereignty and exhaustive knowledge,
    but the Ge'ez expresses these through vivid concrete predicates. Preserving those
    predicates follows the project's preference for source-shaped wording over later
    doctrinal shorthand.
  doctrine_reference: Translation philosophy §Original-language primacy over translation
    tradition; §Preserve theological tension rather than resolve it.
