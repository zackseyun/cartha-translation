translation:
  text: You have made all things, and the authority over all is with you; and all
    things are uncovered and laid bare before you, and you see all things, and there
    is nothing that is able to hide itself from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'all things are uncovered before you and manifest.' The paired
      expressions intensify the image of total exposure before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ገበርከ
  chosen: have made
  alternatives:
  - did
  - fashioned
  - created
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes making or doing. In this cosmic context with 'all things'
    as object, 'have made' best conveys comprehensive divine workmanship without over-specifying
    creatio ex nihilo, which the Ge'ez verb itself does not require.
- source_word: ስልጣነ
  chosen: authority
  alternatives:
  - dominion
  - power
  - rule
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun refers to ruling power or dominion. 'Authority' preserves both
    sovereignty and rightful power, fitting the prayer's acknowledgment of God's universal
    governance.
- source_word: ምስሌከ
  chosen: is with you
  alternatives:
  - belongs to you
  - is yours
  - is in your presence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'with you.' Here it expresses possession or location of authority
    in relation to God. 'Is with you' keeps the Ge'ez phrasing visible while remaining
    natural English.
- source_word: ክሡት
  chosen: uncovered
  alternatives:
  - revealed
  - manifest
  - exposed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term conveys what is uncovered or exposed. 'Uncovered' preserves
    the concrete image before the paired term 'laid bare,' rather than collapsing
    both into a single abstract idea like 'known.'
- source_word: ግሁድ
  chosen: laid bare
  alternatives:
  - plain
  - manifest
  - open
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with 'uncovered,' this intensifies the image of complete exposure
    before God. 'Laid bare' preserves the apocalyptic and forensic force better than
    the flatter 'open.'
- source_word: ትሬኢ
  chosen: you see
  alternatives:
  - you behold
  - you look upon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward verb of seeing. 'You see' is clear modern English and
    preserves the repeated emphasis on divine omniscience.
- source_word: ዘይትከሀል
  chosen: that is able
  alternatives:
  - that can
  - having power to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The expression marks capability or possibility. 'That is able' keeps
    the formal force of incapacity before God, though the clause is rendered smoothly
    in English as 'there is nothing that is able to hide itself.'
- source_word: ይትኀባእ
  chosen: hide itself
  alternatives:
  - be hidden
  - conceal itself
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The reflexive/passive nuance suggests self-concealment or becoming hidden.
    'Hide itself' preserves the reflexive sense and the rhetorical point that no thing
    can evade God's sight.
