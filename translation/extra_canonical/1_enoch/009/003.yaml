theological_decisions:
- issue: Identity of 'the holy ones of heaven'
  chosen_reading: heavenly holy beings/angels addressed by the souls of the dead
  alternative_readings:
  - human saints in heaven
  rationale: In the immediate context the speakers are appealing to heavenly intermediaries, not to departed righteous humans as a class. The phrase should remain broad enough to preserve the text's angelic court imagery.
  doctrine_reference: Preserve apocalyptic imagery; keep major terms locally grounded in the passage.
- issue: Meaning of ፍትሐ in the plea
  chosen_reading: judgment in the sense of a legal case seeking adjudication
  alternative_readings:
  - justice
  - vindication
  rationale: 'The context is forensic: the slain cry out for their cause to be brought before God. ''Judgment'' preserves the courtroom register, while a footnote can note ''justice/vindication'' as a possible nuance.'
  doctrine_reference: Preserve theological tension rather than resolve it.
