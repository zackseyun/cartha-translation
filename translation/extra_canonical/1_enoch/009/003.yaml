translation:
  text: And now, to you, the holy ones of heaven, the souls of men make their suit, saying, ‘Bring our cause before the Most High.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Bring us justice before the Most High,' or 'Present our case before the Most High.' The Ge'ez wording is juridical and may include both the ideas of legal case and vindication.
    reason: lexical_alternative
  - marker: b
    text: Or 'Bring our judgment'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይእዜኒ
  chosen: And now
  alternatives:
  - And now indeed
  - And at this time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal-discursive transition introducing the present appeal; 'And now' preserves the rhetorical shift without overloading the particle.
- source_word: ለክሙ
  chosen: to you
  alternatives:
  - before you
  - unto you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Dative/addressee marker directed to the heavenly beings; simple modern English fits the address.
- source_word: ለቅዱሳነ ሰማይ
  chosen: the holy ones of heaven
  alternatives:
  - the saints of heaven
  - the holy ones in heaven
  - the heavenly holy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the apocalyptic designation for heavenly beings without importing later ecclesial 'saints.' 'Of heaven' closely follows the genitival relation.
- source_word: ይስእዩ
  chosen: make their suit
  alternatives:
  - petition
  - beseech
  - implore
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys asking or petitioning. 'Make their suit' preserves the formal judicial flavor of an appeal, fitting the context of bloodshed crying for justice.
- source_word: ነፍሳተ ሰብእ
  chosen: the souls of men
  alternatives:
  - the souls of human beings
  - the lives of men
  - human souls
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase refers to the disembodied or slain human dead in context; 'souls of men' is concise and preserves the anthropological language of the text.
- source_word: እንዘ ይብሉ
  chosen: saying
  alternatives:
  - while they say
  - as they say
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard participial speech introduction; 'saying' is natural and sufficiently formal.
- source_word: አብኡ ለነ ፍትሐ
  chosen: Bring our judgment
  alternatives:
  - Bring us justice
  - Present our case
  - Carry our judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plus object 'our judgment/justice' likely means to bring their legal case for adjudication. 'Bring our judgment' keeps the juridical ambiguity and avoids flattening it to a purely abstract 'justice.'
- source_word: ኀበ ልዑል
  chosen: before the Most High
  alternatives:
  - to the Most High
  - unto the Most High
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks direction toward the divine court. 'Before the Most High' suits the legal setting of presenting a case in God's presence.
