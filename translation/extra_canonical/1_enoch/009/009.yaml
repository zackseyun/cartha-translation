theological_decisions:
- issue: Whether to make the causal relation more explicit than the Ge'ez
  chosen_reading: and by this the whole earth has been filled with blood
  alternative_readings:
  - and therefore the whole earth is filled with blood
  - so that the whole earth was filled with blood
  rationale: The verse is part of the archangels' accusation concerning the effects of the Watchers' sin. The Ge'ez supports a concise causal/resultative statement; the chosen wording preserves that without expanding into explanatory paraphrase.
  doctrine_reference: Preserve apocalyptic imagery and avoid paraphrase beyond what the witness warrants.
