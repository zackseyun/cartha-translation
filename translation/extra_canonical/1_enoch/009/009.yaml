lexical_decisions:
- source_word: አንስት
  chosen: women
  alternatives:
  - wives
  - females
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural noun denotes women; 'wives' would over-specify a marital relation not explicit in this clause, though the broader context concerns unions with the Watchers.
- source_word: ወለዳ
  chosen: have borne
  alternatives:
  - gave birth to
  - bore
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering of the verbal form 'to bear/give birth.' Present perfect English fits the clause's resultative force in context.
- source_word: ረዓይተ
  chosen: giants
  alternatives:
  - offspring
  - monstrous ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Watchers context this term refers to the giant progeny of the illicit unions. 'Giants' preserves the traditional and contextual sense without unnecessary paraphrase.
- source_word: በዘ
  chosen: by this
  alternatives:
  - thereby
  - because of this
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This connective points to consequence or means. 'By this' keeps the compact causal/resultative link of the Ge'ez.
- source_word: መልአት
  chosen: has been filled
  alternatives:
  - was filled
  - is full
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys filling or becoming full. 'Has been filled' preserves the completed-result sense in the complaint being presented to heaven.
- source_word: ኵላ ምድር
  chosen: the whole earth
  alternatives:
  - all the earth
  - the entire land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase naturally means 'the whole earth.' 'Land' is possible in some contexts, but the cosmic scope of the passage favors 'earth.'
- source_word: ደመ
  chosen: with blood
  alternatives:
  - by blood
  - bloodshed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun is 'blood.' Rendering it literally preserves the stark apocalyptic imagery; 'bloodshed' would be interpretive smoothing.
