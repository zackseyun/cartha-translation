theological_decisions:
- issue: Whether to normalize the aromatic imagery into generic 'fragrance' language
  chosen_reading: 'Retain a concrete exudation/substance image: ''there came out something like nectar'''
  alternative_readings:
  - there was a fragrant smell from it
  - it yielded perfume
  rationale: The verse catalogs wondrous natural features in a visionary journey. A concrete substance better preserves the apocalyptic-natural imagery than an abstract reference to scent.
  doctrine_reference: Preserve apocalyptic imagery rather than flattening it into generic modern religious prose.
