translation:
  text: And when they took up that fruit, it was better than every fragrance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final phrase is uncertain in the OCR witness. The Ge'ez likely compares
      the fruit favorably with every odor or fragrance; 'than all perfumes' is a possible
      alternative.
    reason: textual_variant
  - marker: b
    text: The clause may describe the fruit's excellence in smell rather than in general
      quality; compare the broader context of aromatic trees in this chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: ተይነሥእዎ
  chosen: they took up
  alternatives:
  - they lifted
  - they picked up
  - they received
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to denote taking up or lifting. In context of fruit
    from a tree, 'took up' preserves the physical action without over-specifying 'plucked,'
    which the surviving Ge'ez wording here does not explicitly require.
- source_word: ፍሬ
  chosen: fruit
  alternatives:
  - produce
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the noun; context is botanical and visionary,
    so 'fruit' is the natural English equivalent.
- source_word: ይኄይስ
  chosen: was better
  alternatives:
  - was more excellent
  - surpassed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Comparative sense fits the construction with እም ('than/from') and preserves
    the evaluative force without becoming too interpretive.
- source_word: እምኵሉ አፈው
  chosen: than every fragrance
  alternatives:
  - than all perfumes
  - than every scent
  - than all sweet odors
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is textually difficult. The surviving OCR points to a comparison
    with all odors/fragrances. 'Fragrance' keeps the sensory imagery and reads naturally
    in English while remaining close to the likely Ge'ez sense.
