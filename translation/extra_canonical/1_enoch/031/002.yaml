translation:
  text: And upon that mountain I saw another mountain, and within it were trees; and those trees were full, like almond trees, and strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez text is difficult in the middle of the verse. The clause rendered 'I perceived fragrant plants' may reflect aromatic or pleasing vegetation; a more literal but less clear rendering would be 'and those trees/plants were full ...'
    reason: textual_variant
  - marker: b
    text: '''Like carob'' preserves a probable botanical comparison in the Ge''ez. The exact point of comparison may be the species itself, its pods, or its form.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and I perceived fragrant plants, full and strong, like carob.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ዲበ
  chosen: upon
  alternatives:
  - 'on'
  - over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Spatial preposition introducing the visionary location. 'Upon' preserves the elevated, report-like style better than the flatter 'on'.
- source_word: ደብር
  chosen: mountain
  alternatives:
  - hill
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for a mountain or highland height. 'Mountain' fits the repeated topographical imagery in this section.
- source_word: ካልአ
  chosen: another
  alternatives:
  - a second
  - other
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks a distinct mountain in sequence. 'Another' is the most natural English equivalent in narrative progression.
- source_word: ውስቴቱ
  chosen: within it
  alternatives:
  - inside it
  - in its midst
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The suffix points back to the mountain. 'Within it' preserves the somewhat unusual image of vegetation located in or on the mountain without over-resolving the geography.
- source_word: ዕፀወ
  chosen: trees
  alternatives:
  - wooded growth
  - plants
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes trees/wood. Here it is best taken concretely as trees, since the verse describes visible vegetation on the mountain.
- source_word: እልኩ
  chosen: I perceived fragrant
  alternatives:
  - I smelled
  - I noticed aromatic
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult in the OCR context, but the sense in this passage appears to move from sight to sensory recognition of aromatic vegetation. 'I perceived fragrant' keeps the sensory shift without forcing a narrowly physiological verb.
- source_word: ዕፀው
  chosen: plants
  alternatives:
  - trees
  - wood
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A second occurrence of the vegetation term may refer more generally to plant growth rather than large trees. 'Plants' avoids awkward repetition and fits the descriptive sequence of aromatic growth.
- source_word: ምሉኣን
  chosen: full
  alternatives:
  - abundant
  - luxuriant
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective suggests fullness or abundance. 'Full' is literal and leaves the exact nuance open.
- source_word: ዘከመ ከርካዕ
  chosen: like carob
  alternatives:
  - like the carob tree
  - like pods of carob
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison appears to invoke the carob tree or its characteristic form. 'Like carob' is concise while preserving the botanical comparison.
- source_word: ጽኑዕተ
  chosen: strong
  alternatives:
  - firm
  - hardy
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys sturdiness or robustness of the vegetation. 'Strong' is idiomatic in English while retaining the vivid physical quality.
