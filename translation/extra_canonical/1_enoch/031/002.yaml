  source_review: state/reviews/gemini/phase10_ethiopic_pseudepigrapha/extra_canonical/1_enoch/031/002.job-72322.json
  category: mistranslation
  tier: 2
  from: and I perceived fragrant plants, full and strong, like carob.
  to: and those trees were full, like almond trees, and strong.
  rationale: The Ge'ez word እልኩ ('elku) is simply the demonstrative pronoun "those" (plural), modifying ዕፀው ("trees"). The draft hallucinates "I perceived fragrant" out of nowhere. Furthermore, ከርካዕ (karkāʿ) means "almond" (or nut), not "carob". The phrase ወእልኩ፡ ዕፀው፡ ምሉኣን፡ ዘከመ፡ ከርካዕ፡ [ወ]ጽኑዕተ means "and those trees were full, like almond trees, and strong/hard."
