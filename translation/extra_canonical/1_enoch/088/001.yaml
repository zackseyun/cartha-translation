theological_decisions:
- issue: Whether to render the fallen 'star' as an angelic being in the main text
  chosen_reading: Retain 'star' in the main text while allowing the personal force to emerge through the binding of hands and feet.
  alternative_readings:
  - Render as 'angel' directly
  - Render pronouns as masculine throughout
  rationale: Animal Apocalypse symbolism regularly uses stars for heavenly beings. The Ge'ez explicitly says 'star,' so the translation preserves the symbol rather than resolving it into interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
