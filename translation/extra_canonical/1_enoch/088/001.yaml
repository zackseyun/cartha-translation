translation:
  text: And I saw one of those four who had come out first, and he seized that first star which had fallen from heaven, and bound its hands and its feet, and threw it into the abyss. And that abyss was narrow and deep and dreadful and dark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The 'star' is presented with hands and feet, indicating that the visionary symbol represents a personal heavenly being under judgment.
    reason: cultural_note
  - marker: b
    text: Or 'the deep.' The Ge'ez term denotes a profound depth; 'abyss' is chosen to preserve the apocalyptic sense of a place of confinement.
    reason: lexical_alternative
  - marker: c
    text: Or 'who had come out before them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - And I looked
  - And I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard visionary narrative verb; 'I saw' is clear modern English and preserves the reportive apocalyptic frame.
- source_word: አሐደ፡ እምእልኩ፡ ፬እለ
  chosen: one of those four
  alternatives:
  - one from among those four
  - one of the four
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks selection from a previously mentioned group of four beings; 'those four' preserves the anaphoric force.
- source_word: ወፅኡ፡ እምቅዳሚ
  chosen: who had come out before them
  alternatives:
  - who had gone forth before them
  - who came out in front of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez combines going out with a prepositional phrase of precedence/front. 'Had come out before them' fits the narrative sequence and keeps the spatial nuance without over-specifying.
- source_word: አሐዘ
  chosen: seized
  alternatives:
  - took hold of
  - grasped
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A forceful verb suits the arrest-and-binding scene better than the weaker 'took'.
- source_word: ለዝኩ፡ ኮከብ፡ ቀዳማይ
  chosen: that first star
  alternatives:
  - that former star
  - that star, the first one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative plus ordinal identifies a specific previously seen star. 'First' is the most natural rendering of ቀዳማይ here.
- source_word: ዘወድቀ፡ እምሰማየ
  chosen: which had fallen from heaven
  alternatives:
  - that fell from heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause identifies the star by its prior fall; 'from heaven' preserves the vertical apocalyptic imagery.
- source_word: ወአሰረ፡ እደዊሁ፡ ወእገሪሁ
  chosen: and bound its hands and its feet
  alternatives:
  - and bound his hands and his feet
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The antecedent is 'star,' so the main text keeps the visionary symbol with 'its,' while the binding of limbs signals the star represents a personal heavenly being.
- source_word: ወወደዮ፡ ውስተ፡ ማዕምቅ
  chosen: and threw it into the abyss
  alternatives:
  - and cast it into the deep
  - and brought it into the abyss
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of punitive confinement, 'threw' best captures the force of the action. 'Abyss' preserves apocalyptic prison imagery better than the more generic 'deep'.
- source_word: ማዕምቅ
  chosen: abyss
  alternatives:
  - deep
  - pit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes a profound depth; 'abyss' is the best English equivalent in apocalyptic contexts and avoids flattening the image.
- source_word: ጸቢብ፡ ወዕሙቅ፡ ወዕጹብ፡ ወጽልመት
  chosen: narrow and deep and dreadful and dark
  alternatives:
  - confined and deep and terrible and dark
  - narrow and deep and strange and dark
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse piles up stark descriptors of the prison-like abyss. 'Dreadful' best conveys the fearful quality of ዕጹብ in this judgment scene; the repeated 'and' preserves the cumulative style.
