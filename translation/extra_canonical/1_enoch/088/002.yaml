theological_decisions:
- issue: Nature of the animal imagery
  chosen_reading: Retain the literal animal terms in the main text as visionary symbols,
    without identifying their historical referents in translation.
  alternative_readings:
  - Interpret the animals directly as nations or armies in the main text
  rationale: The Animal Apocalypse communicates through symbolic animals. The translation
    should preserve the vision's imagery rather than collapse symbol into interpretation.
  doctrine_reference: 'Book context: visionary and apocalyptic prose/poetry; do not
    flatten cosmic imagery.'
