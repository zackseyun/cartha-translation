translation:
  text: And one of them drew a sword and gave it to those elephants and camels and
    donkeys, and they began to strike one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic wording at the end is difficult. The sense is that, after receiving
      the sword, these animals turned to mutual violence; 'began to strike one another'
      is a cautious rendering.
    reason: textual_variant
lexical_decisions:
- source_word: መላሕ
  chosen: drew
  alternatives:
  - unsheathed
  - took
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with 'sword,' the verb most naturally denotes drawing or taking
    up a weapon, not merely carrying it.
- source_word: ሰይፈ
  chosen: sword
  alternatives:
  - blade
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The standard concrete weapon term should remain literal in this apocalyptic
    animal vision.
- source_word: ወወሀቦሙ
  chosen: gave it to them
  alternatives:
  - handed it to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward transfer verb; 'gave' preserves the narrative simplicity
    and leaves the symbolic force intact.
- source_word: ለእልኩ ነጌያት ወአገማል ወአእዱግ
  chosen: to those elephants and camels and donkeys
  alternatives:
  - to those elephants, camels, and asses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: These are the animal figures named in the vision; common modern animal
    names are preferable to archaic 'asses.'
- source_word: አንዘ እንዘ ይትደአ
  chosen: they began to strike one another
  alternatives:
  - they fought with one another
  - they smote one another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated/ongoing verbal form suggests the onset of mutual violence.
    'Strike one another' preserves the physicality without archaic diction.
