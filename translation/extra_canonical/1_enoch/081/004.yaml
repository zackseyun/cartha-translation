theological_decisions:
- issue: Meaning of 'who does not die' in a beatitude about the righteous
  chosen_reading: Retain the literal wording 'who does not die' without resolving whether it refers to eschatological vindication, exemption from condemned death, or idealized immortality.
  alternative_readings:
  - who will not perish
  - who will not die under judgment
  - who is immortal
  rationale: The Ge'ez states non-dying directly. Because the surrounding clauses concern heavenly books and judgment, the phrase likely has eschatological force, but the text itself should retain the tension rather than interpret it away.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the heavenly 'book' imagery
  chosen_reading: Keep 'book' in the main text rather than replacing it with 'record.'
  alternative_readings:
  - record
  - account
  rationale: Enochic literature repeatedly uses celestial books/registers as concrete apocalyptic imagery. The translation should preserve that imagery instead of reducing it to an abstract administrative metaphor.
  doctrine_reference: Original-language primacy over translation tradition; do not flatten apocalyptic imagery.
