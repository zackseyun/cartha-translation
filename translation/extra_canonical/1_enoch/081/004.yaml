translation:
  text: 'And from it And from it I said: blessed is the man who dies righteous and good, upon whom no book of wrongdoing has been written, and for whom no day of judgment will be found.: blessed is the man who dies righteous and good, upon whom no book of wrongdoing has been written, and for whom no day of judgment will be found.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from this I understand.' The opening clause is textually and syntactically difficult in the OCR witness, but it introduces Enoch's inference from the revealed material.
    reason: textual_variant
  - marker: b
    text: Literally 'every book of wrongdoing ... not written upon him.' The image is of a heavenly written register of guilt.
    reason: lexical_alternative
  - marker: c
    text: '''Day of judgment'' could also be understood as ''day of condemnation'' depending on how ኵነኔ is taken in context.'
