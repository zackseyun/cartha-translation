lexical_decisions:
- source_word: እምኔሁ
  chosen: from it
  alternatives:
  - from this
  - therefrom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition plus pronominal suffix most naturally means 'from it/from this.' In context it introduces Enoch's inference from the revealed tablets or instruction just mentioned. 'From it' preserves the anaphoric link without over-specifying the antecedent.
- source_word: እቤ
  chosen: I know this
  alternatives:
  - I know
  - I understand this
  - I say
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is difficult in OCR, but in context it functions as Enoch's statement of understanding or recognition. 'I know this' gives the inferential sense and accounts for the following beatitude.
- source_word: ብፁዕ
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In wisdom/apocalyptic beatitude contexts, 'blessed' best preserves the elevated register and covenantal-religious force; 'happy' would be too weak and modern.
- source_word: ብእሲ
  chosen: man
  alternatives:
  - person
  - human being
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The singular noun ordinarily means 'man.' Although generic in force, 'man' keeps the formal beatitude style and matches the singular modifiers 'righteous and good.'
- source_word: ዘይመውት
  chosen: who does not die
  alternatives:
  - who will not die
  - who is not dying
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative verbal form is most straightforwardly rendered as a present/future general statement. 'Who does not die' preserves the gnomic-apocalyptic force without deciding whether the emphasis is literal immortality or exemption from condemned death.
- source_word: ጻድቅ
  chosen: righteous
  alternatives:
  - just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Righteous'' is the project''s default for this moral-theological term and fits Enochic usage better than the more juridical ''just''.'
- source_word: ኄር
  chosen: good
  alternatives:
  - kind
  - upright
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective denotes goodness/beneficence. 'Good' is broad and natural; 'kind' would narrow the sense too much.
- source_word: ኵሉ መጽሐፈ ዐመፃ
  chosen: no book of wrongdoing
  alternatives:
  - no record of wrongdoing
  - no book of violence
  - no scroll of iniquity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'every book of wrongdoing,' but in English under negation the idiom is best represented as 'no book of wrongdoing.' 'Book' is retained because heavenly books/records are a significant apocalyptic image and should not be flattened into merely abstract 'record' in the main text.
- source_word: ዐመፃ
  chosen: wrongdoing
  alternatives:
  - violence
  - iniquity
  - transgression
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can overlap with violence or injustice, but here in connection with a written book/register it likely denotes culpable evil more generally. 'Wrongdoing' is broad enough while remaining morally weighty.
- source_word: ኢተጽሕፈ ዲቤሁ
  chosen: has been written upon him
  alternatives:
  - has been written against him
  - has been inscribed concerning him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive with preposition literally suggests writing 'upon' or 'against' him. English idiom prefers 'written upon him' only awkwardly, so the main text smooths to 'upon whom ... has been written' while preserving the forensic-record imagery.
- source_word: ኢይትረከብ ዕለተ ኵነኔ
  chosen: no day of judgment will be found
  alternatives:
  - the day of judgment will not be found
  - no day of condemnation will be found
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/imperfect means 'will not be found.' ኵነኔ can denote judgment, sentence, or condemnation. 'Judgment' is the broader apocalyptic term and avoids over-narrowing to punitive sentence, though condemnation remains possible.
