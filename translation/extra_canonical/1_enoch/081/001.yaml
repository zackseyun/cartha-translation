translation:
  text: And he said to me, “Look, Enoch, at the tablets of heaven, and read what is
    written on them, and understand everything, one by one.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “understand all things one by one.”
    reason: lexical_alternative
  - marker: b
    text: The phrase “tablets of heaven” evokes heavenly written records in apocalyptic
      tradition, not merely a metaphor for abstract knowledge.
    reason: cultural_note
  - marker: c
    text: Or 'every single thing'.
    reason: previous_rendering
lexical_decisions:
- source_word: ነጽር
  chosen: look
  alternatives:
  - see
  - behold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative of seeing/looking. 'Look' is direct and natural English; 'behold'
    would sound more archaic than the project style prefers.
- source_word: ዘፀፍፀፈ ሰማይ
  chosen: the tablets of heaven
  alternatives:
  - the writing-tablets of heaven
  - the heavenly tablets
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This expression refers to the celestial records/books common in apocalyptic
    literature. 'Tablets of heaven' preserves the concrete image better than a flattened
    'book' or purely interpretive 'records.'
- source_word: አንብብ
  chosen: read
  alternatives:
  - read aloud
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward imperative. No contextual marker requires the more specific
    'read aloud.'
- source_word: ዘጽሑፍ ዲቤሆሙ
  chosen: what is written upon them
  alternatives:
  - that which is written on them
  - what has been written over them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative clause plus preposition naturally yields 'what is written upon
    them,' referring back to the tablets.
- source_word: እእምር
  chosen: understand
  alternatives:
  - know
  - learn
  - perceive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context the command is not merely to read but to grasp the meaning.
    'Understand' best captures that cognitive force.
- source_word: ኵሎ አሐደ አሐደ
  chosen: every single thing
  alternatives:
  - everything one by one
  - all things, one by one
  - each thing individually
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repetition of 'one by one' intensifies completeness and particularity.
    'Every single thing' gives idiomatic English while preserving the distributive
    force; the more literal alternative is preserved in a footnote.
