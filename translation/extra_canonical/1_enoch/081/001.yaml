theological_decisions:
- issue: Apocalyptic image of heavenly record-keeping
  chosen_reading: the tablets of heaven
  alternative_readings:
  - the heavenly tablets
  - the books of heaven
  rationale: The verse invokes a stock apocalyptic image of celestial written records.
    Retaining 'tablets' preserves the visionary concreteness and avoids importing
    later or smoother terminology like 'books' unless the text clearly demands it.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    flatten into generic prose.'
