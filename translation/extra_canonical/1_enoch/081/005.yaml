theological_decisions:
- issue: Meaning of the declaration about flesh and righteousness
  chosen_reading: A universal statement of creaturely inability to stand as righteous
    before God
  alternative_readings:
  - A narrower statement about ritual impurity or mortality
  - A forensic 'be justified' reading shaped by later Pauline usage
  rationale: The Ge'ez says literally that no flesh 'is righteous' before the Lord.
    In this Enochic context the line stresses the creaturely status of all flesh before
    the Creator, not specifically a later doctrinal formula about justification.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import later Christian phrasing.
