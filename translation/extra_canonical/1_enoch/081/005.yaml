translation:
  text: And those seven holy ones brought me near and set me down on the earth before
    the door of my house, and they said to me, “Make everything known to Methuselah
    your son, and show all your children that no flesh is righteous before the Lord,
    for he is the one who created them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the entrance of my house.' The Ge'ez term can denote a doorway
      or entrance area.
    reason: lexical_alternative
  - marker: b
    text: '''No flesh'' preserves the concrete idiom of the source, meaning all mortal
      creatures or humanity in its embodied condition.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አቅረቡኒ
  chosen: brought me near
  alternatives:
  - brought me
  - led me near
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is causative of nearness/approach. 'Brought me near' preserves
    the directional nuance better than the flatter 'brought me.'
- source_word: ፯ ቅዱሳን
  chosen: seven holy ones
  alternatives:
  - seven saints
  - seven sacred ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Enochic apocalyptic context this refers to heavenly holy beings. 'Holy
    ones' preserves the stock apocalyptic term without importing later ecclesiastical
    overtones of 'saints.'
- source_word: አንበሩኒ
  chosen: set me down
  alternatives:
  - placed me
  - seated me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates causing someone to sit or be placed. 'Set me down'
    fits the movement from heavenly transport back to earth and reads naturally in
    English.
- source_word: በቅድመ ኆኅተ ቤትየ
  chosen: before the door of my house
  alternatives:
  - at the entrance of my house
  - before the gate of my house
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is spatial and concrete. 'Door' is the most direct rendering
    of the Ge'ez term here; 'before' preserves the formal preposition.
- source_word: አይድዕ ኵሎ
  chosen: Make everything known
  alternatives:
  - Tell everything
  - Cause all to know
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The imperative is causative: not merely ''know,'' but ''make known.''
    This keeps the commission force of the angelic speech.'
- source_word: አርኢ ለኵሎሙ ውሉድከ
  chosen: show all your children
  alternatives:
  - make it seen to all your children
  - reveal it to all your sons/offspring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means 'show' or 'make see.' 'Children' is preferred over 'sons'
    because the plural term can denote offspring broadly unless the immediate context
    requires males specifically.
- source_word: ከመ ኢ ይጸድቅ ኵሉ ዘሥጋ
  chosen: that no flesh is righteous
  alternatives:
  - that all flesh is not justified
  - that no embodied being is righteous
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction expresses a universal negation. 'No flesh is righteous'
    is idiomatic English and preserves the anthropological force of 'flesh' rather
    than reducing it to 'no one.'
- source_word: ዘሥጋ
  chosen: flesh
  alternatives:
  - mortal flesh
  - humanity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text uses the concrete term 'flesh.' Retaining it preserves the biblical-apocalyptic
    idiom and avoids over-interpretation.
- source_word: በቅድመ እግዚአ
  chosen: before the Lord
  alternatives:
  - in the presence of the Lord
  - before the Master
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Before the Lord'' is the most direct and idiomatic rendering of the
    prepositional phrase. ''Lord'' matches project policy for divine address terms.'
- source_word: እስመ ውእቱ ፈጠሮሙ
  chosen: for he is the one who created them
  alternatives:
  - for he created them
  - because he himself made them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronoun adds emphasis. 'He is the one who created them' preserves
    that emphasis better than a bare 'he created them.'
