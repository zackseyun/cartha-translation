translation:
  text: For one year I will leave you with your son, until again the command comes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is textually difficult in the OCR witness; the sense appears
      to be that Enoch will remain with his son for one year until a further command
      is given or comes again.
    reason: textual_variant
lexical_decisions:
- source_word: ዓመተ፡ አሐደ፡
  chosen: for one year
  alternatives:
  - one year
  - a single year
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is a straightforward temporal expression. Rendering it idiomatically
    as 'for one year' fits the verbal sense that follows.
- source_word: ነኅድገከ፡
  chosen: I will leave you
  alternatives:
  - I will let you remain
  - I will abandon you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb most naturally means 'leave' or 'let remain.' 'Abandon' is too
    strong in this consoling/instructional context; 'leave you' preserves the directness
    of the Ge'ez.
- source_word: በኀበ፡ ወልድከ፡
  chosen: with your son
  alternatives:
  - beside your son
  - in the care of your son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition plus noun indicates proximity or association. 'With your
    son' is the clearest natural English rendering and suits the immediate family
    setting.
- source_word: እስከ፡ ካዕበ፡
  chosen: until again
  alternatives:
  - until once more
  - until a second time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sequence marks a limit in time followed by repetition. 'Until again'
    is concise and preserves the sense of a renewed event.
- source_word: ትእዛዝ፡
  chosen: the command
  alternatives:
  - the order
  - the instruction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In an angelic/apocalyptic setting, 'command' best preserves the authoritative
    force without over-specifying the speaker.
- source_word: ከመ፡
  chosen: comes
  alternatives:
  - arrives
  - is given
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR appears truncated at the verse end, but the particle likely introduces
    the completion of the clause. Given the common sense of the line in context, 'comes'
    supplies a minimal, transparent completion rather than a freer paraphrase.
