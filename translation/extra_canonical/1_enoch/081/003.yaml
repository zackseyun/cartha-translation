translation:
  text: And at that time I blessed the Great Lord, the King of Glory forever, because
    he has made all the works of the world; and I praised the Lord for his patience,
    and I blessed him on account of the children of Adam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for his forbearance' or 'for his long-suffering'; the Ge'ez term can
      carry the sense of enduring restraint, not mere passive patience.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'children of Adam' is a literal anthropological expression for
      human beings, preserving the text's linkage to Adam rather than using the smoother
      'humanity.'
    reason: cultural_note
lexical_decisions:
- source_word: እምሶቤሃ
  chosen: at that time
  alternatives:
  - then
  - thereupon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal connective introducing Enoch's response; 'at that time' preserves
    the narrative-apocalyptic register better than a flatter 'then'.
- source_word: ባረክዎ
  chosen: I blessed
  alternatives:
  - I gave praise to
  - I blessed him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb of blessing is kept explicit rather than reduced to generic
    praise; the object is supplied by the following marked noun phrase.
- source_word: እግዚአ ዐቢይ
  chosen: the Great Lord
  alternatives:
  - the great Lord
  - the mighty Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Taken as a title with adjective; capitalized in English as a divine title.
    'Great' is more direct than interpretive 'mighty'.
- source_word: ንጉሠ ስብሐት
  chosen: the King of Glory
  alternatives:
  - the king of glory
  - the glorious king
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Construct phrase best rendered as a title, preserving the elevated doxological
    style and avoiding dilution into an adjectival paraphrase.
- source_word: ለዓለም
  chosen: forever
  alternatives:
  - for eternity
  - for the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Idiomatic English rendering of enduring duration in a doxological context.
- source_word: በከመ ገብረ ኵሎ ግብረ ዓለም
  chosen: because he has made all the works of the world
  alternatives:
  - because he made every work of the world
  - for he made all creation's works
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the repeated work/works language from Ge'ez rather than collapsing
    it into simply 'everything'; 'world' is kept from ዓለም rather than importing 'universe'.
- source_word: ሰባሕኩ
  chosen: I praised
  alternatives:
  - I glorified
  - I gave praise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Distinguished from 'blessed' to preserve the verse's paired but non-identical
    verbs.
- source_word: ትዕግሥቱ
  chosen: his patience
  alternatives:
  - his long-suffering
  - his forbearance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes endurance/forbearance. 'Patience' is readable modern
    English, while a footnote preserves the stronger alternative nuance.
- source_word: ዲበ ውሉደ አዳም
  chosen: on account of the children of Adam
  alternatives:
  - concerning the children of Adam
  - over the children of Adam
  - for the sake of the children of Adam
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition is somewhat flexible here. 'On account of' best fits
    the sense that Enoch blesses God with reference to humanity, without overcommitting
    to benefactive or adversative nuance. 'Children of Adam' preserves the anthropological
    expression rather than flattening it to 'humanity'.
