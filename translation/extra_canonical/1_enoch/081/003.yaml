theological_decisions:
- issue: Rendering of ውሉደ አዳም
  chosen_reading: the children of Adam
  alternative_readings:
  - the children of men
  - humankind
  - the sons of Adam
  rationale: The Ge'ez expression is retained in a form that preserves its Adamic,
    human-lineage resonance. This avoids both male-specific English ('men') and an
    over-smoothed abstraction ('humankind').
  doctrine_reference: Translate from the local passage first; preserve significant
    theological wording rather than harmonizing.
