theological_decisions:
- issue: Anthropological phrase ውሉደ ሥጋ
  chosen_reading: children of flesh
  alternative_readings:
  - all mortals
  - human offspring
  - all flesh
  rationale: The literal phrase carries apocalyptic and creaturely force, contrasting earthly flesh with heavenly records. A more idiomatic rendering like 'mortals' is possible but loses the texture of the source.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic or anthropological language into generic prose.
