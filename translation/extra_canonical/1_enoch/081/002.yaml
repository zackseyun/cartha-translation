translation:
  text: And I looked at the tablets of heaven, and I read all that was written, and I understood it all; and I read the book of all the deeds of humankind and of all the children of flesh upon the earth, to the generations of eternity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the book concerning all the deeds of humankind.' The Ge'ez construction may be read as a genitival description of the book's contents.
    reason: lexical_alternative
  - marker: b
    text: '''Children of flesh'' is a literal rendering of a Semitic-style expression for human beings in their mortal, earthly condition.'
    reason: cultural_note
  - marker: c
    text: Or 'to eternal generations' / 'for the generations forever.' The closing phrase is idiomatic and expansive rather than narrowly chronological.
    reason: lexical_alternative
  - marker: d
    text: Or 'who will be upon the earth'.
    reason: previous_rendering
lexical_decisions:
- source_word: ነጸርኩ
  chosen: I looked
  alternatives:
  - I gazed
  - I observed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward visionary verb of seeing; 'looked' is clear modern English, while still fitting apocalyptic report style.
- source_word: በፀፍፀፈ ሰማይ
  chosen: at the tablets of heaven
  alternatives:
  - on the tablets of heaven
  - in the tablets of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase refers to heavenly written tablets/books common in apocalyptic literature. 'Tablets' preserves the concrete image better than smoothing to 'book' or 'record.' 'At' fits English with the preceding verb of looking.
- source_word: አንበብኩ ኵሎ ዘጽሑፍ
  chosen: I read all that was written
  alternatives:
  - I read everything written
  - I read all the writing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This keeps the totalizing force of ኵሎ and the passive sense of 'that was written' without overcomplicating the line.
- source_word: አእመርኩ ኵሎ
  chosen: I understood it all
  alternatives:
  - I came to know it all
  - I comprehended it all
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates understanding/knowing, not merely reading. 'Understood' best captures cognitive grasp in context.
- source_word: አንበብክዋ ለመጽሐፈ
  chosen: I read the book
  alternatives:
  - I read in the book
  - I read it, the book
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronominal form plus object marker likely resumes the act of reading with explicit object 'the book.' English smooths this as 'I read the book' while preserving the repeated reading formula.
- source_word: ኵሉ ምግባሮሙ ለሰብእ
  chosen: of all the deeds of humankind
  alternatives:
  - of all the works of men
  - of every action of humanity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ምግባር commonly denotes deed, act, conduct. 'Humankind' avoids unnecessary male restriction from ሰብእ in this universal context.
- source_word: ውሉደ ሥጋ
  chosen: children of flesh
  alternatives:
  - sons of flesh
  - offspring of flesh
  - all flesh
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A literal rendering preserves the anthropological/apocalyptic texture. 'Children of flesh' is more transparent than collapsing it into 'mortals,' though it clearly denotes human beings.
- source_word: ዘዲበ ምድር
  chosen: who will be upon the earth
  alternatives:
  - who are on the earth
  - upon the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative phrase modifies 'children of flesh.' Future nuance is possible in context because the heavenly book concerns those across coming generations; 'will be' preserves that prospective scope.
- source_word: እስከ ትውልደ ዓለም
  chosen: to the generations of eternity
  alternatives:
  - unto eternal generations
  - to the generations forever
  - to the generation of the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is expansive and apocalyptic. 'Generations of eternity' preserves the elevated idiom better than flattening to simply 'forever,' while remaining intelligible.
