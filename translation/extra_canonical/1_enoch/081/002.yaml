  rationale: 'Adjudicator-modified: The Ge''ez phrase ዘዲበ፡ ምድር (za-diba mədr) is a verbless relative clause. While supplying a verb like ''will be'' (to match the future scope of ''to the generations of eternity'') or ''are'' (as a timeless present) is grammatically defensible, both introduce tense restrictions not explicitly present in the source. Translating it simply as ''upon the earth'' perfectly captures the verbless Ge''ez construction and allows the temporal scope to be governed naturally by the surrounding context.'
