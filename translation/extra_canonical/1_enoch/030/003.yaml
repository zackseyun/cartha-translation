theological_decisions:
- issue: Rendering of the aromatic plant term in an apocalyptic landscape
  chosen_reading: cinnamon
  alternative_readings:
  - cassia
  - an aromatic reed/spice plant
  rationale: The Ge'ez loanword points to a known aromatic spice, and 'cinnamon' is
    the most straightforward English equivalent. Because the verse catalogs wondrous
    landscape features, a concrete plant name is preferable to a vague generic term.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten concrete visionary
    details into generic prose.
