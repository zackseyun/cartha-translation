lexical_decisions:
- source_word: መንገለ
  chosen: by the side of / beyond / toward
  alternatives:
  - beside
  - alongside
  - in the direction of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The prepositional form recurs three times with slightly different local
    force in the verse: first spatial adjacency (''by the side of those valleys''),
    then extension past a landmark (''beyond them''), then directional movement (''toward
    the east''). Rendering each by one rigid English gloss would sound unnatural and
    obscure the scene.'
- source_word: ክንፈሩ
  chosen: side
  alternatives:
  - edge
  - border
  - wing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally related to 'wing/side,' but in this topographical context it
    describes the flank or side of the valleys, not a literal wing.
- source_word: ቈላት
  chosen: valleys
  alternatives:
  - wadis
  - ravines
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A terrain term; 'valleys' is the most natural elevated English equivalent
    and fits the visionary geography.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary report; 'I saw' preserves the directness
    of the apocalyptic narration.
- source_word: ቀናንሞስ
  chosen: cinnamon
  alternatives:
  - qenanemos/cinnamon plant
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The loanword clearly denotes cinnamon/cassia-type aromatic spice. 'Cinnamon'
    is the clearest English rendering without unnecessary transliteration.
- source_word: ዘመዓዛ
  chosen: fragrant
  alternatives:
  - sweet-smelling
  - aromatic
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This adjectival phrase marks the cinnamon by its scent. 'Fragrant' is
    concise and preserves the sensory quality of the vision.
- source_word: ቀረብኩ
  chosen: I came near
  alternatives:
  - I approached
  - I drew near
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A movement verb indicating approach rather than arrival. 'I came near'
    keeps the narrative motion and slightly elevated register.
- source_word: ጽባሕ
  chosen: the east
  alternatives:
  - eastward
  - the sunrise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In geographical context this denotes the eastern direction/region. 'Toward
    the east' is idiomatic and preserves the directional sense.
