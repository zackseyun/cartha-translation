    reason: previous_rendering
lexical_decisions:
- source_word: ወርኢኩ
  chosen: And I saw
  alternatives:
  - And I looked
  - And I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The common first-person visionary verb is best rendered simply and clearly
    as 'I saw.' The conjunction is retained to preserve the sequential apocalyptic
    narration.
- source_word: ዕፀ ሠናየ
  chosen: a beautiful tree
  alternatives:
  - a fair tree
  - a goodly tree
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun means 'tree/wood,' and the adjective conveys beauty or goodness.
    'Beautiful tree' is natural modern English while preserving the descriptive force.
- source_word: ዘይመስል
  chosen: whose ... was like
  alternatives:
  - which resembled
  - that was like
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative-plus-comparison construction introduces resemblance. In
    English, folding it into 'whose fragrance was like' yields a readable rendering
    without losing the comparative sense.
- source_word: ዕፀ መዓዛ
  chosen: fragrance
  alternatives:
  - aromatic tree
  - tree of fragrance
  - sweet smell
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the phrase may suggest something like 'tree of fragrance/aroma,'
    but in context the comparison concerns scent rather than species. Rendering the
    sense as 'fragrance' best fits the clause and avoids awkward English.
- source_word: ከመ
  chosen: like
  alternatives:
  - as
  - similar to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard comparative particle; 'like' is the most direct English equivalent
    here.
- source_word: እንተ ዘስኪኖን
  chosen: mastic
  alternatives:
  - lentisk
  - a resinous tree
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plant name is difficult, but it is commonly understood as referring
    to the mastic/lentisk tree. 'Mastic' preserves the specific botanical image; an
    alternative is noted because the exact species term may be uncertain in English.
