translation:
  text: And I saw a beautiful tree, which resembled a fragrant tree, like the mastic
    tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final plant name is uncertain in English; it likely refers to the mastic
      or lentisk tree, known for its aromatic resin.
    reason: lexical_alternative
  - marker: b
