theological_decisions:
- issue: Visionary geography should remain concrete rather than allegorized
  chosen_reading: 'Render the landscape as an actual seen place within the vision: ''another place, a valley of waters'''
  alternative_readings:
  - Treat the valley symbolically in the main text
  - Generalize to 'a place with water'
  rationale: The Book of the Watchers regularly presents revealed cosmic geography through concrete topographical images. The translation preserves that apocalyptic texture rather than reducing it to generic symbolism.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not flatten visionary prose.'
