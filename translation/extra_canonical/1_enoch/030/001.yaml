    reason: previous_rendering
lexical_decisions:
- source_word: ላዕሌሁ / ላዕለ
  chosen: above
  alternatives:
  - over
  - upon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated preposition marks spatial elevation in visionary geography. 'Above' preserves the layered apocalyptic topography better than the more ambiguous 'over'.
- source_word: እሙንቱ
  chosen: them
  alternatives:
  - those
  - these
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronoun points back to previously described features in the vision. 'Them' keeps the anaphoric reference without over-specifying the antecedent.
- source_word: ተደብረ
  chosen: their mountains
  alternatives:
  - its mountains
  - the mountains
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form is related to 'mountain' and appears with the preceding plural reference. 'Their mountains' best reflects the likely possessive relation to the antecedent plural, while acknowledging some uncertainty in the OCR and morphology.
- source_word: ጽባሕ
  chosen: I saw
  alternatives:
  - behold
  - I looked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context this functions as the standard visionary report formula. 'I saw' is clear modern English and preserves the seer's direct perception.
- source_word: መካነ ካልአ
  chosen: another place
  alternatives:
  - a second place
  - another region
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መካነ denotes a place/location, and ካልአ marks it as another or second. 'Another place' is natural English while retaining the sequential movement through visionary locales.
- source_word: ቈላ
  chosen: valley
  alternatives:
  - ravine
  - hollow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes a low-lying depression or valley. 'Valley' is the broadest and least interpretively loaded choice for the landscape image.
- source_word: ማያት
  chosen: waters
  alternatives:
  - water
  - streams
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural form is best preserved as 'waters,' which suits elevated visionary diction and avoids narrowing the image to flowing streams.
- source_word: አኮ ርሑቀ
  chosen: not far away
  alternatives:
  - was not distant
  - was near
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase gives relative spatial proximity. 'Not far away' is idiomatic and keeps the narrator's geographic orientation.
- source_word: ከመ ዘኢይትዌጸእ
  chosen: as though it were inexhaustible
  alternatives:
  - as if it could not be drained
  - as if it did not run out
  - as if it did not go forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause is textually difficult, but the negative verbal idea suggests something not exhausted or not emptied out. 'As though it were inexhaustible' preserves the impressionistic force without overcommitting to a narrower hydraulic image.
