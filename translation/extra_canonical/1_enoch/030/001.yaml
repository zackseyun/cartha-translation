  category: mistranslation
  tier: 3
  from: above their mountains, I saw another place, a valley of waters, not far away
  to: above those mountains of the east, not far away, I saw another place, a valley of waters
  rationale: 'Adjudicator-modified: The reviewer correctly identifies that ጽባሕ (ṣebaḥ) means ''east'' and was omitted from the current translation. Furthermore, the OCR error ተደብረ (tadabra) obscures the construct plural አድባረ (''adbara, ''mountains of''), which governs ''east.'' The phrase አኮ ርሑቀ (''ako reḥuqa, ''not far'') also precedes the verb ርኢኩ (re''iku, ''I saw'') in the Ge''ez syntax. I am modifying the proposed rewrite slightly to include ''those'' to account for the demonstrative pronoun እሙንቱ (''emuntu).'
