translation:
  text: And above them, above those mountains of the east, not far away, I saw another place, a valley of waters, as though it were inexhaustible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic text is difficult at the end of the verse. The final clause may mean 'as though it could not be drained' or 'as though it did not run out.'
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'their mountains' depends on a somewhat uncertain form in the OCR witness; 'the mountains' is also possible.
    reason: textual_variant
  - marker: c
