theological_decisions:
- issue: Whether to preserve the bodily expression 'my mouth' or smooth it to 'I said'
  chosen_reading: Preserve 'my mouth' in the main text
  alternative_readings:
  - I said
  - I spoke
  rationale: The phrase is not a theological crux, but it is stylistically significant in apocalyptic narration. Preserving it maintains the texture of the source and avoids unnecessary smoothing.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of ግሩም in an apocalyptic judgment setting
  chosen_reading: terrible
  alternative_readings:
  - awesome
  - fearsome
  - dreadful
  rationale: The context is a place of dread within Enoch's visionary journey. 'Awesome' risks modern positive connotations; 'terrible' better preserves the fearful theological atmosphere.
  doctrine_reference: 'Book context: preserve apocalyptic imagery and judgment tone'
