translation:
  text: And at that time I said, “How terrible is this place, and grievous to behold.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The wording is somewhat difficult in the Ethiopic witness. The line is rendered here as a speech formula followed by Enoch's reaction to the place; some translators smooth 'my mouth' to 'I said.'
    reason: textual_variant
  - marker: b
    text: Or 'fearsome and painful to look upon.'
    reason: lexical_alternative
  - marker: c
    text: Or 'my mouth spoke, saying, “This place is terrible'.
    reason: previous_rendering
lexical_decisions:
- source_word: ውእተ ጊዜ
  chosen: at that time
  alternatives:
  - then
  - in that time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal formula in narrative/apocalyptic sequence. 'At that time' preserves the elevated register and discourse linkage better than the flatter 'then'.
- source_word: እቤ
  chosen: spoke, saying
  alternatives:
  - said
  - answered and said
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form introduces direct speech. Rendering with 'spoke, saying' preserves the Semitic-style speech formula without overcomplicating the English.
- source_word: አፎ
  chosen: my mouth
  alternatives:
  - I
  - my lips
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez explicitly uses 'mouth'; retaining it preserves the vivid, somewhat formal narrative style of visionary report rather than reducing it to a simple pronoun.
- source_word: ግሩም
  chosen: terrible
  alternatives:
  - fearsome
  - awesome
  - dreadful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this judgment-vision context the sense is not positive admiration but dread-inducing awe. 'Terrible' best preserves the ominous force without modern colloquial ambiguity.
- source_word: ዝንቱ መካን
  chosen: this place
  alternatives:
  - this region
  - this location
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward deictic phrase. 'Place' fits the visionary topography of the passage.
- source_word: ወሕሙም
  chosen: and grievous
  alternatives:
  - and painful
  - and distressing
  - and sickening
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective conveys affliction/distress. 'Grievous' keeps the elevated tone and pairs naturally with 'terrible' without collapsing the two descriptors into one.
- source_word: ለነጽሮ
  chosen: to behold
  alternatives:
  - to see
  - to look upon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An infinitival construction expressing what the place is like for the viewer. 'To behold' suits the solemn visionary register better than the more ordinary 'to see'.
