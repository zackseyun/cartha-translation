theological_decisions:
- issue: Rendering ቅዱሳን መላእክት
  chosen_reading: holy angels
  alternative_readings:
  - angels of holiness
  - sacred angels
  rationale: The phrase denotes a distinct class of heavenly beings in Enochic literature.
    'Holy angels' preserves the text's cosmological distinction without importing
    later doctrinal elaboration.
  doctrine_reference: Preserve theological tension rather than resolve it; keep major
    terms locally grounded in the passage.
