translation:
  text: And at that time Uriel—one of the holy angels, who was with me—answered me
    and said to me, “Enoch,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verse ends with Uriel's direct address, 'Enoch,' introducing the speech
      that continues in the following verse.
    reason: cross_reference
lexical_decisions:
- source_word: ውእተ ጊዜ
  chosen: at that time
  alternatives:
  - then
  - at that moment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal formula in Ge'ez narrative. 'At that time' preserves
    the elevated apocalyptic register better than the flatter 'then.'
- source_word: አውሥአኒ
  chosen: answered me
  alternatives:
  - responded to me
  - spoke to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb naturally carries the sense of answering/responding. Even though
    the immediate prior question is not in this verse, 'answered me' fits the discourse
    flow and preserves the formal narrative idiom.
- source_word: ኡርኤል
  chosen: Uriel
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal names are transliterated rather than translated, per project
    philosophy.
- source_word: ፩እምቅዱሳን መላእክት
  chosen: one of the holy angels
  alternatives:
  - one from among the holy angels
  - one of the sacred angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase identifies Uriel as belonging to the class of holy angels.
    'Holy angels' is the most natural and consistent English rendering for ቅዱሳን መላእክት
    in Enochic context.
- source_word: እንዘ ምስሌየ ሀሎ
  chosen: who was with me
  alternatives:
  - while he was with me
  - being with me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative-like construction is best rendered smoothly in English as
    a descriptive clause modifying Uriel. This preserves the sense without woodenly
    reproducing Ge'ez syntax.
- source_word: ወይቤለኒ
  chosen: and said to me
  alternatives:
  - and he said to me
  - and spoke to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common speech-introduction formula. 'Said to me' is straightforward
    and keeps the repetitive apocalyptic narration intact.
- source_word: ሄኖክ
  chosen: Enoch
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal name transliterated directly. The verse ends with direct address,
    so the vocative force is represented by punctuation rather than an added particle.
