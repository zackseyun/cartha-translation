theological_decisions:
- issue: Cosmic negation in the vision
  chosen_reading: The verse denies the presence of the ordered cosmos ('neither the
    heavens above nor the firmly founded earth') and contrasts it with a disordered,
    terrifying place.
  alternative_readings:
  - The seer simply reports darkness or invisibility rather than ontological absence.
  - The line may describe a place beyond ordinary creation without explicitly negating
    cosmic order.
  rationale: The paired mention of heavens and earth strongly evokes the normal ordered
    world. The following description of a place 'not arranged' supports reading the
    scene as a realm outside or beneath that order, which fits the apocalyptic context
    without over-defining its metaphysical status.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic language
    into generic prose.
