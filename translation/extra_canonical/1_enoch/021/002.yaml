translation:
  text: 'And there I saw a fearful thing: I saw neither the heavens above nor the
    firmly founded earth, but a place chaotic and terrible.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a place not arranged' or 'a place without order.' The Ge'ez phrase likely
      negates proper order or fitting arrangement.
    reason: lexical_alternative
  - marker: b
    text: The wording contrasts this place with the normal ordered cosmos of 'the
