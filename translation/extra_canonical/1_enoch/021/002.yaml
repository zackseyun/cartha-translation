lexical_decisions:
- source_word: ግብረ
  chosen: work
  alternatives:
  - deed
  - thing made
  - formation
  lexicon: Dillmann Lexicon
  rationale: The noun broadly denotes a work, deed, or thing made. In this visionary
    setting, 'work' preserves the sense of something seen as a formed reality without
    over-specifying whether it is an act or a structure.
- source_word: ግሩመ
  chosen: fearful
  alternatives:
  - terrible
  - awesome
  - dreadful
  lexicon: Dillmann Lexicon
  rationale: The term conveys dread-inducing extraordinariness. 'Fearful' fits the
    elevated register and keeps the emotional force without collapsing it into mere
    admiration.
- source_word: አሰማየ
  chosen: the heavens
  alternatives:
  - heaven
  - sky
  lexicon: Dillmann Lexicon
  rationale: The plural-like cosmic sense suits apocalyptic cosmology better than
    the more ordinary 'sky.'
- source_word: ላዕለ
  chosen: above
  alternatives:
  - on high
  - overhead
  lexicon: Dillmann Lexicon
  rationale: A straightforward spatial term; 'above' is clear and natural in English
    while preserving the vertical cosmic imagery.
- source_word: አምድረ
  chosen: the earth
  alternatives:
  - land
  - ground
  lexicon: Dillmann Lexicon
  rationale: In parallel with 'the heavens,' the cosmic sense calls for 'the earth'
    rather than the more local 'land' or 'ground.'
- source_word: ሱርርተ
  chosen: firmly founded
  alternatives:
  - founded
  - established
  - set fast
  lexicon: Dillmann Lexicon
  rationale: 'The word appears to describe the earth as fixed or established. ''Firmly
    founded'' preserves the cosmological contrast: the seer does not see the ordered
    world above and below.'
- source_word: መካነ
  chosen: place
  alternatives:
  - region
  - site
  lexicon: Dillmann Lexicon
  rationale: A basic locative noun; 'place' is the least interpretive and suits the
    visionary report.
- source_word: ዘአኮ ድልወ
  chosen: chaotic
  alternatives:
  - without order
  - not arranged
  - disordered
  lexicon: Dillmann Lexicon
  rationale: This phrase appears to negate order, fitness, or proper arrangement.
    'Chaotic' gives concise English for a place lacking ordered structure, while a
    footnote preserves the more literal alternative.
- source_word: ግሩምም
  chosen: terrible
  alternatives:
  - fearful
  - dreadful
  lexicon: Dillmann Lexicon
  rationale: The repeated dread-term intensifies the description. Rendering the second
    occurrence as 'terrible' avoids awkward repetition while preserving the semantic
    field of terror.
