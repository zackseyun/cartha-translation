theological_decisions:
- issue: Nature of the destination in Enoch's vision
  chosen_reading: a place where nothing is made
  alternative_readings:
  - a place where nothing existed
  - a chaotic place of uncreation
  rationale: The Ge'ez wording emphasizes absence of made/formed things rather than
    explicitly stating metaphysical nonexistence. The chosen rendering preserves the
    eerie, apocalyptic sense without importing a stronger doctrine of absolute nothingness.
  doctrine_reference: Preserve theological tension rather than resolve it.
