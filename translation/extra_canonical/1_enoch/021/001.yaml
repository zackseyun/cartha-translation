translation:
  text: And I went on until I came to a place where nothing is made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The line may also be understood as 'to a place where nothing had been made'
      or 'where nothing existed.' The Ge'ez is terse and emphasizes the place's utter
      lack of formed things.
    reason: lexical_alternative
lexical_decisions:
- source_word: አድኩ
  chosen: I went on
  alternatives:
  - I proceeded
  - I advanced
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb marks continued movement in Enoch's visionary journey. 'I went
    on' preserves the narrative progression without sounding overly stiff.
- source_word: እስከነ
  chosen: until I came
  alternatives:
  - as far as
  - until
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This conjunction-plus-verb sequence marks arrival at a destination. 'Until
    I came' makes the motion explicit in natural English.
- source_word: ኀበ
  chosen: to a place
  alternatives:
  - to
  - unto
  - toward a place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition indicates movement toward a location. Supplying 'a place'
    is warranted by the destination sense in context and keeps the line readable.
- source_word: አልቦቱ
  chosen: where nothing is
  alternatives:
  - there was nothing
  - a place of nothingness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Built on the negative existential 'there is not / there was not.' Here
    it introduces the character of the place as one devoid of formed things. 'Where
    nothing is' keeps the stark apocalyptic effect.
- source_word: ዘይትገበር
  chosen: made
  alternatives:
  - done
  - fashioned
  - created
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/imperfect relative form from 'to make/do' describes what
    is produced or formed there. 'Made' is broad and idiomatic; 'created' would over-specify
    cosmological nuance not demanded by the Ge'ez.
