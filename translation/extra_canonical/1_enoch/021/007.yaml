theological_decisions:
- issue: Nature of the scene
  chosen_reading: Rendered as a terrifying visionary locale of judgment without specifying hell or final punishment in the main text.
  alternative_readings:
  - hell
  - underworld
  - a cosmic prison
  rationale: The verse itself describes dreadful fire, depth, and incomprehensible dimensions, but does not explicitly name the place. Preserving the imagery without later doctrinal labeling follows the project's rule against over-harmonization.
  doctrine_reference: Preserve theological tension rather than resolve it.
