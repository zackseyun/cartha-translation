translation:
  text: 'And from there I went to another place, more terrible than this, and I saw a fearful work: a great fire was there, burning and blazing, and the place had a cleft reaching to the abyss, full of great pillars of fire descending; neither its measure nor its size was I able to see, and I could not look at it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause about the place being split downward is difficult in the Ge'ez. 'Cleft reaching to the abyss' represents a cautious rendering of a fissure or chasm extending to extreme depth.
    reason: textual_variant
  - marker: b
    text: Or 'I was not able to discern its measure or its magnitude.' The point is Enoch's inability to comprehend the dimensions of what he sees.
    reason: lexical_alternative
  - marker: c
    text: Or 'with great pillars of fire descending'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወእምህየ
  chosen: And from there
  alternatives:
  - And thence
  - And from that place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks narrative movement from the previous visionary location; 'from there' is clear modern English while preserving sequence.
- source_word: ሖርኩ ካልአ መካነ
  chosen: I went to another place
  alternatives:
  - I traveled to another place
  - I came to another place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple motion verb plus 'another place'; 'went' preserves the visionary itinerary without embellishment.
- source_word: እምዝ ዘይገርም
  chosen: more terrible than this
  alternatives:
  - more dreadful than this
  - more awesome than this
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Comparative sense with demonstrative reference to the prior scene. In this judgment context, 'terrible' better conveys dread than the more neutral 'awesome'.
- source_word: ወርኢኩ ግብረ ግሩመ
  chosen: and I saw a fearful work
  alternatives:
  - and I saw a terrible thing
  - and I saw a fearful deed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is somewhat idiomatic; literally 'a work of fear/terror.' 'Fearful work' preserves the concrete noun while allowing the ominous apocalyptic force to remain.
- source_word: እሳት ዐቢይ
  chosen: a great fire
  alternatives:
  - a mighty fire
  - a huge fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering of the adjective with elevated but readable diction.
- source_word: ዘይነድድ ወያንበለብል
  chosen: burning and blazing
  alternatives:
  - burning and flickering
  - kindled and flaming
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the paired participial description of active fire. 'Blazing' preserves vivid apocalyptic imagery without overinterpreting the second verb.
- source_word: ወመምተርተ ቦቱ መካኑ እስከ ቀላይ ፍጹም
  chosen: and the place had a cleft reaching to the abyss
  alternatives:
  - and in it the place was split as far as the complete depth
  - and the place had a chasm extending to the depths
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause is textually difficult. The sense appears to be that the location was fissured downward into extreme depth. 'Cleft' is concrete and suits the volcanic/judgment imagery; 'abyss' captures the sense of profound depth better than a flat 'bottom.'
- source_word: አዕማደ እሳት ዐበይተ ዘይወርዶሙ
  chosen: with great pillars of fire descending
  alternatives:
  - and great columns of fire were descending
  - with massive fire-pillars going down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the striking image of vertical fiery columns. 'Descending' follows the verbal form and preserves the visionary motion.
- source_word: ወኢእምጣኖ ወኢዕበዮ አክሀልኩ ነጽሮ
  chosen: neither its measure nor its size was I able to see
  alternatives:
  - I was not able to discern its measure or its greatness
  - I could not observe its extent or magnitude
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The line stresses Enoch's inability to comprehend the dimensions of the scene. 'Measure' and 'size' are straightforward and preserve the paired nouns.
- source_word: ወስእነኩ [ነጽሮ] ዐይኖ
  chosen: and I could not look at it
  alternatives:
  - and my eyes could not look on it
  - and I was unable to behold it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The final clause emphasizes visual incapacity before the terrifying sight. The bracketed repetition suggests textual instability, so a simple rendering is best.
