theological_decisions:
- issue: Whether the 'seven stars' should be explicitly identified as angelic beings under judgment
  chosen_reading: Retain 'seven stars of heaven' in the main text without explicit identification
  alternative_readings:
  - seven angels of heaven
  - seven heavenly beings
  rationale: In Enochic literature stars can symbolize angelic beings, especially in judgment scenes, but the Ge'ez here says 'stars.' To preserve local imagery and avoid interpretive overreach, the main text keeps the astronomical term and leaves the symbolic identification to context/footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
