translation:
  text: And there I saw seven stars of heaven bound together in it, like great mountains, and burning with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The image of stars being bound likely carries symbolic force for heavenly beings under judgment, but the text itself says 'stars.'
    reason: cross_reference
  - marker: b
    text: The word rendered 'gathered together' follows a difficult Ge'ez reading (†ኅቡረ†); 'assembled' or 'clustered together' are possible.
    reason: textual_variant
  - marker: c
    text: Or 'bound above it, gathered together'.
    reason: previous_rendering
lexical_decisions:
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann
  rationale: Standard first-person visionary report; 'I saw' is clear modern English while preserving the apocalyptic witness formula.
- source_word: ሰብዐተ ከዋክብተ ሰማይ
  chosen: seven stars of heaven
  alternatives:
  - seven heavenly stars
  - seven stars of the sky
  lexicon: Dillmann
  rationale: Keeps the genitival/collocational force and preserves the cosmic imagery without over-interpreting the stars as angels in the main text.
- source_word: እሱራነ
  chosen: bound
  alternatives:
  - imprisoned
  - chained
  lexicon: Dillmann
  rationale: The term denotes being tied or confined. 'Bound' is broad enough to preserve the image without importing a more specific restraint not explicit in the Ge'ez wording.
- source_word: በላዕሌሁ
  chosen: above it
  alternatives:
  - over it
  - upon it
  lexicon: Dillmann
  rationale: Most naturally refers back to the place just described in the preceding context. 'Above it' preserves the spatial relation with minimal interpretation.
- source_word: ኅቡረ
  chosen: gathered together
  alternatives:
  - assembled
  - clustered together
  lexicon: Dillmann
  rationale: The manuscript reading is somewhat difficult, but the likely sense is collective grouping. 'Gathered together' preserves that sense and fits the visionary description.
- source_word: ከመ አድባር ዐበይት
  chosen: like great mountains
  alternatives:
  - as great mountains
  - like huge mountains
  lexicon: Dillmann
  rationale: Retains the startling apocalyptic comparison rather than smoothing it into a vague statement of size or mass.
- source_word: ወበእሳት እንዘ ይነዱ
  chosen: and burning with fire
  alternatives:
  - and blazing with fire
  - while they burned with fire
  lexicon: Dillmann
  rationale: Preserves the participial vividness and elemental imagery. 'Burning with fire' is slightly more formal and keeps the repetitive force of the source.
