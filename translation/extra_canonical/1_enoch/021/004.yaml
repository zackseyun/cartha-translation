theological_decisions:
- issue: Nature of the punishment described
  chosen_reading: The verse speaks concretely of punitive binding and casting into a place of confinement, not merely abstract guilt or exclusion.
  alternative_readings:
  - They have been imprisoned and left here
  - They have been abandoned here because of sin
  rationale: The apocalyptic scene emphasizes visible judgment imagery. Rendering the verbs as 'bound' and 'cast here' preserves that imagery and avoids flattening the punishment into generic religious language.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment formulas into generic modern religious prose.
