translation:
  text: At that time I said, “For what sin have they been bound, and for what reason have they been cast here?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I asked,' since the direct question that follows may imply inquiry rather than simple speech.
    reason: lexical_alternative
  - marker: b
    text: The final verb may also suggest 'left' or 'abandoned' here, but the context of judgment favors 'cast here.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And at that time'.
    reason: previous_rendering
lexical_decisions:
- source_word: ውእተ ጊዜ
  chosen: at that time
  alternatives:
  - then
  - at that moment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard temporal expression in Ge'ez narrative. 'At that time' preserves the elevated visionary register better than the flatter 'then.'
- source_word: እቤ
  chosen: I said
  alternatives:
  - I asked
  - I spoke
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form most naturally introduces Enoch's speech. Because the following clause is a direct question, English idiom could use 'I asked,' but 'I said' stays closer to the Ge'ez witness while still reading naturally with quotation marks.
- source_word: በእንተ አይ ኃጢአት
  chosen: for what sin
  alternatives:
  - because of what sin
  - concerning what sin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase asks the ground or cause. 'For what sin' is concise and idiomatic, while preserving the causal force of the Ge'ez.
- source_word: ተአስሩ
  chosen: have they been bound
  alternatives:
  - were they bound
  - have they been imprisoned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive verb denotes being bound or fettered. 'Bound' preserves the concrete punitive imagery of apocalyptic confinement better than the more interpretive 'imprisoned.' Present perfect English fits the scene's current state as Enoch beholds it.
- source_word: ወበእንተ ምንት
  chosen: and for what reason
  alternatives:
  - and why
  - and for what cause
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This repeats the interrogative-prepositional structure. 'For what reason' preserves the rhetorical parallelism with the previous clause more clearly than simply 'why.'
- source_word: ዝየ
  chosen: here
  alternatives:
  - in this place
  - hither
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A deictic adverb referring to the place Enoch is shown. 'Here' is natural English and preserves the immediacy of the vision.
- source_word: ተገደፉ
  chosen: have they been cast here
  alternatives:
  - have they been thrown here
  - have they been abandoned here
  - were they cast here
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can carry the sense of being cast, thrown down, or left. In this judgment context, 'cast here' best preserves the force of punitive deposition without over-specifying abandonment.
