translation:
  text: These are among the stars that transgressed the command of the Lord, and they
    are bound here until the ten thousand years are completed—the number of the days
    of their sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the stars.' The Ge'ez preposition can indicate source as well as
      membership within a class.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'ten thousand years' may denote a vast appointed period of punishment;
      the wording is kept literal from the Ge'ez.
    reason: cultural_note
  - marker: c
    text: The closing phrase is literally 'the number of the days of their sins,'
      preserving the text's image of punishment measured out according to their transgression.
    reason: lexical_alternative
lexical_decisions:
- source_word: እሉ ውእቶሙ
  chosen: These are
  alternatives:
  - These
  - These ones are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward demonstrative-plus-copula opening. 'These are' preserves
    the deictic force in the angel's explanation.
- source_word: እምነ ከዋክብት
  chosen: among the stars
  alternatives:
  - from the stars
  - of the stars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition እምነ can mark source or partitive relation. In context
    the beings are identified as belonging to the class of stars seen in the vision,
    so 'among the stars' communicates that relation naturally in English without denying
    source nuance.
- source_word: እለ ኃለፉ ትእዛዘ እግዚአብሔር
  chosen: that transgressed the command of the Lord
  alternatives:
  - that passed beyond the command of the Lord
  - that violated the command of the Lord
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኃለፉ literally suggests passing over/beyond; in legal-moral context it
    means transgress. 'Command' fits ትእዛዘ well and preserves the judicial tone of
    rebellion against divine order.
- source_word: እግዚአብሔር
  chosen: the Lord
  alternatives:
  - God
  - the Lord God
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Following project convention, this divine title is rendered 'the Lord.'
    The verse emphasizes authority and command rather than a proper name.
- source_word: ወተአስሩ በዝየ
  chosen: and they are bound here
  alternatives:
  - and they were bound here
  - and they have been imprisoned here
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The passive/plural form indicates their state of confinement. ''Bound''
    preserves the vivid punitive imagery better than the more interpretive ''imprisoned.''
    Present English fits the explanatory scene: the angel identifies their current
    condition.'
- source_word: እስከ ሶበ ይትፌጸም
  chosen: until ... are completed
  alternatives:
  - until ... is fulfilled
  - until ... comes to an end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause marks the terminus of confinement. 'Are completed' works
    naturally with the plural-sense time expression that follows while retaining the
    notion of fulfillment/completion.
- source_word: ትእልፊተ ዓም
  chosen: the ten thousand years
  alternatives:
  - myriads of years
  - ten thousand of years
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The expression denotes a vast fixed period. 'Ten thousand years' is the
    most transparent rendering in English; 'myriads of years' is possible but less
    idiomatic and less precise for readers.
- source_word: ኈልቈ መዋዕለ ኃጢአቶሙ
  chosen: the number of the days of their sins
  alternatives:
  - the count of the days of their sins
  - the measure of the days of their sin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ኈልቈ conveys number/count, and መዋዕለ is days. The phrase likely apposes
    or explains the fixed period as measured according to their sins. Retaining 'days'
    and 'number' preserves the apocalyptic bookkeeping imagery rather than smoothing
    it into a generic sentence about punishment.
