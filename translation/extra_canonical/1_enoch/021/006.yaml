theological_decisions:
- issue: Identity of the 'stars'
  chosen_reading: The stars are presented as heavenly beings who violated the Lord's command and are now confined.
  alternative_readings:
  - Literal astronomical stars personified in the vision
  - A symbolic designation for the Watchers/angels
  rationale: Within the Book of the Watchers, stars regularly function as heavenly beings subject to judgment. The translation keeps 'stars' in the main text to preserve the vision's imagery, without collapsing the symbol into 'angels.'
  doctrine_reference: Preserve apocalyptic imagery; do not flatten visionary symbolism into generic prose.
- issue: Force of the time expression
  chosen_reading: 'A definite punitive period is in view: ''the ten thousand years are completed.'''
  alternative_readings:
  - An indefinite vast age
  - A textual corruption for another duration
  rationale: The Ge'ez witness gives a large numbered span. The main text preserves that explicit duration, while a footnote can note that the phrase may function idiomatically as an immense appointed period.
  doctrine_reference: Preserve theological tension rather than resolve it; translate the witness plainly and note uncertainty in footnotes.
