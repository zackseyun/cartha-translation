  from: And Uriel, one of the holy angels who was with me and was guiding me, said
    to me, “Enoch, about whom are you asking, and about whom are you inquiring and
    showing concern?”
  to: And Uriel, one of the holy angels who was with me and was guiding me, said to
    me, “Enoch, about whom are you asking, and about whom are you inquiring and eager
    to know?”
  rationale: 'The Ge''ez verb ጸህቀ (ṣahqa) means ''to be eager, zealous, or anxious.''
    In this context of questioning, it translates the Greek φιλοπευστεῖς (''to be
    curious'' or ''fond of inquiring''). Translating it as ''showing concern'' introduces
    a nuance of emotional sympathy or worry that distracts from the seer''s intense
    apocalyptic curiosity to understand the vision. ''Eager to know'' or ''so eager''
    better captures the author''s intent. | Adjudicator: The Ge''ez verb ጸህቀ (ṣahqa)
    means ''to be eager, zealous, or anxious.'' As the reviewer correctly notes, it
    translates the Greek φιλοπευστεῖς (''to be fond of inquiring'' or ''curious'')
    in this passage. The'
