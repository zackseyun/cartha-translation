lexical_decisions:
- source_word: ኡርኤል
  chosen: Uriel
  alternatives:
  - Ouriel
  lexicon: Ge'ez onomastic convention
  rationale: Personal names are transliterated rather than translated, following project
    philosophy.
- source_word: ፩እምቅዱሳን መላእክት
  chosen: one of the holy angels
  alternatives:
  - one of the sacred angels
  - one from among the holy angels
  lexicon: Dillmann Lexicon, Leslau
  rationale: The phrase literally identifies Uriel as one among the holy angels. 'Holy'
    preserves the apocalyptic category better than the more diffuse 'sacred'.
- source_word: ዘምስሌየ
  chosen: who was with me
  alternatives:
  - who was beside me
  - who accompanied me
  lexicon: Leslau
  rationale: The relative phrase marks Uriel's presence alongside Enoch. 'With me'
    is the most natural and sufficiently close rendering.
- source_word: ዘይመርሐኒ
  chosen: was guiding me
  alternatives:
  - led me
  - was leading me
  lexicon: Dillmann Lexicon, Leslau
  rationale: The verb denotes leading/guiding. 'Was guiding me' fits the ongoing visionary
    escort context.
- source_word: በእንተ መኑ ትስእል
  chosen: about whom are you asking
  alternatives:
  - concerning whom are you asking
  - for whom are you asking
  lexicon: Leslau
  rationale: በእንተ marks the topic or concern, and ትስእል is a straightforward verb of
    asking. 'About whom' is idiomatic and accurate.
- source_word: ወበእንተ መኑ ትጠይቅ
  chosen: and about whom are you inquiring
  alternatives:
  - and concerning whom are you seeking information
  - and about whom are you questioning
  lexicon: Dillmann Lexicon, Leslau
  rationale: The second verb is near-synonymous with the first; retaining 'inquiring'
    preserves the deliberate repetition without awkward duplication.
- source_word: ወትጽህቅ
  chosen: and showing concern
  alternatives:
  - and are anxious
  - and are troubled
  - and are grieved
  lexicon: Dillmann Lexicon, Leslau
  rationale: The final verb is difficult and may suggest emotional concern, distress,
    or earnest attention. 'Showing concern' preserves the sense of engaged emotional
    interest without overstating a specific emotion that the Ge'ez form leaves somewhat
    uncertain.
