lexical_decisions:
- source_word: ኵሎሙ
  chosen: all
  alternatives:
  - the whole of them
  - every one of them
  lexicon: Dillmann
  rationale: Quantifier covering the full group; rendered simply as 'all' in natural English.
- source_word: አልህምት
  chosen: the cattle
  alternatives:
  - the oxen
  - the bovines
  - the herd-animals
  lexicon: Dillmann
  rationale: In the Animal Apocalypse the animal imagery is symbolically loaded, but the immediate lexical sense is bovine/cattle. 'The cattle' preserves the zoomorphic register without over-specifying sex or domestic subtype.
- source_word: ፈርህዎሙ
  chosen: feared them
  alternatives:
  - were afraid of them
  - dreaded them
  lexicon: Dillmann
  rationale: Basic verb of fear with object suffix. 'Feared them' is concise and preserves the directness of the Ge'ez.
- source_word: ወደንገፁ
  chosen: were terrified
  alternatives:
  - were alarmed
  - were thrown into panic
  - were confounded
  lexicon: Dillmann
  rationale: A stronger follow-up verb than simple fear; 'were terrified' keeps the intensification and avoids flattening the paired verbs.
- source_word: እምኔሆሙ
  chosen: before them
  alternatives:
  - from before them
  - at their presence
  lexicon: Dillmann
  rationale: Literally 'from/before them'; in idiomatic English here 'before them' conveys fearful reaction in their presence.
- source_word: አሐዙ
  chosen: they began
  alternatives:
  - they started
  - they took to
  lexicon: Dillmann
  rationale: This verb often functions as an inceptive auxiliary before another verb. 'They began' best reflects that construction.
- source_word: ይኔክሱ
  chosen: to bite
  alternatives:
  - bit
  - to gnaw
  lexicon: Dillmann
  rationale: Infinitive-like dependent sense after the inceptive verb; 'to bite' preserves the vivid animal violence.
- source_word: በስኒሆሙ
  chosen: with their teeth
  alternatives:
  - by their teeth
  lexicon: Dillmann
  rationale: Instrumental phrase; 'with their teeth' is the natural English rendering.
- source_word: ይውሕጡ
  chosen: to devour
  alternatives:
  - to swallow up
  - to consume
  lexicon: Dillmann
  rationale: The verb suggests swallowing/consuming. 'Devour' fits the violent animal-apocalypse context better than the more neutral 'consume.'
- source_word: ይወግኡ
  chosen: to gore
  alternatives:
  - to strike
  - to butt
  - to wound
  lexicon: Dillmann
  rationale: Given the following instrumental phrase 'with their horns,' the specific sense is horn-thrusting rather than generic striking; 'to gore' is the most precise English equivalent.
- source_word: በአቅርንቲሆሙ
  chosen: with their horns
  alternatives:
  - by their horns
  lexicon: Dillmann
  rationale: Instrumental phrase naming the means of attack; 'with their horns' preserves the concrete imagery.
