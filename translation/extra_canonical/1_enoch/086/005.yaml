theological_decisions:
- issue: Whether to preserve the symbolic-animal register or interpret the referents directly as human groups
  chosen_reading: Preserve the animal imagery in the main text ('the cattle,' 'teeth,' 'horns')
  alternative_readings:
  - Translate interpretively as the human groups symbolized by the animals
  rationale: The Dream Visions/Animal Apocalypse communicates through sustained symbolic zoomorphic imagery. The translation philosophy requires preserving apocalyptic imagery rather than flattening it into explanatory prose.
  doctrine_reference: 'Book context: ''Do not flatten its cosmic imagery into generic modern religious language.'''
