theological_decisions:
- issue: How explicitly to render the sexual imagery in the animal vision
  chosen_reading: Render the line as explicit animal sexual behavior ('let out their
    private parts ... began to mount')
  alternative_readings:
  - Soften to generic mating language
  - Obscure the anatomy with euphemism
  rationale: The verse depicts transgressive breeding in symbolic animal form, and
    flattening the sexual imagery would weaken the force of the vision. The chosen
    wording remains readable while preserving the shock and symbolism of the Ge'ez.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    paraphrase beyond the witness.'
