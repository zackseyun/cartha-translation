translation:
  text: 'And I looked at them and saw: behold, they all let out their private parts
    like horses, and they began to mount the female elephants; and they all conceived
    and gave birth to elephants, camels, and donkeys.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez phrase rendered 'let out their private parts' is sexually explicit
      and likely refers to the males exposing or extending their genitals; 'private
      parts' is a modest but clear rendering.
    reason: lexical_alternative
  - marker: b
    text: The final animal list may denote the offspring produced in the vision's
      symbolic cross-breeding. The imagery is part of the Animal Apocalypse's allegorical
      scheme, not ordinary zoological description.
    reason: cultural_note
lexical_decisions:
- source_word: ወነጸርክዎሙ
  chosen: And I looked at them
  alternatives:
  - And I observed them
  - And I watched them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard visionary reporting verb. 'Looked at' preserves the immediate
    visual sequence without over-formalizing.
- source_word: ወርኢኩ ወነዋ
  chosen: 'and saw: behold'
  alternatives:
  - and saw, and behold
  - and I saw—behold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This doubled visionary formula should remain explicit in English because
    repeated apocalyptic seeing formulas are part of the rhetoric.
- source_word: አውፁኡ ንፍረታቲሆሙ
  chosen: they all let out their private parts
  alternatives:
  - they all exposed their genitals
  - they all protruded their members
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is sexually explicit in context and refers to male sexual
    organs. 'Private parts' keeps the sense clear without becoming clinically technical
    or euphemistically vague.
- source_word: ከመ አፍራስ
  chosen: like horses
  alternatives:
  - as horses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison is important to the dream imagery and likely suggests
    lustful or conspicuous sexual display; it should be preserved literally.
- source_word: ወአሐዙ ይዐረጉ
  chosen: and they began to mount
  alternatives:
  - and they started to go up upon
  - and they began to copulate with
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the sense is 'began to ascend/go up upon.' In this sexual context,
    'mount' is the most natural English equivalent that preserves the animal-apocalypse
    imagery.
- source_word: ዲበ አንስት አልህምት
  chosen: the female elephants
  alternatives:
  - the she-elephants
  - the elephant-cows
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase identifies the females of the species represented in the vision.
    'Female elephants' is clear modern English.
- source_word: ወጸንሳ
  chosen: and they all conceived
  alternatives:
  - and they became pregnant
  - and they were with young
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward reproductive verb; 'conceived' is concise and fits
    the elevated register.
- source_word: ወወለዳ
  chosen: and gave birth
  alternatives:
  - and bore
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Clear modern English for the birthing action.
- source_word: ነጌያተ ወአገማሰ ወአእዳገ
  chosen: to elephants, camels, and donkeys
  alternatives:
  - elephants and camels and asses
  - young elephants, camels, and asses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: These are the offspring species named in the vision. 'Donkeys' is preferred
    over 'asses' for contemporary readability.
