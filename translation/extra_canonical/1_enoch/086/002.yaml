translation:
  text: And after that I saw large and dark cattle, and behold, all of them changed
    their stalls and their pastures and their calves, and they began to live with
    one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause about changing 'their stalls and their pastures and their calves'
      is textually and semantically difficult. The Ge'ez appears to list places and
      offspring together under one verb of change or alteration; a broader sense such
      as 'their dwelling places, their grazing places, and their young' is also possible.
    reason: textual_variant
  - marker: b
    text: The final phrase may also be rendered 'they lived together' or 'they dwelt
      with one another.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አልህምተ
  chosen: cattle
  alternatives:
  - oxen
  - bulls
  - beasts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse the imagery consistently uses bovine symbolism
    for human groups. 'Cattle' preserves the collective animal image without over-specifying
    sex, whereas 'bulls' would be too narrow and 'beasts' too generic.
- source_word: ዐቢያነ
  chosen: large
  alternatives:
  - great
  - big
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective marks size or impressiveness. 'Large' is concrete and fits
    the visionary animal imagery better than the more abstract 'great'.
- source_word: ጸሊማነ
  chosen: dark
  alternatives:
  - black
  - dusky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes dark coloration. 'Dark' preserves the visual symbolism
    while avoiding overprecision if the exact shade is not the point.
- source_word: ወለጡ
  chosen: changed
  alternatives:
  - altered
  - exchanged
  - left
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates a shift or alteration in relation to what follows.
    Because the objects are plural nouns for places/offspring, 'changed' best captures
    a collective transformation or rearrangement without forcing a narrower sense.
- source_word: ምዕያኖሙ
  chosen: stalls
  alternatives:
  - dwelling places
  - folds
  - habitations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In an animal-vision context this likely refers to places where cattle
    are kept. 'Stalls' keeps the pastoral image vivid, though the broader sense 'dwelling
    places' remains possible.
- source_word: ምርጓዮሙ
  chosen: pastures
  alternatives:
  - grazing places
  - feeding grounds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun appears to denote grazing or feeding locations. 'Pastures' is
    natural English and preserves the livestock imagery.
- source_word: አጥዐጥሆሙ
  chosen: their calves
  alternatives:
  - their young
  - their offspring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the bovine symbolism, a term for offspring is best rendered specifically
    as 'calves' rather than the more generic 'young,' unless a broader reading is
    required by context.
- source_word: አሐዙ ተየሐይዉ ፩ ለካልኡ
  chosen: they began to live with one another
  alternatives:
  - they dwelt one with another
  - they lived together
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase conveys mutual cohabitation or common life. 'Began to live
    with one another' reflects the inceptive force of the verbal sequence and preserves
    the collective social reordering in the vision.
