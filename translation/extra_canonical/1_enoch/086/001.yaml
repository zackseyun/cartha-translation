translation:
  text: And again I looked with my eyes while I was sleeping, and I saw the heaven above, and behold, one star fell from heaven, and it arose and ate and grazed in the midst of those cattle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In the Animal Apocalypse, stars commonly function as symbolic heavenly beings, but the verse itself says 'star.'
    reason: cross_reference
  - marker: b
    text: The final verbs are literally 'ate and grazed/fed,' preserving the animal imagery of the vision rather than smoothing it into a single action.
    reason: lexical_alternative
  - marker: c
    text: Or 'calves'.
    reason: previous_rendering
lexical_decisions:
- source_word: ካዕበ
  chosen: again
  alternatives:
  - once more
  - then again
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks a renewed stage in the dream report; 'again' preserves the repetitive visionary sequencing without sounding stiff.
- source_word: ርኢኩ በአዕይንትየ
  chosen: I looked with my eyes / I saw
  alternatives:
  - I beheld
  - I looked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verse repeats the seeing verb; English keeps both clauses ('I looked... and I saw') to preserve the visionary cadence rather than collapsing them.
- source_word: እንዘ እነውም
  chosen: while I was sleeping
  alternatives:
  - as I slept
  - while asleep
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This explicitly frames the vision as occurring in sleep; 'while I was sleeping' is clear modern English and preserves the dream setting.
- source_word: ሰማየ መልዕልተ
  chosen: the heaven above
  alternatives:
  - the high heaven
  - heaven on high
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points upward to the heavenly realm. 'The heaven above' is elevated but readable and avoids over-interpretive cosmological language.
- source_word: ነዋ
  chosen: behold
  alternatives:
  - look
  - and see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A deictic particle introducing a striking visionary element; 'behold' best preserves apocalyptic register.
- source_word: ኮከብ አሐዱ
  chosen: one star
  alternatives:
  - a single star
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral is significant in the symbolic vision; 'one star' is simple and exact.
- source_word: ወድቀ እምሰማይ
  chosen: fell from heaven
  alternatives:
  - came down from heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic motion is downward; 'fell' preserves the vividness and possible ominous force of the image.
- source_word: ወይትሌዐል
  chosen: it arose
  alternatives:
  - it was lifted up
  - it got up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: After falling, the star is described as rising or standing up. 'It arose' preserves the sequence without forcing a more specific interpretation.
- source_word: ወይበልዕ
  chosen: ate
  alternatives:
  - devoured
  - consumed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary verb 'eat' is preferable in the main text; stronger options like 'devoured' may overstate the action unless context requires it.
- source_word: ወይትረዐይ
  chosen: grazed
  alternatives:
  - pastured
  - fed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, animal behavior carries symbolic force. 'Grazed' keeps the pastoral imagery and distinguishes this verb from the previous 'ate'.
- source_word: ማእከለ እልከቱ አልህምት
  chosen: in the midst of those calves
  alternatives:
  - among those young cattle
  - in the middle of those ox-calves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase refers to the bovine figures in the allegory. 'Calves' is the most natural English equivalent and fits the symbolic animal sequence.
