theological_decisions:
- issue: Whether the 'star' should be interpreted in the main text as an angelic being rather than left as symbolic imagery
  chosen_reading: Retain 'one star' without interpretive expansion.
  alternative_readings:
  - one angelic star
  - one angel
  rationale: In Enochic literature stars often symbolize angelic beings, but the verse itself presents the image as a star within a dream vision. The translation preserves the symbol and leaves interpretation to context rather than importing it into the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over interpretive tradition.
