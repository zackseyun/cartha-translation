translation:
  text: And again I saw in the vision, and I looked up to heaven; and behold, I saw
    many stars. They came down and were cast from heaven to that first star, and among
    those calves they became bulls, and they pastured with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'that first star' likely points back to a previously mentioned
      star in the vision rather than introducing a new figure.
    reason: cross_reference
  - marker: b
    text: '''Stars'' may symbolize heavenly beings, but the translation keeps the
      visionary image explicit rather than interpreting it in the main text.'
    reason: lexical_alternative
  - marker: c
    text: The final clause is difficult. The Ge'ez most naturally yields 'they were
      seen among them,' though 'they appeared with them' is also possible.
    reason: alternative_reading
  - marker: d
    text: Or 'among those bulls they became horses, and they were seen among them.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወካዕበ
  chosen: And again
  alternatives:
  - And afterward
  - Then again
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Narrative resumptive formula introducing a new scene within the same
    dream report; 'And again' preserves the repetitive visionary cadence.
- source_word: ርኢኩ በራእይ
  chosen: I saw in the vision
  alternatives:
  - I saw in a vision
  - I saw in the vision-report
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the apocalyptic framing explicit and elevated without over-expanding
    the phrase.
- source_word: ነጸርክዎ ለሰማይ
  chosen: I looked up to heaven
  alternatives:
  - I gazed toward heaven
  - I observed heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys directed looking or gazing; 'looked up to heaven' fits
    the visionary movement and natural English.
- source_word: ነዋ
  chosen: behold
  alternatives:
  - look
  - and see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the deictic force and apocalyptic vividness better than a flatter
    modern filler.
- source_word: ከዋክብተ ብዙኃነ
  chosen: many stars
  alternatives:
  - a multitude of stars
  - numerous stars
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward rendering of the plural noun with adjective; concise
    and clear.
- source_word: ወረዱ
  chosen: came down
  alternatives:
  - descended
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple motion verb; 'came down' is readable while preserving the vertical
    heavenly imagery.
- source_word: ተገደፉ እምሰማይ
  chosen: were cast from heaven
  alternatives:
  - were thrown down from heaven
  - fell from heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive suggests more than simple falling; 'were cast' preserves
    the force of expulsion or being hurled down.
- source_word: በኀበ ዝኩ ኮከብ ቀዳማዊ
  chosen: to that first star
  alternatives:
  - toward that first star
  - to that former star
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative plus ordinal most naturally points back to a previously
    introduced star in the vision sequence; 'first' is retained rather than interpretively
    softened.
- source_word: ማእከለ እልኩ ጣዕዋ
  chosen: among those bulls
  alternatives:
  - in the midst of those bulls
  - among those cattle
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, the animal imagery should be preserved concretely.
    'Bulls' fits the symbolic herd imagery better than the broader 'cattle'.
- source_word: አልህምት ኮኑ
  chosen: they became horses
  alternatives:
  - they turned into horses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Best straightforward rendering of the transformation statement; preserves
    the startling symbolic metamorphosis.
- source_word: ወምስሌሆሙ ይትረዓዩ
  chosen: and they were seen among them
  alternatives:
  - and they appeared among them
  - and they were visible with them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/medio-passive sense is somewhat uncertain, but this rendering
    keeps the visual emphasis without over-interpreting social relation.
