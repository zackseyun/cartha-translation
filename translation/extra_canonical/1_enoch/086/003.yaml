theological_decisions:
- issue: Identity of the 'stars' in the Animal Apocalypse
  chosen_reading: Retain 'stars' literally in the main text without identifying them
    as angels.
  alternative_readings:
  - angels
  - angelic beings symbolized by stars
  rationale: The immediate Ge'ez text says 'stars.' Because apocalyptic symbolism
    often uses stars for heavenly beings, the interpretation is plausible, but the
    translation should preserve the image rather than resolve the symbol in the text
    itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the descent from heaven
  chosen_reading: Translate as 'were cast from heaven' rather than simple 'fell.'
  alternative_readings:
  - fell from heaven
  - were thrown down from heaven
  rationale: The Ge'ez passive suggests an acted-upon descent, which better suits
    the judgment-laden imagery of the vision while remaining textually grounded.
  doctrine_reference: Original-language primacy over translation tradition.
