theological_decisions:
- issue: Whether to make the coming event explicitly punitive
  chosen_reading: that will come upon
  alternative_readings:
  - that will happen to
  - that judgment will come upon
  rationale: The Ge'ez states only that something 'will come upon' these figures.
    Because the Animal Apocalypse often implies judgment but the wording here is broader,
    the translation preserves the tension rather than specifying punishment.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether to decode the animal and cosmic symbols in the main text
  chosen_reading: retain elephants, camels, donkeys, stars, and sheep literally
  alternative_readings:
  - replace with interpreted historical groups
  - gloss stars as angels in the main text
  rationale: The source presents visionary symbols, not their interpretation, in this
    line. The project philosophy requires preserving apocalyptic imagery rather than
    flattening it into explanatory prose.
  doctrine_reference: This is visionary and apocalyptic prose/poetry; do not flatten
    its cosmic imagery.
