translation:
  text: And they said to me, “Remain here until you see everything that will come
    upon those elephants and camels and donkeys, and upon the stars and upon the sheep—and
    all of them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final term is commonly understood as 'sheep' in the Animal Apocalypse's
      symbolic register. If the underlying reading were taken more broadly, it could
      be rendered 'flocks.'
    reason: lexical_alternative
  - marker: b
    text: The repeated 'upon' leaves unspecified what exactly is coming upon these
      figures; the context of the vision may imply judgment, but the wording here
      does not state that directly.
    reason: alternative_reading
lexical_decisions:
- source_word: ይቤሉኒ
  chosen: they said to me
  alternatives:
  - they told me
  - they spoke to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common narrative speech formula; the indirect object suffix is explicit,
    so 'to me' is retained.
- source_word: ንበር
  chosen: Remain here
  alternatives:
  - Stay here
  - Sit here
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative of remaining/dwelling. 'Remain here' preserves the solemn
    visionary instruction better than the more casual 'stay here.' The deictic 'here'
    reflects ዝየ.
- source_word: እስከ ትሬኢ ኵሎ ዘይመጽእ
  chosen: until you see everything that will come
  alternatives:
  - until you see all that is coming
  - until you see everything that comes to pass
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This clause marks the duration of the command and the scope of the vision.
    Future-oriented 'will come' best fits the apocalyptic preview.
- source_word: ዲበ
  chosen: upon
  alternatives:
  - 'on'
  - against
  - concerning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Repeated preposition governing the affected groups. 'Upon' preserves
    the elevated register and leaves open whether what comes is judgment, conflict,
    or some other event.
- source_word: እልኩ ነጌያት
  chosen: those elephants
  alternatives:
  - the elephants
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative nuance is likely present in context, pointing to the
    visionary animals already in view. 'Those elephants' keeps the deictic force.
- source_word: አግማል
  chosen: camels
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward animal term; retained literally in keeping with the Animal
    Apocalypse imagery.
- source_word: አእዱግ
  chosen: donkeys
  alternatives:
  - asses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literal animal designation. 'Donkeys' is clear modern English without
    archaic coloring.
- source_word: ከዋክብት
  chosen: the stars
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Must be preserved literally because in Enochic visionary discourse stars
    often symbolize heavenly beings or powers; the text itself still says 'stars.'
- source_word: አልህምታት
  chosen: the sheep
  alternatives:
  - the flocks
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse, sheep are a central symbolic population. 'Sheep'
    is preferable to 'flocks' because the sequence lists animal kinds individually.
- source_word: ወኵሎሙ
  chosen: and all of them
  alternatives:
  - and all
  - and all of these
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The closing summary gathers the listed groups together. Retaining it
    avoids smoothing away the emphatic comprehensiveness of the vision.
