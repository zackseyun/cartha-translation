theological_decisions:
- issue: Nature of Enoch's separation from earthly beings in the phrase 'from the offspring of the earth'
  chosen_reading: Retain the literal generational imagery rather than interpret it as merely 'from the earth' or 'from the people of the earth.'
  alternative_readings:
  - from the earth
  - from the inhabitants of the earth
  rationale: The Animal Apocalypse often contrasts earthly creatures with visionary or heavenly perspective. Preserving 'offspring of the earth' keeps the anthropological and apocalyptic tension visible rather than resolving it into a generic spatial phrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
