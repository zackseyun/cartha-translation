translation:
  text: And again I lifted up my eyes to heaven, and I saw in a vision—and behold,
    there came out from heaven beings in the likeness of white men; and four came
    out from that place, and three with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'figures like white men.' The Ge'ez describes their appearance by comparison
      rather than directly naming their class.
    reason: lexical_alternative
  - marker: b
    text: 'The final count is abrupt in the Ethiopic: ''and four came out from that
      place, and three with them.'' The verse likely intends a total of seven heavenly
      figures, but the syntax is preserved rather than smoothed.'
    reason: textual_variant
  - marker: c
    text: Or 'in the vision'.
    reason: previous_rendering
  - marker: d
    text: Or 'beings like white men'.
    reason: previous_rendering
lexical_decisions:
- source_word: አንሣእኩ
  chosen: I lifted up
  alternatives:
  - I raised
  - I looked up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes raising/lifting. With 'my eyes' as object, 'lifted up'
    preserves the idiom and visionary register better than the flatter 'looked up'.
- source_word: አዕይንትየ
  chosen: my eyes
  alternatives:
  - my sight
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Concrete 'my eyes' keeps the repeated biblical-apocalyptic formula intact.
- source_word: ካዕበ
  chosen: again
  alternatives:
  - once more
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks renewed visionary attention and should be preserved explicitly.
- source_word: ውስተ ሰማየ
  chosen: to heaven
  alternatives:
  - into heaven
  - toward heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally points into/toward heaven; 'to heaven' is idiomatic
    in English with 'lifted up my eyes' while retaining directionality.
- source_word: ወርኢኩ በራእይ
  chosen: and I saw in the vision
  alternatives:
  - and I saw in a vision
  - and I saw in vision
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the explicit visionary framing. The article is supplied idiomatically
    in English.
- source_word: ወነዋ
  chosen: and behold
  alternatives:
  - and see
  - behold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This deictic/interjection heightens the immediacy of the scene; 'and
    behold' preserves apocalyptic style.
- source_word: ወፁኡ እምሰማይ
  chosen: there came out from heaven
  alternatives:
  - they went forth from heaven
  - they came forth from heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The motion verb is plural and denotes emergence. 'Came out' is clear
    modern English while preserving the descent-from-heaven imagery.
- source_word: ከመ እምሳለ ሰብእ ጸዓዳ
  chosen: beings like white men
  alternatives:
  - figures like white men
  - something like white human beings
  - men, white in appearance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The comparison is explicit ('like/as the likeness of men') and modified
    by 'white.' Because these are heavenly figures in symbolic vision, 'beings like
    white men' preserves both the anthropomorphic comparison and the otherworldly
    reserve better than a flat 'white men' alone.
- source_word: ፬ ወፁኡ
  chosen: four came out
  alternatives:
  - four went forth
  - four emerged
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral should remain explicit; the repeated emergence verb likely
    marks a counted group entering the vision.
- source_word: እምውእቱ መካን
  chosen: from that place
  alternatives:
  - from that region
  - from there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''That place'' preserves the demonstrative specificity of the Ge''ez
    and the spatial vividness of the vision.'
- source_word: ፫ ምስሌሆሙ
  chosen: three with them
  alternatives:
  - three along with them
  - and three accompanied them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is terse and somewhat abrupt; 'three with them' mirrors that
    compactness without over-interpreting the relationship.
