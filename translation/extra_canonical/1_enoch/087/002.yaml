theological_decisions:
- issue: Identity of the white human-like figures
  chosen_reading: Render descriptively as heavenly 'beings like white men' without
    identifying them as angels in the main text.
  alternative_readings:
  - white men
  - angels in the form of men
  - white human figures
  rationale: The verse itself gives appearance and origin from heaven but does not
    explicitly name them here. A descriptive rendering preserves the symbolism and
    avoids importing an identification from surrounding interpretation into the line
    itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
