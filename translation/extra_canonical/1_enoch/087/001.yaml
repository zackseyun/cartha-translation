translation:
  text: And again I saw them and they began to butt one another and devour one another, and the earth began to cry out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb rendered 'butting' may also be understood more generally as 'goring' or 'striking.' The animal-combat imagery is retained because this vision is cast in symbolic animal terms.
    reason: lexical_alternative
  - marker: b
    text: Or 'swallowing one another.' The underlying verb can denote engulfing as well as devouring.
    reason: lexical_alternative
  - marker: c
    text: Or 'while they were butting one another, and devouring one another, while the earth'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወካዕበ
  chosen: And again
  alternatives:
  - And then again
  - Again
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Narrative resumptive formula introducing a renewed visionary scene; 'And again' preserves the repetitive apocalyptic sequencing.
- source_word: ርኢክዎሙ
  chosen: I saw them
  alternatives:
  - I looked at them
  - I beheld them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard first-person visionary report from the root 'to see'; 'I saw them' is clear and keeps the reportive force without archaizing.
- source_word: አንዘ፡ እንዘ፡ ይወግኡ
  chosen: while they were butting one another
  alternatives:
  - while they were goring one another
  - while they were striking one another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Animal Apocalypse context, animal combat imagery should be preserved. The verb likely denotes violent attack; 'butting' fits horned-animal conflict better than the more generic 'striking,' while avoiding overprecision if the exact species is not restated in the verse.
- source_word: ለካልኡ
  chosen: one another
  alternatives:
  - each other
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reciprocal construction indicating mutual violence.
- source_word: ወይውሑጦ፡ ለካልኡ
  chosen: and devouring one another
  alternatives:
  - and swallowing one another
  - and consuming one another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys swallowing/engulfing/devouring. 'Devouring' best preserves the savage animal-apocalypse imagery in idiomatic English.
- source_word: ወምድር
  chosen: while the earth
  alternatives:
  - and the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The conjunction can be rendered simply as 'and,' but with the preceding repeated እንዘ/ongoing-action sense, 'while the earth' better reflects simultaneous action in the vision.
- source_word: አንዘት፡ ትጽራኅ
  chosen: began to cry out
  alternatives:
  - was crying out
  - cried out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form suggests the earth entering into the action of crying out. 'Began to cry out' captures the onset of the earth's personified protest without flattening the apocalyptic image.
