theological_decisions:
- issue: Personification of the earth in response to violence
  chosen_reading: Retain the earth as an active subject that 'began to cry out.'
  alternative_readings:
  - Render impersonally as 'there was a cry from the earth'
  - Soften to 'the land was in an uproar'
  rationale: The Ge'ez presents the earth itself as crying out. In apocalyptic literature this personification is significant and should not be reduced to a mere background disturbance.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic imagery into generic prose.
