theological_decisions:
- issue: Relation between the descendants and 'their fathers' in a flood/judgment context
  chosen_reading: 'The verse contrasts the descendants with their fathers: they will not become like them, because the fathers are cut off while the descendants receive prolonged life.'
  alternative_readings:
  - The descendants will not suffer the same fate because of their fathers
  - The inquiry concerns Noah's offspring specifically, with a promise of survival and longevity
  rationale: The Ge'ez syntax is somewhat compressed, but the sequence 'not become like their fathers ... for they shall be cut off, but they shall live' strongly suggests a contrast between judged fathers and preserved descendants. This preserves the theological tension of judgment on one generation and mercy toward another without smoothing it into a generalized promise.
  doctrine_reference: Preserve theological tension rather than resolve it.
