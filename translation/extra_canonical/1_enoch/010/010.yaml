translation:
  text: And these things which they ask of you shall not be granted to their fathers on their behalf; for they hope to live an everlasting life, and each one of them shall live five hundred years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally 'five hundred winters,' an idiom for years.
    reason: cultural_note
  - marker: b
    text: The clause 'on their account' may refer either to the fathers or to the descendants; the Ge'ez leaves the reference somewhat compressed.
    reason: alternative_reading
  - marker: c
    text: Or 'And those who ask concerning you shall not become like their fathers on their account;'.
    reason: previous_rendering
  - marker: d
    text: Or 'for they shall be cut off, but they shall live an everlasting life,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ዘይስእሉከ
  chosen: who ask concerning you
  alternatives:
  - who inquire of you
  - who seek you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb of asking/inquiring with second-person suffix most naturally means 'ask concerning you' or 'inquire of/about you.' 'Concerning you' preserves the ambiguity of whether the inquiry is directed to Noah or about Noah, without over-specifying.
- source_word: ኢይከውኑ
  chosen: shall not become
  alternatives:
  - shall not be
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb 'to be/become' can be rendered either way; 'become' better fits the comparison with 'their fathers,' implying they will not turn out like them.
- source_word: ለአበዊሆሙ
  chosen: like their fathers
  alternatives:
  - their fathers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction after 'become' is comparative in sense. Rendering simply 'their fathers' in English would be awkward and obscure the implied comparison.
- source_word: በእንቲአሆሙ
  chosen: on their account
  alternatives:
  - because of them
  - for their sake
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This prepositional phrase indicates causation or occasion. 'On their account' preserves the causal force while leaving open whether the reference is to the fathers or to the children.
- source_word: ይሴፈዉ
  chosen: shall be cut off
  alternatives:
  - shall perish
  - shall be destroyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In a judgment context, 'be cut off' preserves the sharp judicial/apocalyptic force without over-interpreting the exact mode of destruction.
- source_word: ይኅየዉ ሕይወተ ዘለዓለም
  chosen: shall live an everlasting life
  alternatives:
  - shall live forever
  - shall have eternal life
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez is literally 'they shall live a life of eternity/everlasting life.' 'Shall live an everlasting life' stays close to the wording and avoids importing later fixed Christian idiom as the default.
- source_word: አሐዱ አሐዱ እምኔሆሙ
  chosen: each one of them
  alternatives:
  - one by one from among them
  - every one of them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repetition of 'one, one' is distributive. 'Each one of them' is natural English and preserves the distributive emphasis.
- source_word: ኃምስተ ምእተ ክረምተ
  chosen: five hundred years
  alternatives:
  - five hundred winters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Winters'' is the literal term, but in this idiom it functions as a count of years. ''Years'' is clearer in English, while the literal image can be noted in a footnote.'
