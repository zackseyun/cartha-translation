theological_decisions:
- issue: Whether to render the fiery place with a traditional theological term like
    'hell'
  chosen_reading: the abyss of fire
  alternative_readings:
  - hell
  - the fiery pit
  - the depth of fire
  rationale: The Ge'ez wording is imagistic and spatial, not a fixed later doctrinal
    label. Rendering it as 'the abyss of fire' preserves apocalyptic imagery and avoids
    importing later Christian terminology not explicit in the verse.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve apocalyptic imagery rather than flattening it.'
- issue: Duration of punishment
  chosen_reading: forever
  alternative_readings:
  - for eternity
  - for the age
  rationale: The phrase ለዓለም in this punitive context most naturally signals unending
    confinement. The translation preserves the severity of the judgment formula without
    softening it.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; consistency of key terms, or documented exception.'
