translation:
  text: And in those days they will lead them down into the abyss of fire, and into
    torment and the prison-house; and there they will be shut up forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'the abyss of fire' is literally a lower or deep place
      of fire; the exact nuance may be 'depth of fire' or 'fiery abyss.'
    reason: lexical_alternative
  - marker: b
    text: '''Prison-house'' translates a literal ''house of confinement,'' preserving
      the concrete imagery of incarceration in this judgment scene.'
    reason: cultural_note
lexical_decisions:
- source_word: መዋዕል
  chosen: days
  alternatives:
  - time
  - period
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common temporal term; in the apocalyptic formula በውእቱ መዋዕል it is best
    rendered 'in those days,' preserving the stock eschatological phrasing.
- source_word: ይወስድዎሙ
  chosen: they will lead them
  alternatives:
  - they will take them
  - they will bring them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future/plural verb of taking or leading. 'Lead them' fits the judgment
    scene, where condemned beings are escorted to punishment, and preserves agency
    without over-specifying who the agents are.
- source_word: መትሕተ እሳት
  chosen: the abyss of fire
  alternatives:
  - the depth of fire
  - the lower place of fire
  - the underworld of fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally points to a lower/deep place associated with fire.
    'Abyss of fire' preserves the apocalyptic image of a fiery deep better than a
    flattened 'hell' or merely spatial 'depth of fire.'
- source_word: በጻዕር
  chosen: into torment
  alternatives:
  - into affliction
  - into suffering
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes distress or painful suffering. 'Torment' best matches
    the punitive context and the escalating sequence of fiery abyss, torment, and
    confinement.
- source_word: ቤት ሞቅሕ
  chosen: the prison-house
  alternatives:
  - the house of confinement
  - the prison
  - the place of custody
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'house of confinement/imprisonment.' 'Prison-house' keeps the
    concrete imagery and elevated register without sounding archaic beyond necessity.
- source_word: ይትዓፀዉ
  chosen: they will be shut up
  alternatives:
  - they will be confined
  - they will be imprisoned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/reflexive sense of being closed in or confined. 'Shut up' preserves
    the forceful image of final enclosure and pairs naturally with 'prison-house.'
- source_word: ለዓለም
  chosen: forever
  alternatives:
  - for eternity
  - for the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In judgment contexts this idiom regularly conveys enduring duration.
    'Forever' is idiomatic modern English while retaining the text's uncompromising
    finality.
