theological_decisions:
- issue: Rendering the cluster of divine epithets
  chosen_reading: the Most High, the Great and Holy One
  alternative_readings:
  - the Most High, the great and holy one
  - the Exalted One, great and holy
  rationale: The Ge'ez stacks divine titles rather than using a single simple name.
    Capitalizing 'Great' and 'Holy One' treats them as epithets and preserves the
    elevated theology of divine transcendence without over-paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English without flattening theological weight.
