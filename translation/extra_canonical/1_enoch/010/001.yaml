translation:
  text: 'Then the Most High, the Great and Holy One, spoke and sent Uriel to the son
    of Lamech, and said to him:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The recipient is identified only as 'the son of Lamech' in this verse; the
      wider context makes clear that this is Noah.
    reason: cross_reference
  - marker: b
    text: The name 'Uriel' is inferred from the Ethiopic OCR, which appears slightly
      corrupted at this point; the sense is strongly supported by the immediate context
      of the commissioned angel.
    reason: textual_variant
lexical_decisions:
- source_word: አሜሃ
  chosen: Then
  alternatives:
  - And then
  - At that time
  lexicon: Dillmann
  rationale: Functions as a narrative transition introducing the next divine action.
    'Then' preserves the sequence without over-specifying temporal nuance.
- source_word: ልዑል
  chosen: the Most High
  alternatives:
  - the Exalted One
  - the العليا/High One
  lexicon: Dillmann
  rationale: A standard divine title meaning 'high' or 'most high.' 'The Most High'
    is idiomatic English and preserves the elevated apocalyptic register.
- source_word: ዓቢይ
  chosen: the Great
  alternatives:
  - great
  lexicon: Dillmann
  rationale: Used as a divine epithet paired with 'Holy.' Retaining it as a title
    preserves the solemn stacked description of God.
- source_word: ቅዱስ
  chosen: Holy One
  alternatives:
  - holy
  - the Holy One
  lexicon: Dillmann
  rationale: Rendered substantivally because it stands in apposition with the divine
    titles. 'Holy One' preserves the title-like force better than a bare adjective.
- source_word: ተናገረ
  chosen: spoke
  alternatives:
  - said
  - uttered
  lexicon: Dillmann
  rationale: A straightforward speech verb. 'Spoke' fits the elevated narrative style
    and pairs naturally with the following commission.
- source_word: ወፈነወ
  chosen: sent
  alternatives:
  - dispatched
  lexicon: Dillmann
  rationale: The verb marks commissioning. 'Sent' is simple and formal enough for
    angelic mission language.
- source_word: አሰርየ፡ ልዩር
  chosen: Uriel
  alternatives:
  - the angel Uriel
  lexicon: Dillmann
  rationale: The OCR appears to reflect the proper name Uriel, likely with orthographic
    noise. The name should be transliterated, not translated, per project philosophy.
- source_word: ኀበ
  chosen: to
  alternatives:
  - toward
  - unto
  lexicon: Dillmann
  rationale: Marks direction of sending. 'To' is the natural English equivalent.
- source_word: ወልደ፡ ላሜክ
  chosen: the son of Lamech
  alternatives:
  - Lamech's son
  lexicon: Dillmann
  rationale: A formal filial designation. 'The son of Lamech' preserves the source
    structure and prepares for Noah's identification without importing it into the
    main line.
- source_word: ወይቤሎ
  chosen: and said to him
  alternatives:
  - and said
  - and told him
  lexicon: Dillmann
  rationale: The pronominal suffix should be represented. 'And said to him' keeps
    the speech introduction explicit.
