theological_decisions:
- issue: Whether to render the destination as generic punishment or retain the concrete
    apocalyptic image
  chosen_reading: into the fire
  alternative_readings:
  - into punishment
  - into the burning
  rationale: The Ge'ez gives a concrete noun for fire, and the translation philosophy
    requires preserving apocalyptic imagery rather than abstracting it into generic
    punishment language.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    flatten judgment formulas.'
