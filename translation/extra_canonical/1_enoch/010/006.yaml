translation:
  text: And on the great day of judgment he shall be sent away into the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The subject is singular in the Ge'ez ('he shall be sent away'), referring
      back to the figure addressed in the surrounding context.
    reason: cross_reference
  - marker: b
    text: The phrase 'great day of judgment' is a fixed apocalyptic judgment formula
      here; 'judgment' could also be rendered 'sentence' in a narrower judicial sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: በዕለት
  chosen: on the day
  alternatives:
  - in the day
  - at the time of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal preposition with ዕለት naturally marks the time when the action
    occurs; 'on the day' is the most straightforward English rendering.
- source_word: ዓባይ
  chosen: great
  alternatives:
  - mighty
  - vast
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective intensifies the day of judgment in apocalyptic fashion.
    'Great' preserves the elevated register and common force without overinterpreting.
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - condemnation
  - sentence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the noun denotes the judicial event rather than merely
    the verdict. 'Judgment' best fits the apocalyptic scene and keeps the phrase broad
    enough to include sentencing.
- source_word: ይትፈኖ
  chosen: he shall be sent away
  alternatives:
  - he shall be dispatched
  - he shall be cast off
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/imperfect form suggests being sent or consigned. 'Sent away'
    preserves the motion implied by the verb without importing a more specific image
    like 'thrown' unless the text demands it.
- source_word: ውስተ
  chosen: into
  alternatives:
  - in
  - within
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks movement toward and into a place; with a verb of
    sending, 'into' is the natural English equivalent.
- source_word: ዋዕይ
  chosen: the fire
  alternatives:
  - fire
  - blaze
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes fire, here functioning as the place of punitive confinement.
    'The fire' preserves the stark apocalyptic image.
