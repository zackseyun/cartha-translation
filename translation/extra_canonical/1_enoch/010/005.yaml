translation:
  text: And heap jagged and sharp stones upon him, and cover him with darkness; and there he shall remain forever. And cover his face so that he may not see light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The paired descriptions of the stones likely intensify their harshness; the exact nuance may be rendered 'jagged and sharp' or similarly 'rough and pointed.'
    reason: lexical_alternative
  - marker: b
    text: 'The command to cover his face explains the next clause: the condemned one is shut away from all light, a concrete image of total confinement.'
    reason: cultural_note
  - marker: c
    text: Or 'jagged stones and sharp stones'.
    reason: previous_rendering
lexical_decisions:
- source_word: ደይ
  chosen: heap
  alternatives:
  - cast
  - place
  - throw down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative in context of punitive confinement; 'heap' best fits the command to pile stones over Asael rather than merely 'place' them.
- source_word: እብነ
  chosen: stones
  alternatives:
  - rocks
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Basic noun for stones; 'stones' preserves the concrete burial/imprisonment imagery.
- source_word: ጠያያተ
  chosen: jagged
  alternatives:
  - rough
  - rugged
  - pointed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Describes the harsh, uneven character of the stones; 'jagged' conveys punitive sharpness without overinterpreting.
- source_word: በሊሓተ
  chosen: sharp
  alternatives:
  - cutting
  - hard
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with the previous adjective to intensify the severity of the stony covering; 'sharp' is vivid and natural in English.
- source_word: ክድኖ
  chosen: cover
  alternatives:
  - hide
  - veil
  - bury
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated imperative governs both darkness and the face; 'cover' preserves the repeated judgment formula and avoids paraphrastic 'bury'.
- source_word: ጽልመተ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard apocalyptic judgment image; 'darkness' is the plain and weighty rendering.
- source_word: ይኅድር ለዓለም
  chosen: he shall remain forever
  alternatives:
  - he shall dwell forever
  - he shall stay for eternity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Expresses enduring confinement. 'Remain forever' fits the imprisonment context better than the more neutral 'dwell.'
- source_word: ለገጹ
  chosen: his face
  alternatives:
  - before him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The direct object with 'cover' is best taken literally as 'his face,' matching the next clause about not seeing light.
- source_word: ከመ ኢይርአይ ብርሃነ
  chosen: so that he may not see light
  alternatives:
  - that he may not behold the light
  - lest he see light
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Purpose/result clause. 'See light' preserves the stark apocalyptic idiom and avoids importing later theological phrasing.
