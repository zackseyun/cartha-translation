theological_decisions:
- issue: Force of the punishment imagery
  chosen_reading: A literal stony covering and darkness are retained as concrete judgment imagery.
  alternative_readings:
  - Metaphorical affliction only
  - General imprisonment without burial-like imagery
  rationale: 'The Ge''ez piles concrete imperatives together: stones, darkness, covered face, no light. The translation preserves the severe apocalyptic confinement rather than softening it into abstract punishment.'
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment formulas into generic prose.
