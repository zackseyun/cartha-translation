translation:
  text: And now instruct him, that he may flee and preserve his seed for all the generations
    of eternity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his offspring' or 'his descendants.' The Ge'ez literally says 'his seed,'
      a lineage term preserved here for transparency.
    reason: lexical_alternative
  - marker: b
    text: The final phrase may also be rendered 'for all generations forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: መሀሮ
  chosen: instruct
  alternatives:
  - teach
  - warn
  - make known to
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative/jussive sense in angelic commission language; 'instruct' preserves
    both communication and urgency without over-specifying 'warn.'
- source_word: ይጐይዝ
  chosen: he may flee
  alternatives:
  - he may depart
  - he may escape
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is impending judgment and commanded removal from danger.
    'Flee' best preserves the urgent motion implied by the verb.
- source_word: ይገበር
  chosen: preserve
  alternatives:
  - make
  - do
  - establish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With 'his seed' as object, a literal 'make/do' is awkward in English
    and likely reflects causing the line to continue or be kept alive. 'Preserve'
    captures the survival sense demanded by the context.
- source_word: ዘርኡ
  chosen: his seed
  alternatives:
  - his offspring
  - his descendants
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Seed'' keeps the genealogical and covenantal register of the source.
    A smoother alternative is possible, but the more literal term suits the apocalyptic
    preservation theme.'
- source_word: ለኵሎሙ ትውልድ ለዓለም
  chosen: for all the generations of eternity
  alternatives:
  - for all generations forever
  - through all the generations of the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase intensifies duration beyond a simple 'forever.' 'Generations
    of eternity' is slightly formal but preserves the elevated apocalyptic register
    and the cumulative force of the Ge'ez.
