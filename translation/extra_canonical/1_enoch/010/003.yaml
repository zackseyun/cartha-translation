theological_decisions:
- issue: Whether the line promises mere physical survival or enduring lineage under
    divine preservation
  chosen_reading: The verse speaks of preserving the man's line through the coming
    judgment, expressed as 'preserve his seed.'
  alternative_readings:
  - save his offspring
  - establish his descendants
  rationale: The immediate context concerns rescue from cosmic judgment and continuation
    of humanity through a chosen survivor. The wording should retain both concrete
    lineage and divine preservation without narrowing it to only biological or only
    spiritual survival.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
