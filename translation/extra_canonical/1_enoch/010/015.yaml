translation:
  text: And destroy these spirits of the bastards and the children of the Watchers, because they have oppressed humankind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'illegitimate offspring.' The Ge'ez term is severe and likely refers to the unlawful mixed progeny produced by the Watchers.
    reason: lexical_alternative
  - marker: b
    text: Or 'have done violence to humankind.' The verb can carry a stronger sense than simple moral wrongdoing.
    reason: lexical_alternative
  - marker: c
    text: Or 'destroy the spirits'.
    reason: previous_rendering
  - marker: d
    text: Or 'have wronged'.
    reason: previous_rendering
lexical_decisions:
- source_word: አኅጕሎሙ
  chosen: destroy them
  alternatives:
  - wipe them out
  - bring them to an end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative/jussive force in context of divine judgment. 'Destroy' preserves the severity of the command without over-specifying the manner.
- source_word: መናፍስተ
  chosen: spirits
  alternatives:
  - souls
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the term refers to disembodied spiritual beings rather than merely 'souls' in a generalized sense.
- source_word: ተውኔት
  chosen: bastards
  alternatives:
  - illegitimate offspring
  - mongrels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes illegitimate or mixed offspring. 'Bastards' is harsh but matches the polemical force of the judgment context; a softer alternative is noted in a footnote because modern English can hear the term primarily as an insult.
- source_word: ውሉዶሙ
  chosen: their children
  alternatives:
  - their offspring
  - their sons
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward filial term. 'Children' is broad and natural English, while still allowing the appositional relation to the Watchers in context.
- source_word: ትጉሃን
  chosen: the Watchers
  alternatives:
  - the wakeful ones
  - the vigilant ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established apocalyptic designation for the angelic beings of this section. Translating it here would weaken the literary linkage within the Book of the Watchers.
- source_word: ገፍዕዎሙ
  chosen: have wronged
  alternatives:
  - have oppressed
  - have done violence to
  - have afflicted
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys harmful, violent mistreatment. 'Have wronged' is broad enough to cover the violence done to humanity in the chapter, while a stronger alternative is preserved in a footnote.
- source_word: ሰብእ
  chosen: humankind
  alternatives:
  - men
  - humanity
  - people
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Inclusive rendering fits the collective sense of the Ge'ez and avoids the misleadingly male-specific sense of older English 'men'.
