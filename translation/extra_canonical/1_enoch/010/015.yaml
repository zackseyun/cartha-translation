theological_decisions:
- issue: Identity of the judged beings as spirits rather than embodied giants
  chosen_reading: The verse is rendered as referring to the spirits of the illicit offspring, alongside the children of the Watchers.
  alternative_readings:
  - 'The phrase could be taken as two labels for the same group: ''the spirits of the bastards, that is, the children of the Watchers'''
  - The line may reflect a compressed tradition about the postmortem spirits of the giants
  rationale: The Ge'ez presents both 'spirits' and 'children of the Watchers.' Given the wider context of 1 Enoch 10 and 15, preserving both elements keeps the text's theological tension rather than collapsing it into a single explanatory gloss.
  doctrine_reference: Preserve theological tension rather than resolve it.
