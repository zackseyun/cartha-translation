translation:
  text: Go to Noah and say to him in my name, 'Hide yourself!' And reveal to him the
    end that is coming; for the whole earth will be destroyed, and a flood is about
    to come upon all the earth, and it will destroy whatever is in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make known to him the coming end.' The Ge'ez can be rendered with slightly
      different word order without changing the sense.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'a flood of waters' preserves the emphatic wording of the Ge'ez
      rather than reducing it to a bare 'flood.'
    reason: cultural_note
  - marker: c
    text: Or 'And say to Noah, in my name, ‘Hide yourself, and reveal to him the end
      that is coming; for the whole earth will be destroyed, and a flood of waters
      is about to come upon all the earth, and it will destroy whatever is in it.’'.
    reason: previous_rendering
lexical_decisions:
- source_word: በሎ
  chosen: say
  alternatives:
  - speak
  - tell
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative of speaking; 'say' fits direct commission speech without adding
    nuance.
- source_word: በስመ ዚአየ
  chosen: in my name
  alternatives:
  - in the name of me
  - on my behalf
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks delegated authority for the message. 'In my name' is
    idiomatic English and preserves the authority formula.
- source_word: ኅባእ ርእሰከ
  chosen: Hide yourself
  alternatives:
  - conceal yourself
  - cover yourself
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Reflexive command to withdraw or conceal oneself. 'Hide yourself' is
    natural and preserves the urgency.
- source_word: አግህድ ሎቱ
  chosen: reveal to him
  alternatives:
  - make known to him
  - declare to him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries disclosure of hidden information. 'Reveal' fits the
    apocalyptic register and balances the prior 'hide yourself'.
- source_word: ፍጻሜ ዘይመጽእ
  chosen: the end that is coming
  alternatives:
  - the coming end
  - the consummation that is approaching
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ፍጻሜ denotes end, completion, or consummation. Here the flood judgment
    context favors 'the end' in the sense of impending destruction.
- source_word: ይትኃጐል
  chosen: will be destroyed
  alternatives:
  - will perish
  - will be ruined
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/destructive sense suits the judgment announcement over the
    earth. 'Destroyed' is direct and forceful.
- source_word: ማየ አይኅ
  chosen: a flood of waters
  alternatives:
  - the waters of the flood
  - a deluge of waters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase points to the flood event with emphatic watery imagery. 'A
    flood of waters' preserves the doubled image without over-smoothing.
- source_word: ሀሎ ዲበ ኵሉ ምድር
  chosen: is about to come upon all the earth
  alternatives:
  - is coming upon all the earth
  - will come upon all the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction conveys imminent arrival. 'Is about to come' preserves
    the impending force of the warning.
- source_word: ያኀጕል ዘሀሎ ውስቴታ
  chosen: it will destroy whatever is in it
  alternatives:
  - it will wipe out all that is within it
  - it will destroy what is in it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The object is comprehensive but expressed as 'what is in it.' 'Whatever
    is in it' preserves the totalizing scope without adding explicit categories not
    in the text.
