theological_decisions:
- issue: Scope of 'the end'
  chosen_reading: Rendered as impending destructive end in relation to the flood judgment,
    not as an abstract eschatological consummation.
  alternative_readings:
  - the consummation
  - the final end
  rationale: In immediate context the message concerns the deluge upon the earth.
    The wording should retain apocalyptic gravity without importing later technical
    eschatology.
  doctrine_reference: Preserve local passage meaning before harmonizing with later
    usage.
