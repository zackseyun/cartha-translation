translation:
  text: And heal the earth which the angels have corrupted, and make known the healing of the earth, so that they may heal the earth, and all the children of men may not perish through all the secrets that the Watchers have disclosed^[The Ge'ez literally reads "killed" (za-qatalu), reflecting a corruption in the underlying Greek transmission (ἐπάταξαν for ὑπέδειξαν, "showed/disclosed").] and taught to their sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clause rendered 'make known the healing of the earth' is textually and syntactically difficult. The Ge'ez wording may also be understood more literally as 'make known the life/restoration of the earth.'
    reason: textual_variant
  - marker: b
    text: The phrase rendered 'they may heal the plague' is uncertain in the surviving Ethiopic wording. Some interpreters understand the line more generally as the earth being restored or made to live.
    reason: lexical_alternative
  - marker: c
    text: '''Secrets'' here refers to illicit hidden knowledge disclosed by the Watchers in this section, not necessarily to divine mysteries revealed legitimately.'
    reason: cultural_note
  - marker: d
    text: Or 'so that they may heal the plague'.
    reason: previous_rendering
  - marker: e
    text: Or 'disclosed'.
    reason: previous_rendering
lexical_decisions:
- source_word: አሕይዋ
  chosen: heal
  alternatives:
  - make live
  - restore to life
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative/jussive sense in context of divine command concerning the damaged earth; 'heal' fits the corruption/plague imagery better than the more wooden 'make live.'
- source_word: አማሰኑ
  chosen: have corrupted
  alternatives:
  - have ruined
  - have defiled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Describes the angels' destructive effect on the earth. 'Corrupted' preserves both moral and cosmic damage without over-specifying ritual defilement.
- source_word: ሕይወታ
  chosen: healing
  alternatives:
  - life
  - restoration
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though formally related to 'life,' the immediate parallel with healing/restoration of the earth supports 'healing' as the idiomatic sense here.
- source_word: አይድዕ ከመ
  chosen: make known ... so that
  alternatives:
  - teach that
  - let it be known that
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction naturally introduces a commanded disclosure with purpose/result. 'Make known' keeps the causative force and prepares for the following purpose clause.
- source_word: ይሕይዋ
  chosen: they may heal
  alternatives:
  - they may live
  - it may be healed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The surrounding context concerns remedying the earth's condition. The plural/causative nuance is difficult, but 'they may heal the plague' best preserves the practical result of the revealed remedy.
- source_word: ኢይትሐጐሉ
  chosen: may not perish
  alternatives:
  - may not be destroyed
  - may not be wiped out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard judgment/destruction verb; 'perish' is elevated but readable and suits apocalyptic warning language.
- source_word: በምሥጢር ኵሉ
  chosen: through all the secrets
  alternatives:
  - by every mystery
  - because of all the hidden arts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Watchers' illicit revelations are in view. 'Secrets' preserves the apocalyptic register and avoids narrowing the term only to magic, though that may be included.
- source_word: ትጉሃን
  chosen: the Watchers
  alternatives:
  - the wakeful ones
  - the vigilant ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established title within 1 Enoch for the angelic beings of this narrative. Translating it as 'Watchers' preserves the book's internal terminology and apocalyptic texture.
- source_word: መሀሩ ለውሉዶሙ
  chosen: taught to their sons
  alternatives:
  - instructed their children
  - taught their offspring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering. 'Sons' keeps the literal familial language of the witness rather than neutralizing it to 'children.'
