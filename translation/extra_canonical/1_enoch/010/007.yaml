theological_decisions:
- issue: Nature of the earth's restoration
  chosen_reading: The verse speaks of actual healing/restoration of a corrupted earth, not merely moral reform of humanity.
  alternative_readings:
  - The line refers primarily to healing human society
  - The line means simply 'let the earth live'
  rationale: The repeated references to 'the earth' as the direct object, together with corruption and remedy language, support a cosmic-restorative reading consistent with the Watchers narrative.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic judgment/restoration into generic moral prose.
- issue: Identity of the revealers of the secrets
  chosen_reading: The disclosed secrets are those revealed by the Watchers.
  alternative_readings:
  - The phrase could refer more generally to hidden knowledge circulating among humans
  rationale: The final clause explicitly attributes disclosure and teaching to the Watchers, so the main text keeps that direct connection.
  doctrine_reference: Keep major terms locally grounded in the passage before harmonizing them across the corpus.
