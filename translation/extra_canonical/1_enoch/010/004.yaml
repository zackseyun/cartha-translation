translation:
  text: And again the Lord said to Raphael, “Bind Azazel by his hands and his feet,
    and cast him into the darkness; and split open the desert that is in Dudael, and
    cast him there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Dudael is left transliterated as a place-name. The verse presents it as
      a specific wilderness location associated with Azazel's confinement.
    reason: cultural_note
  - marker: b
    text: The command rendered 'split open the desert' is textually difficult; some
      interpreters understand a command to open or prepare a pit-like place in the
      wilderness. The Ge'ez here is kept as concretely as possible without adding
      details not explicit in the witness.
    reason: textual_variant
lexical_decisions:
- source_word: ካዕበ
  chosen: again
  alternatives:
  - then
  - further
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The particle marks renewed speech in sequence. 'Again' preserves the
    narrative repetition without over-smoothing.
- source_word: እግዚእ
  chosen: the Lord
  alternatives:
  - Lord
  - the Master
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: With the speech formula, this functions as the divine title. 'The Lord'
    fits project style and preserves elevated register.
- source_word: እሰሮ
  chosen: bind
  alternatives:
  - tie up
  - imprison
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A direct imperative of restraint. 'Bind' preserves the concrete punitive
    imagery better than the more interpretive 'imprison'.
- source_word: በእዴሁ ወእግሩ
  chosen: by his hands and his feet
  alternatives:
  - hand and foot
  - with his hands and feet bound
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez explicitly names both extremities. 'By his hands and his feet'
    keeps the bodily concreteness of the judgment command.
- source_word: ወድዮ
  chosen: cast him
  alternatives:
  - throw him
  - bring him down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated imperative conveys forcible removal. 'Cast him' suits apocalyptic
    judgment diction and preserves the repeated command.
- source_word: ውስተ ጽልመት
  chosen: into the darkness
  alternatives:
  - into darkness
  - into gloom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a place/state of punitive obscurity. 'The darkness'
    gives it a more definite, prison-like force in context.
- source_word: አብቅዋ ለገዳም
  chosen: split open the desert
  alternatives:
  - open up the wilderness
  - dig a pit in the desert
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears to command opening or cleaving, and the object is the
    desert/wilderness. 'Split open the desert' preserves the stark apocalyptic image
    without importing 'pit' unless explicit.
- source_word: እንተ ሀለወት በዱዳኤል
  chosen: that is in Dudael
  alternatives:
  - which is at Dudael
  - that lies in Dudael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A relative clause locating the desert. Dudael is transliterated as a
    place-name per project philosophy.
- source_word: ህየ
  chosen: there
  alternatives:
  - in it
  - therein
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locative adverb referring back to the opened desert region. 'There' is
    clear and natural while preserving the destination.
