theological_decisions:
- issue: Nature of Azazel's punishment
  chosen_reading: A concrete act of binding and banishment into a dark desert prison
  alternative_readings:
  - A more generalized command to imprison Azazel
  - A symbolic consigning to spiritual darkness
  rationale: 'The verse is highly physical: hands, feet, darkness, desert, and repeated
    casting. The translation preserves the embodied punitive imagery rather than abstracting
    it into generic spiritual judgment.'
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment formulas
    into generic modern religious prose.
