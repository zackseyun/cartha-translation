theological_decisions:
- issue: Identity of those judged in this verse
  chosen_reading: The verse targets the illicit offspring associated with the Watchers
    and their human unions, not humanity in general.
  alternative_readings:
  - The verse addresses only giants
  - The verse addresses human sinners broadly
  rationale: The sequence of terms—bastards, children of fornication, and children
    of the Watchers from among humankind—points to the hybrid progeny produced by
    the Watchers' transgression. The judgment is specific within the narrative of
    the Watchers.
  doctrine_reference: Preserve local passage meaning; do not harmonize beyond context.
- issue: Rendering of morally charged genealogical language
  chosen_reading: Retain the harsh condemnation in the main text rather than softening
    it.
  alternative_readings:
  - Use softened terms like 'illegitimate offspring' throughout
  rationale: The verse is a divine judgment oracle in apocalyptic style. Softening
    the language would mute the rhetoric and moral force of the source.
  doctrine_reference: Preserve apocalyptic imagery and judgment formulas rather than
    smoothing them away.
