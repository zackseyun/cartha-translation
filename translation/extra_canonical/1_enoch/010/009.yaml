  from: let them destroy each other in battle
  to: let them perish in battle
  rationale: 'The Ge''ez verb ይትሐጐሉ (from ተሐጕለ) is passive/intransitive, meaning ''to
    perish'' or ''to be destroyed.'' The draft translates it as an active reciprocal
    (''destroy each other''), which alters the grammatical voice. While the context
    implies mutual destruction, ''let them perish'' accurately reflects the source
    verb. | Adjudicator: The reviewer is correct about the Ge''ez grammar. The verb
    ይትሐጐሉ (yətḥagʷalu) is the imperfect form of the t-stem (passive/reflexive) verb
    ተሐጕለ (taḥagʷla), which means ''to perish'' or ''to be destroyed.'''
