translation:
  text: And to Gabriel the Lord said, “Go against the bastards and the reprobates,
    and against the children of fornication; destroy the children of fornication and
    the children of the Watchers from among humankind. Send them out against one another,
    and let them perish in battle; for length of days shall not be theirs.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the illegitimate ones.' The Ge'ez term is a harsh label for offspring
      of illicit union.
    reason: lexical_alternative
  - marker: b
    text: The text is difficult in the phrase rendered 'the children of the Watchers.'
      The OCR shows ለውሉደ፡ ትጉሃን, and the sense is taken from the immediate Watchers
      context; some uncertainty remains.
    reason: textual_variant
  - marker: c
    text: A bracketed reading in the witness includes 'and send them out'; the sense
      of mutual conflict is clear even if the exact verbal sequence is uncertain.
    reason: textual_variant
  - marker: d
    text: Or 'let them destroy each other in battle'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወለገብርኤል፡ ይቤሎ፡ እግዚእ፡
  chosen: And to Gabriel the Lord said
  alternatives:
  - And the Lord said to Gabriel
  - And the Master said to Gabriel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the direct address structure while using natural English word
    order. እግዚእ is best rendered 'the Lord' here, matching the divine speaker in this
    judgment scene.
- source_word: ሑር፡ ዲቤሆሙ፡
  chosen: Go against them
  alternatives:
  - Go upon them
  - Proceed against them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase carries hostile movement toward targets in a judgment command,
    not mere motion. 'Go against' preserves the punitive force.
- source_word: ለመንዝራን፡
  chosen: the bastards
  alternatives:
  - the illegitimate ones
  - the mongrels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes offspring of illicit union. 'Bastards' is blunt but
    reflects the stigmatizing force of the judgment context; a footnote preserves
    the less harsh lexical alternative.
- source_word: ወለማኑናን፡
  chosen: the reprobates
  alternatives:
  - the castaways
  - the outcasts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact nuance is difficult, but the term appears paired with the condemned
    hybrid offspring. 'Reprobates' preserves the sense of those marked out for rejection
    in judgment.
- source_word: ወዲበ፡ ውሉደ፡ ዘማ፡
  chosen: and against the children of fornication
  alternatives:
  - and against the sons of whoredom
  - and against the offspring of illicit union
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዘማ carries sexual transgression. 'Children of fornication' keeps the
    stark moral and genealogical force without importing later technical terminology.
- source_word: ወአኅጕሎሙ፡
  chosen: destroy
  alternatives:
  - wipe out
  - make an end of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A strong exterminatory verb fits the context of divine judgment on the
    giant offspring.
- source_word: ለውሉደ፡ ትጉሃን፡ እምሰብእ፡
  chosen: the children of the Watchers from among humankind
  alternatives:
  - the sons of the Watchers from among men
  - the offspring of the vigilant ones from among humanity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Though the OCR form is difficult, in context this refers to the offspring
    associated with the Watchers. 'Watchers' is the established local term in 1 Enoch
    and should be preserved rather than flattened.
- source_word: ወአውፅኦሙ፡ [ወፈንዎሙ፡] በበይናቲሆሙ፡
  chosen: Send them out against one another
  alternatives:
  - Set them against each other
  - Drive them out among themselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The command is to turn them upon each other. 'Against one another' captures
    the reciprocal violence clearly.
- source_word: እሙንቱ፡ ወስሊሆሙ፡ በቀትል፡ ይትሐጐሉ፡
  chosen: and let them destroy each other in battle
  alternatives:
  - and let them fall by slaughter
  - and let them perish by mutual killing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause describes reciprocal killing. 'In battle' is preferable to
    a generic 'by slaughter' because the scene is one of violent conflict among them.
- source_word: እስመ፡ ኑሐ፡ መዋዕል፡ አልቦሙ።
  chosen: for length of days shall not be theirs
  alternatives:
  - for they will not have many days
  - for no long lifespan belongs to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preserves the solemn judgment formula and avoids flattening it into
    casual modern phrasing.
