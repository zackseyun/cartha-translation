translation:
  text: And the whole earth has been corrupted by the teaching of the works of Azazel;
    and to him ascribe all sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the instruction in his deeds.' The Ge'ez phrase keeps both the idea
      of teaching and of concrete acts or practices.
    reason: lexical_alternative
  - marker: b
    text: The final clause may carry the sense 'write down against him all sin,' expressing
      formal assignment of guilt in the judgment scene.
    reason: alternative_reading
