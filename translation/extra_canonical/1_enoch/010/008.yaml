theological_decisions:
- issue: Whether the final clause means that all sin is to be recorded against Azazel
    or merely written concerning him
  chosen_reading: 'The verse assigns comprehensive culpability to Azazel: ''to him
    write down all sin.'''
  alternative_readings:
  - write all sin concerning him
  - write down against him every sin
  rationale: The immediate context is a judgment oracle against Azazel. The command
    functions juridically, attributing the earth's corruption to him. Preserving this
    strong attribution fits the apocalyptic indictment without over-expanding the
    syntax.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity where the source permits more than one construal.
