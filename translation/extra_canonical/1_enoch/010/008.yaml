  rationale: 'The Ge''ez preposition ላዕሌሁ (lā''lēhu) means ''upon him'' or ''against
    him,'' not ''to him'' (which would be ሎቱ, lōtu). Furthermore, the draft omits
    the conjunction ወ (wa-, ''and'') attached to the phrase. In English, ''to him
    write down'' awkwardly implies addressing a letter to him, whereas ''against him''
    accurately reflects the source preposition and the forensic force of assigning
    guilt. | Adjudicator: The Ge''ez preposition ላዕለ (lā''la) with the third masculine
    singular suffix (ላዕሌሁ, lā''lēhu) literally means ''upon him'' or ''against him,''
    whereas ''to him'' would typically be expressed with the dative ሎቱ'
