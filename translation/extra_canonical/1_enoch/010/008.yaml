lexical_decisions:
- source_word: ማሰነት
  chosen: has been corrupted
  alternatives:
  - has been ruined
  - has gone astray
  - has been defiled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes corruption or spoiling. 'Has been corrupted' preserves
    the moral and cosmic force of the judgment context better than a weaker rendering
    like 'has gone astray.'
- source_word: ኵላ ምድር
  chosen: the whole earth
  alternatives:
  - all the earth
  - the entire land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the phrase is best taken universally, not
    as a local 'land.' 'The whole earth' preserves the scope of the corruption.
- source_word: በትምህርተ ግብሩ
  chosen: by the teaching of the works
  alternatives:
  - by the instruction in the deeds
  - through the teaching of his practices
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez combines 'teaching/instruction' with 'works/deeds.' Retaining
    both elements reflects the idea that Azazel both practiced and taught corrupt
    acts. The phrase is somewhat awkward in English, but preserving that density is
    more transparent than smoothing it into a single abstract noun.
- source_word: ለአዛዝኤል
  chosen: of Azazel
  alternatives:
  - belonging to Azazel
  - from Azazel
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional relation here links the works to Azazel. 'Of Azazel'
    is concise and natural in English while preserving attribution.
- source_word: ወላዕሌሁ
  chosen: to him
  alternatives:
  - against him
  - concerning him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase introduces the object of the command to write or ascribe.
    'To him' fits the judicial sense of assigning guilt, though the underlying force
    may also imply 'against him.'
- source_word: ጸሐፍ
  chosen: write down
  alternatives:
  - write
  - record
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: An imperative in a judicial pronouncement. 'Write down' conveys formal
    recording of guilt without becoming overly stiff.
- source_word: ኵሎ ኃጢአተ
  chosen: all sin
  alternatives:
  - every sin
  - the whole of sin
  - all the sin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase sums up total culpability. 'All sin' is concise and preserves
    the sweeping attribution of guilt to Azazel in this verse.
