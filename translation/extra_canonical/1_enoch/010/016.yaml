translation:
  text: And all violence shall be removed from the face of the earth, and every evil
    deed shall come to an end; and the plant of righteousness and uprightness shall
    appear, and it shall become a blessing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the planting of righteousness and uprightness.' The Ge'ez noun can denote
      either the thing planted or the act/result of planting.
    reason: lexical_alternative
lexical_decisions:
- source_word: አሕጕል
  chosen: shall be removed
  alternatives:
  - shall be uprooted
  - shall be taken away
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb introduces the removal of violence from the earth. 'Shall be
    removed' is clear modern English and preserves the passive/resultative sense without
    over-specifying a more concrete image such as 'uprooted' unless the context demands
    it.
- source_word: ኵሎ ግፍዓ
  chosen: all violence
  alternatives:
  - all oppression
  - all wrong
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ግፍዓ commonly denotes violence, oppression, or wrongdoing. In this judgment-and-renewal
    context, 'violence' best preserves the social and moral force of the term and
    fits the cosmic cleansing imagery.
- source_word: እምገጸ ምድር
  chosen: from the face of the earth
  alternatives:
  - from the earth
  - from the surface of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom literally includes 'face,' a common Semitic-style expression.
    Retaining 'face of the earth' preserves the elevated register and apocalyptic
    texture better than flattening it to simply 'from the earth.'
- source_word: ኵሉ ምግባረ እኩይ
  chosen: every evil deed
  alternatives:
  - all evil work
  - every wicked practice
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The phrase is singular/collective in force: ''every evil deed'' communicates
    the comprehensive scope while remaining idiomatic English. ''Work'' is possible
    but less natural here.'
- source_word: ይኅልቅ
  chosen: shall come to an end
  alternatives:
  - shall perish
  - shall be destroyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can denote perishing or being finished. Because the subject
    is 'every evil deed,' 'shall come to an end' fits idiomatic English while preserving
    the sense of cessation rather than personified destruction.
- source_word: ያስተርኢ
  chosen: shall appear
  alternatives:
  - shall be revealed
  - shall be made manifest
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb points to becoming visible or being shown. 'Shall appear' is
    concise and suits the emergence imagery of the following 'plant' without sounding
    overly abstract.
- source_word: ተክለ
  chosen: the plant
  alternatives:
  - the planting
  - the shoot
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun evokes something planted or growing. 'Plant' preserves the agricultural
    image in a simple way. 'Planting' is possible, but 'plant' better matches the
    verse's imagery of visible emergence.
- source_word: ጽድቅ ወርትዕ
  chosen: of righteousness and uprightness
  alternatives:
  - of righteousness and truth
  - of justice and rectitude
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጽድቅ is regularly 'righteousness.' ርትዕ carries the sense of straightness,
    rectitude, or uprightness. 'Uprightness' keeps the ethical nuance without importing
    later doctrinal terminology.
- source_word: ይከውን ለበረከት
  chosen: it shall become a blessing
  alternatives:
  - it shall be for a blessing
  - it shall serve as a blessing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction can be rendered quite literally as 'shall be/become
    for a blessing.' 'Shall become a blessing' is natural English while preserving
    the resultative sense and covenantal resonance of blessing.
