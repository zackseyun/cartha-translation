theological_decisions:
- issue: Meaning of the agricultural image 'plant of righteousness and uprightness'
  chosen_reading: A concrete apocalyptic image of righteous growth or establishment
    is retained rather than abstracting it into 'righteousness will flourish.'
  alternative_readings:
  - the planting of righteousness and uprightness
  - a shoot of righteousness and uprightness
  rationale: The Ge'ez uses an agricultural noun, and the translation philosophy forbids
    flattening apocalyptic imagery into generic prose. Retaining 'plant' preserves
    the visionary texture while remaining intelligible.
  doctrine_reference: Preserve apocalyptic imagery; optimal equivalence with original-language
    primacy.
