theological_decisions:
- issue: Nature of the sin described in the union with women
  chosen_reading: Render the language in terms of defilement and uncleanness without
    specifying later doctrinal categories beyond the verse.
  alternative_readings:
  - sexual corruption
  - ritual impurity alone
  - general wickedness
  rationale: The Ge'ez emphasizes defilement/uncleanness in connection with the Watchers'
    union with women. The translation preserves that theological register without
    narrowing it to a single later category.
  doctrine_reference: Preserve theological tension rather than resolve it.
