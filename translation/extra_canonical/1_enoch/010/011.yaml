translation:
  text: And to Mikael he said, “Go, bind Shemihazah and the others with him, who joined
    themselves with women so as to defile themselves with them in all their uncleanness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The command verb before 'Shemihazah' is textually difficult in the OCR,
      but the chapter context and broader witness support the sense 'bind.'
    reason: textual_variant
  - marker: b
    text: Mikael is the Ge'ez-form transliteration of the angel's name, more familiar
      in English as Michael.
    reason: lexical_alternative
lexical_decisions:
- source_word: ለሚካኤል
  chosen: to Mikael
  alternatives:
  - to Michael
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal names are transliterated rather than translated. 'Mikael' reflects
    a direct Ge'ez-based transliteration; 'Michael' is the familiar Anglicized form
    but is less transparent to the source spelling.
- source_word: ይቤ
  chosen: he said
  alternatives:
  - said
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard speech-introduction verb; rendered simply and directly.
- source_word: እግዚእ
  chosen: Go
  alternatives:
  - Depart
  - Proceed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this imperative context the sense is a command to set out. 'Go' is
    natural English and preserves the force of the commission.
- source_word: ሑር
  chosen: bind
  alternatives:
  - seize
  - tie up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The following object and context of angelic judgment in this chapter
    require an arresting/binding action. The OCR form is difficult, but the verse
    context strongly supports 'bind' rather than a mere cognitive or declarative verb.
- source_word: ለስምያዛ
  chosen: Shemihazah
  alternatives:
  - Semjaza
  - Semyaza
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard scholarly transliteration of the Watcher leader's name from
    the Ge'ez form, avoiding dependence on later English tradition while remaining
    recognizable.
- source_word: ወለካልኣን እለ ምስሌሁ
  chosen: and the others with him
  alternatives:
  - and his associates
  - and those who were with him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This phrase identifies Shemihazah's companions. 'The others with him'
    is clear and preserves the collective sense without over-interpreting rank or
    status.
- source_word: እለ ሐብሩ ምስለ አንስት
  chosen: who joined themselves with women
  alternatives:
  - who united themselves with women
  - who coupled with women
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes joining/associating oneself with. 'Joined themselves
    with women' preserves the deliberate transgressive union without importing euphemistic
    or overly explicit wording.
- source_word: ከመ ይማስኑ
  chosen: so as to defile themselves
  alternatives:
  - that they might become defiled
  - to make themselves unclean
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause expresses result or purpose tied to impurity. 'Defile themselves'
    fits the apocalyptic-ritual register and preserves moral and cultic overtones.
- source_word: በርኵሶ ዚአሆን
  chosen: in all their uncleanness
  alternatives:
  - in their impurity
  - with their defilement
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase intensifies the state of pollution associated with the illicit
    union. 'Uncleanness' preserves the ritual-moral texture better than the flatter
    'impurity' in this context.
