theological_decisions:
- issue: Whether the verse describes the sons merely fighting or killing one another
  chosen_reading: The sons have slain one another
  alternative_readings:
  - The sons contend with one another
  - The sons destroy one another
  rationale: Within 1 Enoch 10, the judgment on the offspring of the Watchers culminates
    in violent mutual destruction. Rendering the verb as reciprocal killing best fits
    the immediate context and preserves the severity of divine judgment.
  doctrine_reference: Preserve apocalyptic imagery and do not flatten judgment formulas.
- issue: Meaning of 'their consummation'
  chosen_reading: A formal eschatological completion/end of the Watchers' judgment
    process
  alternative_readings:
  - Their final punishment
  - Their destruction
  - Their appointed end
  rationale: The source term can denote completion or end. 'Consummation' keeps the
    theological tension and avoids over-resolving whether the emphasis is annihilation,
    sentencing, or the completion of the judicial process.
  doctrine_reference: Preserve theological tension rather than resolve it.
