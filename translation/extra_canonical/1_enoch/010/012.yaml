translation:
  text: And when all their sons have slain one another, and when they have seen the
    destruction of their beloved ones, bind them for seventy generations beneath the
    hills of the earth, until the day of their judgment and of their consummation,
    until the judgment that is for all eternity is completed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under the mountains of the earth.' The Ge'ez term can be rendered 'hills'
      or 'mountains.'
    reason: lexical_alternative
  - marker: b
    text: '''Their consummation'' may also be understood as ''their end'' or ''their
      final completion.'''
    reason: lexical_alternative
  - marker: c
    text: The closing phrase is an emphatic eternity formula, literally along the
      lines of 'the judgment of the age of eternity' or 'of eternal ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይትራገዙ
  chosen: have slain one another
  alternatives:
  - contend with one another
  - strike one another
  - destroy one another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of the giants' violence and mutual destruction, the reflexive/plural
    form is best rendered as reciprocal lethal conflict rather than mere quarrelling.
    'Have slain one another' preserves the apocalyptic judgment scene more clearly
    than a weaker 'contend.'
- source_word: ሐጕሎሙ
  chosen: the destruction of them
  alternatives:
  - their ruin
  - their downfall
  - their slaughter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes destruction/ruin. Because the object is 'their beloved
    ones,' the phrase refers to the ruin or destruction suffered by those dear to
    them. 'Destruction' is broad enough to preserve the source without over-specifying
    the mode.
- source_word: ለፍቁራኒሆሙ
  chosen: their beloved ones
  alternatives:
  - their loved ones
  - those dear to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez derives from the root of love/affection. 'Beloved ones' keeps
    the elevated register and the emotional force of the judgment scene.
- source_word: እሰሮሙ
  chosen: bind them
  alternatives:
  - imprison them
  - confine them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The imperative/jussive force in this angelic command is concrete and
    physical. 'Bind them' preserves the imagery used throughout Watchers traditions
    better than the more abstract 'imprison.'
- source_word: ለ፸ ትውልድ
  chosen: for seventy generations
  alternatives:
  - through seventy generations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a standard apocalyptic period formula. 'For seventy generations'
    is the most direct rendering and preserves the temporal symbolism.
- source_word: በመትሕተ አውግርተ ምድር
  chosen: beneath the hills of the earth
  alternatives:
  - under the hills of the earth
  - beneath the mountains of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase locates imprisonment in the under-earth region associated
    with cosmic confinement. 'Beneath the hills of the earth' follows the Ge'ez wording
    closely; 'mountains' is possible, but 'hills' better reflects the attested form
    here without exaggeration.
- source_word: ዕለተ ኵነኔሆሙ
  chosen: the day of their judgment
  alternatives:
  - the day of their condemnation
  - the day of their sentencing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes judgment in a judicial sense. 'Judgment' preserves the
    formal apocalyptic register and avoids narrowing it to only condemnation.
- source_word: ተፍጻሜቶሙ
  chosen: their consummation
  alternatives:
  - their end
  - their final punishment
  - their completion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term carries the sense of completion/end. 'Consummation' preserves
    the solemn eschatological tone and leaves open whether the focus is termination,
    fulfillment, or final penalty.
- source_word: ኵነኔ ዘለዓለመ ዓለም
  chosen: the judgment that is for all eternity
  alternatives:
  - the eternal judgment
  - the judgment of the age of ages
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is an emphatic eternity formula. 'For all eternity' is readable
    modern English while preserving the force of the repeated age-language better
    than a flattened 'forever.'
