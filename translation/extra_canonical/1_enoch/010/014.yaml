translation:
  text: And when they and their sons have risen up, they shall be bound together with
    them until the completion of the generations of generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening verb is textually difficult in the OCR witness; it likely denotes
      rising up, appearing, or being stirred. The translation keeps a cautious rendering
      rather than forcing a more specific sense.
    reason: textual_variant
  - marker: b
    text: '''Generations of generations'' is a literal rendering of the repeated idiom,
      expressing a long succession of ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሶበ
  chosen: And when
  alternatives:
  - and then
  - but when
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal conjunction introducing the next stage of the judgment sequence;
    'And when' preserves the connective force and timing.
- source_word: †ይውዒ፡†
  chosen: have risen up
  alternatives:
  - arise
  - awake
  - are stirred up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR form is uncertain, but the clause most naturally points to a
    verb of arising or appearing. Perfect-like English 'have risen up' fits the temporal
    construction and preserves the apocalyptic sequence without overinterpreting.
- source_word: ወይማስን
  chosen: and their sons
  alternatives:
  - and their offspring
  - and their children
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context this likely refers to the descendants associated with the
    judged beings. 'Sons' keeps the more literal and genealogical force common in
    ancient judgment texts.
- source_word: እምይእዜ
  chosen: they
  alternatives:
  - those who are from now
  - from this time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The transmitted form is difficult in OCR. The sense required by the clause
    is a resumptive subject before 'shall be bound.' I render the subject plainly
    in English while noting the textual uncertainty in a footnote.
- source_word: ምስሌሆሙ
  chosen: with them
  alternatives:
  - along with them
  - together with them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks association in punishment. 'With them' is concise; the following
    'bound together' carries the collective force.
- source_word: ኅቡረ
  chosen: together
  alternatives:
  - in company
  - as one group
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adverbial sense indicating collective binding. Preserving it avoids flattening
    the corporate nature of the judgment.
- source_word: ይትአሰሩ
  chosen: shall be bound
  alternatives:
  - shall be imprisoned
  - shall be fettered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A judgment verb of binding/restraint. 'Bound' matches the recurring Watchers-imprisonment
    imagery and avoids importing a more interpretive term like 'imprisoned' into the
    main text.
- source_word: እስከ
  chosen: until
  alternatives:
  - up to
  - as far as
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard terminative preposition marking the duration of confinement.
- source_word: ተፍጻሜተ
  chosen: the completion
  alternatives:
  - the end
  - the consummation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to the reaching of an appointed end. 'Completion' preserves the
    sense of a fixed terminus without overloading the phrase with later eschatological
    terminology.
- source_word: ትውልደ፡ ትውልድ
  chosen: the generations of generations
  alternatives:
  - generation of generation
  - all generations
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A repetitive idiom expressing an extended succession of ages. I preserve
    the doubled form because apocalyptic rhetoric often uses such repetition for solemn
    duration.
