theological_decisions:
- issue: Duration and scope of punishment
  chosen_reading: The verse speaks of collective binding extending through an appointed
    succession of generations, not necessarily an abstract timeless eternity.
  alternative_readings:
  - eternal imprisonment
  - binding until the final judgment only
  rationale: The Ge'ez explicitly uses a terminative phrase ('until the completion')
    plus a repeated generations idiom. Rendering both preserves the text's temporal
    tension without resolving it into later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
