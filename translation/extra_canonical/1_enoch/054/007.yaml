theological_decisions:
- issue: Nature of the coming judgment
  chosen_reading: A cosmic judgment in which the Lord of Spirits releases heavenly
    and subterranean waters.
  alternative_readings:
  - A more general punishment without specific flood imagery
  - A purely metaphorical opening of cosmic reservoirs
  rationale: The verse explicitly names heavenly waters and subterranean fountains/storehouses.
    The imagery should remain concrete and apocalyptic rather than generalized.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten cosmic judgment
    formulas into generic prose.
