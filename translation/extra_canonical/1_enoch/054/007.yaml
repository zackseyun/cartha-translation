lexical_decisions:
- source_word: መዋዕል
  chosen: days
  alternatives:
  - time
  - those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Common temporal term; with በውእቱ gives the apocalyptic formula 'in those
    days,' which should be preserved.
- source_word: መቅሠፍቱ
  chosen: the punishment
  alternatives:
  - the scourge
  - the chastisement
  - the plague
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A judgment term denoting punitive affliction. 'Punishment' is broad and
    clear, preserving divine judicial force without over-specifying the mode.
- source_word: እግዚአ መናፍስት
  chosen: Lord of Spirits
  alternatives:
  - Lord of the Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the established title in the Parables. 'Lord of Spirits' is concise
    and preserves the title's apocalyptic distinctiveness.
- source_word: ታርሑ
  chosen: will be opened
  alternatives:
  - will be loosed
  - will be unlocked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is cosmic reservoirs being released. 'Will be opened' fits
    the imagery of storehouses and fountains without flattening it.
- source_word: መዛግብተ
  chosen: storehouses
  alternatives:
  - treasuries
  - repositories
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Apocalyptic cosmology often imagines heavenly elements kept in divine
    storehouses. 'Storehouses' is vivid and readable.
- source_word: ማያት
  chosen: waters
  alternatives:
  - water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Plural better reflects the Ge'ez form and the cosmic, collective sense
    of the heavenly waters.
- source_word: ዘመልዕልተ ሰማያት
  chosen: that are above the heavens
  alternatives:
  - which are over the heavens
  - that are in the height of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Preserves the layered cosmological imagery of waters located above the
    heavens.
- source_word: አንቅዕተ
  chosen: fountains
  alternatives:
  - springs
  - sources
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In parallel with heavenly storehouses, this term likely denotes subterranean
    water-sources. 'Fountains' preserves elevated register and imagery.
- source_word: መትሕተ ምድር
  chosen: beneath the earth
  alternatives:
  - under the earth
  - below the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward spatial phrase; 'beneath' suits the elevated style.
