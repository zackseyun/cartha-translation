theological_decisions:
- issue: Whether to render the punishment language in a softened way
  chosen_reading: retain explicit vengeance and furnace imagery
  alternative_readings:
  - render as generic punishment or judgment
  rationale: The verse is apocalyptic judgment speech. The project philosophy requires
    preserving theological tension and imagery rather than smoothing it into generic
    religious prose.
  doctrine_reference: Translation philosophy §§1, 3, 5; Book context notes 1 and 5
- issue: How to render the relation to Satan
  chosen_reading: they became servants of Satan
  alternative_readings:
  - they became slaves of Satan
  - they became angels/messengers of Satan
  rationale: The Ge'ez is best read as entering Satan's service, not necessarily identifying
    them as ontological agents in a technical sense. 'Servants' preserves the moral
    allegiance without overcommitting to a narrower doctrinal reading.
  doctrine_reference: Translation philosophy §§1, 3, 4
