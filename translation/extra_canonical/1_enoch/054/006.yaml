translation:
  text: And Michael and Gabriel and Raphael and Phanuel—they will seize them on that
    great day and cast them into the burning furnace on that day, so that the Lord
    of Spirits may take vengeance on them for their lawlessness, because they became
    servants of Satan and led astray those who dwell upon the dry land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take hold of them' for 'seize them'; the Ge'ez verb indicates forceful
      apprehension, but the exact nuance is difficult in this Ge'ez-only section.
    reason: lexical_alternative
  - marker: b
    text: Literally 'upon the dry land.' This may simply mean the earth's inhabitants,
      but the more concrete wording has been retained because the Parables survive
      effectively only in Ge'ez here.
    reason: lexical_alternative
  - marker: c
    text: The phrase rendered 'servants of Satan' is textually and lexically difficult;
      'slaves of Satan' or, less likely, 'messengers of Satan' are possible.
    reason: textual_variant
lexical_decisions:
- source_word: ያፀንዕዎሙ
  chosen: they will seize them
  alternatives:
  - they will take hold of them
  - they will bind them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes forceful laying hold of the judged figures. 'Seize'
    preserves the judicial and violent apocalyptic action better than the softer 'take
    hold,' while avoiding over-specification such as 'bind' unless the context explicitly
    states binding.
- source_word: ዕለት ዐባይ
  chosen: that great day
  alternatives:
  - that mighty day
  - that great judgment day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward rendering preserves the stock apocalyptic formula without
    importing interpretive expansion such as 'judgment day.'
- source_word: እቶን ዘይነድድ
  chosen: the burning furnace
  alternatives:
  - the furnace that burns
  - the blazing furnace
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is vivid and concrete. 'Burning furnace' keeps the imagery
    formal and recognizable without sounding archaic.
- source_word: ይወድይዎሙ
  chosen: cast them into
  alternatives:
  - throw them into
  - hurl them into
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The context is punitive disposal into the furnace. 'Cast' fits elevated
    apocalyptic register and avoids colloquial tone.
- source_word: ይትበቀል
  chosen: may take vengeance
  alternatives:
  - may avenge himself
  - may exact retribution
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb expresses retributive justice. 'Take vengeance' preserves the
    judicial force without softening it into generic punishment.
- source_word: በዓመፃሆሙ
  chosen: for their lawlessness
  alternatives:
  - for their wrongdoing
  - for their rebellion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term carries a strong sense of transgressive wickedness. 'Lawlessness'
    best preserves the moral and judicial weight in apocalyptic context.
- source_word: ላእከ ሰሰይጣን
  chosen: servants of Satan
  alternatives:
  - slaves of Satan
  - messengers of Satan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction most naturally indicates belonging or service to Satan.
    'Servants' is chosen because the Ge'ez here does not clearly foreground chattel
    status as strongly as a term equivalent to 'slave' would, and 'messengers' is
    less likely in this moral context.
- source_word: አስኀትዎሙ
  chosen: led astray
  alternatives:
  - caused to err
  - deceived
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates causing others to go wrong. 'Led astray' preserves
    both moral and directional imagery common in biblical-apocalyptic diction.
- source_word: እለ የኀድሩ ዲበ የብስ
  chosen: those who dwell upon the dry land
  alternatives:
  - those who live on the earth
  - the inhabitants of the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez literally points to dwelling upon dry land. Retaining 'dry
    land' preserves the concrete cosmological texture of the text and avoids flattening
    it to the generic 'earth'.
