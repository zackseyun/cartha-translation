translation:
  text: And I looked and turned to another part of the earth, and I saw there a deep
    valley with burning fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'another face of the earth,' an idiom for another region or side
      of the earth.
    reason: lexical_alternative
  - marker: b
    text: The final clause may also be rendered 'where fire was burning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ነጸርኩ
  chosen: I looked
  alternatives:
  - I saw
  - I gazed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward visionary verb of seeing; 'looked' preserves the narrative
    sequence before the more specific 'I saw' later in the verse.
- source_word: ተመየጥኩ
  chosen: turned
  alternatives:
  - moved
  - went over
  - changed direction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of visionary movement, the sense is that the seer turns his
    attention or orientation to another region. 'Turned' is concise and preserves
    the visual-motion imagery.
- source_word: ካልአ ገጸ ምድር
  chosen: another part of the earth
  alternatives:
  - another face of the earth
  - another region of the earth
  - another quarter of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ge'ez literally has 'another face of the earth.' In English, 'part' communicates
    the spatial sense naturally without losing the cosmographic feel; the more literal
    option is preserved in a footnote.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the main visionary perception verb; 'I saw' is
    clear and suitably elevated in context.
- source_word: ህየ
  chosen: there
  alternatives:
  - in that place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A deictic adverb pointing to the newly viewed location; 'there' is the
    natural English equivalent.
- source_word: ቈላ ዕሙቀ
  chosen: a deep valley
  alternatives:
  - a valley of depth
  - a deep ravine
  - a deep hollow
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a valley or hollow characterized by depth. 'Deep valley'
    preserves the topographical and ominous imagery without over-specifying the terrain.
- source_word: እንዘ ትነድድ እሳት
  chosen: with burning fire
  alternatives:
  - where fire was burning
  - burning with fire
  - as fire burned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction describes the valley in relation to active fire. 'With
    burning fire' keeps the image compact and vivid, though the syntax may also be
    rendered verbally.
