theological_decisions:
- issue: Identity of the unnamed subject performing the action
  chosen_reading: Render simply as 'they' without specifying angels
  alternative_readings:
  - the angels shall bring
  - the attendants shall bring
  rationale: The Ge'ez gives a plural verbal form without an explicit subject in this
    verse. Since the immediate context may imply angelic agents, but the verse itself
    does not name them, the translation preserves the ambiguity rather than resolving
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
