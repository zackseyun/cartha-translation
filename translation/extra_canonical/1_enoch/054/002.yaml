translation:
  text: And they shall bring the kings and the mighty, and cast them into that deep
    valley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The subject is not named in this verse; the plural 'they' likely refers
      to previously mentioned agents in the vision, possibly angelic attendants.
    reason: alternative_reading
lexical_decisions:
- source_word: እምጽእዎሙ
  chosen: they shall bring them
  alternatives:
  - they will lead them
  - they shall bring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal form is best taken as a plural future/jussive-like narrative
    form meaning 'bring' or 'lead.' Because the direct object is resumed by the following
    phrase naming the kings and mighty, English can render the sense naturally as
    'they shall bring' with the object explicit from context.
- source_word: ለነገሥት
  chosen: the kings
  alternatives:
  - kings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard Ge'ez term for kings/rulers. The article is supplied in English
    because the referent is definite within the judgment scene.
- source_word: ወለኃያላን
  chosen: and the mighty
  alternatives:
  - and the powerful ones
  - and the strong
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic judgment context, 'the mighty' preserves both the
    social-political force and the elevated register better than the flatter 'powerful
    ones.'
- source_word: ይውድ ይዎሙ
  chosen: cast them
  alternatives:
  - throw them
  - hurl them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase conveys forceful placement into the place of judgment. 'Cast
    them' fits biblical-apocalyptic register without becoming overly dramatic.
- source_word: ውስተ
  chosen: into
  alternatives:
  - in
  - within
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition marks motion into a location, so 'into' is preferable.
- source_word: ዝኩ
  chosen: that
  alternatives:
  - this
  - the same
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative points to a previously shown location in the vision;
    'that' preserves the deictic force.
- source_word: ዕሙቅ
  chosen: deep
  alternatives:
  - profound
  - abyssal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective denotes depth. 'Deep' is simple and vivid, and avoids over-interpretive
    mythic language.
- source_word: ቈላ
  chosen: valley
  alternatives:
  - ravine
  - gorge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes a valley-like depression. 'Valley' is the most natural
    English equivalent and preserves the imagery of a visible place of judgment.
