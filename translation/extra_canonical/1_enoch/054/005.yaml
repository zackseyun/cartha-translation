theological_decisions:
- issue: Identity of the group associated with Azazʾel
  chosen_reading: a collective under Azazʾel's authority ('the host of Azazʾel')
  alternative_readings:
  - the work/deed of Azazʾel
  - the followers of Azazʾel
  rationale: The Ge'ez OCR is difficult at this point, and the phrase has been understood in more than one way. Because the surrounding pronouns are plural and the verse concerns punitive preparation, a collective reading best fits the immediate context while remaining cautious.
  doctrine_reference: Preserve theological tension rather than resolve it; when uncertain, prefer transparent English and footnote alternatives.
- issue: Reference of 'their angels'
  chosen_reading: angelic beings belonging to or associated with Azazʾel's party
  alternative_readings:
  - their messengers
  - their leaders
  rationale: Within the Parables and broader Enochic usage, 'angels' is the default sense. The verse depicts cosmic judgment, so a supernatural referent is more likely than a merely human one.
  doctrine_reference: Original-language primacy and consistency of key terms.
