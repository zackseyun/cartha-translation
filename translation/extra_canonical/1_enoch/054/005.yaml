translation:
  text: And he said to me, “These are being prepared for the host of Azazʾel, so that they may take them and cast them into the lowest part of the place of judgment; and they will cover their jaws with rough stones, just as the Lord of Spirits commanded.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'for the host of Azazʾel' is textually difficult in the Ge'ez and may also be understood more abstractly, such as 'for the work/deed of Azazʾel' or 'for those belonging to Azazʾel.'
    reason: textual_variant
  - marker: b
    text: Or 'under all judgment.' The expression is obscure, but the sense is comprehensive subjection to judgment.
    reason: lexical_alternative
  - marker: c
    text: '''Their angels'' could in principle be rendered ''their messengers,'' but in Enochic context ''angels'' is more likely.'
    reason: lexical_alternative
  - marker: d
    text: Or 'beneath every judgment'.
    reason: previous_rendering
  - marker: e
    text: Or 'and rough stones will cover their angels'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይዴለዉ
  chosen: are being prepared
  alternatives:
  - are ready
  - are made ready
  - are prepared
  lexicon: Dillmann Lexicon
  rationale: The form indicates preparation/readiness rather than simple existence. 'Are being prepared' preserves the sense of purposeful appointment in this judgment scene.
- source_word: ለትዕይንተ
  chosen: for the host
  alternatives:
  - for the spectacle
  - for the company
  - for the army
  lexicon: Dillmann Lexicon
  rationale: The OCR form is difficult, but in context with Azazʾel and the following plural pronouns, the sense is a collective associated with him. 'Host' preserves an apocalyptic collective without overcommitting to a military nuance.
- source_word: አዛዜኤል
  chosen: Azazʾel
  alternatives:
  - Azazel
  lexicon: —
  rationale: Personal names are transliterated. The form reflects the Ge'ez name while remaining recognizable to English readers.
- source_word: ይትመጠውዎሙ
  chosen: they may take them
  alternatives:
  - they may seize them
  - they may receive them
  lexicon: Dillmann Lexicon
  rationale: The verb likely conveys taking or grasping. 'Take them' is broad and fits the sequence of apprehension before casting down.
- source_word: ወይደይዎሙ
  chosen: cast them
  alternatives:
  - throw them
  - hurl them
  lexicon: Dillmann Lexicon
  rationale: A forceful verb of throwing/casting suits the punitive imagery. 'Cast' keeps elevated register and apocalyptic tone.
- source_word: መትሕተ ኵሉ ደይን
  chosen: beneath every judgment
  alternatives:
  - under all judgment
  - beneath the whole judgment
  lexicon: Dillmann Lexicon
  rationale: The phrase is somewhat opaque, but it clearly invokes subjection under judgment. 'Beneath every judgment' preserves the literal downward imagery and comprehensive scope.
- source_word: አእባኒ ጠያያነ
  chosen: rough stones
  alternatives:
  - jagged stones
  - unhewn stones
  - hard stones
  lexicon: Dillmann Lexicon
  rationale: The noun is 'stones'; the adjective suggests roughness or irregularity. 'Rough stones' is concrete and avoids overinterpretation.
- source_word: ይክድኑ
  chosen: will cover
  alternatives:
  - will conceal
  - will bury
  lexicon: Dillmann Lexicon
  rationale: The verb denotes covering/hiding. 'Will cover' is the most direct rendering and leaves the exact mode of entombment implicit.
- source_word: መላእክቲሆሙ
  chosen: their angels
  alternatives:
  - their messengers
  lexicon: Dillmann Lexicon
  rationale: In Enochic literature this term normally refers to angelic beings, not human envoys. Retaining 'angels' preserves the supernatural register of the passage.
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann Lexicon
  rationale: This is a fixed divine title in the Parables. 'Lord of Spirits' preserves the established Enochic formula without importing later doctrinal language.
