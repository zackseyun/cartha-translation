    reason: lexical_alternative
lexical_decisions:
- source_word: ተስእእክዎ
  chosen: I asked
  alternatives:
  - I inquired of him
  - I questioned him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb introduces Enoch’s question to the accompanying angel. 'I asked'
    is natural English and preserves the direct inquiry without adding interpretive
    nuance.
- source_word: መልአከ ሰላም
  chosen: the angel of peace
  alternatives:
  - the peaceful angel
  - the angel of well-being
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A fixed expression in Enochic narrative for the interpreting angelic
    guide. 'Angel of peace' preserves the title-like force and avoids flattening it
    into a mere adjective.
- source_word: ዘየሐውር ምስሌየ
  chosen: who went with me
  alternatives:
  - who was going with me
  - who accompanied me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative clause identifies the angel as Enoch’s visionary companion.
    'Went with me' is straightforward and keeps the narrative movement.
- source_word: እሉ እስረተ
  chosen: these chains
  alternatives:
  - these bonds
  - these fetters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative plus noun points to visible objects in the vision.
    'Chains' best fits the concrete punitive imagery in this judgment context, though
    'bonds' and 'fetters' remain possible.
- source_word: መበልዕት
  chosen: the instruments
  alternatives:
  - the implements
  - the tools
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR reading is difficult, but the noun appears to denote implements
    or instruments associated with punishment/preparation. 'Instruments' is broad
    enough to preserve uncertainty while still yielding coherent English.
- source_word: ለመኑ ይዴለዉ
  chosen: for whom are they being prepared
  alternatives:
  - for whom are they intended
  - for whom are they made ready
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase asks about the destined recipients of the chains. 'Being prepared'
    preserves the passive, anticipatory force appropriate to an apocalyptic judgment
    scene.
