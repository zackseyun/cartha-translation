theological_decisions:
- issue: Nature of the punitive objects in the vision
  chosen_reading: Render the phrase concretely as 'chains of the instruments' rather
    than generalizing to abstract punishment.
  alternative_readings:
  - chains of punishment
  - bonds for judgment
  rationale: The verse points to visible objects within the vision and asks their
    intended recipients. Preserving the concrete imagery fits the apocalyptic scene
    and avoids interpretive smoothing.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    flatten judgment formulas into generic religious prose.'
