- issue: Nature of the objects being prepared in the vision
  chosen_reading: Concrete iron chains being manufactured for eschatological binding/judgment
  alternative_readings:
  - Generic instruments of punishment
  - Metaphorical bonds
  rationale: 'The immediate lexical field is material and concrete: implements, making,
    iron, chains. In apocalyptic context these likely serve impending judgment, but
    the verse itself presents the image rather than explaining it, so the translation
    keeps the concrete wording and does not over-interpret.'
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment scenes
    into generic religious prose.
