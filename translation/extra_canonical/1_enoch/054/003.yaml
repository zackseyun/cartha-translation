translation:
  text: And there my eyes saw the instruments while they were making iron chains without
    measure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez term rendered 'instruments' may also be understood more specifically
      as 'tools' or 'implements' associated with the work being done.
    reason: lexical_alternative
  - marker: b
    text: Or 'iron fetters.' The noun denotes devices for binding.
    reason: lexical_alternative
  - marker: c
    text: Literally 'without measure'; the phrase may also imply 'without limit' or
      'immeasurable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ርእያ አዕይንትየ
  chosen: my eyes saw
  alternatives:
  - I saw
  - my eyes beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the vivid visionary formula with explicit mention of the eyes,
    a common apocalyptic reporting style, rather than reducing it to a plain 'I saw.'
- source_word: ዘመባዕዕቲሆሙ
  chosen: the instruments
  alternatives:
  - their tools
  - the implements
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form points to implements/tools associated with the work being done.
    'Instruments' preserves the concrete sense while fitting elevated readable English.
    Because the exact nuance is somewhat uncertain in this Ge'ez-only context, a lexical
    footnote is appropriate.
- source_word: እንዘ ይገብርዎሙ
  chosen: while they were making
  alternatives:
  - as they made
  - when they fashioned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction naturally conveys ongoing action observed in the vision.
    'While they were making' preserves that durative sense.
- source_word: መአስርተ
  chosen: chains
  alternatives:
  - fetters
  - bonds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this judgment context the noun denotes binding devices. 'Chains' is
    the clearest modern English term and preserves the harsh apocalyptic imagery.
- source_word: ሐጺን
  chosen: iron
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward material term; retained literally to preserve the physical
    severity of the scene.
- source_word: ዘአልቦ መደለውተ
  chosen: without measure
  alternatives:
  - immeasurable
  - without number
  - without limit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally expresses absence of measure/limit. 'Without measure' preserves
    the idiom and the ominous excess of the visionary image better than a more interpretive
    paraphrase.
