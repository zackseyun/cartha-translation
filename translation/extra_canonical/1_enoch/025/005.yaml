theological_decisions:
- issue: Identity of ኅሩያን
  chosen_reading: the chosen ones as the faithful people singled out for eschatological
    life
  alternative_readings:
  - the elect in a more technical later theological sense
  - the righteous generally without emphasis on chosenness
  rationale: Within 1 Enoch, this designation functions as an apocalyptic group label.
    The translation preserves the local Enochic category without importing later systematic
    terminology.
  doctrine_reference: Contested terms / consistency of key terms
- issue: Nature of the promised life
  chosen_reading: life in an exalted or eschatological sense, left simply as 'life'
    in the text
  alternative_readings:
  - eternal life
  - healing or restoration
  rationale: The context of the tree and its fruit strongly suggests more than ordinary
    biological life, but the Ge'ez witness here gives only 'life.' To preserve theological
    tension, the main text remains unexpanded.
  doctrine_reference: Preserve theological tension rather than resolve it
