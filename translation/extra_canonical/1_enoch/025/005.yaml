translation:
  text: From its fruit life shall be given to the chosen ones, and it shall be planted
    toward the north, above.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final phrase is textually difficult in this isolated witness. 'Toward
      the north, above' follows the surviving Ge'ez words literally; the implied reference
      may be to the tree's future planting location.
    reason: textual_variant
lexical_decisions:
- source_word: ፍሬ
  chosen: fruit
  alternatives:
  - produce
  - yield
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The concrete image of the tree's fruit should be preserved in this visionary
    setting; 'fruit' is the most direct rendering.
- source_word: ይትወሀብ
  chosen: shall be given
  alternatives:
  - will be granted
  - is given
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive/future sense fits the Ge'ez form and preserves the solemn promise
    without over-paraphrase.
- source_word: ኅሩያን
  chosen: the chosen ones
  alternatives:
  - the elect
  - the selected ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This term is a key apocalyptic designation in Enochic literature. 'Chosen
    ones' is clear modern English and avoids importing later doctrinal freight attached
    to 'elect' while preserving the category.
- source_word: ሐይወት
  chosen: life
  alternatives:
  - living
  - life-giving power
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun straightforwardly denotes 'life'; the context suggests life
    bestowed through the tree's fruit, but the text itself need not be expanded beyond
    'life'.
- source_word: መንገለ መስዕ
  chosen: toward the north
  alternatives:
  - to the north
  - on the northern side
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መንገለ commonly marks direction ('toward, in the direction of'), and መስዕ
    denotes the north. 'Toward the north' preserves the directional nuance.
- source_word: ይተከል
  chosen: it shall be planted
  alternatives:
  - it will be transplanted
  - it shall be set
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb naturally means 'be planted.' In context the tree is being relocated
    or established, but 'planted' keeps the arboreal imagery explicit.
- source_word: ዲበ
  chosen: above
  alternatives:
  - upon
  - on high
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition commonly means 'upon, on, above.' Because the object
    is not expressed in the surviving line, 'above' is retained as a literal but somewhat
    open rendering.
