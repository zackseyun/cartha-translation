translation:
  text: And he said to me, “Enoch, why do you ask about the fragrance of this tree,
    and inquire so that you may know?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concerning its scent.' The Ge'ez term refers to smell or fragrance;
      'fragrance' was chosen for the elevated tone of the scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይቤለኒ
  chosen: he said to me
  alternatives:
  - he told me
  - he spoke to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard narrative speech formula; 'said to me' preserves the directness
    of angelic dialogue without unnecessary expansion.
- source_word: ሄኖክ
  chosen: Enoch
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Personal name is transliterated per project philosophy.
- source_word: ምንተ ትስእል
  chosen: why do you ask
  alternatives:
  - what do you ask
  - for what do you ask
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Although literally built on 'what,' the idiom in context is best rendered
    'why do you ask,' since the following phrases specify the object and purpose of
    the inquiry.
- source_word: በእንተ መዓዛሁ
  chosen: about the fragrance of it
  alternatives:
  - concerning its fragrance
  - about its scent
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መዓዛ denotes smell/fragrance. 'Fragrance' fits the elevated register and
    the positive, wondrous setting better than the more neutral 'scent.' The pronominal
    suffix refers to the tree.
- source_word: ለዝ ዕፅ
  chosen: of this tree
  alternatives:
  - of this wood
  - of this plant
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዕፅ can denote tree/wood/plant, but in this visionary context describing
    a specific marvelous growth, 'tree' is the most natural and concrete rendering.
- source_word: ወትጠየቅ
  chosen: and inquire
  alternatives:
  - and ask
  - and seek information
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A second verb of questioning is retained distinctly rather than collapsed
    into the first, preserving the repetitive style of the source.
- source_word: ከመ ታእምር
  chosen: so that you may know
  alternatives:
  - in order that you may understand
  - that you might learn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This expresses purpose. 'Know' is straightforward and preserves the epistemic
    emphasis of the vision report.
