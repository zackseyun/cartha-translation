  from: And at that time I, Enoch, answered and said, concerning all this, “I desire to know about this tree all the more.”
  to: At that time I, Enoch, answered him, saying, “I desire to know about everything, but especially about this tree.”
  rationale: 'The Ge''ez syntax is `በእንተ፡ ኵሉ፡ እፈቅድ፡ ኣእምር፡ ወፈድፋደሰ፡ በእንተዝ፡ ዕፅ` (concerning everything I desire to know, but especially concerning this tree). The draft mangles this by moving ''concerning all this'' outside the quote and losing the contrast between ''everything'' (ኵሉ) and ''this tree'' (ዝ ዕፅ). Additionally, the verb አውሣእክዎ includes a 3ms object suffix (''I answered him''), and there is no conjunction ''And'' (ወ) before ውእተ፡ ጊዜ (''At that time''). | Adjudicator: The reviewer correctly identifies several grammatical features in the Ge''ez that the current translation misses. The verb `አውሣእክዎ` contains a 3ms object suffix (''I answered him''), and there is no init'
