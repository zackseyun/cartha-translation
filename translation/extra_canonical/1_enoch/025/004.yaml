translation:
  text: And this fragrant tree—no flesh has authority to touch it until the great judgment, when he will take vengeance on all and bring it to completion forever; that will be given to the righteous and the holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'no flesh has authority.' The phrase refers to mortal humans, not to flesh as a substance.
    reason: lexical_alternative
  - marker: b
    text: The clause after 'the great judgment' is difficult. The sense is that vengeance is carried out universally and the matter is brought to its full completion.
    reason: textual_variant
  - marker: c
    text: Or 'the humble'.
    reason: previous_rendering
  - marker: d
    text: Or 'then it'.
    reason: previous_rendering
lexical_decisions:
- source_word: ዕፀ መዓዛ
  chosen: fragrant tree
  alternatives:
  - tree of fragrance
  - sweet-smelling tree
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a tree characterized by aroma or perfume. 'Fragrant tree' is natural English while preserving the concrete image.
- source_word: አልሐዱ
  chosen: touch
  alternatives:
  - approach
  - handle
  - eat from
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of restricted access to the tree, the verb most plausibly indicates physical contact or use. 'Touch' preserves the prohibition without over-specifying consumption.
- source_word: ዘሥጋ
  chosen: flesh
  alternatives:
  - human flesh
  - any mortal
  - any human being
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'of flesh.' I retain 'flesh' in the main clause to preserve the apocalyptic anthropological contrast between mortal beings and the holy object, while the English syntax makes clear it refers to mortals.
- source_word: ሥልጣነ
  chosen: authority
  alternatives:
  - power
  - right
  - permission
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term concerns authorized access rather than mere ability. 'Authority' best captures the juridical force of the prohibition.
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - condemnation
  - sentence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context this is the great assize. 'Judgment' is the broadest and most contextually fitting rendering.
- source_word: ይትቤቀል
  chosen: he will take vengeance
  alternatives:
  - vengeance will be executed
  - he will be avenged
  - he will punish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries the sense of avenging or exacting retribution. 'Take vengeance' preserves the judicial and apocalyptic force better than the flatter 'punish.'
- source_word: ኵሎ
  chosen: on all
  alternatives:
  - everything
  - everyone
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The object is formally broad. In a judgment context it may mean all persons or all things under judgment; 'on all' preserves the breadth without narrowing prematurely.
- source_word: ይፌጽም
  chosen: bring it to completion
  alternatives:
  - complete it
  - finish it
  - bring all things to an end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes completing or bringing to fulfillment. 'Bring it to completion' keeps the sense open, since the direct object is not explicit in English and may refer to the judgment process or the whole matter.
- source_word: ለዓለም
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard idiomatic rendering for enduring perpetuity in elevated but readable English.
- source_word: ጻድቃን
  chosen: the righteous
  alternatives:
  - the just
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a key apocalyptic identity term and should be rendered consistently as 'the righteous.'
- source_word: ትሑታን
  chosen: the humble
  alternatives:
  - the lowly
  - the meek
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes lowliness or humility. 'The humble' is clear modern English and avoids importing later beatitude phrasing too strongly.
- source_word: ይትወሀብ
  chosen: it will be given
  alternatives:
  - it shall be granted
  - it will be bestowed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive future fits the Ge'ez and preserves the sense of divine gift.
