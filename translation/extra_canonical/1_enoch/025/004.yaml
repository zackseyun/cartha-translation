theological_decisions:
- issue: Meaning of 'flesh' in the access prohibition
  chosen_reading: No mortal human has authority to touch the tree before the appointed judgment.
  alternative_readings:
  - No bodily creature has power over it
  - No one may eat from it
  rationale: The Ge'ez literally says 'flesh,' but in context this functions as a designation for mortal humanity. The verse emphasizes restricted access to a holy tree until eschatological judgment.
  doctrine_reference: Preserve apocalyptic imagery and local passage meaning; do not flatten or over-harmonize.
- issue: Subject of the vengeance clause
  chosen_reading: An implicit singular subject ('he') carries the action of taking vengeance and completing the matter.
  alternative_readings:
  - 'An impersonal passive: ''vengeance will be executed'''
  - God explicitly as subject though not named in the clause
  rationale: The Ge'ez verbal form allows an implicit subject. English requires some resolution; 'he' preserves the singular verbal force without over-identifying the subject beyond the context of divine judgment.
