translation:
  text: And he answered me, saying, “This high mountain that you have seen, whose
    summit is like the throne of the Lord, is his throne, where the Holy and Great
    One, the Lord of Glory, the Eternal King, will dwell when he comes down to visit
    the earth with goodness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose top is like the throne of the Lord.' The Ge'ez wording may describe
      either the mountain's summit specifically or the mountain more generally in
      relation to the throne imagery.
    reason: lexical_alternative
  - marker: b
    text: The final phrase can also be understood as 'to inspect the earth for good'
      or 'to visit the earth in goodness.' The sense is a beneficent divine visitation,
      not merely movement from heaven to earth.
    reason: lexical_alternative
  - marker: c
    text: Or 'is the place where the Holy and Great Lord of Glory, the Eternal King,
      will sit'.
    reason: previous_rendering
lexical_decisions:
- source_word: አውሥአ
  chosen: answered
  alternatives:
  - replied
  - responded
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard narrative verb for giving an answer; 'answered' preserves the
    dialogic, visionary exchange.
- source_word: ደብር
  chosen: mountain
  alternatives:
  - hill
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic topography this denotes a mountain rather than a mere
    hill; the setting is elevated and cosmic.
- source_word: ዘርኢከ
  chosen: that you have seen
  alternatives:
  - which you saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative construction with second-person object; rendered in natural
    English while preserving direct address.
- source_word: ነዋኅ
  chosen: high
  alternatives:
  - lofty
  - tall
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Describes the mountain's elevation. 'High mountain' is idiomatic and
    preserves the visionary grandeur.
- source_word: ዘርእሱ
  chosen: its summit
  alternatives:
  - its top
  - its head
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally related to 'head/top'; 'summit' fits mountain imagery better
    in English.
- source_word: ይመስል
  chosen: is like
  alternatives:
  - resembles
  - appears like
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple comparison formula; 'is like' keeps the visionary simile plain
    and strong.
- source_word: መንበረ
  chosen: throne
  alternatives:
  - seat
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Given the divine context and repeated royal language later in the verse,
    'throne' is preferable to the more generic 'seat'.
- source_word: ለእግዚአ
  chosen: of the Lord
  alternatives:
  - for the Lord
  - of the master
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context እግዚአ functions as a divine title. 'Lord' aligns with
    project policy for κύριος-like divine titulature and fits the royal imagery.
- source_word: መንበሩ ውእቱ ኀበ ይነብር
  chosen: is the place where ... will sit
  alternatives:
  - is his throne where ... dwells
  - is where ... will dwell
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause identifies the mountain as the location of divine enthronement.
    Because the verse later has a future descent, rendering the sitting enthronement
    prospectively gives coherent sense in context.
- source_word: ቅዱስ ወዐቢይ
  chosen: the Holy and Great
  alternatives:
  - holy and mighty
  - the holy and the great
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: These are divine epithets. Capitalization marks titular use without over-interpreting.
- source_word: እግዚአ ስብሐት
  chosen: Lord of Glory
  alternatives:
  - Lord of majesty
  - Master of glory
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A weighty divine title in apocalyptic diction; 'glory' preserves the
    biblical-theological resonance better than 'majesty'.
- source_word: ንጉሥ ዘለዓለም
  chosen: the Eternal King
  alternatives:
  - the everlasting King
  - the King forever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This compact rendering preserves both royal title and enduring duration
    in elevated but readable English.
- source_word: ሶበ ይወርድ
  chosen: when he comes down
  alternatives:
  - when he descends
  - whenever he comes down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal clause with descent language; 'comes down' is natural English
    and preserves the vertical apocalyptic movement.
- source_word: የኀውጻ ለምድር
  chosen: to visit the earth
  alternatives:
  - to inspect the earth
  - to judge the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb can carry the sense of going out to inspect or visit. 'Visit'
    is broad enough to preserve ambiguity, especially since the following phrase qualifies
    the visit positively.
- source_word: በሠናይ
  chosen: with goodness
  alternatives:
  - for good
  - in goodness
  - with blessing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase indicates beneficent manner or result. 'With
    goodness' is slightly unusual but transparent and avoids over-specifying as 'blessing'.
