theological_decisions:
- issue: Divine enthronement language on the mountain
  chosen_reading: The mountain is rendered as the place of God's future enthronement
    upon descent/visitation, not merely a static present dwelling place.
  alternative_readings:
  - The mountain is already God's throne where he presently dwells
  - The mountain's summit itself is the throne
  rationale: The Ge'ez includes both throne imagery and a future temporal clause ('when
    he comes down'). The translation preserves the tension by identifying the mountain
    as the enthronement place while allowing the descent clause to govern the scene's
    future manifestation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering እግዚአ as a divine title
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The context is explicitly divine and royal ('Lord of Glory,' 'Eternal
    King'). 'Lord' best preserves reverent titulature without flattening the phrase.
  doctrine_reference: Translate titles; transliterate names.
