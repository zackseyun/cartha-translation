translation:
  text: For I saw all the angels of punishment lodging there and preparing instruments
    of Satan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic OCR for this verse appears incomplete after 'and preparing.'
      The phrase 'instruments of Satan' is supplied from the immediate context of
      the chapter and should be treated as a cautious reconstruction.
    reason: textual_variant
  - marker: b
    text: Or 'dwelling there' instead of 'lodging there.' The underlying Ge'ez verb
      suggests remaining or staying in a place.
    reason: lexical_alternative
lexical_decisions:
- source_word: እስመ
  chosen: For
  alternatives:
  - because
  - for indeed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the explanation for the preceding statement; 'For' preserves
    the connective force in elevated but natural English.
- source_word: ርኢክዎሙ
  chosen: I saw them
  alternatives:
  - I beheld them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: First-person visionary report from the root 'to see'; rendered simply
    as 'I saw them,' with the object specified by the following phrase.
- source_word: ኵሎሙ
  chosen: all
  alternatives:
  - every one of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the comprehensive scope of the vision.
- source_word: መላእክተ መቅሠፍት
  chosen: the angels of punishment
  alternatives:
  - the angels of chastisement
  - the punishing angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This genitival phrase denotes angels associated with punitive judgment.
    'Punishment' is the clearest English equivalent in this apocalyptic context and
    preserves the judicial force.
- source_word: እንዘ የኃድሩ
  chosen: lodging there
  alternatives:
  - dwelling there
  - encamping there
  - resting there
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verbal form indicates remaining/staying in a place. 'Lodging there'
    preserves the concrete sense of being stationed in that location without overinterpreting
    permanence.
- source_word: ወያስተዴ
  chosen: and preparing
  alternatives:
  - and making ready
  - and arranging
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form appears to indicate preparation or arrangement. 'Preparing'
    is broad enough to respect the uncertain OCR while fitting the immediate context
    of punitive agents making something ready.
