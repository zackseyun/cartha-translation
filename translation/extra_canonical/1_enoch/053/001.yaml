theological_decisions:
- issue: Nature of what the nations/inhabitants bring to the valley
  chosen_reading: material gifts/offerings are brought to the valley itself
  alternative_readings:
  - the inhabitants merely come toward it
  - the items are metaphorical acts of homage
  rationale: The Ge'ez lists three concrete nouns after the geographic triad and before
    the motion verb. In this judgment-vision context, rendering them as tangible tribute-like
    items best preserves the stark imagery without allegorizing it.
  doctrine_reference: Preserve apocalyptic imagery rather than smoothing into generic
    religious prose.
