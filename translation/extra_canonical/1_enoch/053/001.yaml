translation:
  text: There my eyes saw a deep valley with open mouths; and all who dwell on the
    dry land and the sea and the islands will bring gifts and offerings and presents
    to it, yet that deep valley will not be filled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez text is difficult in the phrase describing the valley's 'mouths.'
      The translation understands the image as a deep valley with gaping openings.
    reason: textual_variant
  - marker: b
    text: The three nouns rendered 'gifts and offerings and presents' are near-synonymous
      in this context and may denote tribute brought from all regions of the world.
    reason: lexical_alternative
lexical_decisions:
- source_word: በህየ
  chosen: There
  alternatives:
  - In that place
  - Thereupon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Locative adverb introducing the visionary scene; 'There' is natural and
    preserves the deictic force.
- source_word: ርእያ አዕይንትየ
  chosen: my eyes saw
  alternatives:
  - I saw
  - I looked
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The expression is explicitly ocular and somewhat emphatic; retaining
    'my eyes saw' preserves the visionary register better than flattening to 'I saw'.
- source_word: ቈላ
  chosen: valley
  alternatives:
  - ravine
  - gorge
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic topography this term commonly denotes a valley-like chasm.
    'Valley' is the broadest faithful rendering; 'ravine/gorge' are possible but more
    interpretive.
- source_word: ርኁወ
  chosen: open
  alternatives:
  - opened
  - wide
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used predicatively of the mouths of the valley. 'Open' keeps the image
    vivid without over-specifying degree.
- source_word: ወዕሙቀ አፈዊሁ
  chosen: with open mouths
  alternatives:
  - whose mouths were open
  - and its mouths were deep/open
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR is difficult, but the phrase clearly includes 'mouths' of the
    valley, a common image for openings. The English construes the valley as having
    gaping openings. 'Deep' is represented in the verse later with the repeated description
    of the valley itself.
- source_word: የኃድሩ
  chosen: who dwell
  alternatives:
  - who live
  - who inhabit
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard habitation verb; 'dwell' suits the elevated register.
- source_word: ዲበ የብስ ወባሕር ወደሰያት
  chosen: on the dry land and the sea and the islands
  alternatives:
  - upon the earth and the sea and the coastlands
  - on land and sea and islands
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The triad is geographic and comprehensive. 'Dry land' reflects the contrast
    with sea more precisely than simply 'earth.' 'Islands' is the most straightforward
    rendering of the final term.
- source_word: አምኃ ወአስካዓ ወጋዳ
  chosen: gifts and offerings and presents
  alternatives:
  - tribute and gifts and offerings
  - gifts and oblations and tokens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A threefold accumulation of things brought. Exact distinctions among
    the three nouns are difficult in this OCR state, so the translation preserves
    the piling-up effect with near-synonymous but distinct English terms rather than
    collapsing them.
- source_word: ይመጽኡ ሎቱ
  chosen: will bring ... to it
  alternatives:
  - will come to it with ...
  - will bring them to it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is 'come,' but in context with the listed objects the sense
    is effectively 'bring to.' This is a modest optimal-equivalence adjustment for
    intelligibility.
- source_word: ወዝኩስ ዕሙቅ ቈላ ኢይመልእ
  chosen: yet that deep valley will not be filled
  alternatives:
  - but that deep valley was not filled
  - and that deep valley cannot be filled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The final clause states the valley's insatiability. 'Will not be filled'
    preserves the simple verbal force and the ominous apocalyptic image.
