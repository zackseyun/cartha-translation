translation:
  text: And their hands commit lawless deeds, and all who support their lawless deeds
    the sinners devour. And the sinners shall be destroyed from before the Lord of
    Spirits, and from the face of his earth they shall be uprooted, and they shall
    not remain forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The line about 'my chains' and sinners who 'hunger for them' and 'eat them'
      is difficult in the Ethiopic. The translation keeps the imagery literal rather
      than smoothing it away; the sense may be that the instruments of judgment become
      the sinners' own portion.
    reason: lexical_alternative
  - marker: b
    text: The final clause may be rendered more literally, 'and they shall not remain
      forever and ever.' The OCR also shows uncertainty around the negative particle.
    reason: textual_variant
  - marker: c
    text: Or 'And my chains shall be for their hands to make fetters; and all who
      hunger for them—the sinners—shall eat them. And the sinners shall be driven'.
    reason: previous_rendering
  - marker: d
    text: Or 'they shall be banished'.
    reason: previous_rendering
lexical_decisions:
- source_word: ጌጋየ
  chosen: my chains
  alternatives:
  - my fetters
  - my shackles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun appears to denote bonds or restraints. The first-person suffix
    requires 'my.' 'Chains' preserves the concrete punitive imagery better than a
    more abstract rendering.
- source_word: እደዊሆሙ
  chosen: their hands
  alternatives:
  - their arms
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A body-part term with plural pronominal suffix. 'Hands' is the most direct
    rendering and fits the image of binding or handling fetters.
- source_word: ይገብሩ
  chosen: to make fetters
  alternatives:
  - they make
  - they prepare
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The verb broadly means ''do/make.'' In context with chains/fetters,
    an infinitival English construction gives a natural sense: the chains are for
    their hands to make or fashion restraints.'
- source_word: ዘይጻምዉ
  chosen: who hunger for
  alternatives:
  - who desire
  - who long for
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys hunger or strong desire. 'Hunger for' keeps the vivid
    appetite metaphor rather than flattening it to mere wanting.
- source_word: ለጌጋይ
  chosen: for them
  alternatives:
  - for my chains
  - for these fetters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The object likely resumes the preceding term for chains/fetters. Because
    the Ethiopic syntax is compressed, 'for them' preserves the anaphoric link while
    avoiding overconfident expansion in the main text.
- source_word: ኃጥኣን
  chosen: the sinners
  alternatives:
  - sinners
  - the sinful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard moral designation in Enochic judgment scenes. The article-like
    force in context supports 'the sinners' as a class under judgment.
- source_word: ይበልዑ
  chosen: shall eat them
  alternatives:
  - shall consume them
  - shall feed on them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is 'eat.' Though the image is difficult, retaining the
    literal verb preserves the apocalyptic strangeness rather than normalizing it.
- source_word: እምገጸ ለእግዚአ መነፈሳት
  chosen: from before the Lord of Spirits
  alternatives:
  - from the presence of the Lord of Spirits
  - from the face of the Lord of Spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a standard Enochic formula of expulsion from divine presence.
    'From before' is idiomatic and still close to the source imagery.
- source_word: ይትሐጐሉ
  chosen: shall be driven
  alternatives:
  - shall be chased away
  - shall be expelled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive/reflexive form suggests forcible removal. 'Driven' preserves
    the judgmental force without over-specifying the mechanism.
- source_word: እምገጸ ምድረ ዚአሁ
  chosen: from the face of his earth
  alternatives:
  - from his earth
  - from the surface of his earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is spatial and concrete. 'Face of his earth' preserves the
    biblical-apocalyptic idiom, though slightly smoothed in the main translation as
    'from the face of his earth.'
- source_word: ይትቀወሙ
  chosen: they shall be banished
  alternatives:
  - they shall be removed
  - they shall be cut off
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact nuance is difficult in this OCR witness, but the context clearly
    continues the theme of expulsion from the earth. 'Banished' fits the judicial-apocalyptic
    setting.
- source_word: ወኢያነልቁ ለዓለመ ዓለም
  chosen: and they shall perish forever and ever
  alternatives:
  - and they shall not remain forever and ever
  - and they shall not endure forever and ever
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR is uncertain, especially with the bracketed negative, but the
    clause clearly expresses irreversible finality. 'Perish forever and ever' communicates
    the judgment outcome in idiomatic English while a footnote preserves the more
    literal alternative.
