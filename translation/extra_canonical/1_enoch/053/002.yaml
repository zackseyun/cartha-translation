theological_decisions:
- issue: Nature of the final judgment clause
  chosen_reading: The sinners are finally removed and destroyed/excluded forever.
  alternative_readings:
  - The sinners simply do not remain on the earth forever and ever.
  - The clause emphasizes permanent exclusion rather than annihilative destruction.
  rationale: The Ge'ez witness is textually awkward at the end, but the verse as a
    whole is an expulsion-and-judgment formula. The main text uses 'perish' to express
    irreversible doom while not overdefining the metaphysics of that doom.
  doctrine_reference: Preserve theological tension rather than resolve it.
