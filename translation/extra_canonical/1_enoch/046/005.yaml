theological_decisions:
- issue: Source of royal authority and the referent of 'him'
  chosen_reading: The verse refers to the Most High / Lord as the one whom the kings
    fail to exalt, praise, and acknowledge as the giver of their kingdom.
  alternative_readings:
  - A more implicit divine referent carried over from the surrounding vision without
    naming him directly
  - A possible reference to the Elect One if one reads the immediate context more
    tightly
  rationale: Within the judgment logic of the Parables, earthly kings are condemned
    for failing to recognize the divine source of their authority. The final clause
    about the kingdom being 'given to them' strongly supports a divine giver. The
    English keeps 'him' rather than specifying a title not present in the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import later doctrinal phrasing beyond the local passage.
