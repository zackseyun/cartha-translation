translation:
  text: And he will cast down the kings from their thrones and from their kingdoms,
    because they do not exalt him, and do not praise him, and do not acknowledge from
    where the kingdom was given to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from whom the kingdom was given to them.' The Ge'ez phrase can point
      either to the source in a more general sense ('from where') or more personally
      ('from whom').
    reason: lexical_alternative
  - marker: b
    text: '''The kingdom'' may also be understood as ''kingship'' or ''royal authority,''
      not only territorial realm.'
    reason: lexical_alternative
  - marker: c
    text: Or 'do not acknowledge'.
    reason: previous_rendering
lexical_decisions:
- source_word: ይገፈትኦሙ
  chosen: he will cast down them / cast them down
  alternatives:
  - he will depose them
  - he will overthrow them
  - he will remove them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys forceful removal or overthrow. 'Cast down' preserves
    the apocalyptic and royal imagery better than the more administrative 'depose,'
    while still fitting the context of rulers losing power.
- source_word: ነገሥት
  chosen: kings
  alternatives:
  - rulers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The ordinary sense is 'kings.' Since the verse also mentions thrones
    and kingdoms, the more specific royal term should be retained rather than generalized.
- source_word: መናብርቲሆሙ
  chosen: their thrones
  alternatives:
  - their seats
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In a judgment scene involving kings, 'thrones' is the natural and symbolically
    charged rendering; it preserves the imagery of royal authority.
- source_word: መንገሥቲሆሙ
  chosen: their kingdoms
  alternatives:
  - their reigns
  - their dominions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes kingship/kingdom. 'Kingdoms' fits the plural possessive
    construction and parallels 'thrones' as the sphere of royal rule.
- source_word: ኢያሌዕልዎ
  chosen: they do not exalt him
  alternatives:
  - they did not exalt him
  - they do not lift him up
  - they do not honor him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is stronger than generic 'honor' and suggests raising high or
    exalting. Present English in this prophetic context communicates habitual refusal
    and fits the sequence with the following verbs.
- source_word: ኢይሴብሕዎ
  chosen: they do not praise him
  alternatives:
  - they do not glorify him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic sense is praise/glorify. 'Praise' is clearer modern English,
    while the preceding 'exalt' already carries elevated diction.
- source_word: ኢይገንዩ
  chosen: they do not acknowledge
  alternatives:
  - they do not confess
  - they do not know
  - they do not recognize
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context the issue is failure to recognize or admit the source of their
    authority. 'Acknowledge' captures both recognition and implied confession without
    overinterpreting.
- source_word: እምአይቴ
  chosen: from where
  alternatives:
  - whence
  - from whom
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase most naturally asks about the source from which their rule
    came. 'From where' is transparent English; however, because the antecedent is
    personal in context, 'from whom' remains a plausible alternative.
- source_word: ተውህበት ሎሙ መንግሥት
  chosen: the kingdom was given to them
  alternatives:
  - kingship was given to them
  - royal authority was given to them
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive construction should be preserved. 'The kingdom was given
    to them' is a close rendering, though the sense may be broader than territory
    and include royal authority.
