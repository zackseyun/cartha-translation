- issue: How explicitly to interpret the judgment action against rulers
  chosen_reading: Retain concrete images ('raise up ... from their couches,' 'loosen the reins') rather than paraphrasing as 'depose' or 'humble'
  alternative_readings:
  - '''depose kings and the mighty'''
  - '''humble the powerful'''
  rationale: The verse uses vivid apocalyptic imagery. A more abstract rendering would flatten the rhetoric and hide lexical uncertainty in the middle clause.
  doctrine_reference: 'Book context: preserve apocalyptic imagery and repeated judgment formulas.'
