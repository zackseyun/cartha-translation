  - whom you saw
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative form links the figure to Enoch's prior vision. 'Whom you have seen' is natural English and preserves the direct visionary reference.
- source_word: ያነሥኦሙ
  chosen: will raise up
  alternatives:
  - will lift up
  - will remove
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb literally suggests causing to rise. In this judgment context it likely means making rulers rise from their places of ease or security, not exalting them. 'Raise up' keeps the image without over-interpreting.
- source_word: እምስካበቲሆሙ
  chosen: from their couches
  alternatives:
  - from their beds
  - from their resting places
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes a bed or couch. 'Couches' better fits elite rulers in a courtly-apocalyptic scene and preserves the image of ease and complacency.
- source_word: ጽኑዓን
  chosen: the strong
  alternatives:
  - the firm
  - the powerful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Used here for entrenched powerful persons. 'The strong' preserves the concrete force and allows the repeated term later in the verse to echo.
- source_word: መናብርቲሆሙ
  chosen: their thrones
  alternatives:
  - their seats
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In a royal-judicial context, 'thrones' is the natural rendering and preserves the political imagery.
- source_word: ይፈትሕ
  chosen: will loosen
  alternatives:
  - will untie
  - will release
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to loosen or untie. It introduces a vivid image of dismantling power rather than a generalized statement of judgment.
- source_word: ኃማተ
  chosen: the reins
  alternatives:
  - the bridles
  - the straps
  - the loins
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact sense is difficult in this Ge'ez-only context. 'Reins' best fits the idiom of loosening what controls or directs strength, yielding a coherent image of disempowerment. Because the term is uncertain, an alternative is footnoted.
- source_word: ይደቅቅ
  chosen: crush
  alternatives:
  - break
  - shatter
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A forceful judgment verb. 'Crush' preserves the violence of the apocalyptic image.
- source_word: አስናነ ኃጥኣን
  chosen: the teeth of sinners
  alternatives:
  - the teeth of the sinful
  - the fangs of sinners
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The image is concrete and should remain so. 'Teeth' evokes predatory power and arrogant speech being broken under judgment.
