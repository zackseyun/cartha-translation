  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A titular expression in the Parables with clear apocalyptic force. Capitalized here because in context it refers to the specific visionary figure just identified, while preserving the literal Semitic form rather than paraphrasing it.
- source_word: ዘርኢከ
  chosen: whom you have seen
  alternatives:
