theological_decisions:
- issue: Whether to render ወልደ ሰብእ as a title or generic human description
  chosen_reading: Rendered as the title-like 'the Son of Man.'
  alternative_readings:
  - this is a son of man
  - this is the human one
  rationale: In the Parables this figure is being identified within a visionary scene and bears distinctive functions in judgment and revelation. The immediate context supports a recognized figure rather than an indefinite human being, but the rendering avoids importing later New Testament formulations beyond the Ge'ez text itself.
  doctrine_reference: Preserve local passage meaning and do not over-harmonize with later Christian usage.
- issue: How to handle the repeated righteousness language around the Son of Man
  chosen_reading: 'Retained both clauses: ''to whom righteousness belongs'' and ''righteousness dwells with him.'''
  alternative_readings:
  - compress into 'the righteous one'
  - render one clause dynamically and omit the other as redundant
  rationale: The verse deliberately intensifies the association between this figure and righteousness. Preserving both clauses maintains the theological weight and poetic repetition of the source.
  doctrine_reference: Preserve theological tension and repeated formulas rather than smoothing them away.
- issue: Meaning of the final clause about his lot/portion
  chosen_reading: Rendered 'his lot has prevailed before the Lord of Spirits forever in uprightness.'
  alternative_readings:
  - his portion is preserved before the Lord of Spirits forever
  - the lot of those belonging to him has prevailed before the Lord of Spirits forever
  rationale: The Ge'ez is difficult and the Parables lack external textual control here. The chosen rendering stays close to the apparent grammar while acknowledging uncertainty in a footnote rather than resolving it too confidently.
  doctrine_reference: When the sense is uncertain, prefer transparent English plus a footnote over false confidence.
