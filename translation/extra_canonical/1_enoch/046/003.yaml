translation:
  text: And he answered me and said to me, “This is the Son of Man, to whom righteousness belongs, and righteousness dwells with him; and he will reveal all the treasuries of what is hidden, because the Lord of Spirits has chosen him, and whose lot has prevailed before the Lord of Spirits forever in uprightness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the storehouses/treasures of the hidden things.' The image is of concealed realities kept in heavenly reserve, not merely abstract 'secrets.'
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult in the Ge'ez. 'His lot has prevailed' may also be understood as 'his portion has triumphed' or, less likely, as referring to the lot of those associated with him.
    reason: alternative_reading
  - marker: c
    text: Or 'and his lot has prevailed'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወልደ ሰብእ
  chosen: the Son of Man
  alternatives:
  - the son of man
  - the human one
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is the established Ge'ez expression corresponding to 'son of man.' In this visionary context it functions as a title-like designation for the figure being identified, so capitalization is warranted, while avoiding later doctrinal expansion beyond the local passage.
- source_word: ዘሎቱ ኮነ ጽድቅ
  chosen: to whom righteousness belongs
  alternatives:
  - who has righteousness
  - who is characterized by righteousness
  - who possesses righteousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction indicates possession or association rather than a simple predicate adjective. 'Belongs' preserves the relational force without over-paraphrasing.
- source_word: ወጽድቅ ምስሌሁ ኃደረ
  chosen: and righteousness dwells with him
  alternatives:
  - abides with him
  - has lodged with him
  - remains with him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys dwelling or abiding. 'Dwells with him' preserves the personified, almost hypostatized quality of righteousness in this apocalyptic description.
- source_word: መዛግብተ ዘኅቡእ
  chosen: the treasuries of what is hidden
  alternatives:
  - the storehouses of the hidden things
  - the treasures of the secret things
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መዛግብት commonly denotes treasuries/storehouses, and the hidden things are conceived as stored-up mysteries. 'Treasuries' keeps the apocalyptic imagery better than a flattened 'secrets.'
- source_word: ይከሥት
  chosen: he will reveal
  alternatives:
  - he will uncover
  - he will make manifest
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A future sense fits the angelic identification of the figure's role. 'Reveal' is clear and preserves the disclosure of hidden heavenly realities.
- source_word: እግዚአ መንፈሳት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a recurring divine title in 1 Enoch. 'Lord of Spirits' is the conventional and most natural rendering, preserving the book's distinctive diction.
- source_word: ኀረዮ ኃርየ
  chosen: has chosen him
  alternatives:
  - has elected him
  - has selected him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated cognate form intensifies the act of choosing. English normally does not reproduce the duplication smoothly, so 'has chosen him' gives the sense while the decision is documented here.
- source_word: ዘክፍሉ ሞአ
  chosen: his lot has prevailed
  alternatives:
  - his portion has triumphed
  - his share has been victorious
  - his lot has conquered
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text appears to speak of his allotted portion or appointed standing prevailing. 'Lot' preserves the apportionment imagery common in ancient religious diction, while 'has prevailed' fits the verb better than a static gloss.
- source_word: በርቱዕ ለዓለም
  chosen: forever in uprightness
  alternatives:
  - forever in righteousness
  - for ever and ever in uprightness
  - eternally in rectitude
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The final phrase is somewhat difficult. 'Uprightness' avoids overusing 'righteousness' three times in one verse while still reflecting the moral quality denoted by the adjective/adverbial phrase. The eternal force of ለዓለም is preserved by 'forever'.
