translation:
  text: And I asked one of the angels who was going with me, and who was showing me
    all the hidden things, concerning that Son of Man—who he was, and from where he
    came, and why he was going with the Head of Days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the secrets.' The Ge'ez term refers to concealed heavenly matters
      disclosed in the vision.
    reason: lexical_alternative
  - marker: b
    text: '''Head of Days'' reflects the Ethiopic wording directly. A more traditional
      rendering would be ''Ancient of Days,'' influenced by Danielic phrasing.'
    reason: cross_reference
  - marker: c
    text: Or 'the one of the angels'.
    reason: previous_rendering
lexical_decisions:
- source_word: ተስእልክዎ
  chosen: I asked him
  alternatives:
  - I inquired of him
  - I questioned him
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb introduces Enoch's direct inquiry to the accompanying angel.
    'Asked' is natural modern English and preserves the straightforward narrative
    force.
- source_word: እመላእክት
  chosen: the one of the angels
  alternatives:
  - one of the angels
  - one of the holy angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The phrase is partitive: Enoch addresses one angel from among the angelic
    beings. Because the Ge''ez text as given reads simply ''of the angels,'' the main
    rendering keeps that sense without adding ''holy.'' English smooths this as ''the
    one of the angels'' in context, i.e. the angel accompanying him.'
- source_word: ዘየሐውር ምስሌየ
  chosen: who was going with me
  alternatives:
  - who went with me
  - who accompanied me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The participial construction describes the angel as the one traveling
    alongside Enoch in the vision. 'Was going with me' preserves the ongoing visionary
    movement better than the more interpretive 'accompanied me.'
- source_word: ኵሎ ኅቡኣተ
  chosen: all the hidden things
  alternatives:
  - all the secrets
  - all hidden matters
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In apocalyptic context this refers to concealed heavenly realities being
    disclosed. 'Hidden things' is transparent and avoids overloading the line with
    later technical language, while 'secrets' remains a viable alternative.
- source_word: ዘያርእየኒ
  chosen: who was showing me
  alternatives:
  - who showed me
  - who revealed to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb is visual/disclosive. 'Showing me' preserves the visionary register
    and links naturally with 'hidden things.'
- source_word: ወልደ ሰብእ
  chosen: Son of Man
  alternatives:
  - son of man
  - human son
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This expression functions here as a marked apocalyptic designation within
    the Parables. The capitalized rendering preserves its titular force in this passage
    without importing later doctrinal conclusions beyond the local context.
- source_word: እምአይቴ ይከውን
  chosen: from where he was
  alternatives:
  - where he was from
  - whence he came
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The question concerns origin or provenance. 'From where he was' is slightly
    formal but keeps the source-oriented sense; smoother English in the final line
    becomes 'from where he was.'
- source_word: ርእሰ መዋዕል
  chosen: the Head of Days
  alternatives:
  - the Head of the Days
  - the Antecedent of Days
  - the Ancient of Days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez expression is not identical to the traditional English of Daniel.
    'Head of Days' is a transparent rendering of the Ethiopic phrase and avoids silently
    harmonizing it to the familiar biblical title 'Ancient of Days.'
- source_word: ምስለ ... የሐውር
  chosen: was going with
  alternatives:
  - went with
  - accompanied
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated motion verb should remain visible. 'Was going with' preserves
    the narrative and the striking image of the Son of Man in association with the
    Head of Days.
