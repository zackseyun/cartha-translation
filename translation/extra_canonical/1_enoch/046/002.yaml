theological_decisions:
- issue: Whether to render ወልደ ሰብእ as a title or a generic human expression
  chosen_reading: Rendered as 'that Son of Man'
  alternative_readings:
  - that son of man
  - that human one
  rationale: In this context Enoch asks about a distinct visionary figure already
    singled out in the scene. The demonstrative plus expression supports a recognized
    figure rather than a generic human being. Capitalization marks literary prominence,
    not a later creedal import.
  doctrine_reference: Preserve local passage meaning and do not over-harmonize with
    later Christian usage.
- issue: Whether to harmonize ርእሰ መዋዕል with Daniel's traditional 'Ancient of Days'
  chosen_reading: Rendered as 'the Head of Days'
  alternative_readings:
  - the Ancient of Days
  - the Head of the Days
  rationale: The project philosophy prioritizes source wording over inherited translation
    tradition. Since the Ethiopic here reads literally 'Head of Days,' the main text
    preserves that wording and leaves the more familiar Danielic phrase to a footnote.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
