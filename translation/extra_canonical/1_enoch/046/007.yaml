translation:
  text: And these are those who judge the stars of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb may also be understood as 'rule' or 'govern.' Because this section
      is preserved effectively only in Ge'ez, the exact nuance should be held with
      some caution.
    reason: lexical_alternative
  - marker: b
    text: In apocalyptic literature, 'stars' can function as cosmic bodies or as symbols
      for heavenly beings; the text does not force the translator to decide here.
    reason: cultural_note
lexical_decisions:
- source_word: እሙንቱ
  chosen: these
  alternatives:
  - they
  - those
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Demonstrative/plural pronoun. Rendered 'these' to preserve the deictic
    force of the vision report; the following relative clause then specifies who they
    are.
- source_word: ኮኑ
  chosen: are
  alternatives:
  - became
  - were
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'From the verb ''to be/become.'' In this identificational clause, English
    present ''are'' best fits the visionary description: ''these are those who...''
    rather than a past event.'
- source_word: እለ
  chosen: those who
  alternatives:
  - who
  - the ones who
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Relative marker introducing the identifying clause. 'Those who' keeps
    the appositional structure clear in English.
- source_word: ይኴንኑ
  chosen: judge
  alternatives:
  - rule
  - govern
  - condemn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly carries the sense 'judge.' Because the direct object
    is 'the stars of heaven,' the line likely uses apocalyptic/judicial imagery rather
    than ordinary human jurisprudence. 'Judge' preserves the lexical core while leaving
    the exact nuance open.
- source_word: ከዋክብተ ሰማይ
  chosen: the stars of heaven
  alternatives:
  - the heavenly stars
  - the stars of the sky
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A straightforward construct phrase. 'Stars of heaven' preserves the elevated
    apocalyptic register and avoids flattening the cosmic imagery.
