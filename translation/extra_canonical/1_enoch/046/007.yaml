theological_decisions:
- issue: Whether the clause should be softened to cosmic governance rather than judgment
  chosen_reading: judge the stars of heaven
  alternative_readings:
  - rule the stars of heaven
  - govern the stars of heaven
  rationale: The Ge'ez verb is best represented by 'judge.' In apocalyptic literature,
    stars can symbolize heavenly beings or cosmic powers, so retaining judicial language
    preserves the text's theological tension rather than resolving it into mere administration.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
