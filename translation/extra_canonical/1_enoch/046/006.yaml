theological_decisions:
- issue: Whether ይትነሥኡ implies resurrection or merely rising from a bed
  chosen_reading: Rendered as 'rising from their beds' without making resurrection explicit.
  alternative_readings:
  - '''being raised from their beds'' with resurrection overtones'
  - '''getting up from their couches'' as purely literal'
  rationale: The immediate imagery is of beds in darkness with worms, suggesting death/judgment imagery, but the Ge'ez verb itself can simply mean 'rise.' To preserve theological tension rather than resolve it, the main text keeps the broader wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Identity of ጽኑዓን
  chosen_reading: Rendered generically as 'the strong ones.'
  alternative_readings:
  - '''the mighty'''
  - '''the powerful rulers'''
  rationale: The verse condemns a class of powerful people, but the Ge'ez term itself does not explicitly specify kings or rulers in this line. A broader rendering avoids importing a narrower sociopolitical identification not demanded by the wording.
  doctrine_reference: Original-language primacy over translation tradition.
