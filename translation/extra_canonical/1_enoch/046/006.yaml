  from: And the face of the strong ones shall be struck down, and shame shall fill them
  to: And he will cast down the face of the strong ones, and he will fill them with shame
  rationale: 'The verb ይገፈትእ (yegaffetʾ) is active (3ms), continuing the actions of the Son of Man from the previous verses; it is not passive. Furthermore, ኃፍረተ (ḫāfrata, ''shame'') is in the accusative case, meaning it is the second object of the verb ይመልኦሙ (''he will fill them''), not the subject. The translation must retain the active subject (''he'') for both verbs. | Adjudicator: The reviewer is grammatically correct. The verb ይገፈትእ (yegaffetʾ) is a 3rd person masculine singular active imperfect (''he will cast down''), taking the accusative construct ገጸ (gaṣṣa, ''face of'') as it'
