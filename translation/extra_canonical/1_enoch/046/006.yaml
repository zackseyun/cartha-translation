translation:
  text: And he will cast down the face of the strong ones, and he will fill them with shame; and darkness shall become their dwelling, and worms their bed. And they shall have no hope of rising from their beds, because they do not exalt the name of the Lord of Spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The word rendered 'worms' comes from an OCR form that is somewhat uncertain in this Ge'ez witness; the sense fits the judgment image of corruption in the grave-like bed.
    reason: textual_variant
  - marker: b
    text: '''Rising from their beds'' may simply mean getting up, but in this context it may also carry an implied denial of restoration after judgment.'
    reason: lexical_alternative
  - marker: c
    text: Or 'And the face of the strong ones shall be struck down, and shame shall fill them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ገጸ
  chosen: the face of
  alternatives:
  - the countenance of
  - the presence of
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes 'face/countenance.' In this judgment scene, retaining the concrete image preserves the apocalyptic humiliation motif better than abstracting to 'presence.'
- source_word: ጽኑዓን
  chosen: the strong ones
  alternatives:
  - the mighty
  - the powerful ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective/noun refers to those who are strong or mighty. 'Strong ones' is transparent and avoids importing a more interpretive political sense unless context requires it.
- source_word: ይገፈትእ
  chosen: shall be struck down
  alternatives:
  - shall be smitten
  - shall be cast down
  - shall be beaten down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys forceful striking or overthrow. 'Struck down' preserves both the physicality and the judicial downfall without sounding archaic.
- source_word: ይመልኦሙ ኃፍረተ
  chosen: shame shall fill them
  alternatives:
  - disgrace shall fill them
  - they shall be filled with shame
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction is straightforwardly passive/resultative in sense. 'Shame shall fill them' keeps the vivid image of overwhelming disgrace.
- source_word: ጽልመት
  chosen: darkness
  alternatives:
  - gloom
  - obscurity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard apocalyptic judgment term. 'Darkness' is the most direct and preserves the cosmic imagery.
- source_word: መንደሪሆሙ
  chosen: their dwelling
  alternatives:
  - their habitation
  - their abode
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun refers to a place of dwelling. 'Dwelling' is readable modern English while retaining the concrete sense.
- source_word: ዕፀያት
  chosen: worms
  alternatives:
  - maggots
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context of a bed/grave-like resting place, 'worms' best fits the image of corruption and judgment. The OCR form is unusual enough to warrant noting the lexical uncertainty in a footnote.
- source_word: ምስካቦሙ
  chosen: their bed
  alternatives:
  - their couch
  - their resting place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun means bed or couch. 'Bed' keeps the starkness of the image; in context it likely evokes a deathbed or grave-rest, but the text itself says 'bed.'
- source_word: ኢይሴፈዉ
  chosen: they shall have no hope
  alternatives:
  - they shall not hope
  - they shall have no expectation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The sense is lack of hope or expectation. English idiom favors 'have no hope' here, especially before the infinitive-like clause of rising.
- source_word: ይትነሥኡ
  chosen: rising
  alternatives:
  - getting up
  - being raised
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb means to rise or arise. 'Rising' preserves the ambiguity between simply getting up and a more ominous denied restoration; a resurrection-specific rendering would overstate the verse.
- source_word: ኢያሌዕሉ ስሞ
  chosen: they do not exalt the name
  alternatives:
  - they do not praise the name
  - they do not honor the name
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates making great, exalting, magnifying. 'Exalt' preserves the elevated register and avoids flattening the phrase into generic reverence.
- source_word: እግዚአ መናፍስት
  chosen: the Lord of Spirits
  alternatives:
  - the Lord of the spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a recurring divine title in 1 Enoch. 'Lord of Spirits' is the established literal rendering and preserves the book's distinctive theological diction.
