theological_decisions:
- issue: Whether to render ርእሰ መዋዕል with the traditional title 'Ancient of Days'
  chosen_reading: head of days
  alternative_readings:
  - Ancient of Days
  - Head of Days
  rationale: Because the Parables are effectively Ge'ez-only here and the project prioritizes original-language primacy over translation tradition, the rendering stays close to the Ethiopic idiom rather than importing the familiar Danielic title. A footnote preserves the traditional alternative.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Whether the second figure should be identified in the translation as 'the Son of Man'
  chosen_reading: another, whose face had the appearance of a man
  alternative_readings:
  - the Son of Man
  - a human-like figure
  rationale: This verse itself introduces the figure descriptively, not yet by title. To preserve theological tension and avoid harmonization with later usage, the main text keeps the local description.
  doctrine_reference: Translation philosophy §§1, 3; Book context points 3-4
