  from: whose face had the appearance of a man
  to: whose face was like the appearance of a man
  rationale: 'The Ge''ez uses the comparative preposition ከመ (kama, ''like/as'') here (ዘገጹ ከመ ርእየተ ሰብእ), just as it does for ''like white wool'' and ''like one of the holy angels.'' Translating it as ''had the appearance'' drops the explicit comparison and breaks the parallel structure of the three ''like'' (kama) phrases in the verse. | Adjudicator: The reviewer is correct that the Ge''ez text explicitly uses the comparative preposition ከመ (kama, ''like'' or ''as'') in the phrase ዘገጹ ከመ ርእየተ ሰብእ (za-gaṣṣu kama rə''yata sab''). The current rendering ''had'
