translation:
  text: And there I saw one who had a head of days, and his head was like white wool; and with him was another, whose face was like the appearance of a man, and his face was full of grace, like one of the holy angels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ancient of Days.' The Ge'ez reads more literally 'head of days,' and the translation preserves that idiom in the main text.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'full of grace' is a direct rendering of the Ge'ez and should not be read as borrowing later New Testament wording.
    reason: cross_reference
  - marker: c
    text: Or 'whose face had the appearance of a man'.
    reason: previous_rendering
lexical_decisions:
- source_word: በህየ
  chosen: there
  alternatives:
  - in that place
  - therein
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard locative deictic in visionary narrative; 'there' preserves the scene-setting simplicity.
- source_word: ርኢኩ
  chosen: I saw
  alternatives:
  - I looked and saw
  - I beheld
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Direct visionary report; 'I saw' is clear modern English without losing apocalyptic force.
- source_word: ዘሎቱ ርእሰ መዋዕል
  chosen: one who had a head of days
  alternatives:
  - one who had the head of days
  - the Head of Days
  - the Ancient of Days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ge'ez construction is best represented transparently rather than harmonized to Daniel's traditional 'Ancient of Days.' Lowercase avoids importing a fixed later title where the Ethiopic wording is being translated directly. 'Head of days' preserves the striking idiom.
- source_word: ወርእሱ ከመ ፀምር ጻዕዳ
  chosen: and his head was like white wool
  alternatives:
  - and his hair was like white wool
  - and his head was white like wool
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The text says 'his head,' not explicitly 'his hair.' Retaining 'head' preserves the source wording and the allusive imagery.
- source_word: ወምስሌሁ ካልእ
  chosen: and with him was another
  alternatives:
  - and another was with him
  - and beside him was another
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Natural English rendering of accompaniment while preserving the introduction of a second figure.
- source_word: ዘገጹ ከመ ርእየተ ሰብእ
  chosen: whose face had the appearance of a man
  alternatives:
  - whose countenance was like the appearance of a man
  - whose face was like a human appearance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Keeps the emphasis on visible appearance in the vision. 'Man' is retained rather than generalized to avoid over-interpretation.
- source_word: ወምሉእ ጸጋ ገጹ
  chosen: and his face was full of grace
  alternatives:
  - and his face was full of favor
  - and his face was full of graciousness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ጸጋ commonly carries grace/favor. 'Full of grace' is the most direct rendering, though potentially familiar from later tradition; here it is justified by the Ge'ez itself.
- source_word: ከመ ፩እመላእክት ቅዱሳን
  chosen: like one of the holy angels
  alternatives:
  - like one of the angels of holiness
  - like one of the holy messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral-plus-partitive sense is best captured by 'one of the holy angels.' This preserves the comparison without flattening the angelic imagery.
