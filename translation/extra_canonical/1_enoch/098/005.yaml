theological_decisions:
- issue: Nature of the judgment on the woman
  chosen_reading: 'The verse contrasts infertility with a harsher judgment: she is
    not merely barren, but dies because of her deeds and so ends without children.'
  alternative_readings:
  - The line could be read more generally as a statement that childlessness itself
    is not her allotted fate, but death is.
  - Some may take 'work of her hands' as specifically illicit or violent acts rather
    than deeds in general.
  rationale: The Ge'ez sets up a contrast with 'not given' followed by 'rather' and
    a causal clause. The wording presents moral retribution tied to her own actions,
    not an arbitrary fate. The translation keeps that tension without specifying more
    than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
