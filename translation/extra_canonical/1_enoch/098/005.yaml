lexical_decisions:
- source_word: ምክነት
  chosen: barrenness
  alternatives:
  - sterility
  - childlessness
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun denotes infertility or childlessness. 'Barrenness' preserves
    the concrete reproductive sense and fits the contrast with 'without children'
    at the end of the verse.
- source_word: ለብእሲት
  chosen: to the woman
  alternatives:
  - for the woman
  - to a woman
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The dative/prepositional construction is naturally rendered 'to the woman'
    or 'for the woman.' 'To the woman' keeps the sense of something allotted or given.
- source_word: ኢተውህበት
  chosen: was not given
  alternatives:
  - was not granted
  - was not appointed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive of giving. 'Was not given' is the most transparent and least
    interpretively loaded rendering.
- source_word: አላ
  chosen: rather
  alternatives:
  - but
  - instead
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Marks a strong contrast between barrenness and the actual judgment described.
    'Rather' preserves the adversative force.
- source_word: በእንተ
  chosen: because of
  alternatives:
  - on account of
  - for
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This preposition commonly introduces cause or reason. 'Because of' makes
    the causal relation explicit.
- source_word: ግብረ እዴሃ
  chosen: the work of her hands
  alternatives:
  - the deeds of her hands
  - what her hands have done
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A common idiom for one's deeds or actions. 'The work of her hands' preserves
    the concrete idiom and moral accountability without over-paraphrasing.
- source_word: ትመውት
  chosen: she will die
  alternatives:
  - she shall die
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple future verb. 'She will die' is clear modern English while retaining
    the judicial force.
- source_word: ዘእንበለ ውሉድ
  chosen: without children
  alternatives:
  - childless
  - having no offspring
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase literally means 'without children/offspring.' 'Without children'
    is slightly more formal and preserves the phrase structure after 'she will die.'
