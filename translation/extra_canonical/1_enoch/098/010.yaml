theological_decisions:
- issue: Meaning of 'ransom' in a judgment oracle
  chosen_reading: Rendered as 'ransom' rather than a more interpretive 'deliverance' or 'atonement.'
  alternative_readings:
  - deliverance
  - redemption price
  rationale: The verse warns the wicked that no release from the decreed judgment is available. 'Ransom' preserves the concrete metaphor and theological tension without resolving it into later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
