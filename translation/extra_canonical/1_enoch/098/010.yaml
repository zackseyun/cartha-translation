translation:
  text: And now know that you are prepared for the day of destruction, and do not hope that you will live, O sinners; rather, you will depart and die, for you do not know any ransom, because you have been made ready for it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the day of slaughter.' The Ge'ez term can denote destructive ruin in a judgment setting and may carry the sharper sense of slaughter.
    reason: lexical_alternative
  - marker: b
    text: The clause 'that sinners will live' may also be understood more directly as 'that you sinners will live,' since the warning is addressed to the wicked.
    reason: lexical_alternative
  - marker: c
    text: '''Ransom'' here likely means a price or means of release from the coming judgment; the sense is that no escape remains.'
    reason: cultural_note
  - marker: d
    text: Or 'that sinners will live'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወይእዜኒ
  chosen: And now
  alternatives:
  - And at this time
  - But now
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Temporal discourse marker introducing a solemn warning; 'And now' preserves the prophetic/apocalyptic transition naturally.
- source_word: አእምሩ
  chosen: know
  alternatives:
  - understand
  - recognize
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Imperative plural calling the hearers to acknowledge a grim reality; 'know' is direct and forceful.
- source_word: ድልዋን
  chosen: prepared
  alternatives:
  - made ready
  - appointed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Conveys being readied or set for an event. 'Prepared' fits the judgment context without over-specifying whether the preparation is divine appointment or inevitable readiness.
- source_word: ለዕለተ ሐጕል
  chosen: for the day of destruction
  alternatives:
  - for the day of slaughter
  - for the day of ruin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase denotes a catastrophic day of judgment. 'Destruction' is broad enough to preserve apocalyptic force; 'slaughter' is possible but more specific than the immediate context requires.
- source_word: ወኢትስፈዉ
  chosen: and do not hope
  alternatives:
  - and do not expect
  - and do not trust
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Negative imperative from a verb of hoping or expecting. 'Do not hope' preserves the rhetorical sting of false confidence being denied.
- source_word: ከመ ትሕየዉ ኃጥኣን
  chosen: that sinners will live
  alternatives:
  - that you sinners will live
  - for sinners to survive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The syntax is somewhat compressed. The most straightforward sense is denial of survival to sinners. Because the address is to the wicked, 'you sinners will live' is possible, but the Ge'ez wording can be rendered more literally as a class statement.
- source_word: አላ ትሐውሩ ወትመውቱ
  chosen: rather, you will depart and die
  alternatives:
  - rather, you will go away and die
  - but you will pass on and die
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Retains the sequence of movement plus death. 'Depart' preserves the solemn tone better than the plainer 'go away.'
- source_word: ቤዛ
  chosen: ransom
  alternatives:
  - redemption price
  - deliverance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun commonly denotes a ransom or price of release. 'Ransom' best preserves the legal-soteriological force without importing later doctrinal formulas.
- source_word: ኢታእምሩ ቤዛ
  chosen: you do not know any ransom
  alternatives:
  - you know of no ransom
  - you have no knowledge of deliverance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom is difficult. It likely means they know of no means of release or escape. 'Know any ransom' stays close to the wording while leaving the conceptual force visible.
- source_word: ተደለውክሙ
  chosen: you have been made ready for it
  alternatives:
  - you have been appointed
  - you have been prepared
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely resumes the earlier idea of being readied for the day of destruction. 'Made ready for it' clarifies the implied object while preserving the passive sense.
