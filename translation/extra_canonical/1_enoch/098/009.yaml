translation:
  text: Woe to you, fools, for you trust in your wealth, and from your riches you
    drive away the wise, and good will not come upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb rendered 'you trust' may also be understood as 'you boast' or 'you
      rely' in relation to wealth.
    reason: lexical_alternative
  - marker: b
    text: Or 'good will not find you' / 'well-being will not reach you.' The Ge'ez
      expression is broad and may imply withheld blessing or prosperity.
    reason: lexical_alternative
lexical_decisions:
- source_word: አሌ
  chosen: Woe
  alternatives:
  - Alas
  - Ah
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces a prophetic denunciation formula. 'Woe' best preserves the
    apocalyptic/judgment force better than the softer 'alas'.
- source_word: አብዳን
  chosen: fools
  alternatives:
  - senseless ones
  - stupid ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A moral-spiritual term of reproach fits the wisdom context of the Epistle.
    'Fools' preserves the ethical weight without becoming merely insulting slang.
- source_word: ትትሐጐሉ
  chosen: you trust
  alternatives:
  - you boast
  - you rely
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context with 'in your wealth,' the sense is reliance or misplaced
    confidence. 'Trust' captures the warning against false security; 'boast' is possible
    but less directly governed by the prepositional phrase.
- source_word: በአቢድክሙ
  chosen: in your wealth
  alternatives:
  - in your possessions
  - in your riches
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to material abundance or property. 'Wealth' is broad and idiomatic
    in English, while still preserving the concrete social critique.
- source_word: ለጠበብን
  chosen: the wise
  alternatives:
  - wisdom
  - the discerning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The form most naturally points to wise persons rather than abstract wisdom.
    The verse contrasts the wealthy wicked with those marked by wisdom.
- source_word: ትረሰዕዎሙ
  chosen: you drive away
  alternatives:
  - you reject
  - you cast out
  - you oppress
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb suggests active exclusion or dismissal. 'Drive away' preserves
    the social violence more vividly than the more abstract 'reject'.
- source_word: ሠናይት
  chosen: good
  alternatives:
  - prosperity
  - well-being
  - blessing
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun/adjective is broad. 'Good' keeps the wording transparent and
    allows the context of withheld blessing or well-being to remain open.
- source_word: ኢይረክበክሙ
  chosen: will not come upon you
  alternatives:
  - will not find you
  - will not reach you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb commonly means 'find, reach, encounter.' With 'good' as subject,
    'will not come upon you' is natural English and preserves the sense that blessing
    will fail to overtake them.
