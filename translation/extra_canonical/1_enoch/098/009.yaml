theological_decisions:
- issue: Nature of the denunciation against the wealthy
  chosen_reading: The verse condemns misplaced confidence in wealth and the exclusion
    of the wise, with the result that good/blessing does not come to them.
  alternative_readings:
  - The verse condemns boasting in wealth rather than trusting in it.
  - The final clause may refer specifically to prosperity rather than general good.
  rationale: The Ge'ez wording supports a wisdom-apocalyptic critique of the rich
    wicked. The translation preserves the moral and judicial force without narrowing
    it to a later doctrinal formula.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
