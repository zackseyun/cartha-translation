theological_decisions:
- issue: Whether the final judgment clause refers to annihilation or punitive consignment
    after death
  chosen_reading: their spirits will be cast into the furnace of fire
  alternative_readings:
  - their souls will be thrown into the fire
  - they themselves will be destroyed in fire
  rationale: The explicit object is 'their spirits,' so the translation preserves
    postmortem/apocalyptic judgment imagery rather than collapsing it into simple
    physical death or annihilation.
  doctrine_reference: Preserve theological tension rather than resolve it.
