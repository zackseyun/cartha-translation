translation:
  text: Therefore they will have no instruction or wisdom; and because of this they
    will perish together with their possessions, with all their glory and their honor.
    And in shame, and in slaughter, and in great destitution, their spirits will be
    cast into the furnace of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'teaching' for 'instruction.' The pair 'instruction and wisdom' likely
      functions as a wisdom-category rather than two sharply separate ideas.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'in great destitution' is difficult; it may also be
      understood more broadly as 'in great misery' or 'in great affliction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ትምህርት
  chosen: instruction
  alternatives:
  - teaching
  - discipline
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term denotes teaching or instruction received. 'Instruction' fits
    the wisdom-judgment context and pairs naturally with 'wisdom' without implying
    a formal school setting.
- source_word: ጥበብ
  chosen: wisdom
  alternatives:
  - understanding
  - skill
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this moral-apocalyptic context the sense is practical and ethical
    wisdom, not technical skill.
- source_word: ይትሐጐሉ
  chosen: they will perish
  alternatives:
  - they will be destroyed
  - they will vanish
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A judgment context favors 'perish' as a strong but not overly specific
    rendering, preserving the woe-oracle tone.
- source_word: ኅቡረ ምስለ
  chosen: together with
  alternatives:
  - along with
  - in company with
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This construction emphasizes shared fate with their wealth and honors;
    'together with' is clear and suitably formal.
- source_word: ንዋያቲሆሙ
  chosen: their possessions
  alternatives:
  - their goods
  - their riches
  - their property
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The word refers broadly to material goods. 'Possessions' is comprehensive
    and avoids narrowing the sense to money alone.
- source_word: ስብሐቶሙ
  chosen: their glory
  alternatives:
  - their splendor
  - their boast
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can denote glory or splendor. 'Glory' preserves the elevated
    register and the irony of worldly status collapsing under judgment.
- source_word: ክብሮሙ
  chosen: their honor
  alternatives:
  - their dignity
  - their esteem
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Distinct from 'glory,' this points to social honor or status; 'honor'
    keeps the parallelism visible.
- source_word: በጽእለት
  chosen: in shame
  alternatives:
  - in humiliation
  - in disgrace
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase marks the manner or condition attending judgment.
    'Shame' is concise and preserves the moral-public dimension.
- source_word: በቅትል
  chosen: in slaughter
  alternatives:
  - in killing
  - in bloodshed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A stark noun is preferable here to keep the piling up of judgment terms.
    'Slaughter' conveys violent destruction without overinterpreting agency.
- source_word: በንዴት ዐቢይ
  chosen: in great destitution
  alternatives:
  - in great poverty
  - in great misery
  - in great affliction
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The exact nuance is difficult, but the phrase points to severe deprivation
    or wretchedness. 'Great destitution' preserves the material-social force in context
    with possessions and honor being lost.
- source_word: ትትወደይ መንፈሶሙ
  chosen: their spirits will be cast
  alternatives:
  - their spirits will be driven
  - their spirits will be hurled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive-like verbal sense indicates forcible consignment. 'Will be
    cast' suits apocalyptic judgment imagery and reads naturally in English.
- source_word: እቶነ እሳት
  chosen: the furnace of fire
  alternatives:
  - the fiery furnace
  - the furnace, the fire
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A relatively formal rendering preserves the vivid image without importing
    later idiom. 'Furnace of fire' reflects the genitival intensity of the Ge'ez.
