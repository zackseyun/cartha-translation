translation:
  text: From now on, know that all your violence, which you commit, is being written
    down every day until the day of your judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your oppression'; the Ge'ez term can denote violent injustice, not only
      physical violence.
    reason: lexical_alternative
  - marker: b
    text: The wording evokes the apocalyptic theme that deeds are recorded in preparation
      for the day of judgment.
    reason: cross_reference
lexical_decisions:
- source_word: እምይእዜ
  chosen: From now on
  alternatives:
  - Henceforth
  - From this time
  lexicon: Dillmann
  rationale: Temporal marker introducing an urgent admonition. 'From now on' is idiomatic
    modern English while preserving the forward-looking force.
- source_word: ታእምሩ
  chosen: know
  alternatives:
  - understand
  - be aware
  lexicon: Dillmann
  rationale: Imperative/plural sense fits the direct address. 'Know' preserves the
    sharp warning tone better than the softer 'be aware'.
- source_word: ግፍዕክሙ
  chosen: your violence
  alternatives:
  - your oppression
  - your wrongdoing
  lexicon: Dillmann
  rationale: The noun denotes violent injustice or oppressive wrongdoing. 'Violence'
    keeps the severity and apocalyptic accusation, while 'wrongdoing' would be too
    broad.
- source_word: ዘትገፍዑ
  chosen: which you commit
  alternatives:
  - which you do violently
  - which you oppress with
  lexicon: Dillmann
  rationale: Relative verbal form resumes the same root as the noun and describes
    their ongoing acts. 'Which you commit' is natural English and avoids awkward repetition,
    while still referring specifically to acts of violence/oppression.
- source_word: ይጸሐፍ
  chosen: is being written down
  alternatives:
  - is written
  - is recorded
  lexicon: Dillmann
  rationale: Passive/imperfect sense suggests ongoing heavenly recordkeeping. 'Is
    being written down' preserves the durative force and the apocalyptic motif of
    deeds entered into a record.
- source_word: በኵሉ ዕለት
  chosen: every day
  alternatives:
  - on every day
  - day by day
  lexicon: Dillmann
  rationale: Straightforward temporal phrase. 'Every day' is clear and idiomatic.
- source_word: እስከ ዕለተ ኵነኔክሙ
  chosen: until the day of your judgment
  alternatives:
  - until your judgment day
  - until the day of your condemnation
  lexicon: Dillmann
  rationale: The phrase points to the appointed eschatological day when sentence is
    rendered. 'Judgment' is broader and more textually grounded than 'condemnation,'
    which would over-specify the outcome in the gloss itself.
