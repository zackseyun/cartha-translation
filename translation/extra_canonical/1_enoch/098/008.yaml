theological_decisions:
- issue: Heavenly record of deeds
  chosen_reading: The verse refers to ongoing recording of the wicked's violent acts
    in preparation for final judgment.
  alternative_readings:
  - A merely metaphorical statement that their deeds are remembered
  - A human legal record rather than a heavenly one
  rationale: The passive 'is being written down every day until the day of your judgment'
    fits the broader apocalyptic motif of books/records kept for eschatological judgment.
    The translation preserves that imagery without over-expanding it in the main text.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment formulas
    into generic prose.
