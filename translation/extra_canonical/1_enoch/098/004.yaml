translation:
  text: 'I swear to you, sinners: as a mountain has not become a slave, and a hill does not become a maidservant of a woman, so sin was not sent upon the earth; rather, men created it from themselves, and those who do it will come under a great curse.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening comparison is textually difficult in Ge'ez. The sense appears to be that just as a mountain or hill does not become a slave or maidservant, so sin is not an imposed feature of creation.
    reason: textual_variant
  - marker: b
    text: Literally, 'from their own heads,' likely meaning from their own minds or initiative.
    reason: lexical_alternative
  - marker: c
    text: Or 'rather, men created it from their own heads'.
    reason: previous_rendering
lexical_decisions:
- source_word: መሐልኩ
  chosen: I swear
  alternatives:
  - I have sworn
  - I adjure
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb introduces a solemn asseveration directed to the sinners. 'I swear' preserves the oath-like force better than a weaker 'I say' and is more natural in English than 'I adjure' here.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - wrongdoers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard moral-religious designation in this context; 'sinners' preserves the judicial and ethical force of the woe discourse.
- source_word: ደብር
  chosen: mountain
  alternatives:
  - highland
  - mount
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The concrete topographical image should remain vivid and unflattened.
- source_word: ገብረ
  chosen: has become a slave
  alternatives:
  - has served
  - has become a servant
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this difficult clause, the sense appears to be that a mountain does not become subject as a slave. 'Slave' keeps the stronger bonded sense rather than softening to 'servant'.
- source_word: እማገር ለብእሲት
  chosen: a maidservant of a woman
  alternatives:
  - a female slave for a woman
  - a serving girl of a woman
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is awkward in English but seems to present a parallel image of servile subjection. 'Maidservant' preserves the feminine parallel and the social imagery without over-paraphrase.
- source_word: ኃጢአትኒ ኢተፈነወት ዲበ ምድር
  chosen: sin was not sent upon the earth
  alternatives:
  - sin was not dispatched onto the earth
  - sin was not let loose on the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive wording suggests sin is not an externally commissioned force. 'Sent upon the earth' preserves that theological point and the apocalyptic register.
- source_word: አላ ሰብእ እምርእሶሙ ፈጠርዋ
  chosen: rather, men created it from their own heads
  alternatives:
  - rather, humans created it from themselves
  - rather, men devised it from their own minds
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The idiom 'from their own heads' is somewhat literal and likely means originating from their own thought or initiative. Retaining 'heads' keeps the Semitic/Ethiopic concreteness while remaining intelligible.
- source_word: ለመርገም ዐቢይ ይከውኑ
  chosen: will come under a great curse
  alternatives:
  - will be for a great curse
  - will become subject to a great curse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase expresses the destiny of those who practice sin. 'Will come under a great curse' is idiomatic English that preserves the judgment formula.
