  from: rather, men created it from their own heads
  to: rather, men created it from themselves
  rationale: 'In Ge''ez, the word ርእስ (re''es, ''head'') with a pronominal suffix functions as the standard reflexive pronoun (''self''). The phrase እምርእሶሙ (''em-re''esomu) is the normal idiom for ''from themselves'' or ''of their own accord.'' Translating it literally as ''from their own heads'' obscures the idiom and introduces a false cognitive metaphor. | Adjudicator: The reviewer is entirely correct about Ge''ez grammar. The noun ርእስ (rəʾəs, ''head''), when taking a pronominal suffix, functions as the standard reflexive pronoun in Ge''ez (e.g., ርእሶሙ, ''themselves''). Tr'
