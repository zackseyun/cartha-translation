theological_decisions:
- issue: Divine oath formula and title
  chosen_reading: by the Great Holy One
  alternative_readings:
  - by the great holy one
  - by the Holy Great One
  rationale: The phrase functions as a solemn divine title in an oath. Capitalization
    marks it as a title for God without over-systematizing the wording into later
    doctrinal formulae.
  doctrine_reference: Preserve apocalyptic imagery and local wording; do not harmonize
    with later usage.
- issue: Heavenly disclosure versus heavenly bookkeeping
  chosen_reading: evil deeds are revealed in the heavens ... deeds of violence are
    written down and recorded
  alternative_readings:
  - both clauses describe exposure only
  - both clauses describe inscription only
  rationale: The verse appears to move from exposure before heaven to preservation
    in a heavenly record. Keeping both images preserves the text's judicial tension
    rather than collapsing them into one metaphor.
  doctrine_reference: Preserve theological tension rather than resolve it.
