    reason: textual_variant
lexical_decisions:
- source_word: መሐልኩ
  chosen: I have sworn
  alternatives:
  - I swore
  - I have taken an oath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: First-person perfect-like verbal form from the root for swearing/oath-taking.
    'I have sworn' preserves the solemn, performative force in this woe context.
- source_word: ኃጥኣን
  chosen: sinners
  alternatives:
  - sinful ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard designation for the wicked in judgment discourse; 'sinners'
    is the most direct and idiomatic rendering.
- source_word: በቅዱስ ዐቢይ
  chosen: by the Great Holy One
  alternatives:
  - by the great Holy One
  - by the Holy Great One
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Instrumental oath formula with divine epithet. 'Great Holy One' preserves
    both adjectives and the elevated apocalyptic register without importing later
    fixed liturgical phrasing.
- source_word: ኵሉ ግብርክሙ እኩይ
  chosen: all your evil deeds
  alternatives:
  - all your wicked works
  - every evil act of yours
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ግብር commonly denotes deed/work/action; with እኩይ it refers morally to
    wicked actions. 'Deeds' is natural English and retains moral concreteness.
- source_word: ክሡት ውእቱ በሰማያት
  chosen: are revealed in the heavens
  alternatives:
  - are exposed in heaven
  - are uncovered in the heavens
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The predicate indicates disclosure/uncovering. Plural 'the heavens' follows
    the Ge'ez form and suits apocalyptic cosmology better than flattening to singular
    'heaven'.
- source_word: ግብረ ግፍዕ
  chosen: deeds of violence
  alternatives:
  - works of oppression
  - acts of wrong
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ግፍዕ carries the sense of violence, oppression, or wrongdoing. 'Deeds
    of violence' best fits the denunciatory context and preserves the concrete social
    evil.
- source_word: ክዱነ ወእኁቡአ
  chosen: are written down and recorded
  alternatives:
  - are inscribed and sealed up
  - are noted and gathered together
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The paired verbs suggest documentary preservation or registration. Because
    the OCR is uncertain, a cautious rendering that conveys heavenly record-keeping
    is preferable to an over-specific image.
