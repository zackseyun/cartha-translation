translation:
  text: I have sworn to you, sinners, by the Great Holy One, that all your evil deeds
    are revealed in the heavens, and none of your deeds of violence are covered or
    hidden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The final clause is textually difficult in the OCR witness. The Ge'ez likely
      conveys that the sinners' violent deeds are preserved in a heavenly record;
      more specific renderings such as 'inscribed' or 'sealed up' remain possible.
    reason: textual_variant
  - marker: b
