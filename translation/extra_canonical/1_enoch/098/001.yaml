theological_decisions:
- issue: Scope of the addressees 'the wise and the foolish'
  chosen_reading: A universalized moral address including both discerning and undiscerning hearers
  alternative_readings:
  - A narrower address to two classes within Israel
  - An ironic address aimed primarily at the wicked
  rationale: The verse itself sets up a broad contrast without further qualification. Rendering the terms straightforwardly preserves the tension and leaves later context to specify the warning's target.
  doctrine_reference: Preserve theological tension rather than resolve it.
