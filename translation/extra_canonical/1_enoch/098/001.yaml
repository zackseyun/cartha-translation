translation:
  text: 'And now I swear to you, to the wise and to the foolish: for you will see much upon the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many things.' The Ge'ez expression emphasizes abundance in what the hearers are about to witness.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''And now I declare to you, to the wise and to the foolish: for you will see much upon the earth.''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ወይእዜኒ
  chosen: And now
  alternatives:
  - And at this time
  - And now then
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The conjunction plus temporal adverb introduces a fresh admonitory statement. 'And now' preserves the discourse shift without sounding overly stiff.
- source_word: እኔ
  chosen: I
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Explicit pronoun retained for emphasis in the speaker's self-reference.
- source_word: እምሕል
  chosen: declare
  alternatives:
  - say
  - speak
  - tell
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb introduces solemn direct address. 'Declare' better fits the elevated admonitory tone of the Epistle than the flatter 'say' or 'tell'.
- source_word: ለክሙ
  chosen: to you
  alternatives:
  - unto you
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard indirect-object rendering in readable modern English.
- source_word: ለጠቢባን
  chosen: to the wise
  alternatives:
  - to wise ones
  - to the sages
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The adjective/substantive denotes those characterized by wisdom. 'The wise' is idiomatic and preserves the moral-wisdom contrast.
- source_word: ወለአብዳን
  chosen: and to the foolish
  alternatives:
  - and to fools
  - and to the senseless
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Chosen to mirror 'the wise' with a balanced contrast. 'Foolish' is slightly less harsh than 'fools' while still conveying moral and intellectual lack.
- source_word: እስመ
  chosen: for
  alternatives:
  - because
  - since
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the reason for the address. 'For' suits the elevated register and keeps the causal link concise.
- source_word: ብዙኅ
  chosen: much
  alternatives:
  - many things
  - a great deal
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term indicates abundance. 'Much' works naturally with the following verb 'see' in English.
- source_word: ትሬእዩ
  chosen: you will see
  alternatives:
  - you shall see
  - you are about to see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Future sense is appropriate in this warning context. 'You will see' is clear and avoids unnecessary archaism.
- source_word: ዲበ ምድር
  chosen: upon the earth
  alternatives:
  - on the earth
  - in the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is spatial and broad in scope. 'Upon the earth' preserves the elevated apocalyptic register better than 'on the earth,' while 'in the land' would narrow the reference too much.
