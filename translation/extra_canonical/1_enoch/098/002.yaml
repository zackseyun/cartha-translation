theological_decisions:
- issue: Whether the verse condemns sexual immorality specifically or indulgent luxury
    more broadly
  chosen_reading: 'The main line is rendered to preserve both: excess associated with
    women/virgins and a broader catalogue of royal, material, and culinary luxury.'
  alternative_readings:
  - A narrower reading focused on illicit sexual relations
  - A broader reading focused on wealth and social excess with women as part of the
    luxury catalogue
  rationale: The repeated 'excess' and the subsequent list of kingship, wealth, purple,
    splendor, and food suggest a wider denunciation of self-indulgence, not only sexual
    sin.
  doctrine_reference: Preserve theological tension rather than resolve it.
