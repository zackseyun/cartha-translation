translation:
  text: For you have prepared for yourselves deeds of excess from women, and fellowship
    of excess from virgins; and in kingship and in greatness and in authority and
    in silver and gold and purple, and in splendor and in food they will pour out
    like water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrases 'deeds of excess from women' and 'fellowship of excess from
      virgins' are difficult. The preposition literally reads 'from,' but the sense
      may be 'with women' and 'with virgins,' referring to indulgent or illicit association.
    reason: lexical_alternative
  - marker: b
    text: '''Purple'' likely refers to costly dyed cloth, a standard image of elite
      luxury and status.'
    reason: cultural_note
  - marker: c
    text: The final image may mean either that these luxuries are lavished wastefully
      or that they themselves will dissipate like water.
    reason: alternative_reading
lexical_decisions:
- source_word: እስመ
  chosen: For
  alternatives:
  - because
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Introduces the ground or explanation for the preceding woe; 'For' preserves
    the connective force in elevated but readable English.
- source_word: ሥነ
  chosen: prepared
  alternatives:
  - made
  - done
  - fashioned
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Taken with the following second-person plural verb phrase as an idiom
    of making or preparing for oneself. 'Prepared' fits the reflexive sense with ላዕሌክሙ
    ('for yourselves').
- source_word: ትወድዩ
  chosen: you have prepared
  alternatives:
  - you make
  - you do
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as a completed or characteristic action in context. The exact
    underlying verb is somewhat uncertain in OCR, but the clause clearly addresses
    the wicked in the second person plural.
- source_word: ላዕሌክሙ
  chosen: for yourselves
  alternatives:
  - upon yourselves
  - against yourselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Reflexive/dative sense best suits the warning: they have brought these
    things upon themselves or procured them for themselves. ''For yourselves'' reads
    naturally while preserving culpability.'
- source_word: ዕደው
  chosen: deeds
  alternatives:
  - works
  - acts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A concrete plural noun for actions or practices. 'Deeds' keeps the moral
    weight without sounding overly technical.
- source_word: ፈድፋደ
  chosen: excess
  alternatives:
  - abundance
  - luxury
  - superfluity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The repeated term points to overabundance or indulgent excess rather
    than mere quantity. 'Excess' preserves the moral critique in this woe context.
- source_word: እምአንስት
  chosen: from women
  alternatives:
  - by women
  - with women
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition literally means 'from,' though the exact relation is
    difficult. Retaining 'from women' is more transparent than over-interpreting the
    phrase.
- source_word: ኅብረ
  chosen: fellowship
  alternatives:
  - association
  - company
  - union
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Denotes joining or association. 'Fellowship' is literal enough, though
    the context suggests intimate or social association tied to indulgence.
- source_word: እምድንግል
  chosen: from virgins
  alternatives:
  - with virgins
  - by virgins
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: As with 'from women,' the prepositional nuance is uncertain. A formally
    transparent rendering is preferable, with interpretive alternatives noted in a
    footnote.
- source_word: በመንንግሥት
  chosen: in kingship
  alternatives:
  - through royal power
  - in royal rule
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Refers to royal status or rule. 'In kingship' preserves the series of
    spheres in which the wicked luxuriate.
- source_word: ወበዕበይ
  chosen: and in greatness
  alternatives:
  - and in grandeur
  - and in high rank
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A term of magnitude, eminence, or grandeur. 'Greatness' keeps the broad
    semantic range.
- source_word: ወበሥልጣን
  chosen: and in authority
  alternatives:
  - and in power
  - and in dominion
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard term for ruling power or authority. 'Authority' avoids overloading
    the line with repeated 'power' language.
- source_word: ወበብሩር
  chosen: and in silver
  alternatives:
  - and with silver
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Part of the accumulation of wealth imagery; 'in silver' follows the repeated
    preposition pattern.
- source_word: ወወርቅ
  chosen: and gold
  alternatives:
  - and in gold
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Coordinate with silver in the list of luxury goods.
- source_word: ወሜላት
  chosen: and purple
  alternatives:
  - and costly garments
  - and dyed cloth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Likely denotes purple cloth or luxury textile associated with wealth
    and status. 'Purple' preserves the cultural marker of elite luxury.
- source_word: ወክብር
  chosen: and in splendor
  alternatives:
  - and in glory
  - and in honor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this material list, 'splendor' better conveys visible magnificence
    than the more theological 'glory.'
- source_word: ወመብልዕት
  chosen: and in food
  alternatives:
  - and in feasting
  - and in provisions
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun relates to food or eating. 'Food' is literal; the context implies
    indulgent consumption.
- source_word: ከመ ማይ ይትከዐዉ
  chosen: they will pour out like water
  alternatives:
  - they will be poured out like water
  - they will flow away like water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The simile evokes wasteful abundance or dissipation. Because the subject
    is difficult, 'they will pour out like water' preserves the vivid image without
    forcing a narrower interpretation.
