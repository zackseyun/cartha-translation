translation:
  text: And do not imagine in your spirit, and do not say in your heart, that you
    do not know and do not see that every sin is written in heaven every day before
    the Most High.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is recorded in heaven.' The image is of a heavenly written register
      of sins before God.
    reason: lexical_alternative
  - marker: b
    text: 'The phrase rendered ''every day'' may also carry the sense of continual
      presence: the record stands before the Most High day by day.'
    reason: lexical_alternative
  - marker: c
    text: Or '‘We do not know, and we do not see, that every sin is written down in
      heaven every day before the Most High.’'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኢታምስሉ
  chosen: do not imagine
  alternatives:
  - do not suppose
  - do not think
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prohibition concerns inward mental presumption rather than outward
    resemblance; 'imagine' preserves the warning against self-deceptive inner reasoning.
- source_word: በመንፈስክሙ
  chosen: in your spirit
  alternatives:
  - in your mind
  - within yourselves
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'in your spirit.' Retained rather than flattened to 'mind'
    because the verse pairs inner faculties ('spirit' / 'heart') and apocalyptic diction
    often preserves such anthropological language.
- source_word: ኢትበሉ
  chosen: do not say
  alternatives:
  - do not speak
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward prohibition of speech; 'say' fits the following quoted
    inner claim.
- source_word: በልብክሙ
  chosen: in your heart
  alternatives:
  - to yourselves
  - within your heart
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Kept the biblical anthropological idiom 'heart' rather than reducing
    it to modern psychological language.
- source_word: እስመ
  chosen: that
  alternatives:
  - for
  - because
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Here it introduces the content of what they must not say: ''that / saying,
    We do not know...'' A causal sense is possible, but the quoted-content sense reads
    more naturally with the paired verbs that follow.'
- source_word: ኢታእምሩ
  chosen: we do not know
  alternatives:
  - you do not know
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered as first person within the quoted speech, matching the sense
    of an internal excuse voiced by the sinners.
- source_word: ወኢትሬእዩ
  chosen: and we do not see
  alternatives:
  - and we do not perceive
  - and you do not see
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Paired with 'we do not know' as part of the same quoted denial. 'See'
    preserves the concrete imagery of moral blindness.
- source_word: ኵሉ ኃጢአት
  chosen: every sin
  alternatives:
  - all sin
  - every transgression
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Singular collective with distributive force; 'every sin' best conveys
    that each act is individually recorded.
- source_word: በሰማይ ይጸሐፍ
  chosen: is written down in heaven
  alternatives:
  - is written in heaven
  - is recorded in heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/jussive-like written-record imagery is central to apocalyptic
    judgment. 'Written down' keeps the documentary force without over-paraphrasing.
- source_word: ሀሎ በኵሉ ዕለት
  chosen: every day
  alternatives:
  - continually every day
  - day by day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates ongoing, continual presence/occurrence. 'Every day'
    is concise and natural, while the footnote can preserve the nuance of continual
    presence if needed.
- source_word: በቅድሜሁ ለልዑል
  chosen: before the Most High
  alternatives:
  - in the presence of the Most High
  - before him, the Most High
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A standard exalted divine title in Enochic literature. 'Before the Most
    High' preserves both the courtroom/register imagery and the title's theological
    weight.
