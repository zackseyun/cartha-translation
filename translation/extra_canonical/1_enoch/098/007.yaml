theological_decisions:
- issue: Heavenly record of sins
  chosen_reading: The verse affirms an ongoing heavenly record in the presence of
    the Most High.
  alternative_readings:
  - A more general claim that sins are known to God without explicit record-book imagery
  rationale: The Ge'ez verb for writing and the locative 'in heaven' strongly support
    concrete apocalyptic record imagery, which should not be reduced to a generic
    statement of divine omniscience.
  doctrine_reference: Preserve apocalyptic imagery; do not flatten judgment formulas
    into generic prose.
