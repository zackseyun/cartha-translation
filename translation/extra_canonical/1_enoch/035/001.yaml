translation:
  text: And from there I went toward the west, to the ends of the earth, and there
    I saw three open portals of heaven, like what I had seen in the east, corresponding
    to their portals and corresponding to their outlets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gates of heaven' or 'windows of heaven'; the Ge'ez term denotes heavenly
      openings and may refer to the apertures through which celestial bodies emerge.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'corresponding to their openings and corresponding to
      their outlets' likely indicates that the southern portals matched the eastern
      ones in arrangement or measure.
    reason: lexical_alternative
  - marker: c
    text: Or 'toward the south'.
    reason: previous_rendering
  - marker: d
    text: Or 'corresponding to their openings'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወእምህየ
  chosen: And from there
  alternatives:
  - And thence
  - And from that place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Narrative transition formula; 'from there' is clear modern English while
    preserving the sequential visionary movement.
- source_word: ሖርኩ
  chosen: I went
  alternatives:
  - I traveled
  - I journeyed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Simple past of motion fits the repetitive travel-report style of the
    vision without adding nuance not required by the Ge'ez.
- source_word: መንገለ ዐረብ
  chosen: toward the south
  alternatives:
  - by way of the south
  - to the south
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Ethiopic usage ዐረብ here denotes the southern region/direction, not
    Arabia as a proper place-name in this context. 'Toward the south' preserves directional
    force.
- source_word: በአጽናፈ ምድር
  chosen: to the ends of the earth
  alternatives:
  - at the extremities of the earth
  - to the borders of the earth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Apocalyptic geography is best preserved with the elevated phrase 'ends
    of the earth,' which reflects cosmic extremity rather than ordinary travel.
- source_word: ሠለስተ ኆዋኅወ ሰማይ
  chosen: three ... portals of heaven
  alternatives:
  - three gates of heaven
  - three windows of heaven
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term refers to openings in the heavenly structure through which celestial
    bodies emerge. 'Portals' preserves the architectural-cosmic imagery better than
    the more domestic 'windows' and is less over-specific than 'gates'.
- source_word: ርኁዋተ
  chosen: open
  alternatives:
  - opened
  - wide open
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Adjectival sense describing the portals as open; concise and natural
    in English.
- source_word: በከመ ርኢኩ በምሥራቅ
  chosen: like what I had seen in the east
  alternatives:
  - as I saw in the east
  - just as I had seen in the east
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This explicitly links the southern portals to the earlier eastern vision;
    past perfect in English clarifies prior reference.
- source_word: በአምጣነ ኆዋኅው
  chosen: corresponding to their openings
  alternatives:
  - according to their openings
  - in proportion to their openings
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase indicates matching arrangement or measure relative to the
    portals/openings previously seen. 'Corresponding to' communicates patterned equivalence
    without overcommitting to a technical measurement sense.
- source_word: ወበአምጣነ ሞፃእቱ
  chosen: and corresponding to their outlets
  alternatives:
  - and according to their exits
  - and in proportion to their goings out
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሞፃእት carries the sense of exit/going out. 'Outlets' fits the cosmological
    image of heavenly apertures through which luminaries emerge.
