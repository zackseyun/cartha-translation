theological_decisions:
- issue: Cosmic geography and heavenly architecture
  chosen_reading: Retain 'ends of the earth' and 'portals of heaven' as literal visionary
    imagery
  alternative_readings:
  - Render more generically as 'far south' and 'openings in the sky'
  rationale: The Book of the Watchers presents a structured cosmos with real visionary
    topography. The translation should preserve that apocalyptic architecture rather
    than naturalize it into modern spatial language.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    flatten cosmic imagery into generic modern religious prose.'
