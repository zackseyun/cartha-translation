    reason: previous_rendering
  - marker: e
    text: Or 'by twenty-five and two days, in fifty-four sabbath-orderings.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ታሕጻጼት
  chosen: reckoning
  alternatives:
  - calculation
  - account
  - computation
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In the Astronomical Book the term refers to numerical ordering or calendrical
    computation, not a narrative 'story' or abstract 'measure.' 'Reckoning' preserves
    the technical, calendrical sense while remaining readable.
- source_word: ይትገበር
  chosen: is done
  alternatives:
  - is made
  - takes place
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A passive or impersonal sense fits the procedural style of the luminary
    calculations. 'Is done' keeps the formal tone without over-interpreting agency.
- source_word: ቡኖኅት
  chosen: in the nights
  alternatives:
  - by night
  - of the nights
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural is likely significant in this calendrical context, referring
    to the sequence of nights rather than a generic adverbial 'by night.'
- source_word: ቀዳሚት
  chosen: the first
  alternatives:
  - the first day
  - the beginning
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The feminine ordinal likely refers to the first unit in the sequence.
    Because the explicit noun is not repeated, 'the first' is more transparent than
    supplying 'day' in the main text.
- source_word: በዘመኑ ዚአሁ
  chosen: in its season
  alternatives:
  - at that time
  - in its appointed time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In astronomical context, 'season' or 'appointed time' better reflects
    ordered calendrical recurrence than a vague temporal phrase. 'Its season' is concise
    and contextually apt.
- source_word: ይትፌጸም
  chosen: are completed
  alternatives:
  - is fulfilled
  - comes to an end
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb marks the finishing of a counted period. 'Are completed' suits
    the numerical subject 'days' and avoids importing stronger theological overtones
    of 'fulfilled.'
- source_word: መዋዕል ፻ወ፸ወ፯
  chosen: one hundred and seventy-seven days
  alternatives:
  - 177 days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: መዋዕል here denotes counted days in a calendrical total. The numeral is
    rendered in words for literary style.
- source_word: ፶፬ ሥርዓተ ሰንበት
  chosen: fifty-four sabbath-orderings
  alternatives:
  - fifty-four weeks
  - fifty-four sabbath cycles
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally the phrase points to an ordered sequence related to sabbaths.
    Because the exact idiomatic force may be 'weeks,' the more transparent and auditable
    'sabbath-orderings' is retained in the main text, with a footnote noting the alternative.
- source_word: ፳ወ፭ ወ፶፮ ክልኤቱ መዋዕል
  chosen: by twenty-five and two days
  alternatives:
  - twenty-five days and two
  - twenty-seven days
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR string is difficult. The wording appears to preserve two added
    day-counts rather than a smoothed single numeral. I retain a literal rendering
    to avoid false certainty and note the uncertainty in a footnote.
