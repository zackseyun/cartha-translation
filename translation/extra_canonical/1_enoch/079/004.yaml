translation:
  text: And the waning that occurs in the first gate in its season, until one hundred
    and seventy-seven days are completed—by the reckoning of weeks, twenty-five weeks
    and two days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'fifty-four sabbath-orderings' may idiomatically mean
      'fifty-four weeks.' The Ge'ez wording is kept more literally here because the
      exact construction is technical.
    reason: lexical_alternative
  - marker: b
    text: The final numeral sequence is textually difficult in the OCR witness. It
      may represent a total equivalent to twenty-seven days, but the present translation
      preserves the more literal wording of the Ethiopic as transmitted here.
    reason: textual_variant
  - marker: c
    text: Or 'And the reckoning'.
    reason: previous_rendering
  - marker: d
