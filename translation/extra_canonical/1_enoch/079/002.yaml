theological_decisions:
- issue: Whether to render ሰንበት as 'sabbath' or 'week'
  chosen_reading: sabbath
  alternative_readings:
  - week
  rationale: The literal term is 'sabbath,' and the project prefers preserving theological
    and cultic texture unless context clearly demands a generalized temporal unit.
    Because the Astronomical Book often links cosmic order with calendrical observance,
    retaining 'sabbath' is more transparent.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
- issue: How specifically to interpret the numeral phrase with 365
  chosen_reading: under the authority of the three hundred and sixty-five
  alternative_readings:
  - according to the 365 days
  - under the dominion of the 365 parts of the year
  rationale: The Ge'ez OCR is not fully secure, but the numeral and 'authority/dominion'
    language are both visible. Rather than silently normalizing to 'days of the year,'
    the translation keeps the number explicit and the governing nuance intact, with
    clarification in a footnote.
  doctrine_reference: Original-language primacy over translation tradition; when the
    sense is uncertain, prefer transparent English plus a footnote over false confidence.
