translation:
  text: And he showed me all their ordinances—those for every day and every season,
    and for every year, and for its going out and its command, in every month and
    every sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'under the authority of the three hundred and sixty-five' is
      difficult in the Ethiopic witness. It likely refers to the ordered rule of the
      365-day year, but the wording is left relatively literal because the exact construction
      is uncertain.
    reason: textual_variant
  - marker: b
    text: '''Sabbath'' could also be understood more broadly as ''week'' in a calendrical
      listing, but the literal term is retained.'
    reason: lexical_alternative
  - marker: c
    text: Or 'under the authority of the three hundred and sixty-five, and for every
      year, and in their going out and in their command'.
    reason: previous_rendering
lexical_decisions:
- source_word: ፴አርአየኒ
  chosen: he showed me
  alternatives:
  - he made me see
  - he revealed to me
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb plainly introduces visionary disclosure. 'He showed me' is natural
    English and preserves the report style without over-interpreting it as a technical
    revelation formula.
- source_word: ኵሎ ሥርዓቶሙ
  chosen: all their ordinances
  alternatives:
  - all their orders
  - all their arrangements
  - all their fixed courses
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሥርዓት in this astronomical context refers to ordered regulations or prescribed
    arrangements of the luminaries. 'Ordinances' preserves the sense of fixed, governing
    order better than the flatter 'arrangements,' while still fitting cosmic procedure.
- source_word: ለእሉ
  chosen: those
  alternatives:
  - these
  - of these
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The demonstrative likely points to the celestial bodies or ordered phenomena
    just under discussion. 'Those' works smoothly in English as an appositional clarification
    after 'ordinances.'
- source_word: በኵሉ ዕለት
  chosen: for every day
  alternatives:
  - in every day
  - each day
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The prepositional phrase marks recurring temporal scope. 'For every day'
    keeps the catalog-like structure of the verse.
- source_word: ወበኵሉ ዘመን
  chosen: and for every season
  alternatives:
  - and for every time
  - and for every appointed time
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ዘመን can mean time, season, or appointed period. In the Astronomical Book,
    calendrical and cyclical periods are prominent, so 'season' best conveys ordered
    temporal divisions.
- source_word: ዘበ፴፭ሥልጣን
  chosen: under the authority of the three hundred and sixty-five
  alternatives:
  - which are in the dominion of the three hundred and sixty-five
  - according to the rule of the three hundred and sixty-five
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The OCR is difficult, but the numeral plus ሥልጣን strongly suggests rule,
    authority, or dominion connected with 365, likely the days of the solar year.
    The rendering preserves the explicit number and the governing-force nuance without
    forcing a more specific reconstruction than the Ge'ez warrants.
- source_word: ወበኵሉ ዓመት
  chosen: and for every year
  alternatives:
  - and in every year
  - year by year
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Straightforward temporal phrase; 'for every year' matches the repeated
    pattern of the verse.
- source_word: ወበሙጻኡ
  chosen: and in their going out
  alternatives:
  - and in their rising
  - and in their emergence
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun from the root 'to go out' commonly suits the movement of heavenly
    bodies. 'Going out' is literal and leaves open whether the reference is rising,
    appearance, or departure in a technical astronomical sense.
- source_word: ወበትእዛዙ
  chosen: and in their command
  alternatives:
  - and in their ordinance
  - and in their prescribed order
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term can denote command or injunction. In this context it likely
    refers to governing instruction or prescribed regulation of the luminaries. 'Command'
    preserves the stronger personal or authoritative nuance common in Enochic cosmology.
- source_word: በኵሉ ወርኅ
  chosen: in every month
  alternatives:
  - for every month
  - month by month
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A simple calendrical phrase; 'in every month' fits the sequence of temporal
    divisions.
- source_word: ወ፵ኵሉ ሰንበት
  chosen: and every sabbath
  alternatives:
  - and every week
  - and every Sabbath
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: ሰንበት can denote Sabbath or, in some contexts, week. Given the calendrical
    setting, either is possible; 'sabbath' preserves the literal term and avoids prematurely
    reducing it to a generic week.
