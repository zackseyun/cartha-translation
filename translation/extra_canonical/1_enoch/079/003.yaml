- issue: Astronomical-process language versus smoother idiomatic paraphrase
  chosen_reading: 'Retain procedural cosmic imagery: ''is effected through the sixth
    gate'' and ''its light is completed.'''
  alternative_readings:
  - Paraphrase as a simple observational statement about lunar phases
  rationale: The Astronomical Book presents heavenly motions as ordered through gates
    and measured processes. Preserving that imagery respects the text's apocalyptic
    cosmology rather than flattening it into modern astronomical description.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not
    paraphrase beyond the witness.'
