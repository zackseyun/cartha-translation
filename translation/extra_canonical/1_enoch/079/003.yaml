translation:
  text: And the moon makes its waning, which is effected through the sixth gate; for
    in this sixth gate its light is completed, and from it comes the beginning of
    the waning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wanes through the sixth gate.' The Ge'ez wording is somewhat formal
      and procedural rather than purely observational.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the head of the diminution,' an idiom meaning the beginning
      or onset of the moon's decrease.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሐጸጸ
  chosen: makes its waning
  alternatives:
  - wanes
  - diminishes
  - undergoes diminution
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb denotes diminution or decrease. Rendering it verbally preserves
    the astronomical-process language of the Luminaries Book. 'Makes its waning' stays
    close to the Ge'ez construction while remaining intelligible; 'wanes' is smoother
    but slightly less transparent to the underlying form.
- source_word: ወርኅ
  chosen: the moon
  alternatives:
  - moon
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard term for the moon in this section's astronomical descriptions.
- source_word: ይትገበር
  chosen: is effected
  alternatives:
  - is done
  - takes place
  - comes about
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Passive/reflexive sense fits the description of a process occurring through
    a gate. 'Is effected' preserves the formal, procedural tone of the passage.
- source_word: በሳድስት ኆኅት
  chosen: through the sixth gate
  alternatives:
  - in the sixth gate
  - by the sixth gate
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The preposition with 'gate' in this astronomical context commonly marks
    the channel or portal through which the luminary moves. 'Through' best conveys
    that imagery.
- source_word: ይትፌጸም
  chosen: is completed
  alternatives:
  - is finished
  - reaches completion
  - is fulfilled
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb indicates completion or reaching its full measure. In context
    it refers to the moon's light reaching completion at this gate before the next
    phase begins.
- source_word: ብርሃኑ ዚአሁ
  chosen: its light
  alternatives:
  - its brightness
  - its radiance
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase straightforwardly refers to the moon's light. 'Light' is the
    most direct and consistent rendering in this section.
- source_word: እምኔሁ
  chosen: from it
  alternatives:
  - from there
  - from this
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The pronoun most naturally refers back to the sixth gate just mentioned,
    marking the point from which the next phase proceeds.
- source_word: ርእሰ ታሕጻጼት
  chosen: the beginning of the waning
  alternatives:
  - the head of the diminution
  - the chief point of the decrease
  - the onset of the decline
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'head/beginning of diminution.' In idiomatic English, 'the
    beginning of the waning' preserves both the metaphorical sense of ርእሰ as 'beginning'
    and the lunar context of decrease.
