theological_decisions:
- issue: Scope of Raguel's punitive role
  chosen_reading: Raguel is described as executing vengeance against both the world
    and the luminaries.
  alternative_readings:
  - Raguel oversees order concerning the world and the lights more generally
  - The phrase may imply punishment for offenses committed in relation to the luminaries
  rationale: The Ge'ez syntax most straightforwardly presents two coordinated objects
    of the same verb. Because the verse belongs to a catalog of angelic jurisdictions,
    the translation keeps the stark judicial wording rather than softening it into
    mere supervision.
  doctrine_reference: Preserve apocalyptic imagery and judgment formulas; do not flatten
    into generic modern religious prose.
