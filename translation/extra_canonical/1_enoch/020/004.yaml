translation:
  text: Raguel, one of the holy angels, who takes vengeance on the world and on the
    luminaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who avenges the world and the luminaries.' The underlying verb has a
      retributive, judicial sense.
    reason: lexical_alternative
  - marker: b
    text: '''Luminaries'' refers to the heavenly lights, likely the sun, moon, and
      stars as cosmic bodies within the apocalyptic worldview.'
    reason: cultural_note
lexical_decisions:
- source_word: ራጉኤል
  chosen: Raguel
  alternatives:
  - Ragw'el
  lexicon: Ge'ez onomastic/transliteration convention
  rationale: Personal names are transliterated rather than translated. 'Raguel' is
    the conventional English transliteration for this angelic name.
- source_word: ፩እምነ
  chosen: one of
  alternatives:
  - one from among
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks membership within a group; 'one of' is idiomatic English
    and preserves the partitive sense.
- source_word: መላእክት ቅዱሳን
  chosen: the holy angels
  alternatives:
  - the sacred angels
  - the angels, the holy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard angelic designation in Enochic literature. 'Holy
    angels' preserves the adjective directly without flattening it into a generic
    honorific.
- source_word: ዘይትቤቀሎ
  chosen: who takes vengeance
  alternatives:
  - who avenges
  - who punishes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb carries a judicial-retributive sense. 'Takes vengeance' best
    preserves the apocalyptic force of punitive action, stronger and more specific
    than the broader 'punishes.'
- source_word: ለዓለም
  chosen: on the world
  alternatives:
  - on the earth
  - on the age
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context the object of judgment is best rendered 'the world,'
    matching the cosmic scope of the surrounding angel list. 'Earth' is possible,
    but 'world' better conveys the inhabited order under judgment.
- source_word: ለብርሃናት
  chosen: on the luminaries
  alternatives:
  - on the lights
  - on the heavenly lights
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural refers naturally to celestial lights in apocalyptic context.
    'Luminaries' preserves the cosmic imagery and avoids reducing the term to ordinary
    'lights.'
