theological_decisions:
- issue: Identity of the beings under Saraqael's charge
  chosen_reading: spirits associated with sin/transgression
  alternative_readings:
  - spirits of humankind
  - spirits of those who have sinned
  - spirits of the children of men that transgress
  rationale: The OCR witness is textually unstable in the middle of the verse. Rather than importing a smoother traditional wording into the main text, the translation preserves the surviving emphasis on 'spirits' and 'sin' and notes the broader interpretive alternative in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; prefer transparent English plus a footnote over false confidence.
