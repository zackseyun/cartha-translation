translation:
  text: Saraqael, one of the holy angels, who is over the spirits of the children of men who sin in the spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The middle of the Ethiopic OCR line is uncertain. A widely attested understanding of this verse is that Saraqael is set over 'the spirits of humankind who sin' or similar wording.
    reason: textual_variant
  - marker: b
    text: Or 'the spirits of those who sin in the spirit.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሰራቃኤል
  chosen: Saraqael
  alternatives:
  - Sariel
  - Saraqael
  lexicon: Ge'ez proper name tradition
  rationale: Personal names are transliterated rather than translated. The Ethiopic form points to Saraqael/Saraqael; 'Saraqael' stays close to the given witness.
- source_word: ፩እምነ
  chosen: one of
  alternatives:
  - one from among
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard partitive expression, identifying Saraqael as one among a larger group.
- source_word: መላእክት ቅዱሳን
  chosen: the holy angels
  alternatives:
  - the sacred angels
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A fixed Enochic expression for the angelic beings set apart for divine service; 'holy angels' preserves the established apocalyptic register.
- source_word: ዘዲበ
  chosen: who is over
  alternatives:
  - who is set over
  - who has charge over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks supervisory authority. 'Who is over' is concise and natural while preserving the hierarchical sense.
- source_word: መናፍስት
  chosen: the spirits
  alternatives:
  - spirits
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural noun is explicit and should be retained. The article is supplied in English because the phrase identifies a defined class under angelic oversight.
- source_word: '[እስለ፡ እመሕያው]'
  chosen: of those who sin in the spirit
  alternatives:
  - of the spirits of the children of men
  - concerning the spirits of humankind
  lexicon: Charles 1906 OCR witness; comparison-sensitive phrase
  rationale: The bracketed OCR segment is uncertain and likely corrupt or poorly recovered. Because the following clause clearly contains 'spirits' and 'those who sin,' the main line keeps the extant Ethiopic trajectory while a footnote records a major alternative reflected in other known forms of the verse.
- source_word: ዘመናፍስት ያኃጥኡ
  chosen: those who sin in the spirit
  alternatives:
  - the spirits that transgress
  - those who sin
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause appears to qualify the spirits by sinful action. 'Those who sin in the spirit' preserves both the moral force of the verb and the repeated spirit-language in the witness, though the syntax is difficult.
