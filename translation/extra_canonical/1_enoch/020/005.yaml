theological_decisions:
- issue: Nature of Mikael's assigned domain
  chosen_reading: Mikael is described as overseeing a beneficent command or ordering
    related to the people.
  alternative_readings:
  - Mikael is over the best part of humanity
  - Mikael is over the good ones among the people
  - Mikael is over human virtue or beneficence
