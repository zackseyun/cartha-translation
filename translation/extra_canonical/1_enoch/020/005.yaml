    of 'good,' 'command/order,' and 'people' is not fully transparent in the OCR witness.
    The chosen rendering stays close to the extant wording without importing a smoother
    traditional interpretation unsupported by the immediate text.
  doctrine_reference: Preserve theological tension rather than resolve it; when uncertain,
    prefer transparent English plus footnote.
