translation:
  text: Mikael, one of the holy angels, who is set over the good of mankind and over
    the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ethiopic wording after 'who is set over' is difficult. It may also be
      understood as 'who is over the good order of the people' or 'who is over the
      good ones among the people.'
    reason: alternative_reading
  - marker: b
    text: Or 'who is set over the good command for the people.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ሚካኤል
  chosen: Mikael
  alternatives:
  - Michael
  lexicon: Ge'ez lexical tradition
  rationale: Personal names are transliterated rather than translated. 'Mikael' stays
    closer to the Ethiopic form, though 'Michael' is the familiar English equivalent.
- source_word: ፩እምነ
  chosen: one of
  alternatives:
  - from among
  lexicon: Ge'ez lexical tradition
  rationale: The phrase marks membership within a group; 'one of' is the most natural
    English rendering.
- source_word: መላእክት ቅዱሳን
  chosen: the holy angels
  alternatives:
  - the holy messengers
  - the angels, the holy ones
  lexicon: Ge'ez lexical tradition
  rationale: In this context the beings listed in chapter 20 are angelic figures with
    assigned cosmic roles, so 'holy angels' is the clearest rendering.
- source_word: እሰመ
  chosen: who is set over
  alternatives:
  - who is over
  - who is appointed over
  lexicon: Ge'ez lexical tradition
  rationale: The clause introduces Mikael's sphere of authority. 'Set over' preserves
    the sense of delegated oversight without over-paraphrasing.
- source_word: ዲበ
  chosen: over
  alternatives:
  - upon
  - concerning
  lexicon: Ge'ez lexical tradition
  rationale: The preposition indicates superintendence or authority in this list of
    angelic jurisdictions.
- source_word: ሠናይቱ
  chosen: the good
  alternatives:
  - goodness
  - what is good
  - the beneficent
  lexicon: Ge'ez lexical tradition
  rationale: The feminine form likely qualifies the following noun. Rendering it as
    'the good' keeps the wording transparent where the exact idiomatic force is uncertain.
- source_word: ለሰብእ ትእዛዚ
  chosen: command for the people
  alternatives:
  - commandment for humankind
  - good order for the people
  - beneficent charge for humanity
  lexicon: Ge'ez lexical tradition
  rationale: ትእዛዚ commonly denotes command, order, or injunction. Because the syntax
    is somewhat difficult, 'command for the people' preserves the likely sense of
    a beneficial divine charge or ordering directed toward humanity.
- source_word: ዲበ ሕዝብ
  chosen: for the people
  alternatives:
  - over the people
  - concerning the people
  lexicon: Ge'ez lexical tradition
  rationale: Although literally involving the preposition 'over/upon,' the phrase
    in English is best brought into relation with the preceding expression as the
    object or sphere of Mikael's oversight. The wording remains somewhat uncertain,
    so a footnote records the alternative.
