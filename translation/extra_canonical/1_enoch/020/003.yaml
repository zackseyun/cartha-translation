translation:
  text: Raphael, one of the holy angels, who is over the spirits of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spirits of humankind.' The Ge'ez term for 'men' is collective here,
      not necessarily male-specific.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሩፋኤል
  chosen: Raphael
  alternatives:
  - Rufael
  lexicon: Ge'ez lexicon
  rationale: Personal name is transliterated rather than translated, following project
    policy for names.
- source_word: ፩እምነ
  chosen: one of
  alternatives:
  - one from among
  lexicon: Ge'ez lexicon
  rationale: The numeral plus partitive preposition indicates membership within a
    group; 'one of' is natural English and preserves the partitive sense.
- source_word: ቅዱሳን መላእክት
  chosen: the holy angels
  alternatives:
  - the sacred angels
  - the angels, the holy ones
  lexicon: Ge'ez lexicon
  rationale: This is the standard adjective+noun expression for consecrated heavenly
    beings. 'Holy angels' preserves the apocalyptic register without paraphrase.
- source_word: ዘ
  chosen: who
  alternatives:
  - which
  - that
  lexicon: Ge'ez lexicon
  rationale: Relative marker introducing Raphael's sphere of oversight; 'who' fits
    a personal antecedent.
- source_word: መናፍስተ
  chosen: spirits
  alternatives:
  - souls
  - breaths
  lexicon: Ge'ez lexicon
  rationale: The plural of 'spirit' is the most direct rendering and fits the cosmological/apocalyptic
    context better than the more anthropological 'souls.'
- source_word: ሰብእ
  chosen: men
  alternatives:
  - human beings
  - humankind
  - people
  lexicon: Ge'ez lexicon
  rationale: The term denotes human beings. 'Men' keeps the concise, elevated style
    of the angel list, though the sense is collective humanity rather than males only.
- source_word: ዘመናፍስተ ሰብእ
  chosen: who is over the spirits of men
  alternatives:
  - who is set over the spirits of humankind
  - who oversees the spirits of people
  lexicon: Ge'ez lexicon
  rationale: The construction indicates authority or charge over a domain. 'Is over'
    preserves the terse catalog style and apocalyptic hierarchy better than a more
    interpretive paraphrase.
