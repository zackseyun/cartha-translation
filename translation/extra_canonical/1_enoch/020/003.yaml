theological_decisions:
- issue: Scope of Raphael's charge
  chosen_reading: Raphael is described as having oversight over human spirits.
  alternative_readings:
  - Raphael is over the souls of the dead
  - Raphael is over the healing or inner life of humanity
  rationale: The Ge'ez text itself states only 'the spirits of men' and does not specify
    dead humans or a healing function in this verse. The translation preserves the
    broader wording and avoids importing later interpretive traditions from Raphael's
    name or other literature.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
