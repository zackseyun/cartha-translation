translation:
  text: And these are the names of the holy angels who keep watch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb rendered 'keep watch' can also be understood as 'are vigilant'
      or 'watch.' In the wider context of 1 Enoch, this language overlaps with the
      idea of the heavenly watchers, but the verse itself presents it as a description
      of the angels.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወዝንቱ
  chosen: And these are
  alternatives:
  - And this is
  - Now these are
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The conjunction plus demonstrative commonly introduces a list or identification
    formula. Because አስማቲሆሙ is plural ('their names'), the plural sense 'these are'
    fits the syntax better than singular 'this is'.
- source_word: አስማቲሆሙ
  chosen: the names
  alternatives:
  - their names
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Literally 'their names.' English idiom in a list-introduction is smoother
    with 'the names,' while the following relative clause identifies whose names are
    meant. The possessive sense is retained by context.
- source_word: ለእለ
  chosen: of those who
  alternatives:
  - of the ones who
  - who
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This relative marker links 'names' to the following description. In idiomatic
    English, the relation is best carried by 'of those who' or compressed into 'who.'
    The main text compresses to readable English without losing sense.
- source_word: ይተግሁ
  chosen: keep watch
  alternatives:
  - are vigilant
  - watch
  - are wakeful
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys wakefulness or vigilant watching. 'Keep watch' preserves
    the active, apocalyptic sense and resonates with the Watchers context without
    forcing the technical title 'Watchers' into the verse itself.
- source_word: ቅዱሳን
  chosen: holy
  alternatives:
  - saintly
  - sacred
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard rendering for the adjective meaning holy. It preserves the text's
    elevated register and the distinction of these angels as consecrated heavenly
    beings.
- source_word: መላእክት
  chosen: angels
  alternatives:
  - messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this apocalyptic context the referent is clearly heavenly beings,
    so 'angels' is preferable to the more generic 'messengers'.
