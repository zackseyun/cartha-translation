theological_decisions:
- issue: Whether to render the watching angels with the technical term 'Watchers'
  chosen_reading: keep watch
  alternative_readings:
  - the Watchers
  - the wakeful ones
  rationale: Although the Book of the Watchers uses watcher language prominently,
    this verse identifies a class of holy angels by a verbal description rather than
    necessarily by the fixed title. Rendering the verb as 'keep watch' preserves the
    lexical sense and avoids importing a technical label more strongly than the Ge'ez
    wording requires.
  doctrine_reference: Preserve local passage meaning and do not over-harmonize key
    terms across the corpus.
