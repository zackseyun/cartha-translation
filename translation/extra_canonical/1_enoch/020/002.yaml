lexical_decisions:
- source_word: ኡርኤል
  chosen: Uriel
  alternatives:
  - Ur'el
  lexicon: Ge'ez onomastic/transliteration convention
  rationale: Personal names are transliterated rather than translated, following project
    philosophy.
- source_word: ፩እመላእክት
  chosen: one of the angels
  alternatives:
  - one from among the angels
  - one of the messengers
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The numeral plus preposition marks membership within a group. 'Angels'
    fits the apocalyptic context better than the more generic 'messengers'.
- source_word: ቅዱሳን
  chosen: holy
  alternatives:
  - sacred
  - saintly
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Enochic angel lists this adjective regularly marks the angels as heavenly
    holy beings. 'Holy' preserves the stock apocalyptic designation.
- source_word: እሰመ
  chosen: he is over
  alternatives:
  - who is set over
  - who is appointed over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause identifies Uriel's sphere of charge. 'He is over' is concise
    English that preserves the sense of assigned authority; 'appointed over' is possible
    but more interpretive.
- source_word: ዘዓለም
  chosen: the world
  alternatives:
  - the age
  - eternity
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this context of angelic jurisdictions, 'world' best fits the cosmic
    domain under Uriel's oversight. The Ge'ez term can have broader temporal senses,
    but those are less likely here.
- source_word: ወዘተረዓድ
  chosen: and over Tartarus
  alternatives:
  - and over the abyss
  - and over trembling
  - and over terror
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The final term is textually difficult in OCR form, but in this verse's
    traditional angel-list context it most plausibly refers to Tartarus, the underworld
    prison associated with rebellious spirits. This preserves the apocalyptic cosmology
    rather than reducing it to an abstract emotion.
