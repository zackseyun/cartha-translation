theological_decisions:
- issue: Whether to render Uriel's second domain as a mythic underworld term or a
    more generic abstract noun
  chosen_reading: over Tartarus
  alternative_readings:
  - over the abyss
  - over terror/trembling
  rationale: The verse belongs to a list assigning cosmic jurisdictions to named holy
    angels. A concrete underworld realm fits that pattern and preserves Second Temple
    apocalyptic cosmology. Because the OCR form is uncertain, the alternative is preserved
    in a footnote rather than hidden.
  doctrine_reference: Preserve theological tension rather than resolve it; when uncertain,
    prefer transparent English plus a footnote.
