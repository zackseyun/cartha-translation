theological_decisions:
- issue: Whether ገነት should be rendered generically or as a cosmic/theological locale
  chosen_reading: Paradise
  alternative_readings:
  - the garden
  - Eden
  rationale: In the context of the catalog of archangels and their assigned heavenly
    domains, the term most naturally refers to the paradisal realm, not merely a generic
    garden. 'Paradise' preserves the theological and apocalyptic force without importing
    later doctrinal detail.
  doctrine_reference: 'Translation philosophy: preserve local passage meaning and
    apocalyptic imagery.'
