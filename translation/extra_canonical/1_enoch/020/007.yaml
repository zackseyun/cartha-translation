translation:
  text: Gabriʾel, one of the holy angels, who is over Paradise and the serpents and
    the cherubim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The term rendered 'serpents' is lexically difficult in Ethiopic transmission;
      some uncertainty remains, but the traditional sense in this verse points to
      serpentine beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ገብርኤል
  chosen: Gabriʾel
  alternatives:
  - Gabriel
  lexicon: Ge'ez lexicon / traditional proper-name transliteration
  rationale: Personal names are transliterated rather than translated. The form reflects
    the Ethiopic name behind the familiar Gabriel.
- source_word: ፩እምነ
  chosen: one of
  alternatives:
  - from among
  - one from
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'The phrase straightforwardly marks membership within a group: ''one
    of'' the angels.'
- source_word: መላእክት ቅዱሳን
  chosen: the holy angels
  alternatives:
  - the sacred angels
  - the angels, the holy ones
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard Enochic designation for the heavenly angelic beings.
    'Holy angels' preserves the apocalyptic register and avoids flattening the phrase.
- source_word: ዘዲበ
  chosen: who is over
  alternatives:
  - who is set over
  - who presides over
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The construction indicates authority or charge over a domain. 'Who is
    over' is clear and suitably formal.
- source_word: ገነት
  chosen: Paradise
  alternatives:
  - the garden
  - Eden
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The Ethiopic term here is the loanword commonly corresponding to 'Paradise.'
    In this angel list, it likely denotes the paradisal garden realm rather than an
    ordinary garden, so 'Paradise' best preserves the cosmic setting.
- source_word: አክይስት
  chosen: the serpents
  alternatives:
  - serpents
  - snakes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The term is difficult, but in this traditional context it is commonly
    understood as referring to serpentine beings/serpents. 'Serpents' preserves the
    elevated register better than 'snakes.'
- source_word: ኪሩቤን
  chosen: the cherubim
  alternatives:
  - cherubs
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is the standard transliterated designation for the heavenly beings.
    'Cherubim' preserves the traditional plural form and apocalyptic atmosphere.
