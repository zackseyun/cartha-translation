translation:
  text: Then I lifted up my eyes and wept, and I said at that time, “Have pity on
    me, that I may be silent toward you or forget you no longer. But only as far as
    the house of the tombs of my fathers, cry out from distress with lamentation,
    so that I may not be forgotten before you and afterward. And these things I have
    declared to you for your remembrance.”
  philosophy: optimal-equivalence
