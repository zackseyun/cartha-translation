translation:
  text: The last ruler of that time will be left alive, when the multitude of his hosts has been struck down by the sword; and he will be bound, and they will bring him up to Mount Zion. And my Messiah will convict him of all his impieties, and will set before him all the wicked deeds of his hosts.
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: ܒܝܫܘܬܗ
  chosen: impieties
  alternatives:
  - wickedness
  - ungodliness
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: I used 'impieties' in the accusation scene because the offense is not merely political evil but wickedness against God exposed by the Messiah on Zion.
- source_word: ܥܒ̈ܕܝܗܘܢ ܕܒܝܫܘܬܗܘܢ
  chosen: the wicked deeds of his hosts
  alternatives:
  - the works of his hosts
  - their evil deeds
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The visible Syriac preserves the language of deeds and wickedness. 'Wicked deeds of his hosts' keeps both the moral charge and the corporate scope.
- source_word: ܫܪܪܐ / ܫܘܠܛܢܐ sense
  chosen: dominion
  alternatives:
  - rule
  - reign
  - principate
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The line speaks of the Messiah's continuing royal authority. 'Dominion' preserves that political-apocalyptic sense without sounding overly technical.
- source_word: ܥܠܡܐ ܕܚܒܠܐ / corruptible-world sense
  chosen: the world of corruption
  alternatives:
  - the corruptible world
  - the perishing world
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: This wording preserves the apocalyptic contrast between the present ruined order and the age beyond it, without flattening the phrase into generic 'world.'
- source_word: ܛܘܪ ܨܗܝܘܢ
  chosen: Mount Zion
  alternatives:
  - the mountain of Zion
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The proper-name form is the most natural English rendering and preserves the scene of messianic judgment.
theological_decisions:
- issue: How to render the Messiah's role in the judgment of the final ruler
  chosen_reading: The passage presents a personal messianic ruler who judges the last enemy on Mount Zion.
  alternative_readings:
  - A purely symbolic messianic age
  - A generic anointed agent without explicit messianic identity
  rationale: The text explicitly says 'my Messiah' and gives him judicial action against the final ruler, so the personal royal sense should remain visible.
  doctrine_reference: DOCTRINE.md translation philosophy §3
- issue: How to handle 'forever' in relation to the end of the corrupt world
  chosen_reading: The Messiah's dominion is rendered as enduring forever within the chapter's apocalyptic frame, while the line's further qualification is retained.
  alternative_readings:
  - An unqualified endless earthly reign
  - A merely hyperbolic long reign
  rationale: The Syriac-style apocalyptic rhetoric holds together enduring dominion and consummation language; the translation should preserve that tension rather than resolve it.
  doctrine_reference: DOCTRINE.md translation philosophy §3
