translation:
  text: '1 …that belong to corruption and its ways, ways that cannot be traced out.
    But if you endure and stand in his fear and do not go astray from his law, the
    times will be changed in their season for good, and you will see the consolation
    of Zion.


    2 For what exists now is nothing; but what is to come will be exceedingly great.


    3 For everything corruptible passes away, and the time that has been is now forgotten;
    nor after this is it sought in remembrance.


    4 For what has been passes over into corruption, and what is corrupted falls and
    is forgotten. But what is to come is what is sought; what has passed from the
    hand is no longer reckoned.


    5 For when the time of a work comes and its season arrives, it sets its deeds
    in order and examines its sins. Those who belong to it do not add anguish to destruction.


    6 And if there are any who are appointed for it, it is not withheld from them;
    and for those who live in it there is no leading to destruction.


    7 Therefore, let those who desire to see it beware of the time spoken of, and
    let them pass beyond the burden of the troubled time.


    8 But those who turned themselves toward anguish and received lies, and lost the
    settledness of hope, and were sought out in vanities, and did not spare mercy,
    and kept the path of discipline—


    9 they desire to inquire into the hidden anguish of the people to come; but the
    visitation of that matter by which many were justified …'
