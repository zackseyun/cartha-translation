theological_decisions:
- issue: Eschatological hope centered on Zion
  chosen_reading: the consolation of Zion
  alternative_readings:
  - the comfort of Zion
  - Zion’s encouragement
  rationale: The Syriac explicitly ties future good to Zion’s consolation. I preserved
    the Zion-centered restoration theme rather than generalizing it into abstract
    salvation.
- issue: The value of the present age versus the age to come
  chosen_reading: what exists now is nothing; but what is to come will be exceedingly
    great
  alternative_readings:
  - what is now counts for nothing
  - the present is negligible beside the future
  rationale: 'This is not absolute metaphysical denial of creation but an apocalyptic
    comparison: the present corruptible order is insignificant beside the coming reality.
    I kept the stark wording while understanding it comparatively.'
- issue: Judgment as examination of deeds and sins
  chosen_reading: it sets its deeds in order and examines its sins
  alternative_readings:
  - it weighs its works and investigates its sins
  - it arranges its works and visits its sins
  rationale: The Syriac presents the arriving time as exposing and assessing moral
    reality. I kept judicial language without over-systematizing it into later doctrinal
    formulas.
