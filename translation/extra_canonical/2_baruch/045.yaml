  footnotes:
  - marker: '45:1'
    text: The chapter opens mid-thought because this bucket overlaps the end of the
      preceding chapter. The opening clause is textually rough, so the English keeps
      an initial ellipsis rather than forcing false precision.
    reason: textual_variant
  - marker: '45:5'
    text: The clause about the coming time, its works, and its sins is difficult in
      the Ceriani witness. The translation follows the broad sense of an appointed
      time that orders deeds and examines sin.
    reason: textual_variant
  - marker: 45:8–9
    text: The closing sentence remains both textually rough and incomplete at this
      chapter edge. The English preserves the surviving sense and ends with suspension
      points.
    reason: textual_variant
lexical_decisions:
- source_word: ܒܘܝܐܐ
  chosen: consolation
  alternatives:
  - comfort
  - encouragement
  lexicon: Payne Smith
  rationale: The noun carries the sense of consolation or comfort. “Consolation of
    Zion” preserves the eschatological and communal register without flattening it
    into mere emotional relief.
- source_word: ܡܬܚܠܦܝܢ ... ܙܒ̈ܢܐ ܠܛܒܬܐ
  chosen: the times will be changed ... for good
  alternatives:
  - the seasons will turn to good
  - the times will be transformed for blessing
  lexicon: Payne Smith
  rationale: The Syriac speaks of a change or turning of times. I kept “times” rather
    than paraphrasing into abstract fortune, preserving the apocalyptic sense of divinely
    altered eras.
- source_word: ܡܬܚܒܠ
  chosen: corruptible
  alternatives:
  - subject to ruin
  - perishable
  lexicon: Payne Smith
  rationale: “Corruptible” keeps the repeated root visible across the chapter and
    matches the contrast with the enduring future age.
- source_word: ܒܥܘܗܕܢܐ
  chosen: in remembrance
  alternatives:
  - in memory
  - for recollection
  lexicon: Payne Smith
  rationale: The passage contrasts what is forgotten with what is sought or remembered.
    “In remembrance” preserves the formal, reflective tone.
- source_word: ܚܘܒܐ
  chosen: burden
  alternatives:
  - debt
  - obligation
  lexicon: Payne Smith
  rationale: The term can suggest debt or obligation, but in this warning context
    “burden” best fits the oppressive weight of the present troubled time.
- source_word: ܡܕܪܗ ܕܡܘܣܪ
  chosen: the path of discipline
  alternatives:
  - the way of correction
  - the enclosure of instruction
  lexicon: Payne Smith
  rationale: The phrase is somewhat opaque, but it clearly retains the idea of disciplinary
    formation or correction. “Path of discipline” is transparent and restrained.
