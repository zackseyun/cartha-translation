lexical_decisions:
- source_word: ܒ̈ܬܪ ܒܣܝ̈ܡܐ
  chosen: the bright tenth waters
  alternatives:
  - the pleasant bright waters
  - the clear tenth waters
  lexicon: Payne Smith
  rationale: I kept the recurring visionary label 'bright ... waters' explicit, since
    the alternation of black and bright waters is a structural feature of the apocalypse,
    not a disposable metaphor.
- source_word: ܕܫܘܝܐ
  chosen: the purity
  alternatives:
  - the uprightness
  - the rectitude
  lexicon: Payne Smith
  rationale: The chapter presents Josiah's era as morally cleansed and rightly ordered.
    'Purity' best fits the cultic and ethical renewal described in the lines that
    follow.
- source_word: ܡ̇ܠܟܐ
  chosen: the Mighty One
  alternatives:
  - the Powerful One
  lexicon: Payne Smith
  rationale: This is the established reverential rendering in this section of 2 Baruch
    and preserves the divine-title force better than a flatter English equivalent.
- source_word: ܡܢ ܡܠܝܘ ܠܒܗ ܘܡܢ ܟܠܗ̇ ܢܦܫܗ
  chosen: with all his heart and with all his soul
  alternatives:
  - from the fullness of his heart and from all his soul
  lexicon: Payne Smith
  rationale: The phrase is covenantal and totalizing. I preserved the full double
    expression rather than collapsing it into a general statement of sincerity.
- source_word: ܡܕܒܚܐ
  chosen: the altar
  alternatives:
  - the sacrificial altar
  lexicon: Payne Smith
  rationale: The cultic restoration in view is concrete, so the simple and direct
    'altar' is preferable.
- source_word: ܠܒܘܠܡܘ(ܣ)
  chosen: diviners
  alternatives:
  - necromancers
  - enchanters
  lexicon: Payne Smith
  rationale: The OCR is unstable here, but the sense is a condemned class of illicit
    religious practitioners. 'Diviners' keeps the line broad without pretending more
    precision than the damaged form warrants.
- source_word: ܩܒܪܐ
  chosen: the graves
  alternatives:
  - the tombs
  - the sepulchers
  lexicon: Payne Smith
  rationale: '''Graves'' is clear modern English and still fits the denunciatory tone
    of the passage.'
- source_word: ܢܚܠܐ
  chosen: the brook
  alternatives:
  - the wadi
  - the torrent-valley
  lexicon: Payne Smith
  rationale: The Syriac points to a stream-bed or ravine. 'Brook' is idiomatic and
    leaves the geographical identification modest where the present bucket breaks
    off.
