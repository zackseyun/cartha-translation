translation:
  text: '1 Therefore, behold, days are coming when the times will hasten more than
    the former ones, and the seasons will pass more swiftly than those that have gone
    by, and the years will move faster than the present years.

    2 Therefore I have now taken Zion away, so that I may visit the world more swiftly
    in its appointed time.

    3 And now, hold fast in your heart all that I command you, and seal it in the
    inner chambers of your mind.

    4 Then I will show you the judgment of my might and my ways, which are past searching
    out.

    5 Go, therefore, sanctify yourself for seven days; eat no bread, drink no water,
    and speak with no one.

    6 Afterward come to this place, and I will appear to you there and speak true
    things with you, and I will instruct you concerning the order of the times, for
    they are coming and will not delay.'
  philosophy: optimal-equivalence
