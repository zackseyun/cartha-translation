lexical_decisions:
- source_word: ܙܒ̈ܢܐ
  chosen: times
  alternatives:
  - ages
  - periods
  - seasons
  lexicon: Payne Smith
  rationale: Rendered broadly as 'times' to preserve the apocalyptic sense of divinely
    ordered periods rather than mere clock-time.
- source_word: ܣܥܘ̈ܪܐ / visitation idea behind 'visit the world'
  chosen: visit the world
  alternatives:
  - attend to the world
  - judge the world
  lexicon: Payne Smith
  rationale: Kept 'visit' because the idiom can include judicial intervention without
    collapsing it into an interpretive paraphrase like 'judge'.
- source_word: ܐܚܝܕ / ܚܣܢ heart-retention idiom
  chosen: hold fast in your heart
  alternatives:
  - keep in your heart
  - retain in your heart
  lexicon: Brockelmann
  rationale: This preserves both memory and faithful inward custody.
- source_word: sealed in the recesses / inner chambers of the mind
  chosen: inner chambers of your mind
  alternatives:
  - recesses of your mind
  - secret places of your understanding
  lexicon: Payne Smith
  rationale: A concrete metaphor was preserved rather than flattened into 'remember
    carefully.'
- source_word: ܐܬܩܕܫ
  chosen: sanctify yourself
  alternatives:
  - consecrate yourself
  - make yourself holy
  lexicon: Payne Smith
  rationale: The verb carries preparatory holiness language suited to visionary encounter.
- source_word: ܫܪܪܬܐ / truthful speech formula
  chosen: true things
  alternatives:
  - truth
  - reliable words
  lexicon: Payne Smith
  rationale: Plural wording fits revelatory disclosures better than an abstract singular.
- source_word: order / method of the times
  chosen: order of the times
  alternatives:
  - course of the times
  - arrangement of the times
  lexicon: Brockelmann
  rationale: Chosen to reflect structured eschatological sequence without overtechnical
    wording.
theological_decisions:
- issue: Divine agency in Zion’s removal
  chosen_reading: '"I have now taken Zion away"'
  alternative_readings:
  - '"I removed Zion"'
  - '"I caused Zion to be taken away"'
  rationale: The Syriac and control witnesses present the loss of Zion under God's
    sovereign action, not merely as an accident of imperial history.
- issue: Meaning of God's 'visiting' the world
  chosen_reading: A coming eschatological intervention with judicial force
  alternative_readings:
  - A purely benevolent visitation
  - An already completed historical visitation
  rationale: In this apocalyptic setting, 'visit' naturally carries the sense of decisive
    divine intervention, likely judgment-oriented though not reduced to that single
    nuance.
- issue: Fasting command beverage
  chosen_reading: '"drink no water"'
  alternative_readings:
  - '"drink no wine"'
  rationale: The Ceriani chapter edge is weak here, but the immediate fulfillment
    scene in the next chapter supports 'water'; Kmosko's cited Latin control reads
    'wine,' so the place remains textually notable.
