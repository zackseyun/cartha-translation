translation:
  text: And he answered and said to me, “What will happen then will happen to the
    whole earth. Therefore all who live will experience it. But at that time I will
    protect only those who are found in this land in those days. And it will be, after
    what is to happen in those parts has been accomplished, that the Messiah will
    begin to be revealed. And Behemoth will be revealed from his place, and Leviathan
    will ascend from the sea, those two great monsters that I created on the fifth
    day of creation and kept until that time. Then they will become food for all who
    are left. The earth also will yield its fruit, one in ten thousand. On one vine
    there will be a thousand branches, and one branch will produce a thousand clusters,
    and one cluster will produce a thousand grapes, and one grape will produce a kor
    of wine. And those who have hungered will rejoice, and they will see wonders every
    day. For winds will go out from before me to bring every morning the fragrance
    of aromatic fruits, and at the close of the day clouds distilling the dew of health.
    And it will happen at that same time that the treasury of manna will again descend
    from on high, and they will eat of it in those years, because these are they who
    have come to the consummation of time.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Chapter 29 is structurally control-backed. The present Ceriani bucket overlaps
      adjacent chapters and is textually unstable at this boundary, so the opening
      is translated with explicit help from Kmosko’s chapter XXIX control page rather
      than with false precision from the current bucket alone.
    reason: textual_variant
  - marker: b
    text: '''Behemoth'' and ''Leviathan'' are retained as traditional names for the
      two primeval creatures rather than translated generically.'
    reason: cross_reference
  - marker: c
    text: A 'kor' is an ancient large liquid measure. It is retained here because
      the verse deliberately stacks concrete abundance images rather than speaking
      vaguely of plenty.
    reason: cultural_note
  - marker: d
    text: Or 'the dew of healing.' The Syriac phrase on the control page supports
      both nuances; 'health' was chosen to keep the noun-like quality of the expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: terrae / terra ista
  chosen: the whole earth / this land
  alternatives:
  - the whole land / this land
  - the whole earth / this earth
  lexicon: Lewis & Short
  rationale: The chapter contrasts universal scope in v.1 with a protected local sphere
    in v.2. Rendering the first broadly and the second locally preserves that deliberate
    contrast.
- source_word: sentient
  chosen: will feel it
  alternatives:
  - will experience it
  - will perceive it
  lexicon: Lewis & Short
  rationale: Affective force fits the context of eschatological distress better than
    a merely cognitive verb like 'perceive.'
- source_word: revelari Messias
  chosen: the Messiah will begin to be revealed
  alternatives:
  - the Messiah will begin to appear
  - the Messiah will begin to be manifested
  lexicon: Lewis & Short
  rationale: The passive preserves the text’s emphasis on disclosure from God rather
    than autonomous appearance, and 'begin' keeps the processive aspect.
- source_word: cete magna
  chosen: great monsters
  alternatives:
  - great sea-creatures
  - huge beasts
  lexicon: Lewis & Short
  rationale: This keeps the apocalyptic and primeval force of Behemoth and Leviathan
    without flattening them into ordinary animals.
- source_word: residui fuerint
  chosen: all who remain
  alternatives:
  - all who are left
  - the survivors
  lexicon: Lewis & Short
  rationale: The phrase points to those left after judgment events. 'Remain' is transparent
    and suitably elevated.
- source_word: corum vini
  chosen: a kor of wine
  alternatives:
  - a cor of wine
  - a large measure of wine
  lexicon: Lewis & Short
  rationale: Retaining the ancient measure preserves the text’s concrete abundance
    imagery better than paraphrasing it away.
- source_word: ܪ̈ܘܚܶܐ
  chosen: winds
  alternatives:
  - spirits
  - breezes
  lexicon: Payne Smith
  rationale: In this provision scene the natural-cosmic sense 'winds' best fits the
    imagery of fragrance being carried each morning.
- source_word: ܛܰܠܳܐ ܕܳܐܣܝܽܘܬܳܐ
  chosen: the dew of health
  alternatives:
  - the dew of healing
  - healing dew
  lexicon: Payne Smith
  rationale: The phrase is vivid and slightly strange. 'Dew of health' preserves that
    elevated texture while still being intelligible English.
- source_word: consummatio temporis
  chosen: the consummation of time
  alternatives:
  - the completion of time
  - the end of the age
  lexicon: Lewis & Short
  rationale: This keeps the formal apocalyptic register and avoids importing other
    stock eschatological phrases not required by the witness.
