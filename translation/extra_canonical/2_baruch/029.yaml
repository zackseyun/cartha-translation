theological_decisions:
- issue: Whether to universalize or localize the opening judgment language
  chosen_reading: Verse 1 is rendered universally ('the whole earth'), while verse
    2 keeps the narrower 'this land.'
  alternative_readings:
  - Render both references as 'land'
  - Render both references as 'earth'
  rationale: The witness itself marks a universal-local contrast, so the translation
    should not collapse it.
- issue: How to treat Behemoth and Leviathan
  chosen_reading: Retain them as named primeval creatures within the apocalyptic vision.
  alternative_readings:
  - Translate them generically as beasts or monsters
  - Explain them away as symbolic political figures in the main text
  rationale: The passage presents them as preserved creation-beings appointed for
    the end-time banquet. The main text should preserve that imagery rather than rationalize
    it.
- issue: How explicit to make the Messiah’s manifestation
  chosen_reading: Render the line as 'the Messiah will begin to be revealed.'
  alternative_readings:
  - '''the Messiah will appear'''
  - '''the reign of the Messiah will be revealed'''
  rationale: The wording emphasizes unveiling and onset. It is better not to import
    extra interpretive content such as 'reign' where this chapter’s control witness
    points to the Messiah’s own disclosure.
