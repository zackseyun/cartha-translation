lexical_decisions:
- source_word: ܦܘܩ̈ܕܢܐ
  chosen: commands
  alternatives:
  - injunctions
  - orders
  lexicon: Payne Smith
  rationale: The noun naturally denotes directives or charges. “Commands” is plain English and preserves the force of the people’s appeal.
- source_word: ܚܒܪܟ
  chosen: your companion
  alternatives:
  - your associate
  - your friend
  lexicon: Payne Smith
  rationale: The word marks Jeremiah as Baruch’s close associate. “Companion” fits the relational sense without sounding overly casual.
- source_word: ܫܪܘܟ
  chosen: withdraw from us
  alternatives:
  - depart from us
  - leave us
  lexicon: Payne Smith
  rationale: The people’s complaint is not mere travel but abandonment. “Withdraw from us” preserves that emotional force; “leave us” is also used earlier in the verse for variation and clarity.
- source_word: ܐܚ̈ܝ
  chosen: our brothers
  alternatives:
  - our brethren
  lexicon: Payne Smith
  rationale: The Syriac idiom is familial and communal. “Our brothers” is natural modern English while keeping the covenantal kinship sense.
- source_word: ܕܢܦܠܘ ...
  chosen: those who have fallen into captivity
  alternatives:
  - it has been decreed that they should go into captivity
  lexicon: Payne Smith
  rationale: The page edge is slightly unstable, but the clause clearly refers to an issued decree/judgment concerning exile. This rendering preserves that juridical sense without pretending the damaged boundary is perfectly certain.
