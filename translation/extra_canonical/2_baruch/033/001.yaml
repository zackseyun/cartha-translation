  text: '# Source page p0209 (printed 133)

    ܓܪܡܝܗܘܢ. ܐܠܐ ܘܬܘܒ

    ܡܬܝܗܒܝܢ ܒܥܦܪܐ

    ܘܐܡܪܝܢ ܗܘܘ ܓܝܪ

    ܕܡܦܩܐ ܐܢܬܝܢ ܡܢܗܝܢ

    ܠܚܒܠܐ ܡܒܕܪܐ ܕܗܘ̣ܐ.

    ܘܗܘܘ ܐܝܟ ܕܠܐ

    ܗܘܘ܀ ܘܐܬܝܒ ܕܝܢ

    ܡܢ ܡܒܕܪܐ ܐܬܝܒ

    ܠܥܦܪܐ ܕܐܢܬܘܢ ܒܗܘ

    ܫܪܝܬܘܢ ܕܢܩܘܡܘܢ

    ܡܢܗ ܒܙܒܢܐ ܒܗܘ ܙܒܢܐ

    ܕܐܝܬ ܚܒܠܐ. ܕܐܝܬ

    ܠܡܬܪܒܘ ܓܝܪ. ܡܛܠ

    ܡܢ ܒܬܪ ܡܠܬܐ ܙܒܢܐ

    ܕܐܝܬܝܗ ܒܠܝܬ ܕܗܘ̣ܝ

    ܬܬܒܛܠ ܗܘܬ. ܐܠܐ ܠܐ

    ܢܗܘܐ ܗ̣ܘ ܗ̇ܘ ܒܢܝܢܐ.

    ܠܐ ܗܘܬ ܡܢ ܒܬܪ

    ܒܝܕ ܡܬܒܥܝܢ. ܡܣܡܟܐ

    ܟܕ ܚܪܒܐ ܥܕܡܐ ܠܙܒܢܐ.

    ܘܡܢ ܒܬܪܟܢ ܡܬܒܥܝܐ

    ܠܡܬܚܕܬܘ ܒܬܫܒܘܚܬܐ.

    ܘܡܫܬܡܠܐ ܠܥܠܡ. ܠܐ

    ܡܟܝܠ ܡܬܒܥܝܐ ܠܢ ܕܢܒܥܐ

    ܘܠܐ ܡܢܘ ܐܠܐ ܚܕܘܬܐ

    ܬܬ ܝܕܥ ܐܝܟ ܕܐܢܐ

    ܒܪܡ ܕܒܐܝܕܝ ܡܢ ܕܐܬܗܝܡ

    ܢ ܚܦܝ̈ܬܐ. ܪܒܘ ܗܘ

    ܬܘܒ. ܐܡܬܝ ܕܒܐܝܕ

    ܚܒܬܐ ܕܢܚܬܐ ܡ̣ܪܝܬܐ.

    ܗܘܝܐ ܠܐ ܬܬܗܦܟܘܢ ܒܝ

    ܒܪܡܐ ܠܡܒܛܠ ܝܘ̈ܡܝ.

    ܐܠܐ ܐܦܝܣܘܢܢܝ ܒܪܡܐ

    ܬܐ ܠܘܬܗܘܢ. ܘܐܡܪ

    ܟܕ ܐܡ̇ܪܢܐ ܠܗܘܢ ܡܠܘܗܝ

    ܘܠܝܢ ܡ̈ܠܐ. ܐܙ̇ܠܬ ܒܝ ܐܢܐ

    ܫܪܘܟ ܠܐܘܪܚܗ. ܘܟܕ ܚܙܢܝ

    ܥܡܐ ܕܐܙ̇ܠ ܐܢܐ.

    ܪܝܡܘ ܩܠܗܘܢ ܘܐܝܠܠܘ

    ܘܐܡ̇ܪܘ. ܠܐܢܫܐ ܐܙ̇ܠ

    ܬ ܠܟ ܡܢܢ ܒܪܘܟ..

    ܫܒܩܬ ܠܢ ܐܝܟ ܐܒܐ

    ܝܬܡܝ ܒܢܘ̈ܗܝ ܝܬ̈ܡܐ

    ܐܙ̇ܠ ܡܢ ܠܘܬܗܘܢ܀.

    ܘܠܝܢ ܐܢܘܢ ܦܘܩ̈ܕܢܐ

    ܦܩܕܟ ܚܒܪܟ ܐܪܡܝܐ

    ܥܡܐ ܘܐܡ̇ܪ ܠܗ̇. ܚܙܝ

    ܠܗܘܢ ܥܡܐ ܟܕ ܐܙ̇ܠ

    ܐܢܐ ܘܐܦܝ ܫܪܘܟ

    ܐܚ̈ܝ ܒܒܒܠܐ. ܘܠܝܢ ܕܢܦܠܘ'
