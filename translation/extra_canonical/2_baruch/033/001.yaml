    ܕܐܝܬܝܗ ܒܠܝܬ ܕܗܘ̣ܝ

    ܬܬܒܛܠ ܗܘܬ. ܐܠܐ ܠܐ

    ܢܗܘܐ ܗ̣ܘ ܗ̇ܘ ܒܢܝܢܐ.

    ܠܐ ܗܘܬ ܡܢ ܒܬܪ

    ܒܝܕ ܡܬܒܥܝܢ. ܡܣܡܟܐ

    ܟܕ ܚܪܒܐ ܥܕܡܐ ܠܙܒܢܐ.

    ܘܡܢ ܒܬܪܟܢ ܡܬܒܥܝܐ

    ܠܡܬܚܕܬܘ ܒܬܫܒܘܚܬܐ.

    ܘܡܫܬܡܠܐ ܠܥܠܡ. ܠܐ

    ܡܟܝܠ ܡܬܒܥܝܐ ܠܢ ܕܢܒܥܐ

    ܘܠܐ ܡܢܘ ܐܠܐ ܚܕܘܬܐ

    ܬܬ ܝܕܥ ܐܝܟ ܕܐܢܐ

    ܒܪܡ ܕܒܐܝܕܝ ܡܢ ܕܐܬܗܝܡ

