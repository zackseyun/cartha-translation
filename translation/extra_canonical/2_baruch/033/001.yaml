translation:
  text: “Are these the commands that your companion Jeremiah commanded you, saying, ‘Look after this people while I go and comfort the rest of our brothers in Babylon, those who have fallen into captivity’? And now, if you also leave us, it would be better for all of us to die before you than for you to depart from us.”
