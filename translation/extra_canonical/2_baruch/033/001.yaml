    ܫܪܘܟ ܠܐܘܪܚܗ. ܘܟܕ ܚܙܢܝ

    ܥܡܐ ܕܐܙ̇ܠ ܐܢܐ.

    ܪܝܡܘ ܩܠܗܘܢ ܘܐܝܠܠܘ

    ܘܐܡ̇ܪܘ. ܠܐܢܫܐ ܐܙ̇ܠ

