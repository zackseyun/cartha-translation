translation:
  text: '1. And the sixth bright waters that you saw—these are the time in which David
    and Solomon were born.a


    2. And at that time there came the building of Zion, and the dedication of the
    sanctuary, and the shedding of much blood of the nations that sinned then, and
    many offerings that were offered then at the dedication of the sanctuary.


    3. And peace and tranquility existed at that time.


    4. And wisdom was heard in the assembly, and the riches of understanding were
    magnified in the congregations.


    5. And the holy festivals were fulfilled with goodness and with much joy.


    6. And the judgment of the rulers was then seen to be without deceit, and the
    righteousness of the commandments of the Mighty One was accomplished in truth.


    7. And the land, because it then received mercy, and because its inhabitants did
    not sin, was glorified above all lands; and the city Zion ruled over all lands
    and regions.


    8. These are the bright waters that you saw.'
