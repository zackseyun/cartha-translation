lexical_decisions:
- source_word: ܡ̈ܝܐ ܢܗܝܪ̈ܐ
  chosen: bright waters
  alternatives:
  - clear waters
  - luminous waters
  lexicon: Payne Smith
  rationale: The vision-symbol is not merely transparent water but radiant, favorable
    water set over against the black waters. 'Bright' preserves the symbolic contrast
    without over-poetic expansion.
- source_word: ܫܠܡܐ
  chosen: peace
  alternatives:
  - well-being
  - prosperity
  lexicon: Payne Smith
  rationale: In this royal-historical setting the term carries public peace and settled
    order. 'Peace' keeps the covenantal and political sense better than a narrower
    inward reading.
- source_word: ܡܩܕܫܐ
  chosen: sanctuary
  alternatives:
  - holy place
  - temple
  lexicon: Payne Smith
  rationale: '''Sanctuary'' preserves the sacred cultic sense while avoiding forcing
    a more specific English term where the witness can speak more broadly of the consecrated
    holy place.'
- source_word: ܟܢܘܫܬܐ / ܥܕܬܐ (control-backed sense)
  chosen: assembly
  alternatives:
  - congregation
  - synagogue
  lexicon: Payne Smith
  rationale: The chapter speaks of public hearing and gathered worship. 'Assembly'
    avoids anachronistically importing later institutional overtones that 'synagogue'
    may suggest here.
- source_word: ܥܫܝܢܐ / divine title behind control witness
  chosen: the Mighty One
  alternatives:
  - the Strong One
  - God Almighty
  lexicon: Payne Smith
  rationale: The title functions as a reverent divine epithet in 2 Baruch. 'The Mighty
    One' matches the book's established diction and avoids flattening the title into
    a generic substitute.
