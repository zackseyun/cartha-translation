theological_decisions:
- issue: Whether Zion's rule here should be rendered as eschatological dominion or
    as the idealized historical high point under David and Solomon.
  chosen_reading: Historical-typological rule in the Davidic-Solomonic era, expressed
    in exalted language.
  alternative_readings:
  - A directly messianic reign statement
  - A purely metaphorical spiritual supremacy
  rationale: The chapter identifies the sixth bright waters with the time of David
    and Solomon. The language is elevated, but the referent in context is that historical
    epoch, not yet the later messianic unveiling.
