translation:
  text: 'And I, Baruch, went to the holy gate, and sat down in humility, and I wept
    and said:


    “O my eyes, become springs,

    and my eyelids a fountain of tears.

    For how can I find rest over Zion?

    How can I mourn over Jerusalem?

    For in the place where I now lie low,

    the high priest formerly offered holy sacrifices

    and set there fragrant incense.

    But now our boasting has become dust,

    and the desire of our soul, sand.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
