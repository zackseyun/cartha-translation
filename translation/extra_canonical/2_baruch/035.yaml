theological_decisions:
- issue: cultic reference in the lament
  chosen_reading: the line recalls the former temple service in concrete priestly
    terms
  alternative_readings:
  - a more generalized memory of worship at the sanctuary
  rationale: The chapter's grief is tied not only to the city in general but to the
    loss of priestly sacrifice and incense at the holy site. The translation keeps
    those sacrificial details explicit.
