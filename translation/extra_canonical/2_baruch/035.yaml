      against a control witness when available.
    reason: textual_variant
lexical_decisions:
- source_word: ܬܪܥܐ ܩܕܝܫܐ
  chosen: the holy gate
  alternatives:
  - the holy place
  - the sacred gate
  lexicon: Payne Smith
  rationale: The Syriac noun normally means 'gate' or 'door.' Because the setting
    is the ruined sanctuary precinct, 'holy gate' preserves the concrete image better
    than the smoother but less literal 'holy place.'
- source_word: ܡ̈ܟܝܟܐܝܬ
  chosen: in humility
  alternatives:
  - humbly
  - in lowliness
  lexicon: Payne Smith
  rationale: The adverb conveys abasement or lowliness. 'In humility' keeps the lament
    posture without sounding artificially archaic.
- source_word: ܡܒܘ̈ܥܐ
  chosen: springs
  alternatives:
  - fountains
  - wellsprings
  lexicon: Payne Smith
  rationale: The imagery is plural and fluid. 'Springs' is vivid and natural English
    while preserving the poetic register.
- source_word: ܐܡܘ̈ܬܐ
  chosen: eyelids
  alternatives:
  - eyesockets
  - channels
  lexicon: Payne Smith
  rationale: The control tradition supports a body-part reading here, and 'eyelids'
    fits the lament image of tears most plausibly.
- source_word: ܐܬܬܢܝܚ
  chosen: find rest
  alternatives:
  - be comforted
  - be at ease
  lexicon: Payne Smith
  rationale: 'The verb retains the sense of repose or relief. ''Find rest'' preserves
    the emotional tension: Baruch cannot settle or be eased because of Zion.'
- source_word: ܐܒܠܐ
  chosen: Jerusalem
  alternatives:
  - mourning
  - lamentation
  lexicon: Payne Smith
  rationale: The visible OCR here is unstable. The wider chapter tradition strongly
    points to a Zion/Jerusalem parallelism, so 'Jerusalem' is adopted in the main
    text, but the uncertainty is disclosed in a footnote.
