translation:
  text: And after these things I saw that the cedar was burning, and the forest that was around it, and the vine was growing, and the plain around it was full of unfading flowers. And I awoke and arose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And they brought the cedar that had been thrown down near it. And I saw, and behold, the vine opened its mouth and said to the cedar, “Are you not that cedar which was left from the forest of wickedness? By your hands wickedness was kept in being and wrought through all those years, and goodness was not found. What was not yours you kept seizing, and what was yours you never pitied. You stretched out your hand to those far away, and those who came near you, you caught in the snares of your evil. And your soul was exalted at all times, as though you could not be uprooted. But now your time has hastened, and your hour has come. So go also, O cedar, after the forest that went before you, and become dust with it, and let your ashes be mingled together. And now lie down in anguish, and rest in torment until your last time comes, when you shall return again and be tormented yet more.”'.
    reason: previous_rendering
