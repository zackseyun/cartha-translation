lexical_decisions:
- source_word: ܐܪܙܐ
  chosen: cedar
  alternatives:
  - cedar tree
  lexicon: Payne Smith
  rationale: The symbolic tree remains specific and regal in the vision; 'cedar' preserves that force without padding.
- source_word: ܥܒܐ ܕܒܝܫܬܐ
  chosen: the forest of wickedness
  alternatives:
  - the wicked forest
  - the forest of evil
  lexicon: Payne Smith
  rationale: The genitive is best kept explicit. This preserves both the image and the moral charge of the vision.
- source_word: ܒܐܝܕܝܟ
  chosen: By your hands
  alternatives:
  - By means of you
  - Through you
  lexicon: Payne Smith
  rationale: The Syriac imagery is concrete. 'By your hands' keeps the accusation vivid and judicial.
- source_word: ܟܣܝ̈ܬܝܬܐ
  chosen: the snares of your evil
  alternatives:
  - the nets of your wickedness
  - the hidden traps of your evil
  lexicon: Payne Smith
  rationale: The line appears to describe entangling devices or traps. 'Snares' gives natural English while preserving the predatory image.
- source_word: ܬܬܚܒܠ / ܬܫܢܝܩܐ
  chosen: rest in torment
  alternatives:
  - be laid up in suffering
  - take your repose in anguish
  lexicon: Payne Smith
  rationale: The speech is a doom oracle, not consolation. 'Torment' should remain sharp and unsmoothed.
theological_decisions:
- issue: Whether to identify the vine directly as the Messiah in the main text
  chosen_reading: The speaker remains 'the vine' in the chapter’s English rendering.
  alternative_readings:
  - Render the speaker as 'the Messiah' already here
  - Capitalize or overtly interpret the figure in the speech itself
  rationale: The interpretation belongs to the following chapter. Keeping the figure within the vision preserves narrative sequence and avoids importing the explanation too early.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: How strongly to render the judgment language at the close
  chosen_reading: The cedar is told to 'rest in torment' and later 'be tormented yet more.'
  alternative_readings:
  - Soften to 'suffer' or 'be distressed'
  - Generalize into non-penal misery
  rationale: The Syriac rhetoric is punitive and apocalyptic. Softening it would mute the judicial force of the oracle.
