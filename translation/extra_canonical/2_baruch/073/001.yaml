lexical_decisions:
- source_word: ܢܫܬܠܡܘܢ ܝܘܡܝܗܘܢ
  chosen: their days will be brought to completion / no one will die before his time
  alternatives:
  - their days will be fulfilled
  - their days will be completed
  lexicon: Payne Smith
  rationale: The idiom points to a full, proper span of life, which fits the immediate
    contrast with premature death.
- source_word: ܛܠܐ
  chosen: dew
  alternatives:
  - mist
  lexicon: Payne Smith
  rationale: The restoration image is agricultural and life-giving; 'dew' best preserves
    the apocalyptic freshness of the line.
- source_word: ܒܒܘܣܡܐ / difficult line controlled by Kmosko
  chosen: healing will descend in dew
  alternatives:
  - health will appear with the dew
  - dew will descend in sweetness
  lexicon: Payne Smith
  rationale: The Ceriani line is difficult and the codex note marks it as problematic;
    Kmosko's control strongly supports the sense of healing/health descending in dew.
- source_word: ܡܘܪܢܐ
  chosen: anxiety
  alternatives:
  - care
  - solicitude
  lexicon: Payne Smith
  rationale: A mental burden is in view, paired with distress and groaning rather
    than bodily disease alone.
- source_word: ܡܕ̈ܝܢܝܘܬܐ
  chosen: accusations
  alternatives:
  - litigations
  - legal claims
  lexicon: Payne Smith
  rationale: The cluster is judicial-social; 'accusations' is natural English and
    preserves the forensic sense.
- source_word: ܬܒ̈ܥܬܐ
  chosen: retaliations
  alternatives:
  - vengeances
  - claims
  lexicon: Payne Smith
  rationale: In this vice-list the sense is not neutral legal petitioning but hostile
    requital.
- source_word: ܪ̈ܓܝܓܬܐ
  chosen: cravings
  alternatives:
  - lusts
  - desires
  lexicon: Payne Smith
  rationale: '''Cravings'' keeps the moral edge without importing narrowly sexual
    meaning.'
- source_word: ܠܚܘܝܒܐ ܢܬ̈ܪܝܡܢ
  chosen: will pass away into condemnation
  alternatives:
  - will be taken off to judgment
  - will be removed for condemnation
  lexicon: Payne Smith
  rationale: The phrase conveys both removal and punitive disposal; 'pass away into
    condemnation' preserves both movements in idiomatic English.
theological_decisions:
- issue: Whether the passage speaks of the Messiah's reign or only a general final
    peace
  chosen_reading: The opening is rendered explicitly as the reign of the Messiah over
    his kingdom.
  alternative_readings:
  - A more generic final-age enthronement
  rationale: The chapter stands immediately after 72, where 'the time of my Messiah'
    is explicit in the control witness; chapter 73 continues that same scene.
- issue: Whether death itself ceases entirely in this chapter
  chosen_reading: The text says premature death ceases, not death in every possible
    sense.
  alternative_readings:
  - Absolute abolition of death at this stage
  rationale: The Syriac focuses on dying 'not in one's time'; the promise is ordered
    lifespan and peace, not yet a fully explicit resurrection formula.
- issue: Status of the scene in salvation history
  chosen_reading: This is rendered as a messianic-age restoration scene prior to the
    wider consummation of the book.
  alternative_readings:
  - Immediate equation with the eternal state
  rationale: 'The sequence in 2 Baruch distinguishes stages within the end: messianic
    peace first, then later consummative developments.'
