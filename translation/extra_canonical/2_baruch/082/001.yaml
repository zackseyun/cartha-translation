translation:
  text: "For now we see the abundance of the prosperity of the nations while they act wickedly, but they are compared to spittle. We look on the force of their power, but they will be reckoned as a passing vapor. We consider the glory of their greatness, though they do not keep the commandments of the Mighty One, but have treated them with contempt. And we consider the beauty that is seen, though it is shaken in afflictions; but they will be sought out like flesh in pain. We think on the confidence in which they trust, though before our eyes it is shaken; but they will be crushed like a wave. And we seek only the hope of their strength, though it flourishes in the good things God gave them; but it will be laid away, and lamentation will come upon it.\n\nFor the Most High is indeed hastening his times and bringing near his hours. He will judge those who oppress, and the heraldings of the age will go forth. The hidden things of all their sins will be revealed, and the quiet thoughts of what is right will spring forth. Those who now think they can escape will not be able to save themselves, nor will anyone make a covenant with famine by abundance of food. The humble will not place their hope in prosperity; rather, their heart will be one in those things that endure. Instead, they will hope all the more because that fearsome end has arrived. They will not look on the delights of the present age, and they will know only that they are being brought to the end. But the consummation of the world will show the great strength of his governance, when everything enters what is inward and returns to what from the beginning had been appointed. Then it will be seen that what has been found was not established by men, but has truly reached its completion.\n\nFor whatever stood, or was made, or came in conflict and passed away, shows this: evil is not forever evil, and good is not forever good. Every health is turned into sickness, every strength into weakness, every beauty into deformity, and all the bloom of youth into burdened old age. All the beauty you saw turns into darkness and corruption, and every ruin you made turns into peace and pleasantness. Every darkness that had been given turns into the light of truth. Every error and weakness turns into the lowliness of stillness. Every vengeance and wrath turns into rest and strength. And every voice of the wakeful turns into dust-born silence.\n\nAnd no possession will again be a return to death for those who seek it. Those who snatch wages will no longer bring forth death before its time, and the death that is the wage of sufferings will be taken away. There will no longer be any occasion of joy merely for delight. The realm of change will be turned into accomplished conflict, and the sound of sinners in Sheol will no longer be heard.\n\nSo when all these things happen, do you think they will not be required from the inhabitants of the earth on one day? If then their own disclosures show that they live, their guilt itself teaches the falsehood that is in them. I have set down its full measure, because they were begotten from falsehood before I die. And I said that they were putting their trust in evil. Moses"
  philosophy: optimal-equivalence
