lexical_decisions:
- source_word: ܡܫܬܠܡܐ
  chosen: will be delivered up
  alternatives:
  - will be handed over
  - will be given over
  lexicon: Payne Smith
  rationale: The verb signals temporary surrender to judgment rather than annihilation.
    “Delivered up” preserves that juridical-apocalyptic force.
- source_word: ܡܬܕܒܪ ܫܒܝܐ
  chosen: will be led away into captivity
  alternatives:
  - will be carried off captive
  - will be conducted in exile
  lexicon: Payne Smith
  rationale: The phrase is more concrete than a general ‘chastened’; it depicts the
    people being carried into exile.
- source_word: ܥܠܡܐ ܠܐ ܡܬܬܢܫܐ
  chosen: the world will not be forgotten
  alternatives:
  - the age will not be forgotten
  - the world will not be abandoned to oblivion
  lexicon: Payne Smith
  rationale: The line answers Baruch’s fear of cosmic collapse. “Forgotten” keeps
    the Syriac image without over-expanding it.
- source_word: ܡܕܝܢܬܐ
  chosen: city
  alternatives:
  - Jerusalem
  - Zion
  lexicon: Payne Smith
  rationale: The text itself says ‘city’; retaining it lets the theological identification
    emerge from context rather than being forced into the main line.
- source_word: ܐܬܟܢ ܡܢܩܕܡ
  chosen: was prepared beforehand
  alternatives:
  - was made ready beforehand
  - was established in advance
  lexicon: Payne Smith
  rationale: This preserves the motif of a pre-prepared heavenly/eschatological reality
    known to God before its historical disclosure.
- source_word: ܦܪܕܝܣܐ
  chosen: Paradise
  alternatives:
  - garden
  lexicon: Payne Smith
  rationale: ‘Paradise’ fits the apocalyptic register and matches the interwoven Adamic
    symbolism better than the flatter ‘garden.’
- source_word: ܒܝܢܬ ܦܓܪ̈ܐ ܕܕܒܚܐ
  chosen: between the pieces of the sacrifice
  alternatives:
  - between the divided victims
  - among the parts of the offering
  lexicon: Payne Smith
  rationale: This wording preserves the covenantal allusion to Abraham’s night vision
    without paraphrasing it away.
theological_decisions:
- issue: Identity of the city
  chosen_reading: The passage distinguishes the presently visible Jerusalem from a
    city prepared beforehand by God and later to be revealed.
  alternative_readings:
  - The text refers only to the earthly city in idealized terms
  - The line speaks merely of Jerusalem’s rebuilding after exile
  rationale: The Syriac contrast between ‘this building now in your midst’ and the
    city ‘prepared beforehand’ points to a transcendent or pre-prepared reality, not
    simply the current ruined city.
  doctrine_reference: heavenly/prepared Jerusalem motif
- issue: Scope of divine judgment
  chosen_reading: Jerusalem’s fall and the people’s captivity are temporary acts of
    judgment, not the undoing of creation or covenant history.
  alternative_readings:
  - The destruction implies total cosmic abandonment
  - The exile is final and unqualified
  rationale: ‘For a time’ and ‘the world will not be forgotten’ frame the catastrophe
    as severe but not ultimate.
  doctrine_reference: divine judgment with remembered mercy
