translation:
  text: And he answered and said to me, “Because you have prayed that I show you what will happen to you after these things, for this reason I have shown you this vision, that you may see what will happen to you after these things. For you shall surely depart from this earth—but not unto death; rather, you shall be kept for the appointed times. Therefore go up to the summit of that mountain, and the regions of that land shall pass before you, and the form of the inhabited world, and the tops of the mountains, and the depths of the valleys, and the depths of the seas, and the number of the rivers, so that you may see what you are leaving and where you are going. And this shall be after forty days. Go therefore now, during these days, and instruct the people as much as you are able, so that they may learn, lest they die at the last time, but may learn so that they may live at the last time.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And he answered and said to me, “Because you have asked me to show you what has happened and what is made, a superior lesson of understanding has been shown to you, concerning what is to be after these things.\nFor the time has come when Adam was created. But before that, there was no death; rather, afterward, sin came, and the body was filled with evil, and the first garment was taken away, and sickness came, and anguish, and pain, and labor in toil began, and many troubling thoughts were completed. And to the first Adam were assigned many days, but short years.\nThese things therefore I have said to you, that you may instruct the people as much as you are able, so that their God may not cause them to die in the last time, but that they may learn so that they may live in the last time.”'.
