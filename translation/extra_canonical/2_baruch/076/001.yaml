lexical_decisions:
- source_word: ܓܠܝܢܐ
  chosen: revelation
  alternatives:
  - disclosure
  - unveiling
  lexicon: Payne Smith
  rationale: The term denotes an uncovering or making-known. 'Revelation' fits apocalyptic context and preserves the elevated register.
- source_word: ܢܓܕܫ
  chosen: will happen
  alternatives:
  - will befall
  - will come upon
  lexicon: Payne Smith
  rationale: A straightforward future-event verb. 'Will happen' is clear English without weakening the predictive force.
- source_word: ܡܫܢܐ / ܡܢ ܗܕܐ ܐܪܥܐ
  chosen: depart from this earth
  alternatives:
  - be taken from this earth
  - pass from this earth
  lexicon: Payne Smith
  rationale: The sense is removal from earthly life. 'Depart' keeps the solemn tone while avoiding over-reading the manner of departure.
- source_word: ܠܢܛܘܪܐ ܕܙܒܢ̈ܐ
  chosen: be kept for the appointed times
  alternatives:
  - be preserved for the times
  - be reserved until the times
  lexicon: Payne Smith
  rationale: Literally the phrase points to being kept or guarded for 'the times.' 'Appointed times' makes the eschatological force clearer without importing extra wording.
- source_word: ܦܢܝ̈ܬܗ̇
  chosen: regions
  alternatives:
  - quarters
  - districts
  lexicon: Payne Smith
  rationale: The word refers to the various parts or quarters of the land. 'Regions' is idiomatic and broad enough for the visionary panorama.
- source_word: ܬܒܝܠ
  chosen: inhabited world
  alternatives:
  - world
  - earth
  lexicon: Payne Smith
  rationale: This term commonly denotes the habitable world rather than the physical globe in abstraction. 'Inhabited world' preserves that nuance.
- source_word: ܙܒܢܐ ܐܚܪܝܐ
  chosen: the last time
  alternatives:
  - the final time
  - the end time
  lexicon: Payne Smith
  rationale: The Syriac is singular here. 'The last time' keeps the wording transparent and preserves the eschatological solemnity.
theological_decisions:
- issue: Baruch’s removal from earth in v.2
  chosen_reading: The text is rendered as a departure 'not unto death' but as being 'kept for the appointed times.'
  alternative_readings:
  - preserved until the consummation of the times
  - taken up without dying
  rationale: The Syriac explicitly denies ordinary death and affirms preservation for a future divine time, but it does not require a fuller doctrinal paraphrase beyond that.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Eschatological wording in v.5
  chosen_reading: Both occurrences of ܙܒܢܐ ܐܚܪܝܐ are rendered 'the last time.'
  alternative_readings:
  - the last times
  - the end
  rationale: The supplied Syriac chapter edge presents the phrase in the singular. Retaining that singular avoids importing the more familiar pluralized wording found in some secondary renderings.
  doctrine_reference: Ceriani primary-witness priority
