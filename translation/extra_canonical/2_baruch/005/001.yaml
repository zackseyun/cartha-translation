translation:
  text: '1 And I said, “And I said, “So then, I have hoped in vain, and in vain was
    Zion built. For if those who hate us have taken possession of her, what will you
    do for your great name?””


    2 And the Lord said to me, “My name and my glory endure forever; but my judgment
    keeps its own right in its time.


    3 And you will see with your eyes that it is not the enemies who overthrow Zion,
    nor burn Jerusalem, but that they are serving judgment for a time.


    4 But you, go and do whatever I have told you.”


    5 And I went and took Jeremiah and Addo and Seraiah and Jabish and Gedaliah and
    all the honorable men of the people, and I brought them to the valley of Kidron,
    and I told them everything that had been said to me.


    6 And they lifted up their voices, and they all wept. And we sat there and fasted
    until evening.'
  philosophy: optimal-equivalence
