lexical_decisions:
- source_word: ܡܫܬܠܡܐ
  chosen: given over / delivered up
  alternatives:
  - completed
  - handed over
  lexicon: Payne Smith
  rationale: In context the city is not being 'completed' but handed over to destruction/judgment.
- source_word: ܡܬܬܢܫܐ
  chosen: be forgotten
  alternatives:
  - be abandoned
  - be neglected
  lexicon: Payne Smith
  rationale: The line contrasts temporal devastation with God's enduring purpose for
    the world/order; 'forgotten' preserves the idiom without overstating metaphysics.
- source_word: ܙܕܩܗ
  chosen: its own right
  alternatives:
  - its justice
  - its righteousness
  lexicon: Payne Smith
  rationale: Here the sense is juridical claim/right preserved by divine judgment,
    not merely abstract moral righteousness.
- source_word: ܡ̇ܫܡܫܝܢ ܒܙܒܢܐ
  chosen: serving judgment for a time
  alternatives:
  - ministering to the sentence for a season
  - serving the judgment temporarily
  lexicon: Payne Smith
  rationale: 'This keeps the instrumental sense: the invaders function as servants
    of God''s judgment rather than independent sovereign actors.'
- source_word: ܩܕܪܘܢ / Cedron-Kidron tradition
  chosen: Kidron
  alternatives:
  - Cedron
  lexicon: proper name
  rationale: Kidron is the standard English biblical form, though older witnesses
    often reflect Cedron.
theological_decisions:
- issue: The status of Zion/Jerusalem in the chapter
  chosen_reading: The destroyed earthly city is distinguished from the divinely prepared
    reality spoken of just before this chapter; chapter 5 continues that logic without
    collapsing them.
  alternative_readings:
  - The passage refers only to the earthly city
  - The passage identifies the present city straightforwardly with the eternal one
  rationale: The immediate context in ch. 4 speaks of a city prepared beforehand and
    only later revealed. Chapter 5 therefore treats Jerusalem's fall within that broader
    heavenly-preparatory frame.
- issue: Agency in Jerusalem's destruction
  chosen_reading: The enemy armies are instruments of divine judgment, not ultimate
    possessors of power over Zion.
  alternative_readings:
  - The enemies independently destroy Zion
  - The text denies any real enemy action at all
  rationale: 'Verse 3 explicitly redirects causation: the enemies do burn and overthrow
    in history, yet they do so as servants of a prior divine judgment.'
