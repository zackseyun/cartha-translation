lexical_decisions:
- source_word: ܘܥܢܐ
  chosen: And he answered
  alternatives:
  - And he replied
  - Then he answered
  lexicon: Payne Smith
  rationale: The standard narrative reply formula is preserved plainly, without heightening the tone beyond the Syriac.
- source_word: ܡܛܠ ܗܢܐ
  chosen: Because of this
  alternatives:
  - For this reason
  - On account of this
  lexicon: Payne Smith
  rationale: This keeps the causal linkage explicit and prepares for the explanation that follows.
- source_word: ܒܗܘ ܙܒܢܐ
  chosen: at that time
  alternatives:
  - in that time
  - then
  lexicon: Payne Smith
  rationale: The temporal phrase is kept slightly formal to match the apocalyptic register and avoid flattening it into a mere discourse particle.
- source_word: ܐܡܝܪ
  chosen: it was said
  alternatives:
  - it was spoken
  - one said
  lexicon: Payne Smith
  rationale: A passive rendering best preserves the visible Syriac while avoiding an unwarranted specification of the speaker in this truncated opening clause.
theological_decisions:
- issue: Speaker attribution in the opening clause
  chosen_reading: The reply is rendered as a direct continuation of the revealed dialogue without specifying more than the Syriac states.
  alternative_readings:
  - The clause could be expanded interpretively as a divine pronouncement.
  - It could be paraphrased more loosely as a general explanation.
  rationale: The preserved text only gives the reply formula and the beginning of the explanation, so the translation stays restrained.
