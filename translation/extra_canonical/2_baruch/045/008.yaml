  from: were sought out in vanities
  to: sought out vanities
  rationale: The passive construction 'were sought out in vanities' is highly awkward in English and obscures the likely intended meaning of the subjects actively pursuing or occupying themselves with vain things. If the underlying Syriac verb is an Ethpeel/Ethpaal, it often carries a reflexive or middle sense (e.g., 'occupied themselves with' or 'sought after') rather than a strict passive.
- timestamp: '2026-04-28T07:48:00Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_gap_closure_2026_04/extra_canonical/2_baruch/045/008.job-75745.json
  category: awkward_english
  from: did not spare mercy
  to: did not show mercy
  rationale: The phrase 'spare mercy' is an unnatural English collocation. In this context of listing the failures of the wicked, it almost certainly means they failed to act mercifully or did not show mercy to others.
