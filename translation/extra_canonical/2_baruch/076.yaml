  from: So now, during these days, instruct
  to: Go therefore now, during these days, and instruct
  rationale: 'Adjudicator-modified: The reviewer correctly identifies that the Syriac text includes the imperative ܙܠ (''Go'') and the particle ܗܟܝܠ (''therefore''), which are omitted in the current translation. The word ܝܘܡܢܐ literally means ''today'' but frequently functions as ''now,'' which reads more naturally in English alongside ''during these days'' (ܒܝܘܡܬܐ ܗܠܝܢ) than the redundant ''today, during these days.'' Modifying the proposal to use ''now'' preserves the exact source grammar while maintaining English readability.'
