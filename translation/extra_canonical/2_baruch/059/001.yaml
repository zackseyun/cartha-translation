  category: mistranslation
  from: the measure of humanity
  to: the law of humanity
  rationale: The Syriac word ܢܘܡܫܐ (a variant/misspelling of ܢܘܡܣܐ, nomos) means 'law', 'norm', or 'rule'. While the verb is 'measured', translating the noun itself as 'measure' is a mistranslation that obscures the source text's meaning. The lexical decision acknowledges 'norm' but incorrectly chooses 'measure' for stylistic fit.
- timestamp: '2026-04-28T07:48:00Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_gap_closure_2026_04/extra_canonical/2_baruch/059/001.job-75857.json
  category: mistranslation
  from: gathered beforehand
  to: gathered in Eden
  rationale: The Syriac word ܒܥܕܢ (b-`eden) means 'in Eden', which perfectly fits the context of Adam. Translating it as 'beforehand' (likely misreading it as b-`eddan, 'in time') misses this clear geographical and theological reference.
- timestamp: '2026-04-28T07:48:00Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_gap_closure_2026_04/extra_canonical/2_baruch/059/001.job-75857.json
  category: lexical
  from: the last time
  to: the last day
  rationale: The Syriac word ܝܘܡܐ (yoma) means 'day', not 'time' (which would be ܙܒܢܐ, used later in the same sentence). Translating it as 'time' loses the specific eschatological nuance of 'the last day'.
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/2_baruch/059/001.job-77324.json
  category: mistranslation
  from: the bitter living
  to: the fierce beasts
  rationale: The Syriac word ܚܝܘܬܐ (ḥaywāthā) means 'beasts' or 'animals', not 'living' (which would be an abstract noun or adjective). Combined with ܡܪܝܪܬܐ (mrīrāthā, 'bitter' or 'fierce'), it refers to the 'fierce beasts' or 'venomous beasts' shown to Adam in his vision, not 'the bitter living'.
