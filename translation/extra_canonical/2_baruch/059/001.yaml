lexical_decisions:
- source_word: ܩܘܝܡܐ ܕܥܠܡܐ
  chosen: the structure of the world
  alternatives:
  - the beginning of the world
  - the establishment of the world
  - the world's foundation
  lexicon: Payne Smith
  rationale: The phrase denotes the world's standing-forth or established frame. 'Structure' keeps the concrete creational sense while fitting the context of something small that then becomes ordered.
- source_word: ܚܛܗܐ / ܡܬܒܪܝܢܘܬܐ
  chosen: the first sin, the transgression
  alternatives:
  - the first offense
  - the overstepping
  lexicon: Payne Smith
  rationale: The double expression heightens Adam's primal offense. Rendering both terms preserves the emphatic, foundational character of the act.
- source_word: ܐܬܬܙܝܥ ܡܘܬܐ
  chosen: death was stirred up
  alternatives:
  - death was awakened
  - death was set in motion
  lexicon: Payne Smith
  rationale: The verb suggests activation rather than mere existence. The text presents death as being set into operation through Adam's sin.
- source_word: ܪܘܪܒܘܬܐ ܫܪܝܬ ܕܬܡܘܟ
  chosen: greatness began to be brought low
  alternatives:
  - majesty began to sink
  - greatness began to be humbled
  lexicon: Payne Smith
  rationale: This preserves both the inception marker ('began') and the downward movement after the fall.
- source_word: ܢܘܡܫܐ ܕܐܢܫܘܬܐ
  chosen: the measure of humanity
  alternatives:
  - the norm of humanity
  - the rule of humankind
  lexicon: Payne Smith
  rationale: In context with time being examined and strength being tested, an evaluative 'measure' fits better than a legal 'law'.
- source_word: ܫܘܒܩܢܐ ܕܡ̈ܝܬܐ
  chosen: the release of the dead
  alternatives:
  - the remission of the dead
  - the sending-away of the dead
  lexicon: Payne Smith
  rationale: The clause is difficult, so a relatively literal rendering is best. 'Release' preserves the imagery without over-deciding the exact doctrinal nuance.
- source_word: ܡܚܝܒܢܘܗܝ
  chosen: made liable
  alternatives:
  - made guilty
  - brought under obligation
  lexicon: Payne Smith
  rationale: The term carries judicial force. 'Liable' preserves incurred culpability more precisely than the broader 'guilty'.
- source_word: ܐܣܛܘܟܣܐ
  chosen: the elements
  alternatives:
  - the elemental powers
  - the rudiments
  lexicon: Payne Smith
  rationale: This Greek loanword most naturally refers to cosmic elements. 'Elements' is clear and minimally interpretive.
theological_decisions:
- issue: Adam's act and the onset of death
  chosen_reading: The text links Adam's first transgression with death being activated before its appointed time.
  alternative_readings:
  - The line could be softened to say only that death became known
  - The clause could be read as purely rhetorical, not causal
  rationale: The Syriac presents Adam's sin as the decisive trigger for death, mourning, pain, and toil. The rendering preserves that causal apocalyptic theology without importing later doctrinal expansions.
  doctrine_reference: 'Cartha project doctrine: preserve original-witness theological force without smoothing'
- issue: The liability of the angels
  chosen_reading: The draft retains the difficult statement that Adam also made the angels liable.
  alternative_readings:
  - The line may reflect a disturbed text
  - The liability could be limited to heavenly witnesses rather than angelic guilt proper
  rationale: The wording is compressed and difficult, but the Syriac as transmitted attributes some form of liability to angels in relation to Adam's case. The translation keeps that claim visible rather than dissolving it.
  doctrine_reference: 'Cartha project doctrine: transparency where the source is difficult'
- issue: The release of the dead
  chosen_reading: The phrase is left deliberately literal as 'the release of the dead.'
  alternative_readings:
  - resurrection of the dead
  - remission concerning the dead
  rationale: The Syriac does not warrant a more dogmatically specific term with confidence. A literal rendering keeps the theological possibility open while remaining auditable.
  doctrine_reference: 'Cartha project doctrine: prefer honesty over false exactness'
