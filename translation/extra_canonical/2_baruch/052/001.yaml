translation:
  text: For the earth will then certainly give back the dead whom it now receives, just as they are, changing nothing in their form; as it received them, so it will restore them, and as I delivered them to it, so it will raise them.
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: ܡܦܩܢܗ / ܡܩܝܡܐ
  chosen: give back / restore / raise
  alternatives:
  - bring out
  - produce again
  - set up again
  lexicon: Payne Smith
  rationale: The paired verbs describe the dead being returned in continuity with what was received and then raised. English uses a small cluster ('give back ... restore ... raise') to preserve both restitution and resurrection force.
- source_word: ܒܨܘܪܬܗܘܢ
  chosen: in their form
  alternatives:
  - in their appearance
  - in their shape
  lexicon: Payne Smith
  rationale: The context stresses continuity of recognizable identity before later transformation. 'Form' keeps the wording broad enough to include bodily appearance without over-specifying physiology.
- source_word: ܐܙܕܩܘ
  chosen: were justified
  alternatives:
  - were vindicated
  - were shown righteous
  lexicon: Payne Smith
  rationale: The passage contrasts the condemned with the righteous in eschatological judgment. 'Were justified' preserves the judicial nuance better than a merely social 'were honored.'
- source_word: ܫܘܒܠܐ
  chosen: understanding
  alternatives:
  - discernment
  - intelligence
  lexicon: Payne Smith
  rationale: In the wisdom list it denotes moral-spiritual discernment exercised in life. 'Understanding' fits the wisdom context and reads naturally beside wisdom and hope.
- source_word: ܥܩܪܐ ܕܚܟܡܬܐ
  chosen: the root of wisdom
  alternatives:
  - wisdom's root
  - a root of wisdom
  lexicon: Payne Smith
  rationale: The agricultural metaphor should remain visible. It signals an inwardly planted and life-giving principle, not merely acquired information.
- source_word: ܥܠܡܐ ܕܠܐ ܡܐ̇ܬ
  chosen: the world that does not die
  alternatives:
  - the undying world
  - the incorruptible age
  lexicon: Payne Smith
  rationale: A deliberately vivid rendering preserves the apocalyptic contrast with the present dying age. 'Undying world' is possible, but the fuller wording keeps the metaphor transparent.
- source_word: ܡܬܚܫܒܝܢ
  chosen: are reckoned
  alternatives:
  - are counted
  - are considered
  lexicon: Payne Smith
  rationale: 'The passive sense fits the judicial atmosphere: the wicked are counted among ''heaps of sins.'' ''Reckoned'' keeps the evaluative force without flattening it.'
- source_word: ܦܠܝ̈ܛܘܗܝ ܕܦܪܕܝܣܐ
  chosen: the expanses of Paradise
  alternatives:
  - the regions of Paradise
  - the broad reaches of Paradise
  lexicon: Payne Smith
  rationale: The image is spatial and visionary. 'Expanses' preserves the sense of opened breadth before the righteous.
- source_word: ܡܬܚܙܝܐ ... ܝܬܝܪ ܡܢ ܕܡܠܐܟ̈ܐ
  chosen: the excellence of the righteous will be greater than that of the angels
  alternatives:
  - the righteous will appear more glorious than the angels
  - their splendor will surpass the angels
  lexicon: Payne Smith
  rationale: The Syriac and Kmosko control point to comparative superiority. 'Excellence' avoids importing a narrower merely visual sense while still allowing glory to be included.
theological_decisions:
- issue: Continuity between the present body and the resurrected person
  chosen_reading: 'The text teaches continuity of identity: the dead are returned ''as received,'' without loss of recognizability, before later differentiation in glory or horror.'
  alternative_readings:
  - A purely spiritual resurrection with no continuity of form
  - A merely symbolic recognition scene
  rationale: The repeated emphasis on receiving, restoring, raising, and mutual recognition strongly favors continuity of personhood and recognizable form.
  doctrine_reference: Translation philosophy; bodily continuity without over-defining mechanics
- issue: Status of the righteous relative to angels
  chosen_reading: The righteous are depicted as surpassing angels in excellence at the consummation.
  alternative_readings:
  - They merely become angel-like but not greater
  - Only their appearance, not status, exceeds angelic glory
  rationale: Both the Syriac comparative phrasing and the Kmosko control witness support a real comparison in favor of the righteous, not mere similarity.
  doctrine_reference: Eschatological exaltation of the righteous
- issue: Ground of deliverance in 'delivered by their works'
  chosen_reading: The phrase is retained as written, with works presented as the lived expression of fidelity within this chapter's wisdom-law framework.
  alternative_readings:
  - Works as autonomous merit apart from God's judgment
  - A weakened paraphrase that removes works language
  rationale: The Syriac explicitly mentions deliverance in relation to works, yet the broader passage also frames hope, wisdom, law, and divine revelation together. The translation keeps the works-language without forcing a later systematic scheme onto it.
  doctrine_reference: Transparent rendering over doctrinal harmonization
