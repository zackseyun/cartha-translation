    6 But the glory of those who were justified in their time, and those who had understanding in their life, and those who planted in their heart the root of wisdom—

    7 then their splendors will awake, and the form of their faces will shine with the light of their beauty, so that they may acquire and receive the world that does not die, which is promised to them.

    8 But they will especially be confounded—those who rejected the law and stopped their ears so as not to hear wisdom and not to receive understanding—

    9 when they see that those whom they now count as nothing are at rest and glorified with the angels,

    10 while they themselves are reckoned among the heaps of sins, and the evil of their forms wastes away still more. For first they see, and afterward they go away to be tormented.

    11 But for those who were delivered by their works, and for whom the law was hope, and understanding expectation, and wisdom confidence, and endurance strength,

