    ܡܬܝܗܒܝܢ ܒܥܦܪܐ

    ܘܐܡܪܝܢ ܗܘܘ ܓܝܪ

    ܕܡܦܩܐ ܐܢܬܝܢ ܡܢܗܝܢ

    ܠܚܒܠܐ ܡܒܕܪܐ ܕܗܘ̣ܐ.

    ܘܗܘܘ ܐܝܟ ܕܠܐ

    ܗܘܘ܀ ܘܐܬܝܒ ܕܝܢ

    ܡܢ ܡܒܕܪܐ ܐܬܝܒ

    ܠܥܦܪܐ ܕܐܢܬܘܢ ܒܗܘ

    ܫܪܝܬܘܢ ܕܢܩܘܡܘܢ

