translation:
  text: “Are these the commands that your companion Jeremiah the prophet gave you,
    saying, ‘Look after this people until I go and prepare the rest of our brothers
    in Babylon, those against whom the sentence has gone out that they should be taken
    away captive’? And now, if you also leave us, it would be better for all of us
    to die before you than for you to withdraw from us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The chapter boundary here is medium-confidence. Ceriani page 209 overlaps
      the end of chapter 32 and the start of chapter 33, so the exile clause is translated
      with modest caution at the page edge.
    reason: textual_variant
lexical_decisions:
- source_word: ܦܘܩ̈ܕܢܐ
  chosen: commands
  alternatives:
  - injunctions
  - orders
  lexicon: Payne Smith
  rationale: The noun naturally denotes directives or charges. “Commands” is plain
    English and preserves the force of the people’s appeal.
- source_word: ܚܒܪܟ
  chosen: your companion
  alternatives:
  - your associate
  - your friend
  lexicon: Payne Smith
  rationale: The word marks Jeremiah as Baruch’s close associate. “Companion” fits
    the relational sense without sounding overly casual.
- source_word: ܫܪܘܟ
  chosen: withdraw from us
  alternatives:
  - depart from us
  - leave us
  lexicon: Payne Smith
  rationale: The people’s complaint is not mere travel but abandonment. “Withdraw
    from us” preserves that emotional force; “leave us” is also used earlier in the
    verse for variation and clarity.
- source_word: ܐܚ̈ܝ
  chosen: our brothers
  alternatives:
  - our brethren
  lexicon: Payne Smith
  rationale: The Syriac idiom is familial and communal. “Our brothers” is natural
    modern English while keeping the covenantal kinship sense.
- source_word: ܕܢܦܠܘ ...
  chosen: the sentence has gone out that they should be taken away captive
  alternatives:
  - it has been decreed that they should go into captivity
  lexicon: Payne Smith
  rationale: The page edge is slightly unstable, but the clause clearly refers to
    an issued decree/judgment concerning exile. This rendering preserves that juridical
    sense without pretending the damaged boundary is perfectly certain.
