    ܒܪܡܐ ܠܡܒܛܠ ܝܘ̈ܡܝ.

    ܐܠܐ ܐܦܝܣܘܢܢܝ ܒܪܡܐ

    ܬܐ ܠܘܬܗܘܢ. ܘܐܡܪ

