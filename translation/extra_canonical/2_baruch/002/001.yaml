lexical_decisions:
- source_word: ܐܝܠܝܢ ܕܕܡ̇ܝܢ ܠܟܘܢ
  chosen: all who are like you
  alternatives:
  - those like you
  - those who resemble you
  lexicon: Payne Smith
  rationale: The phrase marks Jeremiah and a like-minded circle rather than a vague
    crowd, so the rendering keeps the comparison personal and concrete.
- source_word: ܕܬܚܙܘܢ ܠܟܘܢ ܡܢ ܗܕܐ ܡܕܝܢܬܐ
  chosen: to leave this city
  alternatives:
  - to withdraw from this city
  - to remove yourselves from this city
  lexicon: Payne Smith
  rationale: The idiom is more than merely ‘look to yourselves’; in context it functions
    as a command to depart before judgment falls.
- source_word: ܥܡܗܕܐ ܡܪܝܪܐ (OCR-corrupt at this point; control sense points to a protective
    pillar metaphor)
  chosen: firm pillar
  alternatives:
  - sure pillar
  - supporting pillar
  lexicon: Payne Smith
  rationale: 'The Ceriani bucket is visibly unstable here, but the clause’s sense
    is preserved by the control tradition: Baruch’s circle functions as a stabilizing
    support for the city.'
- source_word: ܫܘܕܐ ܚܠܝܬܐ (OCR-corrupt at this point; control sense points to a defensive
    wall metaphor)
  chosen: strong wall
  alternatives:
  - mighty wall
  - fortified wall
  lexicon: Payne Smith
  rationale: The paired metaphor with ‘pillar’ calls for a defensive image. ‘Strong
    wall’ preserves the protective force without over-expanding the line.
- source_word: ܥܒܕ̈ܝܟܘܢ / implied protective activity
  chosen: your deeds
  alternatives:
  - your works
  - your actions
  lexicon: Payne Smith
  rationale: ‘Deeds’ keeps the concrete force of lived righteous action while reading
    naturally in English; ‘works’ was possible but sounded more wooden here.
theological_decisions:
- issue: Why Baruch and Jeremiah must depart
  chosen_reading: Their departure is commanded because their righteous deeds and prayers
    have been a preserving restraint for the city, not because judgment has been revoked.
  alternative_readings:
  - The line refers only to their personal safety.
  - The imagery is merely honorific praise with no protective force.
  rationale: Verse 2 grounds the command of verse 1 in their continuing protective
    significance for Jerusalem. Once they depart, the announced judgment proceeds.
- issue: Force of the metaphors in verse 2
  chosen_reading: The chapter presents righteous persons and their prayers as real
    means of divine restraint within history.
  alternative_readings:
  - The metaphors are purely rhetorical compliments.
  - The line speaks only of political leadership rather than prayerful intercession.
  rationale: The pairing of deeds and prayers with structural defenses fits the chapter’s
    judgment setting and preserves the moral-theological weight of intercession.
