theological_decisions:
- issue: Whether Baruch's speech is merely existential lament or a protest about divine
    justice
  chosen_reading: The draft renders the chapter as a moral-theological complaint about
    judgment, human frailty, and the apparent prosperity of sinners.
  alternative_readings:
  - a purely philosophical meditation on mortality
  - a generalized lament with little judicial force
  rationale: The repeated judgment language, contrast between righteous and sinners,
    and appeal to God's wisdom point to a theological protest, not bare pessimism.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Meaning of the righteous persons' works being kept with God
  chosen_reading: The imagery of works stored with God is preserved as future vindication/reward
    imagery.
  alternative_readings:
  - their memory is merely preserved
  - their faithfulness is mentioned without recompense imagery
  rationale: The chapter grounds fearless death in a real divine keeping of righteous
    deeds, so the treasury image should remain concrete.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: Meaning of 'the world' promised to the righteous
  chosen_reading: The phrase is kept as 'the world that you promised them,' referring
    to the promised coming age/world.
  alternative_readings:
  - heaven
  - eternal life in a generalized sense
  rationale: The Syriac says 'world,' and the apocalypse regularly speaks in world-age
    terms; importing a narrower later theological label would over-specify the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
