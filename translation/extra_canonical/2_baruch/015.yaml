lexical_decisions:
- source_word: ܐܘܪܚܐ
  chosen: course
  alternatives:
  - way
  - path
  lexicon: Payne Smith
  rationale: In this temporal-apocalyptic context the word points to the ordered course
    of events, not merely a literal path.
- source_word: ܦܘܪܥܢܐ
  chosen: retribution
  alternatives:
  - punishment
  - requital
  lexicon: Payne Smith
  rationale: The chapter speaks in judicial terms about God's repayment; 'retribution'
    preserves that forensic force.
- source_word: ܬܪܥܝܬܟ
  chosen: your counsel
  alternatives:
  - your purpose
  - your thought
  lexicon: Payne Smith
  rationale: The line concerns the ungraspable deliberation of God; 'counsel' fits
    better than the flatter 'thought'.
- source_word: ܗܒܠܐ
  chosen: breath
  alternatives:
  - vapor
  - mere breath
  lexicon: Payne Smith
  rationale: The simile stresses transience and frailty. 'Breath' keeps the creaturely
    image vivid and matches the Kmosko Latin halitus control.
- source_word: ܣܝܡܐ ܕܥ̈ܒܕܐ
  chosen: a store of works
  alternatives:
  - a treasure of deeds
  - a deposit of works
  lexicon: Payne Smith
  rationale: The Syriac keeps concrete stored-reward imagery; this rendering preserves
    that moral economy without over-systematizing it.
- source_word: ܒܓܙ̈ܐ
  chosen: in treasuries
  alternatives:
  - in storehouses
  - in خز treasures
  lexicon: Payne Smith
  rationale: The plural treasury/storehouse image is worth retaining because it intensifies
    the idea of preserved recompense with God.
- source_word: ܫܘܘܠܡܐ
  chosen: the end
  alternatives:
  - completion
  - consummation
  lexicon: Payne Smith
  rationale: Here the term refers to the eschatological end toward which the righteous
    look, not merely a generic completion.
