theological_decisions:
- issue: Why greater knowledge increases judgment
  chosen_reading: Understanding deepens accountability; transgression with knowledge
    brings stricter judgment.
  alternative_readings:
  - Knowledge merely clarifies sin without heightening responsibility.
  rationale: The chapter explicitly argues that one who sins with understanding is
    judged on that basis.
  doctrine_reference: null
- issue: How the righteous relate to this world and the one to come
  chosen_reading: The righteous endure the struggle of the present world, but the
    coming world belongs to them as vindication and glory.
  alternative_readings:
  - The present world alone is in view.
  rationale: The answer balances present toil with future reward rather than collapsing
    either horizon.
