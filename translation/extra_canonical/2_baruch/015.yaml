translation:
  text: '1 And the Lord answered and said to me:

    “You are right to be astonished at man’s passing, but your judgment about the
    evils that befall sinners is not right.


    2 And as for what you said about the righteous who are taken away and the wicked
    who prosper,

    3 and as for what you said—that man does not know your judgment—

    4 because of this, listen now and I will speak to you; pay attention and I will
    make my words heard.


    5 Indeed, man would not have understood my judgment if he had not received the
    Law and if I had not instructed him in understanding.

    6 But now, because he has transgressed while understanding, he will surely be
    punished because of that understanding.

    7 And as for the righteous, concerning whom you said that the world came on their
    account: what is coming is likewise on their account.

    8 For to them this world is a struggle and a labor with much trouble, but what
    is to come is a crown with great glory.”'
