translation:
  text: '1 Then I answered and said, “Behold, you have shown me the course of the
    times, and what is to happen after these things, and you have told me of the retribution
    that is to come.


    2 Yet I said in my thoughts, ‘Many are those who have sinned and lived, but few
    are those who will be left in those times to whom these things may be spoken.


    3 And what profit is there in this, or what evil is worse than these things that
    those who see should see what they desired, yet be brought low?’


    4 But I will speak before you: What more have those gained who knew before you
    and did not keep your ways,


    5 and who did not seek what is vain, nor turn their heart toward what passes away,


    6 and for whom the labor of good was sought, and for whom the prophets were found?


    7 Or who is there, O Lord, that knows what is not known to you? Or who can search
    out your way?


    8 Or who can learn your judgment, or comprehend your counsel that cannot be grasped?


    9 Or who among those born of men can trace the beginning or the end of your wisdom?


    10 For we have all become like a breath.


    11 For as a breath rises from the heart and vanishes, so is the nature of men:
    they depart, and they do not know their end.


    12 But the righteous rightly hope for the end, and without fear they depart from
    this dwelling, because they have with you a store of works kept in treasuries.


    13 Therefore they also leave this world without fear, and, trusting in gladness,
    wait to receive the world that you promised them.”'
