translation:
  text: '1 But I will speak as I understand, and I will speak against you, land that
    prospers.


    2 The noonday blaze does not burn forever, nor do the rays of the sun keep giving
    light.


    3 Do not expect, and do not hope, that you will always have prosperity and joy.
    Do not lift yourself up too high, and do not oppress.


    4 For surely wrath will awaken against you in its appointed season; for now it
    is restrained by longsuffering, as by a bridle.


    5 And after I had spoken these things, I fasted seven days.'
  philosophy: optimal-equivalence
