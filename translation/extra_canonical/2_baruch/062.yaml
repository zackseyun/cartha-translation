translation:
  text: '1. And the seventh black waters that you saw鈥攖hese are the perversion of
    the time that appeared through the counsel of Jeroboam, who took counsel to make
    two calves of gold.


    2. And all the iniquities that the kings who came after him committed in wickedness.


    3. And the curse of Jezebel, and the worship of idols that Israel practiced at
    that time.


    4. And the withholding of rain, and the famines that came to pass until women
    ate the fruit of their womb.


    5. And the time of their captivity that came upon the nine and a half tribes,
    because they were in many sins.


    6. And Shalmaneser king of Assyria came and carried them away captive.


    7. But concerning the nations, it would be too much to tell how they continually
    acted in impiety and wickedness and never showed themselves righteous.


    8. These are the seventh black waters that you saw.'
