translation:
  text: And he answered and said to me, “What do you ask of me? You help those who
    are guided with understanding in your prayer. My law is life, and my wisdom is
    uprightness. Ask for the interpretation of this vision. For you have seen that
    in your prayer it was persuaded by my law, and from your days my wisdom has not
    been forgotten.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The chapter opening is textually rough in the Ceriani OCR. The main sense
      of the prayer is secure, but the exact wording of the first clause is clarified
      with the Kmosko control witness.
    reason: textual_variant
  - marker: b
    text: Or 'from my days I have not been cut off'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܕܒܣܘܟܠܐ ܡܬܕܒܪܝܢ
  chosen: those who are guided in understanding
  alternatives:
  - those who conduct themselves with understanding
  - those who walk in insight
  lexicon: Payne Smith
  rationale: This keeps the Syriac sense of being conducted or led, while preserving
    the intellectual-moral force of ܣܘܟܠܐ as understanding or insight.
- source_word: ܢܡܘܣܝ ܚ̈ܝܐ ܗܘ
  chosen: Your law is life
  alternatives:
  - Your law is the life
  - Your law gives life
  lexicon: Payne Smith
  rationale: The verbless clause is best rendered directly and aphoristically. 'Is
    life' preserves the strong identification rather than weakening it to mere instrumentality.
- source_word: ܚܟܡܬܝ ܬܪܝܨܘܬܐ ܗܝ
  chosen: your wisdom is uprightness
  alternatives:
  - your wisdom is rectitude
  - your wisdom is righteousness
  lexicon: Payne Smith
  rationale: ܬܪܝܨܘܬܐ carries the sense of straightness or moral rightness. 'Uprightness'
    is natural English and preserves the ethical force without overloading it with
    later doctrinal associations.
- source_word: ܦܘܫܩܗ ܕܚܙܘܐ
  chosen: the interpretation of this vision
  alternatives:
  - the explanation of this vision
  lexicon: Payne Smith
  rationale: In apocalyptic context ܦܘܫܩܐ regularly means interpretation or explanation
    of symbolic revelation. 'Interpretation' fits the genre best.
- source_word: ܠܐ ܐܬܢܣܝܬ
  chosen: I have not been cut off
  alternatives:
  - I have not departed
  - I have not been estranged
  lexicon: Payne Smith
  rationale: The verb likely expresses separation or removal. 'Been cut off' preserves
    the stronger relational sense while remaining idiomatic in English.
