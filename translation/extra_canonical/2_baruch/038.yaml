  rationale: 'The Syriac idiom ܡܢ ܝܘ̈ܡܝ means ''from my earliest days'' or ''throughout
    my life''; rendering it literally as ''from my days'' is awkward and incomplete
    in English. Furthermore, in the context of Baruch''s defense of his own covenantal
    fidelity (parallel to ''my soul has walked in your law''), the verb (reflecting
    Kmosko''s ''recessi'' / Syriac ܐܬܦܪܫܬ) denotes his active choice not to separate
    or depart from wisdom. ''Been cut off'' implies an involuntary, external removal,
    which disrupts the author''s argume | Adjudicator: The reviewer correctly identifies
    the Syriac idiom ܡܢ ܝܘܡܝ (''from my days''), which denotes ''from my youth'' or
    ''from my earliest days.'' Furthermore, the Ethpaal verb ܐܬܦܪܫܬ (etprašeth) in
