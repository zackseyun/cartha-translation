theological_decisions:
- issue: Relation of law and wisdom to divine revelation
  chosen_reading: 'The verse is rendered as a parallel confession: God''s law is life
    and God''s wisdom is uprightness.'
  alternative_readings:
  - God's wisdom is righteousness in a more forensic sense
  - the lines are merely devotional titles without strong theological content
  rationale: The chapter frames Baruch's request for interpretation through covenantal
    fidelity. Preserving the strong predicates keeps the text's theology of revealed
    law and wisdom intact.
