theological_decisions:
- issue: Whether Zion/the land is blamed for the destruction
  chosen_reading: The chapter denies that the holy place or land sinned; the people’s
    sin caused the catastrophe.
  alternative_readings:
  - A more generalized statement of judgment without explicit innocence of place/land
  rationale: Both Ceriani and Kmosko control support the rhetorical questions that
    exonerate Zion/the land and relocate guilt to the people.
- issue: Whether Baruch’s departure removes Israel’s access to guidance
  chosen_reading: Baruch teaches that the law remains standing even when leaders depart.
  alternative_readings:
  - A stronger emphasis on Baruch himself as the continuing source of hope
  rationale: The closing response grounds counsel, light, and springs in the law,
    not in Baruch’s continuing bodily presence.
