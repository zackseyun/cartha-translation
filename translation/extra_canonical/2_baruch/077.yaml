      Ceriani chapter bucket. The renderings ‘writing of hope,’ ‘counsels,’ and the
      closing triad (‘lamp … shepherd … spring’) use Kmosko to clarify an unstable
      page transition.
    reason: alternative_reading
lexical_decisions:
- source_word: ܢܡܘܣܐ
  chosen: the law
  alternatives:
  - law
  - instruction
  lexicon: Payne Smith
  rationale: Kept the covenantal and scriptural sense central to Baruch’s exhortation;
    ‘instruction’ was too weak where the law is the stable source of guidance, light,
    and life.
- source_word: ܡܪܝܡܐ
  chosen: the Most High
  alternatives:
  - the Exalted One
  lexicon: Payne Smith
  rationale: Standard reverential rendering in apocalyptic discourse; it preserves
    the elevated divine title without unnecessary novelty.
- source_word: ܡܚܣܢܢܐ
  chosen: merciful
  alternatives:
  - compassionate
  - gracious
  lexicon: Payne Smith
  rationale: Chosen in v. 7 for God’s disposition toward his people; paired with ‘gracious’
    for the next predicate to avoid flattening the parallelism.
- source_word: ܐܓܪܬܐ ܕܝܘܠܦܢܐ
  chosen: a letter of instruction
  alternatives:
  - an epistle of teaching
  lexicon: Payne Smith
  rationale: Preserves the epistolary force of ܐܓܪܬܐ and the didactic sense of ܝܘܠܦܢܐ
    in natural English.
- source_word: ܡܕܡ ܕܣܒܪܬܐ
  chosen: a writing of hope
  alternatives:
  - a word of hope
  - a scroll of hope
  lexicon: Payne Smith
  rationale: The Syriac is somewhat loose here; ‘writing of hope’ keeps the documentary
    sense without overstating a specific form where the witness is unstable.
- source_word: ܪ̈ܥܘܬܐ
  chosen: counsels
  alternatives:
  - thoughts
  - purposes
  lexicon: Payne Smith
  rationale: Kmosko’s vocalized control points toward ‘thoughts/counsels,’ not ‘shepherds,’
    in v. 15; this also fits the triad with lamps and springs as things supplied by
    the law.
- source_word: ܫܪ̈ܓܐ
  chosen: lamps
  alternatives:
  - lights
  lexicon: Payne Smith
  rationale: Retains the concrete metaphor rather than abstracting it to mere illumination.
- source_word: ܡܒܘ̈ܥܐ
  chosen: springs
  alternatives:
  - fountains
  - sources
  lexicon: Payne Smith
  rationale: ‘Springs’ best preserves the life-giving, flowing image in compact English.
