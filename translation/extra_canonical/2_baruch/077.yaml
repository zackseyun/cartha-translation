translation:
  text: '1 And I, Baruch, went from there and came to the people, and I gathered them
    from the great to the small. 2 And I said to them, “Hear, children of Israel.
    See how few of you are left from the twelve tribes of Israel. 3 Yet to you and
    to your fathers the Lord gave the law more than to all the nations. 4 And because
    your brothers transgressed the commandments of the Most High, he brought upon
    them what you have seen. 5 And behold, you are here, my people, as a remnant.
    6 If therefore you direct your ways, you too will not depart as your brothers
    departed; rather, they will come to you. 7 For merciful is he whom you worship,
    and gracious is he in whom you hope, and he is faithful to preserve and not to
    forsake. 8 Have you not seen what happened to Zion? 9 Or do you think that the
    place sinned, and for this it was overthrown? Or that the land did some wrong,
    and for this it was handed over? 10 And do you not know that because of you, who
    sinned, that which did not sin was overthrown, and because of those who acted
    wickedly, that which did no wrong was delivered up? 11 And all the people answered
    and said to me, “All the good things that the Mighty One did with us, as many
    as we are able to remember, we remember; and what we do not remember, he knows
    in his mercy. 12 But do this for us, your people: write also to our brothers in
    Babylon a letter of instruction and a writing of hope, 13 so that you may also
    show them something of what has not departed from us. 14 For the counsels of Israel
    have perished from us, and the lamps that gave light are gone, and the springs
    from which we used to drink are dried up; and we are left in darkness, and in
    the deep cloud, and in the thirst of the wilderness.” 15 And I answered and said
    to them, “Counsels and lamps and springs are from the law, and even if we depart,
    the law stands. 16 If therefore you look into the law and become wise in wisdom,
    the lamp will not be lacking, and the shepherd will not flee, and the spring will
    not dry up.”'
