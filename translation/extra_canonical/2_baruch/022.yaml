theological_decisions:
- issue: Divine response to Baruch’s distress
  chosen_reading: The speech is rendered as a series of providential analogies showing
    that created processes move toward their proper end.
  alternative_readings:
  - generic encouragement
  - purely psychological comfort
  rationale: The rhetorical questions argue from sowing, planting, voyaging, and childbirth
    toward confidence in God’s purposive ordering, not mere consolation.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Voice from heaven and visionary force
  chosen_reading: Retain 'a voice ... from on high' and 'a might fixed upon me' as
    concrete apocalyptic experience.
  alternative_readings:
  - an inward impression
  - a vague spiritual feeling
  rationale: The Syriac presents revelation as an objective, overwhelming encounter.
    Flattening the imagery would weaken the chapter’s revelatory character.
  doctrine_reference: Translation philosophy §§1, 3, 5
