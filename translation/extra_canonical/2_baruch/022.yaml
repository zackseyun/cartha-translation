lexical_decisions:
- source_word: ܚܝܠܐ ܕܐܬܩܒܥ ܠܝ
  chosen: a might fixed upon me
  alternatives:
  - a force settled upon me
  - strength fastened on me
  lexicon: Payne Smith
  rationale: The phrase is vivid and somewhat unusual; 'might' preserves the numinous
    force of the experience without flattening it into mere emotion.
- source_word: ܠܡܝܟ ܡܬܚܘܐ ܐܢܬ
  chosen: why are you troubled
  alternatives:
  - why are you disturbed
  - why are you agitated
  lexicon: Payne Smith
  rationale: The line introduces divine rebuke mixed with comfort; 'troubled' is natural
    English while keeping the inner unrest in view.
- source_word: ܠܠܡܐܢܐ
  chosen: the harbor
  alternatives:
  - the haven
  - the port
  lexicon: Payne Smith
  rationale: The seafaring image is concrete. 'Harbor' is the clearest idiomatic choice
    and preserves the teleological force of the comparison.
- source_word: ܓܙܐ
  chosen: treasure
  alternatives:
  - store
  - deposit
  lexicon: Payne Smith
  rationale: The comparison turns on something valuable entrusted and reliably possessed;
    'treasure' keeps that weight better than a flatter rendering.
- source_word: ܩܛܝܠܐ
  chosen: a dead child
  alternatives:
  - a slain one
  - something slain
  lexicon: Payne Smith
  rationale: In the childbirth analogy, the sense is best carried by the expectation
    of a stillborn or dead child, not an abstract 'slain thing.'
- source_word: ܡܬܬܙܝܥ
  chosen: shaken
  alternatives:
  - moved
  - disturbed
  lexicon: Payne Smith
  rationale: The term fits the chapter’s contrast between anxiety and settled confidence;
    'shaken' is both literal enough and idiomatic.
