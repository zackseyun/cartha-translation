translation:
  text: And I answered and said to her, “After this, the time will be divided into twelve parts, and each one of them is reserved for what has been appointed for it. In the first part there will be the beginning of commotions. In the second part, slayings of the great ones. In the third part, the fall of many into death. In the fourth part, the sending of the sword. In the fifth part, famine. In the sixth part, earthquakes. In the seventh part, terrors and apparitions. In the eighth part, a multitude of specters and attacks of the Shedim. In the ninth part, the fall of fire. In the tenth part, rapine and much oppression.”
  philosophy: optimal-equivalence
