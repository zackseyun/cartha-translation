lexical_decisions:
- source_word: ܡܫܘܚܬܗ
  chosen: measure
  alternatives:
  - extent
  - measurement
  lexicon: Payne Smith
  rationale: The noun carries the sense of measured extent. 'Measure' preserves the apocalyptic numeration without over-interpreting the calculation.
- source_word: ܡܢܝܢܗ
  chosen: reckoning
  alternatives:
  - number
  - count
  lexicon: Smith
  rationale: The line pairs this term with 'measure'; 'reckoning' keeps the sense of calculated enumeration and avoids a flat repetition with 'measure.'
- source_word: ܫܒܘ̈ܥܐ
  chosen: weeks
  alternatives:
  - heptads
  - sevens
  lexicon: Payne Smith
  rationale: The Syriac formally means 'weeks' or 'sevens.' 'Weeks' is the most transparent English, while the footnote notes that the full phrase remains difficult.
- source_word: ܕܠܐ ܡܬܚܒܠܐ
  chosen: what is incorruptible
  alternatives:
  - what is imperishable
  - the uncorrupted
  lexicon: Payne Smith
  rationale: The contrast is with what is corruptible or perishable. 'Incorruptible' keeps the sharper antithesis and the elevated register.
- source_word: ܡܬܚܒܠܐ
  chosen: what is corruptible
  alternatives:
  - what is perishable
  - what decays
  lexicon: Payne Smith
  rationale: This preserves the direct lexical contrast with the preceding term and avoids smoothing the rhetorical question into abstraction.
- source_word: ܢܦܠ
  chosen: fall
  alternatives:
  - stumble
  - collapse
  lexicon: Smith
  rationale: The warning is terse and moral-apocalyptic. 'Fall' preserves both literal and figurative force.
- source_word: ܐܘܕܥܟ
  chosen: show me
  alternatives:
  - make known to me
  - inform me
  lexicon: Payne Smith
  rationale: Baruch asks for disclosure, not mere data. 'Show me' fits revelatory context and remains idiomatic.
- source_word: ܒܚܕ ܐܬܪܐ / ܒܚܕܐ ܡܢ ܡܢܘ̈ܬܐ ܕܐܪܥܐ
  chosen: in one place, or in one part of the earth
  alternatives:
  - in one region
  - in one quarter of the earth
  lexicon: Payne Smith
  rationale: The question contrasts local and universal scope. This rendering keeps both elements visible.
theological_decisions:
- issue: Whether to smooth the incorruptible/corruptible contrast into a generalized moral lesson
  chosen_reading: Retained the ontological contrast as 'what is incorruptible' and 'what is corruptible.'
  alternative_readings:
  - the eternal and the temporal
  - the spiritual and the material
  rationale: The Syriac presents a stark contrast and a rhetorical question, not a paraphrased doctrinal summary. Keeping the sharper wording is more auditable and less interpretive.
- issue: Whether verse 7 already asserts universal tribulation
  chosen_reading: Rendered verse 7 as Baruch's question about scope, not as an assertion.
  alternative_readings:
  - These things will happen over the whole earth
  - These things will happen in every region
  rationale: In this chapter Baruch asks whether the events are local or universal; the answer belongs in the following chapter.
