  from: '1 Therefore, whoever understands shall then be wise.

    2 For the measure and the reckoning of that time are two parts of weeks—seven weeks.

    3 And I answered and said, “It is good for a man to come and see, but it is better that he should not come, lest he fall.

    4 But I will say this also:

    5 Can what is incorruptible despise what is corruptible, and what happens to what is corruptible, so as to look only to what is not corruptible?

    6 But if these things will surely come to pass, O Lord, as you have told me, show me this also, if I have found favor before you:

    7 Will these things happen in one place, or in one part of the earth, or will the whole earth experience them?”'
  to: And I answered and said to her, “After this, the time will be divided into twelve parts, and each one of them is reserved for what has been appointed for it. In the first part there will be the beginning of commotions. In the second part, slayings of the great ones. In the third part, the fall of many into death. In the fourth part, the sending of the sword. In the fifth part, famine. In the sixth part, earthquakes. In the seventh part, terrors and apparitions. In the eighth part, a multitude of specters and attacks of the Shedim. In the ninth part, the fall of fire. In the tenth part, rapine and much oppression.”
  rationale: Replaced the unrelated draft with a translation matching the Syriac of 2 Baruch 28:1. Restored the full content about the division of the time into twelve parts and the first ten appointed calamities; used formal, natural English and preserved key terms consistently.
