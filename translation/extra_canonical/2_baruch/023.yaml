theological_decisions:
- issue: Adam's sin as the point at which death is decreed for future humanity
  chosen_reading: 'Rendered corporately: death was decreed for those who would be
    born.'
  alternative_readings:
  - death was decreed against humankind
  - mortality was fixed for Adam's descendants
  rationale: This preserves the text's collective-apocalyptic logic without importing
    later doctrinal formulations beyond the Syriac's scope.
  doctrine_reference: DOCTRINE.md §§ Theological stance; Translation philosophy §3
- issue: Divine life-giving agency in the line about Spirit and the dead
  chosen_reading: For my Spirit is the giver of life, and Sheol receives the dead.
  alternative_readings:
  - For my Spirit creates the living, and Sheol keeps the dead
  - For my Spirit recreates life, and Sheol receives the dead
  rationale: The rendering keeps the life/death contrast clear while avoiding overprecision
    where the chapter edge and witness situation remain somewhat uncertain.
  doctrine_reference: DOCTRINE.md §§ Theological stance; Translation philosophy §1
