lexical_decisions:
- source_word: ܡܥܝܪ
  chosen: troubled
  alternatives:
  - disturbed
  - agitated
  lexicon: Payne Smith
  rationale: Chosen for emotional unrest without overstating panic; it fits the divine
    rebuke's tone in this dialogue.
- source_word: ܡܢܝܢܐ
  chosen: number
  alternatives:
  - count
  - total
  lexicon: Sokoloff
  rationale: Retains the apocalyptic idea of a fixed, divinely determined total rather
    than a mere act of counting.
- source_word: ܫܝܘܠ
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: Payne Smith
  rationale: Transliterated to preserve the text's Second Temple/Jewish apocalyptic
    world rather than flattening it into a generic English equivalent.
- source_word: ܦܘܪܩܢܐ
  chosen: salvation
  alternatives:
  - deliverance
  - redemption
  lexicon: Payne Smith
  rationale: '"Salvation" best carries the broad divine-rescue sense here while remaining
    natural English.'
- source_word: ܪܘܚܝ
  chosen: my Spirit
  alternatives:
  - my breath
  lexicon: Payne Smith
  rationale: Capitalized as a divine possessive reference, while still leaving the
    phrase anchored in life-giving agency rather than later doctrinal precision.
