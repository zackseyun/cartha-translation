translation:
  text: And I answered and said, “No, Lord, my Lord.” And he answered and said to
    me, “Why are you troubled about what you do not know, and why are you disturbed
    over matters of which you are ignorant? For just as you have not forgotten those
    who now exist and those who have passed away, so I remember those who are to come.
    For when Adam sinned and death was decreed for those who would be born, then the
    multitude of those who would be born was numbered, and for that number a place
    was prepared, where the living might dwell and the dead might be kept. Unless,
    therefore, that number which was appointed beforehand is completed, the creature
    will not live again. For my Spirit is the giver of life, and Sheol receives the
    dead. Moreover, it has been granted to you to hear what will come after these
    times. For my salvation has truly drawn near, and is not as far off as it was
    before.”
  philosophy: optimal-equivalence
