lexical_decisions:
- source_word: ܐܬܒܥ
  chosen: came
  alternatives:
  - returned
  - departed
  lexicon: Payne Smith
  rationale: The chapter opening on Ceriani p. 224 is OCR-fragile, but the chapter context and control tradition support a simple motion verb here. 'Came' is the least interpretively loaded rendering.
- source_word: ܕܟܝ ... ܡܢ ܚܛܝ̈ܗ̣ܐ
  chosen: whose heart had been found pure from sins
  alternatives:
  - whose heart was clean from sins
  - whose heart was found innocent of sins
  lexicon: Payne Smith
  rationale: The phrase describes Jeremiah as morally clean in relation to the catastrophe. 'Pure from sins' preserves the Syriac force without overstating it into systematic sinlessness.
- source_word: ܒܥܒܕܘܗܝ ܕܡܕܝܢܬܐ
  chosen: in the capture of the city
  alternatives:
  - during the seizure of the city
  - when the city was taken
  lexicon: Smith Syriac Dictionary
  rationale: The phrase refers to the city's violent taking. 'Capture' is natural English and keeps the military sense.
- source_word: ܐܬܚܙܝ
  chosen: had been found
  alternatives:
  - was seen
  - was shown
  lexicon: Payne Smith
  rationale: In this context the verb works idiomatically as a judgment about Jeremiah's character, not mere visual perception.
- source_word: ܘܒܩ̈ܝ
  chosen: wept, and mourned
  alternatives:
  - lamented
  - wailed
  lexicon: Payne Smith
  rationale: The paired mourning verbs should remain distinct in English to preserve the weight of the lament scene.
theological_decisions:
- issue: Jeremiah described as 'pure from sins'
  chosen_reading: The line presents Jeremiah as innocent with respect to the city's guilt and overthrow, not as making an abstract claim that he was absolutely sinless in every sense.
  alternative_readings:
  - Jeremiah is being called absolutely sinless
  - The phrase is primarily ritual rather than moral
  rationale: The immediate context is Jerusalem's fall and Jeremiah's not being taken in the city's capture. The wording is best read as contextual moral cleanness, and the translation keeps that tension visible.
  doctrine_reference: DOCTRINE.md
