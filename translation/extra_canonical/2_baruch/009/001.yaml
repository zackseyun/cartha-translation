translation:
  text: And I, Baruch, came with Jeremiah, whose heart had been found pure from sins, and who had not been taken in the capture of the city. And we rent our garments, wept, mourned, and fasted seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And I, Baruch, came with Jeremiah, whose heart had been found pure from sins, and who had not been taken in the capture of the city.'.
    reason: previous_rendering
