lexical_decisions:
- source_word: ܐܘܪܚܐ
  chosen: course
  alternatives:
  - way
  - ordering
  lexicon: Payne Smith
  rationale: In this apocalyptic setting the term points not merely to a path but
    to the ordered course of the times. “Course” preserves that temporal sense.
- source_word: ܦܘܪܥܢܐ
  chosen: retribution
  alternatives:
  - punishment
  - requital
  lexicon: Payne Smith
  rationale: The chapter continues the judicial logic of divine repayment. “Retribution”
    keeps the forensic force stronger than a generic ‘outcome.’
- source_word: ܗܒܠܐ
  chosen: breath
  alternatives:
  - vapor
  - mere breath
  lexicon: Payne Smith
  rationale: The comparison depends on transience and evanescence. “Breath” fits both
    the Syriac image and the Kmosko Latin halitus control.
- source_word: ܬܪܥܝܬܟ / ܚܟܡܬܟ
  chosen: your counsel ... your wisdom
  alternatives:
  - your purpose ... your wisdom
  - your thought ... your wisdom
  lexicon: Payne Smith
  rationale: The paired lines emphasize the unsearchable divine mind. “Counsel” gives
    the deliberative sense, while “wisdom” retains the broader theological category.
- source_word: ܥܡܠܐ ܕܛܒܬܐ
  chosen: the labor of good
  alternatives:
  - good works
  - toil for what is good
  lexicon: Payne Smith
  rationale: The Syriac keeps both effort and moral quality in view. This rendering
    avoids flattening the phrase into a purely technical formula.
- source_word: ܐܬܡܢܢ ܠܡܒܠܐ
  chosen: we have all become like a breath
  alternatives:
  - we are appointed to pass away
  - we are destined for fading
  lexicon: Payne Smith
  rationale: The immediate simile controls the line. Rendering toward the image rather
    than abstract destiny keeps Baruch’s lament vivid.
