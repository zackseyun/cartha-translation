  from: this is so that the nations may be disciplined, and afterward remain.’
  to: Therefore they were disciplined then, so that they might be forgiven.
  rationale: The draft introduces 'the nations,' which is absent from the Syriac and contradicts the context (the subject is 'His sons' from v. 5, who are contrasted with the nations in v. 7). Additionally, the verb for 'disciplined' (ܐܬܪܕܝܘ) is in the perfect tense ('were disciplined'), modified by 'then' (ܗܝܕܝܢ). Finally, while ܢܫܬܒܩܘܢ can mean 'be left/remain,' in this theological context of discipline it means 'be forgiven' or 'be spared.'
