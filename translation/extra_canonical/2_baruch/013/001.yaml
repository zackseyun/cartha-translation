lexical_decisions:
- source_word: ܨܝܕܐ ܕܢܗܪܐ
  chosen: the bank of the river
  alternatives:
  - the side of the river
  - Mount Zion
  lexicon: Payne Smith
  rationale: Ceriani’s primary Syriac points to a riverbank setting, while the Kmosko
    Latin control reflects Mount Zion. Because Ceriani remains primary, the draft
    keeps the river setting and notes the control divergence separately.
- source_word: ܐܬܬܙܝܥܘ
  chosen: you were shaken
  alternatives:
  - you were astonished
  - you were moved
  lexicon: Payne Smith
  rationale: The verb conveys inward disturbance. “Shaken” preserves the force without
    narrowing it to mere surprise.
- source_word: ܦܘܪܥܢܐ
  chosen: retribution
  alternatives:
  - recompense
  - repayment
  lexicon: Payne Smith
  rationale: In this judgment oracle the term is judicial, not merely consequential.
    “Retribution” preserves that moral and forensic weight.
- source_word: ܡܕܝܠܢܐ
  chosen: strained
  alternatives:
  - well-strained
  - clarified
  lexicon: Payne Smith
  rationale: The contrast with dregs calls for refined wine imagery. “Strained” is
    concise and keeps the reversal vivid.
- source_word: ܒܒܪܝܬܐ ܕܠܐ ܒܟܐܢܘܬܐ
  chosen: dealt with creation without righteousness
  alternatives:
  - used the creation unjustly
  - misused creation unrighteously
  lexicon: Payne Smith
  rationale: The line indicts the nations not only for violence but for morally disordered
    use of the created order. This rendering keeps both the creational and ethical
    dimensions.
- source_word: ܛܰܝܒܽܘܬܳܐ
  chosen: kindness
  alternatives:
  - goodness
  - beneficence
  lexicon: Payne Smith
  rationale: The noun points to God’s beneficent dealing. “Kindness” reads naturally
    while retaining covenantal generosity rather than abstract goodness alone.
theological_decisions:
- issue: Setting of Baruch’s revelation in verse 1
  chosen_reading: The draft retains Ceriani’s riverbank setting rather than harmonizing
    to Mount Zion.
  alternative_readings:
  - Baruch was standing on Mount Zion
  - The location should be conformed to the control tradition
  rationale: The project rule makes Ceriani the base witness. Because the control
    tradition differs here, the translation keeps the primary reading and marks the
    divergence in a footnote rather than silently replacing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Judgment on Israel and the nations in verses 8-11
  chosen_reading: 'God’s judgment is impartial: he first disciplined his own sons,
    and therefore the nations should not presume immunity.'
  alternative_readings:
  - The nations alone are in view
  - The line about his own sons is only rhetorical and not theological
  rationale: The oracle explicitly grounds coming judgment on the nations in God’s
    prior severity toward his own people. This preserves the book’s moral logic of
    divine impartiality.
  doctrine_reference: God's judgment is just, measured, and morally ordered.
- issue: Meaning of the nations’ sin in verse 11
  chosen_reading: The nations are condemned for unrighteous domination of the earth
    and of creation, not merely for political aggression.
  alternative_readings:
  - Only military oppression is intended
  - Only mistreatment of Israel is intended
  rationale: The language broadens the indictment to the created order itself. The
    chapter therefore frames empire as a violation of God’s righteous governance over
    creation.
  doctrine_reference: Creation belongs under God's moral governance, and human dominion
    is accountable.
