translation:
  text: '1 And it happened after these things that I, Baruch, was standing on Mount
    Zion.

    2 And a voice came from on high and said to me, “Stand on your feet, Baruch, and
    hear the word of the mighty God.

    3 Because you were shaken over what has happened to Zion, therefore you will surely
    be preserved to the consummation of the times, that you may be for a testimony.

    4 If the cities that now prosper should ever say, ‘Why has the mighty God brought
    this retribution upon us?’

    5 you shall say to them, and to those like them, ‘You who have seen this calamity,
    and the retributions that come upon you and upon your people in their appointed
    time—

    6 this is so that the nations may be disciplined, and afterward remain.’

    7 And if in that time they say, ‘When?’

    8 you shall say to them, ‘You who have drunk strained wine shall also drink its
    dregs. For the judgment of the Most High shows no partiality.

    9 Therefore he did not spare even his own sons, but afflicted them like enemies,
    because they sinned,

    10 Therefore they were then chastened, so that they might be sanctified.

    11 But now, you nations and peoples, you are guilty, because at all times you
    have trodden the earth and dealt with creation without righteousness.

    12 For at all times I did good to you, but at all times you denied my kindness.’”'
  philosophy: optimal-equivalence
