  from: '1 Therefore hear the interpretation of the final black waters that follow
    the black waters. This is the word:

    2 Behold, days are coming when the time of the world has ripened and the harvest
    of its evil and good seeds has come. Then the Mighty One will bring confusion
    of spirit and consternation of heart upon the earth, its inhabitants, and its
    rulers.

    3 They will hate one another and provoke one another to fight; the base will rule
    over the honorable, and the ignoble will be exalted over the illustrious.

    4 Many will be delivered into the hands of the few. Those who were nobodies will
    rule over the strong, the poor will have more than the rich, and the impious will
    exalt themselves over the brave.

    5 The wise will be silent and the foolish will speak. Then the thought of men
    will not be fulfilled, nor the counsel of the strong, nor the hope of those who
    hope.

    6 When those things that were foretold have come to pass, confusion will fall
    upon all people. Some will fall in war, some will perish in tribulations,

    7 and some will be undone by their own. Then the Most High will stir up the peoples
    whom he prepared beforehand, and they will wage war against the rulers who remain
    at that time.

    8 And whoever escapes from the war will die in the earthquake, and whoever escapes
    from the earthquake will be burned by fire, and whoever escapes from the fire
    will perish by famine.

    9 And it will happen that anyone who escapes and is delivered from all these things—both
    those who conquered and those who were conquered—will be delivered into the hands
    of my servant, the Messiah.

    10 For the whole earth will devour its inhabitants.'
  to: 5 The wise will be silent and the foolish will speak. Then the thought of the
    sons of men will not be fulfilled, nor the purpose of the world, nor the hope
    of those who hope.
  rationale: Revised verse 5 only. Changed 'men' to 'the sons of men' for closer lexical
    accuracy, 'counsel of the strong' to 'purpose of the world' to reflect the Syriac,
