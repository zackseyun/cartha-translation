lexical_decisions:
- source_word: ܡܦܩܢܗ / ܡܦܩܐ
  chosen: give back / restore
  alternatives:
  - bring forth
  - return
  lexicon: Payne Smith
  rationale: The earth is pictured as receiving the dead in trust and then returning
    them. English uses restitution language rather than mere emergence.
- source_word: ܡܩܝܡܐ
  chosen: raise
  alternatives:
  - set up again
  - cause to stand
  lexicon: Payne Smith
  rationale: In this context the verb carries resurrection force, not merely repositioning
    or establishing.
- source_word: ܒܨܘܪܬܗܘܢ
  chosen: in their form
  alternatives:
  - in their appearance
  - in their shape
  lexicon: Payne Smith
  rationale: The line stresses continuity of recognizable identity prior to later
    transformation, so 'form' is broad and fitting.
- source_word: ܐܬܝܕܥܘ ܚܕ ܠܚܕ
  chosen: recognized one another
  alternatives:
  - knew one another again
  - were made known to one another
  lexicon: Payne Smith
  rationale: The clause points to mutual recognition after resurrection, not merely
    abstract awareness.
- source_word: ܢܒܛܠ ... ܕܡܩܕܡܝܢ ܐܡܝܢ
  chosen: judgment will grow strong, and those things spoken beforehand will come
  alternatives:
  - the previously spoken things will appear
  - the prior word will be confirmed
  lexicon: Payne Smith
  rationale: The Ceriani line is awkward at this point, but the control-backed sense
    is judicial consummation and fulfillment of prior warning.
