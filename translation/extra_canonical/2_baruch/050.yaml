translation:
  text: He answered and said to me, “Hear then the word. For the earth will then surely
    give back the dead whom it now receives, keeping them without changing anything
    in their form. But as it received them, so it will restore them, and as I delivered
    them to it, so it will also raise them. For then it is necessary to show the living
    that the dead have come to life, and that those who had departed have returned.
    And it shall be, when those who now know one another have recognized one another,
    then judgment will grow strong, and those things that were spoken beforehand will
    come.”
  philosophy: optimal-equivalence
