theological_decisions:
- issue: Continuity between present identity and resurrection
  chosen_reading: The dead are restored as the earth received them, without loss of
    recognizable identity, before later eschatological differentiation.
  alternative_readings:
  - A purely symbolic resurrection scene
  - A resurrection with no continuity of personal form
  rationale: The repeated sequence receive / restore / raise, together with mutual
    recognition, strongly supports continuity of personhood.
  doctrine_reference: Translation philosophy; bodily continuity without speculative
    overdefinition
- issue: Function of mutual recognition
  chosen_reading: Recognition serves the public vindication of resurrection and the
    transition into judgment.
  alternative_readings:
  - Recognition is only sentimental reunion imagery
  - Recognition is incidental and not judicially significant
  rationale: The text explicitly links the living seeing the dead restored and people
    recognizing one another with the strengthening of judgment.
