translation:
  text: 'And it happened after these things, that I went to the people and said to
    them, “Gather to me your elders and your children, and I will speak words to you.”


    And they all assembled in the valley of Kidron.


    And I asked and said to them,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The chapter edge is textually unstable in the current Ceriani bucket. The
      narrative opening ('After these things ... And I answered and said to them')
      is present in Ceriani p. 132, while the opening lines of the speech are clarified
      from the targeted Kmosko control page so as not to force false precision from
      a damaged boundary.
    reason: textual_variant
  - marker: b
    text: Or 'After these things I went'.
    reason: previous_rendering
  - marker: c
    text: Or 'and I will speak words to you.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܟܢܫܘ
  chosen: Gather
  alternatives:
  - Assemble
  - Bring together
  lexicon: Smith
  rationale: The imperative calls for the people to be brought together. 'Gather'
    preserves the direct force of the summons.
- source_word: ܣܒܝܟܘܢ
  chosen: your elders
  alternatives:
  - your old men
  lexicon: Smith
  rationale: The Syriac points to the elders of the people. Although the Ceriani bucket
    is unstable at this edge, Kmosko's control witness supports this reading.
- source_word: ܒܚܠܬܐ ܕܩܕܪܘܢ
  chosen: in the valley of Kidron
  alternatives:
  - in the Kidron Valley
  - in the valley of Cedron
  lexicon: Smith
  rationale: The place-name is the well-known Kidron/Cedron valley. 'Kidron' is the
    standard English form.
- source_word: ܫܡܥ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: Smith
  rationale: In the covenantal address to Israel, 'Hear' preserves the solemn summons
    better than the flatter 'Listen'.
- source_word: ܙܪܥܗ ܕܝܥܩܘܒ / seed of Jacob
  chosen: seed of Jacob
  alternatives:
  - offspring of Jacob
  - descendants of Jacob
  lexicon: Smith
  rationale: '''Seed'' keeps the familial and covenantal resonance of the source language,
    even though ''descendants'' would be smoother modern English.'
- source_word: angustiarum Ierusalem / distress of Jerusalem
  chosen: distress of Jerusalem
  alternatives:
  - affliction of Jerusalem
  - trouble of Jerusalem
  lexicon: Lewis & Short
  rationale: The sense is Jerusalem's anguish under judgment. 'Distress' is natural
    English while retaining the gravity of the lament.
