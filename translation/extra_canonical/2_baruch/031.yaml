status: revised
theological_decisions:
- issue: Covenantal address formula
  chosen_reading: The address is rendered as 'Hear, O Israel ... and you, seed of
    Jacob' without reducing it to a generic call to the audience.
  alternative_readings:
  - Hear, Israel ... descendants of Jacob
  rationale: The chapter opens as a solemn prophetic address to the covenant people,
    and the traditional form preserves that theological weight.
  doctrine_reference: Preserve theological tension and covenantal imagery rather than
    flattening it.
- issue: Jerusalem/Zion language
  chosen_reading: Both Zion and Jerusalem are retained distinctly.
  alternative_readings:
  - Collapse both into a single reference to the city
  rationale: The paired names carry lament and theological memory; the text calls
    the audience both not to forget Zion and to remember Jerusalem's distress.
  doctrine_reference: Do not flatten prophetic or liturgical imagery.
