  text: '# Source page p0205 (printed 137)

    ܢܣܒܘ ܩܕܡܝܗܘܢ ܟܠܗܘܢ

    ܥܒ̈ܕܝܗܘܢ ܕܒܝܫܘܬܗܘܢ. ܘܡܢ

    ܫܪܐ ܡܢ ܢܦܫܝܗܘܢ. ܘܠܡ

    ܐܠܐ ܫܪܝܪܐ ܕܥܡܢ ܗܘ

    ܘܡܬܚܙܝ ܒܐܪܥܐ

    ܓܠܝܬ. ܘܬܘܒ ܢܚܙܝܗ

    ܫܘܦܪܐ ܠܥܠܡ. ܒܕܡܘܬ

    ܕܢܒܥܐ ܒܥܡܘܛ ܚܒܠܐ.

    ܘܒܕܡܘܬ ܕܐܬܝܠܕܬ ܙܒܢܐ

    ܕܡܫܕܪܝܢ ܐܢܘܢ. ܗܢܘ

    ܚܙܘܐ ܘܗܢܘ ܦܘܫܩܗ ܀

    ܐܢܬܝ ܘܐܡܪܬ ܠܡܒܥܐ

    ܘܠܡܒܪܐ ܪ̈ܦܝܝ ܙܒܢܝܢ.

    ܘ ܝܕܥܬ ܕܫܘܐ ܕܢܚܙܐ

    ܒܗܘ ܙܒܢܐ ܐܡܠܠ ܕܝܢ

    ܥܡܟܝ ܟܠ ܕܡܬܚܫܒ

    ܐܢܐ. ܘܐܒܥܐ ܡܢܟܝ

    ܐܠܐ ܐܢܬܝ ܕܪܝ ܐܢܐ.

    ܡܛܠ ܕܗܘ ܚܙܐ ܐܢܐ

    ܣܓܝ̈ܐܐ ܡܢ ܥܡܟܝ

    ܕܐܢܚܢܢ ܡܢ ܩܝܡܝܗܘܢ

    ܘܢܗܘܘ ܡܠܝܗܘܢ ܢܚܙܘ

    ܕܠܡܘܬܗܘܢ ܐܚܪ̈ܢܐ ܕܝܢ

    ܬܘܒ ܚܙܝܬ

    ܗܘܘ ܠܗܘܢ ܠܗܠܝܢ. ܐܘ

    ܡܢܝ ܡܩܒܠܝܢ ܠܗܘܢ ܗܘܘ

    ܒܟܠ ܙܒܢ. ܐܘ

    ܠܡܘܢ ܡܬܬܚܒܘ ܡܬܬܚܒܝܢ

    ܠܗܘܢ ܕܗܠܝܢ. ܘܐܝܟ

    ܝܠܕܐ ܡܬܝܠܕ ܗܘܝ

    ܐܬܕܝܠܚ. ܀ ܝ ܀ ܘܥܒܕܬ

    ܘܐܡܪ ܠܝ. ܐܦ ܗܠܝܢ

    ܕܠܐ ܙܕܝܩܝܢ. ܡܛܠ

    ܕܐܒܪܗܡ ܠܡܢܘ ܡܟܡܟܐ

    ܗܘܝ ܕܗܠܝܢ. ܠܐܝܠܝܢ

    ܕܡܣܒܪܝܢ ܗܘܘ ܛܒ̈ܬܐ

    ܕܡܩܕܡܐ ܐܡܝܪܢ.

    ܘܠܐܝܠܝܢ ܕܡܢܗܝܢ ܗܘܘ

    ܕܒܡܘܒܠܐ ܕܗܠܝܢ. ܘܕܐܡܪܬ

    ܥܠ ܐܝܠܝܢ ܕܐܬܦܪܫܘ

    ܡܠܠ ܐܝܠܝܢ ܕܐܬܢܣܒܘ.

    ܘܕܐܡܪ ܗܘܝ ܡܒܐܫ.

    ܗܢܘܢ ܕܡܢ ܩܕܝܡ ܐܬܥܒܕܘ.

    ܘܡܢ ܒܬܪܟܢ ܐܬܢܣܒܘ.

    ܘܐܬܚܫܒܘ ܒܙܒܢܐ

    ܕܒܡܘ̈ܬܐ ܢܚܝܒܘܢ. ܕܗܠܝܢ

    ܐܒܕܘܗܝ ܩܕܡܝ ܐܬܘܗܝ

    ܘܕܐܡܪ ܡܬܚܫܒܘ. ܘܐܝܠܝܢ

    ܕܡܢ ܩܕܝܡ ܠܐ'
