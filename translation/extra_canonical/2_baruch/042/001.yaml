lexical_decisions:
- source_word: ܡܣܒܪܝܢ
  chosen: those who have believed
  alternatives:
  - those who trusted
  - those who hoped
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The Kmosko Latin control has crediderunt. 'Believed' best fits the chapter’s contrast with those who despise, without narrowing the sense to mere emotional hope.
- source_word: ܡܒܐܫ
  chosen: those who despise
  alternatives:
  - those who reject
  - those who scorn
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The term is stronger than simple unbelief. 'Despise' preserves the moral and volitional force of contempt toward the revealed good.
- source_word: ܐܬܦܪܫܘ / ܐܬܢܣܒܘ
  chosen: drew near / withdrew
  alternatives:
  - approached / departed
  - came close / separated themselves
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The paired verbs mark moral movement toward and away from God’s covenantal sphere. A directional rendering preserves the apocalyptic contrast.
- source_word: ܙܪܥܐ ܕܥܡ̈ܡܐ ܡܚܠܛ̈ܐ
  chosen: the seed of the mixed peoples
  alternatives:
  - the seed of mingled nations
  - the offspring of mixed peoples
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: I kept 'seed' rather than flattening to 'race' or 'population,' because the text’s language is genealogical and covenantal, even if polemical.
- source_word: ܚ̈ܝܐ
  chosen: life
  alternatives:
  - the life
  - true life
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: 'The singular English ''life'' preserves the theological density of the Syriac term here: not mere existence, but the life bound up with divine truth.'
- source_word: ܡܬܚܫܒܘ ... ܪܡܐ / high-account sense
  chosen: is reckoned as lofty
  alternatives:
  - is counted as exalted
  - is regarded as weighty
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The Ceriani line is rough, but Kmosko’s altum reputatur supports an accounting metaphor with a sense of height or rank. 'Reckoned as lofty' keeps both ideas visible.
theological_decisions:
- issue: How to frame the contrast between the two groups in verse 2
  chosen_reading: The chapter contrasts believers and despisers in terms of response to revelation, not as an abstract predestinarian formula.
  alternative_readings:
  - A harder predestinarian contrast
  - A softened contrast of merely intellectual assent
  rationale: The paired outcomes turn on believing versus despising what was spoken beforehand; the moral posture is central.
- issue: Meaning of those who 'drew near' and 'withdrew'
  chosen_reading: The language describes covenantal and moral movement toward or away from God, not mere physical proximity.
  alternative_readings:
  - Purely spatial movement
  - Strictly ethnic realignment
  rationale: The surrounding context concerns fidelity, apostasy, and judgment at the last time, so the directional verbs carry spiritual weight.
- issue: Sense of 'life' in verse 5
  chosen_reading: '''Life'' is retained as a theologically charged term rather than expanded into a paraphrase such as ''the way of salvation.'''
  alternative_readings:
  - the way of salvation
  - eternal life explicitly
  rationale: The Syriac is compact and weighty. Keeping 'life' preserves the text’s idiom without importing later doctrinal phrasing.
