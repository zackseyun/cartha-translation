translation:
  text: Then I lifted up my eyes and wept. And I said at that time, “Far be it from me that I should forsake you or forget you. But I will only go to the Holy of Holies to inquire of the Mighty One concerning you and concerning Zion, if perhaps I may receive a little more illumination; and after these things I will return to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The closing clause is textually rough at the chapter edge. The surviving Syriac supports a remembrance formula with a third-person plural object ('them'); the most likely antecedent is the fathers just mentioned, though the transition is not fully certain.
    reason: textual_variant
  - marker: b
    text: Or 'that I should be silent toward you or forget you. But only, go as far as the tomb-house of the graves of your fathers; in affliction and in the distress of lamentation cry aloud, so that they may not be forgotten before you, now or afterward; and I too will remember them.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܚܣ ܠܝ
  chosen: Far be it from me
  alternatives:
  - It would be grievous to me
  - Spare me from
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The idiom expresses strong aversion or refusal, not a request for mercy in this context. 'Far be it from me' preserves the solemn rhetorical force.
- source_word: ܕܐܫܬܘܩܘܟܘܢ
  chosen: that I should be silent toward you
  alternatives:
  - that I should cease speaking to you
  - that I should keep silence about you
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The verb is built from 'to be silent.' 'Toward you' keeps the interpersonal force without over-paraphrasing it into abandonment.
- source_word: ܠܒܝܬ ܩܘ̣ܒܘܪ ܩܘ̈ܒ̣ܪܐ ܕܐܒܗܝ
  chosen: to the tomb-house of the graves of your fathers
  alternatives:
  - to the burial-place of your fathers
  - to the house of your fathers' tombs
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The doubled burial imagery is awkward but deliberate. 'Tomb-house of the graves' keeps the concrete funerary setting rather than flattening it to a generic cemetery.
- source_word: ܡܢ ܚܒܠܬܐ ܒܥܝܩܘܬ ܝܠܠܐ ܨܘܝܘ
  chosen: in affliction and in the distress of lamentation cry aloud
  alternatives:
  - cry out with lament in anguish
  - wail in affliction and distress
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The Syriac stacks pain-terms and then gives an imperative to cry out. The English keeps that cumulative lament rhetoric rather than smoothing it into one simple verb.
- source_word: ܥܘܗܕܢܘܢ
  chosen: remember them
  alternatives:
  - keep remembrance of them
  - make memorial of them
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The noun-verb cluster centers on remembrance or memorial. 'Remember them' is the clearest English equivalent, while the footnote acknowledges that the exact antecedent is not fully secure.
