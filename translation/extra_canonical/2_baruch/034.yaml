  from: that I should be silent toward you or forget you. But only, go as far as the tomb-house of the graves of your fathers; in affliction and in the distress of lamentation cry aloud, so that they may not be forgotten before you, now or afterward; and I too will remember them.
  to: that I should forsake you or forget you. But I will only go to the Holy of Holies to inquire of the Mighty One concerning you and concerning Zion, if perhaps I may receive a little more illumination; and after these things I will return to you.
  rationale: The draft translates a severely garbled OCR transcription rather than the actual Syriac text. The verb is ܫܒܩ ('forsake'), not ܫܬܩ ('be silent'). The phrase 'tomb-house of the graves' (ܩܘܒܘܪ ܩܘܒܪܐ) is a visual OCR misreading of 'Holy of Holies' (ܩܕܘܫ ܩܘܕܫܐ). 'In affliction and distress...' is a misreading of 'to inquire of the Mighty One concerning you and concerning Zion' (ܠܡܒܥܐ ܡܢ ܚܝܠܬܢܐ ܥܠܝܟܘܢ ܘܥܠ ܨܗܝܘܢ). The final clause is a misreading of 'if perhaps I may receive a little more illumination; and after these things I will return to you' (ܕܐܢ ܐܬܢܗܪ ܩܠܝܠ ܡܕܡ ܘܡܢ ܒܬܪ ܗܠܝܢ ܐܗܦܘܟ ܠܘܬܟܘܢ). The translation must reflect the author's actual words, not the OCR errors. The associated footnotes and lexical decisions should be discarded.
