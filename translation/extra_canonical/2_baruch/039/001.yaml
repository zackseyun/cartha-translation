lexical_decisions:
- source_word: ܥܒ̈ܐ
  chosen: forest
  alternatives:
  - woods
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The vision depends on a single large wooded mass contrasted with cedars and mountains. 'Forest' preserves the apocalyptic image better than the looser 'woods.'
- source_word: ܡܠܟܘܬܐ
  chosen: kingdom
  alternatives:
  - dominion
  - realm
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The passage interprets the vision in terms of successive world powers. 'Kingdom' is the most transparent English equivalent and keeps the political-historical force.
- source_word: ܫܪܪܐ
  chosen: security
  alternatives:
  - truth
  - stability
  - firmness
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The Syriac can denote truth or firmness. In this context of a harsh kingdom attracting the lawless, a sense like 'security' or 'stability' fits better than moral 'truth,' though the line remains somewhat difficult.
- source_word: ܪܝܫܝܬܗ / Kmosko control ܪܝܫܢܘܬܗ
  chosen: reign
  alternatives:
  - headship
  - principate
  - beginning
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: Ceriani's OCR here is unstable, but the Kmosko control points to a word meaning headship or principate. 'Reign' gives clear English while preserving the royal-messianic sense.
- source_word: ܡܒܘܥܐ
  chosen: fountain
  alternatives:
  - spring
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: Either gloss is possible, but 'fountain' pairs more solemnly with 'vine' and preserves the chapter's symbolic diction.
- source_word: ܓܦܬܐ / ܓܦܢ
  chosen: vine
  alternatives:
  - grapevine
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The imagery is symbolic rather than botanical. 'Vine' is the natural English biblical term and avoids over-specifying the image.
- source_word: ܬܫܬܥܒܕ
  chosen: will be subjected
  alternatives:
  - will be enslaved
  - will be brought under
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The verb marks the downfall of one kingdom under another. 'Will be subjected' is clear and politically forceful without over-narrowing the mode of subjugation.
- source_word: ܣܘܓܳܐܐ ܕܟܢܘܫܬܗ (control-backed)
  chosen: the multitude of its host
  alternatives:
  - the mass of its assembly
  - the multitude of its gathering
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The phrase refers to the gathered force belonging to the final kingdom. 'Host' preserves the corporate and hostile sense better than the more neutral 'assembly.'
theological_decisions:
- issue: Messianic title and royal disclosure in verse 7
  chosen_reading: The text is rendered 'the reign of my Messiah will be revealed.'
  alternative_readings:
  - the beginning of my Messiah will be revealed
  - the headship of my Messiah will be revealed
  rationale: The control witness supports a royal/headship sense rather than a mere temporal 'beginning.' 'My Messiah' is retained as the text's own designation without importing later Christian title-language like 'Christ.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sequence of kingdoms culminating in divine-messianic intervention
  chosen_reading: The chapter is translated as a vision of successive kingdoms ending in the disclosure of God's Messiah, without identifying the kingdoms in the translation itself.
  alternative_readings:
  - A more interpretive rendering that names historical empires in the main text
  rationale: The Syriac presents the sequence symbolically. The translation should preserve that apocalyptic tension and not collapse the imagery into commentary.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
