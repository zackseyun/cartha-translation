theological_decisions:
- issue: Adam's role in the first black waters
  chosen_reading: Adam's act is rendered as the archetypal transgression that initiates
    untimely death and the fallen human condition.
  alternative_readings:
  - Adam's act as merely representative of general human sin
  - Adam's act as exclusively juridical without cosmological consequence
  rationale: The passage lists cosmic and human consequences flowing from Adam's act;
    the imagery is wider than individual guilt alone.
- issue: Extent of Adam's culpability in the later paragraph
  chosen_reading: The draft preserves the text's strong claim that Adam 'made himself
    liable' and in some sense 'implicated the angels,' without softening the statement.
  alternative_readings:
  - He only harmed himself
  - The angelic reference should be paraphrased away as obscure
  rationale: The Syriac is bold and somewhat difficult, but the translation should
    expose rather than flatten that theological tension.
