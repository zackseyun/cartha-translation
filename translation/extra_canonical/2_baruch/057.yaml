lexical_decisions:
- source_word: ܢܘܓܪܗ / ܩܘܝܡܐ ܕܥܠܡܐ
  chosen: the beginning of the world
  alternatives:
  - the ordering of the world
  - the foundation of the world
  - the course of the world
  lexicon: Payne Smith
  rationale: Ceriani appears unstable here, while Kmosko supports a sense of primordial
    beginning/origin rather than later historical course.
- source_word: ܡܥܒܪܢܘܬܐ / ܚܛܗܐ
  chosen: transgression
  alternatives:
  - sin
  - overstepping
  lexicon: Payne Smith
  rationale: The paired wording points to Adam's primal act as a boundary-crossing
    offense, not merely a generic moral failure.
- source_word: ܐܬܬܙܝܥ ܡܘܬܐ
  chosen: death ... was stirred up
  alternatives:
  - death was awakened
  - death was set in motion
  lexicon: Payne Smith
  rationale: The verb suggests activation or arousal, preserving the apocalyptic rhetoric
    of death entering active operation.
- source_word: ܪܘܪܒܘܬܐ ܫܪܝܬ ܕܬܡܘܟ
  chosen: greatness began to be brought low
  alternatives:
  - majesty began to be humbled
  - human greatness began to sink
  lexicon: Payne Smith
  rationale: This keeps the downward-motion imagery and preserves the chapter's anthropology
    of post-Adamic diminishment.
- source_word: ܢܘܡܫܐ ܕܐܢܫܘܬܐ
  chosen: the measure of humanity
  alternatives:
  - the rule of humanity
  - the norm of mankind
  lexicon: Payne Smith
  rationale: The phrase seems evaluative and judicial in context; 'measure' fits the
    parallel with time being examined and strength tested.
- source_word: ܡܚܝܒܢܘܗܝ
  chosen: he made himself liable
  alternatives:
  - he made himself guilty
  - he indebted himself
  lexicon: Payne Smith
  rationale: The sense of incurred liability fits the judicial-theological context
    and avoids reducing the phrase to mere feeling of guilt.
- source_word: ܐܣܛܘܟܣܐ
  chosen: the elements
  alternatives:
  - elemental powers
  - rudiments
  lexicon: Greek loanword / Payne Smith
  rationale: The Syriac reflects Greek stoicheia; 'elements' is the most transparent
    rendering, with cosmological resonance left intact.
