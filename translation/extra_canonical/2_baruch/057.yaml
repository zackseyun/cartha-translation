translation:
  text: 'Hear now about the great cloud that you saw ascending from the sea and going
    to cover this earth: it is the beginning of the world, which the Mighty One made
    when he planned to make creation. And when the word went out from before him,
    the beginning of the world stood forth, very small, and it was established according
    to what was sought for it to become.


    And the first black waters that you saw descending upon it from the cloud—this
    is the transgression that Adam, the first man, committed. For when he sinned,
    death that was not in its time was stirred up, and mourning was made known, and
    sufferings were prepared, and pains were created, and toil was completed, and
    greatness began to be brought low.


    And concerning the last age, which was shown in the form and took on a likeness,
    know that the time will be examined, and the measure of humanity will be measured,
    and its strength will be tested. Therefore, because Adam, while he heard from
    God something of what was to be, and considered the release of the dead that had
    been given, and what had been commanded him by God, kept turning it over in his
    mind, he devised five thoughts. For he made himself liable, and he also made the
    angels liable. And also at that time when he was created, there was shown to him
    a vision: the bitter life and the elements with fire. Thus God gathered in Eden,
    in the likeness of those who were created.'
  philosophy: optimal-equivalence
