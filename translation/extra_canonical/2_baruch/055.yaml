theological_decisions:
- issue: Divine foreknowledge and commissioning (“before you were formed…I knew you”).
  chosen_reading: Render straightforwardly as personal divine knowledge and selection
    of the seer without importing prophetic-call formulas.
  alternative_readings:
  - Echo of Jeremiah 1:5 applied verbatim
  - Metaphorical knowledge only
  rationale: The Syriac wording closely parallels prophetic call language but stands
    on its own in context; the translation preserves the claim without forcing intertextuality.
- issue: Nature of Baruch’s ascent (“I was taken up—not in the body, and not knowing”).
  chosen_reading: Visionary transport, not an assertion of bodily translation; retain
    the disclaimer as given.
  alternative_readings:
  - Physical rapture
  - Purely internal dream
  rationale: The text explicitly denies bodily transport and emphasizes revelatory
    experience; wording is kept literal to avoid doctrinal over-interpretation.
- issue: ‘Their deeds and their labors are kept’—divine record or preservation.
  chosen_reading: Leave ‘kept’ open-ended, allowing for the sense of guarded/recorded
    for judgment.
  alternative_readings:
  - Rewarded in this world
  - Stored up only for eschatological judgment
  rationale: The verb’s semantics and the immediate context (a vision of evaluation)
    suggest custody/record without specifying when/how judgment ensues.
- issue: ‘Many have gone, few are kept’—scope of lament.
  chosen_reading: Read as a meditation on human mortality and transience, not a numerical
    soteriology.
  alternative_readings:
  - Statement of few saved vs. many lost
  - Demographic reflection only
  rationale: The contrast ‘gone/kept’ in Syriac readily fits the mortality theme in
    Baruch’s laments; translation avoids importing later doctrinal arithmetic.
