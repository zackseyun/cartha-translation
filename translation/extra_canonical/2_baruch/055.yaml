translation:
  text: 'And it happened, when I had finished the first words of this prayer, that
    I was disturbed and I trembled; and I was reflecting on the seed of humankind—how
    many are those who have gone, and how few are those who are kept. And as I was
    considering these things, I heard a voice that said to me:


    “Man, why are you troubled, and why are you afraid? For before you were formed
    I knew you, and before you came forth from your mother’s womb you were known to
    me. And for this reason I have shown you the things that are about to be.”


    And I said to him, “My Lord, you have shown me much of the time, and what has
    come to pass in it; but you have not shown me from end to end[a]—only what it
    is good to hear: the things that men have borne as testimony for instruction[b],
    one of them when a feast is being kept[c].” And many kinds of good things and
    evil things that are coming were made known to me. And then I went up to the mountain.


    And it came to pass, after seven days, that I came to that place where there is
    a spring. And as I was sitting there upon a chariot of a cloud, I was taken up—not
    in the body, and not knowing (how). And a mystery was shown to me, and I heard
    a voice that said to me: “See and know how, in this world, their deeds and their
    labors are kept, from what you have seen, therefore, of people who are good and
    of people who are evil[d].”—I say[e].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[a]'
    text: Literally “from hand to hand,” a Syriac idiom for “from one end to the other”
      (i.e., comprehensively).
    reason: lexical_alternative
  - marker: '[b]'
    text: The Syriac tewrṣā can denote instruction, arrangement, or exposition; here
      “for instruction” fits the context of men bearing witness.
    reason: lexical_alternative
  - marker: '[c]'
    text: The clause “one of them when a feast is being kept” is difficult; the Syriac
      wording is terse and its exact reference is debated. The translation preserves
      the phrasing without forcing an identification.
    reason: textual_variant
  - marker: '[d]'
    text: “Deeds and labors are kept” likely implies divine custody or record of human
      actions for evaluation.
    reason: cultural_note
  - marker: '[e]'
    text: This abrupt “—I say” marks a narrative transition. The detailed cloud-vision
      that follows begins in the next section; the chapter boundary here is a medium-confidence
      judgment based on Ceriani’s layout and the control witnesses.
    reason: alternative_reading
lexical_decisions:
- source_word: ܙܪܥܗ ܕܐܢܫܐ
  chosen: seed of humankind
  alternatives:
  - offspring of humankind
  - race of man
  - human stock
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Syriac zeraʿ (“seed”) regularly denotes collective posterity; rendering
    “humankind” clarifies scope beyond a single male individual while preserving the
    metaphor.
- source_word: ܡܬܕܘܕ
  chosen: troubled
  alternatives:
  - disturbed
  - agitated
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Conveys inward distress without over-psychologizing; fits the paired
    verb “to fear.”
- source_word: ܡܬܪܗܒ
  chosen: afraid
  alternatives:
  - terrified
  - alarmed
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Basic sense is to fear; “afraid” balances tone with preceding “troubled.”
- source_word: ܬܬܒܪܐ
  chosen: were formed
  alternatives:
  - were made
  - were fashioned
  lexicon: Brockelmann, Lexicon Syriacum
  rationale: The verb points to forming in the womb; “formed” avoids metaphysical
    implications beyond the context.
- source_word: ܐܬܝܕܥܬ ܠܝ
  chosen: you were known to me
  alternatives:
  - I knew you
  - you became known to me
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Passive/reflexive form with dative best rendered as “were known to me,”
    equivalent in sense to “I knew you” but closer to Syriac syntax.
- source_word: ܐܬܚܘܝܬ
  chosen: I have shown
  alternatives:
  - I have caused to be shown
  - I revealed
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Causative/reflexive indicates showing; “I have shown” reads smoothly
    and reflects the divine speaker’s action.
- source_word: ܡܢ ܐܝܕܐ ܥܕܡܐ ܠܐܝܕܐ
  chosen: from end to end
  alternatives:
  - from one side to the other
  - from one extremity to the other
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Idiomatic Syriac phrase using “hand” for “side/end”; “from end to end”
    is the English idiom closest in force.
- source_word: ܬܘܪܨܐ
  chosen: instruction
  alternatives:
  - admonition
  - exposition
  - reason
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Semantic range includes arrangement, plan, or instruction. In context
    of witnesses/testimony, “for instruction” best fits sense without over-specifying.
- source_word: ܐܫܬܘܕܝܘ
  chosen: were made known
  alternatives:
  - were shown
  - were disclosed
  lexicon: Brockelmann, Lexicon Syriacum
  rationale: Passive causative nuance; “were made known” conveys that Baruch received
    revelation.
- source_word: ܡܪܟܒܬܐ ܕܥܢܢܐ
  chosen: chariot of a cloud
  alternatives:
  - cloud-chariot
  - chariot of cloud
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Retains apocalyptic transport imagery; “chariot of a cloud” is literal
    and transparent.
- source_word: ܐܬܢܣܒܬ
  chosen: I was taken up
  alternatives:
  - I was carried up
  - I was lifted up
  lexicon: Brockelmann, Lexicon Syriacum
  rationale: Matches visionary ascent context without implying permanent translation.
- source_word: ܪܐܙܐ
  chosen: mystery
  alternatives:
  - secret
  - revelation
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Common Syriac for a divine secret; “mystery” preserves apocalyptic register.
- source_word: ܢܬܢܛܪܘܢ
  chosen: are kept
  alternatives:
  - are guarded
  - are preserved
  - are recorded
  lexicon: Brockelmann, Lexicon Syriacum
  rationale: Base sense is to guard/keep. Chosen reading leaves open whether this
    is record-keeping or preservation for judgment.
- source_word: ܥܒܕܝ̈ܗܘܢ / ܥܡܠܝ̈ܗܘܢ
  chosen: their deeds / their labors
  alternatives:
  - their works / their toil
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Pairs a general term for acts with one for effort/exertion; “deeds and
    labors” tracks lexical distinction.
- source_word: ܐܢܫܝܢ ܕܫܦܝܪ / ܐܢܫܝܢ ܒܝܫܐܝܬ
  chosen: people who are good / people who are evil
  alternatives:
  - good people / evil people
  - the good / the wicked
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Avoids nominalizing into “the righteous/the wicked,” keeping closer to
    the literal adjectives applied to “people.”},{
