lexical_decisions:
- source_word: ܛܒܬܐ / bonitati tuae
  chosen: your goodness
  alternatives:
  - your kindness
  - your beneficence
  lexicon: Payne Smith
  rationale: “Goodness” is broad and weighty enough for the divine attribute here, without narrowing the sense to mere kindness or generosity.
- source_word: ܪ̈ܚܡܝܟ / miserationes tuas
  chosen: your mercies
  alternatives:
  - your compassion
  - your acts of mercy
  lexicon: Payne Smith
  rationale: The plural is worth preserving because the prayer dwells on the abundance and manifoldness of divine mercy.
- source_word: ܡܬܬܚܡܐ / incomprehensibilis
  chosen: beyond comprehension
  alternatives:
  - incomprehensible
  - unsearchable
  lexicon: Payne Smith
  rationale: This keeps the predicate natural in English while preserving the stress on God's ungraspable greatness.
- source_word: ܬܚܝܬ ܝܡܝܢܟ / sub dextera tua
  chosen: under your right hand
  alternatives:
  - beneath your right hand
  - under your power
  lexicon: Payne Smith
  rationale: The literal image should stay visible; it conveys divine rule and shelter without reducing the phrase to abstraction.
- source_word: ܒܡܢܝܢܐ ܡܝܬܪܐ / in numeris praeclaris
  chosen: in the excellent number
  alternatives:
  - in the glorious number
  - among the distinguished number
  lexicon: Payne Smith
  rationale: The phrase appears to mark a specially appointed or honored company. “Excellent number” preserves that elevated but somewhat opaque apocalyptic diction.
- source_word: ܐܢܫܐ ܕܐܫܬܚܪܘ / nos qui subsistimus
  chosen: we who remain
  alternatives:
  - we who survive
  - we who are left
  lexicon: Payne Smith
  rationale: “Remain” fits the remnant setting and sounds less merely accidental than “survive,” while still carrying the sense of preservation.
- source_word: ܡܕܡ ܕܗܘܐ / quod fuit
  chosen: what was
  alternatives:
  - what has been
  - the things that were
  lexicon: Payne Smith
  rationale: The short rendering keeps the solemn backward glance of the line and matches the chapter’s reflective tone.
theological_decisions:
- issue: Whether to make verse 6 explicitly predestinarian in tone
  chosen_reading: except those who are called in the excellent number
  alternative_readings:
  - except those appointed in the glorious number
  - except those counted among the chosen
  rationale: The witness points to a specially numbered company, but the line should not be made more systematized than the text itself. The main text preserves the elevated apocalyptic phrasing without forcing later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether to paraphrase the divine-right-hand image in verse 6
  chosen_reading: those who are under your right hand
  alternative_readings:
  - those under your power
  - those under your protection
  rationale: The idiom likely carries sovereignty and protection together. Retaining the image keeps the text’s theological texture instead of flattening it into one explanatory idea.
  doctrine_reference: Original-language primacy over translation tradition; do not flatten imagery.
