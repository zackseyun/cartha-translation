theological_decisions:
- issue: Messianic wording
  chosen_reading: Messiah
  alternative_readings:
  - Anointed One
  - Christ
  rationale: The Syriac ܡܫܝܚܐ is retained as 'Messiah' to preserve Jewish apocalyptic
    register and avoid importing specifically Christian confessional wording.
  doctrine_reference: Do not import later theological phrasing beyond what the source
    warrants.
- issue: Resurrection hope
  chosen_reading: those who sleep in hope of him will rise
  alternative_readings:
  - those who died hoping in him will be raised
  - those asleep in hope will awake
  rationale: The translation preserves both the sleep metaphor and explicit hope directed
    toward the Messiah, rather than flattening the line into a generic statement about
    life after death.
  doctrine_reference: Preserve theological tension and apocalyptic imagery.
- issue: Intermediate-state imagery
  chosen_reading: storehouses ... souls of the righteous
  alternative_readings:
  - treasuries ... spirits of the righteous
  - hidden chambers ... persons of the righteous
  rationale: The text depicts souls being kept in reserve before resurrection. The
    translation retains that imagery instead of harmonizing it away.
  doctrine_reference: Do not flatten apocalyptic imagery into generic modern prose.
