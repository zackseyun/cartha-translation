translation:
  text: '1 And it will happen after these things, when the time of the coming of the
    Messiah is fulfilled, that he will return in glory. Then all those who sleep in
    hope of him will rise.


    2 And it will happen at that time that the treasuries will be opened in which
    the number of the souls of the righteous is kept, and they will come forth. And
    the multitudes of souls will appear together in one assembly, of one mind. And
    the first will rejoice, and the last will not be grieved.


    3 For they know that the time has come of which it was said, that it is the consummation
    of the times.


    4 But the souls of the wicked will waste away all the more when they see all these
    things.


    5 For they know that their torment has come, and that their destruction has arrived.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The chapter boundary is somewhat fragile on the shared Ceriani page: the
      opening of chapter 30 and the transition into chapter 31 stand close together
      in a textually messy zone. This draft follows the standard chapter division
      while keeping the wording cautious where the OCRed Syriac is roughest.'
    reason: textual_variant
  - marker: b
    text: The resurrection line and the clause about the stored souls are supported
      by the readable Syriac signals on the page together with control orientation
      from the traditional chapter division; the present Ceriani bucket itself is
      partially corrupted at this point.
    reason: alternative_reading
lexical_decisions:
- source_word: ܡܐܬܝܬܗ ܕܡܫܝܚܐ
  chosen: the coming of the Messiah
  alternatives:
  - the advent of the Messiah
  - the appearance of the Messiah
  lexicon: Smith
  rationale: The phrase points to the Messiah’s arrival in eschatological manifestation.
    'Coming' is clear English and avoids importing later Christian technical nuance
    more strongly than the Syriac requires.
- source_word: ܢܬܦܣܩ
  chosen: is completed
  alternatives:
  - is fulfilled
  - comes to its end
  lexicon: Smith
  rationale: The sense is temporal completion rather than violent cutting-off. 'Is
    completed' fits the apocalyptic timetable idiom.
- source_word: ܢܦܫ̈ܬܐ
  chosen: souls
  alternatives:
  - lives
  - persons
  lexicon: Smith
  rationale: The passage distinguishes the stored souls of the righteous before their
    emergence. 'Souls' preserves the text’s own anthropological language.
- source_word: ܩܕܡܝܬܐ / ܐܚܪܝܬܐ
  chosen: the first ... the last
  alternatives:
  - those earlier ... those later
  lexicon: Smith
  rationale: The paired temporal contrast is concise and weighty in English, matching
    the Syriac balance.
- source_word: ܫܘܠܡܗ ܕܙܒܢܐ / completion-of-times language
  chosen: the completion of the times
  alternatives:
  - the consummation of the times
  - the end of the times
  lexicon: Smith
  rationale: This keeps the eschatological finality of the phrase without overstating
    it into a modern paraphrase.
