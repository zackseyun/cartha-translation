lexical_decisions:
- source_word: ܡܪܝܡܐ
  chosen: the Most High
  alternatives:
  - the Exalted One
  lexicon: Payne Smith
  rationale: Standard biblical-apocalyptic divine title; preserves transcendence and matches the epistle’s elevated register.
- source_word: ܚܝܠܬܐ
  chosen: the Mighty One
  alternatives:
  - the Strong One
  lexicon: Payne Smith
  rationale: Kept distinct from ܡܪܝܡܐ rather than flattening both to the same English title.
- source_word: ܪ̈ܚܡܘܗܝ / ܚܢܢܗ
  chosen: his mercies / his grace
  alternatives:
  - his compassions / his favor
  lexicon: Payne Smith
  rationale: Preserves the paired Syriac terms with slightly differentiated English rather than merging them.
- source_word: ܚܘ̈ܘܝ
  chosen: visions
  alternatives:
  - revelations
  lexicon: Payne Smith
  rationale: Best fits the apocalyptic context and the parallel with the revealed ‘word.’
- source_word: ܫܘܠܡܐ / completion language
  chosen: consummation / completion
  alternatives:
  - end
  - fulfillment
  lexicon: Payne Smith
  rationale: Retains eschatological force without reducing the phrase to a merely temporal ‘end.’
- source_word: ܢܘܛܦܬܐ / spittle-comparison
  chosen: reckoned like spittle
  alternatives:
  - counted as spit
  lexicon: Payne Smith
  rationale: Keeps the intentionally degrading image instead of smoothing it into a vaguer figure.
- source_word: ܩܝ̈ܡܘܗܝ / ܦܘܩܕܢܐ
  chosen: commandments
  alternatives:
  - statutes
  - ordinances
  lexicon: Payne Smith
  rationale: ‘Commandments’ is the clearest natural rendering here, while still preserving covenantal obligation.
