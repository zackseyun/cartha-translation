theological_decisions:
- issue: Agency in Jerusalem's fall
  chosen_reading: The wall is overthrown by heavenly command through angels, so the
    enemies are denied ultimate credit.
  alternative_readings:
  - A more general statement that the wall simply fell
  - A reading centered on Babylonian agency alone
  rationale: The speech explicitly orders the angels to bring the wall down in order
    to prevent enemy boasting. The passage presents the destruction as divine judgment
    executed from above.
