translation:
  text: And after these things I heard that angel saying to those angels who were
    holding the torches, “Now pull down the supports of its walls and overthrow them,
    lest the enemies boast and say, ‘We ourselves have cast down the wall of Zion,
    and we have burned the place of the mighty God.’” And I was standing there in
    the place where I had been standing before.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ceriani bucket overlaps with adjacent chapter material. This draft follows
      the usual chapter-7 division in which the command to overthrow Zion's wall belongs
      here, while the voice from within the temple begins chapter 8.
    reason: textual_variant
  - marker: b
    text: The architectural phrase rendered 'the supports of its walls' is somewhat
      uncertain in the OCR substrate; 'foundations' is a plausible alternative.
    reason: lexical_alternative
  - marker: c
    text: Or 'I left that angel who had spoken with me—the one who had spoken to those
      angels who were holding the torches. 2 And he said,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܫܒܩܬܗ
  chosen: I left
  alternatives:
  - I departed from him
  - I withdrew from him
  lexicon: Payne Smith
  rationale: The verb naturally marks Baruch's separation from the angel. 'I left'
    is direct and keeps the narrative motion without overexplaining.
- source_word: ܠܡܦܐܕ̈ܐ / ܠܡܦܝܕܐ
  chosen: torches
  alternatives:
  - lamps
  - firebrands
  lexicon: Smith Syriac Dictionary
  rationale: In this destruction scene the fiery implements are more forceful than
    ordinary lamps. 'Torches' preserves the apocalyptic vividness.
- source_word: ܣܡܝܟܘܬ ܫܘܪ̈ܝܗ
  chosen: the supports of its walls
  alternatives:
  - the foundations of its walls
  - the buttresses of its walls
  lexicon: Payne Smith
  rationale: The phrase points to the structural strength or supporting parts of the
    wall. 'Supports' keeps that sense while avoiding false architectural precision.
- source_word: ܣܚܦܢܝܗܝ
  chosen: have cast down
  alternatives:
  - have overthrown
  - have torn down
  lexicon: Smith Syriac Dictionary
  rationale: The verb conveys forceful demolition. 'Cast down' fits the elevated rhetoric
    of the taunt.
- source_word: ܕܘܟܬܐ ܕܐܠܗܐ ܚܝܒܬܐ
  chosen: the place of the Mighty God
  alternatives:
  - the dwelling-place of the Mighty God
  - the place of the strong God
  lexicon: Payne Smith
  rationale: The title stresses divine majesty in context of sacrilege and judgment.
    'Mighty God' is idiomatic and preserves the weight of the phrase.
- source_word: ܘܐܬܩܝܡܘܬ
  chosen: I was set there
  alternatives:
  - I was placed there
  - I was made to stand there
  lexicon: Smith Syriac Dictionary
  rationale: The passive-like form suggests Baruch is positioned there rather than
    simply choosing to stand. 'I was set there' keeps that nuance.
