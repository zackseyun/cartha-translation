  rationale: 'The Ceriani OCR here is corrupt (ܕܒܥܝܢ for ܕܣܓܕܝܢ, and ܘܢܚܙܐ for ܘܡܗܝܡܢ). The draft attempts to translate the corrupt ܢܚܙܐ (''we see'') as ''he watches,'' which is grammatically incorrect. Aligning with the Kmosko control text restores the correct covenantal sense (''whom you worship... and he is faithful'') and maintains consistency with the identical verse in the preceding chapter context (2 Baruch 77:7). | Adjudicator: The reviewer correctly identifies that the base Syriac text provided is a corrupted OCR of the Ceriani edition. The standard critical text (Kmosko) reads ܕܣܓܕܝܢ (''you worship'') rather than the OCR''s ܕ'
