  from: that what has departed from us has not wholly departed
  to: something of what has not departed from us
  rationale: 'The Syriac (ܡܕܡ ܡܢ ܡܐ ܕܠܐ ܫܢܝ ܡܢ ܠܘܬܢ) means ''something of what has not departed from us'' (referring to the law). The draft''s paraphrase ''that what has departed from us has not wholly departed'' reverses the meaning and breaks the logical contrast with the following sentence, which emphasizes that the shepherds and lamps *have* perished. | Adjudicator: The reviewer correctly identifies the Syriac phrase `ܡܕܡ ܡܢ ܡܐ ܕܠܐ ܫܢܝ ܡܢ ܠܘܬܢ` (medem men ma d-la šni men lwaṯan), which literally translates to ''something of what has not departed from us.'' The curr'
