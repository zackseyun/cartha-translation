theological_decisions:
- issue: Whether Baruch's reply should stress that Israel's guidance is lost with its leaders or endures in the law.
  chosen_reading: Even if we depart, the law remains.
  alternative_readings:
  - Even if we are compelled away, the law still stands.
  rationale: The Syriac and Kmosko control both point to the law as the abiding source of shepherds, lamps, and springs; the translation preserves that theological emphasis rather than collapsing the line into mere consolation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
