translation:
  text: 7 For he is merciful[a], he whom you seek, and he is gracious, he in whom you hope. And he sees to it that he preserves and does not forsake. 8 Or have you not seen what happened to Zion? 9 Or did you think that the cedar sinned, and therefore was laid waste, or that the people acted foolishly, and therefore were handed over? 10 And do you not know that because of you, those who did not sin were overthrown, and because of those things that you did, those who were not foolish were delivered up? 11 And all the people answered and said to me, “As for all that we are able to say before you of the good things that the Mighty One did with you, we will make them known to you. 12 But now, ask on our behalf from above. And you also, before you depart from us, write a letter of instruction and of hope to our brothers, 13 so that you may show them also that what has gone from us has not gone from them. For the shepherds of Israel have perished, and the lamps that gave light are extinguished[b], and the springs from which we used to drink have been stopped. 14 And we are left in darkness and in the thick forest and in the thirst of the wilderness.” 15 And I answered and said to them, “The former fathers and the prophets were taken from us, 16 but we were left with the law. Therefore, if you look in the law and are intent in wisdom, what is more than these will not be lacking. And the shepherd will not flee, and the spring will not fail. 17 But as you said to me, I will go to Babylon, to your brothers, and I will send encouragement by the hand of scribes[c][b][a][c]. And I will make a letter and send it by an eagle.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: 'a'
    text: This Ceriani page-bucket overlaps the close of the preceding scene. In the standard chapter division reflected in Kmosko and Charles, most of this material belongs to 2 Baruch 77, and the epistle proper begins after the eagle commission.
    reason: textual_variant
  - marker: 'b'
    text: The Ceriani OCR in this clause is corrupt and includes a nonsensical reading; the English follows the sense secured by the Kmosko control witness and the broader passage logic.
    reason: textual_variant
  - marker: 'c'
    text: The triad 'lamp / shepherd / spring' is restored with help from Kmosko page 613, where the Ceriani bucket is visibly unstable at this edge.
    reason: textual_variant
  - marker: a
    text: Or 'whom you seek, and gracious is he in whom you hope; he watches'.
    reason: previous_rendering
  - marker: b
    text: Or 'that what has departed from us has not wholly departed'.
    reason: previous_rendering
  - marker: c
    text: Or 'the lamp will not fail, and the shepherd will not be lacking'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܡܚܣܢܢܐ
  chosen: merciful / gracious
  alternatives:
  - compassionate
  - kind
  lexicon: Payne Smith
  rationale: The paired repetition in this clause calls for relational mercy rather than a flatter adjective like 'kind'; I split the pair as 'merciful' and 'gracious' to preserve the rhetorical parallel.
- source_word: ܡܣܒܪܝܢ
  chosen: hope
  alternatives:
  - trust
  - expect
  lexicon: Payne Smith
  rationale: In this exhortational setting the sense is forward-looking reliance on God, so 'hope' carries the eschatological force better than 'trust' alone.
- source_word: ܚܝܠܬܢܐ
  chosen: the Mighty One
  alternatives:
  - the Strong One
  - the Powerful One
  lexicon: Payne Smith
  rationale: This divine epithet is already idiomatic in 2 Baruch translation history; 'the Mighty One' is readable English while preserving the elevated title.
- source_word: ܪ̈ܥܘܬܐ
  chosen: shepherds
  alternatives:
  - pastors
  - leaders
  lexicon: Payne Smith
  rationale: The image belongs to Israel's guiding caretakers; 'shepherds' keeps the metaphor alive instead of reducing it to the abstract 'leaders.'
- source_word: ܡܒܘ̈ܥܐ
  chosen: springs
  alternatives:
  - fountains
  - sources
  lexicon: Payne Smith
  rationale: The context is a life-giving supply from which the people 'drank'; 'springs' is natural English while still concrete.
- source_word: ܢܫܪܐ
  chosen: eagle
  alternatives:
  - great bird
  lexicon: Payne Smith
  rationale: The noun normally denotes an eagle or large raptor; 'eagle' is the standard, concrete rendering and fits the elevated messenger imagery.
