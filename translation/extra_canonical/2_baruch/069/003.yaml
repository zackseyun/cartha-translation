  from: that were going to be
  to: that are to be
  rationale: The Syriac active participle 'ʿatīdān' with the infinitive 'l-mehwā' indicates future or destined events ('are to be' or 'will be'). Translating it as past tense ('were going to be') creates an awkward tense clash with the present tense main verb 'stand' ('qāymān').
