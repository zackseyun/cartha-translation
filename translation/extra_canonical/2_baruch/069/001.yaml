theological_decisions:
- issue: Whether the passage speaks of divine foreknowledge or direct predetermination
  chosen_reading: he foresaw six kinds
  alternative_readings:
  - he ordained six kinds
  - he appointed six measures
  rationale: The wording, especially with the Kmosko control, emphasizes the Most
    High's prior knowledge of what would come to pass. 'Foresaw' preserves that emphasis
    without importing a stronger claim of causation than the witness requires.
  doctrine_reference: Divine foreknowledge should not be overstated into causal determinism
    where the source does not demand it.
- issue: How to render the final eschatological phrase
  chosen_reading: the consummation of the age
  alternative_readings:
  - the end of the age
  - the end of the world
  rationale: The chapter closes the sequence of waters and points to the climactic
    divine act. 'Consummation of the age' preserves the solemn apocalyptic horizon
    without narrowing the sense to physical destruction alone.
  doctrine_reference: Eschatological language should remain as broad as the source
    witness allows.
