  - the other waters ... black
  lexicon: Payne Smith
  entry: N/A
  rationale: The visionary sequence is reaching its closing stage, so 'last waters'
    fits the apocalyptic movement better than a flat 'other waters.' 'Blacker' preserves
    the comparative force and keeps continuity with the repeated black-water imagery.
- source_word: ܟܠܚܘܕܘܗܝ
  chosen: he alone
  alternatives:
  - he by himself
  - he only
  lexicon: Payne Smith
  entry: N/A
  rationale: The phrase stresses the Most High's exclusive knowledge. 'He alone' is
    the clearest idiomatic English and preserves the theological emphasis on singular
    divine foreknowledge.
- source_word: 'control-backed difficult clause (Kmosko: modos sex)'
