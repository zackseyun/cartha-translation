translation:
  text: '1. For the last waters that you saw, which were blacker than all those before
    them—these are they,


    2. because he alone knows what is going to happen.


    3. For the evils and the good things that were going to be before him stand as
    one fixed remembrance,


    4. and the ends of the times of the righteous, which were going to be accomplished
    before him, stand as one fixed remembrance, besides those things that he is going
    to do at the consummation of the age.


    5. Therefore the times are not counted with the times, nor the hours with the
    hours.'
  philosophy: optimal-equivalence
