translation:
  text: '1 But I will speak as I understand, and I will speak against you, land that
    prospers.


    2 The noonday blaze does not burn forever, nor do the rays of the sun keep giving
    light.


    3 Do not expect, and do not hope, that you will always have prosperity and joy.
    Do not lift yourself up too high, and do not oppress.


    4 For surely wrath will awaken against you in its appointed season; for now it
    is restrained by longsuffering, as by a bridle.


    5 And after I had spoken these things, I fasted seven days.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ceriani chapter bucket crosses an unstable page boundary here. This
      draft stops at ‘And when I had spoken these things, I fasted seven days,’ since
      the following lines on p0221 begin the next chapter’s scene.
    reason: textual_variant
  - marker: b
    text: The clause behind ‘lifted up and left unpunished’ is textually rough in
      the present Ceriani/OCR state; the rendering is cautious and keeps the warning
      sense without claiming perfect certainty for each verb nuance.
    reason: alternative_reading
lexical_decisions:
- source_word: ܐܝܟ ܕܡܫܬܡܥ ܐܢܐ
  chosen: as I understand
  alternatives:
  - as I hear
  - as it seems to me
  lexicon: Payne Smith
  entry: null
  rationale: The phrase can be heard more literally as hearing, but in this reflective
    lament setting it naturally carries the sense of Baruch speaking according to
    his apprehension or understanding.
- source_word: ܦܠܓܗ ܕܝܘܡܐ / ܡܫܬܘܙܒ
  chosen: the blaze of noon does not burn forever
  alternatives:
  - the noonday heat does not always burn
  - midday does not keep blazing
  lexicon: Payne Smith
  entry: null
  rationale: I kept the image concrete and vivid rather than abstracting it into mere
    prosperity, since the Syriac uses a heat-burning image to describe what does not
    last.
- source_word: ܕܒܒܥܘܬܟ ܬܬܩܒܠ ܡܕܡ
  chosen: that your petition will always be granted
  alternatives:
  - that anything of your request will be received
  - that your plea will be accepted
  lexicon: Payne Smith
  entry: null
  rationale: The clause points to a request or plea being accepted. ‘Petition’ preserves
    that supplicatory sense without over-formalizing it.
- source_word: ܬܬܢܣܒ ܘܬܫܬܒܩܝܢ
  chosen: be lifted up and left unpunished
  alternatives:
  - be exalted and spared
  - be raised up and let go
  lexicon: Payne Smith
  entry: null
  rationale: The Syriac is somewhat rough at this clause, but the paired verbs point
    to exaltation followed by being let off or spared; ‘left unpunished’ makes the
    warning plain while staying close to the sense.
- source_word: ܡܬܬܒܪܐ
  chosen: will awaken
  alternatives:
  - will be stirred up
  - will break forth
  lexicon: Payne Smith
  entry: null
  rationale: For wrath rising at an appointed time, ‘will awaken’ preserves the sense
    of something presently latent but certain to arise.
