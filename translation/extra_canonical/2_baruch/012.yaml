translation:
  text: '1 But I will speak as I understand, and I will speak against you, O land
    that prospers.

    2 The blaze of noon does not burn forever, nor do the rays of the sun always give
    light.

    3 Do not suppose, and do not expect, that your request will always be granted
    and that you will rejoice; and do not be greatly lifted up.

    4 For surely, at the appointed time wrath will awaken against you—wrath that is
    now held back by longsuffering, like a bridle.

    5 And if you should hear that Babylon also has been visited, then arise and listen.

    6 For there will not always be provision for all, nor a full abundance of delights
    for those who practice wickedness.

    7 In the time of their ease they say, “We shall be as we think, and as we have
    begun, so shall we continue.”

    8 But you shall say to them, “You who have drunk the well-strained wine, drink
    also of its dregs, the judgment of the Most High, who shows no partiality.”

    9 Therefore he did not spare even his own sons before, but afflicted them as enemies
    because they sinned,

    10 so that by chastening they might be sanctified.

    11 But now, you nations and peoples, you are guilty,

    12 because you have always trampled the earth and used the creation unjustly.

    13 For I have continually benefited you, but you have continually proved ungrateful.”

    14 And when I had spoken these things, I fasted seven days.'
