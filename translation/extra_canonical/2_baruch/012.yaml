theological_decisions:
- issue: Divine wrath in verse 4
  chosen_reading: Wrath is portrayed as delayed and restrained, not impulsive.
  alternative_readings:
  - Wrath simply erupts suddenly
  - Wrath is only a metaphor for political collapse
  rationale: The Syriac imagery of restraint like a bridle presents judgment as morally
    governed and timed, fitting the book's emphasis on measured divine justice.
  doctrine_reference: God's judgment is just, measured, and morally ordered.
- issue: Affliction of God's own people in verses 9-10
  chosen_reading: The punishment of Israel is rendered as chastening with a sanctifying
    purpose, not sheer abandonment.
  alternative_readings:
  - Pure retribution without restorative aim
  - Only national destruction with no moral purpose
  rationale: The sequence 'afflicted ... because they sinned' followed by sanctification
    supports disciplinary judgment within covenantal theology.
  doctrine_reference: Divine discipline may be severe yet ordered toward holiness.
- issue: Use of 'creation' in verse 12
  chosen_reading: The nations are condemned for unjust use of the created order, not
    merely for warfare against Israel.
  alternative_readings:
  - Only political oppression is meant
  - Only the land of Israel is in view
  rationale: The wording broadens the indictment beyond one people and frames wicked
    rule as a violation of God's created order.
  doctrine_reference: Creation belongs under God's moral governance, and human dominion
    is accountable.
