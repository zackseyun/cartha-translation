theological_decisions:
- issue: The force of divine wrath in verse 4
  chosen_reading: The wrath is rendered as a real future divine response against sinners,
    not merely an impersonal collapse of fortune.
  alternative_readings:
  - a purely political reversal without explicit divine agency
  rationale: The Syriac keeps the warning in moral and theological terms, with wrath
    arising at the appointed time against the sinner who feels secure.
