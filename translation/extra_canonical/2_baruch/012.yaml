lexical_decisions:
- source_word: ܐܝܟ ܕܡܫܬܡܥ ܐܢܐ
  chosen: as I understand
  alternatives:
  - as I hear
  - as it seems to me
  lexicon: Payne Smith
  rationale: The idiom can be heard as either hearing or inward apprehension; in this
    reflective lament setting, 'as I understand' best conveys Baruch's considered
    speech rather than mere auditory reception.
- source_word: ܕܒܒܥܘܬܟ
  chosen: your request
  alternatives:
  - your petition
  - your prayer
  lexicon: Payne Smith
  rationale: The term points to an appeal or petition. 'Request' keeps the line broad
    enough for the addressed land/nation, without forcing an explicitly liturgical
    nuance.
- source_word: ܡܫܬܘܙܒ
  chosen: burn
  alternatives:
  - glow
  - flare
  lexicon: Payne Smith
  rationale: In the image of the noonday heat, 'burn' preserves the harsh apocalyptic
    force better than a softer verb like 'shine'.
- source_word: ܡܬܬܒܪܐ
  chosen: will awaken
  alternatives:
  - will be stirred up
  - will break out
  lexicon: Payne Smith
  rationale: For divine wrath, 'awaken' keeps the sense of something presently restrained
    but destined to rise at its appointed moment.
- source_word: ܡܕܝܠܢܐ
  chosen: well-strained
  alternatives:
  - clarified
  - filtered
  lexicon: Payne Smith
  rationale: The contrast with 'dregs' calls for a wine term emphasizing refinement.
    'Well-strained' makes the reversal of fortune vivid.
- source_word: ܒܠܝܫܘ
  chosen: used unjustly
  alternatives:
  - misused
  - abused
  lexicon: Payne Smith
  rationale: The clause concerns creation being handled contrary to right order. 'Used
    unjustly' preserves both ethical and dominion-related force.
