theological_decisions:
- issue: Divine patience toward both sinners and the righteous
  chosen_reading: The clause is rendered as describing the Most High's forbearance
    toward all born human beings, including both sinners and the righteous.
  alternative_readings:
  - The clause could be read more narrowly as mercy chiefly toward the righteous
  - The patience language could be flattened into general kindness
  rationale: The source stresses the breadth and duration of God's restraint across
    generations. The translation preserves that tension without implying approval
    of sin or collapsing judgment into mere benevolence.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: What is preserved in the heavenly storehouses
  chosen_reading: The main text keeps 'righteousness' rather than narrowing it to
    'righteous deeds' alone.
  alternative_readings:
  - righteous deeds
  - merits
  rationale: The image likely includes the remembered standing and conduct of the
    righteous, but the Syriac is broader than a strict 'merit' formulation. The translation
    therefore keeps the more open term.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
