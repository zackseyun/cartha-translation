translation:
  text: '1 For behold, days are coming when the books will be opened, in which are
    written the sins of all who have sinned, and also the treasuries in which the
    righteousness of all who have been righteous in creation is gathered.

    2 And at that time you will see—and many who are with you—the patience of the
    Most High, how he has been patient through all generations with those who are
    born, both with those who sin and with the righteous.

    3 And I answered and said, “But behold, Lord, who knows the number of those things
    that have passed, or of those things that are to come?

    4 For I know what has befallen us, but what will happen to our enemies I do not
    know, or when you will visit your works.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening of this chapter falls near a tentative bucket edge in the current
      Ceriani segmentation. The main sense is clear, but exact verse-edge alignment
      may be refined after later control-witness review.
    reason: textual_variant
  - marker: b
    text: '''Storehouses'' could also be rendered ''treasuries''; the image is of
      righteousness being kept in reserve before the time of judgment.'
    reason: lexical_alternative
  - marker: c
    text: The final clause literally preserves the idiom of God 'visiting' his works,
      which may carry the sense of intervening in or calling to account the work of
      his hands.
    reason: lexical_alternative
lexical_decisions:
- source_word: ܟܬܒ̈ܐ
  chosen: books
  alternatives:
  - records
  - scrolls
  lexicon: Payne Smith
  rationale: The apocalyptic image is of written heavenly registers. 'Books' is the
    most transparent rendering and preserves the judicial scene without over-interpreting
    the medium as 'records'.
- source_word: ܓܙ̈ܐ
  chosen: storehouses
  alternatives:
  - treasuries
  - treasure-houses
  lexicon: Payne Smith
  rationale: The noun can denote treasuries, but here the emphasis is on a kept reserve
    in which righteousness is gathered. 'Storehouses' preserves the concrete imagery
    while remaining natural English.
- source_word: ܙܕܝܩܘܬܐ / ܙܕܝ̈ܩܐ
  chosen: righteousness / those who are righteous
  alternatives:
  - righteous deeds
  - justice
  lexicon: Payne Smith
  rationale: The passage speaks of what is preserved for the righteous before judgment.
    'Righteousness' keeps the term broad enough to include status and conduct, without
    reducing it only to deeds.
- source_word: ܡܓܪܬ ܪܘܚܗ ܐܪܝܟܬܐ (sense reflected in the clause on divine patience)
  chosen: forbearance
  alternatives:
  - long-suffering
  - patience
  lexicon: Payne Smith
  rationale: The thought is not mere delay but sustained divine restraint across generations.
    'Forbearance' communicates that weight in modern English better than the more
    archaic 'long-suffering.'
- source_word: ܡܬܝܠܕܝܢ / ܟܠ ܕܡܬܝܠܕ
  chosen: all who are born
  alternatives:
  - everyone born
  - all born people
  lexicon: Payne Smith
  rationale: This keeps the universal human scope explicit without adding interpretive
    language such as 'into the world,' which the Syriac does not require.
- source_word: ܣܥܪ / ܦܩܕ ܒܥܒ̈ܕܝܟ (sense of the final clause)
  chosen: visit your works
  alternatives:
  - attend to your works
  - intervene in your works
  - visit the work of your hands
  lexicon: Payne Smith
  rationale: The Syriac idiom likely carries the sense of divine visitation or intervention.
    Retaining 'visit' preserves the biblical and judicial tone while allowing the
    ambiguity to stand.
