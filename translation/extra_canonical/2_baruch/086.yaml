lexical_decisions:
- source_word: ܒܒܛܝܠܘܬܐ
  chosen: with care
  alternatives:
  - at leisure
  - in quietness
  - diligently
  lexicon: Payne Smith
  rationale: The noun can suggest quietness, leisure, or unhurried attentiveness.
    In this public-reading context, “with care” best captures deliberate, serious
    hearing without overstating the sense.
- source_word: ܬܬܗܪܘܢ
  chosen: give more earnest attention
  alternatives:
  - consider carefully
  - ponder
  - take heed
  lexicon: Payne Smith
  rationale: The verb carries a sense of careful regard or heeding. The English expands
    slightly to preserve the exhortatory force in natural prose.
- source_word: ܝܘܡ̈ܬܐ ܕܒ ܫܒ̈ܘܥܐ
  chosen: in the days of the weeks
  alternatives:
  - on the weekdays
  - in the weekly days
  - at the times of your fasts
  lexicon: Payne Smith
  rationale: Ceriani as transcribed reads literally in terms of “days” and “weeks.”
    Because the chapter edge and this line remain somewhat unstable, the draft stays
    close to the Syriac rather than importing a smoother liturgical sense from other
    traditions.
- source_word: ܬܬܥܗܕܘܢ
  chosen: you may remember
  alternatives:
  - you may be mindful
  - you may take it to heart
  lexicon: Payne Smith
  rationale: The root points naturally to remembering or calling to mind. “Remember”
    keeps the wording transparent and fits the paired moral exhortation that follows.
- source_word: ܬܬܪܨܘܢ
  chosen: be set right
  alternatives:
  - be corrected
  - be directed aright
  - be instructed
  lexicon: Payne Smith
  rationale: The verb suggests being made straight or corrected. “Be set right” keeps
    the moral and reforming force while reading idiomatically in English.
