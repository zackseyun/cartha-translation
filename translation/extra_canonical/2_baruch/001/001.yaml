  from: came upon
  to: came to
  rationale: While the Syriac preposition ܥܠ (al) literally means 'upon', the standard English idiom for this prophetic formula is 'came to' (as in 'the word of the Lord came to...').
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/2_baruch/001/001.job-77082.json
