  from: and said to him,
  to: saying, / and He said to him,
  rationale: Having 'the word' as the active subject of 'said' can feel slightly awkward in English. Rendering as 'saying' or 'and He said to him' smooths the prophetic formula while accurately reflecting the Syriac syntax.
