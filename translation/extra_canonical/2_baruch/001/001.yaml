lexical_decisions:
- source_word: ܫܪ̈ܒܢ / ܫܪ̈ܒܬܐ
  chosen: tribes
  alternatives:
  - clans
  - families
  rationale: In context the contrast is between the two remaining tribes and the ten exiled tribes, so “tribes” best preserves the historical-political frame.
- source_word: ܐܫܬܒܝܘ
  chosen: were carried away captive
  alternatives:
  - were led away captive
  - were exiled
  rationale: Keeps the captivity imagery explicit rather than flattening it into a general exile formula.
- source_word: ܐܬܐܠܨܘ / ܐܠܨܘ
  chosen: were driven / compelled
  alternatives:
  - were forced / forced
  - were pressured / pressured
  rationale: The paired verbs emphasize coercion in sin; “driven” and “compelled” preserve the force without sounding too mechanical.
- source_word: ܢܘܬܪ
  chosen: may prove useful
  alternatives:
  - may benefit
  - may be of profit
  rationale: The clause is difficult, but the underlying sense seems to point toward usefulness or profit among the nations; this keeps that basic idea while staying readable.
- source_word: ܡܘܨܠܚܘܬܗܘܢ ܕܙܒܢܝ̈ܗܘܢ
  chosen: the prosperity of their times
  alternatives:
  - the welfare of their age
  - the good of their season
  rationale: A deliberately literal rendering that preserves the temporal horizon of the promise without overdefining it as explicitly messianic.
