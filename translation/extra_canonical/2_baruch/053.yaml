translation:
  text: '1 And when I had said these things, I slept there, and I saw a vision in
    the night: and behold, a great cloud was ascending from the great sea, and I kept
    looking at it.


    2 And behold, it was full of bright and black waters, and many colors were in
    those waters, and something like the appearance of a great lightning-flash was
    seen at its top.


    3 And I saw that that cloud was passing swiftly in a violent course, and it covered
    the whole earth.


    4 And after these things, water began to descend from it upon the earth.


    5 And I saw that the waters descending from it were not all of one appearance.


    6 For at first there were very black waters for a time, and afterward I saw waters
    becoming bright, but they were not many; and afterward again I saw black waters,
    and after these bright, and again black, and again bright.


    7 And this happened up to twelve times, but the black waters were always more
    numerous than the bright.


    8 And it happened at the end of the cloud that, behold, it rained black waters,
    and they were darker than all the waters that had been before; and fire was mingled
    with them, and wherever those waters descended, they brought ruin and destruction.


    9 And after these things I saw the lightning which I had seen at the top of the
    cloud seize it and cast it down to the earth.


    10 And that lightning shone exceedingly, so that it gave light to the whole earth,
    and it healed those regions where the last waters had descended and had brought
    destruction.


    11 And it took hold of the whole earth, and it ruled over it.


    12 And after this I saw, and behold, twelve rivers were ascending from the sea,
    and they surrounded that lightning and became subject to it.


    13 And because of my fear, I awoke.'
