theological_decisions:
- issue: Identity of the lightning
  chosen_reading: The lightning is rendered neutrally as a visionary figure within
    the dream, without identifying it here as the Messiah.
  alternative_readings:
  - The lightning should already be translated as an explicit messianic figure
  - The lightning is only a natural phenomenon with no symbolic force
  rationale: In this chapter the interpretation has not yet been given. The text presents
    the lightning as a dominant healing and ruling force in the vision, so the translation
    preserves that imagery without prematurely importing the later explanation.
- issue: Symbolic force of the alternating waters
  chosen_reading: The waters are translated as symbolic and apocalyptic, but without
    over-explaining their historical referents inside the chapter itself.
  alternative_readings:
  - Translate in a more purely literal meteorological way
  - Build the later historical interpretation directly into the wording here
  rationale: Chapter 53 narrates the vision, not its explanation. The translation
    therefore keeps the ominous symbolic pattern visible while leaving the interpretive
    unpacking for the following chapter sequence.
