lexical_decisions:
- source_word: ܚܘ̈ܪܐ
  chosen: bright
  alternatives:
  - white
  - clear
  lexicon: Payne Smith
  rationale: Although the Syriac adjective can mean 'white,' I chose 'bright' because
    the chapter’s recurring contrast is between dark and luminous waters, and the
    later interpretive tradition likewise treats them as dark versus bright periods.
- source_word: ܩ̈ܝܐ / ܡ̈ܝܐ
  chosen: waters
  alternatives:
  - rains
  - streams
  lexicon: Payne Smith
  rationale: The vision concerns repeated descents of watery masses from the cloud;
    'waters' preserves the symbolic breadth better than the narrower 'rain' or 'streams.'
- source_word: ܚܝܦܐܝܬ ܒܪܗܛܐ ܩܫܝܐ
  chosen: swiftly in a violent course
  alternatives:
  - rapidly in a hard rushing
  - speedily in a fierce run
  lexicon: Payne Smith
  rationale: I kept both speed and force in view so the cloud remains ominous and
    apocalyptic, not merely fast-moving.
- source_word: ܐܚܕܗ̇ ... ܘܐܬܚ[... ] ܠܐܪܥܐ
  chosen: seize it and cast it down to the earth
  alternatives:
  - grasp it and bring it down to the earth
  - take hold of it and drag it to the earth
  lexicon: Payne Smith
  rationale: The Ceriani OCR is slightly damaged here, but Kmosko’s control supports
    a forceful downward action by the lightning upon the cloud.
- source_word: ܡܬܚܙܐ ܗܘܐ ܒܪܝܫܗ̇
  chosen: was seen at its top
  alternatives:
  - appeared at its summit
  - was visible at its head
  lexicon: Payne Smith
  rationale: I used straightforward visionary language that preserves the elevated
    spatial imagery without sounding over-technical.
