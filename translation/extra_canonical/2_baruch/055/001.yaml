  from: I have shown you these things that are to come.
  to: these things that are to come were shown to you.
  rationale: The Syriac verb ܐܬܚܘܝܬ is in the Ethpaal (passive/reflexive) stem, meaning 'was shown' or 'appeared,' not the active Aphel ('I showed'). The phrase ܐܬܚܘܝܬ ܠܟ ܗܠܝܢ means 'these things were shown to you,' not 'I have shown you.'
