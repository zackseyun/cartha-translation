lexical_decisions:
- source_word: ܙܪܥܗ ܕܐܢܫܐ
  chosen: seed of humankind
  alternatives:
  - offspring of humankind
  - race of man
  - human stock
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Syriac zeraʿ (“seed”) regularly denotes collective posterity; rendering “humankind” clarifies scope beyond a single male individual while preserving the metaphor.
- source_word: ܡܬܕܘܕ
  chosen: troubled
  alternatives:
  - disturbed
  - agitated
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Conveys inward distress without over-psychologizing; fits the paired verb “to fear.”
- source_word: ܡܬܪܗܒ
  chosen: afraid
  alternatives:
  - terrified
  - alarmed
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Basic sense is to fear; “afraid” balances tone with preceding “troubled.”
- source_word: ܬܬܒܪܐ
  chosen: were formed
  alternatives:
  - were made
  - were fashioned
  lexicon: Brockelmann, Lexicon Syriacum
  rationale: The verb points to forming in the womb; “formed” avoids metaphysical implications beyond the context.
- source_word: ܐܬܝܕܥܬ ܠܝ
  chosen: you were known to me
  alternatives:
  - I knew you
  - you became known to me
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Passive/reflexive form with dative best rendered as “were known to me,” equivalent in sense to “I knew you” but closer to Syriac syntax.
- source_word: ܐܬܚܘܝܬ
  chosen: I have shown
  alternatives:
  - I have caused to be shown
  - I revealed
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Causative/reflexive indicates showing; “I have shown” reads smoothly and reflects the divine speaker’s action.
- source_word: ܡܢ ܐܝܕܐ ܥܕܡܐ ܠܐܝܕܐ
  chosen: from end to end
  alternatives:
  - from one side to the other
  - from one extremity to the other
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Idiomatic Syriac phrase using “hand” for “side/end”; “from end to end” is the English idiom closest in force.
- source_word: ܬܘܪܨܐ
  chosen: instruction
  alternatives:
  - admonition
  - exposition
  - reason
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Semantic range includes arrangement, plan, or instruction. In context of witnesses/testimony, “for instruction” best fits sense without over-specifying.
- source_word: ܐܫܬܘܕܝܘ
  chosen: were made known
  alternatives:
  - were shown
  - were disclosed
  lexicon: Brockelmann, Lexicon Syriacum
  rationale: Passive causative nuance; “were made known” conveys that Baruch received revelation.
- source_word: ܡܪܟܒܬܐ ܕܥܢܢܐ
  chosen: chariot of a cloud
  alternatives:
  - cloud-chariot
  - chariot of cloud
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Retains apocalyptic transport imagery; “chariot of a cloud” is literal and transparent.
- source_word: ܐܬܢܣܒܬ
  chosen: I was taken up
  alternatives:
  - I was carried up
  - I was lifted up
  lexicon: Brockelmann, Lexicon Syriacum
  rationale: Matches visionary ascent context without implying permanent translation.
- source_word: ܪܐܙܐ
  chosen: mystery
  alternatives:
  - secret
  - revelation
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Common Syriac for a divine secret; “mystery” preserves apocalyptic register.
- source_word: ܢܬܢܛܪܘܢ
  chosen: are kept
  alternatives:
  - are guarded
  - are preserved
  - are recorded
  lexicon: Brockelmann, Lexicon Syriacum
  rationale: Base sense is to guard/keep. Chosen reading leaves open whether this is record-keeping or preservation for judgment.
- source_word: ܥܒܕܝ̈ܗܘܢ / ܥܡܠܝ̈ܗܘܢ
  chosen: their deeds / their labors
  alternatives:
  - their works / their toil
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Pairs a general term for acts with one for effort/exertion; “deeds and labors” tracks lexical distinction.
- source_word: ܐܢܫܝܢ ܕܫܦܝܪ / ܐܢܫܝܢ ܒܝܫܐܝܬ
  chosen: people who are good / people who are evil
  alternatives:
  - good people / evil people
  - the good / the wicked
  lexicon: Payne Smith, A Compendious Syriac Dictionary
  rationale: Avoids nominalizing into “the righteous/the wicked,” keeping closer to the literal adjectives applied to “people.”},{
theological_decisions:
- issue: Divine foreknowledge and commissioning (“before you were formed…I knew you”).
  chosen_reading: Render straightforwardly as personal divine knowledge and selection of the seer without importing prophetic-call formulas.
  alternative_readings:
  - Echo of Jeremiah 1:5 applied verbatim
  - Metaphorical knowledge only
  rationale: The Syriac wording closely parallels prophetic call language but stands on its own in context; the translation preserves the claim without forcing intertextuality.
- issue: Nature of Baruch’s ascent (“I was taken up—not in the body, and not knowing”).
  chosen_reading: Visionary transport, not an assertion of bodily translation; retain the disclaimer as given.
  alternative_readings:
  - Physical rapture
  - Purely internal dream
  rationale: The text explicitly denies bodily transport and emphasizes revelatory experience; wording is kept literal to avoid doctrinal over-interpretation.
- issue: ‘Their deeds and their labors are kept’—divine record or preservation.
  chosen_reading: Leave ‘kept’ open-ended, allowing for the sense of guarded/recorded for judgment.
  alternative_readings:
  - Rewarded in this world
  - Stored up only for eschatological judgment
  rationale: The verb’s semantics and the immediate context (a vision of evaluation) suggest custody/record without specifying when/how judgment ensues.
- issue: ‘Many have gone, few are kept’—scope of lament.
  chosen_reading: Read as a meditation on human mortality and transience, not a numerical soteriology.
  alternative_readings:
  - Statement of few saved vs. many lost
  - Demographic reflection only
  rationale: The contrast ‘gone/kept’ in Syriac readily fits the mortality theme in Baruch’s laments; translation avoids importing later doctrinal arithmetic.
