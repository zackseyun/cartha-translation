lexical_decisions:
- source_word: ܡܢܝܗܝ
  chosen: reckoning
  alternatives:
  - counting
  - account
  lexicon: Payne Smith
  rationale: In context the clause contrasts many years and few years before the Most
    High; 'reckoning' preserves the judicial/accounting nuance without sounding overly
    technical.
- source_word: ܙܒܘ̈ܢܝ / ܫ̈ܢܝܗܝ
  chosen: many years or few years
  alternatives:
  - much time or little time
  lexicon: Payne Smith
  rationale: The paired temporal terms are somewhat noisy in the OCR, but the sense
    is clearly a contrast between long and short duration.
- source_word: ܡܘܬܪܐ
  chosen: profit / benefit
  alternatives:
  - advantage
  - gain
  lexicon: Payne Smith
  rationale: The argument is moral rather than commercial; 'profit' and 'benefit'
    fit the rhetorical question about Adam’s lifespan.
- source_word: ܡܒܣܪܝܢ
  chosen: kindled
  alternatives:
  - lit
  - made shine
  lexicon: Payne Smith
  rationale: With 'lamp' in the same clause, an illumination verb is most natural;
    'kindled a lamp' keeps the image vivid.
- source_word: ܢܣܘܒܘܬ ܒܪܢܫܐ ܕܒܣܘܪ
  chosen: the people of Israel
  alternatives:
  - the offspring of Israel
  - the race of Israel
  lexicon: Payne Smith
  rationale: The closing sense is collective and national. 'People of Israel' reads
    naturally while preserving the communal reference.
theological_decisions:
- issue: Moral value of lifespan
  chosen_reading: The chapter teaches that length of life has no saving value apart
    from obedience.
  alternative_readings:
  - The passage primarily contrasts two exemplary figures without making a broader
    principle explicit.
  rationale: 'The Adam/Moses contrast functions as an argument: long life without
    obedience profits nothing, while shorter life with fidelity serves God’s purpose.'
- issue: Moses as light-bearer
  chosen_reading: The lamp imagery refers to Moses bringing revelatory guidance through
    the law to Israel.
  alternative_readings:
  - The lamp could be read more narrowly as Moses himself as an example rather than
    the law he mediates.
  rationale: The law and lamp images stand together in the clause, so the translation
    keeps both revelation and guidance in view.
