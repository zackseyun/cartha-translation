translation:
  text: '1. But you, Baruch, fix your heart on what has been said to you, and understand
    the things shown to you, for many eternal comforts are kept for you.

    2. For you will depart from this place, and pass from the regions now visible
    to you; you will forget what is corruptible, and you will no longer remember what
    happens among mortals.

    3. Therefore go, command your people, and come to this place; afterward fast seven
    days, and then I will come to you and speak with you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The chapter opening is clear from the explicit Syriac numeral 43 on p0204,
      but the page still carries the closing lines of the prior chapter just above
      it.
    reason: textual_variant
  - marker: b
    text: The middle of verse 2 is textually rough in the Ceriani witness. The draft
      follows the broad sense that Baruch will leave the corruptible mortal sphere,
      while avoiding a more exact reconstruction than the page securely supports.
    reason: textual_variant
lexical_decisions:
- source_word: ܒܪܘܫ ܐܬܩܢ ܠܒܟ
  chosen: fix your heart
  alternatives:
  - set your heart
  - direct your heart
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The idiom is exhortational, calling for inward steadiness and readiness.
    'Fix your heart' keeps the concrete Syriac imagery while sounding natural in English.
- source_word: ܒܘܝܐܐ ܣܓܝܐܐ
  chosen: many eternal comforts
  alternatives:
  - great consolation
  - many consolations
  - abundant hope
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The noun can lean toward consolation/comfort rather than mere abstract
    hope. I kept the plural force and rendered it in an eschatological register.
- source_word: ܕܒܠܥܕܡ
  chosen: eternal
  alternatives:
  - forever
  - without end
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The phrase marks enduring permanence, not just a long duration. 'Eternal'
    best matches the apocalyptic tone.
- source_word: ܬܥܒܪ ܡܢ ܐܬܪ̈ܘܬܐ
  chosen: pass from the regions
  alternatives:
  - leave the places
  - go beyond the regions
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The Syriac suggests transition out of the presently seen realm. 'Pass
    from' preserves movement without over-defining the mode of departure.
- source_word: ܡܕܡ ܕܡܬܚܒܠ / ܕ... ܡܘ̈ܬܐ
  chosen: what is corruptible ... what happens among mortals
  alternatives:
  - the perishable ... the things of dying men
  - corruption ... mortal affairs
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: This portion of Ceriani is textually rough, but the surviving sense contrasts
    Baruch's coming state with the perishable human sphere. The rendering keeps that
    contrast visible without false precision.
- source_word: ܦܩܕ / ܨܘܡ
  chosen: command your people ... fast seven days
  alternatives:
  - charge your people ... fast for seven days
  - instruct your people ... keep a seven-day fast
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The verbs are direct imperatives. I kept them terse to preserve the solemn,
    prophetic cadence.
