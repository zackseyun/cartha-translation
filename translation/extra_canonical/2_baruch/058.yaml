theological_decisions:
- issue: Adam's act and the entry of death
  chosen_reading: Adam's first transgression is rendered as the decisive primal act that stirs up untimely death and the chain of human misery.
  alternative_readings:
  - The passage could be softened into a more general statement about human fallenness.
  - The clause could be read less causally and more descriptively.
  rationale: The Syriac links Adam's act directly with death, mourning, pain, and toil. The translation preserves that causal-apocalyptic logic rather than diluting it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1-3
- issue: The difficult clause about 'the release of the dead'
  chosen_reading: The phrase is left relatively literal rather than harmonized into a clearer doctrinal statement about resurrection.
  alternative_readings:
  - a reference to resurrection
  - a reference to mortality or death's sentence
  rationale: The Ceriani-based wording is syntactically difficult. A more explicit doctrinal gloss would claim more certainty than the source bucket warrants.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
