translation:
  text: 'Hear what the great cloud is that you saw ascending from the sea and covering
    this earth: it is the beginning of the world, which the Mighty One made when he
    planned to make creation. And when the word went out from before him, the beginning
    of the world stood forth, a small thing, and it was set in order according to
    what it was intended to become.


    And the first black waters that you saw descending from the cloud—this is the
    transgression that Adam, the first man, committed. For when he sinned, death was
    stirred up before its time, and mourning was made known, and pains were prepared,
    and anguish was created, and toil was completed, and greatness began to be brought
    low.


    And as for the last age, which was shown in the form that had taken likeness,
    know that the time will be searched out, and the measure of humanity will be measured,
    and its strength will be tested. Therefore, because Adam, when he heard from God
    something of what was to be, reflected on the release of the dead that had been
    given, and on what had been commanded him by God, kept considering it and devised
    five thoughts. For he made himself liable, and through him the angels also were
    made liable. And at the time when he was created, a vision was shown to him: the
    bitter life, and the elements with fire. Thus God gathered these beforehand in
    the likeness of those who were created.'
  philosophy: optimal-equivalence
