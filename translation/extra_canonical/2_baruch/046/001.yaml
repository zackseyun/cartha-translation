  from: '1 And my son and the elders of the people answered and said to me,


    "Has the Mighty One humbled us so greatly as to take you from us so suddenly?

    2 Truly, we shall be in darkness,

    and there will be no light for the people who are left.

    3 For where shall we seek the law again,

    or who will guide us from the house of death into life?"


    4 And I said to them,

    "I cannot stand against the will of the Mighty One.

    Yet Israel will not lack a wise man,

    nor the seed of Jacob a son of the law.

    5 But prepare your hearts so that you may listen to the law and hold fast to understanding.

    6 For if you do these things,

    hope will rest upon you—

    those things that were spoken to you before.

    7 And you will not fall into the torment about which it was told you beforehand."


    8 But the word concerning my being taken up I did not make known to them, nor to my son.'
  to: '1 And my son and the elders of the people answered and said to me,


    "Has the Mighty One indeed humbled us so greatly as to take you from us suddenly?

    2 Truly, we shall be in darkness,

    and there will be no light for the people who are left.

    3 For where shall we seek the law again,

    or who will guide us from the house of death into life?"


    4 And I said to them,

    "I cannot stand against the will of the Mighty One.

    Yet Israel will not lack a wise man,

    nor the seed of Jacob a son of the law.

    5 But prepare your hearts so that you may listen to the law and be attentive to understanding.

    6 For if you do these things,

    hope will be given to you—

    these things that were spoken to you before.

    7 And you will not fall into the torment that was told to you beforehand."


    8 But the word that I was being taken away I did not reveal to them, nor to my son.'
  rationale: 'Adjusted several phrases for closer lexical accuracy and more natural formal English: added ''indeed,'' removed interpretive ''so suddenly,'' changed ''hold fast to understanding'' to ''be attentive to understanding,'' rendered the hope clause more literally as ''hope will be given to you,'' smoothed verse 7, and revised verse 8 from ''being taken up''/''make known'' to the more neutral ''being taken away''/''reveal.'''
