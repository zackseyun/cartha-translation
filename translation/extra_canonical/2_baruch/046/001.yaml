lexical_decisions:
- source_word: ܚܝܠܬܢܐ
  chosen: the Mighty One
  alternatives:
  - the Strong One
  - the Powerful One
  lexicon: Payne Smith
  rationale: This divine title is frequent in apocalyptic diction. 'The Mighty One' preserves its weight and avoids flattening it to a generic 'God'.
- source_word: ܡܟܟܢ
  chosen: humbled us
  alternatives:
  - brought us low
  - abased us
  lexicon: Payne Smith
  rationale: The verb carries the sense of being brought low or humiliated. 'Humbled us' fits the communal lament and remains idiomatic.
- source_word: ܫܠܝ
  chosen: so suddenly
  alternatives:
  - quickly
  - at once
  lexicon: Payne Smith
  rationale: The people's grief focuses on Baruch's rapid removal. 'So suddenly' makes the emotional force clear in English.
- source_word: ܒܝܬ ܡܘܬܐ
  chosen: the house of death
  alternatives:
  - death
  - the realm of death
  lexicon: Payne Smith
  rationale: The Syriac image is concrete. Retaining 'house of death' preserves the solemn metaphor instead of reducing it to an abstract noun.
- source_word: ܒܪ ܢܡܘܣܐ
  chosen: a son of the law
  alternatives:
  - a disciple of the law
  - a legal scholar
  lexicon: Payne Smith
  rationale: The filial idiom should remain visible. 'Son of the law' keeps the Semitic texture and suggests a formed, loyal heir of Torah instruction.
- source_word: ܣܒܪܐ
  chosen: hope
  alternatives:
  - good tidings
  - encouragement
  lexicon: Payne Smith
  rationale: The noun can shade toward expectation or hopeful message. 'Hope' best fits the promise that will 'rest upon' the faithful.
theological_decisions:
- issue: Divine epithet
  chosen_reading: Retain 'the Mighty One' as the repeated title for God.
  alternative_readings:
  - Render simply 'God'
  - Render 'the Strong One'
  rationale: The chapter's rhetoric depends on the elevated apocalyptic title. A generic substitute would weaken the tone and the continuity with surrounding chapters.
- issue: Torah succession after Baruch's departure
  chosen_reading: Translate ܒܪ ܢܡܘܣܐ literally as 'a son of the law.'
  alternative_readings:
  - a teacher of the law
  - a scholar of the law
  rationale: The verse affirms continuity of covenant instruction within Israel. The literal idiom better preserves that inherited, communal sense.
- issue: Death-life contrast
  chosen_reading: Keep 'from the house of death into life.'
  alternative_readings:
  - between death and life
  - from death to life
  rationale: The Syriac wording is imagistic, not merely conceptual. Preserving the image suits the lament and the chapter's solemn register.
