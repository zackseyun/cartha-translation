    and shook it over all the earth. And after this I saw, and behold, twelve rivers
    were ascending from the sea, and they surrounded that lightning and became subject
    to it, and they rejoiced over it and praised it. And I awoke because of my fear.'
  rationale: 'Tightened the English for accuracy and naturalness: adjusted word order
    and phrasing to better match the Syriac, removed unsupported additions such as
    ''for no short time,'' ''dragged it down to the earth,'' ''it shone very greatly,''
    ''healed the regions,'' and ''exercised dominion over it,'' and rendered several
    clauses more literally (e.g., ''at its head,'' ''at the end of the cloud,'' ''produced
    devastation and destruction'').'
