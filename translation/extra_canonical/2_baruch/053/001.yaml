  from: 'And when I had said these things, I slept there, and I saw a vision—by night.
    And behold, from the great sea I saw a cloud ascending, and it was full of white
    and black waters, and there were many colors in those waters, and on its head
    there appeared the likeness of a great lightning. And I looked, and the cloud
    passed swiftly with a violent course and covered the whole earth. And after this
    the waters that were in it began to rain down upon the earth; and I saw that the
    sort of those waters was not one and the same. For at first black waters were
    descending for no short time, and after these I saw bright waters. And after this
    again I saw [it] black; and after this again bright; again black, again bright.
    And this happened up to twelve times, but in all of them the black were more than
    the bright.


    And it came to pass, at the completion of the cloud, that there rained waters—black
    and dark—more than all the former waters; and there was a mixture in them, and
    wherever those waters descended they made ruin and destruction. And after these
    things I saw the lightning which I had seen at the head of the cloud—that it seized
    the cloud and dragged it down to the earth—and it shone very greatly, so that
    it gave light to the earth and healed the regions where the last waters had descended
    and had brought ruin. And it occupied the whole earth and exercised dominion over
    it. And after these things I looked, and behold, twelve rivers were ascending
    from the sea; they encircled that lightning and were subject to it, and they rejoiced
    for it and gave praise to it. And I, from my fear, awoke.'
