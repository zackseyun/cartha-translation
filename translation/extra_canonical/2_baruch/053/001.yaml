lexical_decisions:
- source_word: ܥܢܢܐ
  chosen: cloud
  alternatives:
  - storm-cloud
  lexicon: Payne Smith; Brockelmann
  rationale: Common Syriac term for cloud; context demands a large, moving cloud that
    rains.
- source_word: ܩ̈ܝܐ
  chosen: rains
  alternatives:
  - waters
  - showers
  lexicon: Payne Smith
  rationale: Plural form used in a raining context; rendering as “rains” preserves
    the action of descending from the cloud.
- source_word: ܐܘܟܡܐ
  chosen: black
  alternatives:
  - dark
  lexicon: Payne Smith
  rationale: Standard adjective for black/dark; kept as “black” to mirror contrast
    with “bright.”
- source_word: ܢܗܝܪܐ
  chosen: bright
  alternatives:
  - shining
  - luminous
  lexicon: Payne Smith
  rationale: Conventional Syriac for light/brightness; “bright” is concise and contrasts
    with “black.”
- source_word: ܒܪܩܐ
  chosen: lightning
  alternatives:
  - flash
  - bolt
  lexicon: Payne Smith
  rationale: Typical rendering of bārqā; the vision explicitly likens something at
    the cloud’s head to a great lightning.
- source_word: ܡܣܬܝܟܐ
  chosen: covered
  alternatives:
  - overspread
  - overshadowed
  lexicon: Payne Smith
  rationale: Verb indicates the cloud “spread over” the earth; “covered” fits idiomatically.
- source_word: ܒܪܗܛܐ ܩܫܝܐ
  chosen: with a violent course
  alternatives:
  - with a hard/rapid run
  - swiftly and forcefully
  lexicon: Payne Smith
  rationale: Rhetorical intensifier of the cloud’s speed and force; preserves the
    grim tone of the vision.
- source_word: ܚܫܘܟܝܢ
  chosen: dark
  alternatives:
  - tenebrous
  - gloomy
  lexicon: Payne Smith
  rationale: Adjective intensifies the final waters’ darkness; “dark” communicates
    the quality without over-interpretation.
- source_word: ܐܒܕܢܐ
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: Payne Smith
  rationale: The waters cause tangible devastation; “destruction” is the standard
    sense here.
- source_word: ܐܚܕ ... ܘܐܬܚܬ
  chosen: seized ... and dragged down
  alternatives:
  - grasped ... pulled down
  - took hold ... brought down
  lexicon: Payne Smith
  rationale: The lightning’s action on the cloud is forceful; paired verbs convey
    capture and downward motion.
- source_word: ܢܗ̈ܪܐ/ܢܘܗ̈ܪܐ
  chosen: rivers
  alternatives:
  - lights
  lexicon: Payne Smith; comparative with Kmosko Latin
  rationale: Context and control witness favor “rivers” (naharē) ascending from the
    sea; the graphemic similarity with “lights” (nūhrē) explains the variant.
- source_word: ܩܪܘܙܐ
  chosen: proclamation
  alternatives:
  - herald
  - announcement
  lexicon: Payne Smith
  rationale: The term likely refers to the lightning’s ‘announcement’; retained as
    “proclamation,” with the phrase kept close to Syriac despite ambiguity.
- source_word: ܐܫܬܠܛ
  chosen: exercised dominion
  alternatives:
  - ruled
  - prevailed
  lexicon: Payne Smith; control Latin “dominatum est”
  rationale: Captures the sense of taking control over the earth, matching the control
    witness.
theological_decisions:
- issue: Whether to identify the black and bright waters with specific historical
    epochs within the vision chapter.
  chosen_reading: Leave the imagery uninterpreted in ch. 53; render symbols plainly
    as seen.
  alternative_readings:
  - Insert historical identifications (e.g., Adam, Flood, etc.) in the translation
  rationale: The interpretation is given later in the book; importing it here would
    preempt the inspired sequence and over-interpret the vision.
- issue: Rendering of the culminating action of the lightning (illumination and healing).
  chosen_reading: Translate the sequence of shining/illumination and healing, with
    cautious reliance on the control witness.
  alternative_readings:
  - Omit illumination/healing due to Syriac OCR difficulty
  - Paraphrase as generic victory of light over darkness
  rationale: The control Latin closely parallels known Syriac text and clarifies damaged
    lines; retaining these concrete actions preserves apocalyptic specificity without
    allegorizing.
- issue: ‘Twelve rivers’ versus ‘twelve lights’.
  chosen_reading: Render ‘twelve rivers’ ascending from the sea, with a footnote noting
    the alternate reading ‘lights’.
  alternative_readings:
  - Prefer ‘lights’ as lectio facilior given OCR
  - Avoid decision by vague wording
  rationale: Narrative coherence and the secondary control support ‘rivers’; but transparency
    requires flagging the variant.
