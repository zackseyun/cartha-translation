lexical_decisions:
- source_word: ܫ̈ܢܝܗܝ
  chosen: the years
  alternatives:
  - the days
  lexicon: Payne Smith
  rationale: The Syriac points to a temporal span measured in years; retaining 'years'
    preserves the lament’s concrete brevity.
- source_word: ܙܒܘ̈ܢܝ
  chosen: of this age
  alternatives:
  - of this time
  - of these times
  lexicon: Payne Smith
  rationale: In this apocalyptic setting, the term reaches beyond a mere moment and
    refers to the present mortal order.
- source_word: ܡܫܟܚ
  chosen: can acquire
  alternatives:
  - is able to attain
  - can obtain
  lexicon: Payne Smith
  rationale: The verb is rendered actively to preserve Baruch’s question about whether
    a short human life can attain what lies beyond ordinary measure.
- source_word: ܡܟܝܠܐ
  chosen: in so little time
  alternatives:
  - in a small span
  - within so brief a measure
  lexicon: Payne Smith
  rationale: The sense is brevity or smallness of allotted span, which fits the complaint
    about human limitation.
- source_word: ܡܫܘܚܬܐ
  chosen: that which is immeasurable
  alternatives:
  - that which is beyond measure
  - the measureless thing
  lexicon: Payne Smith
  rationale: I rendered the noun dynamically as 'immeasurable' to reflect the contrast
    between brief earthly years and what exceeds human measure.
