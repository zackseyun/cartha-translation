translation:
  text: '1. And I answered and said, “Who can be compared, Lord, to your goodness?
    For it is beyond comprehension.

    2. Or who can search out your mercies, which are without end?

    3. Or who can grasp your understanding?

    4. Or who can recount the thoughts of your mind?

    5. Or which of those born can hope to come to these things, unless it is one to
    whom you show mercy and are gracious?

    6. For unless, in compassion, you have mercy on human beings, those who are under
    your right hand cannot come to these things, except those who are called in the
    excellent number.

    7. But we who remain—if we know why we came, and have subjected ourselves to him
    who brought us up from Egypt—we shall come again, and we shall remember what has
    passed, and rejoice over what was.

    8. But if we do not now know why we came, and do not recognize what has been,
    neither shall the immeasurable be seen, nor shall the preeminence of what was
    prepared from the beginning be made known; and not a few living creatures would
    be astonished.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
