theological_decisions:
- issue: Whether to make verse 6 explicitly predestinarian in tone
  chosen_reading: except those who are called in the excellent number
  alternative_readings:
  - except those appointed in the glorious number
  - except those counted among the chosen
  rationale: The witness points to a specially numbered company, but the line should
    not be made more systematized than the text itself. The main text preserves the
    elevated apocalyptic phrasing without forcing later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether to paraphrase the divine-right-hand image in verse 6
  chosen_reading: those who are under your right hand
  alternative_readings:
  - those under your power
  - those under your protection
  rationale: The idiom likely carries sovereignty and protection together. Retaining
    the image keeps the text’s theological texture instead of flattening it into one
    explanatory idea.
  doctrine_reference: Original-language primacy over translation tradition; do not
    flatten imagery.
