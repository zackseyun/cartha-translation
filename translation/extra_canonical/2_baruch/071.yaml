theological_decisions:
- issue: Whether to preserve the land as an acting subject
  chosen_reading: the holy land shall have mercy on its own
  alternative_readings:
  - God shall have mercy through the land
  - the people of the land shall receive mercy
  rationale: The witness presents the land in apocalyptic personification. Preserving
    that imagery avoids flattening the covenantal bond between land and people.
  doctrine_reference: Retain biblical-apocalyptic personification where the source
    warrants it.
- issue: How explicit to make divine response to Baruch's prayer
  chosen_reading: your prayer has been heard before the Most High
  alternative_readings:
  - the Most High has answered your prayer
  - your prayer has been accepted
  rationale: The source stresses heavenly hearing rather than a broader paraphrase
    of answered prayer. The English should not overstate what the wording itself says.
  doctrine_reference: Do not expand divine-action language beyond the witness.
