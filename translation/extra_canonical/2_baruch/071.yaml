translation:
  text: '1. And the holy land shall have mercy on its own, and at that time it shall
    protect its inhabitants.


    2. This is the vision that you saw, and this is its interpretation.


    3. For I have come to make these things known to you, because your prayer has
    been heard before the Most High.'
  philosophy: optimal-equivalence
