translation:
  text: '1 And it happened after seven days that the word of God came to me and said
    to me:


    2 “Tell Jeremiah to go and accompany the captivity of the people as far as Babylon.


    3 But you, remain here in the desolation of Zion, and after these days I will
    show you what is to happen in the latter times.”


    4 And I spoke to Jeremiah my brother as the Lord had commanded me.


    5 And he went with the people, but I, Baruch, returned and sat before the gates
    of the temple, and I lifted up this lament over Zion and said:


    6 “Blessed is he who was not born,

    or he who was born and died.


    7 But as for us who live, woe to us,

    because we have seen the afflictions of Zion

    and what has happened to Jerusalem.


    8 I will call the Sirens from the sea,

    and you Liliths, come from the desert,

    and you demons from the forests:

    awake and testify,

    gird yourselves with sackcloth,

    and take up lamentation with me,

    and mourn with me.


    9 You farmers, do not sow again;

    and you, O earth, why do you still give the fruit of your produce?

    Keep within you the sweetness of your nourishment.


    10 And you, vine, why do you still give your wine?

    For no offering from you will again be received in Zion,

    and no firstfruits will again be accepted.


    11 And you, springs, where is your heart?

    And do not pour out streams of water.


    12 And you, sun, hold back the light of your rays;

    and you, moon, extinguish the abundance of your light.

    For why should light rise again,

    where the light of Zion has been darkened?


    13 And you, bridegrooms, do not enter;

    and let not the virgins adorn themselves.

    And you, women, do not pray to bear children.


    14 Rather, let the barren rejoice,

    and let those who have no children be glad;

    but let those who have children grieve.


    15 For why should they bear in pain

    and bury in groaning?


    16 Or why should people again have children,

    or why should the seed of their nature again be named,

    when this mother lies desolate

    and her children have gone away into captivity?


    17 From now on, do not again speak of beauty,

    and do not discourse of loveliness ...”'
