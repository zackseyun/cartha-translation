lexical_decisions:
- source_word: ܣܝܪ̈ܝܢܘܣ
  chosen: Sirens
  alternatives:
  - sea-creatures
  - sirens
  lexicon: Payne Smith
  rationale: The Syriac is a transliterated mythic term rather than an ordinary word
    for animals. Retaining 'Sirens' preserves the lament’s apocalyptic and mythic
    register.
- source_word: ܠܝ̈ܠܝܬܐ
  chosen: Liliths
  alternatives:
  - Lilin
  - night-demons
  lexicon: Payne Smith
  rationale: The term points to Lilith-like night beings. 'Liliths' keeps the demonic
    proper-name force more transparently than the flatter 'night-demons.'
- source_word: ܫܐ̈ܕܐ ܘܝܕܘܥܐ ܡܢ ܥܒ̈ܕܐ
  chosen: demons and dragons from the forests
  alternatives:
  - demons and wild creatures from the woods
  - demons and monsters from the forests
  lexicon: Smith Syriac Dictionary
  rationale: The first noun clearly denotes demons; the second is less certain in
    the present OCR state. 'Dragons' fits the traditional control witness and preserves
    the monstrous lament imagery without reducing it to generic wildlife.
- source_word: ܦܠܚܝ̈ܢ
  chosen: farmers
  alternatives:
  - husbandmen
  - tillers
  lexicon: Payne Smith
  rationale: The word denotes cultivators of the land. 'Farmers' is natural English
    and still concrete.
- source_word: ܐܪ̈ܙܐ ܕܡܣܝܪܐ
  chosen: the treasuries of rain
  alternatives:
  - the storehouses of rain
  - the reservoirs of rain
  lexicon: Payne Smith
  rationale: The phrase is imagistic and cosmological. 'Treasuries of rain' preserves
    the elevated diction better than a more technical modern term.
- source_word: ܒܘܪ̈ܟܐ
  chosen: bridegrooms
  alternatives:
  - grooms
  lexicon: Smith Syriac Dictionary
  rationale: In context the line addresses marriage celebration. 'Bridegrooms' matches
    the paired reference to virgins and preserves the public-festal setting.
- source_word: ܒܬܘܠܬܝܐ
  chosen: the virgins
  alternatives:
  - maidens
  lexicon: Payne Smith
  rationale: The noun ordinarily means virgins/young unmarried women. 'Virgins' best
    matches the lament’s marriage imagery and the control witness.
- source_word: ܛܘܒܘܗܝ
  chosen: Blessed is he
  alternatives:
  - Happy is he
  lexicon: Payne Smith
  rationale: The line is not casual happiness language but a solemn beatitude-like
    lament. 'Blessed' preserves the gravity and irony of the saying.
- source_word: ܐܠܝܬܐ
  chosen: lament
  alternatives:
  - dirge
  - lamentation
  lexicon: Smith Syriac Dictionary
  rationale: The noun introduces a formal mourning speech. 'Lament' is concise, natural,
    and still appropriately literary.
theological_decisions:
- issue: The blessing of the unborn and the dead in verse 6
  chosen_reading: The line is rendered as extreme lament rhetoric, not as a doctrinal
    rejection of life or creation.
  alternative_readings:
  - A flatter paraphrase could turn it into mere despair language without beatitude
    force.
  - A harsher reading could make it sound like a systematic anti-natalist claim.
  rationale: The chapter speaks from the shock of Zion’s devastation. Preserving the
    beatitude form keeps the rhetorical and emotional weight while not over-reading
    it as settled doctrine.
- issue: Creation’s participation in Zion’s mourning
  chosen_reading: The commands to earth, vine, heavens, sun, and moon are kept as
    literal poetic summons within apocalyptic lament.
  alternative_readings:
  - The imagery could be reduced to figurative sadness only.
  - The lines could be paraphrased into abstract statements about agricultural collapse.
  rationale: The passage portrays Zion’s fall as a catastrophe so great that creation
    itself is summoned into mourning. The rhetoric should remain cosmic and liturgical
    rather than flattened.
- issue: The preference for barrenness in verses 13-16
  chosen_reading: The text is rendered as judgment-lament arising from captivity and
    bereavement, not as a timeless condemnation of marriage, childbirth, or children.
  alternative_readings:
  - A reader might take the lines as a universal denunciation of childbirth.
  - A softer rendering could obscure the severity of the lament.
  rationale: 'The mother-city image governs the section: because Mother Zion is desolate
    and her children are exiled, ordinary human fruitfulness is suspended in grief.'
