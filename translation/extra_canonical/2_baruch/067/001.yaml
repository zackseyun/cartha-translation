translation:
  text: And the eleventh black waters that you saw—these are the calamity that has now come upon Zion.[a]
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: ܡ̈ܝܐ ܐܘܟ̈ܡܐ
  chosen: black waters
  alternatives:
  - dark waters
  lexicon: Payne Smith
  rationale: I kept the established visionary label explicit. The sequence of black and bright waters is structural in the apocalypse, so the imagery should remain sharp rather than be generalized.
- source_word: ܚܝܠܬܢܐ
  chosen: the Mighty One
  alternatives:
  - the Powerful One
  lexicon: Payne Smith
  rationale: This divine title carries judicial and reverential force. 'The Mighty One' preserves that weight and matches nearby chapters.
- source_word: ܬܪܥܝܬܐ
  chosen: hearts
  alternatives:
  - minds
  - thoughts
  lexicon: Payne Smith
  rationale: Although the word can point to thought or intention, here it describes inward boasting by the nations. 'Hearts' best carries the moral and affective sense.
- source_word: ܬܫܒܘܚܬܐ
  chosen: is glorified
  alternatives:
  - is praised
  - receives glory
  lexicon: Payne Smith
  rationale: The line asks whether God's name is truly honored by Zion's humiliation. 'Is glorified' keeps the theological register of the passage.
- source_word: ܡܫܬܥܒܕܐ / passive reversal imagery
  chosen: has herself been subjected
  alternatives:
  - has been reduced to servitude
  - has been subdued
  lexicon: Payne Smith
  rationale: 'The taunt is a reversal formula: the former dominator is now under domination. I rendered it in idiomatic English while preserving the retaliatory symmetry.'
theological_decisions:
- issue: Angelic sorrow over Zion
  chosen_reading: The angels are presented as grieving before God over Zion's surrender.
  alternative_readings:
  - The language is only rhetorical exaggeration
  - The grief belongs only to humans, not heavenly beings
  rationale: The chapter explicitly places anguish 'before the Mighty One' and extends it to the angels, so I preserved the heavenly dimension of the lament rather than flattening it into a merely human reaction.
- issue: Meaning of Zion's fall
  chosen_reading: Zion's humiliation is not portrayed as something in which the Most High delights; divine judgment remains morally active and unresolved.
  alternative_readings:
  - Zion's fall itself glorifies God without remainder
  - The nations' triumph shows God's final favor toward them
  rationale: 'The chapter frames the nations'' boasting as a scandal set against God''s righteous judgment. The translation therefore preserves the tension: Zion is delivered up, yet God''s justice is not annulled or pleased by arrogant pagan triumph.'
