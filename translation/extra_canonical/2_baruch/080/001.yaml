lexical_decisions:
- source_word: ܡܠܐܟ̈ܐ
  chosen: angels
  alternatives:
  - messengers
  lexicon: Payne Smith
  rationale: In this apocalyptic setting the agents who dismantle the city are best understood as heavenly beings, not merely human envoys, so ‘angels’ preserves the theological force.
- source_word: ܫܘܪ̈ܝܗ̇ / ܫܘܪܝܐ ܕܒܪܝܬܐ
  chosen: its walls … the mighty wall
  alternatives:
  - fortifications
  - ramparts
  lexicon: Payne Smith
  rationale: The Syriac points to the city’s defensive structures; ‘walls’ is the plain rendering, while ‘mighty wall’ preserves the intensified description in the damaged line.
- source_word: ܡܐ ܛܒܝ̈ܢ
  chosen: the holy vessels
  alternatives:
  - the good things
  - the precious things
  lexicon: Payne Smith
  rationale: Literally the phrase can mean ‘good things,’ but in the immediate temple context it most naturally refers to the sanctuary vessels hidden before the city’s fall.
- source_word: ܐܫܠܡܘ
  chosen: they handed over
  alternatives:
  - they delivered up
  - they surrendered
  lexicon: Payne Smith
  rationale: The verb carries the sense of giving over into another’s power. ‘Handed over’ keeps both the judicial and narrative force.
- source_word: ܚܘܪܐ
  chosen: the plundered house
  alternatives:
  - the stripped house
  - the despoiled house
  lexicon: Payne Smith
  rationale: The line is textually rough, but the context pairs ruined wall, damaged house, and burned temple. ‘Plundered’ best fits that sequence.
- source_word: ܡܟܝܟ
  chosen: humiliation
  alternatives:
  - abasement
  - lowliness
  lexicon: Payne Smith
  rationale: Near the close of the chapter the concern is Zion brought low. ‘Humiliation’ preserves both the emotional and public-shame aspect.
theological_decisions:
- issue: Who truly brought down the city’s defenses
  chosen_reading: The city is portrayed as being given over only after heavenly agents act first.
  alternative_readings:
  - The Babylonians alone destroyed the city.
  - The angelic action is merely metaphorical.
  rationale: The Syriac presents the fall of Zion as occurring under divine judgment and permission before enemy triumph, so the translation keeps the angels’ action explicit.
- issue: Why the temple vessels are hidden
  chosen_reading: The sanctuary objects are concealed so the enemy cannot claim mastery over what belongs to the Most High.
  alternative_readings:
  - They are hidden merely as wartime plunder-prevention.
  - The line refers generically to valuable goods.
  rationale: 'The narrative logic is theological: the enemy must not boast as though it had conquered the Most High by force.'
