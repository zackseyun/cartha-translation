translation:
  text: 'Knowing first what was to happen, that Nebuchadnezzar king of Babylon set it in his heart... But we knew that no command from his mouth would go forth in vain, nor otherwise than he had appointed beforehand. For what had been determined beforehand was shown openly. And it was also revealed to me that angels were engaged against the city: they shook its walls and uprooted them, and the mighty wall with its strong iron corners they cast down. But at that time they hid the holy vessels, so that they might not be seen by the enemies.


    And when they had done these things, then they handed over to the enemies the broken wall, the plundered house, the burned temple, and the people who had been overcome and were being carried away, so that the enemies might not boast and say, ‘We have surrounded even the house of the Most High, and in battle we have thrown it down.’


    They also bound your brothers and led them away to Babylon, and there they made them dwell. But we and our seed were left here, few and small. This is the affliction of the people about which I wrote to you. For you surely know that the humiliation of Zion has weighed heavily upon you, because your knowledge of her was greater than that of the people, since you were those who served there, while we were helping.'
  philosophy: optimal-equivalence
