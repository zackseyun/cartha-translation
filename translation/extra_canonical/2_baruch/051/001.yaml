lexical_decisions:
- source_word: ܨܘܪܬܐ / ܨܘܪܬܗܘܢ
  chosen: form
  alternatives:
  - appearance
  - shape
  lexicon: Payne Smith
  rationale: Used 'form' consistently for the chapter’s transformation language because
    it is concrete and apocalyptic without sounding overly modern; 'appearance' was
    possible in some verses but less stable across the repeated motif.
- source_word: ܐܙܕܩܘ
  chosen: vindicated
  alternatives:
  - justified
  - declared righteous
  lexicon: Payne Smith
  rationale: Chose 'vindicated' to preserve the judicial sense while avoiding later
    Pauline freight that English 'justified' can carry for many readers.
- source_word: ܥܩܪܐ ܕܚܟܡܬܐ
  chosen: the root of wisdom
  alternatives:
  - wisdom’s root
  lexicon: Payne Smith
  rationale: Kept the concrete metaphor intact; the chapter’s imagery depends on planted
    wisdom, not a flattened abstraction such as 'true wisdom'.
- source_word: ܥܠܡܐ ܕܠܐ ܡܐܬ
  chosen: the world that does not die
  alternatives:
  - the undying world
  - the deathless world
  lexicon: Payne Smith
  rationale: Rendered literally to preserve the chapter’s strong contrast between
    mortal age and the coming imperishable world.
- source_word: ܢܬܬܥܝܪ ܐܢܗܘܢ ܒܫܘܒ̈ܚܐ / angelic transformation context
  chosen: into the splendor of angels
  alternatives:
  - into angelic splendor
  - into the glory of angels
  lexicon: Payne Smith
  rationale: Preferred 'splendor' because the line concerns transformed radiance and
    status, not merely moral glory.
- source_word: ܦܠܝ̈ܛܘܗܝ ܕܦܪܕܝܣܐ
  chosen: the expanses of Paradise
  alternatives:
  - the bounds of Paradise
  - the regions of Paradise
  lexicon: Payne Smith
  rationale: The OCR at this point is difficult, but the sense is spatial and visionary;
    'expanses' best fits the unveiling imagery without claiming excessive precision.
theological_decisions:
- issue: Relation of the righteous to angels
  chosen_reading: The righteous are made like angels and surpass them in excellence,
    but are not identified as becoming angels in essence.
  alternative_readings:
  - The righteous become angels
  - The language is purely metaphorical and not transformational
  rationale: The chapter stacks comparative expressions—'like the angels,' 'equal
    to the stars,' and later 'greater than the angels'—which points to exalted transformed
    status rather than simple identity.
- issue: Law, works, and righteousness language
  chosen_reading: The text’s own linkage of law, works, wisdom, and eschatological
    vindication is preserved without softening or systematizing it.
  alternative_readings:
  - Render in more generic faith-language
  - Translate ܐܙܕܩܘ with a strongly Protestant doctrinal sense
  rationale: This chapter explicitly presents vindication in relation to God's law,
    works, understanding, and wisdom; the translation should expose that idiom rather
    than harmonize it to later theology.
