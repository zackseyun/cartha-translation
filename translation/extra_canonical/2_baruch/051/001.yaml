translation:
  text: '1 And it shall be, after that appointed day has passed, that then the form
    of those who are condemned will be changed afterward, and also the glory of those
    who are vindicated.


    2 For the form of those who now act wickedly will become worse than it is, so
    that they may endure torment.


    3 But the glory of those who have now been vindicated by my law—those who had
    understanding in their life, and those who planted in their heart the root of
    wisdom—will then be glorified in transformations, and the form of their face will
    be turned into the light of their beauty, so that they may receive the world that
    does not die, which is promised to them.


    4 And above all, those who then come will be grieved, because they despised my
    law and stopped their ears so that they would not hear wisdom or receive understanding.


    5 When therefore they see those over whom they are now exalted, that those then
    are exalted and glorified more than they, then these and those will be changed:
    the latter into the splendor of angels, but the former will waste away yet more
    in wonder at the visions and at the sight of the forms.


    6 For first they will see, and afterward they will depart to be tormented.


    7 But for those who have been saved by their works, and for whom the law was hope,
    and understanding expectation, and wisdom a confidence, wonders will appear in
    their time.


    8 For they will see that world which is now hidden from them,


    9 and they will see the time that is now hidden from them; and time will no longer
    make them grow old.


    10 For they will dwell in the heights of that world, and they will be made like
    the angels, and be made equal to the stars; and they will be changed into every
    form they desire, from beauty into loveliness, and from light into the splendor
    of glory.


    11 For the expanses of Paradise will be spread out before them; and the beauty
    of the majesty of the living beings beneath the throne will be shown to them,
    and all the armies of the angels—those now held fast by my word so that they may
    not appear, and those kept by my command, to stand in their places until their
    coming arrives.


    12 Then the excellence of the righteous will be greater than that of the angels.


    13 For the first will receive the last, those for whom they were waiting; and
    the last, those of whom they had heard that they had passed away.


    14 For they have been delivered from this world of affliction and have laid down
    the burden of distresses.


    15 For why then did men lose their life, and for what did those on the earth exchange
    their soul?


    16 For they chose for themselves this time that cannot pass away without anguish,
    and they chose for themselves that time whose end is full of laments and evils,
    and they rejected the world that does not grow old for those who come to it, and
    they rejected the time of glory, so that they should not come to the honor of
    which I told you before.'
