translation:
  text: 'submit_2baruch_chapter_draft({"english_text":"These are the words of the
    letter that Baruch son of Neriah sent to the nine and a half tribes beyond the
    Euphrates; and these are the things written in it:\n\nThus says Baruch son of
    Neriah to the brothers who were taken captive: Peace and mercy be with you. I
    remember, my brothers, the love of him who created us, who loved us from the beginning
    and has not utterly hated us; rather, he has disciplined us. And truly I know
    that now all of us are bound in one bond, because we were born from one father.\n\nFor
    this reason I was all the more careful to leave you the words of this letter before
    I die, so that you may be comforted concerning the evils that have come upon you,
    and may also grieve concerning the evil that has come upon your brothers, and
    again may declare his judgment righteous, which he decreed against you, that you
    should be carried away captive. For what you have suffered is not beyond measure
    compared with what you have done, so that in later times you may be found worthy
    of your fathers.","translation_philosophy":"optimal-equivalence","lexical_decisions":[{"source_word":"ܐܓܪܬܐ","chosen":"letter","alternatives":["epistle"],"lexicon":"Payne
    Smith","entry":null,"rationale":"I used ''letter'' in the running translation
    for natural English, while preserving the formal written character of the text."},{"source_word":"ܪ̈ܚܡܐ","chosen":"mercy","alternatives":["compassion","mercies"],"lexicon":"Payne
    Smith","entry":null,"rationale":"The blessing formula is concise and relational;
    ''mercy'' keeps the covenantal warmth without over-expanding the phrase."},{"source_word":"ܪܕܝܘ
    / ܪܕܢ","chosen":"has disciplined us","alternatives":["has chastened us","has instructed
    us"],"lexicon":"Payne Smith","entry":null,"rationale":"The contrast is with divine
    hatred, so the sense is corrective dealing rather than mere teaching; ''disciplined''
    carries that force in readable English."},{"source_word":"ܐܣܘܪܐ ܚܕ","chosen":"one
    bond","alternatives":["one chain","one fetter"],"lexicon":"Payne Smith","entry":null,"rationale":"The
    phrase expresses shared captivity and shared kinship at once; ''one bond'' preserves
    both the literal and communal resonance."},{"source_word":"ܐܬܬܒܥܘܟܘܢ / judgment-decree
    context","chosen":"he decreed against you","alternatives":["he required of you","he
    passed sentence against you"],"lexicon":"Payne Smith","entry":null,"rationale":"The
    clause is judicial and covenantal; ''decreed against you'' keeps the solemn tone
    without becoming too technical."},{"source_word":"ܫ̈ܒܛܝܢ ܘܦܠܓܗ","chosen":"nine
    and a half tribes","alternatives":["eight and a half tribes"],"lexicon":"Payne
    Smith","entry":null,"rationale":"Ceriani’s OCR at this edge is unstable, but the
    Kmosko control witness clearly supports ''nine and a half tribes.''"}],"theological_decisions":[{"issue":"Divine
    action after exile","chosen_reading":"The text says God has ''disciplined'' or
    ''chastened'' rather than hated his people.","alternative_readings":["has instructed
    us","has punished us"],"rationale":"The passage balances covenant love with corrective
    judgment; ''disciplined us'' best preserves that theological tension.","doctrine_reference":null},{"issue":"Indirect
    divine designation","chosen_reading":"The phrase ''him who created us'' is retained
    rather than replaced with a simple ''God.''","alternative_readings":["God","the
    Lord"],"rationale":"The Syriac presents God through a reverent descriptive clause,
    and keeping that form preserves the epistle’s tone and argument.","doctrine_reference":null}],"footnotes":[{"marker":"a","text":"The
    opening superscription is textually rough in the Ceriani page bucket. Kmosko page
