    Johannine Christology.
- issue: Prophetic origin (‘from on high are the prophets’)
  chosen_reading: Maintain ‘from on high are the prophets’
  alternative_readings:
  - ‘the prophets are from above’ (more idiomatic)
  - ‘prophecies come from above’
  rationale: Preserves the vertical, revelatory origin of prophecy without harmonizing
    with other traditions; reflects the Syriac prepositional phrase ‘men rōmā’.
- issue: ‘Spirits of the world’
  chosen_reading: Translate rūḥē d-ʿalmā as ‘spirits of the world’
  alternative_readings:
  - ‘winds of the world’
  - ‘spirits of the age’
  rationale: In a theological prayer the term likely references spiritual constituents
    or governing forces rather than meteorological winds; avoids speculative identifications.
- issue: ‘Those who have not forsaken the sons of Adam’
  chosen_reading: Understand as the faithful among Adam’s descendants who have not
    apostasized
  alternative_readings:
  - Those who have not abandoned Adam’s way (neutral)
  - Those not left over from Adam (text-critical)
  rationale: Context petitions for reception of the righteous remnant; fits Baruch’s
    remnant theology elsewhere.
- issue: Handling the difficult ‘bšūqrā’ phrase
  chosen_reading: Do not translate ‘in falsehood’; render the clause more generally
    as God ‘fashioned the spirits of man’
  alternative_readings:
  - ‘who in truth fashioned the spirits of man’ (emend ‘šūqrā’ to ‘šarrārā’)
  - ‘who fashioned the spirits of man like falsehood’ (unlikely)
  rationale: The transmitted reading is uncertain; a general rendering preserves sense
    without committing to a dubious textual nuance.
