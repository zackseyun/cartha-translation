translation:
  text: '54 The Prayer of Baruch by day


    And I sought from the Mighty One and said:


    You, O Lord, you alone set in order; you know the spirits of the world. Before
    [the world] was created, you established [it] by your word. By the fair ordering
    of the forms of man the heights of creation are sustained, and its ends you make
    known.


    You are the One who fashioned the spirits of man, and a man, by searching, is
    able to find out. You are the One who reveals to those who fear you what is about
    to be—for from on high are the prophets. For you make known to those who do not
    know; you appoint a sign for those who are not persuaded; you illumine darkness
    and disclose hidden things to men without blemish.


    But since you showed this vision to your servant, also make known to me its interpretation.
    For I know that you reveal to me what I asked from you, that I might hope for
    deliverance, and nothing that I ask will be hidden from me. It will be revealed
    to me, and I shall not be put to shame.


    And if, from the great among men, praise and the upholding of commandments should
    be offered to you, yet from the few among men I am not able to repay you with
    praise; and even if I praise you as is right, I cannot declare all your praise.
    And if I say that I will confess your goodness—what am I in my petition? And what
    am I, one born [of woman], that I should recount all these wonders? And what hope
    that is not shaken have I from him whom you created?


    Who am I to take hold of knowledge—or again to be knowing in myself? But as for
    me, I am not fit to praise with strength; rather, with words of humility I will
    speak of your wonders. At the time of my birth I marveled at your wonders; and
    who can trace out your thought in likeness?


    You are the Living One. Let the creature that your right hand created speak. Let
    there come, with a voice from the fountain of light, mighty strength; and let
    the treasury of wisdom be opened beneath your throne by your hand. And in a moment
    bless those for whom no man can bear witness; and let your justice receive those
    who have not forsaken the sons of Adam.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '54.1'
    text: ‘spirits of the world’ (Syriac rūḥē d-ʿalmā) could also be read ‘winds of
      the world’ or ‘spirits of the age.’ The prayer’s cosmological tone favors ‘spirits.’
    reason: lexical_alternative
  - marker: '54.2'
    text: The clause ‘By the fair ordering of the forms of man the heights of creation
      are sustained’ reflects a difficult Syriac phrase (buqʿālā šapīrēhon d-b-mūtawhī
      d-anšā mestamkā rāmōhī d-barā). Some read ‘by the beautiful investigation’ or
      understand ‘forms’ as ‘types.’ The translation keeps the broader sense without
      precision that the base text does not safely yield.
    reason: lexical_alternative
  - marker: '54.3'
    text: ‘appoint a sign’ renders Syriac sāymā, which can mean ‘to set/appoint’ and,
      in context, may imply giving a token or mark to the unpersuaded. ‘Appoint’ is
      chosen to avoid over-interpretation.
    reason: lexical_alternative
  - marker: '54.4'
    text: ‘make known to me its interpretation’ uses pušqā, a standard Syriac term
      for ‘interpretation’ or ‘explanation,’ common in apocalyptic vision reports.
    reason: cross_reference
  - marker: '54.5'
    text: ‘At the time of my birth’ follows a strained reading (mūld-), which could
      also be construed as ‘at the time [of] birth/bringing forth.’ The precise pronominal
      relation (my/your) is not secure; the translation adopts ‘my’ as the least theologically
      loaded option.
    reason: textual_variant
  - marker: '54.6'
    text: ‘storehouse of wisdom’ reflects a rare term likely meaning ‘treasury/repository’;
      some witnesses read differently. The imagery parallels other Second Temple texts
      that speak of heavenly treasuries of wisdom.
    reason: cross_reference
  - marker: '54.7'
    text: ‘those who have not forsaken the sons of Adam’ is a difficult clause. It
      appears to commend a faithful remnant among Adam’s descendants. The base text
      at this point is not entirely certain; the rendering is cautious.
    reason: textual_variant
  - marker: '54.8'
    text: 'Chapter boundary note: Ceriani clearly marks ‘The Prayer of Baruch by day’
      here. The following interpretive material on Adam’s transgression (in some witnesses
      labeled as beginning with ‘Sin first said…’) likely belongs to the subsequent
      section, not to this prayer.'
    reason: alternative_reading
  - marker: a
    text: Or 'and its ends you know.'.
    reason: previous_rendering
  - marker: b
    text: Or 'I am not able to magnify your glory'.
    reason: previous_rendering
