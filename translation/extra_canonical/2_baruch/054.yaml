theological_decisions:
- issue: Divine omniscience formula
  chosen_reading: The prayer is rendered as emphasizing God's sole authority over
    knowledge and his prior knowledge of creation.
  alternative_readings:
  - A smoother paraphrase stressing only foreknowledge
  rationale: The Syriac wording is retained as much as possible, even where English
    becomes slightly stiff, because the line is doctrinally weighty and textually
    compressed.
- issue: Cosmic language in creation
  chosen_reading: The imagery of 'spirits' and 'heights of creation' is preserved.
  alternative_readings:
  - Abstract cosmological paraphrase
  rationale: Apocalyptic prayer language should remain elevated and concrete rather
    than be reduced to generic theological prose.
