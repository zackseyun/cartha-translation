lexical_decisions:
- source_word: ܥܢܢܐ
  chosen: cloud
  lexicon: Sokoloff (Syriac)
  rationale: Standard sense for atmospheric cloud; matches the vision’s imagery of a mass rising from the sea.
- source_word: ܚܦܝ / ܟܣܝ
  chosen: cover
  alternatives:
  - hide
  - veil
  lexicon: Payne Smith
  rationale: Both readings in the witnesses mean to cover; ‘cover’ is neutral and preserves the image of the cloud blanketing the earth.
- source_word: ܢܘܓܪܗ ܕܥܠܡܐ
  chosen: ordering of the world
  alternatives:
  - framework of the world
  - structure of the world
  lexicon: Sokoloff (Syriac)
  rationale: Nugra denotes arrangement/structure; ‘ordering’ conveys cosmic arrangement in creation, fitting the context. Kmosko’s control supports this reading.
- source_word: ܚܝܠܬܢܐ / ܚܝܠܗ
  chosen: the Mighty One
  alternatives:
  - his power
  - made it mighty
  lexicon: Payne Smith
  rationale: Kmosko shows ܚܝܠܬܢܐ (mighty) used substantively of God; Ceriani OCR has ܚܝܠܗ (his power). Rendering ‘the Mighty One’ preserves the divine epithet common in 2 Baruch and fits the syntax.
- source_word: ܡܠܬܐ
  chosen: word
  alternatives:
  - decree
  lexicon: Sokoloff (Syriac)
  rationale: ‘Word’ preserves intertextual resonance (creative command) and is formally accurate.
- source_word: ܩܘܝܡܐ
  chosen: establishment
  alternatives:
  - standing
  - foundation
  lexicon: Sokoloff (Syriac)
  rationale: Quyāmā can denote a standing/establishment; ‘establishment’ best captures the setting-up of the created order.
- source_word: ܙܥܘܪ
  chosen: small
  alternatives:
  - in smallness
  - a little
  lexicon: Sokoloff (Syriac)
  rationale: The adjective is surprising in context; retained literally to preserve the text’s nuance, with a footnote explaining the difficulty.
- source_word: ܡܬܒܥܐ
  chosen: as it was fitting
  alternatives:
  - as was required
  - as was proper
  lexicon: Sokoloff (Syriac)
  rationale: Idiomatic use meaning what is demanded/appropriate; ‘fitting’ is concise.
- source_word: ܡܝ̈ܐ ܐܘܟܡ̈ܐ
  chosen: black waters
  lexicon: Sokoloff (Syriac)
  rationale: Conventional rendering; preserves symbolic color imagery of judgment/evil periods.
- source_word: ܡܥܒܪܢܘܬܐ
  chosen: transgression
  alternatives:
  - overstepping
  lexicon: Sokoloff (Syriac)
  rationale: From root ‘to pass over/transgress’; Kmosko confirms this reading against a garbled OCR in Ceriani.
- source_word: ܐܬܬܙܝܥ
  chosen: was aroused
  alternatives:
  - was stirred
  - came
  lexicon: Sokoloff (Syriac)
  rationale: The verb denotes being shaken or stirred; ‘aroused’ captures sudden activation of death.
- source_word: ܐܒܠܐ
  chosen: mourning
  alternatives:
  - grief
  lexicon: Payne Smith
  rationale: Standard term for lamentation; context lists consequences of the Fall.
- source_word: ܟܘܐܒܐ / ܟܐܒܐ
  chosen: afflictions / pains
  alternatives:
  - sufferings / pains
  lexicon: Sokoloff (Syriac)
  rationale: Distinguishes general afflictions (plural forms) from specific pains; preserves parallelism.
- source_word: ܥܡܠܐ
  chosen: toil
  alternatives:
  - labor
  lexicon: Sokoloff (Syriac)
  rationale: ‘Toil’ captures burdensome labor introduced post-Fall.
- source_word: ܪܘܪܒܘܬܐ ܫܪܝܬ ܕܬܡܘܟ
  chosen: greatness began to wane
  alternatives:
  - exaltation began to sink
  - pride began to fail
  lexicon: Sokoloff (Syriac)
  rationale: Rurbūthā = greatness/exaltation; tmukh likely ‘to sink/fail’. The phrase is difficult; the chosen rendering preserves the metaphor with minimal interpretation.
- source_word: ܒܨܘܪܬܐ
  chosen: in littleness
  alternatives:
  - in smallness
  - in diminution
  lexicon: Sokoloff (Syriac)
  rationale: Retains the concrete imagery of smallness/diminution applied to ‘the last day’.
- source_word: ܕܡܘܬܐ
  chosen: likeness
  alternatives:
  - semblance
  - form
  lexicon: Sokoloff (Syriac)
  rationale: Common biblical term; ‘likeness’ is faithful and echoes the Syriac.
- source_word: ܬܬܒܥ
  chosen: will be demanded
  alternatives:
  - will be sought
  - will be required
  lexicon: Sokoloff (Syriac)
  rationale: Conveys eschatological accountability/appointment coming due.
- source_word: ܢܘܡܫܐ
  chosen: semblance
  alternatives:
  - appearance
  - show
  lexicon: Payne Smith
  rationale: The term is obscure; ‘semblance’ keeps the sense of outward show while marking uncertainty (see footnote).
- source_word: ܬܬܡܫܚ
  chosen: will be wiped away
  alternatives:
  - will be effaced
  - will be smeared out
  lexicon: Sokoloff (Syriac)
  rationale: From mšḥ ‘to smear/wipe’; in context, removal/erasure is intended.
- source_word: ܫܘܒܩܢܐ ܕܡ̈ܝܬܐ
  chosen: forgiveness for those who had died
  alternatives:
  - remission of the dead
  - pardon of the dead
  lexicon: Payne Smith
  rationale: 'Šūbaqnā = forgiveness; genitive ‘of the dead’ best read as objective: forgiveness pertaining to those who had died.'
- source_word: ܐܣܬܟܠ
  chosen: understood
  alternatives:
  - was made to understand
  - comprehended
  lexicon: Sokoloff (Syriac)
  rationale: Reflexive stem implies acquired understanding; ‘understood’ reads smoothly.
- source_word: ܐܬܦܩܕ
  chosen: received command
  alternatives:
  - was commanded
  - received orders
  lexicon: Sokoloff (Syriac)
  rationale: Standard rendering for divine injunction.
- source_word: ܚܫ̈ܒܬܐ
  chosen: thoughts
  alternatives:
  - considerations
  lexicon: Sokoloff (Syriac)
  rationale: Literal translation preserves the enigmatic ‘five thoughts’ motif.
- source_word: ܡܚܝܒ
  chosen: made liable
  alternatives:
  - made guilty
  - rendered culpable
  lexicon: Sokoloff (Syriac)
  rationale: 'Legal-ethical nuance fits: Adam’s act incurred liability.'
- source_word: ܚܙܘܐ ܚܙܝܐ
  chosen: a vision was seen
  alternatives:
  - a vision appeared
  lexicon: Sokoloff (Syriac)
  rationale: Tautological expression preserved minimally; indicates a vision granted/seen.
- source_word: ܚܝܘܬܐ ܡܪܝܪܬܐ
  chosen: fierce living creatures
  alternatives:
  - bitter beasts
  - ferocious beasts
  lexicon: Sokoloff (Syriac)
  rationale: ‘Bitter’ idiomatically conveys fierceness; ‘living creatures’ leaves scope for animals/beasts.
- source_word: ܐܣܛܘܟܣܐ
  chosen: elements
  alternatives:
  - elemental powers
  lexicon: Payne Smith
  rationale: Loan from Gk. stoicheia; ‘elements’ is the transparent equivalent.
- source_word: ܟܢܫ ܒܥܕܢ
  chosen: gathered in [their] time
  alternatives:
  - collected at (the) time
  - assembled in due time
  lexicon: Sokoloff (Syriac)
  rationale: Conveys divine ordering of events according to appointed times.
- source_word: ܒܕܡܘܬܐ
  chosen: in the likeness
  alternatives:
  - according to the likeness
  - in the form
  lexicon: Sokoloff (Syriac)
  rationale: Maintains close correspondence with Syriac wording.
theological_decisions:
- issue: What the great cloud covering the earth signifies
  chosen_reading: It symbolizes the Creator’s ordering/arrangement of the world at creation as the word goes forth.
  alternative_readings:
  - It represents a single empire’s dominion
  - It represents the spread of judgment
  rationale: The immediate explanation links the cloud with creation (‘when he resolved to create’), not political dominion. This coheres with the vision’s interpretive frame where the waters then signify historical epochs.
- issue: ‘Death was aroused before its time’ after Adam’s transgression
  chosen_reading: Adam’s sin introduced mortality and its train (mourning, afflictions) prematurely, i.e., contrary to the original order.
  alternative_readings:
  - Adam died earlier than his individual lifespan
  - Humanity’s death became certain but not premature
  rationale: The Syriac emphasizes activation ‘before its time’; in Jewish apocalyptic idiom this signals a cosmic disruption of the intended order rather than merely Adam’s personal lifespan.
- issue: ‘The last day … took on the likeness of death’
  chosen_reading: An eschatological note within the list signals that the end will be marked by the demanded time, the erasure of the semblance of humanity, and the breaking of its power.
  alternative_readings:
  - A reference to Adam’s own day of death
  - A metaphor for a later black-water period
  rationale: The collocation of ‘the last day’ with ‘time will be demanded’ and the wiping away of humanity’s semblance points to judgment themes.
- issue: ‘Forgiveness for those who had died’ associated with Adam
  chosen_reading: Adam was made to understand that forgiveness would be given to those who had died (i.e., a divinely granted remission in view of death), within the wider apocalyptic hope (resurrection/restoration).
  alternative_readings:
  - Adam himself was the forgiver of the dead
  - Forgiveness was offered only to Adam
  rationale: Syntax favors reading ‘forgiveness’ as a grant from God (passive given) rather than Adam’s action. This coheres with intertestamental themes of repentance and eschatological mercy.
- issue: ‘He made himself liable … before the angels’
  chosen_reading: Adam incurred liability/culpability for his act, reckoned both to himself and before angelic witnesses.
  alternative_readings:
  - Adam caused angels to sin
  - Adam became liable to the angels’ jurisdiction
  rationale: The verb ‘made liable’ is reflexive, and the parallel with ‘to himself’ suggests moral culpability, not implicating angelic fall. Angels serve as witnesses in apocalyptic court scenes.
- issue: ‘Elements with fire’ (stoicheia)
  chosen_reading: References the cosmic elements, likely in an eschatological register (‘with fire’), without specifying Greek philosophical categories.
  alternative_readings:
  - Letters/elements of language
  - Elemental spirits
  rationale: The Greek loanword in Syriac typically denotes physical elements; coupling with ‘fire’ suggests cosmic processes rather than linguistics or spirits.
