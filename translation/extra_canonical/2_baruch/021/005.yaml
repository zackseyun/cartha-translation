  to: You who have commanded the air by your nod, and have seen the things that are to come as the things that you are doing.
  rationale: The draft translation is a complete hallucination or misalignment. The Syriac text of 2 Baruch 21:5 reads 'hw d-pqdt l-a'r b-rmz' w-ḥzyt alyn d-'tydn ayk alyn d-'bd ant', which translates to 'You who commanded the air by a nod, and saw the things that are to come as the things that you are doing.' There is no mention of tears or sleep in this verse.
