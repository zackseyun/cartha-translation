  rationale: The Syriac text reads `l-kullhōn aylēn d-ītayhōn` ('all those who are' or 'all who exist'). The phrase 'the petition of those before you' appears to be a misreading or hallucination of the source text. Additionally, 'bear' (ܛܥܢ) in this context is often better rendered as 'sustain' when referring to all living things, though 'bear' is literally defensible.
