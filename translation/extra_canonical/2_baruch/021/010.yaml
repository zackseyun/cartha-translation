  rationale: The Syriac word here is ܕܥܒܪ̈ܝ (da-ʿbar, 'that have passed'), which creates a temporal contrast with 'the things that are to come'. The draft appears to have confused the root ܥܒܪ (ʿ-b-r, 'to pass') with ܥܒܕ (ʿ-b-d, 'to do'), likely due to the visual similarity of the letters resh and dalath.
