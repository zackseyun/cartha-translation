  from: '1 And I went away from there and sat in the torrent Kidron, in a cave of the earth. And I sanctified my soul there. I ate no bread, yet I was not hungry; and I drank no water, yet I was not thirsty. And I remained there until the seventh day, as he had commanded me.

    2 And afterward I came to the place where he had spoken with me.

    3 And I said from there:

    4 “Woe to my heart, for it is cut open at the spring of grief, and tears flow from my eyes there, and I am not satisfied with weeping.

    5 My tears do not cease, and sleep does not come to me there, as you commanded me.

    6 And I came to the place where you spoke with me there, and I sat in the cave of the earth.

    7 You know the number of sinful men, he whose words are full of wrath.

    8 And the hosts of heaven know by the Spirit.

    9 You call from the beginning of the world those things that do not yet exist, and they listen to you.

    10 You command the lightning by your signal, and you have seen the things that are to come, like the things that you do.

    11 In great reckoning you remember before yourself the offenses of those before you.

    12 Even the former offenses that have passed away are not distant from you, with all their possessors and their remembrance.

    13 Those that stand near one another are yours, remembered in their times.

    14 To you alone it belongs to search out the origin of the whole order.

    15 You do not speak rain and flood except concerning sinful man.

    16 The instruction of the times you alone know, without being shaken.

    17 Look, for you alone are able to bear the petition of those before you, and of those who have passed, and of those who are to come,

    18 of those who live, and of those who are as nothing. For life that is not gladdened is no life.

    19 The one who lives while his life endures is not gladdened. And I considered the sons of men, and I saw that they are not many; and others were the vanity of Adam.

    20 And I saw that because of one man those who live came to be, and also the dwelling of those who are to come.

    21 For if only this life had been given to the sons of men, nothing would be more bitter than this.

    22 For what is seen in them? Or what visible hope is there? Or what visible dwelling is not vanity?

    23 For in his kingdom the death of the sons of men is seen. And what is there that truly is, whose end is not known?

    24 And how was it revealed, if afterward they do not understand?

    25 If there were not in them that which was laid up for the world, they would be comforted by their hope.

    26 But because the earth was created from dust, whatever passes departs from it to its own place.

    27 And what is preserved remains for what is made new.

    28 And what is preserved for its times continues.

    29 And because the world was created for time, and they are sustained in it with much, command concerning evil,

    30 so that it may not again appear that man’s ruin as if he had not been created.

    31 The multitude of the world is the spirit of man, yet they do not know what belongs to it.

    32 They see what exists, but not what is to be.

    33 [Have regard to] the love of your name before you, above all.

    34 Therefore from now on show your greatness, and do not overlook what is brought to nothing under the kingdom of death.

    35 Let your glory be seen, and let the greatness of your goodness be known.

    36 Let Sheol be stirred up, so that from now on it may not hold the dead.

    37 And let the treasuries of the souls that are shut up in them restore them to the sons of men, as you commanded from of old, and let them be gathered in the assembly.

    38 And let it be known to those who are with them, who are like them, that this is the time.

    39 Bring near those who are sought, and let what began in toil rejoice in the arrival of your glory.

    40 And let nothing boast that reigns, that has become king and grown proud through the pride of man.”'
