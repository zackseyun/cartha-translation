status: revised
lexical_decisions:
- source_word: ܡܥܪܬܗܘܝ ܕܡܥܪܬܐ
  chosen: cave of the earth
  alternatives:
  - cavern in the ground
  - earth-cave
  lexicon: Payne Smith
  rationale: A more concrete rendering preserves the ascetic, burial-like setting of Baruch’s withdrawal. 'Cave of the earth' keeps the Syriac’s doubled imagery rather than smoothing it to a generic 'cave.'
- source_word: ܡܒܘܥܐ ܕܐܒܠܐ
  chosen: spring of grief
  alternatives:
  - fountain of mourning
  - source of sorrow
  lexicon: Payne Smith
  rationale: The lament image is vivid and apocalyptic; 'spring' keeps the concrete metaphor of grief as a flowing source.
- source_word: ܕܒ̣ܕܓܠܐ ܠܐ ܬ̣ܘܒ
  chosen: those things that do not yet exist
  alternatives:
  - what is not yet
  - things not yet come into being
  lexicon: Payne Smith
  rationale: The clause stresses divine sovereignty over what is still future or unrealized. 'Do not yet exist' is slightly interpretive but best captures the force in context.
- source_word: ܠܐܙܐ ܦܩ̣ܝܕܐ ܒܪܘܙܝܟ
  chosen: you command the lightning by your signal
  alternatives:
  - by your nod
  - by your gesture
  lexicon: Payne Smith
  rationale: The Syriac evokes effortless divine command. 'Signal' preserves that sense without overcommitting to a single bodily metaphor.
- source_word: ܚܝ̈ܒܘܬܐ
  chosen: offenses
  alternatives:
  - debts
  - guilt
  - liabilities
  lexicon: Payne Smith
  rationale: In this penitential-prayer context, moral fault is more likely than financial debt. 'Offenses' is readable while preserving culpability.
- source_word: ܫܝܘܠ
  chosen: Sheol
  alternatives:
  - the grave
  - the underworld
  lexicon: Payne Smith
  rationale: A transliteration is preferable because the prayer invokes the abode of the dead in a distinctly Jewish apocalyptic frame; 'grave' would flatten it.
- source_word: ܒܝܬ ܓܙ̈ܐ ܕܢܦܫ̈ܬܐ
  chosen: the treasuries of the souls
  alternatives:
  - storehouses of souls
  - chambers of souls
  lexicon: Payne Smith
  rationale: The image is striking and should remain so. 'Treasuries' preserves the metaphor of souls kept in divinely guarded repositories.
theological_decisions:
- issue: State of the dead in the prayer
  chosen_reading: Retain 'Sheol' and 'the treasuries of the souls' as concrete apocalyptic locations or states rather than paraphrasing them into modern afterlife language.
  alternative_readings:
  - the grave
  - the underworld
  - the place of departed spirits
  rationale: The prayer depends on vivid Jewish apocalyptic imagery. Flattening it into generic afterlife terminology would erase the chapter’s theological texture.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Resurrection hope in 21:36-37
  chosen_reading: Translate the petition as a real restoration of the dead to 'the sons of men.'
  alternative_readings:
  - comfort for the dead
  - spiritual vindication only
  rationale: The prayer asks that the dead no longer be held and that the shut-up souls be restored. The main force is bodily or at least concrete restoration, not mere inward consolation.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Divine sovereignty over future realities
  chosen_reading: Render the clause as God calling 'those things that do not yet exist.'
  alternative_readings:
  - things not yet manifested
  - future generations
  rationale: The line presents God as sovereign over unrealized realities from the beginning. That broader formulation best fits the apocalyptic scope of the prayer.
  doctrine_reference: Translation philosophy §§1, 5
