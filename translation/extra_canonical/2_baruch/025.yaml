  from: '1 Then he answered me and said, “You too shall be spared until that time,
    until the sign that the Most High will perform for the inhabitants of the earth
    at the end of the days.


    2 And this will be the sign:


    3 bewilderment will seize the inhabitants of the earth, and they will fall into
    many afflictions; then again into great anguish.


    4 And when, because of the abundance of their distress, they say in their thoughts,
    ‘The Mighty One no longer remembers the earth,’ and they have given up hope, then
    the time will awaken.”'
  to: Then I answered and said to him, “I too have been shaken in my heart because
    of this. Therefore, O Mighty One, because of the evils that are coming upon the
    earth, and because of the great tribulations that are coming, when they see your
    judgment, the inhabitants of the earth will fall into many troubles and into great
    distresses. And they will forget the strength that was given to them, and in their
    thoughts they will hope and say, ‘The Mighty One does not remember the earth.’
  rationale: 'Replaced the draft with a closer rendering of the Syriac: restored Baruch
    as the speaker (‘I answered’), included the opening statement about being shaken
    in heart, preserved the address to the Mighty One, rendered the coming evils/tribulations
    on the earth, kept the reference to seeing the judgment/order, and translated
    the people’s forgetting and inward thought more literally. Removed unsupported
    additions such as ‘you too shall be spared,’ ‘this will be the sign,’ and ‘then
    the time will awaken,’ which belong to other material, not this verse.'
