lexical_decisions:
- source_word: ܩܘܝܡܐ ܕܥܠܡܐ
  chosen: the beginning of the world
  alternatives:
  - the origin of the world
  - the foundation of the world
  - the ordering of the world
  lexicon: Payne Smith
  rationale: The phrase points to the world's primordial standing-forth, not merely its later course. 'Beginning' keeps the creational frame while remaining natural in English.
- source_word: ܚܛܗܐ / ܡܬܒܪܝܢܘܬܐ
  chosen: the transgression
  alternatives:
  - the sin
  - the overstepping
  lexicon: Payne Smith
  rationale: The wording presents Adam's act as the primal boundary-crossing offense. 'Transgression' preserves that force better than the flatter 'sin' alone.
- source_word: ܐܬܬܙܝܥ ܡܘܬܐ
  chosen: death was stirred up
  alternatives:
  - death was awakened
  - death was set in motion
  lexicon: Payne Smith
  rationale: The verb suggests activation rather than simple existence, fitting the chapter's rhetoric of death being loosed into operation through Adam's act.
- source_word: ܪܘܪܒܘܬܐ ܫܪܝܬ ܕܬܡܘܟ
  chosen: greatness began to be brought low
  alternatives:
  - majesty began to be humbled
  - greatness began to sink
  lexicon: Payne Smith
  rationale: This preserves the downward-motion imagery and the sense of human diminishment after the first transgression.
- source_word: ܢܘܡܫܐ ܕܐܢܫܘܬܐ
  chosen: the measure of humanity
  alternatives:
  - the norm of humanity
  - the rule of mankind
  lexicon: Payne Smith
  rationale: In parallel with time being searched out and strength being tested, the phrase reads most naturally as an evaluative 'measure' rather than legal instruction.
- source_word: ܫܘܒܩܢܐ ܕܡ̈ܝܬܐ
  chosen: the release of the dead
  alternatives:
  - the remission concerning the dead
  - the sending-away of the dead
  lexicon: Payne Smith
  rationale: The clause is difficult, so the rendering stays relatively literal and preserves the striking imagery without over-resolving its exact sense.
- source_word: ܡܚܝܒܢܘܗܝ
  chosen: made liable
  alternatives:
  - made guilty
  - brought under obligation
  lexicon: Payne Smith
  rationale: The judicial nuance is stronger than mere inner guilt, so 'liable' keeps the sense of incurred culpability.
- source_word: ܐܣܛܘܟܣܐ
  chosen: the elements
  alternatives:
  - the elemental powers
  - the rudiments
  lexicon: Payne Smith
  rationale: The Greek loanword points to the cosmic elements; 'elements' is the clearest and least interpretively loaded choice.
theological_decisions:
- issue: Adam's act and the entry of death
  chosen_reading: Adam's first transgression is rendered as the decisive primal act that stirs up untimely death and the chain of human misery.
  alternative_readings:
  - The passage could be softened into a more general statement about human fallenness.
  - The clause could be read less causally and more descriptively.
  rationale: The Syriac links Adam's act directly with death, mourning, pain, and toil. The translation preserves that causal-apocalyptic logic rather than diluting it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1-3
- issue: The difficult clause about 'the release of the dead'
  chosen_reading: The phrase is left relatively literal rather than harmonized into a clearer doctrinal statement about resurrection.
  alternative_readings:
  - a reference to resurrection
  - a reference to mortality or death's sentence
  rationale: The Ceriani-based wording is syntactically difficult. A more explicit doctrinal gloss would claim more certainty than the source bucket warrants.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
