lexical_decisions:
- source_word: ܢܬܬܒܪ
  chosen: shall be broken
  alternatives:
  - shall be shattered
  - shall be crushed
  lexicon: Smith
  rationale: The verb naturally carries the sense of being broken or shattered. 'Shall be broken' preserves the prophetic severity without over-intensifying beyond the Syriac.
- source_word: ܙܟܘܟܝ
  chosen: your confidence
  alternatives:
  - your hope
  - your joy
  - your prosperity
  lexicon: Payne Smith
  rationale: The chapter edge is textually unstable, and this form is not fully secure in the present bucket. 'Your confidence' best fits the immediate context of failed expectation and collapse, while avoiding false precision.
- source_word: ܐܡ̈ܗܬܝ
  chosen: your maidservants
  alternatives:
  - your handmaids
  - your women
  - your maidens
  lexicon: Payne Smith
  rationale: The ordinary Syriac sense points to female servants/handmaids. Because the addressee is personified in the feminine, retaining a household term is preferable to smoothing it away.
- source_word: ܡܣܘܟ
  chosen: deeply entangled
  alternatives:
  - mixed up
  - embroiled
  lexicon: Smith
  rationale: The form suggests being mixed in or caught up with something. 'Deeply entangled' renders the sense idiomatically in English while preserving the image of being drawn into distress.
- source_word: ܐܘܠܨܢܐ
  chosen: affliction
  alternatives:
  - distress
  - tribulation
  lexicon: Payne Smith
  rationale: The term denotes pressure, distress, and tribulation. 'Affliction' fits the solemn register here and stays broad enough for the apocalyptic context.
- source_word: ܐܝܕܐ ܕܢܦܠܬ ܘܚܕܝܬܝ
  chosen: in which you trusted and rejoiced
  alternatives:
  - over which you exulted and rejoiced
  - in which you fell and rejoiced
  lexicon: Smith
  rationale: The transmitted line is difficult and likely affected by boundary/OCR instability. This rendering gives a coherent sense aligned with the surrounding warning about misplaced expectation, while the footnote marks the uncertainty.
