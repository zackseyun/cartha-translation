theological_decisions:
- issue: How to render the fate of those who withdrew and those who returned
  chosen_reading: The chapter leaves the matter as an open question placed before
    God, rather than resolving it in advance.
  alternative_readings:
  - A more categorical anticipatory judgment before chapter 42 begins
  rationale: Baruch is still asking how 'that last time' will receive these groups;
    the answer belongs to the next chapter, so this draft preserves the suspense and
    sequence.
- issue: Meaning of the image 'beneath your wings'
  chosen_reading: A literal metaphor of divine refuge is retained.
  alternative_readings:
  - A flattened rendering such as 'under your protection'
  rationale: 'The image is theologically important: repentance is portrayed not merely
    as moral reform but as flight into God''s shelter.'
