translation:
  text: '1. And I said, “For whom and for how many will these things be? And who will
    be counted worthy to see that time?[a]

    2. But I will speak with you all that I think, and I will ask of you concerning
    those of your people whom I have seen in great number, who withdrew from your
    covenant and cast from themselves the yoke of your law.

    3. But others again I have seen who left their vanity[b] and fled beneath your
    wings.

    4. What then will happen to these? Or how will that last time receive them?

    5. Or will the time of these perhaps be weighed, and as the balance inclines,
    so will they be judged?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The present Ceriani chapter bucket overlaps with the close of chapter 40
      and the start of chapter 42. This question section is clear in sense, but its
      exact edge is clarified with Kmosko page 576.
    reason: textual_variant
  - marker: b
    text: The Syriac line here is locally uncertain in the Ceriani OCR; 'their vanity'
      is supported by the Kmosko Latin control witness.
    reason: lexical_alternative
  - marker: c
    text: Or 'time?”[a]'.
    reason: previous_rendering
  - marker: d
    text: Or '“But I will speak before you'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܩܝܡܐ / ܩܝܡ̈ܐ (OCR-corrupt in Ceriani line)
  chosen: your covenant
  alternatives:
  - your pledges
  - your covenant-commitments
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The control witness points to Latin sponsionibus tuis, but in this Jewish
    apocalyptic context the sense is best carried by 'covenant,' while the rationale
    notes the pledge/commitment nuance behind the term.
- source_word: ܢܡܘܣܐ
  chosen: law
  alternatives:
  - instruction
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The phrase 'yoke of your law' is a stable idiom here; 'law' preserves
    the covenantal and judicial force better than the broader 'instruction.'
- source_word: ܡܘܒܠܐ / locally uncertain phrase
  chosen: their vanity
  alternatives:
  - their emptiness
  - their delusion
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: Ceriani’s OCR is rough at this point, but Kmosko’s Latin control supports
    vanitatem suam. 'Vanity' preserves the moral-spiritual emptiness without over-interpreting
    it.
- source_word: ܓܢܦ̈ܐ / phrase preserved by control witness
  chosen: beneath your wings
  alternatives:
  - under your wings
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The protective metaphor should remain literal and biblical in texture;
    flattening it to 'your protection' would lose the image.
- source_word: ܡܬܬܚܒܘ / balance-weighing expression (OCR-uncertain)
  chosen: be weighed
  alternatives:
  - be assessed
  - be measured
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The following balance imagery confirms that the judgment metaphor is
    specifically one of weighing, not merely general evaluation.
