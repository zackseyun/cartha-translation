translation:
  text: '1 Therefore, whoever understands shall then be wise.

    2 For the measure and the reckoning of that time are two parts of weeks—seven
    weeks.

    3 And I answered and said, “It is good for a man to come and see, but it is better
    that he should not come, lest he fall.

    4 But I will say this also:

    5 Can what is incorruptible despise what is corruptible, and what happens to what
    is corruptible, so as to look only to what is not corruptible?

    6 But if these things will surely come to pass, O Lord, as you have told me, show
    me this also, if I have found favor before you:

    7 Will these things happen in one place, or in one part of the earth, or will
    the whole earth experience them?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The present chapter boundary is medium-confidence. Chapter 28 appears to
      run onto the adjoining Ceriani page, so this draft follows the recoverable primary
      Syriac beyond the narrow prompt slice rather than pretending page 212 alone
      is sufficient.
    reason: textual_variant
  - marker: b
    text: The phrase rendered 'two parts of weeks—seven weeks' is difficult in the
      present Syriac/OCR state. The English stays close to the visible wording without
      claiming a fully certain calculation.
    reason: lexical_alternative
  - marker: c
    text: Verses 4–5 are textually fragile in the current page-edge transmission.
      The English keeps only the clearest recoverable contrast between what is incorruptible
      and what is corruptible.
    reason: textual_variant
lexical_decisions:
- source_word: ܡܫܘܚܬܗ
  chosen: measure
  alternatives:
  - extent
  - measurement
  lexicon: Payne Smith
  rationale: The noun carries the sense of measured extent. 'Measure' preserves the
    apocalyptic numeration without over-interpreting the calculation.
- source_word: ܡܢܝܢܗ
  chosen: reckoning
  alternatives:
  - number
  - count
  lexicon: Smith
  rationale: The line pairs this term with 'measure'; 'reckoning' keeps the sense
    of calculated enumeration and avoids a flat repetition with 'measure.'
- source_word: ܫܒܘ̈ܥܐ
  chosen: weeks
  alternatives:
  - heptads
  - sevens
  lexicon: Payne Smith
  rationale: The Syriac formally means 'weeks' or 'sevens.' 'Weeks' is the most transparent
    English, while the footnote notes that the full phrase remains difficult.
- source_word: ܕܠܐ ܡܬܚܒܠܐ
  chosen: what is incorruptible
  alternatives:
  - what is imperishable
  - the uncorrupted
  lexicon: Payne Smith
  rationale: The contrast is with what is corruptible or perishable. 'Incorruptible'
    keeps the sharper antithesis and the elevated register.
- source_word: ܡܬܚܒܠܐ
  chosen: what is corruptible
  alternatives:
  - what is perishable
  - what decays
  lexicon: Payne Smith
  rationale: This preserves the direct lexical contrast with the preceding term and
    avoids smoothing the rhetorical question into abstraction.
- source_word: ܢܦܠ
  chosen: fall
  alternatives:
  - stumble
  - collapse
  lexicon: Smith
  rationale: The warning is terse and moral-apocalyptic. 'Fall' preserves both literal
    and figurative force.
- source_word: ܐܘܕܥܟ
  chosen: show me
  alternatives:
  - make known to me
  - inform me
  lexicon: Payne Smith
  rationale: Baruch asks for disclosure, not mere data. 'Show me' fits revelatory
    context and remains idiomatic.
- source_word: ܒܚܕ ܐܬܪܐ / ܒܚܕܐ ܡܢ ܡܢܘ̈ܬܐ ܕܐܪܥܐ
  chosen: in one place, or in one part of the earth
  alternatives:
  - in one region
  - in one quarter of the earth
  lexicon: Payne Smith
  rationale: The question contrasts local and universal scope. This rendering keeps
    both elements visible.
