theological_decisions:
- issue: Whether to smooth the incorruptible/corruptible contrast into a generalized
    moral lesson
  chosen_reading: Retained the ontological contrast as 'what is incorruptible' and
    'what is corruptible.'
  alternative_readings:
  - the eternal and the temporal
  - the spiritual and the material
  rationale: The Syriac presents a stark contrast and a rhetorical question, not a
    paraphrased doctrinal summary. Keeping the sharper wording is more auditable and
    less interpretive.
- issue: Whether verse 7 already asserts universal tribulation
  chosen_reading: Rendered verse 7 as Baruch's question about scope, not as an assertion.
  alternative_readings:
  - These things will happen over the whole earth
  - These things will happen in every region
  rationale: In this chapter Baruch asks whether the events are local or universal;
    the answer belongs in the following chapter.
