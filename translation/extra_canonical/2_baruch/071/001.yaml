lexical_decisions:
- source_word: ܐܪܥܐ ܩܕܝܫܬܐ / chapter sense attested in the Syriac tradition
  chosen: the holy land
  alternatives:
  - the sacred land
  - the land set apart
  lexicon: Payne Smith
  rationale: The passage personifies the land in a covenantal and eschatological way. 'Holy land' preserves that theological weight more naturally than a flatter 'land.'
- source_word: ܬܪܚܡ / sense of showing mercy or compassion
  chosen: shall have mercy on
  alternatives:
  - shall show compassion to
  - shall pity
  lexicon: Payne Smith
  rationale: The verb carries active compassion, not mere sentiment. 'Shall have mercy on' keeps the solemn register and the covenantal tone.
- source_word: ܕܝܠܗ̇ / idiom for belonging to it
  chosen: its own
  alternatives:
  - her own
  - those who belong to it
  lexicon: Payne Smith
  rationale: The phrase is concise and preserves the land's personified relation to its people without overexplaining the idiom.
- source_word: ܬܢܛܪ / protective keeping
  chosen: it shall protect
  alternatives:
  - it shall guard
  - it shall keep safe
  lexicon: Payne Smith
  rationale: '''Protect'' is clear, dignified English and fits the promise of preservation in this brief oracle.'
- source_word: ܦܘܫܩܐ / explanatory unveiling
  chosen: interpretation
  alternatives:
  - explanation
  - meaning
  lexicon: Payne Smith
  rationale: Apocalyptic discourse regularly moves from vision to interpretation. 'Interpretation' preserves that formal visionary pattern.
- source_word: ܐܫܬܡܥܬ ܒܥܘܬܟ ܠܘܬ ܡܪܝܡܐ
  chosen: your prayer has been heard before the Most High
  alternatives:
  - your petition has been heard by the Most High
  - your prayer has been received before the Most High
  lexicon: Payne Smith
  rationale: This wording keeps both the passive divine-hearing idiom and the reverent heavenly setting.
theological_decisions:
- issue: Whether to preserve the land as an acting subject
  chosen_reading: the holy land shall have mercy on its own
  alternative_readings:
  - God shall have mercy through the land
  - the people of the land shall receive mercy
  rationale: The witness presents the land in apocalyptic personification. Preserving that imagery avoids flattening the covenantal bond between land and people.
  doctrine_reference: Retain biblical-apocalyptic personification where the source warrants it.
- issue: How explicit to make divine response to Baruch's prayer
  chosen_reading: your prayer has been heard before the Most High
  alternative_readings:
  - the Most High has answered your prayer
  - your prayer has been accepted
  rationale: The source stresses heavenly hearing rather than a broader paraphrase of answered prayer. The English should not overstate what the wording itself says.
  doctrine_reference: Do not expand divine-action language beyond the witness.
