translation:
  text: And the holy land shall have mercy on its own, and at that time it shall protect its inhabitants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And at that time there will be much delight, and there will be peace. And after that time the city will be built again, and its offerings will be renewed, and the priests will return to their service. And again the nations will glory as they did, but not more than at first. But after these things there will be the fall of many nations, and there will be other waters of darkness among them.'.
    reason: previous_rendering
