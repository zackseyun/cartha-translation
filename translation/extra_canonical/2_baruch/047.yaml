translation:
  text: '1 And when I had gone out and dismissed them, I went away from there and said to them, “Look, I am going to my dwelling in Hebron.”[a]


    2 And afterward my companions left me, and I came to the cedar where he had spoken with me; and I sat there and fasted seven days.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The chapter edge is slightly unstable here. Ceriani’s Syriac appears to read something like 'to my dwelling in Hebron,' while the Kmosko control witness supports the simpler 'to Hebron' and also preserves an added clause, 'for there the Mighty One has sent me.'
    reason: textual_variant
  - marker: b
    text: Ceriani explicitly mentions 'the cedar,' but the Kmosko control witness generalizes the line to 'that place where the word had been spoken to me.' The main text keeps the more concrete Syriac reading.
    reason: alternative_reading
  - marker: c
    text: Or 'where the word had been spoken to me there'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܫ̇ܪܝܘ ܐܢܘܢ
  chosen: dismissed them
  alternatives:
  - left them
  - sent them away
  lexicon: Payne Smith
  rationale: The verb carries the sense of releasing or letting go. 'Dismissed them' fits the narrative transition and matches the public, formal setting better than a merely casual 'left them.'
- source_word: ܠܕܝܪܝ ܠܚܒܪܘܢ
  chosen: to my dwelling in Hebron
  alternatives:
  - to Hebron
  - to my lodging at Hebron
  lexicon: Payne Smith
  rationale: The Ceriani Syriac appears to preserve a noun of dwelling or lodging before the place name. The rendering keeps that Semitic detail while producing natural English.
- source_word: ܚܒܪܐ
  chosen: my companions
  alternatives:
  - my friends
  - those with me
  lexicon: Payne Smith
  rationale: The noun points to associates or companions. 'My companions' preserves the relational sense without sounding overly intimate.
- source_word: ܐܪܙܐ
  chosen: the cedar
  alternatives:
  - the cedar tree
  - the tree
  lexicon: Payne Smith
  rationale: The Syriac names the tree concretely. Retaining 'cedar' preserves the specificity of the witness instead of flattening it to a vague 'place.'
- source_word: ܕܐܬܡܠܠ ܥܡܝ
  chosen: where the word had been spoken to me
  alternatives:
  - where he had spoken with me
  - where speech had come to me
  lexicon: Payne Smith
  rationale: The passive-like phrasing is better represented by 'the word had been spoken' than by forcing an explicit subject. This keeps the solemn revelatory tone.
