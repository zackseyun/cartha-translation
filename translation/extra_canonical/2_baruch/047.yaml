translation:
  text: '1 And when I had gone out and dismissed them, I went away from there and
    said to them, 鈥淟ook, I am going to my dwelling in Hebron.鈥漑a]


    2 And afterward my companions left me, and I came to the cedar where the word
    had been spoken to me there; and I sat there and fasted seven days.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The chapter edge is slightly unstable here. Ceriani鈥檚 Syriac appears to
      read something like 'to my dwelling in Hebron,' while the Kmosko control witness
      supports the simpler 'to Hebron' and also preserves an added clause, 'for there
      the Mighty One has sent me.'
    reason: textual_variant
  - marker: b
    text: Ceriani explicitly mentions 'the cedar,' but the Kmosko control witness
      generalizes the line to 'that place where the word had been spoken to me.' The
      main text keeps the more concrete Syriac reading.
    reason: alternative_reading
lexical_decisions:
- source_word: 塬虈塥軡軜 軔堍軜堍
  chosen: dismissed them
  alternatives:
  - left them
  - sent them away
  lexicon: Payne Smith
  rationale: The verb carries the sense of releasing or letting go. 'Dismissed them'
    fits the narrative transition and matches the public, formal setting better than
    a merely casual 'left them.'
- source_word: 軤軙軡塥軡 軤軞軖塥軜堍
  chosen: to my dwelling in Hebron
  alternatives:
  - to Hebron
  - to my lodging at Hebron
  lexicon: Payne Smith
  rationale: The Ceriani Syriac appears to preserve a noun of dwelling or lodging
    before the place name. The rendering keeps that Semitic detail while producing
    natural English.
- source_word: 軞軖塥軔
  chosen: my companions
  alternatives:
  - my friends
  - those with me
  lexicon: Payne Smith
  rationale: The noun points to associates or companions. 'My companions' preserves
    the relational sense without sounding overly intimate.
- source_word: 軔塥軝軔
  chosen: the cedar
  alternatives:
  - the cedar tree
  - the tree
  lexicon: Payne Smith
  rationale: The Syriac names the tree concretely. Retaining 'cedar' preserves the
    specificity of the witness instead of flattening it to a vague 'place.'
- source_word: 軙軔墁堋軤軤 堀堋軡
  chosen: where the word had been spoken to me
  alternatives:
  - where he had spoken with me
  - where speech had come to me
  lexicon: Payne Smith
  rationale: The passive-like phrasing is better represented by 'the word had been
    spoken' than by forcing an explicit subject. This keeps the solemn revelatory
    tone.
