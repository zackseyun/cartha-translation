translation:
  text: '1. And the ninth black waters that you saw—these are the wickedness that
    was in the days of Manasseh son of Hezekiah.


    2. For he committed much impiety: he killed the righteous, twisted judgment, shed
    innocent blood, violated married women by force, overturned altars, abolished
    their offerings, and drove out the priests so that they could not minister in
    the sanctuary.


    3. And he made an image with five faces: four looked toward the four winds, and
    the fifth was above the image, as though to provoke the zeal of the Mighty One.


    4. Then wrath went out from before the Mighty One, that Zion should be uprooted—as
    it also happened in your days.


    5. And a decree also went out against the two and a half tribes, that they too
    should be led away captive, as you have now seen.


    6. And the impiety of Manasseh grew so great that the glory of the Most High withdrew
    from the sanctuary.


    7. Therefore at that time Manasseh was called the impious one, and in the end
    his dwelling was in the fire.


    8. For although his prayer was heard by the Most High, yet at last, when he was
    cast into the bronze horse and the bronze horse melted, it became a sign for him
    concerning the hour.


    9. Not because he had lived blamelessly, for he was not worthy, but so that from
    then on he might know by whom he would finally be punished.


    10. For he who is able to help is also able to punish.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The supplied Ceriani bucket begins on a page that still overlaps with the
      close of chapter 63; the chapter opening here is structurally secure by content,
      but the edge remains a medium-confidence boundary in the current substrate.
    reason: textual_variant
  - marker: b
    text: '''Bronze horse'' reflects the transmitted wording as preserved in the Syriac
      tradition, but the image is obscure and may represent a difficult or corrupt
      expression; ''brazen horse'' is the traditional English equivalent.'
    reason: lexical_alternative
  - marker: c
    text: The sanctuary clause in verse 6 is difficult; some control-oriented renderings
      take the key term as 'praise,' but the main text adopts 'glory' because the
      context suggests withdrawal of divine presence.
    reason: alternative_reading
lexical_decisions:
- source_word: ܚܫ̈ܟܐ
  chosen: black waters
  alternatives:
  - dark waters
  lexicon: Payne Smith
  rationale: I kept the apocalyptic color term explicit rather than softening it to
    a generic 'dark,' since the vision alternates bright and black waters as symbolic
    sequences.
- source_word: ܚܒܠܐ
  chosen: wickedness
  alternatives:
  - corruption
  - destruction
  lexicon: Payne Smith
  rationale: In this explanatory section the noun points to Manasseh's moral evil,
    not merely the ruin resulting from it, so 'wickedness' best fits the vice-list
    that follows.
- source_word: ܒܣܝܡܐ / phrase for innocent blood
  chosen: innocent blood
  alternatives:
  - guiltless blood
  lexicon: Payne Smith
  rationale: '''Innocent blood'' preserves the judicial and moral force of the phrase
    and matches the chapter''s accusation rhetoric without sounding archaic.'
- source_word: ܪ̈ܘܚܐ
  chosen: winds
  alternatives:
  - spirits
  lexicon: Payne Smith
  rationale: In the description of the five-faced image, the four directions are in
    view, so 'winds' is preferable to 'spirits.'
- source_word: ܪܘܓܙܐ / wrath phrase
  chosen: wrath went out from before
  alternatives:
  - anger proceeded
  - indignation came forth
  lexicon: Payne Smith
  rationale: This keeps the judicial, theophanic tone of the Syriac and avoids flattening
    the clause into ordinary emotional language.
- source_word: ܬܫܒܘܚܬܐ / related sanctuary-presence term
  chosen: glory
  alternatives:
  - praise
  - splendor
  lexicon: Payne Smith
  rationale: Given the sanctuary context and the withdrawal motif, 'glory' best conveys
    the departure of divine presence rather than merely human praise.
- source_word: ܒܘܝܐܐ / impiety epithet context
  chosen: the impious one
  alternatives:
  - the ungodly one
  - the wicked one
  lexicon: Payne Smith
  rationale: The text appears to give Manasseh an epithet. 'Impious' preserves the
    religious force of his offense better than the broader 'wicked.'
- source_word: ܒܐܝܕܝܬܐ / difficult phrase in v. 8
  chosen: bronze horse
  alternatives:
  - brazen horse
  lexicon: Payne Smith
  rationale: I used the more natural modern English 'bronze horse' while retaining
    the traditional sense of the obscure transmitted image.
- source_word: ܡܪܝܡܐ
  chosen: the Most High
  alternatives:
  - the Exalted One
  lexicon: Payne Smith
  rationale: This is the standard reverential rendering and fits the elevated diction
    of 2 Baruch.
- source_word: benefactive verb in v. 10
  chosen: help
  alternatives:
  - benefit
  - do good
  lexicon: Payne Smith
  rationale: '''Help'' is clear modern English while still preserving the contrast
    with divine punishment in the same line.'
