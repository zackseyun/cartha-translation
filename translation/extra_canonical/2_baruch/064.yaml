theological_decisions:
- issue: Whether the sanctuary line speaks of praise or divine presence
  chosen_reading: the glory of the Most High withdrew from the sanctuary
  alternative_readings:
  - the praise of the Most High was removed from the sanctuary
  - the splendor of the Most High departed from the sanctuary
  rationale: In this judgment context the departure language naturally reads as withdrawal
    of divine glory/presence, which carries the theological weight of sanctuary abandonment
    more clearly than 'praise.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: How to present Manasseh's heard prayer in relation to his final fate
  chosen_reading: his prayer was heard, yet he still remained liable to final punishment
  alternative_readings:
  - his prayer secured complete restoration
  - the sign itself was the punishment
  rationale: The chapter explicitly holds together divine hearing and continuing judgment.
    I preserved that tension instead of resolving it toward either full absolution
    or sheer condemnation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
