translation:
  text: '… the times are already hastening on them. And the holy ones are near the
    truth, and the living are near the end.


    So then receive his commandments, that you may not be deprived of his great abundance,
    but may find rest and not be condemned.


    For there is no longer a mystery for understanding, or wisdom for the times, or
    lengthening for the seasons, or anyone by prayer, or by the intercession of the
    fathers, or by the petition of the prophets, or by the help of the righteous,
    or anyone by the weeping of women, or by the kindness of children, or by the crying
    of infants, or by the innocence of those born, or by the righteousness of their
    fathers. None of these things that were thought and seen to be helpers can help.


    For we all shall perish, each one of us by himself.


    But he will leave those in whom there is hope for him, and he will destroy at
    once those who are divided by sins.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This Ceriani bucket appears to preserve the latter portion of the chapter
      traditionally numbered 85; the chapter edge remains somewhat unstable against
      adjacent pages, so the draft favors honesty over false precision.
    reason: textual_variant
  - marker: b
    text: The opening sequence of similes ('pitcher ... well ... ship ... harbor ...
      journey ... city') is supported by the broader witness tradition, but the present
      Ceriani OCR at this spot is rough.
    reason: textual_variant
  - marker: c
    text: The final clause could be rendered more literally as something like 'those
      divided among sins'; the English gives the likely sense idiomatically as 'defiled
      with sins.'
    reason: lexical_alternative
  - marker: d
    text: Or 'The youth of this world has passed, and the strength of creation is
      already spent; the coming of the times is close and already pressing in.'.
    reason: previous_rendering
  - marker: e
    text: Or 'For there is the decree of judgment, the way of fire, and the path that
      leads to destruction. Therefore each of us will then stand by himself alone.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܦܩ̈ܘܕܘܗܝ
  chosen: his commandments
  alternatives:
  - his decrees
  - his commands
  lexicon: Payne Smith
  rationale: The term naturally carries the sense of authoritative divine commands.
    “Commandments” preserves the covenantal and exhortatory force in this closing
    warning.
- source_word: ܢܝܚ / ܬܐܢܝܚܘܢ
  chosen: find rest
  alternatives:
  - be comforted
  - have relief
  lexicon: Payne Smith
  rationale: The immediate contrast is with condemnation at the judgment. “Find rest”
    preserves both relief and eschatological repose without flattening the image.
- source_word: ܒܒܟܝܐ ܕܢܫ̈ܐ
  chosen: the weeping of women
  alternatives:
  - women’s lamentation
  lexicon: Payne Smith
  rationale: A literal rendering keeps the lament rhetoric vivid and fits the surrounding
    list of ineffective appeals and intercessory gestures.
- source_word: ܒܛܝܒܘܬܐ ܕܛܠܝ̈ܐ
  chosen: the tenderness of little children
  alternatives:
  - the charm of children
  - the goodness of little ones
  lexicon: Payne Smith
  rationale: The noun suggests pleasantness, kindness, or endearing innocence. “Tenderness”
    best fits the emotional appeal implied by the list.
- source_word: ܒܕܟܝܘܬܐ ܕܝܠܝ̈ܕܐ
  chosen: the innocence of newborns
  alternatives:
  - the purity of infants
  - the cleanness of babies
  lexicon: Payne Smith
  rationale: The phrase points to childlike purity as something people might think
    could plead for mercy. “Innocence” communicates that idiomatically in English.
- source_word: ܐܪܙܐ
  chosen: decree
  alternatives:
  - mystery
  - sentence
  - proclamation
  lexicon: Payne Smith
  rationale: The local OCR is rough, but in this judgment context the sense is not
    a hidden mystery but an announced judicial determination. “Decree” best fits the
    control-witness sense while staying restrained.
- source_word: ܡܦܠܓܝܢ ܒܚܛܝ̈ܬܐ
  chosen: defiled with sins
  alternatives:
  - divided by sins
  - entangled in sins
  lexicon: Payne Smith
  rationale: The literal force may suggest being split up or distributed among sins,
    but idiomatic English needs a moral-state expression. “Defiled with sins” communicates
    the resulting condition clearly.
