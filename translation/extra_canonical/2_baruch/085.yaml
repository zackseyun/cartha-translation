theological_decisions:
- issue: Whether to compress the long catalogue of failed intercessions into a general
    statement about no one being able to help at the judgment
  chosen_reading: Retained the catalogue of prayers, prophets, righteous people, women,
    children, and fathers as separate elements.
  alternative_readings:
  - Summarize as 'no intercession will help then'
  rationale: The Syriac rhetoric is cumulative and severe. Keeping the list preserves
    the chapter’s emphasis on final individual accountability before divine judgment.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: How explicitly to render the final preservation clause
  chosen_reading: Rendered it as 'he will preserve for his age those who have hope
    in him.'
  alternative_readings:
  - '''those in whom there is hope'''
  - '''those whom he finds worthy'''
  rationale: The Syriac points to people whose hope is set in him; making that relation
    explicit yields clear English without adding a new theological idea.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
