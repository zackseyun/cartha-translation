translation:
  text: 'But hear also about the bright waters that are to come at the end, after
    those dark waters.


    This is the word: after the signs have come which were told to you before, the
    nations will be thrown into confusion, and the time of my Messiah will come. He
    will summon all the nations, and some of them he will spare, but others of them
    he will put to death.


    These, then, are the things that shall happen to those nations which are to be
    spared by him.


    Every people that has not known Israel and has not trampled the seed of Jacob—these
    are the ones that shall be spared.


    And this is because they shall be subjected, from among all the nations, to your
    people.


    But all those who have ruled over you, or have known you, all these shall be delivered
    to the sword.'
  philosophy: optimal-equivalence
