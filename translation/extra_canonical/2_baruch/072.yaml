    reason: cultural_note
lexical_decisions:
- source_word: phrase reflected in Kmosko Latin aquae lucidae, set over against the
    dark waters
  chosen: bright waters
  alternatives:
  - clear waters
  - radiant waters
  lexicon: Payne Smith
  rationale: The contrast is not merely about clarity but about luminous eschatological
    reversal after the dark sequence. 'Bright waters' keeps the symbolic force without
    overpoetic expansion.
- source_word: ܡܫܝܚܝ / possessive messianic title reflected in tempus Messiae mei
  chosen: my Messiah
  alternatives:
  - my Anointed One
  lexicon: Payne Smith
  rationale: The possessive should be retained because it is theologically marked
    in the divine speech. 'Messiah' is preferable here because the apocalyptic context
    is explicit and traditional.
- source_word: verb reflected in advocabit omnes gentes
  chosen: will summon all the nations
  alternatives:
  - will call together all the nations
  - will gather all the nations
  lexicon: Payne Smith
  rationale: '''Summon'' preserves royal-judicial force better than the softer ''gather.'''
- source_word: verb pair reflected in quasdam earum vivificabit ... quasdam earum
    interficiet
  chosen: will spare alive ... will put to death
  alternatives:
  - will preserve alive ... will kill
  - will let live ... will destroy
  lexicon: Payne Smith
  rationale: In this judgment setting, the contrast is forensic and distributive.
    'Spare alive' conveys survival through judgment better than the potentially misleading
    'make alive.'
- source_word: ܙܪܥܗ ܕܝܥܩܘܒ / reflected in semen Iacob
  chosen: the seed of Jacob
  alternatives:
  - the offspring of Jacob
  - the descendants of Jacob
  lexicon: Payne Smith
  rationale: The covenantal phrase should remain traditional and concrete; 'seed'
    preserves the biblical-apocalyptic register.
- source_word: verb reflected in subiicientur ... populo tuo
  chosen: shall be subjected ... to your people
  alternatives:
  - shall be brought into subjection to your people
  - shall submit to your people
  lexicon: Payne Smith
  rationale: The line speaks of real subordination in the messianic judgment of nations,
    not merely willing allegiance.
