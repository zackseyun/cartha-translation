theological_decisions:
- issue: Whether to render the messianic title explicitly
  chosen_reading: my Messiah
  alternative_readings:
  - my Anointed One
  rationale: The chapter belongs to an overtly eschatological judgment scene, and
    the possessive title is important. Rendering it as 'Messiah' best preserves the
    recognized apocalyptic sense without flattening it into a generic royal label.
  doctrine_reference: Retain explicit messianic language where the witness warrants
    it.
- issue: How to construe the nations who 'live'
  chosen_reading: they are spared alive through the Messiah's judgment
  alternative_readings:
  - they are spiritually vivified
  - they receive eternal salvation
  rationale: The immediate contrast is with nations put to death. The text speaks
    first of survival through eschatological judgment, not necessarily of a fuller
    soteriological claim.
  doctrine_reference: Do not overextend judgment-survival language into doctrines
    the passage does not explicitly state.
- issue: Whether 'Israel' and 'the seed of Jacob' should be merged or generalized
  chosen_reading: keep both designations distinct and literal
  alternative_readings:
  - Israel, that is, Jacob's descendants
  - God's people
  rationale: The paired expressions intensify covenant identity and should not be
    collapsed into a smoother but less precise abstraction.
  doctrine_reference: Preserve covenantal and ethnic-historical designations when
    the source maintains them.
