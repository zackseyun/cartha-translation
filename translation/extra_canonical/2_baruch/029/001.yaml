  from: 1 And he answered and said to me, “What will happen then will befall the whole earth. 2 Therefore all who live will feel it. But at that time I will protect only those who are found in those days in this land. 3 And it will be, after what is to happen in those parts has been completed, then the Messiah will begin to be revealed. 4 And Behemoth will be revealed from his place, and Leviathan will ascend from the sea, those two great monsters that I created on the fifth day of creation and kept until that time. Then they will become food for all who remain. 5 The earth also will yield its fruit, one in ten thousand. On one vine there will be a thousand branches, and one branch will produce a thousand clusters, and one cluster will produce a thousand grapes, and one grape will produce a kor of wine. 6 And those who have hungered will rejoice, and they will see wonders every day. 7 For winds will go out from before me to bring every morning the fragrance of aromatic fruits, and at the close of the day clouds distilling the dew of health. 8 And it will happen at that same time that the treasury of manna will again descend from on high, and they will eat of it in those years, because these are they who have come to the consummation of time.”
  to: And he answered and said to me, “What will then happen will happen to the whole earth. Therefore all who live will experience it. But at that time I will protect only those who are found in this land at that time. And it will be, after what is to happen in those parts has been accomplished, that the Messiah will begin to be revealed. And Behemoth will be revealed from his place, and Leviathan will ascend from the sea, those two great monsters that I created on the fifth day of creation and kept until that time. Then they will become food for all who are left. The earth also will yield its fruit, ten thousandfold. On one vine there will be a thousand branches, and one branch will produce a thousand clusters, and one cluster will produce a thousand grapes, and one grape will produce a kor of wine. And those who have hungered will rejoice, and they will see wonders every day. For winds will go out from before me to bring every morning the fragrance of aromatic fruits, and at the close of the day clouds distilling the dew of health. And it will happen at that same time that the treasury of manna will again descend from on high, and they will eat of it in those years, because these are they who have come to the consummation of time.”
