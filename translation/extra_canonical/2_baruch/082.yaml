theological_decisions:
- issue: Divine titles in the overlap section
  chosen_reading: Distinguish 'the Most High' from 'the Mighty One.'
  alternative_readings:
  - Render both with a single English title
  rationale: The Syriac uses elevated divine titles with slightly different rhetorical
    force; preserving both keeps the texture of the epistle's theology.
- issue: Eschatological reversal catalogue
  chosen_reading: Treat the reversals as final apocalyptic transformation, not merely
    moral observation.
  alternative_readings:
  - Read them as general wisdom about life's instability
  rationale: The surrounding language of judgment, consummation, and Sheol places
    the list within final reckoning imagery.
- issue: ܫܝܘܠ
  chosen_reading: Retain 'Sheol.'
  alternative_readings:
  - Render as 'hell'
  rationale: This avoids overdetermining the text with later infernal concepts while
    keeping the older underworld reference visible.
