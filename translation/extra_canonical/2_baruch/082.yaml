lexical_decisions:
- source_word: ܡܣܪܗܒ
  chosen: is hastening
  alternatives:
  - is speeding
  - presses on
  lexicon: Payne Smith
  rationale: Keeps the active sense of divine acceleration in the eschatological timetable
    without flattening it into a mere future statement.
- source_word: ܟܘܪ̈ܙܐ ܕܥܠܡܐ
  chosen: the heraldings of the age
  alternatives:
  - the proclamations of the world
  - the signs of the age
  lexicon: Payne Smith
  rationale: The phrase is apocalyptic and somewhat unstable in this bucket; 'heraldings'
    preserves the announcement imagery while allowing the broader sense of eschatological
    signals.
- source_word: ܩܨܐ
  chosen: end
  alternatives:
  - consummation
  - final limit
  lexicon: Payne Smith
  rationale: Used for the feared eschatological close; in the running English I vary
    with 'consummation' where the context becomes more cosmic.
- source_word: ܚܘܠܡ̈ܢܐ
  chosen: health
  alternatives:
  - well-being
  - soundness
  lexicon: Payne Smith
  rationale: The Syriac points to states of wholeness or health; 'health' keeps the
    concrete reversal pattern of the list.
- source_word: ܕܘ̈ܓܐ
  chosen: deformity
  alternatives:
  - ugliness
  - disfigurement
  lexicon: Payne Smith
  rationale: Chosen to preserve the harsh reversal of beauty into something misshapen
    rather than merely less attractive.
- source_word: ܢܗܝܪܘܬܐ ܕܫܪܪܐ
  chosen: the light of truth
  alternatives:
  - true light
  - illumination of truth
  lexicon: Payne Smith
  rationale: Retains both the illumination image and the moral-epistemic force of
    ܫܪܪܐ.
- source_word: ܡܘܩܣܢ
  chosen: wrath
  alternatives:
  - anger
  - indignation
  lexicon: Payne Smith
  rationale: Fits the paired judgment language with ܦܘܪܥܢܘ and preserves the force
    of punitive passion.
- source_word: ܫܝܘܠ
  chosen: Sheol
  alternatives:
  - the grave
  - the underworld
  lexicon: Payne Smith
  rationale: Retained as 'Sheol' rather than 'hell' to avoid importing later doctrinal
    specificity not required by the Syriac.
- source_word: ܢܘܛܦܬܐ / ܪܘܩܩܐ
  chosen: spittle / passing vapor
  alternatives:
  - spit / nothingness
  lexicon: Payne Smith
  rationale: The overlap line is control-backed but textually rough; I preserved the
    abasement comparison while softening one unstable comparison in the running English.
