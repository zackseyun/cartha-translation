theological_decisions:
- issue: Divine epithet
  chosen_reading: Retain 'the Mighty One' as the repeated title for God.
  alternative_readings:
  - Render simply 'God'
  - Render 'the Strong One'
  rationale: The chapter's rhetoric depends on the elevated apocalyptic title. A generic substitute would weaken the tone and the continuity with surrounding chapters.
- issue: Torah succession after Baruch's departure
  chosen_reading: Translate ܒܪ ܢܡܘܣܐ literally as 'a son of the law.'
  alternative_readings:
  - a teacher of the law
  - a scholar of the law
  rationale: The verse affirms continuity of covenant instruction within Israel. The literal idiom better preserves that inherited, communal sense.
- issue: Death-life contrast
  chosen_reading: Keep 'from the house of death into life.'
  alternative_readings:
  - between death and life
  - from death to life
  rationale: The Syriac wording is imagistic, not merely conceptual. Preserving the image suits the lament and the chapter's solemn register.
