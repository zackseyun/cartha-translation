translation:
  text: '1 And it happened on the next day that, behold, the forces of the Chaldeans
    surrounded the city. And at evening time I, Baruch, left the people, and I went
    out and stood by the oak, and I was grieving over Zion and lamenting over the
    captivity that had come upon the people.


    2 And behold, suddenly a spirit of strength lifted me up and carried me aloft
    above the wall of Jerusalem; and I saw four angels standing at the four corners
    of the city, each one holding a torch.'
  philosophy: optimal-equivalence
