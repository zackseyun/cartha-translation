lexical_decisions:
- source_word: ܡܢܐ ܕܡܚܪ
  chosen: on the next day
  alternatives:
  - on the morrow
  - the day after
  lexicon: Smith Syriac Dictionary
  rationale: The phrase is a standard temporal marker. 'On the next day' is natural
    English while preserving the narrative sequence.
- source_word: ܚܝ̈ܠܐ ܕܒ̈ܥܝܕܐ
  chosen: the forces of the Chaldeans
  alternatives:
  - the army of the Chaldeans
  - the Chaldean host
  lexicon: Payne Smith
  rationale: The Ceriani OCR is weak here, but Kmosko's control witness confirms the
    sense 'army/forces of the Chaldeans.' 'Forces' keeps the military force without
    overstating a singular unit.
- source_word: ܘܐܬܬܙܝܥܝ ... ܒܟܝܐ
  chosen: I was grieving ... and lamenting
  alternatives:
  - I was distressed ... and weeping
  - I sorrowed ... and mourned
  lexicon: Smith Syriac Dictionary
  rationale: The paired verbs express inward distress and audible lament. 'Grieving'
    and 'lamenting' preserve the doubled mourning tone.
- source_word: ܪܘܚܐ ܕܚܝ̈ܠܐ
  chosen: a spirit of strength
  alternatives:
  - a spirit of power
  - the spirit of might
  lexicon: Payne Smith
  rationale: The Syriac naturally conveys empowering force. 'Spirit of strength' stays
    close to the wording and avoids importing later fixed theological phrasing.
- source_word: ܫܘܩܐ ܕܐܘܪܫܠܡ
  chosen: the square of Jerusalem
  alternatives:
  - the marketplace of Jerusalem
  - the street of Jerusalem
  lexicon: Smith Syriac Dictionary
  rationale: The noun can denote a street or market-space. 'Square' fits the elevated
    city-view scene well and avoids narrowing the sense too much.
- source_word: ܠܡܦܝܕܐ
  chosen: a torch
  alternatives:
  - a lamp
  lexicon: Payne Smith
  rationale: The continuation on the next page specifies a fiery implement in the
    angels' hands, so 'torch' better captures the apocalyptic image than the milder
    'lamp'.
