    force."},{"source_word":"ܚܝܒܘܬܐ","chosen":"the burden of guilt","alternatives":["culpability","indebtedness"],"lexicon":"Payne
    Smith","entry":null,"rationale":"The context is judicial and accusatory; ''burden
    of guilt'' keeps the weight of liability without sounding overly technical."},{"source_word":"ܢܡܘܣܐ","chosen":"law","alternatives":["instruction","Torah"],"lexicon":"Payne
    Smith","entry":null,"rationale":"''Law'' is the most natural covenantal rendering
    in this exhortational context, especially with the Moses reference. I did not
    use ''Torah'' because the chapter''s English register elsewhere remains translated
