  adjudicator: auto_apply_tier2_source_grounded
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/phase10_syriac_apocalypse/extra_canonical/2_baruch/001/083.job-83.json
  category: mistranslation
  tier: 2
  from: And the love of falsehood will be turned into a charge established by truth
  to: And the realm of change will be turned into accomplished conflict
  rationale: The Syriac reads ܕܡ̈ܫܢܝܐ ܢܗܘܐ ܗܘܦܟ ܥܒܝܕܐ ܡܠܚܡܘܬܐ (literally 'of changes
