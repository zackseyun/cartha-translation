    the Semitic term rather than flattening it to ''grave,'' because the line carries
    more than mere burial; it evokes the postmortem realm in an apocalyptic-judicial
    setting."},{"source_word":"ܫܘܩܪܐ / ܫܘܩܪܝܗ","chosen":"falsehood / the love of falsehood","alternatives":["lying","deceit"],"lexicon":"Payne
    Smith","entry":null,"rationale":"The repeated root points to moral falsity rather
