translation:
  text: 'submit_2baruch_chapter_draft({"english_text":"… into dust where it was born.
    And the possession of wealth will no longer turn back, but will seek death in
    its craving. And the snatchers of wages will bring forth death before its time,
    and the death that is the wage of sufferings will be taken away. And no matter
    of joy will remain for delight. And the realm of change will be turned into accomplished
    conflict, and there will be no hearing for sinners in Sheol.\n\nSince, then, all
    these things now come to pass, do you think they are not requited? One day, therefore,
    the inhabitants of the earth … If, then, I have made these things known to you
    while I still live—for great is the burden of guilt for those who belong to falsehood,
    and I set forth its full measure, because from falsehood they were begotten from
    the beginning, unto death—and I have said that you ought to be instructed: hear,
    and do, and say.\n\n\"If you transgress the law, you will be scattered, and you
    will be removed from your land.\" Jeremiah also spoke to you while he was with
    you, when your fathers were forty years in the wilderness. And after the death
    of Joshua, and after Moses had been taken from you, your tribes still remained
    established. Moses told you beforehand that these things would come upon you;
    and when they did come upon you, know that it was according to the law.\n\nSo
    now I also say to you, after what you have seen: do not go astray after those
    things that have come upon you. You will receive from the Mighty One the kingdom
    that endures, and what has been laid up for you. But know, children, that you
    were not handed over to emptiness when the commandments of the Mighty One were
    given to you; and no one goes forth by the spirit before the place of judgment.
    Rather, turn back to acknowledge his will and his law, and the holy people, and
    the assemblies, and his sanctuaries, and the beautiful works. Do not go astray
    …","translation_philosophy":"optimal-equivalence","lexical_decisions":[{"source_word":"ܫܝܘܠ","chosen":"Sheol","alternatives":["the
