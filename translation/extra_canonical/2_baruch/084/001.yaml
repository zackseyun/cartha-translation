translation:
  text: '1. Look, while I am still alive I have made these things known to you, because
    I said that you should learn what is good; for the Mighty One commanded me to
    instruct you, and before I die I will set before you some of the ordinances of
    his judgment.


    2. Remember how Moses once called heaven and earth as witnesses against you and
    said, “If you trespass the law, you will be scattered; but if you keep it, you
    will be kept.”


    3. He also kept saying other things to you when you were together in the wilderness
    as twelve tribes.


    4. But after his death you cast them away from yourselves, and because of this
    what had been foretold came upon you.


    5. And now, Moses used to tell you before it happened to you—and look, it has
    happened to you—because you abandoned the law.


    6. So I also say to you after your suffering: if you listen to these words that
    have been spoken to you, you will receive from the Mighty One what has been kept
    ready and stored up for you.


    7. Let this letter also be a witness between me and you, so that you may remember
    the commandments of the Mighty One, and so that it may become a vindication for
    me before him who sent me.


    8. Remember the law and Zion, and the holy land, and your brothers, and the covenant
    of your fathers; and do not forget the festivals and the sabbaths.


    9. Hand on this letter and the traditions of the law to your children after you,
    just as your fathers handed them on to you.


    10. And at all times keep asking earnestly, and pray diligently with your whole
    heart, that the Mighty One may have mercy on you and may not reckon the multitude
    of your sins, but remember the uprightness of your fathers.


    11. For if he should judge us apart from the abundance of his mercies, woe to
    all of us who have been born.'
