lexical_decisions:
- source_word: ܚܝܠܬܐ
  chosen: the Mighty One
  alternatives:
  - the Strong One
  - God
  lexicon: Payne Smith
  rationale: I preserved the marked divine title used throughout 2 Baruch rather than
    flattening it into a generic divine name.
- source_word: ܢܡܘܣܐ
  chosen: law
  alternatives:
  - instruction
  - Torah
  lexicon: Payne Smith
  rationale: In this covenant-warning setting, “law” gives the most natural English
    while still carrying Mosaic authority.
- source_word: ܦܘܩ̈ܕܢܐ / ܦܘܩ̈ܕܢܘܗܝ
  chosen: commandments / ordinances
  alternatives:
  - charges
  - precepts
  lexicon: Payne Smith
  rationale: The chapter moves between remembered covenantal commands and judicial
    injunctions, so I used “commandments” in exhortation and “ordinances” where judgment
    is foregrounded.
- source_word: ܫܘܒ̈ܠܡܢܘܬܗ
  chosen: a vindication for me
  alternatives:
  - my defense
  - my justification
  lexicon: Payne Smith
  rationale: The line presents the letter as testimony on Baruch’s behalf before the
    one who sent him; “vindication” preserves that forensic sense.
- source_word: ܫܦܝܪ̈ܬܐ / excellence language in v.1
  chosen: what is good
  alternatives:
  - excellent things
  - what is fitting
  lexicon: Payne Smith
  rationale: The Syriac points to morally fitting or worthy things. I chose a simple
    English phrase that fits the paraenetic tone without sounding overly ornamental.
theological_decisions:
- issue: Divine title
  chosen_reading: The chapter keeps the title “the Mighty One.”
  alternative_readings:
  - God
  - the Lord
  rationale: The Syriac epistle repeatedly uses elevated titles with distinct rhetorical
    force; retaining the epithet preserves that texture.
- issue: Covenantal frame
  chosen_reading: Moses’ warning is rendered in covenantal-law language rather than
    generalized morality.
  alternative_readings:
  - instructional wisdom language
  - national custom language
  rationale: The chapter explicitly grounds exile and hope in fidelity to the law,
    so the translation keeps that theological link clear.
