theological_decisions:
- issue: Messianic title and royal disclosure in verse 7
  chosen_reading: The text is rendered 'the reign of my Messiah will be revealed.'
  alternative_readings:
  - the beginning of my Messiah will be revealed
  - the headship of my Messiah will be revealed
  rationale: The control witness supports a royal/headship sense rather than a mere
    temporal 'beginning.' 'My Messiah' is retained as the text's own designation without
    importing later Christian title-language like 'Christ.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Sequence of kingdoms culminating in divine-messianic intervention
  chosen_reading: The chapter is translated as a vision of successive kingdoms ending
    in the disclosure of God's Messiah, without identifying the kingdoms in the translation
    itself.
  alternative_readings:
  - A more interpretive rendering that names historical empires in the main text
  rationale: The Syriac presents the sequence symbolically. The translation should
    preserve that apocalyptic tension and not collapse the imagery into commentary.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
