translation:
  text: '1. And he answered and said to me, “But this is the interpretation of the
    vision that you saw.


    2. As for the great forest that you saw, with the lofty and rugged mountains surrounding
    it, this is the word:


    3. Behold, days are coming when this kingdom that once destroyed Zion will be
    destroyed, and it will be subjected to the one that comes after it.


    4. And that one too, after a time, will be destroyed, and another will arise,
    a third; and it too will rule in its time and will be destroyed.


    5. And after these a fourth kingdom will arise, whose power will be harsher and
    worse than those that were before it. It will rule for many times like the forests
    of the plain, and it will hold the times in its grasp and lift itself up more
    than the cedars of Lebanon.


    6. And security will be established in it, and all those who are stained with
    iniquity will flee to it, just as wild beasts and creeping things flee into the
    forest.


    7. And it will happen that, when the time of its completion draws near, then the
    reign of my Messiah will be revealed, he who is like the fountain and like the
    vine.


    8. And when he is revealed, he will uproot the multitude of its host. And as for
    the tall cedar that you saw left from that forest, and the words that the vine
    spoke with it which you heard—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verse 4 is weak in the Ceriani OCR, but the Kmosko Latin control clearly
      preserves the sense that a second kingdom is destroyed and then a third arises
      and rules for its time.
    reason: textual_variant
  - marker: b
    text: The Syriac line rendered 'security will be established in it' may also be
      taken more literally as 'truth' or 'firmness' will be established in it. The
      context of the lawless fleeing to that kingdom favors a stability/security nuance.
    reason: lexical_alternative
  - marker: c
    text: At verse 7 Ceriani's OCR looks like 'the beginning of my Messiah,' but the
      Kmosko Syriac control supports a term meaning headship or reign; this draft
      follows that control-backed reading.
    reason: textual_variant
  - marker: d
    text: The closing clause is a real chapter-edge problem. Ceriani breaks off after
      introducing the cedar and the vine's speech, and the fuller explanation continues
      in the next chapter's material.
    reason: textual_variant
lexical_decisions:
- source_word: ܥܒ̈ܐ
  chosen: forest
  alternatives:
  - woods
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The vision depends on a single large wooded mass contrasted with cedars
    and mountains. 'Forest' preserves the apocalyptic image better than the looser
    'woods.'
- source_word: ܡܠܟܘܬܐ
  chosen: kingdom
  alternatives:
  - dominion
  - realm
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The passage interprets the vision in terms of successive world powers.
    'Kingdom' is the most transparent English equivalent and keeps the political-historical
    force.
- source_word: ܫܪܪܐ
  chosen: security
  alternatives:
  - truth
  - stability
  - firmness
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The Syriac can denote truth or firmness. In this context of a harsh kingdom
    attracting the lawless, a sense like 'security' or 'stability' fits better than
    moral 'truth,' though the line remains somewhat difficult.
- source_word: ܪܝܫܝܬܗ / Kmosko control ܪܝܫܢܘܬܗ
  chosen: reign
  alternatives:
  - headship
  - principate
  - beginning
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: Ceriani's OCR here is unstable, but the Kmosko control points to a word
    meaning headship or principate. 'Reign' gives clear English while preserving the
    royal-messianic sense.
- source_word: ܡܒܘܥܐ
  chosen: fountain
  alternatives:
  - spring
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: Either gloss is possible, but 'fountain' pairs more solemnly with 'vine'
    and preserves the chapter's symbolic diction.
- source_word: ܓܦܬܐ / ܓܦܢ
  chosen: vine
  alternatives:
  - grapevine
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The imagery is symbolic rather than botanical. 'Vine' is the natural
    English biblical term and avoids over-specifying the image.
- source_word: ܬܫܬܥܒܕ
  chosen: will be subjected
  alternatives:
  - will be enslaved
  - will be brought under
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The verb marks the downfall of one kingdom under another. 'Will be subjected'
    is clear and politically forceful without over-narrowing the mode of subjugation.
- source_word: ܣܘܓܳܐܐ ܕܟܢܘܫܬܗ (control-backed)
  chosen: the multitude of its host
  alternatives:
  - the mass of its assembly
  - the multitude of its gathering
  lexicon: Payne Smith, Compendious Syriac Dictionary
  rationale: The phrase refers to the gathered force belonging to the final kingdom.
    'Host' preserves the corporate and hostile sense better than the more neutral
    'assembly.'
