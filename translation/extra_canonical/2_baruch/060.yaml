theological_decisions:
- issue: Israel sharing in the same dark-water corruption
  chosen_reading: The draft retains the force that Israel too became defiled in the
    period of the judges, despite divine signs.
  alternative_readings:
  - Israel merely stumbled temporarily
  - The line refers only to surrounding nations, not Israel itself
  rationale: The chapter's contrast requires that Israel's guilt be stated plainly.
    The Syriac tradition here does not soften covenantal failure simply because signs
    were present.
  doctrine_reference: 'Cartha project doctrine: preserve original-witness theological
    force without smoothing'
- issue: The sense of 'mysteries' in the Amorite clause
  chosen_reading: The term is rendered as secret cultic practices marked as wicked.
  alternative_readings:
  - A more neutral 'secrets'
  - A more explicit 'occult rites'
  rationale: The context already brands these practices as evil and unclean. 'Mysteries'
    keeps the lexical texture while the modifiers prevent a neutral or positive reading.
  doctrine_reference: 'Cartha project doctrine: preserve tension and avoid interpretive
    overreach'
