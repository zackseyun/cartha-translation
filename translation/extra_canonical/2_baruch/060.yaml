translation:
  text: '1. And the fifth black waters that you saw raining down—these are the works
    that the Amorites did, and the sorceries of their enchantments that they performed,
    and the wickedness of their mysteries, and the mingling of their uncleanness.


    2. But even Israel was defiled with sins in the days of the judges, while they
    were seeing many signs that were done by him who made them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The supplied Ceriani chapter bucket for chapter 60 remains structurally
      uncertain at this edge. This draft follows the control-backed chapter identification
      of the 'fifth black waters' section, especially from Kmosko page 598, rather
      than pretending the current page assignment is fully secure.
    reason: textual_variant
  - marker: b
    text: 'The chapter is very short in the chaptering tradition used here: two verses
      describing the Amorite corruption and Israel''s defilement in the days of the
      judges.'
    reason: cross_reference
lexical_decisions:
- source_word: ܡ̈ܝܐ ܐܘܟܡ̈ܐ / ܚܫ̈ܟܐ
  chosen: black waters
  alternatives:
  - dark waters
  lexicon: Payne Smith
  rationale: The recurring vision-symbol contrasts adverse and favorable eras. 'Black'
    preserves the sharp apocalyptic polarity more concretely than the softer 'dark.'
- source_word: ܥܡܘܪ̈ܝܐ
  chosen: the Amorites
  alternatives:
  - the Amorrhaei
  lexicon: Payne Smith
  rationale: The ethnic name should be translated in the familiar biblical English
    form rather than left in a Latinate shape from the control witness.
- source_word: ܚܪ̈ܫܐ / ܪܘܩܝ̈ܐ (control-backed sense)
  chosen: the spells of their enchantments
  alternatives:
  - their magical incantations
  - their sorceries
  lexicon: Payne Smith
  rationale: The line intensifies illicit ritual practice. 'Spells' plus 'enchantments'
    keeps the doubled force without flattening it into a single generic term.
- source_word: ܐܪ̈ܙܐ / ܪ̈ܐܙܐ (control-backed sense)
  chosen: their mysteries
  alternatives:
  - their secret rites
  - their hidden practices
  lexicon: Payne Smith
  rationale: The word points to secret cultic matters. 'Mysteries' preserves that
    ritual secrecy while the surrounding context makes clear that these are wicked,
    not sacred, rites.
- source_word: ܛܢܦܘܬܐ / ܛܢܦܐ (control-backed sense)
  chosen: uncleanness
  alternatives:
  - pollution
  - impurity
  lexicon: Payne Smith
  rationale: The chapter speaks in moral-cultic terms. 'Uncleanness' keeps both impurity
    language and covenantal offense in view.
- source_word: ܐܬܛܢܦ / ܐܬܚܒܠ (control-backed sense)
  chosen: was defiled with sins
  alternatives:
  - was polluted by sins
  - was corrupted by sins
  lexicon: Payne Smith
  rationale: The verb describes Israel as becoming contaminated, not merely committing
    isolated acts. 'Defiled' captures that covenantal and cultic contamination.
