lexical_decisions:
- source_word: ܥܒ̈ܐ
  chosen: forest
  alternatives:
  - wood
  - woodland
  lexicon: Payne Smith
  rationale: The image is a large, symbolic mass of trees rather than a single grove.
    'Forest' best preserves the apocalyptic scale.
- source_word: ܓܦܢ
  chosen: vine
  alternatives:
  - grapevine
  lexicon: Payne Smith
  rationale: The common biblical-symbolic sense is sufficient here. 'Vine' keeps the
    image concise and loaded without over-explaining it.
- source_word: ܡܒܘܥܐ
  chosen: fountain
  alternatives:
  - spring
  - wellspring
  lexicon: Payne Smith
  rationale: A source of flowing water is in view. 'Fountain' fits the elevated visionary
    register better than the plainer 'spring.'
- source_word: ܐܪܙܐ
  chosen: cedar
  alternatives:
  - cedar tree
  lexicon: Payne Smith
  rationale: The cedar is a stable symbolic tree-image in biblical and Syriac usage,
    so the simple noun should stand.
- source_word: ܒܫܠܡܐ / peaceful-coming imagery
  chosen: peacefully / in peace
  alternatives:
  - quietly
  - in tranquility
  lexicon: Payne Smith
  rationale: The vision contrasts the fountain's calm emergence with its later overwhelming
    force; keeping the peace-language preserves that tension.
