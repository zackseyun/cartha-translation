lexical_decisions:
- source_word: ܢܣܒܬ / ܢܣܒܘ
  chosen: received
  alternatives:
  - took
  - derived
  lexicon: Payne Smith
  rationale: The verb is kept broad and concrete. 'Received' preserves the image of
    drawing something from light or darkness without forcing a more interpretive paraphrase.
- source_word: ܢܘܗܪܐ
  chosen: light
  alternatives:
  - illumination
  lexicon: Payne Smith
  rationale: The chapter turns on a revelation-and-moral contrast; 'light' keeps the
    image direct and apocalyptic.
- source_word: ܚܫܘܟܐ ܕܐܕܡ
  chosen: Adam’s darkness
  alternatives:
  - the darkness of Adam
  lexicon: Payne Smith
  rationale: The genitive should remain personal and Adamic, not be flattened into
    a generic 'human darkness.'
- source_word: ܐܬܒܣܣܘ
  chosen: were established
  alternatives:
  - were grounded
  - rejoiced
  lexicon: Payne Smith
  rationale: A form of the root for founding or establishing best fits the visible
    Syriac. 'Rejoiced' is possible in some interpretive traditions, but 'were established'
    is more text-transparent here.
- source_word: ܢܘܗܪܐ ܕܡܘܫܐ
  chosen: the light of Moses
  alternatives:
  - Moses' light
  - the light mediated by Moses
  lexicon: Payne Smith
  rationale: The Syriac explicitly names Moses, so the translation keeps the personal
    reference rather than replacing it with 'law' or 'lamp.'
