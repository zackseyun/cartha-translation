theological_decisions:
- issue: Adam-darkness and Moses-light contrast
  chosen_reading: The verse contrasts darkness inherited in Adam with revelatory light
    associated with Moses.
  alternative_readings:
  - The contrast could be read more generally as ignorance versus instruction without
    strong representative force.
  rationale: The named figures Adam and Moses are preserved because the text frames
    moral and revelatory history through them.
- issue: Nature of Moses’ role
  chosen_reading: Moses is presented as a bearer of received light rather than an
    independent source of it.
  alternative_readings:
  - The verse could be read as emphasizing only Moses' exemplary knowledge.
  rationale: Using 'received from the light' preserves derivative revelation and avoids
    overstating Moses’ status.
