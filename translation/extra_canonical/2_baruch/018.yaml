translation:
  text: And I answered and said, “He was one who received from the light, so that
    he might know by it. But the many who exist received from Adam’s darkness, and
    were not established in the light of Moses.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This chapter bucket overlaps adjacent material, and the transition into
      chapter 19 is still medium-confidence. The middle clause of verse 18 is also
      OCR-noisy, so the wording is intentionally cautious.
