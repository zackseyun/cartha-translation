translation:
  text: '1 And I answered and said to him, “After this, that time is divided into twelve parts, and each one of them is known for what has been appointed in it. 2 In the first part: the beginning of upheavals. 3 In the second part: the slaying of the great ones. 4 In the third part: the fall of many. 5 In the fourth part: the sending forth of the sword. 6 In the fifth part: famine. 7 In the sixth part: earthquakes. 8 In the seventh part: terrors and plagues. 9 In the eighth part: assaults of spirits, and of demons of apparitions. 10 In the ninth part: the fall of fire. 11 In the tenth part: plunder and much oppression.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The numeral in the present Ceriani/OCR bucket is unstable, but the context clearly proceeds by numbered parts and is best read here as twelve.
    reason: textual_variant
  - marker: b
    text: The line for the fourth part is partially disturbed in this page-edge slice; the rendering follows the clearest recoverable sense, 'the sending forth of the sword.'
    reason: textual_variant
  - marker: c
    text: This chapter bucket appears to stop on the tenth part; the traditional continuation of chapter 27 likely runs onto the adjoining page and should be checked before final publication.
    reason: alternative_reading
  - marker: d
    text: Or 'is kept'.
    reason: previous_rendering
  - marker: e
    text: Or 'and of demons, and of apparitions'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܡܢܝܢ ... ܙܒܢܝ̈ܢ
  chosen: is divided into twelve parts
  alternatives:
  - is numbered in twelve times
  - consists of twelve periods
  lexicon: Payne Smith
  rationale: The visible OCR in this bucket is unstable at the numeral, but the immediate sequence of numbered parts and the control tradition make 'twelve parts' the most responsible rendering.
- source_word: ܡܬܬܝܕܥܐ
  chosen: is kept
  alternatives:
  - is reserved
  - is made known
  lexicon: Smith
  rationale: In context the sense is not mere disclosure but assignment or reservation for an appointed function; 'is kept' preserves that without overloading the line.
- source_word: ܙ̈ܘܥܐ
  chosen: upheavals
  alternatives:
  - commotions
  - tumults
  - earthquakes
  lexicon: Payne Smith
  rationale: The first occurrence seems broader than the later explicit earthquake term, so 'upheavals' avoids collapsing the distinction.
- source_word: ܪ̈ܘܪܒܢܐ
  chosen: the great ones
  alternatives:
  - the mighty
  - the nobles
  lexicon: Payne Smith
  rationale: The Syriac points to socially or politically prominent persons; 'the great ones' keeps the expression broad and apocalyptic.
- source_word: ܫܕܪܘܬܐ ܕܚܪܒܐ
  chosen: the sending forth of the sword
  alternatives:
  - the sending of the sword
  - the dispatch of the sword
  lexicon: Smith
  rationale: This preserves the active, commissioned feel of the Syriac image instead of flattening it into generic warfare.
- source_word: ܬܗܪ̈ܐ
  chosen: terrors
  alternatives:
  - horrors
  - portents
  - amazements
  lexicon: Payne Smith
  rationale: The noun likely denotes dreadful astonishments or terrors; 'terrors' best suits the sequence with plagues.
- source_word: ܡܚܘ̈ܬܐ
  chosen: plagues
  alternatives:
  - blows
  - scourges
  - afflictions
  lexicon: Payne Smith
  rationale: '''Plagues'' gives the collective calamity sense in idiomatic English while retaining judgment language.'
- source_word: ܫܘ̈ܕܐ ܕܢܦܫ̈ܬܐ
  chosen: assaults of spirits
  alternatives:
  - stirrings of spirits
  - attacks of souls
  - specters of spirits
  lexicon: Smith
  rationale: The phrase is difficult, but the chapter's apocalyptic catalog favors hostile spiritual activity rather than a neutral appearance.
- source_word: ܫ̈ܐܕܐ
  chosen: demons
  alternatives:
  - shedim
  - evil spirits
  lexicon: Payne Smith
  rationale: The Syriac term clearly denotes demonic beings; 'demons' is the most transparent English equivalent.
- source_word: ܦܪ̈ܨܘܦܐ
  chosen: apparitions
  alternatives:
  - forms
  - faces
  - phantoms
  lexicon: Smith
  rationale: Literally the word can mean faces or forms, but in this ominous list 'apparitions' best captures visible uncanny manifestations.
- source_word: ܚܛܘܦܝܐ
  chosen: plunder
  alternatives:
  - rapine
  - seizure
  - robbery
  lexicon: Payne Smith
  rationale: The term denotes violent taking; 'plunder' is vivid but still natural English.
- source_word: ܐܢܘܣܝܐ
  chosen: oppression
  alternatives:
  - violence
  - compulsion
  - constraint
  lexicon: Smith
  rationale: The paired sense is coercive social suffering; 'oppression' fits the prophetic register and pairs well with 'plunder'.
