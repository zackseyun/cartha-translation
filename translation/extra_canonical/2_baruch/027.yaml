  to: and of demons of apparitions
  rationale: 'The draft adds a conjunction (''and'') before ''of apparitions'' that is absent in the Syriac. The text reads ܘܕܫ̈ܐܕܐ ܕܦܪ̈ܨܘܦܐ (and of demons of faces/apparitions), placing ''apparitions'' in a construct relationship with ''demons,'' not as a separate third item in the list. | Adjudicator: The reviewer correctly identifies that the Syriac text reads ܘܕܫ̈ܐܕܐ ܕܦܪ̈ܨܘܦܐ (w-d-šēdē d-parṣōpē), which places ''apparitions'' (literally ''faces/persons'') in a construct relationship with ''demons'' rat'
