lexical_decisions:
- source_word: phrase reflected in Kmosko Latin aquae lucidae, set over against the dark waters
  chosen: bright waters
  alternatives:
  - clear waters
  - radiant waters
  lexicon: Payne Smith
  rationale: The contrast is not merely about clarity but about luminous eschatological reversal after the dark sequence. 'Bright waters' keeps the symbolic force without overpoetic expansion.
- source_word: ܡܫܝܚܝ / possessive messianic title reflected in tempus Messiae mei
  chosen: my Messiah
  alternatives:
  - my Anointed One
  lexicon: Payne Smith
  rationale: The possessive should be retained because it is theologically marked in the divine speech. 'Messiah' is preferable here because the apocalyptic context is explicit and traditional.
- source_word: verb reflected in advocabit omnes gentes
  chosen: will summon all the nations
  alternatives:
  - will call together all the nations
  - will gather all the nations
  lexicon: Payne Smith
  rationale: '''Summon'' preserves royal-judicial force better than the softer ''gather.'''
- source_word: verb pair reflected in quasdam earum vivificabit ... quasdam earum interficiet
  chosen: will spare alive ... will put to death
  alternatives:
  - will preserve alive ... will kill
  - will let live ... will destroy
  lexicon: Payne Smith
  rationale: In this judgment setting, the contrast is forensic and distributive. 'Spare alive' conveys survival through judgment better than the potentially misleading 'make alive.'
- source_word: ܙܪܥܗ ܕܝܥܩܘܒ / reflected in semen Iacob
  chosen: the seed of Jacob
  alternatives:
  - the offspring of Jacob
  - the descendants of Jacob
  lexicon: Payne Smith
  rationale: The covenantal phrase should remain traditional and concrete; 'seed' preserves the biblical-apocalyptic register.
- source_word: verb reflected in subiicientur ... populo tuo
  chosen: shall be subjected ... to your people
  alternatives:
  - shall be brought into subjection to your people
  - shall submit to your people
  lexicon: Payne Smith
  rationale: The line speaks of real subordination in the messianic judgment of nations, not merely willing allegiance.
theological_decisions:
- issue: Whether to render the messianic title explicitly
  chosen_reading: my Messiah
  alternative_readings:
  - my Anointed One
  rationale: The chapter belongs to an overtly eschatological judgment scene, and the possessive title is important. Rendering it as 'Messiah' best preserves the recognized apocalyptic sense without flattening it into a generic royal label.
  doctrine_reference: Retain explicit messianic language where the witness warrants it.
- issue: How to construe the nations who 'live'
  chosen_reading: they are spared alive through the Messiah's judgment
  alternative_readings:
  - they are spiritually vivified
  - they receive eternal salvation
  rationale: The immediate contrast is with nations put to death. The text speaks first of survival through eschatological judgment, not necessarily of a fuller soteriological claim.
  doctrine_reference: Do not overextend judgment-survival language into doctrines the passage does not explicitly state.
- issue: Whether 'Israel' and 'the seed of Jacob' should be merged or generalized
  chosen_reading: keep both designations distinct and literal
  alternative_readings:
  - Israel, that is, Jacob's descendants
  - God's people
  rationale: The paired expressions intensify covenant identity and should not be collapsed into a smoother but less precise abstraction.
  doctrine_reference: Preserve covenantal and ethnic-historical designations when the source maintains them.
