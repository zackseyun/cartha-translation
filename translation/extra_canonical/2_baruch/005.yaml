translation:
  text: '1 And I said, “And I said, “So then, I have hoped in vain, and in vain was Zion built. For if those who hate us have taken possession of her, what will you do for your great name?””


    2 And the Lord said to me, “My name and my glory endure forever; but my judgment keeps its own right in its time.


    3 And you will see with your eyes that it is not the enemies who overthrow Zion, nor burn Jerusalem, but that they are serving judgment for a time.


    4 But you, go and do whatever I have told you.”


    5 And I went and took Jeremiah and Addo and Seraiah and Jabish and Gedaliah and all the honorable men of the people, and I brought them to the valley of Kidron, and I told them everything that had been said to me.


    6 And they lifted up their voices, and they all wept. And we sat there and fasted until evening.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verse 1 is the least secure part of this chapter in the current Ceriani bucket. The page edge is textually rough, so the English is intentionally cautious; the closing question, “what will you do for your great name?”, is supported by the Kmosko control witness.
    reason: textual_variant
  - marker: b
    text: “Serving judgment for a time” means the invaders act as temporary instruments of God's sentence, not as final masters of Zion.
    reason: cross_reference
  - marker: c
    text: The valley name appears in older scholarship as Cedron; Kidron is the conventional English form.
    reason: cultural_note
  - marker: d
    text: Or 'But now, after you built and established her, I had hoped that I would again live in Zion, that her renown would be heard among the nations, and that my soul might rejoice and be gladdened. But now those whom you loved and on whom you had compassion have been given over to the place of their humiliation, to be mocked before them. And what will you do for your great name?'.
    reason: previous_rendering
  - marker: e
    text: Or 'nor those who burn Jerusalem'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܡܫܬܠܡܐ
  chosen: given over / delivered up
  alternatives:
  - completed
