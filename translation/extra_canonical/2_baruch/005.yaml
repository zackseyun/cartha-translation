theological_decisions:
- issue: The status of Zion/Jerusalem in the chapter
  chosen_reading: The destroyed earthly city is distinguished from the divinely prepared reality spoken of just before this chapter; chapter 5 continues that logic without collapsing them.
  alternative_readings:
  - The passage refers only to the earthly city
  - The passage identifies the present city straightforwardly with the eternal one
  rationale: The immediate context in ch. 4 speaks of a city prepared beforehand and only later revealed. Chapter 5 therefore treats Jerusalem's fall within that broader heavenly-preparatory frame.
- issue: Agency in Jerusalem's destruction
  chosen_reading: The enemy armies are instruments of divine judgment, not ultimate possessors of power over Zion.
  alternative_readings:
  - The enemies independently destroy Zion
  - The text denies any real enemy action at all
  rationale: 'Verse 3 explicitly redirects causation: the enemies do burn and overthrow in history, yet they do so as servants of a prior divine judgment.'
