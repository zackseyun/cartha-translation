  lexicon: Payne Smith
  rationale: In context the city is not being 'completed' but handed over to destruction/judgment.
- source_word: ܡܬܬܢܫܐ
  chosen: be forgotten
  alternatives:
  - be abandoned
  - be neglected
  lexicon: Payne Smith
  rationale: The line contrasts temporal devastation with God's enduring purpose for the world/order; 'forgotten' preserves the idiom without overstating metaphysics.
- source_word: ܙܕܩܗ
  chosen: its own right
  alternatives:
  - its justice
  - its righteousness
  lexicon: Payne Smith
  rationale: Here the sense is juridical claim/right preserved by divine judgment, not merely abstract moral righteousness.
- source_word: ܡ̇ܫܡܫܝܢ ܒܙܒܢܐ
  chosen: serving judgment for a time
  alternatives:
  - ministering to the sentence for a season
  - serving the judgment temporarily
  lexicon: Payne Smith
  rationale: 'This keeps the instrumental sense: the invaders function as servants of God''s judgment rather than independent sovereign actors.'
- source_word: ܩܕܪܘܢ / Cedron-Kidron tradition
  chosen: Kidron
  alternatives:
  - Cedron
  lexicon: proper name
  rationale: Kidron is the standard English biblical form, though older witnesses often reflect Cedron.
