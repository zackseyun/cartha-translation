lexical_decisions:
- source_word: ܢܘܓܪܗ / ܩܘܝܡܐ ܕܥܠܡܐ
  chosen: the beginning of the world
  alternatives:
  - the ordering of the world
  - the foundation of the world
  - the course of the world
  lexicon: Payne Smith
  rationale: Ceriani appears unstable here, while Kmosko supports a sense of primordial beginning/origin rather than later historical course.
- source_word: ܡܥܒܪܢܘܬܐ / ܚܛܗܐ
  chosen: transgression
  alternatives:
  - sin
  - overstepping
  lexicon: Payne Smith
  rationale: The paired wording points to Adam's primal act as a boundary-crossing offense, not merely a generic moral failure.
- source_word: ܐܬܬܙܝܥ ܡܘܬܐ
  chosen: death ... was stirred up
  alternatives:
  - death was awakened
  - death was set in motion
  lexicon: Payne Smith
  rationale: The verb suggests activation or arousal, preserving the apocalyptic rhetoric of death entering active operation.
- source_word: ܪܘܪܒܘܬܐ ܫܪܝܬ ܕܬܡܘܟ
  chosen: greatness began to be brought low
  alternatives:
  - majesty began to be humbled
  - human greatness began to sink
  lexicon: Payne Smith
  rationale: This keeps the downward-motion imagery and preserves the chapter's anthropology of post-Adamic diminishment.
- source_word: ܢܘܡܫܐ ܕܐܢܫܘܬܐ
  chosen: the measure of humanity
  alternatives:
  - the rule of humanity
  - the norm of mankind
  lexicon: Payne Smith
  rationale: The phrase seems evaluative and judicial in context; 'measure' fits the parallel with time being examined and strength tested.
- source_word: ܡܚܝܒܢܘܗܝ
  chosen: he made himself liable
  alternatives:
  - he made himself guilty
  - he indebted himself
  lexicon: Payne Smith
  rationale: The sense of incurred liability fits the judicial-theological context and avoids reducing the phrase to mere feeling of guilt.
- source_word: ܐܣܛܘܟܣܐ
  chosen: the elements
  alternatives:
  - elemental powers
  - rudiments
  lexicon: Greek loanword / Payne Smith
  rationale: The Syriac reflects Greek stoicheia; 'elements' is the most transparent rendering, with cosmological resonance left intact.
theological_decisions:
- issue: Adam's role in the first black waters
  chosen_reading: Adam's act is rendered as the archetypal transgression that initiates untimely death and the fallen human condition.
  alternative_readings:
  - Adam's act as merely representative of general human sin
  - Adam's act as exclusively juridical without cosmological consequence
  rationale: The passage lists cosmic and human consequences flowing from Adam's act; the imagery is wider than individual guilt alone.
- issue: Extent of Adam's culpability in the later paragraph
  chosen_reading: The draft preserves the text's strong claim that Adam 'made himself liable' and in some sense 'implicated the angels,' without softening the statement.
  alternative_readings:
  - He only harmed himself
  - The angelic reference should be paraphrased away as obscure
  rationale: The Syriac is bold and somewhat difficult, but the translation should expose rather than flatten that theological tension.
