  from: 'Hear now about the great cloud that you saw ascending from the sea and going to cover this earth: it is the beginning of the world, which the Mighty One made when he planned to make creation. And when the word went out from before him, the beginning of the world stood forth, small at first, and it was established according to what was sought for it to become.


    And the first black waters that you saw descending from the cloud—this is the transgression that Adam, the first man, committed. For when he sinned, death that was not in its time was stirred up, and mourning was made known, and sorrows were prepared, and pain was created, and toil was completed, and greatness began to be brought low.


    And concerning the last age, which was shown in that form and took its likeness, know that the time will be examined, and the measure of humanity will be measured, and its strength will be tested. Therefore, because Adam heard from God something of what was to be, and reflected on the release of the dead that had been given, and on what had been commanded him by God, he kept turning it over in his mind, and he devised five thoughts. For he made himself liable, and he also made the angels liable. And at the time when he was created there was shown to him a vision: the bitter life, and the elements together with fire. Thus God gathered these beforehand in the likeness of those who were created.'
  to: 'For you saw a great cloud that ascended from the sea and went and covered this earth. This is the world that the Mighty One made when he planned to make creation. And it happened that, when the word went out from before him, the foundation of the world stood, small and beautiful, and was established as it was destined to be.


    And the black waters that you saw first, which descended upon it from the cloud—this is the transgression that the first Adam committed at first. For when he sinned, death was stirred up, though it was not its time, and grief was made known, and pains were prepared, and suffering was created, and toil was accomplished, and greatness began to be brought low.


    And the last time, which was shown in the form and likeness, know that the time will be inquired into, and the measure of humanity will be anointed, and its strength will be tested. Therefore, because Adam, while he was, heard from God something of what was to be, and understood the release of the dead that was to be given, and what had been commanded him by God, he considered it, and he devised five thoughts. For he made himself guilty, and he also made the angels guilty. And also at that time when he was created, there was shown to him a vision of the bitter life and of the elements with fire. Thus God gathered in Eden, in the likeness of those that were created.'
  rationale: 'Revised for closer alignment to the Syriac: removed interpretive ''Hear now'' and ''beginning of the world,'' rendering the repeated world/foundation language more literally; preserved sequence and completeness; adjusted several clauses for lexical accuracy (''grief,'' ''suffering,'' ''guilty,'' ''inquired into''); and restored the final reference to Eden. Kept some difficult phrases formally where the Syriac is obscure.'
