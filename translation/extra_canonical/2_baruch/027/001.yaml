translation:
  text: 'And I answered and said to him, “After this, that time is divided into twelve parts, and each one of them is known for what has been appointed in it. In the first part: the beginning of upheavals. In the second part: the slaying of the great ones. In the third part: the fall of many. In the fourth part: the sending forth of the sword. In the fifth part: famine. In the sixth part: earthquakes. In the seventh part: terrors and plagues. In the eighth part: assaults of spirits and of demons of apparitions. In the ninth part: the fall of fire. In the tenth part: plundering and much oppression.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assaults of spirits and demons of apparitions'.
    reason: previous_rendering
status: revised
lexical_decisions:
- source_word: ܡܢܝܢ ... ܙܒܢܝ̈ܢ
  chosen: is divided into twelve parts
  alternatives:
  - is numbered in twelve times
  - consists of twelve periods
  lexicon: Payne Smith
  rationale: The visible OCR in this bucket is unstable at the numeral, but the immediate sequence of numbered parts and the control tradition make 'twelve parts' the most responsible rendering.
- source_word: ܡܬܬܝܕܥܐ
  chosen: is known
  alternatives:
  - is reserved
  - is made known
  lexicon: Smith
  rationale: In context the sense is not mere disclosure but assignment or reservation for an appointed function; 'is known' preserves that without overloading the line.
- source_word: ܙ̈ܘܥܐ
  chosen: upheavals
  alternatives:
  - commotions
  - tumults
  - earthquakes
  lexicon: Payne Smith
  rationale: The first occurrence seems broader than the later explicit earthquake term, so 'upheavals' avoids collapsing the distinction.
- source_word: ܪ̈ܘܪܒܢܐ
  chosen: the great ones
  alternatives:
  - the mighty
  - the nobles
  lexicon: Payne Smith
  rationale: The Syriac points to socially or politically prominent persons; 'the great ones' keeps the expression broad and apocalyptic.
- source_word: ܫܕܪܘܬܐ ܕܚܪܒܐ
  chosen: the sending forth of the sword
  alternatives:
  - the sending of the sword
  - the dispatch of the sword
  lexicon: Smith
  rationale: This preserves the active, commissioned feel of the Syriac image instead of flattening it into generic warfare.
- source_word: ܬܗܪ̈ܐ
  chosen: terrors
  alternatives:
  - horrors
  - portents
  - amazements
  lexicon: Payne Smith
  rationale: The noun likely denotes dreadful astonishments or terrors; 'terrors' best suits the sequence with plagues.
- source_word: ܡܚܘ̈ܬܐ
  chosen: plagues
  alternatives:
  - blows
  - scourges
  - afflictions
  lexicon: Payne Smith
  rationale: '''Plagues'' gives the collective calamity sense in idiomatic English while retaining judgment language.'
- source_word: ܫܘ̈ܕܐ ܕܢܦܫ̈ܬܐ
  chosen: assaults of spirits
  alternatives:
  - stirrings of spirits
  - attacks of souls
  - specters of spirits
  lexicon: Smith
  rationale: The phrase is difficult, but the chapter's apocalyptic catalog favors hostile spiritual activity rather than a neutral appearance.
- source_word: ܫ̈ܐܕܐ
  chosen: demons
  alternatives:
  - shedim
  - evil spirits
  lexicon: Payne Smith
  rationale: The Syriac term clearly denotes demonic beings; 'demons' is the most transparent English equivalent.
- source_word: ܦܪ̈ܨܘܦܐ
  chosen: apparitions
  alternatives:
  - forms
  - faces
  - phantoms
  lexicon: Smith
  rationale: Literally the word can mean faces or forms, but in this ominous list 'apparitions' best captures visible uncanny manifestations.
- source_word: ܚܛܘܦܝܐ
  chosen: plunder
  alternatives:
  - rapine
  - seizure
  - robbery
  lexicon: Payne Smith
  rationale: The term denotes violent taking; 'plunder' is vivid but still natural English.
- source_word: ܐܢܘܣܝܐ
  chosen: oppression
  alternatives:
  - violence
  - compulsion
  - constraint
  lexicon: Smith
  rationale: The paired sense is coercive social suffering; 'oppression' fits the prophetic register and pairs well with 'plunder'.
theological_decisions:
- issue: Numerical scheme of the woes
  chosen_reading: twelve parts
  alternative_readings:
  - thirty times/periods as the present OCR seems to suggest
  rationale: The Ceriani bucket's numeral is unstable, but the ensuing ordered list and the broader witness tradition strongly support a twelve-part schema.
- issue: Supernatural beings in the eighth part
  chosen_reading: demons and apparitions retained as real apocalyptic entities in the vision's rhetoric
  alternative_readings:
  - purely psychological terrors
  - generalized disasters without spiritual reference
  rationale: The Syriac explicitly names demonic beings and related manifestations, so the translation preserves that supernatural texture instead of naturalizing it.
