translation:
  text: '1 And I, Baruch, went from there and came to the people. And I called my
    firstborn, and the mighty ones of the people, and the elders, and I said to them,

    2 “Hear, O Israel, behold, I am going the way of all the earth; but do not withdraw
    from the statutes of the Mighty One.

    3 But remember and admonish the people who remain, lest they withdraw from the
    commandments of the Mighty One.”'
  philosophy: optimal-equivalence
