lexical_decisions:
- source_word: ܒܘܟܪܝ
  chosen: the leading ones
  alternatives:
  - the firstborn
  - the foremost men
  lexicon: Payne Smith
  rationale: The form normally points to “firstborn,” but in this civic gathering
    context it likely refers to foremost or leading persons. Because the line is textually
    uncertain, I chose a restrained social rendering rather than importing proper
    names from secondary translations.
- source_word: ܡܟܝܟܐ
  chosen: the lowly
  alternatives:
  - the humble
  - the lesser
  lexicon: Payne Smith
  rationale: The word marks social lowliness or humility. “The lowly” preserves that
    register and balances the preceding references to prominent elders.
- source_word: ܢ̇ܛܪܘ
  chosen: keep watch over
  alternatives:
  - guard
  - keep
  lexicon: Payne Smith
  rationale: The imperative is stronger than simple observance; it calls for active
    guarding of the remnant community.
- source_word: ܥܡܐ ܕܐܫܬܚܪ
  chosen: the people who remain
  alternatives:
  - the remnant people
  - the people left behind
  lexicon: Payne Smith
  rationale: This keeps the remnant idea explicit without overloading the phrase with
    later theological terminology.
- source_word: ܦܘܩ̈ܕܢܘܗܝ ܕܐܠܗܐ
  chosen: the commandments of God
  alternatives:
  - God’s commands
  - the ordinances of God
  lexicon: Payne Smith
  rationale: A direct rendering fits the Syriac and preserves the covenantal force
    of Baruch’s exhortation.
theological_decisions:
- issue: Remnant theology in Baruch’s charge
  chosen_reading: the people who remain
  alternative_readings:
  - the remnant
  - those left
  rationale: The Syriac naturally describes those left after judgment. I kept the
    phrase transparent rather than turning it into a more technical label, while still
    preserving the remnant theme.
- issue: Norm for communal fidelity
  chosen_reading: the commandments of God
  alternative_readings:
  - the law
  - God’s ordinances
  rationale: The present line speaks of divine commandments specifically, so I did
    not broaden it to a generalized moral order or replace it with Torah-language
    not explicit in this clause.
