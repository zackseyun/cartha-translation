  from: unless he takes from it fruit for nourishment, does not the one who planted it expect to take fruit from it?
  to: unless it produces fruit in its season, can the one who planted it expect to receive fruit from it?
  rationale: The draft's logic is contradictory ('unless he takes fruit... does he expect to take fruit?'). The context of 2 Baruch 22 emphasizes processes reaching their appointed time (like a house being finished or a woman giving birth). The Syriac refers to the vineyard producing fruit in its season/time, not the planter taking fruit for nourishment.
