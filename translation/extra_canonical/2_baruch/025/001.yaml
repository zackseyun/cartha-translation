translation:
  text: '1 Then he answered me and said, “You too shall be spared until that time,
    until the sign that the Most High will perform for the inhabitants of the earth
    at the end of the days.


    2 And this will be the sign:


    3 bewilderment will seize the inhabitants of the earth, and they will fall into
    many afflictions; then again into great anguish.


    4 And when, because of the abundance of their distress, they say in their thoughts,
    ‘The Mighty One no longer remembers the earth,’ and they have given up hope, then
    the time will awaken.”'
  philosophy: optimal-equivalence
