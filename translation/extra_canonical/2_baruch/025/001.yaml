lexical_decisions:
- source_word: ܬܘܩܢܐ
  chosen: sign
  alternatives:
  - ordering
  - fixed arrangement
  - appointed token
  lexicon: Payne Smith
  rationale: The chapter turns on an identifying end-time marker. 'Sign' communicates
    the apocalyptic function most clearly, while the footnote can acknowledge that
    the underlying wording may also carry the sense of an ordered or appointed arrangement.
- source_word: ܙܘ̈ܥܐ / sense reflected in the seizure of the earth's inhabitants
  chosen: bewilderment
  alternatives:
  - stupor
  - terror
  - confusion
  lexicon: Payne Smith
  rationale: The context is not mere fear but an overpowering state that seizes people
    before the final woes intensify. 'Bewilderment' preserves that destabilizing force
    without sounding flat.
- source_word: ܐܘܠܨܢܐ / cognate distress language in the control sense
  chosen: afflictions
  alternatives:
  - tribulations
  - distresses
  - oppressions
  lexicon: Payne Smith
  rationale: The passage describes mounting end-time pressures. 'Afflictions' keeps
    the suffering concrete and weighty while remaining readable in English.
- source_word: ܡܪܝܡܢܐ / divine title sense reflected in the complaint
  chosen: the Mighty One
  alternatives:
  - the Strong One
  - the Mighty God
  lexicon: Payne Smith
  rationale: The complaint is rhetorically sharp and should retain its elevated divine
    title. 'The Mighty One' preserves the solemn apocalyptic register without over-expansion.
- source_word: ܡܬܕܟܪ
  chosen: remembers
  alternatives:
  - takes notice of
  - has regard for
  lexicon: Payne Smith
  rationale: The line voices human despair in terms of divine remembrance. 'Remembers'
    keeps the biblical idiom and its covenantal resonance.
- source_word: ܥܪ / awakening imagery in the closing clause
  chosen: will awaken
  alternatives:
  - will stir itself
  - will rouse itself
  lexicon: Payne Smith
  rationale: The text personifies the appointed time as dormant and then suddenly
    active. 'Will awaken' preserves the vivid apocalyptic image.
theological_decisions:
- issue: Whether to soften the despairing claim about God and the earth
  chosen_reading: Retained the complaint as 'The Mighty One no longer remembers the
    earth.'
  alternative_readings:
  - The Mighty One no longer cares for the earth
  - God no longer visits the earth
  rationale: The chapter gives voice to end-time human desperation. Softening the
    line would mute the force of the lament and the dramatic contrast before divine
    intervention.
