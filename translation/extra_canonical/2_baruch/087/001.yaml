lexical_decisions:
- source_word: ܒܒܥܘܬܝ
  chosen: in my prayer also
  alternatives:
  - in my petition also
  - and in my supplication
  lexicon: Payne Smith
  rationale: The noun can mean prayer, petition, or supplication. “Prayer” is the
    broadest natural English choice here, while “also” preserves the continuing link
    with the preceding remembrance formula.
- source_word: ܝܠܦܬܘܢ
  chosen: you also should learn
  alternatives:
  - you also learn
  - you also should be instructed
  lexicon: Payne Smith
  rationale: The verb carries a sense of learning or receiving instruction. The English
    uses an exhortatory force because the line continues the paraenetic tone of the
    epistle’s closing.
- source_word: ܡܢܗܘܢ
  chosen: from them
  alternatives:
  - by them
  - from these things
  lexicon: Payne Smith
  rationale: The pronominal reference is not fully explicit on this overlap page.
    “From them” keeps the Syriac transparent and allows the antecedent to remain the
    preceding words or contents of the letter.
- source_word: ܦܘ̈ܩܕܢܐ
  chosen: the commandments
  alternatives:
  - the precepts
  - the instructions
  lexicon: Payne Smith
  rationale: The term naturally denotes commands or authoritative precepts. “Commandments”
    preserves the covenantal and exhortatory register of the letter.
theological_decisions:
- issue: Whether to specify the force of Baruch’s remembrance as formal intercession
  chosen_reading: The line is rendered as Baruch’s continuing remembrance of the audience
    in prayer without expanding it into a fuller doctrine of intercession.
  alternative_readings:
  - A stronger intercessory reading
  - A merely memorial reading with no prayer emphasis
  rationale: The Syriac explicitly mentions prayer, but the overlap with the preceding
    chapter and the brevity of the clause do not justify a more developed theological
    paraphrase.
