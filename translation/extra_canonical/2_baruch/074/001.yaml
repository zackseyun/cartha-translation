lexical_decisions:
- source_word: messores / probable Syriac harvesters-reapers term at this chapter
    boundary
  chosen: the reapers
  alternatives:
  - the harvesters
  lexicon: Payne Smith
  rationale: “Reapers” keeps the concrete agrarian image and matches the eschatological
    abundance setting without broadening the picture into generic agricultural labor.
- source_word: aedificantes / probable Syriac builders term
  chosen: the builders
  alternatives:
  - those who build
  - the workmen
  lexicon: Payne Smith
  rationale: “Builders” is direct and preserves the paired image of fieldwork and
    construction.
- source_word: non fatigabuntur ... neque laborabunt
  chosen: will not grow weary ... will not labor
  alternatives:
  - will not be tired ... will not toil
  - will not be wearied ... will not work hard
  lexicon: Payne Smith
  rationale: The paired verbs are kept distinct so the line retains its rhythmic balance
    rather than collapsing both into one English idea.
- source_word: sponte erunt currentia opera
  chosen: the works will move forward of themselves
  alternatives:
  - the works will run on by themselves
  - the tasks will proceed on their own
  lexicon: Payne Smith
  rationale: This preserves the wonder of effortless completion while avoiding an
    over-mechanized English idiom.
- source_word: tranquillitate multa
  chosen: in much tranquility
  alternatives:
  - in great peace
  - with abundant quietness
  lexicon: Payne Smith
  rationale: “Tranquility” matches the calm, restorative atmosphere already emphasized
    in the surrounding vision.
theological_decisions:
- issue: How strongly to render the effortless character of labor in the messianic
    age
  chosen_reading: the works will move forward of themselves
  alternative_readings:
  - their work will be easy
  - their work will prosper
  rationale: The control witness points to more than mere success; it portrays creation
    ordered into unusually peaceful fruitfulness. The English should preserve that
    heightened apocalyptic image without overstating automation.
  doctrine_reference: Retain apocalyptic restoration imagery where the witness warrants
    it.
- issue: How to render the closing atmosphere term
  chosen_reading: in much tranquility
  alternative_readings:
  - in great peace
  - in deep rest
  rationale: The passage is not only about productivity but about restored order.
    “Tranquility” keeps the moral and cosmic calm implied by the surrounding context.
  doctrine_reference: Do not flatten eschatological peace into merely efficient labor.
