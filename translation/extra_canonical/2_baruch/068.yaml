lexical_decisions:
- source_word: ܝܘܬܪܢܐ ܕܥܠܡ
  chosen: an eternal reward
  alternatives:
  - everlasting recompense
  - reward of the age
  lexicon: Payne Smith
  rationale: The phrase points to enduring recompense rather than a temporary advantage.
    'Eternal reward' best matches the apocalyptic horizon and aligns with the control
    witness without overexpanding the line.
- source_word: ܚܝܠܬܢܐ
  chosen: the Mighty One
  alternatives:
  - the Strong One
  - the Almighty
  lexicon: Payne Smith
  rationale: This is a reverential divine title. 'The Mighty One' preserves the title-like
    force and matches established usage in this work better than the more theologically
    loaded 'the Almighty.'
- source_word: ܬܫܒܘܚܬܐ ܡܩܘܝܬܐ
  chosen: enduring ... glories
  alternatives:
  - abiding glories
  - established glories
  lexicon: Payne Smith
  rationale: The sense is of glories made ready and lasting, not a fleeting honor.
    'Enduring' keeps the permanence clear in idiomatic English.
- source_word: ܡ̈ܝܐ ܢܗܝܪ̈ܐ (control-backed sense)
  chosen: bright waters
  alternatives:
  - clear waters
  - luminous waters
  lexicon: Payne Smith
  rationale: The contrast in the vision is symbolic as well as visual. 'Bright' preserves
    the opposition to the dark waters without sounding overly technical or poetic.
