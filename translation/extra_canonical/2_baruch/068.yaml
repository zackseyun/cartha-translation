translation:
  text: '5. [...with all his soul.] And he was steadfast in his days at every time,
    so that he did not leave anyone uncircumcised, nor anyone practicing impiety in
    the land, all the days of his life.[a]


    6. This is he who will receive an eternal reward, and he will be glorified before
    the Mighty One more than many in the last time.


    7. For his sake, and for the sake of those who are like him, enduring and most
    precious glories were created and prepared beforehand—those which were told to
    you before.


    8. These are the bright waters that you saw.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ceriani chapter bucket begins mid-sentence and overlaps adjacent material.
      The opening line here is translated cautiously, with Kmosko page 604 used as
      a control witness for the chapter edge and sense. The chapter also ends at the
      transition into the next water-vision section, so the draft stops with the secure
      closing line, 'These are the bright waters that you saw.'
