translation:
  text: '1 And the twelfth bright waters that you saw—these are they:

    2 After these things a time will come when your people will be shaken by themselves
    in their days.

    3 Then they will be troubled, so that no one will find a question from many, and
    no one will find anything new.

    4 And they will complete the time of their sins.

    5 But then they will receive the world that does not die, and at that time they
    will be praised among the mighty ones.

    6 And there will be those who are like the angels, and they will be equal to the
    stars.

    7 And they will be changed into every form they desire, from beauty into loveliness,
    and from light into the splendor of glory.

    8 For there will be spread out before them the extents of Paradise, and there
    will be shown to them the beauty of the majesty of the living creatures that are
    beneath the throne, and all the armies of the angels, who are now held fast by
    my word, lest they appear, and are held fast by a command, that they may stand
    in their places.

    9 Also, there will then be excelled the surpassingness of the glory of those who
    have now been justified in my law, who have had understanding in their life, and
    who have planted in their heart the root of wisdom.

    10 Then their splendor will be glorified by transformations, and the form of their
    face will be turned into the light of their beauty, so that they may acquire and
    receive the undying world that is then promised to them.

    11 Therefore especially will they come and go with exultations, and in a confidence
    they will hasten, and they will not be grieved by torments.

    12 For they will hasten to behold the face of him whom they served in life, and
    from whom they expect to receive their reward when they are glorified.

    13 For it is for this that this previously mentioned corruption has taken place,
    and for this that that which was before has been shown, and for this that the
    time of distress has been prepared, and for this that labor has been measured
    out, and for this that evil has been allowed, and for this that the ways of death
    have been shown, and for this that the furnace has been set, and for this that
    the fire has been kindled, and for this that the heights of Paradise have been
    revealed, and for this that the reward of the righteous has been shown, and for
    this that the city of Zion will be revealed, and for this that the rest that is
    to come has been made known, and for this that the perfection of wisdom has been
    made manifest.

    14 Therefore there will then be no opportunity to repent anymore, nor a limit
    to the times, nor a duration for the hours, nor a change of ways, nor place for
    prayer, nor sending up of petitions, nor receiving of knowledge, nor giving of
    love, nor place of repentance for the soul, nor supplication for offenses, nor
    intercession of the fathers, nor prayer of the prophets, nor help of the righteous.

    15 There there is the sentence of corruption, the way of fire, and the path that
    brings into Gehenna.

    16 Therefore there is one law by one, and one age for all who are in it.

    17 Then he answered and said to me, “How long?”'
