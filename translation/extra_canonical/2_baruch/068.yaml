translation:
  text: '1 And the twelfth waters that you saw, which were bright—this is the word:

    2 After these things a time will come when your people will fall into such distress
    that they will all be in danger of perishing together.

    3 Yet they will be saved, and their enemies will fall before them.

    4 And in time they will have much joy.

    5 And then, after a short interval, Zion will be rebuilt, its offerings restored,
    and the priests will return to their ministry.

    6 The nations also will come to honor it, but not as fully as before.

    7 But after these things many nations will fall.

    8 These are the bright waters that you saw.'
