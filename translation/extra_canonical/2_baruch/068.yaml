theological_decisions:
- issue: Whether to render the line as merit language or soften it
  chosen_reading: This is he who will receive an eternal reward
  alternative_readings:
  - This is he who will receive everlasting benefit
  - This is he whose portion is forever
  rationale: The Syriac and the Kmosko Latin control both point to real recompense
    language. The translation preserves that wording without importing later doctrinal
    systems into the text.
- issue: How to render the prepared heavenly honors
  chosen_reading: glories were created and prepared beforehand
  alternative_readings:
  - honors were laid up beforehand
  - crowns were prepared beforehand
  rationale: The passage speaks of pre-prepared eschatological glory for Josiah and
    those like him. 'Glories' keeps the imagery broad and apocalyptic, avoiding narrower
    interpretive terms such as 'crowns.'
