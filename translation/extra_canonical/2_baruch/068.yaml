  text: '# Source page p0183 (printed 159)

    ܒܪܬ ܢܦܫܗ. ܘܐܬܬܙܝܥ

    ܒܠܚܘܕܘܗܝ ܒܝܘܡܘܗܝ

    ܒܙܒܢ ܙܒܢܐ. ܐܝܟ ܕܠܐ

    ܢܫܟܘܚ ܠܐܢܫ ܫܘܐܠܐ

    ܘܐ ܡܕܡ ܚܕܬܐ ܐܢܫܐ.

    ܘܡܠܘܗܝ ܝܘܡ̈ܝܐ ܕܚ̈ܛܗܘܗܝ.

    ܘܗܘ ܕܝܢ ܢܣܒ ܝܘܬܪܢܐ

    ܕܥܠܡ ܘܗܘ ܢܫܬܒܚ

    ܠܘܬ ܚܝܠܬܢܐ ܐܝܟ ܡܢ

    ܣܓܝ̈ܐܐ ܒܙܒܢܐ ܐܚܪܝܐ.

    ܘܡܬܒܥܐ ܕܝܢ ܕܢܘܕܐ

    ܘܡܛܠ ܐܝܠܝܢ ܕܕ̈ܡܝܢ ܠܗܘ

    ܬܪܥܝܬܐ ܘܬܬܥܝܪ

    ܬܫܒܘܚܬܐ ܡܩܘܝܬܐ

    ܘܗܠܝܢ ܕܐܬܥܒܕ ܠܡ ܡܢ

    ܩܕܝܡ. ܘܗܠܝܢ ܐܢܘܢ ܩܒ̈ܝܐ

    ܕܢܘܗܪܐ ܕܝܬܝܪ. ܡܢ ܩܒ̈ܝܐ

    ܕܚܫܘܟܐ ܪ̈ܘܪܒܐ ܕܚܫܘܟܐ.

    ܘܐܕܡ ܗܘ ܟܝܢܐ ܕܐܢܫܐ

    ܗܘܐ ܠܢܦܫܗ. ܘܐܢ ܡܕܡ

    ܕܠܝܬ ܠܗܘܢ ܒܩܘܫܬܐ

    ܒܡܠܐܟ̈ܐ ܩܕܡ ܚܝܠܬܢܐ.

    ܘܗܘܐ ܐܫܬܠܡܘܬ

    ܕܗܘ. ܘܐܘܪܒ ܒܩܘܫܬܐ

    ܡܫܬܒܗܪܝܢ ܒܥܒܕܝ̈ܗܘܢ

    ܘܩܢܘܡܐ ܩܕܡ ܦܪܘܩܗܘܢ

    ܘܐܬܪܚܩ. ܕܐܝܟܢܐ ܗܟܝܠ

    ܗܘܘ. ܣܒܪܐ ܕܡܘܠܟܢ

    ܚܕܐ ܡܕܝܢܬܐ. ܐܘ

    ܝܩܪܗ ܡܫܬܒܚܐ. ܐܠܐ

    ܡܢܕܝ ܗܘܘ ܠܥܕܢܗ ܟܠܢ.

    ܐܠܐ ܡܢ ܒܬܪ ܗܠܝܢ

    ܐܬܚܙܝܬ ܠܐܒܗܝܟܘܢ.

    ܐܝܠܝܢ ܕܐܬܒܨܪܘ ܒܝܬ

    ܒܡ̈ܢܘܬܐ. ܘܒܚܣܝܪܘ

    ܐܬܒܨܪܘ ܒܟܠ ܐܬܪ. ܡܛܠ

    ܕܟܡܐ ܕܐܢܘܢ ܡܫܠܡܢܐ

    ܘܐܬܥܒܕ ܚܕܬܐ. ܘܦܘܪܩܢܐ

    ܒܡܕ̈ܝܢܬܐ ܕܒܡ̈ܢܘܬܐ

    ܡܬܓܠܝܢ. ܘܒܣܘܓܐ ܕܐܝܟ

    ܕܒܣܘܓܐ ܕܐܝܩܪܐ ܕܡܢ

    ܐܒܗܘܗܝ ܕܟܕ ܡܢ

    ܐܢܘܢ. ܘܒܬܪܗܘܢ ܕܐܢܘܢ

    ܒܟܠ ܐܘ ܕܐܝܟ ܐܝܟ

    ܕܘܡܝܐ ܐܝܬ ܒܗ̇. ܐܠܐ

    ܐܡܘܪ ܡ̇ܟܝܟܐ ܕܒܟܠ ܗ̇ܘ

    ܕܣܝܡ ܗܘܐ ܠܥܕܢܗ.

    ܘܐܫܬܒܩܬ ܟܠ ܒܝܫܘ.

    ܘܐܒܕ̈ܢ ܐ̈ܘܪܚܬܐ ܒܒܝܫܘ

    ܩܕܡ ܡܕܝܢܬܐ. ܐܦ ܗܘ

    ܕܝܢ ܒܐܚܪ̈ܝܬܐ ܢܒܛܠ.

    ܘܠܝܬ ܐܢܫ ܡ̈ܢܝ ܐܘ ܩ̈ܒܘܪ—

    ܘܡ̈ܢܝ ܕܐܬܒܨܪ ܢܘܗܪܐ

    ܐܚܪܝܬܐ. ܐܘ ܗܘ ܕܐܬܬ'
