translation:
  text: 'But you, if you prepare your hearts so as to sow in them the fruit of the law, you will be protected in that time when the Mighty One shakes the whole creation.


    For after a little time the building of Zion will be shaken, so that it may be rebuilt again. Yet that very building will not remain; rather, after a time it will again be uprooted and will remain desolate until the time. And afterward it must be renewed in glory and be established forever.


    Therefore we should not grieve so greatly over the evil that has come now, as over that which is to come.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The present chapter boundary is medium-confidence in the Ceriani bucket. The main sense of this chapter is controlled chiefly by Kmosko page 570 because the surviving Ceriani page span overlaps chapters 31–33 and is locally unstable.
    reason: textual_variant
  - marker: b
    text: The middle lines about Zion being shaken, rebuilt, desolated again, and later renewed in glory are enclosed in brackets because they appear as a marked block in the Kmosko control witness and the current primary-page segmentation does not let us assert their chapter placement with full precision.
    reason: textual_variant
  - marker: c
    text: Or '[For after a little time the building of Zion will be shaken, so that it may be rebuilt again. Yet that very building will not remain; rather, after a time it will again be uprooted and will remain desolate until the time. And afterward it must be renewed in glory and be established forever.]'.
    reason: previous_rendering
lexical_decisions:
- source_word: praeparaveritis corda vestra
  chosen: prepare your hearts
  alternatives:
  - make your hearts ready
  - set your hearts in order
  lexicon: Lewis & Short
  rationale: This preserves the moral and inward sense of deliberate readiness without paraphrasing it into a broader spiritual slogan.
- source_word: seminetis in eis fructus legis
  chosen: sow in them the fruit of the law
  alternatives:
  - plant in them the fruits of the law
  - sow in them the produce of the law
  lexicon: Lewis & Short
  rationale: The agricultural metaphor should remain visible. 'Fruit of the law' keeps both the legal and organic imagery rather than flattening it to 'obedience.'
- source_word: proteget vos
  chosen: you will be protected
  alternatives:
  - he will protect you
  - you will be kept safe
  lexicon: Lewis & Short
  rationale: The passive-like English keeps the focus on divine preservation in the coming crisis without over-specifying the subject in the clause.
- source_word: Fortis
  chosen: the Mighty One
  alternatives:
  - the Strong One
  - the Mighty
  lexicon: Lewis & Short
  rationale: This functions as a divine title. 'The Mighty One' sounds natural in English while preserving the weight of the epithet.
- source_word: concutiat omnem creaturam
  chosen: shakes the whole creation
  alternatives:
  - shakes every creature
  - shatters all creation
  lexicon: Lewis & Short
  rationale: '''Creation'' fits the cosmic scope better than ''creature'' in English here, while ''shakes'' preserves apocalyptic upheaval without exaggerating beyond the witness.'
- source_word: aedificatio Sion
  chosen: the building of Zion
  alternatives:
  - the structure of Zion
  - the edifice of Zion
  lexicon: Lewis & Short
  rationale: The phrase seems to refer to Zion's built form, likely its sanctuary/city structure. 'Building' is transparent and avoids overly technical diction.
- source_word: renovari in gloria
  chosen: renewed in glory
  alternatives:
  - made new in glory
  - restored gloriously
  lexicon: Lewis & Short
  rationale: This preserves both restoration and exalted splendor, without reducing the phrase to mere reconstruction.
- source_word: perficietur in perpetuum
  chosen: be established forever
  alternatives:
  - be perfected forever
  - be completed forever
  lexicon: Lewis & Short
  rationale: Although 'perfected' is possible, 'established forever' reads more idiomatically in English while still conveying durable completion.
- source_word: contristari tantopere
  chosen: grieve so greatly
  alternatives:
  - be so distressed
  - mourn so much
  lexicon: Lewis & Short
  rationale: This keeps the lament tone while sounding like living English.
