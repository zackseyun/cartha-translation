theological_decisions:
- issue: Divine title in the judgment clause
  chosen_reading: Fortis is rendered 'the Mighty One' as a reverential divine title.
  alternative_readings:
  - the Strong One
  - the Mighty
  rationale: The clause presents God as the one who shakes creation. A title-form translation preserves that theological force better than a flatter adjective.
  doctrine_reference: Preserve theological tension and weight rather than flattening elevated religious language.
- issue: Law imagery
  chosen_reading: The text keeps 'the fruit of the law' rather than paraphrasing it as general righteousness or good works.
  alternative_readings:
  - the fruits of obedience
  - the produce of righteousness
  rationale: The chapter links inward preparation with the law specifically, and that covenantal framing should remain explicit.
  doctrine_reference: Original-language primacy over inherited smoothing; do not paraphrase beyond the witness.
- issue: Zion's future rebuilding and permanence
  chosen_reading: The middle restoration block is retained in brackets as an uncertain but theologically important section.
  alternative_readings:
  - omit the bracketed block from the main text
  - print it without brackets as fully certain
  rationale: The control witness preserves a sequence of shaking, rebuilding, renewed desolation, and final glorious renewal. Because the current chapter edge is unstable, brackets honestly signal uncertainty without suppressing the passage.
  doctrine_reference: Where the witness is uncertain, preserve the alternative transparently rather than claiming false precision.
