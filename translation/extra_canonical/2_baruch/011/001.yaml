lexical_decisions:
- source_word: ܡܒܥܕ̈ܢܘܗܝ / opening adversative continuation
  chosen: Then I, Baruch, spoke also
  alternatives:
  - Moreover I, Baruch, said
  - And I, Baruch, said further
  lexicon: Payne Smith
  rationale: The chapter opens as a continuation of the prior lament. I kept the forward-moving connective sense without overstating certainty, since the opening of ch. 11 is one of the rougher OCR spots and is best stabilized by the chapter marker plus control witnesses.
- source_word: ܒܒܠ
  chosen: Babylon
  alternatives:
  - O Babylon
  lexicon: Payne Smith
  rationale: The addressee is the imperial city as the object of Baruch’s lament. I retained the direct address plainly rather than softening it into a general reference.
- source_word: concept of prosperity in the address to Babylon
  chosen: prospered
  alternatives:
  - flourished
  - been at ease
  lexicon: Payne Smith
  rationale: “Prospered” preserves the contrast between Babylon’s present success and Zion’s devastation without adding a moral nuance not required by the witness.
- source_word: ܨܗܝܘܢ
  chosen: Zion
  alternatives:
  - Sion
  lexicon: Payne Smith
  rationale: Standard English biblical transliteration; it also preserves the personified-city force of the lament.
- source_word: desolation language for Zion
  chosen: lies desolate
  alternatives:
  - is laid waste
  - is ruined
  lexicon: Payne Smith
  rationale: I chose a vivid but natural English phrase that preserves the lament-register and the personification of Zion.
- source_word: verb of divine bearing in v. 3
  chosen: how have you endured it?
  alternatives:
  - how have you borne it?
  - how could you tolerate it?
  lexicon: Payne Smith
  rationale: “Endured” communicates Baruch’s astonished lament toward God in idiomatic English while keeping the sense of bearing or tolerating what has happened.
- source_word: rest/sleep idiom for the dead
  chosen: went to their rest / sleep quietly
  alternatives:
  - fell asleep
  - were gathered to rest
  lexicon: Payne Smith
  rationale: The paired expressions preserve the solemn death idiom without flattening it into merely clinical language.
- source_word: ܫܝܘܠ
  chosen: Sheol
  alternatives:
  - the grave
  - Hades
  lexicon: Payne Smith
  rationale: I retained the ancient underworld term rather than replacing it with a more interpretive English equivalent. This best preserves the text’s cosmological texture.
theological_decisions:
- issue: Reference to the realm of the dead in v. 6
  chosen_reading: Sheol is kept as a transliterated underworld term.
  alternative_readings:
  - the grave
  - Hades
  rationale: The chapter voices lament within Second Temple Jewish idiom. Transliteration preserves that world without importing a later, more systematized doctrine of the afterlife.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Address to God in v. 3
  chosen_reading: “O Lord, how have you endured it?”
  alternative_readings:
  - “O Lord, how have you borne it?”
  - “O Lord, how could you allow it?”
  rationale: The line is kept as lamenting astonishment rather than a sharpened accusation. This preserves the emotional tension of the prayer without over-interpreting Baruch’s complaint.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
