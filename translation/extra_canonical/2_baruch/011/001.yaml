  from: '1 Then I, Baruch, spoke also against you, Babylon:

    “If you had prospered

    while Zion dwelt in her glory,

    even then our grief would have been great

    that you should be made equal with Zion.

    2 But now, look:

    the grief is endless

    and the lamentation beyond measure,

    for you have prospered

    and Zion lies desolate.

    3 Who can judge these things?

    Or to whom shall we complain

    about what has come upon us?

    O Lord, how have you endured it?

    4 Our fathers went to their rest without grief,

    and behold, the righteous sleep quietly in the earth,

    5 because they did not know this distress,

    nor had they heard

    what has happened to us.

    6 If only you had ears, O earth,

    and if you had a heart, O dust,

    so that you might go

    and announce it in Sheol,

    and say to the dead,

    7 ‘Blessed are you,

    more than we who live.’”'
  to: Then I, Baruch, answered and said, “Why, O Israel, do you trouble yourself in your mind, and why are you grieved, O land, because of what has happened? For if you had prospered, O Zion, and Babylon had been destroyed, our grief would still have been great that Babylon had been made equal to Zion. But now, behold, the grief is infinite and the lamentation beyond measure, because Babylon has prospered and Zion has been destroyed. For who can judge concerning these things, or to whom shall we complain about what has come upon us? O Lord, how could you endure this? Our fathers went to rest without grief, and behold, the righteous sleep in the earth in quietness, because they did not know this distress, nor had they heard what has happened to us. Would that you had ears, O earth, and that you had a heart, O dust, so that you might go and announce in Sheol and say to the dead, ‘Blessed are you more than we who live.’”
  rationale: 'Replaced the draft with a translation that matches the source passage for 2 Baruch 11:1–7: restored Baruch’s address to Israel/land, corrected the Zion/Babylon conditional contrast, preserved key clauses and rhetorical questions more fully, and tightened wording for formal accuracy.'
