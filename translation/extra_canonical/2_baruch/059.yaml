translation:
  text: 'Hear what the great cloud is that you saw ascending from the sea and going
    forth and covering this earth: it is the world which his power made when he considered
    making creation. And when the word went out from before him, the structure of
    the world stood forth, very small, and it was established according to what was
    sought for it to become.


    And as for the first black waters that you saw descending upon it from the cloud,
    this is the first sin, the transgression that the first Adam committed. For when
    he sinned, death was stirred up, though it was not in its time; and mourning was
    made known, and sorrows were prepared, and pain was created, and toil was completed,
    and greatness began to be brought low.


    And as for the last time, which was shown in a form and took on a likeness, know
    that the time will be examined, and the measure of humanity will be measured,
    and its strength will be tested. Therefore Adam, while he was one who heard from
    God something of what was to be, considered the release of the dead that had been
    given, and what had been commanded him from God. He kept considering, and he devised
    five thoughts. For he made himself liable; he also made the angels liable. And
    even at that time when he was created, a vision was shown to him: the bitter living,
    and the elements with fire. Thus God gathered beforehand, in the likeness of those
    who were created.'
  philosophy: optimal-equivalence
