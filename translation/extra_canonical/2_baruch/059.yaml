theological_decisions:
- issue: Adam's act and the onset of death
  chosen_reading: The text links Adam's first transgression with death being activated
    before its appointed time.
  alternative_readings:
  - The line could be softened to say only that death became known
  - The clause could be read as purely rhetorical, not causal
  rationale: The Syriac presents Adam's sin as the decisive trigger for death, mourning,
    pain, and toil. The rendering preserves that causal apocalyptic theology without
    importing later doctrinal expansions.
  doctrine_reference: 'Cartha project doctrine: preserve original-witness theological
    force without smoothing'
- issue: The liability of the angels
  chosen_reading: The draft retains the difficult statement that Adam also made the
    angels liable.
  alternative_readings:
  - The line may reflect a disturbed text
  - The liability could be limited to heavenly witnesses rather than angelic guilt
    proper
  rationale: The wording is compressed and difficult, but the Syriac as transmitted
    attributes some form of liability to angels in relation to Adam's case. The translation
    keeps that claim visible rather than dissolving it.
  doctrine_reference: 'Cartha project doctrine: transparency where the source is difficult'
- issue: The release of the dead
  chosen_reading: The phrase is left deliberately literal as 'the release of the dead.'
  alternative_readings:
  - resurrection of the dead
  - remission concerning the dead
  rationale: The Syriac does not warrant a more dogmatically specific term with confidence.
    A literal rendering keeps the theological possibility open while remaining auditable.
  doctrine_reference: 'Cartha project doctrine: prefer honesty over false exactness'
