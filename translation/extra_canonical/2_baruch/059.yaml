lexical_decisions:
- source_word: ܩܘܝܡܐ ܕܥܠܡܐ
  chosen: the structure of the world
  alternatives:
  - the beginning of the world
  - the establishment of the world
  - the world's foundation
  lexicon: Payne Smith
  rationale: The phrase denotes the world's standing-forth or established frame. 'Structure'
    keeps the concrete creational sense while fitting the context of something small
    that then becomes ordered.
- source_word: ܚܛܗܐ / ܡܬܒܪܝܢܘܬܐ
  chosen: the first sin, the transgression
  alternatives:
  - the first offense
  - the overstepping
  lexicon: Payne Smith
  rationale: The double expression heightens Adam's primal offense. Rendering both
    terms preserves the emphatic, foundational character of the act.
- source_word: ܐܬܬܙܝܥ ܡܘܬܐ
  chosen: death was stirred up
  alternatives:
  - death was awakened
  - death was set in motion
  lexicon: Payne Smith
  rationale: The verb suggests activation rather than mere existence. The text presents
    death as being set into operation through Adam's sin.
- source_word: ܪܘܪܒܘܬܐ ܫܪܝܬ ܕܬܡܘܟ
  chosen: greatness began to be brought low
  alternatives:
  - majesty began to sink
  - greatness began to be humbled
  lexicon: Payne Smith
  rationale: This preserves both the inception marker ('began') and the downward movement
    after the fall.
- source_word: ܢܘܡܫܐ ܕܐܢܫܘܬܐ
  chosen: the measure of humanity
  alternatives:
  - the norm of humanity
  - the rule of humankind
  lexicon: Payne Smith
  rationale: In context with time being examined and strength being tested, an evaluative
    'measure' fits better than a legal 'law'.
- source_word: ܫܘܒܩܢܐ ܕܡ̈ܝܬܐ
  chosen: the release of the dead
  alternatives:
  - the remission of the dead
  - the sending-away of the dead
  lexicon: Payne Smith
  rationale: The clause is difficult, so a relatively literal rendering is best. 'Release'
    preserves the imagery without over-deciding the exact doctrinal nuance.
- source_word: ܡܚܝܒܢܘܗܝ
  chosen: made liable
  alternatives:
  - made guilty
  - brought under obligation
  lexicon: Payne Smith
  rationale: The term carries judicial force. 'Liable' preserves incurred culpability
    more precisely than the broader 'guilty'.
- source_word: ܐܣܛܘܟܣܐ
  chosen: the elements
  alternatives:
  - the elemental powers
  - the rudiments
  lexicon: Payne Smith
  rationale: This Greek loanword most naturally refers to cosmic elements. 'Elements'
    is clear and minimally interpretive.
