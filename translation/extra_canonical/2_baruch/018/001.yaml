lexical_decisions:
- source_word: ܢܣܒܬ / ܢܣܒܘ
  chosen: received
  alternatives:
  - took
  - derived
  lexicon: Payne Smith
  rationale: The verb is kept broad and concrete. 'Received' preserves the image of drawing something from light or darkness without forcing a more interpretive paraphrase.
- source_word: ܢܘܗܪܐ
  chosen: light
  alternatives:
  - illumination
  lexicon: Payne Smith
  rationale: The chapter turns on a revelation-and-moral contrast; 'light' keeps the image direct and apocalyptic.
- source_word: ܚܫܘܟܐ ܕܐܕܡ
  chosen: Adam’s darkness
  alternatives:
  - the darkness of Adam
  lexicon: Payne Smith
  rationale: The genitive should remain personal and Adamic, not be flattened into a generic 'human darkness.'
- source_word: ܐܬܒܣܣܘ
  chosen: were established
  alternatives:
  - were grounded
  - rejoiced
  lexicon: Payne Smith
  rationale: A form of the root for founding or establishing best fits the visible Syriac. 'Rejoiced' is possible in some interpretive traditions, but 'were established' is more text-transparent here.
- source_word: ܢܘܗܪܐ ܕܡܘܫܐ
  chosen: the light of Moses
  alternatives:
  - Moses' light
  - the light mediated by Moses
  lexicon: Payne Smith
  rationale: The Syriac explicitly names Moses, so the translation keeps the personal reference rather than replacing it with 'law' or 'lamp.'
theological_decisions:
- issue: Adam-darkness and Moses-light contrast
  chosen_reading: The verse contrasts darkness inherited in Adam with revelatory light associated with Moses.
  alternative_readings:
  - The contrast could be read more generally as ignorance versus instruction without strong representative force.
  rationale: The named figures Adam and Moses are preserved because the text frames moral and revelatory history through them.
- issue: Nature of Moses’ role
  chosen_reading: Moses is presented as a bearer of received light rather than an independent source of it.
  alternative_readings:
  - The verse could be read as emphasizing only Moses' exemplary knowledge.
  rationale: Using 'received from the light' preserves derivative revelation and avoids overstating Moses’ status.
