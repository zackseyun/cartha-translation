  from: And I answered and said, “But those who received from the light are able to know by it. But the many who exist received from Adam’s darkness, and were not established in the light of Moses.”
  to: And I answered and said, “You are the one who took from the light, and you are able to know by it. But the many who exist took from Adam’s darkness, and were not established in the light of Moses.”
