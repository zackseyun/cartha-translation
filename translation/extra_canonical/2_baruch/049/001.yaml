translation:
  text: 'But nevertheless I will ask you, O Mighty One, and I will seek mercy from
    him who made all: In what form will those who live in his days live? Or how will
    the splendor of those who come after that time be preserved? Will they then take
    on this present form, and will those human likenesses then remain which now sustain
    the living? Or will you perhaps change these things that have been in the world,
    as also the world itself?'
  philosophy: optimal-equivalence
