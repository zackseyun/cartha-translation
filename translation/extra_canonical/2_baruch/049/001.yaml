lexical_decisions:
- source_word: ܚܒܝܒܝ
  chosen: my beloved
  alternatives:
  - my beloved one
  - my dear one
  lexicon: Payne Smith
  rationale: The Syriac vocative is unusually intimate in this prayer context, but
    the base text supports 'my beloved.' I retained the difficult reading rather than
    replacing it with a smoother divine title.
- source_word: ܕܚܒܝܐ
  chosen: what is hidden
  alternatives:
  - the hidden thing
  - what is concealed
  lexicon: Payne Smith
  rationale: The phrase introduces Baruch’s request for unveiled knowledge. 'What
    is hidden' is idiomatic and keeps the apocalyptic sense of disclosed mystery.
- source_word: ܕܡܘܬܐ
  chosen: form
  alternatives:
  - likeness
  - appearance
  lexicon: Payne Smith
  rationale: Here the noun means likeness or form, not 'death.' This is central to
    the chapter’s question about post-resurrection embodiment.
- source_word: ܙܥܘܪܬܗ
  chosen: splendor
  alternatives:
  - brightness
  - glory
  lexicon: Payne Smith
  rationale: The Ceriani-line reading as transmitted in the prompt appears difficult
    or possibly corrupt at this point; control tradition strongly points to a sense
    like 'splendor/brightness.' I adopt 'splendor' but note the uncertainty.
- source_word: ܡܚܠܦ
  chosen: change
  alternatives:
  - alter
  - transform
  lexicon: Payne Smith
  rationale: The verb frames the question as one of continuity versus transformation.
    'Change' is the broadest English choice and preserves the ambiguity.
theological_decisions:
- issue: Continuity and transformation of the righteous after the age’s turning
  chosen_reading: 'Render Baruch’s question as genuinely open: present form may either
    remain in some way or be changed.'
  alternative_readings:
  - Make the passage clearly affirm identical bodily continuity
  - Make the passage clearly affirm total transformation into a new mode of being
  rationale: The chapter asks rather than resolves the issue. The translation preserves
    that unresolved apocalyptic tension.
