translation:
  text: 'That great cloud which you saw ascending from the sea and going to cover
    the earth—understand this: it is the ordering of the world which the Mighty One
    made when he resolved to create it.[1][2] And it came to pass that, when the word
    went forth from before him, the establishment of the world arose—fair, small—and
    it was prepared as it was fitting to be.[3]


    And as for the first black waters which you saw descending from that cloud upon
    the earth, this is the transgression which Adam, the first man, transgressed.
    For when he transgressed, death was aroused before its time, and mourning became
    known, and afflictions were prepared, and pains were multiplied, and toil was
    established; and greatness began to wane.


    And the last day, which appeared in littleness and took on the likeness of death—you
    will know that the time will be demanded, and the semblance of humanity will be
    wiped away, and its strength will be broken.[4][5]


    Therefore, because Adam—when he heard from God what had come to be, and because
    he understood that forgiveness for those who had died had been given, and received
    command from God—he understood and considered, and five thoughts were thought:
    he made himself liable; he was liable also before the angels; and even in the
    time in which he had been created, a vision was seen by him; and concerning the
    fierce living creatures and the elements with fire.[6][7]


    And thus God gathered [all things] in [their] time, in the likeness in which they
    had been created.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: Ceriani reads ‘went and covered (ḥapith) the earth’; Kmosko’s control has
      ‘covered (kasyth)’. Both mean ‘covered’, with no difference in sense.
    reason: textual_variant
  - marker: '[2]'
    text: The Syriac here is difficult. Kmosko reads ‘this is the ordering/structure
      (nugra) of the world which the Mighty One made’; Ceriani’s OCR has ‘who made
      his power’. The translation follows the ‘ordering’ sense.
    reason: textual_variant
  - marker: '[3]'
    text: ‘Fair, small’ (šapir, zʿur) is striking in context; possibly indicating
      the initial state as nascent/embryonic before further ordering. The phrase is
      retained literally.
    reason: lexical_alternative
  - marker: '[4]'
    text: ‘The last day … took on the likeness of death’ is syntactically terse; it
      is taken as an eschatological aside indicating that the end will resemble death
      in its effects.
    reason: lexical_alternative
  - marker: '[5]'
    text: ‘The semblance (numsha) of humanity will be wiped away’ involves a rare
      term; ‘semblance/appearance’ is a cautious rendering of an obscure word and
      verb (mšḥ ‘to wipe’).
    reason: lexical_alternative
  - marker: '[6]'
    text: ‘Forgiveness for those who had died had been given’ reads šūbaqnā d-mēte
      as an objective genitive, i.e., forgiveness pertaining to the dead, not that
      Adam forgave others.
    reason: lexical_alternative
  - marker: '[7]'
    text: ‘Five thoughts were thought’ is followed by compressed clauses (‘he made
      himself liable … before the angels … in the time he was created … wild beasts
      … elements’). The enumeration is obscure in Syriac; the translation preserves
      the sequence without harmonizing.
    reason: textual_variant
lexical_decisions:
- source_word: ܥܢܢܐ
  chosen: cloud
  lexicon: Sokoloff (Syriac)
  rationale: Standard sense for atmospheric cloud; matches the vision’s imagery of
    a mass rising from the sea.
- source_word: ܚܦܝ / ܟܣܝ
  chosen: cover
  alternatives:
  - hide
  - veil
  lexicon: Payne Smith
  rationale: Both readings in the witnesses mean to cover; ‘cover’ is neutral and
    preserves the image of the cloud blanketing the earth.
- source_word: ܢܘܓܪܗ ܕܥܠܡܐ
  chosen: ordering of the world
  alternatives:
  - framework of the world
  - structure of the world
  lexicon: Sokoloff (Syriac)
  rationale: Nugra denotes arrangement/structure; ‘ordering’ conveys cosmic arrangement
    in creation, fitting the context. Kmosko’s control supports this reading.
- source_word: ܚܝܠܬܢܐ / ܚܝܠܗ
  chosen: the Mighty One
  alternatives:
  - his power
  - made it mighty
  lexicon: Payne Smith
  rationale: Kmosko shows ܚܝܠܬܢܐ (mighty) used substantively of God; Ceriani OCR has
    ܚܝܠܗ (his power). Rendering ‘the Mighty One’ preserves the divine epithet common
    in 2 Baruch and fits the syntax.
- source_word: ܡܠܬܐ
  chosen: word
  alternatives:
  - decree
  lexicon: Sokoloff (Syriac)
  rationale: ‘Word’ preserves intertextual resonance (creative command) and is formally
    accurate.
- source_word: ܩܘܝܡܐ
  chosen: establishment
  alternatives:
  - standing
  - foundation
  lexicon: Sokoloff (Syriac)
  rationale: Quyāmā can denote a standing/establishment; ‘establishment’ best captures
    the setting-up of the created order.
- source_word: ܙܥܘܪ
  chosen: small
  alternatives:
  - in smallness
  - a little
  lexicon: Sokoloff (Syriac)
  rationale: The adjective is surprising in context; retained literally to preserve
    the text’s nuance, with a footnote explaining the difficulty.
- source_word: ܡܬܒܥܐ
  chosen: as it was fitting
  alternatives:
  - as was required
  - as was proper
  lexicon: Sokoloff (Syriac)
  rationale: Idiomatic use meaning what is demanded/appropriate; ‘fitting’ is concise.
- source_word: ܡܝ̈ܐ ܐܘܟܡ̈ܐ
  chosen: black waters
  lexicon: Sokoloff (Syriac)
  rationale: Conventional rendering; preserves symbolic color imagery of judgment/evil
    periods.
- source_word: ܡܥܒܪܢܘܬܐ
  chosen: transgression
  alternatives:
  - overstepping
  lexicon: Sokoloff (Syriac)
  rationale: From root ‘to pass over/transgress’; Kmosko confirms this reading against
    a garbled OCR in Ceriani.
- source_word: ܐܬܬܙܝܥ
  chosen: was aroused
  alternatives:
  - was stirred
  - came
  lexicon: Sokoloff (Syriac)
  rationale: The verb denotes being shaken or stirred; ‘aroused’ captures sudden activation
    of death.
- source_word: ܐܒܠܐ
  chosen: mourning
  alternatives:
  - grief
  lexicon: Payne Smith
  rationale: Standard term for lamentation; context lists consequences of the Fall.
- source_word: ܟܘܐܒܐ / ܟܐܒܐ
  chosen: afflictions / pains
  alternatives:
  - sufferings / pains
  lexicon: Sokoloff (Syriac)
  rationale: Distinguishes general afflictions (plural forms) from specific pains;
    preserves parallelism.
- source_word: ܥܡܠܐ
  chosen: toil
  alternatives:
  - labor
  lexicon: Sokoloff (Syriac)
  rationale: ‘Toil’ captures burdensome labor introduced post-Fall.
- source_word: ܪܘܪܒܘܬܐ ܫܪܝܬ ܕܬܡܘܟ
  chosen: greatness began to wane
  alternatives:
  - exaltation began to sink
  - pride began to fail
  lexicon: Sokoloff (Syriac)
  rationale: Rurbūthā = greatness/exaltation; tmukh likely ‘to sink/fail’. The phrase
    is difficult; the chosen rendering preserves the metaphor with minimal interpretation.
- source_word: ܒܨܘܪܬܐ
  chosen: in littleness
  alternatives:
  - in smallness
  - in diminution
  lexicon: Sokoloff (Syriac)
  rationale: Retains the concrete imagery of smallness/diminution applied to ‘the
    last day’.
- source_word: ܕܡܘܬܐ
  chosen: likeness
  alternatives:
  - semblance
  - form
  lexicon: Sokoloff (Syriac)
  rationale: Common biblical term; ‘likeness’ is faithful and echoes the Syriac.
- source_word: ܬܬܒܥ
  chosen: will be demanded
  alternatives:
  - will be sought
  - will be required
  lexicon: Sokoloff (Syriac)
  rationale: Conveys eschatological accountability/appointment coming due.
- source_word: ܢܘܡܫܐ
  chosen: semblance
  alternatives:
  - appearance
  - show
  lexicon: Payne Smith
  rationale: The term is obscure; ‘semblance’ keeps the sense of outward show while
    marking uncertainty (see footnote).
- source_word: ܬܬܡܫܚ
  chosen: will be wiped away
  alternatives:
  - will be effaced
  - will be smeared out
  lexicon: Sokoloff (Syriac)
  rationale: From mšḥ ‘to smear/wipe’; in context, removal/erasure is intended.
- source_word: ܫܘܒܩܢܐ ܕܡ̈ܝܬܐ
  chosen: forgiveness for those who had died
  alternatives:
  - remission of the dead
  - pardon of the dead
  lexicon: Payne Smith
  rationale: 'Šūbaqnā = forgiveness; genitive ‘of the dead’ best read as objective:
    forgiveness pertaining to those who had died.'
- source_word: ܐܣܬܟܠ
  chosen: understood
  alternatives:
  - was made to understand
  - comprehended
  lexicon: Sokoloff (Syriac)
  rationale: Reflexive stem implies acquired understanding; ‘understood’ reads smoothly.
- source_word: ܐܬܦܩܕ
  chosen: received command
  alternatives:
  - was commanded
  - received orders
  lexicon: Sokoloff (Syriac)
  rationale: Standard rendering for divine injunction.
- source_word: ܚܫ̈ܒܬܐ
  chosen: thoughts
  alternatives:
  - considerations
  lexicon: Sokoloff (Syriac)
  rationale: Literal translation preserves the enigmatic ‘five thoughts’ motif.
- source_word: ܡܚܝܒ
  chosen: made liable
  alternatives:
  - made guilty
  - rendered culpable
  lexicon: Sokoloff (Syriac)
  rationale: 'Legal-ethical nuance fits: Adam’s act incurred liability.'
- source_word: ܚܙܘܐ ܚܙܝܐ
  chosen: a vision was seen
  alternatives:
  - a vision appeared
  lexicon: Sokoloff (Syriac)
  rationale: Tautological expression preserved minimally; indicates a vision granted/seen.
- source_word: ܚܝܘܬܐ ܡܪܝܪܬܐ
  chosen: fierce living creatures
  alternatives:
  - bitter beasts
  - ferocious beasts
  lexicon: Sokoloff (Syriac)
  rationale: ‘Bitter’ idiomatically conveys fierceness; ‘living creatures’ leaves
    scope for animals/beasts.
- source_word: ܐܣܛܘܟܣܐ
  chosen: elements
  alternatives:
  - elemental powers
  lexicon: Payne Smith
  rationale: Loan from Gk. stoicheia; ‘elements’ is the transparent equivalent.
- source_word: ܟܢܫ ܒܥܕܢ
  chosen: gathered in [their] time
  alternatives:
  - collected at (the) time
  - assembled in due time
  lexicon: Sokoloff (Syriac)
  rationale: Conveys divine ordering of events according to appointed times.
- source_word: ܒܕܡܘܬܐ
  chosen: in the likeness
  alternatives:
  - according to the likeness
  - in the form
  lexicon: Sokoloff (Syriac)
  rationale: Maintains close correspondence with Syriac wording.
