lexical_decisions:
- source_word: ܡܬܢܛܪܝܢ
  chosen: are preserved
  alternatives:
  - are kept
  - are guarded
  lexicon: Payne Smith
  rationale: Kept the passive sense of being spared or preserved, fitting the contrast
    with the many who have perished.
- source_word: ܡܬܕܘܕ
  chosen: are troubled
  alternatives:
  - are tossed about
  - are agitated
  lexicon: Payne Smith
  rationale: Uses dignified English for inward disturbance without over-paraphrasing
    the lament tone.
- source_word: ܡܬܪܗܒ
  chosen: are disturbed
  alternatives:
  - are terrified
  - are alarmed
  lexicon: Payne Smith
  rationale: Pairs naturally with the previous verb while preserving emotional intensification.
- source_word: ܡܪܟܒܬܐ ܕܥܢܢܐ
  chosen: a chariot of clouds
  alternatives:
  - the cloud-chariot
  lexicon: Payne Smith
  rationale: Retains the apocalyptic image rather than flattening it into generic
    transport language.
- source_word: ܐܬܢܣܒܬ ܠܝ ܠܐ ܟܕ ܒܦܓܪܐ
  chosen: I was taken up—not in the body
  alternatives:
  - I was carried away, though not bodily
  lexicon: Payne Smith
  rationale: Preserves the visionary ascent while signaling explicitly that the experience
    was not bodily.
- source_word: ܢܬܢܛܪܘܢ ... ܥܒܕܝ̈ܗܘܢ ܘܥܡܠܝ̈ܗܘܢ
  chosen: the works and the labors of people are kept
  alternatives:
  - are preserved
  - are stored up
  lexicon: Payne Smith
  rationale: “Kept” leaves room for both memorial and judgment nuance in the heavenly
    accounting motif.
- source_word: ܢܘܓܪܗ / ܩܘܝܡܐ ܕܥܠܡܐ
  chosen: the beginning of the world / the ordering of the world
  alternatives:
  - the foundation of the world
  - the world’s first form
  lexicon: Payne Smith
  rationale: Ceriani is rough here; Kmosko’s control witness supports a sense of primordial
    beginning or first ordering rather than a later historical age.
- source_word: ܡܬܒܪܝܢܘܬܐ
  chosen: transgression
  alternatives:
  - passing beyond
  - overstepping
  lexicon: Payne Smith
  rationale: Ceriani’s form appears unstable, but Kmosko clearly supports the idea
    of Adam’s transgression/overstepping.
- source_word: ܡܘܬܐ ܕܠܐ ܒܙܒܢܗ
  chosen: untimely death
  alternatives:
  - death before its time
  lexicon: Payne Smith
  rationale: A compact English rendering that preserves the theological claim that
    death arrived out of due order.
- source_word: ܘܪܘܪܒܘܬܐ ܫܪܝܬ ܕܬܡܘܟ
  chosen: greatness began to be humbled
  alternatives:
  - greatness began to diminish
  - majesty began to sink low
  lexicon: Payne Smith
  rationale: Keeps the downward, judgment-shaped motion without overcommitting to
    purely political or purely cosmic language.
