translation:
  text: 'And it happened, when I had prayed and spoken the earlier words of this prayer,
    that I was shaken and kept pondering the seed of mankind—how many are those who
    have departed, and how few are those who are preserved.


    And while I was considering these things, I heard a voice saying to me, “Son of
    man, why are you troubled? And why are you disturbed? For before you were created,
    you were known to me; and before you came forth from your mother’s womb, you were
    made known to me. And because of this, these things that are to come have been
    shown to you.”


    And I said to him, “Lord, you have shown me the multitude of the times and what
    shall happen in them, but you have not shown me from which end to which end. Now
    I have heard of the good that is laid up for those who have borne witness for
    the sake of uprightness, and many things have been promised to me concerning the
    good things and the evil things that are coming.”


    Then I went up to the mountain. And after seven days I came to that place where
    there was a spring. And while I was sitting there, upon a chariot of clouds, I
    was taken up—not in the body, and I did not know how. And a mystery was shown
    to me, and I heard a voice saying to me, “Look and understand how, in this world,
    the works and the labors of people are kept—whether of those who have acted well
    or of those who have acted wickedly.”


    And I said, “I saw a great cloud ascending from the sea, and it went and covered
    the earth. This is the beginning of the world that the Mighty One made, when he
    planned to make the creation. And when the word went forth from before him, the
    ordering of the world stood as a small thing, and it was established according
    to what had been sought for it to become. And the first black waters that you
    saw descending over the cloud—these are the transgression which Adam, the first
    man, committed. For when he sinned, untimely death came into being, and mourning
    was made known, and anguish was prepared, and pain was created, and toil was completed.
    And greatness began to be humbled.”'
