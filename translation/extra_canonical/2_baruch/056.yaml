theological_decisions:
- issue: Adam’s sin and its consequences
  chosen_reading: Adam’s first transgression introduces untimely death, mourning,
    pain, and toil into human existence.
  alternative_readings:
  - A narrower reading focused only on mortality
  - A more speculative reading about cosmic decay beyond humanity
  rationale: The Syriac explicitly lists multiple consequences, so the translation
    preserves the broader fall-out of Adam’s act.
- issue: Nature of Baruch’s ascent
  chosen_reading: The ascent is visionary rather than bodily.
  alternative_readings:
  - An unspecified ecstatic transport
  - A bodily ascent
  rationale: The phrase 'not in the body' is retained directly, so the text itself
    guides the decision.
