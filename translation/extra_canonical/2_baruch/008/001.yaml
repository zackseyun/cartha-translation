translation:
  text: And I saw that he went into the Holy of Holies, and took from there the veils, the ephod, the altar, the mercy seat, the two tables, the holy garments of the priests, the censer, the forty-eight precious stones, and all the holy vessels of the tabernacle. And he said to the earth with a loud voice, "Earth, earth, earth, hear the word of the mighty God, and receive what I commit to you, and guard them until the last times, so that, when you are commanded, you may restore them, so that strangers may not boast over them. For the time has drawn near when Jerusalem also will be delivered up for a time, until it is said that it will be restored again forever."
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: ܒܝܬ ܩܘܕܫܐ ܩܘܕܫܐ
  chosen: the Holy of Holies
  alternatives:
  - the Holy of Holies
  lexicon: Payne Smith
  rationale: The Syriac is the standard superlative sanctuary expression. 'Most Holy Place' is clear modern English, while the traditional equivalent remains viable.
- source_word: ܦܪ̈ܘܟܬܐ
  chosen: the veils
  alternatives:
  - the curtains
  lexicon: Payne Smith
  rationale: The noun denotes sanctuary hangings. 'Veils' keeps the cultic and inner-sanctuary feel better in this context.
- source_word: ܚܘܣܝܐ
  chosen: the mercy seat
  alternatives:
  - the mercy-seat
  - the propitiatory cover
  lexicon: Payne Smith
  rationale: The likely sense is the cultic covering associated with the sanctuary furniture, but the exact item remains somewhat uncertain in this OCR-fragile list, so the draft keeps a transparent rendering.
- source_word: ܘܬܪ̈ܬܝܢ ܟܘܪ̈ܣܘ
  chosen: the two tables
  alternatives:
  - the two tablets
  - the two bases
  lexicon: Smith Syriac Dictionary
  rationale: The OCR here is unstable, and the traditional understanding of the inventory strongly favors the covenant tables/tablets. 'Tables' preserves that probable referent without over-specifying beyond the witness.
- source_word: ܦܝܪܡܐ
  chosen: the censer
  alternatives:
  - the breastpiece
  - the ornament
  lexicon: Payne Smith
  rationale: The exact cultic object is uncertain on the present Ceriani page alone. 'Priestly adornment' signals a sacred vestment/jewel-context while avoiding false precision.
- source_word: ܐܪܥܐ ܐܪܥܐ ܐܪܥܐ
  chosen: Earth, earth, earth
  alternatives:
  - Land, land, land
  lexicon: Smith Syriac Dictionary
  rationale: The triple vocative is rhetorically weighty and should be preserved. 'Earth' better fits the command to receive and keep the temple objects.
- source_word: ܡܦܐܕ̈ܐ
  chosen: the torches
  alternatives:
  - the lamps
  lexicon: Payne Smith
  rationale: The earlier context makes the fiery destructive function explicit, so 'torches' carries the force better than the softer 'lamps'.
- source_word: ܫܪܘ ... ܫܘܪ̈ܝܗ ܒܕܡܐ ܥܘܪ̈ܩܘ
  chosen: pull down the walls and overturn them to their foundations
  alternatives:
  - destroy the walls and cast them down to the roots
  lexicon: Payne Smith
  rationale: The command is not merely to damage but to raze decisively. 'To their foundations' communicates the idiom naturally in English.
- source_word: ܕܘܟܬܐ ܕܐܠܗܐ ܚܝܒܬܐ
  chosen: the dwelling place of the mighty God
  alternatives:
  - the place of the mighty God
  lexicon: Smith Syriac Dictionary
  rationale: '''Place'' is literal, but ''dwelling place'' better reflects the sanctuary setting and preserves the reverent force.'
- source_word: ܘܐܬܩܝܡܘܬ ܬܡܢ ܐܢܐ
  chosen: Yet I will be there
  alternatives:
  - And I will remain there
  - And I will stand there
  lexicon: Payne Smith
  rationale: The line expresses continued divine or angelic presence despite the city's fall. 'I will be there' is simple and faithful without over-arguing the nuance.
theological_decisions:
- issue: Concealment of sanctuary objects in the earth
  chosen_reading: The earth is commanded to receive and keep the holy items until the appointed restoration.
  alternative_readings:
  - The line could be softened into mere burial imagery.
  rationale: The passage presents active divine safeguarding of the sanctuary's holiness, not accidental loss or ordinary hiding.
- issue: Enemy boasting versus divine judgment
  chosen_reading: The walls are torn down by heavenly command so the enemies cannot claim ultimate authorship of Zion's ruin.
  alternative_readings:
  - A flatter rendering could leave the destruction as merely military.
  rationale: The speech frames the catastrophe as governed judgment under God, even while human enemies participate.
- issue: Presence statement at the sanctuary
  chosen_reading: '"Yet I will be there, as I was there before" preserves continuing sacred presence at the site.'
  alternative_readings:
  - A more forensic reading such as 'I will bear witness there'
  rationale: In context the line contrasts enemy boasting with prior and continuing divine relation to the place; presence language fits best.
