  rationale: 'The draft includes the text of 2 Baruch 8:1 and 8:3-5a, likely due to a chunking error in the source pipeline (as indicated by `overlap_expected: true`). The translation should be restricted to verse 2. Additionally, the Syriac ܫܘܪܗ (shureh) is singular ("its wall"), not plural ("the walls"), so "overturn them" should be "uproot it" or "overturn it".'
