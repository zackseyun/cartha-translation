  from: And after these things I heard that angel say to the angels who held the torches, "Now pull down the walls and overturn them to their foundations, lest the enemies boast and say, 'We ourselves have pulled down the wall of Zion, and we have burned the dwelling place of the mighty God.'" And I stood there, where I had been before. Then the angels came down as he commanded them. And when they began at the corners of the wall, a voice was heard from within the temple after the wall had fallen, saying, "Enter ..."
