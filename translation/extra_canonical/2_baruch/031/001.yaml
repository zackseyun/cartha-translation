lexical_decisions:
- source_word: ܟܢܫܘ
  chosen: Gather
  alternatives:
  - Assemble
  - Bring together
  lexicon: Smith
  rationale: The imperative calls for the people to be brought together. 'Gather' preserves the direct force of the summons.
- source_word: ܣܒܝܟܘܢ
  chosen: your elders
  alternatives:
  - your old men
  lexicon: Smith
  rationale: The Syriac points to the elders of the people. Although the Ceriani bucket is unstable at this edge, Kmosko's control witness supports this reading.
- source_word: ܒܚܠܬܐ ܕܩܕܪܘܢ
  chosen: in the valley of Kidron
  alternatives:
  - in the Kidron Valley
  - in the valley of Cedron
  lexicon: Smith
  rationale: The place-name is the well-known Kidron/Cedron valley. 'Kidron' is the standard English form.
- source_word: ܫܡܥ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: Smith
  rationale: In the covenantal address to Israel, 'Hear' preserves the solemn summons better than the flatter 'Listen'.
- source_word: ܙܪܥܗ ܕܝܥܩܘܒ / seed of Jacob
  chosen: seed of Jacob
  alternatives:
  - offspring of Jacob
  - descendants of Jacob
  lexicon: Smith
  rationale: '''Seed'' keeps the familial and covenantal resonance of the source language, even though ''descendants'' would be smoother modern English.'
- source_word: angustiarum Ierusalem / distress of Jerusalem
  chosen: distress of Jerusalem
  alternatives:
  - affliction of Jerusalem
  - trouble of Jerusalem
  lexicon: Lewis & Short
  rationale: The sense is Jerusalem's anguish under judgment. 'Distress' is natural English while retaining the gravity of the lament.
theological_decisions:
- issue: Covenantal address formula
  chosen_reading: The address is rendered as 'Hear, O Israel ... and you, seed of Jacob' without reducing it to a generic call to the audience.
  alternative_readings:
  - Hear, Israel ... descendants of Jacob
  rationale: The chapter opens as a solemn prophetic address to the covenant people, and the traditional form preserves that theological weight.
  doctrine_reference: Preserve theological tension and covenantal imagery rather than flattening it.
- issue: Jerusalem/Zion language
  chosen_reading: Both Zion and Jerusalem are retained distinctly.
  alternative_readings:
  - Collapse both into a single reference to the city
  rationale: The paired names carry lament and theological memory; the text calls the audience both not to forget Zion and to remember Jerusalem's distress.
  doctrine_reference: Do not flatten prophetic or liturgical imagery.
