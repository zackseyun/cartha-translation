  rationale: 'The draft omits the first-person suffix on ܡܠܝ (''my words''). Additionally, the AI explicitly changed the pronoun to ''you'' to match the addressees, but the standard Syriac text reads ܥܡܗܘܢ (''with them''). (Note: The provided source text reads ܘܐܡܪ ܒܥܘ ܡܠܝ, literally ''and I will say, Seek my words'', which is almost certainly an OCR error for the standard ܘܐܡܠܠ ܥܡܗܘܢ ܡܠܝ, ''and I will speak my words with them''). Either way, ''words to you'' is a mistranslation.'
