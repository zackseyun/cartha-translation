lexical_decisions:
- source_word: ܐܪܙܐ
  chosen: cedar
  alternatives:
  - cedar tree
  lexicon: Payne Smith
  rationale: The symbolic tree remains specific and regal in the vision; 'cedar' preserves that force without padding.
- source_word: ܥܒܐ ܕܒܝܫܬܐ
  chosen: the forest of wickedness
  alternatives:
  - the wicked forest
  - the forest of evil
  lexicon: Payne Smith
  rationale: The genitive is best kept explicit. This preserves both the image and the moral charge of the vision.
- source_word: ܒܐܝܕܝܟ
  chosen: By your hands
  alternatives:
  - By means of you
  - Through you
  lexicon: Payne Smith
  rationale: The Syriac imagery is concrete. 'By your hands' keeps the accusation vivid and judicial.
- source_word: ܟܣܝ̈ܬܝܬܐ
  chosen: the snares of your evil
  alternatives:
  - the nets of your wickedness
  - the hidden traps of your evil
  lexicon: Payne Smith
  rationale: The line appears to describe entangling devices or traps. 'Snares' gives natural English while preserving the predatory image.
- source_word: ܬܬܚܒܠ / ܬܫܢܝܩܐ
  chosen: rest in torment
  alternatives:
  - be laid up in suffering
  - take your repose in anguish
  lexicon: Payne Smith
  rationale: The speech is a doom oracle, not consolation. 'Torment' should remain sharp and unsmoothed.
