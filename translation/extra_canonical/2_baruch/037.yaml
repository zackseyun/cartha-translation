theological_decisions:
- issue: Whether to identify the vine directly as the Messiah in the main text
  chosen_reading: The speaker remains 'the vine' in the chapter’s English rendering.
  alternative_readings:
  - Render the speaker as 'the Messiah' already here
  - Capitalize or overtly interpret the figure in the speech itself
  rationale: The interpretation belongs to the following chapter. Keeping the figure within the vision preserves narrative sequence and avoids importing the explanation too early.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: How strongly to render the judgment language at the close
  chosen_reading: The cedar is told to 'rest in torment' and later 'be tormented yet more.'
  alternative_readings:
  - Soften to 'suffer' or 'be distressed'
  - Generalize into non-penal misery
  rationale: The Syriac rhetoric is punitive and apocalyptic. Softening it would mute the judicial force of the oracle.
