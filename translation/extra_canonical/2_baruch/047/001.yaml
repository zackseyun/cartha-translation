  from: '1 And when I had gone out and dismissed them, I went away from there and said to them, “Look, I am going to my dwelling in Hebron.”[a]


    2 And afterward my companions left me, and I came to the cedar where he had spoken with me; and I sat there and fasted seven days.[b]'
  to: 'And when I had gone out and dismissed them, I went away from there and said to them, “Look, I am going to my dwelling in Hebron.”


    And afterward my companions left me, and I came to the cedar where he had spoken with me there; and I sat there and fasted seven days.'
  rationale: Added “there” after “spoken with me” to reflect the Syriac ܬܡܢ (“there”). Removed footnote markers from the verse text.
