  from: where he had spoken with me there
  to: where he had spoken with me
  rationale: The Syriac relative particle ܕ (d-) combined with the adverb ܬܡܢ (taman, "there") is the standard grammatical construction for "where." Translating both "where" and "there" creates a redundant English clause. (Note also that the lexical decisions specify "where the word had been spoken to me," which was lost in the draft).
