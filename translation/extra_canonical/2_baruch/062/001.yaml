lexical_decisions:
- source_word: ܡ̈ܝܐ ܚܫ̈ܟܐ / ܐܘܟܡ̈ܐ
  chosen: black waters
  alternatives:
  - dark waters
  lexicon: Payne Smith
  rationale: The vision alternates adverse and favorable waters in a fixed symbolic sequence. 'Black' preserves the stark apocalyptic contrast more concretely than the softer 'dark.'
- source_word: ܬܩܢܬܐ / ܚܒܠܐ (control-backed sense)
  chosen: corruption
  alternatives:
  - perversion
  - ruin
  lexicon: Payne Smith
  rationale: The chapter describes covenantal and political distortion introduced by Jeroboam. 'Corruption' is natural English while still carrying moral and cultic deformation.
- source_word: ܦܠܓܘܬ ܫܒ̈ܛܐ
  chosen: nine and a half tribes
  alternatives:
  - nine tribes and a half
  lexicon: Payne Smith
  rationale: This keeps the traditional reckoning while using current English number order.
- source_word: ܫܠܡܢܐܣܪ / Latin Salbanasar
  chosen: Shalmaneser
  alternatives:
  - Salmanassar
  - Shalmanesar
  lexicon: Payne Smith
  rationale: The English Bible form 'Shalmaneser' best identifies the Assyrian king for readers while remaining a straightforward transliteration choice rather than an interpretive expansion.
- source_word: ܥܒܕ ܒܪܫܝܥܘܬܐ / Latin impie et improbe
  chosen: acted in impiety and wickedness
  alternatives:
  - worked godlessness and evil
  - behaved impiously and corruptly
  lexicon: Payne Smith
  rationale: The paired English terms preserve the doubled moral indictment without flattening it into a single generic word.
