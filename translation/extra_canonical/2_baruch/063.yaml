lexical_decisions:
- source_word: ܡ̈ܝܐ ܢܘܗܪ̈ܐ
  chosen: bright waters
  alternatives:
  - waters of light
  - radiant waters
  lexicon: Payne Smith
  rationale: The paired water-symbolism in this vision alternates dark and favorable
    waters. “Bright” preserves the image plainly without over-expanding it into a
    more interpretive phrase.
- source_word: ܬܪܝܨܘܬܐ / ܬܩܢܘܬܐ (control-backed sense)
  chosen: integrity and uprightness
  alternatives:
  - rectitude and uprightness
  - rightness and straightness
  lexicon: Payne Smith
  rationale: The chapter opens by characterizing Hezekiah morally in covenantal terms.
    “Integrity and uprightness” gives natural English while keeping the doubled ethical
    emphasis.
- source_word: ܛܝܒܘܬܐ
  chosen: gracious favor
  alternatives:
  - goodness
  - grace
  lexicon: Payne Smith
  rationale: The sense is God’s beneficent favor coming upon Hezekiah. “Gracious favor”
    keeps both the benevolence and the bestowed quality without forcing a narrower
    doctrinal register.
- source_word: ܚܝܠܬܢܐ
  chosen: the Mighty One
  alternatives:
  - the Strong One
  - the Powerful One
  lexicon: Payne Smith
  rationale: This title is recurrent in 2 Baruch. “The Mighty One” is elevated, idiomatic,
    and preserves the divine epithet’s force.
- source_word: ܬܪ̈ܬܝܢ ܫܒ̈ܛܝܢ ܘܦܠܓܗ
  chosen: the two and a half tribes
  alternatives:
  - two tribes and a half
  lexicon: Payne Smith
  rationale: The Syriac points to the remnant of Judah, Benjamin, and the half-tribe
    reckoning. The phrase is kept numerically explicit rather than generalized.
- source_word: ܒܒܥܘܬܗ
  chosen: his prayer
  alternatives:
  - his petition
  - his supplication
  lexicon: Payne Smith
  rationale: In this narrative setting the term denotes Hezekiah’s addressed plea
    to God. “Prayer” is the most natural English equivalent here.
- source_word: ܪܡܐܝܠ / ܪܡܝܐܝܠ
  chosen: Ramiel
  alternatives:
  - Ramael
  lexicon: Payne Smith
  rationale: The angelic name is transmitted with some orthographic instability across
    witnesses. “Ramiel” is a conservative English form that reflects the Syriac consonantal
    shape well.
- source_word: ܪ̈ܝܫܢܐ (control-backed sense in v.7)
  chosen: the chiefs
  alternatives:
  - the leaders
  - the captains
  lexicon: Payne Smith
  rationale: The Ceriani line in this verse is noisy, but the control witness indicates
    a reference to principal officers. “Chiefs” keeps the military-hierarchical sense
    without over-specifying rank.
