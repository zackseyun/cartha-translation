theological_decisions:
- issue: Whether to render Hezekiah’s commendation in v.1 as merely moral excellence
    or as moral excellence plus divine favor
  chosen_reading: Hezekiah is described both by his own integrity and by God’s gracious
    favor coming upon him.
  alternative_readings:
  - Hezekiah is described only by his own rectitude.
  - The phrase refers only to God’s goodness in the abstract.
  rationale: Both the Syriac and the control witness distinguish Hezekiah’s uprightness
    from a further beneficent action that comes upon him. The translation preserves
    both elements.
- issue: How to represent v.3’s statement that Hezekiah ‘trusted in his works’ and
    ‘hoped in his righteousness’
  chosen_reading: Retain the wording about his works and righteousness rather than
    flattening it into a generic statement of faith.
  alternative_readings:
  - Replace with ‘trusted in God alone.’
  - Paraphrase as a general confidence in covenant faithfulness.
  rationale: The chapter explicitly presents Hezekiah’s faithful deeds and righteousness
    as the basis on which he appeals to God. Keeping that wording respects the text’s
    covenantal logic without importing later doctrinal debates.
