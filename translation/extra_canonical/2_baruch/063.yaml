translation:
  text: '1. And the eighth bright waters that you saw—these are the integrity and
    uprightness of Hezekiah king of Judah, and the gracious favor that came upon him.


    2. For when Sennacherib was stirred up for destruction, and his wrath was inflamed
    so as to destroy, together with the multitude of the nations that were with him,


    3. and when Hezekiah the king heard what the king of Assyria was devising—to come,
    seize him, and destroy his people, the two and a half tribes that remained, and
    even to overthrow Zion also—then Hezekiah trusted in his works, hoped in his righteousness,
    and spoke with the Mighty One.


    4. And he said, “Behold, Sennacherib is prepared to destroy us, and he will be
    exalted and lifted up if he destroys Zion.”


    5. And the Mighty One heard him, because Hezekiah was wise, and he regarded his
    prayer, because he was righteous.


    6. And then the Mighty One commanded Ramiel, his angel who speaks with you.


    7. And I went out and destroyed their multitude; the number of the chiefs alone
    was one hundred and eighty-five thousand, and each one of them had the like number.


    8. And at that time I burned their bodies from within, but I preserved their garments
    and their weapons outwardly, so that the still greater wonders of the Mighty One
    might be seen, and that his name might be spoken throughout the whole earth.


    9. And Zion was saved, and Jerusalem was delivered, and Israel also was released
    from distress.


    10. And all those who were in the holy land rejoiced, and the name of the Mighty
    One was glorified, so that it was spoken of.


    11. These are the eighth bright waters that you saw.'
