translation:
  text: '...crushing the head of the dragon upon the water[a]. He will save Israel and all the nations [God appearing as a man].


    4 Therefore, my children, you also tell these things to your children, so that they may not disobey him. 5 For I know that, by disobeying, you will disobey, and by acting ungodly, you will act ungodly, paying no attention to the law of God, but being corrupted by wickedness through the commandments of men. 6 And because of this you will be scattered, like Gad and Dan my brothers, and you will not know their land, tribe, and language. 7 But the Lord will gather you in faith through his compassion[c][b], and through Abraham and Isaac and Jacob.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: 'a'
    text: The bracketed words 'God appearing as a man' likely reflect a textually uncertain or expanded reading in the Greek tradition; they are translated here because they appear in the witness provided.
    reason: textual_variant
  - marker: 'b'
    text: '''In faith'' could also be understood as ''in faithfulness.'''
    reason: lexical_alternative
  - marker: 'c'
    text: The scattering and later gathering echo covenant judgment-and-restoration themes found throughout Israel's Scriptures.
    reason: cross_reference
lexical_decisions:
- source_word: συντρίβων
  chosen: crushing
  alternatives:
  - breaking
  - shattering
  lexicon: LSJ
  rationale: Present participle retained as vivid ongoing action in the prophetic line; 'crushing' fits the idiom of defeating the serpent/dragon's head.
- source_word: κάραν
  chosen: head
  alternatives:
  - skull
  lexicon: LSJ
  rationale: Idiomatic body-part term in a dragon-defeat image; 'head' is natural and preserves the allusive force.
- source_word: δράκοντος
  chosen: dragon
  alternatives:
  - serpent
  lexicon: LSJ
  rationale: The Greek specifically names a dragon; 'serpent' would soften the imagery and reduce the apocalyptic texture.
- source_word: ὑποκρινόμενος
  chosen: appearing
  alternatives:
  - pretending
  - taking the role of
  lexicon: LSJ
  rationale: In this bracketed phrase, a wooden 'pretending' would imply deception too strongly in English. 'Appearing as a man' best captures the surface sense while leaving the difficult theology visible.
- source_word: ἀπειθήσωσιν
  chosen: disobey
  alternatives:
  - be disobedient
  - refuse to listen
  lexicon: BDAG
  rationale: Strong imperative context favors the direct moral term 'disobey.'
- source_word: ἀσεβοῦντες / ἀσεβήσετε
  chosen: acting ungodly / will act ungodly
  alternatives:
  - being impious / will be impious
  - acting irreverently / will act irreverently
  lexicon: BDAG
  rationale: Keeps the repeated cognate force while remaining readable in English.
- source_word: νόμῳ
  chosen: law
  alternatives:
  - instruction
  lexicon: BDAG
  rationale: In this Jewish testamentary setting, 'law of God' is the most transparent and expected rendering.
- source_word: ἐντολαῖς ἀνθρώπων
  chosen: commandments of men
  alternatives:
  - human commands
  - precepts of men
  lexicon: BDAG
  rationale: Preserves the contrast with the law of God and the elevated register of exhortation.
- source_word: κακίᾳ διαφθειρόμενοι
  chosen: being corrupted by wickedness
  alternatives:
  - being ruined by malice
  - being perverted by evil
  lexicon: BDAG
  rationale: '''Corrupted'' fits moral decay language; ''wickedness'' is broader and less psychologized than ''malice'' here.'
- source_word: διασκορπισθήσεσθε
  chosen: you will be scattered
  alternatives:
  - you will be dispersed
  lexicon: BDAG
  rationale: Standard covenant-judgment language; 'scattered' preserves biblical resonance.
- source_word: ἀγνοήσετε
  chosen: you will not know
  alternatives:
  - you will be ignorant of
  - you will lose knowledge of
  lexicon: BDAG
  rationale: Simple future with direct force; in context it implies estrangement from ancestral identity.
- source_word: ἐπισυνάξει
  chosen: will gather
  alternatives:
  - will gather together
  - will bring together
  lexicon: BDAG
  rationale: Concise covenant-restoration language; 'gather' is sufficient in English.
- source_word: ἐν πίστει
  chosen: in faith
  alternatives:
  - with faith
  - in faithfulness
  lexicon: BDAG
  rationale: Main text keeps the straightforward rendering 'faith'; the exact nuance is somewhat open, so alternatives are noted.
- source_word: εὐσπλαγχνίας
  chosen: compassion
  alternatives:
  - mercy
  - tender mercy
  lexicon: BDAG
  rationale: Conveys deep pity/mercy in accessible English without losing theological warmth.
