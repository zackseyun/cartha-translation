theological_decisions:
- issue: Bracketed phrase θεὸς εἰς ἄνδρα ὑποκρινόμενος
  chosen_reading: Translated in brackets as 'God appearing as a man'
  alternative_readings:
  - omit as secondary expansion
  - '''God masquerading as a man'''
  - '''one acting as God in human form'''
  rationale: The Greek witness includes the phrase in brackets, signaling textual or interpolation concern. The translation preserves it transparently without normalizing it into later doctrinal language.
  doctrine_reference: Preserve theological tension rather than resolve it; translate what is in the Greek witness honestly, and use notes for complexity.
- issue: Referent of 'he will save Israel and all the nations'
  chosen_reading: Left intentionally unspecified as 'He'
  alternative_readings:
  - the coming savior figure
  - the Lord explicitly
  rationale: The immediate Greek excerpt does not restate the antecedent here. Supplying a more explicit referent would interpret beyond the surviving wording.
  doctrine_reference: Original-language primacy; do not paraphrase beyond what the Greek warrants.
- issue: Meaning of ἐν πίστει
  chosen_reading: Rendered 'in faith'
  alternative_readings:
  - '''in faithfulness'''
  - '''by faith'''
  rationale: The phrase is concise and somewhat open. 'In faith' preserves the ambiguity better than a more interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
