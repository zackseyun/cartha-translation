id: T12P.ASH.07
reference: Testament of Asher 7
source:
  edition: Charles 1908 Greek Versions (pages 244-255, Asher pilot)
  text: συντρίβων²⁴ τὴν κάραν²⁵ τοῦ δράκοντος *ἐπὶ τοῦ²⁶ ὕδατος, *οὗτος σώσει²⁷ τὸν Ἰσραὴλ καὶ πάντα τὰ ἔθνη [θεὸς²⁸ εἰς ἄνδρα ὑποκρινόμενος²⁹]. 4. Εἴπατε οὖν, ⸀τέκνα μου καὶ ὑμεῖς⸀³⁰ ταῦτα τοῖς τέκνοις ὑμῶν³¹, μὴ ἀπειθήσωσιν³² αὐτῷ. 5. *Ἐγὼ γὰρ ἔγνων³³ ὅτι ⸀ἀπειθοῦντες⸀³⁴ *ἀπειθήσετε, καὶ ἀσεβοῦντες ἀσεβήσετε³⁵, μὴ προσέχοντες³⁶ *τῷ νόμῳ³⁷ θεοῦ, ἀλλ᾽ ἐντολαῖς ἀνθρώπων *κακίᾳ διαφθειρόμενοι³⁸. 6. *Καὶ διὰ τοῦτο³⁹ διασκορπισθήσεσθε⁴⁰ ὡς Γὰδ καὶ⁴¹ Δάν, οἱ ἀδελφοί μου⁴², *καὶ ἀγνοήσετε χώρας αὐτῶν⁴³ καὶ φυλὴν καὶ γλῶσσαν⁴⁴. 7. Ἀλλ᾽ ἐπισυνάξει ὑμᾶς⁴⁵ ἐν πίστει διὰ τῆς⁴⁶ εὐσπλαγχνίας αὐτοῦ, καὶ⁴⁷ δι᾽ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ. (Α ἠγνόησαν). β-e, A, S¹ ὑμᾶς Κύριος. β, A, S¹ ἐλπίδα.
