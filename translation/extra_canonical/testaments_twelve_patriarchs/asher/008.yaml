theological_decisions:
- issue: Death described with sleep imagery
  chosen_reading: Retain both 'he died' and 'having fallen asleep in a good sleep'
  alternative_readings:
  - Render only 'he died peacefully'
  - Render only 'he fell asleep'
  rationale: The Greek contains both the plain statement of death and the euphemistic
    participial sleep expression. Preserving both keeps the literary texture and avoids
    resolving the wording into a single modern idiom.
