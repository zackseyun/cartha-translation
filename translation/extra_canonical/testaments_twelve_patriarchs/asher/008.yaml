translation:
  text: And after saying these things to them, he gave them this charge, saying, “Bury
    me in Hebron.” And he died, having fallen asleep in a good sleep. And his sons
    did as he had commanded them, and they carried him away to Hebron and buried him
    with his fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek literally says, 'he died, having fallen asleep in a good sleep,'
      combining a direct statement of death with traditional sleep imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνετείλατο
  chosen: gave ... this charge
  alternatives:
  - commanded
  - instructed
  lexicon: LSJ
  rationale: In testamentary context, the verb carries the force of a solemn final
    instruction. 'Gave this charge' preserves both authority and farewell tone better
    than the flatter 'instructed,' while avoiding over-repetition with the later occurrence
    rendered 'commanded' in a more summary narrative way.
- source_word: Θάψατέ
  chosen: Bury
  alternatives:
  - Entomb
  - Lay to rest
  lexicon: LSJ
  rationale: Direct imperative should remain strong and simple. 'Bury' is the plain
    sense and fits the patriarchal burial request without embellishment.
- source_word: Χεβρών
  chosen: Hebron
  alternatives: []
  lexicon: BDAG
  rationale: Personal and place names are transliterated by standard convention.
- source_word: ἀπέθανεν
  chosen: he died
  alternatives:
  - he came to his end
  lexicon: BDAG
  rationale: The explicit verb for death should be translated directly; the following
    participial phrase supplies the euphemistic coloring.
- source_word: ὕπνῳ καλῷ κοιμηθείς
  chosen: having fallen asleep in a good sleep
  alternatives:
  - having slept a good sleep
  - having fallen asleep peacefully
  lexicon: LSJ
  rationale: The Greek uses sleep language as a death euphemism. This rendering preserves
    the metaphor and the doubled sleep vocabulary, rather than collapsing it into
    the interpretive 'peacefully.'
- source_word: ἀπήγαγον
  chosen: they carried him away
  alternatives:
  - they brought him
  - they took him
  lexicon: LSJ
  rationale: The verb suggests conveying the body from one place to another. 'Carried
    him away' fits funeral transport more naturally in English than the more ambiguous
    'brought him.'
- source_word: μετὰ τῶν πατέρων αὐτοῦ
  chosen: with his fathers
  alternatives:
  - beside his fathers
  - with his ancestors
  lexicon: BDAG
  rationale: '''With his fathers'' preserves the traditional kinship idiom and burial
    formula without flattening it into the broader but less textured ''ancestors.'''
