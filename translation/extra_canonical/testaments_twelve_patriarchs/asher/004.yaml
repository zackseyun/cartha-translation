theological_decisions:
- issue: Moral evaluation of actions that appear mixed or 'double-faced'
  chosen_reading: Asher distinguishes outwardly mixed or severe actions from inward
    duplicity; some acts may appear double yet be wholly good when they remove evil
    in zeal for God.
  alternative_readings:
  - The text condemns all doubleness without exception
  - The text endorses morally ambiguous means in a blanket way
  rationale: The repeated formula 'this too is double-faced, but the whole work is
    good' shows that Asher is not praising hypocrisy but arguing that some actions
    look mixed from the outside while being morally sound in their total aim.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    the Greek argument honestly without harmonizing.
- issue: Reference of Κύριον in this Jewish testament context
  chosen_reading: the Lord
  alternative_readings:
  - God
  - the LORD
  rationale: The Greek witness has Κύριον. Following project policy, titles are translated.
    'The Lord' fits the immediate Greek and broader testamentary style without importing
    later christological specificity.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord'
