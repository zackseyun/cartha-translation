translation:
  text: '1 For good men, being single-faced, even if they are thought by the double-faced
    to be sinning, are righteous before God. 2 And many, in doing away with the wicked,
    perform two works, one good and one evil; yet the whole is good, because he has
    uprooted and destroyed the evil. 3 There is one who hates the merciful man and
    the unjust man, and the adulterer and the one who fasts; this too is double-faced,
    but the whole work is good, because he imitates the Lord, not expecting what only
    seems good together with what is truly good. 4 Another does not wish to see good
    days with the wasteful, lest he defile his body and pollute his soul. Even though
    this is double-faced, yet it is wholly good. 5 For such men are like gazelles
    and deer: in the bearing of wild animals they seem to be unclean, but in every
    respect they are clean, because they walk in zeal for the Lord, keeping away from
    those things which God also hates and forbids through the commandments, thus holding
    back evil from good.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two-faced' for 'double-faced' throughout the chapter.
    reason: lexical_alternative
  - marker: b
    text: The Greek expression 'what seems good' contrasts apparent good with 'what
      is truly good.'
    reason: lexical_alternative
  - marker: c
    text: The animal comparison likely refers to creatures that may appear wild or
      suspect in outward manner, yet are in fact clean; the point is moral appearance
      versus true purity.
    reason: cultural_note
  - marker: d
    text: The final clause is compressed in Greek and may also be rendered 'keeping
      evil away from good.'
    reason: alternative_reading
lexical_decisions:
- source_word: μονοπρόσωποι
  chosen: single-faced
  alternatives:
  - single-minded
  - sincere
  - of one face
  lexicon: LSJ
  rationale: The chapter's governing contrast is with διπρόσωποι ('double-faced').
    'Single-faced' preserves the vivid metaphor and Asher's ethical vocabulary better
    than smoothing to 'sincere.'
- source_word: διπρόσωποι / διπρόσωπον
  chosen: double-faced
  alternatives:
  - two-faced
  - double-minded
  lexicon: LSJ
  rationale: Retains the face-metaphor that structures the chapter. 'Two-faced' is
    idiomatic English but slightly colloquial; 'double-faced' better matches the repeated
    formal contrast with μονοπρόσωποι.
- source_word: ἀναιροῦντες
  chosen: doing away with
  alternatives:
  - killing
  - removing
  - destroying
  lexicon: BDAG
  rationale: The participle can imply killing or removing. 'Doing away with' preserves
    the force while allowing the broader moral sense of eliminating wicked persons
    or wickedness.
- source_word: τὸ δὲ ὅλον καλόν
  chosen: yet the whole is good
  alternatives:
  - but it is altogether good
  - the entire matter is good
  lexicon: LSJ
  rationale: 'This repeated evaluative formula is central to the argument: an apparently
    mixed action may still be wholly good in moral totality.'
- source_word: μιμεῖται Κύριον
  chosen: he imitates the Lord
  alternatives:
  - he follows the Lord
  - he copies the Lord
  lexicon: BDAG
  rationale: The ethical point is imitation of divine action; 'imitates' is the most
    direct rendering.
- source_word: τὸ δοκοῦν καλὸν ... τοῦ ἀληθινοῦ καλοῦ
  chosen: what only seems good ... what is truly good
  alternatives:
  - the apparent good ... the true good
  - what appears good ... the real good
  lexicon: LSJ
  rationale: Preserves the contrast between merely apparent goodness and genuine goodness,
    which is crucial to Asher's moral discernment.
- source_word: ἀσώτων
  chosen: the wasteful
  alternatives:
  - the profligate
  - the dissolute
  - the reckless
  lexicon: BDAG
  rationale: Refers to morally undisciplined, dissipated people. 'Wasteful' keeps
    the root sense and remains readable, though the moral nuance is broader than financial
    waste.
- source_word: αἰσχράνει ... μολυνεῖ
  chosen: defile ... pollute
  alternatives:
  - dishonor ... defile
  - shame ... stain
  lexicon: LSJ
  rationale: The pair expresses bodily and spiritual contamination. Using two distinct
    English verbs preserves the parallelism without collapsing the terms.
- source_word: δορκάσι καὶ ἐλάφοις
  chosen: gazelles and deer
  alternatives:
  - antelopes and deer
  lexicon: LSJ
  rationale: Keeps the animal imagery natural in English while preserving the distinction
    of the two animals.
- source_word: ἐν ἤθει ἀγρίων
  chosen: in the bearing of wild animals
  alternatives:
  - in the manner of wild beasts
  - in outward habit like wild creatures
  lexicon: LSJ
  rationale: ἦθος here points to manner/character/appearance. 'Bearing' captures the
    outward impression that leads others to misjudge them.
- source_word: ἐν ζήλῳ Κυρίου
  chosen: in zeal for the Lord
  alternatives:
  - with zeal for the Lord
  - in the Lord's zeal
  lexicon: BDAG
  rationale: Best taken as human zeal directed toward the Lord rather than the Lord's
    own zeal.
- source_word: ἀπείργων τὸ κακὸν τοῦ ἀγαθοῦ
  chosen: holding back evil from good
  alternatives:
  - separating evil from good
  - keeping evil away from good
  lexicon: LSJ
  rationale: The phrase is somewhat compressed; this rendering preserves the image
    of preventing evil from attaching itself to good without over-interpreting.
