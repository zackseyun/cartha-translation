theological_decisions:
- issue: Interpretation of the paradox διὸ καὶ τὸν θάνατον ἡ αἰώνιος ζωὴ ἀναμένει
  chosen_reading: Therefore eternal life also awaits death.
  alternative_readings:
  - Therefore death also awaits eternal life.
  - Therefore beyond death there is eternal life.
  rationale: The Greek syntax most naturally makes 'eternal life' the subject and
    'death' the object. The statement is paradoxical, but the translation preserves
    that tension rather than smoothing it into an interpretive paraphrase.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
- issue: Force of repeated ὑπό phrases in the moral-cosmological contrasts
  chosen_reading: Retain 'under' language in the main text.
  alternative_readings:
  - Render idiomatically as 'belongs to' or 'is on the side of'
  - Explain the relation interpretively as moral domain or authority
  rationale: The chapter builds a patterned sequence with ὑπό ('under'). Preserving
    it keeps the rhetorical texture and leaves the exact metaphysical nuance open
    for later annotation rather than collapsing it into one interpretation.
  doctrine_reference: DOCTRINE.md §Original-language primacy over translation tradition
