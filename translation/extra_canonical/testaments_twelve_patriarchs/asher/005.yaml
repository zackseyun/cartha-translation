translation:
  text: '1. See, my children, how there are two in everything, one set opposite the
    other, and one is hidden under the other: in wealth-getting, greed; in merriment,
    drunkenness; in laughter, grief; in marriage, debauchery. 2. Death follows life,
    dishonor follows glory, night follows day, darkness follows light. Yet all things
    are under the day: righteous things under life, and unrighteous things under death.
    Therefore eternal life also awaits death. 3. And one cannot say that truth is
    falsehood, nor that what is righteous is unrighteous, because all truth is under
    the light, just as all things are under God. 4. So then I tested all these things
    in my life, and I did not go astray from the truth of the Lord, but sought out
    the commandments of the Most High, walking with all my strength.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'covetousness' for greed (πλεονεξία).
    reason: lexical_alternative
  - marker: b
    text: The line 'eternal life also awaits death' is textually and conceptually
      difficult; the translation preserves the Greek wording rather than paraphrasing
      the sense.
    reason: textual_variant
  - marker: c
    text: 'Repeated ''under'' language in this chapter likely marks moral or cosmic
      domain: ''under the day ... under life ... under death ... under the light ...
      under God.'''
    reason: cultural_note
lexical_decisions:
- source_word: Ὁρᾶτε
  chosen: See
  alternatives:
  - Look
  - Take heed
  lexicon: LSJ
  rationale: Imperative opening in direct paternal exhortation; 'See' is concise and
    forceful without sounding archaic.
- source_word: τέκνα
  chosen: my children
  alternatives:
  - children
  - sons
  lexicon: LSJ
  rationale: Keeps the intimate testamentary address. 'My' is implied by the speaker's
    direct address and fits the genre.
- source_word: δύο ... ἓν κατέναντι τοῦ ἑνός
  chosen: there are two in everything, one set opposite the other
  alternatives:
  - two are in all things, one over against the other
  - everything has two sides, one against the other
  lexicon: LSJ
  rationale: Preserves the dualistic moral contrast and rhetorical balance while remaining
    readable English.
- source_word: κέκρυπται
  chosen: is hidden under
  alternatives:
  - has been hidden in
  - lies concealed beneath
  lexicon: LSJ
  rationale: The perfect passive suggests a concealed relation; 'under' reflects the
    repeated ὑπό language that follows in the chapter.
- source_word: πλεονεξία
  chosen: greed
  alternatives:
  - covetousness
  - avarice
  lexicon: BDAG
  rationale: '''Greed'' is the clearest modern equivalent and fits the vice catalogue
    naturally.'
- source_word: εὐφροσύνη
  chosen: merriment
  alternatives:
  - gladness
  - cheerfulness
  - rejoicing
  lexicon: LSJ
  rationale: Chosen to mark a festive or cheerful state that can conceal excess; 'merriment'
    pairs well with 'drunkenness'.
- source_word: μέθη
  chosen: drunkenness
  alternatives:
  - intoxication
  lexicon: BDAG
  rationale: Direct vice-term; preserves the moral warning without euphemism.
- source_word: πένθος
  chosen: grief
  alternatives:
  - mourning
  - sorrow
  lexicon: LSJ
  rationale: A broad term that fits the contrast with laughter; 'mourning' would sound
    too externally ritualized here.
- source_word: ἀσωτία
  chosen: debauchery
  alternatives:
  - dissipation
  - profligacy
  - wastefulness
  lexicon: BDAG
  rationale: In the context of marriage, the sense is moral excess or licentiousness;
    'debauchery' best conveys that vice.
- source_word: διαδέχεται
  chosen: follows
  alternatives:
  - succeeds
  - comes after
  lexicon: LSJ
  rationale: Simple and rhythmic for the chain of paired contrasts.
- source_word: τὰ δὲ πάντα ὑπὸ ἡμέραν εἰσίν
  chosen: Yet all things are under the day
  alternatives:
  - But all things are under day
  - Now all things are beneath the day
  lexicon: LSJ
  rationale: Retains the somewhat aphoristic cosmological phrasing of the Greek rather
    than over-explaining it.
- source_word: τὰ δίκαια
  chosen: righteous things
  alternatives:
  - the righteous
  - just things
  lexicon: BDAG
  rationale: Neuter plural is better preserved as a category of things/deeds rather
    than persons alone.
- source_word: τὰ ἄδικα
  chosen: unrighteous things
  alternatives:
  - the unjust
  - wicked things
  lexicon: BDAG
  rationale: Matches τὰ δίκαια and preserves the moral category contrast.
- source_word: ἀναμένει
  chosen: awaits
  alternatives:
  - waits for
  - expects
  lexicon: BDAG
  rationale: Keeps the paradoxical formulation 'eternal life also awaits death' without
    resolving it interpretively.
- source_word: τὸ δίκαιον
  chosen: what is righteous
  alternatives:
  - the righteous thing
  - justice
  lexicon: BDAG
  rationale: The neuter singular is best rendered abstractly in English in this contrast
    with falsehood and unrighteousness.
- source_word: ὑπὸ τοῦ φωτός
  chosen: under the light
  alternatives:
  - in the light
  - subject to the light
  lexicon: LSJ
  rationale: Maintains the repeated ὑπό structure across the chapter, even if slightly
    unusual in English.
- source_word: τοῦ Θεοῦ
  chosen: God
  alternatives: []
  lexicon: BDAG
  rationale: Straightforward rendering; no reason to expand or paraphrase.
- source_word: ἐδοκίμασα
  chosen: I tested
  alternatives:
  - I examined
  - I proved
  lexicon: BDAG
  rationale: Conveys experiential proving in life, fitting Asher's reflective testimony.
- source_word: οὐκ ἐπλανήθην
  chosen: I did not go astray
  alternatives:
  - I was not led astray
  - I did not wander
  lexicon: BDAG
  rationale: Preserves the moral-path imagery common in exhortation literature.
- source_word: ἐξεζήτησα
  chosen: sought out
  alternatives:
  - sought diligently
  - searched for
  lexicon: LSJ
  rationale: The compound verb suggests earnest seeking; 'sought out' captures that
    force.
- source_word: πορευόμενος
  chosen: walking
  alternatives:
  - conducting myself
  - going
  lexicon: BDAG
  rationale: Retains biblical ethical metaphor of life as a walk.
