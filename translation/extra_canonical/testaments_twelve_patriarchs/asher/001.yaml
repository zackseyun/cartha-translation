theological_decisions:
- issue: Moral dualism in the chapter's opening exhortation
  chosen_reading: Translate the repeated 'two' language straightforwardly as an ethical
    contrast of two ways and two inward purposes, without softening it into mere psychological
    complexity.
  alternative_readings:
  - Interpret as absolute metaphysical dualism
  - Reduce to a generic contrast between good choices and bad choices
  rationale: The Greek emphasizes paired opposites in human moral life and inner deliberation.
    The translation preserves the sharp antithesis while not importing a full cosmological
    dualism beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Βελίαρ
  chosen_reading: Beliar as a proper personal name
  alternative_readings:
  - Belial
  - worthlessness/personified evil
  rationale: The Greek witness has Βελίαρ, functioning here as the dominating evil
    power. Transliteration preserves the textual form and avoids interpretive reduction.
  doctrine_reference: Translate what is in the Greek witness honestly.
