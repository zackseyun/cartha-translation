translation:
  text: '1. The copy of the testament of Asher.


    2. In the one hundred and twenty-fifth year of his life, while still healthy,
    he said to them, “Hear, children of Asher your father, and I will show you everything
    upright before God.


    3. God has given two ways to the sons of men, and two purposes, and two kinds
    of action, and two modes, and two outcomes.


    4. Therefore all things are twofold, set one over against the other.


    5. For there are two ways, of good and of evil; and in them are the two purposes
    in our breasts, distinguishing them.


    6. If, then, the soul desires to walk well, it does all its deeds in righteousness;
    and even if it sins, it immediately repents.


    7. For by thinking righteous thoughts and casting away wickedness, it at once
    overturns evil and uproots sin.


    8. But if its purpose inclines to evil, all its deeds are in wickedness, driving
    away the good and clinging to the evil, and it is ruled by Beliar; and even if
    it does something good, it turns it into evil.


    9. For whenever it begins to do good in an evil way, it drives the end of the
    action for him into evil, because the treasure of its purpose is filled with an
    evil spirit.


    10. My children, obey your father, and bury me near my fathers.”


    11. And after he had drawn up his feet, he fell asleep in peace.


    12. And after five years they carried him up to Hebron, and placed him with his
    fathers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: Verse 1 in the source begins with a superscription, 'The copy of the testament
      of Asher.'
    reason: textual_variant
  - marker: '2'
    text: The chapter order in the source places Asher's ethical discourse before
      the brief burial notice; the final burial commands and death report are translated
      here as part of the same chapter unit.
    reason: textual_variant
  - marker: '3'
    text: '''Breasts'' renders the concrete Greek term for the chest as the seat of
      inward deliberation; ''hearts'' would be a smoother but less literal alternative.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑγιαίνων
  chosen: while still healthy
  alternatives:
  - being well
  - in sound health
  lexicon: LSJ
  rationale: Participial circumstantial expression indicating Asher was not yet failing
    physically when he spoke; 'while still healthy' is natural English and preserves
    the narrative point.
- source_word: εὐθές
  chosen: upright
  alternatives:
  - straight
  - right
  lexicon: LSJ
  rationale: In ethical exhortation 'upright' best conveys moral rectitude before
    God without sounding wooden.
- source_word: διαβούλια
  chosen: purposes
  alternatives:
  - plans
  - counsels
  - intentions
  lexicon: LSJ
  rationale: The chapter contrasts inward moral orientations; 'purposes' captures
    deliberative intent better than the more external 'plans'.
- source_word: τρόπους
  chosen: modes
  alternatives:
  - manners
  - ways
  lexicon: LSJ
  rationale: Since ὁδοί already means 'ways,' 'modes' avoids flattening the list and
    preserves the rhetorical accumulation of paired categories.
- source_word: τέλεα
  chosen: outcomes
  alternatives:
  - ends
  - consummations
  lexicon: LSJ
  rationale: The sense is the final result or completion of a course; 'outcomes' is
    readable and fits the ethical contrast.
- source_word: ἐν κατέναντι τοῦ ἑνός
  chosen: set one over against the other
  alternatives:
  - opposite one another
  - in opposition to one another
  lexicon: LSJ
  rationale: This preserves the antithetical structure central to the chapter's dualism.
- source_word: στέρνοις
  chosen: breasts
  alternatives:
  - chests
  - hearts
  lexicon: LSJ
  rationale: The Greek is bodily and concrete. 'Breasts' preserves the anthropological
    texture better than interpretive 'hearts,' while still intelligible in elevated
    English.
- source_word: διακρίνοντα
  chosen: distinguishing
  alternatives:
  - discerning
  - separating
  lexicon: LSJ
  rationale: The participle describes the internal function of the two purposes in
    relation to the two ways; 'distinguishing' is the clearest fit.
- source_word: πορευθῆναι
  chosen: to walk well
  alternatives:
  - to conduct itself well
  - to go rightly
  lexicon: LSJ
  rationale: '''Walk'' preserves biblical ethical idiom and testamentary exhortation
    better than a flattened abstraction.'
- source_word: ἐν δικαιοσύνῃ
  chosen: in righteousness
  alternatives:
  - righteously
  - in justice
  lexicon: BDAG
  rationale: Consistent with project defaults for δικαιοσύνη and suitable for moral
    conduct language.
- source_word: μετανοεῖ
  chosen: repents
  alternatives:
  - changes its mind
  - turns back
  lexicon: BDAG
  rationale: Here the context is specific sin and immediate moral reversal, which
    fits the project's stated rule for rendering μετανοέω as 'repent' in specific-sin
    contexts.
- source_word: λογιζομένη
  chosen: thinking righteous thoughts
  alternatives:
  - reckoning righteously
  - considering what is right
  lexicon: LSJ
  rationale: The participle concerns inward moral reasoning; this rendering makes
    the cognitive force clear in idiomatic English.
- source_word: ἀπορρίπτουσα
  chosen: casting away
  alternatives:
  - rejecting
  - throwing off
  lexicon: LSJ
  rationale: '''Casting away'' preserves the vivid active rejection of wickedness.'
- source_word: ἀνατρέπει
  chosen: overturns
  alternatives:
  - destroys
  - throws down
  lexicon: LSJ
  rationale: A strong verb matching the chapter's forceful moral imagery.
- source_word: ἐκριζοῖ
  chosen: uproots
  alternatives:
  - roots out
  - eradicates
  lexicon: LSJ
  rationale: Agrarian metaphor is preserved and pairs well with 'overturns.'
- source_word: κλίνῃ
  chosen: inclines
  alternatives:
  - turns
  - bends
  lexicon: LSJ
  rationale: Describes the moral leaning of the inner purpose; 'inclines' is idiomatic
    and precise.
- source_word: ἀπωθουμένη
  chosen: driving away
  alternatives:
  - rejecting
  - pushing away
  lexicon: LSJ
  rationale: Keeps the active hostility toward the good.
- source_word: προσκολλώμενος
  chosen: clinging to
  alternatives:
  - joining itself to
  - attaching itself to
  lexicon: LSJ
  rationale: Expresses tenacious attachment to evil in vivid moral language.
- source_word: κυριευθεὶς ὑπὸ τοῦ Βελίαρ
  chosen: it is ruled by Beliar
  alternatives:
  - it is mastered by Beliar
  - it comes under the lordship of Beliar
  lexicon: LSJ
  rationale: κυριεύω denotes domination; 'ruled by' is clear and weighty without over-expansion.
    The proper name is transliterated.
- source_word: ἐν πονηρίᾳ
  chosen: into evil
  alternatives:
  - in evil
  - to evil effect
  lexicon: LSJ
  rationale: In the clause about twisting even a good deed, the sense is resultative
    corruption; 'turns it into evil' communicates the force naturally.
- source_word: εἰς πονηρὸν αὐτῷ ἐλαύνει
  chosen: it drives the end of the action for him into evil
  alternatives:
  - it pushes the outcome into evil
  - it carries the deed's end toward evil
  lexicon: LSJ
  rationale: The Greek is somewhat awkward; this rendering stays close to the imagery
    of driving while remaining intelligible.
- source_word: θησαυρὸς τοῦ διαβουλίου
  chosen: the treasure of its purpose
  alternatives:
  - the store of its intention
  - the treasury of its counsel
  lexicon: LSJ
  rationale: Preserves the metaphor of an inner storehouse from which action proceeds.
- source_word: ἐκοιμήθη ἐν εἰρήνῃ
  chosen: he fell asleep in peace
  alternatives:
  - he died in peace
  - he slept in peace
  lexicon: LSJ
  rationale: Testamentary death formula should retain the euphemistic and dignified
    'fell asleep'.
- source_word: ἀνήγαγον
  chosen: they carried him up
  alternatives:
  - they brought him up
  - they took him up
  lexicon: LSJ
  rationale: The verb naturally reflects ascent to Hebron and echoes burial-translation
    language.
