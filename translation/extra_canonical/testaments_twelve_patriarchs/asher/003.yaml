translation:
  text: But you, my children, do not become double-faced like them, with both goodness
    and wickedness; rather cling to goodness alone, because the Lord God rests in
    it, and people long for it. But flee wickedness, destroying its scheme by your
    good deeds; for the double-faced are not of God, but serve their own desires,
    so that they may please Beliar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two-faced.' The Greek term pictures a divided moral character, not merely
      social insincerity.
    reason: lexical_alternative
  - marker: b
    text: Beliar is the Greek form of the name often rendered Belial.
    reason: lexical_alternative
lexical_decisions:
- source_word: διπρόσωποι
  chosen: double-faced
  alternatives:
  - two-faced
  - double-minded
  lexicon: LSJ
  rationale: Literally 'two-faced' or 'double-faced.' 'Double-faced' preserves the
    image of divided moral presentation in this testament's vice vocabulary without
    reducing it merely to internal hesitation ('double-minded').
- source_word: ἀγαθότης
  chosen: goodness
  alternatives:
  - kindness
  - virtue
  lexicon: BDAG
  rationale: The chapter contrasts moral goodness with κακία. 'Goodness' keeps the
    ethical polarity broad and preserves the repeated thematic term.
- source_word: κολλήθητε
  chosen: cling
  alternatives:
  - join yourselves
  - cleave
  lexicon: LSJ
  rationale: '''Cling'' is vivid, idiomatic, and preserves the exhortational force
    of attaching oneself firmly to goodness.'
- source_word: ἀναπαύεται
  chosen: rests
  alternatives:
  - finds rest
  - abides
  lexicon: BDAG
  rationale: '''Rests'' is the plain sense and preserves the theological image that
    God takes delight and repose in goodness.'
- source_word: ποθοῦσιν
  chosen: long for
  alternatives:
  - desire
  - yearn for
  lexicon: LSJ
  rationale: '''Long for'' conveys strong attraction without sounding overly romantic;
    it suits the moral commendation of goodness.'
- source_word: κακίαν
  chosen: wickedness
  alternatives:
  - evil
  - malice
  lexicon: BDAG
  rationale: In this vice-virtue contrast, 'wickedness' better matches broad moral
    corruption than the narrower 'malice.'
- source_word: ἀποδράσατε
  chosen: flee
  alternatives:
  - escape from
  - run away from
  lexicon: LSJ
  rationale: A strong imperative is needed; 'flee' is concise and preserves the urgency
    of moral avoidance.
- source_word: διαβούλιον
  chosen: scheme
  alternatives:
  - plot
  - counsel
  - design
  lexicon: LSJ
  rationale: The sense is a hostile or corrupt design associated with wickedness.
    'Scheme' fits the moral context and reads naturally in English.
- source_word: οὐκ εἰσὶ τοῦ Θεοῦ
  chosen: are not of God
  alternatives:
  - do not belong to God
  - are not from God
  lexicon: BDAG
  rationale: '''Of God'' preserves the compact theological idiom of belonging/origin
    without over-interpreting it.'
- source_word: ἐπιθυμίαις
  chosen: desires
  alternatives:
  - passions
  - lusts
  lexicon: BDAG
  rationale: The term can be broader than sexual lust; 'desires' keeps the scope wide
    while still morally charged in context.
- source_word: δουλεύουσιν
  chosen: serve
  alternatives:
  - are enslaved to
  - slave for
  lexicon: BDAG
  rationale: Although the verb can imply slavery, here 'serve their own desires' is
    idiomatic and preserves the moral bondage idea without awkwardness.
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: LSJ
  rationale: The Greek witness reads Βελίαρ; the transliteration should follow the
    source form rather than normalize silently to the Hebrew-derived 'Belial.'
