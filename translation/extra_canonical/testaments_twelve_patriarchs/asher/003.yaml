theological_decisions:
- issue: Moral-theological identity formula οἱ διπρόσωποι οὐκ εἰσὶ τοῦ Θεοῦ
  chosen_reading: the double-faced are not of God
  alternative_readings:
  - the double-faced do not belong to God
  - the double-faced are not from God
  rationale: The Greek genitive construction is compact and can suggest source or
    belonging. The chosen rendering preserves the theological sharpness without collapsing
    the ambiguity.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
- issue: Reference of αὐτοὺς in μὴ γίνεσθε κατ᾽ αὐτοὺς διπρόσωποι
  chosen_reading: like them
  alternative_readings:
  - according to them
  - after their manner
  rationale: The comparative sense is most natural in English and fits the exhortational
    contrast with the previously described wicked pattern, while remaining anchored
    in the Greek.
