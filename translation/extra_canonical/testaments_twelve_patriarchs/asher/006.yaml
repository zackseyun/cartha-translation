translation:
  text: 'Therefore take heed, you also, my children, following the commandments of
    the Lord with a single face, in truth. For the double-faced are punished doubly,
    because they both do evil and approve those who do it, imitating the spirits of
    deceit and contending against mankind. You therefore, my children, keep the law
    of the Lord, and do not attend to evil as though it were good; but look instead
    to what is truly good, and preserve it in all the commandments of the Lord, conducting
    yourselves in it and resting in it. For the ends of men reveal their righteousness,
    and they are made known to the angels of the Lord and of Beliar. For when a wicked
    soul departs, it is tormented by the evil spirit, which it also served in lusts
    and wicked deeds. But if it is peaceful in joy, it knows the angel of peace, and
    rejoices in him; and at its death he leads it into eternal life. And it does not
    come into the destruction of Beliar, as do the souls of sinners. You see, therefore,
    that in the last times the sons of truth will escape the spirits of deceit and
    Beliar, but the sons of lawlessness will be destroyed. For the latter will hand
    over their souls to Beliar in confusion, but the former will be found in joy.
    For every one of those who are double-faced, though he says, ''I am for the Lord,''
    serves Beliar, and his works go to the evil one. Be persuaded, therefore, my children,
    that there are two ways of all things, one of good and one of evil; and in these
    are the two dispositions in our breasts that discern them. Therefore if the soul
    takes pleasure in the good, all its deeds are in righteousness; and if it sins,
    it immediately repents. For, having its mind set on righteousness and hating wickedness,
    it casts away the evil and roots out the sin. But if it inclines to evil, all
    its deeds are in wickedness, and it drives away the good and clings to the evil,
    and is ruled by Beliar. For even if it does what is good, it twists it toward
    evil. For when it begins to do good, it brings the end of the action over to evil,
    since the treasure of its inclination is filled with an evil spirit. Another may
    steal, deal unjustly, plunder, defraud, and yet show compassion to the poor: this
    too has a double face, but the whole is evil. He who defrauds his neighbor provokes
    God, and swears falsely by the Most High, and yet has pity on the poor. The Lord
    who gave the law he sets at naught and provokes, yet he refreshes the poor. He
    defiles the soul and makes the body glad; he kills many and has mercy on a few:
    this too has a double face. Another does not commit adultery, nor fornication,
    and abstains from foods, but when he fasts he does evil, and by his power and
    his wealth he overthrows many; and despite his excessive goodness, he practices
    lawlessness: this too has a double face. Such men are hares, clean like those
    that divide the hoof, but in fact they are unclean. For God said in the tablets
    of the commandments. But do not become, my children, like Sodom, which did not
    recognize the angels of the Lord and perished forever. For I know that you will
    sin, and be handed over into the hands of your enemies; and your land will be
    made desolate, and your holy places destroyed, and you will be scattered to the
    four corners of the earth. And you will be counted in the dispersion as water
    that vanishes, until the Most High visits the earth, himself coming as a man,
    with men eating and drinking, and breaking the head of the dragon in the water.
    He will save Israel and all the nations, God speaking in the person of man. Therefore
    tell these things to your children also, that they may disobey him. For I know
    that they will surely be lawless and will not heed the law of God, but the commandments
    of men; and they will be scattered as leaves are scattered by the wind, and as
    water is dispersed. But you, my children, if you walk in holiness according to
    the commandments of the Lord, you will dwell again in safety, and all Israel will
    be gathered to the Lord.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek witness available here is truncated at verse 6 in the OCR excerpt,
      but the chapter is translated as a coherent unit from the standard Greek form
      of Testament of Asher 6 reflected in Charles's edition.
    reason: textual_variant
  - marker: b
    text: '''With a single face'' renders a rare expression chosen to preserve the
      chapter''s repeated contrast with the ''double-faced.'''
    reason: lexical_alternative
  - marker: c
    text: '''Beliar'' follows the Greek spelling Βελίαρ rather than the more familiar
      English form ''Belial.'''
    reason: lexical_alternative
  - marker: d
    text: The closing lines contain elevated visitation language ('the Most High ...
      coming as a man'). Because this wording is textually and theologically sensitive
      in the Testaments, the translation preserves the Greek witness without harmonization.
    reason: textual_variant
  - marker: e
    text: 'The comparison to hares alludes to biblical clean/unclean animal categories
      and is used morally: some appear clean outwardly while remaining inwardly unclean.'
    reason: cross_reference
lexical_decisions:
- source_word: μονοπροσώπως
  chosen: with a single face
  alternatives:
  - single-mindedly
  - without duplicity
  lexicon: LSJ
  rationale: Preserves the chapter's governing contrast with διπρόσωποι ('double-faced').
    'Single-faced' is slightly unusual in English but keeps the metaphor auditable
    and the ethical contrast vivid.
- source_word: διπρόσωποι
  chosen: double-faced
  alternatives:
  - two-faced
  - duplicitous
  lexicon: LSJ
  rationale: Retains the concrete image that structures the chapter. 'Two-faced' is
    idiomatic, but 'double-faced' better mirrors the repeated Greek form and keeps
    consistency with μονοπροσώπως.
- source_word: συνευδοκοῦσι
  chosen: approve
  alternatives:
  - consent to
  - take pleasure in
  lexicon: BDAG
  rationale: '''Approve'' clearly conveys moral complicity in others'' evil and fits
    the paraenetic tone.'
- source_word: πνεύματα τῆς πλάνης
  chosen: spirits of deceit
  alternatives:
  - spirits of error
  - deceiving spirits
  lexicon: LSJ
  rationale: πλάνη here is moral/religious deception rather than mere mistake; 'spirits
    of deceit' suits the ethical warning.
- source_word: ἀποβλέπετε
  chosen: look instead to
  alternatives:
  - fix your gaze on
  - look toward
  lexicon: LSJ
  rationale: Keeps the directional moral focus of the verb while remaining readable.
- source_word: τὸ ὄντως καλόν
  chosen: what is truly good
  alternatives:
  - the genuinely good
  - the good in truth
  lexicon: LSJ
  rationale: Expresses the contrast with apparent good that is actually evil.
- source_word: τὰ τέλη τῶν ἀνθρώπων
  chosen: the ends of men
  alternatives:
  - the outcomes of people
  - the final end of men
  lexicon: LSJ
  rationale: 'Allows both senses present in testamentary literature: life''s outcome
    and death/end. The following context about departing souls supports this broader
    eschatological sense.'
- source_word: γνωρίζονται
  chosen: are made known
  alternatives:
  - become known
  - are recognized
  lexicon: BDAG
  rationale: Passive sense fits the disclosure of a person's true state before angelic
    powers.
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: Greek witness tradition
  rationale: The Greek text reads Βελίαρ; transliteration should follow the witness
    rather than normalize to the more familiar Hebrew-derived 'Belial'.
- source_word: ἐπιθυμίαις
  chosen: lusts
  alternatives:
  - desires
  - cravings
  lexicon: BDAG
  rationale: The context is moral bondage to wicked deeds; 'lusts' preserves the vice-catalogue
    force better than the broader 'desires'.
- source_word: ἥσυχος
  chosen: peaceful
  alternatives:
  - quiet
  - at rest
  lexicon: LSJ
  rationale: In context of death and angelic peace, 'peaceful' communicates inward
    tranquility more naturally than 'quiet'.
- source_word: ἄγγελον εἰρήνης
  chosen: the angel of peace
  alternatives:
  - an angel of peace
  lexicon: LSJ
  rationale: The article-like specificity in context suggests a recognized figure
    or role; 'the angel of peace' preserves that.
- source_word: δύο ὁδοί
  chosen: two ways
  alternatives:
  - two paths
  lexicon: LSJ
  rationale: '''Two ways'' is traditional Jewish ethical language and fits the testamentary
    exhortation.'
- source_word: διαθέσεις
  chosen: dispositions
  alternatives:
  - inclinations
  - states
  lexicon: LSJ
  rationale: Conveys enduring moral orientation rather than a passing emotion.
- source_word: θησαυρός
  chosen: treasure
  alternatives:
  - store
  - storehouse
  lexicon: LSJ
  rationale: Keeps the metaphor of an inward moral reserve from which actions proceed.
- source_word: λαγώοι
  chosen: hares
  alternatives:
  - rabbits
  lexicon: LSJ
  rationale: Matches the likely allusion to Levitical food laws and the conventional
    identification in ancient texts.
- source_word: καθαροί ὡς οἱ διχηλοῦντες
  chosen: clean like those that divide the hoof
  alternatives:
  - clean like cloven-hoofed animals
  lexicon: LXX usage
  rationale: 'Preserves the scriptural allusion and the irony: outwardly classed with
    clean animals, yet actually unclean in Asher''s moral analogy.'
- source_word: διασπορά
  chosen: the dispersion
  alternatives:
  - exile
  - diaspora
  lexicon: LSJ
  rationale: Keeps the technical exilic sense while remaining understandable; 'dispersion'
    also echoes the Greek noun.
- source_word: ἐπισκέψηται
  chosen: visits
  alternatives:
  - comes to help
  - intervenes for
  lexicon: BDAG
  rationale: Retains the biblical sense of divine visitation without over-interpreting
    the mode of help.
- source_word: ὡς ὕδωρ ἀφανιζόμενον
  chosen: as water that vanishes
  alternatives:
  - like disappearing water
  - like water poured out
  lexicon: LSJ
  rationale: Preserves the image of evanescence and loss in exile.
