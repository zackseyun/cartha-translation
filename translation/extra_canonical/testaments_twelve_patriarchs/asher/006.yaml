theological_decisions:
- issue: Messianic/divine visitation language in the closing prophecy
  chosen_reading: 'Translated the Greek directly: ''until the Most High visits the
    earth, himself coming as a man ... He will save Israel and all the nations, God
    speaking in the person of man.'''
  alternative_readings:
  - A more explicitly Christian harmonization of incarnation language
  - A reduction to a merely human agent sent by God
  rationale: The Greek witness contains elevated visitation language that may reflect
    expansion or later interpretation. Per project philosophy, the text is translated
    honestly without harmonizing or suppressing its tension; the ambiguity is preserved
    in the main text and noted.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Beliar as personal evil power
  chosen_reading: Retained 'Beliar' as a personal opposing power who rules, destroys,
    and receives souls.
  alternative_readings:
  - A generalized rendering such as 'wickedness' or 'the evil one' throughout
  rationale: The chapter personifies Beliar distinctly from generic evil spirits;
    flattening the name into abstraction would erase the source text's demonological
    framework.
