translation:
  text: 'And now, my children, hear me concerning what I saw about the seven spirits
    of deceit in my repentance. There were given, then, seven spirits set against
    man, and these are the heads of the works of youthfulness.


    And seven other spirits were given to him at creation, so that every work of man
    might be done through them. The first is the spirit of life, by which a person’s
    constitution is formed. The second is the spirit of sight, by which desire comes
    to be. The third is the spirit of hearing, by which instruction comes to be. The
    fourth is the spirit of smell, by which tastes are produced, with the drawing
    in of air and breath. The fifth is the spirit of speech, by which knowledge comes
    to be. The sixth is the spirit of taste, by which the eating of foods and drinks
    comes to be, and strength is formed in it, because in food lies the basis of strength.
    The seventh is the spirit of procreation and intercourse, by which sins enter
    in through the love of pleasure. Therefore this spirit is last in creation and
    first in youth, because it is filled with ignorance, and it leads the young man
    like a blind man into a pit, and like an animal over a cliff.'
