translation:
  text: 'And you will return to your land, and you will see him in Jerusalem because
    of his holy name; and healing and compassion will be in his wings. He himself
    will redeem every captivity of the sons of men from Beliar, and every spirit of
    deceit will be trampled down. And he will turn all the nations to zeal for him,
    and you will see God in the form of a man, whom the Lord will choose—Jerusalem
    is his name.


    9. And again, by the craftiness of your deeds you will provoke him to anger, and
    you will be cast away from him until the time of completion.


    10. And now, my children, do not be grieved because I am dying, nor fall down
    in sorrow because I am coming to my end. For I will rise again in your midst,
    as a ruler in the midst of the sons of righteousness; and I will rejoice in the
    midst of my tribe, all who keep the law of the Lord. But upon the ungodly the
    Lord will bring eternal fire, and he will destroy them for generations of generations.
    But as for me, I now hasten to my rest, as also my fathers did. But you, fear
    the Lord all the days of your life with all your strength.


    And when he had said these things, he fell asleep, and his sons placed him in
    a wooden coffin. Later they carried him up and buried him in Hebron with his fathers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase 'healing and compassion will be in his wings' likely echoes biblical
      healing-under-wings imagery; the translation preserves the metaphor rather than
      explaining it away.
    reason: cross_reference
  - marker: b
    text: '''Beliar'' follows the Greek form Βελίαρ in this witness; some readers
      may know the name as ''Belial.'''
    reason: lexical_alternative
  - marker: c
    text: '''He will turn all the nations to zeal for him'' reflects a difficult phrase
      with παραζήλωσις, which can also suggest jealousy or emulation.'
    reason: lexical_alternative
  - marker: d
    text: The wording 'you will see God in the form of a man' is translated as it
      stands in the Greek witness. Because this work has a complex transmission history,
      some interpreters regard such lines as secondary expansion, but the translation
      does not suppress them.
    reason: textual_variant
  - marker: e
    text: A textual expansion in some witnesses adds 'and the commandments of Zebulun
      their father' after 'the law of the Lord.' The main text follows the shorter
      reading.
    reason: textual_variant
  - marker: f
    text: The bracketed expansion in verse 5 about fearing 'the Lord our God ... all
      the days of your life' is textually uneven; the main translation keeps the secure
      imperative and incorporates the time phrase where it is well supported.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπιστρέψετε
  chosen: you will return
  alternatives:
  - you will turn back
  - you will be restored
  lexicon: BDAG
  rationale: Future active with spatial complement εἰς τὴν γῆν ὑμῶν favors literal
    return to the land rather than a more abstract restoration.
- source_word: ἴασις
  chosen: healing
  alternatives:
  - cure
  - restoration
  lexicon: LSJ
  rationale: The noun commonly denotes healing; paired with εὐσπλαγχνία it contributes
    to a beneficent, salvific portrait.
- source_word: εὐσπλαγχνία
  chosen: compassion
  alternatives:
  - mercy
  - tenderheartedness
  lexicon: BDAG
  rationale: Compassion is natural modern English and preserves the affective sense
    without becoming overly ecclesiastical.
- source_word: πτέρυξιν
  chosen: wings
  alternatives:
  - pinions
  lexicon: LSJ
  rationale: Retains the scriptural imagery, likely echoing healing-under-wings language,
    and should not be flattened.
- source_word: λυτρώσεται
  chosen: will redeem
  alternatives:
  - will deliver
  - will ransom
  lexicon: BDAG
  rationale: Redeem preserves the liberation sense with theological weight appropriate
    to testamentary prophecy.
- source_word: αἰχμαλωσίαν
  chosen: captivity
  alternatives:
  - exile
  - bondage
  lexicon: LSJ
  rationale: Captivity is broad enough to include both literal and spiritual bondage
    in this apocalyptic context.
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: LSJ
  rationale: The Greek witness reads Βελίαρ; transliteration follows the source form
    rather than harmonizing to the more familiar Belial.
- source_word: πνεῦμα πλάνης
  chosen: spirit of deceit
  alternatives:
  - spirit of error
  - deceiving spirit
  lexicon: BDAG
  rationale: πλάνη here carries the sense of deception or wandering from truth; deceit
    fits the paraenetic warning context.
- source_word: πατηθήσεται
  chosen: will be trampled down
  alternatives:
  - will be crushed
  - will be trodden underfoot
  lexicon: LSJ
  rationale: The passive future of πατέω is vivid and forceful; trampled down preserves
    the image.
- source_word: παραζήλωσιν
  chosen: zeal for him
  alternatives:
  - jealousy for him
  - emulation of him
  lexicon: BDAG
  rationale: The noun can denote provoked zeal/jealousy. In context of nations turning
    toward him, zeal for him is the least misleading English rendering, while the
    ambiguity is noted.
- source_word: θεὸν ἐν σχήματι ἀνθρώπου
  chosen: God in the form of a man
  alternatives:
  - God in human form
  - a divine one in the form of a man
  lexicon: LSJ
  rationale: This striking phrase should be rendered transparently and not softened;
    ἐν σχήματι ἀνθρώπου is best represented by form of a man.
- source_word: πανουργίᾳ
  chosen: craftiness
  alternatives:
  - cunning
  - deviousness
  lexicon: BDAG
  rationale: Craftiness preserves the moral negativity and fits the testament's warning
    tone.
- source_word: παροργίσετε
  chosen: you will provoke him to anger
  alternatives:
  - you will enrage him
  - you will anger him
  lexicon: BDAG
  rationale: The compound verb explicitly includes provocation toward anger; the fuller
    English phrase makes that clear.
- source_word: ἀπορριφήσεσθε
  chosen: you will be cast away
  alternatives:
  - you will be rejected
  - you will be cast off
  lexicon: LSJ
  rationale: Cast away preserves the passive force and covenantal judgment tone.
- source_word: καιροῦ συντελείας
  chosen: time of completion
  alternatives:
  - appointed end time
  - time of consummation
  lexicon: BDAG
  rationale: Completion is transparent and avoids importing later technical eschatological
    phrasing while preserving finality.
- source_word: συμπέσητε
  chosen: fall down in sorrow
  alternatives:
  - collapse
  - be cast down
  lexicon: LSJ
  rationale: In context of mourning, the verb suggests being overcome; fall down in
    sorrow makes the emotional force explicit in readable English.
- source_word: ἀπολήγω
  chosen: I am coming to my end
  alternatives:
  - I am ending
  - I am departing
  lexicon: LSJ
  rationale: This idiomatic rendering communicates impending death naturally without
    losing solemnity.
- source_word: ἀναστήσομαι
  chosen: I will rise again
  alternatives:
  - I will arise
  - I will be raised
  lexicon: BDAG
  rationale: In testamentary and eschatological context, rise again best conveys resurrection
    language.
- source_word: ἡγούμενος
  chosen: a ruler
  alternatives:
  - a leader
  - one who leads
  lexicon: BDAG
  rationale: The participle denotes one exercising leadership; ruler fits the elevated
    prophetic register.
- source_word: υἱῶν δικαιοσύνης
  chosen: sons of righteousness
  alternatives:
  - children of righteousness
  - sons of justice
  lexicon: BDAG
  rationale: Sons of righteousness preserves the idiom and the elevated, familial
    texture of the testament.
- source_word: ἀσεβεῖς
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  lexicon: BDAG
  rationale: Ungodly is a standard and readable rendering for those lacking reverence
    toward God.
- source_word: πῦρ αἰώνιον
  chosen: eternal fire
  alternatives:
  - everlasting fire
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the severity of the judgment
    image.
- source_word: ἕως γενεὰς γενεῶν
  chosen: for generations of generations
  alternatives:
  - through all generations
  - unto generations of generations
  lexicon: LSJ
  rationale: The repetitive Semitic-style phrase should be preserved rather than reduced
    to a bland idiom.
- source_word: ἀνάπαυσίν
  chosen: my rest
  alternatives:
  - my repose
  lexicon: BDAG
  rationale: Rest is simple, solemn, and fitting for death in testamentary speech.
- source_word: ἀποτρέχω
  chosen: I hasten
  alternatives:
  - I run off
  - I depart quickly
  lexicon: LSJ
  rationale: The verb is vivid; hasten preserves the sense without awkward literalism.
- source_word: φοβεῖσθε
  chosen: fear
  alternatives:
  - revere
  lexicon: BDAG
  rationale: Fear the Lord is the established biblical idiom and should be retained
    unless context clearly requires softening, which it does not here.
- source_word: θήκην ξυλίνην
  chosen: a wooden coffin
  alternatives:
  - a wooden chest
  - a wooden bier
  lexicon: LSJ
  rationale: Coffin best fits the burial context and is more precise than chest.
