theological_decisions:
- issue: Messianic/visionary prophecy in the opening lines of the chapter
  chosen_reading: Translate the exalted language directly, including 'God in the form
    of a man,' without doctrinal harmonization.
  alternative_readings:
  - Soften to 'a godlike man' or 'a divine figure'
  - Treat the whole line as later interpolation and mute its force in translation
  rationale: The Greek witness presents a striking prophetic statement. Transparency
    requires rendering what is there and using notes for uncertainty rather than reducing
    the theological tension.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Resurrection language in Zebulun's self-reference
  chosen_reading: Render ἀναστήσομαι as 'I will rise again.'
  alternative_readings:
  - I will arise
  - I will stand up among you
  rationale: Within a farewell testament followed by burial notice, the future verb
    naturally bears eschatological force. The translation should preserve that force
    rather than flatten it to mere metaphor.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Kinship idiom υἱῶν δικαιοσύνης
  chosen_reading: Keep the idiom as 'sons of righteousness.'
  alternative_readings:
  - children of righteousness
  - the righteous
  rationale: The testamentary style uses familial and tribal language densely. Preserving
    the idiom maintains literary texture and avoids over-modernization.
  doctrine_reference: PHILOSOPHY.md style/register guidance
