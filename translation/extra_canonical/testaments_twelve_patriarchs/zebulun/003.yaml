translation:
  text: '1. And when they had done this, they all sat down to eat and drink. But I,
    seeing that Joseph was grieving, did not eat with them, but I kept watch over
    the pit, praying for help for him.


    2. And in the meantime Reuben arose and said, “Come, my brothers, let us not kill
    him, but let us throw him into one of these dry pits which our fathers dug and
    found no water.”


    3. For this reason the Lord prevented water from springing up in them, so that
    Joseph might be preserved.


    4. And they did so until they sold him to the Ishmaelites.


    5. As for his price, my children, I had no share in it. But Simeon and Dan and
    Gad, and their sons, took his price and bought sandals for themselves and for
    their wives and their children,


    6. saying, “We will not eat from it, because it is the price of our brother’s
    blood; rather, we will trample it underfoot, because he said that he would reign
    over us, and then we shall see what his dreams are.”


    7. Therefore it is written in the record of the law of Moses: “The man who does
    not wish to raise up seed for his brother—his sandal shall be removed, and they
    shall spit in his face.”


    8. And the brothers of Joseph were not willing to raise up the life of their brother,
    and the Lord removed from them the sandal which they wore against Joseph their
    brother.


    9. For when they came into Egypt, they had their sandals removed by the attendants
    of Joseph outside the gate, and so they bowed down to Joseph in the manner of
    those before King Pharaoh.


    10. And not only did they bow down to him, but immediately, as they fell before
    him, they were also spat upon, and they were put to shame by the Egyptians.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '3:7'
    text: Allusion to Deuteronomy 25:5–10, where refusal to perform a brother-in-law
      duty brings public shame through sandal-removal and spitting.
    reason: cross_reference
  - marker: '3:8'
    text: 'The Greek wording is unusual: literally, ''the brothers of Joseph were
      not willing to raise up the life of their brother.'' This appears to adapt the
      levirate-law language from the previous verse for moral analogy rather than
      strict legal citation.'
    reason: lexical_alternative
  - marker: '3:10'
    text: Some readers may take the spitting as a symbolic extension of the law-citation
      rather than a strictly historical detail; the Greek narrative, however, states
      it directly.
    reason: alternative_reading
lexical_decisions:
- source_word: λάκκων
  chosen: pits
  alternatives:
  - cisterns
  - wells
  lexicon: LSJ
  rationale: The context is dry excavations dug by the fathers and lacking water.
    'Pits' is broad and natural English while preserving the image; 'cisterns' is
    possible but more specific than the Greek requires here.
- source_word: ξηρῶν
  chosen: dry
  alternatives:
  - waterless
  - parched
  lexicon: LSJ
  rationale: The adjective marks the pits as lacking water. 'Dry' is concise and idiomatic,
    and the following clause explains the absence of water.
- source_word: ἐκώλυσε ... ἀναβλῦσαι ὕδωρ
  chosen: prevented water from springing up
  alternatives:
  - hindered water from gushing forth
  - kept water from rising
  lexicon: LSJ
  rationale: This preserves both the divine action and the vivid verb of water emerging,
    while remaining readable.
- source_word: περιποίησις
  chosen: be preserved
  alternatives:
  - be kept safe
  - be saved
  lexicon: LSJ
  rationale: The sense is providential preservation of Joseph in the pit. 'Be preserved'
    keeps the formal, providential tone without overinterpreting as full salvation.
- source_word: τιμή
  chosen: price
  alternatives:
  - payment
  - value
  lexicon: LSJ
  rationale: In context it refers to the money received for Joseph. 'Price' is the
    most direct rendering and fits the repeated moral emphasis on his sale.
- source_word: ὑποδήματα
  chosen: sandals
  alternatives:
  - shoes
  - footwear
  lexicon: LSJ
  rationale: The term in the legal allusion to Deuteronomy is specifically sandal/footwear.
    'Sandals' preserves the biblical-cultural resonance.
- source_word: καταπατήσωμεν
  chosen: let us trample it underfoot
  alternatives:
  - let us tread on it
  - let us cast it down
  lexicon: LSJ
  rationale: The verb is forceful and contemptuous. 'Trample it underfoot' best conveys
    the symbolic rejection of blood-money.
- source_word: ἀναστῆσαι σπέρμα
  chosen: raise up seed
  alternatives:
  - raise up offspring
  - produce descendants
  lexicon: LSJ
  rationale: This is a fixed legal-biblical expression from levirate law. 'Raise up
    seed' preserves the scriptural register; modern readers can infer the sense from
    context.
- source_word: ὑπολύεσθαι ... τὸ ὑπόδημα
  chosen: his sandal shall be removed
  alternatives:
  - his shoe shall be loosed
  - they shall take off his sandal
  lexicon: LSJ
  rationale: The passive-like legal formulation suits the citation of law and echoes
    the symbolic act in Deuteronomy 25.
- source_word: ζωὴν ἀδελφοῦ αὐτῶν
  chosen: the life of their brother
  alternatives:
  - life for their brother
  - offspring for their brother
  lexicon: LSJ
  rationale: The Greek witness appears to adapt the levirate formula in a morally
    charged way. I render the extant wording transparently rather than normalizing
    it to 'seed/offspring,' while noting the legal background elsewhere.
- source_word: ὑπέλυσεν
  chosen: removed
  alternatives:
  - loosed
  - took off
  lexicon: LSJ
  rationale: The verb continues the sandal-removal motif from the law citation. 'Removed'
    is clear and preserves the symbolic correspondence.
- source_word: παῖδες
  chosen: attendants
  alternatives:
  - servants
  - boys
  lexicon: LSJ
  rationale: In a royal Egyptian setting, 'attendants' fits the courtly context better
    than 'boys' and avoids overcommitting to slave-status where the narrative emphasis
    is functional.
- source_word: κατὰ τὸν τύπον βασιλέως
  chosen: in the manner of those before King Pharaoh
  alternatives:
  - according to the custom before King Pharaoh
  - after the fashion of the king Pharaoh
  lexicon: LSJ
  rationale: τύπος here points to customary form or pattern. The chosen rendering
    communicates court protocol in natural English.
- source_word: ἐνεπτύσθησαν
  chosen: they were also spat upon
  alternatives:
  - they were spit on
  - they were spat at
  lexicon: LSJ
  rationale: The passive preserves the humiliation motif and echoes the legal citation
    about spitting in the face.
