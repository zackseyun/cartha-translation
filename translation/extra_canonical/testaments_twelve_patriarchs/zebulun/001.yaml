theological_decisions:
- issue: Prophetic denunciation of Zebulun's descendants and the role of Levi and
    Judah
  chosen_reading: Translated the warning straightforwardly as a future departure from
    the Lord, provocation of Levi, and opposition to Judah, with Levi and Judah preserved
    as divinely guided leaders.
  alternative_readings:
  - A more generalized moral warning without tribal-political specificity
  - A heavily harmonized messianic reading centered on later interpolation
  rationale: The Greek testamentary prophecy appears to address tribal destiny in
    concrete terms. The translation preserves that specificity and does not smooth
    it into generic exhortation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Divine reciprocity in mercy
  chosen_reading: 'Rendered the chapter''s ethic as reciprocal compassion: human mercy
    answered by the Lord''s mercy.'
  alternative_readings:
  - A purely sapiential principle of social reciprocity
  - A more sacramental or covenantal formulation
  rationale: The Greek repeatedly links Zebulun's compassion with divine response.
    The translation keeps both ethical and theological dimensions without over-systematizing
    them.
  doctrine_reference: Consistency of key terms, or documented exception.
