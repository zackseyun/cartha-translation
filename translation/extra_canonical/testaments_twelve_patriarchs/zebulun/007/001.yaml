translation:
  text: 1. Therefore, my children, have compassion in mercy toward every person, so
    that the Lord also may have compassion in mercy toward you. 2. Because in the
    last days you also will send forth your compassion upon the earth, and wherever
    the Most High finds a heart of compassion, there he dwells. 3. For in the measure
    that a man has compassion on his neighbors, so also the Lord has compassion on
    him. 4. And when we came down into Egypt, Joseph my brother tested us, and he
    learned that I was compassionate. 5. For when I sat by him, I did not grieve him
    with envy, and I did not speak bitterly against him. 6. And after these things,
    my children, I urge you not to hold malice in your hearts against one another,
    and to love one another in deed and in word. 7. For in the presence of my father
    I spoke peaceably to Joseph; and when I had gone out, Dan told us that the prince
    of the eunuchs was seeking to destroy him, because he had become attached to him
    as a pure and good young man. 8. But I wept over Joseph, and I prayed for him,
    that the Lord would deliver him from every evil intention. 9. And afterward the
    Ishmaelites came and took him away, and they persuaded him to go with them, and
    they sold him to Potiphar in Egypt. 10. But because of the compassion that I had
    shown to my brother, the Lord did not let me fall into the same testing. 11. And
    when all my brothers were sick, and our father was grieving because of them, I
    had compassion on every poor man and every sick man, and I gave to all in simplicity
    of heart. 12. And if I had nothing to give to the needy, I walked with him for
    seven stadia, weeping with him in mercy. 13. Therefore, my children, have compassion
    in mercy toward every person with a good heart, so that God also may give you
    compassion and mercy. 14. For if a man does not have compassion on his neighbor,
    he provokes the Lord. 15. And if he hardens his heart, and does not have compassion
    on his neighbor, and does not help the poor, the Lord will judge him. 16. For
    throughout all my life I did not walk in crookedness, but in all simplicity. 17.
    I did not set my mind on silver or gold, or on any glory of men. 18. I did not
    wear a double face. 19. I did not devise evil against my neighbor. 20. I did not
    corrupt my speech with many-colored words. 21. I walked with all men in simplicity
    of heart. 22. Therefore, my children, do you also have these things, and every
    spirit of Beliar will flee from you, and no deed of wicked men will rule over
    you; and every wild beast you will master, since you have with you the God of
    heaven and earth and walk with men in simplicity of heart. 23. And after he had
    said these things, he commanded them to carry his body to Hebron and to bury it
    with his fathers. 24. And when he had fallen asleep at a good old age, his sons
    laid him in a coffin. 25. And afterward they carried him up to Hebron and buried
    him with his fathers.
