translation:
  text: 1 Therefore pay attention to the waters, and understand that when they move
    to one place, they carry down stones, wood, earth, and various other things. 2
    But if they are divided into many streams, the ground swallows them up, and they
    become easy to despise. 3 So also you, if you are divided, will become like this.
    4 Therefore do not be split under two heads, for everything that the Lord made
    has one head, and two shoulders, two hands, two feet, and all the other members.
    5 For I have learned from the writings of my fathers that you will be divided
    in Israel, and you will follow two kingdoms, and you will do every abomination.
    6 And your enemies will take you captive, and you will be afflicted among the
    nations with many weaknesses and distresses. 7 And after these things, when you
    remember the Lord, you will return, and he will have mercy on you, because he
    is merciful and compassionate, and he does not reckon wickedness against the sons
    of men, because they are flesh and go astray in their evil deeds. 8 And after
    these things the Lord himself will rise for you, the light of righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some witnesses read, 'you will remember the Lord and repent, and he will
      turn you back,' instead of 'when you remember the Lord, you will return.'
    reason: textual_variant
  - marker: b
    text: 'Some witnesses expand the reason clause: ''because they are flesh and the
      spirits of error lead them astray in all their deeds.'''
    reason: textual_variant
  - marker: c
    text: Or 'will dawn for you'; the image is of the Lord appearing like rising light.
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε
  chosen: pay attention
  alternatives:
  - take heed
  - watch
  lexicon: BDAG
  rationale: Keeps the force of direct exhortation in readable English without sounding
    archaic.
- source_word: ἐπὶ τὰ ὕδατα
  chosen: to the waters
  alternatives:
  - upon the waters
  - at the waters
  lexicon: LSJ
  rationale: Natural English for the object of observation while preserving the image
    of flowing waters.
- source_word: πορεύονται ἐπὶ τὸ αὐτό
  chosen: move to one place
  alternatives:
  - go together
  - come together
  lexicon: BDAG
  rationale: Conveys convergence into a single course, which drives the comparison
    about unity.
- source_word: κατασύρουσιν
  chosen: carry down
  alternatives:
  - drag along
  - sweep away
  lexicon: LSJ
  rationale: Represents the downward force of a current without over-dramatizing beyond
    the Greek.
- source_word: διαιρεθῶσιν
  chosen: are divided
  alternatives:
  - are split up
  - are separated
  lexicon: BDAG
  rationale: Maintains the key thematic vocabulary of division used repeatedly in
    the chapter.
- source_word: ἀφανίζει
  chosen: swallows them up
  alternatives:
  - destroys them
  - makes them disappear
  lexicon: LSJ
  rationale: 'The image is concrete: dispersed waters are absorbed by the ground.
    ''Swallows them up'' preserves the metaphorical vividness.'
- source_word: εὐκαταφρόνητα
  chosen: easy to despise
  alternatives:
  - easily disregarded
  - contemptible
  lexicon: LSJ
  rationale: Preserves the idea of becoming negligible or contemptible once divided.
- source_word: χωρισθῆτε ἐν δυσὶ κεφαλαῖς
  chosen: be split under two heads
  alternatives:
  - be divided into two leaders
  - be separated under two heads
  lexicon: LSJ
  rationale: Retains the bodily-political metaphor of 'heads' rather than flattening
    it into generic leadership language.
- source_word: κεφαλή
  chosen: head
  alternatives:
  - leader
  lexicon: BDAG
  rationale: The surrounding body imagery requires the literal metaphor 'head' in
    English.
- source_word: γραφῇ τῶν πατέρων μου
  chosen: the writings of my fathers
  alternatives:
  - the scripture of my fathers
  - the record of my fathers
  lexicon: BDAG
  rationale: A transparent rendering that does not overstate canonical status while
    preserving ancestral authority.
- source_word: ἐξακολουθήσετε
  chosen: you will follow
  alternatives:
  - you will go after
  - you will align yourselves with
  lexicon: BDAG
  rationale: Simple and direct; fits the prophetic warning about allegiance to divided
    kingdoms.
- source_word: βδέλυγμα
  chosen: abomination
  alternatives:
  - detestable thing
  lexicon: BDAG
  rationale: Standard strong rendering for morally and cultically abhorrent acts.
- source_word: κακωθήσεσθε
  chosen: you will be afflicted
  alternatives:
  - you will suffer mistreatment
  - you will be oppressed
  lexicon: BDAG
  rationale: Broad enough to cover the ensuing phrase about sufferings among the nations.
- source_word: ἀσθενείαις
  chosen: weaknesses
  alternatives:
  - infirmities
  - sicknesses
  lexicon: BDAG
  rationale: Keeps the term broad, since the context may include bodily and communal
    frailty under exile.
- source_word: θλίψεσιν
  chosen: distresses
  alternatives:
  - tribulations
  - afflictions
  lexicon: BDAG
  rationale: Readable modern English that still preserves the weight of suffering.
- source_word: μνησθέντες Κύριον
  chosen: when you remember the Lord
  alternatives:
  - having remembered the Lord
  - after remembering the Lord
  lexicon: BDAG
  rationale: Expresses the participial sense naturally in English and preserves the
    covenantal turn toward God.
- source_word: ἐπιστρέψετε
  chosen: you will return
  alternatives:
  - you will turn back
  - you will repent
  lexicon: BDAG
  rationale: In this context the verb denotes returning to the Lord; 'return' preserves
    the relational and covenantal sense without importing a narrower penitential gloss.
- source_word: ἐλεήσει
  chosen: he will have mercy on
  alternatives:
  - he will show mercy to
  lexicon: BDAG
  rationale: Standard rendering for divine mercy language.
- source_word: εὔσπλαγχνος
  chosen: compassionate
  alternatives:
  - tenderhearted
  - full of compassion
  lexicon: BDAG
  rationale: Natural modern English paired with 'merciful' to preserve the double
    description of God's character.
- source_word: οὐ λογίζεται κακίαν
  chosen: he does not reckon wickedness
  alternatives:
  - he does not count evil
  - he does not impute wrongdoing
  lexicon: BDAG
  rationale: Keeps the accounting metaphor of λογίζομαι while remaining readable.
- source_word: υἱοῖς τῶν ἀνθρώπων
  chosen: the sons of men
  alternatives:
  - human beings
  - the children of men
  lexicon: BDAG
  rationale: Preserves the elevated testamentary register and traditional anthropological
    expression.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - mere flesh
  - human frailty
  lexicon: BDAG
  rationale: The text grounds divine mercy in human creatureliness; 'flesh' preserves
    the theological texture.
- source_word: πλανῶνται
  chosen: go astray
  alternatives:
  - are led astray
  - wander
  lexicon: BDAG
  rationale: A clear rendering of moral wandering that fits the paraenetic tone.
- source_word: ἀνατελεῖ
  chosen: will rise
  alternatives:
  - will dawn
  - will spring up
  lexicon: LSJ
  rationale: Works naturally with the following image 'light of righteousness' and
    preserves the dawning metaphor.
- source_word: φῶς δικαιοσύνης
  chosen: the light of righteousness
  alternatives:
  - a light of righteousness
  - the light of justice
  lexicon: BDAG
  rationale: Retains the elevated prophetic image and follows the project's default
    preference for 'righteousness' for δικαιοσύνη.
