theological_decisions:
- issue: Verse 7 textual variation in the repentance/return sequence
  chosen_reading: Translate the main witness as 'when you remember the Lord, you will
    return, and he will have mercy on you.'
  alternative_readings:
  - '''you will remember the Lord and repent, and he will turn you back'''
  rationale: The Greek witnesses vary between remembering plus returning and remembering
    plus repenting with God restoring them. The main text follows the base witness
    supplied, while the alternative is preserved in a footnote because it affects
    nuance but not the overall restoration theme.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    alternatives in notes.
- issue: Verse 7 cause of human wandering
  chosen_reading: 'Translate the base text''s simpler reading: ''because they are
    flesh and go astray in their evil deeds.'''
  alternative_readings:
  - '''because they are flesh and the spirits of error lead them astray in all their
    deeds'''
  rationale: The supplied Greek presents two forms, one simpler and one expanded with
    'spirits of error.' The main text follows the base reading and notes the expanded
    alternative as a textual variant, avoiding silent harmonization or doctrinal overdevelopment.
  doctrine_reference: Translate what is in the Greek witness honestly, and use notes
    for probable expansions.
- issue: Verse 8 'light of righteousness'
  chosen_reading: Retain the phrase as a divine saving image referring to the Lord
    himself rising for the people.
  alternative_readings:
  - Interpret as a messianic title
  - Interpret as a general metaphor of restoration
  rationale: The Greek says 'the Lord himself will rise for you, the light of righteousness.'
    Because the phrase can bear heightened theological resonance, the translation
    preserves the wording without narrowing it to a later doctrinal interpretation
    in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
