translation:
  text: 'After he had been thrown into the pit, my brothers sat down to eat and drink.
    But I, having compassion for Joseph, did not eat; for I kept watch by the pit,
    because Judah feared that Simeon and Gad might leap up and kill him. And when
    they saw that I also was not eating, they set me to guard him until he was sold.
    He spent three days and three nights in the pit, and so he was sold while fasting.


    When Reuben came and heard that he had been sold while he was away, he tore his
    garments and mourned, saying, “How shall I look upon the face of my father Jacob?”
    And taking the silver, he ran after the merchants, but found no one; for they
    had left the main road and gone by a shorter route through the Troglodytes. Reuben
    was grieved, and on that day he ate no bread.


    Then Dan came up to him and said, “Do not weep or be distressed; for we have found
    what we shall say to our father. Let us slaughter a male goat with the sword,
    stain Joseph’s tunic, and send it to Jacob our father, saying, ‘Look whether this
    is the tunic of your son.’” And they did so. Therefore Jacob bewailed Joseph all
    his days.


    And my brothers were afraid, and they all repented because of what they had done
    to Joseph. But the Egyptians and the Ishmaelites did him no harm, because the
    Lord did not allow them to do evil to him.


    For he was a handsome man, good-looking and beautiful in appearance, and there
    was no spite in him, but he was gentle and had a simple soul. Therefore be compassionate,
    my children, because compassion is good for all. And mercy, even if a man is a
    sinner, if he has compassion, the Lord will count it as righteousness for him.
    And even if he prospers, if he has no compassion, the Lord will destroy him.


    For in the days of famine I remembered the compassion of the Lord, and I gave
    to all the stranger, the fatherless, and the widow. And when I was forty years
    old, I took a wife, for my life had been spent in toil and labor, and because
    of my simplicity I had no wealth. For my father had blessed me, saying, “Your
    sons shall be like a haven for sailors, and like a harbor for ships.”


    And now, my children, I command you: have compassion toward every man with mercy,
    so that the Lord also may have compassion on you. Because in the last days you
    will depart from the Lord, and you will provoke Levi to anger, and you will rise
    up against Judah; but you will not prevail against them, for an angel of the Lord
    will guide them both, because by them Israel will stand.


    And whenever you depart from the Lord, you will walk in every evil and commit
    the abominations of the nations, going astray after women and being enslaved by
    every wickedness while the spirits of deceit work in you. For I have read in the
    writing of Enoch that your sons also will be corrupted in the last days, and will
    commit lawlessness against the sons of Levi, and will sin against Judah. But they
    will not be able to stand against them; for from Levi the Lord will raise up a
    priest, and from Judah a king, God and man. He will save all the nations and the
    race of Israel.


    And now I command you, my children: obey Zebulun your father, and have mercy on
    your neighbors, and compassion on all, not only on men, but also on the cattle.
    For because of this the Lord blessed me, and when all my brothers were sick, I
    remained without sickness; for the Lord knows the intention of each man.


    Have compassion, therefore, in your inward parts, my children, because in whatever
    way a man does to his neighbor, so also the Lord will do to him. For I saw the
    sons of my brothers sickening and dying because they had no compassion; but my
    sons were kept unharmed, as you know. For in the days of Canaan I made no gain
    from a balance of weights, nor did I have in my house a double measure, but all
    my possessions were shared with all in singleness of heart. And I did not remember
    evil against anyone. Even to the age of old age I kept my integrity in all things.


    You also, therefore, my children, keep the law of the Lord, and show mercy to
    your neighbor, and deal compassionately with all, not only with men but also with
    irrational animals. Because of this also I found mercy with the Lord, and all
    men blessed me, and the Lord increased my goods a thousandfold. For the compassionate
    man does good to his own soul.


    Know, therefore, my children, that in the last times you will depart from the
    Lord, and you will be divided in Israel, and you will follow two evils, and you
    will not be found in the assembly of the righteous. But after these things the
    Lord himself will arise for you, the light of righteousness, and he will heal
    and save all. And he will bring back the captives from Beliar, and he will turn
    disobedient hearts to the Lord, and he will grant everlasting peace to those who
    call on him.


    And the saints shall rest in Eden, and in the New Jerusalem the righteous shall
    rejoice, and it shall be for the glory of God forever. And Jerusalem shall no
    longer endure desolation, nor shall Israel be led captive; for the Lord will be
    in her midst, dwelling among men, and the Holy One of Israel will reign over them
    in humility and poverty. And whoever believes in him shall reign in truth in the
    heavens.


    And now, my children, fear the Lord your God, and beware of Satan and his spirits.
    Draw near to God and to the angel who intercedes for you, for he is a mediator
    between God and men for the peace of Israel. He will stand against the kingdom
    of the enemy; therefore the enemy is eager to destroy all who call on the Lord.
    For he knows that on the day when Israel repents, the kingdom of the enemy will
    be brought to an end.


    For the angel of peace himself will strengthen Israel, so that it may not fall
    into the extremity of evil. And in the time of Israel’s lawlessness the Lord will
    not abandon them, but will transform them into a nation that does his will; for
    no angel is equal to him. His name is in every place in Israel and among the nations.


    Keep yourselves, therefore, from every evil deed, and cast away hatred and every
    deceit, and love one another in truth and with patience. And the things that I
    have heard from my father, hand on to your children, so that the Savior of the
    nations may receive you; for he is gentle and humble, and by his own example he
    teaches the law of God.


    Flee, therefore, from all unrighteousness, and cling to the righteousness of the
    law of the Lord, and your seed will be forever, and you will be blessed in all
    your generations.


    And after he had commanded them these things, he stretched out his feet and died
    in a good old age. And his sons laid him in a coffin. Later they carried him up
    to Hebron and buried him with his fathers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek witness varies between 'after he had been sold' and 'after he had
      been thrown into the pit'; the broader sense of the scene is preserved here
      from the fuller reading.
    reason: textual_variant
  - marker: b
    text: Some witnesses include Dan among those Judah feared might kill Joseph; others
      read Simeon and Gad only.
    reason: textual_variant
  - marker: c
    text: '''Troglodytes'' is the Greek ethnonym, literally associated with cave-dwellers;
      it likely refers to a people or region on a shorter trade route.'
    reason: cultural_note
  - marker: d
    text: The chapter from this point is textually fuller in the wider Greek tradition
      than in the abridged OCR excerpt at the head of the page sequence; the translation
      follows the fuller continuous chapter attested in the Greek witness tradition
      represented by Charles’s edition.
    reason: textual_variant
  - marker: e
    text: The phrase 'from Levi ... a priest, and from Judah a king, God and man'
      is often regarded by scholars as reflecting later Christian expansion, but it
      is translated here because it stands in the Greek witness.
    reason: alternative_reading
  - marker: f
    text: '''A double measure'' likely refers to dishonest commercial practice: using
      unequal measures in trade.'
    reason: cultural_note
  - marker: g
    text: '''Beliar'' reflects the Greek form of the name; many English readers know
      the form ''Belial.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: σπλαγχνιζόμενος
  chosen: having compassion
  alternatives:
  - being moved with pity
  - feeling deep compassion
  lexicon: LSJ
  rationale: Preserves the visceral mercy language characteristic of testamentary
    exhortation and connects with the chapter’s repeated compassion theme.
- source_word: τηρεῖν
  chosen: guard
  alternatives:
  - keep watch over
  - watch
  lexicon: LSJ
  rationale: In context of the pit and Joseph’s danger, 'guard' best conveys active
    protective watching.
- source_word: ἐπράθη
  chosen: was sold
  alternatives:
  - was handed over
  lexicon: LSJ
  rationale: The commercial sense is explicit in the Joseph narrative and should remain
    concrete.
- source_word: ἄσιτος
  chosen: while fasting
  alternatives:
  - without food
  - unfed
  lexicon: LSJ
  rationale: Captures the state of going without food in a way that reads naturally
    in English while preserving the pathos.
- source_word: περισχισάμενος / περιεσχίσατο
  chosen: tore his garments
  alternatives:
  - rent his clothes
  lexicon: LSJ
  rationale: Traditional mourning gesture; 'garments' keeps elevated register without
    archaism.
- source_word: Τρωγλοδύτων
  chosen: the Troglodytes
  alternatives:
  - cave-dwellers
  lexicon: LSJ
  rationale: Retains the ethnonym in the Greek witness; a note explains the cultural
    reference.
- source_word: μολύνωμεν
  chosen: stain
  alternatives:
  - defile
  - soil
  lexicon: LSJ
  rationale: In the immediate context of blood on a tunic, 'stain' is the most concrete
    and idiomatic rendering.
- source_word: μετενόησαν
  chosen: repented
  alternatives:
  - changed their minds
  - felt remorse
  lexicon: LSJ
  rationale: Specific-sin context fits the project rule favoring 'repented' rather
    than a more cognitive gloss.
- source_word: ἁπλότης / ἁπλοῦς
  chosen: simplicity / simple
  alternatives:
  - sincerity
  - guilelessness
  - singleness
  lexicon: LSJ
  rationale: Zebulun’s virtue theme in this testament is straightforwardness and uncalculating
    generosity; 'simplicity' preserves that thematic thread.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - compassion
  - kindness
  lexicon: LSJ
  rationale: Kept distinct from σπλάγχνα-compassion where possible, preserving the
    chapter’s paired virtue vocabulary.
- source_word: λογιεῖται εἰς δικαιοσύνην
  chosen: will count it as righteousness
  alternatives:
  - reckon it as righteousness
  lexicon: LSJ
  rationale: Uses accessible English while preserving the theological accounting idiom.
- source_word: ἀλλότριος
  chosen: stranger
  alternatives:
  - foreigner
  - outsider
  lexicon: LSJ
  rationale: Fits the triad 'stranger, fatherless, widow' familiar from Jewish ethical
    tradition.
- source_word: λιμήν
  chosen: harbor
  alternatives:
  - haven
  - port
  lexicon: LSJ
  rationale: Used alongside nautical imagery; 'harbor' is clear modern English while
    preserving the blessing image.
- source_word: πνεύματα τῆς πλάνης
  chosen: spirits of deceit
  alternatives:
  - spirits of error
  - deceiving spirits
  lexicon: LSJ
  rationale: Conveys active misleading spiritual influence in elevated but readable
    English.
- source_word: ἱερέα
  chosen: a priest
  alternatives:
  - priestly ruler
  lexicon: LSJ
  rationale: The noun is straightforward; expansion beyond 'priest' would over-interpret.
- source_word: βασιλέα
  chosen: a king
  alternatives:
  - royal ruler
  lexicon: LSJ
  rationale: Maintains the Levi/Judah priest-king parallelism.
- source_word: κτήνεσιν / ἀλόγοις
  chosen: cattle / irrational animals
  alternatives:
  - beasts
  - animals without speech
  lexicon: LSJ
  rationale: Preserves the text’s extension of mercy beyond humans; 'irrational animals'
    reflects the Greek contrast with humans.
- source_word: ζυγὸς στάθμιων
  chosen: a balance of weights
  alternatives:
  - scales
  - weighing balance
  lexicon: LSJ
  rationale: Keeps the commercial honesty setting explicit.
- source_word: δίμετρον
  chosen: a double measure
  alternatives:
  - false measure
  - twofold measure
  lexicon: LSJ
  rationale: Likely refers to dishonest measuring practice; 'double measure' preserves
    the literal image and invites note.
- source_word: φῶς δικαιοσύνης
  chosen: the light of righteousness
  alternatives:
  - light of justice
  lexicon: LSJ
  rationale: Retains the prophetic metaphor and aligns with the project’s default
    preference for 'righteousness' where theological resonance is strong.
- source_word: Βελιάρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: LSJ
  rationale: Transliterates the form reflected in the Greek witness rather than normalizing
    to a more familiar English form.
- source_word: μεσίτης
  chosen: mediator
  alternatives:
  - go-between
  - intercessor
  lexicon: LSJ
  rationale: Best matches the explicit between-parties role described in the clause
    'between God and men.'
- source_word: ἄγγελος εἰρήνης
  chosen: angel of peace
  alternatives:
  - messenger of peace
  lexicon: LSJ
  rationale: Given the apocalyptic-personal context, 'angel' is preferable to the
    more generic 'messenger'.
- source_word: σωτὴρ τῶν ἐθνῶν
  chosen: Savior of the nations
  alternatives:
  - deliverer of the Gentiles
  lexicon: LSJ
  rationale: Preserves the universal scope and elevated messianic tone.
