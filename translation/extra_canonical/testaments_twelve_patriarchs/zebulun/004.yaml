theological_decisions:
- issue: Messianic line 'from Levi ... a priest, and from Judah a king, God and man'
  chosen_reading: Translated as it stands in the Greek witness without softening the
    high christological wording.
  alternative_readings:
  - Treat as later Christian interpolation
  - Render more vaguely as royal-priestly figure
  rationale: The Greek text presented includes explicit exalted language. Transparency
    requires translating it honestly and flagging likely secondary development in
    a note rather than muting it in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    what is in the Greek witness honestly.
- issue: '''Whoever believes in him'' language'
  chosen_reading: Retained as personal trust directed toward the figure described
    in the passage.
  alternative_readings:
  - Generalized to 'trusts in God'
  - Omitted as interpolation
  rationale: The wording in the witness is explicit and should be represented directly,
    with interpolation concerns handled by note rather than suppression.
  doctrine_reference: Original-language primacy over translation tradition; transparency
    around probable expansion.
- issue: Angelic mediator language
  chosen_reading: Rendered distinctly from the Lord and from the messianic figure,
    as 'the angel who intercedes for you' and 'a mediator between God and men.'
  alternative_readings:
  - Identify the angel directly with the Messiah
  - Reduce to a generic heavenly helper
  rationale: The chapter’s discourse distinguishes these figures in sequence; the
    translation preserves that distinction rather than harmonizing theological categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
