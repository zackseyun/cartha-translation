theological_decisions:
- issue: Retributive moral principle in Zebulun 5:3
  chosen_reading: Rendered as 'whatever a person does to his neighbor, so the Lord
    also will do with him.'
  alternative_readings:
  - '''the Lord will do likewise to him'''
  - '''the Lord will deal with him in the same way'''
  rationale: The Greek states a reciprocal moral principle. The translation preserves
    the stark symmetry without softening it into a vague proverb.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
- issue: Ethical scope extending to animals in Zebulun 5:1
  chosen_reading: Included explicit compassion 'also toward unreasoning animals.'
  alternative_readings:
  - '''even toward beasts'''
  - '''also toward animals'''
  rationale: The Greek clearly broadens mercy beyond humans. The translation keeps
    this unusual ethical extension visible rather than generalizing it away.
  doctrine_reference: PHILOSOPHY.md §Original-language primacy over translation tradition
