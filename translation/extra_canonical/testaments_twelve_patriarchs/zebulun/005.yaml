translation:
  text: 'And they said to Jacob, “Recognize, then, whether this is your son’s tunic.”
    And they did so. For they stripped Joseph of the tunic when they were selling
    him, and clothed him in a slave’s garment. And Simeon took the tunic and did not
    want to give it. For he wanted to cut him down with the sword, being angry because
    he had not killed him. But we all rose up and said to him, “If you do not give
    the tunic, we will tell our father that you alone did this evil thing in Israel.”
    And so he gave it to them.


    And now, my children, I command you to guard your neighbor and to have compassion
    toward all, not only among people, but also toward unreasoning animals. For because
    of these things the Lord blessed me, and when all my brothers were sick, I passed
    through without illness. For the Lord knows each person’s purpose. Have mercy,
    therefore, in your inward parts, because whatever a person does to his neighbor,
    so the Lord also will do with him. For the sons of my brothers were sick and were
    dying because of Joseph, because they had not shown mercy in their inward parts;
    but my sons were kept free from sickness, as you know.


    And when I was in the land of Canaan, by the seashore, I used to catch fish for
    Jacob my father, and when many were being choked in the sea, I came through unharmed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'coat' or 'robe' for χιτών; 'tunic' is chosen for greater specificity.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'mercy in your inward parts' reflects the Greek idiom with σπλάγχνα,
      the inner organs as the seat of compassion.
    reason: cultural_note
  - marker: c
    text: The Greek literally says 'I hunted prey,' but the seashore setting suggests
      fishing or catching sea-creatures for his father.
    reason: lexical_alternative
  - marker: d
    text: The final sentence appears to continue beyond the surviving excerpt provided
      here; the translation ends with the extant Greek in the source segment.
    reason: textual_variant
lexical_decisions:
- source_word: χιτών
  chosen: tunic
  alternatives:
  - robe
  - coat
  lexicon: LSJ
  rationale: χιτών denotes the basic garment worn next to the body; 'tunic' is more
    precise than the traditional but less specific 'coat' or 'robe'.
- source_word: πιπράσκειν
  chosen: selling
  alternatives:
  - disposing of
  - selling off
  lexicon: LSJ
  rationale: The participle refers directly to the act of selling Joseph; the straightforward
    commercial sense should be preserved.
- source_word: ἱμάτιον δουλικόν
  chosen: slave’s garment
  alternatives:
  - servile clothing
  - slave clothing
  lexicon: LSJ
  rationale: δουλικός marks what pertains to a slave; given project policy, 'slave'
    is preferred where bonded status is salient.
- source_word: κατακόψαι
  chosen: cut him down
  alternatives:
  - strike down
  - hack to pieces
  lexicon: LSJ
  rationale: The verb is forceful and violent. 'Cut him down' preserves the sword
    imagery without over-specifying dismemberment.
- source_word: φυλάσσει πλησίον
  chosen: guard your neighbor
  alternatives:
  - watch over your neighbor
  - keep your neighbor safe
  lexicon: LSJ
  rationale: φυλάσσειν can mean guard or keep. 'Guard your neighbor' preserves the
    imperative's moral force and compactness.
- source_word: εὐσπλαγχνίαν
  chosen: compassion
  alternatives:
  - tender mercy
  - kindheartedness
  lexicon: LSJ
  rationale: The term denotes heartfelt pity or compassion; 'compassion' is natural
    English and retains ethical weight.
- source_word: ἀλόγοις ζώοις
  chosen: unreasoning animals
  alternatives:
  - irrational animals
  - beasts without reason
  lexicon: LSJ
  rationale: The phrase contrasts humans and non-human creatures; 'unreasoning animals'
    is literal yet readable.
- source_word: προαίρεσιν
  chosen: purpose
  alternatives:
  - intention
  - moral choice
  lexicon: LSJ
  rationale: The word can denote deliberate choice or intention. 'Purpose' captures
    inward moral disposition in context.
- source_word: ἔλεος ἐν σπλάγχνοις
  chosen: mercy in your inward parts
  alternatives:
  - mercy in your heart
  - compassion in your inner being
  lexicon: LSJ
  rationale: σπλάγχνα literally refers to inward parts and idiomatically to deep affections.
    The somewhat concrete rendering preserves the testament's texture and repeated
    phrasing.
- source_word: ἄνοσος
  chosen: without illness
  alternatives:
  - healthy
  - disease-free
  lexicon: LSJ
  rationale: The adjective means free from disease; 'without illness' reads naturally
    while preserving the contrast with sickness.
- source_word: διεφυλάχθησαν
  chosen: were kept free from sickness
  alternatives:
  - were preserved unharmed
  - were protected
  lexicon: LSJ
  rationale: The passive conveys preservation; the surrounding illness language justifies
    making the sphere explicit in English.
- source_word: ἐθήρευον θήραν
  chosen: I used to catch fish
  alternatives:
  - I hunted prey
  - I hunted game
  lexicon: LSJ
  rationale: Although the Greek literally says 'I hunted prey,' the seashore setting
    and following mention of the sea indicate fishing; this is an idiomatic contextual
    rendering rather than a wooden one.
- source_word: ἀγχομένων ἐν τῇ θαλάσσῃ
  chosen: being choked in the sea
  alternatives:
  - being strangled in the sea
  - being in distress at sea
  lexicon: LSJ
  rationale: The participle suggests suffocation or choking. The exact referent is
    difficult, so the rendering stays close to the Greek while leaving the image somewhat
    open.
