translation:
  text: 'A copy of the words of Zebulun, which he spoke to his sons at the end of
    his days, in the one hundred and fourteenth year of his life, two years after
    the death of Joseph.


    And he said to them: Hear me, sons of Zebulun; attend to the words of your father.
    I, Zebulun, was born as a good gift to my parents. For when I was born, my father
    was increased very greatly in flocks and herds, together with the speckled rods.


    I am not aware that I sinned in all my days, except in the matter of ignorance.
    Nor do I remember that I committed any iniquity, except the sin of thought against
    Joseph; and I had compassion on him, because I did not agree with my brothers.


    But I kept watch secretly over what they were doing to him. For when they had
    sold him, they all concealed the price, saying that they had found him dead.


    And Simeon took the garment and would not let me tell our father, because I was
    grieving over Joseph. Then I became sick, and my father was unaware what had happened.


    But I learned that they had agreed upon one hundred pieces, and Simeon took ninety,
    and nine of the brothers took one piece each. But because of my compassion for
    Joseph, they gave me no share of the money.


    And when they came into Egypt, Joseph recognized them, but did not make himself
    known to them.


    Now, my children, I tell you: after I had compassion on Joseph, I was eager that
    all men should have compassion, and I wrote in my heart to show mercy to every
    man, as much as I was able.


    And if anyone is poor, or sick, or old, I would prepare fish for him, and with
    all eagerness and compassion I would share with him what I had.


    So also, if a stranger came, or one who had no friend, I would bring him into
    my house and have compassion on him.


    And if he was in need, I would not send him away empty, but I would give him a
    share of my labor.


    For I had a fishing boat on the sea, and I would catch fish for Jacob my father,
    and all my brothers would eat from what I obtained.


    And all the poor also I would feed from my catch. For the Lord made the fish abound
    in the sea, just as he made the birds abound on the earth.


    For if there is one who does good, the Lord gives him the spirit of compassion
    toward all. So he also gave me compassion, and I had pity on every man.


    And in the days of famine I did not remember my own children, but according to
    the measure of my strength I gave all my produce to the stranger and to the needy.


    And now, my children, I command you: have compassion on every man with mercy,
    so that the Lord also may have compassion on you.


    Because in the last days you also will depart from the Lord, and you will provoke
    Levi to anger, and you will rise up against Judah; but you will not prevail against
    them, because an angel of the Lord will guide them both, for by them Israel will
    stand.


    And whenever you depart from the Lord, you will walk in every evil deed and commit
    the abominations of the nations, going astray after women of lawlessness, while
    the spirits of wickedness work in you with every deceit.


    For I have read in the writing of the fathers that you will depart from the Lord,
    and you will divide yourselves among Israel, and you will not listen to Levi and
    Judah, but will walk according to the wickedness of the nations.


    Therefore you will be scattered among the nations, and you will be few in number
    among Israel.


    But after these things you will remember the Lord and return, and he will have
    mercy on you, and he will bring you back into your land.


    But you will see that he is not merciful to them because of their wickedness,
    but he will scatter them among the nations.


    And now, my children, do not be double-faced, for a double face is an offense
    before the Lord and before men.


    But be compassionate in sincerity of heart, because in whatever a man does, in
    that also he will be repaid.


    And do not set your minds on wealth, nor on the beauty of women, because all wealth
    and beauty will be consumed by wickedness.


    But if a man is compassionate and just, even if he is poor, he has a good name
    before the Lord and before men.


    Know, therefore, my children, that a man who is compassionate has the law of the
    Lord within him.


    For compassion is good in every respect, and it drives away darkness from the
    soul.


    And if a man has no compassion, he has no law in his heart, and he is tormented
    by evil.


    His bowels are without mercy; he is angry at everyone, even if he is rich; he
    has no pity on the poor; he wrongs the one who prospers; he does not acknowledge
    the one who is in distress.


    The compassionate man, even if he is weak, has strength in the Lord; and even
    if he is poor, he enriches many; and though he lacks beauty, he has a beautiful
    appearance in the goodness of his heart.


    Therefore, my children, have compassion in your hearts, because according as a
    man shows compassion to his neighbor, so also the Lord will do to him.


    For when my sons came to me and asked for mercy, I showed compassion to them,
    and I blessed them. And after this I slept with my fathers.'
