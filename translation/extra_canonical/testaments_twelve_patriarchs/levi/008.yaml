theological_decisions:
- issue: Prophecy of the 'third' division and the king from Judah establishing 'a
    new priesthood'
  chosen_reading: Translated the Greek witness straightforwardly as a future royal
    figure from Judah who establishes 'a new priesthood' for all the nations.
  alternative_readings:
  - A purely Hasmonean or historical-political reference
  - A later Christian interpolation referring to the Messiah/Christ
  - A generalized eschatological ruler without specific sectarian identification
  rationale: The Greek text explicitly mentions a king from Judah, a new priesthood,
    and all the nations. The translation preserves this tension without harmonizing
    it to later doctrinal categories in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: παρουσία in verse 15
  chosen_reading: Rendered as 'presence' rather than 'coming.'
  alternative_readings:
  - coming
  - appearing
  rationale: The term can denote arrival or presence. 'Presence' preserves ambiguity
    and avoids prematurely fixing the prophecy to a later technical eschatological
    sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Cultic meal language in verse 5
  chosen_reading: Rendered as 'fed me holy bread and wine' without sacramental capitalization
    or eucharistic interpretation.
  alternative_readings:
  - Read as anticipatory eucharistic symbolism
  - Render more generically as ritual food and drink
  rationale: The Greek describes a consecratory feeding with holy bread and wine.
    The translation keeps the cultic imagery while avoiding doctrinal overreading
    in the main text.
  doctrine_reference: Original-language primacy over translation tradition.
