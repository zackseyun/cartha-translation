translation:
  text: '1 And there again I saw a vision like the former one, after we had remained
    there seventy days. 2 And I saw seven men in white clothing, saying to me, “Rise,
    put on the robe of the priesthood, and the crown of righteousness, and the oracle
    of understanding, and the full-length robe of truth, and the plate of faith, and
    the turban of the head, and the ephod of prophecy.” 3 And each one of them was
    carrying these things, and they put them on me and said to me, “From now on, become
    a priest—you and all your seed.”


    4 And the first anointed me with holy oil and gave me a priestly staff. 5 And
    the second washed me with pure water of the Lord, and fed me holy bread and wine,
    and put around me a holy and glorious robe. 6 And the third put on me a linen
    garment, like an ephod. 7 And the fourth wrapped around me a girdle, like purple.
    8 And the fifth gave me a branch of rich olive. 9 And the sixth placed a crown
    on my head. 10 And the seventh put on me a diadem of priesthood and filled my
    hands with incense, so that I might serve as priest before the Lord God.


    11 And they say to me, “Levi, your seed will be divided into three offices, for
    a sign of the glory of the Lord who is coming. 12 And the first lot will be great;
    none will arise greater than it. 13 And the second will be in priesthood. 14 And
    the third will be called by a new name, because a king will arise from Judah and
    will establish a new priesthood, after the pattern of the nations, for all the
    nations. 15 And his presence is beloved, like a prophet of the Most High, from
    the seed of Abraham our father. 16 Therefore every desirable thing in Israel will
    be for you and for your seed, and your seed will eat every beautiful thing, and
    will apportion the table of the Lord. 17 And from among them there will be priests
    and judges and scribes, and by their mouth the holy thing will be received.”


    18 So when I awoke, I understood that this was like the first vision.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'breastpiece of understanding' for 'oracle of understanding'; the Greek
      λόγιον may evoke a priestly oracular object.
    reason: lexical_alternative
  - marker: b
    text: Some witnesses read 'staff of judgment' instead of 'branch of rich olive'
      in verse 8.
    reason: textual_variant
  - marker: c
    text: 'Or ''coming'' in verse 15: the Greek παρουσία can mean ''presence,'' ''arrival,''
      or ''coming.'''
    reason: lexical_alternative
  - marker: d
    text: The prophecy of a king from Judah who establishes 'a new priesthood' may
      reflect a complex transmission history; the translation follows the Greek witness
      as given.
    reason: textual_variant
lexical_decisions:
- source_word: ὅραμα
  chosen: vision
  alternatives:
  - appearance
  - revelation
  lexicon: LSJ
  rationale: Standard rendering in apocalyptic/testamentary context; preserves visionary
    register without overinterpreting.
- source_word: ἐσθῆτι λευκῇ
  chosen: white clothing
  alternatives:
  - white garments
  - white robe
  lexicon: LSJ
  rationale: Keeps the plural/singular clothing expression natural in English while
    preserving the symbolic whiteness.
- source_word: στολή τῆς ἱερατείας
  chosen: robe of the priesthood
  alternatives:
  - priestly robe
  - garment of priesthood
  lexicon: LSJ
  rationale: Retains the genitival dignity and ceremonial tone of investiture language.
- source_word: στέφανον τῆς δικαιοσύνης
  chosen: crown of righteousness
  alternatives:
  - wreath of righteousness
  lexicon: LSJ
  rationale: Crown is more intelligible in English and fits the exalted priestly-apocalyptic
    imagery.
- source_word: λόγιον τῆς συνέσεως
  chosen: oracle of understanding
  alternatives:
  - breastpiece of understanding
  - oracular piece of understanding
  lexicon: LSJ
  rationale: λόγιον can denote an oracular object/utterance; in priestly context it
    likely gestures toward the sacred breastpiece, but 'oracle' preserves the revelatory
    nuance of the Greek witness.
- source_word: ποδήρη τῆς ἀληθείας
  chosen: full-length robe of truth
  alternatives:
  - long robe of truth
  lexicon: LSJ
  rationale: ποδήρης denotes a robe reaching the feet; 'full-length robe' is clear
    and concrete.
- source_word: πέταλον τῆς πίστεως
  chosen: plate of faith
  alternatives:
  - frontlet of faith
  - gold plate of faith
  lexicon: LSJ
  rationale: πέταλον in priestly dress refers to the plate/frontlet; 'plate' is concise
    and avoids adding 'gold' not explicit here.
- source_word: μίτραν τῆς κεφαλῆς
  chosen: turban of the head
  alternatives:
  - head-turban
  - mitre
  lexicon: LSJ
  rationale: Avoids ecclesiastical jargon 'mitre' while preserving the priestly headgear
    image.
- source_word: ἐφοὺδ τῆς προφητείας
  chosen: ephod of prophecy
  alternatives:
  - priestly vest of prophecy
  lexicon: LSJ
  rationale: Ephod is a culturally specific priestly term best transliterated; the
    genitive is preserved.
- source_word: γενοῦ εἰς ἱερέα
  chosen: become a priest
  alternatives:
  - be a priest
  lexicon: LSJ
  rationale: Captures the ingressive force of γενοῦ in an investiture scene.
- source_word: ἤλειψέ με ἐλαίῳ ἁγίῳ
  chosen: anointed me with holy oil
  alternatives:
  - smeared me with holy oil
  lexicon: BDAG
  rationale: Standard cultic English for consecratory anointing.
- source_word: ὕδατι κυρίου καθαρῷ
  chosen: pure water of the Lord
  alternatives:
  - the Lord’s pure water
  - clean water of the Lord
  lexicon: LSJ
  rationale: Keeps the unusual genitival expression visible rather than smoothing
    it away.
- source_word: ἐψώμισέν με ἄρτον καὶ οἶνον ἅγιον
  chosen: fed me holy bread and wine
  alternatives:
  - gave me holy bread and wine to eat
  lexicon: LSJ
  rationale: The verb implies feeding; this preserves the ritual meal imagery without
    importing later sacramental phrasing.
- source_word: βυσσίνην
  chosen: linen garment
  alternatives:
  - fine linen
  lexicon: LSJ
  rationale: Conveys the material clearly in context of vesting.
- source_word: ζώνην
  chosen: girdle
  alternatives:
  - belt
  - sash
  lexicon: LSJ
  rationale: Keeps elevated ceremonial diction appropriate to priestly attire.
- source_word: κλάδον ... ἐλαίας πιότητος
  chosen: branch of rich olive
  alternatives:
  - olive branch of richness
  - fruitful olive branch
  lexicon: LSJ
  rationale: The phrase is textually difficult; this rendering stays close to the
    Greek image without overexplaining. A variant is noted.
- source_word: διάδημα ἱερατείας
  chosen: diadem of priesthood
  alternatives:
  - priestly diadem
  - headband of priesthood
  lexicon: LSJ
  rationale: Preserves regal-priestly solemnity in the investiture sequence.
- source_word: ἐπλήρωσε τὰς χεῖράς μου θυμιάματος
  chosen: filled my hands with incense
  alternatives:
  - consecrated my hands with incense
  lexicon: LSJ
  rationale: A literal rendering keeps the ordination idiom visible; the purpose clause
    explains priestly service.
- source_word: διαιρεθήσεται
  chosen: will be divided
  alternatives:
  - will be apportioned
  lexicon: BDAG
  rationale: Straightforward rendering of the future passive in the prophecy about
    Levi's seed.
- source_word: ἀρχὰς
  chosen: offices
  alternatives:
  - ranks
  - orders
  - beginnings
  lexicon: LSJ
  rationale: In context of division of Levi's descendants, 'offices' best captures
    functional distinctions without forcing a technical later hierarchy.
- source_word: κλῆρος
  chosen: lot
  alternatives:
  - portion
  - share
  lexicon: LSJ
  rationale: Retains the traditional apportionment language of inheritance and assigned
    role.
- source_word: ὄνομα καινόν
  chosen: a new name
  alternatives:
  - new title
  lexicon: BDAG
  rationale: Preserves the prophetic idiom and possible allusive force.
- source_word: ἱερατείαν νέαν
  chosen: a new priesthood
  alternatives:
  - a new priestly order
  lexicon: LSJ
  rationale: Direct rendering of the phrase; avoids importing later doctrinal systems
    while preserving the striking claim.
- source_word: κατὰ τὸν τύπον τῶν ἐθνῶν
  chosen: after the pattern of the nations
  alternatives:
  - according to the model of the nations
  lexicon: LSJ
  rationale: Keeps the comparative/formal sense of τύπος and the surprising universalizing
    note.
- source_word: παρουσία
  chosen: presence
  alternatives:
  - coming
  - appearing
  lexicon: BDAG
  rationale: Presence best preserves ambiguity between arrival and manifested presence;
    a footnote notes the alternative.
- source_word: ἐπιθυμητόν
  chosen: desirable thing
  alternatives:
  - precious thing
  - delightful thing
  lexicon: LSJ
  rationale: Maintains the broad sense of what is desirable/choice in Israel.
- source_word: τὴν τράπεζαν Κυρίου διανεμεῖται
  chosen: will apportion the table of the Lord
  alternatives:
  - will distribute the Lord’s table
  - will administer the table of the Lord
  lexicon: LSJ
  rationale: The verb suggests distribution/apportionment; this fits priestly administration
    of sacred provisions.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - secretaries
  - teachers of the law
  lexicon: BDAG
  rationale: Scribes is the most direct and historically recognizable rendering.
- source_word: ἐπὶ στόματος αὐτῶν ληφθήσεται τὸ ἅγιον
  chosen: by their mouth the holy thing will be received
  alternatives:
  - at their word the holy thing will be taken
  - through their utterance the sanctuary matter will be received
  lexicon: LSJ
  rationale: The phrase is difficult; this rendering stays close to the Greek and
    leaves the exact institutional nuance open rather than overdefining it.
