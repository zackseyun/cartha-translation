theological_decisions:
- issue: Conditional appeal to the patriarchs as grounds for mercy
  chosen_reading: The text is rendered straightforwardly as saying mercy would come
    only because of Abraham, Isaac, and Jacob our fathers.
  alternative_readings:
  - A looser paraphrase making the patriarchs merely examples of faithfulness
  - A softened reading that avoids their intercessory or covenantal role
  rationale: The Greek directly grounds surviving mercy in the patriarchal fathers.
    The translation preserves that covenantal logic without doctrinal smoothing.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve
    it
- issue: Scope of judgment in 'everlasting shame'
  chosen_reading: The phrase is translated as enduring covenantal shame under God's
    judgment, without specifying later doctrinal categories beyond the text.
  alternative_readings:
  - A narrower historical disgrace only
  - A fully developed eschatological damnation reading
  rationale: The Greek supports severe and enduring divine judgment, but the chapter
    itself does not require a more systematized doctrinal expansion.
  doctrine_reference: DOCTRINE.md § Original-language primacy over translation tradition
