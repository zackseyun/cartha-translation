translation:
  text: 'And now I know that for seventy weeks you will go astray, and you will profane
    the priesthood and defile the altars. And you will set aside the law and treat
    the words of the prophets with contempt in evil perversity. You will persecute
    righteous men, and you will hate the godly; you will loathe the words of the truthful.


    And a man who renews the law in the power of the Most High you will call a deceiver,
    and at last you will rush to kill him, not knowing his stature, taking innocent
    blood upon your heads in wickedness.


    But I tell you that because of him your holy places will be laid waste to the
    ground. And no clean place will remain for you, but you will be among the nations
    of the earth for a curse and for scattering, until he himself visits again and
    shows compassion and receives you.'
