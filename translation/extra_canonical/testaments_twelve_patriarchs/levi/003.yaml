theological_decisions:
- issue: Heavenly cultic action of archangels on behalf of the righteous
  chosen_reading: Translated the Greek directly as archangels who 'minister and make
    propitiation to the Lord' for sins committed in ignorance by the righteous.
  alternative_readings:
  - '''make atonement'' instead of ''make propitiation'''
  - reading the line more loosely as intercessory prayer rather than cultic expiation
  rationale: The Greek presents explicit priestly-cultic imagery, including offering
    language and sweet-smelling fragrance. The translation preserves this theological
    texture rather than reducing it to generic intercession.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it'
- issue: Divine title circumlocution
  chosen_reading: Rendered Μεγάλη Δόξα as 'the Great Glory.'
  alternative_readings:
  - '''the Majestic Glory'''
  - '''God'''
  rationale: The circumlocution likely functions reverentially for the divine presence.
    Translating it as a title preserves the text's apocalyptic register and avoids
    flattening it into a simple substitute for 'God.'
- issue: Name of the evil power
  chosen_reading: Used 'Beliar' in the main text.
  alternative_readings:
  - '''Belial'''
  rationale: The Greek witness form should be represented transparently; harmonization
    to the more familiar biblical spelling would obscure the source form.
