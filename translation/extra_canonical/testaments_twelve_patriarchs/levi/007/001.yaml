translation:
  text: And I said to my father Jacob, “In you the Lord will bring the Canaanites
    to nothing, and he will give their land to you and to your seed after you. For
    from this day the city called Sychem shall be a city of fools. For just as one
    mocks a fool, so we mocked them, because they indeed committed folly in Israel
    by defiling my sister. Then, after taking her up, we came to Bethel.”
