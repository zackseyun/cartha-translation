translation:
  text: 'And after two days, I and Judah went up with our father Jacob to Isaac our
    grandfather. And the father of my father blessed me according to the visions that
    I had seen, and he was not willing to go with us to Bethel.


    And when we came to Bethel, my father Jacob saw a vision concerning me, that I
    would be a priest for them. And rising early in the morning, he gave a tenth of
    everything through me to the Lord.


    And so we came to Hebron to remain there. And Isaac kept calling me continually
    to remind me of the law of the Lord, just as the angel had shown me. And he taught
    me the law of the priesthood, of sacrifices, of whole burnt offerings, of firstfruits,
    of freewill offerings, and of peace offerings. And every day he kept instructing
    me in freewill offerings, and giving his attention to me he said:


    “Take heed to yourself from the spirit of sexual immorality, for this persists
    and is about to defile the holy things through your offspring. Therefore take
    for yourself a wife from my family while you are still young, one having no blemish
    and not defiled, and not from the stock of foreign nations.


    And before you enter into the holy things, wash; and when you sacrifice in the
    presence of the Lord, wash your hands. And when you complete the sacrifice again,
    wash.


    And from twelve trees having leaves offer to the Lord, as Abraham taught me. And
    from every clean animal and bird offer a sacrifice to the Lord. And from all your
    first produce and wine offer firstfruits as a sacrifice to the Lord God. And season
    every sacrifice with salt.”'
