theological_decisions:
- issue: Bracketed phrase in v.2 referring to 'the Savior of the world, the Messiah'
  chosen_reading: Included in the main text in brackets
  alternative_readings:
  - Omit as secondary interpolation
  - Include without brackets as fully integral text
  rationale: The Greek witness supplied includes the phrase, but its overtly Christian
    formulation is widely regarded as textually suspect or secondary in transmission.
    Brackets preserve honesty to the witness while signaling probable interpolation
    without suppressing the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    what is in the Greek witness honestly, and use notes rather than silently harmonizing.
- issue: Meaning of 'great evils from the Lord against him' in v.2
  chosen_reading: Retained as a difficult prophetic statement of divine judgments
  alternative_readings:
  - Smooth to 'great calamities from the Lord upon yourselves'
  - Reassign pronoun to Israel or the Messiah by interpretation
  rationale: The Greek syntax is difficult, especially the pronoun reference. Rather
    than resolve the ambiguity by paraphrase, the translation keeps the wording close
    and notes the difficulty.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Temple veil tearing in v.3
  chosen_reading: Translated straightforwardly as prophetic judgment imagery
  alternative_readings:
  - Interpret explicitly as allusion to Gospel passion narratives
  - Treat as purely symbolic exposure of priestly shame
  rationale: The Greek text states the veil will be torn so as not to cover their
    shame. The translation preserves the image without forcing a later canonical interpretation
    into the line itself.
  doctrine_reference: Original-language primacy over translation tradition.
