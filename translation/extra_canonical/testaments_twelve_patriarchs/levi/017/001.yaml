translation:
  text: 'And since you have heard about the seventy weeks, hear also about the priesthood.
    For in each jubilee there will be a priesthood. In the first jubilee, the one
    anointed first for the priesthood will be great, and he will speak to God as to
    a father; and his priesthood will be complete with the Lord. [And in the days
    of his joy he will rise for the salvation of the world.]


    In the second jubilee, the one anointed will be conceived in the sorrow of a beloved
    one, and his priesthood will be honored, and he will be glorified by all.


    But the third priest will be taken in grief. And the fourth will be in pains,
    because unrighteousness will be multiplied against him in abundance, and all Israel
    will hate, each one, his neighbor. The fifth will be taken in darkness. Likewise
    also the sixth and the seventh.


    But in the seventh there will be a defilement which I cannot speak of before men,
    for those who do these things will know them. Therefore they will be in captivity
    and in plundering, and their land and their possessions will be destroyed.


    And in the fifth week they will return to the land of their desolation, and they
    will renew the house of the Lord.'
