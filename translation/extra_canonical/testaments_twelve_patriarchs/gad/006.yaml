theological_decisions:
- issue: Rendering μετανοήσας in an interpersonal ethical context
  chosen_reading: changes his mind
  alternative_readings:
  - repents
  rationale: The project’s doctrine prefers 'change of mind' in cognitive contexts;
    here the term concerns acknowledgment and reversal of hostile intent in a personal
    dispute.
  doctrine_reference: 'DOCTRINE.md: μετανοέω → change of mind / repent by context'
- issue: Final clause on retaliation
  chosen_reading: leave vengeance to God
  alternative_readings:
  - give vindication to God
  - leave retribution to God
  rationale: The ethical thrust is non-retaliation and entrusting judgment to God;
    'vengeance' is the clearest idiomatic rendering while preserving theological weight.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it'
