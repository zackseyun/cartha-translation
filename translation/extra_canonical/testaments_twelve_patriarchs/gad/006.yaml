translation:
  text: '1. And now, my children, I urge you: let each one love his neighbor, and
    remove hatred from your hearts. Love one another in deed and word and with the
    intention of the soul.


    2. For I myself, in my father’s presence, spoke peaceably to Joseph; but when
    I had gone out from him, the spirit of hatred darkened my mind and disturbed my
    understanding so that I wanted to kill him.


    3. Love one another from the heart; and if anyone sins against you, speak peace
    to him, and in your soul hold no deceit; and if he confesses and changes his mind,
    forgive him.


    4. But if he denies it, do not contend with him, lest when he swears an oath you
    sin doubly.


    5. Do not let another hear your secret in a quarrel, lest he come to hate you
    and become your enemy and commit a great sin against you; for many times he either
    kills by treachery or entangles you in evils, having taken in from you the poison.


    6. But if he denies it and is ashamed when reproved, be still and do not keep
    reproving him. For the one who denies it repents of having done wrong against
    you, so as not to wrong you again, and being afraid he makes peace.


    7. But even if he is shameless and persists in his wrongdoing, even so forgive
    him from the heart, and leave vengeance to God.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verse 3 has textual variation around 'speak peace to him' and the placement
      of 'in your soul hold no deceit'; the sense of peaceful address without inward
      guile is secure.
    reason: textual_variant
  - marker: b
    text: Verse 5 is textually difficult. The warning concerns exposing a private
      matter during a quarrel, which may lead the other person to hostile and treacherous
      action; the final image uses 'poison' metaphorically for absorbed hatred.
    reason: textual_variant
  - marker: c
    text: Some witnesses in verse 6 differ in wording around the denier’s repentance
      and fear, but the overall sense is that shame may lead him to cease the offense
      and make peace.
    reason: textual_variant
lexical_decisions:
- source_word: παραινῶ
  chosen: I urge
  alternatives:
  - I exhort
  - I counsel
  lexicon: LSJ
  rationale: Keeps the testamentary paraenetic force in readable English without sounding
    overly formal; stronger than mere 'advise.'
- source_word: πλησίον
  chosen: neighbor
  alternatives:
  - fellow
  - near one
  lexicon: BDAG
  rationale: Established ethical term with clear interpersonal force, fitting the
    exhortation to mutual love.
- source_word: ἐξάρατε τὸ μῖσος
  chosen: remove hatred
  alternatives:
  - cast out hatred
  - take away hatred
  lexicon: LSJ
  rationale: Reflects decisive expulsion from the heart while remaining idiomatic
    English.
- source_word: διανοίᾳ ψυχῆς
  chosen: with the intention of the soul
  alternatives:
  - with the mind of the soul
  - with whole inward purpose
  lexicon: LSJ
  rationale: Preserves the somewhat layered Greek inwardness rather than flattening
    to a generic 'sincerely.'
- source_word: εἰρηνικά
  chosen: peaceably
  alternatives:
  - peaceful things
  - words of peace
  lexicon: LSJ
  rationale: Adverbial English fits the clause naturally while preserving the contrast
    between outward peace and inward hatred.
- source_word: τὸ πνεῦμα τοῦ μίσους
  chosen: the spirit of hatred
  alternatives:
  - a spirit of hatred
  - hatred’s spirit
  lexicon: LSJ
  rationale: Retains the vivid personified/moral force of the Greek rather than reducing
    it to mere emotion.
- source_word: νοῦν
  chosen: mind
  alternatives:
  - understanding
  - reason
  lexicon: BDAG
  rationale: Best basic rendering here, especially paired with 'darkened.'
- source_word: λογισμόν
  chosen: understanding
  alternatives:
  - thought
  - reasoning
  - purpose
  lexicon: BDAG
  rationale: Varied from 'mind' to avoid wooden repetition while still conveying the
    disturbed faculty of moral reasoning.
- source_word: εἰπὲ αὐτῷ εἰρήνην / ἐν εἰρήνῃ
  chosen: speak peace to him
  alternatives:
  - speak to him peacefully
  - say peace to him
  lexicon: LSJ
  rationale: Preserves the Semitic-sounding ethical formula and the imperative tone.
- source_word: δόλον
  chosen: deceit
  alternatives:
  - guile
  - treachery
  lexicon: BDAG
  rationale: Captures inward duplicity in a clear modern register.
- source_word: μετανοήσας
  chosen: changes his mind
  alternatives:
  - repents
  - turns back
  lexicon: BDAG
  rationale: Follows project guidance for μετανοέω in specific cognitive/interpersonal
    contexts while preserving moral seriousness.
- source_word: φιλονείκει
  chosen: contend
  alternatives:
  - quarrel
  - strive
  lexicon: LSJ
  rationale: Conveys contentious escalation without overcolloquializing the warning.
- source_word: δισσῶς ἁμαρτάνεις
  chosen: you sin doubly
  alternatives:
  - you commit a double sin
  - you sin twice over
  lexicon: LSJ
  rationale: Compact and rhetorically forceful, preserving the warning's proverbial
    quality.
- source_word: μυστήριόν σου
  chosen: your secret
  alternatives:
  - your private matter
  - your confidential matter
  lexicon: BDAG
  rationale: In this interpersonal context the sense is not mystical but confidential.
- source_word: δολοφονεῖ
  chosen: kills by treachery
  alternatives:
  - murders deceitfully
  - plots murder against
  lexicon: LSJ
  rationale: Makes explicit the compound sense of killing through deceit.
- source_word: περιεργάζεται σε ἐν κακοῖς
  chosen: entangles you in evils
  alternatives:
  - busies himself against you in evil
  - works against you in wicked schemes
  lexicon: LSJ
  rationale: The Greek is difficult; this rendering preserves hostile harmful scheming
    without overclaiming precision.
- source_word: τὸν ἰόν
  chosen: the poison
  alternatives:
  - venom
  - rust
  lexicon: LSJ
  rationale: Best fits the metaphor of absorbed hatred infecting further action.
- source_word: αἰδεσθῇ ἐλεγχόμενος
  chosen: is ashamed when reproved
  alternatives:
  - feels shame when exposed
  - is abashed when convicted
  lexicon: LSJ
  rationale: Captures the moral shame implied by the passive/middle sense in context.
- source_word: ἡσύχασον
  chosen: be still
  alternatives:
  - be quiet
  - keep calm
  lexicon: LSJ
  rationale: Preserves the imperative to cease pressing the matter, with dignified
    tone.
- source_word: πλημμελῆσαι
  chosen: to have done wrong
  alternatives:
  - to have transgressed
  - to have offended
  lexicon: LSJ
  rationale: Broad enough for interpersonal offense while retaining moral culpability.
- source_word: εἰρηνεύει
  chosen: he makes peace
  alternatives:
  - he lives peaceably
  - he seeks peace
  lexicon: BDAG
  rationale: Active sense suits the context of restored relations.
- source_word: ἀναιδής
  chosen: shameless
  alternatives:
  - insolent
  - brazen
  lexicon: BDAG
  rationale: Strong moral descriptor appropriate to Gad’s warning tone.
- source_word: ἐνίσταται τῇ κακίᾳ
  chosen: persists in his wrongdoing
  alternatives:
  - stands fast in evil
  - continues in wickedness
  lexicon: LSJ
  rationale: Communicates stubborn continuance in evil in natural English.
- source_word: ἀπὸ καρδίας
  chosen: from the heart
  alternatives:
  - heartily
  - from your heart
  lexicon: BDAG
  rationale: Preserves the inward, sincere dimension that frames the chapter.
- source_word: τὴν ἐκδίκησιν
  chosen: vengeance
  alternatives:
  - vindication
  - retribution
  lexicon: BDAG
  rationale: Best-known ethical-theological term here; the clause clearly yields retaliatory
    judgment to God.
