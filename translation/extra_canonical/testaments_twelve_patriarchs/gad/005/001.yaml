translation:
  text: Hatred, then, is evil, because it keeps company with falsehood continually,
    speaking against the truth; it makes small things great, presents light as darkness,
    and calls the sweet bitter. It teaches slander, stirs up wrath and war, and fills
    the heart with insolence and every greed, with evils and a devilish poison.
