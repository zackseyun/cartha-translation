translation:
  text: '1. The copy of the words of Gad, what things he spoke to his sons in the
    hundred and twenty-fifth year of his life, saying to them:

    2. Listen to the words of truth, my children, and practice righteousness and all
    the law of the Most High. Do not go astray after the spirit of hatred, for it
    is evil in all the deeds of men.

    3. Whatever a man hates, that he does not want to see or hear. If anyone speaks
    of the Lord, he hates him as one who reproves him. If anyone prospers, he envies
    him. If anyone is rich, he is not pleased with it. If anyone is brave, he praises
    him not. He slanders a truthful man, he begrudges a successful man, and he loves
    the arrogant and the lawless. For hatred blinds his soul, as I also saw concerning
    Joseph.'
