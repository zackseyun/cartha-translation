    οὔτε δι᾽ ὀφθαλμῶν⁶² ἰδεῖν τὸν Ἰωσήφ, ὅτι⁶³ κατὰ πρόσωπον⁶⁴ ἤλεγξεν ἡμᾶς Γλέγων¹⁶⁵,
