  text: Εἴπατε *Γδὲ¹ ταῦτα καὶ ὑμεῖς¹ τοῖς τέκνοις ὑμῶν,
  language: Greek
translation:
  text: 'Say these things, you also, to your children:


    that they honor Levi and Judah; for from them the Lord will raise up salvation
    for Israel.

    And tell them concerning Joseph, that they should love him, because in every affliction
    he was innocent,

    and he kept the commandment of God, not returning evil for evil.

    For he suffered much from his brothers, yet he loved them,

    and though they plotted against him, he spoke peaceably to them.


    And now, my children, I command you: love one another from the heart,

    and if anyone sins against you, speak peaceably to him, and in your soul hold
    no deceit;

    and if he confesses and repents, forgive him.

    But if he denies it, do not become heated in argument with him,

    lest, after taking in poison, he begin to swear and so commit a double sin.

    If anyone prospers beyond you, do not be grieved;

    but pray also for him, that he may be made complete in every good thing.


    If anyone is glorified, do not envy him;

    if anyone is enriched, do not be jealous.

    Bless the Lord who gives good things to all,

    because the poor man, if he is free from envy, is rich before the Lord.

    Do not hate a beautiful woman because of her appearance,

    and do not hate a man because of the abundance of his glory.

    For God gives the good things of the earth to whom he wills.


    Seek uprightness in your own works,

    and pray for your neighbor, so that if he prospers in every good thing, you may
    not be jealous.

    For the one who is jealous is always in turmoil,

    and the one who hates is always darkened.

    Love one another in deed and in word and in the intention of the soul.

    For I also spoke peaceably with Joseph, but in my heart I intended to kill him.

    The spirit of hatred is evil, because it is never at peace with men;

    it always desires their downfall.

    It weakens the body and disturbs the soul,

    and it puts wrath upon the mind.


    Therefore, if anyone does evil to you, do good to him,

    and pray for him; and you will be redeemed by the Lord from every evil.

    For if anyone prospers, and if he is shameless or lawless, do not be jealous;

    but wait for the end from the Lord.

    For either he receives his reward in this life,

    or, if he is kept for punishment, he will be repaid in the judgment.

    And if a poor man prospers and is without envy, even if he is not rich,

    he is blessed beyond all men, because he has the treasure that does not perish.

    Therefore cast away hatred, and love one another in uprightness of heart.'
