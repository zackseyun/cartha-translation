theological_decisions:
- issue: Prophetic line 'honor Levi and Judah' and salvation arising from them
  chosen_reading: 'Rendered as a forward-looking testamentary prophecy: ''from them
    the Lord will raise up salvation for Israel.'''
  alternative_readings:
  - from them salvation shall arise for Israel
  - from them the Lord will bring deliverance to Israel
  rationale: This preserves the Greek's prophetic force and leaves open whether the
    reference is priestly-royal leadership broadly or a more specific messianic expectation.
    The translation does not over-resolve the allusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Ethical instruction about repentance and forgiveness
  chosen_reading: Used 'if he confesses and repents, forgive him.'
  alternative_readings:
  - if he admits it and changes his mind, forgive him
  rationale: The context is interpersonal sin and reconciliation, where project guidance
    favors 'repent' over the more cognitive 'change of mind.'
  doctrine_reference: DOCTRINE.md on μετανοέω
- issue: Divine recompense for the wicked prosperous person
  chosen_reading: Rendered both present reward and future judgment as possibilities
    without harmonizing them.
  alternative_readings:
  - he has already received his reward
  - he is being reserved for punishment
  rationale: The testament presents two possible divine outcomes; the translation
    preserves that tension rather than collapsing it into a single doctrine of retribution.
  doctrine_reference: Preserve theological tension rather than resolve it.
