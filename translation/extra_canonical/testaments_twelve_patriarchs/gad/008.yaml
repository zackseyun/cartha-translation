translation:
  text: 'Say these things, you also, to your children:


    that they honor Levi and Judah; for from them the Lord will raise up salvation
    for Israel.

    And tell them concerning Joseph, that they should love him, because in every affliction
    he was innocent,

    and he kept the commandment of God, not returning evil for evil.

    For he suffered much from his brothers, yet he loved them,

    and though they plotted against him, he spoke peaceably to them.


    And now, my children, I command you: love one another from the heart,

    and if anyone sins against you, speak peaceably to him, and in your soul hold
    no deceit;

    and if he confesses and repents, forgive him.

    But if he denies it, do not become heated in argument with him,

    lest, after taking in poison, he begin to swear and so commit a double sin.

    If anyone prospers beyond you, do not be grieved;

    but pray also for him, that he may be made complete in every good thing.


    If anyone is glorified, do not envy him;

    if anyone is enriched, do not be jealous.

    Bless the Lord who gives good things to all,

    because the poor man, if he is free from envy, is rich before the Lord.

    Do not hate a beautiful woman because of her appearance,

    and do not hate a man because of the abundance of his glory.

    For God gives the good things of the earth to whom he wills.


    Seek uprightness in your own works,

    and pray for your neighbor, so that if he prospers in every good thing, you may
    not be jealous.

    For the one who is jealous is always in turmoil,

    and the one who hates is always darkened.

    Love one another in deed and in word and in the intention of the soul.

    For I also spoke peaceably with Joseph, but in my heart I intended to kill him.

    The spirit of hatred is evil, because it is never at peace with men;

    it always desires their downfall.

    It weakens the body and disturbs the soul,

    and it puts wrath upon the mind.


    Therefore, if anyone does evil to you, do good to him,

    and pray for him; and you will be redeemed by the Lord from every evil.

    For if anyone prospers, and if he is shameless or lawless, do not be jealous;

    but wait for the end from the Lord.

    For either he receives his reward in this life,

    or, if he is kept for punishment, he will be repaid in the judgment.

    And if a poor man prospers and is without envy, even if he is not rich,

    he is blessed beyond all men, because he has the treasure that does not perish.

    Therefore cast away hatred, and love one another in uprightness of heart.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Honor Levi and Judah'' likely reflects the traditional prominence of
      priestly and royal lines in Israel; the wording is left broad rather than narrowed
      to one later interpretation.'
    reason: cross_reference
  - marker: b
    text: Or 'do not argue heatedly with him.' The image that follows suggests that
      contentious dispute can lead the other person into compounded guilt.
    reason: lexical_alternative
  - marker: c
    text: '''Wait for the end from the Lord'' may mean await the final outcome the
      Lord assigns, whether in this life or in judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τιμᾶν
  chosen: honor
  alternatives:
  - revere
  - esteem
  lexicon: LSJ
  rationale: Chosen for filial and covenantal respect without overstating cultic reverence.
- source_word: σωτηρία
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: Retains the theological weight of divine rescue in a testamentary-prophetic
    context.
- source_word: ἄκακος
  chosen: innocent
  alternatives:
  - guileless
  - harmless
  lexicon: LSJ
  rationale: Best fits Joseph's moral blamelessness under affliction.
- source_word: ἀντὶ κακοῦ κακόν
  chosen: evil for evil
  alternatives:
  - wrong for wrong
  lexicon: BDAG
  rationale: Preserves the recognizable ethical formula of non-retaliation.
- source_word: εἰρηνεύειν / εἰρηνικῶς λαλεῖν
  chosen: speak peaceably
  alternatives:
  - speak peacefully
  - speak in peace
  lexicon: LSJ
  rationale: Keeps the active interpersonal sense and echoes the repeated contrast
    with inward hatred.
- source_word: δόλος
  chosen: deceit
  alternatives:
  - guile
  - treachery
  lexicon: BDAG
  rationale: Readable modern English while preserving inward duplicity.
- source_word: μετανοεῖν
  chosen: repents
  alternatives:
  - changes his mind
  lexicon: BDAG
  rationale: In this specific-sin context, 'repents' follows project guidance for
    moral offense and reconciliation.
- source_word: θερμαίνεσθαι
  chosen: become heated
  alternatives:
  - be inflamed
  - grow angry
  lexicon: LSJ
  rationale: Captures escalation in dispute without collapsing it into simple anger.
- source_word: φάρμακον
  chosen: poison
  alternatives:
  - drug
  - venom
  lexicon: LSJ
  rationale: Metaphorical 'taking in poison' vividly conveys how quarrel breeds compounded
    sin.
- source_word: φθονεῖν
  chosen: be jealous
  alternatives:
  - envy
  lexicon: BDAG
  rationale: Used alongside 'envy' elsewhere with slight variation for English style;
    both mark resentful rivalry. Documented exception for readability.
- source_word: λυπεῖσθαι
  chosen: be grieved
  alternatives:
  - be distressed
  - be saddened
  lexicon: BDAG
  rationale: Conveys pained resentment at another's prosperity without overinterpreting.
- source_word: τελειωθῇ
  chosen: be made complete
  alternatives:
  - be perfected
  - be brought to fullness
  lexicon: BDAG
  rationale: Preserves the sense of fullness in good rather than mere success.
- source_word: δοξάζεσθαι
  chosen: is glorified
  alternatives:
  - is honored
  - is esteemed
  lexicon: BDAG
  rationale: Keeps the elevated register and external bestowal of honor.
- source_word: εὐθύτης
  chosen: uprightness
  alternatives:
  - straightforwardness
  - integrity
  lexicon: LSJ
  rationale: Matches the ethical theme of singleness of heart and straight conduct.
- source_word: διάνοια / ἐπίνοια ψυχῆς
  chosen: intention of the soul
  alternatives:
  - purpose of the heart
  - thought of the soul
  lexicon: LSJ
  rationale: Preserves the inward moral faculty emphasized throughout the chapter.
- source_word: μισοπονηρία / πνεῦμα μίσους
  chosen: the spirit of hatred
  alternatives:
  - a spirit of hatred
  lexicon: LSJ
  rationale: Reflects the vice as an active power or disposition, not merely a passing
    feeling.
- source_word: σκοτίζεσθαι
  chosen: is darkened
  alternatives:
  - is blinded
  - is obscured
  lexicon: BDAG
  rationale: Maintains moral-psychological imagery without forcing a stronger metaphor.
- source_word: λυτροῦσθαι
  chosen: be redeemed
  alternatives:
  - be delivered
  - be rescued
  lexicon: BDAG
  rationale: Chosen for theological resonance with divine rescue while still fitting
    ethical exhortation.
- source_word: ἀναμένειν τὸ τέλος παρὰ κυρίου
  chosen: wait for the end from the Lord
  alternatives:
  - await the outcome from the Lord
  - wait for the Lord's end
  lexicon: LSJ
  rationale: 'Preserves eschatological and providential ambiguity: final outcome belongs
    to the Lord.'
- source_word: κρίσις
  chosen: judgment
  alternatives:
  - condemnation
  - justice
  lexicon: BDAG
  rationale: Keeps the broader judicial sense without deciding the exact punitive
    nuance.
