theological_decisions:
- issue: Interpretation of τελειωθῇ in the prayer for a prospering neighbor
  chosen_reading: Rendered as 'that he may be brought to completion'
  alternative_readings:
  - that he may prosper fully
  - that he may be perfected
  rationale: The Greek suggests more than mere continued success; it points to a complete
    or mature outcome under God. The chosen wording preserves that theological breadth
    without importing later technical perfection language.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Force of ὅρον Κυρίου in relation to wicked prosperity
  chosen_reading: Rendered as 'the appointed limit of the Lord'
  alternative_readings:
  - the decree of the Lord
  - the fixed time of the Lord
  rationale: The context is patience in the face of unjust wealth. 'Appointed limit'
    preserves both boundary and divinely fixed measure, allowing the text's tension
    to remain rather than narrowing it to time alone.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Meaning of αἰωνίαν κόλασιν
  chosen_reading: Rendered as 'eternal punishment' in the main text
  alternative_readings:
  - age-long punishment
  rationale: In this paraenetic warning context, the most straightforward English
    is 'eternal punishment.' Because αἰώνιος can be discussed more broadly, the alternative
    is preserved in a note rather than erased.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
