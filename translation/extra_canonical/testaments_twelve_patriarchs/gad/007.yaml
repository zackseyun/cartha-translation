translation:
  text: 1. But if someone prospers more than you, do not be grieved; rather, pray
    for him, that he may be brought to completion. For in this way it is to your advantage.
    2. And if he is exalted still more, do not envy him, remembering that all flesh
    will die. But offer hymns to the Lord, who gives good and profitable things to
    all people. 3. Examine the judgments of the Lord, and your purpose will be illumined
    and be at rest. 4. But if someone grows rich through evil, like Esau my father's
    brother, do not be jealous; rather, wait for the appointed limit of the Lord.
    5. For if what was taken away in evil is taken from him, or if he repents, he
    is forgiven; but if he remains unrepentant, he is kept for eternal punishment.
    6. For the poor man, if being free from envy in all things he is pleasing to the
    Lord, is richer than all, because he does not have the distraction of vain people.
    7. Therefore cast out hatred from your souls, and love one another in deed and
    in word and in the disposition of your soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that he may be perfected' for 'that he may be brought to completion.'
    reason: lexical_alternative
  - marker: b
    text: '''The appointed limit of the Lord'' may also be understood as ''the fixed
      time'' or ''the decree'' of the Lord.'
    reason: lexical_alternative
  - marker: c
    text: Or 'age-long punishment' for 'eternal punishment.'
    reason: alternative_reading
  - marker: d
    text: The Greek line after 'love one another' is cut off in the surviving OCR
      excerpt; the closing phrase is supplied in continuity with the extant wording
      and the chapter's exhortational flow.
    reason: textual_variant
lexical_decisions:
- source_word: εὐοδοῦται
  chosen: prospers
  alternatives:
  - succeeds
  - has a good journey/path
  lexicon: LSJ
  rationale: In this ethical context the verb refers to someone faring well or prospering,
    not literal travel. 'Prospers' preserves the comparative social setting that triggers
    grief or envy.
- source_word: λυπεῖσθε
  chosen: be grieved
  alternatives:
  - be distressed
  - be saddened
  lexicon: LSJ
  rationale: The prohibition concerns inward sorrow at another's success. 'Be grieved'
    keeps the moral-psychological force without overinterpreting it as resentment
    alone.
- source_word: τελειωθῇ
  chosen: be brought to completion
  alternatives:
  - be perfected
  - be made complete
  lexicon: LSJ
  rationale: The prayer is not merely for continued success but for a complete or
    mature outcome. This wording preserves the teleological nuance of τελειόω.
- source_word: συμφέρον
  chosen: to your advantage
  alternatives:
  - beneficial
  - profitable
  lexicon: LSJ
  rationale: The phrase explains why prayer rather than envy is fitting. 'To your
    advantage' reads naturally while retaining the idea of benefit.
- source_word: ὑψοῦται
  chosen: is exalted
  alternatives:
  - is lifted up
  - is elevated
  lexicon: LSJ
  rationale: The verb can denote social elevation or prominence. 'Is exalted' preserves
    the elevated register and the possibility of status increase.
- source_word: φθονεῖτε
  chosen: envy
  alternatives:
  - begrudge
  - be envious
  lexicon: LSJ
  rationale: Envy is a central vice-theme in this testamental material; the simple
    imperative 'do not envy' keeps the vice vocabulary stable.
- source_word: σὰρξ
  chosen: flesh
  alternatives:
  - humanity
  - mortal flesh
  lexicon: LSJ
  rationale: Here the phrase πᾶσα σὰρξ is a mortality formula. 'All flesh' preserves
    the traditional anthropological expression and its solemnity.
- source_word: ὕμνους προσφέρετε
  chosen: offer hymns
  alternatives:
  - sing praises
  - present hymns
  lexicon: LSJ
  rationale: The sacrificial coloring of προσφέρετε is worth retaining. 'Offer hymns'
    keeps both worship language and elevated style.
- source_word: συμφέροντα
  chosen: profitable things
  alternatives:
  - beneficial things
  - what is advantageous
  lexicon: LSJ
  rationale: The adjective echoes συμφέρον in v.1. 'Profitable things' preserves the
    thematic repetition of what truly benefits.
- source_word: κρίματα Κυρίου
  chosen: judgments of the Lord
  alternatives:
  - ordinances of the Lord
  - decisions of the Lord
  lexicon: LSJ
  rationale: This phrase likely refers to God's judicial acts or governing decisions.
    'Judgments' preserves biblical diction and moral seriousness.
- source_word: διαβούλιόν
  chosen: purpose
  alternatives:
  - counsel
  - deliberation
  - plan
  lexicon: LSJ
  rationale: The word denotes one's inner counsel or resolve. 'Purpose' is readable
    while still reflecting inward deliberation.
- source_word: καταλάμψει
  chosen: will be illumined
  alternatives:
  - will shine upon
  - will become clear
  lexicon: LSJ
  rationale: Though the text is somewhat difficult, the sense is that reflection on
    the Lord's judgments brings clarity. 'Will be illumined' preserves the metaphor.
- source_word: ἡσυχάσει
  chosen: be at rest
  alternatives:
  - be quieted
  - be calmed
  lexicon: LSJ
  rationale: The result is inward quiet after moral discernment. 'Be at rest' is idiomatic
    and suitably elevated.
- source_word: ζηλώσητε
  chosen: be jealous
  alternatives:
  - envy
  - be zealous for
  lexicon: LSJ
  rationale: In v.4 the nuance is covetous jealousy at wicked prosperity. I varied
    from 'envy' to reflect the distinct Greek verb while keeping the vice-field close.
- source_word: ὅρον Κυρίου
  chosen: the appointed limit of the Lord
  alternatives:
  - the boundary of the Lord
  - the decree of the Lord
  - the fixed time of the Lord
  lexicon: LSJ
  rationale: ὅρος can denote a boundary or fixed limit. In context Gad urges patience
    for God's set measure or appointed outcome regarding the wicked.
- source_word: ἐκδέξασθε
  chosen: wait for
  alternatives:
  - expect
  - receive
  lexicon: LSJ
  rationale: The imperative calls for patient awaiting of God's appointed action,
    not passive reception alone.
- source_word: μετανοήσαντι
  chosen: he repents
  alternatives:
  - he changes his mind
  - he turns back
  lexicon: LSJ
  rationale: In this specific-sin context, the project's guidance favors 'repent'
    rather than the more cognitive 'change of mind.'
- source_word: ἀμετανόητος
  chosen: unrepentant
  alternatives:
  - without repentance
  - unchanged in mind
  lexicon: LSJ
  rationale: The moral contrast in the verse is between repentance and persistence
    in evil; 'unrepentant' is the clearest English equivalent.
- source_word: αἰωνίαν κόλασιν
  chosen: eternal punishment
  alternatives:
  - age-long punishment
  lexicon: LSJ
  rationale: The phrase straightforwardly denotes enduring punitive judgment. 'Eternal
    punishment' is the most natural rendering, while the alternative is noted because
    αἰώνιος can be debated in some contexts.
- source_word: πένης
  chosen: poor man
  alternatives:
  - poor person
  - needy man
  lexicon: LSJ
  rationale: The testament addresses sons in patriarchal style; 'poor man' fits the
    register and contrasts with the rich man of the prior verse.
- source_word: ἄφθονος
  chosen: free from envy
  alternatives:
  - without grudging
  - bountiful
  lexicon: LSJ
  rationale: Given the chapter's sustained concern with envy, the adjective is best
    taken as 'not envious' rather than merely generous.
- source_word: ὑπὲρ πάντας πλουτεῖ
  chosen: is richer than all
  alternatives:
  - is wealthy above all
  - abounds beyond all
  lexicon: LSJ
  rationale: 'The paradox is ethical, not economic: the contented poor person surpasses
    others in true wealth.'
- source_word: περισπασμὸν
  chosen: distraction
  alternatives:
  - anxiety
  - preoccupation
  - harassment
  lexicon: LSJ
  rationale: The noun suggests being pulled in many directions. 'Distraction' captures
    the moral burden of vain social striving.
- source_word: ματαίων ἀνθρώπων
  chosen: vain people
  alternatives:
  - empty people
  - futile men
  lexicon: LSJ
  rationale: The genitive likely characterizes the sort of people whose concerns create
    such distraction. 'Vain people' is concise and morally pointed.
- source_word: ἐξάρατε
  chosen: cast out
  alternatives:
  - remove
  - lift away
  lexicon: LSJ
  rationale: The imperative is forceful and suits the testamentary exhortation. 'Cast
    out' preserves that vigor.
- source_word: μῖσος
  chosen: hatred
  alternatives:
  - enmity
  lexicon: LSJ
  rationale: This vice is the direct opposite of the love commanded next; 'hatred'
    is the strongest and clearest rendering.
- source_word: ἀγαπήσατε
  chosen: love
  alternatives:
  - show love to
  lexicon: LSJ
  rationale: The imperative should remain direct and weighty. 'Love one another' preserves
    the ethical center of the exhortation.
