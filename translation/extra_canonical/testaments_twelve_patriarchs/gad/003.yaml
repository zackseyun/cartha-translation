theological_decisions:
- issue: Personification of hatred as spiritual power
  chosen_reading: Translate πνεύματι τοῦ μίσους as 'the spirit of hatred' in the main
    text
  alternative_readings:
  - by a spirit of hatred
  - by hateful intent
  rationale: The Greek naturally allows a personified or quasi-personified moral force.
    Preserving 'spirit' maintains the testament's moral-psychological texture without
    forcing a fully demonological reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
