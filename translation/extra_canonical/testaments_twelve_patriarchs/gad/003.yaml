translation:
  text: '1. And now hear a word of truth: listen so as to practice righteousness and
    every law of the Most High, and do not be led astray, my children, by the spirit
    of hatred, because it is evil in all the deeds of men. 2. For whatever the one
    who hates may do, it is abominable. If someone does the law of the Lord, the hater
    does not praise him. If someone fears the Lord and desires what is righteous,
    the hater does not love him. 3. He reproaches the truth, envies the one who prospers,
    embraces slander, and loves arrogance, because hatred blinds his soul, just as
    it did mine when I looked at Joseph.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear the true word'; the Greek opening can be taken either as an indefinite
      or more definite exhortational formula.
    reason: lexical_alternative
  - marker: b
    text: '''The one who prospers'' may also be rendered ''the one who succeeds''
      or possibly ''the one who acts rightly,'' but the immediate context of envy
      favors successful action.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγον ἀληθείας
  chosen: a word of truth
  alternatives:
  - a true word
  - the word of truth
  lexicon: LSJ
  rationale: Retains the solemn testamentary introduction without over-specifying
    the article; singular 'word' fits the exhortational speech opening.
- source_word: τοῦ ποιεῖν
  chosen: listen so as to practice
  alternatives:
  - hear in order to do
  - listen to do
  lexicon: LSJ
  rationale: The infinitive expresses purpose; this rendering preserves the paraenetic
    force that hearing is for obedient action.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: In this ethical testament context the term denotes upright conduct before
    God more broadly than social justice alone; 'righteousness' also aligns with project
    defaults.
- source_word: νόμον ὑψίστου
  chosen: every law of the Most High
  alternatives:
  - all the law of the Most High
  - every command of the Most High
  lexicon: LSJ
  rationale: Keeps the elevated divine title and preserves the distributive sense
    of πάντα with νόμον in this witness.
- source_word: πλανᾶσθε
  chosen: be led astray
  alternatives:
  - go astray
  - be deceived
  lexicon: LSJ
  rationale: Middle/passive nuance suggests being misdirected by an external influence,
    here the spirit of hatred.
- source_word: πνεύματι τοῦ μίσους
  chosen: the spirit of hatred
  alternatives:
  - a spirit of hatred
  - the hateful spirit
  lexicon: LSJ
  rationale: Preserves the personified moral force central to the chapter's warning.
- source_word: βδελυκτόν
  chosen: abominable
  alternatives:
  - detestable
  - loathsome
  lexicon: LSJ
  rationale: Strong moral-religious term; 'abominable' best preserves the severity
    of Gad's denunciation.
- source_word: φοβεῖται Κύριον
  chosen: fears the Lord
  alternatives:
  - reveres the Lord
  lexicon: LSJ
  rationale: Traditional biblical idiom is clear and weighty here; no need to soften
    the covenantal-moral sense.
- source_word: θέλει τὸ δίκαιον
  chosen: desires what is righteous
  alternatives:
  - wills what is just
  - wants the right
  lexicon: LSJ
  rationale: Expresses moral inclination rather than mere cognition; 'what is righteous'
    keeps the ethical register elevated.
- source_word: ψέγει
  chosen: reproaches
  alternatives:
  - blames
  - finds fault with
  lexicon: LSJ
  rationale: A strong verb of censure that suits the vice catalogue's rhetorical cadence.
- source_word: τῷ κατορθοῦντι
  chosen: the one who prospers
  alternatives:
  - the one who succeeds
  - the one who does rightly
  lexicon: LSJ
  rationale: The context with envy favors successful or thriving action rather than
    merely correct action; 'prospers' makes the object of envy explicit.
- source_word: καταλαλιὰν ἀσπάζεται
  chosen: embraces slander
  alternatives:
  - welcomes slander
  - clings to backbiting
  lexicon: LSJ
  rationale: Keeps the vivid metaphor of affectionate acceptance of malicious speech.
- source_word: ὑπερηφανίαν
  chosen: arrogance
  alternatives:
  - pride
  - haughtiness
  lexicon: LSJ
  rationale: Avoids overly broad 'pride' and preserves the vice-list sharpness.
- source_word: ἐκτυφλοῖ τὴν ψυχήν
  chosen: blinds his soul
  alternatives:
  - utterly blinds the soul
  - darkens his soul
  lexicon: LSJ
  rationale: Direct and vivid; the compound intensifies blindness, but English 'blinds'
    sufficiently carries the metaphor in readable form.
