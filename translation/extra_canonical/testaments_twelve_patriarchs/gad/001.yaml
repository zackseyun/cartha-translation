translation:
  text: '1. The copy of the words of Gad, what things he spoke to his sons in the
    hundred and twenty-fifth year of his life, saying to them:

    2. Listen to the words of truth, my children, and practice righteousness and all
    the law of the Most High. Do not go astray after the spirit of hatred, for it
    is evil in all the deeds of men.

    3. Whatever a man hates, that he does not want to see or hear. If anyone speaks
    of the Lord, he hates him as one who reproves him. If anyone prospers, he envies
    him. If anyone is rich, he is not pleased with it. If anyone is brave, he praises
    him not. He slanders a truthful man, he begrudges a successful man, and he loves
    the arrogant and the lawless. For hatred blinds his soul, as I also saw concerning
    Joseph.

    4. For I began to hate him from the day when he told our father that the sons
    of Zilpah and Bilhah were slaughtering the best of the flock and eating them apart
    from Judah and Joseph.

    5. For he told our father that I had said, “I saw a lamb being torn by a bear,
    and while I was running after the bear I killed it; but the lamb I slaughtered,
    because it could not live, and we ate it.”

    6. And because of this I was angry with Joseph until the day he was sold.

    7. And the spirit of hatred was in me, and I did not want either to hear Joseph
    with my ears or to see him with my eyes, because he rebuked us to our face, saying
    that we were eating the flock without Judah.

    8. For everything that he told our father, he believed.

    9. I confess now my sin, my children, that many times I wanted to kill him, because
    I hated him from my heart.

    10. And I hated him still more because of his dreams; and I wanted to destroy
    him from the earth, just as an ox devours the grass of the field.

    11. Therefore I and Judah sold him to the Ishmaelites for thirty pieces of gold.

    12. But the Lord of our fathers did not allow us to deal lawlessly with him, so
    that we should kill him.

    13. And now, my children, I tell you: love each one his brother, and put away
    hatred from your hearts. Love one another in deed and in word and in the disposition
    of the soul.

    14. For in the presence of my father I spoke peaceably to Joseph, but when I had
    gone out, the spirit of hatred darkened my mind and stirred up my soul to kill
    him.

    15. Love one another from the heart; and if a man sins against you, speak peaceably
    to him, and in your soul hold no deceit; and if he confesses and repents, forgive
    him.

    16. But if he denies it, do not become heated with him, lest by taking in the
    poison from him you swear and so sin doubly.

    17. Let no one hear your secrets when he is quarreling with you, lest he hate
    you and become your enemy and commit some great sin against you; for often he
    speaks craftily with you, or keeps company with you for an evil end.

    18. And if he denies it and is ashamed when reproved, be quiet. For by denying
    it he repents, and he will no longer wrong you; indeed he will honor you and fear
    you and be at peace with you.

    19. But if he is shameless and persists in his wrongdoing, even so forgive him
    from the heart, and leave vengeance to God.

    20. If anyone becomes rich by unjust means, do not envy him; but wait for the
    end appointed by the Lord.

    21. For if he takes away and gives back double, do not be troubled; but be patient
    until the Lord executes judgment.

    22. For the poor man, if free from envy, is pleasing to the Lord in all things,
    and is blessed beyond all men, because he does not have the toil of vain men.

    23. Therefore put envy away from your souls, and love one another with uprightness
    of heart.

    24. Tell these things also to your children, that they may honor Levi and Judah;
    for from them the Lord will raise up salvation for Israel.

    25. For I know that at the last you will depart from him and walk lawlessly and
    do violence to Levi and fight against Judah.

    26. But you will not prevail against them, because an angel of the Lord guides
    them both; for by them Israel will stand.

    27. And when you depart from the Lord, you will walk in every evil deed and commit
    the abominations of the nations, going astray after women who practice lawlessness,
    while spirits of wickedness work in you with every malice.

    28. For I have read in the book of Enoch the righteous that your prince is Satan,
    and that all the spirits of sexual immorality and arrogance will attend on the
    sons of Levi, to cause them to sin before the Lord.

    29. And my sons will draw near to Levi and sin with them in all things; and the
    sons of Judah will be greedy, plundering other men''s goods like lions.

    30. Therefore you will be led away with them into captivity, and there you will
    receive all the plagues of Egypt and all the evils of the nations.

    31. Therefore, when you return to the Lord, act in uprightness and all righteousness,
    and deal mercy and truth each one with his neighbor.

    32. And if you return to the Lord with uprightness of heart, and put away hatred
    and lawlessness, and love one another from the heart, then there will be peace
    for you.

    33. And no son of man will be able to prevail against you, because the God of
    heaven will be among you, making peace for you and for all Israel.

    34. And no enemy will rejoice over you; and every wild beast will fear you, and
    the Lord will bless you in every work and in every word.

    35. And now, my children, fear the Lord God of heaven, and beware of Satan and
    his spirits.

    36. Draw near to God and to the angel who intercedes for you, for he is a mediator
    between God and men for the peace of Israel.

    37. He will stand against the kingdom of the enemy; therefore the enemy is eager
    to destroy all who call on the Lord.

    38. For he knows that on the day when Israel repents, the kingdom of the enemy
    will be brought to an end.

    39. For the very angel of peace will strengthen Israel, so that it may not fall
    into the extremity of evil.

    40. And in the time of the lawlessness of Israel, the Lord will not depart from
    them, but will transform them into a nation that does his will; for no angel is
    equal to him.

    41. And his name will be in every place in Israel and among the nations.

    42. Keep yourselves, therefore, my children, from every lawless deed, and put
    away from yourselves all hatred and falsehood, and love truth and longsuffering.

    43. And whatever things you heard from your father, pass on to your children,
    so that the Savior of the nations may receive you; for he is true and longsuffering,
    gentle and humble, and teaches by his deeds the law of God.

    44. Therefore depart from all unrighteousness and cling to the righteousness of
    God, and your race will be saved forever.

    45. And when he had commanded them these things, he said to them that they should
    bury him in Hebron.

    46. And he slept a good sleep, old and full of days.

    47. And his sons did as he had commanded them, and they carried him up to Hebron
    and buried him with his fathers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some lines in the opening narrative section are textually difficult in the
      surviving Greek witnesses; the sense concerns Gad's strength in guarding the
      flock and the beginning of his resentment toward Joseph.
    reason: textual_variant
  - marker: b
    text: '''Thirty pieces of gold'' is the reading of this witness; other retellings
      of the Joseph story more commonly speak of twenty pieces.'
    reason: textual_variant
  - marker: c
    text: '''I have read in the book of Enoch'' reflects the text''s appeal to Enochic
      tradition as an authoritative warning.'
    reason: cross_reference
  - marker: d
    text: The closing references to the 'angel who intercedes,' the 'angel of peace,'
      and the 'Savior of the nations' may reflect layered transmission. The translation
      preserves the Greek witness without attempting to harmonize it.
    reason: alternative_reading
lexical_decisions:
- source_word: μῖσος / πνεῦμα τοῦ μίσους
  chosen: hatred / spirit of hatred
  alternatives:
  - hate
  - hateful spirit
  lexicon: LSJ
  rationale: Central vice term in the chapter; rendered consistently to preserve Gad's
    thematic warning against a dominating moral-spiritual force rather than a passing
    feeling.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  - uprightness
  lexicon: LSJ
  rationale: Default project rendering; in exhortational contexts it carries covenantal-moral
    force broader than merely forensic justice.
- source_word: νόμος
  chosen: law
  alternatives:
  - instruction
  lexicon: LSJ
  rationale: The testamentary paraenesis echoes Jewish covenantal obedience language;
    'law' preserves that register.
- source_word: ἐνεκότουν
  chosen: I was angry with
  alternatives:
  - I bore a grudge against
  - I resented
  lexicon: LSJ
  rationale: The verb conveys sustained resentment; 'was angry with' is readable,
    while the surrounding context and repeated hatred language preserve the intensity.
- source_word: κατὰ πρόσωπον ἤλεγξεν
  chosen: rebuked us to our face
  alternatives:
  - convicted us openly
  - exposed us face to face
  lexicon: LSJ
  rationale: Keeps the direct confrontational sense of the idiom and fits the family-conflict
    setting.
- source_word: τὰ θρέμματα
  chosen: the flock
  alternatives:
  - the cattle
  - the livestock
  lexicon: LSJ
  rationale: In this chapter the immediate context is shepherding and lambs; 'flock'
    is the most natural and specific English rendering.
- source_word: ἐμαλακίσθη ὑπὸ τοῦ καύσωνος
  chosen: was overcome by the heat
  alternatives:
  - grew faint from the heat
  - became weak from the heat
  lexicon: LSJ
  rationale: Conveys Joseph's youthful weakness under the sun in idiomatic English
    without over-paraphrase.
- source_word: δι᾽ ἀκοῆς ... δι᾽ ὀφθαλμῶν
  chosen: either to hear ... with my ears or to see ... with my eyes
  alternatives:
  - either to hear or to see
  lexicon: LSJ
  rationale: The fuller phrasing preserves the rhetorical parallelism and embodied
    aversion in the Greek.
- source_word: μετανοῇ / μετανοεῖ
  chosen: repents
  alternatives:
  - changes his mind
  - turns back
  lexicon: LSJ
  rationale: In this specific sin-and-forgiveness context, the project's guidance
    prefers 'repent' over the more cognitive 'change of mind'.
- source_word: μακροθυμία
  chosen: longsuffering
  alternatives:
  - patience
  - forbearance
  lexicon: LSJ
  rationale: Retains the elevated ethical register of the testament while remaining
    intelligible; pairs well with mercy and truth language.
- source_word: ἄγγελος τῆς εἰρήνης
  chosen: angel of peace
  alternatives:
  - messenger of peace
  lexicon: LSJ
  rationale: The text presents a heavenly personal agent; 'angel' should not be demythologized.
- source_word: μεσίτης
  chosen: mediator
  alternatives:
  - go-between
  - intercessor
  lexicon: LSJ
  rationale: Preserves the formal theological role described in the Greek; 'intercedes'
    is then used nearby for explanatory clarity.
- source_word: σωτήρ
  chosen: Savior
  alternatives:
  - deliverer
  lexicon: LSJ
  rationale: The title carries theological weight in the closing exhortation; capitalized
    as a title-like reference in context.
