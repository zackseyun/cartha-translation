theological_decisions:
- issue: Reference to future salvation arising from Levi and Judah
  chosen_reading: Translated as 'from them the Lord will raise up salvation for Israel'
    without specifying a later doctrinal identity in the main text.
  alternative_readings:
  - A messianic reference focused on Judah alone
  - A priestly-royal dual expectation from Levi and Judah
  - A later Christianized allusion to Christ
  rationale: The Greek names both Levi and Judah. The translation preserves the textual
    tension and leaves fuller interpretation to notes rather than narrowing the sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Angelology in the closing section
  chosen_reading: 'Retained the personal heavenly agent language: ''angel who intercedes,''
    ''mediator,'' and ''angel of peace.'''
  alternative_readings:
  - Symbolic personification of divine providence
  - Later interpolation to be softened in translation
  rationale: The Greek witness presents these as active personal agents. Transparency
    requires translating the witness honestly rather than reducing it to metaphor.
- issue: Satan as prince in Enoch citation
  chosen_reading: 'Translated explicitly: ''your prince is Satan.'''
  alternative_readings:
  - your ruler is the adversary
  - a demonic power rules you
  rationale: The chapter explicitly invokes Enochic tradition and names Satan. The
    translation preserves the apocalyptic worldview of the text.
- issue: Potentially Christian-sounding closing title 'Savior of the nations'
  chosen_reading: Kept the phrase as written in the Greek witness and did not harmonize
    or suppress it.
  alternative_readings:
  - deliverer of the nations
  - possible secondary Christian expansion
  rationale: The phrase may reflect later expansion, but the translator's task is
    to render the extant Greek honestly and flag the issue in a note rather than emend
    silently.
