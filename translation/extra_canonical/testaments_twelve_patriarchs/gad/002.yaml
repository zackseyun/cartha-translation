translation:
  text: '1 Therefore I confess my sin, children: many times I wanted to kill him,
    because I hated him from my soul. 2 And because of the dreams I added hatred toward
    him, and I wanted to lick him up from the land of the living, as a calf licks
    up the green growth of the field. 3 But Judah sold him secretly to the Ishmaelites.
    4 Thus the God of our fathers rescued him from our hands, so that we might not
    commit a great lawless deed in Israel.


    3 Therefore Simeon and I sold him to the Ishmaelites for thirty pieces of gold;
    and after hiding ten, we showed twenty to our brothers. 4 And so, through greed,
    we were fully set on his murder. 5 But the God of my fathers rescued him from
    my hands, so that I might not commit a lawless deed in Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The chapter preserves more than one textual form of the Joseph-selling episode.
      This draft translates both strands rather than harmonizing them.
    reason: textual_variant
  - marker: b
    text: Or 'consume him' / 'wipe him out.' The Greek verb is kept literally here
      because of the calf simile that follows.
    reason: lexical_alternative
  - marker: c
    text: Some witnesses attribute the sale secretly to Judah; another strand says,
      'Therefore Simeon and I sold him to the Ishmaelites for thirty pieces of gold.'
    reason: textual_variant
  - marker: d
    text: '''Thirty pieces of gold'' reflects the Greek text here; the line about
      hiding ten and showing twenty also belongs to this variant strand.'
    reason: textual_variant
lexical_decisions:
- source_word: Ὁμολογῶ
  chosen: I confess
  alternatives:
  - I acknowledge
  lexicon: BDAG
  rationale: Direct penitential admission fits Gad's confessional tone better than
    the flatter 'acknowledge.'
- source_word: ἁμαρτίαν
  chosen: sin
  alternatives:
  - offense
  lexicon: BDAG
  rationale: Standard moral-religious term; 'sin' preserves the theological weight
    of Gad's self-accusation.
- source_word: ἀνελεῖν
  chosen: to kill
  alternatives:
  - to do away with
  - to slay
  lexicon: BDAG
  rationale: Plain and forceful English best matches the murderous intent without
    archaizing.
- source_word: ἐμίσουν ... ἐκ ψυχῆς
  chosen: I hated him from my soul
  alternatives:
  - I hated him with all my heart
  - I hated him deeply
  lexicon: BDAG
  rationale: Keeps the Semitic-like intensity and avoids smoothing the idiom into
    a generic modern phrase.
- source_word: ἐνύπνια
  chosen: dreams
  alternatives:
  - dream-visions
  lexicon: BDAG
  rationale: Straightforward rendering; the context is Joseph's dreams.
- source_word: προσεθέμην ... τὸ μῖσος
  chosen: I added hatred
  alternatives:
  - I increased my hatred
  - I added to my hatred
  lexicon: BDAG
  rationale: Preserves the verbal image of hatred being augmented rather than merely
    restating emotion.
- source_word: ἐκλεῖξαι
  chosen: to lick ... up
  alternatives:
  - to consume
  - to wipe out
  lexicon: LSJ
  rationale: The following calf simile requires the concrete verb 'lick up'; a more
    idiomatic 'wipe out' would lose the image.
- source_word: ἐκ γῆς ζώντων
  chosen: from the land of the living
  alternatives:
  - from among the living
  lexicon: BDAG
  rationale: Traditional biblical idiom is transparent in English and preserves the
    elevated register.
- source_word: τὰ χλωρὰ τοῦ πεδίου
  chosen: the green growth of the field
  alternatives:
  - the grass of the field
  - the green things of the field
  lexicon: LSJ
  rationale: Captures the plural/neuter sense of verdant growth without over-specifying
    one plant.
- source_word: κρυφῆ
  chosen: secretly
  alternatives:
  - in secret
  lexicon: BDAG
  rationale: Natural English adverb that preserves the clandestine action.
- source_word: ἐρρύσατο
  chosen: rescued
  alternatives:
  - delivered
  - saved
  lexicon: BDAG
  rationale: '''Rescued'' fits the concrete sense of deliverance from immediate danger.'
- source_word: ἀνομίαν μεγάλην / ἀνόμημα
  chosen: a great lawless deed / a lawless deed
  alternatives:
  - great wickedness / wickedness
  - great crime / crime
  lexicon: BDAG
  rationale: Retains the legal-moral force of ἀνομία language rather than reducing
    it to generic evil.
- source_word: πλεονεξίᾳ
  chosen: through greed
  alternatives:
  - through covetousness
  - by avarice
  lexicon: BDAG
  rationale: Accessible modern English that still names the vice clearly.
- source_word: ἐπληροφορήθημεν
  chosen: we were fully set on
  alternatives:
  - we were convinced of
  - we were brought to fullness in
  lexicon: BDAG
  rationale: The verb is difficult here; this rendering conveys being carried through
    to settled murderous intent in context.
- source_word: ἀναιρέσεως
  chosen: murder
  alternatives:
  - killing
  - destruction
  lexicon: BDAG
  rationale: Given the personal and illicit intent toward Joseph, 'murder' best expresses
    the moral force.
