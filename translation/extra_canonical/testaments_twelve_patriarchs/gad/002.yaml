theological_decisions:
- issue: Divergent textual forms in the chapter (Judah sold him secretly vs. Simeon
    and I sold him; one rescue statement plural, another singular)
  chosen_reading: Translate both forms as preserved in the Greek witness, presenting
    the chapter's textual doubleness rather than harmonizing it.
  alternative_readings:
  - Conflate the accounts into a single smooth narrative
  - Prefer one manuscript strand and omit the other in translation
  rationale: The supplied Greek preserves parallel/variant material. Transparency
    requires rendering the extant witness honestly and letting notes explain the tension
    rather than silently resolving it.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
- issue: Meaning of the unusual image ἐκλεῖξαι ... ὡς ... ἐκλείχει ὁ μόσχος
  chosen_reading: Retain the concrete simile 'lick him up ... as a calf licks up the
    green growth of the field.'
  alternative_readings:
  - Interpret idiomatically as 'wipe him out'
  - Render more generally as 'consume him'
  rationale: Because the Greek itself immediately explains the image with the calf
    simile, preserving the concrete metaphor is more auditable and literarily vivid.
