translation:
  text: Therefore guard yourselves, my children, from hatred, because it works lawlessness
    even against the Lord himself. For it does not want to hear the words of his commandments
    concerning love of one’s neighbor, and so it sins against God. For if a brother
    falls, it is eager at once to report it to everyone, and it hastens to see that
    he be judged and punished and die. And if it is some slave, it brings accusations
    against him before his master, and in every distress it rejoices over him, if
    perhaps he may be put to death. For hatred works together with envy also against
    those who prosper; hearing of their success and seeing it, it is always weakened.
    Just as love would even make the dead alive and would call back those under sentence
    of death, so also hatred wants to kill the living, and it does not want those
    who have sinned only a little to live. For the spirit of hatred, through faintheartedness,
    works together with Satan in everything for the death of men; but the spirit of
    love, through longsuffering, works together with the law of God for the salvation
    of men.
