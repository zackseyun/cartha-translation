theological_decisions:
- issue: Force of ἐν ἐσχάτοις καιροῖς
  chosen_reading: in the last times
  alternative_readings:
  - in later times
  - in the end times
  rationale: The phrase can denote future latter days without requiring a fully developed
    apocalyptic timetable. 'In the last times' preserves the testamentary prophetic
    register while avoiding over-specification.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of τοῦ ἐπιστρέψαι αὐτοὺς εἰς τὴν γῆν αὐτῶν
  chosen_reading: to bring them back into their land
  alternative_readings:
  - when he brings them back into their land
  - and restore them to their land
  rationale: The infinitival clause is somewhat compressed in the Greek witness. This
    rendering treats it as expressing the purpose or result of divine deliverance,
    preserving the restoration theme without over-smoothing the syntax.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    ambiguity where the source is compressed.
