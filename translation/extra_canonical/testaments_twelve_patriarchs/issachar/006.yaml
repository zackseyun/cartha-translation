translation:
  text: Know therefore, my children, that in the last times your sons will abandon
    simplicity and attach themselves to greed; and leaving innocence, they will draw
    near to cunning, and abandoning the commandments of the Lord, they will attach
    themselves to Beliar. And leaving farming, they will follow their evil schemes,
    and they will be scattered among the nations and will serve their enemies. Therefore
    you also tell these things to your children, so that, if they sin, they may return
    more quickly to the Lord, because he is merciful and will deliver them, to bring
    them back into their land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guilelessness' for 'innocence' (ἀκακία), highlighting freedom from deceit
      rather than merely blamelessness.
    reason: lexical_alternative
  - marker: b
    text: Beliar is the Greek form found here; many readers will know the name as
      'Belial.'
    reason: lexical_alternative
  - marker: c
    text: '''Return to the Lord'' carries the sense of repentance as well as restoration.'
    reason: cross_reference
  - marker: d
    text: The final clause may also be understood as 'and restore them to their land.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἁπλότης
  chosen: simplicity
  alternatives:
  - single-mindedness
  - integrity
  lexicon: LSJ
  rationale: In Issachar this virtue is thematic and denotes uncomplicated moral singleness
    rather than mere lack of sophistication. 'Simplicity' preserves the testament's
    virtue vocabulary and echoes the father's praise of plain, undivided living.
- source_word: ἀπληστία
  chosen: greed
  alternatives:
  - insatiability
  - covetousness
  lexicon: LSJ
  rationale: The term denotes grasping desire or avarice. 'Greed' is idiomatic and
    morally weighty in English, while still matching the vice contrasted with Issachar's
    simplicity.
- source_word: ἀκακία
  chosen: innocence
  alternatives:
  - guilelessness
  - harmlessness
  lexicon: LSJ
  rationale: The word can mean guilelessness or lack of malice. 'Innocence' reads
    naturally in the vice/virtue contrast, while the note preserves the more specific
    nuance of guilelessness.
- source_word: πανουργία
  chosen: cunning
  alternatives:
  - craftiness
  - knavery
  lexicon: LSJ
  rationale: The term marks unscrupulous cleverness. 'Cunning' keeps the sharp moral
    contrast with innocence without sounding overly archaic.
- source_word: κολλάω / κολληθήσονται
  chosen: attach themselves to
  alternatives:
  - cling to
  - join themselves to
  lexicon: LSJ
  rationale: 'The repeated verb creates rhetorical parallelism: they attach themselves
    to greed, then to Beliar. ''Attach themselves to'' preserves the deliberate movement
    of allegiance without sounding wooden.'
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: LSJ
  rationale: The Greek witness reads Beliar. The translation transliterates the form
    present in the source rather than normalizing it to the more familiar 'Belial.'
- source_word: γεωργεῖν
  chosen: farming
  alternatives:
  - working the land
  - agriculture
  lexicon: LSJ
  rationale: The infinitive refers to agricultural labor, a key element in Issachar's
    idealized way of life. 'Farming' is concise and concrete.
- source_word: πονηροῖς διαβουλίοις
  chosen: evil schemes
  alternatives:
  - wicked plans
  - malicious counsels
  lexicon: LSJ
  rationale: The phrase denotes morally corrupt designs. 'Evil schemes' is natural
    English and preserves the active, plotting sense.
- source_word: διασπαρήσονται
  chosen: they will be scattered
  alternatives:
  - they will be dispersed
  - they will be sown abroad
  lexicon: LSJ
  rationale: The passive future evokes dispersion among the nations. 'Scattered' is
    the clearest idiomatic rendering and preserves exilic force.
- source_word: δουλεύσουσιν
  chosen: will serve
  alternatives:
  - will be enslaved to
  - will be slaves to
  lexicon: LSJ
  rationale: The verb can imply servitude under hostile powers. Here 'serve their
    enemies' fits the idiom of subjugation in exile; the stronger slavery nuance is
    possible but not required by the immediate syntax.
- source_word: τάχιον
  chosen: more quickly
  alternatives:
  - swiftly
  - at once
  lexicon: LSJ
  rationale: The comparative adverb stresses prompt return after sin. 'More quickly'
    reflects the Greek form, though idiomatically it functions as an urgent call to
    speedy repentance.
- source_word: ἐπιστρέψωσι πρὸς τὸν Κύριον
  chosen: return to the Lord
  alternatives:
  - turn back to the Lord
  lexicon: LSJ
  rationale: ἐπιστρέφω in this moral-religious context carries repentance and restoration.
    'Return to the Lord' preserves both covenantal and spatial resonance.
- source_word: ἐξελεῖται
  chosen: will deliver
  alternatives:
  - will rescue
  - will take out
  lexicon: LSJ
  rationale: The verb denotes rescue or deliverance. 'Will deliver' fits the merciful
    restoration context and leaves open both rescue from enemies and restoration from
    exile.
