id: T12P.ISS.06
reference: Testament of Issachar 6
source:
  edition: Charles 1908 Greek Versions (pages 176-187, Issachar pilot)
  text: '*Γινώσκετε οὖν¹, τέκνα² μου, ὅτι ἐν ἐσχάτοις καιροῖς καταλείψουσιν³ οἱ υἱοὶ
    ὑμῶν τὴν ἁπλότητα Γκαὶ κολληθήσονται τῇ ἀπληστίᾳ˥, Γκαὶ⁷ ἀφέντες⁴ Γτὴν ἀκακίαν⁵
    προσπελάσουσι⁶ τῇ πανουργίᾳ⁷, * καὶ καταλιμπάνοντες⁸ τὰς ἐντολὰς Κυρίου * κολληθήσονται
    τῷ Βελίαρ⁹. 2. Καὶ ἀφέντες⁷ τὸ¹⁰ γεωργεῖν¹¹ ἐξακολουθήσουσι¹² τοῖς Γπονηροῖς¹¹³
    διαβουλίοις αὐτῶν καὶ διασπαρήσονται ἐν τοῖς ἔθνεσιν καὶ δουλεύσουσιν¹⁴ τοῖς ἐχθροῖς
    αὐτῶν. 3. Καὶ ὑμεῖς οὖν εἴπατε ταῦτα¹⁵ τοῖς τέκνοις ὑμῶν, ὅπως, ἐὰν ἁμάρτωσι¹⁶,
    τάχιον¹⁷ ἐπιστρέψωσι¹⁸ πρὸς τὸν¹⁹ Κύριον, 4. Ὅτι ἐλεήμων ἐστὶ καὶ ἐξελεῖται²⁰
    αὐτοὺς *τοῦ ἐπιστρέ- ψαι αὐτοὺς²¹ εἰς τὴν γῆν αὐτῶν.'
