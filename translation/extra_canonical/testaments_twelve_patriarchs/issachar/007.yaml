theological_decisions:
- issue: How strongly to render Issachar's claim of sinlessness
  chosen_reading: Translate as a claim of not being conscious of 'any sin unto death,'
    not as absolute sinlessness
  alternative_readings:
  - I have no sin in me
  - I have committed no deadly sin
  rationale: The Greek wording is self-testimonial and qualified by εἰς θάνατον. The
    translation preserves the moral force of Issachar's example without making a broader
    doctrinal claim than the text states.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
- issue: Referent of 'who walks with people in simplicity of heart'
  chosen_reading: The clause refers to 'the God of heaven and earth' accompanying
    the righteous
  alternative_readings:
  - the clause describes the sons walking with God in simplicity
  - the phrase is a looser general maxim
  rationale: The nearest grammatical antecedent is 'the God of heaven and earth,'
    and the participial construction naturally describes God's accompanying presence.
    This also fits the exhortational promise structure of the verse.
  doctrine_reference: DOCTRINE.md §Original-language primacy over translation tradition
