translation:
  text: '1. See then, as you perceive: I am one hundred and twenty-six years old,
    and I am not conscious of committing any sin unto death. 2. Except for my wife,
    I have not known another woman. I did not commit sexual immorality with wandering
    eyes. 3. I did not drink wine for deception, and I did not desire anything that
    belonged to my neighbor. 4. No deceit came to be in my heart, and no lie went
    up through my lips. 5. I groaned together with every person in pain, and I shared
    my bread with the poor. I practiced godliness in all my days; I kept truth. 6.
    I loved the Lord with all my strength, and likewise I loved every person with
    all my heart, more than my children. 7. You also, my children, do these things,
    and every spirit of Beliar will flee from you, and no deed of wicked people will
    rule over you; and you will subdue every wild beast, having with you the God of
    heaven and earth, who walks with people in simplicity of heart. 8. And after saying
    these things he commanded his sons to carry him up to Hebron and bury him there
    with his fathers in the cave. 9. And stretching out his feet, he fell asleep in
    a good old age, sound in every limb and strong, and slept the eternal sleep.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have not known in myself any sin unto death.' The Greek uses 'know'
      in a self-aware moral sense.
    reason: lexical_alternative
  - marker: b
    text: '''Beliar'' reflects the Greek form here; some traditions normalize the
      name as ''Belial.'''
    reason: alternative_reading
  - marker: c
    text: The phrase 'who walks with people in simplicity of heart' may also be understood
      as describing God's companionship with those who live in singleness of heart.
    reason: alternative_reading
  - marker: d
    text: Some textual forms of the closing verse vary between 'he died in a good
      old age' and 'he slept the eternal sleep,' with expansions about being sound
      in every limb and strong.
    reason: textual_variant
lexical_decisions:
- source_word: ἔγνων ... ἁμαρτίαν εἰς θάνατον
  chosen: I am not conscious of committing any sin unto death
  alternatives:
  - I have not known in myself sin unto death
  - I have not been aware of any mortal sin in myself
  lexicon: BDAG
  rationale: The Greek uses ἔγνων in a self-referential moral sense ('I knew/was aware'),
    not merely cognitive acquaintance. 'Am not conscious of' conveys testimonial self-examination
    without overstating sinlessness. 'Unto death' preserves the Greek phrase εἰς θάνατον
    rather than importing later doctrinal terminology like 'mortal sin' into the main
    text.
- source_word: γυναικός ... οὐκ ἔγνων ἄλλην
  chosen: Except for my wife, I have not known another woman
  alternatives:
  - other than my wife I did not know another
  - besides my spouse I did not have relations with another woman
  lexicon: BDAG
  rationale: '''Know'' preserves the idiomatic sexual sense of γινώσκω while remaining
    readable in English. ''Wife'' is clearer than the more wooden ''consort/spouse''
    for συμβίου μου in this testamentary moral context.'
- source_word: ἐπόρνευσα
  chosen: I did not commit sexual immorality
  alternatives:
  - I did not fornicate
  - I was not sexually immoral
  lexicon: BDAG
  rationale: The verb denotes illicit sexual conduct broadly. 'Commit sexual immorality'
    is accessible modern English and avoids the narrower or archaic feel of 'fornicate.'
- source_word: ἐν μετεωρισμῷ ὀφθαλμῶν μου
  chosen: with wandering eyes
  alternatives:
  - in the distraction of my eyes
  - with roving eyes
  - with uplifted/restless eyes
  lexicon: LSJ
  rationale: The phrase points to unsettled, roving, desire-driven looking. 'With
    wandering eyes' captures the moral nuance idiomatically in English.
- source_word: οἶνον εἰς ἀποπλάνησιν
  chosen: wine for deception
  alternatives:
  - wine to lead astray
  - wine for dissipation
  lexicon: BDAG
  rationale: ἀποπλάνησις carries the sense of being led astray or deceived. 'For deception'
    keeps the noun's moral force and the concise parallelism of the verse, though
    the exact nuance may include self-deluding excess.
- source_word: ἐπιθύμημα τοῦ πλησίου
  chosen: anything that belonged to my neighbor
  alternatives:
  - my neighbor's desireable things
  - my neighbor's possessions
  lexicon: BDAG
  rationale: The phrase echoes coveting language. Rather than a stiff literalism,
    this rendering communicates the commandment-like sense in natural English.
- source_word: Δόλος
  chosen: deceit
  alternatives:
  - guile
  - treachery
  lexicon: BDAG
  rationale: '''Deceit'' is the clearest contemporary equivalent and fits the heart/lips
    parallel with ''lie.'''
- source_word: συνεστέναξα
  chosen: I groaned together with
  alternatives:
  - I sighed with
  - I sympathized with
  lexicon: BDAG
  rationale: The compound verb is stronger than generic sympathy; it depicts shared
    suffering. 'Groaned together with' preserves the embodied pathos of the testament.
- source_word: μετέδωκα ἄρτον μου
  chosen: I shared my bread
  alternatives:
  - I gave of my bread
  - I distributed my food
  lexicon: BDAG
  rationale: '''Shared my bread'' preserves the concrete image and charitable ethos
    without over-expansion.'
- source_word: Εὐσέβειαν ἐποίησα
  chosen: I practiced godliness
  alternatives:
  - I acted with piety
  - I did piety
  lexicon: BDAG
  rationale: The Greek is somewhat idiomatic; 'practiced godliness' conveys habitual
    reverent conduct in readable English.
- source_word: Ἀλήθειαν ἐφύλαξα
  chosen: I kept truth
  alternatives:
  - I guarded truth
  - I kept faithfulness
  lexicon: BDAG
  rationale: The terse formulation is preserved. 'Kept truth' sounds slightly elevated,
    fitting the testament style, and avoids reducing ἀλήθεια to mere factual correctness.
- source_word: Τὸν Κύριον ἠγάπησα
  chosen: I loved the Lord
  alternatives:
  - I have loved the Lord
  lexicon: BDAG
  rationale: κύριος is translated 'Lord' per project policy. The aorist is rendered
    simply in English narrative testimony.
- source_word: πάντα ἄνθρωπον
  chosen: every person
  alternatives:
  - every man
  - all people
  lexicon: BDAG
  rationale: The phrase is distributive and inclusive in sense. 'Every person' preserves
    the singular rhetorical pattern while using contemporary English.
- source_word: ὑπὲρ τὰ τέκνα μου
  chosen: more than my children
  alternatives:
  - beyond my children
  - above my children
  lexicon: BDAG
  rationale: ὑπέρ here expresses comparison. 'More than my children' preserves the
    startling ethical claim without softening it.
- source_word: πνεῦμα τοῦ Βελίαρ
  chosen: spirit of Beliar
  alternatives:
  - spirit of Belial
  lexicon: LSJ
  rationale: The Greek witness reads Βελίαρ. The transliterated form is retained rather
    than normalized, since this is a proper name/title in the textual tradition.
- source_word: οὐ κυριεύσει ὑμῶν
  chosen: will rule over you
  alternatives:
  - will dominate you
  - will have mastery over you
  lexicon: BDAG
  rationale: κυριεύω denotes lordship/mastery. 'Rule over you' is direct and preserves
    the moral warning register.
- source_word: καταδουλώσετε
  chosen: you will subdue
  alternatives:
  - you will enslave
  - you will bring into subjection
  lexicon: BDAG
  rationale: Although the verb can mean enslave, in context of wild beasts the idiomatic
    sense is overcoming/subduing them. 'Subdue' avoids an awkwardly literal image
    while staying close to the Greek.
- source_word: συμπορευόμενον τοῖς ἀνθρώποις ἐν ἁπλότητι καρδίας
  chosen: who walks with people in simplicity of heart
  alternatives:
  - who goes along with men in singleness of heart
  - who accompanies people who are simple in heart
  lexicon: BDAG
  rationale: The participle most naturally modifies 'the God of heaven and earth.'
    'Simplicity of heart' preserves the testament's virtue vocabulary of moral singleness,
    not naivete.
- source_word: ἀναγάγωσιν αὐτὸν ἐν Χεβρών
  chosen: carry him up to Hebron
  alternatives:
  - bring him up to Hebron
  lexicon: BDAG
  rationale: ἀνάγω commonly means bring/carry up. 'Carry him up' fits funerary transport
    and preserves the directional nuance.
- source_word: ἐκοιμήθη ... ὕπνον αἰώνιον
  chosen: he fell asleep ... and slept the eternal sleep
  alternatives:
  - he died ... the everlasting sleep
  - he slept the sleep of eternity
  lexicon: BDAG
  rationale: The sleep metaphor is prominent in the Greek and should be preserved
    rather than flattened to 'died' alone. 'Eternal sleep' keeps the solemn testamentary
    cadence.
