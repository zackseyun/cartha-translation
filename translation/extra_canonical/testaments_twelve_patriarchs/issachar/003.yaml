theological_decisions:
- issue: Cultic reference to Rachel dedicating the mandrakes 'in the house of the
    Lord' and bringing them 'to the priest' in a patriarchal setting
  chosen_reading: Translate the Greek witness directly and preserve the anachronistic
    cultic language in the main text
  alternative_readings:
  - Harmonize to Genesis and omit/soften the temple-priest language
  - Treat the line as secondary and bracket it out
  rationale: The Greek text explicitly contains house-of-the-Lord and priest language.
    Even if this reflects later expansion or interpretive retelling, transparency
    requires translating what is present rather than silently harmonizing to Genesis.
  doctrine_reference: 'PHILOSOPHY.md: translate the source text honestly; use notes
    rather than harmonizing'
- issue: Issachar's virtue term ἁπλότης
  chosen_reading: Render consistently as 'simplicity'
  alternative_readings:
  - single-mindedness
  - sincerity
  - integrity
  rationale: This testament centers on simplicity as a moral ideal. Consistent rendering
    preserves the thematic thread and avoids dissolving a key virtue into varied English
    synonyms.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
