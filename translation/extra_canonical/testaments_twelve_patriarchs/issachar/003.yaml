translation:
  text: 'For if Leah my mother had not given up marital union in exchange for the
    two apples, she would still have been destined to bear eight sons. Therefore she
    bore six, and Rachel bore the two, because through the mandrakes the Lord visited
    her. For he saw that Leah desired to be with Jacob for the sake of children, and
    not for the sake of pleasure. For on the next day also she again gave Jacob over.
    Therefore through the mandrakes the Lord listened to Rachel. For although she
    longed for these, she did not eat them, but dedicated them in the house of the
    Lord, after bringing them to the priest.


    When therefore I grew to manhood, my children, I walked in uprightness of heart,
    and I became a farmer for my father and for my brothers. And my father blessed
    me, seeing that I walked before him in simplicity. And I was not meddlesome in
    my actions, nor envious and malicious toward my neighbor. I never slandered anyone,
    nor did I criticize a man''s way of life. At thirty-five years of age I took a
    wife for myself, for my labor consumed my strength, and I did not think about
    a woman''s pleasure; rather, because of my toil, sleep came over me. And my father
    always rejoiced in my simplicity, because I offered every firstborn through the
    priest to the Lord, and then also to my father. And the Lord multiplied my good
    things ten thousandfold, and my father likewise increased the good things for
    me twofold.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'apples'; the surrounding tradition and the next lines identify the
      plants as mandrakes.
    reason: lexical_alternative
  - marker: b
    text: Or 'evil-eyed' or 'begrudging' toward my neighbor.
    reason: lexical_alternative
  - marker: c
    text: The Greek includes 'in the house of the Lord' and 'after bringing them to
      the priest,' language that may reflect a later cultic framing of the patriarchal
      story rather than the Genesis narrative itself.
    reason: textual_variant
  - marker: d
    text: '''Every firstborn'' may broadly denote first issue or first produce, not
      only animal offspring.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνουσία
  chosen: marital union
  alternatives:
  - intercourse
  - cohabitation
  lexicon: LSJ
  rationale: The context is Leah giving up conjugal access to Jacob in the mandrake
    episode. 'Marital union' is clear and dignified, fitting testamentary style without
    becoming clinical.
- source_word: μῆλα
  chosen: apples
  alternatives:
  - fruits
  lexicon: LSJ
  rationale: The Greek literally says 'apples,' even though the broader Genesis tradition
    concerns mandrakes. I preserve the surface wording here and let the following
    explicit mention of mandrakes stand.
- source_word: μανδραγόροις
  chosen: mandrakes
  alternatives: []
  lexicon: LSJ
  rationale: This is the standard and precise rendering for the plant in the Leah-Rachel
    narrative.
- source_word: ἐπεσκέψατο
  chosen: visited
  alternatives:
  - looked upon
  - showed concern for
  lexicon: BDAG
  rationale: '''Visited'' preserves biblical idiom for divine intervention in fertility
    without over-interpreting the manner of action.'
- source_word: φιληδονίαν
  chosen: pleasure
  alternatives:
  - love of pleasure
  - sensual enjoyment
  lexicon: LSJ
  rationale: The contrast is between desire for children and desire for sensual gratification.
    'Pleasure' is concise and preserves the ethical contrast.
- source_word: ἀνέθηκεν
  chosen: dedicated
  alternatives:
  - offered
  - consecrated
  lexicon: LSJ
  rationale: The verb suggests setting apart as an offering. 'Dedicated' fits the
    cultic nuance before the added phrase about bringing them to the priest.
- source_word: εὐθύτητι καρδίας
  chosen: uprightness of heart
  alternatives:
  - straightness of heart
  - integrity of heart
  lexicon: LSJ
  rationale: This keeps the moral texture and inward orientation of the phrase while
    sounding natural in English.
- source_word: ἁπλότης / ἁπλότητι
  chosen: simplicity
  alternatives:
  - single-mindedness
  - sincerity
  lexicon: BDAG
  rationale: Simplicity is a keynote virtue in Issachar. I retain it consistently
    rather than varying to smoother English, because the chapter emphasizes an uncomplex,
    guileless life.
- source_word: περίεργος
  chosen: meddlesome
  alternatives:
  - curious
  - busybody
  lexicon: BDAG
  rationale: The sense is not innocent curiosity but interfering over-involvement
    in matters beyond one's proper work.
- source_word: φθονερὸς
  chosen: envious
  alternatives:
  - jealous
  lexicon: BDAG
  rationale: The vice in paraenetic lists is best rendered 'envious,' preserving the
    moral category common in Jewish ethical exhortation.
- source_word: βάσκανος
  chosen: malicious
  alternatives:
  - evil-eyed
  - begrudging
  lexicon: LSJ
  rationale: The term can carry the sense of the evil eye or spiteful ill will. 'Malicious'
    communicates the hostile moral sense in readable English; the alternative is noted
    in a footnote.
- source_word: κατελάλησα
  chosen: slandered
  alternatives:
  - spoke against
  - backbit
  lexicon: BDAG
  rationale: The verb denotes speaking against someone in a defamatory way; 'slandered'
    is strong and fitting.
- source_word: ἔψεξα βίον ἀνθρώπου
  chosen: criticize a man's way of life
  alternatives:
  - find fault with a person's life
  - reproach a man's conduct
  lexicon: LSJ
  rationale: This preserves the object 'life/way of life' rather than reducing it
    to generic blame.
- source_word: κάματος
  chosen: labor
  alternatives:
  - toil
  - weariness
  lexicon: BDAG
  rationale: The context is agricultural exertion. 'Labor' fits both the physical
    work and the dignified register.
- source_word: ἡδονὴν γυναικός
  chosen: a woman's pleasure
  alternatives:
  - sexual pleasure from a woman
  - delight in women
  lexicon: LSJ
  rationale: The phrase points to sexual enjoyment. I keep the wording restrained
    but clear, matching Issachar's self-description of disciplined simplicity.
- source_word: πᾶν πρῶτον γέννημα
  chosen: every firstborn
  alternatives:
  - every first issue
  - all first produce
  lexicon: LSJ
  rationale: The phrase can denote first offspring/first issue. In this agrarian and
    sacrificial context, 'every firstborn' is the most straightforward rendering,
    though the exact scope may include first produce; this is noted in a footnote.
- source_word: ἐμυριοπλασίασε
  chosen: multiplied ... ten thousandfold
  alternatives:
  - made exceedingly many
  - multiplied abundantly
  lexicon: LSJ
  rationale: The compound is emphatic. 'Ten thousandfold' preserves the hyperbolic
    force rather than flattening it to a vague adverb.
