theological_decisions:
- issue: Status of the bracketed Gad clause in verse 8
  chosen_reading: Translated in brackets as part of the Greek witness but marked as
    secondary-looking material.
  alternative_readings:
  - Omit as a later gloss
  - Translate without brackets as fully integral text
  rationale: The clause sits awkwardly in context after the exhortation to obey Levi
    and Judah and appears textually intrusive. Following the transparency principle,
    it is translated honestly from the witness but visually marked as likely secondary
    or at least dislocated.
  doctrine_reference: 'PHILOSOPHY.md: preserve textual complexity with notes rather
    than harmonizing.'
- issue: Reference of 'holy ones from Abel until now'
  chosen_reading: Rendered generically as 'all the holy ones from Abel until now.'
  alternative_readings:
  - '''all the righteous from Abel until now'''
  - '''all the saints from Abel until this day'''
  rationale: The Greek reads ἁγίους, not a direct term for 'righteous.' The phrase
    likely evokes the line of accepted worshipers, but the translation preserves the
    actual lexical choice.
