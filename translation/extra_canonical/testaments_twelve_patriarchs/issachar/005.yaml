translation:
  text: '1 Therefore, my children, keep the law of God, and acquire simplicity, and
    walk in innocence, not busying yourselves with the deeds of your neighbor. 2 But
    love the Lord and your neighbor; show mercy to the poor and the weak. 3 Bend your
    back to farming, and labor in every work of cultivation, offering gifts to the
    Lord with thanksgiving. 4 For in the firstfruits of the produce of the land the
    Lord will bless you, just as he blessed all the holy ones from Abel until now.
    5 For no other portion has been given to you except the richness of the earth
    through the toil of its fruits. 6 For my father Jacob also blessed me with blessings
    of the earth and of firstfruits of produce. 7 And Levi and Judah were glorified
    by the Lord among the sons of Jacob. And the Lord gave them as an inheritance:
    to Levi, the priesthood; and to Judah, the kingdom. 8 Therefore obey them, and
    walk in the simplicity of your father. [But to Gad it was given to destroy the
    marauding raids coming upon Israel.]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[a]'
    text: The final clause about Gad is textually awkward in this context and may
      reflect a later gloss or displaced line; it is translated here because it appears
      in the Greek witness.
    reason: textual_variant
  - marker: '[b]'
    text: Or 'the fatness of the earth' for 'the richness of the earth,' preserving
      the more literal agricultural idiom.
    reason: lexical_alternative
  - marker: '[c]'
    text: '''The holy ones from Abel until now'' likely refers to the line of accepted
      worshipers beginning with Abel; compare the firstfruits motif in Genesis and
      later biblical tradition.'
    reason: cross_reference
lexical_decisions:
- source_word: νόμον Θεοῦ
  chosen: the law of God
  alternatives:
  - God's law
  lexicon: LSJ
  rationale: Retains the objective genitive sense and the testamentary exhortation's
    formal tone.
- source_word: ἁπλότητα
  chosen: simplicity
  alternatives:
  - single-mindedness
  - integrity
  lexicon: LSJ
  rationale: This testament consistently praises a plain, undivided, guileless way
    of life; 'simplicity' preserves that thematic thread without over-interpreting.
- source_word: ἀκακίᾳ
  chosen: innocence
  alternatives:
  - guilelessness
  - harmlessness
  lexicon: LSJ
  rationale: Pairs naturally with 'simplicity' while preserving the moral sense of
    being without malice.
- source_word: μὴ περιαργαζόμενοι
  chosen: not busying yourselves
  alternatives:
  - not meddling
  - not being over-curious
  lexicon: LSJ
  rationale: Conveys fussy interference in others' affairs; 'meddling' is possible,
    but this wording better reflects the participial nuance with the following phrase.
- source_word: τοῦ πλησίον τὰς πράξεις
  chosen: the deeds of your neighbor
  alternatives:
  - your neighbor's actions
  - the affairs of your neighbor
  lexicon: LSJ
  rationale: Keeps the concrete moral focus on what others do, rather than abstract
    'business' or 'matters'.
- source_word: ἐλεήσατε
  chosen: show mercy
  alternatives:
  - have mercy on
  - be compassionate to
  lexicon: LSJ
  rationale: A strong imperative with covenantal-ethical weight; 'show mercy' is idiomatic
    and preserves the active force.
- source_word: Ὑποτίθετε τὸν νῶτον ὑμῶν
  chosen: Bend your back
  alternatives:
  - set your back
  - put your shoulder to
  lexicon: LSJ
  rationale: An idiomatic English rendering that preserves the bodily image of submitting
    oneself to labor.
- source_word: γεωργεῖν / γεωργίαν
  chosen: farming / cultivation
  alternatives:
  - tilling / agriculture
  lexicon: LSJ
  rationale: Keeps Issachar's agrarian emphasis vivid and readable in modern English.
- source_word: δῶρα ... Κυρίῳ προσφέροντες
  chosen: offering gifts to the Lord
  alternatives:
  - bringing offerings to the Lord
  lexicon: LSJ
  rationale: The participle denotes cultic presentation; 'gifts' reflects δῶρα while
    remaining natural in context.
- source_word: μετ᾽ εὐχαριστείας
  chosen: with thanksgiving
  alternatives:
  - with gratitude
  lexicon: LSJ
  rationale: Preserves the liturgical and devotional coloring of the phrase.
- source_word: ἐν πρωτογεννήμασιν καρπῶν τῆς γῆς
  chosen: in the firstfruits of the produce of the land
  alternatives:
  - through the firstfruits of the land's produce
  lexicon: LSJ
  rationale: Keeps the firstfruits language explicit and close to the Greek, even
    if slightly formal.
- source_word: ἁγίους
  chosen: the holy ones
  alternatives:
  - the saints
  lexicon: LSJ
  rationale: Avoids later ecclesiastical overtones of 'saints' while preserving the
    set-apart sense.
- source_word: μερὶς
  chosen: portion
  alternatives:
  - share
  - inheritance
  lexicon: LSJ
  rationale: A standard inheritance term; 'portion' fits the tribal-allotment context
    without over-specifying.
- source_word: πιότητος τῆς γῆς
  chosen: the richness of the earth
  alternatives:
  - the fertility of the land
  - the fatness of the earth
  lexicon: LSJ
  rationale: Conveys abundance clearly in contemporary English; 'fatness' is more
    literal but less natural.
- source_word: ἐν πόνοις καρπῶν
  chosen: through the toil of its fruits
  alternatives:
  - with labor for its produce
  - by the toil of producing fruit
  lexicon: LSJ
  rationale: Preserves the connection between agricultural produce and labor, though
    the Greek is compressed.
- source_word: ἐκληροδότησεν αὐτούς
  chosen: gave them as an inheritance
  alternatives:
  - assigned them their inheritance
  - apportioned to them
  lexicon: LSJ
  rationale: Reflects the inheritance language explicitly; the following apposition
    clarifies what each received.
- source_word: ἱερατείαν
  chosen: the priesthood
  alternatives:
  - priestly office
  lexicon: LSJ
  rationale: Standard and precise rendering for Levi's allotted role.
- source_word: βασιλείαν
  chosen: the kingdom
  alternatives:
  - kingship
  - royal rule
  lexicon: LSJ
  rationale: Retains the dynastic-political force of Judah's role.
- source_word: ὑπακούετε
  chosen: obey
  alternatives:
  - listen to
  - submit to
  lexicon: LSJ
  rationale: The imperative is strong and direct in a father's testamentary charge.
- source_word: πειρατήρια
  chosen: marauding raids
  alternatives:
  - piracies
  - bands of raiders
  lexicon: LSJ
  rationale: The term is textually difficult and likely refers to predatory incursions;
    this rendering captures the hostile action rather than a maritime sense.
