theological_decisions:
- issue: Implicit subject across the chapter's ethical maxims
  chosen_reading: Rendered as a generic singular 'he' describing the simple/righteous
    person
  alternative_readings:
  - Rendered impersonally ('one does not envy...')
  - Rendered as direct second person exhortation
  rationale: The Greek presents gnomic third-person description. Keeping 'he' preserves
    the proverbial, testamentary style and the portrait of the virtuous man that Issachar
    commends.
