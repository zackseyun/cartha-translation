translation:
  text: He does not envy in his deliberations, nor does malicious envy consume his
    soul, nor is there distraction in greed within his mind. But he walks in simplicity
    of soul; he sees everything with uprightness of heart, not admitting evil eyes
    from the world’s error, so that he may not see the commandments of the Lord as
    distorted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase translated 'evil eyes' may also evoke the idiom of the 'evil
      eye,' that is, a hostile or envious way of looking.
    reason: lexical_alternative
  - marker: b
    text: 'The opening bracketed clause reflects a textual expansion in the printed
      Greek layer: ''nor does malicious envy consume his soul.'' It is translated
      here as part of the witness text.'
    reason: textual_variant
lexical_decisions:
- source_word: ζηλοῖ
  chosen: envy
  alternatives:
  - be jealous
  - be zealous
  lexicon: LSJ
  rationale: In this ethical vice context, the verb denotes jealous/envying disposition
    rather than positive zeal. 'Envy' fits the vice catalogue and keeps the moral
    warning sharp.
- source_word: διαβουλίοις
  chosen: deliberations
  alternatives:
  - plans
  - counsels
  lexicon: LSJ
  rationale: The dative suggests the sphere in which envy does not operate. 'Deliberations'
    preserves the inward, reflective sense better than the more external 'plans.'
- source_word: βάσκανος
  chosen: malicious envy
  alternatives:
  - evil eye
  - envious
  - begrudging
  lexicon: LSJ
  rationale: The bracketed phrase intensifies the vice. Because ὀφθαλμοὺς πονηρούς
    appears later and more naturally bears 'evil eyes,' here 'malicious envy' avoids
    awkward repetition while preserving the hostile, envious sense.
- source_word: ἐκτήκει τὴν ψυχὴν
  chosen: consume his soul
  alternatives:
  - wear away his soul
  - waste his life
  lexicon: LSJ
  rationale: The verb conveys wasting away or consuming. 'Consume his soul' is vivid
    and idiomatic in English while retaining the inner moral corrosion of the Greek.
- source_word: περισπασμός
  chosen: distraction
  alternatives:
  - divided attention
  - anxious preoccupation
  lexicon: LSJ
  rationale: The term suggests being pulled in different directions. 'Distraction'
    is concise and readable, while the following phrase specifies that greed is the
    source of this inner division.
- source_word: ἀπληστείᾳ
  chosen: greed
  alternatives:
  - insatiability
  - covetousness
  lexicon: LSJ
  rationale: The noun denotes lack of satisfaction or grasping excess. 'Greed' is
    the clearest modern equivalent, though 'insatiability' remains a possible nuance.
- source_word: ἁπλότητι ψυχῆς
  chosen: simplicity of soul
  alternatives:
  - single-mindedness
  - sincerity of soul
  lexicon: LSJ
  rationale: This testament strongly values moral simplicity. 'Simplicity of soul'
    preserves the thematic vocabulary and avoids reducing the phrase to mere honesty.
- source_word: εὐθύτητι καρδίας
  chosen: uprightness of heart
  alternatives:
  - straightness of heart
  - integrity of heart
  lexicon: LSJ
  rationale: The phrase expresses inward moral rectitude. 'Uprightness of heart' is
    elevated but readable and preserves the ethical texture.
- source_word: μὴ ἐπιδεχόμενος
  chosen: not admitting
  alternatives:
  - not receiving
  - not allowing
  lexicon: LSJ
  rationale: The participle describes refusal to let something in. 'Not admitting'
    captures the active guarding of the inner life.
- source_word: ὀφθαλμοὺς πονηρούς
  chosen: evil eyes
  alternatives:
  - a wicked eye
  - envious looks
  lexicon: LSJ
  rationale: The plural is retained. The phrase likely evokes the idiom of the 'evil
    eye,' but a more literal rendering keeps the imagery transparent and allows later
    annotation.
- source_word: πλάνης τοῦ κόσμου
  chosen: the world’s error
  alternatives:
  - the deception of the world
  - the world’s wandering
  lexicon: LSJ
  rationale: πλάνη can mean error or deception. 'The world’s error' preserves the
    moral-intellectual sense without overinterpreting the phrase.
- source_word: διεστραμμένας
  chosen: distorted
  alternatives:
  - twisted
  - perverted
  lexicon: LSJ
  rationale: The concern is that one might perceive the Lord's commandments in a warped
    way. 'Distorted' is natural English and preserves the metaphor of moral crookedness.
- source_word: ἐντολὰς τοῦ Κυρίου
  chosen: the commandments of the Lord
  alternatives:
  - the Lord's commands
  lexicon: LSJ
  rationale: This elevated testamentary style favors the fuller phrase 'the commandments
    of the Lord,' preserving scriptural resonance.
