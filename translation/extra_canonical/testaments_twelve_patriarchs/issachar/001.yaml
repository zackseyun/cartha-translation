theological_decisions:
- issue: Promise arising from Levi and Judah
  chosen_reading: Translated 'from them the Lord will raise up salvation for Israel'
    without importing later explicitly messianic wording not present in the supplied
    Greek layer.
  alternative_readings:
  - A more explicitly messianic paraphrase
  - A narrower political 'deliverance'
  rationale: The Greek supports a salvation/deliverance expectation tied to Levi and
    Judah. 'Salvation' preserves theological breadth and allows later readers to assess
    intertextual significance without overtranslation.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
- issue: Beliar terminology
  chosen_reading: Retained the proper name 'Beliar' in the main text.
  alternative_readings:
  - Belial
  - the evil one
  rationale: The Greek witness uses Βελιάρ. Translating as a title would reduce auditability
    and obscure the textual form.
  doctrine_reference: DOCTRINE.md §Original-language primacy over translation tradition
- issue: Issachar's moral self-testimony
  chosen_reading: Rendered the claims straightforwardly as testamentary self-witness,
    not as a doctrinal claim of sinless perfection.
  alternative_readings:
  - Softened paraphrase implying only relative righteousness
  rationale: The genre features idealized ethical self-presentation. The translation
    should preserve the force of the claim while leaving interpretation to notes and
    readers.
  doctrine_reference: PHILOSOPHY.md §transparent reasoning
