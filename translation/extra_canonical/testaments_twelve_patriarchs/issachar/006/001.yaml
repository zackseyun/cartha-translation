translation:
  text: Know therefore, my children, that in the last times your sons will abandon
    simplicity and attach themselves to greed; and leaving innocence, they will draw
    near to cunning, and abandoning the commandments of the Lord, they will attach
    themselves to Beliar. And leaving farming, they will follow their evil schemes,
    and they will be scattered among the nations and will serve their enemies. Therefore
    you also tell these things to your children, so that, if they sin, they may return
    more quickly to the Lord, because he is merciful and will deliver them, to bring
    them back into their land.
