translation:
  text: '1. Then an angel of the Lord appeared to Jacob and said, “Rachel will bear
    two children, because she despised intercourse with a husband and chose self-control.”
    2. And Leah took mandrakes, and for them hired me for one night. 3. Because of
    the mandrakes, therefore, Jacob went in to Rachel rather than to me. 4. But the
    Lord gave heed to my prayer, and I conceived. 5. For I envied Rachel because she
    was bearing children, while I was childless. 6. And the Lord heard me, and he
    gave me this fruit. 7. Because I had offered the mandrakes to the Lord through
    the priest of the Most High, therefore he gave me Issachar as wages. 8. So then,
    my children, hear Issachar your father. 9. I was born as wages because of the
    mandrakes, and I became to my father a reward of hire. 10. Therefore I was called
    Issachar, which means “hire.” 11. And now, children, hear me: walk in simplicity
    of heart, because I have seen that all who are guileless in heart prevail over
    every evil. 12. For if a man does not desire gold, he does not wrong his neighbor;
    he does not crave many delicacies; he does not delight in varied clothing. 13.
    He does not long to live many days; only he waits for the will of God. 14. And
    the spirits of deceit have no power against him, for he does not look on the beauty
    of women, lest he pollute his mind with corruption. 15. There is no envy in his
    thoughts, no malicious person darkens his soul, and no greed distresses his life.
    16. He walks in uprightness of life, and he sees all things in sincerity, shunning
    excess in the desire for worldly gain, so that he may not see the corruption of
    the commandments of the Lord. 17. Therefore, my children, keep the law of God,
    and gain singleness of heart, and walk without guile, not busying yourselves with
    meddling in the affairs of your neighbor, 18. but love the Lord and your neighbor;
    have compassion on the poor and the weak. 19. Bow your back to farming, and labor
    in all kinds of fieldwork, offering thanksgiving to the Lord. 20. For from the
    firstfruits of the earth the Lord will bless you, just as he blessed all the saints
    from Abel until now. 21. For no other portion is given to you than the fatness
    of the earth, whose fruits are raised by toil. 22. For our father Jacob blessed
    me with blessings of the earth and of firstfruits. 23. Levi and Judah were glorified
    by the Lord among the sons of Jacob; to them he gave an inheritance, and to me
    he gave the things of the earth, with firstfruits of fruits. 24. Therefore be
    not eager for adornment, nor for luxury in food, 25. but cultivate the land in
    singleness of heart, and take from it the firstfruits for the Lord. 26. For if
    you do these things, every spirit of Beliar will flee from you, and no deed of
    wickedness will rule over you. 27. And you will eat every good thing of the earth,
    and your sons after you. 28. But know that in the last times your sons will abandon
    singleness of heart, and will cling to insatiable desire; 29. they will forsake
    innocence and draw near to malice; they will leave the commandments of the Lord
    and cling to Beliar; 30. they will abandon farming and follow after their own
    evil schemes; and they will be scattered among the nations and serve their enemies.
    31. Therefore tell these things to your children, so that if they sin, they may
    quickly return to the Lord. 32. For he is merciful, and he will deliver them and
    bring them back into their land.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spurned marital relations.' The Greek wording is unusually stark and
      may reflect a developed interpretive tradition about Rachel's restraint.
    reason: lexical_alternative
  - marker: b
    text: The mandrake episode alludes to Gen 30:14–18, where Leah receives Jacob
      for a night in exchange for mandrakes.
    reason: cross_reference
  - marker: c
    text: '''Beliar'' reflects the Greek form of the name often rendered ''Belial.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέπτυσεν / διέπτυσε
  chosen: despised
  alternatives:
  - spurned
  - rejected
  lexicon: LSJ
  rationale: The verb conveys contemptuous refusal. 'Despised' preserves the moral
    force in the angelic explanation without over-paraphrasing.
- source_word: συνουσία
  chosen: intercourse
  alternatives:
  - marital relations
  - sexual union
  lexicon: LSJ
  rationale: The term refers directly to sexual relations. 'Intercourse' is clear
    and suitably elevated for the testamentary register.
- source_word: ἐγκράτεια
  chosen: self-control
  alternatives:
  - continence
  - restraint
  lexicon: LSJ
  rationale: A key virtue term in Hellenistic Jewish ethics. 'Self-control' is idiomatic
    modern English while preserving the moral emphasis.
- source_word: δραγόρα
  chosen: mandrakes
  alternatives: []
  lexicon: LSJ
  rationale: The plant alludes to the Genesis tradition. The conventional rendering
    is precise and recognizable.
- source_word: ἐκμισθώσω / μισθός
  chosen: hire / wages
  alternatives:
  - reward
  - payment
  lexicon: LSJ
  rationale: The chapter plays on Issachar's name through the wage-hire motif. Preserving
    'hire/wages' keeps the etymological and thematic thread visible.
- source_word: ἁπλότης / ἁπλοῦς
  chosen: simplicity / singleness of heart
  alternatives:
  - sincerity
  - guilelessness
  lexicon: LSJ
  rationale: Issachar's central virtue is more than mere honesty; it is undivided,
    uncomplicated moral integrity. I vary between 'simplicity' and 'singleness of
    heart' to preserve both the literal and ethical sense while documenting the semantic
    field.
- source_word: δόλος
  chosen: guile
  alternatives:
  - deceit
  - treachery
  lexicon: LSJ
  rationale: A recurring vice opposed to Issachar's simplicity. 'Guile' fits the elevated
    register and keeps the contrast sharp.
- source_word: πονηρία
  chosen: wickedness
  alternatives:
  - evil
  - malice
  lexicon: LSJ
  rationale: Used broadly for moral evil. 'Wickedness' preserves ethical weight without
    narrowing the sense.
- source_word: πλεονεξία
  chosen: greed
  alternatives:
  - covetousness
  - grasping
  lexicon: BDAG
  rationale: The vice concerns acquisitive desire. 'Greed' is the clearest modern
    equivalent.
- source_word: εὐθύτης
  chosen: uprightness
  alternatives:
  - straightness
  - integrity
  lexicon: LSJ
  rationale: The term denotes moral straightness. 'Uprightness' is natural English
    and preserves the ethical metaphor.
- source_word: περιεργάζεσθαι
  chosen: busying yourselves with meddling
  alternatives:
  - being busybodies in
  - interfering with
  lexicon: LSJ
  rationale: The warning is against intrusive concern with another's affairs. This
    rendering keeps both the activity and its negative coloring.
- source_word: Βελιάρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: LSJ
  rationale: The Greek form here is Beliar. Following the source-form preserves textual
    transparency rather than normalizing to the more familiar 'Belial'.
- source_word: πρωτογενήματα / ἀπαρχαί
  chosen: firstfruits
  alternatives:
  - first produce
  lexicon: LSJ
  rationale: Cultic agricultural language should remain explicit. 'Firstfruits' is
    standard, clear, and theologically resonant.
- source_word: σπλάγχνα / ἐλεεῖν (conceptual context)
  chosen: have compassion
  alternatives:
  - show mercy
  - pity
  lexicon: LSJ
  rationale: The exhortation concerns active mercy toward the poor and weak. 'Have
    compassion' is readable while retaining ethical seriousness.
