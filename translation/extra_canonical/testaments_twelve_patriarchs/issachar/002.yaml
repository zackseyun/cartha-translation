theological_decisions:
- issue: Rachel's commendation for refusing intercourse
  chosen_reading: Translate the Greek witness straightforwardly as praise of Rachel's
    self-control, without harmonizing away the tension with Genesis.
  alternative_readings:
  - Interpret as temporary abstinence only
  - Treat as a corrupt or secondary expansion and soften the wording
  rationale: The Greek explicitly says Rachel 'despised intercourse with a husband
    and chose self-control.' The translation preserves the witness as transmitted;
    any discomfort is better handled by transparency than by smoothing.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Issachar's birth as 'wages'
  chosen_reading: Retain the wage/hire wordplay throughout the chapter.
  alternative_readings:
  - Use only 'reward' for smoother English
  - Suppress the etymological explanation
  rationale: The chapter's self-understanding and exhortation are tied to Issachar's
    name and origin story. Keeping the lexical thread is essential for auditability
    and literary coherence.
- issue: Beliar terminology
  chosen_reading: Keep the proper name 'Beliar' in the main text.
  alternative_readings:
  - Normalize to 'Belial'
  - Translate generically as 'the evil one'
  rationale: The Greek witness uses the form Βελιάρ. Transliteration preserves the
    source and avoids interpretive overreach.
