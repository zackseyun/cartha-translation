theological_decisions:
- issue: Reference to Enoch as written authority
  chosen_reading: Translated straightforwardly as an appeal to 'the writing of Enoch.'
  alternative_readings:
  - the book of Enoch
  - the inscription/script of Enoch
  rationale: The Greek explicitly invokes a written Enochic witness. The translation
    preserves that claim without deciding which extant Enochic text is meant.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Βελίαρ as personal evil figure
  chosen_reading: Retained as the proper name 'Beliar.'
  alternative_readings:
  - Belial
  - the evil one
  rationale: The Greek presents a named adversarial figure. Translating as a generic
    abstraction would flatten the text's moral cosmology.
  doctrine_reference: Translate titles; transliterate names.
- issue: Prophecy of Simeon's descendants and Levi/Judah
  chosen_reading: Rendered as tribal judgment and loss of leadership among Simeon's
    line.
  alternative_readings:
  - more generalized moral decline
  - strictly historical prediction tied to later tribal absorption
  rationale: The Greek combines moral warning with prophetic tribal destiny. The translation
    keeps both dimensions without narrowing the referent beyond the text.
