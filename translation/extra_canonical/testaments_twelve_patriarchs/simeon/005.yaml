id: T12P.SIM.05
reference: Testament of Simeon 5
source:
  edition: Charles 1908 Greek Versions (pages 80-92, Simeon pilot)
  text: Διὰ τοῦτο Ἰωσὴφ ἦν¹ ὡραῖος *τῷ εἴδει², καὶ καλὸς *τῇ ὄψει, ὅτι³ οὐκ ἐνοίκησεν⁴
    *ἐν αὐτῷ⁵ οὐδὲν⁶ πονηρόν· γὰρ⁷ τῆς ταραχῆς τοῦ πνεύματος τὸ πρόσωπον δηλοῖ⁸. 2.
