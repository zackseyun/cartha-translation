translation:
  text: 'Therefore Joseph was handsome in form and beautiful in appearance, because
    nothing evil dwelt in him; for the face reveals the turmoil of the spirit.


    And now, my children, make your hearts good before the Lord, and make your ways
    straight before men, and you will be finding favor before the Lord and men.


    Guard yourselves, then, from sexual immorality, because sexual immorality is the
    mother of evils, separating from God and drawing near to Beliar.


    For I have seen in the writing of Enoch that your sons will be corrupted in sexual
    immorality, and they will wrong the sons of Levi with the sword.


    But they will not be able to stand against Levi, because he will fight the Lord’s
    war and will defeat your whole host.


    And they will be few in number, being divided in Levi and in Judah, and none from
    among you will be for leadership, just as our father also prophesied in his blessings.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will find favor.' The Greek participial expression may imply an
      ongoing result rather than a simple future.
    reason: lexical_alternative
  - marker: b
    text: '''Beliar'' reflects the Greek form in this witness; other traditions often
      have ''Belial.'''
    reason: textual_variant
  - marker: c
    text: The phrase 'in the writing of Enoch' reflects an appeal to an Enochic written
      source.
    reason: cross_reference
  - marker: d
    text: '''Being divided in Levi and in Judah'' may mean being apportioned among
      or absorbed into those tribes.'
    reason: alternative_reading
  - marker: e
    text: Compare Jacob's blessings over the tribes in Genesis 49, which stand behind
      the closing prophetic claim.
    reason: cross_reference
lexical_decisions:
- source_word: ὡραῖος τῷ εἴδει / καλὸς τῇ ὄψει
  chosen: handsome in form and beautiful in appearance
  alternatives:
  - fair in shape and goodly in sight
  - beautiful in figure and lovely to behold
  lexicon: LSJ
  rationale: Preserves the paired physical-description formula with readable English
    and keeps the rhetorical parallelism rather than collapsing the two expressions
    into one.
- source_word: ἐνοίκησεν ἐν αὐτῷ
  chosen: dwelt in him
  alternatives:
  - was in him
  - made its home in him
  lexicon: BDAG
  rationale: 'The indwelling nuance is morally significant: evil is pictured not merely
    as present but as residing within.'
- source_word: ταραχῆς τοῦ πνεύματος
  chosen: the turmoil of the spirit
  alternatives:
  - the disturbance of the spirit
  - the agitation of the spirit
  lexicon: LSJ
  rationale: Retains the inward moral-psychological sense and matches the claim that
    the face manifests inner disorder.
- source_word: Ἀγαθύνατε τὰς καρδίας ὑμῶν
  chosen: make your hearts good
  alternatives:
  - improve your hearts
  - make your hearts upright
  lexicon: LSJ
  rationale: The verb is unusual and causative; 'make your hearts good' preserves
    the exhortational force without over-interpreting it as merely emotional encouragement.
- source_word: εὐθύνατε τὰς ὁδοὺς ὑμῶν
  chosen: make your ways straight
  alternatives:
  - straighten your ways
  - direct your paths
  lexicon: LSJ
  rationale: Keeps the ethical-path metaphor familiar from biblical idiom and preserves
    imperative force.
- source_word: ἔσεσθε εὑρίσκοντες χάριν
  chosen: you will be finding favor
  alternatives:
  - you will find favor
  - you will come to find favor
  lexicon: BDAG
  rationale: The participial construction suggests an ongoing/resultative sense. The
    English is slightly marked, but it reflects the Greek texture better than a fully
    flattened future.
- source_word: πορνεία
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual sin
  lexicon: BDAG
  rationale: Readable modern English that preserves the broad vice term without restricting
    it too narrowly to premarital intercourse.
- source_word: μήτηρ ἐστὶ τῶν κακῶν
  chosen: is the mother of evils
  alternatives:
  - is the mother of all evils
  - is the source of evils
  lexicon: LSJ
  rationale: The metaphor should remain vivid. 'Of all evils' would overtranslate,
    since πάντων is absent.
- source_word: χωρίζουσα ἀπὸ τοῦ θεοῦ καὶ προσεγγίζουσα τῷ Βελίαρ
  chosen: separating from God and drawing near to Beliar
  alternatives:
  - cutting one off from God and bringing one near to Beliar
  - alienating from God and approaching Beliar
  lexicon: LSJ
  rationale: 'Preserves the stark two-direction moral contrast: vice both distances
    from God and aligns with Beliar.'
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: LSJ
  rationale: The Greek witness reads Βελίαρ; the transliteration follows the form
    present in this text rather than normalizing it.
- source_word: ἐν χαρακτῆρι γραφῆς Ἐνώχ
  chosen: in the writing of Enoch
  alternatives:
  - in the inscription of Enoch
  - in the written record of Enoch
  lexicon: LSJ
  rationale: A natural rendering that still signals appeal to a written Enochic source.
    'Character' or 'inscription' would sound misleadingly technical in English here.
- source_word: φθαρήσονται
  chosen: will be corrupted
  alternatives:
  - will perish
  - will be ruined
  lexicon: BDAG
  rationale: Fits the moral context of corruption through sexual immorality while
    leaving room for destructive consequences.
- source_word: ἀδικήσουσιν ἐν ῥομφαίᾳ
  chosen: they will wrong ... with the sword
  alternatives:
  - they will do violence to ... with the sword
  - they will injure ... by the sword
  lexicon: BDAG
  rationale: Keeps the broad injustice term ἀδικέω while allowing the instrumental
    phrase 'with the sword' to specify violent wrongdoing.
- source_word: πόλεμον Κυρίου πολεμήσει
  chosen: he will fight the Lord’s war
  alternatives:
  - he will wage the Lord's battle
  - he will fight a war of the Lord
  lexicon: LSJ
  rationale: Preserves the cognate accusative emphasis and the sacral-war idiom without
    sounding archaic.
- source_word: παρεμβολήν
  chosen: host
  alternatives:
  - camp
  - army
  lexicon: LSJ
  rationale: '''Host'' captures the collective military sense and suits the elevated
    testamentary register.'
- source_word: ὀλιγοστοί
  chosen: few in number
  alternatives:
  - few
  - scant in number
  lexicon: LSJ
  rationale: Makes explicit the numerical sense in idiomatic English.
- source_word: ἐπιμεριζόμενοι ἐν τῷ Λευὶ καὶ ἐν τῷ Ἰούδᾳ
  chosen: being divided in Levi and in Judah
  alternatives:
  - being apportioned among Levi and Judah
  - being distributed within Levi and Judah
  lexicon: LSJ
  rationale: The sense is of fragmentation/allotment among those tribes; 'being divided'
    is transparent while preserving the participial form.
- source_word: εἰς ἡγεμονίαν
  chosen: for leadership
  alternatives:
  - for rule
  - for governing authority
  lexicon: BDAG
  rationale: Communicates the idea of ruling status or leadership without over-specifying
    a formal office.
