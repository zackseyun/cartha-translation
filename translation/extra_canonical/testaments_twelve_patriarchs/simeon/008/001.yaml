translation:
  text: 'And when Simeon had finished commanding his sons, he fell asleep with his
    fathers, being one hundred and twenty years old.


    And they placed him in a wooden coffin, to bring up his bones to Hebron. And they
    brought them up secretly during a war of the Egyptians.


    For the Egyptians were keeping the bones of Joseph in the tombs of the kings,
    so as to bring him up. For the enchanters were telling them that, when Joseph’s
    bones went out, there would be over all the land darkness and gloom and a great
    plague for the Egyptians, so that even with a lamp each man would not recognize
    his brother.'
