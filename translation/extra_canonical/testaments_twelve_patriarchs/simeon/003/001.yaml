translation:
  text: And now, my children, hear me, and guard yourselves from the spirit of deceit
    and of envy. For envy masters a man's whole mind, and does not allow him either
    to eat or to drink or to do anything good. But it is always urging him to kill
    the one he envies; and while the one envied is always flourishing, the one who
    envies wastes away. For two years, then, in the fear of the Lord I afflicted my
    soul with fasting, and I learned that release from envy comes through the fear
    of God. For if anyone flees for refuge to the Lord, the evil spirit runs away
    from him, and his mind becomes light. And from then on he has compassion on the
    one envied, and forgives those who love him, and so he ceases from envy.
  philosophy: optimal-equivalence
