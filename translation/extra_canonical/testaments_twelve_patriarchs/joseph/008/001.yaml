translation:
  text: '6. And she said to me, “See now, you love me. Let this be enough for me:
    only take responsibility for my life and for my children, and I have hope that
    I shall also obtain my desire.” 7. But she did not know that I spoke this way
    because of my Lord, and not because of her. 8. For if anyone falls under the passion
    of desire and is enslaved to it, as she also was, even if he hears something good,
    he interprets it in terms of that passion, toward his evil desire.


    1. So I say to you, my children, that it was about the sixth hour when she left
    me. And bending my knee to the Lord all that day and all that night, toward dawn
    I rose, weeping and asking for deliverance from her. 2. At last, with evil intent,
    she seized my garments by force, dragging me violently toward intercourse. 3.
    Therefore, when I saw that in her frenzy she had hold of my tunic, I left it behind
    and fled naked. 4. But she, taking hold of it, slandered me; and when her husband
    came, he cast me into prison in his house, and on the next day, after scourging
    me, he sent me into Pharaoh’s dungeon. 5. And while I was in chains, the Egyptian
    woman was constrained by grief.'
