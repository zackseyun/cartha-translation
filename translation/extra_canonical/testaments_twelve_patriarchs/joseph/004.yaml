translation:
  text: '9. And when I understood, I was grieved unto death. But after she had gone
    out, I came to myself and mourned over her for many days, because I recognized
    her deceit and her delusion.

    10. And I spoke to her words of the Most High, to see whether perhaps she might
    turn back from her evil desire.

    11. So then, many times, as to a holy man, she flattered me with words; and with
    deceit she praised my self-control before her husband, wishing to trip me up when
    we were alone.

    12. For she openly extolled me as chaste with respect to the bed, but in secret
    she said to me, “Do not be afraid of my husband; for he is persuaded concerning
    your purity, and even if someone should tell him about us, he will not believe
    it.”

    13. In all these things I, lying low on the ground, kept begging the God of my
    fathers that he would rescue me from her deceit.

    14. Since she accomplished nothing in this way, again she began to come to me
    with words of instruction, wanting to learn the word of God.

    15. And she says to me, “If you want me to leave behind the idols, I will persuade
    my husband to withdraw from them, and we will go before your Lord, walking in
    the law of your Lord.”

    16. But I said to her, “The Lord does not will that those who revere him should
    be in uncleanness, nor does he delight in adulterers, but in those who draw near
    to him with a pure heart and undefiled lips.”

    17. But she kept contending, wanting to fulfill her desire.

    18. And I added fasting to prayer, so that the Lord might rescue me from her.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek at v. 13 is textually difficult in this OCR-normalized witness;
      'the God of my fathers' reflects the likely patriarchal sense, though a shorter
      reading 'God' is possible.
    reason: textual_variant
  - marker: b
    text: Or 'came to my senses.'
    reason: lexical_alternative
  - marker: c
    text: '''Chaste with respect to the bed'' renders a phrase explicitly referring
      to sexual purity.'
    reason: lexical_alternative
  - marker: d
    text: The line 'walking in the law of your Lord' may reflect a fuller expansion
      in the Greek tradition; it is translated as transmitted here.
    reason: textual_variant
lexical_decisions:
- source_word: ἐλυπήθην ἕως θανάτου
  chosen: I was grieved unto death
  alternatives:
  - I was deeply distressed to the point of death
  - I was sorrowful unto death
  lexicon: BDAG
  rationale: Preserves the elevated testamentary register and the idiomatic intensity
    of the Greek without over-expanding it.
- source_word: ἦλθον εἰς ἐμαυτόν
  chosen: I came to myself
  alternatives:
  - I recovered myself
  - I came to my senses
  lexicon: BDAG
  rationale: A transparent rendering of the idiom; less colloquial than 'came to my
    senses' and fitting the literary tone.
- source_word: δόλος / πλάνη
  chosen: deceit / delusion
  alternatives:
  - treachery / error
  - guile / deception
  lexicon: BDAG
  rationale: 'Keeps the paired moral vocabulary distinct: δόλος points to craftiness,
    while πλάνη suggests wandering error or delusive intent.'
- source_word: ῥήματα ὑψίστου
  chosen: words of the Most High
  alternatives:
  - sayings of the Most High
  - words about the Most High
  lexicon: BDAG
  rationale: The genitive most naturally indicates words belonging to or drawn from
    the Most High, not merely words about him.
- source_word: ἐπιθυμία
  chosen: desire
  alternatives:
  - lust
  - craving
  lexicon: BDAG
  rationale: The context is sexual and morally negative, but 'desire' allows the modifying
    phrase 'evil' to carry the ethical force without importing more than the Greek
    states.
- source_word: σωφροσύνη
  chosen: self-control
  alternatives:
  - chastity
  - temperance
  - purity
  lexicon: BDAG
  rationale: A key virtue term in this testament. 'Self-control' is broad enough to
    include sexual restraint while preserving the virtue vocabulary's ethical range.
- source_word: ὑποσκελίσαι
  chosen: to trip me up
  alternatives:
  - to overthrow me
  - to make me stumble
  lexicon: BDAG
  rationale: Retains the metaphor of causing a fall, appropriate to the moral testing
    context.
- source_word: κοίτων σώφρονα
  chosen: chaste with respect to the bed
  alternatives:
  - pure in bed
  - continent in the marriage-bed
  lexicon: LSJ
  rationale: The phrase explicitly concerns sexual purity; this rendering keeps the
    bed imagery visible while remaining readable.
- source_word: χαμοκοιτῶν
  chosen: lying low on the ground
  alternatives:
  - prostrating myself
  - lying face down
  lexicon: LSJ
  rationale: The rare form suggests a lowly bodily posture in prayer. The rendering
    preserves the physical humility without overstating a precise posture.
- source_word: τοῦ Θεοῦ
  chosen: the God of my fathers
  alternatives:
  - God
  - the God
  lexicon: BDAG
  rationale: The normalized OCR appears unstable here; the testamentary context strongly
    supports the fuller patriarchal expression, and the translation reflects the likely
    sense while keeping the prayer context explicit.
- source_word: κατηχήσεως
  chosen: words of instruction
  alternatives:
  - instruction
  - teaching
  lexicon: BDAG
  rationale: Avoids anachronistic ecclesiastical overtones of 'catechesis' while preserving
    the sense of instructed discourse.
- source_word: ἀποστῆναι ἀπὸ τῶν εἰδώλων
  chosen: to withdraw from them
  alternatives:
  - to turn away from the idols
  - to depart from them
  lexicon: BDAG
  rationale: The pronoun refers back to idols; 'withdraw from them' is concise and
    natural in English while preserving the apostasy-from-idols sense.
- source_word: ἐνώπιον Κυρίου σου
  chosen: before your Lord
  alternatives:
  - in the presence of your Lord
  - before the Lord your God
  lexicon: BDAG
  rationale: Translates the Greek as given without harmonizing to more familiar biblical
    formulas.
- source_word: ἀκαθαρσίᾳ
  chosen: uncleanness
  alternatives:
  - impurity
  - defilement
  lexicon: BDAG
  rationale: Maintains the moral-cultic resonance of the Greek in a way suitable to
    Jewish ethical testament literature.
- source_word: τοῖς μοιχεύουσιν εὐδοκεῖ
  chosen: does he delight in adulterers
  alternatives:
  - does he take pleasure in those who commit adultery
  - is he pleased with adulterers
  lexicon: BDAG
  rationale: A direct and forceful rendering that preserves the paraenetic sharpness.
- source_word: ἐν καθαρᾷ καρδίᾳ καὶ στόμασιν ἀμίαντοις
  chosen: with a pure heart and undefiled lips
  alternatives:
  - with a clean heart and unstained mouths
  - in purity of heart and blameless speech
  lexicon: BDAG
  rationale: Preserves the dual inward/outward moral parallelism of heart and speech.
- source_word: ἀντεφιλονείκει
  chosen: kept contending
  alternatives:
  - kept arguing back
  - persisted in disputing
  lexicon: LSJ
  rationale: Conveys her persistent opposition and pressure without reducing it to
    a single exchange.
- source_word: προσετιθέμην νηστείαν καὶ προσευχήν
  chosen: I added fasting to prayer
  alternatives:
  - I gave myself still more to fasting and prayer
  - I joined fasting to prayer
  lexicon: BDAG
  rationale: Keeps the incremental force of προσετιθέμην and the memorable parallelism
    of the paired disciplines.
