theological_decisions:
- issue: Reference in Joseph's prayer phrase at v. 13
  chosen_reading: the God of my fathers
  alternative_readings:
  - God
  - the God
  rationale: The OCR-normalized line is textually unstable, but the patriarchal testament
    setting and common idiom favor an explicit ancestral-God reference. This is noted
    as a likely restoration rather than a silent harmonization.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    contextual restoration decisions.
- issue: Rendering of Κυρίου σου in v. 15
  chosen_reading: your Lord
  alternative_readings:
  - the Lord
  - your God
  rationale: The Greek witness reads a second-person possessive. The translation keeps
    that wording rather than assimilating it to standard biblical phrasing.
  doctrine_reference: Original-language primacy over translation tradition.
