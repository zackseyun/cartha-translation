translation:
  text: '3[a]. In my life I saw envy and death, and I was not led astray, but remained in the truth of the Lord.

    4. My brothers hated me, but the Lord loved me. They wanted to kill me[b], but the God of my fathers kept me. They lowered me into a pit, and the Most High brought me up.

    5. I was sold into slavery, and the Master of all set me free. I was taken into captivity, and his mighty hand helped me. I was constrained by famine, and the Lord himself nourished me.

    6. I was alone, and God comforted me. I was weak, and the Lord visited me. I was in prison, and the Savior showed me favor. [I was in chains, and he loosed me.]

    7. Amid slanders he spoke in my defense[d][c]. In the bitter words of dreams he rescued me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: 'a'
    text: Or 'cistern' for 'pit,' echoing the Genesis account more specifically.
    reason: lexical_alternative
  - marker: 'b'
    text: The title 'Savior' translates the Greek witness as it stands. Some readers may prefer 'deliverer,' and the wording may reflect a heightened or secondary theological expansion in transmission.
    reason: textual_variant
  - marker: 'c'
    text: The bracketed line 'I was in chains, and he loosed me' is textually uncertain in this witness tradition.
    reason: textual_variant
  - marker: 'd'
    text: The phrase 'the bitter talk of dreams' is difficult Greek; it likely refers to the hostile words and accusations connected with Joseph's dreams.
    reason: alternative_reading
lexical_decisions:
- source_word: φθόνον
  chosen: envy
  alternatives:
  - jealousy
  lexicon: LSJ
  rationale: Joseph's testament thematically centers on the destructive vice of envy among brothers; 'envy' best preserves that moral category without softening it into mere rivalry.
- source_word: ἐπλανήθην
  chosen: was led astray
  alternatives:
  - wandered
  - was deceived
  lexicon: BDAG
  rationale: 'The passive sense fits the moral context: despite seeing envy and death, Joseph says he was not diverted from the right path.'
- source_word: ἀληθείᾳ
  chosen: truth
  alternatives:
  - faithfulness
  - reality
  lexicon: BDAG
  rationale: '''Truth of the Lord'' preserves the ethical and covenantal sense of steadfast alignment with God''s way.'
- source_word: ἀνελεῖν
  chosen: kill
  alternatives:
  - destroy
  - do away with
  lexicon: LSJ
  rationale: Plain, direct English matches the brothers' murderous intent and keeps the testament's stark contrastive parallelism.
- source_word: λάκκον
  chosen: pit
  alternatives:
  - cistern
  lexicon: LSJ
  rationale: '''Pit'' is the natural English rendering and preserves the Genesis resonance; ''cistern'' is possible but more technical than needed in the main text.'
- source_word: δουλείαν
  chosen: slavery
  alternatives:
  - bondage
  - servitude
  lexicon: BDAG
  rationale: Following project doctrine, the bonded condition is salient here; 'slavery' is more accurate and less euphemistic than 'servitude'.
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Lord
  - sovereign
  lexicon: BDAG
  rationale: Used of God here as 'Master of all'; 'Master' preserves the lexical force distinct from κύριος in the surrounding lines.
- source_word: αἰχμαλωσίαν
  chosen: captivity
  alternatives:
  - captured state
  - exile
  lexicon: LSJ
  rationale: '''Captivity'' fits both the literal sense of being taken and the rhetorical sequence of affliction and deliverance.'
- source_word: διέθρεψέ
  chosen: nourished
  alternatives:
  - fed
  - sustained
  lexicon: BDAG
  rationale: The verb suggests sustaining with provision; 'nourished' carries both literal and providential force in the famine context.
- source_word: παρεκάλεσέ
  chosen: comforted
  alternatives:
  - encouraged
  - consoled
  lexicon: BDAG
  rationale: In Joseph's isolation, divine consolation is foregrounded; 'comforted' best fits the personal, pastoral tone.
- source_word: ἐπεσκέψατό
  chosen: visited
  alternatives:
  - looked after
  - came to help
  lexicon: BDAG
  rationale: '''Visited'' preserves the biblical idiom of gracious divine attention while remaining readable.'
- source_word: σωτήρ
  chosen: Savior
  alternatives:
  - deliverer
  lexicon: BDAG
  rationale: The Greek witness reads σωτήρ; the translation renders it straightforwardly while noting in footnotes that the title may reflect a secondary expansion or heightened theological diction.
- source_word: ἐχαρίτωσέ
  chosen: showed me favor
  alternatives:
  - graced me
  - treated me graciously
  lexicon: BDAG
  rationale: This idiomatic rendering communicates bestowed favor clearly in modern English without losing the grace-language behind the verb.
- source_word: διαβολαῖς
  chosen: slanders
  alternatives:
  - false accusations
  - calumnies
  lexicon: LSJ
  rationale: Plural 'slanders' suits the hostile accusations Joseph endured and keeps the vice-language concrete.
- source_word: συνηγόρησέ μοι
  chosen: spoke in my defense
  alternatives:
  - advocated for me
  - pleaded my cause
  lexicon: LSJ
  rationale: The legal/forensic nuance is important; this rendering is clear and preserves the sense of divine vindication.
- source_word: λόγοις ἐνυπνίων πικροῖς
  chosen: the bitter talk of dreams
  alternatives:
  - bitter words about dreams
  - harsh dream reports
  lexicon: LSJ
  rationale: The phrase is textually and syntactically difficult; this rendering stays close to the Greek while preserving the connection to Joseph's dreams and the hostility they provoked.
