theological_decisions:
- issue: Rendering of σωτήρ in a Jewish testamentary text with possible later Christian coloring
  chosen_reading: Savior
  alternative_readings:
  - deliverer
  rationale: The Greek witness explicitly has σωτήρ. The main text translates the extant reading rather than muting it; a footnote flags the textual/theological sensitivity.
  doctrine_reference: Preserve theological tension rather than resolve it; translate what is in the Greek witness honestly.
