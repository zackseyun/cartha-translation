translation:
  text: 'And again, at another time, she said to me, “If you do not want to commit
    adultery, I will kill my husband with poison and take you as my husband.”


    2 So when I heard this, I tore my garments and said to her, “Woman, be ashamed
    before God, and do not do this lawless and evil deed, lest you be destroyed. For
    know this also: I will report your scheme to everyone.”


    3 Then she, being afraid, begged me not to report this scheme.


    4 And she went away, trying to win me over with gifts and every kind of pleasure.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek text is somewhat rough in the clause describing the act as evil; the
      sense is that Joseph forbids a morally illicit and wicked deed.
    reason: textual_variant
  - marker: b
    text: Or 'she withdrew, coaxing me with gifts and all kinds of enjoyments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μοιχεῦσαι
  chosen: commit adultery
  alternatives:
  - be sexually immoral
  - sleep with me
  lexicon: BDAG
  rationale: The verb specifically denotes adultery, fitting the married-woman context
    and preserving the moral/legal force of Joseph's temptation narrative.
- source_word: ἀνελῶ ... φαρμάκῳ
  chosen: I will kill ... with poison
  alternatives:
  - do away with ... by drugs
  - murder ... by poison
  lexicon: LSJ
  rationale: φαρμάκῳ here refers to poison rather than medicine or sorcery; 'kill
    ... with poison' is the clearest idiomatic English rendering.
- source_word: διέρρηξα τὰ ἱμάτιά μου
  chosen: I tore my garments
  alternatives:
  - I tore my clothes
  lexicon: LSJ
  rationale: This is a conventional gesture of horror or grief. 'Garments' preserves
    the elevated register and biblical texture.
- source_word: αἰδέσθητι τὸν Θεόν
  chosen: be ashamed before God
  alternatives:
  - revere God
  - have regard for God
  - fear God
  lexicon: LSJ
  rationale: The imperative from αἰδέομαι carries shame/reverence. 'Be ashamed before
    God' preserves the rebuking force in this moral context better than the softer
    'have regard for God.'
- source_word: πρᾶξιν ταύτην τὴν ... πονηράν
  chosen: this lawless and evil deed
  alternatives:
  - this wicked act
  - this evil thing
  lexicon: LSJ
  rationale: The text appears textually rough, but the sense is of a morally illicit
    act. 'Lawless and evil deed' preserves both ethical and legal overtones without
    over-smoothing.
- source_word: ἐξολοθρευθῇς
  chosen: you be destroyed
  alternatives:
  - you perish
  - you be cut off
  lexicon: BDAG
  rationale: A strong warning of ruin/judgment is intended. 'Be destroyed' is direct
    and weighty in English.
- source_word: ἐξαγγελῶ
  chosen: I will report
  alternatives:
  - I will proclaim
  - I will make known
  - I will tell
  lexicon: BDAG
  rationale: Joseph threatens public disclosure. 'Report' fits the social and judicial
    sense better than the more formal 'proclaim.'
- source_word: ἐπίνοια
  chosen: scheme
  alternatives:
  - plan
  - device
  - plot
  lexicon: LSJ
  rationale: The word denotes a devised intention, here a wicked plan. 'Scheme' captures
    the sinister nuance naturally.
- source_word: ἀνεχώρησεν
  chosen: she went away
  alternatives:
  - she withdrew
  - she departed
  lexicon: BDAG
  rationale: A simple departure is meant; 'went away' is readable while preserving
    narrative movement.
- source_word: ἐπιθάλπουσά με δώροις καὶ ἀπολαύσεσι πάσαις
  chosen: trying to win me over with gifts and every kind of pleasure
  alternatives:
  - pampering me with gifts and all delights
  - warming me with gifts and every enjoyment
  lexicon: LSJ
  rationale: 'The participle suggests cherishing/cajoling or softening him up. ''Trying
    to win me over'' brings out the manipulative intent in idiomatic English while
    retaining the paired means: gifts and pleasures.'
