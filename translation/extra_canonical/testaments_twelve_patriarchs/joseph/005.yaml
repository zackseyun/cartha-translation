theological_decisions:
- issue: Moral characterization of Potiphar's wife's proposed act
  chosen_reading: Joseph explicitly condemns it as a deed deserving divine judgment
  alternative_readings:
  - Joseph merely rejects it as socially dangerous
  - The warning is only about public exposure, not divine accountability
  rationale: The appeal to God and the warning 'lest you be destroyed' frame the act
    as morally accountable before God, not merely imprudent.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve theological weight
    without flattening
- issue: Force of αἰδέσθητι τὸν Θεόν
  chosen_reading: 'Rendered with shame/reverence language: ''be ashamed before God'''
  alternative_readings:
  - fear God
  - respect God
  rationale: The context is rebuke of shameless wickedness. The chosen rendering preserves
    both the honor-shame and reverential dimensions without reducing it to generic
    piety.
  doctrine_reference: DOCTRINE.md §Consistency of key terms, or documented exception
