theological_decisions:
- issue: Textually expanded messianic material in vv. 8 and 11
  chosen_reading: Main text follows the shorter, less explicitly Christian wording
    where the Greek witnesses diverge, while preserving the symbolic virgin-and-lamb
    imagery present in the chapter.
  alternative_readings:
  - '''from Judah was born a virgin ... from her was born a spotless lamb'''
  - '''the lamb of God, who takes away the sin of the world'''
  rationale: The supplied Greek apparatus shows substantial variation and likely later
    Christian expansion. To remain transparent and anchored in the witness, the translation
    keeps what is broadly supported in the chapter's symbolic framework and relegates
    more explicit christological expansions to footnotes.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    what is in the Greek witness honestly and use notes for likely interpolation.
- issue: Identity of the enduring ruler/salvation figure from Levi and Judah
  chosen_reading: Rendered as 'the salvation of Israel' and 'his kingdom' without
    specifying beyond the text's wording.
  alternative_readings:
  - an explicitly messianic individual identified with later Christian titles
  - a more corporate salvation associated with priesthood and kingship
  rationale: The chapter points to a future saving rule arising from Levi and Judah,
    but the exact identification is sharpened differently across witnesses. The translation
    preserves the text's prophetic ambiguity rather than collapsing it into a single
    later doctrinal formula.
