translation:
  text: 'And he gave me beauty beyond the handsome men of Israel, and preserved me
    until old age in strength and in beauty; for I was like Jacob in all things.


    Now listen, my children, also concerning the dream that I saw.


    2. Twelve deer were feeding in one place, and the nine were scattered over all
    the earth; and likewise the three also. So hear the dream that I saw. 3. And I
    saw that the three deer became three lambs, and they cried out to the Lord, and
    the Lord led them out into a flourishing and well-watered place, and brought them
    from darkness into light. 4. And there they cried out to the Lord until the nine
    deer were gathered to them, and they themselves became like twelve sheep; and
    after a little time they increased and became many flocks. 5. And after these
    things I saw, and behold, twelve bulls suckling one heifer, and from her there
    came a sea of milk, and the twelve flocks and innumerable flocks drank from it.
    6. And from the fourth bull the horns went up as far as heaven and became like
    a wall for the flocks, and between the two horns another horn sprang up. 7. And
    I saw a calf that encircled them twelve times, and it became for the bulls wholly
    a help.


    8. And I saw that a virgin was born, and from her was born a lamb, and on his
    left there rushed forth something like a lion; and all the beasts rushed against
    him, but the lamb overcame them and destroyed them and trampled them down. 9.
    And the angels and men and all the earth rejoiced over him. 10. And these things
    will happen in their season in the last days.


    11. Therefore you, my children, keep the commandments of the Lord, and honor Levi
    and Judah; for from their seed there will arise for you the salvation of Israel.
    12. For his kingdom will be an everlasting kingdom, which will not pass away.
    But my kingdom among you will come to an end, like a watchman''s hut after the
    summer, vanishing away.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some Greek witnesses read more explicitly, 'from Judah was born a virgin,'
      while another form reads, 'I saw among the horns a certain virgin.'
    reason: textual_variant
  - marker: b
    text: Some witnesses expand the lamb as 'spotless,' and one later-sounding reading
      adds language resembling 'the lamb of God, who takes away the sin of the world.'
    reason: textual_variant
  - marker: c
    text: The phrase 'on his left there rushed forth something like a lion' is textually
      difficult; another witness phrases the scene differently but still depicts hostile
      beastly assault on the lamb.
    reason: alternative_reading
  - marker: d
    text: The image of the 'watchman's hut after the summer' refers to a temporary
      field shelter left desolate once harvest is over.
    reason: cultural_note
lexical_decisions:
- source_word: ὡραιότητα
  chosen: beauty
  alternatives:
  - handsomeness
  - comeliness
  lexicon: LSJ
  rationale: The term denotes physical beauty or attractiveness. 'Beauty' is natural
    English and preserves the autobiographical emphasis without sounding overly archaic.
- source_word: ἐφύλαξέ
  chosen: preserved
  alternatives:
  - guarded
  - kept
  lexicon: BDAG
  rationale: In context God preserves Joseph through life into old age. 'Preserved'
    better captures sustained protection than the more generic 'kept.'
- source_word: ἐνυπνίων / ἐνύπνιον
  chosen: dream
  alternatives:
  - dream-vision
  lexicon: LSJ
  rationale: The chapter introduces and recounts a symbolic dream. 'Dream' is the
    plain and sufficient rendering.
- source_word: ἔλαφοι
  chosen: deer
  alternatives:
  - harts
  - stags
  lexicon: LSJ
  rationale: The animal is cervine; 'deer' is readable modern English. More specific
    terms like 'stags' would over-specify sex not consistently foregrounded in the
    symbolism.
- source_word: ἀμνοί
  chosen: lambs
  alternatives:
  - young sheep
  lexicon: BDAG
  rationale: The imagery shifts from deer to sacrificial/pastoral symbolism. 'Lambs'
    preserves that symbolic force.
- source_word: τόπον εὐθαλῆ καὶ ἔνυδρον
  chosen: a flourishing and well-watered place
  alternatives:
  - a fertile and watered place
  - a verdant place with water
  lexicon: LSJ
  rationale: This keeps the paired imagery of fertility and abundant water, echoing
    restoration language.
- source_word: ἐκ σκότους εἰς φῶς
  chosen: from darkness into light
  alternatives: []
  lexicon: BDAG
  rationale: A standard and transparent metaphor of deliverance; best preserved literally.
- source_word: πρόβατα / ποίμνια
  chosen: sheep / flocks
  alternatives: []
  lexicon: LSJ
  rationale: The text distinguishes individual sheep from multiplied flocks. Preserving
    both terms maintains the dream's progression.
- source_word: βόες
  chosen: bulls
  alternatives:
  - oxen
  - cattle
  lexicon: LSJ
  rationale: Given the masculine imagery and the later horns, 'bulls' is more vivid
    and coherent than the broader 'cattle' or the more work-animal-focused 'oxen.'
- source_word: θηλάζοντες
  chosen: suckling
  alternatives:
  - nursing
  lexicon: BDAG
  rationale: The participle describes receiving milk from the heifer. 'Suckling' is
    slightly more literal and preserves the unusual image.
- source_word: δάμαλιν
  chosen: heifer
  alternatives:
  - young cow
  lexicon: LSJ
  rationale: '''Heifer'' is the standard equivalent and fits the symbolic livestock
    imagery.'
- source_word: κέρατα
  chosen: horns
  alternatives: []
  lexicon: BDAG
  rationale: Literal in the dream image, with likely symbolic force of power; no need
    to paraphrase.
- source_word: ἐξεβλάστησε
  chosen: sprang up
  alternatives:
  - grew out
  - budded forth
  lexicon: LSJ
  rationale: The verb has vegetative imagery, but 'sprang up' communicates sudden
    emergence naturally in English while retaining metaphorical vividness.
- source_word: παρθένος
  chosen: virgin
  alternatives:
  - maiden
  lexicon: BDAG
  rationale: The Greek term ordinarily means 'virgin.' Because the passage is textually
    and theologically charged, the more specific rendering should stand in the main
    text, with interpolation concerns handled in notes.
- source_word: ἀμνός
  chosen: lamb
  alternatives: []
  lexicon: BDAG
  rationale: This singular form carries strong symbolic weight and should remain literal.
- source_word: θηρία
  chosen: beasts
  alternatives:
  - wild animals
  lexicon: LSJ
  rationale: '''Beasts'' preserves the elevated apocalyptic register better than the
    flatter ''wild animals.'''
- source_word: ἐνίκησεν
  chosen: overcame
  alternatives:
  - conquered
  - was victorious over
  lexicon: BDAG
  rationale: '''Overcame'' is forceful but not overly expansive, fitting the narrative
    sequence before ''destroyed.'''
- source_word: ἀπώλεσεν ... εἰς καταπάτημα
  chosen: destroyed them and trampled them down
  alternatives:
  - ruined them for trampling
  lexicon: LSJ
  rationale: The phrase is textually awkward; this rendering preserves both destruction
    and the trampling image without over-smoothing.
- source_word: ἐν καιρῷ αὐτῶν
  chosen: in their season
  alternatives:
  - at their appointed time
  - in their time
  lexicon: BDAG
  rationale: This preserves the idiom of divinely ordered timing in elevated but readable
    English.
- source_word: φυλάξατε τὰς ἐντολὰς
  chosen: keep the commandments
  alternatives:
  - guard the commandments
  - observe the commandments
  lexicon: BDAG
  rationale: A standard ethical exhortation; 'keep' is idiomatic and strong.
- source_word: τιμᾶτε
  chosen: honor
  alternatives:
  - show honor to
  lexicon: BDAG
  rationale: Direct imperative suited to testamentary exhortation.
- source_word: ἀνατελεῖ
  chosen: there will arise
  alternatives:
  - will spring up
  - will dawn
  lexicon: LSJ
  rationale: The verb can suggest rising or dawning. 'There will arise' fits both
    lineage and salvation imagery without forcing a metaphor.
- source_word: σωτηρία
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: The term is theologically weighty here; 'salvation' preserves that resonance.
- source_word: βασιλεία
  chosen: kingdom
  alternatives:
  - reign
  lexicon: BDAG
  rationale: Both are possible, but 'kingdom' best matches the contrast between the
    enduring future rule and Joseph's own transient royal status.
- source_word: ὀπωροφυλάκιον
  chosen: watchman's hut
  alternatives:
  - fruit-watcher's shelter
  - booth in an orchard
  lexicon: LSJ
  rationale: The image is of a temporary harvest shelter. 'Watchman's hut' is concise
    and intelligible while preserving the simile's transience.
