theological_decisions:
- issue: Meaning of divine ἐκδίκησις in Joseph's prophecy
  chosen_reading: God is promised as the one who actively avenges/vindicates Israel
    against Egyptian oppression.
  alternative_readings:
  - God will merely 'visit' or 'care for' you
  - God will enact abstract justice without retaliatory force
  rationale: The Greek noun naturally carries avenging force. The translation preserves
    that tension rather than softening it into generic providence.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
- issue: Beliar language
  chosen_reading: 'Translate the dualistic contrast straightforwardly: the Lord with
    Israel in light, Beliar with the Egyptians in darkness.'
  alternative_readings:
  - Demythologize Beliar into 'wickedness'
  - Harmonize Beliar to Satan in the main text
  rationale: The Greek witness personifies Beliar. Transparency requires preserving
    the testament's apocalyptic-moral imagery rather than reducing it.
- issue: Textual instability in burial instruction
  chosen_reading: Main text follows the Aseneth reading, with the Zelpha/Bilhah form
    preserved as an alternate reading.
  alternative_readings:
  - Prefer the Zelpha reading in the main text
  - Conflate both readings into a harmonized burial notice
  rationale: The witness as supplied presents both forms. The draft keeps one in the
    main text and exposes the other in a note-like line rather than silently harmonizing.
