translation:
  text: '1. For I know that after my death the Egyptians will oppress you, but God
    will carry out your vengeance and bring you back into the promises of your fathers.


    2. And you shall carry up my bones with you. For when my bones are taken up there,
    the Lord will be with you in light, and Beliar will be with the Egyptians in darkness.


    3. And bring Aseneth your mother [to the Hippodrome], and bury her near Rachel
    my mother.


    3a. But another reading says: “And bring up Zelpha your mother, and place her
    near Bilhah [by the Hippodrome], close to Rachel.”


    12. For my kingdom among you will be brought to completion like a watchman’s hut
    in an orchard, which does not appear after the summer.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[to the Hippodrome]'
    text: The bracketed phrase is textually uncertain in the supplied Greek witness.
    reason: textual_variant
  - marker: 3a
    text: Some witnesses read 'Zelpha your mother ... near Bilhah ... close to Rachel'
      instead of 'Aseneth your mother ... near Rachel my mother.'
    reason: alternative_reading
  - marker: '12'
    text: The verse numbering in the supplied witness jumps to 12 after verse 3; the
      chapter appears textually compressed or excerpted in this source layer.
    reason: textual_variant
  - marker: 12b
    text: The image of a watchman’s hut in an orchard evokes a temporary shelter left
      behind after harvest; compare similar seasonal imagery in Isaiah 1:8.
    reason: cross_reference
lexical_decisions:
- source_word: τελευτή
  chosen: death
  alternatives:
  - end
  - departure
  lexicon: LSJ
  rationale: In testamentary context the plain sense is Joseph's death; 'departure'
    is possible but softer than the Greek's straightforward finality.
- source_word: θλίψουσιν
  chosen: will oppress
  alternatives:
  - will afflict
  - will trouble
  lexicon: LSJ
  rationale: Conveys sustained harsh treatment by the Egyptians, fitting both the
    verb and the Exodus-oriented context.
- source_word: ἐκδίκησιν
  chosen: vengeance
  alternatives:
  - vindication
  - justice
  lexicon: LSJ
  rationale: The noun can denote avenging action or vindication. 'Vengeance' best
    matches the active divine reversal promised here, though the sense includes vindication.
- source_word: ἐπάξει
  chosen: bring back
  alternatives:
  - lead back
  - bring
  lexicon: LSJ
  rationale: The context is return to the ancestral promises/land; 'bring back' makes
    the restorative motion explicit in natural English.
- source_word: ἐπαγγελίας
  chosen: promises
  alternatives:
  - pledges
  - promised blessings
  lexicon: LSJ
  rationale: Retains covenantal resonance without over-expanding the phrase.
- source_word: συνανοίσετε
  chosen: shall carry up
  alternatives:
  - shall bring up
  - shall take up with you
  lexicon: LSJ
  rationale: The compound verb points to transporting Joseph's bones in the upward
    movement from Egypt; 'carry up' preserves that burial-transfer idiom.
- source_word: ἀναγομένων
  chosen: are taken up
  alternatives:
  - are brought up
  - are carried up
  lexicon: LSJ
  rationale: A passive rendering fits the genitive absolute and echoes the prior command
    about Joseph's bones.
- source_word: ἐν φωτί
  chosen: in light
  alternatives:
  - with light
  - in the light
  lexicon: LSJ
  rationale: Preserves the stark symbolic contrast with Beliar 'in darkness' and keeps
    the prepositional parallelism.
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: LSJ
  rationale: The Greek witness reads the form Beliar; transliteration follows the
    source form rather than harmonizing to the more familiar 'Belial'.
- source_word: ἐν σκότει
  chosen: in darkness
  alternatives:
  - in the darkness
  lexicon: LSJ
  rationale: Keeps the moral-apocalyptic contrast concise and parallel to 'in light.'
- source_word: ἀγάγετε
  chosen: bring
  alternatives:
  - lead
  - bring along
  lexicon: LSJ
  rationale: Simple imperative suited to funeral transport; 'lead' could sound as
    if she were living.
- source_word: θάψατε
  chosen: bury
  alternatives:
  - inter
  lexicon: LSJ
  rationale: Direct and natural English for the burial command.
- source_word: βασιλεία
  chosen: kingdom
  alternatives:
  - rule
  - royal line
  lexicon: LSJ
  rationale: The noun is literally 'kingdom' or 'reign.' Though the line is difficult,
    'kingdom' preserves the source term and its broader dynastic or ruling sense.
- source_word: ἐπιτελεσθήσεται
  chosen: will be brought to completion
  alternatives:
  - will be fulfilled
  - will come to its end
  lexicon: LSJ
  rationale: Allows either consummation or termination nuance in this obscure saying
    without forcing a purely positive or negative reading.
- source_word: ὀπωροφυλάκιον
  chosen: watchman’s hut in an orchard
  alternatives:
  - fruit-watch hut
  - booth in a garden
  lexicon: LSJ
  rationale: Refers to a temporary shelter used in guarding fruit; the image of something
    seasonal and fleeting is important for the comparison.
