translation:
  text: And this man, Pharaoh’s chief cook, entrusted his house to me. And I struggled
    against a shameless woman who kept pressing me to transgress with her, but the
    God of my father rescued me from a burning flame. I was imprisoned, I was beaten,
    I was mocked; and the Lord gave me compassion in the sight of the jailer. For
    the Lord does not abandon those who fear him, not in darkness, or chains, or afflictions,
    or distress. For God is not ashamed as a man is ashamed, nor does he grow fearful
    as a son of man, nor, like one born of earth, does he become weak or terrified.
    But in all these things he stands over us, and in various ways he gives comfort.
