translation:
  text: 1. And Memphis saw me being beaten through the windows—for her house was nearby—and
    she sent word to him, saying, “Your judgment is unjust, because you punish as
    a wrongdoer a free man who has been stolen.” 2. But since I did not alter my statement
    even while I was being beaten, he ordered that I be kept under guard until the
    masters of the boy should come. 3. And the woman kept saying to her husband,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the lattices'; the Greek can refer to window-openings rather
      than glazed windows in the modern sense.
    reason: cultural_note
  - marker: b
    text: Literally, 'a free man who has been stolen'—that is, a person unlawfully
      seized and treated as though he were a slave or criminal.
    reason: lexical_alternative
  - marker: c
    text: The sentence breaks off here in the supplied Greek witness and continues
      in the next chapter.
    reason: textual_variant
lexical_decisions:
- source_word: Μεμφίς
  chosen: Memphis
  alternatives:
  - Memphis (personal name retained)
  lexicon: LSJ
  rationale: Treated as a proper name and transliterated rather than translated, in
    keeping with the project policy for personal names.
- source_word: τυπτόμενόν
  chosen: being beaten
  alternatives:
  - being struck
  - being flogged
  lexicon: LSJ
  rationale: The participle denotes physical striking. 'Being beaten' is natural English
    and preserves the ongoing passive force without overstating a specific instrument.
- source_word: θυρίδων
  chosen: windows
  alternatives:
  - lattices
  - window-openings
  lexicon: LSJ
  rationale: A straightforward architectural term. 'Windows' is the clearest readable
    rendering, while a note preserves the possibility of a more specific ancient opening.
- source_word: Ἄδικος ἡ κρίσις σου
  chosen: Your judgment is unjust
  alternatives:
  - Your verdict is unjust
  - Your decision is unjust
  lexicon: LSJ
  rationale: κρίσις here refers to judicial assessment or verdict. 'Judgment' preserves
    the legal and moral tone of the accusation.
- source_word: κλαπέντα
  chosen: who has been stolen
  alternatives:
  - who was stolen
  - kidnapped
  lexicon: LSJ
  rationale: The passive participle from κλέπτω literally means 'stolen.' In context
    Joseph is a free person taken and sold; 'who has been stolen' preserves the shocking
    legal-moral claim without importing a more interpretive term into the main text.
- source_word: ἐλεύθερον
  chosen: a free man
  alternatives:
  - free
  - a freeman
  lexicon: LSJ
  rationale: 'The contrast is juridical: Joseph is not a slave by status but a free
    person wrongfully treated. ''A free man'' makes the social-legal force explicit.'
- source_word: τιμωρεῖς
  chosen: you punish
  alternatives:
  - you exact penalty from
  - you avenge yourself on
  lexicon: LSJ
  rationale: In this judicial context the verb is best rendered 'punish,' matching
    the legal complaint being voiced.
- source_word: ὡς ἀδικήσαντα
  chosen: as a wrongdoer
  alternatives:
  - as though he had done wrong
  - as one who committed injustice
  lexicon: LSJ
  rationale: This compresses the comparative force into idiomatic English while preserving
    the accusation that Joseph is being treated as guilty.
- source_word: οὐκ ἤλλαξα τὸν λόγον μου
  chosen: I did not alter my statement
  alternatives:
  - I did not change my word
  - I did not change my account
  lexicon: LSJ
  rationale: λόγος here refers to Joseph's testimony or account in the interrogation.
    'Statement' best fits the legal setting.
- source_word: φυλαχθῆναί με
  chosen: that I be kept under guard
  alternatives:
  - that I be imprisoned
  - that I be kept in custody
  lexicon: LSJ
  rationale: The infinitive indicates being guarded or held. 'Kept under guard' preserves
    the immediate sense without specifying a prison cell beyond the Greek.
- source_word: οἱ κύριοι τοῦ παιδός
  chosen: the masters of the boy
  alternatives:
  - the owners of the slave-boy
  - the lords of the servant
  lexicon: LSJ
  rationale: κύριοι in this social context means those who have authority/ownership
    over the παιδίον/παῖς. 'Masters' best reflects the bonded-status setting, and
    'boy' keeps the literal wording of the surviving text.
- source_word: ἔλεγε
  chosen: kept saying
  alternatives:
  - said
  - was saying
  lexicon: LSJ
  rationale: The imperfect suggests repeated or continued speech. 'Kept saying' preserves
    the durative force and the narrative pressure of the scene.
