theological_decisions:
- issue: Social-status language in Joseph's legal defense
  chosen_reading: Render ἐλεύθερον as 'a free man' and κύριοι as 'masters'
  alternative_readings:
  - '''an innocent man'' for ἐλεύθερον'
  - '''owners'' for κύριοι'
  rationale: The chapter's moral force depends on the contrast between a free person
    wrongfully treated and the structures of slave ownership around him. Preserving
    the legal-social terminology keeps the ethical sharpness of the narrative.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; δοῦλος/slave principle
    by analogy for bonded-status language'
