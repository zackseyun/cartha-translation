theological_decisions:
- issue: Ethical exhortation to 'conceal' brothers' faults
  chosen_reading: Translate συγκρύπτετε ἀλλήλων τὰ ἐλαττώματα as 'conceal one another’s
    shortcomings'
  alternative_readings:
  - cover one another’s failings
  - hide one another’s faults
  rationale: The line teaches patient, brotherly non-exposure of faults, not denial
    of sin. 'Conceal' preserves the familial ethic of mercy without importing later
    doctrinal formulas.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4, 5
- issue: Rendering δοῦλοι in v. 7
  chosen_reading: Use 'slaves' rather than 'servants'
  alternative_readings:
  - servants
  - bondservants
  rationale: The text presents Joseph’s sons as placed in a position of real subordination
    to his brothers, as an expression of humility. Project doctrine prefers 'slave'
    where bonded status is active and salient.
  doctrine_reference: 'DOCTRINE.md §Contested terms: δοῦλος'
- issue: Textually rough clause in v. 3
  chosen_reading: Render the sense as 'in the purpose of a good heart that intends
    what is good'
  alternative_readings:
  - in a good-hearted resolve well-pleasing for good
  - in the choice of a good heart taking pleasure in good
  rationale: 'The Greek witness appears somewhat unstable in this clause, but the
    ethical sense is clear: God delights in brotherly harmony and in inward intention
    directed toward the good. The translation preserves that sense without overconfident
    reconstruction.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
