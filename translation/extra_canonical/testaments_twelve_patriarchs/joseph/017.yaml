translation:
  text: 1. See then, my children, how much I endured so that I might not put my brothers
    to shame. 2. You also, therefore, love one another, and with patience conceal
    one another’s shortcomings. 3. For God delights in the harmony of brothers and
    in the purpose of a good heart that intends what is good. 4. And when my brothers
    came to Egypt, they themselves know that I returned their money to them, and did
    not reproach them, but encouraged them. 5. And after the death of Jacob my father,
    I loved them even more, and whatever they wanted I did for them beyond measure.
    6. And I did not allow them to be distressed even in the smallest matter; rather,
    everything that was in my hand I gave to them. 7. And their sons were my sons,
    and my sons were as slaves to them, and their soul was my soul, and every pain
    of theirs was my pain, and every weakness of theirs was my sickness, and their
    purpose was my purpose. 8. And I did not exalt myself among them in arrogance
    because of my worldly glory, but I was among them as one of the least.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cover one another’s failings.' The Greek verb suggests not exposing
      a brother’s faults harshly.
    reason: lexical_alternative
  - marker: b
    text: The clause about the 'purpose of a good heart' is textually difficult in
      the Greek witness; the translation follows the apparent ethical sense of a heart
      disposed toward the good.
    reason: textual_variant
  - marker: c
    text: '''Slaves'' translates Greek douloi. The wording is intentionally strong,
      expressing Joseph’s humility and the subordination of his own household to his
      brothers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰσχύνω
  chosen: put ... to shame
  alternatives:
  - disgrace
  - shame
  lexicon: BDAG
  rationale: The verb carries the sense of causing shame or public humiliation. 'Put
    my brothers to shame' preserves Joseph’s moral restraint and the relational force
    better than the flatter 'disgrace.'
- source_word: μακροθυμία
  chosen: patience
  alternatives:
  - longsuffering
  - forbearance
  lexicon: BDAG
  rationale: In paraenetic context this names enduring restraint toward others. 'Patience'
    is readable modern English; the surrounding imperative 'conceal one another’s
    shortcomings' preserves the ethical weight.
- source_word: συγκρύπτετε
  chosen: conceal
  alternatives:
  - cover
  - hide
  lexicon: LSJ
  rationale: The compound verb suggests covering over together/for one another. 'Conceal'
    keeps the exhortational force without implying deceit; it refers to not exposing
    a brother’s failings.
- source_word: ἐλαττώματα
  chosen: shortcomings
  alternatives:
  - failings
  - defects
  lexicon: LSJ
  rationale: '''Shortcomings'' fits moral exhortation and avoids overly harsh or clinical
    English while still acknowledging real faults.'
- source_word: ὁμονοία
  chosen: harmony
  alternatives:
  - unity
  - concord
  lexicon: BDAG
  rationale: The term denotes like-minded concord. 'Harmony of brothers' preserves
    the familial and rhetorical texture of the line.
- source_word: προαίρεσις καρδίας
  chosen: purpose of a good heart
  alternatives:
  - resolve of a good heart
  - choice of a good heart
  lexicon: BDAG
  rationale: The phrase points to inward moral intention. 'Purpose' is natural English
    and keeps the emphasis on deliberate disposition.
- source_word: εὐδοκοῦσιν εἰς ἀγαθόν
  chosen: intends what is good
  alternatives:
  - is well-disposed toward good
  - takes pleasure in good
  lexicon: LSJ
  rationale: The transmitted text is somewhat rough, but the sense is a heart oriented
    favorably toward the good. The rendering keeps the ethical thrust without over-specifying
    a corrupt clause.
- source_word: ὠνείδισα
  chosen: reproach
  alternatives:
  - insult
  - taunt
  - revile
  lexicon: BDAG
  rationale: Joseph stresses that he did not verbally shame his brothers. 'Reproach'
    fits elevated testamentary style and matches the moral register.
- source_word: παρεκάλεσα
  chosen: encouraged
  alternatives:
  - comforted
  - exhorted
  lexicon: BDAG
  rationale: The verb can mean comfort, urge, or encourage. In this reconciliation
    scene 'encouraged' best captures Joseph’s reassuring treatment of his brothers.
- source_word: ὑπερεκπερισσοῦ
  chosen: beyond measure
  alternatives:
  - abundantly beyond
  - exceedingly
  lexicon: BDAG
  rationale: This intensive adverb emphasizes extraordinary generosity. 'Beyond measure'
    is idiomatic and preserves the superabundant sense.
- source_word: θλιβῆναι
  chosen: be distressed
  alternatives:
  - be afflicted
  - be troubled
  lexicon: BDAG
  rationale: The passive infinitive here refers to experiencing pressure or trouble.
    'Be distressed' is broad enough for the context of Joseph’s practical care.
- source_word: ἕως μικροῦ πράγματος
  chosen: even in the smallest matter
  alternatives:
  - to the least thing
  - as far as a small matter
  lexicon: LSJ
  rationale: The idiom expresses comprehensive care down to minor concerns. The chosen
    rendering is clear and preserves the totalizing emphasis.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  lexicon: BDAG
  rationale: Per project doctrine, δοῦλος is rendered 'slave' where bonded service
    is salient. Here Joseph emphasizes radical humility and subordination of his own
    household to his brothers.
- source_word: ἄλγημα
  chosen: pain
  alternatives:
  - grief
  - suffering
  lexicon: LSJ
  rationale: The noun denotes pain or distress. 'Every pain of theirs was my pain'
    preserves the parallelism and emotional identification.
- source_word: μαλακία
  chosen: weakness
  alternatives:
  - frailty
  - softness
  lexicon: BDAG
  rationale: In this context it refers to frailty or weakness, not moral softness.
    'Weakness' pairs naturally with 'my sickness' in the next phrase.
- source_word: ἀσθένεια
  chosen: sickness
  alternatives:
  - weakness
  - illness
  lexicon: BDAG
  rationale: Because μαλακία already covers 'weakness,' rendering ἀσθένεια as 'sickness'
    preserves the rhetorical distinction between frailty and illness-like suffering.
- source_word: βουλή
  chosen: purpose
  alternatives:
  - counsel
  - plan
  - resolve
  lexicon: BDAG
  rationale: The noun here denotes intention or counsel. 'Their purpose was my purpose'
    keeps the repeated identification formula concise and forceful.
- source_word: ἀλαζονεία
  chosen: arrogance
  alternatives:
  - boastfulness
  - pretension
  lexicon: BDAG
  rationale: The term names haughty self-display. 'Arrogance' is direct and suits
    Joseph’s warning by example.
- source_word: κοσμική δόξα
  chosen: worldly glory
  alternatives:
  - earthly splendor
  - worldly honor
  lexicon: LSJ
  rationale: The phrase refers to Joseph’s external status and magnificence in Egypt.
    'Worldly glory' preserves both the grandeur and its merely worldly character.
- source_word: ἐλαχίστων
  chosen: the least
  alternatives:
  - the lowliest
  - the smallest
  lexicon: BDAG
  rationale: The superlative underscores Joseph’s humility among his brothers. 'One
    of the least' is idiomatic and preserves the contrast with his high status.
