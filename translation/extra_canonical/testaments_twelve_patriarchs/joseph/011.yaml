translation:
  text: 'And so, my children, in every deed of yours keep the fear of God before your
    eyes, and honor your brothers; for everyone who does the law of the Lord will
    be loved by him.


    And when I was traveling with the Ishmaelites, they kept asking me, saying, “Are
    you a slave?” And I said that I was a household slave, so that I might not put
    my brothers to shame.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they asked me repeatedly.' The imperfect verb suggests continued questioning.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'household slave' reflects Greek ἐξ οἴκου, possibly
      indicating a domestic or homeborn slave rather than merely 'from a house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φόβον
  chosen: fear
  alternatives:
  - reverence
  - awe
  lexicon: BDAG
  rationale: In the ethical exhortation φόβος θεοῦ carries covenantal-moral weight.
    'Fear of God' preserves the traditional and Jewish paraenetic force better than
    the softer 'reverence,' while remaining intelligible in modern English.
- source_word: πρὸ ὀφθαλμῶν ὑμῶν
  chosen: before your eyes
  alternatives:
  - in your sight
  - in view
  lexicon: LSJ
  rationale: This idiom is vivid and exhortational. 'Before your eyes' preserves the
    concrete imagery and moral vigilance of the Greek.
- source_word: τιμᾶτε
  chosen: honor
  alternatives:
  - esteem
  - show respect to
  lexicon: BDAG
  rationale: '''Honor'' best matches the imperative''s ethical force and fits the
    familial setting without over-expansion.'
- source_word: ἀδελφοὺς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: In context Joseph is speaking as a patriarch about literal/fraternal
    relations and the testamentary idiom favors 'brothers.'
- source_word: ποιῶν νόμον Κυρίου
  chosen: does the law of the Lord
  alternatives:
  - keeps the law of the Lord
  - practices the Lord's law
  lexicon: BDAG
  rationale: The Greek is literally 'doing' the law. 'Does the law of the Lord' preserves
    the Semitic-ethical texture, though slightly less idiomatic than 'keeps.'
- source_word: ἀγαπηθήσεται
  chosen: will be loved
  alternatives:
  - will be beloved
  - will be dear
  lexicon: BDAG
  rationale: The future passive is straightforward; 'will be loved by him' keeps the
    divine response personal and direct.
- source_word: μετὰ τῶν Ἰσμαϊλιτῶν
  chosen: with the Ishmaelites
  alternatives:
  - among the Ishmaelites
  lexicon: LSJ
  rationale: The phrase marks Joseph's journey in company with them. 'With the Ishmaelites'
    is the most natural and sufficiently precise rendering.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - household slave
  lexicon: BDAG
  rationale: Following project doctrine, δοῦλος is rendered 'slave' where bonded status
    is salient. Here the traders ask about Joseph's status, so the ownership dimension
    is active.
- source_word: ἐξ οἴκου
  chosen: household slave
  alternatives:
  - from a household
  - homeborn slave
  lexicon: LSJ
  rationale: The phrase likely specifies domestic status rather than merely origin
    from a house. Rendering the whole expression as 'household slave' communicates
    the social sense in idiomatic English.
- source_word: αἰσχύνω
  chosen: put ... to shame
  alternatives:
  - disgrace
  - bring shame on
  lexicon: BDAG
  rationale: The verb concerns causing shame. 'Put my brothers to shame' preserves
    the honor-shame dimension central to the line.
