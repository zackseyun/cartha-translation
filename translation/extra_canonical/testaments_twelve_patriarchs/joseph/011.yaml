theological_decisions:
- issue: Rendering δοῦλος in Joseph's self-description
  chosen_reading: slave / household slave
  alternative_readings:
  - servant / household servant
  - bondservant
  rationale: The chapter's social setting concerns Joseph's sale and status in transit.
    The bonded nature of δοῦλος is explicit, so 'slave' best fits both the Greek and
    project doctrine.
  doctrine_reference: 'DOCTRINE.md: δοῦλος default rendering'
- issue: Meaning of Joseph's concealment 'so that I might not put my brothers to shame'
  chosen_reading: Joseph suppresses his higher family status to avoid exposing or
    disgracing his brothers
  alternative_readings:
  - to avoid shaming his father's house generally
  - to avoid personal humiliation
  rationale: The direct object is 'my brothers,' and the narrative logic is Joseph's
    merciful refusal to dishonor those who sold him. This preserves the testament's
    theme of brotherly forbearance.
