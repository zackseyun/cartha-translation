translation:
  text: '1. If, then, you also walk in the commandments of the Lord, God will exalt
    you in good things forever.

    2. And if anyone wants to do evil to you, you, by doing good, pray for him, and
    you will be delivered from every evil by the Lord.

    3. For see, you yourselves know that through my humility and my long-suffering
    I took as my wife the daughter of the priest of Heliopolis, and a hundred talents
    of gold were given to me with her, and my Lord made them subject to me.

    4. Even so'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with blessings' for 'in good things'; the Greek phrase is broad and
      may include both material and moral good.
    reason: lexical_alternative
  - marker: b
    text: '''Long-suffering'' may also be rendered ''patience'' or ''forbearance.'''
    reason: lexical_alternative
  - marker: c
    text: The Greek witness supplied here breaks off at the start of verse 4 ('Even
      so ...'). The remainder is not translated because it is not present in the provided
      source text.
    reason: textual_variant
  - marker: d
    text: '''My Lord'' could be read as God, though some may understand it as Joseph''s
      earthly master in context.'
    reason: alternative_reading
lexical_decisions:
- source_word: πορευθῆτε ἐν ταῖς ἐντολαῖς
  chosen: walk in the commandments
  alternatives:
  - go in the commandments
  - live by the commandments
  lexicon: LSJ
  rationale: Retains the biblical idiom of conduct as walking, preserving testamentary
    and scriptural register rather than flattening to generic 'obey.'
- source_word: ὑψώσει
  chosen: will exalt
  alternatives:
  - will raise up
  - will lift up
  lexicon: LSJ
  rationale: '''Exalt'' best preserves both honor and elevation language in a moral-religious
    context.'
- source_word: ἐν ἀγαθοῖς
  chosen: in good things
  alternatives:
  - with blessings
  - among good things
  lexicon: LSJ
  rationale: The phrase is somewhat broad; 'in good things' keeps the Greek's open
    texture rather than narrowing it to material prosperity alone.
- source_word: κακοποιῆσαι
  chosen: to do evil to
  alternatives:
  - to harm
  - to mistreat
  lexicon: LSJ
  rationale: Preserves the moral coloring of the verb rather than reducing it to mere
    injury.
- source_word: τῇ ἀγαθοεργείᾳ
  chosen: by doing good
  alternatives:
  - with beneficence
  - through good deeds
  lexicon: LSJ
  rationale: A natural English rendering that still reflects the active practice of
    benefaction in response to hostility.
- source_word: εὔχεσθε ὑπὲρ αὐτοῦ
  chosen: pray for him
  alternatives:
  - offer prayer on his behalf
  lexicon: LSJ
  rationale: Direct and idiomatic, preserving the paraenetic force.
- source_word: λυτρωθήσεσθε
  chosen: you will be delivered
  alternatives:
  - you will be redeemed
  - you will be rescued
  lexicon: LSJ
  rationale: In this context of protection from evil, 'delivered' best captures divine
    rescue without overloading the term with later soteriological specificity.
- source_word: ταπείνωσιν
  chosen: humility
  alternatives:
  - lowliness
  - humiliation
  lexicon: LSJ
  rationale: The virtue sense fits Joseph's self-presentation and exhortation; 'humiliation'
    would overemphasize passive disgrace.
- source_word: μακροθυμίαν
  chosen: long-suffering
  alternatives:
  - patience
  - forbearance
  lexicon: LSJ
  rationale: Keeps the moral weight and enduring quality of the virtue, important
    in this testament's ethical texture.
- source_word: θυγατέρα ἱερέως ἡλιουπόλεως
  chosen: the daughter of the priest of Heliopolis
  alternatives:
  - the priest's daughter from Heliopolis
  lexicon: LSJ
  rationale: A straightforward rendering of the genitival construction, preserving
    the place-name rather than substituting 'On.'
- source_word: ἔλαβον ... εἰς γυναῖκα
  chosen: I took as my wife
  alternatives:
  - I married
  lexicon: LSJ
  rationale: Slightly more formal wording reflects the Greek expression and the testamentary
    register.
- source_word: κατεδούλωσεν
  chosen: made them subject to me
  alternatives:
  - enslaved them to me
  - subdued them under me
  lexicon: LSJ
  rationale: The verb is strong, but the object here is awkward in context; 'made
    them subject to me' preserves subjugation language without forcing an overly literal
    English phrasing where the referent is textually uncertain.
