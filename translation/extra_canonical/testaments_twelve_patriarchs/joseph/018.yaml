theological_decisions:
- issue: Reference of 'my Lord' (Κύριός μου) in v. 3
  chosen_reading: 'understood as God: ''my Lord made them subject to me'''
  alternative_readings:
  - '''my master'' referring to Pharaoh'
  - variant adverbial reading reflected in apparatus
  rationale: Given the testament's consistent moral-theological framing and the immediate
    context of divine vindication, the possessive title is best taken as referring
    to God. The phrase remains translated transparently without harmonization.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord'
- issue: Scope of the chapter given truncated source at v. 4
  chosen_reading: translate extant Greek only, leaving v. 4 as incomplete
  alternative_readings:
  - silently reconstruct from other editions or translations
  rationale: Transparency requires rendering only the text actually supplied in the
    witness layer. The incomplete opening of v. 4 is marked by an unfinished translation
    rather than conjectural completion.
