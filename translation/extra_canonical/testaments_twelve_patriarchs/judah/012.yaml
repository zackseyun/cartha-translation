translation:
  text: 1. After this, when Tamar had been a widow for two years, and heard that I
    was going up to shear the sheep, she adorned herself with bridal ornament and
    sat in Enaim, at the city gate of the inn. 2. For it was a law of the Amorites
    that a widow should sit there openly for prostitution. 3. So when I was drunk
    with wine, I did not recognize her, and she deceived me—her beauty through the
    appearance of her adornment. 4. And turning aside to her I said, “I will come
    in to you.” And she said, “What will you give me?” And I gave her my staff and
    my ring and the diadem of my kingdom as a pledge. And when I had gone in to her,
    she conceived. 5. But I, not knowing what I had done, wanted to kill her. Yet
    she sent the pledges secretly and put me to shame. 6. And when I called her, I
    heard also the secret words which, while sleeping with her in my drunkenness,
    I had spoken. And I was not able to kill her, because it was from the Lord. 7.
    For I said, “Perhaps she did this deceitfully after receiving the pledge from
    another woman.” 8. But I did not approach her again for the rest of my life, because
    I had done this abomination in all Israel. 9. Yet those in the city said that
    there had been no harlot sitting at the gate, because she had come from another
    place and sat for a short time at the gate. 10. And I supposed that no one knew
    that I had gone in to her. 11. And after this we came into Egypt to Joseph because
    of the famine. 12. Now I was forty-six years old, and I spent seventy-three years
    in Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek reads 'the inn' (πανδοχεῖον), an unusual detail compared with
      the Genesis narrative; the translation preserves the witness rather than harmonizing
      it away.
    reason: textual_variant
  - marker: b
    text: Some textual features in this chapter differ from the Genesis account, especially
      the items given as pledge. The Greek here reads 'my staff and my ring and the
      diadem of my kingdom.'
    reason: textual_variant
  - marker: c
    text: Or 'the words spoken privately.' The Greek wording is textually awkward
      but points to words Judah uttered in secret while drunk.
    reason: lexical_alternative
  - marker: d
    text: '''Because it was from the Lord'' may express Judah''s sense of divine providence
      overruling the event, not necessarily approval of the act.'
    reason: alternative_reading
lexical_decisions:
- source_word: χηρευούσης / χηρεύουσαν
  chosen: had been a widow / a widow
  alternatives:
  - was widowed
  - widowed woman
  lexicon: LSJ
  rationale: The participle denotes Tamar's state as bereaved of her husband. 'Widow'
    is idiomatic and preserves the social status central to the episode.
- source_word: κοσμηθεῖσα κόσμῳ νυμφικῷ
  chosen: adorned herself with bridal ornament
  alternatives:
  - arrayed herself in bridal dress
  - decked herself with a bride's adornment
  lexicon: LSJ
  rationale: The doubled cognate wording emphasizes deliberate adornment. 'Bridal
    ornament' keeps the elevated testamentary tone without over-paraphrasing.
- source_word: πρὸς τὴν πύλην τοῦ πανδοχείου
  chosen: at the city gate of the inn
  alternatives:
  - by the gate of the lodging place
  - near the inn gate
  lexicon: LSJ
  rationale: πανδοχεῖον ordinarily means inn or lodging place. The phrase is somewhat
    awkward in Greek transmission; this rendering preserves both gate and inn rather
    than harmonizing to Genesis.
- source_word: προκαθέζεσθαι ἐν πορνείᾳ
  chosen: sit there openly for prostitution
  alternatives:
  - sit in prostitution
  - take her seat as a prostitute
  lexicon: LSJ
  rationale: The verb suggests taking a public seat; the phrase describes public sexual
    availability. 'Openly' brings out the social visibility implied by the setting
    at the gate.
- source_word: οὐκ ἐπέγνων αὐτήν
  chosen: I did not recognize her
  alternatives:
  - I failed to know her
  - I did not identify her
  lexicon: LSJ
  rationale: The sense is recognition, not sexual knowledge, in this context of disguise
    and drunkenness.
- source_word: τὸ κάλλος αὐτῆς διὰ τοῦ σχήματος τῆς κοσμήσεως
  chosen: her beauty through the appearance of her adornment
  alternatives:
  - her beauty by the form of her dress
  - her beauty because of the fashion of her adornment
  lexicon: LSJ
  rationale: This preserves the causal force and the visual emphasis of σχήμα and
    κόσμησις.
- source_word: ἐκκλίνας πρὸς αὐτήν
  chosen: turning aside to her
  alternatives:
  - going over to her
  - inclining toward her
  lexicon: LSJ
  rationale: The participle suggests a deliberate deviation toward Tamar; 'turning
    aside' preserves the moral nuance often carried by such language.
- source_word: Εἰσέρχομαι πρὸς σε
  chosen: I will come in to you
  alternatives:
  - I will go in to you
  lexicon: LSJ
  rationale: This is the standard sexual idiom; 'come in to you' keeps the elevated
    biblical register.
- source_word: ῥάβδον
  chosen: staff
  alternatives:
  - rod
  lexicon: LSJ
  rationale: Staff is the more natural English equivalent in a patriarchal narrative
    setting.
- source_word: δακτύλιον
  chosen: ring
  alternatives:
  - signet ring
  lexicon: LSJ
  rationale: The Greek here says simply 'ring.' 'Signet ring' is possible from the
    Genesis background, but the witness should not be expanded beyond what is present.
- source_word: διάδημα τῆς βασιλείας μου
  chosen: the diadem of my kingdom
  alternatives:
  - the crown-band of my kingship
  - the diadem of my rule
  lexicon: LSJ
  rationale: The text presents Judah in royalized retrospective speech. 'Diadem' preserves
    the regal term without flattening it to 'crown.'
- source_word: εἰς ἀρραβῶνα / τοὺς ἀρραβῶνας
  chosen: as a pledge / the pledges
  alternatives:
  - as earnest money
  - as security
  lexicon: LSJ
  rationale: ἀρραβών denotes a pledge or guarantee. 'Pledge' is concise and fits both
    singular and plural references in the chapter.
- source_word: συνῆλθον αὐτῇ
  chosen: I had gone in to her
  alternatives:
  - I came together with her
  - I lay with her
  lexicon: LSJ
  rationale: The idiom refers to sexual union. The chosen rendering matches the register
    already established in v. 4.
- source_word: συνελήφθη
  chosen: she conceived
  alternatives:
  - she became pregnant
  lexicon: LSJ
  rationale: A concise biblical idiom that preserves the narrative tone.
- source_word: ἤθελον ἀνελεῖν αὐτήν
  chosen: wanted to kill her
  alternatives:
  - intended to put her to death
  - meant to destroy her
  lexicon: LSJ
  rationale: ἀναιρέω here is lethal, not merely punitive. 'Kill' is direct and clear.
- source_word: κατήσχυνέ με
  chosen: put me to shame
  alternatives:
  - disgraced me
  - exposed me to shame
  lexicon: LSJ
  rationale: The verb centers on public shame, an important moral category in testamentary
    confession.
- source_word: τοὺς ἐν μυστηρίῳ τοὺς λόγους
  chosen: the secret words
  alternatives:
  - the words spoken in secret
  - the hidden words
  lexicon: LSJ
  rationale: The repetition in Greek is awkward, likely textual, but clearly points
    to words uttered privately. 'Secret words' is faithful and readable.
- source_word: παρὰ Κυρίου ἦν
  chosen: it was from the Lord
  alternatives:
  - it was from the Lord's hand
  - it was ordained by the Lord
  lexicon: LSJ
  rationale: This preserves the terse theological claim without over-interpreting
    providence language.
- source_word: ἐν δολιότητι
  chosen: deceitfully
  alternatives:
  - by trickery
  - with guile
  lexicon: LSJ
  rationale: The adverb names Tamar's stratagem as Judah initially construed it.
- source_word: βδέλυγμα
  chosen: abomination
  alternatives:
  - detestable thing
  lexicon: LSJ
  rationale: A strong moral-religious term; 'abomination' best preserves the gravity
    of Judah's self-condemnation.
- source_word: τελισκομένην
  chosen: harlot
  alternatives:
  - prostitute
  lexicon: LSJ
  rationale: The transmitted form is difficult, but the context clearly concerns a
    prostitute at the gate. 'Harlot' fits the elevated register, while the chapter
    already used 'prostitution' for the practice.
- source_word: ἐξ ἄλλου χωρίου
  chosen: from another place
  alternatives:
  - from another district
  - from another village
  lexicon: LSJ
  rationale: χωρίον can denote place, district, or village. 'Another place' avoids
    false precision.
- source_word: εἰσῆλθον πρὸς αὐτήν
  chosen: I had gone in to her
  alternatives:
  - I had come in to her
  lexicon: LSJ
  rationale: Again the sexual idiom is preserved consistently.
- source_word: διὰ τὸν λιμόν
  chosen: because of the famine
  alternatives:
  - on account of the famine
  lexicon: LSJ
  rationale: Straightforward causal rendering.
- source_word: ἐποίησα εἰς Αἴγυπτον
  chosen: I spent ... in Egypt
  alternatives:
  - I lived ... in Egypt
  - I passed ... in Egypt
  lexicon: LSJ
  rationale: The Greek is idiomatic for spending a span of years in a place; 'spent'
    is natural English.
