theological_decisions:
- issue: παρὰ Κυρίου ἦν in v. 6
  chosen_reading: because it was from the Lord
  alternative_readings:
  - because it was by the Lord's will
  - because it came from the Lord
  rationale: The phrase attributes the outcome to divine agency or providence without
    specifying whether Judah means direct command, judgment, or overruling. The translation
    preserves that tension rather than resolving it.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
- issue: Royal language in v. 4 ('the diadem of my kingdom')
  chosen_reading: retain the regal wording as transmitted
  alternative_readings:
  - harmonize to Genesis with 'cord' instead of 'diadem'
  - downgrade to a generic ornament
  rationale: The Greek witness presents Judah with royalized self-description. Even
    if secondary or expansionary, the translation should render the extant text honestly
    and note the issue rather than harmonize silently.
  doctrine_reference: PHILOSOPHY.md §We are not paraphrasing or smoothing an existing
    English translation
