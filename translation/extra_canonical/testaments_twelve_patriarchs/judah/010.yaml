theological_decisions:
- issue: Agency in the deaths of Er and Onan
  chosen_reading: 'Translate both divine and angelic agency as the Greek presents
    them without harmonizing: Er is killed by an angel of the Lord; Onan is struck
    down by the Lord.'
  alternative_readings:
  - Harmonize both deaths as directly by the Lord
  - Harmonize both deaths as by an angel
  rationale: The witness preserves a distinction in agency, and transparent translation
    should retain that tension rather than smooth it away.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Levirate-marriage terminology
  chosen_reading: Make the levirate sense explicit in English.
  alternative_readings:
  - Use generic 'marry' and leave the custom implicit
  rationale: The Greek verb carries a culturally specific obligation tied to Tamar's
    case; explicit rendering aids comprehension without paraphrasing beyond the sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
