translation:
  text: After these things, Er my son took Tamar for himself as wife, from Mesopotamia,
    a daughter of Aram. But Er was wicked, and an angel of the Lord killed him. And
    I gave her to Onan, my second son, and behold, the Lord struck him down also.
    For he did not know her, through the scheming of his mother, because he did not
    want to have children by her. During the days of the bridal chamber I gave Onan
    to her in levirate marriage; yet he too, in wickedness, did not know her, though
    he lived with her for a year. And when I threatened him, he went in to her, but
    he wasted the seed on the ground, according to the command of his mother. So he
    too died in wickedness. And I wanted to give Shelah also to her, but his mother
    did not allow it; for she acted wickedly, because Tamar was not from the daughters
    of Canaan, as she herself was.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some Greek witnesses vary in small details of sequence and timing, including
      whether Er died on the second day or the third night, and whether Onan was joined
      to Tamar immediately or during the wedding period.
    reason: textual_variant
  - marker: b
    text: '"Know her" is a biblical euphemism for sexual relations.'
    reason: lexical_alternative
  - marker: c
    text: '"Gave Onan to her in levirate marriage" refers to the duty of a deceased
      man''s brother to raise offspring for him through the widow; compare Genesis
      38.'
    reason: cultural_note
  - marker: d
    text: The chapter's repeated language of "wickedness" ties the deaths of Er and
      Onan and the mother's obstruction into one moral pattern.
    reason: cross_reference
lexical_decisions:
- source_word: πονηρός / ἐν πονηρίᾳ
  chosen: wicked / in wickedness
  alternatives:
  - evil
  - corrupt
  lexicon: BDAG
  rationale: Keeps the moral charge strong and consistent across the chapter, matching
    the testamentary denunciation of Er, Onan, and the mother's conduct.
- source_word: ἄγγελος Κυρίου
  chosen: an angel of the Lord
  alternatives:
  - the angel of the Lord
  lexicon: BDAG
  rationale: The anarthrous construction in this witness does not require identification
    with the specific biblical figure 'the angel of the Lord'; the indefinite rendering
    is more textually cautious.
- source_word: ἔγνω / οὐκ ἔγνω αὐτήν
  chosen: know / did not know her
  alternatives:
  - have relations with
  - sleep with
  lexicon: BDAG
  rationale: Preserves the biblical euphemism and the elevated register of the testament
    while remaining intelligible in English.
- source_word: πανουργία
  chosen: scheming
  alternatives:
  - craftiness
  - cunning
  lexicon: BDAG
  rationale: Conveys deliberate manipulative intent by the mother without sounding
    overly technical or archaic.
- source_word: ἔχειν τέκνα ἀπ᾿ αὐτῆς
  chosen: to have children by her
  alternatives:
  - to get offspring from her
  - to father children through her
  lexicon: BDAG
  rationale: Natural English that preserves the reproductive and lineage-focused concern
    of the Greek.
- source_word: ἐπεγάμβρευσα / ἐπιγαμβρεῦσαι
  chosen: gave ... in levirate marriage
  alternatives:
  - joined ... in marriage
  - assigned as husband's brother
  lexicon: LSJ
  rationale: Makes explicit the levirate-marriage sense of the verb, which is central
    to the Tamar narrative and not obvious from a bare 'marry' in English.
- source_word: ἐν ταῖς ἡμέραις τοῦ θαλάμου
  chosen: during the days of the bridal chamber
  alternatives:
  - during the wedding days
  - in the marriage chamber period
  lexicon: LSJ
  rationale: Retains the concrete nuptial imagery of the Greek while signaling the
    marriage context.
- source_word: συνῆλθε μὲν αὐτῇ
  chosen: he went in to her
  alternatives:
  - he came to her
  - he had intercourse with her
  lexicon: BDAG
  rationale: A standard elevated idiom for sexual union that fits the register and
    avoids flattening the narrative.
- source_word: διέφθειρε τὸ σπέρμα ἐπὶ τὴν γῆν
  chosen: he wasted the seed on the ground
  alternatives:
  - he spilled his semen on the ground
  - he destroyed the seed on the earth
  lexicon: BDAG
  rationale: Preserves the concrete image and allusion to the Genesis tradition while
    using readable English.
- source_word: οὐκ ἀφῆκεν
  chosen: did not allow it
  alternatives:
  - did not permit
  - did not let him
  lexicon: BDAG
  rationale: Smooth English that clearly expresses the mother's obstruction of Judah's
    intention.
- source_word: ἐπονηρεύσατο
  chosen: she acted wickedly
  alternatives:
  - she did evil
  - she became malicious
  lexicon: BDAG
  rationale: Reflects the middle/deponent verbal force as conduct, and keeps the chapter's
    repeated wickedness vocabulary stable.
- source_word: τῶν θυγατέρων τῶν Χαναναίων
  chosen: the daughters of Canaan
  alternatives:
  - the Canaanite women
  - the daughters of the Canaanites
  lexicon: LSJ
  rationale: Preserves the familial/ethnic phrasing of the Greek and echoes biblical
    diction.
