theological_decisions:
- issue: Relative status of Judah's kingship and Levi's priesthood
  chosen_reading: The text teaches that God assigned kingship to Judah and priesthood
    to Levi, with kingship subjected to priesthood.
  alternative_readings:
  - A softer coordination of royal and priestly roles without subordination
  rationale: The verbs ἔδωκεν and especially ὑπέταξε state a real hierarchy. The translation
    preserves this rather than harmonizing Judah's dignity with Levi's by weakening
    the subordination.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 4
- issue: Conditional clause on priesthood's superiority
  chosen_reading: The priesthood surpasses earthly kingship unless through sin it
    falls away from the Lord and comes under earthly rule.
  alternative_readings:
  - The earthly kingdom falls away through sin
  - The syntax is too corrupt to translate straightforwardly
  rationale: The nearest grammatical subject after ἡ ἱερατεία is the priesthood itself;
    the warning is that priestly superiority is not absolute if corrupted by sin.
    This preserves the tension in the Greek rather than smoothing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Cultic privilege of Levi
  chosen_reading: Levi is chosen to draw near to the Lord, eat at his table, and offer
    firstfruits.
  alternative_readings:
  - A metaphorical reading of table fellowship only
  rationale: The sequence is strongly priestly and cultic in context, so the translation
    keeps sacrificial and sanctuary overtones explicit.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Scope of judgment in the sea simile
  chosen_reading: Judah's royal line becomes a sphere in which some suffer captivity
    and others enrich themselves by plunder.
  alternative_readings:
  - The simile refers only to the nations generally, not Judah specifically
  rationale: The phrase ἐν σοὶ points directly to Judah as the social-political sphere
    under discussion, even while 'every race of men' broadens the effect.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
