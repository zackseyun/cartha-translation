translation:
  text: 'And now, my children, I command you: love Levi, so that you may remain, and
    do not exalt yourselves over him, lest you be utterly destroyed. For God gave
    me the kingship, and to him the priesthood, and he subjected the kingship to the
    priesthood. To me he gave the things on earth; to him, the things in the heavens.
    For thus the priesthood of God surpasses the earthly kingdom, unless through sin
    it falls away from the Lord and is ruled by the earthly kingdom.


    For the angel of the Lord told me that the Lord chose him above you, to draw near
    to him, and to eat at his table, and to offer him the firstfruits of the delights
    of the sons of Israel. But you shall be king of Jacob. And you shall be among
    them like the sea. For just as in it the righteous are storm-tossed, some being
    taken captive and others growing rich, so also in you every race of men: some
    are endangered, being taken captive, and others grow rich by seizing what belongs
    to others.


    For the kings will be like sea-monsters, swallowing men like fish; they will enslave
    sons and daughters of free people, and they will seize houses, fields, flocks,
    and wealth. And they will unjustly fill ravens and ibises with the flesh of many,
    and they will advance in evil, being lifted up in greed. And there will be false
    prophets like storms,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text of this chapter, as provided here, breaks off after 'And
      there will be false prophets like storms,' so the present draft translates the
      extant witness only.
    reason: textual_variant
  - marker: b
    text: '''Ibises'' follows the Greek directly. The image is of carrion birds feeding
      on the slain; some readers may expect a more general term such as ''birds,''
      but the Greek is more specific.'
    reason: lexical_alternative
  - marker: c
    text: '''The firstfruits of the delights of the sons of Israel'' likely refers
      to choice produce or rich first offerings brought from Israel.'
    reason: cultural_note
lexical_decisions:
- source_word: παραγγέλλω
  chosen: I command
  alternatives:
  - I charge
  - I instruct
  lexicon: LSJ
  rationale: Preserves the forceful testamentary imperative of a father giving binding
    final instruction, stronger than a mere 'advise' or 'tell'.
- source_word: ἀγαπᾶτε
  chosen: love
  alternatives:
  - show love to
  lexicon: LSJ
  rationale: Keeps the direct ethical imperative and aligns with the project's default
    rendering of agapē cognates.
- source_word: ἐπαίρεσθε ἐπ᾿ αὐτόν
  chosen: exalt yourselves over him
  alternatives:
  - be arrogant toward him
  - raise yourselves against him
  lexicon: LSJ
  rationale: Retains the vertical imagery of self-exaltation over Levi rather than
    flattening to generic disrespect.
- source_word: ἐξολοθρευθῆτε
  chosen: be utterly destroyed
  alternatives:
  - be wiped out
  - perish utterly
  lexicon: LSJ
  rationale: Conveys the severe covenantal warning implied by the compound verb.
- source_word: βασιλείαν
  chosen: kingship
  alternatives:
  - kingdom
  - royal rule
  lexicon: LSJ
  rationale: Here the focus is the divinely assigned royal office to Judah rather
    than territorial realm alone.
- source_word: ἱερατείαν
  chosen: priesthood
  alternatives:
  - priestly office
  lexicon: LSJ
  rationale: Standard and clear rendering for the office assigned to Levi.
- source_word: ὑπέταξε
  chosen: subjected
  alternatives:
  - placed under
  - subordinated
  lexicon: LSJ
  rationale: 'Makes explicit the hierarchy stated in the Greek: kingship is placed
    under priesthood.'
- source_word: τὰ ἐπὶ γῆς / τὰ ἐν οὐρανοῖς
  chosen: the things on earth / the things in the heavens
  alternatives:
  - earthly things / heavenly things
  lexicon: LSJ
  rationale: Keeps the parallelism and the broad sphere-language of the Greek.
- source_word: ὑπερέχει
  chosen: surpasses
  alternatives:
  - is superior to
  - has precedence over
  lexicon: LSJ
  rationale: Natural English that preserves comparative superiority without overtechnical
    phrasing.
- source_word: ἐκπέσῃ ἀπὸ Κυρίου
  chosen: falls away from the Lord
  alternatives:
  - falls from the Lord
  - forfeits its standing before the Lord
  lexicon: LSJ
  rationale: Captures moral-religious apostasy implied by the phrase.
- source_word: κυριευθῇ ἀπὸ τῆς ἐπιγείου βασιλείας
  chosen: is ruled by the earthly kingdom
  alternatives:
  - comes under the dominion of the earthly kingdom
  lexicon: LSJ
  rationale: 'Preserves the reversal: priesthood normally surpasses kingship, but
    sin can invert that order.'
- source_word: προσεγγίζειν
  chosen: to draw near
  alternatives:
  - to approach
  lexicon: LSJ
  rationale: Cultic language suits priestly access to God.
- source_word: ἐσθίειν τὴν τράπεζαν αὐτοῦ
  chosen: to eat at his table
  alternatives:
  - to partake of his table
  lexicon: LSJ
  rationale: Idiomatic English preserving table-fellowship and cultic privilege.
- source_word: ἀπαρχὰς
  chosen: the firstfruits
  alternatives:
  - first offerings
  lexicon: LSJ
  rationale: Established cultic term; more precise than generic 'offerings.'
- source_word: ἐντρυφημάτων
  chosen: the delights
  alternatives:
  - choice foods
  - luxuries
  lexicon: LSJ
  rationale: The noun likely refers to rich produce or choice portions; 'delights'
    preserves some breadth while fitting sacrificial firstfruits.
- source_word: ἔσῃ ... ὡς ἡ θάλασσα
  chosen: you shall be ... like the sea
  alternatives:
  - you will be like the sea
  lexicon: LSJ
  rationale: Keeps the vivid simile central to Judah's portrayal of royal power and
    social turbulence.
- source_word: χειμάζονται
  chosen: are storm-tossed
  alternatives:
  - are battered by storms
  - are driven by storms
  lexicon: LSJ
  rationale: Preserves the maritime image rather than reducing it to generic suffering.
- source_word: αἰχμαλωτιζόμενοι
  chosen: being taken captive
  alternatives:
  - being led into captivity
  lexicon: LSJ
  rationale: Consistent rendering of captivity language in this prophetic warning.
- source_word: πλουτοῦντες
  chosen: growing rich
  alternatives:
  - becoming wealthy
  lexicon: LSJ
  rationale: Simple and direct; keeps the participial contrast with those taken captive.
- source_word: ἁρπάζοντες τὰ ἀλλότρια
  chosen: seizing what belongs to others
  alternatives:
  - plundering others' goods
  - snatching чужое
  lexicon: LSJ
  rationale: Makes explicit the injustice of enrichment by taking another's property.
- source_word: κήτη
  chosen: sea-monsters
  alternatives:
  - great sea-creatures
  - whales
  lexicon: LSJ
  rationale: Best fits the marine imagery and predatory force; 'whales' would be too
    narrow and potentially misleading.
- source_word: καταδουλώσουσιν
  chosen: they will enslave
  alternatives:
  - they will reduce to slavery
  lexicon: LSJ
  rationale: Strong social oppression is in view; 'enslave' is the clearest modern
    equivalent.
- source_word: χρήματα
  chosen: wealth
  alternatives:
  - possessions
  - money
  lexicon: LSJ
  rationale: Broad enough to include movable property, not merely coinage.
- source_word: κόρακας καὶ ἴβεις χορτάσουσιν
  chosen: they will fill ravens and ibises
  alternatives:
  - they will satisfy ravens and ibises
  - they will feed ravens and ibises full
  lexicon: LSJ
  rationale: Retains the grim carrion-bird image of widespread slaughter. 'Ibises'
    follows the Greek noun directly, despite its unusuality in English Bible style.
- source_word: προκόψουσιν ἐπὶ κακῷ
  chosen: they will advance in evil
  alternatives:
  - they will make progress in wickedness
  lexicon: LSJ
  rationale: Preserves the ironic use of 'advance/progress' for moral degeneration.
- source_word: πλεονεξίᾳ
  chosen: greed
  alternatives:
  - covetousness
  - avarice
  lexicon: LSJ
  rationale: Readable modern English while preserving the vice term's acquisitive
    sense.
- source_word: ψευδοπροφῆται
  chosen: false prophets
  alternatives:
  - lying prophets
  lexicon: LSJ
  rationale: Standard rendering that clearly signals deceptive prophetic claimants.
