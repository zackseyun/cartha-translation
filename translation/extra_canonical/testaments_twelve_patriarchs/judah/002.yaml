theological_decisions:
- issue: Divine agency in Judah's feats
  chosen_reading: The Lord is presented as the giver of favor enabling Judah's success.
  alternative_readings:
  - The statement could be read as a general blessing formula with less emphasis on
    direct empowerment.
  rationale: The opening line explicitly attributes Judah's success in all his works
    to the Lord's favor. The translation preserves both Judah's prowess and the theological
    claim that his prowess is divinely granted.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; κύριος → Lord'
