translation:
  text: And the Lord gave me favor in all my works, whether in the hunt or in the
    house. I know that I ran down a hind and caught it, and I made it into food for
    my father, and he ate. And I would seize the gazelle in its course, and I overtook
    everything that was in the open fields. I killed the lion and snatched a kid from
    its mouth. I took hold of the bear by its foot and hurled it down the cliff, and
    it was crushed. I ran down the wild boar, and as I rushed upon it in my running,
    I tore it apart. I caught a wild mare and, after seizing it, subdued it. A leopard
    in Hebron sprang upon a dog, and I caught it by the tail and flung it against
    the rock, and it was split in two. I found a wild ox grazing through the land,
    and taking hold of its horns, I shook it round and round and struck it blind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text of this chapter is textually rough in places, especially
      in the sequence of hunting exploits. The translation follows the sense of the
      extant Greek witness without smoothing away its abrupt style.
    reason: textual_variant
  - marker: b
    text: Or 'grace' for 'favor' in the opening line; the context here favors success
      granted by divine goodwill in Judah's deeds.
    reason: lexical_alternative
  - marker: c
    text: Some readers may prefer 'wild bull' instead of 'wild ox.' The Greek can
      support either, and the image is of a powerful untamed bovine.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριν
  chosen: favor
  alternatives:
  - grace
  lexicon: LSJ
  rationale: In this narrative of prowess and success, χάρις refers to divine favor
    or gracious enablement in Judah's undertakings. 'Favor' fits the immediate context
    better than the more theologically loaded 'grace,' while still preserving the
    sense that the Lord is the source.
- source_word: Κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Follows project default for κύριος as a divine title. The context is
    Judah attributing his success to God.
- source_word: πιάσας / ἐπίασα
  chosen: caught
  alternatives:
  - seized
  - captured
  lexicon: LSJ
  rationale: A straightforward rendering for physically taking hold of prey. 'Caught'
    is idiomatic in hunting contexts and remains faithful to the Greek.
- source_word: ἔλαφος
  chosen: hind
  alternatives:
  - deer
  - stag
  lexicon: LSJ
  rationale: The form here is feminine in context ('her'), so 'hind' preserves the
    likely female deer rather than the male-specific 'stag.' 'Deer' is possible but
    less precise.
- source_word: βρῶμα
  chosen: food
  alternatives:
  - meat
  lexicon: LSJ
  rationale: βρῶμα is general 'food' or 'that which is eaten.' Since the context is
    game prepared for Isaac/Jacob? here Judah's father, 'food' is accurate without
    over-specifying.
- source_word: δορκάς
  chosen: gazelle
  alternatives:
  - roe
  - antelope
  lexicon: LSJ
  rationale: δορκάς commonly denotes a gazelle. 'Gazelle' is the clearest modern equivalent.
- source_word: διὰ τοῦ δρόμου
  chosen: in its course
  alternatives:
  - while it ran
  - on the run
  lexicon: LSJ
  rationale: The phrase conveys pursuit in motion. 'In its course' preserves the elevated
    register and the sense of catching the animal while it was running.
- source_word: πεδία
  chosen: open fields
  alternatives:
  - plains
  - fields
  lexicon: LSJ
  rationale: The setting is open country where game is overtaken. 'Open fields' makes
    the hunting scene vivid and natural in English.
- source_word: ἀφειλόμην
  chosen: snatched
  alternatives:
  - took away
  - rescued
  lexicon: LSJ
  rationale: The verb indicates forcefully taking something away. 'Snatched' captures
    the speed and violence of the action.
- source_word: ἔριφος
  chosen: kid
  alternatives:
  - young goat
  - goat-kid
  lexicon: LSJ
  rationale: '''Kid'' is the standard concise English equivalent for a young goat.'
- source_word: κρημνός
  chosen: cliff
  alternatives:
  - precipice
  - steep bank
  lexicon: LSJ
  rationale: A natural English rendering for a steep drop. 'Cliff' is vivid and readable.
- source_word: συνετρίβη
  chosen: was crushed
  alternatives:
  - was shattered
  - was broken to pieces
  lexicon: LSJ
  rationale: The passive indicates violent destruction after the fall. 'Was crushed'
    fits the physical scene well.
- source_word: ἀγρίῳ χοίρῳ
  chosen: wild boar
  alternatives:
  - boar
  lexicon: LSJ
  rationale: The adjective ἀγρίος is significant and should be retained; 'wild boar'
    is the standard expression.
- source_word: κατέδραμον / προέλαβον
  chosen: ran down / rushed upon
  alternatives:
  - overtook / attacked
  lexicon: LSJ
  rationale: These verbs emphasize speed and aggressive pursuit. Rendering them distinctly
    preserves the kinetic force of the Greek sequence.
- source_word: κατεσπάραξα
  chosen: tore it apart
  alternatives:
  - mauled it
  - ripped it to pieces
  lexicon: LSJ
  rationale: A strong violent verb; 'tore it apart' preserves the brutality without
    sounding colloquial.
- source_word: φοράδα ἀγρίαν
  chosen: wild mare
  alternatives:
  - wild horse
  lexicon: LSJ
  rationale: φοράς/φοράδα refers specifically to a mare. The feminine specificity
    should be preserved where possible.
- source_word: πάρδαλις
  chosen: leopard
  alternatives:
  - panther
  lexicon: LSJ
  rationale: '''Leopard'' is the standard rendering and best known to readers.'
- source_word: κέρκος
  chosen: tail
  alternatives:
  - hindpart
  lexicon: LSJ
  rationale: The Greek plainly refers to the tail; the vivid detail should remain.
- source_word: ἀπηκόντισα
  chosen: flung
  alternatives:
  - hurled
  - cast like a javelin
  lexicon: LSJ
  rationale: The verb has the sense of hurling or darting. 'Flung' is concise and
    forceful; the javelin nuance is not necessary in the main text.
- source_word: ἐρράγη εἰς δύο
  chosen: was split in two
  alternatives:
  - was torn in two
  lexicon: LSJ
  rationale: A literal and vivid rendering of the result clause.
- source_word: βοῦν ἄγριον
  chosen: wild ox
  alternatives:
  - wild bull
  lexicon: LSJ
  rationale: Either is possible, but 'wild ox' is a broad and recognizable equivalent
    for a feral bovine in elevated narrative style.
- source_word: νεμόμενον
  chosen: grazing
  alternatives:
  - feeding
  - pasturing
  lexicon: LSJ
  rationale: The participle describes the animal feeding in the land; 'grazing' is
    the most natural English choice.
- source_word: συσσείσας
  chosen: shook it round and round
  alternatives:
  - whirled it about
  - shook violently
  lexicon: LSJ
  rationale: The compound verb intensifies the action. 'Shook it round and round'
    preserves the repeated circular force.
- source_word: σκοτίσας
  chosen: struck it blind
  alternatives:
  - blinded it
  - darkened it
  lexicon: LSJ
  rationale: In this violent-animal-combat context, the sense is practical blinding
    rather than metaphorical darkening. 'Struck it blind' keeps the physical force
    of the narrative.
