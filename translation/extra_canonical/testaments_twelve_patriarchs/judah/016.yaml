translation:
  text: '1. Guard yourselves, therefore, my children, against the limit of wine; for
    in it there are four evil spirits: desire, heated passion, wastefulness, and shameful
    greed.


    2. If you drink wine in gladness, be modest with the fear of God. For if, in your
    gladness, the fear of God departs, then drunkenness follows, and shamelessness
    slips in.


    3. But if you want to live with self-control, do not touch wine at all, lest you
    sin in words of insolence and in fights and in slanders and in transgressions
    of the commandments of God, and perish before your time.


    4. Wine also reveals the mysteries of God and of men, just as I too revealed the
    commandments of God and the mysteries of Jacob my father to the Canaanite woman—things
    that God told me not to reveal.


    5. And wine becomes the cause of war and turmoil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the measure of wine' or 'the boundary of wine'—the phrase likely warns
      against crossing wine's proper limit.
    reason: lexical_alternative
  - marker: b
    text: '''Evil spirits'' may function as personified vices or as more-than-metaphorical
      spiritual forces; the Greek leaves the texture intact.'
    reason: lexical_alternative
  - marker: c
    text: The confession recalls Judah's disclosure to the Canaanite woman of matters
      he says God had forbidden him to reveal.
    reason: cross_reference
lexical_decisions:
- source_word: ὅρος
  chosen: limit
  alternatives:
  - boundary
  - measure
  lexicon: LSJ
  rationale: The phrase τὸν ὅρον τοῦ οἴνου is unusual; 'limit of wine' preserves the
    concrete metaphor of a boundary/measure rather than flattening it to a generic
    warning against wine itself. In context it warns against crossing wine's proper
    bounds.
- source_word: πνεύματα πονηρά
  chosen: evil spirits
  alternatives:
  - evil impulses
  - wicked spirits
  lexicon: LSJ
  rationale: The Greek literally says 'evil spirits.' Because the testament uses moral-personified
    vice language, the literal rendering preserves the text's rhetorical force and
    possible quasi-demonic nuance better than psychologizing it as mere impulses.
- source_word: ἐπιθυμία
  chosen: desire
  alternatives:
  - lust
  - craving
  lexicon: LSJ
  rationale: A broad term here in a vice catalogue. 'Desire' keeps the scope wide;
    'lust' would narrow it too much to sexual desire.
- source_word: πύρωσις
  chosen: heated passion
  alternatives:
  - burning
  - inflaming
  lexicon: LSJ
  rationale: The term evokes burning or inflamed excitation. 'Heated passion' communicates
    the metaphor in readable English and fits the sequence of wine-driven vices.
- source_word: ἀσωτία
  chosen: wastefulness
  alternatives:
  - debauchery
  - dissipation
  lexicon: LSJ
  rationale: The word can denote reckless dissipation. 'Wastefulness' preserves the
    moral sense without importing later idiom; 'debauchery' is possible but slightly
    narrower and more sexualized.
- source_word: αἰσχροκερδία
  chosen: shameful greed
  alternatives:
  - base gain
  - dishonest profit
  lexicon: LSJ
  rationale: A compound of shame/base + gain. 'Shameful greed' is natural English
    and preserves the moral ugliness of profit-seeking driven by vice.
- source_word: αἰδούμενοι
  chosen: be modest
  alternatives:
  - be reverent
  - be restrained
  lexicon: LSJ
  rationale: The participle carries a sense of shamefastness/modesty. In context of
    drinking 'be modest' captures restrained conduct under God's fear.
- source_word: ἀναισχυντία
  chosen: shamelessness
  alternatives:
  - impudence
  - insolence
  lexicon: LSJ
  rationale: Direct opposite of shame/modesty in the previous clause; 'shamelessness'
    preserves the rhetorical contrast.
- source_word: σωφρόνως
  chosen: with self-control
  alternatives:
  - sensibly
  - temperately
  lexicon: LSJ
  rationale: The adverb denotes sober, disciplined living. 'With self-control' makes
    the ethical emphasis explicit and readable.
- source_word: ἐφάπτεσθε
  chosen: touch
  alternatives:
  - partake of
  - lay hold of
  lexicon: LSJ
  rationale: The Greek is vivid and strong. 'Do not touch wine at all' preserves the
    force of total abstention in this warning context.
- source_word: λόγοις ὕβρεως
  chosen: words of insolence
  alternatives:
  - abusive words
  - arrogant speech
  lexicon: LSJ
  rationale: ὕβρις is more than mere insult; it is overbearing, outrageous speech.
    'Words of insolence' keeps the elevated moral register.
- source_word: συκοφαντίαις
  chosen: slanders
  alternatives:
  - false accusations
  - malicious charges
  lexicon: LSJ
  rationale: The term can include false accusation/extortion, but in this vice list
    'slanders' is concise and contextually apt.
- source_word: οὐκ ἐν καιρῷ ὑμῶν
  chosen: before your time
  alternatives:
  - out of season
  - not at your appointed time
  lexicon: LSJ
  rationale: Idiomatic English equivalent preserving the sense of premature destruction.
- source_word: μυστήρια
  chosen: mysteries
  alternatives:
  - secret things
  - secrets
  lexicon: LSJ
  rationale: The testamentary/apocalyptic register favors 'mysteries,' which preserves
    the elevated tone and possible sacred nuance.
- source_word: ἀποκαλύπτει
  chosen: reveals
  alternatives:
  - unveils
  - discloses
  lexicon: LSJ
  rationale: A straightforward rendering that also echoes the repeated confession
    that Judah 'revealed' what should have remained hidden.
- source_word: ταραχή
  chosen: turmoil
  alternatives:
  - disturbance
  - disorder
  lexicon: LSJ
  rationale: Paired with πόλεμος, 'turmoil' gives a broad social-disruptive sense
    and preserves the parallelism.
