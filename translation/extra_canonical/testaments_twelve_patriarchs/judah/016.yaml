theological_decisions:
- issue: Whether πνεύματα πονηρά should be demythologized into psychological categories
  chosen_reading: Translated literally as 'evil spirits' while allowing the vice list
    to explain their moral expression.
  alternative_readings:
  - evil impulses
  - wicked tendencies
  rationale: The Greek witness uses spirit-language explicitly. The translation preserves
    that theological texture rather than resolving it into modern psychology.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Force of the prohibition in v.3
  chosen_reading: 'Rendered as total abstention: ''do not touch wine at all.'''
  alternative_readings:
  - do not overindulge in wine
  - do not cling to wine
  rationale: μηδ' ὅλως ... ἐφάπτεσθε is stronger than a mere moderation warning. The
    chapter's paraenetic urgency supports preserving the absolute form, even if rhetorically
    heightened.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
