translation:
  text: And the Lord gave me favor in all my works, whether in the hunt or in the
    house. I know that I ran down a hind and caught it, and I made it into food for
    my father, and he ate. And I would seize the gazelle in its course, and I overtook
    everything that was in the open fields. I killed the lion and snatched a kid from
    its mouth. I took hold of the bear by its foot and hurled it down the cliff, and
    it was crushed. I ran down the wild boar, and as I rushed upon it in my running,
    I tore it apart. I caught a wild mare and, after seizing it, subdued it. A leopard
    in Hebron sprang upon a dog, and I caught it by the tail and flung it against
    the rock, and it was split in two. I found a wild ox grazing through the land,
    and taking hold of its horns, I shook it round and round and struck it blind.
