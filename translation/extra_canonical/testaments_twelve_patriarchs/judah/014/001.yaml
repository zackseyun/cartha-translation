translation:
  text: 'These two things take away a man''s understanding. For if you drink wine
    to drunkenness, it throws your mind into turmoil with filthy thoughts, and heats
    your body toward pleasure for sexual immorality; and so it commits sin and is
    not ashamed.


    Such is the wine-drinker, my children, because the one who gets drunk has regard
    for no one. For see, it also led me astray, so that I was not ashamed before the
    multitude of the city. In the sight of all I turned aside to Tamar, and I committed
    a great sin, and I uncovered the covering of uncleanness of my sons.


    After drinking wine, I was not ashamed of the commandment of God, and I took a
    Canaanite woman. For the one who drinks wine, my children, has need of much understanding,
    and this is the understanding for drinking wine: as long as he still has shame,
    let him drink. But if he goes on until he passes the limit, a spirit of deception
    enters into his mind and makes the drunkard speak shamelessly and act lawlessly
    and feel no shame, but even boast in his dishonor and think it good.'
