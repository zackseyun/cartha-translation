translation:
  text: 'And now I command you, my children: hear Judah your father, and keep my words,
    with thoughts set on doing all the righteous requirements of the Lord and obeying
    the commands of God.


    I used to boast that in wars the face of a beautiful woman had not deceived me,
    and I reproached Reuben my brother concerning Bilhah, my father’s wife. But the
    spirit of jealousy and of sexual immorality arrayed themselves against me, until
    I sinned with Anan the Canaanite woman and with Tamar my daughter-in-law.


    For I said to my father-in-law, “I will consult my father, and then I will take
    your daughter.” But he was unwilling; instead, under the name of his daughter,
    he showed me an immeasurable abundance of gold, for he was a king. And he adorned
    her with gold and pearls, and made her pour wine for us at the banquet.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek opening is textually awkward; the sense is an exhortation to listen
      to Judah as father and to keep his words.
    reason: textual_variant
  - marker: b
    text: Bilhah is the woman associated with Reuben’s offense in Genesis 35:22.
    reason: cross_reference
  - marker: c
    text: The name 'Anan' reflects the Greek witness here; some interpreters connect
      the episode with Judah’s Canaanite marriage traditions in Genesis 38.
    reason: alternative_reading
  - marker: d
    text: '''Under the name of his daughter'' is a literal rendering of a difficult
      Greek phrase, likely meaning that the wealth was displayed in connection with
      the proposed marriage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντέλλομαι
  chosen: I command
  alternatives:
  - I charge
  - I instruct
  lexicon: BDAG
  rationale: Retains the strong testamentary and paternal force of the verb; weaker
    options soften the exhortational tone.
- source_word: φυλάξασθε
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: BDAG
  rationale: A standard ethical-testament term; 'keep' is idiomatic in English for
    preserving and obeying words/commands while still reflecting the Greek imperative.
- source_word: δικαιώματα
  chosen: righteous requirements
  alternatives:
  - ordinances
  - righteous decrees
  - statutes
  lexicon: BDAG
  rationale: Balances formal accuracy with readability; the phrase conveys concrete
    divine norms without sounding overly technical.
- source_word: ἐντολάς
  chosen: commands
  alternatives:
  - commandments
  - injunctions
  lexicon: BDAG
  rationale: Clear and natural modern English while preserving the authoritative divine
    sense.
- source_word: ἐγκαυχησάμενος
  chosen: I used to boast
  alternatives:
  - I boasted
  - I gloried
  lexicon: LSJ
  rationale: The imperfective sense in context points to Judah's former self-confident
    posture; 'used to boast' captures habitual pride.
- source_word: ἠπάτησέ
  chosen: had deceived
  alternatives:
  - had led astray
  - had beguiled
  lexicon: BDAG
  rationale: Expresses moral seduction without archaic diction; fits Judah’s claim
    that beauty had not misled him.
- source_word: εὐμόρφου
  chosen: beautiful
  alternatives:
  - fair
  - well-formed
  lexicon: LSJ
  rationale: Natural rendering of physical attractiveness in context.
- source_word: ὠνείδιζον
  chosen: I reproached
  alternatives:
  - I mocked
  - I reviled
  - I taunted
  lexicon: BDAG
  rationale: Conveys moral censure toward Reuben without overstating into abusive
    speech.
- source_word: πνεῦμα τοῦ ζήλου καὶ τῆς πορνείας
  chosen: the spirit of jealousy and of sexual immorality
  alternatives:
  - the spirit of envy and fornication
  - the spirit of zeal and whoredom
  lexicon: BDAG
  rationale: Preserves the personified vice-language central to the Testaments. 'Sexual
    immorality' is more accessible than 'fornication' while still morally weighty.
- source_word: παρετάξαντο
  chosen: arrayed themselves against me
  alternatives:
  - set themselves against me
  - marshaled themselves against me
  lexicon: LSJ
  rationale: Keeps the military metaphor vivid, fitting Judah’s warrior voice and
    the hostile assault of vice.
- source_word: συνετέλεσα
  chosen: I sinned with
  alternatives:
  - I was brought to completion with
  - I consummated with
  - I committed the act with
  lexicon: BDAG
  rationale: The Greek is difficult and euphemistic in context; 'I sinned with' makes
    the moral force explicit without over-specifying beyond the narrative.
- source_word: εἰς ὄνομα τῆς θυγατρὸς αὐτοῦ
  chosen: under the name of his daughter
  alternatives:
  - in connection with his daughter
  - as a dowry for his daughter
  lexicon: LSJ
  rationale: Reflects the somewhat awkward Greek transparently; likely indicates wealth
    displayed on the pretext of the daughter/marriage arrangement.
- source_word: χρυσοῦ πλῆθος ἄπειρον
  chosen: an immeasurable abundance of gold
  alternatives:
  - countless gold
  - an endless quantity of gold
  lexicon: BDAG
  rationale: Captures both the mass noun sense and the hyperbolic scale of the display.
- source_word: οἰνοχοεῖν
  chosen: pour wine
  alternatives:
  - serve wine
  - act as cupbearer
  lexicon: LSJ
  rationale: Idiomatic English for the banquet setting while preserving the concrete
    action that contributes to Judah’s temptation.
- source_word: δείπνῳ
  chosen: banquet
  alternatives:
  - dinner
  - feast
  lexicon: BDAG
  rationale: '''Banquet'' better matches the royal, luxurious setting than the more
    ordinary ''dinner''.'
