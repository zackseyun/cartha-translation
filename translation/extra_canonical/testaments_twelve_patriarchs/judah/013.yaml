theological_decisions:
- issue: Personified vice language
  chosen_reading: 'Translate πνεῦμα τοῦ ζήλου καὶ τῆς πορνείας as an active hostile
    force: ''the spirit of jealousy and of sexual immorality arrayed themselves against
    me.'''
  alternative_readings:
  - Treat 'spirit' as merely an inner disposition
  - Render more abstractly as 'jealousy and lust came over me'
  rationale: The Testaments frequently personify passions and spirits in moral conflict.
    Preserving that texture is important to the work’s theology and rhetoric.
  doctrine_reference: 'PHILOSOPHY.md: preserve the source text''s texture and do not
    flatten exhortational language.'
- issue: Moral explicitness of συνετέλεσα
  chosen_reading: Render the euphemistic clause as 'until I sinned with Anan... and
    with Tamar...'
  alternative_readings:
  - '''until I had relations with'''
  - '''until I consummated [the act] with'''
  rationale: The context is confessional and ethical, not merely descriptive. 'Sinned
    with' preserves Judah’s penitential framing and avoids euphemism that could obscure
    the moral point.
- issue: Divine law terminology
  chosen_reading: Differentiate δικαιώματα and ἐντολάς as 'righteous requirements'
    and 'commands.'
  alternative_readings:
  - Use 'statutes' and 'commandments'
  - Use 'ordinances' and 'commands'
  rationale: Maintains lexical distinction while keeping the English readable for
    modern audiences, in line with optimal equivalence.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception;
    readable modern English.'
