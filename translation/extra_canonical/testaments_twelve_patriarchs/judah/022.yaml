theological_decisions:
- issue: Meaning of τὸ σωτήριον τοῦ Ἰσραήλ
  chosen_reading: the salvation of Israel
  alternative_readings:
  - the deliverance of Israel
  - the Savior of Israel
  rationale: The Greek form most naturally denotes salvation/deliverance, but the
    phrase can carry messianic resonance in testamentary prophecy. The main text preserves
    the abstract noun without resolving the theological referent beyond the Greek
    wording.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve
    it
- issue: Force of συντελεσθήσεται ἡ βασιλεία μου ἐν ἀλλοφύλοις
  chosen_reading: my kingdom will be brought to its end among foreigners
  alternative_readings:
  - my kingdom will be completed among foreigners
  - my reign will be consummated among the nations
  rationale: The immediate context of divisions and wars favors a negative prophetic
    outcome rather than triumphant fulfillment. The translation therefore reflects
    termination, while noting the semantic possibility of completion/consummation.
  doctrine_reference: DOCTRINE.md § Original-language primacy over translation tradition
