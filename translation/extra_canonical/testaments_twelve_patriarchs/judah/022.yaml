translation:
  text: The Lord will bring divisions upon them against one another, and there will
    be continual wars in Israel. And my kingdom will be brought to its end among foreigners,
    until the salvation of Israel comes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'constant wars.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my kingdom will be completed among foreigners'; the Greek verb can denote
      completion as well as coming to an end.
    reason: lexical_alternative
  - marker: c
    text: Or 'the deliverance of Israel.' The phrase may also carry messianic resonance
      without explicitly naming a person.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐπάξει
  chosen: will bring
  alternatives:
  - will lead
  - will bring upon
  lexicon: LSJ
  rationale: Future of ἐπάγω here carries the sense of causing or bringing something
    upon a people. 'Will bring' is natural English while preserving divine agency.
- source_word: διαιρέσεις
  chosen: divisions
  alternatives:
  - dissensions
  - partings
  lexicon: LSJ
  rationale: The noun denotes internal splitting or factional division. 'Divisions'
    preserves the political-social force and fits the testamentary warning tone.
- source_word: κατ’ ἀλλήλων
  chosen: against one another
  alternatives:
  - among themselves
  - against each other
  lexicon: LSJ
  rationale: The phrase marks mutual hostility, not mere internal location. 'Against
    one another' makes the adversarial sense explicit.
- source_word: πόλεμοι συνεχεῖς
  chosen: continual wars
  alternatives:
  - unceasing wars
  - constant wars
  lexicon: LSJ
  rationale: συνεχεῖς intensifies the persistence of the conflicts. 'Continual wars'
    is elevated but readable and preserves the durative force.
- source_word: ἀλλοφύλοις
  chosen: foreigners
  alternatives:
  - foreign nations
  - the Philistines
  lexicon: LSJ
  rationale: Although ἀλλόφυλος can in some contexts refer specifically to Philistines,
    here the broader sense 'foreigners' or 'foreign nations' best fits the prophetic
    statement about rule ending outside Israel.
- source_word: συντελεσθήσεται
  chosen: will be brought to its end
  alternatives:
  - will be completed
  - will come to an end
  lexicon: LSJ
  rationale: The passive future of συντελέω can mean be completed or be brought to
    an end. In context of Judah's kingdom among foreigners, termination is more likely
    than fulfillment, so 'will be brought to its end' preserves the passive nuance
    and prophetic solemnity.
- source_word: ἡ βασιλεία μου
  chosen: my kingdom
  alternatives:
  - my kingship
  - my royal rule
  lexicon: LSJ
  rationale: βασιλεία can denote reign or kingdom. 'My kingdom' is the most straightforward
    and preserves Judah's dynastic voice.
- source_word: ἕως τοῦ ἐλθεῖν
  chosen: until ... comes
  alternatives:
  - until the coming of
  - until ... should come
  lexicon: LSJ
  rationale: The articular infinitive expresses a temporal limit. Rendering with a
    finite verb in English is idiomatic while preserving the temporal force.
- source_word: τὸ σωτήριον τοῦ Ἰσραήλ
  chosen: the salvation of Israel
  alternatives:
  - Israel's deliverance
  - the savior of Israel
  lexicon: LSJ
  rationale: σωτήριον is neuter and commonly denotes salvation or deliverance rather
    than a personal savior here. 'The salvation of Israel' preserves the lexical form
    and leaves open whether the phrase is eventive or person-associated in interpretation.
