translation:
  text: '1. And after these things Abraham and Isaac and Jacob will rise to life,
    and I and my brothers will be chiefs of the tribes in Israel: Levi first, I second,
    Joseph third, Benjamin fourth, Simeon fifth, Issachar sixth, and so all the rest
    in order.


    2. And the Lord blessed Levi, but the angel of the presence blessed me; the powers
    of glory, Simeon; heaven, Reuben; the earth, Issachar; the sea, Zebulun; the mountains,
    Joseph; the tent, Benjamin; the lights, Dan; delight, Naphtali; the sun, Gad;
    the moon, Asher.


    3. And you will be the Lord’s people, with one language, and there will not be
    there a spirit of Belial’s deceit, because it will be thrown into the fire forever.


    4. And those who died in sorrow will rise in joy, and the poor for the Lord’s
    sake will be made rich, and those dying for the Lord’s sake will awake to life.


    5. And the deer of Joseph will run in exultation, and the eagles of Israel will
    fly in joy, and all the peoples will glorify the Lord forever.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some witnesses read, 'there will not be among you a spirit of deceit, because
      unclean spirits will be thrown into eternal judgment.'
    reason: textual_variant
  - marker: b
    text: The Greek literally says 'chiefs of scepters'; the translation takes 'scepters'
      metonymically for tribal rulerships/tribes.
    reason: lexical_alternative
  - marker: c
    text: '''Angel of the presence'' echoes scriptural language for a high heavenly
      mediator and is translated literally.'
    reason: cross_reference
  - marker: d
    text: A variant form of verse 5 reads, 'the deer of Jacob will run, and the heifers
      of Israel will leap.'
    reason: textual_variant
  - marker: e
    text: Some witnesses add, 'but the ungodly will mourn and the sinners will weep,'
      before the final line of universal praise.
    reason: textual_variant
lexical_decisions:
- source_word: ἀναστήσεται ... εἰς ζωήν
  chosen: will rise to life
  alternatives:
  - will arise to life
  - will be raised to life
  lexicon: BDAG
  rationale: Kept resurrection language explicit and direct. The middle/future form
    is rendered simply as future active in English, preserving bodily-restoration
    force without over-specifying agency.
- source_word: ἔξαρχοι
  chosen: chiefs
  alternatives:
  - leaders
  - princes
  - rulers
  lexicon: LSJ
  rationale: Conveys preeminence and ordered leadership in a tribal setting without
    importing later monarchical terminology too strongly.
- source_word: σκήπτρων
  chosen: tribes
  alternatives:
  - scepters
  - ruling staffs
  lexicon: LSJ
  rationale: The literal word is 'scepters,' but in this context of ranked patriarchal
    descendants in Israel it functions metonymically for tribal rulerships/tribes.
    'Tribes' gives the sense in readable English while the lexical shift is documented
    here.
- source_word: ἄγγελος τοῦ προσώπου
  chosen: angel of the presence
  alternatives:
  - angel of his presence
  - presence-angel
  lexicon: LSJ
  rationale: A transparent rendering of the phrase, preserving its exalted and possibly
    scriptural resonance rather than paraphrasing it away.
- source_word: δυνάμεις τῆς δόξης
  chosen: powers of glory
  alternatives:
  - glorious powers
  - powers of the glory
  lexicon: LSJ
  rationale: Retains the somewhat mysterious heavenly idiom of the Greek instead of
    resolving it into a more interpretive phrase.
- source_word: σκηνή
  chosen: tent
  alternatives:
  - tabernacle
  - dwelling
  lexicon: LSJ
  rationale: The Greek can suggest tent/tabernacle. 'Tent' preserves the concrete
    image and avoids over-reading a formal cultic reference, though that resonance
    may still be present.
- source_word: φωστῆρες
  chosen: lights
  alternatives:
  - luminaries
  - heavenly lights
  lexicon: LSJ
  rationale: Readable modern English that still evokes cosmic bodies or shining lights
    in the blessing sequence.
- source_word: τρυφή
  chosen: delight
  alternatives:
  - luxuriance
  - pleasure
  - abundance
  lexicon: LSJ
  rationale: The term is textually and semantically difficult here. 'Delight' preserves
    the positive abundance/pleasantness sense without forcing a moralized reading.
- source_word: γλῶσσα μία
  chosen: one language
  alternatives:
  - one tongue
  lexicon: BDAG
  rationale: Natural English for unified speech while preserving the Babel-reversal
    flavor of the phrase.
- source_word: πνεῦμα πλάνης τοῦ Βελίαρ
  chosen: a spirit of Belial’s deceit
  alternatives:
  - the spirit of error of Belial
  - a deceiving spirit of Belial
  lexicon: BDAG
  rationale: Preserves both the personal reference to Belial and the moral sense of
    πλάνη as deception/error.
- source_word: ἐμβληθήσεται ἐν πυρὶ εἰς τὸν αἰῶνα
  chosen: will be thrown into the fire forever
  alternatives:
  - will be cast into fire for eternity
  - will be hurled into the fire age-enduringly
  lexicon: BDAG
  rationale: Direct, forceful eschatological language suited to testamentary prophecy.
    'Forever' is the most natural rendering here.
- source_word: ἐν λύπῃ τελευτήσαντες
  chosen: those who died in sorrow
  alternatives:
  - those who came to their end in grief
  - those who died in affliction
  lexicon: BDAG
  rationale: Captures both death and the condition of sorrow without becoming wooden.
- source_word: διὰ Κύριον
  chosen: for the Lord’s sake
  alternatives:
  - because of the Lord
  - for the Lord
  lexicon: BDAG
  rationale: Makes the causal/devotional force clear in idiomatic English and keeps
    the repeated phrase stable across the verse.
- source_word: ἐξυπνισθήσονται εἰς ζωήν
  chosen: will awake to life
  alternatives:
  - will be awakened to life
  - will awake into life
  lexicon: LSJ
  rationale: Preserves the sleep-to-awakening metaphor for resurrection.
- source_word: ἔλαφοι Ἰωσήφ
  chosen: the deer of Joseph
  alternatives:
  - Joseph’s deer
  - the harts of Joseph
  lexicon: LSJ
  rationale: Retains the animal imagery as given rather than interpreting it away
    into a tribal metaphor.
- source_word: ἐν ἀγαλλιάσει
  chosen: in exultation
  alternatives:
  - with rejoicing
  - in glad exultation
  lexicon: BDAG
  rationale: Keeps elevated celebratory diction fitting the prophetic close.
- source_word: ἀετοὶ Ἰσραήλ
  chosen: the eagles of Israel
  alternatives:
  - Israel’s eagles
  lexicon: LSJ
  rationale: Preserves the vivid symbolic image and parallelism with 'the deer of
    Joseph.'
- source_word: δοξάσουσι τὸν Κύριον εἰς αἰῶνας
  chosen: will glorify the Lord forever
  alternatives:
  - will give glory to the Lord for the ages
  lexicon: BDAG
  rationale: Natural English that preserves the universal and enduring praise motif.
