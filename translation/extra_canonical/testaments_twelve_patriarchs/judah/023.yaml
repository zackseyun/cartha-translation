theological_decisions:
- issue: Opening prophetic line about the 'coming of the God of righteousness' and
    the scope of peace
  chosen_reading: Translated as a future advent of God resulting in rest for Jacob
    and extending to all the nations.
  alternative_readings:
  - until the presence of the righteous God, to quiet Jacob in peace and all the nations
  - until the coming of the God of justice, to give peace to Jacob and to all nations
  rationale: The Greek is compressed and somewhat awkward, but παρουσία strongly suggests
    advent language. The phrase is left broad rather than harmonized to later messianic
    formulas.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Occult terminology in the vice list
  chosen_reading: Rendered concretely as 'ventriloquists and omens and demons of deception,'
    without softening into generic superstition.
  alternative_readings:
  - mediums and divinations and deceiving spirits
  - necromancers and auguries and demons of error
  rationale: The testament warns against specific forbidden practices. Keeping the
    concrete terms preserves the Jewish ethical texture and avoids paraphrase.
  doctrine_reference: Original-language primacy over translation tradition.
