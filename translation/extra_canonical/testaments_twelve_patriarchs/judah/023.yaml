translation:
  text: 'Until the coming of the God of righteousness, who will give Jacob rest in
    peace, and all the nations. And he will preserve the might of my kingdom forever;
    for the Lord swore to me with an oath not to blot out the kingdom.


    Great indeed is my grief, my children, because of the acts of sexual immorality
    and sorceries that you will practice in the kingdom, following ventriloquists
    and omens and demons of deception. You will make your daughters musicians and
    prostitutes, and you will mingle in the abominations of the nations. Because of
    these things the Lord will bring upon you famine and pestilence, death and a sword
    of vengeance, siege, and the insults of enemies and friends. By foreigners my
    kingdom will be brought to its end.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presence' instead of 'coming' for παρουσία; the context, however, favors
      an awaited advent.
    reason: lexical_alternative
  - marker: b
    text: '''Ventriloquists'' translates the literal Greek term for ''belly-speakers,''
      used for spirit-mediums or necromantic practitioners.'
    reason: cultural_note
  - marker: c
    text: The Greek phrase 'musicians and public women' likely refers to daughters
      made into entertainers and prostitutes.
    reason: lexical_alternative
  - marker: d
    text: Several judgment details in this verse are textually uncertain or expanded
      in some witnesses, including phrases about an avenging sword and siege.
    reason: textual_variant
lexical_decisions:
- source_word: παρουσία
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In prophetic/testamentary context it denotes an awaited advent rather
    than mere abstract presence; 'coming' is idiomatic and preserves eschatological
    force.
- source_word: Θεοῦ τῆς δικαιοσύνης
  chosen: God of righteousness
  alternatives:
  - God of justice
  - righteous God
  lexicon: BDAG
  rationale: The genitive is best preserved directly. 'Righteousness' keeps the established
    theological term, while 'justice' remains a viable nuance.
- source_word: ἡσυχάσαι
  chosen: give ... rest
  alternatives:
  - quiet
  - cause ... to be at peace
  lexicon: LSJ
  rationale: The infinitive here expresses causing Jacob to be settled or at rest;
    'give Jacob rest in peace' is natural English and retains the calming sense.
- source_word: φυλάξει κράτος
  chosen: will preserve the might
  alternatives:
  - will guard the power
  - will keep the dominion
  lexicon: BDAG
  rationale: κράτος denotes strength or might; with φυλάσσω the sense is preserving
    royal power, not merely guarding it physically.
- source_word: ἐξαλεῖψαι
  chosen: to blot out
  alternatives:
  - to wipe away
  - to erase
  lexicon: BDAG
  rationale: Traditional but still clear rendering that fits covenantal/royal extinction
    language.
- source_word: ἀσελγείας
  chosen: acts of sexual immorality
  alternatives:
  - debaucheries
  - licentious acts
  lexicon: BDAG
  rationale: The term carries shameless sensual excess; this rendering is readable
    while keeping the sexual vice explicit.
- source_word: γοητείας
  chosen: sorceries
  alternatives:
  - magic arts
  - witchcraft
  lexicon: LSJ
  rationale: A straightforward rendering for illicit magical practice in a vice catalogue.
- source_word: ἐγγαστριμύθοις
  chosen: ventriloquists
  alternatives:
  - mediums
  - belly-speakers
  lexicon: LSJ
  rationale: Literally 'belly-speakers'; in ancient religious context it refers to
    spirit-mediums. Main text keeps the concrete Greek image, with the occult sense
    noted in rationale.
- source_word: κληδόσι
  chosen: omens
  alternatives:
  - auguries
  - portents
  lexicon: LSJ
  rationale: Refers to divinatory signs or chance utterances taken as signs; 'omens'
    is concise and accessible.
- source_word: δαίμοσι πλάνης
  chosen: demons of deception
  alternatives:
  - deceiving demons
  - spirits of delusion
  lexicon: BDAG
  rationale: The genitive likely expresses quality or effect; 'demons of deception'
    preserves the stark testamentary warning.
- source_word: μουσικὰς καὶ δημοσίας
  chosen: musicians and prostitutes
  alternatives:
  - female entertainers and public women
  - musicians and public women
  lexicon: LSJ
  rationale: δημοσίας likely means publicly available women, i.e. prostitutes. μουσικάς
    probably refers to women trained for entertainment. The pair suggests daughters
    made available in public performance and sexual exploitation.
- source_word: ἐπιμιγήσεσθε
  chosen: you will mingle
  alternatives:
  - you will mix yourselves
  - you will join yourselves
  lexicon: BDAG
  rationale: Keeps the metaphor of intermixing with foreign abominations without over-specifying
    sexual union alone.
- source_word: βδελύγμασιν ἐθνῶν
  chosen: the abominations of the nations
  alternatives:
  - the detestable practices of the Gentiles
  lexicon: BDAG
  rationale: A standard biblical phrase for idolatrous/impure practices; 'nations'
    fits the broader Jewish testament setting.
- source_word: λοιμόν
  chosen: pestilence
  alternatives:
  - plague
  lexicon: BDAG
  rationale: Pairs naturally with famine and death in judgment language; 'pestilence'
    preserves elevated register.
- source_word: ῥομφαίαν [ἐκδικοῦσαν]
  chosen: a sword of vengeance
  alternatives:
  - an avenging sword
  - the sword that executes vengeance
  lexicon: LSJ
  rationale: The bracketed participle intensifies the sword as an instrument of retribution;
    the chosen phrase is compact and forceful.
- source_word: ὀνειδισμούς
  chosen: the insults
  alternatives:
  - reproaches
  - taunts
  lexicon: BDAG
  rationale: Captures public shame and verbal disgrace; 'insults' is readable while
    retaining social dishonor.
- source_word: ἀλλοφύλοις συντελεσθήσεται
  chosen: By foreigners ... will be brought to its end
  alternatives:
  - will be finished off by foreigners
  - will be consummated among foreigners
  lexicon: LSJ
  rationale: The passive of συντελέω here is best taken as brought to completion/end,
    in context a disastrous end of the kingdom at foreign hands.
