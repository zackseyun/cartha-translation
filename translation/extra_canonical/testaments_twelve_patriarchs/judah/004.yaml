theological_decisions:
- issue: Nature of Judah's protection by the angel
  chosen_reading: Translate the vision straightforwardly as divine angelic protection
    accompanying Judah in battle.
  alternative_readings:
  - Treat 'angel of power' as a metaphor for courage or military fortune
  - Render more interpretively as 'a mighty angel protected me'
  rationale: The Greek witness presents a vision of an angelic being accompanying
    Judah. The translation preserves that supernatural claim without reduction or
    embellishment.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
