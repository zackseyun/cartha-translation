translation:
  text: '1. And after this there came to us a greater war toward the south than the
    one at Shechem; and when I had drawn up in battle with my brothers, we pursued
    a thousand men and killed two hundred of them, and four kings.

    2. And I went up upon the wall and killed their king.

    3. And so we set Hebron free and took all the captives.

    4. But the rest fled.

    5. Then my father Jacob killed Belisath, king of all the kings, a man giant in
    strength, twelve cubits high.

    6. And terror fell upon them, and they stopped making war against us.

    7. Therefore my father was without anxiety in the wars while I was with my brothers.

    8. For he saw in a vision concerning me that an angel of power went along with
    me in all things, so that no one might touch me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '4:5'
    text: The name Belisath is transliterated from a difficult Greek form; the underlying
      proper name is uncertain.
    reason: textual_variant
  - marker: '4:5'
    text: The phrase 'king of all the kings' is likely a heightened royal description
      in the Greek witness rather than a standard historical title.
    reason: cultural_note
  - marker: '4:8'
    text: Or 'accompanied me in everything.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραταξάμενος
  chosen: having drawn up in battle
  alternatives:
  - having arrayed myself
  - having taken my stand for battle
  lexicon: LSJ
  rationale: Military term for arranging forces in battle order; 'drawn up in battle'
    preserves the martial register without becoming wooden.
- source_word: ἐδιώξαμεν
  chosen: we pursued
  alternatives:
  - we chased
  - we drove back
  lexicon: LSJ
  rationale: The verb naturally denotes pursuit in battle. 'Pursued' fits the sequence
    before the killing and keeps the narrative force.
- source_word: ἀπεκτείναμεν
  chosen: we killed
  alternatives:
  - we slew
  lexicon: LSJ
  rationale: '''Killed'' is clear modern English; ''slew'' would sound archaic beyond
    the project''s stated style.'
- source_word: αἰχμαλωσίαν
  chosen: captives
  alternatives:
  - captivity
  - booty of captives
  lexicon: LSJ
  rationale: In this military context the phrase most naturally refers to persons
    taken captive rather than the abstract state of captivity.
- source_word: ἀνεῖλον
  chosen: killed
  alternatives:
  - struck down
  - slew
  lexicon: LSJ
  rationale: Consistent rendering for the repeated battle verb keeps the account plain
    and forceful.
- source_word: γίγαντα τῇ ἰσχύι
  chosen: a man giant in strength
  alternatives:
  - a giant in strength
  - a mighty giant
  lexicon: LSJ
  rationale: The Greek emphasizes extraordinary stature or force. This rendering preserves
    the appositional feel and the heightened heroic tone.
- source_word: πηχῶν δώδεκα
  chosen: twelve cubits high
  alternatives:
  - of twelve cubits
  - twelve cubits tall
  lexicon: LSJ
  rationale: The measurement is retained literally; 'high' makes explicit the implied
    dimension in idiomatic English.
- source_word: τρόμος
  chosen: terror
  alternatives:
  - fear
  - dread
  lexicon: LSJ
  rationale: A strong term is appropriate in a war setting where the enemy ceases
    hostilities.
- source_word: ἀμέριμνος
  chosen: without anxiety
  alternatives:
  - free from care
  - untroubled
  lexicon: LSJ
  rationale: The term denotes freedom from anxious care. 'Without anxiety' preserves
    the causal link to divine protection without sounding casual.
- source_word: ἐν ὁράματι
  chosen: in a vision
  alternatives:
  - in a visionary sight
  lexicon: LSJ
  rationale: Standard rendering for revelatory sight; concise and natural.
- source_word: ἄγγελος δυνάμεως
  chosen: an angel of power
  alternatives:
  - a mighty angel
  - an angelic power
  lexicon: LSJ
  rationale: The genitive is left transparent rather than interpreted away. 'Angel
    of power' preserves the text's elevated and somewhat enigmatic phrasing.
- source_word: συνέπεταί μοι
  chosen: went along with me
  alternatives:
  - accompanied me
  - was with me
  lexicon: LSJ
  rationale: The sense is accompanying or attending. 'Went along with me' keeps the
    personal, narrative tone while expressing ongoing presence.
- source_word: τοῦ μὴ ἅψασθαί μοι
  chosen: so that no one might touch me
  alternatives:
  - so that they might not lay a hand on me
  - to keep anyone from touching me
  lexicon: LSJ
  rationale: The idiom suggests hostile contact or harm. 'Touch me' is literal, with
    the protective force clear from context.
