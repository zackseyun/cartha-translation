translation:
  text: 'And now I command you, my children: hear Judah your father, and keep my words,
    with thoughts set on doing all the righteous requirements of the Lord and obeying
    the commands of God.


    I used to boast that in wars the face of a beautiful woman had not deceived me,
    and I reproached Reuben my brother concerning Bilhah, my father’s wife. But the
    spirit of jealousy and of sexual immorality arrayed themselves against me, until
    I sinned with Anan the Canaanite woman and with Tamar my daughter-in-law.


    For I said to my father-in-law, “I will consult my father, and then I will take
    your daughter.” But he was unwilling; instead, under the name of his daughter,
    he showed me an immeasurable abundance of gold, for he was a king. And he adorned
    her with gold and pearls, and made her pour wine for us at the banquet.'
