theological_decisions:
- issue: Rendering κύριος in Leah's naming statement
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The speaker refers to Israel's God in a praise formula. Following project
    doctrine, κύριος as divine title is rendered 'the Lord.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Force of Judah's self-description ὀξὺς in youth
  chosen_reading: keen
  alternative_readings:
  - sharp
  - quick
  - eager
  rationale: The term is somewhat broad and could suggest quickness, vigor, or sharpness.
    'Keen' preserves the positive, energetic self-portrait without over-specifying
    a trait.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
