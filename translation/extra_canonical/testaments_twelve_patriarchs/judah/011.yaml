translation:
  text: 1 And I knew that the race of the Canaanites was evil, but the impulse of
    youth blinded my understanding. 2 And when I saw her pouring wine, I was deceived,
    and I took her, though my father had not taken counsel about it. 3 But while I
    was away, she went and took for Shelah a wife from Canaan. 4 And when I learned
    what she had done, I cursed her in the anguish of my soul. 5 And indeed she died
    in her wickedness, with her children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the stock of the Canaanites was wicked.' The Greek γένος refers to lineage
      or people-group.
    reason: lexical_alternative
  - marker: b
    text: '''I took her'' likely carries the sense ''I took her as wife,'' but the
      Greek wording is more abrupt.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'my father had not taken counsel about it' may also be understood
      as acting without Jacob's advice or approval.
    reason: alternative_reading
lexical_decisions:
- source_word: πονηρὸν γένος
  chosen: the race ... was evil
  alternatives:
  - the stock ... was wicked
  - the people ... were evil
  lexicon: LSJ
  rationale: γένος denotes lineage, stock, or people-group. 'Race' here preserves
    the ancient sense of kin-group/descent rather than modern biological categories;
    'evil' keeps the moral force of πονηρός.
- source_word: διαβούλιον τῆς νεότητος
  chosen: the impulse of youth
  alternatives:
  - the counsel of youth
  - the scheme of youth
  - youthful deliberation
  lexicon: LSJ
  rationale: Though διαβούλιον can denote counsel or plan, in context Judah is confessing
    rash youthful drive that overruled judgment. 'Impulse of youth' captures that
    force without over-paraphrasing.
- source_word: ἐτύφλωσε τὴν διάνοιάν μου
  chosen: blinded my understanding
  alternatives:
  - blinded my mind
  - blinded my insight
  lexicon: BDAG
  rationale: διάνοια is the faculty of understanding or thought. 'Understanding' reads
    naturally in English while preserving the image of moral-intellectual blindness.
- source_word: οἰνοχοοῦσαν
  chosen: pouring wine
  alternatives:
  - serving wine
  - acting as cupbearer
  lexicon: LSJ
  rationale: The participle refers to serving/pouring wine. 'Pouring wine' is concrete
    and fits the scene better than the more formal 'acting as cupbearer.'
- source_word: ἠπατήθην
  chosen: I was deceived
  alternatives:
  - I was led astray
  - I was beguiled
  lexicon: BDAG
  rationale: The passive keeps Judah's confession of being misled without softening
    his responsibility.
- source_word: ἔλαβον αὐτὴν
  chosen: I took her
  alternatives:
  - I married her
  - I took her as wife
  lexicon: LSJ
  rationale: λαμβάνω with a woman can imply taking in marriage, but the Greek is terser.
    'I took her' preserves the bluntness; the marital sense is clear from context.
- source_word: μὴ βουλευσαμένου τοῦ πατρός μου
  chosen: though my father had not taken counsel about it
  alternatives:
  - without my father's consent
  - my father not having advised it
  lexicon: LSJ
  rationale: The genitive absolute literally refers to the father not having deliberated/counseled.
    This keeps the testamentary emphasis on acting without paternal guidance, rather
    than reducing it merely to legal consent.
- source_word: ἀπόντος ἐμοῦ
  chosen: while I was away
  alternatives:
  - in my absence
  - when I was absent
  lexicon: LSJ
  rationale: A natural rendering of the genitive absolute that preserves the narrative
    flow.
- source_word: ἔλαβε τῷ Σηλὼμ γυναῖκα
  chosen: took for Shelah a wife
  alternatives:
  - got a wife for Shelah
  - procured a wife for Shelah
  lexicon: LSJ
  rationale: The idiom means to obtain/arrange a wife for someone. 'Took for Shelah
    a wife' stays close to the Greek and retains the patriarchal register.
- source_word: ἐκ τῆς Χανάαν
  chosen: from Canaan
  alternatives:
  - from the Canaanites
  - out of the land of Canaan
  lexicon: LSJ
  rationale: The phrase may denote origin from the land/people. 'From Canaan' is concise
    and leaves the ethnic-geographic overlap intact.
- source_word: κατηρασάμην αὐτὴν
  chosen: I cursed her
  alternatives:
  - I pronounced a curse on her
  lexicon: BDAG
  rationale: The middle verb is forceful and direct; the simple English preserves
    Judah's severe response.
- source_word: ἐν ὀδύνῃ ψυχῆς μου
  chosen: in the anguish of my soul
  alternatives:
  - in the pain of my soul
  - in soul-agony
  lexicon: LSJ
  rationale: This preserves the emotional and testamentary gravity of ὀδύνη plus ψυχή.
- source_word: ἐν τῇ πονηρίᾳ αὐτῆς
  chosen: in her wickedness
  alternatives:
  - in her evil
  - in her depravity
  lexicon: BDAG
  rationale: πονρία/πονηρία language should remain morally weighty and stable. 'Wickedness'
    is idiomatic and strong.
