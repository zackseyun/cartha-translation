theological_decisions:
- issue: Ethnic-moral statement about the Canaanites
  chosen_reading: 'Translate the Greek statement directly: ''the race of the Canaanites
    was evil,'' without softening it into a merely individual judgment.'
  alternative_readings:
  - the Canaanite people were corrupt
  - that Canaanite line was wicked
  rationale: The Greek makes a sweeping ancestral/collective moral claim characteristic
    of the testament's rhetoric. Transparency requires rendering it honestly while
    not importing modern racial theory into the wording beyond the ancient kin-group
    sense of γένος.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
- issue: Marital force of ἔλαβον αὐτήν
  chosen_reading: Keep the blunt 'I took her' in the main text rather than explicitly
    'I married her.'
  alternative_readings:
  - I married her
  - I took her as wife
  rationale: The Greek is terse and confessional. The broader context implies marriage,
    but the main text should preserve the source's abruptness; the lexical note records
    the marital nuance.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
