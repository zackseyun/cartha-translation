theological_decisions:
- issue: Final exhortation's covenantal emphasis
  chosen_reading: Rendered νόμος Κυρίου and commandments language straightforwardly
    as covenant obedience to the Lord.
  alternative_readings:
  - Generalized ethical instruction without covenantal coloring
  rationale: The testament genre closes with explicit moral exhortation rooted in
    the Lord's law; flattening this into generic morality would lose the text's theological
    frame.
  doctrine_reference: DOCTRINE.md §§ Translation philosophy 1, 4
- issue: Death formula
  chosen_reading: Retained 'fell asleep' rather than replacing with 'died.'
  alternative_readings:
  - died
  rationale: The euphemistic formula is part of the literary and theological texture
    of patriarchal/testamentary narrative and should remain visible in translation.
  doctrine_reference: PHILOSOPHY.md transparency and source-anchoring principles
