translation:
  text: 'Therefore keep, my children, the whole law of the Lord, for it is hope for
    all who keep his ways in righteousness. And bury me near my fathers.


    And he fell asleep in a good old age. And his sons did as he had commanded them,
    and they carried him up to Hebron and buried him there with his fathers.


    And if you walk in holiness according to all the commandments of the Lord, you
    will again dwell securely with me, and all Israel will be gathered to the Lord
    forever.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Fell asleep'' is a conventional ancient euphemism for death, preserved
      here to retain the testamentary register.'
    reason: lexical_alternative
  - marker: b
    text: 'The closing line has an eschatological tone: obedience to the Lord''s commandments
      is linked with secure dwelling and Israel''s final gathering to the Lord.'
    reason: cross_reference
lexical_decisions:
- source_word: Φυλάξατε
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: LSJ
  rationale: Imperatival exhortation in testamentary style; 'keep' is idiomatic for
    commandments/law in biblical English while preserving the force of careful observance.
- source_word: τέκνα μου
  chosen: my children
  alternatives:
  - my sons
  lexicon: LSJ
  rationale: Direct familial address is preserved. 'Children' can include the broader
    filial audience of descendants, though 'sons' remains possible.
- source_word: πάντα τὸν νόμον Κυρίου
  chosen: the whole law of the Lord
  alternatives:
  - all the law of the Lord
  - every law of the Lord
  lexicon: LSJ
  rationale: The phrase stresses totality; 'the whole law' communicates comprehensive
    covenant obedience without sounding wooden.
- source_word: ἐλπίς
  chosen: hope
  alternatives:
  - confidence
  - expectation
  lexicon: LSJ
  rationale: Retains the theological and paraenetic force of the noun in an exhortational
    context.
- source_word: κοιμηθῆναι / ἐκοιμήθη
  chosen: fell asleep
  alternatives:
  - died
  - was laid to rest
  lexicon: LSJ
  rationale: Traditional euphemism for death is common in Jewish and early Christian
    literature; preserving it maintains the testamentary register.
- source_word: γήρᾳ καλῇ
  chosen: in a good old age
  alternatives:
  - at a ripe old age
  - in honorable old age
  lexicon: LSJ
  rationale: Echoes biblical burial/death formulae and preserves elevated style.
- source_word: ἁγιωσύνη
  chosen: holiness
  alternatives:
  - sanctity
  lexicon: LSJ
  rationale: Standard rendering that preserves ethical-religious force in exhortation.
- source_word: ἐντολαί
  chosen: commandments
  alternatives:
  - commands
  lexicon: LSJ
  rationale: '''Commandments'' better matches covenantal and testamentary diction
    than the flatter ''commands''.'
- source_word: συναχθήσεται
  chosen: will be gathered
  alternatives:
  - will be assembled
  lexicon: LSJ
  rationale: Preserves biblical resonance, especially in eschatological or patriarchal
    contexts.
