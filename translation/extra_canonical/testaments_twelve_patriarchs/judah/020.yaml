theological_decisions:
- issue: Moral anthropology of 'two spirits'
  chosen_reading: The chapter is translated as presenting two real moral-spiritual
    agencies—truth and deceit—with an inner conscience between them.
  alternative_readings:
  - purely psychological tendencies
  - angelic/demonic beings in a strict ontological sense
  rationale: The Greek uses πνεύματα and frames the passage in paraenetic, moral terms.
    The translation preserves the spiritual language without forcing a later systematic
    interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Judah's claim to have acted 'in ignorance'
  chosen_reading: Retained plainly alongside his confession of sin.
  alternative_readings:
  - softened to 'without realizing it'
  - omitted as exculpatory
  rationale: The Greek explicitly holds together culpability, blindness, and mercy.
    The translation preserves that tension rather than harmonizing it away.
  doctrine_reference: Preserve theological tension rather than resolve it.
