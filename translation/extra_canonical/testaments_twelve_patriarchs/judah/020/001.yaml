translation:
  text: '1. For it leads astray, because in the delusion of silver they call those
    who are not gods by the name of gods, and it makes the one who has it fall into
    frenzy. 2. Because of silver I lost my children, my sons; and if my repentance
    and my humiliation, and the prayers of my father, had not come to my aid, I would
    have died childless. 3. But the God of my fathers had mercy on me, because I did
    this in ignorance. 4. For the ruler of deceit blinded me, and I was ignorant as
    a man, and, as flesh corrupted in sins, I recognized my own weakness, thinking
    myself invincible.


    5. Understand, then, my children, that two spirits attend a man: the spirit of
    truth and the spirit of deceit. 6. And between them is the conscience of the mind,
    to which it may incline as it wills. 7. The works of truth and the works of deceit
    are written upon the breast of a man, and the Lord knows each one of them. 8.
    And there is no time when the works of men can escape his notice, for they are
    inscribed before the Lord upon the breast. 9. And the spirit of truth testifies
    against all things, and the sinner is burned up by his own heart, and cannot lift
    up his face to the judge.'
