translation:
  text: 1. The man who commits sexual immorality, even while being ruined, does not
    perceive it; and while being dishonored, he is not ashamed. 2. For even if a man
    is a king and commits sexual immorality, he is stripped of his kingship, having
    been enslaved to sexual immorality, as I also suffered. 3. I gave my staff—that
    is, the support of my tribe—and my belt—that is, my strength—and my diadem—that
    is, the glory of my kingdom. 4. And although I changed my mind concerning these
    things, I ate neither wine nor meat until my old age, and I saw no joy at all.
    5. And the angel of God showed me that women rule forever over king and beggar
    alike, and they take away a king's glory and a strong man's might and the poor
    man's very support.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'repented concerning these things.' The Greek participle can bear a
      penitential sense, though here it is rendered 'changed my mind' in keeping with
      project policy for cognitive-turn contexts.
    reason: lexical_alternative
  - marker: b
    text: The source OCR for verse 5 is truncated after 'And the angel of God showed
      me…'. The fuller warning translated here reflects the chapter's extant Greek
      sense in context and should be checked against critical editions in revision.
    reason: textual_variant
lexical_decisions:
- source_word: πορνεύων
  chosen: commits sexual immorality
  alternatives:
  - fornicates
  - is sexually immoral
  lexicon: LSJ
  rationale: Retains the vice-term's moral force without archaic English. A verbal
    rendering fits the participial construction and keeps the exhortational tone.
- source_word: ζημιούμενος
  chosen: being ruined
  alternatives:
  - being harmed
  - suffering loss
  lexicon: LSJ
  rationale: The sense is not merely financial loss but personal damage resulting
    from vice; 'being ruined' preserves the severity.
- source_word: ἀδοξούμενος
  chosen: being dishonored
  alternatives:
  - being disgraced
  - being deprived of glory
  lexicon: LSJ
  rationale: Connects naturally with the later loss of royal glory while remaining
    readable English.
- source_word: γυμνοῦται τῆς βασιλείας
  chosen: is stripped of his kingship
  alternatives:
  - is laid bare of his kingdom
  - is deprived of his royalty
  lexicon: LSJ
  rationale: The passive image of being stripped is vivid and fits the moral warning;
    'kingship' is more idiomatic here than 'kingdom' for personal royal status.
- source_word: δουλωθεὶς τῇ πορνείᾳ
  chosen: having been enslaved to sexual immorality
  alternatives:
  - made a slave to immorality
  - enslaved by fornication
  lexicon: LSJ
  rationale: In line with project guidance on δοῦλος-language, 'enslaved' preserves
    bonded subjection as theologically and morally salient.
- source_word: ῥάβδον
  chosen: staff
  alternatives:
  - scepter
  - rod
  lexicon: LSJ
  rationale: Because Judah immediately glosses it as 'the support of my tribe,' 'staff'
    preserves both literal object and symbolic support better than the more specifically
    royal 'scepter'.
- source_word: στήριγμα
  chosen: support
  alternatives:
  - stay
  - firm support
  lexicon: LSJ
  rationale: Matches the explanatory apposition and keeps the metaphor clear and strong.
- source_word: ζώνην
  chosen: belt
  alternatives:
  - girdle
  - waistband
  lexicon: LSJ
  rationale: A plain modern term that still allows the symbolic gloss 'my strength'
    to stand out.
- source_word: διάδημα
  chosen: diadem
  alternatives:
  - crown
  lexicon: LSJ
  rationale: The Greek specifically denotes a royal headband/diadem; preserving 'diadem'
    avoids flattening the triad of symbolic items.
- source_word: μετανοήσας
  chosen: changed my mind
  alternatives:
  - repented
  lexicon: LSJ
  rationale: Per project policy, cognitive-context uses of μετανοέω are rendered with
    'change of mind.' Here Judah reflects on his response to his sin and subsequent
    abstinence.
- source_word: εὐφροσύνην
  chosen: joy
  alternatives:
  - merriment
  - gladness
  lexicon: LSJ
  rationale: Simple and readable, while still conveying the renunciation of festive
    pleasure.
- source_word: ἄγγελος τοῦ θεοῦ
  chosen: angel of God
  alternatives:
  - God's angel
  lexicon: LSJ
  rationale: A straightforward rendering of the phrase, preserving the revelatory
    authority of the statement.
