theological_decisions:
- issue: Rendering μετανοήσας in Judah's penitential self-description
  chosen_reading: changed my mind
  alternative_readings:
  - repented
  rationale: The immediate context emphasizes Judah's altered course of life and abstinence
    after his sin. Following project policy, the cognitive-turn nuance is preserved
    in the main text, while the traditional penitential sense remains a viable alternative.
  doctrine_reference: 'DOCTRINE.md: μετανοέω → change of mind / repent by context'
- issue: Supplying the fuller sense of verse 5 from the Greek witness context
  chosen_reading: The angelic revelation states that women exercise dominion over
    every social rank and take away glory, strength, and support.
  alternative_readings:
  - A shorter reading ending simply with 'showed me the glory'
  - A more compressed statement without the rank-pairing king/beggar
  rationale: The OCR excerpt is visibly truncated at the end of v. 5, but the surviving
    wording and the chapter's argument strongly support the fuller admonitory statement
    traditionally associated with this verse. The translation preserves the warning's
    structure rather than leaving the sentence fragmentary.
  doctrine_reference: 'PHILOSOPHY.md: translate honestly from the witness and document
    textual complexity'
