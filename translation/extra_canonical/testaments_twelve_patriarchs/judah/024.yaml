translation:
  text: '1. He will pour out the spirit of the holy Father’s blessing upon him, and
    he himself will pour out a spirit of grace upon you.

    2. And you will be for him sons in truth, and you will walk in his commands, first
    and last.

    3. [This is the shoot of the Most High God, a spring for the life of all flesh.]

    4. Then the scepter of my kingdom will shine forth, and from your root a stem
    will arise.

    5. And from it will spring up a rod of righteousness for the nations, to judge
    and to save all who call upon the Lord.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '3'
    text: The line about the 'shoot of the Most High God' and the 'spring for the
      life of all flesh' is textually uncertain in the witness tradition and may reflect
      expansion; it is retained here because it stands in the Greek evidence provided.
    reason: textual_variant
  - marker: '5'
    text: Or 'a scepter of righteousness.' The Greek uses ῥάβδος here, distinct from
      the earlier σκῆπτρον ('scepter').
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκχέαι / ἐκχεεῖ
  chosen: pour out
  alternatives:
  - shed forth
  - bestow abundantly
  lexicon: LSJ
  rationale: The verb retains the prophetic, effusive imagery of divine outpouring.
    'Pour out' is idiomatic in English and preserves intertextual resonance with spirit
    language.
- source_word: πνεῦμα
  chosen: spirit
  alternatives:
  - Spirit
  - breath
  lexicon: BDAG
  rationale: Lowercase 'spirit' is used because the phrase describes a bestowed spirit
    of blessing/grace in this testamentary-prophetic context; capitalization would
    over-interpret the referent.
- source_word: εὐλογίαν πατρὸς ἁγίου
  chosen: the holy Father’s blessing
  alternatives:
  - blessing of the holy Father
  - a blessing from the holy Father
  lexicon: LSJ
  rationale: The genitive is rendered straightforwardly. This preserves the elevated
    register and keeps 'holy Father' as the source of the blessing rather than making
    the phrase adjectival to 'spirit'.
- source_word: πνεῦμα χάριτος
  chosen: a spirit of grace
  alternatives:
  - the spirit of grace
  - gracious spirit
  lexicon: BDAG
  rationale: The anarthrous phrase is best rendered indefinitely here. 'Grace' preserves
    the theological weight of χάρις without reducing it to mere favor.
- source_word: υἱούς ... ἐν ἀληθείᾳ
  chosen: sons in truth
  alternatives:
  - true sons
  - sons truly
  lexicon: BDAG
  rationale: This keeps the filial and covenantal tone of the Greek while preserving
    the adverbial force of ἐν ἀληθείᾳ. 'Sons' is retained rather than neutralizing
    kinship language.
- source_word: πορεύσεσθε
  chosen: you will walk
  alternatives:
  - you will go
  - you will conduct yourselves
  lexicon: BDAG
  rationale: '''Walk'' is the standard biblical idiom for moral conduct and fits the
    paraenetic tone better than the flatter ''go''.'
- source_word: προστάγμασιν
  chosen: commands
  alternatives:
  - ordinances
  - precepts
  lexicon: LSJ
  rationale: '''Commands'' is clear modern English and preserves the authoritative
    force of the term without sounding overly technical.'
- source_word: πρώτοις καὶ ἐσχάτοις
  chosen: first and last
  alternatives:
  - from first to last
  - earlier and later
  lexicon: LSJ
  rationale: The compact parallelism is preserved. It likely conveys comprehensiveness,
    and the literal rendering keeps the rhetorical force.
- source_word: βλαστός
  chosen: shoot
  alternatives:
  - branch
  - sprout
  lexicon: LSJ
  rationale: '''Shoot'' preserves the vegetal-messianic imagery and avoids importing
    later traditional capitalization or technical messianic terminology into the main
    text.'
- source_word: πηγή
  chosen: spring
  alternatives:
  - fountain
  - source
  lexicon: LSJ
  rationale: '''Spring'' is vivid and natural in English, fitting the life-giving
    metaphor.'
- source_word: σκῆπτρον
  chosen: scepter
  alternatives:
  - staff
  - rule
  lexicon: BDAG
  rationale: The royal symbol should remain concrete. 'Scepter' preserves the dynastic
    and regal imagery of Judah's prophecy.
- source_word: πυθμήν
  chosen: stem
  alternatives:
  - stock
  - trunk
  lexicon: LSJ
  rationale: The word denotes the base/stump-stock of a plant. 'Stem' reads naturally
    alongside 'root' and prepares for the following rod imagery.
- source_word: ῥάβδος δικαιοσύνης
  chosen: a rod of righteousness
  alternatives:
  - a scepter of righteousness
  - a staff of righteousness
  lexicon: BDAG
  rationale: Because σκῆπτρον already appears in the previous line, rendering ῥάβδος
    as 'rod' preserves lexical distinction while retaining royal/judicial overtones.
    'Righteousness' follows project defaults for δικαιοσύνη.
- source_word: ἔθνεσιν
  chosen: the nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: BDAG
  rationale: '''The nations'' is the most transparent rendering in Jewish prophetic
    diction and avoids prematurely narrowing the sense to ''Gentiles'' alone.'
- source_word: κρῖναι καὶ σῶσαι
  chosen: to judge and to save
  alternatives:
  - to govern and rescue
  - to vindicate and deliver
  lexicon: BDAG
  rationale: The infinitives are kept plain and weighty. This preserves the dual judicial
    and salvific role without interpretive expansion.
- source_word: τοὺς ἐπικαλουμένους τὸν Κύριον
  chosen: those who call upon the Lord
  alternatives:
  - those invoking the Lord
  - those who appeal to the Lord
  lexicon: BDAG
  rationale: This is standard biblical idiom in English and preserves the covenantal-religious
    sense of invocation.
