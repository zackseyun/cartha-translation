theological_decisions:
- issue: Messianic/royal imagery in the plant metaphors and royal symbols
  chosen_reading: Translate the imagery directly ('shoot,' 'scepter,' 'stem,' 'rod
    of righteousness') without inserting 'Messiah' into the main text.
  alternative_readings:
  - Explicitly identify the figure as the Messiah in the main text
  - Demythologize the language as merely dynastic succession
  rationale: The Greek witness uses evocative royal and vegetal imagery that strongly
    suggests an eschatological ruler, but the translation should preserve the source's
    imagery rather than resolve the identification beyond what the wording states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Bracketed line in verse 3 as likely secondary or textually uncertain
  chosen_reading: Include the line in brackets in the main translation and document
    its textual uncertainty in a footnote.
  alternative_readings:
  - Omit the line entirely
  - Print it without any signal of uncertainty
  rationale: The source presentation marks this material as textually complex. Transparency
    requires translating what is present while signaling uncertainty rather than silently
    harmonizing or suppressing it.
  doctrine_reference: 'PHILOSOPHY.md: translate honestly from the witness text and
    expose decisions for audit.'
