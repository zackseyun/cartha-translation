translation:
  text: '1. And when the two kings of the Canaanites came in armor against our flocks,
    with many people with them, I alone ran at one of the kings; and striking him
    on the shins, I dragged him down and so killed him.


    2. And the other king, Taphou, while he was sitting on his horse, I killed; and
    so I scattered all his people.


    3. And I found Achor, a giant of a man, shooting arrows. Leaping up, I took a
    stone of sixty litras and hurled it; I struck the horse and killed him.


    4. And after fighting with Achor for two hours, I killed him; and when I had cut
    his shield into two pieces, I hacked through his feet.


    5. And while I was stripping off his breastplate, behold, eight men, his companions,
    began to fight me.


    6. But I wrapped my garment around my arm and slung stones at them; four of them
    I killed, and the others fled.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek tradition in this chapter is textually tangled. Some witnesses
      vary in the names of the opponents, including forms such as Chora or Nachor,
      and some duplicate or rearrange parts of the combat narrative.
    reason: textual_variant
  - marker: b
    text: A litra was an ancient unit of weight. The text emphasizes the extraordinary
      size of the stone rather than giving a modern measurement.
    reason: cultural_note
  - marker: c
    text: 'Some manuscripts preserve a fuller ending to this verse: Judah kills four
      of the attackers, and the rest flee.'
    reason: textual_variant
lexical_decisions:
- source_word: τεθωρακισμένοι
  chosen: in armor
  alternatives:
  - armored
  - wearing breastplates
  lexicon: LSJ
  rationale: The participle denotes being equipped with armor. 'In armor' is idiomatic,
    elevated, and concise in narrative English.
- source_word: ποίμνια
  chosen: flocks
  alternatives:
  - sheepfolds
  - herds
  lexicon: LSJ
  rationale: The term refers to pastoral livestock under care. 'Flocks' fits the patriarchal
    setting and avoids over-specifying species.
- source_word: κνημίδες
  chosen: shins
  alternatives:
  - legs
  - greaves
  lexicon: LSJ
  rationale: The body-part sense best fits the immediate action of striking and pulling
    the king down. 'Greaves' would imply armor pieces rather than the bodily target.
- source_word: κατέσπασα
  chosen: I dragged him down
  alternatives:
  - pulled him down
  - brought him down
  lexicon: LSJ
  rationale: The verb suggests pulling down forcibly. 'Dragged him down' preserves
    the physicality of Judah's combat boast.
- source_word: ἀνεῖλον
  chosen: I killed
  alternatives:
  - slew
  - struck down
  lexicon: LSJ
  rationale: A standard narrative verb for killing. 'Killed' is clear modern English;
    'slew' would sound archaic beyond project style.
- source_word: διεσκόρπισα
  chosen: I scattered
  alternatives:
  - routed
  - dispersed
  lexicon: LSJ
  rationale: The verb literally means to scatter. 'Routed' is interpretive; 'scattered'
    preserves the image and military result.
- source_word: γίγαντα
  chosen: a giant
  alternatives:
  - a huge man
  lexicon: LSJ
  rationale: The text presents the opponent as extraordinary in size. 'Giant' preserves
    the heroic register of the testament.
- source_word: ἀνηλάμενος
  chosen: leaping up, I took
  alternatives:
  - springing up, I seized
  - having leapt, I took
  lexicon: LSJ
  rationale: The participle conveys a sudden springing movement in combat. The chosen
    rendering keeps the vivid sequence without over-literal stiffness.
- source_word: λίθον ἑξήκοντα λιτρῶν
  chosen: a stone of sixty litras
  alternatives:
  - a sixty-litra stone
  - a stone weighing sixty litras
  lexicon: LSJ
  rationale: Because the ancient weight unit is culturally specific and uncertain
    for modern readers, transliterating 'litras' preserves the source texture while
    remaining intelligible.
- source_word: ἀκοντίσας
  chosen: hurled it
  alternatives:
  - cast it like a javelin
  - threw it
  lexicon: LSJ
  rationale: The verb suggests hurling with force, even javelin-like. 'Hurled it'
    captures the martial force in natural English.
- source_word: ἐπὶ ὥρας δύο
  chosen: for two hours
  alternatives:
  - for about two hours
  lexicon: LSJ
  rationale: A straightforward temporal expression; the direct rendering suits the
    heroic narrative.
- source_word: εἰς δύο μέρη ποιήσας
  chosen: cut ... into two pieces
  alternatives:
  - split ... in two
  lexicon: LSJ
  rationale: The phrase indicates dividing into two parts. 'Cut ... into two pieces'
    keeps the violent concreteness of the scene.
- source_word: συνέκοψα τοὺς πόδας αὐτοῦ
  chosen: I hacked through his feet
  alternatives:
  - I cut off his feet
  - I mangled his legs
  lexicon: LSJ
  rationale: The compound verb is forceful and violent. 'Hacked through' preserves
    that brutality without claiming more precision than the Greek gives.
- source_word: ἐκδύειν ... τὸν θώρακα
  chosen: stripping off his breastplate
  alternatives:
  - taking off his armor
  - removing his cuirass
  lexicon: LSJ
  rationale: θώραξ here is specifically a breastplate or cuirass. 'Breastplate' is
    clear and preserves the martial detail.
- source_word: ἑταῖροι
  chosen: companions
  alternatives:
  - comrades
  - retainers
  lexicon: LSJ
  rationale: The word denotes associates or fighting companions. 'Companions' is broad
    enough and fits the narrative register.
- source_word: Ἐνειλήσας ... τὴν στολήν μου ἐπὶ τὴν χεῖρά μου
  chosen: I wrapped my garment around my arm
  alternatives:
  - I wound my cloak around my hand
  - I wrapped my robe over my arm
  lexicon: LSJ
  rationale: The action suggests using the garment defensively on the arm. 'Garment'
    is suitably general for στολή in this context.
- source_word: σφενδονήσας
  chosen: slung
  alternatives:
  - hurled with a sling
  - cast
  lexicon: LSJ
  rationale: The verb is specifically associated with sling action. 'Slung stones'
    is compact and vivid English.
