translation:
  text: 'And now, my children, behold, I am dying, and I tell you in truth: unless
    you guard yourselves from the spirit of falsehood and of anger, and love truth
    and long-suffering, you will perish. For anger is blindness, and it does not allow
    one to see the face of any man with truth. Even if it is a father or a mother,
    he behaves toward them as toward enemies; even if it is a brother, he does not
    recognize him; even if it is a prophet of the Lord, he disobeys him; even if it
    is a righteous man, he does not regard him; even if it is a friend, he does not
    acknowledge him. For the spirit of anger surrounds him with the nets of deceit,
    and blinds his eyes, and through falsehood darkens his mind, and gives him its
    own peculiar vision. And with what does it surround his eyes? With hatred of heart,
    so as to be envious of his brother. Anger is an evil thing, my children, because
    it troubles even the soul itself. And the body of the angry man it makes its own,
    and over his soul it gains mastery, and it bestows power on the body, so that
    it works every lawless deed. And when the body does all these things, the soul
    justifies what is done, because it does not see rightly. Therefore he who is wrathful,
    if he is a mighty man, has a threefold power in his anger: one from the help of
    his servants, and a second from his wealth, by which he persuades and overcomes
    unjustly, and a third, because he has his own natural power, and by it he works
    evil. And if the wrathful man is also poor, he has a twofold power of anger; for
    it always helps him toward wrongdoing. This spirit goes always with falsehood
    at the right hand of Satan, so that with cruelty and falsehood his works may be
    accomplished. Understand, therefore, the power of anger, that it is empty. For
    first it gives provocation by word; then by deeds it strengthens the one who is
    angry, and with sharp losses it disturbs his mind, and so it stirs up his soul
    with great wrath. Therefore, when anyone speaks against you, do not be moved to
    anger; and if anyone praises you as holy men, do not be exalted, either to delight
    or to disgust. For first it is pleasing to the hearing, and so the mind is stirred
    to perceive the grounds for provocation; and then, becoming angry, he thinks that
    he is justly angry. If you fall into any loss or ruin, my children, do not be
    distressed; for this very spirit makes a man desire what is perishable, in order
    that he may be angered through the distress. And if the loss comes willingly or
    unwillingly, do not be vexed; for from vexation false anger is born. Moreover,
    a twofold mischief is anger with falsehood; and they help one another to destroy
    the heart. And when the soul is continually disturbed, the Lord departs from it,
    and Beliar rules over it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spirit of deceit.' The Greek term can denote falsehood in speech
      or a broader deceitful quality.
    reason: lexical_alternative
  - marker: b
    text: '''Long-suffering'' could also be rendered ''forbearance'' or ''patience,''
      but the fuller term better preserves the ethical weight of the exhortation.'
    reason: lexical_alternative
  - marker: c
    text: Beliar is a traditional form of Belial in Jewish and early Christian literature.
    reason: cultural_note
lexical_decisions:
- source_word: πνεῦμα
  chosen: spirit
  alternatives:
  - disposition
  - influence
  lexicon: LSJ
  rationale: In this testamentary paraenetic context, πνεῦμα denotes an active moral/spiritual
    force rather than merely a mood. 'Spirit' preserves the text's moral-personal
    texture and its later association with Satan/Beliar.
- source_word: ψεύδους
  chosen: falsehood
  alternatives:
  - lie
  - deceit
  lexicon: LSJ
  rationale: '''Falsehood'' fits the abstract vice paired with anger and allows consistency
    when the chapter later speaks of deceitful distortion of perception. ''Lie'' is
    too narrow and event-specific.'
- source_word: θυμός
  chosen: anger
  alternatives:
  - wrath
  - rage
  lexicon: LSJ
  rationale: The chapter's dominant vice is θυμός. 'Anger' is the broadest readable
    rendering; 'wrath' appears in English text only where rhetorical intensity rises,
    but the core gloss remains stable.
- source_word: ἀλήθεια
  chosen: truth
  alternatives:
  - truthfulness
  lexicon: LSJ
  rationale: The contrast is between falsehood and truth as both moral quality and
    relational integrity. 'Truth' preserves the broader scope.
- source_word: μακροθυμία
  chosen: long-suffering
  alternatives:
  - patience
  - forbearance
  lexicon: LSJ
  rationale: The testament style favors a weightier ethical term than the flatter
    'patience.' 'Long-suffering' preserves moral endurance under provocation.
- source_word: δίκτυα
  chosen: nets
  alternatives:
  - snares
  lexicon: LSJ
  rationale: The image is of entanglement by deceit. 'Nets' is concrete and vivid;
    'snares' would also work but is less directly tied to the Greek noun.
- source_word: ἴδιον ὅρασιν
  chosen: its own peculiar vision
  alternatives:
  - its own way of seeing
  - its own appearance
  lexicon: LSJ
  rationale: The phrase suggests anger imposes a distorted perception. 'Peculiar vision'
    keeps the metaphor of sight while signaling subjectivity and distortion.
- source_word: φθονεῖν
  chosen: to be envious
  alternatives:
  - to envy
  lexicon: LSJ
  rationale: The infinitival sense in context describes the resulting disposition
    toward a brother. 'To be envious' reads naturally in English while preserving
    the vice term.
- source_word: ἀνομία
  chosen: lawless deed
  alternatives:
  - wickedness
  - transgression
  lexicon: LSJ
  rationale: The singular/plural ethical force points to acts contrary to divine order.
    'Lawless deed' preserves that moral-legal nuance better than generic 'wickedness.'
- source_word: κρατεῖ
  chosen: gains mastery
  alternatives:
  - rules
  - has power
  lexicon: LSJ
  rationale: The verb expresses dominating control over the soul. 'Gains mastery'
    captures the invasive, escalating force of anger.
- source_word: κενόν
  chosen: empty
  alternatives:
  - vain
  - hollow
  lexicon: LSJ
  rationale: Dan warns that anger's apparent power is ultimately futile and deceptive.
    'Empty' is direct and readable while retaining the moral judgment.
- source_word: παροξυσμός / παροξύνειν
  chosen: provocation
  alternatives:
  - irritation
  - incitement
  lexicon: LSJ
  rationale: The chapter describes anger's escalation from verbal stimulus to action.
    'Provocation' best captures both the trigger and the stirring-up effect.
- source_word: Βελιάρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: LSJ
  rationale: The Greek witness here uses the form Beliar in many editions/translations
    of this literature. We transliterate the form represented in the Greek testament
    tradition rather than normalize it.
