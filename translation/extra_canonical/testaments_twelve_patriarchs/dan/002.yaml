theological_decisions:
- issue: Moral-spiritual agency of anger and falsehood
  chosen_reading: Translate the vice language as active 'spirit' terminology rather
    than reducing it to mere psychology.
  alternative_readings:
  - Treat 'spirit' as simply 'attitude' or 'temper'
  rationale: The chapter personifies anger and falsehood, links them with Satan and
    Beliar, and describes them as ruling forces. The translation preserves this Second
    Temple moral cosmology without over-systematizing it.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy.
- issue: Reference to 'the Lord' departing from the soul
  chosen_reading: Retain 'the Lord departs from it' as stated.
  alternative_readings:
  - Paraphrase as loss of peace or moral clarity
  rationale: The Greek presents divine withdrawal in stark moral terms. Softening
    it into psychological language would flatten the theological warning.
- issue: Satan and Beliar in the same chapter
  chosen_reading: Translate both names distinctly as they appear.
  alternative_readings:
  - Harmonize Beliar with Satan or render one as a title of the other
  rationale: The text's transmitted wording uses both figures within its moral-apocalyptic
    framework. Transparency requires preserving the distinction in the witness rather
    than harmonizing.
