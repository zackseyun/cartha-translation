  text: Καὶ νῦν, τέκνα μου, ἰδοὺ¹ ἐγὼ ἀποθνῄσκω, καὶ ἐν ἀληθείᾳ λέγω ὑμῖν, ὅτι² ἐὰν³
    μὴ φυλάξητε⁴ ἑαυτοὺς ἀπὸ *τοῦ πνεύματος⁵ *τοῦ ψεύδους καὶ τοῦ θυμοῦ⁶, καὶ ἀγαπήσητε⁷
  language: Greek
  source_pages:
  - 202
