theological_decisions:
- issue: Identity of 'the angel who intercedes' / 'mediator between God and men'
  chosen_reading: Translated as an angelic intercessor within the chapter's own idiom,
    without identifying him beyond the Greek wording.
  alternative_readings:
  - A heavenly patron angel of Israel
  - A messianic figure
  - A later Christianized reference echoing 1 Timothy 2:5
  rationale: The Greek explicitly says 'angel' and then 'mediator between God and
    men.' To remain transparent, the translation preserves both claims without harmonizing
    them into later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Verse 6 statement about the Lord and a nation seeking his will
  chosen_reading: Rendered the difficult line as 'the Lord will not depart from them,
    but will pass over to a nation that does his will.'
  alternative_readings:
  - The Lord will depart from Israel and go to another nation
  - The subject of 'will pass over' is not the Lord but another implied figure
  rationale: The parenthetical negation in the source is textually awkward. The draft
    translates the normalized Greek as given while acknowledging the tension in a
    footnote.
  doctrine_reference: Translate what is in the Greek witness honestly, and use notes
    rather than silently harmonizing.
- issue: Bracketed clause in verse 9 about 'the Savior of the nations'
  chosen_reading: Included in brackets in the main text as likely secondary or interpolated
    material.
  alternative_readings:
  - Omit as non-original
  - Print without brackets as fully integral
  rationale: The clause has a distinctly expanded theological profile and is marked
    in the source presentation. Brackets preserve transparency while still translating
    the extant Greek witness.
  doctrine_reference: Be transparent around likely Christian interpolation or textual
    expansion.
