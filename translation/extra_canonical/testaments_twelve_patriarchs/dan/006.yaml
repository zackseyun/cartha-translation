translation:
  text: And now, my children, fear the Lord, and watch yourselves against Satan and
    his attendant spirits. Draw near to God and to the angel who intercedes for you,
    for he is a mediator between God and men, and for the peace of Israel he will
    stand against the kingdom of the enemy. Because of this the enemy is eager to
    trip up all who call on the Lord. For he knows that on the day when Israel turns
    back, the kingdom of the enemy will be brought to an end. For the very angel of
    peace will strengthen Israel, so that he may not fall into the uttermost evil.
    But in the time of the lawlessness of Israel, the Lord will not depart from them,
    but will pass over to a nation that does his will, for none of the angels will
    be equal to him. And his name will be in every place in Israel and among the nations.
    Keep yourselves, then, my children, from every evil work, and cast away from yourselves
    anger and falsehood, and love truth and patience. And what you have heard from
    your father, pass on also to your children. [So that the Savior of the nations
    may receive you; for he is true and patient, gentle and humble, and by his works
    he teaches the law of the Lord.] Therefore depart from all unrighteousness and
    cling to the righteousness of God, and your offspring will be for salvation forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[v9]'
    text: The bracketed sentence is often regarded as a later expansion or interpolation;
      it is translated here because it stands in the Greek witness provided.
    reason: textual_variant
  - marker: '[v6]'
    text: 'The Greek line is difficult: the text as given says the Lord ''will not
      depart from them'' and yet ''will pass over to a nation seeking his will.''
      The translation preserves this tension rather than smoothing it away.'
    reason: alternative_reading
  - marker: '[v2]'
    text: '''Mediator between God and men'' is translated directly from the Greek.
      The passage still speaks of an ''angel,'' so the wording is left unresolved
      rather than identified with a later doctrinal figure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβήθητε τὸν Κύριον
  chosen: fear the Lord
  alternatives:
  - revere the Lord
  lexicon: BDAG
  rationale: Retains the strong covenantal-exhortatory force of the imperative in
    testamentary speech; 'revere' is possible but weaker than the Greek moral warning.
- source_word: προσέχετε ἑαυτοῖς
  chosen: watch yourselves
  alternatives:
  - take heed to yourselves
  - be on guard
  lexicon: BDAG
  rationale: Readable modern English that preserves reflexive vigilance without flattening
    the imperative.
- source_word: τῶν πνευμάτων ... αὐτοῦ
  chosen: his attendant spirits
  alternatives:
  - his spirits
  - the spirits that accompany him
  lexicon: BDAG
  rationale: The damaged text points to spirits associated with Satan; 'attendant
    spirits' makes the relation explicit without overinterpreting their exact function.
- source_word: Ἐγγίσατε
  chosen: Draw near
  alternatives:
  - Come near
  lexicon: BDAG
  rationale: A standard biblical idiom for approaching God, preserving elevated register.
- source_word: τῷ ἀγγέλῳ ... παραιτουμένῳ ὑμᾶς
  chosen: the angel who intercedes for you
  alternatives:
  - the angel pleading for you
  - the angel appealing on your behalf
  lexicon: BDAG
  rationale: Given the following 'mediator between God and men,' the participle is
    best rendered in an intercessory sense.
- source_word: μεσίτης θεοῦ καὶ ἀνθρώπων
  chosen: a mediator between God and men
  alternatives:
  - mediator of God and men
  - go-between between God and humans
  lexicon: BDAG
  rationale: '''Mediator'' is the natural theological term and fits the explanatory
    clause; ''men'' here reflects generic ἀνθρώπων in elevated style.'
- source_word: κατέναντι τῆς βασιλείας ...
  chosen: stand against the kingdom of the enemy
  alternatives:
  - stand opposite the kingdom
  - take his stand over against the kingdom
  lexicon: LSJ
  rationale: Captures adversative stance in idiomatic English while preserving apocalyptic
    conflict imagery.
- source_word: ὑποσκελίζειν
  chosen: to trip up
  alternatives:
  - to overthrow
  - to cause to stumble
  lexicon: BDAG
  rationale: Vividly preserves the metaphor of causing a fall, fitting the enemy's
    hostile action.
- source_word: ἐπιστρέψει
  chosen: turns back
  alternatives:
  - returns
  - turns
  lexicon: BDAG
  rationale: In this moral-religious context the verb implies repentance/return; 'turns
    back' preserves that without importing later technical language.
- source_word: συντελεσθήσεται
  chosen: will be brought to an end
  alternatives:
  - will be completed
  - will be finished
  lexicon: BDAG
  rationale: In context of the enemy's kingdom, the sense is termination rather than
    fulfillment.
- source_word: ὁ πιστεύ- ἄγγελος τῆς εἰρήνης
  chosen: the very angel of peace
  alternatives:
  - the faithful angel of peace
  - the believing angel of peace
  lexicon: Charles 1908 apparatus / contextual reading
  rationale: The transmitted line is difficult; the sense clearly centers on 'angel
    of peace.' 'The very' gives emphasis without forcing a dubious adjective.
- source_word: μὴ ἐμπεσεῖν ... εἰς τέλος κακῶν
  chosen: so that he may not fall into the uttermost evil
  alternatives:
  - so as not to fall into the end of evils
  - so as not to be plunged into complete evil
  lexicon: LSJ
  rationale: Preserves the severe warning tone and the idiomatic force of εἰς τέλος
    as extremity/completion.
- source_word: ἐν καιρῷ τῆς ἀνομίας
  chosen: in the time of the lawlessness
  alternatives:
  - in the season of lawlessness
  - in the time of transgression
  lexicon: BDAG
  rationale: Keeps the weighty moral-apocalyptic term ἀνομία as 'lawlessness,' consistent
    with broader biblical usage.
- source_word: μετελεύσεται ἐπ᾿ ἔθνει ζητοῦντι τὸ θέλημα αὐτοῦ
  chosen: will pass over to a nation that does his will
  alternatives:
  - will come to a nation seeking his will
  - will transfer himself to a nation pursuing his will
  lexicon: LSJ
  rationale: The verb suggests movement/transfer; 'does his will' is smoother English
    for the participial phrase while preserving obedience emphasis.
- source_word: οὐδεὶς τῶν ἀγγέλων ἔσται ἴσος αὐτῷ
  chosen: none of the angels will be equal to him
  alternatives:
  - no angel will compare with him
  lexicon: BDAG
  rationale: Straightforward rendering of the comparative claim, preserving the exalted
    uniqueness of the referent.
- source_word: παντὶ τόπῳ
  chosen: every place
  alternatives:
  - every region
  - every locality
  lexicon: BDAG
  rationale: Keeps the broad universalizing language of the Greek.
- source_word: ἔργου πονηροῦ
  chosen: evil work
  alternatives:
  - wicked deed
  - evil practice
  lexicon: BDAG
  rationale: Maintains the singular collective expression and moral concreteness.
- source_word: τὸν θυμὸν καὶ τὸ ψεῦδος
  chosen: anger and falsehood
  alternatives:
  - wrath and lying
  - rage and deceit
  lexicon: BDAG
  rationale: Stable vice vocabulary; 'falsehood' is broader than a single lie and
    pairs well with 'truth' in the next clause.
- source_word: τὴν ἀλήθειαν καὶ τὴν μακροθυμίαν
  chosen: truth and patience
  alternatives:
  - truth and long-suffering
  - truth and forbearance
  lexicon: BDAG
  rationale: '''Patience'' is accessible modern English; the pairing preserves the
    virtue catalogue''s balance.'
- source_word: μετάδοτε
  chosen: pass on
  alternatives:
  - hand down
  - impart
  lexicon: BDAG
  rationale: Fits testamentary transmission from father to children and remains idiomatic.
- source_word: ὁ Σωτὴρ τῶν ἐθνῶν
  chosen: the Savior of the nations
  alternatives:
  - the savior of the Gentiles
  lexicon: BDAG
  rationale: ἔθνη can mean nations/Gentiles; 'nations' preserves broader scope and
    avoids prematurely narrowing the phrase.
- source_word: πρᾷος καὶ ταπεινός
  chosen: gentle and humble
  alternatives:
  - meek and lowly
  lexicon: BDAG
  rationale: Readable modern English that preserves the ethical portrait without archaizing.
- source_word: ἐκδιδάσκων ... τὸν νόμον Κυρίου
  chosen: by his works he teaches the law of the Lord
  alternatives:
  - teaching the law of the Lord through deeds
  lexicon: BDAG
  rationale: Preserves the instrumental phrase and the emphasis on embodied instruction.
- source_word: ἀδικίας
  chosen: unrighteousness
  alternatives:
  - injustice
  - wickedness
  lexicon: BDAG
  rationale: Chosen for consistency with δικαιοσύνη in the next clause.
- source_word: κολλήθητε τῇ δικαιοσύνῃ τοῦ Θεοῦ
  chosen: cling to the righteousness of God
  alternatives:
  - be joined to God's righteousness
  - hold fast to the righteousness of God
  lexicon: BDAG
  rationale: '''Cling to'' preserves the adhesive metaphor and the exhortational force.'
- source_word: ἕως τοῦ αἰῶνος
  chosen: forever
  alternatives:
  - unto the age
  - for the age
  lexicon: BDAG
  rationale: Idiomatic English for enduring duration in a blessing context.
