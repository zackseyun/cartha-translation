translation:
  text: 'Therefore the one who is angry, if he is physically strong, has his soul’s
    power for anger threefold: one from the help of attendants, by which he justifies
    the deed; a second through wealth, persuading and overpowering unjustly; and a
    third, because he has his own natural strength, by it he works evil.'
