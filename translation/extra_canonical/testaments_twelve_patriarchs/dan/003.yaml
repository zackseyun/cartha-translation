translation:
  text: 'If you lose truth and patience, you will perish.


    2 Anger is blindness, for it does not allow one to see anyone’s face in truth.
    3 Even if it is a father or a mother, it regards them as enemies. If it is a brother,
    it does not know him. If it is a prophet of the Lord, it disobeys him; if a righteous
    man, it does not notice him; if a friend, it does not recognize him. 4 For the
    spirit of anger wraps him in the net of deceit and blinds his eyes, and through
    falsehood it darkens his mind and gives him his own vision. 5 And with what does
    it veil his eyes? With hatred of heart against his brother, leading to envy.


    6 For anger is evil, my children, because it throws even the soul itself into
    turmoil. 7 And it gives power to the body, so that it may commit every lawless
    deed. 8 And when the body has done all these things, the soul justifies what has
    been done, because it does not see rightly. 9 Therefore the one who is angry,
    if he is physically strong, has his soul’s power for anger threefold: one from
    the help of attendants, by which he justifies the deed; a second through wealth,
    persuading and overpowering unjustly; and a third, because he has his own natural
    strength, by it he works evil. 10 But if the one who is angry is weak, he has
    the passion of wrath in him twofold, for anger always helps him toward wrongdoing.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'longsuffering' for 'patience' (μακροθυμία).
    reason: lexical_alternative
  - marker: b
    text: '''See anyone’s face in truth'' is a literal image for perceiving a person
      rightly.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'gives him his own vision' suggests that anger replaces reality
      with a self-generated, distorted perception.
    reason: lexical_alternative
  - marker: d
    text: The Greek distinguishes θυμός ('anger') and ὀργή ('wrath') in the latter
      part of the chapter; the English preserves some of that variation.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακροθυμία
  chosen: patience
  alternatives:
  - longsuffering
  - forbearance
  lexicon: LSJ
  rationale: In paraenetic exhortation, 'patience' is readable modern English while
    still carrying the sense of restrained endurance. 'Longsuffering' is more traditional
    but too archaic for the project style.
- source_word: τύφλωσις
  chosen: blindness
  alternatives:
  - blinding
  lexicon: LSJ
  rationale: Predicate noun fits the aphoristic statement 'Anger is blindness' and
    preserves the moral-metaphorical force.
- source_word: θυμός
  chosen: anger
  alternatives:
  - wrath
  - rage
  lexicon: LSJ
  rationale: Used consistently through the chapter for the vice under discussion.
    'Wrath' appears once for ὀργή to preserve some lexical distinction.
- source_word: ὁρᾶν πρόσωπόν τινος ἐν ἀληθείᾳ
  chosen: to see anyone’s face in truth
  alternatives:
  - to look on a person's face truly
  - to perceive anyone rightly
  lexicon: LSJ
  rationale: Keeps the concrete 'face' imagery from the Greek while allowing the idiom
    to communicate moral perception.
- source_word: προσέχει ὡς πολεμίοις
  chosen: regards them as enemies
  alternatives:
  - gives heed to them as to enemies
  - treats them like enemies
  lexicon: LSJ
  rationale: The idiom is rendered naturally in English without losing the hostile
    orientation implied by the Greek.
- source_word: παρακούει
  chosen: disobeys
  alternatives:
  - refuses to listen to
  - disregards
  lexicon: LSJ
  rationale: Strong enough for the moral warning and suitable when the object is 'a
    prophet of the Lord.'
- source_word: δίκτυον τῆς πλάνης
  chosen: the net of deceit
  alternatives:
  - the snare of error
  - the net of delusion
  lexicon: LSJ
  rationale: Retains the trapping metaphor. 'Deceit' fits the immediate context of
    falsehood and moral distortion.
- source_word: σκοτοῖ τὴν διάνοιαν
  chosen: darkens his mind
  alternatives:
  - obscures his understanding
  lexicon: LSJ
  rationale: Concrete and vivid, matching the blindness/darkness imagery running through
    the passage.
- source_word: τὴν ἰδίαν ὅρασιν παρέχει αὐτῷ
  chosen: gives him his own vision
  alternatives:
  - supplies him with his own way of seeing
  - sets before him his own appearance
  lexicon: LSJ
  rationale: Preserves the idea that anger substitutes a self-generated perception
    for reality.
- source_word: μίσει καρδίας
  chosen: hatred of heart
  alternatives:
  - heart-hatred
  - hatred in the heart
  lexicon: LSJ
  rationale: Keeps the genitival texture and the inward moral source of the vice.
- source_word: φθόνος
  chosen: envy
  alternatives:
  - jealousy
  lexicon: LSJ
  rationale: Standard vice-term in ethical lists; 'envy' is the more precise moral
    category here.
- source_word: ἐκταράσσει
  chosen: throws ... into turmoil
  alternatives:
  - disturbs greatly
  - agitates
  lexicon: LSJ
  rationale: Captures the intensive force and preserves the emotional violence of
    anger upon the soul.
- source_word: ἀνομία
  chosen: lawless deed
  alternatives:
  - wickedness
  - iniquity
  lexicon: LSJ
  rationale: '''Lawless'' preserves the lexical tie to ἀνομία and suits Jewish ethical
    discourse.'
- source_word: δικαιοῖ τὰ πραχθέντα
  chosen: justifies what has been done
  alternatives:
  - declares the deeds right
  lexicon: LSJ
  rationale: Maintains the moral-judicial sense that the soul rationalizes evil after
    the fact.
- source_word: ὑπουργούντων
  chosen: attendants
  alternatives:
  - helpers
  - subordinates
  lexicon: LSJ
  rationale: The context is social power assisting the strong angry man; 'attendants'
    conveys persons at his disposal without over-specifying status.
- source_word: πείθων καὶ νικῶν ἀδίκως
  chosen: persuading and overpowering unjustly
  alternatives:
  - prevailing unfairly by persuasion and force
  lexicon: LSJ
  rationale: Keeps both verbal ideas and the adverbial moral judgment. The pair reflects
    manipulative and coercive power.
- source_word: φυσικὴ δύναμις
  chosen: natural strength
  alternatives:
  - innate power
  lexicon: LSJ
  rationale: Clear modern rendering for inherent bodily capacity, contrasted with
    attendants and wealth.
- source_word: τὸ τῆς ὀργῆς πάθος
  chosen: the passion of wrath
  alternatives:
  - the passion of anger
  - wrathful passion
  lexicon: LSJ
  rationale: Here ὀργή is distinguished from θυμός; 'wrath' preserves some variation
    while keeping the vice-language elevated.
- source_word: παρανομία
  chosen: wrongdoing
  alternatives:
  - lawlessness
  - transgression
  lexicon: LSJ
  rationale: Readable and morally clear in the clause 'anger always helps him toward
    wrongdoing.'
