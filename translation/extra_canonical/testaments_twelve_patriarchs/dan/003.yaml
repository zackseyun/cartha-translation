theological_decisions:
- issue: κύριος in the phrase προφήτης Κυρίου
  chosen_reading: prophet of the Lord
  alternative_readings:
  - prophet of God
  rationale: The Greek explicitly has Κυρίου; following project defaults, this is
    translated 'Lord' rather than generalized to 'God.'
  doctrine_reference: 'DOCTRINE.md: translate titles; κύριος → Lord'
- issue: Moral psychology of anger in the chapter
  chosen_reading: Translate the text straightforwardly as ethical exhortation about
    anger’s blinding and empowering effects, without softening its near-personification
    of 'the spirit of anger.'
  alternative_readings:
  - Demythologize as mere metaphor for emotion
  - Heighten into a doctrine of an independent demonic being
  rationale: The Greek speaks of 'the spirit of anger' as an operative force. The
    translation preserves that language while not importing a more developed demonology
    than the text itself states.
