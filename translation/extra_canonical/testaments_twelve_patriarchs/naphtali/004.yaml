translation:
  text: These things I say to you, my children, because I learned from the writing
    of Enoch that you also will surely depart from the Lord, walking in every lawlessness
    of the nations and doing all the wickedness of Sodom. And the Lord will bring
    captivity upon you, and there you will serve your enemies and the land will be
    laid waste and your holy places will be desolate. And you will be scattered to
    the four corners of the earth, and you will be as something despised among the
    nations, a curse and a dispersion, until the Most High visits the earth. He himself
    will come, saving Israel and all the nations, God speaking in the person of man.
    And after he has entered, unrighteousness will again increase upon the earth,
    and all the nations will be gathered against him. But whoever believes in him
    shall not be condemned in his name. And you, my children, shall rise up from your
    tribes with Levi and Judah; and there shall be war among you. And the Lord will
    be seen among men, and he will save Israel and all the nations. Therefore do not
    be divided into two heads, because every division among brothers is evil in the
    sight of the Lord. For the Lord loves singleness of purpose. And if you also walk
    in singleness of purpose according to his law, my children, no evil spirit will
    have power over you. For he knows that the God of heaven is one, and he will not
    accept a divided mind. Love the Lord through all your life, and one another with
    a true heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''The writing of Enoch'' translates a phrase that may refer to an Enochic
      book or tradition; the wording does not by itself settle questions of canon.'
    reason: cultural_note
  - marker: b
    text: The wording 'God speaking in the person of man' reflects a difficult and
      theologically charged Greek phrase. Some readers take it as a strong messianic
      or incarnational statement; others regard the line as a later expansion in the
      textual tradition.
    reason: textual_variant
  - marker: c
    text: Or 'do not become double-minded' / 'do not split into two factions.' The
      Greek image is vivid and may point both to inward dividedness and to tribal
      schism.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνων
  chosen: I learned
  alternatives:
  - I knew
  - I came to know
  lexicon: LSJ
  rationale: In context with ἐν τῇ γραφῇ Ἐνώχ, the sense is knowledge gained from
    reading/witnessed tradition, so 'I learned' is more natural than the stative 'I
    knew' while remaining close to the Greek.
- source_word: γραφή
  chosen: writing
  alternatives:
  - book
  - scripture
  lexicon: LSJ
  rationale: The phrase ἐν τῇ γραφῇ Ἐνώχ refers to a written work associated with
    Enoch. 'Writing' preserves the reference without overstating canonical status
    by using 'Scripture'.
- source_word: ἀποστήσεσθε
  chosen: will surely depart
  alternatives:
  - will fall away
  - will apostatize
  lexicon: BDAG
  rationale: The verb denotes turning away from the Lord. 'Will surely depart' preserves
    the future warning and avoids importing later technical ecclesial language, while
    still conveying covenantal defection.
- source_word: ἀνομία
  chosen: lawlessness
  alternatives:
  - wickedness
  - iniquity
  lexicon: BDAG
  rationale: A key moral term in paraenetic literature; 'lawlessness' keeps the sense
    of rebellion against divine order rather than generic evil.
- source_word: πονηρία
  chosen: wickedness
  alternatives:
  - evil
  - depravity
  lexicon: BDAG
  rationale: Used here in parallel with Sodom; 'wickedness' is weighty and idiomatic
    without becoming overly interpretive.
- source_word: αἰχμαλωσία
  chosen: captivity
  alternatives:
  - exile
  - enslavement
  lexicon: LSJ
  rationale: The context is national judgment and deportation. 'Captivity' preserves
    the traditional exilic sense and fits the testamentary prophetic register.
- source_word: διασπορά
  chosen: dispersion
  alternatives:
  - scattering
  - diaspora
  lexicon: BDAG
  rationale: The noun carries both the act and condition of being scattered among
    the nations. 'Dispersion' is elevated but readable and preserves the exilic resonance.
- source_word: ἐπισκέψηται
  chosen: visits
  alternatives:
  - comes to
  - intervenes for
  lexicon: BDAG
  rationale: The verb can denote divine visitation for salvation or judgment. 'Visits'
    preserves the theological tension without resolving it too narrowly.
- source_word: ὁ ὕψιστος
  chosen: the Most High
  alternatives:
  - the Highest
  lexicon: BDAG
  rationale: Standard rendering that preserves Jewish scriptural diction.
- source_word: σῴζων
  chosen: saving
  alternatives:
  - to save
  - delivering
  lexicon: BDAG
  rationale: Rendered as a participial expression to preserve the Greek's portrayal
    of the coming one in active saving relation to Israel and the nations.
- source_word: θεὸς ἐν ἀνθρώπου σχηματι λαλήσας / equivalent phrase
  chosen: God speaking in the person of man
  alternatives:
  - God appearing as a man
  - God speaking through a man
  lexicon: LSJ
  rationale: The Greek tradition in this passage is textually and theologically difficult.
    This rendering preserves the incarnational-sounding wording of the witness without
    overdefining metaphysics beyond the text.
- source_word: πιστεύσῃ
  chosen: believes in him
  alternatives:
  - trusts him
  - has faith in him
  lexicon: BDAG
  rationale: '''Believes in him'' is the most direct and idiomatic rendering in this
    prophetic context; alternatives remain possible but are less natural here.'
- source_word: κατακριθήσεται
  chosen: shall not be condemned
  alternatives:
  - shall not be judged guilty
  - shall not incur sentence
  lexicon: BDAG
  rationale: The judicial force is important; 'condemned' is concise and theologically
    transparent.
- source_word: διγνωμία / divided expression
  chosen: divided into two heads
  alternatives:
  - double-minded
  - split into two factions
  lexicon: LSJ
  rationale: The chapter's exhortation turns on unity versus division. 'Divided into
    two heads' preserves the vivid metaphor, with the sense clarified by the following
    line about division among brothers.
- source_word: ἁπλότης
  chosen: singleness of purpose
  alternatives:
  - simplicity
  - single-heartedness
  lexicon: BDAG
  rationale: In Naphtali this virtue is thematic. 'Singleness of purpose' communicates
    moral integrity and undivided devotion better than the potentially misleading
    modern sense of 'simplicity'.
- source_word: πνεῦμα πονηρόν
  chosen: evil spirit
  alternatives:
  - wicked spirit
  lexicon: BDAG
  rationale: Straightforward rendering preserving the personal/spiritual dimension
    of the warning.
- source_word: καρδία ἀληθινή
  chosen: true heart
  alternatives:
  - sincere heart
  - faithful heart
  lexicon: LSJ
  rationale: Keeps the testamentary and biblical idiom of καρδία while expressing
    genuineness in covenant love.
