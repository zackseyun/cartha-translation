theological_decisions:
- issue: Use of Enoch as prophetic authority
  chosen_reading: Translated 'the writing of Enoch' without calling it Scripture.
  alternative_readings:
  - the book of Enoch
  - the Scripture of Enoch
  rationale: The Greek γραφή can mean writing or scripture, but the safer auditable
    choice in this broader-canon context is to preserve the literary reference without
    making a canonical claim the text itself need not require.
  doctrine_reference: Original-language primacy; preserve theological tension rather
    than resolve it.
- issue: Messianic / incarnational wording in the visitation passage
  chosen_reading: Retained the strong wording 'He himself will come ... God speaking
    in the person of man.'
  alternative_readings:
  - God will come as man
  - God will speak through a man
  - a later Christian interpolation should be softened
  rationale: The Greek witness should be translated honestly even where the wording
    may reflect later expansion or interpolation. The main text preserves the witness;
    the note flags textual/theological complexity rather than harmonizing it away.
  doctrine_reference: Translate what is in the Greek witness honestly, and use notes
    rather than silently harmonizing.
- issue: Universal scope of salvation language
  chosen_reading: Rendered 'saving Israel and all the nations.'
  alternative_readings:
  - saving Israel from all the nations
  - saving Israel and the Gentiles
  rationale: The phrase naturally reads as a dual object, Israel and the nations.
    This preserves the broad scope of the witness without narrowing it to a merely
    political deliverance.
- issue: Unity exhortation
  chosen_reading: Rendered the key virtue as 'singleness of purpose.'
  alternative_readings:
  - simplicity
  - single-heartedness
  rationale: Naphtali emphasizes undivided moral integrity. 'Singleness of purpose'
    best communicates the ethical and theological force for modern readers while remaining
    close to the Greek concept.
