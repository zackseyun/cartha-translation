theological_decisions:
- issue: Anthropology of body and spirit in vv. 2-4
  chosen_reading: The text teaches divine correspondence and ordering between body
    and spirit without requiring a later systematic body-soul dualism.
  alternative_readings:
  - A strongly dualistic anthropology
  - A purely physiological observation
  rationale: The potter analogy emphasizes proportion, capacity, and divine design.
    The translation preserves this tension without importing later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Moral dualism in 'law of the Lord' versus 'law of Beliar'
  chosen_reading: Translate the dualism directly as two opposed moral spheres of allegiance.
  alternative_readings:
  - '''custom of the Lord'' versus ''custom of worthlessness'''
  - demythologizing Beliar into abstract evil
  rationale: The Greek witness personifies Beliar as a named opposing power in testamentary
    paraenesis. The translation keeps the proper name and the stark ethical contrast.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension.
