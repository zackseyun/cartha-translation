translation:
  text: '1. I was swift on my feet like a deer, and my father Jacob appointed me for
    every errand; and he blessed me as though I were a deer.


    2. For just as the potter knows how much the vessel can hold, and according to
    that brings the clay for the work, so also the Lord, according to the likeness
    of the spirit, makes the body, and according to the body''s capacity places the
    spirit within it.


    3. And there is no deficiency in it, not even by a third of a hair; for by weight
    and measure and rule every creation was made.


    4. And just as the potter knows the use of each vessel, how much it is fit for,
    so also the Lord knows the body: how long it will endure in good, and when it
    comes into evil.


    5. For there is no purpose of his creation that the Lord does not know; for he
    created every human being in his own image.


    6. As a person''s strength is, so also is his work, whether in the law of the
    Lord or in the law of Beliar.


    7. And just as there is a division between light and darkness, between seeing
    and hearing, so there is also a division between man and man, and between woman
    and woman; and it is not possible to say that in all things one face is the same
    as another.


    8. For God made all things good in their order: the five senses in the head, and
    he joined the neck to the head; and he added hair for beauty, and the heart for
    understanding, the belly for excrement, the stomach for grinding, the windpipe
    for taking in air, the liver for anger, the gall for bitterness, the spleen for
    laughter, the kidneys for craftiness, the loins for strength, and the lungs for
    drawing in; and so the rest.


    9. So then, my children, let all your works be in order for good in the fear of
    God, and do nothing disorderly in contempt, nor outside its proper time.


    10. For if you say to the eye, “Hear,” it cannot; or to the ear, “See,” it cannot.


    11. In the same way, neither can you do the works of heaven on earth, nor the
    works of earth in heaven.


    12. For God made all things beautiful in their time. He gave the sun to rule the
    day, and the moon and stars to rule the night.


    13. Therefore, my children, recognize in your heart that as the sun is not the
    moon, so also the righteous are not the sinners, nor the sinners the righteous.


    14. But there is a difference in conduct and in understanding and in purpose.


    15. For the righteous man has understanding in all things, but the sinner walks
    in darkness and does not know what he does.


    16. Therefore be wise in God, my children, and understand the order of all things,
    each in its season, so that you may not transgress the law of the Lord or the
    law of Beliar by confusion.


    17. But rather choose the law of the Lord, and walk in simplicity and in the fear
    of God, doing what is good before him.


    18. If you do these things, my children, you will prosper in every work and in
    every counsel, and the Lord will bless you forever.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text at the start of the chapter is textually tangled in the OCR
      witness. The sense is that Naphtali describes himself as swift like a deer and
      therefore useful for carrying messages.
    reason: textual_variant
  - marker: b
    text: Verse 7 likely contrasts distinct faculties or functions; the transmitted
      Greek is unstable here. 'Seeing and hearing' fits the immediate argument from
      bodily members and senses.
    reason: textual_variant
  - marker: c
    text: 'Verse 8 contains a bodily-member catalogue preserved with textual disturbance.
      The translation follows the main sense of the list while keeping its paraenetic
      function: God ordered each part for its own role.'
    reason: textual_variant
  - marker: d
    text: Beliar is a traditional name in Jewish testamentary literature for the power
      opposed to God and his law.
    reason: cultural_note
lexical_decisions:
- source_word: κοῦφος ... τοῖς ποσίν ... ὡς ἡ ἔλαφος
  chosen: swift on my feet like a deer
  alternatives:
  - light-footed like a hind
  - fleet-footed like a deer
  lexicon: LSJ
  rationale: κοῦφος here carries the sense of light or nimble; with the comparison
    to ἔλαφος the idiomatic force is agility rather than mere lightness.
- source_word: ἀγγελία
  chosen: errand
  alternatives:
  - message
  - commission
  lexicon: LSJ
  rationale: In context Jacob appoints Naphtali for practical carrying of messages;
    'errand' preserves the concrete household/testament setting better than the more
    abstract 'message'.
- source_word: πρὸς ὁμοίωσιν τοῦ πνεύματος
  chosen: according to the likeness of the spirit
  alternatives:
  - in correspondence to the spirit's form
  - according to the pattern of the spirit
  lexicon: LSJ
  rationale: The phrase expresses correspondence between body and spirit. 'According
    to the likeness' keeps the comparative logic without overinterpreting anthropology.
- source_word: τῇ δυνάμει τοῦ σώματος τὸ πνεῦμα ἐπιτίθησιν
  chosen: according to the body's capacity places the spirit within it
  alternatives:
  - assigns the spirit according to the body's power
  - lays upon it the spirit according to bodily strength
  lexicon: LSJ
  rationale: ἐπιτίθησιν is literally 'places upon,' but idiomatic English here is
    'places within it.' δύναμις in this context is capacity or capability, not merely
    strength.
- source_word: σταθμῷ ... μέτρῳ ... κανόνι
  chosen: by weight and measure and rule
  alternatives:
  - by balance and measure and standard
  - by proportion and measure and rule
  lexicon: LSJ
  rationale: The triad emphasizes ordered creation. 'Rule' preserves κανών as standard/norm
    without flattening the rhetorical sequence.
- source_word: κτίσις
  chosen: creation
  alternatives:
  - creature
  - thing made
  lexicon: LSJ
  rationale: In this maxim about divine ordering, κτίσις is collective and cosmic
    rather than referring to one creature.
- source_word: διαρκέσει ἐν τῷ ἀγαθῷ
  chosen: will endure in good
  alternatives:
  - will continue in prosperity
  - will remain in well-being
  lexicon: LSJ
  rationale: The phrase is morally and existentially broad; 'in good' preserves the
    open texture better than narrowing to material prosperity.
- source_word: ἔννοια
  chosen: purpose
  alternatives:
  - thought
  - intention
  lexicon: LSJ
  rationale: The line concerns God's knowledge of the design or intent of what he
    has made; 'purpose' fits the creational argument.
- source_word: κατ’ εἰκόνα ἑαυτοῦ
  chosen: in his own image
  alternatives:
  - after his own image
  lexicon: LSJ
  rationale: This echoes Genesis language and should remain recognizable in English.
- source_word: νόμῳ Κυρίου ... νόμῳ Βελίαρ
  chosen: law of the Lord ... law of Beliar
  alternatives:
  - instruction of the Lord ... rule of Beliar
  lexicon: LSJ
  rationale: ' νόμος is best kept as ''law'' for the moral dualism of the passage;
    Beliar is transliterated as a proper name in this literature.'
- source_word: κεχώρισται
  chosen: there is a division
  alternatives:
  - it has been separated
  - it stands divided
  lexicon: LSJ
  rationale: The perfect conveys an established distinction. 'There is a division'
    reads naturally while preserving the ontological contrast.
- source_word: δράσεώς τε καὶ ἀκοῆς
  chosen: between seeing and hearing
  alternatives:
  - between action and hearing
  lexicon: LSJ
  rationale: The OCR is unstable here, but the surrounding bodily-sense context strongly
    supports a contrast of sensory functions rather than moral 'action.'
- source_word: ἐν τάξει
  chosen: in order
  alternatives:
  - orderly
  - with proper order
  lexicon: LSJ
  rationale: 'A key ethical term in the chapter: conduct should match divinely ordered
    creation. ''In order'' preserves both moral and structural sense.'
- source_word: ἄτακτον
  chosen: disorderly
  alternatives:
  - out of order
  - unruly
  lexicon: LSJ
  rationale: This is the negative counterpart to τάξις; 'disorderly' keeps the lexical
    pairing visible.
- source_word: ἔξω καιροῦ αὐτοῦ
  chosen: outside its proper time
  alternatives:
  - out of season
  - apart from its appointed time
  lexicon: LSJ
  rationale: καιρός here is fitting or appointed time. 'Proper time' is clear and
    preserves the ethical force of acting seasonably.
