theological_decisions:
- issue: Messianic/royal language centered on Judah in vv. 2-3
  chosen_reading: Translate the Judah and scepter language directly as it stands,
    including God's appearing on earth and gathering the righteous from the nations.
  alternative_readings:
  - Read the passage only as dynastic-political hope
  - Treat the wording as a later interpolation and weaken its force in translation
  rationale: The Greek witness presents a strong salvation-oracle tied to Judah and
    his scepter. Transparency requires translating the extant text honestly rather
    than muting it because of source-critical questions.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    what is in the source text honestly.
- issue: κατοικῶν ἐν ἀνθρώποις in v. 3
  chosen_reading: Render as 'dwelling among men' in the main text.
  alternative_readings:
  - '''dwelling in men'''
  - omit as secondary expansion
  rationale: The phrase naturally reads as divine presence among human beings in this
    context. Because the line may be textually complex, the translation keeps it but
    notes the complexity in a footnote rather than suppressing it.
  doctrine_reference: Where a passage may reflect expansion, translate the Greek witness
    honestly and use notes rather than harmonizing.
- issue: Ethical teaching on conjugal relations and prayer in vv. 7-9
  chosen_reading: Present the commandments as 'twofold' with a proper time for sexual
    union and a proper time for restraint for prayer.
  alternative_readings:
  - Generalize into a broad statement about moderation
  - Narrow it to ritual purity language not explicit in the Greek
  rationale: The Greek gives a concrete example of divinely ordered timing. The translation
    preserves the specific moral instruction without over-systematizing it.
