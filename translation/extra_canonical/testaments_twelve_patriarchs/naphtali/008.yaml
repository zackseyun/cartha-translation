translation:
  text: '1. And behold, my children, I have shown you the times, that all these things
    will happen in Israel.

    2. And now, behold, command your children that they be united with Levi and with
    Judah. For through Judah salvation will arise for Israel, and in him Jacob will
    be blessed.

    3. Through his scepter God will appear on the earth, dwelling among men, to save
    the race of Israel, and he will gather the righteous from among the nations.

    4. Therefore, if you also do what is good, men and angels will bless you, and
    God will be glorified among the nations through you, and the devil will flee from
    you, and the wild beasts will fear you, and the Lord will love you, and the angels
    will stand by you.

    5. As when someone has reared a child well, he has a good remembrance of him,
    so also for a good work there is a good remembrance before God.

    6. But the one who does not do what is good, angels and men will curse him, and
    God will be dishonored among the nations through him, and the devil claims him
    as his own vessel, and every wild beast will lord it over him, and the Lord will
    hate him.

    7. For the commandments of the law are twofold, and they are fulfilled with skill.

    8. For there is a time for a man''s coming together with a woman, and a time for
    restraint for his prayer.

    9. And both are from God, and if they do not take place in their proper order,
    they bring very great sin upon men. The same is true also of the rest of the commandments.

    10. Therefore become wise in God, my children, and prudent, perceiving the order
    of his commandments and the ordinances for every matter, so that the Lord may
    love you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some witnesses show textual expansion or variation in v. 3 around 'God will
      appear on the earth, dwelling among men.' The translation follows the fuller
      Greek wording in the supplied witness.
    reason: textual_variant
  - marker: b
    text: '''Through Judah'' and ''through his scepter'' in vv. 2-3 carry royal and
      salvation imagery; the passage may be read messianically, but the translation
      does not force a narrower doctrinal interpretation than the Greek itself states.'
    reason: cross_reference
  - marker: c
    text: The phrase 'coming together with a woman' in v. 8 is a decorous rendering
      of language referring to sexual union.
    reason: cultural_note
  - marker: d
    text: Or 'abstinence' for 'restraint' in v. 8; the sense is refraining at the
      proper time for prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: καιροὺς
  chosen: the times
  alternatives:
  - the seasons
  - the appointed times
  lexicon: LSJ
  rationale: καιρός here refers to significant or appointed times/events disclosed
    in Naphtali's instruction, not merely chronological time.
- source_word: ἑνοῦνται
  chosen: be united
  alternatives:
  - join themselves
  - be joined
  lexicon: LSJ
  rationale: Preserves the exhortational force toward covenantal solidarity with Levi
    and Judah without over-paraphrasing.
- source_word: σωτηρία
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: LSJ
  rationale: The term carries strong theological weight and is best preserved as 'salvation,'
    while still allowing the broader sense of deliverance.
- source_word: σκήπτρου
  chosen: scepter
  alternatives:
  - rule
  - staff
  lexicon: LSJ
  rationale: Keeps the royal and dynastic imagery explicit; the Greek concrete noun
    should not be flattened into an abstract term.
- source_word: ὀφθήσεται
  chosen: will appear
  alternatives:
  - will be seen
  - will be manifested
  lexicon: LSJ
  rationale: A straightforward rendering that preserves the revelatory sense without
    importing later doctrinal phrasing beyond the Greek.
- source_word: κατοικῶν ἐν ἀνθρώποις
  chosen: dwelling among men
  alternatives:
  - living among humans
  - dwelling in men
  lexicon: LSJ
  rationale: The phrase is rendered naturally in English as presence among human beings;
    'among men' preserves the elevated register and collective sense.
- source_word: ἐπισυνάξει
  chosen: will gather
  alternatives:
  - will assemble
  - will bring together
  lexicon: LSJ
  rationale: A standard rendering for gathering people, here the righteous from among
    the nations.
- source_word: τὸ καλόν
  chosen: what is good
  alternatives:
  - the good
  - good
  lexicon: LSJ
  rationale: This idiomatically conveys moral action in English while staying close
    to the Greek article-plus-adjective construction.
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: LSJ
  rationale: In this paraenetic-apocalyptic context the personal adversarial sense
    is most likely, and 'the devil' is the clearest English equivalent.
- source_word: ἀνθέξονται ὑμῶν
  chosen: will stand by you
  alternatives:
  - will support you
  - will help you
  lexicon: LSJ
  rationale: ἀντέχομαι can mean to hold fast to, support, or stand by; this rendering
    fits the protective parallelism of the verse.
- source_word: μνήμη
  chosen: remembrance
  alternatives:
  - memory
  - memorial
  lexicon: LSJ
  rationale: Retains the moral-theological sense of being remembered favorably before
    God.
- source_word: ἀδοξήσει
  chosen: will be dishonored
  alternatives:
  - will be deprived of glory
  - will be brought into disrepute
  lexicon: LSJ
  rationale: The passive effect on God's honor among the nations is best expressed
    idiomatically as 'will be dishonored among the nations through him.'
- source_word: οἰκειοῦται αὐτὸν ὡς ἴδιον σκεῦος
  chosen: claims him as his own vessel
  alternatives:
  - makes him his own instrument
  - appropriates him as his own vessel
  lexicon: LSJ
  rationale: Preserves both the possessive force of οἰκειοῦται and the concrete metaphor
    of σκεῦος.
- source_word: κατακυριεύσει αὐτῷ
  chosen: will lord it over him
  alternatives:
  - will dominate him
  - will rule over him
  lexicon: LSJ
  rationale: Captures the force of oppressive mastery in vivid English.
- source_word: διπλαῖ
  chosen: twofold
  alternatives:
  - double
  - of two kinds
  lexicon: LSJ
  rationale: Keeps the aphoristic style of the testament and prepares for the example
    of paired times in the next verse.
- source_word: μετὰ τέχνης πληροῦνται
  chosen: are fulfilled with skill
  alternatives:
  - are carried out with discernment
  - are accomplished artfully
  lexicon: LSJ
  rationale: τέχνη here suggests practiced discernment or proper method; 'with skill'
    preserves the compactness of the Greek.
- source_word: συνουσίας
  chosen: coming together
  alternatives:
  - sexual union
  - intercourse
  lexicon: LSJ
  rationale: The context clearly concerns marital/sexual relations, but 'coming together'
    preserves decorum appropriate to testamentary exhortation while remaining faithful.
- source_word: ἐγκρατείας
  chosen: restraint
  alternatives:
  - self-control
  - abstinence
  lexicon: LSJ
  rationale: The immediate contrast is with conjugal union for the sake of prayer;
    'restraint' fits the situational sense better than a broader virtue term.
- source_word: τάξει
  chosen: proper order
  alternatives:
  - order
  - appointed arrangement
  lexicon: LSJ
  rationale: The ethical point is not mere sequence but divinely fitting arrangement.
- source_word: θεσμοὺς παντὸς πράγματος
  chosen: the ordinances for every matter
  alternatives:
  - the statutes of every matter
  - the fixed rules for every thing
  lexicon: LSJ
  rationale: Conveys that each matter has its divinely ordered norm or ordinance.
