translation:
  text: 'And after instructing them in many such things, he urged them to carry his
    bones over to Hebron and bury him with his fathers.


    2. And after eating and drinking with gladness of soul, he covered his face and
    died.


    3. And his sons did in every respect all that Naphtali their father had commanded
    them.


    [Here begins the Testament of Gad, the ninth son of Jacob and Zilpah.]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[Here begins ...]'
    text: 'The Greek source for this chapter closes with the incipit of the next work:
      ''Testament of Gad, the ninth son of Jacob and Zilpah.'' It is preserved here
      as a transition note rather than treated as part of Naphtali''s final words.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐντειλάμενος
  chosen: after instructing
  alternatives:
  - after commanding
  - after giving orders
  lexicon: BDAG
  rationale: The participle introduces Naphtali's final charge to his sons. 'Instructing'
    preserves the testamentary and paraenetic tone without making the line sound merely
    military, while still reflecting the force of giving binding directions.
- source_word: παρεκάλεσεν
  chosen: he urged
  alternatives:
  - he exhorted
  - he encouraged
  lexicon: BDAG
  rationale: In testament literature this verb often carries earnest exhortation.
    'He urged' keeps the emotional force and directness of a dying father's appeal.
- source_word: μετακομίσωσι
  chosen: carry ... over
  alternatives:
  - transfer
  - remove
  lexicon: LSJ
  rationale: The verb denotes moving remains from one place to another. 'Carry his
    bones over' is idiomatic English and preserves the concrete action implied by
    the Greek.
- source_word: τὰ ὀστᾶ αὐτοῦ
  chosen: his bones
  alternatives:
  - his remains
  lexicon: BDAG
  rationale: The Greek says 'bones' explicitly. Retaining the concrete term preserves
    the burial custom language and avoids smoothing into a more generalized modern
    expression.
- source_word: ἐν Χεβρών
  chosen: to Hebron
  alternatives:
  - in Hebron
  lexicon: BDAG
  rationale: Although the preposition is literally 'in,' the motion verb requires
    destination sense in English. 'To Hebron' best reflects the intended movement.
- source_word: μετὰ τῶν πατέρων αὐτοῦ
  chosen: with his fathers
  alternatives:
  - beside his fathers
  - with his ancestors
  lexicon: BDAG
  rationale: '''With his fathers'' preserves the traditional familial burial idiom
    and the patriarchal register of the testament.'
- source_word: ἐν ἱλαρότητι ψυχῆς
  chosen: with gladness of soul
  alternatives:
  - in cheerfulness of spirit
  - with a joyful heart
  lexicon: BDAG
  rationale: The phrase is elevated and inward. 'Gladness of soul' keeps the solemn
    yet serene tone of a righteous death scene.
- source_word: συνεκάλυψε τὸ πρόσωπον αὐτοῦ
  chosen: he covered his face
  alternatives:
  - he veiled his face
  lexicon: LSJ
  rationale: A simple, literal rendering best preserves the finality and dignity of
    the death notice.
- source_word: κατὰ πάντα
  chosen: in every respect
  alternatives:
  - in all things
  - entirely
  lexicon: BDAG
  rationale: This phrase emphasizes complete obedience. 'In every respect' communicates
    comprehensive fulfillment in natural English.
- source_word: ὅσα ἐνετείλατο
  chosen: all that ... had commanded
  alternatives:
  - everything that ... had instructed
  lexicon: BDAG
  rationale: Here the stronger sense of binding direction is appropriate because the
    sons are carrying out burial instructions exactly as given.
