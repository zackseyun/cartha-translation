theological_decisions:
- issue: Whether to include the closing line introducing the next testament
  chosen_reading: 'Included in brackets as a paratextual transition: ''[Here begins
    the Testament of Gad, the ninth son of Jacob and Zilpah.]'''
  alternative_readings:
  - Omit as editorial heading not belonging to Naphtali 9
  - Print as unbracketed running text
  rationale: The Greek witness as supplied includes the incipit to the next testament
    immediately after Naphtali 9:3. Because it is present in the source layer but
    functions as a transition rather than part of Naphtali's speech, it is preserved
    transparently in brackets.
  doctrine_reference: PHILOSOPHY.md transparency principle; translate what is in the
    witness and signal paratext rather than silently omitting.
