translation:
  text: 'For God made all things good in their order: the five senses in the head,
    and he joined the neck to the head; and he added hair for beauty, and the heart
    for understanding, the belly for excrement, the stomach for grinding, the windpipe
    for taking in air, the liver for anger, the gall for bitterness, the spleen for
    laughter, the kidneys for craftiness, the loins for strength, and the lungs for
    drawing in; and so the rest.'
