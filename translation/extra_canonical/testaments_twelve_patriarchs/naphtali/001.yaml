theological_decisions:
- issue: Moral evaluation of Rachel's action in giving Bilhah to Jacob
  chosen_reading: Translate πανουργίᾳ with a negative edge ('with cunning') without
    expanding into a full moral condemnation.
  alternative_readings:
  - with prudence
  - deceitfully
  rationale: The Greek itself marks Rachel's action with a term that can suggest craftiness.
    The translation should preserve that tension rather than soften it or intensify
    it beyond the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of σάρξ in Naphtali's death announcement
  chosen_reading: Render literally as 'flesh' in a bodily sense, with slight idiomatic
    support ('failed and died').
  alternative_readings:
  - body
  - mortal frame
  rationale: This is not a Pauline metaphor for sinful nature but a concrete reference
    to bodily mortality. The project default is to keep 'flesh' where literal.
  doctrine_reference: 'DOCTRINE.md contested terms: σάρξ → flesh (literal) / sinful
    nature (metaphorical)'
