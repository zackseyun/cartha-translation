translation:
  text: 'A copy of the testament of Naphtali, the eighth son of Jacob, which he set
    in order at the time of his departure, in the hundred and thirtieth year of his
    life.


    2 When his sons had gathered together in the seventh month, on the first day of
    the month, he made a feast for them. 3 And in the morning, after he awoke, he
    said to them, “I am dying”; but they did not believe him. 4 And while blessing
    and glorifying the Lord, he grew strong and said, “After the feast yesterday,
    my flesh failed and died.”


    5 Then he began to speak: “Hear, my children, sons of Naphtali; hear the words
    of your father. 6 I was born from Bilhah, because Rachel acted with cunning and
    gave Bilhah to Jacob in her place; and Bilhah conceived and bore me upon Rachel’s
    knees, and for this reason she called my name Naphtali. 7 For Rachel loved me
    greatly, because I was born upon her knees; and when I was still a tender child
    she kissed me, saying, ‘May I be given a brother from my own womb, like you.’
    8 Therefore Joseph also was like me in every way, according to the prayers of
    Rachel.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'upon Rachel’s knees,' likely reflecting the custom by which
      a child born through a handmaid was symbolically received as the wife's own.
    reason: cultural_note
  - marker: b
    text: Or 'according to the wishes/vows of Rachel'; the Greek term can carry several
      related senses.
    reason: lexical_alternative
  - marker: c
    text: '''My flesh failed and died'' is a difficult expression in Greek; it refers
      to bodily collapse in the approach of death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκη
  chosen: testament
  alternatives:
  - covenant
  - last will
  lexicon: LSJ
  rationale: In this literary work the term denotes a farewell charge or final disposition
    by a patriarch, not a covenant in the broader biblical sense. 'Testament' preserves
    the genre label.
- source_word: ἐν καιρῷ τῆς ἐξόδου αὐτοῦ
  chosen: at the time of his departure
  alternatives:
  - at the time of his death
  - at his end
  lexicon: LSJ
  rationale: ἔξοδος can mean departure or death. 'Departure' preserves the dignified
    testamentary idiom while allowing the death-context to emerge in the following
    verses.
- source_word: δεῖπνον
  chosen: feast
  alternatives:
  - dinner
  - meal
  - banquet
  lexicon: LSJ
  rationale: The context is a formal final gathering of sons, so 'feast' better conveys
    a solemn shared meal than the more ordinary 'dinner' or 'meal'.
- source_word: ἐξυπνισθῆναι
  chosen: after he awoke
  alternatives:
  - after he was awakened
  - after waking
  lexicon: LSJ
  rationale: A natural English rendering of the aorist passive/intransitive sense
    that keeps the narrative sequence clear.
- source_word: ἐκραταιώθη
  chosen: he grew strong
  alternatives:
  - he was strengthened
  - he became strong
  lexicon: LSJ
  rationale: The verb suggests a strengthening or rallying of strength before speaking.
    'He grew strong' reads naturally while preserving the physical recovery nuance.
- source_word: ἀπέθανεν ἡ σάρξ μου
  chosen: my flesh failed and died
  alternatives:
  - my body died
  - my flesh died
  lexicon: LSJ
  rationale: σάρξ is retained as 'flesh' per project philosophy where literal, but
    the phrase is idiomatically difficult in English. 'Failed and died' conveys bodily
    collapse without flattening the concrete term.
- source_word: τέκνα μου
  chosen: my children
  alternatives:
  - my sons
  lexicon: LSJ
  rationale: The address is paternal and inclusive in tone. Since the next phrase
    specifies 'sons of Naphtali,' rendering τέκνα as 'children' preserves the rhetorical
    parallelism rather than repeating 'sons' twice identically.
- source_word: πανουργίᾳ
  chosen: with cunning
  alternatives:
  - craftily
  - deceitfully
  lexicon: LSJ
  rationale: The term can carry a negative sense of craftiness. 'With cunning' preserves
    the morally edged description without over-translating to explicit deceit.
- source_word: ἀντʼ αὐτῆς
  chosen: in her place
  alternatives:
  - instead of her
  - as her substitute
  lexicon: LSJ
  rationale: This is the plain relational sense in the Rachel-Bilhah arrangement.
- source_word: ἐπὶ τῶν γονάτων
  chosen: upon ... knees
  alternatives:
  - on the knees
  - at the knees
  lexicon: LSJ
  rationale: The phrase alludes to the birth/adoption custom of bearing on another
    woman's knees. 'Upon ... knees' keeps the concrete image and allows a cultural
    footnote.
- source_word: ἁπαλὸν ὄντα
  chosen: still a tender child
  alternatives:
  - being delicate
  - while I was little
  - while I was tender
  lexicon: LSJ
  rationale: The phrase refers to early childhood softness/tenderness. 'Still a tender
    child' communicates age and affection naturally.
- source_word: Δοίη μοι ἀδελφόν
  chosen: May I be given a brother
  alternatives:
  - May I receive a brother
  - May there be given to me a brother
  lexicon: LSJ
  rationale: The optative expresses a wish or prayer. This rendering preserves the
    prayer-like tone.
- source_word: κατὰ τὰς εὐχάς
  chosen: according to the prayers
  alternatives:
  - according to the vows
  - according to the wishes
  lexicon: LSJ
  rationale: εὐχή can mean prayer, vow, or wish. In Rachel's speech and longing for
    another child, 'prayers' best fits the devotional and maternal context.
