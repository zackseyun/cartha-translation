translation:
  text: 'And again, after seven days, I saw that my father Jacob was standing by the
    sea of Amnia, and we were with him. And behold, a ship came sailing by us, with
    sailors and pilots. And written on the ship was this: “The Ship of Jacob.”


    And our father said to us, “Come, let us go up into our ship.” And when we had
    entered, a violent storm arose, and a whirlwind of wind; and our father was separated
    from us, holding the rudders. And we, being storm-tossed upon the sea, were driven
    along over the waters, while the ship was filled and battered by the waves, so
    that it was about to be broken up.


    But Joseph went away on a small boat, and we were separated on nine planks; and
    Levi and Judah were together. And we were scattered, all of us, to the ends of
    the earth. But Levi, clothed in sackcloth, prayed to the Lord. And when the storm
    ceased, the ship reached the land as though in peace. And behold, our father came,
    and we all rejoiced with one accord.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The place-name 'Amnia' is uncertain in identification; the translation preserves
      the Greek form rather than conjecturing a location.
    reason: cultural_note
  - marker: b
    text: The Greek phrase rendered 'holding the rudders' is textually difficult;
      the underlying word literally means 'necks' in ordinary usage, but the context
      appears nautical.
    reason: textual_variant
  - marker: c
    text: The scattering 'to the ends of the earth' likely carries symbolic force
      for dispersion, though the text presents it as part of Naphtali's dream.
    reason: cross_reference
lexical_decisions:
- source_word: θάλασσα Ἀμνείας
  chosen: sea of Amnia
  alternatives:
  - sea of Amneas
  - Amnian sea
  lexicon: LSJ
  rationale: The phrase appears as a place-name in the Greek witness. I transliterate
    rather than interpret, since the location is uncertain and the text gives no explanatory
    gloss.
- source_word: ἁρμενίζον
  chosen: came sailing
  alternatives:
  - was under sail
  - sailed
  lexicon: LSJ
  rationale: This keeps the nautical vividness of the participle without becoming
    wooden English.
- source_word: κυβερνητῶν
  chosen: pilots
  alternatives:
  - helmsmen
  - steersmen
  lexicon: LSJ
  rationale: In nautical context the term refers to those steering or directing the
    vessel. 'Pilots' is readable and preserves the maritime sense alongside 'sailors'
    for ναυτῶν.
- source_word: ἐπεγέγραπτο
  chosen: written on
  alternatives:
  - inscribed on
  - bore the inscription
  lexicon: LSJ
  rationale: A straightforward rendering that preserves the notice-like force of the
    verb.
- source_word: χειμὼν σφοδρός
  chosen: a violent storm
  alternatives:
  - a fierce tempest
  - a severe storm
  lexicon: LSJ
  rationale: χειμών in this context is a storm at sea, not merely winter weather.
    'Violent storm' is natural English and keeps the intensity of σφοδρός.
- source_word: λαῖλαψ ἀνέμου
  chosen: a whirlwind of wind
  alternatives:
  - a windstorm
  - a furious gale
  lexicon: LSJ
  rationale: I preserved the somewhat emphatic Greek expression rather than collapsing
    it into a single generic term.
- source_word: ἀφίσταται
  chosen: was separated from us
  alternatives:
  - withdrew from us
  - stood apart from us
  lexicon: BDAG
  rationale: The dream imagery suggests separation rather than a voluntary departure.
    This also fits the ensuing dispersal motif.
- source_word: τοὺς αὐχένας
  chosen: the rudders
  alternatives:
  - the neck-pieces
  - the handles
  lexicon: LSJ
  rationale: The transmitted Greek is difficult, but in nautical context this likely
    refers to steering gear. 'Rudders' best fits the scene, while the uncertainty
    is noted in a footnote.
- source_word: χειμαζόμενοι
  chosen: being storm-tossed
  alternatives:
  - being battered by the storm
  - being driven by the storm
  lexicon: BDAG
  rationale: This captures the passive suffering of the brothers at sea and preserves
    the maritime imagery.
- source_word: ἐν τρικυμίαις περιρησσόμενον
  chosen: battered by the waves
  alternatives:
  - lashed by the billows
  - beaten about in surging seas
  lexicon: LSJ
  rationale: A concise rendering of the compound image of triple-wave turbulence and
    violent buffeting.
- source_word: ἀκάτιον
  chosen: small boat
  alternatives:
  - skiff
  - dinghy
  lexicon: LSJ
  rationale: A generic but accurate English equivalent for a small craft, avoiding
    overly colloquial wording.
- source_word: σανίδων
  chosen: planks
  alternatives:
  - boards
  lexicon: LSJ
  rationale: The image is of survivors scattered on pieces of wreckage; 'planks' is
    vivid and idiomatic.
- source_word: τὰ πέρατα τῆς γῆς
  chosen: the ends of the earth
  alternatives:
  - the farthest parts of the earth
  - the extremities of the land
  lexicon: BDAG
  rationale: This is a conventional biblical expression and should remain elevated
    and expansive in English.
- source_word: σάκκον
  chosen: sackcloth
  alternatives:
  - a sackcloth garment
  lexicon: LSJ
  rationale: The term carries mourning and penitential associations that 'sackcloth'
    preserves well.
- source_word: ἐδέετο τοῦ Κυρίου
  chosen: prayed to the Lord
  alternatives:
  - implored the Lord
  - made supplication to the Lord
  lexicon: BDAG
  rationale: The verb denotes earnest petition. 'Prayed to the Lord' is clear in the
    main text; the stronger nuance can be noted in revision if needed.
- source_word: ὁμοθυμαδόν
  chosen: with one accord
  alternatives:
  - together
  - unanimously
  lexicon: BDAG
  rationale: This preserves the solemn, corporate unity of the closing rejoicing and
    matches biblical register.
