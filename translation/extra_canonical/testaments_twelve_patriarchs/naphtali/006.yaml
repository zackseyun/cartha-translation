theological_decisions:
- issue: Symbolic dispersal imagery in the dream
  chosen_reading: Translate the maritime disaster and scattering straightforwardly
    as dream narrative without importing later interpretive explanation into the main
    text.
  alternative_readings:
  - Explicitly interpret the scene as exile of the tribes
  - Soften the imagery into a generic family dream
  rationale: The Greek presents the vision narratively. Its symbolic force is evident,
    but the translation should not pre-interpret beyond the wording of the chapter.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: κύριος in a Jewish testament context
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  - Master
  rationale: The Greek witness has Κυρίου without the tetragrammaton. 'Lord' follows
    project policy for κύριος while preserving reverent biblical diction.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord'
