theological_decisions:
- issue: Prophetic necessity in Jacob's response
  chosen_reading: These things must be fulfilled in their appointed times
  alternative_readings:
  - These things must happen in their seasons
  rationale: The wording preserves a providential frame without over-systematizing
    it; fulfillment language suits the testamentary and dream-interpretation context.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
- issue: Meaning of ἀριθμεῖ αὐτὸν ὅτι μεθ’ ἡμῶν
  chosen_reading: the Lord counts him as being with us
  alternative_readings:
  - the Lord numbers him among us
  - the Lord considers him still with us
  rationale: The Greek is somewhat idiomatic. 'Counts him as being with us' preserves
    the metaphor and Jacob's conviction that Joseph still belongs among the living
    family circle without collapsing the ambiguity.
