translation:
  text: '1. I told these two dreams to my father, and he said to me, “These things
    must be fulfilled in their appointed times, after Israel has endured much.”


    2. Then my father said to me, “I believe God that Joseph is alive; for I always
    see that the Lord counts him as being with us.”


    3. And weeping he said, “Alas, my child Joseph, you are alive, and I do not see
    you; and you do not see Jacob, the one who fathered you.”


    4. So by these words he made me weep also. But I was burning in my inward parts
    to tell him that Joseph had been sold, yet I was afraid of my brothers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in their seasons.' The Greek καιροί can denote fitting or appointed
      times.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'counts him as being with us' may also be rendered 'numbers him
      among us' or 'considers him with us.'
    reason: lexical_alternative
  - marker: c
    text: The expression 'I was burning in my inward parts' reflects a visceral Greek
      idiom for intense inner distress.
    reason: cultural_note
lexical_decisions:
- source_word: ἐνύπνια
  chosen: dreams
  alternatives:
  - visions
  lexicon: LSJ
  rationale: The ordinary sense is 'dreams'; nothing in the immediate context requires
    the more elevated 'visions.'
- source_word: δεῖ ... πληρωθῆναι
  chosen: must be fulfilled
  alternatives:
  - must come to pass
  - must be completed
  lexicon: BDAG
  rationale: Preserves both necessity (δεῖ) and fulfillment language (πληρωθῆναι),
    fitting the testamentary-prophetic tone.
- source_word: καιροὺς
  chosen: appointed times
  alternatives:
  - seasons
  - times
  lexicon: BDAG
  rationale: '''Appointed times'' conveys more than mere chronology; it reflects fitting
    or divinely ordered moments.'
- source_word: ὑπομείναντος
  chosen: has endured
  alternatives:
  - has suffered patiently
  - has undergone
  lexicon: BDAG
  rationale: Captures the sense of enduring hardship without over-expanding the participle.
- source_word: πιστεύω τῷ θεῷ
  chosen: I believe God
  alternatives:
  - I trust God
  - I believe in God
  lexicon: BDAG
  rationale: The dative construction is best rendered 'believe God,' emphasizing trust
    in God's word rather than a general statement of belief in God's existence.
- source_word: ζῇ
  chosen: is alive
  alternatives:
  - lives
  lexicon: BDAG
  rationale: Idiomatic English in this context of presumed death versus continued
    life.
- source_word: ἀριθμεῖ
  chosen: counts
  alternatives:
  - reckons
  - numbers
  lexicon: LSJ
  rationale: The Greek can mean 'count' or 'reckon.' 'Counts him as being with us'
    preserves the metaphor without forcing a more interpretive paraphrase.
- source_word: Οἴμοι
  chosen: Alas
  alternatives:
  - Woe is me
  - Ah me
  lexicon: LSJ
  rationale: Keeps the lament register in readable modern English without archaizing
    excessively.
- source_word: γεννήσαντά
  chosen: the one who fathered you
  alternatives:
  - who begot you
  - who bore you
  lexicon: BDAG
  rationale: '''Fathered'' preserves the paternal relation clearly and avoids archaic
    ''begot.'''
- source_word: ἐκαιόμην τοῖς σπλάγχνοις
  chosen: I was burning in my inward parts
  alternatives:
  - I burned within
  - I was inflamed in my heart
  lexicon: BDAG
  rationale: Retains the visceral idiom of σπλάγχνα rather than flattening it to a
    generic emotional phrase.
- source_word: πέπραται
  chosen: had been sold
  alternatives:
  - has been sold
  - had been betrayed for sale
  lexicon: BDAG
  rationale: In context this refers to Joseph's sale; English past perfect fits the
    narrative retrospectively.
