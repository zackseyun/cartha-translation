theological_decisions:
- issue: Prophetic figure from 'Judah and Levi'
  chosen_reading: Retained the dual-tribe wording without harmonizing it to a single
    messianic office.
  alternative_readings:
  - a Judahite royal messiah only
  - a Levitical priestly figure only
  - a later Christian conflation of kingly and priestly motifs
  rationale: The Greek witness presents a deliberately composite expectation. The
    translation preserves that tension rather than resolving it.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
- issue: Passion imagery in 'lifted up upon a tree'
  chosen_reading: Translated ξύλον literally as 'tree' and left christological identification
    implicit.
  alternative_readings:
  - '''cross'' as explicit interpretive rendering'
  rationale: The wording in the Greek is audibly scriptural and should remain so.
    A note can clarify the alternative without replacing the source image.
  doctrine_reference: DOCTRINE.md §Original-language primacy over translation tradition
- issue: Likely Christian interpolation or expansion in the prophecy
  chosen_reading: Translated the full Greek prophecy straightforwardly and flagged
    its possible secondary character in notes rather than bracketing or softening
    it.
  alternative_readings:
  - omit or dilute overtly christological lines
  - rewrite toward a generic future deliverer
  rationale: The project philosophy requires honest translation of the witness text
    with transparency about textual complexity.
  doctrine_reference: PHILOSOPHY.md §What 'transparent' actually means here
