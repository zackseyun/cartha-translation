translation:
  text: '1. Therefore, if you also walk in holiness according to the Lord’s commands,
    you will dwell with me in safety, and all Israel will be gathered to the Lord.


    2. And I will no longer be called a ravening wolf because of your ravaging, but
    a worker of the Lord, distributing food to those who do what is good.


    3. And there will arise in the latter times one beloved of the Lord, from the
    tribe of Judah and Levi, who will accomplish the good pleasure of God with a new
    understanding for all the nations.


    4. His presence is in the mouth of all, and he will be chosen forever by the Lord,
    and through him the knowledge of the Lord will be given on the earth in portions
    of joy; and through him Israel will be enlightened.


    5. Then he will enter into the first temple, and there the Lord will be abused,
    and he will be lifted up upon a tree.


    6. And the veil of the temple will be torn, and the Spirit of God will pass on
    to the nations like fire poured out.


    7. And he will ascend from Hades and will pass from earth into heaven.


    8. And I know how lowly he will be on earth, and how glorious in heaven.


    9. Now when Joseph was in Egypt, I longed to see his figure and appearance; and
    through the prayers of Jacob my father I saw him, while awake, that a spotless
    and holy virgin was giving birth to a lamb,


    10. and on its left side there was as it were a lion; and all the beasts rushed
    against him, and the lamb overcame them and destroyed them, and trampled them
    underfoot.


    11. And because of him the angels and men rejoiced, and all the land.


    12. These things will happen in their proper times. Therefore, my children, when
    you see that all these things have happened in Israel, know that the kingdom of
    the Lord is near.


    13. Then flee from every lawless deed and from the works of Beliar, and cling
    to what is good and to the law of the Lord.


    14. And bury me near my fathers.


    15. And he finished his commands, and said, “I am going to sleep with my fathers.”


    16. And he stretched out his feet and died in a beautiful and good old age.


    17. And each of his sons did as he had commanded them, and they put him in a coffin
    and kept him in Egypt until the day of the exodus.


    18. And when the sons of Israel went up from Egypt, they carried up the bones
    of Benjamin also, and buried them in Hebron at the right side of Abraham and Isaac
    and Jacob.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on a cross'; the Greek says 'upon a tree,' preserving scriptural resonance
      with earlier sacred language.
    reason: lexical_alternative
  - marker: b
    text: The prophecy in verses 3–8 is often regarded by scholars as containing later
      expansion or Christian interpolation, but it is translated here as it stands
      in the Greek witness.
    reason: textual_variant
  - marker: c
    text: '''Beliar'' reflects the Greek form found in this testamentary tradition;
      many readers will know the name as ''Belial.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁγιωσύνη / ἁγίως (implied testamentary virtue language)
  chosen: holiness
  alternatives:
  - purity
  - holy conduct
  lexicon: LSJ
  rationale: The chapter’s paraenetic tone calls for a covenantal-ethical term stronger
    than mere moral cleanliness. 'Holiness' preserves the elevated testamentary register.
- source_word: λύκος ἅρπαξ / ἅρπαγμα (Benjamin tradition)
  chosen: ravening wolf
  alternatives:
  - rapacious wolf
  - wolf that tears prey
  lexicon: LSJ
  rationale: This preserves the traditional tribal image from Genesis 49 while keeping
    the vivid predatory force of the Greek.
- source_word: ἐργάτης κυρίου
  chosen: worker of the Lord
  alternatives:
  - servant of the Lord
  - laborer of the Lord
  lexicon: BDAG
  rationale: '''Worker'' best reflects active commissioned service without importing
    the bonded nuance of δοῦλος.'
- source_word: ἀγαθοποιέω / οἱ ἀγαθοποιοῦντες
  chosen: those who do what is good
  alternatives:
  - the doers of good
  - those who practice goodness
  lexicon: BDAG
  rationale: This keeps the ethical emphasis clear and readable while preserving the
    verbal sense of doing good.
- source_word: ἐπʼ ἐσχάτων τῶν καιρῶν
  chosen: in the latter times
  alternatives:
  - in the last days
  - at the end of the age
  lexicon: LSJ
  rationale: '''Latter times'' preserves eschatological force without overloading
    the phrase with later doctrinal associations beyond the Greek.'
- source_word: ἠγαπημένος κυρίου
  chosen: beloved of the Lord
  alternatives:
  - one loved by the Lord
  - the Lord’s beloved
  lexicon: BDAG
  rationale: This is a natural elevated rendering that preserves the passive/adjectival
    force.
- source_word: ἀπὸ φυλῆς Ἰούδα καὶ Λευί
  chosen: from the tribe of Judah and Levi
  alternatives:
  - from Judah and Levi
  - out of the tribes of Judah and Levi
  lexicon: LSJ
  rationale: The phrasing preserves the textual tension of a figure associated with
    both Judah and Levi rather than resolving it interpretively.
- source_word: εὐδοκία
  chosen: good pleasure
  alternatives:
  - good purpose
  - will
  lexicon: BDAG
  rationale: '''Good pleasure'' keeps the theological nuance of divine favor and purpose
    more explicitly than the flatter ''will.'''
- source_word: καινὴ σύνεσις / νόησις (conceptual)
  chosen: a new understanding
  alternatives:
  - new insight
  - new intelligence
  lexicon: LSJ
  rationale: This communicates renewed revelatory comprehension in accessible English.
- source_word: γνῶσις κυρίου
  chosen: knowledge of the Lord
  alternatives:
  - knowledge of God
  - the Lord’s knowledge
  lexicon: BDAG
  rationale: This preserves the objective genitive sense and the chapter’s revelatory
    theme.
- source_word: ἐπὶ ξύλου
  chosen: upon a tree
  alternatives:
  - on wood
  - on a cross
  lexicon: BDAG
  rationale: The Greek says 'tree/wood.' 'Upon a tree' preserves the wording and its
    scriptural resonance without prematurely interpreting it as a later technical
    term.
- source_word: καταπέτασμα
  chosen: veil
  alternatives:
  - curtain
  lexicon: BDAG
  rationale: '''Veil'' is the more established sacred-space term in English and suits
    the temple context.'
- source_word: πνεῦμα θεοῦ
  chosen: Spirit of God
  alternatives:
  - spirit of God
  lexicon: BDAG
  rationale: Capitalization reflects the likely personal/divine referent in this prophetic
    context while remaining faithful to the Greek phrase.
- source_word: ἐκχυννόμενον πῦρ / ὡς πῦρ ἐκχεόμενον
  chosen: like fire poured out
  alternatives:
  - like outpoured fire
  - as fire being poured out
  lexicon: LSJ
  rationale: This keeps the simile vivid and dynamic while remaining idiomatic in
    English.
- source_word: ᾅδης
  chosen: Hades
  alternatives:
  - the realm of the dead
  - hell
  lexicon: BDAG
  rationale: '''Hades'' is the most transparent rendering of the Greek term and avoids
    importing later associations of eternal punishment.'
- source_word: παρθένος
  chosen: virgin
  alternatives:
  - maiden
  - young woman
  lexicon: BDAG
  rationale: In this visionary birth scene, 'virgin' best reflects the marked purity
    claim conveyed by the Greek.
- source_word: ἀμνός
  chosen: lamb
  alternatives:
  - young lamb
  lexicon: BDAG
  rationale: The symbolic force is central; 'lamb' is the direct and natural rendering.
- source_word: Βελιάρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: LSJ
  rationale: The Greek testament tradition commonly has the form 'Beliar'; retaining
    it reflects the witness text rather than normalizing silently.
