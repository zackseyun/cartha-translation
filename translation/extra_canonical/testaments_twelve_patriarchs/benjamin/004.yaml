translation:
  text: '1. See then, my children, the outcome of the good man. Imitate the good,
    because of his compassion, so that you also may wear crowns of glory.


    2. For the good man does not have a darkened eye, for he shows mercy to all, even
    if they are sinners.


    3. And even if they do not intend good things toward him, by doing good he overcomes
    evil, being sheltered by God. He loves those who wrong him as his own soul.


    4. If anyone is glorified, he does not envy him; if anyone becomes rich, he is
    not jealous; if anyone is brave, he praises him; he loves the self-controlled
    man; he has mercy on the poor; he suffers together with the weak; he sings praise
    to God.


    5. He defends the one who has the fear of the Lord; he helps the one who loves
    God; by admonishing, he turns back the one who rejects the Most High; and he loves,
    as his own soul, the one who has the grace of a good spirit.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The OCR layer contains preceding lines about 'the lamb of God' and the blameless
      one dying for the ungodly. These lines are textually difficult and appear displaced
      relative to the coherent opening of this chapter. They are not included in the
      main chapter translation here.
    reason: textual_variant
  - marker: b
    text: '''A darkened eye'' may also be understood as ''an evil eye,'' that is,
      an envious or grudging disposition.'
    reason: lexical_alternative
  - marker: c
    text: Some witnesses at this point read more briefly, while others expand the
      list of virtues. The translation follows the fuller ethical sequence represented
      in the supplied Greek layer.
    reason: textual_variant
lexical_decisions:
- source_word: τέλος
  chosen: outcome
  alternatives:
  - end
  - goal
  lexicon: LSJ
  rationale: In the exhortational context, Benjamin points to the observable result
    or end-state of the good man’s life as a model for imitation. 'Outcome' preserves
    that paraenetic force better than the more ambiguous 'end'.
- source_word: μιμήσασθε
  chosen: imitate
  alternatives:
  - follow
  - copy
  lexicon: LSJ
  rationale: A strong imperative calling the sons to patterned moral imitation; 'imitate'
    keeps the testamentary exhortation direct and concrete.
- source_word: εὐσπλαγχνία
  chosen: compassion
  alternatives:
  - mercy
  - tenderheartedness
  lexicon: LSJ
  rationale: The term denotes deep pity or tender mercy. 'Compassion' is natural English
    while retaining the affective depth that grounds the ethical imitation.
- source_word: σκοτεινὸν ὀφθαλμόν
  chosen: a darkened eye
  alternatives:
  - an evil eye
  - a gloomy eye
  lexicon: LSJ
  rationale: The phrase likely refers to envy or grudging disposition. 'Darkened eye'
    stays close to the Greek image while allowing the surrounding context of non-envy
    to interpret it.
- source_word: ἐλεεῖ
  chosen: shows mercy
  alternatives:
  - has mercy on
  - pities
  lexicon: LSJ
  rationale: This keeps the active ethical sense of merciful action toward others,
    a key virtue in the chapter.
- source_word: νικᾷ τὸ κακόν
  chosen: overcomes evil
  alternatives:
  - conquers evil
  - defeats evil
  lexicon: LSJ
  rationale: A stable and idiomatic rendering that preserves the moral contrast without
    over-dramatizing it.
- source_word: σκεπόμενος ὑπὸ τοῦ Θεοῦ
  chosen: being sheltered by God
  alternatives:
  - being protected by God
  - being covered by God
  lexicon: LSJ
  rationale: The participle suggests divine covering/protection. 'Sheltered' preserves
    the imagery and reads naturally in English.
- source_word: ἀδικοῦντας
  chosen: those who wrong him
  alternatives:
  - those who act unjustly toward him
  - his wrongdoers
  lexicon: LSJ
  rationale: This expresses personal injury done to the good man and fits the immediate
    ethical context of loving offenders.
- source_word: δοξάζηται
  chosen: is glorified
  alternatives:
  - is honored
  - is praised
  lexicon: LSJ
  rationale: The passive sense of receiving honor is retained. 'Is glorified' is slightly
    elevated, fitting the testament style, though the sense is social honor rather
    than divine glory.
- source_word: φθονεῖ / ζηλοῖ
  chosen: envy / be jealous
  alternatives:
  - begrudge / covet
  lexicon: LSJ
  rationale: The chapter uses a vice catalogue with near-parallel terms. Rendering
    them distinctly as 'envy' and 'be jealous' preserves the rhetorical accumulation
    without collapsing the vocabulary.
- source_word: σώφρων
  chosen: self-controlled man
  alternatives:
  - temperate man
  - prudent man
  lexicon: LSJ
  rationale: In this ethical list, the emphasis is moral restraint rather than mere
    prudence. 'Self-controlled' best fits the virtue catalogue.
- source_word: συμπάσχει
  chosen: suffers together with
  alternatives:
  - has compassion on
  - sympathizes with
  lexicon: LSJ
  rationale: The compound verb literally conveys shared suffering. 'Suffers together
    with' preserves the stronger solidarity implied by the Greek.
- source_word: Θεὸν ὑμνεῖ
  chosen: he sings praise to God
  alternatives:
  - he hymns God
  - he praises God
  lexicon: LSJ
  rationale: The verb is more specific than generic praise; 'sings praise' reflects
    the hymnic nuance while remaining readable.
- source_word: φόβον Κυρίου
  chosen: the fear of the Lord
  alternatives:
  - reverence for the Lord
  lexicon: LSJ
  rationale: This is a standard biblical ethical expression and should be preserved
    rather than diluted into a purely modern paraphrase.
- source_word: ὑπερασπίζει
  chosen: defends
  alternatives:
  - protects
  - supports
  lexicon: LSJ
  rationale: The verb suggests active standing up for someone. 'Defends' captures
    that force succinctly.
- source_word: συντρέχει
  chosen: helps
  alternatives:
  - runs to assist
  - supports
  lexicon: LSJ
  rationale: The literal image is of coming alongside quickly, but 'helps' communicates
    the practical ethical sense in idiomatic English.
- source_word: νουθετῶν ἐπιστρέφει
  chosen: by admonishing, he turns back
  alternatives:
  - he corrects and converts
  - he warns and brings back
  lexicon: LSJ
  rationale: This preserves both the means (admonition) and the result (turning back),
    important for the restorative moral vision of the passage.
- source_word: χάριν ἀγαθοῦ πνεύματος
  chosen: the grace of a good spirit
  alternatives:
  - the favor of a good spirit
  - a gracious good spirit
  lexicon: LSJ
  rationale: The phrase is somewhat compressed and may denote a gracious disposition
    shaped by a good spirit. The chosen rendering stays close to the Greek and leaves
    the expression transparent for later review.
