theological_decisions:
- issue: Opening christological material in the OCR layer before v.1
  chosen_reading: Excluded from the chapter translation proper and treated as extraneous
    or displaced text relative to the coherent paraenetic unit of chapter 4 beginning
    'See then, my children.'
  alternative_readings:
  - Include the preceding 'lamb of God' and atoning-death lines as part of chapter
    4
  - Treat the material as a textual interpolation attached to the chapter
  rationale: The supplied Greek witness presents a coherent ethical chapter beginning
    at 'Ἴδετε οὖν, τέκνα μου'. The preceding lines are textually dislocated and likely
    belong to another context or interpolation stream. Because the task is to draft
    this chapter as a coherent literary unit anchored in the chapter text, the translation
    begins with the clear chapter opening while documenting the issue in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; use notes
    rather than silently harmonizing.
- issue: Meaning of 'darkened eye'
  chosen_reading: Retained as an image rather than interpreted directly as 'evil eye.'
  alternative_readings:
  - evil eye
  - envious eye
  rationale: The Greek image is vivid and likely connotes envy or grudging ill will,
    but the surrounding lines already explicate the sense through non-envy and mercy.
    Retaining the image preserves texture and avoids over-interpretation in the main
    text.
