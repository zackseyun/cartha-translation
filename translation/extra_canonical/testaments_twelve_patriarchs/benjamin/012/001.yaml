translation:
  text: '1. And after saying these things, he stretched out his feet and fell asleep
    in a good sleep.

    2. And his sons did as he had commanded them, and they carried up his body and
    buried him in Hebron with his fathers.


    2. The number of his life was one hundred and twenty-five years. And when he had
    finished his words, he said, “I command you, my children, carry up my bones out
    of Egypt, and bury me in Hebron near my fathers.”

    2. And Benjamin died at one hundred and twenty-five years, in a good old age;
    and they placed him in a coffin.

    3. And in the ninety-first year after the departure of the sons of Israel from
    Egypt, they and their brothers brought up the bones of their fathers secretly,
    during the war in Canaan, and buried them in Hebron beside the feet of their fathers.

    4. And they returned from the land of Canaan, and lived in Egypt until the day
    of their departure from the land of Egypt.'
