translation:
  text: The purpose of a good man is not in the hand of the spirit of Beliar’s deceit,
    for the angel of peace guides his soul. He does not look with passion on perishable
    things, nor does he gather wealth for pleasure. He does not delight in pleasures,
    nor grieve his neighbor; he is not filled with luxury, nor led astray by the wandering
    of the eyes. For the Lord is his portion. A good purpose does not accept the glory
    or the dishonor that comes from men, and it knows no deceit or falsehood or strife
    or reviling. For the Lord dwells in him and gives light to his soul, and he rejoices
    toward all people at all times. The good mind does not have two tongues, of blessing
    and cursing, of insult and honor, of quietness and disturbance, of hypocrisy and
    truth, of poverty and wealth; rather, it has one sincere and pure disposition
    toward all. It does not have double sight or hearing; for in everything that it
    does, or speaks, or sees, it knows that the Lord is looking on his soul. And it
    cleanses the mind, so as not to be condemned by men and by God. But the disposition
    of Beliar is twofold, and it has no singleness. Flee, therefore, evil-mindedness,
    my children, and love the good mind, which the law of God knows, so that you may
    rest in hope, because the good-minded man does not have a darkened eye. He shows
    mercy to all, even if they are sinners; even if they devise evil against him,
    by doing good he overcomes evil, being shielded by what is good. And he loves
    the righteous as his own soul. If anyone is glorified, he does not envy him; if
    anyone is enriched, he is not jealous; if anyone is valiant, he praises him; the
    virtuous man he commends; on the poor man he has mercy; with the weak he has compassion;
    to God he sings praise. The one who has the grace of a good spirit he loves as
    his own soul.
