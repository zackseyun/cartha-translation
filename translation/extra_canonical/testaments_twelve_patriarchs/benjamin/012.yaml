translation:
  text: '1. And after saying these things, he stretched out his feet and fell asleep
    in a good sleep.

    2. And his sons did as he had commanded them, and they carried up his body and
    buried him in Hebron with his fathers.


    2. The number of his life was one hundred and twenty-five years. And when he had
    finished his words, he said, “I command you, my children, carry up my bones out
    of Egypt, and bury me in Hebron near my fathers.”

    2. And Benjamin died at one hundred and twenty-five years, in a good old age;
    and they placed him in a coffin.

    3. And in the ninety-first year after the departure of the sons of Israel from
    Egypt, they and their brothers brought up the bones of their fathers secretly,
    during the war in Canaan, and buried them in Hebron beside the feet of their fathers.

    4. And they returned from the land of Canaan, and lived in Egypt until the day
    of their departure from the land of Egypt.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some Greek witnesses add 'and good' after 'a good sleep.'
    reason: textual_variant
  - marker: b
    text: The chapter preserves overlapping closing notices about Benjamin's death,
      burial, and the later transfer of the patriarchs' bones. The repetition likely
      reflects a complex transmission history, but it is translated here as it stands
      in the Greek witness.
    reason: textual_variant
  - marker: c
    text: The phrase 'beside the feet of their fathers' is literal Greek and may refer
      to burial placement near the ancestral tombs rather than directly at the fathers'
      feet.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκοιμήθη ὕπνῳ καλῷ
  chosen: fell asleep in a good sleep
  alternatives:
  - slept a good sleep
  - died peacefully
  lexicon: LSJ
  rationale: Retains the testamentary euphemism of death as sleep while preserving
    the Greek repetition of sleep-language; avoids collapsing it into an interpretive
    paraphrase like 'died peacefully'.
- source_word: ἄραντες
  chosen: carried up
  alternatives:
  - took up
  - bore
  lexicon: LSJ
  rationale: The verb commonly means 'lift/carry up'; 'carried up' preserves the concrete
    movement of the body toward burial and echoes the later command to carry up the
    bones from Egypt.
- source_word: ἐντέλλομαι
  chosen: I command
  alternatives:
  - I charge
  - I instruct
  lexicon: BDAG
  rationale: Strong imperative testament language should remain strong; 'I command'
    best reflects the father's final authoritative charge.
- source_word: ἀνενέγκατε
  chosen: carry up
  alternatives:
  - bring up
  - take up
  lexicon: LSJ
  rationale: Standard rendering for bringing remains up from Egypt; kept consistent
    with the earlier narrative verb to preserve thematic linkage.
- source_word: ὀστᾶ
  chosen: bones
  alternatives:
  - remains
  lexicon: LSJ
  rationale: The Greek is concrete, not generalized; 'bones' preserves the ancestral-burial
    motif familiar from Genesis and Exodus traditions.
- source_word: ἐγγὺς τῶν πατέρων μου
  chosen: near my fathers
  alternatives:
  - close to my fathers
  - beside my fathers
  lexicon: LSJ
  rationale: Keeps the kinship language and spatial sense without overinterpreting
    the exact burial arrangement.
- source_word: ἐν γήρει καλῷ
  chosen: in a good old age
  alternatives:
  - in a good old age state
  - at a ripe old age
  lexicon: LSJ
  rationale: A traditional biblical idiom in English that matches the Greek well and
    preserves elevated register.
- source_word: ἐν παραθήκῃ
  chosen: in a coffin
  alternatives:
  - in a deposit
  - in keeping
  lexicon: LSJ
  rationale: In this burial context the sense is that his body was placed in safekeeping,
    conventionally a coffin/sarcophagus; 'coffin' gives the likely referent in readable
    English.
- source_word: ἐν κρυφῇ
  chosen: secretly
  alternatives:
  - in secret
  - concealed
  lexicon: LSJ
  rationale: Adverbial force is best conveyed by 'secretly'; it preserves the furtive
    action described in the narrative.
- source_word: παρὰ τοὺς πόδας τῶν πατέρων αὐτῶν
  chosen: beside the feet of their fathers
  alternatives:
  - at the feet of their fathers
  - near their fathers' feet
  lexicon: LSJ
  rationale: The Greek is unusually specific; the translation keeps the bodily imagery
    rather than smoothing it into a generic 'with their fathers'.
