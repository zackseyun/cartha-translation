theological_decisions:
- issue: Double ending tradition and repetitive notices in the chapter
  chosen_reading: Translate the full Greek witness as preserved, including repeated
    death and burial notices.
  alternative_readings:
  - Conflate the notices into a single smoother ending
  - Treat some lines as secondary and omit them from the main text
  rationale: The chapter as transmitted contains overlapping conclusion formulas.
    Transparency requires translating the extant Greek rather than harmonizing it
    silently.
  doctrine_reference: 'PHILOSOPHY.md: translate directly from the source text and
    document complexity rather than bury it.'
- issue: Chronological notice about the ninety-first year after the exodus
  chosen_reading: Render the chronological statement straightforwardly in the main
    text, despite historical tension.
  alternative_readings:
  - Emend the chronology
  - Interpret it loosely or paraphrastically
  rationale: The Greek witness presents a specific chronological claim. The translation
    preserves that tension rather than resolving it by conjecture.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it.'
