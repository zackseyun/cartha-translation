theological_decisions:
- issue: Moral contrast between righteous simplicity and Beliar's doubleness
  chosen_reading: Rendered διπλᾶ ... ἀπλότητα as 'twofold ... no simplicity' to preserve
    Benjamin's ethical theme of singleness versus divided evil.
  alternative_readings:
  - '''double ... no sincerity'''
  - '''duplicitous ... no single-heartedness'''
  rationale: The chapter's paraenesis depends on preserving the conceptual contrast
    rather than smoothing it into generic moral language.
  doctrine_reference: PHILOSOPHY.md consistency of key terms
- issue: Cain chronology and punishment formula
  chosen_reading: Translated the extant Greek as a sequence of seven avenging punishments
    culminating in desolation after nine hundred years.
  alternative_readings:
  - A more harmonized rendering with Genesis chronology
  - A less specific rendering that suppresses the numerical details
  rationale: The Greek witness is somewhat rough, but the numbers and repeated-plague
    idea should be retained rather than normalized away.
  doctrine_reference: DOCTRINE.md preserve theological tension rather than resolve
    it
