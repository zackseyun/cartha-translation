translation:
  text: '7. And he purifies his mind so as not to be condemned by men, and likewise
    by God. In the same way, the works of Beliar also are twofold, and they have no
    simplicity in them.


    Therefore, my children, I tell you: flee the evil of Beliar, because he gives
    a sword to those who obey him. And the sword is the mother of seven evils. First
    the mind conceives through Beliar, and these are its births: first envy, second
    destruction, third affliction, fourth captivity, fifth want, sixth turmoil, seventh
    desolation.


    Because of this, Cain was handed over to seven acts of vengeance. For in one hundred
    years the Lord brought one plague upon him after another, and in the nine-hundredth
    year he was made desolate.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The fourth evil is textually uncertain in the Greek OCR layer. Some witnesses
      read 'captivity' (αἰχμαλωσία), while the printed line here appears corrupted.
      'Captivity' is adopted because it fits the parallel witness forms and the sequence
      of calamities.
    reason: textual_variant
  - marker: b
    text: Beliar is the form found in this Greek witness; many readers will know the
      name as Belial.
    reason: lexical_alternative
  - marker: c
    text: 'The statement that the sword is ''the mother of seven evils'' is immediately
      explained by a conception/birth metaphor: the mind conceives through Beliar,
      and seven evils are born from it.'
    reason: cultural_note
lexical_decisions:
- source_word: διάνοια
  chosen: mind
  alternatives:
  - understanding
  - thought
  lexicon: LSJ
  rationale: In this testament the term refers to the inward faculty that conceives
    moral intentions and must be kept pure. 'Mind' is natural English and preserves
    the ethical-psychological focus.
- source_word: καταγνωσθῆναι
  chosen: to be condemned
  alternatives:
  - to be judged against
  - to be found guilty
  lexicon: LSJ
  rationale: The passive infinitive carries the sense of adverse judgment. 'Condemned'
    preserves the moral and forensic weight in the exhortational context.
- source_word: διπλᾶ
  chosen: twofold
  alternatives:
  - double
  - duplicitous
  lexicon: LSJ
  rationale: The immediate contrast is with ἀπλότης/simplicity. 'Twofold' keeps the
    formal contrast and suggests divided or double character without over-interpreting.
- source_word: ἀπλότης
  chosen: simplicity
  alternatives:
  - single-heartedness
  - sincerity
  lexicon: LSJ
  rationale: A key virtue in Benjamin is singleness or undividedness. 'Simplicity'
    preserves the traditional ethical term and matches the contrast with Beliar's
    doubleness.
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: Greek witness tradition
  rationale: The Greek form here is Βελίαρ. Retaining 'Beliar' reflects the witness
    text rather than normalizing to the more familiar 'Belial'.
- source_word: μάχαιρα
  chosen: sword
  alternatives:
  - knife
  - blade
  lexicon: LSJ
  rationale: The image is a weapon that generates a chain of evils. 'Sword' is the
    standard and suitably grave rendering.
- source_word: πειθομένοις
  chosen: those who obey him
  alternatives:
  - those persuaded by him
  - those who yield to him
  lexicon: LSJ
  rationale: The participle can mean being persuaded, but in this moral context it
    denotes compliance with Beliar's influence. 'Obey' brings out active submission.
- source_word: συλλαμβάνει
  chosen: conceives
  alternatives:
  - takes hold
  - receives
  lexicon: LSJ
  rationale: Given the following maternal metaphor ('mother of seven evils'), 'conceives'
    best preserves the imagery of inward generation.
- source_word: φθόνος
  chosen: envy
  alternatives:
  - jealousy
  lexicon: LSJ
  rationale: A standard vice term in these testaments. 'Envy' is the more precise
    moral category here.
- source_word: ἀπώλεια
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: LSJ
  rationale: The term denotes ruinous outcome in the vice catalogue. 'Destruction'
    is strong and readable without importing later technical theological senses.
- source_word: θλῖψις
  chosen: affliction
  alternatives:
  - distress
  - tribulation
  lexicon: LSJ
  rationale: In this sequence it names oppressive suffering resulting from evil. 'Affliction'
    is elevated yet clear.
- source_word: αἰχμαλωσία / θεηλασία
  chosen: captivity
  alternatives:
  - plundering
  - spoliation
  lexicon: LSJ
  rationale: The OCR shows textual instability at the fourth item; the parallel forms
    in the apparatus point strongly to αἰχμαλωσία. 'Captivity' fits the sequence of
    calamities and is noted as textually uncertain.
- source_word: ἔνδεια
  chosen: want
  alternatives:
  - poverty
  - need
  lexicon: LSJ
  rationale: The word denotes lack or deprivation. 'Want' is concise and preserves
    the catalogue's rhythm.
- source_word: ταραχή
  chosen: turmoil
  alternatives:
  - confusion
  - disturbance
  lexicon: LSJ
  rationale: The term indicates inner and social disorder. 'Turmoil' is vivid and
    idiomatic in a vice sequence.
- source_word: ἐρήμωσις
  chosen: desolation
  alternatives:
  - devastation
  - wilderness-making
  lexicon: LSJ
  rationale: This is the culminating state of ruin. 'Desolation' preserves both the
    severity and the biblical register.
- source_word: ἐκδικίαις
  chosen: acts of vengeance
  alternatives:
  - vengeances
  - punishments
  lexicon: LSJ
  rationale: The plural denotes repeated avenging judgments. 'Acts of vengeance' is
    more idiomatic than a bare plural while keeping the judicial sense.
- source_word: παρεδόθη
  chosen: was handed over
  alternatives:
  - was delivered up
  - was given over
  lexicon: LSJ
  rationale: This passive suggests being consigned to judgment. 'Was handed over'
    preserves the force without overloading the phrase.
- source_word: πληγή
  chosen: plague
  alternatives:
  - blow
  - stroke
  lexicon: LSJ
  rationale: In punitive contexts the noun often denotes a divinely inflicted blow.
    'Plague' communicates repeated punitive striking in accessible English.
- source_word: ἐρημοῦται
  chosen: was made desolate
  alternatives:
  - was laid waste
  - became desolate
  lexicon: LSJ
  rationale: The passive/resultative sense suits the culmination of Cain's punishment
    and echoes the seventh evil, ἐρήμωσις.
