theological_decisions:
- issue: Rendering μετανοεῖ in v. 4
  chosen_reading: changes his mind
  alternative_readings:
  - repents
  rationale: The immediate sense is a reversal of attitude when the offender encounters
    the holy man's merciful silence. This fits the project's context-sensitive policy
    for μετανοέω in cognitive settings.
  doctrine_reference: 'DOCTRINE.md: μετανοέω → change of mind / repent by context'
- issue: How literally to render the difficult phrase φόβος ἀγαθῶν ἔργων in v. 3
  chosen_reading: the fear of good works
  alternative_readings:
  - reverence for good works
  - fear produced by good works
  rationale: The Greek construction is awkward and somewhat ambiguous. Rather than
    resolve it interpretively in the main text, the translation preserves the wording
    closely and notes the alternatives.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it'
