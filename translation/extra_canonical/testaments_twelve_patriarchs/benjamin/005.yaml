translation:
  text: '1. If, then, you also have a good mind, even wicked people will be at peace
    with you, and the lawless, being put to shame before you, will turn back to what
    is good; and those who are greedy will not only withdraw from their passion, but
    will also give to those in distress the things of greed that they had possessed.


    2. If you are doing good, even the unclean spirits will flee from you, and the
    wild beasts will fear you.


    3. For where there is the fear of good works and light in the mind, darkness flees
    away from it.


    4. For if anyone does violence to a holy man as to the light, he changes his mind;
    for the holy one has mercy on those who revile him and keeps silent.


    5. And if anyone betrays a righteous soul and insults a righteous soul, the righteous
    man prays; and even if for a little while he is brought low, before long he appears
    far more radiant, as Joseph my brother also became.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dissolute' or 'the reckless' for 'the lawless' (ἄσωτοι).
    reason: lexical_alternative
  - marker: b
    text: Literally 'the things of greed'; possibly 'the gains of greed' or 'what
      they had acquired by greed.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'the fear of good works' is difficult. It may mean reverence
      associated with good deeds or fear produced by a life of goodness.
    reason: alternative_reading
  - marker: d
    text: '''Changes his mind'' renders μετανοεῖ; alternatively, ''repents.'''
    reason: lexical_alternative
  - marker: e
    text: 'Joseph''s story is the model: though humbled for a time, he was later shown
      to be glorious and vindicated. See Genesis 37; 39–45.'
    reason: cross_reference
lexical_decisions:
- source_word: διάνοιαν
  chosen: mind
  alternatives:
  - understanding
  - disposition
  lexicon: LSJ
  rationale: In this testament Benjamin emphasizes inward moral orientation. 'Mind'
    preserves the cognitive-ethical sense without over-psychologizing; 'good mind'
    also echoes the chapter's repeated concern with inner simplicity and moral intention.
- source_word: εἰρηνεύσουσιν
  chosen: will be at peace
  alternatives:
  - will make peace
  - will live peaceably
  lexicon: LSJ
  rationale: The future here describes the resulting relation of wicked people toward
    the hearers. 'Will be at peace with you' is idiomatic and preserves the relational
    force of μετά.
- source_word: ἄσωτοι
  chosen: the lawless
  alternatives:
  - the dissolute
  - the reckless
  - the prodigal
  lexicon: LSJ
  rationale: The term can denote wasteful or debauched persons, but in this paraenetic
    context the stress is moral disorder rather than financial prodigality. 'Lawless'
    best fits the contrast with turning back to the good.
- source_word: αἰδεσθέντες
  chosen: being put to shame
  alternatives:
  - feeling shame
  - being ashamed
  lexicon: LSJ
  rationale: The participle marks a moral reaction produced by the sons' good disposition.
    'Being put to shame before you' captures both inward shame and the social dimension.
- source_word: ἐπιστρέψουσιν εἰς τὸ ἀγαθόν
  chosen: will turn back to what is good
  alternatives:
  - will return to goodness
  - will turn to the good
  lexicon: LSJ
  rationale: ἐπιστρέφω often carries the sense of turning back or returning. 'What
    is good' preserves the article and keeps the ethical object concrete.
- source_word: πλεονεκτοῦντες
  chosen: those who are greedy
  alternatives:
  - the covetous
  - those who exploit
  lexicon: LSJ
  rationale: The participle denotes persons characterized by grasping acquisitiveness.
    'Greedy' is readable modern English and fits the vice vocabulary.
- source_word: τοῦ πάθους
  chosen: their passion
  alternatives:
  - their craving
  - their vice
  lexicon: LSJ
  rationale: πάθος here is the inward drive behind greed. 'Passion' preserves the
    moral-psychological sense; the possessive clarifies the referent in English.
- source_word: τὰ τῆς πλεονεξίας
  chosen: the things of greed
  alternatives:
  - the gains of greed
  - what they acquired by greed
  lexicon: LSJ
  rationale: The Greek is somewhat compressed. A relatively literal rendering keeps
    the phrase auditable and avoids over-interpreting the exact mechanism of acquisition.
- source_word: θλιβομένοις
  chosen: those in distress
  alternatives:
  - the afflicted
  - the oppressed
  lexicon: LSJ
  rationale: The participle denotes people under pressure or affliction. 'Those in
    distress' is broad enough to preserve the Greek without narrowing to persecution
    alone.
- source_word: ἀκάθαρτα πνεύματα
  chosen: unclean spirits
  alternatives:
  - impure spirits
  lexicon: BDAG
  rationale: This is the standard rendering for morally defiling spiritual beings
    in Greek Jewish and early Christian literature.
- source_word: φόβος ἀγαθῶν ἔργων
  chosen: the fear of good works
  alternatives:
  - reverence arising from good deeds
  - fear produced by good works
  lexicon: LSJ
  rationale: The phrase is difficult, but the Greek is best represented transparently
    rather than paraphrased away. The genitive is left somewhat open in English, with
    a footnote noting the interpretive difficulty.
- source_word: ὑβρίσει
  chosen: does violence
  alternatives:
  - insults
  - outrages
  lexicon: LSJ
  rationale: The verb can denote insolent mistreatment more forceful than mere verbal
    insult. 'Does violence' preserves the severity, especially in a moral exhortation
    context.
- source_word: μετανοεῖ
  chosen: changes his mind
  alternatives:
  - repents
  lexicon: BDAG
  rationale: Per project policy, cognitive contexts favor 'change of mind.' Here the
    offender, confronted by the holy man's response, reverses course; the broader
    moral sense remains clear.
- source_word: λοιδορούντων
  chosen: those who revile him
  alternatives:
  - those who insult him
  - his abusers
  lexicon: LSJ
  rationale: The participle refers to verbal abuse. 'Revile' keeps the elevated register
    and the moral sharpness of the testament genre.
- source_word: ταπεινωθῇ
  chosen: is brought low
  alternatives:
  - is humbled
  - is humiliated
  lexicon: LSJ
  rationale: The passive indicates temporary abasement. 'Is brought low' preserves
    both external humiliation and lowered condition without forcing one nuance.
- source_word: φαιδρότερος
  chosen: more radiant
  alternatives:
  - more cheerful
  - more splendid
  lexicon: LSJ
  rationale: In the Joseph comparison the sense is not merely emotional cheerfulness
    but conspicuous vindication and brightness after humiliation. 'More radiant' fits
    the imagery.
