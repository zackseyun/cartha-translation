theological_decisions:
- issue: Whether to include the bracketed prophetic material in verses 3–5
  chosen_reading: Included in the main text, with transparency that the passage is
    textually complex and likely secondary in some witnesses.
  alternative_readings:
  - Omit verses 3–5 as later interpolation
  - Print only verses 1–2 from the shorter form
  rationale: The supplied Greek witness includes the bracketed material, and the task
    is to translate the Greek chapter honestly. Because the material is marked as
    textually distinct in the source presentation, it is translated but flagged in
    footnotes rather than silently excluded.
  doctrine_reference: 'PHILOSOPHY.md: translate what is in the Greek witness honestly,
    and use notes rather than silently harmonizing.'
- issue: How to render μονογενοῦς προφήτου
  chosen_reading: '''of an only-begotten prophet'''
  alternative_readings:
  - '''of a unique prophet'''
  - '''of an only son, a prophet'''
  rationale: The Greek construction is unusual and theologically charged. The translation
    preserves the lexical force of μονογενής rather than weakening it, while a footnote
    records the possibility of 'unique' as a lexical alternative.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it.'
- issue: Referent of 'the Lord' in verse 3
  chosen_reading: Retained as 'the Lord will be treated with outrage' without interpretive
    substitution.
  alternative_readings:
  - '''the Lord''s anointed will be treated with outrage'''
  - '''the prophet will be treated with outrage'''
  rationale: The Greek text says Κύριος. Rather than harmonizing the referent to later
    theological expectations, the translation keeps the wording and lets the tension
    stand.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve theological
    tension rather than resolve it.'
