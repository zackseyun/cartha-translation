translation:
  text: '1. And I tell you also, from the words of Enoch the righteous, that you will
    commit the fornication of Sodom, and you will perish for a little while. Then
    you will be renewed again, and the kingdom of the Lord will not be among you.
    2. Nevertheless, in your allotted portion there will be the temple of God, and
    the last will be more glorious than the first; and there the twelve tribes will
    be gathered, and all the nations, until the Most High sends his salvation in the
    visitation of an only-begotten prophet.


    3. And he will enter into the first temple, and there the Lord will be treated
    with outrage, and he will be lifted up on wood. 4. And the curtain-spread of the
    temple will be torn, and the Spirit of God will pass over to the nations, like
    fire being poured out. 5. And when he has gone up from Hades, he will pass from
    earth to heaven. And I know how lowly he will be on earth, and how glorious in
    heaven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verses 3–5 are textually uncertain in the witness tradition and are often
      regarded as a later expansion; they are translated here because they stand in
      the supplied Greek text.
    reason: textual_variant
  - marker: b
    text: Or 'of a unique prophet' for 'of an only-begotten prophet.'
    reason: lexical_alternative
  - marker: c
    text: '''Lifted up on wood'' is a literal rendering of the Greek phrase; compare
      the idiom of being raised on a tree/wooden stake.'
    reason: lexical_alternative
  - marker: d
    text: '''Curtain-spread'' renders an unusual Greek term for a temple hanging;
      many readers may understand it as the temple veil.'
    reason: lexical_alternative
  - marker: e
    text: Hades is the realm of the dead, not necessarily the final place of punishment.
    reason: cultural_note
lexical_decisions:
- source_word: πορνεύσετε / πορνείαν
  chosen: you will commit the fornication
  alternatives:
  - you will practice sexual immorality
  - you will whore
  lexicon: BDAG
  rationale: The doubled verb+noun construction is emphatic in Greek. 'Commit the
    fornication' preserves the solemn, accusatory force better than a smoother paraphrase.
    'Fornication' also keeps the vice-list register of testamentary exhortation.
- source_word: Σοδόμων
  chosen: of Sodom
  alternatives:
  - like Sodom
  - of the Sodomites
  lexicon: LSJ
  rationale: The genitive is kept compactly as 'of Sodom,' preserving the allusive
    force to the city's notorious sin without over-interpreting the exact nuance.
- source_word: ἀπολεῖσθε ἕως βραχύ
  chosen: you will perish for a little while
  alternatives:
  - you will be destroyed for a short time
  - you will perish before long
  lexicon: BDAG
  rationale: The phrase appears to indicate a limited period of destruction or loss
    before renewal. 'For a little while' preserves that temporal limitation and the
    prophetic cadence.
- source_word: ἀνανεωθήσεσθε
  chosen: you will be renewed again
  alternatives:
  - you will be restored
  - you will be made new again
  lexicon: BDAG
  rationale: The future passive suggests renewal/restoration after judgment. 'Renewed'
    keeps the verbal link to newness without importing a more technical theological
    term.
- source_word: βασιλεία Κυρίου
  chosen: kingdom of the Lord
  alternatives:
  - reign of the Lord
  lexicon: BDAG
  rationale: '''Kingdom'' is the standard rendering and fits both the concrete and
    reign-oriented sense here.'
- source_word: ἐν μερίδι ὑμῶν
  chosen: in your allotted portion
  alternatives:
  - in your share
  - in your territory
  lexicon: LSJ
  rationale: The phrase likely refers to Benjamin's tribal allotment. 'Allotted portion'
    preserves the inheritance/distribution sense.
- source_word: ναὸς Θεοῦ
  chosen: temple of God
  alternatives:
  - sanctuary of God
  lexicon: BDAG
  rationale: ναός here naturally refers to the temple, especially in the prophetic
    sequence that follows.
- source_word: ὁ ἔσχατος ἔνδοξος ὑπὲρ τὸν πρῶτον
  chosen: the last will be more glorious than the first
  alternatives:
  - the latter will be more glorious than the former
  lexicon: LSJ
  rationale: This preserves the comparative contrast between first and last temple/stage
    in clear English while retaining the prophetic parallelism.
- source_word: συναχθήσονται
  chosen: will be gathered
  alternatives:
  - will be assembled
  lexicon: BDAG
  rationale: A standard prophetic gathering term; 'gathered' preserves biblical resonance.
- source_word: τὸ σωτήριον αὐτοῦ
  chosen: his salvation
  alternatives:
  - his deliverance
  - the salvation that comes from him
  lexicon: BDAG
  rationale: The noun can denote saving help or salvation. 'His salvation' keeps the
    compact prophetic wording.
- source_word: ἐν ἐπισκοπῇ
  chosen: in the visitation
  alternatives:
  - at the visitation
  - in oversight
  lexicon: BDAG
  rationale: The phrase likely denotes a decisive divine visitation. 'In the visitation'
    preserves the formal prophetic idiom and leaves the exact nuance open.
- source_word: μονογενοῦς προφήτου
  chosen: of an only-begotten prophet
  alternatives:
  - of a unique prophet
  - of an only prophet
  lexicon: BDAG
  rationale: μονογενής is theologically charged and often rendered 'only-begotten'
    in traditional Christian contexts. Because the Greek witness uses the term plainly,
    the translation preserves it rather than diluting it to 'unique,' while noting
    the textual/theological sensitivity elsewhere.
- source_word: ὑβρισθήσεται
  chosen: will be treated with outrage
  alternatives:
  - will be insulted
  - will be abused
  lexicon: BDAG
  rationale: The passive conveys shameful mistreatment. 'Treated with outrage' preserves
    the gravity and public dishonor.
- source_word: ἐπὶ ξύλου ὑψωθήσεται
  chosen: will be lifted up on wood
  alternatives:
  - will be raised on a tree
  - will be exalted on wood
  lexicon: BDAG
  rationale: ξύλον literally means 'wood/tree.' 'On wood' preserves the stark literal
    wording and allows readers to hear the allusive force without over-specifying.
- source_word: τὸ ἅπλωμα τοῦ ναοῦ σχιζόμενον
  chosen: the curtain-spread of the temple will be torn
  alternatives:
  - the veil of the temple will be torn
  - the hanging of the temple will be split
  lexicon: LSJ
  rationale: ἅπλωμα is not the usual NT word for veil; 'curtain-spread' keeps the
    image broad and literal while signaling temple drapery.
- source_word: μεταβήσεται τὸ πνεῦμα τοῦ Θεοῦ ἐπὶ τὰ ἔθνη
  chosen: the Spirit of God will pass over to the nations
  alternatives:
  - will transfer to the nations
  - will come upon the nations
  lexicon: BDAG
  rationale: μεταβαίνω suggests movement/transition. 'Pass over to' preserves the
    sense of transfer without making a stronger doctrinal claim than the Greek itself.
- source_word: ὥσπερ πῦρ ἐκχυνόμενον
  chosen: like fire being poured out
  alternatives:
  - like poured-out fire
  - like fire poured forth
  lexicon: LSJ
  rationale: The simile is vivid and unusual; this rendering keeps both the fire image
    and the outpouring motif.
- source_word: ἀνελθὼν ἐκ τοῦ ᾅδου
  chosen: when he has gone up from Hades
  alternatives:
  - having ascended from Hades
  - having come up from the realm of the dead
  lexicon: BDAG
  rationale: ᾅδης is best left as 'Hades' in this literature rather than flattened
    to 'hell.' The participle is rendered temporally for smoother English.
- source_word: ταπεινός
  chosen: lowly
  alternatives:
  - humble
  - brought low
  lexicon: BDAG
  rationale: '''Lowly'' preserves both humility and humble condition, fitting the
    contrast with heavenly glory.'
- source_word: ἔνδοξος
  chosen: glorious
  alternatives:
  - full of glory
  - honored
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the antithesis with 'lowly.'
