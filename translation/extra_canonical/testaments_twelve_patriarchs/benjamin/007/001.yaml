translation:
  text: '7. And he purifies his mind so as not to be condemned by men, and likewise
    by God. In the same way, the works of Beliar also are twofold, and they have no
    simplicity in them.


    Therefore, my children, I tell you: flee the evil of Beliar, because he gives
    a sword to those who obey him. And the sword is the mother of seven evils. First
    the mind conceives through Beliar, and these are its births: first envy, second
    destruction, third affliction, fourth captivity, fifth want, sixth turmoil, seventh
    desolation.


    Because of this, Cain was handed over to seven acts of vengeance. For in one hundred
    years the Lord brought one plague upon him after another, and in the nine-hundredth
    year he was made desolate.'
