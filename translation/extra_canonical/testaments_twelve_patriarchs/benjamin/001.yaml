theological_decisions:
- issue: Meaning of Benjamin's name in the Greek witness
  chosen_reading: Translate the explicit Greek etymology as 'son of days'
  alternative_readings:
  - Retain the traditional Hebrew-based explanation 'son of the right hand'
  - Interpret idiomatically as 'son of old age'
  rationale: The chapter itself gives an internal Greek explanation, ὅ ἐστιν υἱὸς
    ἡμερῶν. Transparency requires translating the witness before us rather than harmonizing
    to Genesis or later tradition.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    textual tension rather than resolve it
