translation:
  text: 'The Copy of the Words of Benjamin, the twelfth son of Jacob, which he set
    in order for his sons, when he had lived one hundred and twenty-five years.


    And after kissing them, he said:


    Just as Isaac was born to Abraham in his old age, so I also was born to Jacob.
    And since Rachel my mother died while giving birth to me, I had no milk; so I
    was nursed by Bilhah, her maidservant. For Rachel was barren for twelve years
    after she had borne Joseph; and she prayed to the Lord with fasting, and after
    conceiving she bore me. For my father loved Rachel exceedingly, and he prayed
    to see two sons from her. Because of this I was called Benjamin, which means son
    of days.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Genesis more commonly explains the name Benjamin differently; here the Greek
      testament gives the etymology 'son of days.'
    reason: cross_reference
  - marker: b
    text: 'The Greek line about Rachel''s death at Benjamin''s birth is textually
      awkward in this OCR layer, but the sense is clear in context: she died in giving
      birth to him.'
    reason: textual_variant
lexical_decisions:
- source_word: διέθετο
  chosen: set in order
  alternatives:
  - ordained
  - arranged
  - gave as a testament
  lexicon: LSJ
  rationale: In testamentary context the verb introduces Benjamin's formal final charge
    to his sons. 'Set in order' preserves the sense of deliberate disposition without
    overloading the line with legal English.
- source_word: Καταφιλήσας
  chosen: after kissing
  alternatives:
  - having kissed affectionately
  - embracing with kisses
  lexicon: LSJ
  rationale: The compound verb conveys affectionate repeated kissing. 'After kissing
    them' is natural English and preserves the tender father-to-sons setting.
- source_word: ἐν γήρει αὐτοῦ
  chosen: in his old age
  alternatives:
  - when he was old
  lexicon: LSJ
  rationale: This is the idiomatic sense in the Abraham-Isaac comparison and keeps
    the elevated register.
- source_word: ἑκατοστῷ τέθνηκε γεννῶσά με
  chosen: died while giving birth to me
  alternatives:
  - died at my birth
  - died bearing me
  lexicon: LSJ
  rationale: 'The OCR line is difficult, but the sense is clear from the Greek context
    and the Benjamin birth tradition: Rachel died in connection with Benjamin''s birth.
    The chosen rendering is idiomatic and faithful to the event described.'
- source_word: γάλα οὐκ ἔσχον
  chosen: I had no milk
  alternatives:
  - I did not have milk
  - there was no milk for me
  lexicon: LSJ
  rationale: A literal rendering sounds abrupt but fits the autobiographical style.
    It implies the absence of maternal nursing because Rachel died.
- source_word: ἐθήλασα
  chosen: I was nursed
  alternatives:
  - I suckled
  - I was suckled
  lexicon: LSJ
  rationale: Passive sense in English is clearer here, since Bilhah is the one providing
    milk.
- source_word: στείρευσεν
  chosen: was barren
  alternatives:
  - remained barren
  lexicon: LSJ
  rationale: Standard rendering for infertility language; preserves the pathos of
    Rachel's delayed second childbirth.
- source_word: πρὸς Κύριον
  chosen: to the Lord
  alternatives:
  - before the Lord
  lexicon: LSJ
  rationale: The direction of prayer is explicit. 'Lord' follows project policy for
    κύριος.
- source_word: μετὰ νηστείας
  chosen: with fasting
  alternatives:
  - while fasting
  lexicon: LSJ
  rationale: Keeps the concise ascetic note without paraphrase.
- source_word: συλλαβοῦσα
  chosen: after conceiving
  alternatives:
  - having conceived
  lexicon: LSJ
  rationale: Temporal participle best carried by 'after conceiving' in smooth English.
- source_word: Σφόδρα ἠγάπα
  chosen: loved exceedingly
  alternatives:
  - loved greatly
  - loved very much
  lexicon: LSJ
  rationale: Retains elevated testamentary tone and the intensity marked by σφόδρα.
- source_word: υἱὸς ἡμερῶν
  chosen: son of days
  alternatives:
  - son of the right hand
  - son of old age
  lexicon: LSJ
  rationale: The Greek text explicitly glosses Benjamin as 'son of days.' Even though
    the Hebrew name is traditionally explained otherwise, the translation should reflect
    the Greek witness and preserve the textual distinctiveness.
