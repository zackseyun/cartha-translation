translation:
  text: 1. Now therefore, my children, you also must love the Lord, the God of heaven
    and earth, and keep his commandments, imitating the good and holy man Joseph.
    2. And let your mind be set on what is good, as you know mine has been. For the
    one who has a right mind sees everything rightly. 3. Fear the Lord and love your
    neighbor; and if the spirits of Beliar should drive you into every wickedness
    of affliction, they will certainly not rule over you, just as they did not over
    Joseph my brother. 4. How many men wanted to kill him, yet God sheltered him.
    For the one who fears God and loves his neighbor cannot be struck by the spirit
    of Beliar, being sheltered by the fear of God. 5. And he cannot be mastered by
    the plots of men or of beasts, since the Lord helps him through the love that
    he has toward his neighbor. 6. For Joseph also begged our father to pray for his
    brothers, so that the Lord would not reckon sin to them, because they had done
    evil against him. 7. And thus Jacob cried out, “O good child, you have stirred
    the inward affection of Jacob your father”; and embracing him, for two hours he
    kept kissing him, saying, 8. “The heavenly prophecy will be fulfilled upon you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some witnesses expand verse 5 with wording about beasts or an 'aerial spirit,'
      reflecting textual instability in the description of hostile powers.
    reason: textual_variant
  - marker: b
    text: Or 'The prophecy from heaven will be fulfilled concerning you.' The prepositional
      wording varies slightly in the witnesses.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγαπήσατε
  chosen: love
  alternatives:
  - show love to
  - belove
  lexicon: BDAG
  rationale: Standard imperative of ἀγαπάω; 'love' preserves the ethical and covenantal
    force without paraphrase.
- source_word: φυλάξατε ἐντολάς
  chosen: keep his commandments
  alternatives:
  - guard his commandments
  - observe his commandments
  lexicon: BDAG
  rationale: '''Keep'' is idiomatic and faithful for commandment language in exhortation
    contexts.'
- source_word: μιμούμενοι
  chosen: imitating
  alternatives:
  - following the example of
  - copying
  lexicon: BDAG
  rationale: Retains the participial sense and paraenetic force of moral imitation.
- source_word: διάνοια
  chosen: mind
  alternatives:
  - understanding
  - disposition
  lexicon: BDAG
  rationale: In this chapter the term denotes moral-intellectual orientation; 'mind'
    keeps the repeated thematic thread stable.
- source_word: εἰς τὸ ἀγαθόν
  chosen: set on what is good
  alternatives:
  - toward the good
  - for good
  lexicon: BDAG
  rationale: A slightly idiomatic rendering that preserves the directional sense while
    reading naturally in English exhortation.
- source_word: ὀρθὴν ... ὀρθῶς
  chosen: right mind ... rightly
  alternatives:
  - sound mind ... correctly
  - upright mind ... straightly
  lexicon: BDAG
  rationale: Preserves the rhetorical repetition between adjective and adverb.
- source_word: πλησίον
  chosen: neighbor
  alternatives:
  - fellow human
  - one near you
  lexicon: BDAG
  rationale: Established ethical term with strong scriptural resonance; best fit for
    the paraenetic context.
- source_word: τὰ πνεύματα τοῦ Βελίαρ
  chosen: the spirits of Beliar
  alternatives:
  - the spirits of Belial
  - Beliar's spirits
  lexicon: BDAG
  rationale: The Greek witness has the proper name Βελίαρ; transliterating preserves
    the testamentary-apocalyptic idiom.
- source_word: ἐκστήσωσι
  chosen: drive
  alternatives:
  - throw
  - derange
  - cast
  lexicon: LSJ
  rationale: In context of hostile spiritual pressure into wickedness, 'drive' best
    captures coercive movement without overinterpreting psychological nuance.
- source_word: κατακυριεύσωσιν
  chosen: rule over
  alternatives:
  - master
  - dominate
  lexicon: BDAG
  rationale: Conveys hostile lordship while remaining readable; the future negation
    is rendered emphatically with 'certainly not' in context.
- source_word: ἐσκέπασεν
  chosen: sheltered
  alternatives:
  - covered
  - protected
  lexicon: BDAG
  rationale: Matches the protective imagery and coheres with the repeated sheltering
    motif in the passage.
- source_word: πληγῆναι
  chosen: be struck
  alternatives:
  - be smitten
  - be wounded
  lexicon: BDAG
  rationale: Keeps the passive verbal force and the sense of being hit by hostile
    power.
- source_word: σκεπαζόμενος
  chosen: being sheltered
  alternatives:
  - being covered
  - being protected
  lexicon: BDAG
  rationale: Preserves the participial linkage to God's protective covering.
- source_word: ἐπιβουλή
  chosen: plots
  alternatives:
  - schemes
  - treachery
  lexicon: BDAG
  rationale: '''Plots'' fits the hostile human intent in a testamentary warning context.'
- source_word: κατακυριευθῆναι
  chosen: be mastered
  alternatives:
  - be dominated
  - be ruled over
  lexicon: BDAG
  rationale: Varied slightly from verse 3 for English style while preserving the same
    domination semantic field; documented for consistency audit.
- source_word: ἐδεήθη
  chosen: begged
  alternatives:
  - implored
  - entreated
  lexicon: BDAG
  rationale: Captures earnest petition with emotional force appropriate to Joseph's
    intercession.
- source_word: λογίσηται ... ἁμαρτίαν
  chosen: reckon sin
  alternatives:
  - count as sin
  - impute sin
  lexicon: BDAG
  rationale: '''Reckon'' preserves the accounting metaphor of λογίζομαι without importing
    later technical jargon too strongly.'
- source_word: σπλάγχνα
  chosen: inward affection
  alternatives:
  - compassion
  - heart
  lexicon: BDAG
  rationale: The term denotes deep visceral affection; 'inward affection' preserves
    that embodied emotional sense better than the flatter 'heart'.
- source_word: περιλαβών
  chosen: embracing
  alternatives:
  - taking in his arms
  - clasping
  lexicon: BDAG
  rationale: Simple and faithful rendering of the physical gesture.
- source_word: κατεφίλει
  chosen: kept kissing
  alternatives:
  - kissed repeatedly
  - covered with kisses
  lexicon: BDAG
  rationale: The imperfect/intensive sense is important; 'kept kissing' preserves
    the repeated action.
- source_word: προφητεία οὐράνιος
  chosen: the heavenly prophecy
  alternatives:
  - the prophecy from heaven
  - the heavenly oracle
  lexicon: BDAG
  rationale: A formal rendering that preserves the elevated testamentary register
    and prophetic tone.
