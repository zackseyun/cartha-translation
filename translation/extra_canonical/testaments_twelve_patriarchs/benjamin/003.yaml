theological_decisions:
- issue: Reference of protective agency in verse 4
  chosen_reading: The one fearing God and loving neighbor is protected from the spirit
    of Beliar by God's fear as a sheltering power.
  alternative_readings:
  - The fear of God is subjective reverence only
  - The text refers to an aerial spirit in a variant reading
  rationale: The main Greek line emphasizes being 'sheltered by the fear of God';
    this is retained as the text's own theological idiom rather than reduced to mere
    psychology.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Intercession language in verse 6
  chosen_reading: Joseph asks that the Lord not reckon sin to his brothers.
  alternative_readings:
  - Joseph himself directly forgives without reference to divine reckoning
  - The line is a later harmonizing expansion
  rationale: The Greek witness explicitly frames Joseph's mercy as intercessory prayer
    concerning divine reckoning; this is translated honestly without harmonization.
