theological_decisions:
- issue: Messianic/prophetic figure in vv. 2-5 amid textually expanded wording
  chosen_reading: Translate the Greek witness as referring to a future figure arising
    from Benjamin's seed, while preserving the exalted and possibly interpolated features
    in notes rather than suppressing them.
  alternative_readings:
  - A purely tribal leader from Benjamin
  - A later Christianized messianic portrait
  - A composite text blending Benjaminite and broader messianic expectations
  rationale: The Greek text is textually complex and likely expanded, but the translation
    should represent the extant witness honestly. The language of enlightening the
    nations and enduring fame is retained without harmonizing it to later canonical
    formulas.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
- issue: ἔθνη in this chapter
  chosen_reading: Translate as 'nations' in the main text.
  alternative_readings:
  - Gentiles
  rationale: In this Jewish testamentary context, 'nations' preserves the broader
    collective sense and avoids prematurely narrowing the term to a later Christian
    insider/outsider contrast.
