translation:
  text: '1 No longer shall I be called a ravening wolf because of your ravaging, but
    a worker of the Lord, distributing food to those who labor in what is good.

    2 And in the last times there shall arise from my seed one beloved of the Lord,
    hearing his voice and doing the good pleasure of his will, enlightening all the
    nations with new knowledge, entering upon Israel in salvation, and snatching away
    from them as a wolf, and giving to the gathering of the nations.

    3 Until the consummation of the age he shall be in the assemblies of the nations
    and among their rulers, like a musical strain in the mouth of all.

    4 And in holy books he shall be recorded, both his work and his word; and he shall
    be God''s chosen one forever.

    5 And through him he shall pass through again as Jacob my father, saying, “He
    will fill up what is lacking in your tribe.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek of this chapter is textually difficult, especially in verse 2,
      where the witness appears expanded and partially duplicated. The translation
      follows the extant Greek while preserving its ambiguities.
    reason: textual_variant
  - marker: b
    text: Or 'intervening in Israel with salvation' for 'entering upon Israel in salvation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'assembly of the nations' for 'gathering of the nations.'
    reason: lexical_alternative
  - marker: d
    text: '''Until the consummation of the age'' may also be rendered ''until the
      end of the age.'''
    reason: lexical_alternative
  - marker: e
    text: The final line is obscure. 'Through him he shall pass through again as Jacob
      my father' may reflect a promise of renewed visitation or representation through
      the future figure.
    reason: textual_variant
lexical_decisions:
- source_word: λύκος ἅρπαξ
  chosen: ravening wolf
  alternatives:
  - rapacious wolf
  - wolf that seizes
  lexicon: LSJ
  rationale: Preserves the vivid testamentary image and the predatory force of ἅρπαξ
    without flattening it to a generic 'violent man.'
- source_word: ἁρπαγάς
  chosen: ravaging
  alternatives:
  - plunderings
  - acts of seizure
  lexicon: LSJ
  rationale: Keeps the wordplay with λύκος ἅρπαξ and conveys destructive taking; 'ravaging'
    reads naturally in English while retaining violence.
- source_word: ἐργάτης Κυρίου
  chosen: worker of the Lord
  alternatives:
  - laborer of the Lord
  - servant of the Lord
  lexicon: BDAG
  rationale: ἐργάτης is specifically one who works/labors; 'worker' preserves the
    concrete contrast with the former wolf imagery.
- source_word: διαδιδούς τροφήν
  chosen: distributing food
  alternatives:
  - giving out nourishment
  - apportioning food
  lexicon: LSJ
  rationale: A straightforward rendering that preserves the active beneficent reversal
    of the earlier predatory image.
- source_word: ἀγαπητὸς Κυρίου
  chosen: beloved of the Lord
  alternatives:
  - dear to the Lord
  lexicon: BDAG
  rationale: A stable and elevated rendering appropriate to prophetic/testamentary
    diction.
- source_word: ἐν ὑστέροις καιροῖς
  chosen: in the last times
  alternatives:
  - in later times
  - in the latter days
  lexicon: LSJ
  rationale: Retains eschatological coloring without importing overly fixed canonical
    phrasing.
- source_word: γνῶσιν καινήν φωτίζων πάντα τὰ ἔθνη
  chosen: enlightening all the nations with new knowledge
  alternatives:
  - giving light of new knowledge to all the nations
  - illumining all the Gentiles with fresh knowledge
  lexicon: BDAG
  rationale: Keeps both the illumination metaphor and the object 'new knowledge';
    'nations' fits ἔθνη in this Jewish testamentary setting.
- source_word: ἐπεμβαίνων τὸν Ἰσραὴλ ἐν σωτηρίᾳ
  chosen: entering upon Israel in salvation
  alternatives:
  - coming to Israel for salvation
  - intervening in Israel with salvation
  lexicon: LSJ
  rationale: The Greek is difficult; this rendering stays close to the verbal image
    of approach/intervention while preserving the salvation motif.
- source_word: ἁρπάζων ὡς λύκος ἀπ᾽ αὐτῶν
  chosen: snatching away from them as a wolf
  alternatives:
  - seizing from them like a wolf
  - carrying off from them as a wolf
  lexicon: BDAG
  rationale: Preserves the renewed wolf simile and the force of ἁρπάζω; the object
    is left implicit as in the Greek.
- source_word: συναγωγῇ τῶν ἐθνῶν
  chosen: the gathering of the nations
  alternatives:
  - the assembly of the nations
  - the congregation of the Gentiles
  lexicon: LSJ
  rationale: Avoids over-ecclesial resonance while preserving the collective sense
    of συναγωγή.
- source_word: συντελείας τοῦ αἰῶνος
  chosen: the consummation of the age
  alternatives:
  - the end of the age
  - the completion of the age
  lexicon: BDAG
  rationale: A natural elevated rendering that preserves eschatological force.
- source_word: συναγωγαῖς ἐθνῶν
  chosen: assemblies of the nations
  alternatives:
  - synagogues of the nations
  - gatherings of the Gentiles
  lexicon: LSJ
  rationale: '''Assemblies'' communicates the public/corporate setting without misleadingly
    suggesting formal Jewish synagogues among non-Jews.'
- source_word: μουσικὸν μέλος
  chosen: a musical strain
  alternatives:
  - a melody
  - a song-fragment
  lexicon: LSJ
  rationale: Captures the poetic comparison and the sense of something pleasing on
    everyone's lips.
- source_word: ἐν βίβλοις ἁγίαις
  chosen: in holy books
  alternatives:
  - in sacred books
  - in holy writings
  lexicon: LSJ
  rationale: A direct rendering that preserves the textual memorial motif.
- source_word: ἐκλεκτὸς Θεοῦ
  chosen: God's chosen one
  alternatives:
  - chosen of God
  - elect of God
  lexicon: BDAG
  rationale: Readable modern English while retaining theological weight.
- source_word: φοιτήσει
  chosen: he shall pass through again
  alternatives:
  - he shall visit
  - he shall appear
  lexicon: LSJ
  rationale: The verb can denote coming/visiting; 'pass through again' reflects the
    movement sense and the somewhat enigmatic wording of the Greek.
- source_word: ἀναπληρώσει τὰ ὑστερήματα
  chosen: he will fill up what is lacking
  alternatives:
  - he will make up the deficiencies
  - he will complete the lacks
  lexicon: BDAG
  rationale: Preserves the idiom of supplying deficiency without overinterpreting
    the exact lack in view.
