  rationale: The Ge'ez phrase `እንተ፡ ባቲ፡` (literally 'which in it/her') functions here as a conjunction meaning 'in that', 'since', or 'that'. There is no feminine antecedent like 'day' (`ዕለት`) in the preceding text, so supplying 'the day on which' is an over-literal misreading of the feminine pronoun, which is often used for abstract/neuter concepts in Ge'ez.
