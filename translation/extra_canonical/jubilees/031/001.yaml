  from: And in the first month
  to: And on the new moon of the month
  rationale: The Ge'ez phrase `በሠርቀ፡ ወርኅ፡` (ba-śarqa warḫ) means 'on the new moon of the month' or 'on the first day of the month', not 'in the first month' (which would be `በቀዳማይ፡ ወርኅ፡`).
- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/031/001.job-76714.json
  category: grammar
  from: peace.” And they gave up
  to: peace. And put away
  rationale: The verb `ወአስስሉ፡` (wa-'assəslu) is an imperative plural ('and put away' or 'and remove'), continuing Jacob's direct speech. The draft incorrectly renders it as a third-person perfect ('And they gave up') and places it outside the quotation marks. The spelling with the 6th-order 's' (ስ) confirms it is imperative. The quotation should likely remain open here, as the object ('the foreign gods') appears in the next verse.
- timestamp: '2026-04-28T09:36:31Z'
