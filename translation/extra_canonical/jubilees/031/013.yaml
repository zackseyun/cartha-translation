  from: and Judah with his left hand
  to: and his left hand on Judah
  rationale: Because of the verse break and English syntax, 'and Judah with his left hand' can be misread as Judah using his own left hand. The Ge'ez accusative (ወይሁዳን) shows Judah is the object of Isaac's action continued from verse 12 ('He placed his right hand on the head of Levi...'). Rendering the ellipsis as 'and his left hand on Judah' clarifies the meaning naturally in English.
