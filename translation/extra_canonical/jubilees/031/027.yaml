  to: when he came, he might set him on a donkey.
  rationale: The verb ይጽዐኖ (yəṣʿäno) is in the imperfect/subjunctive ('he might set him' or 'he would set him'), continuing the purpose or indirect discourse from the previous verse, rather than a simple past narrative action ('he set him').
