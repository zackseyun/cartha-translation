  to: I am no longer able to travel. Set your mother on a beast and let her go."
  rationale: The translation completely misses the reference to Jacob's mother (ለአምካ, lä-ʾämka) and the imperative to set her on a beast (ጻዐና, ṣaʿäna). The current rendering conflates these words into a statement about Isaac's inability to ride, which alters the narrative (in the very next verse, Jacob insists his mother go with him).
