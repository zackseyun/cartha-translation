  from: and crushed them, and hid them
  to: and crushed them, and destroyed them, and hid them
  rationale: The translation omits the verb ወአማስኖ ('and destroyed them'), which appears in the Ge'ez between 'crushed them' (ወፀተሞ) and 'hid them' (ወኀብአ).
