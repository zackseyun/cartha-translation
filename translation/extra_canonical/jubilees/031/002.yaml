  from: the foreign gods that were among them[2], and what was in their ears
  to: the foreign gods that are among you.' And they gave him the foreign gods, and what was in their ears
  rationale: The Ge'ez text contains the end of Jacob's quote from verse 1 ('the foreign gods that are among you' - ማእከሌክሙ). It then continues with 'And they gave him the foreign gods' (ወመጠውዎሙ፡ ለአማልክተ፡ ነኪር). The current draft changes 'you' to 'them' and completely omits the clause 'And they gave him the foreign gods'.
- timestamp: '2026-04-28T06:42:07Z'
