  to: 'everything: how the Lord had shown him great mercy'
  rationale: The Ge'ez reads `ኵሎ ... ዘከመ` ("everything ... how"). The current draft merges these awkwardly and translates `ገብረ ... ሣህለ` literally as "done ... mercy". "Shown him great mercy" is the standard and more natural English idiom.
