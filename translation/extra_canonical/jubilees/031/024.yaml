  from: And righteousness passed over to him.
  to: And it was reckoned to him as righteousness.
  rationale: The provided Ge'ez text contains an OCR error (`ወተኀለፈ`, "passed over") for the actual text `ወተኈለቈ` ("was reckoned/counted"). The phrase is the standard biblical idiom "it was reckoned to him as righteousness" (cf. Gen 15:6, Ps 106:31). The translation should reflect the correct Ge'ez word and idiom.
