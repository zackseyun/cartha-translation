  to: the sons of the beloved
  rationale: The Ge'ez text reads `ለፍቅር` (la-feqr), which means 'of the beloved' (or 'for love'), not 'forever'. The automated revision pass hallucinated this change. The phrase `ዘርአ፡ ውሉዱ፡ ለፍቅር` should be rendered 'the seed of the sons of the beloved' (as it was in the pre-revision draft, aligning with standard translations like VanderKam and Charles).
