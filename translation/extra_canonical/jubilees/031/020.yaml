  category: missing_nuance
  from: And when you sit
  to: And on the day you sit
  rationale: The Ge'ez text reads `ወአመ፡ ዕለት፡` (wa-'ama 'elat), which literally means 'And on the day [when]'. Translating it simply as 'And when' drops the specific temporal noun `ዕለት` (day).
