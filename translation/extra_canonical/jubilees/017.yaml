lexical_decisions:
- source_word: መሃይምን
  chosen: faithful
  alternatives:
  - tested
  - approved
  - steadfast
  rationale: In this chapter the term describes Abraham’s proven reliability under
    testing, not mere intellectual belief. 'Faithful' preserves the covenantal and
    moral sense that recurs in Jubilees.
- source_word: ምንዳቤ
  chosen: afflictions
  alternatives:
  - trials
  - temptations
  - testings
  rationale: The context lists concrete ordeals Abraham endured. 'Afflictions' keeps
    the experiential weight, while the surrounding verbs already express the idea
    of testing.
- source_word: አመከሮ
  chosen: tested
  alternatives:
  - tried
  - proved
  rationale: This is the governing verb for God’s proving of Abraham. 'Tested' is
    the clearest modern English equivalent and preserves the theological theme of
    probation.
- source_word: ልዐልት ምድር
  chosen: the high land
  alternatives:
  - the lofty land
  - the land of height
  rationale: The Ge'ez points to an elevated region rather than the Genesis wording
    'Moriah' directly. 'High land' preserves the topographical sense without harmonizing.
- source_word: መሥዋዕት / ምሥዋዕ
  chosen: offering / altar
  alternatives:
  - sacrifice
  - oblation
  rationale: These cultic terms are rendered with standard English sacrificial vocabulary.
    Where the object is the wood or victim, 'offering/sacrifice' fits; where the structure
    is meant, 'altar' is required by context.
- source_word: መጥባሕት
  chosen: knife
  alternatives:
  - slaughtering knife
  - blade
  rationale: The term denotes the implement for slaughter. 'Knife' is natural English
    while retaining sacrificial force in context.
- source_word: ኅቡረ ክልኤሆሙ
  chosen: the two of them went together
  alternatives:
  - both of them together
  - the two went in company
  rationale: This preserves the solemn repetition and close movement of father and
    son.
- source_word: በግዕ
  chosen: sheep
  alternatives:
  - lamb
  - ram
  rationale: The Ge'ez here is generic small livestock for sacrifice. 'Sheep' avoids
    over-specifying before the ram appears later.
- source_word: ለጽንሓሕ
  chosen: for the burnt offering
  alternatives:
  - for the holocaust
  - for the whole offering
  rationale: The sacrificial sense is that of an offering wholly consumed. 'Burnt
    offering' is the standard readable rendering.
- source_word: መስተማ
  chosen: Mastema
  alternatives:
  - the Adversary
  rationale: Jubilees uses this as a proper name/title for the hostile heavenly accuser.
    Retaining 'Mastema' preserves the book’s distinctive demonological vocabulary.
- source_word: ዐዘቅተ ማይ
  chosen: a well of water
  alternatives:
  - water pit
  - spring
  rationale: The phrase denotes a water source, likely a well. 'Well of water' keeps
    the concrete image and echoes Semitic idiom.
- source_word: ሐባወ-ዝ
  chosen: a skin of bread
  alternatives:
  - provisions of bread
  - a bag of bread
  rationale: The form is textually difficult; the context clearly refers to bread/provisions
    given with water to Hagar. The chosen rendering preserves the likely sense while
    noting uncertainty separately.
- source_word: እልያስ
  chosen: bush
  alternatives:
  - shrub
  - tree
  rationale: In the Hagar scene the child is placed under desert vegetation. 'Bush'
    best fits the setting without over-precision.
- source_word: አሐዱ እምቅዱሳን
  chosen: one of the holy ones
  alternatives:
  - one of the saints
  - a holy angel
  rationale: Jubilees often speaks of heavenly beings as holy ones. This preserves
    the celestial court language.
- source_word: በድው ፍራም
  chosen: the wilderness of Paran
  alternatives:
  - the desert of Paran
  rationale: Standard place-name rendering; 'wilderness' suits biblical geographic
    style and the desert context.
- source_word: ሱባዔ ሳብዕ
  chosen: the seventh week
  alternatives:
  - the seventh heptad
  - the seventh week of years
  rationale: Jubilees uses schematic chronology. 'Week' should be preserved, with
    the calendrical sense understood from the book’s system.
- source_word: ኢዮቤል
  chosen: jubilee
  alternatives:
  - yobel
  rationale: The book’s chronological framework depends on this term. It must be preserved
    explicitly, not paraphrased.
theological_decisions:
- issue: Chapter segmentation and narrative scope
  chosen_reading: Translate the extant Ge'ez rows as a continuous chapter in which
    the Akedah material is followed by the Hagar/Ishmael recollection and then the
    heavenly discussion about Abraham’s testing.
  alternative_readings:
  - Reconstruct the standard longer chapter from other editions
  - Reorder material to match Genesis chronology
  rationale: The supplied Charles row data is compressed and partially out of sequence.
    The translation follows the provided source corpus rather than importing a harmonized
    chapter from other witnesses.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
- issue: Speaker in the Akedah scene
  chosen_reading: Retain the first-person angelic narration ('I stood before him')
    alongside the Lord’s command and Mastema’s presence.
  alternative_readings:
  - Flatten all speech into a simple divine voice
  - Identify the speaker explicitly as the Angel of the Presence in the main text
  rationale: Jubilees is framed as angelic revelation, and the first-person heavenly
    witness should remain visible. The text itself does not name the speaker here
    in the surviving row, so the main text keeps the first-person narration without
    over-identification.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Abraham as 'faithful' rather than merely 'believing'
  chosen_reading: Use 'faithful' for Abraham’s tested character.
  alternative_readings:
  - believing
  - trusting
  rationale: The chapter emphasizes demonstrated obedience under repeated testing.
    'Faithful' better captures Jubilees’s covenantal and ethical emphasis.
