  - verse: 13
    geez: ሕፃና፡ ወተንሥአት፡ ወሖረት፡ መንገለ፡ በድው፡ ፍራም። ወአሀቀ፡ ሕፃን፡ ወኮነ፡ ነዳፌ፡ ወሀለወ፡ እግዚአብሔር፡ ምስሌሁ፡
