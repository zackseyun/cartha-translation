translation:
  text: '1. And the Lord knew that Abraham was faithful in all his afflictions; for
    he had tested him in his land, and with famine, and had tested him through the
    wealth of kings, and again had tested him through his wife when she was taken
    away, and through circumcision, and had tested him through Ishmael and Hagar his
    maidservant when he sent them away. And in everything by which he had tested him,
    he was found faithful, and his soul was not impatient, and he did not delay to
    act; for he was faithful and a lover of the Lord.

    2. And the Lord said to him, “Abraham, Abraham.” And he said, “Here I am.” And
    he said, “Take your beloved son whom you love, Isaac, and go into the high land,
    and offer him there on one of the mountains that I will show you.” And he rose
    early in the morning and saddled his donkey and took two of his young servants
    with him, and Isaac his son; and he split the wood of the offering and went to
    the place on the third day, and he saw the place from afar. And he came to a well
    of water, and he said to his young servants, “Stay here with the donkey, and I
    and the boy will go on, and when we have worshiped we will return to you.” And
    he took the wood of the sacrifice and laid it on Isaac his son, and he took in
    his hand the fire and the knife. And the two of them went together to that place.

    3. And Isaac said to his father, “Father.” And he said, “Here I am, my son.” And
    he said to him, “Here are the fire and the knife and the wood, but where is the
    sheep for the burnt offering, father?” And he said, “The Lord will provide for
    himself the sheep for the burnt offering, my son.” And he came near to the place
    of the mountain of the Lord.

    4. And he built the altar there, and arranged the wood on the altar, and bound
    Isaac his son, and placed him on the wood that was upon the altar, and stretched
    out his hand to take the knife so that he might slaughter Isaac his son. And I
    stood before him and before the prince Mastema, and the Lord said, “Tell him not
    to lay his hand upon the boy, and not to do anything to him, for now I know that
    he fears the Lord.”

    5. And I called to him from heaven and said to him, “Abraham, Abraham.” And he
    was terrified and said, “Here I am.” And I said to him, “Do not lay your hand
    upon the boy, and do not do anything to him; for now I have shown that you fear
    the Lord, and you have not withheld your son, your firstborn son, from me.”

    6. And the prince Mastema was put to shame. And Abraham lifted up his eyes and
    looked, and behold, a ram caught by its horns. And Abraham went and took the ram
    and offered it as a burnt offering in place of his son.

    7. And Abraham called that place “The Lord has seen,” so that it is said, “On
    the mountain the Lord has seen”; that is Mount Zion. And the Lord called Abraham
    by his name a second time from heaven, as he caused us to appear to speak to him
    in the name of the Lord.

    8. And he said, “By myself I have sworn, says the Lord: because you have done
    this thing and have not withheld your son, your beloved son, from me, I will surely
    bless you and will surely multiply your seed like the stars of heaven and like
    the sand that is on the seashore. And your seed will inherit the cities of its
    enemies,

    9. and in your seed all the nations of the earth will be blessed, because you
    have obeyed my voice. And I have shown to all that you are faithful to me in everything
    that I have said to you. Go in peace.”

    10. And Abraham went back to his young servants, and they arose and went together
    to Beer-sheba. And Abraham dwelt by the Well of the Oath.

    11. And he celebrated this festival every year for seven days with joy, and he
    called it the festival of the Lord according to the seven days during which he
    went and returned in peace.

    12. And accordingly it has been ordained and written on the heavenly tablets concerning
    Israel and its seed, that they should celebrate this festival seven days with
    the joy of festival.

    13. And in the first year of the fifth week of this jubilee, Isaac took Rebekah,
    the daughter of Bethuel the Aramean, the sister of Laban the Aramean, to be his
    wife.

    14. And in the sixth year of this week she bore him Jacob and Esau. And Jacob
    was a smooth and upright man, but Esau was fierce, a man of the field, and hairy;
    and Jacob dwelt in tents.

    15. And the youths grew, and Jacob learned writing, but Esau did not learn, because
    he was a man of the field and a hunter; and Abraham loved Jacob, but Isaac loved
    Esau.'
