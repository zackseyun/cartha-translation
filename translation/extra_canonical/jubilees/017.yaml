    geez: ወመጽአ፡ መኰንን፡ መስተማ፡ ወይቤ፡ ቅድሜሁ፡ ለአምላክ፡ ናሁ፡ አብርሃም፡ ያፈቅሮ፡ ለይስሐቅ፡ ወልዱ፡ ወያስተአድሞ፡
