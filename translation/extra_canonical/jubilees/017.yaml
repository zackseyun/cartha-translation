    geez: ወእግዚአብሔር፡ ያአምር፡ ከመ፡ መሃይምን፡ አብርሃም፡ በኵሉ፡ ምንዳቤሁ፡ እስመ፡ አመከሮ፡ በምድሩ፡ ወበዐባር፡ ወአመከሮ፡
