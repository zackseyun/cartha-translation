translation:
  text: 'And Ham his father, and Cush and Mizraim his brothers, said to him: ''Because you have settled in a land which is not yours, and which did not fall to you by lot, do not do so; for if you do so, you and your sons will fall in the land and be accursed through rebellion; because by rebellion you have settled, and by rebellion your sons will fall, and you will be uprooted forever.'''
