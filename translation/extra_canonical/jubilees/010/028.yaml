  category: mistranslation
  from: that he had seized for himself.
  to: that was apportioned to him, which he acquired.
  rationale: The Ge'ez 'እንተ፡ አሕዝት፡ ሎቱ' (which it [the lot] caused him to possess) and 'ዘረከበ' (which he acquired/received) describe Ham taking his rightful allotted inheritance. Translating this as 'seized for himself' gives the false impression of an unauthorized land grab (which is what Canaan does in the following verse), missing the causative sense of the allotment and leaving 'ዘረከበ' untranslated.
