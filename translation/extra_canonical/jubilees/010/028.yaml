  from: And Canaan saw the land of Lebanon as far as the river of Egypt, that it was very good, and he did not go into the land of his inheritance to the west, that is, to the sea, but he dwelt in the land of Lebanon, from the east and from the west, from the border of the Jordan and from the border of the sea.
