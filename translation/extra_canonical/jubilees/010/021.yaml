  category: mistranslation
  from: and the extent of one wall was thirteen stades, and of the other thirty stades.
  to: and twelve stades.
  rationale: The Ge'ez text explicitly reads ወ፲ወ፪ ምዕራፍ ('and twelve stades'). The numeral ፲ወ፪ is 12, not 13 (the previous revision pass hallucinated the correction). Furthermore, the phrases 'the extent of one wall was' and 'and of the other thirty stades' are entirely absent from the Ge'ez text; they are interpolations from the Greek of Syncellus that R.H. Charles added in brackets in his 1895 translation. To accurately reflect the Ge'ez source, these interpolations should be removed and the numeral corrected to 12.
