  category: mistranslation
  from: the land of Ham, in the land of Canaan.
  to: from the land of Canaan.
  rationale: The Ge'ez word 'አም' (am) in the source text is a typographical error for 'እም' (em), meaning 'from'. The phrase 'እምምድረ ከናዓን' means 'from the land of Canaan' (completing the sentence from the previous verse about hiding on Mount Seir). The translation 'the land of Ham, in the land of Canaan' is a hallucination based on this typo (Ham is 'ካም' in Ge'ez).
