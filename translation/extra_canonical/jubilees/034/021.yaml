translation:
  text: The wife of Benjamin was Iyasaka. And Simeon regretted it and took a second wife from Mesopotamia[21], like his brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '21'
    text: The verb for Simeon may mean 'repented,' 'changed his mind,' or more generally 'turned'; the sense is that he took another wife from Mesopotamia like his brothers.
    reason: alternative_reading
  - marker: a
    text: Or 'And Simeon regretted it'.
    reason: previous_rendering
