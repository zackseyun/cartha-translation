  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/034/011.job-76790.json
  category: mistranslation
  from: hated him
  to: dealt treacherously with him
  rationale: The recent revision introduced a mistranslation. The Ge'ez verb ሐበየ (habaya) means 'to deal treacherously, act deceitfully, or plot against,' not 'to hate' (which would be ጸልአ). The original draft's 'dealt treacherously' was correct.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/034/011.job-76790.json
  category: mistranslation
  from: the chief of the cooks
  to: the chief of the guards
  rationale: The Ge'ez phrase is ሊቀ ዐቀብት (liqa 'aqabt), which literally means 'chief of the guards.' 'Chief of the cooks' would be ሊቀ ጠባሕት (the term used in the Ge'ez translation of Genesis 37:36, following the LXX). The translation should reflect the specific wording of Jubilees here.
