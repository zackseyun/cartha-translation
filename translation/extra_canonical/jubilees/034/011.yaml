  from: Shechem, and he found them in the land of Dothan. And they dealt treacherously with him and formed a plan against him to kill him; but changing their minds, they sold him to Ishmaelite merchants, and they brought him down to Egypt and sold him to Potiphar, an officer of Pharaoh, the chief of the cooks, priest of the city of Heliopolis.
  to: Shechem, and he found them in the land of Dothan. And they hated him and made a plan against him to kill him; but changing their minds, they sold him to Ishmaelite merchants, and they brought him down to Egypt and sold him to Potiphar, an officer of Pharaoh, the chief of the cooks, priest of the city of Heliopolis.
  rationale: Changed 'dealt treacherously with him' to 'hated him' for better lexical accuracy with the source verb, while retaining the rest of the verse unchanged.
- timestamp: '2026-04-28T09:36:32Z'
