  rows:
  - verse: 1
    geez: ወበዓመተ፡ ኃምስ፡ ዘሰብዐ፡ ዘ¹¹ራብዑ፡¹ ለ*ኢዮቤልዉን፡¹⁰ ዝንቱ፡ በወርኀ፡ ሣልስ፡ *በመንፈቀ፡ ወርኀ፡¹² ገብረ፡
      አብራም፡ በዓለ፡ *ቀዳሜ፡ ማእረር፡¹³ ዘዘርአ፡ ስርናይ።¹⁴
  - verse: 2
    geez: ወአዕረገ፡ መሥዋዕተ፡ ሐዲስ፡ ዲበ፡ ምሥዋዕ፡ ቀዳሜ፡¹⁵ እክል፡ ለእግዚአብሔር፡ ላህመ፡ ወበሐኮ፡ ወበግዐ፡ ዲበ፡
      ምሥዋዕ፡ *ጽንሓሐ፡ ለእግዚአብሔር፡ መሥዋዕቶሙ፡ ወሞጻሕቶሙ፡ አዕረገ፡ ዲበ፡ ምሥዋዕ፡¹⁶ ምስለ፡ ስኂን።
  - verse: 3
    geez: ወአስተርአዮ፡ እግዚአብሔር፡ ለአብራም፡¹⁷ ወይቤሎ፡¹⁸ አነ፡¹⁹ አምላክ፡ ሰዳይ፡²⁰ *ወ²¹*አሥምር፡²² ቅድሜየ፡
      ወኩን፡ ፍጹመ።
  - verse: 4
    geez: ወእሁብ፡ ኪዳንየ፡ ማእከሌየ፡ ወማእከሌከ፡ ወአአብቀከ፡ ጥቀ።
  - verse: 5
    geez: ወወድቀ፡ አብራም፡ በገጹ፡ ወተናገሮ፡ እግዚአብሔር፡ ወይቤ። ናሁ፡ ሥርዓትየ፡ ምስሌከ፡²³ ወትከውን፡²⁴ አበ፡ ለብዙኃን፡
      አሕዛብ።
  - verse: 7
    geez: '*ወኢይጼዋዕ፡ እንከ፡ ስምከ፡²⁵ አብራም፡ ወይኩን፡ ስምከ፡ አምይእዜ፡ ወእስከ፡ ለዓለም፡ አብርሃም፡²⁷ እስመ፡
      አበ፡ ብዙኃን፡ አሕዛብ፡ ሤምኩከ።'
  - verse: 8
    geez: ወአዐብየከ፡²⁸ ጥቀ፡ ወእሁበከ፡ ውስተ፡ አሕዛብ፡ ወነገሥት፡ ይወፅኡ፡ እምኔከ። ወ*እሁብ፡²⁹ ኪዳንየ፡ ማእከሌየ፡
      ወማእከሌከ፡ ወማእከለ፡ ዘርእከ፡ *እምድኅሬከ፡ በትዝምዶሙ፡³⁰ ለ³¹ሥርዓት፡ ዘለዓለም፡ ከመ፡ *እኩንከ፡ አምላከ፡³² ወለዘርእከ፡
      እምድኅሬከ።³³
  - verse: 10
    geez: '*ወእሁብ፡ ለከ፡ ወለዘርእከ፡ እምድኅሬከ፡³⁴ ምድረ፡³⁵ ኀበ፡ ፈለስከ፡ ምድረ፡³⁶ ከናአን፡ ዘትኳን፡ ለዓለም፡
      ወእከውኖሙ፡ አምላከ።'
  - verse: 11
    geez: ወይቤሎ፡ እግዚአብሔር፡ ለአብርሃም፡ ወአንተኒ፡ ኪዳንየ፡³⁷ ዐቀብ፡ አንተ፡ ወዘርእከ፡ እምድኅሬከ፡ ወትገዝሩ፡ ኵሎ፡
      ርእስክሙ፡ ወትገዝሩ፡ ቍልፈቲክሙ፡ ወይከውን፡ ትእምርተ፡ ሥርዓት፡ ዘለዓለም፡ ማእከሌየ፡ ወማእከሌክሙ። ወ*ለወልድ፡ አመ፡
      ሳምንት፡ ዕለት፡ ትገዝርዎ፡ ኵሎ፡ ርእ፡ በኀቤክሙ፡ ወልደ፡ ቤት፡ ወዘበወርቅ፡ ተሣየጥክሙ፡ እምኵሉ፡ ውሉደ፡ ነኪር፡ ዘኢኮነ፡
      እምዘርእከ። *ክዝቦተ፡ ይትገዘር፡ ልደ፡ ቤትከ፡ ወዘበወርቅ፡ ተሣየጥከ፡ ይትገዘር፡ ወይከውን፡ ኪዳንየ፡ ውስተ፡ ሥጋክሙ፡
      ለሥርዓት፡ ዘለዓለም። ወዘኢኮነ፡ ክዙረ፡ ርእ፡ ዘኢተገዝረ፡ ሥጋ፡ ቍልፈቱ፡ *በዕለተ፡ ሳምንት፡ ትሤረር፡ ይእቲ፡ ነፍስ፡
      እምዘመዳ፡ እስመ፡ ኪዳንየ፡ ነሠተ። ወይቤሎ፡ እግዚአብሔር፡ ለአብርሃም፡ ሦራ፡ ብእሲትከ፡ ኢ*ትጸዋዕ፡ እንከ፡ ስማ፡ ሦራ፡
      እስመ፡ ሣራ፡ ስማ። ወ*እባርካ፡ ወእሁብከ፡ እምኔሃ፡ ወልደ፡ ወእባርኮ፡ ወይከውን፡ ሕዝበ፡ ወነገሥተ፡ አሕዛብ፡ እምኔሁ፡
      ይወፅኡ። ወወድቀ፡ አብርሃም፡ በገጹ፡ ወተፈሥሐ፡ ወይቤ፡ በልቡ፡ አመ፡ ለዘምእትኑ፡ ዓመት፡ ይትወለድ፡ ወልድ፡ ወሣራሂ፡
      እንተ፡ ተስዓ፡ ዓመት፡ ትወልድ። ወይቤሎ፡ አብርሃም፡ ለእግዚአብሔር፡ መፍትው፡ ይሕየው፡ ይስማኤል፡ ቅድሜከ። ወይቤ፡ እግዚአብሔር፡
      አሆ፡ ወሣራሂ፡ ትወልድ፡ ለከ፡ ወልደ፡ ወ*ትጼውዕ፡ ስሞ፡ ይስሐቅ፡ ወአቀውም፡ ኪዳንየ፡ ምስሌሁ፡ ኪዳነ፡ ዘለዓለም፡ ወ*ለዘርኡ፡
      እምድኅሬሁ። ወበእንተ፡ ይስማኤልሂ፡ ሰማዕኩከ፡ ወናሁ፡ እባርኮ፡ ወአልህቆ፡ ወአበዝኆ፡ ጥቀ፡ ወ*ዓሠርተ፡ ወክልኤተ፡ መላእክተ፡
      ይወልድ፡ ወእሠይሞ፡ ውስተ፡ ሕዝብ፡ ዐቢይ። ወኪዳን*የ፡ አቀውም፡ ምስለ፡ ይስሐቅ፡ ዘትወልድ፡ ለከ፡ ሣራ፡ በዝ፡ መዋዕል፡
      በዓመት፡ ካልእ። ወፈጸመ፡ *እንዘ፡ ይትናገር፡ ምስሌሁ፡ ወዐርገ፡ እግዚአብሔር፡ እመልዕልተ፡ አብርሃም። ወገብረ፡ አብርሃም፡
      በከመ፡ ይቤሎ፡ እግዚአብሔር፡ ወነሥአ፡ ይስማኤልሃ፡ *ወልደ፡ ወኵሎ፡ ልደ፡ ቤቱ፡ *ወዘሂ፡ በወርቅ፡ ተሣየጠ፡ ኵሎ፡ ርእ፡
      *ዘውስተ፡ ቤቱ፡ ወገዘረ፡ ሥጋ፡ ምኵናሮሙ። *ወበጊዜ፡ ዛቲ፡ ዕለት፡ ተገዝረ፡ አብርሃም፡ ወኵሉ፡ ሰብአ፡ ቤቱ፡ (*ወልደ፡
      ቤቱ፡) ወ*ኵሎሙ፡ እለ፡ በወርቅ፡ ተሣየጠ፡ እምውሉደ፡ ነኪራንኒ፡ ተገዝሩ፡ ምስሌሁ። ዛሕግ፡ ለኵሉ፡ ትውልድ፡ ዘ*ለዓለም፡
      ወአልቦ፡ ክስበት፡ መዋዕል፡ ወአልቦ፡ ተኀድዎ፡ አሐተ፡ ዕለተ፡ *እምሰማኒ፡ መዋዕል፡ እስመ፡ ሥርዓት፡ ዘለዓለም፡ ውእቱ፡
      ሥሩዕ፡ መጽሑፍ፡ ውስተ፡ ጽላት፡ ሰማይ። ወኵሉ፡ ዘተወልደ፡ ዘኢተከስበ፡ ሥጋ፡ ነፍስቱ፡ አመ፡ ስሙን፡ ዕለት፡ አኮኑ እምውሉደ፡
      ሥርዐት፡ ዘተካየደ፡ እግዚአብሔር፡ ለአብርሃም፡ እስመ፡ እምነ፡ ውሉደ፡ ሙስና፡ ወአልቦ፡ እንከ፡ ትእምርተ፡ ላዕሌሁ፡ ከመ፡
      ይኩን፡ ለእግዚአብሔር፡ እስመ፡ ለአማስኖ፡ ወለአሕጕሎ፡ እምነ፡ ምድር፡ ወለተሠርዎ፡ እምነ፡ ምድር፡ እስመ፡ ኪዳኖ፡ ለእግዚአብሔር፡
      አምላክነ፡ ሤጦ።
  - verse: 27
    geez: እስመ፡ ኵሎሙ፡ መላእክተ፡ ገጽ፡ ወኵሎሙ፡ መላእክተ፡ ቅዳሴ፡ ከመዝ፡ ፍጥረቶሙ፡ እምዕለተ፡ ፍጥረቶሙ፡ ወአንጻሮሙ፡
      ለመላእክተ፡ ገጽ፡ ወለመላእክተ፡ ቅዳሴ፡ ቀደሶ፡ ለእስራኤል፡ ከመ፡ ይኩኑ፡ ምስሌሁ፡ ወምስለ፡ መላእክቲሁ፡ ቅዱሳን።
  - verse: 28
    geez: ወአንተኒ፡ አዝዝ፡ ለውሉደ፡ እስራኤል፡ ወይዕቀቡ፡ ትእምርተ፡ ኪዳን፡ ለትውልዶሙ፡ ለሥርዐት፡ ዘለዓለም፡ ወኢይሠረዉ፡
      እምነ፡ ምድር።
  - verse: 29
    geez: እስመ፡ ትእዛዝ፡ ተሠርዐ፡ ለኪዳን፡ ከመ፡ ይዕቀብዎ፡ ለዓለም፡ ዲበ፡ ኵሎሙ፡ ደቂቀ፡ እስራኤል።
  - verse: 30
    geez: እስመ፡ ይስማዔልሃ፡ ውውሉደ፡ ወአንቂሁ፡ ወጌሳውሃ፡ ኢያቅረቦ፡ ኀቤሁ፡ እግዚአብሔር፡ ወኢኀረየ፡ ቦሙ፡ እስመ፡ ውሉደ፡
      አብርሃም፡ እሙንቱ፡ እስመ፡ አእመሮሙ፡ ወእስራኤልሃ፡ ኀረየ፡ ይኩንዎ፡ ሕዝበ።
  - verse: 31
    geez: ወቀደሶ፡ ወአስተጋብኦ፡ እምኵሉ፡ ውሉደ፡ ሰብእ፡ እስመ፡ ብዙኅ፡ አሕዛብ፡ ወብዙኅ፡ ሕዝብ፡ ወኵሎሙ፡ ሎቱ፡ ወዲበ፡
      ኵሉ፡ አሰለመ፡ መናፍስተ፡ ከመ፡ ያስሕትዎሙ፡ እምድኅሬሁ።
  - verse: 32
    geez: ወዲበ፡ እስራኤልሰ፡ ኢያሰለመ፡ ወአመነሂ፡ መልአከ፡ ወመንፈሰ፡ እስመ፡ ውእቱ፡ ባሕቲቱ፡ መኰንኖሙ፡ ወውእቱ፡ የዐቅቦሙ፡
