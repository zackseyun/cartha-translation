translation:
  text: '1. In the fifth year of the fourth week of this jubilee, in the third month,
    in the middle of the month, Abram celebrated the festival of the firstfruits of
    the grain harvest.

    2. And he offered a new sacrifice on the altar, the firstfruits of the produce,
    to the Lord: a calf and a goat and a sheep on the altar as a burnt offering to
    the Lord; and their grain offering and their drink offering he offered on the
    altar with frankincense.

    3. And the Lord appeared to Abram and said to him, “I am God Shaddai; be pleasing
    before me, and be blameless.

    4. And I will give my covenant between me and you, and I will multiply you greatly.”

    5. And Abram fell on his face, and God spoke with him and said, “Behold, my ordinance
    is with you, and you shall become the father of many nations.

    7. And your name shall no longer be called Abram, but from now and forever your
    name shall be Abraham, for I have made you the father of many nations.

    8. And I will make you very great, and I will make you into nations, and kings
    shall come out from you. And I will establish my covenant between me and you and
    between your seed after you throughout their generations, as an everlasting ordinance,
    so that I may be God to you and to your seed after you.

    10. And I will give to you and to your seed after you the land where you have
    resided as a foreigner, the land of Canaan, for an everlasting possession, and
    I will be their God.”

    11. And the Lord said to Abraham, “And as for you, keep my covenant, you and your
    seed after you. And circumcise every male among you, and circumcise the flesh
    of your foreskins, and it shall be a sign of an everlasting ordinance between
    me and you. And a son of eight days you shall circumcise—every male among you,
    one born in the house and one bought with your silver from any sons of foreigners
    who are not from your seed. The one born in your house must surely be circumcised,
    and the one whom you bought with your silver must be circumcised; and my covenant
    shall be in your flesh as an everlasting ordinance. But an uncircumcised male,
    one whose foreskin''s flesh is not circumcised on the eighth day, that person
    shall be cut off from his kin, because he has broken my covenant.” And the Lord
    said to Abraham, “As for Sarai your wife, her name shall no longer be called Sarai,
    for Sarah is her name. And I will bless her, and from her I will give you a son;
    and I will bless him, and he shall become a nation, and kings of nations shall
    come from him.” And Abraham fell on his face and rejoiced, and he said in his
    heart, “Shall a son be born to one a hundred years old? And shall Sarah, who is
    ninety years old, give birth?” And Abraham said to the Lord, “If only Ishmael
    might live before you!” And God said, “Yes, and Sarah shall bear you a son, and
    you shall call his name Isaac; and I will establish my covenant with him, an everlasting
    covenant, and with his seed after him. And concerning Ishmael also, I have heard
    you. Behold, I will bless him and make him fruitful and multiply him very greatly;
    he shall father twelve princes, and I will make him into a great nation. But my
    covenant I will establish with Isaac, whom Sarah shall bear to you at this time
    in the next year.” And he finished speaking with him, and the Lord went up from
    Abraham. And Abraham did as the Lord had said to him, and he took Ishmael his
    son and all those born in his house and those bought with silver, every male in
    his house, and circumcised the flesh of their foreskins. And on that very day
    Abraham was circumcised, and all the men of his house—those born in his house—and
    all those bought with silver from the sons of foreigners were circumcised with
    him. This is a statute for all the generations forever: there is no delaying of
    days, and no omission of even one day from eight days, for it is an everlasting
    ordinance, ordained and written on the heavenly tablets. And everyone who is born
    whose flesh of foreskin is not circumcised on the eighth day does not belong to
    the children of the covenant that the Lord made with Abraham, for he belongs to
    the children of destruction; and there is no sign on him that he belongs to the
    Lord, but he is for destruction and for being destroyed from the earth, because
    he has broken the covenant of the Lord our God.

    27. For all the angels of the presence and all the angels of holiness—these two
    kinds he created from the day of their creation—and in the presence of the angels
    of the presence and the angels of holiness he sanctified Israel, that they might
    be with him and with his holy angels.

    28. And now command the children of Israel, and let them keep the sign of this
    covenant throughout their generations as an everlasting ordinance, and they shall
    not be uprooted from the land.

    29. For the command has been ordained as a covenant, that they should keep it
    forever among all the children of Israel.

    30. For Ishmael and his sons and his brothers and Esau the Lord did not bring
    near to himself, and he did not choose them, though they are the children of Abraham;
    but he knew them, and he chose Israel to be his people.

    31. And he sanctified him and gathered him from all the children of men; for there
    are many nations and many peoples, and all are his, and over all he appointed
    spirits to lead them astray from following him.

    32. But over Israel he did not appoint any angel or spirit, for he alone is their
    ruler, and he will keep them and require them from the hand of his angels and
    from the hand of his spirits and from the hand of all his powers, so that he may
    keep them and bless them, and that they may be his and he may be theirs from now
    and forever.

    33. And now I am telling you that the children of Israel will not keep this ordinance,
    and they will not circumcise their sons according to all this law; for they will
    leave some of the flesh of their circumcision, and all the sons of Belial will
    leave their sons uncircumcised as they were born.

    34. And there will be great wrath from the Lord against the children of Israel,
    because they have forsaken his covenant and turned aside from his word and provoked
    and blasphemed, in that they do not perform the ordinance of this law; for they
    have made themselves like the nations, for removal and for destruction from the
    earth. And there will no longer be for them pardon or forgiveness, so that they
    should be forgiven and pardoned for all this eternal error.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: v11
    text: The source row is a compressed block containing material corresponding to
      multiple Genesis verses and likely several Jubilees verse numbers. The English
      preserves the sequence in one numbered line because the supplied corpus presents
      it as a single row.
    reason: segmentation_note
  - marker: v2
    text: The sacrificial animals and offerings are listed compactly in the Ethiopic.
      The exact pairing of each animal with each offering element is somewhat compressed;
      the translation keeps the cultic sequence without over-resolving it.
    reason: segmentation_note
  - marker: v27
    text: '''Angels of the presence'' and ''angels of holiness'' are retained as distinct
      heavenly classes. The phrase ''these two kinds'' is interpretive, reflecting
      the appositional structure of the Ethiopic.'
    reason: lexical_alternative
  - marker: v30
    text: The phrase rendered 'his brothers' in the Ishmael clause is textually difficult
      in context and may reflect a broader kin-group alongside Ishmael and Esau.
    reason: textual_variant
  - marker: v33
    text: The line about 'leaving some of the flesh of their circumcision' likely
      refers to incomplete circumcision or failure to remove the foreskin fully, not
      merely neglect of the rite altogether.
    reason: cultural_note
lexical_decisions:
- source_word: በዓለ ቀዳሜ ማእረር
  chosen: celebrated the festival of the firstfruits
  alternatives:
  - kept the feast of firstfruits
  - made the feast of the first grain
  rationale: በዓለ is festal observance; ቀዳሜ marks first/firstfruits. The phrase is
    calendrical and should remain explicit rather than generalized.
- source_word: ስርናይ
  chosen: grain harvest
  alternatives:
  - wheat
  - corn
  rationale: The term can point specifically to grain, often wheat; 'grain harvest'
    preserves agricultural sense without importing archaic 'corn'.
- source_word: መሥዋዕተ ሐዲስ
  chosen: a new sacrifice
  alternatives:
  - fresh offering
  - new oblation
  rationale: Retains the source adjective 'new' and preserves cultic specificity.
- source_word: ጽንሓሐ
  chosen: burnt offering
  alternatives:
  - whole offering
  rationale: Cultic context on the altar supports the standard sacrificial sense.
- source_word: ስኂን
  chosen: frankincense
  alternatives:
  - incense
  rationale: The term commonly denotes frankincense specifically; keeping it specific
    preserves sacrificial detail.
- source_word: አምላክ ሰዳይ
  chosen: God Shaddai
  alternatives:
  - God Almighty
  rationale: The title is preserved in transliterated form to avoid flattening a distinctive
    divine epithet into later interpretive tradition.
- source_word: አሥምር ቅድሜየ
  chosen: be pleasing before me
  alternatives:
  - walk before me
  - be acceptable before me
  rationale: The Ge'ez verb here is not the ordinary verb 'walk'; 'be pleasing' best
    reflects the Ethiopic wording while preserving covenantal demand.
- source_word: ሥርዓት
  chosen: ordinance
  alternatives:
  - covenant order
  - statute
  rationale: In this chapter the word overlaps with covenantal arrangement and fixed
    rule. 'Ordinance' preserves legal-sacral force and works across repeated occurrences.
- source_word: ዘርእ
  chosen: seed
  alternatives:
  - offspring
  - descendants
  rationale: '''Seed'' preserves covenantal and collective singular force central
    to the promise formula.'
- source_word: ፈለስከ
  chosen: resided as a foreigner
  alternatives:
  - sojourned
  - wandered
  rationale: The term denotes alien residence; this keeps the land-promise tension
    visible.
- source_word: ቍልፈት
  chosen: foreskin
  alternatives:
  - prepuce
  rationale: Readable modern English with anatomical precision.
- source_word: ትሤረር
  chosen: shall be cut off
  alternatives:
  - shall be uprooted
  - shall be destroyed
  rationale: Covenantal exclusion formula; 'cut off' is the standard legal equivalent
    and fits the context.
- source_word: መላእክተ ገጽ
  chosen: angels of the presence
  alternatives:
  - angels of the face
  rationale: Established literal sense of the idiom, important in Jubilees' heavenly
    court theology.
- source_word: መላእክተ ቅዳሴ
  chosen: angels of holiness
  alternatives:
  - holy angels
  - angels of sanctity
  rationale: The construct form is preserved rather than flattened into a generic
    adjective.
- source_word: አሰለመ መናፍስተ
  chosen: appointed spirits
  alternatives:
  - handed over to spirits
  - assigned spirits
  rationale: The context is divine governance over nations; 'appointed' captures delegated
    oversight without implying abandonment alone.
- source_word: ውሉደ ቤልአር
  chosen: sons of Belial
  alternatives:
  - children of worthlessness
  - sons of lawlessness
  rationale: Belial functions as a proper apocalyptic designation in Second Temple
    literature; transliteration preserves intertextual force.
- source_word: ጽላት ሰማይ
  chosen: heavenly tablets
  alternatives:
  - tablets of heaven
  rationale: A key Jubilees term; the conventional phrase should be preserved for
    theological continuity.
theological_decisions:
- issue: Rendering of divine title አምላክ ሰዳይ
  chosen_reading: God Shaddai
  alternative_readings:
  - God Almighty
  rationale: The Ethiopic preserves a form of the traditional title rather than an
    explanatory gloss. Transliteration keeps the ancient epithet's density and avoids
    over-interpretation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 2
- issue: Meaning of አሥምር in v. 3
  chosen_reading: be pleasing before me
  alternative_readings:
  - walk before me
  rationale: Although Genesis tradition often reads 'walk before me,' the Ge'ez wording
    here points to pleasing/being acceptable. The translation follows the source rather
    than harmonizing back to Genesis.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Status of circumcision in vv. 11, 27-34
  chosen_reading: Circumcision is rendered as an everlasting covenantal ordinance
    written on the heavenly tablets and uniquely binding on Israel.
  alternative_readings:
  - A merely ethnic custom
  - A temporary sign later relativized
  rationale: Jubilees intensifies the covenantal and cosmic significance of circumcision
    beyond a simple retelling of Genesis. The translation preserves that theological
    weight without softening it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 4
- issue: Israel and angelic mediation in vv. 31-32
  chosen_reading: Other nations are under appointed spirits, but Israel is ruled directly
    by God without an appointed angel over them.
  alternative_readings:
  - Israel also has an angelic prince
  - The text speaks only of protection, not governance
  rationale: The Ge'ez sharply contrasts the nations with Israel and explicitly denies
    an appointed angel or spirit over Israel. This distinction is central to Jubilees'
    theology of election.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
