translation:
  text: And while he was considering sending to Joseph that he should come to him[3], and not going down himself, he remained there seven days, to see in a vision whether he should stay or whether he should go down. And he celebrated the feast of the harvest of the firstfruits of the old grain, for in all the land of Canaan there was not a handful of any seed in the land, because the famine was upon all the beasts and the livestock and the birds and also upon men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '3'
    text: The verse is textually difficult in the transmitted Ge'ez. The sense appears to be that Jacob waited seven days for a confirming vision and observed a firstfruits festival using old grain because the famine had consumed fresh produce.
    reason: textual_variant
  - marker: a
    text: Or 'because it had become for all the beasts and the livestock and the birds and also for men.'.
    reason: previous_rendering
  - marker: b
    text: Or 'the feast of the firstfruits'.
    reason: previous_rendering
