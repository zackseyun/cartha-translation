  text: Remember, my sons, the LORD, the God of Abraham your father; and how I also worshipped him and served him in righteousness and in joy, so that he may multiply you and make your seed numerous like the stars of heaven in multitude, and plant you in the earth as a plant of righteousness that will not be uprooted throughout all generations forever.
