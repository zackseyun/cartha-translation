  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/036/011.job-76839.json
  category: mistranslation
  from: the judgment
  to: according to the judgment
  rationale: The Ge'ez text explicitly reads 'በከመ፡ ኵነኔ' (bakama kwenane, 'according to the judgment' or 'in accordance with the judgment'). The revision pass removed 'according to', which alters the grammatical structure and meaning of the sentence. Isaac is testifying in accordance with the judgment, not merely declaring the judgment itself.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/036/011.job-76839.json
  category: lexical
  from: make known
  to: testify
  rationale: The verb 'አስምዕ' (causative of 'to hear') in this context carries the forensic or covenantal weight of 'testify' or 'call to witness' (especially paired with 'ላዕሌክሙ', 'to/against you'). Softening this to 'make known' loses this important nuance.
