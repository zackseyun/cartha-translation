  category: revision_pass
  from: I declare and testify to you, my sons, according to the judgment that will come upon the man who wishes to do harm against his brother.”
  to: I declare and make known to you, my sons, the judgment that will come upon the man who desires to do evil against his brother.
  rationale: Revised 'testify' to 'make known' for closer alignment with the paired verbs, removed 'according to' as unnatural and unnecessary here, and changed 'do harm against' to 'do evil against' to reflect the source more directly in formal English.
- timestamp: '2026-04-28T09:36:32Z'
