translation:
  text: there was peace among them. And they went out from him and rested that day and slept. And Isaac slept on his bed five years[18], rejoicing, and he slept the eternal sleep and died at the age of one hundred and eighty years. He completed twenty-five weeks and five years. And his two sons buried him.
