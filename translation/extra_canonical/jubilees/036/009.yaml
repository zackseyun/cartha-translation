  category: mistranslation
  from: his own hand
  to: his hand
  rationale: The previous revision to 'his own hand' misinterprets the context and creates an unnatural English idiom. In this context (Isaac warning his sons), the warning is that the brother who plots evil will fall into the power of the brother he plotted against (e.g., Esau falling into Jacob's hand). The Ge'ez 'እዴሁ' (his hand) refers to the brother's hand, not the plotter's own hand. Reverting to 'his hand' (or clarifying as 'his brother's hand') corrects this.
