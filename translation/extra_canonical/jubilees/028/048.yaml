  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/028/048.job-76655.json
  category: mistranslation
  from: And Dinah was born to him
  to: And a daughter was born, whose name was Dinah,
  rationale: The Ge'ez text explicitly includes ስማ (semā, "her name"), which the revision completely omits. Additionally, "to him" is not in the source text. The opening word (OCR'd as ወለወለት but properly ወተወልደት) means "And she was born," yielding "And she was born, Dinah her name" or "And a daughter was born, whose name was Dinah."
- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/028/048.job-76655.json
  category: mistranslation
  from: And she had mercy,
  to: And He had mercy on her,
  rationale: The verb ወተሣሀላ (wa-taśāhalā) is a third-person masculine singular verb ("he had mercy") with a third-person feminine singular object suffix ("on her"). It refers to God having mercy on Rachel (a thought which continues into the next verse). Translating it as "And she had mercy" is a grammatical mistranslation of both the subject and the object suffix.
