  to: but her appearance was very beautiful, and Rachel was beautiful,
  rationale: 'The current draft harmonizes with Genesis 29:17 and misses a unique exegetical feature of Jubilees. The Ge''ez text explicitly defends Leah: `ወባሕቱ፡ ላሕይ፡ ራእያ፡ ጥቀ፡` means ''but her [Leah''s] appearance was very beautiful'' (note the presence of `ጥቀ፡` / ''very'', which the previous revision incorrectly claimed was unsupported). It then adds `ወራሔል፡ ሠናይ፡` (''and Rachel was beautiful''). The translation must preserve this distinction rather than combining the attributes and applying them solely to Rachel.'
