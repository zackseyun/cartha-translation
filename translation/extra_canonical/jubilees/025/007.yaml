  from: 'what Abraham our father told me: that he commanded me'
  to: the word of Abraham our father, for he commanded me
  rationale: 'The Ge''ez ''ነገረ፡ አብርሃም፡ አቡነ፡'' literally means ''the word of Abraham our father.'' Translating it as ''what Abraham our father told me'' is unnecessarily dynamic for optimal equivalence. Furthermore, the following conjunction is ''እስመ'' (for/because), not ''ከመ'' (that). Rendering it as ''the word of Abraham our father, for he commanded me'' is more faithful to the source syntax and avoids the slightly awkward English apposition (''told me: that he commanded me'').'
