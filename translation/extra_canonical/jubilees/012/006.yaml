  from: Shame belongs to those who make them
  to: '[They are a deception] to those who make them'
  rationale: The phrase 'Shame belongs' is interpolated to make the verse a complete sentence, as the Ge'ez ለእለ፡ ይገብርዎሙ ('to those who make them') continues the thought from verse 5 ('They are a deception of the heart...'). Interpolating 'Shame' introduces a concept not present in the source; it would be better to supply the implied thought from the previous verse.
