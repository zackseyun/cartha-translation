  category: mistranslation
  from: who have made me go astray?
  to: who have made me serve?
  rationale: The Ge'ez verb እትአዘዝ ('et'azaz) means 'to obey, submit, or serve,' not 'to go astray.' Terah is expressing that the people have compelled him to serve (as a priest to the idols), which aligns with standard translations (e.g., VanderKam, Wintermute).
- timestamp: '2026-04-28T09:36:30Z'
