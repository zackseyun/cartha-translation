  rows:
  - verse: 1
    geez: ወበሳድስ፡ ዓመት፡ ዘዝሱባዔ፡ ጸውዐ፡ ይስሐቅ፡ ክልኤሆሙ፡ ውሉዶ፡ ዔሳውን፡ ወያዕቆብሃ፡ ወመጽኡ፡ ኀቤሁ፡ ወይቤሎሙ፡
      ደቂቅየ፡ አነ፡ እሐውር፡ ውስተ፡ ፍኖተ፡ አበውየ፡ ውስተ፡ ቤት፡ ዘለዓለም፡ ኀበ፡ ሀለዉ፡ ህየ፡ አበውየ።
  - verse: 2
    geez: ወቅብሩኒ፡ ቅሩበ፡ አብርሃም፡ አቡየ፡ ውስተ፡ ባዐት፡ ዘካዕበት፡ ውስተ፡ ገራህተ፡ ኤፍሮን፡ ኬጥያዊ፡ ዘአጥረየ፡ አብርሃም፡
      ለዝኅረ፡ መቃብር፡ ህየ፡ ውስተ፡ መቃብር፡ ዘከረይኩ፡ ለርእስየ፡ ህየ፡ ቅብሩኒ።
  - verse: 3
    geez: ወዘንተ፡ እኤዝዘክሙ፡ ውሉድየ፡ ከመ፡ ትግበሩ፡ ጽድቀ፡ ወርትዐ፡ በዲበ፡ ምድር፡ ከመ፡ ያምጽእ፡ እግዚአብሔር፡ ላዕሌክሙ፡
      ኵሎ፡ ዘመጠነ፡ ነገረ፡ እግዚአብሔር፡ ይገበር፡ ለአብርሃም፡ ወለዘርኡ።
  - verse: 4
    geez: ወኩኑ፡ ውሉድየ፡ በበይናቲክሙ፡ እንዘ፡ ታፈቅሩ፡ አኅዊክሙ፡ ከመ፡ ብእሲ፡ ዘያፈቅር፡ ነፍሶ፡ ወእንዘ፡ የኀሥሥ፡ ብእሲ፡
      በእኁሁ፡ በዘ፡ ይሤኒ፡ ሎቱ፡ ወበገቢረ፡ ኅቡረ፡ በዲበ፡ ምድር፡ ወይትፋቀሩ፡ በበይናቲሆሙ፡ ከመ፡ ነፍሶሙ።
  - verse: 5
    geez: ወበእንተ፡ ነገረ፡ ጣዖት፡ አነ፡ አአዝዘክሙ፡ ወእጌሥጸክሙ፡ ከመ፡ ትመንንምዎሙ፡ ወተጸረርዎሙ፡ ወከመ፡ ኢታፍቅርዎሙ፡
      እስመ፡ ስሕተት፡ ምሉአን፡ እሙንቱ፡ ለእለ፡ ያመልኩዎሙ፡ ወለእለ፡ ይሰግዱ፡ ሎሙ።
  - verse: 6
    geez: ተዘከርዎ፡ ውሉድየ፡ ለእግዚአብሔር፡ ለ*አምላከ፡ አብርሃም፡ አቡክሙ፡ ወእምዝ፡ አነኒ፡ አምላክየ፡ ወተቀነዩኩ፡ ሎቱ፡
      ዘበጽድቅ፡ ወበፍሥሓ፡ ከመ፡ ይብዝኅክሙ፡ ወያልህቅ፡ ዘርአክሙ፡ ከመ፡ ከዋክብተ፡ ሰማይ፡ ለብዙኅ፡ ወይትከልክሙ፡ ውስተ፡
      ምድር፡ ተክለ፡ ጽድቅ፡ ዘኢይሤረዉ፡ ለኵሉ፡ ትውልድ፡ ዘለዓለም።
  - verse: 7
    geez: ወይእዜኒ፡ አነ፡ አምሕለክሙ፡ በመሐላ፡ ዐቢይ፡ እስመ፡ አልቦ፡ መሐላ፡ ዘእምኔሁ፡ የዐቢ፡ በስም፡ ስቡሕ፡ ወክቡር፡
      ወዐቢይ፡ ወስፉሕ፡ ወመንክር፡ ወኀያል፡ ዘገብረ፡ ሰማያተ፡ ወምድረ፡ ወኵሎ፡ ኅቡረ፡ ከመ፡ ትኩኑ፡ እለ፡ ትፈርህዎ፡ ወእለ፡
      ታመልከዎ።
  - verse: 8
    geez: ወእንዘ፡ ያፈቅር፡ *አሐዱ፡ አሐዱ፡ እኅዋሁ፡ በምሕረት፡ ወበጽድቅ፡ ወኢይፈቅድ፡ ብእሲ፡ እኩየ፡ በእኁሁ፡ እምይእዜ፡
      ወእስከ፡ ለዓለም፡ ኵሎ፡ መዋዕለ፡ ሕይወትክሙ፡ ከመ፡ ትሠርሑ፡ በኵሉ፡ ምግባሪክሙ፡ ወኢትትሐጐሉ፡፡
  - verse: 9
    geez: ወእመቦ፡ ዘኀሠሠ፡ እምኔክሙ፡ እኩየ፡ ለእኁሁ፡ አእምሩ፡ እምይእዜ፡ ከመ፡ ኵሉ፡ ዘየኀሥሥ፡ እኩየ፡ ለእኁሁ፡ ውስተ፡
      እዴሁ፡ ይወድቅ፡ ወይሤር፡ እምድረ፡ ሕያዋን፡ ወዘርኡኒ፡ ይትሐጐል፡ እምታሕተ፡ ሰማይ።
  - verse: 10
    geez: ወአመ፡ ዕለተ፡ *ሁከት፡ ወመርገም፡ ወቍጥዓ፡ ወመዓት፡ ወበእሳት፡ ዘይነድድ፡ በላዒ፡ በከመ፡ አውዐየ፡ ሰዶምሃ፡ ከማሁ፡
      ያውዒ፡ ምድረ፡ ወሀገረ፡ ወኵሎ፡ ዘይከውን፡ ዚአሁ፡ ወይደመሰስ፡ እመጽሐፈ፡ *ተግሣጸ፡ ውሉደ፡ ሰብእ፡ ወአየዐርግ፡ ውስተ፡
      መጽሐፈ፡ ሕይወት፡ እስመ፡ ውስተ፡ ዘይትሐጐል፡ ወየኀልፍ፡ ለ*መርገም፡ ዘለዓለም፡ ከመ፡ ለኵሉ፡ መዋዕል፡ ይኩን፡ ይደኖሙ፡
      እንዘ፡ ትትሔደስ፡ በጽእለት፡ ወበ*መርገም፡ ወበመዐት፡ ወበፃዕር፡ ወበቍጥዓ፡ ወበመቅሠፍት፡ ወበደዌ፡ ዘለዓለም።
  - verse: 11
    geez: አነ፡ አነግር፡ ወአስምዕ፡ ላዕሌክሙ፡ ውሉድየ፡ በከመ፡ ኵነኔ፡ ዘይመጽእ፡ ዲበ፡ ብእሲ፡ *ዘይፈቅድ፡ ይግበር፡ ሕሡመ፡
      ላዕለ፡ እኁሁ።
  - verse: 12
    geez: '*ወከፈለ፡ ኵሎ፡ ዘቦ፡ ጥሪተ፡ ሰክአሊሆሙ፡ በይእቲ፡ ዕለት፡ ወወሀበ፡ ዕበየ፡ ለብእሲ፡ ዘውእቱ፡ ቀደመ፡ ተወልደ፡
      ወማኅፈደ፡ ወ*ኵሎ፡ ዘአውዳ፡ ወኵሎ፡ ዘአጥረየ፡ አብርሃም፡ በኀበ፡ ዐዘቅተ፡ መሐላ።'
  - verse: 13
    geez: ወይቤ፡ *ዘንተ፡ እሁብ፡ ዕበየ፡ ለብእሲ፡ ዘ*ውእቱ፡ ቀደመ፡ ተወልደ።
  - verse: 14
    geez: ወይቤ፡ ዔሳው፡ ሤጥኩ፡ ሎቱ፡ ለያዕቆብ፡ *ወወሀብኩ፡ ልህቃነ፡ ለያዕቆብ፡' ወይትወሀብ፡ ሎቱ፡ ወአልቦየ፡'
  - verse: 15
    geez: ዘእብል፡ በእንቲአሃ፡ ምኵናኒ፡ ቃለ፡ እስመ፡ ኀቤሁ፡ ሀለወት።' ወይቤ፡ ይስሐቅ፡ ታዕርፍ፡ ዲቤክሙ፡ *በረከተ፡'
      አውሉድየ፡' ወላዕለ፡ ዘርእክሙ፡ በዛቲ፡ ዕለት፡ እስመ፡ አዕረፍክሙ*ኒ፡'
  - verse: 16
    geez: ወአሐዘከ፡ ልብየ፡ በእንተ፡ ልህቃን፡' ከመ፡ ኢትግበር፡ በእንቲአሃ፡ ፁገ። ይባርከ፡' እግዚአብሔር፡
  - verse: 17
    geez: ልዑል፡ ለ*ብእሲ፡ ዘይገብር፡ ጽድቀ፡ ኪያሁ፡ ወዘርኦ፡" እስከ፡ ለዓለም። ወፈጸመ፡ እንዘ፡ ይኤዝዞሙ፡ ወ*እንዘ፡'
      ይባርኮሙ፡ ወበልዑ፡ ወሰትዩ፡ በቅድሜሁ፡ ኅቡረ፡ ወተፈሥሑ፡ እስመ፡
  - verse: 18
    geez: ኮነ፡ ዐርዮ፡ በማእከሎሙ፡ ወወፅኡ፡ እምኀቤሁ፡" ወአዕረፉ፡ ይእቲ፡ ዕለት፡ ወኖሙ። ወኖመ፡ ይስሐቅ፡ ውስተ፡ ዓራቱ፡"
      *በዛቲ፡ ዕለት፡" እንዘ፡ ይትፌሣሕ፡ ወኖመ፡ ንዋመ፡ ዘለዓለም፡ ወሞተ፡ ወልደ፡ *፻ወ፹ዓመት፡" *፻ወ፶ምስ፡" ሱባዔ፡ ፈጸመ፡
      ወ፭ዓመተ፡" ወቀበርዎ፡ ክልኤሆሙ፡ ውሉዱ፡
  - verse: 19
    geez: ዔሳው፡ ወያዕቆብ። ወሖረ፡ ዔሳው፡ ውስተ፡ ምድረ፡ ኤዶም፡ ውስተ፡ ደብረ፡ ሴር፡ ወነበረ፡ ህየ።
  - verse: 20
    geez: ወያዕቆብ፡" ኀደረ፡ ውስተ፡ ደብረ፡ ኬብሮን፡ ውስተ፡ ማኅደድ፡ ዘምድረ፡ ፍልሰተ፡ አቡሁ፡ አብርሃም፡ ወአምላከ፡ ለእግዚአብሔር፡
      በኵሉ፡ ልቡ፡ ወበከመ፡ ትእዛዛት፡" ዘያስተርኢ፡ *በከመ፡
  - verse: 21
    geez: ፈለጠ፡ ዘ"መዋዕለ፡ ልደቱ። ወሞተት፡ ልያ፡ ብእሲቱ፡" በዓመት፡ ራብዕ፡ ዘሱባዔ፡ ካልእ፡ ዘ*አርብዓ፡ ወኃምስ፡"
      ኢዮቤልዉ፡ ወቀበራ፡ ውስተ፡ በዓተ፡' ዘእንተ፡ ክልኤ፡ ቅሩበ፡ ርብቃ፡ እሙ፡
  - verse: 22
    geez: '*በፀጋመ፡ ለመቃብረ፡ ሣራ፡ እሙ፡ አቡሁ።" ወመጽኡ፡ ኵሎሙ፡'' *ውሉዳ፡ ወ"ውሉዱ፡ ከመ፡ *ይብክይዋ፡ ልያሃ፡
      ብእሲተ፡" ምስሌሁ፡ ወከመ፡ ይናዝዝዎ፡ በእንቲአሃ፡ እስመ፡ ሀሎ፡ ይሳቀዮ።'
  - verse: 23
    geez: እስመ፡ ያፈቅራ፡ ፈድፋደ፡ ጥቀ፡' እምአመ፡ ሞተት፡ ራሔል፡ እኅታ፡ እስመ፡ ፍጽምት፡ ወሬትዕት፡ ይእቲ፡' *በኵሉ፡
      ፍናዊሃ፡' ወታከብሮ፡" ለያዕቆብ፡ *ወበኵሉ፡ መዋዕል፡" ዘሐይወት፡ ምስሌሁ፡ ኢሰምዐ፡ እምአፉሃ፡ ቃለ፡ ድሩከ፡ እስመ፡
      የውህት፡" ወሰላመ፡" ወርትዕ፡" ወክብራ፡ ባቲ።
