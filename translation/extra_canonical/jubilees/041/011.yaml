  category: mistranslation
  from: Come to me
  to: Let me come in to you
  rationale: The Ge'ez 'እባእ፡ ኀቤኪ' (ebā' ḫabēki) is a first-person singular jussive/subjunctive ('Let me come in') directed to the second-person feminine ('to you'), not an imperative directed to her ('Come to me'). This matches the Hebrew idiom in Genesis 38:16.
- timestamp: '2026-04-28T09:36:32Z'
