  category: lexical
  from: recognized her as
  to: thought her to be
  rationale: The Ge'ez verb 'taḥazaba' means to think, suppose, or consider. In this context (matching Gen 38:15), Judah incorrectly assumes she is a prostitute; 'recognized' implies he correctly identified her actual status, which is contextually misleading.
