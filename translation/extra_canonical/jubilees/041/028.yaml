  category: revision_pass
  from: For he went according to the desire of his eyes and sought judgment, because from the judgment of Abraham, which he commanded his sons, Judah desired that she be burned with fire.
  to: For he went after the desire of his eyes and sought judgment, because from the judgment of Abraham, which he commanded his sons, Judah desired that she be burned with fire.
