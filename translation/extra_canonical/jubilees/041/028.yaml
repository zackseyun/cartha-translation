- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/041/028.job-76935.json
  category: mistranslation
  from: after the desire of his eyes
  to: in the innocence of his eyes
  rationale: The Ge'ez word `የውሀተ` (yawhata) means 'innocence,' 'simplicity,' or 'uprightness,' not 'desire' (which would be `ፍትወት`, fetwat). The author of Jubilees is explicitly defending Judah's actions by stating he acted innocently/uprightly in seeking judgment against Tamar, not that he was following his lust. Translating this as 'desire' completely reverses the narrative and theological intent of the verse.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/041/028.job-76935.json
  category: lexical
  from: from the judgment
  to: by the judgment
  rationale: While the preposition `እም` (em) literally means 'from,' in this legal context it indicates the basis or authority for the action. 'By the judgment' or 'according to the judgment' is much more idiomatic in English.
