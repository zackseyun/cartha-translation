  rows:
  - verse: 1
    geez: መካነ፡ ደይን። ወለአሐዱ፡ እምኔነ፡ ይቤ፡ ከመ፡ ንምሀር፡ ለኖኅ፡ ኵሎ፡ ፈውሶሙ፡ እስመ፡
  - verse: 11
    geez: ያአምር፡ ከመ፡ አኮ፡ በርቱዕ፡ ዘየሐውሩ፡ ወአኮ፡ በጽድቅ፡ ዘይትባአሱ። ወገበርነ፡ በከመ፡ ኵሉ፡ ቃሉ፡ ኵሎ፡ እኩያነ፡
      እለ፡ ይጸውጉ፡ አሰርነ፡ ውስተ፡ መካነ፡ ደይን፡ ወዓሥራተሙ፡
  - verse: 12
    geez: አተርፍነ፡ ከመ፡ ይትኰነኑ፡ ቅድመ፡ ሰይጣን፡ ዲበ፡ ምድር። ወፈውሰ፡ ደዌሆሙ፡ ኵሎ፡
  - verse: 13
    geez: ነገርናሁ፡ ለኖኅ፡ ምስለ፡ አስሕተትሙ፡ ከመ፡ ይፈውሱ፡ በዕፀወ፡ ምድር። ወጸሐፈ፡ ኖኅ፡ ኵሎ፡ ዘከመ፡ መሀርናሁ፡
      በመጽሐፍ፡ በኵሉ፡ ትዝምደ፡ ፈውሳት፡ ወተዐጸዉ፡ መናፍስት፡
  - verse: 14
    geez: እኩያን፡ እምድኅሬሆሙ፡ ለውሉደ፡ ኖኅ። ወወሀበ፡ ኵሎ፡ ዘጸሐፈ፡ ለሴም፡ ወልዱ፡ ዘይፈህቅ፡
  - verse: 15
    geez: እስመ፡ ኪያሁ፡ ያፈቅር፡ ፈድፋደ፡ እምኵሉ፡ ውሉዱ። ወኖመ፡ ኖኅ፡ ምስለ፡ አበዊሁ፡
  - verse: 16
    geez: ወተቀብረ፡ *ውስተ፡ ሉባር፡ ደብር፡ በምድረ፡ አራራት። ፱፻ወ፶ዓመተ፡ ፈጸመ፡ በሕይወቱ፡
  - verse: 17
    geez: '*፲ወ፱ *እዮቤልው፡ ወክልኤ፡ ሱባዔ፡ ወ፭ዓመተ። ዘአፈድፈደ፡ ሐዩዎ፡ *ዲበ፡ ምድር፡ እምውሉደ፡ ሰብእ፡ በእንተ፡
      ጽድቅ፡ ዘባቲ፡ *ፍጹመ፡ ኮነ፡ ዘእንበለ፡ ሄኖክ። እስመ፡ ገብሩ፡ ለሄኖክ፡ ተፈጥሮተ፡ ለስምዕ፡ ለትዝምደ፡ ዓለም፡ ከመ፡
      ይንገር፡ ኵሎ፡ ግብረ፡ ለትውልደ፡'
  - verse: 18
    geez: ትውልድ፡ ለዕለተ፡ ደይን። ወበሰላሳ፡ ወሰለስቱ፡ እዮቤልው፡ በዓመት፡ አሐዱ፡ በ፪ካልእ፡ ሱባዔ፡ ነሥአ፡ ሎቱ፡ ፋሌክ፡
      ብእሲተ፡ እንተ፡ ስማ፡ *ሎምና፡ ወለተ፡ ሲናአር፡ ወወለደት፡ ሎቱ፡ ወልደ፡ በዓመት፡ ራብዕ፡ ዘሱባዔ፡ ዝንቱ። ወጸውዐ፡
      ስሞ፡ ራገው፡ እስመ፡ ይቤ፡ ናሁ፡ ውሉደ፡ ሰብእ፡ ኮኑ፡ እኩያነ፡ በምክረ፡ ዐግ፡ ከመ፡ ይሕንፁ፡ ሎሙ፡ ሀገረ፡ ወማኅፈደ፡
      ውስተ፡ ምድረ፡
  - verse: 19
    geez: ሲናአር። እስመ፡ ፈለሱ፡ እምድረ፡ አራራት፡ መንገለ፡ ጽባሕ፡ ውስተ፡ ሰናአር፡ እስመ፡ በመዋዕሊሁ፡ ሐነጽዎ፡ ለሀገር፡
      ወለማኅፈድ፡ እንዘ፡ ይብሉ፡ ንዑ፡ ንዕርግ፡ ቦቱ፡ ውስተ፡
  - verse: 20
    geez: ሰማይ። ወአንዙ፡ ይሕንጹ፡ ወበሱባዔ፡ ራብዕ፡ ንንፈሱ፡ በእሳት፡ ወከኖሙ፡ ንንፋስ፡ ከመ፡ እብን፡ ወፀቡር፡ በዘይመርጉ፡
      ሱቱ፡ አስፋሌጦስ፡ ዘይወፅእ፡ እምነ፡ ባሕር፡ ወእምአንቅዐተ፡
  - verse: 21
    geez: ማያት፡ በምድረ፡ ሰናአር። ወሐነጽዎ፡ *አርብዓ፡ ዓመተ፡ ወሠለስተ፡ ዓመተ፡ ሀለዉ፡ የሐንጽዎ፡ ግንፋለ፡ ጽፍሑ፡ ፪፻ወ፬
      ውስቴቱ፡ ወማእስቱ፡ አሐቲ፡ ኑኅ፡ *ሐምሳ፡ ምእት፡ ወአርባዐቱ፡ ምእት፡ ወሰላሳ፡ ወሰለስቱ፡ በአመት፡ ዐርገ፡ ኑኁ፡ *ወክልኤ፡
      ስዝር፡ ወ፲ወ፪ ምዕራፍ። ወይቤለነ፡ እግዚአብሔር፡ አምላክነ፡ ለነ፡ ናሁ፡ ሕዝብ፡" አሐዱ፡ ወ"ወጠነ፡ ይግበር፡" ወይእዜኒ፡
      ፳፪ ኢይኅልቅ፡" እምኔሆሙ፡ ኀበ፡ "ነረደ፡ ወ"ንከዐው፡" ልሳናቲሆሙ፡ ወኢይስማዕ፡ "እኍዋሁ፡ ካልኡ፡" ወይዘረዉ፡ ውስተ፡
      አህጉር፡ ወውስተ፡ አሕዛብ፡ ወ"አትነብር፡ እንከ፡" አሐቲ፡ ምክር፡ ላዕሌሆሙ፡ እስከ፡ አመ፡ ዕለተ፡ ይኴን። ወወረደ፡ እግዚአብሔር፡
      ወወረድነ፡ ምስሌሁ፡ ንርአይ፡ ፳፫ ሀገረ፡ ወማኅፈደ፡ ዘሐነጹ፡ ውሉደ፡ ሰብእ። ወሥጠ"፡" ልሳናቲሆሙ፡ ወአስምዐ፡ እንከ፡
      ፳፬ አሐዱ፡" ቃለ፡ ካልኡ፡ ወአንተጉ፡ እንከ፡ ሐኒጸ፡ ሀገር፡ ወማኅፈድ።" በእንተዝ፡ ተሰምየት፡ ስማ፡ ፳፭ ምድረ፡ ሴናአር፡"
      ባቤል፡ እስመ፡ በህየ፡ ሰወጠ፡" እግዚአብሔር፡" ኵሎ፡" ልሳናቲሆሙ፡ ለውሉደ፡ ሰብአ፡ ወእምህየ፡ ተዘርዉ፡ ውስተ፡ አህጉሪሆሙ፡
      በበ፡ ልሳናቲሆሙ፡ ወበበ፡ ሕዝቢሆሙ።
  - verse: 26
    geez: ወፈነወ፡ እግዚአብሔር፡ ነፋሰ፡ ዐቢየ፡ ውስተ፡ ማኅፈድ፡ ወገፍታአ፡ ውስተ፡ ምድር፡ ወናሁ፡
  - verse: 27
    geez: ውእቱ፡ ማእከለ፡ አሱር፡ ወባቢሎን፡ ውስተ፡ ምድረ፡ ሰናአር፡ ወጸውዐ፡ ስሞ፡ ደቀት፡ በሱባዔ፡ ራብዕ፡ በአሐዱ፡ ዓመት፡
      በመቅደመ፡ ዚአሁ፡ በ፴ሳባ፡ ወአርባዕቱ፡ እዮቤልው፡ ተዘርዉ፡
  - verse: 28
    geez: እምድረ፡ ሲናአር። ወሖሩ፡ ካም፡ ወውሉዱ፡ ውስተ፡ ምድር፡ እንተ፡ አሕዝት፡ ሎቱ፡ ዘረከበ፡
  - verse: 29
    geez: በመክፈልቱ፡ ውስተ፡ ምድረ፡ ደቡብ። ወርእየ፡ ከናአን፡ ምድረ፡ ሊባኖስ፡ እስከ፡ መሐዘ፡ ግብጽ፡ *ከመ፡ ሠናይ፡ ይእቲ፡
      ጥቀ፡ ወኢሖረ፡ ውስተ፡ ምድረ፡ ርስት፡ መንገለ፡ ዐረብ፡ ባሕር፡ ወኀደረ፡ ውስተ፡ ምድረ፡ ሊባኖስ፡ እምጽባሕ፡ ወእምዐረብ፡
      እምእደ፡ ዮርዳኖስ፡ ውእምእደ፡
  - verse: 30
    geez: ባሕር። ወይቤሎ፡ ካም፡ አቡሁ፡ ወኩስ፡ መውጽሬም፡ አኀዊሁ፡ እስመ፡ ኀደርከ፡ ውስተ፡ ምድር፡ እንተ፡ አኮነ፡ እንቲአከ፡
      ወኢወፀአ፡ ለከ በዕፁ፡ ኢትግበር፡ ከመዝ፡ *እስመ፡ ለእመ፡ ከመዝ፡ ገበርከ፡ አንተሂ፡ ወደቂቅከሂ፡ ትወድቁ፡ ውስተ፡ ምድር፡
      ወርጉማን፡ በሀከከ፡ *እስመ፡
  - verse: 31
    geez: በሀከከ፡ ኀደርክሙ፡ ወበሀከከ፡ ይወድቁ፡ ደቂቅከ፡ ወትሴር፡ ለዓለም። ኢትኅደር፡
  - verse: 32
    geez: ውስተ፡ ማኅደረ፡ ሴም፡ *እስመ፡ ለሴም፡ ወለውሉዱ፡ ወፀአ፡ በዕፆሙ። ርጉም፡ አንተ፡ ወርጉመ፡ ትከውን፡ እምኵሎሙ፡
      ውሉደ፡ ኖኅ፡ በመርገም፡ እንተ፡ ተማራዕነ፡ በመሐላ፡
  - verse: 33
    geez: በቅድሜሁ፡ ለመኰንን፡ ቅዱስ፡ ወበቅድመ፡ ኖኅ፡ አቡነ። ወኢሰምዖሙ፡ ወኀደረ፡ ምድረ፡
  - verse: 34
    geez: ሊባኖስ፡ እምአማት፡ እስከ፡ ምብዋአ፡ ግብጽ፡ ውእቱ፡ ወውሉዱ፡ እስከ፡ ዛቲ፡ ዕለት። ወበእንተዝ፡
  - verse: 35
    geez: ተሰምየት፡ ይእቲ፡ ምድር፡ ከናአን። ወደፌትሰ፡ ወውሉዱ፡ ሖሩ፡ መንገለ፡ ባሕር፡ ወኀደሩ፡ ውስተ፡ ምድረ፡ መክፈልቶሙ፡
      ወርእየ፡ ማዳይ፡ ምድረ፡ ባሕር፡ ወኢአደመት፡ በቅድሜሁ፡ ወአስተብቍዓ፡ እምኀበ፡ ኤላም፡ ወአሱር፡ ወአርፋክስድ፡ እምኀበ፡
      አኀወ፡ ብእሲቱ፡ ወኀደረ፡
  - verse: 36
    geez: ውስተ፡ ምድረ፡ ሜድቂን፡ ቅሩበ፡ ኀበ፡ አኀወ፡ ብእሲቱ፡ እስከ፡ ዛቲ፡ ዕለት። ወሰመየ፡ ምገባሪሁ፡ ወምገባረ፡ ውሉዱ፡
      ሜዲቂን፡ እስመ፡ ማዳይ፡ አቡሆሙ።
  validation_modes:
