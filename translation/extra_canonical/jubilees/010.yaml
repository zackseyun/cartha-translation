translation:
  text: '1. And the place of judgment was made. And one of us said, “Let us teach
    Noah all their remedies, because

    2. the unclean demons began to lead astray the children of the sons of Noah, and
    to make them err and destroy them.”

    3. And he prayed before the Lord his God, and said, “God of the spirits of all
    flesh, who have shown mercy to me and saved me and my sons from the waters of
    the flood, and have not caused me to perish as you caused the sons of perdition
    to perish—

    4. for your grace has been great toward me, and great is your mercy toward my
    life—let your grace be lifted up over my sons, and do not let wicked spirits rule
    over them, lest they destroy them from the earth.

    5. But bless me and my sons, that we may increase and multiply and fill the earth.

    6. And you know how your Watchers, the fathers of these spirits, acted in my days.
    As for these spirits that are living, imprison them and hold them fast in the
    place of judgment, and do not let them bring corruption upon the sons of your
    servant, my God, for these are malignant and were created in order to destroy.

    7. And let them not rule over the spirits of the living, for you alone know their
    judgment; and do not let them have power over the sons of the righteous from now
    and forevermore.”

    8. And the Lord our God told us to bind all of them.

    9. And the chief of the spirits, Mastema, came and said, “Lord, Creator, let some
    of them remain before me, and let them listen to my voice and do all that I tell
    them; for if some of them are not left to me, I will not be able to exercise the
    authority of my will over the sons of men. For these are for corruption and for
    leading astray before my judgment, because the wickedness of the sons of men is
    great.”

    10. And he said, “Let a tenth of them remain before him, and let nine parts descend
    into the place of judgment.”

    11. And one of us said that we should teach Noah all their medicines, because
    he knew that they were not walking in uprightness and were not striving in righteousness.
    And we acted according to all his word: all the evil ones that were cruel we bound
    in the place of judgment, and

    12. we left a tenth of them so that they might be subject before Satan on the
    earth. And we told Noah all their remedies for their errors, so that they might
    be healed by the plants of the earth.

    13. And Noah wrote down everything that we had taught him in a book, all the kinds
    of healing remedies; and the evil spirits were restrained from following the sons
    of Noah.

    14. And he gave all that he had written to Shem, his son, because he loved him
    much more than all his sons.

    15. And Noah slept with his fathers, and was buried on Mount Lubar in the land
    of Ararat.

    16. Nine hundred and fifty years he completed in his life,

    17. nineteen jubilees and two weeks of years and five years. And in his life on
    the earth he surpassed the sons of men, except Enoch, because of the righteousness
    in which he was perfect. For Enoch’s task was ordained as a testimony for the
    generations of the world, so that he should recount all the deeds of generation
    after generation until the day of judgment.

    18. And in the thirty-third jubilee, in the first year of the second week, Peleg
    took for himself a wife whose name was Lomna, daughter of Sinaar, and she bore
    him a son in the fourth year of this week. And he called his name Reu, for he
    said, “Look, the sons of men have become evil through their wicked purpose to
    build for themselves a city and a tower in the land of Shinar.”

    19. For they departed from the land of Ararat eastward to Shinar, and in his days
    they built the city and the tower, saying, “Come, let us ascend by it into heaven.”

    20. And they began to build, and in the fourth week they made brick with fire,
    and the bricks served them as stone, and the clay with which they plastered was
    asphalt that comes out of the sea and from the springs of water in the land of
    Shinar.

    21. And they built it for forty-three years. Its breadth was 204 cubits, and the
    height of a brick was the third of one; its height amounted to 5,433 cubits and
    2 palms, and the extent of one wall was twelve stades, and of the other thirty
    stades.

    22. And the Lord our God said to us, “Look, they are one people, and this they
    have begun to do; and now nothing will be withheld from them. Come, let us go
    down and confuse their tongues, so that one will not hear another’s speech, and
    they will be scattered into cities and nations, and one purpose will no longer
    remain with them until the day of judgment.”

    23. And the Lord went down, and we went down with him, to see the city and the
    tower that the sons of men had built. And he confused all their tongues, and they
    no longer heard one another’s speech, and they ceased building the city and the
    tower. Therefore the whole land of Shinar was called Babel, because there the
    Lord confused all the tongues of the sons of men, and from there they were scattered
    into their cities, each according to his tongue and according to his nation.

    24. And the Lord sent a mighty wind against the tower, and it threw it down upon
    the earth; and look,

    25. it is between Asshur and Babylon in the land of Shinar. And he called its
    name Overthrow.

    26. In the fourth week, in the first year, in the thirty-fourth jubilee, they
    were scattered from the land of Shinar.

    27. And Ham and his sons went into the land that had fallen to him as his portion
    in the south land.

    28. And Canaan saw the land of Lebanon as far as the river of Egypt, that it was
    very good, and he did not go into the land of his inheritance to the west, that
    is, to the sea, but he dwelt in the land of Lebanon, from the east and from the
    west, from the border of the Jordan and from the border of the sea.

    29. And Ham his father, and Cush and Mizraim his brothers, said to him, “You have
    settled in a land that is not yours and that did not come out for us by lot. Do
    not do so,

    30. for if you do so, you and your sons will fall in the land and be accursed
    through rebellion; because by rebellion you have settled, and by rebellion your
    sons will fall, and you will be uprooted forever.

    31. Do not dwell in the dwelling of Shem, for to Shem and to his sons it came
    out by their lot.

    32. Cursed are you, and cursed you shall be beyond all the sons of Noah, by the
    curse by which we bound ourselves with an oath before the holy judge and before
    Noah our father.”

    33. But he did not listen to them, and he dwelt in the land of Lebanon from Hamath
    to the entrance of Egypt, he and his sons until this day.

    34. And for this reason that land was named Canaan.

    35. And Japheth and his sons went toward the sea and dwelt in the land of their
    portion. And Madai saw the land of the sea, and it did not please him, and he
    asked from Elam and Asshur and Arpachshad, his wife’s brother, a portion,

    36. and he dwelt in the land of Media, near his wife’s brother, until this day.
    And he called his dwelling-place, and the dwelling-place of his sons, Media, after
    Madai their father.'
