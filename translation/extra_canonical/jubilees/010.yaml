  footnotes:
  - marker: '1'
    text: Verse 1 is incomplete in the surviving row of the provided Ethiopic corpus
      and clearly continues into the next verse. The translation follows the chapter's
      sense as preserved across the immediate context.
    reason: segmentation_note
  - marker: '11'
    text: The Ethiopic at the start of v. 11 is difficult. The sense appears to be
      that Noah needed instruction because the spirits were not acting with strength/uprightness/righteousness.
      The translation renders the broader contextual sense rather than forcing each
      difficult clause woodenly.
    reason: segmentation_note
  - marker: '17'
    text: The phrase about Enoch is textually dense. The translation understands it
      to mean that Noah surpassed all other humans in lifespan except Enoch, while
      Enoch's distinctive role was as a witness for future generations until the day
      of judgment.
    reason: alternative_reading
  - marker: '21'
    text: The tower measurements in the Ethiopic are notoriously difficult, and some
      numerals/units may be corrupt. The translation preserves the transmitted figures
      as literally as possible, but the exact dimensions remain uncertain.
    reason: textual_variant
  - marker: '22'
    text: The wording echoes the Babel account but should not be treated as a mere
      quotation of Genesis; Jubilees embeds it in the angelic first-person revelation
      framework.
    reason: cross_reference
  - marker: '25'
    text: The name rendered 'Overthrow' reflects a ruin-name after the tower's collapse.
      The underlying form is uncertain in the Ethiopic tradition.
    reason: lexical_alternative
  - marker: '28'
    text: The territorial description of Canaan's settlement is compressed and somewhat
      difficult. 'To the west, that is, to the sea' represents the inheritance region
      he should have taken rather than the Lebanon region where he actually settled.
    reason: segmentation_note
  - marker: '35'
    text: The clause about Madai and 'his wife's brother' is awkward in Ethiopic.
      The translation takes Elam, Asshur, and Arpachshad as the parties from whom
      he requested a portion, with Arpachshad especially linked by marriage.
    reason: segmentation_note
lexical_decisions:
- source_word: መካነ፡ ደይን
  chosen: place of judgment
  alternatives:
  - judgment-place
  - place of condemnation
  rationale: Preserves the concrete locative expression and Jubilees' judicial-apocalyptic
    setting without overinterpreting as final condemnation only.
- source_word: ፈውሶሙ / ፈውሳት
  chosen: remedies / healing remedies
  alternatives:
  - medicines
  - cures
  rationale: The context is practical healing knowledge taught to Noah, especially
    by plants of the earth. 'Remedies' keeps both medicinal and curative force.
- source_word: መናፍስት እኩያን
  chosen: evil spirits
  alternatives:
  - wicked spirits
  - unclean spirits
  rationale: A straightforward rendering that matches the demonic context in the chapter.
    'Unclean' appears contextually in v. 2, but 'evil spirits' is the broader recurring
    term.
- source_word: ሰይጣን
  chosen: Satan
  alternatives:
  - the Adversary
  rationale: The Ethiopic uses the established title/name; retaining 'Satan' is the
    most readable and conventional rendering here.
- source_word: አስሕተትሙ
  chosen: their errors
  alternatives:
  - their deceits
  - their delusions
  rationale: In context Noah is taught remedies against harms associated with demonic
    misleading; 'errors' preserves the broad sense without narrowing to intellectual
    mistake only.
- source_word: ይፈውሱ፡ በዕፀወ፡ ምድር
  chosen: be healed by the plants of the earth
  alternatives:
  - be cured by herbs of the earth
  - be healed by the trees/plants of the land
  rationale: Preserves the earthy medicinal sense and avoids overtechnical language.
    'Plants' is broad enough for medicinal vegetation.
- source_word: ይፈህቅ
  chosen: he loved him much more
  alternatives:
  - he favored him
  - he preferred him
  rationale: The context is Noah giving the written material to Shem because of special
    affection. 'Loved him much more' reflects the comparative force.
- source_word: እዮቤልው
  chosen: jubilees
  alternatives:
  - jubilee cycles
  rationale: Required calendrical term in Jubilees; it must be preserved explicitly.
- source_word: ሱባዔ
  chosen: weeks of years
  alternatives:
  - weeks
  - heptads
  rationale: Jubilees uses schematic chronology; 'weeks of years' makes the calendrical
    meaning explicit for modern readers.
- source_word: ማኅፈድ
  chosen: tower
  alternatives:
  - fortified tower
  - high structure
  rationale: In the Babel context the standard sense is a tower; this preserves the
    narrative while not harmonizing beyond the source.
- source_word: አስፋሌጦስ
  chosen: asphalt
  alternatives:
  - bitumen
  - pitch
  rationale: The loanword points to bituminous material; 'asphalt' is a precise modern
    equivalent while remaining understandable.
- source_word: ደቀት
  chosen: Overthrow
  alternatives:
  - Collapse
  - Destruction
  rationale: The place-name given after the tower's fall appears to denote ruin or
    collapse. 'Overthrow' preserves the eventive force and name-like quality.
- source_word: በዕፁ / በዕፆሙ
  chosen: by lot / by their lot
  alternatives:
  - by allotted portion
  - by inheritance lot
  rationale: The context is territorial division among Noah's sons. 'By lot' is concise
    and preserves the allotment framework.
- source_word: ርጉም / መርገም
  chosen: accursed / curse
  alternatives:
  - cursed
  - under a curse
  rationale: Keeps the solemn covenantal-judicial tone of the pronouncement against
    Canaan.
theological_decisions:
- issue: Identity of the speaker group 'one of us' and first-person plural angelic
    narration
  chosen_reading: Retained the angelic first-person plural literally ('one of us',
    'we went down with him').
  alternative_readings:
  - Paraphrase as impersonal heavenly beings
  - Suppress the plural and attribute all action directly to God
  rationale: Jubilees is framed as angelic revelation. The plural voice is theologically
    significant and should not be flattened.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve
    revelatory framing.
- issue: Mastema and Satan terminology
  chosen_reading: Rendered the chief of the spirits as 'Mastema' in v. 9 and retained
    'Satan' in v. 12 where the Ethiopic has that term.
  alternative_readings:
  - Harmonize both to 'Satan'
  - Translate Mastema as 'hostility' or 'enmity'
  rationale: Jubilees distinguishes named demonic figures/titles in ways important
    to its demonology. The translation preserves that distinction rather than harmonizing
    it away.
- issue: Chronological formulas
  chosen_reading: Preserved jubilees, weeks of years, and years explicitly throughout.
  alternative_readings:
  - Convert to simplified dates
  - Use generic 'periods'
  rationale: Chronology is a major theological-literary feature of Jubilees and must
    remain visible.
  doctrine_reference: Preserve calendrical terminology carefully.
- issue: Canaan's settlement and curse
  chosen_reading: Rendered the warning as a territorial-oath violation tied to allotted
    inheritance and rebellion.
  alternative_readings:
  - Generalize as mere disobedience
  - Harmonize directly to Genesis 9 wording
  rationale: Jubilees' emphasis is on divinely apportioned land and oath-bound transgression,
    not merely a repetition of Genesis.
