  category: mistranslation
  from: Among a great people I have made him great
  to: I will make him into a great nation
  rationale: The Ge'ez phrase 'ውስተ ዐቢይ ሕዝብ እሬስዮ' (wəstä ʿäbiy ḥəzb ʾəresəyo) means 'I will make him into a great nation.' The verb እሬስዮ is imperfect ('I will make him'), not perfect, and the preposition ውስተ with the verb ረሰየ means 'to make [someone] into [something].' The adjective ዐቢይ ('great') modifies ሕዝብ ('nation/people'), not the verb.
