  to: that he should send them away from him.
  rationale: The Ge'ez verb ይሰድዶሙ (yəsaddədomu) is in the subjunctive/imperfect, completing the thought from the previous verse ('the matter was grievous... that he should send them away'). Translating it as a past indicative ('He sent them away') is grammatically incorrect and disrupts the narrative timeline, as Abraham does not actually send them away until after God speaks to him.
