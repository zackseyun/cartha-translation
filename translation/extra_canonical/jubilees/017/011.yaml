translation:
  text: She went a bowshot away, because she said, “Let me not see the death of my child,” and she sat and wept. And an angel of God, one of the holy ones, said to her, “What are you weeping for, Hagar? Rise, take up the child, and hold him with your hand, for God has heard your voice and has seen the child.”
