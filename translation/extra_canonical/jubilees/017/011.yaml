- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/017/011.job-76374.json
  category: lexical
  from: She went a little distance away
  to: She went a bowshot away
  rationale: The Ge'ez `አሐቲ፡ ምንዳፍ፡` (ʾaḥati mǝndaf) literally means 'one bowshot.' Translating it as 'a little distance away' obscures the specific measurement and the direct allusion to Genesis 21:16.
- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/017/011.job-76374.json
  category: mistranslation
  from: and she sat opposite him, weeping.
  to: and she sat and wept.
  rationale: The Ge'ez `ወነቢራ፡ በከየት` (wa-nabira bakayat) translates to 'and sitting, she wept' or 'and she sat and wept.' The phrase 'opposite him' is an intrusion from the Genesis 21:16 parallel and is not present in the Ge'ez text of Jubilees.
