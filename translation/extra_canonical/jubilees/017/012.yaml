  from: And she opened her eyes
  to: And He opened her eyes
  rationale: The Ge'ez verb ወከሠተ (wa-kaśata) is third-person masculine singular, referring to God opening Hagar's eyes (paralleling Genesis 21:19). If the subject were Hagar ('she opened'), the verb would be feminine (ወከሠተት, wa-kaśatat), matching the subsequent feminine verbs in the verse (ወርእየት, ወሖረት, ወመልአተ).
