  rows:
  - verse: 1
    geez: ወበቀዳሚ፡ ዓመት፡ ዘ"ሱባዔ፡ ፮ይስ፡ ዐርገ፡ ሰሌማሃ፡ *ዘመንገለ፡ ጽባሒሁ፡ ለሰቂማ፡
  - verse: 2
    geez: በሰላም፡ በ፮ብዕ፡ ወርኅ። ወበህየ፡ መስተዋ፡ ለዲና፡ ወሰተ፡ ያዕቆብ፡ ውስተ፡ ቤተ፡ ሴኬም፡ ወልደ፡ ኤሞር፡ ኤዋዊ፡
      መኰንነ፡ ምድር፡ ወሰከበ፡ ምስሌሃ፡ ወአርኰሳ፡ ወይእቲሰ፡ ንስቲት፡
  - verse: 3
    geez: ወሰተ፡ ፲ወ፪ዓመት። ወአስተብቍዓ፡ እምኀበ፡ አቡሁ፡ ትትወሀብ፡ ሎቱ፡ ብእሲተ፡ ወእምኀበ፡ አኀዊሃ፡ወተምዐዑ፡ ያዕቆብ፡
      ወውሉዱ፡ በእንተ፡ ዐደወ፡ ሰቂማ፡ እስመ፡ አርኰስዋ፡ ለዲና፡ እኅቶሙ፡
  - verse: 4
    geez: ወተናገሩ፡ ምስሌሆሙ፡ በአኩይ፡ ወኀብለይዎሙ፡ *ወአስፈጥዎሙ። ወቦኡ፡ ስምዖን፡ ወሌዊ፡ *ሰቂማ፡ ግብተ፡ ወገብሩ፡
      ኵነኔ፡ ላዕለ፡ ኵሎሙ፡ ዐደወ፡ ሰቂማ፡ ወቀተሉ፡ ኵሎ፡ ብእሴ፡ ዘረከቡ፡ ውስቴታ፡ ወኢያትረፉ፡ ውስቴታ፡ ወኢአሐደ፡ ኵሎ፡
      ቀተሉ፡ በ፵ዐር፡ እስመ፡ ገመፉ፡
  - verse: 5
    geez: ዲናሃ፡ እኅቶሙ። ወከመዝ፡ እንከ፡ አይትገበር፡ እምይእዜ፡ ለአርኵሶ፡ ወለተ፡ እስራኤል፡ እስመ፡ በሰማይ፡ ተሠርዐ፡
      ላዕሌሆሙ፡ ዝንቱ፡ ከመ፡ ያጥፍእዎሙ፡ በሰይፍ፡ ለኵሎሙ፡ ዐደወ፡ ሴቄማ፡
  - verse: 6
    geez: እስመ፡ ገብሩ፡ ኀፍረተ፡ ውስተ፡ እስራኤል። ወመጠዎሙ፡ እግዚአብሔር፡ ውስተ፡ እዴ፡ ውሉደ፡ ያዕቆብ፡ ከመ፡ ይሠርውዎሙ፡
      በሰይፍ፡ ወከመ፡ ይግበሩ፡ ላዕሌሆሙ፡ ዝንተ፡ ወከመ፡ ኢይኩን፡
  - verse: 7
    geez: እንከ፡ ከመዝ፡ በውስተ፡ እስራኤል፡ ለአርኵሶ፡ ድንግለ፡ እስራኤላዊት። ወብእሲ፡ እመቦ፡ ዘፈቀደ፡ በውስተ፡ እስራኤል፡
      የሀብ፡ ወለተ፡ ወእመኒ፡ እኅተ፡ ለኵሉ፡ ብእሲ፡ ዘእምዘርአ፡ አሕዛብ፡ ሞተ፡ ለይሙት፡ ወበእብን፡ ይውግርዎ፡ እስመ፡ ገብረ፡
      ኀፍረተ፡ በውስተ፡ እስራኤል፡ ወለብእሲትሂ፡
  - verse: 8
    geez: ያውዕይዋ፡ በእሳት፡ እስመ፡ አርኰሰት፡ ስመ፡ ቤተ፡ አቡሃ፡ ወትሠረው፡ እምእስራኤል። ወኢይት ረከብ፡ ዘማ፡ ወርኵስ፡
      በውስተ፡ እስራኤል፡ ኵሎ፡ መዋዕለ፡ ትውልደ፡ ምድር፡ እስመ፡ ቅዱስ፡ እስራኤል፡ ለእግዚአብሔር፡ ወኵሉ፡ ሰብእ፡ ዘአርኰሰ፡
      ሞተ፡ ለይሙት፡ በእብን፡ ይውግርዎ።
  - verse: 9
    geez: እስመ፡ ከመዝ፡ *ተሠርዐ፡ ወተጽሕፈ፡ ውስተ፡ ጽላተ፡ ሰማይ፡ በእንተ፡ ኵሉ፡ ዘርአ፡ እስራኤል፤
  - verse: 10
    geez: ዘያረኵስ፡ ሞተ፡ ለይሙት፡ ወበእብን፡ ይትወገር። ወአልቦ፡ ለዝ፡ ሕግ፡ ዐቅመ፡ መዋዕለ፡ ወአልቦ፡ ኅድገተ፡ ወኵሉ፡
      ስርየተ፡ ዘእንበለ፡ ዳእሙ፡ ይሤረው፡ ብእሲ፡ ዘአርኰሰ፡ ወለተ፡ በማእከለ፡ ኵሉ፡ እስራኤል፡ እስመ፡ እምውስተ፡ ዘርኡ፡
      ወሀቦ፡ ለሞሎክ፡ ወአበሰ፡ ለአርኵ
  - verse: 11
    geez: ሶታ። ወአንተኒ፡ ሙሴ፡ አዝዞሙ፡ ለደቂቀ፡ እስራኤል፡ ወአስምዕ፡ ላዕሌሆሙ፡ ከመ፡ ኢየሀቡ፡ እም፡ አዋልዲሆሙ፡ ለአሕዛብ፡
      ወከመ፡ አይንሥኡ፡ ለውሉዶሙ፡ እምአዋልደ፡ አሕዛብ፡
  - verse: 12
    geez: እስመ፡ ምኑን፡ ውእቱ፡ በቅድመ፡ እግዚአብሔር። በእንተዝ፡ ጸሐፍኩ፡ ለከ፡ ውስተ፡ ቃለ፡ ሕግ፡ ኵሎ፡ ግብሮሙ፡ ለሴቄማ፡
      ዘገብሩ፡ ላዕለ፡ ዲና፡ ወዘከመ፡ ተናገሩ፡ ደቂ፡ ያዕቆብ፡ እንዘ፡ ይብሉ፡
  - verse: 13
    geez: ኢነሀብ፡ ወለተነ፡ ለብእሲ፡ ዘቦ፡ ቍልፈተ፡ እስመ፡ ጽእለት፡ ውእቱ፡ *ለነ። ወጽእለት፡ ውእቱ፡ ለእስራኤል፡ ለእለ፡
      ይሁቡ፡ ወለእለ፡ ይነሥኡ፡ እምአዋልደ፡ አሕዛብ፡ እስመ፡ ርኵስ፡ ውእቱ፡
  - verse: 14
    geez: ወምኑን፡ ውእቱ፡ ለእስራኤል። ወኢይነጽሕ፡ እስራኤል፡ እምዝ፡ ርኵስ፡ ዘቦ፡ ብእሲት፡ እም፡
  - verse: 15
    geez: አዋልደ፡ አሕዛብ፡ *ወእመቦ፡ እምአዋልዲሁ፡ ዘወሀቦ፡ ለብእሲ፡ ዘእምኵሉ፡ አሕዛብ። እስመ፡ መቅሠፍት፡ ላዕለ፡ መቅሠፍት፡
      ውእቱ፤ ወመርገም፡ ላዕለ፡ መርገም፤ ወኵሉ፡ ዘነከ፡ *ወመቅ ሠፍት፡ ወመርገም፡ ይመጽእ፡ ወለእመ፡ ገብረ፡ ዘቃለ፡ *ወለእመ፡
      ተዐወረ፡ አዕይንቲሁ፡ እምእሉ፡ እለ፡ ይገብሩ፡ ርኵሰ፡ ወእምእለ፡ ያረኵሱ፡ መቅደሶ፡ ለእግዚአብሔር፡ ወእምእለ፡ ይጌምሩ፡
      ስሞ፡ ቅዱሰ፡ ይትኬነን፡ ኵሉ፡ ሕዝብ፡ ኅቡረ፡ በእንተ፡ ኵሉ፡ *ርኵስ፡ ወግማኔዝ፡ ወአልቦ፡ ነሢአ፡ ገጽ፡ [*ወአልቦ፡
      አድልዎ፡ ለገጽ፡] ወአልቦ፡ ነሢአ፡ *እምእዴሁ፡ ፍሬ፡ ወመሥዋዕተ፡ ወጽንሓሐ፡ ወስብሐ፡ ወትምዐዘ፡ መዐዛ፡ ሠናይ፡ ከመ፡
      ይትወከፎ፡ ወይኩን፡ ኵሉ፡ ብእሲ፡ ውበእሲት፡ በውስተ፡ እስራኤል፡ ዘያረኵስ፡ መቅደሶ፡ በእንተዝ፡ አዘዝኩከ፡ እንዘ፡ እብል፡
      አስምዕ፡ ዛተ፡ ስምዐ፡ ላዕለ፡ እስራኤል፤ ርእ፡ ዘከመ፡ ኮነ፡ ለሰቂሞን፡ ወለውሉዱ፡ ዘከመ፡ ተውህበት፡ ውስተ፡ እዴ፡ ክልኤሆሙ፡
      ደቂቀ፡ ያዕቆብ፡ ወቀተልዎሙ፡ በፃዕር፡ ወኮነቶሙ፡ ጽድቀ፡ ወተጽሕፎሙ፡ ለጽድቅ። ወተኃርየ፡ ዘርአ፡ ሌዊ፡ ለክህነት፡ ወለሌዋውያን፡
      ከመ፡ ይትለአኩ፡ ቅድመ፡ እግዚአብሔር፡ ከመ፡ ንሕነ፡ በኵሉ፡ መዋዕል፡ ወይትባረክ፡ ሌዊ፡ ወውሉዱ፡ ለዓለም፤ እስመ፡ ቀንአ፡
      ከመ፡ ይግበር፡ ጽድቀ፡ ወኵነኔ፡ ወበቀለ፡ እምኵሎሙ፡ እለ፡ ይትነሥኡ፡ ላዕለ፡ እስራኤል። ወከመዝ፡ ያዐርጉ፡ ሎቱ፡ በስምዐ፡
      ውስተ፡ ጽላተ፡ ሰማይ፡ በረከተ፡ ወጽድቀ፡ ቅድሜሁ፡ ለአምላከ፡ ኵሉ። ወንዜከር፡ ንሕነ፡ ጽድቀ፡ ዘገብረ፡ ሰብእ፡ በሕይወቱ፤
      በኵሉ፡ ጊዜያተ፡ ዘዓመት፡ እስከ፡ ዐሠርቱ፡ ምእት፡ ትውልድ፡ ያዐርጉ፡ ወይመጽእ፡ ሎቱ፡ ወለትውልዱ፡ እምድኅሬሁ፡ ወተጽሕፈ፡
      *ዐርከ፡ ወጻድቅ፡ ውስተ፡ ጽላተ፡ ሰማይ። ኵሎ፡ ዘንተ፡ ነገረ፡ ጸሐፍኩ፡ ለከ፡ ወአዘዝኩከ፡ ከመ፡ ትንገር፡ ለውሉደ፡ እስራኤል፡
      ከመ፡ ኢይግበሩ፡ ጸበሳ፡ ወኢይትዐደዉ፡ ሥርዐተ፡ ወኢይንሥቱ፡ ኪዳነ፡ እንተ፡ *ትሠርዐት፡ ሎሙ፡ ከመ፡ ይግበርዋ፡ ወይጸሐፉ፡
      አዕርክተ። ወእመሰ፡ ተዐደዉ፡ ወገብሩ፡ እምኵሉ፡ ፍናዊሃ፡ ሰርኵስ፡ ይጸሐፉ፡ ውስተ፡ ጽላተ፡ ሰማይ፡ *ጸላእተ፡ ወይደመሰሱ፡
      እመጽሐፈ፡ ሕይወት፡ ወይጸሐፉ፡ ውስተ፡ *መጽሐፈ፡ እለ፡ ይትሐጐሉ፡ ወምስለ፡ እለ፡
  - verse: 23
