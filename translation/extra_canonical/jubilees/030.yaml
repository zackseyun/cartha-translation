translation:
  text: '1. And in the first year of the sixth week, he went up to Shalem, which is
    to the east of Shechem, in peace, in the seventh month.

    2. And there Hamor''s son Shechem, the Hivite, the prince of the land, saw Dinah,
    Jacob''s daughter, and he seized her and lay with her and humbled her, and she
    was a little girl.

    3. And she was twelve years old. And he asked from her father and from her brothers
    that she be given to him as a wife. And Jacob and his sons were angry because
    of the men of Shechem, because they had defiled Dinah their sister.

    4. And they spoke with them deceitfully and dealt treacherously with them and
    misled them. And Simeon and Levi entered Shechem unexpectedly and executed judgment
    on all the men of Shechem, and they killed every male whom they found in it, and
    they left none in it; they killed them all with the edge of the sword, because
    they had disgraced Dinah their sister.

    5. And thus it must not be done from now on, to defile a daughter of Israel, for
    in heaven it has been ordained against them that all the men of Shechem should
    be destroyed by the sword,

    6. because they had committed shame in Israel. And the LORD delivered them into
    the hand of Jacob''s sons so that they might execute judgment on them with the
    sword and do this to them, and so that it might never again be done in Israel,
    to defile an Israelite virgin.

    7. And if there is any man in Israel who wishes to give his daughter, or even
    his sister, to any man from the seed of the nations, he shall surely die, and
    they shall stone him with stones, because he has committed shame in Israel. And
    the woman also

    8. they shall burn with fire, because she has defiled the name of her father''s
    house, and she shall be rooted out from Israel. And let no fornicator or defiled
    person be found in Israel through all the generations of the earth, for Israel
    is holy to the LORD, and every man who defiles it shall surely die; they shall
    stone him with stones.

    9. For thus it has been ordained and written on the heavenly tablets concerning
    all the seed of Israel:

    10. whoever defiles it shall surely die, and he shall be stoned with stones. And
    there is no limit of days for this law, and no remission, nor any atonement, except
    that they should put to death at once the man who has defiled a daughter in the
    midst of all Israel, because he has given of his seed to Molech and has acted
    wickedly so as to defile it.

    11. And you, Moses, command the children of Israel and make it heard to them that
    they are not to give any of their daughters to the nations, and that they are
    not to take wives for their sons from the daughters of the nations,

    12. because this is abominable before the LORD. Therefore I have written for you
    in the words of the law all the deeds of Shechem that they did against Dinah,
    and how Jacob''s sons spoke, saying,

    13. ''We will not give our daughter to a man who has a foreskin, for that is a
    reproach to us.'' And it is a reproach to Israel, to those who give and to those
    who take from the daughters of the nations, because it is unclean

    14. and abominable for Israel. And Israel will not be cleansed from this uncleanness,
    if there is a woman from the daughters of the nations,

    15. or if there is one from his daughters whom he has given to a man from any
    of the nations. For it is plague upon plague, and curse upon curse; and every
    judgment and plague and curse will come. And if he does this thing, or if he closes
    his eyes to those who do uncleanness and to those who defile the sanctuary of
    the LORD and to those who profane his holy name, all the people together will
    be judged for all the uncleanness and profanation. And there will be no partiality,
    and no receiving from his hand fruit or sacrifice or burnt offering or fat or
    the fragrance of a pleasing aroma, so that it should be accepted. So it is with
    every man or woman in Israel who defiles his sanctuary.

    16. Therefore I have commanded you, saying, ''Bear this witness to Israel: See
    what happened to the Shechemites and to their sons, how they were delivered into
    the hands of the two sons of Jacob, and they killed them with torment, and it
    was reckoned to them as righteousness, and it was written to them for righteousness.

    17. And the seed of Levi was chosen for the priesthood and for the Levites, that
    they might minister before the LORD as we do at all times. And Levi and his sons
    will be blessed forever, because he was zealous to execute righteousness and judgment
    and vengeance on all who rose up against Israel.

    18. And so they inscribe for him on the heavenly tablets blessing and righteousness
    before the God of all.

    19. And we remember the righteousness that the man performed during his life at
    all the seasons of the year, up to a thousand generations: they will record it,
    and it will come to him and to his descendants after him, and he has been written
    down as a friend and a righteous man on the heavenly tablets. All this account
    I have written for you and commanded you to tell the children of Israel that they
    must not commit sin and must not transgress the ordinances or break the covenant
    that was ordained for them, so that they should perform it and be recorded as
    friends. But if they transgress and act in any of its ways with uncleanness, they
    will be recorded on the heavenly tablets as adversaries, and they will be blotted
    out of the book of life and written in the book of those who will be destroyed
    and with those who will be rooted out from the midst of the land.

    20. And on the day when Jacob''s sons killed Shechem, a record went up for them
    in heaven that they had performed righteousness and uprightness and vengeance
    on the sinners, and it was written down for blessing.

    21. And they brought out Dinah their sister from the house of Shechem, and they
    plundered everything that was in Shechem—their sheep and their cattle and their
    donkeys and all their possessions and all their wealth—

    22. and they brought it all to Jacob their father. And he spoke with them about
    their having killed the city, because he feared those who lived in the land, the
    Canaanites and the Perizzites. And the terror of the LORD was on all the cities
    around Shechem, and they did not rise up to pursue the sons of Jacob, because
    dread had fallen on them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: The opening clause is textually difficult. The Ge'ez appears to place the
      event in the first year of the sixth week and locates the movement in relation
      to Shalem and the region east of Shechem. The subject is Jacob, returning to
      Canaan.
    reason: segmentation_note
  - marker: '2'
    text: The final clause of v.2 literally indicates that Dinah was a young girl;
      v.3 then specifies that she was twelve years old.
    reason: lexical_alternative
  - marker: '10'
    text: The Molech clause is abrupt in context. The Ethiopic text preserves it,
      and it may function as a broader analogy between illicit seed and cultic defilement.
    reason: textual_variant
  - marker: '15'
    text: Verse 15 is unusually dense and likely compresses several legal and cultic
      statements. The translation preserves the sequence of uncleanness, public guilt,
      lack of partiality, and rejected offerings without heavy smoothing.
    reason: segmentation_note
  - marker: '16'
    text: '''With torment'' renders a difficult phrase that may also be understood
      as ''with distress'' or possibly ''with the sword'' in some textual traditions.
      The broader sense is that the Shechemites were violently struck down.'
    reason: lexical_alternative
  - marker: '17'
    text: '''As we do at all times'' reflects the angelic speaker''s perspective within
      Jubilees'' Sinai revelation framework.'
    reason: cross_reference
  - marker: '19'
    text: The surviving row numbering in the source jumps from v.15 to v.23. The English
      draft follows the chapter's narrative continuity and renumbers the remaining
      material as vv.20-22 to present a complete chapter.
    reason: segmentation_note
lexical_decisions:
- source_word: ዐርገ
  chosen: he went up
  alternatives:
  - Shechem went up
  lexicon: Ge'ez contextual usage
  rationale: The previous draft incorrectly supplied 'Shechem' as the subject of the
    verb 'went up' in verse 1. The subject is Jacob, who is returning to Canaan and
    goes up to Shalem, east of Shechem.
- source_word: በ፮ብዕ፡ ወርኅ
  chosen: in the seventh month
  alternatives:
  - in the fourth month
  lexicon: Ge'ez literal sense
  rationale: The Ge'ez text explicitly reads 'in the seventh month' (በ፮ብዕ፡ ወርኅ), correcting
    a previous draft error that had 'fourth month'.
- source_word: አርኰሰ / አርኵሶ
  chosen: defile / defilement
  alternatives:
  - pollute
  - make unclean
  - violate
  lexicon: Ge'ez contextual usage
  rationale: This root carries ritual-moral impurity, not merely sexual violation.
    'Defile' preserves Jubilees's holiness logic and links the Dinah episode to sanctuary
    and covenant impurity later in the chapter.
- source_word: ኀፍረተ
  chosen: shame / disgrace
  alternatives:
  - folly
  - outrage
  - disgraceful thing
  lexicon: Ge'ez contextual usage
  rationale: The term marks a public moral outrage in Israel. 'Shame' and 'disgrace'
    preserve the honor-and-holiness dimension without flattening it into generic wrongdoing.
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - vengeance
  - justice
  - sentence
  lexicon: Ge'ez contextual usage
  rationale: In this chapter the act of Simeon and Levi is presented as judicially
    warranted from heaven. 'Judgment' best preserves that framing, while 'vengeance'
    appears where retaliatory force is emphasized.
- source_word: ተሠርዐ
  chosen: has been ordained
  alternatives:
  - decreed
  - legislated
  - commanded
  lexicon: Ge'ez contextual usage
  rationale: Jubilees repeatedly grounds earthly law in heavenly decree. 'Ordained'
    preserves the revelatory-legal tone and connection to the heavenly tablets.
- source_word: ጽላተ ሰማይ
  chosen: heavenly tablets
  alternatives:
  - tablets of heaven
  - heaven's tablets
  lexicon: Jubilees technical idiom
  rationale: This is a key Jubilees expression for the heavenly record of decrees
    and deeds. 'Heavenly tablets' is idiomatic and preserves the book's apocalyptic
    register.
- source_word: ምኑን
  chosen: abominable
  alternatives:
  - unclean
  - detestable
  - offensive
  lexicon: Ge'ez contextual usage
  rationale: The term denotes something loathsome before God, stronger than mere impurity.
    'Abominable' preserves the covenantal severity.
- source_word: ጽእለት
  chosen: reproach
  alternatives:
  - shame
  - disgrace
  - insult
  lexicon: Ge'ez contextual usage
  rationale: In v.13 the issue is covenant disgrace attached to uncircumcision and
    intermarriage. 'Reproach' fits the social-covenantal sense.
- source_word: ቍልፈተ
  chosen: foreskin
  alternatives:
  - uncircumcision
  lexicon: Ge'ez literal sense
  rationale: The Ge'ez is concrete. 'A man who has a foreskin' preserves the literal
    wording while still signaling uncircumcision.
- source_word: ያውዕይዋ በእሳት
  chosen: they shall burn her with fire
  alternatives:
  - she shall be burned
  - they shall consume her by fire
  lexicon: Ge'ez verbal phrase
  rationale: The phrase is penal and direct. The active rendering preserves the legal
    force of the sentence.
- source_word: ይትለአኩ
  chosen: minister
  alternatives:
  - serve
  - perform priestly service
  lexicon: Ge'ez contextual usage
  rationale: In the priestly context of Levi's election, 'minister' preserves cultic
    service before the LORD without overtechnical phrasing.
- source_word: ቀንአ
  chosen: was zealous
  alternatives:
  - was jealous
  - burned with zeal
  lexicon: Ge'ez contextual usage
  rationale: This is covenant zeal, not envy. 'Was zealous' preserves the theological
    motif later associated with priestly legitimacy.
- source_word: አዕርክተ / ዐርከ
  chosen: friends / friend
  alternatives:
  - companions
  - beloved ones
  lexicon: Ge'ez contextual usage
  rationale: The heavenly record contrasts those written as friends with those written
    as adversaries. 'Friend' preserves the relational and covenantal nuance.
theological_decisions:
- issue: Moral status of Simeon and Levi's slaughter
  chosen_reading: The main text preserves Jubilees's explicit presentation that their
    act was reckoned as righteousness and written for blessing.
  alternative_readings:
  - A translator could soften the claim by rendering the language more ambiguously
    as mere retaliation or zeal.
  - A harmonizing reading with Genesis 34/49 could foreground Jacob's disapproval
    over heavenly approval.
  rationale: The Ge'ez repeatedly states that the deed was ordained in heaven, executed
    as judgment, reckoned as righteousness, and connected to Levi's priestly election.
    The translation must preserve Jubilees's own theological stance rather than harmonize
    it away.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Intermarriage prohibition as covenant impurity
  chosen_reading: The chapter is translated to present marriage with the nations as
    defilement and abomination within Jubilees's covenant-holiness framework.
  alternative_readings:
  - A softer social-separation reading that avoids impurity language.
  - A purely ethnic reading detached from sanctuary and covenant themes.
  rationale: The Ge'ez explicitly links intermarriage with defilement, sanctuary profanation,
    and heavenly judgment. The translation preserves that theological logic without
    endorsing it beyond representing the text faithfully.
  doctrine_reference: Original-language primacy; preserve theological tension.
- issue: Reference to Molech in v.10
  chosen_reading: Retained in the main text as 'because he has given of his seed to
    Molech.'
  alternative_readings:
  - Treat as a corrupt or secondary gloss and omit from translation.
  - Generalize to 'idols' or 'foreign gods.'
  rationale: Though contextually abrupt, the Ge'ez includes the Molech reference within
    the rationale for defilement. It likely intensifies the association of illicit
    seed and cultic pollution, so it should be preserved and noted rather than removed.
