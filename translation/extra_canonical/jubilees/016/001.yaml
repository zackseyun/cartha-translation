translation:
  text: 'She conceived a son. And and we returned to Sarah in the seventh month and found that she had conceived before us. And we blessed him, and we told him all that had been commanded for him: that he would not die until he had begotten six sons and would see them before he died, and that in Isaac a name and seed would be called for him.'
