- timestamp: '2026-04-28T09:36:30Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/016/001.job-76333.json
  category: mistranslation
  from: And we announced to Abraham that Sarah had conceived,
  to: She conceived a son. And
  rationale: The Ge'ez text begins with `ፀንሰት፡ ወልደ።` ("She conceived a son"). The phrase "And we announced to Abraham that Sarah had conceived" is not in the source text and appears to be a hallucination or bleed-over from another verse.
- timestamp: '2026-04-28T09:36:30Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/016/001.job-76333.json
  category: mistranslation
  from: and had seen Isaac, and that in Isaac a name and seed would be named for him.
  to: and would see them before he died, and that in Isaac a name and seed would be called for him.
  rationale: The Ge'ez `ወይሬኢ፡ ዘእንበለ፡ ይመት፡` means "and he would see (them) before he dies." The draft completely misses "before he dies" and incorrectly attaches "Isaac" as the object of "seen". "Isaac" belongs to the next clause (`ወበይስሐቅ፡`, "and in Isaac"). Additionally, `ይጼዋዕ` is better rendered "called" rather than "named" in this standard idiom.
