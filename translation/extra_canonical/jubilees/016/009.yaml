  from: from the days of Adam until his time, because a man lay with his daughters. And behold, it was commanded and written concerning all his seed on the heavenly tablets, that he should remove them and uproot them and execute their judgment like the judgment of Sodom, and that he should leave no seed of that man on the earth on the day of condemnation.
  to: from the days of Adam until his time, because a man lay with his daughters. And behold, it was commanded and decreed concerning all his seed on the heavenly tablets, that they should remove them and uproot them and execute their judgment like the judgment of Sodom, and that no seed of his should be left on the earth on the day of condemnation.
  rationale: 'Changed ''written'' to ''decreed'' for better lexical fit with the paired verb, shifted ''he should'' to ''they should'' to match the plural agents implied by the verbs, and revised the final clause to a more natural passive rendering: ''that no seed of his should be left on the earth.'''
- timestamp: '2026-04-28T09:36:30Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/016/009.job-76341.json
  category: grammar
  from: that they should remove them and uproot them and execute their judgment like the judgment of Sodom, and that no seed of his should be left
  to: that he should remove them and uproot them, and that their judgment be executed like the judgment of Sodom, and that he should leave no seed of his
  rationale: The revision pass incorrectly changed the active verbs to plural ('they should remove/uproot'); the Ge'ez verbs (ያአትትሙ, ይሠርዎሙ) are 3rd person masculine singular, referring to God. Additionally, 'execute their judgment' translates a passive verb (ይገበር, 'be executed/done'), and the final clause is active in Ge'ez (ኢያትርፍ, 'he should not leave'), not passive.
- timestamp: '2026-04-28T09:36:30Z'
