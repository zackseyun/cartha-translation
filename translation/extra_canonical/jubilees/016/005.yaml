- timestamp: '2026-04-28T09:36:30Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/016/005.job-76337.json
  category: mistranslation
  from: according to all their deeds, because they were utterly lawless and sinful.
  to: just as I have now declared to you all their deeds, that they are utterly wicked and sinful.
  rationale: The Ge'ez text reads `በከመ፡ ናሁ፡ አይዳዐኩ፡ ኵሎ፡ ምግባሮሙ፡` (ba-kama nāhu ʾaydāʿaku kwəllo məgbāromu), which means 'just as I have now declared to you all their deeds.' The current translation completely omits the verb 'I have declared' (አይዳዐኩ) and the particle 'now/behold' (ናሁ). Consequently, `ከመ` (kama) is better translated as 'that' rather than 'because', linking their wicked state to the declaration of their deeds.
- timestamp: '2026-04-28T09:36:30Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/016/005.job-76337.json
  category: mistranslation
  from: and Zoar
  to: and Admah [or 'and Dom']
  rationale: The Ge'ez text has `ወለዶም` (wa-la-dom). Translating this as 'Zoar' is both lexically unsupported and contextually incorrect, as Zoar was explicitly spared from destruction in the biblical and Jubilees narratives. The text likely intends Admah (or Zeboim), which were destroyed with Sodom and Gomorrah. 'Dom' is likely a textual corruption of Admah.
- timestamp: '2026-04-28T09:36:30Z'
