  category: lexical
  from: for this feast,
  to: at this feast,
  rationale: The Ge'ez preposition 'ba' (በ) in 'bazāti ba‘āl' is better translated as 'at' or 'during' this feast, rather than 'for'. (This phrase likely concludes the thought from the previous verse, which the verse-splitter caught here).
- timestamp: '2026-04-28T09:36:30Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/016/022.job-76354.json
  category: lexical
  from: he brought, day by day, on the altar
  to: he offered, day by day, on the altar
  rationale: The verb 'yaqareb' (from 'qaraba', to bring near) is the standard term for presenting a sacrifice. In English, one 'offers' sacrifices on an altar rather than 'bringing' them on it.
