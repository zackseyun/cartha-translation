translation:
  text: 'His deed is very evil, for he is abominable before the LORD. Because of this it is written and ordained on the heavenly tablets that a man must not lie with his father’s wife and must not uncover his father’s skirt, because it is unclean. They must surely die together—the man who lies with his father’s wife and the woman also—for they have done an unclean deed on the earth. And let there be no uncleanness before our God among the people whom he has chosen for himself as a kingdom. And again it is written a second time: “Cursed be the one who lies with his father’s wife, because he has uncovered his father’s shame.” And let all the holy ones of the LORD say, “So be it, so be it.” And you, Moses, command the children of Israel that they keep this word, for it is a sentence of death, and it is unclean, and there is no atonement forever to atone for the man who has done this, except to put him to death and kill him and stone him and uproot him from the midst of the people of our God. For there shall not remain alive for a single day on the earth any man who does this in Israel, for he is abominable and unclean. And let them not say, “Reuben was allowed to live and forgiveness was granted after he lay with his father’s concubine, and she too, though she had a husband, and though Jacob his father was still alive.” For until that time the ordinance and the judgment and the law had not been fully revealed for all; but in your days it is as the law of the times and of the days, and as an everlasting law for the everlasting generations. And for this law there is no completion of days, and no forgiveness for it, except that both of them be uprooted from the midst of the people; on the day on which they did it they shall kill them. And you, Moses, write it down for Israel, that they may keep it and not do according to this matter and not sin with a sin unto death, because the Judge, the LORD our God, is one who does not show partiality and does not accept bribes. And tell them this word of the ordinance, that they may hear and be on guard and watch themselves and not be destroyed and rooted out from the land. For all who do it on the earth are unclean and defiled and polluted and contaminated before our God. And there is no greater sin than the sexual impurity that they commit on the earth, for Israel is a holy people to the LORD its God, and a people of inheritance, and a priestly people, and a kingdom people, and a planted people; and no such uncleanness is to be seen in the midst of the holy people. And in the third year of this week Jacob and all his sons went and dwelt in the house of Abraham, near Isaac his father and Rebekah his mother. And these are the names of the sons of Jacob: the firstborn, Reuben; and Simeon; and Levi; and Judah; and Issachar; and Zebulun, the sons of Leah; and the sons of Rachel, Joseph and Benjamin; and the sons of Bilhah, Dan and Naphtali; and the sons of Zilpah, Gad and Asher; and Dinah, the only daughter of Leah, the daughter of Jacob. And they went and bowed down to Isaac and Rebekah, and when they saw them they blessed Jacob and all his sons. And Isaac rejoiced greatly because he saw the sons of Jacob his younger son, and he blessed them.'
