  rationale: The Ge'ez uses 'ኪዳነተ' (kidanata, covering/skirt, reflecting Deut 22:30) here, but 'ኀፍረተ' (hafrata, shame, reflecting Lev 18:8) in the next sentence. The recent revision homogenized them both to 'shame', losing the lexical distinction present in the source text. Reverting to 'skirt' or 'covering' is recommended.
