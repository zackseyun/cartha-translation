    አዝዞሙ፡ ለውሉደ፡ እስራኤል፡ ወይዕቀቡ፡ ዘንተ፡ ቃለ፡ እስመ፡ ዘንኒ፡ ሞተ፡ ውእቱ፡ ወርኵስ፡

