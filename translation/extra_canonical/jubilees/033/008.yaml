  rationale: The Ge'ez word ክዳን (kədān) means 'garment', 'covering', or 'skirt', not 'bed' (which would be ዐራት or ምስካብ). The phrase 'uncovered his father's skirt' is a direct allusion to the biblical idiom for sexual violation found in Deuteronomy 22:30 and 27:20. Changing it to 'bed' obscures this specific intertextual link and mistranslates the Ge'ez.
