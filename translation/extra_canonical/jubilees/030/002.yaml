  from: And there Hamor's son Shechem, the Hivite, the prince of the land, saw Dinah, Jacob's daughter, and he seized her and lay with her and humbled her, and she was a little girl.
  to: And there Shechem, the son of Hamor the Hivite, the prince of the land, saw Dinah, Jacob's daughter, and he seized her and lay with her and humbled her, and she was a young girl.
