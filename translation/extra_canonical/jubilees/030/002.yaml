  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/030/002.job-76693.json
  category: lexical
  from: humbled her
  to: defiled her
  rationale: The Ge'ez verb 'አርኰሰ' (arkwasa) specifically means 'to defile, pollute, or make unclean'. While 'humbled' is often used to translate the Hebrew 'anah' in Genesis 34:2, the author of Jubilees specifically uses the language of defilement here. Given that the defilement of Dinah (and the resulting impurity) is a central theological theme of Jubilees 30, 'defiled' is the more accurate and contextually necessary translation.
