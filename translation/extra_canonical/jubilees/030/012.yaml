  category: awkward_english
  from: the deeds of Shechem that they did
  to: the deeds of the Shechemites that they did
  rationale: The Ge'ez uses plural pronouns and verbs ('their deeds' [ግብሮሙ], 'which they did' [ዘገብሩ]) to refer to the people of Shechem. Translating it as the singular proper noun 'Shechem' creates an awkward plural agreement in English ('Shechem that they did'). Rendering it as 'the Shechemites' resolves this and aligns with standard academic translations.
