translation:
  text: 'And we remember the righteousness that the man performed during his life at all the seasons of the year[19], up to a thousand generations: they will record it, and it will come to him and to his descendants after him, and he has been written down as a friend and a righteous man on the heavenly tablets. All this account I have written for you and commanded you to tell the children of Israel that they must not commit sin and must not transgress the ordinances or break the covenant that was ordained for them, so that they should perform it and be recorded as friends. But if they transgress and practice every way of uncleanness, they will be recorded on the heavenly tablets as adversaries, and they will be blotted out of the book of life and written in the book of those who will be destroyed and with those who will be rooted out from the midst of the land.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '19'
    text: The surviving row numbering in the source jumps from v.15 to v.23. The English draft follows the chapter's narrative continuity and renumbers the remaining material as vv.20-22 to present a complete chapter.
    reason: segmentation_note
  - marker: a
    text: Or 'act in any of its ways with uncleanness'.
    reason: previous_rendering
