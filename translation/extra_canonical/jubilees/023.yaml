translation:
  text: '1. And he placed the two fingers of Jacob upon his eyes, and he blessed the
    God of gods, and he covered his face and stretched out his feet and slept the
    sleep of eternity, and was gathered to his fathers.

    2. And Jacob was lying in his bosom through all this, and he did not know that
    Abraham, his father’s father, had died.

    3. And Jacob awoke from his sleep, and behold, Abraham was cold as ice; and he
    said, “Father, father!” But there was no one speaking, and he knew that he had
    died.

    4. And he rose from his bosom and ran and told Rebekah his mother. And Rebekah
    went by night to Isaac and told him, and they went together, and Jacob also with
    them, and a torch was in his hand; and when they had gone, they found Abraham
    lying dead.

    5. And Isaac fell upon the face of his father and wept and kissed him.

    6. And a sound was heard in the house of Abraham, and Ishmael his son arose and
    went to Abraham his father, and he wept over Abraham his father, he and all the
    house of Abraham, and they wept with great weeping.

    7. And they buried him in the double cave, near Sarah his wife, his sons Isaac
    and Ishmael.

    8. And all the men of his house wept for him forty days, and Isaac and Ishmael
    and all their sons and all the sons of Keturah in their places; and the days of
    Abraham’s weeping were completed.

    9. And he lived three jubilees and four weeks of years, one hundred and seventy-five
    years, and he completed the days of his life, old and full of days.

    10. For the days of the former ones were nineteen jubilees for their lives; but
    after the flood they began to diminish from nineteen jubilees, and to grow old
    quickly, and to shorten the days of their lives because of many afflictions and
    because of the evil of their ways, apart from Abraham.

    11. For Abraham was perfect in all his deeds with the LORD, and he was well-pleasing
    in righteousness all the days of his life; and behold, he did not complete four
    jubilees in his life, until he had grown old in the presence of evil, and his
    days were cut short.

    12. And all the generations that will arise from now until the day of the great
    judgment will grow old quickly before they complete two jubilees, and their minds
    will be abandoned from their understanding, and all their knowledge will vanish.

    13. And in those days, if a man lives a jubilee and a half of years, they will
    say of him, “He has lived long”; yet most of his days are pain and toil and distress,
    and there is no peace.

    14. For blow upon blow, and wound upon wound, and distress upon distress, and
    evil report upon evil report, and sickness upon sickness, and every evil like
    these: disease and collapse and frost and fever and plague and sword-stroke and
    captivity and every affliction and sickness.

    15. And all this will come upon an evil generation that defiles the earth with
    uncleanness and fornication and pollution and abominable deeds.

    16. Then they will say, “The days of the former ones were many, even up to a thousand
    years, and good; but behold, the days of our life, if a man has lived long, are
    seventy years, and if he is strong, eighty years, yet they are evil, and there
    is no peace in the days of this evil generation.”

    17. And in that generation sons will reproach their fathers and their elders because
    of sin and because of injustice and because of the speech of their mouth and because
    of the great evils that they commit, and because they have forsaken the covenant
    that the LORD made between them and himself, that they should keep and do all
    his commandments and his ordinances and all his law, without turning aside to
    the right hand or to the left.

    18. For all of them have acted wickedly, and every mouth speaks guilt, and all
    their works are uncleanness and corruption, and all their ways are defilement
    and uncleanness and ruin.

    19. Behold, the earth will be destroyed because of all their deeds, and there
    will be no seed of the vine and no oil, because all their works are faithless;
    and they will all perish together—beasts and cattle and birds and all the fish
    of the sea—because of the sons of men.

    20. And they will strive, these with those, the young with the old, and the old
    with the young, the poor with the rich, the lowly with the great, and the needy
    with the ruler, concerning the law and concerning the covenant, because they have
    forgotten commandment and covenant and feast and month and sabbath and jubilee
    and all that is appointed.

    21. And they will stand with bow and with swords and with slaughter, to drive
    them from the way; and they will not return until much blood is poured out on
    the earth, these by those.

    22. And those who have escaped will not return from their wickedness into the
    way of righteousness, because all of them will rise up for deceit and wealth,
    each to seize all that belongs to his neighbor; and they will make a great name
    for themselves, but not in truth and not in righteousness; and they will profane
    the holy of holies with their uncleanness and with the corruption of their defilement.

    23. And a great punishment will come upon the deeds of that generation from the
    LORD, and he will give them over to sword and judgment and captivity and plundering
    and devouring.

    24. And he will stir up against them the sinners of the nations, who have no mercy
    or compassion for them, and who show no favor to old or young, to no one at all;
    for they are evil and strong, so as to do evil more than all the sons of men.

    25. And they will work oppression in Israel and sin in Jacob, and much blood will
    be poured out on the earth, and there will be none to gather and none to bury.

    26. In those days they will cry out and call and pray to be saved from the hand
    of the sinful nations, but there will be none to save.

    27. And the heads of the children will become white with gray hair, and a child
    of three weeks will appear old like one of a hundred years, and their stature
    will be destroyed by distress and affliction.

    28. And in those days the children will begin to search the law, and to seek the
    commandments, and to return to the way of righteousness.

    29. And the days will begin to grow many and increase among the children of men,
    generation by generation and day by day, until their days draw near to one thousand
    years and to many years beyond many days. And there will be no old man, nor one
    who is not satisfied with his days; for all of them will be like children and
    youths. And all their days they will complete in peace and joy, and they will
    live, and there will be no Satan and no evil destroyer, for all their days will
    be days of blessing and healing.

    30. And at that time the LORD will heal his servants, and they will rise up and
    see great peace, and they will drive out their enemies, and the righteous will
    see and give thanks and rejoice forever and ever with joy.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: v7
    text: Literally 'the double cave'; this corresponds to the ancestral burial cave
      associated with Sarah.
    reason: cross_reference
  - marker: v10
    text: The phrase 'from nineteen jubilees' is textually difficult in context; the
      sense is that the lifespans of the ancients were far longer, but after the flood
      they began to diminish rapidly.
    reason: textual_variant
  - marker: v12
    text: The clause about mind and understanding is awkwardly segmented in the source
      row; the translation keeps the overall sense that human understanding will fail
      or be abandoned.
    reason: segmentation_note
  - marker: v14
    text: Several items in this calamity list are lexically difficult in Ge'ez; the
      translation preserves the cumulative force of repeated disasters rather than
      over-claiming precision for each disease term.
    reason: lexical_alternative
  - marker: v19
    text: '''No seed of the vine and no oil'' likely means the land will fail to produce
      grapes and olive oil, not merely literal seed.'
    reason: lexical_alternative
  - marker: v20
    text: '''Month'' may specifically imply the new-moon observance within Jubilees''
      sacred calendar.'
    reason: cultural_note
  - marker: v22
    text: The line about each person seizing what belongs to his neighbor is difficult,
      but the sense is acquisitive violence and fraud rather than simple ambition.
    reason: segmentation_note
  - marker: v24
    text: The wording denies pity to every age group; the compressed Ge'ez sequence
      is rendered expansively for clarity.
    reason: segmentation_note
  - marker: v27
    text: '''A child of three weeks'' is retained literally. Some interpreters understand
      it as an image of extreme premature aging rather than a biological description.'
    reason: lexical_alternative
  - marker: v29
    text: The restoration promise reverses the earlier decline in lifespan. 'There
      will be no Satan and no evil destroyer' is rendered concretely to preserve the
      apocalyptic worldview of the chapter.
    reason: cross_reference
lexical_decisions:
- source_word: ንዋመ፡ ዘለዓለም
  chosen: slept the sleep of eternity
  alternatives:
  - fell asleep forever
  - slept an everlasting sleep
  rationale: Preserves the solemn euphemism for death without flattening it to simply
    'died.' Jubilees uses elevated death language that should remain weighty.
- source_word: ተጋብአ፡ ኀበ፡ አበዊሁ
  chosen: was gathered to his fathers
  alternatives:
  - was gathered to his ancestors
  rationale: Traditional ancestral idiom is preserved because it is theologically
    and intertextually significant in biblical death notices.
- source_word: ቈረ
  chosen: was cold as ice
  alternatives:
  - had grown cold
  - was cold
  rationale: The form suggests marked coldness; 'cold as ice' preserves the vividness
    of Jacob's discovery.
- source_word: በዓተ፡ ካዕበት
  chosen: the double cave
  alternatives:
  - the cave of Machpelah
  - the doubled cave
  rationale: The Ge'ez is descriptive rather than a direct familiar toponym; 'double
    cave' preserves the literal sense while allowing a footnote cross-reference.
- source_word: ኢዮቤልው
  chosen: jubilees
  alternatives:
  - jubilee
  rationale: Calendrical terminology is central in Jubilees and must be preserved
    explicitly rather than generalized as eras or periods.
- source_word: ሱባዔ
  chosen: weeks of years
  alternatives:
  - year-weeks
  - heptads
  rationale: This is Jubilees' technical chronological language; 'weeks of years'
    is transparent and preserves the calendrical framework.
- source_word: ፍጹም
  chosen: perfect
  alternatives:
  - blameless
  - complete
  rationale: Retains the strong moral evaluation of Abraham while allowing readers
    to sense covenantal integrity rather than sinless abstraction.
- source_word: ይሠምር፡ በጽድቅ
  chosen: was well-pleasing in righteousness
  alternatives:
  - walked acceptably in righteousness
  - was pleasing in righteousness
  rationale: Keeps both divine approval and ethical quality present in the Ge'ez.
- source_word: ዕለተ፡ ደይን፡ ዐባይ
  chosen: the day of the great judgment
  alternatives:
  - the great day of judgment
  rationale: Preserves the apocalyptic phrase with explicit eschatological force.
- source_word: ምንዳቤ
  chosen: distress
  alternatives:
  - tribulation
  - affliction
  rationale: Used repeatedly in a catalog of woes; 'distress' is readable modern English
    while retaining severity.
- source_word: ስምዐት፡ እኩይ
  chosen: evil report
  alternatives:
  - bad news
  - evil tidings
  rationale: Keeps the repetitive prophetic cadence of calamity announcements.
- source_word: ሳቀራር
  chosen: abominable deeds
  alternatives:
  - perversions
  - corrupt practices
  rationale: The term denotes morally loathsome conduct; 'abominable deeds' preserves
    moral revulsion without over-specifying.
- source_word: ሥርዐተ
  chosen: ordinances
  alternatives:
  - statutes
  - appointed rules
  rationale: Maintains legal-covenantal texture alongside 'commandments' and 'law'
    without collapsing the terms.
- source_word: ተኃኅቶ፡ የማነ፡ ወፀጋመ
  chosen: turning aside to the right hand or to the left
  alternatives:
  - deviating right or left
  rationale: This is a standard covenantal idiom and should remain recognizable.
- source_word: ዘርእ፡ ወይን
  chosen: seed of the vine
  alternatives:
  - grape seed
  - produce of the vine
  rationale: A literal rendering preserves the agricultural curse imagery; likely
    refers to vine-yield rather than literal seed.
- source_word: ቅብዐ
  chosen: oil
  alternatives:
  - ointment
  - olive oil
  rationale: In agricultural curse context, 'oil' best represents produce, likely
    olive oil.
- source_word: በዓለ፡ ወወርኀ፡ ወሰንበተ፡ ወእዮቤሌወ፡
  chosen: feast and month and sabbath and jubilee
  alternatives:
  - festival and new month and sabbath and jubilee
  rationale: Preserves the sequence of sacred times central to Jubilees' theology
    of ordered worship and calendar.
- source_word: ቅድስተ፡ ቅዱሳን
  chosen: the holy of holies
  alternatives:
  - the most holy place
  - the holiest sanctuary
  rationale: Established cultic phrase with strong biblical resonance; here likely
    metaphorical or sanctuary-directed profanation.
- source_word: መጥባሕት
  chosen: captivity
  alternatives:
  - plunder
  - spoil
  rationale: In the judgment list the term likely denotes being carried off; paired
    with plundering/devouring in context.
- source_word: ሀደድ
  chosen: plundering
  alternatives:
  - robbery
  - despoiling
  rationale: Fits the escalating judgment sequence and avoids duplicating 'captivity.'
- source_word: ሲበት
  chosen: gray hair
  alternatives:
  - old age
  - hoariness
  rationale: Concrete image of premature aging should be preserved.
- source_word: ይትኀሠሡ
  chosen: search
  alternatives:
  - seek diligently
  - inquire into
  rationale: Conveys active pursuit of the law in the restoration turn of the chapter.
- source_word: ሰይጣነ
  chosen: Satan
  alternatives:
  - the Adversary
  rationale: The proper apocalyptic figure should be retained by conventional English
    form, not generalized into abstract evil.
theological_decisions:
- issue: Divine name rendering for እግዚአብሔር
  chosen_reading: the LORD
  alternative_readings:
  - Lord
  rationale: Follows project doctrine for covenantal divine-name style and aligns
    with biblical register in a Jewish-scriptural context.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → the LORD'
- issue: Meaning of Abraham's shortened lifespan in vv. 10-11
  chosen_reading: Even Abraham, though righteous, lived less than four jubilees because
    human lifespans had already begun to contract in the age of increasing evil.
  alternative_readings:
  - His days were cut short as a direct punishment
  - The verse merely notes chronology without moral explanation
  rationale: The chapter contrasts Abraham with later wicked generations while still
    placing him within the post-flood decline of lifespan; this preserves the tension
    without making Abraham the object of condemnation.
- issue: Referent of 'holy of holies' in v. 22
  chosen_reading: A cultic/sanctuary-oriented phrase retained literally, possibly
    extending metaphorically to what is most holy.
  alternative_readings:
  - the Jerusalem sanctuary specifically
  - holy persons or sacred things generally
  rationale: The Ge'ez supports the established cultic superlative; the exact referent
    is left open because the text does not explicitly narrow it.
- issue: Restoration in vv. 28-30
  chosen_reading: A real eschatological renewal involving return to the law, increased
    lifespan, peace, healing, and the removal of Satanic corruption.
  alternative_readings:
  - purely symbolic moral reform
  - a historical but non-eschatological revival
  rationale: The chapter's apocalyptic sequence, chronological reversal, and explicit
    mention of Satan favor an eschatological reading while preserving the text's concrete
    covenantal focus.
