  rows:
  - verse: 1
    geez: ወአንበረ፡ ክልኤሆን፡ *አጻብዐ፡ ያዕቆብ፡ *ዲበ፡ አዕይንቲሁ፡ ወባረኮ፡ ለአምላክ፡ አማልክት፡ ወከደነ፡ ገጾ፡ ወ*ሰፍሐ፡
      እገሪሁ፡ ወኖመ፡ ንዋመ፡ ዘለዓለም፡ ወተጋብአ፡ *ኀበ፡ አበዊሁ፡
  - verse: 2
    geez: ወበዝ፡ ኵሉ፡ ሀሎ፡ ያዕቆብ፡ ይስክብ፡ ውስተ፡ ሕፅኑ፡ ወኢያእመረ፡ ከመ፡ ሞተ፡ አብርሃም፡ አቡ፡ አቡሁ።
  - verse: 3
    geez: ወነቅሀ፡ ያዕቆብ፡ እምንዋሙ፡ ወናሁ፡ ቈረ፡ አብርሃም፡ ከመ፡ ባረድ፡ ወይቤ፡ *አባ፡ አባ፡ ወአልቦ፡ ዘነበበ፡ ወአእመረ፡
      ከመ፡ ሞተ።
  - verse: 4
    geez: ወተንሥአ፡ እምሕፅኑ፡ ወሮጸ፡ ወነገራ፡ ለርብቃ፡ እሙ፡ ወሖረት፡ ርብቃ፡ ኀበ፡ ይስሐቅ፡ ሌሊተ፡ ወነገረቶ፡ ወሖሩ፡
      ኅቡረ፡ ወያዕቆብ*ኒ፡ ምስሌሆሙ፡ ወማኅቶት፡ ውስተ፡ እዴሁ፡ ወሐዊሮሙ፡ ረከብዎ፡ ለአብርሃም፡ እንዘ፡ ይስክብ፡ በድኖ።
  - verse: 5
    geez: ወወድቀ፡ ይስሐቅ፡ ውስተ፡ ገጹ፡ አቡሁ፡ ወበከየ፡ ወሰዐሞ።
  - verse: 6
    geez: ወቃል፡ ተስምዐ፡ በቤት፡ አብርሃም፡ ወተንሥአ፡ እስማዔል፡ ወልዱ፡ ወሖረ፡ ኀበ፡ አብርሃም፡ አቡሁ፡ ወበከየ፡ *ለአብርሃም፡
      አቡሁ፡ ውእቱ፡ ወ*ኵሉ፡ ቤተ፡ አብርሃም፡ ወበከዩ፡ ብካየ፡ ዐቢየ።
  - verse: 7
    geez: ወቀበርዎ፡ ውስተ፡ በዓተ፡ ካዕበት፡ ቅሩበ፡ ሳራ፡ ብእሲቱ፡ ውሉዱ፡ ይስሐቅ፡ ወእስማዔል፡
  - verse: 8
    geez: ወበከይዎ፡ አርብዓ፡ መዋዕለ፡ ኵሎሙ፡ ሰብአ፡ ቤቱ፡ ወይስሐቅ፡ ወእስማዔል፡ ወኵሉ፡ ውሉዶሙ፡ ወ*ኵሎሙ፡ ውሉደ፡ ኬጡራ፡
      በመካኖሙ፡ ወተፈጸመ፡ *መዋዕለ፡ ብካዩ፡ አብርሃም።
  - verse: 9
    geez: ወሠለስተ፡ ኢዮቤልው፡ ሐይወ፡ ወአርባዕተ፡ ሱባዔ፡ ዓመተ፡ *ምእተ፡ ወሰብዓ፡ ወኃምስተ፡ ዓመተ፡ ወፈጸመ፡ መዋዕለ፡
      ሕይወቱ፡ አሂቅ፡ ወፍጹመ፡ መዋዕለ።
  - verse: 10
    geez: እስመ፡ መዋዕለ፡ ቀደምት፡ እማንቱ፡ ለሕይወቶሙ፡ *ዐሠርቱ፡ ወተስዓቱ፡ ኢዮቤልውሳት፡ ወእምድኅረ፡ አይኅ፡ አንዙ፡
      ይኅትጉ፡ እም፡ *ዐሠርቱ፡ ወተስዓቱ፡ ኢዮቤልውሳት፡ *ወበረሲአ፡ ፍጡነ፡ ወለአኅጽጾ፡ መዋዕለ፡ ሕይወቶሙ፡ እምገጸ፡ ሕማም፡
      ብዙኅ፡ ወበእከየ፡ ፍናዊሆሙ፡ ዘእንበለ፡ አብርሃም።
  - verse: 11
    geez: እስመ፡ አብርሃምሰ፡ ፍጹም፡ በኵሉ፡ ምግባሪሁ፡ ምስለ፡ እግዚአብሔር፡ ወ*እንዘ፡ ይሠምር፡ በጽድቅ፡ ኵሎ፡ መዋዕለ፡
      ሕይወቱ፡ ወናሁ፡ ኢፈጸመ፡ አርባዕተ፡ ኢዮቤልውሳተ፡ በሕይወቱ፡ እስከ፡ አመ፡ ረሰአ፡ ቅድመ፡ ገጸ፡ እኩይ፡ ወጸገበ፡ መዋዕሊሁ።
  - verse: 12
    geez: ወኵሉ፡ ትውልድ፡ ዘይትነሣእ፡ እምይእዜ፡ ወእስከ፡ ዕለተ፡ ደይን፡ ዐባይ፡ ይረሰኡ፡ ፍጡነ፡ ዘእንበለ፡ ይፈጽሙ፡ ክልኤ፡
      ኢዮቤልወ፡ ወትከውን፡ እንዘ፡ ተኀድጎሙ፡ አእምሮቶሙ፡ እመንፈሶሙ፡ [ወትአትት፡ ኵላ፡ አእምሮቶሙ]።
  - verse: 13
    geez: ወበውእቱ፡ መዋዕል፡ *እመ፡ ሐይወ፡ ብእሲ፡ ኢዮቤልወ፡ ወመንፈቀ፡ ዓመታት፡ ይብሉ፡ በእንቲአሁ፡ አብዝኀ፡ ሐይወ፡
      ወሙስዝናተ፡ መዋዕሊሁ፡ ሕማም፡ ወስራሕ፡ ወምንዳቤ፡ ወ*አልቦ፡ ሰላመ።
  - verse: 14
    geez: እስመ፡ መቅሠፍት፡ *ዲበ፡ መቅሠፍት፡ ወ*ቍስላን፡ ዲበ፡ ቍስላን፡ ወምንዳቤ፡ ዲበ፡ ምንዳቤ፡ ወስምዐት፡ እኩይ፡ ዲበ፡
      ስምዐት፡ እኩይ፡ ወደዌ፡ ዲበ፡ ደዌ፡ ወኵሉ፡ ዘከማሁ፡ ዚካ፡ እኩይ፡ ዝንቱ፡ ምስለ፡ ዝንቱ፡ ደዌ፡ ወጕፍጥአት፡ ወአስሕትያ፡
      ወበረድ፡ ወሐመዳ፡ ወአርዌው፡ ወ*ስክሕካሕ፡ ወ*ሰምዛዝ፡ ወዐባር፡ ወሞት፡ ወመጥባሕት፡ ወፂዋዌ፡ ወኵሉ፡ መቅሠፍት፡ ወሕማም።
  - verse: 15
    geez: ወኵሉ፡ ዝንቱ፡ ይመጽእ፡ በትውልድ፡ እኪት፡ እንተ፡ ትኤብስ፡ *በምድር፡ ርኵስ፡ ወዝሙት፡ ወገማኔ፡ ወሳቀራር፡ ገብርሙ።
  - verse: 16
    geez: አሜሃ፡ ይብሉ፡ ለቀደምት፡ መዋዕሊሆሙ፡ ብዙኅ፡ እስከ፡ *ዐሠርቱ፡ ምእት፡ ዓመት፡ ሠናይ፡ ወናሁ፡ መዋዕለ፡ ሕይወትነ፡
      አመ፡ አብዝኀ፡ ሰብእ፡ ሐይወ፡ *ሰብዓ፡ ዓመተ፡ ወእመ፡ ኀየለ፡ *ሰማንያ፡ ዓመተ፡ ወእሉ፡ እኩይ፡ ወአልቦ፡ ምዝኒ፡ ሰላመ፡
      በመዋዕለ፡ ትውልድ፡ ይእቲ፡ እኪት።
  - verse: 17
    geez: ወበይእቲ፡ ትውልድ፡ ይከውኑ፡ ደቂቅ፡ እንዘ፡ ይዘልፉ፡ አበዊሆሙ፡ ወአዕሩጊሆሙ፡ በእንተ፡ ኀጢአት፡ ወበእንተ፡ ዐመፃ፡
      ወበእንተ፡ ነባበ፡ አፉሆሙ፡ ወበእንተ፡ እኩያት፡ ዐበይት፡ ዘእሙንቱ፡ ይገብሩ፡ ወበእንተ፡ ኀደገቶሙ፡ ሥርዐተ፡ ዘኮነኖይ፡
      እግዚአብሔር፡ ማእከሎሙ፡ ወማእከሌሁ፡ ከመ፡ ይዕቀቡ፡ ወይግበሩ፡ ኵሎ፡ ትእዛዘ፡ ወሥርዐተ፡ ወኵሎ፡ ሕገ፡ ወአልቦ፡ ተኃኅቶ፡
      *የማነ፡ ወፀጋመ።*
  - verse: 18
    geez: እስመ፡ ኵሎሙ፡ አእከዩ፡ ወኵሉ፡ አፍ፡ ይትናገር፡ ዐበሳ፡ ወኵሉ፡ ግብሮሙ፡ ርኵስ፡ ወስቈራር፡ ወኵሉ፡ ፍኖቶሙ፡ ግማኔ፡
      ወርኵስ፡ ወሙስና።
  - verse: 19
    geez: ናሁ፡ ምድር፡ ትትሐጐል፡ በእንተ፡ ኵሉ፡ ምግባሮሙ፡ ወአልቦ፡ *ዘርእ፡ ወይን፡* ወአልቦ፡ ቅብዐ፡ እስመ፡ ኵሉ፡ *ካሕደ፡
      ምግባሪሆሙ፡* ወኵሎሙ፡ ይትሐጐሉ፡ ኅቡረ፡ አራዊት፡ ወእንስሳ፡ ወአዕዋፍ፡ ወኵሉ፡ ዓሣተ፡ ባሕር፡ እምቅድመ፡ ውሉደ፡ ሰብእ።
  - verse: 20
    geez: ወይትባአሱ፡ እሉ፡ ምስለ፡ እሉ፡ ወረዘት፡ ምስለ፡ ሊቃናት፡ ወሊቃናት፡ ምስለ፡ ወረዘት፡ ነዳይ፡ ምስለ፡ ባዕል፡ ትሑት፡
      ምስለ፡ ዐቢይ፡ ወ*ምስኪን፡ ምስለ፡ መኰንን፡ በእንተ፡ ሕግ፡ ወበእንተ፡ ኪዳን፡ እስመ፡ ረሰዑ፡ ትእዛዘ፡ ወኪዳነ፡ ወበዓለ፡
      ወወርኀ፡ ወሰንበተ፡ ወ*እዮቤሌወ፡* ወኵሎ፡ ዘ ኴነ።
  - verse: 21
    geez: ወይቀውሙ፡ *በቀስት፡ ወ*በአስይፍት፡ ወበቅትል፡ ከመ፡ ይሚጥዎሙ፡ ውስተ፡ ፍኖት፡ ወኢይትመየጡ፡ እስከ፡ ይትከዐው፡
      ደም፡ ብዙኅ፡ ዲበ፡ ምድር፡ እሉ፡ በእሉ።
  - verse: 22
    geez: ወእለ፡ ድኅኑ፡ በፍኖተ፡ ጽድቅ፡ ኢይትመየጡ፡ እምነ፡ *እከዮሙ፡ እስመ፡* ኵሎሙ፡ ለትዕግልት፡ ወውስተ፡ ብዕል፡ ይትነሥኡ፡
      ከመ፡ ይንሣኡ፡ *አሐዱ፡ ኵሎ፡ ዘቢጹ፡* ወስመ፡ ዐቢየ፡ ይሰምዩ፡ ወአኮ፡ በሀልወ፡ ወአኮ፡ በጽድቅ፡ *ወቅድስተ፡ ቅዱሳን፡*
      ያረኵሱ፡ *በርኵሶሙ፡ ወበሙስና፡ ግማኔሆሙ።*
  - verse: 23
    geez: ወይከውን፡ መቅሠፍት፡ ዐቢይ፡ ዲበ፡ ግብረ፡ ይእቲ፡ ትውልድ፡ እምኀበ፡ እግዚአብሔር፡ ወይሁቦሙ፡ ለመጥባሕት፡ ወለኵነኔ፡
