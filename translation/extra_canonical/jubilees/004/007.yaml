translation:
  text: that are committed in heaven and on earth, and in light and in darkness, and in every place. And Adam and his wife mourned for Abel four weeks[7] of years. And in the fourth year of the fifth week they became joyful, and Adam again knew his wife, and she bore him a son, and he called his name Seth; for he said, “the Lord has raised up for me another seed on the earth in place of Abel, because Cain killed him.” And in the sixth week he fathered his daughter Azura. And Cain took Awan his sister as a wife, and she bore him Enoch at the end of the fourth jubilee. And in the first year of the first week of the fifth jubilee, houses were built on the earth, and Cain built a city and named it after his son Enoch. And Adam knew Eve his wife, and she bore nine more sons. And in the fifth week of the fifth jubilee Seth took Azura his sister as a wife, and in the fourth year she bore him Enos. He was the first to call on the name of the Lord on the earth. And in the seventh jubilee, in the third week, Enos took Noam his sister as a wife, and she bore him a son in the third year of the fifth week, and he called his name Kenan. And at the end of the eighth jubilee Kenan took Mualeleth his sister as a wife, and she bore him a son in the ninth jubilee, in the first week, in the third year of that week, and they called his name Mahalalel. And in the second week of the tenth jubilee Mahalalel took Dinah, the daughter of Barakiel, his father's brother's daughter, as a wife, and she bore him a son in the third week, in its sixth year, and they called his name Jared. For in his days the angels of the Lord descended to the earth, those who are called the Watchers, so that they might instruct the children of men,
  philosophy: optimal-equivalence
  footnotes:
  - marker: '7'
    text: '''Week'' here and throughout the chapter refers to Jubilees’s chronological system, often a week of years. The main text keeps the shorter term while preserving ''jubilee'' explicitly.'
    reason: cultural_note
  - marker: a
    text: Or 'earth[7], and in light and in darkness, and in every place. And Adam and his wife mourned for Abel four weeks'.
    reason: previous_rendering
