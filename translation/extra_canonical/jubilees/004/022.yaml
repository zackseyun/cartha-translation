  text: ወአስምዐ፡ ሰትጉሃን፡ ለእለ፡ አበሱ፡ ምስለ፡ አዋልደ፡ ሰብእ፡ እስመ፡ *አኀዙ፡ እሉ፡" ይደመሩ፡ ከመ፡ ይርኩሱ፡ ምስለ፡ አዋልደ፡ ሰብእ፡' ወአስምዐ፡ ሄኖክ፡' ላዕለ፡ ኵሎሙ። ወተንሥአ፡ እማእከለ፡ 23 ደቂቀ፡ እጓለ፡ እመሕያው፡ ወወሰድናሁ፡ ውስተ፡ ገነት፡' ኤዶም፡ ለዕበይ፡ ወለክብር፡ ወናሁ፡ ውእቱ፡ *በህየ፡ ይጽሕፍ፡' ደይነ፡ ወኵነኔ፡ ዓለም፡ ወኵሎ፡ አክዮሙ፡ ለደቂቀ፡ እጓለ፡ እመሕያው። ወበእንቲአሁ፡' አምጽአ፡ ማየ፡ አይኅ፡' ዲበ፡' ኵሉ፡ ምድረ፡ ኤዶም፡ እስመ፡ ህየ፡ ተውህበ፡ *ውእቱ፡ 24 ለትእምርት፡' ወከመ፡'° ይስምዕ፡ ላዕለ፡ ኵሉ፡ ደቂቀ፡ ሰብእ፡" ከመ፡ ይንገር፡ ኵሎ፡ ግብረ፡ ትውልድ፡ እስከ፡ አመ፡" ዕለት፡ ደይን። ወውእቱ፡ ዐጠነ፡ ዕጣነ፡ ቤተ፡" መቅደስ፡ ዘይሰጠው፡ ቅድመ፡ እግዚ 25 አብሔር፡ *በደብረ፡ ቀትር።" እስመ፡ አርባዕቱ፡ መካን፡" በዲበ፡ ምድር፡ ለእግዚአብሔር፡ ገነት፡' 26 ኤዶም፡ ወደብረ፡ ጽባሕ፡ ወዝደብር፡ ዘሀለወከ፡" አንተ፡ ውስቴቱ፡ ዮም፡" ደብረ፡ ሲና፡ ወደብረ፡ ጽዮን፡ ይትቄደስ፡ በፍጥረት፡ ሐዳስ፡ ለቅዳሴ፡ ምድር፤ *በእንተዝ፡ ትትቄደስ፡ ምድር፡" እምኵሉ፡ *አበሳ፡ ወእምርኵስ፡" *በትውልደ፡ ዓለም።" ወበኢዮቤልው፡" ዘውእቱ፡ ዓሥር፡ ወራብዕ፡ 27 ነሥአ፡" ማቱሳላ፡ ብእሲተ፡ ኤድናሃ፡" ወስተ፡ አዝራእል፡ ወስተ፡ እኅተ፡ አቡሁ፡ [ብእሲተ፡ ሎቱ፡]" በሱባዔ፡ ሣልስ፡ በዓመት፡ አሐዱ፡" ዘውእቱ፡ ሱባኤ፡" ወወለደ፡ ወልደ፡ ወጸውዐ፡" ስሞ፡ ላሜክ። ወበዓሥር፡ ወኃምስ፡" ኢዮቤልዉ፡" በሱባዔ፡ ሣልስ፡ ነሥአ፡ ሎቱ፡" ላሜክ፡ ብእሲተ፡ ወስማ፡" 28 *ቤቴኖስ፡ ወስተ፡ ባራኪኤል፡ ወስተ፡ እኅተ፡ አቡሁ፡" [ሎቱ፡ ብእሲተ፡]" ወበዝ፡ ሱባዔ፡ ወለደት፡ ሎቱ፡ ወልደ፡ ወጸውዐ፡" ስሞ፡ ኖኅ፡ እንዘ፡ ይብል፡ ዝ"ያናዝዘኒ፡" *እምሐዘንየ፡ ወ"እምኵሉ፡ ግብርየ፡" ወእም"ድርየ፡" እንተ፡ ረገመ፡" እግዚአብሔር። ወበፍጻሜሁ፡ ለዓሥር፡ ወታስዕ፡ 29 ኢዮቤልው፡ በሱባዔ፡ ሳብዕ፡ በሳድስ፡ ዓመት፡ ሞተ፡ አዳም፡ ወቀበርዎ፡ ኵሎሙ፡ ደቂቁ፡ ውስተ፡
