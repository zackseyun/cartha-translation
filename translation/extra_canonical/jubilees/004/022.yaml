    text: Or 'And in the fifteenth jubilee, in the third week, Lamech took for himself a wife, and her name was Betenos, the daughter of Baraki’el, his father’s brother’s daughter; and in this week she bore him a son, and he called his name Noah, saying, “This one will comfort me for my sorrow and for all my work and for the ground that Yahweh has cursed.”'.
