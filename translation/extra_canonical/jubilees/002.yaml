  rows:
  - verse: 1
    geez: ወ*ይቤ፡" መልአከ፡ ገጽ፡ ለሙሴ፡ በቃለ፡ እግዚአብሔር፡ እንዘ፡ ይብል፡ ጸሐፍ፡ ኵሎ፡ ነገረ፡ ፍጥረት፡ ከመ፡ በስዱስ፡
      ዕለት፡ ፈጸመ፡ እግዚአብሔር፡ አምላክ፡ ኵሎ፡ ግብሮ፡ ወኵሎ፡ ዘፈጠረ፡" ወአዕረፈ፡ በ*ዕለት፡" ሳብዕት፡ ወቀደሳ፡ ለኵሉ፡
      ዓለማት፡ ወአንበራ፡ ትእምርተ፡ ለኵሉ፡"
  - verse: 2
    geez: ግብሩ። እስመ፡ በዕለት፡ ቀዳሚት፡ ፈጠረ፡ ሰማያተ፡ እለ፡ *መልዕልት፡ ወምድረ፡" ወማያተ፡ ወኵሎ፡" መንፈሰ፡" ዘይትለአክ፡
      ቅድሜሁ፡ መላእክተ፡" *ገጽኒ፡ ወመላእክተ፡" ቅዳሴ፡" ወ"መላእክተ፡ መንፈሰ፡" እሳት፡" ወመላእክተ፡" መንፈሰ፡" ደመናት፡
      ወ"ጽልመት፡ ወለሐመዳ፡" ወለበረድ፡ ወለ*አስሐትያ፡" ወመላእክተ፡ ቃላት፡" ወ*ነጐድጓዳት፡" ወ"መብረቅት፡ ወመላእክተ፡"
      መናፍስት፡" ለቍር፡ ወለመዐት፡ ወ"ለክረምት፡*ወለመጸው፡ወለማእረር፡" *ወለሐጋይ፡ወለኵሉ፡ መናፍስተ፡ ትገብሩ፡" ዘበሰማያት፡
      ወዘበምድር፡ ወቀላያተ፡" *(ዘመትሕተ፡ ምድር፡ ወ)ማዕምቅ፡ ወጽልመት፡ ወምሉክ፡(ወልሊት)፡ ወብርሃን፡ ወጎህ፡ ወጽባሕ፡
      *ዘአስተዳለወ፡ በአእምሮ፡ ልቡ፡
  - verse: 3
    geez: ወአሜሃ፡ ርኢነ፡ ምግባሮ፡ ወባረክናሁ፡ ወሰብሕነ፡ ቅድሜሁ፡ በእንተ፡ ኵሉ፡ ምግባሩ፡ እስመ፡
  - verse: 4
    geez: ሰብዐተ፡ ግብረ፡ ዐበይተ፡ ገብረ፡ በቅዳሚት፡ ዕለት። ወ*በዐለተ፡ ሳኒታ፡ ገብረ፡ ምጽናዓተ፡ ማእከለ፡ ማይ፡ ወ*ተከፍለ፡
      ማያት፡ በይእቲ፡ ዕለት፤ መንፈቆሙ፡ ዐርጉ፡ ላዕለ፡ ወመንፈቆሙ፡ ወረዱ፡ መታሕተ፡ ምጽናዓት፡ ማእከለ፡ ዲበ፡ ገጸ፡ ለ*ኵሉ፡
      ምድር፡ ወ*ዘንተ፡ ባሕቲቶ፡
  - verse: 5
    geez: ገብረ፡ ገብረ፡ በሳኒታ፡ ዕለት። ወ*በሣልስት፡ ዕለት፡ [ገብረ፡ በከመ፡] *ይቤ፡ ለማያት፡ ይኅለፉ፡ እምቅድመ፡ ገጸ፡
      ለኵላ፡ ምድር፡ ውስተ፡ መካን፡ አሐዱ፡ ወያስተርኢ፡ የብስ።
  - verse: 6
    geez: ወገብሩ፡ ከማሁ፡ ማያት፡ በከመ፡ ይቤሎሙ፡ ወተገብሡ፡ እምዲበ፡ *ገጸ፡ ለ*ምድር፡ ውስተ፡
  - verse: 7
    geez: መካን፡ አሐዱ፡ አፍአ፡ እምጽናዓትዝ፡ ወ*አስተርአየ፡ የብስ። ወበይእቲ፡ ዕለት፡ ፈጠረ፡ ባቲ፡ ኵሎ፡ አብህርተ፡ በበ፡
      ምትባኢሆሙ፡ ወኵሎሙ፡ አፍላገ፡ ወ*ምጉባኢሆሙ፡ ለማያት፡ ውስተ፡ አድባር፡ ወውስተ፡ ኵሉ፡ ምድር፡ ወኵሎሙ፡ ምዕቃባተ፡ ወ*ኵሎ፡
      ጠለ፡ ምድር፡ ወዘርአ፡ ዘይዘራእ፡ ወኵሎ፡ ዘይበቍል፡ ወዕፀወ፡ *እለ፡ ይፈርዩ፡ ወ*አማተ፡ ወገነተ፡ ኤዶም፡ በኤዶም፡ ለ*ተድላ፡
      ወለኵሉ፡…አርባዕተ፡ ዘንተ፡ ዐበይተ፡ ትውልደ፡ ገብረ፡
  - verse: 8
    geez: እግዚአብሔር፡ በ*ዕለት፡ ሣልስት። ወበ*ዕለት፡ ራብዕት፡ ገብረ፡ ፀሐየ፡ ወወርኀ፡ ወከዋክብተ፡ ወአንበሮሙ፡ ውስተ፡
      ምጽናዓተ፡ ሰማይ፡ ከመ፡ ያብርሁ፡ ዲበ፡ ኵሉ፡ ምድር፡ ወለኰንኖ፡
  - verse: 9
    geez: መዓልት፡ ወሌሊት፡ ወለፈሊጥ፡ ማዕከለ፡ ብርሃን፡ ወጽልመት። ወወሀበ፡ እግዚአብሔር፡ ፀሐየ፡ *ለትእምርት፡ ዐቢይ፡
      ዲበ፡ ምድር፡ ለመዋዕል፡ ወለሰንበታት፡ ወለ*አውራኅ፡ ወለበዓላት፡ ወለዓመታት፡ ወለሰንበታት፡ ዓመታት፡ ወለ*አዮቤልውሳት፡
      ወለኵሉ፡ ጊዜ፡
  - verse: 10
    geez: ለ*ዓመታት። ወይፈሊጥ፡ ማእከለ፡ ብርሃን፡ ወማእከለ፡ ጽልመት፡ ወለ*ጠዐዮ፡ *ከመ፡ ይጥዐይ፡ ኵሉ፡ ዘይሠርፅ፡ ወይለቍፅ፡
      ዲበ፡ ምድር፤ ሠለስተ፡ ዘንተ፡ ዘመደ፡ ገብረ፡ በዕለት፡ ራብዕት።
  - verse: 11
    geez: ወበዕለት፡ ኃምስት፡ ፈጠረ፡ አናብርት፡ ዐበይተ፡ ማእከለ፡ ቀላያተ፡ ማያት፡ እስመ፡ ዝንቱ፡ ተገብረ፡ ቀዳሚ፡ በአደዊሁ፡
      ዘሥጋ፡ ኖዓተ፡ ወኵሎ፡ ዘ*ይትነወስ፡ ውስተ፡ ማያት፡ ወኵሎ፡ ዘይሰርር፡
  - verse: 12
    geez: አዕዋፈ፡ ወኵሎ፡ ዘመዶሙ። ወሠረቀ፡ ፀሐይ፡ ላዕሌሆሙ፡ ለ*ጥዒና፡ ወላዕለ፡ ኵሉ፡ ዘሀሎ፡ ውስተ፡ ምድር፡ ኵሉ፡ ዘ*ይሠርፅ፡
      እምድር፡ ወኵሉ፡ ዕፀወ፡ ዘይፈሪ፡ ወ*ኵሉ፡ ዘሥጋ፡ ዘንተ፡ ሠለስተ፡ ዘመደ፡ ገብረ፡ አመ፡ ዕለት፡ ኃምስት። ወበዕለት፡
      ሳድስት፡ ገብረ፡ ኵሎ፡ አራዊተ፡ ምድር፡ ወኵሎ፡ እንስሳ፡ ወኵሎ፡ ዘይትሐወስ፡ ዲበ፡ ምድር። ወእምድኅረዝ፡ ኵሎ፡ ገብረ፡
      ሰብአ፡ ብእሴ፡ ወብእሲተ፡ ገብሮሙ፡ ወአስለጦ፡ ላዕለ፡ ኵሉ፡ ዘዲበ፡ ምድር፡ ወዘውስተ፡ አብሕርት፡ ወዲበ፡ ኵሉ፡ ዘይሰርር፡
      ወዲበ፡ አራዊት፡ ወዲበ፡ እንስሳ፡ ወዲበ፡ ኵሉ፡ ዘይትነወስ፡ ዲበ፡ ምድር፡ ወላዕለ፡ ኵሉ፡ ምድር፡ ወዲበዝ፡ ኵሉ፡ አስለጦ፡
      ወአርባዕተ፡ ዘንተ፡ ዘመደ፡ ገብረ፡ በዕለት፡ ሳድስት። ወኮነ፡ ኵሉ፡ ዕሥራ፡ ወክልኤተ፡ ዘመደ። ወፈጸመ፡ ኵሎ፡ ግብሮ፡
      በዕለት፡ ሳድስት፡ ኵሎ፡ ዘበሰማያት፡ ወዘበምድር፡ ወውስተ፡ አብህርት፡ ወውስተ፡ ቀላያት፡ ወውስተ፡ ብርሃን፡ ወውስተ፡ ጽልመት፡
      ወውስተ፡ ኵሉ። ወወሀበነ፡ ትእምርተ፡ ዐቢየ፡ ዕለተ፡ ሰንበታት፡ ከመ፡ ንኩን፡ እንዘ፡ ንገብር፡ ሰዱሰ፡ ዕለተ፡ ግብረ፡
      ወናዕርፍ፡ አመ፡ ዕለት፡ ሳብዕት፡ እምኵሉ፡ ግብር። ወኵሎሙ፡ መላእክተ፡ ገጽ፡ ወኵሎሙ፡ መላእክተ፡ ቅዳሴ፡ ክልኤተ፡ ዘመደ፡
      ዐበይተ፡ ዘንተ፡ ይቤለነ፡ ናዕንብት፡ ምስሌሁ፡ በሰማይ፡ ወበምድር። ወይቤለኒ፡ ናሁ፡ አነ፡ እፈልጥ፡ ሊተ፡ ሕዝበ፡ እምኵሉ፡
      አሕዛብ፡ ወያዕርፉ፡ አሙንቱኒ፡ ወእቄድሶሙ፡ ሊተ፡ ለሕዝብየ፡ ወእባርኮሙ፡ በከመ፡ ቀደስክዋ፡ ለዕለተ፡ ሰንበታት፡ ወእቄድስ፡
      ሊተ፡ ወከመዝ፡ እባርኮሙ፡ ወይከውኑኒ፡ ሕዝብየ፡ ወአነ፡ እከውኖሙ፡ አምላከ። ወኀረይኩ፡ ዘርአ፡ ያዕቆብ፡ በኵሉ፡ እምዘርኢኩ፡
      ወጸሐፍክዎ፡ ሊተ፡ ወልደ፡ በኵረ፡ ወቀደስክዎ፡ ሊተ፡ ለዓለመ፡ ዓለም፡ ወዕለተ፡ ሰንበታት፡ አእምሮሙ፡ ከመ፡ ያዕንብቱ፡
      ባቲ፡ እምኵሉ፡ ግብር። ወገብረ፡ ቦቱ፡ ትእምርተ፡ ከማሁ፡ በዘያዕርፉ፡ አሙንቱኒ፡ ምስሌነ፡ በዕለት፡ ሳብዕት፡ ለበሊዕ፡
      ወለሰትይ፡ ወለባርኮ፡ ዘፈጠረ፡ ኵሎ፡ በከመ፡ ባረከ፡ ወቀደሰ፡ ሎቱ፡ ሕዝበ፡ ዘያጠራ፡ እምኵሉ፡ አሕዛብ፡ ወከመ፡ ያዕንብቱ፡
