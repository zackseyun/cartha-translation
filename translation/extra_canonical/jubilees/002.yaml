theological_decisions:
- issue: Sabbath shared with angelic liturgy
  chosen_reading: The chapter presents the Sabbath as observed by angelic orders in
    heaven and then given as a sign for Israel to keep 'with us.'
  alternative_readings:
  - purely metaphorical heavenly pattern
  - later liturgical gloss
  rationale: The Ge'ez repeatedly links the angels of the presence and sanctification
    with Sabbath rest and explicitly says Israel keeps it together with them. The
    translation preserves this participatory heavenly-earthly theology.
- issue: Election language regarding Jacob/Israel
  chosen_reading: God separates a people from among the nations and identifies the
    seed of Jacob as his firstborn son.
  alternative_readings:
  - corporate Israel only without filial nuance
  - Jacob as merely representative
  rationale: The text strongly combines election, sonship, sanctification, and Sabbath
    observance. The filial language is retained rather than generalized.
- issue: Calendrical function of the sun
  chosen_reading: The sun is appointed as the great sign for days, sabbaths, months,
    appointed times, years, sabbaths of years, and jubilees.
  alternative_readings:
  - sun and moon jointly regulate the calendar
  - months as new moons explicitly
  rationale: The Ge'ez here foregrounds the sun in a way characteristic of Jubilees'
    calendrical ideology. The translation preserves that emphasis without harmonizing
    it to Genesis or later Jewish practice.
