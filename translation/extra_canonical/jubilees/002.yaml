translation:
  text: '[''1. And the angel of the presence said to Moses by the word of the LORD,
    saying, "Write all the account of creation: how in six days the LORD God finished
    all his works and all that he created, and he rested on the seventh day and sanctified
    it for all ages, and appointed it as a sign for all his works.'', ''2. For on
    the first day he created the heavens that are above and the earth and the waters
    and all the spirits that minister before him: the angels of the presence, and
    the angels of sanctification, and the angels of the spirit of fire, and the angels
    of the spirit of the winds, and of the clouds, and of darkness, and of snow and
    hail and hoarfrost, and the angels of the voices and the thunder and the lightning,
    and the angels of the spirits of cold and heat and winter and spring and harvest
    and summer, and all the spirits of his creatures that are in the heavens and on
    the earth and in the seas and in the depths and in darkness and in light and in
    dawn and in evening, which he prepared in the knowledge of his heart.'', ''3.
    And then we saw his works, and we blessed him and praised before him on account
    of all his works, because'', ''4. he made seven great works on the first day.
    And on the second day he made the firmament in the midst of the waters, and the
    waters were divided on that day: half of them went up above and half of them went
    down beneath the firmament in the midst over the face of the whole earth. And
    this alone'', ''5. was the work that he made on the second day. And on the third
    day he commanded the waters to pass away from before the face of the whole earth
    into one place, and let the dry land appear.'', ''6. And the waters did so, just
    as he told them, and they withdrew from upon the face of the earth into'', ''7.
    one place outside this firmament, and the dry land appeared. And on that day he
    created for it all the seas according to their separate gatherings, and all the
    rivers and the gatherings of the waters in the mountains and in all the earth,
    and all the lakes and all the dew of the earth, and the seed that is sown, and
    everything that sprouts, and fruit-bearing trees, and the Garden of Eden in Eden
    for delight, and for all these—four great kinds—he made on the third day.'', ''8.
    And on the fourth day he made the sun and the moon and the stars, and set them
    in the firmament of heaven so that they might give light upon all the earth and
    rule'', ''9. over day and night and separate light from darkness. And God appointed
    the sun as a great sign upon the earth for days and for sabbaths and for months
    and for appointed times and for years and for sabbaths of years and for jubilees
    and for all the seasons of the years.'', ''10. And it separates light from darkness,
    and for prosperity, so that everything that shoots and grows on the earth may
    prosper. These three kinds he made on the fourth day.'', ''11. And on the fifth
    day he created the great sea-monsters in the depths of the waters, for these were
    the first fleshly beings made by his hands, and every moving thing that moves
    in the waters, and everything that flies—'', ''12. the birds and all their kinds.
    And the sun rose over them for prosperity, and over everything that was on the
    earth, everything that sprouts from the earth, and every fruit-bearing tree, and
    all flesh. These three kinds he made on the fifth day. And on the sixth day he
    made all the beasts of the earth, and all cattle, and everything that moves upon
    the earth. And after all this he made humankind, male and female he made them,
    and gave them authority over everything that is upon the earth and in the seas,
    and over everything that flies, and over the beasts and over the cattle and over
    everything that moves upon the earth, and over all the earth. And over all this
    he gave them authority. And four kinds he made on the sixth day. And all were
    twenty-two kinds. And he finished all his work on the sixth day—all that is in
    the heavens and on the earth and in the seas and in the depths and in the light
    and in the darkness and in everything. And he gave us a great sign, the sabbath
    day, so that we might work six days and rest on the seventh day from all work.
    And all the angels of the presence and all the angels of sanctification—these
    two great kinds—he told us, "Let us rest with him in heaven and on earth." And
    he said to me, "Behold, I will separate for myself a people from among all the
    peoples, and they will keep the sabbath, and I will sanctify them for myself as
    my people, and I will bless them. As I sanctified the sabbath day, so I will sanctify
    them for myself, and so I will bless them; and they will be my people, and I will
    be their God. And I have chosen the seed of Jacob from among all that I have seen,
    and have written him down as my firstborn son, and have sanctified him for myself
    forever and ever. And I will make known to them the sabbath day, so that they
    may rest on it from all work." And thus he made a sign by which they should keep
    sabbath with us on the seventh day, to eat and to drink and to bless him who created
    all things, just as he blessed and sanctified for himself a people for possession
    from among all the nations, and that they should keep sabbath together with us.
    And he caused his commands to ascend as a pleasing fragrance acceptable before
    him all the days. There were twenty-two heads of mankind from Adam to Jacob, and
    twenty-two kinds of work were made until the seventh day. This is blessed and
    holy, and this also is blessed and holy; and this one and that one were for holiness
    and for blessing. And to this one it was given that they should be blessed and
    holy all the days, according to the testimony and the first law, just as it was
    sanctified and blessed on the seventh day. He created heaven and earth and everything
    that he created in six days, and God made the seventh day holy for all his works.
    Therefore he commanded concerning it that everyone who does any work on it shall
    die, and whoever defiles it shall surely die. And you command the children of
    Israel, and let them keep this day so that they may sanctify it, and so that they
    may not do on it any work, and so that they may not defile it, for it is holier
    than all days. And everyone who profanes it shall surely die, and everyone who
    does on it any work shall surely die forever, so that the children of Israel may
    keep this day throughout their generations and not be uprooted from the land;
    for it is a holy day and a blessed day. And every person who keeps it and rests
    on it from all his work will be holy and blessed through all days, like us.'',
    ''29. And declare and say to the children of Israel the law of this day: that
    they are to keep sabbath on it, and that they are not to forsake it in the error
    of their hearts so as to do any work on it that is not fitting, or to do on it
    their own pleasure, or to prepare on it anything to be eaten or drunk, or to draw
    water, or to bring in or take out through their gates any burden that they had
    not prepared for themselves in their dwellings on the sixth day.'', ''30. And
    they shall not bring in or take out from house to house on this day, for it is
    holier and more blessed than any jubilee day of jubilees. On this we kept sabbath
    in the heavens before it was made known to any flesh to keep sabbath on it upon
    the earth.'', ''31. And the Creator of all blessed it, but he did not sanctify
    all peoples and nations to keep sabbath on it; Israel alone—to it alone he gave
    that they should eat and drink and keep sabbath on it upon the earth.'', ''32.
    And the Creator of all blessed this day which he created for blessing and holiness'',
    ''33. and glory above all days. This law and testimony was given to the children
    of Israel as an everlasting law throughout their generations.'']'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '2'
    text: The list of created angelic and elemental spirits is textually dense and
      may reflect some local corruption or compression in the Ethiopic tradition.
      The translation stays close to the sequence rather than smoothing the catalog.
    reason: segmentation_note
  - marker: '7'
    text: The phrase rendered 'for all these—four great kinds' is difficult because
      the verse combines topographical features, vegetation, and Eden in a compressed
      list. The number likely summarizes grouped categories rather than every item
      individually.
    reason: segmentation_note
  - marker: '10'
    text: The clause rendered 'for prosperity' may also be understood as 'for healing'
      or 'for making flourish,' referring to the beneficial effect of the heavenly
      lights on earthly growth.
    reason: lexical_alternative
  - marker: '12'
    text: Verse 12 in this source row contains a long continuous block that likely
      spans multiple traditional verse divisions (12-28). The English preserves the
      supplied chapter segmentation by combining them into a single verse 12 to match
      the source payload structure.
    reason: segmentation_note
  - marker: 29-30
    text: The legal details about carrying, preparing food, drawing water, and moving
      goods from house to house are preserved from the Ethiopic wording and should
      not be harmonized automatically with later rabbinic Sabbath law, though they
      are related in theme.
    reason: cultural_note
  - marker: '30'
    text: The phrase 'more blessed than any jubilee day of jubilees' is difficult
      and may be an emphatic comparison elevating the weekly Sabbath above even the
      highest festal cycles.
    reason: alternative_reading
  - marker: '31'
    text: The text states that the Creator blessed the day but did not sanctify all
      peoples and nations to keep Sabbath on it; Israel alone receives that sanctified
      earthly observance. This is a theological claim of election in sacred time,
      not merely an ethnic aside.
    reason: cross_reference
lexical_decisions:
- source_word: መልአከ ገጽ
  chosen: angel of the presence
  alternatives:
  - angel of the face
  - presence-angel
  rationale: Preserves the established revelatory title in Jubilees and reflects the
    literal sense of 'face/presence' without flattening it into a generic angelic
    messenger.
- source_word: ቀደሳ
  chosen: sanctified
  alternatives:
  - made holy
  - consecrated
  rationale: Used consistently for holiness language in this chapter, especially where
    Sabbath theology is central.
- source_word: ትእምርት
  chosen: sign
  alternatives:
  - token
  - mark
  rationale: Best captures covenantal-symbolic force in calendrical and Sabbath contexts.
- source_word: ምጽናዓት
  chosen: firmament
  alternatives:
  - expanse
  - vault
  rationale: Retains the cosmological density of the creation account and aligns with
    the traditional cosmological concept rather than a flattened modern paraphrase.
- source_word: መላእክተ ቅዳሴ
  chosen: angels of sanctification
  alternatives:
  - holy angels
  - angels of holiness
  rationale: The genitival construction is preserved to reflect a distinct angelic
    class in Jubilees.
- source_word: መላእክተ ቃላት
  chosen: angels of the voices
  alternatives:
  - angels of sounds
  - angels of thunder-voices
  rationale: Kept relatively literal because the phrase is part of a stylized list
    of cosmic agencies; over-interpretation would reduce transparency.
- source_word: አውራኅ
  chosen: months
  alternatives:
  - new moons
  - lunar cycles
  rationale: In calendrical sequence with days, sabbaths, appointed times, years,
    sabbaths of years, and jubilees, 'months' is the most natural and auditable rendering,
    while the lunar/new-moon nuance is noted by alternative.
- source_word: በዓላት
  chosen: appointed times
  alternatives:
  - feasts
  - festivals
  rationale: Preserves calendrical-sacral breadth without narrowing the term only
    to festive celebration.
- source_word: ሰንበታት ዓመታት
  chosen: sabbaths of years
  alternatives:
  - weeks of years
  rationale: Jubilees is highly sensitive to calendrical terminology; this rendering
    keeps the Sabbath-based structure explicit.
- source_word: አዮቤልውሳት
  chosen: jubilees
  alternatives:
  - jubilee years
  rationale: Standard readable English form that preserves the technical calendrical
    institution.
- source_word: አናብርት ዐበይተ
  chosen: great sea-monsters
  alternatives:
  - great sea creatures
  - great marine beasts
  rationale: Reflects the emphatic and somewhat mythic register of the term better
    than a bland zoological gloss.
- source_word: ዘሥጋ
  chosen: fleshly beings
  alternatives:
  - creatures of flesh
  - animate flesh
  rationale: Preserves the emphasis that these are embodied living creatures, important
    in the sequence of creation.
- source_word: ሰብአ ብእሴ
  chosen: humankind
  alternatives:
