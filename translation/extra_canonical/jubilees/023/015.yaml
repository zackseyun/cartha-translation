  category: mistranslation
  from: that defiles the earth with uncleanness and fornication and impurity and abominable deeds.
  to: which sins on the earth; their deeds are uncleanness and fornication and impurity and abomination.
  rationale: The Ge'ez verb `ትኤብስ` (təʾebbes) means 'sins' or 'transgresses,' not 'defiles.' Furthermore, `በምድር` (ba-mədr) means 'on the earth,' and `ገብርሙ` (gabrəmu) means 'their deeds.' The draft conflates two distinct clauses ('which sins on the earth' and 'their deeds are uncleanness...') into a single clause ('defiles the earth with...'), altering both the grammar and the meaning. The noun 'deeds' (gabrəmu) applies to the entire list of vices, not just the final item.
