  text: And in that generation children will reproach their fathers and their elders because of sin and because of injustice and because of the speech of their mouth and because of the great evils that they commit, and because they have forsaken the covenant that the LORD made between them and himself, that they should keep and do all his commandments and his ordinances and all his law, without turning aside to the right hand or to the left.
