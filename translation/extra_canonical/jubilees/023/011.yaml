revisions:
- timestamp: '2026-04-23T14:50:34Z'
  adjudicator: azure-gpt-5.4-revision-pass
  reviewer_model: gpt-5.4
  category: revision_pass
  from: For Abraham was perfect in all his deeds with the LORD, and he was well-pleasing in righteousness all the days of his life; and behold, he did not complete four jubilees in his life, until he had grown old in the presence of evil, and his days were cut short.
  to: For Abraham was perfect in all his deeds before the LORD, and he was pleasing in righteousness all the days of his life; and behold, he did not complete four jubilees in his life, until he grew old in the presence of evil, and his days were fulfilled.
  rationale: Changed 'with the LORD' to 'before the LORD' for better lexical accuracy; simplified 'well-pleasing' to 'pleasing'; changed 'had grown old' to 'grew old' for smoother narrative flow; and replaced 'his days were cut short' with 'his days were fulfilled' to reflect the source more accurately.
- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/023/011.job-76493.json
  category: mistranslation
  from: before the LORD
  to: with the LORD
  rationale: The Ge'ez preposition 'mesla' means 'with', not 'before' (which would be 'qedma'). The previous draft's 'with the LORD' was correct and aligns with the biblical idiom.
- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/023/011.job-76493.json
  category: missing_nuance
  from: in the presence of evil
  to: because of evil
  rationale: The Ge'ez idiom 'qedma gatsa' (literally 'before the face of') frequently functions causally, meaning 'because of' or 'by reason of'. In the context of Jubilees 23, human lifespans are shortened specifically *because of* wickedness, making the causal translation more appropriate here.
- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/023/011.job-76493.json
  category: lexical
  from: his days were fulfilled
  to: he was full of days
  rationale: The Ge'ez verb 'tsagaba' means 'to be full' or 'satiated', and the subject is Abraham ('he was full of his days'), matching the biblical idiom in Genesis 25:8. 'His days were fulfilled' changes the subject and loses the specific idiom of satiation.
