translation:
  text: '1. And after this Judah spoke to Jacob his father and said to him, “Bend
    your bow, father, and send out your arrows, and cast down the enemy and kill the
    adversary; and may there be strength for you, because we shall kill your brothers’
    enemy. Your hand is with you, and your help is with you; we will give it to you
    for honor.”

    2. At that time Jacob bent his bow and sent out an arrow, and struck Esau his
    brother on the right breast, and killed him.

    3. And again he sent out an arrow, and struck Adoran the Aramean on the left breast,
    and drove him back and killed him.

    4. And after this the sons of Jacob went out, they and their servants with them,
    in four divisions of battle.

    5. And Judah went out in front, and Naphtali and Gad with him, and fifty servants
    with him, toward the south side of the tower; and they killed all whom they found
    before them, and not one of them escaped, not even one.

    6. And Levi and Dan and Asher went out toward the east side of the tower, and
    fifty were with them; and they killed the fighting men of Moab and Ammon.

    7. And Reuben and Issachar and Zebulun went out toward the north side of the tower,
    and fifty were with them; and they killed the warriors of the Philistines.

    8. And Simeon and Benjamin and Enoch the son of Reuben went out toward the west
    side of the tower, and fifty were with them; and they killed of Edom and of the
    Horites, four hundred valiant men, men fit for battle.

    9. And six hundred fled, and four of the sons of Esau fled with them; and they
    left their father slain, as he had fallen in the hill-country which is in Adurim.
    And the sons of Jacob pursued after them as far as Mount Seir.

    10. But Jacob buried his brother in the hill-country which is in Adurim, and he
    returned to his house.

    11. And the sons of Jacob pressed the sons of Esau on Mount Seir, and they bowed
    their necks so that they might become slaves

    12. to the sons of Jacob. And they sent to their father asking whether they should
    make peace with them or kill them.

    13. And Jacob sent to his sons that they should make peace, and they made peace
    with them, and they imposed upon them a yoke of service, so that they should serve
    Jacob and his sons all their days.

    14. And they remained serving Jacob until the day when he went down into Egypt.

    15. And the sons of Edom have not again cast off the yoke of service which the
    twelve sons of Jacob had laid upon them, to this day.

    16. And these are the kings who reigned in Edom before a king reigned over the
    children of Israel,

    17. to this day, in the land of Edom: Balaq son of Beor reigned in Edom, and the
    name of his city was Denaba.

    18. And Balaq died, and Jobab son of Zarah from Boser reigned after him.

    19. And Jobab died, and Asam from the mountain of Teman reigned after him.

    20. And Asam died, and Adath son of Barad, who struck Midian in the field of Moab,
    reigned after him; and the name of his city was Avith.

    21. And Adath died, and Salman from Amaseqa reigned after him.

    22. And Salman died, and Saul from Rehoboth of the River reigned after him.

    23. And Saul died, and Baelunan son of Achbor reigned after him.

    24. And Baelunan son of Achbor died, and Adath reigned after him; and the name
    of his wife was Meṭabigo, daughter of Maṭarego, daughter of Metebedzaab.

    25. These are the kings who reigned in the land of Edom.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: v1
    text: The opening speech is textually difficult in this Ethiopic row, especially
      the clauses after 'kill the adversary.' The translation keeps the martial exhortation
      and honor-language without over-smoothing several compressed phrases.
    reason: segmentation_note
  - marker: v3
    text: The name 'Adoran' is uncertain in form, and the ethnic label may also be
      read differently in other witnesses. The Ethiopic here appears to identify a
      named foreign warrior distinct from Esau.
    reason: textual_variant
  - marker: v5
    text: The term rendered 'tower' may also denote a fortified place or stronghold.
      The four directional assaults in vv. 5–8 support a military-topographical sense.
    reason: lexical_alternative
  - marker: v6
    text: The directional term here is literally 'toward the sunrise/east.'
    reason: lexical_alternative
  - marker: v8
    text: The phrase 'of Edom and of the Horites' is difficult; the verse appears
      to report the killing of four hundred strong fighting men drawn from Edomite
      and Horite groups.
    reason: segmentation_note
  - marker: v9
    text: The place-name rendered 'Adurim' is uncertain in vocalization from the Ethiopic
      transcription.
    reason: textual_variant
  - marker: v15
    text: The Ethiopic numeral phrase is awkwardly segmented in this row. The sense
      is that the yoke imposed by the twelve sons of Jacob remained on Edom 'to this
      day.'
    reason: segmentation_note
  - marker: v17
    text: The royal list closely parallels the Edomite king list known from Genesis
      36, but the spellings here follow the Ethiopic forms of Jubilees rather than
      being harmonized back to Genesis.
    reason: cross_reference
  - marker: v24
    text: The personal names in this verse are preserved in readable transliteration
      from the Ethiopic and are textually uncertain in exact form.
    reason: textual_variant
lexical_decisions:
- source_word: ቀስተ
  chosen: bow
  alternatives:
  - weapon
  lexicon: Ge'ez common noun
  rationale: The immediate context includes arrows and shooting; 'bow' is the plain
    concrete sense and preserves the martial scene.
- source_word: ሐጸ
  chosen: arrow
  alternatives:
  - dart
  - shaft
  lexicon: Ge'ez common noun
  rationale: The object is sent from the bow; 'arrow' is the most natural and specific
    rendering.
- source_word: ጥቦ የማናዊ / ጥቦ ፀጋማዊ
  chosen: right breast / left breast
  alternatives:
  - right side / left side
  - right nipple / left nipple
  lexicon: Ge'ez anatomical expression
  rationale: The phrase appears to specify the side of the chest struck. 'Breast'
    preserves the bodily precision without overcommitting to a narrower anatomical
    term.
- source_word: መርብዕተ ማኅፈድ
  chosen: four divisions of battle
  alternatives:
  - four quarters of the tower
  - four companies around the stronghold
  lexicon: Ge'ez numeral + military/topographical noun
  rationale: The context is tactical deployment to four directions around a defended
    place. 'Divisions of battle' keeps both the fourfold arrangement and military
    force.
- source_word: ማኅፈድ
  chosen: tower
  alternatives:
  - fortress
  - stronghold
  lexicon: Ge'ez topographical noun
  rationale: The directional assaults suggest a fortified structure. 'Tower' is retained
    in the main text because the Ethiopic term often points to a fortified elevated
    place; uncertainty is noted in footnotes.
- source_word: አግብርቲሆሙ / አግብርተ
  chosen: servants / slaves
  alternatives:
  - servants
  - bondmen
  lexicon: Ge'ez from root for serving
  rationale: In vv. 11–15 the subjugation is explicit and coerced, so 'slaves' best
    reflects bonded status. In v. 4, where it refers to Jacob's own accompanying household
    retainers, 'servants' is less misleading in English.
- source_word: አትሐቱ ክሳዶሙ
  chosen: they bowed their necks
  alternatives:
  - they submitted
  - they bent their necks
  lexicon: Ge'ez idiom
  rationale: This is a submission idiom. Rendering it literally preserves the vividness
    and the political subjugation.
- source_word: አርዑተ ቅኔ
  chosen: a yoke of service
  alternatives:
  - a yoke of slavery
  - tribute
  lexicon: Ge'ez idiomatic phrase
  rationale: The image is a yoke placed on a conquered people. 'Service' keeps the
    metaphor while allowing the following verses to clarify the servile relation.
- source_word: ይጽብሑ
  chosen: serve
  alternatives:
  - wait upon
  - be subject to
  lexicon: Ge'ez verb
  rationale: In context of imposed yoke and bowed necks, 'serve' best captures ongoing
    subjection.
- source_word: ነገሥት ... ነገሡ
  chosen: kings ... reigned
  alternatives:
  - ruled
  lexicon: Ge'ez royal terminology
  rationale: The formula intentionally echoes royal lists; 'reigned' preserves the
    dynastic register.
- source_word: ህየንቴሁ
  chosen: after him
  alternatives:
  - in his place
  - as his successor
  lexicon: Ge'ez succession formula
