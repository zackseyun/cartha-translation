translation:
  text: '1. And in the seventh week of the seventh year, in the forty-seventh jubilee,
    your father came from the land of Canaan, and you were born in the fourth week,
    in the sixth year, in the forty-eighth jubilee.

    2. That was a time of affliction upon the children of Israel, and the king of
    Egypt, Pharaoh, commanded concerning them that they should throw all their sons,
    every male that was born, into the river.

    3. And they kept throwing them in for seven months, until the day when you were
    born. And your mother hid you for three months, and they became aware of her because
    of you. And she made for you a basket, and coated it with pitch and asphalt, and
    placed it among the reeds by the bank of the river, and put you in it for seven
    days. And your mother came by night and nursed you, and by day Miriam your sister
    guarded you from the birds.

    4. And in those days Tarmuth, the daughter of Pharaoh, came to bathe in the river,
    and she heard your voice as you were weeping, and she said to her maidservants,

    5. “Bring him to me.” And they brought you to her. And she took you out of the
    basket and had compassion on you.

    6. And your sister said to her, “Shall I go and call for you one of the Hebrew
    women, who will nurse him and wash him for you?”

    7. And she said to her, “Go.” And she went and called your mother, Jochebed, and
    she gave her wages, and she nursed you.

    8. And after that, when you had grown, they brought you to Pharaoh’s daughter,
    and you became her son. And Amram your father taught you writing, and when you
    had completed three weeks of years he brought you into the royal court.

    9. And you were in the court for three weeks of years until the time when you
    went out from the royal court and saw an Egyptian striking your companion, one
    of the children of Israel.

    10. And you killed him and hid him in the sand. And on the second day you found
    two men of the children of Israel fighting, and you said to the one who was acting
    unjustly, “Why are you striking your brother?”

    11. And he was angry and contentious, and he said, “Who appointed you a ruler
    and a judge over us? Do you mean to kill me as you killed the Egyptian yesterday?”
    And you were afraid and fled because of this matter.

    12. And in the sixth year of the third week of the forty-ninth jubilee, you departed
    and dwelt in the land of Midian for five weeks and one year, and you returned
    to Egypt in the week...'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '4'
    text: 'The Ge''ez row numbering is offset in the source extract: the narrative
      continues smoothly, and this line is translated as verse 4 following the chapter
      sequence.'
    reason: segmentation_note
  - marker: '3'
    text: The phrase about Miriam likely means she guarded the child by day, specifically
      from birds or other danger near the riverbank.
    reason: segmentation_note
  - marker: '5'
    text: The container is rendered 'basket.' An alternative is 'ark' or 'box,' but
      'basket' avoids importing wording not explicit in the Ge'ez.
    reason: lexical_alternative
  - marker: '12'
    text: This verse corresponds to verse 48 in the source manuscript numbering. The
      Ge'ez text here ends abruptly at 'in the week' (በሱባዔ፡).
    reason: textual_note
lexical_decisions:
- source_word: ሱባዔ
  chosen: week
  alternatives:
  - sabbath-period
  - heptad
  rationale: In Jubilees' chronological system this denotes a heptadic unit, often
    specifically a week of years. 'Week' preserves the technical calendrical structure
    without over-paraphrasing.
- source_word: ኢዮቤልው
  chosen: jubilee
  alternatives:
  - jubilee-period
  rationale: Standard rendering for the calendrical cycle in Jubilees; preserving
    the term is essential to the book's chronology.
- source_word: ምንዳቤ
  chosen: affliction
  alternatives:
  - oppression
  - tribulation
  rationale: Conveys imposed suffering upon Israel without importing later theological
    nuance beyond the Ge'ez.
- source_word: ሤፍተ / ሤፍቅ
  chosen: basket
  alternatives:
  - ark
  - box
  rationale: The Ge'ez denotes a container made for the infant. 'Basket' is natural
    English and avoids over-harmonizing with Exodus traditions through 'ark,' while
    a footnote can note the alternative.
- source_word: ዕብራን፡ መጽሐፈ
  chosen: taught you writing
  alternatives:
  - taught you letters
  - taught you the book
  rationale: The phrase most naturally indicates literacy/instruction in writing;
    this also fits the courtly upbringing context.
- source_word: ዐጸደ፡ መንግሥት
  chosen: royal court
  alternatives:
  - court of the kingdom
  - palace court
  rationale: Idiomatic English for the king's enclosed court/palace setting.
theological_decisions:
- issue: Chronological expression 'three weeks' in Moses' age
  chosen_reading: Rendered as 'three weeks of years' = twenty-one years
  alternative_readings:
  - three literal weeks
  - three sabbatical cycles without explicit expansion
  rationale: Within Jubilees, chronological notices regularly use 'week' as a week
    of years. Rendering it explicitly preserves the book's calendrical framework and
    avoids absurd literalism in the narrative.
  doctrine_reference: 'PHILOSOPHY.md: preserve calendrical vocabulary carefully'
- issue: Identity of Pharaoh's daughter
  chosen_reading: Retained the proper name 'Tarmuth' from the Ge'ez
  alternative_readings:
  - Thermuthis
  - Pharaoh's daughter without name
  rationale: The source explicitly names her; preserving the name respects Jubilees'
    expanded narrative rather than flattening it into Exodus.
