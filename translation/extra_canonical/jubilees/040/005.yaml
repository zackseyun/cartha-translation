translation:
  text: “And now let Pharaoh appoint overseers in all the land of Egypt, and let them store up grain in the storehouses of the cities, in each city, during the days of the years of abundance. And it will be provision for the seven years of famine, and the land will not perish before the face of the famine, for it will be very severe.”
