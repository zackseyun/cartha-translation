  category: mistranslation
  from: or haughtiness of face, or partiality in his thoughts
  to: or partiality, and no taking of bribes
  rationale: The draft mistranslates two consecutive phrases. First, `ወአሢሦተ፡ ገጽ` (wa'aśiśota gaṣṣ) means "partiality" or "favoritism" (literally "seeking the face"), not "haughtiness of face". Second, `ነሢአ፡ ሕልያነ` (naśi'a ḥelyāna) means "taking of bribes" or "accepting gifts". The draft confused `ሕልያን` (ḥelyān, bribe/gift) with `ሕሊና` (ḥellinā, thought/mind), resulting in the erroneous "in his thoughts". The Ge'ez also repeats `ወአልቦ` ("and there was no") before the taking of bribes, which is restored in the suggested rewrite.
