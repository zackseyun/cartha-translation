  changes_summary: Changed 'stored up' to 'gathered' for closer lexical fit, and 'in city after city' to 'from city to city' to reflect movement/collection. Revised 'was filled up' to 'was beyond measure' for more natural English and better alignment with the sense of immeasurable abundance.
revisions:
- timestamp: '2026-04-23T14:52:33Z'
  adjudicator: azure-gpt-5.4-revision-pass
  reviewer_model: gpt-5.4
  category: revision_pass
  from: And Joseph stored up food in city after city until the grain was filled up, until they could no longer count it, and it was measured no more because of its abundance.
  to: And Joseph gathered food from city to city until the grain was beyond measure, until they could no longer count it, and it was measured no more because of its abundance.
  rationale: Changed 'stored up' to 'gathered' for closer lexical fit, and 'in city after city' to 'from city to city' to reflect movement/collection. Revised 'was filled up' to 'was beyond measure' for more natural English and better alignment with the sense of immeasurable abundance.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/040/013.job-76922.json
  category: mistranslation
  from: from city to city
  to: for each city within the city
  rationale: The Ge'ez 'la-hagar wəsta hagar' (literally 'for a city into a city') reflects the idiom of storing a city's food within that same city (cf. Gen 41:48), rather than moving food 'from' one city to another.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/040/013.job-76922.json
  category: mistranslation
  from: until the grain was beyond measure
  to: until they were full of grain
  rationale: The Ge'ez 'mal'a sərnāya' literally means 'was full of grain' or 'filled with grain.' Translating it as 'beyond measure' is a paraphrase that loses the specific verb 'mal'a' (to fill/be full) and preempts the following clause about not being able to measure it.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/040/013.job-76922.json
  category: grammar
  from: until they could no longer count it, and it was measured no more
  to: until they were unable to count and measure it
  rationale: The verb 'yəs'ənu' (they were unable) governs both 'ḫʷəlqʷato' (its counting) and 'wa-safara' (and measuring). Splitting them into two different clauses with different subjects obscures the parallel grammatical structure.
