  adjudicator: auto_apply_tier2_source_grounded
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_gap_closure_2026_04/extra_canonical/jubilees/040/001.job-75256.json
  category: mistranslation
  tier: 2
  from: forgot Joseph in the prison house, though he knew what would happen
  to: left Joseph in the prison house, even though he had informed him of what would happen
  rationale: The verb 'ወረሰዮ' (wa-rasayo) means 'he left him' or 'he placed him', not 'he forgot' (which is ረስዐ, correctly translated at the end of the verse). Additionally, 'አይድዖ' (ayde'o) is a causative verb meaning 'he informed him' (referring to Joseph informing the cupbearer), not 'he knew'.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/040/001.job-76910.json
  category: missing_nuance
  from: 'And it happened just as Joseph had interpreted for them:'
  to: 'And it happened to them just as he had interpreted for them:'
  rationale: The Ge'ez text uses a pronoun here (ወበከመ፡ ፈከረ፡ ሎሙ, 'and as he interpreted for them') and saves the explicit name 'Joseph' for the end of the sentence (በከመ፡ ፈከረ፡ ሎሙ፡ ዮሴፍ). Inserting 'Joseph' in the first clause creates unnecessary repetition in English that is not present in the source.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/040/001.job-76910.json
  category: lexical
  from: the chief baker
  to: the baker
  rationale: The Ge'ez text simply reads ወለሐባዚስ (wa-la-habazis, 'and the baker'), lacking the word for 'chief' (ሊቀ, liqa) that is explicitly used for the cupbearer (ሊቀ፡ መዘርት). Translating it as 'chief baker' harmonizes with Genesis but over-translates the Ge'ez.
