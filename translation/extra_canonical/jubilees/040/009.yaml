  rationale: The revision pass incorrectly changed the preposition to 'before'. The Ge'ez text uses ላዕለ (la'la), which means 'over' or 'upon' (the subsequent phrase uses በቅድመ, ba-qedma, 'before/in the sight of'). Additionally, ዘመድ (zamad) here reflects the Greek 'genea' (generation), which is the standard scholarly rendering (e.g., VanderKam, Charles) and fits the context of his Egyptian contemporaries better than 'kin'.
