  category: mistranslation
  from: their silver in them
  to: their money for them
  rationale: The Ge'ez word is ወወርቆሙኒ (wä-wärqomu-ni), which means 'their gold' or 'their money', not 'silver' (which would be bərr). Translating it as 'silver' improperly harmonizes with the Hebrew of Genesis 42:25 rather than translating the Ge'ez text of Jubilees. Additionally, ሎሙ (lomu) means 'for them' rather than 'in them' (which would require a preposition like wəstä).
