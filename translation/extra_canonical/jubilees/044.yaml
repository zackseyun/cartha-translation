  rows:
  - verse: 1
    geez: ወተንሥአ፡ እስራኤል፡ እምካራን፡ እምቤቱ፡ በሠርቀ፡ ሣልስ፡ ወርኅ፡ ወሖረ፡ እንተ፡ ፍኖተ፡ ዐዘቅተ፡ መሐላ፡ ወሦዐ፡
      መሥዋዕተ፡ ለአምላከ፡ አቡሁ፡ ይስሐቅ፡ አመ፡ ሰቡዑ፡ ለዝ፡ ወርኅ።
  - verse: 2
    geez: ወተዘከረ፡ ያዕቆብ፡ ሕልመ፡ ዘርእየ፡ በቤቴል፡ ወፈርሀ፡ ወፈደ፡ ውስተ፡ ግብጽ።
  - verse: 3
    geez: ወእንዘ፡ ይሔሊ፡ ይልአክ፡ ለዮሴፍ፡ ከመ፡ ይምጻእ፡ ኀቤሁ፡ ወኢይረድ፡ ውእቱ፡ ወነበረ፡ ህየ፡ ሰቡዐ፡ ዕለተ፡ አመ፡
      ከመ፡ ይርአይ፡ ራእየ፡ እመ፡ ይከብር፡ ወእመ፡ ይወርድ።' ወገብረ፡ በዓለ፡' ማእረረ፡' ቀዳሚ፡' ፍሬ፡' እምሥርናይ፡ ብሉይ፡
      እስመ፡ አልቦ፡ ውስተ፡ ኵሉ፡ ምድረ፡ ከናአን፡ ምልአ፡ እደ፡ ምንተኒ፡' ዘርአ፡ ውስተ፡ ምድር፡ እስመ፡ ዐባር፡ ውእቱ፡
      ኮነ፡ 'ለኵሉ፡ አራዊት፡' ለእንስሳ፡ ወለአዕዋፍ፡ ወለሰብእኒ፡
  - verse: 4
    geez: ወአመ፡ 'ዐሡሩ፡ ወስዱሱ፡" አስተርአዮ፡ እግዚአብሔር፡ ወይቤሎ፡ ያዕቆብ፡ ያዕቆብ፡ ወይቤ፡ *ነየ፡ አነ፡' ወይቤሎ፡
      አነኩ፡ አምላከ፡ አቡከ፡ አምላከ፡" አብርሃም፡ ወይስሐቅ፡ ኢትፍራህ፡ ወሪደ፡ ግብጽ፡ እስመ፡ ውስተ፡ ዐቢይ፡ ሕዝብ፡ እሬስየከ፡"
      በህየ። አነ፡ እወርድ፡ ምስሌከ፡ ወአነ፡ አወጽአከ፡ ወበዛቲ፡" ምድር፡ ትትቀበር፡ ወዮሴፍ፡ ያነብር፡ እዴሁ፡ ዲበ፡ አዕይንቲከ፡
      ኢትፍራህ፡ ረድ፡ ውስተ፡ ግብጽ። ወተንሥኡ፡" ውሉዱ፡ ወውሉደ፡ ውሉዱ፡ ወአጽዐኑ፡ አበሆሙ፡ ወንዋዮሙ፡ ዲበ፡ ሰረገላት።
      ወተንሥአ፡ እስራኤል፡ እምዐዘቅተ፡ መሐላ፡ አመ፡ 'ዐሡሩ፡ ወስዱሱ፡' ለዝ፡ ወርኅ፡ ሣልስ፡ ወሖረ፡ ብሔረ፡ ግብጽ። ወፈነወ፡
      እስራኤል፡ ቅድሜሁ፡ ኀበ፡ ዮሴፍ፡ ወልዱ፡" ይሁዳሃ፡ ከመ፡ ያስተዳሉ፡" ምድረ፡ ጌሴም፡" እስመ፡ [ህየ፡] ይቤሎሙ፡" ዮሴፍ፡
      ለአኀዊሁ፡ ይምጽኡ፡ ከመ፡ ይኅድሩ፡ ህየ፡ ከመ፡ ይኩኑ፡ ቅሩበ፡" ዚአሁ። ወይእቲ'ኒ፡" ሠናይት፡ በምድረ፡ ግብጽ፡ ወቅርብት፡
      ኀቤሁ፡ ለኵሉ፡" ወለእንስሳሂ።" ወዝ፡ አስማቲሆሙ፡ ለውሉደ፡" ያዕቆብ፡ 'እለ፡ ሖሩ፡ ውስተ፡ ግብጽ፡ ምስለ፡ ያዕቆብ፡"
      አቡሆሙ። ሮቤል፡ በኵሩ፡ ለእስራኤል፡ ወዝ፡ አስማቲሆሙ፡ ለውሉዱ፡ ሄኖክ፡ ወፋሉስ፡ ወ*አስሮም፡" ወካራሚ፡" ፬።" ስምዖን፡
      ወውሉዱ፡ ወዝ፡ አስማቲሆሙ፡ ለውሉዱ፡ ኢያሙኤል፡ ወእያሜን፡" ወ*አዎት፡" ወአያኪም፡" ወ*ሳአር፡" ወ*ሳውል፡" ወልዳ፡
      ለ*ከናናዊት፡" ፮።" ሌዊ፡ ወውሉዱ፡" ወዝ፡ አስማቲሆሙ፡ ለውሉዱ፡ ጌድሶን፡" ወ*ቀዓት፡" ወ*ሜራሪ፡" አርባዕቱ።" ይሁዳ፡
      ወውሉዱ፡" ወዝ፡ አስማቲሆሙ፡ ለውሉዱ፡ ሴሎም፡" ወ*ፋሬስ፡" ወዛራ፡ ፪። ይሳኮር፡" ወውሉዱ፡ ወዝ፡ አስማቲሆሙ፡ ለውሉዱ፡
      ተላ፡ ወፉአ፡ ወኢያሱብ፡ ወሳመርም፡ ፬። ዘብሎን፡ ወውሉዱ፡ ወዘ፡ አስማቲሆሙ፡ ለውሉዱ፡ ሰሌር፡ ወኤሎን፡ ወኢያሌአል፡ ፫።
      ወእሉ፡ ውሉደ፡ ያዕቆብ፡ ወውሉዶሙ፡ እለ፡ ወለደት፡ ልያ፡ ለያዕቆብ፡ በመስጴጦምያ፡ ስድስቱ፡ ወአሐቲ፡ ዲና፡ እኅቶሙ፡ ወኵሉ፡
      ነፍስ፡ ዘውሉደ፡ ልያ፡ ወውሉዶሙ፡ እለ፡ ቦኡ፡ ምስለ፡ ያዕቆብ፡ አቡሆሙ፡ ውስተ፡ ግብፅ፡ ፴ወ፫፡ ወተስዓቱ፡ ወያዕቆብ፡
      አቡሆሙ፡ ምስሌሆሙ፡ ወኮኑ፡ ሰላሣ። ወውሉደ፡ ዘልፋ፡ ለአክታ፡ ለልያ፡ ብእሲቱ፡ ለያዕቆብ፡ ዘወለደት፡ ለያዕቆብ፡ ጋድሃ፡
      ወአሴርሃ። ወዝ፡ አስማተ፡ ውሉዶሙ፡ እለ፡ ቦኡ፡ ምስሌሁ፡ ውስተ፡ ግብፅ፤ ውሉደ፡ ጋድ፡ ሴፍዮን፡ ወአጋቲ፡ ወሱኒ፡ ወእስቦን፡
      . . . ወኤሪ፡ ወአሮዲ፡ ሰማረቱ። ወውሉደ፡ አሴር፡ ኢምና፡ ወይሱአ፡ (ወይሱኢ፡) ወበሪያ፡ ወሳራ፡ እኅቶሙ፡ አሐቲ፡ ፭።
      ኵሉ፡ ነፍስ፡ ፲ወ፮፡ ወኮነ፡ ኵሉ፡ ዘልያ፡ ፵ወ፱። ወውሉደ፡ ራሔል፡ ዘብእሲተ፡ ያዕቆብ፡ ዮሴፍ፡ ወብንያም። ወተወልዱ፡
      ለዮሴፍ፡ በግብፅ፡ ዘእንበለ፡ ይባእ፡ አቡሁ፡ ውስተ፡ ግብፅ፡ ዘወለደት፡ ሎቱ፡ አስኔት፡ ወለተ፡ ጶጢፋራ፡ ካህን፡ ዘኤልዮጶሊስ፡
      ምናሴ፡ ወኤፍሬም፡ ፪። ወውሉደ፡ ብንያም፡ ባላ፡ ወበኮር፡ ወአስቤል፡ ጌራ፡ ወንእማን፡ ወኤሒ፡ ወሮስ፡ ወሙጲም፡ ወሑጲም፡
      ወአርድ፡
  - verse: 26
    geez: ዐሠርቱ፡ ወአሐዱ። ወኮነ፡ ኵሉ፡ ነፍስ፡ ዘራሔል፡ ዐሠርቱ፡ ወአርባዕቱ። ወውሉደ፡ ባላ፡ ላእከታ፡
  - verse: 28
    geez: ለራሔል፡ ብእሲቱ፡ ለያዕቆብ፡ ዘወለደት፡ ለያዕቆብ፡ ዳን፡ ወንፍታሌም። ወዝ፡ አስማተ፡ ውሉዶሙ፡ እለ፡ ቦኡ፡ ምስሌሆሙ፡
      ውስተ፡ ግብጽ፤ ወውሉደ፡ ዳን፡ ሑሲም፡ ወሳሞን፡
  - verse: 29
    geez: ወአሱዲ፡ ወኢያክ፡ ወስሎሞን፡ ሲድስቱ። ወሞቱ፡ በዓመተ፡ ቦኡ፡ በግብጽ፡ ወተርፈ፡ ለዳን፡
  - verse: 30
    geez: ሑሲም፡ ባሕቲቱ። ወዝ፡ አስማቲሆሙ፡ ለውሉደ፡ ንፍታሌም፡ ኢያሲኤል፡ ወጉኒ፡
  - verse: 31
    geez: ወአስለር፡ ወስሎም፡ ወአው፡ ወሞቱ፡ አው፡ በግብጽ፡ ዘተወልደ፡ እምድኅረ፡ ዓመተ፡
  - verse: 32
    geez: ዐባር። ወኮኑ፡ ኵሎሙ፡ ነፍስ፡ ዘራሔል፡ ፳ወ፮። ወኵሉ፡ መንፈስ፡ ዘያዕቆብ፡ ዘቦአ፡ ውስተ፡ ግብጽ፡ ሰብዓ፡ መንፈስ፡
      እሉ፡ እንከ፡ ውሉዱ፡ ወውሉደ፡ ውሉዱ፡ ኵሎሙ፡ ሰብዓ፡ ወኃምስቱ፡ እለ፡
  - verse: 34
    geez: ሞቱ፡ በግብጽ፡ ዘእንበለ፡ ዮሴፍ፡ ወውሉደ፡ ፪፡ አልቦሙ። ወበምድረ፡ ከናአን፡ ሞቱ፡ በይሁዳ፡ ክልኤቱ፡ ደቂ፡ ዔር፡
      ወአውናን፡ ወአልቦሙ፡ ውሉደ፡ ወቀበርዎሙ፡ ደቂቀ፡ እስራኤል፡ ለእለ፡ ተሐጕሉ፡ ወተሠይሙ፡ ውስተ፡ ሰብዓ፡ ሕዝብ።
