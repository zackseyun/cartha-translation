translation:
  text: '1. And Israel set out from Haran, from his house, on the new moon of the
    third month, and he went by the way of the Well of the Oath, and he offered a
    sacrifice to the God of his father Isaac on the seventh of this month.

    2. And Jacob remembered the dream that he had seen at Bethel, and he feared to
    go down into Egypt.

    3. And while he was thinking of sending word to Joseph to come to him, and of
    not going down, he remained there seven days, to see a vision whether he should
    remain or whether he should go down. And he celebrated the feast of the firstfruits
    of the old grain, for in all the land of Canaan there was no handful of any seed
    in the land, because it had all become food for beasts and cattle and birds and
    also for men.

    4. And on the sixteenth the Lord appeared to him and said to him, “Jacob, Jacob.”
    And he said, “Here I am.”

    5. And he said to him, “I am the God of your father, the God of Abraham and Isaac.
    Do not fear; go down into Egypt, for there I will make you into a great nation.

    6. I will go down with you, and I will surely bring you up again. And in this
    land you will be buried, and Joseph will place his hand on your eyes. Do not fear;
    go down into Egypt.”

    7. And his sons and the sons of his sons rose up, and they loaded their father
    and their possessions on wagons. And Israel set out from the Well of the Oath
    on the sixteenth of this third month, and he went to the land of Egypt.

    8. And Israel sent Judah before him to his son Joseph, so that he might prepare
    the land of Goshen, because there Joseph had told his brothers to come and dwell,
    so that they might be near him. And it was good in the land of Egypt, and near
    to him, for all of them and for their livestock.

    9. And these are the names of the sons of Jacob who went into Egypt with Jacob
    their father: Reuben, the firstborn of Israel; and these are the names of his
    sons: Enoch, Pallu, Hezron, and Carmi—four.

    10. Simeon and his sons; and these are the names of his sons: Jemuel, Jamin, Ohad,
    Jachin, Zohar, and Saul, the son of a Canaanite woman—six.

    11. Levi and his sons; and these are the names of his sons: Gershon, Kohath, and
    Merari—three.

    12. Judah and his sons; and these are the names of his sons: Shelah, Perez, and
    Zerah—three.

    13. Issachar and his sons; and these are the names of his sons: Tola, Puvah, Iashub,
    and Shimron—four.

    14. Zebulun and his sons; and these are the names of his sons: Sered, Elon, and
    Jahleel—three.

    15. These are the sons of Jacob and their sons, whom Leah bore to Jacob in Mesopotamia:
    six, and Dinah their sister, one. And all the persons of Leah’s sons and their
    sons who came with Jacob their father into Egypt were thirty-three; and with Jacob
    their father among them, they were thirty-four.

    16. And the sons of Zilpah, Leah’s maidservant, whom she bore to Jacob: Gad and
    Asher. And these are the names of their sons who came with him into Egypt. The
    sons of Gad: Ziphion, Haggi, Shuni, Ezbon, Eri, Arodi, and Areli—seven.

    17. And the sons of Asher: Imnah, Ishvah, Beriah, and Serah their sister—four.
    All the persons were sixteen, and all Leah’s line was forty-nine.

    18. And the sons of Rachel, Jacob’s wife: Joseph and Benjamin.

    19. And sons were born to Joseph in Egypt before his father entered Egypt, whom
    Asenath, the daughter of Potiphar, priest of Heliopolis, bore to him: Manasseh
    and Ephraim—two.

    20. And the sons of Benjamin: Bela, Becher, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim,
    Huppim, and Ard—ten.

    21. And all the persons of Rachel were fourteen.

    22. And the sons of Bilhah, Rachel’s maidservant, whom she bore to Jacob: Dan
    and Naphtali.

    23. And these are the names of their sons who came with them into Egypt. And the
    sons of Dan: Hushim, Samon, Asudi, Iaka, and Solomon—five.

    24. And they died in the year in which they entered Egypt, and Hushim alone was
    left to Dan.

    25. And these are the names of the sons of Naphtali: Jahziel, Guni, Jezer, Shallum,
    and Iv.

    26. And Iv also died in Egypt after the year of the famine. And all the persons
    of Rachel were twenty-six.

    27. And all the persons of Jacob who entered Egypt were seventy persons. These
    are his sons and the sons of his sons, all of them seventy-five,

    28. five of whom died in Egypt, not counting Joseph and his two sons. And in the
    land of Canaan the two sons of Judah, Er and Onan, died, and they had no children.

    29. And the sons of Israel buried those who had been struck down, and they were
    reckoned within the seventy persons.'
  philosophy: optimal-equivalence
