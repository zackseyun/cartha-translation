lexical_decisions:
- source_word: ዐዘቅተ፡ መሐላ፡
  chosen: the Well of the Oath
  alternatives:
  - Beersheba
  - the pit/well of the oath
  rationale: The Ge'ez is transparent in meaning rather than simply a place-name transliteration.
    Rendering the sense preserves Jubilees' toponymic density while still alluding
    to Beersheba.
- source_word: ሠርቀ፡
  chosen: new moon
  alternatives:
  - first day
  - beginning
  rationale: In calendrical context with month language, the term most naturally marks
    the month's beginning/new moon. Jubilees is chronologically precise, so the calendrical
    nuance should be preserved.
- source_word: ማእረረ፡ ቀዳሚ፡ ፍሬ፡
  chosen: the feast of the firstfruits
  alternatives:
  - festival of first produce
  - feast of early produce
  rationale: The phrase clearly denotes a firstfruits observance. 'Feast' preserves
    cultic force and aligns with Jubilees' festival emphasis.
- source_word: እምሥርናይ፡ ብሉይ፡
  chosen: of the old grain
  alternatives:
  - from old wheat
  - of stored grain
  rationale: The wording contrasts with fresh produce unavailable in famine conditions.
    'Old grain' best captures grain from previous harvest stores.
- source_word: ነየ፡ አነ፡
  chosen: Here I am
  alternatives:
  - Behold, I am here
  - Yes, I am here
  rationale: This is the standard biblical response formula and preserves the solemn
    call narrative.
- source_word: እሬስየከ፡
  chosen: I will make you into
  alternatives:
  - I will establish you as
  - I will make of you
  rationale: The promise concerns becoming a great nation; this rendering is idiomatic
    while retaining divine agency.
- source_word: ትትቀበር
  chosen: you will be buried
  alternatives:
  - you will be entombed
  - you will be laid to rest
  rationale: A straightforward future passive best fits the burial promise tied to
    the land.
- source_word: ያነብር፡ እዴሁ፡ ዲበ፡ አዕይንቲከ፡
  chosen: will place his hand on your eyes
  alternatives:
  - will close your eyes
  - will lay his hand over your eyes
  rationale: The idiom is preserved literally because of its emotional and intertextual
    significance.
- source_word: ያስተዳሉ፡ ምድረ፡ ጌሴም፡
  chosen: prepare the land of Goshen
  alternatives:
  - direct him to Goshen
  - make arrangements in Goshen
  rationale: The verb suggests arranging or making ready. 'Prepare' keeps the practical
    sense without overinterpreting.
- source_word: ነፍስ / መንፈስ
  chosen: persons
  alternatives:
  - souls
  - lives
  rationale: In genealogical counting formulas, English 'persons' communicates the
    census sense naturally, while avoiding misleading modern connotations of 'souls'.
- source_word: ተሐጕሉ፡
  chosen: had been struck down
  alternatives:
  - had died
  - had been smitten
  - perished
  rationale: The verb appears stronger than a neutral 'died.' 'Struck down' preserves
    the force while remaining readable.
theological_decisions:
- issue: Divine name rendering in a Ge'ez witness
  chosen_reading: the Lord
  alternative_readings:
  - God
  - the LORD
  rationale: The chapter uses the standard Ge'ez divine designation in a narrative-theophany
    context. Following project doctrine, 'the Lord' is preferred as the default English
    rendering for covenantal divine address in running text.
  doctrine_reference: 'DOCTRINE.md: YHWH -> the LORD; titles translated'
- issue: Genealogical totals in the chapter
  chosen_reading: Preserve Jubilees' internal counting, including the seventy/seventy-five
    tension, with a footnote-worthy explanation
  alternative_readings:
  - Harmonize to Genesis' seventy
  - Emend the list to match MT/LXX totals
  rationale: Jubilees presents its own expanded genealogical accounting and then explains
    the total by noting deaths. The translation should preserve the tension rather
    than harmonize it away.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
