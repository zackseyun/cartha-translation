lexical_decisions:
- source_word: እዮቤልው
  chosen: jubilee
  alternatives:
  - jubilees
  lexicon: calendar term
  rationale: Preserves Jubilees' chronological framework as a singular numbered jubilee
    period, not a generic festive year.
- source_word: ሱባዔ
  chosen: week of years
  alternatives:
  - week
  - sabbath of years
  lexicon: calendar term
  rationale: In Jubilees this term marks a heptadic chronological unit; 'week of years'
    makes the calendrical sense explicit for modern readers.
- source_word: ነሥአ ሎቱ ብእሲተ
  chosen: took for himself a wife
  alternatives:
  - married a wife
  - took a woman
  lexicon: marital idiom
  rationale: Keeps the source idiom while remaining natural English.
- source_word: ጸውዐ ስሞ
  chosen: called his name
  alternatives:
  - named
  - gave the name
  lexicon: naming formula
  rationale: Retains the biblical naming formula characteristic of the work.
- source_word: ከሕተት ልብ
  chosen: the heart of those who worship them are sinning
  alternatives:
  - their hearts go astray
  - their hearts are deceived
  lexicon: difficult phrase
  rationale: The phrase is textually difficult; this rendering preserves the moral
    force of inward corruption tied to idolatry without over-paraphrasing.
- source_word: ያመልክዎሙ
  chosen: worship them
  alternatives:
  - serve them
  - revere them
  lexicon: religious verb
  rationale: In this idolatry context 'worship' best conveys cultic devotion.
- source_word: አርምም
  chosen: Be silent
  alternatives:
  - keep quiet
  - be still
  lexicon: imperative
  rationale: Direct and weighty, fitting the father's warning.
- source_word: ቤተ ጣዖታት
  chosen: house of the idols
  alternatives:
  - temple of idols
  - idol-house
  lexicon: cultic phrase
  rationale: A transparent rendering that preserves the concrete sense of a building
    devoted to idols.
- source_word: ያድኅኑ አማልክቲሆሙ
  chosen: save their gods
  alternatives:
  - rescue their idols
  - deliver their gods
  lexicon: ironic cultic expression
  rationale: Preserves the narrative irony that supposed gods need human rescue.
- source_word: ምድረ ሊባኖስ
  chosen: land of Lebanon
  alternatives:
  - Lebanon
  - the region of Lebanon
  lexicon: place name phrase
  rationale: Keeps the explicit 'land of' construction found in the source.
- source_word: ክልኤ ሱባዔ ዓመታት
  chosen: two weeks of years
  alternatives:
  - two weeks
  - fourteen years
  lexicon: calendar term
  rationale: Preserves Jubilees' schematic chronology rather than converting immediately
    into modern counting.
- source_word: በሠርቀ ወርኅ ሳብዕ
  chosen: at the beginning of the seventh month
  alternatives:
  - at the rising of the seventh month
  - when the seventh month began
  lexicon: temporal phrase
  rationale: Conveys the calendrical transition clearly while respecting the source's
    temporal marker.
theological_decisions:
- issue: Rendering the demonic agency in vv. 3-5
  chosen_reading: Mastema is presented as an active personal prince over subordinate
    spirits who promote idolatry, sin, corruption, and bloodshed.
  alternative_readings:
  - Mastema as a more abstract adversarial force
  - spirits as merely human impulses personified
  rationale: The Ge'ez wording speaks of a 'prince' who 'sent other spirits, those
    set under his hand,' which strongly supports personal supernatural agency in Jubilees'
    worldview.
  doctrine_reference: Preserve theological tension rather than flatten apocalyptic
    language.
- issue: Chronological terminology throughout the chapter
  chosen_reading: Retain 'jubilee,' 'week of years,' and related formulas in the main
    text.
  alternative_readings:
  - Convert all dates into plain year totals
  - smooth chronology into Genesis-style narrative time
  rationale: Jubilees' theology and structure are inseparable from its revealed calendar;
    flattening the terms would erase a major feature of the book.
  doctrine_reference: Consistency of key terms; preserve calendrical terminology carefully.
- issue: Identity of Sarai in v. 9
  chosen_reading: Translate literally as 'the daughter of his father' and leave the
    kinship tension visible.
  alternative_readings:
  - harmonize to 'daughter of his brother' or 'niece' from other traditions
  rationale: The Ge'ez here should not be harmonized away to Genesis traditions; the
    textual tension is better preserved and noted.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    tension rather than resolve it.
