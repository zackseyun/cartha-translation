translation:
  text: '[''1. In the thirty-fifth jubilee, in the third week of years, in its first
    year, Reu took for himself a wife, and her name was Ora, the daughter of Ur, the
    son of Kesed. And she bore him a son, and he called his name Seroh, in the seventh
    year of this week, in this jubilee.'', ''2. And the son grew, and his father taught
    him the investigations of the Chaldeans, to divine and to practice augury according
    to the signs of heaven.'', ''3. And in the days of Seroh there arose wars and
    all the sons of men turned to making graven images and carved images and unclean
    things, and evil spirits were helping them and leading them astray, so that they
    might commit transgression and uncleanness.'', ''4. And the prince Mastema exerted
    himself to do all this, and he sent other spirits, those set under his hand, to
    do every kind of error and sin and transgression, to corrupt and destroy and to
    shed blood upon the earth.'', ''5. For this reason Seroh called the name of his
    son Nahor, saying, “The prince Mastema has made us hostile to one another and
    has poured out all this blood on the earth because of the sins that it has taught
    us.”'', ''6. For those who make them and the heart of those who worship them are
    sinning. Do not worship them.” And his father said to him, “I also know it, my
    son, but what can I do for a people who have caused me to serve before them?'',
    ''7. And if I tell them the truth, they will kill me, for their souls cling to
    them so that they worship them.'', ''8. Be silent, my son, lest they kill you.”
    And he told'', ''9. this matter to his two brothers, and they were angry with
    him, and he kept silent. And in the fortieth jubilee, in the second week, in its
    seventh year, Abram took for himself a wife, and her name was Sarai, the daughter
    of his father, and she became his wife.'', ''10. And Aran his brother took for
    himself a wife in the third year of the third week, and she bore him a son in
    the seventh year of this week, and he called'', ''11. his name Lot. And Nahor
    his brother took for himself a wife. And in the sixtieth year of the life of Abram,'',
    ''12. that is, the fourth week, in its fourth year, Abram arose by night and burned
    the house of the idols, and he burned everything that was in the house, and there
    was no person who knew it.'', ''13. And they arose in the night and wanted to
    save their gods from the midst of the fire. And Aran ran'', ''14. to save them,
    and the fire blazed over him, and he was burned in the fire, and he died in Ur
    of the Chaldeans'', ''15. before Terah his father. And they buried him in Ur of
    the Chaldeans. And Terah went out from Ur of the Chaldeans, he and his sons, to
    go into the land of Lebanon and into the land of Canaan, and he settled in the
    land of Haran, and Abram lived with Terah his father in Haran'', ''16. for two
    weeks of years. And in the sixth week, in its fifth year, Abram sat up through
    the night at the beginning of the seventh month to observe the stars from evening
    until dawn, to see what would be the character of the year with respect to the
    rains, and he was there by himself as he sat and watched.'']'
  philosophy: optimal-equivalence
