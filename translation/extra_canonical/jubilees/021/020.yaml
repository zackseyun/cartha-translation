translation:
  text: And do not accept a bribe or a present for human blood; blood for blood is to be rendered before the Lord, the Most High God. And it will be a good protection for you, so that you may be kept from every evil and so that he may save you from every death. For I see, my son, all the works of the children of men, that all their sin and evil and all their deeds are uncleanness and abomination and defilement, and there is no righteousness with them. Take care not to walk in their ways and not to tread in their paths, and do not sin a sin leading to death before the Most High God, lest he hide his face from you and give you into the hand of your enemies and root you out from the earth, and your seed from under heaven, and destroy your name and your seed from all the earth. Turn away from all their deeds and from all their uncleanness, and keep the charge of the Most High God, and do his will and be upright in everything. And he will bless you in all your deeds, and he will raise up from you a plant of righteousness in all the earth throughout all generations of the earth. And my name and your name will not be forgotten under heaven forever. Go, my son, in peace. May the Most High God, my God and your God, strengthen you to do his will; and may he bless all your seed and the remnant of your seed for everlasting generations with every righteous blessing, so that you may become a blessing on all the earth.” And he went out from before him rejoicing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '20'
    text: The clause 'give you into the hand of your offense' is difficult. It may mean 'into the hand of your enemies' or preserve a corrupted reading. The translation stays close to the transmitted wording while signaling the warning of judgment.
    reason: textual_variant
  - marker: a
    text: Or 'gifts[20], and do not be partial in a case of'.
    reason: previous_rendering
  - marker: b
    text: Or 'memorial'.
    reason: previous_rendering
