  category: missing_nuance
  from: And do not eat it.
  to: And do not eat it at all.
  rationale: The Ge'ez includes the particle እንከ (ʾənka), which in negative commands often means "at all" or "anymore". Adding this captures the emphatic nature of the prohibition in the source text.
