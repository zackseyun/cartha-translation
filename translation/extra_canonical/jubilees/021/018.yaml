  category: mistranslation
  from: take care to cover it with dust in the earth.
  to: take great care to cover it in the earth.
  rationale: The Ge'ez text contains the adverb ጥቀ (ṭəqa, "exceedingly, very much"), which modifies the second "take care" (ተዐቀብ). The draft misses this and incorrectly inserts "with dust", which is absent from the Ge'ez (ውስተ፡ ምድር simply means "in the earth/ground"). The addition of "with dust" is likely an AI harmonization with Leviticus 17:13.
- timestamp: '2026-04-28T09:36:31Z'
