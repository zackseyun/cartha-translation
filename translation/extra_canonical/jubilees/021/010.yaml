translation:
  text: and with its drink offering, for a pleasing aroma, a grain offering to the Lord. And eat its flesh on that day and on the second day, and do not let the sun go down on it on the second day until it is eaten, and do not leave any of it for the third day, because it is not acceptable, because it is a profane thing, and it must not be eaten; and all who eat it will bear their sin. For thus I found written in the book of my forefathers, the former ones, and in the words of Enoch and in the words of Noah.
