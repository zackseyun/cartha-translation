  rows:
  - verse: 1
    geez: ወበዓመት፡ አሐዱ፡ ዘ*ሱባዔ፡ ቀዳሚ፡ በዘ፡ ፶ወ፰ እዮቤልዉ፡ ተመይጠ፡ አብርሃም፡ ወኀደረ፡ አንጻረ፡ ኬብሮን፡ ዛቲ፡
      ይእቲ፡ ቀርያታርቦቅ፡ ካልእ፡ ሱባዔ፡ ዓመት።
  - verse: 2
    geez: ወበዓመት፡ ቀዳሚ፡ ዘሱባዔ፡ ሣልስ፡ ዘዝእዮቤልው፡ ተፈጸመ፡ መዋዕለ፡ *ሕይወታ፡ ሳራ፡' ወሞተት፡ በኬብሮን።
  - verse: 3
    geez: ወሖረ፡ አብርሃም፡ ከመ፡ ይብክያ፡' ወይቅበራ፡ ወናዝከሮ፡ እመ፡ ይትነገሥ፡ መንፈሱ፡ ወእ*ይት
  - verse: 4
    geez: አኮተል፡' በቃለ፡ አፉሁ፡ ወተረክበ፡ በዝኒ፡ ዕጉሰ፡ ወእተህውከ። እስመ፡ በትዕግሥተ፡ መንፈስ፡
  - verse: 5
    geez: ተናገረ፡ ምስለ፡ ውሉደ፡ ኬጥ፡' ከመ፡ የሀብዎ፡ መካነ፡ ከመ፡ ይቅበር፡ ቤድኖ፡ ውስቴቱ። ወእግዚአብሔር፡ ወሀቦ፡
      ሞገሰ፡ ሎቱ፡ በቅድመ፡ ኵሎሙ፡ እለ፡ ይሬእይዎ፡ ወአስተብቍዐ፡ በየውሀት፡ እምኀበ፡ ውሉደ፡ ኬጥ፡' ወወሀብዎ፡ ምድረ፡ ባዓት፡'
      ዘካዕበት፡ ዘአንጻረ፡ መምብሬም፡' *እንተ፡
  - verse: 6
    geez: ይእቲ፡' ኬብሮን፡ በ*አርባዕቱ፡ ምእት፡' ብሩር። ወእሙንቱ፡' ያስተበቍዕዎ፡ እንዘ፡ ይብሉ፡ ንሁብከ፡'° በከ፡ ወአነሥአ፡"
      እምእዴሆሙ፡ በከ፡ እስመ፡ ወሀቦ፡ ሤጦ፡ ለመካን፡ ብሩረ፡ ፍጹመ፡
  - verse: 7
    geez: ወሰገደ፡ ሎሙ፡ ካዕበ፡ ወአምዝ፡ ቀበራ፡ ቤድኖ፡ ውስተ፡ ባዓት፡' ዘካዕበት። ወኮነ፡ ኵሉ፡ መዋዕለ፡ ሕይወታ፡ ለሳራ፡
      ምእት፡ ወዕሥራ፡ ወሰብዓቱ፡ *አሉ፡ ክልኤ፡" ኢዮቤልዉ፡" ወአርባዕቱ፡ ሱባዔ፡
  - verse: 8
    geez: ወዓመት፡ አሐዱ፤ ዝንቱ፡ መዋዕለ፡" ሕይወታ፡ ለሳራ። ዝመከራ፡" *ዓሥር፡ በዘተመከረ፡
  - verse: 9
    geez: ቦቱ፡" አብርሃም፡ ወተረክበ፡ ምእመነ፡ ዕጉሠ፡ መንፈስ። ወአይቤ፡ ቃለ፡ በእንተ፡ *ንባብ፡ ዘበምድር፡" ዘይቤ፡ እግዚአብሔር፡
      የሀቦ፡" ኪያሃ፡ ሎቱ፡ ወለዘርኡ፡ እምድኅሬሁ፡ ወመካነ፡ አስተብቍዐ፡ በህየ፡ ከመ፡ ይቅበር፡ ቤድኖ፡ እስመ፡ ተረክበ፡ መሃይምነ፡"
      ወተጽሕፈ፡ ዐርከ፡
  - verse: 10
    geez: እግዚአብሔር፡ ውስተ፡ ጽላተ፡ ሰማይ። ወበዓመት፡ ራብዕ፡" ሎቱ፡ ነሥአ፡ ለይስሐቅ፡ ወልዱ፡ ብእሲተ፡ ወስማ፡ ርብቃ፡
      ወለተ፡ ባቱኤል፡ ወልደ፡ ናኮር፡ እኅወ፡ አብርሃም፡ እኅተ፡" ላባ፡ ወ*ወለተ፡ ለባቱኤል፡ ወባቱኤል፡" ወልደ፡ ሜልካ፡ ዘብእሲተ፡
      ናኮር፡ እኅወ፡ አብርሃም።
  - verse: 11
    geez: ወአብርሃም፡ ነሥአ፡ ሎቱ፡ ብእሲተ፡ ሣልስተ፡" ወስማ፡ ኬጡራ፡ እምነ፡" አዋልደ፡" ልደ፡ ቤቱ፡
  - verse: 12
    geez: እስመ፡" ሞተት፡ አጋር፡ እምቅድመ፡ ሳራ። ወወለደት፡ ሎቱ፡ ውሉደ፡ ስድስተ፡ ዝንበርሃ፡" ወ*ያክስንሃ፡" ወማዳይሃ፡
      ወማዳንሃ፡ ወ*ኢየዘቦቅሃ፡" ወሱሂያሃ፡" በክልኤ፡ ሱባዔ፡ ዓመት።
  - verse: 13
    geez: ወበሱባዔ፡ ሳድስ፡ በክልኤ፡ ዓመት፡ ወለደት፡ ርብቃ፡ ለይስሐቅ፡ ክልኤ፡ ደቂቀ፡" ያዕቆብሃ፡ ወዔሳውሃ፡ ወያዕቆብሰ፡
      ልሙጽ፡" ወሬትዕ፡" ወዔሳው፡" ውእቱ፡ ብእሲ፡" ድሩክ፡" ወ*ሐቃላዊ፡
  - verse: 14
    geez: ወጸጕር፡¹ ወያዕቆብ፡² ኀደረ፡ ውስተ፡ ምጽላላት። ወልህቀ፡ ወሬዛ፡³ ወተምህረ፡⁴ ያዕቆብ፡ መጽሐፈ፡ ወዔሳውሰ፡ ኢተምህረ፡
      እስመ፡ *ብእሲ፡ ሐቃላዊ፡⁵ ውእቱ፡ ወነዓዊ፡ ወተምህረ፡ ፀብአ፡
  - verse: 15
    geez: '*ወኵሉ፡ ግብሩ፡ ድሩክ።⁶ ወያፈቅሮ፡ *ያዕቆብሃ፡ አብርሃም፡⁷ ወይስሐቅ፡ ዔሳው*ሃ።⁸ ወርእየ፡ አብርሃም፡ ግብሮ፡
      ለዔሳው፡ ወአእመረ፡ ከመ፡ ለያዕቆብ፡ ይጼዋዕ፡⁹ ሎቱ፡ ስም፡ ወዘርእ፡ ወጸውዓ፡ ለርብቃ፡ ወአዘዘ፡ በእንተ፡ ያዕቆብ፡ *እስመ፡
      አእመረ፡ ከመ፡ ታፈቅሮ፡ ለያዕቆብ፡¹⁰ ፈድፋደ፡'
  - verse: 17
    geez: እም*፡¹¹ ዔሳው። ወይቤላ፡ ወለቲየ፡ ዐቀቢ፡¹² *ወልድየ፡ ያዕቆብሃ፡¹ እስመ፡ ውእቱ፡ ይከውን፡ ህየንቴየ፡ ዲበ፡
      ምድር፡ ወለበረከት፡ በማእከለ፡ ውሉደ፡ ሰብእ፡ ወለኵሉ፡ ዘርኡ¹³ ሴም፡
  - verse: 18
    geez: ለትምክሕት።¹⁴ እስመ፡ አእምር፡¹⁵ ከመ፡ ኪያሁ፡ ያኀሪ፡¹⁶ *እግዚአብሔር፡ ሎቱ፡¹⁷ ለሕዝብ፡
  - verse: 19
    geez: ዘይቀውም፡¹⁸ እምኵሎሙ፡ አሕዛብ፡¹⁹ እለ፡ ዲበ፡ ገጸ፡ ምድር። ወናሁ፡ ይስሐቅ፡ ወልድየ፡
  - verse: 20
    geez: ያፈቅሮ፡ ለዔሳው፡ እም*፡ ያዕቆብ፡ ወአን፡ እሬእየኪ፡ መፍቀሪተ፡ ጽድቅ፡²⁰ ያዕቆብሃ። ወስኪ፡ ፃዲ፡ አሡንዮ፡²¹
      ላዕሌሁ፡ *ወይኩና፡ አዕይንትኪ፡ ላዕሌሁ፡¹ ለፍቅር፡²² እስመ፡ ውእቱ፡ ይከውን፡
  - verse: 21
    geez: ለበረከት፡ ዲበ፡ ምድር፡ እምይእዜ፡ ወእስከ፡ ኵሉ፡ *ትውልደ፡ ምድር።²³ ይጽንዓ፡²⁴ እደዊኪ፡ ወ*ትትፈሣሕ፡²⁵
      ልብኪ፡²⁶ በወልድኪ፡ ያዕቆብ፡ እስመ፡ ኪያሁ፡ አፍቀርኩ፡²⁷ ፈድፋደ፡¹ እምኵሎሙ፡
  - verse: 22
    geez: ውሉድ*የ፡² እስከ፡ ለዓለም፡ ይትባረክ፡ ወዘርኡ፡ *ይከውን፡ ዘይመልእ፡²⁸ ኵላ፡ ምድረ። እመ፡
  - verse: 23
    geez: ይክል፡ ሰብእ፡ ኈልቆ፡ ኖላ፡ ምድር፡²⁹ ይትኌለቍ፡³⁰ ዘርኡሂ። ወኵሉን፡³¹ በረከት፡ እለ፡ ባረከኒ፡
  - verse: 24
    geez: እግዚአብሔር፡ ኪያየ፡ ወዘርእየ፡ ለያዕቆብ፡ ወለዘርኡ፡ ይኩን፡³² ኵሎ፡ መዋዕለ። ወበዘርኡ፡ ይትባረክ፡³³ ስምየ፡
      ወስመ፡ አበዊየ፡³⁴ ሴም፡ ወኖኅ፡ ወሄኖክ፡³⁵ ወመላልኤል፡ *ወኤኖስ፡ ወሴት፡³⁶
  - verse: 25
    geez: ወአዳም። ወእሙንቱ፡ ይኩኑ፡ ለሳርረ፡ ሰማይ፡ *ወለአጽንዖ፡ ምድር፡³⁷ ወለኀድሶ፡ ኵሉ፡
  - verse: 26
    geez: ብርሃናት፡ ዘዲበ፡³⁸ ምጽናዓት። ወጸውዖ፡ ለያዕቆብ፡ በቅድመ፡ አዕይንቲሃ፡ ለርብቃ፡ እሙ፡
  - verse: 27
    geez: ወሰዐሞ፡ ወባረኮ፡ ወይቤ፡ *ያዕቆብ፡ ወልድየ፡³⁹ ፍቁር፡ ዘ*አፍቀረት፡⁴⁰ ነፍስየ፡ ይባርከ፡⁴¹ አምላክ፡ እመልዕልተ፡
      ምጽናዓት፡ ወየሀብከ፡ ኵሎን፡⁴² በረከታተ፡ እለ፡ ባረኮ፡ ለአዳም፡ ወሄኖክሃ፡ ወኖኅሃ፡¹ ወሎምነ፡ ወኵሎ፡ ዘመጠነ፡ ተናገረኒ፡
      ወኵሎ፡ ዘመጠነ፡ ይቤ፡ የሀበኒ፡ ያጥጋእ፡ ላዕሌከ፡ ወላዕለ፡ ዘርእከ፡ እስከ፡ ለዓለም፡ በከመ፡ መዋዕለ፡ ሰማይ፡ ዲበ፡
      ምድር። ወኢይመብኡ፡ ላዕሌከ፡ ወላዕለ፡ ዘርእከ፡ መናፍስተ፡ መስቴማ፡ ከመ፡ ያርኅቁከ፡ እምድኅረ፡ እግዚአብሔር፡ ዘውእቱ፡
      አምላክከ፡ እምይእዜ፡ ወእስከ፡ ለዓለም። ወይኩንከ፡ እግዚአብሔር፡ አምላከ፡ አበ፡ ወአንተ'ሂ፡ ወልደ፡ በኵረ፡ ወለሕዝብ፡
