translation:
  text: '1. And in the first year of the first week in the forty-eighth jubilee, Abraham
    returned and dwelt opposite Hebron—that is, Kiriath-arba—for two weeks of years.

    2. And in the first year of the third week of this jubilee, the days of Sarah’s
    life were completed, and she died in Hebron.

    3. And Abraham went to mourn for her and to weep for her, and to remember her
    with restraint of spirit, and he did not become violent in the speech of his mouth.

    4. And he was composed in this patience of spirit, and he spoke with the sons
    of Heth

    5. so that they might give him a place in which to bury his dead there. And the
    LORD gave him favor before all who saw him, and he entreated courteously from
    the sons of Heth, and they gave him the land of the double cave which is opposite
    Mamre—

    6. that is, Hebron—for four hundred pieces of silver. And they urged him, saying,
    “We will give it to you for nothing,” but he did not take it from their hands,
    because he gave the full price of silver for the place.

    7. And he bowed down to them, and after this he buried his dead in the double
    cave. And all the days of Sarah’s life were one hundred and twenty-seven years:
    two jubilees and four weeks of years

    8. and one year. These were the days of Sarah’s life. This was the tenth trial
    by which Abraham was tried,

    9. and he was found faithful, patient in spirit. And he did not speak a word concerning
    the report about the land, how the LORD had said he would give it to him and to
    his seed after him, yet he asked there for a place to bury his dead, because he
    was found faithful, and it was written down for him as a friend of the LORD on
    the heavenly tablets.

    10. And in the fourth year of it he took a wife for Isaac his son, and her name
    was Rebekah, daughter of Bethuel, son of Nahor, Abraham’s brother, sister of Laban,
    and granddaughter of Milcah, who was the wife of Nahor, Abraham’s brother.

    11. And Abraham took for himself a third wife, and her name was Keturah, from
    among the daughters of his household servants,

    12. for Hagar had died before Sarah. And she bore him six sons: Zimran, Jokshan,
    Medan, Midian, Ishbak, and Shuah, in two weeks of years.

    13. And in the sixth week, in its second year, Rebekah bore to Isaac two sons,
    Jacob and Esau. And Jacob was smooth and upright, but Esau was a harsh man, a
    man of the field,

    14. and hairy. And Jacob dwelt in tents. And the youths grew, and Jacob learned
    writing, but Esau did not learn, because he was a man of the field and a hunter,
    and he learned war,

    15. and all his deeds were fierce. And Abraham loved Jacob, but Isaac loved Esau.
    And Abraham saw the deeds of Esau, and he knew that in Jacob his name and seed
    would be called. And he called Rebekah and gave command concerning Jacob, because
    he knew that she loved Jacob much more

    17. than Esau. And he said to her, “My daughter, keep my son Jacob, for he will
    be in my place on the earth, and for a blessing in the midst of the sons of men,
    and for the glory of all the seed of Shem.

    18. For I know that the LORD will choose him for himself as a people

    19. who will stand out from among all the nations that are on the face of the
    earth. And now Isaac my son

    20. loves Esau more than Jacob, but I see your righteous affection for Jacob.
    And continue still to show him kindness, and let your eyes be upon him in love,
    because he will be a blessing on the earth from now and through all the generations
    of the earth.

    21. Let your hands be strong, and let your heart rejoice in your son Jacob, because
    I have loved him far more than all

    22. my sons. Forever let him be blessed, and let his seed be one that fills the
    whole earth.

    23. If a man can count the sand of the earth, then his seed also will be counted.
    And all the blessings with which the LORD blessed me

    24. and my seed shall belong to Jacob and to his seed always. And in his seed
    my name and the name of my fathers—Shem and Noah and Enoch and Mahalalel and Enosh
    and Seth

    25. and Adam—shall be blessed. And they shall serve to support heaven and to strengthen
    the earth and to renew all

    26. the lights that are above the firmament.” And he called Jacob before the eyes
    of Rebekah his mother,

    27. and he kissed him and blessed him and said, “Jacob, my beloved son, whom my
    soul loves, may God Most High bless you and give you all the blessings with which
    he blessed Adam and Enoch and Noah; and whatever he has spoken to me and whatever
    he said he would give me, may it cling to you and to your seed forever, according
    to the days of heaven above the earth. And may the spirits of Mastema not rule
    over you or over your seed, to turn you away from the LORD, who is your God from
    now and forever. And may the LORD be a father to you, and you be his firstborn
    son and to the people always. Go, my son, in peace.” And the two of them went
    out together from Abraham. And Rebekah loved Jacob with all her heart and with
    all her soul, much more than Esau, but Isaac loved Esau much more than Jacob.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: 'The chapter numbering in the source rows is slightly irregular: the material
      labeled verse 16 is absent, and the final long blessing is labeled 27. The translation
      preserves the supplied numbering rather than renumbering the chapter.'
    reason: segmentation_note
  - marker: '2'
    text: '''The double cave'' reflects the Ge''ez wording literally. It corresponds
      conceptually to the burial cave known from Genesis, but the translation avoids
      importing the familiar place-name into the main text where the Ethiopic phrase
      is descriptive.'
    reason: lexical_alternative
  - marker: '3'
    text: Verse 8 likely means that Sarah’s death constituted the tenth test by which
      Abraham was tested. The syntax is compressed in the source, so the English makes
      the implied connection explicit.
    reason: segmentation_note
  - marker: '4'
    text: In verse 9, 'the report about the land' is textually difficult. The sense
      appears to be that Abraham did not complain about the promise of the land even
      though he had to request a burial place within it.
    reason: textual_variant
  - marker: '5'
    text: 'Verses 24-26 use elevated cosmological language: ''support heaven,'' ''strengthen
      the earth,'' and ''renew all the lights above the firmament.'' This is preserved
      as-is rather than reduced to a mere metaphor for prosperity.'
    reason: cultural_note
lexical_decisions:
- source_word: እዮቤልዉ
  chosen: jubilee
  alternatives:
  - jubilees cycle
  rationale: Preserved the technical calendrical term central to Jubilees rather than
    smoothing into a generic date formula.
- source_word: ሱባዔ
  chosen: week of years
  alternatives:
  - week
  - sabbath of years
  rationale: In Jubilees chronology this denotes a heptad of years, not a seven-day
    week; rendered explicitly to preserve calendrical precision.
- source_word: ባዓት ዘካዕበት
  chosen: the double cave
  alternatives:
  - Machpelah
  - the cave of doubling
  rationale: The Ge'ez expression is transparent and should not be replaced automatically
    by the Genesis toponym; a footnote could connect it conceptually to Machpelah.
- source_word: መሃይምነ
  chosen: faithful
  alternatives:
  - believing
  - trustworthy
  rationale: Matches the commendatory sense in context and aligns with the theological
    emphasis on Abraham’s tested fidelity.
- source_word: ዐርከ እግዚአብሔር
  chosen: a friend of the LORD
  alternatives:
  - the friend of the LORD
  - God’s friend
  rationale: Preserves the relational title and its covenantal significance.
- source_word: ጽላተ ሰማይ
  chosen: heavenly tablets
  alternatives:
  - tablets of heaven
  rationale: Standard transparent rendering for Jubilees’ celestial record motif.
- source_word: መናፍስተ መስቴማ
  chosen: the spirits of Mastema
  alternatives:
  - Mastema’s spirits
  - spirits of hostility
  rationale: Preserves the proper name and Jubilees’ demonological framework rather
    than reducing it to an abstract force.
theological_decisions:
- issue: Abraham’s response to Sarah’s death in vv.3-4
  chosen_reading: He mourns and weeps, yet remains restrained and does not speak rashly
    or violently.
  alternative_readings:
  - He did not cry aloud
  - He did not sin with his lips
  rationale: The Ge'ez emphasizes controlled speech and patience of spirit; the translation
    preserves emotional grief without implying stoic absence of mourning.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Cosmological function of the patriarchal name/seed in vv.24-26
  chosen_reading: The patriarchal line is portrayed as participating in cosmic stability
    and renewal.
  alternative_readings:
  - Their names are invoked for blessing only
  - The seed metaphorically upholds covenant order
  rationale: The Ge'ez uses strong cosmological language about supporting heaven,
    strengthening earth, and renewing the lights; this should be preserved rather
    than allegorized away.
  doctrine_reference: Preserve theological tension rather than resolve it.
