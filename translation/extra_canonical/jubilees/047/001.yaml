  from: in the seventh week of the seventh year
  to: in the seventh week, in the seventh year
  rationale: In Jubilees' chronological system, a 'week' is a heptad (seven years). Translating 'of the seventh year' implies a 7-day week within a single year, reversing the hierarchy of units (Jubilee > Week > Year). The Ge'ez 'za' here specifies the year within the week, and should be rendered 'in the seventh week, in the seventh year' to maintain the correct chronological formula and match the syntax of the second date in the verse.
