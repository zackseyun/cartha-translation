  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/047/009.job-77040.json
  category: mistranslation
  from: your sister took you and gave you
  to: when you had grown up, they brought you
  rationale: The Ge'ez `ልሂቀከ፡ ወሰዱከ` (lehiqaka wasaduka) means 'when you had grown up, they brought you.' The draft hallucinates the involvement of the sister here and completely misses the verb for growing up (`ልሂቀከ`).
