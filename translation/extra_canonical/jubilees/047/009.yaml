- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/047/009.job-77040.json
  category: mistranslation
  from: And he protected and sheltered you.
  to: And wages were paid, and she nursed you.
  rationale: The Ge'ez `ዐስበ፡ ወሐፀነተከ` (ʿasba wa-ḥaḍanataka) means 'wages were paid [or he/she paid wages], and she nursed you' (referencing Exodus 2:9). The draft mistranslates `ዐስበ` (to pay wages) and misses the feminine subject of `ሐፀነተከ` (she nursed/raised you).
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
