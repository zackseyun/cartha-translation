translation:
  text: 'every man and woman in Israel who defiles his sanctuary. Because of this I have commanded you, saying, "Bear this testimony over Israel: see what happened to Shechem and to his sons, how they were given into the hand of the two sons of Jacob, and they killed them in agony, and it was reckoned to them as righteousness, and it was written down for them as righteousness."'
