- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/032/017.job-76761.json
  category: mistranslation
  from: with the sword
  to: in agony
  rationale: The Ge'ez word ፃዕር (ṣā'er) means 'pain', 'agony', or 'torment', not 'sword'. The text refers to the Shechemites being killed while incapacitated by the pain of circumcision (cf. Gen 34:25). The previous revision hallucinated the meaning 'sword' to fit the context of killing, but this loses the specific historical/textual detail.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/032/017.job-76761.json
  category: lexical
  from: Make this report heard
  to: Bear this testimony
  rationale: The Ge'ez phrase አስምዕ፡ ዛተ፡ ስምዐ (asme' zāta sem'a) uses a cognate verb and noun. While the verb is causative ('cause to hear'), the noun means 'testimony' or 'witness'. Translating it as 'report' loses the legal and covenantal weight of the term.
