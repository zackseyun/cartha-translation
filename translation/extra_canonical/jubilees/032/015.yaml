  category: mistranslation
  from: from your daughters
  to: from his daughters
  rationale: The Ge'ez word 'እምአዋልዲሁ' (em-'awalidihu) means 'from his daughters' (third-person masculine singular suffix), not 'from your daughters'.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/032/015.job-76759.json
  category: mistranslation
  from: above the daughters of the nations.
  to: the daughters of the nations.
  rationale: The Ge'ez text simply reads 'አዋልደ፡ አሕዛብ፡' (daughters of the nations). There is no preposition meaning 'above' in the source text here.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/032/015.job-76759.json
  category: missing_nuance
  from: plague upon plague shall be upon him
  to: for it is plague upon plague
  rationale: The Ge'ez text includes 'እስመ' (esma), meaning 'for' or 'because', and 'ውእቱ' (we'etu), meaning 'it is'. The draft omits the causal conjunction and adds 'shall be upon him'.
