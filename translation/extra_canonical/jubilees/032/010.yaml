translation:
  text: Whoever defiles shall surely die, and he shall be stoned with stones. And there is no limit of days for this law, and no remission or any atonement, except that the man be rooted out who has defiled his daughter in the midst of all Israel, because from his seed he has given to Molech and has acted wickedly by defiling it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'except that they root out the man'.
    reason: previous_rendering
  - marker: b
    text: Or 'by defiling her'.
    reason: previous_rendering
