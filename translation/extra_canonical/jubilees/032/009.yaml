translation:
  text: This is a testimony of joy like this joy. And formerly they used to call the land of Gilead the land of the Rephaim, because it is the land of the Rephaim; and Rephaim were born there, giants whose height was ten cubits, and nine cubits, and eight cubits, and down to seven cubits.
