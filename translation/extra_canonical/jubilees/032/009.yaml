  from: nine cubits, and eight cubits, and down to seven cubits
  to: ten cubits, and nine cubits, and eight cubits, and down to seven cubits
  rationale: 'The Ge''ez text lists four measurements: ዐሥር (10, mis-OCR''d in the source text as ፱ሥር because the letter ዐ resembles the numeral ፱), ትስዕ (9), ስምን (8), and ስብዕ (7). The current translation misses the first measurement (ten) and skips one of the numbers.'
