translation:
  text: The LORD will put it in their mouths, that they may bless all the seed of the beloved. Your mother called you Levi, and in truth she called you so that you would be joined to God and be a companion to all the sons of Jacob. Let his table be yours, and you and your sons shall eat, and for all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For he has called you from among them, like Levi, and in truth he has called you'.
    reason: previous_rendering
  - marker: b
    text: Or 'to draw near to the LORD, that you may be his, and that all the sons of Jacob may eat at your table'.
    reason: previous_rendering
