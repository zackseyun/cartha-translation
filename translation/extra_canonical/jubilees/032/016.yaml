- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/032/016.job-76760.json
  category: mistranslation
  from: For he has called you from among them, like Levi, and in truth he has called you
  to: Your mother called you Levi, and in truth she called you so
  rationale: The Ge'ez 'እምከ' means 'your mother', referring directly to Leah naming Levi (Genesis 29:34). The translation 'from among them' is a severe mistranslation. The text is explicitly about the naming of Levi, not calling him 'like Levi' from among others.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/032/016.job-76760.json
  category: mistranslation
  from: to draw near to the LORD, that you may be his, and that all the sons of Jacob may eat at your table
  to: that you would be joined to God and be a companion to all the sons of Jacob. Let his table be yours
  rationale: The translation misses the etymological play on Levi's name ('joined', Ge'ez 'አጸቁ'). It also completely skips 'ወሱታፌ' (and a companion/partner) and mistranslates 'ማእዳ፡ ለከ፡ ትኩን' (let his table be yours) as 'may eat at your table', conflating two distinct clauses.
