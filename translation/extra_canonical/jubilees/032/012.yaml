  from: it was lacking, and there remained to him no more than twenty-six years from this, the twenty-seventh year, to the year that is coming. For in its year seed is eaten until the days of the harvest of the twenty-eighth year, and wine until the year of
  to: It has been ordained, and there is no keeping it over from this year to the year that is coming. For in its year the seed is eaten until the days of the gathering of the seed of the year, and wine until the time of
  rationale: The Ge'ez text contains Ethiopic numerals (፳፮=26, ፳፯=27, ፳፰=28) which are actually footnote markers from the Charles 1895 printed edition, not part of the biblical text. The draft mistakenly translated these as years. Furthermore, `ተኀርየ` (taḫarya) means 'it is chosen/ordained', not 'it was lacking', and `ወአልቦ ለአትርፎ እምኔሁ` means 'and there is no leaving over of it', not 'there remained to him no more than'. Finally, `አመ` at the end means 'the time/days of', not 'the year of'.
