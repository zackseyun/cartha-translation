translation:
  text: and so are your children through all the ages. And may the LORD give to you and to your seed greatness of heart for his glory; and may he bring you and your seed near to him from all flesh, so that they may minister in his sanctuary like the angels of the presence and like the holy ones. Like them shall the seed of your children be for glory and greatness.
