translation:
  text: 'Therefore thus it is ordained in Israel concerning the defilement of an Israelite virgin: and if there is a man in Israel who wishes to give his daughter, or even his sister, to any man from the seed of the nations, he shall surely die, and they shall stone him with stones, because he has committed disgrace in Israel; and the woman'
