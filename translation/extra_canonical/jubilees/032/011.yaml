  category: lexical
  from: fully completed their sins as they did
  to: completed all their sins
  rationale: The Ge'ez text reads 'za-faṣama ḫaṭāw'ihomu kʷəlo' (who has completed all their sins). The draft's 'fully... as they did' is an interpretive expansion that obscures the literal presence of 'all' (kʷəlo).
