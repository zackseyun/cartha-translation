translation:
  text: And he went up into heaven[21]. And he saw in a vision of the night, and behold, an angel was descending from heaven, and in his hands were tablets, and he gave them to Jacob, and he read them and learned everything written in them that would happen to him and to his children through all the ages. And he showed him everything written on the tablets and said to him, "Do not build this place, and do not make it an eternal sanctuary, and do not dwell here, for this is not the place. Go to the house of Abraham your father, and dwell with Isaac your father until the day of your father's death. For in Egypt you will die in peace, and in this land you will be buried in honor in the tomb of your fathers, with Abraham and Isaac. Do not fear, for as you have seen and read, so shall everything be. And you also, write down everything as you have seen and read." And Jacob said, "Lord, how shall I remember everything that I have read and seen?" And he said to him, "I will make you remember everything." And he went up from him, and he awoke from his sleep and remembered everything that he had read and seen, and he wrote down all the matters that he had read and seen[21]. And there he celebrated one additional day, and he observed it according to all that they sacrifice in former days, and he called its name Addition, because that day had been added, and they had formerly called them a feast. And thus he showed that it should be so, and it is written on the heavenly tablets concerning this, that it was revealed to him that he should observe it and add it to the seven days of the feast. And its name was called Addition, because it is added to the feast days according to the number of the days of the year. And on the night of the thirteenth of this month Deborah, Rebekah's nurse, died, and they buried her below the city, under the oak by the river, and they called the name of that place Deborah's River, and the oak, the Oak of the Mourning of Deborah. And Rebekah went and entered her house to Isaac her father, and Jacob sent by her hand rams and sheep, that she might bring them to his father's house. And he said to her, "Let us go to every place, and do not travel with you." And Jacob blessed the God of Isaac his father and the God of Abraham, the father of his father, and he arose and loaded his wives and his children and took all his possessions and crossed the river and arrived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '21'
    text: The feast-name rendered “Addition” translates a term meaning something added or appended. The passage explains an extra festival day added to the seven days of the feast.
    reason: cultural_note
  - marker: '21'
    text: Several clauses in this long verse are syntactically difficult, especially around Rebekah’s movements and Jacob’s instructions. The translation preserves the broad sequence without over-smoothing uncertain details.
    reason: textual_variant
  - marker: a
    text: Or 'that they used to do'.
    reason: previous_rendering
  - marker: b
    text: Or "and the oak Deborah's Oak.".
    reason: previous_rendering
  - marker: c
    text: Or "Go to the house of Abraham, your father's father".
    reason: previous_rendering
