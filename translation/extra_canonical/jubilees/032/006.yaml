  from: five he-goats and four yearling sheep
  to: four he-goats and four yearling sheep
  rationale: The draft incorrectly translates "five he-goats" by misreading the footnote marker `፭` (5) from the Charles 1895 edition as a textual numeral. The Ge'ez text explicitly reads `አርባዕተ` (four) he-goats.
