  category: mistranslation
  tier: 2
  from: he came against you to accuse you. And he desired
  to: he met you. Did he not desire
  rationale: The Ge'ez verb ተቀበለ (taqabala) means 'to meet' or 'encounter' (here reflecting the hostile encounter in Exod 4:24), but it does not mean 'to accuse'. Additionally, the word አኮሁ (akohu) introduces a rhetorical question ('Did he not...?'), which is lost when rendered as a flat statement ('And he desired').
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
