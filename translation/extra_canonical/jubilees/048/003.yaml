  category: grammar
  from: execute judgment upon Egypt.
  to: execute judgment upon Egypt?
  rationale: The sentence begins with the interrogative construction 'Did he not desire...' (translating the Ge'ez interrogative particle አኮሁ), so it should conclude with a question mark rather than a period.
