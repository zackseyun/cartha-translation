  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/048/002.job-77045.json
  category: lexical
  from: entering
  to: returning to
  rationale: The Ge'ez verb 'ገብአ' (gabaʾa) primarily means 'to return'. In the context of Moses going back to Egypt from Midian (alluding to the events of Exodus 4:24), 'returning to' is more accurate and narrative-specific than 'entering'.
