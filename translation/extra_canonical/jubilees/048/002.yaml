  category: mistranslation
  from: you shall know
  to: you know
  rationale: The Ge'ez imperfect 'ታአምር' (taʾammer) can be translated as present or future, but contextually the angel is appealing to Moses's existing memory of past events ('what was spoken to you... and what Prince Mastema desired to do'). 'You know' is the correct contextual rendering.
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
