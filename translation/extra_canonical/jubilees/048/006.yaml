  rationale: The Ge'ez phrase `ዘእንበለ፡ ይትገበር` (za-ʾənbela + subjunctive) idiomatically means 'before it was done' (antequam fieret), not 'nothing was done apart from'. Additionally, `ወሀለወከ` (wa-hallawka) means 'and you were present', which is completely lost in the current paraphrase.
