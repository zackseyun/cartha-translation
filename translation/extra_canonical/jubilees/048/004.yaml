  category: grammar
  from: for which you were sent to do
  to: which you were sent to do
  rationale: The phrase 'for which you were sent to do' is ungrammatical in English. The relative pronoun 'which' serves as the direct object of 'to do', making the preposition 'for' syntactically invalid here. Reverting to 'which you were sent to do' (or 'that you were sent to do') resolves the error while accurately translating the Ge'ez relative clause (ለዛ፡ ተፈነውከ፡ ትግበር).
