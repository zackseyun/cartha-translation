- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/048/014.job-77057.json
  category: mistranslation
  from: just as the children of Egypt had gone down into the river
  to: just as the people of Egypt had cast their children into the river
  rationale: The Ge'ez reads `በከመ፡ ወረዉ፡ ውሉዶሙ፡ ሰብአ፡ ግብጽ፡ ውስተ፡ ፈለገ፡` ("just as the people of Egypt cast their children into the river"). The draft misses the active verb `ወረዉ` (cast/threw) and misidentifies the subject, obscuring the text's theme of retributive justice (God casting the Egyptians into the sea because they cast the Israelite children into the river).
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/048/014.job-77057.json
  category: mistranslation
  from: one hundred thousand and ten thousand mighty men were destroyed
  to: He took vengeance on a million of them, and one thousand mighty men were destroyed
  rationale: The Ge'ez numbers are `ምእተ፡ አልፈ፡` (100 x 10,000 = 1,000,000) and `ዐሠርተ፡ ምእተ፡` (10 x 100 = 1,000). The draft incorrectly renders these as 100,000 and 10,000. Additionally, the draft omits `ኀበቀሎሙ` (a variant/corruption of `ተበቀሎሙ`, "He took vengeance on them"), which governs the first number.
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
