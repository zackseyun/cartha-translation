translation:
  text: And in the sixth year of the third week of the forty-ninth jubilee[1], you departed and lived in the land of Midian for five weeks of years and one year, and you returned to Egypt in the second week, in the second year, in the fiftieth jubilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: The chronology is compressed and somewhat difficult in the Ethiopic. 'Five weeks of years and one year' is retained literally to preserve Jubilees' calendrical scheme.
    reason: segmentation_note
  - marker: a
    text: Or 'in the second week.'.
    reason: previous_rendering
  - marker: b
    text: Or 'entered'.
