translation:
  text: And the prince Mastema stood up against you and sought to cast you into Pharaoh’s hand, and he helped the magicians of Egypt, and they stood and acted before you. We indeed permitted them to do evil, but we did not allow healing to be performed by their hands. But the LORD struck them with evil sores, and they were unable to continue resisting, because we made them incapable of performing even one sign of enchantment. And through all the signs and wonders the prince Mastema was put to shame, until, when he grew strong, he cried out to the Egyptians that they should pursue after you with all the power of Egypt, with their chariots and with their horses and with all the multitude of the people of Egypt. And I stood between the Egyptians and Israel, and we delivered Israel from his hand and from the hand of his people, and the LORD brought them out through the midst of the sea as on dry land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They indeed practiced their arts, and we permitted them so that they might be done by their hands.'.
