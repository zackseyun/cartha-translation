  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/048/009.job-77052.json
  category: mistranslation
  from: They indeed practiced their arts, and we permitted them so that they might be done by their hands.
  to: We indeed permitted them to do evil, but we did not allow healing to be performed by their hands.
  rationale: The translation completely misses the explicit contrast in the Ge'ez text between permitting the magicians to do evil (`እኩየስኬ`, "evil indeed") and preventing them from performing healing/remedies (`ወፈውሳስ`, "but healing"). It also misses the negation in the second clause (`አናበውሎሙ`, misspelled in the provided source text as `ፈናበውሎሙ`, "we did not allow them"). The current rendering appears to be a hallucination likely caused by the OCR errors in the source text.
