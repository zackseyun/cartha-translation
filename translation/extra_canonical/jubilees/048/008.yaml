- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/048/008.job-77051.json
  category: mistranslation
  from: so that he might execute vengeance for Israel.
  to: Through him he took vengeance for Israel.
  rationale: The Ge'ez text reads 'ቦቱ፡ በቀለ፡ ለእስራኤል።' (botu baqala la'esrā'ēl), which means 'Through him he took vengeance for Israel.' The draft incorrectly renders this as a purpose clause, likely confusing it with the later clause 'ከመ፡ ይትበቀል፡' (kama yetbaqal).
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/048/008.job-77051.json
  category: lexical
  from: because they had oppressed them violently
  to: just as they had enslaved them by force
  rationale: The Ge'ez 'በከመ' (bakama) means 'just as' or 'according as', indicating proportional vengeance, rather than 'because'. Additionally, 'ቀነይዎሙ' (qanaywomu) specifically means 'they subjugated/enslaved them', which is more precise than 'oppressed'.
