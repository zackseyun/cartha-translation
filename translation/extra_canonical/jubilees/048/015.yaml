  from: And he hardened their hearts and made them stubborn, and it was hidden from the LORD our God that he might strike the Egyptians and cast them into the midst of the sea. And on the seventeenth day we bound him so that he could not accuse the children of Israel on the day when they were asking the Egyptians for goods and garments—articles of silver and articles of gold and articles of bronze—in order to plunder the Egyptians in return for the oppression with which they had oppressed them violently. And we did not bring the children of Israel out from Egypt empty-handed.
