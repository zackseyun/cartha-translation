  from: And on the fourteenth day the guardian who had been appointed over all the powers among the peoples came from the wilderness of Etham[15], and his name was Mastema. And he wanted to accuse the children of Israel.
  to: And on the fourteenth day, and on the fifteenth, and on the sixteenth, and on the seventeenth, and on the eighteenth, the prince Mastema was bound and imprisoned behind the children of Israel.
  rationale: 'The current translation is a severe hallucination/mismatch. The Ge''ez text explicitly lists the 14th, 15th, 16th, 17th, and 18th days (ወአመ፡ ዐሡር፡ ወረቡዕ፡ ዕለት፡ ወአመ፡ ዐሡር፡ ወኀሙስ፡ ወአመ፡ ዐሡር፡ ወስዱስ፡ ወአመ፡ ዐሡር፡ ወሰብዑ፡ ወአመ፡ ዐሡር፡ ወሰሙን፡) and states that the prince Mastema (መኩነነ፡ ማእቲማ፡) was bound (አቡረ) and imprisoned (ወዐዐወ) behind the children of Israel. (Note: The first few words of the provided Ge''ez text actually belong to the end of verse 14 regarding those cast into the river).'
