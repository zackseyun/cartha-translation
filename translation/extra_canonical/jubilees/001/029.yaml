translation:
  text: And the angel of the presence, who went before the camp of Israel, took the
    tablets of the divisions of the years from the time of creation, of the law and
    of the testimony, of the weeks of their jubilees, year by year in all their number,
    and the jubilees year by year, from the day of creation until the day when the
    heavens and the earth and all their creatures will be renewed according to the
    powers of heaven and according to all the creation of the earth, until the sanctuary
    of Yahweh is created in Jerusalem on Mount Zion, and all the lights are renewed
    for healing and for peace and for blessing for all the chosen of Israel, and that
    it may be thus from that day and throughout all the days of the earth.
