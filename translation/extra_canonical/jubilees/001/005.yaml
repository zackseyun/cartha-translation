translation:
  text: 'And the Lord taught him what was first and what was to come: the account
    of the divisions of all the days of the law and the testimony. And he said, “Set
    your heart on everything that I tell you on this mountain, and write it in a book,
    so that their generations may see that I have not abandoned them because of all
    the evil that they have done by transgressing the ordinance that I establish between
    me and you.”'
