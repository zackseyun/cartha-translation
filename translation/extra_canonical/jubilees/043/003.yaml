  category: mistranslation
  from: '"Get up, run after them, and overtake them, saying, ''Why have you repaid me evil for good? You have stolen the silver cup from which my lord drinks, and you have brought blame upon your youngest brother. Quickly bring him, lest I enter into judgment.''"'
  to: '"Pursue them, run and overtake them, saying, ''Instead of good you have repaid me evil; you have stolen from me the silver cup from which my lord drinks.'' And bring back to me their youngest brother, and bring him quickly before I enter into my judgment."'
  rationale: The draft severely mistranslates the second half of the verse and incorrectly extends the quotation. The Ge'ez `ወአገብአ፡ ሊተ፡ ለአኁሆሙ፡ ዘይንእስ` means "And bring back to me their youngest brother," which is an instruction to the steward, not part of the speech to the brothers (hence "their brother", not "your brother"). The draft hallucinates "brought blame upon". Additionally, `ህየንተ` means "instead of" (not "Why"), `ሠረቅክሙኒ` includes a 1cs object suffix ("stolen from me"), `ዘእንበለ` means "before" (not "lest"), and `ደግፎሙ` (likely a variant/error for `ደግኖሙ`) means "pursue them" (not "Get up").
