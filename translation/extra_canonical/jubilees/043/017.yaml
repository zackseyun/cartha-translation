  from: you shall see
  to: you see
  rationale: The imperfect verb `ወትሬእዩ` (wä-təreʾyu) can be translated as present or future. However, in this context (paralleling Gen 45:12), Joseph is pointing out that they are currently witnessing him speak directly to them in their own language. The present tense 'you see' fits the immediate context better than the future 'you shall see'.
- timestamp: '2026-04-28T09:36:32Z'
