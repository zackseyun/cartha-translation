  to: of the famine
  rationale: The Ge'ez `ዘዐባር` (zä-ʿäbar) simply means 'of famine'. The phrase 'that the famine has continued' is an unnecessary expansion; 'of the famine' is more direct and aligns better with the project's optimal-equivalence philosophy.
