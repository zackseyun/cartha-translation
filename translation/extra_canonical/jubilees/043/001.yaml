translation:
  text: And Joseph devised a plan by which he might know their thoughts, whether there was a thought of peace among them. And he said to the man who was over his house, "Fill all their sacks with grain, and put their money back in the middle of their bags; and put my silver cup, the cup from which I drink, in the sack of the youngest." And he sent them away.
