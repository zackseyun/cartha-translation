  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/043/012.job-76957.json
  category: lexical
  from: we will bring down
  to: we will afflict
  rationale: The Ge'ez verb is ንቀጽዕ (from ቀጽዐ), meaning 'to afflict,' 'punish,' or 'chastise.' The translation 'bring down' harmonizes with the Genesis 44:31 parallel (which uses a different verb, typically a form of አውረደ) and obscures Jubilees' distinct wording.
- timestamp: '2026-04-28T09:36:32Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/043/012.job-76957.json
  category: missing_nuance
  from: the old man will die
  to: he will die
  rationale: The Ge'ez simply has ይመውት ('he will die'). While adding 'the old man' clarifies the English pronoun reference, it inserts a noun not present in the source. 'He will die' is sufficient and more literal, as the context makes it clear the father is the one who dies from grief.
