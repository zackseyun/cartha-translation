translation:
  text: '[''1. And we announced to Abraham that Sarah had conceived in the seventh
    month, and we returned to Sarah and found that she had conceived before us. And
    we blessed him, and we told him all that had been commanded for him: that he would
    not die until he had begotten six sons and had seen Isaac, and that in Isaac a
    name and seed would be named for him.'', ''2. And Sarah laughed when she heard
    that we had spoken this word with Abraham, and we rebuked her.'', ''3. And she
    was afraid and denied that she had laughed because of the word. And we told her
    the name of her son, as it had been ordained:'', ''4. and it was written on the
    heavenly tablets, Isaac. And when we came to her at the appointed time, she conceived
    and bore a son.'', ''5. And in this month the Lord executed the judgments of Sodom
    and Gomorrah and Zoar and all the region of the Jordan, and he burned them with
    fire and sulfur and destroyed them to this day, according to all their works,
    because they were utterly lawless and sinful,'', ''6. and they defiled themselves
    and committed fornication in their flesh and worked uncleanness on the earth.
    And thus the Lord will execute judgment on the places where they have done according
    to the uncleanness of Sodom, just as he judged Sodom.'', ''7. But Lot we saved,
    for God remembered Abraham and brought him out from the midst of the overthrow.'',
    ''8. And he also committed sin, and his daughters, upon the earth such as had
    not been on the earth'', ''9. from the days of Adam until his time, because a
    man lay with his daughters. And behold, it was commanded and written concerning
    all his seed on the heavenly tablets, that he should remove them and uproot them
    and execute their judgment like the judgment of Sodom, and that he should leave
    no seed of that man on the earth on the day of condemnation.'', ''10. And in this
    month Abraham moved from Hebron and went'', ''11. and dwelt between Kadesh and
    Shur in the mountains of Gerar. And in the middle of the fifth month he moved
    from there and dwelt at the Well of the Oath.'', ''12. And in the middle of the
    sixth month the Lord visited Sarah'', ''13. and did to her as he had said. And
    she conceived and bore a son in the third month, in the middle of the month, at
    the time of which the Lord had spoken to Abraham, on the feast of the firstfruits
    of the harvest Isaac was born.'', ''14. And Abraham circumcised his son on the
    eighth day: he was the first to be circumcised according to'', ''15. the covenant
    that is ordained forever. And in the sixth year of the fourth week we came to
    Abraham at the Well of the Oath, and we appeared to him as we had told Sarah that
    we would return to her and she would have conceived a son.'', ''16. And we returned
    in the seventh month and found Sarah pregnant before us, and we blessed the Lord,
    the God of all ages, who had visited his servant and had fulfilled his word.'',
    "17. And we blessed him and told him everything that had been decreed concerning
    him, that he would not die until he begot six sons more and saw Isaac''s sons
    before he died; but in Isaac his name and seed would be called.", ''18. And that
    one would become a holy seed, and would not be reckoned among the nations, for
    he would become the portion of the Most High, and all his seed had fallen to the
    lot of God, that it should become for the Lord a people for possession out of
    all peoples, and that it should become a kingdom'', ''19. of priests and a holy
    people. And he went on his way, and he rejoiced and blessed the Lord for all that
    we had told him.'', ''20. And he built an altar there to the Lord who had delivered
    him, and who was making him rejoice in the land of his sojourning.'', ''21. And
    he celebrated a feast of rejoicing in this month, seven days, near the altar that
    he had built at the Well of the Oath. And he built booths for himself and for
    his servants'', ''22. for this feast, and he was the first to celebrate the feast
    of booths on the earth. And during these seven days he was bringing, each day
    and every day, on the altar to the Lord two oxen, two rams, seven sheep, one he-goat
    for a sin offering,'', ''23. to make atonement for himself and for his seed; and
    for a sacrifice of well-being, seven rams, seven goats, seven sheep, and seven
    male kids, and their grain offerings and their drink offerings. And he burned
    all their fat on the altar, a choice offering to the Lord for a pleasing aroma.'',
    ''24. And morning and evening he burned fragrant substances: frankincense, galbanum,
    stacte, nard, myrrh, costus, and cassia, seven of these; he offered all of them
    mixed together, pure.'', ''25. And he kept this feast seven days, rejoicing with
    all his heart and with all his soul, he and all who were in his house; and there
    was no foreigner with him, nor anyone uncircumcised.'', ''26. And he blessed his
    Creator, who had created him in his generation, because by his good pleasure he
    had created him; for he knew and understood that from him there would be a plant
    of righteousness for the eternal generations, and from him a holy seed, so that
    it might become like him who had made all things.'', ''27. And he blessed and
    rejoiced, and he called the name of this feast the feast of the Lord, a joy'',
    ''28. acceptable to the Most High God. And we blessed him forever, and all his
    seed after him throughout all the generations of the earth, because he celebrated
    this feast in its season according to the testimony of the heavenly tablets.'',
    ''29. Therefore it is ordained on the heavenly tablets concerning Israel, that
    they should celebrate the feast of booths seven days with joy in the seventh month,
    acceptable before the Lord—'', ''30. an everlasting statute throughout their generations
    in every year. And there is no limit of days for this, for it is ordained forever
    for Israel that they should celebrate it and dwell in booths and place crowns
    on their heads and take leafy branches and willows from the brook.'', ''31. And
    Abraham took branches of palm trees and fruit of beautiful trees, and every day
    he went around the altar with the branches, seven times each day; and in the morning
    he praised and gave thanks to his God for everything in joy.'']'
  philosophy: optimal-equivalence
  footnotes:
  - marker: v5
    text: The place-name list is textually difficult. The Ethiopic appears to include
      Sodom, Gomorrah, and likely Zoar, together with the settlements of the Jordan
      plain.
    reason: textual_variant
  - marker: v9
    text: The clause about Lot's seed is compressed and difficult. The sense appears
      to be that judgment against that line was recorded on the heavenly tablets,
      with language of removal and uprooting.
    reason: segmentation_note
  - marker: v13
    text: The chronology links Isaac's birth to the feast of firstfruits; the Ethiopic
      wording is dense, but the calendrical connection is clear and should be preserved.
    reason: cross_reference
  - marker: v15
    text: Verse numbering in this chapter is uneven in the source rows; vv. 16-17
      continue the same speech and may reflect omitted intermediate row numbers in
      the working corpus.
    reason: segmentation_note
  - marker: v20
    text: This verse is reconstructed from the immediate context of the Ethiopic sequence;
      the source rows jump in numbering, but the sense is supported by the surrounding
      lines about altar-building and rejoicing.
    reason: segmentation_note
  - marker: v24
    text: Several incense names are uncertain in exact botanical identification; the
      translation gives conventional approximations rather than over-precise modern
      species labels.
    reason: lexical_alternative
  - marker: v27-28
    text: The Ethiopic at this point is difficult. Some witnesses may support wording
      closer to 'a great joy acceptable to the Most High God.'
    reason: alternative_reading
  - marker: v30
    text: The commands about crowns, branches, and booths intentionally preserve Jubilees'
      expanded festival practice and should not be harmonized away to the Pentateuchal
      wording alone.
    reason: cross_reference
lexical_decisions:
- source_word: ጽላተ ሰማይ
  chosen: heavenly tablets
  alternatives:
  - tablets of heaven
  - heaven's tablets
  rationale: Standard Jubilees technical term for the celestial record; preserving
    the concrete image is important for the book's revelatory framework.
- source_word: በዓለ መጻላት / ምጽላላተ
  chosen: feast of booths
  alternatives:
  - feast of tabernacles
  - festival of shelters
  rationale: The Ge'ez points to booths/shelters; 'feast of booths' is readable modern
    English while preserving the calendrical institution without flattening it into
    generic celebration.
- source_word: በዓለ ቀዳሜ ማእረር
  chosen: feast of the firstfruits of the harvest
  alternatives:
  - feast of firstfruits
  - festival of first harvest
  rationale: Keeps the agricultural and calendrical specificity present in Jubilees'
    chronology.
- source_word: መክፈልተ ልዑል
  chosen: the portion of the Most High
  alternatives:
  - the inheritance of the Most High
  - the allotment of the Most High
  rationale: The context is allotment language; 'portion' preserves covenantal election
    imagery.
- source_word: ሕዝበ ትርሲት
  chosen: a people for possession
  alternatives:
  - a treasured people
  - a people of inheritance
  rationale: Retains possession/inheritance nuance without importing later traditional
    phrasing too strongly.
- source_word: መንግሥተ ዘክህነት
  chosen: a kingdom of priests
  alternatives:
  - a priestly kingdom
  rationale: Echoes the covenant formula while remaining transparent to the Ge'ez
    wording.
- source_word: ኵነኔ
  chosen: judgment
  alternatives:
  - sentence
  - punishment
  rationale: Broad enough to include both judicial verdict and enacted punishment,
    fitting Sodom context.
- source_word: ገፍታአ
  chosen: overthrow
  alternatives:
  - catastrophe
  - destruction
  rationale: Preserves the specific catastrophe language associated with Sodom rather
    than using a generic term.
- source_word: ይትራኩሱ / ይዜምዉ
  chosen: defiled themselves and committed fornication
  alternatives:
  - polluted themselves and acted sexually immorally
  rationale: Keeps the paired moral-ritual and sexual dimensions of the accusation.
- source_word: መሥዋዕተ መድኀኒት
  chosen: sacrifice of well-being
  alternatives:
  - peace offering
  - salvation offering
  rationale: Avoids overly traditional cultic jargon while preserving sacrificial
    category distinct from sin offering.
- source_word: መዐዛ ሠናይ
  chosen: a pleasing aroma
  alternatives:
  - sweet savor
  - good fragrance
  rationale: Natural modern English for sacrificial acceptance language.
- source_word: ተከለ ጽድቅ
  chosen: a plant of righteousness
  alternatives:
  - planting of righteousness
  - shoot of righteousness
  rationale: Preserves the vegetal metaphor central to covenant-seed theology in the
    verse.
- source_word: ዐጽቀ ቈጽል ውኩሓ እሙሐዝ
  chosen: leafy branches and willows from the brook
  alternatives:
  - thick boughs and brook willows
  rationale: Maintains the festival-botanical imagery in accessible English.
theological_decisions:
- issue: Identity of the speaking 'we' throughout the chapter
  chosen_reading: Retained first-person plural narration ('we announced,' 'we came,'
    'we blessed') without specifying beyond the revelatory heavenly messengers.
  alternative_readings:
  - angels
  - the angel of the presence with attendant angels
  rationale: The chapter's voice is intentionally heavenly and mediated; specifying
    more than the text does would over-resolve Jubilees' revelatory framing.
- issue: Election language in vv. 18-19
  chosen_reading: Rendered Isaac's line as uniquely holy and allotted to God, becoming
    'a people for possession' and 'a kingdom of priests.'
  alternative_readings:
  - more generalized blessing among nations
  - purely ethnic designation
  rationale: The text strongly emphasizes separation from the nations and covenantal
    priestly identity; this should be preserved rather than softened.
- issue: Abraham as first celebrant of Booths
  chosen_reading: Translated the passage as instituting the feast of booths before
    Sinai, grounded in the heavenly tablets.
  alternative_readings:
  - a merely private harvest celebration later associated with Booths
  rationale: Jubilees explicitly projects the feast into patriarchal time and roots
    it in heavenly ordinance; the translation should preserve that theological claim.
