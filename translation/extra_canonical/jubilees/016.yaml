  rows:
  - verse: 1
    geez: ፀንሰት፡* ወልደ።* ወተመየጥነ፡ በወርኅ፡ ሳብዕ፡ ወረከብናሃ፡ ለሳራ፡ ፀንሰተ፡* ቅድሜነ፡ ወባ ረክናሁ፡* ወዜነውናሁ፡*
      *ኵሎ፡ ዘተአዘዘ፡* ሎቱ፡ ከመ፡ ኢይመውት፡ *እስከ፡ ይወልድ፡ ፮ዲ፡* ስድስተ፡ ውሉደ፡ ወይሬኢ፡* ዘእንበለ፡ ይመት፡ ወበይስሐቅ፡*
      ይጼዋዕ፡ ሎቱ፡* ስም፡ ወዘርአ።*
  - verse: 2
    geez: ወስሐቀት፡ ሳራ፡ እስመ፡ ሰምዐት፡ ከመ፡ ተናገርነ፡ ዘንተ፡ ቃለ፡ ምስለ፡ አብርሃም፡ ወዘለፍናሃ፡
  - verse: 3
    geez: ወፈርት፡ ወሐሰወት፡ ከመ፡ ስሐቀት፡ በእንተ፡ ቃል። ወነገርናሃ፡ ስሞ፡ ለወልዳ፡ በከመ፡ ሥሩዕ፡
  - verse: 4
    geez: ወጽሑፍ፡ ስሙ፡ ውስተ፡ ጽላተ፡ ሰማይ፡ ይስሐቅ። ወአመ፡ ገባእነ፡ ኀቤሃ፡ በጊዜ፡ ሰዓት፡ ወይእቲ፡
  - verse: 5
    geez: ፀንሰት፡ ወልደ። ወበዝ፡ ወርኅ፡ ገብረ፡ እግዚአብሔር፡ ዘነኒሆሙ፡ ለሰዶም፡ ወለገሞራ፡ *ወለዶም፡ ወለኵሉ፡ አደያመ፡*
      ዮርዳኖስ፡ ወአውዐዮሙ፡ በእሳት፡ ወበተይ፡ ወአጥፍኦሙ፡* እስከ፡ ዛቲ፡* ዕለት፡ በከመ፡ ናሁ፡ አይዳዐኩ፡ ኵሎ፡* ምግባሮሙ፡
      ከመ፡ ፀዋጋን፡ ወኃጥኣን፡ ጥቀ፡
  - verse: 6
    geez: ወይትራኩሱ፡ ወይዜምዉ፡* በሥጋሆሙ፡ ወይገብሩ፡ ርኵሰ፡ በዲበ፡ ምድር። ወከማሁ፡ ይገብር፡ እግዚአብሔር፡ ኵነኔ፡ በመካናት፡
      *በዋእደ፡ ገብሩ፡* በከመ፡ ርኵሶሙ፡ ለሰዶም፡ ከመ፡ ኰነና፡*
  - verse: 7
    geez: ለሰዶም፡* ወለሎጥ፡ ናድኅኖ፡ እስመ፡ ተዘከሮ፡ እግዚአብሔር፡ ለአብርሃም፡ ወአውፅኦ፡ እማእከለ፡
  - verse: 8
    geez: ገፍታአ። ወገብረ፡ ውእቱኒ፡ ወአዋልዲሁኒ፡ ኀጢአተ፡ ዲበ፡* ምድር፡ ዘአኮ፡ ዲበ፡ ምድር፡*
  - verse: 9
    geez: እመዋዕለ፡ አዳም፡ እስከ፡ አሜሁ፡ እስመ፡ በከበ፡ ብእሲ፡ ምስለ፡ አዋልዲሁ።* ወናሁ፡ ተአዘዘ፡ ወተቈረጸ፡* ላዕለ፡
      ኵሉ፡* ዘርአ፡ *ውስተ፡ ጽላተ፡ ሰማይ፡* ከመ፡ ያአትትሙ፡ ወከመ፡ ይሠርዎሙ፡ ወከመ፡ ይገበር፡ *ኵነኔሆሙ፡ በከመ፡* ኵነኔ፡
      ሰዶም፡ ወከመ፡ ኢያትርፍ፡ ሎቱ፡* ኵሎ፡ ዘርአ፡ ውስተ፡*
  - verse: 10
    geez: ምድር፡ ዘሰብአ፡ በዕለት፡ ይደን። ወበዝንቱ፡ ወርኅ፡ ፯ዐዘ፡ አብርሃም፡ እምነ፡ ኬብሮን፡ ወሖረ፡
  - verse: 11
    geez: ወኀደረ፡ ማእከለ፡ ቃዴስ፡ ወሱር፡ ውስተ፡ አደባረ፡* ጌራሮን። ወበመንፈቀ፡ ወርኅ፡ ኃምስ፡ ፯ዐዘ፡
  - verse: 12
    geez: እምህየ፡ ወኀደረ፡ ኀበ፡ ዐዘቅት፡ መሐላ። ወበመንፈቀ፡ ወርኅ፡ ሳድስ፡ ሐወጻ፡* እግዚአብሔር፡
  - verse: 13
    geez: ለሳራ፡ ወገብረ፡ ላቲ፡ በከመ፡ ይቤ። ወፀንሰት፡ ወወለደት፡ ወልደ፡ በወርኅ፡ ሣልስ፡ ወበመንፈቀ፡ ወርኅ፡ በመዋዕለ፡
      ዘይቤሎ፡ እግዚአብሔር፡* ለአብርሃም፡ በበዓለ፡ ቀዳሜ፡* ማእረር፡ ተወልደ፡
  - verse: 14
    geez: ይስሐቅ። ወከበቦ፡ አብርሃም፡ ለወልዱ፡* *እመ፡ ሳምንት፡* ውእቱ፡ ቀዳሚ፡ ተከበበ፡ በከመ፡
  - verse: 15
    geez: '*ኪዳን፡ እንተ፡* ተሠርዐት፡ ለዓለም። ወበዓመት፡ ሳድስ፡ ዘሱባዔ፡ ራብዕ፡ ወጻእነ፡ ኀበ፡ አብርሃም፡ ኀበ፡ ዐዘቅተ፡
      መሐላ፡ ወአስተርአይናሁ፡ በከመ፡ ንቤላ፡ ለሳራ፡ ከመ፡ ንገብአ፡* ኀቤሃ፡ ወይእቲኒ፡*'
  - verse: 18
    geez: ይስሐቅኒ፡ አሐዱ፡ ይከውን፡ ለዘርእ፡ ቅዱስ፡ ወውስተ፡ አሕዛብኒ፡' ኢይትኌለቍ፡' እስመ፡ ለመክፈልተ፡ ልዑል፡ ይከውን፡
      ወውስተ፡ ዘይመልከ፡' አምላክ፡ ወረደ፡ ኵሉ፡ ዘርኡ፡ ከመ፡ ይኩን፡ ለእግዚአብሔር፡ *ሕዝበ፡ ትርሲት፡' እምኵሉ፡ ሕዝብ፡'
      ወከመ፡ ይኩን፡ መንግሥተ፡
  - verse: 19
    geez: ዘክህነት፡' ወሕዝበ፡ ቅዱሰ። ወሖረ፡ ፍኖተ፡ ወከዐወ፡ ናላ፡ ለባሬ፡ ኵሉ፡ ዘነገርናሁ፡' ወተፈሥሐ፡
  - verse: 21
    geez: በቅሩበ፡ ምሥዋዕ፡ *ዘሐነጸ፡ ኀበ፡'° *ዐዘቅተ፡ መሐላ።'' ወሐነጸ፡ ምጽላላተ፡ ሎቱ፡ ወለአግብርቲሁ፡
  - verse: 22
    geez: በዛቲ፡ በዓል፡ ወውእቱ፡ መቅድመ፡ ገብረ፡ በዓለ፡ መጻላት፡'፪ በዲበ፡ ምድር። ወበዝ፡ ሰቡዕ፡ መዋዕል፡ ሀሎ፡ ያቀርብ፡
      ኵሎ፡ ዕለተ፡ በበ፡ ዕለት፡ ውስተ፡ *ምሥዋዐ፡ ጽንሓሕ፡'፫ ለእግዚአብሔር፡ አልህምተ፡ ክልኤተ፡ ወአብሐኩ፡'፬ ክልኤተ፡
      ወአባግዐ፡ ሰብዐተ፡ መሐስአ፡ ጠሊ፡ አሐደ፡ በእንተ፡
  - verse: 23
    geez: ኀጢአት፡ ከመ፡ ያስተስሪ፡ ቦቱ፡ በእንቲአሁ፡ ወበእንተ፡ ዘርኡ። ወለመሥዋዕተ፡ መድኀኒት፡ አብሐኩ፡ ሰብዐተ፡ ወመሐስአ፡
      ሰብዐተ፡ ወአባግዐ፡ ሰብዐተ፡ ወደቤላት፡ ሰብዐተ፡ ወመሥዋዕቶሙኒ፡ ወቍጻጼቶሙኒ፡ ወስቡሖ፡'፭ ሥብሖሙ፡ የዐጥን፡'፮ በዲበ፡
      ምሥዋዕ፡ ጽንሓሐ፡ *ኅሩየ፡ ለእግዚአ
  - verse: 24
    geez: ብሔር፡'፯ ለመዐዛ፡ ሠናይ። ወበጽባሕ፡ ወሰርክኒ፡'፰ የዐጥን፡ እፈወ፡'፱ ስኂነ፡ ወቅንአተ፡ ወማየ፡ ልብን፡ ወናርድስ፡
      ወከርቤ፡ ወሰንበልተ፡ ወኵስተ፡'° ሰብዐቲሆሙ፡ ዘንተ፡ ኵሉ፡'' ያቀርብ፡
  - verse: 25
    geez: ውእቱ፡ ዐሩየ፡ ትዐፅዮ፡'፪ ድሙረ፡ ንጹሐ። ወገብረ፡ ዘንተ፡ በዓለ፡'፫ ሰቡዐ፡ መዋዕለ፡ እንዘ፡ ይትፌሣሕ፡ በኵሉ፡
      ልቡ፡ ወበኵሉ፡ ነፍሱ፡ ውእቱ፡ ወኵሎሙ፡ እለ፡ ውስተ፡'፬ ቤቱ፡ ወአልቦ፡
  - verse: 26
    geez: መነኒ፡ ነኪረ፡ ምስሌሁ፡'፭ ወኵሉ፡ ዘአኮ፡ ክሱበ። ወባረኮ፡ ለፈጣሪሁ፡ ዘፈጠሮ፡ በትዝምዱ፡'፮ እስመ፡'፯ በሥምረቱ፡'፰
      ፈጠሮ፡'፱ እስመ፡ አእመረ፡ ወጠየቀ፡ ከመ፡ እምኔሁ፡ ይከውን፡ ተከለ፡ ጽድቅ፡ ለትውልድ፡ ዘለዓለም፡ ወእምኔሁ፡ ዘርእ፡
      ቅዱስ፡ ከመ፡ ይኩን፡'፳ ከማሁ፡ ለዘገብረ፡
  - verse: 27
    geez: ኵሎ። ወባረከ፡'፩ ወተፈሥሐ፡ *ወጸውዐ፡ ስማ፡'፪ ለዛቲ፡ በዓል፡ በዓለ፡ እግዚአብሔር፡'፫ ፍሥሓ፡
  - verse: 28
    geez: ክልኤሆሙ፡ ፍሥሓ፡ ዐቢየ፡ ጥቀ። ወሐነጸ፡ በህየ፡ ምሥዋዐ፡ ለእግዚአብሔር፡ ዘባረኮ፡ ወለዘ *ያስተፈሥሖ፡' በምድረ፡
      ፍልሰቱ፡' ወገብረ፡ በዓለ፡ ፍሥሓ፡ በዝ፡ ወርኅ፡ ሰቡዐ፡ መዋዕለ፡
  - verse: 29
    geez: በእንተዝ፡ ተሠርዐ፡ ውስተ፡ ጽላተ፡ ሰማይ፡ ላዕለ፡ እስራኤል፡ ከመ፡ ይኩኑ፡ ገበርያኮ፡ በዓለ፡ መጸለት፡ ሰቡዐ፡
      መዋዕለ፡ በፍሥሓ፡ በወርኅ፡ ሳብዕ፡ ዘይትወከፍ፡ በቅድመ፡ እግዚአብሔር፡
  - verse: 30
    geez: ሕገ፡ ዘለዓለም፡ በትውልዶሙ፡ በኵሉ፡ ዓመት፡ ወዓመት። ወአልቦ፡ ለዝንቱ፡ ወሰነ፡ መዋዕል፡ እስመ፡ ለዓለም፡ ውእቱ፡
