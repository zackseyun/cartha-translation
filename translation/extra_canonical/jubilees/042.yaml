translation:
  text: '[''1. And in the first year of the third week of the forty-fifth jubilee,
    while the famine was coming into the land,'', ''2. the rain was withheld from
    the land, because there was no shower that came down. And the land became barren,
    but in the land of Egypt alone there was food, because Joseph had gathered seed
    for the land'', ''3. in the seven years of abundance and had kept it. And Egypt
    came to Joseph so that he might give them food, and he opened the storehouses
    where the grain of the first years was, and sold it to the peoples of the land
    for silver.'', ''4. And the famine became very severe in the land of Canaan, and
    Jacob heard that there was food in Egypt, and he sent ten of his sons to get food
    for him from Egypt. But Benjamin he did not send. And the ten sons of Jacob arrived
    in Egypt with those who were traveling.'', ''5. And Joseph recognized them, but
    they did not recognize him. And he spoke with them harshly and said to them, “Are
    you not spies, men of the eye, and have you come to observe the exposed parts
    of the land?”'', ''6. And he put them in custody. And after that he released them
    and kept Simeon alone, and the nine'', ''7. brothers he sent away. And he filled
    their sacks with grain, and he put their silver also for them'', ''8. into their
    sacks, and they did not know it. And he commanded them to bring their youngest
    brother, because they had told him that their father was alive and their youngest
    brother also.'', ''9. And they went up from the land of Egypt and came to the
    land of Canaan, and they told their father everything that had happened to them,
    and that the ruler of the land had spoken harshly with them and had seized Simeon
    until'', ''10. they should bring Benjamin. And Jacob said, “You have bereaved
    me: Joseph is not, and Simeon also is not...”'']'
  philosophy: optimal-equivalence
  footnotes:
