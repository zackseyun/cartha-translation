    reason: segmentation_note
lexical_decisions:
- source_word: ሱባዔ ሣልስ
  chosen: third week
  alternatives:
  - third sabbath of years
  - third heptad
  rationale: Jubilees uses calendrical structuring by weeks of years within jubilees.
    'Week' preserves the technical chronology in readable English without flattening
    it into generic time language.
- source_word: ፵ወ፭ ኢዮቤልው
  chosen: forty-fifth jubilee
  alternatives:
  - 45th jubilee
  rationale: Retains Jubilees's formal chronological framework and keeps the key term
    'jubilee' explicit.
- source_word: ዐባር
  chosen: famine
  alternatives:
  - dearth
  - scarcity
  rationale: Context requires the onset of widespread food shortage; 'famine' is the
    clearest modern equivalent.
- source_word: አበየ ዝናም ተውህቦ
  chosen: the rain was withheld
  alternatives:
  - rain was not given
  - rain ceased to be given
  rationale: This preserves the passive, providential nuance better than a flat meteorological
    statement.
- source_word: ምትነ
  chosen: shower
  alternatives:
  - rainfall
  - downpour
  rationale: A specific rain-event term fits the clause 'that came down' and preserves
    the concrete imagery.
- source_word: ዐብረተ ምድር
  chosen: the land became barren
  alternatives:
  - the land dried up
  - the land was ruined
  rationale: Conveys agricultural failure resulting from withheld rain without overinterpreting
    the exact physical process.
- source_word: ሲሲተ
  chosen: food
  alternatives:
  - grain
  - provisions
  - rations
  rationale: The term appears in contexts of available sustenance generally; where
    the text later specifies grain, that more specific term is used. 'Food' avoids
    forcing every occurrence to mean grain.
- source_word: አስተጋብአ ዘርአ
  chosen: had gathered seed
  alternatives:
  - had collected grain
  - had stored produce
  rationale: The Ge'ez literally refers to seed; in context it denotes stored agricultural
    produce for the land. 'Gathered seed' preserves the wording while remaining intelligible.
- source_word: ሠምር
  chosen: abundance
  alternatives:
  - plenty
  - prosperity
  rationale: In the seven-year contrast with famine, 'abundance' best captures the
    agricultural plenty.
- source_word: መዛግብተ
  chosen: storehouses
  alternatives:
  - treasuries
  - granaries
  rationale: The word can denote storage places broadly. 'Storehouses' is accurate
    and avoids overcommitting where the text itself then specifies grain within them.
- source_word: ስርናይ
  chosen: grain
  alternatives:
  - wheat
  - corn
  rationale: A cereal term is intended; 'grain' is broad enough to avoid false precision
    while fitting the famine narrative.
- source_word: በወርቅ
  chosen: for silver
  alternatives:
  - for money
  - for gold
  rationale: In this narrative setting the economic exchange is conventionally silver;
    the Ethiopic reading may reflect a broader precious-metal term or textual instability.
    The rendering follows the likely sense while noting the issue separately.
- source_word: ዘየሐውር
  chosen: with those who were traveling
  alternatives:
  - with their company
  - with the caravan
  rationale: The phrase indicates accompanying travelers rather than the brothers
    traveling entirely alone.
- source_word: ዐጹባጺበ
  chosen: harshly
  alternatives:
  - roughly
  - sternly
  rationale: Captures Joseph's severe manner of speech without archaic phrasing.
- source_word: ሰብአ ዓይን
  chosen: spies, men of the eye
  alternatives:
  - watchers
  - observers
  rationale: The idiom points to spying or reconnaissance. The main text gives the
    idiomatic sense 'spies' while preserving some literal flavor with 'men of the
    eye.'
- source_word: ታስተሓይዪ ጸባረ ምድር
  chosen: to observe the exposed parts of the land
  alternatives:
  - to see the nakedness of the land
  - to inspect the weak places of the land
  rationale: Preserves the Genesis-like idiom of vulnerable or uncovered regions without
    using overly archaic 'nakedness' in the main text.
- source_word: ንጸዎሙ
  chosen: put them in custody
  alternatives:
  - bound them
  - imprisoned them
  rationale: The context is temporary detention rather than a final imprisonment.
- source_word: ኀበበ ፈትሖሙ
  chosen: released them
  alternatives:
  - set them free
  - loosened them
  rationale: A natural English rendering for freeing them from custody.
- source_word: አሕስሊሆሙ
  chosen: their sacks
  alternatives:
  - their bags
  - their containers
  rationale: Fits the transport of grain in the Joseph narrative and is standard readable
    English.
theological_decisions:
- issue: Providential framing of drought
  chosen_reading: Rendered the passive construction as 'the rain was withheld' rather
    than merely 'it did not rain.'
  alternative_readings:
  - the rain was not given
  - there was no rain
  rationale: Jubilees often frames events within divine governance. The passive wording
    preserves that theological texture without adding an explicit divine subject absent
    from the verse.
- issue: Chronological terminology in Jubilees
  chosen_reading: Kept 'third week' and 'forty-fifth jubilee' as technical time markers.
  alternative_readings:
  - third period
  - third set of seven years
  rationale: Jubilees's theology of history is structured through jubilees and weeks
    of years; flattening these would erase a major feature of the book.
