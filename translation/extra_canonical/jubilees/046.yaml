translation:
  text: '["1. And it came to pass after Jacob died, the sons of Israel increased in
    the land of Egypt, and they became a numerous people; and they were all of one
    accord, each loving his brother, and a man helping his brother. And they increased
    abundantly and grew strong throughout all the days of Joseph''s life, for ten
    weeks of years.", "2. And there was no adversary and nothing evil through all
    the days of Joseph''s life after the death of his father Jacob, because all Egypt
    honored", "3. the sons of Israel throughout all the days of Joseph''s life. And
    Joseph died at the age of one hundred and ten years: seventeen years he lived
    in the land of Canaan, and ten years while he was serving, and three years in
    the prison-house, and eighty years", ''4. under the king, ruling over all the
    land of Egypt. And he died, and all his brothers,'', ''5. and all that generation.
    And before he died he commanded the sons of Israel that they should carry'', ''6.
    his bones in the day when they went out from the land of Egypt. And he made them
    swear concerning his bones, for he knew that the Egyptians would not again bring
    out and bury him in the land of Canaan. For Makmaron, king of Canaan, while dwelling
    in the land of Assyria, fought in the valley with the king of'', ''7. Egypt and
    killed him there; and he pursued after the Egyptians as far as the entrance of
    Eromon. But he could not enter, because another new king had arisen for Egypt,
    stronger than he, and he took possession of the land of Canaan and shut the gate
    of Egypt, and there was none who went out and none who came in to Egypt.'', ''8.
    And Joseph died in the forty-sixth jubilee, in the sixth week of years, in the
    second year; and they buried him'', ''9. in the land of Egypt. And all his brothers
    died after him. And the king of Egypt went out to fight with the king of Canaan
    in the forty-seventh jubilee, in the second week of years, in the second year;
    and the sons of Israel brought out all the bones of the sons of Jacob, except
    the bones of Joseph, and they buried them in the field in the double cave in the
    mountain,'', ''10. and many returned to Egypt, but a few of them remained in the
    mountain of'', ''11. Hebron; and your father Amram remained with them. And the
    king of Canaan prevailed over the king of Egypt'', ''12. and shut the gate of
    Egypt. And he devised an evil plan against the sons of Israel, so as'', "13. to
    afflict them, and he said to the people of Egypt, ''Look, the people of the sons
    of Israel are more and stronger than we are. Come, let us deal wisely with them
    before they multiply, and let us afflict them with servitude, lest war come upon
    us and they also join themselves to our enemies and go out from our land, for
    their hearts and their faces are toward the land of Canaan.''", ''14. And he appointed
    over them taskmasters so that they might afflict them with oppression, and they
    built fortified cities for Pharaoh: Pithom and Raamses. And they built all the
    walls and all the embankments that had fallen'', ''15. in the land of Egypt. And
    they made them serve by force, and however much they dealt harshly with them,
    so much the more'', ''16. they increased and so much the more they multiplied.
    And the Egyptians made the sons of Israel abominable.'']'
  philosophy: optimal-equivalence
  footnotes:
  - marker: v1
    text: Literally 'ten weeks of years,' i.e., seventy years, throughout Joseph's
      lifetime after Jacob's death.
    reason: cultural_note
  - marker: v6-7
    text: The names 'Makmaron' and 'Eromon' are difficult and may reflect forms of
      place or royal names preserved in Ethiopic transmission.
    reason: textual_variant
  - marker: v9
    text: '''The double cave'' likely refers to the cave of Machpelah near Hebron;
      the Ge''ez here uses a descriptive expression rather than the familiar Hebrew
      place-name.'
    reason: cross_reference
  - marker: v10-11
    text: The clause about those who remained at Hebron and 'your father Amram' is
      abrupt in context, likely because the book continues addressing Moses within
      the Sinai revelation framework.
    reason: segmentation_note
  - marker: v11
    text: The Ge'ez text literally reads 'Abram' (አብራም), a known scribal error in
      the Ethiopic transmission for 'Amram', the father of Moses.
    reason: textual_variant
  - marker: v14
    text: The Ge'ez says 'fortified cities' rather than the more traditional English
      'store-cities.'
    reason: lexical_alternative
  - marker: v14-15
    text: The phrase about building 'all the walls and all the embankments that had
      fallen' is textually difficult; it may refer broadly to reconstruction works
      throughout Egypt.
    reason: segmentation_note
  - marker: v16
    text: The final verb is difficult; the sense is that the Egyptians came to regard
      the Israelites with loathing or contempt.
    reason: lexical_alternative
lexical_decisions:
- source_word: ዕሩያነ በአልቦሙ
  chosen: of one accord
  alternatives:
  - upright among themselves
  - in harmony together
  rationale: The phrase describes internal solidarity among the Israelites, immediately
    explained by mutual love and help. 'Of one accord' preserves communal unity without
    over-literal awkwardness.
- source_word: ሰይጣን
  chosen: adversary
  alternatives:
  - Satan
  - accuser
  rationale: In this context the statement is broad—'there was no adversary and nothing
    evil'—and need not specify the personal name Satan. 'Adversary' preserves the
    lexical sense while fitting the paired expression.
- source_word: በቅኔ
  chosen: with servitude
  alternatives:
  - with deceit
  - with slavery
  rationale: The previous draft incorrectly rendered 'bä-qenē' as 'with deceit'. The
    Ge'ez word 'qenē' means servitude, slavery, or subjection, which perfectly matches
    the context of Exod 1:10-11.
- source_word: ያሐስሙ
  chosen: dealt harshly
  alternatives:
  - imposed measure
  - afflicted
  rationale: The Ge'ez 'ወመጠነ፡ ያሐስሙ፡ ላዕሌሆሙ' means 'and to the extent that they dealt
    harshly with them'. 'However much they dealt harshly' captures the comparative
    force smoothly.
- source_word: ያስተረዙስዎሙ
  chosen: made ... abominable
  alternatives:
  - held ... in contempt
  - treated ... with loathing
  rationale: The verb is difficult, but the sense is that the Egyptians came to regard
    Israel with revulsion/hatred. 'Made ... abominable' preserves the strong negative
    valuation with a slightly literal edge.
theological_decisions:
- issue: Whether ሰይጣን in v.2 should be rendered as the proper name 'Satan' or the
    common noun 'adversary'
  chosen_reading: adversary
  alternative_readings:
  - Satan
  - accuser
  rationale: The phrase is generalized and paired with 'nothing evil,' describing
    a period of peace rather than narrating activity by a distinct named being. Rendering
    it as 'adversary' preserves the lexical sense without over-dogmatizing demonology.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #3'
- issue: Calendrical terminology in vv.8-9
  chosen_reading: '''jubilee'' and ''week of years'' retained explicitly'
  alternative_readings:
  - jubilee period / week
  - forty-sixth cycle
  rationale: Jubilees' theology of history depends on its calendrical structure. The
    translation preserves the technical chronology rather than smoothing it into generic
    dating.
  doctrine_reference: PHILOSOPHY.md; Jubilees-specific guardrail on calendrical vocabulary
