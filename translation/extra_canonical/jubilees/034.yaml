  - verse: 19
    geez: ኃጢአቶሙ፡ እስመ፡ አኅዘኑ፡ ምሕረተ፡ አቡሆሙ፡ በእንተ፡ ዮሴፍ፡ ወልዱ። ወተሠርዐት፡ ዛቲ፡ ዕለት፡ ከመ፡ ይሕዝኑ፡
