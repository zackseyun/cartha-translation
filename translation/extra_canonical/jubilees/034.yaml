lexical_decisions:
- source_word: ሱባዔ
  chosen: week of years
  alternatives:
  - week
  - heptad
  rationale: In Jubilees the chronological framework is structured by sabbatical heptads;
    'week of years' preserves the calendrical sense rather than a generic 'week'.
- source_word: እዮቤል
  chosen: jubilee
  alternatives:
  - Jubilee period
  rationale: Standard calendrical term in Jubilees; must be preserved explicitly.
- source_word: ስሳ ምእት
  chosen: six thousand
  alternatives:
  - six hundred
  rationale: The Ge'ez 'sesa me'et' literally means sixty hundreds (60 x 100), which
    is six thousand, correcting the previous draft's 'six hundred'.
- source_word: ጸባሕተ
  chosen: tribute
  alternatives:
  - tax
  - levy
  rationale: The context is subjugated local rulers paying produce to Jacob; 'tribute'
    best reflects political submission.
- source_word: ሊቀ ዐቀብት ሣውዕ
  chosen: chief of the cooks
  alternatives:
  - chief butcher
  - captain of the guard
  rationale: The Ethiopic points to oversight of slaughter/cooking personnel; I render
    the immediate lexical sense rather than harmonizing to Genesis tradition.
- source_word: ያስተስርዩ
  chosen: make atonement for themselves
  alternatives:
  - seek expiation for themselves
  - purge themselves
  rationale: The chapter explicitly grounds an annual rite of expiation; 'make atonement'
    is the clearest theological rendering.
theological_decisions:
- issue: Institution of the annual affliction on the tenth of the seventh month
  chosen_reading: The text presents the day as an ordained annual act of self-affliction
    and atonement rooted in the brothers' sin against Joseph and Jacob's grief.
  alternative_readings:
  - A memorial fast only
  - A later Day of Atonement retrojection without etiological force
  rationale: Verses 18-19 explicitly connect affliction, annual recurrence, and atonement
    with the Joseph episode. The translation preserves this etiological theology without
    flattening it into later biblical phrasing.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve
    calendrical terminology carefully.
- issue: Potiphar's office
  chosen_reading: Rendered as 'officer of Pharaoh, the chief of the cooks, priest
    of the city of Heliopolis.'
  alternative_readings:
  - '''eunuch of Pharaoh, captain of the guard'' by harmonization with Genesis'
  - '''chief butcher'' for the middle title'
  rationale: The Ethiopic wording differs from the familiar Genesis phrasing. Following
    original-language primacy, the translation keeps Jubilees' wording rather than
    harmonizing it back into Genesis.
  doctrine_reference: Original-language primacy over translation tradition.
