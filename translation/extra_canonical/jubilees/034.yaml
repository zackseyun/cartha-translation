  rows:
  - verse: 1
    geez: ወበሳድስ፡ ዓመት፡ ለዝ፡ ሱባዔ፡ እምዝንቱ፡ ዘአርብዓ፡ ወረባዕቱ፡' እዮቤልው፡ ፈነዎሙ፡ ያዕቆብ፡ ለውሉዱ፡' ይርዐዩ፡
      አባግዒሆሙ፡' ወአግብርቲሆሙኒ፡' ምስሌሆሙ፡ ውስተ፡ ጸአተ፡ ሴቄም"።'
  - verse: 2
    geez: ወተጋብኡ፡ ላዕሌሆሙ፡ ሱባዔቲሆሙ፡ ነገሥተ፡ አሞሬዎን፡ ከመ፡ ይቅትልዎሙ፡ ኀብኢኦሙ፡'
  - verse: 3
    geez: ታሕተ፡ አም፡ ወከመ፡ ይማህርኩ፡ እንስሳሆሙ። ወያዕቆብ፡ ወሌዊ፡' ወይሁዳ፡ ወዮሴፍ፡ ሀለዉ፡ ውስተ፡ ቤት፡ ኀበ፡
      ይስሐቅ፡ አቡሆሙ፡ እስመ፡ ኖንዝና፡" መንፈሱ፡ ወስእኑ፡ ኀዲጎተ፡
  - verse: 4
    geez: ወብንያም፡ ውእቱ፡ ዘይኄእስ፡ ወ"በእግዚአ፡ ነበረ፡" *ኀበ፡ አቡሁ።" ወመጽኡ፡ ነገሥተ፡ ታፉ፡" ወነገሥተ፡ አሬስ፡
      ወነገሥተ፡ ሴራጋን፡" ወነገሥተ፡ ሴሎ፡ ወነገሥተ፡ ጋአስ፡" ወንጉሠ፡ ቤተርን፡ ወንጉሠ፡ ማአኒሳኬር፡" ወኵሎሙ፡ እለ፡ ይነብሩ፡
      ውስተዝ፡" ደብር፡" እለ፡ ይነብሩ፡ ውስተ፡
  - verse: 5
    geez: አም፡" ምድረ፡ ከናዓን። ወዜነዉዎ፡ ለያዕቆብ፡ *እንዘ፡ ይብሉ፡" ከመ፡' ናሁ፡ ነገሥተ፡ አሞሬዎን፡
  - verse: 6
    geez: ዐገትዎሙ፡ ለውሉድከ፡ ወመራዕዮሙሂ፡" ተማህጠኑ። ወተንሥአ፡ እምነ፡ ቤቱ፡ ውእቱ፡ ወሠለስቲሆሙ፡ ውሉዱ፡" ወኵሎሙ፡
      ደቂ፡ አቡሁ፡ ወደቁ፡ ወሖረ፡" ላዕሌሆሙ፡" በስሳ፡
  - verse: 7
    geez: ምእት፡" ዕደ፡ እለ፡ ይጸውሩ፡ አበይፍተ። ወቀተሎሙ፡" በውስተ፡ ጸአተ፡ ዘሴቄም"፡" ወዴገነ፡" እለ፡ ጐዩ፡ ወቀተሎሙ፡"
      በአፈ፡ ሰይፍ፡ ወቀተሎሙ፡" ለአሬስ፡ ወለታፉ፡" ወለሴሬጋን፡"
  - verse: 8
    geez: ወለሴሎ፡" ወለአማኒስኬር፡" ወለጋጋአስ። ወአስተጋብአ፡ መራዕይሁ፡" ወዐብየ፡ ላዕሌሆሙ፡" ወሠርዐ፡ ፀባሕተ፡ ላዕሌሆሙ፡
      ከመ፡ የሀብዎ፡ ጸባሕተ፡ ኀምስተ፡ ፍሬ፡ ምድርሙ፡ ወሐነጸ፡
  - verse: 9
    geez: '*ርቤአሃ፡ ወትምናታሬስሃ።" ወተመይጠ፡ በሰላም፡ ወገብረ፡ ምስሌሆሙ፡ ሰላመ፡ ወኮንዎ፡'
  - verse: 10
    geez: አግብርተ፡ እስከ፡ አመ፡ ዕለተ፡ ወረዱ፡ ውእቱ፡ ወውሉዱ፡ ውስተ፡" ግብጽ። ወበሳብዕ፡ ዓመት፡ ዘዝ፡ ሱባዔ፡ ፈነወ፡"
      ዮሴፍሃ፡ ከመ፡ ያእምር፡ ሰላሞሙ፡ ለአኀዊሁ፡ እምቤቱ፡ ውስተ፡ ምድረ፡"
  - verse: 11
    geez: ሴቄም"፡" ወረከቦሙ፡ በምድረ፡ ዶታኤም።" ወሐብበይዎ፡ ወገብሩ፡ ላዕሌሁ፡' ምክረ፡ ከመ፡ ይቅ ትልዎ፡ ወተመይጦሙ፡"
      ሣጥዎ፡ ለነጋዲተ፡" እስማዒላዊያን፡ ወአውረድዎ፡ ግብጸ፡" ወአከበይዎ፡" ለኢጥፋራ፡ ሐፀወ፡ ፈርዖን፡ ሊቀ፡ ዐቀብት፡ ሣውዕ፡
      ዘሀገረ፡ ኤሌው። ወውሉደ፡ ያዕቆብ፡ ፲፪ ዘብሑ፡ ዳቤላ፡ ጠሊ፡ ወጸንቀቀ፡ ልብሱ፡ ለዮሴፍ፡ በደም፡ ወፈነዉ፡ ኀበ፡ ያዕቆብ፡
