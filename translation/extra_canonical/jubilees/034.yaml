      በላህ፡ ሞቶ፡ ወይቤ፡ ከመ፡ አርዌ፡ ጸዋገ፡ በልዖ፡ ለዮሴፍ፡ ወላሐዉ፡ ምስሌሁ፡ ኵሉ፡ ሰብአ፡ ቤቱ፡ በዛቲ፡ ዕለት፡ *ወሀለዉ፡
      እንዘ፡ የሐምሙ፡ ወይላሐዉ፡ ምስሌሁ፡ ኵላ፡ ይእቲ፡ ዕለት። ወተንሥኡ፡ ውሉዱ፡ ወወለቱ፡ ከመ፡ ይናዝዝዎ፡ ወኢተናዘዘ፡ በእንተ፡
      ፲፬ ወልዱ። ወበውእቱ፡ ዕለት፡ ሰምዐት፡ ባላን፡ ከመ፡ ተሐጕለ፡ ዮሴፍ፡ ወእንዘ፡ ትለሐዎ፡ ሞተት፡ ፲፭ ወይእቲ፡ ሀለወት፡
      ትነብር፡ ውስተ፡ ቀፍራቲፍ፡ ወዳኖኒ፡ ወለቱ፡ ሞተት፡ እምድኅረ፡ ተሐጕለ፡ ዮሴፍ። ወበጽሑ፡ ለእስራኤል፡ ዝንቱ፡ ሠለስቱ፡
      ላህ፡ በወርኀ፡ አሐዱ። ወቀበርዋ፡ ፲፮ ለባላን፡ አንጻረ፡ *መቃብረ፡ ራሔል፡ ወዳናሃኒ፡ ወለተ፡ ቀበሩ፡ ህየ። ወሀሎ፡ እንዘ፡
