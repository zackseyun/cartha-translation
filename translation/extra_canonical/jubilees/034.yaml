  - verse: 18
    geez: ላላሑ፡ በእንተ፡ ወልድየ። በእንተዝ፡ ተሠርዐ፡ ዲበ፡ ውሉደ፡ እስራኤል፡ ከመ፡ ይሕመሙ፡ *በዐሡረ፡ ወርኅ፡ ዘሰብዑ፡
