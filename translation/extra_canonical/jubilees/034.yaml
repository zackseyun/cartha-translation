  - verse: 20
    geez: ስሕተቶሙ፡ ከመ፡ ያንጽሑ፡ ርእሶሙ፡ በዛቲ፡ ዕለት፡ ምዕረ፡ ለዓመት። ወእምድኅረ፡ ተሐጕለ፡ ዮሴፍ፡ ነሥኡ፡ *ሰርእሶሙ፡
      ውሉደ፡ ያዕቆብ፡ አንስትያ፡ ስማ፡ ለብእሲተ፡ ሮቤል፡ አዳ፡ ወስማ፡ ለብእሲተ፡ ስምዖን፡ አዲባአ፡ ከናዊት፤ ወስማ፡ ለብእሲተ፡
      ሌዊ፡ ሜልካ፡ እምአዋልደ፡ አራም፡ እምዘርአ፡ ውሉደ፡ ታራን፤ ወስማ፡ ለብእሲተ፡ ይሁዳ፡ ቤተሱኤል፡ ከነናዊት፤ ወስማ፡ ለብእሲተ፡
      ይሳኮር፡ ሒዘቃ፡ ወስማ፡ ለብእሲተ፡ ዛቡሎን፡ ኒአማን፡ ወስማ፡ ለብእሲተ፡ ዳን፡ ኤግላ፤ ወስማ፡ ለብእሲተ፡ ንፍታሌም፡ ረሱአ፡
      እንተ፡ ሜስጶጦምያ፡ ወስማ፡ ለብእሲተ፡ ጋድ፡ ማካ፤ ወስማ፡ ለብእሲተ፡ አሴር፡ ኢዮና፡ ወስማ፡ ለብእሲተ፡ ዮሴፍ፡ አስኔት፡
      ግብጻዊት፤ ወስማ፡
  - verse: 21
    geez: ለብእሲተ፡ ብንያም፡ ኢያስካ፡ ወተመይጠ፡ ስምዖን፡ ወነሥአ፡ ብእሲተ፡ እም፡ *ሜስጶ ጦምያ፡ ካልእተ፡ ከመ፡ አኅዊሁ።
