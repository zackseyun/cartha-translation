  rows:
  - verse: 1
    geez: ዘቀተሎ፡ ወዘለፎ፡ እግዚአብሔር፡ ለቃየን፡ *በእንተ፡ አቤል፡ በእንተ፡ ዘቀተሎ፡ ወገብረ፡
  - verse: 2
    geez: ወበኃምስ፡ *ወለደታ፡ ለአዋን፡ ወለቱ። ወበቀዳሚሁ፡ ለኢዮቤሌው፡ ሣልስ፡ ቀተሎ፡ ቃየን፡ ለአቤል፡ እስመ፡ ተወክፈ፡
      *ቍርባኖ፡ ለአቤል፡ ወለቃየእሰ፡ ኢተወክፈ፡ መሥዋዕቶ።
  - verse: 3
    geez: ወቀተሎ*፡ በገዳም፡ ወጸርኀ፡ ደሙ፡ እምድር፡ ውስተ፡ ሰማይ፡ እንዘ፡ ይስኪ፡ በእንተ፡
  - verse: 5
    geez: ሎቱ፡ እኁ፡ ደበ፡ ምድር፡ *በእንተ፡ ደመ፡ እኁሁ፡ ወረገሞ፡ በዲበ፡ ምድር። ወበእንተ፡ ዝንቱ፡ ተጽሕፈ፡ ውስተ፡
      ጽላተ፡ ሰማይ፡ ርጉም፡ ዘይዘብጥ፡ ካልአ፡ በእኩይ፡ ወይብሉ፡ ኵሎሙ፡ እለ፡ ርእዩ፡ ወሰምዑ፡ ይኩን፡ ወሰብእ፡ ዘርእየ፡
      ወአነገረ፡ ይኩን፡ ርጉመ፡ ከማሁ።
  - verse: 6
    geez: ወበእንተዝ፡ ንሕነ፡ *ናየድዕ፡ መጻእነ፡ ቅድመ፡ እግዚአብሔር፡ አምላክነ፡ ኵሎ፡ ኀጢአተ፡
  - verse: 7
    geez: ዘይከውን፡ ውስተ፡ ሰማይ፡ ወምድር፡ ወዘበብርሃን፡ ወዘበጽልመት፡ ወዘበኵሉ፡ ወሀለዉ፡ አዳም፡ ወብእሲቱ፡ እንዘ፡ ይላህዉ፡
      በእንተ፡ አቤል፡ አርባዕተ፡ ሱባዔ፡ ዓመት፡ ወበራብዕ፡ ዓመት፡ *ዘሱባዔ፡ ኃምስ፡ ተፈሥሑ፡ ወአእመራ፡ አዳም፡ ዳግመ፡ ለብእሲቱ፡
      ወወለደት፡ ሎቱ፡ ወልደ፡ ወሰመዮ፡ ስሞ፡ ሴት፡ እስመ፡ ይቤ፡ አንሥአ፡ ሊተ፡ እግዚአብሔር፡ ዘርአ፡ ውስተ፡ ምድር፡ ካልአ፡
      ህየንተ፡ አቤል፡ እስመ፡ ቀተሎ፡ ቃየን። ወበሱባዔ፡ ሳድስ፡ ወለደ፡ ለአዝራ፡ ወለቶ። ወነሥአ፡ ቃየን፡ አዋን፡ እኅቶ፡ ሎቱ፡
      ብእሲተ፡ ወወለደት፡ ሎቱ፡ ሄኖክሃ፡ በፍጻሜ፡ ራብዕ፡ ኢዮቤልው፡ ወበአሐዱ፡ ዓመት፡ ዘሱባዔ፡ ቀዳማ፡ ዘኃምስ፡ ኢዮቤልው፡
      ተሐንጸ፡ አብያት፡ ውስተ፡ ምድር፡ ወሐነጸ፡ ቃየን፡ ሀገረ፡ ወሰመያ፡ ስማ፡ በስመ፡ ወልዱ፡ ሄኖክ። ወአዳም፡ አእመራ፡ ለሔዋ፡
      ብእሲቱ፡ ወወለደት፡ ፱ተ፡ ተስዓተ፡ ደቂቀ። ወበሱባዔ፡ ኃምስ፡ ዘኃምስ፡ ኢዮቤልው፡ ነሥአ፡ ሴት፡ አዙራ፡ እኅቶ፡ ሎቱ፡
      ብእሲተ፡ ወበራብዕ፡ ወለደት፡ ሎቱ፡ ሄኖስሃ። ውእቱ፡ ቀደመ፡ ጸውዖ፡ ስመ፡ እግዚአብሔር፡ በዲበ፡ ምድር። ወበሳብዕ፡ ኢዮቤልው፡
      በሱባዔ፡ ሣልስ፡ ነሥአ፡ ሄኖስ፡ ኖአምሃ፡ እኅቶ፡ ሎቱ፡ ብእሲተ፡ ወወለደት፡ ሎቱ፡ ወልደ፡ በሣልስ፡ ዓመት፡ ዘኃምስ፡ ሱባዔ፡
      ወሰመዮ፡ ስሞ፡ ቃይናን። ወበፍጻሜ፡ ሳምን፡ ኢዮቤልው፡ ነሥአ፡ ሎቱ፡ ቃይናን፡ ብእሲተ፡ ሙአሌሌትሃ፡ እኅቶ፡ ወወለደት፡
      ሎቱ፡ ወልደ፡ በታስዕ፡ ኢዮቤልው፡ በሱባዔ፡ ቀዳማ፡ በሣልስ፡ ዓመት፡ በሱባዔሁ፡ ለዝ፡ ወጸውዑ፡ ስሞ፡ መላልኤል፡ ወበካልእ፡
      ሱባዔ፡ ዘዓሥር፡ ኢዮቤልው፡ ነሥአ፡ ሎቱ፡ መላልኤል፡ ብእሲተ፡ ዲናሃ፡ ወለተ፡ ባራኪኤል፡ ወለተ፡ እኅተ፡ አቡሁ፡ [ሎቱ፡
      ብእሲተ፡] ወወለደት፡ ሎቱ፡ ወልደ፡ በሱባዔ፡ ሣልስ፡ በሳድስ፡ ዓመቱ፡ ወጸውዑ፡ ስሞ፡ ያሬድ። እስመ፡ በመዋዕሊሁ፡ ወረዱ፡
      መላእክተ፡ እግዚአብሔር፡ ውስተ፡ ምድር፡ እለ፡ ተሰምዩ፡ ትጉሃነ፡ ከመ፡ ይምሀርዎሙ፡ ለደቂቀ፡ እጓለ፡ እመሕያው፡
  - verse: 16
    geez: ወይግበሩ፡ *ፍትሐ፡ ወርተዐ፡ በዲበ፡ ምድር። ወበ፲ሥር፡ ወአሐዱ፡ ኢዮቤልዉ፡ ነሥአ፡ ሎቱ፡ ያሬድ፡ ብእሲተ፡ ወስማ፡
      *ባረካ፡ ወለተ፡ ራሱያል፡ ወለተ፡ እኅተ፡ አቡሁ፡ [ሎቱ፡ ብእሲተ፡] በሱባዔ፡ ፬ብዕ፡ ዘኪያቤልዉ፡ *ዝንቱ፡ ወወለደት፡
      ሎቱ፡ ወልደ፡ በ"ሱባዔ፡ ኃምስ፡ በ፬ብዕ፡
  - verse: 17
    geez: ዓመት፡" ዘኢዮቤልዉ፡ ወጸውዐ፡" ስሞ፡ ሄኖክ። ውእቱ፡ *እግዚ፡ ቀዳሚ፡ ዘተምህረ፡ መጽሐፈ፡" ወትምህርተ፡" ወጥበበ፡
      እምእጓለ፡ እመሕያው፡ እምእለ፡ ተወልዱ፡ ዲበ፡ ምድር፡ ወዘጸሐፈ፡ ተአምረ፡ ሰማይ፡ በከመ፡ ሥርዐተ፡ አውራኅሆሙ፡ ውስተ፡
      መጽሐፍ፡ ከመ፡ ይእምሩ፡
  - verse: 18
    geez: እጓለ፡ እመሕያው፡ ጊዜ፡ ዓመታት፡ በከመ፡ ሥርዐታቲሆሙ፡ ለለ፡ ወርኆሙ። ውእቱ፡ ቀዳሚ፡ ጸሐፈ፡ *ስምዐ፡ ወአስምዐ፡"
      ለደቂቀ፡ እጓለ፡ እመሕያው፡ ውስተ፡ ትዝምደ፡ ምድር፡ ወሱባዔሆሙ፡" ለኢዮቤልውሳት፡ ነገረ፡ *ወመዋዕለ፡ ዓመታት፡" አይድዐ፡"
      ወአውራኅ፡ ሰርዐ፡"
  - verse: 19
    geez: ወሰንበታት፡ ዓመታት፡ ነገረ፡ በከመ፡ አይዳዕናሁ። *ወዘኮነ፡ ወዘይከውን፡ ርእየ፡ *በራእየ፡ ንዋሙ፡" ዘከመ፡ ይከውን፡
      ዲበ፡ ደቂቀ፡ እጓለ፡ እመሕያው፡ በ"ትውልዶሙ፡ እስከ፡ አመ፡ ዕለተ፡ ደይን፡ ኵሎ፡ ርእየ፡ ወአእመረ፡" ወጸሐፈ፡ ስምዖ፡"
      ወአንበረ፡ ሰስምዐ፡" ዲበ፡ ምድር፡ ላዕለ፡
  - verse: 20
    geez: ኵሉ፡" ደቂቀ፡ እጓለ፡ እመሕያው፡ ወበ"ትውልዶሙ። ወበአሠርቱ፡ ወክልኤቱ፡" ኢዮቤልዉ፡ በሳብዕ፡ ሱባዔሁ፡ ነሥአ፡
      ሎቱ፡ ብእሲተ፡ ወስማ፡ *እድኒ፡ ወለተ፡ ዳንኤል፡ ወለተ፡ እኅተ፡ አቡሁ፡" [ሎቱ፡ ብእሲተ፡] ወበሳድስ፡ ዓመት፡ በሱባዔሁ፡
      ለዝ፡ ወለደት፡ ሎቱ፡ ወልደ፡ ወጸውዐ፡" ስሞ፡
  - verse: 21
    geez: ማቱሳላ። ወሀሎ፡ እንከ፡ ምስለ፡ መላእክት፡ አምላክ፡ ስድስተ፡" *ዘኢዮቤልውሳት፡ ዓመታት፡" ወአርአይዎ፡" ኵሎ፡
      ዘውስተ፡ ምድር፡ ወዘበሰማያት፡ ሥልጣነ፡ ለፀሐይ፡" ወጸሐፈ፡ ኵሎ።
  - verse: 22
    geez: ወአስምዐ፡ ሰትጉሃን፡ ለእለ፡ አበሱ፡ ምስለ፡ አዋልደ፡ ሰብእ፡ እስመ፡ *አኀዙ፡ እሉ፡" ይደመሩ፡ ከመ፡ ይርኩሱ፡
      ምስለ፡ አዋልደ፡ ሰብእ፡' ወአስምዐ፡ ሄኖክ፡' ላዕለ፡ ኵሎሙ። ወተንሥአ፡ እማእከለ፡ 23 ደቂቀ፡ እጓለ፡ እመሕያው፡ ወወሰድናሁ፡
      ውስተ፡ ገነት፡' ኤዶም፡ ለዕበይ፡ ወለክብር፡ ወናሁ፡ ውእቱ፡ *በህየ፡ ይጽሕፍ፡' ደይነ፡ ወኵነኔ፡ ዓለም፡ ወኵሎ፡ አክዮሙ፡
      ለደቂቀ፡ እጓለ፡ እመሕያው። ወበእንቲአሁ፡' አምጽአ፡ ማየ፡ አይኅ፡' ዲበ፡' ኵሉ፡ ምድረ፡ ኤዶም፡ እስመ፡ ህየ፡ ተውህበ፡
      *ውእቱ፡ 24 ለትእምርት፡' ወከመ፡'° ይስምዕ፡ ላዕለ፡ ኵሉ፡ ደቂቀ፡ ሰብእ፡" ከመ፡ ይንገር፡ ኵሎ፡ ግብረ፡ ትውልድ፡
      እስከ፡ አመ፡" ዕለት፡ ደይን። ወውእቱ፡ ዐጠነ፡ ዕጣነ፡ ቤተ፡" መቅደስ፡ ዘይሰጠው፡ ቅድመ፡ እግዚ 25 አብሔር፡ *በደብረ፡
