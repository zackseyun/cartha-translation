translation:
  text: '1. And the LORD reproved Cain because of Abel, because he had killed him.

    2. And in the fifth week she bore him his daughter Awan. And in the first year
    of the third jubilee Cain killed Abel, because Abel’s offering was accepted, but
    his sacrifice was not accepted.

    3. And he killed him in the field, and his blood cried out from the ground to
    heaven, making accusation because of him.

    4. And therefore the LORD rebuked Cain because of Abel, because he had killed
    him; and he made him a fugitive upon the earth because of the blood of his brother,
    and he cursed him upon the earth.

    5. And because of this it is written on the heavenly tablets: “Cursed is he who
    strikes his neighbor maliciously”; and let all who see and hear say, “So be it”;
    and the man who has seen and reported, let him be cursed in the same way.

    6. And for this reason we declare, when we come before the LORD our God, all the
    sins

    7. that are committed in heaven and on earth, and in light and in darkness, and
    in every place. And Adam and his wife mourned for Abel four weeks of years. And
    in the fourth year of the fifth week they became joyful, and Adam again knew his
    wife, and she bore him a son, and he called his name Seth; for he said, “The LORD
    has raised up for me another seed on the earth in place of Abel, because Cain
    killed him.” And in the sixth week he fathered his daughter Azura. And Cain took
    Awan his sister as a wife, and she bore him Enoch at the end of the fourth jubilee.
    And in the first year of the first week of the fifth jubilee, houses were built
    on the earth, and Cain built a city and named it after his son Enoch. And Adam
    knew Eve his wife, and she bore nine more sons. And in the fifth week of the fifth
    jubilee Seth took Azura his sister as a wife, and in the fourth year she bore
    him Enos. He was the first to call on the name of the LORD on the earth. And in
    the seventh jubilee, in the third week, Enos took Noam his sister as a wife, and
    she bore him a son in the third year of the fifth week, and he called his name
    Kenan. And at the end of the eighth jubilee Kenan took Mualeleth his sister as
    a wife, and she bore him a son in the ninth jubilee, in the first week, in the
    third year of that week, and they called his name Mahalalel. And in the second
    week of the tenth jubilee Mahalalel took Dinah, the daughter of Barakiel, his
    father’s brother’s daughter, as a wife, and she bore him a son in the third week,
    in its sixth year, and they called his name Jared. For in his days the angels
    of the LORD descended to the earth, those who are called the Watchers, so that
    they might instruct the children of men,

    8. and that they might do justice and uprightness on the earth.

    9. And in the eleventh jubilee Jared took for himself a wife, and her name was
    Baraka, the daughter of Rasujal, his father’s brother’s daughter, in the fourth
    week of this jubilee; and she bore him a son in the fifth week, in the fourth
    year of it,

    10. and he called his name Enoch.

    11. He was the first among those born on earth who learned writing and instruction
    and wisdom, and who wrote down the signs of heaven according to the order of their
    months in a book, so that the children of men might know the seasons of the years
    according to the order of each of their months.

    12. He was the first to write a testimony, and he testified to the children of
    men among the generations of the earth, and recounted the weeks of the jubilees,
    and made known the days of the years, and set in order the months,

    13. and recounted the sabbaths of the years, as we made it known to him. And what
    was and what will be he saw in a vision of his sleep, as it will happen among
    the children of men throughout their generations until the day of judgment; he
    saw and understood everything, and wrote his testimony, and placed the testimony
    on the earth against all the children of men and for their generations.

    14. And in the twelfth jubilee, in its seventh week, he took for himself a wife,
    and her name was Edni, the daughter of Danel, his father’s brother’s daughter;
    and in the sixth year of this week she bore him a son, and he called his name
    Methuselah.

    15. And he was still with the angels of God six jubilees of years, and they showed
    him everything that is on earth and in the heavens, the rule of the sun, and he
    wrote down everything.

    16. And he testified against the Watchers who had sinned with the daughters of
    men; for these had begun to join themselves with the daughters of men so as to
    defile themselves. And Enoch testified against them all. And he was taken from
    among the children of men, and we brought him into the garden of Eden for greatness
    and honor. And behold, he is there writing condemnation and judgment of the world,
    and all the wickedness of the children of men. And because of him the floodwaters
    did not come upon all the land of Eden, for there he was set as a sign and to
    testify against all the children of men, so that he might recount all the deeds
    of the generations until the day of judgment.

    17. And he burned the incense of the sanctuary, the acceptable incense before
    the LORD, on the mountain of incense. For there are four places of the LORD on
    the earth: the garden of Eden, and the mountain of the east, and this mountain
    on which you are today, Mount Sinai, and Mount Zion, which will be sanctified
    in the new creation for the sanctification of the earth. Therefore the earth will
    be sanctified from all guilt and from all uncleanness throughout the generations
    of the age. And in the fourteenth jubilee Methuselah took Edna, the daughter of
    Azrial, his father’s brother’s daughter, as a wife; and in the third week, in
    the first year of that week, she bore a son, and he called his name Lamech. And
    in the fifteenth jubilee, in the third week, Lamech took a wife, and her name
    was Betenos, the daughter of Barakiel, his father’s brother’s daughter; and in
    this week she bore him a son, and he called his name Noah, saying, “This one will
    comfort me for my sorrow and for all my work, and for the ground which the LORD
    has cursed.”

    18. And at the end of the nineteenth jubilee, in the seventh week, in its sixth
    year, Adam died, and all his sons buried him in the land of his creation; and
    he was the first to be buried in the earth.

    19. And he lacked seventy years of one thousand years, for one thousand years
    are like one day in the testimony of heaven. Therefore it is written concerning
    the tree of knowledge, “On the day you eat from it you will die.” For this reason
    he did not complete the years of this day, because in it he died.

    20. At the close of this jubilee Cain was killed after him in the same year; and
    his house fell upon him, and he died in the midst of his house, and he was killed
    by its stones, because with a stone he had killed Abel.

    21. And by a stone he was killed in righteous judgment. Therefore it was ordained
    on the heavenly tablets: “With the instrument by which a man kills his neighbor,
    by it he shall be killed; as he wounded him, so shall they do to him.”

    22. And in the twenty-fifth jubilee Noah took for himself a wife, and her name
    was Emzara, the daughter of Rake’el, his father’s brother’s daughter, in the first
    year of the fifth week; and in the third year she bore him Shem, and in the fifth
    year she bore him Ham, and in the first year of the sixth week she bore him Japheth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '4'
    text: Verse 4 is not separately preserved as a numbered row in the working corpus,
      but its sense is carried by the opening repetition and the continuation into
      verse 5. The translation supplies the likely intervening sense from the immediate
      Ge'ez context without over-expansion.
    reason: segmentation_note
  - marker: 6-7
    text: The sentence beginning 'And for this reason we declare...' is textually
      compressed across the row break. The translation keeps the sense of a formal
      declaration of sins before God, though the exact syntax is difficult.
    reason: segmentation_note
  - marker: '7'
    text: '''Week'' here and throughout the chapter refers to Jubilees’s chronological
      system, often a week of years. The main text keeps the shorter term while preserving
      ''jubilee'' explicitly.'
    reason: cultural_note
  - marker: '12'
    text: The phrase rendered 'write a testimony' could also be understood as 'write
      down a record/witness.'
    reason: lexical_alternative
  - marker: '16'
    text: The clause about the flood and 'the land of Eden' is difficult. The translation
      follows the Ethiopic as preserved, though the logic of the sentence may reflect
      a compressed or unstable textual tradition.
    reason: textual_variant
  - marker: '17'
    text: The place-name rendered 'the mountain of the east' is difficult in the Ethiopic
      sequence of the four holy places. The wording is kept close to the surviving
      text rather than harmonized.
    reason: segmentation_note
  - marker: '21'
    text: 'The legal maxim echoes talionic justice: the instrument and manner of violence
      return upon the killer.'
    reason: cross_reference
lexical_decisions:
- source_word: ኢዮቤልው
  chosen: jubilee
  alternatives:
  - jubile
  - fifty-year cycle
  rationale: Preserves Jubilees’s technical chronological system rather than replacing
    it with a generic time expression.
- source_word: ሱባዔ
  chosen: week
  alternatives:
  - heptad
  - week of years
  rationale: Rendered as 'week' in the main text, with chronology understood from
    context as a week of years within Jubilees’ calendrical framework.
- source_word: ጽላተ ሰማይ
  chosen: heavenly tablets
  alternatives:
  - tablets of heaven
  rationale: A standard literal rendering that preserves the revelatory-apocalyptic
    concept central to Jubilees.
- source_word: ቍርባኖ
  chosen: offering
  alternatives:
  - gift
  - oblation
  rationale: Best broad cultic term here; paired with 'sacrifice' for the second noun
    to preserve the source’s variation.
- source_word: መሥዋዕቶ
  chosen: sacrifice
  alternatives:
  - offering
  rationale: Maintains lexical distinction from ቍርባኖ in the same verse.
- source_word: ጸርኀ ደሙ
  chosen: his blood cried out
  alternatives:
  - his blood called out
  rationale: Natural English that still preserves the allusive judicial force of Abel’s
    blood appealing to heaven.
- source_word: ይስኪ በእንተ
  chosen: making accusation because of him
  alternatives:
  - to accuse him
  - seeking vengeance for him
  rationale: Captures the forensic sense implied by the blood’s cry without over-paraphrasing.
- source_word: ይዘብጥ ካልአ በእኩይ
  chosen: strikes his neighbor maliciously
  alternatives:
  - kills another wickedly
  - smites another evilly
  rationale: Conveys interpersonal violence with moral culpability; 'neighbor' fits
    the ethical-juridical register.
- source_word: ናየድዕ መጻእነ ቅድመ እግዚአብሔር
  chosen: we declare, when we come before the LORD
  alternatives:
  - we make known before the LORD
  - we recount before the LORD
  rationale: Reflects a liturgical/judicial declaration rather than mere cognition.
- source_word: አንሥአ ሊተ ... ዘርአ
  chosen: has raised up for me another seed
  alternatives:
  - has appointed for me another offspring
  rationale: Preserves the seed/offspring language important to biblical genealogy
    theology.
- source_word: ትጉሃነ
  chosen: the Watchers
  alternatives:
  - the vigilant ones
  rationale: This is the established rendering for the angelic class in Enochic/Jubilees
    literature and preserves intertextual meaning.
- source_word: ፍትሐ ወርተዐ
  chosen: justice and uprightness
  alternatives:
  - judgment and righteousness
  rationale: Readable modern English while preserving the paired ethical ideals.
- source_word: ተአምረ ሰማይ
  chosen: the signs of heaven
  alternatives:
  - the wonders of heaven
  - the heavenly portents
  rationale: Fits the astronomical-calendrical context better than a purely miraculous
    sense.
- source_word: ስምዐ
  chosen: testimony
  alternatives:
  - record
  - witness
  rationale: Keeps the juridical-prophetic nuance of what Enoch wrote and deposited.
- source_word: ሥልጣነ ለፀሐይ
  chosen: the rule of the sun
  alternatives:
  - the dominion of the sun
  - the course of the sun
  rationale: A literal rendering that preserves cosmic-order language.
- source_word: ገነት ኤዶም
  chosen: the garden of Eden
  alternatives:
  - Paradise of Eden
  rationale: Conventional readable form for the place-name while preserving the Eden
    tradition.
- source_word: ደብረ ቀትር
  chosen: the mountain of incense
  alternatives:
  - mountain of fragrance
  rationale: Best fit for the cultic context of incense burning; preserves the place’s
    symbolic function.
- source_word: ፍጥረት ሐዳስ
  chosen: the new creation
  alternatives:
  - newly created order
  - renewed creation
  rationale: Preserves the eschatological force of the phrase in a concise, theologically
    resonant way.
- source_word: አበሳ
  chosen: guilt
  alternatives:
  - sin
  - transgression
  rationale: In the paired phrase with uncleanness, 'guilt' preserves moral liability
    distinct from ritual impurity.
- source_word: ርኵስ
  chosen: uncleanness
  alternatives:
  - defilement
  - impurity
  rationale: Maintains the ritual-moral register common in priestly and apocalyptic
    texts.
- source_word: ያናዝዘኒ
  chosen: will comfort me
  alternatives:
  - will console me
  - will give me rest
  rationale: Best reflects the naming explanation for Noah in this Ethiopic form while
