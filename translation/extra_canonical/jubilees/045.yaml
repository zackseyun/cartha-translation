translation:
  text: '1. And Israel entered the land of Egypt, into the land of Goshen, at the
    new moon of the fourth month.

    2. It was in the second year of the third week of the forty-second jubilee. And
    Joseph came to receive his father Jacob in the land of Goshen, and he embraced
    his father''s neck and wept.

    3. And Israel said to Joseph, "Now let me die, since I have seen you; and now
    may the LORD, the God of Israel, the God of Abraham and the God of Isaac, be blessed—he
    who has not withheld mercy and compassion

    4. from his servant Jacob. Great for me is this, that I have seen your face while
    I am still alive, because the vision that I saw at Bethel was truly established.
    May the LORD my God be blessed forever and ever, and blessed be his name."

    5. And Joseph and his brothers ate bread before their father, and they drank wine.
    And Jacob rejoiced with very great joy because he saw Joseph eating with his brothers
    and drinking before him. And he blessed the Creator of all, who had preserved
    him and had preserved for him his twelve sons.

    6. And Joseph gave his father and his brothers a possession so that they might
    dwell in the land of Goshen, and in Rameses and all its territory that was under
    Pharaoh''s authority before him. And Israel and his sons settled in the land of
    Goshen, the best part of the land of Egypt. And Israel was one hundred and thirty
    years old when he entered Egypt.

    7. And Joseph sustained his father and his brothers, and he provided for them
    and all that was theirs, as was sufficient for them during the seven years of
    famine.

    8. And the land of Egypt suffered because of the famine, and Joseph acquired all
    the land of Egypt for Pharaoh in exchange for grain, and their people and their
    livestock and everything became Pharaoh''s property.

    9. And the years of famine were completed, and Joseph gave the people who were
    in the land seed and food, so that they might sow the land in the seventh year,
    because the river had filled all the land of Egypt.

    10. For during the seven years of famine it had not overflowed and had not risen,
    except in a few places by the banks of the river; but now it overflowed, and Egypt
    sowed the land and gathered very much grain in that year.

    11. And that year was the first year of the fourth week of the forty-fourth jubilee.

    12. And Joseph took a fifth of everything that was produced for the king, and
    four parts he left to them for food and for seed.

    13. And Joseph made it an ordinance for the land of Egypt to this day. And Israel
    lived in the land of Egypt seventeen years, and all the days that he lived were
    three jubilees, one hundred and forty-seven years. And he died in the fourth year
    of the fifth week of the forty-fifth jubilee.

    14. And before he died, Israel blessed his sons and told them everything that
    would happen to them in the land of Egypt and in later days, as it would come
    upon them.

    15. And he blessed them, and he gave Joseph a double portion in the land. And
    he slept with his fathers and was buried in the double cave in the land of Canaan,
    near Abraham his father,

    16. in the tomb which he had dug for himself in the double cave in the land of
    Hebron. And he gave all his books and the books of his fathers to Levi his son,
    so that he might preserve them and renew them for his children until this day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '2'
    text: The Ge'ez text literally reads 'forty-second' (፵ወ፪), though the internal
      chronology of Jubilees requires this to be the forty-fifth jubilee.
    reason: textual_variant
  - marker: '9'
    text: The clause 'in the seventh year' is textually and contextually difficult.
      It may reflect the year following the seven-year famine, or a segmentation issue
      in the extracted row.
    reason: segmentation_note
  - marker: '11'
    text: The chronological notice appears difficult against the chapter's earlier
      dating formulas. The Ethiopic text is translated as given, but the jubilee numbering
      may reflect a textual problem or corruption in transmission.
    reason: textual_variant
  - marker: '15'
    text: Literally 'the double cave.' This corresponds to the ancestral burial cave
      known elsewhere as Machpelah.
    reason: cross_reference
  - marker: '16'
    text: '''Renew them'' may imply preserving the books by recopying, restoring,
      or transmitting them afresh to later generations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ሠርቀ፡ ወርኅ
  chosen: at the new moon
  alternatives:
  - at the rising of the month
  - at the beginning of the month
  rationale: The phrase denotes the month's appearance/beginning. 'New moon' preserves
    Jubilees's calendrical precision better than a generic 'beginning of the month'.
- source_word: ሣልስ ... እዮቤልው
  chosen: the third week ... of the forty-second jubilee
  alternatives:
  - the third heptad
  - the third sabbath of years
  rationale: Jubilees uses a fixed chronological scheme of jubilees and weeks of years.
    'Week' is the most readable English equivalent while preserving the technical
    chronology. The number was corrected to 'forty-second' to match the Ge'ez ፵ወ፪.
- source_word: ይትቀበል
  chosen: came to receive
  alternatives:
  - came to meet
  - came to welcome
  rationale: The verb can mean receive or welcome. 'Receive' stays closer to the Ge'ez
    while still making sense in context.
- source_word: ምሕረተ፡ ወሣህሎ
  chosen: mercy and compassion
  alternatives:
  - mercy and favor
  - pity and grace
  rationale: A paired expression of divine benevolence; 'mercy and compassion' preserves
    the emotional and covenantal force without archaic diction.
- source_word: ዘአክአለ
  chosen: has not withheld
  alternatives:
  - has shown
  - has restrained from withholding
  rationale: The context implies God did not deny Jacob mercy. This rendering fits
    the syntax and preserves the sense of divine generosity.
- source_word: ፈጣሪ፡ ኵሉ
  chosen: the Creator of all
  alternatives:
  - the maker of everything
  - the creator of the whole
  rationale: A reverential divine title; 'Creator of all' is natural English and preserves
    the universal scope.
- source_word: ሀብተ
  chosen: a possession
  alternatives:
  - property
  - inheritance
  - holding
  rationale: The term indicates a granted holding/place to dwell. 'Possession' preserves
    the legal flavor without over-specifying inheritance.
- source_word: ራሜሲና
  chosen: Rameses
  alternatives:
  - Raamses
  - Ramesses
  rationale: Conventional readable English form of the place-name, suitable for a
    public-facing translation.
- source_word: ምሥናይሃ
  chosen: the best part
  alternatives:
  - the choicest part
  - the finest
  rationale: The word marks the excellence of Goshen within Egypt; 'best part' is
    clear and idiomatic.
- source_word: ሴሰዮሙ / ጥሪቶሙ
  chosen: sustained ... provided for
  alternatives:
  - fed ... supported
  - nourished ... maintained
  rationale: The paired verbs emphasize Joseph's ongoing material care during famine.
    Using two related English verbs preserves the fullness of provision.
- source_word: ዐባር
  chosen: famine
  alternatives:
  - hunger
  - dearth
  rationale: The context is the seven-year crisis; 'famine' is the standard and clearest
    rendering.
- source_word: አስተጋብአ፡ ... ለፈርዖን
  chosen: acquired ... for Pharaoh
  alternatives:
  - gathered ... for Pharaoh
  - collected ... for Pharaoh
  rationale: The verse describes Joseph bringing land and property under Pharaoh's
    ownership, so 'acquired' best reflects the economic transfer.
- source_word: ፈለግ
  chosen: the river
  alternatives:
  - the Nile
  - the stream
  rationale: The Ge'ez says 'river' rather than naming the Nile explicitly. Main text
    keeps the source's wording; the referent is obviously the Nile in context.
- source_word: ኃምስቶ ... ራብዕተ እደ
  chosen: a fifth ... four parts
  alternatives:
  - one-fifth ... four-fifths
  rationale: This preserves the fiscal arrangement clearly while staying close to
    the source's distributive phrasing.
- source_word: ሥርዐተ
  chosen: an ordinance
  alternatives:
  - a statute
  - a rule
  - a law
  rationale: The term denotes an established legal arrangement. 'Ordinance' preserves
    formal force without sounding overly technical.
- source_word: ክልኤተ፡ መክፈሊተ
  chosen: a double portion
  alternatives:
  - two shares
  - a twofold allotment
  rationale: This is the conventional and accurate expression for Joseph's enhanced
    inheritance share.
- source_word: በዐት፡ ዘካዕበት
  chosen: the double cave
  alternatives:
  - the cave of Machpelah
  - the doubled cave
  rationale: The Ge'ez expression is transparent in meaning. Rendering it literally
    avoids importing the later Hebrew place-name into the main text while preserving
    the sense.
- source_word: መጻሕፍቲሁ ... ያሐድሶን
  chosen: his books ... renew them
  alternatives:
  - writings ... copy them anew
  - books ... restore them
  rationale: Jubilees emphasizes written transmission. 'Books' is the natural rendering
    of the Ge'ez term, and 'renew them' preserves the idea of preserving by recopying
    or refreshing the textual tradition.
theological_decisions:
