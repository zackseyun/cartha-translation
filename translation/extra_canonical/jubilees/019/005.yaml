translation:
  text: He spoke with the sons of Heth so that they might give him a place in which to bury his dead. And the LORD gave him favor before all who saw him[5], and he entreated courteously of the sons of Heth, and they gave him the land of the double cave, which is opposite Mamre—
  philosophy: optimal-equivalence
  footnotes:
  - marker: '5'
    text: 'Verses 24-26 use elevated cosmological language: ''support heaven,'' ''strengthen the earth,'' and ''renew all the lights above the firmament.'' This is preserved as-is rather than reduced to a mere metaphor for prosperity.'
    reason: cultural_note
  - marker: a
    text: Or 'so that they might give him a place'.
    reason: previous_rendering
