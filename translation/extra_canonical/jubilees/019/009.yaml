translation:
  text: In this, Abraham was found faithful, patient in spirit. And he did not speak a word concerning the promise of the land, which the LORD had said he would give to him and to his seed after him, yet he asked there for a place to bury his dead, because he was found faithful, and he was recorded as a friend of the LORD on the heavenly tablets.
