translation:
  text: '1. And after this I made known to you the law of the days of the sabbaths
    on Mount Sinai, which is between Elim and Sinai.

    2. And I told you about the sabbaths of the land on Mount Sinai, and the years
    of the jubilees I told you among the sabbaths of years; but the year of it I did
    not tell you until the time when you enter the land that you are to possess.

    3. And the land will keep its sabbaths while they dwell upon it, and they will
    know the year of the jubilee.

    4. Therefore I have ordained for you the weeks of years and the years and the
    jubilees: forty-nine jubilees from the days of Adam until this day, and one week
    and two years and still forty years remain for learning the commandments of the
    LORD, until they cross over into the land of Canaan, crossing the Jordan to its
    west.

    5. And the jubilees will pass by until Israel is cleansed from all guilt of fornication
    and uncleanness and pollution and sin and error, and dwells in all the land in
    confidence; and there will no longer be for them any satan or any evil one, and
    the land will be clean from that time and forever.

    6. And behold, I have written for you the command concerning the sabbaths, and
    all the judgments of its laws.

    7. Six days you shall do work, but the seventh day is a sabbath of the LORD your
    God. You shall do no work on it—you and your sons and your male servants and your
    female servants and all your animals and also the resident foreigner who is with
    you.

    8. And the man who does any work on it shall die—every man who defiles this day,
    or who lies with a woman, or who says he will do some matter on it so as to do
    business concerning all buying and selling, or who draws water on it that he had
    not prepared for himself on the sixth day, or who lifts any burden to carry it
    out from his tent or from his house—shall die.

    9. You shall do no work at all on the sabbath day except what you have prepared
    for yourselves on the sixth day, to eat and to drink and to rest and to keep sabbath
    from all work on this day, and to bless the LORD your God, who has given you a
    day of festival and a holy day and a holy day of kingship for all Israel—this
    day throughout their generations forever.

    10. For great is the honor that the LORD has given to Israel: to eat and to drink
    and to be satisfied on this festival day, and to rest on it from all work belonging
    to the labor of the children of men, except burning incense and bringing an offering
    and sacrifice before the LORD for the days and for the sabbaths.

    11. This alone shall be done on the sabbath days in the house of the sanctuary
    of the LORD your God, so that they may make atonement for Israel continually,
    day by day, as a memorial well-pleasing before the LORD, and he will receive them
    forever, day after day, according as you were commanded.

    12. And every person who does work on it, or goes on a journey, or tills his farm,
    whether in his house or in any place, or kindles a fire, or rides on any animal,
    or travels by ship on the sea, or strikes or kills anything, or slaughters an
    animal or a bird, or catches a wild beast or a bird or a fish, or fasts, or makes
    war on the sabbath day—

    13. the person who does any of these things on the sabbath day shall die, so that
    the children of Israel may keep the commandments of the sabbaths of the land,
    as it is written on the tablets that he gave into my hands so that I might write
    for you the laws of each appointed time according to the divisions of its days.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: v.4
    text: 'The chronological statement is dense and may reflect segmented units: ''forty-nine
      jubilees ... and one week and two years and still forty years remain.'' The
      translation preserves the sequence rather than smoothing it into a reconstructed
      total.'
    reason: segmentation_note
  - marker: v.4
    text: The final phrase likely means crossing the Jordan into Canaan on its western
      side; the Ethiopic wording is compressed.
    reason: lexical_alternative
  - marker: v.8
    text: The clause rendered 'buying and selling' comes from a difficult Ethiopic
      expression after 'who says he will do some matter on it.' The sense appears
      to concern planning or conducting business on the sabbath.
    reason: textual_variant
  - marker: v.9
    text: '''Holy day of kingship'' is a literal rendering of an unusual phrase. It
      may denote the sabbath''s royal dignity under God''s rule rather than a separate
      festival category.'
    reason: lexical_alternative
  - marker: v.11
    text: The phrase translated 'make atonement for Israel continually, day by day'
      is somewhat compressed in Ethiopic; the sense is ongoing cultic memorial and
      acceptance before the LORD.
    reason: segmentation_note
  - marker: v.12
    text: The verb rendered 'travels by ship on the sea' could also carry a commercial
      nuance ('does business by sea'). The broader travel sense fits the surrounding
      list of sabbath prohibitions.
    reason: lexical_alternative
  - marker: v.13
    text: The closing phrase 'according to the divisions of its days' preserves Jubilees's
      characteristic concern for ordered sacred times and calendrical partition.
    reason: cross_reference
lexical_decisions:
- source_word: ሰንበታት
  chosen: sabbaths
  alternatives:
  - weeks
  - Sabbaths
  rationale: Kept the calendrical term literally to preserve Jubilees's sabbath-based
    chronology and legal framing; context determines whether weekly sabbaths or sabbatical
    structures are in view.
- source_word: ሰንበታተ ዓመታት
  chosen: sabbaths of years
  alternatives:
  - weeks of years
  - sabbatical years
  rationale: Preserves the distinctive Jubilees idiom while allowing the reader to
    hear the sabbath pattern behind the chronology.
- source_word: ኢዮቤሌዎን / ኢዮቤሌዎታት
  chosen: jubilee / jubilees
  alternatives:
  - Jubilees
  rationale: Standard readable rendering for the calendrical institution; retained
    consistently because the chapter is heavily structured by jubilee chronology.
- source_word: ሱባዔ ዓመታት
  chosen: weeks of years
  alternatives:
  - heptads of years
  - seven-year periods
  rationale: This phrase is technical in Jubilees chronology; 'weeks of years' preserves
    the apocalyptic-calendrical density better than a paraphrase.
- source_word: አበሳ
  chosen: guilt
  alternatives:
  - transgression
  - offense
  rationale: Chosen in v.5 because the context lists moral impurities and sins comprehensively;
    'guilt' captures culpability rather than a single act.
- source_word: ዝሙት
  chosen: fornication
  alternatives:
  - sexual immorality
  rationale: Retained the more specific traditional moral term because the vice list
    is formal and legal in tone.
- source_word: ርኵስ
  chosen: uncleanness
  alternatives:
  - impurity
  rationale: Preserves ritual-moral overlap important in Jubilees.
- source_word: ግማኔ
  chosen: pollution
  alternatives:
  - defilement
  - corruption
  rationale: Used to distinguish it from the adjacent term for uncleanness and preserve
    the piling up of impurity language.
- source_word: ሰይጣነ
  chosen: satan
  alternatives:
  - adversary
  - accuser
