  rows:
  - verse: 1
    geez: ወበሳድስ፡ ዓመት፡ ዘሳብዕ፡ ሱባዔ፡ ዘዝንቱ፡ እዮቤልው፡ ጸውዐ፡ አብርሃም፡ ይስሐቅሃ፡ ወልዶ፡ ወአዘዞ፡ እንዘ፡ ይብል፡
      አነ፡ ረሳዕኩ፡ ወኢያእምር፡ ዕለተ፡ ሞትየ፡ ወጸገብኩ፡ መዋዕልየ።
  - verse: 2
    geez: ወናሁ፡ አነ፡ ወልደ፡ ምእት፡ ወሰብዓ፡ ወኃምስቱ፡ ዓመት፡ ወበኵሉ፡ መዋዕለ፡ ሕይወትየ፡ ሀሎኩ፡ እንዘ፡ እዜከር፡
      ለእግዚአብሔር፡ ወእንዘ፡ አኀሥሥ፡ በኵሉ፡ ልብየ፡ ከመ፡ እግበር፡ ፈቃደቲሁ፡
  - verse: 3
    geez: ወከመ፡ አርትዕ፡ ሐዊረ፡ በኵሉ፡ ፍናዊሁ። ጣዖተ፡ ጸልአት፡ ነፍስየ፡ ከመ፡ እትዐቀብ፡ ለገቢረ፡
  - verse: 4
    geez: ፈቃዱ፡ ለዘፈጠረኒ። እስመ፡ አምላክ፡ ሕያው፡ ውእቱ፡ ወቅዱስ፡ ውእቱ፡ ወምእመን፡ ወጻድቅ፡ ውእቱ፡ እምኵሉ፡ ወአልቦ፡
      በኀቤሁ፡ ነሢአ፡ ገጽ፡ ወነሢአ፡ ሕልያን፡ እስመ፡ አምላክ፡ ጻድቅ፡ ውእቱ፡ ወገባሬ፡ ኵነኔ፡ ውእቱ፡ እምኵሎሙ፡ እለ፡ ይትዐደዉ፡
      ትእዛዞ፡ ወለእለ፡ ይሜንኑ፡
  - verse: 5
    geez: ኪዳኖ። ወአንተኒ፡ ወልድየ፡ ዕቀብ፡ ትእዛዞ፡ ወሥርዐቶ፡ ወኵነኔሁ፡ ወኢትሖር፡ ድኅሬሆሙ፡
  - verse: 6
    geez: ለርኩሳን፡ ወድኅሬሆሙ፡ ለገሊፎ፡ ወድኅሬሆሙ፡ ለስብክ። ወኢትብልዑ፡ ወኢምዝተኒ፡
  - verse: 7
    geez: ደመ፡ ዘአርዌ፡ ወዘእንስሳ፡ ወዘኵሉ፡ ዖፍ፡ ዘይሰርር፡ ውስተ፡ ሰማይ። ወለእመ፡ ኀረድከ፡ ሕርደ፡ ለጽንሓሐ፡ ሰላም፡
      ዘይሰጠው፡ ሕርደዎ፡ ወደሞሙ፡ ትክዐዉ፡ ውስተ፡ ምሥዋዕ፡ ወኵሎ፡ ስብሐ፡ ጽንሑክ፡ ታዐርግ፡ ውስተ፡ ምሥዋዕ፡ ምስለ፡ ስንዳሌ፡
      ልውሰ፡ በቅብዕ፡ ምስለ፡ ሞ፟ጻሕቱ፡ ታዐርግ፡ ኵሎ፡ ኅቡረ፡ ዲበ፡ ምሥዋዕ፡ ጽንሓሕነ፡ መዐዛ፡ ሠናይ፡ ቅድመ፡
  - verse: 8
    geez: እግዚአብሔር። ወስብሐ፡ መሥዋዕተ፡ መድኃኒት፡ ታነብር፡ ዲበ፡ እሳት፡ ዘዲበ፡ መሥዋዕት፡ ወስብሐ፡ ዘዲበ፡ ከርሥ፡
      ወኵሎ፡ ስብሐ፡ ዘዲበ፡ ንዋየ፡ ውስት፡ ወክሊአ፡ ኵልያት፡ ወኵሎ፡
  - verse: 9
    geez: ስብሐ፡ ዘዲቤሆሙ፡ ወዘዲበ፡ መናቅፅ፡ ወከብደ፡ ምስለ፡ ኵልያት፡ ትብልእ። ወታዐርግ፡ ዘንተ፡ ኵሎ፡ ለመዐዛ፡ ሠናይ፡
      ዘይሠጠው፡ ቅድመ፡ እግዚአብሔር፡ ምስለ፡ መሥዋዕቱ፡
  - verse: 10
    geez: ወምስለ፡ ሞጻሕቱ፡ ለመዓዛ፡ ሠናይ፡ ኅብስተ፡ ጽንሓሕ፡ ለእግዚአብሔር። ወሥጋሁ፡ ብላዕ፡ በይእቲ፡ ዕለት፡ ወበሳኒታ፡
      ወኢይዕረብ፡ ላዕሌሁ፡ ፀሓይ፡ ዘአመ፡ ሳኒታ፡ እስከ፡ ሶበ፡ ይት በላዕ፡ ወኢይትርፍ፡ ለዕለት፡ ሣልስት፡ እስመ፡ ኢይሠጠዎ፡
      እስመ፡ እኩይ፡ ኅሩየ፡ ወኢይትበ ላዕ፡ እንከ፡ ወኵሎሙ፡ እለ፡ ይበልዕዎ፡ ኃጢአተ፡ ሎሙ፡ ይነሥኡ፡ እስመ፡ ከመዝ፡ ረከብኩ፡
      ጽሑፈ፡ ውስተ፡ መጽሐፈ፡ አበዊየ፡ ቀደምት፡ ወውስተ፡ ነገረ፡ ሄኖክ፡ ወውስተ፡ ነገረ፡ ኖኅ።
  - verse: 11
    geez: ወውስተ፡ ኵሉ፡ መሥዋዕቲከ፡ ትደይ፡ ፄወ፡ ወኢይደሪዕ፡ ፄወ፡ ኪዳን፡ ውስተ፡ ኵሉ፡
  - verse: 12
    geez: መሥዋዕቲከ፡ ቅድመ፡ እግዚአብሔር። ወተዓቀብ፡ በዕፀወ፡ መሥዋዕት፡ ከመ፡ ኢታብእ፡ ዕፀወ፡ ምሥዋዕ፡ ዲበ፡ ዝንቱ፡
      ከመ፡ ቍጲርሳን፡ ወጰፍሪን፡ ወስጋድ፡ ወስጥርቢሎን፡ ወጱጦን፡ ወቂድርን፡ ወሱራት፡ ወታናክ፡ ወዕፀ፡ ዘይት፡ ምርስኔ፡ ወደፍን፡
      ወቄዳር፡
  - verse: 13
    geez: '[ዘስሙ፡] አርሳትነ ወቤስም፡ ወእምእሉ፡ ዕፀው፡ አነብር፡ መትሕተ፡ ጽንሓሕ፡ ዲበ፡ ምሥዋዕ፡ ምኩረ፡ ራእዮሙ፡ ወኢታንብር፡
      ኵሎ፡ ዕፀ፡ ንቁዐ፡ ወፈዋነ ዕፀወ፡ ጽኑዓነ፡ ወንጹሐ፡ ዘአልቦ፡ ምትነኒ፡ ነወረ፡ ፍጹመ፡ ወንደስተ፡ ተከለ፡ ወኢታንብር፡
      ዕፀ፡ ብሉየ፡ እስመ፡ ወፅአ፡'
  - verse: 14
    geez: መዐዛሁ፡ እስመ፡ አልቦ፡ እንከ፡ መዐዛ፡ ላዕሌሁ፡ ከመ፡ ቀዳማዊ። ዘእንበለ፡ እሉ፡ ዕፀው፡ አልቦ፡ ዘታነብር፡ ባዕደ፡
      እስመ፡ መዐዛሁ፡ ፍሉጥ፡ ወየዐርግ፡ ፄና፡ መዐዛሁ፡ ውስተ፡ ሰማይ።
  - verse: 15
    geez: ዑቅ፡ ዛተእዛዘ፡ ወገብራ፡ ወልድየ፡ ከመ፡ ታርትዕ፡ በኵሉ፡ ግብርከ። ወበኵሉ፡ ጊዜ፡ ኩን፡ ንጹሐ፡ በሥጋከ፡ ወትሐፀብ፡
      በማይ፡ ዘእንበለ፡ ትሑር፡ ለአዕርጎ፡ ውስተ፡ ምሥዋዕ፡ ወኀፀብ፡ እዴከ፡ ወእግረከ፡ ዘእንበለ፡ ትቅረብ፡ ውስተ፡ ምሥዋዕ፡
      ወሶበ፡ ፈጸምከ፡ አዕርጎ፡ ግባእ፡
  - verse: 17
    geez: ወትሐፀብ፡ እደዊከ፡ ወእገሪከ። ወኢያስተርኢ፡ በዲቤክሙ፡ ኵሉ፡ ደም፡ በውስተ፡ አልባሲክሙ፤
  - verse: 18
    geez: ተዐቀብ፡ ወልድየ፡ በደም፡ ተዐቀብ፡ ጥቀ፡ ደፍኖ፡ ውስተ፡ ምድር። ወኢትብልዖ፡ እንከ፡
  - verse: 19
    geez: ደመ፡ እስመ፡ ነፍስ፡ ይእቲ፡ ወኢትብላዕ፡ ምትነኒ፡ ደመ። ወኢትነሣእ፡ ሕልያነ፡ ዲበ፡ ኵሉ፡ ደመ፡ ሰብእ፡ ከመ፡
      ኢይትከዐው፡ በከ፡ ዘእንበለ፡ ኵነኔ፡ እስመ፡ ደም፡ ውእቱ፡ ዘይትከዐው፡ ያንጥኦ፡ ለምድር፡ ወምድር፡ ኢትክል፡ ነጺሐ፡ እምደመ፡
      ሰብእ፡ ዘእንበለ፡
  - verse: 20
    geez: በደመ፡ ዘከዐዎ። ወኢትነሣእ፡ ሕልያነ፡ ወአምኃ፡ በደመ፡ ሰብእ፡ ደመ፡ በደም፡ ከመ፡ ትሠጠው፡ ቅድመ፡ እግዚአብሔር፡
      አምላክ፡ ልዑል፡ ወይከውን፡ ዑቃቤሁ፡ ሠናይ፡ ወከመ፡ ትትነቀቡ፡ እምኵሉ፡ እኩይ፡ ወከመ፡ ይድኅንከ፡ እምኵሉ፡ ሞት። ፈጺነ፡
      አነ፡ ወልድየ፡ ኵሎ፡ ግብረ፡ አጓለ፡ እመሕያው፡ ከመ፡ ኃጢአት፡ ወእኩይ፡ ወኵሉ፡ ገብሮሙ፡ ርኵስ፡ ወምኖ፡ ወገማኔ፡ ወአልቦ፡
      ጽድቅ፡ ምስሌሆሙ። ተዐቀብ፡ ኢትሖር፡ ውስተ፡ ፍኖቶሙ፡ ወሰከይይ፡ አሰሮሙ፡ ወኢትስሐት፡ ስሕተተ፡ ለሞት፡ ቅድመ፡ አምላክ፡
      ልዑል፡ ወየኅብእ፡ ገጾ፡ እምኔከ፡ ወይገብአከ፡ ውስተ፡ እዴ፡ ጸላእከ፡ ወይሤርወከ፡ እም፡ ምድር፡ ወዘርአከኒ፡ እምታኅተ፡
      ሰማይ፡ ወይት ሐጐል፡ ስምከ፡ ወዘርአከ፡ እምኵሉ፡ ምድር። ተገንሥ፡ እምኵሉ፡ ምግባሪሆሙ፡ ወእምኵሉ፡ ርኵሶሙ፡ ወትነቀብ፡
      ዑቃቤ፡ ዘአምላክ፡ ልዑል፡ ወገበር፡ ፈቃደቲሁ፡ ወታርኅዕ፡ በኵሉ፡ ወይባርከከ፡ በኵሉ፡ ምግባሪከ፡ ወያነሥእ፡ እምኔከ፡ ተክለ፡
      ጽድቅ፡ በኵሉ፡ ምድር፡ በኵሉ፡ ትውልደ፡ ምድር። ወኢይትረመም፡ ስምየ፡ ወስምከ፡ በመትሕተ፡ ሰማይ፡ በኵሉ፡ መዋዕል። ሖር፡
