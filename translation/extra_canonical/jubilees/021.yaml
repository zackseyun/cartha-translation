translation:
  text: '1. And in the sixth year of the seventh week of years of this jubilee, Abraham
    called Isaac his son and instructed him, saying, “I have grown old, and I do not
    know the day of my death, and my days are completed.

    2. And behold, I am one hundred seventy-five years old, and through all the days
    of my life I have remained mindful of the Lord, seeking with all my heart to do
    his will

    3. and to walk uprightly in all his paths. My soul hated idols, so that I might
    guard myself to do

    4. the will of him who created me. For he is the living God, and he is holy and
    faithful and righteous above all; and with him there is no partiality and no accepting
    of gifts, for he is a righteous God and one who executes judgment on all who transgress
    his commandment and his covenant.

    5. And you also, my son, keep his commandment and his statutes and his judgments,
    and do not walk after the impurities,

    6. or after the carved images, or after the molten images. And do not eat any
    blood

    7. of beasts or cattle or of any bird that flies in the sky. And if you slaughter
    a sacrifice for a thanksgiving of peace, slaughter it so that its blood is poured
    out upon the altar; and all the fat of the offering you shall offer up on the
    altar, together with fine flour mixed with oil and with its drink offering you
    shall offer it all together on the altar as an offering of a pleasing fragrance
    before

    8. the Lord. And the fat of the sacrifice of deliverance you shall place on the
    fire that is on the altar: the fat that is on the entrails, and all the fat that
    is on the inward parts, and the two kidneys, and all

    9. the fat that is on them, and that which is on the loins, and the liver with
    the kidneys, you shall remove. And you shall offer all this as a pleasing fragrance
    acceptable before the Lord, with its grain offering

    10. and with its drink offering, as an offering of pleasing fragrance to the Lord.
    And eat its flesh on that day and on the second day, and do not let the sun set
    on it until the second day before it is eaten; and do not leave any of it for
    the third day, because it is not acceptable, for it is an evil thing set apart,
    and it must not be eaten; and all who eat it will bear their sin. For thus I found
    written in the books of my forefathers, the former ones, and in the words of Enoch
    and in the words of Noah.

    11. And on all your offerings put salt, and do not let the salt of the covenant
    be lacking from any of

    12. your offerings before the Lord. And take care with the wood of the offering,
    so that you do not bring wood for the altar from these: vine, fig, myrtle, laurel,
    cypress, cedar, juniper, date-palm, almond, olive, myrrh, bay, and ash-wood,

    13. [called] arsatna and besem; but from among these woods place under the sacrifice
    such as have been tested in appearance. And do not place any split wood, but hard
    and clean wood, without blemish, sound and new-grown; and do not place old wood,
    because its fragrance has gone out

    14. and there is no longer fragrance on it as at first. Other than these woods,
    do not place any different kind, because its fragrance is known and the scent
    of its fragrance goes up to heaven.

    15. Keep this command and do it, my son, so that you may walk rightly in all your
    deeds. And at all times be pure in your body, and wash yourself with water before
    you come to offer on the altar; and wash your hands and your feet before you approach
    the altar; and when you have finished offering, go in

    17. and wash your hands and your feet. And let no blood be seen on you or on your
    garments.

    18. Take care, my son, concerning blood; take care to cover it with dust in the
    earth. And do not eat

    19. blood at all, because it is the life; and do not eat any blood. And do not
    accept a gift concerning any human blood, lest it be exacted from you without
    judgment; for it is the blood that is shed which pollutes the earth, and the earth
    cannot be cleansed from the blood of a man except by the blood of the one who
    shed it.

    20. And do not accept gifts and do not be partial in a case of human blood; blood
    for blood is to be rendered before the Lord, the Most High God. And it will be
    good as a memorial for you, so that you may be kept from every evil and so that
    he may save you from every death. I see, my son, all the works of the children
    of men, that all their sin and evil and all their deeds are uncleanness and abomination
    and defilement, and there is no righteousness with them. Take care not to walk
    in their ways and not to tread in their paths, and do not sin a sin leading to
    death before the Most High God, lest he hide his face from you and give you into
    the hand of your offense and root you out from the earth, and your seed from under
    heaven, and your name and your seed be destroyed from all the earth. Turn away
    from all their deeds and from all their uncleanness, and keep the charge of the
    Most High God, and do his will and be upright in everything. And he will bless
    you in all your deeds, and he will raise up from you a plant of righteousness
    in all the earth throughout all generations of the earth. And my name and your
    name will not be forgotten under heaven forever. Go, my son, in peace. May the
    Most High God, my God and your God, strengthen you to do his will; and may he
    bless all your seed and the remnant of your seed for the generations forever with
    every righteous blessing, so that you may become a blessing on all the earth.”
    And he went out from before him rejoicing.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '13'
    text: The list of woods in vv. 12-14 contains several difficult plant names in
      Ethiopic transliteration. Some identifications are uncertain, and the sequence
      may reflect borrowed or regional botanical terms rather than stable English
      species equivalents.
    reason: lexical_alternative
  - marker: '13'
    text: 'The phrase rendered ''[called] arsatna and besem'' is textually awkward
      and may preserve corrupt or poorly understood tree names. The sense of the larger
      instruction is clear: only select, sound, fragrant wood is to be used for the
      altar fire.'
    reason: textual_variant
  - marker: '15'
    text: The chapter numbering in the source rows appears to skip from v. 15 to v.
      17. No separate English v. 16 is supplied because the provided Ge'ez segmentation
      contains no distinct row for it.
    reason: segmentation_note
  - marker: '20'
    text: The clause 'give you into the hand of your offense' is difficult. It may
      mean 'into the hand of your enemies' or preserve a corrupted reading. The translation
      stays close to the transmitted wording while signaling the warning of judgment.
    reason: textual_variant
lexical_decisions:
- source_word: ነሢአ ሕልያን
  chosen: accepting of gifts
  alternatives:
  - accepting of persons
  - taking of bribes
  rationale: Corrected from 'accepting of persons' in the previous draft to accurately
    reflect the Ge'ez 'ሕልያን' (gift/bribe), distinguishing it from 'ነሢአ ገጽ' (partiality/accepting
    of face) in verse 4.
- source_word: ሱባዔ
  chosen: week of years
  alternatives:
  - week
  - sabbath-period
  rationale: In Jubilees' chronological system this denotes a heptad of years, not
    a seven-day week; preserving the calendrical force is essential.
- source_word: እዮቤል
  chosen: jubilee
  alternatives:
  - yovel
  rationale: Standard English rendering that preserves Jubilees' chronological terminology.
- source_word: እዜከር ለእግዚአብሔር
  chosen: remained mindful of the Lord
  alternatives:
  - remembered the Lord
  - was mindful before the Lord
  rationale: Captures ongoing covenantal orientation rather than a single act of recollection.
- source_word: ጣዖተ
  chosen: idols
  alternatives:
  - images
  - false gods
  rationale: Plain and natural rendering for cultic objects rejected by Abraham.
- source_word: ነሢአ ገጽ
  chosen: partiality
  alternatives:
  - accepting persons
  - favoritism
  rationale: Idiomatic rendering of the no-respect-of-persons formula while preserving
    judicial sense.
- source_word: ርኩሳን
  chosen: impurities
  alternatives:
  - unclean things
  - defilements
  rationale: The context lists forbidden cultic practices; 'impurities' preserves
    ritual-moral force without over-specifying.
- source_word: ገሊፎ
  chosen: carved images
  alternatives:
  - graven images
  - sculpted idols
  rationale: Reflects manufactured cult images; avoids archaic 'graven' in main text.
- source_word: ስብክ
  chosen: molten images
  alternatives:
  - cast images
  - metal idols
  rationale: Likely refers to cast idols; 'molten images' preserves traditional cultic
    distinction from carved images.
- source_word: ጽንሓሐ ሰላም
  chosen: thanksgiving of peace
  alternatives:
  - peace offering
  - sacrifice of well-being
  rationale: The phrase appears to combine peace/well-being sacrifice with thanksgiving
    nuance; the rendering preserves both elements rather than flattening to a Pentateuchal
    formula.
- source_word: ምሥዋዕ
  chosen: altar
  alternatives:
  - sacrificial altar
  rationale: Standard cultic term in context of offering and blood rites.
- source_word: ስንዳሌ
  chosen: fine flour
  alternatives:
  - choice flour
  rationale: Natural sacrificial terminology corresponding to grain accompaniment.
- source_word: ሞጻሕት
  chosen: drink offering
  alternatives:
  - libation
  rationale: Accessible modern cultic term; 'libation' preserved as an alternative
    but less readable.
- source_word: መሥዋዕተ መድኃኒት
  chosen: sacrifice of deliverance
  alternatives:
  - saving sacrifice
  - salvation offering
  rationale: The Ethiopic points to rescue/deliverance language; I preserved that
    rather than harmonizing automatically to Levitical labels.
- source_word: መናቅፅ
  chosen: loins
  alternatives:
  - flanks
  rationale: Best fit in the anatomical list of sacrificial portions, though the exact
    body part is somewhat uncertain.
- source_word: ፄወ ኪዳን
  chosen: salt of the covenant
  alternatives:
  - covenant salt
  rationale: Preserves the covenantal phrase known from sacrificial law.
- source_word: ዕፀወ መሥዋዕት
  chosen: wood of the offering
  alternatives:
  - altar wood
  - wood for the sacrifice
  rationale: Keeps the phrase close to the source while fitting the practical instruction
    about acceptable fuel.
- source_word: ትሐፀብ
  chosen: wash yourself
  alternatives:
  - bathe yourself
  - purify yourself by washing
  rationale: Concrete washing is explicit; ritual purity is implied by context and
    need not replace the literal action.
- source_word: ነፍስ ይእቲ
  chosen: it is the life
  alternatives:
  - it is the soul
  - it is the life-force
  rationale: In blood prohibitions, 'life' communicates the sense more clearly in
    English while preserving the theological claim.
- source_word: ሕልያነ ዲበ ኵሉ ደመ ሰብእ
  chosen: accept a gift concerning any human blood
  alternatives:
  - take a bribe over human blood
  - show favor in a blood case
  rationale: The phrase is judicial and concerns corrupt compensation in homicide
    matters; 'gift' keeps the literal sense while allowing the legal implication.
- source_word: ተክለ ጽድቅ
  chosen: plant of righteousness
  alternatives:
  - shoot of righteousness
  - seedling of righteousness
  rationale: Preserves the vegetal metaphor and covenantal promise language.
theological_decisions:
- issue: Divine name rendering
  chosen_reading: the Lord
  alternative_readings:
  - God
  - Yahweh
  rationale: Consistent with project policy for rendering the divine name/title tradition
    in English while maintaining reverent covenantal usage.
  doctrine_reference: 'DOCTRINE.md: YHWH -> the LORD'
- issue: Sacrificial terminology in vv. 7-10
  chosen_reading: Retain distinct sacrificial labels such as 'thanksgiving of peace'
    and 'sacrifice of deliverance' rather than harmonizing fully to Leviticus
  alternative_readings:
  - peace offering
  - fellowship offering
  - well-being offering
  rationale: Jubilees reuses Pentateuchal cultic language but with its own phrasing;
    preserving the Ethiopic distinctions keeps the text from being flattened into
    a generic Pentateuch paraphrase.
- issue: Blood prohibition and homicide law
  chosen_reading: Translate the judicial warning as forbidding acceptance of a gift/bribe
    in a blood case and affirming blood-for-blood justice
  alternative_readings:
  - forbidding only blood consumption
  - general warning against murder without legal nuance
  rationale: The context moves from dietary blood to homicide, earth-pollution, and
    judicial corruption; the legal dimension should remain visible.
