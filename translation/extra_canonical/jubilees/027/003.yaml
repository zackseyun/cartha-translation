  category: grammar
  from: and until your brother’s anger leaves you
  to: and until he turns his anger away from you
  rationale: In the Ge'ez, the word for 'anger' (መዐተ, ma'ata) is in the accusative case, making it the object of the verb, not the subject. Furthermore, the English phrase 'his anger leaves you' is awkward, as it implies the anger was residing within the addressee. Translating it with 'he' as the subject and 'anger' as the object ('he turns his anger away' or 'he lets go of his anger') corrects both the grammar and the English idiom.
