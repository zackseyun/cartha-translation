translation:
  text: '[''1. And he said, “My son, I have grown old, and now my eyes are too dim
    to see, and I do not know the day of my death.'', ''2. And now take your hunting
    gear, your quiver and your bow, and go out to the field and hunt game for me,
    my son, and prepare food for me such as my soul loves, and bring it to me so that
    I may eat, and my soul may bless you before I die.”'', ''3. And Rebekah was listening
    while Isaac spoke to Esau.'', ''4. And Esau went to the open country to hunt game
    and bring it to his father.'', ''5. And Rebekah called Jacob her son and said
    to him, “Look, I heard Isaac your father speaking with Esau your brother, saying,
    ‘Hunt game for me and prepare food for me and bring it to me, and I will eat and
    bless you before the LORD before I die.’'', ''6. And now, my son, listen to my
    voice in what I command you: go to your flock and take for me two good young kids
    of the goats, and I will prepare them as food for your father, such as he loves,
    and you shall bring it to your father, and he will eat, and he will bless you
    before the LORD before he dies, and you shall be blessed.”'', ''7. And Jacob said
    to Rebekah his mother, “Mother, does not my father recognize everything that he
    eats and discerns it? But I am afraid, my mother, that he may hear my voice and
    not permit me to touch him. And you know that I am smooth, while Esau my brother
    is hairy, and I will appear in his eyes like one who mocks him, and I will do
    a deed that he did not command me, and he will be angry with me, and I will bring
    on myself a curse and not a blessing.”'', ''8. And Rebekah his mother said to
    him, “Your curse be on me, my son; only listen to my voice.”'', ''9. And Jacob
    listened to the voice of Rebekah his mother, and he went and took two good, fat
    young kids of the goats and brought them to his mother, and his mother prepared
    them as food, such as he loved.'', ''10. And Rebekah took the desirable garments
    of her elder son Esau, which were with her in the house, and clothed Jacob her
    younger son with them; and from the skins of the young kids she put them on his
    hands and on the bare part of his neck.'', ''11. And she gave the cooked dish
    and the bread that she had made into the hand of Jacob her son.'', ''12. And Jacob
    went in to his father and said, “I am your son; I have done as you told me. Rise,
    sit, and eat from what I have hunted, father, so that your soul may bless me.”'',
    ''13. And Isaac said to his son, “How is it that you found it so quickly, my son?”'',
    ''14. And Jacob said, “Because your God caused it to come before me.”'', ''15.
    And Isaac said to him, “Come near, and let me feel you, my son, whether you are
    my son Esau or not.”'', ''16. And Jacob came near to Isaac his father, and he
    felt him and said,'', ''17. “The voice is Jacob’s voice, but the hands are Esau’s
    hands.” And he did not recognize him, because it was a turn from heaven to remove
    his spirit,'', ''18. and Isaac did not recognize him, because his hands were hairy
    like his brother Esau’s hands, so that he might bless him.'', ''19. And he said,
    “Are you really my son Esau?” And he said, “I am your son.” And he said, “Bring
    it near to me, and I will eat'', ''20. from your game, my son, so that my soul
    may bless you.” And he brought it near to him, and he ate; and he brought him'',
    ''21. wine, and he drank. And Isaac his father said to him, “Come near and kiss
    me, my son.” And he came near and kissed him.'', ''22. And he smelled the smell
    of his garments and blessed him and said, “Look, the smell of my son is like the
    smell of a field'', ''23. full of blessing, which the LORD has blessed. And may
    the LORD give you—and multiply for you—from the dew of heaven and from the dew
    of the earth, and abundance of grain and oil may he multiply for you. Let nations
    serve you,'', ''24. and peoples bow down to you. Be lord over your brothers, and
    let your mother’s sons bow down to you. And all the blessing with which the LORD
    blessed me and blessed Abraham my father—let it be for you and for your seed'',
    ''25. forever. Whoever curses you will be cursed, and whoever blesses you will
    be blessed.” And it happened, after Isaac had finished blessing his son Jacob,
    and after Jacob had gone out from Isaac his father, that he hid himself;'', ''26.
    and Esau his brother came in from his hunting. And he also prepared food and brought
    it to his father, and said to his father, “Let my father rise and eat from my
    game, so that your soul may bless me.”'', ''27. And Isaac his father said to him,
    “Who are you?” And he said to him, “I am your firstborn, Esau your son; I have
    done'', ''28. as you commanded me.” And Isaac was seized with a very great trembling,
    and he said, “Who then was it that hunted game and brought it to me, and I ate
    from everything before you came, and I blessed him?'', ''29. He shall indeed be
    blessed, and all his seed forever.” And when Esau heard the words of his father
    Isaac,'', ''30. he cried out with an exceedingly great and bitter cry, and said
    to his father, “Bless me too, father!” And he said to him, “Your brother came
    with deceit and has taken away your blessings.” And he said, “Now I know why his
    name was called Jacob: he has supplanted me these two times. First he took my
    birthright, and now he has taken my blessing.”'', ''31. And he said, “Have you
    not reserved a blessing for me, father?” And Isaac answered and said to Esau,
    “Look, I have made him lord over you, and I have given all his brothers to him
    as servants; and with abundance'', ''32. of grain and wine and oil I have strengthened
    him. And for you, what can I do now, my son?” And Esau said to Isaac his father,
    “Do you have only one blessing, father? Bless me too, father!”'', ''33. And Esau
    raised his voice and wept. And Isaac answered and said to him, “Look, from the
    dew of the earth'', ''34. shall be your dwelling, and from the dew of heaven above.
    And by your sword you shall live, and you shall serve your brother; and it shall
    be that when you become great and shake his yoke from your neck, then you will
    sin completely unto death,'', ''35. and your seed will be uprooted from under
    heaven.” And Esau hated Jacob because of the blessing with which his father had
    blessed him, and he said in his heart, “Let the days of mourning for my father
    come, and I will kill Jacob my brother.”'']'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '7'
    text: The verse is textually difficult. The Ge'ez seems to say Isaac would recognize
      or discern what he eats, then shifts to Jacob's fear that Isaac may detect him
      by his voice and touch. The translation preserves the sense without over-smoothing.
    reason: segmentation_note
  - marker: '17'
    text: The chapter's verse segmentation around vv. 17–21 is uneven in the source
      rows. The recognition formula and blessing sequence have been rendered in the
      most coherent order from the Ge'ez.
    reason: segmentation_note
  - marker: '23'
    text: The phrase rendered 'the dew of the earth' is unusual; some readers may
      expect 'fatness of the earth' from Genesis. The translation follows the Ge'ez
      wording here rather than harmonizing.
    reason: alternative_reading
  - marker: '25'
    text: The source includes a note-like element suggesting Jacob 'hid himself' after
      leaving Isaac. This detail is retained because it appears in the Ethiopic wording
      and is characteristic of Jubilees' retelling.
    reason: textual_variant
  - marker: '34'
    text: This verse is notably difficult and appears expanded in a way unlike Genesis
      27:40. The Ge'ez includes language about sin unto death and the removal of Esau's
      seed from under heaven. The translation reflects that harder reading rather
      than normalizing it to the Genesis parallel.
    reason: textual_variant
lexical_decisions:
- source_word: ረሳዕኩ
  chosen: I have grown old
  alternatives:
  - I am old
  - I have become aged
  lexicon: Ge'ez contextual
  rationale: Keeps the perfective sense of advanced age in natural English without
    archaic phrasing.
- source_word: ንዋየ ነፃዊከ
  chosen: your hunting gear
  alternatives:
  - your weapons
  - your equipment
  lexicon: Ge'ez contextual
  rationale: A broad term followed by quiver and bow; 'hunting gear' best captures
    the collective sense.
- source_word: ነዐው
  chosen: hunt game
  alternatives:
  - catch venison
  - take prey
  lexicon: Ge'ez contextual
  rationale: Avoids overly specific 'venison' where the Ge'ez more generally refers
    to hunted food.
- source_word: መብልዐ
  chosen: food
  alternatives:
  - dish
  - meal
  lexicon: Ge'ez contextual
  rationale: Used repeatedly for prepared edible fare; 'food' is consistent and flexible,
    with 'cooked dish' used once where context narrows it.
- source_word: ነፍስየ
  chosen: my soul
  alternatives:
  - I myself
  - my appetite
  lexicon: Ge'ez contextual
  rationale: Jubilees preserves the Semitic idiom 'my soul'; retained for theological-literary
    texture rather than flattened to 'I'.
- source_word: ቅድመ እግዚአብሔር
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: Ge'ez contextual
  rationale: Preserves covenantal solemnity and matches the project's rendering of
    the divine name.
- source_word: መሓስአ ጠሊ
  chosen: young kids of the goats
  alternatives:
  - kid goats
  - young goats
  lexicon: Ge'ez contextual
  rationale: Keeps the sacrificial/pastoral specificity of the phrase.
- source_word: ልሙጽ
  chosen: smooth
  alternatives:
  - smooth-skinned
  lexicon: Ge'ez contextual
  rationale: Direct and natural; the contrast with Esau's hairiness remains clear.
- source_word: ጸጓር
  chosen: hairy
  alternatives:
  - covered with hair
  lexicon: Ge'ez contextual
  rationale: Simple and idiomatic contrast with Jacob's smoothness.
- source_word: ዘይትፈተው
  chosen: desirable
  alternatives:
  - precious
  - choice
  lexicon: Ge'ez contextual
  rationale: Conveys valued garments kept in the house without overinterpreting as
    luxurious.
- source_word: ትብሲሰ
  chosen: the cooked dish
  alternatives:
  - savory food
  - stew
  lexicon: Ge'ez contextual
  rationale: The exact culinary form is not explicit enough for 'stew'; 'cooked dish'
    preserves specificity beyond generic food.
- source_word: እግስስከ
  chosen: let me feel you
  alternatives:
  - let me touch you
  - let me examine you
  lexicon: Ge'ez contextual
  rationale: Matches the tactile verification scene naturally.
- source_word: ጼና መዐዛ
  chosen: the smell
  alternatives:
  - the fragrance
  - the scent
  lexicon: Ge'ez contextual
  rationale: Plain English that still preserves the sensory emphasis of the blessing
    scene.
- source_word: ይትቀነዩ
  chosen: serve you
  alternatives:
  - be subject to you
  - submit to you
  lexicon: Ge'ez contextual
  rationale: Fits the dominion language of the blessing and parallels the following
    bowing formula.
- source_word: አግብርተ
  chosen: as servants
  alternatives:
  - for slaves
  - in servitude
  lexicon: Ge'ez contextual
  rationale: The context is subordination of brothers; 'servants' is adequate here
    without importing later technical slavery language too strongly.
- source_word: በሕብል
  chosen: with deceit
  alternatives:
  - by trickery
  - fraudulently
  lexicon: Ge'ez contextual
  rationale: Captures moral censure while remaining readable.
- source_word: አዐቀጸኒ
  chosen: he has supplanted me
  alternatives:
  - he has overreached me
  - he has tripped me up
  lexicon: Ge'ez contextual
  rationale: Preserves the wordplay associated with Jacob's name and action.
- source_word: አርዑተ
  chosen: his yoke
  alternatives:
  - his rule
  - his burden
  lexicon: Ge'ez contextual
  rationale: The image is one of oppressive control borne on the neck; 'yoke' best
    preserves the metaphor.
- source_word: ይሢሮ ዘርእከ
  chosen: your seed will be uprooted
  alternatives:
  - your offspring will perish
  - your descendants will be destroyed
  lexicon: Ge'ez contextual
  rationale: Reflects the strong judgment language and possible agricultural metaphor.
theological_decisions:
- issue: Retention of 'my soul' in blessing and eating formulas
  chosen_reading: Preserved the Semitic idiom 'my soul may bless you' rather than
    reducing it to 'I may bless you.'
  alternative_readings:
  - I may bless you
  - my heart may bless you
  rationale: Jubilees often preserves dense biblical idiom. Keeping 'soul' maintains
    the text's anthropological and liturgical texture.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Verse 35 ending as moral-judicial expansion beyond Genesis
  chosen_reading: Translated the difficult clause as 'then you will sin completely
    unto death, and your seed will be uprooted from under heaven.'
  alternative_readings:
  - then you will break loose and cast his yoke from your neck
  - then you will rebel and your descendants will be destroyed
  rationale: The Ge'ez here diverges from the familiar Genesis form and appears to
    preserve Jubilees' harsher moralizing conclusion. The translation avoids harmonizing
    back to Genesis and reflects the extant wording as best as possible.
  doctrine_reference: PHILOSOPHY.md 'Do NOT harmonize Jubilees back into Genesis/Exodus'
