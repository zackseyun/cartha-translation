  - verse: 28
    geez: በከመ፡ አዘዝከኒ። ወተደመ፡ ይስሐቅ፡ ድማመ፡ ዐቢየ፡ ጥቀ፡ ወይቤ፡ መኑ፡ ውእቱ፡ ዝንቱ፡ 'ዘነዐወ፡ ወአሥገረ፡"
