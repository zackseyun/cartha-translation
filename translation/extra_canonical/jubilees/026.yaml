  - verse: 29
    geez: ቡሩከ፡ ይኩን፡ ወኵሉ፡ ዘርኡ፡ እስከ፡ ለዓለም። ወኮነ፡ ሶበ፡ ሰምዐ፡" ዔሳው፡ ነገረ፡ አቡሁ፡ ይስሐቅ፡
  - verse: 30
    geez: ጸርኀ፡" በቃል፡ ዐቢይ፡ ወመሪር፡ ጥቀ፡ ወይቤሎ፡ ለአቡሁ፡" ባርከኒ፡ *ኪያየኒ፡ አባ።" ወይቤ*ሎ፡" መጽአ፡ እኁከ፡
      በሕብል፡ ወነሥአ፡ በረከታቲከ። ወይቤ፡ ይእዜ፡ *አእመርኩ፡ በዘ፡" ተሰምየ፡ ስሙ፡ ያዕቆብ፤ አዐቀጸኒ፡ ናሁዝ፡ *ዳግመ፤
      ቀዲሙ፡" ልደተየኒ፡ ነሥአ፡ ወይእዜኒ፡ ነሥአ፡ በረከትየ።
  - verse: 31
