  rows:
  - verse: 1
    geez: ወልድየ፡ አነ፡ ረሳዕኩ፡ ወናሁ፡ አዕይንትየ፡ ከፍአ፡ ለርእይ፡ ወኢያአምር፡ ዕለተ፡ ሞትየ።
  - verse: 2
    geez: ወይእዜኒ፡ ንሣእ፡ ንዋየ፡ ነፃዊከ፡ ምትኃደከ፡ ወቀስትከ፡ ወፃእ፡ ሐቅለ፡ ወ*ነዐው፡ ሊተ፡ ወአንዝ፡ ሊተ፡ ወልድየ፡
      ወግበር፡ ሊተ፡ መብልዐ፡ ዘከመ፡ ታፈቅር፡ ነፍስየ፡ ወአምፅእ፡ ሊተ፡ *ከመ፡ እብላዕ፡ ወተባርከ፡ ነፍስየ፡ ዘእንበለ፡ እሙት።
  - verse: 3
    geez: ወርብቃሰ፡ ትሰምዕ፡ እንዘ፡ ይነግር፡ ለዔሳው፡ ይስሐቅ።
  - verse: 4
    geez: ወጌሰ፡ ዔሳው፡ ገዳመ፡ ከመ፡ *ያሥግር፡ ወየአንዝ፡ ወያምጽእ፡ ለአቡሁ።
  - verse: 5
    geez: ወጸውዐት፡ ርብቃ፡ ያዕቆብሃ፡ ወልዳ፡ ወትቤሎ፡ ናሁ፡ ሰማዕክዎ፡ ለይስሐቅ፡ አቡከ፡ እንዘ፡ ይትናገር፡ ምስለ፡ ዔሳው፡
      እኁከ፡ እንዘ፡ ይብል፡ አሰግር፡ ሊተ፡ ወግበር፡ ሊተ፡ መብልዐ፡ ወአብእ፡ ሊተ፡ ወእብላዕ፡ ወእባርከ፡ በቅድመ፡ እግዚአብሔር፡
      ዘ*እንበለ፡ እሙት።
  - verse: 6
    geez: ወይእዜኒኬ፡ ስማዕ፡ *ወልድየ፡ ቃልየ፡ ዘአነ፡ እኤዝዘከ፡ ሖር፡ ውስተ፡ መርዔት*ከ፡ ወንሣእ፡ ሊተ፡ ክልኤተ፡ መሓስአ፡
      ጠሊ፡ ሠናያነ፡ ወእገብሮሙ፡ መብልዐ፡ ለአቡከ፡ ዘከመ፡ ያፈቅር፡ ወታብእ፡ ለአቡከ፡ ወይበላዕ፡ ወ*ይባርከ፡ ቅድመ፡ እግዚአብሔር፡
      ዘእንበለ፡ ይሙት፡ ወትኩን፡ ቡሩከ።
  - verse: 7
    geez: ወይቤላ፡ ያዕቆብ፡ ለርብቃ፡ እሙ፡ እሞ፡ ኢይምሕክ፡ በእንተ፡ ኵሉ፡ ዘይበልዕ፡ አቡየ፡ ወያሠምሮ፡ ወ*ባሕቱ፡ እፈርህ፡
      አነ፡ እምየ፡ ከመ፡ ኢይለቡ፡ ቃልየ፡ *ወኢ* *ይፍቅድ፡ ይገሥሠኒ፡ ወአንቲኒ፡ ታአምሪ፡ ከመ፡ አነ፡ ልሙጽ፡ ወዔሳው፡ እኁየ፡
      ጸጓር፡ ወእከውን፡ ቅድመ፡ አዕይንቲሁ፡ ከመ፡ ዘያስተአኪ፡ ወእገብር፡ ግብረ፡ ዘኢ*አዘዘኒ፡ ወይትመዓዓኒ፡ ወአመጽእ፡ ላዕሌየ፡
      መርገመ፡ ወአኮ፡ በረከተ።
  - verse: 8
    geez: ወትቤሎ፡ ርብቃ፡ እሙ፡ ላዕሌየ፡ መርገምከ፡ ወልድየ፡ ዳእሙ፡ ስማዕ፡ ቃልየ።
  - verse: 9
    geez: ወሰምዐ፡ ያዕቆብ፡ ቃለ፡ ርብቃ፡ እሙ፡ ወሖረ፡ ወነሥአ፡ ክልኤተ፡ መሓስአ፡ ጠሊ፡ ሠናያነ፡ ወ*ስቡሓነ፡ ወአምጽኦሙ፡
      *ኀበ፡ እሙ፡ ወገብረቶሙ፡ እሙ፡ (መብልዐ፡) ዘከመ፡ ያፈቅር።
  - verse: 10
    geez: ወነሥአት፡ ርብቃ፡ አልባሰ፡ ወልዳ፡ *ዔሳው፡ ዘይሌህቅ፡ ዘይትፈተው፡ ዘሀሎ፡ ኀቤሃ፡ ውስተ፡ ቤት፡ ወአለበሰቶ፡ ለያዕቆብ፡
      ወልዳ፡ ዘይንእስ፡ ወእምእስቲ፡ መሓስአ፡ ጠሊ፡ አንበረች፡ ዲበ፡ እደዊሁ፡ ወውስተ፡ ዕርቃነ፡ ክሳዱ።
  - verse: 11
    geez: ወወሀበቶ፡ *ትብሲሰ፡ ወኅብስተ፡ ዘገብረት፡ ውስተ፡ እዴ፡ ያዕቆብ፡ ወልዳ።
  - verse: 12
    geez: ወቦአ፡ ያዕቆብ፡ ኀበ፡ አቡሁ፡ ወይቤ፡ አነ፡ ወልድከ፡ ገበርኩ፡ በከመ፡ ትቤለኒ፡ ተንሥእ፡ ወንበር፡ ወብላዕ፡ እምዘ፡
      አሰገርኩ፡ አባ፡ ከመ፡ ትባርከኒ፡ ነፍስከ።
  - verse: 13
    geez: ወይቤሎ፡ ይስሐቅ፡ ለወልዱ፡ ም*ንተ፡ ከመዝ፡ አፍጠንከ፡ ረኪበ፡ ወልድየ።
  - verse: 14
    geez: ወይቤ፡ ያዕቆብ፡ ዘአርጐዐኒ፡ አምላክከ፡ ቅድሜየ።
  - verse: 15
    geez: ወይቤሎ፡ ይስሐቅ፡ ቅረብ፡ *ወእግስስከ፡ ወልድየ፡ እመ፡ አንተ፡ ወልድየ፡ ዔሳው፡ ወእመ፡ አኮኑ።
  - verse: 16
    geez: ወቀርበ፡ ያዕቆብ፡ ኀበ፡ ይስሐቅ፡ አቡሁ፡ ወገሰ*ሶ፡ ወይቤ።
  - verse: 17
    geez: ቃል፡ ቃለ፡ ያዕቆብ፡ ወእደው፡ እደወ፡ ዔሳው፡ ወኢያእመረ፡ እስመ፡ ሚጠት፡' ውእቱ፡ እምሰማይ፡ ለአሕልፎ፡' መንፈሱ፡
  - verse: 18
    geez: ወኢያእመረ፡ ይስሐቅ፡ እስመ፡ እደዊሁ፡ ከመ፡' እደወ፡ ዔሳው፡ (እኁሁ፡') ጸጓር፡ ከመ፡ ይባርኮ።
  - verse: 19
    geez: ወይቤ፡ አንተኑ፡ ወልድየ፡ ዔሳው፡ ወይቤ፡ አነ፡ ወልድከ፡' ወይቤ፡' አቅርብ፡ ሊተ፡ ወእብላዕ፡
  - verse: 20
    geez: እምዘ፡ አደንርከ፡ ወልድየ፡ ከመ፡ ትባርከ፡ ነፍስየ። ወአቅረበ፡ ሎቱ፡ ወበልዐ፡ ወአብአ፡ ሎቱ፡
  - verse: 21
    geez: ወይን፡ ወሰትየ። ወይቤሎ፡ ይስሐቅ፡ አቡሁ፡ ቅረበኒ፡' ወስዐመኒ፡ ወልድየ፡ ወቀርበ፡' ወስዐሞ።
  - verse: 22
    geez: ወአጼነወ፡ ጼና፡ መዐዛ፡ አልባሲሁ፡ ወባረኮ፡ ወይቤ፡ ናሁ፡ ጼና፡' ወልድየ፡ ከመ፡ ጼና፡ ገዳም፡
  - verse: 23
    geez: ምሉእ፡' ዘባረኮ፡ እግዚአብሔር። ወየሀብከ፡ እግዚአብሔር፡ [ወያብዝኅከ፡"] እምጠለ፡ ሰማይ፡ ወእም'ጠለ፡ ምድር፡"
      *ወብዝኀ፡ ስርናይ፡" ወቅብእ፡" *ያብዝኅ፡ ለከ፡" ይትቀነዩ፡" ለከ፡
  - verse: 24
    geez: አሕዛብ፡ ወይስግዱ፡ 'ለከ፡ ሕዝብ፡" ኩን፡ እግዚአ፡ ለአኀዊከ፡" ወይስግዱ፡ ለከ፡ ውሉደ፡ እምከ፡ *ወኵሉን፡ በረከት፡"
      ዘባረከኒ፡ እግዚአብሔር፡ ወባረኮ፡ ለአብርሃም፡ አቡየ፡ ይኩና፡ ለከ፡ ወለዘርእከ፡
  - verse: 25
    geez: እስከ፡ ለዓለም፤ ዘይረግመከ፡ ርጉም፡ ወዘይባርከከ፡ ቡሩክ። ወኮነ፡" እምድኅረ፡ አኅለቀ፡ እንዘ፡ ይባርኮ፡ ይስሐቅ፡
      ለወልዱ፡" ያዕቆብ፡ ወኮነ፡ እምድኅረ፡ ወፅአ፡ ያዕቆብ፡ እምይስሐቅ፡ አቡሁ[፡
  - verse: 26
    geez: ተኀብአ"]፡ ወዔሳውስ፡ እኁሁ፡" በጽሐ፡ እምነዓዊሁ።" ወገብረ፡ ውእቱሂ፡ መብልዐ፡ ወአብአ፡ ለአቡሁ፡ ወይቤሎ፡ ለአቡሁ፡
