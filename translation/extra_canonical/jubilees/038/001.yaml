  from: And after this Judah spoke to Jacob his father and said to him, “Bend your bow, father, and send out your arrows, and cast down the enemy and kill the adversary; and may there be strength for you, because we shall kill your brothers’ enemy. Your hand is with you, and your help is with you; we will give it to you for honor.”
