translation:
  text: And after this Judah spoke to Jacob his father and said to him, “Bend your bow, father, and send forth your arrows, and cast down the enemy and kill the adversary; and let there be strength for you, for we will not kill your brother, for he is your companion and he is like you; let us give him honor.”
