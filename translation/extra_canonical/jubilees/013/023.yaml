translation:
  text: And Targal[a], king of nations; and they killed the king of Gomorrah, and the king of Sodom fled, and many fell into the bitumen of the valley of the Sodomites[b] by the Salt Sea. And they took captive Sodom and Admah and Zeboiim, and they took captive Lot also, the son of Abram's brother, and all his possessions, and they went as far as Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ge'ez Targāl, corresponding to Tidal in Genesis 14:1.
    reason: lexical_choice
  - marker: b
    text: Ge'ez ba-qab'a baqalā Sadomāwyān (lit. 'in the oil/bitumen of the valley of the Sodomites'). This corresponds to the 'bitumen pits in the valley of Siddim' in Genesis 14:10. Charles (1902) considered the text corrupt and emended to 'through wounds', but the Ge'ez is comprehensible as a rendering of the Genesis tradition.
    reason: textual_critical
