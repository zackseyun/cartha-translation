lexical_decisions:
- source_word: በቀብአ
  chosen: into the bitumen
  alternatives:
  - through wounds
  - in the oil
  lexicon: Leslau
  rationale: Ge'ez 'qab'a' means 'oil' or 'ointment', but here it translates the Hebrew for 'bitumen' (Genesis 14:10). Charles's emendation to 'wounds' is unnecessary.
- source_word: ሰዶማውያን
  chosen: of the Sodomites
  alternatives:
  - of Siddim
  lexicon: Leslau
  rationale: The Ge'ez explicitly reads 'Sodomites' rather than 'Siddim'.
- source_word: ወጐየ
  chosen: fled
  alternatives:
  - ruled
  lexicon: Leslau
  rationale: Correcting the previous draft's erroneous source text 'ወገዛ' (ruled) to the critical edition's 'ወጐየ' (fled).
