  from: he entered that place and built there an altar
  to: he returned to this place and offered a sacrifice upon it
  rationale: The Ge'ez reads ገብአ፡ ውስተዝ፡ መካን፡ ወአዕረገ፡ በዲቤሁ፡ ጽንሓሐ፡ (gab'a wusta-z makan wa-'a`raga ba-dibehū tsenhaha), which means 'he returned to this place and offered a sacrifice upon it.' The draft hallucinated 'built there an altar' (likely harmonizing with Genesis 13:4) and completely missed the offering of the sacrifice. Additionally, 'gab'a' means 'returned' (fitting the context of Abram returning from Egypt) and 'z' means 'this' (not 'that').
