translation:
  text: '1. And in the first year of the first week, in the forty-fifth jubilee, Rebekah
    called Jacob her son and instructed him concerning his father and concerning his
    brother, that he should honor them all the days of his life.

    2. And Jacob said, “I will do everything just as you have commanded me, for this
    matter is honor and greatness to me, and righteousness before the LORD, that I
    should honor them.”

    3. “And you know, my mother, from the day I was born until this day, all my conduct
    and all

    4. that is in my heart: that all my days I think good for all. And how should
    I not do this thing which you have commanded me, that I should honor my father
    and my brother?

    5. Tell me, my mother, what crookedness have you seen in me, and I will turn away
    from it, and let mercy be upon me.”

    6. And she said to him, “My son, all my days I have not seen in you any deed of
    crookedness, but only uprightness. Yet I will tell you the truth, my son: I shall
    die in this year, and I shall not pass this year in my life, for I saw in a dream
    the day of my death, that I would not live beyond one hundred and fifty-five years.

    7. And behold, I have completed all the days of my life that I was to live.” And
    Jacob laughed at the words of his mother, because his mother had told him that
    she would die, yet she sat opposite him, vigorous over her, and she had not grown
    weak from her strength, for she went in and went out and saw,

    8. and her teeth were strong, and no sickness at all had touched her in all the
    days of her life. And Jacob said to her, “Blessed am I, mother, if my days draw
    near to your days of life, and if my strength remains upon me like this, according
    to your strength. Do not die, for you speak with me idly concerning your death.”

    9. And she went in to Isaac and said to him, “One request I ask from you: make
    Esau swear that he will not hate Jacob and will not pursue him in hostility, for
    you know Esau’s thoughts, that he is harsh from his youth, and there is no goodness
    in him, for he desires,

    10. after your death, to kill him. And you know all the measure of Jacob’s conduct
    from the day his brother went to Haran until this day, how with all his heart
    he has left us and has done

    11. evil with us—he has gathered your flocks and all your possessions have gone
    from before your face. And while we ask and request what is ours from him, he
    serves as a man who has mercy on us.

    12. And he is bitter against you because you blessed Jacob, your perfect and upright
    son; for there is no evil at all in him, but only our goodness. And from the time
    he came from Haran until this day he has not deprived us of anything, for everything
    comes to us in its time every day, and he rejoices with all his heart whenever
    we take from his hand, and he blesses us. He has not separated himself from us
    from the time he came from Haran until this day, and he dwells with us continually
    in the house while honoring us.”

    13. And Isaac said to her, “I also know and see Jacob’s conduct toward us, that
    with all his heart he honors us. I loved Esau before Jacob from the time he was
    born first, but now I love Jacob more than Esau, because his deeds are very evil,
    and there is no righteousness in him, for all his ways are injustice and violence,
    and there is no righteousness around him.

    14. And now my heart is troubled because of all his deeds, and neither he nor
    his seed will be saved, for they are those who will be uprooted from the earth,
    and those who will be destroyed from under heaven, because he has forsaken the
    God of Abraham and gone after his wives and after

    15. their uncleanness and after their error, he and his children. And you tell
    me to make him swear that he will not kill his brother Jacob. Even if he swears,
    he will not keep his oath, nor will he do good, but only evil. And if he desires
    to kill Jacob his brother, he will be given into Jacob’s hand, and he will not
    escape from his hand, for he will fall into his hand.

    16. And you, do not fear for Jacob, for Jacob’s guardian is great and mighty and
    honored, and more powerful than Esau’s guardian.” And Rebekah praised Isaac, and
    she called Esau, and he came to her. And she said to him, “My son, I ask one request
    from you; say that you will do it, my son.”

    17. And he said, “I will do everything that you ask, and I will not refuse your
    request.” And she said to him, “I ask from you that on the day I die you will
    carry me and bury me near Sarah, the mother of your father, and that you and Jacob
    will love one another,

    18. and neither will seek evil against his brother, but only love, so that you
    may prosper, my sons, and be honored in the midst of the land, and no enemy may
    rejoice over you, and you may become a blessing and a mercy before the eyes of
    all who love you.”

    19. And he said, “I will do everything that you have told me, and I will bury
    you on the day of your death near Sarah, my father’s mother, just as you have
    desired, so that her bones may be near your bones.

    20. And Jacob my brother—I love him more than all flesh, and I have no brother
    in all the earth except him alone. And this is no great thing for me, that I should
    love him, for he is my brother, and together we were sown in your womb, and together
    we came out from your belly. And if I do not love my brother, whom shall I love?

    21. And I myself ask you that you admonish Jacob on my behalf and on behalf of
    my children, for I know that he will surely reign over me and over my children,
    because on the day my father blessed him he made him high and me low.

    22. And I swear to you that I will love him, and that I will not seek evil against
    him all the days of my life, but only good.” And he swore to her concerning all
    this matter.

    23. And she called Jacob before Esau’s eyes and instructed him according to the
    words that she had spoken with Esau. And he said, “I will do your pleasure. Only
    hide me, so that no evil may come out from me or from my children against Esau,
    and nothing may come before us except love.”

    24. And they ate and drank, she and her sons, that night; and she died in that
    night, in the third year of the seventh week of the forty-first jubilee. And her
    two sons, Esau and Jacob, buried her in the double cave near Sarah, the mother
    of their father.

    25. And in the sixth year of that week Isaac called his two sons, Esau and Jacob,
    and they came to him. And he said to them, “My sons, I am going on the way of
    my fathers, to the eternal house where my fathers are.

    26. Bury me near Abraham my father in the double cave in the field of Ephron the
    Hittite, which Abraham acquired for a burial place there in the land of Canaan.
    In the tomb which I dug for myself there, bury me.

    27. And this I command you, my sons: that you do righteousness and uprightness
    upon the earth, so that the LORD may bring upon you all that the LORD said he
    would do for Abraham and for his seed.

    28. And love one another, my sons, among yourselves, each loving his brother as
    a man loves his own life and seeks for a man—”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verses 3–5 are segmented awkwardly in the Ethiopic rowing; the sense is
      that Jacob appeals to his lifelong conduct and asks what 'crookedness' his mother
      has seen in him.
    reason: segmentation_note
  - marker: b
    text: The age statement in verse 6 is literally 'I would not live beyond one hundred
      and fifty-five years.'
    reason: lexical_alternative
  - marker: c
    text: Verse 7 is textually difficult. The translation follows the plain sense
      that Jacob laughed because Rebekah still appeared vigorous and unimpaired.
    reason: segmentation_note
  - marker: d
    text: Verses 10–12 contrast Jacob's faithful care for Isaac's household with Esau's
      hostility. Some clauses are syntactically compressed in the Ethiopic and may
      preserve a difficult Vorlage.
    reason: segmentation_note
  - marker: e
    text: '''Guardian'' in verse 16 likely refers to a heavenly protector in Jubilees''s
      angelic worldview.'
    reason: cultural_note
  - marker: f
    text: The long final Ethiopic row contains material extending beyond the chapter's
      nominal verse count. The translation preserves the sequence as separate numbered
      lines for readability.
    reason: segmentation_note
  - marker: g
    text: The chronological notice in verse 24 appears difficult in the transmitted
      Ethiopic. The rendering follows the explicit wording of the row, though the
      jubilee number may be textually uncertain.
    reason: textual_variant
  - marker: h
    text: Verse 28 breaks off in the supplied source row. The translation ends where
      the extant chapter data ends.
    reason: textual_variant
lexical_decisions:
- source_word: ኢዮቤልው
  chosen: jubilee
  alternatives:
  - jubilees
  rationale: Preserved the technical calendrical term rather than smoothing into a
    generic era marker, in keeping with Jubilees's chronological framework.
- source_word: ሱባዔ
  chosen: week
  alternatives:
  - week of years
  - heptad
  rationale: Rendered as 'week' in the text, with the jubilees context implying a
    week of years; this preserves the book's idiom without overloading every occurrence.
- source_word: አክብሮሙ
  chosen: honor them
  alternatives:
  - glorify them
  - show them respect
  rationale: Best reflects filial duty language in context of parents and brother.
- source_word: ጽድቅ
  chosen: righteousness
  alternatives:
  - justice
  - right conduct
  rationale: Consistent with project defaults and with the moral-theological weight
    of the term in Jubilees.
- source_word: ጥውየተ / ግብረ ጠዋየ
  chosen: crookedness
  alternatives:
  - perversity
  - wrongdoing
  rationale: Preserves the contrast with 'uprightness' and the moral shape of the
    accusation Jacob denies.
- source_word: ርቱዐ
  chosen: uprightness
  alternatives:
  - straightness
  - rectitude
  rationale: Pairs naturally with 'crookedness' and reflects ethical integrity.
- source_word: ሣህለ
  chosen: mercy
  alternatives:
  - compassion
  - favor
  rationale: A broad, theologically resonant rendering suitable to Jacob's plea.
- source_word: ፍጹማዊ
  chosen: perfect
  alternatives:
  - blameless
  - whole
  rationale: Kept the stronger term in Isaac's speech while allowing the moral sense
    to be clarified by the parallel 'upright'.
- source_word: ፈትዐ
  chosen: upright
  alternatives:
  - just
  - straight
  rationale: Ethical descriptor paired with 'perfect'; 'upright' is idiomatic and
    preserves the moral contrast with Esau.
- source_word: ዐመፃ
  chosen: injustice
  alternatives:
  - wickedness
  - lawlessness
  rationale: Captures active wrong and social-moral disorder in Isaac's condemnation
    of Esau.
- source_word: ግፍዕ
  chosen: violence
  alternatives:
  - oppression
  - wrong
  rationale: A strong ethical term that fits Jubilees's denunciation of Esau's ways.
- source_word: ርኵሶን
  chosen: their uncleanness
  alternatives:
  - their impurity
  - their defilement
  rationale: Preserves purity language central to Jubilees's theology, especially
    regarding foreign wives.
- source_word: ስሕተቶን
  chosen: their error
  alternatives:
  - their wandering
  - their sin
  rationale: Retains the sense of religious-moral deviation without over-specifying.
- source_word: ዐቃቢሁ
  chosen: guardian
  alternatives:
  - watcher
  - protector
  - angelic guardian
  rationale: The term likely refers to a heavenly protector; 'guardian' preserves
    the supernatural sense without importing a more specific angelological label into
    the main text.
- source_word: ባዐት እንተ ክልኤ
  chosen: the double cave
  alternatives:
  - the cave of doubles
  - Machpelah
  rationale: Translated the descriptive phrase rather than replacing it with the traditional
    place-name, preserving transparency to the Ge'ez wording.
- source_word: ቤት ዘለዓለም
  chosen: the eternal house
  alternatives:
  - the everlasting house
  rationale: Preserves the solemn idiom for the realm of the dead / burial destination.
theological_decisions:
- issue: Nature of Jacob's and Esau's 'guardians' in Isaac's speech
  chosen_reading: supernatural guardians, rendered generally as 'guardian'
  alternative_readings:
  - human protector
  - explicit angel
  rationale: In Jubilees's worldview the comparison strongly suggests heavenly protectors
    assigned to each figure. 'Guardian' preserves this theological layer while avoiding
    over-precision not explicit in the Ge'ez wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Purity language regarding Esau's wives
  chosen_reading: retain 'uncleanness' language
  alternative_readings:
  - moral corruption
  - idolatry
  rationale: Jubilees treats intermarriage and associated impurity in explicitly purity-coded
    terms. The translation keeps that theological vocabulary rather than flattening
    it into generic immorality.
  doctrine_reference: Original-language primacy over translation tradition.
