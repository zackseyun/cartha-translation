  rows:
  - verse: 1
    geez: ወበቀዳማይ፡ *ዓመት፡ ዘሱባዔ፡ ቀዳማይ፡ በዘአርብዓ፡ ወኀምስቱ፡ ኢዮቤልው፡ ጸውዐቶ፡ ርብቃ፡ ለያዕቆብ፡ ወልዳ፡ ወአዘዘቶ፡
      በእንተ፡ አቡሁ፡ ወበእንተ፡ እኁሁ፡ ከመ፡ ያክብሮሙ፡ ኵሎ፡
  - verse: 2
    geez: መዋዕለ፡ ሕይወቱ፡ ለያዕቆብ። ወይቤ፡ ያዕቆብ፡ እገብር፡ ኵሎ፡ ዘከመ፡ አዘዝክኒ፡ እስመ፡ ክብር፡ ወዕበይ፡ ሊተ፡
      ዝንቱ፡ ነገር፡ ወጽድቅ፡ ሊተ፡ በቅድመ፡ እግዚአብሔር፡ ከመ፡ አክብሮሙ።
  - verse: 3
    geez: ወአንቲኒ፡ እሞ፡ ታአምሪ፡ እምዕለተ፡ ተወለድኩ፡ እስከ፡ ዛቲ፡ ዕለት፡ ኵሎ፡ ምግባርየ፡ ወኵሎ፡
  - verse: 4
    geez: ዘውስተ፡ ልብየ፡ ከመ፡ ኵሎ፡ መዋዕለ፡ *እሐሊ፡ ሠናየ፡ ለኵሉ። ወአፎ፡ ኢይገብር፡ ዘንተ፡ ነገረ፡
  - verse: 5
    geez: ዘአዘዝክኒ፡ ከመ፡ አክብር፡ አበየ፡ ወእኅየየ። ንግርኒ፡ እሞ፡ ምንተ ርኢኪ፡ በላዕሌየ፡ ጥውየተ፤
  - verse: 6
    geez: ወአንግብስ፡ እምኔሁ፡ ወይከውን፡ ላዕሌየ፡ ሣህለ። ወትቤሎ፡ ወልድየ፡ ኵሎን፡ መዋዕልየ፡ አልቦ፡ ዘርኢኩ፡ በላዕሌከ፡
      ምንተኒ፡ ግብረ፡ ጠዋየ፡ አላ፡ ርቱዐ። ወባሕቱ፡ ጽድቀ፡ እነግረከ፡ ወልድየ፡ አነ፡ በዛቲ፡ ዓመት፡ እመውት፡ ወኢይትዐደው፡
      ዛተ፡ ዓመተ፡ በሕይወትየ፡ *እስመ፡ ርኢኩ፡ በሕልም፡ ዕለተ፡ ሞትየ፡ ከመ፡ ኢየሐዩ፡ ፈድፋደ፡ *እምእት፡ ወኃምሳ፡ ወኀምስ፡
  - verse: 7
    geez: ዓመት፤ ወናሁ፡ *አነ፡ ፈጸምኩ፡ ኵሎ፡ መዋዕለ፡ ሕይወትየ፡ ዘሀሎኩ፡ እሕየው። ወበሐቀ፡ ያዕቆብ፡ በእንተ፡ ነገረ፡
      እሙ፡ እስመ፡ ትቤሎ፡ እሙ፡ ከመ፡ ትመውት፡ ወይእቲሰ፡ ትነብር፡ አንጻሪሁ፡ *ወኀይላ፡ ላዕሌሃ፡ ወኢደክመት፡ እምኀይላ፡
      እስመ፡ ትበውእ፡ ወትወፅእ፡ ወትሬኢ፡
  - verse: 8
    geez: ወአስናኒሃኒ፡ ጽኑዕ፡ *ወኢምንተኒ፡ ሕማም፡ ኢበከፋ፡ ኵሎ፡ *መዋዕለ፡ ሕይወታ። ወይቤላ፡ ያዕቆብ፡ ብፁዕ፡ አነ፡
      እም፡ አመ፡ ቀርበ፡ መዋዕልየ፡ ለመዋዕለ፡ ሕይወትኪ፡ *ወይሄስ፡ ኀይለየ፡ ላዕሌየ፡ ከመዝ፡ በከመ፡ ኀይልኪ፡ ወአትመውቲ፡
      እስመ፡ በከ፡ በጸው፡ ትትናገሪ፡ ምስሌየ፡ በእንተ፡
  - verse: 9
    geez: ሞትኪ። ወቦአት፡ ኀበ፡ ይስሐቅ፡ ወትቤሎ፡ አሐተ፡ ስእለተ፡ አስተበቍዕ፡ በኀቤከ፡ እምሕሱ፡ ለዔሳው፡ ከመ፡ ኢያሕስም፡
      ላዕለ፡ ያዕቆብ፡ ወኢይስድዶ፡ በጸልኢ፡ እስመ፡ *አንተ፡ ታአምር፡ ሕሊናሁ፡ ለዔሳው፡ ከመ፡ ጸዋን፡ ውእቱ፡ እምንእሱ፡ ወአልቦ፡
      ላዕሌሁ፡ ኂሩተ፡ እስመ፡ ይፈቅድ፡
  - verse: 10
    geez: ውእቱ፡ እምድኅረ፡ ሞትከ፡ ይቅትሎ። ወአንተ፡ ታአምር፡ ኵሎ፡ መጠነ፡ ገብረ፡ እምዕለተ፡ ሖረ፡ ያዕቆብ፡ እኁሁ፡ ውስተ፡
      ካራን፡ እስከ፡ ዛቲ፡ ዕለት፡ ከመ፡ በኵሉ፡ ልቡ፡ ኀደገነ፡ ወገብረ፡
  - verse: 11
    geez: ምስሌነ፡ እኩየ፡ መሪዕቶከ፡ አስተጋብአ፡ ወኵሎ፡ ጥሪትከ፡ ሄደ፡ እምቅድመ፡ ገጽከ። ወእንዘ፡ ናስተበቍዕ፡ ወንስእሎ፡
      ዘእምዚአነ፡ ውእቱ፡ ይሬሲ፡ *ከመ፡ ዘብእሲ፡ ዘይምሕረነ።
  - verse: 12
    geez: ወይመርር፡ ላዕሌከ፡ በእንተ፡ ዘባረኮ፡ ያዕቆብሃ፡ ወልደከ፡ ፍጹማዊ፡ ወፈትዐ፡ እስመ፡ አልቦ፡ እኩየ፡ ዘአንበበ፡
      ኂሩትነ ወእምአመ፡ መጽአ፡ እምካራን፡ እስከ፡ ዛቲ፡ ዕለት፡ *ኢያሕፀፀ፡ ብነ፡ ወእምንትኒ፡ እስመ፡ ኵሉ፡ ይመጽእ፡ ለነ፡
      በበጊዜሁ፡ ኵሉ፡ ዕለት፡ ወይትፌሣሕ፡ በኵሉ፡ ልቡ፡ ሶበ፡ ንነሥእ፡ እምእዴሁ፡ ወይባርከነ፡ ወኢተፈለጠ፡ እምኔነ፡ እምአመ፡
      መጽአ፡ እምካራን፡ እስከ፡ ዛቲ፡ ዕለት፡ ወውእቱ፡ ይነብር፡ ምስሌነ፡ ዘልፈ፡ ውስተ፡ ቤት፡ እንዘ፡ ያከብረነ።
  - verse: 13
    geez: ወይቤላ፡ ይስሐቅ፡ አነኒ፡ አአምር፡ ወእሬኢ፡ ግብረ፡ ያዕቆብ፡ ዘምስሌነ፡ ከመ፡ በኵሉ፡ ልቡ፡ ውእቱ፡ ያከብረነ፡
      ወአፍቀርክዎ፡ ለዔሳው፡ ቀደሙ፡ እምነ፡ ያዕቆብ፡ እምዘተወልደ፡ ቀደሙ፡ ወይእዜኒ፡ *አፈቅር፡ ያዕቆብሃ፡ እምነ፡ ዔሳው፡
      እስመ፡ አብዝኀ፡ አእክዮ፡ ምግባሪሁ፡ ወአልቦ፡ ጽድቀ፡ ሎቱ፡ እስመ፡ ኵሉ፡ ፍኖቱ፡ ዐመፃ፡ ወግፍዕ፡ ወአልቦ፡ ጽድቀ፡ ሎቱ፡
      አውዶ።
  - verse: 14
    geez: ወይእዜኒ፡ ልብየ፡ ይትሀወክ፡ በእንተ፡ ኵሉ፡ ምግባራቲሁ፡ ወኢኮነ፡ ውእቱ፡ ወዘርኡ፡ ሊድኅን፡ እስመ፡ እለ፡ ይትሐጐሉ፡
      እሙንቱ፡ እምነ፡ ምድር፡ ወእለ፡ ይሤረዉ፡ እሙንቱ፡ እምታሕተ፡ ሰማይ፡ እስመ፡ *አምላኮ፡ ‛ለአብርሃም፡ ኀደገ፡ ወሖረ፡
      ድኅረ፡ አንስቲያሁ፡ ወድኅረ፡
  - verse: 15
    geez: ርኵሶን፡ ወድኅረ፡ ስሕተቶን፡ ውእቱ፡ ወውሉዱ። ወአንቲኒ፡ ትብልኒ፡ ከመ፡ እምሕሱ፡ ከመ፡ ኢይቅትል፡ እኅወሁ፡ ያዕቆብሃ፤
      እመኒ፡ መሐለ፡ ኢይሄሱ፡ በመሐላሁ፡ ወኢይገብር፡ ኂሩተ፡ ዘእንበለ፡ እኩይ። ወእመኒ፡ ፈቀደ፡ ይቅትል፡ ያዕቆብሃ፡ እኅዋሁ፡
      ውስተ፡ እዴ፡ 16 ያዕቆብ፡ ይትወሀብ፡ ወኢያመሥጥ፡ እምእዴሁ፡ እስመ፡ ውስተ፡ እዴሁ፡ ይወርድ። ወአንቲኒ፡ 17 ኢትፍርሂ፡
      በእንተ፡ ያዕቆብ፡ እስመ፡ ዐቃቢሁ፡ ለያዕቆብ፡ ዐቢይ፡ ወኃያል፡ ወክቡር፡ ወአኩት፡ እምዐቃቢሁ፡ ለዔሳው። ወለአኮት፡ ርብቃ፡
      ወጸውዐተ፡ ለዔሳው፡ ወመጽአ፡ ኀቤሃ፡ ወትቤሎ፡ 18 ስእለት፡ ብየ፡ ወልድየ፡ እንተ፡ እስእል፡ እምኀቤከ፡ ወበል፡ ከመ፡
      ትገብራ፡ ወልድየ። ወይቤ፡ 19 አነ፡ እገብር፡ ኵሎ፡ ዘትስእሊ፡ ወኢየአቢ፡ ስእለተኪ። ወትቤሎ፡ አነ፡ እስእል፡ እምኀቤከ፡
      በዕለት፡ 20 አመ፡ ሞትኩ፡ ከመ፡ ታብአኒ፡ ወትቅብረኒ፡ ቅሩበ፡ ሳራ፡ እመ፡ አቡከ፡ ወከመ፡ ትትፋቀሩ፡ አንተ፡ ወያዕቆብ፡
      በበይናቲክሙ፡ ወኢይኅሥሥ፡ እኩየ፡ *አሐዱ፡ ለአኁሁ፡ ዘእንበለ፡ ተፋቅሮ፡ *ከመ፡ ወትሣረሑ፡ ውሉድየ፡ ወትክበሩ፡ በማእከለ፡
      ምድር፡ ወኢይትፈሣሕ፡ *ላዕሌክሙ፡ ጸላኢ፡ ወትከውኑ፡ ለበረከት፡ ወለምሕረት፡ በቅድመ፡ አዕይንቲሆሙ፡ ለኵሎሙ፡ እለ፡ ያፈቅሩክሙ።
      ወይቤ፡ አነ፡ እገብር፡ ኵሎ፡ ዘትቤልኒ፡ ወእቀብረኪ፡ አመ፡ ዕለተ፡ ሞትኪ፡ ቅሩበ፡ ሳራ፡ እመ፡ አቡየ፡ በከመ፡ አፍቀርኪ፡
      አዕጽምቲሃ፡ ከመ፡ የሀሉ፡ ቅሩበ፡ አዕጽምትኪ፡ ወያዐቅብ፡ ሃኪ፡ እኅትየ፡ አነ፡ አፈቅር፡ እምኵሉ፡ ዘሥጋ፡ ወአልቦ፡ እኅወ፡
