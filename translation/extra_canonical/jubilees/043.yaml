  lexicon: Ge'ez contextual
  rationale: Corrected from 'you find it' to 'I find it' to accurately reflect the
    1st person singular subject in the Ge'ez verb form in verse 6.
- source_word: አግብእነ ... ለአግብርቲከ
  chosen: we, your servants, brought back
  alternatives:
  - we brought back to your servants
  lexicon: Ge'ez contextual
  rationale: Adjusted in verse 4 to clarify that the brothers (the servants) are the
    ones who brought the money back, rather than bringing it back 'to' the servants.
theological_decisions:
- issue: Joseph's claim to divine by the cup
  chosen_reading: Rendered as Joseph's stated claim ('a man surely divines with his
    cup, as I do') without implying that the narrator endorses actual divination.
  alternative_readings:
  - Treat as a mere ruse with no occult implication
  - Translate more weakly as 'learns by means of' the cup
  rationale: The Ge'ez wording naturally refers to divination. Jubilees can report
    speech within the story without approving it. Preserving the claim maintains narrative
    tension and source fidelity.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve
    it
