translation:
  text: '[''1. And Joseph considered a plan by which he might know their thoughts,
    whether there was a thought of peace among them. And he said to the man who was
    over his house, "Fill all their sacks with grain, and put each man\''s money in
    the middle of his bag; and put my silver cup, the cup from which I drink, in the
    sack of the youngest." And he sent them away.'', "2. And he did as Joseph told
    him, and filled all their sacks with grain and their money, and he put it in their
    sacks; and he put the cup in Benjamin''s sack. And when morning dawned, they went
    away.", ''3. And it happened, when they had gone out from there, Joseph said to
    the man of his house, "Get up, run after them, and overtake them, saying, \''Why
    have you repaid me evil for good? You have stolen the silver cup from which my
    lord drinks, and you have put blame on your youngest brother. Quickly bring him,
    so that I may not enter into judgment.\''"'', ''4. And he ran after them and spoke
    to them according to this word. And they said to him, "Far be it from your servants
    to do this thing, and to steal from your lord\''s house anything, whether silver
    or gold. The money that we found before in our sacks we, your servants, brought
    back from the land'', ''5. of Canaan. How then should we steal anything? Look,
    we and our sacks—search them. And with whomever you find the cup in the sack of
    any one man among us, let him be put to death; and we and our donkeys also will
