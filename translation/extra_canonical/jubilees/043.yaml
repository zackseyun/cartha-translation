  rows:
  - verse: 1
    geez: ወሐለየ፡ ዮሴፍ፡ ሕሊና፡ በዘ፡ ያአምር፡ ሕሊናሆሙ፡ *እመ፡ ቦሙ፡ ሕሊና፡ ሰላም፡ በበይናቲሆሙ፡ ወይቤሎ፡ ለብእሲ፡
      ዘላዕለ፡ ቤቱ፡ ምላእ፡ ሎሙ፡ ኵሎ፡ አሕስሊሆሙ፡ እክለ፡ ወ*ወርቆሙኒ፡ አግብእ፡ ሎሙ፡ ማእከለ፡ መዋዲቶሙ፡ ወኮራየ፡ በዘእሰቲ፡
      ደይ፡ ውስተ፡ ሐስለ፡ ዘይንእስ፡ ኮራ፡ ዘ*ብሩር፡ ወፈነዎሙ።
  - verse: 2
    geez: '*ወገብረ፡ በከመ፡ ይቤሎ፡ ዮሴፍ፡ ወመልአ፡ ሎሙ፡ አሕስሊሆሙ፡ ኵሎ፡ ሲሊተ፡ ወወርቆሙኒ፡ ወደየ፡ ውስተ፡ አሕስሊሆሙ፡
      ወ*ኮራ፡ ወደየ፡ ውስተ፡ ሐስለ፡ ብንያም። ወነግሀ፡ በጽባሕ፡ ሖሩ፡'
  - verse: 3
    geez: ወኮነ፡ ሶበ፡ ወፅኡ፡ እምሀየ፡ ይቤሎ፡ ዮሴፍ፡ ለብእሲ፡ ቤቱ፡ ደግፎሙ፡ ሩጽ፡ ወ*ተአንዞሙ፡ እንዘ፡ ትብል፡ ህየንተ፡
      ሠናይት፡ ዐሠይክሙኒ፡ እኩየ፡ ሠረቅክሙኒ፡ ጽዋዐ፡ ብሩር፡ በዘይሰቲ፡ እግዚእየ፡ ወአገብአ፡ ሊተ፡ ለ*አኁሆሙ፡ ዘይንእስ፡
      ወፍጡነ፡ አምጽእ፡ ዘእንበለ፡ እባእ፡ ውስተ፡ ምኵናንየ።
  - verse: 4
    geez: ወሮጸ፡ ድኅሬሆሙ፡ ወይቤሎሙ፡ በከመ፡ ዝንቱ፡ ነገር። ወይቤልዎ፡ ሐሰ፡ ሎሙ፡ ለአግብርቲከ፡ አይገብሩ፡ *ዘንተሰ፡
      ነገረ፡ ወአይሰርቁ፡ እምቤተ፡ እግዚእከ፡ ምነተኒ፡ ንዋየ፡ ወወርቀኒ፡ ዘረከብነ፡ ቀዳሙ፡ ውስተ፡ አኅጢነ፡ *አበጥከ፡ ደቂቅከ፡
      እምድረ፡
  - verse: 5
    geez: ከናአን። እፎ፡ እንከ፡ ንሰርቅ፡ ምነተኒ፡ ንዋየ፡ ናሁ፡ ንሕነሂ፡ ወአሕስሊነሂ፡ ፍትን፡ ወበኀበ፡ ረከብከ፡ ጽዋዐ፡
      ውስተ፡ ሐስሊ፡ አሐዱ፡ ብእሲ፡ እምኔነ፡ ይትቀተል፡ ወንሕነሂ፡ ወአእዱጊነሂ፡
  - verse: 6
    geez: ንትቀነይ፡ ለእግዚእነ። ወይቤሎሙ፡ አኮ፡ ከማሁ፡ በኀበ፡ ብእሲ፡ ዘረከብክዎ፡ ኪያሁ፡ ባሕቲቶ፡
  - verse: 7
    geez: እነሥእ፡ ገብረ፡ ወአንትሙሰ፡ ተአትዉ፡ በሰላም፡ ቤቲክሙ። ወእንዘ፡ ይፈትኑ፡ ውስተ፡ ንዋዮሙ፡ እምዘ፡ ይልህቅ፡ ቀደሙ፡
      ወፈጸሙ፡ በኀበ፡ ዘይንእስ፡ ወተረክበ፡ ውስተ፡ ሐስለ፡ ብንያም።
  - verse: 8
    geez: ወሠጠጡ፡ አልባሲሆሙ፡ ወጸዐኑ፡ ዲበ፡ አእዱጊሆሙ፡ ወተመይጡ፡ ሀገረ፡ ወበጽሑ፡ ቤተ፡
  - verse: 9
    geez: ዮሴፍ፡ ወሰገዱ፡ ሎቱ፡ *ኵሎሙ፡ በገጾሙ፡ ውስተ፡ ምድር። ወይቤሎሙ፡ ዮሴፍ፡ እኩየ፡ ገበርክሙ፡ ወይቤሉ፡ ምነት፡
      ንበል፡ ወምነት፡ ንትዋቀስ፡ እግዚእነ፡ ረከበ፡ አበሳሆሙ፡
  - verse: 10
    geez: ለእግብርቲ*ሁ፡ ናሁ፡ ንሕነ፡ አግብርት፡ ለእግዚእነ፡ ወአእዱጊነሂ። ወይቤሎሙ፡ ዮሴፍ፡ እግዚአብሔር፡ አገሰ፡ አፈረሀ፡
      አንትሙሰ፡ ሑሩ፡ አብያቲክሙ፡ ወእ*ኑክሙ*ሰ፡ ከመ፡ ይኩን፡ ቅኔየ፡ እስመ፡ እኩየ፡ ገበርክሙ፡ ኢታአምኑኑ፡ ከመ፡ ያስተቀስም፡
      ብእሲ፡ ጽዋዖ፡ በከመ፡ አነ፡
  - verse: 11
    geez: በዝ፡ ጽዋዕ፡ ወኪያሁ፡ ሰረቅክሙኒ። ወይቤ፡ ይሁዳ፡ ሳዕሌየ፡ እግዚኦ፡ አትናገር፡ *ገብርከ፡ ቃለ፡ ውስተ፡ እዝነ፡
      እግዚእየ፡ ክልኤተ፡ አኀወ፡ ወለደት፡ እሙ፡ ለገብርከ፡ ለአቡነ፡ ለነ፡ አሐዱ፡ ወፅአ፡ ወተገደፈ፡ ወአልቦ፡ ዘተረክበ፡ ወውእቱ፡
      ባሕቲቱ፡ ተረፈ፡ እም*እሙ፡ ወገብርከሂ፡
  - verse: 12
    geez: አቡነ፡ ያፈቅሮ፡ ወነፍሱኒ፡ እስርት፡ እምነፍስዝ። ወይከውን፡ እምከመ፡ ሖርነ፡ ኀበ፡ ገብርከ፡ አቡነ፡ ወ*እምከመ፡
      ኢሀሎ፡ ምስሌነ፡ ወሬዛ፡ ይመውት፡ ወንቀጽዕ፡ አባነ፡ በሐዘን፡ እስክ፡
  - verse: 13
    geez: ለመዊት። ወአንበር፡ አነ፡ *ገብርከ፡ ባሕቱ፡ ህየንቴሁ፡ ለሕፃን፡ ገብረ፡ ለእግዚእየ፡ ወይሖር፡ ወሬዛ፡ ምስለ፡ አኀዊሁ፡
      እስመ፡ *ተሀበይክዎ፡ እምአደሁ፡ ለገብርከ፡ አቡነ፡ ሰነ። ወበእመ፡ ኢያግባእክዎ፡ ይሌብከ፡ ገብርከ፡ ዕአቡነ፡ ኵሎ*ነ፡
      መዋዕለ።
  - verse: 14
    geez: ወርእየ፡ ዮሴፍ፡ ከመ፡ ልበ፡ ኵሎሙ፡ ዕሩይ፡ ብእሲ፡ ምስለ፡ ካልኡ፡ ለሠናይ፡ ወበአከ፡
  - verse: 15
    geez: ተዐገሦ፡ ወነገሮሙ፡ ከመ፡ ውእቱ፡ ዮሴፍ። ወተናገረ፡ ምስሌሆሙ፡ በከመ፡ ልሳነ፡ ዕብራይስጥ፡
  - verse: 16
    geez: ወሐቀፈ፡ ክሳውዲሆሙ፡ ወበከየ፡ ወእሙንቱሰ፡ ኢያእመርዎ፡ ወአንከ፡ ይብከዩ። ወይቤሎሙ፡
  - verse: 17
    geez: ኢትብከዩ፡ ላዕሌየ፡ ወአፍጥኑ፡ ወእምጽእዎ፡ ለአቡየ፡ ኀቤየ፡ ወትሬእዩ፡ ዘይነብብ፡ አፉየ፡ ወአዕይንቲሁኒ፡ ለአኁየ፡
      ብንያም፡ ይሬእያ። እስመ፡ ናሁ፡ ዝንቱ፡ ካልእ፡ ዓም፡ ዘዐባር፡
  - verse: 18
    geez: ወዓዲ፡ ኃምስቱ፡ ዓመት፡ ሀሎ፡ ወአልቦ፡ ማእረር፡ ወአልቦ፡ ፍሬ፡ ዕፅ፡ ወአልቦ፡ ሐፅስ።
  - verse: 19
    geez: ፍጡነ፡ ረዱ፡ አንትሙ፡ ወአብያቲከሙ፡ ከመ፡ ኢትትሐጐሉ፡ በዐባር፡ ወኢትትከዙ፡ በእንተ፡ ጥዕንትከሙ፡ እስመ፡ ለሠሪዕ፡
      አቅደመ፡ ፈንዎተየ፡ እግዚአብሔር፡ ቅድሜክሙ፡ ከመ፡ ይሕየዉ፡
  - verse: 20
    geez: ሕዝብ፡ ብዙኃን። ወዜንውዎ፡ ለአቡየ፡ ከመ፡ ዓዲ፡ ሕያው፡ አነ፡ ወአንትሙ*ኒ፡ ናሁ፡ ትሬእዩ፡ ከመ፡ ሠርዐኒ፡ እግዚአብሔር፡
      ከመ፡ እንተ፡ አቡሁ፡ ለፈርዖን፡ ወከመ፡ እመብል፡ ውስተ፡ ቤቱ፡
  - verse: 21
    geez: ወዲበ፡ ኵሉ፡ ምድረ፡ ግብጽ። ወዜንውዎ፡ ለአቡየ፡ ኵሎ፡ ክብረየ፡ ወኵሎ፡ ዘመጠነ፡ ወሀበኒ፡
  - verse: 22
    geez: እግዚአብሔር፡ ብዕለ፡ ወክብረ። ወወሀቦሙ፡ በቃለ፡ አፈ፡ ፈርዖን፡ ሰረገላተ፡ ወስንቀ፡ ለፍኖት፡
  - verse: 23
    geez: ወወሀቦሙ፡ ለኵሎሙ፡ አልባሰ፡ ኅብር፡ ወብሩረ። ወለአቡሆሙ*ኒ፡ ፈነወ፡ አልባሰ፡ ውብሩረ፡
  - verse: 24
    geez: ወዐሠርተ፡ አእዱገ፡ ዘይወስዱ፡ ስርናየ፡ ወፈነዎሙ። ወዐርጉ፡ ወዜነዉ፡ ለአቡሆሙ፡ ከመ፡ ዮሴፍ፡ ሕያው፡ ወከመ፡ ውእቱ፡
      ይበፍር፡ ስርናየ፡ ለኵሉ፡ አሕዛበ፡ ምድር፡ ወይኴንን፡
  - verse: 25
    geez: ዲበ፡ ኵሉ፡ ምድረ፡ ግብጽ። ወአእምነ፡ አቡሆሙ፡ እስመ፡ ደንገፀ፡ በሕሊናሁ፡ ወእምዝ፡ ርእየ፡ ሰረገላተ፡ ዘፈነወ፡
      ዮሴፍ፡ ወተሐደሰት፡ ሕይወተ፡ መንፈሱ፡ ወይቤ፡ ዐቢይ፡ ውእቱ፡ ሊተ፡ እመ፡ ዮሴፍ፡ ሕያው፤ እረድ፡ ወእርአዮ፡ ዘእንበለ፡
      እሙት።
