translation:
  text: And in the twenty-eighth jubilee, Noah began to command the ordinances and the commandments to his children's children, and all the judgments[a] that he knew. And he testified to his children that they should do righteousness, and cover the shame of their flesh, and bless their Creator,[b] and honor father and mother, and love each one his neighbor, and guard their souls from fornication and uncleanness and all iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "justice".
    reason: lexical_choice
  - marker: b
    text: Lit. "the one who created them".
    reason: literal_translation
