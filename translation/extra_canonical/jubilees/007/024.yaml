  category: mistranslation
  from: against themselves with beasts
  to: against the beasts
  rationale: The Ge'ez phrase 'አበሱ፡ ሎሙ፡ በአራዊት' (abasu lomu ba-arawit) means 'they sinned against the beasts.' The verb 'abasa' takes the preposition 'ba-' to indicate the party sinned against. The pronoun 'lomu' (against them) functions as an anticipatory pronoun referring to the beasts and birds. Translating this as 'against themselves with beasts' misconstrues the grammar and significantly alters the narrative meaning (implying bestiality rather than the violence and consumption of animals, which is the Enochic context for the shedding of blood mentioned immediately after).
