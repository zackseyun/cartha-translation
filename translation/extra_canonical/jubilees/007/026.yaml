  from: and each of you will go after his neighbor,
  to: and you are separating, each one from his neighbor,
  rationale: The verb ተፋለጠ (tetfalatu) means to separate, divide, or part from, not to 'go after'. Additionally, the preposition እም ('em) means 'from', not 'after'.
