  from: which destroyed the middle of the earth,
  to: which they shed in the midst of the earth. He destroyed everything,
  rationale: The translation misses the verb ከዐወ (to pour out/shed), misconstrues ማእከለ ምድር (in the midst of the earth) as the object of destruction rather than the location of the shedding, and ignores ኵሎ (everything). The relative clause 'which they shed' refers back to the 'blood' at the end of verse 25.
