nd sanctified for himself a people for possession from among all the nations, and that they should keep sabbath together with us. And he caused his commands to ascend as a pleasing fragrance acceptable before him all the days. There were twenty-two heads of mankind from Adam to Jacob, and twenty-two kinds of work were made until the seventh day. This is blessed and holy, and this also is blessed and holy; and this one and that one were for holiness and for blessing. And to this one it was given that they should be blessed and holy all the days, according to the testimony and the first law, just as it was sanctified and blessed on the seventh day. He created heaven and earth and everything that he created in six days, and God made the seventh day holy for all his works. Therefore he commanded concerning it that everyone who does any work on it shall die, and whoever defiles it shall surely die. And you command the children of Israel, and let them keep this day so that they may sanctify it, and so that they may not do on it any work, and so that they may not defile it, for it is holier than all days. And everyone who profanes it shall surely die, and everyone who does on it any work shall surely die forever, so that the children of Israel may keep this day throughout their generations and not be uprooted from the land; for it is a holy day and a blessed day. And every person who keeps it and rests on it from all his work will be holy and blessed through all days, like us.
