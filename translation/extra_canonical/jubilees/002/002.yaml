translation:
  text: 'For on the first day he created the heavens above and the earth and the waters and all the spirits that minister before him: the angels of the presence[2], and the angels of sanctification, and the angels of the spirit of fire, and the angels of the spirit of clouds, and of darkness, and of snow and hail and frost, and the angels of the voices and thunder and lightning, and the angels of the spirits of cold and heat and winter and spring and harvest and summer, and all the spirits of his works that are in the heavens and on the earth and in the seas and in the depths and in darkness and in night and in light and in dawn and in morning, which he prepared in the knowledge of his heart.'
