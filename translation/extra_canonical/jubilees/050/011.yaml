translation:
  text: This work alone shall be done on the sabbath days in the house of the sanctuary of the LORD your God, so that they may make atonement for Israel with a continual offering, day by day, as a memorial that is acceptable before the LORD, and he will receive them forever, day after day, according as you were commanded.
