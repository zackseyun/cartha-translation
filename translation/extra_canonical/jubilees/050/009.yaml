translation:
  text: You shall do no work at all on the Sabbath day except what you have prepared for yourselves on the sixth day, to eat and to drink and to rest and to keep Sabbath from all work on this day, and to bless the LORD your God, who has given you a day of festival and a holy day and a holy day of the kingdom for all Israel—this day throughout their days, throughout all days.
