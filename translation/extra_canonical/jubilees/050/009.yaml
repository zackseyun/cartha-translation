  from: throughout their generations
  to: throughout their days
  rationale: The Ge'ez word is በመዋዕሊሆሙ (in their days), not a word for "generations" (such as ትውልድ). Translating it as "days" also pairs better with the following phrase "throughout all days" (በኵሉ፡ መዋዕል).
