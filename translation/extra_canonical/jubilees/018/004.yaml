  category: mistranslation
  from: with the donkey
  to: with the donkeys
  rationale: The Ge'ez word 'adget' (አድግት) is plural ('donkeys'). The singular 'donkey' in the draft likely results from harmonization with the Masoretic Text of Genesis 22:5, but Jubilees here explicitly uses the plural.
