  category: lexical
  from: water-pit
  to: well of water
  rationale: The Ge'ez phrase ዐዘቅተ ማይ (azeqta may) is the standard term for a 'well of water' (often translating Hebrew בְּאֵר מַיִם). While 'water-pit' is etymologically defensible, 'well of water' is more natural in English and standard for this idiom.
