  rationale: The Ge'ez verb ገብዐ (gabʿa), here in the imperfect form ወይገብዕ (wa-yəgabəʿ), means 'to be terrified' or 'to shrink back,' not 'to hasten.' This is a unique narrative expansion in Jubilees (that Abraham was terrified by the sudden voice from heaven), which is lost in the current draft. Standard translations (Charles, VanderKam, Wintermute) consistently render this as 'he was terrified.'
