lexical_decisions:
- source_word: ልህቃነ
  chosen: rights of the firstborn
  alternatives:
  - birthright
  - firstborn share
  rationale: The context is inheritance/primogeniture, not merely a blessing. 'Rights
    of the firstborn' preserves the legal nuance while remaining readable.
- source_word: በተጠብቦት
  chosen: by craftiness
  alternatives:
  - with cunning
  - deceitfully
  rationale: The term marks deliberate shrewd deception in the blessing episode. 'By
    craftiness' preserves moral force without over-expanding.
- source_word: ፵፻
  chosen: four thousand
  alternatives:
  - four hundred
  rationale: The Ge'ez numeral ፵፻ represents 40 hundreds, which is 4,000. The previous
    draft incorrectly rendered this as 'four hundred'.
theological_decisions:
- issue: Esau's oath and later violation
  chosen_reading: The text presents Esau as having truly sworn to Isaac and Rebekah
    not to seek evil against Jacob, then consciously abandoning that oath.
  alternative_readings:
  - The oath may be rhetorical or secondary in the narrative logic
  - The wording could imply only a temporary truce
  rationale: The Ge'ez explicitly recalls an oath to father and mother and frames
    Esau's renewed hostility as moral apostasy, which fits Jubilees's strong concern
    for sworn obligations and kinship ethics.
- issue: Jacob's killing of Esau
  chosen_reading: Jacob himself kills Esau with an arrow in this chapter's retelling.
  alternative_readings:
  - A harmonizing reading might minimize Jacob's direct role to align with Genesis
  rationale: Jubilees here intentionally diverges from Genesis tradition, and the
    translation must preserve that expansion rather than harmonize it away.
