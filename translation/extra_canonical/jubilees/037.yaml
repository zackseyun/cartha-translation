  rows:
  - verse: 1
    geez: ወበዕለተ፡ ሞተ፡ ይስሐቅ፡ አቡሁ፡" ለያዕቆብ፡ ወለዔሳው፡ ሰምዑ፡ ውሉደ፡ ዔሳው፡ ከመ፡
  - verse: 2
    geez: ወሀቦ፡" ይስሐቅ፡ ልህቃነ፡" ለያዕቆብ፡ ወልዱ፡ ዘይንእስ፡ ወተምዑ፡ ፈድፋደ። ወተጋአዙ፡ ምስለ፡ አቡሆሙ፡ እንዘ፡
      ይብሉ፡ በእንተ፡ ምንት፡ *እንዘ፡ ሀሎከ፡ አንተ፡ ዘትልህቅ፡ ወእንዘ፡
  - verse: 3
    geez: ያዕቆብ፡ ይንእስ፡" ለያዕቆብ፡" ወሀቦ፡ አቡከ፡ ልህቃነ፡" ወኪያከ፡ ኀደገ። ወይቤሎሙ፡ እስመ፡ አነ፡ ሤጥኩ፡ ቅድመ፡"
      ልደትየ፡ ለያዕቆብ፡ በኅዳጥ፡ ጸብሐ፡ ብርስን፡ ወበዕለተ፡ ፈነወኒ፡ አቡየ፡ *እንፀው፡ ወአስግር፡" ወአምጽእ፡" ሎቱ፡ ከመ፡
      ይብላዕ፡ ወይባርከኒ፡ መጽአ፡ በተጠብቦት፡" ወአብአ፡ ለአቡየ፡ መብልዐ፡ ወመስተ፡ ወባረኮ፡ አቡየ፡ ወኪያየ፡ ረሰየኒ፡ ታሕተ፡
      እዴሁ። ወይእዜኒ፡ እምሐለኩ፡ አቡከ፡ ኪያየ፡ ወኪያሁ፡ ከመ፡ ኢነትኃሠሥ፡ በእኩይ፡ *አሐዱ፡ ላዕለ፡ እኁሁ፡
  - verse: 5
    geez: ወከመ፡ ነሀሉ፡ በተፋቅሮ፡ ወበሰላም፡ ብእሲ፡ ምስለ፡ እኁሁ፡ ወኢናማስን፡ ፍኖዊነ። ወይቤልዎ፡ ኢንሰምዐከ፡ ለገቢረ፡
      ምስሌሁ፡ ሰላመ፡ እስመ፡ ኃይለ፡ ዚአነ፡ ይጸንዕ፡ እምኃይሉ፡ ወንሕነ፡ ንጸንዕ፡ እምኔሁ፤ ሖውር፡ ላዕሌሁ፡ ወንቅትሎ፡ ወናሐጕሎ፡
      ውሉዱ፡ ወለእመ፡ ኢተሐውር፡
  - verse: 6
    geez: ምስሌነ፡ ለከሂ፡ ናሐስም። ወይእዜኒ፡ ስምዐነ፡ ወንፈኑ፡ ውስተ፡ አራም፡ ወውስተ፡ ፊልስ ጥኤም። ወውስተ፡ ሞአብ፡
      ወውስተ፡ አሞን፡ ወንኅረይ፡ ለርእስነ፡ ኅሩያነ፡ ሰብአ፡ እለ፡ ይዳበጉ፡ ውስተ፡ ቀትል፡ ወንሖር፡ ላዕሌሁ፡ ወንትቃተል፡
      ምስሌሁ፡ ወንሠርዎ፡ እምድር፡ እንበለ፡ የአዝዝ፡
  - verse: 7
    geez: ኃይለ። ወይቤሎሙ፡ አቡሆሙ፡ ኢትሖሩ፡ ወኢትግበሩ፡ ምስሌሁ፡ ፀብአ፡ ከመ፡ ኢትደቁ፡
  - verse: 8
    geez: ቅድሜሁ። ወይቤልዎ፡ ዝኒ፡ *ከመ፡ ገብርከ፡ ዘእምውርዝትከ፡ እስከ፡ ዛቲ፡ ዕለት፡ ወአንተ፡
  - verse: 9
    geez: ታበውአ፡ ክሳደከ፡ ታሕተ፡ አርዑቱ፡ *ኢንሰምዕ፡ ንሕነሰ፡ *ዘንተ፡ ነገረ። ወፈነዉ፡ ውስተ፡ አራም፡ ወኀበ፡ አዱራም፡
      ኀበ፡ ዐርከ፡ አቡሆሙ፡ ወተዐሰቡ፡ ምስሌሆሙ፡ ፲፻ መስተባእሳነ፡
  - verse: 10
    geez: ዕደወ፡ መስተቃትላነ፡ ኅሩያነ። ወመጽኡ፡ ኀቤሆሙ፡ እምነ፡ ሞአብ፡ ወእምኀበ፡ ውሉደ፡ አሞን፡ እለ፡ ተዐሰቡ፡ ፲፻
      ኅሩያነ፡ ወእምነ፡ ፍልስጥኤም፡ ፲፻ ኅሩያነ፡ መስተቃትላነ፡ ወእምኤዶም፡ ወእምነ፡ ሖሬዎን፡ ፲፻ ኅሩያነ፡ መስተባእሳነ፡
      ወእምነ፡ ኬጢዎን፡ ዕደወ፡
  - verse: 11
    geez: ጽኑዓነ፡ መስተቃትላነ። ወይቤልዎ፡ ለአቡሆሙ፡ ፃእ፡ *ምስሌሆሙ፡ ወምርሖሙ፡ ወእመ፡
  - verse: 12
    geez: አኮ፡ ንቀትለከ። ወመልአ፡ መዐተ፡ ወቍጥዓ፡ በጊዜ፡ ርእየ፡ ውሉዶ፡ *ከመ፡ ይትኤገልዎ፡ ከመ፡
  - verse: 13
    geez: ይሖር፡ ቅድመ፡ ይምርሖሙ፡ ኀበ፡ ያዕቆብ፡ እኁሁ። ወእምዝ፡ ተዘከረ፡ ኵሎ፡ እኩየ፡ *እንተ፡ ሀለወት፡ ውስተ፡ ልቡ፡
      ኅብእተ፡ ላዕለ፡ ያዕቆብ፡ እኁሁ፡ ወኢተዘከረ፡ መሐላ፡ ዘመሐለ፡ ለአቡሁ፡ ወለእመ፡ ከመ፡ ኢይትኃሠሥ፡ ኵሎ፡ እኩየ፡ *ኵሎ፡
      መዋዕሊሁ፡ *ላዕሌሁ፡ ለያዕቆብ፡
  - verse: 14
    geez: እኁሁ። ወበዝ፡ ኵሉ፡ ኢያእመረ፡ ያዕቆብ፡ ከመ፡ እሙንቱ፡ ይመጽኡ፡ ኀቤሁ፡ ለቀትል፡ ወውእቱሰ፡ ይላሑ፡ ልያሃ፡ ብእሲቱ፡
      እስከ፡ ሶበ፡ ቀርቡ፡ ጥቃ፡ ማኅፈድ፡ በ፵፻ብእሲ፡ መስተቃላን፡ ወመስተበአላን፡ ኀሩያን፡ ወለአኩ፡ ኀቤሁ፡ ሰብአ፡ ክቡርን፡
      እንዘ፡ ይብሉ፡ ናሁ፡ አኀዊከ፡ መጽኡ፡ ላዕሌከ፡ ይትቃተሉከ፡ በ፬፻፡ ብእሲ፡ ቅኑታነ፡ ሰይፍ፡ ወይጸውሩ፡ ወልታ፡ ወንዋየ፡
      ሐቅል፡ እስመ፡ ይፈቅርዎ፡ ለያዕቆብ፡ እምዔሳው፡ ወነገርዎ፡ እስመ፡ ያዐቍብ፡ ብእሲ፡ ጸጋዊ፡ ወመሓሪ፡ ውእቱ፡ እምነ፡ ዔሳው።
      ወእምዝ፡ ያዕቆብ፡ አሰከ፡ ሶበ፡ ቀርቡ፡ ጥቃ፡ ማኅፈድ። ወዐጸወ፡ አናቅጸ፡ ማኅፈድ፡ ወቆመ፡ ውስተ፡ ተደባብ፡ ወተናገረ፡
      ምስለ፡ እኁሁ፡ ዔሳው፡ ወይቤ፡ ሠናይ፡ ኑዛዜ፡ ዘመጻእከ፡ ትናዝዘኒ፡ በእንተ፡ ብእሲትየ፡ እንተ፡ ሞተት፡ ዝኑ፡ ውእቱ፡
      መሐላ፡ ዘመሐልከ፡ ለአቡከ፡ ወለእምከ፡ ካዕበ፡ ዘእንበለ፡ ይመቱ፡ አበስከ፡ እመሐላ፡ ወበሰዐተ፡ መሐልከ፡ ለአቡከ፡ ትኩነንከ።
      ወውእቱ፡ ጊዜ፡ አውሥአ፡ ዔሳው፡ ወይቤሎ፡ አልቦ፡ ለውሉደ፡ ሰብእ፡ ወለአራዊተ፡ ምድር፡ መሐላ፡ ጽድቅ፡ ዘመሐሉ፡ ምሑሎሙ፡
      እስከ፡ ለዓለም፡ ወእንተ፡ ጸብሐት፡ የኀሡ፡ ዝንቱ፡ ለዝንቱ፡ እኩየ፡ ወከመ፡ ይቅትል፡ ፩ጸላኢሁ፡ ወፀሮ። ወትጸልአኒ፡ አንተ፡
      ኪያየ፡ ወውሉድየ፡ እስከ፡ ለዓለም፡ ወአልቦ፡ ገቢረ፡ ምስሌከ፡ ተአኃ። ስማዕ፡ ዘንተ፡ ነገርየ፡ ዘአነ፡ እነግረከ፡ እመ፡
      ይዌልጥ፡ ሐራውያ፡ ማእሰ፡ ወጸጕርሂ፡ ከመ፡ ፀምር፡ አይከመ፡ ወእመ፡ አወፀአ፡ ዲበ፡ ርእሱ፡ አቅርንተ፡ ከመ፡ አቅርንተ፡
      ሀየል፡ ወአባግዕ፡ አሜሃ፡ እገብር፡ ምስሌከ፡ ተአኃ፡' ወእመአመ፡' ተፈለጠ፡' እትቡዕ፡' እምእሞሙ፡' አክንከኒ፡' ፡'
      አኅወ፡' ወእመ፡ ገብሩ፡ ኀዙኅት፡ ሰላመ፡ ምስለ፡ መሐከአ፡' ከመ፡ ኢይብልዕዎሙ፡ ወከመ፡' ኢይትዐገልዎሙ፡ ወእመ፡ ኮነ፡
      አልባቢሆሙ፡ በላዕሌሆሙ፡ በእሠንየ፡ አሜሃ፡ ይከውን፡ በውስተ፡ ፡' ልብየ፡ ላዕሌከ፡ ሰላመ፡' ወእእመ፡ ኮነ፡ አንበሳ፡
      ማኅፈሮ፡'' በላህም፡ ወእመ፡' ተፀምደ፡ ምስሌሁ፡' በአሐዱ፡' አርዑት፡ ወሓረሰ፡' ምስሌሁ፡ *ወገብረ፡ ሰላመ፡ ምስሌሁ፡'
      አሜሃ፡' ፡' እገብር፡ *ምስሌከ፡ ሰላመ፡' ወእመ፡' ጻዕደወ፡' ቋዓት፡ ከመ፡ ራዛ፡ አሜሃ፡ አእምር፡' ከመ፡ አፍቀርኩከ፡
      ወእገብር፡ ምስሌከ፡ ሰላመ። ተሠረወ፡' አንተ፡ ወይሠረዉ፡ ውሉድከ፡ ወኢይኩን፡ ፡' ለከ፡' ሰላመ። ወበጊዜ፡ ርእየ፡ ያዕቆብ፡
      ከመ፡ አእከየ፡ እምልቡ፡' ላዕሌሁ፡ ወእምኵሉ፡ ነፍሱ፡ ከመ፡ ይቅትሎ፡ ወመጽአ፡ እንዘ፡ ያንፈርዐጽ፡ ከመ፡ መፍለስ፡ ዘይመጽእ፡
      ውስተ፡ ረምሕ፡ ፡' ዘይረግዞ፡ ወይቀትሎ፡ ወኢይሴስል፡' እምኔሁ። *ውእተ፡ ጊዜ፡' ይቤ፡ ለአሊአሁ፡ ወለአግብርቲሁ፡ ከመ፡
      ይሩድዎ፡ ወለኵሎሙ፡' ካልአኒሁ።
