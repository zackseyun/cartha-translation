  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/024/003.job-76515.json
  category: mistranslation
  from: Sell me your birthright first.
  to: Sell me your firstborn birthright.
  rationale: The Ge'ez phrase `ዘቅድመ፡ ልደት` (za-qedma ledat) literally means 'of the first birth' (i.e., firstborn status), modifying 'your seniority/birthright' (`ልህቃኒከ`). The recent revision mistakenly treated it as an adverb ('first' in time), losing the explicit reference to the firstborn share.
- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/024/003.job-76515.json
  category: lexical
  from: Give me some of this lentil stew.
  to: Give me some of this wheat stew.
  rationale: While the first clause correctly translates `ተብሰለ፡ ብርስን` as 'lentil stew', Esau's actual request in the Ge'ez is for `ተብሰል፡ ዘሥርናይ` ('stew of wheat/grain'). Translating this second instance as 'lentil stew' harmonizes the text and obscures a known textual oddity in the Ge'ez manuscript tradition. It should be translated literally, perhaps with a footnote.
