translation:
  text: after Abraham died, and filled them with earth. And Abimelech said to Isaac, "Go away from us, for you have become much mightier than we." And Isaac departed from there in the first year of the seventh week and camped in the valley of Gerar. And they dug again the wells of water that the servants of Abraham his father had dug, and that the Philistines had stopped up after Abraham his father died; and they called their names by the names that Abraham his father had called them. And Isaac's servants dug a well in the wadi and found living water. And the shepherds of Gerar quarreled with Isaac's shepherds, saying, "The water is ours." And Isaac called the name of that well Contention, because they contended with us. And they dug another well, and they quarreled over that one also, and he called its name Hostility. And he moved on from there and dug another well, and they did not quarrel over it, and he called its name Broad Place. And Isaac said, "Now the LORD has made room for us,
    and we will be fruitful in the land." And he went up from there to the Well of the Oath in the first year of the first week in the forty-fourth jubilee. And the LORD appeared to him that night, at dawn on the first day of the first month, and said to him, "I am the God of Abraham your father. Do not fear, for I am with you, and I will bless you and greatly multiply your seed like the sand of the earth, for the sake of Abraham my servant." And he built there an altar where Abraham his father had first built one, and he called on the name of the LORD, and he offered sacrifice to the God of Abraham his father. And they dug a well and found living water. And Isaac's servants dug another well and did not find water, and they came and told Isaac that they had not found water. And Isaac said, "On this day I have sworn to the Philistines, and this thing has happened to us." And he called the name of that place Well of the Oath, because there he swore to Abimelech and to Ahuzzath his companion
    and to Phicol the captain of his army. And Isaac knew on that day that he had sworn under compulsion, to make peace with them. And on that day Isaac cursed the Philistines and said, "Cursed be the Philistines with wrath and indignation among all the nations. May the LORD give them over for reproach and for cursing and for wrath and for indignation into the hand of sinful nations, into the hand of the Kittim. And those who escape from the sword of the enemy and from the Kittim, let a righteous people root them out in judgment from under heaven, because they will be enemies and haters of my children in their generations upon the earth. And there will not be left to them any survivor or anyone who escapes in the day of wrathful judgment. For all the seed of the Philistines is destined for destruction and uprooting and removal from the earth, and there will no longer remain for these Caphtorim a remnant or seed upon the earth. For even if he goes up to heaven, from there he will be brought
    down; and if he sinks into the earth, from there he will be dragged away; and if he hides among the nations, from there he will be rooted out; and if he goes down into Sheol, there also his judgment will increase, and there will be no peace for him there. And if he goes into captivity, by the hand of those who seek his life on the highways they will kill him, and there will be left for him neither name nor seed in all the earth, for he will go into eternal curse." And thus it is written and ordained concerning him on the heavenly tablets, to do to him on the day of judgment, so that he should be rooted out from the earth.
