    nest in the earth, from there he will be torn away; and if he hides among the nations, from there he will be rooted out; and if he goes down into Sheol, there also his judgment will increase, and there will be no peace for him there. And if he goes into captivity, by the hand of those who seek his life on the highways they will kill him, and there will be left for him neither name nor seed in all the earth, for he will go into eternal curse." And thus it is written and ordained concerning him on the heavenly tablets, to do to him on the day of judgment, so that he should be rooted out from the earth.
