  category: mistranslation
  from: and he departed from the command of his father
  to: and kept the command of his father, but Esau rejected it
  rationale: The Ge'ez verb ኀለወ (xalawa) means 'to keep' or 'to observe', not 'to depart'. The revision pass incorrectly made Jacob the one who disobeys, reversing the theology of Jubilees. Additionally, the source text provided contains a severe OCR error ('ወኀለወ*ሱ፡ ትእዛዘ፡ እምዐበየ' instead of Charles's actual text 'ወኀለወ ፡ ትእዛዘ ፡ አቡሁ ፡ ወዔሳውሰ ፡ ዐበየ'). The text should read that Jacob kept his father's command, but Esau rejected it (ዐበየ, 'abaya).
- timestamp: '2026-04-28T09:36:31Z'
