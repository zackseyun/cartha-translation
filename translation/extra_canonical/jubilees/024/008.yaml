- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/024/008.job-76520.json
  category: mistranslation
  from: went down
  to: was going to go down
  rationale: The Ge'ez verb ይረድ (yərəd) is an imperfect/jussive form indicating intention or incipient action ('was going to go down' or 'set out to go down'), not a completed past action (which would be the perfect ወረደ, wärädä). The revision to 'went down' introduces a major narrative error, as Isaac does not actually go to Egypt but stops in Gerar.
- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/024/008.job-76520.json
  category: lexical
  from: the sixth week
  to: this week
  rationale: The Ge'ez text reads ዘዝ፡ ሱባዔ (zä-zə subaʿe), which literally translates to 'of this week.' While it may contextually refer to the sixth week, translating the demonstrative pronoun ዝ (zə, 'this') as 'sixth' obscures the literal text.
