  from: Isaac set out to go down to Egypt in the second year of the sixth week. And he went to Gerar, to Abimelech king of the Philistines.
  to: Isaac went down to Egypt in the second year of the sixth week, and he went to Gerar, to Abimelech king of the Philistines.
