  category: mistranslation
  from: red lentil stew
  to: wheat stew
  rationale: The Ge'ez text reads 'ስርናይ' (srnāy), which means 'wheat', not 'lentil' (which would be brsn), and there is no word for 'red' in the text here. While Genesis 25 mentions red lentil stew, the Ge'ez text of Jubilees explicitly says 'wheat stew' (tabsala srnāy). Translating it as 'red lentil stew' harmonizes with Genesis but departs from the actual Ge'ez source text.
