  rows:
  - verse: 1
    geez: ተዘከር፡ ትእዛዘ፡ ዘአዘዘከ፡ እግዚአብሔር፡ በእንተ፡ ፋሲካ፡ ከመ፡ ትግበር፡ በጊዜሁ፡ አመ፡ ዐሡሩ፡ ወረቡዑ፡ ለወርኅ፡
      ቀዳማዊ፡ ከመ፡ ትጥብቍ፡ ዘእንበለ፡ ይምሰይ፡ ወከመ፡ ይብልዕዎ፡
  - verse: 2
    geez: በሌሊት፡ አመ፡ ምሴት፡ ዘዐሡር፡ ወሐሙስ፡ እምጊዜ፡ ዐርበተ፡ ፀሐይ። እስመ፡ በዛቲ፡ ሌሊት፡ ቀዳሜ፡ በዓል፡ ይእቲ፡
      ወቀዳሜ፡ ፍሥሓ፡ ይእቲ፡ አንትሙ፡ ትነብሩ፡ ትበልዑ፡ ጳስካ፡ በግብጽ፡ ሐኵለነ፡ ኀያላቲሁ፡ ለመስተማ፡ ተፈነወ፡ ከመ፡ ይቅትል፡
      ኵሎ፡ በኵረ፡ በምድረ፡ ግብጽ፡ እምበኵረ፡ ፈርዖን፡ እስከ፡ *በኵረ፡ ለእኪት፡ ፄዋዊት፡' እንተ፡ ውስተ፡ ማኅረጽ፡ ወላዕለ፡
      እንስሳ*ሂ። ወዛቲ፡ ትእምርት፡ ዘወሀበ፡ እግዚአብሔር፡ ሎሙ፡ ውስተ፡ ኵሉ፡ ቤት፡ ዘርእዩ፡ ውስተ፡ አንቀጹ፡ ደመ፡ በግዕ፡
      ዘዓመት፡ አይበኡ፡ ውስተ፡ ቤቱ፡ ለቀቲል፡ እላ፡ ይትዐደዉ፡ ከመ፡ ይድኅኑ፡ ኵሎሙ፡ እለ፡ ውስተ፡ ቤት፡ እስመ፡ ትእምርት፡
      ደም፡ ውስተ፡ አንቀጹ። ወገብሩ፡ ኀይላቲሁ፡ ለእግዚአብሔር፡ ኵሎ፡ ዘመጠነ፡ አዘዞሙ፡ እግዚአብሔር፡ ወተዐደዉ፡ እምኵሉ፡
      ደቂቀ፡ እስራኤል፡ ወኢቦአ፡ ላዕሌሆሙ፡ መቅሠፍት፡ ለአማስኖ፡ እምኔሆሙ፡ *ኵሎ፡ ነፍሰ፡ እምእጓስሳ፡ እስከ፡ ሰብእ፡ ወእስከ፡
      ከልብ። ወኮነ፡ መቅሠፍት፡ በግብጽ፡ ጥቀ፡ ዐቢይ፡ ወአልቦ፡ ቤት፡ በግብጽ፡ ዘአልቦ፡ በ.ርካ፡ ውስቴታ፡ *ውቡካየ፡ ወዐሙታነ፡
      ወኵሉ፡ እስራኤል፡ ይነብር፡ እንዘ፡ ይበልዕ፡ ሥጋ፡ ጰስካ፡ ወእንዘ፡ ይስቲ፡ ወይነ፡ ወይሴብሕ፡ ወይባርክ፡ ወያአኵት፡ እግዚአብሔር፡
      አምላከ፡ አበዊሁ፡ ወ.ድልወ፡ ይከውን፡ ለወፂእ፡ እምአርዑተ፡ ግብጽ፡ ወእምቅኔ፡ እኪት። ወአንተኒ፡ ተዘከር፡ *ዛተ፡ ዕለተ፡
      ኵሎ፡ መዋዕለ፡ ሕይወትከ፡ ወግበራ፡ *እምዓም፡ ለዓም፡ ኵሎ፡ *መዋዕለ፡ ሕይወትከ፡ ምዕረ፡ ለዓመት፡ በዕለቱ፡ በከመ፡ *ኵሉ፡
      ሕጉ፡ ወኢ*ታስተሐልፍ፡ *ዕለተ፡ እምዕለት፡ ወእምወርኅ፡ ለወርኅ። እስመ፡ ሥርዐት፡ ዘለዓለም፡ ውእቱ፡ ወቅዱጽ፡ ውስተ፡
      ጽላተ፡ ሰማይ፡ ለኵሉ፡ ውሉደ፡ እስራኤል፡ ከመ፡ ይግበርዎ፡ በኵሉ፡ ዓመት፡ ወዓመት፡ በዕላቱ፡ ምዕረ፡ ለዓመት፡ ውስተ፡
      ኵሉ፡ ትውልዶሙ፡ ወአልቦ፡ ወበከ፡ መዋዕል፡ እስመ፡ ለዓለም፡ ውእቱ፡ ሥርዓተ፡ ወብእሲ፡ እንዘ፡ ንጹሕ፡ ውእቱ፡ ወአመጽአ፡
      ይገብር፡ በጊዜ፡ ዕለቱ፡ ለአብአ፡ ቍርባን፡ ዘይሠምር፡ ቅድመ፡ እግዚአብሔር፡ ወለበሊዕ፡ ወለሰቲይ፡ ቅድመ፡ እግዚአብሔር፡
      በዕለተ፡ በዓሉ፡ ወይሠረው፡ ውእቱ፡ ብእሲ፡ ዘንጹሕ፡ ወትሩብ፡ እስመ፡ ቍርባነ፡ እግዚአብሔር፡ ኢያብአ፡ በጊዜሁ፡ ኃጢአተ፡
      ይነሥእ፡ ውእቱ፡ ብእሲ፡ ለርእሱ። ከመ፡ ይኩኑ፡ ውሉደ፡ እስራኤል፡ እለ፡ ይመጽኡ፡ ወይገብሩ፡ ፋሲካ፡ በዕለተ፡ ጊዜሁ፡
      አመ፡ ዐሡሩ፡ ወረቡዑ፡ ለወርኅ፡ ቀዳማዊ፡ በማእከለ፡ ምሴያታት፡ እምማእከለ፡ ሰዓት፡ እስከ፡ ሣልሲት፡ ለሌሊት፡ እስመ፡
      ክልኤ፡ መክፈልታ፡ ለዕለት፡ ትውሀብ፡ ለብርሃን፡ ወሣልስ፡ እምሴት፡ ዝውእቱ፡ ዘአዘዘከ፡ እግዚአብሔር፡ ከመ፡ ትግበር፡ በማእከለ፡
      ምሴት። ወኢይከውን፡ ጠቢሖታ፡ በኵሉ፡ ጊዜ፡ ብርሃን፡ ዘእንበለ፡ በጊዜ፡ ሠርክ፡ ምሴት፡ ወይበልዕዎ፡ በጊዜ፡ ምሴት፡ እስከ፡
      ሣልሲት፡ ሌሊት፡ ወዘተርፈ፡ እምኵሉ፡ ሥጋሁ፡ እምሣልሲት፡ ሌሊት፡ ወክሡ፡ በእሳት፡ ያውዕይዎ። ወኢይከውን፡ ይብልዎ፡ ጥሬ፡
      ወኢይበልዕዎ፡ ጥሬ፡ አላ፡ ጥቡሰ፡ በእሳት፡ ይበልዕዎ፡ በእስተሐምሞ፡ ርእሶ፡ ምስለ፡ ንዋየ፡ ውስጡ፡ ወምስለ፡ እገሪሁ፡
      ይጥብስዎ፡ በእሳት፡ ወአልቦ፡ ዐቢረ፡ ዐጽም፡ እምውስቴቱ፡ ምንተኒ፡ እስመ፡ ኢይትቀጠቀጥ፡ እምውሉደ፡ እስራኤል፡ ምንምኒ፡
      ዐጽም። በእንተዝ፡ አዘዞሙ፡ እግዚአብሔር፡ ለውሉደ፡ እስራኤል፡ ከመ፡ ይግበሩ፡ ፋሲካ፡ በዕለተ፡ ጊዜሁ፡ ወኢይከውን፡ ሰቢረ፡
      ዐጽም፡ ምንትኒ፡ እምኔሁ፡ እስመ፡ ዕለተ፡ በዓል፡ ይእቲ፡ ወዕለት፡ እዝዝት፡ ይእቲ፡ ወአልቦ፡ ተዐድዎ፡ እምውስቴቱ፡ ዕለት፡
      እምዕለት፡ ወእምወርኅ፡ ወርኅ፡ እስመ፡ በዕለተ፡ በዓሉ፡ ይትገበር። ወአንተኒ፡ አዝዞሙ፡ ለውሉደ፡ እስራኤል፡ ከመ፡ ይግበሩ፡
      ፋሲካ፡ በመዋዕሊሆሙ፡ በኵሉ፡ ዓመት፡ ምዕረ፡ ለዓመት፡ በዕለተ፡ ጊዜሁ፡ ወይመጽእ፡ ተዝካረ፡ እምቅድመ፡ እግዚአብሔር፡ ዘይሠምር፡
      ወኢይመጽኦሙ፡ መቅሠፍት፡ ለቀቲል፡ ወለ*ምሕፀት፡ በውእቱ፡ ዓመት፡ አመ፡ ገብሩ፡ ጳስካ፡
  - verse: 16
    geez: በጊዜሁ፡ *በኵሉ፡ በከመ፡ ትእዛዙ። ወኢይከውን፡ ለበሊያቶ፡ በ*አፍአ፡ እምቤተ፡ መቅደሱ፡ ለእግዚአብሔር፡ ወበአንጻረ፡
      ቤተ፡ *መቅደሱ፡ ለእግዚአብሔር፡ ወኵሉ፡ ሕዝበ፡ ማኅበ
  - verse: 17
    geez: ሮሙ፡ ለእስራኤል፡ ይገበርዎ፡ በጊዜሁ። ወ*ኵሉ፡ ሰብእ፡ *ዘመጽአ፡ በዕለቱ፡ ይብልዎ፡ በቤተ፡ መቅደሱ፡ ለአምላክክሙ፡
      በቅድመ፡ እግዚአብሔር፡ ዘእም*፳ዓመት፡ ወላዕለ፡ እስመ፡
  - verse: 18
    geez: ከመዝ፡ ተጽሕፈ፡ ወተሠርዐ፡ ከመ፡ ይብልዕዎ፡ በቤተ፡ መቅደሱ፡ ለእግዚአብሔር። ወ*እምከመ፡ ቦኡ፡ ውሉደ፡ እስራኤል፡
      ውስተ፡ ምድር፡ እንተ፡ ይእኅዙ፡ ውስተ፡ ምድረ፡ ከናአን፡ ወ*ይተክሉ፡ ደብተራ፡ እግዚአብሔር፡ ማእከለ፡ ምድር፡ ውስተ፡
      አሐዱ፡ እምነ፡ ሠራዊቶሙ፡ እስከ፡ አመ፡ ይትሐነጽ፡ መቅደሱ፡ ለእግዚአብሔር፡ በዲበ፡ ምድር፡ ወ*ይኩኑ፡ እንዘ፡ ይመጽኡ፡
      ወይገብሩ፡ ጳስካ፡ *በማእከለ፡ ደብተራሁ፡ ለእግዚአብሔር፡ *ወይጠብኅዎ፡ በቅድመ፡ እግዚአብ
  - verse: 19
    geez: ሔር፡ እምዓመት፡ በ*ዓመት። ወበመዋዕለ፡ አመ፡ ተሐንጸ፡ ቤት፡ በስመ፡ እግዚአብሔር፡ በምድረ፡ ርስትሙ፡ ህየ፡ የሐሩ፡
      ወይጥብሑ፡ ጳስካ፡ ምሴተ፡ እንዘ፡ የዐርብ፡ ፀሐይ፡
  - verse: 20
    geez: በ*ሣልስቲ፡ ለዕለት። ወያዐርጉ፡ ደሞ፡ ውስተ፡ ምካይዳ፡ ለምሥዋዕ፡ ወሥብሖ፡ ይነብሩ፡ ዲበ፡ እሳት፡ ዘላዕለ፡ ምሥዋዕ፡
