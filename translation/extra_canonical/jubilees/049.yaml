translation:
  text: '1. Remember the command that the LORD commanded you concerning the Passover:
    that you should keep it at its appointed time, on the fourteenth day of the first
    month; that you should slaughter it before evening and that they should eat it.

    2. In the night, at the evening of the fifteenth, from the setting of the sun.
    For on this night the beginning of the feast came, and the beginning of rejoicing
    came. You were dwelling in Egypt, eating the Passover, while all the powers of
    Mastema were sent to strike all the firstborn in the land of Egypt, from the firstborn
    of Pharaoh to the firstborn of the captive maidservant who was in the mill-house,
    and upon the cattle. And this is the sign that the LORD gave them: in every house
    where they saw the blood of a year-old lamb on the doorposts, they should not
    enter that house to kill, but should pass over it so that all who were in the
    house might be saved, because the sign of the blood was on its doorposts. And
    the powers of the LORD did everything just as the LORD commanded them, and they
    passed over all the sons of Israel, and no plague came upon them to destroy from
    among them any life, from livestock to man and even to dogs. And the plague in
    Egypt was very great, and there was no house in Egypt in which there was not one
    dead, and mourning and lamentation. But all Israel was dwelling while eating the
    flesh of the Passover and drinking wine and praising and blessing and giving thanks
    to the LORD, the God of their fathers, and they were ready to go out from under
    the yoke of Egypt and from the evil bondage. And you also, remember this day all
    the days of your life, and observe it from year to year all the days of your life,
    once each year, on its day, according to all its law; and do not move the day
    from day to day or from month to month. For it is an everlasting statute, and
    it is written and ordained on the heavenly tablets for all the children of Israel,
    that they should observe it in every year, year by year, on its day, once each
    year, throughout all their generations; and there is no end of days, for this
    is ordained forever. And the man who is clean and comes to observe it on its day,
    to bring an acceptable offering before the LORD and to eat and drink before the
    LORD on the day of its feast—if that man, being clean and near, neglects it because
    he did not bring the offering of the LORD at its appointed time, that man shall
    bear his sin. Therefore the children of Israel shall come and observe the Passover
    at its appointed day, on the fourteenth day of the first month, between the evenings,
    from the third part of the day to the third part of the night; for two parts of
    the day are given to the light, and a third part to the evening. This is what
    the LORD commanded you to observe in the middle of the evening. And it shall not
    be slaughtered during any time of the light except at the border of evening, and
    they shall eat it at the time of evening until the third part of the night; and
    whatever remains of all its flesh after the third part of the night they shall
    burn with fire. And they shall not eat it raw, nor shall they eat it boiled in
    water, but they shall eat it roasted with fire, with its head, with its inner
    parts, and with its feet they shall roast it with fire; and they shall not break
    any bone from it, for no bone of the children of Israel is to be crushed. Because
    of this the LORD commanded the children of Israel to observe the Passover at its
    appointed day, and no bone is to be broken from it, because it is a day of festival
    and a day commanded; and they are not to shift it from within the day to another
    day, or from month to month, but it is to be observed on the day of its feast.
    And you, command the children of Israel to observe the Passover in their days,
    in every year, once each year, on its appointed day; and it shall come as a memorial
    acceptable before the LORD, and no plague shall come upon them for slaughter or
    for smiting in that year when they observe the Passover

    16. at its appointed time, in every respect according to its command. And it shall
    not be lawful to eat it outside the sanctuary of the LORD, but opposite the sanctuary
    of the LORD, and all the assembly

    17. of the people of Israel shall observe it at its appointed time. And every
    man who has come on that day shall eat it in the sanctuary of your God before
    the LORD, from twenty years old and upward, because

    18. thus it is written and ordained that they should eat it in the sanctuary of
    the LORD. And when the children of Israel enter the land which they are to possess
    in the land of Canaan, and they set up the tent of the LORD in the midst of the
    land, in one of their tribes, until the sanctuary of the LORD is built in the
    land, they shall come and observe the Passover in the midst of the tent of the
    LORD, and they shall slaughter it before the LORD

    19. from year to year. And in the days when the house is built in the name of
    the LORD in the land of their inheritance, there they shall come and slaughter
    the Passover in the evening, at the going down of the sun,

    20. in the third part of the day. And they shall bring its blood to the threshold
    of the altar, and they shall place its fat on the fire that is upon the altar,
    and they shall eat its flesh roasted with fire in the court of the house

    21. that has been sanctified in the name of the LORD. And they shall not be able
    to observe the Passover in their cities, nor in any place except before the tent
    of the LORD, or before his house where his name dwells; and they shall not go
    astray after the LORD.

    22. And you, Moses, command the children of Israel to keep the ordinance of the
    Passover as it was commanded to you; tell them year by year, and day by day, and
    the feast of unleavened bread, that they should eat unleavened bread for seven
    days, that they should observe its feast, and that they should bring its offering
    day by day during those seven days of rejoicing

    23. before the LORD, upon the altar of your God. For this feast you observed with
    haste when you came out from Egypt until you entered the wilderness of Shur, because
    at the shore of the sea you completed it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: 2a
    text: 'The verse numbering in the source rows is irregular here: the long second
      row contains material corresponding to multiple conventional verse divisions
      before the text resumes at v. 16.'
    reason: segmentation_note
  - marker: 2b
    text: The phrase rendered 'firstborn of the captive maidservant who was in the
      mill-house' is textually difficult; some witnesses/traditions align more closely
      with Exodus's 'female slave behind the millstones.'
    reason: textual_variant
  - marker: 2c
    text: The clause 'and even to dogs' is difficult in context and may reflect a
      compressed or corrupt line in the transmitted text; the translation keeps the
      extant wording as literally as possible.
    reason: textual_variant
  - marker: 2d
    text: The wording about eating the Passover while 'drinking wine' is notable in
      Jubilees and should not be harmonized away to the Exodus account.
    reason: cross_reference
  - marker: 16a
    text: The phrase rendered 'opposite the sanctuary of the LORD' is somewhat uncertain;
      the sense is that the meal is to be eaten in relation to the central sanctuary,
      not in ordinary domestic space.
    reason: lexical_alternative
  - marker: 20a
    text: The expression translated 'to the threshold of the altar' is difficult;
      an alternative is 'to the base/foundation of the altar.'
    reason: lexical_alternative
  - marker: 23a
    text: The final clause likely means that the seven-day feast was completed at
      the sea-shore on the way to the wilderness of Shur; the syntax is compressed
      in the Ge'ez row.
    reason: segmentation_note
lexical_decisions:
- source_word: ፋሲካ / ጳስካ
  chosen: Passover
  alternatives:
  - pascha
  rationale: Standard English rendering that preserves the festival's identity; used
    consistently for the feast/sacrifice rather than transliterating.
  lexicon: contextual
  entry: festival term
- source_word: በጊዜሁ
  chosen: at its appointed time
  alternatives:
  - in its time
  - at its proper time
  rationale: Preserves Jubilees's emphasis on fixed calendrical observance rather
    than a vague seasonal sense.
  lexicon: contextual
  entry: appointed/proper time
- source_word: በማእከለ ምሴያታት
  chosen: between the evenings
  alternatives:
  - between dusk periods
  - in the middle of the evenings
  rationale: Retains the technical calendrical/sacrificial expression rather than
    flattening it into simply 'at twilight'.
  lexicon: contextual
  entry: between the evenings
- source_word: ሥርዐት ዘለዓለም
  chosen: everlasting statute
  alternatives:
  - eternal ordinance
  - perpetual rule
  rationale: Keeps covenantal-legal force and the enduring character stressed in Jubilees.
  lexicon: contextual
  entry: statute/ordinance forever
- source_word: ጽላተ ሰማይ
  chosen: heavenly tablets
  alternatives:
  - tablets of heaven
  rationale: This is a key Jubilees term for heavenly inscription; 'heavenly tablets'
    is idiomatic while preserving the concept.
  lexicon: contextual
  entry: heavenly tablets
- source_word: ኀያላቲሁ ለመስተማ
  chosen: powers of Mastema
  alternatives:
  - his powers
  - his angels
  rationale: The Ge'ez explicitly includes 'Mastema' (ለመስተማ). The previous draft omitted
    this crucial proper name, which is central to Jubilees's demonology.
  lexicon: contextual
  entry: powers of Mastema
- source_word: ተዐደዉ
  chosen: passed over
  alternatives:
  - spared
  - protected
  rationale: Connects directly with the Passover theme and the action of bypassing
    marked houses.
  lexicon: contextual
  entry: pass over/spare
- source_word: ትእምርት
  chosen: sign
  alternatives:
  - mark
  - token
  rationale: Best matches the blood on the doorposts as a visible protective marker.
  lexicon: contextual
  entry: sign/mark
- source_word: ቍርባን
  chosen: offering
  alternatives:
  - oblation
  - sacrifice
  rationale: Broad enough for the cultic gift brought before the LORD, while remaining
    readable modern English.
  lexicon: contextual
  entry: offering
- source_word: ይነሥእ ኃጢአተ ለርእሱ
  chosen: shall bear his sin
  alternatives:
  - shall carry his guilt
  - shall incur sin
  rationale: Preserves the legal-theological idiom of personal liability for neglecting
    the command.
  lexicon: contextual
  entry: bear sin/guilt
- source_word: ጥቡሰ በእሳት
  chosen: roasted with fire
  alternatives:
  - fire-roasted
  rationale: Closely follows the sacrificial preparation language and avoids paraphrase.
  lexicon: contextual
  entry: roast with fire
- source_word: ፍአት
  chosen: unleavened bread
  alternatives:
  - azymes
  rationale: Clear modern English equivalent for the feast's bread terminology.
  lexicon: contextual
  entry: unleavened bread
- source_word: ፍሥሓ
  chosen: rejoicing
  alternatives:
  - gladness
  - festival joy
  rationale: In context it appears as festal joy associated with the night/season;
    'rejoicing' preserves the celebratory nuance without collapsing it into the feast
    name.
  lexicon: contextual
  entry: joy/rejoicing
- source_word: ደብተራ
  chosen: tent
  alternatives:
  - tabernacle
  rationale: The underlying sense is the sanctuary tent. 'Tent' is more transparent
    in modern English; sanctuary context clarifies its cultic role.
  lexicon: contextual
  entry: tent/tabernacle
- source_word: ዐጸደ ቤት
  chosen: court of the house
  alternatives:
  - courtyard of the temple
  rationale: Keeps the architectural imagery close to the source while remaining understandable.
  lexicon: contextual
  entry: court/courtyard
theological_decisions:
- issue: Identity of the agents who strike Egypt
  chosen_reading: Rendered ኀያላቲሁ ለመስተማ as 'powers of Mastema'.
  alternative_readings:
  - his powers
  - his angels
  rationale: The previous draft omitted 'Mastema' despite its explicit presence in
    the Ge'ez text (ለመስተማ). Jubilees attributes the destructive plague to the demonic
    forces of Mastema rather than directly to God's angels, a key theological distinctive
    of the book.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Cult centralization of Passover
  chosen_reading: Translated vv. 16-21 to require eating/slaughtering at the sanctuary/tent/house
    of the LORD rather than in local towns.
  alternative_readings:
  - a looser commemorative observance in homes
  - partial centralization only after temple construction
  rationale: The chapter strongly emphasizes sanctuary-centered observance, first
    at the tent and later at the built house, which is a distinctive Jubilees development
    and should not be harmonized away.
- issue: Chronological expression for Passover timing
  chosen_reading: Preserved 'between the evenings' and the division of day/night into
    parts.
  alternative_readings:
  - simply 'at twilight'
  - generic evening language
  rationale: Jubilees is especially concerned with exact calendrical observance; the
    technical timing language is therefore theologically significant.
