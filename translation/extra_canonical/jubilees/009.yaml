translation:
  text: '[''1. And for the south there came out his lot, for Shem, to the middle of
    the sea; and for Ham there came out the second lot, beyond the Gihon toward the
    south, to the right of the Garden, and it extends toward the south.'', ''2. And
    it extends to all the mountains of fire, and it extends toward the west to the
    sea of Atel, and it extends westward until it reaches the sea of Mauk, that sea
    into which everything that is not destroyed descends.'', ''3. And it goes forth
    toward the north to the limits of Gadir, and it goes forth to the coast of the
    waters of the sea, to the great waters, until it approaches the river Gihon; and
    the river Gihon goes along the middle of this land.'', ''4. And this is the land
    that came out for Ham as the portion which he was to occupy forever for himself
    and for his sons through their generations forever.'', ''5. And for Japheth there
    came out the third portion beyond the river Tina toward the north of the outflow
    of its waters, and it extends northeasterly to the whole region of Gog and to
    all the country east of it.'', ''6. And it extends northerly to the north, and
    it extends to the mountains of Qelt toward the north, and toward the sea of Mauk;
    and it goes forth to the east of Gadir as far as the region of the waters of the
    sea.'', "7. And it extends until it approaches the west of Fara, and it returns
    toward Aferag, and it extends easterly toward the waters of the sea of Me''at.",
    ''8. And for Noah there came out a writing concerning all this, and he divided
    the earth among his sons for an inheritance according to their three portions;
    and they stretched out their hands and took the writing from the bosom of Noah
    their father.'', ''9. And there came the prince Mastema, and he said, "Lord, Creator,
    leave some of them to me, and let them listen to my voice and do everything that
    I tell them; for if none of them is left to me, I will not be able to exercise
    the authority of my will among the children of men, because they are for corrupting
    and leading astray before my judgment, for great is the evil of the sons of men."'',
    ''10. And he said, "Let a tenth of them remain before him, and let nine parts
    descend into the place of judgment." And one of us said that we should teach Noah
    all their remedies, for'', ''11. we knew that they would not walk in uprightness,
    nor strive in righteousness. And we acted according to all his words: all the
    evil ones who were cruel we bound in the place of judgment, and we left a tenth
    of them so that they might be subject before Satan on the earth.'', ''12. And
    we told Noah all their medicines together with their deceptions, so that he might
    heal by the plants of the earth. And Noah wrote down everything that we taught
    him in a book, all the kinds of remedies; and the evil spirits were restrained
    from following the sons of Noah.'', ''13. And he gave all that he had written
    to Shem, his eldest son, because he loved him much more than all his sons.'',
    ''14. And Noah slept with his fathers, and he was buried on Mount Lubar in the
    land of Ararat. Nine hundred and fifty years he completed in his life, nineteen
    jubilees and two weeks and five years. And in his life on earth he surpassed the
    sons of men, except Enoch, because of the righteousness in which he was perfect.
    For Enoch’s task was created as a testimony for the generations of the world,
    so that he should recount all the deeds of generation after generation until the
    day of judgment.'', ''15. And in the thirty-third jubilee, in the first year of
    the second week, Peleg took for himself a wife, whose name was Lomna, daughter
    of Sinaar; and she bore him a son in the fourth year of this week. And he called
    his name Reu, for he said, "Look, the children of men have become evil through
    the wicked purpose to build for themselves a city and a tower in the land of Shinar."'',
    ''16. For they departed from the land of Ararat eastward into Shinar, for in his
    days they built the city and the tower, saying, "Come, let us go up by it into
    heaven."'', ''17. And they began to build, and in the fourth week they made brick
    with fire, and the bricks served them for stone, and the clay with which they
    plastered was asphalt that comes out from the sea and from the springs of water
    in the land of Shinar.'', ''18. And they built it for forty-three years. Its breadth
    was 203 bricks, and the height of a brick was the third of one; its height amounted
    to 5,433 cubits and 2 palms, and the extent of one wall was thirteen stades, and
    of the other thirty stades.'']'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: The opening land-allotment section is fragmentary in the supplied chapter
      rows. The English for vv. 1-8 follows the chapter's evident sequence of the
      divisions among Shem, Ham, and Japheth, but some place-names and boundaries
      remain textually uncertain.
    reason: segmentation_note
  - marker: '9'
    text: The Ethiopic reads 'angel/prince of spirits'; the adversarial figure is
      rendered as Mastema in light of Jubilees' recurring terminology and the immediate
      context of demonic spirits.
    reason: lexical_alternative
  - marker: '10'
    text: The phrase 'let a tenth of them remain' preserves the chapter's distinctive
      explanation for ongoing demonic activity after the flood.
    reason: cross_reference
  - marker: '14'
    text: '''Nineteen jubilees and two weeks and five years'' equals 950 years. The
      chapter intentionally preserves both the total and the jubilean reckoning.'
    reason: cultural_note
  - marker: '18'
    text: The tower measurements are textually difficult in Ethiopic transmission.
      The numbers are translated conservatively from the supplied text and may reflect
      a corrupt or compressed measurement tradition.
    reason: textual_variant
lexical_decisions:
- source_word: መክፈልት
  chosen: portion / lot
  alternatives:
  - division
  - share
  lexicon: Ge'ez contextual
  rationale: Used for territorial allotment language in Jubilees; 'portion' in explanatory
    contexts and 'lot' where the casting/allotment nuance is foregrounded.
- source_word: መልአከ መናፍስት
  chosen: prince Mastema
  alternatives:
  - angel of spirits
  - chief of the spirits
  rationale: The context identifies the demonic leader who petitions concerning the
    spirits. Jubilees elsewhere names Mastema explicitly; here the functional title
    is rendered in line with that identification.
- source_word: ስልጣነ ፈቃድየ
  chosen: the authority of my will
  alternatives:
  - the dominion of my desire
  - my chosen authority
  rationale: Keeps both rule/authority and volitional nuance without flattening the
    phrase.
- source_word: መካነ ደይን
  chosen: place of judgment
  alternatives:
  - site of judgment
  - judgment-place
  rationale: Straightforward rendering of the locale to which the spirits are consigned.
- source_word: ፈውሶሙ / ፈውሳት
  chosen: their remedies / remedies
  alternatives:
  - their healings
  - medicines
  rationale: Jubilees emphasizes practical healing knowledge given to Noah; 'remedies'
    preserves that medicinal sense while remaining readable.
- source_word: እዮቤልው
  chosen: jubilees
  alternatives:
  - jubilee cycles
  rationale: Required calendrical term in Jubilees; preserved consistently rather
    than generalized.
- source_word: ሱባዔ
  chosen: weeks
  alternatives:
  - weeks of years
  - heptads
  rationale: In Jubilees chronology this denotes week-units within jubilee reckoning;
    rendered 'weeks' in the text for readability, with calendrical force noted here.
- source_word: አስፋሌጦስ
  chosen: asphalt
  alternatives:
  - bitumen
  - pitch
  rationale: The Ge'ez loanword points to asphalt/bitumen; 'asphalt' best matches
    the described natural substance emerging from sea and springs.
theological_decisions:
- issue: Identity of the demonic petitioner in vv. 9-10
  chosen_reading: Rendered as Mastema, the chief adversarial spirit, speaking before
    God about retaining a tenth of the spirits.
  alternative_readings:
  - an unnamed angel of spirits
  - Satan as a generic title only
  rationale: The chapter's theology and wider Jubilees usage strongly align this figure
    with Mastema, and the later line about subjection before Satan/Mastema reflects
    that adversarial administration.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context is sufficiently specific to choose the named adversarial figure.
- issue: Calendrical notation in Noah's lifespan
  chosen_reading: Retained 'nineteen jubilees and two weeks and five years.'
  alternative_readings:
  - convert entirely into 950 years only
  - expand 'weeks' as 'weeks of years' in the main text
  rationale: Jubilees' chronology is a core literary-theological feature and should
    not be flattened into ordinary prose chronology.
  doctrine_reference: Preserve calendrical terminology carefully.
