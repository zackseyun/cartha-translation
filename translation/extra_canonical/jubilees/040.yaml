theological_decisions:
- issue: Rendering of እግዚአብሔር in a deuterocanonical/apocryphal context
  chosen_reading: the Lord
  alternative_readings:
  - God
  rationale: Per project doctrine, the default rendering for the divine title is 'the
    Lord.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → the LORD'
- issue: Meaning of ሰይጣነ in v. 9
  chosen_reading: adversary
  alternative_readings:
  - Satan
  - accuser
  rationale: The phrase describes the stable condition of Pharaoh’s kingdom. A common-noun
    sense fits the political context better.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
