translation:
  text: And there will be great wrath from the Lord against the children of Israel, because they have forsaken his covenant and turned aside from his word and provoked and blasphemed, in that they do not perform the ordinance of this law; for they have made themselves like the nations, for uprooting and destruction from the earth. And there will no longer be for them pardon or forgiveness, that they should be forgiven and pardoned for all the sin of this eternal error.
