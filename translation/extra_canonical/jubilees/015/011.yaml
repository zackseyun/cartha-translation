  from: bought with your silver
  to: bought with your gold [or 'money']
  rationale: 'The Ge''ez text uses ወርቅ (warq), which means ''gold'' (or ''money'' by extension), not ''silver'' (which would be ብሩር, brur). While the Hebrew of Genesis 17 uses ''silver'' (כסף), a translation of the Ge''ez should reflect its specific lexical choice. (Note: this occurs multiple times in the verse).'
