translation:
  text: '15. And Pharaoh sent away Sarai, Abram’s wife, and expelled him from the
    land of Egypt. And he went to the place where he had pitched his tent at first,
    between Bethel on the west and Ai on the east, to the place of the altar, and
    he blessed the LORD his God who had brought him back in peace.

    16. And in the forty-first jubilee, in the third year of the first week, he entered
    that place and built there an altar, and he called on the name of the LORD.

    17. And he said, “You are God Most High, my God forever and ever.” And in the
    fourth year of this week, Lot separated from him, and Lot settled in Sodom; and
    the men of Sodom were very sinful.

    18. And it was grievous in his heart that his brother’s son had separated from
    him, for he had no children.

    19. In that year, when Lot had been taken captive, the LORD said to Abram, after
    Lot had separated from him, in the fourth year of this week, “Lift up your eyes
    from the place where you are dwelling, northward and southward and westward and
    eastward,

    20. for all the land that you see I will give to you and to your seed forever.
    And I will make your seed like the sand of the sea; if a man can count the dust
    of the earth, then your seed also

    21. will be innumerable. Rise, walk through the land in its length and its breadth,
    and see it all,

    22. for I will give it to your seed.” And Abram went to Hebron and settled there.
    And in this year Chedorlaomer king of Elam came, and Amraphel king of Shinar,
    and Arioch king of Ellasar,

    23. and Tidal king of nations; and they struck the king of Gomorrah and the king
    of Sodom, and many fell into the bitumen pits in the Salt Sea valley. And they
    took Sodom and Admah and Zeboiim, and they took Lot also, Abram’s brother’s son,
    and all his possessions, and they went as far as Dan.

    24. And one who had escaped came and told Abram that his brother’s son had been
    taken captive. And he armed the servants born in his house . . . Upon Abram and
    upon his seed he laid the first tithe for the LORD, and the LORD made it an ordinance
    forever, that they should give it to the priests who minister before him,

    25. that they might possess it forever.

    26. And for this law there is no limit of days, for he ordained it for the generations
    forever: that they should give a tenth of everything to the LORD, from seed and
    from wine and from oil,

    27. and from cattle and from sheep. And he gave it to his priests to eat and to
    drink with rejoicing

    28. before him. And the king of Sodom came near and bowed before him, and said,
    “Our lord Abram,

    29. give us the persons whom you rescued, but let the goods be yours.” And Abram
    said to him, “I have lifted up my hands to God Most High: not from a thread even
    to a sandal strap will I take anything that is yours, lest you should say, ‘I
    have made Abram rich’—except only what the young men have eaten, and the share
    of the men who went with me, Aner and Eshcol and Mamre; let them take their share.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '24'
    text: The verse is textually difficult and appears segmentationally compressed
      in this edition. After 'he armed the servants born in his house' the text shifts
      abruptly to the institution of the tithe. A fuller underlying narrative likely
      stood here.
    reason: segmentation_note
  - marker: '23'
    text: The sequence of city names and battle details follows the Ge'ez closely,
      though the syntax is compressed and may reflect a condensed retelling of Genesis
      14.
    reason: cross_reference
  - marker: '24'
    text: '''The first tithe'' could also be rendered ''the chief tithe'' or understood
      as an initial tithe associated with first produce; the Ge''ez wording is unusual.'
    reason: lexical_alternative
  - marker: '26'
    text: '''From seed'' likely refers to agricultural produce or yield, not merely
      seed reserved for sowing.'
    reason: cultural_note
lexical_decisions:
- source_word: አፍለሶ
  chosen: expelled him
  alternatives:
  - sent him away
  - drove him out
  lexicon: Ge'ez verbal usage
  rationale: The verb carries force beyond a polite dismissal; paired with Pharaoh's
    action it suggests removal from Egypt.
- source_word: ተከለ ደብተራሁ
  chosen: pitched his tent
  alternatives:
  - set up his tent
  - planted his tent
  lexicon: common Semitic idiom reflected in Ge'ez
  rationale: Idiomatic English for establishing a temporary dwelling while preserving
    the concrete tent imagery.
- source_word: ጽንሓሐ
  chosen: altar
  alternatives:
  - memorial altar
  lexicon: cultic context
  rationale: The context is sacrificial/cultic and parallels the earlier altar-building
    scene; 'altar' is the clearest rendering.
- source_word: ጸውዐ በስመ እግዚአብሔር
  chosen: called on the name of the LORD
  alternatives:
  - invoked the name of the LORD
  lexicon: biblical formula
  rationale: Preserves the covenantal worship formula familiar from Genesis while
    remaining a direct rendering of the Ge'ez.
- source_word: ተፈልጠ
  chosen: separated
  alternatives:
  - parted
  - divided himself
  lexicon: contextual usage
  rationale: Best reflects the relational and geographical separation of Lot from
    Abram.
- source_word: አእከዮ በልቡ
  chosen: it was grievous in his heart
  alternatives:
  - he was distressed in his heart
  - it pained him inwardly
  lexicon: idiomatic emotional expression
  rationale: Keeps the inward emotional force without flattening it to a generic 'he
    was sad.'
- source_word: ተፄወወ
  chosen: had been taken captive
  alternatives:
  - was captured
  - was carried off
  lexicon: military/captivity context
  rationale: The context is wartime seizure; 'taken captive' preserves that nuance.
- source_word: ዘርእከ
  chosen: your seed
  alternatives:
  - your offspring
  - your descendants
  lexicon: biblical covenant term
  rationale: Retains the covenantal density of the promise language; more literal
    than 'descendants' and suitable in Jubilees.
- source_word: ኆፃ ባሕር
  chosen: sand of the sea
  alternatives:
  - seashore sand
  lexicon: fixed biblical comparison
  rationale: Preserves the traditional image while remaining literal to the Ge'ez.
- source_word: ኑኃ ወርኅባ
  chosen: its length and its breadth
  alternatives:
  - its length and width
  lexicon: spatial terminology
  rationale: Formal spatial phrasing fits the land-grant context and preserves solemnity.
- source_word: ቀብአ በቀላ
  chosen: bitumen pits
  alternatives:
  - asphalt pits
  - slime pits
  lexicon: topographical term
  rationale: '''Bitumen'' is precise and readable, avoiding archaic ''slime pits''
    while preserving the geological sense.'
- source_word: ዐሥራተ ቀዳሚ
  chosen: the first tithe
  alternatives:
  - the tithe firstfruits
  - the chief tithe
  lexicon: cultic/tithe terminology
  rationale: The phrase appears to mark an initial or primary tithe; 'first tithe'
    preserves the wording without over-interpreting it as firstfruits.
- source_word: ይትቀነዩ ቅድሜሁ
  chosen: minister before him
  alternatives:
  - serve before him
  - officiate before him
  lexicon: cultic service language
  rationale: A standard English rendering for priestly attendance in God's presence.
- source_word: ወሰነ መዋዕል
  chosen: there is no limit of days
  alternatives:
  - no fixed term was set
  - no time limit exists
  lexicon: temporal/legal idiom
  rationale: Keeps the legal-perpetual force of the ordinance in a relatively literal
    way.
- source_word: እምዘርእ ወእምወይን ወእምቅብእ
  chosen: from seed and from wine and from oil
  alternatives:
  - from grain and wine and oil
  lexicon: agricultural produce terms
  rationale: The Ge'ez says 'seed'; I retained the more literal term, though in context
    it refers to produce/yield.
- source_word: አልህምት
  chosen: cattle
  alternatives:
  - herds
  - beasts
  lexicon: livestock term
  rationale: Pairs naturally with sheep in a tithe list and is clear modern English.
- source_word: ጸግወነ ነፍሰ እለ ባሳሕከ
  chosen: give us the persons whom you rescued
  alternatives:
  - return the people you delivered
  - grant us the souls you saved
  lexicon: contextual idiom
  rationale: '''Persons'' reflects the concrete sense of lives/people without sounding
    wooden; ''rescued'' fits the military recovery context.'
- source_word: እምፈትል እስከ ተታነ እሣእነ
  chosen: not from a thread even to a sandal strap
  alternatives:
  - from a thread to a sandal thong
  lexicon: idiomatic merism
  rationale: Preserves the formulaic refusal to take even the smallest item.
- source_word: ኢይትኍለቍ
  chosen: innumerable
  alternatives:
  - will not be counted
  - cannot be numbered
  lexicon: Ge'ez verbal usage (negative prefix)
  rationale: The Ge'ez uses a negative prefix (ኢ). Translating as 'innumerable' resolves
    the conditional logic ('if a man can count the dust... then your seed will be
    innumerable') while remaining faithful to the negative form.
theological_decisions:
- issue: Divine name rendering for እግዚአብሔር
  chosen_reading: the LORD
  alternative_readings:
  - Lord
  - God
  rationale: Following project doctrine for covenantal divine-name language, 'the
    LORD' best reflects the reverential convention and biblical register.
  doctrine_reference: 'DOCTRINE.md: YHWH -> the LORD'
- issue: Rendering of covenant promise term ዘርእ
  chosen_reading: seed
  alternative_readings:
  - offspring
  - descendants
  rationale: Jubilees leans heavily on covenant continuity; 'seed' preserves the theological
    density and intertextual resonance with Genesis promises.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension and consistency of
    key terms'
- issue: Tithe legislation in vv. 24-27
  chosen_reading: Abram's action is presented as the basis for a perpetual priestly
    tithe ordinance
  alternative_readings:
  - a later editorial insertion only loosely tied to Abram's act
