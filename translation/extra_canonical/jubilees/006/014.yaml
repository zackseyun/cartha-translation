  from: And there is no limit of days for this law, for it is forever. They shall keep it throughout their generations, so that they may continue supplicating on your behalf with blood before the altar every day and at the time of morning and evening. They shall seek atonement for themselves continually before the LORD, so that they may keep it and not be uprooted.
