  rows:
  - verse: 1
    geez: ወይሁዳሃ፡ ወተፈሥሐ፡ ወባረኮ፡ ለአምላከ፡ አበዊሁ፡ አብርሃም፡ ወይስሐቅ። ወይቤ፡ ይእዜ፡ አእመርኩ፡ ከመ፡ ብየ፡
      ተስፋ፡ ዘለዓለም፡ ወለውሉድየሂ፡ በቅድመ፡ አምላከ፡ ኵሉ። ወከመዝ፡ ሥሩዕ፡ በእንተ፡ ክልኤሆሙ፡ ወያዐርጉ፡ ሎሙ፡ በስምዕ፡
      ዘለዓለም፡ ውስተ፡ ጽላተ፡ ሰማይ፡ በከመ፡ ባረኮሙ፡ ይስሐቅ።
  - verse: 2
    geez: ለእግዚአብሔር። ወጌሰ፡ ያዕቆብ፡ በነግህ፡ አመ፡ ዐሡሩ፡ ወረቡዑ፡ ለዝ፡ ወርኅ፡ ወዐሠረ፡ እምኵሉ፡ ዘመጽአ፡ ምስሌሁ፡
      እምሰብእ፡ እስከ፡ እንስሳ፡ እምወርቅ፡ እስከ፡ ኵሉ፡ ንዋይ፡ ወአብአ፡ ወዐሠረ፡ እምኵሉ።
  - verse: 3
    geez: ወበውእተን፡ መዋዕል፡ ፀንሰት፡ ይእቲ፡ ራሔል፡ ብንያምሃ፡ ወአዳነ ውጉስቂ፡ እምኔሁ፡ ያዕቆብ፡ ውሉዶ፡ ወዐርገ፡ ወወረደ፡
      ሌዊ፡ በመክፈሊተ፡ እግዚአብሔር፡ ወአልበሱ፡ አቡሁ፡
  - verse: 4
    geez: አልባሰ፡ ክህነት፡ ወመልአ፡ እደዊሁ። ወአመ፡ ዐሡሩ፡ ወኀሙሱ፡ ለዝ፡ ወርኅ፡ አብአ፡ ውስተ፡ ምሥዋዕ፡ አስዋረ፡ እምአልህምት፡
      ፲፵፡ ወአርባዕተ፡ ወአብሓኩ፡ ፬ሥራ፡ ወሰማኒተ፡ ወአባግዐ፡ አርብዓ፡ ወተስዓተ፡ ወመሓስዐ፡ ሰብዐተ፡ ወመሓስዐ፡ ጠሊ፡ ፬ሥራ፡
      ወአሐደ፡
  - verse: 5
    geez: ምድረ፡ ገለአድ፡ ወኀብአ፡ ያዕቆብ፡ ልቦ፡ ላባን፡ ወአነገሮ። ወበሳብዕ፡ ዓም፡ ዘሱባዔ፡ ራብዕ፡ ተመይጠ፡ ያዕቆብ፡
      ገለአድሃ፡ በቅዳሜ፡ ወርኅ፡ አመ፡ ዐሥራሁ፡ ወአሚሩ፡ ወደገኖ፡ ላባ፡ ድኅሬሁ፡ ወረከቦ፡ ለያዕቆብ፡ በደብረ፡ ገላአድ፡ በወርኅ፡
      ሣልስ፡ አመ፡ *ዐሡሩ፡ ወሠሉሱ፡ ወአኀደጎ፡ እግዚአብሔር፡ ከመ፡ ይሕክም፡ ላዕለ፡ ያዕቆብ፡ እስመ፡ አስተርአዮ፡ በሕልም፡
      ሌሊተ፡ ወነገሮ፡ ላባ፡ ለያዕቆብ። ወአመ፡ *ዐሡሩ፡ ወኀሙሱ፡ ለውእቱ፡ መዋዕል፡ ገብረ፡ ያዕቆብ፡ ግዝአ፡ ለላባ፡ ወለኵሎሙ፡
      እለ፡ መጽኡ፡ ምስሌሁ፡ ወመሐለ፡ ያዕቆብ፡ ለላባ፡ በዛቲ፡ ዕለት፡ ወላባሂ፡ ለያዕቆብ፡ ከመ፡ ኢይትዐደዉ፡ አሐዱ፡ ኀበ፡
      ካልኡ፡ በእኩይ፡ *በደብረ፡
  - verse: 6
    geez: መበአ፡ እምጸሎት፡ እንተ፡ ጸለየ፡ ከመ፡ የዐሥር፡ ምስለ፡ መሥዋዕተሙ፡ ወጥዓሕቶሙ። ወሶበ፡ በልዖ፡ እሳት፡ የዐጥን፡
      ፫ ስኂነ፡ ዴቤሁ፡ በእሳት፡ መልዕልተ፡ ፬ ወለመሥዋዕተ፡ መድኃኒት፡ አበዋረ፡ ክልኤተ፡ ወአብሓከ፡ አርባዕተ፡ ወአባግዐ፡
      አርባዕተ፡ *ይቤላት፡ አርባዕተ፡ ፭ ወአባግዐ፡ ዘዘ፡ ዓመት፡
  - verse: 7
    geez: እንከ፡ ከመዝ፡ በውስተ፡ እስራኤል፡ በአርኵሰ፡ ድንግል፡ እስራኤላዊት። ወበእሲ፡ እመቦ፡ ዘፈቀደ፡ በውስተ፡ እስራኤል፡
      የሀብ፡ ወለተ፡ ወእመኒ፡ እኅተ፡ ለኵሉ፡ ብእሲ፡ ዘእምዘርአ፡ አሕዛብ፡ ሞተ፡ ለይሙት፡ ወበእብን፡ ይውግሮዎ፡ እስመ፡ ገብረ፡
      ኀፍረተ፡ በውስተ፡ እስራኤል፡ ወለብእሲትሂ፡
  - verse: 8
    geez: ያውዕይዋ፡ በእሳት፡ እስመ፡ አርኰሰት፡ ስመ፡ ቤተ፡ አቡሃ፡ ወትሠረው፡ እምእስራኤል። ወአይት ረከብ፡ ዘማ፡ ወርኵስ፡
      በውስተ፡ እስራኤል፡ ኵሎ፡ መዋዕለ፡ ትውልደ፡ ምድር፡ እስመ፡ ቅዱስ፡ እስራኤል፡ ለእግዚአብሔር፡ ወኵሉ፡ ሰብእ፡ ዘአርኰሰ፡
      ሞተ፡ ለይሙት፡ በእብን፡ ይውግርዎ።
  - verse: 9
    geez: ፍሥሐተ፡ ስምዕ፡ ከመዝ፡ ፍሥሐተ። ወቀደሙሰ፡ ይጼውዕዎ፡ ለምድረ፡ ገለአድ፡ ምድረ፡ ራፋኤል፡ እስመ፡ ምድረ፡ ረፋኤም፡
      ይእቲ፡ ወትወልዱ፡ ራፋኤም፡ ረዐይት፡ እለ፡ ፱ሥር፡ በአመት፡ ወትስዕ፡ በአመት፡ ወስምን፡ በአመት፡ ወእስከ፡ ስብዕ፡ በአመት፡
      ውእቱ፡
  - verse: 10
    geez: ዘያረኵስ፡ ሞተ፡ ለይሙት፡ ወበእብን፡ ይትወገር። ወአልቦ፡ ለዝ፡ ሕግ፡ ዐቅመ፡ መዋዕለ፡ ወአልቦ፡ ኅድገተ፡ ወኵሎ፡
      ስርየተ፡ ዘእንበለ፡ ጸአሙ፡ ይሤረው፡ ብእሲ፡ ዘአርኰሰ፡ ወለተ፡ በማእከለ፡ ኵሉ፡ እስራኤል፡ እስመ፡ እምውስተ፡ ዘርኡ፡
      ወሀቦ፡ ለሞሎክ፡ ወአበሰ፡ በአርኵ
  - verse: 11
    geez: መንግሥቶሙ፡ ቃራናኤም፡ ወአስጠሮስ፡ ወኤድራእ፡ ወሚሱር፡ ወቤዖን። ወአሕጐሎሙ፡ እግዚአብሔር፡ እምእኩይ፡ ምግባሮሙ፡
      እስመ፡ ጸዋጋን፡ ጥቀ፡ እሙንቱ፡ *ወአኅደረ፡ አሞሬዎነ፡ ህየንቴሆሙ፡ *እኩየ፡ ወኃጥአ፡ ወአልቦ፡ ሕዝበ፡ ዮም፡ ዘፈጸመ፡
      ኀጣውኢሆሙ፡ ኵሎ፡ ወአልቦሙ፡
  - verse: 12
    geez: ተኀርየ፡ ወአልቦ፡ ለአትርፎ፡ እምኔሁ፡ ፳፮ እምዝ፡ ፳፯ ዓመት፡ ለዓመት፡ ለዘይመጽእ። እስመ፡ በዓመቲሁ፡ ይትበላዕ፡
      ዘርእ፡ እስከ፡ አመ፡ መዋዕለ፡ ሐፊረ፡ ፳፰ ዘርእ፡ ዓመት፡ ወወይን፡ እስከ፡ አመ፡
  - verse: 13
    geez: አንሁብ፡ ወለተነ፡ ለብእሲ፡ ዘቦ፡ ቍልፈተ፡ እስመ፡ ጽእለት፡ ውእቱ፡ *ለነ። ወጽእለት፡ ውእቱ፡ ለእስራኤል፡ ለእለ፡
      ይሁቡ፡ ወለእለ፡ ይነሥኡ፡ እምአዋልደ፡ አሕዛብ፡ እስመ፡ ርኩስ፡ ውእቱ፡
  - verse: 14
    geez: ወውሉደከ፡ በኵሉ፡ ዓለማት። ወየሀብከ፡ እግዚአብሔር፡ ለከ፡ ወለዘርእከ፡ ዐበየ፡ ልበየ፡ ለክብሩ፡ ወኪያከ፡ ወዘርአከ፡
      ያቅርብ፡ ኀቤሁ፡ እምኵሉ፡ ዘሥጋ፡ ከመ፡ ይትአዘዙ፡ ውስተ፡ መቅደሱ፡ ከመ፡ መላእክተ፡ ገጽ፡ ወከመ፡ ቅዱሳን፡ ከማሆሙ፡
      ይከውን፡ ዘርኦሙ፡ ለውሉደከ፡ ለክብር፡ ወለዕበይ፡
  - verse: 15
    geez: አዋልደ፡ አሕዛብ፡ *ወእመቦ፡ እምአዋልዲሁ፡ ዘወሀቦ፡ ለብእሲ፡ ዘእምኵሉ፡ አሕዛብ። እስመ፡ መቅሠፍት፡ ላዕለ፡ መቅሠፍት፡
      ውእቱ፡ ወመርገም፡ ላዕለ፡ መርገም፡ ወኵሉ፡ ዘንተ፡ መቅ ሠፍት፡ ወመርገም፡ ይመጽእ፡ ወእመ፡ ገብረ፡ ዘታሕ፡ ወእመ፡ ተዐወረ፡
      አዕይንቲሁ፡ እምእሉ፡ እለ፡ ይገብሩ፡ ርኵሰ፡ ወእምእለ፡ ያረኵሱ፡ መቅደሶ፡ ለእግዚአብሔር፡ ወእምእለ፡ ይጌምኑ፡ ስሞ፡ ቅዱሰ፡
      ይትኬነን፡ ኵሉ፡ ሕዝብ፡ ኅቡረ፡ በእንተ፡ ኵሉ፡ ርኵስ፡ ወግማኔዝ።
  - verse: 16
    geez: አብሔር፡ ይትወሀብ፡ ውስተ፡ አፉሆሙ፡ ከመ፡ *ይባርኩ፡ ኵሎ፡ ዘርአ፡ ለፍቅር። ኪያከ፡ ጸውዑት፡ እምከ፡ ከመከ፡ ሌዊሃ፡
      ወበአማን፡ ጸውዑት፡ ከመከ፡ አጸቁ፡ ለእግዚአብሔር፡ ትከውን፡ ወሱታፌ፡ ኵሎሙ፡ ውሉደ፡ ያዕቆብ፡ ማእዳ፡ ለከ፡ ትኩን፡ ወአንተ፡
      ወውሉደከ፡ ብልዕዋ፡ ወለኵሉ፡
  - verse: 17
    geez: ኵሉ፡ ብእሲ፡ ውብእሲት፡ በውስተ፡ እስራኤል፡ ዘያረኵስ፡ መቅደሶ። በእንተዝ፡ አዘዝኩከ፡ እንዘ፡ እብል፡ አስምዕ፡
      ዛተ፡ ስምዐ፡ ላዕለ፡ እስራኤል፡ ርእ፡ ዘከመ፡ ኮነ፡ ለሰቂሞን፡ ወለውሉዱ፡ ዘከመ፡ ተውህበት፡ ውስተ፡ እዴ፡ ክልኤሆሙ፡
      ደቂቀ፡ ያዕቆብ፡ ወቀተልዎሙ፡ በፃዕር፡ ወኮነቶሙ፡ ጽድቀ፡ ወተጽሕፎሙ፡ ለጽድቅ።
  - verse: 18
    geez: ቡሩክ፡ ወኵሉ፡ ሕዝብ፡ ዘይረግመከ፡ ይኩን፡ ርጉመ። ወለይሁዳሂ፡ ይቤሎ፡ የሀብከ፡ እግዚአ ብሔር፡ ኃይለ፡ ወጽንዐ፡
      ከመ፡ ትኪዶሙ፡ ለኵሎሙ፡ እለ፡ ይጸልኡከ፡ መኰንነ፡ ኩን፡ አንተ፡ ወአሐዱ፡ እምነ፡ ውሉደከ፡ ለውሉደ፡ ያዕቆብ፡ ስምከ፡
      ወስመ፡ ውሉደከ፡ ይኩን፡ *ዘየሐውር፡ ወዘያንበቡ፡ ውስተ፡ ኵሉ፡ ምድር፡ ወአህጉር፡ አሜሃ፡ ይፈርሁ፡ አሕዛብ፡ እምቅድመ፡
      ገጽከ፡
  - verse: 19
    geez: ውሉደ፡ ሰብእ። ፵፮ ወእሁብ፡ ለዘርእከ፡ ኵላ፡ ምድረ፡ ፵፯ ከመትሕተ፡ ፵፰ ሰማይ፡ ወይኴንኑ፡ ውስተ፡ ኵሉ፡ አሕዛብ፡
      በከመ፡ ፈቀዱ፡ ወእምድኅረዝ፡ ያስተጋብኡ፡ ፵፱ ኵላ፡ ፶ *ምድረ፡ ወይወርስዋ፡
  - verse: 20
    geez: ቆብ፡ ወብከ፡ ትትረከብ፡ መድኃኒተ፡ እስራኤል። ወአመ፡ ዕለት፡ ትነብር፡ ውስተ፡ መንበረ፡ *ክብር፡ ጽድቅከ፡ ትከውን፡
      *ዐቢየ፡ ሰላም፡ ለኵሉ፡ ዘርአ፡ ውሉዱ፡ ለፍቅር፡ ዘይባርከከ፡ ቡሩክ፡ ወኵሎሙ፡ እለ፡ ይጸልኡከ፡ ወይሣቅዩከ፡ ወእለሂ፡
      ይረግሙከ፡ ይሠረዉ፡ ወይትሐጐሉ፡
  - verse: 21
    geez: ዐርገ፡ ፶፩ ውስተ፡ ሰማይ። ወይሬኢ፡ ፶፪ በራእየ፡ ሌሊት፡ ወናሁ፡ መአአክ፡ ፶፫ ይወርድ፡ እምሰማይ፡ ወበቡባ፡ ሰሌዳት፡
      ውስተ፡ እዴሁ፡ ወወሀቦ፡ ለያዕቆብ፡ ወአንበቦን፡ ወአእመረ፡ ኵሎ፡ ዘጽሑፍ፡ ውስቴቶን፡ ዘይከውን፡ ሎቱ፡ ወለውሉዱ፡ በኵሉ፡
      ዓለማት። ወአርአዮ፡ ኵሎ፡ ዘጽሑፍ፡ ውስተ፡ ሰሌዳት፡ ወይቤሎ፡ አትሕንጽ፡ ዘንተ፡ መካነ፡ ወኢትግበር፡ መቅደሰ፡ ዘለዓለም፡
      ወኢትኅድር፡ ዝየ፡ እስመ፡ *አኮ፡ ዝመካን፡ ሖር፡ ቤተ፡ አብርሃም፡ አቡከ፡ ወኅድር፡ ኀበ፡ ይስሐቅ፡ አቡከ፡ እስከ፡ አመ፡
      ዕለተ፡ ሞቱ፡ ለአቡከ። እስመ፡ በግብጽ፡ ትመውት፡ በሰላም፡ ወበዛ፡ ምድር፡ ትትቀበር፡ በክብር፡ ውስተ፡ መቃብረ፡ አበዊከ፡
      ምስለ፡ አብርሃም፡ ወይስሐቅ። ኢትፍራህ፡ እስመ፡ በከመ፡ ርኢከ፡ ወአንበብከ፡ *ከማሁ፡ ይከውን፡ ኵሉ፡ ወአንተሂ፡ ጸሐፍ፡
      ኵሎ፡ ዘከመ፡ ርኢከ፡ ወአንበብከ። ወይቤ፡ ያዕቆብ፡ እግዚኦ፡ እፎ፡ እዜከር፡ ዘአንበብኩ፡ ወርኢኩ፡ ኵሎ፡ *ወይቤሎ፡ አነ፡
      እዜክረከ፡ ኵሎ። ወዐርገ፡ እምኀቤሁ፡ ወነቅሀ፡ እምነዋሙ፡ ወተዘከረ፡ ኵሎ፡ ዘአንበበ፡ ወዘርእየ፡ ወጸሐፈ፡ ኵሎ፡ ነገረ፡
      ዘአንበበ፡ ወዘርእየ። ወገብረ፡ በህየ፡ ዓደ፡ *ዕለተ፡ አሐተ፡ ወሥዐ፡ ባቲ፡ በከመ፡ ኵሉ፡ ዘይሠውዑ፡ *በመዋዕለ፡ ቀዳማያት፡
      ወጸውዐ፡ ስማ፡ ተውሳክ፡ እስመ፡ ተወሰከት፡ ይእቲ፡ ዕለት፡ ወለቀዳማያት፡ ጸውዖን፡ በዓለ። ወከመዝ፡ ያስተርኢ፡ ውእቱ፡
      ከመ፡ ትኩን፡ ወጽሑፍ፡ ውስተ፡ ጽላተ፡ ሰማይ፡ በእንተዚ፡ ተከሥተ፡ ሎቱ፡ ከመ፡ ይግበራ፡ ወከመ፡ ይወስካ፡ ዲበ፡ ሰብዑ፡
      መዋዕለ፡ በዓል፡ ኪያሃ። ወተጸውዐ፡ ስማ፡ ተውሳክ፡ እስመ፡ እንተ፡ *የዐርግ፡ ይእቲ፡ በዕላተ፡ መዋዕለ፡ በዓል፡ በከመ፡
      ኍልቈ፡ መዋዕለ፡ ዘዓመት። ወበሌሊት፡ አመ፡ ዐሥራ፡ *ወሠሉሱ፡ ለዝወርኅ፡ ሞተት፡ ዲቦራ፡ *ነፃኒታ፡ ለርብቃ፡ ወቀበርዋ፡
      መትሕተ፡ ሀገር፡ ታሕተ፡ ባላን፡ ዘፈለን፡ ወጸውዑ፡ ስሞ፡ *ለውእቱ፡ መካን፡ *ፈለን፡ ዲቦራ፡ ወበልኖንሃ፡ በላኖነ፡ ኀሐ፡
      ዲቦራ። ወሖረት፡ ርብቃ፡ *ወገብአት፡ ውስተ፡ ቤታ፡ ኀበ፡ አቡሁ፡ ይስሐቅ፡ ወፈነወ፡ ያዕቆብ፡ በእዴሃ፡ አብሓኩ፡ *ወአባግዐ፡
      ወይቤላት፡ ከመ፡ ከመ፡ ይግበእ፡ ቤተ፡ አቡሁ፡ ወይቤላ፡ ነሐውር፡ ውስተ፡ ኵሉ፡ መካን፡ ወአይ፡ ተሐውር፡ ምስሌከ። ወባረኮ፡
      ያዕቆብ፡ አምላከ፡ *ይስሐቅ፡ አቡሁ፡ ወአምላከ፡ አብርሃም፡ *አበ፡ አቡሁ፡ ወተንሥአ፡ ወጸዐነ፡ አንስቲያሁ፡ ወውሉዶ፡ ወኵሎ፡
      ጥሪተ፡ ነሥአ፡ ወዐደወ፡ ፈለገ፡ ወበጽሐ፡
  - verse: 22
    geez: ሤሠርዐት፡ ሎሙ፡ ከመ፡ ይግበርዋ፡ ወይጸሐፉ፡ አዕርክተ። ወእመሰ፡ ተዐደዉ፡ ወገብሩ፡ እምኵሉ፡ ፍናዊሃ፡ ሰርኵስ፡
      ይጸሐፉ፡ ውስተ፡ ጽላተ፡ ሰማይ፡ ጸላእተ፡ ወይደመሰሱ፡ እመጽሐፈ፡ ሕይወት፡ ወይጸሐፉ፡ ውስተ፡ መጽሐፈ፡ እለ፡ ይትሐጐሉ፡
      ወምስለ፡ እለ፡
  - verse: 23
    geez: በፍሥሐ። ወአኖመ፡ ክልኤሆሙ፡ ውሉዶ፡ ለያዕቆብ፡ አሐደ፡ በየማኑ፡ ወአሐደ፡ በፀጋሙ፡ ወተብቈ፡ ሎቱ፡ ጽድቀ። ወነገረ፡
      ያዕቆብ፡ ኵሎ፡ ለአቡሁ፡ በሌሊት፡ ዘከመ፡ ገብረ፡ እግዚአ ብሔር፡ ምስሌሁ፡ ሣህለ፡ ዐቢየ፡ ወዘከመ፡ ሠርሐ፡ ኵሎ፡ ፍኖዊሁ፡
      ወትማኅፀኖ፡ እምኵሉ፡ እኩይ። ወባረኮ፡ ይስሐቅ፡ አምላከ፡ አቡሁ፡ አብርሃም፡ ዘአንደገ፡ ምሕረተ፡ ወጽድቀ፡ እምወልደ፡ ገብሩ፡
      ይስሐቅ። ወበነግህ፡ ነገረ፡ ያዕቆብ፡ ለአቡሁ፡ ይስሐቅ፡ ጸሎተ፡ ዘጸለየ፡ ለእግዚአብሔር፡ ወራእየ፡ ዘርእየ፡ ወከመ፡ ኀነጸ፡
      ምሥዋዐ፡ ወኵሉ፡ ድልው፡ ለመሥዋዕት፡ ለገቢር፡ ቅድመ፡ እግዚአብሔር፡ በከመ፡ ጸለየ፡ ወከመ፡ መጽአ፡ ይጽዐኖ፡ ዲበ፡ አድግ።
      ወይቤሎ፡ ይስሐቅ፡ ለያዕቆብ፡ ወልዲ፡ ኢይክል፡ መጺአ፡ ምስሌከ፡ እስመ፡ ሪማእኩ፡ ወኢይክል፡ ተዐግሦ፡ በፍኖት፡ ሖር፡ ወልድየ፡
      በሰላም፡ እስመ፡ ወልደ፡ ፻ወ፷ወ፭ዓመት፡ አነ፡ ዮም፡ ኢይክል፡ እንከ፡ ነጊደ፡ ጻዕና፡ ለአምካ፡ ወትሖር፡ ምስሌከ። ወአእምር፡
      አነ፡ ወልድየ፡ ከመሰ፡ በእንቲአየ፡ መጻእከ፡ ወዛቲ፡ ዕለት፡ ትኩን፡ ቡርክት፡ እንተ፡ ባቲ፡ ርኢክኒ፡ ሕያውየ፡ ወርኢኩከ፡
