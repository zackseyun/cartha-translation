  - A later legal gloss detached from holiness theology
  rationale: The Ge'ez repeatedly uses holiness/defilement language, links the offense
    to Molech and the sanctuary, and grounds the prohibition in Israel’s consecration
    to the LORD.
- issue: Heavenly tablets and predestined testimony
  chosen_reading: The blessings and ordinances are portrayed as already inscribed
    in heaven and disclosed to Jacob.
  alternative_readings:
  - A metaphor for divine foreknowledge only
  - A literary flourish without ontological claim
  rationale: Jubilees consistently treats the heavenly tablets as an actual revelatory
    register; the translation preserves that cosmological claim.
