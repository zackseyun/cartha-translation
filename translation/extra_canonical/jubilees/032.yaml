    within Jubilees’ theology of pre-Sinai priesthood.
- issue: Judgment on intermarriage with the nations
  chosen_reading: The chapter frames such unions as covenantal defilement and sanctuary-profananation,
    not merely ethnic preference.
  alternative_readings:
