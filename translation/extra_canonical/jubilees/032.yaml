translation:
  text: '1. And Judah rejoiced, and he blessed the God of his fathers, Abraham and
    Isaac. And he said, "Now I know that I have an eternal hope, and my children also,
    before the God of all. And thus it is ordained concerning the two of them, and
    it will be recorded for them as an everlasting testimony in the heavenly tablets,
    according to how Isaac blessed them."

    2. And Jacob rose early in the morning on the fourteenth of this month, and he
    gave a tenth from everything that had come with him, from people to cattle, from
    gold to all possessions, and he took and tithed from everything.

    3. And in those days Rachel became pregnant with Benjamin, and Jacob counted his
    sons from among him, and Levi came up in the LORD’s portion, and his father clothed
    him

    4. with priestly garments and filled his hands. And on the fifteenth of this month
    he brought to the altar as sacrifices from the cattle fourteen oxen and twenty-eight
    rams, and forty-nine sheep and seven lambs and twenty-one kids,

    5. from the land of Gilead. And Jacob concealed his intention from Laban and did
    not tell him. And in the fourth week, in the seventh year, Jacob turned back toward
    Gilead on the first day of the month, in the tenth year; and Laban was told, and
    he pursued after him and overtook Jacob at the mountain of Gilead in the third
    month, in the thirteenth year. But the LORD did not permit him to harm Jacob,
    for he appeared to him in a dream by night and spoke to Laban for Jacob’s sake.
    And on the fifteenth of those days Jacob made a feast for Laban and for all who
    had come with him, and Jacob swore to Laban on that day, and Laban also to Jacob,
    that neither would cross over to the other with evil intent at the mountain of
    witness,

    6. from the prayer which he had prayed, that he should tithe together with their
    sacrifices and their drink offerings. And when the fire had consumed the burnt
    offering, he offered for the sacrifice of deliverance two oxen and four rams and
    four sheep and five he-goats and four yearling sheep.

    7. Therefore thus it is ordained in Israel concerning a daughter of Israel who
    has been defiled: and if there is a man in Israel who wishes to give his daughter,
    or even his sister, to any man from the seed of the nations, he shall surely die,
    and they shall stone him with stones, because he has committed disgrace in Israel;
    and the woman

    8. they shall burn with fire, because she has defiled the name of her father’s
    house, and she shall be rooted out from Israel. And let no fornication or uncleanness
    be found in Israel through all the days of the generations of the earth, for Israel
    is holy to the LORD; and everyone who defiles it shall surely die; they shall
    stone him with stones.

    9. This ordinance is for testimony forever, according to this testimony. And formerly
    they used to call the land of Gilead the land of the Rephaim, because it is the
    land of the Rephaim; and Rephaim were born there, giants whose height was nine
    cubits, and eight cubits, and down to seven cubits.

    10. Whoever defiles shall surely die, and he shall be stoned with stones. And
    there is no limit of days for this law, and no remission and no atonement, except
    that they root out the man who has defiled his daughter in the midst of all Israel,
    because from his seed he has given to Molech and has acted wickedly by defiling
    it.

    11. Their kingdoms were Karnaim and Ashtaroth and Edrei and Misur and Beon. And
    the LORD judged them according to their evil deeds, because they were very wicked,
    and he caused the Amorites to dwell in their place, evil and sinful, and there
    is no people today that has completed the full measure of their sins as they did,
    and they have no longer any

    12. longevity, and there remained to them no more than twenty-six years, from
    the twenty-seventh year onward. For in its year seed is eaten until the days of
    the harvest of the twenty-eighth year, and wine until the year of

    13. "Let us not give our daughter to a man who has a foreskin, for that is a reproach
    to us." And it is a reproach to Israel for those who give and for those who take
    from the daughters of the nations, because it is unclean,

    14. and so are your children through all the ages. And may the LORD give to you
    and to your seed greatness of heart for his glory; and may he bring you and your
    seed near to him from all flesh, so that you may minister in his sanctuary like
    the angels of the presence and like the holy ones. Like them shall the seed of
    your sons be for glory and greatness

    15. above the daughters of the nations. And if there is any from your daughters
    who gives herself to a man from any of the nations, plague upon plague shall be
    upon her, and curse upon curse; and all this plague and curse shall come if he
    does this thing, and if he closes his eyes to those who do uncleanness and to
    those who defile the sanctuary of the LORD and to those who profane his holy name,
    all the people together shall be judged for all the uncleanness and profanation.

    16. The LORD will put in their mouths that they may bless all the seed of the
    beloved. He has called you from among them, as Levi, and in truth he has called
    you to draw near to the LORD, that you may be his and that all the sons of Jacob
    may eat at your table, and you and your sons shall eat, and for all

    17. every man and woman in Israel who defiles his sanctuary. Because of this I
    have commanded you, saying, "Bear this testimony over Israel: see what happened
    to Shechem and to his sons, how they were delivered into the hands of the two
    sons of Jacob, and they killed them with pain, and it was reckoned to them as
    righteousness, and it was written down for them as righteousness."

    18. Blessed be the one who blesses you, and all the people who curse you shall
    be cursed. And to Judah he said, "May the LORD give you strength and power to
    tread down all who hate you. Be a ruler, you and one of your sons, over the sons
    of Jacob. May your name and the name of your sons go forth and travel through
    all the earth and regions. Then nations will fear before your face,

    19. all the children of men. And I will give to your seed all the earth that is
    under heaven, and they will rule among all the nations as they desire; and after
    this they will gather all the earth and inherit it."

    20. And through you the salvation of Israel will be found. And when you sit on
    the throne of honor of your righteousness, there will be great peace for all the
    seed of the sons of the beloved. Whoever blesses you shall be blessed, and all
    who hate you and afflict you and also curse you shall be destroyed and cut off."

    21. And he went up into heaven. And he saw in a vision of the night, and behold,
    an angel was descending from heaven, and in his hands were tablets, and he gave
    them to Jacob, and he read them and learned everything written in them that would
    happen to him and to his sons through all the ages. And he showed him everything
    written on the tablets and said to him, "Do not build this place, and do not make
    here an eternal sanctuary, and do not dwell here, for this is not the place. Go
    to the house of Abraham your father’s father, and dwell with Isaac your father
    until the day of your father’s death. For in Egypt you will die in peace, and
    in this land you will be buried in honor in the tomb of your fathers, with Abraham
    and Isaac. Do not fear, for as you have seen and read, so shall everything be.
    And you also, write down everything as you have seen and read." And Jacob said,
    "Lord, how shall I remember everything that I have read and seen?" And he said
    to him, "I will bring everything to your remembrance." And he went up from him,
    and he awoke from his sleep and remembered everything that he had read and seen,
    and he wrote down all the matters that he had read and seen. And there he celebrated
    one more day, and he observed it according to all the days that they used to celebrate
    in former times, and he called its name Addition, because that day had been added,
    and they had formerly called it a feast. And thus it was revealed that it should
    be so, and it is written in the heavenly tablets concerning this, that it was
    disclosed to him that he should celebrate it and add it to the seven days of the
    feast. And its name was called Addition, because it was appended to the days of
    the feast, according to the number of the days of the year. And on the night of
    the thirteenth of this month Deborah, Rebekah’s nurse, died, and they buried her
    below the city, under the oak by the river, and they called the name of that place
    the River of Deborah; and the oak, Deborah’s Oak. And Rebekah went and entered
    her house to Isaac her father, and Jacob sent by her hand rams and sheep and goats,
    that she might bring them to his father’s house. And he said to her, "Let us go
    to every place, and do not travel with you." And Jacob blessed the God of Isaac
    his father and the God of Abraham, the father of his father, and he arose and
    loaded his wives and his children and took all his property and crossed the river
    and arrived.

    22. He commanded them that they should do it and write it as an ordinance. But
    if they transgress and act from all its ways with uncleanness, they shall be written
    in the heavenly tablets as adversaries, and they shall be blotted out from the
    book of life and be written in the book of those who will be destroyed and with
    those who

    23. are for shame. And Jacob arranged his two sons, one on his right hand and
    one on his left, and it was counted to him as righteousness. And Jacob told everything
    to his father in the night, how the LORD had dealt with him in great mercy and
    how he had prospered all his way and protected him from all evil. And Isaac blessed
    the God of his father Abraham, who had not withheld mercy and righteousness from
    the son of his servant Isaac. And in the morning Jacob told his father Isaac the
    prayer that he had prayed to the LORD, and the vision that he had seen, and how
    he had built an altar, and all that was prepared for sacrifice to offer before
    the LORD according to how he had prayed, and how he had come to carry him on a
    donkey. And Isaac said to Jacob, "My son, I am not able to come with you, for
    I am old and not able to endure the journey. Go, my son, in peace, for I am one
    hundred and sixty-five years old today. I can no longer bear the burden of the
    road. Stay with me. And I know, my son, that you came on my account, and this
    day is blessed, on which you have seen me alive and I also have seen you, my son.
    Prosper and perform the prayer that you have prayed, and do not delay your prayer,
    for it is sought out, and now quickly do it, and may he who has done everything
    grant success to the prayer for which you have prayed." And Rebekah said to her,
    "Go with Jacob your son." And Rebekah went with Jacob her son, and Deborah was
    with her, and they came to Bethel. And Jacob remembered the prayer with which
    his father had blessed him, and his two sons, Levi and Judah, and he rejoiced
    and blessed the God of his fathers, Abraham and Isaac. And he said, "Now I know
    that I have an eternal hope, and my children also, before the God of all. And
    thus it is ordained concerning the two of them, and it will be raised for them
    as an everlasting testimony in the heavenly tablets, according to how Isaac blessed
    them." And he stayed that night in Bethel, and Levi dreamed that they had appointed
    and ordained him priest of the Most High God, him and his sons forever. And he
    awoke from his sleep and blessed the LORD. And Jacob rose early in the morning
    on the fourteenth of this month, and he gave a tenth from everything that had
    come with him, from people to cattle, from gold to all possessions, and he took
    and tithed from everything. And in those days Rachel became pregnant with Benjamin,
    and Jacob counted his sons, and Levi came up in the LORD’s portion, and his father
    clothed him with priestly garments and filled his hands. And on the fifteenth
    of this month he brought to the altar as sacrifices from the cattle fourteen oxen
    and eighteen rams and forty-nine sheep and seven lambs and twenty-one kids.

    24. And he came to the land of Ephrath, and he stayed there. And Rachel gave birth
    in the night to a son, and she called his name Son of My Sorrow, because she suffered
    while giving birth; but his father called his name Benjamin, on the eleventh of
    the eighth month, in the first year of the sixth week of this jubilee.

    25. And Rachel died there and was buried in the land of Ephrath, that is, Bethlehem.
    And Jacob built a pillar over Rachel’s grave on the road, above her tomb.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: 5-6
    text: The verse division is difficult here. The opening phrase of verse 6 may
      continue the oath scene at the mountain from verse 5, while the sacrificial
      details likely belong with Jacob’s festival observance and tithe.
    reason: segmentation_note
  - marker: 10-12
    text: These verses are textually difficult in the Ethiopic transmission. The sense
      appears to combine legal warning with a notice about the Rephaim and the shortening
      of their remaining years.
    reason: textual_variant
  - marker: 13-17
    text: The speech unit appears to continue a legal-priestly exhortation, likely
      tied to Levi’s election and Israel’s holiness. Some clauses are compressed or
      displaced in the surviving Ethiopic wording.
    reason: segmentation_note
  - marker: '21'
    text: The feast-name rendered “Addition” translates a term meaning something added
      or appended. The passage explains an extra festival day added to the seven days
      of the feast.
    reason: cultural_note
  - marker: '21'
    text: Several clauses in this long verse are syntactically difficult, especially
      around Rebekah’s movements and Jacob’s instructions. The translation preserves
      the broad sequence without over-smoothing uncertain details.
    reason: textual_variant
  - marker: '23'
    text: The source row repeats material from the opening of the chapter and then
      continues into Rachel’s childbirth narrative. The translation treats the repeated
      section as part of the chapter’s transmitted text while preserving the final
      birth notice in vv. 24-25.
    reason: segmentation_note
lexical_decisions:
- source_word: ጽላተ ሰማይ
  chosen: heavenly tablets
  alternatives:
  - tablets of heaven
  - heaven's tablets
  rationale: Standard Jubilees technical term for the heavenly record; preserved consistently
    to retain revelatory and predestinarian texture.
- source_word: ዐሠረ
  chosen: gave a tenth / tithed
  alternatives:
  - paid tithes
  - set apart a tenth
  rationale: Keeps the concrete act of tenth-giving while preserving cultic terminology.
- source_word: መክፈሊተ እግዚአብሔር
  chosen: the LORD’s portion
  alternatives:
  - the portion of the Lord
  - the divine share
  rationale: Reflects election language for Levi without over-paraphrasing.
- source_word: መልአ እደዊሁ
  chosen: filled his hands
  alternatives:
  - ordained him
  - consecrated him
  rationale: Retains the idiom behind priestly installation while allowing readers
    to hear the cultic expression.
- source_word: አልባሰ ክህነት
  chosen: clothed him with priestly garments
  alternatives:
  - vested him for priesthood
  - put priesthood garments on him
  rationale: Makes the priestly sense explicit while staying close to the Ge'ez wording.
- source_word: አርኰሰ / ርኩስ
  chosen: defile / unclean
  alternatives:
  - pollute / impure
  - profane / defiled
  rationale: Preserves holiness-language central to Jubilees' covenantal separation
    theology.
- source_word: ትሠረው
  chosen: be rooted out
  alternatives:
  - be cut off
  - be removed
  rationale: Conveys covenantal excision language with strong force.
- source_word: ራፋኤም
  chosen: Rephaim
  alternatives:
  - giants
  rationale: Kept as proper ethnonym; explanatory 'giants' supplied in context rather
    than replacing the name.
- source_word: ጽእለት
  chosen: reproach
  alternatives:
  - shame
  - disgrace
  rationale: Best captures covenantal dishonor in the intermarriage prohibition context.
- source_word: መላእክተ ገጽ
  chosen: angels of the presence
  alternatives:
  - angels of the face
  rationale: Technical angelological title in Jubilees; preserved rather than generalized.
- source_word: ይጌምኑ ስሞ ቅዱሰ
  chosen: profane his holy name
  alternatives:
  - blaspheme his holy name
  - dishonor his holy name
  rationale: Fits holiness-law context and avoids narrowing to speech alone.
