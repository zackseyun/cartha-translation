  from: and all your possessions have gone
  to: and he has plundered all your possessions
  rationale: The AI mistranslated the Ge'ez verb ሄደ (hēda) as 'have gone', likely due to confusion with the Amharic verb ሄደ (hedä, 'to go'). In Ge'ez, ሄደ means 'to rob, plunder, or take by force'. Furthermore, the word ኵሎ (kʷəllo, 'all') is in the accusative case, marking 'all your possessions' as the direct object of the verb, not the subject.
