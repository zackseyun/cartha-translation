  from: Do not die
  to: You will not die
  rationale: The Ge'ez verb form is the imperfect (ኢትመውቲ, spelled here as አትመውቲ), which translates to the indicative 'you will not die' or 'you are not dying'. A prohibitive ('Do not die') would require the jussive form (ኢትሙቲ). In context, Jacob is reassuring Rebecca of her robust health, not commanding her not to die.
