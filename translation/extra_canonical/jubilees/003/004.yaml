translation:
  text: And the Lord said to us, “It is not good for the man to be alone; let us make
    for him a helper like him.” And the Lord our God caused a deep sleep to fall upon
    him, and he slept; and he took one bone from among his bones and made from it
    the woman, and he built flesh in its place, and built the woman.
  philosophy: optimal-equivalence
