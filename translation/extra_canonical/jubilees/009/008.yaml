translation:
  text: And the angel of the spirits, Mastema, came and said, “Lord, Creator, let some of them remain before me, and let them listen to my voice and do all that I tell them; for if some of them are not left to me from among them, I will not be able to exercise the authority of my will over the children of men, for these are for corrupting and leading astray before my judgment, for great is the wickedness of the children of men.”
