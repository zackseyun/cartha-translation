translation:
  text: And Noah slept with his fathers, and he was buried on Mount Lubar in the land
    of Ararat. Nine hundred and fifty years he completed in his life, nineteen jubilees
    and two weeks and five years. And in his life on earth he surpassed the sons of
    men, except Enoch, because of the righteousness in which he was perfect. For Enoch’s
    task was created as a testimony for the generations of the world, so that he should
    recount all the deeds of generation after generation until the day of judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '14'
    text: '''Nineteen jubilees and two weeks and five years'' equals 950 years. The
      chapter intentionally preserves both the total and the jubilean reckoning.'
    reason: cultural_note
