translation:
  text: '1. And in the first month Jacob spoke to all the people of his house, saying,
    “Purify yourselves and wash your garments, and let us rise and go up to Bethel,
    to the place where I prayed to him in the day when I fled from the face of Esau
    my brother, and he was with me and brought me into this land in peace.” And they
    gave up

    2. the foreign gods that were among them, and what was in their ears and what
    was on their necks, and the idols that Rachel had stolen from Laban her brother.
    And she gave them all to Jacob, and he burned them, and crushed them, and hid
    them under the oak that was in the land of Shechem.

    3. And he went up in the first month, in the seventh year, to Bethel. And he built
    an altar in the place where he had slept there, and he set up there a pillar,
    and he sent to his father Isaac that he should come to him

    4. to his sacrifice, and also to his mother Rebekah. And Isaac said, “Let my son
    Jacob come,

    5. and let me see him before I die.” And Jacob went to his father Isaac and to
    his mother Rebekah, to the house of his father Abraham. And he took with him two
    of his sons, Levi and Judah.

    6. And he came to his father Isaac and to his mother Rebekah. And Rebekah came
    out from her chamber to the gate of the house, to kiss Jacob and embrace him,
    for her spirit had revived when

    7. she heard, “Behold, Jacob your son has come.” And she kissed him. And she saw
    his two sons and recognized them, and said to him, “Are these your sons, my son?”
    And she embraced them and kissed them and blessed them, saying, “In you shall
    the seed of Abraham be honored, and you shall become a blessing on the earth.”

    8. And Jacob went in to Isaac his father, into the room where he lay there, and
    his two children were with him. And he stretched out the hand of his father, and
    he bent down and kissed him. And Isaac clung to

    9. the neck of Jacob his son and wept upon his neck. And the dimness passed from
    Isaac’s eyes, and he saw the two sons of Jacob, Levi and Judah, and he said, “Are
    these your sons, my son?

    10. For they resemble you.” And he told him that they were indeed his sons. And
    he said, “Now I see that they are truly my grandsons.”

    11. And they came near to him, and he turned and kissed them and embraced them,

    12. both of them together. And a spirit of prophecy came down into his mouth.
    And he took Levi with his right hand

    13. and Judah with his left hand, and he turned toward Levi first and began to
    bless him first, and said to him: “May the God of all, the Lord of all the ages,
    bless you

    14. and your children throughout all the ages. And may the Lord give to you and
    to your seed greatness of heart for glory. And may he bring you and your seed
    near to him from all flesh, to serve in his sanctuary like the angels of the presence
    and like the holy ones. As they are, so shall the seed of your sons be for glory
    and greatness

    15. and holiness. And may he make them great throughout all the ages. And they
    shall be princes and judges and chiefs for all the seed of the sons of Jacob.
    They shall speak the word of the Lord in righteousness, and they shall judge all
    his judgments in righteousness, and they shall declare his ways to Jacob and his
    paths to Israel. The blessing of the Lord shall be given in their mouths

    16. that they may bless all the seed of the beloved. Your name was called Levi,
    and rightly was your name called. You shall be joined to the Lord, and be the
    companion of all the sons of Jacob. Let his table be yours, and you and your sons
    shall eat from it. And your table shall be full for all generations,

    17. and your food shall not fail through all the ages. And all who hate you shall
    fall before you, and all your adversaries shall be rooted out and perish. And
    blessed be the one who blesses you,

    18. and cursed be every nation that curses you.” And to Judah he said, “May the
    Lord give you strength and power to tread down all who hate you. Be a ruler, you
    and one of your sons, over the sons of Jacob. May your name and the name of your
    sons go out and pass through all the earth and the regions of it. Then nations
    shall fear before your face,

    19. and all the nations shall be shaken, and all the peoples shall be shaken.
    In you shall be the help of Jacob,

    20. and in you shall the salvation of Israel be found. And when you sit on the
    throne of the honor of your righteousness, there shall be great peace for all
    the seed of the sons of the beloved. Blessed be the one who blesses you, and all
    who hate you and afflict you, and those who curse you, shall be rooted out and
    destroyed

    21. from the earth, and shall become accursed.” And he turned and kissed him again
    and embraced him, and he rejoiced greatly because

    22. he had seen the sons of Jacob his son in righteousness. And he went out from
    between his feet and fell down and bowed to him. And he blessed them and rested
    there near Isaac his father that night, and they ate and drank with joy.

    23. And he made the two sons of Jacob lie down, one at his right hand and one
    at his left,

    24. and righteousness passed over him. And Jacob told his father during the night
    everything that God had done with him, the great mercy, and how he had prospered
    all his ways and protected him from all evil.

    25. And Isaac blessed the God of his father Abraham, who had not withheld his
    mercy and his righteousness from the son of his servant Isaac.

    26. And in the morning Jacob told his father Isaac the vow that he had vowed to
    the Lord, and the vision that he had seen, and how he had built an altar, and
    that everything was prepared for the sacrifice to be offered before the Lord,
    as

    27. he had vowed, and that he had come to set him on a beast. And Isaac said to
    Jacob his son, “I am not able to go with you, for I am old and not able to endure
    the way. Go, my son, in peace, for I am one hundred sixty-five years old today.
    I am no longer able to ride on the beast, and go

    28. with you. And I know, my son, that it was for my sake you came, and this day
    shall be blessed,

    29. the day on which you have seen me alive, and I also have seen you, my son.
    Prosper and do the vow that you have vowed, and do not delay your vow, for you
    will be sought out concerning the vow, and now hasten to perform it.

    30. And may he prosper all that you do, all for which you have vowed in prayer.”
    And he said to Rebekah, “Go with Jacob.” And she rose and went with Jacob her
    son, and Deborah with her, and they came to

    31. Bethel. And Jacob remembered the prayer with which his father had blessed
    Levi and Judah, and he rejoiced and blessed the God of his fathers Abraham and
    Isaac. And he said, “Now I know that I have an everlasting hope, and my children
    also, before the God of all.” And thus it was ordained concerning the two of them,
    and they were recorded for them as an everlasting testimony on the heavenly tablets,
    just as Isaac blessed them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '2'
    text: The tree term may also be rendered 'terebinth'; the exact species behind
      the Ge'ez word is uncertain.
    reason: lexical_alternative
  - marker: '15'
    text: The clause rendered 'his paths to Israel' is textually difficult; some interpreters
      understand a stronger sense such as 'his ordinances' or 'his discipline' for
      Israel.
    reason: lexical_alternative
  - marker: '20'
    text: The phrase about sitting 'on the throne of the honor of your righteousness'
      is dense and may be construed more compactly as 'on the glorious throne of your
      righteousness.'
    reason: segmentation_note
  - marker: '22'
    text: The line 'he went out from between his feet' is obscure in English because
      it reflects a literal idiom in the source; it likely describes Jacob withdrawing
      from Isaac's immediate presence before bowing.
    reason: segmentation_note
  - marker: '26'
    text: Although the Ge'ez uses prayer-related wording, the immediate context of
      Bethel, altar, sacrifice, and Isaac's warning not to delay indicates a vow in
      view here.
    reason: alternative_reading
  - marker: 30-31
    text: The final transition is compressed in the source. The surviving row numbering
      skips from 30 to 32 in the corpus, but the sense clearly continues with their
      arrival at Bethel and Jacob's reflection on Isaac's blessing.
    reason: textual_variant
lexical_decisions:
- source_word: ንጽሑ
  chosen: Purify yourselves
  alternatives:
  - Sanctify yourselves
  - Cleanse yourselves
  rationale: The verb carries ritual-moral cleansing force, not merely physical washing;
    'purify yourselves' preserves the cultic preparation context before going to Bethel.
- source_word: ወወልጡ፡ አልባሲክሙ
  chosen: wash your garments
  alternatives:
  - change your garments
  - launder your clothes
  rationale: The Ge'ez points to cleansing garments; this preserves the Genesis-like
    purification scene without over-paraphrase.
- source_word: አማልክተ፡ ነኪር
  chosen: foreign gods
  alternatives:
  - strange gods
  - alien gods
  rationale: A standard, readable rendering that preserves covenantal contrast with
    the God of Jacob.
- source_word: ወዘውስተ፡ እዘኒሆሙ ... ወዘውስተ፡ ክሳውዲሆሙ
  chosen: what was in their ears and what was on their necks
  alternatives:
  - earrings and necklaces
  - what was in their ears and on their throats
  rationale: The text is slightly elliptical; this more literal rendering preserves
    the connection between ornaments and idolatrous objects without over-specifying.
- source_word: ወጣዖተ
  chosen: idols
  alternatives:
  - images
  - figures
  rationale: Best concise rendering for cult objects in context.
- source_word: ድርዋስ
  chosen: oak
  alternatives:
  - terebinth
  - tree
  rationale: Traditional identification is uncertain, but 'oak' is conventional and
    readable; noted as a lexical alternative in footnotes.
- source_word: ሐውልተ
  chosen: pillar
  alternatives:
  - standing stone
  - monument
  rationale: Preserves the cultic memorial sense without importing later negative
    associations.
- source_word: ጽርሕ
  chosen: room
  alternatives:
  - chamber
  - inner room
  rationale: A domestic sleeping space is intended; 'room' is readable modern English.
- source_word: ጽላሌ፡ ኀለፈ፡ እምአዕይንተ
  chosen: the dimness passed from ... eyes
  alternatives:
  - the shadow passed from ... eyes
  - the blindness lifted from ... eyes
  rationale: Keeps the vivid image of impaired sight clearing, without overstating
    a miraculous healing formula.
- source_word: መንፈሰ፡ ትንቢት
  chosen: a spirit of prophecy
  alternatives:
  - the spirit of prophecy
  - prophetic spirit
  rationale: This phrase is theologically significant in revelatory literature; preserved
    explicitly.
- source_word: መላእክተ፡ ገጽ
  chosen: angels of the presence
  alternatives:
  - angels of the face
  rationale: A key Jubilees expression; retained in its established theological form
    rather than flattened.
- source_word: ይትአለክ፡ ውስተ፡ መቅደሱ
  chosen: to serve in his sanctuary
  alternatives:
  - to minister in his sanctuary
  - to worship in his sanctuary
  rationale: The context is priestly-Levitical function; 'serve' captures cultic ministry
    broadly.
- source_word: መኳንንተ፡ ወመሳፍንተ፡ ወመላእክተ
  chosen: princes and judges and chiefs
  alternatives:
  - rulers and judges and leaders
  rationale: The cluster denotes governing authority; 'chiefs' avoids confusion with
    heavenly angels in this human context.
- source_word: አስርኖ፡ ለእስራኤል
  chosen: his paths to Israel
  alternatives:
  - his ordinances to Israel
  - his discipline to Israel
  rationale: The form is difficult; in parallel with 'his ways to Jacob,' 'his paths'
    preserves the instructional sense without overcommitting.
- source_word: ሱታፌ
  chosen: companion
  alternatives:
  - associate
  - partner
  rationale: Conveys Levi's joined status with the Lord and with Jacob's sons, echoing
    the name etymology without wooden literalism.
- source_word: ማእዳ
  chosen: table
  alternatives:
  - portion
  - food-table
  rationale: In priestly context it likely refers to table/fare; 'table' preserves
    the imagery of provision.
- source_word: ዘየሐውር፡ ወዘያንሶሱ
  chosen: go out and pass through
  alternatives:
  - travel and circulate
  - walk and roam
  rationale: Used of the fame/name of Judah and his sons spreading widely; this idiomatic
    rendering preserves movement imagery.
- source_word: መድኃኒተ
  chosen: salvation
  alternatives:
  - deliverance
  - rescue
  rationale: The term bears theological weight; 'salvation' preserves that resonance
    while still fitting national deliverance.
- source_word: መንበረ፡ ክብር
  chosen: the throne of the honor of your righteousness
  alternatives:
  - the throne of glorious righteousness
  - the honorable throne of your righteousness
  rationale: The phrase is dense and exalted; the chosen rendering preserves its apocalyptic-royal
    texture rather than smoothing it away.
- source_word: ጽድቀ። ወተኀለፈ፡ ሎቱ
  chosen: righteousness passed over him
  alternatives:
  - a righteous spirit came over him
  - grace came upon him
  rationale: The wording is unusual; a literal rendering preserves the text's solemn,
    numinous quality.
- source_word: ጸሎተ፡ ዘጸለየ
  chosen: the vow that he had vowed
  alternatives:
  - the prayer that he had prayed
  - the petition he had made
  rationale: In context with Bethel altar and Isaac's later warning not to delay,
    the sense is clearly vow rather than ordinary prayer.
- source_word: አታጕንዲ፡ ጸሎተከ
  chosen: do not delay your vow
  alternatives:
  - do not hold back your prayer
  - do not postpone what you vowed
  rationale: Again the context is vow-fulfillment language; rendering as 'vow' preserves
    the legal-cultic force.
- source_word: ጽላተ፡ ሰማይ
  chosen: the heavenly tablets
  alternatives:
  - tablets of heaven
  - heavenly records
  rationale: A signature Jubilees concept that should be preserved in recognizable
    form.
theological_decisions:
- issue: Levi's blessing and priestly status
  chosen_reading: Rendered Levi's descendants as brought near to serve in the sanctuary
    'like the angels of the presence and like the holy ones.'
  alternative_readings:
  - A more generalized blessing of honor without explicit priestly comparison
  - A flatter rendering that omits the angelic comparison
  rationale: Jubilees strongly elevates Levi's line in priestly and quasi-angelic
    terms. The translation preserves this theological emphasis rather than harmonizing
    it down to Genesis.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy.
- issue: Judah's blessing and royal-messianic trajectory
  chosen_reading: Rendered Judah as ruler whose name spreads through all the earth,
    with help for Jacob and salvation for Israel found in him.
  alternative_readings:
  - A merely military tribal blessing
  - A later explicitly messianic paraphrase
  rationale: The text presents royal and salvific language that anticipates later
    Judah traditions, but it should not be over-expanded into later doctrinal formulas
    not explicit in the Ge'ez.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension.
- issue: Heavenly tablets motif
  chosen_reading: Kept 'heavenly tablets' in the main text.
  alternative_readings:
  - heavenly record
  - book of heaven
  rationale: This is a central Jubilees theological motif tied to predestination,
    revelation, and heavenly inscription; it should remain visible and not be generalized
    away.
  doctrine_reference: Consistency of key terms, or documented exception.
