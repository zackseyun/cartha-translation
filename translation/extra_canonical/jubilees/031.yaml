  rows:
  - verse: 1
    geez: ወበሠርቀ፡ ወርኅ፡ ነገረ፡ ያዕቆብ፡ ለኵሉ፡ ሰብአ፡ ቤቱ፡ እንዘ፡ ይብል፡ ንጽሑ፡ ወወልጡ፡ አልባሲክሙ፡ ወተንሢእነ፡
      ንዕርግ፡ ቤቴል፡ በኀበ፡ ጸለይኩ፡ ሎቱ፡ ጸሎተ፡ አመ፡ ዕለተ፡ ጐየይኩ፡ እምገጸ፡ ዔሳው፡ እኁየ፡ ዘውእቱ፡ ምስሌየ፡ ወሜጠኒ፡
      ውስተ፡ ዛቲ፡ ምድር፡ በሰላም። ወአስስሉ፡
  - verse: 2
    geez: አማልክተ፡ ነኪር፡ እለ፡ ማእከሌክሙ። ወመጠውዎሙ፡ ለአማልክተ፡ ነኪር፡ *ወዘውስተ፡ እዘኒሆሙ፡ ወዘውስተ፡ ክሳውዲሆሙ፡
      ወጣዖተ፡ ዘሰረቀት፡ ራሔል፡ እምኀበ፡ ላባ፡ *እኁሃ፡ ወሀበት፡ ኵሎ፡ ለያዕቆብ፡ ወአውዕዮ፡ ወፀተሞ፡ ወአማስኖ፡ ወኀብአ፡
      ታሕተ፡ ድርዋስ፡ ዘሀሎ፡ ውስተ፡ *ምድረ፡ ሰቂሞን።
  - verse: 3
    geez: ወዐርገ፡ አመ፡ ሠርቀ፡ ወርኅ፡ ሳብዕ፡ ውስተ፡ ቤቴል። ወሐነጸ፡ ምሥዋዐ፡ ውስተ፡ መካን፡ ኀበ፡ ኖመ፡ ህየ፡ ወአቀመ፡
      ህየ፡ ሐውልተ፡ ወፈነወ፡ ኀበ፡ አቡሁ፡ ይስሐቅ፡ ከመ፡ ይምጻእ፡ ኀቤሁ፡
  - verse: 4
    geez: ውስተ፡ መሥዋዕቱ፡ ወኀበ፡ እሙሂ፡ ርብቃ። ወይቤ፡ ይስሐቅ፡ ይምጻእ፡ ወልድየ፡ ያዕቆብ፡
  - verse: 5
    geez: ወእርአዮ፡ ዘእንበለ፡ እሙት። ወሖረ፡ ያዕቆብ፡ ኀበ፡ አቡሁ፡ ይስሐቅ፡ ወኀበ፡ እሙ፡ ርብቃ፡ ውስተ፡ *ቤቱ፡ ለአቡሁ፡
      አብርሃም። ወክልኤተ፡ እምውሉዱ፡ ነሥአ፡ ምስሌሁ፡ ሌዊሃ፡ ወይሁዳሃ፡
  - verse: 6
    geez: ወመጽአ፡ ኀበ፡ አቡሁ፡ ይስሐቅ፡ ወኀበ፡ እሙ፡ ርብቃ። ወወፅአት፡ ርብቃ፡ እማኅፈድ፡ *ውስተ፡ አንቀጸ፡ ማኅፈድ፡
      ከመ፡ ትስዐሞ፡ ለያዕቆብ፡ ወትሕቀፎ፡ እስመ፡ ሐይወ፡ መንፈሳ፡ በጊዜ፡
  - verse: 7
    geez: ሰምዐት፡ ናሁ፡ ያዕቆብ፡ ወልድኪ፡ በጽሐ፡ ወሰዐመቶ። *ወርእየቶሙ፡ ለክልኤቱ፡ ውሉዱ፡ ወአእመረትሙ፡ ወትቤሎ፡ እሉሰ፡
      ውሉድከኑ፡ ወልድየ፡ ወሐቀፈቶሙ፡ ወሰዐመቶሙ፡ ወባረ ከቶሙ፡ እንዘ፡ ትብል፡ ብክሙ፡ ይክበር፡ ዘርአ፡ አብርሃም፡ ወለንጉሙ፡
      ትከውኑ፡ ለበረከት፡
  - verse: 8
    geez: በዲበ፡ ምድር። ወቦአ፡ ያዕቆብ፡ ኀበ፡ ይስሐቅ፡ አቡሁ፡ ውስተ፡ ጽርሕ፡ ኀበ፡ ይስክብ፡ ህየ፡ ወክልኤቱ፡ ደቂቁ፡
      ምስሌሁ፡ ወአንዘ፡ እዴ፡ አቡሁ፡ ወደነነ፡ ሰዐሞ፡ ወተሰቅለ፡ ይስሐቅ፡ ውስተ፡
  - verse: 9
    geez: '*ክሳደ፡ ያዕቆብ፡ ወልዱ፡ ወበከየ፡ ዲበ፡ ክሳዱ። ወጽላሌ፡ ኀለፈ፡ እምአዕይንተ፡ ይስሐቅ፡ ወርእየ፡ ክልኤሆሙ፡
      ውሉደ፡ ለያዕቆብ፡ ሌዊሃ፡ ወይሁዳሃ፡ ወይቤ፡ ውሉድከሁ፡ እሉ፡ ወልድየ፡'
  - verse: 10
    geez: እስመ፡ ይመስሉከ። ወነገሮ፡ ከመ፡ በአማን፡ ውሉዱ፡ እሙንቱ፡ ወአማን፡ ርእክ፡ ከመ፡
  - verse: 11
    geez: አማን፡ ውሉድየ፡ እሙንቱ። *ወቀርቡ፡ ኀቤሁ፡ ወተመይጠ፡ ወሰዐሞሙ፡ ወሐቀፎሙ፡
  - verse: 12
    geez: ለክልኤሆሙ፡ ኀቡረ። ወመንፈሰ፡ ትንቢት፡ ወረደ፡ ውስተ፡ አፉሁ፡ *ወአንዘ፡ ለሌዊ፡ በየማናዊ፡
  - verse: 13
    geez: እዴሁ፡ ወይሁዳን፡ *በፀጋማዊ፡ እዴሁ፡* ወተመይጠ፡ ኀበ፡ ሌዊ፡ ቀዲሙ፡ ወአንዘ፡ ይባርኮ፡ መቅድመ፡ ወይቤሎ፡ ይባርከ፡
      *አምላከ፡ ኵሉ፡* ውእቱ፡ እግዚአ፡ ኵሉ፡ ዓለማት፡ ኪያከ፡
  - verse: 14
    geez: ወውሉደከ፡ በኵሉ፡ ዓለማት። ወየሀብከ፡ እግዚአብሔር፡ ለከ፡ ወለዘርእከ፡ *ዐባየ፡ ልባዌ፡ ለክብር፡* ወኪያከ፡ ወዘርአከ፡
      ያቅርብ፡ ኀቤሁ፡ እምኵሉ፡ ዘሥጋ፡ ከመ፡ ይትአለክ፡ ውስተ፡ መቅደሱ፡ ከመ፡ መላእክተ፡ ገጽ፡ ወከመ፡ ቅዱሳን፡ ከማሆሙ፡
      ይከውን፡ ዘርኦሙ፡ ለውሉድከ፡ ለክብር፡ ወለዐቢይ፡
  - verse: 15
    geez: ወለቅዱስ፡ ወያዐብዮሙ፡ ውስተ፡ ኵሉ፡ ዓለማት። ወመኳንንተ፡ ወመሳፍንተ፡ ወመላእክተ፡ ይከውኑ፡ ለኵሉ፡ ዘርአ፡ ውሉደ፡
      ያዕቆብ፡ *ቃሎ፡ ለእግዚአብሔር፡ በጽድቅ፡ ይነግሩ፡ ወኵሎ፡ ኵነኔሁ፡ በጽድቅ፡ ይኴንኑ፡ ወይነግሩ፡ ፍኖቶ፡ ለያዕቆብ፡ ወአስርኖ፡
      ለእስራኤል፡ በረከተ፡ ለእግዚ
  - verse: 16
    geez: አብሔር፡ ይትወሀብ፡ ውስተ፡ አፉሆሙ፡ ከመ፡ *ይባርኩ፡ ኵሎ፡ ዘርአ፡ ለፍቅር።* ኪያከ፡ ጸውዑት፡ እምከ፡ ስመከ፡
      ሌዊን፡ ወበአማን፡ ጸውዑት፡ ስመከ፡ አጸቶ፡ ለእግዚአብሔር፡ ትከውን፡ ወሱታፌ፡ ኵሎሙ፡ ውሉደ፡ ያዕቆብ፡ ማእዳ፡ ለከ፡ ትኩን፡
      ወአንተ፡ ወውሉድከ፡ ብልዑዋ፡ ወለኵሉ፡
  - verse: 17
    geez: ትውልድ፡ ትኩን፡ ማዕድከ፡ ምልእተ፡ ወኢይሕፀፅ፡ እክልከ፡ ለኵሉ፡ ዓለማት። ወኵሎሙ፡ እለ፡ ይጸልኡከ፡ ቅድሜከ፡ ይደቁ፡
      ወኵሎሙ፡ ዐርከ፡ ይሠረዉ፡ ወይትሐጐሉ፡ ወዘይባርከከ፡
  - verse: 18
    geez: ቡሩክ፡ ወኵሉ፡ ሕዝብ፡ ዘይረግመከ፡ ይኩን፡ ርጉመ።* ወለይሁዳሂ፡ ይቤሎ፡ የሀብከ፡ እግዚአ ብሔር፡ ኀይለ፡ ወጽንዐ፡
      ከመ፡ ትኪዶሙ፡ ለኵሎሙ፡ እለ፡ ይጸልኡከ፡ መኰንነ፡ ኩን፡ አንተ፡ ወአሐዱ፡ እምነ፡ ውሉድከ፡ ለውሉደ፡ ያዕቆብ፡ ስምከ፡
      ወስመ፡ ውሉድከ፡ ይኩን፡ *ዘየሐውር፡ ወዘያንሶሱ፡* ውስተ፡ ኵሉ፡ ምድር፡ ወአህጉር፡ አሜሃ፡ ይፈርሁ፡ አሕዛብ፡ እምቅድመ፡
      ገጽከ፡
  - verse: 19
    geez: ወይትሀወኩ፡ ኵሎሙ፡ አሕዛብ፡ ወኵሉ፡ ሕዝብ፡ ይትሀወኩ። ብከ፡ ይኩን፡ ረድኤተ፡ ለያዕ
  - verse: 20
    geez: ቆብ፡ ወብከ፡ ትትረከብ፡ መድኃኒተ፡ እስራኤል። ወአመ፡ ዕለት፡* ትነብር፡ ውስተ፡ መንበረ፡ *ክብር፡ ጽድቅከ፡ ትከውን፡*
      *ዐቢይ፡ ሰላም፡* ለኵሉ፡ ዘርአ፡ ውሉዱ፡ ለፍቅር፡ ዘይባርከከ፡ ቡሩክ፡ ወኵሎሙ፡ እለ፡ ይጸልኡከ፡ ወይሣቅዩከ፡ ወእለሂ፡
      ይረግሙከ፡ ይሠረዉ፡ ወይትሐጐሉ፡
  - verse: 21
    geez: እምድር፡ ወይኩኑ፡ ርጉማነ። ወተመይጠ፡ ሰዐሞ፡ ዳግመ፡ ወሐቀፎ፡ ወተፈሥሐ፡ ዐቢየ፡ እስመ፡
  - verse: 22
    geez: ርእየ፡ *ውሉደ፡ ለያዕቆብ፡ ወልዱ፡ ዘበጽድቅ። ወወፅአ፡ እማእከለ፡ እገሪሁ፡ ወወድቀ፡ ወሰገደ፡ ሎቱ፡ ወባረኮሙ፡
      ወአዕረፈ፡ ህየ፡ ቅሩበ፡ ይስሐቅ፡ አቡሁ፡ በይእቲ፡ ሌሊት፡ ወበልዑ፡ ወሰትዩ፡
  - verse: 23
    geez: በፍሥሐ። ወአኖመ፡ ክልኤሆሙ፡ ውሉዱ፡ ለያዕቆብ፡ አሐደ፡ በየማኑ፡ ወአሐደ፡ በፀጋሙ፡
  - verse: 24
    geez: ወተኀለፈ፡ ሎቱ፡ ጽድቀ። ወነገረ፡ ያዕቆብ፡ ኵሎ፡ ለአቡሁ፡ በሌሊት፡ ዘከመ፡ ገብረ፡ እግዚአ ብሔር፡ ምስሌሁ፡ ሣህለ፡
      ዐቢየ፡ ወዘከመ፡ ሠርሖ፡ ኵሎ፡ ፍኖቲሁ፡ ወተማኅፀኖ፡ እምኵሉ፡
  - verse: 25
