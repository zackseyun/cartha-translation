  rationale: The revision pass severely mistranslated this clause by hallucinating the word 'father' (likely misreading the verb `አበይከ` as being related to `አብ`, father) and changing the subject to the third person. The verbs `አበይከ` (you rebel / refuse / become great) and `ወአስሰልከ` (and you remove) are clearly second-person masculine singular. Furthermore, `አርዑተ` is simply 'yoke' (accusative), not 'his yoke' (`አርዑቶ`).
