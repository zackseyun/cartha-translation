  rationale: The phrase `ትኤብስ፡ አበሳ፡ ኵሎ` uses `ኵሎ` (all/whole/complete) to modify the singular noun `አበሳ` (sin). In this context, it means 'a complete sin' or 'a whole sin' rather than 'all sin' (which implies every type of sin).
