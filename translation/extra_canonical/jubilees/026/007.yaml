  from: And Jacob said to Rebekah his mother, “Mother, does not my father recognize everything that he eats and discerns it? But I am afraid, my mother, that he may hear my voice and not permit me to touch him. And you know that I am smooth, while Esau my brother is hairy, and I will appear in his eyes like one who mocks him, and I will do a deed that he did not command me, and he will be angry with me, and I will bring on myself a curse and not a blessing.”
  to: And Jacob said to Rebekah his mother, “Mother, does not my father recognize everything that he eats and discern it? But I am afraid, my mother, that he may not recognize my voice and may not allow me to touch him. And you know that I am smooth, while Esau my brother is hairy, and I will appear in his eyes like one who mocks him, and I will do a deed that he did not command me, and he will be angry with me, and I will bring on myself a curse and not a blessing.”
