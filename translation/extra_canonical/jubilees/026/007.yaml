translation:
  text: And Jacob said to Rebekah his mother[7], “Mother, will I not lack some of all that my father eats and that pleases him? But I am afraid, my mother, that he will recognize my voice and want to touch me. And you know that I am smooth, while Esau my brother is hairy, and I will appear in his eyes like one who mocks him, and I will do a deed that he did not command me, and he will be angry with me, and I will bring on myself a curse and not a blessing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: '7'
    text: The verse is textually difficult. The Ge'ez seems to say Isaac would recognize or discern what he eats, then shifts to Jacob's fear that Isaac may detect him by his voice and touch. The translation preserves the sense without over-smoothing.
    reason: segmentation_note
  - marker: a
    text: Or 'does not my father recognize everything that he eats and discern it?'.
    reason: previous_rendering
  - marker: b
    text: Or 'that he may not recognize my voice and may not allow me to touch him.'.
    reason: previous_rendering
