- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/026/023.job-76564.json
  category: mistranslation
  from: and multiply for you
  to: and multiply you
  rationale: The Ge'ez verb `ወያብዝኅከ` (wayabzehka) has a direct object suffix ('multiply you'), not a prepositional suffix ('for you'). The prepositional form `ለከ` (laka, 'for you') is used correctly later in the verse, but here it should be a direct object.
- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/026/023.job-76564.json
  category: lexical
  from: full of blessing[23]
  to: full
  rationale: The Ge'ez `ምሉእ` (mulu') simply means 'full' (modifying 'field' from the previous verse). Adding 'of blessing' is an unwarranted interpolation. Additionally, the footnote marker [23] belongs elsewhere in the verse.
- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/026/023.job-76564.json
  category: other
