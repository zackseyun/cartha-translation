- timestamp: '2026-04-28T09:36:31Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/026/023.job-76564.json
  category: lexical
  from: Let peoples serve you,
  to: Let them serve you,
  rationale: The Ge'ez text is simply `ይትቀነዩ፡ ለከ` (yetqanayu laka, 'let them serve you'). The explicit subject 'peoples' (or 'nations') is absent in the Ge'ez, unlike the parallel in Genesis 27:29. It should not be supplied without brackets.
