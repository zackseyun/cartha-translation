translation:
  text: '1. And Jacob went and camped to the south of Migdal-edar. And he went to
    his father

    2. Isaac, he and Leah his wife, on the new moon of the ninth month. And Reuben
    saw Bilhah,

    3. Rachel’s maidservant, the concubine of his father, bathing in water in a secluded
    place, and he loved her. And he hid himself at night, entered the house of Bilhah
    by night, and found her sleeping alone on a bed in her house.

    4. And he lay with her, and she awoke and saw, and behold, Reuben was lying with
    her in the bed. And she uncovered the edge of her covering and seized him and
    cried out, and she recognized that it was Reuben.

    5. And she was ashamed because of him, and she released her hand from upon him,
    and he fled. And she lamented greatly because of this matter,

    6. and she told it to no one. And when Jacob came and she sought him, she said
    to him,

    7. “I am not clean for you, because I have been defiled away from you, for Reuben
    has polluted me and lay with me at night while I was sleeping, and I did not know
    until he uncovered my skirt and lay with me.”

    8. And Jacob was very angry with Reuben because he had lain with Bilhah, because
    he had uncovered his father’s skirt.

    9. Yet Jacob did not approach her again, because Reuben had defiled her. And every
    man who uncovers his father’s covering—his matter is very evil,

    10. for he is abominable before the LORD. Because of this it is written and ordained
    on the heavenly tablets that a man must not lie with his father’s wife and must
    not uncover his father’s covering, because it is unclean. They must surely die
    together—the man who lies with his father’s wife and the woman also—for they have
    done an unclean deed on the earth. And let there be no uncleanness before our
    God among the people whom he has chosen for himself as a kingdom. And again it
    is written a second time: “Cursed be the one who lies with his father’s wife,
    because he has uncovered his father’s shame.” And let all the holy ones of the
    LORD say, “So be it, so be it.” And you, Moses, command the children of Israel
    that they keep this word, for it is a sentence of death, and it is unclean, and
    there is no atonement forever to atone for the man who has done this, except to
    put him to death and kill him and stone him and uproot him from the midst of the
    people of our God. For there shall not remain alive for a single day on the earth
    any man who does this in Israel, for he is abominable and unclean. And let them
    not say, “Reuben was allowed to live and forgiveness was granted after he lay
    with his father’s concubine, and she too, though she had a husband, and though
    Jacob his father was still alive.” For until that time the ordinance and the judgment
    and the law had not been fully revealed for all; but in your days it is as the
    law of the times and of the days, and as an everlasting law for the everlasting
    generations. And for this law there is no completion of days, and no forgiveness
    for it, except that both of them be uprooted from the midst of the people; on
    the day on which they did it they shall kill them. And you, Moses, write it down
    for Israel, that they may keep it and not do according to this word and not sin
    with a sin unto death, because the Judge, the LORD our God, is one who does not
    show partiality and does not accept gifts. And tell them this word of the ordinance,
    that they may hear and be on guard and watch themselves and not be destroyed and
    rooted out from the land. For all who do it on the earth are unclean and defiled
    and polluted and contaminated before our God. And there is no greater sin than
    the sexual impurity that they commit on the earth, for Israel is a holy people
    to the LORD its God, and a people of inheritance, and a priestly people, and a
    kingdom people, and a planted people; and no such uncleanness is to be seen in
    the midst of the holy people. And in the third year of this week Jacob and all
    his sons went and dwelt in the house of Abraham, near Isaac his father and Rebekah
    his mother. And these are the names of the sons of Jacob: the firstborn, Reuben;
    and Simeon; and Levi; and Judah; and Issachar; and Zebulun, the sons of Leah;
    and the sons of Rachel, Joseph and Benjamin; and the sons of Bilhah, Dan and Naphtali;
    and the sons of Zilpah, Gad and Asher; and Dinah, the only daughter of Leah, the
    daughter of Jacob. And they went and bowed down to Isaac and Rebekah, and when
    they saw them they blessed Jacob and all his sons. And Isaac rejoiced greatly
    because he saw the sons of Jacob his younger son, and he blessed them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: v2
    text: The Ge'ez text literally reads 'he and Leah his wife, on the new moon of
      the ninth month.' Some scholars emend this to a standard Jubilees date formula
      ('first year of the third week of the ninth jubilee'), assuming textual corruption,
      but the translation follows the extant Ge'ez.
    reason: textual_variant
  - marker: v4
    text: The wording shifts between literal handling of a garment and sexual euphemism.
      'Edge of her covering' is kept for the immediate action; later verses use the
      legal euphemism 'uncover his father’s covering.'
    reason: lexical_alternative
  - marker: v9
    text: The verse division is likely artificial here; verse 9 runs directly into
      the long legal discourse of verse 10.
    reason: segmentation_note
  - marker: v10
    text: The repeated legal formulas echo Levitical and Deuteronomic incest prohibitions,
      but Jubilees frames them as written on the heavenly tablets and then commanded
      through Moses.
    reason: cross_reference
  - marker: v10
    text: The final notice 'Jacob his younger son' may reflect Isaac’s perspective
      in contrast to Esau, rather than Jacob’s age at this moment.
    reason: cultural_note
lexical_decisions:
- source_word: መግደላደራፋፍ
  chosen: Migdal-edar
  alternatives:
  - Magedaladraaf
  - tower of Eder
  rationale: Preserved as the conventional place-name transliteration reflecting the
    underlying toponym rather than translating the compound literally in the main
    text.
- source_word: ወልያ
  chosen: and Leah
  alternatives:
  - first year
  rationale: The Ge'ez literally reads 'wa-Leya' (and Leah). Previous drafts emended
    this to 'first year' based on chronological assumptions, but original-language
    primacy dictates translating the extant text.
- source_word: ሠርቁ
  chosen: new moon
  alternatives:
  - third week
  rationale: Literally 'new moon' or 'beginning of the month'. Corrected from the
    interpretive 'third week'.
- source_word: ወርኀ ፱
  chosen: ninth month
  alternatives:
  - ninth jubilee
  rationale: Literally 'month 9'. Corrected from the interpretive 'ninth jubilee'.
- source_word: ዐቅብተ አቡሁ
  chosen: the concubine of his father
  alternatives:
  - his father’s kept woman
  - his father’s secondary wife
  rationale: The phrase denotes a woman attached to the father’s household in a sexual-marital
    capacity; 'concubine' best matches the legal and familial status in this context.
- source_word: በኅቡእ
  chosen: in a secluded place
  alternatives:
  - secretly
  - in private
  rationale: The phrase modifies the bathing location rather than merely the manner;
    'in a secluded place' makes the scene concrete.
- source_word: ክንፋ / ክነፍየ
  chosen: skirt
  alternatives:
  - edge of the garment
  - covering
  rationale: The idiom involves uncovering the lower covering in a sexual context.
    'Skirt' preserves the euphemistic force better than a flat 'garment,' while verse
    4 retains 'edge of her covering' for the literal action.
- source_word: ክዳነ አቡሁ
  chosen: his father’s covering
  alternatives:
  - his father’s skirt
  - his father’s bed
  rationale: This is a euphemistic legal expression parallel to uncovering nakedness.
    'Covering' preserves the metaphor and allows the legal formula to stand without
    over-paraphrase.
- source_word: ምኑን
  chosen: abominable
  alternatives:
  - detestable
  - loathsome
  rationale: The term signals strong cultic-moral revulsion before God; 'abominable'
    preserves that theological weight.
- source_word: ጽላተ ሰማይ
  chosen: heavenly tablets
  alternatives:
  - tablets of heaven
  rationale: This is a key Jubilees term for heavenly revelation and predestined ordinance;
    the established phrase should be preserved.
- source_word: ስርየተ
  chosen: atonement
  alternatives:
  - forgiveness
  - expiation
  rationale: In the clause 'there is no atonement ... to atone,' the cultic-legal
    sense is stronger than simple interpersonal forgiveness, though 'forgiveness'
    is used later where the discourse shifts to public objection.
- source_word: ኢይነሥእ ገጸ
  chosen: does not show partiality
  alternatives:
  - does not lift up a face
  - does not favor persons
  rationale: This is a standard Semitic judicial idiom; the English legal equivalent
    is clearer while preserving the theological point.
- source_word: ኢይነሥእ ሕልያነ
  chosen: does not accept gifts
  alternatives:
  - does not receive bribes
  - does not take thought-offerings
  rationale: In judicial context the phrase refers to accepting inducements; 'gifts'
    is broad and readable, with bribery implied by context.
- source_word: ዝሙና
  chosen: sexual impurity
  alternatives:
  - fornication
  - sexual immorality
  rationale: The term is broad and serious; 'sexual impurity' preserves the purity-framework
    central to Jubilees rather than using a narrower modern category.
- source_word: ጥዕት
  chosen: a planted people
  alternatives:
  - a chosen plant
  - a planting
  rationale: The image is agricultural and covenantal; 'a planted people' keeps the
    metaphor intelligible in English.
theological_decisions:
- issue: Chronological formula in verse 2
  chosen_reading: Rendered literally as 'he and Leah his wife, on the new moon of
    the ninth month.'
  alternative_readings:
  - the first year of the third week of the ninth jubilee
  rationale: While some scholars emend the Ge'ez text here to fit Jubilees' standard
    chronological formulas (assuming a corruption from a Hebrew original), the Cartha
    Open Bible prioritizes the extant original-language text over conjectural emendation.
  doctrine_reference: DOCTRINE.md §1 original-language primacy over translation tradition
- issue: Legal euphemism for incest prohibition
  chosen_reading: Used 'his father’s wife' and 'his father’s covering/shame' together
    in verse 10.
  alternative_readings:
  - flatten all expressions to 'his father’s wife'
  - render all euphemisms as 'nakedness'
  rationale: The chapter intentionally combines legal relationship language with euphemistic
    uncovering language. Preserving both reflects the text’s theological-legal density.
  doctrine_reference: DOCTRINE.md §3 preserve theological tension rather than resolve
    it
- issue: Status of Bilhah after Reuben’s act
  chosen_reading: Translated Jacob’s later abstention as 'Jacob did not approach her
    again.'
  alternative_readings:
  - '''Jacob did not return to her'''
  - '''Jacob no longer knew her sexually'''
  rationale: The Ge'ez implies cessation of sexual approach because she had been defiled.
    'Approach' preserves the euphemistic register without over-expansion.
  doctrine_reference: DOCTRINE.md §1 original-language primacy over translation tradition
- issue: Reuben’s survival versus later law
  chosen_reading: Kept the text’s explanation that the full ordinance had not yet
    been revealed, so Reuben’s case does not create a precedent.
  alternative_readings:
  - harmonize with Genesis by omitting the legal explanation
  - treat the statement as merely narrative aside
  rationale: 'This is a major theological move in Jubilees: patriarchal narrative
    is subordinated to later revealed law on the heavenly tablets. The explanation
    must remain explicit.'
  doctrine_reference: 'PHILOSOPHY.md: do not harmonize Jubilees back into Genesis/Exodus'
