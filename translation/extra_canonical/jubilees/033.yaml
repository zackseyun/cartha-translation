  rows:
  - verse: 1
    geez: ፴፫ ወሖረ ፡ ያዕቆብ ፡ ወኀደረ ፡ መንገለ ፡ ደቡብ ፡ መግደላደራፋፍ ። ወሖረ ፡ ኀበ ፡ አቡሁ ፡
  - verse: 2
    geez: ይስሐቅ ፡ ውእቱ ፡ ወልያ ፡ ብእሲቱ ፡ አመ ፡ ሠርቁ ፡ ለወርኀ ፡ ፱ ። ወርእየ ፡ ሮቤን ፡ ባላንን ፡
  - verse: 3
    geez: 'ለአኪተ ፡ ራሔል ፡ ዐቅብተ ፡ አቡሁ ፡ እንዘ ፡ ትትሐፀብ ፡ በማይ ፡ በኅቡእ ፡ ወአፍቀራ ። ወተኀቢኦ ፡

      በሌሊት ፡ ቦአ ፡ ቤተ ፡ ባላን ፡ [ሌሊተ ፡] ወረከባ ፡ እንዘ ፡ ትነውም ፡ ውስተ ፡ ዐራታ ፡ ባሕቲታ ፡'
  - verse: 4
    geez: 'ውስተ ፡ ቤታ ። ወሰከበ ፡ ምስሌሃ ፡ ወነቅሀት ፡ ወርእየቶ ፡ ወናሁ ፡ ሮቤን ፡ ይስክብ ፡ ምስሌሃ ፡

      ውስተ ፡ ምስካብ ፡ ወከሠተት ፡ ክንፋ ፡ ወአኀዘቶ ፡ ወአውየወት ፡ ወአእመረቶ ፡ ከመ ፡ ሮቤል ፡ ውእቱ ።'
  - verse: 5
    geez: ወተኀፍረት ፡ እምኔሁ ፡ ወኀደገት ፡ እዴሃ ፡ እምላዕሌሁ ፡ ወጐየ ። ወትላሑ ፡ በእንተዝ ፡ ነገር ፡
  - verse: 6
    geez: ፈድፋደ ፡ ወአነገረት ፡ ወኢለመኑሂ ፡ ሰብአ ። ወሶበ ፡ መጽአ ፡ ያዕቆብ ፡ ወኀሠሣ ፡ ትቤሎ ፡
  - verse: 7
    geez: 'ኢኮንኩ ፡ ንጽሕተ ፡ ለከ ፡ እስመ ፡ ተገመዝኩ ፡ እምኔከ ፡ እስመ ፡ አርኩሰኒ ፡ ሮቤል ፡ ወሰከበ ፡ ምስሌየ
      ፡

      ሌሊተ ፡ ወአንሰ ፡ እነውም ፡ ወኢያእመርኩ ፡ እስከ ፡ ሶበ ፡ ከሠተ ፡ ክነፍየ ፡ ወሰከበ ፡ ምስሌየ ።'
  - verse: 8
    geez: ወተምዐ ፡ ያዕቆብ ፡ ጥቀ ፡ ላዕለ ፡ ሮቤል ፡ እስመ ፡ ሰከበ ፡ ምስለ ፡ ባላን ፡ እስመ ፡ ከሠተ ፡ ክዳነ ፡
      አቡሁ ።
  - verse: 9
    geez: ወአቀረበ ፡ እንከ ፡ ያዕቆብ ፡ እስመ ፡ አርኩሳ ፡ ሮቤል ፡ ወኵሉ ፡ ሰብእ ፡ ዘይከሥት ፡ ክዳነ ፡
  - verse: 10
    geez: 'አቡሁ ፡ እኩይ ፡ ነገሩ ፡ ጥቀ ፡ እስመ ፡ ምኑን ፡ ውእቱ ፡ በቅድመ ፡ እግዚአብሔር ። በእንተዝ ፡

      ጽሑፍ፡ ወሥሩዕ፡ ውስተ፡ ጽላተ፡ ሰማይ፡ ከመ፡ ኢይስክብ፡ ብእሲ፡ ምስለ፡ ብእሲተ፡ አቡሁ፡

      ወከመ፡ ኢይክሥት፡ ኪዳነተ፡ አቡሁ፡ እስመ፡ ርኩስ፡ ውእቱ፡ ሞተ፡ ለይሙቱ፡ ኅቡረ፡ ብእሲ፡

      ዘይስክብ፡ ምስለ፡ ብእሲተ፡ አቡሁ፡ ወብእሲትኒ፡ እስመ፡ ርኩሰ፡ ገብሩ፡ ውስተ፡ ምድር።

      ወኢይኩን፡ ርኵስ፡ ቅድመ፡ አምላክ፡ በውስተ፡ ሕዝብ፡ ዘንረየ፡ ሎቱ፡ ለምልክና፡። ወካዕበ፡

      ጽሑፍ፡ ዳግመ፡ ርጉመ፡ ለይኩን፡ ዘይስክብ፡ ምስለ፡ ብእሲተ፡ አቡሁ፡ እስመ፡ ከሠተ፡ ኀፍረተ፡

      አቡሁ፡ ወይቤሉ፡ ኵሎሙ፡ ቅዱሳኒሁ፡ ለእግዚአብሔር፡ ለይኩን፡ ለይኩን። ወአንተኒ፡ ሙሴ፡

      አዝዞሙ፡ ለውሉደ፡ እስራኤል፡ ወይዕቀቡ፡ ዘንተ፡ ቃለ፡ እስመ፡ ዘንኒ፡ ሞተ፡ ውእቱ፡ ወርኵስ፡

      ውእቱ፡ ወአልቦ፡ ስርየተ፡ ለአስተስርዮ፡ በእንተ፡ ብእሲ፡ ዘገብረ፡ ዘንተ፡ ለዓለም፡ ዘእንበለ፡

      ለእምቀትቱ፡ ወለቀቲሎቱ፡ ወለወገርቱ፡ በአብን፡ ወለሠርዎቱ፡ እማእከለ፡ ሕዝበ፡ አምላክ።

      እስመ፡ ኢይከውኖ፡ ሐይወ፡ አሐተ፡ ዕለተ፡ ውስተ፡ ምድር፡ ኵሉ፡ ሰብእ፡ ዘይገብር፡

      በውስተ፡ እስራኤል፡ እስመ፡ ምኑን፡ ወርኩስ፡ ውእቱ። ወኢይበሉ፡ ሮቤል፡ ኰነ፡ ሐይወ፡

      ወስርየት፡ እምዘ፡ ሰከበ፡ ምስለ፡ ዕቅብተ፡ አቡሁ፡ ወይእቲኒ፡ እንዘ፡ ባቲ፡ ምተ፡ ወእንዘ፡

      ምታ፡ ሕያው፡ ያዕቆብ፡ አቡሁ። እስመ፡ ኢተከሥተ፡ ሥርዐተ፡ ወኵነኔ፡ ወሕገ፡ እስከ፡ አሜሃ፡

      ፍጹም፡ ለኵሉ፤ እስመ፡ በመዋዕሊከ፡ ከመ፡ ሕገ፡ ጊዜ፡ ወመዋዕል፡ ወሕገ፡ ዘለዓለም፡

      ለትውልድ፡ ዘለዓለም። ወአልቦ፡ ለዝ፡ ሕገ፡ ተወድኦ፡ መዋዕል፡ ወእምዝኒ፡ ስርየተ፡ ሎቱ፡

      ዘእንበለ፡ ከመ፡ ይሠረዉ፡ ክልኤሆሙ፡ በማእከለ፡ ሕዝብ፡ በዕለት፡ እንተ፡ ባቲ፡ ገብርዋ፡

      ይትኀለዎሙ። ወአንተኒ፡ ሙሴ፡ ጸሐፍ፡ ለእስራኤል፡ ወይዕቀብዋ፡ ወኢይግበሩ፡ በከመ፡ ዝንቱ፡

      ነገር፡ ወኢይስሐቱ፡ ለአበሳ፡ ሞት፡ እስመ፡ መኰንን፡ እግዚአብሔር፡ አምላክነ፡ ዘውእቱ፡

      ኢይነሥእ፡ ገጸ፡ ወኢይነሥእ፡ ሕልያነ። ወንገሮሙ፡ ዘንተ፡ ነገረ፡ ሥርዐተ፡ ሎሙ፡ ይስምዑ፡

      ወይትገሐሱ፡ ወይትናጸሩ፡ እምኔሆሙ፡ ወኢይትሐጐሉ፡ ወኢይሠረዉ፡ እምድር፡ እስመ፡

      ርኩስ፡ ወስፉዕር፡ ወንክፈት፡ ወግማኔ፡ ኵሎሙ፡ እለ፡ ይገብርዋ፡ በምድር፡ በቅድመ፡ አምላክነ።

      ወአልቦ፡ ኀጢአተ፡ ዐቢየ፡ እምዝሙና፡ ዘይዜምዉ፡ ዲበ፡ ምድር፡ እስመ፡ ሕዝብ፡ ቅዱስ፡

      እስራኤል፡ ለእግዚአብሔር፡ አምላኩ፡ ወሕዝበ፡ ርስት፡ ውእቱ፡ ወሕዝበ፡ ክህነት፡ ውእቱ፡

      ወሕዝበ፡ መንግሥት፡ ውእቱ፡ ወጥዕት፡ ውእቱ፡ ወአኮ፡ ዘያስተርኢ፡ ዘከመዝ፡ ርኩስ፡

      በማእከለ፡ ሕዝብ፡ ቅዱስ። ወበሣልስ፡ ዓመት፡ ዘዝሳቡዒ፡ ኀደሰ፡ ሀሎ፡ እንዘ፡ የሐውር፡ ያዕቆብ፡

      ወኵሉ፡ ውሉዱ፡ ወንደፉ፡ ቤተ፡ አብርሃም፡ ቅሩበ፡ ይስሐቅ፡ አቡሁ፡ ወርብቃ፡ እሙ። ወዝንቱ፡

      ውእቱ፡ አስማቲሆሙ፡ ለውሉደ፡ ያዕቆብ፡ በኵሩ፡ ሮቤል፤ ወስምዖን፤ ወሌዊ፤ ወይሁዳ፤

      ወይሳኮር፤ ወዛብሎን፡ ውሉዳ፡ ለልያ፤ ወውሉዳ፡ ለራሔል፡ ዮሴፍ፡ ወብንያም፤ ወውሉደ፡ ባላን፡

      ዳን፡ ወንፍታሌም፤ ወውሉደ፡ ዛላፋን፡ ጋድ፡ ወአሴር፤ ወዲና፡ ወለተ፡ ልያ፡ ባሕቲታ፡ ወለተ፡

      ያዕቆብ። ወሐዊሮሙ፡ ሰገዱ፡ ለይስሐቅ፡ ወለርብቃ፡ ወሶበ፡ ርእይዎሙ፡ ባረክዎ፡ ለያዕቆብ፡

      ወለኵሎሙ፡ ውሉዱ። ወተሥሐ፡ ይስሐቅ፡ ፈድፋደ፡ እስመ፡ ርእየ፡ ውሉደ፡ ያዕቆብ፡ ወልዱ፡

      ዘይኄይስ፡ ወባረኮሙ።'
