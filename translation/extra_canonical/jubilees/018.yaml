translation:
  text: '1. And the LORD said to Abraham, “Abraham, Abraham.” And he said, “Here I
    am.” And he said, “Take your son, your beloved one whom you love, Isaac, and go
    into the high land, and offer him up on one of the mountains that I will show
    you.”

    3. And he rose early in the morning and saddled his donkey, and he took two servants
    with him, and Isaac his son; and he split the wood for the burnt offering, and
    he went to the place on the third day.

    4. And he saw the place from afar. And he came as far as the water-pit, and he
    said to his servants, “Stay here with the donkey, and I and the boy will go on,
    and we will worship, and we will return to you.”

    5. And he took the wood of the offering and laid it on Isaac his son, and he took
    in his hand the fire and the knife, and the two of them went together until that
    place.

    6. And Isaac said to his father, “Father.” And he said, “Here I am, my son.” And
    he said to him, “Look: the fire and the knife and the wood—but where is the sheep
    for the burnt offering, father?”

    7. And he said, “God will see for himself the sheep for the burnt offering, my
    son.” And he came near to the place of the mountain of the LORD.

    8. And he built the altar and placed the wood on the altar, and he bound Isaac
    his son and laid him on the wood that was on top of the altar, and he stretched
    out his hand to take the knife so that he might slaughter Isaac his son.

    9. And I stood before him and before the prince Mastema, and the LORD said, “Tell
    him not to lay down his hand upon the boy, and not to do anything to him, for
    now I know that he is one who fears God.”

    10. And I called to him from heaven and said to him, “Abraham, Abraham.” And he
    hurried and said, “Here I am.”

    11. And I said to him, “Do not stretch out your hand against the boy, and do not
    do anything to him, for now I know that you fear God, and you have not withheld
    your son, your seed, from me.”

    12. And the prince Mastema was put to shame. And Abraham lifted up his eyes and
    looked, and behold, a ram was caught by its horns in the thicket. And Abraham
    went and took the ram and offered it up as a burnt offering instead of his son.

    13. And Abraham called that place “The LORD has seen,” so that it is said, “The
    LORD has seen”—that is Mount Zion.

    14. And the LORD called Abraham by his name a second time from heaven, just as
    he had shown me that we should speak in the name of the LORD.

    15. And he said, “By myself I have sworn, says the LORD, because you have done
    this thing and have not withheld your son, your seed, from me—your beloved one—surely
    blessing I will bless you, and multiplying I will multiply your seed like the
    stars of heaven and like the sand that is on the seashore, and your seed will
    inherit the cities of their enemies.

    16. And in your seed all the nations of the earth will be blessed, because you
    have obeyed my voice, and I have made known to everyone that you are faithful
    to me in all that I have said to you. Go in peace.”

    17. And Abraham went to his servants, and they arose and went together to Beer-sheba,
    and Abraham dwelt by the Well of the Oath.

    18. And he kept this festival every year for seven days with joy, and he named
    it the Festival of the LORD, according to the seven days during which he had gone
    and returned in peace.

    19. And thus it is ordained and written on the heavenly tablets concerning Israel
    and his seed, that they should keep this festival seven days with festal joy.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: v3
    text: The chapter numbering in the source rows skips from verse 1 to verse 3.
      No verse 2 text is present in the supplied chapter corpus.
    reason: segmentation_note
  - marker: v4
    text: The phrase rendered 'water-pit' reflects ዐዘቅተ ማይ, literally something like
      'pit/cistern of water.' The exact local topographical nuance is uncertain.
    reason: lexical_alternative
  - marker: v7
    text: The final phrase may be understood as 'the place, the mountain of the LORD'
      or 'the place which is the mountain of the LORD.'
    reason: segmentation_note
  - marker: v9
    text: The wording is textually difficult. The sense is that the angelic narrator
      stands before Abraham and before Prince Mastema, and the LORD instructs him
      to stop Abraham.
    reason: textual_variant
  - marker: v12
    text: The opening clause is difficult; the translation takes it to mean that Prince
      Mastema was disgraced or put to shame when the test failed to destroy Isaac.
    reason: textual_variant
  - marker: v13
    text: Jubilees explicitly identifies the place with Mount Zion, unlike the more
      familiar Genesis wording. This is a significant book-specific theological expansion.
    reason: cross_reference
  - marker: v14
    text: The clause 'just as he had shown me that we should speak in the name of
      the LORD' reflects the revelatory framing of Jubilees and may sound abrupt because
      of the chapter's first-person angelic narration.
    reason: cultural_note
  - marker: v18
    text: The seven-day festival appears to count the period of Abraham's going and
      returning. The wording is compressed and may reflect a liturgical summary rather
      than a simple narrative notice.
    reason: segmentation_note
lexical_decisions:
- source_word: ምድር፡ ልዐልት
  chosen: the high land
  alternatives:
  - the land of elevation
  - the upper land
  - Moriah
  rationale: The Ge'ez reads literally 'high/elevated land,' not the Genesis toponym
    'Moriah.' To avoid harmonizing Jubilees back into Genesis, the rendering preserves
    the Ethiopic sense of elevation.
- source_word: አዕርጎ
  chosen: offer him up
  alternatives:
  - bring him up
  - present him
  rationale: In sacrificial context this verb naturally carries the sense of offering
    up, preserving the cultic force without over-paraphrase.
- source_word: መሥዋዕት / ምሥዋዕ
  chosen: offering / altar
  alternatives:
  - sacrifice
  - sacrificial altar
  rationale: These are standard cultic terms. 'Offering' and 'altar' keep the sacrificial
    setting clear in readable English.
- source_word: ለጽንሓሕ
  chosen: for the burnt offering
  alternatives:
  - for holocaust
  - for the whole offering
  rationale: The context is the ascent-offering of Genesis 22 tradition. 'Burnt offering'
    is the clearest established English equivalent for modern readers.
- source_word: ኅቡረ፡ ክልኤሆሙ
  chosen: the two of them went together
  alternatives:
  - both of them together
  rationale: This preserves the deliberate paired movement motif without sounding
    wooden.
- source_word: በግዕ
  chosen: sheep
  alternatives:
  - lamb
  - ram
  rationale: The question in v.6 is generic; the specific substitute in v.12 is a
    ram. 'Sheep' avoids prematurely specifying the animal.
- source_word: ይሬኢ፡ ሎቱ
  chosen: will see for himself
  alternatives:
  - will provide for himself
  - will look out for
  rationale: The root is 'see.' Because v.13 plays on divine seeing, the translation
    preserves 'see' rather than importing the interpretive gloss 'provide' into the
    main text.
- source_word: መኰንን፡ መስተማ
  chosen: the prince Mastema
  alternatives:
  - the ruler Mastema
  - Prince Mastema
  rationale: Jubilees presents Mastema as a personal supernatural adversarial figure.
    'Prince' reflects the title while preserving the book's demonological framework.
- source_word: ምዝገኒ
  chosen: anything
  alternatives:
  - harm
  - a thing
  rationale: The phrase forbids any act against the boy. 'Anything' is idiomatic and
    broad enough to cover the Ge'ez expression.
- source_word: በሐኵ
  chosen: ram
  alternatives:
  - male sheep
  rationale: In v.12 the animal is specifically the substitute victim, and 'ram' best
    fits the horn imagery in the same verse.
- source_word: ርእየ
  chosen: has seen
  alternatives:
  - sees
  - has provided
  rationale: The naming formula in Jubilees hinges on the same 'see' wordplay as v.7.
    Preserving 'seen' keeps the literary-theological connection visible.
- source_word: በርስሕ / ዐዘቅት፡ መሐላ
  chosen: Beer-sheba / the Well of the Oath
  alternatives:
  - Beersheba
  - the well of swearing
  rationale: The place-name is rendered conventionally as Beer-sheba, while the explanatory
    phrase is translated to preserve Jubilees' etymological sense.
- source_word: በዓለ፡ ... በፍሥሓ፡
  chosen: festival ... with joy / with festal joy
  alternatives:
  - feast ... in rejoicing
  - celebration ... in gladness
  rationale: The chapter closes with liturgical commemoration. 'Festival' and 'festal
    joy' preserve the calendrical and celebratory register.
- source_word: ጽላተ፡ ሰማይ
  chosen: the heavenly tablets
  alternatives:
  - the tablets of heaven
  rationale: This is a key Jubilees term for heavenly decree and written ordinance;
    the established phrase should be preserved consistently.
theological_decisions:
- issue: Speaker shift in vv.9-11 between the narrator, the LORD, and the angelic
    mediator
  chosen_reading: The first-person 'I' is the angelic narrator speaking, standing
    before Abraham and before Prince Mastema, then calling from heaven at the LORD's
    command.
  alternative_readings:
  - The LORD himself speaks throughout without angelic mediation
  - The 'I' could be an unmarked narrative shift with ambiguous referent
  rationale: Jubilees is framed as revelation mediated by the Angel of the Presence.
    The explicit first-person narration ('I stood,' 'I called,' 'I said') fits that
    framework and should not be flattened into the Genesis account.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve
    Angel-of-the-Presence framing.
- issue: Rendering of divine 'seeing' in vv.7 and 13
  chosen_reading: Retain 'see/has seen' in the main text rather than replacing it
    with 'provide/has provided.'
  alternative_readings:
  - God will provide for himself the sheep
  - The LORD will provide
  rationale: Although 'provide' is a common interpretive rendering in Genesis tradition,
    Jubilees' wording foregrounds the lexical play on seeing. Keeping 'see' preserves
    the literary and theological texture of the chapter.
  doctrine_reference: Original-language primacy over translation tradition.
- issue: Identification of the mountain in v.13
  chosen_reading: Translate the text's explicit identification as 'that is Mount Zion.'
  alternative_readings:
  - Leave the mountain unnamed
  - Harmonize to Moriah from Genesis 22
  rationale: The Ge'ez text explicitly identifies the place with Mount Zion, a significant
    Jubilees-specific theological localization. This should be preserved rather than
    harmonized away.
  doctrine_reference: Do not harmonize Jubilees back into Genesis/Exodus when Jubilees
    expands or differs.
- issue: Festival institution in vv.18-19
  chosen_reading: Render the closing as an annual seven-day festival ordained for
    Israel and his seed.
  alternative_readings:
  - Treat it merely as Abraham's private commemoration
  - Reduce the language to generic remembrance
  rationale: Jubilees characteristically turns patriarchal events into calendrical
    observances written on the heavenly tablets. The translation preserves that institutional
    and liturgical force.
  doctrine_reference: Preserve calendrical terminology carefully.
