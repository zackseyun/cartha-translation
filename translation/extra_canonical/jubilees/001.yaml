translation:
  text: '1. And it happened in the first year of the خروج of the children of Israel
    from Egypt, in the third month,

    2. on the sixteenth day of that month, the LORD spoke to Moses, saying, “Come
    up to me on the mountain, and I will give you two stone tablets of the law and
    the commandment, which I have written, so that you may teach them.” And Moses
    went up to the mountain of the LORD, and the glory of the LORD dwelt

    3. on Mount Sinai, and the cloud overshadowed it six days. And he called to Moses

    4. on the seventh day from the midst of the cloud. And the glory of the LORD appeared
    like a fire burning on the top of the mountain. And Moses was on the mountain
    forty days and forty

    5. nights. And the LORD showed him what was first and what is to come: the account
    of the divisions of all the days of the law and the testimony. And he said, “Set
    your heart on everything that I tell you on this mountain, and write it in a book,
    so that their generations may see that I have not forsaken them because of all
    the evil that they have done in transgressing the ordinance that I establish between
    me and you today on Mount Sinai

    6. for their generations. And it will be that, when all these things come upon
    them, they will know that I have been more righteous than they in all their judgments
    and in all their deeds,

    7. and they will know that I have truly been with them. And you, write for yourself
    all these words that I make known to you today, for I know their rebellion and
    their stiff neck, before I bring them into the land that I swore to their fathers—to
    Abraham and Isaac and Jacob—saying, ‘To your seed I will give a land flowing with
    milk and honey.’ And they will eat and be satisfied,

    8. and they will turn to foreign gods, to those who cannot deliver them from any
    of their distress.

    9. And this testimony will be heard as a testimony against them. For they will
    forget all my commandments, everything that I command them, and they will walk
    after the nations, and after their uncleanness, and after their shameful things,
    and they will serve their gods, and these will become for them a stumbling block,
    and for distress, and for affliction, and for a snare.

    10. And many will perish, and they will be seized and fall into the hand of the
    enemy, because they have forsaken my ordinances and my commandments and the festivals
    of my covenant and my sabbaths and my holy things that I sanctified for myself
    among them, and my tabernacle and my sanctuary that I sanctified for myself in
    the midst of the land, so that I might set my name upon it.

    11. And they will make for themselves high places and groves and carved images,
    and they will bow down, each to his own error, and they will sacrifice their children
    to demons and to every work of the error of their hearts.

    12. And I will send witnesses to them, that I may testify against them, but they
    will not listen. And they will kill the witnesses also, and those who seek the
    law they will drive away, and they will overturn everything and begin to do evil

    13. before my eyes. And I will hide my face from them, and I will hand them over
    into the hand of the nations for captivity and for plunder and for devouring,
    and I will remove them from the midst of the land, and I will scatter them among
    the nations.

    14. And they will forget all my law and all my commandments and all my judgments,
    and they will go astray concerning new moons

    15. and sabbath and festival and jubilee and ordinance. And after this they will
    turn to me from among the nations with all their heart and with all their soul
    and with all their strength, and I will gather them from among all the nations,
    and they will seek me so that I may be found by them, when they seek me with all
    their heart and with all their soul. And I will reveal to them abundant peace
    with righteousness, and I will transplant them as an upright plant,

    16. with all my heart and with all my soul. And they will be for a blessing and
    not for a curse, and they will be the head and not the tail. And I will build
    my sanctuary in their midst, and I will dwell with them,

    17. and I will be their God, and they will be my people in truth and in righteousness.

    18. And I will not forsake them, and I will not become alien to them, for I am
    the LORD their God.” And Moses fell on his face

    19. and prayed and said, “Lord my God, do not forsake your people and your inheritance,
    to walk in the error of their hearts, and do not hand them over into the hand
    of their enemies, the nations, lest they rule over them and make them sin against
    you. Let your mercy, O Lord, be lifted up over your people,

    20. and create for them an upright spirit. And let not the spirit of Beliar rule
    over them, to accuse them before you and to ensnare them from every path of righteousness,
    so that they may perish from before your face. But they are your people and your
    inheritance, whom you delivered by your great power from the hand of Egypt. Create
    for them

    21. a clean heart and a holy spirit, and let them not be ensnared in their sins
    from now and forever.” And the LORD said to Moses, “I know their contrariness
    and their thoughts and their stiff neck, and they will not listen until they acknowledge
    their sin and the sins of their fathers.

    22. And after this they will turn to me in all uprightness and with all their
    heart and with all their soul,

    23. and I will circumcise the foreskin of their heart and the foreskin of the
    heart of their seed, and I will create for them a holy spirit, and I will cleanse
    them so that they will not turn away from me from that day and forever.

    24. And their souls will cling to me and to all my commandments, and they will
    do my commandments. And I will be their Father, and they will be my children.

    25. And they all will be called children of the living God, and every angel and
    every spirit will know—yes, they will know—that these are my children and that
    I am their Father in uprightness and righteousness, and that I love them.

    26. “And now I will write for you all these words that I make known to you on
    this mountain, what is first and what is last and what is to come, in all the
    divisions of the days in the law and in the testimony and in their weeks of years
    and in the jubilees forever, until I descend and dwell with them throughout all
    the ages of eternity.”

    27. And he said to the angel of the presence, “Write for Moses from the beginning
    of creation until the time when my sanctuary will be built in their midst for
    all the ages of eternity.” And the LORD will appear to the eyes of all,

    28. and all will know that I am the God of Israel and the Father of all the children
    of Jacob and King on Mount Zion for all the ages of eternity. And Zion and Jerusalem
    will be holy.

    29. And the angel of the presence who went before the camp of Israel took the
    tablets of the divisions of the years—from the time of creation—of the law and
    of the testimony, of the weeks of their jubilees, year by year in all their full
    number, and of the jubilees, from the day of creation until the day when the heavens
    and the earth and all their creatures will be renewed according to the powers
    of heaven and according to all the creation of the earth, until the sanctuary
    of the LORD is created in Jerusalem on Mount Zion, and all the lights are renewed
    for healing and for peace and for blessing for all the chosen of Israel, and so
    that it may be thus from that day and for all the days of the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: v1
    text: The opening phrase means the first year after Israel’s departure from Egypt;
      the Ge'ez wording is compressed.
    reason: segmentation_note
  - marker: v5
    text: '''The account of the divisions of all the days'' reflects Jubilees’ technical
      chronology. The phrase can also be understood as ''the history arranged by divisions
      of days.'''
    reason: lexical_alternative
  - marker: v9
    text: 'The repeated legal-cultic terms are intentionally cumulative: commandments,
      nations, uncleanness, shameful things, gods, stumbling, distress, affliction,
      snare.'
    reason: segmentation_note
  - marker: v11
    text: The sequence likely refers to illicit cult sites and cult objects. The middle
      term is difficult; 'groves' is a cautious traditional equivalent for a sacred-pole/wooden-cult-object
      idea.
    reason: textual_variant
  - marker: v14
    text: The text appears to begin a list with 'new moons,' continued in v. 15 with
      sabbath, festival, jubilee, and ordinance. The verse division may be secondary.
    reason: segmentation_note
  - marker: v15
    text: Some witnesses and interpreters understand the planting image as 'a plant
      of righteousness' rather than 'an upright plant.'
    reason: lexical_alternative
  - marker: v20
    text: Beliar/Belial is the hostile spiritual power known in Second Temple Jewish
      literature; the Ge'ez spelling reflects that name.
    reason: cultural_note
  - marker: v23
    text: The phrase 'foreskin of the heart' is a literal covenantal metaphor for
      inward renewal, echoing Deuteronomic language.
    reason: cross_reference
  - marker: v26
    text: '''Weeks of years'' renders the technical chronological units that structure
      Jubilees; compare the book’s title-theme of jubilees and sabbatical cycles.'
    reason: cultural_note
  - marker: v27
    text: The speaker shifts into a divine first-person declaration within the angelic
      writing commission; the syntax is compressed in the Ge'ez.
    reason: segmentation_note
  - marker: v29
    text: '''The tablets of the divisions of the years'' may also be understood as
      heavenly tablets recording the ordered chronology of history.'
    reason: lexical_alternative
  - marker: v29
    text: The clause about renewal of 'all the lights' likely refers to cosmic luminaries
      in an eschatological restoration, not merely lamps or earthly lights.
    reason: cultural_note
lexical_decisions:
- source_word: ኩፋሌ
  chosen: divisions
  alternatives:
  - divisions of time
  - epochs
  - partitions
  rationale: Jubilees is structured around divided periods of sacred time; 'divisions'
    preserves the technical chronological sense without over-paraphrasing.
- source_word: ስምዕ
  chosen: testimony
  alternatives:
  - witness
  - ordinance of witness
  rationale: In this chapter it functions as a covenantal witness/testimony alongside
    'law'; 'testimony' preserves the technical revelatory register.
- source_word: ሥርዐት
  chosen: ordinance
  alternatives:
  - statute
  - order
  - regulation
  rationale: Used for established divine ordering; 'ordinance' fits covenantal/legal
    context and distinguishes it from 'commandment' and 'law'.
- source_word: ትእዛዝ
  chosen: commandment
  alternatives:
  - command
  - precept
  rationale: Standard covenantal term; 'commandment' preserves gravity and intertextual
    resonance.
- source_word: ሰንበታት
  chosen: sabbaths
  alternatives:
  - Sabbath days
  rationale: Plural sacred-time term should remain explicit and not be generalized.
- source_word: አዮቤለ
  chosen: jubilee
  alternatives:
  - jubilees
  rationale: Technical calendrical term central to Jubilees; must be preserved rather
    than paraphrased.
- source_word: ሱባዔሆሙ
  chosen: weeks of years
  alternatives:
  - heptads
  - year-weeks
  - sabbaths of years
  rationale: Preserves the book’s chronological framework more clearly for modern
    readers than a bare 'weeks'.
- source_word: ደብተራየ
  chosen: my tabernacle
  alternatives:
  - my tent
  - my dwelling-tent
  rationale: Cultic term best rendered with established sanctuary language while remaining
    readable.
- source_word: መቅደስ
  chosen: sanctuary
  alternatives:
  - holy place
  - temple
  rationale: Broader than a single temple building in some contexts; 'sanctuary' preserves
    sacred-space meaning.
- source_word: አጋንንት
  chosen: demons
  alternatives:
  - evil spirits
  rationale: Direct rendering of hostile spiritual beings; avoids softening the polemic.
- source_word: መንፈሰ ቤልሖር
  chosen: the spirit of Beliar
  alternatives:
  - the spirit of Belial
  rationale: The Ge'ez form points to the well-known apocalyptic adversarial figure;
    retained as a proper name in readable conventional form.
- source_word: ቍልፈተ ልብ
  chosen: foreskin of the heart
  alternatives:
  - uncircumcision of the heart
  rationale: The circumcision metaphor should remain concrete; it echoes covenantal
    heart-renewal language.
- source_word: መንፈሰ ቅዱሰ
  chosen: holy spirit
  alternatives:
  - Holy Spirit
  - spirit of holiness
  rationale: Lowercase in English main text avoids importing later Trinitarian precision
    where the text speaks of divinely given sanctifying spirit; theological note documents
    the choice.
- source_word: ተክለ ርቱዐ
  chosen: an upright plant
  alternatives:
  - a plant of righteousness
  - a righteous planting
  rationale: The image is agricultural and covenantal; 'upright plant' stays close
    to the Ge'ez while remaining intelligible.
- source_word: መልአከ ገጽ
  chosen: angel of the presence
  alternatives:
  - angel of the face
  - presence-angel
  rationale: Established rendering for the heavenly mediator in this book; preserves
    the revelatory framework.
theological_decisions:
- issue: Rendering of the divine name እግዚአብሔር
  chosen_reading: the LORD
  alternative_readings:
  - Lord
  - Yahweh
  rationale: Follows project doctrine for covenantal divine-name rendering and matches
    the elevated Sinai context.
  doctrine_reference: 'DOCTRINE.md: YHWH -> the LORD'
- issue: Whether መንፈሰ ቅዱሰ in vv. 21, 23 should be capitalized as a distinct hypostasis
  chosen_reading: holy spirit
  alternative_readings:
  - Holy Spirit
  rationale: In Jubilees 1 the phrase functions as divinely created/given sanctifying
    renewal language. Lowercase preserves the source’s conceptual world without forcing
    later doctrinal specification.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Identity of መንፈሰ ቤልሖር
  chosen_reading: the spirit of Beliar
  alternative_readings:
  - the spirit of Belial
  - a worthless spirit
  rationale: The chapter’s apocalyptic worldview points to the named hostile power
    known from Second Temple literature; retaining the proper name preserves that
    framework.
- issue: v. 23 heart-renewal metaphor
  chosen_reading: I will circumcise the foreskin of their heart
  alternative_readings:
  - I will remove the hardness of their heart
  rationale: The covenantal circumcision metaphor is explicit and should not be flattened
    into a generic idiom.
