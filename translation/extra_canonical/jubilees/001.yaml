translation:
  text: '1. And it happened in the first year of the exodus of the children of Israel
    from Egypt, in the third month,

    2. on the sixteenth day of that month, the LORD spoke to Moses, saying, “Come
    up to me on the mountain, and I will give you two stone tablets of the law and
    the commandment, which I have written so that you may teach them.” And Moses went
    up onto the mountain of the LORD, and the glory of the LORD dwelt on Mount Sinai,

    3. and the cloud overshadowed it for six days.

    4. And on the seventh day he called to Moses from the midst of the cloud, and
    the glory of the LORD appeared like a burning fire on the top of the mountain.
    And Moses was on the mountain forty days and forty nights.

    5. And the LORD taught him what was first and what was to come: the account of
    the divisions of all the days of the law and the testimony. And he said, “Set
    your heart on everything that I tell you on this mountain, and write it in a book,
    so that their generations may see that I have not abandoned them because of all
    the evil that they have done in transgressing the ordinance that I establish today
    between me and you

    6. for their generations on Mount Sinai.” And so it will be: when all these things
    come upon them, they will know that I am more righteous than they in all their
    judgments and in all their deeds,

    7. and they will know that I have truly been with them. And you, write down for
    yourself all the words that I make known to you today, for I know their rebellion
    and their stiff neck before I bring them into the land that I swore to their fathers—to
    Abraham, Isaac, and Jacob—saying, ‘To your seed I will give a land flowing with
    milk and honey.’ And they will eat and be satisfied,

    8. and they will turn to foreign gods, to those who cannot deliver them from any
    of their distress.

    9. And this testimony will be heard as a testimony against them. For they will
    forget all my commandments, everything that I command them, and they will walk
    after the nations, and after their impurities, and after their shameful things,
    and they will serve their gods, and these will become for them a stumbling block,
    and affliction, and tribulation, and a snare.

    10. And many will perish, and they will be seized and fall into the hand of the
    enemy, because they abandoned my ordinances and my commandments and the festivals
    of my covenant and my Sabbaths and my holy things that I sanctified for myself
    among them, and my tabernacle and my sanctuary that I sanctified for myself in
    the midst of the land, so that I might set my name upon it.

    11. And they will make for themselves high places and groves and carved images,
    and they will bow down, each to his own error, and they will sacrifice their children
    to demons and to every work of the error of their hearts.

    12. And I will send witnesses to them so that I may testify to them, but they
    will not listen; and they will kill the witnesses also, and those who seek the
    law they will drive away, and they will overturn everything and begin to do evil

    13. before my eyes. And I will hide my face from them, and I will deliver them
    into the hand of the nations for captivity and for plunder and for devouring,
    and I will remove them from the midst of the land, and I will scatter them among
    the nations.

    14. And they will forget all my law and all my commandments and all my judgments,
    and they will go astray as to new moons,

    15. and Sabbaths and festivals and jubilees and ordinances. And after this they
    will turn to me from among the nations with all their heart and with all their
    soul and with all their strength, and I will gather them from among all the nations,
    and they will seek me so that I may be found by them. And when they seek me with
    all their heart and with all their soul, I will reveal to them abundant peace
    with righteousness, and I will transplant them as an upright planting,

    16. with all my heart and with all my soul. And they will be for a blessing and
    not for a curse, and they will be the head and not the tail. And I will build
    my sanctuary in their midst, and I will dwell with them,

    17. and I will be their God, and they will be my people in truth and in righteousness.

    18. And I will not abandon them, nor will I estrange myself from them, for I am
    the LORD their God.” And Moses fell on his face,

    19. and he prayed and said, “Lord my God, do not abandon your people and your
    inheritance to walk in the error of their hearts, and do not give them into the
    hand of their enemies, the nations, lest they rule over them and cause them to
    sin against you. Let your mercy, Lord, be lifted up over your people,

    20. and create for them an upright spirit, and do not let the spirit of Beliar
    rule over them so as to accuse them before you and ensnare them from every path
    of righteousness, so that they perish from before your face. Yet they are your
    people and your inheritance, whom you delivered by your great power from the hand
    of Egypt. Create for them

    21. a clean heart and a holy spirit, and do not let them be caught in their sins
    from now and forever.” And the LORD said to Moses, “I know their contrariness
    and their thoughts and their stiff neck, and they will not listen

    22. until they acknowledge their sin and the sins of their fathers. And after
    this they will turn to me in all uprightness and with all their heart and with
    all their soul,

    23. and I will open the covering of their heart and the covering of the heart
    of their seed, and I will create for them a holy spirit, and I will cleanse them
    so that they do not turn away from me from that day and forever.

    24. And their souls will cling to me and to all my commandments, and they will
    do my commandments. And I will be their Father, and they will be my children.

    25. And they all will be called children of the living God, and every angel and
    every spirit will know—yes, they will know—that these are my children and that
    I am their Father in uprightness and righteousness, and that I love them.

    26. And now I will write down for you all these words that I make known to you
    on this mountain, what is first and what is last and what is to come, in all the
    divisions of the days in the law and in the testimony and in the weeks of their
    jubilees forever, until I descend and dwell with them through all the ages of
    eternity.”

    27. And he said to the angel of the presence, “Write for Moses from the beginning
    of creation until the time when my sanctuary will be built in their midst for
    all the ages of eternity.

    28. And the LORD will appear to the eyes of all, and all will know that I am the
    God of Israel and the Father of all the children of Jacob, and king on Mount Zion
    for all the ages of eternity. And Zion and Jerusalem will be holy.”

    29. And the angel of the presence, who went before the camp of Israel, took the
    tablets of the divisions of the years—from the time of the creation—of the law
    and of the testimony, of the weeks of the jubilees, year by year in all their
    number, and the jubilees year by year, from the day of the new creation when the
    heavens and the earth and all their creatures will be renewed according to the
    powers of heaven and according to all the creation of the earth, until the sanctuary
    of the LORD is created in Jerusalem on Mount Zion, and all the lights are renewed
    for healing and for peace and for blessing for all the chosen of Israel, and so
    that it may be thus from that day and throughout all the days of the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verse 5's phrase 'the account of the divisions of all the days of the law
      and the testimony' is difficult. The wording likely introduces the book's chronological
      framework rather than merely 'history.'
    reason: lexical_alternative
  - marker: b
    text: Verse 9's final list may also be rendered 'for offense, for affliction,
      for trouble, and for a snare.' The sequence is rhetorically cumulative.
    reason: lexical_alternative
  - marker: c
    text: Verse 11 contains several difficult cultic terms. 'High places and groves
      and carved images' reflects a best-effort rendering of a list of illicit worship
      objects/practices.
    reason: textual_variant
  - marker: d
    text: Verse 14's first item is uncertain in the transmitted Ethiopic. It is commonly
      understood to refer to calendrical observances such as new moons; the surrounding
      terms clearly concern sacred times.
    reason: textual_variant
  - marker: e
    text: Verse 23 literally speaks of opening or removing the 'covering' of the heart;
      this may overlap conceptually with uncircumcising/circumcising-heart imagery
      in biblical covenant texts.
    reason: cross_reference
  - marker: f
    text: Verse 26's 'weeks of their jubilees' preserves the technical heptadic chronology
      of Jubilees. It should not be reduced to ordinary seven-day weeks.
    reason: cultural_note
  - marker: g
    text: Verse 29 is syntactically dense and may reflect segmentation difficulties.
      The translation preserves the sense of a written heavenly record of years, law,
      testimony, and jubilee cycles extending from creation to final renewal.
    reason: segmentation_note
lexical_decisions:
- source_word: ኩፋሌ
  chosen: divisions
  alternatives:
  - divisions of time
  - ordered divisions
  rationale: Preserves Jubilees' technical chronological framework rather than flattening
    to a generic 'history.' The book's title tradition is tied to divisions/jubilees.
  lexicon: contextual Ge'ez/Jubilees usage
- source_word: ስምዕ
  chosen: testimony
  alternatives:
  - witness
  - ordinance
  rationale: In this chapter it functions as covenantal witness/testimony alongside
    'law'; 'testimony' preserves the legal-revelatory sense.
  lexicon: contextual Ge'ez/Jubilees usage
- source_word: ሥርዐት
  chosen: ordinance
  alternatives:
  - statute
  - order
  - custom
  rationale: Used for binding divine regulation; 'ordinance' is readable and weighty
    without sounding archaic.
  lexicon: contextual Ge'ez/Jubilees usage
- source_word: ትእዛዝ
  chosen: commandment
  alternatives:
  - command
  - instruction
  rationale: Maintains covenantal/legal force and consistency with biblical register.
  lexicon: contextual Ge'ez/Jubilees usage
- source_word: ሰንበታት
  chosen: Sabbaths
  alternatives:
  - sabbath days
  rationale: Plural should be preserved because Jubilees stresses calendrical observance.
  lexicon: contextual Ge'ez/Jubilees usage
- source_word: አዮቤለ
  chosen: jubilees
  alternatives:
  - jubilee years
  rationale: Technical calendrical term central to the book's structure; retained
    explicitly.
  lexicon: contextual Ge'ez/Jubilees usage
- source_word: ሱባዔሆሙ
  chosen: weeks of their jubilees
  alternatives:
  - weeks
  - heptads
  - sabbaths of years
  rationale: Preserves the heptadic chronological system. In context it refers to
    structured periods within jubilee reckoning, not ordinary weeks.
  lexicon: contextual Ge'ez/Jubilees usage
- source_word: መንፈሰ ቤልሖር
  chosen: the spirit of Beliar
  alternatives:
  - the spirit of Belial
  rationale: The Ethiopic form points to the hostile personal power known from Second
    Temple literature. 'Beliar' reflects the transmitted form here while preserving
    the theological referent.
  lexicon: Second Temple proper-name usage
- source_word: መልአከ ገጽ
  chosen: angel of the presence
  alternatives:
  - angel of the face
  - presence-angel
  rationale: Established literal sense of the idiom; preserves the revelatory mediator
    motif of Jubilees.
  lexicon: contextual Ge'ez/Jubilees usage
- source_word: ተክለ ርቱዐ
  chosen: upright planting
  alternatives:
  - planting of righteousness
  - straight plant
  rationale: Keeps the agricultural metaphor while avoiding over-interpretation; related
    to restoration imagery.
  lexicon: contextual Ge'ez/Jubilees usage
- source_word: አምላክ ነኪር
  chosen: foreign gods
  alternatives:
  - strange gods
  - alien gods
  rationale: Readable modern English with covenantal force intact.
  lexicon: contextual Ge'ez/Jubilees usage
- source_word: አጋንንት
  chosen: demons
  alternatives:
  - evil spirits
  rationale: Direct rendering of the supernatural beings receiving illicit sacrifice.
  lexicon: contextual Ge'ez/Jubilees usage
theological_decisions:
- issue: Identity of the mediating heavenly figure
  chosen_reading: Rendered መልአከ ገጽ as 'angel of the presence' and preserved him as
    the one commanded to write for Moses.
  alternative_readings:
  - angel of the face
  - a generic angelic messenger
  rationale: Jubilees foregrounds mediated revelation through this specific heavenly
    figure; flattening to a generic angel would erase a major theological feature
    of the book.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy.
- issue: Restoration language in vv. 23-25
  chosen_reading: Retained divine transformation language ('create for them a holy
    spirit,' 'I will cleanse them,' 'I will be their Father').
  alternative_readings:
  - weaken to moral reform only
  - harmonize to later doctrinal formulas
  rationale: The chapter presents eschatological covenant renewal in strong terms.
    The translation preserves that density without importing later systematic theology.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Calendrical terminology throughout the chapter
  chosen_reading: Explicitly preserved 'jubilees,' 'divisions of the days,' and 'weeks
    of their jubilees.'
  alternative_readings:
  - generic 'times' or 'periods'
  rationale: Jubilees' theology is inseparable from sacred chronology; smoothing these
    terms would distort the work.
  doctrine_reference: Original-language primacy; do not erase significant lexical
    decisions.
