  rows:
  - verse: 1
    geez: ወኮነ፡ በቀዳሚ፡ ዓመት፡ በፀአቶሙ፡ ለደቂቀ፡ እስራኤል፡ እምነ፡ ግብጽ፡ በወርኅ፡ ሣልስ፡
  - verse: 2
    geez: አመ፡ ፲፵፡ ወስዱስ፡ ለውእቱ፡ ወርኅ፡ ተናገሮ፡' እግዚአብሔር፡' ለሙሴ፡ እንዘ፡ ይብል፡ ዕረግ፡' ኀቤየ፡" ውስተ፡
      ደብር፡ ወእሁብከ፡" ክልኤተ፡" ጽላተ፡ እብን፡" ዘሕግ፡ ወዘትእዛዝ፡ ዘ"መጠነ፡ ጸሐፍኩ፡" ታስብዎሙ። ወዐርገ፡" ሙሴ፡
      ውስተ፡ ደብረ፡ እግዚአብሔር፡ ወኀደረ፡"
  - verse: 3
    geez: ስብሐተ፡ እግዚአብሔር፡" ውስተ፡ *ደብረ፡ ሲና፡" ወጸለሎ፡ ደመና፡ ስዱሰ፡ ዕለተ። ወጸውዖ፡"
  - verse: 4
    geez: ለሙሴ፡ በ*ዕለት፡" ሳብዕት፡ እማእከለ፡" ደመና፡ ወርእዩ፡ ስብሐተ፡ እግዚአብሔር፡ ከመ፡ እሳት፡ ዘያነድድ፡" ውስተ፡
      ርእሰ፡" ደብር። ወሀሎ፡ ሙሴ፡ ውስተ፡ ደብር፡ አርብዓ፡" ዕለተ፡ ወ*አርብዓ፡"
  - verse: 5
    geez: ሌሊተ፡ ወአመሮ፡ እግዚአብሔር፡ ዘ"ቀዳሚ፡ ወዘኒ፡ ይመጽእ፡ ነገረ፡" ኩፋሌ፡ ኵሉ፡" *መዋዕላት፡ ሕግ፡" ወለ"ስምዕ።
      ወይቤ፡' አነብር፡ ልበከ፡" ውስተ፡ ኵሉ፡ ነገር፡ ዘአነ፡ እነግረከ፡ በዝንቱ፡ ደብር፡ ወ'ጸሐፍ፡' ውስተ፡ መጽሐፍ፡ ከመ፡
      ይርአዩ፡ ትውልዶሙ፡ ከመ፡ ኢኀደግዎሙ፡' በእንተ፡ ኵሉ፡ እኩይ፡' ዘገብሩ፡ በእስተት፡' ሥርዐት፡' ዘ*አነ፡' እሠርዕ፡
      ማእከሌየ፡ ወማእከሌከ፡
  - verse: 6
    geez: ዮም፡' ለትውልዶሙ፡ በደብረ፡ ሲና። ወይከውን፡ ከመዝ፡ አመ፡ ይመጽእ፡ ኵሉ፡ ዝነገር፡ ላዕሌሆሙ፡ ወያአምሩ፡' ከመ፡
      ጻድቅ፡' እምኔሆሙ፡ በኵሉ፡ ፍትሖሙ፡ ወበኵሉ፡ ምግባሮሙ፡
  - verse: 7
    geez: ወያአምሩ፡ ከመ፡ ሀለው፡ ኮንኩ፡" ምስሌሆሙ። ወአንተኒ፡' ጸሐፍ፡ ለከ፡" ኵሎ፡ ዘቃለ፡" ዘአነ፡ አየድዐከ፡" ዮም፡
      እስመ፡" አአምር፡ ምረተሙ፡ ወ*ክሳዶሙ፡ ደቡበ፡" ዘእንበለ፡ አብአሙ፡ ውስተ፡ ምድር፡ እንተ፡ መሐልኩ፡ ለአበዊሆሙ፡" ለአብርሃም፡
      ወለይስሐቅ፡ ወለያዕቆብ፡ እንዘ፡ እብል፡ ለዘርእክሙ፡ እሁብ፡" ምድረ፡ እንተ፡ ትውሕዝ፡ ሐሊበ፡ ወመዓረ፡ ወይበልዑ፡ ወይጸግቡ።
  - verse: 8
    geez: ወይትመየጡ፡ ኀበ፡ *አምላክ፡ ነኪር፡ ኀበ፡" እለ፡ ኢያድኅንዎሙ፡ እምኵሉ፡ ምንዳቤሆሙ፡
  - verse: 9
    geez: ወ*ትስሚዕ፡" *ዛቲ፡ ስምዕ፡ ለስምዕ፡ ሎሙ"። እስመ፡ ይረስዑ፡ ኵሎ፡ ትእዛዝየ፡ ኵሎ፡" ዘአነ፡ እኤዝዞሙ፡" ወየሐውሩ፡
      ድኅረ፡ አሕዛብ፡ ወድኅረ፡ ርኵሶሙ፡ ወድኅረ፡ ኀሣሮሙ፡ ወይትቀነዩ፡ ለአማልክቲሆሙ፡ ወይከውንዎሙ፡ ማዕቅፈ፡" ወለ"ምንዳቤ፡
      ወለፃዕር፡ ወለመሥገርት።
  - verse: 10
    geez: ወይትሐጐሉ፡ ብዙኃን፡' ወይትአኀዙ፡ ወይወድቁ፡ ውስተ፡ እደ፡ ፀር፡" እስመ፡ ኀደጉ፡ ሥርዐትየ፡ ወ*ትእዛዝየ፡" ወበዓላት፡"
      ኪዳንየ፡ ወሰንበታትየ፡ ወቅድሳትየ፡ ዘቀደስኩ፡ ሊተ፡ በማእከሎሙ፡ ወደብተራየ፡ ወመቅደስየ፡ ዘቀደስኩ፡" ሊተ፡ በማእከለ፡
      ምድር፡ ከመ፡ አሢም፡ ስምየ፡ ላዕሌሁ፡
  - verse: 11
    geez: ወ*ይኅድር፡" ወይገብሩ፡" ሎሙ፡' *ፍሥሐታተ፡ ወአመ፡" ወግልፎ፡ ወ*ይሰግዱ፡" ዘዘ፡" ዚአሆሙ፡ ለስሒት፡ ወይዘብሑ፡
      ውሉዶሙ፡ ለአጋንንት፡ ወለኵሉ፡ ግብረ፡' ስሕተት፡ ልቦሙ።
  - verse: 12
    geez: ወእፈኑ፡ ኀቤሆሙ፡ ሰማዕተ፡ ከመ፡ አስምዕ፡" ሎሙ፡ ወኢ*ይሰምዑ፡" ወሰማዕተኒ፡ ይቀትሉ፡ ወለእለ*ሂ'፡ የኀሡሡ፡
      ሕገ፡" ይሰድድዎሙ፡ ወ*ኵሎ፡" ያፀርዑ፡ ወ*ይዌልእ፡" ለገቢረ፡ እኩይ፡
  - verse: 13
    geez: በቅድመ፡ አዕይንትየ። ወ*አኀብእ፡" ገጽየ፡ እምኔሆሙ፡ ወእሜጥዎሙ፡ ውስተ፡ እደ፡" አሕዛብ፡ ለፂዋዌ፡ ወለኀብለ፡
      ወለተበልዖ፡ ወ*አቤስሎሙ፡" እማእከለ፡" ምድር፡ ወእዘርዎሙ፡ ማእከለ፡
  - verse: 14
    geez: አሕዛብ። ወይረስዑ፡ ኵሎ፡' ሕግየ፡ *ወኵሎ፡ ትእዛዝየ፡ ወኵሎ፡ ፍትሕየ፡' ወይስሕቱ፡ ሠርቀ፡
  - verse: 15
    geez: ወሰንበተ፡ ወበዓለ፡ ወ*አዮቤለ፡" ወ*ሥርዐተ።" ወእምዝ፡ ይትመየጡ፡ ኀቤየ፡ እማእከለ፡ አሕዛብ፡ በኵሉ፡ ልቦሙ፡
      ወበኵሉ፡ ነፍሶሙ፡ ወበኵሉ፡ ኀይሎሙ፡ ወ*አስተጋብኦሙ፡¹ እማእከለ፡ ኵሉ፡² አሕዛብ፡ ወ*የኀሡኒ፡³ ከመ፡ እትረከቦሙ፡⁴
      ወ*ሶበ፡ ኀሠሡኒ፡ በኵሉ፡ ልቦሙ፡ ወበኵሉ፡ ነፍሶሙ፡ አነ፡⁵ እከሥት፡ ሎሙ፡ ብዙኀ፡ ሰላመ፡ በ*ጽድቅ። ወ*እፈልሶሙ፡⁶
      ተክለ፡ ርቱዐ፡
  - verse: 16
    geez: በኵሉ፡ ልብየ፡ ወበኵሉ፡ ነፍስየ፡ ወይከውኑ፡ ለበረከት፡ ወአኮ፡ ለመርገም፡ ወይከውኑ፡⁷ ርእሰ፡ ወአኮ፡ ዘነበ። ወእሐንጽ፡
      መቅደስየ፡ ማእከሎሙ፡ ወ*እኀድር፡¹⁰ ምስሌሆሙ፡ ወእከው
  - verse: 17
    geez: ኖሙ፡ አምላከ፡¹¹ ወእሙንቱኒ፡ ይከውኑኒ፡ ሕዝብየ፡¹² ዘበአማን፡ ወዘበጽድቅ። ወኢ*የኀድ
  - verse: 18
    geez: ጎሙ፡¹³ ወኢይትናከሮሙ፡ እስመ፡ አነ፡ እግዚአብሔር፡ አምላኮሙ። ወወድቀ፡ ሙሴ፡ በገጹ፡
  - verse: 19
    geez: ወጸለየ፡ ወይቤ፡ እግዚኦ፡ አምላኪየ፡¹⁴ ኢትኅድግ፡ ሕዝበከ፡ ወርስትከ፡ በሐዊር፡ በስሕተተ፡ ልቦሙ፡ ወኢትመጥዎሙ፡
      ውስተ፡ እዴ፡ ፀሮሙ፡¹⁵ አሕዛብ፡ ከመ፡ ኢይኰንንዎሙ፡ ወ*ከመ፡² ኢይገብርዎሙ፡¹⁶ ከመ፡ ይኅጥኡ፡¹⁷ ለከ። ይትለዐል፡¹⁸
      እግዚኦ፡¹⁹ ምሕረትከ፡ ላዕለ፡ ሕዝብከ፡
  - verse: 20
    geez: ወፍጥር፡ ሎሙ፡ መንፈሰ፡ ርቱዐ፡ ወኢ*ይኰንንዎሙ፡²⁰ መንፈሰ፡ ቤልሖር፡ ለአስተዋድዮቶሙ፡ ቅድሜከ፡ ወለአዕቅጾቶሙ፡
      እምኵሉ፡ ፍኖተ፡²¹ ጽድቅ፡ ከመ፡ ይትሐጐሉ፡²² እምቅድመ፡ ገጽከ። ወእሙንቱ፡ ሕዝብከ፡²³ ወርስትከ፡ ዘባላህከ፡ በኀይልከ፡
      ዐቢይ፡ እምእዴ፡ ግብጽ፤ ፍጥር፡²⁴ ሎሙ፡
  - verse: 21
    geez: ልበ፡ ንጹሐ፡ ወመንፈሰ፡ ቅዱሰ፡ ወኢ*ይትዐቀጹ፡²⁵ በኀጢአቶሙ፡ እምይእዜ፡ ወእስከ፡ ለዓለም። ወይቤሎ፡ እግዚአብሔር፡
      ለሙሴ፡ አነ፡² አአምር፡²⁶ ተዋሥኦቶሙ፡ ወሕሊናሆሙ፡ ወይቡሰ፡
  - verse: 22
    geez: ክሳዶሙ፡ ወኢ*ይሰምዑ፡²⁷ እስከ፡ ሶበ፡ ያአምሩ፡²⁸ ኀጢአቶሙ፡ ወ*ኀጣውአ፡²⁹ አበዊሆሙ። ወእምድኅረ፡ ዝንቱ፡ ይትመየጡ፡
      ኀቤየ፡ በኵሉ፡ ርቱዕ፡ *ወበኵሉ፡ ልብ፡³⁰ ወበኵሉ፡ ነፍስ፡
  - verse: 23
    geez: ወ*እወቂ፡³¹ ቍልፈተ፡ ልቦሙ፡ ወቍልፈተ፡ ልበ፡ ዘርኦሙ፡ ወእፈጥር፡ ሎሙ፡ መንፈሰ፡ ቅዱሰ፡ ወ*እነጽሖሙ፡³² ከመ፡
      ኢይትመየጡ፡ እምድኅሬየ፡ እምይእቲ፡ ዕለት፡ እስከ፡ ለዓለም። ወትትሉ፡
  - verse: 24
