translation:
  text: 'Throughout all this[14], Jacob did not know that they were coming against him to kill him. And he was mourning for Leah his wife until they came near to the tower with four thousand men, warriors and chosen fighters. And they sent to him honorable men, saying, "Behold, your brother has come against you to fight you, with four hundred men girded with the sword, and they carry shields and weapons of war." For they loved Jacob more than Esau, and they told him that Jacob was a gracious and merciful man, more than Esau. Then Jacob was alarmed when they came near to the tower, and he shut the gates of the tower and stood on the battlements and spoke with his brother Esau and said, "The comfort for which you have come is a fine comfort, to comfort me concerning my wife who has died. Is this the oath that you swore to your father and your mother? Again, before they have died, you have broken the oath, and at the moment you swore to your father you were condemned." And at that time Esau answered and said to him, "There is no righteous oath for the sons of men, nor for the beasts of the earth; for whatever they swear, they scheme one against another with evil[14], so that each may kill his enemy and foe. And you hate me and my children forever, and there is no observing brotherhood with you. Hear this word that I declare to you: if the boar can change its skin and its bristles become soft like wool, or if horns grow on its head like the horns of a stag or a sheep, then I will keep brotherhood with you. And if the breasts separated from their mother should return and suckle again, then I will be reconciled to you as a brother. And if wolves make peace with lambs so as not to devour or oppress them, and if their hearts are good toward them, then there will be peace in my heart toward you. And if the lion becomes the friend of the ox and is bound together with it under one yoke and plows with it and makes peace with it, then I will make peace with you. And when the raven becomes white like the raza-bird, then I will know that I have loved you and will make peace with you. Be destroyed, and may your sons be destroyed, and let there be no peace for you." And when Jacob saw that he was evil in his heart toward him, and with all his soul intended to kill him, and that he came raging like a wild boar rushing upon the spear that pierces and kills it and does not turn back from it, then he said to his own and to his servants that they should attack him and all his companions.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '14'
    text: The comparison 'white like the raza-bird' reflects an uncertain bird name in the Ge'ez; some interpreters identify a notably white bird species, but the exact zoological reference is unclear.
    reason: lexical_alternative
  - marker: '14'
    text: The Ge'ez text reads 'four thousand' (፵፻) for the initial approach, but the messengers report 'four hundred' (፬፻). This discrepancy is preserved from the source manuscript.
    reason: textual_variant
  - marker: a
    text: Or 'until they came near to the tower with four hundred men'.
    reason: previous_rendering
  - marker: b
    text: Or 'You have broken the oath,'.
    reason: previous_rendering
