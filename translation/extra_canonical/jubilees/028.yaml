translation:
  text: '[''1. And he lifted up his feet and went to the land of the east, to Laban,
    the brother of Rebekah, and he was with him.'', ''2. And he served him for Rachel
    seven years.'', ''3. And in the first year of the third week he said to him, “Give
    me my wife, for whom I have served you'', ''4. these seven years.” And Laban said
    to Jacob, “I will give you your wife.” And Laban made a feast and took'', ''5.
    Leah his elder daughter and gave her to Jacob as a wife, and he gave her Zilpah
    his maidservant as a handmaid.'', ''6. But Jacob did not know, for he thought
    that she was Rachel. And he went in to her, and behold,'', ''7. she was Leah.
    And Jacob was angry with Laban and said to him, “Why have you done this to me?
    Was I not'', ''8. serving you for Rachel and not for Leah? Why have you wronged
    me? Take your daughter,'', ''9. and I will go, for you have done evil against
    me.” For Jacob loved Rachel more than Leah,'', ''10. because Leah’s eyes were
    weak, but Rachel was beautiful in appearance and very lovely,'', ''11. and her
    eyes were beautiful and her form very lovely. And Laban said to Jacob, “It is
    not done thus'', ''12. in our land, to give the younger before the elder, and
    it is not right to do this, for'', ''13. thus it is ordained and written on the
    heavenly tablets that no one should give the younger daughter'', ''14. before
    the elder; first let him give the elder, and after her the younger. And the man
    who does thus,'', ''15. his sin ascends on his account into heaven, and there
    is no one righteous who does this matter, for'', ''16. this deed is evil before
    the LORD. And you also command the children of Israel that they not'', ''17. do
    this thing: let them not take or give the younger before they first give the elder,'',
    ''18. for it is very evil.” And Laban said to Jacob, “Let the seven days of this
    one’s marriage-feast pass,'', ''19. and I will give you Rachel also, if you will
    serve me another seven years, while you pasture my sheep,'', ''20. as you did
    in the first week.” And when the seven days of Leah’s marriage-feast had passed,'',
    ''21. Laban gave Rachel to Jacob, that he might serve him another seven years.
    And he gave'', ''22. Rachel Bilhah, the sister of Zilpah, as a maidservant. And
    he served another seven years for'', ''23. Rachel, for Leah had been given to
    him in exchange. And the LORD opened Leah’s womb, and she conceived'', ''24. and
    bore a son to Jacob, and he called his name Reuben, on the fourteenth day of the
    ninth month,'', ''25. in the first year of the third week. But Rachel’s womb was
    closed, because'', ''26. the LORD saw that Leah was hated, while Rachel was loved.
    And Jacob again went in to'', ''27. Leah, and she conceived and bore Jacob a second
    son, and he called his name Simeon, on the twenty-first'', ''28. day of the tenth
    month, in the third year of this week. And Jacob again went in to'', ''29. Leah,
    and she conceived and bore him a third son, and he called his name Levi, at dawn,
    on the first day of the first month,'', ''30. in the sixth year of this week.
    And Jacob again went in to her, and she conceived'', ''31. and bore him a fourth
    son, and he called his name Judah, on the fifteenth day of the third month,'',
    ''32. in the first year of the fourth week. And through all this Rachel was jealous
    of Leah, because she'', ''33. did not bear children, and she said to Jacob, “Give
    me children.” And Jacob said, “Have I withheld from you'', ''34. the fruit of
    your womb? Have I forsaken you?” And when Rachel saw that Leah had borne four
    children'', ''35. to Jacob—Reuben, Simeon, Levi, and Judah—she said to Bilhah,
    “Here is Bilhah,'', ''36. my maidservant; go in to her, and she will conceive
    and bear me a son.” And she gave Bilhah her maidservant to be his wife.'', ''37.
    And he went in to her, and she conceived and bore him a son, and she called his
    name Dan, on the ninth day of the sixth month,'', ''38. in the sixth year of the
    third week. And Jacob again went in a second time to Bilhah, and she conceived'',
    ''39. and bore Jacob a second son, and Rachel called his name Naphtali, on the
    fifth day'', ''40. of the seventh month, in the second year of the fourth week.
    And when Leah saw that she had ceased and was not bearing,'', ''41. she took and
    gave her Zilpah also, her maidservant, to Jacob as a wife, and she conceived and
    bore'', ''42. a son, and Leah called his name Gad, on the twelfth day of the eighth
    month, in the third year'', ''43. of the fourth week. And he again went in to
    her, and she conceived and bore him a second son, and she called'', ''44. his
    name Asher, on the second day of the eleventh month, in the fifth year of the
    fourth week.'', ''45. And Jacob went in to Leah, and she conceived and bore a
    son, and she called his name Issachar, on the fourth day'', ''46. of the fifth
    month, in the fourth year of the fourth week. And she gave him to a nurse. And
    Jacob went in again'', ''47. to her, and she conceived and bore a second son and
    a daughter, and she called the son’s name Zebulun,'', ''48. and the daughter’s
    name Dinah, in the seventh month, in the seventh year of the sixth week of the
    fourth jubilee. And the LORD had mercy'', ''49. on Rachel and opened her womb,
    and she conceived and bore a son, and she called his name'', ''50. Joseph, at
    dawn, on the fourth day of the fourth month, in the sixth year, in this fourth
    week. And in the days when'', ''51. Joseph was born, Jacob said to Laban, “Give
    me my wives and my children, and I will go to my father Isaac, and I will make'',
    ''52. a house for myself, for I have completed the years for which I served you
    for your two daughters, and I will go'', ''53. to my father’s house.” And Laban
    said to Jacob, “Stay with me for your wages, and pasture my flock for me again,'',
    ''54. and take your wages.” And they agreed between themselves that he would give
    him as wages every sheep'', ''55. that was dark and spotted, and every one that
    had white upon it, that was born among the lambs, should be his wages. And they
    would bear'', ''56. all the sheep that were speckled and those that had marks
    of spots and those that had dark spots, and the sheep would again'', ''57. bear
    according to their kinds; and every one with marks belonged to Jacob, and every
    one without marks to Laban.'', ''58. And Jacob’s possessions increased greatly,
    and he acquired cattle and sheep and camels'', ''59. and donkeys and servants
    and maidservants. And Laban and his sons envied Jacob, and Laban gathered his
    sheep away'', ''60. from him and acted deceitfully toward him.'', ''61. And it
    came to pass after Rachel had borne Joseph, that Laban went to shear his sheep,
    for he was far'', ''62. from him, a journey of three days. And Jacob saw that
    Laban had gone to shear'', ''63. his sheep, and Jacob called Leah and Rachel and
    spoke to their hearts, that they should come'', ''64. with him to the land of
    Canaan, for he told them everything that he had seen in a dream and everything
    that had been spoken to him.'']'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Verses 3-4 are segmented across the sentence: Jacob''s request begins in
      v. 3 and the phrase ''these seven years'' completes it in v. 4.'
    reason: segmentation_note
  - marker: b
    text: 'The phrase ''heavenly tablets'' is a hallmark of Jubilees'' theology: earthly
      law is grounded in prewritten heavenly decree.'
    reason: cross_reference
  - marker: c
    text: In v. 18, 'the seven days of this one's marriage-feast' refers to Leah's
      bridal week.
    reason: cultural_note
  - marker: d
    text: The wording in vv. 33-34 is textually difficult. Jacob's reply is rendered
      as a rhetorical denial that he is responsible for Rachel's barrenness; an alternative
      sense is, 'Am I withholding from you the fruit of the womb? He has not forsaken
      you.'
    reason: alternative_reading
  - marker: e
    text: The livestock-color terms in vv. 55-57 are difficult and overlapping. The
      translation uses broad terms such as 'dark,' 'spotted,' and 'marks' to preserve
      the wage arrangement without claiming more precision than the text securely
      gives.
    reason: lexical_alternative
lexical_decisions:
- source_word: ምድረ፡ ጽባሕ
  chosen: the land of the east
  alternatives:
  - the eastern land
  - the land of the morning
  rationale: Keeps the directional-geographical sense familiar from Jacob traditions
    without over-literalizing 'morning' where the idiom means east.
- source_word: ተቀንየ
  chosen: served
  alternatives:
  - worked
  - labored
  rationale: In this marriage-contract context the verb denotes service rendered to
    obtain a wife; 'served' preserves both labor and subordinate obligation.
- source_word: ሱባዔ
  chosen: week
  alternatives:
  - heptad
  - week of years
  rationale: Jubilees uses sabbatical chronology. In the running text 'week' is retained
    because the chapter's dates are internal to Jubilees' chronological system; the
    broader calendrical force is noted theologically.
- source_word: ሥሩዕ ወጽሑፍ ውስተ ጽላተ ሰማይ
  chosen: ordained and written on the heavenly tablets
  alternatives:
  - appointed and inscribed in the tablets of heaven
  rationale: This is a key Jubilees formula. 'Heavenly tablets' preserves the book's
    revelatory-legal framework.
- source_word: ያዐርግ
  chosen: ascends
  alternatives:
  - is brought up
  - goes up
  rationale: Adjusted from 'is brought up' to 'ascends' to better reflect the active
    voice of the Ge'ez verb in verse 15.
- source_word: ውስተ ልቦን
  chosen: to their hearts
  alternatives:
  - in their hearts
  - privately
  rationale: Adjusted in verse 63 to 'spoke to their hearts', a common Semitic idiom
    for speaking persuasively or kindly, improving upon the overly literal 'in their
    hearts'.
theological_decisions:
- issue: How to render Jubilees' legal appeal to the heavenly tablets in vv. 13-17
  chosen_reading: Retain the statement as a revealed heavenly ordinance, not merely
    local custom.
  alternative_readings:
  - Treat it as only Laban's cultural justification
  - Reduce it to a narrative aside about marriage order
  rationale: The text explicitly moves from local practice to what is 'ordained and
    written on the heavenly tablets' and then turns to direct instruction for Israel.
    This is central to Jubilees' theology of primordial law.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy.
- issue: Chronological terminology for ሱባዔ
  chosen_reading: Translate as 'week' in the verse text while preserving the structured
    Jubilees chronology.
  alternative_readings:
  - Translate every instance as 'week of years'
  - Use 'sabbath of years' throughout
  rationale: The chapter repeatedly dates births within Jubilees' larger jubilee schema.
    'Week' keeps the text readable, while the chronology remains visible and can be
    footnoted rather than overloaded in every verse.
  doctrine_reference: Optimal equivalence; preserve calendrical terminology carefully.
