  rows:
  - verse: 1
    geez: ወአንሥአ፡ እገሪሁ፡ ወሖረ፡ *ምድረ፡ ጽባሕ፡¹ ኀበ፡ ላባ፡ *እኁሃ፡ ለርብቃ፡² ወሀሎ፡ ምስሌሁ፡
  - verse: 2
    geez: ወተቀንየ፡ ሎቱ፡ ህየንተ፡ ራሔል፡ ወለቱ፡ ሱባዔ፡ አሐደ።³
  - verse: 3
    geez: ወበዓመት፡ ቀዳማይ፡ ዘ'ሣልስ፡ ሱባዔ፡ ይቤሎ፡ ሀበኒ፡ ብእሲትየ፡ ዘበእንቲአሃ፡ ተቀነይኩ፡ ለከ፡
  - verse: 4
    geez: ሱባዓተ፡⁴ ዓመተ፡ ወይቤሎ፡ ላባ፡ ለያዕቆብ፡ አነ፡ እሁበከ፡ ብእሲተከ። ወገብረ፡ ላባ፡ ግብአ፡ ወነሥአ፡
  - verse: 5
    geez: ልያን፡ ወለቶ፡ እንተ፡ ትልህቅ፡ ወወሀቦ፡ ለያዕቆብ፡ ብእሲተ፡ *ወወሀባ፡ ዘለፋሃ፡⁵ አመተ፡ ለእኪት፡⁷
  - verse: 6
    geez: '*ወያዕቆብሰ፡ ኢያእመረ፡⁸ እስመ፡ አምሳለ፡ *ያዕቆብ፡ ዘ''ራሔል፡ ይእቲ። ወቦአ፡ ኀቤሃ፡ ወናሁ፡'
  - verse: 7
    geez: ይእቲሰ፡ ልያ፡ ወተምዐ፡¹⁰ ያዕቆብ፡ ላዕለ፡ ላባ፡ ወይቤሎ፡ ለምንት፡ *ገበርከኒ፡ ከመዝ፡¹¹ አኩ፡¹²
  - verse: 8
    geez: በእንተ፡ ራሔል፡ ተቀነይኩ፡ ለከ፡ ወአኮ፡ በእንተ፡ ልያ፤ ለምንት፡¹³ 7ፋዕከኒ፤ ንግአ፡ ወሰተከ፡
  - verse: 9
    geez: ወአሐውር፡ እስመ፡ እኩየ፡ ገበርከ፡ ላዕሌየ። እስመ፡ ያፈቅር፡ ያዕቆብ፡ ራሔልሃ፡ እምነ፡ ልያ፡
  - verse: 10
    geez: እስመ፡ አዕይንቲሃ፡ ለልያ፡ ድኩም፡ ወባሕቱ፡ *ላሕይ፡ ራእያ፡¹⁴ ጥቀ፡ ወራሔል፡¹⁵ ሠናይ፡
  - verse: 11
    geez: አዕይንቲሃ፡ ወሠናይ፡ ራእያ፡ ወላሕይት፡ ጥቀ።¹⁶ ወይቤሎ፡ ላባ፡ ለያዕቆብ፡ ኢኮነ፡ ከመዝ፡
  - verse: 12
    geez: በምድርነ፡ ውሂበ፡ እንተ፡ ትንእስ፡ እምእንተ፡ ትልህቅ።¹⁷ ወአኮ፡¹⁸ ርቱዐ፡ ለገቢረ፡ ዝንቱ፡ እስመ፡
  - verse: 13
    geez: ከመዝ፡ ሥሩዕ፡ ወጽሑፍ፡ ውስተ፡ ጽላተ፡ ሰማይ፡ ከመ፡ አልቦ፡ ዘየሀብ፡ ወለተ፡ እንተ፡ ትንእስ፡
  - verse: 14
    geez: እምእንተ፡ ትልህቅ፡¹ ያቀድም፡ ውሂበ፡ ወእምድኅሬሃ፡ እንተ፡ ትንእስ፡ ወበእሲ፡ ዘይገብር፡ ከመዝ፡
  - verse: 15
    geez: አበሳ፡ ያዐርግ፡ በእንቲአሁ፡ ውስተ፡² ሰማይ፡ ወአልቦ፡ ዘይጸድቅ፡ ዘ³ይገብር፡ ዘንተ፡ ነገረ፡ እስመ፡
  - verse: 16
    geez: እኩይ፡ ዝንቱ፡ ግብር፡ በ⁴ቅድመ፡ እግዚአብሔር። ወአንተኒ፡ አዝዝ፡ ለደቂቀ፡ እስራኤል፡ ወአይ
  - verse: 17
    geez: ግበሩ፡ ዘንተ፡ ቃለ፡⁵ አይንሥኡ፡ ወአየሀቡ፡ እንተ፡ ትንእስ፡ ዘእንበለ፡ *ያቅድሙ፡ እንተ፡ ትልህቅ፡¹
  - verse: 18
    geez: እስመ፡ እኩይ፡⁶ ጥቀ። ወይቤ፡ ላባ፡ ለያዕቆብ፡ ይኅልፍ፡⁷ ሰቡዐ፡ መዋዕለ፡ ግዝአ፡⁸ ለዛ፡
  - verse: 19
    geez: ወ⁹እሁበከ፡¹⁰ ራሔልሃ፡ ከመ፡ ትትቀነይ፡ ሊተ፡ ካልአነ፡ ዓመተ፡ ሰብዐተ፡ ከመ፡ ትርዐይ፡¹¹ አባግዐየ፡
  - verse: 20
    geez: በከመ፡ ገበርከ፡ በሱባዔ፡ ቀዳማ፟። ወበመዋዕለ፡ አመ፡ ኀለፈ፡ ሰቡዕ፡ ዕለት፡¹² ዘግዝአ፡ ዘልያ፡
  - verse: 21
    geez: ወሀቦ፡¹³ ላባ፡ ራሔልሃ፡¹⁴ ለያዕቆብ፡ ከመ፡ ይትቀነይ፡ ሎቱ፡ ካልአተ፡ ዓመተ፡ ሰብዓተ፡ ወወሀባ፡
  - verse: 22
    geez: ራሔል፡¹⁵ ባላንሃ፡ አኅታ፡ ለዜልፋን፡¹⁶ ለአኪት።¹⁷ ወትቀንየ፡ ሰብዓተ፡ ዓመተ፡ ዳግመ፡ በእንተ፡
  - verse: 23
    geez: ራሔል፡ እስመ፡ ልያ፡ ትውህበት፡ በከ። ወአርኀወ፡ እግዚአብሔር፡ ማኅፀነ፡¹⁸ ልያ፡ ወፀንሰት፡
  - verse: 24
    geez: ወወለደት፡ ለያዕቆብ፡¹⁹ ወልደ፡ ወ*ጸውዐ፡²⁰ ስሞ፡ ሮቤል፡ *አመ፡ ዐሡሩ፡ ወረቡዑ፡²¹ ለወርኅ፡
  - verse: 25
    geez: ታስዕ፡ በቀዳሚ፡ ዓመት፡ ዘሱባዔ፡ ሣልስ። ወማሕጸናሰ፡ ለራሔል፡ ተጸፍቀ፡ እስመ፡ ርእየ፡
  - verse: 26
    geez: እግዚአብሔር፡ ከመ፡ ትጸላእ፡ ልያ፡²² ወራሔልሰ፡ ትትፈቀር። ወደገመ፡ ያዕቆብ፡ ወቦአ፡²³ ኀበ፡
  - verse: 27
    geez: ልያ፡²⁴ ወፀንሰት፡²⁵ ወወለደት፡ ለያዕቆብ፡ ወልደ፡ ካልአ፡ ወጸውዐ፡ ስሞ፡ ስምዖን፡ አመ፡²⁶ ፲ሥራ፡
  - verse: 28
    geez: ወአሐዱ፡²⁷ ዘወርኅ፡ ዓሥር፡ ወበሣልስ፡ ዓመት፡ ለዝ፡ ሱባዔ። ወደገመ፡ ያዕቆብ፡ ወቦአ፡²⁸ ኀበ፡
  - verse: 29
    geez: ልያ፡²⁹ ወፀንሰት፡ ወወለደት፡ ሎቱ፡ ወልደ፡ ሣልሰ፡ ወጸውዐ፡³⁰ ስሞ፡ ሌዊ፡ በሠርቅ፡ ወርኅ፡
  - verse: 30
    geez: ቀዳማዊ፡³¹ በሳድስ፡ ዓመት፡ ዘዝ፡ ሱባዔ። ወደገመ፡ ያዕቆብ፡³² ወ*ቦአ፡ ኀቤሃ፡ ወፀንሰት፡³³
  - verse: 31
    geez: ወወለደት፡ ሎቱ፡³⁴ ወልደ፡ ራብዐ፡ ወጸውዐ፡³⁵ ስሞ፡ ይሁዳ፡ በዐሡሩ፡ ወኀሙሱ፡ ለወርኅ፡ ሣልስ፡
  - verse: 32
    geez: በቀዳሚ፡ ዓመት፡ ዘ³⁶ሱባዔ፡ ራብዕ። ወበዝ፡ ኵሉ፡ ራሔል፡ ትቀንዕ፡ በ*ልያ፡³⁷ እስመ፡ *ይእቲ፡
  - verse: 33
    geez: ኢትወልድ፡³⁸ ወትቤሎ፡ ለያዕቆብ፡ ሀበኒ፡ ውሉደ፡³⁹ ወይቤ፡⁴⁰ ያዕቆብ፡ አነሁ፡ *ከላእኩ፡ እምኔኪ፡⁴¹
  - verse: 34
    geez: ፍሬ፡ ከርሥኪ፡ አነሁ፡ ኀደገኪ። ወሶበ፡ ርእየት፡ ራሔል፡⁴² ከመ፡ ወለደት፡ ልያ፡⁴ *ደቀ፡ አርባዕተ፡⁴³
  - verse: 35
    geez: ለያዕቆብ፡ ሮቤል*ሃ፡⁴⁴ ወስምዖን*ሃ፡⁴⁵ ወሌዊሃ፡ ወይሁዳ*ሃ፡⁴⁶ ወትቤሎ፡⁴⁷ ባላ፡ ኀበ፡ *ባላ፡
  - verse: 36
    geez: አመትየ፡⁴⁸ ወትፀንስ፡⁴⁹ ወትወልድ፡⁵⁰ ሊተ፡ ወልደ፡ (*ወወሀበት፡ ባላሃ፡ አመታ፡ ትኩኖ፡ ብእሲተ፡⁵¹)
  - verse: 37
    geez: '*ወቦአ፡ ኀቤሃ፡⁵² ወፀንሰት፡ ወወለደት፡ ሎቱ፡ ወልደ፡ ወጸውዐ፡⁵³ ስሞ፡ ዳን፡ አመ፡ ተሱዑ፡ ለወርኅ፡'
  - verse: 38
    geez: ሳድስ፡ በ*ሳድስ፡ ዓመት፡ ዘሱባዔ፡ ሣልስ። ወደገመ፡ ያዕቆብ፡ ካዕበ፡ ወቦአ፡ ኀበ፡ ባላ፡ ወፀንሰት፡
  - verse: 39
    geez: ወወለደት፡ ወልደ፡ *ዳግመ፡ ለያዕቆብ፡⁴ ወጸውዐት፡ *ራሔል፡ ስሞ፡⁵⁴ ንፍታሌም፡ በኀሙሱ፡
  - verse: 40
    geez: ለወርኅ፡ ሳብዕ፡ በካልእ፡ ዓም፡ ዘሱባዔ፡ ራብዕ። ወሶበ፡ ርእየት፡ ልያ፡ ከመ፡ አቀመት፡⁵⁵ ወኢትወልድ፡
  - verse: 41
    geez: ነሥአት፡⁵⁶ ወወሀበት፡⁵⁷ ይእቲኒ፡ ዜልፋሃ፡⁵⁸ ለአኪታ፡⁵⁹ ለያዕቆብ፡ ብእሲተ፡ ወፀንሰት፡ ወወለደት፡
  - verse: 42
    geez: ወልደ፡ ወጸውዐት፡ ስሞ፡ ልያ፡²² ጋድ፡ አመ፡ ዐሡሩ፡ ወስኑዩ፡ ለወርኅ፡ ሳምን፡ በሣልስ፡ ዓመት፡
  - verse: 43
    geez: ዘሱባዔ፡ ራብዕ። ወደገመ፡ ቦአ፡⁶⁰ ኀቤሃ፡ ወፀንሰት፡ ወወለደት፡ ሎቱ፡ ወልደ፡ ካልአ፡ ወጸውዐት፡
  - verse: 44
    geez: ስም፡ ሊያ፡ አሴር፡ በስኑዩ፡ ለወርኅ፡ ዘ'ዐሠርቱ፡ ወአሐዱ፡ በዓመቱ፡ ኃምስ፡ ዘሱባዔ፡ ራብዕ።
  - verse: 45
    geez: ወቦአ፡ ያዕቆብ፡² ኀበ፡ ሊያ፡³ ወፀንሰት፡ ወወለደት፡⁴ ወልደ፡ ወጸውዐት፡ ስሞ፡ ይሳኮር፡ ⁵በራብዑ፡
  - verse: 46
