  from: and he provided for them and all that was theirs
  to: and all their livestock
  rationale: The Ge'ez word `ጥሪቶሙ` (ṭəritomu) in this context refers specifically to their livestock or cattle, which also needed feeding during the famine. 'All that was theirs' is overly abstract. Furthermore, the draft adds 'and he provided for them', which is not in the source text; the single verb `ሴሰዮሙ` (sustained/nourished) governs his father, his brothers, and their livestock.
