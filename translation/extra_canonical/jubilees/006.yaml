lexical_decisions:
- source_word: ሠርቁ / ሠርቀ፡ ወርኅ
  chosen: new moon
  alternatives:
  - beginning of the month
  - first day of the month
  rationale: In this chapter the phrase marks calendrical turning points in the year,
    especially in vv. 23-28. 'New moon' preserves the lunar-month terminology without
    flattening it to a generic 'month-beginning.'
- source_word: ምሥዋዕ / ምሥዋዐ
  chosen: altar
  alternatives:
  - sacrifice-place
  rationale: Standard cultic rendering; keeps the concrete sacrificial setting clear.
- source_word: አስተስረየ / ያስተሰርዩ
  chosen: make atonement / seek atonement
  alternatives:
  - purify
  - reconcile
  rationale: The context is sacrificial blood-rite for guilt and ongoing cultic expiation.
    'Atonement' best preserves the theological force.
- source_word: መሐስአ ጠሊ
  chosen: young goat
  alternatives:
  - kid of the goats
  - he-goat
  rationale: The phrase denotes a goat used in expiatory sacrifice; 'young goat' is
    natural English while preserving specificity.
- source_word: ሥብሐ
  chosen: fat
  alternatives:
  - choice fat portions
  rationale: Cultic fat portions are in view; concise rendering fits the sacrificial
    list.
- source_word: ጽንሓሐ
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  rationale: The offering is one that ascends on the altar; 'burnt offering' is the
    established and accurate cultic equivalent.
- source_word: መዐዛ ሠናየ
  chosen: pleasing fragrance
  alternatives:
  - sweet savor
  - pleasant aroma
  rationale: Preserves sacrificial idiom while using readable modern English.
- source_word: አይኅ
  chosen: floodwaters
  alternatives:
  - deluge
  - flood
  rationale: The term refers specifically to the destructive waters of the Flood;
    'floodwaters' keeps the concrete imagery.
- source_word: ለሀቁ
  chosen: increase
  alternatives:
  - be fruitful
  rationale: The Ge'ez here conveys growth/proliferation. 'Increase' works naturally
    alongside 'multiply' and avoids over-harmonizing to Genesis wording.
- source_word: ዘይሰርር / ዘይትሐወስ
  chosen: everything that moves / everything that lives
  alternatives:
  - creeping thing
  - everything that swarms
  rationale: The paired expressions cover moving living creatures broadly. The chosen
    rendering is readable while retaining breadth.
- source_word: ነፍሰ ኵሉ ዘሥጋ ውስተ ደም ውእቱ
  chosen: the life of all flesh is in the blood
  alternatives:
  - the soul of all flesh is its blood
  rationale: In dietary and sacrificial context, 'life' communicates the force of
    the expression more clearly in English, while preserving the blood-life theology.
- source_word: ይስሮ
  chosen: be rooted out
  alternatives:
  - be cut off
  - be destroyed
  rationale: The verb suggests removal from the land/community. 'Rooted out' preserves
    the earth/land imagery present in the verse.
- source_word: ትእምርት
  chosen: sign
  alternatives:
  - token
  - mark
  rationale: Covenantal sign language is central here; 'sign' is the clearest and
    most consistent rendering.
- source_word: ቀስት
  chosen: bow
  alternatives:
  - rainbow
  rationale: The text literally says 'bow.' Because the cloud context makes the referent
    clear, 'bow' preserves the covenant-symbol imagery without interpretive expansion.
- source_word: ጽላተ ሰማይ
  chosen: heavenly tablets
  alternatives:
  - tablets of heaven
  rationale: This is a key Jubilees term for heavenly written decrees. 'Heavenly tablets'
    is idiomatic and preserves the book's revelatory framework.
- source_word: ሱባዔ / ሱባዔያት
  chosen: week of years / feast of weeks
  alternatives:
  - heptad
  - weeks
  rationale: 'Context determines sense: chronological units in v. 18 and festival
    title in vv. 17, 21. This preserves Jubilees''s calendrical precision.'
- source_word: ኢዮቤል
  chosen: jubilee
  alternatives:
  - Jubile
  rationale: Standard English rendering for the chronological unit; essential to preserve
    Jubilees's own temporal system.
- source_word: ቀዳሜ ፍሬ
  chosen: firstfruits
  alternatives:
  - first fruits
  rationale: Established agricultural-festival term; preserves the harvest theology
    of the feast.
- source_word: መክፈላት ዓመት
  chosen: divisions of the year
  alternatives:
  - quarters of the year
  rationale: The phrase refers to the four annual divisions marked by memorial days.
    'Divisions' is slightly more literal while still clear.
- source_word: ፶ምሳ ወክልኤ ሰንበታት
  chosen: fifty-two weeks of days
  alternatives:
  - fifty-two sabbaths
  - fifty-two weeks
  rationale: In context this totals the 364-day year. 'Weeks of days' makes explicit
    that sabbatical week-units, not annual sabbaths, are intended.
- source_word: ሠለስተ ምእተ ወስሳ ወረቡዐ መዋዕለ
  chosen: three hundred and sixty-four days
  alternatives:
  - 364 days
  rationale: This number is the chapter's central calendrical claim and must be rendered
    plainly and exactly.
- source_word: ያስተሐይጹ ወርኀ በሑያጼ
  chosen: make observations of the moon
  alternatives:
  - reckon by the moon
  - watch the moon
  rationale: The phrase criticizes lunar observation as a basis for calendar reckoning.
    The chosen wording preserves the polemical force without overinterpreting technical
    method.
theological_decisions:
- issue: Divine name እግዚአብሔር
  chosen_reading: the LORD
  alternative_readings:
  - God
  - Lord
  rationale: Follows project doctrine for covenantal divine-name language and matches
    the solemn covenant context.
- issue: Anthropological term in v. 7-8 (ነፍስ / life-blood relation)
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: In blood-prohibition context the emphasis is on animating life rather
    than later English connotations of 'soul.' This preserves the theological logic
    of the prohibition.
- issue: אָדָם-equivalent in v. 8
  chosen_reading: Adam
  alternative_readings:
  - man
  - humankind
  rationale: The Ge'ez names Adam explicitly rather than speaking generically. Retaining
    'Adam' preserves the creation-figure reference while the preceding clause already
    speaks of 'a man.'
- issue: Festival identification in vv. 17, 21
  chosen_reading: feast of weeks ... feast of firstfruits
  alternative_readings:
  - Festival of Weeks only
  - Pentecost
  rationale: Jubilees explicitly identifies the festival with covenant renewal and
    firstfruits. 'Pentecost' would import later Greek-Christian terminology absent
    from the text.
- issue: Calendar polemic in vv. 31-38
  chosen_reading: 364-day schematic year is presented positively and lunar reckoning
    negatively
  alternative_readings:
  - treat as merely descriptive
  - soften anti-lunar polemic
  rationale: The chapter's theology of sacred time depends on preserving the contrast
    between the heavenly-tablet calendar and moon-based distortion.
