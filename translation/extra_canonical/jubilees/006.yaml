translation:
  text: '1. And on the new moon of the third month he came out of the ark, and he
    built an altar on that mountain. And he made atonement for the earth, and he took
    a young goat and made atonement with its blood for all the guilt of the earth,
    because everything that had been on it had been destroyed, except those that were
    in the ark with Noah.

    2. And he placed the fat on the altar, and he took an ox and a ram and a sheep
    and kids and salt and a turtle-dove and a young pigeon, and he offered a burnt
    offering on the altar, and he set upon them an offering mixed with oil, and he
    poured out wine, and he put incense over everything, and he caused a pleasing
    fragrance to rise up, acceptable before the LORD.

    3. And the LORD smelled the pleasing fragrance, and he made a covenant with him
    that there should never again be floodwaters to destroy the earth

    4. all the days of the earth: seedtime and harvest shall not cease, cold and heat,
    summer and winter, and day and night shall not change their order, nor shall they
    cease forever.

    5. And as for you, increase and multiply on the earth, and become many upon it,
    and be a blessing upon it. The fear of you and the dread of you I will put upon
    everything that is on the earth and in the sea.

    6. And behold, I have given you all the beasts and everything that moves and everything
    that lives on the earth, and the fish in the waters, and everything for food;
    like the green plants I have given you everything to eat.

    7. But flesh with its life, with its blood, you shall not eat; for the life of
    all flesh is in the blood, lest your blood of your lives be sought. From the hand
    of every man, from the hand of every living thing, I will require the blood of
    man.

    8. Whoever sheds the blood of a man, by a man shall his blood be shed; for in
    the likeness of God he made Adam.

    9. And as for you, increase greatly upon the earth.

    10. And Noah and his sons swore that they would not eat any blood that is in any
    flesh, and he made a covenant before the LORD God forever throughout all the generations
    of the earth in this month.

    11. Therefore I have said that you shall make a covenant, you also, with the children
    of Israel in this month upon the mountain, with an oath; and you shall sprinkle
    blood upon them because of all the words of the covenant that the LORD made with
    them for all days.

    12. And this testimony is written concerning you so that you may keep it always:
    that you must not eat any blood of beasts or birds or cattle during all the days
    of the earth. And the man who eats the blood of beast or cattle or birds during
    all the days of the earth—he and his seed shall be rooted out from the earth.

    13. And you, command the children of Israel not to eat any blood, so that their
    name and their seed may be before the LORD our God always.

    14. And there is no limit of days for this law, for it is forever. They shall
    keep it throughout their generations, so that they may continue supplicating on
    your behalf with blood before the altar every day and at the time of morning and
    evening. They shall seek atonement for themselves continually before the LORD,
    so that they may keep it and not be uprooted.

    15. And he gave Noah and his sons a sign that there should never again be a flood
    upon the earth.

    16. He set his bow in the cloud for a sign of the everlasting covenant, that there
    should never again be floodwaters upon the earth to destroy it all the days of
    the earth.

    17. For this reason it is ordained and written on the heavenly tablets that they
    should celebrate the feast of weeks in this month, once each year, to renew the
    covenant every year.

    18. And this whole festival was celebrated in heaven from the day of creation
    until the days of Noah—twenty-six jubilees and five weeks of years. And Noah and
    his sons kept it for seven jubilees and one week of years, until the day of Noah''s
    death. And from the day of Noah''s death his sons corrupted it until the days
    of Abraham, and they ate blood.

    19. But Abraham alone kept it, and Isaac and Jacob and his children kept it until
    your days. And in your days the children of Israel forgot it until I renewed it
    for them on this mountain.

    20. And you also, command the children of Israel that they keep this festival
    throughout their generations,

    21. as a command for them: one day in the year, in this month, they shall celebrate
    the festival. For it is the feast of weeks, and it is the feast of firstfruits.
    This festival is twofold and of two kinds.

    22. As it is written and engraved concerning it, celebrate it. For I have written
    in the book of the first law what I wrote for you, that you should celebrate it
    at its appointed time, one day in the year. And I told you its sacrifices, that
    they should be a memorial, and the children of Israel should celebrate it throughout
    their generations in

    23. this month, one day every year. And on the new moon of the first month, and
    on the new moon of the fourth month, and on the new moon of the seventh month,
    and on the new moon of the tenth month are the days of remembrance, and they are
    the days of the seasons in the four divisions of the year. They are written and
    ordained

    24. as a testimony forever. And Noah ordained them for himself as festivals for
    the generations forever,

    25. so that they became for him a memorial. And on the new moon of the first month
    it was said to him that he should make the ark,

    26. and on it the earth became dry and he opened it and saw the earth. And on
    the new moon of the fourth month the mouths of the depths of the abyss beneath
    were closed. And on the new moon of the seventh month all the mouths of

    27. the depths of the earth were opened, and the waters began to descend into
    them. And on the new moon of the tenth month

    28. the tops of the mountains appeared, and Noah rejoiced. Therefore he ordained
    them for himself as festivals for remembrance forever, and thus they are ordained.

    29. And they were placed on the heavenly tablets, each one thirteen weeks from
    one to another: from the first to the second, and from the second to the third,
    and from the third to the fourth.

    30. And all the days of the command are fifty-two weeks of days, and all of them
    make a complete year. Thus it is engraved and ordained on the heavenly tablets,
    and there is no transgressing a single year, from year to year.

    31. And command the children of Israel that they keep the years according to this
    reckoning: three hundred and sixty-four days, and it will be a complete year.
    And they shall not disturb its time from its days or from its festivals, for everything
    will fall in them according to their testimony, and they will not pass over a
    day nor disturb a festival.

    32. But if they transgress and do not observe them according to his command, then
    all their seasons will be disturbed, and the years will be moved from this order,
    and their seasons will be disturbed and the years will be moved.

    33. And all the children of Israel will forget, and will not find the path of
    the years, and they will forget the new moons and seasons and sabbaths, and they
    will go wrong as to the whole order of the years.

    34. For I know, and from now on I will make you know—not from my own heart, for
    the book is written before me, and it is ordained on the heavenly tablets—the
    divisions of the days, lest they forget the festivals of the covenant and walk
    according to the festivals of the nations, after their error and after their ignorance.

    35. For there will be those who will surely make observations of the moon—how
    it disturbs the seasons

    36. and comes in from year to year ten days too soon.

    37. Therefore years will come upon them when they disturb the order, and they
    will make an abominable day a day of testimony, and an unclean day a festival
    day, and they will mix up all the holy days with the unclean, and the unclean
    day with the holy; for they will go wrong as to months and sabbaths and festivals
    and jubilees.

    38. Therefore I command you and testify to you, so that you may testify to them;
    for after your death your children will corrupt it, so that they will not make
    the year only three hundred and sixty-four days. Therefore they will go wrong
    as to the new moons and seasons and sabbaths and festivals, and they will eat
    all kinds of blood with all kinds of flesh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verse 10 is textually awkward in the extracted row, but the sense is that
      Noah and his sons bound themselves by oath not to eat blood, and a perpetual
      covenant was established in that month.
    reason: segmentation_note
  - marker: b
    text: Verse 11 likely alludes to the Sinai covenant ceremony on the mountain,
      with blood applied in connection with the covenant's words; compare Exodus 24.
    reason: cross_reference
  - marker: c
    text: Verse 14 is difficult. The line appears to connect Israel's blood-rites
      at the altar with ongoing intercession/atonement, so the translation keeps both
      sacrificial and supplicatory senses in view.
    reason: segmentation_note
  - marker: d
    text: In verse 18, the translation 'twenty-six jubilees' follows the chronological
      math of the book (1309 years), though the specific Ge'ez manuscript text here
      reads 'sixteen' (ዐሥራ፡ ወስድስተ). The verse then contrasts Noah's observance with
      later corruption after his death.
    reason: textual_variant
  - marker: e
    text: Verse 21's 'twofold and of two kinds' is terse and somewhat obscure; it
      likely means the festival combines the themes of Weeks and Firstfruits.
    reason: lexical_alternative
  - marker: f
    text: Verses 23-29 use 'new moon' for the first day of the month. The chapter
      still rejects using lunar observation to regulate the year in vv. 35-38; the
      issue is not the existence of months but dependence on a moon-based calendar.
    reason: cultural_note
  - marker: g
    text: 'Verse 27 may sound paradoxical: the subterranean openings are ''opened''
      as the waters descend into them. The translation preserves the wording rather
      than smoothing it away.'
    reason: segmentation_note
  - marker: h
    text: Verse 29 counts thirteen weeks between each memorial point, yielding four
      equal quarters in a 364-day year.
    reason: cross_reference
  - marker: i
    text: Verse 35's wording is difficult; the sense is that some will base reckoning
      on the moon, and this will throw the appointed times out of order.
    reason: segmentation_note
  - marker: j
