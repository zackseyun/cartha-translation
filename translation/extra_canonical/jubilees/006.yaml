  rows:
  - verse: 1
    geez: ወአመ፡ ሠርቁ፡ ለወርኅ፡ ሣልስ፡ ወፅአ፡ እምአ ታቦት፡ ወሐነጸ፡ ምሥዋዐ፡ ውስተ፡ ውእቱ፡ ደብር። ወአስተስረየ፡ ዲበ፡
      ምድር፡ ወነሥአ፡ መሐስአ፡ ጠሊ፡ ወአስተስረየ፡ በደሙ፡ በእንተ፡ ኵሉ፡ አበሳ፡ ምድር፡ እስመ፡ ተደምሰሰ፡ ኵሉ፡ ዘሀሎ፡
      ውስቴታ፡ ዘእንበለ፡ እለ፡ ሀለዉ፡ ውስተ፡ ታቦት፡ ምስለ፡ ኖኅ።
  - verse: 2
    geez: ወአዕረገ፡ ሥብሐ፡ ዲበ፡ ምሥዋዕ፡ ወነሥአ፡ ላህመ፡ ወበሐኰ፡ ወበገዐ፡ ወአጣሊ፡ ወጼወ፡ ወመንጢጠ፡ ወአጕለ፡ ርግብ፡
      ወአዕረገ፡ ጽንሓሐ፡ ውስተ፡ ምሥዋዕ፡ ወሤመ፡ ላዕሌሆን፡ መሥዋዕተ፡ አውሰ፡ በቅብዕ፡ ወነዝኀ፡ ወይነ፡ ወወደየ፡ ላዕለ፡
      ኵሉ፡ ዕጣነ፡ ወአዕረገ፡ መዐዛ፡ ሠናየ፡ ዘያሠምር፡ ቅድመ፡ እግዚአብሔር።
  - verse: 3
    geez: ወአጼነወ፡ እግዚአብሔር፡ መዐዛ፡ ሠናየ፡ ወተካየደ፡ ምስሌሁ፡ ኪዳነ፡ ከመ፡ ኢይኩን፡ ማየ፡ አይኅ፡ ዘያማስን፡ ምድረ፡
  - verse: 4
    geez: ኵሎ፡ መዋዕለ፡ ምድር፡ ዘርእ፡ ወማእረር፡ አይትኀደግ፡ ቍር፡ ወሙቀት፡ ወሐጋይ፡ ወክረምት፡ ወመዓልት፡ ወሌሊት፡ ኢይወልጡ፡
      ሥርዓቶሙ፡ ወኢይትኀደጉ፡ ለዓለም።
  - verse: 5
    geez: ወአንትሙኒ፡ ለሀቁ፡ ወተባዝኁ፡ ውስተ፡ ምድር፡ ወብዙኁ፡ ላዕሌሃ፡ ወኩኑ፡ ለበረከት፡ ላዕሌሃ፡ ፍርሀትክሙ፡ ወረዓድክሙ፡
      እሁብ፡ ዲበ፡ ኵሉ፡ ዘውስተ፡ ምድር፡ ወዘውስተ፡ ባሕር።
  - verse: 6
    geez: ወናሁ፡ ወሀብኩክሙ፡ ኵሎ፡ አራዊተ፡ ወኵሎ፡ ዘይሰርር፡ ወኵሎ፡ ዘይትሐወስ፡ ውስተ፡ ምድር፡ ወውስተ፡ ማያት፡ ዓሣተ፡
      ወኵሎ፡ ለሲሲት፡ ከመ፡ ሐምለ፡ ሣዕር፡ ወሀብኩክሙ፡ ኵሎ፡ ትብልዑ።
  - verse: 7
    geez: ወባሕቱ፡ ሥጋ፡ ዘምስለ፡ መንፈሱ፡ ምስለ፡ ደሙ፡ ኢትብልዑ፡ እስመ፡ ነፍሰ፡ ኵሉ፡ ዘሥጋ፡ ውስተ፡ ደም፡ ውእቱ፡ ከመ፡
      ኢይትኀሠሥ፡ ደምክሙ፡ ውስተ፡ ነፍሳቲክሙ፡ እምውስተ፡ እዴ፡ ኵሉ፡ ሰብእ፡ እምእዴ፡ ኵሉ፡ አኀሥሦ፡ ለደመ፡ ሰብእ።
  - verse: 8
    geez: ዘይከዑ፡ ደመ፡ ሰብእ፡ በሰብእ፡ ደሙ፡ ይትከዐው፡ እስመ፡ በምስለ፡ እግዚአብሔር፡ ገብሮ፡ ለአዳም።
  - verse: 9
    geez: ወአንትሙኒ፡ ለሀቁ፡ ወ*ብዙአ፡ ዲበ፡¹ ምድር።
  - verse: 10
    geez: ወመሐኩ፡ ኖኅ፡ ወ*ደቂቁ፡² ከመ፡ ኢይብልዑ፡ ኵሎ፡³ ደመ፡ ዘበ*ኵሉ፡ ሥጋ፡⁴ ወተካየደ፡ ኪዳነ፡ ቅድመ፡⁵ እግዚአብሔር፡
      አምላክ፡ ለ*ዓለም፡ በኵሉ፡ ትውልደ፡ ምድር፡ በዝንቱ፡ ወርኅ።
  - verse: 11
    geez: በእንተ፡ ዝንቱ፡ ተናገርኩ፡ ትትካየድ፡ ኪዳነ፡ አንተኒ፡⁶ ምስለ፡ ደቂቀ፡ እስራኤል፡ በዝ፡ ወርኅ፡ በዲበ፡ ደብር፡⁷
      ምስለ፡ ማሕላ፡¹⁰ ወ*ትእዛዝ፡¹¹ ላዕሌሆሙ፡ ደመ፡⁸ በእንተ፡ ኵሉ፡ ነገረ፡ ኪዳን፡ ዘ*ተካየደ፡¹² *እግዚአብሔር፡ ምስሌሆሙ፡¹³
      ለኵሉ፡ መዋዕል።
  - verse: 12
    geez: ወ*ጽሕፍት፡¹⁴ ዛቲ፡ ስምዕ፡ ላዕሌክሙ፡ ከመ፡ ትዕቀብዋ፡ ኵሎ፡ መዋዕለ፡ ከመ፡ ኢትብልዑ፡ በኵሉ፡ መዋዕል፡ ኵሎ፡
      ደመ፡ አራዊት፡ ወአዕዋፍ፡ ወእንስሳ፡¹⁵ በኵሉ፡¹⁶ መዋዕለ፡ ምድር፡ ወሰብእ፡ ዘ*በልዐ፡ ደመ፡ አርዌ፡¹⁷ ወዘእንስሳ፡
      ወዘአዕዋፍ፡ በኵሉ፡ መዋዕለ፡ ምድር፡ ይስሮ፡¹⁸ ውእቱ፡ ወዘርኡ፡ እምድር።
  - verse: 13
    geez: ወአንተ፡ አዝዞሙ፡ ለደቂቀ፡ እስራኤል፡ ኢይብልዑ፡ *ኵሎ፡ ደመ፡ ከመ፡¹⁹ የሀሉ፡ ስሞሙ፡ ወዘርኦሙ፡ ቅድመ፡ እግዚአብሔር፡
      አምላክነ፡ ኵሎ፡ መዋዕለ።
  - verse: 14
    geez: ወአልቦ፡ ለዝ፡ ሕግ፡ ዐቅመ፡ መዋዕል፡ እስመ፡ ለዓለም፡ ውእቱ፡ ይዕቀብዎ፡ ለትውልዶሙ፡²⁰ ከመ፡ ይኩኑ፡²¹ እንዘ፡
      ይትመሀለሉ፡ *በእንቲአክሙ፡ በደም፡²² በቅድመ፡ ምሥዋዕ፡ በኵሉ፡ ዕለት፡ ወ*ሰዓተ፡²³ ነግህ፡ ወ*ሰርከ፡²⁴ ያስተሰርዩ፡
      በእንቲአሁ፡²⁵ ወትረ፡²⁶ ቅድመ፡ እግዚአብሔር፡ ከመ፡ ይዕቀብዎ፡ ወኢ*ይሠረዉ።²⁷
  - verse: 15
    geez: ወወሀቦ፡ ለኖኅ፡ ወለ*ደቂቁ፡²⁸ ትእምርተ፡²⁹ ከመ፡ ኢ*ይኩን፡³⁰ ዳግመ፡ አይኅ፡³¹ ዲበ፡ ምድር።
  - verse: 16
    geez: ቀስተ፡ ወሀበ፡³² ውስተ፡ ደመና፡ ለትእምርተ፡ ኪዳን፡³³ ዘ*ለዓለም፡ ከመ፡ ኢይኩን፡ እንዘ፡ ማየ፡ አይኅ፡ ዲበ፡
      ምድር፡ ለአማስኖታ፡ ኵሎ፡ መዋዕለ፡³⁴ ምድር።
  - verse: 17
    geez: በእንተዝ፡ *ተሠርዐ፡ ወ*ተጽሕፈ፡ ውስተ፡ ጽላተ፡ ሰማይ፡ ከመ፡ ይኩኑ፡ ገበርተ፡ በዓል፡ ዘ*ሱባዔ፡³⁵ በዝ፡³⁶
      ወርኅ፡ ምዕረ፡ ለዓመት፡ ለሐዲስ፡ ኪዳን፡ በ*ኵሉ፡ ዓም፡ ወ*ዓመት።
  - verse: 18
    geez: ወ*ኮነት፡ ኵላ፡ *ዛቲ፡ በዓል፡³⁹ እንዘ፡ ትትገበር፡ በሰማይ፡ እምዕለተ፡ ፍጥረት፡ እስከ፡ መዋዕለ፡ ኖኅ፡ *ዐሥራ፡
      ወስድስተ፡ ኢዮቤልዉ፡⁴⁰ ወሱባዔ፡ ዓመት፡ ኃምስተ፡⁴¹ ወዐቀብዋ፡ ኖኅ፡ ወ*ደቂቁ፡ ሰብዓተ፡ ኢዮቤልዉ፡⁴³ ወሱባዔ፡ ዓመታት፡⁴³
      አሐተ፡⁸ እስከ፡ አመ፡⁸ ዕለተ፡ ሞቱ፡⁴⁴ ለኖኅ፤ ወ*እምዕለተ፡ ሞቱ፡ ለኖኅ፡¹ አሜሃአ፡¹ ውሉዱ፡¹ እስከ፡ አመ፡¹ መዋዕሊ፡
      አብርሃም፡ *ወይበልዑ፡ ደመ።⁴
  - verse: 19
    geez: ወ*አብርሃም፡¹ ባሕቲቱ፡⁵ ዐቀበ፡ ወ*ይስሐቅ፡ ወያዕቆብ፡ ውሉዱ፡ ዐቀብዋ፡ እስከ፡ መዋዕሊከ፡ ወበመዋዕሊከ፡ ረከቡ፡
      ውሉደ፡⁷ እስራኤል፡ እስከ፡⁴ አመ፡ ኀይስክዎሙ፡⁸ በኀበዝ፡ ደብር።
  - verse: 20
    geez: ወአንተሂ፡ አዝዞሙ፡ ለ*ደቂቀ፡⁹ እስራኤል፡ ይዕቀብዋ፡¹⁰ ለዛቲ፡ በዓል፡ በኵሉ፡ ትዝምዶሙ፡
  - verse: 21
    geez: ለትእዛዝ፡ ሎሙ፡ ዕለተ፡¹¹ አሐተ፡ ለዓመት፡¹² በዝ፡¹³ ወርኅ፡ ይግበሩ፡ በዓለ፡ ባቲ። እስመ፡ በዓለ፡ ሱባዔያት፡
      *ይእቲ፡ ወበዓለ፡⁴ *ቀዳሜ፡ ፍሬ፡¹⁴ ይእቲ፡ ክልኤ፡¹ ዐጽፍት፡¹⁵ ይእቲ፡ ወለክልኤ፡
  - verse: 22
    geez: ዘመድ፡¹⁶ ዛቲ፡ *በዓል፡ በከመ፡¹⁷ ጽሑፍ፡ ወ*ቍሩጽ፡¹⁸ በእንቲአሃ፡ ግብራ። እስመ፡ ጸሐፍኩ፡ ውስተ፡ መጽሐፈ፡
      ሕግ፡ ዘ*ቀዳሚ፡ ውስተ፡ ዘጸሐፍኩ፡ ለከ፡ ትግበራ፡ በበጊዜሃ፡ ዕለተ፡²⁰ አሐተ፡ ለ¹¹ዓመት፡ ወቍርባኖሂ፡ ነገርኩከ፡ ከመ፡
      ይኩኑ፡ ዝክራነ፡ ወይግበርዋ፡ ደቂቀ፡ እስራኤል፡ ውስተ፡
  - verse: 23
    geez: ትዝምዶሙ፡ በዝ፡ ወርኅ፡ ዕለተ፡ አሐተ፡ ለለ*አሐዱ፡²² ዓመት። *ወበሠርቀ፡ ወርኅ፡ ቀዳሚ፡⁴ ወበሠርቀ፡ ወርኅ፡
      ራብዕ፡ ወበሠርቀ፡ ወርኅ፡ ሳብዕ፡ ወበሠርቀ፡ ወርኅ፡ ዓሥር፡ ዕለታት፡ ተዝካር፡ እማንቱ፡ ወዕለታት፡ ጊዜ፡ እማንቱ፡ ውስተ፡
