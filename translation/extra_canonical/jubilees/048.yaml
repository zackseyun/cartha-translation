translation:
  text: '1. And in the sixth year of the third week of the forty-ninth jubilee, you
    departed and lived in the land of Midian five weeks of years and one year, and
    you entered Egypt in the second week.

    2. Again, in the second year in the fiftieth jubilee, you shall know what was
    spoken to you on Mount Sinai, and what the prince Mastema desired to do against
    you when you were entering Egypt.

    3. On the way, at the lodging-place, he came against you to accuse you. And he
    desired with all his power to kill you and to save the Egyptians from your hand,
    when he saw that you had been sent to do this and to execute judgment upon Egypt.

    4. But I delivered you from his hand, and you performed the signs and wonders
    that you were sent to do in Egypt against Pharaoh and against all his house and
    against his servants and against his people.

    5. And the LORD executed a great vengeance on them for Israel: he struck them
    with blood, and with frogs, and with gnats, and with dog-flies, and with evil
    boils that burst out in blisters, and their livestock with death, and with hailstones—by
    this he destroyed everything that sprouted for them—and with locusts that devoured
    what had been left from the hail, and with darkness, and with the death of their
    firstborn, of man and beast; and on all their gods the LORD executed vengeance.

    6. And he burned them with fire. And everything was sent through your hand so
    that you might do it, and it was not done apart from you.

    7. And you were to speak before the king of Egypt, before all his servants and
    before his people. And everything happened at your word: ten great and grievous
    judgments came upon the land of Egypt,

    8. so that he might execute vengeance for Israel. And the LORD did everything
    for Israel and according to his covenant, which he established with Abraham, that
    he might take vengeance on them because they had oppressed them with violence.

    9. And the prince Mastema stood up against you and sought to cast you into Pharaoh’s
    hand, and he helped the magicians of Egypt, and they stood and acted before you.
    They indeed practiced their arts, and we permitted them so that they might be
    done by their hands. But the LORD struck them with evil sores, and they were unable
    to continue resisting, because we made them incapable of performing even one sign
    of enchantment. And through all the signs and wonders the prince Mastema was put
    to shame, until, when he grew strong, he cried out to the Egyptians that they
    should pursue after you with all the power of Egypt, with their chariots and with
    their horses and with all the multitude of the people of Egypt. And I stood between
    the Egyptians and Israel, and we delivered Israel from his hand and from the hand
    of his people, and the LORD brought them out through the midst of the sea as on
    dry land.

    10. And all the people whom he brought out pursued after them, after Israel, and
    the LORD our God cast them into the midst of the sea, into its depths, beneath
    the sons of Israel, just as the people of Egypt had cast their sons into the river.
    A thousand thousand and ten thousand mighty men were destroyed because of

    11. the judgment that they had devised in the midst of the river against the children
    of your people.

    12. And on the fourteenth day, and on the fifteenth, and on the sixteenth, and
    on the seventeenth, and on the eighteenth, the prince Mastema was bound and shut
    off from following after the children of

    13. Israel, so that he could not accuse them.

    14. And on the nineteenth day we released them so that they might help the Egyptians
    and pursue after the children of Israel.

    15. And he hardened their hearts and made them stubborn, and it was hidden from
    the LORD our God that he might strike the Egyptians and cast them into the midst
    of the sea. And on the seventeenth day we bound him so that he could not accuse
    the children of Israel on the day when they were asking the Egyptians for goods
    and garments—articles of silver and articles of gold and articles of bronze—in
    order to plunder the Egyptians in return for the oppression with which they had
    oppressed them violently. And we did not bring the children of Israel out from
    Egypt empty-handed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: The chronology is compressed and somewhat difficult in the Ethiopic. 'Five
      weeks of years and one year' is retained literally to preserve Jubilees' calendrical
      scheme.
    reason: segmentation_note
  - marker: '3'
    text: The verb at the lodging-place may carry the sense of hostile encounter or
      accusation; compare the Exodus episode where a deadly confrontation occurs on
      the journey.
    reason: lexical_alternative
  - marker: '10'
    text: The surviving row numbering in the source jumps from verse 9 to 14; the
      English numbering here regularizes the chapter sequentially for readability
      while preserving all extant content.
    reason: segmentation_note
  - marker: '12'
    text: The binding of Mastema across specific days highlights Jubilees' interest
      in exact calendrical sequence during Passover and the Exodus.
    reason: cultural_note
  - marker: '15'
    text: The Ethiopic appears to mention silver, gold, and a third class of goods
      often understood as garments or valuable articles; 'articles of bronze' follows
      the most immediate lexical sense here, though the list is textually difficult.
    reason: textual_variant
lexical_decisions:
- source_word: ኢዮቤልውሳት
  chosen: jubilees
  alternatives:
  - jubilee periods
  rationale: Preserves Jubilees' technical chronological framework rather than smoothing
    into generic eras.
- source_word: ሱባዔ
  chosen: week of years
  alternatives:
  - week
  - heptad
  rationale: In Jubilees chronology this denotes a seven-year unit, not an ordinary
    week; rendered explicitly where natural in English.
- source_word: መኰንን መስተማ
  chosen: the prince Mastema
  alternatives:
  - Prince Mastema
