  from: he took possession of the land of Canaan and shut the gate of Egypt
  to: he returned to the land of Canaan, and the gate of Egypt was shut
  rationale: The Ge'ez verb 'ወገብአ' (wä-gäbʾa) means 'and he returned', not 'and he took possession'. Additionally, 'ወተዐጽወ' (wä-täʿäṣwä) is a passive verb (tä-stem) meaning 'and [it] was shut', rather than an active verb ('and he shut').
