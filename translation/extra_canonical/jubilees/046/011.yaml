  from: Hebron; and your father Amram remained with them. And the king of Canaan prevailed over the king of Egypt
  to: Hebron; and your father Abram remained with them. And the king of Canaan died before the king of Egypt.
  rationale: Corrected 'Amram' to 'Abram' to match the source አብራም, and revised 'prevailed over' to 'died before' for ወሞአ, which means 'and died.'
