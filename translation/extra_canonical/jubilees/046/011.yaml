  category: lexical
  from: Abram
  to: Amram
  rationale: While the Ge'ez text literally reads አብራም (Abram), this is a well-known scribal error for Amram (the father of Moses, to whom the angel is speaking). Standard critical translations (like VanderKam and Charles) emend to 'Amram' in the main text and note the Ethiopic reading in a footnote to avoid reader confusion.
