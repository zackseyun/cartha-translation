  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/011/006.job-76244.json
  category: grammar
  from: For those who make them and the hearts of those who worship them are led astray.
  to: for those who make them, and a straying of heart for those who worship them.
  rationale: 'The current English is grammatically broken, awkwardly conjoining a prepositional phrase (''For those who make them'') and a noun phrase (''the hearts of those who worship them'') as the subject of ''are led astray.'' The Ge''ez uses the preposition ''la'' (to/for) for both groups: `ለእለ፡ ይገብርዎሙ፡ ወከሕተት፡ ልብ፡ ለእለ፡ ያመልክዎሙ፡` (literally: ''for those who make them, and a straying/error of heart for those who worship them''). This likely continues the thought from the end of verse 5.'
- timestamp: '2026-04-28T09:36:30Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/011/006.job-76244.json
  category: mistranslation
  from: who have caused me to err before them?
  to: who have made me subject to them?
  rationale: The Ge'ez verb `እትአዘዝ` (from `ተአዘዘ`, ta'azaza) means 'to obey' or 'to be subject to,' not 'to err.' The previous revision pass incorrectly changed the meaning from serving/obeying to erring.
