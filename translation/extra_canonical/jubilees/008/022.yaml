  edition: charles_1895
  language: Geez
  text: ደቡብ፡ ምድረ፡ ቡርክት፡ ወስፍሕት፡ ወኵሉ፡ ዘውስቴታ፡ ጥቀ፡ ሠናይ። ወለካም፡ ወጠቅዐ፡ ወገብረ፡ ሎቱ፡ ፲ ፻ርአ፡ ፪ ወአደነ፡ ኀፍረተ። ወረገሞ፡ እግዚአብሔር፡ ለአርዌ፡ ምድር፡ ፳፫ ወተምዕዖ፡ ለዓለም፡ ወለብእሲትኒ፡ ፬ ተምዕዓ፡ ፭ እስመ፡ ሰምዐት፡ ቃለ፡ አርዌ፡ ምድር፡ ወበልዐት፡ ወይቤላ፡ አብዝኆ፡ አበዝኅ፡ ለኀዘንኪ፡ ወለፃዕርኪ'፡ ፮ በሐዘን፡ ፯ ለዲ፡ ውሉደ፡ ወኀበ፡ ምትኪ፡ ፳፬ ምግባእኪ፡ ፰ ውእቱ፡ ይኴንነኪ። ወለአዳምሂ፡ ይቤሎ፡ እስመ፡ ሰማዕከ፡ ቃለ፡ ብእሲትከ'፡ ፳፭ ወበላዕከ፡ እምውእቱ፡ ፱ ዕፀ፡ ዘአዘዝኩከ፡ ፲፰ ከመ፡ ኢትብላዕ፡ እምኔሁ፡ ርግምት፡ ትኩን፡ ምድር፡ በእንቲአከ፡ ፲፩ አስዋከ፡ ፲፪ ወአሜካላ፡ ይብቍልከ፡ ፲፫ ወብላዕ፡ ኀብስተከ፡ በሐፈ፡ ፲፬ ገጽከ፡ እስከ፡ አመ፡ ትገብእ፡ ውስተ፡ ምድር፡ ፲፭ *እንተ፡ እምኔሃ፡ ፲፮ ተነሣእከ፡ እስመ፡ ምድር፡ ፲፯ አንተ፡ ወውስተ፡ ምድር፡ ፲፰ ትገብእ። ፲፱ ወገብረ፡ ሎሙ፡ አልባሰ፡ ዘማዕስ፡ ወአልበሶሙ፡ ወፈነዎሙ፡ እምገነት፡ ፳፮ ኤዶም። ወበይእቲ፡ ዕለት፡ እንተ፡ ወፅአ፡ እምገነት፡ አዳም፡ ፳፰ ዐጠነ፡ ለመዐዛ፡ ሠናይ፡ ዕጣነ፡ ፳፯ ስኂነ፡ ወቀንአተ፡ ፳፩ ወማየ፡ ልብን፡ ፳፪ ወሰንበለ፡ ፳፫ በጽባሕ፡ ምስለ፡ ትንሣኤ፡ ፀሐይ፡ እምዕለት፡ ፳፬ ከደነ፡ ኀፍረተ። ወበይእቲ፡ ዕለት፡ ተፈጽመ፡ አፈ፡ ኵሉ፡ አራዊት፡ ወዘእንስሳ፡ ወዘአዕዋፍ፡ ፳፰ ወዘያንሶሱ፡ ወዘይትሐወስ፡ እምነቢብ፡ እስመ፡ ኵሎሙ፡ ይትናገሩ፡ ዝንተ፡ *ምስለ፡ ዝንቱ፡ ፲ ክንፈረ፡ ፳፮ አሐደ፡ ፳፯ ወልሳነ፡ አሐደ፡ ፳፰ ወፈነወ፡ ፳፱ እምገነት፡ ፳፰ ኤዶም፡ ለኵሉ፡ ፳፰ ዘሥጋ፡ ዘሀሎ፡ ፳፱ ውስተ፡ ገነት፡ ፳፩ ኤዶም፡ ወተዘርዉ፡ ኵሉ፡ ዘሥጋ፡ በበ፡ ዘመዶሙ፡ ወበበ፡ ፍጥረቶሙ፡ ፳፪ ውስተ፡ መካን፡ ዘተፈጥረ፡ ሎሙ። ወለአዳም፡ ባሕቲቱ፡ ወሀቦ፡ ይክድን፡ ኀፍረተ፡ እምኵሉ፡ አራዊት፡ ፴ ወእንስሳ። *በእንተ፡ ዝንቱ፡ ፳፫ ትእዛዘ፡ ፳፬ ውስተ፡ *ጽላተ፡ ሰማይ፡ ፳፭ ላዕለ፡ ኵሎሙ፡ እለ፡ ይአምሩ፡ ፴፩ ፍትሐ፡ ሕግ፡ ይክድኑ፡ ኀፍረቶሙ፡ ወኢይትከሠቱ፡ ከመ፡ አሕዛብ፡ ይትከሠቱ። ፳፮ ወአመ፡ ፴፪ ሠርቀ፡ ወርኅ፡ ራብዕ፡ ወፅኡ፡ አዳም፡ ወብእሲቱ፡ እምገነት፡ ፳፰ ኤዶም፡ ወኀደሩ፡ ውስተ፡ ምድረ፡ ፳፯ ህየንተ፡ አቤል፡ እስመ፡ ቀተሎ፡ ቃየን። ወበሱባዔ፡ ሳድስ፡ ወለደ፡ ለአዝራ፡ ወለቶ። ወነሥአ፡ 8, 9 ቃየን፡ ለአዋን፡ እኅቱ፡ ሎቱ፡ ብእሲተ፡ ወወለደት፡ ሎቱ፡ ሄኖሕሃ፡ በፍጻሜ፡ ራብዕ፡ ኢዮቤልው፡ ወበአሐዱ፡ ዓመት፡ ዘሱባዔ፡ ቀዳማ፡ ዘኃምስ፡ ኢዮቤልው፡ ተሐንጸ፡ አብያት፡ ውስተ፡ ምድር፡ ወሐነጸ፡ ቃየን፡ ሀገረ፡ ወሰመያ፡ ስማ፡ በስመ፡ ወልዱ፡ ሄኖሕ። ወአዳም፡ አእመራ፡ 10 ለሔዋ፡ ብእሲቱ፡ ወወለደት፡ ዓዲ፡ ተስዓተ፡ ደቂቀ። ወበሱባዔ፡ ኃምስ፡ ዘኃምስ፡ ኢዮቤልው፡ 11 ነሥአ፡ ሴት፡ ለአዙራ፡ እኅቱ፡ ሎቱ፡ ብእሲተ፡ ወበራብዕ፡ ወለደት፡ ሎቱ፡ ሄኖስሃ። ውእቱ፡ ቀደመ፡ ጼውዖ፡ ስመ፡ እግዚአብሔር፡ በዲበ፡ ምድር። ወበሳብዕ፡ ኢዮቤልው፡ 12, 13 በሱባዔ፡ ሣልስ፡ ነሥአ፡ ሄኖስ፡ ኖአምሃ፡ እኅተ፡ ሎቱ፡ ብእሲተ፡ ወወለደት፡ ሎቱ፡ ወልደ፡ በሣልስ፡ ዓመት፡ ዘኃምስ፡ ሱባዔ፡ ወሰመዮ፡ ስሞ፡ ቃይናን። ወበፍጻሜ፡ ሳምን፡ ኢዮቤልው፡ 14 ነሥአ፡ ሎቱ፡ ቃይናን፡ ብእሲተ፡ ሙአሌሌትሃ፡ እኅተ፡ ወወለደት፡ ሎቱ፡ ወልደ፡ በታስዕ፡ ኢዮቤልው፡ በሱባዔ፡ ቀዳማ፡ በሣልስ፡ ዓመት፡ በሱባዔሁ፡ ለዝ፡ ወጸውዐ፡ ስሞ፡ መሳአሌል። ወበካልእ፡ ሱባዔ፡ ዘዓሥር፡ ኢዮቤልው፡ ነሥአ፡ ሎቱ፡ መሳአሌል፡ ብእሲተ፡ *ዲናሃ፡ ወለተ፡ 15 በራኪኤል፡ ወለተ፡ እኅተ፡ አቡሁ፡ [ሎቱ፡ ብእሲተ፡] ወወለደት፡ ሎቱ፡ ወልደ፡ በሱባዔ፡ ሣልስ፡ 