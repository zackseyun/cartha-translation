- timestamp: '2026-04-28T09:36:30Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/008/016.job-76146.json
  category: mistranslation
  from: along the road of Dungagu to the river, and it goes along the road eastward
  to: toward the border of this river, and it goes toward the east
  rationale: The word 'mangaba' means 'toward' or 'direction', not 'road' (which would be 'fenot'). Furthermore, 'Dungagu' is not a proper noun; it is the noun 'dengag' (border, boundary, bank) with a 3ms possessive suffix ('its border'). 'la-ze falag' means 'of this river'.
- timestamp: '2026-04-28T09:36:30Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/jubilees/008/016.job-76146.json
  category: mistranslation
  from: toward the northeast and to all the land of Eden
  to: toward its north, to the north, and from the east of all the land of Eden
  rationale: The Ge'ez reads 'mangaba samenu la-samen' (toward its north, to the north) and 'wa-em-sebahiha' (and from its east). The draft paraphrases the directions as 'northeast' and completely omits 'from its east'.
- timestamp: '2026-04-28T09:36:30Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-2.5-pro
