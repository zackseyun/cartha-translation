  from: And he blessed him with all his heart and said, “The Most High God, the God of all, and Creator of all, who brought me out from Ur of the Chaldeans to give me this land as an everlasting possession, and to establish a holy seed, may he be blessed forever.”
  to: And he blessed him with all his heart and said, “The Most High God, the God of all and Creator of all, who brought me out from Ur of the Chaldeans to give me this land as an everlasting possession, and to establish a holy seed—may he be blessed forever.”
