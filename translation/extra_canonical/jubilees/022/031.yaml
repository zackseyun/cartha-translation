  category: missing_nuance
  from: from now and forever
  to: from now and unto the days of eternity
  rationale: The Ge'ez text reads 'wa-ʾəska mawaʿəla za-la-ʿālam' (unto the days of eternity). The draft omits 'mawaʿəla' (days of) here, though it translates it correctly later in the verse ('for all the days forever'). Restoring 'days of' maintains formal equivalence and internal consistency.
