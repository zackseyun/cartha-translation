  from: open over him and over his seed
  to: open upon him and upon his seed
  rationale: While the Ge'ez preposition 'lāʿla' can mean 'over,' the standard English idiom for watchful care is for eyes to be 'open upon' or 'open toward' someone. 'Open over' is awkward and unnatural in English.
