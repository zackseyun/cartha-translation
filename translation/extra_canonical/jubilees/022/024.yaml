translation:
  text: And for all who worship idols and for the profane[24], there is no hope in the land of the living; for they will go down to Sheol, and they will go to the place of judgment, and they will have no memorial upon the earth. As the sons of Sodom were removed from the earth, so all who worship idols will be removed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '24'
    text: The term 'Sheol' is retained rather than translated as 'hell' or 'grave' because the text distinguishes descent to Sheol from entry into a 'place of judgment.'
    reason: alternative_reading
  - marker: a
    text: Or 'the unclean'.
    reason: previous_rendering
