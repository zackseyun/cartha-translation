translation:
  text: This house I have built for myself[26], to put my name upon it on the earth. It is given to you and to your seed forever, and it will be called the house of Abraham. It is given to you and to your seed forever, because you will build my house and establish my name before God forever. Your seed and your name will stand throughout all the generations of the earth.”
