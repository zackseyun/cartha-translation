  from: went and prepared a feast and brought it to his father.
  to: would go and look at his possessions and return to his father.
  rationale: The draft hallucinates 'prepared a feast and brought it'. The Ge'ez text reads 'ወይሬኢ [or similar] ጥሪተ ወይገብእ ኀበ አቡሁ' meaning 'and he would see/look at his possessions and return to his father.' 'ጥሪተ' (ṭerita) means 'possessions', and 'ወይገብእ' (wa-yegabbe') means 'and he returns'. Furthermore, the imperfect verbs (የሐውር, ይሬኢ, ይገብእ) indicate habitual action in the past ('would go... look... return').
