  text: And he came near and kissed him. And he said, “Blessed be my son Jacob and all his sons by the Lord Most High, to all the ages. May the Lord give you a righteous seed; and may he sanctify some of your offspring in the midst of all the earth. Let the nations serve you, and let all the nations bow down before your seed.”
