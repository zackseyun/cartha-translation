  from: from your offspring may he sanctify himself
  to: may he sanctify some of your offspring
  rationale: The Ge'ez verb ይቀድስ (yəqaddəs) is active ('may he sanctify'), not reflexive ('may he sanctify himself', which would be ይትቀደስ yətqaddas). The preposition እም (from) functions partitively here, meaning 'may he sanctify (some) of your offspring.' The previous draft had this correct.
