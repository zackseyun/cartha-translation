translation:
  text: And it came to pass in the first week[1], in the forty-fourth jubilee, in the second year of that week—the year in which Abraham died—that Isaac and Ishmael came from the Well of the Oath to celebrate the Feast of Weeks, this feast of the firstfruits of the harvest, with Abraham their father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: 'The opening chronology is literal: ''in the first week, in the forty-second jubilee, in the second year.'' Jubilees regularly dates events by jubilees and weeks of years; this should not be simplified away.'
