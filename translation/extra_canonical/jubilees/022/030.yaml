  from: my grace and my mercy rest upon him and upon all his seed always
  to: Your grace and Your mercy rest upon him and upon his seed always
  rationale: The Ge'ez suffixes on ሣህለከ (śāhlaka) and ምሕረትከ (meḥrataka) are second-person masculine singular (-ka), meaning 'your grace and your mercy' (addressing God). The revision pass incorrectly changed this to 'my'. Additionally, ኵሎ (kwello, 'all') modifies መዋዕለ (mawā'ela, 'days'), not ዘርኡ (zar'u, 'seed'), so it should be 'his seed always' or 'his seed all the days', not 'all his seed'.
