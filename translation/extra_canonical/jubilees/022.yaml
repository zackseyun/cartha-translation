translation:
  text: '[''1. And it came to pass in the first week, in the forty-second jubilee,
    in the second year of that week—the year in which Abraham died—that Isaac and
    Ishmael came from the Well of the Oath, to celebrate the feast of weeks, that
    first feast of the harvest, with Abraham their father.'', ''2. And Abraham rejoiced
    because both his sons had come.'', ''3. For Isaac had many possessions in Beer-sheba,
    and Isaac went and prepared a feast and brought it to his father.'', ''4. And
    in those days Ishmael came to see his father, and both of them came together;
    and Isaac slaughtered a sacrifice for a thank offering and offered it on the altar
    which his father had made in Hebron.'', ''5. And he brought a peace offering,
    and made a great feast of rejoicing before Ishmael his brother. And Rebekah made
    fresh cakes from new grain and gave them to Jacob her son, so that he might bring
    them to Abraham his father’s father, from the firstfruits of the land, that he
    might eat and bless the Creator of all before he died.'', ''6. And Isaac also
    sent by the hand of Jacob the best of the thank offering to Abraham, that he might
    eat and drink.'', ''7. And he ate and drank, and blessed the Most High God, who
    created heaven and earth, who made all the fatness of the earth, and gave it to
    the children of men to eat and to drink and to bless their Creator.'', ''8. And
    now I give thanks to you, my God, because you have shown me this day. Behold,
    I am one hundred seventy-five years old, old and complete in days, and all my
    days have been peace.'', ''9. The sword of the adversary has not overcome me in
    all that you have given to me and to my children all the days of my life until
    this day.'', ''10. May your mercy and your peace be upon your servant and upon
    the seed of his sons, that they may be for you a chosen people and an inheritance
    from among all the nations of the earth, from now and for all the days of the
    generations of the earth, for all ages.'', ''11. And he called Jacob and said,
    “My son Jacob, may the God of all bless you and strengthen you to do righteousness
    and his will before him. And may he choose you and your seed, that you may be
    for him a people for inheritance according to his will for all the days.'', ''12.
    And you, my son Jacob, come near and kiss me.”'', ''13. And he came near and kissed
    him. And he said, “Blessed be my son Jacob and all his sons to the Lord Most High
    for all ages. May the Lord give you a seed of righteousness; and may he sanctify
    some of your offspring in the midst of all the earth. Nations will desire you,
    and all nations will bow down before your seed.'', ''14. Be strong before men,
    and while you rule among all the seed of Seth, then your ways and the ways of
    your sons will be justified, so that they may become a holy people.'', ''15. May
    the Most High God give you all the blessings with which he blessed me and with
    which he blessed Noah and Adam. May they rest upon the holy head of your seed
    from generation to generation and forever.'', ''16. And may he cleanse you from
    all uncleanness and impurity, so that he may forgive all your transgressions and
    your sins of ignorance. And may he strengthen you and bless you, and may you inherit
    the whole earth.'', ''17. And may he renew his covenant with you, that you may
    be for him a people for inheritance for all ages, and that he may be God to you
    and to your seed in truth and righteousness all the days of the earth.'', ''18.
    And you, my son Jacob, remember my words and keep the commandments of Abraham
    your father. Separate yourself from the nations, and do not eat with them, and
    do not act according to their deeds, and do not become their companion; for their
    deeds are defiled, and all their ways are pollution and abomination and uncleanness.'',
    ''19. They sacrifice their sacrifices to the dead, and they worship demons, and
    they eat over the graves, and all their works are vanity and nothingness.'', ''20.
    They have no heart to understand, and their eyes do not see what their works are,
    and how they go astray when they say to wood, ‘You are my god,’ and to stone,
    ‘You are my lord, and you are my deliverer.’ And they have no heart.'', ''21.
    But you, my son Jacob, may the Most High God help you, and may the God of heaven
    bless you and remove you from their uncleanness and from all their error.'', ''22.
    Take heed, my son Jacob, that you do not take a wife from any seed of the daughters
    of Canaan, for all his seed is destined for uprooting from the earth.'', ''23.
    For because of the transgression of Ham, Canaan erred, and all his seed will be
    destroyed from the earth; and there will be no remnant from him, nor one who escapes,
    on the day of judgment.'', ''24. And for all who worship idols and for the profane
    there is no hope in the land of the living; for they will go down to Sheol, and
    they will walk into the place of judgment, and they will have no memorial on the
    earth. As the sons of Sodom were taken away from the earth, so all who worship
    idols will be taken away.'', ''25. Do not fear, my son Jacob, and do not be dismayed,
    son of Abraham. The Most High God will preserve you from destruction, and he will
    rescue you from every path of error.'', ''26. This house I have built for myself,
    to put my name upon it in the earth. It is given to you and to your seed forever,
    and it will be called the house of Abraham. It is given to you and to your seed
    forever, for you will build my house and establish my name before God forever.
    Your seed and your name will stand throughout all the generations of the earth.”'',
    ''27. And he finished commanding him and blessing him.'', ''28. And both of them
    lay down together on one bed, and Jacob slept in the bosom of Abraham, his father’s
    father. And he kissed him seven times, and his affection and his heart rejoiced
    over him.'', ''29. And he blessed him with all his heart and said, “The Most High
    God, the God of all, and Creator of all, who brought me out from Ur of the Chaldeans
    to give me this land as an everlasting possession, and to establish a holy seed,
    may he be blessed forever.”'', ''30. And he blessed Jacob and said, “My son, in
    whom with all my heart and in all my affection I rejoice, may your grace and your
    mercy be upon him and upon his seed all the days.'', ''31. And do not forsake
    him and do not abandon him from now and forever. And let your eyes be open upon
    him and upon his seed, that you may keep him and bless him and sanctify him as
    a people for your inheritance. And bless him with all your blessings from now
    and for all the days forever, and renew your covenant and your mercy with him
    and with his seed according to all your will throughout all the generations of
    the earth.”'']'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: 'The opening chronology is literal: ''in the first week, in the forty-second
      jubilee, in the second year.'' Jubilees regularly dates events by jubilees and
      weeks of years; this should not be simplified away.'
    reason: cross_reference
  - marker: '5'
    text: The phrase 'that first feast of the harvest' likely identifies the Feast
      of Weeks as a firstfruits/harvest festival.
    reason: lexical_alternative
  - marker: '14'
    text: The wording is difficult. The Ge'ez explicitly says 'seed of Seth'; the
      clause about Jacob's status among them may also carry the sense of being exalted
      or ruling among humankind.
    reason: segmentation_note
  - marker: '16'
    text: The phrase rendered 'sins of ignorance' is textually difficult; the Ge'ez
      seems to distinguish deliberate transgressions from errors done without full
      knowledge.
    reason: lexical_alternative
  - marker: '19'
    text: '''They eat over the graves'' likely refers to funerary or necromantic cult
      meals.'
    reason: cultural_note
  - marker: '24'
    text: The term 'Sheol' is retained rather than translated as 'hell' or 'grave'
      because the text distinguishes descent to Sheol from entry into a 'place of
      judgment.'
    reason: alternative_reading
  - marker: '26'
    text: '''This house I have built for myself'' may refer to Abraham''s cultic site,
      but the following lines also sound dynastic (''house of Abraham''). The ambiguity
      is likely intentional.'
    reason: segmentation_note
  - marker: '28'
    text: The final clause is difficult; the sense is that Abraham's affection and
      inward disposition remained warmly fixed on Jacob.
    reason: segmentation_note
  - marker: '30'
    text: The wording shifts awkwardly between second and third person ('your grace
      ... upon him'). The translation preserves the prayer-like sense without forcing
      strict grammatical regularity.
    reason: textual_variant
lexical_decisions:
- source_word: ሱባዔ / ኢዮቤል
  chosen: week / jubilee
  alternatives:
  - seven-year period
  - jubilee period
  rationale: Preserved Jubilees’ chronological terminology rather than smoothing into
    generic dates. The phrase marks the first week within the forty-second jubilee.
  lexicon: contextual/Jubilees chronology
- source_word: መሐላ
  chosen: Well of the Oath
  alternatives:
  - Beer-sheba
  rationale: Rendered the place-name transparently in v.1 because the Ge'ez phrase
    is descriptive; Beer-sheba is retained in v.3 where the conventional place-name
    appears.
  lexicon: proper-name semantics
- source_word: በዓለ ሱባዔያት
  chosen: feast of weeks
  alternatives:
  - Festival of Weeks
  - Weeks feast
  rationale: Preserves calendrical specificity and intertextual connection to Shavuot/Pentecost
    traditions without over-paraphrase.
  lexicon: cultic terminology
- source_word: ማእረር
  chosen: harvest
  alternatives:
  - firstfruits harvest
  rationale: In context of the feast of weeks, the term points to harvest/firstfruits
    timing; translated succinctly while footnoting the nuance through surrounding
    wording.
  lexicon: agricultural/cultic context
- source_word: መሥዋዕተ ለጽንሓሕ
  chosen: sacrifice for a thank offering
  alternatives:
  - sacrifice of thanksgiving
  - thank offering
  rationale: Keeps sacrificial specificity; the Ge'ez points to a thanksgiving-type
    sacrifice rather than a generic offering.
  lexicon: cultic terminology
- source_word: መድኃኒት
  chosen: peace offering
  alternatives:
  - deliverance offering
  - well-being offering
  rationale: In sacrificial context it likely denotes a communion/well-being offering;
    'peace offering' is readable and recognizable, while not erasing the semantic
    link to deliverance/welfare.
  lexicon: cultic terminology
- source_word: ጻፍንተ
  chosen: cakes
  alternatives:
  - loaves
  - flat cakes
  rationale: A practical food item made from new grain; 'cakes' best fits the offering
    context without over-specifying shape.
  lexicon: food terminology
- source_word: ስብሐ ምድር
  chosen: fatness of the earth
  alternatives:
  - produce of the earth
  - richness of the earth
  rationale: Retains the traditional concrete abundance imagery rather than flattening
    to generic produce.
  lexicon: biblical idiom
- source_word: አሂቅ ወፍጹመ መዋዕል
  chosen: old and complete in days
  alternatives:
  - aged and full of days
  - advanced and fulfilled in days
  rationale: Preserves the patriarchal idiom while keeping it understandable in English.
  lexicon: biblical lifespan idiom
- source_word: ሕዝበ ኅሩየ
  chosen: chosen people
  alternatives:
  - elect people
  rationale: Readable modern English that preserves covenant-election language.
  lexicon: covenantal terminology
- source_word: ዘርአ ጽድቅ
  chosen: seed of righteousness
  alternatives:
  - righteous offspring
  - righteous seed
  rationale: Kept the seed-language because it is covenantally and genealogically
    important in Jubilees.
  lexicon: covenantal/genealogical terminology
- source_word: ዘርአ ሴት
  chosen: seed of Seth
  alternatives:
  - offspring of Seth
  - human race
  rationale: The Ge'ez explicitly names Seth; I preserved the proper-name reference
    rather than generalizing to humanity.
  lexicon: proper name / genealogy
- source_word: ድማኅ ቅዱስ
  chosen: holy head
  alternatives:
  - holy crown
  - holy summit
  rationale: The blessing formula appears to place the patriarchal blessings upon
    the head of Jacob’s seed; 'head' best preserves the bodily metaphor.
  lexicon: contextual idiom
- source_word: ርኵሰት / ርኩስ
  chosen: uncleanness / impurity
  alternatives:
  - defilement
  - pollution
  rationale: Maintains ritual-moral contamination language central to Jubilees.
  lexicon: purity terminology
- source_word: ያስተስሪ
  chosen: forgive
  alternatives:
  - cover over
  - remove
  rationale: In context with sins and transgressions, forgiveness is the clearest
    English equivalent.
  lexicon: contextual theological usage
- source_word: ጐግኒ ወምናኔ ወስቆራር
  chosen: pollution and abomination and uncleanness
  alternatives:
  - error and filth and corruption
  rationale: The cluster is rhetorically cumulative; I preserved the piling up of
    impurity terms rather than compressing them.
  lexicon: contextual pejorative cluster
- source_word: ለአብድነት
  chosen: to the dead
  alternatives:
  - to dead things
  - to lifeless beings
  rationale: Fits the polemic against funerary/idolatrous rites and parallels the
    following mention of graves.
  lexicon: contextual cultic polemic
- source_word: አጋንንት
  chosen: demons
  alternatives:
  - evil spirits
  rationale: Standard rendering that preserves the supernatural polemic.
  lexicon: religious terminology
- source_word: ሲኦል
  chosen: Sheol
  alternatives:
  - the grave
  - the underworld
  rationale: Preserved the traditional term rather than collapsing it into a single
    English interpretation.
  lexicon: biblical afterlife terminology
- source_word: ሙስና
  chosen: destruction
  alternatives:
  - corruption
  - ruin
  rationale: In v.25 the sense is rescue from ruin/perishing; 'destruction' fits the
    warning context.
  lexicon: contextual
- source_word: ቤተ
  chosen: house
  alternatives:
  - household
  - temple
  rationale: Kept 'house' because the passage intentionally plays on both physical
    sanctuary and dynastic house; 'temple' would over-resolve the ambiguity.
  lexicon: architectural/covenantal terminology
- source_word: አርስ
  chosen: possession
  alternatives:
  - inheritance
  - heritage
  rationale: In v.29 the land is given as a lasting holding; 'possession' fits the
    patriarchal grant formula.
  lexicon: land-grant terminology
theological_decisions:
- issue: Identity of the feast in v.1
  chosen_reading: The text refers to the Feast of Weeks as the first feast of the
    harvest.
  alternative_readings:
  - a generic seven-day feast
  - a feast of sabbaths
  rationale: The combination of በዓለ ሱባዔያት and harvest language strongly points to
    the Feast of Weeks/Shavuot, important in Jubilees’ liturgical calendar.
  doctrine_reference: Preserve calendrical terminology carefully; do not flatten Jubilees.
- issue: Meaning of 'seed of Seth' in v.14
  chosen_reading: A literal genealogical reference to Seth’s line/humanity under Sethic
    language.
  alternative_readings:
  - all humanity in general without Sethic emphasis
  rationale: The Ge'ez explicitly names Seth, and Jubilees often frames humanity through
    genealogical lines. The translation preserves that apocalyptic-genealogical texture.
  doctrine_reference: Original-language primacy; preserve theological tension rather
    than resolve it.
- issue: '''This house I have built for myself'' in v.26'
  chosen_reading: Retained 'house' with deliberate ambiguity between sanctuary and
    dynastic house.
  alternative_readings:
  - temple
  - household/family line
  rationale: The verse appears to blend sacred place and enduring Abrahamic line.
    Translating simply as 'house' preserves the layered theology instead of choosing
    one dimension only.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Fate of idolaters in v.24
  chosen_reading: Rendered Sheol and place of judgment distinctly without collapsing
    them into a later systematic doctrine of hell.
  alternative_readings:
  - hell
  - grave only
  rationale: Jubilees uses layered afterlife/judgment language. Keeping 'Sheol' plus
    'place of judgment' preserves the text’s own categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
