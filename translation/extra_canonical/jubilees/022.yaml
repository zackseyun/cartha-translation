  rows:
  - verse: 1
    geez: ወኮነ፡ በሱባዔ፡ ቀዳሚ፡ በ፪፡ አርብዓ፡ ወአርባዕቱ፡ ኢዮቤልዉ፡ በካልእ፡ ዓመት፡ ውእቱ፡ ዓመት፡ በዘሞተ፡ አብርሃም፡
      መጽኡ፡ ይስሐቅ፡ ወይስማዔል፡ እምዐዘቅተ፡ መሐላ፡ ከመ፡ ይግበሩ፡ በዓለ፡ ሱባዔያት፡ ዛተ፡ በዓለ፡ ዘቀዳሚ፡ ማእረር፡ ኀበ፡
      አብርሃም፡ አቡሆሙ፡
  - verse: 2
    geez: ወተፈሥሐ፡ አብርሃም፡ እስመ፡ ክልኤሆሙ፡ ደቂቁ፡ መጽኡ።
  - verse: 3
    geez: እስመ፡ ብዙኅ፡ ጥሪቱ፡ ለይስሐቅ፡ በቤርሳቤ፡ ወየሐውር፡ ይስሐቅ፡ ወይዋሑ፡ ጥሪተ፡ ወይገብእ፡ ኀበ፡ አቡሁ።
  - verse: 4
    geez: ወበዝ፡ መዋዕል፡ መጽአ፡ ይስማዔል፡ ይርአይ፡ አባሁ፡ ወመጽኡ፡ ክልኤሆሙ፡ ኅቡረ፡ ወጠብሐ፡ ይስሐቅ፡ መሥዋዕተ፡ ለጽንሓሕ፡
      ወአዕረገ፡ ዲበ፡ ምሥዋዕ፡ አቡሁ፡ ዘገብረ፡ በኬብሮን።
  - verse: 5
    geez: ወምዐ፡ መድኃኒተ፡ ወገብረ፡ ፯ዝዐ፡ ፍሥሓ፡ በቅድመ፡ ይስማዔል፡ እኁሁ፡ ወገብረት፡ ርብቃ፡ ጻፍንተ፡ ሐዳሰ፡ እምስርናይ፡
      ኅዲስ፡ ወወሀበተ፡ ለያዕቆብ፡ ወልዳ፡ ከመ፡ ይብእ፡ ለአብርሃም፡ አቡሁ፡ እምቀዳሚ፡ ፍሬ፡ ምድር፡ ከመ፡ ይብላዕ፡ ወይባርከ፡
      ፈጣሪ፡ ኵሉ፡ እንበለ፡ ይሙት።
  - verse: 6
    geez: ወይስሐቅኒ፡ ውእቱኒ፡ ፈነወ፡ በእዴ፡ ያዕቆብ፡ ዘይሤኒ፡ መሥዋዕተ፡ ዘመድኃኒት፡ ለአብርሃም፡ ወይብላዕኒ፡ ወይስተይኒ።
  - verse: 7
    geez: ወበልዐ፡ ወሰትየ፡ ወባረኮ፡ ለአምላክ፡ ልዑል፡ ዘፈጠረ፡ ሰማየ፡ ወምድረ፡ ዘገብረ፡ ኵሎ፡ ስብሐ፡ ምድር፡ ወወሀቦሙ፡
      ለውሉደ፡ ሰብእ፡ ይብልዑ፡ ወይስተዩ፡ ወይባርኩ፡ ፈጣሪሆሙ።
  - verse: 8
    geez: ወይእዜኒ፡ አትኃነይ፡ ለከ፡ አምላኪየ፡ አነ፡ እስመ፡ አርአይከኒ፡ ዛተ፡ ዕለተ፡ ናሁ፡ አነ፡ ወልደ፡ ፻ወ፸ወ፭ ክረምት፡
      አሂቅ፡ ወፍጹመ፡ መዋዕል፡ ወኵሉ፡ መዋዕልየ፡ ኮናኒ፡ ሰላመ።
  - verse: 9
    geez: ሰይፈ፡ ጸላኢ፡ ኢሞአኒ፡ በኵሉ፡ ዘወሀብከኒ፡ ወለውሉድየ፡ ኵሎ፡ መዋዕለ፡ ሕይወትየ፡ እስከ፡ ዛቲ፡ ዕለት።
  - verse: 10
    geez: ትኩን፡ አምላኪየ፡ ሣህልከ፡ ወሰላምከ፡ ላዕለ፡ ገብርከ፡ ወላዕለ፡ ዘርአ፡ ውሉዱ፡ ከመ፡ ይኩንከ፡ ሕዝበ፡ ኅሩየ፡
      ወርስተ፡ እምኵሉ፡ አሕዛበ፡ ምድር፡ እምይእዜ፡ ወእስከ፡ ኵሉ፡ መዋዕለ፡ ዘትውልደ፡ ምድር፡ ለኵሉ፡ ዓለማት።
  - verse: 11
    geez: ወጸውዖ፡ ለያዕቆብ፡ ወይቤ፡ ወልድየ፡ ያዕቆብ፡ ይባርከ፡ አምላከ፡ ኵሉ፡ ወያኃይለከ፡ ለገቢረ፡ ጽድቅ፡ ወፈቃዱ፡ በቅድመ፡
      ዚአሁ፡ ወይኅረይ፡ ብከ፡ ወ'በዘርእከ፡ ከመ፡ ትኩንዎ፡ ሕዝበ፡ ዘርስት፡ በከመ፡ ፈቃዱ፡ በኵሉ፡ መዋዕለ፡
  - verse: 12
    geez: ወአንተኒ፡ ወልድየ፡ ያዕቆብ፡ ቅረብ፡ ወስዐመኒ።
  - verse: 13
    geez: ወ*ቀርበ፡ ወስዐሞ፡ ወይቤ፡ ቡሩክ፡ ወልድየ፡ ያዕቆብ፡ ወኵሎሙ፡ ውሉዱ፡ ለእግዚአብሔር፡ ልዑል፡ ለኵሉ፡ ዓለማት፡
      የሀብከ፡ እግዚአብሔር፡ ዘርአ፡ ጽድቅ፡ ወ'እምውሉድከ፡ ይቀድስ፡ በማእከለ፡ ኵላ፡ ምድር፡ ይትቀነዩ፡ ለከ፡ አሕዛብ፡ ወይስግዱ፡
      በቅድመ፡ ዘርእከ፡ ኵሎሙ፡ አሕዛብ።
  - verse: 14
    geez: ኩን፡ ኃያለ፡ በቅድመ፡ ሰብእ፡ ወ*እንዘ፡ ትሜብል፡ ውስተ፡ ኵሉ፡ ዘርአ፡ ሴት፡ አሜሃ፡ ይጸድቃ፡ ፍናዊከ፡ ወ*ፍናዊ፡
      ውሉድከ፡ ለከዊነ፡ ሕዝብ፡ ቅዱስ።
  - verse: 15
    geez: የሀብከ፡ አምላከ፡ ልዑል፡ ኵሎን፡ በረከታተ፡ እለ፡ ባረከኒ፡ ወእለ፡ ባረኮ፡ ለኖኅ፡ ወአዳምሃ፡ ያዕርፉ፡ *ዲበ፡
      ድማኅ፡ ቅዱስ፡ ዘርእከ፡ ለኵሉ፡ ትውልደ፡ ትውልድ፡ ወእስከ፡ ለዓለም።
  - verse: 16
    geez: ወያንጽሕከ፡ እምኵሉ፡ *ርኵሰት፡ ወርኩስ፡ ከመ፡ *ያስተስሪ፡ ኵሎ፡ አበሳከ፡ ወ"ዘበአያእምሮ፡ ጌገይከ፡ ወ*ያኃይለከ፡
      ወይባርከ፡ ወትረስ፡ ኵላ፡ ምድረ።
  - verse: 17
    geez: ወ*የሐድስ፡ ኪዳኖ፡ ምስሌከ፡ ከመ፡ ትኩኖ፡ ሕዝበ፡ ለርስት፡ ለ"ኵሉ፡ ዓለማት፡ ወውእቱ፡ ይኩንከ፡ ለከ፡ *ወለዘርእከ፡
      አምላከ፡ ዘበሀልወ፡ ወዘበጽድቅ፡ በኵሉ፡ መዋዕለ፡ ምድር።
  - verse: 18
    geez: ወአንተ*ኒ፡ ወልድየ፡ ያዕቆብ፡ ተዘከር፡ ቃለየ፡ ወዕቀብ፡ ትእዛዛተ፡ አብርሃም፡ አቡከ፡ ተፈለጥ፡ እምአሕዛብ፡ ወኢትብላዕ፡
      ምስሌሆሙ፡ ወኢትግበር፡ በከመ፡ ምግባሪሆሙ፡ ወኢትኩኖሙ፡ ቢጸ፡ እስመ፡ ግብሮሙ፡ ርኩስ፡ ወኵሉ፡ ፍናዊሆሙ፡ ጐግኒ፡ ወምናኔ፡
      ወስቆራር።
  - verse: 19
    geez: መሥዋዕቶሙ፡ ለአብድነት፡ ይዘብሑ፡ ወለአጋንንት፡ ይሰግዱ፡ ወበውስተ፡ መቃብራት፡ ይበልዑ፡ ወኵሉ፡ ግብሮሙ፡ ከንቱ፡
      ወበከ።
  - verse: 20
    geez: ወአልቦሙ፡ ልበ፡ ለሐልዮ፡ ወኢ*ኮነ፡ አዕይንቲሆሙ፡ ዘይሬኢ፡ ምንተ፡ ገብሮሙ፡ ወእፎ፡ እሙንቱ፡ ይስኅቱ፡ እንዘ፡
      ይብሉ፡ ለዕፅ፡ አንተ፡ አምላኪየ፡ ወለእብን፡ አንተ፡ እግዚእየ፡ ወአንተ፡ መባሕሕየ፡ ወአሀቡ፡ ሎሙ፡ ልብ።
  - verse: 21
    geez: ወአንተኒ፡ ወልድየ፡ ያዕቆብ፡ አምላከ፡ *ልዑል፡ ይርዳእከ፡ ወአምላከ፡ ሰማይ፡ ይባርከ፡ *ወያግኅሥከ፡ እምነ፡ ርእዮሙ፡
      ወእምኵሉ፡ ስሕተቶሙ፡
  - verse: 22
    geez: ተዐቀብ፡ ወልድየ፡ ያዕቆብ፡ ከመ፡ አትንግእ፡ ብእሲተ፡ እም፡ ኵሉ፡ ዘርአ፡ አዋልደ፡ ከናአን፡ እስመ፡ ኵሉ፡ ዘርአ፡
      ለሥራዊ፡ እምድር።
  - verse: 23
    geez: እስመ፡ በአበሳ፡ ካም፡ ስሕተ፡ ከናአን፡ ወኵሉ፡ ዘርአ፡ ይደመሰስ፡ እምድር፡ ወኵሉ፡ ተረፉ፡ ወዘይድኅን፡ አልቦ፡
      እምኔሁ፡ አመ፡ ዕለተ፡ ደይን።
  - verse: 24
    geez: ወለኵሎሙ፡ እለ፡ ያመልኩ፡ ጣዖተ፡ ወለ*ጽሉአን፡ አልቦሙ፡ ምንተኒ፡ ተስፋ፡ በምድረ፡ ሕያዋን፡ እስመ፡ ውስተ፡ ሲኦል፡
      ይወርዱ፡ ወውስተ፡ መካነ፡ ደይን፡ የሐውሩ፡ ወ*አልቦሙ፡ ምንተኒ፡ ዝክረ፡ በዲበ፡ ምድር፤ በከመ፡ ተንሥኡ፡ ውሉደ፡ ሰዶም፡
      እምድር፡ ከማሁ፡ ይትነሥኡ፡ ኵሎሙ፡ እለ፡ ያመልኩ፡ ጣዖተ።
  - verse: 25
    geez: አትፍራህ፡ ወልድየ፡ ያዕቆብ፡ ወአትደንግፅ፡ ወልደ፡ አብርሃም፤ አምላከ፡ ልዑል፡ ይዕቀብከ፡ *እም፡ ሙስና፡ ወእምኵሉ፡
      ፍኖተ፡ ስሕተት፡ ውእቱ፡ ይባልሕከ።
  - verse: 26
    geez: ዘንተ፡ ቤተ፡ ሐነጽኩ፡ ሊተ፡ ከመ፡ አንብር፡ ስምየ፡ ላዕሌሁ፡ በዲበ፡ ምድር፡ ተውህበት፡ ለከ፡ ወለዘርእከ፡ ለዓለም፡
      ወጎሳመይ፡ ቤተ፡ አብርሃም፤ ተውህበት፡ ለከ፡ ወለዘርእከ፡ ለዓለም፡ እስመ፡ አንተ፡ ተሃነጽ፡ ቤተየ፡ ወታቀውም፡ ስምየ፡
