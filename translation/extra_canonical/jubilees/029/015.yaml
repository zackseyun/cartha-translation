  rationale: The Ge'ez "አመ፡ አቅራቦት" (ama aqrābot) means "at the time of autumn" (likely completing the seasonal list from verse 14). The verb "ወይፌኑ" (wayefēnu) means "and he sent" or "he would send", not "he brought". The draft seems to have confused 'aqrābot with the root q-r-b ("to bring near").
