translation:
  text: '1. And it was told to Rebekah in a dream the words of Esau her older son.
    And Rebekah sent and called Jacob her younger son and said to him, “Look, Esau
    your brother is threatening you so as to kill you.

    2. And now, my son, listen to my voice. Rise and flee to Laban my brother, to
    Haran, and stay with him a few days, until your brother’s anger turns away,

    3. and until your brother’s anger leaves you and he forgets all that you did to
    him. Then I will send and bring you back from there.”

    4. And Jacob said, “I am not afraid. If he wants to kill me, I will kill him.”

    5. And she said to him, “Let me not be bereaved of both my sons in one day.”

    6. And Jacob said to Rebekah his mother, “Look, you know that my father has become
    old and does not see, because his eyes are dim. And if I leave him, it will be
    evil in his sight, because I have left him and gone away from you,

    7. and my father will be angry and curse me. I will not go; only if he sends me
    will I go.”

    8. And Rebekah said to Jacob, “I will go in and speak, and he will send you.”

    9. And Rebekah went in and said to Isaac, “I loathe my life because of the two
    daughters of Heth whom Esau has taken for himself as wives.

    10. And if Jacob takes a wife from among the daughters of the land like these,
    why should I still live? For the daughters of Canaan are evil.”

    11. And Isaac called Jacob and blessed him and charged him and said to him, “Do
    not take a wife for yourself from any of the daughters of Canaan.

    12. Rise and go to Mesopotamia, to the house of Bethuel, your mother’s father,
    and take for yourself a wife from there, from the daughters of Laban, your mother’s
    brother.

    13. And may God Almighty bless you and make you fruitful and multiply you, and
    may you become an assembly of nations.

    14. And may he give to you the blessing of my father Abraham, to you and to your
    seed after you, so that you may inherit the land of your sojourning and all the
    land that God gave to Abraham. Go, my son, in peace.”

    15. And Isaac sent Jacob away, and he went to Mesopotamia, to Laban son of Bethuel
    the Syrian, the brother of Rebekah, Jacob’s mother.

    16. And after Jacob had risen to go to Mesopotamia, the spirit of Rebekah was
    grieved after her son, and she wept.

    17. And Isaac said to Rebekah, “My sister, do not weep because of Jacob my son,
    for he will go in peace and return in peace.

    18. The Most High God will guard him from every evil and will be with him, for
    he will not forsake him all his days.

    19. For I know that his ways will prosper in everything wherever he goes, until
    he returns to us in peace and we see him in peace.

    20. Do not fear for him, my sister, for he is upright in his ways, and he is a
    complete man, and he is faithful. Do not weep.”

    21. And Isaac comforted Rebekah concerning Jacob her son, and he blessed him.

    22. And Jacob went out from the Well of the Oath to go to Haran in the first year
    of the second week of the forty-fourth jubilee. And he came to Luz, which is in
    the mountains, that is, Bethel, on the new moon of the first month of this week.
    And he came to the place at evening, and he turned aside from the road on that
    night, and he slept there, because the sun had set.

    23. And he took one of the stones of that place and put it under the tree, and
    he was there alone, and he slept.

    24. And he dreamed that night, and look, a ladder was set up on the earth, and
    its top reached to heaven. And look, the angels of the Lord were going up and
    coming down on it, and look, the Lord stood upon it.

    25. And he spoke with Jacob and said, “I am the Lord, the God of Abraham your
    father and the God of Isaac. The land on which you are sleeping I will give to
    you and to your seed after you.

    26. And your seed will be like the dust of the earth, and you will spread out
    to the west and the east and the north and the south. And in you and in your seed
    all the families of the nations will be blessed.

    27. And look, I will be with you and will keep you wherever you go, and I will
    bring you back into this land in peace. For I will not leave you until I have
    done everything that I have told you.”

    28. And Jacob awoke from his sleep and said, “Truly the house of the Lord is this
    place, and I did not know it.” And he was afraid and said, “How awesome this place
    is! This is nothing other than the house of the Lord, and this is the gate of
    heaven.”

    29. And Jacob rose early in the morning and took the stone that he had put by
    his head, and he set it up as a pillar for a sign, and he poured oil on its top.
    And he called the name of that place Bethel, though formerly the name of that
    region was Luz.

    30. And Jacob prayed a prayer to the Lord, saying, “If the Lord is with me and
    keeps me on this road on which I am going, and gives me bread to eat and clothing
    to wear,

    31. and I return to my father’s house in peace, then the Lord will be my God,
    and this stone that I have set up as a pillar for a sign in this place will be
    the house of the Lord. And of everything that you give me, I will surely give
    a tenth to you, my God.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: v22
    text: 'The chronological phrase is technical Jubilees language: ''the first year
      of the second week of the forty-fourth jubilee.'' Here ''week'' refers to a
      seven-year unit within jubilee reckoning, not an ordinary seven-day week.'
    reason: cultural_note
  - marker: v22
    text: The place-name in the source is given as 'the Well of the Oath,' corresponding
      to Beersheba.
    reason: cross_reference
  - marker: v23
    text: The clause rendered 'put it under the tree' is textually difficult in this
      Ethiopic row and may reflect a segmentation or transmission issue. A more expected
      parallel would place the stone under or at his head.
    reason: segmentation_note
  - marker: v24
    text: The expression translated 'ladder' could also be understood more broadly
      as a stairway or stepped ascent.
    reason: lexical_alternative
  - marker: v24
    text: The final clause literally places the Lord 'upon it' or 'in/over it'; the
      exact spatial relation is not entirely certain in the Ethiopic wording.
    reason: alternative_reading
