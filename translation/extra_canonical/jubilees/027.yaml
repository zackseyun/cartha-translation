  rows:
  - verse: 1
    geez: ወ*ተነግረ፡¹ ለርብቃ፡ በሕልም፡² ነገሩ፡³ ለዔሳው፡ ወልዳ፡ ዘይሌህቅ፡ ወፈነወት፡ ርብቃ፡ *ጸውዐት፡ ያዕቆብሃ፡⁴
      ወልዳ፡ ዘይንእስ፡ ወትቤሎ፡ ናሁ፡ ዔሳው፡ እኁከ፡ ይትቄየመከ፡ ከመ፡ ይቅትልከ።
  - verse: 2
    geez: ወ⁵ይእዜኒ፡ ወልድየ፡⁶ ስማዕ፡ ቃለየ፡ ወ*ተንሥእ፡ ወጐየይ፡⁷ ኀበ፡ ላባ፡ እኁየ፡ ሐራንሃ፡⁸ ወንበር፡ ምስሌሁ፡
      ኅዳጠ፡ መዋዕለ፡ እስከ፡ ይትመየጥ፡ መዐተ፡ እኁከ፡
  - verse: 3
    geez: ወየኀድግ፡⁹ መዐተ፡ እምኔከ፡ ወይረስዕ፡ ኵሎ፡ ዘመጠነ፡ ረሰይኮ። ወፈነውየ፡ አቄብለከ፡¹⁰ እምህየ።
  - verse: 4
    geez: ወይቤ፡ ያዕቆብ፡² እይፈርህ፡¹¹ እመ፡ ፈቀደ፡ ይቅትለኒ፡ እቅትሎ።
  - verse: 5
    geez: ወትቤሎ፡¹² ከመ፡ ኢይሥአን፡ *እምክልኤቱ፡ ውሉድየ፡¹³ በአሐቲ፡ ዕለት።
  - verse: 6
    geez: ወይቤላ፡ ያዕቆብ፡ ለርብቃ፡ እሙ፡ ናሁ፡ ታእምሪ፡ ከመ፡ ረሰአ፡ አቡየ፡ ወኢይሬኢ፡¹⁴ እስመ፡ ክቡዳ፡ አዕይንቲሁ፡
      ወእመኒ፡ ኀደግዎ፡ እኩይ፡ ውእቱ፡ በቅድመ፡ አዕይንቲሁ፡ *እስመ፡ አኀድጎ፡² ወአሐውር፡ እምኔክሙ፡
  - verse: 7
    geez: ወይትመዓዕ፡ አቡየ፡ ወይረግመኒ፡ ኢየሐውር፡ አመ፡¹⁵ ፈነወኒ፡ አማሃ፡¹⁶ ባሕቱ፡ አሐውር።
  - verse: 8
    geez: ወትቤሎ፡ ርብቃ፡ ለያዕቆብ፡ አነ፡ እበውእ፡ ወእነግር፡ ወይፈንወከ።¹⁷
  - verse: 9
    geez: ወቦአት፡ ርብቃ፡ ወትቤሎ፡ ለይስሐቅ፡ ገእዝኩ፡ ሕይወትየ፡ *እምክልኤሆን፡ አዋልደ፡¹⁸ ኬጥ፡ እለ፡ ነሥአ፡ ዔሳው፡
      ሎቱ፡¹⁹ አንስትያ፡
  - verse: 10
    geez: ወእመ፡ ነሥአ፡²⁰ ያዕቆብ፡ ብእሲተ፡ *እምውስተ፡ አዋልደ፡ ምድር፡ እለ፡ ከመ፡ እሉ፡²¹ ለምንት፡ ሊተ፡² እንከ፡
      አሐዩ፡ እስመ፡ እኩያት፡ አማንቱ፡² አዋልደ፡²² ከናአን።
  - verse: 11
    geez: ወጸውዐ፡ ይስሐቅ፡ ያዕቆብሃ፡²³ ወባረኮ፡² ወ'ነሠጾ፡² ወይቤሎ፡ ኢትነሣእ፡ ለከ፡²⁴ ብእሲተ፡ እም*ኵሉ፡²⁵ አዋልደ፡
      ከናአን፡
  - verse: 12
    geez: ተንሥእ፡ ወሖር፡ ውስተ፡² *ፄስጶጦሚያ፡²⁶ ቤተ፡ ባቱኤል፡ አቡሃ፡ ለእምከ፡ ወንሣእ፡ ለከ፡ ብእሲተ፡ እምህየ፡²⁷
      እምአዋልደ፡ ላባ፡ እኁሃ፡²⁸ ለእምከ።
  - verse: 13
    geez: ወአምላከ፡ ሰዳይ፡²⁹ ይባርከ፡ ወ³⁰ያልህቀ፡ ወያብዝኀከ፡ ወኩን፡ መክብበ፡ አሕዛብ፡
  - verse: 14
    geez: ወየሀብከ፡ በረከታቲሁ፡ ለአቡየ፡³¹ አብርሃም፡ ለከ፡ ወለዘርእከ፡ እምድኅሬከ፡³² ከመ፡ ትረሰ፡ ምድረ፡ ፍልሰትከ፡
      *ወኵላ፡ ምድረ፡³³ እንተ፡ ወሀቦ፡³⁴ እግዚአብሔር፡ ለ*አብርሃም፡ ሖር፡ ወልድየ፡ በሰላም።
  - verse: 15
    geez: ወፈነዎ፡ ይስሐቅ፡ ለያዕቆብ፡ ወሖረ፡ መስጶጦሚያ፡³⁵ ኀበ፡ ላባ፡³⁶ ወልደ፡ ባቱኤል፡ ሶርያዊ፡ እኁሃ፡ ለርብቃ፡
      እሙ፡³⁷ ለያዕቆብ።
  - verse: 16
    geez: ወኮነ፡ እምድኅረ፡ *ተንሥአ፡ ያዕቆብ፡ ሰሐዊረ፡³⁸ መስጶጦሚያ፡³⁹ ወሐዘነ፡ መንፈሰ፡ ርብቃ፡ ድኅረ፡ ወልዳ፡ ወትበኪ።
  - verse: 17
    geez: ወይቤላ፡ ይስሐቅ፡ ለርብቃ፡ እኅትየ፡ ኢትብከዪ፡⁴⁰ በእንተ፡ ያዕቆብ፡ ወልድየ፡ እስመ፡ በሰላም፡ የሐውር፡ ወበሰላም፡
      ይትመየጥ።
  - verse: 18
    geez: አምላክ፡ ልዑል፡ የዐቅቦ፡ እምኵሉ፡ እኩይ፡ ወይሄሉ፡ ምስሌሁ፡ እስመ፡ ኢየኀድጎ፡ ኵሎ፡ መዋዕሊሁ።
  - verse: 19
    geez: እስመ፡⁴¹ አአምር፡⁴² ከመ፡ ይሤራኅ፡⁴³ ፍኖዊሁ፡⁴⁴ በኵሉ፡ ውእደ፡⁴⁵ ሖረ፡ *እስከ፡ አመ፡⁴⁶ ይገብእ፡ በሰላም፡
      ኀቤነ፡ ወንሬእዮ፡ በሰላም።
  - verse: 20
    geez: ኢትፍርሂ፡ በእንቲአሁ፡ እኅትየ፡ እስመ፡ *ሪትዕ፡ በፍኖቱ፡⁴⁷ ውእቱ፡ ወፍጹም፡ ውእቱ፡ ብእሲ፡⁴⁸ ወ³⁰ምእመን፡
      ውእቱ፡ ወኢይትገደፍ፡ ኢትብከዪ።⁴⁹
  - verse: 21
    geez: ወይናዘዛ፡ ይስሐቅ፡ ለርብቃ፡ በእንተ፡ ያዕቆብ፡ ወልዳ፡ ወባረኮ።
  - verse: 22
    geez: ወወፅአ፡ ያዕቆብ፡ እምዐዘቆተ፡ መሐላ፡ ከመ፡ ይሖር፡ ሐራንሃ፡⁵⁰ በዓመት፡ ቀዳሚ፡ ዘሱባዔ፡ ካልእ፡ *ዘአርብዓ፡
      ወአርባዕቱ፡⁵¹ ኢዮቤል፡ወ፡ ወበጽሐ፡ ውስተ፡ *ሉዛ፡ እንተ፡ ውስተ፡ ደብር፡⁵² እንተ፡ ይእቲ፡ ቤቴል፡ በሠርቀ፡ ወርኅ፡
      ዘቀዳሚ፡ ዘዝ፡⁵³ ሱባዔ፡ ወበጽሐ፡ *መካነ፡ መሴየ፡⁵⁴ ወተገኅሠ፡ እምፍኖቱ፡ እንተ፡ ዐረበን፡ ለመንገደ፡ ዛቲ፡ ሌሊት፡
      ወኖመ፡ ህየ፡ እስመ፡ ዐረበ፡ ፀሐይ።
  - verse: 23
    geez: ወነሥአ፡ እምእብነ፡ ውእቱ፡ መካን፡ ወአንበረ፡ ታሕተ፡ ውእቱ፡ ዕፅ፡ ወውእቱ፡ ባሕቲቱ፡ የሐውር፡ ወኖመ።
  - verse: 24
    geez: ወሐለመ፡ በይእቲ፡ ሌሊት፡ ወናሁ፡ መዓርግ፡ ትክልት፡ ውስተ፡ ምድር፡ ወርእሳ፡ ትበጽፍ፡ ውስተ፡ ሰማይ፡ ወናሁ፡ መላእክተ፡
      እግዚአብሔር፡ የዐርጉ፡ ወይወርዱ፡ ባቲ፡ ወናሁ፡ እግዚአብሔር፡ ይቀውም፡ ውስቴታ።
  - verse: 25
    geez: ወተናገረ፡ ምስለ፡ ያዕቆብ፡ ወይቤ፡ አነ፡ ውእቱ፡ እግዚአብሔር፡ አምላከ፡ አብርሃም፡ አቡከ፡ ወአምላከ፡ ይስሐቅ፡
      ምድረ፡ እንተ፡ ዲቤሃ፡ አንተ፡ ትነውም፡ ለከ፡ እሁብ፡ ወለዘርእከ፡ እምድኅሬከ።
  - verse: 26
    geez: ወይከውን፡ ዘርእከ፡ ከመ፡ ኖላ፡ ምድር፡ ወትበዝኅ፡ ውስተ፡ ባሕር፡ ወጸባሕ፡ ወሰሜን፡ ወደቡብ፡ ወይትባረኩ፡ ብከ፡
      ኵሎሙ፡ በሐውርተ፡ አሕዛብ፡ ወበዘርእከ።
  - verse: 27
    geez: ወነየ፡ አነ፡ እሄሉ፡ ምስሌከ፡ ወእዐቅበከ፡ በኵለን፡ ወእዴ፡ ሖርከ፡ ወአገብአከ፡ ውስተ፡ ዛ፡ ምድር፡ በሰላም። እስመ፡
      ኢየኀድገከ፡ እስከ፡ ሶበ፡ እገብር፡ ኵሎ፡ ዘእቤለከ።
  - verse: 28
    geez: ወነቅሐ፡ ያዕቆብ፡ እምንዋሙ፡ ወይቤ፡ አማን፡ ቤቱ፡ ለእግዚአብሔር፡ ዝመካን፡ ወአነ፡ ኢየአመርኩ፡ ወፈርሀ፡ ወይቤ፡
      ግሩም፡ ዝንቱ፡ መካን፡ ዘአኮ፡ ምንትኒ፡ ዘእንበለ፡ ቤተ፡ እግዚአብሔር፡ ወዛቲ፡ አንቀጸ፡ ሰማይ።
  - verse: 29
    geez: ወገጸሰ፡ ያዕቆብ፡ በነግህ፡ ነሥአ፡ እብነ፡ ዘአንበረ፡ ኀበ፡ ርእሱ፡ ወአቀሞ፡ ሐውልተ፡ ለትእምርት፡ ወከዐወ፡ ቅብአ፡
      ዲበ፡ ርእሱ፡ ወሰመዮ፡ ስሞ፡ ለውእቱ፡ መካን፡ ቤቴል፡ ወቀዲሙ፡ ስሙ፡ ሉዛ፡ ለውእቱ፡ ብሔር።
  - verse: 30
    geez: ወጸለየ፡ ያዕቆብ፡ ጸሎተ፡ ለእግዚአብሔር፡ እንዘ፡ ይብል፡ እመ፡ ሀሎ፡ እግዚአብሔር፡ ምስሌየ፡ ወዐቀበኒ፡ በዛቲ፡
      ፍኖት፡ እንተ፡ ባቲ፡ እሐውር፡ አነ፡ ወወሀበኒ፡ ኅብስተ፡ እብላዕ፡ ወልብሰ፡ እልበስ፡
  - verse: 31
