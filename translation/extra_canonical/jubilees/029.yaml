translation:
  text: '1. And it came to pass, after Rachel had borne Joseph, that Laban went to
    shear his sheep, for he was three days'' journey away from him.

    2. And Jacob saw that Laban had gone to shear his sheep, and Jacob called Leah
    and Rachel and spoke to their hearts, that they should come with him to the land
    of Canaan.

    3. For he told them everything that he had seen in the dream, and everything that
    had been spoken to him, that he should go into his father''s house; and he had
    said to him, “Go in every place, and I will be with you.”

    4. And Jacob blessed the God of Isaac his father, and the God of Abraham, the
    father of his father; and he arose and took his wives and his children and all
    his possessions, and he crossed the River and arrived at

    5. the land of Gilead. And Jacob concealed his intention from Laban and did not
    tell him. And in the seventh year of the fourth week, Jacob turned toward Gilead
    in the first month, on the twenty-first; and Laban heard and pursued after him,
    and he overtook Jacob on the mountain of Gilead in the third month, on the thirteenth.

    6. And the Lord did not allow him to devise harm against Jacob, for he appeared
    to him in a dream

    7. by night and told Laban concerning Jacob. And on the fifteenth of those days
    Jacob made a feast for Laban and for all who had come with him, and Jacob swore
    to Laban on that day, and Laban also to Jacob, that neither would cross over to
    the other with evil intent, on the mountain of

    8. Gilead. And he made there a feast for a witness; therefore the name of that
    place was called

    9. “The Feast of Witness,” according to this feast. But formerly they used to
    call the land of Gilead the land of the Rephaim, for it is the land of the Rephaim,
    and the Rephaim were born there—giants whose height was ten cubits, and nine cubits,
    and eight cubits, and down to seven cubits was their stature.

    10. And their dwelling was from the land of the sons of Ammon as far as Mount
    Hermon, and the seats of

    11. their kingdom were Karnaim and Ashtaroth and Edrei and Misur and Beon. And
    the Lord destroyed them because of the evil of their deeds, for they were very
    lawless, and he caused the Amorites to dwell in their place—an evil and sinful
    people—and there is no people today that has completed the full measure of their
    sins, and they no longer have

    12. life upon the earth. And Jacob sent away Laban, and he went into Mesopotamia,
    the land of the east; and Jacob returned to the land of Gilead. And he crossed
    the Jabbok in the ninth month, on the eleventh; and on that day Esau his brother
    came to him, and he was reconciled with him,

    13. and he went away from him to the land of Seir, but Jacob dwelt in booths.
    And in the first year of the fifth week in this jubilee he crossed the Jordan
    and dwelt beyond the Jordan, and he pastured his sheep from the Sea of Heaps as
    far as Beth-shan, and as far as Dothan, and as far as

    14. the forest of Akrabboth. And he sent to Isaac his father from all his possessions
    clothing and food and drink and milk and butter and cheese,

    15. and some dates of the valley. And to his mother Rebekah also, four times in
    the year, between the times of the months, and between plowing and harvest, and
    between

    16. autumn and rain, and between winter and summer, to the cave of Abraham.

    17. For Isaac had returned from the Well of the Oath and had gone up to the cave
    of his father Abraham.

    18. And he dwelt there apart from Esau his son. For in the days when Jacob went
    to Mesopotamia, Esau took for himself Mahalath, the daughter of Ishmael, as a
    wife, and he gathered together all his father''s flocks and his wives, and he
    went up and dwelt on Mount Seir, and he left Isaac his father at

    19. the Well of the Oath alone. And Isaac went up from the Well of the Oath and
    dwelt in the cave of

    20. Abraham his father, on the mountain of Hebron. And there Jacob kept sending
    everything that he would send to his father and to his mother, from time to time,
    all that they needed; and they blessed Jacob with all their heart and with all
    their soul.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '5'
    text: The chronology in this verse is difficult because the pursuit and overtaking
      are linked across months. The translation preserves the stated dates rather
      than harmonizing them.
    reason: segmentation_note
  - marker: '9'
    text: The place-name explanation combines 'Gilead' with a memorial feast/witness
      etymology and then adds an older designation connected with the Rephaim. The
      chapter intentionally layers these traditions.
    reason: cross_reference
  - marker: '11'
    text: Several place-names in the Rephaim territory list are difficult in Ethiopic
      transmission; the English transliterations are conservative.
    reason: textual_variant
  - marker: '12'
    text: The clause 'they no longer have life upon the earth' may also be understood
      as 'there was no remnant of life left for them on the earth.'
    reason: alternative_reading
  - marker: '14'
    text: '''Sea of Heaps'' is an uncertain toponym in the Ethiopic. A different underlying
      place-name may stand behind it.'
    reason: lexical_alternative
  - marker: '16'
    text: The gift list includes dairy products and a difficult final produce term.
      'Dates of the valley' is a cautious rendering of an uncertain phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይቅርጽ
  chosen: shear
  alternatives:
  - clip
  - cut wool from
  rationale: Standard pastoral verb in context of sheep; 'shear' is the natural English
    equivalent and preserves the concrete setting.
- source_word: ተናገረ ውስተ ልቦን
  chosen: spoke to their hearts
  alternatives:
  - spoke with them privately
  - persuaded them
  rationale: The idiom literally involves the heart; 'spoke to their hearts' preserves
    Semitic texture while remaining understandable.
