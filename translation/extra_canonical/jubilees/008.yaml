  - verse: 22
    geez: ደቡብ፡ ምድረ፡ ቡርክት፡ ወስፍሕት፡ ወኵሉ፡ ዘውስቴታ፡ ጥቀ፡ ሠናይ። ወለካም፡ ወጠቅዐ፡ ወገብረ፡ ሎቱ፡ ፲ ፻ርአ፡
