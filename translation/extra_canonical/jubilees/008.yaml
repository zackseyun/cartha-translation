      ብእሲቱ፡ ሴደቃቴልባብ። ወናሁ፡ አህጉር፡ እላንቱ፡ 17 *ሠላስ፡ ቅሩበ፡ ሉባር፡ ደብር፡ ሴደቃቴልባብ፡ ቅድመ፡ ገጸ፡ ደብር፡
      በጽባሒሁ፡ ወነአልተ ማኡክ፡ ገጸ፡ ሰሜን፡ አደተኔሴስ፡ መንገለ፡ ባሕር። ወእሉ፡ ውሉደ፡ ሴም፡ ኤላም፡ ወአሱር፡ 18 ወአርፋክስድ፡
      ዝንቱ፡ ተወልደ፡ ክልኤ፡ ዓም፡ እምድኅረ፡ አይኅ፡ *ወሉድ፡ ወአራም። ውሉደ፡ 19 ኢያፌት፡ ጎሜር፡ ወማጉግ፡ ወማዳይ፡ ወኢዮአያ፡
      ተቤል፡ ወምስክ፡ ወቲራስ፡
