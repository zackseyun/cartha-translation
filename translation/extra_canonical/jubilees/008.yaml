      ለሴም። ወየሐውር፡ እስከ፡ ሶበ፡ ይቀርብ፡ ካራሶ፡ ዝውእቱ፡ ውስተ፡ ሕፅነ፡ ልሳን፡ እንተ፡ 13 ትኔጽር፡ መንገለ፡ ሰሜን።
      ወየሐውር፡ መክፈልቱ፡ እንተ፡ መንገለ፡ ባሕር፡ ዐቢይ፡ ወየሐውር፡ 14 ርቱዐ፡ እስከ፡ ይቀርብ፡ መንገለ፡ ዐረቢሃ፡ ለልሳን፡
      እንተ፡ ትኔጽር፡ መንገለ፡ ሰሜን፡ እስመ፡ ዛቲ፡ ባሕር፡ ስማ፡ ለዛ፡ ባሕረ፡ ገብጽ። ወትገምጽ፡ እምህየ፡ መንገለ፡ ሰሜን፡
