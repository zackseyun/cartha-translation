      ኀበ፡ ማየ፡ ጊዮን፡ ፈለገ፡ ወመንገለ፡ ሰሜኑ፡ ለማየ፡ ጊዮን፡ መንገለ፡ ድንጋጉ፡ ለዝ፡ ፈለገ። ወትሐውር፡ መንገለ፡ ጽባሕ፡
