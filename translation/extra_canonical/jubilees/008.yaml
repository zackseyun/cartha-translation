      እንዘ፡ ይነብር፡ አሐዱ፡ እምኔነ፡ አበ፡ ተፈነወኑ፡ ኀቤሆሙ፡ ወጸውዐ፡ ደቂቆ፡ ወቅርቡ፡ ኀቤሁ፡ እሙንቱ፡ ወደቂቆሙ፡ ወከፈሉ፡
      ምድረ፡ በዐባዊ፡ 11 ዘይእኅዙ፡ ሠለስቲሆሙ፡ ውሉዱ፡ ወበፍሑ፡ እደዊሆሙ፡ ወነሥኡ፡ መጽሐፈ፡ እምኅፅነ፡ *ኖኅ፡ አቡሆሙ።
      ወወጽአ፡ *በመጽሐፍ፡ ዕፃሁ፡ ለሴም፡ ማእከለ፡ ምድር፡ ዘይእኅዝ፡ 12 ለርስት፡ ወለውሉዱ፡ ለትውልድ፡ ዘለዓለም፡ እማእከለ፡
