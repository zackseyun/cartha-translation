  footnotes:
  - marker: a
    text: Several place-names in Shem's territorial allotment are difficult in the
      Ethiopic transmission (for example Rafa, Tina, Karaso, Me'at). They are transliterated
      or rendered conservatively rather than harmonized to later known geography.
    reason: segmentation_note
  - marker: b
    text: The phrase rendered 'copied it and sinned because of it' may also be understood
      as 'wrote it down and thereby transgressed,' the offense being possession or
      use of forbidden heavenly lore.
    reason: lexical_alternative
  - marker: c
    text: The list of violent offspring in vv. 33 reflects difficult traditional names
      in the Ethiopic text. The translation preserves their distinction without forcing
      a speculative identification.
    reason: textual_variant
  - marker: d
    text: Verse division in the source tradition is unstable in parts of this chapter
      because long chronological and legal sections are transmitted in expanded form.
      The English follows the chapter's narrative flow while preserving numbered lines.
    reason: segmentation_note
  - marker: e
    text: The wording behind 'release' in v. 52 is difficult; the sense is that in
      the fifth year the produce is treated according to a rule of release or free
      use after the firstfruits requirement.
    reason: lexical_alternative
lexical_decisions:
- source_word: እዮቤልው
  chosen: jubilee
  alternatives:
  - period
  - cycle
  rationale: Preserves Jubilees' formal chronological system rather than flattening
    into generic time language.
- source_word: ሱባዔ
  chosen: week
  alternatives:
  - heptad
  - week of years
  rationale: Rendered as 'week' in the text for readability, but used within jubilee
    chronology so the sabbatical structure remains visible.
- source_word: ትጉሃን
  chosen: Watchers
  alternatives:
  - wakeful ones
  - vigilant ones
  rationale: This is the established apocalyptic referent in context, denoting the
    angelic beings who taught illicit knowledge.
- source_word: ትእምረ፡ ሰማይ
  chosen: signs of heaven
  alternatives:
  - heavenly signs
  - heavenly portents
  rationale: Keeps the astronomical-omen context without overinterpreting as purely
    astrology or purely astronomy.
- source_word: ገነት ኤዶም
  chosen: Garden of Eden
  alternatives:
  - garden of Eden
  rationale: Conventional proper-name rendering; the text treats it as a real sacred
    locale in sacred geography.
- source_word: ቅድስተ ቅዱሳን
  chosen: holy of holies
  alternatives:
  - most holy place
  rationale: Preserves cultic superlative language and its theological connection
    to sanctuary holiness.
- source_word: ማእከለ / ሕንብርት ለምድር
  chosen: navel of the earth
  alternatives:
  - center of the earth
  - midst of the earth
  rationale: Retains the vivid cosmological image rather than smoothing it into abstract
    geography.
- source_word: ሲኦል
  chosen: Sheol
  alternatives:
  - the grave
  - underworld
  rationale: Transliteration preserves the ancient cosmological term without collapsing
    it into later doctrinal categories.
- source_word: ደመ
  chosen: blood
  alternatives: []
  rationale: Kept consistently because blood prohibition and bloodguilt are central
    theological themes in this chapter.
- source_word: ነፍስ
  chosen: life
  alternatives:
  - soul
  rationale: In the food-law context the sense is the life-force in the blood, not
    an abstract immaterial soul.
- source_word: ቀዳሜ ፍሬ
  chosen: firstfruits
  alternatives:
  - first produce
  - first yield
  rationale: Standard cultic English term that preserves the offering concept tied
    to sacred calendar observance.
- source_word: ጽድቅ / ፍትሐ
  chosen: righteousness / justice
  alternatives:
  - justice / righteousness
  rationale: Both terms are maintained distinctly where paired, preserving ethical
    fullness rather than collapsing them into one English word.
- source_word: መዓምቅቲሃ ለምድር
  chosen: the deep places of the earth
  alternatives:
  - abysses of the earth
  - depths of the earth
  rationale: Reflects the imprisonment of rebellious angels in subterranean depths
    with apocalyptic force.
- source_word: ሞገሰ
  chosen: favor
  alternatives:
  - grace
  rationale: In Noah's case the sense is divine favorable regard; 'favor' is clear
    and avoids importing later doctrinal freight unnecessarily.
theological_decisions:
- issue: Identity of the illicit heavenly teachers in Kainam's discovered text
  chosen_reading: Rendered as 'the Watchers' who taught omen-observation from heavenly
    bodies
  alternative_readings:
  - generic 'watchers' without technical force
  - human sages
  rationale: The chapter's wider Enochic framework strongly supports the technical
    apocalyptic sense of rebellious angelic Watchers.
  doctrine_reference: Preserve theological tension and apocalyptic density; do not
    flatten Jubilees into generic paraphrase.
- issue: Sacred geography of Eden, Sinai, and Zion
  chosen_reading: Translated as three created holy places facing one another, with
    Eden as the holy of holies
  alternative_readings:
  - symbolic comparison only
  - later harmonized temple theology
  rationale: The Ge'ez presents a concrete sacred-geographical theology; the translation
    preserves that claim without reduction.
- issue: Blood prohibition and life in the blood
  chosen_reading: Rendered as a perpetual moral-covenantal command tied to bloodguilt
    and cleansing of the land
  alternative_readings:
  - mere dietary rule
  - purely ritual restriction
  rationale: The chapter explicitly links eating blood, murder, judgment, and the
    cleansing of the earth; the translation keeps those links visible.
- issue: Chronological terminology
  chosen_reading: Retained jubilee/week/year structure throughout
  alternative_readings:
  - convert to ordinary years only
  - compress chronology
  rationale: Jubilees' theology is inseparable from its calendrical structure; preserving
    the chronology is doctrinally and literarily necessary.
