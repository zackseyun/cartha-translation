translation:
  text: '1. In the forty-ninth jubilee, in the first week, in its first year, Arpachshad
    took a wife for himself, and her name was Rasu''eja, the daughter of Susan, the
    daughter of Elam.

    2. And she bore him a son in the third year of this week, and he called his name
    Kainam.

    3. And the boy grew, and his father taught him writing. And he went to seek for
    himself a place where he might seize a city for himself. And he found a writing
    which the ancients had cut on a rock, and he read what was in it.

    4. And he copied it and sinned because of it, for there was in it the teaching
    of the Watchers by which they used to observe the omens of the sun and moon and
    stars in all the signs of heaven.

    5. And he wrote it down and said nothing about it, because he was afraid to tell
    Noah about it, lest he be angry with him because of it.

    6. And in the thirtieth jubilee, in the second week, in the first year, he took
    for himself a wife, and her name was Melka, the daughter of Madai, the son of
    Japheth; and in the fourth year she bore him a son, and he called his name Shelah,
    for he said, "Truly I have been sent."

    7. And Shelah grew up and took a wife for himself, and her name was Mu''ak, the
    daughter of Kesed, his father''s brother, in the first year of the fifth week
    of the thirty-first jubilee. And in the fifth year she bore him a son, and he
    called his name Eber. And Eber took a wife for himself, and her name was Azurad,
    the daughter of Nebrod, in the third year of the seventh week of the thirty-second
    jubilee.

    8. And in the sixth year she bore him a son, and he called his name Peleg, because
    in the days when he was born the sons of Noah began to divide the earth among
    themselves; therefore he called his name Peleg.

    9. And they divided it secretly among themselves, and they told it to Noah.

    10. And it came to pass in the beginning of the thirty-third jubilee that they
    divided the earth into three portions for Shem and Ham and Japheth, each according
    to his inheritance, in the first year in the first week, while one of us who had
    been sent was dwelling with them.

    11. And he called his sons, and they came near to him, they and their children,
    and he divided the earth into the lots which his three sons would possess. And
    they stretched out their hands and took the writing from the bosom of Noah their
    father.

    12. And there came forth by lot for Shem the middle of the earth, which he should
    take as an inheritance for himself and for his sons for the generations of eternity:
    from the middle of the mountain range of Rafa, from the mouth of the waters from
    the river Tina.

    13. And his portion goes toward the west through the midst of this river, and
    it goes on until it approaches the waters of the abyss, from which this river
    comes forth; and its waters pour into the Sea Me''at. And this river goes into
    the Great Sea.

    14. And all that is toward the south belongs to Japheth, and all that is toward
    the north belongs to Shem. And it goes on until it approaches Karaso—this is in
    the bosom of the tongue that looks toward the north.

    15. And his portion goes along toward the Great Sea, and it goes straight on until
    it approaches the western side of the tongue that looks toward the north, for
    this sea is named the tongue of the Egyptian Sea.

    16. And it turns from there toward the north, toward the mouth of the Great Sea,
    at the waters'' edge, and it goes on to the region of Africa, and it goes on until
    it approaches the waters of the river Gihon.

    17. And it goes along the north side of the waters of Gihon, toward the bank of
    this river, and it goes toward the east until it approaches the Garden of Eden,
    to the south of it, to the south and east of the whole land of Eden and of the
    whole east.

    18. And it turns to the east and comes on until it approaches the east of the
    mountain whose name is Rafa, and it descends toward the mouth of the river Tina.
    This portion came forth by lot for Shem and for his sons, that they should possess
    it forever, for his generations forever.

    19. And Noah rejoiced that this portion came forth for Shem and for his sons,
    and he remembered all that he had spoken with his mouth in prophecy, for he had
    said, "Blessed be the LORD, the God of Shem, and may the LORD dwell in the dwelling
    of Shem."

    20. And he knew that the Garden of Eden is the holy of holies and the dwelling
    of the LORD, and Mount Sinai is in the midst of the desert, and Mount Zion is
    in the midst of the navel of the earth. These three were created as holy places
    facing one another.

    21. And he blessed the God of gods, who had put the word of the LORD into his
    mouth, and the LORD forevermore. And he knew that a blessed and broad portion
    had come to Shem and to his sons for the generations of eternity:

    22. all the land of Eden and all the land of the Erythraean Sea, and all the land
    of the east, and India, and on the Erythraean Sea and its mountains, and all the
    land of Bashan, and all the land of Lebanon and the islands of Caphtor, and all
    the mountains of Senir and Amana, and the mountains of Asshur in the south, and
    all the land of Elam, Asshur, and Babylon, and Susan and Madai, and all the mountains
    of Ararat, and all the region beyond the sea beyond the mountains of Asshur toward
    the north—a blessed and spacious land, and all that is in it is very good.

    23. And Ham knew that his father had cursed his youngest son, and he separated
    from his father, he and his sons with him: Cush and Mizraim and Put and Canaan.

    24. And he built for himself a city and called its name after the name of his
    wife, Ne''elatama''uk.

    25. And Japheth saw it and became jealous of his brother, and he too built for
    himself a city and called its name after the name of his wife, Adataneses.

    26. But Shem dwelt with his father Noah, and he built a city near his father,
    by the mountain, and he called its name after the name of his wife, Sedeqetelebab.

    27. And behold, these three cities are near Mount Lubar: Sedeqetelebab in front
    of the mountain toward the east, Ne''elatama''uk toward the south, and Adataneses
    toward the west.

    28. And these are the sons of Shem: Elam and Asshur and Arpachshad—this one was
    born two years after the flood—and Lud and Aram.

    29. The sons of Japheth: Gomer and Magog and Madai and Javan, Tubal and Meshech
    and Tiras.

    30. And the sons of Ham: Cush and Mizraim and Put and Canaan.

    31. And Noah began to command his sons'' sons with ordinances and commandments
    and all the judgments that he knew, and he testified to his sons that they should
    do righteousness, and cover the shame of their flesh, and bless their Creator,
    and honor father and mother, and love each his brother, and guard their souls
    from fornication and uncleanness and all injustice.

    32. For because of these three things the flood came upon the earth—namely, because
    of the fornication by which the Watchers defiled themselves with the daughters
    of men, taking for themselves wives from all whom they chose, and they made a
    beginning of uncleanness;

    33. and they begot sons, the Naphidim, and they were all unlike one another, and
    they devoured one another; and the giant killed the Naphil, and the Naphil killed
    the Elyo, and the Elyo humankind, and one man another.

    34. And everyone sold himself to work injustice and to pour out much blood, and
    the earth was filled with injustice.

    35. And after this they sinned against the beasts and the birds and everything
    that moves and everything that walks upon the earth, and much blood was shed on
    the earth; and every imagination and desire of man imagined vanity and evil continually.

    36. And the LORD destroyed everything from the face of the earth because of the
    wickedness of their deeds and because of the blood which they had poured out in
    the midst of the earth; he destroyed everything.

    37. And we were left, I and you, my sons, and everything that entered with us
    into the ark.

    38. And behold, I see your works before me, that you do not walk in righteousness;
    for in the path of destruction you have begun to walk, and you are separating
    from one another and envying one another, and you are not united, my sons, each
    with his brother.

    39. For I see, and behold, the demons have begun to lead you and your children
    astray, and now I fear for you, that after my death you will shed the blood of
    men upon the earth, and you also will be destroyed from the face of the earth.

    40. For everyone who sheds the blood of man, and everyone who eats the blood of
    any flesh, will all be destroyed from the earth.

    41. And no man who eats blood or who sheds the blood of man on the earth will
    be left; nor will seed or descendants remain for him under heaven.

    42. For they will go down into Sheol, and into the place of judgment they will
    descend, and into the darkness of the deep they will all go by a violent death.

    43. Let no blood appear upon you from all the blood there shall be in all the
    days in which you slaughter any beast or cattle or bird or whatever moves upon
    the earth.

    44. And do a good deed for your souls by covering what is poured out on the face
    of the earth.

    45. And do not be like one who eats with the blood, but be careful that they do
    not eat blood before you. Pour out the blood, for thus I have been commanded to
    testify to you and to your children together with all flesh.

    46. And do not eat the life with the flesh, lest your blood, which is your life,
    be required from the hand of every flesh that sheds blood on the earth.

    47. For the earth will not be cleansed from the blood that is shed upon it, except
    by the blood of the one who shed it will the earth be cleansed throughout all
    its generations.

    48. And now, my children, listen: do justice and righteousness, so that you may
    be planted in righteousness over the face of the whole earth, and your glory may
    be lifted up before my God, who saved me from the waters of the flood.

    49. And behold, you shall go and build for yourselves cities, and plant in them
    every plant that is on the earth, and every fruit-bearing tree.

    50. For three years its fruit shall not be gathered from anything that is eaten;
    but in the fourth year its fruit shall be holy, the firstfruits acceptable before
    the Most High LORD, who created heaven and earth and everything.

    51. Let them bring up in abundance the first of the wine and oil as firstfruits
    to the altar of the LORD, who receives it; and what is left let the servants of
    the house of the LORD eat before the altar that receives it.

    52. And in the fifth year make the release of it, so that you may release it in
    righteousness and uprightness, and you will be righteous, and all your planting
    will prosper.

    53. For thus Enoch, your father''s father, commanded Methuselah his son, and Methuselah
    commanded Lamech his son, and Lamech commanded me all the things that his fathers
    commanded him.

    54. And I also command you, my sons, as Enoch commanded his son in the first jubilees
    while he was still alive, in the seventh generation. He commanded and testified
    to his son and to his sons'' sons until the day of his death.'
