  rows:
  - verse: 1
    geez: ወበ፬ሥራ፡ ወተስዐቱ፡ እዮቤልው፡ በሱባዔ፡ ቀዳሚ፡ በቀዳሚሁ፡ ነሥአ፡ ሎቱ፡ አርፋክስድ፡ ብእሲተ፡ ወስማ፡ ራሱእያ፡
      *ወለተ፡ ሱሳን፡ ወለተ፡ ኤላም፡ [ሎቱ፡ ብእሲተ፡] ወወለደት፡ ሎቱ፡
  - verse: 2
    geez: ወልደ፡ በዓመተ፡ ሣልስ፡ በሱባዔ፡ ዝንቱ፡ ወጸውዐ፡ ስሞ፡ ቃይናም፡። ወልህቀ፡ ወልድ፡
  - verse: 3
    geez: ወመሀሮ፡ አቡሁ፡ መጽሐፈ፡ ወሖረ፡ ይኅሥሥ፡ ሎቱ፡ መካነ፡ ኀበ፡ ይእኅዝ፡ ሎቱ፡ ሀገረ። ወረከበ፡ መጽሐፈ፡ ዘቈረጹ፡
      ቀደምት፡ ውስተ፡ ኰኵሕ፡ ወአንበበ፡ ዘውስተታ፡ ወአዕለዎ፡ ወረከበ፡ እምውስተታ፡ ከመ፡ ሀሎ፡ ውስተታ፡ ትምህርተ፡ ትጉሃን፡
      በዘ፡ ይሬስዩ፡ ሰገለ፡ *ፀሓይ፡
  - verse: 4
    geez: ወወርኅ፡ ወከዋክብት፡ ውስተ፡ ኵሉ፡ ትእምረ፡ ሰማይ። ወጸሐፋ፡ ወአነገረ፡ በእንቲአሃ፡
  - verse: 5
    geez: እስመ፡ ይፈርህ፡ ለኖኅ፡ ነጊረ፡ በእንቲአሃ፡ ከመ፡ ኢይትመዐዐ፡ ላዕሌሁ፡ በእንቲአሃ። ወአመ፡ ፭ ኢዮቤልው፡ በሱባዔ፡
      ፩አክ፡ በቀዳማ፡ ዓመት፡ ነሥአ፡ ሎቱ፡ ብእሲተ፡ ወስማ፡ *ሜልካ፡ ወለተ፡ አመዳይ፡ ወልደ፡ ያፌት፡ ወበዓመት፡ ራብዕ፡ ሎቱ፡
      ወሊደ፡ ወልደ፡ ወጸውዐ፡ ስሞ፡ ሳላ፡
  - verse: 6
    geez: እስመ፡ ይቤ፡ *ተፈንዎ፡ ተፈነውኩ፡ ወበዓመተ፡ ራብዕ፡ ተወልደ፡ ወልህቀ፡ ሳላ፡ ወነሥአ፡ ሎቱ፡ ብእሲተ፡ ወስማ፡
      *መልካ፡ ወለተ፡ ኬቤድ፡ አኀወ፡ አቡሁ፡ [ሎቱ፡ ብእሲተ፡] በቀዳሚ፡ ወበሠላስ፡ እዮቤልው፡ በሱባዔ፡ ኃምስ፡ በቀዳሚ፡ ዓመት።
      ወወለደት፡ ሎቱ፡ ወልደ፡ በኃምስ፡ 7 ዓመት፡ ወጸውዐ፡ ስሞ፡ ኤቤር፡ ወነሥአ፡ ሎቱ፡ ብእሲተ፡ ወስማ፡ አዙራድ፡ ወለተ፡
      ኔብሮድ፡ በሠላስ፡ ወክልኤቱ፡ *እዮቤልው፡ በሱባዔ፡ ሳብዕ፡ በሣልስ፡ ዓመት። ወበሳድስ፡ ዓመት፡ 8 ወለደት፡ ሎቱ፡ ወልደ፡
      ወጸውዐ፡ ስሞ፡ ፋሌክ፡ እስመ፡ በመዋዕሊ፡ ዘተወልደ፡ እንኵ፡ ደቂቀ፡ ኖኅ፡ ይትካፈሉ፡ ሎሙ፡ ምድረ፡ በእንተዝ፡ ጸውዐ፡
      ስሞ፡ ፋሌክ። ወተካፈሉ፡ በአኩይ፡ 9 በበይናቲሆሙ፡ ወነገርዎ፡ ለኖኅ። ወኮነ፡ በቀዳሚሁ፡ *ሠላስ፡ ወሠለስቱ፡ እዮቤልው፡
