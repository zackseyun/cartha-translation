  - verse: 21
    geez: ወእግዚአብሔር፡" እስከ፡ ለዓለም። ወአእመረ፡ ከመ፡ መክፈልተ፡ በረከት፡ ወቡራኬ፡" በጽሐ፡' ለሴም፡ ወለውሉዱ፡ ለትውልድ፡
