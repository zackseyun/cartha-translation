translation:
  text: Why—am I a single place? I am one; the other you reckon to go toward in your
    clamor, for I will judge. I am among the called ones, and I will bring to light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “A single place” reads ⲟⲩⲏⲛ ⲧⲟⲡⲟⲥ; ⲟⲩⲏⲛ is taken as “one/single” (cf. Gk.
      ἕν). The article/number sequence is irregular and could reflect a damaged line.
    reason: alignment_note
  - marker: b
    text: Verb restored as ⲕⲣⲓⲛⲉ (to judge) from the fragment ϯⲛⲁⲕⲣ…; consistent with
      Greek loan κρίνω. If misread, alternatives include “separate” or “decide.”
    reason: textual_variant
  - marker: c
    text: ⲛⲉⲧⲕⲗⲏϣ is read as “the called ones” (cf. κλῆσις/κλητός). It could alternatively
      be “those of the calling” (abstract noun).
    reason: lexical_alternative
  - marker: d
    text: ϣⲟϫⲛⲉ is glossed “clamor/outcry.” If the context is more introspective,
      “tumult” might be preferred.
    reason: lexical_alternative
  - marker: e
    text: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ is an idiom for “bring to light; make manifest.” Some editors
      prefer “reveal.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲁ
  chosen: why
  alternatives:
  - for what reason
  - how so
  lexicon: Crum; Layton (interrogative particle)
  rationale: Standard Sahidic interrogative used to introduce rhetorical questions
    in Thunder.
- source_word: ⲟⲩⲏⲛ ⲧⲟⲡⲟⲥ
  chosen: a single place
  alternatives:
  - one place
  - one locus
  lexicon: Greek loan (τόπος) via Coptic; Crum (ⲧⲟⲡⲟⲥ)
  rationale: ⲧⲟⲡⲟⲥ is the Greek loan for “place.” The preceding ⲟⲩⲏⲛ likely reflects
    Greek ἕν (“one”), yielding “a single place.”
- source_word: ⲁⲛⲟⲕ
  chosen: I am
  alternatives:
  - I
  - it is I
  lexicon: Crum (ⲁⲛⲟⲕ)
  rationale: Maintain the poem’s repeated first-person assertions; do not drop “I
    am.”
- source_word: ⲟⲩⲁ
  chosen: one
  alternatives:
  - a single one
  - a unity
  lexicon: Crum (ⲟⲩⲁ)
  rationale: Retain the numeric/paradoxical force that plays against “the other.”
- source_word: ⲕⲉⲟⲩⲁ
  chosen: the other
  alternatives:
  - another one
  - the second
  lexicon: Crum (ⲕⲉ “other” + ⲟⲩⲁ “one”)
  rationale: Compound literally means “another one”; “the other” sharpens the paradox
    with “I am one.”
- source_word: ⲙⲉⲉⲩⲉ
  chosen: reckon
  alternatives:
  - think
  - imagine
  - consider
  lexicon: Crum; Layton (ⲙⲉⲉⲩⲉ “think, consider”)
  rationale: Choose “reckon” to keep a concrete, active sense without smoothing the
    idiom; preserves cadence.
- source_word: ⲧⲱⲉⲓ
  chosen: go toward
  alternatives:
  - go
  - set out toward
  lexicon: Crum (ⲧⲱⲉⲓ “go, travel”)
  rationale: “Go toward” reflects movement implied in the context and keeps prepositional
    feel with ϩⲛ/goal.
- source_word: ϣⲟϫⲛⲉ
  chosen: clamor
  alternatives:
  - shout
  - uproar
  - outcry
  lexicon: Crum (ϣⲟϫⲛ “noise, tumult, outcry”)
  rationale: “Clamor” captures communal noisy opposition and suits the poem’s confrontational
    tone.
- source_word: ϯⲛⲁⲕⲣⲓ(ⲛⲉ)
  chosen: I will judge
  alternatives:
  - I will decide
  - I will pass judgment
  lexicon: Greek loan κρίνω via Coptic (ⲕⲣⲓⲛⲉ)
  rationale: Future marker ϯⲛⲁ- + Greek root suggests “I will judge.” Parenthetical
    letters indicate truncated OCR.
- source_word: ⲛⲉⲧⲕⲗⲏϣ
  chosen: the called ones
  alternatives:
  - those of the calling
  - those who are called
  lexicon: Greek loan κλῆσις/κλητός via Coptic
  rationale: Form appears to reflect the κλη- root; “the called ones” preserves nominal
    group and theological resonance.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: bring to light
  alternatives:
  - make manifest
  - bring out
  - reveal
  lexicon: Crum (ⲟⲩⲱⲛϩ “live; to make alive; to illuminate/manifest” idiomatically
    with ⲉⲃⲟⲗ)
  rationale: The idiom with ⲉⲃⲟⲗ regularly means “make manifest; bring to light.”
parallelism_check: The rendering preserves the antithesis of “one/the other,” and
  retains multiple first-person assertions (“I am … I will judge … I am … I will bring
  to light”). The juxtaposition of “I am one” with “the other you reckon to go toward”
  keeps the poem’s paradox without smoothing it. Cadence relies on short clauses and
  a mid-line caesura after the initial “Why—am I a single place?”
voice_check: Maintains the authoritative first-person “I am” voice characteristic
  of Thunder. Verbs remain active and declarative (“I am,” “I will judge,” “I will
  bring to light”), avoiding subordination that would weaken the speaker’s immediacy.
