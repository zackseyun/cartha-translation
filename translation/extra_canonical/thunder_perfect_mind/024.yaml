translation:
  text: 'Let the wise be wise.

    For I am knowledge and ignorance.

    I am shame and boldness.

    I am without shame; I am bashfulness.

    I am fear too.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Parrhesia (ⲡⲁⲣⲣⲏⲥⲓⲁ) can mean frank speech, outspokenness, or confident
      boldness in public.
    reason: lexical_alternative
  - marker: b
    text: ϫⲓⲡⲏⲧ is a distinct term from ϣⲓⲡⲉ; it often denotes modesty or bashfulness
      rather than disgrace.
    reason: lexical_alternative
  - marker: c
    text: The initial line could be read as “Wise ones, be wise,” depending on how
      the jussive ⲙⲁⲣⲟⲩ is construed with ⲥⲟⲩⲱⲛⲧ.
    reason: alignment_note
lexical_decisions:
- source_word: ⲥⲟⲩⲱⲛⲧ ⲙⲁⲣⲟⲩ ⲥⲟⲩⲱⲛⲧ
  chosen: Let the wise be wise
  alternatives:
  - Let those who are wise be wise
  - Wise ones, be wise
  lexicon: Crum, Coptic Dictionary (s.v. ⲥⲟⲩⲱⲛ; note ⲙⲁⲣⲟⲩ jussive)
  rationale: ⲥⲟⲩⲱⲛ = be wise; nominal/participle ⲥⲟⲩⲱⲛⲧ as “the wise.” ⲙⲁⲣⲟⲩ marks
    a third-person jussive. Rendering preserves the imperative-jussive cadence.
- source_word: ⲡⲥⲟⲟⲩⲛ
  chosen: knowledge
  alternatives:
  - understanding
  - knowing
  lexicon: Crum (s.v. ⲥⲟⲟⲩⲛ)
  rationale: Common noun for “knowledge”; straightforward here in first-person identity
    formula.
- source_word: ⲧⲙⲛⲧⲁⲧⲥⲟⲟⲩⲛ
  chosen: ignorance
  alternatives:
  - lack of knowledge
  - unknowing
  lexicon: Crum (s.v. ⲙⲛⲧⲁⲧⲥⲟⲟⲩⲛ)
  rationale: Standard abstract for negated knowledge. “Ignorance” preserves the paradox
    with “knowledge.”
- source_word: ⲡϣⲓⲡⲉ
  chosen: shame
  alternatives:
  - disgrace
  - shamefacedness
  lexicon: Crum (s.v. ϣⲓⲡⲉ)
  rationale: Basic sense “shame” fits the antithetical pair with ⲡⲁⲣⲣⲏⲥⲓⲁ.
- source_word: ⲧⲡⲁⲣⲣⲏⲥⲓⲁ
  chosen: boldness
  alternatives:
  - frankness
  - outspokenness
  - freedom of speech
  lexicon: Loan from Gk. παρρησία; Crum (s.v. ⲡⲁⲣⲣⲏⲥⲓⲁ)
  rationale: Parrhesia is public frankness/confident speech; “boldness” captures the
    rhetorical force and pairs well with “shame.”
- source_word: ⲟⲩⲁⲧϣⲓⲡⲉ
  chosen: without shame
  alternatives:
  - shameless
  - unashamed
  lexicon: Crum (prefix ⲟⲩⲁⲧ- “without” + ϣⲓⲡⲉ)
  rationale: Compound conveys privation; “without shame/shameless” carries the paradox
    with the following term.
- source_word: ϫⲓⲡⲏⲧ
  chosen: bashfulness
  alternatives:
  - modesty
  - shamefacedness
  lexicon: Crum (s.v. ϫⲓⲡⲏⲧ)
  rationale: Often denotes modesty/bashfulness distinct from ϣⲓⲡⲉ (shame); maintains
    a sharpened paradox with “without shame.”
- source_word: ⲛⲁϣⲧⲉ
  chosen: fear
  alternatives:
  - dread
  - terror
  lexicon: Crum (s.v. ⲛⲁϣⲧⲉ)
  rationale: Common noun “fear”; final ⲁⲩⲱ (‘and’) suggests continuation; “too” reflects
    the additive force.
parallelism_check: 'The translation preserves the balanced antitheses: knowledge/ignorance;
  shame/boldness; without shame/bashfulness; and closes with a further self-identification
  (“I am fear”) maintaining the anaphoric “I am” series. The initial jussive line
  stands as a separate imperative that introduces the paradoxes, matching the source’s
  cadence.'
voice_check: First-person revelatory voice is preserved with repeated “I am” formulas;
  no smoothing of contradictions; the tone remains declarative and paradoxical.
