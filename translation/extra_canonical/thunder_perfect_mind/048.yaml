translation:
  text: And do not call me “lawlessness.” I am the one you have chased after me; and
    I am the one you have seized; I am the one you have cried out openly— and you
    did not know.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Lawlessness’ renders anomia; alternatives include ‘law‑breaking’ or ‘iniquity,’
      but these either soften or theologize the charge-title.
    reason: lexical_alternative
  - marker: b
    text: OCR shows ⲛⲥⲱⲥ (‘after him/her’), but Thunder’s formula and nearby ⲙⲙⲟⲉⲓ
      (‘me’) suggest ⲛⲥⲁⲓ (‘after me’). Rendering keeps ‘me’ while noting possible
      OCR error.
    reason: alignment_note
  - marker: c
    text: ϫⲟⲟⲩ ⲉⲃⲟⲗ can be ‘cry out’ or ‘proclaim’ with an outward/public nuance;
      ‘proclaimed openly’ is a valid alternative.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲟⲩⲧⲉ
  chosen: call/name
  alternatives:
  - name
  - label
  lexicon: Crum; Layton
  rationale: Common verb for ‘to call, to name’; negative 2nd-pl imperative construction
    retained as direct address.
- source_word: ⲁⲛⲟⲙⲓⲁ
  chosen: lawlessness
  alternatives:
  - law-breaking
  - iniquity
  lexicon: Greek loanword anomia via Coptic; Crum; LSJ (for Greek)
  rationale: Anomia regularly = ‘lawlessness’. Avoids theological overtones of ‘iniquity’
    and keeps the stark charge-title being rejected.
- source_word: ⲡⲱⲧ (with ⲛⲥⲁⲓ/ⲛⲥⲱⲥ)
  chosen: chased after
  alternatives:
  - pursued
  - ran after
  lexicon: Crum; Layton
  rationale: ⲡⲱⲧ with ⲛⲥⲁⲓ means ‘run/pursue after me’. OCR shows ⲛⲥⲱⲥ (after him/her),
    likely misread for ‘after me’; we keep the pursuit sense and retain ‘me’ per context.
- source_word: ⲙⲁϩⲧⲉ
  chosen: seize
  alternatives:
  - grasp
  - arrest
  - take hold of
  lexicon: Crum
  rationale: In Thunder, this verb often conveys physical/spiritual grasping; ‘seize’
    keeps the sharper edge.
- source_word: ϫⲟⲟⲩ ⲉⲃⲟⲗ
  chosen: cried out openly
  alternatives:
  - proclaimed openly
  - shouted forth
  - spoke out
  lexicon: Crum
  rationale: ϫⲟⲟⲩ = cry/call out; ⲉⲃⲟⲗ adds the outward/public nuance. ‘Cried out
    openly’ preserves rawness; ‘proclaimed’ is a smoother alternative.
- source_word: ⲥⲟⲟⲩⲛ
  chosen: know
  alternatives:
  - recognize
  - understand
  lexicon: Crum
  rationale: Basic verb ‘to know’; context highlights ignorance despite pursuit and
    proclamation, so the simple ‘know’ is best.
parallelism_check: 'The block keeps the repetitive ‘I am’ core: three relative-perfect
  clauses (‘I am the one you have chased … seized … cried out …’) capped by ‘and you
  did not know.’ The opening negative imperative (‘do not call me “lawlessness”’)
  stands as a balancing antithesis to the subsequent self-identifications. Cadence
  is stair-stepped pursuit→seizure→public outcry→ignorance; all three ‘I am’ statements
  are preserved without smoothing.'
voice_check: First-person authoritative ‘I’ addressing a plural ‘you’ is preserved
  with imperatival warning and paradoxical self-assertion. The diction remains sharp
  and direct, matching Thunder’s commanding, enigmatic voice.
