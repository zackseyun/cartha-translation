translation:
  text: 'I am she who cries out,

    and I am cast out upon the face of the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Coptic for “upon the face (surface)” is only partially preserved here;
      the full idiom “upon the face of the earth” is supplied by context and parallels.
    reason: alignment_note
  - marker: b
    text: ⲕⲁ ⲉⲃⲟⲗ can be rendered “cast forth” or “send out”; we prefer “cast out”
      to retain the expulsive edge of the paradox.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲭⲣⲟⲉⲓ
  chosen: cry out
  alternatives:
  - cry aloud
  - shout
  - proclaim
  lexicon: Crum; Layton, Coptic in 20 Lessons (verb for loud calling/crying)
  rationale: The verb denotes an audible, outward call. “Cry out” preserves the sharpness
    and keeps the vocal, public force without softening to “proclaim.”
- source_word: ⲕⲁ ⲉⲃⲟⲗ
  chosen: cast out
  alternatives:
  - cast forth
  - throw out
  - hurl out
  - send out
  lexicon: 'Crum (ⲕⲁ: throw, cast) + common directional ⲉⲃⲟⲗ ‘out’'
  rationale: The collocation naturally yields “cast out,” which keeps the passive,
    expulsive nuance and the starkness of rejection more than the neutral “send out.”
- source_word: ϩⲙ ⲡϫⲓⲛⲓ (partially preserved)
  chosen: upon the face (surface)
  alternatives:
  - upon the surface
  - upon the face
  lexicon: Crum (root for ‘front/face/surface’ in set phrase)
  rationale: Though partially preserved, the context strongly points to the idiomatic
    surface/face; paired with “cast out,” the expected complement is the ‘face (surface)
    of the earth.’ Retaining ‘face’ preserves the idiom’s strangeness and cadence.
parallelism_check: 'The line preserves the balanced paradox: two first-person self-identifications
  linked by ‘and.’ The first asserts vocal presence (“I am she who cries out”); the
  second asserts rejection/exposure (“I am cast out upon the face of the earth”).
  The parallel “I am … / I am …” structure is kept intact and unsmoothed.'
voice_check: The speaker’s self-assertive, paradoxical first-person voice is preserved
  with explicit feminine marking (“she”), matching the poem’s persona. The cadence
  remains declarative and oracular, avoiding domestication.
