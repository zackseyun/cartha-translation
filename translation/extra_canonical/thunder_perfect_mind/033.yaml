translation:
  text: 'Come to me, you who come forth among those cast down;

    and in the least places—in the place of the house—you will see me.

    Do not lift yourself up over me among those who trample in worthlessness;

    for I—I am one who is to be humbled.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: ‘In the place of the house’ reads ⲱⲕ as ‘house’ (οἶκος). If ⲱⲕ is ‘hunger/need’,
      the line would read ‘in the least places—in the place of need—you will see me’.
    reason: lexical_alternative
  - marker: '2'
    text: The verb ⲉⲛⲥⲱⲉⲓ literally means ‘you will see’; many English renderings
      use ‘find’ for idiomatic sense.
    reason: lexical_alternative
  - marker: '3'
    text: ⲙ̄ⲛ̄ⲧⲁⲭⲣⲏⲥⲧⲏⲣⲟⲥ is a Greek loan (ἀχρήστ-), denoting uselessness or worthlessness.
    reason: cultural_note
  - marker: '4'
    text: ⲟⲩϣⲁⲛϩⲧⲏⲥ is uncertain; possible senses include ‘one to be humbled’, ‘one
      to be scorned’, or even ‘one to be honored’. The poem elsewhere balances honor/disgrace
      paradoxes.
    reason: alignment_note
  - marker: '5'
    text: The opening ‘Come to me, you who come forth among those cast down’ reflects
      the present OCR; some editions front the admonition (‘Do not be arrogant toward
      me when I am cast down’).
    reason: textual_variant
lexical_decisions:
- source_word: ⲛⲟⲩϫⲧ
  chosen: lift yourself up
  alternatives:
  - exalt yourself
  - be arrogant
  lexicon: Crum; Layton
  rationale: Verb ⲛⲟⲩϫⲧ ‘to lift, raise’ functions idiomatically for haughtiness;
    English ‘lift yourself up’ keeps the concrete image while conveying arrogance.
- source_word: ϣⲁⲁⲧ
  chosen: trample
  alternatives:
  - tread down
  - be cast down
  lexicon: Crum
  rationale: Commonly ‘to tread, trample’; in context evokes being trodden underfoot,
    matching the motif of being cast down on the ground.
- source_word: ⲙ̄ⲛ̄ⲧⲁⲭⲣⲏⲥⲧⲏⲣⲟⲥ
  chosen: worthlessness
  alternatives:
  - uselessness
  - good-for-nothingness
  lexicon: Greek loan (ἀχρήστ-); Crum
  rationale: Nominalized state of being ‘not useful’; ‘worthlessness’ reads naturally
    while retaining the evaluative force.
- source_word: ⲗⲁⲭⲓⲥⲧⲟⲥ ⲧⲟⲡⲟⲥ
  chosen: the least places
  alternatives:
  - the lowest place
  - the most humble place
  lexicon: Greek loan (λαχίστ-; τόπος)
  rationale: Plural nuance is plausible in poetic parallelism; preserves the stark
    social/literal lowliness of location.
- source_word: ⲉⲛⲥⲱⲉⲓ
  chosen: you will see [me]
  alternatives:
  - you will find me
  - you will perceive me
  lexicon: Layton
  rationale: Base sense is ‘see’; ‘find’ is an acceptable dynamic alternative but
    ‘see’ keeps the visual motif common in the poem.
- source_word: ⲱⲕ
  chosen: house
  alternatives:
  - hunger
  - need
  lexicon: Uncertain (possible abbrev./orthographic variant of Greek οἶκος)
  rationale: Context favors a concrete locale; ‘house’ aligns with a low-status space
    within a household. Reading as ‘hunger/need’ would shift from place to condition.
- source_word: ⲟⲩϣⲁⲛϩⲧⲏⲥ
  chosen: one who is to be humbled
  alternatives:
  - one to be scorned
  - one to be honored
  lexicon: ϣⲁⲛ- future-quality construction; head noun uncertain
  rationale: ϣⲁⲛ- marks futurity/inevitability; chosen gloss fits the low/high paradox
    theme. The head lexeme ϩⲧⲏⲥ is uncertain; alternatives noted.
- source_word: ⲉⲣⲟⲓ (ⲉⲣⲟⲉⲓ)
  chosen: to me
  alternatives: []
  lexicon: Layton
  rationale: Prepositional object marker with 1st sg; supports ‘Come to me’ address.
- source_word: ⲉⲉⲓⲛⲏⲩ
  chosen: you who come forth
  alternatives:
  - you who will come
  - you who are coming
  lexicon: Layton
  rationale: Form expresses motion toward the speaker; participial sense suits the
    vocative address.
- source_word: ⲛⲉⲧⲧⲁ
  chosen: those cast down
  alternatives:
  - the fallen
  - those who are thrown down
  lexicon: Uncertain
  rationale: Context with ‘trample’ suggests a group in a low/cast-down state; precise
    verb root is uncertain, so we retain a general ‘cast down’ sense.
parallelism_check: 'The block holds a low/high antithesis: a prohibition against self-exaltation
  when the speaker is trodden (low), a promise of epiphany in the least places (low),
  and a self-identification that leans into abasement (‘I—I am one who is to be humbled’),
  preserving the paradoxical pride-in-lowliness that runs through Thunder. The repeated
  direct address and spatial motifs maintain the poem’s cadential parallelism.'
voice_check: 'The divine/enigmatic first-person voice is preserved: a direct summons
  (‘Come to me’), a command (‘Do not lift yourself up over me’), and a self-assertion
  with doubled pronoun (‘for I—I am …’). The tone remains oracular and paradoxical,
  resisting smoothing.'
alignment_risk_note: 'Overall alignment confidence is only medium. Specific weak points:
  (1) ⲱⲕ is taken as ‘house’ (possible οἶκος), but could be ‘hunger/need’, which would
  shift the line from place to condition; (2) ⲉⲛⲥⲱⲉⲓ is read ‘you will see [me]’,
  though ‘find me’ is a plausible functional gloss; (3) ⲟⲩϣⲁⲛϩⲧⲏⲥ is morphologically
  clear (ϣⲁⲛ-), but the head lexeme ϩⲧⲏⲥ is uncertain—‘humbled/scorned/honored’ are
  all possible within the poem’s paradoxes; (4) ⲛⲉⲧⲧⲁ and the initial clause are read
  as ‘come forth among those cast down’, but the exact verb/root for ‘cast down’ is
  not secure. The consult line about ‘those who will come to be’ may reflect a different
  segmentation; I have not forced that reading here.'
