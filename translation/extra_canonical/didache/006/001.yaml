lexical_decisions:
- source_word: Ὅρα
  chosen: See that
  rationale: Imperatival opening calling for vigilance; 'See that' preserves the direct
    admonitory force in natural English.
  alternatives:
  - Take care
  - Watch
  entry: ὁράω
  lexicon: LSJ
- source_word: πλανήσῃ
  chosen: leads you astray
  rationale: Captures both deception and deviation from the path imagery already present
    in 'way.'
  alternatives:
  - deceives you
  - causes you to wander
  entry: πλανάω
  lexicon: BDAG
- source_word: ὁδός
  chosen: way
  rationale: '''Way'' preserves early-Christian moral and catechetical resonance better
    than the more merely physical ''path.'''
  alternatives:
  - path
  entry: ὁδός
  lexicon: BDAG
- source_word: διδαχή
  chosen: the teaching
  rationale: Retains the concrete catechetical sense without importing later technical
    overtones of 'doctrine' as a system.
  alternatives:
  - instruction
  - doctrine
  entry: διδαχή
  lexicon: BDAG
- source_word: παρεκτὸς Θεοῦ
  chosen: apart from God
  rationale: Best reflects instruction that stands outside God's authority or source,
    without over-specifying the theological mechanism.
  alternatives:
  - outside God
  - without God
  entry: παρεκτός
  lexicon: LSJ
- source_word: βαστάσαι
  chosen: bear
  rationale: Maintains the metaphor of taking up a burden/yoke while also fitting
    moral obligation.
  alternatives:
  - carry
  - endure
  entry: βαστάζω
  lexicon: BDAG
- source_word: ὅλον τὸν ζυγὸν τοῦ Κυρίου
  chosen: the whole yoke of the Lord
  rationale: Preserves the traditional discipleship metaphor of a yoke as an obligation
    or rule of life, including the adjective 'whole' which is key to the contrast
    that follows. 'Lord' translates κύριος per project defaults.
  alternatives:
  - the Lord's entire yoke
  entry: ζυγός
  lexicon: BDAG
- source_word: τέλειος
  chosen: perfect
  rationale: The term can mean mature or complete, but 'perfect' preserves the ascetical
    and moral ideal stated tersely in the Greek; alternatives remain possible in interpretation.
  alternatives:
  - complete
  - mature
  entry: τέλειος
  lexicon: BDAG
- source_word: ὃ δύνῃ τοῦτο ποίει
  chosen: do what you can
  rationale: Natural English rendering of the concessive practical instruction, while
    preserving the call to obedience according to ability.
  alternatives:
  - do this, whatever you are able
  - do as much as you are able
  entry: δύναμαι
  lexicon: BDAG
- source_word: βρώσεως
  chosen: food
  rationale: Context concerns dietary practice broadly; 'food' is concise and idiomatic.
  alternatives:
  - eating
  - diet
  entry: βρῶσις
  lexicon: BDAG
- source_word: βάστασον
  chosen: bear
  rationale: Keeps verbal continuity with earlier βαστάσαι and suggests carrying as
    much of the dietary discipline as one is able.
  alternatives:
  - observe
  - keep
  - carry
  entry: βαστάζω
  lexicon: BDAG
- source_word: εἰδωλοθύτου
  chosen: what is sacrificed to idols
  rationale: Expands the compact Greek into clear English while preserving the cultic
    reference.
  alternatives:
  - idol-sacrifice
  - food offered to idols
  entry: εἰδωλόθυτος
  lexicon: BDAG
- source_word: λίαν πρόσεχε
  chosen: be strictly on guard against
  rationale: The Greek combines an intensifier (λίαν, exceedingly) with an imperative
    (πρόσεχε) that, with ἀπό, means 'beware of' or 'guard against'. The chosen phrase
    captures both the intensity and the call to vigilance, which is more precise than
    simply avoiding the food.
  alternatives:
  - strictly keep away from
  - be exceedingly careful about
  entry: προσέχω
  lexicon: LSJ
- source_word: λατρεία
  chosen: worship
  rationale: In this context the term refers to cultic devotion associated with idol
    offerings; 'worship' is the clearest idiomatic rendering.
  alternatives:
  - cultic service
  - religious service
  entry: λατρεία
  lexicon: BDAG
- source_word: θεῶν νεκρῶν
  chosen: dead gods
  rationale: Most naturally read as idols/deities that are dead or lifeless in contrast
    to the living God; 'dead gods' preserves the polemical sharpness.
  alternatives:
  - lifeless gods
  - gods of the dead
  entry: νεκρός
  lexicon: BDAG
theological_decisions:
- issue: Meaning of τέλειος in the exhortation about bearing the whole yoke of the
    Lord
  chosen_reading: perfect
  rationale: The Greek term can denote maturity or completeness, but the Didache's
    concise moral exhortation supports retaining the stronger traditional term while
    allowing interpretive nuance in audit notes.
  alternative_readings:
  - complete
  - mature
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Force of παρεκτὸς Θεοῦ σε διδάσκει
  chosen_reading: he teaches you apart from God
  rationale: The phrase is somewhat compact and could be taken in slightly different
    ways; the chosen rendering stays close to the Greek without over-interpreting
    the false teacher's exact error.
  alternative_readings:
  - he teaches you something beyond God
  - he teaches you outside God's way
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
- issue: Reference of θεῶν νεκρῶν
  chosen_reading: dead gods
  rationale: The immediate context is idol-food, so the phrase most likely polemically
    describes idols/deities as dead in contrast to the living God. A more interpretive
    rendering like 'lifeless idols' is possible but less formally anchored.
  alternative_readings:
  - lifeless idols
  - gods of the dead
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
