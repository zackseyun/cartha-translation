    in the author''s mind. Omitting the articles in English creates an artificially
    telegraphic register that the Greek does not have. Adding the articles accurately
    reflects the definiteness intended by the author and maintains consistency with
    the formula in 7:1. | Azure: The proposed change is more faithful to the Greek.
    In εἰς ὄνομα Πατρὸς καὶ Υἱοῦ καὶ ἁγίου Πνεύματος, the anarthrous genitives after
