translation:
  text: 'Now concerning baptism, baptize in this way: Having said all these things
    beforehand, baptize into the name of the Father and of the Son and of the Holy
    Spirit in living water. But if you do not have living water, baptize into other
    water; and if you cannot in cold, then in warm. But if you have neither, pour
    water on the head three times into the name of Father and Son and Holy Spirit.
    But before the baptism, let the one baptizing and the one being baptized fast
    beforehand, and any others who are able; and you shall command the one being baptized
    to fast beforehand for one or two days.'
  philosophy: optimal-equivalence
