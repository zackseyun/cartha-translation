lexical_decisions:
- source_word: βαπτίσματος / βαπτίσατε / βάπτισον
  chosen: baptism / baptize
  rationale: Retains the established early-Christian ritual term without reducing
    it to a generic washing. The chapter is church-order instruction, and the transliterated
    ecclesial term best preserves its liturgical force.
  alternatives:
  - washing
  - immerse
  entry: βαπτίζω
  lexicon: BDAG
- source_word: ταῦτα πάντα προειπόντες
  chosen: Having first proclaimed all these things
  rationale: The aorist participle indicates prior action, and the verb προλέγω suggests
    a formal proclamation or announcement, fitting for pre-baptismal instruction.
    This is stronger than 'saying' and less interpretive than 'taught.'
  alternatives:
  - after first saying all these things beforehand
  - having first taught all these things
  entry: προλέγω
  lexicon: LSJ
- source_word: εἰς τὸ ὄνομα
  chosen: into the name
  rationale: The preposition εἰς is kept as 'into' to reflect the Greek more closely
    and preserve the initiatory, incorporative sense, while remaining intelligible
    in English. This avoids conforming the text to the more traditional English rendering
    'in the name.'
  alternatives:
  - in the name
  - with reference to the name
  entry: εἰς
  lexicon: BDAG
- source_word: ἐν ὕδατι ζῶντι
  chosen: in living water
  rationale: The literal phrase 'living water' preserves the scriptural and symbolic
    resonance of flowing water (e.g., from a spring or river). A more explanatory
    gloss like 'running water' is possible but would flatten the theological texture.
  alternatives:
  - in running water
  - in fresh water
  entry: ζάω
  lexicon: LSJ
- source_word: ἔκχεον
  chosen: pour
  rationale: A straightforward imperative matching the fallback mode of baptism when
    immersion is not possible due to a lack of water.
  alternatives:
  - pour out
  entry: ἐκχέω
  lexicon: BDAG
- source_word: Πρὸ δὲ τοῦ βαπτίσματος προνηστευσάτω
  chosen: before the baptism, let ... fast beforehand
  rationale: Preserves the preparatory force of προνηστεύω and the formal third-person
    imperative. The repetition of 'before' (Πρὸ) and 'beforehand' (προ-) in the Greek
    is intentionally mirrored to reflect the source text's emphasis.
  alternatives:
  - let ... fast in preparation beforehand
  - let ... keep a fast before the baptism
  entry: προνηστεύω
  lexicon: LSJ
- source_word: ὁ βαπτίζων καὶ ὁ βαπτιζόμενος
  chosen: the one baptizing and the one being baptized
  rationale: Closely reflects the Greek present participial forms without importing
    later, more technical ecclesial terminology like 'baptizer' or 'candidate.'
  alternatives:
  - the baptizer and the candidate for baptism
  - the baptizer and the baptized
  entry: βαπτίζω
  lexicon: BDAG
- source_word: κελεύσεις
  chosen: you shall command
  rationale: The future indicative has an imperatival force. The verb κελεύω primarily
    means 'to command' or 'to order,' which fits the authoritative tone of these instructions
    better than the softer 'instruct.'
  alternatives:
  - you shall instruct
  - you shall direct
  entry: κελεύω
  lexicon: BDAG
- source_word: πρὸ μιᾶς ἢ δύο
  chosen: beforehand for one or two days
  rationale: The Greek is elliptical. This phrasing clarifies that the fast is for
    a duration of one or two days immediately preceding the baptism, which is the
    clear intent. The word order is chosen for better English flow.
  alternatives:
  - for one or two days before
  entry: πρό
  lexicon: LSJ
theological_decisions:
- issue: Rendering εἰς τὸ ὄνομα / εἰς ὄνομα in the baptismal formula
  chosen_reading: into the name
  rationale: The Greek uses εἰς rather than ἐν. Rendering it 'into' preserves the
    text's wording and possible initiatory force, while readers can still recognize
    the baptismal formula. This avoids silently conforming the text to later English
    liturgical convention.
  alternative_readings:
  - in the name
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve theological tension rather than resolve it.'
- issue: Meaning of ὕδωρ ζῶν
  chosen_reading: living water
  rationale: The literal rendering preserves both practical and symbolic dimensions.
    Because the phrase can denote flowing water while also carrying scriptural resonance,
    the main text keeps the ambiguity rather than collapsing it into a purely functional
    gloss.
  alternative_readings:
  - running water
  - fresh water
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Mode of baptism implied by the chapter
  chosen_reading: Main text preserves both immersion-compatible language and the explicit
    allowance of pouring
  rationale: The chapter directs baptism in living or other water, with cold/warm
    preferences, and explicitly permits pouring on the head three times if necessary.
    The translation should not force a later sacramental polemic onto the text.
  alternative_readings:
  - Translate in a way that implies only immersion
  - Translate in a way that implies only affusion
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological
    tension.'
