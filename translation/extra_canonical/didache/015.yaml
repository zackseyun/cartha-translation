id: DID.15
reference: Didache 15
unit: chapter
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Χειροτονήσατε οὖν ἑαυτοῖς ἐπισκόπους καὶ διακόνους ἀξίους τοῦ Κυρίου, ἄνδρας
    πραεῖς καὶ ἀφιλαργύρους καὶ ἀληθεῖς καὶ δεδοκιμασμένους· ὑμῖν γὰρ λειτουργοῦσι
    καὶ αὐτοὶ τὴν λειτουργίαν τῶν προφητῶν καὶ διδασκάλων. Μὴ οὖν ὑπερίδητε αὐτούς·
    αὐτοὶ γάρ εἰσιν οἱ τετιμημένοι ὑμῶν μετὰ τῶν προφητῶν καὶ διδασκάλων. Ἐλέγχετε
    δὲ ἀλλήλους μὴ ἐν ὀργῇ, ἀλλ' ἐν εἰρήνῃ, ὡς ἔχετε ἐν τῷ εὐαγγελίῳ· καὶ παντὶ ἀστοχοῦντι
    κατὰ τοῦ ἑτέρου μηδεὶς λαλειτώ μηδὲ παρ' ὑμῶν ἀκουέτω, ἕως οὗ μετανοήσῃ. Τὰς δὲ
    εὐχὰς ὑμῶν καὶ τὰς ἐλεημοσύνας καὶ πάσας τὰς πράξεις οὕτω ποιήσατε, ὡς ἔχετε ἐν
    τῷ εὐαγγελίῳ τοῦ Κυρίου ἡμῶν.
  language: Greek
  pages:
  - 40
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number
    noise and page segmentation were cleaned, but the translation must stay anchored
    in the Greek wording.
translation:
  text: Appoint, then, for yourselves overseers and deacons worthy of the Lord—men
    gentle and not lovers of money, and truthful and proven; for they too minister
    to you the ministry of the prophets and teachers. Therefore do not disregard them,
    for they are your honored ones together with the prophets and teachers. And reprove
    one another, not in anger but in peace, as you have it in the gospel; and let
    no one speak to anyone who goes wrong against another, nor let him be heard from
    among you, until he repents. But perform your prayers and your acts of mercy and
    all your deeds in this way, as you have it in the gospel of our Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Elect' or 'Ordain' for 'Appoint'; the Greek can include the sense of
      selecting leaders, possibly with election in view.
    reason: lexical_alternative
  - marker: b
    text: '''Overseers'' translates the Greek term directly; ''bishops'' reflects
      the later church title derived from the same word.'
    reason: lexical_alternative
  - marker: c
    text: '''Acts of mercy'' may also be rendered ''alms'' or ''almsgiving.'''
    reason: lexical_alternative
  - marker: d
    text: The phrase 'as you have it in the gospel' likely refers to the community's
      received gospel teaching as an authoritative norm for conduct.
    reason: cultural_note
lexical_decisions:
- source_word: Χειροτονήσατε
  chosen: Appoint
  alternatives:
  - Elect
  - Ordain
  lexicon: LSJ; BDAG
  rationale: The verb can denote appointing by selection, sometimes with the background
    of election by raised hand. 'Appoint' preserves the directive force without importing
    a later, more technical sacramental sense that 'ordain' may suggest.
- source_word: ἐπισκόπους
  chosen: overseers
  alternatives:
  - bishops
  lexicon: BDAG
  rationale: The basic sense is supervisory leaders. 'Overseers' translates the Greek
    meaning directly and avoids reading later monarchical episcopal structures back
    into the Didache.
- source_word: διακόνους
  chosen: deacons
  alternatives:
  - ministers
  - servants
  lexicon: BDAG
  rationale: By this period the term functions as a recognizable church office alongside
    overseers. 'Deacons' preserves the early-Christian institutional texture better
    than the more generic 'servants' or 'ministers'.
- source_word: ἀξίους τοῦ Κυρίου
  chosen: worthy of the Lord
  alternatives:
  - worthy before the Lord
  - worthy for the Lord
  lexicon: BDAG
  rationale: A close rendering that preserves the moral and devotional weight of the
    phrase without overinterpreting the genitive.
- source_word: πραεῖς
  chosen: gentle
  alternatives:
  - meek
  - humble
  lexicon: BDAG
  rationale: '''Gentle'' communicates the ethical quality in clear modern English
    while retaining the moral tone. ''Meek'' is possible but can mislead modern readers.'
- source_word: ἀφιλαργύρους
  chosen: not lovers of money
  alternatives:
  - free from the love of money
  - not greedy for money
  lexicon: BDAG
  rationale: This rendering keeps the transparent morphology and moral force of the
    Greek, echoing early Christian vice-language.
- source_word: ἀληθεῖς
  chosen: truthful
  alternatives:
  - 'true'
  - reliable
  lexicon: BDAG
  rationale: '''Truthful'' best fits the character qualifications in context, emphasizing
    honesty and integrity.'
- source_word: δεδοκιμασμένους
  chosen: proven
  alternatives:
  - tested
  - approved
  lexicon: BDAG
  rationale: The participle denotes those whose character has been tested and shown
    genuine. 'Proven' is concise and natural.
- source_word: λειτουργοῦσι ... τὴν λειτουργίαν
  chosen: minister ... the ministry
  alternatives:
  - perform service ... the service
  - carry out liturgy ... the liturgy
  lexicon: BDAG; LSJ
  rationale: The repeated cognate language should be visible in English. 'Minister
    ... the ministry' preserves both the formal service sense and readable English,
    while avoiding an overly narrow liturgical technicality in the main text.
- source_word: ὑπερίδητε
  chosen: disregard
  alternatives:
  - despise
  - look down on
  lexicon: BDAG
  rationale: The command concerns failing to give due regard to these officers. 'Disregard'
    fits the context of communal honor without overstating emotional contempt.
- source_word: τετιμημένοι
  chosen: honored ones
  alternatives:
  - those held in honor
  - esteemed ones
  lexicon: BDAG
  rationale: This preserves the honor-language explicitly and reads naturally in apposition
    to prophets and teachers.
- source_word: Ἐλέγχετε
  chosen: reprove
  alternatives:
  - correct
  - rebuke
  lexicon: BDAG
  rationale: The term implies moral correction within the community. 'Reprove' keeps
    the ethical and ecclesial seriousness without sounding excessively harsh.
- source_word: ἐν εἰρήνῃ
  chosen: in peace
  alternatives:
  - peaceably
  - with peace
  lexicon: BDAG
  rationale: A close rendering that preserves the contrast with anger and the communal
    ethos of reconciliation.
- source_word: ἀστοχοῦντι
  chosen: who goes wrong
  alternatives:
  - who sins
  - who errs
  - who misses the mark
  lexicon: BDAG
  rationale: The verb literally suggests missing the mark or going astray. 'Who goes
    wrong' preserves the broader moral sense without forcing a more technical term
    than the Greek itself uses here.
- source_word: μηδεὶς λαλειτώ μηδὲ παρ' ὑμῶν ἀκουέτω
  chosen: let no one speak to anyone ... nor let him be heard from among you
  alternatives:
  - let no one speak with him ... nor let him be heard by you
  - let no one address him ... nor listen to him
  lexicon: BDAG
  rationale: The clause appears to prescribe communal non-engagement with the offender
    until repentance. The chosen rendering keeps the severity and some syntactic awkwardness
    of the Greek without over-smoothing.
- source_word: μετανοήσῃ
  chosen: he repents
  alternatives:
  - he turns back
  - he changes his mind
  lexicon: BDAG
  rationale: '''Repents'' is the established and contextually appropriate rendering
    for moral turning in early Christian instruction.'
- source_word: εὐχὰς
  chosen: prayers
  alternatives:
  - vows
  - prayer-offerings
  lexicon: BDAG; LSJ
  rationale: In this context alongside almsgiving and deeds, 'prayers' best fits ordinary
    Christian devotional practice, though the term can elsewhere bear the sense of
    vows.
- source_word: ἐλεημοσύνας
  chosen: acts of mercy
  alternatives:
  - alms
  - almsgiving
  lexicon: BDAG
  rationale: The word often denotes almsgiving, but 'acts of mercy' preserves the
    mercy-root and remains broad enough for the ethical context. The more specific
    alternative is noted in a footnote.
- source_word: πράξεις
  chosen: deeds
  alternatives:
  - actions
  - practices
  lexicon: BDAG
  rationale: '''Deeds'' is concise and morally weighty, fitting the triad of prayers,
    merciful giving, and conduct.'
- source_word: ἐν τῷ εὐαγγελίῳ
  chosen: in the gospel
  alternatives:
  - according to the gospel
  - in the Good News
  lexicon: BDAG
  rationale: The phrase likely refers to the authoritative gospel tradition known
    to the community. 'In the gospel' is a close rendering, retained twice for consistency
    and texture.
theological_decisions:
- issue: Whether ἐπισκόπους should be rendered with later ecclesiastical terminology
  chosen_reading: overseers
  alternative_readings:
  - bishops
  rationale: The Didache reflects early church order, but the Greek term's plain sense
    is supervisory leadership. Rendering it 'overseers' avoids importing later developed
    episcopal structures while preserving the office.
  doctrine_reference: 'DOCTRINE.md: Translate titles/terms by meaning; original-language
    primacy over translation tradition.'
- issue: How strongly to render the disciplinary clause about the offender
  chosen_reading: let no one speak to anyone who goes wrong against another, nor let
    him be heard from among you, until he repents
  alternative_readings:
  - let no one speak with him, nor let him be heard by you, until he repents
  rationale: The Greek is somewhat compressed and can be taken as communal shunning
    of the offender. The chosen reading preserves the severity and ambiguity rather
    than resolving it into a narrower procedural rule.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Whether ἐλεημοσύνας should be narrowed to almsgiving
  chosen_reading: acts of mercy
  alternative_readings:
  - alms
  - almsgiving
  rationale: The term often means almsgiving specifically, but the broader rendering
    keeps the mercy dimension visible and suits the surrounding summary of Christian
    practice. The narrower alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Optimal equivalence; consistency of key terms
    with documented exception.'
