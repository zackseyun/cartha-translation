translation:
  text: Appoint, then, for yourselves overseers and deacons worthy of the Lord—men
    gentle and not lovers of money, and truthful and proven; for they too minister
    to you the ministry of the prophets and teachers. Therefore do not disregard them,
    for they are your honored ones together with the prophets and teachers. And reprove
    one another, not in anger but in peace, as you have it in the gospel; and let
    no one speak to anyone who goes wrong against another, nor let him hear from you,
    until he repents. But perform your prayers and your acts of mercy and all your
    deeds in this way, as you have it in the gospel of our Lord.
  philosophy: optimal-equivalence
