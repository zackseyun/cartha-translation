  from: men gentle and not lovers of money, and truthful and proven
  to: men who are gentle, not lovers of money, truthful, and proven
  rationale: The post-positive adjective 'men gentle' is slightly awkward in English. Converting to a relative clause ('men who are...') smooths the English while preserving the four coordinated descriptors (πραεῖς καὶ ἀφιλαργύρους καὶ ἀληθεῖς καὶ δεδοκιμασμένους) without losing any semantic weight.
- timestamp: '2026-04-22T05:53:04Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/phase9_greek/extra_canonical/didache/015/001.job-70585.json
  category: awkward_english
  tier: 1
  from: minister to you the ministry
  to: perform for you the ministry
  rationale: The Greek uses a cognate accusative (λειτουργοῦσι... τὴν λειτουργίαν), which is a standard idiom for carrying out a public or religious duty. In English, 'minister the ministry' is somewhat wooden and redundant; 'perform the ministry' or 'carry out the ministry' is more natural while retaining the exact meaning. The dative ὑμῖν is well handled as 'for you' in this context.
