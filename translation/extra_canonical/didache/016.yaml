id: DID.16
reference: Didache 16
unit: chapter
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Γρηγορεῖτε ὑπὲρ τῆς ζωῆς ὑμῶν· οἱ λύχνοι ὑμῶν μὴ σβεσθήτωσαν, καὶ αἱ ὀσφύες
    ὑμῶν μὴ ἐκλυέσθωσαν, ἀλλὰ γίνεσθε ἕτοιμοι· οὐ γὰρ οἴδατε τὴν ὥραν, ἐν ᾗ ὁ Κύριος
    ἡμῶν ἔρχεται. Πυκνῶς δὲ συναχθήσεσθε ζητοῦντες τὰ ἀνήκοντα ταῖς ψυχαῖς ὑμῶν· οὐ
    γὰρ ὠφελήσει ὑμᾶς ὁ πᾶς χρόνος τῆς πίστεως ὑμῶν, ἐὰν μὴ ἐν τῷ ἐσχάτῳ καιρῷ τελειωθῆτε.
    Ἐν γὰρ ταῖς ἐσχάταις ἡμέραις πληθυνθήσονται οἱ ψευδοπροφῆται καὶ οἱ φθορεῖς καὶ
    στραφήσονται τὰ πρόβατα εἰς λύκους καὶ ἡ ἀγάπη στραφήσεται εἰς μῖσος· αὐξανούσης
    γὰρ τῆς ἀνομίας, μισήσουσιν ἀλλήλους καὶ διώξουσι καὶ παραδώσουσι, καὶ τότε φανήσεται
    ὁ κοσμοπλάνος ὡς υἱὸς Θεοῦ καὶ ποιήσει σημεῖα καὶ τέρατα, καὶ ἡ γῆ παραδοθήσεται
    εἰς χεῖρας αὐτοῦ, καὶ ποιήσει ἀθέμιτα, ἃ οὐδέποτε γέγονεν ἐξ αἰῶνος. Τότε ἥξει
    ἡ κτίσις τῶν ἀνθρώπων εἰς τὴν πύρωσιν τῆς δοκιμασίας καὶ σκανδαλισθήσονται πολλοὶ
    καὶ ἀπολοῦνται, οἱ δὲ ὑπομείναντες ἐν τῇ πίστει αὐτῶν σωθήσονται ὑπ᾽ αὐτοῦ τοῦ
    καταθέματος. Καὶ τότε φανήσεται τὰ σημεῖα τῆς ἀληθείας· πρῶτον, σημεῖον ἐκπετάσεως
    ἐν οὐρανῷ, εἶτα σημεῖον φωνῆς σάλπιγγος καὶ τὸ τρίτον ἀνάστασις νεκρῶν· οὐ πάντων
    δέ, ἀλλ᾽ ὡς ἐρρέθη· Ἥξει ὁ Κύριος καὶ πάντες οἱ ἅγιοι μετ᾽ αὐτοῦ. Τότε ὄψεται
    ὁ κόσμος τὸν Κύριον ἐρχόμενον ἐπάνω τῶν νεφελῶν τοῦ οὐρανοῦ.
  language: Greek
  pages:
  - 40
  - 42
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number
    noise and page segmentation were cleaned, but the translation must stay anchored
    in the Greek wording.
translation:
  text: 'Keep watch over your life. Do not let your lamps be quenched, and do not
    let your loins be loosened, but be ready, for you do not know the hour in which
    our Lord is coming. And gather together often, seeking the things that are fitting
    for your souls; for the whole time of your faith will not profit you unless you
    are made complete in the last season. For in the last days false prophets and
    corrupters will be multiplied, and the sheep will be turned into wolves, and love
    will be turned into hatred. For as lawlessness increases, they will hate one another
    and persecute and betray, and then the world-deceiver will appear as a son of
    God and will do signs and wonders, and the earth will be delivered into his hands,
    and he will do unlawful things such as have never happened from the age. Then
    the creation of men will come into the fire of testing, and many will be caused
    to stumble and will perish, but those who endure in their faith will be saved
    by the accursed one himself. And then the signs of the truth will appear: first,
    a sign of an opening out in heaven; then a sign of a trumpet''s voice; and the
    third, the resurrection of the dead—yet not of all, but as it was said: The Lord
    will come, and all the holy ones with him. Then the world will see the Lord coming
    upon the clouds of heaven.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for your life.' The Greek phrase can carry a protective sense.
    reason: lexical_alternative
  - marker: b
    text: Literally 'do not let your loins be loosened,' an image of readiness also
      found in biblical exhortation.
    reason: cultural_note
  - marker: c
    text: Or 'what pertains to your souls' / 'what is beneficial for your souls.'
    reason: lexical_alternative
  - marker: d
    text: Greek 'the world-deceiver,' a rare apocalyptic term for the final deceiver.
    reason: lexical_alternative
  - marker: e
    text: The Greek says 'as a son of God,' not explicitly 'as the Son of God.'
    reason: alternative_reading
  - marker: f
    text: The phrase translated 'the creation of men' is difficult and may also be
      understood more broadly as 'the human race.'
    reason: alternative_reading
  - marker: g
    text: The clause 'will be saved by the accursed one himself' is textually difficult
      in the transmitted Greek and may reflect a corrupt reading.
    reason: textual_variant
  - marker: h
    text: The expression rendered 'a sign of an opening out in heaven' is rare and
      uncertain; alternatives include 'an outspreading' or 'an unfolding' in heaven.
    reason: lexical_alternative
  - marker: i
    text: Quotation echoing Zechariah 14:5.
    reason: cross_reference
  - marker: j
    text: Final line echoes the Lord's coming imagery in Daniel 7:13 and the Gospel
      tradition.
    reason: cross_reference
lexical_decisions:
- source_word: Γρηγορεῖτε
  chosen: Keep watch
  alternatives:
  - Be watchful
  - Stay awake
  lexicon: BDAG
  rationale: Imperative of vigilant readiness; 'Keep watch' preserves the eschatological
    and moral force without sounding colloquial.
- source_word: ὑπὲρ τῆς ζωῆς ὑμῶν
  chosen: over your life
  alternatives:
  - for your life
  - concerning your life
  lexicon: BDAG
  rationale: Here ὑπέρ carries a protective sense. 'Over your life' fits the watchfulness
    image better than the more idiomatic but potentially narrower 'for your life'.
- source_word: λύχνοι
  chosen: lamps
  alternatives:
  - lights
  lexicon: BDAG
  rationale: Retains biblical vigilance imagery and avoids flattening the metaphor.
- source_word: σβεσθήτωσαν
  chosen: be quenched
  alternatives:
  - go out
  - be extinguished
  lexicon: BDAG
  rationale: '''Be quenched'' is the natural collocation for lamps in biblical English
    and preserves the solemn register.'
- source_word: ὀσφύες
  chosen: loins
  alternatives:
  - waist
  - belted waist
  lexicon: BDAG
  rationale: Traditional bodily image of readiness; preserving 'loins' keeps the early-Christian
    and scriptural texture.
- source_word: ἐκλυέσθωσαν
  chosen: be loosened
  alternatives:
  - be slackened
  - be relaxed
  lexicon: BDAG
  rationale: The image is of readiness not being let slack. 'Be loosened' preserves
    the metaphor more directly than an interpretive paraphrase.
- source_word: ἕτοιμοι
  chosen: ready
  alternatives:
  - prepared
  lexicon: BDAG
  rationale: Simple and direct; matches the eschatological exhortation.
- source_word: Πυκνῶς
  chosen: often
  alternatives:
  - frequently
  - regularly
  lexicon: BDAG
  rationale: Conveys repeated gathering without over-specifying institutional regularity.
- source_word: συναχθήσεσθε
  chosen: gather together
  alternatives:
  - assemble
  - be gathered
  lexicon: BDAG
  rationale: Reflects communal assembly language important in the Didache's church-order
    setting.
- source_word: τὰ ἀνήκοντα
  chosen: the things that are fitting
  alternatives:
  - the things that matter
  - what is beneficial
  - what pertains
  lexicon: BDAG
  rationale: Keeps the moral and spiritual appropriateness implied by the participle
    without reducing it to mere utility.
- source_word: τελειωθῆτε
  chosen: are made complete
  alternatives:
  - are perfected
  - reach completion
  lexicon: BDAG
  rationale: Preserves the completion/perfection idea while remaining readable; avoids
    overloading with later technical theology.
- source_word: ἐσχάτῳ καιρῷ
  chosen: the last season
  alternatives:
  - the final time
  - the end time
  lexicon: BDAG
  rationale: καιρός is a decisive season or appointed time, not merely clock-time;
    'season' preserves that nuance.
- source_word: φθορεῖς
  chosen: corrupters
  alternatives:
  - deceivers
  - destroyers
  lexicon: BDAG
  rationale: The term suggests those who ruin or corrupt others morally/spiritually.
    'Corrupters' best preserves that active sense.
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Follows project default and preserves the central Christian virtue named
    in the text.
- source_word: ἀνομίας
  chosen: lawlessness
  alternatives:
  - wickedness
  lexicon: BDAG
  rationale: Retains the biblical resonance of rebellion against God's order rather
    than generic evil.
- source_word: ὁ κοσμοπλάνος
  chosen: the world-deceiver
  alternatives:
  - the deceiver of the world
  - the world-errant-maker
  lexicon: Lampe
  rationale: A rare and vivid term; 'world-deceiver' preserves its compact force and
    apocalyptic character.
- source_word: ὡς υἱὸς Θεοῦ
  chosen: as a son of God
  alternatives:
  - as the Son of God
  lexicon: BDAG
  rationale: The Greek lacks the article before υἱός. Rendering it indefinitely avoids
    granting the figure the true christological title while preserving the blasphemous
    imitation.
- source_word: σημεῖα καὶ τέρατα
  chosen: signs and wonders
  alternatives:
  - miraculous signs and portents
  lexicon: BDAG
  rationale: Established biblical pair; preserves apocalyptic and scriptural diction.
- source_word: ἀθέμιτα
  chosen: unlawful things
  alternatives:
  - abominations
  - forbidden things
  lexicon: BDAG
  rationale: Conveys acts contrary to what is permitted or right without importing
    a narrower cultic sense.
- source_word: ἡ κτίσις τῶν ἀνθρώπων
  chosen: the creation of men
  alternatives:
  - the human race
  - the created order of men
  lexicon: BDAG
  rationale: A difficult phrase. This rendering stays close to the Greek while preserving
    the masculine/generic force of ἀνθρώπων in line with project policy.
- source_word: πύρωσιν τῆς δοκιμασίας
  chosen: the fire of testing
  alternatives:
  - the burning of trial
  - the fiery ordeal of testing
  lexicon: BDAG
  rationale: Captures both the fiery image and the proving/trial sense of δοκιμασία.
- source_word: σκανδαλισθήσονται
  chosen: will be caused to stumble
  alternatives:
  - will fall away
  - will be offended
  lexicon: BDAG
  rationale: Keeps the underlying stumbling image while allowing readers to infer
    apostasy in context.
- source_word: ὑπομείναντες
  chosen: those who endure
  alternatives:
  - those who remain steadfast
  lexicon: BDAG
  rationale: Standard eschatological endurance language.
- source_word: καταθέματος
  chosen: the accursed one
  alternatives:
  - the curse
  - the one under a curse
  lexicon: LSJ
  rationale: The transmitted word is difficult and likely problematic, but if translated
    as given it most naturally yields 'accursed one.' This is preserved in the main
    text for auditability and flagged in a footnote as textually difficult.
- source_word: τὰ σημεῖα τῆς ἀληθείας
  chosen: the signs of the truth
  alternatives:
  - the true signs
  - the signs that confirm the truth
  lexicon: BDAG
  rationale: A close rendering that preserves the genitive and the solemn apocalyptic
    tone.
- source_word: ἐκπετάσεως
  chosen: an opening out
  alternatives:
  - an outspreading
  - an unfolding
  lexicon: LSJ
  rationale: The noun is rare and uncertain in nuance. 'Opening out' preserves the
    image without overcommitting to a specific interpretation.
- source_word: φωνῆς σάλπιγγος
  chosen: a trumpet's voice
  alternatives:
  - the sound of a trumpet
  - a trumpet blast
  lexicon: BDAG
  rationale: More literal than 'blast' and preserves the person-like biblical idiom
    of φωνή.
- source_word: ἅγιοι
  chosen: the holy ones
  alternatives:
  - the saints
  lexicon: BDAG
  rationale: Avoids later ecclesiastical narrowing while preserving the scriptural
    category.
- source_word: νεφελῶν τοῦ οὐρανοῦ
  chosen: the clouds of heaven
  alternatives:
  - heaven's clouds
  lexicon: BDAG
  rationale: Traditional apocalyptic phrasing echoing biblical source language.
theological_decisions:
- issue: Identity claim in ὡς υἱὸς Θεοῦ
  chosen_reading: Rendered 'as a son of God' rather than 'as the Son of God.'
  alternative_readings:
  - as the Son of God
  rationale: The anarthrous Greek supports an indefinite or qualitative sense. This
    preserves the impostor's imitation without conferring the unique messianic title
    in the main text.
  doctrine_reference: 'DOCTRINE.md: Translate titles by meaning; preserve theological
    tension rather than resolve it.'
- issue: Difficult phrase ὑπ᾽ αὐτοῦ τοῦ καταθέματος
  chosen_reading: Main text keeps the transmitted sense 'by the accursed one himself'
    with a footnote noting textual difficulty.
  alternative_readings:
  - by the curse itself
  - by him who was accursed
  - by the very one placed under ban
  - possible corruption for a different reading
  rationale: The Greek as given is highly unusual and theologically awkward. For transparency,
    the draft does not silently emend, but it flags the phrase as textually difficult
    for later review.
  doctrine_reference: 'PHILOSOPHY.md: source-text transparency and auditable reasoning.'
- issue: Phrase ἡ κτίσις τῶν ἀνθρώπων
  chosen_reading: Rendered closely as 'the creation of men.'
  alternative_readings:
  - the human race
  - human creation
  rationale: The phrase is unusual. A closer rendering preserves ambiguity rather
    than prematurely resolving it into a smoother paraphrase.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it.'
