lexical_decisions:
- source_word: φεῦγε
  chosen: flee
  rationale: Imperative with strong moral urgency; 'flee' preserves the vivid force
    better than the milder 'avoid'.
  alternatives:
  - avoid
  - shun
  entry: φεύγω
  lexicon: LSJ
- source_word: ὀργίλος
  chosen: quick-tempered
  rationale: Readable modern English that preserves the character trait, not merely
    a momentary emotion.
  alternatives:
  - prone to anger
  - irascible
  entry: ὀργίλος
  lexicon: LSJ
- source_word: ζηλωτής
  chosen: jealous
  rationale: In this vice list the negative sense is intended; 'jealous' fits the
    progression toward violence better than the positive-sounding 'zealous' or the
    more political 'partisan'.
  alternatives:
  - zealous
  - envious
  - partisan
  entry: ζηλωτής
  lexicon: LSJ
- source_word: θυμικός
  chosen: hot-headed
  rationale: Conveys impulsive anger in idiomatic English while retaining moral seriousness.
  alternatives:
  - passionate-tempered
  - wrathful
  entry: θυμικός
  lexicon: LSJ
- source_word: πορείαν
  chosen: sexual immorality
  rationale: The source text's πορείαν ('journey') is almost certainly a scribal error
    for πορνείαν ('fornication, sexual immorality'), given the context of lust leading
    to adultery. 'Sexual immorality' is the accessible default for this moral term.
  alternatives:
  - fornication
  entry: πορνεία
  lexicon: LSJ
- source_word: ὑψηλοόφθαλμος
  chosen: haughty-eyed
  rationale: Keeps the bodily metaphor of proud eyes rather than flattening it to
    a generic abstraction like 'arrogant'.
  alternatives:
  - arrogant
  - proud-looking
  entry: ὑψηλόφθαλμος
  lexicon: LSJ
- source_word: μαθηματικός
  chosen: astrologer
  rationale: In this period and context, the term commonly refers to astrological
    practitioners, not mathematical scholars.
  alternatives:
  - mathematician
  - caster of horoscopes
  entry: μαθηματικός
  lexicon: LSJ
- source_word: περικαθαίρων
  chosen: one who performs purifications
  rationale: Keeps the participial force and the likely magical-religious sense of
    ritual cleansing without over-translating.
  alternatives:
  - sorcerous purifier
  - one who practices ritual cleansings
  entry: περικαθαίρω
  lexicon: LSJ
- source_word: μηδὲ θέλε αὐτὰ βλέπειν
  chosen: nor even be willing to look upon them
  rationale: The Greek is `μηδὲ θέλε...` ('nor be willing...'). This phrasing preserves
    the negative particle `μηδὲ` and the volitional force of `θέλε`, which warns against
    even the desire or curiosity for these forbidden practices. The addition of 'even'
    and the use of 'look upon' adds formal emphasis appropriate to the context.
  alternatives:
  - do not desire to see them
  - nor be willing to look at them
  entry: θέλω
  lexicon: LSJ
- source_word: κενόδοξος
  chosen: vainglorious
  rationale: Preserves the specific sense of 'empty glory' rather than the more general
    'vain' or 'conceited'.
  alternatives:
  - vain
  - conceited
  entry: κενόδοξος
  lexicon: LSJ
- source_word: γόγγυσος
  chosen: grumbler
  rationale: A clear and accessible term that is still resonant with biblical moral
    language (cf. 'murmurer').
  alternatives:
  - murmurer
  - complainer
  entry: γόγγυσος
  lexicon: LSJ
- source_word: πραῢς
  chosen: meek
  rationale: Echoes the beatitude allusion (Matt. 5:5) and preserves the scriptural
    register; 'gentle' is possible but weaker intertextually.
  alternatives:
  - gentle
  - humble
  entry: πραΰς
  lexicon: LSJ
- source_word: ἄκακος
  chosen: guileless
  rationale: Highlights moral simplicity and absence of deceit, a stronger sense than
    merely 'harmless' or 'innocent'.
  alternatives:
  - innocent
  - harmless
  entry: ἄκακος
  lexicon: LSJ
- source_word: τρέμων τοὺς λόγους
  chosen: trembling at the words
  rationale: Preserves the strong biblical idiom (cf. Isa. 66:2) of reverent fear
    before received divine instruction.
  alternatives:
  - revering the words with fear
  - standing in awe of the words
  entry: τρέμω
  lexicon: LSJ
- source_word: θράσος
  chosen: bold arrogance
  rationale: Conveys not healthy courage but insolent self-assertion, clarifying the
    negative moral sense of the term in this context.
  alternatives:
  - presumption
  - audacity
  entry: θράσος
  lexicon: LSJ
- source_word: ἀναστραφήσῃ
  chosen: you shall associate
  rationale: The verb means to conduct one's life; in context with 'with the righteous
    and humble,' it refers to the company one keeps and one's manner of life among
    them.
  alternatives:
  - you shall live among
  - you shall conduct yourself with
  entry: ἀναστρέφω
  lexicon: LSJ
- source_word: προσδέξῃ
  chosen: You shall accept
  rationale: The future middle indicative is used here with an imperatival force,
    consistent with the prohibitions in the preceding verse. 'Accept' is a strong
    choice for receiving circumstances that may be difficult, and framing it as 'You
    shall accept' maintains the formal, authoritative tone.
  alternatives:
  - Receive
  - You shall receive
  entry: προσδέχομαι
  lexicon: LSJ
- source_word: τὰ συμβαίνοντά σοι ἐνεργήματα
  chosen: the events that befall you
  rationale: This phrase simplifies a difficult Greek construction. The participle
    `τὰ συμβαίνοντα` ('the things befalling') is rendered clearly, while the noun
    `ἐνεργήματα` ('workings' or 'effects') is omitted from the main text for readability
    but explained in a footnote to preserve its theological significance of events
    as active, non-random operations.
  alternatives:
  - the things that happen to you
  - the workings that come upon you
  entry: συμβαίνω
  lexicon: LSJ
theological_decisions:
- issue: Rendering of πορείαν in the source text
  chosen_reading: Translated according to the likely intended word πορνείαν ('sexual
    immorality'), noting the textual issue in a footnote.
  rationale: The vice chain from lust (ἐπιθυμία) to sexual sin, followed by adulteries
    (μοιχεῖαι), makes the reading of πορεία ('journey') contextually nonsensical.
    This is a widely recognized scribal error.
  alternative_readings:
  - journey
  - course of conduct
  doctrine_reference: Textual criticism principles of contextual coherence.
- issue: Sense of βλασφημία in this paraenetic context
  chosen_reading: Rendered as 'blasphemy / blasphemies' in the main text, with a footnote
    acknowledging the broader sense.
  rationale: The Didache's moral instruction is deeply religious. The progression
    from grumbling (a sin often directed against God in the Old Testament) to blasphemy
    fits biblical patterns. While the word can mean 'slander' generally, the theological
    weight is primary here.
  alternative_readings:
  - slander / slanders
  - abusive speech
  doctrine_reference: Christian ethics of speech.
- issue: Providence in ἄτερ Θεοῦ οὐδὲν γίνεται
  chosen_reading: Rendered 'knowing that apart from God nothing happens.'
  rationale: This translation preserves the strong and concise providential claim
    of the Greek. It avoids interpretive softening or expansion, presenting the doctrine
    of divine sovereignty as the basis for the moral exhortation to receive all events
    as good.
  alternative_readings:
  - without God nothing comes to pass
  - nothing takes place outside of God's will
  doctrine_reference: Doctrine of Providence.
