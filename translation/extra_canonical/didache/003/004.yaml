  rationale: 'The Greek pronoun αὐτὰ is neuter plural, referring to the occult practices, omens, or implements themselves. It is not masculine plural, which would be required to refer to the practitioners (the enchanter, astrologer, etc.). In English, ''them'' naturally points back to the people just listed, creating an ambiguity that the Greek avoids. Translating as ''these things'' accurately reflects the neuter pronoun. | Azure: The rationale is grammatically correct. αὐτὰ is neuter plural accusative, so it naturally refers not to the masculine personal designations just listed (ἐπαοιδός, μαθηματικός, περικαθαίρων) as persons'
