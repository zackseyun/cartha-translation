  from: Become patient and merciful and guileless and quiet and good, and always trembling at the words that you have heard.
  to: Be patient and merciful and guileless and quiet and good, and always trembling at the words that you heard.
  rationale: The imperative γίνου (which frequently functions simply as 'be' in moral exhortations, cf. BDAG γίνομαι 5.b.β) governs both the adjectives and the participle τρέμων. While 'become' works for the adjectives, 'become trembling' is awkward in English; 'Be... trembling' forms a natural periphrastic imperative. Additionally, translating the aorist ἤκουσας as the simple past 'heard' rather than the perfect 'have heard' better reflects the completed action of their initial catechesis.
