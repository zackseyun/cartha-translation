source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Περὶ δὲ τοῦ βαπτίσματος, οὕτω βαπτίσατε· ταῦτα πάντα προειπόντες, βαπτίσατε
    εἰς τὸ ὄνομα τοῦ Πατρὸς καὶ τοῦ Υἱοῦ καὶ τοῦ ἁγίου Πνεύματος ἐν ὕδατι ζῶντι. Ἐὰν
    δὲ μὴ ἔχῃς ὕδωρ ζῶν, εἰς ἄλλο ὕδωρ βάπτισον· εἰ δʼ οὐ δύνασαι ἐν ψυχρῷ, ἐν θερμῷ.
    Ἐὰν δὲ ἀμφότερα μὴ ἔχῃς, ἔκχεον εἰς τὴν κεφαλὴν τρὶς ὕδωρ εἰς ὄνομα Πατρὸς καὶ
    Υἱοῦ καὶ ἁγίου Πνεύματος. Πρὸ δὲ τοῦ βαπτίσματος προνηστευσάτω ὁ βαπτίζων καὶ
    ὁ βαπτιζόμενος καὶ εἴ τινες ἄλλοι δύνανται· κελεύσεις δὲ νηστεῦσαι τὸν βαπτιζόμενον
    πρὸ μιᾶς ἢ δύο.
  language: Greek
  pages:
  - 28
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number
    noise and page segmentation were cleaned, but the translation must stay anchored
    in the Greek wording.
translation:
  text: 'Now concerning baptism, baptize in this way: after first saying all these
    things beforehand, baptize into the name of the Father and of the Son and of the
    Holy Spirit in living water. But if you do not have living water, baptize into
    other water; and if you cannot in cold, then in warm. But if you have neither,
    pour water on the head three times into the name of Father and Son and Holy Spirit.
    But before the baptism, let the one baptizing and the one being baptized fast
    beforehand, and any others who are able; and you shall instruct the one being
    baptized to fast one or two days before.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Living water” can mean flowing or running water, but the literal wording
      is retained because of its scriptural resonance.
    reason: lexical_alternative
  - marker: b
    text: “Into the name” follows the Greek preposition more closely than the traditional
      English “in the name.”
    reason: lexical_alternative
  - marker: c
    text: The phrase “one or two” is understood as one or two days in context of fasting.
    reason: cultural_note
lexical_decisions:
- source_word: βαπτίσματος / βαπτίσατε / βάπτισον
  chosen: baptism / baptize
  alternatives:
  - washing
  - immerse
  lexicon: BDAG
  rationale: Retains the established early-Christian ritual term without reducing
    it to a generic washing. The chapter is church-order instruction, and the transliterated
    ecclesial term best preserves its liturgical force.
- source_word: ταῦτα πάντα προειπόντες
  chosen: after first saying all these things beforehand
  alternatives:
  - after rehearsing all these things
  - after teaching all these things in advance
  lexicon: LSJ
  rationale: προειπόντες indicates prior verbal instruction. The rendering preserves
    sequence and oral catechetical texture, likely referring back to the preceding
    teaching.
- source_word: εἰς τὸ ὄνομα
  chosen: into the name
  alternatives:
  - in the name
  - with reference to the name
  lexicon: BDAG
  rationale: The preposition εἰς is kept as 'into' to reflect the Greek more closely
    and preserve the initiatory, incorporative sense, while remaining intelligible
    in English.
- source_word: ἐν ὕδατι ζῶντι
  chosen: in living water
  alternatives:
  - in running water
  - in fresh water
  lexicon: LSJ
  rationale: The literal phrase 'living water' preserves the scriptural and symbolic
    resonance of flowing water. A more explanatory gloss like 'running water' is possible
    but would flatten the theological texture.
- source_word: εἰς ἄλλο ὕδωρ
  chosen: into other water
  alternatives:
  - in other water
  - with other water
  lexicon: LSJ
  rationale: Keeps the contrast with living water while maintaining the same prepositional
    pattern as the earlier baptismal formula.
- source_word: ἐν ψυχρῷ ... ἐν θερμῷ
  chosen: in cold ... in warm
  alternatives:
  - in cold water ... in warm water
  - in cold water ... in hot water
  lexicon: LSJ
  rationale: The water is implied from context. 'Warm' is preferable to 'hot' because
    θερμός can denote warmth generally, and the contrast is practical rather than
    extreme.
- source_word: ἔκχεον
  chosen: pour
  alternatives:
  - pour out
  lexicon: BDAG
  rationale: A straightforward imperative matching the fallback mode of baptism when
    sufficient water is unavailable.
- source_word: τρὶς
  chosen: three times
  alternatives:
  - thrice
  lexicon: LSJ
  rationale: Modern readable English without archaic diction.
- source_word: Πρὸ δὲ τοῦ βαπτίσματος προνηστευσάτω
  chosen: before the baptism, let ... fast beforehand
  alternatives:
  - let ... fast in preparation beforehand
  - let ... keep a fast before the baptism
  lexicon: LSJ
  rationale: Preserves the preparatory force of προνηστεύω and the formal imperative
    tone of church instruction.
- source_word: ὁ βαπτίζων καὶ ὁ βαπτιζόμενος
  chosen: the one baptizing and the one being baptized
  alternatives:
  - the baptizer and the candidate for baptism
  lexicon: BDAG
  rationale: Closely reflects the participial forms without importing later technical
    ecclesial terminology.
- source_word: κελεύσεις
  chosen: you shall instruct
  alternatives:
  - you shall command
  - you shall direct
  lexicon: BDAG
  rationale: The verb can be stronger than mere suggestion, but 'instruct' fits the
    catechetical and pastoral setting without sounding unduly harsh in English.
- source_word: πρὸ μιᾶς ἢ δύο
  chosen: one or two days before
  alternatives:
  - for one or two days beforehand
  lexicon: LSJ
  rationale: The Greek is elliptical; supplying 'days' is necessary in English and
    fits the fasting context naturally.
theological_decisions:
- issue: Rendering εἰς τὸ ὄνομα / εἰς ὄνομα in the baptismal formula
  chosen_reading: into the name
  alternative_readings:
  - in the name
  rationale: The Greek uses εἰς rather than ἐν. Rendering it 'into' preserves the
    text's wording and possible initiatory force, while readers can still recognize
    the baptismal formula. This avoids silently conforming the text to later English
    liturgical convention.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve theological tension rather than resolve it.'
- issue: Meaning of ὕδωρ ζῶν
  chosen_reading: living water
  alternative_readings:
  - running water
  - fresh water
  rationale: The literal rendering preserves both practical and symbolic dimensions.
    Because the phrase can denote flowing water while also carrying scriptural resonance,
    the main text keeps the ambiguity rather than collapsing it into a purely functional
    gloss.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Mode of baptism implied by the chapter
  chosen_reading: Main text preserves both immersion-compatible language and the explicit
    allowance of pouring
  alternative_readings:
  - Translate in a way that implies only immersion
  - Translate in a way that implies only affusion
  rationale: The chapter directs baptism in living or other water, with cold/warm
    preferences, and explicitly permits pouring on the head three times if necessary.
    The translation should not force a later sacramental polemic onto the text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological
    tension.'
