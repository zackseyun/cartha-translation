  from: for the Father's will is that giving be done to all from his own gracious gifts.
  to: for the Father wishes that his own gifts be given to all.
  rationale: The Greek 'θέλει δίδοσθαι... ἐκ τῶν ἰδίων χαρισμάτων' (wishes to be given... from his own gifts) is rendered awkwardly as 'the Father's will is that giving be done to all'. A more natural rendering preserves the passive infinitive without introducing the clunky 'giving be done'.
- timestamp: '2026-04-22T05:55:45Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/phase9_greek/extra_canonical/didache/001/005.job-70621.json
  category: awkward_english
  tier: 1
  from: 'will pay the penalty: why he received, and for what purpose.'
  to: will pay the penalty for why he received and for what purpose.
  rationale: The colon creates a disjointed English sentence. The Greek 'ἱνατί ἔλαβε καὶ εἰς τί' acts as an indirect question explaining the grounds for the penalty, which is better rendered with 'for' in English to connect it to the penalty.
