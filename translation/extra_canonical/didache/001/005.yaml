id: DID.1.5
reference: Didache 1:5
unit: verse
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Παντὶ τῷ αἰτοῦντί σε δίδου καὶ μὴ ἀπαίτει· πᾶσι γὰρ θέλει δίδοσθαι ὁ πατὴρ ἐκ τῶν ἰδίων χαρισμάτων. Μακάριος ὁ διδοὺς κατὰ τὴν ἐντολήν· ἀθῷος γάρ ἐστιν· οὐαὶ τῷ λαμβάνοντι· εἰ μὲν γὰρ χρείαν ἔχων λαμβάνει τις, ἀθῷος ἔσται· ὁ δὲ μὴ χρείαν ἔχων δώσει δίκην, ἱνατί ἔλαβε καὶ εἰς τί, ἐν συνοχῇ δὲ γενόμενος ἐξετασθήσεται περὶ ὧν ἔπραξε, καὶ οὐκ ἐξελεύσεται ἐκεῖθεν μέχρις οὗ ἀποδῷ τὸν ἔσχατον κοδράντην.
  language: Greek
translation:
  text: Give to everyone who asks you, and do not demand it back; for the Father wishes that his own gifts be given to all. Blessed is the one who gives according to the commandment, for he is innocent. But woe to the one who receives. For if someone receives because he has need, he will be innocent; but the one who has no need will pay the penalty for why he received and for what purpose. And having come under confinement, he will be examined concerning the things he did, and he will not come out from there until he repays the last quadrans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for the Father's will is that giving be done to all from his own gracious gifts.".
    reason: previous_rendering
  - marker: b
    text: 'Or ''will pay the penalty: why he received, and for what purpose.''.'
    reason: previous_rendering
