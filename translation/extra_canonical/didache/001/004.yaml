id: DID.1.4
reference: Didache 1:4
unit: verse
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Ἀπέχου τῶν σαρκικῶν καὶ κοσμικῶν ἐπιθυμιῶν. Ἐάν τις σοὶ δῷ ῥάπισμα εἰς τὴν
    δεξιὰν σιαγόνα, στρέψον αὐτῷ καὶ τὴν ἄλλην, καὶ ἔσῃ τέλειος· ἐὰν ἀγγαρεύσῃ σε
    τις μίλιον ἕν, ὕπαγε μετʼ αὐτοῦ δύο· ἐὰν ἄρῃ τις τὸ ἱμάτιόν σου, δὸς αὐτῷ καὶ
    τὸν χιτῶνα· ἐὰν λάβῃ τις ἀπὸ σοῦ τὸ σόν, μὴ ἀπαίτει· οὐδὲ γὰρ δύνασαι.
  language: Greek
translation:
  text: Abstain from fleshly and worldly desires. If anyone gives you a blow on the
    right cheek, turn to him the other also, and you will be perfect. If anyone compels
    you for one mile, go with him two. If anyone takes away your cloak, give him your
    tunic also. If anyone takes from you what is yours, do not demand it back, for
    you are not able.
  philosophy: optimal-equivalence
