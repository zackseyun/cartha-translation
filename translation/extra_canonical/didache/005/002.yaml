  text: διῶκται ἀγαθῶν, μισοῦντες ἀλήθειαν, ἀγαπῶντες ψεῦδος, οὐ γινώσκοντες μισθὸν
    δικαιοσύνης, οὐ κολλώμενοι ἀγαθῷ οὐδὲ κρίσει δικαίᾳ, ἀγρυπνοῦντες οὐκ εἰς τὸ ἀγαθὸν,
    ἀλλ’ εἰς τὸ πονηρόν· ὧν μακρὰν πραΰτης καὶ ὑπομονή, μάταια ἀγαπῶντες, διώκοντες
    ἀνταπόδομα, οὐκ ἐλεοῦντες πτωχόν, οὐ πονοῦντες ἐπὶ καταπονουμένῳ, οὐ γινώσκοντες
    τὸν ποιήσαντα αὐτούς, φονεῖς τέκνων, φθορεῖς πλάσματος Θεοῦ, ἀποστρεφόμενοι τὸν
    δεόμενον, καταπονοῦντες τὸν θλιβόμενον, πλουσίων παράκλητοι, πενήτων ἄνομοι κριταί,
    πανθαμάρτητοι· ῥυσθείητε, τέκνα, ἀπὸ τούτων ἁπάντων.
  language: Greek
translation:
  text: persecutors of the good, hating truth, loving falsehood, not knowing the reward
    of righteousness, not cleaving to what is good nor to righteous judgment, keeping
    watch not for what is good but for what is evil; from whom gentleness and patience
    are far, loving vain things, pursuing recompense, not showing mercy to a poor
    man, not laboring on behalf of one who is oppressed, not knowing the one who made
    them, murderers of children, destroyers of God's handiwork, turning away from
    the one in need, oppressing the one under affliction, advocates of the rich, lawless
    judges of the poor, altogether sinful. Be delivered, children, from all these
    things.
  philosophy: optimal-equivalence
