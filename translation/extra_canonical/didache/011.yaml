translation:
  text: 'Therefore, whoever comes and teaches you all these things that have been
    said before, receive him. But if the teacher himself turns and teaches another
    teaching so as to overthrow these things, do not listen to him. Yet if it is for
    adding righteousness and knowledge of the Lord, receive him as the Lord.


    Now concerning the apostles and prophets, according to the ordinance of the gospel,
    act in this way. Let every apostle who comes to you be received as the Lord. But
    he shall not remain one day only; if there is need, also the next. But if he remains
    three days, he is a false prophet. And when the apostle departs, let him take
    nothing except bread, until he finds lodging; but if he asks for money, he is
    a false prophet.


    And every prophet speaking in the Spirit you shall not test, nor shall you judge;
    for every sin will be forgiven, but this sin will not be forgiven. Yet not everyone
    speaking in the Spirit is a prophet, but only if he has the ways of the Lord.
    So then, from their ways the false prophet and the prophet will be known. And
    every prophet who appoints a table in the Spirit shall not eat from it; otherwise
    he is a false prophet. And every prophet teaching the truth, if he does not do
    what he teaches, is a false prophet. But every prophet who has been tested and
    is genuine, acting for the mystery of the worldly church, yet not teaching you
    to do all that he himself does, shall not be judged by you; for he has his judgment
    with God. For in the same way the ancient prophets also acted.


    But whoever says in the Spirit, “Give me money,” or something else, you shall
    not listen to him. Yet if he tells you to give for others who are in need, let
    no one judge him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '11:5'
    text: Or, 'until he lodges' or 'until he reaches his night's shelter.' The Greek
      concerns obtaining lodging on the journey.
    reason: lexical_alternative
  - marker: '11:7'
    text: The warning about a sin that 'will not be forgiven' echoes the dominical
      saying about blasphemy against the Holy Spirit; compare Matt 12:31; Mark 3:28–29;
      Luke 12:10.
    reason: cross_reference
  - marker: '11:8'
    text: 'Discernment is not abolished: the chapter immediately says prophets are
      known ''from their ways.'' The prohibition in the previous line concerns irreverent
      testing of inspired speech, not suspension of moral evaluation.'
    reason: cross_reference
  - marker: '11:9'
    text: '''Appoints a table'' may refer to directing or setting out a meal while
      speaking in the Spirit, possibly in a liturgical or symbolic setting.'
    reason: cultural_note
  - marker: '11:11'
    text: The clause 'acting for the mystery of the worldly church' is obscure. It
      may refer to a symbolic action performed for the church's life in the world.
      The translation keeps the ambiguity rather than forcing a single interpretation.
    reason: alternative_reading
lexical_decisions:
- source_word: δέξασθε / δεχθήτω
  chosen: receive / be received
  alternatives:
  - welcome
  - accept
  lexicon: LSJ
  rationale: The verb carries hospitable reception of an itinerant teacher or apostle,
    not mere intellectual acceptance. 'Receive' preserves both hospitality and ecclesial
    recognition.
- source_word: ἄλλην διδαχήν
  chosen: another teaching
  alternatives:
  - different doctrine
  - other instruction
  lexicon: BDAG
  rationale: '''Teaching'' keeps continuity with the Didache''s own title and avoids
    importing later technical overtones of ''doctrine'' in the main text, though the
    sense is doctrinal.'
- source_word: εἰς τὸ καταλῦσαι
  chosen: so as to overthrow these things
  alternatives:
  - to destroy
  - to abolish
  lexicon: BDAG
  rationale: The infinitive expresses purpose or result. 'Overthrow' conveys dismantling
    what was previously taught without sounding overly wooden.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: In this moral-catechetical context, 'righteousness' better preserves
    the ethical-religious sense central to early Christian instruction.
- source_word: γνῶσιν Κυρίου
  chosen: knowledge of the Lord
  alternatives:
  - knowledge concerning the Lord
  lexicon: BDAG
  rationale: A straightforward rendering preserves the phrase's theological weight
    and avoids over-interpretation.
- source_word: ὡς Κύριον
  chosen: as the Lord
  alternatives:
  - as Lord
  lexicon: BDAG
  rationale: The comparison is strong and likely means reception with honor due to
    the Lord's representative. 'As the Lord' preserves the startling force.
- source_word: κατὰ τὸ δόγμα τοῦ εὐαγγελίου
  chosen: according to the ordinance of the gospel
  alternatives:
  - according to the rule of the gospel
  - according to the teaching of the gospel
  lexicon: LSJ
  rationale: δόγμα here is a norm or directive for practice. 'Ordinance' preserves
    church-order texture better than the more abstract 'teaching'.
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: The term is already established in early Christian usage and should be
    retained rather than flattened to 'messenger'.
- source_word: ψευδοπροφήτης
  chosen: false prophet
  alternatives:
  - lying prophet
  lexicon: BDAG
  rationale: This is the standard and transparent rendering in Christian discourse
    and matches the moral-testing context.
- source_word: αὐλισθῇ
  chosen: he finds lodging
  alternatives:
  - he lodges
  - he settles for the night
  lexicon: LSJ
  rationale: The verb concerns obtaining shelter or lodging on the journey. 'Finds
    lodging' is idiomatic and contextually clear.
- source_word: λαλοῦντα ἐν πνεύματι
  chosen: speaking in the Spirit
  alternatives:
  - speaking by the Spirit
  - uttering in spirit
  lexicon: BDAG
  rationale: The phrase denotes inspired speech. Capitalizing 'Spirit' reflects likely
    reference to the Holy Spirit while preserving the Greek expression.
- source_word: πειράσετε
  chosen: test
  alternatives:
  - try
  - put to the test
  lexicon: BDAG
  rationale: The prohibition concerns challenging or probing an inspired utterance.
    'Test' is concise and traditional.
- source_word: διακρινεῖτε
  chosen: judge
  alternatives:
  - discern
  - evaluate
  lexicon: BDAG
  rationale: Though the verb can mean discern, here paired with 'test' in a prohibition
    it likely means passing judgment on the utterance. The later lines clarify that
    discernment occurs by conduct.
- source_word: τρόπους Κυρίου
  chosen: the ways of the Lord
  alternatives:
  - the Lord's manner of life
  - the Lord's ways
  lexicon: BDAG
  rationale: '''Ways'' preserves biblical moral language and the concrete ethical
    pattern by which true and false prophets are distinguished.'
- source_word: ὁρίζων τράπεζαν
  chosen: appoints a table
  alternatives:
  - sets a table
  - orders a meal
  lexicon: LSJ
  rationale: The phrase is difficult and likely refers to directing a meal in an inspired
    state. 'Appoints a table' stays close to the Greek while leaving room for later
    refinement.
- source_word: δεδοκιμασμένος, ἀληθινός
  chosen: has been tested and is genuine
  alternatives:
  - approved and true
  - proven and authentic
  lexicon: BDAG
  rationale: The pair emphasizes prior examination and authenticity. 'Tested and genuine'
    communicates both ecclesial discernment and moral reliability.
- source_word: ποιῶν εἰς μυστήριον κοσμικὸν ἐκκλησίας
  chosen: acting for the mystery of the worldly church
  alternatives:
  - performing a symbolic act for the church in the world
  - acting unto a worldly mystery of the church
  lexicon: LSJ
  rationale: This clause is notoriously obscure. The rendering stays relatively literal
    and preserves the strangeness rather than resolving it into a speculative paraphrase.
- source_word: οὐ κριθήσεται ἐφ᾽ ὑμῶν
  chosen: shall not be judged by you
  alternatives:
  - is not to be judged before you
  - shall not be condemned by you
  lexicon: BDAG
  rationale: The sense is that the community is not authorized to pass judgment in
    this exceptional case.
- source_word: ὑστερούντων
  chosen: who are in need
  alternatives:
  - who lack
  - who are in want
  lexicon: BDAG
  rationale: The participle denotes those lacking necessities. 'In need' is natural
    English and preserves the charitable context.
theological_decisions:
- issue: Whether ἐν πνεύματι should be rendered with capitalized 'Spirit'
  chosen_reading: Capitalized as 'in the Spirit'
  alternative_readings:
  - in spirit
  rationale: In this chapter the phrase refers to prophetic utterance understood as
    inspired speech. Capitalization reflects likely reference to the Holy Spirit while
    acknowledging that the Greek manuscripts themselves do not mark case distinction.
  doctrine_reference: Preserve theological weight without over-paraphrase.
- issue: How to render κατὰ τὸ δόγμα τοῦ εὐαγγελίου
  chosen_reading: according to the ordinance of the gospel
  alternative_readings:
  - according to the rule of the gospel
  - according to the teaching of the gospel
  rationale: The context is practical regulation for receiving itinerant ministers.
    'Ordinance' best preserves normative church-order force without importing later
    confessional systems.
  doctrine_reference: Preserve early-Christian moral/liturgical language carefully.
- issue: How to handle the obscure clause ποιῶν εἰς μυστήριον κοσμικὸν ἐκκλησίας
  chosen_reading: acting for the mystery of the worldly church
  alternative_readings:
  - performing a symbolic act for the church in the world
  - acting for a worldly mystery of the church
  rationale: The Greek is difficult and likely technical or idiomatic. Rather than
    flattening it into a confident paraphrase, the main text preserves the ambiguity
    and strangeness, with explanation in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
