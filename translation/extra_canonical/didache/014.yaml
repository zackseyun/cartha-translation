id: DID.14
reference: Didache 14
unit: chapter
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Κατὰ κυριακὴν δὲ Κυρίου συναχθέντες κλάσατε ἄρτον καὶ εὐχαριστήσατε προεξομολογησάμενοι
    τὰ παραπτώματα ὑμῶν, ὅπως καθαρὰ ἡ θυσία ὑμῶν ᾖ. Πᾶς δὲ ἔχων τὴν ἀμφιβολίαν μετὰ
    τοῦ ἑταίρου αὐτοῦ μὴ συνελθέτω ὑμῖν, ἕως οὗ διαλλαγῶσιν, ἵνα μὴ κοινωθῇ ἡ θυσία
    ὑμῶν· αὕτη γάρ ἐστιν ἡ ῥηθεῖσα ὑπὸ Κυρίου· Ἐν παντὶ τόπῳ καὶ χρόνῳ προσφέρειν
    μοι θυσίαν καθαράν· ὅτι βασιλεὺς μέγας εἰμί, λέγει Κύριος, καὶ τὸ ὄνομά μου θαυμαστὸν
    ἐν τοῖς ἔθνεσι.
  language: Greek
  pages:
  - 38
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number
    noise and page segmentation were cleaned, but the translation must stay anchored
    in the Greek wording.
translation:
  text: 'But on the Lord’s own day, after you have gathered together, break bread
    and give thanks, after first confessing your transgressions, so that your sacrifice
    may be pure. But let no one who has a dispute with his companion come together
    with you until they are reconciled, so that your sacrifice may not be defiled.
    For this is what was spoken by the Lord: “In every place and time offer me a pure
    sacrifice, because I am a great King,” says the Lord, “and my name is marvelous
    among the nations.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening phrase may also be rendered 'On the Lord’s Day.' The Greek expression
      is emphatic and somewhat unusual.
    reason: lexical_alternative
  - marker: b
    text: The citation echoes Malachi 1:11, 14 in wording and theme.
    reason: cross_reference
  - marker: c
    text: '''Sacrifice'' is retained because the Greek uses explicit sacrificial language;
      some readers may understand this as referring especially to the Eucharistic
      thanksgiving meal.'
    reason: cultural_note
lexical_decisions:
- source_word: Κατὰ κυριακὴν δὲ Κυρίου
  chosen: But on the Lord’s own day
  alternatives:
  - On the Lord's Day
  - According to the Lord's day
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic and liturgical. Rendering it 'on the
    Lord’s own day' preserves the doubled κυριακή / Κυρίου emphasis without collapsing
    it into a later ecclesiastical title too quickly, while still reading naturally
    in English.
- source_word: συναχθέντες
  chosen: after you have gathered together
  alternatives:
  - having assembled
  - when you come together
  lexicon: BDAG
  rationale: An aorist participle preceding the main imperatives; 'after you have
    gathered together' preserves sequence and communal assembly language appropriate
    to church order.
- source_word: κλάσατε ἄρτον
  chosen: break bread
  alternatives:
  - break the bread
  - break a loaf
  lexicon: BDAG
  rationale: A standard early-Christian meal and Eucharistic expression. 'Break bread'
    preserves the liturgical resonance without over-specifying beyond the Greek anarthrous
    ἄρτον.
- source_word: εὐχαριστήσατε
  chosen: give thanks
  alternatives:
  - offer thanksgiving
  - celebrate the Eucharist
  lexicon: BDAG
  rationale: The verb plainly means 'give thanks.' Although Eucharistic overtones
    are likely, translating it as 'celebrate the Eucharist' would import later technical
    phrasing beyond the immediate Greek.
- source_word: προεξομολογησάμενοι
  chosen: after first confessing
  alternatives:
  - having confessed beforehand
  - after openly acknowledging
  lexicon: LSJ
  rationale: The compound verb carries the sense of prior/open confession. 'After
    first confessing' captures both the temporal priority and penitential setting
    in clear English.
- source_word: τὰ παραπτώματα ὑμῶν
  chosen: your transgressions
  alternatives:
  - your trespasses
  - your offenses
  - your sins
  lexicon: BDAG
  rationale: παραπτώματα often denotes moral lapses or offenses. 'Transgressions'
    preserves moral gravity and liturgical seriousness better than the lighter 'offenses,'
    while avoiding flattening everything to the broader term 'sins.'
- source_word: θυσία
  chosen: sacrifice
  alternatives:
  - offering
  lexicon: BDAG
  rationale: The chapter explicitly frames the community's act in sacrificial language
    and then cites prophetic sacrificial language. 'Sacrifice' should be retained
    rather than softened to 'offering.'
- source_word: ἔχων τὴν ἀμφιβολίαν
  chosen: who has a dispute
  alternatives:
  - who has a quarrel
  - who is at odds
  - who has a grievance
  lexicon: LSJ
  rationale: The phrase indicates relational conflict or contention. 'Has a dispute'
    is natural English and broad enough to cover unresolved interpersonal division
    without overstating hostility.
- source_word: μετὰ τοῦ ἑταίρου αὐτοῦ
  chosen: with his companion
  alternatives:
  - with his fellow
  - with his brother
  lexicon: LSJ
  rationale: ἑταῖρος is 'companion' or 'associate.' 'Companion' preserves the interpersonal
    and communal sense without importing the more specifically ecclesial 'brother,'
    which the Greek does not use here.
- source_word: μὴ συνελθέτω ὑμῖν
  chosen: let no one ... come together with you
  alternatives:
  - let him not join your assembly
  - let him not assemble with you
  lexicon: BDAG
  rationale: The prohibition concerns participation in the gathered assembly. 'Come
    together with you' is idiomatic and keeps the communal-action focus.
- source_word: διαλλαγῶσιν
  chosen: they are reconciled
  alternatives:
  - they make peace
  - they are restored to one another
  lexicon: BDAG
  rationale: The passive/subjunctive sense points to reconciliation as the needed
    resolution. 'They are reconciled' is the clearest ecclesial and relational rendering.
- source_word: κοινωθῇ
  chosen: be defiled
  alternatives:
  - be profaned
  - be made common
  lexicon: BDAG
  rationale: In this cultic context, the concern is that the sacrifice lose its consecrated
    purity. 'Be defiled' communicates the purity/impurity contrast established by
    καθαρά.
- source_word: ἡ ῥηθεῖσα ὑπὸ Κυρίου
  chosen: what was spoken by the Lord
  alternatives:
  - the thing spoken by the Lord
  - what the Lord said
  lexicon: BDAG
  rationale: This preserves the formal citation style introducing the prophetic quotation.
- source_word: Ἐν παντὶ τόπῳ καὶ χρόνῳ
  chosen: In every place and time
  alternatives:
  - In every place and at every time
  - Everywhere and always
  lexicon: LSJ
  rationale: A close rendering that preserves the universal scope of the citation.
    'Everywhere and always' is smoother but less textually transparent.
- source_word: προσφέρειν μοι θυσίαν καθαράν
  chosen: offer me a pure sacrifice
  alternatives:
  - bring me a clean sacrifice
  - present to me a pure offering
  lexicon: BDAG
  rationale: The infinitive in citation form is naturally rendered as an imperative
    in English quotation context. 'Pure sacrifice' preserves the cultic and moral
    force of καθαράν.
- source_word: βασιλεὺς μέγας
  chosen: a great King
  alternatives:
  - the great King
  lexicon: BDAG
  rationale: The anarthrous Greek is well represented by 'a great King,' though the
    sense is still exalted and absolute in context.
- source_word: θαυμαστὸν ἐν τοῖς ἔθνεσι
  chosen: marvelous among the nations
  alternatives:
  - wonderful among the nations
  - held in awe among the Gentiles
  lexicon: LSJ
  rationale: '''Marvelous'' preserves the sense of wonder and renown. ''Nations''
    is preferred over ''Gentiles'' here because the citation has a broad peoples-of-the-world
    scope.'
theological_decisions:
- issue: Whether κυριακὴν ... Κυρίου should be rendered as the technical title 'the
    Lord’s Day' or more literally
  chosen_reading: Rendered as 'the Lord’s own day'
  alternative_readings:
  - the Lord's Day
  - the day of the Lord
  rationale: The Greek wording is unusual and emphatic. The chosen rendering preserves
    the liturgical reference to the community's stated day of gathering while avoiding
    overconfidence that the text uses the later fixed title in exactly the same way.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity where real.'
- issue: Whether θυσία refers metaphorically to prayer/thanksgiving only or to the
    Eucharistic act in sacrificial terms
  chosen_reading: Retained 'sacrifice' in the main text without reduction
  alternative_readings:
  - offering
  - Eucharistic offering
  rationale: The text itself uses sacrificial language repeatedly and grounds it in
    a prophetic citation. The translation should preserve that theological texture
    without narrowing it to a later doctrinal formula.
  doctrine_reference: Preserve theological tension rather than resolve it.
