id: DID.01
reference: Didache 1
unit: chapter
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Ὁδοὶ δύο εἰσί, μία τῆς ζωῆς καὶ μία τοῦ θανάτου, διαφορὰ δὲ πολλὴ μεταξὺ τῶν
    δύο ὁδῶν. Ἡ μὲν οὖν ὁδὸς τῆς ζωῆς ἐστιν αὕτη· πρῶτον, ἀγαπήσεις τὸν Θεὸν τὸν ποιήσαντά
    σε· δεύτερον, τὸν πλησίον σου ὡς σεαυτόν· πάντα δὲ ὅσα ἐὰν θελήσῃς μὴ γίνεσθαί
    σοι, καὶ σὺ ἄλλῳ μὴ ποίει. Τούτων δὲ τῶν λόγων ἡ διδαχὴ ἐστὶν αὕτη· Εὐλογεῖτε
    τοὺς καταρωμένους ὑμῖν καὶ προσεύχεσθε ὑπὲρ τῶν ἐχθρῶν ὑμῶν, νηστεύετε δὲ ὑπὲρ
    τῶν διωκόντων ὑμᾶς· ποία γὰρ χάρις, ἐὰν ἀγαπᾶτε τοὺς ἀγαπῶντας ὑμᾶς· οὐχὶ καὶ
    τὰ ἔθνη τὸ αὐτὸ ποιοῦσιν ; ὑμεῖς δὲ ἀγαπᾶτε τοὺς μισοῦντας ὑμᾶς καὶ οὐχ ἕξετε
    ἐχθρόν. Ἀπέχου τῶν σαρκικῶν καὶ κοσμικῶν ἐπιθυμιῶν. Ἐάν τις σοὶ δῷ ῥάπισμα εἰς
    τὴν δεξιὰν σιαγόνα, στρέψον αὐτῷ καὶ τὴν ἄλλην, καὶ ἔσῃ τέλειος· ἐὰν ἀγγαρεύσῃ
    σε τις μίλιον ἕν, ὕπαγε μετʼ αὐτοῦ δύο· ἐὰν ἄρῃ τις τὸ ἱμάτιόν σου, δὸς αὐτῷ καὶ
    τὸν χιτῶνα· ἐὰν λάβῃ τις ἀπὸ σοῦ τὸ σόν, μὴ ἀπαίτει· οὐδὲ γὰρ δύνασαι. Παντὶ τῷ
    αἰτοῦντί σε δίδου καὶ μὴ ἀπαίτει· πᾶσι γὰρ θέλει δίδοσθαι ὁ πατὴρ ἐκ τῶν ἰδίων
    χαρισμάτων. Μακάριος ὁ διδοὺς κατὰ τὴν ἐντολήν· ἀθῷος γάρ ἐστιν· οὐαὶ τῷ λαμβάνοντι·
    εἰ μὲν γὰρ χρείαν ἔχων λαμβάνει τις, ἀθῷος ἔσται· ὁ δὲ μὴ χρείαν ἔχων δώσει δίκην,
    ἱνατί ἔλαβε καὶ εἰς τί, ἐν συνοχῇ δὲ γενόμενος ἐξετασθήσεται περὶ ὧν ἔπραξε, καὶ
    οὐκ ἐξελεύσεται ἐκεῖθεν μέχρις οὗ ἀποδῷ τὸν ἔσχατον κοδράντην. Ἀλλὰ καὶ περὶ τούτου
    δὴ εἴρηται· Ἱδρωσάτω ἡ ἐλεημοσύνη σου εἰς τὰς χεῖράς σου, μέχρις ἂν γνῷς τίνι
    δῷς.
  language: Greek
  pages:
  - 16
  - 18
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number
    noise and page segmentation were cleaned, but the translation must stay anchored
    in the Greek wording.
translation:
  text: 'There are two ways, one of life and one of death, and there is a great difference
    between the two ways. Now this is the way of life: first, you shall love God who
    made you; second, your neighbor as yourself. And whatever you would not want to
    happen to you, do not do to another.


    And the teaching of these words is this: bless those who curse you, and pray for
    your enemies, and fast for those who persecute you. For what credit is it if you
    love those who love you? Do not even the Gentiles do the same? But you, love those
    who hate you, and you will not have an enemy.


    Abstain from fleshly and worldly desires. If anyone gives you a blow on the right
    cheek, turn to him the other also, and you will be perfect. If anyone compels
    you to go one mile, go with him two. If anyone takes away your cloak, give him
    your tunic also. If anyone takes from you what is yours, do not demand it back,
    for you are not able. Give to everyone who asks you, and do not demand it back;
    for the Father wills that gifts be given to all from his own gracious gifts. Blessed
    is the one who gives according to the commandment, for he is innocent. But woe
    to the one who receives. For if someone receives because he has need, he will
    be innocent; but the one who has no need will pay the penalty: why he received,
    and for what purpose. And having come under confinement, he will be examined concerning
    the things he did, and he will not come out from there until he repays the last
    quadrans.


    But about this, it has also been said: Let your alms sweat in your hands until
    you know to whom you should give.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: '''Gentiles'' could also be rendered ''nations''; here it refers to those
      outside the covenant community.'
    reason: lexical_alternative
  - marker: '2'
    text: A quadrans was a very small Roman coin.
    reason: cultural_note
  - marker: '3'
    text: The saying 'Let your alms sweat in your hands' is a vivid metaphor urging
      discernment in giving rather than impulsive distribution.
    reason: cultural_note
lexical_decisions:
- source_word: ὁδοί
  chosen: ways
  rationale: Retains the moral-metaphorical force of a manner of life, a standard
    early-Christian and Jewish ethical image, without reducing it to merely physical
    paths.
  alternatives:
  - paths
  lexicon: LSJ
- source_word: ζωῆς / θανάτου
  chosen: life / death
  rationale: The genitives define the two moral destinies or spheres; the simple nouns
    preserve the stark ethical contrast.
  alternatives:
  - living / dying
  lexicon: BDAG
- source_word: διαφορὰ
  chosen: difference
  rationale: '''Difference'' is natural English and preserves the emphatic contrast
    between the two ways.'
  alternatives:
  - distinction
  - separation
  lexicon: LSJ
- source_word: ἀγαπήσεις
  chosen: you shall love
  rationale: Future form used imperatively echoes scriptural command language; 'you
    shall love' preserves the moral and catechetical register.
  alternatives:
  - love
  lexicon: BDAG
- source_word: πλησίον
  chosen: neighbor
  rationale: Established and accurate ethical term, preserving the scriptural allusion.
  alternatives:
  - the one near you
  lexicon: BDAG
- source_word: ἄλλῳ
  chosen: another
  rationale: The Greek is broader here than repeating 'neighbor'; 'another' preserves
    the general scope of the negative golden rule.
  alternatives:
  - someone else
  - your neighbor
  lexicon: BDAG
- source_word: λόγων
  chosen: words
  rationale: The phrase 'the teaching of these words' keeps the text's explicit link
    between the preceding commands and their practical instruction.
  alternatives:
  - sayings
  - teachings
  lexicon: BDAG
- source_word: χάρις
  chosen: credit
  rationale: In this rhetorical question the sense is not saving grace but what favorable
    credit or commendation one has; 'credit' communicates that clearly.
  alternatives:
  - grace
  - benefit
  lexicon: BDAG
- source_word: ἔθνη
  chosen: Gentiles
  rationale: In this moral contrast the term refers to those outside the covenant
    community; 'Gentiles' preserves the early-Christian/Jewish texture better than
    the more interpretive 'pagans'.
  alternatives:
  - nations
  - pagans
  lexicon: BDAG
- source_word: Ἀπέχου
  chosen: Abstain from
  rationale: A direct imperative of moral separation. 'Abstain from' fits the formal,
    catechetical register of the text slightly better than 'Keep away from' while
    preserving the force of the command.
  alternatives:
  - Keep away from
  lexicon: BDAG
- source_word: σαρκικῶν καὶ κοσμικῶν ἐπιθυμιῶν
  chosen: fleshly and worldly desires
  rationale: Preserves the early-Christian moral vocabulary of desires tied to the
    flesh and the world, without archaic diction.
  alternatives:
  - bodily and worldly lusts
  - carnal and worldly desires
  lexicon: BDAG
- source_word: ῥάπισμα
  chosen: a blow
  rationale: A concrete act of striking the cheek; 'a blow' is dignified and not overly
    colloquial.
  alternatives:
  - a slap
  - a strike
  lexicon: BDAG
- source_word: τέλειος
  chosen: perfect
  rationale: The term can mean complete or mature, but 'perfect' preserves the traditional
    ethical ideal and the elevated moral register.
  alternatives:
  - complete
  - mature
  lexicon: BDAG
- source_word: ἀγγαρεύσῃ
  chosen: compels
  rationale: Refers to compulsory service, especially in the Roman context; 'compels'
    is concise and faithful.
  alternatives:
  - forces into service
  - presses into service
  lexicon: BDAG
- source_word: ἱμάτιον / χιτών
  chosen: cloak / tunic
  rationale: Keeps the distinction between outer and inner garments in familiar English
    terms.
  alternatives:
  - outer garment / inner garment
  lexicon: BDAG
- source_word: ἀπαίτει
  chosen: demand it back
  rationale: Captures the sense of reclaiming or exacting return while fitting the
    surrounding commands.
  alternatives:
  - ask it back
  - require repayment
  lexicon: BDAG
- source_word: χαρισμάτων
  chosen: gracious gifts
  rationale: The word is cognate with grace/favor; 'gracious gifts' preserves that
    nuance better than the bare 'gifts' alone.
  alternatives:
  - gifts
  - favors
  lexicon: BDAG
- source_word: ἀθῷος
  chosen: innocent
  rationale: Conveys freedom from liability in the moral-judicial sense present in
    the passage.
  alternatives:
  - guiltless
  - blameless
  lexicon: BDAG
- source_word: δώσει δίκην
  chosen: will pay the penalty
  rationale: An idiom for undergoing penalty or punishment; this rendering is clear
    and preserves the judicial tone.
  alternatives:
  - will suffer punishment
  - will give satisfaction
  lexicon: LSJ
- source_word: ἐν συνοχῇ
  chosen: under confinement
  rationale: The immediate context of examination and not coming out until repayment
    suggests punitive restraint; 'under confinement' best fits the sequence.
  alternatives:
  - in distress
  - in custody
  lexicon: LSJ
- source_word: κοδράντην
  chosen: quadrans
  rationale: Retaining the coin name preserves historical texture; the sense can be
    clarified in a footnote.
  alternatives:
  - small coin
  lexicon: BDAG
- source_word: ἐλεημοσύνη
  chosen: alms
  rationale: A technical term for charitable giving to the needy; 'alms' preserves
    the early-Christian ethical and liturgical texture.
  alternatives:
  - charity
  - mercy-gift
  lexicon: BDAG
- source_word: Ἱδρωσάτω
  chosen: Let ... sweat
  rationale: The vivid metaphor should be preserved rather than explained away; it
    suggests delaying distribution until discernment is exercised.
  alternatives:
  - Let ... perspire
  - Let ... remain
  lexicon: LSJ
theological_decisions:
- issue: Meaning of 'you will not have an enemy'
  chosen_reading: 'Rendered as a moral result: ''you will not have an enemy.'''
  rationale: The Greek most naturally states the result of enemy-love without fully
    specifying whether the change is in the disciple's stance or the relationship
    itself. The main text preserves the ambiguity rather than resolving it.
  alternative_readings:
  - '''you will have no enemy'' in the sense that no one remains your enemy'
  - '''you will not become an enemy'''
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of 'for you are not able' after 'do not demand it back'
  chosen_reading: Kept as 'for you are not able.'
  rationale: The clause is present in the supplied Greek and should be translated.
    Its exact nuance may be practical or moral, but the text itself leaves that unstated.
  alternative_readings:
  - '''for indeed you cannot'' as practical inability'
  - omitting as a scribal gloss
  doctrine_reference: Original-language primacy over translation tradition.
- issue: Sense of the warning to the receiver and subsequent confinement
  chosen_reading: Translated in judicial-moral terms without overdefining the setting.
  rationale: The language of penalty, examination, and repayment evokes judgment,
    but the text does not specify the forum. The translation preserves the warning's
    severity without narrowing it.
  alternative_readings:
  - explicitly eschatological judgment
  - strictly ecclesial discipline
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'Let your alms sweat in your hands'
  chosen_reading: Preserved as a literal metaphor with a footnote-level explanation.
  rationale: The striking image is part of the text's moral force. A literal rendering
    keeps the metaphor visible while allowing explanation in annotation.
  alternative_readings:
  - interpretive paraphrase such as 'hold back your charity until you know'
  doctrine_reference: Do not paraphrase beyond what the Greek warrants.
