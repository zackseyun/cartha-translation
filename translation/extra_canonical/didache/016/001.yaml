lexical_decisions:
- source_word: Γρηγορεῖτε
  chosen: Keep watch
  rationale: Imperative of vigilant readiness; 'Keep watch' preserves the eschatological
    and moral force without sounding colloquial.
  alternatives:
  - Be watchful
  - Stay awake
  entry: γρηγορέω
  lexicon: BDAG
- source_word: ὑπὲρ τῆς ζωῆς ὑμῶν
  chosen: over your life
  rationale: Here ὑπέρ carries a protective sense. 'Over your life' fits the watchfulness
    image better than the more idiomatic but potentially narrower 'for your life'.
  alternatives:
  - for your life
  - concerning your life
  entry: ὑπέρ
  lexicon: BDAG
- source_word: ἐκλυέσθωσαν
  chosen: be loosened
  rationale: The image is of readiness not being let slack. 'Be loosened' preserves
    the metaphor more directly than an interpretive paraphrase.
  alternatives:
  - be slackened
  - be relaxed
  entry: ἐκλύω
  lexicon: BDAG
- source_word: Πυκνῶς
  chosen: often
  rationale: Conveys repeated gathering without over-specifying institutional regularity.
  alternatives:
  - frequently
  - regularly
  entry: πυκνῶς
  lexicon: BDAG
- source_word: τὰ ἀνήκοντα
  chosen: the things that are fitting
  rationale: Keeps the moral and spiritual appropriateness implied by the participle
    without reducing it to mere utility.
  alternatives:
  - the things that matter
  - what is beneficial
  - what pertains
  entry: ἀνήκω
  lexicon: BDAG
- source_word: τελειωθῆτε
  chosen: are made complete
  rationale: Preserves the completion/perfection idea while remaining readable; avoids
    overloading with later technical theology.
  alternatives:
  - are perfected
  - reach completion
  entry: τελειόω
  lexicon: BDAG
- source_word: ἐσχάτῳ καιρῷ
  chosen: the last season
  rationale: καιρός is a decisive season or appointed time, not merely clock-time
    (χρόνος); 'season' preserves that nuance.
  alternatives:
  - the final time
  - the end time
  entry: καιρός
  lexicon: BDAG
- source_word: φθορεῖς
  chosen: corrupters
  rationale: The term suggests those who ruin or corrupt others morally/spiritually.
    'Corrupters' best preserves that active sense.
  alternatives:
  - deceivers
  - destroyers
  entry: φθορεύς
  lexicon: BDAG
- source_word: ὁ κοσμοπλάνος
  chosen: the world-deceiver
  rationale: A rare and vivid term; 'world-deceiver' preserves its compact force and
    apocalyptic character.
  alternatives:
  - the deceiver of the world
  entry: κοσμοπλάνος
  lexicon: Lampe
- source_word: ὡς υἱὸς Θεοῦ
  chosen: as a son of God
  rationale: The Greek lacks the article before υἱός. Rendering it indefinitely avoids
    granting the figure the true christological title while preserving the blasphemous
    imitation.
  alternatives:
  - as the Son of God
  entry: υἱός
  lexicon: BDAG
- source_word: ἀθέμιτα
  chosen: unlawful things
  rationale: Conveys acts contrary to what is permitted or right (θέμις) without importing
    a narrower cultic sense.
  alternatives:
  - abominations
  - forbidden things
  entry: ἀθέμιτος
  lexicon: BDAG
- source_word: ἐξ αἰῶνος
  chosen: since the age began
  rationale: This phrase means 'from eternity' or 'from of old.' 'Since the age began'
    is a more natural English idiom that captures the sense of primordial time without
    being overly archaic ('from time immemorial') or too literal ('from the age').
  alternatives:
  - from the age
  - from of old
  - from eternity
  entry: αἰών
  lexicon: BDAG
- source_word: ἡ κτίσις τῶν ἀνθρώπων
  chosen: the creation of men
  rationale: A difficult phrase. This rendering stays close to the Greek. Alternatives
    like 'the human race' or 'mankind' are interpretive paraphrases of a potentially
    more specific or unusual concept.
  alternatives:
  - the human race
  - the created order of men
  entry: κτίσις
  lexicon: BDAG
- source_word: πύρωσιν τῆς δοκιμασίας
  chosen: the fire of testing
  rationale: Captures both the fiery image (πύρωσις) and the proving/trial sense of
    δοκιμασία. The phrase echoes 1 Peter 4:12.
  alternatives:
  - the burning of trial
  - the fiery ordeal of testing
  entry: πύρωσις
  lexicon: BDAG
- source_word: σκανδαλισθήσονται
  chosen: will be caused to stumble
  rationale: Keeps the underlying stumbling-block image (σκάνδαλον) while allowing
    readers to infer apostasy in context.
  alternatives:
  - will fall away
  - will be offended
  entry: σκανδαλίζω
  lexicon: BDAG
- source_word: καταθέματος
  chosen: the accursed one
  rationale: The transmitted word (a form of κατάθεμα) is extremely difficult and
    likely problematic. If translated as given, it most naturally refers to a person
    who is accursed or devoted to destruction. This is preserved in the main text
    for auditability and flagged in a footnote as textually difficult.
  alternatives:
  - the curse
  - the one under a curse
  entry: κατάθεμα
  lexicon: LSJ
- source_word: ἐκπετάσεως
  chosen: an opening out
  rationale: The noun is rare and uncertain in nuance, derived from ἐκπετάννυμι ('to
    spread out'). 'Opening out' preserves the image of an unfolding or spreading in
    the heavens without overcommitting to a specific interpretation (e.g., the Cross).
  alternatives:
  - an outspreading
  - an unfolding
  entry: ἐκπέτασις
  lexicon: LSJ
- source_word: ἅγιοι
  chosen: the holy ones
  rationale: Avoids the later ecclesiastical narrowing of 'saints' while preserving
    the scriptural category of those set apart for God.
  alternatives:
  - the saints
  entry: ἅγιος
  lexicon: BDAG
theological_decisions:
- issue: Identity claim in ὡς υἱὸς Θεοῦ
  chosen_reading: Rendered 'as a son of God' rather than 'as the Son of God.'
  rationale: The anarthrous Greek (lacking a definite article) supports an indefinite
    or qualitative sense. This preserves the impostor's imitation without conferring
    the unique messianic title in the main text, a distinction noted in the accompanying
    footnote.
  alternative_readings:
  - as the Son of God
- issue: Difficult phrase ὑπ᾽ αὐτοῦ τοῦ καταθέματος
  chosen_reading: Main text keeps the most direct sense of the transmitted Greek,
    'by the accursed one himself,' with a footnote noting textual difficulty and alternative
    interpretations.
  rationale: The Greek as it stands is highly unusual and theologically awkward. For
    transparency, the translation does not silently emend or adopt a speculative reading.
    Instead, it renders the difficult text and flags the problem for the reader, acknowledging
    that the text may be corrupt.
  alternative_readings:
  - saved from under the curse itself
  - saved by him who was accursed (i.e., Christ)
  - a textual corruption for a different reading
- issue: Phrase ἡ κτίσις τῶν ἀνθρώπων
  chosen_reading: Rendered closely as 'the creation of men.'
  rationale: The phrase is unusual. A closer rendering preserves its potential specificity
    and ambiguity rather than prematurely resolving it into a smoother but potentially
    less accurate paraphrase like 'the human race.'
  alternative_readings:
  - the human race
  - human creation
  - mankind
