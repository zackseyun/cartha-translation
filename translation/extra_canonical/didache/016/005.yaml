  from: by the accursed one himself
  to: from under the curse itself
  rationale: Translating 'ὑπ᾽ αὐτοῦ τοῦ καταθέματος' as 'by the accursed one himself' makes the Antichrist the agent of salvation, which contradicts the author's theology and the immediate context. The noun κατάθεμα means 'curse' (neuter), not 'accursed one' (masculine). The preposition ὑπό with the genitive here carries a separative sense ('from under') or an instrumental sense ('by the curse itself', i.e., the testing or the cross). 'From under the curse itself' accurately reflects the Greek and the author's intended meaning.
