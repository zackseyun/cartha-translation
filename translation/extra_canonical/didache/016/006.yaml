  from: an opening out
  to: a spreading out
  rationale: 'The noun ἐκπέτασις (from ἐκπετάννυμι) specifically means a ''spreading out'' or ''stretching out'' (like wings or hands). ''Opening out'' obscures this lexical root and misleadingly suggests a rift or parting in the sky (which would typically be ἄνοιξις). ''Spreading out'' preserves both the literal Greek and the early Christian association with the outstretched arms of the cross. | Azure: The proposed change is lexically better grounded. ἐκπέτασις, derived from ἐκπετάννυμι, denotes an extension, stretching out, or spreading out, not an "opening" in the sense of a rupture or parting. So'
