  category: lexical
  tier: 3
  from: a trumpet's voice
  to: the sound of a trumpet
  rationale: 'While φωνή often means ''voice,'' when applied to an inanimate instrument like a σάλπιγξ (trumpet), it refers to its ''sound'' or ''blast'' (BDAG φωνή 1). Rendering it as ''voice'' introduces an unnatural personification in English that the Greek does not carry. | Azure: The proposed change is more faithful to the Greek. In the phrase σημεῖον φωνῆς σάλπιγγος, φωνή has the ordinary sense of a sound/noise when connected with an instrument, not a personal ''voice''; BDAG i'
