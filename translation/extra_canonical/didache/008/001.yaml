  text: Αἱ δὲ νηστεῖαι ὑμῶν μὴ ἔστωσαν μετὰ τῶν ὑποκριτῶν· νηστεύουσι γὰρ δευτέρα
    σαββάτων καὶ πέμπτῃ· ὑμεῖς δὲ νηστεύσατε τετράδα καὶ παρασκευήν. Μηδὲ προσεύχεσθε
    ὡς οἱ ὑποκριταί, ἀλλʼ ὡς ἐκέλευσεν ὁ Κύριος ἐν τῷ εὐαγγελίῳ αὐτοῦ, οὕτω προσεύχεσθε·
    Πάτερ ἡμῶν ὁ ἐν τῷ οὐρανῷ, ἁγιασθήτω τὸ ὄνομά σου, ἐλθέτω ἡ βασιλεία σου, γενηθήτω
    τὸ θέλημά σου ὡς ἐν οὐρανῷ καὶ ἐπὶ γῆς· τὸν ἄρτον ἡμῶν τὸν ἐπιούσιον δὸς ἡμῖν
    σήμερον καὶ ἄφες ἡμῖν τὴν ὀφειλὴν ἡμῶν ὡς καὶ ἡμεῖς ἀφίεμεν τοῖς ὀφειλέταις ἡμῶν,
    καὶ μὴ εἰσενέγκῃς ἡμᾶς εἰς πειρασμόν, ἀλλὰ ῥῦσαι ἡμᾶς ἀπὸ τοῦ πονηροῦ· ὅτι σοῦ
    ἐστιν ἡ δύναμις καὶ ἡ δόξα εἰς τοὺς αἰῶνας. Τρὶς τῆς ἡμέρας οὕτω προσεύχεσθε.
