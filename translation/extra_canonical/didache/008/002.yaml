id: DID.8.2
reference: Didache 8:2
unit: verse
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Μηδὲ προσεύχεσθε ὡς οἱ ὑποκριταί, ἀλλʼ ὡς ἐκέλευσεν ὁ Κύριος ἐν τῷ εὐαγγελίῳ
    αὐτοῦ, οὕτω προσεύχεσθε· Πάτερ ἡμῶν ὁ ἐν τῷ οὐρανῷ, ἁγιασθήτω τὸ ὄνομά σου, ἐλθέτω
    ἡ βασιλεία σου, γενηθήτω τὸ θέλημά σου ὡς ἐν οὐρανῷ καὶ ἐπὶ γῆς· τὸν ἄρτον ἡμῶν
    τὸν ἐπιούσιον δὸς ἡμῖν σήμερον καὶ ἄφες ἡμῖν τὴν ὀφειλὴν ἡμῶν ὡς καὶ ἡμεῖς ἀφίεμεν
    τοῖς ὀφειλέταις ἡμῶν, καὶ μὴ εἰσενέγκῃς ἡμᾶς εἰς πειρασμόν, ἀλλὰ ῥῦσαι ἡμᾶς ἀπὸ
    τοῦ πονηροῦ· ὅτι σοῦ ἐστιν ἡ δύναμις καὶ ἡ δόξα εἰς τοὺς αἰῶνας.
  language: Greek
translation:
  text: 'Neither pray as the hypocrites, but as the Lord commanded in his gospel,
    pray in this way:


    Our Father in heaven,

    may your name be made holy,

    may your kingdom come,

    may your will be done,

    as in heaven, so also on earth.

    Give us today our bread for the day,

    and forgive us our debt,

    as we also forgive our debtors,

    and do not bring us into testing,

    but rescue us from the evil one;

    for yours is the power and the glory unto the ages.'
  philosophy: optimal-equivalence
