id: DID.03
reference: Didache 3
unit: chapter
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Τέκνον μου, φεῦγε ἀπὸ παντὸς πονηροῦ καὶ ἀπὸ παντὸς ὁμοίου αὐτοῦ· Μὴ γίνου
    ὀργίλος· ὁδηγεῖ γὰρ ἡ ὀργὴ πρὸς τὸν φόνον· μηδὲ ζηλωτὴς μηδὲ ἐριστικὸς μηδὲ θυμικός·
    ἐκ γὰρ τούτων ἀπάντων φόνοι γεννῶνται. Τέκνον μου, μὴ γίνου ἐπιθυμητής· ὁδηγεῖ
    γὰρ ἡ ἐπιθυμία πρὸς τὴν πορείαν· μηδὲ αἰσχρολόγος μηδὲ ὑψηλοόφθαλμος· ἐκ γὰρ τούτων
    ἀπάντων μοιχεῖαι γεννῶνται. Τέκνον μου, μὴ γίνου οἰωνοσκόπος· ἐπειδὴ ὁδηγεῖ εἰς
    τὴν εἰδωλολατρείαν· μηδὲ ἐπαοιδὸς μηδὲ μαθηματικὸς μηδὲ περικαθαίρων, μηδὲ θέλε
    αὐτὰ βλέπειν· ἐκ γὰρ τούτων ἁπάντων εἰδωλολατρεία γεννᾶται. Τέκνον μου, μὴ γίνου
    ψεύστης· ἐπειδὴ ὁδηγεῖ τὸ ψεῦσμα εἰς τὴν κλοπήν· μηδὲ φιλάργυρος μηδὲ κενόδοξος·
    ἐκ γὰρ τούτων ἁπάντων κλοπαὶ γεννῶνται. Τέκνον μου, μὴ γίνου γόγγυσος· ἐπειδὴ
    ὁδηγεῖ εἰς τὴν βλασφημίαν· μηδὲ αὐθάδης μηδὲ πονηρόφρων· ἐκ γὰρ τούτων ἁπάντων
    βλασφημίαι γεννῶνται. Ἴσθι δὲ πραῢς, ἐπεὶ οἱ πραεῖς κληρονομήσουσι τὴν γῆν. Γίνου
    μακρόθυμος καὶ ἐλεήμων καὶ ἄκακος καὶ ἡσύχιος καὶ ἀγαθὸς καὶ τρέμων τοὺς λόγους
    διὰ παντός, οὓς ἤκουσας. Οὐχ ὑψώσεις σεαυτὸν οὐδὲ δώσεις τῇ ψυχῇ σου θράσος. Οὐ
    κολληθήσεται ἡ ψυχή σου μετὰ ὑψηλῶν, ἀλλὰ μετὰ δικαίων καὶ ταπεινῶν ἀναστραφήσῃ.
    Τὰ συμβαίνοντά σοι ἐνεργήματα ὡς ἀγαθὰ προσδέξῃ, εἰδὼς ὅτι ἄτερ Θεοῦ οὐδὲν γίνεται.
  language: Greek
  pages:
  - 20
  - 22
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number
    noise and page segmentation were cleaned, but the translation must stay anchored
    in the Greek wording.
translation:
  text: 'My child, flee from every evil thing, and from everything like it. Do not
    become quick-tempered, for anger leads to murder; nor jealous, nor quarrelsome,
    nor hot-headed, for from all these murders are born.


    My child, do not become lustful, for lust leads to sexual immorality; nor foul-mouthed,
    nor haughty-eyed, for from all these adulteries are born.


    My child, do not become an observer of omens, since it leads into idolatry; nor
    an enchanter, nor an astrologer, nor one who performs purifications, and do not
    even be willing to look at these things; for from all these idolatry is born.


    My child, do not become a liar, since lying leads to theft; nor money-loving,
    nor vainglorious, for from all these thefts are born.


    My child, do not become a grumbler, since it leads to blasphemy; nor self-willed,
    nor evil-minded, for from all these blasphemies are born.


    But be meek, since the meek will inherit the earth. Become patient and merciful
    and guileless and quiet and good, and always trembling at the words that you have
    heard. You shall not exalt yourself, nor give bold arrogance to your soul. Your
    soul shall not be joined with the lofty, but you shall associate with the righteous
    and humble. Receive the things that happen to you as good, knowing that apart
    from God nothing happens.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek form translated 'sexual immorality' appears in the normalized
      OCR as πορείαν, but the context strongly suggests the common moral term πορνείαν.
    reason: textual_variant
  - marker: b
    text: '''Blasphemy'' here may also carry the broader sense of slanderous or abusive
      speech, though the religious force suits the context well.'
    reason: lexical_alternative
  - marker: c
    text: '''The meek will inherit the earth'' echoes well-known scriptural language
      also found in the Beatitudes.'
    reason: cross_reference
  - marker: d
    text: The phrase translated 'the things that happen to you' is somewhat awkward
      in the source as transmitted here; the sense is to accept providential circumstances
      as good.
    reason: alternative_reading
lexical_decisions:
- source_word: φεῦγε
  chosen: flee
  alternatives:
  - avoid
  - shun
  lexicon: LSJ
  rationale: Imperative with strong moral urgency; 'flee' preserves the vivid force
    better than the milder 'avoid'.
- source_word: παντὸς πονηροῦ
  chosen: every evil thing
  alternatives:
  - every evil
  - everything wicked
  lexicon: LSJ
  rationale: The neuter expression is broad and practical; 'every evil thing' keeps
    the concrete moral scope without over-abstracting.
- source_word: ὁμοίου αὐτοῦ
  chosen: everything like it
  alternatives:
  - every likeness of it
  - everything similar to it
  lexicon: LSJ
  rationale: Captures the warning not only against overt evil but also against what
    resembles it.
- source_word: ὀργίλος
  chosen: quick-tempered
  alternatives:
  - prone to anger
  - irascible
  lexicon: LSJ
  rationale: Readable modern English that preserves the character trait, not merely
    a momentary emotion.
- source_word: ζηλωτής
  chosen: jealous
  alternatives:
  - zealous
  - envious
  lexicon: LSJ
  rationale: In this vice list the negative sense is intended; 'jealous' fits the
    progression toward violence better than the positive-sounding 'zealous'.
- source_word: ἐριστικός
  chosen: quarrelsome
  alternatives:
  - contentious
  - argumentative
  lexicon: LSJ
  rationale: Natural English for a person disposed to strife.
- source_word: θυμικός
  chosen: hot-headed
  alternatives:
  - passionate-tempered
  - wrathful
  lexicon: LSJ
  rationale: Conveys impulsive anger in idiomatic English while retaining moral seriousness.
- source_word: ἐπιθυμητής
  chosen: lustful
  alternatives:
  - desirous
  - one given to craving
  lexicon: LSJ
  rationale: The following clause points specifically toward sexual sin, so 'lustful'
    best reflects the contextual force.
- source_word: πορείαν
  chosen: sexual immorality
  alternatives:
  - fornication
  lexicon: LSJ
  rationale: The normalized OCR likely reflects πορνείαν; 'sexual immorality' is the
    accessible default for this moral term, while 'fornication' is narrower and more
    archaic.
- source_word: αἰσχρολόγος
  chosen: foul-mouthed
  alternatives:
  - obscene in speech
  - shameful-speaking
  lexicon: LSJ
  rationale: Preserves the focus on disgraceful speech in clear modern idiom.
- source_word: ὑψηλοόφθαλμος
  chosen: haughty-eyed
  alternatives:
  - arrogant
  - proud-looking
  lexicon: LSJ
  rationale: Keeps the bodily metaphor of proud eyes rather than flattening it to
    a generic abstraction.
- source_word: οἰωνοσκόπος
  chosen: observer of omens
  alternatives:
  - diviner by omens
  - augur
  lexicon: LSJ
  rationale: Makes the ancient practice intelligible without importing overly technical
    or archaic English.
- source_word: ἐπαοιδός
  chosen: enchanter
  alternatives:
  - spell-caster
  - charmer
  lexicon: LSJ
  rationale: Best concise rendering for one who uses incantations.
- source_word: μαθηματικός
  chosen: astrologer
  alternatives:
  - mathematician
  - caster of horoscopes
  lexicon: LSJ
  rationale: In early Christian vice lists this term commonly refers to astrological
    practitioners, not mathematical scholars.
- source_word: περικαθαίρων
  chosen: one who performs purifications
  alternatives:
  - sorcerous purifier
  - one who practices ritual cleansings
  lexicon: LSJ
  rationale: Keeps the participial force and the likely magical-religious sense without
    overcommitting to a narrower technical label.
- source_word: θέλε αὐτὰ βλέπειν
  chosen: do not even be willing to look at these things
  alternatives:
  - do not desire to see them
  - do not look at them
  lexicon: LSJ
  rationale: θέλε adds volitional force; the warning extends beyond practice to willing
    curiosity.
- source_word: ψεύστης
  chosen: liar
  alternatives:
  - false person
  - one who lies
  lexicon: LSJ
  rationale: Direct and idiomatic.
- source_word: φιλάργυρος
  chosen: money-loving
  alternatives:
  - greedy
  - lover of money
  lexicon: LSJ
  rationale: Retains the lexical image of loving silver/money, important in Christian
    moral discourse.
- source_word: κενόδοξος
  chosen: vainglorious
  alternatives:
  - vain
  - conceited
  lexicon: LSJ
  rationale: Preserves the sense of empty glory rather than mere self-esteem.
- source_word: γόγγυσος
  chosen: grumbler
  alternatives:
  - murmurer
  - complainer
  lexicon: LSJ
  rationale: Readable and still resonant with biblical moral language.
- source_word: βλασφημίαν / βλασφημίαι
  chosen: blasphemy / blasphemies
  alternatives:
  - slander / slanders
  - abusive speech
  lexicon: LSJ
  rationale: Given the religious-moral setting, 'blasphemy' preserves the gravity
    of speech against God or sacred things; broader abusive speech remains a possible
    nuance.
- source_word: αὐθάδης
  chosen: self-willed
  alternatives:
  - stubborn
  - arrogant
  lexicon: LSJ
  rationale: Traditional moral term that accurately conveys obstinate self-assertion.
- source_word: πονηρόφρων
  chosen: evil-minded
  alternatives:
  - malicious
  - wicked in thought
  lexicon: LSJ
  rationale: Keeps the inward mental dimension explicit.
- source_word: πραΰς
  chosen: meek
  alternatives:
  - gentle
  - humble
  lexicon: LSJ
  rationale: Echoes the beatitude allusion and preserves the scriptural register;
    'gentle' is possible but weaker intertextually.
- source_word: μακρόθυμος
  chosen: patient
  alternatives:
  - long-suffering
  - forbearing
  lexicon: LSJ
  rationale: Accessible rendering of enduring restraint.
- source_word: ἄκακος
  chosen: guileless
  alternatives:
  - innocent
  - harmless
  lexicon: LSJ
  rationale: Highlights moral simplicity and absence of deceit.
- source_word: ἡσύχιος
  chosen: quiet
  alternatives:
  - peaceable
  - calm
  lexicon: LSJ
  rationale: Retains the still, restrained quality of the virtue.
- source_word: τρέμων τοὺς λόγους
  chosen: trembling at the words
  alternatives:
  - revering the words with fear
  - standing in awe of the words
  lexicon: LSJ
  rationale: Preserves the strong biblical idiom of reverent fear before received
    instruction.
- source_word: θράσος
  chosen: bold arrogance
  alternatives:
  - presumption
  - audacity
  lexicon: LSJ
  rationale: Conveys not healthy courage but insolent self-assertion.
- source_word: κολληθήσεται
  chosen: shall not be joined
  alternatives:
  - shall not cling
  - shall not attach itself
  lexicon: LSJ
  rationale: Keeps the covenantal/relational force of close attachment.
- source_word: μετὰ ὑψηλῶν
  chosen: with the lofty
  alternatives:
  - with the proud
  - with the exalted
  lexicon: LSJ
  rationale: Preserves the adjective's social-moral sense without reducing it to a
    single nuance.
- source_word: ἀναστραφήσῃ
  chosen: you shall associate
  alternatives:
  - you shall live among
  - you shall conduct yourself with
  lexicon: LSJ
  rationale: In context it refers to one's company and manner of life among certain
    people.
- source_word: τὰ συμβαίνοντά σοι ἐνεργήματα
  chosen: the things that happen to you
  alternatives:
  - the events that befall you
  - the workings that come upon you
  lexicon: LSJ
  rationale: The phrase is somewhat awkward in the normalized text; this rendering
    preserves the sense of providential occurrences without over-specifying.
- source_word: ὡς ἀγαθὰ προσδέξῃ
  chosen: receive ... as good
  alternatives:
  - welcome ... as good
  - accept ... as blessings
  lexicon: LSJ
  rationale: Keeps the imperative of receptive trust while avoiding interpretive expansion
    beyond the Greek.
- source_word: ἄτερ Θεοῦ
  chosen: apart from God
  alternatives:
  - without God
  - outside God
  lexicon: LSJ
  rationale: Natural English preserving the claim of divine providence.
theological_decisions:
- issue: Rendering of πορείαν in the normalized OCR
  chosen_reading: Translated according to the likely intended sense 'sexual immorality,'
    noting that the form probably reflects normalized/OCR corruption of πορνείαν.
  alternative_readings:
  - journey
  - course of conduct
  - fornication
  rationale: The vice chain from lust to sexual sin, followed by adulteries, strongly
    supports the standard moral term rather than a literal 'journey.'
  doctrine_reference: Preserve source sense over translation tradition, while honestly
    noting uncertainty.
- issue: Sense of βλασφημία in this paraenetic context
  chosen_reading: Rendered as 'blasphemy / blasphemies' in the main text.
  alternative_readings:
  - slander / slanders
  - abusive speech
  rationale: The Didache's moral instruction is deeply religious in tone, and the
    progression from grumbling to blasphemy fits biblical patterns of murmuring against
    God; however, the broader semantic range is noted.
  doctrine_reference: Preserve theological weight rather than flattening to generic
    speech ethics.
- issue: Intertextual echo in οἱ πραεῖς κληρονομήσουσι τὴν γῆν
  chosen_reading: Used 'meek' and 'inherit the earth.'
  alternative_readings:
  - gentle ... inherit the land
  rationale: This wording preserves the recognizable scriptural echo to the beatitude/Psalm
    tradition while remaining faithful to the Greek.
  doctrine_reference: Preserve theological and literary texture where the source clearly
    evokes Scripture.
- issue: Providence in ἄτερ Θεοῦ οὐδὲν γίνεται
  chosen_reading: Rendered 'knowing that apart from God nothing happens.'
  alternative_readings:
  - without God nothing comes to pass
  - nothing takes place apart from God
  rationale: This keeps the strong providential claim without softening it; the text
    presents divine sovereignty in concise moral exhortation.
  doctrine_reference: Preserve theological tension rather than resolving or diluting
    it.
