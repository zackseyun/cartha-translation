translation:
  text: My child, remember night and day the one who speaks to you the word of God,
    and you shall honor him as the Lord; for where lordship is spoken of, there the
    Lord is. And you shall seek out day by day the faces of the saints, so that you
    may find rest in their words. You shall not make a schism, but you shall reconcile
    those who are fighting. You shall judge justly; you shall not show partiality
    in reproving transgressions. You shall not be double-minded as to whether it will
    be or not. Do not be one who stretches out his hands to receive, but draws them
    in to give. If you have anything, through your hands you shall give a ransom for
    your sins. You shall not hesitate to give, nor grumble when giving; for you will
    know who is the good repayer of the reward. You shall not turn away from the one
    in need, but you shall share all things with your brother, and you shall not say
    they are your own; for if you are sharers in what is immortal, how much more in
    mortal things? You shall not take your hand away from your son or from your daughter,
    but from youth you shall teach them the fear of God. You shall not command your
    slave or your female slave in your bitterness—they who hope in the same God—lest
    they should fail to fear the God who is over both; for he does not come to call
    according to outward appearance, but upon those whom the Spirit has prepared.
    But you slaves shall be subject to your masters as to a pattern of God, in reverence
    and fear. You shall hate all hypocrisy and everything that is not pleasing to
    the Lord. You shall never forsake the commandments of the Lord, but you shall
    keep what you received, neither adding nor taking away. In the assembly you shall
    confess your transgressions, and you shall not come to your prayer with an evil
    conscience. This is the way of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the presence/persons of the saints.' The Greek literally says 'the faces
      of the saints,' an idiom for seeking their company.
    reason: lexical_alternative
  - marker: b
    text: '''Schism'' preserves the ecclesial sense of a divisive rupture within the
      community.'
    reason: cultural_note
  - marker: c
    text: The phrase 'a ransom for your sins' reflects early Christian language linking
      almsgiving with repentance and mercy; the wording is intentionally left strong
      because the Greek is strong.
    reason: lexical_alternative
  - marker: d
    text: Or 'according to appearance/face'; the point is that God does not act based
      on social status.
    reason: lexical_alternative
  - marker: e
    text: The Greek αἰσχύνη can mean 'shame,' but in this context of submission alongside
      'fear' (φόβος), it carries the positive sense of 'reverence' or 'respect,' avoiding
      the modern English connotation of disgrace.
    reason: lexical_alternative
  - marker: f
    text: '''In the assembly'' may refer to the gathered church community rather than
      a building.'
    reason: cultural_note
lexical_decisions:
- source_word: Τέκνον μου
  chosen: My child
  rationale: Vocative of affectionate instruction; 'My child' preserves the parental-catechetical
    tone without restricting the addressee to a male.
  alternatives:
  - My son
  - Child of mine
  entry: τέκνον
  lexicon: BDAG
- source_word: ἡ κυριότης
  chosen: lordship
  rationale: A literal rendering that preserves the abstract noun and the wordplay
    with Κύριος (Lord) in the same sentence.
  alternatives:
  - the Lord's rule
  - dominion
  - authority
  entry: κυριότης
  lexicon: LSJ
- source_word: συσπῶν
  chosen: draws them in
  rationale: This rendering preserves the sense of contraction in contrast to 'stretching
    out' (ἐκτείνων) and maintains the parallelism of the Greek participles.
  alternatives:
  - draws them back
  - contracts them
  entry: συσπάω
  lexicon: LSJ
- source_word: λύτρωσιν ἁμαρτιῶν σου
  chosen: a ransom for your sins
  rationale: Kept close to the noun λύτρωσις. 'Ransom' preserves the striking sacrificial/almsgiving
    idiom without collapsing it into a later technical doctrine of atonement.
  alternatives:
  - redemption for your sins
  - atonement for your sins
  entry: λύτρωσις
  lexicon: BDAG
- source_word: Οὐκ ἀρεῖς τὴν χεῖρά σου ἀπό
  chosen: you shall not take your hand away from
  rationale: A literal image for ceasing care or instruction. 'Take your hand away'
    is a more natural English idiom than 'remove your hand' and avoids the ambiguity
    of 'lift your hand' (which could imply striking).
  alternatives:
  - you shall not withhold your hand from
  - you shall not remove your hand from
  entry: αἴρω
  lexicon: LSJ
- source_word: μήποτε οὐ μὴ φοβηθήσονται
  chosen: lest they should fail to fear
  rationale: This complex Greek construction expresses a strong negative purpose.
    The translation 'fail to fear' captures the risk of the slaves not fearing God
    as a result of the master's harshness, which is more precise than 'cease to fear'
    (which implies they already do).
  alternatives:
  - lest they cease to fear
  - lest they should not fear
- source_word: δέ (v. 11)
  chosen: But
  rationale: The particle δέ here marks a shift in audience from masters to slaves
    and is contrastive, not merely connective like 'and'.
  alternatives:
  - And
  - Now
  entry: δέ
  lexicon: BDAG
- source_word: ὡς τύπῳ Θεοῦ
  chosen: as to a pattern of God
  rationale: τύπος is not simply 'God himself' but a representative pattern, figure,
    or type. This preserves the analogy without overstating the master's authority
    as being identical to God's.
  alternatives:
  - as to an image of God
  - as to God's representative
  entry: τύπος
  lexicon: BDAG
- source_word: ἐν αἰσχύνῃ καὶ φόβῳ
  chosen: in reverence and fear
  rationale: While αἰσχύνη can mean 'shame,' in this context of submission alongside
    'fear' (φόβος), it carries the positive sense of modesty, respect, or reverence,
    avoiding the modern English connotation of disgrace.
  alternatives:
  - in shame and fear
  - with modesty and fear
  entry: αἰσχύνη
  lexicon: BDAG
- source_word: ἐν ἐκκλησίᾳ
  chosen: in the assembly
  rationale: '''Assembly'' preserves the communal gathering sense of ἐκκλησία without
    importing later institutional or architectural connotations of the word ''church.'''
  alternatives:
  - in church
  - in the congregation
  entry: ἐκκλησία
  lexicon: BDAG
theological_decisions:
- issue: Honor given to the one speaking the word of God
  chosen_reading: The teacher is to be honored in relation to the Lord's authority,
    not identified absolutely with the Lord.
  rationale: The wording is strong, but the explanatory clause 'for where lordship
    is spoken, there the Lord is' suggests representative authority mediated through
    proclamation rather than ontological identification.
  alternative_readings:
  - The teacher is honored simply 'as Lord' in a stronger representative sense
  - The clause refers more broadly to wherever divine dominion is proclaimed
  doctrine_reference: Original-language primacy; preserve theological tension rather
    than resolve it
- issue: Almsgiving as 'a ransom for your sins'
  chosen_reading: The text is rendered straightforwardly without softening; it reflects
    early Christian penitential/almsgiving language and should not be paraphrased
    away.
  rationale: The Greek λύτρωσιν is explicit and morally charged. The translation preserves
    the phrase while avoiding dogmatic overdefinition of how almsgiving relates to
    forgiveness, a topic of later theological development.
  alternative_readings:
  - '''for the redemption of your sins'''
  - '''as atonement for your sins'''
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Instruction to slaves regarding masters 'as to a pattern of God'
  chosen_reading: The phrase is translated representationally ('as to a pattern of
    God'), not as divinizing masters.
  rationale: The Greek word τύπος indicates a pattern, figure, or representative form.
    This rendering keeps the social exhortation visible without overstating the master's
    status or implying the master is God himself.
  alternative_readings:
  - '''as to God''s image'''
  - '''as to God himself'''
  doctrine_reference: Original-language primacy over translation tradition
