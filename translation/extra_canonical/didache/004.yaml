translation:
  text: My child, remember night and day the one who speaks to you the word of God,
    and you shall honor him as the Lord; for where lordship is spoken, there the Lord
    is. And you shall seek out day by day the faces of the saints, so that you may
    find rest in their words. You shall not make a schism, but you shall reconcile
    those who are fighting. You shall judge justly; you shall not show partiality
    when reproving transgressions. You shall not be double-minded, whether it will
    be or not. Do not become one who stretches out his hands to receive, but draws
    them back when it is time to give. If you have anything, you shall give by your
    hands as a ransom for your sins. You shall not hesitate to give, nor grumble while
    giving; for you will know who is the good repayer of the reward. You shall not
    turn away from the one in need, but you shall share all things with your brother,
    and you shall not say they are your own; for if you are sharers in what is immortal,
    how much more in mortal things? You shall not lift your hand from your son or
    from your daughter, but from youth you shall teach the fear of God. You shall
    not command your slave or your female slave in your bitterness, since they hope
    in the same God, lest they cease to fear the God who is over both; for he does
    not come to call according to outward standing, but upon those whom the Spirit
    has prepared. And you slaves shall be subject to your masters as to a pattern
    of God, in shame and fear. You shall hate all hypocrisy and everything that is
    not pleasing to the Lord. You shall never forsake the commandments of the Lord,
    but you shall keep what you received, neither adding nor taking away. In the assembly
    you shall confess your transgressions, and you shall not come to your prayer with
    an evil conscience. This is the way of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the presence/persons of the saints.' The Greek literally says 'the faces
      of the saints,' an idiom for seeking their company.
    reason: lexical_alternative
  - marker: b
    text: '''Schism'' preserves the ecclesial sense of a divisive rupture within the
      community.'
    reason: cultural_note
  - marker: c
    text: The phrase 'a ransom for your sins' reflects early Christian language linking
      almsgiving with repentance and mercy; the wording is intentionally left strong
      because the Greek is strong.
    reason: lexical_alternative
  - marker: d
    text: Or 'according to appearance/outward face'; the point is that God does not
      act by social status.
    reason: lexical_alternative
  - marker: e
    text: '''In the assembly'' may refer to the gathered church community rather than
      a building.'
    reason: cultural_note
lexical_decisions:
- source_word: Τέκνον μου
  chosen: My child
  alternatives:
  - My son
  - Child of mine
  lexicon: BDAG
  rationale: Vocative of affectionate instruction; 'My child' preserves the parental-catechetical
    tone without restricting the addressee to a male.
- source_word: τοῦ λαλούντός σοι τὸν λόγον τοῦ Θεοῦ
  chosen: the one who speaks to you the word of God
  alternatives:
  - the one teaching you God's word
  - the one proclaiming to you the word of God
  lexicon: BDAG
  rationale: Keeps the participial construction and the concrete 'word of God' language,
    preserving early Christian teacher-disciple texture.
- source_word: τιμήσεις ... ὡς Κύριον
  chosen: honor him as the Lord
  alternatives:
  - honor him as Lord
  - honor him as one would the Lord
  lexicon: BDAG
  rationale: Retains the strong comparison while leaving clear that the teacher is
    not identified with God absolutely; the following explanatory clause grounds the
    honor in the Lord's authority.
- source_word: ἡ κυριότης
  chosen: lordship
  alternatives:
  - the Lord's rule
  - authority
  lexicon: LSJ
  rationale: A literal rendering that preserves the abstract noun and the wordplay
    with Κύριος in the next clause.
- source_word: τὰ πρόσωπα τῶν ἁγίων
  chosen: the faces of the saints
  alternatives:
  - the presence of the saints
  - the persons of the saints
  lexicon: BDAG
  rationale: Rendered literally to preserve the idiom of seeking personal presence;
    'saints' keeps the consecrated-community sense rather than flattening to 'holy
    people'.
- source_word: ἐπαναπαῇ
  chosen: find rest
  alternatives:
  - be refreshed
  - take comfort
  lexicon: BDAG
  rationale: Conveys repose and settling in the saints' words without overinterpreting
    the spiritual nuance.
- source_word: σχίσμα
  chosen: schism
  alternatives:
  - division
  - split
  lexicon: BDAG
  rationale: The ecclesial force is important here; 'schism' preserves church-order
    language better than the more generic 'division'.
- source_word: οὐ λήψῃ πρόσωπον
  chosen: you shall not show partiality
  alternatives:
  - you shall not receive a face
  - you shall not be partial
  lexicon: BDAG
  rationale: Idiomatic English for the Semitic/Greek expression, especially in judicial
    context.
- source_word: ἐλέγξαι ἐπὶ παραπτώμασιν
  chosen: when reproving transgressions
  alternatives:
  - in convicting over offenses
  - when exposing faults
  lexicon: BDAG
  rationale: Captures moral correction rather than merely private criticism; 'transgressions'
    preserves ethical seriousness.
- source_word: διψυχήσεις
  chosen: be double-minded
  alternatives:
  - waver
  - be of two minds
  lexicon: BDAG
  rationale: A key early Christian moral term; 'double-minded' preserves the interior
    dividedness rather than only outward indecision.
- source_word: λύτρωσιν ἁμαρτιῶν σου
  chosen: a ransom for your sins
  alternatives:
  - redemption for your sins
  - atonement for your sins
  lexicon: BDAG
  rationale: Kept close to the noun λύτρωσις. 'Ransom' preserves the striking sacrificial/almsgiving
    idiom without collapsing it into a later technical doctrine.
- source_word: ὁ τοῦ μισθοῦ καλὸς ἀνταποδότης
  chosen: the good repayer of the reward
  alternatives:
  - the good rewarder
  - the excellent recompenser
  lexicon: BDAG
  rationale: Slightly formal phrasing preserves the rhetorical weight and avoids importing
    a smoother but less transparent idiom.
- source_word: συγκοινωνήσεις
  chosen: you shall share all things with
  alternatives:
  - you shall have fellowship in all things with
  - you shall hold all things in common with
  lexicon: BDAG
  rationale: Expresses active sharing while preserving the κοινων- fellowship/participation
    idea.
- source_word: τῷ ἀδελφῷ σου
  chosen: your brother
  alternatives:
  - your fellow believer
  - your brother or sister
  lexicon: BDAG
  rationale: Gender-accurate to the Greek singular masculine and fitting the representative
    moral address; broader inclusivity can be noted later if needed.
- source_word: ἐν τῷ ἀθανάτῳ ... ἐν τοῖς θνητοῖς
  chosen: in what is immortal ... in mortal things
  alternatives:
  - in the imperishable ... in perishable things
  - in immortal realities ... in mortal ones
  lexicon: BDAG
  rationale: Preserves the contrast between eternal spiritual participation and material
    possessions.
- source_word: οὐκ ἀρεῖς τὴν χεῖρά σου ἀπό
  chosen: you shall not lift your hand from
  alternatives:
  - you shall not withhold your hand from
  - you shall not remove your hand from
  lexicon: LSJ
  rationale: A literal image for withholding discipline/instruction; retained because
    it is vivid and traditional in moral exhortation.
- source_word: τὸν φόβον τοῦ Θεοῦ
  chosen: the fear of God
  alternatives:
  - reverence for God
  - the fear of the Lord
  lexicon: BDAG
  rationale: Classic biblical phrase; preserving it maintains continuity with scriptural
    wisdom language.
- source_word: δούλῳ ... παιδίσκῃ
  chosen: slave ... female slave
  alternatives:
  - servant ... maidservant
  lexicon: BDAG
  rationale: In line with project doctrine, 'slave' is used where bonded status is
    socially salient; the female counterpart is rendered explicitly.
- source_word: ἐν πικρίᾳ σου
  chosen: in your bitterness
  alternatives:
  - in your harshness
  - in anger
  lexicon: BDAG
  rationale: Retains the inward moral quality behind abusive command rather than reducing
    it only to emotional anger.
- source_word: κατὰ πρόσωπον
  chosen: according to outward standing
  alternatives:
  - according to appearance
  - with partiality
  lexicon: BDAG
  rationale: The phrase concerns external status or face; this rendering fits the
    social context of masters and slaves.
- source_word: ὡς τύπῳ Θεοῦ
  chosen: as to a pattern of God
  alternatives:
  - as to an image of God
  - as to God's representative
  lexicon: BDAG
  rationale: τύπος is not simply 'God himself' but a representative pattern/form;
    this preserves the analogy without overstating it.
- source_word: ἐν αἰσχύνῃ καὶ φόβῳ
  chosen: in shame and fear
  alternatives:
  - with modesty and fear
  - with reverence and trembling
  lexicon: BDAG
  rationale: A close rendering that preserves the ascetic-moral tone; 'shame' here
    carries modest reserve rather than disgrace alone.
- source_word: ὑπόκρισιν
  chosen: hypocrisy
  alternatives:
  - pretense
  - insincerity
  lexicon: BDAG
  rationale: Standard and transparent rendering for the vice condemned.
- source_word: ἐν ἐκκλησίᾳ
  chosen: in the assembly
  alternatives:
  - in church
  - in the congregation
  lexicon: BDAG
  rationale: '''Assembly'' preserves the communal gathering sense without importing
    later institutional connotations too strongly.'
- source_word: ἐξομολογήσῃ
  chosen: you shall confess
  alternatives:
  - you shall acknowledge openly
  - you shall make confession of
  lexicon: BDAG
  rationale: Maintains the explicit penitential and communal force of the verb.
- source_word: ἐπὶ προσευχήν σου
  chosen: to your prayer
  alternatives:
  - for prayer
  - to prayer
  lexicon: BDAG
  rationale: Kept close to the singular possessive construction, suggesting one's
    act of prayer in the gathered context.
theological_decisions:
- issue: Honor given to the one speaking the word of God
  chosen_reading: The teacher is to be honored in relation to the Lord's authority,
    not identified absolutely with the Lord.
  alternative_readings:
  - The teacher is honored simply 'as Lord' in a stronger representative sense
  - The clause refers more broadly to wherever divine dominion is proclaimed
  rationale: The wording is strong, but the explanatory clause about where lordship
    is spoken suggests representative authority mediated through proclamation rather
    than ontological identification.
  doctrine_reference: Original-language primacy; preserve theological tension rather
    than resolve it
- issue: Almsgiving as 'a ransom for your sins'
  chosen_reading: The text is rendered straightforwardly without softening; it reflects
    early Christian penitential/almsgiving language and should not be paraphrased
    away.
  alternative_readings:
  - '''for the redemption of your sins'''
  - '''as atonement for your sins'''
  rationale: The Greek is explicit and morally charged. The translation preserves
    the phrase while avoiding dogmatic overdefinition of how almsgiving relates to
    forgiveness.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Instruction to slaves regarding masters 'as to a pattern of God'
  chosen_reading: The phrase is translated representationally, not as divinizing masters.
  alternative_readings:
  - '''as to God''s image'''
  - '''as to God himself'''
  rationale: τύπος indicates pattern, figure, or representative form. This keeps the
    social exhortation visible without overstating the master's status.
  doctrine_reference: Original-language primacy over translation tradition
