source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Τέκνον μου, τοῦ λαλούντός σοι τὸν λόγον τοῦ Θεοῦ μνησθήσῃ νυκτὸς καὶ ἡμέρας,
    τιμήσεις δὲ αὐτὸν ὡς Κύριον· ὅθεν γὰρ ἡ κυριότης λαλεῖται, ἐκεῖ Κύριός ἐστιν.
    Ἐκζητήσεις δὲ καθ’ ἡμέραν τὰ πρόσωπα τῶν ἁγίων, ἵνα ἐπαναπαῇ τοῖς λόγοις αὐτῶν.
    Οὐ ποιήσεις σχίσμα, εἰρηνεύσεις δὲ μαχομένους· κρινεῖς δικαίως, οὐ λήψῃ πρόσωπον
    ἐλέγξαι ἐπὶ παραπτώμασιν. Οὐ διψυχήσεις, πότερον ἔσται ἢ οὔ. Μὴ γίνου πρὸς μὲν
    τὸ λαβεῖν ἐκτείνων τὰς χεῖρας, πρὸς δὲ τὸ δοῦναι συσπῶν· ἐὰν ἔχῃς, διὰ τῶν χειρῶν
    σου δώσεις λύτρωσιν ἁμαρτιῶν σου. Οὐ διστάσεις δοῦναι οὐδὲ διδοὺς γογγύσεις· γνώσῃ
    γὰρ τίς ἐστιν ὁ τοῦ μισθοῦ καλὸς ἀνταποδότης. Οὐκ ἀποστραφήσῃ τὸν ἐνδεόμενον,
    συγκοινωνήσεις δὲ πάντα τῷ ἀδελφῷ σου καὶ οὐκ ἐρεῖς ἴδια εἶναι· εἰ γὰρ ἐν τῷ ἀθανάτῳ
    κοινωνοί ἐστε, πόσῳ μᾶλλον ἐν τοῖς θνητοῖς; Οὐκ ἀρεῖς τὴν χεῖρά σου ἀπὸ τοῦ υἱοῦ
    σου ἢ ἀπὸ τῆς θυγατρός σου, ἀλλὰ ἀπὸ νεότητος διδάξεις τὸν φόβον τοῦ Θεοῦ. Οὐκ
    ἐπιτάξεις δούλῳ σου ἢ παιδίσκῃ, τοῖς ἐπὶ τὸν αὐτὸν Θεὸν ἐλπίζουσιν, ἐν πικρίᾳ
    σου, μήποτε οὐ μὴ φοβηθήσονται τὸν ἐπ᾽ ἀμφοτέροις Θεόν· οὐ γὰρ ἔρχεται κατὰ πρόσωπον
    καλέσαι, ἀλλ᾽ ἐφ᾽ οὓς τὸ πνεῦμα ἡτοίμασεν. Ὑμεῖς δὲ οἱ δοῦλοι ὑποτάγησεθε τοῖς
    κυρίοις ὑμῶν ὡς τύπῳ Θεοῦ ἐν αἰσχύνῃ καὶ φόβῳ. Μισήσεις πᾶσαν ὑπόκρισιν καὶ πᾶν
    ὃ μὴ ἀρεστὸν τῷ Κυρίῳ. Οὐ μὴ ἐγκαταλίπῃς ἐντολὰς Κυρίου, φυλάξεις δὲ ἃ παρέλαβες,
    μήτε προστιθεὶς μήτε ἀφαιρῶν. Ἐν ἐκκλησίᾳ ἐξομολογήσῃ τὰ παραπτώματά σου, καὶ
    οὐ προσελεύσῃ ἐπὶ προσευχήν σου ἐν συνειδήσει πονηρᾷ. Αὕτη ἐστὶν ἡ ὁδὸς τῆς ζωῆς.
  language: Greek
