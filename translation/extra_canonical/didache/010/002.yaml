source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Εὐχαριστοῦμέν σοι, Πάτερ ἅγιε, ὑπὲρ τοῦ ἁγίου ὀνόματός σου, οὗ κατεσκήνωσας
    ἐν ταῖς καρδίαις ἡμῶν, καὶ ὑπὲρ τῆς γνώσεως καὶ πίστεως καὶ ἀθανασίας, ἧς ἐγνώρισας
    ἡμῖν διὰ Ἰησοῦ τοῦ παιδός σου· σοὶ ἡ δόξα εἰς τοὺς αἰῶνας.
  language: Greek
translation:
  text: 'We give thanks to you, Holy Father,

    for your holy name,

    which you caused to dwell in our hearts,

    and for the knowledge and faith and immortality

    which you made known to us through Jesus your servant;

    to you be the glory forever.'
