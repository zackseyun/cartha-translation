id: DID.10.3
reference: Didache 10:3
unit: verse
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Σὺ, δέσποτα παντοκράτορ, ἔκτισας τὰ πάντα ἕνεκεν τοῦ ὀνόματός σου, τροφήν
    τε καὶ ποτὸν ἔδωκας τοῖς ἀνθρώποις εἰς ἀπόλαυσιν ἵνα σοι εὐχαριστήσωσιν, ἡμῖν
    δὲ ἐχαρίσω πνευματικὴν τροφὴν καὶ ποτὸν καὶ ζωὴν αἰώνιον διὰ τοῦ παιδός σου.
  language: Greek
translation:
  text: 'You, almighty Master,

    created all things for the sake of your name,

    and gave food and drink to people for enjoyment,

    so that they might give thanks to you;

    but to us you graciously gave spiritual food and drink

    and eternal life through your servant.'
  philosophy: optimal-equivalence
