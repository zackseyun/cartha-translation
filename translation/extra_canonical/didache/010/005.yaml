  from: and gather it, the sanctified one,
  to: and gather it, the sanctified church,
  rationale: The phrase 'the sanctified one' translates the feminine articular participle (τὴν ἁγιασθεῖσαν) which is in apposition to the church (αὐτὴν). In English, 'the [adjective] one' strongly implies an individual person. Supplying the noun 'church' clarifies the referent and avoids this unintended personal connotation while preserving the appositional structure.
