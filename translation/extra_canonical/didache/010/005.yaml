id: DID.10.5
reference: Didache 10:5
unit: verse
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Μνήσθητι, Κύριε, τῆς ἐκκλησίας σου τοῦ ῥύσασθαι αὐτὴν ἀπὸ παντὸς πονηροῦ καὶ τελειῶσαι αὐτὴν ἐν τῇ ἀγάπῃ σου, καὶ σύναξον αὐτὴν ἀπὸ τῶν τεσσάρων ἀνέμων, τὴν ἁγιασθεῖσαν εἰς τὴν σὴν Βασιλείαν, ἣν ἡτοίμασας αὐτῇ· ὅτι σοῦ ἐστιν ἡ δύναμις καὶ ἡ δόξα εἰς τοὺς αἰῶνας.
  language: Greek
translation:
  text: 'Remember, Lord, your church:

    to deliver it from every evil

    and to perfect it in your love;

    and gather it, the sanctified church,

    from the four winds into your kingdom,

    which you prepared for it.

    For yours is the power and the glory forever.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and gather it, the sanctified one,'.
    reason: previous_rendering
