id: DID.05
reference: Didache 5
unit: chapter
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Ἡ δὲ τοῦ θανάτου ὁδός ἐστιν αὕτη· πρῶτον πάντων πονηρά ἐστι καὶ κατάρας μεστή·
    φόνοι, μοιχεῖαι, ἐπιθυμίαι, πορνεῖαι, κλοπαί, εἰδωλολατρεῖαι, μαγεῖαι, φαρμακεῖαι,
    ἁρπαγαί, ψευδομαρτυρίαι, ὑποκρίσεις, διπλοκαρδία, δόλος, ὑπερηφανία, κακία, αὐθάδεια,
    πλεονεξία, αἰσχρολογία, ζηλοτυπία, θρασύτης, ὕψος, ἀλαζονεία· διῶκται ἀγαθῶν,
    μισοῦντες ἀλήθειαν, ἀγαπῶντες ψεῦδος, οὐ γινώσκοντες μισθὸν δικαιοσύνης, οὐ κολλώμενοι
    ἀγαθῷ οὐδὲ κρίσει δικαίᾳ, ἀγρυπνοῦντες οὐκ εἰς τὸ ἀγαθὸν, ἀλλ’ εἰς τὸ πονηρόν·
    ὧν μακρὰν πραΰτης καὶ ὑπομονή, μάταια ἀγαπῶντες, διώκοντες ἀνταπόδομα, οὐκ ἐλεοῦντες
    πτωχόν, οὐ πονοῦντες ἐπὶ καταπονουμένῳ, οὐ γινώσκοντες τὸν ποιήσαντα αὐτούς, φονεῖς
    τέκνων, φθορεῖς πλάσματος Θεοῦ, ἀποστρεφόμενοι τὸν δεόμενον, καταπονοῦντες τὸν
    θλιβόμενον, πλουσίων παράκλητοι, πενήτων ἄνομοι κριταί, πανθαμάρτητοι· ῥυσθείητε,
    τέκνα, ἀπὸ τούτων ἁπάντων.
  language: Greek
  pages:
  - 26
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number
    noise and page segmentation were cleaned, but the translation must stay anchored
    in the Greek wording.
translation:
  text: 'And the way of death is this: first of all, it is evil and full of curse:
    murders, adulteries, lusts, sexual immoralities, thefts, idolatries, sorceries,
    magic arts, robberies, false testimonies, hypocrisies, double-heartedness, deceit,
    arrogance, malice, self-will, greed, foul speech, jealousy, audacity, haughtiness,
    boastfulness; persecutors of the good, hating truth, loving falsehood, not knowing
    the reward of righteousness, not cleaving to what is good nor to righteous judgment,
    keeping watch not for what is good but for what is evil; from whom gentleness
    and patience are far away, loving vain things, pursuing repayment, not showing
    mercy to a poor man, not laboring on behalf of one who is oppressed, not knowing
    the one who made them, murderers of children, destroyers of God''s handiwork,
    turning away from the one in need, oppressing the one under affliction, advocates
    of the rich, lawless judges of the poor, altogether sinful. Be delivered, children,
    from all these things.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'full of cursing.' The Greek permits either the state of being accursed
      or being characterized by curses.
    reason: lexical_alternative
  - marker: b
    text: The paired terms rendered 'sorceries' and 'magic arts' overlap in meaning;
      the translation distinguishes them to preserve the Greek doublet.
    reason: lexical_alternative
  - marker: c
    text: '''Murderers of children'' likely includes the exposure or killing of infants
      in the moral horizon of the text.'
    reason: cultural_note
  - marker: d
    text: Or 'Be rescued' / 'Deliver yourselves.' The Greek closing exhortation is
      concise and leaves the mode of deliverance unstated.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁδός
  chosen: way
  alternatives:
  - path
  lexicon: LSJ
  rationale: Retains the Didache's catechetical contrast between two moral 'ways'
    and preserves early-Christian ethical texture better than a more generic 'path'.
- source_word: κατάρας μεστή
  chosen: full of curse
  alternatives:
  - full of cursing
  - full of accursedness
  lexicon: LSJ
  rationale: The genitive can suggest being filled with curse/cursing. 'Full of curse'
    preserves the stark, weighty moral-religious sense without over-specifying whether
    spoken curses or accursed character is primary.
- source_word: ἐπιθυμίαι
  chosen: lusts
  alternatives:
  - desires
  - cravings
  lexicon: BDAG
  rationale: In this vice list, the term is morally negative. 'Lusts' better reflects
    disordered desire in context than the broader 'desires'.
- source_word: πορνεῖαι
  chosen: sexual immoralities
  alternatives:
  - fornications
  - sexual sins
  lexicon: BDAG
  rationale: Plural form suggests repeated or varied acts. 'Sexual immoralities' is
    readable modern English while preserving the moral category.
- source_word: μαγεῖαι
  chosen: sorceries
  alternatives:
  - magic arts
  lexicon: LSJ
  rationale: Chosen to preserve the religiously charged vice-list register; paired
    with φαρμακεῖαι as a related but distinct term.
- source_word: φαρμακεῖαι
  chosen: magic arts
  alternatives:
  - sorceries
  - spell-castings
  lexicon: BDAG
  rationale: Used distinctly from μαγεῖαι in the source, so a differentiated English
    rendering helps preserve the doublet rather than collapsing both into one term.
- source_word: ὑποκρίσεις
  chosen: hypocrisies
  alternatives:
  - pretenses
  - insincerities
  lexicon: BDAG
  rationale: Plural abstract noun in a vice list is well represented by 'hypocrisies,'
    preserving the moral and communal force.
- source_word: διπλοκαρδία
  chosen: double-heartedness
  alternatives:
  - duplicity
  - double-mindedness
  lexicon: LSJ
  rationale: A more literal rendering preserves the anthropological and moral texture
    of the Greek better than the smoother 'duplicity.'
- source_word: αὐθάδεια
  chosen: self-will
  alternatives:
  - stubborn arrogance
  - self-pleasing
  lexicon: BDAG
  rationale: Captures the vice of obstinate self-assertion in concise English without
    paraphrase.
- source_word: αἰσχρολογία
  chosen: foul speech
  alternatives:
  - obscene talk
  - shameful speech
  lexicon: BDAG
  rationale: Readable and morally weighty; avoids sounding either archaic or overly
    colloquial.
- source_word: θρασύτης
  chosen: audacity
  alternatives:
  - recklessness
  - insolence
  lexicon: LSJ
  rationale: Preserves the vice of shameless boldness in a compact form suitable to
    the list.
- source_word: ὕψος
  chosen: haughtiness
  alternatives:
  - loftiness
  - pride
  lexicon: LSJ
  rationale: In this vice context, the metaphorical sense is intended. 'Haughtiness'
    distinguishes it from nearby pride/arrogance terms.
- source_word: ἀλαζονεία
  chosen: boastfulness
  alternatives:
  - pretension
  - vainglory
  lexicon: BDAG
  rationale: Keeps distinction from ὑπερηφανία and ὕψος by rendering the outward self-exalting
    aspect.
- source_word: διῶκται ἀγαθῶν
  chosen: persecutors of the good
  alternatives:
  - pursuers against the good
  - haters of good men
  lexicon: BDAG
  rationale: The phrase carries active hostility toward what is good; 'persecutors
    of the good' is idiomatic and forceful.
- source_word: μισθὸν δικαιοσύνης
  chosen: the reward of righteousness
  alternatives:
  - the wages of righteousness
  - righteous reward
  lexicon: BDAG
  rationale: This preserves the moral-theological sense of recompense tied to righteousness
    without importing later technical categories.
- source_word: κολλώμενοι
  chosen: cleaving to
  alternatives:
  - clinging to
  - joining themselves to
  lexicon: BDAG
  rationale: '''Cleaving to'' preserves the strong attachment sense and echoes biblical
    moral diction.'
- source_word: ἀγρυπνοῦντες
  chosen: keeping watch
  alternatives:
  - being vigilant
  - staying awake
  lexicon: BDAG
  rationale: Retains the vivid moral vigilance imagery rather than flattening to a
    generic mental state.
- source_word: μάταια
  chosen: vain things
  alternatives:
  - worthless things
  - empty things
  lexicon: LSJ
  rationale: Preserves biblical moral diction and the objectified plural sense.
- source_word: διώκοντες ἀνταπόδομα
  chosen: pursuing repayment
  alternatives:
  - seeking recompense
  - chasing after return
  lexicon: BDAG
  rationale: Conveys self-interested pursuit of payback or recompense; 'repayment'
    keeps the terse vice-list force.
- source_word: οὐ πονοῦντες ἐπὶ καταπονουμένῳ
  chosen: not laboring on behalf of one who is oppressed
  alternatives:
  - not grieving over the afflicted
  - not taking pains for the downtrodden
  lexicon: BDAG
  rationale: The verb can denote toil/pain rather than mere emotion. This rendering
    preserves active concern rather than only inward sympathy.
- source_word: φονεῖς τέκνων
  chosen: murderers of children
  alternatives:
  - child-killers
  lexicon: BDAG
  rationale: A transparent rendering of the grave moral charge, preserving the Didache's
    anti-infanticide force.
- source_word: φθορεῖς πλάσματος Θεοῦ
  chosen: destroyers of God's handiwork
  alternatives:
  - corrupters of God's creature
  - destroyers of God's creation
  lexicon: LSJ
  rationale: πλάσμα suggests something formed or fashioned. 'Handiwork' preserves
    creaturely formedness and theological weight.
- source_word: παράκλητοι
  chosen: advocates
  alternatives:
  - champions
  - partisans
  lexicon: LSJ
  rationale: Conveys those who speak in favor of the rich, likely in judicial or social
    settings, without over-paraphrasing.
- source_word: πανθαμάρτητοι
  chosen: altogether sinful
  alternatives:
  - utterly sinful
  - sinful in every way
  lexicon: LSJ
  rationale: A concise rendering of the comprehensive moral indictment at the close
    of the list.
- source_word: ῥυσθείητε
  chosen: Be delivered
  alternatives:
  - Be rescued
  - Save yourselves
  lexicon: BDAG
  rationale: The passive/medio-passive exhortation naturally points to deliverance
    rather than autonomous self-rescue; 'Be delivered' preserves the solemn imperative
    tone.
theological_decisions:
- issue: Vice-list terms μαγεῖαι and φαρμακεῖαι overlap semantically
  chosen_reading: Render them distinctly as 'sorceries' and 'magic arts'
  alternative_readings:
  - Render both as 'sorcery'
  - Render as 'magic' and 'poisonings'
  rationale: The source preserves two separate terms in sequence. Distinct English
    renderings maintain auditability and avoid erasing the rhetorical accumulation,
    while not forcing an overly narrow technical distinction unsupported by the immediate
    context.
  doctrine_reference: 'PHILOSOPHY.md: consistency of key terms, or documented exception'
- issue: Final imperative ῥυσθείητε may be heard as divine passive or general exhortation
  chosen_reading: Be delivered, children, from all these things.
  alternative_readings:
  - Deliver yourselves, children, from all these things.
  - Be rescued, children, from all these things.
  rationale: The form supports an exhortation toward deliverance without specifying
    mechanism. 'Be delivered' preserves theological openness and avoids overstating
    human self-rescue.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it'
