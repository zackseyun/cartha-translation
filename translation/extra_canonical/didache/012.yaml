id: DID.12
reference: Didache 12
unit: chapter
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Πᾶς δὲ ὁ ἐρχόμενος ἐν ὀνόματι Κυρίου δεχξήσθω, ἔπειτα δὲ δοκιμάσαντες αὐτὸν
    γνώσεσθε· σύνεσιν γὰρ ἕξετε δεξιὰν καὶ ἀριστεράν. Εἰμὲν παρόδιος ἐστιν ὁ ἐρχόμενος,
    βοηθεῖτε αὐτῷ ὅσον δύνασθε· οὐ μενεῖ δὲ πρὸς ὑμᾶς εἰ μὴ δύο ἢ τρεῖς ἡμέρας, ἐὰν
    ᾖ ἀνάγκη. Εἰ δὲ θέλει πρὸς ὑμᾶς καθίσαι, τεχνίτης ὤν, ἐργαζέσθω καὶ φαγέτω· εἰ
    δὲ οὐκ ἔχει τέχνην, κατὰ τὴν σύνεσιν ὑμῶν προνοήσατε, πῶς μὴ ἀργὸς μεθ᾽ ὑμῶν ζήσεται
    χριστιανός. Εἰ δ᾽ οὐ θέλει οὕτω ποιεῖν, χριστέμπορός ἐστι· προσέχετε ἀπὸ τῶν τοιούτων.
  language: Greek
  pages:
  - 36
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number
    noise and page segmentation were cleaned, but the translation must stay anchored
    in the Greek wording.
translation:
  text: But let everyone who comes in the name of the Lord be received; then, after
    testing him, you will know him, for you will have understanding of right and left.
    If the one who comes is a traveler, help him as much as you can; but he shall
    not remain with you except for two or three days, if there is need. But if he
    wants to settle among you, being a craftsman, let him work and eat. But if he
    has no trade, according to your understanding provide for him, so that no Christian
    may live among you idle. But if he does not want to do this, he is a Christ-trader;
    watch yourselves against such people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'you will have understanding of right and left'—an idiom for
      discernment.
    reason: lexical_alternative
  - marker: b
    text: Or 'if he has no craft/skill.'
    reason: lexical_alternative
  - marker: c
    text: The rare term rendered 'Christ-trader' means someone who makes the Messiah
      or the Christian faith into a means of gain.
    reason: cultural_note
lexical_decisions:
- source_word: ἐν ὀνόματι Κυρίου
  chosen: in the name of the Lord
  alternatives:
  - under the Lord's name
  - with the Lord's authority
  lexicon: BDAG
  rationale: Retains the early-Christian formula of coming under the Lord's acknowledged
    name/authority without over-interpreting it. 'Lord' follows project default for
    κύριος.
- source_word: δεχξήσθω / δέχεσθω
  chosen: be received
  alternatives:
  - be welcomed
  - receive him
  lexicon: LSJ
  rationale: Passive/imperatival sense is best conveyed by 'be received.' It preserves
    ecclesial hospitality language more formally than 'be welcomed,' while still reading
    naturally.
- source_word: δοκιμάσαντες
  chosen: after testing him
  alternatives:
  - after examining him
  - after proving him
  lexicon: BDAG
  rationale: The chapter balances hospitality with discernment. 'Testing' preserves
    the moral and communal vetting sense better than the softer 'examining.'
- source_word: σύνεσιν ... δεξιὰν καὶ ἀριστεράν
  chosen: understanding of right and left
  alternatives:
  - discernment of right and wrong
  - good sense in every direction
  lexicon: LSJ
  rationale: The Greek is somewhat idiomatic. A more interpretive rendering would
    be 'discernment of right and wrong,' but the literal 'right and left' preserves
    the texture and leaves the idiom visible for audit.
- source_word: παρόδιος
  chosen: traveler
  alternatives:
  - wayfarer
  - passer-by
  lexicon: LSJ
  rationale: Refers to one passing through rather than settling. 'Traveler' is clear
    modern English without losing the transient sense.
- source_word: βοηθεῖτε
  chosen: help him
  alternatives:
  - assist him
  - give aid to him
  lexicon: BDAG
  rationale: Straightforward imperative of practical support; 'help' is natural and
    sufficiently weighty in context.
- source_word: μὴ δύο ἢ τρεῖς ἡμέρας
  chosen: except for two or three days
  alternatives:
  - more than two or three days
  - unless it is two or three days
  lexicon: LSJ
  rationale: The clause limits duration of stay. 'Except for two or three days' reflects
    the Greek construction while remaining readable.
- source_word: καθίσαι
  chosen: settle among you
  alternatives:
  - stay with you
  - reside with you
  lexicon: BDAG
  rationale: More than a brief visit is in view; 'settle' captures the contrast with
    a passing traveler.
- source_word: τεχνίτης
  chosen: craftsman
  alternatives:
  - artisan
  - worker
  lexicon: LSJ
  rationale: Denotes a person with a trade or skilled manual occupation. 'Craftsman'
    preserves the concrete social setting.
- source_word: ἐργαζέσθω καὶ φαγέτω
  chosen: let him work and eat
  alternatives:
  - let him labor and eat
  - he should work and then eat
  lexicon: BDAG
  rationale: Concise imperative sequence in Greek; this English keeps the church-order
    tone and likely echoes the moral principle that one should work for one's food.
- source_word: τέχνην
  chosen: trade
  alternatives:
  - craft
  - skill
  lexicon: LSJ
  rationale: In context it refers to a means of livelihood. 'Trade' is idiomatic and
    concrete.
- source_word: κατὰ τὴν σύνεσιν ὑμῶν προνοήσατε
  chosen: according to your understanding provide for him
  alternatives:
  - make provision according to your discernment
  - use your judgment to provide
  lexicon: BDAG
  rationale: Keeps both prudent discernment and practical provision in view. The phrase
    signals communal wisdom rather than a fixed rule.
- source_word: ἀργὸς
  chosen: idle
  alternatives:
  - lazy
  - without work
  lexicon: BDAG
  rationale: The concern is not merely unemployment but unproductive dependence within
    the community. 'Idle' preserves that moral nuance without overstating personal
    vice.
- source_word: χριστιανός
  chosen: Christian
  alternatives:
  - a Christian person
  lexicon: BDAG
  rationale: Direct and historically important self/outsider designation; no need
    to paraphrase.
- source_word: χριστέμπορός
  chosen: Christ-trader
  alternatives:
  - one who trades on Christ
  - Christ-monger
  lexicon: LSJ
  rationale: 'A rare and vivid compound. Rather than flattening it to ''fraud'' or
    ''profiteer,'' ''Christ-trader'' preserves the sharp polemical force: someone
    making Messiah/the faith into merchandise.'
- source_word: προσέχετε ἀπὸ τῶν τοιούτων
  chosen: watch yourselves against such people
  alternatives:
  - beware of such people
  - keep away from such ones
  lexicon: BDAG
  rationale: Captures both vigilance and protective distance. 'Watch yourselves against'
    preserves the reflexive cautionary force.
theological_decisions:
- issue: How explicitly to interpret the idiom 'understanding of right and left'
  chosen_reading: Retain the idiom in the main text as 'understanding of right and
    left'
  alternative_readings:
  - discernment of right and wrong
  - discernment in all matters
  rationale: The phrase likely refers to practical discernment, but the Greek wording
    is distinctive. Preserving the idiom maintains transparency and avoids resolving
    the expression too fully in translation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering χριστέμπορός
  chosen_reading: Christ-trader
  alternative_readings:
  - one who trades on Christ
  - religious profiteer
  rationale: The text condemns exploitation of Christian hospitality for gain. A literal
    compound preserves the early-Christian rhetorical sting better than a generalized
    moral label.
  doctrine_reference: Consistency of key terms, or documented exception; readable
    modern English without flattening theological weight.
