id: DID.08
reference: Didache 8
unit: chapter
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Αἱ δὲ νηστεῖαι ὑμῶν μὴ ἔστωσαν μετὰ τῶν ὑποκριτῶν· νηστεύουσι γὰρ δευτέρα
    σαββάτων καὶ πέμπτῃ· ὑμεῖς δὲ νηστεύσατε τετράδα καὶ παρασκευήν. Μηδὲ προσεύχεσθε
    ὡς οἱ ὑποκριταί, ἀλλʼ ὡς ἐκέλευσεν ὁ Κύριος ἐν τῷ εὐαγγελίῳ αὐτοῦ, οὕτω προσεύχεσθε·
    Πάτερ ἡμῶν ὁ ἐν τῷ οὐρανῷ, ἁγιασθήτω τὸ ὄνομά σου, ἐλθέτω ἡ βασιλεία σου, γενηθήτω
    τὸ θέλημά σου ὡς ἐν οὐρανῷ καὶ ἐπὶ γῆς· τὸν ἄρτον ἡμῶν τὸν ἐπιούσιον δὸς ἡμῖν
    σήμερον καὶ ἄφες ἡμῖν τὴν ὀφειλὴν ἡμῶν ὡς καὶ ἡμεῖς ἀφίεμεν τοῖς ὀφειλέταις ἡμῶν,
    καὶ μὴ εἰσενέγκῃς ἡμᾶς εἰς πειρασμόν, ἀλλὰ ῥῦσαι ἡμᾶς ἀπὸ τοῦ πονηροῦ· ὅτι σοῦ
    ἐστιν ἡ δύναμις καὶ ἡ δόξα εἰς τοὺς αἰῶνας. Τρὶς τῆς ἡμέρας οὕτω προσεύχεσθε.
  language: Greek
  pages:
  - 28
  - 30
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number
    noise and page segmentation were cleaned, but the translation must stay anchored
    in the Greek wording.
translation:
  text: 'But let your fasts not be with the hypocrites, for they fast on the second
    day of the week and on the fifth; but you, fast on the fourth day and on Preparation.
    And do not pray as the hypocrites, but as the Lord commanded in his gospel, pray
    in this way:


    Our Father in heaven,

    may your name be made holy,

    may your kingdom come,

    may your will be done,

    as in heaven, so also on earth.

    Give us today our bread for the day,

    and forgive us our debt,

    as we also forgive our debtors,

    and do not bring us into testing,

    but rescue us from the evil one;

    for yours is the power and the glory forever.


    Pray in this way three times a day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Preparation" was the customary name for the day before the Sabbath, that
      is, Friday.'
    reason: cultural_note
  - marker: b
    text: Or "hallowed be your name."
    reason: lexical_alternative
  - marker: c
    text: The Greek adjective behind "for the day" is rare and debated; alternatives
      include "daily," "necessary," or "for tomorrow."
    reason: lexical_alternative
  - marker: d
    text: Some translate "debt" and "debtors" more interpretively as "sins" and "those
      who sin against us," or "trespasses."
    reason: lexical_alternative
  - marker: e
    text: '"Testing" may also be rendered "temptation" or "trial."'
    reason: lexical_alternative
  - marker: f
    text: Or "from evil."
    reason: alternative_reading
  - marker: g
    text: The prayer closely parallels Matthew 6:9–13, but here it is presented as
      the Lord's command "in his gospel" within the Didache's church-order instruction.
    reason: cross_reference
lexical_decisions:
- source_word: νηστεῖαι
  chosen: fasts
  alternatives:
  - times of fasting
  - fasting
  lexicon: LSJ
  rationale: The plural noun refers to the community's fasting observances. 'Fasts'
    is concise, natural, and preserves the concrete liturgical sense better than the
    more abstract 'fasting'.
- source_word: ὑποκριτῶν
  chosen: hypocrites
  alternatives:
  - play-actors
  - pretenders
  lexicon: BDAG
  rationale: The term is already established in Jesus-tradition moral language. 'Hypocrites'
    preserves the sharp ethical and polemical force without unnecessary novelty.
- source_word: δευτέρα σαββάτων
  chosen: the second day of the week
  alternatives:
  - Monday
  lexicon: LSJ
  rationale: Literally tied to sabbath-based week reckoning. This rendering preserves
    the Jewish/early-Christian texture better than the modern weekday name alone.
- source_word: πέμπτῃ
  chosen: the fifth
  alternatives:
  - the fifth day of the week
  - Thursday
  lexicon: LSJ
  rationale: In context with 'second day of the week,' the sense is weekday numbering.
    The translation keeps the ancient reckoning implicit while remaining readable.
- source_word: τετράδα
  chosen: the fourth day
  alternatives:
  - Wednesday
  lexicon: LSJ
  rationale: The Didache contrasts Christian fasting days with those of 'the hypocrites.'
    Numbered weekday language preserves the period flavor and the deliberate contrast.
- source_word: παρασκευήν
  chosen: Preparation
  alternatives:
  - Preparation Day
  - Friday
  lexicon: BDAG
  rationale: Παρασκευή had become a conventional designation for the day before the
    Sabbath. 'Preparation' preserves the liturgical-historical term; a footnote can
    clarify that this is Friday.
- source_word: προσεύχεσθε
  chosen: pray
  alternatives:
  - offer prayer
  lexicon: BDAG
  rationale: Direct imperative language is best preserved with the simple verb 'pray.'
- source_word: ἐκέλευσεν
  chosen: commanded
  alternatives:
  - instructed
  - ordered
  lexicon: BDAG
  rationale: The Didache presents the prayer as the Lord's authoritative instruction.
    'Commanded' preserves that force more clearly than the softer 'instructed.'
- source_word: ἐν τῷ εὐαγγελίῳ αὐτοῦ
  chosen: in his gospel
  alternatives:
  - in the gospel
  - in the good news he proclaimed
  lexicon: BDAG
  rationale: The possessive is explicit in the Greek. 'In his gospel' preserves the
    wording and early-Christian reference to the authoritative gospel tradition.
- source_word: ἁγιασθήτω
  chosen: may your name be made holy
  alternatives:
  - hallowed be your name
  - may your name be sanctified
  lexicon: BDAG
  rationale: This keeps the passive force of the Greek while using accessible modern
    English. It avoids archaic phrasing without flattening the reverential tone.
- source_word: ἐπιούσιον
  chosen: for the day
  alternatives:
  - daily
  - necessary for existence
  - for tomorrow
  lexicon: BDAG
  rationale: The adjective is famously difficult. 'For the day' preserves the sense
    of bread needed for the day at hand without overcommitting to one debated etymology.
    A footnote records alternatives.
- source_word: ὀφειλήν
  chosen: debt
  alternatives:
  - debts
  - what we owe
  - trespass
  lexicon: BDAG
  rationale: The singular appears in this Didache form, and the debt metaphor should
    be preserved rather than replaced with the interpretive 'trespass.'
- source_word: ὀφειλέταις
  chosen: debtors
  alternatives:
  - those indebted to us
  - offenders against us
  lexicon: BDAG
  rationale: This matches the debt metaphor in the preceding clause and maintains
    lexical consistency.
- source_word: πειρασμόν
  chosen: testing
  alternatives:
  - temptation
  - trial
  lexicon: BDAG
  rationale: The Greek can denote testing or temptation. 'Testing' preserves the broader
    sense and avoids implying that God directly solicits moral evil, while still leaving
    the tension visible.
- source_word: ῥῦσαι
  chosen: rescue
  alternatives:
  - deliver
  - save
  lexicon: BDAG
  rationale: '''Rescue'' is vivid, contemporary, and faithful to the sense of deliverance
    from danger.'
- source_word: τοῦ πονηροῦ
  chosen: the evil one
  alternatives:
  - evil
  - the wicked one
  lexicon: BDAG
  rationale: The phrase can be neuter ('evil') or masculine ('the evil one'). Here
    the personal reading is chosen because it fits early-Christian prayer language
    and preserves the theological tension; the alternative is noted in a footnote.
- source_word: Τρὶς τῆς ἡμέρας
  chosen: three times a day
  alternatives:
  - thrice in the day
  lexicon: LSJ
  rationale: This is clear modern English that preserves the fixed prayer practice
    indicated by the Greek.
theological_decisions:
- issue: Rendering of ἐπιούσιον in the Lord's Prayer
  chosen_reading: our bread for the day
  alternative_readings:
  - our daily bread
  - our bread for tomorrow
  - our necessary bread
  rationale: The adjective is lexically disputed and rare. 'For the day' is a restrained
    rendering that reflects daily provision without pretending the debate is settled.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Rendering of τοῦ πονηροῦ
  chosen_reading: the evil one
  alternative_readings:
  - evil
  rationale: The Greek form permits either a personal or impersonal sense. The main
    text keeps the personal possibility prominent, while the alternative should remain
    visible in a footnote rather than being erased.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Inclusion of the doxology ὅτι σοῦ ἐστιν ἡ δύναμις καὶ ἡ δόξα εἰς τοὺς αἰῶνας
  chosen_reading: included in the main text
  alternative_readings:
  - omit as secondary in some Gospel manuscript traditions
  rationale: It is present in the Greek Didache text supplied and therefore belongs
    in the translation of this chapter, regardless of textual questions in Matthew.
  doctrine_reference: PHILOSOPHY.md §What we are translating
