id: DID.02
reference: Didache 2
unit: chapter
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Δευτέρα δὲ ἐντολὴ τῆς διδαχῆς Οὐ φονεύσεις, οὐ μοιχεύσεις, οὐ παιδοφθορήσεις,
    οὐ πορνεύσεις, οὐ κλέψεις, οὐ μαγεύσεις, οὐ φαρμακεύσεις, οὐ φονεύσεις τέκνον
    ἐν φθορᾷ οὐδὲ γεννηθὲν ἀποκτενεῖς. Οὐκ ἐπιθυμήσεις τὰ τοῦ πλησίον, οὐκ ἐπιορκήσεις,
    οὐ ψευδομαρτυρήσεις, οὐ κακολογήσεις, οὐ μνησικακήσεις. Οὐκ ἔσῃ διγνώμων οὐδὲ
    δίγλωσσος· παγὶς γὰρ θανάτου ἡ διγλωσσία. Οὐκ ἔσται ὁ λόγος σου ψευδής, οὐ κενός,
    ἀλλὰ μεμεστωμένος πράξει. Οὐκ ἔσῃ πλεονέκτης οὐδὲ ἅρπαξ οὐδὲ ὑποκριτὴς οὐδὲ κακοήθης
    οὐδὲ ὑπερήφανος. Οὐ λήψῃ βουλὴν πονηρὰν κατὰ τοῦ πλησίον σου. Οὐ μισήσεις πάντα
    ἄνθρωπον, ἀλλὰ οὓς μὲν ἐλέγξεις, περὶ δὲ ὧν προσεύξῃ, οὓς δὲ ἀγαπήσεις ὑπὲρ τὴν
    ψυχήν σου.
  language: Greek
  pages:
  - 18
  - 20
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number
    noise and page segmentation were cleaned, but the translation must stay anchored
    in the Greek wording.
translation:
  text: 'And the second commandment of the teaching is this: You shall not murder;
    you shall not commit adultery; you shall not corrupt boys; you shall not practice
    sexual immorality; you shall not steal; you shall not practice magic; you shall
    not use sorcery; you shall not murder a child by abortion, nor kill one that has
    been born. You shall not desire the things of your neighbor; you shall not swear
    falsely; you shall not bear false witness; you shall not speak evil; you shall
    not hold a grudge. You shall not be double-minded nor double-tongued, for double-tongued
    speech is a snare of death. Your word shall not be false or empty, but fulfilled
    in action. You shall not be greedy, nor grasping, nor a hypocrite, nor ill-disposed,
    nor arrogant. You shall not take evil counsel against your neighbor. You shall
    not hate any man; but some you shall reprove, for some you shall pray, and some
    you shall love more than your own life.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abuse boys' or 'commit pederasty'; the Greek term refers specifically
      to the sexual corruption of boys.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'you shall not murder a child in destruction, nor kill one that
      has been born'—a twofold prohibition covering destruction before birth and killing
      after birth.
    reason: lexical_alternative
  - marker: c
    text: Or 'Your word shall not be false or empty, but full of action.'
    reason: lexical_alternative
  - marker: d
    text: Greek 'any man' uses a masculine singular form with representative force.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντολή
  chosen: commandment
  alternatives:
  - command
  - instruction
  lexicon: BDAG
  rationale: Retains the moral-imperative force and echoes biblical ethical diction
    better than the flatter 'instruction.'
- source_word: διδαχή
  chosen: the teaching
  alternatives:
  - teaching
  - instruction
  lexicon: BDAG
  rationale: With the article, this refers to the recognized body of instruction in
    the work; 'the teaching' preserves that quasi-technical sense.
- source_word: φονεύσεις
  chosen: murder
  alternatives:
  - kill
  - commit murder
  lexicon: BDAG
  rationale: The prohibition concerns unlawful killing; 'murder' is the more precise
    ethical rendering.
- source_word: παιδοφθορήσεις
  chosen: corrupt boys
  alternatives:
  - abuse boys
  - commit pederasty
  - seduce boys
  lexicon: LSJ
  rationale: The term specifically refers to sexual corruption of boys. 'Corrupt boys'
    stays close to the Greek while preserving the early-Christian moral register;
    alternatives are either too clinical or too interpretively narrow.
- source_word: πορνεύσεις
  chosen: practice sexual immorality
  alternatives:
  - fornicate
  - commit sexual immorality
  lexicon: BDAG
  rationale: Conveys the broad sexual-ethics category without archaic English like
    'fornicate.'
- source_word: μαγεύσεις
  chosen: practice magic
  alternatives:
  - use magic
  - practice sorcery
  lexicon: LSJ
  rationale: A broad term for magical practice; rendered distinctly from φαρμακεύσεις
    to preserve the paired prohibitions.
- source_word: φαρμακεύσεις
  chosen: use sorcery
  alternatives:
  - practice sorcery
  - use potions
  lexicon: BDAG
  rationale: Kept distinct from μαγεύσεις; in this moral list it refers to sorcerous
    practice rather than ordinary medicine.
- source_word: φθορᾷ
  chosen: by abortion
  alternatives:
  - in destruction
  - in corruption
  lexicon: BDAG
  rationale: In the idiom φονεύσεις τέκνον ἐν φθορᾷ, the sense is the destruction
    of the unborn child; 'by abortion' gives the plain ethical referent in current
    English.
- source_word: ἐπιθυμήσεις
  chosen: desire
  alternatives:
  - covet
  - long for
  lexicon: BDAG
  rationale: '''Covet'' is traditional and possible, but ''desire the things of your
    neighbor'' is more transparent to modern readers while preserving the prohibition''s
    force.'
- source_word: κακολογήσεις
  chosen: speak evil
  alternatives:
  - revile
  - slander
  - speak abusively
  lexicon: BDAG
  rationale: A broad prohibition against evil speech; 'speak evil' preserves the moral
    texture without narrowing it only to formal slander.
- source_word: μνησικακήσεις
  chosen: hold a grudge
  alternatives:
  - be resentful
  - remember wrongs
  lexicon: BDAG
  rationale: Idiomatic modern English that captures the sense of nursing resentment.
- source_word: διγνώμων
  chosen: double-minded
  alternatives:
  - two-minded
  - wavering
  lexicon: BDAG
  rationale: Established English equivalent that preserves the moral and spiritual
    sense of divided intention.
- source_word: δίγλωσσος
  chosen: double-tongued
  alternatives:
  - deceitful in speech
  - two-tongued
  lexicon: BDAG
  rationale: A vivid literal rendering that preserves the image and early-Christian
    ethical tone.
- source_word: παγίς
  chosen: snare
  alternatives:
  - trap
  lexicon: BDAG
  rationale: '''Snare of death'' preserves the solemn proverbial quality of the clause.'
- source_word: κενός
  chosen: empty
  alternatives:
  - vain
  - hollow
  lexicon: BDAG
  rationale: Simple and direct; paired with action, it denotes speech lacking substance.
- source_word: μεμεστωμένος πράξει
  chosen: fulfilled in action
  alternatives:
  - full of deed
  - confirmed by practice
  lexicon: LSJ
  rationale: Expresses speech that is filled out by corresponding conduct; smoother
    than a hyper-literal rendering while staying anchored in the Greek.
- source_word: πλεονέκτης
  chosen: greedy
  alternatives:
  - covetous
  - avaricious
  lexicon: BDAG
  rationale: Clear modern equivalent for acquisitive desire.
- source_word: ἅρπαξ
  chosen: grasping
  alternatives:
  - rapacious
  - swindling
  - extortionate
  lexicon: BDAG
  rationale: Broad enough to fit the vice list without over-specifying one form of
    exploitation.
- source_word: κακοήθης
  chosen: ill-disposed
  alternatives:
  - malicious
  - evil-tempered
  lexicon: LSJ
  rationale: Captures a settled bad character or malign disposition in a way suitable
    to the list.
- source_word: βουλήν πονηράν
  chosen: evil counsel
  alternatives:
  - wicked plan
  - evil design
  lexicon: BDAG
  rationale: Preserves the deliberative sense of βουλή rather than reducing it merely
    to an act.
- source_word: ἐλέγξεις
  chosen: reprove
  alternatives:
  - rebuke
  - convict
  lexicon: BDAG
  rationale: 'Fits the ethical and pastoral context: corrective confrontation rather
    than mere denunciation.'
- source_word: ὑπὲρ τὴν ψυχήν σου
  chosen: more than your own life
  alternatives:
  - more than your own soul
  - beyond your own life
  lexicon: BDAG
  rationale: In this context ψυχή refers to one's life/self; 'life' communicates the
    force naturally in English.
theological_decisions:
- issue: Rendering of παιδοφθορήσεις in an early-Christian vice list
  chosen_reading: corrupt boys
  alternative_readings:
  - abuse boys
  - commit pederasty
  - seduce boys
  rationale: The Greek points specifically to sexual corruption of boys. The chosen
    rendering stays close to the source while making the object explicit and preserving
    the text's moral gravity.
  doctrine_reference: Preserve original-language primacy; do not flatten morally specific
    language.
- issue: Ethical prohibition of abortion and infanticide
  chosen_reading: you shall not murder a child by abortion, nor kill one that has
    been born
  alternative_readings:
  - you shall not kill a child in the womb, nor after birth
  - you shall not abort a fetus nor kill a newborn
  rationale: 'This wording preserves the twofold prohibition in the Greek: destruction
    before birth and killing after birth. It avoids clinical modern jargon while making
    the referent unmistakable.'
  doctrine_reference: Readable modern English without flattening theological or moral
    weight.
- issue: Scope of οὐ μισήσεις πάντα ἄνθρωπον
  chosen_reading: You shall not hate any man
  alternative_readings:
  - You shall not hate anyone
  - You shall not hate every man
  rationale: The Greek is singular and gendered. 'Any man' preserves the source form
    and representative force better than a fully neutral recasting, in line with gender-accurate
    policy.
  doctrine_reference: Gender-accurate over gender-neutral.
- issue: Interpretation of the closing triad about differing responses to people
  chosen_reading: but some you shall reprove, for some you shall pray, and some you
    shall love more than your own life
  alternative_readings:
  - but some you shall reprove, concerning others you shall pray, and others you shall
    love more than your own soul
  rationale: The Greek distinguishes three responses without fully spelling out the
    criteria. The translation preserves that tension rather than resolving it into
    a smoother paraphrase.
  doctrine_reference: Preserve theological and interpretive tension rather than resolve
    it.
