translation:
  text: 'And the second commandment of the teaching is this: You shall not murder;
    you shall not commit adultery; you shall not corrupt boys;a you shall not commit
    sexual immorality; you shall not steal; you shall not practice magic; you shall
    not use sorcery; you shall not murder a child by abortion, nor kill one that has
    been born.b You shall not desire the things of your neighbor; you shall not swear
    falsely; you shall not bear false witness; you shall not speak evil; you shall
    not hold a grudge. You shall not be double-minded nor double-tongued, for double-tongued
    speech is a snare of death. Your word shall not be false or empty, but filled
    with action.c You shall not be greedy, nor grasping, nor a hypocrite, nor ill-disposed,
    nor arrogant. You shall not form an evil plan against your neighbor. You shall
    not hate every person; but some you shall reprove, for some you shall pray, and
    some you shall love more than your own life.'
  philosophy: optimal-equivalence
