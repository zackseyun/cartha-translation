id: DID.10
reference: Didache 10
unit: chapter
book: Didache
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Μετὰ δὲ τὸ ἐμπλησθῆναι οὕτως εὐχαριστήσατε· Εὐχαριστοῦμέν σοι, Πάτερ ἅγιε,
    ὑπὲρ τοῦ ἁγίου ὀνόματός σου, οὗ κατεσκήνωσας ἐν ταῖς καρδίαις ἡμῶν, καὶ ὑπὲρ τῆς
    γνώσεως καὶ πίστεως καὶ ἀθανασίας, ἧς ἐγνώρισας ἡμῖν διὰ Ἰησοῦ τοῦ παιδός σου·
    σοὶ ἡ δόξα εἰς τοὺς αἰῶνας. Σὺ, δέσποτα παντοκράτορ, ἔκτισας τὰ πάντα ἕνεκεν τοῦ
    ὀνόματός σου, τροφήν τε καὶ ποτὸν ἔδωκας τοῖς ἀνθρώποις εἰς ἀπόλαυσιν ἵνα σοι
    εὐχαριστήσωσιν, ἡμῖν δὲ ἐχαρίσω πνευματικὴν τροφὴν καὶ ποτὸν καὶ ζωὴν αἰώνιον
    διὰ τοῦ παιδός σου. Πρὸ πάντων εὐχαριστοῦμέν σοι ὅτι δυνατός εἶ· σοὶ ἡ δόξα εἰς
    τοὺς αἰῶνας. Μνήσθητι, Κύριε, τῆς ἐκκλησίας σου τοῦ ῥύσασθαι αὐτὴν ἀπὸ παντὸς
    πονηροῦ καὶ τελειῶσαι αὐτὴν ἐν τῇ ἀγάπῃ σου, καὶ σύναξον αὐτὴν ἀπὸ τῶν τεσσάρων
    ἀνέμων, τὴν ἁγιασθεῖσαν εἰς τὴν σὴν Βασιλείαν, ἣν ἡτοίμασας αὐτῇ· ὅτι σοῦ ἐστιν
    ἡ δύναμις καὶ ἡ δόξα εἰς τοὺς αἰῶνας. Ἐλθέτω χάρις καὶ παρελθέτω ὁ κόσμος οὗτος.
    Ὡσαννὰ τῷ υἱῷ Δαβίδ. Εἴ τις ἅγιός ἐστιν, ἐρχέσθω· εἴ τις οὐκ ἔστι, μετανοείτω·
    μαρανᾰθά. Ἀμήν. Τοῖς δὲ προφήταις ἐπιτρέπετε εὐχαριστεῖν ὅσα θέλουσιν.
  language: Greek
  pages:
  - 32
  - 34
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number
    noise and page segmentation were cleaned, but the translation must stay anchored
    in the Greek wording.
translation:
  text: 'But after being filled, give thanks in this way:


    We give thanks to you, Holy Father,

    for your holy name,

    which you caused to dwell in our hearts,

    and for the knowledge and faith and immortality

    which you made known to us through Jesus your servant;

    to you be the glory forever.


    You, Master Almighty,

    created all things for the sake of your name,

    and gave food and drink to men for enjoyment,

    so that they might give thanks to you;

    but to us you graciously gave spiritual food and drink

    and eternal life through your servant.

    Above all we give thanks to you because you are mighty;

    to you be the glory forever.


    Remember, Lord, your church:

    to deliver it from every evil

    and to perfect it in your love;

    and gather it, the one sanctified,

    from the four winds into your kingdom,

    which you prepared for it.

    For yours is the power and the glory forever.


    Let grace come,

    and let this world pass away.

    Hosanna to the son of David.

    If anyone is holy, let him come;

    if anyone is not, let him repent.

    Maranatha. Amen.


    But permit the prophets to give thanks as much as they desire.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'child' for 'your servant' (παῖς); the Greek term can bear either sense
      here.
    reason: lexical_alternative
  - marker: b
    text: '''From the four winds'' is biblical imagery for gathering the scattered
      people from every direction.'
    reason: cultural_note
  - marker: c
    text: Maranatha is an Aramaic liturgical cry, likely meaning 'Our Lord, come.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμπλησθῆναι
  chosen: being filled
  alternatives:
  - having eaten enough
  - being satisfied
  lexicon: BDAG
  rationale: The passive infinitive refers to being filled/satisfied after the meal.
    'Being filled' preserves the concrete meal setting and echoes the Greek more closely
    than a freer paraphrase.
- source_word: εὐχαριστήσατε / εὐχαριστοῦμέν
  chosen: give thanks / we give thanks
  alternatives:
  - offer thanksgiving
  - say the thanksgiving
  lexicon: BDAG
  rationale: The verb is the ordinary Christian thanksgiving term here, but not yet
    a fixed technical label that should replace the verbal force. 'Give thanks' preserves
    both liturgical texture and verbal clarity.
- source_word: κατεσκήνωσας
  chosen: you caused to dwell
  alternatives:
  - you made dwell
  - you tabernacled
  lexicon: BDAG
  rationale: The verb evokes dwelling or pitching a tent. 'Caused to dwell' keeps
    the divine action explicit and preserves the resonance of God's name dwelling
    among his people without overloading the line with a less natural English metaphor.
- source_word: γνώσεως
  chosen: knowledge
  alternatives:
  - understanding
  - recognition
  lexicon: BDAG
  rationale: The noun is best kept as 'knowledge' in this triad with faith and immortality;
    it reflects revealed knowledge granted through Jesus.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: In this catechetical-liturgical context, 'faith' is the most natural
    rendering and aligns with project defaults, while preserving the possibility of
    lived trust without forcing that nuance into the main text.
- source_word: παιδός
  chosen: servant
  alternatives:
  - child
  - boy
  lexicon: BDAG
  rationale: In early Christian prayer language, παῖς for Jesus can mean child or
    servant. 'Servant' better fits the biblical-liturgical register and likely alludes
    to the Isaianic servant tradition, while avoiding an overly juvenile sense.
- source_word: δέσποτα παντοκράτορ
  chosen: Master Almighty
  alternatives:
  - Sovereign Almighty
  - Master, almighty one
  lexicon: BDAG
  rationale: δέσποτα is stronger than 'Lord' and denotes sovereign mastery; παντοκράτορ
    is conventionally 'Almighty.' 'Master Almighty' preserves the solemn address and
    distinction from the later κύριε in the chapter.
- source_word: ἕνεκεν τοῦ ὀνόματός σου
  chosen: for the sake of your name
  alternatives:
  - because of your name
  - for your name's sake
  lexicon: BDAG
  rationale: This phrase carries biblical covenantal resonance. 'For the sake of your
    name' is idiomatic and preserves that theological weight.
- source_word: εἰς ἀπόλαυσιν
  chosen: for enjoyment
  alternatives:
  - for delight
  - for use
  lexicon: BDAG
  rationale: The phrase indicates ordinary human enjoyment of created food and drink.
    'For enjoyment' is clear and faithful without sounding hedonistic.
- source_word: ἐχαρίσω
  chosen: you graciously gave
  alternatives:
  - you gave freely
  - you bestowed
  lexicon: BDAG
  rationale: The verb emphasizes gracious gift. 'Graciously gave' makes that nuance
    audible in English.
- source_word: πνευματικὴν τροφὴν καὶ ποτὸν
  chosen: spiritual food and drink
  alternatives:
  - food and drink of the Spirit
  lexicon: BDAG
  rationale: The adjective πνευματικός is best rendered directly here. This preserves
    the contrast with ordinary food and drink while leaving open whether the reference
    is eucharistic, broader, or both.
- source_word: Μνήσθητι
  chosen: Remember
  alternatives:
  - Be mindful of
  - Remember in mercy
  lexicon: BDAG
  rationale: Prayer language in biblical tradition often uses 'remember' as a covenantal
    appeal to divine action. The simple imperative preserves that register.
- source_word: ἐκκλησίας
  chosen: church
  alternatives:
  - assembly
  - congregation
  lexicon: BDAG
  rationale: Given the established Christian communal sense in the Didache, 'church'
    best reflects the referent, though the gathered-assembly nuance remains in the
    background.
- source_word: ῥύσασθαι
  chosen: to deliver
  alternatives:
  - to rescue
  - to save
  lexicon: BDAG
  rationale: The infinitive expresses the content of the prayer request. 'Deliver'
    preserves biblical diction and avoids narrowing the sense to either physical or
    spiritual rescue alone.
- source_word: τελειῶσαι
  chosen: to perfect
  alternatives:
  - to make complete
  - to bring to maturity
  lexicon: BDAG
  rationale: The verb carries the sense of bringing to completion. 'Perfect' preserves
    the elevated liturgical tone and theological depth, especially in connection with
    love.
- source_word: σύναξον
  chosen: gather
  alternatives:
  - bring together
  - assemble
  lexicon: BDAG
  rationale: A direct imperative with eschatological overtones; 'gather' is concise
    and biblically resonant.
- source_word: τὴν ἁγιασθεῖσαν
  chosen: the one sanctified
  alternatives:
  - the sanctified one
  - which has been made holy
  lexicon: BDAG
  rationale: The feminine participle most naturally refers back to the church. 'The
    one sanctified' keeps the participial force visible, though slightly formal.
- source_word: ἀπὸ τῶν τεσσάρων ἀνέμων
  chosen: from the four winds
  alternatives:
  - from the four directions
  lexicon: BDAG
  rationale: This is standard biblical eschatological imagery. 'Four winds' should
    be preserved rather than flattened.
- source_word: Ἐλθέτω χάρις
  chosen: Let grace come
  alternatives:
  - May grace come
  lexicon: BDAG
  rationale: The terse acclamation should remain terse. 'Grace' is left broad, preserving
    the liturgical and possibly eschatological ambiguity.
- source_word: παρελθέτω ὁ κόσμος οὗτος
  chosen: let this world pass away
  alternatives:
  - let this age pass away
  lexicon: BDAG
  rationale: κόσμος can mean world or ordered system. 'This world' is the plainest
    rendering here, while still carrying eschatological force.
- source_word: Ὡσαννά
  chosen: Hosanna
  alternatives:
  - Save now
  lexicon: BDAG
  rationale: The acclamation is best transliterated because it functions as inherited
    liturgical praise rather than ordinary prose.
- source_word: τῷ υἱῷ Δαβίδ
  chosen: to the son of David
  alternatives:
  - to David's son
  lexicon: BDAG
  rationale: The messianic title should remain transparent and traditional in form.
- source_word: μετανοείτω
  chosen: let him repent
  alternatives:
  - let him change his mind
  - let him turn back
  lexicon: BDAG
  rationale: The imperative carries moral and religious force beyond mere reconsideration.
    'Repent' best preserves early Christian summons language.
- source_word: μαρανᾰθά
  chosen: Maranatha
  alternatives:
  - Our Lord, come
  - The Lord has come
  lexicon: BDAG
  rationale: The Aramaic liturgical cry is preserved by transliteration in the main
    text because its exact parsing is debated and its worship setting favors retention;
    an explanatory footnote records the main sense.
- source_word: ἐπιτρέπετε
  chosen: permit
  alternatives:
  - allow
  lexicon: BDAG
  rationale: '''Permit'' better suits church-order instruction and keeps the formal
    tone.'
- source_word: ὅσα θέλουσιν
  chosen: as much as they desire
  alternatives:
  - whatever they wish
  - as they will
  lexicon: BDAG
  rationale: The phrase grants broad freedom in thanksgiving prayer. 'As much as they
    desire' captures the open-ended extent, not merely choice among fixed options.
theological_decisions:
- issue: Rendering παῖς for Jesus
  chosen_reading: servant
  alternative_readings:
  - child
  rationale: The term can denote either child or servant. In this prayer setting,
    'servant' better preserves likely scriptural resonance with the Servant of the
    Lord and avoids implying merely filial age-status, while still leaving intact
    the intimacy of relation to the Father.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve theological
    tension rather than resolve it'
- issue: Meaning of spiritual food and drink
  chosen_reading: Retain the broad phrase without narrowing it to the Eucharist alone
  alternative_readings:
  - Explicitly eucharistic food and drink
  - General spiritual nourishment
  rationale: The chapter follows eucharistic material, so sacramental resonance is
    likely, but the Greek itself does not force a narrower doctrinal specification.
    The translation preserves the phrase as written and leaves interpretation open.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it'
- issue: Scope of κόσμος in 'let this world pass away'
  chosen_reading: world
  alternative_readings:
  - age
  rationale: Both are possible in eschatological contexts. 'World' is the more immediate
    lexical sense and fits the prayer's apocalyptic tone without over-interpreting
    the phrase.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition'
- issue: Handling μαρανᾰθά
  chosen_reading: Transliterate in main text with explanatory footnote
  alternative_readings:
  - Our Lord, come
  - The Lord has come
  rationale: Because the Aramaic expression is liturgical and its exact segmentation
    has been debated, transliteration best preserves the historical texture while
    the footnote gives the likely sense.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve
    it'
