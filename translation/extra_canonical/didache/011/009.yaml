  rationale: 'The Greek word τράπεζα is used here by metonymy for the food placed upon it (BDAG τράπεζα 2, ''meal, food''). The phrase ὁρίζων τράπεζαν refers to a prophet commanding that a meal be prepared. ''Appoints a table'' is overly literal and obscures this meaning for the English reader, sounding like the designation of furniture rather than a demand for food. Adjusting ''from it'' to ''of it'' pairs better with ''meal''. | Azure: The proposed change is closer to the Greek sense. In Καὶ πᾶς προφήτης ὁρίζων τράπεζαν ἐν πνεύματι, οὐ φάγεται ἀπ᾽ αὐτῆς, τράπεζα can indeed mean not merely a physical table but a table set with food, '
