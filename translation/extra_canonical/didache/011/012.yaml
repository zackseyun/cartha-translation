  category: mistranslation
  tier: 2
  from: “Give me money,” or something else,
  to: “Give me money or anything else,”
  rationale: The Greek `ἢ ἕτερά τινα` ('or other things') is the direct object of `Δός` ('Give'), parallel to `ἀργύρια` ('money'). The draft's punctuation places 'or something else' outside the quotation, which changes the meaning to 'if he says "Give me money", or if he says something else'—a reading that contradicts the very next clause where the prophet *is* allowed to say something else (asking for others). The request for 'other things' must be part of what the false prophet is asking for himself.
