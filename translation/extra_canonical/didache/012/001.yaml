lexical_decisions:
- source_word: ἐν ὀνόματι Κυρίου
  chosen: in the name of the Lord
  rationale: Retains the early-Christian formula of coming under the Lord's acknowledged
    name/authority without over-interpreting it. 'Lord' follows project default for
    κύριος.
- source_word: δεχθήτω
  chosen: be received
  rationale: The third-person aorist passive imperative is best conveyed by 'be received.'
    It preserves ecclesial hospitality language more formally than 'be welcomed,'
    while still reading naturally. The manuscript has δεχξήσθω, a rare future middle
    imperative, but the meaning is the same.
- source_word: δοκιμάσαντες
  chosen: after testing him
  rationale: The chapter balances hospitality with discernment. 'Testing' preserves
    the moral and communal vetting sense better than the softer 'examining' or the
    slightly archaic 'proving'.
- source_word: σύνεσιν ... δεξιὰν καὶ ἀριστεράν
  chosen: understanding of right and left
  rationale: The Greek is idiomatic. A more interpretive rendering would be 'discernment
    of right and wrong,' but the literal 'right and left' preserves the texture and
    leaves the idiom visible for audit.
- source_word: παρόδιος
  chosen: traveler
  rationale: Refers to one passing through rather than settling. 'Traveler' is clear
    modern English without losing the transient sense. 'Wayfarer' is a valid but more
    archaic alternative.
- source_word: οὐ μενεῖ ... εἰ μὴ δύο ἢ τρεῖς ἡμέρας
  chosen: he shall not remain ... for more than two or three days
  rationale: The Greek construction οὐ... εἰ μὴ with a quantity indicates a limit.
    While 'except for' is a formal equivalent, 'for more than' more clearly and idiomatically
    expresses this upper limit in English.
- source_word: καθίσαι
  chosen: settle among you
  rationale: More than a brief visit is in view; 'settle' captures the contrast with
    a passing traveler (παρόδιος).
- source_word: τεχνίτης
  chosen: craftsman
  rationale: Denotes a person with a trade or skilled manual occupation. 'Craftsman'
    preserves the concrete social setting.
- source_word: ἐργαζέσθω καὶ φαγέτω
  chosen: let him work and eat
  rationale: This concise imperative sequence in Greek keeps the church-order tone
    and echoes the moral principle that one should work for one's food (cf. 2 Thess.
    3:10).
- source_word: τέχνην
  chosen: trade
  rationale: In context it refers to a means of livelihood. 'Trade' is idiomatic and
    concrete.
- source_word: κατὰ τὴν σύνεσιν ὑμῶν προνοήσατε, πῶς...
  chosen: provide, according to your understanding, how...
  rationale: 'This phrasing keeps the two Greek concepts—discernment (σύνεσιν) and
    provision (προνοήσατε)—distinct and properly ordered. The command is to ''provide''
    or ''make arrangements'' (προνοήσατε), and the ''how'' clause (πῶς...) specifies
    the goal of that provision: preventing idleness.'
- source_word: ἀργὸς
  chosen: idle
  rationale: The concern is not merely unemployment but unproductive dependence within
    the community. 'Idle' preserves that moral nuance without overstating personal
    vice (as 'lazy' might).
- source_word: χριστέμπορος
  chosen: Christ-trader
  rationale: 'A rare and vivid compound. Rather than flattening it to ''fraud'' or
    ''profiteer,'' ''Christ-trader'' preserves the sharp polemical force: someone
    making Messiah or the faith into merchandise.'
- source_word: προσέχετε ἀπὸ τῶν τοιούτων
  chosen: watch out for such people
  rationale: Captures both vigilance and protective distance. 'Watch out for' is a
    common and accurate rendering of προσέχετε ἀπὸ. 'Beware of' is a close synonym.
theological_decisions:
- issue: How explicitly to interpret the idiom 'understanding of right and left'
  chosen_reading: Retain the idiom in the main text as 'understanding of right and
    left'
  rationale: The phrase likely refers to practical discernment, but the Greek wording
    is distinctive. Preserving the idiom maintains transparency and avoids resolving
    the expression too fully in translation, with a footnote providing the idiomatic
    sense.
  alternative_readings:
  - discernment of right and wrong
  - discernment in all matters
- issue: Rendering χριστέμπορος
  chosen_reading: Christ-trader
  rationale: The text condemns exploitation of Christian hospitality for gain. A literal
    compound preserves the early-Christian rhetorical sting better than a generalized
    moral label like 'profiteer' or 'charlatan'.
  alternative_readings:
  - one who trades on Christ
  - religious profiteer
  - Christ-monger
