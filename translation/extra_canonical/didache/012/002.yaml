  from: But if the one who comes is a traveler, help him as much as you can; he shall not remain with you for more than two or three days, should there be a need.
  to: If the one who comes is a traveler, help him as much as you can; but he shall not remain with you except for two or three days, if there is a need.
  rationale: The draft's phrasing 'for more than two or three days, should there be a need' creates a dangerous ambiguity in English, implying that 'a need' is a loophole allowing the traveler to stay *longer* than the limit. The Greek `οὐ μενεῖ... εἰ μὴ... ἐὰν ᾖ ἀνάγκη` means 'he shall not remain... except for two or three days, if there is a need.' The condition restricts the stay to those 2-3 days, rather than providing an exception to exceed them. Additionally, `Εἰ μὲν` is better rendered 'If' rather than 'But if', as it sets up the contrast with `Εἰ δὲ` ('But if') in 12:3, and the draft missed the `δὲ` ('but') in the second clause (`οὐ μενεῖ δὲ`).
