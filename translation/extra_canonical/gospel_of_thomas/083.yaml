translation:
  text: Jesus said, Images are manifest to the human, but the light that is in them is hidden in the image of the Father’s light. He will be revealed, and his image is hidden by his light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '“Images are manifest”: the codex has plural ⲛϩⲓⲕⲱⲛ with 3pl ⲥⲉⲟⲩⲟⲛϩ. Some editions regularize to singular generic ‘the image’.'
    reason: textual_variant
  - marker: b
    text: '“He will strip off”: ϭⲱⲗⲡ is the verb for undressing/stripping; Thomas uses the same verb for divesting garments (e.g., logion 37). Some interpret this as ‘he will be revealed,’ but that is an interpretive paraphrase rather than a lexical meaning.'
    reason: lexical_alternative
  - marker: c
    text: '“his image … his light”: here taken as referring to the Father named in the preceding genitive chain. Some readers take the pronouns to refer instead to the human or to the light; the Coptic allows these readings but proximity favors ‘the Father.’'
    reason: alternative_reading
  - marker: d
    text: Or 'He will strip off, and his image will be hidden'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡϩⲓⲕⲱⲛ / ⲛϩⲓⲕⲱⲛ
  chosen: image / images
  alternatives:
  - likeness
  - icon
  lexicon: Crum; Layton
  rationale: Loan from Gk εἰκών; preserve as “image” to keep Thomas’s diction. Manuscript shows plural (ⲛϩⲓⲕⲱⲛ) with 3pl verb; translation reflects plural in first clause.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: are manifest
  alternatives:
  - are visible
  - appear
  lexicon: Crum, s.v. ⲟⲩⲱⲛϩ
  rationale: Idiomatic ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ = ‘become manifest/appear’. “Manifest” preserves Thomas’s paradoxical style.
- source_word: ⲡⲣⲱⲙⲉ
  chosen: the human
  alternatives:
  - the person
  - the man
  lexicon: Crum; Lambdin
  rationale: Generic human; avoid gendered ‘the man’ while retaining singular force of the article.
- source_word: ⲡⲟⲩⲟⲉⲓⲛ
  chosen: light
  alternatives:
  - illumination
  - radiance
  lexicon: Crum
  rationale: Core semantic ‘light’; “illumination” would over-interpret.
- source_word: ⲉⲧⲉⲣⲉϩⲛⲛⲧⲟⲟⲩ
  chosen: that is in them
  alternatives:
  - which is within them
  lexicon: Lambdin; Layton
  rationale: Relative clause with 3pl pronominal object referring to the images.
- source_word: ϩⲱⲡ (with ϩⲛ, ⲉⲃⲟⲗ)
  chosen: is hidden / will be hidden
  alternatives:
  - is covered
  - is concealed
  lexicon: Crum, s.v. ϩⲱⲡ
  rationale: ϩⲱⲡ commonly ‘hide, be concealed’. Context creates a reveal/conceal paradox with “manifest” earlier. Second instance rendered as future by coordination.
- source_word: ϩⲛ ⲡϩⲓⲕⲱⲛ ⲛⲡⲟⲩⲟⲉⲓⲛ ⲛⲡⲉⲓⲱⲧ
  chosen: in the image of the Father’s light
  alternatives:
  - within the likeness of the Father’s light
  lexicon: Layton (genitive chains)
  rationale: 'Two genitive links: image › light › Father. Kept as concise chain in English.'
- source_word: ϭⲱⲗⲡ ⲉⲃⲟⲗ
  chosen: strip off
  alternatives:
  - undress
  - be revealed
  lexicon: Crum, s.v. ϭⲱⲗⲡ
  rationale: Primary meaning ‘strip off/undress’; elsewhere in Thomas the verb carries the same sense (e.g., logion 37). ‘Be revealed’ is interpretive and less lexically precise.
- source_word: ϩⲓⲧⲛ
  chosen: by (means of)
  alternatives:
  - through
  lexicon: Lambdin
  rationale: Instrumental preposition; ‘by’ is concise and accurate.
- source_word: pronominal reference (ⲛⲧⲟϥ / ⲡⲉϥ–)
  chosen: he/his = the Father
  alternatives:
  - the human
  - the light
  lexicon: Layton (pronoun reference)
  rationale: Nearest antecedent is ⲡⲉⲓⲱⲧ ‘the Father’; the pairing ‘his image … his light’ coheres with ‘the image of the Father’s light’ in the previous clause.
textual_note: 'No lacunae or conjectural restorations in Dilley’s text for this saying. The codex line shows plural article and plural verb in the opening: ⲛϩⲓⲕⲱⲛ ⲥⲉⲟⲩⲟⲛϩ (‘images are manifest’), while the normalized lemma regularizes to singular generic (ⲡϩⲓⲕⲱⲛ …). The translation retains the manuscript’s plural. There is also gender fluctuation for ‘image’: the manuscript reads ⲧⲉϥϩⲓⲕⲱⲛ (fem.), whereas the normalized form gives ⲡⲉϥϩⲓⲕⲱⲛ (masc.), reflecting variation in handling the Greek loanword εἰκών; this does not affect meaning. The verb ϩⲱⲡ is taken in its common sense ‘be hidden/covered’ (Crum), against any smoothing to ‘appear’; its second occurrence lacks an explicit future auxiliary but is read as future by coordination with ⲛⲧⲟϥⲛⲁϭⲱⲗⲡ. The subject of ⲛⲧⲟϥ (‘he will strip off’) and the possessives in ‘his image … his light’ are taken to refer to the Father (ⲡⲉⲓⲱⲧ), the nearest masculine antecedent, rather than to ‘the human’ or ‘the light’.'
