translation:
  text: Jesus said, "The images are manifest to humanity, and the light that is within them is hidden in the image of the Father's light. He will be revealed, and his image is hidden by his light."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:42:06Z'
  footnotes:
  - marker: humanity
    text: Coptic ⲡⲣⲱⲙⲉ (the human/person), used here as a generic singular.
    reason: lexical_alternative
  - marker: He will be revealed
    text: 'The Coptic pronoun ϥ- (he/it) could refer to the Father or to the light (ⲡⲟⲩⲟⲉⲓⲛ, which is grammatically masculine). If the latter, it would read: ''It will be revealed, and its image is hidden by its light.'''
    reason: textual_variant
lexical_decisions:
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: manifest
  rationale: The stative form ⲟⲩⲟⲛϩ indicates a state of being visible or manifest.
  lexicon: Crum 485a
  alternatives:
  - visible
  - revealed
- source_word: ϩⲱⲡ
  chosen: hidden
  rationale: The stative form ϩⲏⲡ indicates a state of being concealed or hidden.
  lexicon: Crum 695a
  alternatives:
  - concealed
- source_word: ϭⲱⲗⲡ ⲉⲃⲟⲗ
  chosen: revealed
  rationale: The verb means to uncover, reveal, or disclose.
  lexicon: Crum 814b
  alternatives:
  - disclosed
  - uncovered
theological_decisions:
- issue: Antecedent of ϥ- in ϥⲛⲁϭⲱⲗⲡ ⲉⲃⲟⲗ
  chosen_reading: He
  rationale: Translated as 'He' referring to the Father, which is the nearest logical antecedent for the personal revelation, though it could also refer to the light. The ambiguity is noted.
  alternatives_noted:
  - It
drafter_notes: The saying plays on the contrast between visible images (εἰκών) and hidden light. The translation preserves the paratactic structure (using 'and' for ⲁⲩⲱ) and the ambiguity of the masculine pronoun in the second half.
