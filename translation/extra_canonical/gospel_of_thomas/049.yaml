- archived_at: '2026-04-22T09:34:48Z'
  reason: redraft_coptic_strict
  english_text: Jesus said, "Blessed are the solitary and chosen,[1][2] for you will find the Kingdom.[3] For you are from it, and again you will return there."[4]
  previous_translation_block:
    text: Jesus said, "Blessed are the solitary and chosen,[1][2] for you will find the Kingdom.[3] For you are from it, and again you will return there."[4]
    philosophy: optimal-equivalence
    footnotes:
    - marker: '[1]'
      text: ⲙⲟⲛⲁⲭⲟⲥ is a Greek loanword (μοναχός) meaning ‘single, solitary’; later it also denotes a ‘monk.’ Here ‘solitary one’ is preferred to avoid anachronistic institutional overtones.
      reason: lexical_alternative
    - marker: '[2]'
      text: The relative clause ⲉⲧⲉⲣⲉⲥⲱⲧⲡ is active (‘who has chosen’). Some translations render ‘the elect,’ which is an adjectival passive not required by the Coptic.
      reason: lexical_alternative
    - marker: '[3]'
      text: The ‘you’ throughout (ⲛⲧⲱⲧⲛ) is plural in Coptic.
      reason: dialect_note
    - marker: '[4]'
      text: Lit. ‘again you will go there’ (ⲡⲁⲗⲓⲛ … ⲃⲱⲕ ⲙⲙⲁⲩ). ‘Return there’ conveys the sense.
      reason: cultural_note
    - marker: a
      text: Or 'Blessed is the solitary one, and the one who has chosen,'.
      reason: previous_rendering
