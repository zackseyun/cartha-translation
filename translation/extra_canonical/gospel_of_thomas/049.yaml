translation:
  text: Jesus said, "Blessed are the solitary and chosen, for you will find the kingdom. For you are from it, and you will go there again."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:34:48Z'
  footnotes:
  - marker: '1'
    text: The Greek loanword μοναχός (monachos) in Thomas does not refer to later monasticism, but to the 'single one' who has overcome inner division and achieved spiritual unity.
    reason: theological_note
  - marker: '2'
    text: The text shifts abruptly from the third person ('the solitary and chosen') to the second person ('you will find'), a common feature of oral or prophetic sayings.
    reason: register_note
  - marker: '3'
    text: The preposition ⲁ- is used here instead of the standard Sahidic ⲉ- before the noun 'kingdom' (ⲧⲙⲛⲧⲉⲣⲟ), a dialectal feature.
    reason: dialect_note
  - marker: '4'
    text: Lit., 'you are ones out of it' (ϩⲛⲉⲃⲟⲗ ⲛϩⲏⲧⲥ).
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲟⲛⲁⲭⲟⲥ
  chosen: solitary
  rationale: The Greek loanword μοναχός (monachos) in Thomas carries the theological weight of being 'single' or 'undivided,' rather than the later institutional sense of a 'monk.'
  lexicon: BDAG 656
  alternatives:
  - monks
  - single ones
  entry: μοναχός
- source_word: ⲉⲧⲥⲟⲧⲡ
  chosen: chosen
  rationale: A relative clause (ⲉⲧ-ⲥⲟⲧⲡ, 'who are chosen') functioning substantively alongside 'solitary'.
  lexicon: Crum 365b
  alternatives:
  - elect
  entry: ⲥⲱⲧⲡ
- source_word: ϩⲉ
  chosen: find
  rationale: The verb ϩⲉ followed by the preposition ⲉ- (here spelled ⲁ-) means 'to find'.
  lexicon: Crum 655a
  alternatives:
  - discover
  entry: ϩⲉ
- source_word: ⲃⲱⲕ
  chosen: go
  rationale: Standard verb for 'to go'. Combined with ⲡⲁⲗⲓⲛ ('again') and ⲉⲙⲁⲩ ('there'), it indicates a return to the source.
  lexicon: Crum 30b
  alternatives:
  - return
  entry: ⲃⲱⲕ
theological_decisions:
- issue: Translation of ⲙⲟⲛⲁⲭⲟⲥ (monachos)
  chosen_reading: solitary
  rationale: In the Gospel of Thomas, this term reflects a theology of inner unity and undividedness, not the later institutional sense of monasticism. 'Solitary' captures the sense of standing alone and being unified.
  alternatives_noted:
  - monks
  - single ones
drafter_notes: This saying encapsulates the Thomasine theme of pre-existence and return to the divine source. The translation preserves the abrupt grammatical shift from the third person ('the solitary') to the second person ('you will find'), which is present in the Coptic and characteristic of the text's direct address to the reader.
