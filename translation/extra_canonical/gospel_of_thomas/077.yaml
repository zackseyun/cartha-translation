translation:
  text: Jesus said, “I am the light—this one that is over them all. I am the All. It is from me that the All came forth, and to me that the All reached. Split a piece of wood—I am there. Lift up the stone, and you will find me there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: fn1
    text: '‘Over them all’: the Coptic stacks two prepositions (ϩⲓϫⲛ … ⲧⲏⲣ …), an intensifying idiom. We render it simply but note the emphasis.'
    reason: dialect_note
  - marker: fn2
    text: ‘The All’ reflects a Thomasine cosmological idiom. Alternatives include ‘the totality’, but ‘All’ preserves the strangeness and brevity.
    reason: lexical_alternative
  - marker: fn3
    text: 'ⲡⲱϩ shows contextual polysemy: ‘reach’ in the cosmological clauses, ‘split’ with wood. This is a recognized Sahidic usage.'
    reason: lexical_alternative
  - marker: fn4
    text: After ‘the stone’ the phrase ⲉϩⲣⲁⲓ is best read ‘under it’; some smooth translations omit this, but the preposition is present.
    reason: textual_variant
  - marker: fn5
    text: ‘You will see’ uses the plural subject ⲛⲧⲱⲧⲛ; the address is to a group, not an individual.
    reason: dialect_note
  - marker: a
    text: Or 'Lift up the stone—under it—and you will see me there.'.
    reason: previous_rendering
  - marker: b
    text: Or 'The All came forth from me, and the All reached to me.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲟⲩⲟⲉⲓⲛ
  chosen: light
  alternatives:
  - radiance
  - illumination
  lexicon: Crum
  rationale: Standard Sahidic noun for physical/metaphysical light; ‘light’ keeps Thomas’ terseness without interpretive expansion.
- source_word: ⲡⲁⲓ
  chosen: this
  alternatives:
  - this one
  lexicon: Lambdin
  rationale: Demonstrative apposition to ‘light’; leaving it as ‘this’ preserves the slightly strange framing in Thomas rather than smoothing to a relative clause.
- source_word: ϩⲓϫⲛⲛⲧⲟⲟⲩ ⲧⲏⲣⲛⲧⲟⲟⲩ
  chosen: over them all
  alternatives:
  - above them all
  - upon them all
  lexicon: Crum (ϩⲓϫⲛ ‘upon’; ⲧⲏⲣ ‘over/above’)
  rationale: Double prepositional phrasing intensifies superordination; ‘over them all’ captures the sense succinctly.
- source_word: ⲡⲧⲏⲣϥ
  chosen: the All
  alternatives:
  - the totality
  - the whole
  lexicon: Crum (ⲧⲏⲣ ‘all’)
  rationale: Thomas uses ‘the All’ as a technical, cosmic term; capitalized to signal the idiom while keeping literal wording.
- source_word: ⲉⲓ ⲉⲃⲟⲗ ⲛϩⲏⲧ
  chosen: came forth from me
  alternatives:
  - went out from me
  lexicon: Crum (ⲉⲓ ‘come’; ⲉⲃⲟⲗ ‘out’)
  rationale: Motion outward from the speaker; ‘came forth’ keeps formal tone common in Thomas.
- source_word: ⲡⲱϩ (in ‘…ⲡⲱϩ ϣⲁⲁⲛⲟⲕ’)
  chosen: reached to
  alternatives:
  - attained to
  - arrived at
  lexicon: Crum
  rationale: Here ⲡⲱϩ functions as ‘reach/attain’; paired with ϣⲁⲁⲛⲟⲕ (‘up to me’) it expresses arrival at the speaker.
- source_word: ϣⲁⲁⲛⲟⲕ
  chosen: to me
  alternatives:
  - up to me
  - toward me
  lexicon: Crum (ϣⲁ ‘to/unto’)
  rationale: Marks the terminus of motion; ‘to me’ is idiomatic while preserving directionality.
- source_word: ⲡⲱϩ (imperative)
  chosen: split
  alternatives:
  - cleave
  - chop
  lexicon: Crum
  rationale: Second occurrence of ⲡⲱϩ is a different sense (‘split’), recognized in context with ‘wood’; preserving the imperative sharpness.
- source_word: ⲛⲟⲩϣⲉ
  chosen: a piece of wood
  alternatives:
  - wood
  - a tree
  lexicon: Crum (ϣⲉ ‘wood/tree’)
  rationale: Indefinite singular fits the action; ‘piece of wood’ matches idiomatic usage in Thomas 77.
- source_word: ϥⲓ
  chosen: lift up
  alternatives:
  - raise
  lexicon: Crum
  rationale: Physical lifting of an object; terse imperative style.
- source_word: ⲛⲡⲱⲛⲉ
  chosen: the stone
  alternatives:
  - a stone
  lexicon: Crum
  rationale: Definite form in the manuscript; keep the definite article.
- source_word: ⲉϩⲣⲁⲓ
  chosen: under it
  alternatives:
  - beneath it
  lexicon: Crum
  rationale: Prepositional phrase modifying ‘the stone’; retains the concrete sense implied by the text.
- source_word: ⲛⲧⲱⲧⲛⲛⲁϩⲉ
  chosen: you will see
  alternatives:
  - you will behold
  lexicon: Lambdin (future periphrasis ⲛⲁ + infinitive; ϩⲉ ‘see’)
  rationale: The verb is ‘see’ (not ‘find’) and the subject is second plural; rendering keeps the literal aspect.
- source_word: ϯⲙⲙⲁⲩ
  chosen: I am there
  alternatives:
  - I am in that place
  lexicon: Crum
  rationale: Idiomatic assertion of presence; keeps Thomas’ abruptness.
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives: []
  lexicon: Crum
  rationale: Standard introductory formula throughout Thomas.
textual_note: 'Dialect: Sahidic with Lycopolitan flavor. No lacunae or conjectural restorations are marked by Dilley in this saying. The opening apposition ⲡⲟⲩⲟⲉⲓⲛ ⲡⲁⲓ ⲉⲧⲉⲣⲉ… uses a demonstrative with a relative construction; we keep the slightly abrupt ‘this one’ feel rather than smoothing into a fully relative clause. The phrase ϩⲓϫⲛⲛⲧⲟⲟⲩ ⲧⲏⲣⲛⲧⲟⲟⲩ has two prepositions (‘upon/over’), intensifying the superlative ‘over them all’. Notably, ⲡⲱϩ occurs twice with different senses: first ‘reach/attain’ (with ϣⲁⲁⲛⲟⲕ), then as an imperative ‘split’ with ⲛⲟⲩϣⲉ (wood); this polysemy is attested in Sahidic lexica and fits the context. The printed line has an orthographic segmentation ϣⲁⲣⲟⲉⲓ which Dilley normalizes to ϣⲁⲁⲛⲟⲕ (‘up to me’); we follow the normalized reading. ⲉϩⲣⲁⲓ after ‘the stone’ is taken as ‘under it’ (prepositional), followed by the explicit future ‘you (pl.) will see me there’; we have not conflated ⲉϩⲣⲁⲓ with ‘find’. Imperatives are left abrupt to preserve Thomas’ diction.'
