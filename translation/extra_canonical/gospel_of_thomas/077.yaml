  to: Lift up the stone, and you will find me there.
  rationale: 'Double mistranslation. First, the Coptic ⲉϩⲣⲁⲓ is a directional adverb meaning ''up'' or ''upwards'' (Crum 65b), pairing with ϥⲓ to mean ''lift up''; it does not mean ''under it''. Second, the verb ϩⲉ with the preposition ⲉ- (ⲧⲉⲧⲛⲁϩⲉ ⲉⲣⲟⲉⲓ) means ''find'' or ''light upon'' (Crum 654a), not ''see'' (which would be ⲛⲁⲩ). | Azure: The proposed change is clearly closer to the Coptic. In Thomas 77 the phrase with ϥⲓ + ⲉϩⲣⲁⲓ means ''lift up''/''raise'' the stone; ⲉϩⲣⲁⲓ is the directional adverb ''up, upward,'' not ''under it,'' so the cur'
