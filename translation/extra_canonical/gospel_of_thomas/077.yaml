translation:
  text: Jesus said, "I am the light—the one that is over them all. I am the All. It is from me that the All came forth, and to me that the All reached. Split a piece of wood; I am there. Lift up the stone, and you will find me there."
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:17:55Z'
  footnotes:
  - marker: '1'
    text: The Coptic text uses the same verb (ⲡⲱϩ, pōh) for both 'reached' (attained to) and 'split' (cleave), creating a deliberate wordplay that cannot be replicated in English.
    reason: register_note
  - marker: '2'
    text: 'In the Greek fragments of Thomas (P.Oxy. 1), the sayings about the wood and the stone are attached to the end of Saying 30, and their order is reversed: ''Lift the stone, and there you will find me; split the wood, and I am there.'''
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲧⲏⲣϥ
  chosen: the All
  rationale: Translates the substantive 'the entirety/all', a key philosophical and theological term in Thomas.
  lexicon: Crum 430a
  alternatives:
  - the entirety
  - everything
- source_word: ⲡⲱϩ
  chosen: reached / Split
  rationale: 'The Coptic uses the same verb (ⲡⲱϩ) twice with two different meanings: ''to reach/attain'' (with the preposition ϣⲁ-) and ''to split/cleave'' (a piece of wood). This creates a deliberate, untranslatable wordplay.'
  lexicon: Crum 282a, 282b
  alternatives:
  - attained / cleave
- source_word: ⲛ̄ⲧⲁ-
  chosen: It is from me... and to me...
  rationale: The Second Perfect construction emphasizes the prepositional phrases 'from me' (ⲉⲃⲟⲗ ⲛ̄ϩⲏⲧ) and 'to me' (ϣⲁⲣⲟⲉⲓ).
  lexicon: Layton §406
  alternatives:
  - The All came forth from me... and the All reached me
theological_decisions:
- issue: Translation of ⲡⲧⲏⲣϥ
  chosen_reading: the All
  rationale: Capitalized to reflect its use as a cosmic/philosophical absolute, central to Thomasine panentheism.
  alternatives_noted:
  - the entirety
  - everything
drafter_notes: The translation preserves the emphatic Second Perfects ('It is from me... and to me...') and capitalizes 'the All' to reflect the substantive use of ⲡⲧⲏⲣϥ. The Coptic wordplay on ⲡⲱϩ is noted, as is the structural divergence from the Greek Oxyrhynchus papyri.
