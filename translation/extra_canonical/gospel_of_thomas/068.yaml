  english_text: Jesus said, “Blessed are you when they hate you and persecute you; and they will not find a place in the place where they persecuted you.”
  previous_translation_block:
    text: Jesus said, “Blessed are you when they hate you and persecute you; and they will not find a place in the place where they persecuted you.”
    philosophy: optimal-equivalence
    footnotes:
    - marker: a
      text: 'Both words rendered “place” are different in Coptic: ⲉⲧⲟⲡⲟⲥ (Greek ‘topos’) and ⲙⲁ (native Coptic). The repetition is likely deliberate and is kept in English.'
      reason: cultural_note
    - marker: b
      text: The final phrase ϩⲣⲁⲓ ϩⲛⲛⲧⲟϥ can be read as purposive (“to enter into it”) with ‘they’ as the implied subject. Less likely, it could be taken as an imperative (“enter into it!”), but a 2pl imperative marker is absent.
      reason: alternative_reading
    - marker: c
      text: ⲣ̄ⲇⲓⲱⲕⲉ is a Greek loan (diōkō) that can mean “pursue” in general; given the beatitude context, “persecute” is more precise here.
      reason: lexical_alternative
    - marker: d
      text: The codex line has ⲙⲉⲥ (vs. normalized ⲙⲟⲥ) for “hate,” a common e/o alternation in this manuscript’s orthography.
      reason: dialect_note
    - marker: e
      text: Or 'Jesus said, “Blessed are you when they hate you and persecute you; and they will not find a place in the place where they persecuted you, to enter into it.”'.
      reason: previous_rendering
