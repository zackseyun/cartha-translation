translation:
  text: Jesus said, "Blessed are you when they hate you and persecute you; and they will find no place in the place where they persecuted you."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:37:08Z'
  footnotes:
  - marker: they will find no place
    text: 'Coptic frequently uses the third-person plural to form an impersonal passive (''no place will be found''), and many translations render it that way here. However, the repeated active use of ''they'' for the persecutors throughout this saying suggests the subject remains the same: the persecutors themselves will find no place in the very location of their persecution.'
    reason: textual_variant
  - marker: place in the place
    text: 'The Coptic text uses two different words for ''place'' here: the Greek loanword ⲧⲟⲡⲟⲥ (topos) for the place they will not find, and the native Coptic ⲙⲁ (ma) for the location of the persecution.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ϩⲙⲙⲁⲕⲁⲣⲓⲟⲥ
  chosen: Blessed
  rationale: Plural indefinite article with the Greek loanword μακάριος (makarios). Rendered as 'Blessed' to match the traditional beatitude formula.
  lexicon: BDAG
- source_word: ⲙⲉⲥⲧⲉ
  chosen: hate
  rationale: Standard meaning of ⲙⲟⲥⲧⲉ / ⲙⲉⲥⲧⲉ-.
  lexicon: Crum 186a
- source_word: ⲇⲓⲱⲕⲉ
  chosen: persecute
  rationale: Greek loanword διώκω (diōkō), standard for 'persecute'.
  lexicon: BDAG
- source_word: ϩⲉ ⲉ-
  chosen: find
  rationale: The verb ϩⲉ with the preposition ⲉ- means 'to find, light upon, obtain'.
  lexicon: Crum 651a
- source_word: ⲧⲟⲡⲟⲥ
  chosen: place
  rationale: Greek loanword τόπος (topos). Kept as 'place', though it carries significant theological weight in Thomas as a site of rest or spiritual standing.
  lexicon: BDAG
- source_word: ⲙⲁ
  chosen: place
  rationale: Native Coptic word for 'place'.
  lexicon: Crum 152a
theological_decisions:
- issue: Active vs. passive rendering of the third-person plural (ⲥⲉⲛⲁϩⲉ ⲁⲛ).
  chosen_reading: Active ('they will find no place')
  rationale: 'While Coptic often uses the third-person plural impersonally to mean ''one will not find'' or ''it will not be found'', the immediate context uses ''they'' three other times to refer specifically to the persecutors (when they hate you, and they persecute you, where they persecuted you). Translating it actively preserves the sharp, riddling reversal intended by the author: the persecutors will have no place.'
  alternatives_noted:
  - and no place will be found
drafter_notes: This saying blends elements of the beatitudes found in Luke 6:22 ('hate') and Matthew 5:11 ('persecute'), but concludes with a uniquely Thomasine riddle about 'place' (topos). The translation preserves the active voice of the third-person plural to maintain the continuity of the pronoun 'they' (the persecutors), highlighting the paradoxical reversal where the persecutors lose their 'place'.
