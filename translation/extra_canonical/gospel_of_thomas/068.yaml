translation:
  text: Jesus said, “Blessed are you when they hate you and persecute you; and they will not find a place in the place where they persecuted you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Both words rendered “place” are different in Coptic: ⲉⲧⲟⲡⲟⲥ (Greek ‘topos’) and ⲙⲁ (native Coptic). The repetition is likely deliberate and is kept in English.'
    reason: cultural_note
  - marker: b
    text: The final phrase ϩⲣⲁⲓ ϩⲛⲛⲧⲟϥ can be read as purposive (“to enter into it”) with ‘they’ as the implied subject. Less likely, it could be taken as an imperative (“enter into it!”), but a 2pl imperative marker is absent.
    reason: alternative_reading
  - marker: c
    text: ⲣ̄ⲇⲓⲱⲕⲉ is a Greek loan (diōkō) that can mean “pursue” in general; given the beatitude context, “persecute” is more precise here.
    reason: lexical_alternative
  - marker: d
    text: The codex line has ⲙⲉⲥ (vs. normalized ⲙⲟⲥ) for “hate,” a common e/o alternation in this manuscript’s orthography.
    reason: dialect_note
  - marker: e
    text: Or 'Jesus said, “Blessed are you when they hate you and persecute you; and they will not find a place in the place where they persecuted you, to enter into it.”'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲟⲩⲙⲁⲕⲁⲣⲓⲟⲥ
  chosen: blessed
  alternatives:
  - fortunate
  - happy
  lexicon: Crum s.v. ⲙⲁⲕⲁⲣⲓⲟⲥ; Greek loan (makarios)
  rationale: Maintains beatitude register while preserving Thomas’s terse diction.
- source_word: ϩⲟⲧⲁⲛ
  chosen: when
  alternatives:
  - whenever
  lexicon: Layton, Coptic Grammar (Greek loan hotan)
  rationale: Temporal marker introducing the condition; “whenever” possible but “when” keeps the beatitude cadence compact.
- source_word: ⲙⲟⲥ
  chosen: hate
  alternatives:
  - detest
  - loathe
  lexicon: Crum s.v. ⲙⲟⲥ
  rationale: Plain, strong verb matches Thomas’s sharp diction.
- source_word: ⲣ̄ⲇⲓⲱⲕⲉ
  chosen: persecute
  alternatives:
  - pursue
  - harry
  lexicon: Crum s.v. ⲇⲓⲱⲕⲉ (Greek diōkō)
  rationale: Context clearly concerns persecution, not mere pursuit.
- source_word: ⲛⲁϩⲉ
  chosen: find
  alternatives:
  - discover
  - locate
  lexicon: Crum s.v. ⲛⲁϩⲉ
  rationale: Common verb of discovery; fits with object ⲉⲧⲟⲡⲟⲥ.
- source_word: ⲉⲧⲟⲡⲟⲥ
  chosen: a place
  alternatives:
  - space
  - room
  - standing
  lexicon: Crum s.v. ⲧⲟⲡⲟⲥ (Greek topos)
  rationale: Rendered as “place” to mirror the intentional repetition with ⲡⲙⲁ.
- source_word: ⲡⲙⲁ
  chosen: the place
  alternatives:
  - the spot
  - the locale
  lexicon: Crum s.v. ⲙⲁ
  rationale: Native Coptic term for ‘place’; retaining as “the place” preserves the double ‘place’ effect.
- source_word: ⲉⲧⲉⲣⲉ
  chosen: where
  alternatives:
  - in which
  lexicon: Layton, relative clause marker
  rationale: Introduces the relative clause modifying ⲡⲙⲁ.
- source_word: ϩⲣⲁⲓ ϩⲛⲛⲧⲟϥ
  chosen: to enter into it
  alternatives:
  - to go into it
  - to come inside it
  lexicon: Crum s.v. ϩⲣⲁⲓ ‘enter/go in’; Crum s.v. ⲛⲧⲟ ‘inside’
  rationale: Taken as a purposive/infinitival nuance dependent on “find a place,” preserving the concrete imagery of entry.
- source_word: ⲛⲧⲱⲧⲛ (independent pronoun)
  chosen: you (plural)
  alternatives: []
  lexicon: Layton, pronominal system
  rationale: Marks the addressed group; retained in English by plural sense contextualized in the verb forms.
textual_note: No lacunae or conjectural restorations are indicated by Dilley for this saying. The codex shows the Lycopolitan-style segmentation ⲉⲩϣⲁⲛ… with 3pl subject; Dilley normalizes as ⲉⲣϣⲁⲛ ⲛⲧⲟⲟⲩ ⲙⲟⲥ ⲧⲉⲛⲧⲱⲧⲛ (“when they hate you”). Orthographic alternation ⲙⲉⲥ/ⲙⲟⲥ reflects e/o vowel variation; lemma is ⲙⲟⲥ ‘hate’. The phrase ⲉⲧⲟⲡⲟⲥ ϩⲛⲡⲙⲁ (“a place in the place”) combines a Greek loan (topos) with native ⲙⲁ; the doubling is retained as likely intentional. The final ϩⲣⲁⲓ ϩⲛⲛⲧⲟϥ is syntactically terse; read here as purposive (“to enter into it”) dependent on ⲛⲁϩⲉ ‘find,’ with the implicit subject carried over from “they.”
