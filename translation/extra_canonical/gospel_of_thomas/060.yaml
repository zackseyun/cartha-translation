translation:
  text: They saw a Samaritan carrying a lamb as he was going into Judea. He said to his disciples, "What is the lamb-bearer going to do?" They said to him, "So that he may kill it and eat it." He said to them, "As long as it is alive, he will not eat it; but when he kills it and it becomes a corpse." They said, "Otherwise he will not be able to do it." He said to them, "You, too—seek for yourselves a place of rest, lest you become a corpse and they eat you."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'ⲡⲏ can mean ‘where?’ or ‘what?’. Because the text already states the man is going into Judea, the question is best understood as about purpose/action: ‘What is the lamb‑bearer going to do?’'
    reason: lexical_alternative
  - marker: b
    text: ⲡⲧⲱⲙⲁ is used both of the lamb and of people. This draft keeps ‘corpse’ in both places to preserve the repeated lexeme; ‘carcass’ is a contextual alternative for the lamb.
    reason: lexical_alternative
  - marker: c
    text: Coptic uses an indefinite third‑plural in ‘they eat you’; some English versions passivize (‘be eaten’). The active was retained to keep the saying’s sharpness and ambiguity about the agents.
    reason: dialect_note
  - marker: d
    text: Compare Thomas 56 (‘whoever has come to know the world has found a corpse…’) for the recurring motif of the corpse and worthiness.
    reason: cross_reference
  - marker: e
    text: Or 'He will kill it and eat it.'.
    reason: previous_rendering
  - marker: f
    text: Or 'he is not able to do it'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲁⲛⲧⲟⲟⲩⲛⲁⲩ
  chosen: they saw
  alternatives:
  - they beheld
  lexicon: Crum; Layton
  rationale: Narrative aorist introducing a scene; simple past fits Thomas’s terse style.
- source_word: ⲥⲁⲙⲁⲣⲉⲓⲧⲏⲥ
  chosen: Samaritan
  lexicon: Crum
  rationale: Standard ethnicon; no need to paraphrase (e.g., inhabitant of Samaria).
- source_word: ϥϥⲓ
  chosen: carrying
  alternatives:
  - bearing
  - leading
  lexicon: Crum
  rationale: Basic sense is to carry/bear an object; with ⲟⲩϩⲓⲉⲓⲃ it denotes carrying a lamb.
- source_word: ⲟⲩϩⲓⲉⲓⲃ
  chosen: a lamb
  alternatives:
  - a sheep (young)
  lexicon: Crum
  rationale: ⲕⲓⲉⲓⲃ/ⲱϩⲓⲃ fields designate lamb; context suggests a small sacrificial animal.
- source_word: ⲃⲱⲕ ⲉϩⲟⲩⲛ
  chosen: going into
  alternatives:
  - entering
  lexicon: Crum; Lambdin
  rationale: Directional motion toward; into Judea.
- source_word: ⲡⲏ
  chosen: what
  alternatives:
  - where
  lexicon: Crum; Layton
  rationale: ⲡⲏ can mean ‘where?’ or ‘what?’; context already states his destination, so the interrogative is about purpose/action, not location.
- source_word: ⲡⲕⲱⲧⲉ ⲛⲡϩⲓⲉⲓⲃ
  chosen: the lamb-bearer
  alternatives:
  - the one carrying the lamb
  lexicon: Crum
  rationale: ⲕⲱⲧⲉ ‘bearer’; rendering preserves the compact, slightly odd noun phrase.
- source_word: ⲙⲟⲩⲟⲩⲧ
  chosen: kill
  alternatives:
  - slaughter
  lexicon: Crum
  rationale: Neutral verb for putting to death; ‘slaughter’ is possible given an animal, but ‘kill’ matches later human warning.
- source_word: ⲟⲩⲱⲙ
  chosen: eat
  lexicon: Crum
  rationale: Plain, literal verb; repeated for rhetorical force.
- source_word: ϩⲱⲥ ⲉⲣⲉ…ⲱⲛϩ
  chosen: as long as it is alive
  alternatives:
  - while it is alive
  lexicon: Layton; Lambdin
  rationale: Temporal clause; preserves duration nuance of ϩⲱⲥ + present participial sense.
- source_word: ⲉⲣϣⲁⲛ_
  chosen: when
  alternatives:
  - once
  - whenever
  lexicon: Layton
  rationale: Future eventual/temporal marker fits the contrastive clause.
- source_word: ϣⲱⲡⲉ
  chosen: become
  alternatives:
  - come to be
  lexicon: Crum
  rationale: Stative/resultative ‘to become’.
- source_word: ⲡⲧⲱⲙⲁ
  chosen: corpse
  alternatives:
  - carcass
  lexicon: Crum (loanword from Gk. πτῶμα)
  rationale: Same lexeme used for the lamb and for the disciples; retaining ‘corpse’ both times keeps the rhetorical sting and lexical identity.
- source_word: ⲡⲕⲉⲥⲙⲟⲧ
  chosen: otherwise
  alternatives:
  - in any other way
  lexicon: Crum
  rationale: Concessive/alternative connector.
- source_word: ϣⲉⲓⲣⲉ ⲛⲧⲟⲥ
  chosen: be able to do it
  alternatives:
  - do it
  - accomplish it
  lexicon: Crum; Layton
  rationale: Idiomatic use of ‘do/make’ with pronoun object; ‘be able to do it’ captures sense in context.
- source_word: ϣⲓⲛⲉ
  chosen: seek
  alternatives:
  - search for
  lexicon: Crum
  rationale: Imperative addressed to disciples; common Thomasine verb.
- source_word: ⲟⲩⲧⲟⲡⲟⲥ
  chosen: a place
  lexicon: Crum
  rationale: Greek loanword; indefinite article fits ⲟⲩ- form.
- source_word: ⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  chosen: rest
  alternatives:
  - repose
  lexicon: Crum
  rationale: Greek loanword; ‘rest’ is the standard religious term in Thomas (thematic).
- source_word: ⲕⲁⲁⲥ
  chosen: lest
  alternatives:
  - so that not
  lexicon: Crum
  rationale: Purpose/negative conjunction; ‘lest’ preserves terseness and tone.
- source_word: ⲟⲩⲱⲙ ⲛⲧⲱⲧⲛ
  chosen: they eat you
  alternatives:
  - be eaten (by some)
  lexicon: Layton
  rationale: Coptic uses an indefinite 3rd plural subject; retaining the active ‘they eat you’ preserves strangeness and implied, unnamed agents.
textual_note: No lacunae or conjectural restorations are reported by Dilley for this saying. The page shows a bracketed initial ⟨ⲁⲩⲛⲁⲩ⟩ in the diplomatic line, normalized to Sahidic ⲁⲛⲧⲟⲟⲩⲛⲁⲩ (‘they saw’). The text exhibits typical Sahidic with Lycopolitan-flavored orthography and repeated clitic pronouns (e.g., ⲉⲣϣⲁⲛ_ⲛⲧⲟϥⲙⲟⲩⲟⲩⲧⲛⲧⲟϥ; ⲛⲧⲟϥϣⲱⲡⲉ), which we have rendered without smoothing their emphatic feel. Greek loanwords ⲧⲟⲡⲟⲥ, ⲁⲛⲁⲡⲁⲩⲥⲓⲥ, and ⲡⲧⲱⲙⲁ are intact. The interrogative ⲡⲏ is contextually taken as ‘what?’ rather than ‘where?’, since the destination (Judea) has already been given.
