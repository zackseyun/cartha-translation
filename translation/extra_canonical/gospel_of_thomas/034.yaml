translation:
  text: Jesus said, "If a blind person leads a blind person, both of them fall down into a pit."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:33:21Z'
  footnotes:
  - marker: '1'
    text: Unlike the Synoptic parallels (Matt 15:14, Luke 6:39) which use the future tense ('will fall'), Thomas uses the Coptic aorist (ϣⲁⲩϩⲉ), expressing a general or habitual truth ('they fall').
    reason: textual_variant
lexical_decisions:
- source_word: ⲃⲗⲗⲉ
  chosen: blind person
  rationale: Standard term for a blind individual.
  lexicon: Crum 38b
  alternatives:
  - blind man
- source_word: ⲥⲱⲕ ϩⲏⲧ-
  chosen: leads
  rationale: The verb ⲥⲱⲕ ('draw, pull') combined with the preposition ϩⲏⲧ- ('before') forms the idiom 'to lead' or 'to guide'.
  lexicon: Crum 326a
  alternatives:
  - guides
- source_word: ϣⲁⲩϩⲉ
  chosen: fall
  rationale: The aorist prefix ϣⲁ- denotes a general truth or habitual action. Translating as a present tense ('fall') accurately reflects this, distinguishing it from the future tense ('will fall') found in the Synoptic parallels.
  lexicon: Crum 653b
  alternatives:
  - usually fall
- source_word: ⲙⲡⲉⲥⲛⲁⲩ
  chosen: both of them
  rationale: Literally 'the two'. 'Both of them' is the standard idiomatic English equivalent.
  lexicon: Crum 346a
  alternatives:
  - the two of them
- source_word: ϩⲓⲉⲓⲧ
  chosen: pit
  rationale: Standard term for a pit, well, or ditch.
  lexicon: Crum 736b
  alternatives:
  - ditch
drafter_notes: The saying is a well-known proverb with close parallels in Matthew 15:14 and Luke 6:39. The translation preserves the Coptic aorist tense, which presents the saying as a timeless wisdom statement rather than a future prediction.
