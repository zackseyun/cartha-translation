translation:
  text: 'Jesus said, A person is not strong enough to mount two horses, nor to draw two bows. And a slave cannot serve two masters: he will honor the one and insult the other. No person drinks old wine and immediately desires to drink new wine. And they do not pour new wine into old wineskins, lest they burst; nor do they pour old wine into a new wineskin, lest it spoil it. They do not sew an old patch onto a new garment, because a tear will result.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Single one’ renders ⲥⲱⲏⲣⲡ, an idiom in Thomas for undivided, integrated personhood. The strangeness is preserved.
    reason: cultural_note
  - marker: b
    text: ⲃⲣⲣⲉ can mean ‘new/young’ or ‘child’; here it modifies being ‘single’ (ⲥⲱⲏⲣⲡ). Reading ‘as new’ is possible, but Thomas elsewhere links becoming a ‘single one’ with being ‘like a little child’.
    reason: lexical_alternative
  - marker: c
    text: ⲁⲥⲕⲟⲥ here is the verb ‘to sew’ (Crum s.v. ⲕⲟⲥ), not the Greek noun ἀσκός ‘wineskin’. The context is mending garments.
    reason: dialect_note
  - marker: d
    text: Or 'Let a person be a single one, and let their mind desire to be single like a little child. And no one sews a new patch onto an old garment, because it will make a tear; nor does one sew an old patch onto a new garment, lest it tear it, and a split will happen in the new garment.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲙⲛϭⲟⲙ ⲛⲧⲉⲟⲩⲣⲱⲙⲉ
  chosen: A person is not strong enough / cannot
  alternatives:
  - powerless is a person to
  lexicon: Crum s.v. ϭⲟⲙ; Lambdin §21 (ⲙⲛ- + noun expressing lack)
  rationale: ⲙⲛϭⲟⲙ ‘without strength’ functions idiomatically as inability; rendering with ‘cannot’ conveys sense while preserving the strength metaphor.
- source_word: ⲧⲉⲗⲟ ⲉϩⲧⲟ
  chosen: mount
  alternatives:
  - sit upon
  - ride
  lexicon: Crum s.v. ⲧⲁⲗⲟ/ⲧⲉⲗⲟ ‘to sit, mount’ (attested with ⲉϩⲧⲟ); Lambdin §124 (ⲉϩⲧⲟ as locative ‘on’)
  rationale: The construction with ⲉϩⲧⲟ suggests physical placing on top; with horses the idiomatic English is ‘mount’.
- source_word: ⲥⲛⲁⲩ
  chosen: two
  lexicon: Lambdin §5; Crum s.v. ⲥⲛⲁⲩ
  rationale: Numeral for ‘two’.
- source_word: ϫⲱⲗⲕ
  chosen: draw
  alternatives:
  - pull
  lexicon: Crum s.v. ⲱⲗⲕ ‘draw, pull’ (cf. Gk ἕλκειν)
  rationale: With ⲡⲓⲧⲉ ‘bow’, the natural collocation is ‘draw a bow’.
- source_word: ⲡⲓⲧⲉ
  chosen: bow
  alternatives:
  - bowstring (rejected)
  lexicon: Crum s.v. ⲡⲓⲧⲉ
  rationale: Lexically ‘bow’ (weapon). The context of drawing supports this.
- source_word: ⲟⲩϩⲙϩⲁⲗ
  chosen: slave
  alternatives:
  - servant
  lexicon: Crum s.v. ϩⲙϩⲁⲗ
  rationale: Term denotes a bondservant/slave; ‘slave’ keeps the social force.
- source_word: ϣⲙϣⲉ ⲟⲉⲓⲥ (ϫⲟⲉⲓⲥ)
  chosen: serve a master
  alternatives:
  - be a slave to a master
  lexicon: Crum s.v. ϣⲙϣⲉ ‘serve’; Crum s.v. ϫⲟⲉⲓⲥ ‘lord, master’
  rationale: Set phrase ‘serve a master’ matches idiom.
- source_word: ⲣⲧⲓⲙⲁ
  chosen: honor
  alternatives:
  - value
  - respect
  lexicon: Greek loan (τιμᾶν) in Coptic usage
  rationale: Maintains the evaluative contrast with ⲣϩⲩⲃⲣⲓⲍⲉ.
- source_word: ⲣϩⲩⲃⲣⲓⲍⲉ
  chosen: insult
  alternatives:
  - treat shamefully
  - abuse
  lexicon: Greek loan (ὑβρίζειν) in Coptic usage
  rationale: Antithetical to ‘honor’; ‘insult’ is concise and strong.
- source_word: ⲥⲱⲏⲣⲡ
  chosen: be a single one
  alternatives:
  - be solitary
  - be one
  lexicon: Crum s.v. ⲥⲱⲏⲣⲡ; Layton NHS notes on Thomasine ‘single one’
  rationale: Thomas’s technical idiom; retained as-strange to preserve rhetorical texture.
- source_word: ⲡⲟⲩⲛⲟⲩ (νοῦς)
  chosen: mind
  alternatives:
  - inner self
  - heart
  lexicon: Greek loan νοῦς; Crum s.v. ⲛⲟⲩⲥ
  rationale: ‘Mind’ matches the Greek loan and Thomas’s ascetical diction.
- source_word: ⲃⲣⲣⲉ (after ⲥⲱⲏⲣⲡ)
  chosen: little child
  alternatives:
  - new
  lexicon: Crum s.v. ⲃⲣⲣⲉ ‘young, new; child’
  rationale: Within Thomas, ‘be as a little child’ is a recurrent motif; here it modifiers ‘single one’ naturally. ‘New’ is possible but less contextually apt.
- source_word: ⲛⲟⲩϫⲏⲣⲡ
  chosen: patch (piece [of cloth])
  alternatives:
  - piece
  lexicon: Crum s.v. ϫⲏⲣⲡ ‘piece, bit’ (by context, a cloth patch)
  rationale: With sewing and garment context, ‘patch’ communicates function.
- source_word: ⲕⲟⲥ (ⲉⲁⲥⲕⲟⲥ)
  chosen: sew (it)
  alternatives:
  - stitch
  lexicon: Crum s.v. ⲕⲟⲥ ‘to sew’
  rationale: The prefixed ⲁⲥ‑ and object ⲛⲁⲥ mark ‘to sew it onto it (the garment)’.
- source_word: ⲛⲧⲟⲟⲩ (as adjective)
  chosen: old
  alternatives:
  - worn
  lexicon: Crum s.v. ⲛⲧⲟⲟⲩ ‘old’
  rationale: Standard adjective for age/antiquity (as in ‘old garment’).
- source_word: ϫⲱⲗϭ (in ⲟⲩϫⲱⲗϭ ⲧⲟⲉⲓⲥ)
  chosen: rip/tear (a garment)
  alternatives:
  - rend
  lexicon: Crum s.v. ϫⲱⲗϭ ‘split, rend’
  rationale: With ⲧⲟⲉⲓⲥ ‘garment’, ‘rip/tear’ is idiomatic.
- source_word: ⲧⲁⲕ (in ⲧⲁⲕⲟⲛⲧⲟϥ)
  chosen: tear it
  alternatives:
  - rend it
  lexicon: Crum s.v. ⲧⲁⲕ ‘to tear’
  rationale: Explains the causal/precaution clause ‘lest it tear it’.
- source_word: ϣⲁⲓ
  chosen: split/tear (result)
  alternatives:
  - rent
  lexicon: Crum s.v. ϣⲁⲓ ‘tear, crack’
  rationale: Result noun for damage to garment.
textual_note: 'Dialect: Sahidic with Lycopolitan coloring. Note the form ⲧⲉⲗⲟ ⲉϩⲧⲟ, a mounting/sitting construction with ⲉϩⲧⲟ ‘on’; the vowel quality (ⲉ) may reflect dialectal variation for a verb otherwise attested with ⲁ. Prohibitives use the jussive ⲙⲉⲣⲉ‑ ‘let no one…’. Orthography: the manuscript shows ⲁϣⲧⲏ(ⲛ) (NHAM02.41 lb 22), normalized by Dilley to ⲉϣⲧⲏⲛ; this is a minor vocalic fluctuation, not a lacuna. No explicit lacunae or conjectural restorations are marked in this saying. The sequence with ⲛⲟⲩϫⲏⲣⲡ ‘patch’ and ⲁⲥⲕⲟⲥ ‘to sew’ occurs twice, balancing ‘new’ (ⲃⲣⲣⲉ) and ‘old’ (ⲛⲧⲟⲟⲩ) garments; pronoun ⲛⲁⲥ refers back to ⲧⲟⲉⲓⲥ (garment, fem.).'
