  from: Let a person be a single one, and let their mind desire to be single like a little child. And no one sews a new patch onto an old garment, because it will make a tear; nor does one sew an old patch onto a new garment, lest it tear it, and a split will happen in the new garment.
  to: No person drinks old wine and immediately desires to drink new wine. And they do not pour new wine into old wineskins, lest they burst; nor do they pour old wine into a new wineskin, lest it spoil it. They do not sew an old patch onto a new garment, because a tear will result.
  rationale: 'The draft completely misparses the Coptic of the second half of the saying, hallucinating esoteric Thomasine motifs. ⲥⲱⲏⲣⲡ is not an idiom for ''single one''; it is ⲥⲱ ⲏⲣⲡ ''drink wine''. ⲛⲧⲉⲩⲛⲟⲩ is not ''their mind'' (ⲛⲟⲩⲥ) but the adverb ''immediately''. ⲛⲟⲩϫⲏⲣⲡ is not ''patch'' but ⲛⲟⲩϫⲉ ⲏⲣⲡ ''pour wine''. ⲁⲥⲕⲟⲥ is the Greek loanword ἀσκός ''wineskin'', not the verb ⲕⲟⲥ ''to sew''. The text actually contains the standard Synoptic sayings about old/new wine, wineskins, and patches. | Azure: The proposed rewrite should be applied because the rationale identifies concrete Coptic misreadings in the current English. In Thomas 47 the relevant forms are standard terms from the old/new wine clu'
