    philosophy: optimal-equivalence
    footnotes:
    - marker: a
      text: Coptic literally reads ‘speak a word’; hence ‘blaspheme’ is an interpretive rendering often chosen in English.
      reason: lexical_alternative
    - marker: b
      text: The Coptic text names ‘the Son’ (ⲡϣⲏⲣⲉ), not ‘the Son of Man’ as in the Synoptic parallels.
      reason: cross_reference
    - marker: c
      text: MS writes ϩⲙ̄ with ‘earth’ and ϩⲛ̄ with ‘heaven,’ yielding ‘on the earth … in heaven’; Dilley normalizes both to ϩⲛ ‘in.’
      reason: dialect_note
    - marker: d
      text: Coptic uses an indefinite third person plural ‘they will forgive,’ an impersonal construction rendered as the passive ‘it will be forgiven.’
      reason: dialect_note
    - marker: e
      text: Or 'Whoever speaks a word against the Father, it will be forgiven him; and whoever speaks a word against the Son, it will be forgiven him; but whoever speaks a word against the Holy Spirit'.
