  from: Whoever speaks a word against the Father, it will be forgiven him; and whoever speaks a word against the Son, it will be forgiven him; but whoever speaks a word against the Holy Spirit
  to: Whoever blasphemes against the Father, it will be forgiven him; and whoever blasphemes against the Son, it will be forgiven him; but whoever blasphemes against the Holy Spirit
  rationale: 'The Coptic verb here is ϫⲓ-ⲟⲩⲁ (normalized from ⲁϫⲉⲟⲩⲁ), which is the standard Coptic idiom for ''to blaspheme'' (Crum 470a). The word ⲟⲩⲁ here is the noun ''blasphemy/curse'', not the numeral ''one''. The translator''s note claiming ''the Coptic does not use a specific blasphemy verb here'' is incorrect; ϫⲓ-ⲟⲩⲁ is exactly that verb. Translating it as ''speaks a word'' rests on a false etymology. | Azure: The proposed change is supported by the Coptic idiom. In Thomas 44 the expression is not a generic ''speak a word'' construction but the established phrase ϫⲓ-/ϫⲉ- + ⲟⲩⲁ, which Crum glosses in the sense'
