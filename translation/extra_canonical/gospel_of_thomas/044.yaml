translation:
  text: Jesus said, "Whoever blasphemes against the Father, it will be forgiven him; and whoever blasphemes against the Son, it will be forgiven him; but whoever blasphemes against the Holy Spirit, it will not be forgiven him—neither on earth nor in heaven."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:34:07Z'
  footnotes:
  - marker: '1'
    text: The Coptic prepositions alternate between ⲁ- (against the Father, against the Spirit) and ⲉ- (against the Son). This reflects the Lycopolitan dialect's tendency to merge the sounds of ⲁ and ⲉ, rather than a shift in meaning.
    reason: dialect_note
  - marker: '2'
    text: The Coptic uses the active third-person plural ('they will forgive him') as an impersonal construction, equivalent to the English passive 'it will be forgiven him'.
    reason: register_note
  - marker: '3'
    text: Unlike the Synoptic parallels (Mark 3:28–29, Matt 12:31–32, Luke 12:10), Thomas employs a full tripartite formula (Father, Son, Holy Spirit). Furthermore, Thomas replaces Matthew's temporal framework ('neither in this age nor in the age to come') with a spatial one ('neither on earth nor in heaven'), reflecting Thomas's characteristic spatialized eschatology.
    reason: theological_note
lexical_decisions:
- source_word: ϫⲉⲟⲩⲁ
  chosen: blasphemes
  rationale: A variant spelling of ϫⲓⲟⲩⲁ (to blaspheme, curse). The relative perfect prefix (ⲡ-ⲉⲧ-ⲁ-) is used here for a general condition, best rendered in English as a present tense 'whoever blasphemes'.
  lexicon: Crum 794a
  alternatives:
  - has blasphemed
  - curses
- source_word: ⲕⲱ ⲉⲃⲟⲗ
  chosen: forgiven
  rationale: The verb ⲕⲱ ⲉⲃⲟⲗ means 'to forgive'. The Coptic uses the active third-person plural (ⲥⲉⲛⲁⲕⲱ, 'they will forgive') as an impersonal passive, which is standardly translated into English as 'it will be forgiven'.
  lexicon: Crum 96a
  alternatives:
  - they will forgive
  - pardoned
- source_word: ⲡⲕⲁϩ
  chosen: earth
  rationale: Standard term for earth or ground.
  lexicon: Crum 131a
  alternatives:
  - the earth
  - the ground
theological_decisions:
- issue: Handling of the tripartite formula and spatial eschatology
  chosen_reading: Preserved exactly as 'Father... Son... Holy Spirit' and 'neither on earth nor in heaven'.
  rationale: Thomas's version of the unforgivable sin saying diverges significantly from the Synoptics by introducing a clear Trinitarian-style triad and by shifting the apocalyptic temporal framework (this age/age to come) into a spatial one (earth/heaven). These distinct Thomasine features must not be harmonized to Matthew or Mark.
  alternatives_noted:
  - Harmonizing to 'this age or the age to come'
drafter_notes: The translation preserves the repetitive, tripartite structure of the Coptic. The impersonal third-person plural is rendered as a passive to match English idiom without losing the meaning. The spatial contrast (earth/heaven) is kept exactly as written, highlighting its divergence from the canonical parallels.
