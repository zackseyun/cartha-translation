translation:
  text: 'Mary said to Jesus, "Whom are your disciples like?"


    He said, "They are like little children who have settled in a field that is not theirs. When the owners of the field come, they will say, ''Give the field back to us.'' They will strip naked before them, so as to leave it to them and give their field back to them.


    "Because of this I say: if the master of the house knows that the thief is coming, he will keep watch before he comes and will not allow him to dig through into the house of his kingdom to carry off his goods.


    "But you—be alert against the world; gird your loins with great power, so that robbers may not find a way to come to you, because the difficulty you expect will be found.


    "Let there be among you an understanding person. When the fruit ripened, he came quickly with his sickle in his hand; he harvested it. Whoever has ears to hear, let him hear."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The comparison uses ϭⲟⲓⲗⲉ, literally ‘to settle/dwell,’ with ‘field’; the odd pairing is preserved to keep Thomas’s strangeness.
    reason: cultural_note
  - marker: b
    text: ⲕⲁⲕⲁϩⲏⲩ + ⲙⲧⲟ means ‘strip off (their) clothing.’ Some take this as yielding everything before the rightful owners; the gesture is likely symbolic of surrender.
    reason: cultural_note
  - marker: c
    text: 'Edition note: printed/segmented text reads ⲕⲁⲁⲥ (‘leave, permit’); the normalized lemma shows ⲕⲱⲛⲧⲟⲥ, likely erroneous in context. Reading ⲕⲁⲁⲥ yields coherent syntax: ‘so as to leave it to them and give [back] their field to them.’'
    reason: textual_variant
  - marker: d
    text: ‘Master of the house’ translates compound ⲡϫⲉⲥϩⲛⲏⲉⲓ (house + master), a Coptic equivalent to ‘householder.’
    reason: dialect_note
  - marker: e
    text: ‘Dig through into the house’ renders the idiom for housebreaking—piercing a wall to enter.
    reason: cultural_note
  - marker: f
    text: ‘Within’ (ⲉⲛⲧⲟⲥ, Greek loan) stands abruptly; the line likely contrasts outer vigilance with an inward coming. We keep the abruptness rather than smoothing.
    reason: dialect_note
  - marker: g
    text: Or 'In front of them they will strip off their clothing'.
    reason: previous_rendering
  - marker: h
    text: Or 'domain'.
    reason: previous_rendering
  - marker: i
    text: Or 'for there is one coming within.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲉⲓⲛⲉ
  chosen: be like
  alternatives:
