  lexicon: Crum; Layton
  rationale: Standard Coptic verb for resemblance; here in question/answer frame ('Whom are... like?').
- source_word: ϣⲏⲣⲉ ϣⲏⲙ
  chosen: little children
  alternatives:
  - small children
  - young children
  lexicon: Crum; Layton
  rationale: ϣⲏⲙ marks smallness; idiomatic English 'little children' preserves tone.
- source_word: ϭⲟⲓⲗⲉ
  chosen: settled
  alternatives:
  - dwelt
  - lived
  lexicon: Crum s.v. ϭⲟⲓⲗⲉ
  rationale: Conveys taking up residence; slightly odd with 'field'—Thomas’s image is purposefully strange; 'settled' preserves that strangeness.
- source_word: ⲥⲱϣⲉ
  chosen: field
  alternatives:
  - farm plot
  - acre
  lexicon: Crum; Layton
  rationale: Common term for cultivated land; 'field' is the most neutral rendering.
- source_word: ⲕⲱⲡⲉ (impv. pl.)
  chosen: give back
  alternatives:
  - hand over
  - return
  lexicon: Crum; Lambdin
  rationale: Context requires restitution; 'give back' makes the direction explicit.
- source_word: ⲕⲁⲕⲁϩⲏⲩ
  chosen: strip off their clothing
  alternatives:
  - strip naked
  - undress
  lexicon: Crum s.v. ⲕⲁⲕⲁϩⲏⲩ
  rationale: Reflexive sense of removing garments; 'strip off their clothing' is vivid yet precise.
- source_word: ⲙⲧⲟ
  chosen: clothing
  alternatives:
  - garment
  - tunic
  lexicon: Crum s.v. ⲙⲧⲟ
  rationale: Generic for a garment; here plural sense 'their clothing' by possessive context.
- source_word: ⲡϫⲉⲥϩⲛⲏⲉⲓ
  chosen: master of the house
  alternatives:
  - householder
  lexicon: Layton; Crum (compounds)
  rationale: Compound for house + master; 'master of the house' mirrors the idiom and keeps formal tone.
- source_word: ⲣⲉϥϫⲓⲟⲩⲉ
  chosen: thief
  alternatives:
  - stealer
  lexicon: Crum; Layton
  rationale: Agent-noun 'one-who-steals' = 'thief'.
- source_word: ⲧⲙⲕⲱⲛⲧⲟϥ ⲉϣⲟϫⲧ
  chosen: dig through into
  alternatives:
  - break into
  - burrow through into
  lexicon: Crum; Layton
  rationale: Stock idiom for housebreaking (digging through a wall). 'Dig through into' preserves concrete action.
- source_word: ⲙⲛⲧⲣⲣⲟ
  chosen: domain
  alternatives:
  - realm
  - estate
  lexicon: Crum s.v. ⲙⲛⲧⲣⲣⲟ
  rationale: Connotes an area of authority; 'domain' retains formal, slightly archaic tone.
- source_word: ⲥⲕⲉⲩⲟⲥ
  chosen: goods
  alternatives:
  - property
  - vessels
  lexicon: Loan from Gk skeuos
  rationale: Here general possessions; 'goods' is idiomatic and non-specific.
- source_word: ⲣⲟⲉⲓⲥ
  chosen: be alert
  alternatives:
  - keep watch
  - be vigilant
  lexicon: Crum s.v. ⲣⲟⲉⲓⲥ
  rationale: Imperatival nuance; 'be alert' keeps terse tone.
- source_word: ⲙⲟⲩⲣ
  chosen: gird
  alternatives:
  - belt
  - fasten about
  lexicon: Crum s.v. ⲙⲟⲩⲣ
  rationale: Biblical-idiom loan; 'gird' with 'loins' is transparent and formal.
- source_word: ⲧⲡⲉ
  chosen: loins
  alternatives:
  - waist
  lexicon: Crum s.v. ⲧⲡⲉ
  rationale: Physiological term; 'loins' preserves the idiom with 'gird'.
- source_word: ⲡⲗⲏⲥⲧⲏⲥ
  chosen: robbers
  alternatives:
  - bandits
  - thieves
  lexicon: Loan from Gk plēstēs
  rationale: Plural threat beyond a single 'thief'; 'robbers' distinguishes from earlier 'thief'.
- source_word: ⲉⲛⲧⲟⲥ
  chosen: within
  alternatives:
  - inside
  lexicon: Loan from Gk entos
  rationale: Abrupt, locative adverb retained; preserves Thomas’s inner/outer contrast.
- source_word: ⲛⲉⲡⲓⲥⲧⲏⲙⲱⲛ
  chosen: understanding
  alternatives:
  - discerning
  - intelligent
  lexicon: Loan from Gk epistēmōn
  rationale: Describes a person characterized by understanding/knowledge; 'understanding' keeps semantic core.
- source_word: ⲡⲱϩ
  chosen: ripened
  alternatives:
  - became ripe
  - was ready
  lexicon: Crum s.v. ⲡⲱϩ
  rationale: Agrarian maturation of fruit; 'ripened' is concise.
- source_word: ⲁⲥϩ
  chosen: sickle
  alternatives:
  - scythe
  lexicon: Crum s.v. ⲁⲥϩ
  rationale: Hand-held harvesting tool; 'sickle' fits the diminutive action implied.
- source_word: ϩⲁⲥ
  chosen: harvested
  alternatives:
  - reaped
  - cut
  lexicon: Crum s.v. ϩⲁⲥ
  rationale: Verb of reaping; 'harvested' is idiomatic in English.
textual_note: 'Dialect: Sahidic with Lycopolitan colorings (e.g., compounding and some prepositional usage). No material lacunae in this saying. Orthography: The phrase following the owners'' demand shows an edition-level discrepancy. Dilley’s printed/segmented text (NHAM02.37 lb 5–6) reads ⲉⲧⲣⲟⲩⲕⲁⲁⲥ ⲉⲃⲟⲗ ⲛⲁⲩ (''so that they might leave it to them''), which fits the sense; the normalized line shows ⲉⲧⲣⲉⲛⲧⲟⲟⲩⲕⲱⲛⲧⲟⲥ, which appears to be a lemmatization artifact or misreading. This draft follows the ⲕⲁⲁⲥ (''leave, let'') reading. The sequence ⲉⲃⲟⲗ … ⲉⲛⲧⲟⲥ in lb 15 is syntactically abrupt; we retain ''within'' (Greek loan entos) and read an inner/outer vigilance contrast, noting the asyndetic style typical of Thomas. No POxy Greek fragment overlaps Saying 21.'
