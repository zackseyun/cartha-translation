greek_overlap_decision:
  witness: POxy 654 (Sayings 1–7)
  agreement: minor_divergence
  chosen_basis: coptic
  rationale: POxy 654 aligns with the questions (fasting, prayer, alms, and what to observe when eating) and the two prohibitions (‘do not lie; what you hate, do not do’), and the final hidden/revealed aphorism. The middle clause in Greek seems to mention ‘truth … before heaven,’ whereas the Coptic imagery is of uncovering ‘out from the cover(ing) … before heaven.’ I translate following the Coptic’s concrete diction and note the Greek’s ‘truth’ as a possible nuance but not decisive for the main sense.
synoptic_parallel_check:
