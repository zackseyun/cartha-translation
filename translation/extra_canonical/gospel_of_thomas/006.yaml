translation:
  text: 'His disciples questioned him and said to him, “Do you want us to fast? And how should we pray? Should we give alms? And what shall we observe concerning eating?”


    Jesus said, “Do not tell lies, and what you hate—do not do it. For all things are revealed before heaven.[1] For nothing is hidden that will not come to be manifest, and nothing covered will remain without being uncovered.”[2]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: 'POxy 654 appears to read ‘… [all things will be] … truth be[fore heaven].’ The Coptic carries a concrete uncovering image: ‘they will all be stripped out from their covering … before heaven.’ I translate the Coptic; ‘in truth’ is a possible Greek nuance.'
    reason: textual_variant
  - marker: '[2]'
    text: The final cola use paired verbs for concealment and disclosure (ϩⲱⲡ/ϭⲱⲗⲡ; ϩⲱⲃⲥ/ϭⲱⲗⲡ). The last phrase literally reads ‘will not come out without being uncovered.’
    reason: dialect_note
  - marker: '[3]'
    text: ‘What shall we observe when we eat?’ renders ⲡⲁⲣⲁⲧⲏⲣⲉⲓ ⲉⲟⲩ ⲛϭⲓⲛⲟⲩⲱⲙ, literally ‘what shall we observe concerning a meal?’; ‘what diet shall we observe?’ is a viable alternative.
    reason: lexical_alternative
  - marker: '[4]'
    text: ‘Do not tell lies’ translates ϫⲓϭⲟⲗ with negative imperative; ‘do not lie’ or ‘do not speak falsehood’ are possible alternatives.
    reason: lexical_alternative
  - marker: a
    text: Or 'will be stripped out from their covering and exposed before heaven'.
    reason: previous_rendering
  - marker: b
    text: Or 'what shall we observe when we eat?'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲛⲏⲥⲧⲉⲩⲉ
  chosen: fast
  alternatives:
  - abstain (from food)
  lexicon: Crum; Lambdin
  rationale: Greek loanword (νηστεύειν) used in Sahidic with the standard sense “to fast.” Simple English “fast” best matches register and brevity.
- source_word: ⲥⲗⲏⲗ
  chosen: pray
  alternatives:
  - make prayer
  - offer prayer
  lexicon: Crum; Layton
  rationale: Common Coptic verb for prayer; plain “pray” preserves Thomas’s terseness.
- source_word: ⲉⲗⲉⲏⲙⲟⲥⲩⲛⲏ
  chosen: alms
  alternatives:
  - almsgiving
  - charity
  lexicon: Crum; Lambdin
  rationale: Greek loanword (ἐλεημοσύνη). “Alms” keeps the technical, religious sense; “almsgiving” is an acceptable alternative.
- source_word: ⲡⲁⲣⲁⲧⲏⲣⲉⲓ
  chosen: observe
  alternatives:
  - keep
  - watch
  lexicon: Crum
  rationale: Greek loan (παρατηρέω). In context of practice/discipline, “observe” fits best (cf. ‘observe a rule’).
- source_word: ⲟⲩⲱⲙ
  chosen: eat
  alternatives:
  - meal
  - food
  - diet
  lexicon: Crum
  rationale: Base meaning is ‘food/meal; eating.’ The question is about what to observe “when we eat”; “diet” is a viable interpretive alternative but “eat” keeps closer to the Coptic.
- source_word: ϫⲓϭⲟⲗ
  chosen: tell lies
  alternatives:
  - lie
  - speak falsehood
  - deceive
  lexicon: Crum; Lambdin
  rationale: Verbal form with negative imperative ⲙⲡⲣ-; “tell lies” is idiomatic and precise. “Lie” is acceptable but slightly less explicit.
- source_word: ⲙⲟⲥⲧⲉ
  chosen: hate
  alternatives:
  - detest
  - loathe
  lexicon: Crum
  rationale: Common verb ‘to hate’; no need to soften the force.
- source_word: ϭⲱⲗⲡ
  chosen: be uncovered
  alternatives:
  - be exposed
  - be stripped bare
  - be revealed
  lexicon: Crum
  rationale: Lexeme literally ‘uncover/strip off a covering’; I render the core image with “uncovered,” note the stronger “stripped bare” as an alternative to preserve Thomas’s vividness.
- source_word: ϩⲱⲡ
  chosen: be hidden
  alternatives:
  - be concealed
  - lie hidden
  lexicon: Crum
  rationale: Standard verb of concealment; sets up the hidden/revealed antithesis.
- source_word: ϩⲱⲃⲥ
  chosen: covered
  alternatives:
  - cloaked
  - veiled
  lexicon: Crum
  rationale: Here likely adjectival/participial ‘covered/veiled.’ I keep “covered” for parallelism with “uncovered.”
- source_word: ⲟⲩⲉϣⲛ
  chosen: without
  alternatives:
  - apart from
  - unless
  lexicon: Crum; Layton
  rationale: Preposition ‘without’; governs the infinitival clause ‘without being uncovered.’
- source_word: ⲛⲡⲡⲉ
  chosen: before heaven
  alternatives:
  - in the presence of heaven
  - before the sky
  lexicon: Crum
  rationale: ⲡⲡⲉ = ‘heaven/sky.’ With ⲉⲃⲟⲗ expresses exposure “before/in front of” heaven.
- source_word: ⲙ̄ⲡⲉⲙⲧⲟ (cf. normalized ⲛⲡⲙⲧⲟ)
  chosen: from their covering
  alternatives:
  - in truth (per Greek witness)
  - from the cover
  lexicon: Crum (s.v. mto ‘cover, lid’); editor’s note
  rationale: The phrase ⲉⲃⲟⲗ ⲙ̄ⲡⲉⲙⲧⲟ likely carries the concrete image ‘out from the cover(ing).’ POxy 654 suggests ‘truth’ in this locus; I retain the Coptic’s material imagery in translation and note the Greek alternative.
textual_note: 'Dialect/orthography: Sahidic with Lycopolitan coloring. Negative imperative ⲙⲡⲣ- governs ϫⲓϭⲟⲗ (‘do not tell lies’). The plural 2nd person appears in ⲡⲉⲧⲉⲣⲉⲛⲧⲱⲧⲛⲙⲟⲥⲧⲉ (‘what you [pl.] hate’). The verb ϭⲱⲗⲡ (‘uncover/strip’) is used both in the general statement and in the final ‘without being uncovered’ construction (ⲟⲩⲉϣⲛ ϭⲱⲗⲡⲛⲧⲟϥ). Dilley’s printed form shows ⲙ̄ⲡⲉⲙⲧⲟ ‘from the cover(ing?)’, normalized as ⲛⲡⲙⲧⲟ; this clause is semantically challenging. I construe the sequence as a concrete image: ‘they will all be stripped out from their covering and exposed before heaven,’ which coheres with the repeated uncovering verbs in the following cola. There are no lacunae marked in the Coptic for this saying in NHC II, 33:14–23. Greek overlap (POxy 654) supports the overall structure but may preserve a different lexical nuance at this point (see note).'
