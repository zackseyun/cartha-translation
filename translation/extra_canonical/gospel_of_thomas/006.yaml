  - Matthew 10:26
  - Luke 12:2
  handling: context_only
  rationale: The hidden/manifest aphorism has Synoptic echoes. I retain Thomas’s vocabulary and structure without harmonizing to canonical phrasing. The prohibitions and the ‘observe when we eat’ question are distinctively Thomasine.
revision_risk_note: 'Primary point for review: the construal of ⲉⲃⲟⲗ ⲙ̄ⲡⲉⲙⲧⲟ ⲉⲃⲟⲗ ⲛⲡⲡⲉ. I render the double ⲉⲃⲟⲗ with ϭⲱⲗⲡ as ‘stripped out from their covering and exposed before heaven.’ Confirm that ‘ⲙⲧⲟ’ here is best taken as ‘covering’ rather than adopting the Greek fragment’s ‘truth.’ Also check that ‘observe when we eat’ adequately captures ⲡⲁⲣⲁⲧⲏⲣⲉⲓ ⲉⲟⲩ ⲛϭⲓⲛⲟⲩⲱⲙ without over-interpretation (‘diet’).'
