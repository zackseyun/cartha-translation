translation:
  text: Jesus said, "Adam came into being out of a great power and great wealth, and he did not become worthy of you. For if he had become worthy, he would not have tasted death."
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: '“Great powers”: the Coptic is plural (ⲛⲇⲩⲛⲁⲙⲓⲥ). Some English versions singularize to “a great power,” but the manuscript points to more than one.'
    reason: lexical_alternative
  - marker: '2'
    text: ⲙⲛⲧⲣⲙⲙⲁⲟ is an abstract for “riches/wealth.” “Wealth” is chosen for concision; “riches” would be equivalent.
    reason: lexical_alternative
  - marker: '3'
    text: The phrase “worthy of you” addresses a plural “you” (ⲛⲧⲱⲧⲛ), i.e., the audience. The wording is deliberately direct and somewhat paradoxical; it is retained rather than softened.
    reason: cultural_note
  - marker: '4'
    text: “In this place” renders ⲡⲉⲓⲡⲉ; many translations omit or smooth it to “he would not taste death,” but the deictic is present in the Coptic and likely means “here/this realm.”
    reason: lexical_alternative
  - marker: '5'
    text: Dilley notes partial damage/restoration in ⲉ̣[ϥⲙ]ⲡ̣ϣⲁ and [ⲛⲉϥⲛⲁϫⲓ] ϯ̣ⲡ̣[ⲉ; the sense follows the normalized reading.
    reason: lacuna_or_restoration
  - marker: a
    text: Or 'great powers'.
    reason: previous_rendering
  - marker: b
    text: Or 'he would not taste death in this place'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϣⲱⲡⲉ
  chosen: come into being
  alternatives:
  - come to be
  - be created
  - become
  lexicon: Crum; Layton
  rationale: In Sahidic narrative, ϣⲱⲡⲉ commonly denotes emergence/coming-into-existence; “come into being” preserves ontological nuance and Thomas’s terseness.
- source_word: ⲉⲃⲟⲗ ϩⲛ-
  chosen: out of
  alternatives:
  - from within
  - from
  lexicon: Layton (grammar)
  rationale: The construction ϣⲱⲡⲉ ⲉⲃⲟⲗ ϩⲛ- expresses origin/source. “Out of” best renders the outward emergence from a source.
- source_word: ⲟⲩⲛⲟϭ ⲛⲇⲩⲛⲁⲙⲓⲥ
  chosen: great powers
  alternatives:
  - a great power
  - mighty powers
  lexicon: Crum (loanword ⲇⲩⲛⲁⲙⲓⲥ)
  rationale: Plural ⲛⲇⲩⲛⲁⲙⲓⲥ indicates more than one “power.” The quantifier ⲟⲩⲛⲟϭ modifies a plural; translating as “great powers” retains number and emphasis.
- source_word: ⲛⲙⲛⲧⲣⲙⲙⲁⲟ
  chosen: wealth
  alternatives:
  - riches
  - opulence
  lexicon: Crum s.v. ⲣⲙⲙⲁⲟ / ⲙⲛⲧ- abstract
  rationale: Abstract formation with ⲙⲛⲧ- denotes the quality/collective state, hence “wealth” or “riches.” “Wealth” is concise and matches the abstract sense.
- source_word: ⲁⲩⲱ
  chosen: and
  alternatives:
  - and then
  - and yet
  lexicon: Crum
  rationale: Simple additive conjunction; avoid adversative nuance not explicit in the Coptic.
- source_word: ⲙⲡⲉⲛⲧⲟϥϣⲱⲡⲉ
  chosen: he did not become
  alternatives:
  - it did not happen that he became
  lexicon: Layton (grammar of periphrastic with ⲙⲡⲉⲛⲧⲟϥϣⲱⲡⲉ)
  rationale: Negative periphrastic construction conveys non-occurrence of a resultant state; “did not become” is accurate and concise.
- source_word: ⲙⲡϣⲁ ⲛⲛⲧⲱⲧⲛ
  chosen: worthy of you
  alternatives:
  - deserving with respect to you
  - equal to you
  lexicon: Crum s.v. ⲙⲡϣⲁ; Layton
  rationale: ⲙⲡϣⲁ with genitive/prepositional complement expresses being worthy “of” someone. Retain explicit 2nd person plural referent.
- source_word: ⲟⲩⲁⲝⲓⲟⲥ
  chosen: worthy
  alternatives:
  - deserving
  lexicon: Crum (loan from Gk ἄξιος)
  rationale: Predicate adjective in counterfactual clause; “worthy” matches established semantic range and echoes preceding ⲙⲡϣⲁ.
- source_word: ⲛⲉⲣⲉ … ⲛⲁϫⲓ
  chosen: if he had … he would … taste
  alternatives:
  - if he were … he would taste
  lexicon: Layton (irrealis with ⲛⲉⲣⲉ + future),
  rationale: ⲛⲉⲣⲉ + future marks a counterfactual condition; render with English past perfect + conditional.
- source_word: ϫⲓ
  chosen: taste
  alternatives:
  - experience
  lexicon: Crum s.v. ϫⲓ
  rationale: Stock idiom “taste death” is also attested; preserve concrete verb for Thomas’s idiomatic bite.
- source_word: ⲡⲉⲓⲡⲉ
  chosen: in this place
  alternatives:
  - here
  lexicon: Crum s.v. ⲡⲉ (place), ⲡⲉⲓⲡⲉ
  rationale: Deictic “this place/‘here’.” Retaining “in this place” keeps Thomas’s locative strangeness rather than smoothing it away.
- source_word: ⲡⲙⲟⲩ
  chosen: death
  alternatives: []
  lexicon: Crum
  rationale: Basic lexeme; no ambiguity in context.
textual_note: 'Sahidic with some orthographic irregularities. Dilley’s printed text shows lacunae/restorations: line 32 ⲉ̣[ϥⲙ]ⲡ̣ϣⲁ (restoring the 3ms pronominal element in “that he be worthy”), and line 33 [ⲛⲉϥⲛⲁϫⲓ] ϯ̣ⲡ̣[ⲉ, normalized as ⲛⲉⲣⲉⲛⲧⲟϥⲛⲁϫⲓ ⲡⲉⲓⲡⲉ. The reading ⲡⲉⲓⲡⲉ (“this place/here”) is accepted; the damaged trace ϯⲡⲉ likely reflects orthographic variance toward the same word. No POxy Greek witness overlaps this saying. The plural ⲛⲇⲩⲛⲁⲙⲓⲥ is retained (not singularized). The periphrastic negation ⲙⲡⲉⲛⲧⲟϥϣⲱⲡⲉ is rendered simply as “he did not become.”'
