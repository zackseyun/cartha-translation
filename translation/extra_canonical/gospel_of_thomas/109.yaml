  from: a treasure in his field
  to: a hidden treasure in his field
  rationale: 'The Coptic text includes the circumstantial perfect ⲉϥϩⲏⲡ (''being hidden''), which modifies the treasure. The draft omits this crucial detail of the parable. | Azure: The proposed change is supported by the Coptic: the saying describes the treasure with ⲉϥϩⲏⲡ, literally ''being hidden''/''hidden,'' and this is an important element of the parable, not an optional stylis'
