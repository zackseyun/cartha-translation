translation:
  text: Jesus said, "The kingdom is like a man who had a hidden treasure in his field but did not know it. And after he died[a], he left it to his son. The son did not know either. He took the field and sold it. And the buyer[e] went, and while he was digging, he found the treasure[c], and he began to lend at interest[d] to whomever he wished."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally ‘not before he died’ (ⲙⲙⲛⲛⲥⲁ ⲧⲣⲉ…ⲙⲟⲩ), i.e., only after his death.
    reason: dialect_note
  - marker: c
    text: ⲥⲕⲁⲉⲓ is ‘dig’ (from Gk σκάπτειν); in an agricultural setting this can include plowing/hoe-work.
    reason: lexical_alternative
  - marker: d
    text: Coptic idiom ‘give interest’ (ϯ ϩⲟⲙⲧ) means to make loans on interest; the parable ends with the buyer becoming a creditor.
    reason: cultural_note
  - marker: e
    text: The relative clause for ‘the buyer’ is partially restored in the manuscript; the reading is secure in context.
    reason: lacuna_or_restoration
  - marker: b
    text: Or 'a treasure in his field'.
    reason: previous_rendering
  - marker: f
    text: Or 'went; he dug in the ground and found the treasure'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: the kingdom
  alternatives:
  - royal power
  - sovereignty
  lexicon: Crum; Layton
  rationale: Standard Thomasine term for the eschatological rule; idiomatic English is “the kingdom,” though the Coptic literally denotes royal dominion (r-rō).
- source_word: ⲥⲱϣⲉ
  chosen: field
  alternatives:
  - farm plot
  - cultivated land
  lexicon: Crum
  rationale: Common term for an agricultural field; “field” keeps the parable’s rural texture.
- source_word: ⲛⲟⲩⲁϩⲟ
  chosen: a treasure
  alternatives:
  - wealth
  - riches
  lexicon: Crum
  rationale: Context requires a buried hoard; “treasure” is the natural English equivalent for hidden wealth.
- source_word: ⲛⲁⲧⲥⲟⲟⲩⲛ (ⲉⲛⲧⲟϥ)
  chosen: did not know (it)
  alternatives:
  - was unaware (of it)
  - was ignorant (of it)
  lexicon: Layton; Crum (sⲟⲟⲩⲛ)
  rationale: NAT- participle functions as ‘one who does not know’; construction expresses lack of awareness about the treasure.
- source_word: ⲙⲙⲛⲛⲥⲁ ⲧⲣⲉ…ⲙⲟⲩ
  chosen: after he died
  alternatives:
  - not before he died → only after he died
  lexicon: Layton (syntax of ⲙⲛⲥⲁ/ⲛⲥⲁ)
  rationale: Negative temporal ⲙⲙⲛⲛⲥⲁ ‘not before’ yields the sense ‘only after’; idiomatic English ‘after’ conveys it concisely.
- source_word: ⲕⲁⲁ (ⲁϥⲕⲁⲁϥ … ⲙⲡⲉϥϣⲏⲣⲉ)
  chosen: left it to (bequeathed it to) his son
  alternatives:
  - entrusted it to
  - left it for
  lexicon: Crum
  rationale: Here denotes testamentary transfer to the heir; ‘left it to’ is precise and idiomatic.
- source_word: ⲧⲁⲁⲥ
  chosen: sold (it)
  alternatives:
  - disposed of it
  - put it up for sale
  lexicon: Crum
  rationale: Regular verb for ‘sell’; the direct object is the field.
- source_word: (ⲡ)ⲉⲛⲧⲁϩⲧⲟⲟⲩⲥ
  chosen: the buyer
  alternatives:
  - the one who bought (it)
  lexicon: Crum
  rationale: Relative construction ‘the one who bought (it)’ is idiomatically ‘the buyer’ in English.
- source_word: ⲥⲕⲁⲉⲓ
  chosen: dug (in the ground)
  alternatives:
  - plowed
  - hoed
  lexicon: Crum (from Gk σκάπτειν)
  rationale: Primary sense is ‘dig’; agricultural context allows ‘plow,’ but ‘dug’ fits the subsequent ‘ground’ phrase.
- source_word: ⲁⲣⲭⲉⲓ
  chosen: began
  alternatives:
  - set about
  lexicon: Crum (Gk ἄρχει)
  rationale: Common Greek loan used as finite verb ‘he began’ in narrative sequences.
- source_word: ϯ ϩⲟⲙⲧ
  chosen: to lend at interest
  alternatives:
  - to give interest (i.e., charge interest)
  lexicon: Crum (ϩⲟⲙⲧ ‘interest’)
  rationale: Idiom ‘give interest’ in Coptic expresses making loans on interest; render transparently for economic nuance.
- source_word: ⲡⲙⲏⲥⲉ
  chosen: whomever
  alternatives:
  - anyone
  lexicon: Layton
  rationale: Indefinite/relative pronoun; ‘whomever’ keeps the object case with ‘to’.
- source_word: ⲟⲩⲱϣ
  chosen: wished
  alternatives:
  - wanted
  - desired
  lexicon: Crum
  rationale: Standard verb of volition; simple ‘wished’ preserves parabolic tone.
textual_note: 'Dialect and orthography: The saying exhibits repeated ⲁⲛⲧⲟϥ subject resumption (Lycopolitan-influenced periphrasis), which I translate simply as ‘he’ without repeating the pronoun each time. The printed text preserves ⲁϥⲕⲁⲁϥ (‘he left it’) where Dilley’s morphological normalization shows periphrastic subject-marking; sense is the same. The verbs for earthwork appear as ⲥⲕⲁⲉⲓ (‘dig/plow’) followed by ⲁⲛⲧⲟϥϩⲉ ⲉⲡⲁϩⲟ (‘he dug in the ground’), reinforcing the notion of excavation. Temporal ⲙⲙⲛⲛⲥⲁ ⲧⲣⲉ…ⲙⲟⲩ is the negative ‘not-before’ construction giving the sense ‘only after he died’. Lacunae/restorations: minor bracketed restorations occur (e.g., the initial ⲙ of ⲙⲙⲁⲩ; parts of ⲉⲃⲟⲗ; the relative for ‘the buyer’), but they do not affect the overall sense; Dilley’s normalization supplies expected forms. No POxy Greek fragment overlaps this logion.'
