  from: went; he dug in the ground and found the treasure
  to: went, and while he was digging, he found the treasure
  rationale: 'The Coptic ⲉϥⲥⲕⲁⲉⲓ is a circumstantial clause (''while he was digging/plowing''), not a main verb. The draft''s rendering implies he went specifically to dig for the treasure, which ruins the parable''s point that the buyer found it accidentally while working the land. Additionally, ''in the ground'' is not in the Coptic text. (Note: The drafter''s textual note reveals a misunderstanding of ⲁϥϩⲉ ⲉⲡⲁϩⲟ as ''dug in the ground''; ϩⲉ ⲉ- means ''to find'' and ⲡ-ⲁϩⲟ is ''the treasure''). | Azure: The rationale is correct on the Coptic. In Thomas 109 the sequence is effectively ''the buyer came/went; while he was digging/plowing (ⲉϥⲥⲕⲁⲉⲓ), he found the treasure (ⲁϥϩⲉ ⲉⲡⲁϩⲟ).'' The form ⲉϥⲥⲕⲁⲉⲓ is'
