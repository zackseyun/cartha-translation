  reason: redraft_coptic_strict
  english_text: Jesus said, "The kingdom is like a man who had a hidden treasure in his field but did not know it. And after he died[a], he left it to his son. The son did not know either. He took the field and sold it. And the buyer[e] went, and while he was digging, he found the treasure[c], and he began to lend at interest[d] to whomever he wished."
  previous_translation_block:
    text: Jesus said, "The kingdom is like a man who had a hidden treasure in his field but did not know it. And after he died[a], he left it to his son. The son did not know either. He took the field and sold it. And the buyer[e] went, and while he was digging, he found the treasure[c], and he began to lend at interest[d] to whomever he wished."
    philosophy: optimal-equivalence
    footnotes:
    - marker: a
      text: Literally ‘not before he died’ (ⲙⲙⲛⲛⲥⲁ ⲧⲣⲉ…ⲙⲟⲩ), i.e., only after his death.
      reason: dialect_note
    - marker: c
      text: ⲥⲕⲁⲉⲓ is ‘dig’ (from Gk σκάπτειν); in an agricultural setting this can include plowing/hoe-work.
      reason: lexical_alternative
    - marker: d
      text: Coptic idiom ‘give interest’ (ϯ ϩⲟⲙⲧ) means to make loans on interest; the parable ends with the buyer becoming a creditor.
      reason: cultural_note
    - marker: e
      text: The relative clause for ‘the buyer’ is partially restored in the manuscript; the reading is secure in context.
      reason: lacuna_or_restoration
    - marker: b
      text: Or 'a treasure in his field'.
      reason: previous_rendering
    - marker: f
      text: Or 'went; he dug in the ground and found the treasure'.
      reason: previous_rendering
