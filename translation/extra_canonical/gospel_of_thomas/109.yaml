translation:
  text: Jesus said, "The kingdom is like a man who has a hidden treasure in his field, without knowing about it. And after he died, he left it to his son. The son did not know. He took that field and sold it. And the one who bought it came, and while he was plowing, he found the treasure. He began to lend money at interest to whomever he wished."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:00:01Z'
  footnotes:
  - marker: a
    text: The Coptic text contains several lacunae in this saying which have been securely restored based on context and visible traces (e.g., '[after] he died', 'his [son]', 'he [found]').
    reason: textual_variant
  - marker: b
    text: Unlike the canonical parallel in Matthew 13:44, Thomas's parable features a multi-generational transmission of the field, ending with the finder using the treasure to lend money at interest—a striking divergence from the canonical version.
    reason: cross_reference
lexical_decisions:
- source_word: ⲁϩⲟ
  chosen: treasure
  rationale: Standard term for treasure or wealth.
  lexicon: Crum 24b
  alternatives:
  - hoard
  - riches
- source_word: ⲁⲧⲥⲟⲟⲩⲛ
  chosen: without knowing
  rationale: Literally 'ignorant'. Rendered as 'without knowing about it' to fit the English flow naturally while preserving the circumstantial state.
  lexicon: Crum 370a
  alternatives:
  - being ignorant
- source_word: ⲥⲕⲁⲉⲓ
  chosen: plowing
  rationale: Means 'to plow' or 'to till'. Fits the context of working a field better than 'digging'.
  lexicon: Crum 326b
  alternatives:
  - digging
  - tilling
- source_word: ϩⲟⲙⲧ
  chosen: money
  rationale: Literally 'copper' or 'bronze', used by extension for money or coins.
  lexicon: Crum 676b
  alternatives:
  - copper
  - coins
- source_word: ⲙⲏⲥⲉ
  chosen: interest
  rationale: Means 'interest' or 'usury' on a loan.
  lexicon: Crum 185a
  alternatives:
  - usury
theological_decisions:
- issue: Handling of the parable's conclusion
  chosen_reading: He began to lend money at interest to whomever he wished.
  rationale: The Coptic explicitly describes lending money (copper) at interest (usury). This must not be softened or spiritualized in translation, as it represents a deliberate Thomasine subversion of the expected parable ending.
  alternatives_noted:
  - He began to invest the money
drafter_notes: The translation preserves the distinct Thomasine narrative of the hidden treasure, which diverges significantly from Matthew 13:44. The Coptic terms for 'plowing' (ⲥⲕⲁⲉⲓ) and 'lending money at interest' (ϯ ϩⲟⲙⲧ ⲉ ⲧⲙⲏⲥⲉ) are rendered literally to maintain the worldly, perhaps ironic, punchline of the parable.
