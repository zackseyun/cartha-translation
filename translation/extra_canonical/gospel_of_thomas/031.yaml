  source_review: state/reviews/gemini/phase9_nag_hammadi/extra_canonical/gospel_of_thomas/001/031.job-72053.json
  category: mistranslation
  tier: 3
  from: nor does one work cures
  to: nor does a physician heal
  rationale: 'The drafter misidentified `ⲥⲟⲉⲓⲛ` as a periphrastic auxiliary meaning ''work/do''. In fact, `ⲥⲟⲉⲓⲛ` is a standard Sahidic/Lycopolitan spelling variant of `ⲥⲁⲉⲓⲛ` (Crum 369a), meaning ''physician''. The Coptic `ⲙⲁⲣⲉⲥⲟⲉⲓⲛ ⲣ̄ⲑⲉⲣⲁⲡⲉⲩⲉ` literally means ''a physician does not heal'' (using the negative aorist `ⲙⲉⲣⲉ-` spelled `ⲙⲁⲣⲉ-`). The Coptic perfectly matches the Greek POxy witness. | Azure: The proposed change is clearly closer to the Coptic and to the Greek parallel. In Thomas 31 the phrase is not a verbal periphrasis ''work cures'' but contains the noun ⲥⲟⲉⲓⲛ, a Sahidic/Lycopolitan varia'
