translation:
  text: Jesus said, "No prophet is acceptable in his village; a physician does not heal those who know him."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:33:21Z'
  footnotes:
  - marker: '1'
    text: The Coptic uses ⲙⲁⲣⲉ (mare) here as a variant spelling of the negative aorist ⲙⲉⲣⲉ ('does not'), rather than the affirmative jussive ('let'). This dialectal feature is common in Thomas and is confirmed by the Greek parallel.
    reason: dialect_note
  - marker: '2'
    text: 'P.Oxy. 1 preserves a Greek version of this saying: ''A prophet is not acceptable in his homeland (πατρίδι), nor does a physician perform healings for those who know him.'' The Coptic ϯⲙⲉ specifically means ''village'' rather than ''homeland.'''
    reason: textual_variant
  - marker: '3'
    text: Compare Luke 4:24 ('no prophet is acceptable in his hometown') and Mark 6:4. Thomas uniquely pairs this with the proverb about the physician, which echoes Luke 4:23 ('Physician, heal yourself') but applies it to the physician's acquaintances.
    reason: cross_reference
lexical_decisions:
- source_word: ⲙⲛ̄
  chosen: 'No'
  rationale: Negative existential particle ('there is not'). 'There is no prophet' is rendered smoothly as 'No prophet is'.
  lexicon: Crum 170a
  alternatives:
  - There is no
- source_word: ϣⲏⲡ
  chosen: acceptable
  rationale: Qualitative form of ϣⲱⲡ (to receive, accept), meaning 'received' or 'acceptable'.
  lexicon: Crum 578b
  alternatives:
  - received
  - welcome
- source_word: ϯⲙⲉ
  chosen: village
  rationale: Standard Sahidic for 'village' or 'town'. The Greek fragment uses πατρίδι ('homeland/hometown').
  lexicon: Crum 415b
  alternatives:
  - town
- source_word: ⲙⲁⲣⲉ
  chosen: does not
  rationale: Here ⲙⲁⲣⲉ functions as a dialectal variant of the negative aorist ⲙⲉⲣⲉ ('does not'), rather than the affirmative jussive ('let'). This is a known feature in Thomas and is confirmed by the Greek parallel (οὐδὲ, 'nor does').
  lexicon: Crum 178a
  alternatives: []
- source_word: ⲥⲟⲉⲓⲛ
  chosen: physician
  rationale: Standard term for doctor or physician.
  lexicon: Crum 372a
  alternatives:
  - doctor
- source_word: ⲣ̄ⲑⲉⲣⲁⲡⲉⲩⲉ
  chosen: heal
  rationale: Compound verb (ⲣ̄ + Greek therapeuein). It takes its direct object with the preposition ⲛ̄.
  lexicon: Crum 288a (under ⲉⲓⲣⲉ)
  alternatives:
  - perform healing
drafter_notes: The translation corrects the previous draft's 'Jesus says' to 'Jesus said' (ⲡⲉϫⲉ), changes 'A prophet is not' to 'No prophet is' (ⲙⲛ̄), removes the harmonized 'nor' which is absent in the Coptic, and corrects 'heal for those' to 'heal those' (treating ⲛ̄ as the direct object marker for the compound verb ⲣ̄ⲑⲉⲣⲁⲡⲉⲩⲉ).
previous_drafts:
- archived_at: '2026-04-22T09:33:21Z'
  reason: redraft_coptic_strict
  english_text: Jesus says, A prophet is not acceptable in his village; nor does a physician heal for those who know him.
  previous_translation_block:
    text: Jesus says, A prophet is not acceptable in his village; nor does a physician heal for those who know him.
    philosophy: optimal-equivalence
    footnotes:
    - marker: a
      text: ‘Village’ renders ϯⲙⲉ, a small settlement; many Synoptic parallels use ‘homeland’/‘hometown’ (Gk patris). Thomas’s term is more specific.
      reason: cultural_note
    - marker: b
      text: The Greek POxy witness explicitly has ‘a physician’; the Coptic clause is periphrastic (‘work cures’) with an indefinite subject. The translation reflects the Coptic; the Greek is noted here.
      reason: textual_variant
    - marker: c
      text: ϣⲱⲡ/ϣⲏⲡ could also be translated ‘welcome’ or ‘honored’; ‘acceptable’ keeps the evaluative but non-honorific nuance.
      reason: lexical_alternative
    - marker: d
      text: Or 'nor does one work cures'.
      reason: previous_rendering
