translation:
  text: Jesus said, On the day you see your likeness, you rejoice; but when you see your images—those that came into being before you and neither die nor are revealed—how much you will have to bear!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲛϩⲟⲟⲩ can mean ‘today’ or ‘now’; retaining ‘today’ preserves the abrupt Thomasine diction.
    reason: dialect_note
  - marker: b
    text: Although ⲓⲕⲱⲛ is morphologically singular here, the following verbs carry a 3rd plural subject clitic (ⲧⲟⲟⲩ-), indicating that ‘images’ is the intended sense.
    reason: dialect_note
  - marker: c
    text: Or 'Today, when you see your likeness, you will rejoice; but when you should see'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲛϩⲟⲟⲩ
  chosen: today
  alternatives:
  - now
  lexicon: Crum; Lambdin
  rationale: Adverb meaning today/now; retaining today preserves Thomas’s terse strangeness and is grammatically straightforward after the quotation formula.
- source_word: ⲡⲉⲧⲛⲉⲓⲛⲉ
  chosen: your likeness
  alternatives:
  - your semblance
  - your form
  lexicon: Crum; Layton
  rationale: ⲉⲓⲛⲉ is ‘likeness/semblance’; kept distinct from ⲓⲕⲱⲛ ‘image’ to reflect Thomas’s deliberate contrast.
- source_word: ϣⲁⲣⲉⲛⲧⲱⲧⲛⲣⲁϣⲉ
  chosen: you will rejoice
  alternatives:
  - you rejoice
  lexicon: Lambdin; Layton (verbal auxiliaries)
  rationale: ϣⲁⲣⲉ marks prospective/future; with the temporal clause ‘when you see,’ English future captures the force.
- source_word: ⲉⲣϣⲁⲛ
  chosen: when [you should]
  alternatives:
  - if
  lexicon: Layton; Lambdin
  rationale: Irrealis/prospective particle; here best as when you should/when you happen to, preserving conditional nuance without smoothing.
- source_word: ⲉⲡⲉⲧⲛϩⲓⲕⲱⲛ
  chosen: your images
  alternatives:
  - your image
  lexicon: Crum; Layton
  rationale: Form looks singular, but following 3pl subject clitics (ⲧⲟⲟⲩ-) require a plural sense; English plural clarifies this.
- source_word: ⲉⲧⲉⲣⲉ … ϣⲱⲡⲉ
  chosen: that came into being
  alternatives:
  - that happened
  - that were made
  lexicon: Crum (ϣⲱⲡⲉ)
  rationale: ϣⲱⲡⲉ commonly ‘happen, come to be’; ‘came into being’ keeps ontological nuance prominent in Thomas.
- source_word: ⲁⲛⲧⲟϥ … ϩⲓⲡⲉⲧⲛⲉϩⲏ
  chosen: before you
  alternatives:
  - in front of you
  - ahead of you
  lexicon: Crum (ⲁⲛⲧⲟϥ)
  rationale: Temporal precedence fits context of pre-existence of the images vis-à-vis the addressees.
- source_word: ⲙⲉⲣⲉⲛⲧⲟⲟⲩⲙⲟⲩ
  chosen: neither die
  alternatives:
  - neither will die
  lexicon: Layton (negative prospective), Lambdin
  rationale: ‘mere-’ marks negative prospective; generic statement suits gnomic tone, so simple present in English.
- source_word: ⲙⲉⲣⲉⲛⲧⲟⲟⲩⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: nor are revealed
  alternatives:
  - nor will be revealed
  - nor come forth
  lexicon: Crum (ⲟⲩⲱⲛϩ; ⲉⲃⲟⲗ)
  rationale: ⲟⲩⲱⲛϩ ‘reveal, make manifest’; ⲉⲃⲟⲗ ‘out’; passive sense in context; kept parallel to ‘die’ with gnomic present.
- source_word: ⲛⲧⲱⲧⲛⲛⲁϥⲓ
  chosen: you will have to bear
  alternatives:
  - you will bear
  - you will endure
  lexicon: Crum (ϥⲓ)
  rationale: ϥⲓ ‘carry, bear’; idiomatic ‘have to bear’ renders the rhetorical force of impending burden.
- source_word: ϩⲁⲟⲩⲏⲣ
  chosen: a burden
  alternatives:
  - a heavy load
  - great weight
  lexicon: Crum (ⲟⲩⲏⲣ)
  rationale: 'Basic sense ‘burden/weight’; the preposition ϩⲁ marks extent/measure: ‘how much [of a burden]’.'
textual_note: 'Dialect: Sahidic with Lycopolitan features. No lacunae or restorations noted by Dilley for this saying. The printed line shows ⲁⲛⲉⲧⲛ̄ϩⲓⲕⲱⲛ with an overline; Dilley’s normalized text reads ⲉⲡⲉⲧⲛϩⲓⲕⲱⲛ. Plural sense is demanded by the following 3rd plural subject clitics (ⲧⲟⲟⲩ-) on ⲙⲟⲩ and ⲟⲩⲱⲛϩ. Note also the double expression of anteriority ⲁⲛⲧⲟϥ … ϩⲓⲡⲉⲧⲛⲉϩⲏ ‘before you.’ The negative prospective construction ⲙⲉⲣⲉⲛⲧⲟⲟⲩ-V is rendered as gnomic present in English to avoid over-specific temporal force while preserving the proverbial tone. ⲛϩⲟⲟⲩ is kept as ‘today’ rather than ‘now’ to preserve Thomas’s formulaic abruptness.'
