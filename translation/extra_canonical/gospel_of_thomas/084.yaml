translation:
  text: Jesus said, "On the days when you see your likeness, you rejoice. But when you see your images that came into being before you, which neither die nor become manifest—how much you will bear!"
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:40:43Z'
  footnotes:
  - marker: On the days
    text: Coptic ⲛ̄ϩⲟⲟⲩ (plural 'the days'). Used here absolutely as a temporal expression 'On the days when'.
    reason: lexical_alternative
  - marker: came into being
    text: The Coptic relative perfect verb ⲛ̄ⲧⲁϩϣⲱⲡⲉ uses the non-standard suffix ϩ, which most likely stands for the 3rd person plural ⲩ ('they'), agreeing with the plural 'images'.
    reason: dialect_note
  - marker: neither die nor become manifest
    text: The verbs use the prefix ⲙⲁⲩ-, a Lycopolitan/Subakhmimic form of the negative aorist 3rd person plural (standard Sahidic ⲙⲉⲩ-).
    reason: dialect_note
  - marker: bear
    text: Coptic ϥⲓ ϩⲁ (lit. 'bear under', 'carry', 'endure').
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲉⲓⲛⲉ
  chosen: likeness
  rationale: Translates the Coptic term for resemblance or likeness, contrasting with the Greek loanword for 'image'.
  lexicon: Crum 78a
- source_word: ϩⲓⲕⲱⲛ
  chosen: images
  rationale: Greek loanword εἰκών. Left as 'images' to maintain the theological distinction from 'likeness'.
  lexicon: BDAG 288; Crum 665a
- source_word: ϣⲱⲡⲉ
  chosen: came into being
  rationale: Standard translation for ϣⲱⲡⲉ in contexts of creation or origination.
  lexicon: Crum 585b
- source_word: ϩⲓⲧⲉⲧⲛⲉϩⲏ
  chosen: before you
  rationale: Compound preposition ϩⲓ-ⲧⲏ with the 2nd person plural suffix.
  lexicon: Crum 647b
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: become manifest
  rationale: Means to appear, be revealed, or become manifest. 'Become manifest' fits the philosophical register of hidden, pre-existent realities.
  lexicon: Crum 485a
- source_word: ϥⲓ ϩⲁ
  chosen: bear
  rationale: Literally 'to bear under' or 'carry'. Used here for enduring an overwhelming weight or reality.
  lexicon: Crum 620b
- source_word: ⲟⲩⲏⲣ
  chosen: how much
  rationale: Interrogative/exclamatory pronoun indicating quantity or magnitude.
  lexicon: Crum 488b
theological_decisions:
- issue: Distinction between 'likeness' and 'images'
  chosen_reading: likeness (ⲉⲓⲛⲉ) and images (ϩⲓⲕⲱⲛ)
  rationale: The text preserves a deliberate distinction between the Coptic term for 'likeness' (the mortal, visible reflection) and the Greek loanword for 'image' (the pre-existent, eternal, hidden counterpart). This must be maintained in English to preserve the theological contrast.
  alternatives_noted: []
drafter_notes: The saying plays on the Genesis 1:26 pairing of 'image' and 'likeness', but reinterprets them through Thomasine theology. The 'likeness' (Coptic ⲉⲓⲛⲉ) is the mortal, visible reflection that brings ordinary joy. The 'images' (Greek loanword ϩⲓⲕⲱⲛ) are the pre-existent, eternal, hidden counterparts of the disciples. The exclamation at the end emphasizes the overwhelming, unendurable glory or weight of encountering one's eternal self.
