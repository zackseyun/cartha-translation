  to: On the day you see your likeness, you rejoice; but when you see
  rationale: 'The Coptic ⲛ̄ϩⲟⲟⲩ ⲉⲧⲉⲧⲛ̄ⲛⲁⲩ means ''On the day that you see'' (or simply ''When you see''), not ''Today, when you see'' (which would be ⲙ̄ⲡϩⲟⲟⲩ). Additionally, ϣⲁⲣⲉⲧⲛ̄ⲣⲁϣⲉ uses the aorist (habitual) prefix ϣⲁⲣⲉ-, expressing a general truth (''you rejoice''), not the future tense (''you will rejoice'', which would be ⲧⲉⲧⲛⲁⲣⲁϣⲉ). Finally, ''when you should see'' for the conditional ⲉⲧⲉⲧⲛ̄ϣⲁⲛⲛⲁⲩ is unnecessarily clunky; ''when you see'' captures the conditional force naturally. | Azure: The proposed change is supported by the Coptic grammar. ⲛ̄ϩⲟⲟⲩ ⲉⲧⲉⲧⲛ̄ⲛⲁⲩ means literally ''the day/when you see,'' not ''today,'' which would require a different expression; so the current opening overtra'
