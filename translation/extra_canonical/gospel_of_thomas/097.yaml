translation:
  text: Jesus said, “The kingdom of the Father is like a woman carrying a jar filled with meal. As she was walking on the road, while she was still far away, the jar’s handle broke and the meal spilled out behind her along the road. She did not know it; she had not noticed the trouble. When she reached her house, she set the jar down and found it empty.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Coptic ⲛⲟⲉⲓⲧ can mean ‘meal’ or ‘flour’; either is possible in household context.
    reason: lexical_alternative
  - marker: b
    text: ⲙⲁⲁϫⲉ is the vessel’s handle; some propose ‘strap’ where jars were carried with a sling.
    reason: lexical_alternative
  - marker: c
    text: NHAM02.49/lb 10 reads ⲉⲥⲟⲩⲏⲟⲩ, often taken as ‘while she was still far [from home].’ Dilley normalizes to ⲉⲣⲉⲛⲧⲟⲥⲟⲩⲉ; the translation reflects the normalized reading but the ‘far’ nuance is a plausible alternative.
    reason: lacuna_or_restoration
  - marker: d
    text: The double awareness clauses ‘she did not know it’ (ⲛⲉⲣⲉⲛⲧⲟⲥⲥⲟⲟⲩⲛ ⲁⲛ ⲡⲉ) and ‘she had not noticed’ (ⲛⲉⲣⲉⲙⲡⲉⲛⲧⲟⲥⲉⲓⲙⲉ ⲉϩⲓⲥⲉ) are typical Thomasine terseness; ⲉϩⲓⲥⲉ here marks the event-time of the unnoticed spilling rather than adding new content.
    reason: dialect_note
  - marker: e
    text: The last clause could be rendered ‘she found it had become empty,’ treating ϣⲟⲩⲟ adjectivally with a resultative sense.
    reason: lexical_alternative
  - marker: f
    text: Or 'As she was walking on the road, the jar’s handle broke and the meal spilled out behind her along the road. She did not know it and had not noticed.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: kingdom
  alternatives:
  - sovereignty
  - kingship
  lexicon: Crum; Lambdin
  rationale: This Thomasine technical term regularly denotes royal domain/power; “kingdom” best matches idiomatic English while preserving the parable’s frame.
- source_word: ⲡⲉⲓⲱⲧ
  chosen: the Father
  alternatives:
  - Father
  lexicon: Crum; Layton
  rationale: Definite article is intrinsic in the Coptic; retain theological title “the Father” per Thomas’s usage.
- source_word: ⲥϩⲓⲙⲉ
  chosen: woman
  alternatives:
  - female
  lexicon: Crum
  rationale: Concrete human referent; “woman” preserves parable’s specificity.
- source_word: ϭⲉⲗⲙⲁⲓ
  chosen: jar
  alternatives:
  - jug
  - pot
  lexicon: Crum
  rationale: Household vessel; “jar” is the most neutral and commonly used equivalent.
- source_word: ⲙⲟⲩϩ
  chosen: full
  alternatives:
  - filled
  lexicon: Lambdin; Crum
  rationale: Predicate adjective meaning ‘full’; kept as “full” rather than a progressive to match terse style.
- source_word: ⲛⲟⲉⲓⲧ
  chosen: meal
  alternatives:
  - flour
  lexicon: Crum
  rationale: Crum glosses as ‘meal, flour.’ “Meal” keeps ancient feel; “flour” noted as alternative.
- source_word: ⲙⲁⲁϫⲉ
  chosen: handle
  alternatives:
  - grip
  - strap
  lexicon: Crum
  rationale: Specifically the handle of a vessel; “handle” is the standard choice.
- source_word: ⲟⲩⲱϭⲡ
  chosen: broke
  alternatives:
  - snapped
  - broke off
  lexicon: Crum
  rationale: Perfective event; “broke” is concise and idiomatic.
- source_word: ϣⲟⲩⲟ
  chosen: spilled out
  alternatives:
  - poured out
  - ran out
  lexicon: Crum
  rationale: Verb of flowing out; “spilled out” best conveys unintended loss.
- source_word: ⲡϩⲓⲏ
  chosen: road
  alternatives:
  - path
  - way
  lexicon: Crum
  rationale: Common noun for roadway; “road” is straightforward.
- source_word: ⲥⲟⲟⲩⲛ
  chosen: know
  alternatives:
  - realize
  - be aware
  lexicon: Crum; Lambdin
  rationale: Cognitive verb ‘to know’; paired with negative, “did not know it” fits English.
- source_word: ⲉⲓⲙⲉ
  chosen: notice
  alternatives:
  - perceive
  - understand
  lexicon: Crum; Layton
  rationale: Here denotes awareness of what happened; “notice” captures the pragmatic nuance.
- source_word: ⲡⲱϩ
  chosen: reach
  alternatives:
  - arrive at
  lexicon: Crum
  rationale: Motion-to-goal verb; “reach” preserves the parable’s abruptness.
- source_word: ⲕⲱⲡ
  chosen: set down
  alternatives:
  - put down
  - place
  lexicon: Crum
  rationale: Transitive placement; “set down” keeps a simple, physical action.
- source_word: ϩⲉ
  chosen: found
  alternatives:
  - discovered
  lexicon: Crum
  rationale: Resultative perception; “found” is idiomatic.
- source_word: ϣⲟⲩⲟ (adjectival)
  chosen: empty
  alternatives:
  - emptied
  lexicon: Crum
  rationale: Predicate adjective; “empty” is crisp and matches the parable’s punchline.
- source_word: ⲛⲥⲁⲛⲧⲟⲥ
  chosen: behind her
  alternatives:
  - in her wake
  - after her
  lexicon: Lambdin
  rationale: Preposition ⲛⲥⲁ + pronominal ⲛⲧⲟⲥ; spatial relation best expressed as “behind her.”
- source_word: ⲡⲉⲥⲏⲓ
  chosen: her house
  alternatives:
  - her home
  lexicon: Crum
  rationale: Specific dwelling noun; “house” is literal, with “home” as a contextual alternative.
textual_note: 'Dialect/orthography: The saying exhibits the Thomasine chain with ⲛⲧⲟⲥ/ⲁⲛⲧⲟⲥ as repeated third-person subject in relative clauses, a feature often associated with Lycopolitan influence in NHC II. Orthographic normalization in Dilley includes reading ϭⲉⲗⲙⲁⲓ ‘jar’ where the page shows ⲟⲩϭⲗ[ⲙⲉⲉⲓ] (NHAM02.49/lb 8, 10, 14). The line-initial segment in lb 7 has a damaged area around ⲡⲉ̣[ⲓⲱⲧ ⲉⲥ]ⲧⲛ̄-, restored as ⲛⲡⲉⲓⲱⲧ ⲉⲣⲉⲛⲧⲟⲥⲧⲟⲛⲧⲛ. In lb 11 the page reads ⲛ̄ⲥⲱⲥ̣[ϩ]ⲓ̣ⲧⲉϩⲓ, normalized to ⲛⲥⲁⲛⲧⲟⲥ ϩⲓⲡϩⲓⲏ. In lb 14 the page’s ⲁⲥⲕⲁⲡϭⲗ︦ⲙⲉⲉⲓ was normalized to ⲁⲛⲧⲟⲥⲕⲱⲡϭⲉⲗⲙⲁⲓ. A notable point: lb 10 prints ⲉⲥⲟⲩⲏⲟⲩ before the clause about the handle breaking; some editors read this as ‘while she was still far [from home].’ Dilley’s normalized line has ⲉⲣⲉⲛⲧⲟⲥⲟⲩⲉ, which does not carry the ‘far away’ nuance. The translation follows the normalized text; the alternative reading is noted in a footnote.'
