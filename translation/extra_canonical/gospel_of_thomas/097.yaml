translation:
  text: Jesus said, "The kingdom of the Father is like a woman carrying a jar full of meal. While she was walking on the road, still far away, the handle of the jar broke. The meal emptied out behind her on the road. She did not know it; she had not noticed a problem. When she reached her house, she set the jar down and found it empty."
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:50:17Z'
  footnotes:
  - marker: a
    text: Or 'she had not perceived the trouble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ϭⲗⲙⲉⲉⲓ
  chosen: jar
  rationale: 'Crum 813a: jar, pot.'
  lexicon: Crum
  alternatives:
  - pot
- source_word: ⲛⲟⲉⲓⲧ
  chosen: meal
  rationale: 'Crum 230a: flour, meal.'
  lexicon: Crum
  alternatives:
  - flour
- source_word: ⲙⲁⲁϫⲉ
  chosen: handle
  rationale: 'Crum 212a: ear, handle (of a vessel).'
  lexicon: Crum
  alternatives:
  - ear
- source_word: ⲟⲩⲱϭⲡ
  chosen: broke
  rationale: 'Crum 509b: to break, be broken.'
  lexicon: Crum
  alternatives:
  - snapped
- source_word: ϣⲟⲩⲟ
  chosen: emptied out
  rationale: 'Crum 596a: to empty, pour out. Used intransitively here.'
  lexicon: Crum
  alternatives:
  - poured out
- source_word: ϩⲓⲥⲉ
  chosen: a problem
  rationale: 'Crum 715a: labour, toil, trouble, affliction. In this context, ''trouble'' or ''a problem'' fits the sense of an unnoticed mishap.'
  lexicon: Crum
  alternatives:
  - trouble
  - toil
theological_decisions:
- issue: Parable of the empty jar
  chosen_reading: The kingdom of the Father is like a woman...
  rationale: This parable is unique to Thomas and has no canonical parallel. The translation strictly follows the Coptic narrative without importing external theological frameworks.
  alternatives_noted: []
drafter_notes: The translation preserves the narrative flow of the parable. The Coptic 'ⲉϩⲓⲥⲉ' (trouble, toil) is rendered 'a problem' to convey the sense of an unnoticed mishap. The circumstantial 'ⲉⲥⲟⲩⲏⲟⲩ' is translated 'still far away' to indicate her distance from home when the handle broke.
previous_drafts:
- archived_at: '2026-04-22T09:50:17Z'
  reason: redraft_coptic_strict
  english_text: Jesus said, “The kingdom of the Father is like a woman carrying a jar filled with meal. As she was walking on the road, while she was still far away, the jar’s handle broke and the meal spilled out behind her along the road. She did not know it; she had not noticed the trouble. When she reached her house, she set the jar down and found it empty.”
  previous_translation_block:
    text: Jesus said, “The kingdom of the Father is like a woman carrying a jar filled with meal. As she was walking on the road, while she was still far away, the jar’s handle broke and the meal spilled out behind her along the road. She did not know it; she had not noticed the trouble. When she reached her house, she set the jar down and found it empty.”
    philosophy: optimal-equivalence
    footnotes:
    - marker: a
      text: Coptic ⲛⲟⲉⲓⲧ can mean ‘meal’ or ‘flour’; either is possible in household context.
      reason: lexical_alternative
    - marker: b
      text: ⲙⲁⲁϫⲉ is the vessel’s handle; some propose ‘strap’ where jars were carried with a sling.
      reason: lexical_alternative
    - marker: c
      text: NHAM02.49/lb 10 reads ⲉⲥⲟⲩⲏⲟⲩ, often taken as ‘while she was still far [from home].’ Dilley normalizes to ⲉⲣⲉⲛⲧⲟⲥⲟⲩⲉ; the translation reflects the normalized reading but the ‘far’ nuance is a plausible alternative.
      reason: lacuna_or_restoration
    - marker: d
      text: The double awareness clauses ‘she did not know it’ (ⲛⲉⲣⲉⲛⲧⲟⲥⲥⲟⲟⲩⲛ ⲁⲛ ⲡⲉ) and ‘she had not noticed’ (ⲛⲉⲣⲉⲙⲡⲉⲛⲧⲟⲥⲉⲓⲙⲉ ⲉϩⲓⲥⲉ) are typical Thomasine terseness; ⲉϩⲓⲥⲉ here marks the event-time of the unnoticed spilling rather than adding new content.
      reason: dialect_note
    - marker: e
      text: The last clause could be rendered ‘she found it had become empty,’ treating ϣⲟⲩⲟ adjectivally with a resultative sense.
      reason: lexical_alternative
    - marker: f
      text: Or 'As she was walking on the road, the jar’s handle broke and the meal spilled out behind her along the road. She did not know it and had not noticed.'.
      reason: previous_rendering
