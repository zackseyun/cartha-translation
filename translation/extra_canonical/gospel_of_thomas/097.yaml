  to: As she was walking on the road, while she was still far away, the jar’s handle broke and the meal spilled out behind her along the road. She did not know it; she had not noticed the trouble.
  rationale: 'Azure-modified: The rationale is substantially correct: the current English omits the circumstantial clause built on ⲟⲩⲉ (''be far''), so some expression like ''while she was still far away'' should be restored, since it is present in the Coptic and contributes to the image. Likewise, ϩⲓⲥⲉ is not empty filler but means ''trouble/toil/problem,'' so rendering only ''had not noticed'' undertranslates ⲛⲉⲙⲡⲉⲥⲉⲓⲙⲉ ⲉϩⲓⲥⲉ. However, the proposed ''still a long way off'' is a bit interpretive without an explicit destination in the'
