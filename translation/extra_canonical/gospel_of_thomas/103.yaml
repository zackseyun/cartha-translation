  parallels:
  - Matthew 24:43
  - Luke 12:39
  handling: context_only
  rationale: The image of a householder and a thief is shared, but Thomas’s wording diverges (e.g., ‘his domain’ ⲡⲉϥⲙⲛⲧⲣⲣⲟ, added girding), and we retain the Coptic without harmonizing to the Synoptics.
revision_risk_note: 'Key review points: (1) Rendering of ⲡⲉϥⲙⲛⲧⲣⲣⲟ as ‘domain’ rather than ‘house’ (Thomas’s distinctive lexeme vs. Synoptic parallels); (2) the function of ⲛⲧⲉⲛⲧⲟϥ as negative purpose (‘lest’) and pronoun referents; (3) interpretation of ϩⲁⲡⲉϩⲏ as ‘beforehand’; (4) minor restorations in the manuscript affecting ‘hour’/‘in order that’ and the waist/loins clause. These choices most affect nuance and should be double‑checked against Dilley’s apparatus and dialectal norms.'
