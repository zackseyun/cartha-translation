  previous_translation_block:
    text: Jesus said, “Blessed is the man who knows in which part [1] the robbers [2] are coming in, so that he will arise, gather his kingdom [3], and gird himself around his waist [4] beforehand [5], before they enter.”
    philosophy: optimal-equivalence
    footnotes:
    - marker: '[1]'
      text: Literally “in which part”; meros ‘part/segment’ with aš ‘hour’ implies the portion or watch of time.
      reason: cultural_note
    - marker: '[2]'
      text: ⲗⲏⲥⲧⲏⲥ is a Greek loan for ‘robber/bandit,’ often implying a violent intruder rather than a petty thief.
      reason: cultural_note
    - marker: '[3]'
      text: The pronoun ‘he’ in ‘lest he dig through his domain’ refers to the robber. The verb ⲥⲱⲟⲩϩ literally means ‘dig through’ (mud‑brick walls), i.e., break in.
      reason: dialect_note
    - marker: '[4]'
      text: Coptic reads ‘gird himself upon his loins/hips’ (ⲙⲟⲩⲣ … ⲉϫⲛ̄ ⲡⲉϥϯⲡⲉ), an idiom for readiness.
      reason: cultural_note
    - marker: '[5]'
      text: ϩⲁⲡⲉϩⲏ conveys ‘in advance/beforehand’ (lit. ‘before now’).
      reason: dialect_note
    - marker: a
      text: Or 'stay awake—lest he dig through his domain [3]—and he will gird himself'.
      reason: previous_rendering
    - marker: b
      text: Or 'the robber [2] is coming in'.
      reason: previous_rendering
