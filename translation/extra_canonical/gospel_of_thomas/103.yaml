  from: the robber [2] is coming in
  to: the robbers [2] are coming in
  rationale: 'The manuscript reads ⲉⲛⲗⲏⲥⲧⲏⲥ (plural definite article ⲛ-), and the verse concludes with the plural ⲉⲙⲡⲁⲧⲟⲩⲉⲓ (''before they enter''). Translating as singular ''robber'' creates an awkward shift to ''they'' at the end of the verse and misses the plural in the source. | Azure: The proposed change is supported by the Coptic grammar. ⲛ-/ⲉⲛ- before ⲗⲏⲥⲧⲏⲥ marks the plural (''the robbers''), not the singular, and the later verb phrase ⲉⲙⲡⲁⲧⲟⲩⲉⲓ likewise uses the 3rd person plural'
