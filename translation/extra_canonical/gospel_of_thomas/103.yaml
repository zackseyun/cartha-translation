  to: arise, gather his kingdom [3], and gird himself
  rationale: 'The draft systematically harmonizes Thomas''s distinct vocabulary with the Synoptic parallels (Matt 24:43). Thomas uses ⲧⲱⲟⲩⲛ (''arise''), not ⲣⲟⲉⲓⲥ (''stay awake''); ⲥⲱⲟⲩϩ (''gather''), not ϣⲱⲧⲉ (''dig through''); and ⲙⲛⲧⲣⲣⲟ (''kingdom''), not ⲏⲓ (''house''). Furthermore, the prefix ⲛϥ- (manuscript lines 8-9) is the conjunctive, continuing the purpose clause (''so that he will arise, and gather..., and gird...''). It does not mean ''lest'', and the subject of all three verbs is the blessed man, not the robber. | Azure: The proposed change is strongly supported by the Coptic wording as described: the rationale identifies specific lexemes that differ from the current English in exactly the places at issue—ⲧⲱⲟⲩⲛ means '
