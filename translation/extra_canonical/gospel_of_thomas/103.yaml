translation:
  text: Jesus said, "Blessed is the man who knows in which part the robbers are coming in, so that he will arise, gather his kingdom, and gird his loins beforehand, before they come in."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:44:35Z'
  footnotes:
  - marker: part
    text: Translating the Greek loanword ⲙⲉⲣⲟⲥ (meros), which in this context likely refers to a 'watch' or division of the night, echoing the Synoptic parallel (Matthew 24:43 / Luke 12:39).
    reason: lexical_alternative
  - marker: robbers
    text: The Coptic uses the plural (ⲛⲗⲏⲥⲧⲏⲥ), diverging from the singular 'thief' in the canonical parallels.
    reason: textual_variant
  - marker: gather his kingdom
    text: Thomas replaces the Synoptic 'house' with 'kingdom' (ⲙⲛⲧⲉⲣⲟ), transforming the parable from a warning about external burglary into an exhortation to inward spiritual readiness and integration.
    reason: theological_note
  - marker: gird his loins
    text: Literally 'gird himself upon his loins' (ⲛϥⲙⲟⲩⲣ ⲙⲙⲟϥ ⲉϫⲛ ⲧⲉϥϯⲡⲉ).
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲉⲣⲟⲥ
  chosen: part
  rationale: A Greek loanword (meros) meaning 'part' or 'portion'. In the context of the night, it refers to a 'watch', but 'part' preserves the literal term used.
  lexicon: BDAG
  alternatives:
  - watch
  - quarter
- source_word: ⲗⲏⲥⲧⲏⲥ
  chosen: robbers
  rationale: Greek loanword (lēstēs). The Coptic uses the plural prefix (ⲛ-), diverging from the singular 'thief' in the Synoptic parallels.
  lexicon: BDAG
  alternatives:
  - thieves
  - bandits
- source_word: ⲥⲱϩⲟⲩϩ
  chosen: gather
  rationale: Sahidic ⲥⲱⲟⲩϩ. Means to gather or collect.
  lexicon: Crum 374a
  alternatives:
  - muster
  - collect
- source_word: ⲙⲛⲧⲉⲣⲟ
  chosen: kingdom
  rationale: The standard Thomasine term for 'kingdom'. While 'estate' or 'domain' might fit the mundane parable better, Thomas deliberately shifts the Synoptic 'house' to 'kingdom' to spiritualize the saying.
  lexicon: Crum 298a
  alternatives:
  - estate
  - domain
- source_word: ϯⲡⲉ
  chosen: loins
  rationale: Means 'loins'. The phrase 'gird himself upon his loins' is rendered as the standard English idiom 'gird his loins'.
  lexicon: Crum 421a
  alternatives:
  - waist
- source_word: ϩⲁⲧⲉϩⲏ
  chosen: beforehand
  rationale: Means 'at the beginning' or 'beforehand'.
  lexicon: Crum 647b
  alternatives:
  - in advance
theological_decisions:
- issue: Translation of ⲙⲛⲧⲉⲣⲟ in the context of a parable about a house.
  chosen_reading: kingdom
  rationale: While 'estate' or 'domain' might make more sense in a mundane parable about robbers, Thomas deliberately uses ⲙⲛⲧⲉⲣⲟ (kingdom) to shift the meaning to the spiritual realm. The kingdom is an inner reality that must be 'gathered' or consolidated against intrusion. Smoothing this to 'estate' would erase the author's theological intent.
  alternatives_noted:
  - estate
  - domain
drafter_notes: 'This saying parallels Matthew 24:43 and Luke 12:39 but introduces significant Thomasine shifts: it is framed as a beatitude (''Blessed is the man''), features plural ''robbers'' instead of a singular thief, and most importantly, replaces the ''house'' with the ''kingdom''. The manuscript contains several minor lacunae (e.g., ⲟⲩⲙⲁ̣[ⲕⲁ]ⲣⲓⲟⲥ, ϩ[ⲛ̄ⲁϣ], ⲙⲛ︤ⲧ︥ⲉ̣[ⲣⲟ]) which are securely restored from context.'
