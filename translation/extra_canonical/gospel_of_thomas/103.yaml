translation:
  text: Jesus said, “Blessed is the man who knows in which part [1] the robbers [2] are coming in, so that he will arise, gather his kingdom [3], and gird himself around his waist [4] beforehand [5], before they enter.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[1]'
    text: Literally “in which part”; meros ‘part/segment’ with aš ‘hour’ implies the portion or watch of time.
    reason: cultural_note
  - marker: '[2]'
    text: ⲗⲏⲥⲧⲏⲥ is a Greek loan for ‘robber/bandit,’ often implying a violent intruder rather than a petty thief.
    reason: cultural_note
  - marker: '[3]'
    text: The pronoun ‘he’ in ‘lest he dig through his domain’ refers to the robber. The verb ⲥⲱⲟⲩϩ literally means ‘dig through’ (mud‑brick walls), i.e., break in.
    reason: dialect_note
  - marker: '[4]'
    text: Coptic reads ‘gird himself upon his loins/hips’ (ⲙⲟⲩⲣ … ⲉϫⲛ̄ ⲡⲉϥϯⲡⲉ), an idiom for readiness.
    reason: cultural_note
  - marker: '[5]'
    text: ϩⲁⲡⲉϩⲏ conveys ‘in advance/beforehand’ (lit. ‘before now’).
    reason: dialect_note
  - marker: a
    text: Or 'stay awake—lest he dig through his domain [3]—and he will gird himself'.
    reason: previous_rendering
  - marker: b
    text: Or 'the robber [2] is coming in'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲙⲁⲕⲁⲣⲓⲟⲥ
  chosen: blessed
  alternatives:
  - fortunate
  - happy
  lexicon: Crum; Layton
  rationale: Common loan from Greek makarios; in Thomasine beatitude contexts, “blessed” preserves traditional nuance while keeping terse diction.
- source_word: ⲥⲟⲟⲩⲛ
  chosen: know
  alternatives:
  - come to know
  - recognize
  lexicon: Lambdin; Layton
  rationale: Basic stative sense fits the gnomic blessing; perfective nuance (“has learned”) not required by context.
- source_word: ϩⲛⲁϣ ⲛⲙⲉⲣⲟⲥ
  chosen: in which part
  alternatives:
  - at what hour
  - in which watch
  - at what time
  lexicon: Crum (aš ‘hour’); Crum/Layton (meros ‘part’)
  rationale: Literal rendering keeps Thomas’s strangeness; note that meros can imply a segment/watch of time. Footnote clarifies temporal sense.
- source_word: ⲗⲏⲥⲧⲏⲥ
  chosen: robber
  alternatives:
  - bandit
  - thief
  - burglar
  lexicon: Crum (lēstēs)
  rationale: Greek loan typically denotes a robber/bandit (often violent), not merely a petty thief (kleptēs). “Robber” fits the break‑in context.
- source_word: ⲉⲓ ⲉϩⲟⲩⲛ
  chosen: is coming in
  alternatives:
  - comes in
  - enter
  lexicon: Lambdin
  rationale: Progressive aspect matches the impending action in the saying; prepositional complement ‘into’/‘in’ retained.
- source_word: ϩⲓⲛⲁ
  chosen: so that
  alternatives:
  - in order that
  lexicon: Lambdin §179
  rationale: Standard purpose conjunction in Sahidic.
- source_word: ⲧⲱⲟⲩⲛ
  chosen: stay awake
  alternatives:
  - keep watch
  - be alert
  lexicon: Crum
  rationale: Idiomatic sense of vigilance fits burglary image; “stay awake” concise and clear.
- source_word: ⲛⲧⲉⲛⲧⲟϥ (…ⲥⲱⲟⲩϩ)
  chosen: lest he …
  alternatives:
  - so that he may not …
  lexicon: Lambdin (negative purpose with ⲛ̄ⲧⲉ + pronominal)
  rationale: Construction functions as negative purpose (“lest”); pronoun referent is the robber from the previous clause.
- source_word: ⲥⲱⲟⲩϩ
  chosen: dig through
  alternatives:
  - break in
  - burrow through
  - undermine
  lexicon: Crum
  rationale: Technical term for breaking through mud‑brick walls in burglary; “dig through” preserves the concrete image.
- source_word: ⲙⲛⲧⲣⲣⲟ
  chosen: domain
  alternatives:
  - kingship
  - kingdom
  - rule
  lexicon: Crum (mⲛⲧ‑rro ‘kingship, kingdom’)
  rationale: Literally ‘kingship/kingdom’; “domain” avoids unintended echo of the ‘Kingdom’ motif while keeping sense of one’s sphere of control (“his domain”).
- source_word: ⲙⲟⲩⲣ
  chosen: gird
  alternatives:
  - tie up
  - belt
  lexicon: Crum
  rationale: Common verb for girding oneself; contextually with loins/waist.
- source_word: ⲛⲛⲧⲟϥ (reflexive use)
  chosen: himself
  alternatives:
  - (no separate English word; reflexive sense)
  lexicon: Layton (pronominal forms)
  rationale: The form functions reflexively here (“gird himself”), a feature consistent with Lycopolitan influence in NHC orthography.
- source_word: ⲡⲉϥϯⲡⲉ
  chosen: his waist
  alternatives:
  - his loins
  - his hips
  lexicon: Crum (‘tpe’ = loins/hips)
  rationale: “Waist” communicates the bodily area idiomatically; “loins” retained in phrasing via ‘gird’ imagery in footnote.
- source_word: ϩⲁⲡⲉϩⲏ
  chosen: beforehand
  alternatives:
  - already
  - in advance
  lexicon: Crum (pehē ‘the present; now’, with ϩⲁ yielding ‘before now/ beforehand’)
  rationale: Adverbial expression indicating prior action relative to the robber’s entry.
- source_word: ⲙⲡⲁⲧⲉ … ⲉϩⲟⲩⲛ
  chosen: before they enter
  alternatives:
  - prior to their coming in
  lexicon: Lambdin
  rationale: Standard temporal subordinator ‘before (that)’ with plural verb ‘they enter’ (referring to the robbers).
textual_note: 'Sahidic with Lycopolitan features. The NH II scribe writes several Greek loans (ⲙⲁⲕⲁⲣⲓⲟⲥ, ⲗⲏⲥⲧⲏⲥ, ⲙⲉⲣⲟⲥ). Dilley’s print shows small lacunae/uncertainties: ⲙⲁ̣[ⲕⲁ]ⲣⲓⲟⲥ restored; ϫⲉϩ[ⲛ̄ⲁϣ] and ϣⲓⲛⲁ̣ [ⲉϥ]ⲛ̣ⲁⲧⲱⲟⲩⲛ normalized as ϩⲓⲛⲁ ⲉⲣⲉⲛⲧⲟϥⲛⲁⲧⲱⲟⲩⲛ; and line-final ϯⲡⲉ ϩ̣[ⲁ]ⲧ̣ⲉϩⲏ is taken as ϩⲁⲡⲉϩⲏ ‘beforehand.’ The sequence ⲛⲧⲉⲛⲧⲟϥ appears twice; the first clearly functions as negative purpose (‘lest he dig through’), with the pronoun referring back to the robber. Reflexive sense in ⲙⲟⲩⲣ ⲛⲛⲧⲟϥ (‘gird himself’) likely reflects dialectal/orthographic usage. Notably, the direct object of ⲥⲱⲟⲩϩ is ⲡⲉϥⲙⲛⲧⲣⲣⲟ (‘his kingdom/domain’), not ‘house’; this is a Thomasine lexical choice and should not be harmonized.'
