translation:
  text: 'His disciples said to him, "Who are you, that you say these things to us?"

    "From what I say to you, you do not know who I am. But you have become like the Jews, for they love the tree and hate its fruit, and they love the fruit and hate the tree."'
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:36:22Z'
  footnotes:
  - marker: From what I say to you
    text: Coptic ϩⲛ̄ ⲛⲉ ϯϫⲱ ⲙ̄ⲙⲟⲟⲩ ⲛⲏⲧⲛ̄ (lit. "In the things I say to you").
    reason: lexical_alternative
  - marker: love the tree and hate its fruit
    text: 'The Coptic uses asyndeton (lack of conjunctions) between the verbs: "they love the tree, they hate its fruit."'
    reason: register_note
  - marker: like the Jews
    text: The use of "the Jews" (ⲛⲓⲓⲟⲩⲇⲁⲓⲟⲥ) as a foil reflects early Christian polemic, akin to the Gospel of John. The saying subverts the Synoptic tree-and-fruit parables (e.g., Matt 12:33) by accusing them of separating the tree from its fruit.
    reason: cultural_note
lexical_decisions:
- source_word: ⲉⲓⲙⲉ
  chosen: know
  rationale: Standard translation for ⲉⲓⲙⲉ in the sense of recognizing or understanding someone's identity.
  lexicon: Crum 77a
  alternatives:
  - understand
  - realize
- source_word: ϣⲱⲡⲉ
  chosen: become
  rationale: Standard translation for ϣⲱⲡⲉ in the perfect tense (ⲁⲧⲉⲧⲛ̄ϣⲱⲡⲉ).
  lexicon: Crum 583b
  alternatives:
  - come to be
- source_word: ⲙⲉ
  chosen: love
  rationale: Standard translation for ⲙⲉ.
  lexicon: Crum 155b
- source_word: ⲙⲟⲥⲧⲉ
  chosen: hate
  rationale: Standard translation for ⲙⲟⲥⲧⲉ.
  lexicon: Crum 188a
- source_word: ϣⲏⲛ
  chosen: tree
  rationale: Standard translation for ϣⲏⲛ.
  lexicon: Crum 570a
theological_decisions:
- issue: Translation of ⲛⲓⲓⲟⲩⲇⲁⲓⲟⲥ
  chosen_reading: the Jews
  rationale: Retained as 'the Jews' to reflect the text's polemical stance, similar to the Gospel of John. It should not be softened to 'the Judeans' or 'the Jewish leaders' because the text uses it as a broad category for those who fail to recognize the unity of source and product.
  alternatives_noted:
  - the Judeans
  - the Jewish leaders
drafter_notes: The translation preserves the sharp Thomasine diction and the asyndetic structure of the Coptic where possible, smoothing it slightly with 'and' for readability in English. The polemical use of 'the Jews' is retained without softening, reflecting the text's historical context.
