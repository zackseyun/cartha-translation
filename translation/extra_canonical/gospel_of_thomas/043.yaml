translation:
  text: 'His disciples said to him, "Who are you, that you say these things to us?" "From what I say to you, you do not know who I am. Rather, you have become like the Jews: they love the tree and hate its fruit, and they love the fruit and hate the tree."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘In your ears’ renders Coptic ⲛⲛⲧⲟⲟⲩ literally; ‘in your hearing’ would be an idiomatic alternative.
    reason: lexical_alternative
  - marker: b
    text: ‘The Jews’ translates Coptic ⲛⲡⲓⲓⲟⲩⲇⲁⲓⲟⲥ (Greek loan Ἰουδαῖος). Some prefer ‘the Judeans’ to stress ethnogeographic nuance.
    reason: cultural_note
  - marker: c
    text: Or 'He said to them, "From what I say in your ears,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲛⲧⲁⲕⲛⲓⲙ
  chosen: Who are you?
  alternatives:
  - What are you?
  lexicon: Lambdin; Crum (ⲛⲓⲙ ‘who’)
  rationale: Formula with ⲛⲧⲁ- + pronoun + ⲛⲓⲙ functions as an interrogative ‘who are you?’; render directly as a question.
- source_word: ϫⲱ
  chosen: say
  alternatives:
  - speak
  lexicon: Lambdin
  rationale: Common verb for ‘to say’; plain English ‘say’ preserves Thomas’s terseness.
- source_word: ⲡⲁⲓ
  chosen: these things
  alternatives:
  - this
  lexicon: Lambdin
  rationale: Proximal demonstrative; plural sense is implied by context (‘say these things’). Rendering as ‘these things’ reflects idiomatic English.
- source_word: ϩⲛ ⲡⲉⲧⲉⲣⲉ…
  chosen: from what
  alternatives:
  - in what
  - in the things that
  lexicon: Layton (relative clause with ⲡⲉⲧⲉⲣⲉ)
  rationale: ϩⲛ with the relative ⲡⲉⲧⲉⲣⲉ introduces the source/realm of the speech; ‘from what’ captures the sense without over-explaining.
- source_word: ⲛⲛⲧⲟⲟⲩ
  chosen: the ears
  alternatives:
  - your hearing
  lexicon: Crum (ⲧⲟⲟⲩ ‘ear’)
  rationale: Definite plural ‘the ears’; the idiom ‘in your ears’ is vivid and is retained to preserve Thomas’s strangeness.
- source_word: ⲉⲓⲙⲉ
  chosen: know
  alternatives:
  - understand
  - recognize
  lexicon: Crum
  rationale: Basic sense is ‘to know’; ‘know’ keeps the statement sharp and minimal.
- source_word: ϫⲉ ⲁⲛⲟⲕ ⲛⲓⲙ
  chosen: who I am
  alternatives:
  - that I am who
  - what I am
  lexicon: Layton (clausal complements)
  rationale: English naturalness favors ‘who I am’; note that literal order is ‘that I am who,’ but content is preserved.
- source_word: ⲁⲗⲗⲁ
  chosen: Rather
  alternatives:
  - But
  - Instead
  lexicon: Greek loan in Coptic; Lambdin
  rationale: Marks a corrective contrast; ‘Rather’ conveys the adversative pivot strongly.
- source_word: ⲁⲛⲧⲱⲧⲛϣⲱⲡⲉ
  chosen: you have become
  alternatives:
  - you have come to be
  lexicon: Crum (ϣⲱⲡⲉ ‘become’)
  rationale: Perfective sense of change of state; ‘have become’ is concise and clear.
- source_word: ⲛⲡϩⲉ
  chosen: like
  alternatives:
  - similar to
  lexicon: Crum
  rationale: Standard preposition of comparison; ‘like’ is the straightforward equivalent.
- source_word: ⲙⲉ
  chosen: love
  alternatives:
  - like
  lexicon: Crum
  rationale: Verb ‘to love’; parallelism with ‘hate’ calls for the stronger ‘love’ in English.
- source_word: ⲙⲟⲥⲧⲉ
  chosen: hate
  alternatives:
  - detest
  lexicon: Crum
  rationale: Antonym to ‘love’; simple ‘hate’ keeps Thomas’s stark antithesis.
- source_word: ⲡϣⲏⲛ
  chosen: the tree
  alternatives:
  - the wood
  lexicon: Crum (ϣⲏⲛ ‘wood, tree’)
  rationale: Given the fruit imagery, ‘tree’ is the contextual sense.
- source_word: ⲕⲁⲣⲡⲟⲥ
  chosen: fruit
  alternatives: []
  lexicon: Crum (Greek loan)
  rationale: Common Greek loanword; ‘fruit’ is the direct equivalent.
- source_word: ⲡⲉϥ- (possessive)
  chosen: its
  alternatives:
  - his
  lexicon: Lambdin
  rationale: The suffix -ϥ is masculine singular; with ‘tree’ as antecedent, English idiom prefers ‘its fruit’.
- source_word: ⲓⲟⲩⲇⲁⲓⲟⲥ
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: Crum; Greek Ἰουδαῖος
  rationale: Conventional rendering; note possible alternative ‘Judeans’ that stresses ethnogeographic sense.
textual_note: 'Dialect/orthography: The MS line shows ⲡⲉϫⲁⲩ ⲛⲁϥ ‘they said to him’; Dilley’s lemma line displays ⲛⲁⲛⲧⲟϥ, an orthographic variant with the same meaning ‘to him’. Likewise ⲛⲁⲁⲛⲟⲛ appears for ‘to us’ (cf. more common ⲛⲁⲛ); these reflect scribal assimilation and do not affect sense. The sequence ϩⲛⲡⲉⲧⲉⲣⲉⲁⲛⲟⲕϫⲱ ⲛⲛⲧⲟⲟⲩ is best taken with the reply, not the question: ‘from what I say in your ears.’ ⲛⲛⲧⲟⲟⲩ is the noun ‘the ears’ (not a 3pl object pronoun), yielding the idiom ‘in your hearing.’ No lacunae or conjectural restorations are indicated in Dilley’s edition for this saying.'
