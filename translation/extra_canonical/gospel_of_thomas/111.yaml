translation:
  text: Jesus said, "The heavens and the earth will roll up before you. And the one who lives from the Living One will not see death. Does not Jesus say, 'Whoever has found himself, the world is not worthy of him'?"
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Coptic coordinates “the heavens … and the earth” with a single verb (ⲛⲁϭⲱⲗ). I have supplied “will roll up” for the second subject for English clarity.
    reason: lexical_alternative
  - marker: b
    text: The phrase reads literally “the one who lives out, in the Living One.” I render “from the Living One” to foreground source; “in the Living One” is possible.
    reason: lexical_alternative
  - marker: c
    text: At NH II, 51.9 the manuscript has ϫⲱ ⲙ̄ⲙⲟⲥ (“say this/it”), while Dilley normalizes to ϫⲱ ⲛⲛⲧⲟⲥ (“say to you [pl.]”). The latter fits the rhetorical question introduced by ⲟⲩⲭ ϩⲟⲧⲓ.
    reason: textual_variant
  - marker: d
    text: “The world is not worthy of him” echoes Heb 11:38 conceptually, though Thomas’s formulation is independent.
    reason: cross_reference
  - marker: e
    text: Or 'Is it not that Jesus has said to you,'.
    reason: previous_rendering
  - marker: f
    text: Or 'The heavens will roll up, and the earth will roll up before you.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲡⲉ
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: Crum; Layton
  rationale: Sahidic ⲡⲡⲉ denotes the sky/heaven; plural “heavens” retains Semitic/early Christian idiom and cosmic tone of the saying.
- source_word: ⲛⲁϭⲱⲗ (ϭⲱⲗ)
  chosen: roll up
  alternatives:
  - fold up
  - be rolled up
  lexicon: Crum; Layton
  rationale: ϭⲱⲗ means to roll/fold up; active future suits the terse Coptic. English “roll up” preserves the vivid image.
- source_word: ⲉⲃⲟⲗ (after ϭⲱⲗ)
  chosen: away
  alternatives:
  - out
  - forth
  lexicon: Layton
  rationale: Directional particle marking movement/separation; “away” captures the vanishing/withdrawal nuance in context.
- source_word: ⲛⲡⲉⲧⲛⲙⲧⲟ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: Layton
  rationale: Second-person plural dative/locative sense; “before you” is concise and keeps the immediacy; note the plural addressees.
- source_word: ⲡⲉⲧⲉⲣⲉⲱⲛϩ ⲉⲃⲟⲗ
  chosen: the one who lives
  alternatives:
  - the one who lives forth
  - the one who comes alive
  lexicon: Crum
  rationale: ⲉⲣⲉ ⲱⲛϩ ⲉⲃⲟⲗ is an idiomatic way to express being alive/remaining alive; plain “lives” avoids over-literal awkwardness while keeping force.
- source_word: ϩⲛ ⲡⲉⲧⲉⲣⲉⲱⲛϩ
  chosen: from the Living One
  alternatives:
  - in the Living One
  - through the Living One
  lexicon: Layton; Crum
  rationale: The text has both ⲉⲃⲟⲗ and ϩⲛ around ⲡⲉⲧⲉⲣⲉⲱⲛϩ (“the Living One”). Rendering as “from” foregrounds source while a footnote notes the locative nuance.
- source_word: ⲛⲁⲛⲁⲩ ⲉⲙⲟⲩ
  chosen: see death
  alternatives:
  - behold death
  - experience death
  lexicon: Crum
  rationale: ⲛⲁⲛⲁⲩ takes ⲉ + object; “see death” preserves the striking Coptic phrasing rather than smoothing to ‘taste’ or ‘experience’.
- source_word: ⲟⲩⲭ ϩⲟⲧⲓ
  chosen: Is it not that
  alternatives:
  - Not that
  - Surely (…that)
  lexicon: Greek loan (οὐχ ὅτι) noted by Layton
  rationale: Functions as a rhetorical introducer; “Is it not that…” preserves the explicit negation and interrogative force.
- source_word: ϫⲱ ⲛⲛⲧⲟⲥ (vs. ϫⲱ ⲙ̄ⲙⲟⲥ)
  chosen: say to you
  alternatives:
  - say this
  - say about it
  lexicon: Layton (pronominal objects)
  rationale: Dilley’s normalization to dative “to you (pl.)” fits the rhetorical question; the ms. reading with ⲙ̄ⲙⲟⲥ is less coherent in context.
- source_word: ⲡⲉⲧⲉⲣⲉⲛⲁϩⲉ ⲉⲛⲧⲟϥ
  chosen: whoever has found himself
  alternatives:
  - whoever has discovered himself
  - whoever has found his self
  lexicon: Crum; Layton
  rationale: Standard reflexive construction with ⲉⲛⲧⲟϥ; “found himself” keeps Thomas’s idiom and avoids interpretive expansion.
- source_word: ⲟⲩⲁⲁⲛⲧⲟϥ / ⲙⲡϣⲁ ⲛⲛⲧⲟϥ ⲁⲛ
  chosen: is not worthy of him
  alternatives:
  - does not deserve him
  lexicon: Crum (ⲁⲁⲛ ‘to be worthy’)
  rationale: Set phrase with dative; “worthy of him” is the conventional rendering and matches the Coptic syntagm.
textual_note: Sahidic with standard Thomasine idiom. The clause “the heavens will roll up, and the earth …” elides the second verb; the object “earth” is coordinated as a second subject, with ⲉⲃⲟⲗ marking direction (‘away’). I explicitly supplied “will roll up” for the earth in English for clarity. The phrase ⲡⲉⲧⲉⲣⲉⲱⲛϩ ⲉⲃⲟⲗ ϩⲛ ⲡⲉⲧⲉⲣⲉⲱⲛϩ uses both the directional ⲉⲃⲟⲗ and locative ϩⲛ around the title “the Living One,” yielding the sense “lives out (from), in the Living One”; I render “from the Living One,” noting the locative nuance in a footnote. At NH II, 51.9 the manuscript shows ϫⲱ ⲙ̄ⲙⲟⲥ; Dilley normalizes to ϫⲱ ⲛⲛⲧⲟⲥ (“say to you [pl.]”), which better fits the rhetorical introduction ⲟⲩⲭ ϩⲟⲧⲓ …; I follow the normalized reading but record the variation. No lacunae affect sense in this saying. No POxy Greek overlap exists for Saying 111.
