  from: Is it not that Jesus has said to you,
  to: Does not Jesus say,
  rationale: 'The Coptic ϫⲱ ⲙ̄ⲙⲟⲥ is the standard idiom for ''says'' (literally ''says it''), introducing a quotation. The draft''s ''has said to you'' is based on a severe misunderstanding of the machine normalization ⲛⲛⲧⲟⲥ, which the translator mistakenly identified as ''to you (pl.)'' (which would be ⲛⲏⲧⲛ). ⲛⲛⲧⲟⲥ is simply the expanded morphological form of ⲙ̄ⲙⲟⲥ (preposition ⲛ- + independent pronoun ⲛⲧⲟⲥ, ''her/it''). The text does not say ''to you.'' Furthermore, the circumstantial ⲉ ⲓ︤ⲥ︥ ϫⲱ is present, not perfect. | Azure: The proposed change is clearly more faithful. In Sahidic, ϫⲱ ⲙ̄ⲙⲟⲥ / expanded ⲛⲛⲧⲟⲥ is the normal quotative idiom, literally ''say it,'' and does not mean ''to you''; the 2nd person plural object would in'
