  from: The heavens will roll up, and the earth will roll up before you.
  to: The heavens and the earth will roll up before you.
  rationale: 'The Coptic coordinates the two subjects with a single verb (ⲙ̄ⲡⲏⲩⲉ ⲛⲁϭⲱⲗ ⲁⲩⲱ ⲡⲕⲁϩ). Supplying a second ''will roll up'' in English is unnecessary and makes the sentence clunkier than the terse Coptic original. | Azure: The rationale is source-grounded and persuasive. In the Coptic, ⲙ̄ⲡⲏⲩⲉ and ⲡⲕⲁϩ are coordinated by ⲁⲩⲱ with a single future verb ⲛⲁϭⲱⲗ governing both, so the more literal structure is ''the heavens and'
