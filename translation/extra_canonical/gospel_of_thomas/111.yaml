  previous_translation_block:
    text: Jesus said, "The heavens and the earth will roll up before you. And the one who lives from the Living One will not see death. Does not Jesus say, 'Whoever has found himself, the world is not worthy of him'?"
    philosophy: optimal-equivalence
    footnotes:
    - marker: a
      text: The Coptic coordinates “the heavens … and the earth” with a single verb (ⲛⲁϭⲱⲗ). I have supplied “will roll up” for the second subject for English clarity.
      reason: lexical_alternative
    - marker: b
      text: The phrase reads literally “the one who lives out, in the Living One.” I render “from the Living One” to foreground source; “in the Living One” is possible.
      reason: lexical_alternative
    - marker: c
      text: At NH II, 51.9 the manuscript has ϫⲱ ⲙ̄ⲙⲟⲥ (“say this/it”), while Dilley normalizes to ϫⲱ ⲛⲛⲧⲟⲥ (“say to you [pl.]”). The latter fits the rhetorical question introduced by ⲟⲩⲭ ϩⲟⲧⲓ.
      reason: textual_variant
    - marker: d
      text: “The world is not worthy of him” echoes Heb 11:38 conceptually, though Thomas’s formulation is independent.
      reason: cross_reference
    - marker: e
      text: Or 'Is it not that Jesus has said to you,'.
      reason: previous_rendering
    - marker: f
      text: Or 'The heavens will roll up, and the earth will roll up before you.'.
      reason: previous_rendering
