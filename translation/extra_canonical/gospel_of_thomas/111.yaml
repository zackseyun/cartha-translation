translation:
  text: Jesus said, "The heavens will roll up, and the earth, in your presence, and the one who lives from the living one will not see death." Does not Jesus say, "Whoever has found himself, the world is not worthy of him"?
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:51:46Z'
  footnotes:
  - marker: Does not Jesus say
    text: The Greek loan phrase οὐχ ὅτι (literally 'not that') functions here as an interrogative, 'Is it not that...?' or 'Does not...?' This sentence is generally understood as an editorial gloss by the compiler, stepping outside the narrative frame to quote another saying.
    reason: register_note
  - marker: found himself
    text: Coptic ⲡⲉⲧⲁϩⲉ ⲉⲣⲟϥ ⲟⲩⲁⲁϥ (literally 'the one who has found himself alone/himself').
    reason: lexical_alternative
lexical_decisions:
- source_word: ϭⲱⲗ
  chosen: roll up
  rationale: The verb ϭⲱⲗ means 'to wrap up' or 'roll up', fitting the apocalyptic imagery of the heavens being rolled up like a scroll.
  lexicon: Crum 808a
- source_word: ⲙ̄ⲧⲟ ⲉⲃⲟⲗ
  chosen: presence
  rationale: The compound preposition ⲙ̄-ⲡⲉⲧⲛ-ⲙ̄ⲧⲟ ⲉⲃⲟⲗ literally means 'before your face' or 'in your presence'.
  lexicon: Crum 188b
- source_word: ϩⲉ
  chosen: found
  rationale: The verb ϩⲉ ⲉ- means 'to fall upon' or 'to find'. Here it appears with the relative perfect prefix (ⲡ-ⲉⲧ-ⲁ-ϩⲉ), meaning 'the one who has found'.
  lexicon: Crum 655a
- source_word: ⲙ̄ⲡϣⲁ
  chosen: worthy
  rationale: The verb ⲙⲡϣⲁ means 'to be worthy of' or 'deserve'.
  lexicon: Crum 181b
theological_decisions:
- issue: Capitalization of 'the living one'
  chosen_reading: the living one
  rationale: Kept lowercase to maintain the ambiguity of the Coptic ⲡⲉⲧⲟⲛϩ, which can refer to the divine source (the Father) or the state of being spiritually alive, without imposing later theological capitalization.
  alternatives_noted:
  - the Living One
drafter_notes: This saying features a rare editorial gloss ('Does not Jesus say...') where the compiler steps out of the frame to comment on the preceding saying by quoting another Jesus saying. The translation preserves this shift in voice by placing the gloss outside the main quotation marks. The punctuation of the first sentence strictly follows the Coptic phrasing, which separates 'the heavens will roll up' and 'and the earth, in your presence' with a medial dot.
