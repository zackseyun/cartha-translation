translation:
  text: Jesus said, “A man had some guests. He prepared a dinner and sent his slave so that he might invite the guests. He went to the first and said to him, ‘My master invites you.’ He said to him, ‘I have some money with some merchants; they are coming to me this evening. I must go to give them instructions. I ask to be excused from the dinner.’ He went to another and said to him, ‘My master invites you.’ He said to him, ‘I have bought a house, and I am required for a day; I will not have leisure.’ He went to another and said to him, ‘My master invites you.’ He said to him, ‘My friend is getting married, and I myself am going to prepare the dinner; I cannot come. I ask to be excused from the dinner.’ He went to another and said to him, ‘My master invites you.’ He said to him, ‘I have bought a village; I am going to collect the taxes; I cannot come. I ask to be excused.’ The slave came back and said to his master, ‘Those whom you invited to the dinner have excused themselves.’ The master
    said to his slave, ‘Go out into the street, out upon the road; whomever you find, bring them in, so that they may dine. Buyers and merchants will not enter the place of my Father.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Slave’ (ⲡϩⲙϩⲁⲗ) could be rendered ‘servant’; the term in Coptic typically denotes a slave-status dependent.
    reason: lexical_alternative
  - marker: b
    text: ⲇⲉⲓⲡⲛⲟⲛ can be ‘banquet’ or ‘supper’; ‘dinner’ keeps the repeated cadence compact.
    reason: lexical_alternative
  - marker: c
    text: ‘They are coming to me this evening’ renders ⲛⲧⲟⲟⲩⲉⲓ … ⲉⲣⲟⲩϩⲉ. The following clause (‘I must go to give them instructions’) reflects a compressed business idiom; the Coptic phraseology is terse and somewhat idiomatic.
    reason: cultural_note
  - marker: d
    text: ⲟⲩⲉϩⲥⲁϩⲛⲉ literally ‘tomorrow morning.’
    reason: dialect_note
  - marker: e
    text: ⲥⲣϥⲉ means ‘to have leisure/time’; ‘I will not have leisure’ keeps the idiomatic feel.
    reason: lexical_alternative
  - marker: f
    text: ‘Prepare the dinner’ translates ⲣⲇⲓⲡⲛⲟⲛ (‘make/give a dinner’).
    reason: lexical_alternative
  - marker: g
    text: ⲉϫⲓ ⲡϣⲱⲙ is an idiom for collecting tribute/rent/taxes; ‘taxes’ chosen for clarity.
    reason: lexical_alternative
  - marker: h
    text: 'Street (ⲥⲁ) and road (ϩⲓⲏ) are paired to indicate public ways; other options: ‘lane’ and ‘highway.’'
    reason: lexical_alternative
  - marker: i
    text: 'Closing clause: the damaged text likely intended two classes of commercial actors; ‘buyers and merchants’ reflects the parallelism (cf. restoration uncertainties at lb 34–35).'
    reason: lacuna_or_restoration
  - marker: j
    text: Or 'A man had a slave.'.
    reason: previous_rendering
  - marker: k
    text: Or 'I have dealings with some merchants'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡϩⲙϩⲁⲗ
  chosen: slave
  alternatives:
  - servant
  lexicon: Crum; Layton
  rationale: ⲡϩⲙϩⲁⲗ commonly denotes a slave/servant; social register is sharper as “slave,” preserving Thomas’s stark diction.
- source_word: ⲇⲉⲓⲡⲛⲟⲛ
  chosen: dinner
  alternatives:
  - banquet
  - supper
  lexicon: Lambdin; Layton
  rationale: Loan from Gk. deipnon; semantic range covers main meal/banquet. “Dinner” is concise and fits repeated phrasing.
- source_word: ⲧⲱϩⲙ
  chosen: invite
  alternatives:
  - summon
  - call
  lexicon: Crum; Layton
  rationale: In social context of a meal, ⲧⲱϩⲙ conveys invitation; “summon” is possible but less idiomatic in English here.
- source_word: ⲉⲙⲡⲟⲣⲟⲥ
  chosen: merchants
  alternatives:
  - traders
  - dealers
  lexicon: Lambdin
  rationale: Direct Gk. loan ἔμπορος; “merchants” is standard.
- source_word: ⲉⲣⲟⲩϩⲉ
  chosen: this evening
  alternatives:
  - tonight
  lexicon: Crum
  rationale: ϩⲉ denotes evening; context suits “this evening/tonight.” “This evening” keeps the scene temporal marker plain.
- source_word: ⲟⲩⲉϩⲥⲁϩⲛⲉ
  chosen: tomorrow (morning)
  alternatives:
  - tomorrow
  - tomorrow morning
  lexicon: Crum
  rationale: ⲟⲩⲉϩ = tomorrow; ⲥⲁϩⲛⲉ = morning. The compound naturally reads “tomorrow morning.” nuance retained in note.
- source_word: ⲣⲡⲁⲣⲁⲓⲧⲉⲓ
  chosen: ask to be excused
  alternatives:
  - decline
  - beg off
  lexicon: Lambdin
  rationale: Calques Gk. παραιτέομαι; repeated refrain in the saying—“ask to be excused” renders the idiom explicitly.
- source_word: ⲧⲟⲟⲩⲟⲩⲏⲓ
  chosen: house
  alternatives:
  - home
  - estate
  lexicon: Crum; Layton
  rationale: Built on ⲟⲩⲏⲓ ‘house’; context contrasts with village purchase later; “house” maintains concreteness.
- source_word: ⲥⲣϥⲉ
  chosen: have leisure
  alternatives:
  - have time
  - be free
  lexicon: Crum
  rationale: Crum s.v. ⲥⲣϥⲉ ‘to have leisure’; preserves tone of excuse; “have time” noted as alternative.
- source_word: ⲁⲣϣⲉⲗⲉⲉⲧ
  chosen: get married
  alternatives:
  - take a wife
  - marry
  lexicon: Crum
  rationale: Verbal form meaning ‘to marry/take a wife’; “is getting married” reads naturally in English narrative.
- source_word: ⲣⲇⲓⲡⲛⲟⲛ
  chosen: prepare the dinner
  alternatives:
  - give a dinner
  - host the dinner
  lexicon: Layton
  rationale: Coptic ⲣ- + deipnon = ‘make/give a dinner’; “prepare the dinner” fits context of arrangements.
- source_word: ⲕⲱⲙⲏ
  chosen: village
  alternatives:
  - small town
  - estate (village)
  lexicon: Lambdin
  rationale: Standard Gk. loan κώμη; “village” straightforward.
- source_word: ⲉϫⲓ ⲡϣⲱⲙ
  chosen: collect the taxes
  alternatives:
  - collect the rent
  - collect the produce/tribute
  lexicon: Crum
  rationale: ϣⲱⲙ can denote tribute/rent; idiom ⲉϫⲓ ⲡϣⲱⲙ = levy/collect dues. “Taxes” captures the fiscal sense crisply.
- source_word: ⲡⲥⲁ
  chosen: street
  alternatives:
  - lane
  - alley
  lexicon: Crum
  rationale: Common noun for street/lane; paired with ‘road’ in parallel phrase.
- source_word: ⲡϩⲓⲏ
  chosen: road
  alternatives:
  - highway
  - way
  lexicon: Crum
  rationale: Basic term for road/way; “road” keeps cadence tight.
- source_word: ⲉⲓⲛⲉ
  chosen: bring (them in)
  alternatives:
  - lead (them in)
  - bring along
  lexicon: Crum
  rationale: Verb ‘to bring’; object supplied by context; “bring them in” reflects implied direction toward the house.
- source_word: ⲣⲉϥⲧⲟⲟⲩ
  chosen: buyers
  alternatives:
  - purchasers
  lexicon: Crum
  rationale: Agentive of ‘buy’; paired with ‘merchants’ in the exclusion clause.
- source_word: ⲡϣⲟⲧⲉ / ⲛⲉϣⲟⲧⲉ (restored)
  chosen: merchants
  alternatives:
  - those engaged in trade
  - the market (if read as abstract)
  lexicon: Crum; Layton
  rationale: Context calls for persons parallel to ‘buyers’; despite orthographic uncertainty, ‘merchants’ best fits the coordinated pair.
- source_word: ⲡⲧⲟⲡⲟⲥ ⲛⲡⲁⲉⲓⲱⲧ
  chosen: the place of my Father
  alternatives:
  - my Father’s place
  - the Father’s place
  lexicon: Lambdin
  rationale: Direct rendering preserves Thomas’s stark locution; avoids harmonizing to ‘kingdom.’
textual_note: 'Dialect: Sahidic with Lycopolitan features (e.g., frequent narrative 3ms pronoun ⲁⲛⲧⲟϥ/ⲛⲁⲛⲧⲟϥ). Orthography: line lb 13 printed had ⲛ̄ⲛ̄ϣⲙ̄ⲙⲟⲉⲓ (‘guests’) where the normalization reads ⲛⲡϣⲙⲙⲟ; sense requires ‘guests’ as the object of ⲧⲱϩⲙ. Lacuna/Restoration: at NHAM02.44 lb 34–35, the manuscript is damaged (…ⲛ̄ⲛⲉϣⲟⲧ̣[ⲉ ⲥⲉⲛⲁⲃ]ⲱ̣ⲕ̣…). Dilley’s normalization reads ⲙⲛⲡϣⲟⲧⲉ, but many editors understand a personal noun (‘sellers/merchants’). The closing clause is translated with the coordinated pair ‘buyers and merchants’ accordingly. No POxy Greek overlap is known for this saying.'
