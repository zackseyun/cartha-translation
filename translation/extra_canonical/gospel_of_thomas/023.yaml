    - marker: b
      text: '‘making a single one’: The underlying construction ⲉⲣⲉ … ⲉⲓⲣⲉ allows ‘so that they may make’ or idiomatically ‘as a single one.’'
      reason: lexical_alternative
    - marker: c
      text: The idiom ‘one out of a thousand, two out of ten thousand’ echoes biblical language (cf. Deut 32:30), though Thomas uses it in a different saying-context.
      reason: cross_reference
