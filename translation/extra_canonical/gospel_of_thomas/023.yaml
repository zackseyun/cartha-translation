translation:
  text: Jesus said, "I will choose you, one out of a thousand and two out of ten thousand, and they will stand as a single one."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:32:55Z'
  footnotes:
  - marker: '1'
    text: The Coptic shifts abruptly from the second-person plural object ('choose you') to the third-person plural subject ('they will stand'). This grammatical disjointedness is preserved in the translation.
    reason: register_note
  - marker: '2'
    text: Coptic ⲟⲩⲁ ⲟⲩⲱⲧ (oua ouōt), a recurring Thomasine idiom for spiritual unity and integration, closely related to the concept of the 'solitary' (monachos).
    reason: theological_note
lexical_decisions:
- source_word: ⲥⲉⲧⲡ-
  chosen: choose
  rationale: Pre-pronominal form of ⲥⲱⲧⲡ, meaning 'to choose' or 'elect'.
  lexicon: Crum 365b
  alternatives:
  - select
  - pick
- source_word: ϣⲟ
  chosen: a thousand
  rationale: Standard Coptic numeral for 1,000.
  lexicon: Crum 546b
- source_word: ⲧⲃⲁ
  chosen: ten thousand
  rationale: Standard Coptic numeral for 10,000 (myriad).
  lexicon: Crum 398a
- source_word: ⲱϩⲉ ⲉⲣⲁⲧ=
  chosen: stand
  rationale: Idiom meaning 'to stand on one's feet' or 'stand firm'.
  lexicon: Crum 539b
- source_word: ⲟⲩⲁ ⲟⲩⲱⲧ
  chosen: a single one
  rationale: A recurring Thomasine phrase denoting absolute unity or singleness, modifying the circumstantial clause 'being a single one'.
  lexicon: Crum 492b
  alternatives:
  - one and the same
  - united
theological_decisions:
- issue: Shift in grammatical person
  chosen_reading: they will stand
  rationale: Resists the urge to harmonize the pronouns to 'you will stand', preserving the exact Coptic phrasing (ⲥⲉⲛⲁⲱϩⲉ).
  alternatives_noted:
  - you will stand
- issue: Translation of ⲟⲩⲁ ⲟⲩⲱⲧ
  chosen_reading: a single one
  rationale: Preserves the literal and theologically loaded Thomasine emphasis on singleness and unity, rather than paraphrasing it as 'united' or 'together'.
  alternatives_noted:
  - united
  - as one
drafter_notes: The saying features a sharp transition in person from 'you' to 'they', which has been retained to reflect the Coptic syntax accurately. The phrase 'a single one' translates the circumstantial clause ⲉⲩⲟ ⲟⲩⲁ ⲟⲩⲱⲧ ('while they are one single'), maintaining the text's emphasis on esoteric unity.
