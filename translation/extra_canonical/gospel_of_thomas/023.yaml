  rationale: 'Two major grammatical errors. First, ⲱϩⲉ ⲉⲣⲁⲧ= is the standard idiom for "to stand" (literally "stand on one''s feet", Crum 548b); ⲉⲣⲁⲧⲟⲩ means "their feet," not "before you/them." Second, ⲉⲩⲟ uses the stative ⲟ ("to be", Crum 83b), not the active infinitive ⲉⲓⲣⲉ ("to make"). The draft mistakenly translated Dilley''s lemmatized normalization (ⲉⲣⲉⲛⲧⲟⲟⲩⲉⲓⲣⲉ) instead of the manuscript''s stative form. | Azure: The proposed change corrects two specific source-language mistakes in the current English. In Sahidic, ⲱϩⲉ ⲉⲣⲁⲧ= is the ordinary idiom ''stand, be standing,'' with ⲉⲣⲁⲧⲟⲩ referring to ''their feet,'' not '
