  rationale: 'Coptic ϫⲛⲁⲩ (Sahidic ϣⲓⲡⲉ) means ''to be ashamed'' (Crum 775a). Translating it as ''hesitate'' strips the saying of its crucial social dynamic: the honor/shame reversal of an elder seeking wisdom from a newborn. Furthermore, the draft awkwardly splits and double-translates ⲡⲣⲱⲙⲉ ⲛ̄ϩⲗⲗⲟ ϩⲛ̄ⲛⲉϥϩⲟⲟⲩ (''the old man in his days'') as ''advanced in days... in his days''. | Azure: The proposed change is closer to the Coptic. The verb in this saying is the Sahidic verb for being ashamed/shy, not a generic ''hesitate''; rendering it ''be ashamed'' preserves the honor-shame force of t'
