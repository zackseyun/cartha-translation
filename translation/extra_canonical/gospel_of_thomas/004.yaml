translation:
  text: Jesus said, An old man in his days will not be ashamed to ask a small child of seven days about the place of life, and he will live. For many who are first will become last, and they will become a single one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ϫⲛⲁⲩ literally “be ashamed”; in negative idiom it conveys “not hesitate.”
    reason: lexical_alternative
  - marker: b
    text: “Child of seven days” signals a newborn; the image heightens the paradox of the aged seeking from the newly born.
    reason: cultural_note
  - marker: c
    text: “They will become one and the same” renders ⲟⲩⲁ ⲟⲩⲱⲧ, a fixed expression in Thomas; compare the unity motifs in Saying 22.
    reason: cross_reference
  - marker: d
    text: POxy 654 continues “…and the last [will be] first…and they will have eternal life,” whereas NH II reads “…and they will become one and the same.”
    reason: textual_variant
  - marker: e
    text: The phrase “in his days” (ϩⲛⲡⲉϥϩⲟⲟⲩ) is kept to reflect the Coptic’s temporal emphasis on the man’s lifespan.
    reason: dialect_note
  - marker: f
    text: Or 'A man advanced in days will not hesitate, in his days, to ask'.
    reason: previous_rendering
  - marker: g
    text: Or 'one and the same'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϫⲛⲁⲩ
  chosen: hesitate
  alternatives:
  - be ashamed
  lexicon: Crum; Layton (Grammar)
  rationale: Crum notes ϫⲛⲁⲩ as “be ashamed,” which in negative idiom often functions as “not hesitate” to do something; retained the idiomatic force to fit the infinitival complement that follows.
- source_word: ⲡⲣⲱⲙⲉ ⲛϩⲗⲗⲟ ϩⲛⲡⲉϥϩⲟⲟⲩ
  chosen: a man advanced in days
  alternatives:
  - an old man
  - a man full of days
  lexicon: Crum (ϩⲗⲗⲟ ‘old, aged’)
  rationale: The phrase stacks ϩⲗⲗⲟ (‘old’) with ϩⲛⲡⲉϥϩⲟⲟⲩ (‘in his days’). “Advanced in days” preserves the literal temporal emphasis while staying English-natural.
- source_word: ⲟⲩⲕⲟⲩⲓ ⲛϣⲏⲣⲉ ϣⲏⲙ
  chosen: a small child
  alternatives:
  - a little child
  lexicon: Crum (ⲕⲟⲩⲓ ‘small’; ϣⲏⲣⲉ ‘child’; ϣⲏⲙ ‘small, little’)
  rationale: Redundant diminutives intensify smallness; rendered as a single idiomatic phrase to avoid clunky repetition while noting the emphasis.
- source_word: ⲉⲣⲉⲛⲧⲟϥ ϩⲛⲥⲁϣϥ̅ ⲛϩⲟⲟⲩ
  chosen: seven days old
  alternatives:
  - of seven days
  lexicon: Lambdin (temporal ϩⲛⲥⲁ + numeral for age)
  rationale: Standard Coptic construction for age; “seven days old” is concise and accurate.
- source_word: ⲡⲧⲟⲡⲟⲥ ⲛⲡⲱⲛϩ
  chosen: the place of life
  alternatives:
  - the place of the living
  lexicon: Loanword τόπος; Crum (ⲱⲛϩ ‘life’/‘to live’)
  rationale: Compositional rendering preserves the striking Thomasine image without interpretive expansion.
- source_word: ϥⲛⲁⲱⲛϩ
  chosen: he will live
  alternatives:
  - he will have life
  lexicon: Crum (ⲱⲛϩ ‘live’)
  rationale: Verb, not noun; kept verbal aspect and left subject as the old man by context.
- source_word: ⲟⲩⲛϩⲁϩ ⲛϣⲟⲣⲡ
  chosen: many who are first
  alternatives:
  - many first ones
  lexicon: Crum (ϣⲟⲣⲡ ‘first’)
  rationale: Relative sense in English clarifies the construction without adding content.
- source_word: ⲛⲁⲣϩⲁⲉ
  chosen: will become last
  alternatives:
  - will end up at the back
  lexicon: Crum (ϩⲁⲉ ‘back/rear’; ⲣ- as inchoative ‘become’)
  rationale: Inchoative + ‘back/rear’ yields ‘become last’; concise and idiomatic.
- source_word: ⲟⲩⲁ ⲟⲩⲱⲧ
  chosen: one and the same
  alternatives:
  - a single one
  lexicon: Crum (ⲟⲩⲱⲧ ‘selfsame, alone’)
  rationale: Fixed Thomasine collocation; “one and the same” preserves the strangeness and thematic link to unity motifs elsewhere in Thomas.
textual_note: No lacunae in NH II for this saying. The manuscript line at NHAM02.33 lb 10 shows ⲛ̄ⲥⲉϣⲱⲡⲉ (“they will become”), while Dilley’s normalization presents ⲛⲧⲉⲛⲧⲟⲟⲩϣⲱⲡⲉ (orthographic/morphological normalization). The sense is 3pl future in either case; translation follows “they will become.” The doubling ⲟⲩⲕⲟⲩⲓ ⲛϣⲏⲣⲉ ϣⲏⲙ is an intensifying construction (“very small child”). The complement to ϫⲛⲁⲩ is introduced with ⲉϫⲛ and then specified by ⲉⲧⲃⲉ ⲡⲧⲟⲡⲟⲥ ⲛⲡⲱⲛϩ; idiomatically this is “not hesitate to ask … about …”. The subject of ϥⲛⲁⲱⲛϩ is taken as the old man (not the child), by discourse flow.
