greek_overlap_decision:
  witness: POxy 654 (say. 4)
  agreement: substantive_divergence
  chosen_basis: coptic
  rationale: The opening phrase aligns in sense (“not hesitate to ask a child of seven days about the place of life, and he will live”). However, POxy 654 continues with “and the last [will be] first and they will have eternal life,” whereas NH II reads “for many who are first will become last, and they will become one and the same.” Given the project’s primary base in the Coptic NH II witness, the translation follows NH II and notes the Greek’s divergent ending as a variant.
synoptic_parallel_check:
  parallels:
  - Mark 10:31
  - Matthew 19:30
  - Luke 13:30
  handling: intentional_divergence
  rationale: Thomas’ first/last reversal echoes Synoptic sayings, but Thomas diverges by concluding with a unity formula (“they will become one and the same”) rather than the Synoptic chiastic reversal or an eternal-life promise. The translation preserves Thomas’ distinctive ending without harmonizing.
revision_risk_note: 'Key points to scrutinize: (1) rendering ϫⲛⲁⲩ as “not hesitate” rather than “not be ashamed”; (2) subject of ϥⲛⲁⲱⲛϩ (“he will live”) taken as the old man; (3) the semantics of ⲛⲁⲣϩⲁⲉ as “will become last”; (4) the idiom ⲟⲩⲁ ⲟⲩⲱⲧ as “one and the same” versus “a single one”; and (5) note the Greek POxy ending diverges from NH II—ensure our choice to follow Coptic is justified and clearly signposted.'
