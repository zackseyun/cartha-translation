translation:
  text: Whoever does not hate his father and his mother as I do cannot become my disciple; and whoever does not love his father and his mother as I do cannot become my disciple. For my mother [...], but my true [mother] gave me life.
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:49:35Z'
  footnotes:
  - marker: '1'
    text: The Coptic prefix ⲡⲉⲧⲁ- (p-et-a) here stands for the future relative ⲡⲉⲧⲛⲁ- (p-et-na, 'whoever will'), a common dialectal feature in Thomas reflecting Lycopolitan/Subakhmimic influence.
    reason: dialect_note
  - marker: '2'
    text: Literally 'in my manner' or 'like me'.
    reason: lexical_alternative
  - marker: '3'
    text: The manuscript has a lacuna here. Reconstructions vary (e.g., 'bore me [to destruction]' or 'bore me [forth]'), contrasting the earthly mother with the 'true' mother who gives life.
    reason: textual_variant
lexical_decisions:
- source_word: ⲛ̄ⲧⲁϩⲉ
  chosen: as I do
  rationale: Literally 'in my manner' or 'like me'. It modifies the verbs 'hate' and 'love', indicating that the disciple must emulate Jesus's specific way of relating to earthly parents.
  lexicon: Crum 651a
  alternatives:
  - in my way
  - like me
- source_word: ϣⲣ̄ⲙⲁⲑⲏⲧⲏⲥ
  chosen: cannot become my disciple
  rationale: The auxiliary ϣ (to be able) combined with the future negative ϥⲛⲁ-...ⲁⲛ translates cleanly to 'cannot'. ⲣ̄ⲙⲁⲑⲏⲧⲏⲥ ⲛⲁⲉⲓ is literally 'become a disciple to me'.
  lexicon: Crum 549a
  alternatives:
  - will not be able to become a disciple to me
- source_word: ⲙ̄ⲙⲉ
  chosen: 'true'
  rationale: The attributive construction ⲛ̄-ⲙⲉ (of truth) functions as the adjective 'true', contrasting the earthly mother with the heavenly one.
  lexicon: Crum 158a
  alternatives:
  - of truth
theological_decisions:
- issue: The identity and rendering of the 'true mother'.
  chosen_reading: my true [mother]
  rationale: The Coptic ⲙ̄ⲙⲉ (of truth) modifies the securely reconstructed [ⲧⲁⲙⲁⲁ]ⲩ. In early Jewish-Christian and Syriac traditions (e.g., the Gospel of the Hebrews), the Holy Spirit is depicted as the heavenly mother of Jesus. The translation preserves the literal 'true [mother]' without paraphrasing the underlying theology.
  alternatives_noted:
  - my mother of truth
drafter_notes: 'This saying builds on the Synoptic tradition (Luke 14:26 / Matt 10:37) but introduces a profound Thomasine modification: the disciple must hate AND love their parents ''as I do'' (ⲛ̄ⲧⲁϩⲉ). The saying then contrasts Jesus''s earthly mother (who likely ''bore him into the world/destruction'' in the lacuna) with his ''true mother'' (often understood in Syriac and Thomasine traditions as the Holy Spirit) who gave him life.'
