translation:
  text: Jesus said, I speak my mysteries to those who are worthy of my mysteries. What your right hand will do, do not let your left hand know what it is doing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Coptic has the singular ‘mystery’ (ⲙⲩⲥⲧⲏⲣⲓⲟⲛ) twice; English singular retained to reflect the text’s form. Some render ‘secrets.’
    reason: lexical_alternative
  - marker: b
    text: The choice of ‘power’ (ⲟⲩⲛⲁⲙ, Gk. δύναμις) rather than ‘right hand’ marks a divergence from Matthew 6:3.
    reason: cross_reference
  - marker: c
    text: “Do not let your left hand know …” is a Semitic-style idiom for acting in secret, without self-display or self-congratulation.
    reason: cultural_note
  - marker: d
    text: Minor brackets in NHAM02.43–44 around the worthiness phrase and the relative ⲡⲉⲧⲉⲣⲉ are editorial restorations in Dilley; the sense is secure.
    reason: lacuna_or_restoration
  - marker: e
    text: Or 'I am the one who speaks my mystery to those who are worthy of my mystery.'.
    reason: previous_rendering
  - marker: f
    text: Or 'What your power will do, do not let your left hand know that it is doing it.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϫⲱ
  chosen: speak
  alternatives:
  - say
  - tell
  lexicon: Lambdin; Layton
  rationale: ϫⲱ takes a direct object with ⲛ; here the nuance is disclosure. “Speak” keeps a slightly formal, oracular tone fitting Thomas; “tell” would be acceptable but less marked.
- source_word: ⲙⲩⲥⲧⲏⲣⲓⲟⲛ
  chosen: mystery
  alternatives:
  - secret
  - sacrament
  lexicon: Crum; Layton
  rationale: Greek loan (mystērion). Thomas often employs cultic/initiatory diction. Kept singular as in the Coptic; English “mystery” can function as an abstract collective. Avoided “sacrament” to prevent anachronistic ecclesial sense.
- source_word: ⲙⲡϣⲁ (construction ⲡⲉⲧⲉⲣⲉ … ⲙⲡϣⲁ)
  chosen: worthy of
  alternatives:
  - deserving of
  - fit for
  lexicon: Crum; Layton (Grammar)
  rationale: Standard Coptic construction for worthiness with genitival complement; “worthy of” is idiomatic and accurate.
- source_word: ⲟⲩⲛⲁⲙ (from Gk. δύναμις)
  chosen: power
  alternatives:
  - might
  - ability
  - strength
  lexicon: Crum; Lambdin
  rationale: Primary sense ‘power/ability’. Preserving “power” maintains Thomas’s distinctive wording vis-à-vis Synoptic “right hand.”
- source_word: ⲉⲓⲣⲉ
  chosen: do
  alternatives:
  - make
  - perform
  lexicon: Crum; Lambdin
  rationale: Common Coptic verb ‘do/make’; here activity is in view rather than fabrication, hence “do.”
- source_word: ⲙⲡⲣⲧⲣⲉ (neg. imperative)
  chosen: do not let
  alternatives:
  - do not allow
  - let not
  lexicon: Layton (Grammar)
  rationale: Negative jussive with ⲧⲣⲉ + infinitive; “do not let” is a natural English equivalent preserving permissive nuance.
- source_word: ϩⲃⲟⲩⲣ
  chosen: left hand
  alternatives:
  - left
  - left side
  lexicon: Crum
  rationale: Lexeme denotes the left hand; the idiom requires the explicit ‘hand’ for clarity and to echo the proverbial form.
- source_word: ⲉⲓⲙⲉ
  chosen: know
  alternatives:
  - perceive
  - be aware
  lexicon: Crum
  rationale: Core sense ‘know/recognize’; “know” fits the secrecy motif.
- source_word: ⲡⲉⲧⲉⲣⲉ … ⲛⲁ ⲉⲓⲣⲉ ⲛⲧⲟϥ (relative future)
  chosen: what your power will do
  alternatives:
  - that which your power is going to do
  - whatever your power will do
  lexicon: Layton (Grammar)
  rationale: Relative future construction; rendered as a free relative clause in English to preserve Thomas’s terseness and structure.
textual_note: 'Dialect/grammar: Sahidic with Lycopolitan features. The clause ⲡⲉⲧⲉⲣⲉⲡⲉⲕⲟⲩⲛⲁⲙ ⲛⲁⲉⲓⲣⲉⲛⲧⲟϥ is a relative future (Layton), best captured as “what your power will do.” The feminine clitic ⲛⲧⲟⲥ in the final clause agrees with ‘hand’ (ϩⲃⲟⲩⲣ, fem.), hence “it is doing it” in English, with ‘it’ referring to the action.

  Lacunae/restorations: Dilley’s printed text shows minor damage and editorial supplements across the line break: NHAM02.43 lb 35 has brackets around ⲛⲉ[ⲧⲙⲡϣⲁ], normalized as ⲛⲡⲉⲧⲉⲣⲉⲙⲡϣⲁ (“to those who are worthy of”); NHAM02.44 lb 1 has bracketed letters in ⲡ̣ⲉ̣[ⲧ]ⲉ… and [ⲛⲁ] before ⲙⲩⲥⲧⲏⲣⲓⲟⲛ. The normalization yields an uncontroversial reading; the translation follows the normalized Sahidic without silently filling beyond Dilley’s reconstruction. Orthographic: ⲟⲩⲛⲁⲙ reflects the common spelling of Gk. δύναμις in Coptic. No Greek Oxyrhynchus overlap is known for this logion.'
