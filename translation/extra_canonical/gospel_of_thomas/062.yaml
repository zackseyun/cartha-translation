translation:
  text: Jesus said, "I tell my mysteries to those [who are worthy] of [my] mysteries. What your right hand will do, do not let your left hand know what it is doing."
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:49:12Z'
  footnotes:
  - marker: '1'
    text: The manuscript is damaged here. The restoration '[who are worthy]' (ⲛⲉ[ⲧⲙⲡϣⲁ]) is standard and fits the remaining traces and the context of esoteric transmission.
    reason: textual_variant
  - marker: '2'
    text: 'The Coptic uses a left-dislocated structure: ''That which your right hand will do, do not let your left hand know what it is doing.'' The pronoun in ''what it is doing'' (ⲉⲥⲣⲟⲩ) is feminine, referring back to the right hand.'
    reason: register_note
  - marker: '3'
    text: The negative causative imperative is spelled ⲙⲛ̄ⲧⲣⲉ- rather than the standard Sahidic ⲙⲡⲣⲧⲣⲉ-, a phonetic or dialectal variant.
    reason: dialect_note
  - marker: '4'
    text: Compare Matthew 6:3. Thomas removes the context of almsgiving, turning the saying into a standalone aphorism about secrecy or the internal division of the practitioner.
    reason: cross_reference
lexical_decisions:
- source_word: ⲙⲩⲥⲧⲏⲣⲓⲟⲛ
  chosen: mysteries
  rationale: Greek loanword μυστήριον, referring to secret or esoteric teachings.
  lexicon: BDAG 661
- source_word: ⲙⲡϣⲁ
  chosen: worthy
  rationale: Standard Coptic verb for 'to be worthy' or 'deserve'. Restored in the lacuna.
  lexicon: Crum 121a
- source_word: ⲟⲩⲛⲁⲙ
  chosen: right hand
  rationale: Literally 'right', used substantively for 'right hand'.
  lexicon: Crum 483a
- source_word: ϩⲃⲟⲩⲣ
  chosen: left hand
  rationale: Literally 'left', used substantively for 'left hand'.
  lexicon: Crum 658a
- source_word: ⲙⲛ̄ⲧⲣⲉ-
  chosen: do not let
  rationale: Negative causative imperative prefix, a phonetic/dialectal variant of standard Sahidic ⲙⲡⲣⲧⲣⲉ-.
  lexicon: Crum 431b
theological_decisions:
- issue: Context of the right/left hand saying
  chosen_reading: Kept as a general aphorism without adding context.
  rationale: Unlike Matthew 6:3, which explicitly applies this to almsgiving, Thomas places it immediately after a statement about mysteries. The translation avoids harmonizing with Matthew, leaving the Thomasine juxtaposition intact.
  alternatives_noted: []
drafter_notes: The saying combines a statement about esoteric transmission with a detached version of the Synoptic saying about the right and left hands. The translation preserves the slightly redundant syntax of the Coptic ('What your right hand will do... what it is doing') to reflect the topicalized structure.
