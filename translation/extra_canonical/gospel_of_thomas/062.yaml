revision_risk_note: 'Main review focus: the relative-future clause ⲡⲉⲧⲉⲣⲉⲡⲉⲕⲟⲩⲛⲁⲙ ⲛⲁⲉⲓⲣⲉⲛⲧⲟϥ. I render it “What your power will do …,” aligning ⲛⲧⲟϥ with the object of ⲉⲓⲣⲉ and taking ⲟⲩⲛⲁⲙ as subject. Alternative construals (e.g., an implied ‘right hand’) were rejected to preserve the Coptic lexeme and Thomas’s distinct wording.'
